l_english:
 swe_nor_union_decision_1:0 "Appoint a new Governor-General in Norway"
 swe_nor_union_decision_1_desc:0 "The position in Christiania is currently vacant. We should make a decision on who to appoint as the new head of the Norwegian Government in the absence of the King."

 swe_nor_union_decision_2:0 "Demand that our ministers can participate in parliamentary debates"
 swe_nor_union_decision_2_desc:0 "Currently, the ministers are forbidden to have a say in Stortinget. This cannot stand."

 swe_nor_union_decision_3:0 "Demand that all symbols of the union are removed from our flag"
 swe_nor_union_decision_3_desc:0 "We should use a clean Norwegian flag, without union symbols."

 swe_nor_union_decision_4:0 "Demand Norwegian consular offices"
 swe_nor_union_decision_4_desc:0 "With the increase in Norwegian shipping, the Swedish counsular offices are not enough. We need Norwegian offices."

 swe_nor_union_decision_5:0 "Demand that King Karl XV fulfills his promise"
 swe_nor_union_decision_5_desc:0 "With the coronation as Karl XV as king of Sweden and King of Norway, it's time for him to fulfill his promise of abolishing the position as Governor-General."


