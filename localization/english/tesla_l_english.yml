 tesla_state_trait_irrigation: "Irrigation System"
 je_tesla_irrigation_project: "Irrigation System"

 tesla_states_with_irrigation_tt: "All [GetPlayer.GetAdjective] States have the $tesla_state_trait_irrigation$ State Trait (currently [GetPlayer.MakeScope.GetVariable('tesla_num_states_irrigation_var').GetValue|+0] / [GetPlayer.MakeScope.GetVariable('tesla_num_states_var').GetValue|V0])." #Please replace (formerly Gaudi)

 tesla_irrigation_project_finished_engineer_loc: "\nDr. [GetPlayer.MakeScope.GetVariable('gaudi_engineer_var').GetCharacter.GetLastName] worked on the new #b Irrigation Systems#! of [GetPlayer.GetName] and was able to extend it which massively improved our agricultural sector." #Please replace (formerly Gaudi)
 gaudi.1111.t: "The Irrigation System of [GetPlayer.GetName]"
 gaudi.1111.d: "Our [concept_gaudi_civil_engineer][GetPlayer.MakeScope.GetCountry.GetCustom('gaudi_dr_engineer_type')] has finally completed the project to construct a modern irrigation system in [GetPlayer.GetNameNoFormatting]. Now that we tamed rivers and brought water to the fields our agriculture will surely grow!"
 gaudi.1111.f: "\"The wild rivers are now tamed. The magic has disappeared. It is just straight waterways now. Even the beaver disappeared...\""
 gaudi.1111.g: "I hope this won't have unforseen consequences..."

