 douglas.104.t: "The Mountain Within"
 douglas.104.d: "After five grueling years of climbing and training, [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] returns."
 douglas.104.f: "The mountain has no voice, yet it teaches. Over five long years, our mountaineer has faced snow-blindness, crumbling rockfaces, biting wind, and silence that cuts deeper than any blade. Yet each hardship carved knowledge into muscle, patience into breath. What began as ambition is now tempered into skill. The climber has learned to listen to the stone, to predict storms by scent, to tie knots with eyes closed and heart steady. [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetSheHe|U] returns transformed. This is the beginning of mastery."
 douglas.104.g: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetSheHe|U] no longer conquers the mountain—[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetSheHe] understands it"

