 MR_MOUNTAINEERING_CLUB_BUTTON: "Mountaineering Club"
 MR_MOUNTAINEERING_CLUB_BUTTON_TT: "#T Found a Mountaineering Club#!\nA mountaineering club is a nation's first step toward organized alpinism. It must be founded by an experienced gentleman (or gentlewoman) with mountaineering expertise. From this club, new climbers can then emerge to conquer the peaks of the world!\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"

 MR_ALPINE_CLUB_BUTTON: "Alpine Club"
 MR_ALPINE_CLUB_BUTTON_TT: "#T Found the Alpine Club#!\nFounded in London in 1857, the Alpine Club is the world's oldest mountaineering organization. Its establishment marked the beginning of organized alpinism in Victorian England. The club aimed to promote scientific, geographical, and athletic exploration of the Alps. Among its founding members was Edward Whymper, who completed the first ascent of the Matterhorn in 1865. The Alpine Club played a key role during the 'Golden Age of Alpinism' and published influential works, including the Alpine Journal. It set standards for future mountaineering clubs around the world.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ALPINE_CLUB_TRIGGER_TT: "#default_text There are at least #G 6#! Countries with a Mountaineering Club.#!"

