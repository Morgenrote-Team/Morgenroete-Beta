 gaudi.82.t: "The Life's Work of an Architect"
 gaudi.82.d: "After months of preparation, [ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] has presented plans, calculations, statistics, and a handcrafted model. [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U] ambitious monument is already considered a dream of architectural art. The only question that remains is who will make this dream come true?"
 gaudi.82.f: "'Tomorrow we will do beautiful things.' -Antoni Gaudí"
 gaudi.82.g: "A monument to ourselves."

