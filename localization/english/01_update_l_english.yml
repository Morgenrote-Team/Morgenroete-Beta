 je_gaudi_blueprint_research: "Blueprint Research"
 je_gaudi_blueprint_research_reason: "Our architect, [ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName], is working tirelessly on a new blueprint for a building. The time it takes depends on the architect's skills; it typically takes three years. Upon completion of the studies, a unique, new building will be available."
 gaudi_architectural_blueprint_progress_bar_at_full_tt: "The Blueprint Progress bar has reached #variable 100%#!"

 gaudi.11.t: "Blueprint Selection: City Monument"
 gaudi.11.d: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName], our country's most important architect, has taken on the important task of designing a blueprint for a new building. The question remains: What kind of building should be designed?"
 gaudi.11.f: "A #V Statue#! increases the #G legitimacy of the government#!. [GetTechnology('elgar_classiscism_tech').GetName] is required.\nA #V Fountain#! improves the #G standard of living#! of the state in which it is located.\nA #V Triumphal Arch#! will #G reduce the morale loss#! of fighting troops. [GetTechnology('napoleonic_warfare').GetName] is required."
 gaudi.11.g: "The Statue."
 gaudi.11.h: "The Fountain."
 gaudi.11.i: "The Triumphal Arch."
 gaudi.12.t: "Blueprint Selection: Public Square"
 gaudi.12.f: "A #V Public Park#! will #G decrease pollution#!.\nA #V Luna Park#! improves #G tax income#! of the state in which it is located. [GetTechnology('curtiss_tourism_tech').GetName] is required.\nA #V Parade Ground#! has a positive effect on #G conscription rates#!. [GetTechnology('nationalism').GetName] is required."
 gaudi.12.g: "The Public Park."
 gaudi.12.h: "The Luna Park."
 gaudi.12.i: "The Parade Ground."
 gaudi.13.t: "Blueprint Selection: Public Square"
 gaudi.13.f: "A #V State Almshouse#! will #G pull migrants#!. [GetTechnology('egalitarianism').GetName] is required.\nA #V State School#! improves #G education access#! of the state in which it is located. [GetTechnology('empiricism').GetName] is required.\nA #V State Prison#! will #G decrease turmoil#!. [GetTechnology('law_enforcement').GetName] is required."
 gaudi.13.g: "The State Almshouse."
 gaudi.13.h: "The State School."
 gaudi.13.i: "The State Prison."
 gaudi.14.t: "Blueprint Selection: Public Health"
 gaudi.14.f: "A #V Sewerage System#! will give the state #G immunity against cholera, yellow fever and plague#!. [GetTechnology('modern_sewerage').GetName] is required.\nA #V University Hospital#! improves the #G birth rate#! of the state in which it is located. [GetTechnology('theiler_microbiology_tech').GetName] is required.\nA #V Health Department#! will #G decrease disease intensivity#!. [GetTechnology('pharmaceuticals').GetName] is required."
 gaudi.14.g: "The Sewerage System."
 gaudi.14.h: "The University Hospital."
 gaudi.14.i: "The Health Department."
 gaudi.15.t: "Blueprint Selection: National Academy"
 gaudi.15.f: "A #V National Academy of Science#! will advance our #G monthly Academic Progress#!. [GetTechnology('dialectics').GetName] is required.\nA #V National Academy of Arts#! will advance our #G monthly Artistic Progress#!. [GetTechnology('romanticism').GetName] is required.\nA #V National Academy of Sports#! will #G boost the experience of our athletes#!. [GetTechnology('organized_sports').GetName] is required."
 gaudi.15.g: "The Academy of Science."
 gaudi.15.h: "The Academy of Arts."
 gaudi.15.i: "The Academy of Sports."
 gaudi.11.j: "No new blueprint is needed."