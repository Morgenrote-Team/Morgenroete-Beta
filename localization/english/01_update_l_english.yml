 gaudi.51.t: "Neoclassical Revival"
 gaudi.51.d: "[ROOT.GetCountry.GetName] has become a paragon of timeless and dignified architecture. This is a status that inspires awe across the civilized world!"
 gaudi.51.f: "'The general and most outstanding characteristic of the Ancient masterpieces is, ultimately, a noble simplicity and a quiet grandeur, both in posture and in expression.'\n- Johann Joachim Winckelmann"
 gaudi.51.g: "This is the essence of true art."
 gaudi.52.t: "Triumph of Bauhaus"
 gaudi.52.d: "[ROOT.GetCountry.GetName] has become a beacon of rational and progressive architecture. This is a status that commands global respect and admiration!"
 gaudi.52.f: "'Designing is not a profession but an attitude.'\n- László Moholy-Nagy"
 gaudi.52.g: "Needs of the people instead of the need for luxury!"

 je_gaudi_bauhaus_architecture: "Bauhaus Architecture"
 je_gaudi_bauhaus_architecture_reason: "The Bauhaus was a German art school operational from 1919 to 1933 that combined crafts and the fine arts. The school became famous for its approach to design, which attempted to unify individual artistic vision with the principles of mass production and emphasis on function. It was grounded in the idea of creating a Gesamtkunstwerk (comprehensive artwork) in which all the arts would eventually be brought together. The Bauhaus style later became one of the most influential currents in modern design, modernist architecture, and architectural education."
 je_gaudi_neoclassical_architecture: "Neoclassical Architecture"
 je_gaudi_neoclassical_architecture_reason: "Neoclassicism in the early 20th century was a revivalist architectural and artistic movement that sought to reconnect with the formal clarity, symmetry, and grandeur of Greco-Roman antiquity. Emerging as a counterpoint to the excesses of historicism and the growing abstraction of modern art, this style emphasized monumentality, geometric order, and the use of traditional forms in a rational, often state-sanctioned idiom. It was closely tied to national identity and civic architecture, projecting ideals of permanence, authority, and disciplined beauty."
 je_gaudi_art_deco_architecture: "Art Deco Architecture"
 je_gaudi_art_deco_architecture_reason: "The Art Deco movement arose in the 1920s as a decorative and architectural style that embraced modernity while retaining elements of classical order. With its characteristic use of stylized forms, rich materials, and ornamental geometry, Art Deco combined the opulence of craftsmanship with the emerging machine aesthetic. It celebrated technological progress and urban dynamism through motifs inspired by industry, speed, and exoticism."

 je_gaudi_splendour_bauhaus: "Triumph of Bauhaus"
 je_gaudi_splendour_bauhaus_reason: "With the introduction of the Bauhaus spirit, architects have begun to strip away ornament and illusion in favor of clarity, precision, and truth to material. The aim is no longer to impress through opulence or evoke the grandeur of empires past, but to serve society by creating spaces that are functional, honest, and modern. Bauhaus is not just an aesthetic—it is a philosophy of design, grounded in the belief that architecture and daily life must be reconciled through simplicity, utility, and unity of form and purpose. In adopting Bauhaus principles, a capital city signals not just modernity, but progress in its purest form: the elevation of function over facade, of innovation over tradition."
 je_gaudi_splendour_bauhaus_goal: "[THIS.GetCountry.GetName] reaches #G 10#! @gaudi_architectural_splendour! [concept_gaudi_architectural_splendour]."
 je_gaudi_splendour_neoclassical: "Neoclassical Revival"
 je_gaudi_splendour_neoclassical_reason: "Neoclassicism is a style rooted in the rational harmony of antiquity, in the architectural grammar of columns, pediments, and symmetrical layouts. Yet in the early 20th century, it was reimagined with modern construction techniques, cleaner lines, and often monumental scale. It stood not only for tradition, but for a disciplined vision of the future—one in which public life, law, and culture would be framed by buildings that inspire awe and unity. An architecture that embraces these principles would endow our capital with gravitas and grandeur—turning it into a beacon of order, resilience, and cultivated power in the eyes of the world."
 je_gaudi_splendour_neoclassical_goal: "[THIS.GetCountry.GetName] reaches #G 10#! @gaudi_architectural_splendour! [concept_gaudi_architectural_splendour]."
 je_gaudi_splendour_art_deco: "A Dream of Art Deco"
 je_gaudi_splendour_art_deco_reason: "With the introduction of Art Deco, architects revolutionized the art world, for example by breaking with the rigid historicism of the past. But unlike many modern schools, their buildings were not an expression of mere functionality and objectivity. Art Deco is a development in the midst of the general awakening of classical modernism, in which the creative combination of elegance of form, preciousness of materials, strength of colors and sensuality of the topic was in the foreground. During its heyday, it represented luxury, glamour, exuberance, and faith in social and technological progress. An architecture that respects these principles would make our nation a poster child of modernity and wealth."
 je_gaudi_splendour_art_deco_goal: "[THIS.GetCountry.GetName] reches #G 20#! @gaudi_architectural_splendour! [concept_gaudi_architectural_splendour]."

