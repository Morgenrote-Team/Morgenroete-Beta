 ### MR Concepts ###

 concept_gaudi_great_architect: "#PURPLE #b Great Architect#!#!"
 concept_gaudi_great_architects: "#PURPLE #b Great Architects#!#!" #You can use this for plural: [Concept('concept_gaudi_great_architect','$concept_gaudi_great_architects$')]
 concept_gaudi_great_architect_desc: "#b Great Architects#! are [Concept('concept_gaudi_architects','$concept_gaudi_architects$')] that are considered to be the most important minds in their field. #b Architects#! reaching 500 [concept_artists_experience], will become #b Great Architects#!. Should an artist achieve this special rank, he or she can design the blueprint for a truly outstanding monument that embodies the spirit of the nation."
 concept_gaudi_architectural_splendour: "Architectural Splendour"
 concept_gaudi_architectural_splendour_desc: "Architectural Splendour is a collective term for the spectacular advances in modern architecture, referring primarily to Art Deco, Bauhaus, and Neoclassicism as they emerged in the early 20th century. The value represents the transformation of outdated forms into a future-ready architecture. Art Deco requires reaching a higher threshold to fulfill the dream of an Art Deco city — yet the benefits are greater."

