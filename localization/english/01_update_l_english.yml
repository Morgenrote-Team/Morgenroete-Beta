 gaudi.11.t: "Blueprint Selection: City Monument"
 gaudi.11.d: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName], our country's most important architect, has taken on the important task of designing a blueprint for a new building. The question remains: What kind of building should be designed?"
 gaudi.11.f: "A [GetBuildingType('building_gaudi_statue').GetName] increases the #G legitimacy of the government#!. [GetTechnology('elgar_classicism_tech').GetName] is required.\nA [GetBuildingType('building_gaudi_fountain').GetName] improves the #G standard of living#! of the state in which it is located.\nA [GetBuildingType('building_gaudi_arch').GetName] will #G reduce the morale loss#! of fighting troops. [GetTechnology('napoleonic_warfare').GetName] is required."
 gaudi.11.g: "The Statue."
 gaudi.11.h: "The Fountain."
 gaudi.11.i: "The Triumphal Arch."
 gaudi.12.t: "Blueprint Selection: Public Square"
 gaudi.12.f: "A [GetBuildingType('building_gaudi_park').GetName] will #G decrease pollution#!.\nA [GetBuildingType('building_gaudi_luna').GetName] improves #G tax income#! of the state in which it is located. [GetTechnology('curtiss_tourism_tech').GetName] is required.\nA [GetBuildingType('building_gaudi_parade').GetName] has a positive effect on #G conscription rates#!. [GetTechnology('nationalism').GetName] is required."
 gaudi.12.g: "The Public Park."
 gaudi.12.h: "The Luna Park."
 gaudi.12.i: "The Parade Ground."
 gaudi.13.t: "Blueprint Selection: Public Square"
 gaudi.13.f: "A [GetBuildingType('building_gaudi_almshouse').GetName] will #G pull migrants#!. [GetTechnology('egalitarianism').GetName] is required.\nA [GetBuildingType('building_gaudi_school').GetName] improves #G education access#! of the state in which it is located. [GetTechnology('empiricism').GetName] is required.\nA [GetBuildingType('building_gaudi_prison').GetName] will #G decrease turmoil#!. [GetTechnology('law_enforcement').GetName] is required."
 gaudi.13.g: "The State Almshouse."
 gaudi.13.h: "The State School."
 gaudi.13.i: "The State Prison."
 gaudi.14.t: "Blueprint Selection: Public Health"
 gaudi.14.f: "A [GetBuildingType('building_gaudi_canalization').GetName] will give the state #G immunity against cholera, yellow fever and plague#!. [GetTechnology('modern_sewerage').GetName] is required.\nA [GetBuildingType('building_gaudi_hospital').GetName] improves the #G birth rate#! of the state in which it is located. [GetTechnology('theiler_microbiology_tech').GetName] is required.\nA [GetBuildingType('building_gaudi_health').GetName] will #G decrease disease intensivity#!. [GetTechnology('pharmaceuticals').GetName] is required."
 gaudi.14.g: "The Sewerage System."
 gaudi.14.h: "The University Hospital."
 gaudi.14.i: "The Health Department."
 gaudi.15.t: "Blueprint Selection: National Academy"
 gaudi.15.f: "A [GetBuildingType('building_gaudi_science').GetName] will advance our #G monthly Academic Progress#!. [GetTechnology('dialectics').GetName] is required.\nA [GetBuildingType('building_gaudi_arts').GetName] will advance our #G monthly Artistic Progress#!. [GetTechnology('romanticism').GetName] is required.\nA [GetBuildingType('building_gaudi_sports').GetName] will #G boost the experience of our athletes#!. [GetTechnology('organized_sports').GetName] is required."
 gaudi.15.g: "The Academy of Science."
 gaudi.15.h: "The Academy of Arts."
 gaudi.15.i: "The Academy of Sports."
 gaudi.11.j: "No new blueprint is needed."

 gaudi.16.t: "A New Blueprint"
 gaudi.16.d: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] has completed his work on the blueprint today and handed it over to the client."
 gaudi.16.f: "'Ornamentation is wasted labor and, therefore, wasted health. Today, it also means wasted material, and both mean wasted capital. Modern man, man with modern nerves, has no need for ornamentation; he abhors it.' -Adolf Loos"
 gaudi.16.g: "A new building!"

