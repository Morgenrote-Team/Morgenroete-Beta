 ### Athletes ###

 athletes.2.t: "Our Mountaineer, [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullNameNoFormatting], retires"
 athletes.2.d: "After spending decades of [SCOPE.sCharacter('athletes_retired_person_scope').GetHerHis] life climbing peaks, charting unknown routes, and leading expeditions through perilous terrain, [SCOPE.sCharacter('athletes_retired_person_scope').GetFullName] has decided to retire. [SCOPE.sCharacter('athletes_retired_person_scope').GetSheHe|U] will no longer serve as our [concept_douglas_mountaineer]."
 athletes.2.f: ""
 athletes.2.g: "The summit was never the end—only the view before descent."
 athletes.12.t: "Our Mountaineer dies"
 athletes.12.d: "After a lifetime spent conquering peaks and guiding others through the most treacherous climbs, our most revered [concept_douglas_mountaineer] has passed away. Who will now lead the way into the clouds?"
 athletes.12.f: ""
 athletes.12.g: "Their rope may be gone, but their trail remains."

