 gaudi.35.t: "Art Nouveau quarter in [SCOPE.sState('gaudi_art_nouveau_quarter_state').GetCityHubName]"
 gaudi.35.d: "The new artistic development has not stopped at [SCOPE.sState('gaudi_art_nouveau_quarter_state').GetCityHubName]: new Art Nouveau buildings are being built in a quarter that is now considered a quarter of the avant-garde."
 gaudi.35.f: "The debut of Art Nouveau architecture in Brussels was accompanied by a wave of Decorative Art in the new style. Important artists included Gustave Strauven, who used wrought iron to achieve baroque effects on Brussels facades; the furniture designer Gustave Serrurier-Bovy, known for his highly original chairs and articulated metal furniture; and the jewellery designer Philippe Wolfers, who made jewellery in the form of dragonflies, butterflies, swans and serpents. The style was quickly noticed in neighbouring France. After visiting Horta's Hôtel Tassel, Hector Guimard built the Castel Béranger, among the first Paris buildings in the new style. Parisians welcomed Guimard's original and picturesque style; the Castel Béranger was chosen as one of the best new façades in Paris, launching Guimard's career. The Paris 1900 Exposition universelle marked the high point of Art Nouveau. Between April and November 1900, it attracted nearly fifty million visitors from around the world, and showcased the architecture, design, glassware, furniture and decorative objects of the style. While the Paris Exposition was by far the largest, other expositions did much to popularize the style."
 gaudi.35.g: "A vibrant new culture."

 gaudi.22.t: "Lines and Measures"
 gaudi.22.d: "Our architect returns—this time with a surveyor's rod in hand and new eyes for the land."
 gaudi.22.f: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] was once content to sketch façades in town squares, to trace shadows and ornament. Now [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] draws lines in the earth.\n\nDuring [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] travels, [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] abandoned the cities for the hinterlands. In the wilds of Galicia, in the marshes of the Po Delta, and across the railway cuts of the Midlands, [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] walked with engineers, farmers, and foremen. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] learned to read terrain like others read scripture. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] can tell you where the water will run, where the clay will shift, where a foundation will crack five winters from now.\n\n[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] speaks now of gradients and geodetic points. [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U] notebooks are filled not with flourishes, but with angles, heights, and distances measured to the inch. Some say [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe]'s become dry—too exacting, too rigid. But when [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] looks across an empty field, [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] already sees where the avenues might run."
 gaudi.22.g: "A building begins long before the cornerstone is laid."
 gaudi.23.t: "The Architect Who Counts"
 gaudi.23.d: "After two years of study, our architect returns—[ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] mind sharper, [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] drawings stranger."
 gaudi.23.f: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] once sketched by instinct. Now [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] sketches by logic.\n\n[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] spent [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis]  time not among bricklayers or builders, but in lecture halls. Paris, Göttingen, even St. Petersburg. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] sat beneath chalkboards filled with symbols, studied under men who built nothing with their hands—but everything with their minds. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] speaks now of symmetry, of modulus, of load curves described by elegant formulas.\n\nGone are the sweeping hand-drawn flourishes. [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U] new plans are austere, strange, almost alien in their precision. To some they seem cold, inhuman. But then [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] explains: a dome's beauty is not in its decoration, but in the perfection of its curve.\n\nThe officials are unsure what to do with [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHim]. [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U] colleagues whisper of impracticality. But others—especially the young—are listening."
 gaudi.23.g: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] builds what others only imagine."
 gaudi.24.t: "Paper before Stone"
 gaudi.24.d: "Our architect returns not with tools or equations—but with stamps, signatures, and a network of officials."
 gaudi.24.f: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] no longer struggles at the drawing board. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] now glides through offices.\n\nIn two years abroad, [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] did not merely study architecture—[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] studied administration. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] learned how a project lives or dies not by design, but by decree. In Vienna, [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] observed ministries at work; in Brussels, [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] shadowed permit clerks; in Marseille, [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] attended council meetings in which sewers decided skylines.\n\nNow, back home, [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] knows which documents to submit when, which regulation to cite, whom to flatter and whom to ignore. Rules, [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] says, are not walls but scaffolds—they can be moved, softened, reframed. And somehow, the permits arrive faster than ever."
 gaudi.24.g: "Every great structure begins with a signed form."
 gaudi.25.t: "The Architect Returns… Eventually"
 gaudi.25.d: "Our architect has finally returned from [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] grand tour. No one is quite sure what [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] brings back—except stories."
 gaudi.25.f: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] left with sketchbooks. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] returns with cigarillos and anecdotes. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] has names to drop, opinions to give, and debts [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] pretends not to remember.\n\n[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] speaks beautifully, even convincingly—of structures [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] never measured. When asked for plans, [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] changes the subject. When pressed for results, [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] smiles and assures that brilliance cannot be rushed.\n\nSome say [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe]'s a fraud. Others call [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHim] a genius misunderstood. The truth? Likely somewhere between a café in Trieste and a missed train in Naples."
 gaudi.25.g: "What did [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] do all this time?!"
 gaudi.26.t: "In the Shadow of a Master"
 gaudi.26.d: "Our architect returns—wiser, steadier, and bearing the mark of a great teacher."
 gaudi.26.f: "While others traveled widely, [ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] chose depth over distance. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] spent most of his years under the guidance of a single figure—an aging architect of legendary repute. Not just in lecture halls, but on scaffolds and in silence, [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] learned to see the structure behind the ornament, the intention behind the façade. [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U] lines grew cleaner. [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U] gaze more critical. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] was taught not only how to build—but why. Word of [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] mentorship has spread ahead of [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHim]. Young apprentices already seek [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHim] out, and city officials greet him with unexpected deference. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] returns as someone marked by continuity, by tradition, and perhaps—someday—by legacy."
 gaudi.26.g: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] carries the weight of another man's wisdom"

