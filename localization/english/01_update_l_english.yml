 je_gaudi_custom_monument_blueprint_research: "Architect's Masterwork"
 je_gaudi_custom_monument_blueprint_research_reason: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] enjoys worldwide renown as one of the most important architects of [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] time. To immortalize [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] name, [ROOT.Var('gaudi_architect_var').GetCharacter.GetHeShe] is working on a blueprint for an outstanding monument that will make our nation shine throughout the world as a center of architectural art."

 gaudi.81.t: "Architects Masterwork"
 gaudi.81.d: "In recent years, [THIS.GetCountry.GetName] has risen to become one of the leading nations in the field of architecture. [ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] has played a significant role in this development. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] accepted the commission to design a monument that would rival the great wonders of the ancient, medieval, and modern eras."
 gaudi.81.f: "The Architect's Monument is based on the preferred style of the Great Architect:\n\nArt Deco Architects will design the [GetBuildingType('building_gaudi_people_monument').GetName].\nBauhaus Architects will offer the [GetBuildingType('building_gaudi_forum_monument').GetName].\nNeoclassical Architects will create the [GetBuildingType('building_gaudi_people_palace').GetName]."
 gaudi.81.g: "Magnificient."

 ACHIEVEMENT_gaudi_stalin: "Stalin Is Green With Envy"
 ACHIEVEMENT_DESC_gaudi_stalin: "Own the People's Palace as a council republic with command economy."

 gaudi.82.t: "The Life's Work of an Architect"
 gaudi.82.d: "After months of preparation, [ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] has presented plans, calculations, statistics, and a handcrafted model. [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U] ambitious monument is already considered a dream of architectural art. The only question that remains is who will make this dream come true?"
 gaudi.82.f: "'Tomorrow we will do beautiful things.' -Antoni Gaudí"
 gaudi.82.g: "A monument to ourselves."

