 gaudi.10.t: "Architect improved Reputation"
 gaudi.10.d: "Over the past few years, [ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] has demonstrated [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] expertise in improving and constructing new buildings across the country, significantly increasing [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] reputation and skills."
 gaudi.10.f: "“The mother art is architecture. Without an architecture of our own, we have no soul of our own civilization.” -Frank Lloyd Wright"
 gaudi.10.g: "On to new architectural tasks!"

