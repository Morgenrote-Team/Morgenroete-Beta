### LEPSIUS/ANDERSSON ###

 lepsius.1502_peking_d: "\nAlong with Java Man, Peking Man is believed to be the first Homo Erectus found and reinforced the belief that humanity originally came from Asia. The bones are said to be 400,000 to 780,000 years old." #please replace

 lepsius_state_trait_heidelbergensis_cave: "Prehistoric Cave"

 lepsius.1326.t: "Homo Heidelbergensis completed"
 lepsius.1326.d: "[SCOPE.sCharacter('lepsius_anthropologist_scope').GetFullName] has collected enough bones to draw specific conclusions about the extinct species. Homo Heidelbergensis is no longer a mystery to science and can now be located with a certain degree of certainty in the human family tree, even if there are still many questions unanswered."
 lepsius.1326.f: "The lower jaw of Homo heidelbergensis was discovered in 1907 by the worker Daniel Hartmann in a sand pit near Mauer near Heidelberg and described in 1908 by the anatomist Otto Schoetensack; the approximately 600,000-year-old find is considered the oldest evidence of early humans in Europe, morphologically stands between Homo erectus and Homo sapiens, indicates a wide distribution of this hominid form in Africa, Europe and Asia and, due to its robustness and estimated brain volume, allows conclusions to be drawn about advanced physical adaptation, tool use and social organization."
 
 lepsius.1336.t: "Heidelberg Man"
 lepsius.1336.d: "A worker made a remarkable discovery in a mine in Mauer, a town near Heidelberg. A professor at the University of Heidelberg immediately recognized its value."
 lepsius.1336.f: "The lower jaw of Homo heidelbergensis was discovered in 1907 by the worker Daniel Hartmann in a sand pit near Mauer near Heidelberg and described in 1908 by the anatomist Otto Schoetensack; the approximately 600,000-year-old find is considered the oldest evidence of early humans in Europe, morphologically stands between Homo erectus and Homo sapiens, indicates a wide distribution of this hominid form in Africa, Europe and Asia and, due to its robustness and estimated brain volume, allows conclusions to be drawn about advanced physical adaptation, tool use and social organization."

 lepsius.1501_heidelbergensis_human_fossils: "\n#G [ROOT.Var('lepsius_heidelbergensis_human_fossil').GetValue]#! #E Homo Heidelbergensis Fossils#!."
 lepsius.1501_taxonomy_heidelbergensis: "\n#E Homo Heidelbergensis#! was classified by [SCOPE.sCountry('lepsius_heidelbergensis_systemizer_country').GetName]."
 lepsius.1502_mauer_t: "T Homo Heidelbergensis#! discovered by [SCOPE.sCountry('lepsius_heidelbergensis_finder_country').GetName]"
 lepsius.1502_mauer_d: "\nThe lower jaw of Homo heidelbergensis was discovered near Heidelberg and is considered the oldest evidence of an early human in Europe and marks an important transition between Homo erectus and later hominins."

