 gaudi.511.d: "When it came to beautifying [ROOT.GetCountry.GetCapital.GetCityHubName], there was a disagreement in urban planning."
 gaudi.512.t: "Statues on the Ring Road"
 gaudi.512.d: "A new group of figures is to be erected on [ROOT.GetCountry.GetCapital.GetCityHubName]'s new ring road, but it is unclear which mythological figure will have a special place."
 gaudi.513.f: "A new ministry was to be built as the flagship of government, however constant changes of plan, expansion and latent corruption have meant that construction of the building has dragged on and all funds have been used up to completion. The unfinished building could be brought into a functional state with a few temporary measures, but this is probably not in the interests of the government, which would have to be content with smaller offices and less comfort than expected. Further construction is possible, but it will probably be expensive."

 gaudi.511.t: "Fountain or Pavillon?"
 gaudi.511.f: "One could mistake it for a quarrel about the emperor's beard: a tangible political dispute has developed from a petitesse. It is a construction project on a representative square of high aesthetic value. One faction would like to build a pavilion there to linger, the other advocates the construction of a fountain. Since there is only one plot, only one of the projects can be built; a compromise is unfeasible."
 gaudi.511.g: "We build the pavillon."
 gaudi.511.h: "We build the fountain."
 gaudi.511.i: "I have my own plans for this place..."
 gaudi.512.f: "When planning the ring road, a few details are still unclear. It has not yet been determined which figures are to be placed in a prominent position. It is clear that these should be figures from the Roman pantheon. Certain sections of the population identify with the respective figures - for example, the capitalists have suggested placing Mercury, the god of commerce, in the middle. The aristocrats, on the other hand, insist on Jupiter, the father of the gods. The military prefers Mars, the academics want Apollo at the center."
 gaudi.512.g: "Jupiter."
 gaudi.512.h: "Mercury."
 gaudi.512.i: "Apollo."
 gaudi.512.j: "Mars."
 gaudi.513.t: "Ministry building exceeds cost"
 gaudi.513.d: "The construction of a new ministry building is turning into a minor scandal."
 gaudi.513.g: "There was a budget and this budget must be adhered to."
 gaudi.513.h: "This is unfortunate, but common in this field."
 gaudi.513.i: "This project should get as much money and time as it needs."
 gaudi.514.t: "New Coffee house"
 gaudi.514.d: "A new coffee house has opened on the Ringstrasse."
 gaudi.514.f: "'The coffee house remained our best place of education for everything new. In order to understand this, one must know that the Viennese coffee house is an institution of a special kind that cannot be compared with any similar institution in the world. It is actually a kind of democratic club, accessible to everyone for a cheap cup of coffee, where for this small fee every guest can sit for hours, discuss, write, play cards, receive their mail and, above all, consume an unlimited number of newspapers and magazines. All the Viennese newspapers were available in a better Viennese coffee house, and not just the Viennese ones, but those of the entire German Reich, French, English, Italian, and American, as well as all the important literary and artistic reviews in the world. So we knew everything that was going on in the world first hand, we heard about every book that was published, about every performance, wherever it was taking place, and compared the reviews in all the newspapers. Perhaps nothing contributed so much to the intellectual flexibility and international orientation of the Austrian as the fact that he was able to orientate himself so comprehensively about all events in the world in the coffee house and at the same time discuss them in friendly circles. We sat there for hours every day, and we didn't miss a thing.' - Stefan Zweig"
 gaudi.514.g: "[SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('gaudi_ruler').GetFullName] should visit it."
 gaudi.514.h: "This will raise the standard of living in Vienna."
 gaudi.515.t: "Ring Road Palais"
 gaudi.515.d: "A nobleman overreached himself building a palace in the new city district of [ROOT.GetCountry.GetCapital.GetCityHubName]. The half-finished building ruin threatens to become an eyesore."
 gaudi.515.f: "Ring Road Palace is the term for magnificent palaces on Vienna's Ringstrasse. These buildings were mostly built by the old nobility or by bankers and industrialists in the late 19th century. The palaces were built in a mixture of Neo-Baroque and Neo-Renaissance, or Neo-Mannerism style. They were also a symbol of rise and status. However, one of the builders has recently overstretched and is facing bankruptcy. The people are already scoffing at the eyesore, which in the worst case would have to be demolished again, thus extending the completion of the entire project."
 gaudi.515.g: "We share the costs."
 gaudi.515.h: "That's none of our business."
 gaudi.516.t: "Capital Extension: Good progress"
 gaudi.516.d: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] has stated that the capital extension could be completed earlier."
 gaudi.516.f: "For unknown reasons, everything is progressing faster: may it be love for the fatherland, high wages, friendly support from the local elites or simply the better weather."
 gaudi.516.g: "Marvelous."
 gaudi.517.t: "Capital Extension: Slow progress"
 gaudi.517.d: "Unfortunately, the construction management under [ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] had to admit today that the construction of a new disctrict in [ROOT.GetCountry.GetCapital.GetCityHubName] is behind schedule."
 gaudi.517.f: "For reasons unknown, everything is progressing more slowly: whether it be agitation by hostile political elements, undermining of work ethic by unions, an Illuminati conspiracy, or simply bad weather."
 gaudi.517.g: "Regrettable."
 gaudi.518.t: "Monument to [SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('gaudi_ruler').GetFullName]"
 gaudi.518.d: "A new monument is to be planned for the Ringstrasse: it is a statue of our King [SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle]."
 gaudi.518.f: "The Ringstrasse served to illustrate Austrian history. On the one hand, the long line of monarchs from the Habsburg ruling family was immortalized, of which Maria Theresa received the most opulent monument. But also generals like Eugen von Savoyen or Schwarzberg enriched the Viennese cityscape. The bourgeoisie, meanwhile, attached great importance to immortalising their exponents, namely the poet princes Goethe and Schiller, but also the great composers Schubert, Mozart an Beethoven."
 gaudi.518.g: "It's good to be the [SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle]."
 gaudi.518.h: "Lovely - but focus on completing the Ringstrasse instead."
 gaudi.519.t: "Fire!"
 gaudi.519.d: "A devastating fire destroyed several buildings on a construction site in [ROOT.GetCountry.GetCapital.GetCityHubName]."
 gaudi.519.f: "The best-known catastrophe on the ring road was the Ringtheater fire on December 8, 1881. It is one of the biggest fire catastrophes of the 19th century. Estimates range from hundreds if not more than a thousand victims. The cause was a fault in the gas lighting, which resulted in the gas escaping and exploding the next time it was tried to ignite. The resulting fire spread to the backdrop trains before rapidly spreading to the rest of the stage and eventually the auditorium. The fire had domestic and international effects on preventive fire protection, especially in the theater area and the corresponding legal provisions for theater construction in Austria. The composer Anton Bruckner, who had tickets for the evening's performance, only escaped death by staying at home because he was unwell."
 gaudi.519.g: "A terrible day."
 gaudi.520.t: "Prejudices against the City Expansion"
 gaudi.520.d: "The representatives of the rural population see the development of [ROOT.GetCountry.GetCapital.GetCityHubName] as a disadvantage for the common rural population."
 gaudi.520.f: "'The government makes it clear with its unspeakable swagger in the capital that it consists of aloof city dwellers who only think a few streets away and have never left [ROOT.GetCountry.GetCapital.GetCityHubName]. Enormous sums are squandered there, which only come to the capital, but which the common country people in the small towns or villages don't notice anything about. The ideology behind it favors centralism, favors bureaucracy, favors and assists the state apparatus; but what perspective does such a decadent project offer to the common man?'"
 gaudi.520.g: "How about a friendly gift for the benefit of the hard-working rural population?"
 gaudi.520.h: "City and province are equal."
 gaudi.520.i: "Who cares about this stupid farmer's talk?"
 gaudi.521.t: "Industrialist Residence"
 gaudi.521.d: "A wealthy businessman had a new palace built and thus enriched [ROOT.GetCountry.GetCapital.GetCityHubName] with a great building."
 gaudi.521.f: "Palaces of industrialists and bankers were seen as a way of emphasizing their new position in the state. It was also possible for the wealthy of Jewish origin to emphasize their emancipation. Vienna's development in the 19th cnetury is a good example for this. One of the most famous ring road palaces is the Palais Epstein. It was built for the industrialist and banker Gustav Ritter von Epstein. The architect was Theophil Freiherr von Hansen, who also designed the adjacent Austrian Parliament Building. It is up to five storeys high and built in the neo-renaissance style typical of its time."
 gaudi.521.g: "[ROOT.GetCountry.GetCapital.GetCityHubName] is growing and thriving."
 gaudi.522.t: "Extending the Barracks"
 gaudi.522.d: "The expansion of [ROOT.GetCountry.GetCapital.GetCityHubName] offers the opportunity to modernize and expand the barracks."
 gaudi.522.f: "The Franz-Josephs-Barracks was a Viennese barracks building in today's Ringstrasse area and for a long time an obstacle to the construction of the large-scale project. The barracks were named after Emperor Franz Joseph I and built in 1854-1857 in the wake of the 1848 revolution. Shortly after its construction, the barracks stood in the way of the development of the Vienna Ringstrasse, which began in 1857, but it took four decades for the army to move out of here again. New barracks therefore had to be erected beforehand in order to absorb the loss of the Franz Joseph barracks."
 gaudi.522.g: "Expand the barracks."
 gaudi.522.h: "Let's better invest the time elsewhere."
 gaudi.523.t: "Extending the Construction sector"
 gaudi.523.d: "The expansion of [ROOT.GetCountry.GetCapital.GetCityHubName] offers the opportunity to expand the construction sector. "
 gaudi.523.f: "'We generally call artist nature the sum of qualities that prevent the artist from producing.' - Arthur Schnitzler"
 gaudi.523.g: "Expand the construction office."
 gaudi.524.t: "A wonderful park"
 gaudi.524.d: "[ROOT.GetCountry.GetCapital.GetCityHubName]'s new park is complete and is now open to all citizens for walks."
 gaudi.524.f: "The gates of the new Stadtpark swing open. Lawns roll like velvet. Paths curve between flowerbeds and statues. But what draws the crowds most is not the grass—it's the sound. A bandstand, a small orchestra, a waltz drifting on the breeze. Public music, once reserved for salons and palaces, now fills the air for all to hear. In cities like Vienna, the Kursalon had become a civic temple of melody. The magnificent building in the style of the Italian Renaissance is located on Johannesgasse and has a wide terrace in the park. At the time of the Strauss brothers, the Kursalon was a popular place for dancing and concerts."
 gaudi.524.g: "Let's have a walk."
 gaudi.524.h: "Let's celebrate with a concert!"
 gaudi.525.t: "Extending the Opera"
 gaudi.525.d: "The expansion of [ROOT.GetCountry.GetCapital.GetCityHubName] offers the opportunity to modernize and expand the opera."
 gaudi.525.f: "In the midst of boulevards and arcades, fountains and ministries, the existing opera house begins to feel modest, even provincial. The proposal: a new structure, or a vast expansion. More seats, better acoustics, monumental façades. A temple of culture to match the city's stature. Across Europe, such gestures have become symbols of national prestige. In Paris, the Opéra Garnier rises with marble staircases and golden ceilings. In Vienna, the Staatsoper, opened in 1869, anchors the Ringstraße with elegance and pride."
 gaudi.525.g: "Expand the opera house."
 gaudi.526.t: "Extending the Town Hall"
 gaudi.526.d: "The expansion of [ROOT.GetCountry.GetCapital.GetCityHubName] offers the opportunity to modernize and expand the Town Hall."
 gaudi.526.f: "The old town hall still bears the coat of arms from another century. Inside: narrow stairs, overcrowded offices, and ledgers piled higher than the wainscoting. The mayor's desk is barely large enough for his paperwork, let alone for power. Now the proposal: a new Town Hall, one that reflects the city's expanding role in governance, economy, and civic identity. Towering spires or restrained classicism—either way, it must signal authority. Across Europe, cities have risen to this challenge. In Vienna, the neo-Gothic Rathaus (completed in 1883) became a symbol of municipal confidence. Paris restored its Hôtel de Ville after 1871 with grandeur and defiance. Berlin's Rotes Rathaus emerged as a fusion of Renaissance form and Prussian function."
 gaudi.526.g: "Expand the town hall."
 gaudi.527.t: "Heldenplatz"
 gaudi.527.d: "After the completion of the Heldenplatz (Heroes' Square), some leading political figures are pushing for a befitting inauguration."
 gaudi.527.f: "When the Ringstrasse was built, the 'outer Burgplatz' was designed under Emperor Franz Joseph as part of the Kaiserforum, which was never completed. The plan was to create a rectangular square that would be framed by the Leopoldine Wing, the New Hofburg, the Habsburg Collections and by a counterpart of the New Castle that was never built on the site of the Volksgarten. The name Heldenplatz was fixed in 1878; it comes from the two equestrian monuments, both of which are by Anton Dominik Fernkorn. The older one is Archduke Karl's, which was unveiled in 1860. The counterpart, the equestrian statue of Prince Eugene, was also completed in 1865. After the loss of World War I, the collapse of the Austro-Hungarian dual monarchy under the rule of the Habsburg-Lorraine dynasty and the founding of the first Austrian republic, Heldenplatz served as a rallying point for all political camps and as a parade ground for the Austrian army."
 gaudi.527.g: "Hold a parade and invite our friends."
 gaudi.527.h: "Establish a permanent military parade for the next few years."
 gaudi.527.i: "And who should pay for all this?"
 gaudi.528.t: "Extending the University"
 gaudi.528.d: "The expansion of [ROOT.GetCountry.GetCapital.GetCityHubName] offers the opportunity to modernize and expand the university."
 gaudi.528.f: "What is a great city without thought? Amid the rail lines, ministries, and theaters, the university begins to strain under its own success. Too many students for too few halls. Departments spread across rented buildings. Professors jostling for space between libraries and laboratories. The proposal is clear: a new campus or major expansion—modern lecture halls, dedicated faculties, a monumental library. Such projects are more than infrastructure; they are declarations of intellectual ambition. In Vienna, the university was relocated and rebuilt in the 1870s along the Ringstraße, with a grand façade and symbolic centrality. In Paris, the Sorbonne was thoroughly expanded under Jules Ferry's reforms to accommodate France's growing academic class."
 gaudi.528.g: "Expand the university."
 gaudi.529.t: "Extending the Art Academy"
 gaudi.529.d: "The expansion of [ROOT.GetCountry.GetCapital.GetCityHubName] offers the opportunity to modernize and expand the art academy."
 gaudi.529.f: "As the city grows, so does its appetite for art. Yet painters and sculptors crowd small studios and dim attics, learning not from masters but from rumor and borrowed sketches. The proposal: a proper art academy, with light-filled ateliers, anatomical theaters, and galleries open to public exhibitions. Across Europe, such academies shape national taste. The École des Beaux-Arts in Paris sets classical standards for half a continent. In Vienna, the grand building of the Akademie der bildenden Künste anchors the cultural prestige of the Ringstraße."
 gaudi.529.g: "Expand the academy."
 gaudi.530.t: "Urania"
 gaudi.530.d: "With the Urania, a so-called 'people's education center' has opened in Vienna, the exact purpose of which is still disputed."
 gaudi.530.f: "In 1883 the German astronomer Max Wilhelm Meyer came to Vienna to calculate historical and future solar eclipses as an assistant at the University of Vienna. He also gave folklore lectures and developed the idea of a folk-educational institution. However, since he was called to Berlin in 1885, he continued to develop his ideas there. The Urania in Vienna was modeled on the Urania in Berlin: it had space for 800 people and contained a lecture hall for 200 people, rooms for scientific demonstrations and an observatory. However, this 'temporary' Urania could hardly cope with the influx of visitors, so that a new building on Ringstrasse soon became necessary. The Urania not only expanded its range of educational opportunities (e.g. through language courses), but also became a venue for concerts, with its own Urania symphony orchestra and Urania choir. The unconventional shape and construction caused the usual scandal in Vienna. The Viennese liked the building, however, and the Urania soon established itself as one of Vienna's landmarks."
 gaudi.530.g: "It is an architectural landmark."
 gaudi.530.h: "It is primarily an entertainment establishment."
 gaudi.530.i: "First and foremost this is an observatory."

 gaudi.9.t: "Urban Planning finished"
 gaudi.9.d: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] completed [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] urban planning work in an important provincial town today. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] is now fully available again."
 gaudi.9.f: "'Architecture does not reach its highest estate until it is so infused with imagination and fancy - not undisciplined imagination or capricious fancy - that the ordered fabric delights the eye of every intelligent observer and excites emotions like a poem.' -Henry van Brunt"
 gaudi.9.g: "So many projects, so little time."

 gaudi_architecture_treatise_modifier: "Architecture Treatise"

 gaudi.8.t: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetLastName]'s Treatise on Architecture"
 gaudi.8.d: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] has completed [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] work. [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U] treatise on historical and contemporary architecture, enriched with [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] theoretical reflections, will influence future generations of architects."
 gaudi.8.f: "'Architecture has recorded the great ideas of the human race. Not only every religious symbol, but every human thought has its page in that vast book.' -Victor Hugo"
 gaudi.8.g: "A work for posterity."

 je_gaudi_architecture_treatise: "Architecture Treatise"
 je_gaudi_architecture_treatise_reason: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] withdrew completely for a year to compile [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] previous knowledge of architectural art into a book. It is intended to be a manifesto of [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] life, summarizing all [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] experiences and theories on architecture. [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U] reputation plays a decisive role in determining the value of the work. However, character traits such as $literary$, $erudite$, $innovative$, and $aesthete$ are also valuable."
