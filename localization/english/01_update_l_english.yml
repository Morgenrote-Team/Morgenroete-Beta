 MR_MOUNTAIN_EXPEDITION_LEVEL_1_BUTTON: "Mountaineering Expedition: Level 1 Summits"
 MR_MOUNTAIN_EXPEDITION_LEVEL_1_BUTTON_TT: "#T Mountaineering Expedition: Level 1 Summits#!\nThis category of mountains can be climbed with Level 1 mountaineering equipment. The level does not indicate the altitude or risk. These peaks include: Mount Whitney, Citlaltépetl, Popocatépetl, Chimborazo, Pico Aneto, Mont Blanc, Großvenediger, Mount Cameroon, Ras Dashen, and Mount Giluwe. For more information, have a look at the [concept_douglas_mountain_summit_list].\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAIN_EXPEDITION_LEVEL_2_BUTTON: "Mountaineering Expedition: Level 2 Summits"
 MR_MOUNTAIN_EXPEDITION_LEVEL_2_BUTTON_TT: "#T Mountaineering Expedition: Level 2 Summits#!\nThis category of mountains can be climbed with Level 2 mountaineering equipment. The level does not indicate the altitude or risk. These peaks include: Kibo (Kilimanjaro), Dufourspitze, Mount Cook, and Mount Wilhelm. For more information, have a look at the [concept_douglas_mountain_summit_list].\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAIN_EXPEDITION_LEVEL_3_BUTTON: "Mountaineering Expedition: Level 3 Summits"
