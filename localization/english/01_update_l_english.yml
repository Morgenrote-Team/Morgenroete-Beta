 ### MR Concepts ###

 concept_gaudi_architectural_splendour: "Architectural Splendour" #please replace
 concept_gaudi_architectural_splendour_desc: "Architectural Splendour is a collective term for the spectacular advances in modern architecture, referring primarily to Art Deco, Bauhaus, and Neoclassicism as they emerged in the early 20th century. The value represents the transformation of outdated forms into a future-ready architecture. Art Deco requires reaching a higher threshold to fulfill the dream of an Art Deco city — yet the benefits are greater." #please replace

 concept_elgar_architecture_desc: "#b Architecture#! is one of the main features of [concept_morgenroete].\n\nMany Nations received new #b Monuments#!: the #b Cologne Cathedral#! in Germany, the #b Gotthardbahn#! in Switzerland, the #b Cristo Redentor#! in Brazil, the #b Mole Antonelliana#! in Italy, the #b Vienna Ringstrasse#! in Austria, the #b Summer Palace#! in China, the #b Sagrada Família#! in Spain, the #b Schloss Neuschwanstein#! in Bavaria, the #b Palacio de Bellas Artes#! in Mexico and the #b Gyeongbokgung Palace#! in Korea.\nAll Buildings except for the #b Summer Palace#!, the #b Saxon Palace#! and the #b Campanile#! need to be constructed by their owner, the #b Saxon Palace#! can be reactivated by a Polish nation.\nThere are Journal Entries and Events that guide you through the construction process.\nFor nations that researched #b Art Déco#! there is even more content as they can start the transformation of their cities to achieve a [concept_gaudi_architectural_splendour]" #Updated loc please replace!

 concept_gaudi_great_architect: "#PURPLE #b Great Architect#!#!"
 concept_gaudi_great_architects: "#PURPLE #b Great Architects#!#!" #You can use this for plural: [Concept('concept_gaudi_great_architect','$concept_gaudi_great_architects$')]
 concept_gaudi_great_architect_desc: "#b Great Architects#! are [Concept('concept_gaudi_architect','$concept_gaudi_architects$')] that are considered to be the most important minds in their field. #b Architects#! reaching 500 [concept_artists_experience] will become #b Great Architects#!. Should an artist achieve this special rank, he or she can design the blueprint for a truly outstanding monument that embodies the spirit of the nation."
