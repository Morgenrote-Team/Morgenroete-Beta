 gaudi.16.d: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] has completed his work on the blueprint today and handed it over to the client."
 gaudi.16.f: "'Ornamentation is wasted labor and, therefore, wasted health. Today, it also means wasted material, and both mean wasted capital. Modern man, man with modern nerves, has no need for ornamentation; he abhors it.' -Adolf Loos"
 gaudi.16.g: "A new building!"

