l_english:

 matsuura.101.t: "A young man wants to travel to Ezo"
 matsuura.101.d: "[SCOPE.sCharacter('character_1_scope').GetFullName] is a young man who wants to travel to Ezo in the North. However the Matsumae Domain has restricted travel. Should the young man be allowed to adventure to islands in the north?"
 matsuura.101.f: "\"I want to travel everywhere! Ezo, Morokoshi, Tenjiku! Please let me see the wonders of the world!\""
 matsuura.101.g: "He could study the landscape there!"
 matsuura.101.h: "I heard he is a poet, maybe he will be inspired by his travels?"
 matsuura.101.i: "Maybe he could create paintings of the region?"
 matsuura.101.j: "No one is allowed to leave."

 matsuura_allowed_travels_modifier: "Allowed Travel to Ezo"