 je_ito_botanical_expedition: "Botanical Expedition"
 je_ito_botanical_expedition_reason: "Your [concept_dubois_naturalist] is currently on a [concept_dubois_botanical_expedition] to gather new [Concept('concept_dubois_specimen','$concept_dubois_specimens$')].\n$mr_divider_for_je$\nThe expedition will yield [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] each month and has a chance of events that will add additional [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] or even special plants.\n$mr_divider_for_je$\nCurrent yield of the Expedition: @dubois_specimen! [GetPlayer.MakeScope.Var('ito_total_specimen_current_botanical_expedition_var').GetValue|*V0] [Concept('concept_dubois_specimen','$concept_dubois_specimens$')]\nEstimated monthly yield: @dubois_specimen! [GetPlayer.MakeScope.Var('ito_estimated_specimen_on_botanical_expedition_var').GetValue|=+0] [Concept('concept_dubois_specimen','$concept_dubois_specimens$')]"
 je_ito_botanical_expedition_goal_tt: "The progress bar has reached #V 24#!."

 ito_botanical_expedition_progress_bar: "Expedition Progress"
 ito_botanical_expedition_progress_bar_desc: "Expedition Progress: #v [JournalEntry.GetCurrentBarProgress(ScriptedProgressBar.Self)|%]#! ([JournalEntry.GetCurrentBarValue(ScriptedProgressBar.Self)|1]/24)"
