 verrier_astronomer_achievements_no_astronomer_loc: "The #V Achievements of your [concept_verrier_astronomer]#! will be displayed here, once you have one."

 verrier_astronomer_achievements_intro_loc: "#V Achievements of your Astronomer#![Scope.GetCharacter.GetFullName] is an accomplished astronomer who discovered [Scope.Var('verrier_astronomer_total_objects_var').GetValue|0V] [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]."
 verrier_astronomer_achievement_measured_distance_cygni_loc: "\nBy measuring the #V Distance from 61 Cygni at 11.4 light-years#!, [Scope.GetCharacter.GetLastNameNoFormatting] succeeded in showing in one swoop that the universe was much larger than previously thought."
 verrier_astronomer_achievement_helium_discovered_loc: "\nOne of [Scope.GetCharacter.GetHerHis] greatest achievements is the #V Discovery of the Element Helium#! while studying the electromagnetic spectrum of the sun."
 verrier_astronomer_uranus_discoverer_loc: "\nNo one expected a new planet to be discovered, but Professor [Scope.GetCharacter.GetLastName] #V discovered the planet Uranus#!. This discovery lead to the search for more planets in our solar system."
 verrier_astronomer_ceres_discoverer_loc: "\nMany astronomers searched for the planet between Mars and Jupiter. But Dr. [Scope.GetCharacter.GetLastName] was the one who #V found Ceres#!."
 verrier_astronomer_pallas_discoverer_loc: "\nDr. [Scope.GetCharacter.GetLastName] #V found the Planet Pallas#! in the region between Mars and Jupiter."
 verrier_astronomer_vesta_discoverer_loc: "\nProfessor [Scope.GetCharacter.GetLastName] #V found the Planet Vesta#! in the region between Mars and Jupiter."
 verrier_astronomer_juno_discoverer_loc: "\n[Scope.GetCharacter.GetSheHe|U] #V found the Planet Juno#! in the region between Mars and Jupiter."
 verrier_astronomer_pluto_discoverer_loc: "\nAlthough it was disputed whether #V Pluto#! even existed, Professor [Scope.GetCharacter.GetLastNameNoFormatting] actually #V discovered#! the tiny planet. A great astronomical achievement!"
 verrier_astronomer_1843_comet_discoverer_loc: "\nIn #V 1843#! [Scope.GetCharacter.GetSheHe] was the first to #V find the Great Comet#! that was therefore named after [Scope.GetCharacter.GetLastNameNoFormatting]."
 verrier_astronomer_1858_comet_discoverer_loc: "\nWhen the #V Great Comet of 1858#! passed by the Earth, Dr. [Scope.GetCharacter.GetLastNameNoFormatting] was the first to see the comet. As a result, the comet was named after [Scope.GetCharacter.GetHerHim]."
 verrier_astronomer_1861_comet_discoverer_loc: "\nAs the first to discover the #V Great Comet of 1861#! in the darkness of the night sky, Professor [Scope.GetCharacter.GetLastNameNoFormatting] became the namesake of the celestial object."
 verrier_astronomer_1874_comet_discoverer_loc: "\nWhen the #V Great Comet of 1874#! first appeared, it was Dr. [Scope.GetCharacter.GetLastNameNoFormatting] who noticed it first. Now the comet will bear [Scope.GetCharacter.GetHerHis] name for all time."
 verrier_astronomer_1882_comet_discoverer_loc: "\nThe year #V 1882#! was spectacular from an astronomical point of view. Professor [Scope.GetCharacter.GetLastNameNoFormatting] discovered a #V Great Comet#! on its flyby of the Earth. An incredible spectacle."
 verrier_astronomer_finished_pacific_expedition_loc: "\nWhile on a #V Pacific Expedition#!, Dr. [Scope.GetCharacter.GetLastNameNoFormatting] found various new #V Astronomical Objects#! in the southern hemisphere."
 verrier_astronomer_observed_venus_transit_loc: "\nIn the year of #V 1874#!, Professor [Scope.GetCharacter.GetLastNameNoFormatting] observed the #V Venus Transit#! in the Pacific Ocean. Usually a once in a lifetime event."
 verrier_astronomer_observed_carrington_event_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] observed the #V Massive Solar Flare#! in [Scope.GetVariable('verrier_astronomer_observed_carrington_event_var').GetValue]."
 verrier_astronomer_observed_corona_loc: "\nDiscovered the #V [Scope.GetCharacter.GetLastNameNoFormatting]'s Beads#!, which wer named after [Scope.GetCharacter.GetHerHim]."
 verrier_astronomer_sun_photo_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] is the Author of the #V first photo of a solar eclipse.#!"
 verrier_deimos_discoverer_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] #V discovered Mars's natural satellite Deimos#!."
 verrier_phobos_discoverer_loc: "\n[Scope.GetCharacter.GetSheHe|U] #V discovered Mars's natural satellite Phobos#!."
 verrier_amalthea_discoverer_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] #V discovered Jupiter's natural satellite Amalthea#!."
 verrier_himalia_discoverer_loc: "\n[Scope.GetCharacter.GetSheHe|U] #V discovered Jupiter's natural satellite Himalia#!."
 verrier_elara_discoverer_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] #V discovered Jupiter's natural satellite Elara#!."
 verrier_pasiphae_discoverer_loc: "\n[Scope.GetCharacter.GetSheHe|U] #V discovered Jupiter's natural satellite Pasiphae#!."
 verrier_sinope_discoverer_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] #V discovered Jupiter's natural satellite Sinope#!."
 verrier_lysithea_discoverer_loc: "\n[Scope.GetCharacter.GetSheHe|U] #V discovered Jupiter's natural satellite Lysithea#!."
 verrier_carme_discoverer_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] #V discovered Jupiter's natural satellite Carme#!."
 verrier_enceladus_discoverer_loc: "\n[Scope.GetCharacter.GetSheHe|U] #V discovered Saturn's natural satellite Enceladus#!."
 verrier_mimas_discoverer_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] #V discovered Saturn's natural satellite Mimas#!."
 verrier_hyperion_discoverer_loc: "\n[Scope.GetCharacter.GetSheHe|U] #V discovered Saturn's natural satellite Hyperion#!."
 verrier_phoebe_discoverer_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] #V discovered Saturn's natural satellite Phoebe#!."
 verrier_titania_discoverer_loc: "\n[Scope.GetCharacter.GetSheHe|U] #V discovered Uranus's natural satellite Titania#!."
 verrier_oberon_discoverer_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] #V discovered Uranus's natural satellite Oberon#!."
