 ### 2.4.3 ###

 MR_STANDARD_TIME_BUTTON: "Introduce Standard Time"
 MR_STANDARD_TIME_BUTTON_TT: "#T Introduece Standard Time#!\nWith the increasing importance of minutes and hours in a world that no longer beats to the beat of bell towers but of station clocks, it has become an important concern to standardize time across the country with a standard time.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"

 MR_PRIME_MERIDIAN_BUTTON: "The Prime Meridian"
 MR_PRIME_MERIDIAN_BUTTON_TT: "#T The Prime Meridian#!\nWith the increasing introduction of national standard times, a new problem has arisen: the search for a prime meridian that could serve as a reference point for international time zones.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_3_GREAT_POWERS_HAVE_STANDARD_TIME_TRIGGER_TT: "#default_text At least #V 3 Great Powers#! have introduced a standard time.#!"
 MR_20_COUNTRIES_HAVE_STANDARD_TIME_TRIGGER_TT: "#default_text At least #V 20 Countries#! have introduced a standard time.#!"