l_english:

 MR_BIOLOGIST_MICROORGANISM_RESEARCH_BUTTON: "Microorganism Research"
 MR_BIOLOGIST_MICROORGANISM_RESEARCH_BUTTON_TT: "#T Microorganism Research#!\nThe search for new [Concept('concept_theiler_microorganism','$concept_theiler_microorganisms$')], their study, and the associated experiments are an essential part of microbiological work. Biologists can not only conduct preliminary work for the search for a pathogen but also make serendipitous discoveries.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"

 MR_BIOLOGIST_FIND_PATHOGEN_BUTTON: "Find Pathogen"
 MR_BIOLOGIST_FIND_PATHOGEN_BUTTON_TT: "#T Find Pathogen#!\nThe search for a [concept_theiler_pathogen] is a prerequisite for the subsequent development of a vaccine. Depending on the pathogen, the discovery process may take longer or only begin under certain conditions.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ACTIVE_BIOLOGIST_TRIGGER: "#default_text [GetPlayer.GetName] has a [concept_theiler_biologist] who is #V not busy#!.#!"
 MR_ACHROMATIC_MICROSCOPE_TRIGGER: "#default_text [GetPlayer.GetName] uses at least an #V Achromatic Microscope#!.#!"
 MR_BIOLOGIST_CAN_FIND_PATHOGEN_TRIGGER_TT: "#default_text [GetPlayer.GetName] has described a disease for which there is still no pathogen and has also an advanced microscope to find it (achromatic miscroscope for bacterium, electron microscope for virus). The smaller the pathogen, the more microorganisms must be known before the search can begin. For example, to find the cholera pathogen (the pathogen with the lowest hurdle), at least 1,000 microorganisms must be known beforehand.#!"

 MR_BIOLOGIST_CREATE_VACCINE_BUTTON: "Create Vaccine"
 MR_BIOLOGIST_CREATE_VACCINE_BUTTON_TT: "#T Create Vaccine#!\nVaccine development is a biologist's pinnacle. It requires first research into the [concept_theiler_pathogen] that causes the disease. Under certain circumstances, [Concept('concept_theiler_vaccine','$concept_theiler_vaccines$')] can completely prevent the outbreak of disease.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BIOLOGIST_CAN_CREATE_VACCINE_TRIGGER_TT: "#default_text [GetPlayer.GetName] has discovered a pathogen for which there is still no vaccine and also has the corresponding technology.#!"
 MR_10000_SPECIMEN_TRIGGER_TT: "#default_text [GetPlayer.GetName] has #V 10000 or more#! [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] (currently [GetPlayer.MakeScope.Var('dubois_specimen').GetValue|0+]).#!"

 MR_BIOLOGIST_COCHLIOMYIA_EREDICATION_BUTTON: "Cochliomyia Eredication"
 MR_BIOLOGIST_COCHLIOMYIA_EREDICATION_BUTTON_TT: "#T Cochliomyia Eredication#!\nThe screwworm fly is one of the worst pests for animals and humans in the New World. It destroys the potential for livestock farming on a wide scale. With the most modern technologies, a biologist could find a solution for this cursed parasite.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_COCHLIOMYIA_STATE_TRIGGER: "#default_text [GetPlayer.GetName] has at least one state with the #V $theiler_state_trait_cochliomyia$#!.#!"