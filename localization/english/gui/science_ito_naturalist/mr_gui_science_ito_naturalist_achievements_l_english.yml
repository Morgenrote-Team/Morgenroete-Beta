l_english:

 MR_NATURALIST_ACHIEVEMENTS_TT: "[AddLocalizationIf( Scope.IsSet , 'ito_naturalist_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'ito_naturalist_no_naturalist_loc')]"

 ito_naturalist_achievements_loc: "$ito_naturalist_achievements_intro_loc$[Scope.GetCharacter.GetCustom('ito_naturalist_achievement_total_zoo_animals_type')][Scope.GetCharacter.GetCustom('ito_naturalist_achievement_total_wildlife_documentaries_type')][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_invented_evolution_theory_var').IsSet , Scope.Var('ito_naturalist_achievement_invented_evolution_theory_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_attended_hippocampus_congress_var').IsSet , Scope.Var('ito_naturalist_achievement_attended_hippocampus_congress_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_showed_evolution_in_peppered_moths_var').IsSet , Scope.Var('ito_naturalist_achievement_showed_evolution_in_peppered_moths_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_finished_pacific_expedition_var').IsSet , Scope.Var('ito_naturalist_achievement_finished_pacific_expedition_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_wallace_line_discovered_var').IsSet , Scope.Var('ito_naturalist_achievement_wallace_line_discovered_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_inaugurated_zoo_var').IsSet , Scope.Var('ito_naturalist_achievement_inaugurated_zoo_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_found_victoria_amazonica_var').IsSet , Scope.Var('ito_naturalist_achievement_found_victoria_amazonica_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_found_attacus_atlas_var').IsSet , Scope.Var('ito_naturalist_achievement_found_attacus_atlas_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_found_amorphophallus_titanum_var').IsSet , Scope.Var('ito_naturalist_achievement_found_amorphophallus_titanum_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_found_goliathus_var').IsSet , Scope.Var('ito_naturalist_achievement_found_goliathus_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_natualist_achievement_forestry_improvement_finished_var').IsSet , Scope.Var('ito_natualist_achievement_forestry_improvement_finished_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_rubber_improvement_finished_var').IsSet , Scope.Var('ito_naturalist_achievement_rubber_improvement_finished_var').GetFlagName)]"
 ito_naturalist_no_naturalist_loc: "The #V Achievements of this [concept_dubois_naturalist]#! will be displayed here, once you have one."
 ito_naturalist_achievements_intro_loc: "#V Achievements of thisNaturalist#!\n[Scope.GetCharacter.GetFullName] is an accomplished naturalist who collected [Scope.Var('dubois_naturalist_total_specimens_var').GetValue|0*V] [Concept('concept_dubois_specimen','$concept_dubois_specimens$')]."

 ito_naturalist_achievement_total_zoo_animals_loc: "\nDuring [Scope.GetCharacter.GetHerHis] tenure as a naturalist, a total of [Scope.GetVariable('ito_naturalist_total_zoo_animals_var').GetValue|0+] [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] were captured and brought to [GetPlayer.MakeScope.GetCountry.GetName]."
 ito_naturalist_achievement_total_wildlife_documentaries_loc: "\n[GetPlayer.MakeScope.Var('dubois_naturalist_var').GetCharacter.GetFullName] is well known for documenting [GetPlayer.MakeScope.Var('dubois_naturalist_var').GetVariable('ito_character_num_animal_documentations_var').GetValue|0+] [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] in their natural habitat."
 ito_naturalist_achievement_invented_evolution_theory_loc: "\nOne of [Scope.GetCharacter.GetHerHis] greatest achievements was the book \"#V On the Origin of Species#!\", which described the theory of evolution for the first time."
 ito_naturalist_achievement_attended_hippocampus_congress_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] participated in the debate that determined whether the human was unique or just an animal like all the others."
 ito_naturalist_achievement_showed_evolution_in_peppered_moths_loc: "\nProfessor [Scope.GetCharacter.GetLastNameNoFormatting] showed that the #V Peppered Moth evolves#! to adapt to it's changing environment. A proof for the Theory of Evolution."
 ito_naturalist_achievement_finished_pacific_expedition_loc: "\nOn an #V Expedition to the Pacific Ocean#!, Dr. [Scope.GetCharacter.GetLastNameNoFormatting] extensively explored the flora and fauna of this wonderland. [Scope.GetCharacter.GetSheHe] discovered many new species."
 ito_naturalist_achievement_wallace_line_discovered_loc: "\nWhile travelling in the Pacific [Scope.GetCharacter.GetLastNameNoFormatting] noticed a #V Clear Separation between the Asian and the Australian Flora and Fauna#!. This finding supports the theory of evolution and suggests a massive separation of the islands in the past."
 ito_naturalist_achievement_inaugurated_zoo_loc: "\n[Scope.GetCharacter.GetLastNameNoFormatting] was instrumental in the #V Opening of the Zoo#!. A place where animals from faraway places can be seen up close."
 ito_naturalist_achievement_found_victoria_amazonica_loc: "\nOn a Botanical Expedition to the Amazon rainforest, Professor [Scope.GetCharacter.GetLastNameNoFormatting] found a #V Giant Waterlily#!. A unique plant that can grow leaves with a diameter of up to 3 meters."
 ito_naturalist_achievement_found_attacus_atlas_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] found a #V Titanic Moth#! during a Botamical Expedition in Indochina. It is one of the biggest butterflies of the world and produces a very robust silk."
 ito_naturalist_achievement_found_amorphophallus_titanum_loc: "\nWhile exploring Borneo during a Botanical Expedition, Professor [Scope.GetCharacter.GetLastNameNoFormatting] found a #V Huge Flower#! that grows up to 3 meters high. A true botanical miracle."
 ito_naturalist_achievement_found_goliathus_loc: "\nThe Congo rainfrests house many wonders. One of them was discovered by Dr. [Scope.GetCharacter.GetLastNameNoFormatting] on a Botanical Expedition. The #V Goliath Beetle#! is one of the biggest insects in the world and apparently quite rare."
 ito_natualist_achievement_forestry_improvement_finished_loc: "\nProfessor [Scope.GetCharacter.GetLastNameNoFormatting] is well known for [Scope.GetCharacter.GetHerHis] work on forests and how to improve forestry."
 ito_naturalist_achievement_rubber_improvement_finished_loc: "\n[Scope.GetCharacter.GetHerHis|U] work in rubber plantations and experiments with the best growing conditions allowed our country to improve the production of rubber massively."