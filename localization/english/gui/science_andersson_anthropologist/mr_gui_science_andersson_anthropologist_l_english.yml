l_english:

 MR_ACTIVE_ANTHROPOLOGIST_TRIGGER_TT: "#default_text [GetPlayer.GetName] has an [concept_andersson_anthropologist] who is #V not busy#!.#!"
 MR_HAS_ANTHROPOLOGIST_TRIGGER_TT: "#default_text [GetPlayer.GetName] has an [concept_andersson_anthropologist].#!"
 MR_AANTHROPOLOGY_10_COUNTRIES_WITH_ANTHROPOLOGIST_TRIGGER_TT: "#default_text 10 or more countries have an [concept_andersson_anthropologist].#!"

 MR_ANTHROPOLOGIST_SPEOLOGY_BUTTON_TT: ""

 MR_EXAMINE_CAVE_BUTTON_BUTTON_TT: "#T Examine Cave#!\nWith the help of an [concept_andersson_anthropologist], the previously known [Concept('concept_lepsius_cave','$concept_lepsius_caves$')] on national territory can be explored. [Concept('concept_andersson_human_fossil','$concept_lepsius_human_bones$')] and prehistoric artifacts can be recovered.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_EXAMINE_CAVE_HAS_CAVE_TRIGGER_TT: "#default_text [GetPlayer.GetName] has a [concept_lepsius_cave].#!"

 MR_RECALL_ANTHROPOLOGIST_BUTTON_TT: "#T Recall Anthropologist#!\nSometimes circumstances may require you to end a cave exploration prematurely. The [concept_andersson_anthropologist] is then available before the deadline expires, but does not bring any yield with him.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"

 MR_ORIGIN_CONGRESS_BUTTON: "Congress on Human Origin"
 MR_ORIGIN_CONGRESS_BUTTON_TT: "#T Congress on the Origin of Modern Humans#!\nWith the discovery of prehistoric human bones, the question of man's original origin also arose. While Darwin assumed an African origin, others postulated several parallel developments. From the turn of the century onwards, the dominant view was that modern humans developed in Asia.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"

 MR_ORIGIN_CONGRESS_HUMAN_FOSSIL_TT: "#default_text [GetPlayer.GetName] has at least #V 10#! @lepsius_human_fossil! [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')].#!"
 MR_ORIGIN_CONGRESS_SPECIAL_HUMAN_FOSSIL_TT: "#default_text [GetPlayer.GetName] has at least #V 3#! @lepsius_human_fossil! [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')] from one of these species: #V Homo Neanderthalensis, Homo Erectus, Australopithecus or Paranthropus#!.#!"
 MR_ORIGIN_CONGRESS_GLOBAL_HUMAN_FOSSIL_TT: "#default_text At least #V 50#! @lepsius_human_fossil! [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')] were found worldwide (currently [GetGlobalVariable('dubois_global_human_fossil').GetValue|+0] @lepsius_human_fossil! were found).#!"

 MR_FOSSIL_IDENTIFICATION_BUTTON: "Identify Fossils"

 MR_FOSSIL_IDENTIFICATION_BUTTON_TT: "#T Identify Fossils#!\nAn [concept_andersson_anthropologist] has the ability to analyze an unknown bone over time and assign it to a specific human or pre-human species. If he manages to assign three bones to the same species, he can successfully systematize this species. The time it takes to correctly identify a bone depends on the experience of the anthropologist.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"

 MR_FOSSIL_IDENTIFICATION_UNKNOWN_BONE_TRIGGER_TT: "#default_text [GetPlayer.GetName] has at least #V 1#! @lepsius_human_fossil! Unknown [concept_andersson_human_fossil].#!"