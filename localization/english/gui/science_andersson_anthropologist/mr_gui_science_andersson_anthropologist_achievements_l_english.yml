l_english:

 MR_ANTHROPOLOGIST_ACHIEVEMENTS_TT: "[AddLocalizationIf( Scope.IsSet , 'andersson_anthropologist_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'andersson_anthropologist_no_anthropologist_loc')]"

 andersson_anthropologist_achievements_loc: "$andersson_anthropologist_achievements_intro_loc$[Scope.GetCharacter.GetCustom('andersson_anthropologist_achievement_total_human_fossils_anthropologist_type')][AddLocalizationIf( Scope.Var('andersson_anthropologist_achievement_attended_origin_congress_var').IsSet , Scope.Var('andersson_anthropologist_achievement_attended_origin_congress_var').GetFlagName)][AddLocalizationIf( Scope.Var('andersson_anthropologist_achievement_exposed_piltdown_fraud_var').IsSet , Scope.Var('andersson_anthropologist_achievement_exposed_piltdown_fraud_var').GetFlagName)][AddLocalizationIf( Scope.Var('andersson_anthropologist_achievement_invented_anthropology_var').IsSet , Scope.Var('andersson_anthropologist_achievement_invented_anthropology_var').GetFlagName)]"
 andersson_anthropologist_no_anthropologist_loc: "The #V Achievements of this [concept_andersson_anthropologist]#! will be displayed here, once you have one."
 andersson_anthropologist_achievements_intro_loc: "#V Achievements of thisAnthropologist#!\n #indent_newline:3 • [Scope.GetCharacter.GetFullName] is [Scope.GetCharacter.GetCustom('andersson_anthropologist_experience_level_type')].#!"

 andersson_anthropologist_achievement_attended_origin_congress_loc: "\n #indent_newline:3 • Professor [Scope.GetCharacter.GetLastNameNoFormatting] attended the Congress on the #V Origin of the Modern Human#!.#!"
 andersson_anthropologist_achievement_exposed_piltdown_fraud_loc: "\n #indent_newline:3 • Thanks to [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetHerHim] the #V Piltdown Human was exposed as a fraud#!.#!"
 andersson_anthropologist_achievement_invented_anthropology_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] is the first scientist to record human bones and skeletons meticulously and very precisely. [Scope.GetCharacter.GetSheHe] is seen as the #V pioneer of Anthropology#!.#!"
 andersson_anthropologist_achievement_discovered_neoanthropus_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] Weidenreich has gained international renown due to the discovery of a previously unknown #V specimen of Neoanthropus#!.#!"
 andersson_anthropologist_achievement_discovered_palaeanthropus_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] deserves the honor of having discovered a new #V species of Paleanthropus#!.#!"
 andersson_anthropologist_achievement_discovered_pithecanthropus_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] went down in history because [Scope.GetCharacter.GetLastSheHe] was the first to discover a #V specimen of Pithecanthropus#!.#!"
 andersson_anthropologist_achievement_discovered_australopithecus_loc: "\n #indent_newline:3 • Professor [Scope.GetCharacter.GetLastNameNoFormatting] was the first to succeed in deciphering the first #V secrets of Australopithecus#!.#!"
 andersson_anthropologist_achievement_inaugurated_institute_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] played a pivotal role in the #V Establishment of the Institute of Anthropology & Ethnology#!, educating the masses about human past and present.#!"

 andersson_anthropologist_achievement_famous_level_anthropologist_overview_loc: "a famous [concept_andersson_anthropologist]"
 andersson_anthropologist_achievement_experienced_level_anthropologist_overview_loc: "an experienced [concept_andersson_anthropologist]"
 andersson_anthropologist_achievement_normal_level_anthropologist_overview_loc: "an accomplished [concept_andersson_anthropologist]"
 andersson_anthropologist_achievement_total_human_fossils_anthropologist_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] has found a total of [Scope.Var('andersson_total_human_fossils_anthropologist_var').GetValue|V0] Human Fossils. Those fossils consist of "
 andersson_anthropologist_achievement_no_human_fossils_anthropologist_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] has not found any Human Fossils yet.#!"
 
 andersson_anthropologist_achievement_total_cromagnon_fossils_anthropologist_comma_loc: "[Scope.Var('lepsius_total_cromagnon_fossils_anthropologist_var').GetValue|V0] Cro-Magnon Fossils, "
 andersson_anthropologist_achievement_total_cromagnon_fossils_anthropologist_no_comma_loc: "[Scope.Var('lepsius_total_cromagnon_fossils_anthropologist_var').GetValue|V0] Cro-Magnon Fossils"
 andersson_anthropologist_achievement_total_neanderthalensis_fossils_anthropologist_comma_loc: "[Scope.Var('lepsius_total_neanderthalensis_fossils_anthropologist_var').GetValue|V0] Neanderthaler Fossils, "
 andersson_anthropologist_achievement_total_neanderthalensis_fossils_anthropologist_no_comma_loc: "[Scope.Var('lepsius_total_neanderthalensis_fossils_anthropologist_var').GetValue|V0] Neanderthaler Fossils"
 andersson_anthropologist_achievement_total_erectus_fossils_anthropologist_comma_loc: "[Scope.Var('lepsius_total_erectus_fossils_anthropologist_var').GetValue|V0] Homo Erectus Fossils, "
 andersson_anthropologist_achievement_total_erectus_fossils_anthropologist_no_comma_loc: "[Scope.Var('lepsius_total_erectus_fossils_anthropologist_var').GetValue|V0] Homo Erectus Fossils"
 andersson_anthropologist_achievement_total_australopithecus_fossils_anthropologist_comma_loc: "[Scope.Var('lepsius_total_australopithecus_fossils_anthropologist_var').GetValue|V0] Australopithecus Fossils, "
 andersson_anthropologist_achievement_total_australopithecus_fossils_anthropologist_no_comma_loc: "[Scope.Var('lepsius_total_australopithecus_fossils_anthropologist_var').GetValue|V0] Australopithecus Fossils"
 andersson_anthropologist_achievement_total_paranthropus_fossils_anthropologist_loc: "[Scope.Var('lepsius_total_paranthropus_fossils_anthropologist_var').GetValue|V0] Paranthropus Fossils"
 andersson_anthropologist_achievement_total_identified_human_fossils_anthropologist_loc: "\n #indent_newline:3 • [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetSheHe|U] identified a total of [Scope.Var('lepsius_total_identified_human_fossils_anthropologist_var').GetValue|V0] Human Fossils.#!"

 andersson_anthropologist_achievement_completed_cromagnon_anthropologist_loc: "\n #indent_newline:3 • [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetSheHe|U] has scientifically #V classified the Cro-Magnon#! for the first time.#!"
 andersson_anthropologist_achievement_completed_neanderthalensis_anthropologist_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] was the first person to #V position the Neanderthaler in the systematics of prehistoric man#!.#!"
 andersson_anthropologist_achievement_completed_erectus_anthropologist_loc: "\n #indent_newline:3 • It was to [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetHerHis] credit that the previously unknown #V Homo Erectus became graspable as a human species#!.#!"
 andersson_anthropologist_achievement_completed_australopithecus_anthropologist_loc: "\n #indent_newline:3 • Professor [Scope.GetCharacter.GetLastNameNoFormatting] was the first to succeed in deciphering the first #V secrets of Australopithecus#! and to draw conclusions about its way of life and appearance.#!"
 andersson_anthropologist_achievement_completed_paranthropus_anthropologist_loc: "\n #indent_newline:3 • Not many people have succeeded in #V trying to reconstruct a prehistoric man#! from a few bones, thus enabling conclusions to be drawn about his living environment. Dr. [Scope.GetCharacter.GetLastNameNoFormatting] succeeded in this with the #V Paranthropus#!.#!"
