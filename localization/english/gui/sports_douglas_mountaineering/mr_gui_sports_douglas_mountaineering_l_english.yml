 MR_MOUNTAIN_UNCONQUERED_LEVEL_1_SUMMIT_TRIGGER_TT: "#default_text [GetPlayer.GetName] owns at least one unconquered #V Level 1#! [concept_douglas_mountain_summit] or has a #V Mountaineering Licence#! with a nation that owns one. For more information, have a look at the [concept_douglas_mountain_summit_list].#!"
 MR_MOUNTAIN_UNCONQUERED_LEVEL_2_SUMMIT_TRIGGER_TT: "#default_text [GetPlayer.GetName] owns at least one unconquered #V Level 2#! [concept_douglas_mountain_summit] or has a #V Mountaineering Licence#! with a nation that owns one. For more information, have a look at the [concept_douglas_mountain_summit_list].#!"
 MR_MOUNTAIN_UNCONQUERED_LEVEL_3_SUMMIT_TRIGGER_TT: "#default_text [GetPlayer.GetName] owns at least one unconquered #V Level 3#! [concept_douglas_mountain_summit] or has a #V Mountaineering Licence#! with a nation that owns one. For more information, have a look at the [concept_douglas_mountain_summit_list].#!"
 MR_MOUNTAIN_UNCONQUERED_LEVEL_4_SUMMIT_TRIGGER_TT: "#default_text [GetPlayer.GetName] owns at least one unconquered #V Level 4#! [concept_douglas_mountain_summit] or has a #V Mountaineering Licence#! with a nation that owns one. For more information, have a look at the [concept_douglas_mountain_summit_list].#!"
 MR_MOUNTAIN_UNCONQUERED_LEVEL_5_SUMMIT_TRIGGER_TT: "#default_text [GetPlayer.GetName] owns at least one unconquered #V Level 5#! [concept_douglas_mountain_summit] or has a #V Mountaineering Licence#! with a nation that owns one. For more information, have a look at the [concept_douglas_mountain_summit_list].#!"

 MR_MOUNTAIN_EXPEDITION_LEVEL_1_BUTTON: "Expedition: Level 1 Summits"
 MR_MOUNTAIN_EXPEDITION_LEVEL_1_BUTTON_TT: "#T Mountaineering Expedition: Level 1 Summits#!\nThis category of mountains can be climbed with Level 1 mountaineering equipment. The level does not indicate the altitude or risk. These peaks include: Mount Whitney, Citlaltépetl, Popocatépetl, Chimborazo, Pico Aneto, Mont Blanc, Großvenediger, Mount Cameroon, Ras Dashen, and Mount Giluwe. For more information, have a look at the [concept_douglas_mountain_summit_list].\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAIN_EXPEDITION_LEVEL_2_BUTTON: "Expedition: Level 2 Summits"
 MR_MOUNTAIN_EXPEDITION_LEVEL_2_BUTTON_TT: "#T Mountaineering Expedition: Level 2 Summits#!\nThis category of mountains can be climbed with Level 2 mountaineering equipment. The level does not indicate the altitude or risk. These peaks include: Kibo (Kilimanjaro), Dufourspitze, Mount Cook, and Mount Wilhelm. For more information, have a look at the [concept_douglas_mountain_summit_list].\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAIN_EXPEDITION_LEVEL_3_BUTTON: "Expedition: Level 3 Summits"
 MR_MOUNTAIN_EXPEDITION_LEVEL_3_BUTTON_TT: "#T Mountaineering Expedition: Level 3 Summits#!\nThis category of mountains can be climbed with Level 3 mountaineering equipment. The level does not indicate the altitude or risk. These peaks include: Mount Elias, Aconcagua, Aiguille Verte, Matterhorn, Mount Kenya(Mount Kenya), and Mount Stanley. For more information, have a look at the [concept_douglas_mountain_summit_list].\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAIN_EXPEDITION_LEVEL_4_BUTTON: "Expedition: Level 4 Summits"
 MR_MOUNTAIN_EXPEDITION_LEVEL_4_BUTTON_TT: "#T Mountaineering Expedition: Level 4 Summits#!\nThis category of mountains can be climbed with Level 4 mountaineering equipment. The level does not indicate the altitude or risk. These peaks include: Mount Logan, Mount McKinley, Illimani, Monte Pissis, Shkara, Kamet, Kaufmann Peak, and Mount Gongga. For more information, have a look at the [concept_douglas_mountain_summit_list].\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAIN_EXPEDITION_LEVEL_5_BUTTON: "Expedition: Level 5 Summits"
 MR_MOUNTAIN_EXPEDITION_LEVEL_5_BUTTON_TT: "#T Mountaineering Expedition: Level 5 Summits#!\nThis category of mountains can be climbed with Level 5 mountaineering equipment. The level does not indicate the altitude or risk. These peaks include: Huascarán, Chigolisa and Kabru. For more information, have a look at the [concept_douglas_mountain_summit_list].\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"

 MR_MOUNTAINEER_TRAINING_BUTTON: "Mountaineering Training"
 MR_MOUNTAINEER_TRAINING_BUTTON_TT: "#T Mountaineering Training#!\nCountries can train their mountaineers if they have mountain ranges or conquered summits which are considered safe.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"

 MR_SPORTS_MOUNTAINEER_EXPEDITIONS_TAB: "Expeditions"
 MR_SPORTS_MOUNTAINEER_ORGANISATION_TAB: "Organization"
 MR_SPORTS_MOUNTAINEER_CLUB_TAB: "Club"

 MR_ALPINE_CLUB_START_EXPEDITION_BUTTON: "Start International Expedition"
 MR_ALPINE_CLUB_START_EXPEDITION_BUTTON_TT: "#T Start International Expedition#!\nThe President of the Alpine Club has the right to initiate an international mountaineering expedition. This is only possible every ten years.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ALPINE_CLUB_PROPOSE_EXPEDITION_BUTTON: "Propose International Expedition"
 MR_ALPINE_CLUB_PROPOSE_EXPEDITION_BUTTON_TT: "#T Propose International Expedition#!\nAlpine Club board members have the right to propose an international mountaineering expedition. This must be approved by the president.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ALPINE_CLUB_JOIN_EXPEDITION_BUTTON: "Join International Expedition"
 MR_ALPINE_CLUB_JOIN_EXPEDITION_BUTTON_TT: "#T Join International Expedition#!\nAs a board member of the Alpine Club, we are called upon to participate in the International Mountaineering Expedition to ensure its success.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAIN_RECENT_INTERNATIONAL_EXPEDITION_TRIGGER_TT: "#default_text The last international expedition was at least 10 years ago.#!"
 MR_MOUNTAIN_RECENT_INTERNATIONAL_EXPEDITION_NO_SETBACK_TRIGGER_TT: "#default_text The President of the Alpine Club did not veto an international expedition.#!"
 MR_MOUNTAIN_EQUIPMENT_INTERNATIONAL_EXPEDITION_TRIGGER_TT: "#default_text The President has the necessary equipment (Level 3, Level 4, or Level 5) to host an International Expedition.#!"
 MR_MOUNTAIN_UNCONQUERED_SUMMIT_INTERNATIONAL_EXPEDITION_TRIGGER_TT: "#default_text There is at least one summit still to be conquered with level 2, level 3 or level 4.#!"
 MR_ALPINE_PRESIDENT_HAS_ACTIVE_MOUNTAINEER_TRIGGER_TT: "#default_text The President has a [concept_douglas_mountaineer] who is #V not busy#!.#!"

 MR_MOUNT_EVEREST_EXPEDITION_BUTTON: "Mount Everest Expedition"
 MR_MOUNT_EVEREST_EXPEDITION_BUTTON_TT: "#T Mount Everest Expedition#!\nAs the highest mountain in the world, Mount Everest is the dream destination of all mountaineers - but is an expedition there really the fulfillment of all mountaineering dreams, or rather delusions of grandeur?\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
