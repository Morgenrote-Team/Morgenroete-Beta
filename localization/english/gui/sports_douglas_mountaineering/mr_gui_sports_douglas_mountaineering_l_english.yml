 MR_MOUNTAINEERING_EQUIPMENT_BUTTON_TT: "#T Mountaineering Equipment#!\nBetter #V Mountaineering Equipment#! provides better success chances. This recquires new technologies for each step.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"

