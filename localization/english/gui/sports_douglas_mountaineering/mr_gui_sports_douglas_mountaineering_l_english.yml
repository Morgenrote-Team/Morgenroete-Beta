l_english:

 MR_MOUNTAIN_GENERAL_TRIGGER_TT: "#default_text [GetPlayer.GetName] has a #V General#! with the #V $douglas_mountaineer$#!, #V $douglas_mountaineer_veteran$#!, #V $mountain_commander$#!, #V $surveyor$#! or #V $explorer$#! [concept_character_trait].#!" #please replace

 MR_MOUNTAINEERING_CLUB_BUTTON: "Mountaineering Club"
 MR_MOUNTAINEERING_CLUB_BUTTON_TT: "#T Found a Mountaineering Club#!\nA mountaineering club is a nation's first step toward organized alpinism. It must be founded by an experienced gentleman (or gentlewoman) with mountaineering expertise. From this club, new climbers can then emerge to conquer the peaks of the world!\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"

 MR_ALPINE_CLUB_BUTTON: "Alpine Club"
 MR_ALPINE_CLUB_BUTTON_TT: "#T Found the Alpine Club#!\nFounded in London in 1857, the Alpine Club is the world's oldest mountaineering organization. Its establishment marked the beginning of organized alpinism in Victorian England. The club aimed to promote scientific, geographical, and athletic exploration of the Alps. Among its founding members was Edward Whymper, who completed the first ascent of the Matterhorn in 1865. The Alpine Club played a key role during the 'Golden Age of Alpinism' and published influential works, including the Alpine Journal. It set standards for future mountaineering clubs around the world.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ALPINE_CLUB_TRIGGER_TT: "#default_text There are at least #G 6#! Countries with a Mountaineering Club.#!"

 MR_ALPINE_CLUB_PRESIDENT_BUTTON: "Become President of the Alpine Club"
 MR_ALPINE_CLUB_PRESIDENT_BUTTON_TT: "#T Become President of the Alpine Club#!\nWithout an active president of the Alpine Club, we can take this position. That assumes we control the Headquarters of the Alpine Club.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ALPINE_CLUB_CONTROLS_HQ_TRIGGER_TT: "#default_text [GetPlayer.GetName] controls the [GetBuildingType('building_douglas_alpine_club').GetName]#!."

 douglas_alpine_club_board_member_tt: "[GetPlayer.GetName] becomes a member of the board of the Alpine Club."
 douglas_become_alpine_club_president_tt: "[GetPlayer.GetName] becomes president of the Alpine Club."

 MR_ALPINE_CLUB_EXPERIENCE_TRIGGER_TT: "#default_text The mountaineer has at least #p 50#! #V Experience#!.#!"

 MR_RECRUIT_MOUNTAINEER_BUTTON: "Recruit Mountaineer"
 MR_RECRUIT_MOUNTAINEER_BUTTON_TT: "#T Recruit Mountaineer#!\nWith a mountaineering club, it's possible to recruit new mountaineers. This, of course, requires sufficient [concept_douglas_alpine_heritage].\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAINEERING_CLUB_TRIGGER_TT: "#default_text [GetPlayer.GetName] has a #V Mountaineering Club#!.#!"
 MR_ALPINE_HERITAGE_50_TRIGGER_TT: "#default_text [GetPlayer.GetName] has at least #G 50#! [concept_douglas_alpine_heritage].#!"

 MR_MOUNTAIN_TROOPS_REGIMENT_BUTTON: "Mountain Troops Regiment"
 MR_MOUNTAIN_TROOPS_REGIMENT_BUTTON_TT: "#T Mountain Troops Regiment#!\nA suitable general can, given the presence of a mountain region with a population passionately devoted to their fatherland, establish a regiment trained in mountain infantry tactics.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ALPINE_HERITAGE_25_TRIGGER_TT: "#default_text [GetPlayer.GetName] has at least #G 50#! [concept_douglas_alpine_heritage].#!"

 MR_MOUNTAINEERING_EQUIPMENT_BUTTON: "Mountaineering Equipment"
 MR_MOUNTAINEERING_EQUIPMENT_BUTTON_TT: "#T Mountaineering Equipment#!\nBetter #V Mountaineering Equipment#! provides better success chances. This requires new technologies for each step.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"

