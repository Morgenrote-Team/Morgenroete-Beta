 mr_science_paleontologist_scenery_triassic_button: "Build Triassic Scenery"
 mr_science_paleontologist_congress_desc: "#T Extinction Congress#!\nOne of the most puzzling mysteries in natural history remains the disappearance of the dinosaurs. The father of paleontology, Georges Cuvier, discovered that there had been a mass extinction at the end of the Cretaceous period in which the dinosaurs also died out. But how could the dire lizards, which dominated the earth for millions of years, suddenly become obsolete?"
