 mr_science_physician_congress_desc: "#T Host Medical Congress#!\nWith the revolution in medical research and the simultaneous spread of dangerous epidemics, the need to share discoveries at international congresses for the benefit of humanity grew. With a bit of luck, knowledge about disease descriptions, pathogens, disease treatments and vaccines can be exchanged. Physicians dominate the event, but microbiologists are also present."
