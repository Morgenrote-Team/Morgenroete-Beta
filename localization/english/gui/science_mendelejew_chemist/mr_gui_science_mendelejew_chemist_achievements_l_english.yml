icide_lead_arsenate_achievement_var').IsSet , Scope.Var('mendelejew_pesticide_lead_arsenate_achievement_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_pesticide_sodium_arsenite_achievement_var').IsSet , Scope.Var('mendelejew_pesticide_sodium_arsenite_achievement_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_pesticide_ddt_achievement_var').IsSet , Scope.Var('mendelejew_pesticide_ddt_achievement_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_attended_chemist_congress_var').IsSet , Scope.Var('mendelejew_chemist_achievement_attended_chemist_congress_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_fertilizer_improvement_finished_var').IsSet , Scope.Var('mendelejew_chemist_achievement_fertilizer_improvement_finished_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_explosives_improvement_finished_var').IsSet , Scope.Var('mendelejew_chemist_achievement_explosives_improvement_finished_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_synthetics_improvement_finished_var').IsSet , Scope.Var('mendelejew_chemist_achievement_synthetics_improvement_finished_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_discovered_radioactivity_var').IsSet , Scope.Var('mendelejew_chemist_achievement_discovered_radioactivity_var').GetFlagName)]"
