 mendelejew_chemist_achievements_intro_loc: "#V Achievements of this Chemist#!\n #indent_newline:3 • [Scope.GetCharacter.GetFullName] is an accomplished chemist.#!"

 mendelejew_chemist_theorized_elementes_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V theorized [Scope.Var('mendelejew_theorized_elements_character_number_var').GetValue|0] Elements#!.#!"
 mendelejew_chemist_discovered_elementes_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] #V discovered [Scope.Var('mendelejew_discovered_elements_character_number_var').GetValue|0] Elements#!.#!"
 mendelejew_chemist_isolated_elementes_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V isolated [Scope.Var('mendelejew_isolated_elements_character_number_var').GetValue|0] Elements#!.#!"
 mendelejew_chemist_achievement_periodic_table_inventor_loc: "\n #indent_newline:3 • Professor [Scope.GetCharacter.GetLastNameNoFormatting] is famous for the #V invention of the Periodic Table#!.#!"
 mendelejew_chemist_achievement_invented_dynamite_loc: "\n #indent_newline:3 • With the #V Invention of the Dynamite#!, [Scope.GetCharacter.GetFullNameNoFormatting] changed the world be it mining, construction or war.#!"
 mendelejew_chemist_achievement_noble_gases_discoverer_loc: "\n #indent_newline:3 • The #V Discovery of Noble Gases#! made Dr. [Scope.GetCharacter.GetLastNameNoFormatting] one of the most famous chemists of all times.#!"
 mendelejew_chemist_achievement_discovered_reason_fraunhofer_lines_loc: "\n #indent_newline:3 • Dr. [GetPlayer.MakeScope.Var('mendelejew_chemist_var').GetCharacter.GetLastNameNoFormatting] discovered the reason for the Fraunhofer Lines and thereby laid the groundwork for astrospectroscopy.#!"
 mendelejew_chemist_achievement_synthetic_oil_inventor_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] made it possible to #V create Oil synthetically#!.#!"
 mendelejew_chemist_achievement_synthetic_rubber_inventor_loc: "\n #indent_newline:3 • With the #V Invention of synthetic Rubber#! Dr. [Scope.GetCharacter.GetLastNameNoFormatting] freed the world from the necessity of collecting rubber from trees.#!"
 mendelejew_chemist_achievement_attended_chemist_congress_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] was one of the participants of the #V first International Chemist Congress#!.#!"
 mendelejew_chemist_achievement_fertilizer_improvement_finished_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] spent a lot of time researching how to #V improve fertilizers and their production#!.#!"
 mendelejew_chemist_achievement_explosives_improvement_finished_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] is a pioneer of the production of #V improved Explosives and the chemical reactions to create them#!.#!"
 mendelejew_chemist_achievement_synthetics_improvement_finished_loc: "\n #indent_newline:3 • Known for [Scope.GetCharacter.GetHerHis] work on #V improving Synthetics and their production#!, Dr. [Scope.GetCharacter.GetLastNameNoFormatting] is well regarded among other chemists and the chemical industry.#!"
 mendelejew_chemist_achievement_discovered_radioactivity_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] achieved the scientific milestone of being the #V first to discover radioactivity#!.#!"

 mendelejew_pesticide_calcium_arsenate_achievement_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] spearheaded the development of #V calcium arsenate#! to eradicate the boll weevil.#!"
 mendelejew_pesticide_nicotine_sulfate_achievement_loc: "\n #indent_newline:3 • One of [Scope.GetCharacter.GetHerHis] most significant discoveries was #V nicotine sulfate#! for fumigating the tea mosquito bug.#!"
 mendelejew_pesticide_lead_arsenate_achievement_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] invented #V lead arsenate#! to poison the Colorado potato beetle and the codling moth.#!"
 mendelejew_pesticide_sodium_arsenite_achievement_loc: "\n #indent_newline:3 • To kill as many locusts as possible, Dr. [Scope.GetCharacter.GetLastNameNoFormatting] invented poisoned bait containing #V sodium arsenite#!.#!"
 mendelejew_pesticide_ddt_achievement_loc: "\n #indent_newline:3 • With #V DDT#!, Dr. [Scope.GetCharacter.GetLastNameNoFormatting] has outdone [Scope.GetCharacter.GetHerselfHimself]: It is the #V ultimate pesticide!#!.#!"