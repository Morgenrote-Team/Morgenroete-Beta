l_english:

 MR_AUTOMATE_ENGINEER_TT: "#T Automate [concept_gaudi_engineer]#!\nYou will no longer have to give tasks to your Engineer if you automate them.\nThey will work independently and perform tasks that make sense at the moment. You will still receive some events though. Note that the automation is probably less efficient then you directly controlling the Engineer."
 mr_engineering_automation_gui_tt: "Start Automating the tasks of the [concept_gaudi_engineer]."
 mr_stop_engineering_automation_gui_tt: "Stop Automating the tasks of the [concept_gaudi_engineer]."
 MR_STOP_AUTOMATE_ENGINEER_TT: "#T Stop automation of [concept_gaudi_engineer]#!\nYour Engineer will no longer be automated."