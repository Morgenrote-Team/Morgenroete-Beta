ments_finished_locomotive_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_production_methods_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_production_methods_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_mechanical_computer_project_finished_engineer_var').IsSet , Scope.Var('tesla_mechanical_computer_project_finished_engineer_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_rifles_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_rifles_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_tanks_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_tanks_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_fieldworks_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_fieldworks_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_geomagnetic_observartory_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_geomagnetic_observartory_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_telegraphy_network_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_telegraphy_network_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_radio_networ_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_radio_networ_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_airport_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_airport_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_warplane_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_warplane_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_bicycle_invented_var').IsSet , Scope.Var('tesla_engineer_achievements_bicycle_invented_var').GetFlagName)]"
 tesla_engineer_achievements_no_engineer_loc: "The #V Achievements of your [concept_gaudi_engineer]#! will be displayed here, once you have one."
 tesla_engineer_achievements_intro_loc: "#V Achievements of your Engineer#!\n"

 tesla_engineer_achievements_invented_steel_frame_loc: "\n[Scope.GetCharacter.GetLastName] built the first #V Building using Steel Frames#!. This way of construction spread around the world like a wildfire."
 tesla_engineer_achievements_invented_electric_telegraph_loc: "\n[Scope.GetCharacter.GetSheHe] was the first person to #V Send a Telegram#! using an alphabet [Scope.GetCharacter.GetSheHe] invented." #pleace replace
 tesla_engineer_achievements_invented_automobile_loc: "\nIn [Scope.Var('tesla_engineer_achievements_invented_automobile_year_var').GetValue] [Scope.GetCharacter.GetLastName] invented a #V Car with a Combustion Engine#! and drove it a long distance. This marked the beginning of the explosive spread of the automobile."
 tesla_engineer_achievements_finished_road_project_loc: "\n[Scope.GetCharacter.GetFullName] improved #V Road Networks#!. Thanks to [Scope.GetCharacter.GetHerHis] work to modernize the roads they are now considered to be the most modern in the world."
 tesla_engineer_achievements_finished_bridge_project_loc: "\n[Scope.GetCharacter.GetSheHe] built many #V New Bridges#! which resulted in a better infrastructure."
 tesla_engineer_achievements_finished_tunnel_project_loc: "\nDr. [Scope.GetCharacter.GetLastName] was working on the constructio of many #V Tunnels#! that are small marvels of technology."
 tesla_engineer_achievements_finished_railway_project_loc: "\n[Scope.GetCharacter.GetSheHe] massively #V improved Railway Lines#! by implementing new technology and other improvements."
 tesla_engineer_achievements_finished_construction_project_loc: "\nDr. [Scope.GetCharacter.GetLastName] #V improved Construction Sectors#!  by introducing modern equipment and construction techniques."
 tesla_engineer_achievements_finished_topographic_map_project_loc: "\n[Scope.GetCharacter.GetSheHe] created a new #V Topographic Map#! that eases future construction projects."
 tesla_engineer_achievements_finished_locomotive_project_loc: "\n[Scope.GetCharacter.GetLastName] #V developed new Locomotives#! that will boost the Railroads."
 tesla_engineer_achievements_finished_production_methods_project_loc: "\n[Scope.GetCharacter.GetSheHe|U] helped various companies to #V improve their Production#!."
 tesla_engineer_achievements_finished_rifles_project_loc: "\nDr. [Scope.GetCharacter.GetLastName] #V designed a new Rifle#! that is one of the most modern ones in the world."
 tesla_engineer_achievements_finished_tanks_project_loc: "\n[Scope.GetCharacter.GetSheHe] is a #V Pioneer of Tank Design and Construction#! who modernized our Tanks."
 tesla_engineer_achievements_finished_fieldworks_project_loc: "\n[Scope.GetCharacter.GetLastName] #V revolutionized Fieldworks and Defenses#! which saved many soldier's lifes."
 tesla_engineer_achievements_finished_geomagnetic_observartory_project_loc: "\nDr. [Scope.GetCharacter.GetLastName] helped conducting geomagnetical research by #V building a Geomagnetic Observatory#!."
 tesla_engineer_achievements_finished_telegraphy_network_project_loc: "\n[Scope.GetCharacter.GetSheHe] built a #V Telegraphy Network#!."
 tesla_engineer_achievements_finished_radio_networ_project_loc: "\nDr. [Scope.GetCharacter.GetLastName] #V constructed a Radio Network#!."
 tesla_engineer_achievements_finished_airport_project_loc: "\n[Scope.GetCharacter.GetLastName] #V modernized the Airports#!."
 tesla_engineer_achievements_finished_warplane_project_loc: "\n[Scope.GetCharacter.GetSheHe] developed #V Modern Airplanes for the Military#!."
 tesla_engineer_achievements_bicycle_invented_loc: "In [Scope.Var('tesla_engineer_achievements_bicycle_invented_year_var').GetValue|0] [Scope.GetCharacter.GetLastNameNoFormatting] #V invented the first Bycycle#!. A great new way to travel using just your own energy."
