LocalizationIf( Scope.Var('tesla_mechanical_computer_project_finished_engineer_var').IsSet , Scope.Var('tesla_mechanical_computer_project_finished_engineer_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_rifles_project_finished_engineer_var').IsSet , Scope.Var('tesla_rifles_project_finished_engineer_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_tanks_project_finished_engineer_var').IsSet , Scope.Var('tesla_tanks_project_finished_engineer_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_fieldworks_project_finished_engineer_var').IsSet , Scope.Var('tesla_fieldworks_project_finished_engineer_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_geomagnetic_observartory_project_finished_engineer_var').IsSet , Scope.Var('tesla_geomagnetic_observartory_project_finished_engineer_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_telegraphy_network_project_finished_engineer_var').IsSet , Scope.Var('tesla_telegraphy_network_project_finished_engineer_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_radio_network_project_finished_engineer_var').IsSet , Scope.Var('tesla_radio_network_project_finished_engineer_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_airport_project_finished_engineer_var').IsSet , Scope.Var('tesla_airport_project_finished_engineer_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_warplane_project_finished_engineer_var').IsSet , Scope.Var('tesla_warplane_project_finished_engineer_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_invented_bicycle_var').IsSet , Scope.Var('tesla_engineer_invented_bicycle_var').GetFlagName)]"
 gaudi_engineer_achievements_no_engineer_loc: "The #V Achievements of your [concept_gaudi_engineer]#! will be displayed here, once you have one."

 tesla_engineer_invented_steel_frame_loc: "\n[Scope.GetCharacter.GetLastName] built the first #V Building using Steel Frames#!. This way of construction spread around the world like a wildfire."
 tesla_engineer_invented_electric_telegraph_loc: "\n[Scope.GetCharacter.GetSheHe] was the first person to #V Send a Telegram#! using an alphabet [Scope.GetCharacter.GetSheHe] invented." #pleace replace
 tesla_engineer_invented_automobile_loc: "\nIn [Scope.Var('tesla_engineer_invented_automobile_year_var').GetValue] [Scope.GetCharacter.GetLastName] invented a #V Car with a Combustion Engine#! and drove it a long distance. This marked the beginning of the explosive spread of the automobile."
 tesla_road_project_finished_engineer_loc: "\n[Scope.GetCharacter.GetFullName] improved #V Road Networks#!. Thanks to [Scope.GetCharacter.GetHerHis] work to modernize the roads they are now considered to be the most modern in the world."
 tesla_bridge_project_finished_engineer_loc: "\n[Scope.GetCharacter.GetSheHe] built many #V New Bridges#! which resulted in a better infrastructure."
 tesla_tunnel_project_finished_engineer_loc: "\nDr. [Scope.GetCharacter.GetLastName] was working on the constructio of many #V Tunnels#! that are small marvels of technology."
 tesla_railway_project_finished_engineer_loc: "\n[Scope.GetCharacter.GetSheHe] massively #V improved Railway Lines#! by implementing new technology and other improvements."
 tesla_construction_project_finished_engineer_loc: "\nDr. [Scope.GetCharacter.GetLastName] #V improved Construction Sectors#!  by introducing modern equipment and construction techniques."
 tesla_topographic_map_project_finished_engineer_loc: "\n[Scope.GetCharacter.GetSheHe] created a new #V Topographic Map#! that eases future construction projects."
 tesla_locomotive_project_finished_engineer_loc: "\n[Scope.GetCharacter.GetLastName] #V developed new Locomotives#! that will boost the Railroads."
 tesla_production_methods_project_finished_engineer_loc: "\n[Scope.GetCharacter.GetSheHe|U] helped various companies to #V improve their Production#!."
 tesla_rifles_project_finished_engineer_loc: "\nDr. [Scope.GetCharacter.GetLastName] #V designed a new Rifle#! that is one of the most modern ones in the world."
 tesla_tanks_project_finished_engineer_loc: "\n[Scope.GetCharacter.GetSheHe] is a #V Pioneer of Tank Design and Construction#! who modernized our Tanks."
 tesla_fieldworks_project_finished_engineer_loc: "\n[Scope.GetCharacter.GetLastName] #V revolutionized Fieldworks and Defenses#! which saved many soldier's lifes."
 tesla_geomagnetic_observartory_project_finished_engineer_loc: "\nDr. [Scope.GetCharacter.GetLastName] helped conducting geomagnetical research by #V building a Geomagnetic Observatory#!."
 tesla_telegraphy_network_project_finished_engineer_loc: "\n[Scope.GetCharacter.GetSheHe] built a #V Telegraphy Network#!."
 tesla_radio_network_project_finished_engineer_loc: "\nDr. [Scope.GetCharacter.GetLastName] #V constructed a Radio Network#!."
 tesla_airport_project_finished_engineer_loc: "\n[Scope.GetCharacter.GetLastName] #V modernized the Airports#!."
 tesla_warplane_project_finished_engineer_loc: "\n[Scope.GetCharacter.GetSheHe] developed #V Modern Airplanes for the Military#!."
 tesla_engineer_achievements_intro_loc: "#V Achievements of your Engineer#!\n"
 tesla_engineer_invented_bicycle_loc: "In [Scope.Var('tesla_engineer_invented_bicycle_year_var').GetValue|0] [Scope.GetCharacter.GetLastNameNoFormatting] #V invented the first Bycycle#!. A great new way to travel using just your own energy."
