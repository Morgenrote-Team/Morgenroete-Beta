vement_fossil_pterodactylus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_fossil_pterodactylus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_fossil_smilodon_var').IsSet , Scope.Var('dubois_paleontologist_achievement_fossil_smilodon_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_fossil_trilobite_var').IsSet , Scope.Var('dubois_paleontologist_achievement_fossil_trilobite_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_fossil_haast_eagle_var').IsSet , Scope.Var('dubois_paleontologist_achievement_fossil_haast_eagle_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_ankylosaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_ankylosaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_diplodocus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_diplodocus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_triceratop_var').IsSet , Scope.Var('dubois_paleontologist_achievement_triceratop_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_tyrannosaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_tyrannosaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_stegosaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_stegosaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_antarctosaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_antarctosaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_argyrosaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_argyrosaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_iguanodon_var').IsSet , Scope.Var('dubois_paleontologist_achievement_iguanodon_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_plateosaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_plateosaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_giraffatitan_var').IsSet , Scope.Var('dubois_paleontologist_achievement_giraffatitan_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_spinosaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_spinosaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_psittacosaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_psittacosaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_velociraptor_var').IsSet , Scope.Var('dubois_paleontologist_achievement_velociraptor_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_muttaburrasaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_muttaburrasaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_rhoetosaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_rhoetosaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_mosasaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_mosasaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_plesiosaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_plesiosaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_basilosaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_basilosaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_megalodon_var').IsSet , Scope.Var('dubois_paleontologist_achievement_megalodon_var').GetFlagName)]"

 dubois_paleontologist_no_paleontologist_loc: "The #V Achievements of your [concept_dubois_paleontologist]#! will be displayed here, once you have one."
 dubois_paleontologist_achievements_intro_loc: "#V Achievements of your Paleontologist#!\n[Scope.GetCharacter.GetFullNameNoFormatting] is [Scope.GetCharacter.GetCustom('dubois_paleontologist_experience_level_type')] who collected a total of [Scope.Var('dubois_paleontologist_total_fossils_var').GetValue|0+] [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] and [Scope.Var('dubois_dinosaur_bone_total_paleontologist_var').GetValue|0+] [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')]."

 dubois_paleontologist_achievement_opened_first_paleontological_museum_loc: "\n[Scope.GetCharacter.GetSheHe|U] founded the #V first Paleontological Museum#! of the world, exhibting various fossils."
 dubois_paleontologist_achievementattended_extinction_congress_loc: "Dr. [Scope.GetCharacter.GetLastNameNoFormatting] participated in a congress that tried to determine how the dinosaurs went extinct."
 dubois_paleontologist_achievement_fossil_amber_loc: "\n[Scope.GetCharacter.GetSheHe|U] found a unique piece of #V Amber#! in which a small mosquito was encased. Maybe there is even some dinosaur blood in it?"
 dubois_paleontologist_achievement_fossil_ammonite_loc: "\nProfessor [Scope.GetCharacter.GetLastNameNoFormatting] found an #V Ammonite#!, that will help with the chronological delimitation of marine sediments."
 dubois_paleontologist_achievement_fossil_archaeopteryx_loc: "\nMany consider Dr. [Scope.GetCharacter.GetLastNameNoFormatting]'s discovery as the first bird. Indeed, the #V Archaeopteryx#! seems to be a missing link between dinosaurs and birds."
 dubois_paleontologist_achievement_fossil_composita_loc: "\n#V Compositas#! are shells that lived millions of years ago on nearly every continent. Professor [Scope.GetCharacter.GetLastNameNoFormatting] found one during one of [Scope.GetCharacter.GetHerHis] excavations."
 dubois_paleontologist_achievement_fossil_eusthenopteron_loc: "\nInterestingly, the #V Eusthenopteron#! that [Scope.GetCharacter.GetSheHe] found already has a distinct humerus, ulna, and radius in its for-fin. Those bones are present in all land-living vertebrates."
 dubois_paleontologist_achievement_fossil_ichthyosaurus_loc: "\n#V Ichthyosaura#!, of which Dr. [Scope.GetCharacter.GetLastNameNoFormatting] found one, is a very unique reptile. It resembles Dolphins and does not lay eggs but gives birth to the young alive which is very rare for reptiles."
 dubois_paleontologist_chievement_fossil_ichthyostega_loc: "\nWith the discovery of #V Ichthyostega#!, Professor [Scope.GetCharacter.GetLastNameNoFormatting] found one of the earliest land-living animals. It is the missing link between fish and limbed tetrapodomorphs."
 dubois_paleontologist_achievement_fossil_megatherium_loc: "\nSloths are small today but there were huge ones in the past, as one of Dr. [Scope.GetCharacter.GetLastNameNoFormatting]'s discoveries showed. The #V Megatherium#! was up to 6 meters (20 ft) long."
 dubois_paleontologist_achievement_fossil_pterodactylus_loc: "\n[Scope.GetCharacter.GetSheHe|U] discovered a fossil of #V Pterodactylus#!, a winged dinosaur that probably lived close to lakes and rivers."
 dubois_paleontologist_achievement_fossil_smilodon_loc: "\nThe #V Smilodon#! is a scary predator that lived until a few thousand years ago. Professor [Scope.GetCharacter.GetLastNameNoFormatting] found a very well preserved skeleton of one."
 dubois_paleontologist_achievement_fossil_trilobite_loc: "\nOne of [Scope.GetCharacter.GetHerHis] minor discoveries are various T#V Trilobites#!. Although not spectacular, they are great index fossils."
 dubois_paleontologist_achievement_fossil_haast_eagle_loc: "\nIn New Zealand, Dr. [Scope.GetCharacter.GetLastNameNoFormatting] made a fascinating discovery when [Scope.GetCharacter.GetSheHe] found a gigantic Eagle now called #V Haast Eagle#!."
 dubois_perfect_ankylosaurus_paleontologist_loc: "\nProfessor [Scope.GetCharacter.GetLastNameNoFormatting] reconstructed an #V Ankylosaurus#! in a perfect way. Other Paleontologists marvel at the reconstruction."
 dubois_imperfect_ankylosaurus_paleontologist_loc: "\nProfessor [Scope.GetCharacter.GetLastNameNoFormatting] reconstructed an #V Ankylosaurus#! but in an imperfect way."
 dubois_poor_ankylosaurus_paleontologist_loc: "\nProfessor [Scope.GetCharacter.GetLastNameNoFormatting] reconstructed an #V Ankylosaurus#! but it was a horrible attempt and is laughed at by other Paleontologists."
 dubois_perfect_diplodocus_paleontologist_loc: "\n[Scope.GetCharacter.GetHerHis|U] reconstruction of a #V Diplodocus#! is absolutely perfect and is the envy of every paleontological museum."
 dubois_imperfect_diplodocus_paleontologist_loc: "\n[Scope.GetCharacter.GetHerHis|U] reconstruction of a #V Diplodocus#! is good enough."
 dubois_poor_diplodocus_paleontologist_loc: "[Scope.GetCharacter.GetHerHis|U] reconstruction of a #V Diplodocus#! is disastrous and seen as an abomination."
 dubois_perfect_triceratop_paleontologist_loc: "\nThe perfection of Dr. [Scope.GetCharacter.GetLastNameNoFormatting]'s #V Triceratops#! reconstruction is widely known and has boosted the prestige of our paleontological collection."
 dubois_imperfect_triceratop_paleontologist_loc: "\nThe mediocrity of Dr. [Scope.GetCharacter.GetLastNameNoFormatting]'s #V Triceratops#! reconstruction is good enough for our museum but nothing exceptional."
 dubois_poor_triceratop_paleontologist_loc: "The terror of Dr. [Scope.GetCharacter.GetLastNameNoFormatting]'s #V Triceratops#! reconstruction is a shame for our collection."
 dubois_perfect_tyrannosaurus_paleontologist_loc: "\nA #V Tyrannosaurus Rex#! is a marvellous sight. Especially the one that Professor [Scope.GetCharacter.GetLastNameNoFormatting] perfectly assembled."
 dubois_imperfect_tyrannosaurus_paleontologist_loc: "\nA #V Tyrannosaurus Rex#! is a marvellous sight. Even if it is not perfectly assembled like the one Professor [Scope.GetCharacter.GetLastNameNoFormatting] reconstructed."
 dubois_poor_tyrannosaurus_paleontologist_loc: "\nA #V Tyrannosaurus Rex#! is a marvellous sight. But not the one that Professor [Scope.GetCharacter.GetLastNameNoFormatting] assembled. This one is just a absurd monstrosity."
 dubois_perfect_stegosaurus_paleontologist_loc: "\nThe mighty #V Stegosaurus#! skeleton that [Scope.GetCharacter.GetSheHe] assembled is a perfect piece for our dinosaur exhibition."
 dubois_imperfect_stegosaurus_paleontologist_loc: "\nThe #V Stegosaurus#! skeleton that [Scope.GetCharacter.GetSheHe] assembled is a good piece for our dinosaur exhibition."
 dubois_poor_stegosaurus_paleontologist_loc: "\nThe horrific #V Stegosaurus#! skeleton that [Scope.GetCharacter.GetSheHe] assembled is a waste of space in our dinosaur exhibition."
 dubois_perfect_antarctosaurus_paleontologist_loc: "\nNot everyone can assemble an #V Antarctosaurus#! as perfectly as Dr. [Scope.GetCharacter.GetLastNameNoFormatting]. It is one of the highlights of our collection."
 dubois_imperfect_antarctosaurus_paleontologist_loc: "\nAssembling an #V Antarctosaurus#! is a hard task, but Dr. [Scope.GetCharacter.GetLastNameNoFormatting] did it quite well."
 dubois_poor_antarctosaurus_paleontologist_loc: "\nNot everyone can assemble an #V Antarctosaurus#!. But not many people assemble it as horribly bad as Dr. [Scope.GetCharacter.GetLastNameNoFormatting]. It is the shame of our collection."
 dubois_perfect_argyrosaurus_paleontologist_loc: "\nThe wonderful #V Argyrosaurus#! skeleton in our collection is the work of Professor [Scope.GetCharacter.GetLastNameNoFormatting]. A truely marvelous skeleton."
 dubois_imperfect_argyrosaurus_paleontologist_loc: "\nThe #V Argyrosaurus#! skeleton in our collection is the work of Professor [Scope.GetCharacter.GetLastNameNoFormatting]. A quite well done skeleton."
 dubois_poor_argyrosaurus_paleontologist_loc: "\nThe monstrous #V Argyrosaurus#! skeleton in our collection is the work of Professor [Scope.GetCharacter.GetLastNameNoFormatting]. A obviously the work of a bumbling paleontologist."
 dubois_perfect_iguanadon_paleontologist_loc: "\n[Scope.GetCharacter.GetSheHe|U] assembled an #V Iguanodon#! skeleton perfectly."
 dubois_imperfect_iguanadon_paleontologist_loc: "\n[Scope.GetCharacter.GetSheHe|U] assembled an #V Iguanodon#! skeleton."
 dubois_poor_iguanadon_paleontologist_loc: "\n[Scope.GetCharacter.GetSheHe|U] assembled an #V Iguanodon#! skeleton horribly wrong."
 dubois_perfect_plateosaurus_paleontologist_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] was able to reconstruct the skeleton of a #V Plateosaurus#! perfectly. A greath exhibit for our collection."
 dubois_imperfect_plateosaurus_paleontologist_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] was able to reconstruct the skeleton of a #V Plateosaurus#!."
 dubois_poor_plateosaurus_paleontologist_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] was able to reconstruct the skeleton of a #V Plateosaurus#!. But it looks very weird and deformed."
 dubois_perfect_giraffatitan_paleontologist_loc: "\nReconstructing a #V Giraffatitan#! is hard work and needs a lot of space. Thankfully Professor [Scope.GetCharacter.GetLastNameNoFormatting] was able to use the size of our museum to prepare a magnificent skeleton of the dinosaur."
 dubois_imperfect_giraffatitan_paleontologist_loc: "\nReconstructing a #V Giraffatitan#! is hard work and needs a lot of space. Thankfully Professor [Scope.GetCharacter.GetLastNameNoFormatting] was able to use the size of our museum to prepare the skeleton of the dinosau."
 dubois_poor_giraffatitan_paleontologist_loc: "\nReconstructing a #V Giraffatitan#! is hard work and needs a lot of space. Even though [Scope.GetCharacter.GetSheHe] has the whole museum to work, Professor [Scope.GetCharacter.GetLastNameNoFormatting] was only able to create an absurd version of the dinosaur"
 dubois_perfect_spinosaurus_paleontologist_loc: "\nThe scary #V Spinosaurus#! skeleton in our collection was assembled by Dr. [Scope.GetCharacter.GetLastNameNoFormatting] and is a piece of art."
 dubois_imperfect_spinosaurus_paleontologist_loc: "\nThe scary #V Spinosaurus#! skeleton in our collection was assembled by Dr. [Scope.GetCharacter.GetLastNameNoFormatting]."
 dubois_poor_spinosaurus_paleontologist_loc: "\nThe funny #V Spinosaurus#! skeleton in our collection was assembled by Dr. [Scope.GetCharacter.GetLastNameNoFormatting]. It is badly done and looks more like a chicken than a dinosaur."
 dubois_perfect_psittacosaurus_paleontologist_loc: "\nWith its mouth resembling a beak, the #V Psittacosaurus#! that Professor [Scope.GetCharacter.GetLastNameNoFormatting] assembled, was an extraordinary skeleton."
 dubois_imperfect_psittacosaurus_paleontologist_loc: "\nWith its mouth resembling a beak, the #V Psittacosaurus#! that Professor [Scope.GetCharacter.GetLastNameNoFormatting] assembled, was an nice skeleton."
 dubois_poor_psittacosaurus_paleontologist_loc: "\nDid the #V Psittacosaurus#! really have a weird beak on its back and a trunk instead of mouth? At least Professor [Scope.GetCharacter.GetLastNameNoFormatting] thinks so, but he might be the only one."
 dubois_perfect_velociraptor_paleontologist_loc: "\nThe scary #V Velociraptor#! is one of Dr. [Scope.GetCharacter.GetLastNameNoFormatting]'s masterpieces. It is perfectly assembled."
 dubois_imperfect_velociraptor_paleontologist_loc: "\nThe scary #V Velociraptor#! is a good work of Dr. [Scope.GetCharacter.GetLastNameNoFormatting]. [Scope.GetCharacter.GetSheHe] assembled it quite well."
 dubois_poor_velociraptor_paleontologist_loc: "\nThe scary #V Velociraptor#! is one of Dr. [Scope.GetCharacter.GetLastNameNoFormatting]'s worst works. First of all, it is way to small, second, it surely didn't have 10 claws as a crown..."
 dubois_perfect_muttaburrasaurus_paleontologist_loc: "\nThe #V Muttaburrasaurus#! that Professor [Scope.GetCharacter.GetLastNameNoFormatting] reconstructed was quite impressive and not just because of its size."
 dubois_imperfect_muttaburrasaurus_paleontologist_loc: "\nThe #V Muttaburrasaurus#! that Professor [Scope.GetCharacter.GetLastNameNoFormatting] reconstructed was quite impressive, mostly because of its size."
 dubois_poor_muttaburrasaurus_paleontologist_loc: "\nThe #V Muttaburrasaurus#! that Professor [Scope.GetCharacter.GetLastNameNoFormatting] reconstructed was horrible. For one every other paleontologist noted that the head is not attached to the tail and the knees bend the other way."
 dubois_perfect_rhoetosaurus_paleontologist_loc: "\nThe size of #V Rhoetosaurus#! is impressive. But without Dr. [Scope.GetCharacter.GetLastNameNoFormatting]'s skill it surely wouldn't have been that impressive."
 dubois_imperfect_rhoetosaurus_paleontologist_loc: "\nThe size of #V Rhoetosaurus#! is impressive. But without Dr. [Scope.GetCharacter.GetLastNameNoFormatting]'s skill it would definitely have been less impressive.'."
 dubois_poor_rhoetosaurus_paleontologist_loc: "\nThinking that the tail belongs on the back of the #V Rhoetosaurus#! was probably the most stupid idea of Dr. [Scope.GetCharacter.GetLastNameNoFormatting]. At least yet..."
 dubois_perfect_mosasaurus_paleontologist_loc: "\nThe #o Msasaurus#! that Professor [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] reconstructed is gigantic monster from the sea."
 dubois_imperfect_mosasaurus_paleontologist_loc: "\nThe #o Mosasaurus#! that Professor [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] reconstructed a big monster from the sea."
 dubois_poor_mosasaurus_paleontologist_loc: "\nThe #o Mosasaurus#! that Professor [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] reconstructed was horrible. It is quite certain that Mosasaurus lived in the Ocean, but somehow the skeleton ended up with legs."
 dubois_perfect_plesiosaurus_paleontologist_loc: "\nThe #o Plesiosaurus#! reconstructed by Professor [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] is a huge marine reptile."
 dubois_imperfect_plesiosaurus_paleontologist_loc: "\nThe #o Plesiosaurus#! reconstructed by Professor [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] is a marine reptile that lived during the time of the dinosaurs."
 dubois_poor_plesiosaurus_paleontologist_loc: "\nThe #o Plesiosaurus#! reconstructed by Professor [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] is slightly weird. It has 4 snake like extremeties and a very short had and no tail."
 dubois_perfect_basilosaurus_paleontologist_loc: "\nThe #o Basilosaurus#! reconstructed by Professor [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] is a prehistoric whale that live millennias ago."
 dubois_imperfect_basilosaurus_paleontologist_loc: "\nThe #o Basilosaurus#! reconstructed by Professor [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] is a prehistoric whale."
 dubois_poor_basilosaurus_paleontologist_loc: "\nThe #o Basilosaurus#! reconstructed by Professor [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] has a very weird physiology. It looks more like a ball than anything else which seems quite wrong."
 dubois_perfect_megalodon_paleontologist_loc: "\nThe #o Megalodon#! reconstructed by Professor [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] is a gigantic shark. A truely impressive skeleton."
 dubois_imperfect_megalodon_paleontologist_loc: "\nThe #o Megalodon#! reconstructed by Professor [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] is a gigantic shark."
 dubois_poor_megalodon_paleontologist_loc: "\nThe #o Megalodon#! reconstructed by Professor [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] seems to be a little bit... off. The huge head is mounted to a very thin neck and apparently the shark had weird spikes covering all of its body."
