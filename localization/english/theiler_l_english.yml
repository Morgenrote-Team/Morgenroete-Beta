 theiler.11.t: "The Achromatic Miscroscope"
 theiler.11.d: "[GetPlayer.MakeScope.Var('tesla_engineer_var').GetCharacter.GetFullName] and [GetPlayer.MakeScope.Var('theiler_biologist_var').GetCharacter.GetFullName] today presented their new microscope."
 theiler.11.f: "In 1868 Ernst Abbe invented the apochromatic lens, a microscope lens which eliminates both the primary and secondary color distortion. By 1870, Abbe invented the Abbe condenser, used for microscope illumination. In 1871, he designed the first refractometer, which he described in a booklet published in 1874. He developed the laws of image of non-luminous objects by 1872. Zeiss Optical Works began selling his improved microscopes in 1872, including models with homogenous immersion objective by 1877 and his apochromatic objective microscopes in 1886."
 theiler.11.g: "A revolution for microbiology."
 theiler.12.t: "The Electron Microscope"
 theiler.12.d: "[GetPlayer.MakeScope.Var('tesla_engineer_var').GetCharacter.GetFullName] and [GetPlayer.MakeScope.Var('theiler_biologist_var').GetCharacter.GetFullName] today presented their new microscope."
 theiler.12.f: "To this day the issue of who invented the transmission electron microscope is controversial. In 1928, at the Technische Hochschule in Charlottenburg, Adolf Matthias appointed Max Knoll to lead a team of researchers to advance research on electron beams and cathode-ray oscilloscopes. The team consisted of several PhD students including Ernst Ruska. In 1931, Max Knoll and Ernst Ruska successfully generated magnified images of mesh grids placed over an anode aperture. Apparently independent of this effort was work at Siemens-Schuckert by Reinhold Rüdenberg. According to patent law, he is the inventor of the electron microscope, but it is not clear when he had a working instrument."
 theiler.12.g: "It is even supposed to be able to detect viruses!"

 theiler_has_early_compound_microscope_tt: "#default_text [GetPlayer.GetName] uses the #V Early Compound Microscope#!.#!"
 theiler_has_achromatic_microscope_tt: "#default_text [GetPlayer.GetName] uses the #V Achromatic Microscope#!.#!"
 theiler_has_electron_microscope_tt: "#default_text [GetPlayer.GetName] uses the #V Electron Microscope#!.#!"

 ### 2.5.1 ###

 theiler_cell_culture_tech: "Cell Culture"
 theiler_cell_culture_tech_desc: "Cell culture is the cultivation of animal or plant cells in a nutrient medium outside the organism. In 1885, Wilhelm Roux was the first to successfully maintain embryonic chicken cells in a saline solution for several days, thus demonstrating the basic principle. In 1907, Ross Granville Harrison cultured the spinal cord of amphibians and demonstrated that axons develop as extensions of individual nerve cells. In 1913, Edna Steinhardt, Chai Israeli, and Robert A. Lambert cultivated the vaccinia virus on fragments of guinea pig cornea."

 theiler.51.t: "Pathogen Research"
 theiler.51.d: "Dr. [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] has decided to investigate a dangerous pathogen more closely in order to gain new insights into this scourge of humanity. The research project is still open."
 theiler.51.f: "The study of a pathogen, which consists of discovery and isolation, is an important step in later developing an effective vaccine. The study of a specific pathogen requires a description of the disease, an achromatic microscope or electron microscope (depending on whether it is a bacterium or a virus), and a certain number of known microbes - ultimately, the biologist must be able to distinguish the germ."
 theiler.51.g: "The Cholera Pathogen."
 theiler.51.h: "The Tuberculosis Pathogen."
 theiler.51.i: "The Smallpox Pathogen."
 theiler.51.j: "The Typhus Pathogen."
 theiler.51.k: "The Yellow Fever Pathogen."
 theiler.51.l: "The Measles Pathogen."
 theiler.51.m: "The Scarlet Fever Pathogen."
 theiler.51.n: "The Plague Pathogen."
 theiler.51.o: "The Diphtheria Pathogen."
 theiler.51.p: "The Polio Pathogen."

 theiler.52.t: "Vaccine Research"
 theiler.52.d: "Dr. [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] has set out to develop a revolutionary vaccine to get rid of a scourge of humanity. However, it hasn't yet been decided which disease the vaccine will be developed against."
 theiler.52.f: "Vaccines are medicine's and biology's most powerful weapon against disease. Given a strong healthcare system, they prevent the occurrence of diseases entirely. Before a vaccine can be developed, biologists must have researched the associated pathogen. Some vaccines require technological prerequisites — for example, typhus, yellow fever, and diphtheria require genetics."
 theiler.52.g: "The Cholera Vaccine."
 theiler.52.h: "The Tuberculosis Vaccine."
 theiler.52.i: "The Smallpox Vaccine."
 theiler.52.j: "The Typhus Vaccine."
