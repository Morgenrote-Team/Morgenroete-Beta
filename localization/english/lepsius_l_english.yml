 lepsius_antiquarianism_tech: "Antiquarianism"
 lepsius_antiquarianism_tech_desc: "Collectors of art treasures have been interested in the past since the Italian Renaissance. While Johann Joachim Winckelmann aroused interest in ancient Rome and Greece, the Napoleonic expeditions woke Egypt, from the slumber of the past. Despite these advances, pre-archaeological investigations were shaped by adventurers like Giovanni Battista Belzoni, whose research methods vacillated between treasure hunting and grave robbing."
 lepsius_early_archaeology_tech: "Early Archaeology"
 lepsius_early_archaeology_tech_desc: "After Champollion's preparatory work, Karl Richard Lepsius succeeded in completely deciphering Egyptian hieroglyphs. It symbolizes a change in the archaeological landscape: archaeological societies, institutes and museums promoted a new scientific culture. Nevertheless, Auguste Mariette, one of the founding fathers of monument preservation, did not hesitate to open the serapeum with explosive charges when it was discovered."
 lepsius_modern_archaeology_tech: "Modern Archaeology"
 lepsius_modern_archaeology_tech_desc: "Further advancements in archaeological field methodology arose in the late 19th century. One of the pioneering figures in this was Augustus Pitt Rivers, who meticulously excavated on Cranborne Chase in southern England, emphasising that it was not only items of beauty or value that should be recorded but mundane items as well. Flinders Petrie introduced systematic methodology in archaeology and preservation of artifacts."

