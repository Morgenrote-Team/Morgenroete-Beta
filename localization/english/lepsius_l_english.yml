 notification_lepsius_rosellini_notification_name: "Lepsius' letter to Rosellini"
 notification_lepsius_rosellini_notification_desc: "The German philologist Karl Richard Lepsius presented his improved form of hieroglyphic translation in a letter to the Italian Egyptologist Ippolito Rosellini. Voices are raised to undertake an expedition to Egypt."
 notification_lepsius_rosellini_notification_tooltip: "#header $notification_lepsius_rosellini_notification_name$#!\n$TOOLTIP_DELIMITER$\n$notification_lepsius_rosellini_notification_desc$"
 notification_lepsius_stephens_catherwood_expedition_notification_name: "Stephens & Catherwood Expedition"
 notification_lepsius_stephens_catherwood_expedition_notification_desc: "The American explorer John Lloyd Stephens and the British artist Frederick Catherwood have returned from an adventurous journey on the Yucatán Peninsula - and tell of legendary ruins in the jungle. Scientists have expressed interest in exploring the Mayan culture more closely."
 notification_lepsius_stephens_catherwood_expedition_notification_tooltip: "#header $notification_lepsius_stephens_catherwood_expedition_notification_name$#!\n$TOOLTIP_DELIMITER$\n$notification_lepsius_stephens_catherwood_expedition_notification_desc$"
 notification_lepsius_decipherment_akkadian_notification_name: "Decipherment of the Akkadian language"
 notification_lepsius_decipherment_akkadian_notification_desc: "All the country's newspapers are reporting a breakthrough by renowned researchers led by an experienced archaeologist: the ancient languages of Mesopotamia are no longer a secret. Nothing stands in the way of serious exploration of Babylonia and Assyria."
 notification_lepsius_decipherment_akkadian_notification_tooltip: "#header $notification_lepsius_decipherment_akkadian_notification_name$#!\n$TOOLTIP_DELIMITER$\n$notification_lepsius_decipherment_akkadian_notification_desc$"
 notification_lepsius_support_schliemann_notification_name: "Schliemann discovers Troy!"
 notification_lepsius_support_schliemann_notification_desc: "The German businessman Heinrich Schliemann discovered Troy, long dismissed as a fairy tale. Archaeologists around the world have a new passion for ancient Greece - albeit one that lies in mythical antiquity."
 notification_lepsius_support_schliemann_notification_tooltip: "#header $notification_lepsius_support_schliemann_notification_name$#!\n$TOOLTIP_DELIMITER$\n$notification_lepsius_support_schliemann_notification_desc$"
 notification_lepsius_machu_picchu_notification_name: "Machu Picchu"
 notification_lepsius_machu_picchu_notification_desc: "An archaeological expedition has discovered the lost Inca city of Machu Picchu deep in the Andes. Researchers encourage more intensive study of the region."
 notification_lepsius_machu_picchu_notification_tooltip: "#header $notification_lepsius_machu_picchu_notification_name$#!\n$TOOLTIP_DELIMITER$\n$notification_lepsius_machu_picchu_notification_desc$"
 notification_lepsius_excavation_artifacts_notification_name: "New excavation artifacts"
 notification_lepsius_excavation_artifacts_notification_desc: "This morning our Archaeological Museum received a shipment of new artifacts from our excavation sites."
