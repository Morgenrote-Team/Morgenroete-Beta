 lepsius.14.f: "Currently the Aegean Collection has #p [ROOT.Var('lepsius_aegean_artifact_minor').GetValue]#! @lepsius_aegean_minor! minor artifacts and #p [ROOT.Var('lepsius_aegean_artifact_major').GetValue]#! @lepsius_aegean_major! major artifacts. \n\n The Aegean collection can possibly be #T rearranged#! and thus initiate a new exhibition. However, this requires a certain number of artifacts. \n\n A #T small exhibition#! requires #p 10#! @lepsius_aegean_minor! artifacts, a #T medium exhibition#! requires #p 25#! @lepsius_aegean_minor! artifacts, a #T large exhibition#! requires #p 50#! @lepsius_aegean_minor!, and an #T excellent exhibition#! requires #p 100#! @lepsius_aegean_minor!. In addition, the #T excellent exhibition#! requires #p 1#! @lepsius_aegean_major! major artifact. \n\n The rearrangement of the collection and the preparations for a new exhibition will take about half a year. The bonuses of an exhibition remain permanent - until it is rearranged again."
 lepsius.15.f: "Currently the Pre-Columbian Collection has #p [ROOT.Var('lepsius_precolumbian_artifact_minor').GetValue]#! @lepsius_precolumbian_minor! minor artifacts and #p [ROOT.Var('lepsius_precolumbian_artifact_major').GetValue]#! @lepsius_precolumbian_major! major artifacts. \n\n The Pre-Columbian collection can possibly be #T rearranged#! and thus initiate a new exhibition. However, this requires a certain number of artifacts. \n\n A #T small exhibition#! requires #p 10#! @lepsius_precolumbian_minor! artifacts, a #T medium exhibition#! requires #p 25#! @lepsius_precolumbian_minor! artifacts, a #T large exhibition#! requires #p 50#! @lepsius_precolumbian_minor!, and an #T excellent exhibition#! requires #p 100#! @lepsius_precolumbian_minor!. In addition, the #T excellent exhibition#! requires #p 1#! @lepsius_precolumbian_major! major artifact. \n\n The rearrangement of the collection and the preparations for a new exhibition will take about half a year. The bonuses of an exhibition remain permanent - until it is rearranged again."

 lepsius.99.t: "Moving the Archaeological Museum"
 lepsius.99.d: "Out of some reason we have an [GetBuildingType('building_lepsius_archaeological_museum').GetName] but it is not located in our marvellous Capital. Obviously we have to move it to the Capital!"
 lepsius.99.f: "\"Please be vareful with the vases, they are very fragile! No! You can't just throw them in a box like that, they need some sort of padding! I really don't think this is a great idea!\""
 lepsius.99.g: "Now I can go there every day!"

 lepsius.140.d: "Our archaeologist has used [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] connections to recruit highly qualified personnel for the expedition."
 lepsius.250.f: "It started with an argument, which was followed by curses, threats and finally fisticuffs. The incident ended in a full-blown tavern brawl. Right in the middle: our expedition leader. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] temper has cost us a lot of reputation. A report of the faux pas reached a high dignitary this morning. We averted a major diplomatic incident, but the bad impression will linger for a long time."
 lepsius.260.f: "Good news! As it turned out, our expedition leader proved to be an impeccable [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetCustom('academics_gentleman_or_gentlewoman_type')] during [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] trip. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis|U] tactful and charismatic demeanor is equated with typical [ROOT.GetCountry.GetAdjectiveNoFlag] behavior. Our nation's reputation there has increased significantly."
 lepsius.270.d: "The leader of our expedition stands out above all because [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] sits in the café every day to drink soda and eat ice cream."
 lepsius.270.f: "There are ambitious leaders who do nothing but work all day. They want to achieve great things or accumulate wealth. Some want to be famous for their deeds. Others are obsessive about every detail. Not so our archaeological director. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe]'s made a habit of beating the heat every day by binging on soda and gulping down ice cream. You could call that laziness. For others, it is a sign of human elegance, good taste, and having the right priorities in life."
 lepsius.280.d: "Our expedition leader's diplomatic skills have resulted in [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim] being invited and rewarded by the local governor."
 lepsius.311.d: "The leader of the last archaeological expedition abroad has decided to publish the diary [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] wrote during the trip."
 lepsius.312.d: "[SCOPE.sCharacter('lepsius_scientific_writer').GetFullName] has decided to publish the scientific paper [SCOPE.sCharacter('lepsius_scientific_writer').GetSheHe] wrote during the trip."
 lepsius.408.f: "A nazar is an amulet meant to protect against the evil eye. Such a superstition exists in large parts of the Orient, but also in parts of the Mediterranean. Of course, it would be absurd to think that a scientifically trained mind could protect itself with a talisman to keep evil forces from wreaking havoc on the expedition. The situation is different with the local helpers and porters. They ask the leader to get one of the amulets, convinced that otherwise [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] will face great misfortune. Whatever the nazar's abilities, if it doesn't affect the expedition then at least affect the morale of our minions."
 lepsius.409.f: "As our expedition progressed along a coast, they soon encountered a broad bay whose extreme promontories nearly touched. Instead of going the long way around, some Greek fishermen offered to take us across the bay. The expedition leader quickly accepted the offer. In a conversation with the fishermen, [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] was also able to obtain important information about a ruin not far away, which probably dates from pre-classic times."
 lepsius.421.d: "Our archaeologist has found a small Egyptian lapis lazuli scarab that [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] would like to keep."
 lepsius.452.f: "In the past, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] had repeatedly heard that there must be historical records of long-destroyed archaeological sites in the area. A few days ago [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] received a helpful tip: a merchant possessed a 16th-century manuscript containing a copy of records long lost. The originals are probably lost forever, but at least there is the possibility of reconstruction."
 lepsius.461.f: "There was this strange, crushing feeling. Middle of the night. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] stood up, believing in the wind beating against the pitched tent in the desert sand; but it was more than wind. It was an odd whisper. A murmur that rose to dissonant tones until it increased to a melodic song. Like siren song, it beguiled - and clouded the senses. At least, that was what [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetLastName] claimed when, after hours of searching, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] was found at the paws of the Great Sphinx of Giza, digging like a madman, convinced that beneath the Sphinx was a secret chamber from which knowledge was to be found been hidden for thousands of years. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetHerHis] condition has hardly improved since then. This place has a truly bad influence on [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetHerHim]."
 lepsius.462.f: "There was this strange, crushing feeling. Middle of the night. [SCOPE.sCharacter('lepsius_military_attache').GetFullName] stood up, believing in the wind beating against the pitched tent in the desert sand; but it was more than wind. It was an odd whisper. A murmur that rose to dissonant tones until it increased to a melodic song. Like siren song, it beguiled - and clouded the senses. At least, that was what [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetLastName] claimed when, after hours of searching, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] was found at the paws of the Great Sphinx of Giza, digging like a madman, convinced that beneath the Sphinx was a secret chamber from which knowledge was to be found been hidden for thousands of years. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetHerHis] condition has hardly improved since then. This place has a truly bad influence on [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetHerHim]."
 lepsius.465.f: "Our expedition leader makes no bones about where he's from, what language [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] speaks, what food [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] prefers, and which culture [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] thinks is superior. The insults against the locals increase by the day - whether against recruited staff or random people. Traveling through different villages, [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] has developed the attitude of treating the mayors like [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] subordinates. Even the most hospitable gesture is not enough for [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim]. There have already been several complaints from various parts of the local administration about [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName]'s arrogant and defamatory behavior, and our expedition is increasingly degenerating into a negative publicity campaign for our country."
 lepsius.467.f: "Not much is left of the former Christian Middle East - and yet there are the scattered Christian communities of Copts, Maronites, Chaldeans and Armenians that have survived for centuries. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName], who actually had no religious intentions when [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] started the trip, had a local priest lead [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim] to a long-forgotten church last night. Archaeologically and historically interesting, the clergyman only later unveiled a reliquary containing a relic of a church father that was believed to have been lost. Since it was already late and the camp was far away, the expedition leader stayed there for a night and a morning. A dream that hasn't let [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim] rest since then and which [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] hardly ever talks about means that [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] wants to change [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] life in certain areas. The priest has offered to give [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim] part of the forgotten relic to strengthen [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim] in his newly found faith."
 lepsius.467.g: "Did [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] have a beatific vision?"
 lepsius.471.g: "[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe|U] should take his time and find out as much as possible about the place."
 lepsius.471.h: "[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe|U]'s allowed to stay there longer - if [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] brings some artifacts with him."
 lepsius.471.i: "[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe|U] is allowed to visit the place, but only for as long as necessary."
 lepsius.472.f: "[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] has an unbelievable explanation for the enormous loss of people and material. It is outrageous as well as shameful - especially for the mind of a reasonably enlightened individual. The expedition leader claims that [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] and [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetHerHis] men were lost for a week before they stumbled upon an unfamiliar valley surrounded by high mountains in the impenetrable Yucatán forest. Hoping to find a previously unknown Mayan site, they devised a plan to explore the valley - a huge mistake, as it turned out. For the valley is home to terrible monsters, mighty lizards. In fact, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] explained to us that extinct dinosaurs have lived in this 'lost world' for millions of years, having survived because they were isolated. The beasts terrorized the expedition team and ruthlessly mauled several porters and researchers. On the run [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] would have had to give up much of the equipment. Now [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe]'s begging us to re-equip the entire expedition. We don't know why [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] thinks [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] can impress us with this fairytale story - rather, doubts are raised as to whether [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] is still the right man to run this company!"
 lepsius.472.g: "Is [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] saying dinosaurs ate our expedition?!"
 lepsius.501.h: "Let [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim] investigate further."
 lepsius.506.f_engine: "Unfortunately, our expedition members hardly had time to explore the tomb of the Unknown Pharaoh in more detail. Rocks crumbled from the ceiling and sand trickled through upper cracks as our archaeologists hacked their way through the burial chamber. Apparently the environment consisted of a much more porous rock than assumed; and the detached boulder had finished the construction. With quick wits, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] stayed the course despite the risk and fought [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] way to the sarcophagus to have all available men take it out. A magnificent, unique piece that will probably console us for the loss of the remaining finds - after all, the entire royal tomb threatens to collapse within minutes ..."
 lepsius.506.f_muscular: "It was a truly historic experience when [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName], entered the actual burial chamber. A special surprise awaited [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim]: the sarcophagus together with the mummy of the Unknown Pharaoh still rested where he was buried more than 3,000 years ago! Again, the incomparably strong Paduan was to help us - and lift the wooden sarcophagus and mummy out of the granite enclosure. But as happy as our archaeologists were at first, their later unhappiness was greater. During the lunch break, as the team shared bread in the decorated gallery, a terrible crunching and cracking sounded from the burial chamber. To the horror of the excavation helpers and our expedition leader, the giant muscle man had also allowed himself a break - and accidentally sat on the sarcophagus. Only scraps remain of the king mummy and the wooden coffin..."
 lepsius.532.f: "The military attaché has repeatedly warned against entering Kurdish territory. Past expeditions to this area have not had good experiences with the locals. The Kurds are considered free, honorable - but also proud. Invading their territory might anger them. [SCOPE.sCharacter('lepsius_military_attache').GetFullName] has therefore insisted on arming several men in order to be able to more effectively combat unpleasant incidents. While the attaché is expecting the worst, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] would like to find the Kurdish tribe as quickly as possible in order to negotiate with them and find an amicable settlement in order to quickly get the Lamassu into [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] own hands. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] proposes splitting up the troops: the unarmed men, untrained porters, and most of the provisions and equipment should stay behind while [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] goes ahead with the military attaché to create a more flexible force that can efficiently search for the lamassu. The attaché, on the other hand, expressed his concern that the remaining part of the expedition would then be completely helpless in the event of a Kurdish attack."
 lepsius.534.f: "Far too late, the expedition leader realized that his latest attempt to win favor with the native tribes produced the opposite of what [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] had intended. A shriek went through the tent, and instinctively some of the subordinates were already laying their hands on their weapons. Tension was in the air from then on, and the military attaché saw his concern confirmed that this conflict could not be settled with diplomacy, but only with violence. He only has a short time to line up the men he has brought with him. Some research assistants are already insisting on packing up and gaining as much distance as possible."

 lepsius.561.f: "Haze hangs over the Yucatec hills as the column pushes through the selva. Jaguars cry in the distance; the air hums with mosquitoes, and fever fells more than one of our helpers. What remains is a party of three and a few porters. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] signals a halt. Stelae and carved stones stud the ground; half-buried steps, slick with moss, climb a broken terrace. The outline of a Maya pyramid emerges. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe|U] cocks an ear as a porter raises his hand and calls: 'Patrón—an opening!'"
 lepsius.562.f: "Insisting on entering alone, the expedition leader passes the bleached bones of an earlier intruder and confronts a panel crowded with glyphs. Four recessed cartouches—visages of great gods—can be pressed like keys. Beneath them runs the distich: the one who rises in the east, blazes at zenith, descends at dusk, and keeps the count of days. The device is plainly a test; one mistake could be [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetHerHis] undoing."
 lepsius.563.f: "Footfalls echo in a narrow passage. By torch‑light the walls glimmer with engravings; roots of giant trees bite through a fallen lintel. Beyond, a chamber opens—a low altar at its heart, an idol glinting faintly in the gloom. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe|U] weighs a satchel of sand in [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetHerHis] left hand, judges the idol’s mass with the right, and steadies [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetHerHis] breath. One clean exchange—then out."
 lepsius.564.d: "It may be that [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] read the riddle amiss—or merely that the builders trusted no one. A thunder rolls; a stone sphere tears free and barrels down the corridor toward [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetHerHim]."
 lepsius.564.f: "The switch is made; the bag rests upon the altar. For a heartbeat nothing moves. Then a dull tremor builds, dust sifts from the ceiling, and a roar answers from above—it is a gigantic rolling boulder!"
 lepsius.565.d_wrong: "When [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] stumbles into the light, a worse surprise awaits: the camp has been overrun, and armed men demand the idol—or [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetHerHis] life."
 lepsius.565.f_right: "It was an affair of wit, not muscle. Choosing K'inich Ajaw, the Sun Lord who 'keeps the count of days,' spared [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetHerHim] the device’s malice. Slipping through the contrivances unscathed, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] secures the idol and hastens out; word reaches [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetHerHim] that a rival party is on the way, and so the team quits the site at once."
 lepsius.565.f_wrong_right: "As [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] flees the passage, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] catches a root and swings clear while the stone hurtles past and bursts into the jungle. Outside lie scattered spears and fallen men—the wreckage of an ambush undone by the same trap. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe|U] cannot prove it, but the scene bears the touch of a foreign rival who meant to let us spring the hazards for him. No matter—time to move on."
 lepsius.565.f_wrong: "With a final leap [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] gains the threshold—only to be ringed by bowmen. A suave voice with a soft [SCOPE.sCountry('lepsius_archaeological_rival').GetAdjectiveNoFlag] accent drifts from the trees as a man in pale linen steps forward: 'A pleasure at last. But this piece belongs in better hands.' Outnumbered and with the porters slain, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe|U] yields the idol. 'Too bad the Hovitos do not know you as I do,' [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] mutters—and seizes a chance to escape, empty‑handed."
 lepsius.581.d: "[SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] has come forward with a personal concern: [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] wants to prove that the "Lost World" actually exists and thus restore his honor. [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe|U]'s raising money for a private expedition."
 lepsius.581.f: "Several years have passed since much of the Yucatán expedition mysteriously disappeared. [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] has since become the laughingstock of the academy. Cartoons in the newspapers portray [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHim] as crazy with [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHis] 'Dino stories'. The trauma has left deep scars: [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] is obsessed with proving to the world that the alleged valley is real. [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe|U] is said to have now spent [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHis] entire inheritance to set up an expedition at [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHis] own expense. Of course, [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] also asked the state for support for [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHis] completely insane journey. Our experts advise against this suicide mission - everyone knows how the last expedition to Yucatán went. There are therefore voices that want to forbid such an expedition altogether. However, this could only aggravate [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHis] mental state. Still others think [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] should be let go, but without further official interference; after all, nobody wants to be associated with the journey of an apparently mentally disturbed man. Only a minority even thinks to open their wallets for this madness. They argue that we have an alleged responsibility for [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHis] condition..."
 lepsius.581.h: "May [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] hunt [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHis] dinosaurs."
 lepsius.582.f: "Months after [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] disappeared into the forests of Yucatán, the exhausted adventurer reappeared in the provincial capital of Mérida. Again [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] had lost many helpers and the rest of [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHis] troupe was in a sorry state. Alongside a number of witnesses, however, [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] had one compelling piece of evidence: thanks to modern photographs, verified as authentic by several scholars, [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] has unbeatable claims for [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHis] wild stories. And indeed: one can clearly see pterosaurs and herbivorous brontosaurs on the illustrations! The people celebrate [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] as an idol, the professional world is shocked, and our government is seen as a stubborn group of ignoramuses who have denied a national hero the fame [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] deserves!"
 lepsius.583.d: "We haven't heard from [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] for months. Apparently [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] is lost in the unknown depths of the Yucatán forest."
 lepsius.583.f: "Perhaps one day tragic plays could be made about the matter. [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName], who was close to mad shortly before [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHis] life, apparently searched for traces of the alleged dinosaur valley to the last. Disease and hostile Mayan tribes killed [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHis] expedition. One of the few survivors reports that [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] last claimed to have rediscovered the slopes of the plateau in which the valley lies. But the last of the men would have mutinied and gone home. Nobody knows what became of [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHim]. However, we have reason to believe that alone and emaciated, [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] had little chance of surviving whatever ultimately killed [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHim]."
 lepsius.583.g: "[SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe|U] really wasn't a bad guy. A bad explorer yes, but noch a bad guy."
 lepsius.584.f: "Actually, everyone had expected that this journey would not be long: either because the circumstances condemned the men to death or a mutiny would break out. The discovery one morning was all the more astonishing. [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] had been leading the troop through the impenetrable forests of Yucatán for days like a manic prospector. It seemed as if [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] recognized every tree and every stone. The other expedition members had taken this as either madness or part of an elaborate plan to deceive them and give them false hope. But now, on the slopes of a vast plateau, in the hollow of which lies the fabled valley [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe]'s been talking about for years, some are revising their views. The scream of a pterodactyl reverberates through the air and pierces through the ears of the participants so deeply that all doubts are dispelled."
 lepsius.586.f: "Actually, [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] should be satisfied: [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] was right with all [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHis] claims. The team has already collected a whole range of evidence that should cause a sensation at home. But on closer exploration of the Lost World, it turns out more and more that [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] was not the first person in this valley. In fact, there seems to have been a significant Mayan presence in this area around 1,500 years ago. Apparently, the inhabitants of a hitherto unknown Mayan city came to this valley at regular intervals. [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] speculates that the tradition of human sacrifice might have its origins here. Be that as it may, there is strong evidence that the valley served a religious function. A collaborator recently unearthed Mayan artifacts, suggesting that their discovery might cause an even greater sensation than a few scattered giant lizards. The problem: the suspected Mayan site is in the middle of an area inhabited by raptors! Most of the expedition members therefore insist on returning home immediately instead of letting one suicide mission follow the next."
 lepsius.587.f: "Only one survivor. Nothing more is left of the expedition. It is a young research assistant at the university. He is traumatized and physically in poor condition. So reports a telegram from Yucatán. You couldn't squeeze a lot out of him. Apparently, our expedition leader made a crucial, tragic mistake when attempting to survey a Mayan site in the Lost World. A mistake for which almost all members of the expedition paid with their lives. The incident caused such a shock that all trips to the Yucatán that were not strictly archaeological were banned indefinitely."
 lepsius.587.g: "[SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe|U] chose ... poorly."
 lepsius.588.f: "Kukulkan was known to the Mayans as the feathered serpent - a deity worshiped by the Aztecs under the name Quetzalcoatl. Was it a coincidence that the Maya knew of this valley? Was there a connection between the Lost World and the Kukulkan cult? [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] cannot decide this yet. What [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] did discover, however, was that between raptor nests lay a long-forgotten sanctuary that represented the feathered serpent that is called Kukulkan in this country. A mysterious gem set in an amulet was striking. It is of such amazing beauty that the expedition leader dubbed it the 'Gem of Kulkulkan' - the deity possessed a jewel with which he could control the wind. It is probably one of the greatest archaeological finds of Central and South America."
 lepsius.588.g: "[SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe|U] chose wisely."
 lepsius.589.d: "Our expedition from the Lost World led by [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] has returned. [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe|U] and his team are celebrated as heroes by the people."
 lepsius.589.g: "Glory to [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHim]!"

 lepsius.803.d: "[SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] has completed his travel preparations. [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetSheHe|U] will leave today to advance the knowledge at an already established excavation site."
 lepsius.803.f: "The absence of our archaeologist is expected to be around a year but may vary depending on the situation. At the end of [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetHerHis] activity [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetSheHe] will open up a new excavation site, the quality of which may vary. [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetSheHe] will also find references to previously unknown archaeological sites."
 lepsius.811.f_vok: "[SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] reports that [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetSheHe] has discovered a small tomb in the Valley of the Kings. Grave robbers have apparently already stolen a large number of objects, and graffiti shows that it was also known in Late Antiquity. The expedition leaders decided to carry out an excavation there in the hope of being able to report more finds later."
 lepsius.811.f_ass: "The excavation in Assyria had its difficulties from the start. After a few days, [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] still couldn't find a good excavation site, so [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetSheHe] contented himself with the next best site. So far they have only uncovered the foundations of a shrine that may have once been part of a larger complex."
 lepsius.812.f_bab: "Times have not devoured all the witnesses of Babylonian greatness in Mesopotamia. After [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] had refreshed [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetHerHis] water supplies, locals told [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetHerHim] about a strange ruin that the devout Muslims in the region avoid because of their pagan origins. As it turned out, it is the remainder of a ziggurat. The complex is surprisingly well preserved and according to the latest reports, our archaeologists have even unearthed the first finds."
 lepsius.813.f_vok: "A sensational telegram arrived this morning. [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] reports that [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetSheHe] has discovered the tomb of a Queen. The identity of the dead consort is not entirely clear, but according to initial reports the burial chamber is surprisingly intact. Wall paintings and valuable artifacts give a valuable insight into Ancient Egypt that has not been known for a long time."
 lepsius.813.f_bab: "Legends of the Babylonian gates and city walls have survived for thousands of years. But it is always something else when they are in front of you. At first, [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] couldn't believe it as [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetSheHe] walked wall after wall and discovered the enormous dimensions of a lost city. This discovery will keep us busy for years to come."
 lepsius.813.f_ass: "In addition to being a major military power, the Assyrians were also famous for their gardens. Some even claim that the famous Gardens of Babylon were actually located in the Assyrian capital of Nineveh. During the excavation of a palace complex and adjoining terraces, [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] was able to see for [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetHerselfHimself] the splendor of Assyrian culture. The museum management rejoices."

 lepsius.2191.t: "Inca Bathing Complex Unearthed"
 lepsius.2191.d: "Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] unearthed a spectacular find in [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]. The site has revealed a bath complex of the Inca Empire. Initial assumptions are that the complex was used for ritual ceremonies."
 lepsius.2191.f: "\"Isn't it ironic that we dug up a bath and could use a bath ourselves now?\""
 lepsius.2191.g: "A bath would be great right now!"

 lepsius.2192.t: "Inca Skull with a Hole discovered"
 lepsius.2192.d: "A strange Fund was made in [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]. During the excavation of an Inca site, Professor [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] came across a large number of bones. One skull in particular caught [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] eye. The skull had a hole that appeared to have been made on purpose. Apparently, the deceased survived the trial, as the hole had partially closed again."
 lepsius.2192.f: "\"I'm sure it must have been a human sacrifice! What do you think?\""
 lepsius.2192.g: "Aliens!"

 ### 2.1.2d ###

 lepsius.2193.t: "Incan Mountain Mummies"
 lepsius.2193.d: "During an expedition with [SCOPE.sCharacter('lepsius_mountaineer_character_scope').GetFullName] in [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName], Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] made a shocking discovery. On a mountain they found the remains of a young girl, who was now mummuified. It seems that she was a "qhapaq hucha" of the Incans, a child sacrifice. Although it is a sad find it could lead to various new insights into the Inca."
 lepsius.2193.f: "\"It was ice cold, the wind the wind tore at our clothes and we could barely see anything. When we noticed the body, we first thought that it was a mountaineer who died in similar circumstances that we had to endure now. But soon we realized that it was not a mountaineer but a young girl.\""
 lepsius.2193.g: "This is quite sad."

 lepsius.2194.t: "Inca Ruins"
 lepsius.2194.d: "Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] made a discovery in a far of region of [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]. He found various ruins from the time of the Inca Empire. Most of the ruins are scorched and some European equipment was found, which led to the idea that this settlement was destroyed by the Spanish. They probably also plundered the settlement, as no other finds were made. Everything of value seemed to have been removed."
 lepsius.2194.f: "\"A long time ago those ruins must have been well constructed dwellings. They seem to be able to withstand even earthquakes. Just... Spanish invaders seem to be stronger than earthquakes apparently.\""
 lepsius.2194.g: "No gold? Why even bother?"

 ### 2.1.3 ###

