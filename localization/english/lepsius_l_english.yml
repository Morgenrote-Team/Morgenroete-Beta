 lepsius.1502_mauer_t: "#T Homo Heidelbergensis#! discovered by [SCOPE.sCountry('lepsius_heidelbergensis_finder_country').GetName]"
 lepsius.1502_mauer_d: "\nThe lower jaw of Homo heidelbergensis was discovered near Heidelberg and is considered the oldest evidence of an early human in Europe and marks an important transition between Homo erectus and later hominins."

