 lepsius_upper_egypt_expedition_decision: "The Valley of the Kings"
 lepsius_upper_egypt_expedition_decision_desc: "With the old capital Thebes and the Valley of the Kings, Upper Egypt is considered the Mecca of Egyptology. We should acquire an excavation license for the area and search for Egyptian treasures."
 lepsius_lower_egypt_expedition_decision: "The Pyramids"
 lepsius_lower_egypt_expedition_decision_desc: "Since the beginning of time, the Egyptian pyramids have fascinated mankind. It is said that other tombs, temples and even cities that have disappeared in the sands of Lower Egypt are waiting to be rediscovered."
 lepsius_babylonia_expedition_decision: "The Cradle of Civilization"
 lepsius_babylonia_expedition_decision_desc: "Babylonia, the southern part of Mesopotamia, owes its name to the once powerful city of Babylon. The region is considered the 'cradle of civilization' where precious archaeological artifacts are discovered again and again. They definitely belong in a museum."
 lepsius_assyria_expedition_decision: "The Gardens of Assyria"
 lepsius_assyria_expedition_decision_desc: "Assyria refers to the northern part of Mesopotamia with the two important cities of Assur and Nineveh. The sparse knowledge about the country can still be traced back to the Bible as a source - but maybe there is historical evidence that is more reliable?"
 lepsius_argolis_expedition_decision: "Agamemnon's city"
 lepsius_argolis_expedition_decision_desc: "After the discovery of Troy, even skeptical scientists come to realize that the myths of the ancient Greeks are more than just fairy tales. The remains of Bronze Age cities are said to lie in Argolis to this day, the best known of which is Mycenae. We should convince ourselves of that."
 lepsius_crete_expedition_decision: "The Tale of the Minotaur"
 lepsius_crete_expedition_decision_desc: "The legendary King Minos is said to have once ruled over Crete. Similar to Troy and Mycenae, there also seems to be something to this story: artifacts from the legendary Minoan culture are increasingly found on the island. Our nation should also secure a few of them."
 lepsius_yucatan_expedition_decision: "Lost Cities of the Maya"
 lepsius_yucatan_expedition_decision_desc: "Reports of unknown and huge cities in the middle of the jungle increased. We should investigate further and send an archaeological expedition to Yucatán."
 lepsius_peru_expedition_decision: "The Hidden Legacy of the Incas"
 lepsius_peru_expedition_decision_desc: "Pilots report strange fortresses and walled structures in the Andes that they saw on their flights over Peru. Maybe the Spaniards didn't completely destroy the culture of the Incas? Some towns of indigenous resistance have not been found to this day."
 lepsius_found_archaeological_museum_decision: "Found an Archaeological Museum"
 lepsius_found_archaeological_museum_decision_desc: "Every self-respecting nation has a unique museum in its capital to display all the cultural assets it has acquired from daring adventures or scientific expeditions of the highest quality. The number of artifacts and the number of different collections not only add value to the prestige in the world, but also have educational value."
 lepsius_visit_archaeological_museum_decision: "Visit the Archaeological Museum"
 lepsius_visit_archaeological_museum_decision_desc: "View the statistics on your acquired artifacts and rearrange them into prestigious exhibitions."
 lepsius_appoint_lead_scientist_decision: "Appoint a Lead Scientist"
 lepsius_appoint_lead_scientist_decision_desc: "Appoints a new Lead Scientist for the Archaeological Museum. The character will hold this position for about 15 to 20 years. The naming will save him from disappearing from the political scene during this period."
 lepsius_found_archaeological_society_decision: "Found an Archaeological Society"
 lepsius_found_archaeological_society_decision_desc: "Not only the interest in archaeology is constantly increasing in our nation. After many years of expeditions, excavations and artifact discoveries, our country has built up an amazing archaeological expertise. An outstanding archaeologist could set up an Archaeological Society to gather the scientific and intellectual forces and provide new impetus. This would not only improve our scientific output, but also enhance the experience of subsequent generations of archaeologists."
 lepsius_inspect_excavation_decision: "Organize an in-depth archeological inspection"
 lepsius_inspect_excavation_decision_desc: "We can send an experienced archaeologist to an area where we are excavating to intensify our efforts there. Our archaeologist will open up a new excavation site in about a year and conduct intensive research, during which we can find further indications of previously unknown, major archaeological discoveries. The success largely depends on the experience of our archaeologist. The establishment of an Archaeological Society also increases our chances."

 lepsius.2.t: "Lettre à M. le Professeur Rosellini"
 lepsius.2.d: "The German philologist [SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName] presented his improved form of hieroglyphic translation in a letter to the Italian Egyptologist Ippolito Rosellini. Voices are raised to undertake an expedition to Egypt."
 lepsius.2.f: "After the death of François Champollion, research into hieroglyphs came to a halt. In 1837, the young German philologist [SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName] wrote a letter to Ippolito Rosellini, a close companion of Champollion and jointly responsible for the Franco-Tuscan Egyptian expedition of 1829. Lepsius systematized and presented the knowledge accumulated by Champollion and was instrumental in elevating Egyptology to a serious science. On the other hand, he convinced the political elites of Europe of future expeditions to Egypt."
 lepsius.2.a: "We will explore the wonders of Egypt!"
 lepsius.3.t: "Stephens and Catherwood"
 lepsius.3.d: "The American explorer John Lloyd Stephens and the British artist Frederick Catherwood have returned from an adventurous journey on the Yucatán Peninsula - and tell of legendary ruins in the jungle. Scientists have expressed interest in exploring the Mayan culture more closely."
 lepsius.3.f: "Was the New World only home to savages and barbarians before Europeans reached the continent? The explorers John Lloyd Stephens and Frederick Catherwood profoundly shook this world view. For several years, the American and the Brit roamed the jungle of the Yucatan Peninsula and, according to their own statements, visited 44 different locations of a long-gone Mesoamerican culture. The locals have been telling stories of long-forgotten cities in the jungle and temples hidden in the jungle for a long time; but Stephens' reports, and especially Catherwood's stunning lithographs, open up a world hitherto completely unknown. The images of temples, statues and steles not only inspire the fantasies of romantics. A wave of interest in the unknown civilization is spreading across the US and Europe, ranging from curiosity to glorification to genuine scientific interest."
 lepsius.3.a: "We should stock up on fine leather jackets."
 lepsius.4.t: "Decipherment of the Akkadian language"
 lepsius.4.d: "All the country's newspapers are reporting a breakthrough by renowned researchers led by an experienced archaeologist: the ancient languages of Mesopotamia are no longer a secret. Nothing stands in the way of serious exploration of Babylonia and Assyria."
 lepsius.4.f: "Already under the German mathematician Carsten Niebuhr, the cuneiform tablets had aroused the interest of scholars in the 18th century and efforts were made to decode them and to translate the languages. Georg Friedrich Grotefend, Anquetil-Duperron and Antoine Isaac Silvestre de Sacy played a decisive role in the decipherment of Old Persian cuneiform scripts; their studies were confirmed with the decipherment of the hieroglyphs and the quadrilingual 'Calyus Vase'. After the discovery of the monumental inscription of Behistun, which contained older languages ​​of Mesopotamia in addition to the now well-known Persian, it was only a matter of time before Elamite, Babylonian and Akkadian would be understandable again after centuries. After inviting various Assyriologists who claim to understand these ancient languages, one of our academies tested them: independently, they should translate the same inscription. Amazingly, the translations of all scholars agreed. A serious exploration of the oldest cultures of mankind in Mesopotamia can now begin."
 lepsius.4.a: "We are the heirs of Champollion."
 lepsius.5.t: "Schliemann discovers Troy!"
 lepsius.5.d: "The German businessman Heinrich Schliemann discovered Troy, long dismissed as a fairy tale. Archaeologists around the world have a new passion for ancient Greece - albeit one that lies in mythical antiquity."
 lepsius.5.f: "Where does science end, where does myth begin? The present has done everything to separate religion and knowledge. We have banished legends and sagas that decades ago were believed to be reality to the realm of fairy tales. But then it bursts out into the world, first into the newspapers, then into the academies: Troy has been discovered! The legendary city of Priam, which Homer sang about in his Iliad, the story that every educated citizen of the West knows - it is more than just a myth. The German merchant Heinrich Schliemann was not impressed by the disenchantment of the world and even claims that he has found a valuable treasure: Priam's treasure. The archaeological world was shocked and fascinated by this event - are other stories from the distant past perhaps true after all? Do more sunken cities lie on the shores of the Aegean to be rediscovered?"
 lepsius.5.a: "Menin aeide, thea, Peleiadeo Achileos ..."
 lepsius.6.t: "Machu Picchu"
 lepsius.6.d: "An archaeological expedition has discovered the lost Inca city of Machu Picchu deep in the Andes. Researchers encourage more intensive study of the region."
 lepsius.6.f: "There are certain narratives that dominate our present. Everything has been conquered, everything has been discovered, and everything has been said. There isn't a patch of land that doesn't already have a colonial flag, no village that isn't connected to the railroad, and no breakthrough technology that we already know about. And yet there are moments when the nihilism of the elite cracks. The race to the poles, the conquest of the skies and the preoccupation with the last mysteries of mankind show that history is not over. The discovery of the city of Machu Picchu is just a fragment that shows how little we know about the world we think we understand and control. Perhaps there is something to the tales of unknown Inca cities, which have been interpreted as misleading the Spaniards. Vilcabamba, the last capital of the free Incas, has not been found to this day..."
 lepsius.6.a: "Time to grab my fedora!"

 lepsius.10.t: "Museum Inauguration"
 lepsius.10.d: "The Archaeological Museum was opened in a solemn ceremony today."
 lepsius.10.f: ""
 lepsius.10.g: "I can't wait to visit the museum!"
 lepsius.10.h: "Champagne! Champagne!"
 lepsius.11.t: "Visiting the Museum"
 lepsius.11.d: "Welcome to the Archaeological Museum."
 lepsius.11.f: "Our museum collection currently includes a #T total of #G [ROOT.Var('lepsius_total_artifacts').GetValue]#! Artifacts.#! \n\nThe artifacts are divided into the following collections: \n\n#T Egyptian Collection:#! \n#G [ROOT.Var('lepsius_egyptian_artifact_minor').GetValue]#! @lepsius_egypt_minor! minor artifacts and #G [ROOT.Var('lepsius_egyptian_artifact_major').GetValue]#! @lepsius_egypt_major! major artifacts. \n\n#T Mesopotamian Collection:#!\n#G [ROOT.Var('lepsius_mesopotamian_artifact_minor').GetValue]#! @lepsius_mesopotamia_minor! minor artifacts and #G [ROOT.Var('lepsius_mesopotamian_artifact_major').GetValue]#! @lepsius_mesopotamia_major! major artifacts. \n\n#T Aegean Collection:#!\n#G [ROOT.Var('lepsius_aegean_artifact_minor').GetValue]#! @lepsius_aegean_minor! minor artifacts and #G [ROOT.Var('lepsius_aegean_artifact_major').GetValue]#! @lepsius_aegean_major! major artifacts. \n\n#T Pre-Columbian Collection:#!\n#G [ROOT.Var('lepsius_precolumbian_artifact_minor').GetValue]#! @lepsius_precolumbian_minor! minor artifacts and #G [ROOT.Var('lepsius_precolumbian_artifact_major').GetValue]#! @lepsius_precolumbian_major! major artifacts.\n\n#T Archaeological Teams:#!\nWe have #G [ROOT.Var('lepsius_excavation_teams').GetValue]#! available teams out of a total of #G [ROOT.Var('lepsius_total_excavation_teams').GetValue]#!."
 lepsius.11.g: "This has been pretty educational. Until next time!"
 lepsius.11.h: "Visit the Egyptian Collection"
 lepsius.11.i: "Visit the Mesopotamian Collection"
 lepsius.11.j: "Visit the Aegean Collection"
 lepsius.11.k: "Visit the Pre-Columbian Collection"
 lepsius.11.l: "Visit the Lead Scientist"
 lepsius.11.m: "Visit the Major Artifacts"
 lepsius.11.n: "Visit the World Cultures Collection"
 lepsius.11.o: "Show me the countries with the most Artifacts!" #1.8.6
 lepsius.12.t: "Egyptian Collection"
 lepsius.12.d: "This section includes artifacts from Upper and Lower Egypt."

 lepsius.12.g: "Arrange a small exhibition."
 lepsius.12.h: "Arrange a medium-sized exhibition."
 lepsius.12.i: "Arrange a large exhibition."
 lepsius.12.j: "Arrange an excellent exhibition."
 lepsius.12.k: "Back to the main hall."
 lepsius.12.l: "Leave the museum."
 lepsius.13.t: "Mesopotamian Collection"
 lepsius.13.d: "This section includes artifacts from Babylonia and Assyria."

 lepsius.14.t: "Aegean Collection"
 lepsius.14.d: "This section includes artifacts from Argolis and Crete."

 lepsius.15.t: "Pre-Columbian Collection"
 lepsius.15.d: "This section includes artifacts from Yucatán and Peru."

 lepsius.16.t: "[SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName]"
 lepsius.16.d: "This is the office of our nation's foremost archaeologist, Professor [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName]."
 lepsius.16.f: "[SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName] has a total archaeological experience of #G [ROOT.Var('lepsius_archaeologist_var').GetVariable('lepsius_archaeologist_experience_var').GetValue]#!\n\n Total number of expeditions funded by our nation: #G [ROOT.Var('lepsius_total_expeditions').GetValue]#!\n\n Total number of major discoveries our nation has made: #G [ROOT.Var('lepsius_total_discoveries').GetValue]#!"
 lepsius.16.g: "Host a major archaeological congress"
 lepsius.17.t: "Major Artifacts"
 lepsius.17.d: "This is an overview of all the major artifacts in the museum."
 lepsius.17.egypt: "\n#T Egypt:#!\n"
 lepsius.17.sarcophagus: "We found the #E Sarcophagus of the Unknown Pharaoh#! in a lost tomb in the Valley of the Kings.\n"
 lepsius.17.nefertiti: "The #E Bust of Nefertiti#! was the reward of painstaking excavations and diplomatic disputes.\n"
 lepsius.17.tut: "#E Tutankhamun's Death Mask#! is the jewel in the crown of the legendary tomb in the Valley of the Kings.\n"
 lepsius.17.narmer: "The #E Palette of Narmer#! is one of the oldest written finds of mankind and is considered by some to be the founding document of Egypt.\n"
 lepsius.17.mesopotamia: "\n#T Mesopotamia:#!\n"
 lepsius.17.lamassu: "We received #E King Sargon's Lamassu#! from Assyria in adventurous ways.\n"
 lepsius.17.meskalamdug: "We found the #E Helmet of Meskalamdug#! after an intensive excavation in Babylonia.\n"
 lepsius.17.sargon: "We found the #E Mask of Sargon#! during a thorough excavation of the ancient Assyrian capital of Nineveh.\n"
 lepsius.17.gilgamesh: "After a constant search for new parts and cutting-edge research, we have succeeded in reconstructing parts of the #E Epic of Gilgamesh#!.\n"
 lepsius.17.greece: "\n#T Greece:#!\n"
 lepsius.17.agamemnon: "The #E Mask of Agamamenon#! was the main find of our great discovery in Mycenae.\n"
 lepsius.17.priam: "We received #E Priam's Treasure#! as a gift from Heinrich Schliemann.\n"
 lepsius.17.snake: "We were able to bring the so-called #E Snake Goddess#! of Crete, one of the most important artifacts of the Minoan culture, to our museum in a somewhat unorthodox way.\n"
 lepsius.17.diskos: "After persistent excavation work, we unearthed the #E Diskos of Phaistos#!.\n"
 lepsius.17.southamerica: "\n#T South America:#!\n"
 lepsius.17.kukulkan: "The #E Gem of Kukulkan#! was obtained by one of our archaeologists on a fantastic and dangerous journey.\n"
 lepsius.17.pakal: "Our archaeologists secured the #E Burial Treasure of Pakal#! after years of excavation in Palenque.\n"
 lepsius.17.other: "\n#T Other:#!\n"
 lepsius.17.abraham: "The #E Staff of Abraham#! was found by one of our archaeologists on a spiritual journey.\n"
 lepsius.17.arne: "In a fantastic adventure, our brave archaeologists found the #E Manuscript of Arne Saknussemm#! as evidence that he traveled to the center of the earth in the 16th century.\n"
 lepsius.17.skull: "We acquired a highly mysterious #E Crystal skull#! from a trusted antiques dealer.\n"
 lepsius.17.hoa: "The mysterious statue of #E Moai Hoa Hakananai'a#! was found by an adventurer on Easter Island.\n"
 lepsius.17.summer: "During the burning of the Chinese Imperial Residence, we've scavenged a significant amount of valuable #E Loot from the Summer Palace#!."
 lepsius.18.t: "World Cultures Collection"
 lepsius.18.d: "This section includes artifacts from different cultures of the world."
 lepsius.18.f: "This collection is an anthropological as well as archaeological collection of different cultures, some of which still exist. #G 10#! artifacts are enough to host an exhibition. There are no larger collections, but the individual collections are more valuable. Currently this collection consists of the following sections: \n\n #G [ROOT.Var('lepsius_oceanic_artifact_minor').GetValue]#! @lepsius_oceanian_minor! minor artifacts from Oceania \n #G [ROOT.Var('lepsius_oceanic_artifact_major').GetValue]#! @lepsius_oceanian_major! major artifacts from Oceania \n\n #G [ROOT.Var('lepsius_fareastern_artifact_minor').GetValue]#! @lepsius_east_asian_minor! minor artifacts from the Far East \n #G [ROOT.Var('lepsius_fareastern_artifact_major').GetValue]#! @lepsius_east_asian_major! major artifacts from the Far East \n"
 lepsius.18.g: "Arrange a Far Eastern Exhibition."
 lepsius.18.h: "Arrange an Oceanic Exhbition."

 lepsius.22.d: "The assembled elite of our capital is on its feet: the Archaeological Museum comes up with a new exhibition."
 lepsius.22.f: "People from the upper and middle class crowd in front of the entrance of the museum in the morning. The new exhibition begins with a lecture by a leading archaeologist who will give a first-hand account of the latest expedition and the excavations at the site. Afterwards, art lovers and onlookers can take a look at the exhibits themselves. The press is on site preparing their articles. A big day for [ROOT.GetCountry.GetNameNoFlag], nationally and internationally; the great powers look on with envy at our prestigious collection."
 lepsius.22.g: "I hope I get another ticket."
 lepsius.24.t: "New Aegean Exhibition"
 lepsius.25.t: "New Pre-Columbian Exhibition"
 lepsius.26.t: "Archaeological Congress ends"
 lepsius.26.d: "The congress organized by our Archaeological Society is drawing to a close today. Professor [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] has expanded his knowledge in the process."
 lepsius.26.f: "Several weeks of meetings, readings, conferences and cozy get-togethers are coming to an end. National and international archaeologists close to the society exchanged discoveries, expeditions and theories. The event was a complete success - and broadened the horizons of everyone involved."
 lepsius.26.g: "Always these arguments about who has the finest leather jackets..."
 lepsius.27.t: "New World Cultures Exhibition"

 lepsius.30.t: "New Lead Scientist"
 lepsius.30.d: "The Archaeological Museum has appointed a new Lead Scientist. It is [SCOPE.sCharacter('lepsius_museum_lead_scientist').GetPrimaryRoleTitle] [SCOPE.sCharacter('lepsius_museum_lead_scientist').GetFullName]."
 lepsius.30.f: ""
 lepsius.30.g: "Congratulations!"
 lepsius.31.t: "Lead Scientist becomes Museum Director"
 lepsius.31.d: "[SCOPE.sCharacter('lepsius_museum_lead_scientist').GetPrimaryRoleTitle] [SCOPE.sCharacter('lepsius_museum_lead_scientist').GetFullName] had the honor of being named the new museum director. He will thus retire from active service."
 lepsius.31.f: "For years [SCOPE.sCharacter('lepsius_museum_lead_scientist').GetFullName] has dedicated his life to science and culture and has long since grown tired of politics. For many, the decision to concentrate only on museum operations came as no surprise. He will no longer be available politically or for expeditions. There are promotions that are regrettable."
 lepsius.31.g: "Farewell..."

 lepsius.80.t: "A new Age of Archaeology!"
 lepsius.80.d_egypt: "Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] used new archaeological methods to uncover many details of an ancient Egyptian village. Using Stratigraphy and the Three-age system as well as documenting [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] findings marks a new age in archaeology."
 lepsius.80.d_mesopotamia: "Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] used new archaeological methods to uncover many details of an ancient Mesopotamian village. Using Stratigraphy and the Three-age system as well as documenting [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] findings marks a new age in archaeology."
 lepsius.80.d_aegean: "Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] used new archaeological methods to uncover many details of an ancient Aegean village. Using Stratigraphy and the Three-age system as well as documenting [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] findings marks a new age in archaeology."
 lepsius.80.d_precolumbian: "Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] used new archaeological methods to uncover many details of an ancient Pre-Columbian village. Using Stratigraphy and the Three-age system as well as documenting [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] findings marks a new age in archaeology."
 lepsius.80.f: "\"The ground layers in which we found the artifacts of this village tell us a lot about it. One layer for example has a lot of coal in it and marks the end of the findings from this period. That probably means that a fire destroyed the village and it was abandoned. Additionally there are no metal objects which means that it must be a stone-age village. The human remains that we found were fascinating as well, as they were malnourished and had teeth that were worn.\""
 lepsius.80.g: "So civilized!"

 lepsius.100.t: "Preparing the [ROOT.GetCountry.GetAdjectiveNoFlag] Archaeological Expedition"
 lepsius.100.d: "Preparations for the archaeological expedition are underway. However, it is still unclear how long the trip should be financed."
 lepsius.100.f: "Not only the financing as such, but also the length of the expedition should soon become a political issue after [ROOT.GetCountry.GetName] had decided to give in to the wishes of its academics and to send the eagerly awaited expedition. The round trip alone would take precious time, while the curmudgeons in the Cabinet insisted on sending just a few negotiators to acquire a few artifacts from the antique dealer."
 lepsius.100.g: "Don't do things by halves - this will be a long journey."
 lepsius.100.h: "A medium long journey is a good compromise."
 lepsius.100.i: "A short journey is enough."
 lepsius.110.t: "Controversy over leadership"
 lepsius.110.d: "The intelligentsia see themselves as the favorites to have one of their representatives at the head of the archaeological expedition. But there are numerous dissenting voices."
 lepsius.110.f: "The country's elites are divided. The state support for the expedition has brought critics and envious people onto the scene. The country's intelligentsia sees the company as their sovereignty. Both opposition and government forces are demanding that they be given a post as observers. It is undeniable that a representative of the intelligentsia would be best qualified for the task, but there are other possibilities..."
 lepsius.110.g: "The intelligentsia is the most qualified."
 lepsius.110.h: "A government representative is to accompany the expedition."
 lepsius.110.i: "An opposition politician is suitable for this."
 lepsius.110.j: "Someone with archaeological experience should do the job."
 lepsius.110.k: "This honor belongs only to the heir to the throne."
 lepsius.120.t: "Military attaché"
 lepsius.120.d: "It is strongly advised to recruit a military attaché for the archaeological expedition.."
 lepsius.120.f: "The military has suggested three possible candidates to serve as military attachés for the expedition. The decision was communicated today by the War Department. The selection has yet to be confirmed."
 lepsius.120.g: "[SCOPE.sCharacter('lepsius_military_attache_1').GetFullName]."
 lepsius.120.h: "[SCOPE.sCharacter('lepsius_military_attache_2').GetFullName]."
 lepsius.120.i: "[SCOPE.sCharacter('lepsius_military_attache_3').GetFullName]."
 lepsius.130.t: "Artists join expedition"
 lepsius.130.d: "A group of artists from our Academy have expressed an interest in participating in the upcoming Archaeological Expedition."
 lepsius.130.f: "Word has gotten around at the art academy that an expedition will soon be looking for lost cities and unknown art treasures. Draftsmen and painters were already inspired by the atmosphere, colors and scenes on Napoleon's Egyptian expedition. There are enough applicants who want to make drawings and sketches of archaeological sites for us. It goes without saying that such an expansion of the expedition causes additional costs, but it is certainly worth the money."
 lepsius.130.a: "They are cordially invited."
 lepsius.130.b: "Thanks, but no thanks."
 lepsius.140.t: "Archaeologist recruits experienced scholars"

 lepsius.140.f: "Common interests bind us together: our leader has connections to other archaeological, historical and anthropologically versed scholars. Such an expansion of the expedition members would certainly have a positive effect on the bottom line of the enterprise. However, this is not a friendly service: the state has to pay for board, lodging and salary. Some might call such provisioning by the expedition leader's "friends" nepotism, but he has assured us that the rationale behind the expansion is purely scientific."
 lepsius.140.a: "An enrichment for the team."
 lepsius.140.b: "We don't pay our archaeologist's cliques!"
 lepsius.150.t: "Natural Scientists join the expedition"
 lepsius.150.d: "Scientists want to carry out experiments on the upcoming expedition."
 lepsius.150.f: "The universities of our country have not remained unaffected by the current events. Some scientists would like to accompany the expedition to study the geographical conditions, to compare astronomical calculations or to carry out weather experiments. Others believe that rock and wood samples can improve the scientific results of the expedition. It is clear from many of the scientists selected that they have been waiting for the hour to travel to the long-awaited foreign countries on such occasions for ages: they are just waiting for an excuse to come along as free passengers. And they have expensive wishes too!"
 lepsius.150.a: "A magnificent idea!"
 lepsius.150.b: "We can't cater to every shaggy beard ..."

 lepsius.200.t: "Expedition reaches place of departure"
 lepsius.200.d: "The expedition has reached its starting point. Time to make some final preparations before departure."
 lepsius.200.f_ex_upe: "'Luxor, Luxor!' the cry goes through the ranks as the Temple of Karnak looms on the horizon. The boat threatens to tip into the Nile as the expedition's members pile up at the railing, glancing at the silhouette of the city known in ancient Egypt as Thebes. Ruins of millennia-old structures line the banks of the Nile, obelisks rise up between dilapidated houses and tents. On the other bank of the Nile, however, rise the sandy-brown mountain ranges where the legendary Valley of the Kings is hidden, and where it is said that there are still unknown tombs of the pharaohs. But before we can get to that, we still have a few things to settle in Luxor..."
 lepsius.200.f_ex_loe: "The 'Mother of the World' lies above the waters of the Nile glittering in the sun. Minarets and domes adorn the panorama and tell of the power and importance of this city, which once and now helped determine the fate of the Middle East. Colorful bazaars and carpets characterize the streets as well as the fine ornamentation of Fatimid architecture. But the view goes further - far beyond, where the tops of the pyramids herald a bygone era, which is the real goal of our journey. But before that, we have to take a few precautions in Cairo."
 lepsius.200.f_ex_bab: "Baghdad, Mesopotamia's largest city, is bustling with activity. Like Cairo, it is a center of the Arab world; like Cairo, it was the seat of power and prestige. But unlike Cairo, where the distant pyramids of Giza herald an even older world, there is little in Baghdad that evokes the empires of Babylon and Akkad. Even the alleged antiques that a somewhat careless expedition member bought from a shady dealer have turned out to be fakes. While the stone buildings of the Egyptians and Maya still bear witness to the lost civilizations, there is hardly anything comparable here. We'll probably have to start from scratch."
 lepsius.200.f_ex_ass: "What else can be found in Assyria after Layard dug at Nimrud? Quite a lot, according to a trader in Mosul. Only a month ago, the head of a lamassu emerged from the sand. And the bazaar always offers good pieces, he tells us. The fact that a whole series of pieces could not be salvaged also has to do with the Kurdish clans in the area, who do not allow everyone to poach in their areas - regardless of excavation license. We'll take the warning with us - and get the essentials before we start the journey."
 lepsius.200.f_ex_arg: "Ah, good old Athens! Not old enough for what our expedition team is looking for, but good enough to spend extra days in Attica. Greece does not have many large cities, so our expedition team has little choice but to make the most necessary preparations there before setting off into the countryside. Our archeology guide pushes us hard, as some scholars spend far too much time on distractions—whether it's classic marble or Greek wine. The warm sun, the shade of olive trees and the Akkadian idyll invite to linger and relax - some seem to have already forgotten why we are really here."
 lepsius.200.f_ex_cre: "A light breeze blows in from the Aegean Sea as our expedition reaches the port of Heraklion. Old-time Venetian bastions salute, reminiscent of times when Candia was a trading hub in the Middle Ages. After the cargo is unloaded to the croaking of seagulls and the participants go ashore, the friendly reception is followed by bitter reality. While some participants complain about the local cuisine and demand better accommodation, the lead archaeologist has little sympathy for such less intellectual requests. Because Heraklion is only a way station for him - the treasures of the Minoans await in the interior of the island."
 lepsius.200.f_ex_yuc: "In Mérida, our excavation team is making the final preparations before the big departure. The traces of Spanish conquest and colonization characterize the city, which despite its manageable size shows that it was once, together with Campeche, the place from which the Spanish exercised control of the peninsula. Less than 100 miles away are said to be some Mayan sites that the jungle has reclaimed over the past few centuries. Our expedition members will not be spared from digging deeper into the undergrowth if they want to discover new temples or even cities..."
 lepsius.200.f_ex_per: "The Andes tower like kings over the heads of their subjects; their peaks majestically look down on us, as if to test our worthiness to enter their valleys. The journey to Cuzco was arduous, but technological advances mean that expeditions no longer become adventurous journeys full of unpredictability. In the streets of the former capital of the Incas, historic Spanish dominance is combined with the charm of Andean architecture. In between, seamless cyclopean walls still bear witness to the architecture of the former rulers. The ruins of the Inca fortress of Sacsayhuamán, just a hop from downtown, is a taste of what expedition members will be looking for on this trip."
 lepsius.200.g: "Ah, Egypt."
 lepsius.200.h: "Ah, Mesopotamia."
 lepsius.200.i: "Ah, Greece."
 lepsius.200.j: "Ah, Mosquitos and deadly diseases."
 lepsius.200.k: "Ah, Peru."
 lepsius.210.t: "The Interpreters and the Mysterious Guide"
 lepsius.210.d: "There is disagreement among the expedition members as to whether we should rather spend our remaining money on a few qualified interpreters or a mysterious guide."
 lepsius.210.f: "It's not a question of quantity or quality, even if some members of our expedition put it that way. Interpreters not only have the advantage that they speak the language, but also that local people trust them more quickly. The chance of getting information about artifacts is considerably higher. On the other hand, the mysterious guide could take us to special places that we would otherwise not find or would find with great difficulty - places with special artifacts and unknown challenges."
 lepsius.210.a: "We could use some interpreters."
 lepsius.210.b: "We need a guide who knows the secrets of the area."
 lepsius.220.t: "Archaeologist buys artifacts"
 lepsius.220.d: "Our expedition leader has found and acquired some valuable artifacts at the local market."
 lepsius.220.f: "Tomb robbers, treasure hunters, and adventurers roamed the world's dig sites long before the first archaeologist set foot on the ground. This is a bitter truth. In many cases, artifacts are lost without a trace, end up in private collections or - if they are made of precious metals - are even melted down. But even the finds that can be retrieved have the flaw that their origin may never be clarified. Experienced archaeologists have a flair for not only excavating artifacts, but also finding them in commerce and reconstructing their provenance."
 lepsius.220.g: "What a nice surprise."
 lepsius.230.t: "Writing a Diary"
 lepsius.230.d: "Inspired by the exotic surroundings and daily impressions, our expedition leader has started to keep a diary."
 lepsius.230.f: "Every country and place has its own colors and smells. The mysticism of the Orient, the magic of Greece and the legends of the Mayas and Incas captivated people. Others were inspired by the unknown everyday life, the incomprehensible languages ​​or the strangeness of the world into which an adventurer was thrust. Sometimes just writing was enough to process the impact of the impressions - and to record them."
 lepsius.230.g: "Incorrigible romantic spirit."
 lepsius.240.t: "Writing a Treatise"
 lepsius.240.d: "Our expedition leader has decided to write a scientific paper about the course of the expedition."
 lepsius.240.f: "It may seem surprising, but not everyone has time to keep their own records alongside their actual work. Some subjects do not find a place in official reports, perhaps because they deviate too far from the actual topic - or the thesis is not yet mature enough. Be that as it may: our expedition leader has apparently found a topic that he would like to work on apart from the official reporting and publish later."
 lepsius.240.g: "Let's hope something useful comes of it."
 lepsius.250.t: "Tavern Fight"
 lepsius.250.d: "The bad qualities of our expedition leader have led to a diplomatic incident."

 lepsius.250.g: "Embarassing ..."
 lepsius.260.t: "Appreciation"
 lepsius.260.d: "The good qualities of our expedition leader have led to widespread recognition of our archaeological enterprise."

 lepsius.260.g: "Wonderful"
 lepsius.270.t: "Ice cream and lemonade"

 lepsius.270.g: "You have to travel in style."
 lepsius.280.t: "An Audience"

 lepsius.280.f: "The local governor had heard about the expedition and summoned the leader of the archaeological mission. He was interested in the goals and was extremely curious about the guest. In the ensuing conversation, our leader not only managed to entertain the host well, but also impressed him enough with his skills that the governor offered to help. As it turned out, he possessed a valuable artifact that he gave away to our expedition as a kind gesture."
 lepsius.280.g: "A wonderful gift!"
 lepsius.290.t: "Attaché hires guards"
 lepsius.290.d: "The military attaché of our archaeological expedition has hired some mercenaries to ensure the safety of our journey."
 lepsius.290.f: "Apparently the War Department had a lucky hand in selecting our military attaché. His skills have earned him the approval of a local military officer and he has spoken to him about dispatching a group of guards to protect our expedition. In exchange, he paid a visit to a contingent of troops from the host country and shared his expertise."
 lepsius.290.g: "The military picked the right man."

 lepsius.300.t: "Archaeological Expedition begins!"
 lepsius.300.d: "Things are packed, the last helpers have been recruited, the expedition plan is in place - the journey can begin."
 lepsius.300.f: ""
 lepsius.300.g: "Here we go!"
 lepsius.310.t: "Archaeological Expedition ends"
 lepsius.310.d: "The archaeological expedition is over. Time to count the yield!"
 lepsius.310.f: "It has been an arduous journey with many hardships and obstacles, but our nation has not only increased its knowledge of the past in the course of the expedition, but also acquired treasurable artifacts for the museum. Some helpers have already dismissed themselves, some members of the excavation yearn to go home. Meanwhile, the expedition leader counts the acquired, smaller pieces that make up the success of the expedition. Dry cataloging follows the romantic adventure."
 lepsius.310.g: "Cheers to science! Now bring our boys back."
 lepsius.310.h: "This is just the beginning - establish a long-term archaeological excavation."
 lepsius.311.t: "Archaeologist publishes diary"

 lepsius.311.f: ""
 lepsius.311.g: "An inspiration for all of us."
 lepsius.312.t: "Archaeologist publishes scientific paper"

 lepsius.312.f: ""
 lepsius.312.g: "We should get a copy for the national library."
 lepsius.313.t: "Expedition leader returns home"

 lepsius.401.t_bedouin: "Bedouin Raid"
 lepsius.401.t_kurdish: "Kurdish Raid"
 lepsius.401.d: "Our archaeological expedition has been attacked by local tribes."
 lepsius.401.f_bedouin: "Not all areas in the desert are under the total control of the government. Some Bedouin tribes successfully resist state modernization and social change. The clans still live as their ancestors did centuries ago. Raids on caravans and careless travelers are part of the daily routine. A Bedouin attack also affected our expedition: Valuables and archaeological equipment were stolen and camels were kidnapped. The expedition leader asks us to speak to the government so that such incidents that endanger the expedition do not happen again. Of course, this will be seen as interference in internal affairs..."
 lepsius.401.f_kurdish: "The Zagros Mountains, which border Mesopotamia to the north and east, have historically been home to Kurdish tribes who are only loosely under the control of the local government. Many of them act on their own, recognizing only their tribe as authority. Again and again they take on raids. This time a Kurdish attack also affected our expedition: Valuables and archaeological equipment were stolen and camels were kidnapped. The expedition leader asks us to speak to the government so that such incidents that endanger the expedition do not happen again. Of course, this will be seen as interference in internal affairs..."
 lepsius.401.g: "Make a formal complaint to the government."
 lepsius.401.h: "We arrange ourselves."
 lepsius.401.i: "Punish them!"
 lepsius.401.j: "Guards!"
 lepsius.402.t_desert: "Desert Storm"
 lepsius.402.t_tropical: "Tropical Storm"
 lepsius.402.d: "Our archaeological expedition faces a devastating storm!"
 lepsius.402.f_desert: "At first it was just a light breeze that blew sand in our expedition team's eyes. But then the wind grew so strong that it overwhelmed men and beasts of burden. Even after hours, the desert storm lost none of its violence. When our archaeologists asked a local about the phenomenon, he said these types of storms are normal for the time of year. These desert storms could endanger our entire expedition!"
 lepsius.402.f_tropical: "No thunder and lightning preceded the sudden rains that swept our expedition teams one afternoon. At first they looked for shelter, but over the course of a few hours they realized that this tropical storm was very different from the usual rainfall in this region. One of our porters even suggested it might be a full blown hurricane!"
 lepsius.402.g: "This mild breeze won't stop us."
 lepsius.402.h: "The situation is too dangerous, the expedition has to wait."
 lepsius.403.t: "Fog in the Andes"
 lepsius.403.d: "After the military attaché has once again put our expedition in a dangerous situation, the other participants demand consequences."
 lepsius.403.f: "The crew of our expedition in the Andes grumbles about the military attaché. On several occasions he has led the group in the wrong direction in search of an ancient Inca site. Recently it even happened that in his ambition to reach the goal as quickly as possible he didn't count on the fog in the mountains. The expedition lost important time because of this. Some men are pushing to appoint a new leader."
 lepsius.403.g: "He should be relieved of his duties."
 lepsius.403.h: "He did a good job."
 lepsius.404.t_aegean: "Broken Bridge"
 lepsius.404.t_peru: "Broken Suspension Bridge"
 lepsius.404.d: "A destroyed bridge prevents our expedition from progressing."
 lepsius.404.f_aegean: "Greece and Crete are known for their rugged landscapes. As our expedition reaches a gorge, it turns out that a bridge pier has been swept away in a recent landslide. We are faced with the decision of whether to repair the bridge and aim for our original goal, or go to another location. The latter option is quicker and less expensive, but probably crowned with less archaeological success."
 lepsius.404.f_peru: "After an arduous climb over Andean passes and narrow mountainside roads, our archaeological expedition is faced with an unexpected problem. A suspension bridge that locals say leads to a temple shrouded in legend has been completely destroyed. Some expedition members urge abandoning the quest and heading to an easier archeological site - but locals urge it would be worth the effort. However, if we want to rebuild the bridge, it would cost us time and money."
 lepsius.404.g: "Rebuild the bridge."
 lepsius.404.h: "Find another way."
 lepsius.405.t_mesopotamia: "Bad Roads in Mesopotamia"
 lepsius.405.t_yucatan: "Bad Roads in Yucatán"
 lepsius.405.d: "The poor condition of the roads presents our expedition with hitherto undreamt-of challenges."
 lepsius.405.f_mesopotamia: "Unfortunately, not all roads have the quality that one should actually expect. In particular, the side roads and paths off the main trade routes are in remarkably poor condition. But the potential destinations of our journey are far away from the centers of civilization. The journey is difficult and some expedition members are already complaining that we should have taken a different route."
 lepsius.405.f_yucatan: "The jungles of Yucatán are still undeveloped even in these modern times. This makes them worthwhile archeological destinations, as many ruins have not been closely examined by humans for centuries. On the other hand, the journey is full of hardships. Except for a few well-trodden forest paths, there are almost no roads. Expedition members are already complaining about the decision to take this route."
 lepsius.405.g: "Try another path."
 lepsius.405.h: "Invest in new men and beasts of burden to make the journey more enjoyable."
 lepsius.405.i: "We stay on this road."
 lepsius.406.t: "Expedition Shipwreck!"
 lepsius.406.d: "Our military attaché is responsible for a most unfortunate event."
 lepsius.406.f: "One of our expedition ships has been shipwrecked in the Aegean Sea. Luckily no one was hurt, but a lot of our archeological equipment went under offshore. The majority of our expedition team blames our captain for overlooking a shoal. However, he defended himself by saying that he wanted to end the trip quickly and that the reef was not listed on any map. There's a growing consensus among men that with the current leader, our chances of success are diminishing."
 lepsius.406.g: "He is responsible."
 lepsius.406.h: "Buy new equipment and let's pretend nothing happened."
 lepsius.407.t: "The Oasis"
 lepsius.407.d: "On their journey, our archaeologists discovered a previously unknown oasis and refreshed their water supplies."
 lepsius.407.f: "Actually, the expedition members had expected to endure a few days of hardship: an ancient Egyptian ruin they wanted to explore was supposed to be somewhere in the desert two to three days' march away. To their great surprise, however, they found that there was an oasis on the way: palm trees with fat dates and fig trees with sweet fruits awaited them. Water supplies were replenished and some participants took the opportunity to bathe in the Egyptian sun."
 lepsius.407.g: "Refreshing news."
 lepsius.408.t: "Nazar amulet"
 lepsius.408.d: "Some of the hired porters believe that our archaeological leader is being pursued by the "evil eye". They urge him to buy an amulet."

 lepsius.408.g: "Buy the amulet."
 lepsius.408.h: "This superstition contradicts every scientific conviction!"
 lepsius.409.t: "Friendly fishermen"
 lepsius.409.d: "Some friendly fishermen, passing through the coast, have offered to carry our expedition's equipment along for a few miles."

 lepsius.409.g: "Very helpful."
 lepsius.410.t_yucatan: "Parrot Mascot"
 lepsius.410.t_peru: "Threatening Condor"
 lepsius.410.d_yucatan: "Ever since we dived into the Yucatán jungle, a small, colorful parrot has been with us."
 lepsius.410.d_peru: "Ever since we climbed the Andes, the shadow of a mighty condor has hung over us every day."
 lepsius.410.f_yucatan: "The forests of the Yucatán are full of dangers: jaguars, snakes and poisonous insects lurk in the bushes. At the same time, the expedition members are fascinated by the flora and fauna - in particular by a small, colorful parrot that flies away over hats and helmets and does not leave the travelers' side. The bird appears extremely clever and can now even be fed regularly. The expedition leader has now declared the parrot to be the company's mascot and intends to take it home after the end of the trip."
 lepsius.410.f_peru: "The condor is the king of the Andes. The huge birds rule the air, their shadow puffs up to unimagined size. Since the beginning of the expedition, he has been looming over the alpacas and porters in a downright menacing manner. The locals don't trust the animal. As a vulture, it is known to circle over cadavers rather than the living. The queasy feeling spreads among some participants."
 lepsius.410.g: "A good omen."
 lepsius.410.h: "He should become a pet parrot."
 lepsius.410.i: "A bad omen."
 lepsius.410.j: "He'll be ours."

 lepsius.411.t: "Exhausted pack animals"
 lepsius.411.d: "It seems we overworked our pack animals."
 lepsius.411.f: "For days we have claimed our beasts of burden. Some even say: too long. Signs of fatigue are now noticeable. Some animals even refuse to travel further and can only be moved with blows. This morning our first animal collapsed."
 lepsius.411.g: "They can rest when they're dead."
 lepsius.411.h: "Let them rest!"
 lepsius.412.t: "Archaeological Expedition lost!"
 lepsius.412.d: "All contact with our archaeological expedition has been lost for two months."
 lepsius.412.f: "Sometimes you just have bad luck. Some superstitious locals even claim our whole company is star-crossed. Either way: contact with our archaeological expedition has been completely lost. The last message has been a long time coming. We're sure the archaeologists will be backing up soon, but as it stands, the entire staff seems to have lost their way."
 lepsius.412.g: "Curses!"
 lepsius.413.t: "Exotic Diseases"
 lepsius.413.d: "Some participants of our archaeological expedition are seriously ill."
 lepsius.413.f: "Illness has always made long journeys difficult. Whether in the tropics, deserts, swamps or high mountains: our expedition members are not used to the conditions and unknown pathogens lurk everywhere. Malaria, in particular, is constantly claiming its victims again. On the journey, some men are so seriously ill that they are simply no longer able to work."
 lepsius.413.g: "We wait and cure them."
 lepsius.413.h: "Leave them behind."
 lepsius.413.i: "Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] can treat them!"
 lepsius.414.t: "Corruption"
 lepsius.414.d: "Our expedition is being harassed by local officials and prevented from progressing."
 lepsius.414.f: "Since our expedition began, its participants have faced a whole range of harassment. Small and medium-sized officials make life difficult for us with stamps and special fees. One even questioned our visa and wanted to fine us. The situation is extremely confusing. Apparently you can't get ahead in this country without good contacts or family ties."
 lepsius.414.g: "Robbers!"
 lepsius.414.h: "Thieves!"
 lepsius.414.i: "Politicians!"
 lepsius.415.t: "The Flood"
 lepsius.415.d: "As a flood devastates the country, our expedition leader sees a woman being washed away by the floodwaters."
 lepsius.415.f: "The constant rains of the last few days have caused the water to burst its banks; exceptional weather, but nothing our expedition members weren't prepared for. While the river has become a torrent, our men continue the journey - until the moment when a cry sounds from the bank. For a moment, our expedition leader can see a colorful bundle being swept away. It is now important to react quickly, even if this could mean a decisive delay in the journey."
 lepsius.415.g: "Rescue her!"
 lepsius.415.h: "The expedition can't wait!"
 lepsius.416.t: "Good Weather"
 lepsius.416.d: "The archaeological expedition is making surprisingly good progress."
 lepsius.416.f: "Our expedition team is making good progress. Sometimes no news is the best news, and in this case our archaeologists are confident of finding a good to very good issue site. Otherwise there is nothing worth reporting - except for the good weather!"
 lepsius.416.g: "How satisfying."
 lepsius.417.t: "Hospitable Locals"
 lepsius.417.d: "Locals welcomed our expedition in a friendly way, but maybe we could get even more out of it..."
 lepsius.417.f: "Our expedition stopped in a small village. The residents are extremely hospitable and have offered the team a good resting place and provided the animals with food. Talking to the locals, it was suggested that they might know more about the area - ancient legacies included..."
 lepsius.417.g: "We have to find out everything."
 lepsius.417.h: "It is fine as it is."
 lepsius.418.t: "Local guide"
 lepsius.418.d: "A local guide offered his services to our expedition."
 lepsius.418.f: "Sometimes you just have to be lucky. Our expedition has gained a local guide who has excellent knowledge of the area - and knows more about the sights of the region."
 lepsius.418.g: "Perfect!"
 lepsius.419.t: "Shortcut"
 lepsius.419.d: "The expedition's military attaché has found a shortcut to a ruin, but demands something in return."
 lepsius.419.f: "Our military attaché reports a shortcut. When we made a break yesterday afternoon, he used this to explore the area and claims to have found an old road that is not on any map. If that's true, it could help our expedition further, but it also means rewarding him well..."
 lepsius.419.g: "Reward and follow him!"
 lepsius.419.h: "Let's not make him more important than he is."
 lepsius.420.t: "Motivated Men"
 lepsius.420.d: "Our expedition was fortunate to hire particularly motivated men. This significantly improves our chances of success."
 lepsius.420.f: "Whistles and chants can be heard from afar. The archaeological expedition is making surprisingly good progress. The team is highly motivated and confident of success. Men are more relaxed about obstacles and problems. We don't know what caused this, maybe we had a lucky hand in choosing our people. In any case, this increases our chances of success enormously."
 lepsius.420.g: "Carpe Diem."

 lepsius.421.t: "The Scarab"

 lepsius.421.f: "Unfortunately, during a smaller dig near a mastaba, our excavation team found nothing - with the exception of a small, lapis lazuli blue scarab. The scarab was considered a good luck charm in ancient Egypt. The scarab's behavior of rolling dung balls in front of it related to Re and his journey across the sky on the sun barge. Our expedition leader asked if we could perhaps make a small exception and keep the essentially secondary piece as a souvenir for himself."
 lepsius.421.g: "He may keep the artifact."
 lepsius.421.h: "All artifacts found are to be given to a museum - without exception!"
 lepsius.422.t: "Temple in the Sand"
 lepsius.422.d: "Our archaeologists found what looks like a Macedonian temple."
 lepsius.422.f: "At first our men thought it was a dune - but a tiny pinnacle of worked limestone told our archaeologists that the unusual mountain of sand in the Egyptian desert held a secret. Within a few days the expedition uncovered a temple. For some, the result was disappointing because it did not resemble an ancient Egyptian structure, but turned out to be a structure from the time of Alexander the Great. However, experts say that the temple was evidence of the activities of the Greek general in Egypt - whose tomb has not been found to this day."
 lepsius.422.g: "In the footsteps of Alexander the Great..."
 lepsius.422.h: "All old wives tales."
 lepsius.423.t: "A Winged Lion"
 lepsius.423.d: "Our archaeologists have unearthed a statuette in Mesopotamia that looks like a cherub."
 lepsius.423.f: "Hybrid creatures of humans and animals are widespread in the Orient. Our expedition was fortunate to secure an exceptionally beautiful and well-preserved statuette while searching for an excavation site; it's already on its way to our museum . A cuneiform inscription that identifies the being as a temple guard is also revealing. Our archaeologists have theorized that these temple keepers represent a connection to the Israelite cherubim mentioned in the Bible. Two of them also protected the Ark of the Covenant that stood in the Jerusalem Temple."
 lepsius.423.g: "Are we talking about the lost Ark?"
 lepsius.423.h: "Saint Mark, is that you?"
 lepsius.423.i: "All old wives tales."
 lepsius.424.t: "Cuneiform depot"
 lepsius.424.d: "Our archaeologists have uncovered numerous Mesopotamian artifacts."
 lepsius.424.f: "When our archaeologists examined an ancient city wall on the outskirts of a small town, they actually didn't expect to find a great deal. Only when they felt the stone did they notice that there were cavities in the structure. After a detailed investigation, they broke open the wall at a certain point - as it turned out, cuneiform tablets were built into the wall! The depot is surprisingly well preserved and provides some information about ancient Mesopotamia."
 lepsius.424.g: "An amazing discovery!"
 lepsius.425.t: "Orichalcum?"
 lepsius.425.d: "Our archaeologists have found an artifact made from a strange, unknown material."
 lepsius.425.f: "During one of our Greek expeditions, our archaeologists made a curious discovery. A small bullet arrived at the museum management in the morning. The director didn't understand at first why his men sent him a marble back; under normal circumstances it was just a trivial find. But the amber-colored sphere consists of an unknown material that we have never encountered anywhere else. So far, experts have been at a loss as to what to make of the artifact, with some believing it is a fake. Others claim that this is an indication that our knowledge of the Aegean world is totally inadequate."
 lepsius.425.g: "Didn't Plato mention something like this in his Critias dialogue ...?"
 lepsius.425.h: "All old wives tales."
 lepsius.426.t: "Ceramic hoard"
 lepsius.426.d: "Our archaeologists have uncovered numerous Aegean artifacts."
 lepsius.426.f: "What was rubbish for the ancients is a treasure trove for an archaeologist. This motto has only recently come true when our expedition stopped at a smaller ruin in search of an excavation site, and on closer examination found a pit with a pottery depot. Many of the shards still need to be mended, but the numerous finds will definitely enrich our museum collection."
 lepsius.426.g: "And it all belongs to us!"
 lepsius.427.t: "Maya Jade"
 lepsius.427.d: "Our archaeologists have found valuable Mayan artifacts made of jade."
 lepsius.427.f: "Jade was a material widely used by the Maya in the fields of art and religion. The elite adorned themselves with jade, and the sun god was also depicted in jade jewellery. However, the peoples of Central America also made tools from jade because it was one of the hardest materials known from the New World. Our archaeologists were lucky enough to find a few such jade artifacts during their last dig."
 lepsius.427.g: "That would look good in our collection."
 lepsius.428.t: "Inca Idol"
 lepsius.428.d: "Our archaeologists have unearthed a mysterious golden Inca idol."
 lepsius.428.f: "A golden statuette of the Inca god Inti arrived at the museum via express delivery this morning. Our archaeologists don't say how or where they got it. A grimace, horrible and beautiful at the same time, looks at the observer. Some experts have already expressed doubts as to whether the piece is of Inca origin at all. The design indicates an unknown culture. In addition, almost all Inca gold was stolen from Peru. It is perhaps the most unique item in our pre-Columbian collection to date. The museum director is already whispering behind closed doors that some legends might be true after all."
 lepsius.428.g: "El Dorado, anyone?"
 lepsius.428.h: "All old wives tales."
 lepsius.429.t: "The Crystal Skull"
 lepsius.429.d: "Our archaeologists found... something."
 lepsius.429.f: "A trusted dealer, our excavator swears, recently showed him an extraordinarily interesting, as well as sinister, piece. It is a human skull - made entirely of Mesoamerican quartz. The surface is amazingly well polished and the work surpasses anything we have ever known about the cultures of the South American continent. But the doubts are great. Even our chief archaeologist isn't 100% sure what to make of the artifact."
 lepsius.429.g: "We add it to the collection."
 lepsius.429.h: "Definitely a fake."
 lepsius.430.t: "Fake Crystal Skull"
 lepsius.430.d: "The alleged artifact that was sold to us years ago as a sensation is actually a fake."
 lepsius.430.f: "How could that happen? Were we too careless? Too selfish because we rush from sensation to sensation and only believe what we want to believe? The legendary crystal skull that our museum acquired as an attraction years ago is a cheap fake. It will be years before our standing in the archaeological world is restored!"
 lepsius.430.g: "A national disgrace to our archeology!"

 lepsius.431.t: "Local knows ruin"
 lepsius.431.d: "A helpful local was able to assist us in finding artifacts."
 lepsius.431.f: "When our expedition makes a stop in a small town on our route, we meet an elderly farmer who has heard about our destination. In exchange for some bread, salt and water, he is extremely accommodating. 'The other villagers have already told me what you are looking for,' he explains. He takes us half a day's journey through unknown territory. Our archaeologists are surprised when he leads us directly to an ancient ruin. We were able to find some artifacts for our museum to ensure."
 lepsius.431.g: "This must be our lucky day!"
 lepsius.432.t: "Local trades artifact"
 lepsius.432.d: "A local wants to sell us an artifact."
 lepsius.432.f: "Our expedition stops in a larger city. When the porters bought feed for the beasts of burden, a trader spoke up. Apparently, the news about our trip has also spread widely among the locals. For a good price he is willing to sell a valuable piece of art he got from a grave robber. The origin of the artifact is unclear, but the offer is attractive - even if it comes at a price."
 lepsius.432.g: "It belongs in a museum."
 lepsius.432.h: "We're not interested in such shady deals."
 lepsius.433.t: "Authentic or Fake?"
 lepsius.433.d: "An antiques dealer with a questionable reputation wants to sell us an artifact."
 lepsius.433.f: "Not all dealers of supposedly valuable archaeological artifacts are trustworthy. This applies, for example, to a trader who, somewhat overzealously, wants to sell us an art treasure. The encroachment and its flexible price mechanism, which supposedly promises us a 'friendly price', have raised doubts among our expedition leaders as to whether this is really a safe offer. That's why they asked the museum whether they should accept the artifact from the dodgy hands of the dealer."
 lepsius.433.g: "We have to take the risk."
 lepsius.433.h: "Don't trust him."
 lepsius.434.t: "Grave robbers caught"
 lepsius.434.d: "Our expedition captured a group of tomb robbers and their loot, but we're undecided on what to do with them."
 lepsius.434.f: "Our archaeologists thought they had already found a good excavation site, until realizing that the site had been plundered for centuries. As they repacked their things, a couple of campfire wardens were able to apprehend several shady characters attempting to smuggle an artifact out of the abandoned site. Actually, we should hand the men over to the authorities and return the stolen piece of art. However, some people think we should claim the artifact for ourselves and buy the grave robbers' silence."
 lepsius.434.g: "The artifact should be ours."
 lepsius.434.h: "File a complaint and return the artifact to local authorities."
 lepsius.435.t: "Auction"
 lepsius.435.d: "Political pressure prompts us to consider selling a recently found artifact."
 lepsius.435.f: "There are fears among some members of the government that our overseas archaeological ventures are nothing but a waste of money, sacrificing our nation's economic output for the elite ivory towers of a small clique of scientists. They not only want scientific results, but also monetary proof that these expeditions make sense. A group of politicians are therefore demanding that a recently found artifact be sold to cover the expenses caused by our archaeological adventures."
 lepsius.435.g: "Sell it at auction."
 lepsius.435.h: "But it belongs in a museum!"
 lepsius.436.t: "Hidden chamber"
 lepsius.436.d: "Our archaeologists found a tomb, seemingly plundered by raiders. But when they made further investigations, they found a chamber behind a false wall."
 lepsius.436.f: "The last stop started with a disappointment. Our expedition leader had expected a lot from the historical site: it was the grave of a high official of the nobility, perhaps also with a sacred function. In any case, the information from some farmers suggested that this was the case. The disappointment on site is all the greater: the tomb is empty, the walls are bare, and there is not even a sign of any historical significance. At first glance, it looked like just a smooth-hewn cave. However, this changed abruptly when the research assistant accidentally discovered the outline of a door frame as he leaned against the supposed wall. It took two hours to uncover debris, shutters and rocks - and reveal access to a previously hidden chamber."
 lepsius.436.g: "My treasure!"
 lepsius.437.t: "Abandoned camp"
 lepsius.437.d: "We found the abandoned camp of a foreign excavation team. After we secured two artifacts there, the country's ambassador claims the pieces for himself."
 lepsius.437.f: "When our men reached the excavation camp, they were examining the remains of an expedition that had been exploring a nearby temple just a few months earlier. As it turned out, the excavation workers cleared the area a little too quickly: two artifacts that had not been picked up were found in a box. Our archaeologists secured the find, but were soon visited by the country's ambassador, who reclaimed the artifacts found by his country. The case has sparked a diplomatic incident with a great power."
 lepsius.437.g: "We found it, it's ours."
 lepsius.437.h: "Let's share the artifacts."
 lepsius.437.i: "We share our knowledge instead."
 lepsius.437.j: "They are the rightful owners."
 lepsius.438.t: "The Eremite"
 lepsius.438.d: "Unfortunately, a hermit who has an artifact at his disposal is only slightly willing to cooperate."
 lepsius.438.f: "We've heard word from an oddball hermit who is said to possess an artifact. He has an impressive knowledge of the past and an extensive memory. In many respects even the scholars of our expedition are amazed at his knowledge. The grumpy old man would like to tell us more, but there's no way he's going to give up the artifact. Apparently we have to use force."
 lepsius.438.g: "I want this artifact and I want it now!"
 lepsius.438.h: "Just listen to him."
 lepsius.439.t: "Dynamite?"
 lepsius.439.d: "Sometimes special challenges require special measures."
 lepsius.439.f: "During an excavation, our guide comes to the conclusion that a passage may be hidden behind a wall; at least he claims to have spotted a cavity behind the wall. Drastic measures were the order of the day in the early days of archaeology, and this included the use of explosives to further its higher scientific goals. Of course, we could get away with nothing if the alleged hollow space is a deception and we jeopardize the previously secured excavation site."
 lepsius.439.g: "KA-BOOM!"
 lepsius.439.h: "Barbaric just to think about it."
 lepsius.440.t: "A broken piece"
 lepsius.440.d: "We found a broken artifact. The missing piece is in the possession of an insignificant power."
 lepsius.440.f: "During an excavation, archaeologists have found a valuable art treasure - at least part of it. The other piece turns out to be in the hands of a minor power who bought it from an antiques dealer a few years ago. We could use our diplomatic service to get the missing piece and assemble the artifact, but the ambassador has already made it clear that doing so would be a political commitment."
 lepsius.440.g: "We kindly ask them to do so."
 lepsius.440.h: "The matter is not that important after all."

 lepsius.441.t: "A forgotten Obelisk"
 lepsius.441.d: "An unfinished obelisk gives our scientists information about ancient building practices."
 lepsius.441.f: "In an ancient Egyptian quarry, our archaeologists have found what resembles an unfinished obelisk. Work on the massive monolith was apparently never completed. Although it has no hieroglyphs and cannot be transported away because of its dimensions, our scientists have gained new insights into how the ancient Egyptians made and erected these structures."
 lepsius.441.g: "Very interesting."
 lepsius.442.t: "Mummified animals"
 lepsius.442.d: "The management of recently discovered mummified animals has sparked controversy among archaeologists."
 lepsius.442.f: "A few days ago, archaeologists found a burial chamber with a special find: in addition to the nobleman buried there, smaller sarcophagi with animals were also found. Judging by their appearance, they are a cat, a dog and a monkey. A discussion has flared up among scientists after a find: the mummified animals could shed light on their husbandry and the lives of domestic animals in ancient Egypt, but at the same time mean the destruction of these rare artifacts."
 lepsius.442.g: "They require a thorough investigation."
 lepsius.442.h: "Don't touch them, they are important museum exhibits!"
 lepsius.443.t: "Quarrel over a crocodile"
 lepsius.443.d: "A strange argument about a dead crocodile divides our scientists and the military attaché."
 lepsius.443.f: "The fauna of the Nile inspired our scientists to intensify their biological studies. They pay special attention to the Nile crocodile, which the academics encounter with fear and disgust as well as fascination. At the request of our scientists, our military attaché killed a crocodile. Now, however, he refuses to hand over the animal: he would rather have it stuffed and hang it over his chimney."
 lepsius.443.g: "He is to hand the crocodile over to the researchers."
 lepsius.443.h: "Long live taxidermism!"
 lepsius.443.i: "That is indeed a pretty crocodile..."
 lepsius.444.t: "Curse of the Pharaoh"
 lepsius.444.d: "After a few mysterious incidents, not only the local helpers, but even some scientists now believe that our venture in Egypt is cursed!"
 lepsius.444.f: "It all started after our expedition leader opened an Egyptian tomb: in the sarcophagus was a hideous looking mummy, which decayed within a few minutes before the eyes of the participants. Just a few days later, a mysterious illness afflicted almost all of the participants. A research assistant who was present at the unveiling of the mummy died. A day later, a sandstorm made work impossible for a week. This morning the water supplies turned out to be contaminated and undrinkable; it shimmers in a copper-yellow color. More and more of those involved are now convinced that they must pay for their desecration of the grave: the curse of the unknown pharaoh is upon them!"
 lepsius.444.g: "What is this? Comet sighted?!"
 lepsius.445.t: "Piece of the Epic of Gilgamesh"
 lepsius.445.d: "Scientists have found a piece of the famous Epic of Gilgamesh. It is considered the oldest piece of human literature."
 lepsius.445.f: "The Gilgamesh epic is the content of a group of literary works that comes mainly from the Babylonian area and contains one of the oldest surviving, written seals. The Epic of Gilgamesh in its various versions is the best-known work of Akkadian and Sumerian literature. The epic tells the story of Gilgamesh, a king of Uruk, his exploits and adventures, his friendship with Enkidu, his death and Gilgamesh's quest for immortality. #T @lepsius_gilgamesh_fragment! Five pieces of the epic are needed to reconstruct a basic version.#!"
 lepsius.445.g: "We must find more pieces."
 lepsius.445.h: "This is the last piece!"
 lepsius.445.i: "More pieces are always welcome."
 lepsius.446.t: "Minoan Fresco"
 lepsius.446.d: "During research on Crete, our excavation team came across remains of the Minoan culture."
 lepsius.446.f: "A beautiful fresco has attracted the attention of our archaeologists. Fragments of fishermen, dancers and ball players give an impression of the everyday life of the ancient Minoan civilization. The wall that the expedition team uncovered on Crete even shows traces of paint - after 4,000 years! It is certain that more finds will follow this fabulous discovery."
 lepsius.446.g: "A lost culture comes alive before our eyes."
 lepsius.447.t: "Cyclopean Walls"
 lepsius.447.d: "While researching in the Argolis, our excavation team uncovered remains of the Mycenaean culture."
 lepsius.447.f: "After several setbacks, archaeologists in Greece have found what locals first dubbed a terrace for olive trees, but was actually just the top of a Cyclopean wall. The expedition members have not found much so far, but it is at least a start."
 lepsius.447.g: "How did they build so seamlessly back then?"
 lepsius.448.t: "Maya Stele"
 lepsius.448.d: "The Archaeological team in Yucatán has made progress in deciphering the Mayan hieroglyphs."
 lepsius.448.f: "Deep in the jungle of Yucatán our expedition members came across an inscription from Mayan times. Scientists roughly date them to the 6th century BC. The discovery has greatly increased our knowledge of the lost culture, but some hieroglyphs still remain a mystery to our archaeologists. However, those involved give us hope that the deciphering of the Mayan script is only a matter of time."
 lepsius.448.g: "We must decipher it."
 lepsius.449.t: "Maya Cave"
 lepsius.449.d: "The expedition team has found traces of the Maya culture, but has little to show for it."
 lepsius.449.f: "The Maya once used caves to celebrate their rituals inside. What the exact content was has not been clarified to this day. Perhaps our archaeologists will be able to report more on this in the future. They found the entrance to a Mayan cave in northern Guatemala. So far, however, the results have been rather meager."
 lepsius.449.g: "What are you actually getting paid for?"
 lepsius.450.t: "Andean mummies"
 lepsius.450.d: "On top of a mountain, our scientists have discovered the corpses of Inca children who were victims of a ritual - the cold preserved them for centuries."
 lepsius.450.f: "Capacocha was an important sacrificial rite among the Inca that typically involved the sacrifice of children. Children of both sexes were selected from across the Inca empire for sacrifice in capacocha ceremonies, which were performed at important shrines distributed across the empire. The rationale for this type of sacrificial rite has typically been understood as the Inca trying to ensure that humanity's best were sent to join their deities. The children chosen for sacrifice in a capacocha ceremony were typically given alcohol and coca leaves and deposited at the place of the ceremony. Special attention was paid by the Inca to a number of ceremonial wak'a sites at very high elevations. In a number of instances, typically at the most important of these mountains, these sites contain the mummified remains of children sacrificed in capacocha ceremonies."
 lepsius.450.g: "Unpleasent, but valuable."

 lepsius.451.t: "A statue"
 lepsius.451.d: "Archaeologists have found a remarkable statue on their journey. Unfortunately, due to their size, they cannot be transported away."
 lepsius.451.f: "On the way to the next excavation site, our expedition came across a colossal statue in a rough, previously little explored area. It was unknown even to many local helpers and porters; and it fascinated the scientific companions from the very first moment. Our expedition leader immediately suggested that the statue should be transported away, but its size and anchoring in the ground make such a project difficult. Most participants therefore felt that the best thing to do was to trace all the inscriptions on the statue and make an accurate drawing of the monument. There are, however, a few scattered, nefarious voices that say this fine find should be cut up and shipped to our capital..."
 lepsius.451.g: "They should make an accurate drawing and meticulously copy the writing."
 lepsius.451.h: "Cut the statue into pieces and ship them home."
 lepsius.452.t: "A transcript"
 lepsius.452.d: "Our expedition leader has acquired an ancient record that depicts material that has long since been destroyed."

 lepsius.452.g: "Better than nothing."
 lepsius.453.t: "Artists capture the landscape on paper"
 lepsius.453.d: "The artists we took on the archaeological expedition record the landscape with such clarity that the records will be useful to scientists for decades to come."
 lepsius.453.f: "Throughout history, archaeological expeditions have not only accompanied classical scholars, but often a variety of different scientific personalities, such as geographers, biologists, mathematicians, astronomers, or artists, who recorded the environment with pen and paper. All those involved brought important knowledge with them in order to be able to offer the non-participating academics at home the most precise possible description of the respective archaeological site. It is precisely this interdisciplinary approach that has made expeditions since Napoleon's invasion of Egypt into a multi-faceted undertaking, in which scientific milestones have been made in several fields at the same time."
 lepsius.453.g: "Glad we hired them."
 lepsius.454.t: "Scientists conduct research"
 lepsius.454.d: "Our scientists have conducted various experiments on site, not only making comparisons, but also providing useful advice to our archaeologists."
 lepsius.454.f: "Throughout history, archaeological expeditions have not only accompanied classical scholars, but often a variety of different scientific personalities, such as geographers, biologists, mathematicians, astronomers, or artists, who recorded the environment with pen and paper. All those involved brought important knowledge with them in order to be able to offer the non-participating academics at home the most precise possible description of the respective archaeological site. It is precisely this interdisciplinary approach that has made expeditions since Napoleon's invasion of Egypt into a multi-faceted undertaking, in which scientific milestones have been made in several fields at the same time."
 lepsius.455.t: "Rival Expedition"
 lepsius.455.d: "A few miles into the wilderness, our expedition leader's team encounters a squad of emaciated men. It is the miserable remains of a foreign expedition."
 lepsius.455.f: "Our archaeologists aren't the only ones venturing into unexplored territory. A small private expedition of an eccentric scholar crosses our state enterprise. Unlike our own team, the competing company's men are poorly equipped. You can see the lack and deprivation in them. The chaplain of our expedition suggests helping them - which could also be interpreted as a benevolent gesture in the home country. Other members of the expedition, on the other hand, see the opportunity to exchange knowledge with foreign scholars. The military attaché, on the other hand, sees an opportunity to offer help - in return for receiving a valuable artifact from the expedition's fund."
 lepsius.455.g: "Help them."
 lepsius.455.h: "We help them in exchange for their knowledge."
 lepsius.455.i: "Food and help only if they leave their treasure to us."

 lepsius.461.t: "The Whispering Sphinx"
 lepsius.461.d: "His more than questionable lifestyle contributes to the fact that our expedition leader [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] suffers from memorable hallucinations."
 lepsius.462.d: "His more than questionable lifestyle contributes to the fact that our military attaché [SCOPE.sCharacter('lepsius_military_attache').GetFullName] suffers from memorable hallucinations."

 lepsius.461.g: "This man really needs to rethink his lifestyle."
 lepsius.463.t: "Bastet, the Cat Goddess"
 lepsius.463.d: "On his journey, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] discovered his soft spot for cats as a result of his studies."
 lepsius.463.f: "Among the various deities with animal forms, ancient Egypt also knew the cat goddess Bastet. Cats were once greatly revered by the Egyptians because they kept vermin such as mice, but also snakes, out of the granaries. In the course of his fascination with Egypt, our expedition leader began to take a great interest in this goddess and began to take a cat of his own under his wing. The animal companion has also meant that his tough character has weakened somewhat."
 lepsius.463.g: "There are cat people and dog people."
 lepsius.464.t: "Hunting with a Saluki"
 lepsius.464.d: "Our military attaché [SCOPE.sCharacter('lepsius_military_attache').GetFullName] acquired a native hunting dog while travelling in Mesopotamia."
 lepsius.464.f: "Dogs don't usually have a good reputation in the Middle East. An exception are greyhounds like the Saluki. The Bedouins regard him as a noble companion who also does an excellent job of hunting rabbits or gazelles. Our military attaché received such an excellent dog as a gift from a local, and a deep bond between human and animal has been emerging for a few weeks."
 lepsius.464.g: "There are dog people and cat people."
 lepsius.465.t: "A problematic superiority behavior"
 lepsius.465.d: "The arrogant character of [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] has lead to resentment in our expedition country."

 lepsius.465.g: "Why should we bother? After all, they are barbarians!"
 lepsius.465.h: "We should fix this diplomatic faux pas at all costs."
 lepsius.466.t: "The Cartographer"
 lepsius.466.d: "During the archaeological expedition, the military attaché developed a great interest in cartography and created his own map material. It seems he has a talent for land surveying."
 lepsius.466.f: "From the very beginning of the expedition, the military attaché kept a strict log of the movements and progress of the troops, making his own maps. During a briefing it turned out that he already has an impressive collection. A scientific assistant has repeatedly accompanied him in the last week and helped a little under his arms to expand his cartographic findings; now he can also go through with the measuring instruments. The scientific assistant suggests training him to become a professional surveyor."
 lepsius.466.g: "He has a great career ahead of him!"
 lepsius.466.h: "His maps are good, but he should concentrate on military matters."
 lepsius.467.t: "A forgotten relic"
 lepsius.467.d: "The leader of our archaeological expedition has made contact with a small Christian minority in the Orient. He has amazing things to say about it."

 lepsius.467.h: "He should study the relic."
 lepsius.468.t: "Attaché caught stealing artifacts"
 lepsius.468.d: "This morning one of our diggers found two artifacts in our military attaché's tent that were thought to have been lost for a few weeks. He obviously wanted to keep them for himself."
 lepsius.468.f: "Everyone knows the history of our attaché, but the other members of the expedition had actually expected that [SCOPE.sCharacter('lepsius_military_attache').GetFullName] would not fall back into old patterns. But they were obviously wrong: once a bandit, always a bandit. Because after an excavation worker found two artifacts from the most recent excavation by chance, which the attaché did not report, the only conclusion that can be drawn is that he either wanted to keep them for himself or sell them. The expedition leader has not yet confronted him directly with the allegations, but considers an agreement on how to proceed to be more sensible before consequences are drawn from this case."
 lepsius.468.g: "Keep silent about the matter."
 lepsius.468.h: "Handle the matter carefully, but insist that he returns the artifacts."
 lepsius.468.i: "Publicly expose him and discipline him!"

 lepsius.471.t_karnak: "Karnak"
 lepsius.471.t_memphis: "Memphis"
 lepsius.471.t_uruk: "Uruk"
 lepsius.471.t_niniveh: "Nineveh"
 lepsius.471.t_tiryns: "Tiryns"
 lepsius.471.t_phaistos: "Phaistos"
 lepsius.471.t_itza: "Chichén Itzá"
 lepsius.471.t_olla: "Ollantaytombo"
 lepsius.471.d: "[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] wants to take a trip to a famous site. Although the site has great archaeological importance, this would hamper our expedition enormously."
 lepsius.471.f_karnak: "The Karnak Temple north of Luxor is considered one of the largest temple complexes in the ancient world. After the elevation of Amun-Re of Thebes to the position of local god and later imperial god, the rulers of the early Middle Kingdom began building a temple that was expanded over thousands of years to form the present-day temple complex, where the priesthood of Amun conducted daily temple service. 30 pharaohs are said to have built on it."
 lepsius.471.f_memphis: "Manetho reports that according to legend, Memphis was founded by King Menes in 3000 BC. It was the capital of Egypt during the Old Kingdom and remained an important city in Egyptian history. Memphis was under the protection of the god Ptah, the patron saint of craftsmen, whose temple Hut-Ka-Ptah was located in the center of the city. The rise and fall of Memphis are intrinsically tied to the history of the entire country."
 lepsius.471.f_uruk: "Uruk is the location of the first writing. It was already in the late 4th millennium BC. one of the leading political centers of the early Sumerian period. In ancient times, the Mesopotamian city was right on the river. In myth and literature, Uruk was famous as the capital city of Gilgamesh, hero of the Epic of Gilgamesh. Scholars identify Uruk as the biblical Erech (Genesis 10:10), the second city founded by Nimrod in Shinar."
 lepsius.471.f_niniveh: "Nineveh is located on the eastern bank of the Tigris River and was the capital and largest city of the Neo-Assyrian Empire, as well as the largest city in the world for several decades. During the Neo-Assyrian Empire, particularly from the time of Ashurnasirpal II onward, there was considerable architectural expansion. Some of the principal doorways were flanked by colossal stone lamassu door figures weighing up to 30,000 kilograms (30 t)."
 lepsius.471.f_tiryns: "Tiryns reached its height of importance between 1400 and 1200 BC, when it became one of the most important centers of the Mycenaean world, and in particular in Argolis. Its most notable features were its palace, its Cyclopean tunnels and especially its walls, which gave the city its Homeric epithet of "mighty walled Tiryns". Tiryns became associated with the myths surrounding Heracles, as the city was the residence of the hero during his labors, and some sources cite it as his birthplace."
 lepsius.471.f_phaistos: "According to legend, the city of Phaistos was founded by King Minos and named after a son or grandson of Heracles (Heros Phaistos), who was killed by Idomeneus, grandson of Minos and later king of Crete. The first ruler over Phaistos is said to have been Rhadamanthys, the brother of Minos. The city has the second largest palace complex on Crete after Knossos."
 lepsius.471.f_itza: "Chichén Itzá is one of the most important ruins on Mexico's Yucatán Peninsula. It is located about 120 kilometers east of Mérida in the state of Yucatán. Its ruins date from the late Maya period. Covering an area of 1.547 hectares, Chichén Itzá is one of the most extensive sites in Yucatán. The center is occupied by numerous monumental representative buildings with a religious and political background, from which a large, largely preserved step pyramid protrudes."
 lepsius.471.f_olla: "During the Inca Empire, Ollantaytambo was the royal estate of Emperor Pachacuti, who conquered the region, and built the town and a ceremonial center. At the time of the Spanish conquest of Peru, it served as a stronghold for Manco Inca Yupanqui, leader of the Inca resistance. Ollantaytambo is the only remaining example of Inca town planning. The buildings and Inca terraces as well as the narrow streets of the city are still in their original state. The straight and narrow streets form 15 square blocks (canchas), each with an entrance to the central courtyard surrounded by houses."

 lepsius.471.j: "Absolutely not - the expedition has priority!"
 lepsius.472.t: "A Lost World?"
 lepsius.472.d: "After our expedition has not reported for a long time, it reports large losses of men, beasts of burden and tools. The excuse given by the expedition leader for this is most amazing."

 lepsius.501.t: "Tomb of an unknown Pharaoh"
 lepsius.501.d: "Our expedition leader [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] heard about a lost tomb in the Valley of the Kings. It apparently belongs to a previously unknown pharaoh. The locals claim to have found the entrance to it."
 lepsius.501.f: "More than 3,000 years ago, the pharaohs of Egypt were buried in the legendary Valley of the Kings. Many of these tombs were already known in ancient times and were considered tourist attractions - Roman and Greek graffiti bear witness to this. The Coptic Christians even turned some open graves into chapels. For centuries, tomb robbers from nearby locations have stolen works of art from tombs and temples and sold them in the market. For this reason, nothing more than cavities remain from many graves. And yet, again and again, people from near and far came across graves that had since been forgotten and contained found objects, pictures or unopened chambers. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] recently received notification of a grave that may be in good condition."
 lepsius.501.g: "We don't have time for this."

 lepsius.502.t: "Sand, lots of Sand"
 lepsius.502.d: "When the archaeologists arrive on site, they find that there is indeed evidence of a king's tomb, but the site is completely buried with sand."
 lepsius.502.f: "Nobody thought that the excavation would be easy. But when a local guides the archaeologists to where the tomb is said to be, the first thing the expedition members face is a vertical rock face to which a dune of sand and mud clings. There is no trace of a grave anywhere. When asked, the local explains that he had never seen the entrance to the tomb; but his grandfather still knew it and his father at least saw a hint of it as a child. Due to the rainfall, the Valley of the Kings is prone to mud shifts; and the wind and egyptian sand are notorious for hiding centuries-old sites. Although some of the assistants express doubts that the grave site even exists, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] remains determined to search for the lost tomb. However, it will require some additional funding to haul away the masses of sand that the years have piled up."
 lepsius.502.g: "We need more tools!"
 lepsius.503.t: "The Boulder"
 lepsius.503.d: "After persistently using all the shovels for sale within a 10 mile radius, the team digged the entrance - only to find themselves faced with a massive boulder blocking the entrance."
 lepsius.503.f: "Days of arduous sand and mud shoveling should be rewarded - at least that's what the expedition members hoped. When the door lintel of the grave complex was actually discovered, the depressed mood of the exhausted men increased to euphoria. In just a few hours the ret of the entrance was exposed. But no sooner had you advanced further than you discovered the reason why this tomb had been spared from looting: a huge boulder, probably broken out of the rock face decades if not centuries ago, blocked the entrance. Not even a small boy could push past him, for rubble and solidified mud filled the rest of the corridor like mortar. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] was faced with an important decision: how should one try to remove the obstacle from the tomb entrance?"
 lepsius.503.g: "We use sophisticated methods."
 lepsius.503.h: "We use sophisticated mechanics."
 lepsius.503.i: "We use sophisticated nitroglycerin."
 lepsius.503.j: "We use pure muscular strenght."
 lepsius.504.t: "Tomb destroyed by Nitroglycerin"
 lepsius.504.d: "Unfortunately, the use of explosives brought more problems than good: the explosion not only destroyed the rock, but the entire tomb complex!"
 lepsius.504.f: "Organizing explosives, while not the easiest of endeavors, was solved within days when the team was able to buy reserves from a geologist for a good price. None of the expedition members would have described themselves as demolition experts, but [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] was of the opinion that dealing with highly dangerous nitroglycerin did not pose a particularly great challenge. Perhaps it would have been better to consult an expert beforehand, because our people must have misjudged the needed amount: instead of just blasting the boulder, the archeological expedition blew up the entire rock face! It was only by a miracle that the expedition members were able to save themselves before a cascade of boulders fell from the nearest mountain and reduced the entire area to rubble. Whatever was behind the entrance: it must now have been irretrievably destroyed..."
 lepsius.504.g: "Maybe that was overkill?"
 lepsius.505.t_archaeology: "Gallery Paintings"
 lepsius.505.t_engine: "A destroyed Gallery"
 lepsius.505.t_muscular: "Gallery Paintings"
 lepsius.505.d_archaeology: "After a detailed archaeological investigation and subsequent careful removal of the boulder using the latest methods, our archaeologists enter the well-preserved gallery of the pharaoh's tomb."
 lepsius.505.d_engine: "Using a machine, the team is able to remove the boulder - with negative side effects."
 lepsius.505.d_muscular: "After hiring a mighty Italian, we were able to remove the boulder - and enter the well-preserved archeological site."
 lepsius.505.f_archaeology: "Similar to a complicated operation, the archaeologists approached the boulder. They autopsied the rock, checked the material, picked with shovels and pickaxes. After detailed investigation, they decided to remove the lump in small layers using a complicated and long-term process in such a way that the hieroglyphs at the entrance were not damaged. It was a labor intensive process, but definitely worth it. Armed with oil lamps in hand, they groped their way down the first corridor and beheld the beauty of Ancient Egypt: paintings in remarkable condition of peasants in fields, the Pharaoh's court and gods of judgment flickered on the walls. Even if the archaeologists could not find any artifacts - traces of looting could definitely be found - the promising ensemble alone invited a thorough exploration of the tomb."
 lepsius.505.f_engine: "The latest technology should help our excavation at the Tomb of the Unknown Pharaoh: with a machine that should pull the boulder out of the entrance shaft via a grout. At first the rock didn't move or budge, so our scientists set the engine to full power. A fateful mistake: because although the stone briefly moved from its hold and was dragged up the slope, it soon broke free from the belt and rolled back towards the grave with full force - and caused fatal destruction there! [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] and his assistants quickly rushed into the uncovered passage, but were shocked to discover that the rock had not only completely demolished what was once a beautifully painted gallery, but also badly damaged an important wall that was used for the statics of the entire system ..."
 lepsius.505.f_muscular: "Back in Luxor, our expedition members found an impressive figure. It was a man from Padua who had originally come to Egypt to show the Pasha a hydraulic device to help with the flooding of the Nile. However, the business was unsuccessful. The giant, about two meters tall and equipped with the muscles of a bull, said he had previously worked in the circus as 'Hercules of Patagonia'. According to a trusted testimony of his English servant, he could lift six men at once. It was these special skills that convinced us to hire him to unlock access. Barely arrived at the spot, he rolled the stone aside in an admirable action. Armed with oil lamps in hand, our archaeologists rushed into the corridor and beheld the beauty of Ancient Egypt: paintings in remarkable condition of peasants in fields, the Pharaoh's court and gods of judgment flickered on the walls. The promising ensemble alone invited a thorough exploration of the tomb."
 lepsius.505.g: "The splendour of Ancient Egypt!"
 lepsius.505.h: "Oops."
 lepsius.506.t_archaeology: "A fine Sarcophagus"
 lepsius.506.t_engine: "An endangered Sarcophagus"
 lepsius.506.t_muscular: "A broken Sarcophagus"
 lepsius.506.d_archaeology: "Our archaeologists enter the King's Chamber with amazement and awe - and secure a wonderful sarcophagus and mummy from the 20th dynasty."
 lepsius.506.d_engine: "The damage caused by the machine is clearly visible in the burial chamber: the archaeologists hardly have time to take stock, instead scrambling to haul the sarcophagus outside as quickly as possible!"
 lepsius.506.d_muscular: "Our archaeologists manage to get into the intact and beautifully decorated burial chamber of the unknown pharaoh - but then an unforeseen ... mishap happens."
 lepsius.506.f_archaeology: "It was a truly historic experience when our archaeologists, led by [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName], entered the actual burial chamber. In addition to some jars with sacrificial offerings and a mummified dog, a special surprise awaited them: in fact, the sarcophagus together with the mummy of the Unknown Pharaoh still rested where he was buried more than 3,000 years ago! The scientists carefully felt the startling find, brushing away the dust and recognizing a well-preserved wooden coffin after removing the lid, which had been damaged by tomb robbers. Our museum has been enriched with a unique testimony to Egyptian culture!"


 lepsius.506.g: "Archaeology saved the day."
 lepsius.506.h: "Move it quickly!"
 lepsius.506.i: "Oops."

 lepsius.511.t: "A Question of Honor"
 lepsius.511.d: "According to some farmers, a foreign expedition hoisted their country's flag on the Cheops pyramid a few days ago. The Patriots on our team feel challenged - and want to do the same."
 lepsius.511.f: "The expedition was near Cairo when the news shocked all participants: last week someone had apparently planted their own country's flag on the top of the Giza pyramid! Such airs and graces are actually forbidden in the field of science, and it remains unknown whether the Pasha agreed to such a triumphant gesture. Only one thing is clear: throughout the expedition there was a fervent feeling of doing the same, if only to not let one's own homeland look dishonorable."
 lepsius.511.g: "We don't have time vor this."
 lepsius.511.h: "We'll do it - for [ROOT.GetCountry.GetName]!"
 lepsius.512.t: "Dawn"
 lepsius.512.d: "The expedition leaves early in the morning to climb the Great Pyramid of Giza!"
 lepsius.512.f_wine: "The participants of the pyramid ascent already get up at 5 o'clock in the morning; yesterday they prepared a flag five meters high, rolled the huge banner past the great Sphinx to the Pyramid of Cheops. A cold turkey is ready for breakfast, some are still exhausted from yesterday's work on the flag. Part of the expedition stays with a pitched tent at the feet of the Sphinx, the rest sets out for the pyramid. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] promises that there will be a specially saved bottle of wine to celebrate at the top of the pyramid."
 lepsius.512.f_no_wine: "The participants of the pyramid ascent already get up at 5 o'clock in the morning; yesterday they prepared a flag five meters high, rolled the huge banner past the great Sphinx to the Pyramid of Cheops. A cold turkey is ready for breakfast, some are still exhausted from yesterday's work on the flag. Part of the expedition stays with a pitched tent at the feet of the Sphinx, the rest sets out for the pyramid. Only when the group gets close to the Great Pyramid does the military attaché realize that [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] has forgotten the most important thing this morning: the wine to toast!"
 lepsius.512.g: "I hope he brings the best wine ..."
 lepsius.512.h: "He forgot the wine?"
 lepsius.513.t: "The Ascent"
 lepsius.513.d: "The archaeological leader and the military attaché stand at the base of the great pyramid. There is disagreement as to who should lead the daring enterprise."
 lepsius.513.f: "Our team reaches the base of the Great Pyramid of Pharaoh Cheops. The question arises as to how many steps it takes to reach heaven - and [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] can accurately answer that there are 203. There are so many stone layers to conquer. Meanwhile, the question arises as to who should lead the rise. [SCOPE.sCharacter('lepsius_military_attache').GetFullName] has already claimed that he is just as suitable as a mountain climber ..."
 lepsius.513.g: "[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] should lead us further."
 lepsius.513.h: "[SCOPE.sCharacter('lepsius_military_attache').GetFullName] should lead us further."
 lepsius.514.t: "The original entrance"
 lepsius.514.d: "Our team has climbed a lower level of the pyramid. They are now on the seventeenth step, very close to the original entrance to the burial chamber."
 lepsius.514.f: "The first stage has been taken. Our expedition is still very close to the bottom but has taken a break. Our expedition leader would like to explore the historical entrance to the Cheops pyramid more closely and descend into the interior with some excavation helpers. Some expedition members take the break to have lunch. Everyone knows that the ascent will be more dangerous from now on."
 lepsius.514.i: "This place is good enough for our flag."
 lepsius.515.t: "100 steps"
 lepsius.515.d: "Our team has climbed the hundredth step of the pyramid. The troupe is now almost halfway through the ascent."
 lepsius.515.f: "A hundred steps doesn't seem like much, but with a large group, luggage and limited space the challenge is quite different. Our banner is still rolled up and carried by five men. Some members of the Expeiditon are already announcing that the view at this point is high enough. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName], meanwhile, looks worriedly to the top - because the most risky phase of the ascent is imminent."
 lepsius.516.t: "Tha Fall"
 lepsius.516.d: "During the last pyramid stage, our leader and his people apparently overdid themselves - a devastating incident occurred!"
 lepsius.516.f: "Maybe it was a human error, maybe a plan didn't work out, but maybe fate punished us for our arrogance. However, when climbing the pyramids, a helper slipped on a pyramid step and dragged the other expedition members and loads into the abyss with him. Our expedition leader and our military attaché could prevent the worst, but were badly injured. Some porters got away with replenishments, others complain of broken bones. We had to call off the ambitious undertaking to hoist our flag on the Great Pyramid."
 lepsius.516.g: "A shame for all of us."
 lepsius.517.t: "On the Top of the Great Pyramid"
 lepsius.517.d: "A truly outstanding day for the expedition team and our country - the [ROOT.GetCountry.GetAdjectiveNoFlag] flag flies over the Great Pyramid of Giza!"
 lepsius.517.f: "A great moment for archaeology, a great moment for [ROOT.GetCountry.GetName]. Our expedition climbed to the top of the Cheops Pyramid and marked the achievement with a small celebration. The names of Champollion, Lepsius and Rosellini rang out in unison with a hearty 'hip-hip-hooray!' and finally the patriots hoisted the flag. In the light of the setting sun, our banner now shines across the entire Nile Valley!"
 lepsius.517.g: "Raise the flag of [ROOT.GetCountry.GetName] - and cheers!"
 lepsius.517.h: "Raise the flag of [ROOT.GetCountry.GetName]!"

 lepsius.521.t: "The Ishtar Gate"
 lepsius.521.d: "During their excavations in Babylon, archaeologists have discovered the colossal remains of the legendary Ishtar Gate. The historic city gate is in remarkably good condition."
 lepsius.521.f: "During their excavations on the site of the ancient Babylonian capital, excavation workers first found glazed bricks, which suggested a prestigious, representative building. The further the archaeologists dug at the site, the more finds they made. Finally, they could even make out the walls and towers of the excellently preserved city gate, on which lions, bulls and mythical creatures strutted. Expedition leader [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] presented our government with a daring plan: dismantle the entire gate and rebuild it true to the original in the capital. A costly undertaking with many imponderables - and at the same time so attractive that leading intellectuals and the museum management have joined the idea."
 lepsius.521.g: "Just take some parts. It should stay where it is."
 lepsius.521.h: "It should be transported to [SCOPE.sState('capital_scope').GetCityHubName] and reconstructed."
 lepsius.522.t: "Transport of bricks from Mesopotamia"
 lepsius.522.d: "A full-size batch of bricks for brick reconstruction has reached the museum at [SCOPE.sState('capital_scope').GetCityHubName] today."
 lepsius.522.f: ""
 lepsius.522.g: "I love the smell of Mesopotamian bricks in the morning."
 lepsius.523.t: "Ishtar bricks in foreign hands"
 lepsius.523.d: "We are not the only ones who have been digging in Babylon over the last few decades. It turns out that a foreign nation also owns some shipments of the bricks needed to rebuild the Ishta Gate. We are forced to ask humbly."
 lepsius.523.f: ""
 lepsius.523.g: "We shall probably humble ourselves."
 lepsius.523.h: "For some worthless bricks? Never!"
 lepsius.524.t: "Enemy blocks our brick transport!"
 lepsius.524.d: "The long-awaited shipment of Mesopotamian bricks to rebuild the Ishtar Gate in our museum has not arrived after months. We received news that the transport was blocked during the war."
 lepsius.524.f: ""
 lepsius.524.g: "That's sabotage!"
 lepsius.525.t: "A special fee"
 lepsius.525.d: "Apparently the excavation country where the bricks for the Ishtar Gate come from is trying to profit from our venture. When the bricks were exported, a 'special fee' was charged on the bricks!"
 lepsius.525.f: ""
 lepsius.525.g: "We'll pay every piece of stone ..."
 lepsius.526.t: "Small Transport of bricks from Mesopotamia"
 lepsius.526.d: "Unknown circumstances have resulted in our ship being only half filled with the bricks of the Ishtar Gate this time."
 lepsius.526.f: ""
 lepsius.526.g: "What's so hard about shipping a few bricks?"
 lepsius.527.t: "Shipload of bricks arrives in port"
 lepsius.527.d: "An unusually large number of bricks needed to rebuild the Ishtar Gate have reached the museum today. Apparently the loading in Mesopotamia is progressing better than expected."
 lepsius.527.f: ""
 lepsius.527.g: "Ah, more bricks!"
 lepsius.528.t: "Bad bricks"
 lepsius.528.d: "Unfortunately, when we looked at the bricks that had arrived in [SCOPE.sState('capital_scope').GetCityHubName], our curators found that some of the boxes were completely unusable. For better or for worse, we have to do without them."
 lepsius.528.f: ""
 lepsius.528.g: "My valuable bricks - no!"
 lepsius.529.t: "Diplomatic prostration"
 lepsius.529.d: "A foreign nation humbled itself before the world public just to beg us for some worthless archeological artifacts that an antiquarian sold us a few years ago. Of course, we gladly accepted the gesture and freed ourselves from this junk."
 lepsius.529.f: ""
 lepsius.529.g: "Formidable!"
 lepsius.530.t: "Ishtar Gate reconstructed!"
 lepsius.530.d: "After years of work and painstaking assembly of tens of thousands of Babylonian fragments, the legendary Ischtar Gate shines in new splendor - namely in its original size in our museum!"
 lepsius.530.f: "The Ishtar Gate was the eighth gate to the inner city of Babylon.  It was constructed circa 575 BCE by order of King Nebuchadnezzar II on the north side of the city. It was part of a grand walled processional way leading into the city. The walls were finished in glazed bricks mostly in blue, with animals and deities in low relief at intervals, these also made up of bricks that are molded and colored differently. The front of the gate has a low relief design with a repeated pattern of images of two of the major gods of the Babylonian pantheon. Marduk, the national deity and chief god, with his servant dragon Mušḫuššu. is depicted as a dragon with a snake-like head and tail, a scaled body of a lion, and powerful talons for back feet. Marduk was seen as the divine champion of good against evil, and the incantations of the Babylonians often sought his protection. The second god shown in the pattern of reliefs on the Ishtar Gate is Adad (also known as Ishkur), whose sacred animal was the aurochs, a now-extinct ancestor of cattle. Adad had power over destructive storms and beneficial rain. The design of the Ishtar Gate also includes linear borders and patterns of rosettes, often seen as symbols of fertility. The bricks of the Ishtar gate were made from finely textured clay pressed into wooden forms. Each of the animal reliefs was also made from bricks formed by pressing clay into reusable molds."
 lepsius.530.g: "Magnificent!"

 lepsius.531.t: "The Legend of the Lamassu"
 lepsius.531.d: "Our archaeologists have heard the story of an extraordinarily magnificent lamassu that is said to have been lost a long time ago and is somewhere in the Kurdish region."
 lepsius.531.f: "It was on an evening when our team set up the tents, lit the campfire, and prepared the mutton to end the day. In the smoldering black, blue, and red hues of dawn, an old shepherd arrived at the camp asking for provisions. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] complied and was told an amazing story. About 30 years ago, another archaeological expedition is said to have searched for treasures and extraordinary works of art in this area in order to impress the local museum management and return home with fame and glory. The highlight of the excavation was a huge lamassu, which is still known to the locals today because of its monumental size and good condition. But an accident happened during the transport. While dozens of men moved the giant statue of the Mesopotamian hybrid, the expedition leaders fell out with the local Kurdish tribe. Apparently they wanted to cheat the recruited Kurdish helpers out of their wages. So the tribe ambushed the expedition members and took what was believed to be theirs. The lamassu, however, remained where it was - and is still waiting to be recovered in the Kurdish region. The shepherd has offered to tell us the location of the legendary Lamassu in exchange for our help."
 lepsius.531.g: "It is far too dangerous to put oneself in needless danger because of such fairy tales."
 lepsius.531.h: "We must recover this lamassu at all costs!"
 lepsius.532.t: "Searching the Lamassu"
 lepsius.532.d: "Our expedition has embarked on the dangerous journey to the Kurdish region. Some advocate splitting up because of the greater chance of success."

 lepsius.532.g: "We shouldn't split."
 lepsius.532.h: "We should split up the expedition."
 lepsius.533.t: "Gifts"
 lepsius.533.d: "Our expedition has met with the clan leaders to obtain permission to cross the area peacefully and recover the lamassu."
 lepsius.533.f: "Not splitting up the expedition turned out to be an unexpected advantage: the sluggishness of the baggage train meant that the leaders of the local Kurdish clan found us faster than we would have expected. Soon the expedition leader and the military attaché were brought before the patriarchs, who are considered the real rulers of this area. They encountered an uncomfortable distrust. Apparently, unpleasant memories of the last archaeological expedition live on with them. There is also the expectation that we, as guests, will bring gifts. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] had made provisions for this eventuality, but apparently the materials acquired are simply not enough for many of the leaders to convince them of our intentions."
 lepsius.533.g: "We offer fine fabrics."
 lepsius.533.h: "Remind them of their honor and hospitality."
 lepsius.533.i: "Show them a gesture of submission."
 lepsius.534.t: "Insulted"
 lepsius.534.d: "The attempt to win over the Kurdish patriarchs was a complete failure - instead we turned them against us. An escalation of the situation threatens our entire expedition!"

 lepsius.534.g: "Guards!"
 lepsius.534.h: "Defend!"
 lepsius.534.i: "Flee!"
 lepsius.535.t: "Expedition members kidnapped by Kurds"
 lepsius.535.d: "After an unsuccessful search by the downsized expedition, they are horrified to find on their return that some members of the team that stayed behind were victims of a Kurdish attack."
 lepsius.535.f: "The strategy of splitting up the expedition later turned out to be a devastating mistake. Apparently a Kurdish tribe was just waiting for prey and took the opportunity when the armed part under the military attaché separated from the rest of the convoy. Because most of the materials they took with them were of little value to the looters, they abruptly kidnapped a good dozen helpers as hostages, apparently convinced that they could get a ransom for them. However, the expedition team decided not to accept such an offer - it could set precedents for the future. While [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] insists on negotiating with the Kurdish leaders, [SCOPE.sCharacter('lepsius_military_attache').GetFullName] insists on attacking the Kurdish camp and teaching the looters a lesson."
 lepsius.535.g: "Try to negotiate."
 lepsius.535.h: "Attack them!"
 lepsius.536.t: "Negotiation failed!"
 lepsius.538.t: "The Night of Sorrows"
 lepsius.538.d: "The search for the lamassu failed."
 lepsius.538.f: "The expedition team leaves the Kurdish region empty-handed. Like kicked dogs, they make their way through the hills at night to resume the old route. The loss of people and material depresses all expedition members. The question of the meaningfulness of the entire journey leaves melancholy and dejection in its wake."
 lepsius.538.g: "We will return..."
 lepsius.539.t: "A noble death"
 lepsius.539.d: "[SCOPE.sCharacter('lepsius_military_attache').GetFullName], our military attaché, fell in battle with the Kurds!"
 lepsius.539.f: "It was a bitter battle, but our little-trained troops could hardly do anything against the tried-and-tested and courageous Kurdish fighters. The attaché ordered the retreat and stayed behind with his own men to cover our rear. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] could only take a last look back and see how he fell to the ground in defeat. He bought the team valuable time to get to safety, while for himself any help came too late."
 lepsius.539.g: "He gave his life for ours."
 lepsius.540.t: "The Lamassu"
 lepsius.540.d: "[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] was able to convince the Kurds of our concerns. The way to recover the Lamassu is clear."
 lepsius.540.d_victory: "We've won a military victory over the native Kurdish tribe and cleared our way to the legendary Lamassu!"
 lepsius.540.f: "It was not easy to convince the Kurds of our good intentions, but the useful qualities of our expedition leader made this seemingly impossible undertaking a success. After only a few days of searching, we found the described lamassu near a cliff. A majestic apparition radiating out over the whole valley! Our archaeologists were pleased to find that the colossus is almost undamaged. It is already clear that it will be the main exhibit in our Mesopotamian collection."
 lepsius.540.f_victory: "After a hard and bitter battle, our heroic attaché [SCOPE.sCharacter('lepsius_military_attache').GetFullName], thanks to his superior skills (and a little help from his soldiers), managed to put the enemy to flight. Impressed by this lesson, the Kurds no longer dared stand in the way of the lamassu's recovery. After only a few days of searching, we found the described lamassu near a cliff. A majestic apparition radiating out over the whole valley! Our archaeologists were pleased to find that the colossus is almost undamaged. It is already clear that it will be the main exhibit in our Mesopotamian collection."
 lepsius.540.g: "It is wonderful!"

 lepsius.561.t: "The Mysterious Pyramid"
 lepsius.561.d: "Our archaeological expedition has identified a hitherto unrecorded pyramid, half-swallowed by the Yucatec selva. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] has encountered lore of this place before and resolves to attempt an entry ..."

 lepsius.561.g: "I have a bad feeling about this."
 lepsius.561.h: "Interesting. You go first."
 lepsius.562.t: "The Glyph-Riddle"
 lepsius.562.d: "At the end of a long corbelled passage stands a dressed-stone panel bearing a riddle. Four recessed cartouches, each carved with the visage of a great Maya god, can be depressed; the masonry fairly reeks of a mechanical contrivance. Beneath runs a distich: “I rise in the east in fiery glory; at zenith I blaze like jade; at dusk I descend the road beneath the earth. I keep the count of days and seat the lords.” One cartouche must be pressed."

 lepsius.562.g: "K'inich Ajaw (Sun Lord)."
 lepsius.562.h: "Chaac (Rain/Thunder)."
 lepsius.562.i: "Itzamnaaj (Creator/Sky)."
 lepsius.562.j: "Kukulkan (Feathered Serpent)."
 lepsius.563.t: "The Idol"
 lepsius.563.d_right: "Our archaeologist attains the goal of the venture; the mechanism yields and a sanctum opens."
 lepsius.563.d_wrong: "Our archaeologist gains the inner chamber; yet the facility of access offends reason—surely the device has not had its last word."

 lepsius.563.g: "Gently... carefully... do it..."
 lepsius.563.h: "I know this scene—it never works out. Grab the damn artifact and RUN!"
 lepsius.564.t: "It's a trap!"

 lepsius.564.g: "RUN!"
 lepsius.564.h: "I knew it—blast!"
 lepsius.565.t_right: "Leaving the Pyramid"
 lepsius.565.t_wrong: "An Archaeological Rival"
 lepsius.565.d_right: "Against expectation, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] survives the contrivances within the pyramid and succeeds in securing the idol!"

 lepsius.565.g: "Charlie, start the engine!"
 lepsius.565.h: "I can't stand that guy."
 lepsius.566.t: "An archaeological offer"
 lepsius.566.d: "A private archaeologist offers us an excellent commodity that he previously snatched away from a foreign rival."
 lepsius.566.f: "A private expedition has reported a Mayan pyramid deep in the selva of Yucatán. Its leader—alas, a compatriot—claims to have procured a sacred idol which, by a curious turn, had just been wrested from the grasp of a fedora‑wearing [PREV.GetCountry.GetAdjectiveNoFlag] archaeologist. The latter, so the tale goes, perished shortly thereafter in a violent skirmish with Hovitos tibesmen. However shaded the circumstances, the piece would be a singular attraction for our museum’s Pre‑Columbian collection—provided we meet the asking price."
 lepsius.566.g: "This artifact will look splendid in our collection!"
 lepsius.566.h: "We do not buy artifacts from ruthless grave robbers."

 lepsius.581.t: "Return to the Lost World"

 lepsius.581.g: "He should restore his honor."

 lepsius.581.i: "Our national interests trump the bruised egos of lousy individuals."
 lepsius.582.t: "Disregarded explorer returns triumphant"
 lepsius.582.d: "To the surprise of the entire scientific world, [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] has returned from Yucatán - and has proof of his bizarre claims!"

 lepsius.582.g: "He ... was right?"
 lepsius.583.t: "Disregarded explorer vanishes in Yucatán"



 lepsius.584.t: "Entering the Lost World"
 lepsius.584.d: "After weeks, the expedition has reached a completely unknown valley. It seems that [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] is actually right with his fantastic claims!"

 lepsius.584.g: "Incredible!"
 lepsius.585.t: "Photographing Dinosaurs"
 lepsius.585.d: "The new technical possibilities allow the unique flora and fauna of the Lost World to be captured on camera."
 lepsius.585.f: "It's like looking through a window into a world millions of years ago: pterosaurs rule the skies, giant brontosaurs shake the earth and dangerous raptors hunt unwary prey. The plants here are also completely different from those in other parts of Yucatán. A scientific companion took advantage of the moment and took a whole series of photos with his camera, which serve as evidence for home. The scientists there may be able to reconstruct the early history of the earth even better."
 lepsius.585.g: "Please, make 'ROAR'!"
 lepsius.586.t: "Maya presence"
 lepsius.586.d: "After a thorough exploration of the valley, the expedition leader came up with a risky plan."

 lepsius.586.g: "A unique opportunity!"
 lepsius.586.h: "Let's take only the most necessary evidence with us."
 lepsius.587.t: "Expedition ends in horrific desaster"
 lepsius.587.d: "The expedition has taken the worst possible turn after a raptor attack."

 lepsius.588.t: "Gem of Kukulkan"
 lepsius.588.d: "Against all odds, our expedition leader managed to get hold of the legendary Gem of Kukulkan!"

 lepsius.589.t: "Heroes return from the Lost World"

 lepsius.589.f: "What a day! After a dangerous and adventurous journey to the end of the world, our expedition was able to share their extraordinary finds to prove to the public that [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] is not a madman, but in fact a reputable scientist - and a real hero! The press and the population have revised their attitude in detail and also recognize the support from the government as the right decision. However, the expedition leader has pledged to keep the true location of the valley a secret in order to conserve the flora and fauna there and reduce the risk of poachers."

 lepsius.701.t: "Foreigners want to steal our inheritance"
 lepsius.701.d: "[SCOPE.sCountry('lepsius_smuggler_country').GetAdjectiveNoFlag] Archaeologists were caught trying to illegally move a major artifact out of the country today. How should we react?"
 lepsius.701.f: "Foreigners from [SCOPE.sCountry('lepsius_smuggler_country').GetName] who have been granted excavation licenses by us were caught trying to transport an extremely valuable artifact out of the country today. According to current laws, foreign archaeologists are obliged to hand over half of the artifacts found to the excavation country. Apparently they tried to smuggle the find home without us being able to inspect it."
 lepsius.701.g: "Protest!"
 lepsius.701.h: "What shall we do with this old gibberish?"
 lepsius.702.t: "Diplomatic incident"
 lepsius.702.d: "Unfortunately, the authorities in [SCOPE.sCountry('lepsius_protest_country').GetName] have noticed our attempt to bring the valuable artifact into our country. How should we react?"
 lepsius.702.f: "From the end of the 19th century, the most common form of archaeological excavation license was based on the sharing of finds: the excavator gave half of the artifacts found to the country in which he was conducting an excavation. The authorities inspected the objects found and had a special eye on that the most valuable pieces were not taken out of the country. However, it happened again and again that some countries insisted on not handing over a piece that had been excavated; in other cases, the parties agreed in a deal how to proceed."
 lepsius.702.g: "Whoever finds it gets to keep it."
 lepsius.702.h: "We will certainly find an amicable agreement."
 lepsius.702.i: "Donate the artifact as a token of our philanthropy."
 lepsius.703.t: "Foreigners laugh at us!"
 lepsius.703.d: "The barbarians from [SCOPE.sCountry('lepsius_smuggler_country').GetName] made fun of our claims. They wouldn't dream of letting us have any part in the find - and have smuggled the artifact back to their homeland."
 lepsius.703.f: "The Victorian era has countless stories of artifacts being illegally taken out of the country, particularly by European powers. In some cases, museums still have claims for reimbursement to this day."
 lepsius.703.g: "This arrogance is unbelievable!"
 lepsius.704.t: "Concessions granted"
 lepsius.704.d: "[SCOPE.sCountry('lepsius_smuggler_country').GetName] accommodated us and accepted our claims as justified. Diplomatically and financially they want to grant us concessions. They also offer us a number of other finds to encourage us to hand over the precious treasure."
 lepsius.704.f: "In many cases of suspected grave robbery or theft, the European powers accommodated the excavation countries. After the excavations in Troy, for example, Schliemann had to present himself to the Sublime Porte because he had smuggled artifacts abroad. Schliemann not only handed in a few finds, but also paid five times the amount demanded. Certainly such a procedure was not the most charming way of dealing internationally, but it was always better than cheating the excavation country entirely and was often accepted by the plaintiff countries as an amicable settlement."
 lepsius.704.g: "Glad they realized they were wrong."
 lepsius.706.t: "Major Artifact arrived!"
 lepsius.706.d: "With a slight delay, the valuable artifact finally arrived at the museum today. The director has already chosen a very special place for it!"
 lepsius.706.f: "Major artifacts are the pride of every exhibition and museum. Happy a country that can call such gems its own!"

 lepsius.711.t: "Mask of Tutankhamun"
 lepsius.711.d: "After discovering the lost tomb of Tutankhamun, our archaeologists were able to recover a very special artifact: the pharaoh's mask!"
 lepsius.711.f: "The mask of Tutankhamun is a gold mask of the 18th-dynasty ancient Egyptian pharaoh Tutankhamun. The death mask is one of the best-known works of art in the world and a prominent symbol of ancient Egypt. Bearing the likeness of Osiris, Egyptian god of the afterlife, it is 54 centimetres tall, weighs over 10 kilograms or 321.5 troy ounces, and is decorated with semi-precious stones. An ancient spell from the Book of the Dead is inscribed in hieroglyphs on the mask's shoulders. The face represents the pharaoh's standard image, and the same image was found by excavators elsewhere in the tomb, in particular in the guardian statues. According to the Egyptologist Nicholas Reeves, the mask is 'not only the quintessential image from Tutankhamun's tomb, it is perhaps the best-known object from ancient Egypt itself.'"
 lepsius.711.g: "It will be the finest exhibit in our collection."
 lepsius.711.h: "We should try to get the artifact out of the country safely..."
 lepsius.712.t: "Bust of Nefertiti"
 lepsius.712.d: "During our excavations in Egypt, our archaeologists found a truly outstanding artifact: the Bust of Nefertiti!"
 lepsius.712.f: "The Nefertiti Bust is a painted stucco-coated limestone bust of Nefertiti, the Great Royal Wife of Egyptian pharaoh Akhenaten. It is one of the most-copied works of ancient Egypt. Nefertiti has become one of the most famous women of the ancient world and an icon of feminine beauty. Little is known about Nefertiti. Theories suggest she could have been an Egyptian royal by birth, a foreign princess or the daughter of a high government official named Ay, who became pharaoh after Tutankhamun. She may have been the co-regent of Egypt with Akhenaten, who ruled from 1352 BCE to 1336 BCE. The bust does not have any inscriptions, but can be certainly identified as Nefertiti by the characteristic crown, which she wears in other surviving depictions."
 lepsius.713.t: "Palette of Narmer"
 lepsius.713.d: "Our archaeologists have unearthed an extraordinary artifact during their excavations: the Palette of Narmer!"
 lepsius.713.f: "The Narmer Palette, also known as the Great Hierakonpolis Palette or the Palette of Narmer, is a significant Egyptian archeological find, dating from about the 31st century BC, belonging, at least nominally, to the category of cosmetic palettes. It contains some of the earliest hieroglyphic inscriptions ever found. The tablet is thought by some to depict the unification of Upper and Lower Egypt under the king Narmer. Along with the Scorpion Macehead and the Narmer Maceheads, also found together in the main deposit at Nekhen, the Narmer Palette provides one of the earliest known depictions of an Egyptian king. The Palette shows many of the classic conventions of Ancient Egyptian art, which must already have been formalized by the time of the Palette's creation. The Egyptologist Bob Brier has referred to the Narmer Palette as 'the first historical document in the world'."
 lepsius.722.t: "Mask of Sargon"
 lepsius.722.d: "During excavations in Nineveh in the course of discovering the Hanging Gardens, our archaeologists found a remarkable artifact: the Mask of Sargon!"
 lepsius.722.f: "The bronze head of a king, wearing the wig-helmet of the old Sumerian rulers, is probably Sargon himself. Though lacking its inlaid eyes and slightly damaged elsewhere, this head is rightly considered one of the great masterpieces of ancient art.The head is a life-size, bronze bust found in Nineveh. The intricate curling and patterning of the beard and the complex hairstyle suggests royalty, power, and wealth from an ideal male in society. Aside from its aesthetic traits, this piece is spectacular because it is the earliest hollow-cast sculpture item known to use the lost-wax casting process.  There is deliberate damage on the left side of the face and eye, indicating that the bust was intentionally slashed at a later period to demonstrate political iconoclasm."
 lepsius.723.t: "Helmet of Meskalamdug"
 lepsius.723.d: "During our excavations in Babylonia, our archaeologists came across a special find: the Helmet of Meskalamdug!"
 lepsius.723.f: "The Helmet of Meskalamdug is one of the most famous finds from the royal tombs of Ur. Meskalamdug was an early Sumerian ruler of the First Dynasty of Ur in the 26th century BCE. The helmet was embossed in gold sheet and was therefore hardly suitable as protective clothing for war. It may have been used more in the ceremonial/cultic area. Apart from the ears worked out on the sides, the work as a whole is more like a wig, as its fine engravings imitate a wavy hairstyle. On the side, on the other hand, there are curls that are separated from the wavy hairstyle by a braid around the head. The braid is knotted into a button at the end of the head. The helmet has a series of small holes on the edge, to which a lining was probably attached."
 lepsius.731.t: "Mask of Agamemnon"
 lepsius.731.d: "After discovering the treasures in Mycenae, one artifact in particular caught our eye: a golden death mask, the so-called Mask of Agamemnon!"
 lepsius.731.f: "The 'Mask of Agamemnon' is the name given to a gold funeral mask discovered at the ancient Greek site of Mycenae. German archaeologist Heinrich Schliemann, who discovered the artifact in 1876, believed that he had found the body of the Mycenaean king Agamemnon, leader of the Achaeans in Homer's epic of the Trojan War, the Iliad, but modern archaeological research suggests that the mask dates to about 1600 BC, pre-dating the period of the legendary Trojan War by 300-400 years. The mask is made of yellow-reddish, strong gold sheet and has a height of about 26 cm and a width of 26.5 cm. The face of a man with a beard, mustache and eyebrows is embossed into the sheet metal. There is a hole next to each earlobe, which was probably used for attachment. The mask has been described by Cathy Gere as the 'Mona Lisa of prehistory'."
 lepsius.732.t: "Phaistos Disc"
 lepsius.732.d: "Excavations in Crete have unearthed an idiosyncratic and mysterious artifact: the Phaistos Disc!"
 lepsius.732.f: "The Phaistos Disc is a disk of fired clay from the Minoan palace of Phaistos on the island of Crete, possibly dating to the middle or late Minoan Bronze Age (second millennium BC). The disk is about 15 cm in diameter and covered on both sides with a spiral of stamped symbols. Its purpose and its original place of manufacture remain disputed. The disc was discovered in 1908 by the Italian archaeologist Luigi Pernier in the Minoan palace-site of Phaistos, and features 241 tokens, comprising 45 distinct signs, which were apparently made by pressing hieroglyphic 'seals' into a disc of soft clay, in a clockwise sequence spiralling toward the center of the disk. The Phaistos Disc captured the imagination of amateur and professional archaeologists, and many attempts have been made to decipher the code behind the disc's signs."
 lepsius.733.t: "Snake Goddess"
 lepsius.733.d: "A Minoan artifact of particular artistic and historical importance fell into our hands during excavations on Crete: the Snake Goddess!"
 lepsius.733.f: "Two Minoan snake goddess figurines were excavated in 1903 in the Minoan palace at Knossos in the Greek island of Crete. The Knossos figurines, both significantly incomplete, date to near the end of the neo-palatial period of Minoan civilization, around 1600 BCE. It was Evans who called the larger of his pair of figurines a 'Snake Goddess', the smaller a 'Snake Priestess'; since then, it has been debated whether Evans was right, or whether both figurines depict priestesses, or both depict the same deity or distinct deities. The combination of elaborate clothes that leave the breasts completely bare, and 'snake-wrangling', attracted considerable publicity, not to mention various fakes, and the smaller figure in particular remains a popular icon for Minoan art and religion, now also generally referred to as a 'Snake Goddess'."
 lepsius.771.t: "Burial Treasure of Pakal"
 lepsius.771.d: "After discovering King Pakal's tomb, we were able to recover some special artifacts: Pakal's Burial Treasures!"
 lepsius.771.f: "It is remarkable that the Maya, who had no metal tools, created many objects from a very thick and dense material, jade (jadeite), particularly all sorts of (royal) dress elements, such as belt plaques - or celts - ear spools, pendants, and also masks. Celts (i.e., flat, celt-shaped ornaments) were sometimes engraved with a stela-like representation of the king (e.g., the Early-Classic 'Leyden Plate'). The best-known example of a mask is probably the death mask of the Palenque king Pakal, covered with irregularly-shaped marble plaques and having eyes made from mother-of-pearl and obsidian. Pacal the Great was ajaw of the Maya city-state of Palenque in the Late Classic period of pre-Columbian Mesoamerican chronology. He acceded to the throne in July 615 and ruled until his death. He reigned 68 years. "

 lepsius.721.t: "The Epic of Gilgamesh"
 lepsius.721.d: "Our Assyriologists have succeeded in reconstructing the basic features of the Epic of Gilgamesh on the basis of the cuneiform tablets found."
 lepsius.721.f: "Gilgamish arose interpreting dreams,\n addressing his mother.\n 'My mother! during my night\n I, having become lusty, wandered about\n in the midst of omens.\n And there came out stars in the heavens,\n Like a ... of heaven he fell upon me.\n I bore him but he was too heavy for me.\n He bore a net but I was not able to bear it.\n I summoned the land to assemble unto him,\n that heroes might kiss his feet.\n He stood up before me\n and they stood over against me\n I lifted him and carried him away unto thee.'"
 lepsius.721.g: "The oldest epic in human history..."

 lepsius.741.t: "The Treasure of Priam"
 lepsius.741.d: "After his groundbreaking discovery of Troy, Heinrich Schliemann is looking for a suitable museum to which he can donate Priam's treasure."
 lepsius.741.f: "Although Schliemann shook experts with his excavations and enjoyed popularity throughout Europe, he encountered resistance from experts, particularly because of his research methods. There were still a number of caveats. For example, historians and archaeologists doubted that the so-called Treasure of Priam could really come from a layer that corresponded to Homeric Troy. Furthermore, when Schliemann decided to donate his finds to a museum, he did not get the response he would have expected; old patrons were dismissive. Famous museums such as the Hermitage or the Louvre also refused. The discoverer temporarily exhibited the treasure in London until he decided in 1881 to bequeath the find 'to the German people for perpetual possession and safekeeping in the capital of the Reich'."
 lepsius.741.g: "... and I know the perfect location for this treasure!"
 lepsius.743.t: "Schliemann donates Priam's treasure"
 lepsius.743.d: "After much deliberation, [SCOPE.sCharacter('lepsius_new_archaeologist_scope').GetFullName] decided to entrust Priam's treasure to our museum!"
 lepsius.743.g: "We will set up a hall for it - and name it after Schliemann!"
 lepsius.743.h: "[SCOPE.sCharacter('lepsius_new_archaeologist_scope').GetLastName] is the real treasure!"
 lepsius.744.t: "Schliemann donates Priam's treasure to a museum"
 lepsius.744.d: "Today we unfortunately received the news that Heinrich Schliemann bequeathed Priam's treasure to a museum. Unfortunately it's not ours."
 lepsius.744.g: "How could he betray us like that?"

 lepsius.801.t: "Excavation site"
 lepsius.801.d: "Which excavation site should we send our archaeologist to?"
 lepsius.801.f: "When Mr. Coffeecake realized that the impressively realistic-looking treasure map actually came from a gumball machine, he had to change his archaeological travel plans in ways never before seen."
 lepsius.801.g: "Upper Egypt."
 lepsius.801.h: "Lower Egypt."
 lepsius.801.i: "Babylonia."
 lepsius.801.j: "Assyria."
 lepsius.801.k: "Argolis."
 lepsius.801.l: "Yucatán."
 lepsius.801.m: "Nevermind."
 lepsius.802.t: "Archaeologist"
 lepsius.802.d: "Which archaeologist should we send away to establish a new excavation site?"
 lepsius.802.f: "Most countries have only one archaeologist, who often also fills the position of Lead Scientist; however, should a nation - for whatever reason - have more experienced archaeologists, there is the option of selecting a second person here."
 lepsius.802.g: "[SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName]"
 lepsius.802.h: "[SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName]"
 lepsius.803.t: "Departure"

 lepsius.803.g: "Good luck!"

 lepsius.811.t_vok: "Tomb of a Noble"
 lepsius.811.t_pyr: "Shrine of Bastet"
 lepsius.811.t_bab: "Sumerian Tomb"
 lepsius.811.t_ass: "Assyrian Shrine"
 lepsius.811.t_arg: "Mycenaen Sanctuary"
 lepsius.811.t_yuc: "Storage House"
 lepsius.811.d: "Our archaeologist set up a mediocre excavation site."

 lepsius.811.f_pyr: "[SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] has found the ruins of an ancient Egyptian temple complex in a swampy part of the Lower Egyptian Nile Delta - that's what it seemed at first. Unfortunately, it turned out to be a much smaller find: the supposed temple was more of a shrine dedicated to the cat goddess Bastet. Nevertheless, our researchers have started the excavation - after all, you have to start somewhere."
 lepsius.811.f_bab: "The Sumerians are perhaps the oldest civilization in the world. [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] in Babylonia accidentally discovered a tomb of the ancient people who are said to have invented the wheel and writing. Unfortunately, however, it turned out after a short time that most of the artifacts had been stolen or destroyed. Archaeologists have started work."

 lepsius.811.f_arg: ""
 lepsius.811.f_yuc: "Unfortunately, our excavation team in Yucatán has had little success in their search for remains of the Mayanculture. In a side valley, the archaeologists found an old warehouse that previously only offered broken pottery. In a telegram, [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] confirmed that more was to be expected in the future."
 lepsius.811.g: "A mediocre place, but it's ours ..."
 lepsius.812.t_vok: "Tomb of a Prince"
 lepsius.812.t_pyr: "Temple of Ra"
 lepsius.812.t_bab: "Ziggurat of the Moon"
 lepsius.812.t_ass: "Assyrian Fortress"
 lepsius.812.t_arg: "Chamber Tomb"
 lepsius.812.t_yuc: "Mayan Observatory"
 lepsius.812.d: "Our archaeologist set up a good excavation site."
 lepsius.812.f_vok: "Good news from Egypt! After many hardships, [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] discovered a previously unknown tomb. According to initial information, it is the final resting place of an ancient Egyptian prince. While missing some artifacts that may have been stolen and sold by locals in the past, it is otherwise a good starting point for further archaeological excavations."
 lepsius.812.f_pyr: "Under a clear Egyptian sky, the last remnant of electron flashes on the top of an obelisk on the horizon - and marks the entrance to a temple of the sun god Ra! [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] immediately secured the site and started excavation."

 lepsius.812.f_ass: "To this day, the Bible has drawn the image of the Assyrians in a rather negative light among Jews and Christians. Notorious as a warrior people that repeatedly harassed the Israelites and ultimately destroyed the northern kingdom, they went down in history as a major military power. While not all of this negative propaganda is true, the discovery of an Assyrian fortress has shown that the ancient rulers of the Middle East had an impressive military culture."
 lepsius.812.f_arg: "[SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] recently found a Mycenaen chamber tomb. This form of mortuary architecture was in use in the Late Bronze Age in the areas under the cultural influence of the Aegean. The tombs are cut from rock and have a tripartite structure (chamber, stomion and dromos), often with additional niches and side chambers in which primary or secondary burials took place. The director of our museum has put a bottle of champagne cold."
 lepsius.812.f_yuc: "The Maya had a keen interest in astronomy. Apparently, they had a distinctive knowledge of celestial phenomena that was superior to that of the ancient Greeks in many respects. [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] has uncovered a building in the jungle that has a spiral staircase shaped like a snake at its top. Our researchers are excited to see what insights and artifacts this discovery holds."
 lepsius.812.g: "A fine place for an excavation."
 lepsius.813.t_vok: "Tomb of a Queen"
 lepsius.813.t_pyr: "Unchartered Pyramid"
 lepsius.813.t_bab: "Babylonian Gate and Walls"
 lepsius.813.t_ass: "Assyrian Palace"
 lepsius.813.t_arg: "Mycenaen Citadel"
 lepsius.813.t_yuc: "Mayan Pyramid"
 lepsius.813.d: "Our archaeologist set up an excellent excavation site."

 lepsius.813.f_pyr: "When the latest telegram from [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] arrived today, our researchers didn't want to believe it at first: apparently our archaeologists have rediscovered a previously unknown pyramid in the Egyptian desert. Although locals have already spoken about the object, which is completely covered by sand, they have not found an entrance. Our nation can call numerous finds from the Old Kingdom its own!"


 lepsius.813.f_arg: "Did demigods or cyclops really build the ancient cities? A formidable Mycenaean citadel rises above the Greek hills as our expedition team reports success after success a week after discovery. Not only the architecture is overwhelming, but also the finds made of clay and gold promise further discoveries in the future. [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] even said that the Ring of Menelaus had been found."
 lepsius.813.f_yuc: "When the rain subsided after hours and only a gentle film of fog remained from the shower, which enveloped the treetops of the jungle, the expedition saw a magnificent picture. Above the treetops, innumerable steps covered by undergrowth and lianas rose to the sky: a mighty step pyramid took up the panorama, in the middle of the wilderness, populated by birds and tapirs. [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] immediately secured some of the first finds and sent them to the museum with an express delivery."
 lepsius.813.g: "This place is perfect!"

 lepsius.190.t: "Archaeological team called back"
 lepsius.190.d: "From which archaeological site should we recall our team?"
 lepsius.190.f: "Someone must have slandered Henry J., because through no fault of his own, he was recalled from his excavation site one morning."
 lepsius.190.g: "Upper Egypt"
 lepsius.190.h: "Lower Egypt"
 lepsius.190.i: "Babylonia"
 lepsius.190.j: "Assyria"
 lepsius.190.k: "Argolis"
 lepsius.190.l: "Crete"
 lepsius.190.m: "Yucatán"
 lepsius.190.n: "Peru"
 lepsius.190.o: "Keep going."

 lepsius.901.t: "Tomb of Tutankhamun"
 lepsius.901.d: "It is a sensational day for international science. We have made a great discovery: Tutankhamen's tomb was uncovered today by [ROOT.GetCountry.GetAdjectiveNoFlag] archaeologists!"
 lepsius.901.f: "Slowly, desperately slowly it seemed to us as we watched, the remains of passage debris that encumbered the lower part of the doorway were removed, until at last we had the whole door clear before us. The decisive moment had arrived. With trembling hands I made a tiny breach in the upper left hand corner. Darkness and blank space, as far as an iron testing-rod could reach, showed that whatever lay beyond was empty, and not filled like the passage we had just cleared. Candle tests were applied as a precaution against possible foul gases, and then, widening the hole a little, I inserted the candle and peered in. At first I could see nothing, the hot air escaping from the chamber causing the candle flame to flicker, but presently, as my eyes grew accustomed to the light, details of the room within emerged slowly from the mist, strange animals, statues, and gold - everywhere the glint of gold. For the moment - an eternity it must have seemed to the others standing by - I was struck dumb with amazement, and when my colleague, unable to stand the suspense any longer, inquired anxiously, 'Can you see anything?' it was all I could do to get out the words, 'Yes, wonderful things.'"
 lepsius.901.g: "Wonderful things, indeed."
 lepsius.902.d: "[SCOPE.sCountry('lepsius_tut_discoverer').GetName] has made a great discovery: Tutankhamen's tomb was uncovered today!"
 lepsius.902.f: ""
 lepsius.902.g: "Hopefully the curse of the pharaoh hits them."
 lepsius.911.t: "Ship of Khufu"
 lepsius.911.d: "It is a sensational day for international science. We have made a great discovery: Khufu's Ship was uncovered today by [ROOT.GetCountry.GetAdjectiveNoFlag] archaeologists!"
 lepsius.911.f: "He breathed deeply, closed his eyes to accustom them to the gloom of his digging and then opened them slowly. With a steady hand he began to cut again. He worked quickly as the casing gave way and crumbled. He made the hole deep enough to twist his body in a different position downward and worked only a few inches away from his head. He kept on cutting and cutting. Time meant nothing. He was not conscious of being tired, or of lying in a perpendicular position. He probed. He cut. Suddenly and miraculously his hands were through into nothingness. He lay as if in a trance. He closed his eyes. An almost imperceptible smell crept into his nostrils. He could not define what it was. It was almost sweet. It could not be incense. Or was it? Was it perhaps the very smell of history? Then he knew. It was cedar wood! His eyes were still unopened. He drew a deep breath and determined that it was indeed cedar wood. He felt a sense of fulfillment such as he had never known before. Happiness tingled through him. His eyes were still closed. He whispered a prayer of thanks to God. His questioning mind began to function again. If indeed he smelt cedar wood from a Solar Boat below it did not mean that the white ant had not been busy. Perhaps the precious wood had been eaten through by hordes of white ants. 'It is the boat!', he shouted. 'It is the boat!'"
 lepsius.911.g: "It can actually still sail on the water after more than 4,000 years?"
 lepsius.912.d: "[SCOPE.sCountry('lepsius_ship_discoverer').GetName] has made a great discovery: Khufu's Ship tomb was uncovered today!"
 lepsius.912.f: ""
 lepsius.912.g: "Certainly an important part of their new fleet."
 lepsius.921.t: "Tower of Babylon"
 lepsius.921.d: "It is a sensational day for international science. We have made a great discovery: the Tower of Babel was uncovered today by [ROOT.GetCountry.GetAdjectiveNoFlag] archaeologists!"
 lepsius.921.f: "Beyond this ridge extends a fairly considerable and remarkably uniform plain towards the hill of Amran Ibn Ali, through which runs diagonally the road from our village of Kweiresh to Hilleh. It is called 'Sachn', literally: the pan, but in today's parlance it means the free space surrounded by arcades that runs around the large pilgrimage mosques, such as that of Karbala or Nedschef. But our 'Sachn' is nothing other than the present-day appearance of the ancient sacred precinct, in which the Zikurrat Etemenanki, the 'Foundation Stone of Heaven and Earth', the tower of Babylon, rose, surrounded by a ring wall to which all kinds of buildings related to the cult. We do not know the full height of the tower. But Nabupolassar, like Nebuchadnezzar, puts special emphasis on them in his cylinder inscription from Etemenanki. The former says: 'At that time Marduk commanded me... the tower of Babylon, which had been weakened and brought down in the days before me, to set its foundation firmly on the breast of the underworld, while its top aspire to heaven.'"
 lepsius.921.g: "So the Bible wasn't wrong after all."
 lepsius.922.d: "[SCOPE.sCountry('lepsius_babylon_discoverer').GetName] has made a great discovery: the Tower of Babel was uncovered today!"
 lepsius.922.f: ""
 lepsius.922.g: "One can only wish for them to be as confused afterwards as the tower's builders."
 lepsius.931.t: "Gardens of Sennacherib"
 lepsius.931.d: "It is a sensational day for international science. We have made a great discovery: the Hanging Gardens were uncovered today by [ROOT.GetCountry.GetAdjectiveNoFlag] archaeologists!"
 lepsius.931.f: "Were the Hanging Gardens really in Babylon? According to the latest discovery, this claim has been proven to be false. Indeed, comparing historical sources, our most able archaeologists have found that very few sources place the legendary Gardens in Babylon. Furthermore, it was the Assyrians, not the Babylonians, who were known for their sophisticated gardening techniques. Reliefs bear witness to extensive gardens on several floors. An archaeological team has taken this as an opportunity to carry out test excavations at the great palace of the Assyrian king Sennacherib in a part that was thought to be little explored. The finding is clear: the lost wonder of the world was clearly in Nineveh. Our archaeologists therefore benefit not only from the discovery, but also from the clarification of a mystery that has lasted for two and a half millennia."
 lepsius.931.g: "So does that mean it was actually the Hanging Gardens of Nineveh?"
 lepsius.932.d: "[SCOPE.sCountry('lepsius_semiramis_discoverer').GetName] has made a great discovery: the Hanging Gardens were uncovered today!"
 lepsius.932.f: ""
 lepsius.932.g: "There is almost certainly a mix-up here."
 lepsius.941.t: "Treasures of Mycenae"
 lepsius.941.d: "It is a sensational day for international science. We have made a great discovery: the Treasures of Mycenae were uncovered today by [ROOT.GetCountry.GetAdjectiveNoFlag] archaeologists!"
 lepsius.941.f: "By far the most important and worthwhile excavation was the one directly behind the Lion's Gate. During his test excavations in 1874, Schliemann had already established that the rock at the lowest point of the castle was covered deepest with rubble. According to the words of Pausanias, he considered it likely that the graves of the ruling family were within the castle wall and had to remember the words when, soon after the start of the work, three tombstones with ancient reliefs were found at a depth of 3 to 5 meters. When the stones were removed, says Schliemann, it turned out that they were not standing on the ground, as previously assumed, but on earth that filled the shafts that had been driven vertically into the rock to make the graves. They dug into five such shafts, and after layers of stone had been removed at a certain depth, which had served as altars after the burial of the dead victims, the ax struck the ground about 6 meters deep. On the bottom lay fifteen corpses spread out in the five graves, adorned with rich, one might say fabulous, gold jewellery. Golden masks, imitating the features of the deceased, lay over the faces of the men, golden plates, richly decorated with spirals, covered their breasts, the robes of the women were laden with gold."
 lepsius.941.g: "Agamemnon, is that you?"
 lepsius.942.d: "[SCOPE.sCountry('lepsius_mycenae_discoverer').GetName] has made a great discovery: the Treasures of Mycenae were uncovered today!"
 lepsius.942.f: ""
 lepsius.942.g: "In case of doubt, these scammers have hidden these 'treasures' there themselves."
 lepsius.961.t: "Legacy of Pakal"
 lepsius.961.d: "It is a sensational day for international science. We have made a great discovery: the Tomb and Burial Treasures of Pakal were uncovered today by [ROOT.GetCountry.GetAdjectiveNoFlag] archaeologists!"
 lepsius.961.f: "My first impression was a mosaic of green, red and white. Then it resolved itself into details - green jade ornaments, red painted teeth and bones, and fragments of a mask. I was gazing at the death face of him for whom all this stupendous work - the crypt, the sculpture, the stairway, the great pyramid with its crowning temple - had been built, the mortal remains of one of the greatest men of Palenque! This was a sarcophagus, the first ever found in a Maya pyramid!"
 lepsius.961.g: "The Tutankhamun Tomb of South America!"
 lepsius.962.d: "[SCOPE.sCountry('lepsius_pakal_discoverer').GetName] has made a great discovery: the Tomb and Burial Treasures of Pakal were uncovered today!"
 lepsius.962.f: ""
 lepsius.962.g: "The mask was pretty hideous anyway."

