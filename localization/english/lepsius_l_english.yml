 lepsius_archaeologist: "Archaeologist"
 lepsius_archaeologist_desc: "This academic is interested in ancient languages, lost civilizations and valuable artifacts to reconstruct the past."
 lepsius_archaeologist_experienced: "Experienced Archaeologist"
 lepsius_archaeologist_experienced_desc: "This character has made several important archaeological discoveries and has a high reputation."
 lepsius_archaeologist_famous: "Famous Archaeologist"
 lepsius_archaeologist_famous_desc: "This well-versed archaeologist is world famous for his numerous adventures and enjoys an international reputation."
 andersson_anthropologist: "Anthropologist"
 andersson_anthropologist_desc: "Anthropologists are useful in studying the earliest human history, from evolution in Africa to Stone Age man."
 andersson_anthropologist_experienced: "Experienced Anthropologist"
 andersson_anthropologist_experienced_desc: "This anthropologist has accomplished some achievements in the field of earliest human history and is considered an academic reference."
 andersson_anthropologist_famous: "Famous Anthropologist"
 andersson_anthropologist_famous_desc: "This researcher's numerous contributions to anthropology have made him one of the most important international figures in his field."

 je_lepsius_letter_to_rosellini: "Lepsius' Letter to Rosellini"
 je_lepsius_letter_to_rosellini_reason: "Karl Richard Lepsius, a young, ambitious philologist is on the verge of a breakthrough. He will use his method to improve the fundamentals of Champollion's deciphering of the hieroglyphs - and thereby revolutionize archaeological research."
 je_lepsius_stephens_catherwood_expedition: "Stephens & Catherwood Expedition"
 je_lepsius_stephens_catherwood_expedition_reason: "The Ambassador to Central America, John Lloyd Stephens, has expressed an interest in visiting the Yucatán Peninsula. The artist Frederik Catherwood wants to accompany him on an expedition to mysterious ruins in the jungle. The venture could become a matter of national prestige provided we create the right framework for it."
 je_lepsius_decipherment_akkadian: "Decipherment of the Akkadian Language"
 je_lepsius_decipherment_akkadian_reason: "Not only the decoding of the hieroglyphs has kept the experts in suspense for decades. The ancient Persian language and cuneiform writing are no longer a secret for our scholars. Austen Henry Layard's expedition to Nimrud caused quite a stir and attracted public interest. Following the recent discovery of a colossal, multilingual inscription at Behistun, the next project is on: deciphering the most ancient languages of ancient Mesopotamia. This would open up completely new archaeological avenues."
 je_lepsius_support_schliemann: "Heinrich Schliemann and the Dream of Troy"
 je_lepsius_support_schliemann_reason: "Heinrich Schliemann is a German businessman and self-taught who has traveled the world and amassed a considerable fortune. Since his youth, however, his real passion has been the Homeric epics. Schliemann is convinced that ancient Troy is not a fairy tale. He's still looking for supporters."
 je_lepsius_machu_picchu: "The Legacy of the Incas"
 je_lepsius_machu_picchu_reason: "With the latest technology and the most advanced research methods, even the most impassable places in the world are no longer a secret for people at the beginning of the 20th century. In particular, the invention of the airplane helped enormously in mapping previously remote regions. Perhaps the last mysteries of long-lost civilizations could finally be clarified."
 je_lepsius_epic_of_gilgamesh: "The Epic of Gilgamesh"
 je_lepsius_epic_of_gilgamesh_reason: "The Gilgamesh epic is the content of a group of literary works that comes mainly from the Babylonian area and contains one of the oldest surviving, written seals. The Epic of Gilgamesh in its various versions is the best-known work of Akkadian and Sumerian literature. The epic tells the story of Gilgamesh, a king of Uruk, his exploits and adventures, his friendship with Enkidu, his death and Gilgamesh's quest for immortality. #T Five pieces of the epic are needed to reconstruct a basic version.#!"
 je_lepsius_epic_of_gilgamesh_success: "Find at least #G 5#! @lepsius_gilgamesh_fragment! pieces of the Epic of Gilgamesh create a basic reconstruction it."
