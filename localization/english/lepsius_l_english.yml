l_english:
 lepsius_upper_egypt_modifier: "The Valley of the Kings"
 lepsius_upper_egypt_modifier_desc: "The Valley of the Kings is one of the most fascinating archaeological sites in the world. In the millennia-old tombs there are said to be treasures just waiting to be discovered."
 lepsius_lower_egypt_modifier: "The Pyramids"
 lepsius_lower_egypt_modifier_desc: "Lower Egypt with its ancient capital Memphis is the land of uncharted pyramids and unknown cities. A whole series of lost artifacts are said to rest in the Egyptian sands to this day."
 lepsius_babylonia_modifier: "The Cradle of Civilization"
 lepsius_babylonia_modifier_desc: "Mesopotamia is considered the land where writing and agriculture were invented and the first kingdoms arose. Cuneiform tablets, colossal stone figures and the ruins of temples are still evidence of a once glorious high culture."
 lepsius_assyria_modifier: "The Ruins of Nineveh and Nimrud"
 lepsius_assyria_modifier_desc: "Assyria is not only the place of origin of warlike empires, but also the point at which ancient oriental history and biblical narratives meet. The ruins of former gardens and mighty ramparts still fascinate today."
 lepsius_argolis_modifier: "The Citadels of Mycenae"
 lepsius_argolis_modifier_desc: "The Mycenaean culture is considered to be the first advanced civilization on the Greek mainland. The kings of Greek mythology have long been dismissed as mere fairy tales - but archaeological digs may prove that the tales have a kernel of truth."
 lepsius_crete_modifier: "The Minoan Civilization"
 lepsius_crete_modifier_desc: "Crete is home to the oldest cities in Europe - along with palace complexes whose mysteries have yet to be revealed. The Minoan culture is named after the legendary King Minos, who is said to have once ruled the entire Aegean."
 lepsius_yucatan_modifier: "The Mysteries of Yucatán"
 lepsius_yucatan_modifier_desc: "Deep in the jungle of Yucatán are said to still lie sunken cities of the once thriving Maya culture. Reports from locals suggest archaeological sensations - if someone manages to break through the impenetrable thicket."
 lepsius_peru_modifier: "The Secrets of the Andes"
 lepsius_peru_modifier_desc: "The empire of the Incas was once the most powerful state on the South American continent - which only ended with the Spanish conquest. But supposedly there are still unknown tombs and temples. Some even tell of an unknown city hidden in the Andes."
