 je_lepsius_archaoelogical_society: "Found an Archaeological Society"
 je_lepsius_archaoelogical_society_reason: "Not only the interest in archaeology is constantly increasing in our nation. After many years of expeditions, excavations and artifact discoveries, our country has built up an amazing archaeological expertise. An outstanding archaeologist could set up an Archaeological Society to gather the scientific and intellectual forces and provide new impetus. This would not only improve our scientific output, but also enhance the experience of subsequent generations of archaeologists."

