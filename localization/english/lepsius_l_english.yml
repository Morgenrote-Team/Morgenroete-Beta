 je_ishtar_gate: "Reconstruction of the Ishtar Gate"
 je_ishtar_gate_reason: "After an expedition to Babylonia recovered remains of the legendary Ishtar Gate, we extended our excavation license to have the Babylonian bricks shipped to our museum."
 je_ishtar_gate_success: "A total of 200,000 bricks are needed to restore the gate to its former glory. About 20,000 bricks are expected to reach us annually - should there be no problems."
 je_ishtar_gate_goal: ""
 je_lepsius_priams_treasure: "Priam's Treasure"
 je_lepsius_priams_treasure_reason: "Heinrich Schliemann is looking for a suitable place for Priam's legendary treasure, which he claims to have found in Troy. While serious scholars doubt that these feats really fit into the temporal epoch Schliemann suggests, that is secondary. It is, after all, a unique opportunity to come into possession of one of the greatest archaeological treasures of the century. Our museum would be the perfect place for that."
 je_lepsius_priams_treasure_fail: "If a competitor is quicker than us to fulfill Schliemann's wishes, we lose the unique chance to get Priam's treasure."
 je_lepsius_discovery_tut: "Investigation in the Valley of the Kings"
 je_lepsius_discovery_tut_reason: "We have every reason to believe that the Valley of the Kings may contain a hidden site of great historical value. The search could take us years. Whoever succeeds in making this discovery should have a place in history for it."
 je_lepsius_disovery_tut_success: "Should we manage to find ten clues in Upper Egypt, we will have gathered enough material to rediscover a lost place of great historical significance."
 je_lepsius_disovery_tut_fail: "Our efforts will be in vain should another nation find ten clues in Upper Egypt ahead of us."
 je_lepsius_discovery_ship: "Investigations near the Pyramids"
 je_lepsius_discovery_ship_reason: "We have every reason to believe that the Pyramids may hide something of great historical value. The search could take us years. Whoever succeeds in making this discovery should have a place in history for it."
 je_lepsius_disovery_ship_success: "Should we manage to find ten clues in Lower Egypt, we will have gathered enough material to rediscover a lost place of great historical significance."
 je_lepsius_disovery_ship_fail: "Our efforts will be in vain should another nation find ten clues in Lower Egypt ahead of us."
