### Andersson ###

 ANDERSSON_PREHISTORIC_ARTIFACT_CONCEPT: "[concept_andersson_prehistoric_artifact]"
 ANDERSSON_PREHISTORIC_ARTIFACTS_CONCEPT: "[Concept('concept_andersson_prehistoric_artifact','$concept_andersson_prehistoric_artifacts$')]"

 ANDERSSON_ADD_X_PREHISTORIC_ARTIFACTS_EFFECT_POSITIVE: "The country $MR_GAINS$ $VALUE|0+$ @andersson_prehistoric_artifact! [SelectLocalization(GreaterThan_CFixedPoint('(CFixedPoint)$VALUE$','(CFixedPoint)1'),'ANDERSSON_PREHISTORIC_ARTIFACTS_CONCEPT','ANDERSSON_PREHISTORIC_ARTIFACT_CONCEPT')]"
 ANDERSSON_ADD_X_PREHISTORIC_ARTIFACTS_EFFECT_NEGATIVE: "The country $MR_LOSES$ [Negate_CFixedPoint('(CFixedPoint)$VALUE$')|0+] @andersson_prehistoric_artifact! [SelectLocalization(GreaterThan_CFixedPoint('(CFixedPoint)$VALUE$','(CFixedPoint)1'),'ANDERSSON_PREHISTORIC_ARTIFACTS_CONCEPT','ANDERSSON_PREHISTORIC_ARTIFACT_CONCEPT')]"
 ANDERSSON_ADD_X_PREHISTORIC_ARTIFACTS_EFFECT_FIRST_POSITIVE: "[COUNTRY.GetNameNoFlag] $MR_GAINS$ $VALUE|+0$ @andersson_prehistoric_artifact! [SelectLocalization(GreaterThan_CFixedPoint('(CFixedPoint)$VALUE$','(CFixedPoint)1'),'ANDERSSON_PREHISTORIC_ARTIFACTS_CONCEPT','ANDERSSON_PREHISTORIC_ARTIFACT_CONCEPT')] (currently [COUNTRY.MakeScope.GetVariable('andersson_prehistoric_artifact_var').GetValue|0|V])"
 ANDERSSON_ADD_X_PREHISTORIC_ARTIFACTS_EFFECT_FIRST_NEGATIVE: "[COUNTRY.GetNameNoFlag] $MR_LOSES$ [Negate_CFixedPoint('(CFixedPoint)$VALUE$')|+0] @andersson_prehistoric_artifact! [SelectLocalization(GreaterThan_CFixedPoint('(CFixedPoint)$VALUE$','(CFixedPoint)1'),'ANDERSSON_PREHISTORIC_ARTIFACTS_CONCEPT','ANDERSSON_PREHISTORIC_ARTIFACT_CONCEPT')] (currently [COUNTRY.MakeScope.GetVariable('andersson_prehistoric_artifact_var').GetValue|0|V])"
 ANDERSSON_ADD_X_PREHISTORIC_ARTIFACTS_EFFECT_THIRD_POSITIVE: "[COUNTRY.GetName] $MR_GAINS$ $VALUE|+0$ @andersson_prehistoric_artifact! [SelectLocalization(GreaterThan_CFixedPoint('(CFixedPoint)$VALUE$','(CFixedPoint)1'),'ANDERSSON_PREHISTORIC_ARTIFACTS_CONCEPT','ANDERSSON_PREHISTORIC_ARTIFACT_CONCEPT')]"
 ANDERSSON_ADD_X_PREHISTORIC_ARTIFACTS_EFFECT_THIRD_NEGATIVE: "[COUNTRY.GetName] $MR_LOSES$ [Negate_CFixedPoint('(CFixedPoint)$VALUE$')|+0] @andersson_prehistoric_artifact! [SelectLocalization(GreaterThan_CFixedPoint('(CFixedPoint)$VALUE$','(CFixedPoint)1'),'ANDERSSON_PREHISTORIC_ARTIFACTS_CONCEPT','ANDERSSON_PREHISTORIC_ARTIFACT_CONCEPT')]"

