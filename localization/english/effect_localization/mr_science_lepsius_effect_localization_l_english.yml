l_english:

### Lepsius ###

 LEPSIUS_EGYPTIAN_ARTIFACT_CONCEPT: "[Concept('concept_lepsius_artifact','$concept_lepsius_egyptian_artifact$')]"
 LEPSIUS_EGYPTIAN_ARTIFACTS_CONCEPT: "[Concept('concept_lepsius_artifact','$concept_lepsius_egyptian_artifacts$')]"

 LEPSIUS_ADD_X_MINOR_EGYPTIAN_ARTIFACTS_EFFECT_POSITIVE: "The country $MR_GAINS$ $VALUE|0+$ @lepsius_egypt_minor! [SelectLocalization(GreaterThan_CFixedPoint('(CFixedPoint)$VALUE$','(CFixedPoint)1'),'LEPSIUS_EGYPTIAN_ARTIFACTS_CONCEPT','LEPSIUS_EGYPTIAN_ARTIFACT_CONCEPT')]"
 LEPSIUS_ADD_X_MINOR_EGYPTIAN_ARTIFACTS_EFFECT_NEGATIVE: "The country $MR_LOSES$ [Negate_CFixedPoint('(CFixedPoint)$VALUE$')|0+] @lepsius_egypt_minor! [SelectLocalization(GreaterThan_CFixedPoint('(CFixedPoint)$VALUE$','(CFixedPoint)1'),'LEPSIUS_EGYPTIAN_ARTIFACTS_CONCEPT','LEPSIUS_EGYPTIAN_ARTIFACT_CONCEPT')]"
 LEPSIUS_ADD_X_MINOR_EGYPTIAN_ARTIFACTS_EFFECT_FIRST_POSITIVE: "[COUNTRY.GetNameNoFlag] $MR_GAINS$ $VALUE|+0$ @lepsius_egypt_minor! [SelectLocalization(GreaterThan_CFixedPoint('(CFixedPoint)$VALUE$','(CFixedPoint)1'),'LEPSIUS_EGYPTIAN_ARTIFACTS_CONCEPT','LEPSIUS_EGYPTIAN_ARTIFACT_CONCEPT')] (currently [COUNTRY.MakeScope.GetVariable('lepsius_egyptian_artifact_minor').GetValue|0|V])"
 LEPSIUS_ADD_X_MINOR_EGYPTIAN_ARTIFACTS_EFFECT_FIRST_NEGATIVE: "[COUNTRY.GetNameNoFlag] $MR_LOSES$ [Negate_CFixedPoint('(CFixedPoint)$VALUE$')|+0] @lepsius_egypt_minor! [SelectLocalization(GreaterThan_CFixedPoint('(CFixedPoint)$VALUE$','(CFixedPoint)1'),'LEPSIUS_EGYPTIAN_ARTIFACTS_CONCEPT','LEPSIUS_EGYPTIAN_ARTIFACT_CONCEPT')] (currently [COUNTRY.MakeScope.GetVariable('lepsius_egyptian_artifact_minor').GetValue|0|V])"
 LEPSIUS_ADD_X_MINOR_EGYPTIAN_ARTIFACTS_EFFECT_THIRD_POSITIVE: "[COUNTRY.GetName] $MR_GAINS$ $VALUE|+0$ @lepsius_egypt_minor! [SelectLocalization(GreaterThan_CFixedPoint('(CFixedPoint)$VALUE$','(CFixedPoint)1'),'LEPSIUS_EGYPTIAN_ARTIFACTS_CONCEPT','LEPSIUS_EGYPTIAN_ARTIFACT_CONCEPT')]"
 LEPSIUS_ADD_X_MINOR_EGYPTIAN_ARTIFACTS_EFFECT_THIRD_NEGATIVE: "[COUNTRY.GetName] $MR_LOSES$ [Negate_CFixedPoint('(CFixedPoint)$VALUE$')|+0] @lepsius_egypt_minor! [SelectLocalization(GreaterThan_CFixedPoint('(CFixedPoint)$VALUE$','(CFixedPoint)1'),'LEPSIUS_EGYPTIAN_ARTIFACTS_CONCEPT','LEPSIUS_EGYPTIAN_ARTIFACT_CONCEPT')]"

