l_english:

### Agassiz ###

 AGASSIZ_GENERIC_MINERAL_CONCEPT: "[concept_agassiz_mineral]"
 AGASSIZ_GENERIC_MINERALS_CONCEPT: "[Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')]"

 AGASSIZ_ADD_X_GENERIC_MINERALS_EFFECT_POSITIVE: "The country $MR_GAINS$ $VALUE|0+$ @agassiz_mineral! [SelectLocalization(GreaterThan_CFixedPoint('(CFixedPoint)$VALUE$','(CFixedPoint)1'),'AGASSIZ_GENERIC_MINERALS_CONCEPT','AGASSIZ_GENERIC_MINERAL_CONCEPT')]"
 AGASSIZ_ADD_X_GENERIC_MINERALS_EFFECT_NEGATIVE: "The country $MR_LOSES$ [Negate_CFixedPoint('(CFixedPoint)$VALUE$')|0+] @agassiz_mineral! [SelectLocalization(GreaterThan_CFixedPoint('(CFixedPoint)$VALUE$','(CFixedPoint)1'),'AGASSIZ_GENERIC_MINERALS_CONCEPT','AGASSIZ_GENERIC_MINERAL_CONCEPT')]"
 AGASSIZ_ADD_X_GENERIC_MINERALS_EFFECT_FIRST_POSITIVE: "[COUNTRY.GetNameNoFlag] $MR_GAINS$ $VALUE|+0$ @agassiz_mineral! [SelectLocalization(GreaterThan_CFixedPoint('(CFixedPoint)$VALUE$','(CFixedPoint)1'),'AGASSIZ_GENERIC_MINERALS_CONCEPT','AGASSIZ_GENERIC_MINERAL_CONCEPT')] (currently [COUNTRY.MakeScope.GetVariable('agassiz_generic_minerals_var').GetValue|0|V])"
 AGASSIZ_ADD_X_GENERIC_MINERALS_EFFECT_FIRST_NEGATIVE: "[COUNTRY.GetNameNoFlag] $MR_LOSES$ [Negate_CFixedPoint('(CFixedPoint)$VALUE$')|+0] @agassiz_mineral! [SelectLocalization(GreaterThan_CFixedPoint('(CFixedPoint)$VALUE$','(CFixedPoint)1'),'AGASSIZ_GENERIC_MINERALS_CONCEPT','AGASSIZ_GENERIC_MINERAL_CONCEPT')] (currently [COUNTRY.MakeScope.GetVariable('agassiz_generic_minerals_var').GetValue|0|V])"
 AGASSIZ_ADD_X_GENERIC_MINERALS_EFFECT_THIRD_POSITIVE: "[COUNTRY.GetName] $MR_GAINS$ $VALUE|+0$ @agassiz_mineral! [SelectLocalization(GreaterThan_CFixedPoint('(CFixedPoint)$VALUE$','(CFixedPoint)1'),'AGASSIZ_GENERIC_MINERALS_CONCEPT','AGASSIZ_GENERIC_MINERAL_CONCEPT')]"
 AGASSIZ_ADD_X_GENERIC_MINERALS_EFFECT_THIRD_NEGATIVE: "[COUNTRY.GetName] $MR_LOSES$ [Negate_CFixedPoint('(CFixedPoint)$VALUE$')|+0] @agassiz_mineral! [SelectLocalization(GreaterThan_CFixedPoint('(CFixedPoint)$VALUE$','(CFixedPoint)1'),'AGASSIZ_GENERIC_MINERALS_CONCEPT','LEPSIUS_MAJOR_EGYPTIAN_ARTIFACT_CONCEPT')]"
