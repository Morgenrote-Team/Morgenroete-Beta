 MENDELEJEW_CHARACTER_CHEMIST_EXPERIENCE_THIRD_GAIN: "[CHARACTER.GetFullName] [SelectLocalization(GreaterThan_CFixedPoint('(CFixedPoint)$VALUE$','(CFixedPoint)0'),'ADD_EXPERIENCE_GAINS','ADD_EXPERIENCE_LOSES')] $VALUE|+0$ [Concept('concept_academics_experience','$concept_academics_experience_chemist$')] (current Experience: [CHARACTER.MakeScope.GetVariable('mendelejew_chemist_experience_var').GetValue|0|V])"

