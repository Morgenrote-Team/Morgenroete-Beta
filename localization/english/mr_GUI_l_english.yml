 MR_ASTRONOMER_DISCOVER_SATELLITES_BUTTON_TT: "#T Discover new Satellites#!\nMany planets in the solar system have yet undiscovered natural [Concept('concept_verrier_satellite','$concept_verrier_satellites$')] similar to Earth's moon. Depending on the level of technology, production methods in our observatory and the skills of the astronomer, the possibility of finding a previously completely unknown planetary companion may arise. However, an astronomer will find fewer astronomical objects if he searches for new satellites.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
