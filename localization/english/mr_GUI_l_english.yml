 MR_GEOLOGIST_ORE_VEIN_STOP_BUTTON_TT: "#T Stop Prospecting Ore#!\nA Your [concept_agassiz_geologist] is currently searching for new raw material deposits near already established mines and thus increasing the production of the ore.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #please replace
