 MR_SELL_MINERALS_FOR_RARE_MINERAL_BUTTON_TT: "#T Sell Minerals for Rare Minerals#!\nA [concept_agassiz_geologist] can purchase [Concept('concept_agassiz_rare_mineral','$concept_agassiz_rare_minerals$')] from colleagues, collectors, and other geological enthusiasts. For this he has to exchange a considerable amount of common minerals.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #please replace
