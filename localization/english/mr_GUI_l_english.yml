 MR_CHEMIST_SYNTHETIC_OIL_BUTTON_TT: "#T Synthetic Oil#!\nOil is limited to regions with oil reserves. But what if we could create oil ourselves? There would no longer be a need to conquer foreign regions just for their oil. Let your [concept_mendelejew_chemist] try to create synthetic oil.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"

 MR_CHEMIST_FERTILIZER_BUTTON: "#T Improve Fertilizers#!\nLet your [concept_mendelejew_chemist] improve the production of fertilizer in [GetBuildingType('building_chemical_plant').GetName].\nThis will add three modifiers to your building over time: $mendelejew_building_throughput_add_modifier_with_tooltip$, $mendelejew_building_production_mult_modifier_with_tooltip$ and $mendelejew_building_goods_input_mult_modifier_with_tooltip$.\n\nThis project will add #n expenses#! to your country.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_CHEMIST_FERTILIZER_ACTIVE_TT: "#T Improve Fertilizers#!\n#p Your [concept_mendelejew_chemist] currently improves the production of fertilizer in [GetBuildingType('building_chemical_plant').GetName].#!"
 MR_CHEMIST_EXPLOSIVES_BUTTON: "#T Improve Explosives#!\nLet your [concept_mendelejew_chemist] improve the production of explosives in an [GetBuildingType('building_explosives_factory').GetName].\nThis will add three modifiers to your building over time: $mendelejew_building_throughput_add_modifier_with_tooltip$, $mendelejew_building_production_mult_modifier_with_tooltip$ and $mendelejew_building_goods_input_mult_modifier_with_tooltip$.\n\nThis project will add #n expenses#! to your country.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_CHEMIST_EXPLOSIVES_ACTIVE_TT: "#T Improve Explosives#!\n#p Your [concept_mendelejew_chemist] currently improves the production of explosives in an [GetBuildingType('building_explosives_factory').GetName].#!"
 MR_CHEMIST_SYNTHETICS_BUTTON: "#T Improve Synthetics#!\nLet your [concept_mendelejew_chemist] improve the production of synthetics in [GetBuildingType('building_synthetics_plant').GetName] or [GetBuildingType('building_mendelejew_hydrogenation_plants').GetName].\nThis will add three modifiers to your building over time: $mendelejew_building_throughput_add_modifier_with_tooltip$, $mendelejew_building_production_mult_modifier_with_tooltip$ and $mendelejew_building_goods_input_mult_modifier_with_tooltip$.\n\nThis project will add #n expenses#! to your country.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
