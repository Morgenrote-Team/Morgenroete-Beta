 MR_GEOLOGIST_PALEONTOLOGIST_SYMPOSIUM_BUTTON_TT: "#T Geological-Paleontological Symposium#!\nThe intersections between geology and paleontology are large. We should bring together the luminaries in the field and use the synergies that arise from this exchange to create new scientific theories about Earth's history.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #please replace
