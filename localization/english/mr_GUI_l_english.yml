 MR_CIVIL_ENGINEER_RESEARCH_BUTTON_TT: "#T Civil Engineering Research#!\nLet your [concept_tesla_engineer] focus on researching civil engineering technologies. This project will add #n expenses#! to your country but regularly add research boosts.\nTechnology for the next boost: [GetPlayer.MakeScope.GetCountry.GetCustom('tesla_civil_engineering_next_technology_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #Please replace
 MR_MECHANICAL_ENGINEER_RESEARCH_BUTTON_TT: "#T Mechanical Engineering Research#!\nLet your [concept_tesla_engineer] focus on inventing new mechanical innovations. This will add #n expenses#! to your country but regularly give you research boosts.\nTechnology for the next boost: [GetPlayer.MakeScope.GetCountry.GetCustom('tesla_mechanical_engineering_next_technology_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #Please replace
 MR_MILITARY_ENGINEER_RESEARCH_BUTTON_TT: "#T Military Engineering Research#!\nLet your [concept_tesla_engineer] focus on inventing new military innovations. This will add #n expenses#! to your country but regularly give you research boosts.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #Please replace
 MR_MILITARY_ENGINEER_NAVAL_RESEARCH_BUTTON_TT: "#T Naval Engineering Research#!\nLet your [concept_tesla_engineer] focus on inventing new naval innovations. This will add #n expenses#! to your country but regularly give you research boosts.\nTechnology for the next boost: [GetPlayer.MakeScope.GetCountry.GetCustom('tesla_military_engineering_next_technology_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #Please replace
 MR_ELECTRICAL_ENGINEER_RESEARCH_BUTTON_TT: "#T Electrical Engineering Research#!\nLet your [concept_tesla_engineer] focus on inventing new applications of electricity. This will add #n expenses#! to your country but regularly give you research boosts.\nTechnology for the next boost: [GetPlayer.MakeScope.GetCountry.GetCustom('tesla_electrical_engineering_next_technology_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #Please replace
 MR_AERONAUTICAL_ENGINEER_RESEARCH_BUTTON_TT: "#T Aeronautical Engineering Research#!\nLet your [concept_tesla_engineer] focus on researching aeronautical engineering technologies. This project will add #n expenses#! to your country but regularly add research boosts.\nTechnology for the next boost: [GetPlayer.MakeScope.GetCountry.GetCustom('tesla_aeronautical_engineering_next_technology_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #Please replace
 MR_PHYSICIAN_MEDICAL_RESEARCH_BUTTON_TT: "#T Medical Research#!\nThis project is active when the [concept_panum_physician] is not busy with another project.\n\nWhile a [concept_panum_physician] advances medical research, he can not only gain technological bonuses for a nation, but sometimes also investigate and find treatments for everyday diseases.\nTechnology for the next boost: [GetPlayer.MakeScope.GetCountry.GetCustom('panum_medical_research_next_technology_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PHYSICIAN_MEDICAL_RESEARCH_ACTIVE_TT: "#T Medical Research Active#!\nThis project is active when the [concept_panum_physician] is not busy with another project.\n\nYour [concept_panum_physician] currently advances medical research, this does not only give your nation technological bonuses, but sometimes allows the Physician to investigate and find treatments for everyday diseases.\nTechnology for the next boost: [GetPlayer.MakeScope.GetCountry.GetCustom('panum_medical_research_next_technology_type')]"

