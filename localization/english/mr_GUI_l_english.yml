 MR_GERMAN_MUSIC_ASSOCIATION_BUTTON: "Found the General German Music Association"
 MR_GERMAN_MUSIC_ASSOCIATION_BUTTON_TT: "#T Found the General German Music Association#!\nThe Allgemeiner Deutscher Musikverein (ADMV, 'General German Music Association') was a German musical association founded in 1861 by Franz Liszt and Franz Brendel, to embody the musical ideals of the New German School of music. The ADMV aimed at both musical performance and practical support. As part of the artistic aims of the ADMV, annual Tonkünstler-Versammlungen at different locations were to be arranged, with performances of important, rarely heard, and especially new musical works of all kinds. However, older works that were only seldom or not at all heard, but of interest because of their importance, were also to be performed.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"

 MR_CIVIL_ENGINEER_RAILWAY_BUTTON_TT: "#T Railroad Project#!\nLet your [concept_tesla_engineer] focus on improving the [GetBuildingType('building_railway').GetName] in [GetPlayer.GetName]. You will be able to prioritize states and the railways in those states will get the $tesla_modernized_railway_lines_building_modifier_with_tooltip$ [concept_modifier] which improves the [concept_throughput] of the building.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_CIVIL_ENGINEER_RAILWAY_TRIGGER_TT: "#default_text [GetPlayer.GetName] has a [GetBuildingType('building_railway').GetName] without the $tesla_modernized_railway_lines_building_modifier_with_tooltip$ [concept_modifier].#!"

 MR_CIVIL_ENGINEER_IRRIGATION_BUTTON_TT: "#T Irrigation Project#!\nLet your [concept_tesla_engineer] focus on improving the Irrigation in [GetPlayer.GetName]. You will be able to prioritize states and those states will get the #V $tesla_state_trait_irrigation$#! State Trait which improves the [concept_throughput] of agricultural buildings and the the resistance against various [Concept('concept_harvest_condition', '$concept_harvest_conditions$')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
