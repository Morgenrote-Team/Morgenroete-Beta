 MR_GEOLOGIST_AGE_EARTH_BUTTON_TT: "#T Calculate the Age of the Earth#!\nA geologist can calculate the age of the Earth once in his life and present his theory to all other geologists. If they agree, his earth time determination will be the decisive one. If he is rejected, he can try again after a period of depression. To present a new theory, the national Geological Score must be higher than the score used to determine the last Earth age.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
