### New file mr_tutorial_lessons ###

 mr_tutorial_buttons: "Morgenröte Buttons"
 mr_tutorial_buttons_desc: "Most things in Morgenröte are accesible in the Morgenröte-Windows. You can access them by clicking the buttons in the sidebar. Currently those windows exist:\n\n- #V Science Window#!: Here you can find your [Concept('concept_academics_academic','$concept_academics_academics$')], their activities, your [concept_academics_progress] and Scientific Expeditions.\n- #V Arts Window#!: Here you can find your [Concept('concept_artists_artist','$concept_artists_artists$')], their activities, your [concept_artistic_progress] and [Concept('concept_artists_art_style','$concept_artists_art_styles$')].\n- #V Sports Window#!: Here you can find various sports and characters related to sports as well as aeronautics, their activities, and International Sports Organizations."

 mr_tutorial_science_tab_open: "Open the Science Window"
 mr_tutorial_science_tab_open_desc: "Now we will take a closer look into the science window. Open the science window by clicking on the button or by pressing the \"M\" key on your keyboard."
 mr_tutorial_science_tab_open_tt: "Open the science window by clicking the science button or pressing \"M\""