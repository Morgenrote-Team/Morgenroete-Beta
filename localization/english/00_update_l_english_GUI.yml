### New file mr_tutorial_lessons ###

 mr_tutorial_buttons: "Morgenröte Buttons"
 mr_tutorial_buttons_desc: "Most things in Morgenröte are accesible in the Morgenröte-Windows. You can access them by clicking the buttons in the sidebar. Currently those windows exist:\n\n- #V Science Window#!: Here you can find your [Concept('concept_academics_academic','$concept_academics_academics$')], their activities, your [concept_academics_progress] and Scientific Expeditions.\n- #V Arts Window#!: Here you can find your [Concept('concept_artists_artist','$concept_artists_artists$')], their activities, your [concept_artistic_progress] and [Concept('concept_artists_art_style','$concept_artists_art_styles$')].\n- #V Sports Window#!: Here you can find various sports and characters related to sports as well as aeronautics, their activities, and International Sports Organizations."

 mr_tutorial_science_window_open: "Open the Science Window"
 mr_tutorial_science_window_open_desc: "Now we will take a closer look into the science window. Open the science window by clicking on the button or by pressing the \"M\" key on your keyboard."
 mr_tutorial_science_window_open_tt: "Open the science window by clicking the science button or pressing \"M\""

 mr_tutorial_science_tab: "The Science Window"
 mr_tutorial_science_tab_desc: "The science window is the place where you can find information and actions for your scientific endeavours.\n\nIt is seperated in 4 tabs:\n- #V Overview#!: This tab contains [concept_academics_progress], #V General Scientific Expeditions#! and the #V Scientific Focus#!\n- #V Mathematical-Technical#!: This tab contains the [concept_gaudi_engineer], [concept_mendelejew_chemist] and [concept_verrier_astronomer]\n- #V Humanities-Anthropological#!: This tab contains the [concept_panum_physician], [concept_lepsius_archaeologist] and [concept_lepsius_anthropologist]\n- [concept_dubois_natural_history]: This tab contains the [concept_agassiz_geologist], [concept_dubois_paleontologist] and [concept_dubois_naturalist]\n- #V Humanities-Anthropological#!: This tab contains the [concept_panum_physician], [concept_lepsius_archaeologist] and [concept_lepsius_anthropologist]"
 mr_tutorial_science_tab_tt: "The science window is opened"

 mr_tutorial_science_overview_tab_open: "Open the Overview Tab"
 mr_tutorial_science_overview_tab_open_desc: "The Overview tab allows you to access the [concept_academics_progress], #V General Scientific Expeditions#! and the #V Scientific Focus#!\n\nGo into the Overview tab by clicking on the tab button."
 mr_tutorial_science_overview_tab_open_tt: "Go into the Overview tab by clicking on the tab button."

 mr_tutorial_science_overview_tab_promote_academics: "Promoting Academics"
 mr_tutorial_science_overview_tab_promote_academics_desc: "The heart of Morgenröte are the characters. But how do you get those characters?\n\nTo get a new [concept_academics_academic] you need to gain enough [concept_academics_progress]. You can hover over the progress bar to see what factors influence the progress gain.\n\nYou can promote a specific Academic if you have a University with a [concept_academics_university_specialization].\n\nYou can also invest money to gain Academic Progress faster.\n\n\nAlternatively you can get Academics with events or by buying one with a diplomatic action if you are a nation that doesn't belong to the scientifically most advanced countries."

 mr_tutorial_science_overview_tab_scientific_focus: "Scientific Focus"
 mr_tutorial_science_overview_tab_scientific_focus_desc: "Sometimes you might want to focus on a specific kind of research. You can use the scientific foci if you meet their requirements. They will basically promote the research of certain technology groups and reducing the efficiency of others."

 mr_tutorial_science_overview_tab_scientific_expedition: "Scientific Expeditions"
 mr_tutorial_science_overview_tab_scientific_expedition_desc: "Scientific Expeditions are Expeditions your country can start. Depending on the kind of expedition this can lead to great boons for your country.\n\nCurrently these Expeditions exist:\n- [concept_dubois_pacific_expedition]\n- [concept_verrier_venus_transit] Expedition\n- Expedition to find the Northwest Passage\n- Zeppelin Expedition\n- Expedition to lay a Transatlantic Cable"

 mr_tutorial_science_natural_history_tab_open: "Open the Natural History Tab"
 mr_tutorial_science_natural_history_tab_open_desc: "Now let us take a look at one of the [Concept('concept_academics_academic','$concept_academics_academics$')]. Open the Natural History Tab to continue."
 mr_tutorial_science_natural_history_tab_open_tt: "Go into the Natural History tab by clicking on the tab button."

