 rule_lepsius_anthropology_rule: "#tooltip:[GetRawTextTooltipTag('mr_morgenroete_tt')] @mr_morgenroete_icon! #! Anthropology Rules"
 setting_lepsius_anthropology_historical_rule: "Historical"
 setting_lepsius_anthropology_historical_rule_desc: "From a historical date onwards, fossils such as the Taung child or the Neanderthal are found. This advances anthropological research, but puts pressure on the player when trying to classify a species first."
 setting_lepsius_anthropology_free_rule: "Free"
 setting_lepsius_anthropology_free_rule_desc: "Initial classifications only take place when three human fossils of a species are found. This will set international anthropology back in the game, but it will allow for more freedom."

 je_lepsius_fossil_identification: "Fossil Identification"
 je_lepsius_fossil_identification_reason: "An [concept_andersson_anthropologist] has the ability to analyze an unknown bone over time and assign it to a specific human or pre-human species. If he manages to assign three bones to the same species, he can successfully systematize this species. The time it takes to correctly identify a bone depends on the experience of the anthropologist."
 je_lepsius_fossil_identification_goal: "It can take an inexperienced anthropologist up to five years to correctly identify a bone. Anthropologists at the highest level, on the other hand, only need a single year."

 lepsius.1311.t: "Human Fossil identified"
 lepsius.1311.d: "After a difficult examination, [SCOPE.sCharacter('andersson_anthropologist_scope').GetFullName] is now sure which human or pre-human species the fossil found could belong to. This means another bone has been gained for the paleo-anthropological collection."
 lepsius.1311.f: "Examining human bones for their identity takes different amounts of time from anthropologist to anthropologist. Experience is crucial. The first bone can therefore take a long time. The more experience an anthropologist gains, the more efficient he or she is at identifying and searching for bones."
 lepsius.1311.g: "A real backbreaking job."
 lepsius.1321.t: "Cro-Magnon complete"
 lepsius.1321.d: "[SCOPE.sCharacter('andersson_anthropologist_scope').GetFullName] has collected enough bones to draw specific conclusions about the extinct species. Cro-Magnon man is no longer a mystery to science and can now be located with a certain degree of certainty in the human family tree."
 lepsius.1321.f: "Cro-Magnons, were the first early modern humans (Homo sapiens) to settle in Europe, migrating from western Asia, continuously occupying the continent possibly from as early as 56,800 years ago. They interacted and interbred with the indigenous Neanderthals (H. neanderthalensis) of Europe and Western Asia, who went extinct 40,000 to 35,000 years ago. Cro-Magnons were anatomically similar to present-day Europeans, West Asians and North Africans, but were more robust, having larger brains, broader faces, more prominent brow ridges, and bigger teeth. The earliest Cro-Magnon specimens also exhibit some features that are reminiscent of those found in Neanderthals. They are well renowned for creating a diverse array of artistic works, including cave paintings, Venus figurines, perforated batons, animal figurines, and geometric patterns."
 lepsius.1321.g: "Another ancestor found."
 lepsius.1322.t: "Homo Neanderthalensis completed"
 lepsius.1322.d: "[SCOPE.sCharacter('andersson_anthropologist_scope').GetFullName] has collected enough bones to draw specific conclusions about the extinct species. Homo Neanderthalensis is no longer a mystery to science and can now be located with a certain degree of certainty in the human family tree."
 lepsius.1322.f: "Neanderthals (Homo neanderthalensis or H. sapiens neanderthalensis) are an extinct species or subspecies of archaic humans who lived in Eurasia until about 40,000 years ago. The type specimen, Neanderthal 1, was found in 1856 in the Neander Valley in present-day Germany. The line of Neanderthals split from that of modern humans but when that occurred is not clear; studies have produced various times ranging from 315,000 to more than 800,000 years ago. Although knowledge and perception of them has markedly changed in the scientific community, the image of the unevolved caveman archetype remains prevalent in popular culture. However, Neanderthal technology was quite sophisticated, including the Mousterian stone-tool industry, the abilities to create fire, build cave hearths, make adhesive birch bark tar, craft at least simple clothes similar to blankets and ponchos, weave, go seafaring through the Mediterranean and make use of medicinal plants. The reasons for Neanderthal extinction are still disputed."
 lepsius.1323.t: "Homo Erectus completed"
 lepsius.1323.d: "[SCOPE.sCharacter('andersson_anthropologist_scope').GetFullName] has collected enough bones to draw specific conclusions about the extinct species. Homo Erectus is no longer a mystery to science and can now be located with a certain degree of certainty in the human family tree."
 lepsius.1323.f: "Homo erectus is an extinct species of archaic human from the Pleistocene, with its earliest occurrence about 2 million years ago. Its specimens are among the first recognizable members of the genus Homo. H. erectus was the first human ancestor to spread throughout Eurasia, with a continental range extending from the Iberian Peninsula to Java. H. erectus had a more modern gait and body proportions, and was the first human species to have exhibited a flat face, prominent nose, and possibly sparse body hair coverage. Though the species' brain size certainly exceeds that of ancestor species, capacity varied widely depending on the population. H. erectus is credited with inventing the Acheulean stone tool industry, and were the first to make lithic flakes bigger than 10 cm, and hand axes (which includes bifacial tools with only 2 sides, such as picks, knives, and cleavers)."
 lepsius.1324.t: "Australopithecus completed"
 lepsius.1324.d: "[SCOPE.sCharacter('andersson_anthropologist_scope').GetFullName] has collected enough bones to draw specific conclusions about the extinct species. Australopithecus is no longer a mystery to science and can now be located with a certain degree of certainty in the human family tree, even if there are still many questions unanswered."
 lepsius.1324.f: "Australopithecus is a genus of early hominins that existed in Africa during the Pliocene and Early Pleistocene. The genera Homo (which includes modern humans), Paranthropus, and Kenyanthropus evolved from some Australopithecus species. The earliest known member of the genus, A. anamensis, existed in eastern Africa around 4.2 million years ago. Australopithecus gave rise to living descendants, as the genus Homo emerged from an Australopithecus species at some time between 3 and 2 million years ago. The earliest evidence of fundamentally bipedal hominins is a 3.6 MYA fossil trackway in Laetoli, Tanzania, which bears a remarkable similarity to those of modern humans. It is debated if the Australopithecus hand was anatomically capable of producing stone tools."
 lepsius.1325.t: "Paranthropus completed"
 lepsius.1325.d: "[SCOPE.sCharacter('andersson_anthropologist_scope').GetFullName] has collected enough bones to draw specific conclusions about the extinct species. Paranthropus is no longer a mystery to science and can now be located with a certain degree of certainty in the human family tree, even if there are still many questions unanswered."
 lepsius.1325.f: "Paranthropus is a genus of extinct hominin which contains two widely accepted species: P. robustus and P. boisei. However, the validity of Paranthropus is contested, and it is sometimes considered to be synonymous with Australopithecus. They lived between approximately 2.9 and 1.2 million years ago (mya) from the end of the Pliocene to the Middle Pleistocene. Paranthropus is characterised by robust skulls, with a prominent gorilla-like sagittal crest along the midline, which suggest strong chewing muscles—and broad, herbivorous teeth used for grinding. They are associated with bone tools and contested as the earliest evidence of fire usage. They typically inhabited woodlands, and coexisted with some early human species, namely A. africanus, H. habilis and H. erectus."

 lepsius.1331.t: "The Neanderthaler"
 lepsius.1331.d: "A researcher from the University of Bonn, together with a scientific colleague, today made public the discovery of an extinct early human species."
 lepsius.1331.f: "In mid-August 1856, Italian quarry workers discovered some bone fragments in a section of the Neander Valley that had recently fallen victim to limestone mining. They were initially carelessly thrown into the rubble, but were noticed by the quarry owners Wilhelm Beckershoff and Friedrich Wilhelm Pieper, who had 16 larger pieces of bone recovered and handed them over to Johann Carl Fuhlrott for examination. Having become aware of them through press reports, the Bonn anatomist Hermann Schaaffhausen also examined the bones and came to the same conclusion as Fuhlrott had previously: they were an ancient form of modern humans. Fuhlrott and Schaaffhausen presented the find in June 1857 at the general meeting of the Natural History Association of the Prussian Rhineland. However, their interpretation was not shared by the specialist audience. This find, named Neandertal 1, is the type specimen of the species Homo neanderthalensis."
 lepsius.1332.t: "Cro-Magnon Man"
 lepsius.1332.d: "Louis Lartet has found several skeletons of prehistoric humans that bear significantly more resemblance to modern humans than Neanderthals. After the Abri de Cro-Magnon site, these first Europeans are called Cro-Magnon people."
 lepsius.1333.t: "Peking Man"
 lepsius.1333.d: "The new discovery of early humans near Beijing reinforces the theory that humans originated in Asia."
 lepsius.1333.f: "Fossils that were discovered from the 1920s near Zhoukoudian, around 40 km southwest of the city center of Beijing, are referred to as 'Peking Man' and are assigned to the genus Homo. In 1927, Davidson Black gave the fossil finds, essentially based on a single tooth, the new species and genus name Sinanthropus pekinensis Black & Zdansky. In 1940, the finds - based on now several dozen fossils - were interpreted by Wilfrid Le Gros Clark as being closely related to the 'Java men' and, like them, with the species and genus name Pithecanthropus erectus chosen by Eugène Dubois in 1892 named. The original fossils were lost during the Second World War."
 lepsius.1334.t: "Taung Child"
 lepsius.1334.d: "The Australian Raymond Dart made an extraordinary discovery in Taung: the head of an ape-like child indicates an upright walk. The teeth and brain also appear pre-human. The Taung Child could be a 'missing link' between humans and other primates."
 lepsius.1335.t: "Piltdown Man"
 lepsius.1335.d: "Two leading anthropologists today unveiled a discovery that could shock the scientific world: they found nothing more than the first modern man, who clearly originated in England."
 lepsius.1335.f: "At a meeting of the Geological Society of London, Arthur Smith Woodward and Charles Dawson announced that the skull fragments of an early human found in a gravel pit near the village of Piltdown were an epoch-making find. Woodward's reconstruction based on the fragments found largely resembled the skull of a modern human, with the exception of the occiput, a region at the junction of the skull and the spine, and the size of the brain, which was only about two-thirds of that of a modern human, and only approximately human-like teeth and jawbone.. Drawing on the high scientific authority of the British Museum, Woodward interpreted the Piltdown finds as a missing link between great apes and humans. Despite initial doubts, scientists at the Natural History Museum in London assigned the find an age of between 200,000 and 500,000 years. This would have made him significantly older than the Neanderthals. The announcement of the discovery immediately attracted great interest from both experts and the British population. The news of the Piltdown discovery was a sensation around the world."
 lepsius.1335.g: "So the first modern human was British. Not surprising at all!"
 lepsius.1335.h: "This find is extremely doubtful."

 lepsius.1342.t: "Piltdown Man is a fraud!"
 lepsius.1342.d: "After thorough investigation by several distinguished anthropologists of international standing, they have proven the alleged human remains to be fake!"
 lepsius.1342.f: "Since the discovery of the Piltdown man, several non-British scientists had expressed considerable doubts about its authenticity, and rather attributed the 'discovery' to the British need for recognition - after all, the Cro-Magnon man had been identified in France and the Neanderthal man in Germany , but no British equivalent was found. A courageous group of several academics came together to expose the discovery for what it is: a real scientific fraud! Not only was the skull much more recent than claimed and only came from the Middle Ages; the forger had combined the human upperside with the jaws of an orangutan. [SCOPE.sCharacter('andersson_anthropologist_scope').GetFullName] can claim to have played a crucial role in coming to terms with this fraud."
 lepsius.1343.f: "Since the discovery of the Piltdown man, several non-British scientists had expressed considerable doubts about its authenticity, and rather attributed the 'discovery' to the British need for recognition - after all, the Cro-Magnon man had been identified in France and the Neanderthal man in Germany , but no British equivalent was found. A courageous group of several academics came together to expose the discovery for what it is: a real scientific fraud! Not only was the skull much more recent than claimed and only came from the Middle Ages; the forger had combined the human upperside with the jaws of an orangutan."
 lepsius.1342.g: "In the end, serious science wins."
 lepsius.1343.g: "An international embarrassment beyond compare!"

 lepsius.1401.t: "Cave Exploration"
 lepsius.1401.d: "Our anthropologist [SCOPE.sCharacter('andersson_anthropologist_scope').GetFullName] is ready to search for human and pre-human fossils, as well as possible remains of life, in a prehistoric cave. Which cave should he go to?"
 lepsius.1401.f: "Cave explorations can be carried out in all caves within the country's own territory. The bone finds differ depending on the cave: in each cave there is only the remains of a human or pre-human species. Cave research expires automatically after five years. They can be canceled early - but then there will be no prehistoric artifacts, bones or experience points for the anthropologist at the end."
 lepsius.1401.g: "[SCOPE.sState('lepsius_cave_1').GetName]"
 lepsius.1401.h: "[SCOPE.sState('lepsius_cave_2').GetName]"
 lepsius.1401.i: "[SCOPE.sState('lepsius_cave_3').GetName]"
 lepsius.1401.j: "[SCOPE.sState('lepsius_cave_4').GetName]"
 lepsius.1401.k: "[SCOPE.sState('lepsius_cave_5').GetName]"
 lepsius.1401.l: "[SCOPE.sState('lepsius_cave_6').GetName]"
 lepsius.1401.m: "[SCOPE.sState('lepsius_cave_7').GetName]"
 lepsius.1402.t: "Cave Exploration finished"
 lepsius.1402.d: "[SCOPE.sCharacter('andersson_anthropologist_scope').GetFullName] has finished his work in the prehistoric cave in [SCOPE.sState('lepsius_cave_site').GetName]. The research results are remarkable."
 lepsius.1402.f: "A cave survey expires after five years. An anthropologist can then immediately be sent back into a cave - or identify unknown bones. The yield after a cave exploration depends on the experience of the anthropologist."
 lepsius.1402.g: "Welcome back."

 lepsius.1411.t: "Stone Age tools"
 lepsius.1411.d: "[SCOPE.sCharacter('andersson_anthropologist_scope').GetFullName] found prehistoric stone tools in the cave that can provide information about the past."
 lepsius.1411.f: "In the 19th century, anthropology referred to a science that dealt primarily with the prehistoric history of humanity - in addition to bone finds, this included weapons or tools from the so-called Stone Age, which at the time was less of a scientific term and more of an era perceived to be barbaric. It was dominated by the cliché of the primitive caveman and less by historical reality. Nevertheless, the search for more and more artifacts and remains from this period was an opportunity to differentiate this picture in future years and to establish a genuine prehistoric archeology."
 lepsius.1411.g: "Examine the tools."
 lepsius.1411.h: "They belong in a museum!"
 lepsius.1412.t: "Strange Bones"
 lepsius.1412.d: "Although it is his area of expertise, Professor [SCOPE.sCharacter('andersson_anthropologist_scope').GetLastName] could not clearly identify the bones found in the cave of [SCOPE.sState('lepsius_cave_site').GetName]. He will identify them after the end of the cave exploration."
 lepsius.1412.f: "Typically, anthropologists are the last to be able to correctly identify the bones while exploring a cave. If this is not the case, or if archaeologists or paleontologists find human fossils, he can correctly assign them upon his return if he is tasked with identifying them."
 lepsius.1412.g: "We will identify it later."
 lepsius.1413.t: "Fruitful studies"
 lepsius.1413.d: "In the last few months, [SCOPE.sCharacter('andersson_anthropologist_scope').GetFullName] has deepened his studies. He has now cataloged numerous finds in the [SCOPE.sState('lepsius_cave_site').GetName] cave and recorded the cave system for future generations."
 lepsius.1413.f: "How long humans had existed was not clear, even for long periods of the 19th century. At the beginning of the century, many scientists had already abandoned the idea that human history only consisted of a few thousand years; But when Boucher de Perthes cited much older stone tools in the 1840s as evidence that humans coexisted with extinct mammal species, it fell on deaf ears. Only the tireless collection and processing of prehistoric remains would soon complete the picture that humans had been walking the world for significantly longer than previously assumed."
 lepsius.1413.g: "This will be beneficial for him."
 lepsius.1413.h: "This will be beneficial for science."
 lepsius.1414.t: "Assistant finds Fossils"
 lepsius.1414.d: "A student assistant played a crucial role in securing an anthropological find in the cave at [SCOPE.sState('lepsius_cave_site').GetName]. However, [SCOPE.sCharacter('andersson_anthropologist_scope').GetFullName] points out that as head of research he is responsible for the discovery."
 lepsius.1414.f: "'Do you remember the story of the clever young Athenian who hat the itch of notoriety? He sought the Oracle, and asked 'What shall I do to become a great man?' The Oracle answered: 'Slay one'!' - Richard Owen."
 lepsius.1414.g: "This discovery was made by the young anthropologist."
 lepsius.1414.h: "This discovery was made by our senior anthropologist."
 lepsius.1415.t: "Human Bones"
 lepsius.1415.d: "Our anthropologist found additional bones during his cave exploration."
 lepsius.1415.f: "The general opinion is that the 19th and early 20th centuries contained only a few human fossil finds. That's only partly true. It was often the case that a number of early human bone finds were not recognized as such. Although the name Neanderthal comes from the location in the Neandertal, Neanderthal bones had already been found several times before. Even after its discovery, important scientists such as Rudolf Virchow questioned its authenticity and age. The problem was not the number of finds, but rather their verification as actual human remains from ancient times."
 lepsius.1415.g: "Yummy."
 lepsius.1416.t: "Cave Drawings"
 lepsius.1416.d: "The [SCOPE.sState('lepsius_cave_site').GetName] cave contains carvings and images that are thousands of years old. However, their meaning and background remain mysterious."
 lepsius.1416.f: "With the beginning of prehistoric archeology and anthropology, it was assumed, based on the theory of evolution, that people of earlier times did not know any abstract concepts. Artistic expression was therefore excluded. This belief led to the fact that when cave paintings were discovered - most famously in the example of Altamira - it was assumed that they must be fakes. It was only after more and more cave paintings appeared around 1900, particularly in southwestern France, that scientists came to the conclusion that they had to be authentic."
 lepsius.1416.g: "Our ancestors were not as primitive as we thought."
 lepsius.1417.t: "The Paintings of Altamira"
 lepsius.1417.d: "When exploring the Cave of Altamira, [SCOPE.sCharacter('andersson_anthropologist_scope').GetFullName] made an exceptional discovery: the ceilings are painted with magnificent paintings. The Anthropologist thinks that they must be more than 10,000 years old. However, his discovery is contested."
 lepsius.1417.f: "The Cave paintings of Altamira are considered pivotal in prehistoric archaeology and anthropology. Their artistic excellence and conservation status was considered too good for an age which was largely considered primitive. When Marcelino Sanz de Sautuola's daughter discovered them, Sautuola correctly identified them as prehistoric paintings from the stone age. He excavated the cave together with Juan Vilanova y Piera, but their publication was rejected by leading academics. Some even accused Sautuola of forgery. It would take another 20 years to verify his discovery, but he would die before his reputation was restored."

 lepsius.1421.t: "Foreign Anthropologist visits [ROOT.GetCountry.GetNameNoFlag]"
 lepsius.1421.d: "[SCOPE.sCountry('lepsius_anthropological_guest').GetName] sent its best anthropologist to explore a prehistoric cave. Now all we have to do is choose a cave."
 lepsius.1421.f: "Cave explorations can be carried out in all caves within the country's own territory. The bone finds differ depending on the cave: in each cave there is only the remains of a human or pre-human species. Cave explorations led by foreign anthropologists end after three years. The yield is significantly lower than with regular cave exploration: the host country and the guest country receive a small number of human fossils, as well as a special early human bone. Furthermore, there are only three random caves to choose from."
 lepsius.1421.g: "[SCOPE.sState('lepsius_cave_1').GetName]"
 lepsius.1421.h: "[SCOPE.sState('lepsius_cave_2').GetName]"
 lepsius.1421.i: "[SCOPE.sState('lepsius_cave_3').GetName]"
 lepsius.1423.t: "Foreign cave expedition ends"
 lepsius.1423.d: "The team of anthropologists from [SCOPE.sCountry('lepsius_anthropological_guest').GetName] has completed their investigation after two years. We receive some contractually guaranteed finds."
 lepsius.1423.f: "Anthropological invitations are limited to three years. The host country then receives a small share of the finds, while the country that provides the anthropologist receives a larger share. In addition, the anthropologist receives a disproportionate amount of experience for the expedition abroad."
 lepsius.1423.g: "Thanks for all the bones!"
 lepsius.1424.d: "[SCOPE.sCharacter('andersson_anthropologist_scope').GetFullName] returned from his expedition in [SCOPE.sCountry('lepsius_anthropological_host').GetName] and not only gained experience, but also brought back valuable pre-human fossils."

