 andersson.101.t: "Prehistoric cave found"
 andersson.101.d: "After a long period of exploration, [SCOPE.sCharacter('andersson_anthropologist_scope').GetFullName] has found the entrance to a cave in which [SCOPE.sCharacter('andersson_anthropologist_scope').GetSheHe] suspects the bones of prehistoric people or human ancestors."
 andersson.101.f: "Prehistoric caves can often contain fossils of human or pre-human species, as well as other finds of an anthropological or archaeological nature. The exploration requires an expedition led by an anthropologist to evaluate the finds. This research can clarify the search for the origin of humanity."
 andersson.101.g: "This cave should be examined as soon as possible."

 andersson.201.t: "Cave Exploration Destinantion"
 andersson.201.d: "Cave exploration may not be as adventurous as an archaeological expedition or a Pacific expedition, but it can sometimes present its own tricky challenges. Dr. [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName] is already waiting to begin the detailed examination for human bones."
 andersson.201.f: "'Dear gentlemen, we are embarking on an exciting journey to the origins of humankind! I expect scientific curiosity, a passionate spirit of discovery, and unwavering discipline!\n\nP.S.: Please leave your dogs at home. That goes for you too, Professor Schabernack!'\n\nSigned: [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetFullName]"
 andersson.201.g: "Nevermind."
 andersson.201.h: "The Neoanthropus Cave in [SCOPE.sState('andersson_neoanthropus_cave_scope').GetName]."
 andersson.201.i: "The Palaeanthropus Cave in [SCOPE.sState('andersson_palaeanthropus_cave_scope').GetName]."
 andersson.201.j: "The Pithecanthropus Cave in [SCOPE.sState('andersson_pithecanthropus_cave_scope').GetName]."
 andersson.201.k: "The Australopithecus Cave in [SCOPE.sState('andersson_australopithecus_cave_scope').GetName]."

