 lepsius.1502.t: "Special Human Fossils"
 lepsius.1502.d: "Here is an overview of the most important historical finds that are considered groundbreaking in the history of anthropology."
 lepsius.1502_cromagnon_t: "#T Cro-Magnon Man#! discovered by [SCOPE.sCountry('lepsius_cromagnon_finder_country').GetName]"
 lepsius.1502_cromagnon_d: "\nThe skeletal fragments found by Louis Lartet at Abri de Cro-Magnon are considered to be the earliest remains of the first Europeans. They are around 27,000 years old."
 lepsius.1502_neanderthaler_t: "\n\n#T Neanderthal#! discovered by [SCOPE.sCountry('lepsius_neanderthaler_finder_country').GetName]"
 lepsius.1502_neanderthaler_d: "\nNext to Homo sapiens, Homo neanderthal is the best preserved species of hominins and died out 40,000 years ago."
 lepsius.1502_java_t: "\n\n#T Java Man#! discovered by [SCOPE.sCountry('lepsius_java_finder_country').GetName]"
 lepsius.1502_java_d: "\nThese 1-million-year-old fossils were the first of hominids discovered outside of Europe and the second, after Neanderthals, of fossil relatives of anatomically modern humans."
 lepsius.1502_taung_t: "\n\n#T Taung Child#! discovered by [SCOPE.sCountry('lepsius_taung_finder_country').GetName]"
 lepsius.1502_taung_d: "\nThe Taung Child was the oldest known fossil of a human ancestor at the time and at the same time the first pre-human fossil found in Africa."
 lepsius.1502_peking_t: "\n\n#T Peking Man#! discovered by [SCOPE.sCountry('lepsius_peking_finder_country').GetName]"
 lepsius.1502_piltdown_t: "\n\n#T Piltdown Man#! discovered by [SCOPE.sCountry('lepsius_piltdown_finder_country').GetName]"
 lepsius.1502_piltdown_d: "\nThe enigmatic Piltdown Man is said to be the crucial link between humans and apes and is considered evidence of human discovery in Europe. The fossil is estimated to be 500,000 years old."