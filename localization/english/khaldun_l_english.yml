 khaldun.101.t: "Al-Qarawiyyin: Center of Learning"
 khaldun.101.d: "Centuries ago, Al-Qarawiyyin has been a center of Science and Learning. Now it has returned to its place as one of the major universities of the world."
 khaldun.101.f: "\"Al-Qarawiyyin has been a university longer than all universities in Europe. It has housed many books but sadly started to decline. Today marks the day that this university takes its rightful place again!\""
 khaldun.101.g: "Al-Qarawiyyin will be a beacon of Learning!"
 khaldun.101.h: "Al-Qarawiyyin will be a beacon of Mathematics and Engineering!"
 khaldun.101.i: "Al-Qarawiyyin will be a beacon of Natural History!"
 khaldun.101.j: "Al-Qarawiyyin will be a beacon of the Humanities!"
