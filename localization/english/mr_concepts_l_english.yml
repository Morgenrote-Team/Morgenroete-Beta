###LEPSIUS###
 concept_lepsius_archaeology: "Archaeology" #This is the actual id of the concept
 concept_lepsius_archaeology_desc: "#b Archaeology#! is one of the main features of [concept_morgenroete].\n\nThere are 8 [Concept('concept_lepsius_excavation_site','$concept_lepsius_excavation_sites$')] on the map.\n\n To be able to send an [concept_lepsius_expedition], you need to research the Antiquarianism Technology, have an [concept_lepsius_archaeological_team] and have acces to one of the Excavation Sites. You can either get access by owning the Site yourself or by asking a country with a Site for a [concept_lepsius_excavation_licence].\n\nYou can now send an Archaeological expedition to one of the Excavation Sites. Your Team will discover [Concept('concept_lepsius_artifact','$concept_lepsius_minor_artifacts$')] and in very rare cases and the help of a good [concept_lepsius_archaeologist], you might even find a [concept_lepsius_major_artifact].\n\nOnce your Team returns with the Artifacts, you might be able to build a [concept_lepsius_museum]. In a Archaeological Museum you will be able to see your Artifacts, create [concept_lepsius_exhibition] and visit your #b #BLUE Archaeologist#!#!.\n\nThe more Artifacts and Exhibitions you have, the more Prestige you will get.\n\n#b Anthropology#! is another part of Archaeology. If you have an [concept_andersson_anthropologist] and a [concept_andersson_cave], you can find [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')] and reconstruct prehistoric human species. Each skeleton will give you more anthropological prestige. With enough anthropological prestige, you will get a prestige modifier for your country." #1.8.6

 concept_lepsius_archaeologist: "#b #BLUE Archaeologist#!#!" #This is the actual id of the concept
 concept_lepsius_archaeologists: "#b #BLUE Archaeologists#!#!" #You can use this for plural: [Concept('concept_lepsius_archaeologist','$concept_lepsius_archaeologists$')]
 concept_lepsius_archaeologist_desc: "#b #BLUE Archaeologists#!#! are Academics that you can send to [Concept('concept_lepsius_expedition','$concept_lepsius_expeditions$')]. They will gather [Concept('concept_lepsius_artifact','$concept_lepsius_minor_artifacts$')] there. Sometimes they might even find a [concept_lepsius_major_artifact].\nArchaeologists gain [concept_academics_experience] during their work and passively every year. They can get better levels of the archaeologist trait by earning enough #b Experience#!."

# 1.8.6

 concept_andersson_anthropologist: "#b #BLUE Anthropologist#!#!" #This is the actual id of the concept
 concept_andersson_anthropologists: "#b #BLUE Anthropologists#!#!" #You can use this for plural: [Concept('concept_andersson_anthropologist','$concept_andersson_anthropologists$')]
 concept_andersson_anthropologist_desc: "#b #BLUE Anthropologists#!#! are academics who study human prehistory, both in the paleontological and archaeological senses. They search for [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')] in [Concept('concept_andersson_cave','$concept_andersson_caves$')] or identify previously unknown bones. Three #b Human Fossils#! are enough to reconstruct a pre-human species. The finding and identification of bones, as well as the systematization of early human species, brings anthropological prestige. They can also find local artifacts while exploring caves."

# 1.8.6 End

# 1.8.7

 concept_lepsius_museum: "Archaeological Museum" #This is the actual id of the concept
 concept_lepsius_museum_desc: "The #b Archaeological Museum#! is a building you can construct that displays all the [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] your nation has found."

# 1.8.7 End

 concept_lepsius_excavation_site: "Historical Excavation Site" #This is the actual id of the concept
 concept_lepsius_excavation_sites: "Historical Excavation Sites" #You can use this for plural: [Concept('concept_lepsius_excavation_site','$concept_lepsius_excavation_sites$')]
 concept_lepsius_excavation_site_desc: "There are multiple #b Historical Excavation Sites#! in different countries including: Upper and Lower Egypt, Babylonia, Assyria, Crete, Argolis, Yucatán and Peru. Each #b Historical Site#! offers different [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] and Events. Besides these large, historically significant excavation sites, there are also [Concept('concept_lepsius_minor_excavation_site', '$concept_lepsius_minor_excavation_sites$')]."

 concept_lepsius_expedition: "Archaeological Expedition" #This is the actual id of the concept
 concept_lepsius_expeditions: "Archaeological Expeditions" #You can use this for plural: [Concept('concept_lepsius_expedition','$concept_lepsius_expeditions$')]
 concept_lepsius_expedition_desc: "An #b Archaeological Expedition#! is an expedition of an [concept_lepsius_archaeologist] and his [concept_lepsius_archaeological_team]. It will take multiple months in which they will try to gather as many [Concept('concept_lepsius_artifact','$concept_lepsius_minor_artifacts$')] as possible. #b Expeditions#! are the only way to get in possession of [Concept('concept_lepsius_major_artifact','$concept_lepsius_major_artifacts$')].\nIf you researched early Archaeology, you can leave your Team at the Site to create an [concept_lepsius_excavation] after a successful #b Expeditions#!."

 concept_lepsius_archaeological_team: "Archaeological Team" #This is the actual id of the concept
 concept_lepsius_archaeological_teams: "Archaeological Teams" #You can use this for plural: [Concept('concept_lepsius_archaeological_team','$concept_lepsius_archaeological_teams$')]
 concept_lepsius_excavation_team: "Excavation Team" #You can use this for Excavation Team: [Concept('concept_lepsius_archaeological_team','$concept_lepsius_excavation_team$')] #1.8.7
 concept_lepsius_archaeological_team_desc: "You need one or more #b Archaeological Team#! to be able to conduct [Concept('concept_lepsius_expedition','$concept_lepsius_expeditions$')]. You can gain up to 3 #b Archaeological Teams#!, but each one has higher requirements.\n\nYou can get your first #b Team#! by having researched the Antiquarianism Technology, having a University of at least level 3 and a Literacy of 33%.\n\nYou can get another Team if you have researched the Modern Archaeology Technology, have a University of at least level 15 and a Literacy of 66%.\n\nYou can get another #b Team#! having researched the Antiquarianism Technology and having an Experienced [concept_lepsius_archaeologist].\n\nYou need #b Teams#! for [Concept('concept_lepsius_expedition','$concept_lepsius_expeditions$')] and [Concept('concept_lepsius_excavation','$concept_lepsius_excavations$')]."

 concept_lepsius_excavation_licence: "Excavation Licence" #This is the actual id of the concept
 concept_lepsius_excavation_licences: "Excavation Licences" #You can use this for plural: [Concept('concept_lepsius_excavation_licence','$concept_lepsius_excavation_licences$')]
 concept_lepsius_excavation_licence_desc: "If you do not own some of the [Concept('concept_lepsius_excavation_site','$concept_lepsius_excavation_sites$')] yourself, you can still get access to them by using the #b Excavation Licence#! Diplomatic Action.\nTo be able to get a #b Excavation Licence#! you need to be at least a Major Power and have an [concept_active_interest] in the Region.\nYou will have to pay the other country a small amount of money to keep the #b Excavation Licence#!."

 concept_lepsius_artifact: "Artifact" #This is the actual id of the concept
 concept_lepsius_artifacts: "Artifacts" #You can use this for plural: [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')]
 concept_lepsius_minor_artifact: "Minor Artifact" #You can use this for Minor Artifact: [Concept('concept_lepsius_artifact','$concept_lepsius_minor_artifact$')]
 concept_lepsius_minor_artifacts: "Minor Artifacts" #You can use this for Minor Artifacts: [Concept('concept_lepsius_artifact','$concept_lepsius_minor_artifacts$')]
 concept_lepsius_oceanic_artifact: "Oceanic Artifact" #You can use this for Minor Artifacts: [Concept('concept_lepsius_artifact','$concept_lepsius_oceanic_artifact$')]
 concept_lepsius_oceanic_artifacts: "Oceanic Artifacts" #You can use this for Minor Artifacts: [Concept('concept_lepsius_artifact','$concept_lepsius_oceanic_artifacts$')]
 concept_lepsius_artifact_desc: "You can get Artifacts by sending [Concept('concept_lepsius_archaeological_team','$concept_lepsius_archaeological_teams$')] on [Concept('concept_lepsius_expedition','$concept_lepsius_expeditions$')], [Concept('concept_lepsius_excavation','$concept_lepsius_excavations$')], on [Concept('concept_dubois_pacific_expedition','$concept_dubois_pacific_expeditions$')] or in Events.\n\nUsually you will get Minor #b Artifacts#!. You can use these Minor #b Artifacts#! for [Concept('concept_lepsius_exhibition','$concept_lepsius_exhibitions$')] in your [concept_lepsius_museum].\n\n[Concept('concept_lepsius_major_artifact','$concept_lepsius_major_artifacts$')] on the other hand are unique #b Artifacts#! that can only be found once and have a unique name. You can usually find them in Expeditions, excavations and as Archaeological Discoveries."

 concept_lepsius_major_artifact: "Major Artifact" #This is the actual id of the concept
 concept_lepsius_major_artifacts: "Major Artifacts" #You can use this for plural: [Concept('concept_lepsius_major_artifact','$concept_lepsius_major_artifacts$')]
 concept_lepsius_major_artifact_desc: "#b Major Artifacts#! are special [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] that have a name and an identity.\nYou can find #b Major Artifacts#! in different ways. Some of them you will find during [Concept('concept_lepsius_expedition','$concept_lepsius_expeditions$')]. For others you need to maintain a continous [concept_lepsius_excavation] until you find. And some will be discovered in a major discovery.\nTaking a #b Major Artifact#! out of a country illegally might cause a diplomatic incident that might harm you more than owning a #b Major Artifact#!. On the other hand, #b Major Artifacts#! allow you to create a [Concept('concept_lepsius_exhibition','$concept_lepsius_excellent_exhibition$')] which will give you a huge prestige bonus and is needed for some [Concept('concept_academics_academic_mission','$concept_academics_academic_missions$')]."

 concept_lepsius_exhibition: "Exhibition" #This is the actual id of the concept
 concept_lepsius_exhibitions: "Exhibitions" #You can use this for plural: [Concept('concept_lepsius_exhibition','$concept_lepsius_exhibitions$')]

 concept_lepsius_excellent_exhibition: "Excellent Exhibition" #You can use this for the excellent exhibition: [Concept('concept_lepsius_exhibition','$concept_lepsius_excellent_exhibition$')]


 concept_lepsius_excavation: "Excavation" #This is the actual id of the concept
 concept_lepsius_excavations: "Excavations" #You can use this for plural: [Concept('concept_lepsius_excavation','$concept_lepsius_excavations$')]
 concept_lepsius_excavation_desc: "If you have researched Early Archaeology and finished an [concept_lepsius_expedition], you can decide to leave your [concept_lepsius_archaeological_team] at the Site to passively dig out [Concept('concept_lepsius_artifact','$concept_lepsius_minor_artifacts$')]. You can always call your Team back from the #b Excavation#!."

# 1.8.6

 concept_andersson_human_fossil: "Human Fossil" #This is the actual id of the concept
 concept_andersson_human_fossils: "Human Fossils" #You can use this for plural: [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')]
 concept_andersson_human_fossils_fossils: "Fossils" #You can use this for plural: [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils_fossils$')]
 concept_andersson_human_bones: "Human Bones" #You can use this for Human Bones: [Concept('concept_andersson_human_fossil','$concept_andersson_human_bones$')] #1.8.7
 concept_andersson_human_fossil_desc: "#b Human Fossils#! belong to one of five different species: Cro-Magnon, Neanderthal, Homo Erectus, Australopithecus or Paranthropus. [Concept('concept_andersson_anthropologist','$concept_andersson_anthropologists$')] can find them in [Concept('concept_andersson_cave','$concept_andersson_caves$')] and (usually) immediately identify and assign them. However, Human Fossils can rarely be found by archaeologists and paleontologists. Only #b #BLUE Anthropologists#!#! can correctly identify these 'unknown human fossils'. Three bones complete a species, which is rewarded with anthropological prestige. The first classification of an early human gives significantly more prestige. Human Fossils can be completed as often as desired."

 concept_andersson_cave: "Cave" #This is the actual id of the concept
 concept_andersson_caves: "Caves" #You can use this for plural: [Concept('concept_andersson_cave','$concept_andersson_caves$')]
 concept_andersson_cave_desc: "#b Prehistoric Caves#! are a place where early human or pre-human species may have left [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils_fossils$')] and, in more advanced types, tools. Caves can be discovered and explored by [Concept('concept_andersson_anthropologist','$concept_andersson_anthropologists$')]. Some Caves are also unlocked through historical events. The fossils of only one species lie in each Cave - this means that the bones of Cro-Magnon humans and Neanderthals are never in the same Cave. Some Caves are historical, while some are randomly distributed at the start of the game on one of the three continents of Africa, Asia and Europe. They are roughly based on the distribution area of ​​pre-humans - the Australopithecus, for example, will only be found in Africa."

# 1.8.6 End

###VERRIER###
 concept_verrier_astronomy: "Astronomy"

 concept_verrier_observatory: "Observatory" #This is the actual id of the concept
 concept_verrier_observatories: "Observatories" #You can use this for plural: [Concept('concept_verrier_observatory','$concept_verrier_observatories$')]
 concept_verrier_observatory_desc: "An #b Observatory#! is the backbone of a countries [concept_verrier_astronomy] and [concept_mendelejew_chemistry]. From there [Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')] can discover Planets, [Concept('concept_verrier_satellite','$concept_verrier_satellites$')], [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')], [Concept('concept_verrier_comet','$concept_verrier_comets$')] and take [Concept('concept_verrier_moon_photo','$concept_verrier_moon_photos$')].\nTo build an #b Observatory#!, you need to have a University and either the $verrier_astronomy_tech$ or $verrier_chemistry_tech$ [concept_technology] researched. Additionally an #b Observatory#! can only be built once and only in your capital."

 concept_verrier_astronomer: "#b #ORANGE Astronomer#!#!" #This is the actual id of the concept
 concept_verrier_astronomers: "#b #ORANGE Astronomers#!#!" #You can use this for plural: [Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')]
 concept_verrier_astronomer_desc: "#b Astronomers#! are Academics that will explore the sky and discover [Concept('concept_verrier_satellite','$concept_verrier_satellites$')], [Concept('concept_verrier_comet','$concept_verrier_comets$')] and [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')].\n#b Astronomers#! gain [concept_academics_experience] when they discover #b Astronomical Objects#! or attend Conferences. They get #b Experience#! passively as well each year. This allows #b Astronomers#! to get better astronomer traits.\n\nAn #b Astronomer#! can focus on discovering new #b Satellites#! or #b Taking Moon Photos#!. This will however reduce the amount of discovered #b Astronomical Objects#!"

 concept_verrier_astronomical_object: "Astronomical Object" #This is the actual id of the concept
 concept_verrier_astronomical_objects: "Astronomical Objects" #You can use this for plural: [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]
 concept_verrier_astronomical_object_icon: "@verrier_astronomicalobject!" #You can use this for the icon: [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_object_icon$')] #1.8.7
 concept_verrier_celestial_body: "Celestial Body" #You can use this for celestial body: [Concept('concept_verrier_astronomical_object','$concept_verrier_celestial_body$')]
 concept_verrier_celestial_bodies: "Celestial Bodies" #You can use this for celestial bodies: [Concept('concept_verrier_astronomical_object','$concept_verrier_celestial_bodies$')]

 concept_verrier_comet: "Great Comet" #This is the actual id of the concept
 concept_verrier_comets: "Great Comets" #You can use this for plural: [Concept('concept_verrier_comet','$concept_verrier_comets$')]
 concept_verrier_comet_desc: "The Victorian Age had a few #b Great Comets#! that got widespread public attention. If you have an [concept_verrier_astronomer] there is a chance that you will discover one of these #b Great Comets#! first, resulting in a bonus to Prestige and Research."

 concept_verrier_moon_photo: "Moon Photo" #This is the actual id of the concept
 concept_verrier_moon_photos: "Moon Photos" #You can use this for plural: [Concept('concept_verrier_moon_photo','$concept_verrier_moon_photos$')]

###PIUS###
 concept_rapanui_christian_mission: "Christian Mission" #This is the actual id of the concept
 concept_rapanui_christian_missions: "Christian Missions" #You can use this for plural: [Concept('concept_rapanui_christian_mission','$concept_rapanui_christian_missions$')]
 concept_rapanui_christian_mission_desc: "[Concept('concept_major_power','$concept_major_powers$')] or [Concept('concept_great_power','$concept_great_powers$')] with [Concept('concept_interest','$concept_interests$')] in Oceania can try to convert a decentralized island nation in the region - but this is only possible if your country is not too secular and the "devout" interest group is not too weak.\n\nThe proselytizing takes place in three steps. If you send a missionary, he will either be received kindly, ignored - or killed immediately. Should your mission go awry, you will have to wait a few years to find a new missionary to spread the word of God. Afterwards your missionary will convert 1% of the population per year. There might be events that help or hinder the conversion.\n\nThe second stage begins when you reach 30% converted natives. Now your Missionary Station will become permanent. Should 51 percent of the natives profess Christianity, then the chief will convert to your religion and place himself under your protection as a [concept_protectorate]. Years later, these areas can even be annexed if you have the technology to prevent malaria.\n\nIn the third stage you can actively make decisions via the Journal Entry. Either you strengthen the mission directly by sending additional missionaries, or you try to trade. You can acquire rare [Concept('concept_lepsius_artifact','$concept_lepsius_oceanic_artifacts$')], [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] or pearls that increase the standard of living of the rich."

