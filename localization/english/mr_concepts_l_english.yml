 concept_tesla_engineering: "Engineering"
 concept_tesla_engineering_desc: "#b Engineering#! is one of the main features of [concept_morgenroete].\n\nTo get access to #b Engineering#!, you need to have an [concept_tesla_engineer]. #b Engineers#! can start #b Engineering Projects#! depending on their specialization. There are five specialized #b Engineers#!:\n- The [concept_tesla_civil_engineer] focuses on improving the infrastructure of a country.\n- The [concept_tesla_mechanical_engineer] focuses on mechanical inventions that benefit the industry, for example.\n- The [concept_tesla_military_engineer] focuses on improving the army and navy of a country.\n- The [concept_tesla_electrical_engineer] focuses on improving the electrical infrastructure of a country.\n- The [concept_tesla_aeronautical_engineer] focuses on making human flight possible and improving airplanes and other aircraft."

### Replace those please###



 concept_tesla_engineer_desc: "#b #ORANGE Engineers#!#! are Academics that will help with the construction of special buildings by providing expertise.\nAdditionally #b #ORANGE Engineers#!#! will provide a bonus to the [concept_technology_spread] of your nation. The bonus depends on how many nations have more technologies researched than your nation."

 concept_tesla_civil_engineer_desc: "#b Civil Engineers#! focus on improving the infrastructure of a country.\nThey can start #b Engineering Projects#! to add [Concept('concept_modifier','$concept_modifiers$')] to states that raise [concept_infrastructure], to improve your #b Construction Sectors#! or to research [Concept('concept_technology', '$concept_technologies$')]."

 concept_tesla_mechanical_engineer_desc: "#b Mechanical Engineer#! focus on mechanical innovations that improve your industry, machines or the lifes of your population.\nThey can start #b Engineering Projects#! to add [Concept('concept_modifier','$concept_modifiers$')] to your industrial building that improve [concept_throughput], [concept_good_production] and [concept_input_mult], to improve your #b Railways#! with new locomotives or to research industrial [Concept('concept_technology', '$concept_technologies$')]."

 concept_tesla_military_engineer_desc: "#b Military Engineer#! focus on improving our army and navy by introducing new innovations.\nThey can start #b Engineering Projects#! to gain new [Concept('concept_mobilization_option','$concept_mobilization_options$')] by inventing weapons, new field works and better tanks or to research military or naval [Concept('concept_technology', '$concept_technologies$')]."

 concept_tesla_electrical_engineer_desc: "#b Electrical Engineer#! focus on improving your country with electrical innovations.\nThey can start #b Engineering Projects#! to research the geomagnetic field of the Earth, to build telegraph or radio networks or to research electrical [Concept('concept_technology', '$concept_technologies$')]."

 concept_tesla_aeronautical_engineer_desc: "#b Aeronautical Engineer#! focus on developing means to fly and improving airplanes and Zeppelins.\nThey can start #b Engineering Projects#! to add [Concept('concept_modifier','$concept_modifiers$')] to your #V Airports#! that improve [concept_throughput], [concept_good_production] and [concept_input_mult], to unlock #V Advanced Aircraft#! as [Concept('concept_mobilization_option','$concept_mobilization_options$')] or to research aviation [Concept('concept_technology', '$concept_technologies$')]."

 ### 2.0.5 ###

 concept_vikelas_racer: "Car Racer"
 concept_vikelas_racers: "Car Racers" #use this for plural: [Concept('concept_vikelas_racer','$concept_vikelas_racers$')]
 concept_vikelas_racer_desc: "A Car Racer is a special [concept_character] who takes part in [concept_vikelas_car_racing]."

 concept_vikelas_car_racing: "Car Racing"
 concept_vikelas_car_racing_desc: "Car Racing is a sport in which [Concept('concept_vikelas_racer','$concept_vikelas_racers$')] compete against each other either on a track or on regular roads."

 concept_lepsius_archaeological_exhibition: "Archaeological Exhibition" #You can use this for the arcaeological exhibition: [Concept('concept_lepsius_exhibition','$concept_lepsius_archaeological_exhibition$')]


 concept_elgar_opera_desc: "The #b Opera#! is the musical center of a nation. It is where the most important musicians gather and play for the masses.\nThe #b Opera#! is a seperate building that can be constructed in states if the Urban Center is at least level 5. The #b Opera#! will produce Music and consume Instruments. The higher the level of the #b Opera#! is, the more [concept_elgar_musical_tradition] will be produced every year.\nAdditionally with an #b Opera#! you gain access to some decisions like visiting your Opera." # --> Please replace

 concept_elgar_impressionism_desc: "#b Impressionism#!  is a style in art history that is characterized by the atmospheric depiction of fleeting snapshots of a scene. It emerged from a movement within painting in France in the second half of the 19th century. The term impressionism has also been applied to certain styles of music, literature, film and photography. While many Naturalists such as Heinrich Hart rejected music as a means of expressing a 'truth-seeking Actionism', the Impressionists often regarded the 'objectless dreaming ahead' to finely graduated colorful chords as a pleasure.\n\nIn the game, #b Impressionism#! is only unlockable with a journal entry that requires 1000 [concept_elgar_musical_tradition], an [concept_elgar_opera], powerful landowners, industrialists that are not powerful and an Intelligentsia with an approval of 5 above. If you choose #b Impressionism#!, you won't be able to unlock the other two branches.\n\nThe focus of #b Impressionism#! in the game is music. Therefore it will give you the biggest bonus to [concept_elgar_musical_tradition]." # --> Please replace
 concept_elgar_expressionism_desc: "#b Expressionism#!  is a style in art. Its beginnings and forerunners can be found in the late 19th century. Like Impressionism, Symbolism and Fauvism, Expressionism is a movement against the tendencies of Naturalism. In Expressionism, the expressive level outweighs the aesthetic, appellative and factual level. The artist wants to represent his experience for the viewer. In contrast to musical impressionism, which depicts the perception of the external appearance of things, the expressionist art movements formulate the emotions of the human soul.\n\nIn the game, #b Expressionism#! is only unlockable with a journal entry that requires 1000 [concept_elgar_musical_tradition], an [concept_elgar_opera], a powerful intelligentsia or trade unions, landowners that are not powerful and either the Intelligentsia or the trade unions need an approval of 5 or above. If you choose #b Expressionism#!, you won't be able to unlock the other two branches.\n\nThe focus of #b Expressionism#! in the game would be literature, but it is not yet implemented." # --> Please replace
 concept_elgar_art_nouveau_desc: "#b Art Nouveau#! is an Artstyle that developed from the #italic Arts and Crafts Movement#! and was inspired by natural forms. It often focused on dynamism and movement and used modern materials.\n\nIn the game, #b Art Nouveau#! is only unlockable with a journal entry that requires 1000 [concept_elgar_musical_tradition], an [concept_elgar_opera], powerful industrialists and an Intelligentsia with an approval of 5 or above. If you choose #b Art Nouveau#!, you won't be able to unlock the other two branches.\n\nThe focus of #b Art Nouveau#! and #b Art Déco#!, the next technology in this branch, is Architecture. You will get various events and journal entries about architectural deeds and be able get a [concept_gaudi_architectural_splendour]." # --> Please replace
 concept_elgar_composer: "#PURPLE #b Composer#!#!" #This is the actual id of the concept --> Please replace
 concept_elgar_composers: "#PURPLE #b Composers#!#!" #You can use this for plural: [Concept('concept_elgar_composer','$concept_elgar_composers$')] --> Please replace
 concept_elgar_composer_desc: "#b Composers#! are men and women who compose music. Composers are special character types that you can gain either from events, from gaining enough [concept_artistic_progress] to create one in your nation or by offering a position to a [concept_elgar_travelling_composer].\nOnce you have a #b Composer#! you can let them start [Concept('concept_elgar_composing','$concept_elgar_composing_lower_case$')], [Concept('concept_elgar_conducting','$concept_elgar_conducting_lower_case$')], to go on [Concept('concept_elgar_musical_tour','$concept_elgar_musical_tours$')] or composing [Concept('concept_elgar_musical_masterwork','$concept_elgar_musical_masterwork_masterworks$')]. Each action is different in what the composer does, what they require and what you gain from them. The #b Composer#! will be [Concept('concept_elgar_composer_exhaustion','$concept_elgar_composer_exhaustion_exhausted$')] after every task and need to rest for a while until he can work again.\nDuring their life, #b Composers#! will gain [concept_artists_experience] and sometimes lose it again. The higher the #b Reputation#!, the greater the benefits of a #b Composer's#! actions will be. #b Composers#! reaching a #b Reputation#! of 500 will become [Concept('concept_elgar_great_composer','$concept_elgar_great_composers$')], Titans of Music, known throughout the world." # --> Please replace

 concept_elgar_great_composer: "#PURPLE #b Great Composer#!#!" #This is the actual id of the concept --> Please replace
 concept_elgar_great_composers: "#PURPLE #b Great Composers#!#!"  #You can use this for plural: [Concept('concept_elgar_great_composer','$concept_elgar_great_composers$')] --> Please replace
 concept_elgar_great_composer_desc: "#b Great Composers#! are the Titans of music. The ones whose names will be known for all eternity. [Concept('concept_elgar_composer','$concept_elgar_composers$')] reaching 500 [concept_artists_experience], will become #b Great Composers#!. This will greatly increase their efficiency and let your nation gain way more [concept_elgar_musical_tradition]. A #b Great Composer#! can create a [concept_elgar_musical_masterwork] way faster for example." # --> Please replace

 concept_elgar_travelling_composer: "Travelling Composer"
 concept_elgar_travelling_composers: "Travelling Composer" #You can use this for plural: [Concept('concept_elgar_travelling_composer','$concept_elgar_travelling_composers$')]
 concept_elgar_travelling_composer_desc: "#b Travelling Composers#! are [Concept('concept_elgar_composer','$concept_elgar_composers$')] that are not hired by any nation. Instead they travel around on concert tours. You can possibly aquire a #b Travelling Composer#!, but the more [concept_artists_experience] they have the more demands they will have.\nTo invite a #b Travelling Composer#! you need to at least have an [Concept('concept_elgar_opera','$concept_elgar_opera_house$')]. #b Composers#! with a higher #b Reputation#! will demand bigger Opera Houses, modern music [Concept('concept_technology', '$concept_technologies$')], a certain [concept_elgar_musical_tradition] and some might only join [Concept('concept_major_power', '$concept_major_power_short$')] or [Concept('concept_great_power', '$concept_great_powers$')].\nA special case are [Concept('concept_elgar_national_composer','$concept_elgar_national_composers$')] that are only available to nations that are of the same or a very similar national identity."

 concept_elgar_national_composer: "National Composer"
 concept_elgar_national_composers: "National Composer" #You can use this for plural: [Concept('concept_elgar_national_composer','$concept_elgar_national_composers$')]
 concept_elgar_national_composer_desc: "#b National Composers#! are [Concept('concept_elgar_composer','$concept_elgar_composers$')] who value their nation very much. They will not be able to be hired by other nations.\nWhether a #b National Composer#! is available to you or not is decided by their culture's [Concept('concept_cultural_trait','$concept_cultural_traits$')]. One of your primary cultures needs to share both a non-heritage #b Trait#! as well as a [concept_cultural_heritage_trait]. This means that a North German #b National Composer#! will be available to German Countries as well as Switzerland."

 concept_elgar_composing: "Composing"
 concept_elgar_composing_lower_case: "composing" #You can use this for composing: [Concept('concept_elgar_composing','$concept_elgar_composing_lower_case$')]
 concept_elgar_composing_compose: "compose" #You can use this for compose: [Concept('concept_elgar_composing','$concept_elgar_composing_compose$')]
 concept_elgar_composing_desc: "A [concept_elgar_composer] who #b composes#! receives 5 [concept_artists_experience] per year and adds 5 [concept_elgar_musical_tradition] to the country. In addition, he creates a random number of compositions each year. A #b Composer#! with special skills such as Conductor, Virtuoso, Innovative or Meticulous creates one additional composition per year. The number of compositions is decisive for success in later [Concept('concept_elgar_musical_tour','$concept_elgar_musical_tour_tours$')]. A #b Composer#! composes until the action is canceled in the Journal Entry. A #b Composer#! who composes costs the country a small annual maintenance fee."

 concept_elgar_conducting: "Conducting"
 concept_elgar_conducting_lower_case: "conducting" #You can use this for conducting: [Concept('concept_elgar_conducting','$concept_elgar_conducting_lower_case$')]
 concept_elgar_conducting_conduct: "conduct" #You can use this for conducte: [Concept('concept_elgar_conducting','$concept_elgar_conducting_conduct$')]
 concept_elgar_conducting_desc: "The [concept_elgar_composer] will focus on #b conducting#! for 24 months and organize a concert season. This will improve the music output of a random [concept_elgar_opera] for 5 to 10 years, give your nation a small boost to [concept_elgar_musical_tradition] and give your #b Composer#! a medium boost to his [concept_artists_experience]. If your #b Composer#! is not yet a Conductor, he can gain the [concept_character_trait] at the end of the season. You will have to pay the #b Composer#! while he is #b conducting#!."

 concept_elgar_musical_tour: "Concert Tour"
 concept_elgar_musical_tours: "Concert Tours" #You can use this for the plural: [Concept('concept_elgar_musical_tour','$concept_elgar_musical_tours$')]
 concept_elgar_musical_tour_tour: "Tour"
 concept_elgar_musical_tour_tours: "Tours" #You can use this for the plural: [Concept('concept_elgar_musical_tour','$concept_elgar_musical_tour_tours$')]
 concept_elgar_musical_tour_desc: "The [concept_elgar_composer] can go on a #b Concert Tour#! abroad for 30 months. #b Concert Tours#! increase the [concept_prestige] of the #b Composer's#! nation. Additionally the #b Composer#! gains a boost of [concept_artists_experience] at the end of the #b Tour#! that depends on the number of Compositions of the #b Composer#! as well as his traits.\n#b Composers#! with less than 20 Compositions should probably not go on #b Tours#! and #b Composers#! with the #b Reserved#! Trait can not go on #b Tours#!."

 concept_elgar_musical_masterwork: "Musical Masterwork"
 concept_elgar_musical_masterworks: "Musical Masterworks" #You can use this for the plural: [Concept('concept_elgar_musical_masterwork','$concept_elgar_musical_masterworks$')]
 concept_elgar_musical_masterwork_masterwork: "Masterwork" #You can use this for the Masterwork: [Concept('concept_elgar_musical_masterwork','$concept_elgar_musical_masterwork_masterwork$')]
 concept_elgar_musical_masterwork_masterworks: "Masterworks" #You can use this for the Masterworks: [Concept('concept_elgar_musical_masterwork','$concept_elgar_musical_masterwork_masterworks$')]
 concept_elgar_musical_masterwork_of_music: "Masterwork of Music" #You can use this for the Masterwork of Music: [Concept('concept_elgar_musical_masterwork','$concept_elgar_musical_masterwork_of_music$')]
 concept_elgar_musical_masterworks_of_music: "Masterworks of Music" #You can use this for the Masterworks of Music: [Concept('concept_elgar_musical_masterwork','$concept_elgar_musical_masterworks_of_music$')]
 concept_elgar_musical_masterwork_desc: "The [concept_elgar_composer] can start composing a #b Masterwork#! which will take multiple years. The more [concept_artists_experience] a #b Composer#! has, the faster he will finish. Once the #b Masterwork#! is composed, the #b Composer#! will gain 50 [concept_artists_experience] and the country will gain up to 150 [concept_elgar_musical_tradition] depending on its [concept_rank].\nA #b Composer#! can create a maximum of 3 #b Masterworks#! and will need financial support from his country while working on it."

 concept_elgar_composer_exhaustion: "Composer Exhaustion"
 concept_elgar_composer_exhaustion_exhausted: "exhausted" #You can use this for the exhausted: [Concept('concept_elgar_composer_exhaustion','$concept_elgar_composer_exhaustion_exhausted$')]
 concept_elgar_composer_exhaustion_desc: "Once a [concept_elgar_composer] finished [Concept('concept_elgar_composing','$concept_elgar_composing_lower_case$')], [Concept('concept_elgar_conducting','$concept_elgar_conducting_lower_case$')], composing [Concept('concept_elgar_musical_masterwork','$concept_elgar_musical_masterwork_masterworks$')] or a [Concept('concept_elgar_musical_tour','$concept_elgar_musical_tours$')], he will be #b exhausted#! from the work. An #b exhausted Composer#! will not be able to work for some time. The older the #b Composer#!, the longer it takes get rid of the #b Exhaustion#!."

 concept_manzoni_writer: "#PURPLE #b Writer#!#!" #This is the actual id of the concept
 concept_manzoni_writers: "#PURPLE #b Writers#!#!" #You can use this for plural: [Concept('concept_manzoni_writer','$concept_manzoni_writers$')]

 concept_klimt_painter: "#PURPLE #b Painter#!#!" #This is the actual id of the concept


 concept_pm_artists_academy_conservatory: "#b #PURPLE Conservatory#!#!"
 concept_pm_artists_academy_conservatory_desc: "A Conservatory will specializes the Arts Academy for Music. If you have a Conservatory, you will be able to promote [Concept('concept_elgar_composer','$concept_elgar_composers$')]. You will get a #n negative throughput modifier#! for the Art Academy as well as a #n negative effect#! on your [concept_artistic_progress] when you change this production method."

 concept_pm_artists_academy_salon: "#b #PURPLE Literary Salon#!#!"
 concept_pm_artists_academy_salon_desc: "A Literary Salon will specializes the Arts Academy for Literature. If you have a Literature Salon, you will be able to promote [Concept('concept_manzoni_writer','$concept_manzoni_writers$')]. You will get a #n negative throughput modifier#! for the Art Academy as well as a #n negative effect#! on your [concept_artistic_progress] when you change this production method."

 concept_pm_artists_academy_studio: "#b #PURPLE Art Studio#!#!"
 concept_pm_artists_academy_studio_desc: "An Art Studio will specializes the Arts Academy for Painting. If you have a Art Studio, you will be able to promote [Concept('concept_klimt_painter','$concept_klimt_painters$')]. You will get a #n negative throughput modifier#! for the Art Academy as well as a #n negative effect#! on your [concept_artistic_progress] when you change this production method."

 concept_pm_artists_academy_specialization: "Arts Academy Focus"
 concept_pm_artists_academy_specialization_desc: "Every Arts Academy can be specialized by changing its production method.\nAn Arts Academy with a [concept_pm_artists_academy_conservatory] will allow you to promote [Concept('concept_elgar_composer','$concept_elgar_composers$')].\nAn Arts Academy with a [concept_pm_artists_academy_salon] will allow you to promote [Concept('concept_manzoni_writer','$concept_manzoni_writers$')].\nAn Arts Academy with an [concept_pm_artists_academy_studio] will allow you to promote [Concept('concept_klimt_painter','$concept_klimt_painters$')].\nChanging the Specialization will have a #n short negative effect#! for the building and your [concept_artistic_progress]."

 concept_artists_artist: "Artist"
 concept_artists_artists: "Artists" #You can use this for plural: [Concept('concept_klimt_painter','$concept_klimt_painters$')]
 concept_artists_artist_desc: "In [concept_morgenroete] #b Artists#! are special characters that allow you to use certain mechanics of the mod. You can get #b Artists#! in some events or by aquiring enough [concept_artistic_progress]. Artists have [concept_artists_experience] that reflects their standing in their respective field.\nCurrently these #b Artists#! exist:\n - [concept_elgar_composer]\n - [concept_klimt_painter]\n - [concept_manzoni_writer]\n - [concept_gaudi_architect]"

 concept_artistic_progress: "Artistic Progress"
 concept_artistic_progress_desc: "By aquiring 1000 #b Artistic Progress#! you can gain a new [concept_artists_artist]. To even have access to #b Artistic Progress#!, you must either have an #b Arts Academy#! or an #b Opera#!.\nYour #b Artistic Progress#! gain is influenced by various factors. The more [concept_literacy] you have, the faster you gain #b Artistic Progress#! for example. You can gain detailed information on all the factors influencing Artistic Progress from the Toolbar of the Artistic Progress Bar in the Arts Window."

 concept_artists_experience: "Reputation"
 concept_artists_experience_desc: "Every [concept_artists_artist] has a #b Reputation#!. The Reputation represents how well regarded the artist is. Artists start with a small amount of Reputation and can gain additional Reputation by working in their field. Artists that gained a Reputation of 500, will become a #Great Artists#! and get the corresponding [concept_character_trait]."

 concept_manzoni_great_writer: "Great Writer"
 concept_manzoni_great_writer_desc: "A #b Great Writer#! is a [concept_manzoni_writer] known all over the world. A #b Writer#! can becoma a #b Great Writer#! once their [concept_artists_experience] reaches #V 500#!. If your #b Great Writer#! is your [concept_manzoni_national_writer] you will get a bonus to your yearly [concept_manzoni_literary_tradition] gain."

 concept_manzoni_local_writer: "Local Writer"
 concept_manzoni_local_writers: "Local Writers" #You can use this for plural: [Concept('concept_manzoni_local_writer','$concept_manzoni_local_writers$')]
 concept_manzoni_local_writer_desc: "Nearly every [concept_manzoni_writer] starts as a #b Local Writer#!. Every country can have a maximum of 3 #b Local Writers#! that will create #b Publications#!, grant you [concept_manzoni_literary_tradition] if their [concept_manzoni_genre] matches the [concept_manzoni_popular_taste] and gain [concept_artists_experience].\nA #b Local Writer#! with a #b Reputation#! of 150 and whose [concept_interest_group] is not unhappy, can become a countries [concept_manzoni_national_writer] which will grant you more #b Literary Tradition#! and other additional advantages.\nBe aware that #b Local Writers#! unhappy with the current political situation can start to interfere in the political discourse or even become an [concept_agitator]"

 ### 2.1.1 ###

 concept_artists_center_of_arts: "Center of Arts"
 concept_artists_centers_of_arts: "Centers of Arts" #You can use this for plural: [Concept('concept_artists_center_of_arts','$concept_artists_centers_of_arts$')]

 concept_artists_center_of_classicism: "Center of Classicism" #[Concept('concept_artists_center_of_arts','$concept_artists_center_of_classicism$')]
 concept_artists_center_of_romanticism: "Center of Romanticism" #[Concept('concept_artists_center_of_arts','$concept_artists_center_of_romanticism$')]
 concept_artists_center_of_realism: "Center of Realism" #[Concept('concept_artists_center_of_arts','$concept_artists_center_of_realism$')]
 concept_artists_center_of_impressionism: "Center of Impressionism" #[Concept('concept_artists_center_of_arts','$concept_artists_center_of_impressionism$')]
 concept_artists_center_of_expressionism: "Center of Expressionism" #[Concept('concept_artists_center_of_arts','$concept_artists_center_of_expressionism$')]
 concept_artists_center_of_art_nouveau: "Center of Art Nouveau" #[Concept('concept_artists_center_of_arts','$concept_artists_center_of_art_nouveau$')]

 concept_klimt_great_painter: "#PURPLE #b Great Painter#!#!"
 concept_klimt_great_painters: "#PURPLE #b Great Painters#!#!" #You can use this for plural: [Concept('concept_klimt_great_painter','$concept_klimt_great_painters$')]
 concept_klimt_great_painter_desc: "#b Great Painters#! are [Concept('concept_klimt_painter','$concept_klimt_painters$')] that will be known for eternity. #b Painters#! reaching 500 [concept_artists_experience], will become #b Great Painters#!. This will greatly increase their efficiency and let your nation gain way more [concept_klimt_painting_tradition]."

 concept_klimt_independent_painter: "Independent Painter"
 concept_klimt_independent_painters: "Independent Painters" #You can use this for plural: [Concept('concept_klimt_independent_painter','$concept_klimt_independent_painters$')]


 concept_klimt_painter_trip: "Painter's Educational Journey"
 concept_klimt_painter_trip_journeys: "Journeys" #[Concept('concept_klimt_painter_trip','$concept_klimt_painter_trip_journeys$')]

 ### 2.1.2 ###

 concept_elgar_music_desc: "#b Music Culture#! is one of the main features of [concept_morgenroete]. During the 19th and 20th Century, Music was important as a mean to entertain the populace and to show a nations greatness.\n\nTo access most of the Music content in #r Morgenröte#! you will need to build an [concept_elgar_opera]. The #b Opera#! will produce Music but needs Instruments to operate. Apart from producing #b Music #! for your populace to consume, #b Operas#! will slowly add [concept_elgar_musical_tradition] to your Country.\n\n#b Musical Tradition#! reflects a nation's musical achievements and traditions. The amount of #b Musical Tradition#! gives you a prestige bonus and allows you to choose a path for your nation's art to go forward. You can either go the route of [concept_elgar_impressionism], [concept_elgar_expressionism] or [concept_elgar_art_nouveau]. Each one of these Art Styles has another focus.\n\nA good way to gain even more #b Musical Tradition#! is by getting a [concept_elgar_composer]. A composer will be able to [Concept('concept_elgar_composing','$concept_elgar_composing_compose$')], [Concept('concept_elgar_conducting','$concept_elgar_conducting_conduct$')], go on [Concept('concept_elgar_musical_tour','$concept_elgar_musical_tours$')] and even create [Concept('concept_elgar_musical_masterwork','$concept_elgar_musical_masterworks_of_music$')]. These actions will either improve the #b Composer's#! [concept_artists_experience] or improve your nations #b Musical Tradition#!." # --> Please replace

 concept_artists_center_of_arts_desc: "A #b Center of Arts#! is a center of an [concept_artists_art_style] that gets created in a [concept_state_region] once an #b Art Style#! gets invented. There is only one #b Center of Arts#! per #b Art Style#!.\n#b Center of Arts#! are especially important for [Concept('concept_klimt_painter','$concept_klimt_painters$')] that can take [concept_klimt_painter_trip] to study the #b Art Style#! there. Apart from that some #b Center of Arts#! offer unique events that will happen there. Some for example allow you to win [Concept('concept_klimt_art_prize','$concept_klimt_art_prizes$')]." # Please replace

 concept_klimt_painting_culture: "Painting Culture"
 concept_klimt_painting_culture_desc: "#b Painting Culture#! is one of the main features of [concept_morgenroete]. During the 19th and 20th Century, Painting developed rapidly resulting in various new [Concept('concept_artists_art_style','$concept_artists_art_styles$')] that brought a lot of progress to individuals and countries.\n\nTo access most of the Painting content in #r Morgenröte#! you will need to build an #b Arts Academy#!. #b Arts Academies#! allow you to start gaining [concept_klimt_painting_tradition] and to recruit new [Concept('concept_klimt_painter','$concept_klimt_painters$')]\n\n#b Painters#! will createpaint paintings and #b Masterworks#! for your country and give you a big amount of #b Painting Tradition#!. As there are different [Concept('concept_artists_art_style','$concept_artists_art_styles$')] for #b Painters#! to focus on, you can let them study additional #b Art Styles#! on a [concept_klimt_painter_trip]. Once they turn 40 years old, #b Painters#! will specialize in one of their #b Art Styles#! and focus on creating paintings in that #b Art Style#!."

 concept_artists_art_style: "Art Style"
 concept_artists_art_styles: "Art Styles" #[Concept('concept_artists_art_style','$concept_artists_art_styles$')]
 concept_artists_art_style_style: "Style" #[Concept('concept_artists_art_style','$concept_artists_art_style_style$')]
 concept_artists_art_style_desc: "An #b Art Style#! is a specific focus of Art. Some #b Art Styles#! are there from the beginning like #b Classicism#! and #b Romanticism#!. The others, #b Realism#!, #b Irrationalism#!, [concept_elgar_impressionism], [concept_elgar_expressionism] and [concept_elgar_art_nouveau], only appear later after certain conditions are met. Every #b Art Style#! has a corresponding [concept_artists_center_of_arts] in the [concept_state_region] where it started."

 concept_klimt_painter_desc: "#PURPLE #b Painters#!#! are men and women that create paintings and other pieces of art. #b Painters#! are special character types that you can gain either from events, from gaining enough [concept_artistic_progress] to create one in your nation or by offering a position to a [concept_klimt_independent_painter].\n#b Painters#! will immediately start to paint and create a number of paintings each year depending on their [Concept('concept_character_trait','$concept_character_traits$')]. Sometimes they can even create a #b Masterwork#! that will give you even more [concept_klimt_painting_tradition].\n#b Painters#! can study different [Concept('concept_artists_art_style','$concept_artists_art_styles$')] on [Concept('concept_klimt_painter_trip','$concept_klimt_painter_trip_journeys$')]. Each #b Painter#! will specialize in an #b Art Style#! once they are 40 years old which will allow them to paint #b Masterworks#! of a certain Style." # Please replace

 concept_klimt_independent_painter_desc: "[Concept('concept_klimt_painter','$concept_klimt_painters$')] that are not hired by a country are #b Independent Painters#!. #b Independent Painters#! can be hired by countries that have a [Concept('concept_primary_cultures','$concept_primary_culture$')] that shares a [concept_cultural_trait] with the culture of the #b Painter#!.\n#b Independent Painters#! have various requirements for their host country. You will need #b Arts Academies#!, certain [Concept('concept_technology', '$concept_technologies$')] or [concept_klimt_painting_tradition] depending on the #b Painter's#! [concept_artists_experience]. Additionally you will have to pay them a sum of money that depends on their #b Renown#! as well as your country's financial capabilities." # Please replace

 concept_klimt_painter_trip_desc: "A [concept_klimt_painter] can learn new [Concept('concept_artists_art_style','$concept_artists_art_styles$')] on an #b Educational Journey#! to one of the [Concept('concept_artists_center_of_arts','$concept_artists_centers_of_arts$')].\nOn such a #b Trip#! a painter can gain positive and negative [Concept('concept_character_trait','$concept_character_traits$')] that will influence their work and the number of paintings they create. Each #b Center of Arts#! has slightly different events and will give the #b Painter#! a unique #b Trait#! at the end that can later become the #b Painter's#! Specialization." # Please replace

 concept_klimt_art_prize: "Art Prize"
 concept_klimt_art_prizes: "Art Prizes" #[Concept('concept_klimt_art_prize','$concept_klimt_art_prizes$')]
 concept_klimt_art_prize_desc: "From time to time, artistic competitions are held in which prizes are awarded - which promote an artist's reputation. Nations that have a [concept_artists_center_of_arts] for Irrationalism or [concept_elgar_impressionism] choose the best musicians in a competition that takes place every five years. The owners of an [concept_klimt_art_gallery] or a #b Center of Art of Realism#! come to host a painting competition that takes place every five years. The country from which the winners come also receives Music or Painting Tradition. A special form of art competition is the Biennale, which every two years awards a comprehensive art prize to the country that has the artists with the highest reputation, which increases all cultural tradition values."

 concept_klimt_art_gallery: "Art Gallery"
 concept_klimt_art_gallery_desc: "The #b Art Gallery#! is a special building in a nation's capital that is available starting with #b Realism#!. It can only be built if the nation has a [concept_klimt_painter] with specialization. #b Painters#! with a specialization unlock the collection of their [Concept('concept_artists_art_style','$concept_artists_art_style_style$')] - that is, an artist with a specialization in the Romantic style unlocks a collection of Romanticism. In order to upgrade a collection to an excellent collection, a masterpiece of this kind is required, which must either be painted by a painter or acquired from abroad."

 ### 2.1.4 ###

 concept_manzoni_writer_novelist: "Novelist"

 concept_manzoni_writer_desc: "A #b Writer#! is a special character that will write works of literature for your country. #b Writers#! usually start as [concept_manzoni_local_writer] and will write #b Publications#! and sometimes even [Concept('concept_manzoni_bestseller','$concept_manzoni_bestsellers$')]. A #b Bestseller#! will grant the #b Writer#! a big amount of [concept_artists_experience] and [concept_manzoni_literary_tradition] to your country. There is a chance to write a #b Bestseller#! every year, depending on how close the #b Writer's#! [concept_manzoni_genre] is to the [concept_manzoni_popular_taste].\n\nA well known #b Writer#! whose [concept_interest_group] is happy enough, can become your [concept_manzoni_national_writer]. A #b National Writer#! can gain [Concept('concept_manzoni_book_licence','$concept_manzoni_book_licences$')] or create a Newspaper Novel. If a #b Writer#! gains 500 #b Reputation#! they can become a [concept_manzoni_great_writer] and provide your country with even more #b Literary Tradition#!.\n\nBe careful, if #b Writers#! are unhappy with the political situation in a country, they can decide to become [Concept('concept_agitator', '$concept_agitators$')] or interfere in the political discourse."

 concept_manzoni_national_writer: "National Writer"
 concept_manzoni_national_writer_desc: "A #b National Writer#! is a type of [concept_manzoni_writer] that is considered to be the face of your countries literature. #b National Writers#! Grant you a minimum of 1 and up to 5 [concept_manzoni_literary_tradition].\nYou can gain a #b National Writer#! by appointing one of your [Concept('concept_manzoni_local_writer','$concept_manzoni_local_writers$')]. To be able to appoint one of your #b Local Writers#! they must have at least #V 150#! [concept_artists_experience] and their [concept_interest_group] must have a positive [concept_approval].\n" #TODO: Finisih Concept

 concept_manzoni_bestseller: "Bestseller"
 concept_manzoni_bestsellers: "Bestsellers" #You can use this for plural: [Concept('concept_manzoni_bestseller','$concept_manzoni_bestsellers$')]
 concept_manzoni_bestseller_desc: "A #b Bestseller#! is a #b Publication#! by a [concept_manzoni_writer] that is selling very well, usually because the #b Writer's#! [concept_manzoni_genre] matches or is close to the current [concept_manzoni_popular_taste].\nEvery year there is a chance for a [concept_manzoni_national_writer] or [concept_manzoni_local_writer] to write a #b Bestseller#!. The first #b Bestseller#! will grant a big amount of [concept_manzoni_literary_tradition] and every #b Bestseller#! after the first one will grant the country a significant amount of #b Literary Tradition#!."

 concept_manzoni_genre: "Genre"
 concept_manzoni_genres: "Genres" #You can use this for plural: [Concept('concept_manzoni_genre','$concept_manzoni_genres$')]
 concept_manzoni_genre_desc: "Every [Concept('concept_manzoni_writer','$concept_manzoni_writer_novelist$')] has a specific #b Genre#! for their writing. The #b Genre#! gets assigned when the #b Writer#! gets created and depends on many factors.\n#b Writers#! will gain more [concept_artists_experience] and write more [Concept('concept_manzoni_bestseller','$concept_manzoni_bestsellers$')] when their #b Genre#! matches or is close to the [concept_manzoni_popular_taste] of the country."

 concept_manzoni_popular_taste: "Popular Taste"
 concept_manzoni_popular_taste_audience: "Audience Taste" #You can use this for plural: [Concept('concept_manzoni_popular_taste','$concept_manzoni_popular_taste_audience$')]
 concept_manzoni_popular_tastes_audience: "Audience Tastes" #You can use this for plural: [Concept('concept_manzoni_popular_taste','$concept_manzoni_popular_tastes_audience$')]
 concept_manzoni_popular_taste_desc: "Every nation's population has a #b Taste#! for a specific [concept_manzoni_genre]. About every 10 years this #b Taste#! will change depending on political, social and cultural changes in the country itself.\n[Concept('concept_manzoni_writer','$concept_manzoni_writers$')] who have a #b Genre#! matching the #b Taste#! or close to it will gain more [concept_artists_experience] and write more [Concept('concept_manzoni_bestseller','$concept_manzoni_bestsellers$')].\n\n#V Close Tastes:#!\n- #b $manzoni_taste_adventure_var_loc$#!: $manzoni_genre_science_fiction$, $manzoni_genre_juvenile$, $manzoni_genre_crime_mystery$\n- #b $manzoni_taste_crime_var_loc$#!: $manzoni_genre_science_fiction$, $manzoni_genre_adventure$, $manzoni_genre_romance$\n- #b $manzoni_taste_devotional_var_loc$#!: $manzoni_genre_juvenile$, $manzoni_genre_romance$, $manzoni_genre_adventure$\n- #b $manzoni_taste_juvenile_var_loc$#!: $manzoni_genre_adventure$, $manzoni_genre_devout$, $manzoni_genre_crime_mystery$\n- #b $manzoni_taste_literary_var_loc$#!: $manzoni_genre_social_critic$, $manzoni_genre_science_fiction$, $manzoni_genre_romance$\n- #b $manzoni_taste_romance_var_loc$#!: $manzoni_genre_devout$, $manzoni_genre_juvenile$, $manzoni_genre_literary_fiction$\n- #b $manzoni_taste_science_var_loc$#!: $manzoni_genre_adventure$, $manzoni_genre_social_critic$, $manzoni_genre_literary_fiction$\n- #b $manzoni_taste_social_var_loc$#!: $manzoni_genre_literary_fiction$, $manzoni_genre_juvenile$, $manzoni_genre_crime_mystery$"

 concept_manzoni_book_licence: "Book Licence"
 concept_manzoni_book_licences: "Book Licences" #You can use this for plural: [Concept('concept_manzoni_book_licence','$concept_manzoni_book_licences$')]
 concept_manzoni_book_licence_desc: "Foreign publishers can get contracts with a [concept_manzoni_national_writer] and offer his books as translations in their own market. This happens when a writer meets the [Concept('concept_manzoni_popular_taste','$concept_manzoni_popular_tastes_audience$')] abroad. If an author gets at least five book licenses, his books are considered world literature. He can then go on a reading tour."

 concept_manzoni_library: "National Library"
 concept_manzoni_library_desc: "Your #b National Library#! will automatically set up Book Collections (in form of a [concept_production_method]) if you have enough [concept_manzoni_publications]. The first Book Collection will be created for 1.000 or more publications. From there better Collections are possible with 2.500 (Tiny Book Collection), 5.000 (Small Book Collection), 10.000 (Medium Book Collection), 25.000 (Large Book Collection), 50.000 (Excellent Book Collection) and 100.000 (Great Book Collection)."
 concept_manzoni_publications: "Publications"
 concept_manzoni_publications_desc: "#b Publications#! include all newly published book titles, newspapers, essays and other similar written products in a nation. They are not consistent with @manzoni_prints! $manzoni_prints$ circulating as commodities. Publications can also appear independently of the publishing industry, for example through the in-house printing presses of government buildings or universities. Academics and private individuals also produce publications depending on their literacy level. However, the publishing industry accounts for the lion's share, and the decisive factor is whether a modern production method is used or not. A large number of publications is fundamental to the expansion of a [concept_manzoni_library]."

 ### 2.1.5 ###

 concept_curtiss_tourism: "Tourism"
 concept_curtiss_tourism_desc: "Tourism provides a culturally superior nation with additional income. Unique monuments, museums and art galleries, archaeological sites, centers of art as well as high values in the various cultural traditions are factors that make a nation an attractive tourist destination. Laws that increase freedom of movement and economic activity also contribute to higher tourism income. The infrastructure also plays a crucial role - after all, remote places cannot be reached. An airport in particular revolutionizes tourism and provides a significant increase in revenue."

 concept_curtiss_private_airline: "Private Airline" #You can use this for plural: [Concept('concept_curtiss_airline','$concept_curtiss_private_airline$')]

 ### 2.2.1 ###

 concept_mendelejew_chemist: "#b #ORANGE Chemist#!#!"

 ### 2.2.1a ###

 concept_manzoni_literature: "Literary Culture"
 concept_manzoni_literature_desc: "#b Literary Culture#!is one of the main features of [concept_morgenroete]. Print culture and newspaper culture in particular experienced significant upheavals in the 19th and 20th centuries. The mass of printed products and everyday use is represented by the printing industry. The cultural value of the literature produced is reflected in the [concept_manzoni_literary_tradition]. The latter depends largely on the [Concept('concept_manzoni_writer','$concept_manzoni_writers$')] of a country, and there are [Concept('concept_manzoni_local_writer','$concept_manzoni_national_writers$')] and [Concept('concept_manzoni_national_writer','$concept_manzoni_local_writers$')]. Whether they live in the shadows or become celebrated authors depends on the [concept_manzoni_popular_taste]."

 ### 2.2.2 ###

 concept_morgenroete_desc: "#r Morgenröte - Dawn of Flavor #! is a mod created to broaden the cultural and scientific aspects of Victoria 3. It features content for various aspects of the Victorian Age:\n\n#V Lepsius: #! [concept_lepsius_archaeology]\n#V Verrier:#! [concept_verrier_astronomy]\n#V Gaudi:#! [concept_elgar_architecture] & [concept_tesla_engineering]\n#V Dubois:#! [concept_dubois_natural_history]\n#V Mendelejew:#! [concept_mendelejew_chemistry]\n#V Elgar:#! [concept_elgar_music]\n#V Manzoni:#! [concept_manzoni_literature]\n#V Klimt:#! [concept_klimt_painting_culture]\n#V Curtiss:#! [concept_curtiss_aviation]\n#V Vikelas:#! [concept_vikelas_sports]" # Please replace

 concept_agassiz_mineral: "Mineral"
 concept_agassiz_minerals: "Minerals"
 concept_agassiz_mineral_desc: "Minerals are all types of special types of rock that do not fall under the known resources used in industry. A nation receives a certain number of minerals annually once it has invented the #b Geology#! Technology. If a [Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')] is in the service of this nation, he can find additional minerals. Locations of minerals are characterized by state modifiers: mountains, deserts, arctic areas, raw material deposits (coal, iron and sulfur areas, for example) as well as geological [Concept('concept_dubois_formation','$concept_dubois_formations$')] and volcanoes. Deserts and arctic areas are considered to be poor in minerals, while great geological formations and volcanoes are considered to be particularly rich in minerals. A more valuable form of minerals are [Concept('concept_agassiz_rare_mineral','$concept_agassiz_rare_minerals$')]."
 concept_agassiz_rare_mineral: "Rare Mineral"
 concept_agassiz_rare_minerals: "Rare Minerals"
 concept_agassiz_rare_mineral_desc: "[Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')] can find Rare Minerals on their expeditions, such as [Concept('concept_dubois_pacific_expedition','$concept_dubois_pacific_expeditions$')], [concept_douglas_mountaineering] expeditions, [concept_agassiz_volcano] expeditions or during mineral prospecting. Unlike common [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')], they are only found in very limited quantities. Rare Minerals are used to build a mineral cabinet."
 concept_agassiz_geologist: "#b #GREEN Geologist#!#!"
 concept_agassiz_geologists: "#b #GREEN Geologists#!#!"
 concept_agassiz_geologist_desc: "#b #GREEN Geologists#!#! are [Concept('concept_academics_academic','$concept_academics_academics$')] who primarily study rocks and earth history. They locate [Concept('concept_andersson_cave','$concept_andersson_caves$')], [Concept('concept_dubois_formation','$concept_dubois_formations$')] and [Concept('concept_curie_uranium','$concept_curie_uranium$')] deposits, which makes them irreplaceable colleagues for [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')], [Concept('concept_andersson_anthropologist','$concept_andersson_anthropologists$')] and [Concept('concept_curie_physicist','$concept_curie_physicists$')]. During their expeditions, they may find additional [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')] that a [concept_mendelejew_chemist] can use to discover or isolate [Concept('concept_mendelejew_element','$concept_mendelejew_elements$')]. They can find new deposits of raw materials. They are also active as volcanologists and can go on expeditions to local [Concept('concept_agassiz_volcano','$concept_agassiz_volcanoes$')] to research them in more detail. Together with [Concept('concept_tesla_engineer','$concept_tesla_engineers$')], they can develop new devices, such as seismographs, to learn more about the Earth's interior. Geologists can take part in [Concept('concept_dubois_pacific_expedition','$concept_dubois_pacific_expeditions$')] and [concept_douglas_mountaineering] expeditions."
 concept_agassiz_volcano: "Volcano"
 concept_agassiz_volcanoes: "Volcanoes"
 concept_curie_physicist: "#b #ORANGE Physicist#!#!"
 concept_curie_physicists: "#b #ORANGE Physicists#!#!"
 concept_curie_physicist_desc: "#n Coming soon to Morgenröte!#!"
 concept_curie_uranium: "Uranium"
 concept_curie_uranium_desc: "Uranium is an extremely rare material that can only be found in a few selected, historical provinces by [Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')]. Modern Physics must have been researched for this. At first glance, uranium is a secondary ore that is only used in ceramic production. However, it will be needed later, especially in the [concept_verrier_observatory]. Only if the best physical and chemical production methods are supplied with uranium they can fulfill their purpose, whether in the field of nuclear physics or in the research of previously unknown elements. Without uranium, all scientific activities in the field of radioactivity are simply impossible. It is therefore particularly interesting for [Concept('concept_mendelejew_chemist','$concept_mendelejew_chemists$')] and [Concept('concept_curie_physicist','$concept_curie_physicists$')] in the final phase of Victoria 3."

 concept_mendelejew_chemistry: "Chemistry"
 concept_mendelejew_chemistry_desc: "#b Chemistry#! is one of the main features of [concept_morgenroete]. Starting in the 18th Century, #b Chemistry#! rapidly developed into a modern science. Suddenly many new elements were discovered and chemical processes were invented. The 19th and 20th century saw even more discoveries in Chemistry, ranging from new elements to the invention of dynamite or the Haber-Bosch-Process.\n\nIn #b Morgenröte#! #b Chemistry#! will be conducted by [Concept('concept_mendelejew_chemist','$concept_mendelejew_chemists$')] who will be able to focus on different tasks.\nOne focus is the improvement of your countries #b $building_chemical_plant$#!, #b $building_explosives_factory$#! or #b $building_synthetics_plant$#!, which will make those [Concept('concept_building', '$concept_buildings$')] more efficient.\nIf you are looking for a more prestigous task, you can let your #b Chemist#! theorize, discover or isolate [Concept('concept_mendelejew_element','$concept_mendelejew_elements$')]. Each Element will add a little bit of [concept_prestige] depending on whether you theoriized, discovered or isolated it.\nLater in the game the #b Chemist#! will also be able to invent #b Synthetic Oil#! and #b Synthetic Rubber#!. This will unlock the #b $building_mendelejew_hydrogenation_plants$#! or the #b $building_mendelejew_synthetic_rubber_factory$#!."

 concept_mendelejew_chemists: "#b #ORANGE Chemists#!#!"
 concept_mendelejew_chemist_desc: "#b #ORANGE Chemists#!#! are [Concept('concept_academics_academic','$concept_academics_academics$')] that will theorize, discover and isolate [Concept('concept_mendelejew_element','$concept_mendelejew_elements$')].\n#b #ORANGE Chemists#!#! gain [concept_academics_experience] when they research #b Elements#! or attend Conferences. They can also improve fertilizers, explosives and synthetics. Chemists may invent the periodic table or synthetic fuel, making them valuable for countries without oil access. They get #b Experience#! passively as well each year. This allows #b #ORANGE Chemists#!#! to get better chemist traits. They may also get a specialization (theorist, analyst, inspector) when created or by event."
 concept_mendelejew_element: "Chemical Element"
 concept_mendelejew_element_no_chemical: "Element"
 concept_mendelejew_elements: "Chemical Elements"
 concept_mendelejew_element_desc: "In ancient times it was common to believe that the world consisted of the four elements: fire, earth, water and air. With the beginning of the emancipation of chemistry from alchemy, the scientific analysis of the chemical elements came about. This process was far from complete in the 19th century.\n\n[Concept('concept_mendelejew_chemist','$concept_mendelejew_chemists$')] can continue this research by theorizing, discovering, and isolating elements one at a time. Only when isolated is an element considered fully recognized and given its name; previously it is just a number. The categorization of elements brings scientific progress and chemist [concept_academics_experience].\nNot all elements can be theorized, discovered and isolated from the start.\n The prerequisite is that the chemical laboratory in the [concept_verrier_observatory] has adequate equipment, in some cases also an Institute for Modern Physics. Many elements can only be properly researched with spectrography; towards the end of the game, a cyclotron may be necessary. [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')] are necessary for the discovery and isolation of chemical elements. In addition to production methods, the chemist's experience and character traits play a decisive role in how long the research takes.\n\nResearched elements are a requirement for the development of the periodic table and the organization of the chemistry congress."

 concept_verrier_meteorite: "Meteorite"
 concept_verrier_meteorites: "Meteorites"

 ### 2.2.2a ###

 concept_manzoni_national_writers: "National Writers"

 ### 2.2.3 ###

 concept_verrier_astronomy_desc: "#b Astronomy#! is one of the main features of [concept_morgenroete].\n\nTo gain access to #b Astronomy#! you need an [concept_verrier_observatory] or an [concept_verrier_astronomer].\n\nOnce you have an Observatory, you will passively discover [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')].\n\n If you have an [concept_verrier_astronomer] you will even be able to find new Planets, [Concept('concept_verrier_satellite','$concept_verrier_satellites$')], [Concept('concept_verrier_comet','$concept_verrier_comets$')] and take [Concept('concept_verrier_moon_photo','$concept_verrier_moon_photos$')].\nSometimes your [concept_agassiz_geologist] might also find [Concept('concept_verrier_meteorite','$concept_verrier_meteorites$')] which can be examined by #b Astronomers#! and [Concept('concept_mendelejew_chemist','$concept_mendelejew_chemists$')].\n\nEvery Astronomical discovery will grant you [concept_verrier_astronomical_prestige] which will be added to you [concept_prestige]. Check the $verrier_astronomical_prestige_modifier$ [concept_modifier] to see your #b Astronomical Prestige#!" #Please replace

 concept_verrier_astronomical_prestige: "Astronomical Prestige"
 concept_verrier_astronomical_prestige_desc: "#b Astronomical Prestige#! is the amount of [concept_prestige] you gain from Astronomy. Various factors influence your #b Astronomical Prestige#!:\n- Finding a new Planet will grant you between #V 15#! and #V 100#! Prestige depending on the difficulty to find it.\n- Each discovered [concept_verrier_satellite] will grant you 10 Prestige.\n- A completed [Concept('concept_verrier_moon_photo','$concept_verrier_moon_map$')] will grant you #V 25#! Prestige.\n- A great Comet will grant you 10 Prestige.\n- Every [concept_verrier_meteorite] will grant you #V 1#! Prestige.\n- Every #V 100#! [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] will grant you #V 1#! Prestige."

 concept_verrier_astronomical_object_desc: "#b Astronomical Objects#! are Asteroids and Stars that you discovered. Those Objects can be discovered if you have an [concept_verrier_observatory]. The better your Astronomy Technology is, the more Objects you will find. You will also discover more #b Objects#! if you have an [concept_verrier_astronomer].\nWith enough #b Astronomical Objects#! you will be able to discover new Planets or the Astro Physics Technology." #Please replace

 concept_verrier_moon_map: "Moon Map"
 concept_verrier_moon_photo_desc: "If you have an [concept_verrier_observatory] and researched the Camera Technology, you will be able to order your [concept_verrier_astronomer] to begin photographing the Moon. This will reduce the amount of [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] from your #b Astronomer#! but give you #b Moon Photos#! every year.\nIf you collect enough #b Moon Photos#!, you will create an accurate map of Earth's Companion. Completing the Moon Map will grant your nation some [concept_verrier_astronomical_prestige]" #Please replace

 concept_verrier_satellite: "Satellite"
 concept_verrier_satellites: "Satellites"
 concept_verrier_satellite_desc: "#b Satellites#! or Moons are [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] that are orbiting a planet. Some #b Satellites#! like the Earth's Moon are already discovered, but an [concept_verrier_astronomer] can try to find more of them.\nEach #b Satellite#! discovered by your country will grant it a small amount of [concept_verrier_astronomical_prestige]."

 concept_verrier_meteorite_desc: "Meteorites are relatively small solid bodies of cosmic origin that have passed through the Earth's atmosphere and reached the ground. In rare cases, meteorite fragments can be found after a meteor shower. Meteorites that hit the earth thousands of years ago can also be found by [Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')] in difficult terrain such as deserts and arctic areas. [Concept('concept_mendelejew_chemist','$concept_mendelejew_chemists$')] and [Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')] in particular are interested in meteorites and  might want to analyze them.\n\nAdditionally #b Meteorites#! help to raise your [concept_agassiz_geological_score] and allow for a better estimate of the [concept_agassiz_age_of_earth]." #Please replace

 concept_agassiz_volcano_desc: "#b Volcanoes#! are a new state trait in #r Morgenröte#!. Unlike the base game for Victoria 3, it is not strategic regions but rather states with volcanoes that are tied to whether a volcanic eruption takes place. The volcanic activity is significantly greater, but it is not always destructive. In countries with volcanoes, a #b $building_agassiz_volcano_observatory$#! can be built, which not only helps to predict and mitigate eruptions through observations, but is also the starting point for a volcano expedition. [Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')] can acquire new [concept_agassiz_geological_knowledge], [Concept('concept_agassiz_rare_mineral','$concept_agassiz_rare_minerals$')], experience and the volcanologist trait on a volcano expedition." #Please replace

 concept_agassiz_geological_knowledge: "Geological Knowledge"
 concept_agassiz_geological_knowledge_desc: "#b Geological Knowledge#! includes a nation's general understanding of the nature of the earth. It is a very rare resource that can be acquired primarily in the course of geological milestones. #b Geological Knowledge#! is not the same as the [concept_agassiz_geological_score], but it is the most important component of it and is considered particularly valuable."
 concept_agassiz_geological_score: "Geological Score"
 concept_agassiz_geological_score_desc: "The #b Geological Score#! includes all of a nation's achievements and knowledge that are related to geology. The most important component is [concept_agassiz_geological_knowledge], but there are many other important factors; such as the experience of a [concept_agassiz_geologist], [concept_agassiz_oceanographic_knowledge], the number of [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')], [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] or [Concept('concept_dubois_specimen','$concept_dubois_specimens$')], and geological technologies. The Geological Score is crucial for re-dating the [concept_agassiz_age_of_earth]."
 concept_agassiz_oceanographic_knowledge: "Oceanographic Knowledge"
 concept_agassiz_oceanographic_knowledge_desc: "#b Oceanographic Knowledge#! forms part of [concept_agassiz_geological_knowledge] and corresponds to knowledge about the seas, in particular ocean currents, but also general marine research combined with geophysical considerations. #b Oceanographic Knowledge#! is largely gained on [Concept('concept_dubois_pacific_expedition','$concept_dubois_pacific_expeditions$')]. 50 #b Oceanographic Knowledge#! is necessary to acquire [concept_agassiz_geological_knowledge]."
 concept_agassiz_age_of_earth: "Age of the Earth"
 concept_agassiz_age_of_earth_desc: "One of the big questions of the 19th century was the question of the #b Age of the Earth#!. It had natural history implications, particularly regarding the validity of the theory of evolution and the sequence of geological events. Only a [concept_agassiz_geologist] can determine a new earth age. To do this, his nation must have a higher [concept_agassiz_geological_score] than the nation that last determined an Earth age. He will then share his research results with other colleagues. He doesn't necessarily have to be successful - geologists who are too young and inexperienced will not be heard. However, foreign nations are a little more accommodating when no new theory has been presented for many years. Geologists can only estimate the age of the Earth once in their lives - but this only applies if they are successful. If you fail, you can try again after a phase of motivation."
 concept_agassiz_geology: "Geology"
 concept_agassiz_geology_desc: "#b Geology#! is one of the main features of [concept_morgenroete]. Even before the beginning of the Victorian Age, geology had already experienced a significant boom, which is why it is available to many nations at the start of the game.\n\n[Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')] can be used in a variety of ways: they can find [Concept('concept_dubois_formation','$concept_dubois_formations$')], [Concept('concept_andersson_cave','$concept_andersson_caves$')] and [concept_curie_uranium] deposits during a geological search, go on [concept_agassiz_volcano] expeditions, determine [concept_agassiz_age_of_earth], find new ore and oil deposits or go on [concept_dubois_pacific_expedition] and [concept_douglas_mountaineering] expeditions useful as scientific companions. A [concept_agassiz_geological_score] evaluates the overall knowledge of a nation and is crucial in determining the age of the earth. [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')] and [Concept('concept_agassiz_rare_mineral','$concept_agassiz_rare_minerals$')] are an essential part of geology; The latter can be used to establish a mineral cabinet in the [concept_dubois_zoo]. A special geological facility is the #b $building_agassiz_volcano_observatory$#!, which carries out volcanological and seismic studies."

 ### 2.2.3b ###

 concept_theiler_biologist: "#b #GREEN Biologist#!#!"
 concept_theiler_biologists: "#b #GREEN Biologists#!#!"
 concept_theiler_biologist_desc: "A Biologist is an [concept_academics_academic] who researches all aspects of life.\nIn [concept_morgenroete] the Biologist is mostly responsible for researching [Concept('concept_theiler_microorganism','$concept_theiler_microorganisms$')], improving your Agriculture and finding [Concept('concept_theiler_pathogen','$concept_theiler_pathogens$')] and [Concept('concept_theiler_vaccine','$concept_theiler_vaccines$')].\nBiologists gain [concept_academics_experience] passively or by finishing projects."

 concept_theiler_pathogen: "Pathogen"
 concept_theiler_pathogens: "Pathogens"
 concept_theiler_pathogen_desc: "A Pathogen is the name for something that causes a [concept_panum_disease]. This could be anything from an organism to a [concept_theiler_microorganism]. Often it is a Bacterium, parasite or Virus.\nA Biologist with access to enough Microorganisms can try to find the Pathogen that causes a Disease. This can help tp prevent the disease and to discover and produce a [concept_theiler_vaccine]"

 concept_theiler_vaccine: "Vaccine"
 concept_theiler_vaccines: "Vaccines"
 concept_theiler_vaccine_desc: "The discovery of Vaccines has allowed humans to become immune to [Concept('concept_panum_disease','$concept_panum_diseases$')] without contracting them and can potentially save millions of lives.\nTo create a Vaccine, A [concept_theiler_biologist] must first find the [concept_theiler_pathogen] that causes a Disease. Then the development of a Vaccine can start if enough [Concept('concept_theiler_microorganism','$concept_theiler_microorganisms$')] are available."

 concept_theiler_microorganism: "Microorganism"
 concept_theiler_microorganisms: "Microorganisms"
 concept_theiler_microorganism_desc: "Microorganisms are tiny organisms like bacteria, viruses and single celled organisms.\nThey can be found by a [concept_theiler_biologst] through the $je_theiler_microorganism_research$ [concept_journal_entry] which Biologists conduct when they are not busy.\nMicroorganisms can mainly be used to discover [Concept('concept_theiler_pathogen','$concept_theiler_pathogens$')] and [Concept('concept_theiler_vaccine','$concept_theiler_vaccines$')] which help a country to protect their population from [Concept('concept_panum_disease','$concept_panum_diseases$')]."

 concept_theiler_biology: "Biology"
 concept_theiler_biology_desc: "#n Coming soon to Morgenröte!#!"

 concept_gaudi_architect: "#b #PURPLE Architect#!#!"
 concept_gaudi_architects: "#b #PURPLE Architects#!#!"
 concept_gaudi_architect_desc: "#PURPLE #b Architects#!#! are [Concept('concept_artists_artist','$concept_artists_artists$')] whose skills relate to urban planning, building design and construction. They are special character types that you can gain either from events, from gaining enough [concept_artistic_progress] to create one in your nation or by offering a position to a [concept_gaudi_independent_architect].\nWhile other artists are more likely to accumulate cultural tradition, architects only rarely generate the very valuable [concept_gaudi_architectural_splendour] when they are involved in urban planning or the expansion of the capital—or when they completely redesign the country in a particular architectural style. Their main task is more practical in nature. They work in public construction, thus providing a nation with additional construction points. They improve infrastructure through planning and enhance capital cities into livable places. Architects can also hone their skills on a study tour or write an architectural treatise.\nOf paramount importance is the design of new, unique buildings, for which they create a [concept_gaudi_architectural_blueprint]. A total of 15 of these [concept_gaudi_blueprint_buildings] can be researched—since this takes a long time, it's worth considering which ones make sense.\nArchitects also provide a passive bonus: their mere presence accelerates the construction of [concept_gaudi_monuments] by 100 percent. The greatest achievement of an architect is the design of their own [concept_gaudi_custom_monument]. This is only possible with a [concept_gaudi_great_architect]."

 ### 2.3.0 ###

 concept_panum_physician: "#b #BLUE Physician#!#!"
 concept_panum_physicians: "#b #BLUE Physicians#!#!"
 concept_panum_physician_desc: "#b #BLUE Physicians#!#! are [Concept('concept_academics_academic','$concept_academics_academics$')] who work and research in the field of [concept_panum_medicine]. Their main task is to write [Concept('concept_panum_disease_description','$concept_panum_disease_descriptions$')] and find [Concept('concept_panum_disease_treatment','$concept_panum_disease_treatments$')].They can also improve medical research, improve healthcare, and heal other characters.\nPhysicians gain [concept_academics_experience] during their work and passively every year. They can get better levels of the physician trait by earning enough #b Experience#!."

 concept_panum_medicine: "Medicine"
 concept_panum_medicine_desc: "Medicine is one of the biggest expansions of [concept_morgenroete] for Victoria 3. One of the focuses is on epidemic [Concept('concept_panum_disease','$concept_panum_diseases$')] such as cholera, tuberculosis and typhus, which have plagued humanity for centuries and have finally been brought under control thanks to scientific advances. Epidemic diseases are therefore one of the negative events in [concept_morgenroete]. Containment through the search for a [concept_panum_disease_treatment] is therefore even more important. A central component of medicine is therefore a [concept_panum_physician] who is one of the academics of the anthropological-humanistic university focus. He can describe epidemic diseases and find treatments. A treatment method usually requires a [concept_panum_disease_description] and a technology. A physician can also improve the research of medical technologies or expand healthcare through hospitals, as well as introduce new medical techniques and heal other characters. Medical conferences help to spread medical knowledge internationally. An important step in the modernization of medicine is also the transition from the miasma theory to the [concept_panum_germ_theory]. A nation that is a leader in medical discoveries can also demonstrate high [concept_panum_medical_prestige]."

 concept_panum_disease: "Disease"
 concept_panum_diseases: "Diseases"
 concept_panum_disease_desc: "The term disease usually refers to the epidemic diseases that can affect a nation every few years. A [concept_panum_physician] can counteract them by making [Concept('concept_panum_disease_description','$concept_panum_disease_descriptions$')] and providing [Concept('concept_panum_disease_treatment','$concept_panum_disease_treatments$')] Epidemic diseases usually do not occur at the same time and it takes some time for epidemic diseases to break out again. Depending on the type, epidemic diseases can have a devastating effect and spread across several states. There are various [concept_panum_disease_prevention] methods to delay the onset of such a disease or to mitigate its effects. The triggers for an illness can be very different. Yellow fever only occurs in tropical regions and cholera and tuberculosis require a minimum of urbanization to have an effect. A state's standard of living and level of devestation also play a role.\n\nIn addition to these particularly feared epidemic diseases, there are also everyday diseases that a physician can randomly examine during medical research. Such diseases include rickets, pellagra and syphilis."

 concept_panum_disease_description: "Disease Description"
 concept_panum_disease_descriptions: "Disease Descriptions"
 concept_panum_disease_description_describe: "describe"
 concept_panum_disease_description_described: "described"
 concept_panum_disease_description_desc: "Descriptions are the first step towards understanding a [concept_panum_disease]. They have no impact on the severity of an epidemic, but are fundamental to finding [Concept('concept_panum_disease_treatment','$concept_panum_disease_treatments$')], [Concept('concept_theiler_pathogen','$concept_theiler_pathogens$')] and [Concept('concept_theiler_vaccine','$concept_theiler_vaccines$')]. Disease descriptions have no further requirements: all that is required is an epidemic disease and a [concept_panum_physician]."

 concept_panum_disease_treatment: "Disease Treatment"
 concept_panum_disease_treatments: "Disease Treatments"
 concept_panum_disease_treatment_treat: "treat"
 concept_panum_disease_treatment_treated: "treated"
 concept_panum_disease_treatment_desc: "A [concept_panum_physician], given the right technology and a [concept_panum_disease_description], can find a treatment for a [concept_panum_disease] in a lengthy process. Treatments are not the same as a cure. Rather, the doctor finds out the cause of an illness and develops methods on this basis to prevent or significantly limit an outbreak. Disease treatments limit the length of an epidemic disease to a few months or weeks and also prevent it from spreading to several states. Disease treatments are part of possible [concept_panum_disease_prevention] against epidemic outbreaks."

 concept_panum_disease_prevention: "Disease Prevention"
 concept_panum_disease_prevention_no_disease: "Prevention"
 concept_panum_disease_prevention_desc: "There are several ways to avoid or at least mitigate an epidemic [concept_panum_disease]. The most well-known method is the [concept_panum_disease_treatment] developed by a [concept_panum_physician]. It significantly reduces the time in which a disease rages and also reduces the likelihood that it will spread to another country. Standard of living, hospitals, technologies and a high level of healthcare institutions also have an impact. The ultimate prevention is a [concept_theiler_vaccine] that prevents a disease from occurring in the first place. Vaccines are developed by [Concept('concept_theiler_biologist','$concept_theiler_biologists$')]. However, it is only effective if the health institution has at least reached the level specified in the medical faculty. After all, the distribution of a vaccine has to be organized and supervised."

 concept_panum_disease_type: "Disease Type"
 concept_panum_disease_types: "Disease Types"
 concept_panum_disease_type_desc: "Epidemic [Concept('concept_panum_disease','$concept_panum_diseases$')] can be differentiated according to their degree of distribution. #V Local diseases#!, such as scarlet fever, are limited to the state in which they broke out. #V Regional diseases#!, such as tuberculosis, can spread to some surrounding states, but not beyond. #V Transregional diseases#! - the most notorious of which is cholera - can spread throughout the country, even though states do not have to border each other."
 concept_panum_local_disease: "Local Disease"
 concept_panum_local_diseases: "Local Diseases"
 concept_panum_regional_disease: "Regional Disease"
 concept_panum_regional_diseases: "Regional Diseases"
 concept_panum_transregional_disease: "Transregional Epidemic"
 concept_panum_transregional_diseases: "Transregional Epidemic"

 concept_panum_germ_theory: "Germ Theory"
 concept_panum_germ_theory_desc: "Germ theory is one of the fundamental medical scientific advances of the 19th century. It replaced previous, more archaic theories, such as the miasma theory, which was widespread in Europe and represents all traditional attempts to explain the cause of [Concept('concept_panum_disease','$concept_panum_diseases$')]. The discovery of germ theory not only benefits the first discoverer. When looking for [Concept('concept_panum_disease_treatment','$concept_panum_disease_treatments$')], the chances of success are slightly higher because it prevents some negative events and unlocks more positive events."

 concept_panum_medical_prestige: "Medical Prestige"
 concept_panum_medical_prestige_desc: "Medical Prestige is made up of the [Concept('concept_panum_disease_description','$concept_panum_disease_descriptions$')] (2 points), [Concept('concept_panum_disease_treatment','$concept_panum_disease_treatments$')] (4 points), [Concept('concept_theiler_pathogen','$concept_theiler_pathogens$')] (3 points) and [Concept('concept_theiler_vaccine','$concept_theiler_vaccines$')] (4 points) discovered so far. First discoveries give twice as many points. Further medical prestige can come from curing everyday illnesses, inventing special healing methods, or generally improving the healthcare system via a [concept_panum_physician]."

 ### 2.3.2 ###

 concept_panum_red_cross: "Red Cross"
 concept_panum_red_cross_desc: "The Red Cross is one of the first international organizations and, in rare cases, offers the opportunity to receive Red Cross medics in a war. Red Cross members also receive certain bonuses. Depending on the game rule, the Red Cross can be founded historically or dynamically; Recognized states can join under certain technological requirements. The founder receives the headquarters of the Red Cross in his capital. Members can accede to up to three [Concept('concept_panum_convention','$concept_panum_conventions$')] that are binding under international law."
 concept_panum_convention: "International Convention"
 concept_panum_conventions: "International Conventions"

 ### 2.3.3 ###

 concept_panum_convention_desc: "An international convention is a joint declaration of intent by states to establish certain rules of the game in international traffic. There were several examples of this in the course of the 19th century, such as the Geneva Convention or the Hague Code of Land Warfare. What all conventions have in common is that they attempt to mitigate the horrors of war. Military options are therefore preferred over safe medical care for the wounded and ultimate weapons are banned, which leads to a certain containment of the war. The advantage is greater flexibility. While the adoption of a convention is viewed favorably, the abolition of a convention can lead to international anger.\n\nInternational conventions are usually non-binding declarations of intent. However, if enough members of the [concept_panum_red_cross] sign it, over time it will become valid international law, which all signatories are expected to comply with - and the other members will also sign it. This happens when 65 percent of all members and the majority of the Great Powers agree to this convention - then all other members are then forced to comply with it. This convention can then no longer be abolished as usual. In order to avoid binding conventions, a complete withdrawal from the Red Cross is necessary - with all the consequences." #please replace

 ### 2.3.4 ###

 concept_manzoni_literary_tradition_desc: "#b Literary Tradition#! is a representation of a nation's literary achievements and traditions.\nThere are various ways to gain #b Literary Tradition#!. Having at least one $building_art_academy$, having one or more [Concept('concept_manzoni_local_writer','$concept_manzoni_local_writers$')], a [concept_manzoni_national_writer] and having certain [Concept('concept_artists_center_of_arts','$concept_artists_centers_of_arts$')] will passively add #b Literary Tradition#! to your country.\nThe more #b Literary Tradition#! your nation gains, the higher the prestige bonus you gain. Additionally it will allow you to unlock the [concept_elgar_expressionism] [concept_artists_art_style]." #please replace
 concept_elgar_musical_tradition_desc: "#b Musical Tradition#! is a representation of a nation's musical achievements and traditions.\nThere are various ways to gain #b Musical Tradition#!. If you have at least one [concept_elgar_opera], you will passively get #b Musical Tradition#!. The more #b Operas#! you have the more you get. You can also gain more #b Musical Tradition#! from musical and arts technologies. Each Technology gives a different bonus. You can also get #b Musical Tradition#! from events, especially if you have a [concept_elgar_composer].\nThe more #b Musical Tradition#! your nation gains, the higher the prestige bonus you gain. Additionally it will allow you unlock the [concept_elgar_impressionism] [concept_artists_art_style]." # Please replace
 concept_klimt_painting_tradition_desc: "#b Painting Tradition#! is a representation of a nation's painting achievements and traditions. It can be gained from having #b Arts Academies#!, a [concept_klimt_painter], certain [Concept('concept_technology', '$concept_technologies$')] or from events.\n#b Painting Tradition#! allows you to unlock the [concept_elgar_art_nouveau] [concept_artists_art_style] and is used to calculate your #b Cultural Tradition#!." # Please replace

 ### 2.3.5 ###

 concept_mendelejew_theorized_elements: "Theorized Elements"
 concept_mendelejew_discovered_elements: "Discovered Elements"
 concept_mendelejew_isolated_elements: "Isolated Elements"

 concept_panum_psycho_point: "Psychotherapeutic Point"
 concept_panum_psycho_points: "Psychotherapeutic Points"
 concept_panum_psycho_point_desc: "Psychotherapeutic points are an abstract currency that represent a country's progress in the field of psychiatry and psychology. They are generated monthly from technologies, an insane asylum or a [concept_panum_physician] with #V Psychiatrist#! [concept_character_trait]. Psychotherapeutic points can also be acquired via event. A high number of psychotherapeutic points results in a better chance of healing characters with mental illnesses. Moving up a psychotherapeutic level also gives research bonuses and [concept_academics_progress]. A certain number of psychotherapeutic points is a requirement for most psychological schools."

 ### 2.3.6 ###

 concept_vikelas_mechanic: "Mechanic"
 concept_vikelas_mechanic_desc: "LOREM IPSUM"
 concept_vikelas_mechanical_innovation: "Mechanical Innovation"
 concept_vikelas_race_car: "Race Car"
 concept_vikelas_race_car_desc: "LOREM IPSUM"
 concept_vikelas_race_car_reliability: "Race Car Reliability"
 concept_vikelas_race_car_safety: "Race Car Safety"
 concept_vikelas_race_car_speed: "Race Car Speed"

 ### 2.3.7 ###

 concept_dubois_dinosaur_bone_no_dinosaur: "Bones" #You can use this for plural: [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bone_no_dinosaur$')]
 concept_dubois_dinosaur_bones_no_dinosaur: "Bones" #You can use this for plural: [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones_no_dinosaur$')]

 concept_dubois_paleontological_expedition_desc: "A [concept_dubois_paleontologist] can be dispatched to [Concept('concept_dubois_formation','$concept_dubois_formations$')]. It will take 1 year and depending on the Success of the Expedition, you will get [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] and [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')]. When you finish an Expedition and if you have a free [concept_dubois_paleontological_team] you can set up a [concept_dubois_paleontological_excavation] to passively gain Fossils and Bones from that region.\nThe easiest way to gain access to a formation is to control the associated state. However, access can also be gained peacefully through [Concept('concept_dubois_paleontological_licence','$concept_dubois_paleontological_licences$')]." #please replace

 concept_dubois_paleontological_team: "Paleontological Team"
 concept_dubois_paleontological_teams: "Paleontological Teams"
 concept_dubois_paleontological_team_desc: "Paleontological Teams can be used to set up an [concept_dubois_paleontological_excavation] after finishing a [concept_dubois_paleontological_expedition]. This will allow you to passively get [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] and [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')]."

 concept_dubois_paleontological_excavation: "Paleontological Excavation"
 concept_dubois_paleontological_excavations: "Paleontological Excavations"
 concept_dubois_paleontological_excavation_desc: "You can set up a Paleontological Expedition after finishing a [concept_dubois_paleontological_expedition] if you have a free [concept_dubois_paleontological_team]. A Paleontological Excavation will allow your Team to passively produce [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] and [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')]."

### 2.3.8 ###

 concept_verrier_venus_transit: "Venus Transit"
 concept_verrier_venus_transit_desc: "The transit of Venus refers to the rare occurrence of the moon passing between Earth and Venus. However, it occurred twice in the 19th century: in 1874 and 1882. Since observations of the transit of Venus allow conclusions to be drawn about the size of the solar system and a more precise determination of the size of the astronomical unit (AU), these were major scientific events. Countries located in the [concept_verrier_venus_transit_zone] can observe the event from there; other countries must send expeditions. The success of the observation depends on the experience of the [concept_verrier_astronomer], the availability of an [concept_tesla_engineer], and a bit of luck: sometimes the weather can prevent a good image. The better the observation, the greater the bonus."
 concept_verrier_venus_transit_zone: "Venus Transit Zone"
 concept_verrier_venus_transit_zone_desc: "The Venus Transit Zone refers to the part of the Earth from which a complete (not just partial) transit of Venus can be observed. In 1874, this was particularly true for the East Asia-Pacific region, and in 1882 for almost the entire American continent. A detailed breakdown of the strategic regions is provided below.\n\n#V Venus Transit 1874:#!\nIndonesia, Indochina, Oceania, South China, North China, manchuria, Japan, Central India, Madras, Bengal, Himalayas; also, the State of Indian Ocean Territory.\n\n#V Venus Transit 1882:#!\nBrazil, La Plata, Andes, Gran Columbia, Mexico, Central America, Carribean, The Midwest, Dixie, New England; also, the States of Ontario and Quebec."
 concept_vikelas_coach: "Coach"
 concept_vikelas_coaches: "Coaches"
 concept_vikelas_coach_desc: "Coaches are the national trainers of a country in a specific national sport. National sports include [concept_vikelas_football], baseball, basketball, and cricket. Coaches provide bonuses for the respective team in competitions – whether at International World Championships or at international matches. The latter are played secretly at regular intervals and increase a coach's experience value upon victory. High experience points and positive [Concept('concept_character_trait','$concept_character_traits$')] increase the chance of winning a World Championship. Positive traits are those that particularly motivate players – such as ambitious or charismatic – while demotivating traits reduce the chance of winning a match. These include traits such as ruthless or cruel.\n\n#R NOTE: At the moment only football is integrated.#!"
 concept_vikelas_football: "Football"
 concept_vikelas_football_desc: "Football is a possible national sport. The first football clubs can be established in Europe and South America; this will require a relatively liberal legal system, a strong petty bourgeoisie, or considerable average standard of living. After that, occasional football matches could be played. With the establishment of FIFA, international matches and the World Cup also become possible. The eight best teams automatically qualify for the World Cup. The teams are calculated according to the National Football Team Value (NFTV), which is derived from the parameters of standard of living (fitness of the population), strength of the petty bourgeoisie (club system), literacy (tactics), and tradition (national sport: yes or no?). In matches, not only the NFTV is taken into account, but also the character traits and experience of the [concept_vikelas_coach]."

### 2.4.0 ###

 concept_gaudi_architectural_splendour: "Architectural Splendour" #please replace
 concept_gaudi_architectural_splendour_desc: "Architectural Splendour is a collective term for the spectacular advances in modern architecture, referring primarily to Art Deco, Bauhaus, and Neoclassicism as they emerged in the early 20th century. The value represents the transformation of outdated forms into a future-ready architecture. Art Deco requires reaching a higher threshold to fulfill the dream of an Art Deco city — yet the benefits are greater." #please replace
 concept_elgar_architecture_desc: "Architecture is one of the core concepts of [concept_morgenroete]. It is divided into two major parts.\n\nOn the one hand, [concept_gaudi_monuments] have been completely redesigned: they are no longer built directly, but expanded step by step based on decisions. On the other hand, numerous monuments have been added - some of which must be built, others exist at the start of the game.\n\nThe other key point is the introduction of the [concept_gaudi_architect], who can upgrade cities and design up to 15 new unique buildings by researching [Concept('concept_gaudi_architectural_blueprint','$concept_gaudi_architectural_blueprints$')]. Architects can also rebuild a country in the Bauhaus, Neoclassical, and Art Deco styles. A [concept_gaudi_great_architect] can even design their own [concept_gaudi_custom_monument]!" #Please replace

 concept_douglas_mountaineering: "Mountaineering"
 concept_douglas_mountaineering_desc: "Countries that own at least one [concept_douglas_mountain_summit] or have a #b Mountaineering License#! with a country that has one can participate in mountaineering. To start a #b Mountain Expedition#! you need both the #b Prospecting#! and #b Nationalism#! technologies as well as a general that has either the #b Mountaineer#!, #b Explorer#!, #b Mountain Commander#! or #b Surveyor#! Trait.\nAs soon as you start a #b Mountain Expedition#! you will have to first choose which general will be the main Mountaineer. Then you will choose the summit to climb.\nThe higher the mountains, the more dangerous is the ascent. The Mountains are classified according to their height in meters ranging from under 4000 meters upt to over 8000 meters. Success depends on researched military technologies, the age and health of the leader, and their characteristics. Avalanches and steep slopes can pose a major risk that threatens the entire endeavor.\nYou can even send an additional [Concept('concept_academics_academic','$concept_academics_scientist$')] on the trip. Either a [concept_dubois_naturalist] or a [concept_dubois_paleontologist] will help discover more about the mountain you climbed on.\nIn the end you will get a prestige bonus and your general will develop better traits that will help them in combat as well for mountaineering." #Please replace

 concept_gaudi_great_architect: "#PURPLE #b Great Architect#!#!"
 concept_gaudi_great_architects: "#PURPLE #b Great Architects#!#!" #You can use this for plural: [Concept('concept_gaudi_great_architect','$concept_gaudi_great_architects$')]
 concept_gaudi_great_architect_desc: "#b Great Architects#! are [Concept('concept_gaudi_architect','$concept_gaudi_architects$')] that are considered to be the most important minds in their field. #b Architects#! reaching 500 [concept_artists_experience] will become #b Great Architects#!. Should an artist achieve this special rank, he or she can design the blueprint for a truly outstanding [concept_gaudi_custom_monument] that embodies the spirit of the nation."

 concept_gaudi_monuments: "Monuments in #R Morgenröte#!"
 concept_gaudi_monuments_desc: "Many Nations received new #b Monuments#! in [concept_morgenroete]: the #b Cologne Cathedral#! in Germany, the #b Gotthardbahn#! in Switzerland, the #b Cristo Redentor#! in Brazil, the #b Mole Antonelliana#! in Italy, the #b Summer Palace#! in China, the #b Sagrada Família#! in Spain, the #b Schloss Neuschwanstein#! in Bavaria, the #b Palacio de Bellas Artes#! in Mexico and the #b Gyeongbokgung Palace#! in Korea.\nAll Buildings except for the #b Summer Palace#!, and the #b Campanile#! need to be constructed by their owner, the #b Saxon Palace#! can be reactivated by a Polish nation. There are also new monuments at game start like the #b Buddhas of Bamiyan#! or the #b Potala Palace#!\nThere is also the possibility to have a [concept_gaudi_custom_monument] designed by a [concept_gaudi_great_architect].\n\nUnlike in the vanilla game, #b Monuments#! are not built directly, but rather through a decision. Construction takes place in several stages, depending on the size of the building, and can take years or even decades - and is significantly more expensive."

 concept_athletes_athlete: "Athlete"
 concept_athletes_athletes: "Athletes" #You can use this for plural: [Concept('concept_athletes_athlete','$concept_athletes_athletes$')]
 concept_athletes_athlete_desc: "In [concept_morgenroete] #b Athletes#! are special characters that allow you to use certain mechanics of the mod.#b Athletes#! are usually created through events or via a button. Like other characters, #b Athletes#! possess experiences that guarantee greater success in their field.\nCurrently these #b Athletess#! exist:\n - [concept_curtiss_balloonist]\n - [concept_curtiss_pilot]\n - [concept_vikelas_olympian]\n - [concept_douglas_mountaineer]\n - [concept_vikelas_coach]\n - [concept_vikelas_racer]"

 concept_gaudi_independent_architect: "Independent Architect"
 concept_gaudi_independent_architects: "Independent Architects" #You can use this for plural: [Concept('concept_gaudi_independent_architect','$concept_gaudi_independent_architects$')]
 concept_gaudi_independent_architect_desc: "[Concept('concept_gaudi_architect','$concept_gaudi_architects$')] that are not hired by a country are #b Independent Architects#!.\nUnlike many other artists, there are few requirements to recruit an #b Independent Architect#!, except for a minimal technological recquirement. They are true globetrotters and usually only demand good payment."

 concept_gaudi_architectural_blueprint: "Architectural Blueprint"
 concept_gaudi_architectural_blueprints: "Architectural Blueprints" #You can use this for plural [Concept('concept_gaudi_architectural_blueprint','$concept_gaudi_architectural_blueprints$')]
 concept_gaudi_blueprint_buildings: "Blueprint Buildings"

 concept_gaudi_custom_monument: "Custom Monument"
 concept_gaudi_custom_monument_desc: "A custom monument is an [concept_gaudi_architect]'s greatest possible masterpiece. It can compete with other, ordinary monuments. Only a [concept_gaudi_great_architect] can draw up such plans. It requires research into the most modern architectural technologies. The type of monument an architect designs depends largely on their architectural style. Art Deco architects design the [GetBuildingType('building_gaudi_people_monument').GetName], Bauhaus architects the [GetBuildingType('building_gaudi_people_forum').GetName], and Neoclassical architects the [GetBuildingType('building_gaudi_people_palace').GetName]."

 concept_douglas_mountaineer: "Mountaineer"
 concept_douglas_mountaineers: "Mountaineers"
 concept_douglas_mountaineer_desc: "#b Mountaineers#! are [Concept('concept_athletes_athlete','$concept_athletes_athletes$')] who can climb unconquered [concept_douglas_mountain_summit]. They can be recruited against [concept_douglas_alpine_heritage] after the establishment of a mountaineering club. Countries with geographical features such as mountains, peaks, or volcanoes therefore have an advantage in recruitment. Mountaineering traits and experience are the most important factors for progress in conquering a mountain or overcoming a dangerous situation.#!"

 concept_vikelas_olympian: "Olympian"
 concept_vikelas_olympian_desc: "#n This entry is being revised.#!"

 concept_douglas_mountain_summit: "Mountain Summit"
 concept_douglas_mountain_summits: "Mountain Summits" #You can use this for plural [Concept('concept_douglas_mountain_summit','$concept_douglas_mountain_summits$')]
 concept_douglas_mountain_summit_desc: "Mountain Summits are the coveted goal of all mountaineers. They mark the highest point of a mountain. Each summit has three distinct attributes that define how difficult it is to reach successfully.\n\n#V Height#!: Height determines how many steps are required to climb a mountain—this reflects the overall length of an expedition. For every 1,000 meters, one progress step is needed. The value is rounded up, meaning that the 4,421-meter-high Mount Whitney requires 5 steps, while the 7,134-meter-high Kauffmann Peak demands 8. A mountain's prestige is calculated based on its height: the total height is divided by 300. Thus, an ideal mountain of 4,500 meters grants 15 prestige.\n\n#V Level#!: A mountain's level represents the equipment demands necessary to climb it. This is not strictly tied to its height. For example, despite its 5,636 meters, Citlaltépetl is only Level 1 and requires just basic equipment. In contrast, the Matterhorn, at only 4,478 meters, is considered significantly more demanding at Level 3, requiring at least first aid preparation for Alpine emergencies.\n\n#V Risk#!: A mountain's risk level indicates the likelihood of negative events affecting an expedition. It is independent of both height and level. Avalanches, fog, and severe weather are key concerns. Popocatépetl could be ascended already in early modern times due to its hospitable surroundings. In contrast, the much smaller Großvenediger, at just 3,666 meters, still posed a serious threat to Austrian expeditions well into the early 19th century.\n\nMore information about individual summits can be found under the [concept_douglas_mountain_summit_list] section."
 concept_douglas_mountain_range: "Mountain Range"
 concept_douglas_mountain_ranges: "Mountain Ranges" #You can use this for plural [Concept('concept_douglas_mountain_range','$concept_douglas_mountain_ranges$')]
 concept_douglas_mountain_range_desc: "A mountain range is defined as a mountain formation that offers potential for [concept_douglas_mountaineering] training over long distances. Classic mountain ranges include the Rocky Mountains, the Andes, the Alps, and the Caucasus. Unlike the [Concept('concept_douglas_mountain_summit','$concept_douglas_mountain_summits$')] that are to be conquered, there are also plenty of less challenging mountains where there is no risk of a [concept_douglas_mountaineer] experiencing a fatal fall. Rather, they should be viewed as a training route. Countries with mountain ranges are more likely to produce mountaineers than those without this geographical feature."
 concept_douglas_alpine_heritage: "Alpine Heritage"
 concept_douglas_alpine_heritage_desc: "Alpine Heritage is a collective term for a connection with the mountains and a specialization in climbing mountains. It also refers to the potential to recruit new [Concept('concept_douglas_mountaineer','$concept_douglas_mountaineers$')]—since, in most cases, experienced mountaineers come from mountainous areas. This always gives countries with [Concept('concept_douglas_mountain_range','$concept_douglas_mountain_ranges$')] or [Concept('concept_douglas_mountain_summit','$concept_douglas_mountain_summits$')] an advantage. Recruiting a new mountaineer, as well as various other actions, costs Alpine Heritage."

 concept_douglas_mountain_summit_list: "List of Mountain Summits"
 concept_douglas_mountain_summit_list_desc: "There are many [Concept('concept_douglas_mountain_summit','$concept_douglas_mountain_summits$')] that can be climbed.\n\n#V North America:#!\n#b Mount McKinley#! (Alaska), Height 6190 meters, Level 4\n#b Mount Logan#! (Yukon Territory), Height 5959 meters, Level 4\n#b Citlaltépetl#! (México), Height 5636 meters, Level 1\n#b Mount Whitney#! (California), Height 4421 meters, Level 1\n\n#V South America:#!\n#b Aconcagua#! (Mendoza), Height 6267 meters, Level 3\n#b Huascarán#! (Lima Territory), Height 6768 meters, Level 5\n#b Illimani#! (La Paz), Height 6438 meters, Level 4\n#b Chimborazo#! (Ecuador), Height 6267 meters, Level 1\n\n#V Europe:#!\n#b Shkara#! (Greater Caucasus), Height 5642 meters, Level 4\n#b Dufourspitze#! (West Switzerland), Height 4634 meters, Level 2\n#b Matterhorn#! (West Switzerland), Height 4478 meters, Level 3\n#b Aiguille Verte#! (Savoy), Height 4122 meters, Level 3\n#b Pico de Aneto#! (Aragon), Height 3404 meters, Level 1\n\n#V Africa:#!\n#b Kibo#! (Tanganyika), Height 5895 meters, Level 2\n#b Mount Kenya#! (Kenya), Height 5199 meters, Level 3\n#b Mount Stanley#! (Uganda), Height 5109 meters, Level 3\n#b Mount Cameroon#! (South Cameroon), 4095 meters, Level 1\n\n#V Asia:#!\n#b Kamet#! (Delhi), Height 7756 meters, Level\n#b Chogolisa#! (Kashmir), Height 7665 meters, Level 5\n#b Kabru#! (Himalayas), Height 7412 meters, Level 5\n#b Kaufmann Peak#! (Tajikistan), Height 7134 meters, Level 4\n\n#V Australia & Oceania:#!\n#b Mount Wilhelm#! (Eastern New Guinea), Height 4121 meters, Level 2\n#b Mount Cook#! (South Island), Height 3724 meters, Level 2"

 concept_gaudi_blueprint_buildings_desc: "Blueprint buildings are buildings which need a bluprint researched by [Concept('concept_gaudi_architect','$concept_gaudi_architects$')]. These buildings can only be built once in a nation. There are 15 different buildings:\n\n#b Monument#!\n- [GetBuildingType('building_gaudi_statue').GetName]\n- [GetBuildingType('building_gaudi_fountain').GetName]\n- [GetBuildingType('building_gaudi_arch').GetName]\n\n#b Public Square#!\n- [GetBuildingType('building_gaudi_park').GetName]\n- [GetBuildingType('building_gaudi_luna').GetName]\n- [GetBuildingType('building_gaudi_parade').GetName]\n\n#b Service Buildings#!\n- [GetBuildingType('building_gaudi_almshouse').GetName]\n- [GetBuildingType('building_gaudi_school').GetName]\n- [GetBuildingType('building_gaudi_prison').GetName]\n\n#b Health Institutions#!\n- [GetBuildingType('building_gaudi_canalization').GetName]\n- [GetBuildingType('building_gaudi_hospital').GetName]\n- [GetBuildingType('building_gaudi_health').GetName]\n\n#b National Academies#!\n- [GetBuildingType('building_gaudi_science').GetName]\n- [GetBuildingType('building_gaudi_arts').GetName]\n- [GetBuildingType('building_gaudi_sports').GetName]" #please replace
 concept_gaudi_architectural_blueprint_desc: "Architectural blueprints can be researched by [Concept('concept_gaudi_architect','$concept_gaudi_architects$')]. They are essential for the construction of special [concept_gaudi_blueprint_buildings] that can only be erected once in a nation. There are a total of 15 different buildings in five different categories. Certain blueprints require technologies to be researched. Since research can sometimes take years, it's wise to decide beforehand which blueprints are most important. The buildings can potentially be constructed in any state, but require a certain level of urbanization. In some cases, there may be additional requirements." #please replace

