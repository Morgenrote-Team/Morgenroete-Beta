 concept_lepsius_minor_excavation_site: "Minor Excavation Site"
 concept_lepsius_minor_excavation_sitse: "Minor Excavation Sites"
 concept_lepsius_minor_excavation_site_desc: "Besides the large [Concept('concept_lepsius_excavation_site', '$concept_lepsius_excavation_sites$')], which are potentially usable by all countries internationally via licenses and offer Egyptian, Mesopotamian, Aegean, and pre-Columbian [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')], there are also 'smaller' excavation sites. These are only usable by the owner and contain only local artifacts. They are unlocked via a Journal Entry, which usually requires an [concept_lepsius_archaeologist] and special technology. Only then is the excavation site actually activated, visible through a State Trait in the State Region. After activation, Minor Excavation Sites generate an additional Local Artifact as long as the archaeologist is conducting an archaeological project. Examples of such excavation sites are Pompeii, Tikal, or Harappa."