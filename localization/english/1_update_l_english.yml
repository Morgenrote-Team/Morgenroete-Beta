 je_gaudi_mechanical_computer_project_reason: "#T Your [concept_gaudi_mechanical_engineer][GetPlayer.MakeScope.GetCountry.GetCustom('gaudi_dr_engineer_type')] focuses on inventing a $verrier_mechanical_computer_tech$.#!\n$mr_divider_for_je$\nEach month you will gain progress depending on many different factors. Once the progress reaches 2000, you will gain [GetTechnology('verrier_mechanical_computer_tech').GetName] that gives you access to #V $pm_verrier_mechanical_computer$#! [concept_production_method].\n$mr_divider_for_je$\n#V Current Monthly Progress:#! [GetPlayer.MakeScope.Var('gaudi_mechanical_computer_monthly_progress_var').GetValue|+2]\n\n#V Factors influencing your monthly mechanical engineering progress:#![GetPlayer.GetCustom('gaudi_base_engineering_progress_tt_type')][GetPlayer.GetCustom('gaudi_mechanical_engineering_progress_has_mechanical_engineer_tt_type')][GetPlayer.GetCustom('gaudi_mechanical_engineering_progress_experience_tt_type')][GetPlayer.GetCustom('gaudi_mechanical_engineering_mechanical_engineer_trait_tt_type')][GetPlayer.GetCustom('gaudi_mechanical_computer_progress_mathematician_trait_tt_type')][GetPlayer.GetCustom('gaudi_mechanical_computer_progress_innovative_trait_tt_type')][GetPlayer.GetCustom('gaudi_mechanical_computer_progress_physicist_trait_tt_type')][GetPlayer.GetCustom('gaudi_mechanical_engineering_progress_meticulous_trait_tt_type')][GetPlayer.GetCustom('gaudi_mechanical_engineering_progress_persistent_trait_tt_type')][GetPlayer.GetCustom('gaudi_mechanical_computer_progress_bad_trait_trait_tt_type')][GetPlayer.GetCustom('gaudi_mechanical_computer_progress_senile_trait_trait_tt_type')][GetPlayer.GetCustom('academics_mathematical_university_multiplier_tiny_tt_type')][GetPlayer.GetCustom('gaudi_mechanical_computer_progress_tooling_workshop_levels_trait_trait_tt_type')]" #please replace

