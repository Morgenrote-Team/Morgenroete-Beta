 vikelas_autoracing_found_automobile_club_button: "Found Automobile Club"
 vikelas_autoracing_found_automobile_club_button_desc: "Establishing an automobile club is the first step in building other facilities that are essential for motorsports."
 vikelas_autoracing_long_distance_button: "Organize an Endurance Race"
 vikelas_autoracing_long_distance_button_desc: "Endurance racing, often city-to-city, was the norm in the early days of automobile racing and continued into the mid-20th century. In Italy, races like the Targa Florio or the Mille Miglia are the best-known examples. They put man and machine to a special test and were for a long time considered the real national car races."
 vikelas_autoracing_found_grand_prix_button: "Found Grand Prix Racing"
 vikelas_autoracing_found_grand_prix_button_desc: "In 1906, the first official Grand Prix in automotive history was organized with the race for the Grand Prix de l'ACF. Regardless of the country of origin, up to three racing cars per automobile manufacturer were approved, as originally requested by the representatives of the French industry. In keeping with its status as the most important of all competitions, the race was held over a distance of over 1200 km and on two consecutive days. In 1925, at the instigation of the Automobile Club of Italy, the introduction of an official world championship was finally announced. The three official Grand Prix races of the season (France, Italy and Belgium) were designated as races, as well as Indianapolis as the most important American racing event."
 vikelas_autoracing_race_track_button: "Build a Race Track"
 vikelas_autoracing_race_track_button_desc: "With the Grand Prix races, the fixed race track is increasingly becoming the norm for car racing. A dedicated race track would not only centralize international racing events in one location, but as a test track it would also give our racing drivers an experience bonus every year."

 vikelas.531.t: "Long Distance Race"
 vikelas.531.d: ""
 vikelas.531.f: "The first car races at the beginning of the 20th century were distance races with the greatest possible range. They should test the speed and reliability of the racing cars. While France dominated racing in the early stages, like in Great Britain they soon moved on to Grand Prix racing. That didn't change the fact that there were still important international long-distance races. The most traditional race was the Targa Florio in Sicily. From 1906 to 1977 it was held mostly in May as an important international event, some with World Cup status. After the Targa Florio, the Thousand Miles (Mille Miglia) was considered a classic among long-distance road races (the Carrera Panamericana was added in the 1950s) and the basis for the term 'Gran Turismo' (GT), which describes fast touring sports cars for long-distance racing, such as those developed by Ferrari specifically for the MM."
 vikelas.531.g: "See you at the finish line!"
