 agassiz.103.f: "'I may conclude this chapter by quoting a saying of Professor Agassiz, that whenever a new and startling fact is brought to light in science, people first say, 'it is not true,' then that 'it is contrary to religion,' and lastly, 'that everybody knew it before.' -Charles Lyell"
 agassiz.103.g: "That used to be useful foreign aid."
 agassiz.104.t: "Uranium Team leaves"
 agassiz.104.d: "After the uranium team finishes their work, the research assistants return to their home country. The uranium deposits they find can also be exploited by our companies."

