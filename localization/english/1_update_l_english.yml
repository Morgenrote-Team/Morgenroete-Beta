 panum_physician_achievement_aspirin_inventor_loc: "\nDr. [GetPlayer.MakeScope.Var('mendelejew_chemist_var').GetCharacter.GetLastName] is considered the key inventor of #o Aspirin#! and has not only provided pain relief to countless patients, but also revolutionized the pharmaceutical industry."
 panum_physician_achievement_xray_inventor_loc: "\nWith the discovery of #o X-rays#!, Dr. [GetPlayer.MakeScope.Var('curie_physicist_var').GetCharacter.GetLastName] is considered one of the leading international physicists who revolutionized medicine and physics in equal measure."
 panum_physician_achievement_bloodtypes_inventor_loc: "\nWith the discovery of different #o Blood Groups, namely A, B, AB and 0#!, Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] has played a significant role in ensuring that we understand more about blood as such - and that blood transfusions are more successful."
 panum_physician_achievement_ecg_inventor_loc: "\nThe #o ECG#!, invented by Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName], made it possible to measure the electrical activity of the heart and represents a milestone in hospital operations."
 panum_physician_achievement_transplantation_inventor_loc: "\nWith the #o First Transplantation#!, Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] earned a place in medical history."
 panum_physician_achievement_stereotactic_method_inventor_loc: "\nTo this day, the #o Stereotactic Method#! [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetSheHe] invented is considered groundbreaking in brain surgery."
 panum_physician_achievement_cardiopulmonary_bypass_inventor_loc: "\nWith the development of a #o Cardiopulmonary Bypass#!, Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] has achieved a masterpiece of modern medicine."
 panum_physician_achievement_endoscope_inventor_loc: "\n[GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetHerHis|U] invention of the #o Endoscope#!, with which the human interior could be examined for the first time, is also particularly remembered."
 panum_physician_achievement_ophthalmoscope_inventor_loc: "\nDr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] invented an apparatus that makes it easier to examine eye diseases and thus rendered an invaluable service to ophthalmology: #o The Ophthalmoscope#!."
 panum_physician_achievement_chemotherapy_inventor_loc: "\nThe #o Chemotherapy#! [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetSheHe] developed to treat even the most stubborn illnesses with a variety of medications gives even cancer patients hope that not everything is in vain."
 panum_physician_achievement_iron_lung_inventor_loc: "\n[GetPlayer.MakeScope.Var('gaudi_engineer_var').GetCharacter.GetHerHis|U] #o Construction of the First Iron Lung#! to sustain the lives of polio patients in critical need is considered one of the most fascinating engineering achievements of this age."
 panum_physician_achievement_military_medicine_project_finished_loc: "\nDr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] has #o invented the latest methods in the field of field medicine#!, making the military medical services one of the most recognized in the world."
 panum_physician_achievement_inaugurated_asylum_loc: "\nDr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] played a crucial role in founding the country's #o First Mental Asylum#! in order to provide comprehensive and humane help to the mentally ill."

### MR Concepts ###
 concept_panum_psycho_point: "Psychotherapeutic Point"
 concept_panum_psycho_points: "Psychotherapeutic Points"
 concept_panum_psycho_point_desc: "Psychotherapeutic points are an abstract currency that represent a country's progress in the field of psychiatry and psychology. They are generated monthly from technologies, an insane asylum or a [concept_panum_physician] with #V Psychiatrist#! [concept_character_trait]. Psychotherapeutic points can also be acquired via event. A high number of psychotherapeutic points results in a better chance of healing characters with mental illnesses. Moving up a psychotherapeutic level also gives research bonuses and [concept_academics_progress]. A certain number of psychotherapeutic points is a requirement for most psychological schools."

