 panum.2600.t: "A New Asylum"
 panum.2600.d: "Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] celebrated the inauguration of the new mental asylum with a speech today."
 panum.2600.f: "Numerous prominent personalities were also present at the inauguration, including opposition politicians. While the doctor pointed out the new methods and a whole series of clear symptoms that led to admission to the clinic, skeptical government opponents suspected that such an institution could also be suitable for abuse."
 panum.2600.g: "Finally the right place for politicians, journalists, actors..."

 panum.2601.t: "An urgent Psychiatric Admission"
 panum.2601.d: "Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] has prepared a report showing that [SCOPE.sCharacter('chosen_character').GetFullName] requires urgent mental health care. Sadly, [SCOPE.sCharacter('chosen_character').GetLastName] will spend many years in the mental asylum. Possibly... very many years."
 panum.2601.f: "'As some day it may happen that a victim must be found\nI've got a little list — I've got a little list\nOf society offenders who might well be underground\nAnd who never would be missed — who never would be missed!\nThere's the pestilential nuisances who write for autographs\nAll people who have flabby hands and irritating laughs\nAll children who are up in dates, and floor you with 'em flat\nAll persons who in shaking hands, shake hands with you like that\nAnd all third persons who on spoiling tête-á-têtes insist\nThey'd none of 'em be missed — they'd none of 'em be missed!'"
 panum.2601.g: "[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U]'s got 'em on the list — And they'll none of 'em be missed!"
 panum.2601.tt: "[SCOPE.sCharacter('chosen_character').GetFullName] disappears forever into the tracts of the mental asylum..."

 panum_physician_recent_asylum_conducted_modifier: "Recent Admission to the Mental Asylum"

### GUI ###

 MR_FOUND_ASYLUM_BUTTON: "Found a Mental Asylum"
 MR_FOUND_ASYLUM_BUTTON_TT: "#T Found a Mental Asylum#!\nThe separation of convicts in a prison and mentally disturbed people in a separate institution was a first step towards modern psychiatry. A specialized mental asylum will help keep those who need help in a better place.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_HAS_PSYCHIATRIST_TRIGGER: "#default_text [GetPlayer.GetName] has a [concept_panum_physician] with the #V Psychiatrist Trait#!.#!"
 MR_HAS_CLINIC_OR_HOSPITAL_TRIGGER_TT: "#default_text [GetPlayer.GetName] has at least one [GetBuildingType('building_government_administration').GetName] with #V Specialist Clinic#! or #V Hospital Production Method#! in an integrated state.#!"
 MR_MR_SEND_CHARACTER_TO_ASYLUM: "Commit someone to the Mental Asylum"
 MR_MR_SEND_CHARACTER_TO_ASYLUM_TT: "#T Commit someone to the Mental Asylum#!\nThere are numerous politicians, agitators and even rulers who are basically no longer suitable for their tasks due to psychological disorders, addictions or dementia. A psychiatrist can declare these people to be non compos mentis - even if he has not examined them at all. However, the political abuse of psychiatry can be seen through by the people and the opposition and can have consequences...\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_HAS_MENTAL_ASYLUM_TRIGGER_TT: "#default_text [GetPlayer.GetName] has a [GetBuildingType('building_panum_asylum').GetName].#!"
 MR_CAN_ANY_CHARACTER_BE_SEND_TO_ASYLUM_TRIGGER_TT: "#default_text Any [GetPlayer.GetAdjective] [concept_character] has a condition [concept_character_trait] that is considered an addiction or mental disease.#!"
 MR_NO_RECENT_PANDEMIC_POLICY_CHANGE_TRIGGER_TT: "#default_text [GetPlayer.GetName] has #R not#! changed the Pandemic Policy in the #V last six months#!.#!"

 MR_PANDEMIC_POLICY_BUTTON: "Pandemic Policy"
 MR_PANDEMIC_POLICY_BUTTON_TT: "#T Pandemic Policy#!\nA pandemic outbreak may present advanced nations with the choice of imposing restrictive measures in the hope of saving lives. Success is not always guaranteed.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
