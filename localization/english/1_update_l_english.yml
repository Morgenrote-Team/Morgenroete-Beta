 MR_RECRUIT_PHYSICIAN_BUTTON: "Recruit Physician"
 MR_RECRUIT_PHYSICIAN_BUTTON_TT: "#T Recruit Physician#!\nOwning a large general hospital provides a unique opportunity to immediately recruit physicians from the practice service. In addition, a doctor can be selected based on their specialty. This enables significantly more targeted medical research.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
