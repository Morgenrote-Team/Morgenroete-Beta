 je_dubois_paleontological_expedition: "[ROOT.GetCountry.GetCustom('dubois_paleontological_expedition_je_location_type')]Paleontological Expedition" #please replace
 je_dubois_paleontological_expedition_reason: "The Paleontologist is conducting a [concept_dubois_paleontological_expedition].\n$mr_divider_for_je$\nFinishing the Expedition will take 12 months. Once finished you will gain [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] and [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] depending on the #V Success#! value of the Expedition.\n$mr_divider_for_je$\nEach month a small amount of #V Success Chance#! is added. Additionally random events can add or subtract Success.\n\nCurrent estimated monthly Success change: #underline #tooltip:[GetRawTextTooltipTag('je_dubois_paleontological_expedition_monthly_progress_tt')] [Country.MakeScope.Var('dubois_paleontological_expedition_estimated_progress_var').GetValue|2+] #!#!\n$mr_divider_for_je$\nYou will be able to set up a [concept_dubois_paleontological_excavation] if you have a free [concept_dubois_paleontological_team]. An Excavation will passively produce more Fossils and Bones.\n$mr_divider_for_je$\nCurrent #tooltip:[GetRawTextTooltipTag('je_dubois_paleontological_expedition_yield_tt')] #underline #b estimated yield#!#!#! from the Expedition:\n[GetPlayer.GetCustom('je_dubois_paleontological_expedition_yield_type')]" #please replace
 je_dubois_paleontological_expedition_yield_tt: "You gain more fossils and bones depending on your #V Success Chance#!:\n0 - 3:     $je_dubois_paleontological_expedition_yield_level_1_loc$\n4 - 7:     $je_dubois_paleontological_expedition_yield_level_2_loc$\n8 - 11:   $je_dubois_paleontological_expedition_yield_level_3_loc$\n12 - 14: #p 4#! @dubois_fossil!  [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] and #p 1#! @dubois_dinosaur_bone#! [concept_dubois_dinosaur_bone]\n15:         #p 5#! @dubois_fossil!  [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] and #p 2#! @dubois_dinosaur_bone#! [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')]\n"

