 panum.2111.t: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting]'s Anatomy"
 panum.2111.d: "In [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] battle with local authorities to expand medical care, Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] has discovered how poorly the training of young surgeons is going. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] therefore wrote a standard work to curb this grievance."
 panum.2111.f: "Henry Gray's Anatomy of the Human Body, usually just called Gray's Anatomy, is a book about human anatomy. It is considered a classic of the subject, especially in English-speaking countries. The first edition appeared in 1858 in Great Britain and a year later in the USA under the name Gray's Anatomy: Descriptive and Surgical."
 panum.2111.g: "Every student should read this book during their training."
 panum.2111.h: "Practical application is more important than teaching."
 panum.2112.t: "Diagram of Causes of Mortality"
 panum.2112.d: "When visiting military hospitals, Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] noticed how little statistical material was used to educate young doctors about the danger of infectious diseases on the battlefield. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] has therefore created a large number of meaningful diagrams."
 panum.2112.f: "Due to an illness she had contracted during the Crimean War, Florence Nightingale was unable to see for herself what the situation would be like in a barracks, hospital or poorhouse. She therefore concentrated on collecting data, preparing and analyzing it, and then drawing conclusions from it. Questionnaires were an important tool for her work, and she also used existing data. Among other things, it demonstrated serious problems with military health care. In her report to the British government, Nightingale found clear words for this. If 11 out of 1,000 civilians died every year, but 17, 19 and 20 out of 1,000 soldiers of the line infantry, artillery and guards stationed in England died, then that would be just as criminal as leading 1,100 men every year onto Salisbury Plain and shooting them there. Florence Nightingale is considered one of the pioneers of graphical data preparation of such data."
 panum.2112.g: "These statistics should be studied carefully by medics on the battlefield."
 panum.2112.h: "Practical application is more important than teaching."
 panum.2113.t: "Omnis cellula e cellula"
 panum.2113.d: "Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] has expanded the previously known cell theory to include the principle that every cell arises from another cell, and that diseases therefore also arise from sick cells. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] described this thesis in detail in his work on cellular pathology, which is used as a manual in new clinics and hospitals."
 panum.2113.f: "Cellular pathology is a disease theory according to which diseases are based on disorders of the body's cells or their functions. It was developed in the 1850s by Rudolf Virchow, who also coined the term 'cellular pathology' in 1855. His work of the same name became a standard work. As a disease concept based on cell theory, it replaced the humoral pathology that had previously been in effect since ancient times and is therefore responsible for a comprehensive revolution in the idea of the development of disease and illness in general. Together with experimental pharmacology, physiology and microbiology, it forms a unified basis for clinical medicine and a foundation of scientifically based medicine."
 panum.2113.g: "Knowledge about diseased cells should be standard at universities."
 panum.2113.h: "This is an extremely important insight."
 panum.2114.t: "Born Criminal"
 panum.2114.d: "Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] has studied the psyche of criminals and human genetics intensively and has discovered that criminal elements can be identified based on their physiognomy. [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis|U] numerous contacts with sick patients, lunatics and lazy officials during his attempts to reform the medical system have inspired [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] throughout."
 panum.2114.f: "Inspired by the theory of evolution, Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] carried out studies of hundreds of people in penitentiaries and mental asylums and discovered that an atavistic type is widespread among criminals. Certain forms of crime can therefore be seen in facial types and skull shapes. The criminal does not become a criminal of his own free will, but because of his genetic predisposition he has a problem that he 'can't help'. The criminal represents a separate anthropological type, the homo deliquens. He is an evolutionary backward, earlier and more primitive type of person who comes across as immoral and instinct-driven."
 panum.2114.g: "So you are criminal from birth."

 panum.2121.t: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'s Love of Skulls"
 panum.2121.d: "Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] continued his thesis of anthropological criminology and therefore measured thousands of skulls across the country. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] even keeps some at home."
 panum.2121.f: "'Criminology is a serious natural science that has been steeped in philosophy for far too long. My revolution is to equip it with the same empiricism as every modern science of this century. Biology and mathematics are incorruptible subjects, and psychiatry and criminology can learn from them. If you measure and compare every single skull - and I have done this with thousands of criminals, lunatics and executed people - then you can collect statistical data that shows the same statistical result again and again. From this, almost perfect values can be derived to deduce the asymmetry of the criminal's face. These precise measurements are much safer than completely groundless assumptions about the human mind: here we have numbers, facts, in short empirical studies, there bottomless chatter.'\n\nFrom 'The Criminal Man' by [ROOT.Var('panum_physician_var').GetCharacter.GetFullName]"
 panum.2121.g: "A... lovely hobby."
 panum.2122.t: "Biological Determinism" 
 panum.2122.d: "After further months of his studies, Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] deepened his previous theses on the 'born criminal' and published further shocking findings."
 panum.2122.f: "'The criminal is a degenerate. While man evolves, the criminal represents a regression, a form of human apostasy. He is the 'modern savage', he allows us to look back at Stone Age man, who was less subtle, less sensitive to pain and less empathetic. The criminal does not notice the suffering of the other person, just as he has only a limited capacity for compassion. Since the criminal acts out of a criminal disposition, it can be assumed that this criminal disposition is inherited. One could therefore assume that if people do not commit their acts of their own free will, but rather out of biological determination, that this should be a mitigating factor in the punishment. But the opposite is the case, because the criminal cannot be impressed by a deterrent sentence, he is neither re-integratable nor predictable. The focus is on protecting society. It is therefore better to think about imprisonment for life or the death penalty. We cannot allow these dangerous criminals to harm innocent people.'\n\nFrom 'The Criminal Man' by [ROOT.Var('panum_physician_var').GetCharacter.GetFullName]"
 panum.2122.g: "Do we have any other choice than to accept this as the governing theory?"
 panum.2123.t: "A dangerous criminal Subject"
 panum.2123.d: "Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] has carefully studied [SCOPE.sCharacter('panum_victim_scope').GetFullName]'s physiognomy and in particular the shape of [SCOPE.sCharacter('panum_victim_scope').GetHerHis] skull and has come to the conclusion that [SCOPE.sCharacter('panum_victim_scope').GetSheHe] is a highly dangerous person with criminal energy who should be removed from all services immediately - to protect society!"
 panum.2123.f: "'The thieves generally have very mobile faces and hands; her eyes are small, restless, often squinting; brows folded and clashed; the nose is crooked or blunt, the beard is sparse, the hair is rarely thick, the forehead is almost always small and receding, the ear often sticks out like a handle...\n\nThe murderers have a glassy, icy, fixed gaze; their eyes are sometimes bloodshot. The nose is large, often an eagle's or rather hawk's nose; the jaws are strong-boned, the ears long, the cheeks broad, the hair curled, full and dark, the beard often sparse; the lips are thin, the canine teeth are large... In general, in criminals from birth, the ears are handle-shaped, the hair is full, the beard is sparse, the frontal sinuses are arched, the jaw is enormous, the chin is square or protruding, the cheekbones are broad.' -Cesare Lombroso"
 panum.2123.g: "This person actually has a criminal face."
 panum.2123.h: "The doctor goes too far with [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] accusations!"
 panum.2124.t: "Another skull lover!"
 panum.2124.d: "Today, Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] introduced an aspiring academic who loves skulls almost as much as [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] does. However, Doctor [SCOPE.sCharacter('lepsius_new_anthropologist_scope').GetLastName] is more concerned with the skulls of dead people."
 panum.2124.f: "'[SCOPE.sCharacter('lepsius_new_anthropologist_scope').GetFullName] is an excellent scientist who understands the importance of examining skulls in order to draw conclusions about the person to whom the skull belongs. Unfortunately, [SCOPE.sCharacter('lepsius_new_anthropologist_scope').GetSheHe] only deals with the skulls of people who have died for an immeasurable amount of time. Unbelievable! You can't be sure whether they were really criminals. How is that supposed to help?'"
 panum.2124.g: "This is an...unexpectedly pleasant surprise."

 panum.4003.t: "The End of Smallpox"
 panum.4003.d: "Against all odds, our campaign against smallpox has succeeded beyond all measure - the disease has now been eradicated. "
 panum.4003.f: "For many, it is a day that begins like any other, unaware of what a magnificent morning that it truly is. For those in the know, it is the culmination of lifetimes of work, of a dream barely imaginable finally coming to fruition. Many did not think it could be done in their lifetimes, that it would be some fabled work for the late twentieth century, or even the twenty first, and yet, here, now, it is done in the year of [TimeKeeper.GetCurrentDate.Format('y')]. The last confirmed case ended with not a single new individual infected, confining this sickness to history. For the first time in history, the threat of this disease hangs over not a single head.\n\nAnd that means but one thing: smallpox is no more.\n\nMany thought it would be an impossibility...but even those that are unaware cannot help but hear the celebrations in universities and hospitals, see the toasts of doctors and scientists alike, and know that it is a good day. "
 panum.4003.g: "Man has made his own miracle this day."

 panum.2211.t: "Disease Research"
 panum.2211.d: "During [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] medical examinations, Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] realized that [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] wanted to research in detail a disease about which very little has been published in our country, but which has become a widespread disease in certain regions."
 panum.2211.f: "In addition to the major epidemic diseases, there are numerous everyday and widespread diseases, as well as long-known scourges of humanity whose causes and healing methods are still unknown. Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] wonders whether he shouldn't focus on a very specific illness."
 panum.2211.g: "Examine the Woolsorter's Disease."
 panum.2211.h: "Examine the Goitre Disease."
 panum.2211.i: "Examine the Kidney Stone Disease."
 panum.2211.j: "Examine Pellagra."
 panum.2211.k: "Examine Rickets."
 panum.2211.l: "Examine Syphilis."
 panum.2211.m: "Examine Tetanus"
 panum.2211.z: "The doctor should use the time to focus more on training."

