 MR_PADDOCK_FIRE_MECHANIC_BUTTON_TT: "#T Fire Mechanic#!\nRacing teams may fill a mechanic position if the current mechanic does not meet the expected requirements. However, a new mechanic can only be recruited after an interval of two years.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
