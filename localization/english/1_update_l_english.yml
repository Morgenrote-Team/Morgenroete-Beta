 je_panum_medical_research_project_reason: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] is currently driving medical research forward. In addition to medical innovations, Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] can also find cures for diseases that are not among the ten classic epidemic diseases. Every time the progress reaches [JournalEntry.GetTotalGoalValue|V0] we will get a small technology boost.\nTechnology for the next boost: [GetPlayer.MakeScope.GetCountry.GetCustom('panum_medical_research_next_technology_type')]\n#n This project will continue indefinitely. Use the button to stop it.#!" #please replace

 panum.2611.t: "Institutionalisation"
 panum.2611.d: "In view of the unacceptable conditions in some mental asylums, doctors and political figures are pushing for the practices there to be reformed. They advocate secluded places where psychiatrists can live a lonely life with their patients, far from traffic."
 panum.2611.f: "The modern era of institutionalized provision for the care of the mentally ill, began in the early 19th century with a large state-led effort. Public mental asylums were established in Britain after the passing of the 1808 County Asylums Act. This empowered magistrates to build rate-supported asylums in every county to house the many 'pauper lunatics'. The Lunacy Act 1845 was an important landmark in the treatment of the mentally ill, as it explicitly changed the status of mentally ill people to patients who required treatment. The Act created the Lunacy Commission, headed by Lord Shaftesbury, to focus on lunacy legislation reform. The General Journal of Psychiatry should be mentioned as an organ of German institutional psychiatry between 1830 and 1860. It was founded by Heinrich Damerow together with Carl Friedrich Flemming and Christian Friedrich Wilhelm Roller in 1844."
 panum.2611.g: "Psychiatric and psychological research is making progress."
 panum.2612.t: "Disease of the Brain "
 panum.2612.d: "In psychiatry, the theory of evolution is accompanied by significant changes. A new generation of psychiatrists are postulating that mental illnesses are diseases of the brain. Scientifically oriented psychiatry is replacing the previously prevailing humanities view."
 panum.2612.f: "Wilhelm Griesinger is considered one of the most important figures in the scientific turnaround in psychiatry. He met François Magendie, the founder of experimental physiology and author of the first modern textbook on physiology, whose research approach greatly influenced him. In 1839 he moved to Friedrichshafen on Lake Constance as a practicing doctor. The following year, 1840, he received an offer to work as a secondary physician at the Winnenthal insane asylum. In the next two years that he worked there, Griesinger gained a wealth of practical experience, which became the basis for his major work 'The Pathology and Therapy of Mental Illnesses', published in 1845 and inaugurating a new era in psychiatry. In it he attempted to found psychiatry on the basis of medical physiology and pathology. Griesinger's famous statement can be found on the first page, according to which, in order to understand every symptom of illness, it is necessary to localize the phenomenon in question and to recognize all mental illnesses as diseases of the brain."
 panum.2613.t: "Classification of Mental Disorders"
 panum.2613.d: "Psychiatrists and psychologists have begun to classify mental illnesses according to a scheme that was previously only available in the rest of medicine. While they previously only knew 'imbecile' and 'insanity', they now recognize 7 categories: mania, melancholy, monomania, paresis, dementia, dipsomania and epilepsy."
 panum.2613.f: "The triadic system of the German psychiatric tradition is a system of psychiatric illnesses that is classified according to their causes. The first description goes back to Emil Kraepelin; Kraepelin, in turn, was based on the preparatory work of Karl Ludwig Kahlbaum. Kraepelin announced that he had found a new way of looking at mental illness, referring to the traditional view as 'symptomatic' and to his view as 'clinical'. This turned out to be his paradigm-setting synthesis of the hundreds of mental disorders classified by the 19th century, grouping diseases together based on classification of syndrome - common patterns of symptoms over time - rather than by simple similarity of major symptoms in the manner of his predecessors."
 panum.2614.t: "Talking Cure"
 panum.2614.d: "Despite many reservations, the psychological approach is becoming increasingly popular among psychiatrists. The case of a young woman who appears to have been cured as a result of lengthy discussions is seen as a template for a new turning point in the treatment of mentally ill patients."
 panum.2614.f: "The experiences that Josef Breuer gained while treating Bertha Pappenheim (pseudonym: Anna O.) in 1880/1881 formed the basis for the studies on hysteria published together with Sigmund Freud in 1895. This work (and the underlying case history) was described by Freud as the root and starting point of psychoanalysis. Following Sigmund Freud's pioneering work, ideas stemming from psychoanalytic theory also began to take root in psychiatry. The psychoanalytic theory became popular among psychiatrists because it allowed the patients to be treated in private practices instead of warehoused in asylums."
 panum.2615.t: "Psychology and Philosophy"
 panum.2615.d: "In addition to the influence of psychological schools on psychiatry, there is also a growing understanding of philosophical influences. The dominance of the natural sciences appears to be broken."
 panum.2615.f: "Karl Jaspers was among the first psychiatrists of the 20th century to examine and reflect on the philosophical assumptions of their discipline. Jaspers' 'General Psychopathology' (1913) is considered the beginning of methodically reflected psychopathological research - alongside Wilhelm Griesinger, who defined mental illnesses as diseases of the brain, and Emil Kraepelin, who was the first to introduce a useful nosological reference system in psychiatry. Jaspers referred to Husserl's early work on descriptive psychology and Wilhelm Dilthey's much-discussed distinction between 'explaining' and 'understanding', with which he also supplemented psychopathology in a methodological sense."

 panum.2131.t: "A Plate to Win"
 panum.2131.d: "With the discovery of the role that poverty might play in rickets, the Trade Unionists have taken on the mantle of fighting for free school meals and milk!"
 panum.2131.f: "It began slowly at first - a wagon here or there parking itself outside of school, giving the children milk, soup, and a little bread. Now, it has grown to become so much more: the worker unions, socialists and labor activists of the nation have adopted the cause of not merely fighting for the proletariat class, but also for their children. Posters with images of children with empty bowls and pleading eyes are ever more common in the streets, and the failure of the government to provide for its youngest and most vulnerable citizens is an easy cudgel to condemn it and its system.\n\nThe idea of a free school meal and milk is spreading, like a wildfire, and is echoed by even the most extreme branches of the movement - if the government cannot be trusted to provide for the nation's children, then who, truly, is it for?"
 panum.2131.g: "We will have our free milk bill, yes we will, yes we will!"
 panum.2131.h: "There is no such thing as free milk."
 panum_free_milk_modifier: "Free Milk"
 panum_no_free_milk_modifier: "No Free Milk"

 panum_medical_techniques_level_rises_tt: "[GetPlayer.GetName]'s Medical Techniques Level rises."

 panum.561.t: "The Path to a Vaccine?"
 panum.561.d: "Following instruction from the capital, Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] has started to investigate how to treat or even cure Yellow Fever."
 panum.561.f: "''...yet, I wonder if I was perhaps overconfident in my assessment that I could, in fact, defeat yellow fever. The disease has few known certainties, with even its means of transmission a mystery, to say nothing of its origins. Is it, one might suggest, a resurgence of the miasma theory of old? Who can claim certainty in the face of such mystery?\n\nYet for all those mysteries, there is something that we know. Not all those that encounter this enigmatic death are slain by it; some have barely any sign it was this yellow fever at all, and more than a few recover before it becomes life threatening. To encounter yellow fever is to dance with death, certainly, but it is not a certainty that it will lay claim to you...'"
 panum.561.g: "...and if we can stop it anywhere, we might yet be able to stop it everywhere."
 panum.562.t: "The Orphanage"
 panum.562.d: "Examining any and all instances of recovery from Yellow Fever, Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] has arrived at a home with a great many survivors - an orphanage."
 panum.562.f: "'Ah, hello, you must be the mistress of this orphanage...I see the children have played with paint today.'\n'Believe me, I haven't the first clue where they got it - oh, you must be the doctor they said would be calling! I'm afraid the coughs have already cleared up, so there isn't -'\n'I am afraid I am not that doctor, ma'am. I come from the capital, investigating yellow fever. I was told that the disease has...been through here?'\n'Oh yes, the little ones. They've had it, a great many even. Some come from families wiped out by the disease, the poor things, but it likes to spare the children, it seems.'\nFascinating. Do you have any theories -'\n'Children! Come, come! There's a nice man from the capital here to speak with you!'\n'Oh...hello, children. My name is Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], and I would like to talk about yellow fever..."
 panum.562.g: "What is the reason that the parents die but the children survive?"
 panum.563.t_america: "The Old Blood"
 panum.563.d_america: "In a bid to find out more about yellow fever, Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] has decided to visit the families of some of the first settlers in these lands."
 panum.563.f_america: "''...and yet, not all of the first families in these lands are gone. There are still some that can trace their history back to the very first expeditions here, great or small. It is to these families that I have turned my investigation, for some of them still keep hold of precious journals and records that give us a glimpse into the past before proper historical archives. It reveals something especially fascinating: the first cases of yellow fever appeared in these lands in 1685 or so.\n\nYet, since its appearance, some of these greats of [ROOT.GetCountry.GetNameNoFlag] have travelled abroad as explorers and adventurers...and some, who had yellow fever here and recovered, encountered that sickness there, in Africa, and yet they never fell ill. It drives me towards one truth.'"
 panum.563.g_america: "They are the same disease. Immunity to one is immunity to the other."
 panum.563.t_africa: "The Tribesmen"
 panum.563.d_africa: "In a bid to discover more about yellow fever, Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] has sought out the ones with the most experience of Yellow Fever - the native Africans."
 panum.563.f_africa: "'...and yet, whilst we might perish rapidly, the native Africans endure. It is a disease that they are deeply intimate with; though the language barrier presents a significant obstacle, it takes but a few descriptions for them to understand the sickness of which I speak. Do they have a natural resistance to it, akin to that which the Europeans might have for the smallpox that lay waste to the Americas? Perhaps, but those of African heritage who labor in our cities die at the same rate we do - some other factor, then, must be at play. Dietary? Cultural?\n\nThe key, perhaps, is childhood exposure in the tribe. It is a possibility that they are exposed young to yellow fever, and thus develop a lasting immunity, much as cowpox might grant protection against smallpox.'"
 panum.563.g_africa: "And if they can be made immune...then it should be possible to make a vaccine."
 panum.564.t: "The Nature of the Foe"
 panum.564.d: "Fighting a disease requires discovering more about its nature, and Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] has devised a fascinating test."
 panum.564.f: "'...yet ever since the revelation that cholera was a waterborne disease, we have had a chance to examine the possibility of removing such sicknesses from water with proper filtration. It took some time to be delivered, but I find my hands upon a Berkefeld filter, a fantastical contraption that can filter water through diatomaceous earth. It is an extremely precise thing, able to remove even bacteria. I prepared a vial consisting of blood from several of the infected, diluted it with distilled water, then poured it through the filter. What emerged was clear, pure liquid...or so I thought.\n\nAnd there is the surprise: whatever it is, it made it through the filter, proven by a volunteer brave enough to have it injected. They have fallen ill, and fight now for their life. Yet, this proves that Yellow Fever is no mere microbe, it is something even smaller than a bacteria, something that we cannot see.\n\nI would have called it an impossibility, but I found note of such a thing in a medical journal. They call it a virus.'"
 panum.564.g: "Know the enemy, destroy the enemy."
 panum.565.t: "Untreatable?"
 panum.565.d: "Hopeful for any sign of proper treatment, Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] has visited local clinics and hospitals to investigate their treatment practices."
 panum.565.f: "Ah, Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], it is a pleasure to meet you! We here at the clinic -'\n'I am afraid we will need to cut short the pleasantries, doctor. I need to visit other clinics, hospitals, wards, some two dozen by nightfall. Tell me of the effectiveness of your treatment.'\n'Ah, uh...well, we follow the established guidelines -'\n'With success? Let me take notes.'\n'Uhm...without.'\n'Mortalities?'\n'Quite...high.'\n'How many have you lost this week?'\n'A hundred and seventy six.'\n'That makes you and the last six clinics, bringing us up to well over three thousand fatalities. You are working along the treatment guidelines, correct?'\n'Yes, doctor!'\n'Then that rules out herbal medications, electrotherapy, radiotherapy, hydrotherapy, folk medicine, modern medicine and...hmm, just about every form of treatment we know of, including shielding them from the night sky in the event it is astrological in nature.'\n'Then...doesn't that mean there's no treatment, doctor?'\n'Indeed, it seems likely that any treatment at all will have no effect. A pity."
 panum.565.g: "A change in tactics, then - we must have a vaccine."
 panum.566.t: "The First Crack"
 panum.566.d: "Although his research has been a failure thus far, Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] has experimented with monkeys in a bid to devise a vaccine."
 panum.566.f: "For many, the sight of a dead monkey in a cage wouldn't be much cause for celebration, but for Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] and [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] team, it was remarkable progress. The development of a vaccine for this terrible disease required the ability to produce the sickness in a laboratory on demand, and yet try as they might, it had eluded them...until today. With native African monkeys and chimps seemingly immune to the sickness, it took the arrival of an Indian macaque to provide a suitable test subject. Inoculated with serum taking from the veins of an infected man, the macaque had sickened and, ultimately, died.\n\nFor some, it might seem like idle cruelty, but here, now, it presented an enormous leap forward. Finally, they had subjects to test upon."
 panum.566.g: "Hmmm. This is progress...in killing monkeys, at least."
 panum.567.t: "The Secret of Serum"
 panum.567.d: "With access to a reliable "test subject", Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] has begun testing possibilities of inoculating using the blood of recovering patients."
 panum.567.f: "'1. Macaque to macaque transfusion: transferred sickness, no immunity, macaque deceased. Confirms blood based transmission, disease is likely carried by insects - mosquitoes?\n2. Human to macaque transfusion: transferred sickness, no immunity, macaque survived. Confirms infection can cross species directly.\n3. South American and African Yellow Fever for surviving macaque: immunity, macaque survived. Confirms shared immunity to both forms of disease.\n4. Dead pathogen in serum, sterilized under extreme heat: failed to provide protection, macaque deceased following inoculation with live pathogen. Significant failure, rules out possibilities for a dead-pathogen vaccine.\n5. Transfer of recovering serum to macaque: prevented future infection! Promising! Potential start for a vaccine?'"
 panum.567.g: "You can't make an omelette without cracking a few macaques..."
 panum.568.t: "The Prototype"
 panum.568.d: "Having had time to continue work on their vaccine, Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] has reached a critical point - a prototype vaccine."
 panum.568.f: "'It should be an incredible moment, but I find myself struggling to maintain my sobriety. Using large quantities of human serum, taken from a number of the recovering ill, my team and I succeeded in processing them into a distilled form, potentially able to deliver immunity into the volunteer. It was a good first draft, and a potential, critical stepping stone, and so we started to test it on the macaques. A good number died, a good number lived, but a macaque is not a man.\n\nIt needed live testing. Ten volunteers, gathered from here, there, and everywhere. Some troops from the local garrison, a member of my own team, a few out of work men from the town swayed by the promise of a few pence. Some two dozen volunteers, for near as many shots. Of them? Seven had no symptoms, then confirmed immunity a week later. Five had minor illness, then immunity. Another six were more sick, then immune. The remainder? All developed yellow fever proper, and one died. It is a step in the right direction, undeniably, but...what of the dead?'"
 panum.568.g: "The cost of progress is high."
 panum.569.t: "A New Subject"
 panum.569.d: "With the first attempt at a vaccine a mixed success, Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] is determined to refine the process."
 panum.569.f: "To the relief of a few handlers and the horror of others, Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] had made a critical discovery - macaques were not the only animal that could incubate the disease, and a newer, more suitable host was found: the common research mouse. The lot that they might play in the burgeoning industry of medical research cannot be understated, but here, they play an especially critical part: their cerebral fluid, the goo around their tiny brains, is a suitable growth medium for the yellow fever virus. This process, however, has a distinct advantage.\n\nEach passage from mouse to mouse takes less time than the last, weakening the virus as it does. Slowly but surely, this killer of men is being brought to heel, one mouse at a time."
 panum.569.g: "Oh good, first the macaques, now the mice..."
 panum.570.t: "The Second Prototype"
 panum.570.d: "Continued refinement of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'s vaccine has led to the development of an improved version."
 panum.570.f: "'Although the last attempt was not a failure, I dare not call it a success. Those poor boys gave their lives to the hope of ridding mankind of this disease, and I owe it to them to improve as much as possible. I believe that I have done exactly that. By transferring the matter from macaques to mice, I was able to slowly but surely attenuate the virus, weakening it substantially overtime. After over thirty passages, the resulting yellow fever is a weakened creature, far more likely to be of use in a vaccine than the first attempts.\n\nUsing the same approach as before, I have created a combination of immune serum and live-culture but weakened virus, the serum present to reduce the risk of certain immune complications. There were less volunteers than the last time, but a colleague of mine decided to take the risk. They had neither vaccination nor exposure to yellow fever, and were intensively quarantined for a week before inoculation. Other than a small reddening of the area, they failed to develop yellow fever. Very promising results so far.'"
 panum.570.g: "This sounds like we're finally getting somewhere..."
 panum.570.h: "...so let's get this vaccination campaign started!"
 panum.571.t: "Wildfire"
 panum.571.d: "Disaster! The distribution of the serum-vaccine developed by Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] has inadvertently transferred blood-born diseases!"
 panum.571.f: "It was, in hindsight, quite obvious that making a vaccine using human blood serum was, perhaps, a terrible idea. The mysteries of human blood had been partially deciphered, but in a world where the microscope was revealing ever new microbes and a new theory of viral bodies was beginning to emerge, there was always this ever pressing concern that something unexpected could occur, something disastrous.\n\nThat disaster has now occurred: tens of thousands of individuals have been unknowingly injected with serum contaminated with a virus, one that has induced jaundice in everyone from soldiers to government officials. This virus was previously unknown to our science, and still evades detection by many of our brightest minds...unlike the damage to our national image. Although there have been few fatalities, if any, the obvious failure of this vaccination project has left our medical community in shambles, the butt of jokes across the globe."
 panum.571.g: "This is a catastrophe for our medical research..."
 panum.572.t: "Final Adjustments?"
 panum.572.d: "Close to a finalized vaccine, Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] is in the middle of final development."
 panum.572.f: "If one did not know otherwise, they might have thought Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'s laboratory to look like a very strange kitchen. Salt, water, oil and eggs littered the counters, alongside hotplates, a wide selection of glasses, and a state of the art refrigerator. The scene was seemingly set to make breakfast, not a medical breakthrough, yet it is exactly that which is underway. Serum is too expensive to make a vaccine that can be distributed at scale, too awkward to work with in the large scales necessary to inoculate a colony or a city. It has to be removed from the equation, but if not that, then what?\n\nMurmuring quietly, seemingly on the verge of madness, Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] works tirelessly. A carefully prepared selection of mouse tissue is, carefully, dipped into egg yolk, and then, carefully, always carefully, placed into the freeze-drying compartment. An earlier batch came out, its contents now a fine powder. Add it to a saline solution...\n\nThe doctor smiled.\n\n'At last,' the good doctor says. 'I have it.'"
 panum.572.g: "Heureka!"
 panum.573.t: "The Final Prototype"
 panum.573.d: "Having completed work on their vaccine, Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] has begun to deploy it in a final test group."
 panum.573.f: "'It was a long, hard road, but the end is finally in sight. The final phase was to make the vaccine more readily available, and now it is: having exchanged the serum for a saline solution, the resulting vaccine package is akin to that used for smallpox. There is no need for an injection, merely the same practice of scarification. Indeed, the two could even be delivered at the same time. By all accounts, it should be a reliable, safe and efficient means to deliver this vaccine, not merely to a few thousand, but to millions.\n\nYet, past tests fill my heart with trepidation. There are few volunteers, not nearly enough to create a testing group...but if one was to factor in myself, then there are enough. I have already made the arrangements - a general can only send so many of their men into the line of fire before they are expected to take to the field for themselves. Tonight, at eight o'clock, I will be inoculated with this vaccine. If it works, then, when I am injected with the the yellow fever in two weeks time, I shall not have anything more than a mild upset.'"
 panum.573.g: "Wish [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] luck."
 panum.574.t: "A Vaccine against Yellow Fever"
 panum.574.d: "News has reached the capital: Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] has successfully created a vaccine for yellow fever!"
 panum.574.f: "'...but in the end, my team and I have managed to succeed against all odds. Though there are still a great many mysteries of yellow fever as yet unsolved, we have successfully produced a viable vaccine, ready for large scale production. It may require some specialized facilities, manned by great minds, but it can be produced at scale, and millions upon millions would benefit from a rapid campaign of vaccination that could render yellow fever a thing of the past.\n\nYet, a great many lives have been lost, including a number upon my own team, from humble assistants that laid down their lives in pursuit of their research to volunteers who stood for testing, all of whom should be recognized as the heroes they are. A word of praise is to be given, also, to the macaques, and to the mice, who have played a critical part in this venture.\n\nBy their sacrifice, and our collective effort, we now have a vaccine that can put an end to endemic yellow fever in a matter of years, and perhaps even one day eradicate this nuisance, once and for all.'"
 panum.574.g: "Well done, doctor! Now, let us begin immediate deployment!"

