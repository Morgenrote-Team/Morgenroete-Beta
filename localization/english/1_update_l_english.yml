 dubois.2172.t: "Mosasaurus"
 dubois.2172.f: "Mosasaurus is in fact not a dinosaur but a marine reptile. They lived in the oceans of the Cretaceous. There are many different species of Mosasaurus that adapted to various regions. Many of them were apex predators and hunted fish, sharks, and other dinosaurs and marine reptiles."
