 ### MR Concepts ###
 concept_panum_convention_desc: "An international convention is a joint declaration of intent by states to establish certain rules of the game in international traffic. There were several examples of this in the course of the 19th century, such as the Geneva Convention or the Hague Code of Land Warfare. What all conventions have in common is that they attempt to mitigate the horrors of war. Military options are therefore preferred over safe medical care for the wounded and ultimate weapons are banned, which leads to a certain containment of the war. The advantage is greater flexibility. While the adoption of a convention is viewed favorably, the abolition of a convention can lead to international anger.\n\nInternational conventions are usually non-binding declarations of intent. However, if enough members of the [concept_panum_red_cross] sign it, over time it will become valid international law, which all signatories are expected to comply with - and the other members will also sign it. This happens when 65 percent of all members and the majority of the Great Powers agree to this convention - then all other members are then forced to comply with it. This convention can then no longer be abolished as usual. In order to avoid binding conventions, a complete withdrawal from the Red Cross is necessary - with all the consequences."