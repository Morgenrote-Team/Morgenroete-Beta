 panum.2626.t: "The Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] Show"
 panum.2626.d: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] got [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] own show on Radio in which [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] gives advice to people who want to talk about their problems. The format is very popular."
 panum.2626.f: "'Hello, Ethan. I'm listening.'\n'Hi, Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName].'\n'How old are you?'\n'I'm thirteen.'\n'Well, what can I do for you?'\n'Well, I'm having a lot of problems with the other kids at school. They're always beating me up.'\n'Why do you think that's so?'\n'Probably because I'm smart. I have a 160 IQ. I'm in the astronomy club and I hate sports.'\n'Well, you know, Ethan, the other children are just acting out of jealousy and immaturity, and I know it doesn't help much right now, but the day will come in the next few years when you will have the last laugh.'\n'That's it?'\n'Yes.'\n'Frankly, Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], I find that advice patronizing, simplistic and, in all candor, uninspired. The real surprise here is that they pay you to dole out this balloon juice.'\n'Ethan, where are you calling from?'\n'Home.'\n'Well, if any of Ethan's classmates are listening, you know where he is, and he can't stay in there forever. Thank you for your call.'"
 panum.2626.g: "Wait, I know this show!"

