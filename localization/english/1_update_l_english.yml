 panum.168.f: "'Halt! Who's out and about at this time of - Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] Whatever are you doing this late?'\n\n'I have rounds to do, and they will not wait for sunrise. Every minute is precious, even ones after midnight.'\n\n'Good heavens! These streets aren't safe at night!'\n\nNor are they in the day, not til this cholera is over and done with. If you would excuse me, constable, there is more work to be done before my lantern oil burns low. I have a dozen vials to fill with water from the canals and pumps, houses to visit, ditches to examine.'\n\n'Aye, well, very well then. You aren't doing anything wrong, but best I give you an escort all the same.'" #please replace
 panum.3033.d: "The overwhelming majority of Red Cross members have agreed to the Third International Convention on the Use of Chemical Weapons. It is now binding for all members." #please replace
