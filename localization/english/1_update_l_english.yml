 panum.2007.t: "Medical Inventions"
 panum.2007.d: "Word got around at the congress that there were specialists who had succeeded in medical innovations. They are ready to share their knowledge."
 panum.2007.f: "Unique innovations in medicine, such as transplants, the development of X-rays or chemotherapy, are of such great importance to humanity that the inventors share the knowledge without reservation. Ultimately, it's about the well-being of all people."
 panum.2007.g: "Cheers to humanity!"

 panum.2205.t: "Animal Testing"
 panum.2205.d: "Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] is considered an ice-cold scientist with a certain penchant for cruelty. The number of animals [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] killed 'for the benefit of science' is said to be in three figures. Nevertheless, these experiments have their successes."
 panum.2205.f: "Although animal testing for the benefit of medicine has existed since ancient times, it was only in the 19th century that testing took place on a scale that was previously unknown. Particularly in the course of the discovery of the germ theory - and afterwards - numerous experiments were carried out in which the animals were consciously infected with pathogens countless times and literally became 'guinea pigs' for new drugs. This phase also saw the widespread introduction of animal testing and vivisection at universities for students."
 panum.2205.g: "The doctor is free as [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] pleases."
 panum.2205.h: "The students should learn how to dissect animals."
 panum.2205.i: "This is clearly going too far."

 panum.2211.t: "Aspirin"
 panum.2211.d: "Our chemist Dr. [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName], has invented a true medical miracle that could revolutionize pharmacy: Aspirin. Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] has confirmed the pain-relieving effects."
 panum.2211.f: "Salicylic acid has been used medicinally since ancient times. Medicines made from willow wood and other salicylate-rich plants appear in clay tablets from ancient Sumer and in the Ebers Papyrus from ancient Egypt. Hippocrates referred to 400 B.C. B.C. on the use of salicylic tea to reduce fever. Salicylate-rich plants were part of the pharmacopoeia of Western medicine in classical antiquity and the Middle Ages. Willow bark extract became known in the mid-18th century for its specific effects on fever, pain and inflammation. In the 19th century, pharmacists experimented with and prescribed a variety of chemicals associated with salicin, the active component of willow extract. In 1853, chemist Charles Frédéric Gerhardt treated acetyl chloride with sodium salicylate for the first time to produce acetylsalicylic acid. In 1897, scientists at the Bayer drug and paint factories began studying acetylsalicylic acid as a less stomach-irritating replacement for common standard salicylate drugs and created a new synthetic route without impurities. By 1899, Bayer had called this aspirin and was selling it worldwide."
 panum.2211.g: "The drug will be the starting point for further medical research."
 panum.2211.h: "Chemistry is sure to open up even more spectacular discoveries."
 panum.2211.i: "The pharmaceutical industry will benefit from this."
 panum.2212.t: "X-Rays"
 panum.2212.d: "Our physicist Dr. [ROOT.Var('curie_physicist_var').GetCharacter.GetLastName] has made a spectacular discovery: [ROOT.Var('curie_physicist_var').GetCharacter.GetSheHe] has discovered previously unknown rays that can be used to illuminate the body. Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] highlighted the possibilities for medicine."
 panum.2212.f: "X-rays are electromagnetic waves with quantum energies above about 100 eV, corresponding to wavelengths below about 10 nm. X-rays lie in the electromagnetic spectrum in the energy range above ultraviolet light. X-rays were discovered in 1895 by the German scientist Wilhelm Conrad Röntgen, who named it X-radiation to signify an unknown type of radiation. X-rays can penetrate many solid substances such as construction materials and living tissue, so X-ray radiography is widely used in medical diagnostics (e.g., checking for broken bones) and material science (e.g., identification of some chemical elements and detecting weak points in construction materials)."
 panum.2212.g: "Spooky - like seeing your own death."
 panum.2213.t: "Blood Types"
 panum.2213.d: "Dr. [ROOT.Var('curie_physicist_var').GetCharacter.GetLastName] has made an astonishing discovery that would explain why human blood sometimes mixes and sometimes clumps: apparently there are different blood groups. This is a decisive breakthrough for blood donations and blood transfusions."
 panum.2213.f: "'I have recently observed and stated that the serum of normal people is capable of clumping the red cells of other healthy individuals... As commonly expressed, it can be said that in these cases at least two different kinds of agglutinins exist, one kind in A, the other in B, both together in C. The cells are naturally insensitive to the agglutinins in their own serum.' -Karl Landsteiner"
 panum.2213.g: "Research into blood groups must be promoted."
 panum.2213.h: "The clinic is supposed to collect blood types and collect them for blood transfusions."
 panum.2214.t: "Electrocardiography"
 panum.2214.d: "Dr. [ROOT.Var('curie_physicist_var').GetCharacter.GetLastName] has invented an amazing device that records the electrical activity of the heart muscle fibers. The doctor calls the device an electrocardiograph - an ECG."
 panum.2214.f: "In 1843, Carlo Matteucci realized through experiments on pigeon hearts that cardiac activity is based on electrical processes. In 1882, the physiologist Augustus Desiré Waller performed the first ECG on his dog Jimmy by dipping his four paws in conductive sodium chloride solution. In 1887 he was able to record cardiac currents for the first time using a capillary electrometer. The instruments were significantly improved in 1903 by Willem Einthoven, who, based on his string galvanometer developed in 1895, developed the ECG into a useful diagnostic procedure and introduced it to the clinic. The terminology he introduced is still used today."
 panum.2214.g: "This device should be in every hospital."
 panum.2215.t: "First Transplantation"
 panum.2215.d: "Dr. [ROOT.Var('curie_physicist_var').GetCharacter.GetLastName]'s surgical talent is known throughout the country, but [ROOT.Var('curie_physicist_var').GetCharacter.GetSheHe] recently surprised experts with a daring procedure: The doctor transplanted human thyroid tissue under the skin and into the abdominal cavity of a young man."
 panum.2215.f: "The first transplant in the modern sense - the implantation of organ tissue in order to replace an organ function - was a thyroid transplant in 1883. It was performed by the Swiss surgeon and later Nobel laureate Theodor Kocher. In the preceding decades Kocher had perfected the removal of excess thyroid tissue in cases of goiter to an extent that he was able to remove the whole organ without the person dying from the operation. Kocher carried out the total removal of the organ in some cases as a measure to prevent recurrent goiter. In the following years Kocher and other surgeons used thyroid transplantation also to treat thyroid deficiency that appeared spontaneously, without a preceding organ removal. Thyroid transplantation became the model for a whole new therapeutic strategy: organ transplantation."
 panum.2215.g: "And people thought Frankenstein was a horror novel!"
 panum.2216.t: "Stereotactic Method"
 panum.2216.d: "Dr. [ROOT.Var('curie_physicist_var').GetCharacter.GetLastName]'s surgical genius knows no limits: the doctor revolutionized neurosurgery with a new brain operation."
 panum.2216.f: "Stereotactic brain surgery refers to minimally invasive neurosurgery and radiation therapy procedures in which the patient's head and medical instruments are fixed in a tightly screwed frame to achieve maximum accuracy. For the first time in the last years of the 19th century, isolated operations were carried out on the exposed brain using a procedure that was already known at the time as stereotaxy. During the procedure, the patient's body and especially the head were rigidly clamped in a reliably rigid frame system. The testing of possibilities in the context of research curiosity and psychiatric surgery was still very limited and simple at that time. In later decades, the tools and methodology were refined."
 panum.2216.g: "Brilliant!"
