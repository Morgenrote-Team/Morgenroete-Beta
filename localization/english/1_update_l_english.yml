 panum.1100.t: "The [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] Flu"
 panum.1100.d: "Several hospitals, clinics and doctor's offices have reported unusually high numbers of cases of a strange illness that they first thought was the common flu. Crane beds are now overcrowded and public rooms have to be cleared. The worst fears are confirmed that it is apparently the dreaded [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] Flu that has struck in neighboring countries."
 panum.1100.f: "At first the doctors spoke of a normal flu epidemic. In the first few days, the press claimed that it was a strange epidemic-type disease, but that it was harmless and without deaths.\n\nBut the opposite is the case. Every day the flu epidemic reaches a new city, a new region and demands a complete reorganization of medical treatment. Where yesterday two men in a barracks suffered from symptoms, today there are already 700. The sinister nature of the disease is reflected in the fact that it does not kill children and old people as usual, but rather young people between the ages of 20 and 40. One in twenty sick people does not survive the flu. Where it came from, how it came, what it is: This pandemic remains a mystery.\n\nWhat is already dawning, however, is that this flu could completely change normality as we previously knew it. The call for government action is becoming louder. How will [GetPlayer.GetName] respond to this?"
 panum.1100.g: "This is a benign disease, isn't it?"
 panum.1101.t: "The Spanish Flu"
 panum.1101.d: "Several hospitals, clinics and doctor's offices have reported unusually high numbers of cases of a strange illness that they first thought was the common flu. Crane beds are now overcrowded and public rooms have to be cleared. The worst fears are confirmed that this is apparently a pandemic of previously unknown proportions."
 panum.1101.f: "The Spanish flu was an influenza pandemic caused by an unusually virulent derivative of the influenza virus that spread in three waves between 1918 and 1920, claiming between 20 million and 50 million lives, with estimates ranging from a global population of approximately 1.8 billion up to 100 million.\nThis means that more people died from the Spanish flu than from acts of war in the First World War (approx. 17 million dead). A total of around 500 million people are said to have been infected, which results in a mortality rate of 5 to 10 percent, which was significantly higher than that of illnesses caused by other influenza pathogens.\n\nA special feature of the Spanish flu was that it affected rather young people (aged between 20 and 40 years), while influenza viruses otherwise particularly endanger small children and the elderly. The flu became 'Spanish' when, on June 29, 1918, the Spanish health director Martín Salazar announced that he had no reports of a comparable disease in the rest of Europe. From the end of June 1918, the international press increasingly used the term 'Spanish flu', which was also encouraged by some belligerent governments in order to cover up the actual spread. It is considered the 'mother of all pandemics'."
 panum.1101.g: "So people are already talking about the Spanish flu?"
 panum.1102.t: "The Great Pandemic"
 panum.1102.d: "Several hospitals, clinics and doctor's offices have reported unusually high numbers of cases of a strange illness that they first thought was the common flu. Crane beds are now overcrowded and public rooms have to be cleared. The worst fears are confirmed that this is apparently a pandemic of previously unknown proportions."
 panum.1102.f: "At first the doctors spoke of a normal flu epidemic. In the first few days, the press claimed that it was a strange epidemic-type disease, but that it was harmless and without deaths.\n\nBut the opposite is the case. Every day the flu epidemic reaches a new city, a new region and demands a complete reorganization of medical treatment. Where yesterday two men in a barracks suffered from symptoms, today there are already 700. The sinister nature of the disease is reflected in the fact that it does not kill children and old people as usual, but rather young people between the ages of 20 and 40. One in twenty sick people does not survive the flu. Where it came from, how it came, what it is: This pandemic remains a mystery.\n\nWhat is already dawning, however, is that this flu could completely change normality as we previously knew it. The call for government action is becoming louder. How will [GetPlayer.GetName] respond to this?"
 panum.1102.g: "So people are already talking about the [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] flu?"
 panum.1103.t: "Pandemic Policy"
 panum.1103.a.tt: "Strict measures will stifle the economy, but have a higher chance of taking effect sooner and stopping the pandemic in at least some states."
 panum.1103.b.tt: "The measures will take significantly longer to take effect and have an impact, but the economy will be less damaged."
 panum.1103.c.tt: "The pandemic is taking its natural course and established measures are being completely abolished."
 panum.1104.t: "[GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] Flu in [SCOPE.sState('panum_flu_fading_state').GetName] fades"
 panum.1104.d: "Apparently the restrictions in [SCOPE.sState('panum_flu_fading_state').GetName] have had their first effects. After weeks, a decline in the number of deaths there is noticeable."
 panum.1104.f: "Under certain conditions, a pandemic can subside in a state after a few weeks. Rigid measures, a good healthcare system, a first-class physician or highly developed medical techniques help to initiate this process."
 panum.1104.g: "A sign of hope."
 panum.1105.t: "[GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] Flu in [SCOPE.sState('panum_flu_disappearing_state').GetName] disappears"
 panum.1105.d: "After the pandemic in [SCOPE.sState('panum_flu_disappearing_state').GetName] has noticeably subsided in the last few weeks, no new cases have been recorded there these days. The region is completely flu-free!"
 panum.1105.f: "For a pandemic to completely disappear from a state, it must already have faded. It is then possible that some region will be free of the flu before the end of the actual pandemic. Rigid measures, a good healthcare system, a first-class physician or highly developed medical techniques help to get rid of the flu."
 panum.1105.g: "Did the measures contribute to this?"
 panum.1106.t: "Victim of the [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] Flu"
 panum.1106.d: "[SCOPE.sCharacter('panum_pandemic_victim').GetFullName] contracted the [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] flu a few days ago and is experiencing a severe course of the illness. The doctors are expecting the worst."
 panum.1106.f: "'About 12 o'clock I began to feel hot. I was so feverish I was afraid I would ignite the clothing. I had a cough that tore my very innards out when I could not suppress it. It was dark; I surely had pneumonia and I never was so forlorn and uncomfortable in my life. … Then I found that I was breaking into a deluge of perspiration and while I should have been more comfortable I was more miserable than ever. When the light did finally come I was some specimen of misery—couldn't breathe without an excruciating cough and there was no hope in me.' -Franklin Martin, [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] Flu survivor"
 panum.1106.g: "There's nothing we can do."
 panum.1107.t: "Flu Reports Creating Anti-War Sentiment"
 panum.1107.d: "Reports of the many deaths resulting from the [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] Flu in [SCOPE.sState('panum_disease_state').GetName] are harming popular support for our war efforts."
 panum.1107.f: "'It is madness that we send men to war while this plague ravishes our homes. Should the state not prioritize the lives of its citizens over their deaths?'"
 panum.1107.g: "We will not interfere with the free press."
 panum.1107.h: "Distribute reassuring propaganda backed by medical science."
 panum.1107.i: "Censor news of mortality rates and infections."
 panum.1108.t: "Pandemic Measures Contributing to Poverty"
 panum.1108.d: "With many unable to work due to our anti-pandemic measures, poorer citizens in [SCOPE.sState('panum_disease_state').GetName] are struggling to pay rent. Newly unemployed laborers face eviction as landlords refuse their pleas for reprieve."
 panum.1108.f: "'They told me I could not work because the factory is overcrowded. Every factory is overcrowded! The landlord, may he burn in the eternal fires, cares not a jot for our plight and demands rent before the end of the week on pain of eviction. My family shall surely be forced from our home.'"
 panum.1108.g: "Institute a rent freeze and eviction ban."
 panum.1108.h: "Temporarily increase social security."
 panum.1108.i: "There is nothing we can do about this."
 panum.1109.t: "The Anti-Mask League"
 panum.1109.d: "[SCOPE.sCharacter('anti_mask_ig_leader').GetFullName] has formed the Anti-Mask League in opposition to our pandemic measures. They dispute the effectiveness of our policies and demand that we revoke them for the sake of the struggling economy."
 panum.1109.f: "'Wear a mask and save your life! The emergency that now confronts our country is beyond the facilities of the Health Department.\nThose who do not wear them get sick. The man or woman or child who will not wear a mask now is a dangerous slacker!'"
 panum.1109.g: "Ignore the League."
 panum.1109.h: "Abandon anti-plague measures."
 panum.1109.i: "Discredit the League with medical science."

 panum.1120.t: "The [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] Flu ends"
 panum.1120.d: "Many had no longer hoped that this day would come. After many months, the likes of which [GetPlayer.GetName] has not experienced, the [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] flu is slowly disappearing from our country. Truly, this was the mother of all pandemics!"
 panum.1120.f: "'The ban was lifted to-day. No more .... masks. Everything open too. 'The Romance of Tarzan' is on at the Coliseum [movie theater] as it was about 6 weeks ago. I'd like to see it awfully. School opens this week—Thursday! Did you ever? As if they couldn't have waited till Monday!' -Violet Harris, [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] Flu survivor"
 panum.1120.g: "We hope she never returns."

