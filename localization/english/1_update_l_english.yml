 panum.1110.t: "The Doctor and the Pandemic"
 panum.1110.d: "The outbreak of the pandemic is a crucial hour for Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]: now [ROOT.Var('panum_physician_var').GetCharacter.GetGetSheHe] can shine! But the question arises: should it be better to actively fight the pandemic or research it?"
 panum.1110.f: "'On the day when it became clear that we would not be dealing with an ordinary flu wave, I felt a great motivation to do my part. And at the same time I felt the breakneck weight on my shoulders. The expectations were huge. Would I ever be able to fulfill the hopes that were placed on me?'\n\nDiary entry from [ROOT.Var('panum_physician_var').GetCharacter.GetFullName]"
