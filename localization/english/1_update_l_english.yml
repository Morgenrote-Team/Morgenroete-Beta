 je_panum_spanish_flu_research_reason: "Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] has decided to investigate the mysterious pandemic in more detail. How much success [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] will have is anyone's guess. However, an experienced physician should have a better chance of achieving a result."
