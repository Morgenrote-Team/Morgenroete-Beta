 MR_RED_CROSS_BUTTON: "Found the [concept_panum_red_cross]"
 MR_RED_CROSS_BUTTON_TT: "#T Found the [concept_panum_red_cross]#!\nThe International Red Cross is one of the first supranational institutions. The establishment of this organization was an important step towards international law. It was founded to protect human life and health, to ensure respect for all human beings, and to prevent and alleviate human suffering.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_IRC_MODERN_NURSING_TECH_TRIGGER_TT: "#default_text [GetPlayer.GetName] has researched the #V Modern Nursing [concept_technology]#!.#!"
 MR_IRC_HUMAN_RIGHTS_TECH_TRIGGER_TT: "#default_text [GetPlayer.GetName] has researched the #V Human Rights [concept_technology]#!.#!"
 MR_IRC_INFAMY_TRIGGER_TT: "#default_text [GetPlayer.GetName] has less than #V 35 [concept_infamy]#!.#!"
 MR_JOIN_RED_CROSS_BUTTON: "Join the [concept_panum_red_cross]"
 MR_JOIN_RED_CROSS_BUTTON_TT: "#T Join the [concept_panum_red_cross]#!\nOur nation can join the International Red Cross and improve its reputation through international agreements - at the expense of ruthless warfare.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"

 MR_IOC_PRESIDENT_BUTTON: "Become President of the IOC"
 MR_IOC_PRESIDENT_BUTTON_TT: "#T Become President of the IOC#!\nWithout an active president of the IOC, we can take this position. That assumes we control the Headquarters of the Olympic Committee.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_IOC_CONTROLS_HQ_TRIGGER_TT: "#default_text [GetPlayer.GetName] controls the [GetBuildingType('building_vikelas_ioc').GetName]#!.#!"

 MR_SIGN_FIRST_CONVENTION_BUTTON: "Sign the First Convention"
 MR_SIGN_FIRST_CONVENTION_BUTTON_TT: "#T Sign the First Convention#!\nThe First Geneva Convention, officially the Convention for the Amelioration of the Condition of the Wounded in Armies in the Field defines 'the basis on which rest the rules of international law for the protection of the victims of armed conflicts.' One of its most important regulations is the immunity from capture and destruction of all establishments for the treatment of wounded and sick soldiers and the the impartial reception and treatment of all combatants.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_SIGN_SECOND_CONVENTION_BUTTON: "Sign the Second Convention"
 MR_SIGN_SECOND_CONVENTION_BUTTON_TT: "#T Sign the Second Convention#!\nThe Hague Conventions of 1899 and 1907 are a series of international treaties and declarations negotiated at two international peace conferences at The Hague in the Netherlands. Both conferences included negotiations concerning disarmament, the laws of war and war crimes. The 1907 conference had an increased focus on naval warfare.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_SIGN_THIRD_CONVENTION_BUTTON: "Sign the Third Convention"
 MR_SIGN_THIRD_CONVENTION_BUTTON_TT: "#T Sign the Third Convention#!\nThe Protocol for the Prohibition of the Use in War of Asphyxiating, Poisonous or other Gases, and of Bacteriological Methods of Warfare, usually called the Geneva Protocol, is a treaty prohibiting the use of chemical and biological weapons in international armed conflicts. It was signed at Geneva on 17 June 1925.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_LEAVE_RED_CROSS_BUTTON: "Leave the Red Cross"
 MR_LEAVE_RED_CROSS_BUTTON_TT: "#T Leave the Red Cross#!\nHomo homini lupus.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"

