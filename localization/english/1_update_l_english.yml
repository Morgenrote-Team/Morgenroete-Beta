 MR_AUTORACING_FOUND_AIACR_BUTTON_TT: "#T The Automobile Association#!\nRacing is becoming more and more an international sport in which drivers compete with different car brands from different countries. Many nations have started holding their own races without any agreements. In order to better coordinate rules and terms, the establishment of an international body is necessary: an International Automobile Association.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
