### Vikelas ###

 #Please replace vikelas events 501-5022
 vikelas.501.t: "The [ROOT.GetCountry.GetAdjectiveNoFormatting] Automobile Club"
 vikelas.501.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] is considered a passionate driver and has founded an automobile club with like-minded people to mark this occasion. This is intended to strengthen the domestic car industry and organize national car events."
 vikelas.501.f: "As early as the mid-1890s, the Automobile Club de France (ACF), founded in 1895 as the first automobile club in the world, organized a race once a year, which represented the highlight of the season. These were so-called 'city-to-city' races on public country roads, in which the participants were sent out individually at intervals. One of the triggers for the founding of the ACF was Albert de Dion's relegation from the Paris-Rouen race in 1894. In the following years, rapid development began, with ever more powerful vehicles greatly increasing the dangers of motorsport. The ACF therefore implemented rules for the first time in 1901, which can be considered the first motorsport regulations in the world. A central innovation was the division into categories that had to apply to all events supported by the ACF. The resulting weight limitation should initially help to reduce the immense number of tire defects due to overloading."
 vikelas.501.g: "A sport full of thrills!"
 vikelas.502.t: "First Grand Prix Race"
 vikelas.502.d: "Motorsport is taking a revolutionary turn: with the Grand Prix races, international races are to be held one after the other in all motorsport-loving nations. With this, an international championship was born."
 vikelas.502.f: "The annual races for the Gordon Bennett Cup were the first attempt to hold an automobile world championship from 1900 to 1905. In view of constantly increasing speeds, in 1902 the ACF issued technical regulations for the first time in the form of a so-called racing formula, which the participating cars had to adhere to. Nevertheless, the frequency of accidents continued to increase, so that from 1903 only circuit races could be held on closed courses. As the successor to the Gordon Bennett races, the main race organized by the ACF ran for the first time in 1906 under the name Grand Prix. The first Grand Prix winner in history was the Hungarian driver Ferenc Szisz in a Renault."
 vikelas.502.g: "From now on, automobile racing is international!"
 vikelas.503.d: "Motorsport is taking a revolutionary turn: with the Grand Prix races, international races are to be held one after the other in all motorsport-loving nations. With this, an international championship was born. [SCOPE.sCountry('vikelas_gp_founder_scope').GetName] has invited all nations with an Automobile Club to participate at their first Grand Prix."
 vikelas.550.t: "Grand Prix of [GetPlayer.GetName] ends"
 vikelas.550.d: ""
 vikelas.550.f: "Three drivers in particular stood out in the exciting race on the LOCATION race track. [SCOPE.sCharacter('vikelas_racer_3_scope').GetFullName] from [SCOPE.sCountry('vikelas_third_winner_scope').GetName] took third place, [SCOPE.sCharacter('vikelas_racer_2_scope').GetFullName] from [SCOPE.sCountry('vikelas_second_winner_scope').GetName] took second place. However, [SCOPE.sCharacter('vikelas_racer_1_scope').GetFullName] from [SCOPE.sCountry('vikelas_first_winner_scope').GetName] won confidently and conquered the hearts of the audience."
 vikelas.531.t: "Long Distance Race"
 vikelas.531.d: ""
 vikelas.531.f: "The first car races at the beginning of the 20th century were distance races with the greatest possible range. They should test the speed and reliability of the racing cars. While France dominated racing in the early stages, like in Great Britain they soon moved on to Grand Prix racing. That didn't change the fact that there were still important international long-distance races. The most traditional race was the Targa Florio in Sicily. From 1906 to 1977 it was held mostly in May as an important international event, some with World Cup status. After the Targa Florio, the Thousand Miles (Mille Miglia) was considered a classic among long-distance road races (the Carrera Panamericana was added in the 1950s) and the basis for the term 'Gran Turismo' (GT), which describes fast touring sports cars for long-distance racing, such as those developed by Ferrari specifically for the MM."
 vikelas.531.g: "See you at the finish line!"
 #Please replace vikelas events 501-504
 
 vikelas.504.t: ""
 vikelas.504.d: ""
 vikelas.504.f: ""
 vikelas.504.g: ""
 vikelas.505.t: "Racing Car Manufacturer Location"
 vikelas.505.d: "With [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')], [GetPlayer.GetName] has its first series racing team. The car factory in [SCOPE.sState('vikelas_team_state').GetName] is now enjoying great demand due to the established brand."
 vikelas.505.f: "With the slow development from individual men's drivers to professional racing teams with factory drivers, motorsport changed permanently. Amateurs with self-built cars became a rarity. Although it still happened that eccentric aristocrats with licenses from other car manufacturers sought the thrill, car development became the real center of motorsports."
 vikelas.505.g: "We can now design our own race cars!"
 vikelas.506.t: ""
 vikelas.506.d: ""
