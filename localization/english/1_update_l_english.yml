### Panum ###

 panum.101.t: "Third Cholera Pandemic" #please replace
 panum.101.d: "Worrying reports from the Ganges Delta reached the capital today. Cases of illness have increased rapidly there. After a short examination by local doctors, they are shocked to discover that cholera has reared its ugly head again." #please replace
 panum.101.g: "Somehow, Cholera returned." #please replace

