 ### MR Concepts ###

 concept_panum_red_cross: "Red Cross"
 concept_panum_red_cross_desc: "The Red Cross is one of the first international organizations and, in rare cases, offers the opportunity to receive Red Cross medics in a war. Red Cross members also receive certain bonuses. Depending on the game rule, the Red Cross can be founded historically or dynamically; Recognized states can join under certain technological requirements. The founder receives the headquarters of the Red Cross in his capital. Members can accede to up to three [Concept('concept_panum_convention','$concept_panum_conventions$')] that are binding under international law."
 concept_panum_convention: "International Convention"
 concept_panum_conventions: "International Conventions"
 concept_panum_convention_desc: "An international convention is a joint declaration of intent by states to establish certain rules of the game in international traffic. There were several examples of this in the course of the 19th century, such as the Geneva Convention or the Hague Code of Land Warfare. What all conventions have in common is that they attempt to mitigate the horrors of war. Military options are therefore preferred over safe medical care for the wounded and ultimate weapons are banned, which leads to a certain containment of the war. The advantage is greater flexibility. While the adoption of a convention is viewed favorably, the abolition of a convention can lead to international anger."

