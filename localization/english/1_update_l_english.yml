 vikelas.506.j: ""

 vikelas.511.t: "The Great [SCOPE.sState('vikelas_city_race_start_state').GetCityHubName]-[SCOPE.sState('vikelas_city_race_goal_state').GetCityHubName] Race"
 vikelas.511.d: "The [ROOT.GetCountry.GetCapital.GetCityHubName] [SCOPE.GetRootScope.GetCountry.GetCustom('generic_newspaper_type')] has announced a big car race in its current weekly edition. The city-to-city race is designed to go from [SCOPE.sState('vikelas_city_race_start_state').GetCityHubName] to [SCOPE.sState('vikelas_city_race_goal_state').GetCityHubName]. Numerous racing drivers are also expected from abroad."
 vikelas.511.f: "The early days of motor racing were characterized by so-called gentleman drivers who took part in city-to-city races in self-built cars with their mechanic, who often also served as chauffeur. This racing format was often advertised, organized and supported by newspapers and automobile clubs. Since the mechanics were often still in their infancy, it was more important to arrive at the destination at all. Fatal accidents like that of Marcel Renault in the Paris-Madrid race meant that this form of organization was only a transitional phase in the history of racing."
 vikelas.511.g: "Prepare for the event in three months."
 vikelas.512.t: "Race Participation"
 vikelas.512.d: "The upcoming [SCOPE.sState('vikelas_city_race_start_state').GetCityHubName]-[SCOPE.sState('vikelas_city_race_goal_state').GetCityHubName] race in [SCOPE.sCountry('vikelas_race_country').GetName] has led to speculation as to whether our country's premier racer, [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName], will also take part."
 vikelas.512.g: "An excellent opportunity!"
 vikelas.512.h: "This is too dangerous."
 vikelas.512.tt: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] will prepare for the race in three months."

 vikelas_city_race_modifier: "City-to-City Race Modifier"

 vikelas.520.f: "#V End Results#!\n\nFirst Place: [SCOPE.sCharacter('vikelas_racer_1_scope').GetFullName] from [SCOPE.sCountry('vikelas_first_winner_scope').GetName]\nSecond Place: [SCOPE.sCharacter('vikelas_racer_2_scope').GetFullName] from [SCOPE.sCountry('vikelas_second_winner_scope').GetName]\nThird Place: [SCOPE.sCharacter('vikelas_racer_3_scope').GetFullName] from [SCOPE.sCountry('vikelas_third_winner_scope').GetName]"
 vikelas.520.g: "Champagne!"
 vikelas.521.t: "Victory for [ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName]"
 vikelas.521.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] took first place in the city-to-city race in [SCOPE.sCountry('vikelas_race_country').GetName]. [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe] drove a [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')] [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]."
 vikelas.521.g: "Champagne!"
 vikelas.522.t: "2nd Place for [ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName]"
 vikelas.522.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] took second place in the city-to-city race in [SCOPE.sCountry('vikelas_race_country').GetName]. [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe] drove a [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')] [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]."
 vikelas.522.g: "See you next time!"
 vikelas.523.t: "3rd Place for [ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName]"
 vikelas.523.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] took third place in the city-to-city race in [SCOPE.sCountry('vikelas_race_country').GetName]. [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe] drove a [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')] [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]."
 vikelas.524.t: "City-to-City Race ends"
 vikelas.524.d: "The big city-to-city race in [SCOPE.sCountry('vikelas_race_country').GetName] is over and the winners have been chosen. [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] drove a [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')] [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]. Although we didn't get good positioning, at least the car and driver arrived safe and sound."

 vikelas.593.t: "Fatal Car Accident"
 vikelas.593.d: "Racing driver [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] pushed his luck too far. [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe|U] left the road at too high a speed and suffered a fatal accident."
 vikelas.593.f: "'Racing is a great mania to which one must sacrifice everything, without reticence, without hesitation.' -Enzo Ferrari"
 vikelas.593.g: "Next one!"
 vikelas.594.t: "Car Breakdown"
 vikelas.594.d: "Unfortunately, racer [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] had to give up before the race was over. The car broke down, [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe] claims."
 vikelas.594.f: "Bad luck does not exist."
 vikelas.594.g: "Was it the car, or did the driver overstimulate the engine?"

