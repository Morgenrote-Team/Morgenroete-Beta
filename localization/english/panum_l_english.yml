 panum.2302.t: "Neutral treatment of [SCOPE.sCharacter('chosen_character').GetFullName]'s [SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')]"
 panum.2302.d: "Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] has treated [SCOPE.sCharacter('chosen_character').GetFullName]'s [SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')] but nothing really changed."
 panum.2302.f: "\"I really thought drinking enough water would do the trick!\""
 panum.2302.g: "At least it didn't hurt."

 panum.2303.t: "Botched treatment of [SCOPE.sCharacter('chosen_character').GetFullName]'s [SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')]"
 panum.2303.d: "Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] has treated [SCOPE.sCharacter('chosen_character').GetFullName]'s [SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')] so badly that it made [SCOPE.sCharacter('chosen_character').GetHerHis] condition even worse."
