 panum_physician_achievement_psychiatrist_loc: "\nDr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] has extensivelsy studied the human mind and is a #o renown $panum_psychiatrist$#!."
 panum_physician_achievement_military_physician_loc: "\nAs a #o $panum_military_physician$#! [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetSheHe] has seen the horrors of war and knows how to treat people under horrible circumstances."
 panum_physician_achievement_germ_theory_inventor_loc: "\nDr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] has invented the #o Germ Theory#! which saved thousands of lifes already."
 panum_physician_achievement_pneumothorax_inventor_loc: "\nOne of the greatest inventions of [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetHerHim] is a #o Device to induce an artificial Pneumothorax#!. This results in collapsing the lungs which can help treat Tuberculosis."
 panum_physician_achievement_thoracoplasty_inventor_loc: "\nThanks to [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetHerHis] surgical skills, Doctor [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] invented a #o Procedure that revolutionized Lung Surgery called Thoracoplasty#! and thus enabled improved treatment of Tuberculosis patients."
