### MR CONCEPTS ###

 concept_verrier_venus_transit: "Venus Transit"
 concept_verrier_venus_transit_desc: "The transit of Venus refers to the rare occurrence of the moon passing between Earth and Venus. However, it occurred twice in the 19th century: in 1874 and 1882. Since observations of the transit of Venus allow conclusions to be drawn about the size of the solar system and a more precise determination of the size of the astronomical unit (AU), these were major scientific events. Countries located in the [concept_verrier_venus_transit_zone] can observe the event from there; other countries must send expeditions. The success of the observation depends on the experience of the [concept_verrier_astronomer], the availability of an [concept_gaudi_engineer], and a bit of luck: sometimes the weather can prevent a good image. The better the observation, the greater the bonus."
 concept_verrier_venus_transit_zone: "Venus Transit Zone"
 concept_verrier_venus_transit_zone_desc: "The Venus Transit Zone refers to the part of the Earth from which a complete (not just partial) transit of Venus can be observed. In 1874, this was particularly true for the East Asia-Pacific region, and in 1882 for almost the entire American continent. A detailed breakdown of the strategic regions is provided below.\n\n#V Venus Transit 1874:#!\nIndonesia, Indochina, Oceania, South China, North China, manchuria, Japan, Central India, Madras, Bengal, Himalayas; also, the State of Indian Ocean Territory.\n\n#V Venus Transit 1882:#!\nBrazil, La Plata, Andes, Gran Columbia, Mexico, Central America, Carribean, The Midwest, Dixie, New England; also, the States of Ontario and Quebec."
 concept_vikelas_coach: "Coach"
 concept_vikelas_coaches: "Coaches"
 concept_vikelas_coach_desc: "Coaches are the national trainers of a country in a specific national sport. National sports include [concept_vikelas_football], baseball, basketball, and cricket. Coaches provide bonuses for the respective team in competitions – whether at International World Championships or at international matches. The latter are played secretly at regular intervals and increase a coach's experience value upon victory. High experience points and positive [Concept('concept_character_trait','$concept_character_traits$')] increase the chance of winning a World Championship. Positive traits are those that particularly motivate players – such as ambitious or charismatic – while demotivating traits reduce the chance of winning a match. These include traits such as ruthless or cruel.\n\n#R NOTE: At the moment only football is integrated.#!"
 concept_vikelas_football: "Football"
 concept_vikelas_football_desc: "Football is a possible national sport. The first football clubs can be established in Europe and South America; this will require a relatively liberal legal system, a strong petty bourgeoisie, or considerable average standard of living. After that, occasional football matches could be played. With the establishment of FIFA, international matches and the World Cup also become possible. The eight best teams automatically qualify for the World Cup. The teams are calculated according to the National Football Team Value (NFTV), which is derived from the parameters of standard of living (fitness of the population), strength of the petty bourgeoisie (club system), literacy (tactics), and tradition (national sport: yes or no?). In matches, not only the NFTV is taken into account, but also the character traits and experience of the [concept_vikelas_coach]."

### Nationalization ###

 nationalization.11.t: "La scienza in cucina e l'arte di mangiar bene"
 nationalization.11.d: "In [TimeKeeper.GetCurrentDate.Format('y')], Italy witnessed the publication of a groundbreaking cookbook that would forever change its culinary culture. The author, Pellegrino Artusi, would thus make his contribution to the establishment of an internationally recognized Italian cuisine that emphasizes the unity and greatness of the nation."
 nationalization.11.f: "Published in 1891, Pellegrino Artusi's 'La scienza in cucina e l'arte di mangiare bene' is widely regarded as the first modern Italian cookbook. At a time when Italy was just beginning to forge a national identity, Artusi's work played a pivotal role in unifying the diverse regional cuisines into a coherent national culinary tradition. His meticulous collection of recipes, presented with wit and clarity, not only set a new standard for culinary literature but also contributed significantly to the improvement of the nation's standard of living by promoting quality, innovation, and pride in local gastronomy."
 nationalization.11.g: "A Triumph of Culinary Art!"

