### Dubois ###
 dubois.2051.plesiosaurus: "Plesiosaurus"
 dubois.2181.x: "Remount Plesiosaurus"

 dubois_perfect_plesiosaurus_paleontologist_loc: "\nThe #o Msasaurus#! that Professor [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] reconstructed is gigantic monster from the sea."
 dubois_imperfect_plesiosaurus_paleontologist_loc: "\nThe #o Plesiosaurus#! that Professor [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] reconstructed a big monster from the sea."
 dubois_poor_plesiosaurus_paleontologist_loc: "\nThe #o Plesiosaurus#! that Professor [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] reconstructed was horrible. It is quite certain that Plesiosaurus lived in the Ocean, but somehow the skeleton ended up with legs."

 dubois_skeleton_has_plesiosaurus_loc: "#tooltip:[GetRawTextTooltipTag('dubois_skeleton_has_plesiosaurus_loc_tt')] @skeleton_plesiosaurus! #!"
 dubois_skeleton_has_plesiosaurus_loc_tt: "Your Paleontological Collection has a #V Plesiosaurus#!.[GetPlayer.GetCustom('dubois_plesiosaurus_discoverer_type')]"
 dubois_skeleton_has_no_plesiosaurus_loc: "#tooltip:[GetRawTextTooltipTag('dubois_skeleton_has_no_plesiosaurus_loc_tt')] @skeleton_plesiosaurus_inactive! #!"
 dubois_skeleton_has_no_plesiosaurus_loc_tt: "Your Paleontological Collection does not have a #V Plesiosaurus#!. You need #V General#! bones to reconstruct one.[GetPlayer.GetCustom('dubois_plesiosaurus_discoverer_type')]"
 dubois_plesiosaurus_discoverer_loc: "\n\nThis Dinosaur was first discovered and assembled in [GetGlobalVariable('dubois_plesiosaurus_year_global_var').GetValue|V0] by [GetGlobalVariable('dubois_plesiosaurus_discoverer_global_var').GetCountryDefinition.GetName]"

 dubois.2171.h: "Plesiosaurus."

 dubois.2173.t: "Plesiosaurus"
 dubois.2173.f: "Plesiosaurus is an order of maritine reptiles. Their fossils can be found all over the world. Depending on the species, the animals were between 1.5 and 15 meters long. Depending on the species, they probably fed on different animals. From snails and mussels to fish and other prey.\nTheir U-shaped jaws and sharp teeth, which resemble a fish trap, provided them with a useful tool."

### GUI ###
 MR_AUTOMATE_PALEONTOLOGIST_TT: "#T Automate [concept_dubois_paleontologist]#!\nYou will no longer have to give tasks to your Paleontologist if you automate them.\nThey will work independently and perform tasks that make sense at the moment. You will still need to get [Concept('concept_dubois_paleontological_expedition','$concept_dubois_paleontological_expeditions$')] or establish [Concept('concept_dubois_paleontological_team','$concept_dubois_paleontological_teams$')]. You will also still receive events."
 MR_STOP_AUTOMATE_PALEONTOLOGIST_TT: "#T Stop automation of [concept_dubois_paleontologist]#!\nYour Paleontologist will no longer be automated.\nThey will work independently and perform tasks that make sense at the moment. You will still need to get [Concept('concept_dubois_paleontological_expedition','$concept_dubois_paleontological_expeditions$')] or establish [Concept('concept_dubois_paleontological_team','$concept_dubois_paleontological_teams$')]. You will also still receive events."

