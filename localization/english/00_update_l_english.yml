 dubois.2171.h: "Plesiosaurus."
 dubois.2171.i: "Basilosaurus."
 dubois.2171.j: "Megalodon."

 dubois.2173.t: "Plesiosaurus"
 dubois.2173.f: "Plesiosaurus is an order of maritine reptiles. Their fossils can be found all over the world. Depending on the species, the animals were between 1.5 and 15 meters long. Depending on the species, they probably fed on different animals. From snails and mussels to fish and other prey.\nTheir U-shaped jaws and sharp teeth, which resemble a fish trap, provided them with a useful tool."

 dubois.2174.t: "Basilosaurus"
 dubois.2174.f: "Basilosaurus is not a dinosaur, but a prehistoric form of whale. Its long body is reminiscent of a long snake, but with a length of up to 20 meters, it is similar in length to the sperm whale."

 dubois.2175.t: "Megalodon"
 dubois.2175.f: "The gigantic shark Megalodon is probably the biggest shark to have ever existed. However estimating its length is hard, as currently only teeth and vertebra were found. Our paleontologists estimate its length to be somewhere between 9 and 30 meters. Either way, the shark skeleton is breathtaking and one of the crown jewels of our collection."

