### Verrier ###

 je_verrier_venus_transit_1874_reason: "A rare celestial event is approaching. The planet Venus will pass directly between Earth and the Sun, casting its tiny shadow across the solar disc. Observatories across the globe are preparing for this fleeting phenomenon, which may help define the very scale of our solar system.\n$mr_divider_for_je$\nDuring this expedition you will receive success chance. At the end of the expedition you will gain a modifier. The higher your success chance is, the greater the effect from the modifier will.\n#V Current Success:#! [GetPlayer.MakeScope.Var('verrier_venus_transit_success_var').GetValue|0+]" #please replace
 je_verrier_venus_transit_1874_on_complete_tt: "At the end of the expedition there is a #n 25% chance for bad weather#! which will lower your success value. At the end you will gain a #V modifier#! which will be #V based on your success value#!."

