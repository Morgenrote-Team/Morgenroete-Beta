 dubois_perfect_plesiosaurus_paleontologist_loc: "\nThe #o Plesiosaurus#! reconstructed by Professor [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] is a huge marine reptile."
 dubois_imperfect_plesiosaurus_paleontologist_loc: "\nThe #o Plesiosaurus#! reconstructed by Professor [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] is a marine reptile that lived during the time of the dinosaurs."
 dubois_poor_plesiosaurus_paleontologist_loc: "\nThe #o Plesiosaurus#! reconstructed by Professor [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] is slightly weird. It has 4 snake like extremeties and a very short had and no tail."

 dubois_perfect_basilosaurus_paleontologist_loc: "\nThe #o Basilosaurus#! reconstructed by Professor [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] is a prehistoric whale that live millennias ago."
 dubois_imperfect_basilosaurus_paleontologist_loc: "\nThe #o Basilosaurus#! reconstructed by Professor [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] is a prehistoric whale."
 dubois_poor_basilosaurus_paleontologist_loc: "\nThe #o Basilosaurus#! reconstructed by Professor [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] has a very weird physiology. It looks more like a ball than anything else which seems quite wrong."

 dubois_perfect_megalodon_paleontologist_loc: "\nThe #o Megalodon#! reconstructed by Professor [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] is a gigantic shark. A truely impressive skeleton."
 dubois_imperfect_megalodon_paleontologist_loc: "\nThe #o Megalodon#! reconstructed by Professor [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] is a gigantic shark."
 dubois_poor_megalodon_paleontologist_loc: "\nThe #o Megalodon#! reconstructed by Professor [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] seems to be a little bit... off. The huge head is mounted to a very thin neck and apparently the shark had weird spikes covering all of its body."

