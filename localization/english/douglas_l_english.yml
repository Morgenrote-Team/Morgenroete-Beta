 douglas.101.t: "Mountaineering Club founded"
 douglas.101.d: "[SCOPE.sCharacter('douglas_president_scope').GetFullName] calls—and the mountain answers. The founding of the Mountaineering Club marks a new era for all who aim higher."
 douglas.101.f: "[SCOPE.sCharacter('douglas_president_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('douglas_president_scope').GetLastName] expeditions led [SCOPE.sCharacter('douglas_president_scope').GetHerHim] through storms and avalanches—but now, [SCOPE.sCharacter('douglas_president_scope').GetSheHe] seeks to pass on [SCOPE.sCharacter('douglas_president_scope').GetHerHis] legacy. In [ROOT.GetCountry.GetCapital.GetCityHubName], [SCOPE.sCharacter('douglas_president_scope').GetSheHe] founds the Mountaineering Club of [GetPlayer.GetName], not alone, but alongside a promising newcomer: [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName], an aspiring mountaineer with sharp eyes and iron will. [SCOPE.sCharacter('douglas_president_scope').GetFullName] sees in [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetHerHim] not just ambition, but a future legend. Together they stand at the threshold of a path that leads not only to summits, but to glory, courage—and perhaps a place in history. The club is open to all who hear the call of the mountains. The ascent begins."
 douglas.101.g: "The mountain is calling!"

 douglas.102.t: "The Alpine Club"
 douglas.102.d: "The Alpine Club was officially founded in [ROOT.GetCountry.GetCapital.GetCityHubName] in [TimeKeeper.GetCurrentDate.Format('y')] and is recognized as the world's first international mountaineering organization. Its creation marks the institutional beginning of modern alpinism."
 douglas.102.f: "Historically, a group of British gentlemen gathered in London in 1857 to establish a club dedicated to mountaineering. Led by figures such as John Ball and Edward Kennedy, the Alpine Club sought to promote the systematic exploration of the Alps, combining physical challenge with geographic and natural study. The club provided a structured framework for sharing knowledge, organizing expeditions, and fostering a sense of community among climbers. Its members played a key role in what would later be known as the 'Golden Age of Alpinism,' achieving numerous first ascents and documenting their experiences. The publication of the Alpine Journal began shortly thereafter, contributing to the emerging literature of mountaineering. The founding of the Alpine Club laid the groundwork for organized climbing worldwide and set enduring standards in mountain exploration."
 douglas.102.g: "To the summit together!"

