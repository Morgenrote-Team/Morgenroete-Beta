 je_douglas_mountaineering_expedition_reason: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName], our mountaineer, is currently leading a mountaineering team on an expedition in [SCOPE.sState('douglas_location_scope').GetName]. The goal is the first ascent of a peak. The speed of the ascent depends largely on his experience and character traits. Depending on the difficulty of the mountain, greater dangers may arise. If the expedition does not reach its goal within a certain timeframe, [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] will abort the summit climb. Should the expedition drift into the greatest conceivable danger for any reason, then the worst will happen."

