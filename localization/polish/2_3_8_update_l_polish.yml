 nationalization.11.d: "W [TimeKeeper.GetCurrentDate.Format('y')], Włochy były świadkiem publikacji przełomowej książki kucharskiej, która na zawsze zmieniła ich kulturę kulinarną. Autor, Pellegrino Artusi, przyczynił się w ten sposób do powstania uznanej na całym świecie kuchni włoskiej, która podkreśla jedność i wielkość narodu." #deepl:4223602969
 nationalization.11.f: "Opublikowana w 1891 roku "La scienza in cucina e l'arte di mangiare bene" Pellegrino Artusiego jest powszechnie uważana za pierwszą nowoczesną włoską książkę kucharską. W czasach, gdy Włochy dopiero kształtowały swoją tożsamość narodową, dzieło Artusiego odegrało kluczową rolę w zjednoczeniu różnorodnych kuchni regionalnych w spójną narodową tradycję kulinarną. Jego skrupulatna kolekcja przepisów, przedstawiona z dowcipem i jasnością, nie tylko wyznaczyła nowy standard literatury kulinarnej, ale także znacząco przyczyniła się do poprawy standardu życia narodu poprzez promowanie jakości, innowacji i dumy z lokalnej gastronomii." #deepl:2207143835
 nationalization.11.g: "Triumf sztuki kulinarnej!" #deepl:1345745332
 nationalization.11.t: "La scienza in cucina e l'arte di mangiar bene" #deepl:3987888764
 pius.101.d: "Dwoje dzieci w górach południowo-wschodniej Francji twierdzi, że było świadkami objawienia Maryi Dziewicy, wywołując fale duchowego entuzjazmu - i niepokoju - w całym katolickim świecie." #deepl:1912784731
 pius.101.f: ""Podejdźcie bliżej, moje dzieci, nie bójcie się. Jestem tu, aby przynieść wam wspaniałą nowinę..."\n\nWysoko na alpejskich pastwiskach nad wioską La Salette, niedaleko Corps w południowo-wschodniej Francji, dwoje pastuszków donosi o wizji, która teraz porusza serca w całym chrześcijaństwie. Ukazała im się promieniejąca światłem i okryta smutkiem Pani. Płakała - łzami spadającymi na świat odwrócony od Boga. Mówiła o bluźnierstwach wypowiadanych bez wstydu, o sprofanowanych niedzielach oraz o głodzie i ruinie, które nadejdą, jeśli ludzkość się nie nawróci. To, co początkowo wydawało się rustykalną legendą, stało się ruchem. Pielgrzymi przybywają na odległe górskie zbocza. Mnisi i dziennikarze wspinają się po tych samych szlakach. Kościół waha się: niektórzy przyjmują wizję jako boskie wezwanie do pokuty; inni obawiają się wzrostu popularnego mistycyzmu i irracjonalnego zapału. Biskup Grenoble oferuje ostrożną aprobatę. Władze świeckie pozostają podejrzliwe, a Rzym? Rzym patrzy - milcząc. Ale już biją dzwony." #deepl:2145205681
 pius.101.g: "Niebiańskie ostrzeżenie." #deepl:3313498992
 pius.101.h: "Zachowaj racjonalność." #deepl:499500707
 pius.101.t: "Objawienie w La Salette" #deepl:3065761669
 pius.102.d: "W małym miasteczku Lourdes czternastoletnia dziewczynka twierdzi, że widziała promienną Panią w grocie. Jej wizje wkrótce przyciągają pielgrzymów, kontrowersje i uwagę Rzymu." #deepl:1624678567
 pius.102.f: ""Była młoda, bosa i biedna. W odległej grocie niedaleko Lourdes, u podnóża Pirenejów, wieśniaczka o imieniu Bernadette Soubirous opowiada o kobiecie ubranej na biało, z niebieską szarfą i złotymi różami na stopach. Wizja początkowo nic nie mówi - tylko się uśmiecha. Potem mówi: o pokucie, modlitwie, cierpieniu i Bożym miłosierdziu. Nazywa siebie po prostu: Niepokalane Poczęcie.\nNa początku mieszkańcy wioski szydzą. Ale kiedy Bernadetta odkrywa ukryte źródło i twierdzi, że jest to źródło uzdrowienia, tysiące ludzi zaczyna przybywać - z nadzieją, modląc się, płacząc. Kule zostają w tyle. Rozprzestrzeniają się referencje. Sceptycy potępiają histerię. Lekarze, księża i politycy zjeżdżają do Lourdes. Kościół prowadzi dochodzenie. Państwo patrzy ostrożnie. A ludzie wciąż przybywają." #deepl:580789021
 pius.102.g: "Sanktuarium uzdrowienia i nadziei." #deepl:2629250679
 pius.102.h: "Halucynacje!" #deepl:3891021600
 pius.102.t: "Objawienie w Lourdes" #deepl:1767463178
 pius.103.d: "W irlandzkiej wiosce Knock piętnastu świadków donosi o cichym objawieniu Dziewicy Maryi, Świętego Józefa i Świętego Jana Ewangelisty. Wizja ta porusza lud od dawna obciążony ubóstwem, wygnaniem i obcymi rządami." #deepl:143567078
 pius.103.f: ""Nie powiedzieli ani słowa. A jednak w tej ciszy naród usłyszał nadzieję." Deszcz lał nieprzerwanie nad kościołem parafialnym w Knock, w hrabstwie Mayo. A jednak piętnastu mieszkańców wioski stało nieruchomo. Przed nimi, skąpani w świetle na południowej ścianie szczytowej, stało ciche zgromadzenie: Dziewica Maryja w modlitewnej pozie; Święty Józef u jej boku; Święty Jan Ewangelista, ubrany i trzymający Ewangelię. Za nimi baranek na ołtarzu i krzyż. Nie wypowiedziano żadnego przesłania. Nie wykonano żadnego ruchu. A jednak świadkowie przysięgali na to, co widzieli - zarówno młodzi, jak i starzy, mężczyźni i kobiety. W kraju dotkniętym głodem, emigracją i duchową tęsknotą, cicha wizja odbiła się głośniejszym echem niż kazania. Wkrótce przybyli pielgrzymi, szukając uzdrowienia, znaków i pocieszenia. Angielskie władze szydziły. Niektórzy w Kościele wahali się. Ale wśród biednych i pobożnych Irlandczyków Knock stało się świętym wołaniem o godność." #deepl:216954390
 pius.103.g: "Światło w deszczu." #deepl:4199802423
 pius.103.h: "Odrzuć to jako folklor." #deepl:2853965001
 pius.103.t: "Cicha wizja w Knock" #deepl:3086062832
 pius.104.d: "W środkowej Portugalii troje pastuszków donosi o powtarzających się objawieniach Matki Boskiej, których kulminacją jest cudowne zjawisko obserwowane przez tysiące ludzi. Ich wizje niosą przepowiednie o wojnie, cierpieniu i przyszłości Kościoła." #deepl:3494130064
 pius.104.f: "Niedaleko miasta Fátima, na wiejskich wzgórzach Cova da Iria, trójka dzieci - Łucja, Franciszek i Hiacynta - mówi o Pani jaśniejszej niż słońce, odzianej w blask i smutek. W ciągu sześciu miesięcy pojawia się ona raz po raz, ostrzegając przed globalną wojną, wzrostem bezbożnych ideologii i prześladowaniami wiernych. Wzywa do pokuty, modlitwy i poświęcenia Rosji swojemu sercu. 13 października 1917 roku, gdy dziesiątki tysięcy stoją w ulewnym deszczu, słońce wydaje się odrywać od niebios, wirując i rozbijając się na niebie. Niektórzy padają na kolana. Inni uciekają. Gdy gaśnie światło, ich ubrania są suche. Tłum rozchodzi się w ciszy, przerażony i przestraszony. Kościół jest ostrożny. Prasa jest podzielona. Ale wśród ludzi - zwłaszcza ubogich, rannych i wiernych - rozpala się nowy płomień: płomień nadziei, płomień ostrzeżenia, płomień, który postrzega Dziewicę nie tylko jako matkę, ale jako strażniczkę przyszłego wieku." #deepl:2513437425
 pius.104.g: "Zwróć uwagę na ostrzeżenia z Fatimy." #deepl:1664428204
 pius.104.h: "Obalić cud solarny." #deepl:958137642
 pius.104.t: "Tajemnice Fatimy" #deepl:1100906175
 pius.105.d: "W odległej wiosce w pobliżu [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName] pojawiają się doniesienia o objawieniu Matki Boskiej. Historia szybko się rozprzestrzenia, przyciągając pielgrzymów, sceptyków i uwagę władz kościelnych." #deepl:45703861
 pius.105.f: ""Stała ponad polami w koronie światła i patrzyła na nas, jakby znała smutek każdej duszy". Pierwsze przemówiło dziecko - oczy szeroko otwarte z przerażenia, drżący głos. Mówiło o kobiecie jaśniejszej niż świt, otulonej blaskiem i smutkiem, która pojawiła się w ciszy i obserwowała świat z głębokim, świadomym smutkiem. Inni też twierdzili, że ją widzą. Niektórzy padli na kolana. Inni uciekli. Wszyscy pamiętali ciszę, która po tym nastąpiła. Historia rozprzestrzeniła się poza wioskę. Przybyli pielgrzymi ze świecami w rękach. Wierni modlili się. Cierpiący mieli nadzieję. Księża debatowali. Urzędnicy unosili brwi. Ale ludzie wciąż przybywali - przyciągani nie przez pewność, ale przez coś starszego: potrzebę wiary. Niezależnie od tego, czy był to cud, wizja czy mit, wydarzenie to już ukształtowało serca tych, którzy byli jego świadkami - i życie tych, którzy muszą teraz zdecydować, co to oznacza." #deepl:3063415784
 pius.105.g: "Znak dla wiernych." #deepl:1177288670
 pius.105.h: "Stłumić histerię." #deepl:1037767630
 pius.105.t: "Matka Boża z [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName]" #deepl:4095895438
 pius.111.d: "Pomimo oficjalnych nakazów zabraniających publicznych pokazów, tłum wiernych rozpoczął spontaniczną procesję w kierunku miejsca objawienia maryjnego na stronie [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName]." #deepl:3379456873
 pius.111.f: ""Nie zapaliliśmy pochodni, nie nieśliśmy sztandarów. Tylko różańce, cisza i nasze stopy w pyle." Przyszli o świcie, dwójkami i trójkami, idąc przez pola i wioski, szepcząc modlitwy. Do południa były ich setki, płynące wzdłuż wiejskich dróg, niektórzy boso, inni płacząc. Kobiety trzymały kwiaty. Starzy mężczyźni mruczeli litanie. Dzieci ściskały ikony wyrzeźbione z drewna. Władze ogłosiły, że miejsce jest zamknięte. Żołnierze stali na straży. Nikt jednak nie powstrzymał tłumu. Być może był to śpiew. Być może cisza. Być może coś niewidzialnego. Gdy wierni dotarli do miejsca wizji, uklękli, szemrali modlitwy i zapalili świece w ziemi. Żaden głos nie grzmiał z nieba. Nie zaobserwowano żadnego cudu. Ale coś już się zmieniło. Ludzie działali - nie wbrew prawu, ale w posłuszeństwie czemuś starszemu niż prawo." #deepl:2369382513
 pius.111.g: "Niech się modlą." #deepl:2163336687
 pius.111.h: "Obserwuj po cichu." #deepl:3862482018
 pius.111.h_tt: "Istnieje duże prawdopodobieństwo, że po objawieniu maryjnym nastąpią kolejne wydarzenia." #deepl:2612943668
 pius.111.i: "Rozproszyć ich siłą." #deepl:1733449904
 pius.111.i_tt: "Bardzo duża szansa na krwawą kolizję." #deepl:202372566
 pius.111.t: "Niezakazana procesja" #deepl:3613794317
 pius.112.d: "Konfrontacja między władzami a wiernymi w miejscu zakazanej procesji maryjnej stała się brutalna. Ziemia, na której niegdyś wizje budziły nadzieję, teraz nosi plamę krwi." #deepl:2719807490
 pius.112.f: ""Były modlitwy, a potem krzyki." Świece wciąż migotały, gdy przybyli żołnierze. Głosy podniosły się w zamieszaniu, a następnie w błaganiu. Kobieta upadła. Chłopiec krzyknął. Nikt nie wie, kto wydał rozkaz - ale muszkiety szczekały, pałki huśtały się, buty poruszały się po kadzidle i ziemi. Kiedy cisza powróciła, była cięższa niż wcześniej. Kościół jest wstrząśnięty. Wierni są oburzeni. Prasa mówi ściszonym tonem - niektórzy nazywają to wypadkiem, inni masakrą. Miejsce, niegdyś szeptane jako święte, jest teraz przeklęte przez pamięć. A ludzie wciąż się gromadzą - nie z kwiatami, ale z gniewem, z ciszą, ze spojrzeniem, którego żadne prawo nie może ugasić." #deepl:2186004653
 pius.112.g: "Żałujemy tego, co się stało." #deepl:3313805008
 pius.112.h: "Sami to na siebie sprowadzili." #deepl:402397332
 pius.112.t: "Krew na świętej ziemi" #deepl:1312740775
 pius.113.d: "Miejscowy ksiądz stał się głównym obrońcą objawienia maryjnego na stronie [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName]. Jego kazania przyciągają tłumy, jego słowa budzą nadzieję - i rzucają wyzwanie władzy państwowej. Nazywa się ojciec [SCOPE.sCharacter('pius_marian_priest_scope').GetFirstName]." #deepl:1046441460
 pius.113.f: ""Ukazała się pokornym, a nie potężnym. Być może dlatego chcą ją uciszyć". W kamiennym kościele nad wioską ksiądz o imieniu [SCOPE.sCharacter('pius_marian_priest_scope').GetFirstName] zaczął głosić kazania - nie tylko o miłosierdziu Dziewicy, ale także o jej sprawiedliwości. Jego słowa odbijają się echem poza nawą: "Jeśli Niebo przemówiło tutaj, to żaden rząd nie może zabronić jego echa." Pielgrzymi gromadzą się na jego kazaniach. Jego imię rozprzestrzenia się szeptem i w hymnach. Wzywa do pokoju, ale jego obecność wywołuje niepokoje. Niektórzy nazywają go prorokiem. Inni - buntownikiem w szatach. Władze stają się niespokojne. Wojsko mówi o podżeganiu. Hierarchia kościelna waha się - rozdarta między dogmatem a dyplomacją. Na twoje biurko trafia cicha propozycja: Można go usunąć. Po cichu. Dyskretnie. Ale niektórzy ludzie, gdy są uciszani, mówią jeszcze głośniej." #deepl:2395659126
 pius.113.g: "Niech głosi kazania." #deepl:3471579290
 pius.113.h: "Wezwij go do stolicy na negocjacje." #deepl:1641636788
 pius.113.i: "Spraw, by zniknął." #deepl:3010062703
 pius.113.t: "Głos z ambony" #deepl:3682486724
 pius.114.d: "W całym kraju wierzący katolicy rozpoczęli publiczne demonstracje poparcia dla objawienia maryjnego. To, co zaczęło się jako wiejska pielgrzymka, stało się ruchem narodowym." #deepl:3473602537
 pius.114.f: ""Szli z różańcami w dłoniach, dziećmi na ramionach i imieniem Dziewicy na ustach". Od wiosek rybackich po miasta fabryczne, znaki są takie same: świece płonące w oknach, hymny odbijające się echem po placach miejskich, tysiące gromadzących się w ciszy. Nie powiewają żadne sztandary - tylko posągi, ikony i jedno imię szeptane raz po raz: Maria. To, co zaczęło się jako pobożność, stało się buntem. W odpowiedzi na przemoc w świętym miejscu [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName] wierni wyszli na ulice. Nie krzyczą. Modlą się. Ale ich liczba rośnie z dnia na dzień. Niektórzy w rządzie wzywają do tolerancji. Inni domagają się represji. Wojsko jest niespokojne. A w domach w całym kraju nawet wątpiący zastanawiają się: jeśli tak wielu wierzy, czy to wciąż może być kłamstwo?" #deepl:3107082794
 pius.114.g: "Zezwól na procesję narodową." #deepl:3918828179
 pius.114.h: "Zakazać procesji narodowych." #deepl:1813497751
 pius.114.t: "Procesja, która wstrząsnęła narodem" #deepl:738056863
 pius.115.d: "Poważna klęska nieurodzaju dotknęła kilka wiejskich regionów [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName]. Wśród wiernych zaczyna szerzyć się niebezpieczny szept: że Dziewica, niegdyś uciszona przez państwo, teraz płacze - i karze." #deepl:3238123436
 pius.115.f: ""Prosiła o modlitwy. Daliśmy jej żołnierzy." Deszcze zawiodły. Pszenica pożółkła zbyt wcześnie. Ziemniaki gniły pod ziemią, niewidoczne i gorzkie. Mieszkańcy wiosek mówią o polach, które czują się... opuszczone. Nie tylko przez ludzi, ale i przez miłosierdzie. I tak szepczą. O kobiecie w świetle, która kiedyś się pojawiła - i została wyśmiana. O kapłanie, który zniknął. O zapieczętowanej świątyni i pobitych pielgrzymach. Teraz, jak mówią, odwróciła twarz. Znicze znów płoną, ale teraz za zasłoniętymi oknami. Matki chrzczą dzieci w tajemnicy. Starzy mężczyźni zakopują skórki chleba jako ofiary. Kościół nie śmie mówić, ale ludzie już wierzą: To jest jej smutek. Albo ostrzeżenie." #deepl:2485032935
 pius.115.g: "Przesąd! Mam nadzieję..." #deepl:2447781343
 pius.115.t: "Pola leżą puste" #deepl:3151937266
 pius.116.d: "Po latach represji i zaprzeczania cudom, wielu niegdyś pobożnych obywateli zaczęło porzucać wiarę w [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName]. Coraz więcej z nich określa siebie nie jako katolików, ale w ogóle jako katolików." #deepl:1323000478
 pius.116.f: "Ona już nie przychodzi. Ani w snach, ani w wizjach. Świece zgasły." Kapliczka jest zamknięta. Kapłan odszedł. Pola milczą. Był czas, kiedy nawet najbiedniejsi szeptali Ave Marias przed snem, kiedy ikony wisiały obok palenisk, a łzy spadały na dźwięk dzwonów. Teraz kościoły stoją puste. Dzieci pytają, czym była "spowiedź". Młodzi mówią o Rozumie, o Postępie, o Niczym. Ludzie nie zwrócili się ku ideologii. Zwrócili się do popiołu. Nie są radykałami. Są wyczerpani. I gdzieś w pustej ciszy pozostaje pytanie: czy ona nas opuściła - czy my ją opuściliśmy?" #deepl:231766477
 pius.116.g: "Wiek Wiary już minął." #deepl:146424195
 pius.116.t: "Cisza poza dzwonem" #deepl:2179217507
 pius.119.d: "Nowo ustanowiony ateistyczny rząd nakazał zamknięcie miejsca pielgrzymek maryjnych. To, co niegdyś było miejscem światła i modlitwy, jest teraz odgrodzone i milczy pod nadzorem państwa." #deepl:1939840262
 pius.119.f: ""Nie dzwoniły dzwony. Nie paliły się świece. Bramy zostały zamknięte przed wschodem słońca." Sanktuarium, które niegdyś przyciągało tysiące ludzi, stoi teraz samotnie. Na drzwiach kaplicy przybito tabliczkę: "Z rozkazu Zgromadzenia Ludowego struktura ta zostaje uznana za nieistotną". Strażnicy stoją na straży, nie po to, by chronić, ale by zapobiegać. Nie użyto siły. Nie zezwolono na protesty. Zmiana nastąpiła po cichu, biurokratycznie - raczej nieobecność niż eksplozja. Jednak w domach w całym kraju drżą starsze ręce. Babcie chowają różańce. Dzieci pytają, dlaczego pielgrzymi już nie śpiewają. Duchowni milczą. Partia mówi o nauce, rozsądku i postępie. A gdzieś za zamkniętymi drzwiami pytanie migocze jak na wpół zgaszona świeca: Czy to było naprawdę konieczne?" #deepl:3255413028
 pius.119.g: "Nie budujemy już pomników iluzji." #deepl:702720701
 pius.119.t: "Zamknięcie sanktuarium" #deepl:589514149
 pius.121.d: "Objawienie maryjne na stronie [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName] zostało oficjalnie uznane za pozytywny znak. Ale nawet teraz jego prawdziwe znaczenie pozostaje otwarte na interpretację." #deepl:181746716
 pius.121.f: "W ciągu kilku tygodni, odkąd promienna postać ukazała się mieszkańcom wioski, nie pojawiły się żadne dalsze znaki. Żadnego ognia z nieba. Żadnego głosu w chmurach. Tylko spokojne niebo i powracające echo zdumienia.\nJednak ludzie mówią - o pokoju, o uzdrowieniu, o czymś, co zmieniło się w duszy narodu. Pielgrzymi przybywają nie w szale, ale z szacunkiem. Duchowni głoszą łagodne kazania. Prasa, choć raz, donosi bez kpin: Co oznacza ten cud?" #deepl:3589438214
 pius.121.g: "Błogosławieństwo dla zwykłych ludzi." #deepl:560950828
 pius.121.h: "Boski znak dla naszych duchownych." #deepl:2114621818
 pius.121.h_tt: "Środek ten może mieć nieznane, poważne konsekwencje." #deepl:1123613034
 pius.121.i: "Wskazanie legalności naszego rządu." #deepl:1976662076
 pius.121.t: "Co ona ma na myśli?" #deepl:1525290236
 pius.122.d: "Miejsce objawień maryjnych stało się obecnie w pełni uznanym miejscem pielgrzymek, przyciągającym coraz większą liczbę wiernych z bliska i daleka." #deepl:3557311135
 pius.122.f: ""Tam, gdzie kiedyś były tylko pastwiska, teraz stoją świece, róże i ciche kroki tysięcy ludzi." Drogi się poszerzyły. Pola zostały oczyszczone. Skromna kaplica wznosi się w pobliżu miejsca, w którym dzieci mówiły kiedyś o Pani odzianej w światło. Każdego dnia przybywają pielgrzymi: rolnicy z synami, wdowy w czerni, żołnierze na urlopie, matki szepczące modlitwy za swoje nienarodzone dzieci. Kościół uznał świętość tego miejsca. Budowane jest sanktuarium. Na jego obrzeżach kwitną targowiska, oferujące chleb, medaliki, różańce, wino. To, w co kiedyś wątpiono w salonach, teraz jest obecne w kościach narodu. A gdy w dolinie rozbrzmiewają dzwony, można się zastanawiać: Czy ta wiara się odradza, czy jest zalążkiem czegoś większego, co dopiero nadejdzie?" #deepl:307938956
 pius.122.g: "Totus tuus." #deepl:314650754
 pius.122.t: "Sanktuarium [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName]" #deepl:3872076082
