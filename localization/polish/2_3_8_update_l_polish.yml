 verrier.308.d: "Astronomowie przewidzieli tranzyt Wenus w regionie Australii, Indonezji i Pacyfiku w roku #ORANGE 1874#!. Społeczność naukowa [ROOT.GetCountry.GetNameNoFlag] domaga się obserwacji tego jedynego w swoim rodzaju wydarzenia astronomicznego." #deepl:1738426681
 verrier.308.f: "Tranzyt Wenus to przejście planety Wenus przed Słońcem. Zjawisko to występuje tylko cztery razy w ciągu około 243 lat. W przeszłości precyzyjne pomiary takich przejść miały ogromne znaczenie dla określenia odległości między Ziemią a Słońcem (jednostka astronomiczna) i dały początek wielu ekspedycjom i kampaniom pomiarowym prowadzonym przez ważne instytuty i naukowców. Tranzyt Wenus w 1874 roku był stosunkowo niekorzystny dla pomiarów astronomicznych. Pozostał niewidoczny z prawie całej Europy, długie czasy tranzytu obserwowano tylko z Azji, a krótkie czasy tranzytu z Australii, wysp południowego Pacyfiku i południowego Oceanu Indyjskiego (zwłaszcza Archipelagu Kerguelena). Mimo to wysłano około 60 ekspedycji." #deepl:3786277450
 verrier.308.g: "Nie powinniśmy tego przegapić." #deepl:2334937119
 verrier.308.t: "Tranzyt Wenus w 1874 roku" #deepl:3101017563
 verrier.309.d: "Astronomowie przewidują kolejny tranzyt Wenus w regionach Ameryki Południowej, Ameryki Środkowej i Ameryki Północno-Wschodniej w roku #ORANGE 1882#!. Społeczność naukowa [ROOT.GetCountry.GetNameNoFlag] domaga się obserwacji tego jedynego w swoim rodzaju wydarzenia astronomicznego." #deepl:3366532829
 verrier.309.f: "Tranzyt Wenus to przejście planety Wenus przed Słońcem. Zjawisko to występuje tylko cztery razy w ciągu około 243 lat. W przeszłości precyzyjne pomiary takich przejść miały ogromne znaczenie dla określenia odległości między Ziemią a Słońcem (jednostka astronomiczna) i dały początek wielu ekspedycjom i kampaniom pomiarowym prowadzonym przez ważne instytuty i naukowców. Tranzyt Wenus z 1882 roku miał pewne zalety w porównaniu z tranzytem z 1874 roku, ponieważ był widoczny w niektórych bardziej dostępnych regionach. Tranzyt był widoczny na całym kontynencie amerykańskim, z wyjątkiem północnej i północno-wschodniej części Ameryki Północnej." #deepl:1503344549
 verrier.309.t: "Tranzyt Wenus w 1882 roku" #deepl:2995649523
 verrier.311.d: "Zbliża się rzadkie wydarzenie astronomiczne: planeta Wenus przejdzie przez tarczę Słońca. Na całym świecie obserwatoria i rządy rozpoczynają przygotowania." #deepl:4200477530
 verrier.311.f: "Data została obliczona z dokładnością do sekundy. Teleskopy są pakowane. Zegary zsynchronizowane. Planeta Wenus przetnie tarczę Słońca. Astronomowie wierzą, że tranzyt pozwoli na precyzyjny pomiar jednostki astronomicznej, podstawowej skali Układu Słonecznego. Sukces tego przedsięwzięcia zależy jednak wyłącznie od widoczności - lokalizacji, pogody i koordynacji." #deepl:2621945333
 verrier.311.g: "Obserwujemy tranzyt z domu." #deepl:2383387639
 verrier.311.h: "Wysyłamy ekspedycję do jednego z naszych protektoratów." #deepl:1098022190
 verrier.311.i: "Wysyłamy ekspedycję do odległego kraju." #deepl:381412623
 verrier.311.j: "Powinniśmy to jeszcze raz przemyśleć." #deepl:1178423846
 verrier.311.t: "Przygotowanie do tranzytu Wenus" #deepl:967668025
 verrier.319.d: "Ekspedycja z [SCOPE.sCountry('verrier_venus_transit_leader').GetName] przybyła na nasze terytorium, aby obserwować rzadkie zjawisko astronomiczne, jakim jest tranzyt Wenus." #deepl:853589
 verrier.319.f: "Wysiedli ze skrzyniami soczewek, zegarów i wykresów. Ich rzecznicy spotkali się z przedstawicielami uniwersytetów, oferując przyjazną korespondencję i informacje techniczne. Asystenci obserwatorium są zaciekawieni, gazety neutralne, ale czujne. Kilka wydziałów debatuje nad implikacjami: współpraca naukowa, tak - ale także wymiana danych, suwerenność logistyczna i widoczność na arenie światowej." #deepl:209223472
 verrier.319.g: "Niech nauka będzie naszym wspólnym językiem." #deepl:183308092
 verrier.319.t: "Foreign Eyes to the Sky" #deepl:4019861958
 verrier.321.d: "Gwałtowny sztorm uderzył w statek ekspedycyjny podczas rejsu. Wśród rozbijających się fal i chaotycznego olinowania, kilka skrzyń zostało wyrwanych z pokładu i utraconych przez morze - w tym delikatne instrumenty tranzytowe." #deepl:2127492192
 verrier.321.f: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName] Przylgnął do relingu, gdy niebo się rozpadło. Morze podniosło się jak wróg, ciskając linami i beczkami po pokładzie. Skrzynie - dwie z nich - zsunęły się po przerażającym łuku, po czym zniknęły w ciemności. Później, gdy burza minęła i pozostała tylko cisza, policzono uszkodzenia. Główny heliometr. Podwójna soczewka z Królewca. Kilka precyzyjnych czasomierzy. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] stał wśród przemoczonej załogi i połamanego drewna, wpatrując się w pustkę, w której znajdował się sprzęt. Istniały kopie zapasowe. Ale żadna z nich nie była bezbłędna. A czas - jak Wenus - nie czeka na nikogo." #deepl:2744264311
 verrier.321.g: "Kontynuuj. Wciąż mamy wystarczająco dużo, aby kontynuować." #deepl:1985224258
 verrier.321.t: "Burza nad tranzytem" #deepl:2256455346
 verrier.322.d: "Podczas nocnej kalibracji pola gwiezdnego astronom ekspedycji zauważył nieregularne ruchy i stałe punkty tam, gdzie nie powinno ich być. Dalsze porównanie z dostępnymi mapami gwiazd potwierdziło to: zespół mógł zidentyfikować nowe, niezbadane ciała niebieskie." #deepl:2064965258
 verrier.322.f: "Statek dryfował pod aksamitnym niebem. Chmury rozpadły się kilka godzin wcześniej, pozostawiając po sobie przejrzystość tak czystą, że aż nienaturalną. Dr [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] ponownie pochylił się do okularu. Pomiędzy Altairem a krawędzią siatki sekstantu był ruch. Zbyt powolny jak na kometę. Zbyt jednostajny jak na usterkę. Noc po nocy [ROOT.Var('verrier_astronomer_var').GetCharacter.GetSheHe] wracał do tego samego skrawka nieba, szkicując, obliczając, porównując. W końcu notatki na stronie [ROOT.Var('verrier_astronomer_var').GetCharacter.GetHerHis] potwierdziły, że jest to niewielki obiekt planetarny. Prawdopodobnie dwie. Nieskatalogowany. Wenus miała czekać. Ale gwiazdy oferowały już coś innego." #deepl:1791725592
 verrier.322.g: "Niech to będzie wiadome: niebiosa wciąż skrywają tajemnice." #deepl:1342826733
 verrier.322.t: "Nieoczekiwane światła" #deepl:1561684464
 verrier.323.d: "Podczas przerwy w podróży zespół ekspedycyjny udał się w głąb lądu, aby zbadać potencjalne punkty wzniesienia do obserwacji astronomicznych. Zamiast tego znaleźli gaj nieznanych roślin - z których żadna nie pojawia się w dostępnych zapisach botanicznych." #deepl:3286240010
 verrier.323.f: "Zaczęło się od zapachu. Subtelny, ostry cytrusowy, unoszący się z paproci na skraju lasu. Dr [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] podążyła za zapachem przez gęste zarośla i znalazła polanę, na której światło kłębiło się jak woda. Tam łodygi głębokiego fioletu rozkwitły w idealnej spirali. Czerwony mech pokrywał obsydianowe kamienie. Wysoko w górze kępy winorośli w kształcie zwisających gwiazd kołysały się na wietrze. Nikt nie potrafił ich nazwać. Jeden z młodszych asystentów szepnął: "Wygląda to tak, jakby niebo spadło na ziemię." Przybyli, by ścigać planetę Wenus. Ale tutaj, w nieruchomym powietrzu i przefiltrowanym świetle, znaleźli inny rodzaj cudu." #deepl:808904157
 verrier.323.g: "Zbierz próbki i zachowaj je do badań." #deepl:1767661174
 verrier.323.t: "Ogród między gwiazdami" #deepl:2845961206
 verrier.324.d: "Podczas poszukiwań podwyższonego terenu obserwacyjnego ekspedycja natknęła się na miejsce o ogromnym znaczeniu geologicznym. Otaczający kamień zawiera wzory i inkluzje rzadko - jeśli w ogóle - widziane wcześniej." #deepl:539957699
 verrier.324.f: "Dr [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] przesunął [ROOT.Var('verrier_astronomer_var').GetCharacter.GetHerHis] dłonią po warstwowej powierzchni odkrywki. Mieniła się słabo w porannym świetle, popękana szwami o metalicznym połysku. Zawirowania głębokiej zieleni zwijały się wokół pomarańczowych rdzeni kryształów, tworząc wzór, który wyglądał niemal celowo. W pobliżu inna płyta ujawniła skamieniałą bańkę - pustą i wciąż nienaruszoną. Geolog z zespołu zasugerował pochodzenie wulkaniczne. Inny potrząsnął głową: "To jest starsze niż cokolwiek, co widziałem". Instrumenty, które przynieśli, zostały zbudowane do obserwacji nieba. Ale tutaj, w skale pod ich butami, znajdował się fragment głębokiej pamięci Ziemi." #deepl:908721635
 verrier.324.g: "To znalezisko należy do historii samej Ziemi." #deepl:2450655201
 verrier.324.t: "Kamień poza czasem" #deepl:2335051515
 verrier.325.d: "Ekspedycja dotarła do portu wejścia - ale władze celne odmawiają natychmiastowej odprawy. Kilka skrzyń ze sprzętem naukowym zostało zatrzymanych do kontroli, a funkcjonariusze żądają dodatkowej dokumentacji, która nigdy wcześniej nie była wymagana." #deepl:2525277400
 verrier.325.f: "Dr [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] stał obok manifestu ładunku z zaciśniętymi zębami. Rtęciowe soczewki, precyzyjne zegary, obudowa z polerowanego mosiądzu - leżały bezwładnie w magazynie za zamkniętą bramą, czekając na tusz i pieczątki. Celnik był uprzejmy, ale stanowczy: "Naukowe czy nie, wszystkie zagraniczne instrumenty muszą być zadeklarowane, sprawdzone i opodatkowane, chyba że są zwolnione na mocy traktatu." Nie było czasu na traktaty. Na zewnątrz słońce wciąż wschodziło. A Wenus nie czekała na biurokrację." #deepl:34765689
 verrier.325.g: "Uiścić opłatę i przyspieszyć odprawę." #deepl:240478226
 verrier.325.t: "Bariery pod niebem" #deepl:2346862710
 verrier.340.d: "Po tygodniach przygotowań stanowisko obserwacyjne do tranzytu Wenus jest gotowe. Instrumenty są skalibrowane. Wykresy są zweryfikowane. Jedyną niewiadomą jest teraz niebo." #deepl:1138273071
 verrier.340.f: "Kopuła wznosiła się niczym latarnia morska z mosiądzu i cichym przeznaczeniem. Niezależnie od tego, czy zbudowano ją z kamienia na ojczystej ziemi, czy z płótna i nitów na obcym polu, teraz mieściła w sobie zapierający dech w piersiach spokój oczekiwania.  Wewnątrz heliometr lśnił w świetle lampy. Koła zębate obracały się szeptem. Zegary klikały w oczekiwaniu. Na zewnątrz asystenci usuwali kurz z soczewek. Nawet powietrze zdawało się wahać. Dr [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] stanął przy drzwiach i dotknął progu. Od miesięcy wszystko zmierzało ku tej chwili. Teraz nie było już nic do zbudowania, pozostało tylko czekać. Nad nimi, gdzieś na niewidocznym niebie, Wenus podążała swoją ścieżką." #deepl:2967275520
 verrier.340.g: "Precyzja zaczyna się od spokojnych rąk." #deepl:2872475059
 verrier.340.t: "Obserwatorium gotowe na tranzyt Wenus" #deepl:966063237
 verrier.341.d: "Dr [ROOT.Var('gaudi_engineer_var').GetCharacter.GetLastName] zaproponował niewielką, ale znaczącą zmianę wewnętrznego stabilizatora głównego teleskopu. Modyfikacja mogłaby zmniejszyć wewnętrzne wibracje i zwiększyć ostrość optyczną w momencie kontaktu." #deepl:491784908
 verrier.341.f: "Wydarzyło się to nie w kopule, ale w namiocie warsztatowym za nią. Dr [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] przeglądał wykresy, gdy podszedł do niego dr [ROOT.Var('gaudi_engineer_var').GetCharacter.GetLastName], trzymając notatnik umazany smarem. Ponownie obliczone napięcie bufora. Inni słuchali z pełnym szacunku sceptycyzmem - dopóki testy tego nie dowiodły: obraz był stabilniejszy o ułamki stopni. Wystarczająco, by przesunąć granicę między rozmyciem a wyrazistością." #deepl:2995793810
 verrier.341.g: "Mała zmiana z wielką precyzją." #deepl:1641676745
 verrier.341.t: "Ciche dostosowanie" #deepl:3486983252
 verrier.342.d: "Niedawny przełom w teorii elektromagnetycznej umożliwił zastosowanie nowej metody filtrowania optycznego w protokole obserwacji teleskopu. Zakłócenia spowodowane rozpraszaniem światła atmosferycznego mogą być teraz lepiej uwzględnione, co skutkuje wyraźniejszymi danymi wizualnymi." #deepl:2503805121
 verrier.342.f: "Pomysł nie pochodził z kopuły, ani z ławki obiektywu, ale z kartki papieru. Było to udoskonalenie równań falowych - jak światło zachowuje się nie tylko jako cząstka lub promień, ale jako oscylujące pole. Dzięki temu można było przewidzieć nowy model interferencji i zastosować korektę. Filtry zostały zmienione. Dostosowano czasy ekspozycji. Inżynierowie ponownie sprawdzili swoje wątpliwości. Kiedy dr [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] spojrzał tej nocy przez obiektyw testowy, gwiazdy już nie drgały. Stały - precyzyjne, zimne, prawdziwe. Niebo przestało się trząść." #deepl:914121255
 verrier.342.g: "Matematyka wyostrza wzrok." #deepl:2639991371
 verrier.342.t: "Równanie jasności" #deepl:1039194191
 verrier.351.d: "Na wszystkich kontynentach i oceanach, od Jokohamy po Reunion, od Kerguelen po Pekin, astronomowie obserwowali, jak planeta Wenus przechodzi przez tarczę Słońca. Tranzyt z 1874 roku został zakończony - a wiele zespołów donosi o sukcesie." #deepl:3119534429
 verrier.351.f: "Przybyli parowcami, na wielbłądach, koleją i pieszo. Inżynierowie, botanicy, kartografowie. Budowali obserwatoria w dżunglach i na pustyniach. Badali pogodę, mierzyli cienie, polerowali soczewki, aż drżały im dłonie. 9 grudnia 1874 roku przez sześć godzin obserwowali czarną kropkę przesuwającą się po tarczy Słońca. Wenus wchodziła jak szept i wychodziła jak tajemnica. Pomiary nie były doskonałe, ale wystarczające. Można było rozpocząć triangulację. Po raz pierwszy ludzkość mogła poznać prawdziwą skalę swojego Układu Słonecznego - nie w micie czy metaforze, ale w liczbach wyznaczonych przez cień. Dr [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] zamknął notatnik [ROOT.Var('verrier_astronomer_var').GetCharacter.GetHerHis] i odetchnął: Zrobione." #deepl:1827747392
 verrier.351.g: "Jest piękny" #deepl:2882436754
 verrier.351.t: "Tranzyt z 1874 r." #deepl:2395808814
 verrier.352.d: "6 grudnia 1882 roku planeta Wenus ponownie znalazła się przed Słońcem. Po raz ostatni od stulecia obserwatorzy na całym świecie skierowali swoje instrumenty na niebo i uchwycili czarny dysk Wenus w locie." #deepl:3903856343
 verrier.352.f: "Tym razem statki wyruszyły wcześniej. Obserwatoria były solidniejsze. Zegary bardziej precyzyjne. Lekcje wyniesione z 1874 roku kierowały każdą ręką, każdym cieniem, każdym obliczeniem. Od New Jersey po Patagonię, od Meksyku po Australię, świat stanął w miejscu, by zobaczyć kropkę na Słońcu. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] ustawił ostateczny filtr. Pojawił się dysk, przesuwając się powoli po płonącej bieli. Nie było wiwatów, tylko szelest długopisów, kliknięcie okiennic, cichy oddech triumfu. Minie kolejne 121 lat, zanim Wenus powróci. Ale tutaj, w tym momencie, czas sam się odmierzał." #deepl:907305697
 verrier.352.g: "Nigdy nie zobaczymy następnego." #deepl:2603880366
 verrier.352.t: "Tranzyt z 1882 r." #deepl:2224364038
 verrier.353.d: "Gdy zbliża się długo wyczekiwany moment, warunki pogodowe zaczynają się pogarszać. Nadciągają chmury - nie na tyle gęste, by przesłonić wszystko, ale wystarczające, by zakłócić przejrzystość i wyczucie czasu." #deepl:1325753029
 verrier.353.f: "Niebo nie zamknęło się całkowicie, ale nie było już posłuszne. Warstwy dryfujących chmur rozpościerały się nad słońcem niczym gaza. Światło przygasało i rozbłyskało w nierównych impulsach. Każda soczewka walczyła o równowagę, każdy asystent o oddech.\n\nDr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] trzymał [ROOT.Var('verrier_astronomer_var').GetCharacter.GetHerHis] oko przez filtr. Wyłoniła się sylwetka Wenus - słaba, załamana, tańcząca między parą a obliczeniami. Nie był to czysty łuk. Żadna podręcznikowa obserwacja. Ale były to dane. Dane ciężko zdobyte pod kapryśnym niebem." #deepl:1908038831
 verrier.353.g: "Jeśli niebiosa dają nam kawałki, musimy je połączyć." #deepl:1646978536
 verrier.353.t: "Przez welony światła" #deepl:674640397
 verrier.354.d: "Podczas tranzytu Wenus zespół obserwatorów zarejestrował nie tylko dokładne dane, ale także obrazy. Dziesiątki płyt fotograficznych zostały kolejno naświetlone, a następnie zmontowane w ruch. Po raz pierwszy w historii tranzyt planety został zarejestrowany w formie filmu." #deepl:2258153461
 verrier.354.f: "Migocze. Drży. Ale porusza się. Na serii przetworzonych płyt Wenus wchodzi z krawędzi, idealna czarna kropka przesuwająca się po dysku słonecznym. Nie tylko obliczenia, nie szkic - ruch. Uchwycony w czasie. Dr [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] stał w ciemni z podniesioną latarnią, obserwując powtarzającą się krótką sekwencję. Sześć godzin pomiarów, skondensowanych w sekundy zachwytu. Astronomowie bili brawo. Wiedzieli, że dokonali czegoś nowego. Sprawili, że niebo się poruszyło." #deepl:1856959975
 verrier.354.g: "Analiza ramek w celu ulepszenia modeli ruchu planet." #deepl:3348594448
 verrier.354.t: "Poruszający się cień" #deepl:969441096
 verrier.355.d: "Zainspirowany globalnymi emocjami związanymi z tranzytem Wenus w 1882 roku, [ROOT.Var('elgar_composer_var').GetCharacter.GetFullName] napisał nowy uroczysty utwór. Marsz, którego premiera odbyła się przed szeroką publicznością, oddaje zarówno majestat tego wydarzenia, jak i rytm nowego wieku nauki." #deepl:1566390789
 verrier.355.f: "Rok po tranzycie Wenus w 1882 roku, John Philip Sousa otrzymał zlecenie skomponowania procesji na odsłonięcie brązowego pomnika amerykańskiego fizyka Josepha Henry'ego, który zmarł w 1878 roku. Będąc masonem, Sousa był zafascynowany tym, co grupa uważała za mistyczne cechy zjawisk naturalnych. Utwór nigdy nie zdobył popularności za życia Sousy. Nie był grany przez wiele lat po tym, jak rękopiśmienne kopie muzyki Sousy zostały zniszczone przez powódź." #deepl:3349639062
 verrier.355.g: "Niektóre utwory są pisane dla historii, a nie dla tłumów." #deepl:1666827653
 verrier.355.t: "Marsz Wenus" #deepl:1281729794
 verrier_add_x_venus_success_0_tt: "Gain no #V Venus Transit Observation Success#!." #deepl:2753469077
 verrier_add_x_venus_success_minus_x_tt: "Stracić [SCOPE.GetValue('verrier_venus_success_amount')|0+] #V  Sukces obserwacji tranzytu Wenus#!." #deepl:867568724
 verrier_add_x_venus_success_plus_x_tt: "Zysk [SCOPE.GetValue('verrier_venus_success_amount')|0+] #V  Sukces obserwacji tranzytu Wenus#!." #deepl:667317191
 verrier_foreign_venus_expedition_modifier: "Zagraniczna wyprawa tranzytowa na Wenus" #deepl:253236392
 verrier_venus_transit_diplomacy_modifier: "Negocjacje dyplomatyczne w sprawie tranzytu Wenus" #deepl:1903396933
 verrier_venus_transit_preparation_modifier: "Przygotowania do tranzytu Wenus" #deepl:3653758437
 vikelas.21.d: "W sali gimnastycznej [SCOPE.sState('vikelas_basketball_state').GetName] wymyślono nową grę - taką, która pewnego dnia może odbić się echem w halach i na stadionach na całym świecie." #deepl:3471187932
 vikelas.21.f: ""Żadnego kopania. Żadnego biegania z piłką. I dwa kosze na brzoskwinie przybite do galerii."\n\nW [TimeKeeper.GetCurrentDate.Format('y')], w szkole w [SCOPE.sState('vikelas_basketball_state').GetFarmHubName], dr [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] stanął przed problemem: jak utrzymać [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] niespokojnych uczniów aktywnych w domu podczas zimy. [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis|U] Rozwiązanie było proste - i dziwne. Piłka do piłki nożnej, dwa podwyższone kosze na brzoskwinie i trzynaście zasad. Na początku chłopcy uznali to za dziwne. Żadnego kontaktu. Żadnego dryblingu. Tylko ostrożne podania i łukowate rzuty. Ale coś w tym było. Gra rozprzestrzeniła się na inne szkoły, a następnie na inne miasta. W niecałą dekadę sale gimnastyczne od Nowego Jorku po Tokio rozbrzmiewały rytmem odbijanych piłek i okrzyków "Basket!" To, co zaczęło się jako rozrywka w zimne dni, może stać się czymś większym. Jest szybki, zespołowy, dostosowany do współczesnego życia - a przede wszystkim urodzony [ROOT.GetCountry.GetAdjectiveNoFormatting]." #deepl:3707830614
 vikelas.21.g: "Wprowadzić go do szkół i sal gimnastycznych." #deepl:2248999233
 vikelas.21.t: "Gra z koszykiem brzoskwiń" #deepl:2623215155
 vikelas.401.d: "Dziś Międzynarodowa Federacja Piłki Nożnej została założona w [GetGlobalVariable('vikelas_fifa_seat_global_var').GetStateRegion.GetCityHubName]. Jej pełna nazwa to Fédération Internationale de Football Association (FIFA)." #deepl:3487975302
 vikelas.401.f: "21 maja 1904 roku delegaci z siedmiu krajów - Belgii, Danii, Francji, Holandii, Hiszpanii, Szwecji i Szwajcarii - podpisali statut. Cel: standaryzacja zasad piłki nożnej, organizacja meczów międzynarodowych i podniesienie gry na poziom globalny. W ten sposób narodziła się Międzynarodowa Federacja Piłki Nożnej - FIFA. We wczesnych dekadach FIFA była skromna: prezydentura w niepełnym wymiarze godzin, gracze amatorzy i spory regionalne. Ale pod powierzchnią rósł globalny ruch. Anglia wahała się przed przystąpieniem, obawiając się obcej ingerencji. Mieszkańcy Ameryki Południowej zaczęli tworzyć własne konfederacje. W 1924 i 1928 roku turnieje olimpijskie ujawniły prawdziwy zasięg piłki nożnej: 60-tysięczne tłumy w Paryżu kibicowały nie armiom, ale drużynom." #deepl:2154770056
 vikelas.401.g: "Dołącz do FIFA i wspieraj międzynarodową rywalizację." #deepl:1192623767
 vikelas.401.t: "Międzynarodowa Federacja Piłki Nożnej (Fédération Internationale de Football Association)" #deepl:2948752940
 vikelas.411.d: "FIFA zdecydowała, że tegoroczne Mistrzostwa Świata odbędą się w [SCOPE.sCountry('vikelas_fifa_host_scope').GetName]. Po rundzie wstępnej lista faworytów została zawężona do ośmiu drużyn." #deepl:1721956240
 vikelas.411.f: "#V Do ćwierćfinałów zakwalifikowały się następujące drużyny narodowe#!\n\n[SCOPE.sCountry('vikelas_first_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_second_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_third_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_fourth_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_fifth_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_sixth_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_seventh_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_eighth_qualified_team_scope').GetName]" #deepl:1470693747
 vikelas.411.g: "Niech zwycięży najlepsza drużyna." #deepl:900366891
 vikelas.411.t: "Mistrzostwa Świata w piłce nożnej [TimeKeeper.GetCurrentDate.Format('y')]" #deepl:3683642621
 vikelas.412.d: "Nasza drużyna zatriumfowała na światowej scenie, pokonując najlepsze drużyny z każdego kontynentu. W całym kraju wybuchło świętowanie!" #deepl:1604872733
 vikelas.412.f: "W zaciętym meczu z [SCOPE.sCountry('vikelas_second_winner_team_scope').GetName], nasza drużyna udowodniła swoją wartość w finale Mistrzostw Świata w [SCOPE.sCountry('vikelas_fifa_host_scope').GetName]. Nasza drużyna narodowa podniosła złote trofeum. Końcowy gwizdek odbił się echem w radiach, kawiarniach, koszarach. Od górników na północy po kupców w porcie, ludzie ryczeli jak jeden mąż. Kapitan płacze na podium. Nowe pokolenie patrzy i marzy." #deepl:1159882054
 vikelas.412.g: "Jesteśmy mistrzami." #deepl:2663168066
 vikelas.412.t: "Mistrzowie Świata" #deepl:3853223886
 vikelas.413.d: "Nasza drużyna piłkarska dotarła do finału - i nie zdobyła chwały. W całym kraju duma i złamane serce mieszają się w równym stopniu." #deepl:80141764
 vikelas.413.f: "Niestety, nasza drużyna nie dała z siebie wszystkiego. W szarpiącym nerwy meczu z [SCOPE.sCountry('vikelas_first_winner_team_scope').GetName] nasi ludzie nie dali rady. Przez tygodnie nieśli nadzieję całego narodu. Na błotnistych polach i w oślepiającym upale biegali, walczyli, wierzyli. Mecz po meczu stawali się legendami. Trzymali głowy wysoko, gdy rozbrzmiewał hymn. Żadnych łez, tylko cisza - a potem powolne, narastające oklaski." #deepl:3695564906
 vikelas.413.g: "To zostało nam skradzione!" #deepl:3624655051
 vikelas.413.t: "Silver Glory w [SCOPE.sCountry('vikelas_fifa_host_scope').GetName]" #deepl:3043927783
 vikelas.414.d: "Nasza drużyna narodowa została przedwcześnie wyeliminowana z Mistrzostw Świata FIFA w [SCOPE.sCountry('vikelas_fifa_host_scope').GetName]. [SCOPE.sCountry('vikelas_first_winner_team_scope').GetName] pokonała [SCOPE.sCountry('vikelas_second_winner_team_scope').GetName] w finale." #deepl:317995881
 vikelas.414.f: "Była nadzieja - prawdziwa, namacalna nadzieja. Zwycięstwa wiwatowane na placach fabrycznych, komentarze radiowe szeptane w kościołach, dzieci odtwarzające gole w alejkach. Drużyna reprezentowała coś więcej niż piłkę nożną: ambicję, dumę, wiarę, że możemy wznieść się ponad samych siebie. Ale ostatni mecz zmienił wszystko. Jeden stracony gol. Niezauważona piłka ręczna. Niewykorzystana szansa. Teraz sen się skończył, a świat idzie naprzód." #deepl:640236906
 vikelas.414.g: "Wierzyliśmy. To wystarczyło." #deepl:4069550601
 vikelas.414.t: "Sen kończy się wcześnie" #deepl:1366412702
 vikelas.490.d: "[ROOT.Var('vikelas_coach_var').GetCharacter.GetFullName] wyrobił sobie markę, trenując i rozwijając całe pokolenie graczy. [ROOT.Var('vikelas_coach_var').GetCharacter.GetSheHe] jest teraz na tyle sławny, że został uznany za trenera seniorów!" #deepl:3173542618
 vikelas.490.f: ""
 vikelas.490.g: "Nagroda za możliwość bezwstydnego krzyczenia na boisku." #deepl:1195265680
 vikelas.490.t: "[ROOT.Var('vikelas_coach_var').GetCharacter.GetFullName] jest teraz starszym trenerem!" #deepl:454610152
 vikelas.495.d: "Nowy [concept_vikelas_coach] wprowadził [SCOPE.sCharacter('vikelas_new_coach_scope').GetHerselfHimself]. [SCOPE.sCharacter('vikelas_new_coach_scope').GetHerHis|U] nazywa się [SCOPE.sCharacter('vikelas_new_coach_scope').GetFullName]." #deepl:1753591119
 vikelas.495.f: ""
 vikelas.495.g: "[SCOPE.sCharacter('vikelas_new_coach_scope').GetSheHe|U] poprowadzi naszych chłopców do zwycięstwa." #deepl:1930939286
 vikelas.495.t: "Nowy trener" #deepl:2806014865
 vikelas.601.d: "Na bulwarach pojawił się nowy wynalazek - dwukołowe urządzenie napędzane pedałami przymocowanymi bezpośrednio do przedniego koła. Nazywa się "welocyped"." #deepl:497189807
 vikelas.601.f: "W parkach i na szerokich ulicach stolicy odwracają się głowy. Panowie w kapeluszach i kamizelkach siedzą na dziwnych żelaznych ramach, pedałując wściekle, chwiejąc się przez zaskoczone tłumy. Niektórzy spadają. Niektórzy latają. Dzieci się śmieją. Starsi mężowie stanu unoszą brwi. Gazety nazywają go le vélocipède - pół zabawka, pół obietnica. Wynaleziony przez producenta powozów, ten "wstrząsacz kości" jest równie ciężki, co rewolucyjny. Na kostce brukowej szarpie kręgosłup. Ale na gładkich promenadach porusza się z zaskakującą gracją. Pojawiają się głosy, że nie jest to zwykła nowość, ale zalążek nowego rodzaju ruchu." #deepl:2987098471
 vikelas.601.g: "Zabawna moda!" #deepl:3063453559
 vikelas.601.t: "Pedały na chodniku" #deepl:583302045
 vikelas.602.d: "Pojawiła się nowa konstrukcja roweru z kołami o równych rozmiarach, tylną osią napędzaną łańcuchem i ulepszoną równowagą. W przeciwieństwie do niepewnych rowerów z wysokimi kołami, ten "bezpieczny rower" jest stabilny, niedrogi i szybko staje się sensacją. Jego wynalazca? [SCOPE.sCharacter('vikelas_bicycle_inventor_scope').GetFullName]!" #deepl:1082254426
 vikelas.602.f: "Stare welocypedy wstrząsały zarówno kośćmi, jak i nerwami. Wysokie, groszowe rowery oferowały prędkość, ale za cenę, którą niewielu było skłonnych zapłacić - jeden fałszywy ruch i rowerzysta leciał w powietrzu. Teraz z warsztatów w naszej stolicy rozprzestrzenia się nowy rodzaj roweru: kompaktowy, elegancki i bezpieczny. Z napędem łańcuchowym na tylne koło i pneumatycznymi oponami, nawet kobiety i robotnicy zaczynają jeździć. Ulice, po których kiedyś jeździły dorożki, teraz rozbrzmiewają miękkim szumem gumy na kamieniu. W kawiarniach i fabrykach werdykt jest taki sam: to nie jest zabawka. To wolność - szybka, cicha i nagle w zasięgu ręki." #deepl:2048166631
 vikelas.602.g: "Niech każdy obywatel wkroczy w erę nowoczesności." #deepl:158167297
 vikelas.602.t: "Rower przyszłości" #deepl:3168239488
 vikelas.611.d: "Nadszedł ten dzień. Zawodnicy z całego kraju gromadzą się na linii startu, chętni do przetestowania człowieka i maszyny na otwartej drodze. Powietrze aż trzeszczy z niecierpliwości." #deepl:3817467534
 vikelas.611.f: "Słońce wschodzi nad bulwarem, już zatłoczonym przez widzów. Powiewają sztandary. W porannym powietrzu unosi się zapach smaru i kurzu. Dziesiątki kolarzy wsiadają na rowery - niektóre lśniące maszyny prosto z fabryki, inne poskładane w zaułkowych warsztatach. Rozlegają się okrzyki. Koła zaczynają się obracać. Przejeżdżają przez bramy miasta i wyjeżdżają na wieś. Rolnicy zatrzymują się na swoich polach. Dzieci biegają obok drogi. Księża ich błogosławią. Cynicy szydzą. A jednak, gdy kurz unosi się za nimi, w tłumie pojawia się dziwne poczucie: to jak początek czegoś większego." #deepl:872369825
 vikelas.611.g: "Niech każde miasto usłyszy warkot postępu." #deepl:4082081516
 vikelas.611.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]" #deepl:804172156
 vikelas.621.d: "Zwycięzca krajowego wyścigu rowerowego zdobył coś więcej niż tylko linię mety - zawładnął wyobraźnią narodu. Teraz wszystkie oczy zwrócone są na to, co reprezentuje." #deepl:2904065614
 vikelas.621.f: "Gazety nazywają go "Żelaznym Jeźdźcem". Urodzony w rodzinie tkacza, osierocony w wieku dwunastu lat, pracownik fabryki w wieku szesnastu lat. Jego zwycięstwo na poobijanym rowerze bezpieczeństwa - połatanym, odrapanym i naoliwionym z troską - nie było zwykłym triumfem sportowym. To była przypowieść. Tłumy skandują jego imię. Malarze go szkicują. Dzieci naśladują jego postawę. Ale co więcej, ideolodzy zwracają na niego uwagę. Niektórzy nazywają go twarzą siły roboczej. Inni twierdzą, że dowodzi witalności narodu. Prasa spiera się o to, czy jest on robotnikiem, patriotą, czy też kimś zupełnie innym. Sam jeździec mówi niewiele. Uśmiecha się, kiwa głową i jedzie." #deepl:2953543537
 vikelas.621.g: "Uczyń go bohaterem klasy robotniczej." #deepl:2363628364
 vikelas.621.h: "Świętuj go jako narodową ikonę." #deepl:255033591
 vikelas.621.i: "Przedstaw go jako symbol postępu i nowoczesnego człowieka." #deepl:3398545154
 vikelas.621.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]" #deepl:804172156
 vikelas.622.d: "Tragiczny wypadek podczas krajowego wyścigu rowerowego. Jeden kolarz nie żyje, a kilku innych zostało rannych. Doping ustał." #deepl:644341100
 vikelas.622.f: "Koło wpadło w koleinę. Krzyk, trzask, a potem krzyk. Widzowie rzucili się do przodu, gdy rowery przewróciły się jak domino. Krew zmieszała się z kurzem. Kaski pękły. Kości się łamały. Jeden młody człowiek - siedemnastolatek, praktykant w fabryce - zginął od uderzenia. Gazety są podzielone. Niektórzy nazywają to konieczną ceną postępu, inni potępiają lekkomyślność publicznego sportu." #deepl:1135060049
 vikelas.622.g: "Cześć poległym." #deepl:3728569964
 vikelas.622.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]" #deepl:804172156
 vikelas.623.d: "Jeden szczególny etap wyścigu podbił serca publiczności. Widzowie mówią o nim nie tylko jak o zawodach, ale jak o legendzie." #deepl:438486236
 vikelas.623.f: "Kolarze zniknęli na wzgórzach o świcie. To, co nastąpiło później, nie było już wyścigiem, ale testem ducha. Kilkunastu zostało w tyle. Trzech upadło. Jeden rozbił się na zakręcie i krwawiąc wstał, odmawiając pomocy. Ale jeden ruszył naprzód przez mgłę do serc tysięcy. Cały naród nie mówi o niczym innym." #deepl:130901318
 vikelas.623.g: "Niech droga zapamięta jego wysiłek na pokolenia." #deepl:3983380699
 vikelas.623.h: "Zamów obraz przedstawiający tę chwilę." #deepl:1275386135
 vikelas.623.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]" #deepl:804172156
 vikelas.624.d: "Oskarżenia wybuchły po ostatnim etapie wyścigu. Jeden z kolarzy został przyłapany na oszukiwaniu - choć niektórzy twierdzą, że robił to, co wszyscy, tylko mniej dyskretnie." #deepl:3963790231
 vikelas.624.f: ""Mówili, że zmieniał rowery za stodołą. Inni twierdzą, że był holowany pod górę przez ukrytą linkę." Fakty są zamazane. Jedno jest pewne: rowerzysta jechał za szybko. Spektakularnie szybki. Zbyt świeży po brutalnej wspinaczce. Jego rywale byli wściekli. Widzowie sapią. Prasa wyczuwa krew. Jedno ze zdjęć pokazuje drugiego mężczyznę w podobnym ubraniu. Inny świadek twierdzi, że widział kolarza popchniętego przez samochód podczas nocnego etapu. Oskarżony zaprzecza wszystkiemu, nazywając to zazdrością i polityką." #deepl:2810733320
 vikelas.624.g: "Zdyskwalifikować zawodnika i ujawnić oszustwo." #deepl:2198835421
 vikelas.624.h: "Zakryj to dla dobra sportu." #deepl:3797817672
 vikelas.624.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]" #deepl:804172156
 vikelas.625.d: "Zaciekła rywalizacja zawładnęła tegorocznym sezonem wyścigowym. Dwóch kolarzy - równych siłą, przeciwnych stylem - podzieliło naród na dwa obozy." #deepl:2483368762
 vikelas.625.f: "Jeden to ogień: lekkomyślny, odważny, uwielbiany przez młodych. Rzuca czapką w tłum, śmieje się podczas pedałowania i atakuje bez ostrzeżenia. Drugi to lód: spokojny, wyrachowany, niemal matematyczny. Oszczędza siły, wygrywa na sekundy i odzywa się tylko wtedy, gdy jest to konieczne. Ich imiona są wykrzykiwane z dachów. Miasta opowiadają się po jednej ze stron. Plakaty są drukowane na czerwono lub niebiesko. Krawcy sprzedają czapki w ich kolorach. Dzieci naśladują ich postawy na drewnianych rowerach. Gazety mówią o czymś więcej niż tylko o wyścigu. Mówią o charakterze, filozofii, o tym, kim ludzie chcą być. Żaden z kolarzy nie ustępuje ani na krok." #deepl:1380551122
 vikelas.625.g: "Będzie to korzystne dla kultury gazety." #deepl:3508242265
 vikelas.625.h: "Wykorzystanie rywalizacji dla korzyści politycznych." #deepl:442554493
 vikelas.625.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]" #deepl:804172156
 vikelas.626.d: "Zaciekła rywalizacja zapanowała nad tegorocznym sezonem wyścigowym. Dwóch kolarzy - równych siłą, przeciwnych stylem - podzieliło naród na dwa obozy." #deepl:2483368762
 vikelas.626.f: ""Znaleźli go w wiejskiej kuźni, z młotem w ręku, twarzą poczerniałą od sadzy, samego." Zjazd był zdradliwy. Źle oceniony zakręt, chrzęst żwiru - i przedni widelec pękł. Rower złożył się jak ranny ptak. Większość by się zatrzymała. Ale nie on. Kulał w dół, ciągnąc ramę przez kilometry. W odległej wiosce znalazł kuźnię. Żadnych mechaników. Żadnego samochodu. Tylko miech, kowadło i własne ręce. Godzinami pracował - z podwiniętymi rękawami, zaciśniętą szczęką - odtwarzając przedni widelec na pamięć i wyczucie. Kiedy przyjechali urzędnicy, zatrzymał się tylko po to, by spojrzeć i powiedzieć: "Nie dotykajcie tego." Osiem godzin za liderami pojechał ponownie. Bez szans na zwycięstwo. Ale na całej trasie tłumy wiwatowały - nie dla zwycięzcy, ale dla tego, który odmówił zatrzymania się." #deepl:896070649
 vikelas.626.g: "Inspirująca historia." #deepl:3324986220
 vikelas.626.h: "Zezwolenie na naprawy awaryjne." #deepl:385201552
 vikelas.626.i: "Cześć mu!" #deepl:581594471
