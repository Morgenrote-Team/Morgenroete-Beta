 MR_AUTOMATE_PALEONTOLOGIST_TT: "#T Zautomatyzuj [concept_dubois_paleontologist]#! \nNie będziesz już musiał dawać zadań swojemu Paleontologowi, jeśli je zautomatyzujesz. \nBędą pracować niezależnie i wykonywać zadania, które mają sens w danym momencie. Nadal będziesz musiał uzyskać [Concept('concept_dubois_paleontological_expedition','$concept_dubois_paleontological_expeditions$')] lub utworzyć [Concept('concept_dubois_paleontological_team','$concept_dubois_paleontological_teams$')]. Nadal będziesz też otrzymywać zdarzenia." #deepl:1919857505
