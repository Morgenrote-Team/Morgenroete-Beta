 MR_FIFA_BUTTON_TT: "#T Znaleziono FIFA#!\nWraz ze wzrostem liczby meczów międzypaństwowych w miarę rozpowszechniania się piłki nożnej, pojawiła się potrzeba stworzenia globalnego organu zarządzającego. FIFA (po francusku: Fédération Internationale de Football Association) to międzynarodowy organ samoregulacyjny zarządzający piłką nożną, futsalem i piłką plażową. Jest to jedna z najstarszych i największych organizacji pozarządowych na świecie, założona 21 maja 1904 roku. Założenie FIFA pozwala na rozgrywanie międzynarodowych meczów pomiędzy poszczególnymi narodami, których trenerzy mogą doskonalić się poprzez wygrywanie meczów. Ostatecznie doprowadzi to do ustanowienia mistrzostw świata w piłce nożnej.[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:3292557058
