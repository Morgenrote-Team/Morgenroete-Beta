 je_vikelas_bicycle_race_reason: "Przedsiębiorcy, wydawcy i producenci rowerów proponują publiczny konkurs: wyścig długodystansowy, aby udowodnić szybkość, wytrzymałość i obietnicę nowego bezpiecznego roweru." #deepl:1822735236
 khaldun.101.d: "Wieki temu Al-Karawijjin był centrum nauki i nauczania. Teraz powrócił na swoje miejsce jako jeden z głównych uniwersytetów na świecie." #deepl:2097299752
 khaldun.101.f: "\Al-Karawijjin był uniwersytetem dłużej niż wszystkie uniwersytety w Europie. Mieścił wiele książek, ale niestety zaczął podupadać. Dziś jest dzień, w którym ten uniwersytet ponownie zajmuje należne mu miejsce!"" #deepl:2075544153
