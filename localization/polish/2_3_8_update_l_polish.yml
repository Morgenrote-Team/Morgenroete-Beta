 je_khaldun_al_qarawiyyin_bar_goal_tt: "Pasek postępu osiągnął #V 2000#!" #deepl:3077461812
 je_khaldun_al_qarawiyyin_reason: "Niegdyś wielki ośrodek nauki, Al-Karawiyyin podupadł na przestrzeni wieków. Ale może moglibyśmy odwrócić jego bieg i ponownie uczynić z niego ważne centrum nauki." #deepl:1953836253
 je_verrier_venus_transit_1874: "Tranzyt Wenus z 1874 roku w [SCOPE.sCountry('target').GetName]" #deepl:3052931223
 je_verrier_venus_transit_1874_reason: "Zbliża się rzadkie wydarzenie na niebie. Planeta Wenus przejdzie bezpośrednio między Ziemią a Słońcem, rzucając swój niewielki cień na dysk słoneczny. Obserwatoria na całym świecie przygotowują się na to ulotne zjawisko, które może pomóc zdefiniować skalę naszego Układu Słonecznego." #deepl:3195507086
 je_verrier_venus_transit_1882: "Tranzyt Wenus z 1882 roku w [SCOPE.sCountry('target').GetName]" #deepl:1464301463
