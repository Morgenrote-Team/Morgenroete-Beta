 dubois.2171.h: "Plezjozaur." #deepl:868173169
 dubois.2171.i: "Basilosaurus." #deepl:2592886142
 dubois.2171.j: "Megalodon." #deepl:1809322411
 dubois.2173.f: "Plezjozaury to rząd gadów morskich. Ich skamieniałości można znaleźć na całym świecie. W zależności od gatunku, zwierzęta te miały od 1,5 do 15 metrów długości. W zależności od gatunku, prawdopodobnie żywiły się różnymi zwierzętami. Od ślimaków i małży po ryby i inne ofiary. Ich szczęki w kształcie litery U i ostre zęby, które przypominają pułapkę na ryby, zapewniły im przydatne narzędzie." #deepl:1725138010
 dubois.2173.t: "Plezjozaur" #deepl:3684543079
 dubois.2174.f: "Basilosaurus nie jest dinozaurem, ale prehistoryczną formą wieloryba. Jego długie ciało przypomina długiego węża, ale przy długości do 20 metrów jest podobny do kaszalota." #deepl:4279559397
 dubois.2174.t: "Bazylozaur" #deepl:3895138572
 dubois.2175.f: "Gigantyczny rekin Megalodon jest prawdopodobnie największym rekinem, jaki kiedykolwiek istniał. Jednak oszacowanie jego długości jest trudne, ponieważ obecnie znaleziono tylko zęby i kręgi. Nasi paleontolodzy szacują, że jego długość wynosiła od 9 do 30 metrów. Tak czy inaczej, szkielet rekina zapiera dech w piersiach i jest jednym z klejnotów koronnych naszej kolekcji." #deepl:1066794911
 dubois.2175.t: "Megalodon" #deepl:439976392
