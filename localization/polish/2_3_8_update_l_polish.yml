 concept_verrier_venus_transit: "Tranzyt Wenus" #deepl:3328636769
 concept_verrier_venus_transit_desc: "Tranzyt Wenus odnosi się do rzadkiego zjawiska przejścia Księżyca między Ziemią a Wenus. Zdarzyło się to jednak dwukrotnie w XIX wieku: w 1874 i 1882 roku. Ponieważ obserwacje tranzytu Wenus pozwalają na wyciągnięcie wniosków na temat wielkości Układu Słonecznego i bardziej precyzyjne określenie wielkości jednostki astronomicznej (AU), były to ważne wydarzenia naukowe. Kraje znajdujące się na stronie [concept_verrier_venus_transit_zone] mogą obserwować to wydarzenie stamtąd; inne kraje muszą wysyłać ekspedycje. Sukces obserwacji zależy od doświadczenia [concept_verrier_astronomer], dostępności [concept_gaudi_engineer] i odrobiny szczęścia: czasami pogoda może uniemożliwić uzyskanie dobrego obrazu. Im lepsza obserwacja, tym większa premia." #deepl:1890935103
 concept_verrier_venus_transit_zone: "Strefa tranzytu Wenus" #deepl:535627695
 concept_verrier_venus_transit_zone_desc: "Strefa tranzytu Wenus odnosi się do części Ziemi, z której można zaobserwować całkowity (a nie tylko częściowy) tranzyt Wenus. W 1874 r. dotyczyło to w szczególności regionu Azji Wschodniej i Pacyfiku, a w 1882 r. prawie całego kontynentu amerykańskiego. Szczegółowy podział strategicznych regionów znajduje się poniżej.\n\n#V Tranzyt Wenus 1874:#!\nIndonezja, Indochiny, Oceania, Chiny Południowe, Chiny Północne, Mandżuria, Japonia, Indie Środkowe, Madras, Bengal, Himalaje; także stan Terytorium Oceanu Indyjskiego.\#V Tranzyt Wenus 1882:#! Brazylia, La Plata, Andy, Wielka Kolumbia, Meksyk, Ameryka Środkowa, Karaiby, Środkowy Zachód, Dixie, Nowa Anglia; także stany Ontario i Quebec." #deepl:1055797749
 concept_vikelas_coach: "Trener" #deepl:3572285288
 concept_vikelas_coach_desc: "Trenerzy są narodowymi trenerami danego kraju w konkretnym sporcie narodowym. Sporty narodowe obejmują [concept_vikelas_football], baseball, koszykówkę i krykiet. Trenerzy zapewniają premie dla danej drużyny w zawodach - czy to na międzynarodowych mistrzostwach świata, czy na meczach międzynarodowych. Te ostatnie są rozgrywane w tajemnicy w regularnych odstępach czasu i zwiększają wartość doświadczenia trenera po zwycięstwie. Wysokie punkty doświadczenia i pozytywne [Concept('concept_character_trait','$concept_character_traits$')] zwiększają szansę na wygranie Mistrzostw Świata. Pozytywne cechy to te, które szczególnie motywują graczy - takie jak ambitny lub charyzmatyczny - podczas gdy cechy demotywujące zmniejszają szansę na wygranie meczu. Należą do nich cechy takie jak bezwzględność lub okrucieństwo.#R UWAGA: W tej chwili zintegrowana jest tylko piłka nożna.#!" #deepl:183600896
 concept_vikelas_coaches: "Trenerzy" #deepl:3998480532
 concept_vikelas_football: "Piłka nożna" #deepl:3334413449
 concept_vikelas_football_desc: "Piłka nożna jest możliwym sportem narodowym. Pierwsze kluby piłkarskie można założyć w Europie i Ameryce Południowej; będzie to wymagało stosunkowo liberalnego systemu prawnego, silnej drobnej burżuazji lub znacznego średniego poziomu życia. Następnie można by rozgrywać okazjonalne mecze piłki nożnej. Wraz z utworzeniem FIFA możliwe stało się rozgrywanie meczów międzynarodowych i mistrzostw świata. Osiem najlepszych drużyn automatycznie kwalifikuje się do Mistrzostw Świata. Drużyny są obliczane na podstawie National Football Team Value (NFTV), który jest pochodną parametrów poziomu życia (sprawność populacji), siły drobnomieszczaństwa (system klubowy), umiejętności czytania i pisania (taktyka) oraz tradycji (sport narodowy: tak czy nie?). W meczach bierze się pod uwagę nie tylko NFTV, ale także cechy charakteru i doświadczenie [concept_vikelas_coach]." #deepl:3000477120
 country_artists_decorative_can_promote_architect_boolean_desc: "Jeśli masz co najmniej jedną stronę [GetBuildingType('building_arts_academy').GetName] z adresem [concept_pm_artists_academy_school], możesz promować stronę [concept_gaudi_architect] w przeglądzie artystów." #deepl:738833409
