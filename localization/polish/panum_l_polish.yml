 panum_vaccination_tech: "Szczepienia"
 panum_vaccination_tech_desc: "Szczepionka przeciw ospie prawdziwej była pierwszym przełomem w walce z chorobami zakaźnymi. W roku 1796 brytyjski lekarz Edward Jenner udowodnił, że zarażenie łagodną krowianką zapewnia trwałą odporność na śmiercionośną ospę, otwierając nową erę w medycynie i zdrowiu publicznym."
