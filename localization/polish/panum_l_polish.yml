 panum_vitamins_tech: "Vitamins"
 panum_vitamins_tech_desc: "By isolating certain nutrients that the body needs, it is possible to make sure that more people have a healthy and balanced diet."
 panum.2006.t: "The Germ Theory is reinforced"
 panum.2006.d: "The medical congress also offered the opportunity for several doctors to exchange ideas about the causes of the disease. It is becoming apparent that fewer and fewer researchers believe in the traditional miasma theory. Germ theory is now considered the standard among the most respected scholars."
 panum.2006.f: "'Of late a certain adjustment has, indeed, made its appearance, in so far as individual countries no longer proceed in quite such a biased way as before, and one takes over from another whatever seems to be well tried in the way of means of defense. However, amidst the persistently great variety in the ways and means of combating tuberculosis, it is yet necessary to ask what measures do indeed best satisfy the scientific requirements and general findings in the fight against contagious disease.\n\nBut, before we come to answer this question, we must make perfectly clear to ourselves how infection is brought about in tuberculosis, i.e. how the tubercle bacilli invade the human organism; for all prophylactic measures against an infectious disease can only be directed towards preventing the germs of disease from invading the body.' -Robert Koch"
 panum.2006.g: "This evidence cannot be dismissed out of hand."
 panum.2201.t: "Miasma Theory loses interpretive Sovereignty"
 panum.2201.d: "With every day that Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] focuses more and more on new research methods, the traditional miasma theory becomes less relevant. The germ theory seems more convincing."
 panum.2201.f: "'Gentlemen, it is the microbes who will have the last word!' -Louis Pasteur"
 panum.2201.g: "So the miasma theory is questionable?"
 panum_physician_recent_treatment_modifier: "Recent Treatment"
 panum_physician_recent_treatment_conducted_modifier: "Recent Treatment conducted"
 panum_physician_botched_treatment_modifier: "Botched Treatment"
 panum_physician_botched_treatment_ig_modifier: "Botched Treatment"
 panum.2301.t: "Successful treatment of [SCOPE.sCharacter('chosen_character').GetFullName]'s [SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')]"
 panum.2301.d: "Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] has successfully treated [SCOPE.sCharacter('chosen_character').GetFullName]'s [SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')]."
 panum.2301.f: "\"No worries, sir, this treatment will surely work! I have done it at least 2 times and only one patient died!\""
 panum.2301.g: "Good!"
 panum.2302.t: "Neutral treatment of [SCOPE.sCharacter('chosen_character').GetFullName]'s [SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')]"
 panum.2302.d: "Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] has treated [SCOPE.sCharacter('chosen_character').GetFullName]'s [SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')] but nothing really changed."
 panum.2302.f: "\"I really thought drinking enough water would do the trick!\""
 panum.2302.g: "At least it didn't hurt."
 panum.2303.t: "Botched treatment of [SCOPE.sCharacter('chosen_character').GetFullName]'s [SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')]"
 panum.2303.d: "Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] has treated [SCOPE.sCharacter('chosen_character').GetFullName]'s [SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')] so badly that it made [SCOPE.sCharacter('chosen_character').GetHerHis] condition even worse."
 panum.2303.f: "\"This is the third time it happened this week...\""
 panum.2303.g: "This should not have happened!"
 panum.2304.t: "Fatal [SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')] Treatment"
 panum.2304.d: "Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] sadly caused the death of the patient during the [SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')] treatment."
 panum.2304.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_fatal_flavor_text_type')]"
 panum.2304.g: "A Tragedy!"
 panum_foreign_medical_expedition_modifier: "Foreign Medical Expedition"
 panum.137.t: "Expedition wants to research Disease"
 panum.137.d: "A foreign expedition has reached the borders of our country. It consists mainly of doctors, scientists and their assistants. They apparently want to research the rampant epidemic."
 panum.137.f: "Medical expeditions can travel to other countries to scientifically research disease treatments and write disease descriptions for their homeland. The host countries, in turn, benefit from this because doctors examine patients in the epidemic areas."
 panum.137.g: "Welcome these brave men and women."
 panum.2202.t: "Ancient Disease"
 panum.2202.d: "Our Doctor has brought precious insight to the work of our Anthropologist!"
 panum.2202.f: "'...but, of course, if you examine this part of their skull, you can see that they had actually begun to heal from their injuries.'\n\n'Then that was definitely not the cause of death?'\n\n'Most likely! A nasty blow, but not lethal. I would estimate they spent another six or so months alive before another injury took them down, or perhaps the wound went bad.'\n\n'Hmmm. Fascinating. Judging by the nature of the blow, I thought it likely to be some kind of...blunt instrument.'\n\n'A club, most like, or perhaps a tool with a blunt stone. I think this rib presents the true cause of death. Note the narrowing of the bones, here and here.'\n\n'Injury?'\n\n'Tuberculosis, most like. I would wager your man died after years of battling this white death.'"
 panum.2202.g: "Cross-disciplinary science remains the best science."
 panum.2203.t: "Strange Medicine"
 panum.2203.d: "With some free time together, our Doctor and Archaeologist have shared their research!"
 panum.2203.f: "'Ah, but that is where things get interesting, doctor! These jars come from Egypt, and contain what we believe to be samples of ancient medicine.'\n\nFascinating, fascinating. Is this the mummia oil?'\n\n'...isn't that found on the bodies, with healing properties? The resin around their wrappings?'\n\n'Oh, no, not at all! Mummia is a type of oil they find out of the ground, akin to petroleum. Why?'\n\n'...I think it best we examine these medications more. There are all sorts of tinctures. Please, take a look at them, and I will be back in a moment. I need to dispose of...something.'\n\n'Well, these seem as if they might have been perfumed and - are you eating something in there?'"
 panum.2203.g: "...you're not eating the mummy, are you?"
 panum.2204.t: "Herbal Remedies?"
 panum.2204.d: "Having had some time to examine their finds, our Naturalist has delivered plants with potentially medicinal properties to our Doctor's office."
 panum.2204.f: "'Ah, there you are! I was cataloguing some of the samples we brought back from the last botanical expedition, and I found a few that might be of interest to you.'\n\n'Oh, truly? How so?'\n\n'Some of them are related to plants with known medicinal properties, like fighting inflammation or fever. Some of them are completely alien to us, but come with good words from the natives and are worth investigating further.'\n\n'Herbal medicine isn't much good of a science...but one never knows. There could be something interesting in these. You know the wonders they found in the poppy plant, after all.'\n\n'Ah, morphine!'\n\n'Indeed, indeed! I will have my assistants get to work on preparing some powdered samples, for closer examination.'"
 panum.2204.g: "I believe the coca leaf is especially fascinating, doctor."
