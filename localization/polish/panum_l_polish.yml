 je_panum_medical_system_project: "Expand Medical System"
 je_panum_medical_system_project_reason: "A physician who is supposed to expand the medical system works primarily locally to improve health care. But there is also a need for an administrative infrastructure there. A doctor with advantageous talents who make an impression on the bureaucracy is helpful here. His skills and experience drive the monthly progress in setting up and building new hospitals and clinics.\n\nDoctors will first try to set up clinics in particularly well-developed areas before turning to clinics in less developed regions. Physicians will prefer the state that has the highest level of administration buildings.\n\nEvery time the progress bar fills up, a new clinic/hospital is activated and work continues in the next suitable state. Physicians will activate as many clinics and hospitals as a production method as possible until either there are no more states with the necessary requirements or until the work is stopped manually."
 panum.2101.t: "Medical System Expanded"
 panum.2101.d: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] has completed his work and expanded and updated the local medical facilities. The doctor is now available for other activities again."
 panum.2101.f: "'Medicine is a social science, and politics is nothing more than medicine on a large scale.'-Rudolf Virchow"
 panum.2101.g: "Back to work."
 panum.2102.t: "Specialist Clinic in [SCOPE.sState('panum_clinic_state').GetName]"
 panum.2102.d: "With the eager help of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], the first specialist clinic in our country was established in [SCOPE.sState('panum_clinic_state').GetCityHubName]. The Doctor has announced that [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] will run it [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself] and specialize in one area - although it is not yet clear which area the specialists should concentrate on."
 panum.2102.f: "'Medical education does not exist to provide student with a way of making a living, but to ensure the health of the community.' -Rudolf Virchow"
 panum.2102.g: "Surgery."
 panum.2102.h: "Psychiatry."
 panum.2102.i: "Epidemiology."
 panum.2102.j: "Military Medicine."
 panum.2102.k: "General Medicine."
 panum.2103.t: "Hospital in [SCOPE.sState('panum_clinic_state').GetName]"
 panum.2103.d: "Today, with great public interest and the presence of the press, Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] opened the country's first modern hospital in [SCOPE.sState('panum_clinic_state').GetCityHubName], which heralds a turning point with its operating rooms and modern medical equipment."
 panum.2103.f: "'It is the curse of humanity that it learns to tolerate even the most horrible situations by habituation.' -Rudolf Virchow"
 panum.2103.g: "Bravo!"
