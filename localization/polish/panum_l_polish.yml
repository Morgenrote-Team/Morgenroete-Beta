 panum.2621.t: "The Concept of Anxiety"
 panum.2621.d: "Søren Kierkegaard, Denmark's leading philosopher, has published 'The Concept of Anxiety', an aesthetic, philosophical and psychological work that has captured the attention of the Copenhagen audience."
 panum.2621.f: "'Freedom's possibility is not the ability to choose the good or the evil. The possibility is to be able. In a logical system, it is convenient to say that possibility passes over into actuality. However, in actuality it is not so convenient, and an intermediate term is required. The intermediate term is anxiety, but it no more explains the qualitative leap than it can justify it ethically. Anxiety is neither a category of necessity nor a category of freedom; it is entangled freedom, where freedom is not free in itself but entangled, not by necessity, but in itself.' -Søren Kierkegaard"
 panum.2621.g: "One of Denmark's greatest minds."
 panum.2621.h: "Kierkegaard will become Denmark's new national writer."
 panum.2622.t: "The Strange Case of [SCOPE.sCharacter('panum_phineas_gage').GetFullName]"
 panum.2622.d: "Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] has investigated the strange case of foreman [SCOPE.sCharacter('panum_phineas_gage').GetFullName]. During an explosion, an iron rod shot from bottom to top through his skull, creating a large wound channel. According to Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], he was physically recovered after a few weeks, and his intellectual abilities, including perception, memory, intelligence, language ability, as well as his motor skills were completely intact. However, in the period following the accident, [SCOPE.sCharacter('panum_phineas_gage').GetLastName] experienced noticeable personality changes."
 panum.2622.f: "'Horrible Accident. - As [SCOPE.sCharacter('panum_phineas_gage').GetFullName], a foreman on the railroad in [SCOPE.sState('panum_phineas_gage_state').GetName], was yesterday engaged in tamping for a blast, the powder exploded, carrying an iron instrument through his head an inch and a fourth in circumference, and three feet and eight inches in length, which he was using at the time. The iron entered on the right side of his face, shattering the upper jaw, and passing back of the left eye, and out at the top of the head.\n\nThe most singular circumstance connected with this melancholy affair is, that he was alive at two o'clock this afternoon, and in full possession of his reason, and free from pain.\n\nThe [ROOT.GetCountry.GetCapital.GetCityHubName] Chronicle"
 panum.2622.g: "So the psyche and brain areas are connected?"
 panum.2623.t: "Transcultural Psychology"
 panum.2623.d: "During a visit to [SCOPE.sState('panum_colonial_state').GetName], Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] was astonished to find that mental illnesses, such as those that occur frequently in [ROOT.GetCountry.GetCapital.GetCityHubName], hardly occur at all in this area."
 panum.2623.f: "Emil Kraepelin traveled to Java for four months in 1904 and examined 225 people in the Buitenzorg (now Bogor) mental asylum. As the only leading psychiatrist of his time who was interested in investigating transcultural phenomena in psychiatry, he wanted to find out, on the one hand, whether certain forms of madness, which form the main content of our institutions, also exist under completely different living conditions and among completely different tribes occur in the same way and with the same frequency as ours'. On the other hand, he predicted that 'frequency and forms of insanity will one day form a rich treasure trove for a deeper understanding of the peculiarities of a people'."
 panum.2623.g: "Apparently some neuroses are related to cultural backgrounds."
 panum.2624.t: "Drugs"
 panum.2624.d: "Chief chemist [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] has recently experimented several times with substances at the suggestion of Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] in order to produce effective psychotropic drugs. The result, however, was... surprising."
 panum.2624.f: "'You wanted to see me urgently?'\n'Yes. I suspect the experiment was successful.'\n'You suspect?'\n'The new drug definitely has a pain-relieving effect. It is effective against fatigue. And it helps against fear. Maybe even a little too good.'"
 panum.2624.g: "Lysergic acid diethylamide? What is it?"
 panum.2624.h: "Our soldiers could benefit from some armored chocolate."
 panum.2625.t: "Psychophysics"
 panum.2625.d: "Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] has postulated some interesting theories regarding the interrelationship between subjective psychological experience and quantitatively measurable physical stimuli."
 panum.2625.f: "Psychophysics quantitatively investigates the relationship between physical stimuli and the sensations and perceptions they produce. Psychophysics has been described as 'the scientific study of the relation between stimulus and sensation.' Many of the classical techniques and theories of psychophysics were formulated in 1860 by Gustav Theodor Fechner. He coined the term 'psychophysics', describing research intended to relate physical stimuli to the contents of consciousness such as sensations. As a physicist and philosopher, Fechner aimed at developing a method that relates matter to the mind, connecting the publicly observable world and a person's privately experienced impression of it. Fechner's work was studied and extended by Charles S. Peirce, who was aided by his student Joseph Jastrow, who soon became a distinguished experimental psychologist in his own right."
 panum.2625.g: "I didn't understand a word, but the bonuses look good!"
