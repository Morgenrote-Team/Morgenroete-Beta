 panum.2007.t: "Medical Inventions"
 panum.2007.d: "Word got around at the congress that there were specialists who had succeeded in medical innovations. They are ready to share their knowledge."
 panum.2007.f: "Unique innovations in medicine, such as transplants, the development of X-rays or chemotherapy, are of such great importance to humanity that the inventors share the knowledge without reservation. Ultimately, it's about the well-being of all people."
 panum.2007.g: "Cheers to humanity!"
 panum.2205.t: "Animal Testing"
 panum.2205.d: "Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] is considered an ice-cold scientist with a certain penchant for cruelty. The number of animals [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] killed 'for the benefit of science' is said to be in three figures. Nevertheless, these experiments have their successes."
 panum.2205.f: "Although animal testing for the benefit of medicine has existed since ancient times, it was only in the 19th century that testing took place on a scale that was previously unknown. Particularly in the course of the discovery of the germ theory - and afterwards - numerous experiments were carried out in which the animals were consciously infected with pathogens countless times and literally became 'guinea pigs' for new drugs. This phase also saw the widespread introduction of animal testing and vivisection at universities for students."
 panum.2205.g: "The doctor is free as [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] pleases."
 panum.2205.h: "The students should learn how to dissect animals."
 panum.2205.i: "This is clearly going too far."
 panum.2411.t: "Aspirin"
 panum.2411.d: "Our chemist Dr. [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName], has invented a true medical miracle that could revolutionize pharmacy: Aspirin. Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] has confirmed the pain-relieving effects."
 panum.2411.f: "Salicylic acid has been used medicinally since ancient times. Medicines made from willow wood and other salicylate-rich plants appear in clay tablets from ancient Sumer and in the Ebers Papyrus from ancient Egypt. Hippocrates referred to 400 B.C. B.C. on the use of salicylic tea to reduce fever. Salicylate-rich plants were part of the pharmacopoeia of Western medicine in classical antiquity and the Middle Ages. Willow bark extract became known in the mid-18th century for its specific effects on fever, pain and inflammation. In the 19th century, pharmacists experimented with and prescribed a variety of chemicals associated with salicin, the active component of willow extract. In 1853, chemist Charles Frédéric Gerhardt treated acetyl chloride with sodium salicylate for the first time to produce acetylsalicylic acid. In 1897, scientists at the Bayer drug and paint factories began studying acetylsalicylic acid as a less stomach-irritating replacement for common standard salicylate drugs and created a new synthetic route without impurities. By 1899, Bayer had called this aspirin and was selling it worldwide."
 panum.2411.g: "The drug will be the starting point for further medical research."
 panum.2411.h: "Chemistry is sure to open up even more spectacular discoveries."
 panum.2411.i: "The pharmaceutical industry will benefit from this."
 panum.2412.t: "X-Rays"
 panum.2412.d: "Our physicist Dr. [ROOT.Var('curie_physicist_var').GetCharacter.GetLastName] has made a spectacular discovery: [ROOT.Var('curie_physicist_var').GetCharacter.GetSheHe] has discovered previously unknown rays that can be used to illuminate the body. Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] highlighted the possibilities for medicine."
 panum.2412.f: "X-rays are electromagnetic waves with quantum energies above about 100 eV, corresponding to wavelengths below about 10 nm. X-rays lie in the electromagnetic spectrum in the energy range above ultraviolet light. X-rays were discovered in 1895 by the German scientist Wilhelm Conrad Röntgen, who named it X-radiation to signify an unknown type of radiation. X-rays can penetrate many solid substances such as construction materials and living tissue, so X-ray radiography is widely used in medical diagnostics (e.g., checking for broken bones) and material science (e.g., identification of some chemical elements and detecting weak points in construction materials)."
 panum.2412.g: "Spooky - like seeing your own death."
 panum.2413.t: "Blood Types"
 panum.2413.d: "Dr. [ROOT.Var('curie_physicist_var').GetCharacter.GetLastName] has made an astonishing discovery that would explain why human blood sometimes mixes and sometimes clumps: apparently there are different blood groups. This is a decisive breakthrough for blood donations and blood transfusions."
 panum.2413.f: "'I have recently observed and stated that the serum of normal people is capable of clumping the red cells of other healthy individuals... As commonly expressed, it can be said that in these cases at least two different kinds of agglutinins exist, one kind in A, the other in B, both together in C. The cells are naturally insensitive to the agglutinins in their own serum.' -Karl Landsteiner"
 panum.2413.g: "Research into blood groups must be promoted."
 panum.2413.h: "The clinic is supposed to collect blood types and collect them for blood transfusions."
 panum.2414.t: "Electrocardiography"
 panum.2414.d: "Dr. [ROOT.Var('curie_physicist_var').GetCharacter.GetLastName] has invented an amazing device that records the electrical activity of the heart muscle fibers. The doctor calls the device an electrocardiograph - an ECG."
 panum.2414.f: "In 1843, Carlo Matteucci realized through experiments on pigeon hearts that cardiac activity is based on electrical processes. In 1882, the physiologist Augustus Desiré Waller performed the first ECG on his dog Jimmy by dipping his four paws in conductive sodium chloride solution. In 1887 he was able to record cardiac currents for the first time using a capillary electrometer. The instruments were significantly improved in 1903 by Willem Einthoven, who, based on his string galvanometer developed in 1895, developed the ECG into a useful diagnostic procedure and introduced it to the clinic. The terminology he introduced is still used today."
 panum.2414.g: "This device should be in every hospital."
 panum.2415.t: "First Transplantation"
 panum.2415.d: "Dr. [ROOT.Var('curie_physicist_var').GetCharacter.GetLastName]'s surgical talent is known throughout the country, but [ROOT.Var('curie_physicist_var').GetCharacter.GetSheHe] recently surprised experts with a daring procedure: The doctor transplanted human thyroid tissue under the skin and into the abdominal cavity of a young man."
 panum.2415.f: "The first transplant in the modern sense - the implantation of organ tissue in order to replace an organ function - was a thyroid transplant in 1883. It was performed by the Swiss surgeon and later Nobel laureate Theodor Kocher. In the preceding decades Kocher had perfected the removal of excess thyroid tissue in cases of goiter to an extent that he was able to remove the whole organ without the person dying from the operation. Kocher carried out the total removal of the organ in some cases as a measure to prevent recurrent goiter. In the following years Kocher and other surgeons used thyroid transplantation also to treat thyroid deficiency that appeared spontaneously, without a preceding organ removal. Thyroid transplantation became the model for a whole new therapeutic strategy: organ transplantation."
 panum.2415.g: "And people thought Frankenstein was a horror novel!"
 panum.2416.t: "Stereotactic Method"
 panum.2416.d: "Dr. [ROOT.Var('curie_physicist_var').GetCharacter.GetLastName]'s surgical genius knows no limits: the doctor revolutionized neurosurgery with a new brain operation."
 panum.2416.f: "Stereotactic brain surgery refers to minimally invasive neurosurgery and radiation therapy procedures in which the patient's head and medical instruments are fixed in a tightly screwed frame to achieve maximum accuracy. For the first time in the last years of the 19th century, isolated operations were carried out on the exposed brain using a procedure that was already known at the time as stereotaxy. During the procedure, the patient's body and especially the head were rigidly clamped in a reliably rigid frame system. The testing of possibilities in the context of research curiosity and psychiatric surgery was still very limited and simple at that time. In later decades, the tools and methodology were refined."
 panum.2416.g: "Brilliant!"
 panum.2417.t: "Cardiopulmonary Bypass"
 panum.2417.d: "With the development of a cardiopulmonary bypass, Doctor Hasenbein has achieved a masterpiece of modern medicine. It won't be long before people will be able to have heart surgery without any problems."
 panum.2417.f: "During a cardiopulmonary bypass, the blood leaves the body via a cannula and tube system, is enriched with oxygen and pumped back again. This is referred to as extracorporeal circulation. The path of the blood usually runs from the vena cavae or the right atrium as well as from the heart chambers and opened coronary arteries in the surgical area and, after filtering, oxygen enrichment and carbon dioxide elimination as well as warming and further filtering, back via the main artery or a femoral artery. The French physiologist Le Gallois published the idea of extracorporeal circulation in 1812. In 1885, Maximilian von Frey and his colleague Max von Gruber at the University of Leipzig built the forerunner of today's heart-lung machines with a film oxygenator with a piston pump for the first use of blood circulation in a closed extracorporeal system."
 panum.2417.g: "This is the birth of modern heart surgery!"
 panum.2418.t: "Endoscope"
 panum.2418.d: "A new invention by Dr. [ROOT.Var('curie_physicist_var').GetCharacter.GetLastName] could provide invaluable medical examination services - it can be used to view the inside of the body!"
 panum.2418.f: "An endoscope is a device that can be used to examine and manipulate the inside of organisms or technical cavities. The use of the endoscope, known as endoscopy, was originally developed for human medical diagnostics. After the invention of Thomas Edison, the use of electric light was a major step in the improvement of endoscope. The first such lights were external although sufficiently capable of illumination to allow cystoscopy, hysteroscopy and sigmoidoscopy as well as examination of the nasal (and later thoracic) cavities as was being performed routinely in human patients by Sir Francis Cruise (using his own commercially available endoscope) by 1865 in the Mater Misericordiae Hospital in Dublin, Ireland."
 panum.2418.g: "A useful medical device."
 panum.2419.t: "Ophthalmoscope"
 panum.2419.d: "Dr. [ROOT.Var('curie_physicist_var').GetCharacter.GetLastName] invented an apparatus that makes it easier to examine eye diseases and thus rendered an invaluable service to ophthalmology."
 panum.2419.f: "Ophthalmoscopy or fundoscopy is the inspection of the visible parts of the eye carried out using an ophthalmoscope. In particular, the retina and the blood vessels that supply it can be examined. The ophthalmoscope, invented for in 1850, was first described by its inventor Hermann von Helmholtz at the beginning of October 1851. The ophthalmoscope can be used to detect diseases of the optic nerve, retina, choroid and vitreous body. This marked the beginning of the history of ophthalmology as an independent medical and scientific discipline. After that, the ophthalmoscope became increasingly important for the diagnosis of internal diseases."
 panum.2419.g: "An interesting medical device."
 panum.2420.t: "Chemotherapy"
 panum.2420.d: "A new medical procedure that Dr. [ROOT.Var('curie_physicist_var').GetCharacter.GetLastName] is currently testing could offer a glimmer of hope for many sick people - even cancer would not be curable, but at least partially treatable."
 panum.2420.f: "Chemotherapy is a drug therapy for cancer or infections. Paul Ehrlich used chemotherapy to describe the treatment of infectious diseases with chemical substances that work directly against the pathogen. In 1904 he discovered trypan red as the first effective chemotherapy drug, which he used to cure mice suffering from sleeping sickness. Ehrlich began further experiments on August 31, 1909 in Frankfurt am Main by injecting syphilis pathogens into rats and then treating them with the help of chemotherapeutic procedures. These experiments had such a convincing effect that they were seen as the new 'weapon' of medicine against infectious diseases. Ehrlich was subsequently referred to as the 'creator of chemotherapy'. The drugs used are either manufactured artificially or are derivatives of naturally occurring substances."
 panum.2420.g: "Could this be an answer to the suffering of cancer patients?"
 panum.2100.t: "Physician Recruitment"
 panum.2100.d: "One of the most promising doctors at the General Hospital is [SCOPE.sCharacter('panum_new_physician_scope').GetFullName]. [SCOPE.sCharacter('panum_new_physician_scope').GetSheHe|U] would be an excellent candidate to become the new chief physician. [SCOPE.sCharacter('panum_new_physician_scope').GetHerHis|U] specialty is..."
 panum.2100.f: "$concept_panum_physician_desc$\n\nThe #V new#! Physician, [SCOPE.sCharacter('panum_new_physician_scope').GetFullName], is a #tooltip:[SCOPE.sCharacter('panum_new_physician_scope').GetTooltipTag],panum_physician_rating_tt_loc [SCOPE.sCharacter('panum_new_physician_scope').GetCustom('panum_physician_rating_new_physician_icon_text_type')]#! Physician.[GetPlayer.GetCustom('panum_physician_rating_display_existing_physician_type')]"
 panum.2100.g: "Epidemiology."
 panum.2100.h: "Surgery."
 panum.2100.i: "Psychiatry."
 panum.2100.j: "Military Medicine."
 panum_cholera_condition: "Cholera"
 panum_cholera_condition_desc: "Cholera is a dangerous disease of the small intestine. It is considered a defining epidemic of the 19th century with millions of deaths worldwide."
 panum_tuberculosis_condition: "Tuberculosis"
 panum_tuberculosis_condition_desc: "Tuberculosis is considered, along with cholera, one of the most common causes of death in the Victorian era. Also known as consumption, it primarily affects the lungs"
 panum_smallpox_condition: "Smallpox"
 panum_smallpox_condition_desc: "Known for its pustules, which disfigure the face and body, smallpox has long been one of the most lethal diseases in history."
 panum_typhus_condition: "Typhus"
 panum_typhus_condition_desc: "Typhus has terrorized soldiers over the centuries, particularly in the Napoleonic Wars when it killed thousands of army personnel. It raged again and again after natural disasters"
 panum_yellow_fever_condition: "Yellow Fever"
 panum_yellow_fever_condition_desc: "Yellow fever mainly affects the tropical areas of South America and Africa. In the Caribbean, the disease has claimed more lives among stationed soldiers than any war."
 panum_measles_condition: "Measles"
 panum_measles_condition_desc: "Measles is a highly contagious disease known for its typical red skin patches. It can have catastrophic consequences, particularly in populations lacking prior immunity."
 panum_scarlet_condition: "Scarlet Fever"
 panum_scarlet_condition_desc: "Scarlet fever is a widespread disease that was one of the most common causes of death among children until the beginning of the 20th century."
 panum_plague_condition: "Plague"
 panum_plague_condition_desc: "The bubonic plague is equated with the 'Black Death' of the Middle Ages, which is one of the worst catastrophes in history. The name comes from the swollen, painful bumps."
 panum_diphteria_condition: "Diphtheria"
 panum_diphteria_condition_desc: "Diphtheria is a dangerous disease that can lead to life-threatening complications and long-term consequences."
 panum_polio_condition: "Polio"
 panum_polio_condition_desc: "Poliomyelitis is a disease that primarily affects children, often resulting in death or lifelong physical complications."
