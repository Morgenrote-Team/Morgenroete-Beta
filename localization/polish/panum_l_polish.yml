 panum.21.t: "Dispersal of the Sick"
 panum.21.d: "Doctor Hasnebein is credited with developing a modern system for sorting the sick and wounded according to the severity of their injuries, thereby increasing the patient's chances of survival."
 panum.21.f: "From his experiences in the Caucasian War and the Crimean War, the Russian surgeon Nikolai Ivanovich Pirogov developed graduated surgical treatment procedures and the principle of 'dispersal of the sick' (distributed treatment of the injured and sick) to order the overcrowded dressing areas and divide the wounded into five stages (Pirogov's screening principle). The Prussian army adopted the Russian principle in 1866, and it was later also applied to the other medical services of allied armies in Europe. In further development, numerous advances in medicine and surgical methods were also transferred to the organization of the military medical service. However, Pirogov's principle remained intact during the First World War."
 panum.21.g: "So there is a hierarchy of the sick?"
 panum.22.t: "A Treatment for Malaria"
 panum.22.d: "By effectively extracting quinine from the cinchona tree bark, Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] has invented a treatment method that helps against malaria."
 panum.22.f: "The Jesuits already had a de facto monopoly on the use of cinchona to cure malaria in the early modern period, even if there were initially reservations in some Protestant countries. At the beginning of the 19th century, shortly after the discovery of morphine, quinine was found as the ingredient that determines the effectiveness of cinchona bark and made it a cornerstone of the emerging plant chemistry. It was produced in an impure state by Antoine François de Fourcroy in 1792 and isolated from the cinchona bark in 1820 by Pierre Joseph Pelletier and Joseph Bienaimé Caventou by extraction with alcohol. In 1823, quinine was first obtained on an industrial scale from the bark of Cinchona species by the pharmacist Friedrich Koch in Oppenheim. The quinine subsequently stimulated plant chemistry research."
 panum.22.g: "A valuable medicine."
 panum.23.t: "Just a different Category of Patients"
 panum.23.d: "Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] sent an urgent letter to the government today. In it [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] criticizes the treatment of mentally ill people and advocates treating them as patients who deserve better treatment - and not as antisocial people who need to be excluded from society."
 panum.23.f: "The first decisive step towards the psychological treatment of patients took place in the 18th century, when mentally ill people and ordinary convicts were no longer 'kept' in the same rooms, but separate institutions became fashionable. These were still far below any humane standard. A further step was taken when the heavy ice chains with which the lunatics had been chained were abolished in favor of greater freedom of movement. From the beginning of the 19th century onwards, it became clear that these people were also sick and had a right to treatment. In England, the Lunacy Act 1845 was an important landmark, as it explicitly changed the status of mentally ill people to patients."
 panum.23.g: "The mental life of these people also counts."
 panum.24.t: "Medical and Nursing Knowledge"
 panum.24.d: "Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] reminded us that less qualified personnel are sometimes of great use as nurses for the many victims on the battlefield, and advocates for an increased use of women as nurses."
 panum.24.f: "While in other European countries, especially France and Germany, Catholic orders made it their mission to train nurses, little of this happened in Great Britain or other protestant countries. Very few monasteries and orders survived the English Reformation. The British public became painfully aware of this fact through publications by Florence Nightingale. The training of nursing staff was then seen as a national task for which donations were collected. The Nightingale School of Nursing at St Thomas' Hospital in London, founded by Nightingale, became the nucleus of this professionalization. With her sentence 'Doctors deal with illnesses, nurses deal with people' she is said to have laid the foundation for a philosophy of nursing."
 panum.24.g: "Women to the front."
 je_panum_spanish_flu_research: "The [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] Flu: Research"
 je_panum_spanish_flu_research_reason: "Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] has decided to investigate the mysterious pandemic in more detail. How much success [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] will have is anyone's guess. However, an experienced physician should have a better chance of achieving a result."
 je_panum_spanish_flu_research_complete_tt: "A [concept_panum_physician] can gain new knowledge from the pandemic: for example, the place of origin, a description of the disease or even the pathogen."
 state_harvest_condition_panum_spanish_flu_condition_impact_mult: "[GetHarvestConditionType('panum_spanish_flu_condition').GetName] [concept_panum_disease] Impact"
 state_harvest_condition_panum_spanish_flu_condition_impact_mult_desc: "An increase or decrease to the impact of the Pandemic."
 panum_spanish_flu_physician_help_modifier: "Physician fights Pandemic"
 panum.1110.t: "The Doctor and the Pandemic"
 panum.1110.d: "The outbreak of the pandemic is a crucial hour for Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]: now [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] can shine! But the question arises: should it be better to actively fight the pandemic or research it?"
 panum.1110.f: "'On the day when it became clear that we would not be dealing with an ordinary flu wave, I felt a great motivation to do my part. And at the same time I felt the breakneck weight on my shoulders. The expectations were huge. Would I ever be able to fulfill the hopes that were placed on me?'\n\nDiary entry from [ROOT.Var('panum_physician_var').GetCharacter.GetFullName]"
 panum.1110.g: "Fight the Pandemic."
 panum.1110.h: "Research the Pandemic."
 panum.1111.t: "Pathogen of the Pandemic"
 panum.1111.d: "Our chief physician, Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], and our chief biologist, Doctor [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName], made a brilliant discovery today: They have discovered the pathogen that causes the [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] flu!"
 panum.1111.f: "Influenza A virus H1N1 (A/H1N1) refers to a subtype of the influenza A virus (species Alphainfluenzavirus influenzae) from the family Orthomyxoviridae, which occurs in ducks, humans and pigs, but also infects numerous other mammal species. H1N1 influenza viruses became established in humans and pigs as a result of the Spanish flu of 1918. This subtype has caused tens of millions of human deaths.\n\nDuring the Spanish flu, the pathogen was still unknown. Some researchers had already suspected a 'filterable virus'. In textbooks, the bacterium now called Haemophilus influenzae was considered to be the cause of influenza. However, no pathogen could be detected using the usual methods of bacteriology: it could neither be dyed nor grown on artificial culture media. If there was an advance in knowledge as a result of the Spanish flu, then it was insofar as the actual pathogen of this flu variant was still unknown at the time, meaning that Haemophilus influenzae was ruled out as the pathogen. It wasn't until 1996 that the virus's genome was sequenced."
 panum.1111.g: "Heureka!"
 panum.1112.t: "Origin of the Pandemic"
 panum.1112.d_historical: "After an outstanding scientific investigation that combines history, criminology and medical knowledge, Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] has made a groundbreaking discovery: the pandemic did not break out in Spain, as is so often claimed, but in America!"
 panum.1112.f_historical: "The doctor's discovery is preceded by a meticulous investigation. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] compared patient files and traced back to the first cases in our country in order to reconstruct a network of infections. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] also collected data from colleagues abroad and sometimes visited them himself. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] has evaluated the findings of other doctors who have undertaken similar efforts in their country. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] cannot say with certainty where the first infection occurred, but but everything points to the state of Kansas. That the disease actually broke out in America is now a scientific fact."
 panum.1112.g_historical: "Does that mean we should talk about American flu?"
 panum.1112.d_dynamic: "After an outstanding scientific investigation that combines history, criminology and medical knowledge, Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] has made a groundbreaking discovery: the pandemic did not break out in [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetName], as is so often claimed, but in [SCOPE.sCountry('panum_pandemic_country').GetName]!"
 panum.1112.f_dynamic: "The doctor's discovery is preceded by a meticulous investigation. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] compared patient files and traced back to the first cases in our country in order to reconstruct a network of infections. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] also collected data from colleagues abroad and sometimes visited them himself. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] has evaluated the findings of other doctors who have undertaken similar efforts in their country. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] cannot say with certainty where the first infection occurred. That the disease actually broke out in [SCOPE.sCountry('panum_pandemic_country').GetNameNoFormatting] is now a scientific fact."
 panum.1112.g_dynamic: "Does that mean we should talk about [SCOPE.sCountry('panum_pandemic_country').GetAdjectiveNoFormatting] flu?"
 panum.1113.t: "Treatment of the Pandemic"
 panum.1113.d: "During [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] research on the [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] flu, Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] invented several remedies and practices and developed a plan of action to contain the disease. Although these findings all come too late, they can be helpful for future generations."
 panum.1113.f: "'Mell much better and dressed today. Almost worn out with worry and loss of sleep. So much sickness and death this week, but one great ray of light and hope on the outcome of the war as peace came this past (11th).' -Helen Viola Jackson Kent, [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] Flu survivor"
 panum.1113.g: "Well, we learned something."
 panum.1114.t: "Description of the Pandemic"
 panum.1114.d: "Unfortunately, Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] has made little progress during the pandemic. However, [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] has written a description of the disease that could possibly be helpful in recognizing the symptoms of variants of the [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] flu."
 panum.1114.f: "'These men start with what appears to be an attack of la grippe or influenza, and when brought to the hospital they very rapidly develop the most viscous type of pneumonia that has ever been seen. Two hours after admission they have the mahogany spots over the cheek bones, and a few hours later you can begin to see the cyanosis extending from their ears and spreading all over the face, until it is hard to distinguish the coloured men from the white. It is only a matter of a few hours then until death comes, and it is simply a struggle for air until they suffocate. It is horrible. One can stand it to see one, two or twenty men die, but to see these poor devils dropping like flies sort of gets on your nerves.' -N. Roy Grist, [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] Flu survivor"
 panum.1114.g: "We expected a bit more."
 panum.1115.t: "Mystery of the Pandemic"
 panum.1115.d: "Unfortunately, Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] was not up to the demands of the pandemic. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] was unable to find any answers about the origin, how to combat or describe the disease. But the doctor wrote a little poem."
 panum.1115.f: "'I had a little bird,\nits name was Enza.\nI opened the window,\nand in-flu-enza.'"
 panum.1115.g: "Disappointing."
