 je_panum_measles_treatment_reason: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] is currently examining several patients at [SCOPE.sState('panum_disease_state').GetName] to determine the cause of #YELLOW Measles#!. Only the true reasons for the occurrence of the disease can help to make preventions that lead to a modern method of treatment. When the doctor has finished his work, he will present his thesis to the public. This will not prevent future epidemics - this requires identification of the pathogen and possibly a vaccine - but the effects of a new epidemic will be relatively small."
