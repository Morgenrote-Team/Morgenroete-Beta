 panum.2600.t: "A New Asylum"
 panum.2600.d: "Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] celebrated the inauguration of the new mental asylum with a speech today."
 panum.2600.f: "Numerous prominent personalities were also present at the inauguration, including opposition politicians. While the doctor pointed out the new methods and a whole series of clear symptoms that led to admission to the clinic, skeptical government opponents suspected that such an institution could also be suitable for abuse."
 panum.2600.g: "Finally the right place for politicians, journalists, actors..."
 panum.2601.t: "An urgent Psychiatric Admission"
 panum.2601.d: "Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] has prepared a report showing that [SCOPE.sCharacter('chosen_character').GetFullName] requires urgent mental health care. Sadly, [SCOPE.sCharacter('chosen_character').GetLastName] will spend many years in the mental asylum. Possibly... very many years."
 panum.2601.f: "'As some day it may happen that a victim must be found\nI've got a little list — I've got a little list\nOf society offenders who might well be underground\nAnd who never would be missed — who never would be missed!\nThere's the pestilential nuisances who write for autographs\nAll people who have flabby hands and irritating laughs\nAll children who are up in dates, and floor you with 'em flat\nAll persons who in shaking hands, shake hands with you like that\nAnd all third persons who on spoiling tête-á-têtes insist\nThey'd none of 'em be missed — they'd none of 'em be missed!'"
 panum.2601.g: "[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U]'s got 'em on the list — And they'll none of 'em be missed!"
 panum.2601.tt: "[SCOPE.sCharacter('chosen_character').GetFullName] disappears forever into the tracts of the mental asylum..."
 panum_physician_recent_asylum_conducted_modifier: "Recent Admission to the Mental Asylum"
 panum_send_leader_to_asylum_modifier: "Political abuse of Psychiatry"
