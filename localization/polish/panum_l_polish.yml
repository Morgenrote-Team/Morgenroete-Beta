 panum.139.d: "After great effort, Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] finally wrote [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] treatise on a successful treatment method for the disease [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_disease_title')]. It is considered a milestone in [ROOT.GetCountry.GetAdjectiveNoFlag] medicine."
