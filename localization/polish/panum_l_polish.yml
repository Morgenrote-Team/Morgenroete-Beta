 panum.2626.t: "The Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] Show"
 panum.2626.d: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] got [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] own show on Radio in which [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] gives advice to people who want to talk about their problems. The format is very popular."
 panum.2626.f: "'Hello, Ethan. I'm listening.'\n'Hi, Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName].'\n'How old are you?'\n'I'm thirteen.'\n'Well, what can I do for you?'\n'Well, I'm having a lot of problems with the other kids at school. They're always beating me up.'\n'Why do you think that's so?'\n'Probably because I'm smart. I have a 160 IQ. I'm in the astronomy club and I hate sports.'\n'Well, you know, Ethan, the other children are just acting out of jealousy and immaturity, and I know it doesn't help much right now, but the day will come in the next few years when you will have the last laugh.'\n'That's it?'\n'Yes.'\n'Frankly, Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], I find that advice patronizing, simplistic and, in all candor, uninspired. The real surprise here is that they pay you to dole out this balloon juice.'\n'Ethan, where are you calling from?'\n'Home.'\n'Well, if any of Ethan's classmates are listening, you know where he is, and he can't stay in there forever. Thank you for your call.'"
 panum.2626.g: "Wait, I know this show!"
 ACHIEVEMENT_panum_biologist_job: "A Biologist's Job?"
 ACHIEVEMENT_DESC_panum_biologist_job: "Invent a vaccine against yellow fever - with a physician."
 panum.1007.t: "Polio Clinic"
 panum.1007.d: "Sister [SCOPE.sCharacter('panum_polio_nurse').GetFirstName] founded a polio clinic in [SCOPE.sState('panum_disease_state').GetName] to be able to care for the many patients there."
 panum.1007.f: "'She was a very tall and elegant woman, and she inspired confidence just by her manner and the way she carried herself. She had a delightful accent which made her an interesting person to listen to. If I close my eyes, I can still visualize her standing next to my bed wearing a long, black dress and a big hat with a beautiful ostrich feather...She didn't wear jewelry, and she didn't wear any makeup. I remember her face as being strong and angular, and her eyes were very intense. When she looked you in the eye, that intensity demanded all of your attention, and when she spoke, people listened to her... Everyone knew who was in charge, and we received whatever treatment she recommended. I've never known anyone as assertive as she was.'\n\nRay G., Polio Survivor"
 panum.1007.g: "Thank you, Sister [SCOPE.sCharacter('panum_polio_nurse').GetFirstName]."
 panum.1008.t: "Polio Depression"
 panum.1008.d: "The many children who are mutilated for life not only have an impact on the physical health of the next generation, but also on the parents, who accuse the government of doing too little."
 panum.1008.f: "'I vividly remember the first day that I wore the brace to school. It was the middle of the school day. Apparently I had gone to the doctor that morning to have the brace fitted. My mom dropped me off at the door, and I remember she had tears in her eyes as I walked away.'\n\nEdmund Sass, Polio Survivor"
 panum.1008.g: "Irrational, but not incomprehensible."
