 panum.55.t: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] can describe a foreign disease"
 panum.55.d: "Another country has a disease outbreak that your [concept_panum_physician] could investigate to describe the disease."
 panum.55.g: "Send our Physician immediately!"
 panum.55.h: "Not right now."
 panum.55.i: "Notify me in a less intrusive way."
 panum.55.j: "Do not tell me about this anymore."
 panum_foreign_disease_research_only_notification_tt: "From now on you will be notified with #V Notifications#! about the possibility to send your [concept_panum_physician] to countries with diseases."
 panum_foreign_disease_research_no_notification_tt: "You will #n no longer#! be notified about the possibility to send your [concept_panum_physician] to countries with diseases."
 panum.56.t: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] can find a treatment for a foreign disease"
 panum.56.d: "Another country has a disease outbreak that your [concept_panum_physician] could investigate to find a treatment for the disease."
