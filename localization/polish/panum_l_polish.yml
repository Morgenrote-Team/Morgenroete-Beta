 panum.1001.t: "A New Epidemic"
 panum.1001.d: "Poliomyelitis is a disease that was known by many different names in the 19th century. Shockingly, there is increasing news in [SCOPE.sState('panum_disease_state').GetName] about polio cases ending in crippling and death. What was previously an illness that only occurred in isolated cases now seems to occur on a regular basis. Polio is now an epidemic disease."
 panum.1001.g: "Disturbing news."
 panum.1002.d: "Several newspapers independently report that a severe polio epidemic is raging in [SCOPE.sState('panum_disease_country').GetName]. The illness, which previously only occurred in isolated cases, appears to have become an epidemic!"
 panum.1003.t: "A violent Epidemic"
 panum.1003.d: "The polio epidemic in [SCOPE.sState('panum_disease_state').GetName] has proven to be particularly severe. The number of deaths is increasing every day."
 panum.1003.f: "'The morning of the third day I was hospitalized, which was the first or second of September, I had cereal, juice, and chocolate milk for breakfast. I remember trying to pick up the chocolate milk, and it fell right through my hand. I felt so bad because I couldn't move anymore. The nurses all rushed in and cleaned up the mess. I remember I wanted the chocolate milk, but I didn't get it. Instead, they brought me a straw, and I drank some juice. After that, some doctors came into my room and had me count backwards, 10-9-8-7-6 for as long as I remember. I was laying down at that time because I was having trouble sitting up.'\n\nMarilynne R., Polio Survivor"
 panum.1003.g: "Is there no cure?"
 panum.1004.t: "A broken Generation"
 panum.1004.d: "The longer the epidemic in [SCOPE.sState('panum_disease_state').GetName] lasts, the more obvious it becomes: there will be an entire generation who will have to live with mutilations and paralysis."
 panum.1004.f: "'I remember the day that I was diagnosed with polio very well. That morning, I was in physical  education class at school, and we were out on the football field playing touch football. I noticed that as I was running, my leg would be weak, or sort of collapse under me. I didn't really think too much of it, but then later that day I was playing with the high school marching band at a polio benefit parade in Hibbing, which is about 30 miles from Coleraine where I grew up. During the march in that parade, my legs again became weak. In fact, they were so weak that I had to drop out of the line of march, and I went back to the school bus to lie down.'\n\nDavid K., Polio Survivor "
 panum.1004.g: "This effect will last for a long time..."
 panum.1005.t: "Polio Survivors"
 panum.1005.d: "Those who survive this epidemic are said to harbor deep anger within themselves. It is a form of revenge against the disease that has so devastated these people. More and more polio survivors' associations are forming in our country."
 panum.1005.f: "'Being different is really hard when you're in high school. I ended up just not participating in a lot of things that I probably would have participated in if it wasn't for my disability. I would have liked to try out for cheerleading, but people made fun of me just for talking about it. So I ended up keeping a lot of feelings inside. I didn't want to go to a dance because I was self-conscious of my limp. I didn't want to have people stare at me as I walked across the dance floor. I hated to have people gawk and laugh at me. I think all teenagers are self-conscious, but when you have some physical disability, it really magnifies that self-consciousness. To this day, I hate it when people stare at my leg when I wear shorts.'\n\nGail B., Polio Survivor"
 panum.1005.g: "Civil society is rallying against polio."
 panum.1006.t: "Politician establishes Polio Foundation"
 panum.1006.d: "In the face of the rampant polio epidemic, the grieving parents, the mutilated and the dead, [SCOPE.sCharacter('panum_opposition_leader').GetFullName] came up with the plan to set up a foundation to combat the disease. Critics say he's just trying to burnish his political reputation."
 panum.1006.f: "The US President Franklin D. Roosevelt had stayed regularly in the Warm Springs spa since 1924 and died here in 1945. In 1921 he suffered from paralysis of his legs, which was regarded as spinal polio; According to more recent research, it was Guillain-Barré syndrome, which was still little known at the time. Roosevelt founded the Georgia Warm Springs Foundation in 1927, whose primary mission was initially to be the treatment of spinal paralysis. Today the facility is called the Roosevelt Warm Springs Institute for Rehabilitation and cares for patients with all types of disabilities in twenty-six different departments."
 panum.1006.g: "A true philanthropist."
 panum.1006.h: "And the upcoming election is pure coincidence, I assume?"
 panum.1009.t: "Public Panic"
 panum.1009.d: "Despite the best efforts of the local government in [SCOPE.sState('panum_disease_state').GetName], the population has begun to succumb to one of the most dangerous parts of any outbreak: panic."
 panum.1009.f: "On Saturday, June 17, 1916, an official announcement of the existence of an epidemic polio infection was made in Brooklyn, New York. That year, there were 27,363 cases and 7,130 deaths due to polio in the United States, with over 2,000 deaths in New York City alone. The 1916 epidemic caused widespread panic and thousands fled the city to nearby mountain resorts; movie theaters were closed, meetings were canceled, public gatherings were almost nonexistent, and children were warned not to drink from water fountains, and told to avoid amusement parks, swimming pools, and beaches."
 panum.1009.g: "Damnable fear!"
 panum.1010.t: "Quarantine"
 panum.1010.d: "Although it is unclear whether polio is a contagious disease, there are increasing voices in [SCOPE.sState('panum_disease_state').GetName] to introduce quarantine to ensure that it does not spread."
 panum.1010.f: "The disease hit without warning and required long quarantine periods during which parents were separated from children: it was impossible to tell who would get the disease and who would be spared.  The names and addresses of individuals with confirmed polio cases were published daily in the press, their houses were identified with placards, and their families were quarantined."
 panum.1010.g: "This will cause more harm than good."
 panum.1010.h: "Enforce a strict quarantine order."
 panum.1020.t: "Polio Epidemic ends"
 panum.1020.d: "The clinics in [SCOPE.sState('panum_disease_state').GetName] report that polio cases have decreased noticeably. The aftermath of the epidemic will continue to concern the region for years to come."
 panum.1020.f: "'I am not sick. I am broken. But, I am happy to be alive as long as I can paint.' -Frida Kahlo"
 panum.1022.t: "The Beginning of Poliomyelitis"
 panum.1022.d: "Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] today sent a brief summary of the symptoms that occur when early poliomyelitis breaks out."
 panum.1022.f: "'Healthy and mostly blooming-looking children between the ages of 6 and 36 months, in exceptional cases a little older, become ill after previously enjoying untroubled health, either with or without previous hints of indisposition, such as: rolling of the eyes, suddenly under the manifestations of heat, congestive and irritative states, fever, thirst, peevishness, crying, drowsiness without real sleep, as well sometimes with the symptoms of disturbed course of acute, exanthematous disease processes. Soon afterwards, convulsions of a milder or more severe degree break out, which repeat themselves at shorter or longer intervals.\n\nIn other cases, the disease appears suddenly without the symptoms listed, with convulsions or nausea, slumping of the body, foaming at the mouth and nose, turning blue, etc.\n\nSometimes, however, all of these symptoms are absent, or are only present to a very mild degree, and the paralysis sets in slowly and unnoticed.'"
 panum.1040.t: "Contributions to the Knowledge of Heine-Medin Disease"
 panum.1040.d: "Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] presented a revolutionary paper to the Faculty of Medicine today that will serve as a starting point for getting polio epidemics under control - and improving the treatment of polio survivors."
 panum.1040.f: "In [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] 'Contributions to the Knowledge of Heine-Medin Disease', Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] mentioned several aspects that should help prevent and spread poliomyelitis. A key insight is that polio is an infectious disease. In addition to the measures derived from this, there are also a variety of methods to help patients. High-protein diets, physical therapy programs, and new inventions like the iron lung provide new hope that polio may not be eradicated, but can be managed better in the future."
 panum.1040.g: "We need a Polio Hall of Fame."
 panum.1041.t: "Physiotherapy"
 panum.1041.d: "The doctor meets a nurse who turns [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] previous knowledge of polio treatment on its head."
 panum.1041.f: "'And how long have you been doing this now?'\n'Ten years, Doctor.'\n'You put heating pads under the patients?'\n'Yes, doctor.'\n'And you say that helped?'\n'Your skepticism cannot obscure the success. It's not just about the heating pad. Massages and relaxation exercises are needed. A muscle that is splinted no longer develops. It needs exercise.'\n'Hmm...'"
 panum.1041.g: "But...polio patients need rest and stabilization!"
 panum.1042.t: "The Street"
 panum.1042.d: "When inspecting the outbreak area of the polio disease, Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] proceeds systematically."
 panum.1042.f: "'If someone follows the spread of the poliomyelitis raging in [SCOPE.sState('panum_disease_state').GetCityHubName], one cannot miss an interesting discovery. The falls are strung together like a string of pearls. You can follow a road and see the cases side by side. I was able to trace the chronological occurrence on a railway line in the area. This is no coincidence.'\n\nFrom the journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [SCOPE.sState('panum_disease_state').GetCityHubName]"
 panum.1042.g: "But is this evidence enough for infection?"
 panum.1043.t: "The Parish"
 panum.1043.d: "Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] has visited a remote community in the plague area to further his research into the causes of polio disease."
 panum.1043.f: "'49 cases in this community?'\n'As mayor, I regret to say this, Doctor.'\n'When you were making the map of where these cases occurred in the parish, did you notice anything?'\n'With all due respect, I'm not a scientist.'\n'The illnesses spread from one point. It's the village school.'"
 panum.1043.g: "Is polio perhaps not a hereditary disease but contagious?"
 panum.1044.t: "Philanthropy"
 panum.1044.d: "Polio survivors have come to Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]. You would like to support scientific work related to polio research with a foundation."
 panum.1044.f: "At the beginning of the 20th century, polio was a disease that alarmed large parts of society because its background was unknown and even middle-class or wealthy classes could be affected. Some polio survivors who became wealthy also campaigned against the disease throughout their lives and supported private and government initiatives. Polio is a disease that philanthropy has played a major role in combating."
 panum.1044.g: "A valuable support."
 panum.1044.h: "The money should flow equally into vaccine research."
 panum.1044.i: "The foundation money would also benefit general research."
 panum.1045.t: "Antibiotics"
 panum.1045.d: "Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] has achieved success in polio treatment by using antibiotics."
 panum.1045.f: "'There is no cure for polio. And unfortunately I don't see how this will be possible in the future. There can only be prevention, research into the causes and avoiding the spread - and treatment to alleviate the symptoms. Antibiotics can help protect weakened muscles from infections. This is a step in the right direction. Hopefully more will follow.'\n\nFrom the journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [SCOPE.sState('panum_disease_state').GetCityHubName]"
 panum.1045.g: "Cheers to antibiotics!"
 panum.1046.t: "Social Ostracism"
 panum.1046.d: "In a reform paper, Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] pointed out to his academic colleagues that the reintegration of polio survivors means more than just curing, treating or alleviating the disease. The social stigma of individuals must be reduced - and eliminated."
 panum.1046.f: "'I remember the biggest challenge for me was getting on the school bus. That first step up onto the bus seemed like a mile, and I just couldn't do it. For a while my mother came out, and it was so embarrassing because she would bring out this stool. But I couldn't stand the embarrassment, so my dad and the bus driver (his name was Bill, and I remember him vividly) got together and discussed how they could solve that problem. What my dad did was go out to where the bus stopped, and he dug a trench in the dirt. Bill would drive the front wheel of the bus down in that trench, and that would lower the step down to where it was really close to the ground. Then I could just get on the bus without a problem. And nobody really noticed...'\n\nJennifer W., Polio Survivor"
 panum.1046.g: "Polio survivors are not second-class citizens."
 panum.1047.t: "The Price of Progress"
 panum.1047.d: "In his investigation into the causes of the polio epidemics that have been occurring for years, Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] came to an unpleasant truth."
 panum.1047.f: "'Polio has been known since ancient times, but - as far as my research allows - until the end of the 19th century it was not an epidemic disease like it is today. The reason for this, if confirmed, is a paradoxical one: better health care. Before the introduction of sewerage and sanitation, children were exposed to polio much earlier, around 6 months to 4 years old. During this time the disease is milder and provides immunity. The older a person infected with polio, the more likely paralysis occurs. Improved health standards have meant that fewer people have developed immunity and are more vulnerable to the dangerous consequences of the disease.'\n\nFrom the journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [SCOPE.sState('panum_disease_state').GetCityHubName]"
 panum.1047.g: "The disease is spreading because public health has improved?"
 panum.1048.t: "Bacillus or Virus?"
 panum.1048.d: "Nothing is yet known about the causative agent of poliomyelitis. Because of this, Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] finds [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself] in an animated dispute with colleagues."
 panum.1048.f: "Although poliomyelitis had been known for a long time and, with the development of microbiology, it became clear that it was a pathogen, beliefs continued to differ for a long time as to whether it was polio bacteria or polio viruses."
 panum.1048.g: "Everything points to a virus."
 panum.1048.h: "This useless chatter is distracting the doctor from his work!"
 panum.1049.t: "Wheelchair Acceptance"
 panum.1049.d: "Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] has found that it's not just important to provide patients with wheelchairs - they also need to be socially accepted so that polio survivors can easily reintegrate into normal life."
 panum.1049.f: "'I was really quite naive about going to college and was surprised to find that the university wasn't accessible for a person in a wheelchair. But that was the way it was then. There were steps all over the place, and it wasn't like high school where I had a group of friends to carry me around... Many times I had to get a bunch of volunteers or just recruit people as they were rushing from class to class, and sometimes they would say, 'I just don't have time. I can't help you.' I had to live in an apartment off campus because not one of the dorms was accessible.'\n\n David K., Polio Survivor"
 panum.1049.g: "We support a campaign for more wheelchair acceptance."
 panum.1049.h: "Fund a program to add wheelchair-accessible ramps to public buildings."
 panum.1051.t: "Polio Advice"
 panum.1051.d: "A recommendation for action on polio disease is currently circulating in the academic world and is causing Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] all the trouble to enforce [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] own theses on polio treatment."
 panum.1051.f: "'Give oxygen through the lower extremities, by positive electricity. Frequent baths using almond meal, or oxidising the water. Applications of poultices of Roman chamomile, slippery elm, arnica, mustard, cantharis, amygdalae dulcis oil, and of special merit, spikenard oil and Xanthoxolinum. Internally use caffeine, Fl. Kola, dry muriate of quinine, elixir of cinchone, radium water, chloride of gold, liquor calcis and wine of pepsin.'\n\nDr. Angelika Hasenbein, 'A Monograph on the Epidemic of Poliomyelitis (Infantile Paralysis)'"
 panum.1051.g: "It actually sounds very convincing."
 panum.1052.t: "Plaster Casts and Braces"
 panum.1052.d: "Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] has learned from several \"polio experts\" that leg splints are the best way to improve the initial situation for patients - but [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] is not convinced."
 panum.1052.f: "Patients with residual paralysis were treated with braces and taught to compensate for lost function with the help of calipers, crutches and wheelchairs. The use of devices such as rigid braces and body casts, which tended to cause muscle atrophy due to the limited movement of the user, were also touted as effective treatments. Most of these treatments proved to be of little therapeutic value"
 panum.1052.g: "Maybe it helps...?"
 panum.1053.t: "Useless Surgery"
 panum.1053.d: "Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] was assured by surgeons that surgical procedures have a positive effect on polio."
 panum.1053.f: "'I have spent countless hours interviewing colleagues, studying books, and reviewing patients to convince myself of the success of surgical interventions for polio. The doctors are very proud of their results. The way they deal with the mutilations is reminiscent of precision mechanics who believe they are setting up a clockwork. They use precision tools to work on human machines. But my impression is that the focus here is not on the disease, not on the patient - but on the reputation of the doctors. So far, I am not aware of any case in which this method has actually led to successful polio treatment.'\n\nFrom the journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [SCOPE.sState('panum_disease_state').GetCityHubName]"
 panum.1053.g: "A false lead."
 panum.1054.t: "Convalescent Serum"
 panum.1054.d: "Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] tried out a highly acclaimed serum that is considered an effective remedy in current polio medicine. Although [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] colleagues are convinced of the method, the doctor thinks it is a waste of time."
 panum.1054.f: "'At that time they had some idea that it was an infectious disease, so I was given what was called 'convalescent serum' which was made from the blood of people who had recovered from polio. That form of treatment was in vogue back then. It seems unlikely that it had any effect since the disease progressed to rather pronounced paralysis with no movement in either leg and no movement in my abdominal muscles. I was put in isolation, and I think I might've been told that I had poliomyelitis. However, I didn't know what poliomyelitis was. Nobody told me that I had infantile paralysis, which I would have recognized because Roosevelt was president at that time, and I knew he had suffered significant paralysis from the disease.'\n\nRichard O., Polio Survivor"
 panum.1054.g: "But every doctor prescribes it?"
 panum.1055.t: "Isolation"
 panum.1055.d: "In addition to restraining the limbs, some polio experts believe it is advisable to completely isolate patients. Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] carried out such experiments himself - and came to the conclusion that it was an inefficient and inhumane therapy."
 panum.1055.f: "'After the spinal tap was done and the diagnosis of polio was made, I was immediately placed in isolation and told that I shouldn't raise my head. I remember that they put me in a crib! I was nine years old, and I couldn't understand why I had been placed in a crib. It was very degrading. I certainly wasn't going to climb out of bed, nor was I likely to roll over and fall out. In fact, I could hardly move. As I lay there in that crib, I could feel the virus really setting in. It was like a door slamming shut. I felt like my world had totally changed. To make things worse, it was terribly hot and humid, and of course, that was before air conditioning; I remember feeling very uncomfortable...'\n\nSharon K., Polio Survivor"
 panum.1055.g: "This is unacceptable!"
 panum.1055.h: "This could be the start of a second career."
 panum.1055.i: "Let these records disappear quickly."
 panum.1056.t: "Post-Polio Syndrome"
 panum.1056.d: "During a recent examination, Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] found that after the actual polio infection, including its effects, there can be after-effects in the form of post-polio syndrome. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] is completely desperate about this development."
 panum.1056.f: "'When I was about 35 or 40 years old, I started having terrible pain in my joints and muscles. I got tired very easily. I went to the doctor and had x-rays and blood tests. I got some pills and had physical therapy. Nothing helped.\nAs I waited for them to find the records, I explained to the person who was helping me that I was experiencing all this new pain, and I was hoping that the records could help explain why. Well, she asked if I had heard about post-polio syndrome. I said, 'No, what's that?' She explained that about 30 or 40 years after you had polio, it's like you get it over again.\nThinking about dealing with polio over again was more than I could handle. I just fell apart. I called my sister-in-law and told her what I had found out. I also told my family. I cried a lot. I showed my local doctors my medical records and explained about my appointment at Sister Kenny Institute. They again told me that polio was a thing of the past. I said, 'Yes, but I'm here now, and I'm living it again!'\n\nJanice G., Polio Survivor"
 panum.1056.g: "What a hopeless situation."
 panum.1061.t: "Experiments"
 panum.1061.d: "In a dubious but no less successful experiment, Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] infected monkeys with polio."
 panum.1061.f: "'I recently read about a procedure that Jean-Antoine Villemin used to prove the contagiousness of tuberculosis. He carried out experiments on rabbits by deliberately bringing them into contact with the tissue of tuberculosis sufferers. Dozens of dead canines later, he was able to prove his thesis. My experiment with monkeys is based on a similar assumption.'\n\nFrom the journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [SCOPE.sState('panum_disease_state').GetCityHubName]"
 panum.1061.g: "If animals can be infected, so can humans among each other."
 panum.1062.t: "Iron Lung"
 panum.1062.d: "The brilliant engineer [ROOT.Var('tesla_engineer_var').GetCharacter.GetFullName] helped Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] build an ingenious device that revolutionized polio treatment."
 panum.1062.f: "An iron lung was one of the first clinical devices that enabled mechanical ventilation of a human. Around 1920, the American engineer Philip Drinker developed it to ventilate patients with lung diseases. The patient's body, except for the head, lies completely inside a hollow cylinder. The device seals the neck airtight and creates a negative pressure. This causes the ambient pressure to force air through the patient's nose and mouth into the lungs. Exhalation occurs accordingly by building up excess pressure in the chamber. Many polio patients only needed the iron lung in the acute phase of the disease until muscle function resumed. Some patients used them only overnight, others used them continuously."
 panum.1062.g: "This may save a lot of lives."
 panum.1063.t: "Psychological support"
 panum.1063.d: "As a psychiatrist, Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] used [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] experience to make life easier for polio patients."
 panum.1063.f: "'We rightly pay attention to the physical component of illness when we speak of poliomyelitis. But next to the damaged body there is a damaged soul. Polio doesn't just leave physical traces. Especially when working with children, I have experienced the impact this horrible disease has on their private and social lives. Words cannot heal. But they can provide relief. And we have to give survivors perspective so that they not only survive, but have the will to survive.'\n\nFrom the journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [SCOPE.sState('panum_disease_state').GetCityHubName]"
 panum.1063.g: "Thank you, Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]."
 panum.1064.t: "Diet"
 panum.1064.d: "Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] advocates a nutrient-rich diet for polio patients."
 panum.1064.f: "'Previous successes in combating rickets, iodine deficiency, scurvy and pellagra have shown that our diet can play a decisive role in combating diseases. Polio is not a deficiency disease. But it is known that proteins play an important role in building muscle, and it is therefore important to point out that the diet of polio patients must be richer than that of ordinary people.'\n\nFrom the journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [SCOPE.sState('panum_disease_state').GetCityHubName]"
 panum.1064.g: "Finally a doctor's certificate for eating T-bone steaks."
