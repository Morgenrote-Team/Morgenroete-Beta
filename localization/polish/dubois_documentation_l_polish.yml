 custom_animal_documentation_topic_1: "Szczegółowe omówienie rytuałów godowych i zachowań związanych z rozmnażaniem się zwierząt."
 custom_animal_documentation_topic_2: "Autor dzieli się barwnymi, osobistymi doświadczeniami związanymi z tym stworzeniem w jego naturalnym środowisku."
 custom_animal_documentation_topic_3: "Bogato ilustrowana książka ożywia świat zwierząt dzięki żywym kolorom."
 custom_animal_documentation_topic_4: "Ostra krytyka wpływu współczesnego społeczeństwa na kurczące się środowisko naturalne zwierząt."
 custom_animal_documentation_topic_5: "Dogłębna analiza nawyków żywieniowych zwierzęcia i preferowanej diety."
 custom_animal_documentation_topic_6: "Naukowcy traktują tę pracę z rozbawieniem, zakładając, że jej podejście jest niekonwencjonalne."
 custom_animal_documentation_topic_7: "Prasa chwali tę książkę za wnikliwość i wciągającą narrację."
 custom_animal_documentation_topic_8: "Książka zawiera wyczerpujący opis codziennych czynności i zachowań zwierząt."
 custom_animal_documentation_topic_9: "Książka ta stanowi szczery hołd i wyraża głębokie uczucie do zwierząt."
