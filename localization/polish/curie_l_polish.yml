 curie.11.t: "Znaleziono uran!"
 curie.11.d: "Dr [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] odkrył wyjątkowo bogate złoża uranu podczas pobierania próbek w [SCOPE.sState('curie_uranium_state_scope').GetName]. Fizycy i chemicy zalecają bezpośrednią eksploatację tego złoża."
 curie.11.f: "Uran (nazwany na cześć planety Uran) jest pierwiastkiem chemicznym o symbolu U i liczbie atomowej 92. Związki uranu były używane w XIX wieku do barwienia szkła i ceramiki, wazonów i przedmiotów dekoracyjnych, ale także przedmiotów codziennego użytku, takich jak miski lub szklanki. Producenci szkła w Joachimsthal (Czechy) stosowali tę technikę już w 1826 roku. Uran był używany do barwienia szkła aż do połowy XX wieku, kiedy to został zastąpiony innymi, mniej szkodliwymi minerałami barwiącymi. Zawierające uran szkliwa ceramiczne w kolorach od pomarańczowego do jasnoczerwonego były stosowane na wszystkim, od zastawy stołowej po akcesoria architektoniczne. Ceramika ta, nazywana w Stanach Zjednoczonych „Fiestaware” od nazwy producenta, jest prawdopodobnie jednym z najbardziej radioaktywnych przedmiotów, które nadal można znaleźć w wielu amerykańskich gospodarstwach domowych. "
 curie.11.g: "Zbudujcie tam kopalnię uranu!"
 curie.12.t: "Joachimsthal"
 curie.12.d: "Do tej pory kopalnia uranu w Joachimsthal w Czechach produkowała jedynie niewielkie ilości tego surowca. W związku ze wzrostem popytu spowodowanym potencjalnym wykorzystaniem uranu w przemyśle i nauce, obecnie planuje się znaczne zwiększenie produkcji."
 curie.12.g: "Joachimsthal stanie się centrum produkcji uranu!"
