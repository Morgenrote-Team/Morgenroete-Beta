 curie.10.t: "Uran znaleziony w [SCOPE.sState('curie_uranium_state_scope').GetName]"
 curie.10.d: "Geolog odkrył wyjątkowo bogate złoża uranu podczas pobierania próbek w [SCOPE.sState('curie_uranium_state_scope').GetName]. Fizycy i chemicy są tym niezwykle zainteresowani."
 curie.10.f: "Uran (nazwany na cześć planety Uran) jest pierwiastkiem chemicznym o symbolu U i liczbie atomowej 92. Związki uranu były używane w XIX wieku do barwienia szkła i ceramiki, wazonów i przedmiotów dekoracyjnych, ale także przedmiotów codziennego użytku, takich jak miski lub szklanki. Producenci szkła w Joachimsthal (Czechy) stosowali tę technikę już w 1826 roku. Uran był używany do barwienia szkła aż do połowy XX wieku, kiedy to został zastąpiony innymi, mniej szkodliwymi minerałami barwiącymi. Zawierające uran szkliwa ceramiczne w kolorach od pomarańczowego do jasnoczerwonego były stosowane na wszystkim, od zastawy stołowej po akcesoria architektoniczne. Ceramika ta, nazywana w Stanach Zjednoczonych „Fiestaware” od nazwy producenta, jest prawdopodobnie jednym z najbardziej radioaktywnych przedmiotów, które nadal można znaleźć w wielu amerykańskich gospodarstwach domowych."
 curie.10.g: "Świetlane perspektywy!"
