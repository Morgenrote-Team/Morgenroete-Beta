 academics.21.t: "Nasz [concept_tesla_engineer] zmarł"
 academics.21.d: "Po spędzeniu dekad jako [concept_tesla_engineer], nasz dawny #b #ORANGE Naczelny Inżynier#!#! zmarł. Czy kiedykolwiek będziemy w stanie zastąpić takiego nadzwyczajnego naukowca?"
 academics.21.g: "To ogromna strata!"
 academics.21_tt: "Czasami gra zabija postaci. Mod nie może tego zatrzymać. Ten event usuwa rolę tego naukowca z gry, tak aby nie nawiedzał cię jego duch."
 academics.22.t: "Nasz [concept_verrier_astronomer] zmarł"
 academics.22.d: "Po spędzeniu dekad jako [concept_verrier_astronomer], nasz były #b #ORANGE Naczelny Astronom#!#! zmarł. Czy kiedykolwiek będziemy w stanie zastąpić takiego nadzwyczajnego naukowca?"
 academics.26.t: "Nasz [concept_dubois_naturalist] zmarł"
