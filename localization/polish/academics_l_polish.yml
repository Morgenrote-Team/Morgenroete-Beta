 je_academics_found_archaeological_museum: "Focus on Archaeology: Found a Museum"
 je_academics_found_archaeological_museum_reason: "The [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] wants us to build an Archaeological Museum to enhance knowledge, but also the living standard of our intellectuals. Building a museum requires #p 5#! [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')], which must be found by an [concept_lepsius_archaeologist] on an [concept_lepsius_expedition], should we not have the outrageous luck of acquiring them through a random gift or a local excavation.\nIt's also very important because the professional archaeological catchphrase 'This belongs in a museum!' wouldn't make much sense without an actual museum.\n\nIn fact, it would be quite embarrassing."
