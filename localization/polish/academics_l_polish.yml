 setting_academics_historical_focus_rule_desc: "Niektóre kraje zaczną z ich historyczną szkołą technologii. Dla przykładu, Prusy rozpoczną z kompleksem wojskowo-przemysłowym, a Francja z awangardową inteligencją."
