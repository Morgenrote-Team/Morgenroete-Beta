 academics.27.t: "Nasz [concept_dubois_paleontologist] zmarł"
 academics.27.d: "Po spędzeniu dekad jako [concept_dubois_paleontologist], nasz dawny #b #GREEN Naczelny Paleontolog#!#! zmarł. Czy kiedykolwiek będziemy w stanie zastąpić takiego nadzwyczajnego naukowca?"
 academics.29.t: "Nasz [concept_lepsius_archaeologist] zmarł"
 academics.29.d: "Po spędzeniu dekad jako [concept_lepsius_archaeologist], nasz dawny #b #BLUE Naczelny Archeolog#!#! zmarł. Czy kiedykolwiek będziemy w stanie zastąpić takiego nadzwyczajnego naukowca?"
