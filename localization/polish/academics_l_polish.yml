 gaudi_aeronautical_engineer_experience_gain_tt: "Your [concept_tesla_engineer], [GetPlayer.MakeScope.Var('tesla_engineer_var').GetCharacter.GetFullName], gains [SCOPE.GetValue('xp_amount')|0+] #ORANGE Aeronautical Engineering Experience#!."
