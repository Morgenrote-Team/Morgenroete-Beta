 setting_academics_missions_rule_desc: "Co dziesięć lat otrzymasz Misję dla twojej Akademii. Te misje mogą przykładowo obejmować wybudowanie budynku akademickiego lub odnalezienie określonej ilości okazów. Te misje dadzą ci niewielką nagrodę."
 setting_academics_no_missions_rule: "Misje akademickie #n niedostępne#!"
 setting_academics_no_missions_rule_desc: "Nie będziesz otrzymywał żadnych misji akademickich."
 rule_academics_focus_rule: "#tooltip:[GetRawTextTooltipTag('mr_morgenroete_tt')] @mr_morgenroete_icon! #!Historyczne ukierunkowania akademickie"
