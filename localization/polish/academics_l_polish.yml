 academics_society_visit_status_tt: "Take a look at the current, internationally recognized scientific theories."
 academics.91.t: "Scientific Theorems"
 academics.91.d: "The Scientific Society considers the following theorems to be valid. However, they can be changed at a scientific congress."
 academics.91.history: "#T History#!\n"
 academics.91.exodus_default: "The Bible is a useful #YELLOW primary source#!."
 academics.91.exodus_merit: "The Bible is not a primary source, but it is a useful #YELLOW secondary source#!."
 academics.91.exodus_invention: "The Bible is #YELLOW useless#! as a source and therefore dispensable for research."
 academics.91.civilization_default: "\n#YELLOW Egypt#! is the oldest civilization."
 academics.91.civilization_panbabylonism: "\n#YELLOW Babylon#! is the oldest civilization. All cultural achievements and ideas emanate from her."
 academics.91.civilization_antipanbabylonism: "\nBabylonia is an important cradle of humanity, but there are #YELLOW parallel developments#!."
 academics.91.troy_default: "\nTroy is a #YELLOW myth#!."
 academics.91.troy_homeric: "\nThe Homeric epics about Troy depict the #YELLOW historical events#!."
 academics.91.troy_historical: "\nThe Homeric epics about Troy have a #YELLOW core of truth#!."
 academics.91.troy_myth: "\nTroy is a #YELLOW myth#!."
 academics.91.troy_disputed: "\nThe scholarly discussion about Troy remains #YELLOW unresolved#!."
 academics.91.natural_history: "\n\n#T Natural History#!"
 academics.91.hippocampus_default: "\nThe place of man in the animal kingdom is #YELLOW not determined#!."
 academics.91.hippocampus_unique: "\nIn the animal kingdom, humans are #YELLOW unique#!."
 academics.91.hippocampus_primate: "\nIn the animal kingdom, humans are #YELLOW closest to apes#!."
 academics.91.origin_default: "\nThe origin of modern humans is #YELLOW unknown#!."
 academics.91.origin_europe: "\nThe origin of modern humans lies in #YELLOW Europe#!."
 academics.91.origin_asia: "\nThe origin of modern humans lies in #YELLOW Asia#!."
 academics.91.origin_africa: "\nThe origin of modern humans lies in #YELLOW Africa#!."
 academics.91.extinction_default: "\nThe reason for the extinction of the dinosaurs is #YELLOW unknown#!."
 academics.91.extinction_asteroid: "\nAn #YELLOW asteroid impact#! led to the extinction of the dinosaurs."
 academics.91.extinction_climate: "\n#YELLOW Climate change#! was responsible for the extinction of the dinosaurs."
 academics.91.extinction_sex: "\nThe dinosaurs died out because they simply #YELLOW didn't want to have sex anymore#!. Just like Professor Tottenham's wife."
 academics.91.extinction_mammals: "\n#YELLOW Competition with mammals#! and their preference for dinosaur eggs led to the latter's extinction."
 academics.91.extinction_fat: "\nThe dinosaurs became #YELLOW too big and too fat#! (pathological gigantism) and, reaching an evolutionary dead end, eventually died out."
 academics.91.extinction_stupid: "\nThe dinosaurs became extinct because #YELLOW their brains shrank over time and became too stupid to survive#!."
 academics.91.astronomy: "\n\n#T Astronomy#!"
 academics.91.ceres_default: "\nThe solar system has #YELLOW [GetGlobalVariable('verrier_planets_number').GetValue]#! planets."
 academics.91.ceres_demoted: "\nThe solar system has #YELLOW [GetGlobalVariable('verrier_planets_number').GetValue]#! planets. Ceres is just an asteroid."
 academics.91.ceres_saved: "\nThe solar system has #YELLOW [GetGlobalVariable('verrier_planets_number').GetValue]#! planets. Ceres one of them."
 academics.91.galaxies_default: "\nNebulae, such as the Andromeda Nebula, #YELLOW remain a mystery#!."
 academics.91.galaxies_no: "\nThe Milky Way encompasses the #YELLOW entire universe#!. Phenomena like the Andromenade Nebula are #YELLOW mere clouds of gas#!."
 academics.91.galaxies_yes: "\nThe Milky Way is just #YELLOW one of many galaxies#! that make up the universe. Apparitions like the Andromeda Nebula are actually #YELLOW other galaxies#!."
 academics.91.sun_default: "\nThe Sun lies in the #YELLOW center of the Universe#!."
 academics.91.sun_center: "\nThe Sun lies in a #YELLOW central region#! of the Milky Way."
 academics.91.sun_outer: "\nThe Sun lies in an #YELLOW outer region#! of the Milky Way."
