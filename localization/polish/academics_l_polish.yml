 academics.119.f: ""
 academics.119.g: "Nowy rodzaj człowieka!"
 academics.108.t: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] jest teraz doświadczonym geologiem"
 academics.108.d: "Po latach kopania i uczenia się, nasz [concept_agassiz_geologist] Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] posiadł szerokie doświadczenie!"
 academics.108.f: ""
 academics.108.g: "Wykopałem to!"
 academics.109.t: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] jest teraz sławnym geologiem"
 academics.109.d: "Po spędzeniu większej ilości czasu z kamieniami niż z ludźmi, nasz [concept_agassiz_geologist] Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] jest teraz znany w świecie geologii!"
 academics.109.f: ""
 academics.109.g: "Prawdziwa gwiazda Rocka!"
 academics.140.t: "Nasz inżynier, [ROOT.Var('tesla_engineer_var').GetCharacter.GetFullName], jest teraz inżynierem budownictwa"
 academics.140.d: "Lata pracy w inżynierii budownictwa opłaciły się. Po skonstruowaniu wielu mostów i tuneli, Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] uznaje się teraz za prawdziwego [concept_tesla_civil_engineer]. To z pewnością pomoże [ROOT.Var('tesla_engineer_var').GetCharacter.GetHerHis] projektom!"
 academics.140.f: ""
 academics.140.g: "Inżynier naszej przyszłości!"
 academics.141.t: "Nasz inżynier, [ROOT.Var('tesla_engineer_var').GetCharacter.GetFullName], jest teraz inżynierem mechanikiem"
 academics.141.d: "Lata pracy z maszynami opłaciły się. Wiele wynalazków i nowych maszyn, które Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] stworzył w końcu pozwoliły mu zostać prawdziwym [concept_tesla_mechanical_engineer]. Czekamy na kolejne niesamowite projekty!"
 academics.141.f: ""
 academics.141.g: "Prawdziwy silnik postępu!"
 academics.142.t: "Nasz inżynier, [ROOT.Var('tesla_engineer_var').GetCharacter.GetFullName], jest teraz inżynierem wojskowym"
 academics.142.d: "Lata pracy dla armii opłaciły się. Po budowaniu fortec, konstruowaniu nowych broni i ekwipowaniu naszych żołnierzy przez lata, Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] jest teraz uznawany za prawdziwego [concept_tesla_military_engineer]. Miejmy nadzieję że będzie kontynuował służbę naszemu krajowi!"
 academics.142.f: ""
 academics.142.g: "Inżynieria to podstawa naszej armii!"
 academics.143.t: "Nasz inżynier, [ROOT.Var('tesla_engineer_var').GetCharacter.GetFullName], jest teraz inżynierem elektrykiem"
 academics.143.d: "Wykorzystanie mocy elektryczności od zawsze było marzeniem Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName]. Po wielu przełomach w tym obszarze, [ROOT.Var('tesla_engineer_var').GetCharacter.GetSheHe] jest teraz uznawany za [concept_tesla_electrical_engineer]."
 academics.143.f: ""
 academics.143.g: "Iskra wiedzy!"
 academics.144.t: "Nasz inżynier, [ROOT.Var('tesla_engineer_var').GetCharacter.GetFullName], jest teraz inżynierem aeronautyki"
 academics.144.d: "Od wieków człowiek marzył o wzbiciu się w powietrze. Teraz gdy to marzenie stało się rzeczywistością, Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] jest jednym z czołowych pionierów aeronautyki. Po wielu przełomach w tym obszarze, [ROOT.Var('tesla_engineer_var').GetCharacter.GetSheHe] jest teraz uznawany za [concept_tesla_aeronautical_engineer]."
 academics.144.f: ""
 academics.144.g: "Ku niebiosom!"
 notification_academics_yearly_experience_gain_notification_name: "Coroczny zysk doświadczenia naukowców"
 notification_academics_yearly_experience_gain_notification_desc: "Każdy naukowiec który może zdobyć doświadczenie zdobył#p 5#! doświadczenia."
 academics.1000.t: "Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] prosi o finansowanie"
 academics.1000.d: "Nasz [concept_tesla_engineer], Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetFullName], jest niezadowolony z finansowania [ROOT.Var('tesla_engineer_var').GetCharacter.GetHerHis] departamentu. [ROOT.Var('tesla_engineer_var').GetCharacter.GetSheHe] prosi o więcej funduszy na [ROOT.Var('tesla_engineer_var').GetCharacter.GetHerHis] badania."
 academics.1000.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_receiver_of_funding_custom_loc')] Ja za to jestem zaangażowany w poważne badania! Badania z korzyściami naukowymi...\nMój departament powinien otrzymywać więcej funduszy! Jestem obecnie zaangażowany w projekt który zmieni nasz świat!\n[SCOPE.GetRootScope.GetCountry.GetCustom('academics_engineer_focus_custom_loc')]\n\nAle, by to osiągnąć, potrzebujemy dodatkowych funduszy!"
 academics.1000.g: "Sfinansuj jego badania!"
 academics.1000.h: "Kogo obchodzą jacyś tam inżynierowie?!"
 academics_additional_funding_engineer_modifier: "Dodatkowe fundusze dla inżynierów"
 academics_no_funding_engineer_modifier: "Brak finansowania dla inżynierów"
 dubois_humanities_receive_promotion_loc: "Łupieżcy grobów i nekrofile nic nie wnoszą do naszego społeczeństwa!"
 dubois_natural_history_receive_promotion_loc: "Dlaczego kolekcjonerzy motyli i konstruktorzy potworów otrzymują całe finansowanie, a my musimy zadowalać się resztkami?"
 dubois_mathematics_receive_promotion_loc: "To absolutny idiotyzm, że szaleni naukowcy i obserwatorzy gwiazd mają wszystkie swoje życzenia spełniane, podczas gdy my musimy zadowalać się okruszkami!"
 academics_engineer_focus_atmospheric_engine_loc: "Próbujemy wykorzystać moc pary by zastąpić robotników maszynami. To uczyniłoby wydobycie zasobów czy produkcję rzeczy tańszymi!"
 academics_engineer_focus_computer_loc: "Próbujemy stworzyć maszynę która może przeprowadzić wszelkie obliczenia. To uczyniłoby ludzkie komputery niepotrzebnymi. Moglibyśmy obliczyć wszystko z całkowitą precyzją i to bez żadnych błędów!"
 academics_engineer_focus_washing_machine_loc: "Naszym celem jest stworzyć maszynę która może wyprać pranie bez potrzeby pracy. To zrewolucjonizowałoby nasze społeczeństwo, ponieważ nie musielibyśmy marnować czasu z praniem naszego brudnego prania!"
 academics_engineer_focus_lighter_loc: "Możesz sobie wyobrazić jak użyteczna byłaby mała kieszonkowa zapalniczka? Taka, która tworzy duży płomień i może zapalać świeczki czy papierosy? To są pieniądze które czekają by je podnieść!"
 academics_engineer_focus_rocket_loc: "Chcemy stworzyć rakietę, która byłaby w stanie osiągnąć kosmos. Tylko wyobraź sobie wojskowe zastosowania takich rakiet. Mógłbyś uderzyć na swoich wrogów a oni nie byliby w stanie nic z tym zrobić!"
 academics_engineer_focus_telephone_loc: "Wyobraź sobie urządzenie które mógłbyś użyć do rozmawiania na duże dystanse! To właśnie nad tym pracujemy teraz w naszym laboratorium!"
 academics_engineer_focus_combustion_engine_loc: "Pociągi są super, ale są duże i potrzebują torów. Co gdybyśmy byli w stanie zbudować niewielki silnik, który jest w stanie napędzić mały pojazd. Wszyscy mogliby wszędzie podróżować. Jest wiele praktycznych zastosowań takiego silnika. I nad tym właśnie pracuje teraz mój zespół!"
 academics_engineer_focus_basic_research_alloys_loc: "Prowadzimy podstawowe badania w celu wynalezienia tylu użytecznych stopów ile się da. Jeżeli uda się nam znaleźć odpowiednie stopy, będziemy mogli tworzyć lepsze konstrukcje, bardziej efektywne maszyny i urządzenia, które teraz są uznawane za niemożliwe!"
 academics_engineer_focus_basic_research_factory_machinery_loc: "Mój zespół pracuje nad ulepszeniem maszyn używanych w fabrykach. To mogłoby prowadzić do masywnego wzrostu w naszej produkcji i bogactwa naszego kraju!"
 academics_engineer_focus_basic_research_housing_loc: "Poszukujemy najbardziej efektywnego sposobu na budowę domów w celu taniego tworzenia przestrzeni życiowych. To mogłoby pomóc ludziom w uzyskaniu lepszych warunków życiowych i wsparłoby nasz sektor budowlany."
 academics_engineer_focus_basic_research_urban_planing_loc: "Nasze miasta są niewystarczająco efektywne. Dlatego musimy znaleźć sposób na uczynienie ich bardziej efektywnymi w celu podniesienia standardu życia naszych mieszkańców!"
 academics.1001.t: "Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] prosi o finansowanie"
 academics.1001.d: "Nasz [concept_verrier_astronomer], [ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName], prosi o więcej funduszy dla [ROOT.Var('verrier_astronomer_var').GetCharacter.GetHerHis] obserwatorium. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetSheHe] twierdzi, że bez dodatkowych funduszy [ROOT.Var('verrier_astronomer_var').GetCharacter.GetHerHis] zespół nie będzie w stanie odkryć nowych [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]."
 academics.1001.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_receiver_of_funding_custom_loc')] Nasza praca jest niezbędna w celu zrozumienia tajemnic czasu i przestrzeni. Moglibyśmy odkryć tyle wielkich rzeczy gdybyśmy tylko mieli wystarczająco dużo pieniędzy!\nPotrzebujemy nowoczesnego teleskopu, który pozwoliłby nam wyprzedzić inne kraje! Chodzi o prestiż narodu!"
 academics.1001.g: "Opłać nowy teleskop!"
 academics.1001.h: "Co jeszcze? Nie odkryją już więcej żadnych gwiazd?"
 academics_additional_funding_astronomer_modifier: "Dodatkowe fundusze dla astronomów"
 academics_no_funding_astronomer_modifier: "Brak finansowania dla astronomów"
 academics.1002.t: "Dr. [ROOT.Var('dubois_naturalist_var').GetCharacter.GetLastName] prosi o finansowanie"
 academics.1002.d: "Nasz [concept_dubois_naturalist], [ROOT.Var('dubois_naturalist_var').GetCharacter.GetFullName], chce wysłać ekspedycję naukową do dzikiej części świata, pełnej nieznany roślin i zwierząt. W takim regionie [ROOT.Var('dubois_naturalist_var').GetCharacter.GetLastName] ma nadzieję odkryć wiele nowych [concept_dubois_specimen]."
 academics.1002.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_receiver_of_funding_custom_loc')] Ja tymczasem próbuję odkryć wszystkie gatunki świata! To może być bardzo ważne w przyszłości, ponieważ nigdy nie wiesz, z czym pomoże czy nowy gatunek. I wyobraź sobie, mógłbym nawet nazwać nowe zwierze lub roślinę na twoją cześć! Czy to nie byłoby wspaniałe?\nPotrzebuję tylko funduszy by przeprowadzić tą ekspedycję."
 academics.1002.g: "Ufunduj jego ekspedycję!"
 academics.1002.h: "Mamy już wystarczająco dużo gatunków w domu."
 academics_additional_funding_naturalist_modifier: "Dodatkowe fundusze dla przyrodników"
 academics_no_funding_naturalist_modifier: "Brak finansowania dla przyrodników"
 academics.1003.t: "Dr. [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] prosi o finansowanie"
 academics.1003.d: "Nasz [concept_dubois_paleontologist], [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetFullName], bardzo potrzebuje funduszy dla jego muzeum dinozaurów. To pozwoliłoby [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetHerHim] prezentować więcej [Concept('concept_dubois_dinosaur_skeleton','$concept_dubois_dinosaur_skeletons$')] i [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] i w ten sposób zwiększać chwałę naszej ojczyzny."
 academics.1003.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_receiver_of_funding_custom_loc')]\nTymczasem ja mam prestiżowe muzeum, które ledwo mogę utrzyma. Te dinozaury to największe cuda na świecie i one tylko zbierają kurz!\nGdybym miał dość funduszy, mógłbym powiększyć muzeum i udekorować je nowymi szkieletami. To byłaby fantastyczna kolekcja która przyciągnęłaby tysiące odwiedzających do naszego kraju!\nBez funduszy, będę musiał zwolnić moich asystentów, a kto wie czy będę wiedział gdzie dinozaury mają głowy bez ich pomocy!"
 academics.1003.g: "Ufunduj muzeum!"
 academics.1003.h: "Znów [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetSheHe] chce funduszy na Park Jurajski czy coś w tym rodzaju. Nie, dziękuję!"
 academics_additional_funding_paleontologist_modifier: "Zwiększone finansowanie badań paleontologicznych"
 academics_no_funding_paleontologist_modifier: "Brak finansowania badań paleontologicznych"
 academics.1004.t: "Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] prosi o finansowanie"
 academics.1004.d: "Nasz [concept_lepsius_archaeologist], [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullName], pilnie potrzebuje funduszy na organizację kolejnych wypraw i wykopalisk. Tylko w ten sposób nasz naród może dotrzymać kroku innym mocarstwom."
 academics.1004.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_receiver_of_funding_custom_loc')]\nWszystkie inne kraje codziennie wysyłają nowe ekspedycje na cały świat i plądrują skarby archeologiczne, podczas gdy nasze muzeum pozostaje puste. To niedopuszczalne!\nMoje zespoły pilnie potrzebują funduszy, aby nadążyć. Co jeśli przegapimy grobowiec króla tylko dlatego, że nie mieliśmy wystarczających środków? Wyobraź sobie, że nasi rywale świętują sukces przed całym światem, a my pozostajemy bez osiągnięć!"
 academics.1004.g: "Dajcie im więcej funduszy!"
 academics.1004.h: "[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] chce finansowania tylko na [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] wystawny styl życia!"
 academics_additional_funding_archaeologist_modifier: "Zwiększone finansowanie badań archeologicznych"
 academics_no_funding_archaeologist_modifier: "Brak finansowania badań archeologicznych"
 academics.1005.t: "Dr. [ROOT.Var('lepsius_anthropologist_var').GetCharacter.GetLastName] prosi o finansowanie"
 academics.1005.d: "Nasz [concept_lepsius_anthropologist], [ROOT.Var('lepsius_anthropologist_var').GetCharacter.GetFullName], pilnie potrzebuje funduszy na organizację kolejnych wypraw i wykopalisk. Tylko w ten sposób nasz naród może dotrzymać kroku innym mocarstwom."
 academics.1005.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_receiver_of_funding_custom_loc')]\nWszystkie inne kraje skupiają się na poszukiwaniu najstarszego brakującego ogniwa w naszej ewolucji, podczas gdy my dysponujemy jedynie kilkoma kośćmi ze średniowiecza... To niedopuszczalne!\nMoje zespoły pilnie potrzebują funduszy, aby kontynuować prace. Wyobraź sobie kości pierwszego człowieka leżące w naszym kraju, a następnie zniszczone przez pracowników, którym w ogóle nie zależy. Jeśli nie otrzymamy funduszy, nie będziemy mieli szansy znaleźć tych szkieletów! Co się stanie, jeśli nasi rywale znajdą pierwszego człowieka i udowodnią, że to ich kraj jest kolebką ludzkości?"
 academics.1005.g: "Dajcie im więcej funduszy!"
 academics.1005.h: "[ROOT.Var('lepsius_anthropologist_var').GetCharacter.GetSheHe] wykonać jakąś czaszkę by stać się sławnym!"
 academics_additional_funding_anthropologist_modifier: "Zwiększone finansowanie badań antropologicznych"
 academics_no_funding_anthropologist_modifier: "Brak finansowania badań antropologicznych"
 academics.2001.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] prosi nas, abyśmy skupili się na obserwacji nieba"
 academics.2001.d: "Nasz kraj nie ma jeszcze zbyt wielu badań astronomicznych, a nawet nie mamy szefa [concept_verrier_astronomer]. W związku z tym [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] chce, abyśmy stworzyli nową mapę astronomiczną i wyznaczyli głównego astronoma."
 academics.2001.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] prosi o większe zaangażowanie w astronomię. Pozwoliłoby nam to zdobyć nową wiedzę o niebie i wszechświecie.\nW związku z tym prosimy, po pierwsze, o stworzenie nowej, zaktualizowanej mapy astronomicznej, a po drugie, o zatrudnienie głównego astronoma.\n\nPodpisano, Rada [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2001.g: "Ad Astra!"
 academics.2001.h: "Astronomia? Mamy bardziej palące ziemskie problemy."
 academics_unhappy_intelligentsia: "Towarzystwo naukowe wyraża niezadowolenie"
 academics.2001_goal_tt: "Będziemy zobowiązani do odkrycia  #p 75#! [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] oraz osadzeniu stanowiska dla [concept_verrier_astronomer] w ciągu #n 10#! lat."
 academics.2001_reward_tt: "W nagrodę twój astronom otrzyma #p 15 punktów doświadczenia#!, dodatkowo Inteligencja otrzyma #p 5 punktów poparcia#!, a koszt technologii produkcji zostanie obniżony o #p 5%#! na 3 lata."
 je_academics_find_more_stars: "Priorytet na astronomii: Mapa Astronomiczna"
 je_academics_find_more_stars_reason: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] żąda od nas znalezienia [JournalEntry.GetGoalAddValue] nowych [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] by stworzyć nową Mapę Astronomiczną oraz by wyznaczyć nowego naczelnego [concept_verrier_astronomer].\n\nDo tej pory odkryliśmy [JournalEntry.GetGoalProgressValue] #b Astronomicznych Obiektów#!."
 je_academics_find_more_stars_success: "Odkryj #p 75#! dotąd nieznanych #b ciał niebieskich#!"
 je_academics_find_more_stars_event_tt: "Nasz nowy [concept_verrier_astronomer] przedstawi nową Mapę Astronomiczną"
 je_academics_find_more_stars_goal: ""
 academics.2002.t: "Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] przedstawia nową Mapę Astronomiczną"
 academics.2002.d: "Byliśmy w stanie stworzyć nową Mapę Astronomiczną oraz wyznaczyć nowego naczelnego [concept_verrier_astronomer]. [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] będzie zadowolone!"
 academics.2002.f: "„Ta nowa mapa astronomiczna jest bardzo dokładna! Porównałem ją z mapami innych krajów i nasza jest zdecydowanie lepsza. Dodatkowo znaleźliśmy wiele nowych gwiazd, z których niektóre są naprawdę fascynujące! Ta na przykład ma więcej czerwonego światła niż zwykle”."
 academics.2002.g: "Hurra!"
 academics_scientific_society_happy: "Towarzystwo naukowe wydaje się zadowolone"
 academics.2003.t: "Nasze wysiłki na rzecz Astronomii zawiodły!"
 academics.2003.d: "Nie byliśmy w stanie poświęcić się wystarczająco astronomii, aby osiągnąć cele wyznaczone nam przez [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]. Nie będą zadowoleni!"
 academics.2003.f: "„Wydaje się, że wojna, gospodarka, a nawet wino i alkohol są dla naszych przywódców ważniejsze niż nauka. Jesteśmy rozczarowani. Miejmy nadzieję, że wkrótce nasz wielki naród ponownie skoncentruje się na nauce!”"
 academics.2003.g: "Szkoda!"
 academics.2004.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] żąda nowej Mapy Astronomicznej od naszego [concept_verrier_astronomer]"
 academics.2004.d: "Zgodnie z [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] nasze państwo musi poświęcić więcej środków na przeszukiwanie nieba. Poprosili by Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] znalazł nowe gwiazdy i inne [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] oraz żeby stworzył nową Mapę Astronomiczną."
 academics.2004_goal_tt: "Musisz odnaleźć #p100#! [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] w #n!0#! lat."
 academics.2004_reward_tt: "W nagrodę twój astronom otrzyma #p 25 punktów doświadczenia#!, dodatkowo Inteligencja otrzyma #p 5 punktów poparcia#!, a koszt technologii produkcji zostanie obniżony o #p 5%#! na 3 lata."
 je_academics_create_star_chart: "Priorytet na Astronomii: Mapa Astronomiczna naszego Astronoma"
 je_academics_create_star_chart_reason: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] żądna aby nasz [concept_verrier_astronomer] znalazł [JournalEntry.GetGoalAddValue] nowych [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] by stworzyć nową Mapę Astronomiczną.\n\nDo tej pory znaleźliśmy [JournalEntry.GetGoalProgressValue] #b Obiektów Astronomicznych #!."
 je_academics_create_star_chart_success: "Znajdź #p 100#! nowych #b Obiektów Astronomicznych#!"
 je_academics_create_star_chart_event_tt: "Nasz [concept_verrier_astronomer] zaprezentuje nową Mapę Astronomiczną."
 je_academics_create_star_chart_event_without_astronomer_tt: "Opublikujemy naszą nową mapę astronomiczną."
 je_academics_create_star_chart_failed_event_tt: "Nasz [concept_verrier_astronomer] nie zdołał przedstawić nowej Mapy Astronomicznej."
 je_academics_create_star_chart_failed_event_without_astronomer_tt: "Po stracie naszego [concept_verrier_astronomer], nie jesteśmy w stanie zaprezentować nowej Mapy Astronomicznej."
 je_academics_create_star_chart_goal: ""
 academics.2005.t: "Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] przedstawia nową Mapę Astronomiczną"
 academics.2005.f: "Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] został otoczony przez [ROOT.Var('verrier_astronomer_var').GetCharacter.GetHerHis] współpracowników kiedy wznosili toast za siebie nawzajem.\n\n„Drogi przyjacielu, wiedziałem, że z łatwością dasz sobie radę. Twoja nowa mapa astronomiczna jest niezwykła! Prawdziwe arcydzieło!”"
 academics.2006.t: "Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] zawiódł!"
 academics.2006.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName] zawiódł ze stworzeniem nowej Mapy Astronomicznej. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetSheHe] nie był w stanie znaleźć wystarczająco dużo gwiazd i innych [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] by były tego warte. Pozostała część [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] jest wysoce rozczarowana [ROOT.Var('verrier_astronomer_var').GetCharacter.GetHerHis] porażką."
 academics.2006.f: "Drogi [ROOT.Var('verrier_astronomer_var').GetCharacter.GetFirstName],\n\n Nie uszło naszej uwadze, iż nie byłeś w stanie przedstawić nowej Mapy Astronomicznej, co po raz kolejny udowadnia, że preferujesz inne aktywności, aniżeli naukę. Niestety ,będzie to miało negatywny wpływ na wizerunek naszego Stowarzyszenia. W przyszłości oczekujemy lepszych wyników!\n\n[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2006.g: "Szkoda!"
 academics.2007.t: "Nowa mapa astronomiczna"
 academics.2007.d: "Niestety, w związku z nieobecnością naszego poprzedniego [concept_verrier_astronomer], nowa Mapa Astronomiczna została przedstawiona przez [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]. Wydaje się, że naukowcy są całkiem zadowoleni z nowej mapy. "
 academics.2007.f: "„Dzięki tej nowej mapie astronomicznej będziemy mogli jeszcze lepiej badać niebo! Mam nadzieję, że uda nam się zdobyć wiele nowych informacji na temat ruchu tych ciał niebieskich!\nTo było możliwe tylko i wyłącznie dzięki [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]! Toast za Państwa zdrowie, panowie!\""
 academics.2008.t: "Nie ma astronoma, nie ma mapy"
 academics.2008.d: "Strata naszego [concept_verrier_astronomer] doprowadziła do zmniejszenia liczby odkryć nowych gwiazd i innych [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')], niż oczekiwaliśmy. Nie udało nam się zatem znaleźć wystarczającej ilości danych, aby stworzyć nową Mapę Astronomiczną. [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] nie jest zadowolone z takiego wyniku."
 academics.2008.f: "„Nasz rząd nie tylko stracił swojego genialnego głównego astronoma, ale także nie był w stanie zapewnić naszym astronomom odpowiedniego wsparcia w ich pracy. W rezultacie przeprowadzono znacznie mniej obserwacji. Oznacza to, że nasze badania astronomiczne ulegną opóźnieniu. To naprawdę straszne!”"
 academics.2009.t: "Musimy znaleźć więcej gwiazd niż [SCOPE.sCountry('rival_scope').GetName]"
 academics.2009.d: "Członkowie [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] są niezadowoleni, że nasz rywal, [SCOPE.sCountry('rival_scope').GetName], odkrył więcej [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')], niż nasze państwo. Proszą nas o znalezienie więcej #b Obiektów Astronomicznych #!, niż [SCOPE.sCountry('rival_scope').GetName] w ciągu 10 lat."
 academics.2009.f: "Szkoda, że tak nic nieznaczący naród jak [SCOPE.sCountry('rival_scope').GetName] odkrył więcej obiektów astronomicznych niż my. Musimy jak najszybciej wyprzedzić tych niecywilizowanych astronomów-amatorów i odkryć więcej obiektów astronomicznych niż oni.\n\nPodpisano, członkowie [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2009_goal_tt: "Musisz odkryć więcej [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] niż twój rywal, [SCOPE.sCountry('rival_scope').GetName], w ciągu #n 10 #! lat. Oni odkryli[GetPlayer.MakeScope.Var('je_rival_nation_var').GetVariable('verrier_astronomical_objects').GetValue|0+], my odkryliśmy [GetPlayer.MakeScope.Var('verrier_astronomical_objects').GetValue|0+]."
 academics.2009_reward_tt: "W nagrodę Inteligencja otrzyma #p 5 punktów aprobaty#!, a Ty #p 10%#! więcej prestiżu przez 4 lata."
 academics.2009.g: "Jedziemy z nimi!"
 academics.2009.h: "To nie kosmiczny wyścig..."
 academics_no_competition_with_rival: "Przegrano Wyścig po Gwiazdy"
 academics_competition_with_rival_won: "Wygrano Wyścig po Gwiazdy"
 je_academics_rivalry_for_stars: "Priorytet na astronomii: Wyścig po Gwiazdy"
 je_academics_rivalry_for_stars_reason: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] żąda od nas by znaleźć więcej [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] niż nasz rywal[SCOPE.sCountry('target').GetName].\n\nNasze #b Astronomiczne Obiekty #!: [ROOT.Var('verrier_astronomical_objects').GetValue|0+]\n[SCOPE.sCountry('target').GetName] #b Astronomiczne Obiekty #!: [ROOT.Var('je_rival_nation_var').GetVariable('verrier_astronomical_objects').GetValue|0+]"
 je_academics_rivalry_for_stars_success: "Masz ([GetPlayer.MakeScope.Var('verrier_astronomical_objects').GetValue|0+]) więcej [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] niż [SCOPE.sCountry('target').GetName] ([GetPlayer.MakeScope.Var('je_rival_nation_var').GetVariable('verrier_astronomical_objects').GetValue|0+])."
 academics.2010.t: "Wygraliśmy Wyścig po Gwiazdy"
 academics.2010.d_rival: "Odkryliśmy więcej Obiektów Astronomicznych niż [ROOT.Var('je_rival_nation_var').GetCountry.GetName]. [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] wraz z naszymi obywatelami są podekscytowani tym zwycięstwem naszego kraju!"
 academics.2010.d_rival_gone: "Nasz Rywal w Wyścigu po Gwiazdy już nie istnieje. [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] wraz z naszymi obywatelami są podekscytowani tym zwycięstwem naszego kraju!"
 academics.2010.f: "My, członkowie [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] jesteśmy szczególnie ukontentowani naszą naukową dominacją nad naszym Rywalem. Ich Naukowcy udowodnili, iż zatrzymali się w rozwoju na poziomie epoki kamienia łupanego i nie są w stanie odkryć więcej Obiektów Astronomicznych niż my. To jest wiekopomny dzień dla naszej nacji!\n\nPodpisano, członkowie [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2011.t: "Przegraliśmy Wyścig po Gwiazdy"
 academics.2011.d: "Nie byliśmy w stanie znaleźć więcej [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] niż [ROOT.Var('je_rival_nation_var').GetCountry.GetName]. Członkowie [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] są całkowicie rozczarowani."
 academics.2011.f: "This failure of our Academia once more proves that the focus of our nation is not on science and scientific advances. We therefore propose to cease hostilities and those plans of world conquest in favor of science.\n\nThe [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2012.t: "The [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] demands an [concept_verrier_observatory]"
 academics.2012.d: "The members of our [concept_academics_scientific_society] demand that we build a modern [concept_verrier_observatory] in 10 or less years. This would allow us to conduct [concept_verrier_astronomy] and to find [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]."
 academics.2012.f: "As every great nation nowadays owns an Observatory, we, the members of the [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] demand the construction of an Observatory. Without an Observatory, we will never be at the forefront of science. Therefore an Observatory is clearly a necessity.\n\nSigned, The Council of the [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2012.g: "I need our best architects and engineers right now!"
 academics.2012.h: "Who needs an Observatory anyways?"
 academics.2012_goal_tt: "You will have to build a [concept_verrier_observatory] in #n 10#! years."
 academics.2012_reward_tt: "As a reward the Intelligencia will get #p 5 Approval#! and the cost for production technology will be reduced by #p 5%#! for 5 years, you will also gain #p 5%#! loyalists among the academics."
 je_academics_build_observatory: "Focus on Astronomy: Build an Observatory"
 je_academics_build_observatory_reason: "The [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] wants us to build an [concept_verrier_observatory]. To build an Observatory, we need to have at least one University and either researched #b Modern Astronomy#! or have an [concept_verrier_astronomer]."
 academics.2013.t: "New Observatory starts Observation"
 academics.2013.d: "A new [concept_verrier_observatory] opened its doors and started observing the sky. The members of the [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] are pleased... for now."
 academics.2013.f: "After constructing an Observatory, our nation is now finally able to explore the night sky. Congratulations. Now we migth actually be considered to be a scientifically advanced country.\n\nSigned, the members of the [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2013.g: "We will uncover the mysteries of the night sky!"
 academics.2014.t: "An Astronomical Failure "
 academics.2014.d: "We were not able to build an [concept_verrier_observatory]. The members of the [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] are deeply disappointed!"
 academics.2014.f: "Constructing an Observatory must be an extremely difficult thing as our nation failed to do it in 10 years! In this time we could have found a new planet hundreds of stars or calculated the movement of many comets. But without a proper telescope, that is not possible. A shameful display.\n\nThe [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2014.g: "It was the Comet's fault!"
 academics.2015.t: "The [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]  wants us to find Planet X"
 academics.2015.d: "The members of our [concept_academics_scientific_society] are convinced that discovering Planet X will be the greatest scientifical success in this Century. They ask us to focus on finding the mysterious planet before anyone else does.."
 academics.2015.f: "We heard that other nations are eager to find Planet X. But this breakthrough belongs to us alone! We have to beat everyone else at this colossal task!\n\nSigned, The Council of the [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2015.g: "Focus all our ressources on finding that planet!"
 academics.2015.h: "Planet X? More like Planet Y..."
 academics.2015_goal_tt: "You will have to find #b Planet X#! before anyone else. To have a chance to discover it, we will need an [concept_verrier_astronomer] and #p 1500#! discovered [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]."
 academics.2015_reward_tt: "As a reward the Intelligencia will get #p 5 Approval#! and the cost for production technology will be reduced by #p 5%#! for 10 years, you will also gain #p 10%#! loyalists among the academics and your [concept_verrier_astronomer] will gain #p 50#! [concept_academics_experience]."
 je_academics_find_planet_x: "Focus on Astronomy: Find Planet X"
 je_academics_find_planet_x_reason: "The [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] wants us to find the mysterious #o Planet X#!. To have a chance to discover it, we will need an [concept_verrier_astronomer] and #p 1500#! discovered [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]."
 je_academics_find_planet_x_complete_tt: "Discover #o Planet x#! before anyone else."
 je_academics_find_planet_x_fail_tt: "Someone else discovered #o Planet x#! before you."
 academics.2016.t: "Odkryliśmy planetę X"
 academics.2016.d: "We are the first to find Planet X! This will hopefully please the [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]."
 academics.2016.f: "The letter was scribbled with weird formulas and diagrams. There were stains that looked like someone spilled some liquid over the letter and if you would have to guess, you could swear that there were rests of caviar on the paper as well. You couldn't stop wondering what happened here."
 academics.2016.g: "This is the most important astronomical discovery of the Century!"
 academics.2017.t: "We were to late to find Planet X"
 academics.2017.d: "Another nation discovered Planet X before us. The members of the [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] are crushed by this defeat!"
 academics.2017.f: "Unacceptable.\n\nThe [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]."
 academics.2017.g: "That's not a real planet anyways!"
 gaudi_replace_engineer_with_new_engineer_tt: "[SCOPE.sCharacter('tesla_new_engineer_scope').GetFullName] (#tooltip:[ROOT.Var('tesla_new_engineer_var').GetCharacter.GetTooltipTag],tesla_engineer_rating_tt_loc [ROOT.Var('tesla_new_engineer_var').GetCharacter.GetCustom('tesla_engineer_rating_icon_type')]#!) will become your new [concept_tesla_engineer]. [SCOPE.GetRootScope.GetCountry.GetCustom('academics_replacement_engineer_custom_loc')]"
 academics_would_replace_engineer_loc: "#n This would replace your#! [concept_tesla_engineer], [ROOT.Var('tesla_engineer_var').GetCharacter.GetFullName] (#tooltip:[ROOT.Var('tesla_engineer_var').GetCharacter.GetTooltipTag],tesla_engineer_rating_tt_loc [ROOT.Var('tesla_engineer_var').GetCharacter.GetCustom('tesla_engineer_rating_icon_type')]#!)."
