 dubois.1020.t: "Gorilla Enclosure"
 dubois.1020.d: "The Gorilla enclosure was characterized by lush vegetation and large climbing structures. Immediately, you noticed several of these impressive primates moving gracefully through the dense foliage, some climbing the ropes and others resting in the shade. Their powerful build and tranquil demeanor made them a captivating sight."
 dubois.1020.f1: "In the verdant Gorilla enclosure, a dominant silverback gorilla sits majestically on a large rock, surveying his group with a watchful eye. His calm and commanding presence immediately draws the attention of visitors. Curious about the social structure, you approach a zookeeper for more information.\n\"Gorillas are highly social animals,\" the zookeeper explains. \"The silverback, as the leader of the troop, plays a crucial role in maintaining order and protecting the group. Each member of the troop has specific roles, and the silverback's responsibilities include making decisions about movements and responding to threats. The group’s cohesion and the silverback’s leadership are essential for their well-being.\""
 dubois.1020.f2: "In the Gorilla habitat, a young gorilla energetically climbs and swings from the ropes and branches, while older members of the group observe from below. The playful behavior of the young gorilla captivates onlookers. Interested in learning more about this activity, you ask a zookeeper.\n\"Young gorillas are incredibly active and playful,\" the zookeeper shares. \"Climbing and swinging help them develop the physical skills needed for their later lives. These activities also provide mental stimulation and social bonding with other troop members. Play is a vital part of their development, helping them to grow strong and socially adept.\""
 dubois.1020.f3: "In the Gorilla enclosure, the group is gathered around a large pile of fruits and vegetables, feeding and sharing with one another. The harmonious and cooperative feeding behavior is fascinating to observe. Wanting to know more about this social interaction, you approach a zookeeper.\n\"Gorillas are known for their peaceful and cooperative feeding habits,\" the zookeeper explains. \"They often feed together and share food within the group, which strengthens social bonds and ensures that everyone gets enough to eat. This communal behavior is a key aspect of their social structure, promoting harmony and reducing competition among members.\""
