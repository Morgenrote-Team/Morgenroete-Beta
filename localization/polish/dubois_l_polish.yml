 dubois.128.f: "The European Elk, also known as the Moose in North America, is the largest member of the deer family. Native to the forests of Europe and Asia, these solitary giants are known for their massive antlers, which males shed and regrow annually. Elks are browsers, feeding on leaves, bark, and aquatic plants. Despite their size, they are agile and well-adapted to their cold, forested habitats."
