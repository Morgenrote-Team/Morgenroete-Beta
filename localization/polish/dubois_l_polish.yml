 dubois_send_paleontologist_to_excavation_button: "Send Paleontologist"
 dubois_send_paleontologist_to_excavation_button_desc: "Send your [concept_dubois_paleontologist] to the [concept_dubois_paleontological_excavation].\nA present Paleontologist will raise the amount of [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] and [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] from the Excavation.\n\nYou can always recall the Paleontologist but he will be unable to go back to an Excavation for one year."
 dubois_recall_paleontologist_from_excavation_button: "Recall Paleontologist"
 dubois_recall_paleontologist_from_excavation_button_desc: "Recall your [concept_dubois_paleontologist] from the [concept_dubois_paleontological_excavation].\nYou will no longer gain additional [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] and [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] from the Excavation.\n\nThe Paleontologist will be #n unable#! to go on another Excavation for #n one year#!."
 dubois_recall_excavation_button: "Recall Team"
 dubois_recall_excavation_button_desc: "Recall you [concept_dubois_paleontological_team] from the [concept_dubois_paleontological_excavation]. This will remove the Paleontological Excavation."
 dubois_recall_paleontological_excavation_tt: "Removes this [concept_dubois_paleontological_excavation] Journal Entry. #V Note:#! It takes a day to recall the excavation."
