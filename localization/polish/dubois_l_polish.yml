 dubois.1069.t: "Capybara Enclosure"
 dubois.1069.d: "The Capybara enclosure featured a lush, grassy area surrounding a large pond. Right away, you noticed several of these large, gentle rodents lounging by the water's edge, while others waded leisurely through the shallow water. Their relaxed demeanor and close-knit group behavior immediately drew the attention of visitors."
 dubois.1069.f1: "In the sun-dappled Capybara enclosure, a small group of these large rodents relaxes by the water’s edge, some lazily munching on grass while others lounge in the shade. Their calm, social behavior immediately catches the attention of visitors. Curious about their lifestyle, you approach a zookeeper for more information.\n\"Capybaras are incredibly social animals,\" the zookeeper explains. \"They live in groups, sometimes as large as 20 or more, and are rarely seen alone. Their strong social bonds are key to their survival, offering protection from predators and helping them maintain their close-knit family structure. They communicate with a variety of sounds, including purrs and whistles, to stay connected with each other.\""
 dubois.1069.f2: "In the bustling Capybara habitat, one particularly adventurous Capybara wades into the pond, submerging itself up to its nose, while the others follow suit, splashing playfully in the water. The sight of these large rodents enjoying their swim captivates onlookers. Intrigued by this behavior, you ask a zookeeper for more details.\n\"Capybaras are semi-aquatic and are excellent swimmers,\" the zookeeper shares. \"They spend a lot of time in the water, which helps them regulate their body temperature and escape from predators. They can even sleep in the water with just their noses above the surface. This affinity for water is a vital part of their natural behavior, and it's where they feel most at home.\""
 dubois.1069.f3: "As you watch the Capybara group in their enclosure, a sudden flurry of movement catches your eye. One of the younger Capybaras has found a particularly tasty patch of grass and excitedly munches away, prompting the others to gather around and join in. The communal feeding is heartwarming to witness, and you decide to learn more by speaking to a zookeeper.\n\"Capybaras are herbivores and spend a lot of time grazing together,\" the zookeeper explains. \"Their diet consists mainly of grasses and aquatic plants, which they share willingly with one another. They have a unique digestive system that allows them to extract maximum nutrients from their fibrous diet, often re-digesting their food to ensure they get all the nutrition they need. Their group feeding habits reinforce their strong social bonds and help maintain harmony within the group.\""
