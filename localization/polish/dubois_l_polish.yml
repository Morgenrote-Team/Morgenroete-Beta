 dubois.1030.t: "Pallas's Cat Enclosure"
 dubois.1030.d: "The Pallas's Cat enclosure was a rocky terrain dotted with crevices and small caves. At first glance, the thick, fluffy feline seemed almost invisible, perfectly blending in with its surroundings. Then, you spotted one—its round, wide eyes peeking out cautiously from behind a boulder, quietly observing everything around it."
 dubois.1030.f1: "In the rocky enclosure of the zoo, the Pallas's Cat peers out from behind a boulder, its wide, round eyes scanning the surroundings. With its thick, silvery fur puffed up against the cold, it looks like a small, wild ball of fluff. Unlike many other wild cats, the Pallas's Cat has a stocky build and short legs, perfectly adapted to the cold, high-altitude regions of Central Asia where it lives."
 dubois.1030.f2: "As the Pallas's Cat emerges from its hiding place among the rocks, its flat face and large, expressive eyes give it an almost comical appearance. Visitors are often surprised by its small size and fluffy fur, which help it blend into its snowy surroundings. Solitary by nature, the Pallas's Cat is rarely seen in the wild, preferring to stay hidden in rock crevices and burrows during the day and emerging at dawn or dusk to hunt."
 dubois.1030.f3: "Amidst the chilly, simulated steppe environment of its enclosure, the Pallas's Cat moves with quiet precision, its thick tail trailing behind like a plume. Known for its elusive behavior, this small wild cat prefers solitude and relies on its camouflaging fur to avoid detection by both predators and prey. With a diet mainly consisting of small mammals, the Pallas's Cat is a skilled hunter, using its keen eyesight to spot movement in the open terrain."
