 dubois.1322.d: "Sadly, our attempt to found a new stable [concept_dubois_habitat] in the [concept_dubois_nature_reserve] of [ROOT.Var('dubois_breeding_state_var').GetState.GetName] failed. If we want, we can try it again and hope that we have more luck this time."
 dubois.1322.f: "We mourn over this loss of [GetPlayer.MakeScope.GetCountry.GetCustom('dubois_breeding_animal_type')]."
 dubois.1322.g: "What a sad day."
 dubois.2001.t: "Paleontological Collection"
 dubois.2001.d: "Welcome to the Paleontological Collection."
 dubois.2001.f_paleontologist: "Our collection is currently managed by our [concept_dubois_paleontologist] [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetFullName]. It features:\n\n#G [ROOT.Var('dubois_fossil').GetValue]#! @dubois_fossil! Fossils\n\n#G [ROOT.Var('dubois_special_fossil').GetValue]#! @dubois_special_fossil! Special Fossils.\n\n#G [ROOT.Var('dubois_human_fossil').GetValue]#! @dubois_human_fossil! Human Fossils\n\n#G [ROOT.Var('dubois_dinosaur_bone_total').GetValue]#! @dubois_dinosaur_bone! Dinosaur Bones\n\n#G [ROOT.Var('dubois_dinosaur_skeleton').GetValue]#! @dubois_dinosaur_skeleton! Dinosaur Skeletons\n\nOur #T Dinosaur Rating#! as a rating for all of our dinosaur skeletons on display is [ROOT.Var('dubois_dinosaur_rating').GetValue]."
 dubois.2001.f_no_paleontologist: "Our collection is currently managed by #R nobody#!. It features:\n\n#G [ROOT.Var('dubois_fossil').GetValue]#! @dubois_fossil! Fossils\n\n#G [ROOT.Var('dubois_special_fossil').GetValue]#! @dubois_special_fossil! Special Fossils.\n\n#G [ROOT.Var('dubois_human_fossil').GetValue]#! @dubois_human_fossil! Human Fossils\n\n#G [ROOT.Var('dubois_dinosaur_bone_total').GetValue]#! @dubois_dinosaur_bone! Dinosaur Bones\n\n#G [ROOT.Var('dubois_dinosaur_skeleton').GetValue]#! @dubois_dinosaur_skeleton! Dinosaur Skeletons\n\nOur #T Dinosaur Rating#! as a rating for all of our dinosaur skeletons on display is [ROOT.Var('dubois_dinosaur_rating').GetValue]."
