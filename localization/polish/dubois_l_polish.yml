 dubois_zoo_has_no_pallas_tt: "Your Zoo does not have #V Pallas's Cats#! yet. You can find them in the States of [GetStateRegion('STATE_QINGHAI').GetName], [GetStateRegion('STATE_HINGGAN').GetName], [GetStateRegion('STATE_URGA').GetName] and [GetStateRegion('STATE_SEMIRECHE').GetName]."
 dubois.1039.t: "Thylacine Enclosure"
 dubois.1039.d: "In the shadowy enclosure of the zoo, the elusive Thylacine prowls gracefully along the perimeter, its striped back and slender frame giving it an almost mythical appearance. Visitors, entranced by its otherworldly presence, gather to observe this rare creature. Curious about its origins, you approach a zookeeper for more information."
 dubois.1039.f1: "\"The Thylacine, or Tasmanian Tiger, is a fascinating example of convergent evolution,\" the zookeeper explains. \"Although it looks like a canine with its dog-like body and striped coat, it is actually a marsupial, more closely related to kangaroos and koalas. Native to Tasmania and mainland Australia, the Thylacine was once the apex predator of its environment. Its distinct stripes helped it blend into the dense forests and grasslands where it hunted.\""
 dubois.1039.f2: "\"Thylacines were primarily nocturnal hunters,\" the zookeeper shares. \"They relied on their keen sense of sight and hearing to track down prey, often hunting alone or in pairs. Unlike many other predators, Thylacines were relatively silent, using stealth and patience to approach their quarry. Their diet consisted mainly of small to medium-sized animals, including wallabies, birds, and rodents.\""
 dubois.1039.f3: "\"The Thylacine's vocalizations were rare but memorable,\" the zookeeper explains. \"They would produce a series of yips, growls, and howls, especially during the breeding season or when feeling threatened. These calls were used to communicate with other Thylacines over long distances, particularly in the dense forests of Tasmania. Though their vocal range was not as varied as some other predators, the Thylacine's calls were an essential part of its behavior, adding to its mystique.\""
