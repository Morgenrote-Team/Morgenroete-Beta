 dubois.10.h: "Wait, we don't have a Zoo yet!"
 alert_dubois_paleontologist_unused_alert_hint: "Your [concept_dubois_paleontologist] is idle right now and could be used to do something. Consider getting acces to a [concept_dubois_formation] with a [concept_dubois_paleontological_licence] if you don't have a formation or to let them work on another task. You can send them in the Academic Overview in the #V Morgenröte Window#!."
 dubois.39.d: "After weeks of failed attempts and endless effort, the long-awaited animal was finally caught. Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] is overjoyed. The heroes return home with the animal they have won. Certainly it will be happier in the nice National Zoo of [ROOT.GetCountry.GetNameNoFlag] than in this uncomfortable nature!"
