 smuggle_zoo_animal_desc: "Compelling circumstances - such as unfriendly relationships - may make it necessary for an [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animal$')] animal to be urgently transferred to our zoo using 'special measures'."
