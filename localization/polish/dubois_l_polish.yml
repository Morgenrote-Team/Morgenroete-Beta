 dubois_eur_enclosure_lynx: "\n- #o Iberian Lynx#!"
 dubois_getting_lynx: "\n- You can find the #n Iberian Lynx#! in the states of #bold Andalusia#!, #bold Alentejo#!, #bold Estremadura#!, #bold Castille#! and #bold Badajoz#!"
