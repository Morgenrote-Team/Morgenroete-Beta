 dubois.10.t: "Dissolution of a Zoo"
 dubois.10.d: "The government has no interest in continuing to maintain the Zoo in [SCOPE.sState('dubois_zoo_state').GetName]. It should be dissolved and the animals sold."
 dubois.10.f: "A country can only maintain a single zoo in the capital. The amount of money and specimens a country receives in return depends on the size of the zoo."
 dubois.10.g: "But... but all the wonderful animals!"
 alert_dubois_zoo_extension_possible_alert_hint: "You can expand your [concept_dubois_zoo]. Access the Academic Overview in the #V Morgenröte Window#! to expand it."
 alert_dubois_mountain_expedition_possible_alert_hint: "Our country is able to send a Mountain Expedition. Access the Sports Overview in the #V Morgenröte Window#! to send it."
 alert_dubois_naturalist_unused_alert_hint: "Your [concept_dubois_naturalist] is idle right now and could be used to do something. You can send them in the Academic Overview in the #V Morgenröte Window#!."
 alert_dubois_hippocampus_congress_alert_hint: "You can host the Hippocampus Congress. You can use the button in the Academic Overview in the #V Morgenröte Window#! to organize it."
 alert_dubois_paleontological_collection_alert_hint: "You can create a Fossil Collection for your [concept_dubois_zoo]. You can use the button in the Paleontologist overview in the #V Morgenröte Window#! to create it."
