 dubois.52.t: "High Quality Forestry"
 dubois.52.d: "Dr. [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] has achieved [SCOPE.sCharacter('dubois_naturalist_scope').GetHerHis] goal. Through careful selection of particularly resistant seedlings, measures for natural pest control and the study of several animals and plants in symbiosis, [SCOPE.sCharacter('dubois_naturalist_scope').GetSheHe] has sustainably strengthened our country's forestry industry.\n\nTotal improved buildings: [GetPlayer.MakeScope.Var('mr_num_improved_forestry_buildings_var').GetValue|V0]\n$concept_dubois_specimens$ from Project: [GetPlayer.MakeScope.ScriptValue('ito_specimens_from_forestry_project_for_event_value')|+0] @dubois_specimen!"
 dubois.52.f: "'I'm sorry, what? Do you want to CUT DOWN the trees? I went to all the trouble to raise them, nurture them and look after them, and now these capitalist monsters want to kill my darlings? Oh my God, what have I done!'"
 dubois.52.g: "More wood for everyone!"
 dubois.53.t: "High Quality Rubber Trees"
 dubois.53.d: "Dr. [ROOT.Var('dubois_naturalist_var').GetCharacter.GetLastName] has achieved [ROOT.Var('dubois_naturalist_var').GetCharacter.GetHerHis] goal. Through careful selection of particularly resistant seedlings, measures for natural pest control and the study of several animals and plants in symbiosis, [ROOT.Var('dubois_naturalist_var').GetCharacter.GetSheHe] has sustainably strengthened our country's rubber industry.\n\nTotal improved buildings: [GetPlayer.MakeScope.Var('mr_num_improved_runner_buildings_var').GetValue|V0]"
 dubois.53.f: "'Why is everyone interested in the completely useless rubber? I only did that because I'm interested in the Neohesperialist Swamp Mosquito. This small, easily fatal animal only breeds in this climate.'"
 dubois.53.g: "More rubber for everyone!"
 dubois.22.t: "Prof. [ROOT.Var('dubois_naturalist_var').GetCharacter.GetLastName] documents [SCOPE.GetRootScope.GetCountry.GetCustom('dubois_animal_documentation_name')]"
 dubois.22.d: "After months of observing the animal in its native habitat, [ROOT.Var('dubois_naturalist_var').GetCharacter.GetFullName] has completed his observations. His treatise, #YELLOW '[SCOPE.GetRootScope.GetCountry.GetCustom('dubois_animal_documentation_title')]'#!, is now available. [SCOPE.GetRootScope.GetCountry.GetCustom('dubois_animal_documentation_topic')]"
 dubois.22.g: "Reserve a copy for the National Library."
 dubois_document_new_animal_tt: "Prof. [ROOT.Var('dubois_naturalist_var').GetCharacter.GetLastName] documents the #ORANGE [SCOPE.GetRootScope.GetCountry.GetCustom('dubois_animal_documentation_name')]#!"
 je_dubois_native_animal: "Documentation of a Native Animal"
 je_dubois_native_animal_reason: "Prof. [ROOT.Var('dubois_naturalist_var').GetCharacter.GetLastName] studies a domestic animal in its natural habitat. Experience, skills and character traits, as well as university with a focus on natural history, have influence on how long this process takes. The animal [ROOT.Var('dubois_naturalist_var').GetCharacter.GetSheHe] studies is the #ORANGE [SCOPE.GetRootScope.GetCountry.GetCustom('dubois_animal_documentation_name')]#!."
 je_dubois_native_animal_goal: "#E Naturalist Progress#! reaches #GREEN [JournalEntry.GetTotalGoalValue|V0]#! points."
 je_naturalist_dies_tt: "Prof. [ROOT.Var('dubois_naturalist_var').GetCharacter.GetLastName] dies"
 dubois.442.t: "Geological Knowledge"
 dubois.442.d: "During his stay in the mountains, the [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] examined the mountain in detail, mapped it and made scientific interpretations. To the surprise of the entire mountaineering team, he surprised them the next morning with a relief map showing the pitfalls and smoother climbs of the mountain."
 dubois.442.f: "'Why did I do that? Oh, I was just a bit bored and I had also cataloged my minerals. It's nothing special! I didn't even color it ...'"
 dubois.442.g: "Thank God we have Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]"
 dubois.443.t: "A Fine Mineral"
 dubois.443.d: "The mountaineering group was already complaining about the dilly-dallying nature of the geologist, who as a scientist was more of a burden than a help; but as it turns out, Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] discovered a rare material while climbing the peak."
 dubois.443.g: "What a lovely little surprise."
