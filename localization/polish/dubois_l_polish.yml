 dubois.139.f: "The Gorilla, native to the forests of Central Africa, is the largest of the great apes. With its powerful build and intelligent gaze, it lives in social groups led by a dominant male known as the silverback. Gorillas are primarily herbivores, feeding on leaves, stems, and fruits. Despite their size and strength, they are generally gentle and shy, spending most of their time foraging and resting in their forest habitat."
