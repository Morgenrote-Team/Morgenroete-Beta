 dubois.443.f: "The men had been waiting for an hour for the academic, who had stopped somewhere on a slope and suddenly pulled out [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] tools. Shaking their heads at first, they had decided to combine the unpleasant with the useful and had brought the meal forward so as not to waste time unnecessarily. However, Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] had no intention of eating or coming. When the leader threatened to continue the expedition without the geologist, [ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe] suddenly rejoined the group - with a sparkling stone in [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] hand, the beauty of which impressed all [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] colleagues."
