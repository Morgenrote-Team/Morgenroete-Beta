 dubois.1049.t: "Elk Enclosure"
 dubois.1049.d: "In the forested enclosure of the zoo, a majestic European Elk stands tall, its massive antlers stretching towards the sky."
 dubois.1049.f1: "The elk's calm demeanor and imposing size draw the attention of visitors, who marvel at the sheer scale of this gentle giant. Curious about its impressive antlers, you approach a zookeeper for more information.\n\"European Elk, or Moose as they are known in North America, are the largest members of the deer family,\" the zookeeper explains. \"Their antlers can span up to six feet across and are used primarily during the rutting season, when males compete for mates. These antlers are shed and regrown each year, with the new set becoming larger and more intricate as the elk ages.\""
 dubois.1049.f2: "In the shaded corner of the elk habitat, a large male European Elk lowers its massive head to graze on tender shoots and leaves. The quiet, rhythmic motion of its jaws as it chews is almost hypnotic, drawing in a crowd of onlookers. Intrigued by the elk’s feeding habits, you seek out a zookeeper to learn more.\n\"Elk are browsers,\" the zookeeper explains. \"Unlike grazers, who eat primarily grass, elk prefer to feed on a variety of vegetation, including leaves, bark, and aquatic plants. They have a keen sense of smell, which helps them locate the most nutritious plants in their environment. In the wild, they can consume up to 70 pounds of food in a day, which is necessary to sustain their large bodies.\""
 dubois.1049.f3: "Amidst the rustling trees of the enclosure, a European Elk suddenly lets out a deep, resonant bellow, its call echoing through the air. The sound commands the attention of everyone nearby, who pause to listen to this primal cry. Curious about the significance of this vocalization, you approach a zookeeper for insights.\n\"That was a rutting call,\" the zookeeper explains. \"During the breeding season, male elk use these loud vocalizations to establish dominance and attract females. The call can be heard over long distances and is often accompanied by displays of antlers and aggressive posturing. It's a powerful reminder of the elk's role as a dominant force in its natural habitat.\""
