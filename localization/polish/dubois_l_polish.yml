 dubois_has_mountains_tt: "Holds territorial claim over at least one state traversed by a significant mountain range."
 dubois_unconquered_summit_tt: "Possesses or holds licensed access to an unconquered summit—either within national borders or via a mountaineering charter from a foreign power."
 dubois_has_active_naturalist_tt: "A [concept_dubois_naturalist] is presently available and not engaged in fieldwork."
 dubois_has_active_paleontologist_tt: "A [concept_dubois_paleontologist] stands ready, unoccupied by current expeditions or research."
 dubois_naturalist_sick_tt: "The [concept_dubois_naturalist] is indisposed due to illness and cannot presently conduct field studies."
 dubois_botanical_expedition_banned_tt: "Botanical expeditions have been suspended due to prevailing political constraints."
 dubois_chemical_warfare_tt: "This undertaking is enabled by our development of #O Chemical Warfare#!—a grim but decisive innovation."
 dubois_triage_tt: "This measure is made feasible through our adoption of the #O Triage#! system in battlefield medicine."
 dubois_logistics_tt: "This operation is supported by our mastery of modern #O Logistics#!, ensuring timely supply and coordination."
