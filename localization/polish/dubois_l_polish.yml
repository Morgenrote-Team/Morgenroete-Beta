 dubois.31.l: "Pursue the Gorilla"
 dubois.32.t.gorilla_1: "A strong Gorilla"
 dubois.32.t.gorilla_2: "Second sighting of a Gorilla"
 dubois.32.t.gorilla_3: "Another Gorilla"
 dubois.32.f.gorilla.1: "In the mist-shrouded forests of the highlands, a deep, resonant chest beat reverberates through the dense undergrowth—a sound that sends a shiver down the spine of every living creature within earshot. There, among the ancient trees, the silverback gorilla makes his presence known. Towering and formidable, he is both a protector and a ruler of his troop. Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] watches in awe as the great ape asserts his dominance, leading his family with a grace that belies his immense power. The naturalist, torn between admiration and duty, readies his equipment, knowing that capturing this majestic creature for the zoo may be the most daunting task yet."
 dubois.32.f.gorilla.2: "As the sun begins to set behind the mountainous horizon, the jungle comes alive with the sounds of nature. Through the dense canopy, a family of gorillas emerges, their movements deliberate and imbued with purpose. The youngest among them clings to its mother’s back, while the imposing silverback brings up the rear, his watchful eyes scanning for any sign of danger. Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] holds his breath, his binoculars trained on this rare and fleeting glimpse into the life of these noble creatures. The thought of separating such a family weighs heavily on his mind, but the pressure from the zoo’s patrons leaves him with little choice—he must proceed, even if it means disrupting the harmony of the jungle."
 dubois.32.f.gorilla.3: "Deep within the heart of the rainforest, where the air is thick with the scent of earth and the calls of unseen creatures, the gorillas make their home. The towering silverback, with his silver-streaked fur and wise, knowing eyes, is the undisputed leader of his troop. His massive hands gently cradle a young gorilla, a rare display of tenderness from such a powerful being. Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] watches this intimate moment from a distance, conflicted by the ethical dilemma before him. The patrons of the zoo expect results, but as he observes the intricate social bonds between these remarkable animals, he begins to question whether any cage could ever truly hold the spirit of the wild."
 dubois.33.d.gorilla: "In search of the #O Gorilla#!, our safari team encountered an amazing flora. Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] is inclined to take a break."
 dubois.34.d.gorilla: "The safari, which aimed to capture the # O Gorilla#!, has to be interrupted. Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] is missing!"
 je_dubois_safari_gorilla: "Africa Safari: Gorilla"
 je_dubois_safari_gorilla_reason: "On an African safari, through constant tracking and trapping, large game can be captured and then transported to a [concept_dubois_zoo]. It is only possible to catch one animal per safari. Depending on the animal species, it differs whether you need traps or have to stay on their trail. As a rule of thumb, large, sluggish animals need more traps, while fast animals require more tracking. The Safari lasts 300 days. If no animal is caught by then, the safari team will leave the country again - without success.\n\nAggressive animals can defend themselves and attack when trapping. Shy animals take flight. A [concept_dubois_naturalist] who has the Zoologist trait can resolve such situations without disadvantage. New technologies such as #ORANGE Machine Gun#! or #ORANGE Combustion Engine#! make tracking and trapping animals easier."
 dubois.228.d: "Who would have expected a majestiy eagle to come from New Zealand of all places? Prof. [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] found various bones of a gigantic eagle that had a massive wingspan of 2.6 meters (8 ft 6 in). Professor [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] assumes that this bird might have inspired the legend of Pouākai, a myth of the Māori."
