l_polish:
 thriving_culture_lesson_start_tutorial_button_loc: "Rozpocznij Samouczek"
 mr_tutorial_buttons: "Przyciski Morgenröte"
 mr_tutorial_buttons_desc: "Większość elementów Morgenröte jest dostępna poprzez Panele Morgenröte. Możesz uzyskać do nich dostęp poprzez przyciski na panelu bocznym. Aktualnie istnieją następujące panele:\n\n\n- #V Panel Nauki#!: Tutaj możesz znaleźć twoich [Concept('concept_academics_academic','$concept_academics_academics$')], ich działania, twój [concept_academics_progress] oraz Ekspedycje Naukowe.\n\n- #V Panel Sztuki#!: Tutaj możesz znaleźć twoich [Concept('concept_artists_artist','$concept_artists_artists$')], ich działania, twój [concept_artistic_progress] oraz [Concept('concept_artists_art_style','$concept_artists_art_styles$')].\n\n- #V Panel Sportu#!: Tutaj możesz znaleźć rozmaite sporty oraz postacie powiązane ze sportami oraz aeronautyką, ich aktywności oraz Międzynarodowe Organizacje Sportowe."
 mr_tutorial_science_window_open: "Otwórz Panel Nauki"
 mr_tutorial_science_window_open_desc: "Teraz przyjrzymy się Panelowi Nauki. Otwórz Panel Nauki poprzez kliknięcie przycisku lub naciśnięcie klawisza \"M\" na twojej klawiaturze."
 mr_tutorial_science_window_open_tt: "Otwórz Panel Nauki poprzez kliknięcie przycisku nauki lub naciśnięcie \"M\""
 mr_tutorial_science_tab: "Panel Nauki"
 mr_tutorial_science_tab_desc: "Panel Nauki to miejsce, w którym możesz znaleźć informacje i akcje na temat twoich przedsięwzięć naukowych.\n\n\nJest podzielony na 4 zakładki:\n\n- #V Przegląd#!: Ta zakładka zawiera [concept_academics_progress], #V Ogólne Ekspedycje Naukowe#! oraz #V Skupienie Naukowe#!.\n\n- #V Matematyka i Technika#!: Ta zakładka zawiera [concept_tesla_engineer], [concept_mendelejew_chemist] oraz [concept_verrier_astronomer].\n\n- [concept_dubois_natural_history]: Ta zakładka zawiera [concept_agassiz_geologist], [concept_dubois_paleontologist] oraz [concept_dubois_naturalist].\n\n- #V Humanistyka i Antropologia#!: Ta zakładka zawiera [concept_panum_physician], [concept_lepsius_archaeologist] oraz [concept_lepsius_anthropologist]."
 mr_tutorial_science_tab_tt: "Panel Nauki jest otwarty"
 mr_tutorial_science_overview_tab_open: "Otwórz zakładkę Przegląd"
 mr_tutorial_science_overview_tab_open_desc: "Zakładka Przegląd pozwala ci uzyskać dostęp do [concept_academics_progress], #V Ogólnych Ekspedycji Naukowych#! oraz #V Skupienia Naukowego#!.\n\nPrzejdź do zakładki Przeglądu poprzez kliknięcie przycisku."
 mr_tutorial_science_overview_tab_open_tt: "Przejdź do zakładki Przegląd poprzez kliknięcie na przycisk zakładki."
 mr_tutorial_science_overview_tab_promote_academics: "Promowanie badaczy"
 mr_tutorial_science_overview_tab_promote_academics_desc: "Postaci to serce i dusza Morgenröte. Ale jak zdobyć te postaci?\n\nŻeby zdobyć nowego [concept_academics_academic] potrzebujesz osiągnąć odpowiedni [concept_academics_progress]. Możesz najechać kursorem na pasek progresu żeby zobaczyć jakie czynniki mają wpływ na zdobywanie postępu.\n\nMożesz promować określonego badacza jeśli masz Uniwersytet z [concept_academics_university_specialization].\n\nMożesz także inwestować pieniądze aby szybciej zdobyć Postęp Akademicki.\n\n\nMożesz także zdobyć badaczy dzięki eventom lub poprzez kupienie ich używając akcji dyplomatycznej, jeśli jesteś krajem który nie należy do najbardziej rozwiniętych naukowo państw."
 mr_tutorial_science_overview_tab_scientific_focus: "Skupienie Naukowe"
 mr_tutorial_science_overview_tab_scientific_focus_desc: "Czasami możesz chcieć skupić się na określonym typie badań. Możesz użyć skupienia naukowego gdy spełnisz odpowiednie wymagania. Będzie to promować badania określonych grup technologii i zmniejszać skuteczność badań innych."
 mr_tutorial_science_overview_tab_scientific_expedition: "Ekspedycje Naukowe"
 mr_tutorial_science_overview_tab_scientific_expedition_desc: "Ekspedycje Naukowe to ekspedycje, które może rozpocząć twój kraj. Zależnie od rodzaju ekspedycji mogą one prowadzić do zdobycia wielkich bonusów dla twojego kraju.\n\nObecnie istnieją następujące ekspedycje:\n- [concept_dubois_pacific_expedition]\n- Ekspedycja [concept_verrier_venus_transit]\n- Ekspedycja w poszukiwaniu Przejścia Północno-Zachodniego\n- Ekspedycja Zeppelina\n- Ekspedycja w celu położenia Kabla Transatlantyckiego"
 mr_tutorial_science_natural_history_tab_open: "Otwórz zakładkę Historii Naturalnej"
 mr_tutorial_science_natural_history_tab_open_desc: "Teraz przyjrzyjmy się jednemu z [Concept('concept_academics_academic','$concept_academics_academics$')]. Otwórz zakładkę Historii Naturalnej aby kontynuować."
 mr_tutorial_science_natural_history_tab_open_tt: "Przejdź do zakładki Historii Naturalnej poprzez kliknięcie na przycisk zakładki."
 mr_tutorial_science_natural_history_tab_character: "Badacze"
 mr_tutorial_science_natural_history_tab_character_desc: "Postaci są sercem i duszą Morgenröte. W zakładce nauki te postaci są [Concept('concept_academics_academic','$concept_academics_academics$')].\n\nPo lewej stronie każdej nowej roli postaci możesz zobaczyć portret twojego badacza oraz dodatkowe informacje na jego temat."
 mr_tutorial_science_natural_history_tab_character_rating: "Ocena postaci"
 mr_tutorial_science_natural_history_tab_character_rating_desc: "Przy imionach większości postaci znajdziesz małą ikonę. Ta ikona ukazuje predyspozycje danej postaci do pełnienia swojej roli. Możesz zobaczyć jakie czynniki wpływają na tą ocenę poprzez najechanie na ikonę.\n\nObjaśnienie ikon:\n@mr_rating_fantastic! Perfekcyjnie\n@mr_rating_very_good! Bardzo dobrze\n@mr_rating_good! Dobrze\n@mr_rating_mediocre! Przeciętnie\n@mr_rating_bad! Źle\n@mr_rating_very_bad! Bardzo źle"
 mr_tutorial_science_natural_history_tab_character_experience_bar: "Doświadczenie postaci"
 mr_tutorial_science_natural_history_tab_character_experience_bar_desc: "Każda postać posiada [concept_academics_experience] w swojej dziedzinie. Im wyższe doświadczenie tym lepiej postać wykonuje rozmaite zadania.\n\nDoświadczenie uzyskiwane jest pasywnie w każdym roku, a także aktywnie poprzez skuteczne wykonywanie zadań. [Concept('concept_academics_academic','$concept_academics_academics$')] zdobywają lepsze cechy gdy uzyskają 100 (doświadczony) oraz 300 (sławny) punktów doświadczenia."
 mr_tutorial_science_natural_history_tab_character_achievements: "Osiągnięcia postaci"
 mr_tutorial_science_natural_history_tab_character_achievements_desc: "[Concept('concept_academics_academic','$concept_academics_academics$')] czasami dokonuje imponujących czynów. Możesz zawsze sprawdzić, co dotychczas osiągnął twój naukowiec najeżdżając na tą ikonę."
 mr_tutorial_science_natural_history_tab_currencies: "Odkrycia i wartości"
 mr_tutorial_science_natural_history_tab_currencies_desc: "Większość postaci w Morgenröte posiada przypisane do nich wartości. Te wartości są wyświetlane w centrum każdej akademii. Dla przykładu, dla geologii zobaczysz jak wiele minerałów zostało znalezionych lub jak dużo wiedzy geologicznej posiadasz.\n\nCzęsto możesz znaleźć więcej informacji na temat danych wartości poprzez najechanie na nie kursorem."
 mr_tutorial_science_natural_history_visit_button: "Przycisk odwiedzin"
 mr_tutorial_science_natural_history_visit_button_desc: "Większość [Concept('concept_academics_academic','$concept_academics_academics$')] posiada specjalne przyciski odwiedzin, które powiedzą ci więcej na temat danego naukowca.\n\n[concept_dubois_naturalist] na przykład posiada przycisk aby odwiedzić zoo, gdzie możesz znaleźć więcej informacji na temat zwierząt w twoim zoo."
 mr_tutorial_science_natural_history_ranking: "Ranking"
 mr_tutorial_science_natural_history_ranking_desc: "Może lubisz porównywać się z innymi krajami. W takiej opcji ranking może być czymś dla ciebie. Najechanie kursorem na tą ikonę pozwoli ci zobaczyć różne listy, które pozwalają ci zobaczyć jak dobrze radzisz sobie z określonymi elementami Morgenröte w porównaniu do innych krajów.\n\n[concept_agassiz_geologist] na przykład pozwala ci porównać twój Wynik Geologiczny, Wiedzę Geologiczną, Wiedzę o Oceanach, Minerały oraz Rzadkie Minerały."
 mr_tutorial_science_natural_history_project_buttons: "Przyciski projektów i inne przyciski"
 mr_tutorial_science_natural_history_project_buttons_desc: "Ta część interfejsu jest jedną z najważniejszych. Pozwala ci powierzać twoim [Concept('concept_academics_academic','$concept_academics_academics$')] rozmaite projekty i rozpoczynać inne ważne interakcje.\n\n[concept_agassiz_geologist] może udawać się na ekspedycje, poprawiać twój przemysł, próbować obliczyć wiek Ziemi, możesz też ufundować gabinet minerałów lub rozpocząć Kongres na temat Dryfu Kontynentalnego."
 mr_tutorial_science_natural_history_view_switch_buttons: "Zmień układ"
 mr_tutorial_science_natural_history_view_switch_buttons_desc: "Jeżeli preferujesz bardziej zwarty interfejs, możesz zmienić jego wygląd używając tego przycisku. Z perspektywy gry nie jest istotne którego wyglądu używasz. Więc wybierz ten wariant, który podoba ci się bardziej."
 mr_start_culture_tutorial_button_loc: "Tutorial Kulturalny"
 mr_tutorial_not_yet_implemented_tt: "Ten tutorial jest jeszcze nie gotowy."
 mr_tutorial_arts_window_open: "Otwórz Panel Akademii Sztuki"
 mr_tutorial_arts_window_open_desc: "Teraz przyjrzymy się Panelowi Sztuki. Otwórz Panel Sztuki poprzez kliknięcie przycisku lub naciśnięcie klawiszy \"Ctrl + A\" na klawiaturze."
 mr_tutorial_arts_window_open_tt: "Otwórz Panel Sztuki poprzez kliknięcie przycisku sztuki lub naciśnięcie \"Ctrl + A\""
 mr_tutorial_arts_tab: "Zakładka Akademii Sztuki"
 mr_tutorial_arts_tab_desc: "Sztuka była istotną częścią XIX i XX wieku. Wielcy [Concept('concept_artists_artist','$concept_artists_artists$')] tej epoki są dobrze znani do dziś.\n\nMorgenröte daje dostęp do rożnych typów artystów i ich dzieł sztuki.\n\nPanel Sztuki ma dwie zakładki. Jedna pokazuje ci przegląd stanu sztuki w twoim państwie, a druga pozwala ci znaleźć twoich artystów i rekrutować ich z innych państw."
 mr_tutorial_arts_tab_cultural_tradition: "Tradycja Kulturowa"
 mr_tutorial_arts_tab_cultural_tradition_desc: "Tradycja Kulturowa jest wartością reprezentującą osiągnięcia kulturalne twojego kraju.\nSkłada się na nią [concept_elgar_musical_tradition], [concept_manzoni_literary_tradition] oraz [concept_klimt_painting_tradition].\n\nTradycja Kulturalna jest obliczana przy użyciu następującego równania:\nTradycja Muzyczna / 4 + Tradycja Malarska / 3 + Tradycja Literacka / 2\n\nDodatkowo będziesz otrzymywał [concept_prestige] dzięki twojej Tradycji Artystycznej. Każde 5 punktów Tradycji Artystycznej da ci 1 dodatkowy punkt Prestiżu."
 mr_tutorial_arts_overview_tab_open_tt: "Otwórz Zakładkę Przeglądu Sztuki"
 mr_tutorial_arts_tab_artist_progress: "Progres Artystyczny"
 mr_tutorial_arts_tab_artist_progress_desc: "Możesz zdobyć nowych [Concept('concept_artists_artist','$concept_artists_artists$')] na przeróżne sposoby. Możesz ich zrekrutować, zdobyć ich dzięki eventom lub poprzez zebranie odpowiedniej ilości [concept_artistic_progress].\n\nPodczas gdy eventy i rekrutacja są niedostępne dla niektórych państw, zdobywanie artystów poprzez wypełnianie paska Progresu Artystycznego jest możliwe gdy tylko zbudujesz $building_elgar_opera$ lub $building_art_academy$.\nMożesz zobaczyć kompletną listę czynników wpływających na miesięczny zysk progresu poprzez najechanie kursorem na pasek postępu.\n\nDodatkowo możesz Patronować Sztuce w celu zdobycia większej ilości progresu i promować określonych artystów jeśli posiadasz potrzebną [concept_production_method] w twojej $building_art_academy$."
 mr_tutorial_arts_tab_center_of_arts: "Kolebki Ruchów Artystycznych"
 mr_tutorial_arts_tab_center_of_arts_desc: "[Concept('concept_artists_center_of_arts','$concept_artists_centers_of_arts$')] to lokacje w których narodził się [concept_artists_art_style].\nNiektóre Kolebki Ruchów Artystycznych istnieją od początku rozgrywki. Pozostałe można odblokować poprzez [Concept('concept_journal_entry','$concept_journal_entries$')] lub naciśnięcie jednego z przycisków, które tu widzisz. Najedź na Kolebkę Ruchu Artystycznego aby zobaczyć, jak ją uzyskać.\n\nCo oczywiste, Kolebki Ruchów Artystycznych są użyteczne dla ciebie i twojego kraju, ponieważ dają ci dostęp do różnych bonusów."
 mr_tutorial_arts_tab_artists_tab_open: "Otwórz zakładkę Artystów"
 mr_tutorial_arts_tab_artists_tab_open_desc: "Teraz przyjrzyjmy się [Concept('concept_artists_artist','$concept_artists_artists$')].\n\nOtwórz zakładkę Artystów poprzez naciśnięcie przycisku zakładki."
 mr_tutorial_arts_tab_artists_tab_open_open_tt: "Otwórz zakładkę Artystów"
 mr_tutorial_arts_tab_artists: "Zakładka Artystów"
 mr_tutorial_arts_tab_artists_desc: "[Concept('concept_artists_artist','$concept_artists_artists$')] wyglądają podobnie do Badaczy, ale pracują nieco inaczej.\n\nAktualnie istnieją trzy typy Artystów:\n- [concept_elgar_composer]\n- [concept_manzoni_writer]\n- [concept_klimt_painter]"
 mr_tutorial_arts_tab_artists_invite: "Zapraszanie Artystów"
 mr_tutorial_arts_tab_artists_accquisation_desc: "Jak już wspomnieliśmy, [Concept('concept_artists_artist','$concept_artists_artists$')] mogą być uzyskani nie tylko poprzez zebranie odpowiedniej ilości [concept_artistic_progress], ale możesz ich także uzyskać poprzez zapraszanie ich.\n\nKażdy typ artysty ma nieco inne wymagania. Możesz zapraszać [Concept('concept_elgar_travelling_composer','$concept_elgar_travelling_composers$')] z całego świata, ale musisz być państwem z odpowiednią ilością $building_elgar_opera$ oraz odpowiednio wysoką [concept_elgar_musical_tradition].\n\n[Concept('concept_klimt_independent_painter','$concept_klimt_independent_painters$')] mogą być zaproszeni wyłącznie gdy mają podobną kulturę do twojej.\n\n[Concept('concept_manzoni_writer','$concept_manzoni_writers$')] zaś w ogóle nie można zapraszać."
 mr_tutorial_arts_tab_artists_character: "Informacje ogólne"
 mr_tutorial_arts_tab_artists_character_desc: "Lewa strona zakładki pokazuje ci pewne podstawowe informacje na temat twoich artystów.\n\nTutaj możesz zobaczyć:\n-Portret\n-Imię i Ocenę\n-[concept_artists_experience]\n-[Concept('concept_character_trait','$concept_character_traits$')]"
 mr_tutorial_arts_tab_artists_currencies: "Ważne wartości artystyczne"
 mr_tutorial_arts_tab_artists_currencies_desc: "Ta część interfejsu pozwala ci zobaczyć podstawowe informacje na temat danego specyficznego aspektu sztuki.\nDla przykładu, w przypadku [concept_elgar_composer] możesz zobaczyć [concept_elgar_musical_tradition], kompozycje oraz arcydzieła twojego kompozytora oraz przegląd pięciu najlepszych kompozytorów świata.\n\nDodatkowo, możesz sprawdzić Ranking poprzez najechanie na małą ikonę w prawym górnym rogu."
 mr_tutorial_arts_tab_artists_actions: "Działania Artystów"
 mr_tutorial_arts_tab_artists_actions_desc: "[Concept('concept_artists_artist','$concept_artists_artists$')] także posiadają działania. Tutaj możesz zobaczyć nad czym mogą pracować twoi artyści lub jakie decyzje może podjąć twój kraj.\n\nTo były najważniejsze informacje na temat Artystów. Możesz teraz kontynuować tutorial w zakresie sportów lub kontynuować swoją grę."
 mr_start_sports_tutorial_button_loc: "Tutorial Sportowy"
 mr_tutorial_sports_window_open: "Otwórz Panel Sportu"
 mr_tutorial_sports_window_open_desc: "Teraz przyjrzymy się Panelowi Sportu. Otwórz Panel Sportu poprzez kliknięcie przycisku lub naciśnięcie klawiszy \"Ctrl + S\" na klawiaturze."
 mr_tutorial_sports_window_open_tt: "Otwórz Panel Sportu poprzez kliknięcie przycisku sportu lub naciśnięcie \"Ctrl + S\""
 mr_tutorial_sports_window: "Panel Sportu"
 mr_tutorial_sports_window_desc: "Panel Sportu pozwala ci uzyskać dostęp do różnych rodzajów sportów i postaci związanych ze sportami.\n\nPanel podzielony jest na normalne sporty i aeronautykę.\n\nZwykłe Sporty obejmują:\n- [concept_vikelas_olympic_games]\n- [concept_douglas_mountaineering]\n- Sporty z piłką\n- [concept_vikelas_car_racing]\n\nAeronautyka obejmuje:\n- [concept_curtiss_balloonist]\n- [concept_curtiss_pilot]"
 mr_tutorial_sports_tab: "Zakładka Sportów"
 mr_tutorial_sports_tab_desc: "Zakładka Sportów pokazuje ci przegląd różnych działań i postaci związanych ze sportami.\nW przeciwieństwie do Badaczy i Artystów, postaci w zakładce sportów to zazwyczaj generałowie lub politycy."
 mr_tutorial_sports_tab_open_tt: "Otwórz Zakładkę Sportów"
 mr_tutorial_sports_tab_character_overview: "Przegląd postaci"
 mr_tutorial_sports_tab_character_overview_desc: "Ta część interfejsu pozwala ci przejrzeć [concept_character].\n\nNiektóre postaci takie jak [concept_vikelas_coach] czy rajdowcy to postaci, które możesz zdobyć i dlatego posiadają [concept_academics_experience]. Inne, jak wspinacze nie mają doświadczenia."
 mr_tutorial_sports_tab_currencies: "Wartości i informacje"
 mr_tutorial_sports_tab_currencies_desc: "Na środku możesz zobaczyć ważne informacje na temat danego specyficznego sportu.\n\nDla przykładu [concept_vikelas_olympic_games] pozwalają sprawdzić Przewodniczącego oraz Zarząd [concept_vikelas_ioc], jak wielu państw należy do organizacji oraz jak wiele medali dotychczas zebrałeś."
 mr_tutorial_sports_tab_actions: "Działania"
 mr_tutorial_sports_tab_actions_desc: "Prawa strona pozwala ci podjąć specyficzne działania związane z danym sportem.\nTe Działania to decyzje, które pozwalają ci użyć twoich [Concept('concept_character', '$concept_characters$')] lub ustanowić coś nowego jak [concept_vikelas_ioc]."
 mr_tutorial_sports_tab_aeronautics_tab_open: "Otwórz Zakładkę Aeronautyki"
 mr_tutorial_sports_tab_aeronautics_tab_open_desc: "Teraz przyjrzyjmy się Zakładce Aeronautyki. Otwórz zakładkę poprzez naciśnięcie przycisku zakładki."
 mr_tutorial_aeronautics_tab_open_tt: "Otwórz Zakładkę Aeronautyki"
 mr_tutorial_aeronautics_tab: "Zakładka Aeronautyki"
 mr_tutorial_aeronautics_tab_desc: "Zakładka Aeronautyki wygląda prawie tak samo jak zakładka sportów.\n\nGłówną różnicą są postaci. Możesz sponsorować i zautomatyzować [concept_curtiss_balloonist] oraz [concept_curtiss_pilot] pojawią się w różnych okolicznościach.\n\nTo kończy Tutorial przeglądowy. Proszę użyj Vickypedii lub Pojęć, które dodaliśmy jeśli chciałbyś dowiedzieć się więcej o postaciach Morgenröte."
 mr_tutorial_lesson_button_finish: "Zakończ tutorial"
