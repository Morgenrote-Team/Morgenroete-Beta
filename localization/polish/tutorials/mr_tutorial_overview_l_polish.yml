l_polish:

 thriving_culture_lesson_start_tutorial_button_loc: "Samouczek początkowy" #deepl:1296206908

 mr_tutorial_buttons: "Przyciski Morgenröte" #deepl:3232304745
 mr_tutorial_buttons_desc: "Większość rzeczy w Morgenröte jest dostępna w Morgenröte-Windows. Dostęp do nich można uzyskać, klikając przyciski na pasku bocznym. Obecnie dostępne są następujące okna: #V Okno nauki#!: Tutaj możesz znaleźć swoje [Concept('concept_academics_academic','$concept_academics_academics$')], ich działania, swoje [concept_academics_progress] i ekspedycje naukowe.\n\n- #V Okno sztuki#!: Tutaj możesz znaleźć swoje [Concept('concept_artists_artist','$concept_artists_artists$')], ich działania, swoje [concept_artistic_progress] i [Concept('concept_artists_art_style','$concept_artists_art_styles$')].\n\n- #V Okno sportowe#!: Tutaj można znaleźć różne dyscypliny sportowe i postacie związane ze sportem i aeronautyką, ich działalność oraz międzynarodowe organizacje sportowe." #deepl:3017682288

 mr_tutorial_science_window_open: "Otwórz okno nauki" #deepl:734722697
 mr_tutorial_science_window_open_desc: "Teraz przyjrzymy się bliżej oknu naukowemu. Otwórz okno nauki, klikając przycisk lub naciskając klawisz \"M\" na klawiaturze." #deepl:1849505402
 mr_tutorial_science_window_open_tt: "Otwórz okno nauki, klikając przycisk nauki lub naciskając \"M\"" #deepl:1188172678

 mr_tutorial_science_tab: "Okno nauki" #deepl:1054166281
 mr_tutorial_science_tab_desc: "Okno nauki to miejsce, w którym można znaleźć informacje i działania związane z przedsięwzięciami naukowymi. Jest ono podzielone na 4 zakładki: \n\n- #V Przegląd#!: Ta zakładka zawiera [concept_academics_progress], #V Ogólne ekspedycje naukowe#! i #V Koncentracja naukowa#!\n\n- #V Matematyczno-techniczne#!: Ta zakładka zawiera [concept_gaudi_engineer], [concept_mendelejew_chemist] i [concept_verrier_astronomer]\n\n- #V Humanistyczno-antropologiczne#!: Ta zakładka zawiera [concept_panum_physician], [concept_lepsius_archaeologist] i [concept_lepsius_anthropologist]\n\n- [concept_dubois_natural_history]: Ta zakładka zawiera [concept_agassiz_geologist], [concept_dubois_paleontologist] i [concept_dubois_naturalist]\n\n- #V Humanistyczne-Antropologiczne#!: Ta zakładka zawiera [concept_panum_physician], [concept_lepsius_archaeologist] oraz [concept_lepsius_anthropologist]" #deepl:271317186
 mr_tutorial_science_tab_tt: "Otwarte zostanie okno nauki" #deepl:3571747254

 mr_tutorial_science_overview_tab_open: "Otwórz kartę Przegląd" #deepl:2171973784
 mr_tutorial_science_overview_tab_open_desc: "Zakładka Przegląd umożliwia dostęp do stron [concept_academics_progress], #V Ogólne ekspedycje naukowe#! oraz #V Koncentracja naukowa#!\n\nPrzejdź do zakładki Przegląd, klikając przycisk zakładki." #deepl:3801100877
 mr_tutorial_science_overview_tab_open_tt: "Przejdź do zakładki Przegląd, klikając przycisk zakładki." #deepl:583115154

 mr_tutorial_science_overview_tab_promote_academics: "Promowanie środowisk akademickich" #deepl:3127848749
 mr_tutorial_science_overview_tab_promote_academics_desc: "Sercem Morgenröte są postacie. Ale jak zdobyć te postacie? Aby otrzymać nową [concept_academics_academic], musisz zdobyć wystarczającą liczbę [concept_academics_progress]. Możesz najechać kursorem na pasek postępu, aby zobaczyć, jakie czynniki wpływają na postęp.\n\nMożesz promować konkretnego Akademika, jeśli posiadasz Uniwersytet z [concept_academics_university_specialization].\n\nMożesz także inwestować pieniądze, aby szybciej zdobywać Postępy Akademickie.\n\Alternatywnie możesz zdobyć Akademików za pomocą wydarzeń lub kupując jednego z nich za pomocą akcji dyplomatycznej, jeśli jesteś narodem, który nie należy do najbardziej zaawansowanych naukowo krajów." #deepl:3334402372

 mr_tutorial_science_overview_tab_scientific_focus: "Koncentracja naukowa" #deepl:4254522642
 mr_tutorial_science_overview_tab_scientific_focus_desc: "Czasami możesz chcieć skupić się na konkretnym rodzaju badań. Jeśli spełniasz ich wymagania, możesz skorzystać z ognisk naukowych. Zasadniczo będą one promować badania niektórych grup technologicznych i zmniejszać wydajność innych." #deepl:2966516010

 mr_tutorial_science_overview_tab_scientific_expedition: "Wyprawy naukowe" #deepl:3527687538
 mr_tutorial_science_overview_tab_scientific_expedition_desc: "Ekspedycje naukowe to ekspedycje, które może rozpocząć twój kraj. W zależności od rodzaju ekspedycji może to prowadzić do wielkich dobrodziejstw dla twojego kraju.Obecnie istnieją następujące ekspedycje:\n- [concept_dubois_pacific_expedition]\n- [concept_verrier_venus_transit] Ekspedycja\n- Ekspedycja w celu odnalezienia Przejścia Północno-Zachodniego\n- Ekspedycja Zeppelinów\n- Ekspedycja w celu ułożenia kabla transatlantyckiego." #deepl:413711623

 mr_tutorial_science_natural_history_tab_open: "Otwórz kartę Historia naturalna" #deepl:1440158592
 mr_tutorial_science_natural_history_tab_open_desc: "Przyjrzyjmy się teraz jednej z witryn [Concept('concept_academics_academic','$concept_academics_academics$')]. Otwórz kartę Historia naturalna, aby kontynuować." #deepl:3933847545
 mr_tutorial_science_natural_history_tab_open_tt: "Przejdź do zakładki Historia naturalna, klikając przycisk zakładki." #deepl:1038657530

 mr_tutorial_science_natural_history_tab_character: "Pracownicy naukowi" #deepl:1408513918
 mr_tutorial_science_natural_history_tab_character_desc: "Sercem Morgenröte są jego postacie. W zakładce naukowej postacie te znajdują się na stronie [Concept('concept_academics_academic','$concept_academics_academics$')]. Po lewej stronie każdej nowej roli postaci możesz zobaczyć portret swojego Akademika i dodatkowe informacje na jego temat." #deepl:1020069787

 mr_tutorial_science_natural_history_tab_character_rating: "Ocena postaci" #deepl:3205270775
 mr_tutorial_science_natural_history_tab_character_rating_desc: "Dla większości postaci znajdziesz małą ikonę obok ich imienia. Ikona ta wskazuje ich predyspozycje do danej roli. Możesz zobaczyć, jakie czynniki wpływają na tę ocenę, najeżdżając kursorem na ikonę.\n\nObjaśnienie ikon:\n@mr_rating_fantastic!  Doskonały\n@mr_rating_very_good!  Bardzo dobry\n@mr_rating_good!  Dobry\n@mr_rating_mediocre!  Mediocre\n@mr_rating_bad!  Bad\n@mr_rating_very_bad!  Bardzo źle" #deepl:2393422146

 mr_tutorial_science_natural_history_tab_character_experience_bar: "Doświadczenie postaci" #deepl:356262571
 mr_tutorial_science_natural_history_tab_character_experience_bar_desc: "Każda postać ma [concept_academics_experience] w swojej specjalizacji. Im wyższe doświadczenie, tym lepiej postać radzi sobie w różnych zadaniach. Doświadczenie zdobywa się pasywnie każdego roku, a także aktywnie, wykonując zadania i odnosząc sukcesy. [Concept('concept_academics_academic','$concept_academics_academics$')] zyskują wyższe cechy, gdy osiągną 100 (doświadczenie) i 300 (sława) doświadczenia." #deepl:4293324584

 mr_tutorial_science_natural_history_tab_character_achievements: "Osiągnięcia postaci" #deepl:2935735490
 mr_tutorial_science_natural_history_tab_character_achievements_desc: "[Concept('concept_academics_academic','$concept_academics_academics$')] czasami osiągają imponujące wyniki. Zawsze możesz sprawdzić, co akademik osiągnął do tej pory, najeżdżając kursorem na tę ikonę." #deepl:1195783621

 mr_tutorial_science_natural_history_tab_currencies: "Dyskusje i wartości" #deepl:1384869411
 mr_tutorial_science_natural_history_tab_currencies_desc: "Większość postaci w Morgenröte ma przypisane wartości. Wartości te są wyświetlane w centrum każdego akademika. W przypadku geologii zobaczysz na przykład, ile minerałów znaleziono lub ile masz wiedzy geologicznej.\n\nCzęsto możesz dowiedzieć się więcej o niektórych wartościach, najeżdżając na nie kursorem." #deepl:4066533914

 mr_tutorial_science_natural_history_visit_button: "Odwiedź przycisk" #deepl:3858963492
 mr_tutorial_science_natural_history_visit_button_desc: "Większość stron [Concept('concept_academics_academic','$concept_academics_academics$')] ma specjalne przyciski odwiedzin, które pozwalają dowiedzieć się więcej na temat danego ośrodka akademickiego. Na przykład strona [concept_dubois_naturalist] ma przycisk odwiedzin w zoo, gdzie można dowiedzieć się więcej o zwierzętach w zoo." #deepl:1189517097

 mr_tutorial_science_natural_history_ranking: "Ranking" #deepl:4181663012
 mr_tutorial_science_natural_history_ranking_desc: "Może lubisz porównywać się z innymi krajami. W takim przypadku ranking może być dla ciebie interesujący. Najechanie kursorem na tę ikonę pozwala wyświetlić różne listy, które pozwalają zobaczyć, jak dobrze radzisz sobie w określonym aspekcie Morgenröte w porównaniu z innymi krajami. [concept_agassiz_geologist] pozwala na przykład porównać wynik geologiczny, wiedzę geologiczną, wiedzę oceaniczną, minerały i rzadkie minerały." #deepl:394625426

 mr_tutorial_science_natural_history_project_buttons: "Przyciski projektu i inne przyciski" #deepl:430248338
 mr_tutorial_science_natural_history_project_buttons_desc: "Ta część interfejsu jest jedną z najważniejszych dla użytkownika. Dzięki niej możesz zlecać swojemu [Concept('concept_academics_academic','$concept_academics_academics$')] projekty i uruchamiać inne ważne interakcje. [concept_agassiz_geologist] może wyruszać na ekspedycje, ulepszać swoje gałęzie przemysłu, ponownie obliczać wiek Ziemi, a ty możesz założyć gabinet minerałów lub rozpocząć kongres na temat dryfu kontynentalnego." #deepl:2696053152

 mr_tutorial_science_natural_history_view_switch_buttons: "Zmiana układu" #deepl:1671308253
 mr_tutorial_science_natural_history_view_switch_buttons_desc: "Jeśli wolisz bardziej gęsty interfejs, możesz zmienić jego wygląd za pomocą tego przycisku. Dla samej gry nie ma znaczenia, którego wariantu użyjesz. Wybierz więc wariant, który bardziej ci się podoba." #deepl:2800918764

 mr_start_culture_tutorial_button_loc: "Samouczek dotyczący kultury" #deepl:231585177
 mr_tutorial_not_yet_implemented_tt: "Ten samouczek nie jest jeszcze gotowy." #deepl:1971937521

 mr_tutorial_arts_window_open: "Otwórz okno sztuki" #deepl:2590280325
 mr_tutorial_arts_window_open_desc: "Teraz przyjrzymy się bliżej oknu sztuki. Otwórz okno sztuki, klikając przycisk lub naciskając klawisze \"Ctrl + A\" na klawiaturze." #deepl:53394483
 mr_tutorial_arts_window_open_tt: "Otwórz okno sztuki, klikając przycisk nauki lub naciskając \"Ctrl + A\"." #deepl:2950751548

 mr_tutorial_arts_tab: "Zakładka Sztuka" #deepl:2793588649
 mr_tutorial_arts_tab_desc: "Sztuka była ważną częścią XIX i XX wieku. Wielcy [Concept('concept_artists_artist','$concept_artists_artists$')] tej epoki są nadal dobrze znani. Morgenröte oferuje różne rodzaje artystów i ich dzieł sztuki. Samo okno sztuki ma dwie zakładki. Jedna pokazuje przegląd sztuki w twoim kraju, w drugiej możesz znaleźć swoich artystów i rekrutować artystów z innych krajów." #deepl:543699742

 mr_tutorial_arts_tab_cultural_tradition: "Tradycja kulturowa" #deepl:3268694731
 mr_tutorial_arts_tab_cultural_tradition_desc: "Tradycja kulturowa to wartość reprezentująca osiągnięcia kulturowe danego kraju. Składa się ona z [concept_elgar_musical_tradition], [concept_manzoni_literary_tradition] i [concept_klimt_painting_tradition]. Tradycja kulturowa jest obliczana według następującego wzoru: Tradycja muzyczna / 4 + Tradycja malarska / 3 + Tradycja literacka / 2\n\nTradycja artystyczna daje dodatkowo [concept_prestige]. Każde 5 punktów Tradycji Sztuki daje 1 dodatkowy Prestiż." #deepl:3774927584
 mr_tutorial_arts_overview_tab_open_tt: "Otwórz kartę Przegląd sztuki" #deepl:3810726030

 mr_tutorial_arts_tab_artist_progress: "Postęp artysty" #deepl:61174778
 mr_tutorial_arts_tab_artist_progress_desc: "Nowe [Concept('concept_artists_artist','$concept_artists_artists$')] można zdobyć na różne sposoby: Możesz ich rekrutować, zdobywać za pomocą wydarzeń lub zbierając wystarczającą liczbę [concept_artistic_progress].\n\nO ile wydarzenia i rekrutacja nie są możliwe dla każdej nacji, zdobywanie artystów poprzez zapełnianie paska Postępu Artystycznego jest możliwe po posiadaniu $building_elgar_opera$ lub $building_arts_academy$.\nMożesz zobaczyć pełną listę czynników wpływających na miesięczny przyrost, najeżdżając kursorem na pasek postępu.\n\Dodatkowo możesz Patronować Sztuce, aby uzyskać większy postęp i promować określonych artystów, jeśli posiadasz niezbędne [concept_production_method] w swoim $building_arts_academy$." #deepl:1108726132

 mr_tutorial_arts_tab_center_of_arts: "Centrum Sztuki" #deepl:4265095628
 mr_tutorial_arts_tab_center_of_arts_desc: "[Concept('concept_artists_center_of_arts','$concept_artists_centers_of_arts$')] to miejsca, w których urodził się [concept_artists_art_style]. Niektóre Centra Sztuki istnieją już na początku gry. Inne można odblokować przez [Concept('concept_journal_entry','$concept_journal_entries$')] lub naciskając jeden z przycisków widocznych tutaj. Najedź kursorem na Centrum Sztuki, aby zobaczyć, w jaki sposób możesz je zdobyć.\n\nCentra Sztuki są oczywiście przydatne dla ciebie i twojego kraju, ponieważ dają ci dostęp do bonusów." #deepl:1287628103

 mr_tutorial_arts_tab_artists_tab_open: "Otwórz kartę Artyści" #deepl:974477655
 mr_tutorial_arts_tab_artists_tab_open_desc: "Przyjrzyjmy się teraz bliżej stronie [Concept('concept_artists_artist','$concept_artists_artists$')].\n\nOtwórz zakładkę Artyści, klikając przycisk zakładki." #deepl:391030067
 mr_tutorial_arts_tab_artists_tab_open_open_tt: "Otwórz kartę Artyści" #deepl:974477655

 mr_tutorial_arts_tab_artists: "Zakładka Artyści" #deepl:1211285969
 mr_tutorial_arts_tab_artists_desc: "Strona [Concept('concept_artists_artist','$concept_artists_artists$')] wygląda dość podobnie do strony Academics, ale działa nieco inaczej.\n\nObecnie dostępnych jest 3 artystów:\n- [concept_elgar_composer]\n- [concept_manzoni_writer]\n-... [concept_klimt_painter]" #deepl:124747602

 mr_tutorial_arts_tab_artists_invite: "Zapraszanie artystów" #deepl:1648609371
 mr_tutorial_arts_tab_artists_accquisation_desc: "Jak już wspomnieliśmy, [Concept('concept_artists_artist','$concept_artists_artists$')] można zdobyć nie tylko poprzez zdobycie wystarczającej liczby [concept_artistic_progress], ale także po prostu zapraszając ich.\n\nKażdy rodzaj artysty ma inne wymagania. Możesz zaprosić [Concept('concept_elgar_travelling_composer','$concept_elgar_travelling_composers$')] z całego świata, ale musisz być krajem z wystarczającą liczbą $building_elgar_opera$i wystarczająco dobrym [concept_elgar_musical_tradition].[Concept('concept_klimt_independent_painter','$concept_klimt_independent_painters$')] można zaprosić tylko wtedy, gdy mają podobną kulturę.[Concept('concept_manzoni_writer','$concept_manzoni_writers$')] z drugiej strony nie może być w ogóle zaproszony." #deepl:2127803597

 mr_tutorial_arts_tab_artists_character: "Informacje ogólne" #deepl:995936974
 mr_tutorial_arts_tab_artists_character_desc: "W lewej części okna wyświetlane są podstawowe informacje o artyście: portret, nazwa i ocena, strona [concept_artists_experience]. [Concept('concept_character_trait','$concept_character_traits$')]" #deepl:1445240346

 mr_tutorial_arts_tab_artists_currencies: "Ważne wartości artystyczne" #deepl:71895904
 mr_tutorial_arts_tab_artists_currencies_desc: "Ta część interfejsu pozwala zobaczyć ogólne informacje dotyczące tego konkretnego aspektu sztuki. W przypadku [concept_elgar_composer] wyświetla [concept_elgar_musical_tradition], kompozycje i arcydzieła kompozytora oraz przegląd pięciu najlepszych kompozytorów na świecie. Dodatkowo można znaleźć ranking po najechaniu kursorem na małą ikonę w prawym górnym rogu." #deepl:1891899818

 mr_tutorial_arts_tab_artists_actions: "Działania artystów" #deepl:2320930103
 mr_tutorial_arts_tab_artists_actions_desc: "[Concept('concept_artists_artist','$concept_artists_artists$')] mają również akcje. Tutaj możesz zobaczyć, nad czym mogą pracować twoi artyści lub jakie decyzje możesz podjąć ze swoją nacją. To były najważniejsze informacje dotyczące artystów. Możesz kontynuować samouczek sportowy z tego miejsca lub kontynuować grę." #deepl:746856108
 mr_start_sports_tutorial_button_loc: "Samouczek sportowy" #deepl:826655861

 mr_tutorial_sports_window_open: "Otwórz okno sportu" #deepl:1830514457
 mr_tutorial_sports_window_open_desc: "Teraz przyjrzymy się bliżej oknu sportowemu. Otwórz okno sportu, klikając przycisk lub naciskając klawisze \"Ctrl + S\" na klawiaturze." #deepl:243246943
 mr_tutorial_sports_window_open_tt: "Otwórz okno sportu, klikając przycisk nauki lub naciskając \"Ctrl + S\"." #deepl:1482293542

 mr_tutorial_sports_window: "Okno sportowe" #deepl:4243980162
 mr_tutorial_sports_window_desc: "Okno sportów umożliwia dostęp do różnych sportów i postaci związanych z tymi sportami. Okno jest podzielone na zwykłe sporty i aeronautykę. Zwykłe sporty obejmują: \n- [concept_vikelas_olympic_games]\n- [concept_douglas_mountaineering]\n- sporty z piłką \n- [concept_vikelas_car_racing]\n\nAeronautyka obejmuje: \n- [concept_curtiss_balloonist]\n-... [concept_curtiss_pilot]" #deepl:2523227399

 mr_tutorial_sports_tab: "Zakładka Sport" #deepl:2701935579
 mr_tutorial_sports_tab_desc: "Zakładka Sport daje ci przegląd różnych aktywności i postaci związanych ze sportem. W przeciwieństwie do Akademików i Artystów, postacie w zakładce Sport są często zwykłymi generałami lub politykami." #deepl:1383542418
 mr_tutorial_sports_tab_open_tt: "Otwórz kartę Sport" #deepl:176871982

 mr_tutorial_sports_tab_character_overview: "Przegląd postaci" #deepl:96645084
 mr_tutorial_sports_tab_character_overview_desc: "Ta część interfejsu użytkownika zawiera przegląd strony [concept_character]. Niektóre postacie, takie jak [concept_vikelas_coach] i Car Racer, są postaciami, które można zdobyć, a zatem mają [concept_academics_experience]. Inne, takie jak Góral, nie mają doświadczenia." #deepl:1695633540

 mr_tutorial_sports_tab_currencies: "Wartości i informacje" #deepl:2440189283
 mr_tutorial_sports_tab_currencies_desc: "Pośrodku znajdują się ważne informacje dotyczące tego konkretnego sportu. [concept_vikelas_olympic_games] zawiera na przykład przegląd prezesa i zarządu [concept_vikelas_ioc], liczbę członków i liczbę medali zebranych do tej pory." #deepl:1125108675

 mr_tutorial_sports_tab_actions: "Działania" #deepl:1951990429
 mr_tutorial_sports_tab_actions_desc: "Po prawej stronie można podjąć określone działania dla danej dyscypliny. Działania te są w zasadzie decyzjami, które pozwalają na korzystanie z [Concept('concept_character', '$concept_characters$')] lub ustanowienie czegoś nowego, takiego jak [concept_vikelas_ioc]." #deepl:2455654735

 mr_tutorial_sports_tab_aeronautics_tab_open: "Otwórz kartę Aeronautyka" #deepl:2120346894
 mr_tutorial_sports_tab_aeronautics_tab_open_desc: "Przyjrzyjmy się teraz bliżej zakładce Aeronautyka. Otwórz kartę, klikając przycisk ." #deepl:2671641916
 mr_tutorial_aeronautics_tab_open_tt: "Otwórz kartę Aeronautyka" #deepl:2187560588

 mr_tutorial_aeronautics_tab: "Zakładka Aeronautyka" #deepl:2661687945
 mr_tutorial_aeronautics_tab_desc: "Zakładka Aeronautyka wygląda w większości tak samo, jak zakładka Sport.\n\Jedna duża różnica tkwi w samych postaciach. Możesz zasponsorować i zautomatyzować [concept_curtiss_balloonist], a [concept_curtiss_pilot] pojawi się w różnych okolicznościach.\nTo koniec ogólnego samouczka. Skorzystaj z Vickypedii lub dodanych przez nas Koncepcji, jeśli chcesz dowiedzieć się więcej o postaciach z Morgenröte." #deepl:851922845
