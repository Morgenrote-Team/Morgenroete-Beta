l_polish:
 matsuura.101.t: "Młody mężczyzna chce odbyć podróż do Ezo."
 matsuura.101.d: "[SCOPE.sCharacter('character_1_scope').GetFullName] jest młodym mężczyzną, który chce udać się w podróż do Ezo na północy. Jednak domena Matsumae wprowadziła ograniczenia swobód tranzytowych. Czy należy pozwolić młodemu mężczyźnie wyruszyć na wyprawę na wyspy północne?"
 matsuura.101.f: "„Chcę podróżować gdzie się da! Ezo, Morokoshi, Tenjiku! Proszę, pozwólcie mi zobaczyć cuda tego świata!”"
 matsuura.101.g: "Mógłby studiować tamtejszy krajobraz!"
 matsuura.101.h: "Słyszałem, że jest poetą, być może podróż go zainspiruje?"
 matsuura.101.i: "Może mógłby tworzyć malowidła przedstawiające ten region?"
 matsuura.101.j: "Nikt nie może opuścić tego miejsca."
 matsuura_allowed_travels_modifier: "Zezwolono na podróż do Ezo"
 matsuura.102.t: "Zachodnia Chemia"
 matsuura.102.d: "[SCOPE.sCharacter('character_1_scope').GetFullName] Od lat studiuje Rangaku, czyli zachodnią naukę. Teraz zamierza napisać książkę o czymś, co nazywa się „chemią”. Być może warto byłoby go wesprzeć."
 matsuura.102.f: "„Widzisz, człowiek z dalekiej krainy przeprowadzał eksperymenty...”\n„Chcesz wiedzieć, czym są eksperymenty? Jeśli masz teorię...”\n„Och, nie wiesz też, czym jest teoria...”"
 matsuura.102.g: "Czym jest ta \"Chemia\" o której on mówi?"
 matsuura.102.h: "Barbarzyńskie idee!"
 matsuura_barbarian_ideas_modifier: "Barbarzyńskie Idee"
 matsuura_nintendo_modifier: "Karty Nintendo Hanafuda"
 matsuura.103.t: "Nintendo"
 matsuura.103.d: "W Kioto, Fusajirō Yamauchi założył fabrykę kart do gry, która zajmowała się wyłącznie produkcją popularnych kart Hanafuda. Firma szybko stała się liderem rynku w całej Japonii. Kompania nosi nazwę Nintendo."
 matsuura.103.f: "„Po prostu usiądź wygodnie i zrelaksuj się, mój przyjacielu\nDzisiejsza lekcja nie potrwa długo\nA żeby była bardziej interesująca\nMa formę tej nerdowskiej piosenki\n Jest rok 1889, jeszcze przed pochwałami i nagrodami\n Nintendo zaczynało od produkcji kart hanafuda.\n\n Przez sto lat firma rozwijała się i planowała odkryć, co się sprzedaje.\n Produkowano odkurzacze, Ultra Hand, testery miłości i hotele miłości.\n Wkrótce jednak skupiono się na grach, takich jak Game & Watch i Color TV.\n W 1981 roku powstała gra Donkey Kong, a reszta jest historią! \n\nOto historia Nintendo\nOd Hanafudy do Mario\nProsto z Kioto, z facetem o nazwisku Miyamoto\nOto historia Nintendo'\n\n-Matthew Taranto"
 matsuura.103.g: "Czy są jakieś gry, które mogłyby być bardziej popularne niż karty Hanafuda?"