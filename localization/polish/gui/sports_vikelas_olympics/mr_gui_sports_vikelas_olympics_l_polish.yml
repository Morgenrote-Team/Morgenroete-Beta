 VISIT_IOC_BUTTON: "Odwiedź MKOl"
 MR_VISIT_IOC_POSSIBLE_FOUNDED_TT: "#default_text #V Międzynarodowy Komitet Olimpijski został utworzony #!. #!"
 MR_VISIT_IOC_POSSIBLE_TT: "#default_text #V Nie jesteś w trakcie odwiedzin w MKO #!. #!"
 VISIT_IOC_BUTTON_TT: "#T Odwiedź Międzynarodowy Komitet Olimpijski #!\n Odwiedź Międzynarodowy Komitet Olimpijski by zdobyć informacje o członkach, następnej Olimpiadzie lub międzynarodowej tabeli medalowej.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_IOC_FOUNDATION_BUTTON: "Załóż MKOl"
 MR_IOC_FOUNDATION_BUTTON_TT: "#T Załóż Międzynarodowy Komitet Olimpijski #!\n Międzynarodowy Komitet Olimpijski (MKOl) jest organizacją pozarządową o formie prawnej stowarzyszenia. Celem komitetu jest organizacja i nadzorowanie współczesnych igrzysk olimpijskich. Kraj założycielski ma stałe miejsce w zarządzie, który decyduje o miejscach organizacji igrzysk olimpijskich. Wkrótce po utworzeniu MKOl można zorganizować pierwsze igrzyska olimpijskie, które od tego momentu będą odbywać się co cztery lata. Pod pewnymi warunkami inne kraje mogą przystąpić do MKOl jako członkowie zwyczajni, ale liczba miejsc w zarządzie jest ograniczona.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_IOC_FOUNDATION_HAS_ACADEMIC_TRIGGER_TT: "#default_text [GetPlayer.GetName] posiada przynajmniej jeden [concept_academics_academic]. #!"
 MR_IOC_FOUNDATION_PEACE_TRIGGER_TT: "#default_text [GetPlayer.GetName] jest w trakcie pokoju. #!"
 MR_IOC_MEMBER_BUTTON: "Dołącz do MKOl"
 MR_IOC_MEMBER_BUTTON_TT: "#T Zostań członkiem MKOl #!\n Dołącz do Międzynarodowego Komitetu Olimpijskiego aby rywalizować w odbywających się co cztery lata igrzyskach olimpijskich. Członkowie MKOl mają również możliwość organizacji igrzysk we własnym kraju.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_IOC_MEMBER_INFAMY_TRIGGER_TT: "#default_text [GetPlayer.GetName] niesława jest niższa niż #n 50 #!. #!"
 MR_IOC_MEMBER_NOT_UNRECOGNIZED_TRIGGER_TT: "#default_text [GetPlayer.GetName] jest #V nieuznawany #!. #!"
 MR_IOC_MEMBER_NOT_HOSTING_TRIGGER_TT: "#default_text [GetPlayer.GetName] #V nie jest obecnym gospodarzem Olimpiady #!. #!"
 MR_IOC_BRIBE_BUTTON: "Przekup MKOl"
 MR_IOC_BRIBE_BUTTON_TT: "#T Przekup MKOl #!\nDzięki hojnej „darowiźnie” dla zarządu MKOl możemy zapewnić sobie przychylność członków i zająć czwarte miejsce w kolejności do organizacji następnych igrzysk olimpijskich. Nie ma jednak gwarancji, że zostaniemy wybrani. Pozostali członkowie MKOl mogą również źle zinterpretować naszą hojność.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_IOC_BRIBE_NOT_BRIBING_ALREADY_TRIGGER_TT: "#default_text [GetPlayer.GetName] #V nie jest w trakcie przekupywania MKOl #!. #!"
 MR_OLYMPIC_FLAME_BUTTON: "Olimpijski płomień"
 MR_OLYMPIC_FLAME_BUTTON_TT: "#T Olimpijski płomień #!\nOlimpijski ogień, oparty na wiecznie płonącym ogniu paleniska greckiej bogini Hestii, został po raz pierwszy zaprezentowany podczas Igrzysk Olimpijskich w Amsterdamie w 1928 roku. Tradycja związanego z nim biegu z pochodnią olimpijską została wprowadzona podczas Letnich Igrzysk Olimpijskich w Berlinie w 1936 roku. Wbrew powszechnemu przekonaniu pomysł ten nie wyszedł od narodowych socjalistów, ale od niemiecko-żydowskiego archeologa Alfreda Schiffa. Wprowadzenie tej tradycji nie tylko nadało Igrzyskom Olimpijskim nowy symbol identyfikacji, ale także co roku jednoczyło społeczeństwo i działało jako podnoszący na duchu symbol, odwracający uwagę od innych problemów.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_IOC_OLYMPIC_FLAME_IS_HOST_TRIGGER_TT: "#default_text [GetPlayer.GetName] jest #V w trakcie przygotowań do organizowania następnej Olimpiady #!. #!"
 MR_IOC_PRESIDENT_BUTTON: "Zostań prezesem MKOl"
 MR_IOC_PRESIDENT_BUTTON_TT: "#T Zostań prezesem MKOl #!\nBez aktywnego prezesa MKOl możemy zająć takie stanowisko. Zakłada to, że kontrolujemy siedzibę Komitetu Olimpijskiego.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_IOC_CONTROLS_HQ_TRIGGER_TT: "#default_text [GetPlayer.GetName] kontroluje [GetBuildingType('building_vikelas_ioc').GetName] #!. #!"
 MR_IOC_DISCIPLINE_BUTTON: "Wprowadź dyscyplinę olimpijską"
 MR_IOC_DISCIPLINE_BUTTON_TT: "#T Wprowadź dyscyplinę olimpijską #!\nIm większa jest MKOl i im więcej krajów uczestniczy w igrzyskach olimpijskich, tym więcej dyscyplin można wprowadzić. Więcej dyscyplin oznacza więcej medali. Łącznie można wprowadzić 20 dyscyplin, w tym sporty narodowe.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_IOC_15_MEMBERS_TRIGGER_TT: "#default_text MKOl posiada przynajmniej #G 15 #! #V Członków #!. #!"
 MR_IOC_20_MEMBERS_TRIGGER_TT: "#default_text MKOl posiada przynajmniej #G 20 #! #V Członków #!. #!"
 MR_IOC_25_MEMBERS_TRIGGER_TT: "#default_text MKOl posiada przynajmniej #G 25 #! #V Członków #!. #!"
 MR_IOC_30_MEMBERS_TRIGGER_TT: "#default_text MKOl posiada przynajmniej #G 30 #! #V Członków #!. #!"
 MR_IOC_40_MEMBERS_TRIGGER_TT: "#default_text MKOl posiada przynajmniej #G 40 #! #V Członków #!. #!"
 MR_IOC_50_MEMBERS_TRIGGER_TT: "#default_text MKOl posiada przynajmniej #G 50 #! #V Członków #!. #!"
 MR_IOC_60_MEMBERS_TRIGGER_TT: "#default_text MKOl posiada przynajmniej #G 60 #! #V Członków #!. #!"
 MR_IOC_MAKE_NATIONAL_SPORT_DISCIPLINE_BUTTON: "[GetPlayer.GetCustom('vikelas_national_sport_for_GUI_type')] as Olympic Discipline"
 MR_IOC_MAKE_NATIONAL_SPORT_DISCIPLINE_BUTTON_TT: "#T Make [GetPlayer.GetCustom('vikelas_national_sport_for_GUI_type')] an Olympic Disciplinee#!\nThe President of the IOC can make his national sport a mandatory Olympic discipline. This is a unique decision.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_IOC_NO_BRIBE_BUTTON: "Przestań przekupywać MKOl"
 MR_IOC_NO_BRIBE_BUTTON_TT: "#T Przestań przekupywać MKOl #!\nJeśli niedawno byliśmy gospodarzami igrzysk olimpijskich, rozsądnie byłoby zaprzestać praktykowania przekupstwa, ponieważ nie możemy tak szybko ponownie ubiegać się o organizację tej imprezy.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_IOC_BRIBE_AT_LEAST_3_YEARS_TRIGGER_TT: "#default_text Łapówki MKOl mają trwać co najmniej #V cztery lata #!, zanim będą mogły zostać zniesione. #!"