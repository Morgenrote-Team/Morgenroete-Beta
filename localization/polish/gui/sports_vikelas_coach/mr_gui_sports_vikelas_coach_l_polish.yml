 MR_FIFA_BOARD_TOOLTIP: "#header Zarząd FIFA #!\nPoniższe kraje są członkami zarządu FIFA:\n\n[GetGlobalVariable('vikelas_fifa_board_member_1_global_var').GetCountry.GetName|V]\n[GetGlobalVariable('vikelas_fifa_board_member_2_global_var').GetCountry.GetName|V]\n[GetGlobalVariable('vikelas_fifa_board_member_3_global_var').GetCountry.GetName|V]\n[GetGlobalVariable('vikelas_fifa_board_member_4_global_var').GetCountry.GetName|V]\n[GetGlobalVariable('vikelas_fifa_board_member_5_global_var').GetCountry.GetName|V]"
 MR_FIFA_PRESIDENT_TOOLTIP: "#header Prezes FIFA#!\n[GetGlobalVariable('vikelas_fifa_president_global_var').GetCountry.GetName] jest prezesem FIFA."
 MR_HIRE_COACH_BUTTON_TT: "#T Zatrudnij Trenera Reprezentacji Narodowej #!\nTrenerzy reprezentacji narodowych wykorzystują swoje umiejętności, aby poprawić wyniki meczów. Doświadczenie trenera reprezentacji narodowej – krykietu, baseballu, piłki nożnej, koszykówki – zależy od sportu narodowego. Jeśli trener nie spełnia oczekiwań, może zostać zastąpiony po upływie co najmniej trzech lat.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ADAPT_NATIONAL_SPORT_BUTTON: "Adaptuj Sport Narodowy"
 MR_ADAPT_NATIONAL_SPORT_BUTTON_TT: "#T Adaptuj Sport Narodowy #! \nMożemy ogłosić konkretną dyscyplinę sportową, która stała się popularna w naszym kraju, sportem narodowym, zachęcając w ten sposób do tworzenia klubów i rozpowszechniania tej dyscypliny w innych krajach. Jest to warunek konieczny dla powstania krajowej organizacji sportowej.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_CHANGE_NATIONAL_SPORT_BUTTON: "Zmień sport narodowy"
 MR_CHANGE_NATIONAL_SPORT_BUTTON_TT: "#T Zmień sport narodowy#!\nZmiana sportu narodowego jest możliwa tylko wtedy, gdy popularność zyskał co najmniej jeden inny sport. Obecna społeczność sportowa nie będzie z tego zadowolona.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 mr_sports_coach_national_sport: "Sport narodowy"
 vikelas_national_sport_loc: "[Country.MakeScope.Var('vikelas_national_sport_var').GetFlagName]"
 vikelas_no_national_sport_loc: "Brak"
 MR_SCHOOL_SPORTS_STADIUM_TRIGGER_TT: "#default_text [GetPlayer.GetName] przynajmniej jeden aktywny #V Stadion Sportowy [concept_production_method] w [GetBuildingType('building_vikelas_sports').GetName]#!.#!"
 MR_INTERNATIONAL_SPORTS_EVENT_BUTTON: "Mistrzostwa Wspólnoty Narodów"
 MR_INTERNATIONAL_SPORTS_EVENT_BUTTON_TT: "#T Mistrzostwa Wspólnoty Narodów #!\nJako przywódca bloku mocarstw lub władca kilku wasali możemy zorganizować międzynarodowe mistrzostwa wśród naszych poddanych, jeśli uprawiają oni ten sam sport narodowy co my.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_INTERNATIONAL_SPORTS_MEMBER_TRIGGER_TT: "#default_text #default_text [GetPlayer.GetName] posiada przynajmniej #G 3 #! innych #V członków bloku #! lub #G 4 #! #V państwa poddańcze #! które mają [Country.MakeScope.Var('vikelas_national_sport_var').GetFlagName] jako sport narodowy. #!"
 MR_INTERNATIONAL_SPORTS_NO_FIFA_TRIGGER_TT: "#default_text [GetPlayer.GetName] #R nie jest #! członkiem FIFA. #!"
 MR_INTERNATIONAL_SPORTS_MODIFIER_TRIGGER_TT: "#default_text [GetPlayer.GetName] #R nie posiada#! #V $vikelas_international_sports_event_modifier$ #! lub #V $vikelas_recent_international_sports_event_modifier$ #! [Concept('concept_modifier','$concept_modifiers$')].#!"
 MR_FIFA_MEMBER_TRIGGER_TT: "#default_text Przynajmniej #BLUE 16 #! krajów jest #V członkiem FIFA #!. Obecnie FIFA posiada #G [GetGlobalVariable('vikelas_num_fifa_members_global_var').GetValue] #! członków. #!"
 MR_JOIN_FIFA_BUTTON: "Dołącz do FIFA"
 MR_JOIN_FIFA_BUTTON_TT: "#T Dołącz do FIFA #!\n Dołączenie do FIFA jest warunkiem koniecznym by móc uczestniczyć w Mistrzostwach Świata.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_LEAVE_FIFA_BUTTON: "Odejdź z FIFA"
 MR_LEAVE_FIFA_BUTTON_TT: "#T Odejdź z FIFA #!\nFIFA zdradziła wszystkie swoje ideały i jest skorumpowaną, skomercjalizowaną organizacją pozarządową, którą najlepiej zostawić w tyle.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_LEAVE_FIFA_TRIGGER_TT: "#default_text [GetPlayer.GetName] #R nie jest ani #! #V Prezydentem #! #R ani #! #V Członkiem Zarządu #! FIFA. #!"
 MR_SCHOOL_SPORTS_BUTTON: "Ustanowienie Szkół Sportowych"
 MR_SCHOOL_SPORTS_BUTTON_TT: "#T Ustanowienie Szkół Sportowych [GetPlayer.GetName] #!\nWraz z wprowadzeniem sportu szkolnego możemy zwiększyć ogólną szansę na pojawienie się osobowości o cechach sportowców i poprawić wyniki na igrzyskach olimpijskich.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_SCHOOL_SPORTS_PUBLIC_SCHOOLS_TRIGGER_TT: "#default_text [GetPlayer.GetName] posiada [GetLawType('law_public_schools').GetName] [concept_law]. #!"
 MR_SCHOOL_SPORTS_IG_ATHLETE_LEADER_TRIGGER_TT: "#default_text [GetPlayer.GetName] posiada postać z cechą #V Athlete #! jako lider #V [concept_interest_group] [concept_in_government] #!. #!"
 MR_SCHOOL_SPORTS_SPORTS_FACILITIES_TRIGGER_TT: "#default_text [GetPlayer.GetName] posiada przynajmniej jeden aktywny #V Obiekt Sportowy [concept_production_method] w [GetBuildingType('building_government_administration').GetName] #!. #!"
 MR_WORLDCUP_BUTTON: "Mistrzostwa świata w piłce nożnej"
 MR_WORLDCUP_BUTTON_TT: "#T Organizuj mistrzostwa świata w piłce nożnej #!\nThe World Cup is a football competition for national teams. Teams can qualify for the finals of the World Cup every four years. In a four-week tournament, the best national team will be determined as world champions. The world football association Fédération Internationale de Football Association (FIFA) organizes and markets the tournament. The first World Cup took place in Uruguay in 1930 and was won by the host team.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_FOOTBALL_WORLDCUP_FOOTBALL_ASSOCIATION_TRIGGER_TT: "#default_text Istnieje przynajmniej #G 10 #! krajów ze Związkiem Piłki Nożnej. #!"
 MR_FIFA_BUTTON_TT: "#T Załóż FIFA #!\nWraz ze wzrostem liczby meczów międzynarodowych w miarę rozprzestrzeniania się piłki nożnej pojawiła się potrzeba utworzenia globalnego organu zarządzającego. FIFA (fr. Fédération Internationale de Football Association) jest międzynarodową organizacją samoregulacyjną zarządzającą piłką nożną, futsalem i piłką plażową. Jest to jedna z najstarszych i największych organizacji pozarządowych na świecie, założona 21 maja 1904 roku. Powstanie FIFA umożliwiło rozgrywanie międzynarodowych meczów między poszczególnymi krajami, których trenerzy mogą doskonalić swoje umiejętności poprzez wygrywanie meczów. Doprowadziło to ostatecznie do ustanowienia Pucharu Świata.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_FIFA_TRIGGER_TT: "#default_text Istnieje przynajmniej #G 6 #! krajów ze Związkiem Piłki Nożnej. #!"
 vikelas_fifa_board_member_tt: "[GetPlayer.GetName] zostaje członkiem zarządu FIFA."
 vikelas_become_fifa_president_tt: "[GetPlayer.GetName] zostaje prezesem FIFA."
 MR_FIFA_PRESIDENT_BUTTON: "Zostań prezesem FIFA"
 MR_FIFA_PRESIDENT_BUTTON_TT: "#T Zostań prezesem FIFA #!\nBez aktywnego prezesa FIFA możemy zająć takie stanowisko. Zakłada to, że kontrolujemy siedzibę Międzynarodowego Związku Piłki Nożnej.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_FIFA_CONTROLS_HQ_TRIGGER_TT: "#default_text [GetPlayer.GetName] kontroluje [GetBuildingType('building_vikelas_fifa').GetName] #!."
