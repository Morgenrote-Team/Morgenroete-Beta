l_polish:
 theme_mr_paleontology: "Morgenröte: Paleontologia (Ziemski)"
 theme_mr_paleontology_desc: "Interfejs użytkownika inspirowany przez paleontologię, skamieniałości i dinozaurów kości."
 mr_papermap_coprolite: "Paleontologia: Koprolit"
 mr_papermap_coprolite_desc: "Wygląda na to, że paleontolog pracuje obecnie nad przygotowaniem koprolitu. Zastanawiasz się co to takiego? To skamieniały kał. W tym przypadku prawdopodobnie dinozaura."
 mr_papermap_belemnite: "Paleontologia: Belemnit"
 mr_papermap_belemnite_desc: "Kość belemnita znaleziona przez Paleontologa. Te kreatury pływały w oceanach od 358 do 66 milionów lat temu."
 mr_papermap_ammonite: "Paleontologia: Amonit"
 mr_papermap_ammonite_desc: "Jedna z najsłynniejszych kości. Miliony lat temu amonity pływały w morzach i oceanach. Teraz to ładna dekoracja na twój stół."
 mr_papermap_trilobite: "Paleontologia: Trylobit"
 mr_papermap_trilobite_desc: "Trylobity to jedne z pierwszych stawonogów, które odniosły wielki sukces. Niestety wyginęły w permie. Na szczęście część z nich uległy skamienieniu i  możesz je teraz trzymać na swoim stole jako suwenir."
 mr_papermap_battenberg_cake: "Kulinaria: Ciasto Battenberg"
 mr_papermap_battenberg_cake_desc: "Jesteś głodny? Może powinieneś położyć to przepyszne ciasto na swoim stole. To ciasto biszkoptowe pokryte marcepanem i nazwane na cześć Księcia Ludwika z Battenbergu."
 mr_papermap_old_fashioned: "Kulinaria: Old Fashioned"
 mr_papermap_old_fashioned_desc: "Co może być lepsze niż dobry Old Fashioned na koniec długiego dnia? Z pewnością twój barman wprowadzi cię w dobry nastrój tym koktajlem!"
 mr_papermap_cucumber_ice_cream: "Kulinaria: Lody Ogórkowe"
 mr_papermap_cucumber_ice_cream_desc: "Słońce świeci z nieba, to gorący słoneczny dzień. Co mogłoby być lepsze od cudownie orzeźwiających lodów ogórkowych?"
 mr_papermap_croissant_hot_chocolate: "Kulinaria: Croissant i gorąca czekolada"
 mr_papermap_croissant_hot_chocolate_desc: "Croissant i gorąca czekolada z rana to najlepszy sposób na rozpoczęcie dnia. Nie ważne, co na ciebie czeka."