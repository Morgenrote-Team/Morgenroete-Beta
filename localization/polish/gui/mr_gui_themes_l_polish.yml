 theme_mr_paleontology: "Morgenröte: Paleontologia (ziemna)" #deepl:1069050187
 theme_mr_paleontology_desc: "Interfejs użytkownika inspirowany paleontologią, skamieniałościami i kośćmi dinozaurów." #deepl:415348285

 mr_papermap_coprolite: "Paleontologia: Koprolit"
 mr_papermap_coprolite_desc: "Wygląda na to, że paleontolog pracuje obecnie nad przygotowaniem koprolitu. Zastanawiasz się, czym jest koprolit? To skamieniała kupa. W tym przypadku prawdopodobnie od dinozaura."
 mr_papermap_belemnite: "Paleontologia: Belemnit" #Please replace
 mr_papermap_belemnite_desc: "Skamielina belemnitów znaleziona przez paleontologa. Stworzenia te wędrowały po morzach między 358 a 66 milionami lat temu." #Please replace
 mr_papermap_ammonite: "Paleontologia: Amonit" #Please replace
 mr_papermap_ammonite_desc: "Jedna z najbardziej znanych skamieniałości. Ten amonit wędrował po morzach miliony lat temu. Teraz jest ładną ozdobą Twojego stołu." #Please replace
 mr_papermap_trilobite: "Paleontologia: Trylobit"
 mr_papermap_trilobite_desc: "Trylobity były jednymi z pierwszych stawonogów i odniosły wielki sukces. Niestety wyginęły w permie. Na szczęście niektóre z nich zostały skamieniałe i można je zachować na pamiątkę."