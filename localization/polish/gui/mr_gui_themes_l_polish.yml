l_polish:
 theme_mr_paleontology: "Morgenröte: Paleontology (Earthen)"
 theme_mr_paleontology_desc: "A User Interface inspired by Paleontology, Fossils and Dinosaur Bones."
 mr_papermap_coprolite: "Paleontology: Coprolite"
 mr_papermap_coprolite_desc: "It seems like a Paleontologist is currently working on preparing a coprolite. You wonder what coprolite is? It is fossilized poop. In this case probably from a dinosaur."
 mr_papermap_belemnite: "Paleontologia: Belemnit"
 mr_papermap_belemnite_desc: "Kość belemnita znaleziona przez Paleontologa. Te kreatury pływały w oceanach od 358 do 66 milionów lat temu."
 mr_papermap_ammonite: "Paleontologia: Amonit"
 mr_papermap_ammonite_desc: "Jedna z najsłynniejszych kości. Miliony lat temu amonity pływały w morzach i oceanach. Teraz to ładna dekoracja na twój stół."
 mr_papermap_trilobite: "Paleontologia: Trylobit"
 mr_papermap_trilobite_desc: "Trylobity to jedne z pierwszych stawonogów, które odniosły wielki sukces. Niestety wyginęły w permie. Na szczęście część z nich uległy skamienieniu i  możesz je teraz trzymać na swoim stole jako suwenir."
 mr_papermap_battenberg_cake: "Culinary: Battenberg Cake"
 mr_papermap_battenberg_cake_desc: "Are you hungry? Maybe you should put this delicious cake on your table. It is a sponge cake covered in marzipan and named after Prince Louis of Battenberg."
 mr_papermap_old_fashioned: "Culinary: Old Fashioned"
 mr_papermap_old_fashioned_desc: "What could be better than a good Old Fashioned at the end of a long day? Surely your barkeeper will get you into a happy mood with this cocktail!"
 mr_papermap_cucumber_ice_cream: "Culinary: Cucumber Ice Cream"
 mr_papermap_cucumber_ice_cream_desc: "The sun is shining from the sky, it's a hot sunny day. What could be better than a wonderfully refreshing cucumber ice cream?"
 mr_papermap_croissant_hot_chocolate: "Culinary: Croissant and Hot Chocolate"
 mr_papermap_croissant_hot_chocolate_desc: "A croissant and a hot chocolate in the morning is the best way to start the day. No matter what awaits you."