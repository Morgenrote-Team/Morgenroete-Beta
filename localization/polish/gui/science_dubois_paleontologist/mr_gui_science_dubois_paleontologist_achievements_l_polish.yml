 dubois_paleontologist_no_paleontologist_loc: "Osiągnięcia #V tego [concept_dubois_paleontologist]#! będą wyświetlane tutaj, gdy tylko je zdobędziesz." #deepl:2334446280
 dubois_paleontologist_achievements_intro_loc: "#V Osiągnięcia tego paleontologa#!\n[Scope.GetCharacter.GetFullNameNoFormatting] to [Scope.GetCharacter.GetCustom('dubois_paleontologist_experience_level_type')], który zebrał łącznie [Scope.Var('dubois_paleontologist_total_fossils_var').GetValue|0+] [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] i [Scope.Var('dubois_dinosaur_bone_total_paleontologist_var').GetValue|0+] [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] ." #deepl:39291484

 dubois_paleontologist_achievement_opened_first_paleontological_museum_loc: "\Na stronie[Scope.GetCharacter.GetSheHe|U] założył #V pierwsze na świecie Muzeum Paleontologiczne#!, wystawiające różne skamieniałości." #deepl:2735413684
 dubois_paleontologist_achievement_attended_extinction_congress_loc: "Dr [Scope.GetCharacter.GetLastNameNoFormatting] uczestniczył w kongresie, który próbował ustalić, w jaki sposób wyginęły dinozaury." #deepl:3929204720
 dubois_paleontologist_achievement_fossil_amber_loc: "\n[Scope.GetCharacter.GetSheHe|U] znalazł unikalny kawałek #V bursztynu#!, w którym zamknięty był mały komar. Może jest w nim nawet trochę krwi dinozaura?" #deepl:1354321492
 dubois_paleontologist_achievement_fossil_ammonite_loc: "\Profesor [Scope.GetCharacter.GetLastNameNoFormatting] znalazł amonit #V #! , który pomoże w chronologicznym ograniczeniu osadów morskich." #deepl:2717312690
 dubois_paleontologist_achievement_fossil_archaeopteryx_loc: "\Wielu uważa odkrycie dr [Scope.GetCharacter.GetLastNameNoFormatting] za pierwszego ptaka. Rzeczywiście, #V Archaeopteryx#! wydaje się być brakującym ogniwem między dinozaurami a ptakami." #deepl:3644254959
 dubois_paleontologist_achievement_fossil_composita_loc: "\n#V Compositas#! to muszle, które żyły miliony lat temu na prawie każdym kontynencie. Profesor [Scope.GetCharacter.GetLastNameNoFormatting] znalazł jedną z nich podczas jednego z wykopalisk [Scope.GetCharacter.GetHerHis]." #deepl:1938126946
 dubois_paleontologist_achievement_fossil_eusthenopteron_loc: "\Co ciekawe, Eusthenopteron #V #! znaleziony przez [Scope.GetCharacter.GetSheHe] ma już wyraźną kość ramienną, łokciową i promieniową w płetwie przedniej. Kości te są obecne u wszystkich żyjących na lądzie kręgowców." #deepl:1906215431
 dubois_paleontologist_achievement_fossil_ichthyosaurus_loc: "\n#V Ichthyosaura#!, z których dr [Scope.GetCharacter.GetLastNameNoFormatting] znalazł jednego, jest bardzo unikalnym gadem. Przypomina delfiny i nie składa jaj, ale rodzi żywe młode, co jest bardzo rzadkie u gadów." #deepl:1058896905
 dubois_paleontologist_chievement_fossil_ichthyostega_loc: "\Wraz z odkryciem #V Ichthyostega#!, profesor [Scope.GetCharacter.GetLastNameNoFormatting] odkrył jedno z najwcześniej żyjących zwierząt lądowych. Jest to brakujące ogniwo między rybami a czworonożnymi tetrapodomorfami." #deepl:178680301
 dubois_paleontologist_achievement_fossil_megatherium_loc: "\Leniwce są dziś małe, ale w przeszłości istniały ogromne, jak pokazało jedno z odkryć dr [Scope.GetCharacter.GetLastNameNoFormatting]. Megatherium #V #! miał do 6 metrów (20 stóp) długości." #deepl:2625011393
 dubois_paleontologist_achievement_fossil_pterodactylus_loc: "\Na stronie[Scope.GetCharacter.GetSheHe|U] odkryto skamieniałość #V Pterodactylus#!, skrzydlatego dinozaura, który prawdopodobnie żył w pobliżu jezior i rzek." #deepl:1358755979
 dubois_paleontologist_achievement_fossil_smilodon_loc: "\ #V Smilodon#! to przerażający drapieżnik, który żył jeszcze kilka tysięcy lat temu. Profesor [Scope.GetCharacter.GetLastNameNoFormatting] znalazł bardzo dobrze zachowany szkielet jednego z nich." #deepl:209509221
 dubois_paleontologist_achievement_fossil_trilobite_loc: "\Jednym z mniejszych odkryć [Scope.GetCharacter.GetHerHis] są różne trylobity T#V #! . Choć nie są one spektakularne, są świetnymi skamieniałościami wskaźnikowymi." #deepl:623281739
 dubois_paleontologist_achievement_fossil_haast_eagle_loc: "\W Nowej Zelandii dr [Scope.GetCharacter.GetLastNameNoFormatting] dokonał fascynującego odkrycia, gdy [Scope.GetCharacter.GetSheHe] znalazł gigantycznego orła, obecnie nazywanego #V Haast Eagle#!." #deepl:758643186
 dubois_paleontologist_achievement_perfect_ankylosaurus_loc: "\Profesor [Scope.GetCharacter.GetLastNameNoFormatting] zrekonstruował #V Ankylosaurus#! w doskonały sposób. Inni paleontolodzy są zachwyceni rekonstrukcją." #deepl:2799229951
 dubois_paleontologist_achievement_imperfect_ankylosaurus_loc: "\Profesor [Scope.GetCharacter.GetLastNameNoFormatting] zrekonstruował #V Ankylosaurus#!, ale w niedoskonały sposób." #deepl:3408874547
 dubois_paleontologist_achievement_poor_ankylosaurus_loc: "\Profesor [Scope.GetCharacter.GetLastNameNoFormatting] zrekonstruował #V Ankylosaurus#!, ale była to okropna próba i została wyśmiana przez innych paleontologów." #deepl:2085395454
 dubois_paleontologist_achievement_perfect_diplodocus_loc: "\Rekonstrukcja[Scope.GetCharacter.GetHerHis|U] #V  Diplodocus#! jest absolutnie doskonała i jest przedmiotem zazdrości każdego muzeum paleontologicznego." #deepl:3626804845
 dubois_paleontologist_achievement_imperfect_diplodocus_loc: "\Rekonstrukcja[Scope.GetCharacter.GetHerHis|U] #V  Diplodocus#! jest wystarczająco dobra." #deepl:412034719
 dubois_paleontologist_achievement_poor_diplodocus_loc: "[Scope.GetCharacter.GetHerHis|U] rekonstrukcja #V Diplodocus#! jest katastrofalna i postrzegana jako obrzydliwość." #deepl:3022704965
 dubois_paleontologist_achievement_perfect_triceratop_loc: "#V \Doskonałość rekonstrukcji Triceratops#! dr [Scope.GetCharacter.GetLastNameNoFormatting] jest powszechnie znana i podniosła prestiż naszej kolekcji paleontologicznej." #deepl:2010941711
 dubois_paleontologist_achievement_imperfect_triceratop_loc: "#V \Przeciętność rekonstrukcji Triceratops#! dr [Scope.GetCharacter.GetLastNameNoFormatting] jest wystarczająco dobra dla naszego muzeum, ale nie jest niczym wyjątkowym." #deepl:996647347
 dubois_paleontologist_achievement_poor_triceratop_loc: "Terror dr [Scope.GetCharacter.GetLastNameNoFormatting]'s #V Triceratops#! rekonstrukcja jest wstydem dla naszej kolekcji." #deepl:1193371056
 dubois_paleontologist_achievement_perfect_tyrannosaurus_loc: "\A #V Tyrannosaurus Rex#! to wspaniały widok. Zwłaszcza ten, który profesor [Scope.GetCharacter.GetLastNameNoFormatting] doskonale zmontował." #deepl:2375174801
 dubois_paleontologist_achievement_imperfect_tyrannosaurus_loc: "\A #V Tyrannosaurus Rex#! to wspaniały widok. Nawet jeśli nie jest idealnie złożony, jak ten zrekonstruowany przez profesora [Scope.GetCharacter.GetLastNameNoFormatting]." #deepl:2816655238
 dubois_paleontologist_achievement_poor_tyrannosaurus_loc: "\A #V Tyrannosaurus Rex#! to wspaniały widok. Ale nie ten, który zmontował profesor [Scope.GetCharacter.GetLastNameNoFormatting]. Ten jest po prostu absurdalnym monstrum." #deepl:2924846018
 dubois_paleontologist_achievement_perfect_stegosaurus_loc: "\Potężny szkielet #V Stegosaurus#! zmontowany przez [Scope.GetCharacter.GetSheHe] jest idealnym elementem naszej wystawy dinozaurów." #deepl:1011030116
 dubois_paleontologist_achievement_imperfect_stegosaurus_loc: "\Szkielet #V Stegosaurus#! zmontowany przez [Scope.GetCharacter.GetSheHe] jest dobrym elementem naszej wystawy dinozaurów." #deepl:3364926958
 dubois_paleontologist_achievement_poor_stegosaurus_loc: "\Przerażający szkielet #V Stegosaurus#!, który [Scope.GetCharacter.GetSheHe] zmontował, jest marnotrawstwem miejsca na naszej wystawie dinozaurów." #deepl:1841850726
 dubois_paleontologist_achievement_perfect_antarctosaurus_loc: "\Nie każdy potrafi złożyć #V Antarctosaurus#! tak perfekcyjnie jak Dr. [Scope.GetCharacter.GetLastNameNoFormatting]. Jest to jedna z głównych atrakcji naszej kolekcji." #deepl:4276626573
 dubois_paleontologist_achievement_imperfect_antarctosaurus_loc: "\Złożenie #V Antarctosaurus#! to trudne zadanie, ale dr [Scope.GetCharacter.GetLastNameNoFormatting] wykonał je całkiem dobrze." #deepl:4006286419
 dubois_paleontologist_achievement_poor_antarctosaurus_loc: "\Nie każdy potrafi złożyć #V Antarktozaura#!. Ale niewielu ludzi składa go tak okropnie źle jak dr [Scope.GetCharacter.GetLastNameNoFormatting]. To wstyd naszej kolekcji." #deepl:3523325515
 dubois_paleontologist_achievement_perfect_argyrosaurus_loc: "\Wspaniały szkielet #V Argyrosaurus#! w naszej kolekcji jest dziełem profesora [Scope.GetCharacter.GetLastNameNoFormatting]. Naprawdę wspaniały szkielet." #deepl:2395444631
 dubois_paleontologist_achievement_imperfect_argyrosaurus_loc: "\Szkielet #V Argyrosaurus#! w naszej kolekcji jest dziełem profesora [Scope.GetCharacter.GetLastNameNoFormatting]. Całkiem dobrze wykonany szkielet." #deepl:2170414433
 dubois_paleontologist_achievement_poor_argyrosaurus_loc: "\Potworny szkielet #V Argyrosaurus#! w naszej kolekcji jest dziełem profesora [Scope.GetCharacter.GetLastNameNoFormatting]. To oczywiście dzieło nieudolnego paleontologa." #deepl:2917340443
 dubois_paleontologist_achievement_perfect_iguanodon_loc: "\n[Scope.GetCharacter.GetSheHe|U] doskonale zmontował szkielet #V Iguanodon#!." #deepl:3595520963
 dubois_paleontologist_achievement_imperfect_iguanodon_loc: "\n[Scope.GetCharacter.GetSheHe|U] zmontował szkielet #V Iguanodon#!." #deepl:948446383
 dubois_paleontologist_achievement_poor_iguanodon_loc: "\n[Scope.GetCharacter.GetSheHe|U] zmontował #V Iguanodon#! szkielet okropnie źle." #deepl:60351557
 dubois_paleontologist_achievement_perfect_plateosaurus_loc: "\Dr [Scope.GetCharacter.GetLastNameNoFormatting] był w stanie doskonale zrekonstruować szkielet #V Plateosaurus#!. Wspaniały eksponat do naszej kolekcji." #deepl:3288975063
 dubois_paleontologist_achievement_imperfect_plateosaurus_loc: "\Dr [Scope.GetCharacter.GetLastNameNoFormatting] był w stanie zrekonstruować szkielet #V Plateosaurus#!." #deepl:3540574047
 dubois_paleontologist_achievement_poor_plateosaurus_loc: "\Dr [Scope.GetCharacter.GetLastNameNoFormatting] był w stanie zrekonstruować szkielet #V Plateosaurus#!. Wygląda on jednak bardzo dziwnie i jest zdeformowany." #deepl:4210803243
 dubois_paleontologist_achievement_perfect_giraffatitan_loc: "\Rekonstrukcja #V Giraffatitan#! to ciężka praca i wymaga dużo miejsca. Na szczęście profesor [Scope.GetCharacter.GetLastNameNoFormatting] był w stanie wykorzystać wielkość naszego muzeum do przygotowania wspaniałego szkieletu dinozaura." #deepl:1815044749
 dubois_paleontologist_achievement_imperfect_giraffatitan_loc: "\Rekonstrukcja #V Giraffatitan#! to ciężka praca i wymaga dużo miejsca. Na szczęście profesor [Scope.GetCharacter.GetLastNameNoFormatting] był w stanie wykorzystać wielkość naszego muzeum do przygotowania szkieletu dinozaura." #deepl:3585680135
 dubois_paleontologist_achievement_poor_giraffatitan_loc: "\Rekonstrukcja #V Giraffatitan#! to ciężka praca i wymaga dużo miejsca. Mimo że [Scope.GetCharacter.GetSheHe] ma do dyspozycji całe muzeum, profesor [Scope.GetCharacter.GetLastNameNoFormatting] był w stanie stworzyć tylko absurdalną wersję dinozaura" #deepl:2737374971
 dubois_paleontologist_achievement_perfect_spinosaurus_loc: "\Przerażający szkielet #V Spinosaurus#! w naszej kolekcji został złożony przez dr [Scope.GetCharacter.GetLastNameNoFormatting] i jest dziełem sztuki." #deepl:493475787
 dubois_paleontologist_achievement_imperfect_spinosaurus_loc: "\Przerażający szkielet #V Spinosaurus#! w naszej kolekcji został złożony przez dr [Scope.GetCharacter.GetLastNameNoFormatting]." #deepl:1960639131
 dubois_paleontologist_achievement_poor_spinosaurus_loc: "\Zabawny szkielet #V Spinosaurus#! w naszej kolekcji został złożony przez dr [Scope.GetCharacter.GetLastNameNoFormatting]. Jest źle zrobiony i wygląda bardziej jak kurczak niż dinozaur." #deepl:308117810
 dubois_paleontologist_achievement_perfect_psittacosaurus_loc: "\Z paszczą przypominającą dziób, Psittacosaurus #V #! , który profesor [Scope.GetCharacter.GetLastNameNoFormatting] złożył, był niezwykłym szkieletem." #deepl:3089964090
 dubois_paleontologist_achievement_imperfect_psittacosaurus_loc: "\Z paszczą przypominającą dziób, Psittacosaurus #V #! , który profesor [Scope.GetCharacter.GetLastNameNoFormatting] złożył, był ładnym szkieletem." #deepl:1049217798
 dubois_paleontologist_achievement_poor_psittacosaurus_loc: "\Czy #V Psittacosaurus#! naprawdę miał dziwny dziób na grzbiecie i tułów zamiast pyska? Przynajmniej profesor [Scope.GetCharacter.GetLastNameNoFormatting] tak uważa, ale może być jedyny." #deepl:4134331305
 dubois_paleontologist_achievement_perfect_velociraptor_loc: "\Przerażający #V Velociraptor#! to jedno z arcydzieł doktora [Scope.GetCharacter.GetLastNameNoFormatting]. Jest doskonale zmontowany." #deepl:2793253329
 dubois_paleontologist_achievement_imperfect_velociraptor_loc: "\Przerażający #V Velociraptor#! to dobra robota dr [Scope.GetCharacter.GetLastNameNoFormatting]. [Scope.GetCharacter.GetSheHe] zmontował go całkiem nieźle." #deepl:4153443130
 dubois_paleontologist_achievement_poor_velociraptor_loc: "\Przerażający #V Velociraptor#! to jedno z najgorszych dzieł doktora [Scope.GetCharacter.GetLastNameNoFormatting]. Po pierwsze, jest zdecydowanie za mały, po drugie, na pewno nie miał 10 pazurów jako korony..." #deepl:3768344000
 dubois_paleontologist_achievement_perfect_muttaburrasaurus_loc: "\Muttaburrasaurus #V #! zrekonstruowany przez profesora [Scope.GetCharacter.GetLastNameNoFormatting] był imponujący nie tylko ze względu na swoje rozmiary." #deepl:877060609
 dubois_paleontologist_achievement_imperfect_muttaburrasaurus_loc: "\Muttaburrasaurus #V #! zrekonstruowany przez profesora [Scope.GetCharacter.GetLastNameNoFormatting] był imponujący, głównie ze względu na swoje rozmiary." #deepl:2230628960
 dubois_paleontologist_achievement_poor_muttaburrasaurus_loc: "\Muttaburrasaurus #V #! zrekonstruowany przez profesora [Scope.GetCharacter.GetLastNameNoFormatting] był okropny. Po pierwsze, każdy inny paleontolog zauważył, że głowa nie jest połączona z ogonem, a kolana wyginają się w drugą stronę." #deepl:1428907282
 dubois_paleontologist_achievement_perfect_rhoetosaurus_loc: "\Rozmiar #V Rhoetosaurus#! jest imponujący. Ale bez umiejętności dr [Scope.GetCharacter.GetLastNameNoFormatting] z pewnością nie byłby tak imponujący." #deepl:2002445198
 dubois_paleontologist_achievement_imperfect_rhoetosaurus_loc: "\Rozmiar #V Rhoetosaurus#! jest imponujący. Ale bez umiejętności dr [Scope.GetCharacter.GetLastNameNoFormatting] z pewnością byłby mniej imponujący"." #deepl:2197585922
 dubois_paleontologist_achievement_poor_rhoetosaurus_loc: "\Myślenie, że ogon należy do grzbietu #V Rhoetosaurus#! było prawdopodobnie najgłupszym pomysłem doktora [Scope.GetCharacter.GetLastNameNoFormatting]. Przynajmniej jeszcze..." #deepl:2580418601
 dubois_paleontologist_achievement_perfect_mosasaurus_loc: "\ #o Msasaurus#! zrekonstruowany przez profesora [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] to gigantyczny potwór z morza." #deepl:4291663506
 dubois_paleontologist_achievement_imperfect_mosasaurus_loc: "\Na stronie #o Mosasaurus#! profesor [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] zrekonstruował wielkiego potwora z morza." #deepl:2251013384
 dubois_paleontologist_achievement_poor_mosasaurus_loc: "\Mosasaurus #o #! zrekonstruowany przez profesora [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] był okropny. Jest całkiem pewne, że Mosasaurus żył w oceanie, ale w jakiś sposób szkielet skończył z nogami." #deepl:2727769146
 dubois_paleontologist_achievement_perfect_plesiosaurus_loc: "\Plesiosaurus #o #! zrekonstruowany przez profesora [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] to ogromny gad morski." #deepl:1469085529
 dubois_paleontologist_achievement_imperfect_plesiosaurus_loc: "\ #o Plesiosaurus#! zrekonstruowany przez profesora [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] to gad morski, który żył w czasach dinozaurów." #deepl:1871243527
 dubois_paleontologist_achievement_poor_plesiosaurus_loc: "\Plesiosaurus #o #! zrekonstruowany przez profesora [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] jest nieco dziwny. Ma 4 wężopodobne kończyny, bardzo krótką głowę i brak ogona." #deepl:1919744229
 dubois_paleontologist_achievement_perfect_basilosaurus_loc: "\Zrekonstruowany przez profesora [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] #o  Basilosaurus#! to prehistoryczny wieloryb, który żył tysiące lat temu." #deepl:142765907
 dubois_paleontologist_achievement_imperfect_basilosaurus_loc: "\Zrekonstruowany przez profesora [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] #o  Basilosaurus#! to prehistoryczny wieloryb." #deepl:1354996810
 dubois_paleontologist_achievement_poor_basilosaurus_loc: "\Basilosaurus #o #! zrekonstruowany przez profesora [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] ma bardzo dziwną fizjologię. Wygląda bardziej jak piłka niż cokolwiek innego, co wydaje się dość błędne." #deepl:1206625829
 dubois_paleontologist_achievement_perfect_megalodon_loc: "\ #o Megalodon#! zrekonstruowany przez profesora [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] to gigantyczny rekin. Naprawdę imponujący szkielet." #deepl:1878769616
 dubois_paleontologist_achievement_imperfect_megalodon_loc: "\Megalodon #o #! zrekonstruowany przez profesora [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] to gigantyczny rekin." #deepl:117332675
 dubois_paleontologist_achievement_poor_megalodon_loc: "\Strona #o Megalodon#! zrekonstruowana przez profesora [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] wydaje się być trochę... nie tak. Ogromna głowa jest przymocowana do bardzo cienkiej szyi i najwyraźniej rekin miał dziwne kolce pokrywające całe jego ciało." #deepl:3797074524
