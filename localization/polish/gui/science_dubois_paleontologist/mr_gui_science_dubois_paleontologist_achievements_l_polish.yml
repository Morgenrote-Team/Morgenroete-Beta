me)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_plateosaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_plateosaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_giraffatitan_var').IsSet , Scope.Var('dubois_paleontologist_achievement_giraffatitan_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_spinosaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_spinosaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_psittacosaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_psittacosaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_velociraptor_var').IsSet , Scope.Var('dubois_paleontologist_achievement_velociraptor_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_muttaburrasaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_muttaburrasaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_rhoetosaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_rhoetosaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_mosasaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_mosasaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_plesiosaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_plesiosaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_basilosaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_basilosaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_megalodon_var').IsSet , Scope.Var('dubois_paleontologist_achievement_megalodon_var').GetFlagName)]"
 dubois_paleontologist_no_paleontologist_loc: "#V Osiągnięcia tego [concept_dubois_paleontologist]#! będą wyświetlane tutaj, gdy będziesz go mieć."
 dubois_paleontologist_achievements_intro_loc: "#V Osiągnięcia tego paleontologa#!\n #indent_newline:3 • [Scope.GetCharacter.GetFullNameNoFormatting] jest [Scope.GetCharacter.GetCustom('dubois_paleontologist_experience_level_type')], który skolekcjonował łącznie [Scope.Var('dubois_paleontologist_total_fossils_var').GetValue|0+][Concept('concept_dubois_fossil','$concept_dubois_fossils$')] oraz [Scope.Var('dubois_dinosaur_bone_total_paleontologist_var').GetValue|0+][Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')]. #!"
 dubois_paleontologist_achievement_opened_first_paleontological_museum_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] ufundował #V pierwsze muzeum paleontologiczne#! na świecie, prezentujące rozmaite skamieniałości. #!"
 dubois_paleontologist_achievement_attended_extinction_congress_loc: "Dr. [Scope.GetCharacter.GetLastNameNoFormatting] wziął udział w kongresie, którego celem było ustalenie w jaki sposób wyginęły dinozaury. #!"
 dubois_paleontologist_achievement_fossil_amber_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] znalazł wyjątkowy kawałek #V bursztynu#!, w którym zatopiony był mały komar. Może jest w nim krew dinozaura? #!"
 dubois_paleontologist_achievement_fossil_ammonite_loc: "\n #indent_newline:3 • Profesor [Scope.GetCharacter.GetLastNameNoFormatting] znalazł #V amonit#!, który pomoże w rozgraniczeniu chronologicznym osadów morskich. #!"
 dubois_paleontologist_achievement_fossil_archaeopteryx_loc: "\n #indent_newline:3 • Wielu uznaje znalezisko Dr. [Scope.GetCharacter.GetLastNameNoFormatting] za pierwszego ptaka. Zaiste, #V archeopteryks#! wydaje się być brakującym ogniwem między dinozaurami a ptakami. #!"
 dubois_paleontologist_achievement_fossil_composita_loc: "\n #indent_newline:3 • #V Kompozyty#! to muszle, które żyły miliony lat temu na prawie każdym kontynencie. Profesor [Scope.GetCharacter.GetLastNameNoFormatting] znalazł jednego, podczas jednego z [Scope.GetCharacter.GetHerHis] wykopalisk. #!"
 dubois_paleontologist_achievement_fossil_eusthenopteron_loc: "\n #indent_newline:3 • Co ciekawe, #V Eustenopteron#!, którego [Scope.GetCharacter.GetSheHe] znalazł, posiada już wyraźną kość ramieniową, łokciową i promieniową w swojej przedniej płetwie. Te kości obecne są u wszystkich kręgowców lądowych. #!"
 dubois_paleontologist_achievement_fossil_ichthyosaurus_loc: "\n #indent_newline:3 • #V Ichthyosaura#!, którą znalazł Dr. [Scope.GetCharacter.GetLastNameNoFormatting], to bardzo wyjątkowy gad. Przypomina delfiny i nie składa jaj, ale rodzi młode żywe, co jest bardzo rzadkie wśród gadów. #!"
 dubois_paleontologist_chievement_fossil_ichthyostega_loc: "\n #indent_newline:3 • Wraz z odkryciem #V Ichtiostegi#!, Profesor [Scope.GetCharacter.GetLastNameNoFormatting] odkrył jedno z najwcześniejszych zwierząt lądowych. To brakujące ogniwo pomiędzy rybami a posiadającymi kończyny tetrapodomorfami. #!"
 dubois_paleontologist_achievement_fossil_megatherium_loc: "\n #indent_newline:3 • Leniwce są dzisiaj małe, ale kiedyś były ogromne, jak pokazało jedno z odkryć Dr. [Scope.GetCharacter.GetLastNameNoFormatting]. #V Megaterium#! miał nawet 6 metrów wysokości. #!"
 dubois_paleontologist_achievement_fossil_pterodactylus_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] odkrył kości #V pterodaktyla#!, skrzydlatego dinozaura który prawdopodobnie żył w pobliżu jezior i rzek. #!"
 dubois_paleontologist_achievement_fossil_smilodon_loc: "\n #indent_newline:3 • #V Smilodon#! to straszliwy drapieżnik, który żył jeszcze kilka tysięcy lat temu. Profesor [Scope.GetCharacter.GetLastNameNoFormatting] znalazł bardzo dobrze zachowany szkielet jednego z nich. #!"
 dubois_paleontologist_achievement_fossil_trilobite_loc: "\n #indent_newline:3 • Jednym z [Scope.GetCharacter.GetHerHis] pomniejszych odkryć są rozmaite #V trylobity#!. Choć nie są spektakularne, są świetnymi skamieniałościami przewodnimi. #!"
 dubois_paleontologist_achievement_fossil_haast_eagle_loc: "\n #indent_newline:3 • W Nowej Zelandii, Dr. [Scope.GetCharacter.GetLastNameNoFormatting] dokonał fascynującego odkrycia, kiedy [Scope.GetCharacter.GetSheHe] znalazł gigantycznego orła zwanego teraz #V Orłem Haasta#!. #!"
 dubois_paleontologist_achievement_perfect_ankylosaurus_loc: "\n #indent_newline:3 • Profesor [Scope.GetCharacter.GetLastNameNoFormatting] zrekonstruował #V ankylozaura#! w perfekcyjny sposób. Inni paleontolodzy są zachwyceni rekonstrukcją. #!"
 dubois_paleontologist_achievement_imperfect_ankylosaurus_loc: "\n #indent_newline:3 • Profesor [Scope.GetCharacter.GetLastNameNoFormatting] zrekonstruował #V ankylozaura#!, ale w niepoprawny sposób. #!"
 dubois_paleontologist_achievement_poor_ankylosaurus_loc: "\n #indent_newline:3 • Profesor [Scope.GetCharacter.GetLastNameNoFormatting] zrekonstruował #V ankylozaura#!, ale była to tragiczna próba i jest wyśmiewany przez innych paleontologów. #!"
 dubois_paleontologist_achievement_perfect_diplodocus_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetHerHis|U] rekonstrukcja #V diplodoka#! jest absolutnie perfekcyjny i jest obiektem zazdrości każdego muzeum paleontologicznego. #!"
 dubois_paleontologist_achievement_imperfect_diplodocus_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetHerHis|U] rekonstrukcja #V diplodoka#! jest wystarczająco dobra. #!"
 dubois_paleontologist_achievement_poor_diplodocus_loc: "[Scope.GetCharacter.GetHerHis|U] rekonstrukcja #V diplodoka#! jest tragiczna i jest uznawana za abominację. #!"
 dubois_paleontologist_achievement_perfect_triceratop_loc: "\n #indent_newline:3 • Perfekcja rekonstrukcji #V triceratopsa#! autorstwa Dr. [Scope.GetCharacter.GetLastNameNoFormatting] jest szeroko znana i podniosła prestiż naszej kolekcji paleontologicznej. #!"
 dubois_paleontologist_achievement_imperfect_triceratop_loc: "\n #indent_newline:3 • Przeciętność rekonstrukcji #V triceratopsa#! autorstwa Dr. [Scope.GetCharacter.GetLastNameNoFormatting] jest wystarczająco dobra dla naszego muzeum, ale nie jest niczym wyjątkowym. #!"
 dubois_paleontologist_achievement_poor_triceratop_loc: "Okropność jaką jest rekonstrukcja #V triceratopsa#! autorstwa Dr. [Scope.GetCharacter.GetLastNameNoFormatting] jest hańbą dla naszej kolekcji. #!"
 dubois_paleontologist_achievement_perfect_tyrannosaurus_loc: "\n #indent_newline:3 • #V Tyranozaur Rex#! to cudowny widok. Zwłaszcza ten, którego perfekcyjnie złożył Profesor [Scope.GetCharacter.GetLastNameNoFormatting]. #!"
 dubois_paleontologist_achievement_imperfect_tyrannosaurus_loc: "\n #indent_newline:3 • #V Tyranozaur Rex#! to cudowny widok. Nawet gdy nie jest perfekcyjnie poskładany tak jak ten, który zrekonstruował Profesor [Scope.GetCharacter.GetLastNameNoFormatting]. #!"
 dubois_paleontologist_achievement_poor_tyrannosaurus_loc: "\n #indent_newline:3 • #V Tyranozaur Rex#! to cudowny widok. Ale nie ten, którego poskładał Profesor [Scope.GetCharacter.GetLastNameNoFormatting]. Ten jest po prostu absurdalną potwornością. #!"
 dubois_paleontologist_achievement_perfect_stegosaurus_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] assembled a perfect #V Stegosaurus#! skeleton for the dinosaur exhibit.#!"
 dubois_paleontologist_achievement_imperfect_stegosaurus_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] assembled a good #V Stegosaurus#! skeleton for the exhibit.#!"
 dubois_paleontologist_achievement_poor_stegosaurus_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] assembled a poorly constructed #V Stegosaurus#! skeleton.#!"
 dubois_paleontologist_achievement_perfect_antarctosaurus_loc: "\n #indent_newline:3 • Nie wszyscy potrafią poskładać #V antarktozaura#! tak perfekcyjnie jak Dr. [Scope.GetCharacter.GetLastNameNoFormatting]. To jeden z najjaśniejszych punktów naszej kolekcji. #!"
 dubois_paleontologist_achievement_imperfect_antarctosaurus_loc: "\n #indent_newline:3 • Poskładanie #V antarktozaura#! to ciężkie zadanie, ale Dr. [Scope.GetCharacter.GetLastNameNoFormatting] poradził sobie z nim całkiem dobrze. #!"
 dubois_paleontologist_achievement_poor_antarctosaurus_loc: "\n #indent_newline:3 • Nie wszyscy potrafią poskładać #V antarktozaura#!. Ale niewielu ludzi potrafi poskładać go tak okropnie źle jak Dr. [Scope.GetCharacter.GetLastNameNoFormatting]. To hańba dla naszej kolekcji. #!"
 dubois_paleontologist_achievement_perfect_argyrosaurus_loc: "\n #indent_newline:3 • Cudowny szkielet #V argyrozaura#! w naszej kolekcji to dzieło Profesora [Scope.GetCharacter.GetLastNameNoFormatting]. Naprawdę cudowny szkielet. #!"
 dubois_paleontologist_achievement_imperfect_argyrosaurus_loc: "\n #indent_newline:3 • Szkielet #V argyrozaura#! w naszej kolekcji to dzieło Profesora [Scope.GetCharacter.GetLastNameNoFormatting]. Całkiem dobrze wykonany szkielet. #!"
 dubois_paleontologist_achievement_poor_argyrosaurus_loc: "\n #indent_newline:3 • Potworny szkielet #V argyrozaura#! w naszej kolekcji to praca Profesora [Scope.GetCharacter.GetLastNameNoFormatting]. To oczywiście dzieło niezdarnego paleontologa. #!"
 dubois_paleontologist_achievement_perfect_iguanodon_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] poskładał perfekcyjnie szkielet #V iguanodona#!. #!"
 dubois_paleontologist_achievement_imperfect_iguanodon_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] poskładał szkielet #V iguanodona#! #!."
 dubois_paleontologist_achievement_poor_iguanodon_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] poskładał szkielet #V iguanodona#! przerażająco źle. #!"
 dubois_paleontologist_achievement_perfect_plateosaurus_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] zdołał perfekcyjnie zrekonstruować szkielet #V plateozaura#!. Wspaniały dodatek do naszej kolekcji. #!"
 dubois_paleontologist_achievement_imperfect_plateosaurus_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] zdołał zrekonstruować szkielet #V plateozaura#!. #!"
 dubois_paleontologist_achievement_poor_plateosaurus_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] zdołał zrekonstruować szkielet #V plateozaura#!. Ale wygląda on bardzo dziwnie i zdeformowanie. #!"
 dubois_paleontologist_achievement_perfect_giraffatitan_loc: "\n #indent_newline:3 • Zrekonstruowanie #V giraffatitana#! to ciężka praca, wymagająca dużo miejsca. Na szczęście Profesor [Scope.GetCharacter.GetLastNameNoFormatting] zdołał wykorzystać rozmiar naszego muzeum by przygotować wspaniały szkielet dinozaura. #!"
 dubois_paleontologist_achievement_imperfect_giraffatitan_loc: "\n #indent_newline:3 • Zrekonstruowanie #V giraffatitana#! to ciężka praca, wymagająca dużo miejsca. Na szczęście Profesor [Scope.GetCharacter.GetLastNameNoFormatting] zdołał wykorzystać rozmiar naszego muzeum by przygotować szkielet dinozaura. #!"
 dubois_paleontologist_achievement_poor_giraffatitan_loc: "\n #indent_newline:3 • Zrekonstruowanie #V giraffatitana#! to ciężka praca, wymagająca dużo miejsca. Pomimo tego, że [Scope.GetCharacter.GetSheHe] miał całe muzeum do pracy, Profesor [Scope.GetCharacter.GetLastNameNoFormatting] zdołał stworzyć tylko absurdalną wersję dinozaura. #!"
 dubois_paleontologist_achievement_perfect_spinosaurus_loc: "\n #indent_newline:3 • Straszliwy szkielet #V spinozaura#! w naszej kolekcji został złożony przez Dr. [Scope.GetCharacter.GetLastNameNoFormatting] i jest dziełem sztuki. #!"
 dubois_paleontologist_achievement_imperfect_spinosaurus_loc: "\n #indent_newline:3 • Straszliwy szkielet #V spinozaura#! w naszej kolekcji został złożony przez Dr. [Scope.GetCharacter.GetLastNameNoFormatting]. #!"
 dubois_paleontologist_achievement_poor_spinosaurus_loc: "\n #indent_newline:3 • Zabawny szkielet #V spinozaura#! w naszej kolekcji został złożony przez Dr. [Scope.GetCharacter.GetLastNameNoFormatting]. Jest źle wykonany i przypomina raczej kurczaka niż dinozaura. #!"
 dubois_paleontologist_achievement_perfect_psittacosaurus_loc: "\n #indent_newline:3 • Z ustami przypominającymi dziób, #V psitakozaur#! którego poskładał Profesor [Scope.GetCharacter.GetLastNameNoFormatting], był niezwykłym szkieletem. #!"
 dubois_paleontologist_achievement_imperfect_psittacosaurus_loc: "\n #indent_newline:3 • Z ustami przypominającymi dziób, #V psitakozaur#! którego poskładał Profesor [Scope.GetCharacter.GetLastNameNoFormatting], był niezłym szkieletem. #!"
 dubois_paleontologist_achievement_poor_psittacosaurus_loc: "\n #indent_newline:3 • Czy #V psitakozaur#! naprawdę miał dziwny dziób na plecach i trąbę zamiast ust? Tak sądzi profesor [Scope.GetCharacter.GetLastNameNoFormatting], ale może być jedynym, co tak uważa. #!"
 dubois_paleontologist_achievement_perfect_velociraptor_loc: "\n #indent_newline:3 • Straszliwy #V welociraptor#! to jedno z arcydzieł Dr. [Scope.GetCharacter.GetLastNameNoFormatting]. Jest perfekcyjnie złożony. #!"
 dubois_paleontologist_achievement_imperfect_velociraptor_loc: "\n #indent_newline:3 • Straszliwy #V welociraptor#! jest dobrym dziełem Dr. [Scope.GetCharacter.GetLastNameNoFormatting]. [Scope.GetCharacter.GetSheHe] poskładał go całkiem dobrze. #!"
 dubois_paleontologist_achievement_poor_velociraptor_loc: "\n #indent_newline:3 • Straszliwy #V welociraptor#! to jedna z najgorszych prac Dr. [Scope.GetCharacter.GetLastNameNoFormatting]. Po pierwsze, jest o wiele za mały, po drugie, z całą pewnością nie miał 10 pazurów jako korony... #!"
 dubois_paleontologist_achievement_perfect_muttaburrasaurus_loc: "\n #indent_newline:3 • #V Mutaburazaur#!, którego zrekonstruował Profesor [Scope.GetCharacter.GetLastNameNoFormatting], był całkiem imponujący, nie tylko ze względu na swój rozmiar. #!"
 dubois_paleontologist_achievement_imperfect_muttaburrasaurus_loc: "\n #indent_newline:3 • #V Mutaburazaur#!, którego zrekonstruował Profesor [Scope.GetCharacter.GetLastNameNoFormatting] był całkiem imponujący, głównie przez jego rozmiar. #!"
 dubois_paleontologist_achievement_poor_muttaburrasaurus_loc: "\n #indent_newline:3 • #V Mutaburazaur#!, którego zrekonstruował Profesor [Scope.GetCharacter.GetLastNameNoFormatting] był tragiczny. Po pierwsze, każdy inny paleontolog zauważył, że głowa nie jest połączona z ogonem, a kolana uginają się w drugą stronę. #!"
 dubois_paleontologist_achievement_perfect_rhoetosaurus_loc: "\n #indent_newline:3 • Rozmiar #V retozaura#! jest imponujący. Ale bez umiejętności Dr. [Scope.GetCharacter.GetLastNameNoFormatting], z pewnością nie byłby aż tak imponujący. #!"
 dubois_paleontologist_achievement_imperfect_rhoetosaurus_loc: "\n #indent_newline:3 • Rozmiar #V retozaura#! jest imponujący. Ale bez umiejętności Dr. [Scope.GetCharacter.GetLastNameNoFormatting], z pewnością byłby mniej imponujący. #!"
 dubois_paleontologist_achievement_poor_rhoetosaurus_loc: "\n #indent_newline:3 • Pomysł, że ogon #V retozaura#! znajduje się na jego grzbiecie był prawdopodobnie najgłupszą koncepcją Dr. [Scope.GetCharacter.GetLastNameNoFormatting]. Przynajmniej na razie... #!"
 dubois_paleontologist_achievement_perfect_mosasaurus_loc: "\n #indent_newline:3 • #o Mozazaur#!, którego Profesor [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] zrekonstruował, to gigantyczny potwór z morza. #!"
 dubois_paleontologist_achievement_imperfect_mosasaurus_loc: "\n #indent_newline:3 • #o Mozazaur#!, którego Profesor [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] zrekonstruował to wielki potwór z morza. #!"
 dubois_paleontologist_achievement_poor_mosasaurus_loc: "\n #indent_newline:3 • #o Mozazaur#!, którego Profesor [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] zrekonstruował, był okropny. To całkiem jasne że mozazaur żył w oceanie, ale z jakiegoś powodu szkielet skończył z nogami. #!"
 dubois_paleontologist_achievement_perfect_plesiosaurus_loc: "\n #indent_newline:3 • #o Plezjozaur#! zrekonstruowany przez Profesora [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] to duży morski gad. #!"
 dubois_paleontologist_achievement_imperfect_plesiosaurus_loc: "\n #indent_newline:3 • #o Plezjozaur#! zrekonstruowany przez Profesora [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] to morski gad, który żył w czasach dinozaurów. #!"
 dubois_paleontologist_achievement_poor_plesiosaurus_loc: "\n #indent_newline:3 • #o Plezjozaur#! zrekonstruowany przez Profesora [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] jest nieco dziwny. Ma 4 wężopodobne kończyny, bardzo krótką głowę i nie ma ogona. #!"
 dubois_paleontologist_achievement_perfect_basilosaurus_loc: "\n #indent_newline:3 • #o Bazylozaur#! zrekonstruowany przez Profesora [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] to prehistoryczny waleń żyjący milenia temu. #!"
 dubois_paleontologist_achievement_imperfect_basilosaurus_loc: "\n #indent_newline:3 • #o Bazylozaur#! zrekonstruowany przez Profesora [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] to prehistoryczny waleń. #!"
 dubois_paleontologist_achievement_poor_basilosaurus_loc: "\n #indent_newline:3 • #o Bazylozaur#! zrekonstruowany przez Profesora [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] ma bardzo dziwną fizjologię. Wygląda bardziej jak piłka niż cokolwiek innego, co wydaje się być raczej niepoprawne. #!"
 dubois_paleontologist_achievement_perfect_megalodon_loc: "\n #indent_newline:3 • #o Megalodon#! zrekonstruowany przez Profesora [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] to gigantyczny rekin. Naprawdę imponujący szkielet. #!"
 dubois_paleontologist_achievement_imperfect_megalodon_loc: "\n #indent_newline:3 • #o Megalodon#! zrekonstruowany przez Profesora [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] to gigantyczny rekin. #!"
 dubois_paleontologist_achievement_poor_megalodon_loc: "\n #indent_newline:3 • #o Megalodon#! zrekonstruowany przez Profesora [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] wygląda nieco... Dziwnie. Duża głowa jest osadzona na bardzo cienkiej szyi, poza tym najwidoczniej rekin miał dziwne kolce pokrywające całe jego ciało. #!"