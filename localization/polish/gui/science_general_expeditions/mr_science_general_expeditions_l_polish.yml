l_polish:
 MR_TRANSATLANTIC_CABLE_EXPEDITION_TT: "#T Kabel transatlantycki #! \n Wiktoriańska nauka odkryła cud telegrafii, umożliwiając przekazywanie informacji na ogromne odległości z niespotykaną dotąd prędkością. Dzięki utworzeniu stacji telegraficznych po obu stronach Atlantyku pojawiła się wizja położenia kabla podmorskiego — przedsięwzięcia wymagającego zaawansowanej inżynierii i prężnego sektora informacyjnego, gotowego zainwestować w tę ambitną inicjatywę.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_SUEZ_INDIA_CABLE_EXPEDITION_BUTTON_TT: "#T Kabel Suez-Indie#!\n Otwarcie Kanału Sueskiego, będącego triumfem wiktoriańskiej pomysłowości, wzmogło dążenia do połączenia Europy i Indii bezpośrednim kablem podmorskim. Takie połączenie zrewolucjonizowałoby komunikację, łącząc kontynenty dzięki sile postępu naukowego.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_TRANSPACIFIC_CABLE_EXPEDITION_BUTTON: "Kabel Transpacyficzny"
 MR_TRANSPACIFIC_CABLE_EXPEDITION_BUTTON_TT: "#T Kabel Transpacyficzny#!\n Wraz z rozkwitem statków parowych i szlaków handlowych, nauka w epoce wiktoriańskiej zachęca do położenia kabla podmorskiego przez Pacyfik. Ten skok technologiczny skróciłby czas korespondencji z miesięcy do zaledwie kilku minut, rozszerzając wpływ i koordynację na największym oceanie świata.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_TRANSATLANTIC_CABLE_HAS_TELEGRAPH_COMPANY_TRIGGER_TT: "#default_text [GetPlayer.GetName] posiada [concept_company] $mr_basic_telegraphy$.#!"
 MR_TRANSATLANTIC_CABLE_EXPEDITION_BUTTON_NO_TRANSATLANTIC_RADIO_TRIGGER_TT: "#default_text #V Nikt#! jeszcze nie wysłał #V wiadomości radiowej przez Atlantyk#!.#!"
 MR_SUEZ_INDIA_CABLE_CANAL_TRIGGER_TT: "#default_text Istnieje [GetBuildingType('building_suez_canal').GetName].#!"
 MR_TRANSATLANTIC_CABLE_INVESTMENT_POOL_TRIGGER_TT: "#default_text [GetPlayer.GetName] posiada [concept_investment_pool] warte co najmniej #V 5 milionów#!.#!"
 MR_SUEZ_INDIA_CABLE_INVESTMENT_POOL_TRIGGER_TT: "#default_text [GetPlayer.GetName] posiada [concept_investment_pool] warte co najmniej #V 10 milionów#!.#!"
 MR_TRANSPACIFIC_CABLE_INVESTMENT_POOL_TRIGGER_TT: "#default_text [GetPlayer.GetName] posiada [concept_investment_pool] warte co najmniej #V 20 milionów#!.#!"
 MR_TRANSATLANTIC_CABLE_EXPEDITION_BUTTON_NO_RECENT_FAIL_TRIGGER_TT: "#default_text [GetPlayer.GetName] nie posiada modyfikatora $tesla_transatlantic_cable_expedition_failed_modifier$.#!"
 MR_SUEZ_INDIA_CABLE_EXPEDITION_BUTTON_NO_RECENT_FAIL_TRIGGER_TT: "#default_text [GetPlayer.GetName] nie posiada modyfikatora $tesla_suez_india_cable_expedition_failed_modifier$.#!"
 MR_TRANSPACIFIC_CABLE_EXPEDITION_BUTTON_NO_RECENT_FAIL_TRIGGER_TT: "#default_text [GetPlayer.GetName] nie posiada modyfikatora $tesla_transpacific_cable_expedition_failed_modifier$.#!"
 MR_ON_TRANSATLANTIC_CABLE_EXPEDITION_TT: "#T Kabel Transatlantycki#!\n#p Obecnie trwa ekspedycja mająca na celu ułożenie kabla transatlantyckiego. #! \n Wiktoriańska nauka odkryła cud telegrafii, umożliwiając przekazywanie informacji na ogromne odległości z niespotykaną dotąd prędkością. Dzięki utworzeniu stacji telegraficznych po obu stronach Atlantyku pojawiła się wizja położenia kabla podmorskiego — przedsięwzięcia wymagającego zaawansowanej inżynierii i prężnego sektora informacyjnego, gotowego zainwestować w tę ambitną inicjatywę."
 MR_ON_SUEZ_INDIA_CABLE_EXPEDITION_TT: "#T Kabel Suez-Indie#!\n#p Obecnie trwa już ekspedycja w celu położenia Kabla Suez-Indie.#!\nOtwarcie Kanału Sueskiego, będącego triumfem wiktoriańskiej pomysłowości, wzmogło dążenia do połączenia Europy i Indii bezpośrednim kablem podmorskim. Takie połączenie zrewolucjonizowałoby komunikację, łącząc kontynenty dzięki sile postępu naukowego"
 MR_ON_TRANSPACIFIC_CABLE_EXPEDITION_TT: "#T Kabel Transpacyficzny#!\n#p Obecnie trwa już ekspedycja w celu położenia Kabla Transpacyficznego.#!\nWraz z rozkwitem statków parowych i szlaków handlowych, nauka w epoce wiktoriańskiej zachęca do położenia kabla podmorskiego przez Pacyfik. Ten skok technologiczny skróciłby czas korespondencji z miesięcy do zaledwie kilku minut, rozszerzając wpływ i koordynację na największym oceanie świata."
 MR_SUEZ_INDIA_CABLE_EXPEDITION_BUTTON: "Kabel Suez-Indie"
 MR_PACIFIC_END_OF_ERA_TRIGGER_TT: "#default_text #n No#! country has researched [GetTechnology('dreadnought_tech').GetName] or [GetTechnology('destroyer').GetName]. The year is also #V before#! 1896.#!"
 MR_TRANSATLANTIC_CABLE_EXPEDITION_BUTTON_NOT_ONGOING_TRIGGER_TT: "#default_text [GetPlayer.GetName] nie posiada wpisu #V $je_tesla_transatlantic_cable$ #! w dzienniku. #!"