l_polish:
 MR_TRANSATLANTIC_CABLE_EXPEDITION_TT: "#T Kabel Transatlantycki#!\nTelegrafia umożliwia wymianę informacji z nieznaną wcześniej prędkością. Poprzez ustanowienie stacji telegraficznych po obu stronach Atlantyku, powstała by możliwość położenia podwodnego kablu telegraficznego który zbliżył by Europę i Amerykę. Jednakże wymaga to odpowiedniego wyposażenia i rozwiniętego sektora informacyjnego, który dokonał by znacznych inwestycji w celu lukratywnego wykorzystania tak drogiej inwestycji.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_SUEZ_INDIA_CABLE_EXPEDITION_BUTTON_: "Kabel Suez-Indie"
 MR_SUEZ_INDIA_CABLE_EXPEDITION_BUTTON_TT: "#T Kabel Suez-Indie#!\nWraz z otwarciem Kanału Sueskiego koncepcja położenia bezpośredniego kabla podmorskiego z Suezu do Indii stała się pilniejsza niż wcześniej. Permanentne połączenie telegraficzne znacząco przyspieszyłoby komunikację i jeszcze bardziej związało Azję z Europą.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_TRANSPACIFIC_CABLE_EXPEDITION_BUTTON: "Kabel Transpacyficzny"
 MR_TRANSPACIFIC_CABLE_EXPEDITION_BUTTON_TT: "#T Kabel Transpacyficzny#!\nWraz z wzrostem handlu transoceanicznego oraz rozwojem szlaków parowych łączących Ameryki z Azją i Oceanią, potrzeba stałego połączenia telegraficznego poprzez Pacyfik staje się coraz wyraźniejsza. Podmorski kabel zmieniłby miesiące potrzebne na komunikację w minuty, zwiększając koordynację pomimo ogromnych morskich dystansów.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_TRANSATLANTIC_CABLE_HAS_TELEGRAPH_COMPANY_TRIGGER_TT: "#default_text [GetPlayer.GetName] posiada [concept_company] $mr_basic_telegraphy$.#!"
 MR_TRANSATLANTIC_CABLE_EXPEDITION_BUTTON_NO_TRANSATLANTIC_RADIO_TRIGGER_TT: "#default_text #V Nikt#! jeszcze nie wysłał #V wiadomości radiowej przez Atlantyk#!.#!"
 MR_SUEZ_INDIA_CABLE_CANAL_TRIGGER_TT: "#default_text Istnieje [GetBuildingType('building_suez_canal').GetName].#!"
 MR_TRANSATLANTIC_CABLE_INVESTMENT_POOL_TRIGGER_TT: "#default_text [GetPlayer.GetName] posiada [concept_investment_pool] warte co najmniej #V 5 milionów#!.#!"
 MR_SUEZ_INDIA_CABLE_INVESTMENT_POOL_TRIGGER_TT: "#default_text [GetPlayer.GetName] posiada [concept_investment_pool] warte co najmniej #V 10 milionów#!.#!"
 MR_TRANSPACIFIC_CABLE_INVESTMENT_POOL_TRIGGER_TT: "#default_text [GetPlayer.GetName] posiada [concept_investment_pool] warte co najmniej #V 20 milionów#!.#!"
 MR_TRANSATLANTIC_CABLE_EXPEDITION_BUTTON_NO_RECENT_FAIL_TRIGGER_TT: "#default_text [GetPlayer.GetName] nie posiada modyfikatora $tesla_transatlantic_cable_expedition_failed_modifier$.#!"
 MR_SUEZ_INDIA_CABLE_EXPEDITION_BUTTON_NO_RECENT_FAIL_TRIGGER_TT: "#default_text [GetPlayer.GetName] nie posiada modyfikatora $tesla_suez_india_cable_expedition_failed_modifier$.#!"
 MR_TRANSPACIFIC_CABLE_EXPEDITION_BUTTON_NO_RECENT_FAIL_TRIGGER_TT: "#default_text [GetPlayer.GetName] nie posiada modyfikatora $tesla_transpacific_cable_expedition_failed_modifier$.#!"
 MR_ON_TRANSATLANTIC_CABLE_EXPEDITION_TT: "#T Kabel Transatlantycki#!\n#p Obecnie trwa już ekspedycja w celu położenia Kabla Transatlantyckiego.#!\nTelegrafia umożliwia wymianę informacji z nieznaną wcześniej prędkością. Poprzez ustanowienie stacji telegraficznych po obu stronach Atlantyku, powstała by możliwość położenia podwodnego kablu telegraficznego który zbliżył by Europę i Amerykę. Jednakże wymaga to odpowiedniego wyposażenia i rozwiniętego sektora informacyjnego, który dokonał by znacznych inwestycji w celu lukratywnego wykorzystania tak drogiej inwestycji."
 MR_ON_SUEZ_INDIA_CABLE_EXPEDITION_TT: "#T Kabel Suez-Indie#!\n#p Obecnie trwa już ekspedycja w celu położenia Kabla Suez-Indie.#!\nWraz z otwarciem Kanału Sueskiego koncepcja położenia bezpośredniego kabla podmorskiego z Suezu do Indii stała się pilniejsza niż wcześniej. Permanentne połączenie telegraficzne znacząco przyspieszyłoby komunikację i jeszcze bardziej związało Azję z Europą."
 MR_ON_TRANSPACIFIC_CABLE_EXPEDITION_TT: "#T Kabel Transpacyficzny#!\n#p Obecnie trwa już ekspedycja w celu położenia Kabla Transpacyficznego.#!\nWraz z wzrostem handlu transoceanicznego oraz rozwojem szlaków parowych łączących Ameryki z Azją i Oceanią, potrzeba stałego połączenia telegraficznego poprzez Pacyfik staje się coraz wyraźniejsza. Podmorski kabel zmieniłby miesiące potrzebne na komunikację w minuty, zwiększając koordynację pomimo ogromnych morskich dystansów."
 MR_SUEZ_INDIA_CABLE_EXPEDITION_BUTTON: "Kabel Suez-Indie"
 MR_PACIFIC_END_OF_ERA_TRIGGER_TT: "#default_text #n Żaden#! kraj nie zbadał jeszcze [GetTechnology('dreadnought').GetName] lub [GetTechnology('destroyer').GetName]. Jest także #V wcześniej#! niż rok 1896.#!"
 MR_TRANSATLANTIC_CABLE_EXPEDITION_BUTTON_NOT_ONGOING_TRIGGER_TT: "#default_text [GetPlayer.GetName] does not have the #V $je_tesla_transatlantic_cable$ Journal Entry.#!"