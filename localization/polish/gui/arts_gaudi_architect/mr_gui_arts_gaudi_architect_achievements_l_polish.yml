l_polish:
 MR_ARCHITECT_ACHIEVEMENTS_TT: "[AddLocalizationIf( Scope.IsSet , 'gaudi_architect_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'gaudi_architect_achievements_no_architect_loc')]"
 gaudi_architect_achievements_loc: "$gaudi_architect_achievements_intro_loc$[AddLocalizationIf( Scope.Var('gaudi_architecture_treatise_var').IsSet , Scope.Var('gaudi_architecture_treatise_var').GetFlagName)][AddLocalizationIf( Scope.Var('gaudi_architect_achievement_study_trip_var').IsSet , Scope.Var('gaudi_architect_achievement_study_trip_var').GetFlagName)][AddLocalizationIf( Scope.Var('gaudi_architect_achievement_urban_planning_var').IsSet , Scope.Var('gaudi_architect_achievement_urban_planning_var').GetFlagName)][AddLocalizationIf( Scope.Var('gaudi_architect_achievement_capital_expansion_var').IsSet , Scope.Var('gaudi_architect_achievement_capital_expansion_var').GetFlagName)][AddLocalizationIf( Scope.Var('gaudi_architect_achievement_art_deco_splendour_var').IsSet , Scope.Var('gaudi_architect_achievement_art_deco_splendour_var').GetFlagName)][AddLocalizationIf( Scope.Var('gaudi_architect_achievement_neoclassical_splendour_var').IsSet , Scope.Var('gaudi_architect_achievement_neoclassical_splendour_var').GetFlagName)][AddLocalizationIf( Scope.Var('gaudi_architect_achievement_bauhaus_splendour_var').IsSet , Scope.Var('gaudi_architect_achievement_bauhaus_splendour_var').GetFlagName)][AddLocalizationIf( Scope.Var('gaudi_architect_achievement_custom_monument_var').IsSet , Scope.Var('gaudi_architect_achievement_custom_monument_var').GetFlagName)]"
 gaudi_architect_achievements_no_architect_loc: "#V Osiągnięcia tego [concept_gaudi_architect]#! będą wyświetlane tutaj, gdy będziesz go mieć."
 gaudi_architect_achievements_intro_loc: "#V Osiągnięcia tego architekta#!\n[Scope.GetCharacter.GetFullName] jest [Scope.GetCharacter.GetCustom('gaudi_architect_achievement_experience_type')]. [Scope.GetCharacter.GetSheHe|U] stworzył [Scope.Var('gaudi_character_num_blueprints_var').GetValue|V0] #V projektów#! w [Scope.GetCharacter.GetHerHis] dotychczasowej karierze architektonicznej."
 gaudi_architect_achievement_study_trip_loc: "\n[Scope.GetCharacter.GetLastNameNoFormatting] #V odbył podróż naukową w zakresie architektury#!."
 gaudi_architect_achievement_urban_planning_loc: "\nDzięki [Scope.GetCharacter.GetHerHis] #V planowaniu przestrzennemu#! [Scope.GetCharacter.GetSheHe] pomógł poprawić życie w miastach."
 gaudi_architect_achievement_treatise_loc: "\n[Scope.GetCharacter.GetHerHis|U] #V traktat o architekturze#! jest uznawany za pracę standardową."
 gaudi_architect_achievement_custom_monument_loc: "\n[Scope.GetCharacter.GetLastNameNoFormatting] jest znany jako twórca projektu #V unikatowego monumentu#! - architektonicznego arcydzieła!"
 gaudi_architect_achievement_art_deco_splendour_loc: "\nJednym z najbardziej wybitnych osiągnięć [Scope.GetCharacter.GetHerHis] kariery była całkowita #V transformacja miasta w stylu Art Deco#!."
 gaudi_architect_achievement_neoclassical_splendour_loc: "\nJednym z najbardziej wybitnych osiągnięć [Scope.GetCharacter.GetHerHis] kariery była całkowita #V transformacja miasta w stylu neoklasycystycznym#!."
 gaudi_architect_achievement_bauhaus_splendour_loc: "\nJednym z najbardziej wybitnych osiągnięć [Scope.GetCharacter.GetHerHis] kariery była całkowita #V transformacja miasta w stylu Bauhaus#!."
 gaudi_architect_achievement_capital_expansion_loc: "\n[Scope.GetCharacter.GetLastNameNoFormatting] pracował niestrudzenie nad rozwojem stolicy."