l_polish:
 MR_ARCHITECT_MODERN_SPLENDOUR_BUTTON: "Splendor nowoczesności"
 MR_ARCHITECT_MODERN_SPLENDOUR_BUTTON_TT: "#T Splendor nowoczesności#!\nDzięki nowoczesnym szkołom architektonicznym możemy przekształcić naszą stolicę w realizację snu o odważnym architektonicznym eksperymencie. Za najbardziej prestiżowe uznawane jest Art Deco, ale transformacja w zgodzie z tym stylem zajmie dłużej.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ARCHITECT_ACTIVE_TRIGGER_TT: "#default_text [GetPlayer.GetName] posiada [concept_gaudi_architect], który #V nie jest zajęty#!.#!"
 MR_MODERN_ARCHITECTURE_SCHOOL_TRIGGER_TT: "#default_text [GetPlayer.GetName] posiada jeden z poniższych modyfikatorów: #V Architektura Bauhaus#!, #V Architektura Neoklasycystyczna#! lub #V Architektura Art Deco#!.#!"
 MR_ARCHITECT_BLUEPRINTS_MONUMENT_BUTTON: "Plany: Monumenty Miejskie"
 MR_ARCHITECT_BLUEPRINTS_MONUMENT_BUTTON_TT: "#T Plany: Monumenty Miejskie#!\nArchitekt może rozwijać trzy plany w kategorii \"Monumenty\": [GetBuildingType('building_gaudi_statue').GetName], [GetBuildingType('building_gaudi_fountain').GetName] oraz [GetBuildingType('building_gaudi_arch').GetName]. Niektóre plany wymagają odpowiednich technologii, a niektóre budynki mają specjalne wymagania w swoich stanach.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BLUEPRINTS_MONUMENT_TRIGGER_TT: "#default_text [GetBuildingType('building_gaudi_statue').GetName] wymaga [GetTechnology('elgar_classicism_tech').GetName].\n[GetBuildingType('building_gaudi_fountain').GetName] nie ma żadnych wymagań.\n[GetBuildingType('building_gaudi_arch').GetName] wymaga [GetTechnology('napoleonic_warfare').GetName].#!"
 MR_ARCHITECT_BLUEPRINTS_SQUARE_BUTTON: "Plany: Place Publiczne"
 MR_ARCHITECT_BLUEPRINTS_SQUARE_BUTTON_TT: "#T Plany: Place Publiczne#!\nArchitekt może rozwijać trzy plany w kategorii \"Place\": [GetBuildingType('building_gaudi_park').GetName], [GetBuildingType('building_gaudi_luna').GetName] oraz [GetBuildingType('building_gaudi_parade').GetName]. Niektóre plany wymagają odpowiednich technologii, a niektóre budynki mają specjalne wymagania w swoich stanach.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BLUEPRINTS_SQUARE_TRIGGER_TT: "#default_text [GetBuildingType('building_gaudi_park').GetName] nie ma żadnych wymagań.\n[GetBuildingType('building_gaudi_luna').GetName] wymaga [GetTechnology('curtiss_tourism_tech').GetName].\n[GetBuildingType('building_gaudi_parade').GetName] wymaga [GetTechnology('nationalism').GetName].#!"
 MR_ARCHITECT_BLUEPRINTS_SERVICE_BUTTON: "Plany: Budynki Użyteczności Publicznej"
 MR_ARCHITECT_BLUEPRINTS_SERVICE_BUTTON_TT: "#T Plany: Budynki Użyteczności Publicznej#!\nArchitekt może rozwijać trzy plany w kategorii \"Budynki Użyteczności Publicznej\": [GetBuildingType('building_gaudi_almshouse').GetName], [GetBuildingType('building_gaudi_school').GetName] oraz [GetBuildingType('building_gaudi_prison').GetName]. Niektóre plany wymagają odpowiednich technologii, a niektóre budynki mają specjalne wymagania w swoich stanach.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BLUEPRINTS_SERVICE_TRIGGER_TT: "#default_text [GetBuildingType('building_gaudi_almshouse').GetName] wymaga [GetTechnology('egalitarianism').GetName].\n[GetBuildingType('building_gaudi_school').GetName] wymaga [GetTechnology('empiricism').GetName].\n[GetBuildingType('building_gaudi_prison').GetName] wymaga [GetTechnology('law_enforcement').GetName].#!"
 MR_ARCHITECT_BLUEPRINTS_HEALTH_BUTTON: "Plany: Instytucje Zdrowotne"
 MR_ARCHITECT_BLUEPRINTS_HEALTH_BUTTON_TT: "#T Plany: Instytucje Zdrowotne#!\nArchitekt może rozwijać trzy plany w kategorii \"Zdrowotne\": [GetBuildingType('building_gaudi_canalization').GetName], [GetBuildingType('building_gaudi_hospital').GetName] oraz [GetBuildingType('building_gaudi_health').GetName]. Niektóre plany wymagają odpowiednich technologii, a niektóre budynki mają specjalne wymagania w swoich stanach.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BLUEPRINTS_HEALTH_TRIGGER_TT: "#default_text [GetBuildingType('building_gaudi_canalization').GetName] wymaga [GetTechnology('modern_sewerage').GetName].\n[GetBuildingType('building_gaudi_hospital').GetName] wymaga [GetTechnology('theiler_microbiology_tech').GetName].\n[GetBuildingType('building_gaudi_health').GetName] wymaga [GetTechnology('pharmaceuticals').GetName].#!"
 MR_ARCHITECT_BLUEPRINTS_ACADEMY_BUTTON: "Plany: Akademie Narodowe"
 MR_ARCHITECT_BLUEPRINTS_ACADEMY_BUTTON_TT: "#T Plany: Akademie Narodowe#!\nArchitekt może rozwijać trzy plany w kategorii \"Akademie\": [GetBuildingType('building_gaudi_science').GetName], [GetBuildingType('building_gaudi_arts').GetName] oraz [GetBuildingType('building_gaudi_sports').GetName]. Niektóre plany wymagają odpowiednich technologii, a niektóre budynki mają specjalne wymagania w swoich stanach.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BLUEPRINTS_ACADEMY_TRIGGER_TT: "#default_text [GetBuildingType('building_gaudi_science').GetName] wymaga [GetTechnology('dialectics').GetName].\n[GetBuildingType('building_gaudi_arts').GetName] wymaga [GetTechnology('romanticism').GetName].\n[GetBuildingType('building_gaudi_sports').GetName] wymaga [GetTechnology('vikelas_international_sports_tech').GetName].#!"
 mr_gui_has_urban_planning_tech_trigger_tt: "#default_text [GetPlayer.GetName] zbadał [GetTechnology('urban_planning').GetName].#!"
 MR_ARCHITECT_PUBLIC_CONSTRUCTION_BUTTON: "Budownictwo Publiczne"
 MR_ARCHITECT_PUBLIC_CONSTRUCTION_BUTTON_TT: "#T Budownictwo Publiczne#!\nW zgodzie ze swoim stylem architektonicznym, architekt może dokładać punkty budowy na poziomie krajowym w celu rozwoju budownictwa publicznego. Po 5 latach ciągłej pracy, jego reputacja wzrośnie.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ARCHITECT_CUSTOM_MONUMENT_BLUEPRINT_BUTTON: "Arcydzieło Architekta"
 MR_ARCHITECT_CUSTOM_MONUMENT_BLUEPRINT_BUTTON_TT: "#T Arcydzieło Architekta#!\n[concept_gaudi_great_architect] może jeden raz opracować plan unikalnego monumentu narodowego w stylu współczesnym. To dzieło życia utrwali imię architekta i da naszemu państwu jego własne architektoniczne cudo świata.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MODERN_ARCHITECT_TRIGGER_TT: "#default_text [GetPlayer.GetName] ma [concept_gaudi_architect] z [concept_character_trait] #V $gaudi_bauhaus_style$#!, #V $gaudi_neoclassical_style$#! lub #V $gaudi_art_deco_style$#!.#!"
 MR_GREAT_ARCHITECT_TRIGGER_TT: "#default_text [GetPlayer.GetName] ma [concept_gaudi_great_architect].#!"
 MR_ARCHITECT_URBAN_PLANNING_BUTTON: "Urbanistyka"
 MR_ARCHITECT_URBAN_PLANNING_BUTTON_TT: "#T Urban Planning#!\nArchitects can visit a nation's city centers and significantly improve conditions there through forward-looking planning and building regulations.\nThis will add three modifiers to your building over time: $gaudi_urban_building_throughput_add_modifier_with_tooltip$, $gaudi_urban_building_production_mult_modifier_with_tooltip$ and $gaudi_urban_building_goods_input_mult_modifier_with_tooltip$.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ARCHITECT_URBAN_PLANNING_TRIGGER_TT: "#default_text Przynajmniej jedno [GetBuildingType('building_urban_center').GetName] na poziomie 1 lub wyższym nie ma wszystkich trzech [Concept('concept_modifier','$concept_modifiers$')].#!"
 MR_ARCHITECT_STUDY_TRIP_BUTTON: "Podróż badawcza dla architekta"
 MR_ARCHITECT_STUDY_TRIP_BUTTON_TT: "#T Podróż badawcza dla architekta#!\nWyślij swojego architekta na podróż na dwa lata w celu zdobycia przez niego nowej wiedzy i umiejętności w zakresie architektury. Architekt będzie w tym czasie niedostępny.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ARCHITECT_NO_TRIP_TRIGGER_TT: "#default_text Nasz architekt #R nie odbył jeszcze#! żadnej podróży badawczej.#!"
