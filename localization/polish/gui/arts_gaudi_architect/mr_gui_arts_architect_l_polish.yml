 MR_ARCHITECT_INVITE_INDEPENDENT_ARCHITECT: "Zaproś Architekta"
 MR_ARCHITECT_INVITE_INDEPENDENT_ARCHITECT_TT: "#T Zaproś tego Architekta#!\nZaproszenie [concept_gaudi_architect] jest sposobem na zdobycie nowego architekta w sytuacji, w której twój kraj nie może zapewnić odpowiedniego architekta lub jeśli twój obecny architekt cię nie satysfakcjonuje.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).AddScope('chosen_architect', Scope.GetCharacter.MakeScope ).End)]"
