 MR_ARCHITECT_CAPITAL_EXPANSION_BUTTON: "Rozbudowa stolicy"
 MR_ARCHITECT_CAPITAL_EXPANSION_BUTTON_TT: "#T Rozbudowa stolicy#!\nNowe style architektoniczne i nowe technologie budowlane tworzą możliwość rozwinięcia naszej stolicy z sennego miasteczka w jedną z najważniejszych metropolii naszych czasów.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_HISTORICIST_ARCHITECT_TRIGGER_TT: "#default_text [GetPlayer.GetName] ma [concept_gaudi_architect] z [concept_character_trait] #V $gaudi_historicism_style$#!, #V $gaudi_bauhaus_style$#!, #V $gaudi_neoclassical_style$#! lub #V $gaudi_art_deco_style$#!.#!"
 MR_ARCHITECT_TREATISE_BUTTON: "Traktat o architekturze"
 MR_ARCHITECT_TREATISE_BUTTON_TT: "#T Traktat o architekturze#!\nRaz w swoim życiu architekt może podsumować swoje idee na temat architektury. Jego rezultaty mogą być przewyższone przez innego architekta jeśli jest on lepszy. Rezultat zależy głównie od doświadczenia. Architekt pracujący nad traktatem jest niedostępny przez rok.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ARCHITECT_NO_TREATISE_TRIGGER_TT: "#default_text Architekt #R nie#! napisał jeszcze traktatu.#!"
