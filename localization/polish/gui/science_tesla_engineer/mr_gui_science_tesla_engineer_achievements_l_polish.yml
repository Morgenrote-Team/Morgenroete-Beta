ments_finished_locomotive_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_production_methods_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_production_methods_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_mechanical_computer_project_finished_engineer_var').IsSet , Scope.Var('tesla_mechanical_computer_project_finished_engineer_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_rifles_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_rifles_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_tanks_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_tanks_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_fieldworks_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_fieldworks_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_geomagnetic_observartory_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_geomagnetic_observartory_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_telegraphy_network_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_telegraphy_network_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_radio_networ_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_radio_networ_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_airport_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_airport_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_warplane_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_warplane_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_bicycle_invented_var').IsSet , Scope.Var('tesla_engineer_achievements_bicycle_invented_var').GetFlagName)]"
 tesla_engineer_achievements_no_engineer_loc: "#V Osiągnięcia tego [concept_gaudi_engineer]#! będą wyświetlane tutaj, gdy będziesz go mieć."
 tesla_engineer_achievements_intro_loc: "#V Osiągnięcia tego inżyniera#!\n"
 tesla_engineer_achievements_invented_steel_frame_loc: "\n[Scope.GetCharacter.GetLastNameNoFormatting] zbudował pierwszy #V budynek używający ram stalowych#!. Ten sposób konstrukcji błyskawicznie zaczął być stosowany na całym świecie."
 tesla_engineer_achievements_invented_electric_telegraph_loc: "\n[Scope.GetCharacter.GetSheHe] był pierwszą osobą która #V wysłała telegram#! używając alfabetu który [Scope.GetCharacter.GetSheHe] wynalazł."
 tesla_engineer_achievements_invented_automobile_loc: "\nW [Scope.Var('tesla_engineer_achievements_invented_automobile_year_var').GetValue] [Scope.GetCharacter.GetLastNameNoFormatting] wynalazł #V samochód z silnikiem spalinowym#! i przejechał nim duży dystans. To wydarzenie zapoczątkowało dynamiczny rozwój przemysłu motoryzacyjnego."
 tesla_engineer_achievements_finished_road_project_loc: "\n[Scope.GetCharacter.GetFullName] ulepszył #V sieć dróg#!. Dzięki [Scope.GetCharacter.GetHerHis] pracy w celu zmodernizowania dróg są one teraz uznawane za najnowocześniejsze na świecie."
 tesla_engineer_achievements_finished_bridge_project_loc: "\n[Scope.GetCharacter.GetSheHe] zbudował wiele #V nowych mostów#!, skutkiem czego posiadamy lepszą infrastrukturę."
 tesla_engineer_achievements_finished_tunnel_project_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] pracował przy konstrukcji wielu #V tunelów#!, które są małymi cudami technologii."
 tesla_engineer_achievements_finished_railway_project_loc: "\n[Scope.GetCharacter.GetSheHe] masywnie #V ulepszył sieć kolejową#! dzięki zastosowaniu nowych technologii i innych ulepszeń."
 tesla_engineer_achievements_finished_construction_project_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] #V ulepszył sektor konstrukcyjny#! poprzez wprowadzenie nowoczesnych sprzętów i metod konstrukcji."
 tesla_engineer_achievements_finished_topographic_map_project_loc: "\n[Scope.GetCharacter.GetSheHe] stworzył nową #V mapę topograficzną#!, która ułatwi planowanie przyszłych konstrukcji."
 tesla_engineer_achievements_finished_locomotive_project_loc: "\n[Scope.GetCharacter.GetLastNameNoFormatting] #V rozwinął nowe lokomotywy#!, które wzmocnią nasze kolejnictwo."
 tesla_engineer_achievements_finished_production_methods_project_loc: "\n[Scope.GetCharacter.GetSheHe|U] pomógł wielu kompaniom #V ulepszyć ich produkcję#!."
 tesla_engineer_achievements_finished_rifles_project_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] #V opracował nowy karabin#!, jeden z najnowocześniejszych na świecie."
 tesla_engineer_achievements_finished_tanks_project_loc: "\n[Scope.GetCharacter.GetSheHe] jest #V pionierem produkcji i konstrukcji czołgów#!, który zmodernizował nasze czołgi."
 tesla_engineer_achievements_finished_fieldworks_project_loc: "\n[Scope.GetCharacter.GetLastNameNoFormatting] #V zrewolucjonizował fortyfikacje terenowe i obronne#!, co ocaliło życia wielu żołnierzy."
 tesla_engineer_achievements_finished_geomagnetic_observartory_project_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] pomógł w przeprowadzeniu badań nad geomagnetyzmem poprzez #V budowę obserwatorium geomagnetycznego#!."
 tesla_engineer_achievements_finished_telegraphy_network_project_loc: "\n[Scope.GetCharacter.GetSheHe] zbudował #V sieć telegraficzną#!."
 tesla_engineer_achievements_finished_radio_networ_project_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] #V stworzył sieć radiową#!."
 tesla_engineer_achievements_finished_airport_project_loc: "\n[Scope.GetCharacter.GetLastNameNoFormatting] #V zmodernizował lotniska#!."
 tesla_engineer_achievements_finished_warplane_project_loc: "\n[Scope.GetCharacter.GetSheHe] opracował #V nowoczesne samoloty dla wojska#!."
 tesla_engineer_achievements_bicycle_invented_loc: "W [Scope.Var('tesla_engineer_achievements_bicycle_invented_year_var').GetValue|0] [Scope.GetCharacter.GetLastNameNoFormatting] #V stworzył pierwszy rower#!. Wspaniały nowy sposób na podróżowanie przy wykorzystaniu wyłącznie swojej własnej energii."