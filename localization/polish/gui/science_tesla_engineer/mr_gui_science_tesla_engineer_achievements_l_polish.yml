ments_finished_locomotive_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_production_methods_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_production_methods_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_mechanical_computer_project_finished_engineer_var').IsSet , Scope.Var('tesla_mechanical_computer_project_finished_engineer_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_rifles_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_rifles_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_tanks_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_tanks_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_fieldworks_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_fieldworks_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_geomagnetic_observartory_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_geomagnetic_observartory_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_telegraphy_network_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_telegraphy_network_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_radio_networ_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_radio_networ_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_airport_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_airport_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_warplane_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_warplane_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_bicycle_invented_var').IsSet , Scope.Var('tesla_engineer_achievements_bicycle_invented_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievement_transatlantic_cable_var').IsSet , Scope.Var('tesla_engineer_achievement_transatlantic_cable_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievement_suez_india_cable_var').IsSet , Scope.Var('tesla_engineer_achievement_suez_india_cable_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievement_transpacific_cable_var').IsSet , Scope.Var('tesla_engineer_achievement_transpacific_cable_var').GetFlagName)]"
 tesla_engineer_achievements_no_engineer_loc: "#V Osiągnięcia tego [concept_tesla_engineer]#! będą wyświetlane tutaj, gdy będziesz go mieć."
 tesla_engineer_achievements_intro_loc: "#V Osiągnięcia tego inżyniera#!\n"
 tesla_engineer_achievements_invented_steel_frame_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] zbudował pierwszy #V budynek używający ram stalowych#!. Ten sposób konstrukcji błyskawicznie zaczął być stosowany na całym świecie. #!"
 tesla_engineer_achievements_invented_electric_telegraph_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe] był pierwszą osobą która #V wysłała telegram#! używając alfabetu który [Scope.GetCharacter.GetSheHe] wynalazł. #!"
 tesla_engineer_achievements_invented_automobile_loc: "\n #indent_newline:3 • W [Scope.Var('tesla_engineer_achievements_invented_automobile_year_var').GetValue] [Scope.GetCharacter.GetLastNameNoFormatting] wynalazł #V samochód z silnikiem spalinowym#! i przejechał nim duży dystans. To wydarzenie zapoczątkowało dynamiczny rozwój przemysłu motoryzacyjnego. #!"
 tesla_engineer_achievements_finished_road_project_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetFullName] ulepszył #V sieć dróg#!. Dzięki [Scope.GetCharacter.GetHerHis] pracy w celu zmodernizowania dróg są one teraz uznawane za najnowocześniejsze na świecie. #!"
 tesla_engineer_achievements_finished_bridge_project_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe] zbudował wiele #V nowych mostów#!, skutkiem czego posiadamy lepszą infrastrukturę. #!"
 tesla_engineer_achievements_finished_tunnel_project_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] pracował przy konstrukcji wielu #V tunelów#!, które są małymi cudami technologii. #!"
 tesla_engineer_achievements_finished_railway_project_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe] masywnie #V ulepszył sieć kolejową#! dzięki zastosowaniu nowych technologii i innych ulepszeń. #!"
 tesla_engineer_achievements_finished_construction_project_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V ulepszył sektor konstrukcyjny#! poprzez wprowadzenie nowoczesnych sprzętów i metod konstrukcji. #!"
 tesla_engineer_achievements_finished_topographic_map_project_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe] stworzył nową #V mapę topograficzną#!, która ułatwi planowanie przyszłych konstrukcji. #!"
 tesla_engineer_achievements_finished_locomotive_project_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] #V rozwinął nowe lokomotywy#!, które wzmocnią nasze kolejnictwo. #!"
 tesla_engineer_achievements_finished_production_methods_project_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] pomógł wielu kompaniom #V ulepszyć ich produkcję#!. #!"
 tesla_engineer_achievements_finished_rifles_project_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V opracował nowy karabin#!, jeden z najnowocześniejszych na świecie. #!"
 tesla_engineer_achievements_finished_tanks_project_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe] jest #V pionierem produkcji i konstrukcji czołgów#!, który zmodernizował nasze czołgi. #!"
 tesla_engineer_achievements_finished_fieldworks_project_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] #V zrewolucjonizował fortyfikacje terenowe i obronne#!, co ocaliło życia wielu żołnierzy. #!"
 tesla_engineer_achievements_finished_geomagnetic_observartory_project_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] brał udział we wczesnych badaniach geomagnetyzmu poprzez #V aktywny udział w założeniu obserwatorium geomagnetycznego#!. #!"
 tesla_engineer_achievements_finished_telegraphy_network_project_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe] brał udział w implementacji #V sieci telegraficznej#!. #!"
 tesla_engineer_achievements_finished_radio_networ_project_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V skutecznie zaimplementował projekt sieci radiowej na terenie naszego kraju#!. #!"
 tesla_engineer_achievements_finished_airport_project_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] #V skutecznie zmodernizował nasze  lotniska do najnowszych standardów#!. #!"
 tesla_engineer_achievements_finished_warplane_project_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe] brał udział w projektach #V nowoczesnych samolotów dla naszych sił zbrojnych#!. #!"
 tesla_engineer_achievements_bicycle_invented_loc: "\n #indent_newline:3 • W [Scope.Var('tesla_engineer_achievements_bicycle_invented_year_var').GetValue|0] [Scope.GetCharacter.GetLastNameNoFormatting] #V stworzył pierwszy rower#!. Wspaniały nowy sposób na podróżowanie przy wykorzystaniu wyłącznie swojej własnej energii. #!"
 tesla_engineer_achievement_transatlantic_cable_loc: "\n #indent_newline:3 • [GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetFullNameNoFormatting] był naczelnym inżynierem nadzorującym projekt telegrafu Transatlantyckiego jak i autorem technicznego arcydzieła. #!"
 tesla_engineer_achievement_suez_india_cable_loc: "\n #indent_newline:3 • [GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetFullNameNoFormatting] odpowiadał za położenie Kabla Suez-Indie, ustanawiając istotne połączenie pomiędzy kontynentami poprzez zdyscyplinowaną inżynierię. #!"
 tesla_engineer_achievement_transpacific_cable_loc: "\n #indent_newline:3 • [GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetFullNameNoFormatting] odpowiadał za ekspedycję projektu położenia Kabla Transpacyficznego, w ten sposób osiągając jeden z najbardziej wymagających wyczynów w historii telegrafii morskiej. #!"