ments_finished_locomotive_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_production_methods_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_production_methods_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_mechanical_computer_project_finished_engineer_var').IsSet , Scope.Var('tesla_mechanical_computer_project_finished_engineer_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_rifles_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_rifles_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_tanks_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_tanks_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_fieldworks_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_fieldworks_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_geomagnetic_observartory_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_geomagnetic_observartory_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_telegraphy_network_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_telegraphy_network_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_radio_networ_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_radio_networ_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_airport_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_airport_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_warplane_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_warplane_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_ach