 tesla_engineer_achievements_no_engineer_loc: "#V Osiągnięcia tego [concept_tesla_engineer]#! będą wyświetlane tutaj, gdy będziesz go mieć."
 tesla_engineer_achievements_intro_loc: "#V Osiągnięcia tego inżyniera#!\n"
 tesla_engineer_achievements_invented_steel_frame_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] zbudował pierwszy #V budynek używający ram stalowych#!. Ten sposób konstrukcji błyskawicznie zaczął być stosowany na całym świecie. #!"
 tesla_engineer_achievements_invented_electric_telegraph_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] was the first person to #V Send a Telegram#! using an alphabet [Scope.GetCharacter.GetSheHe] invented.#!"
 tesla_engineer_achievements_invented_automobile_loc: "\n #indent_newline:3 • W [Scope.Var('tesla_engineer_achievements_invented_automobile_year_var').GetValue] [Scope.GetCharacter.GetLastNameNoFormatting] wynalazł #V samochód z silnikiem spalinowym#! i przejechał nim duży dystans. To wydarzenie zapoczątkowało dynamiczny rozwój przemysłu motoryzacyjnego. #!"
 tesla_engineer_achievements_finished_road_project_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetFullName] ulepszył #V sieć dróg#!. Dzięki [Scope.GetCharacter.GetHerHis] pracy w celu zmodernizowania dróg są one teraz uznawane za najnowocześniejsze na świecie. #!"
 tesla_engineer_achievements_finished_bridge_project_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] built many #V New Bridges#! which resulted in a better infrastructure.#!"
 tesla_engineer_achievements_finished_tunnel_project_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] pracował przy konstrukcji wielu #V tunelów#!, które są małymi cudami technologii. #!"
 tesla_engineer_achievements_finished_railway_project_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] massively #V improved Railway Lines#! by implementing new technology and other improvements.#!"
 tesla_engineer_achievements_finished_construction_project_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V ulepszył sektor konstrukcyjny#! poprzez wprowadzenie nowoczesnych sprzętów i metod konstrukcji. #!"
 tesla_engineer_achievements_finished_topographic_map_project_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] created a new #V Topographic Map#! that eases future construction projects.#!"
 tesla_engineer_achievements_finished_locomotive_project_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] #V rozwinął nowe lokomotywy#!, które wzmocnią nasze kolejnictwo. #!"
 tesla_engineer_achievements_finished_production_methods_project_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] helped various companies to #V improve their Production#!.#!"
 tesla_engineer_achievements_finished_rifles_project_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V opracował nowy karabin#!, jeden z najnowocześniejszych na świecie. #!"
 tesla_engineer_achievements_finished_tanks_project_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] is a #V Pioneer of Tank Design and Construction#! who modernized our Tanks.#!"
 tesla_engineer_achievements_finished_fieldworks_project_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] #V zrewolucjonizował fortyfikacje terenowe i obronne#!, co ocaliło życia wielu żołnierzy. #!"
 tesla_engineer_achievements_finished_geomagnetic_observartory_project_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] brał udział we wczesnych badaniach geomagnetyzmu poprzez #V aktywny udział w założeniu obserwatorium geomagnetycznego#!. #!"
 tesla_engineer_achievements_finished_telegraphy_network_project_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] built a #V Telegraphy Network#!.#!"
 tesla_engineer_achievements_finished_radio_networ_project_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V skutecznie zaimplementował projekt sieci radiowej na terenie naszego kraju#!. #!"
 tesla_engineer_achievements_finished_airport_project_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] #V skutecznie zmodernizował nasze  lotniska do najnowszych standardów#!. #!"
 tesla_engineer_achievements_finished_warplane_project_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] developed #V Modern Airplanes for the Military#!.#!"
 tesla_engineer_achievements_bicycle_invented_loc: "\n #indent_newline:3 • W [Scope.Var('tesla_engineer_achievements_bicycle_invented_year_var').GetValue|0] [Scope.GetCharacter.GetLastNameNoFormatting] #V stworzył pierwszy rower#!. Wspaniały nowy sposób na podróżowanie przy wykorzystaniu wyłącznie swojej własnej energii. #!"
 tesla_engineer_achievement_transatlantic_cable_loc: "\n #indent_newline:3 • [GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetFullNameNoFormatting]  was chief engineer during the construction of the transatlantic cable in [GetGlobalVariable('tesla_transatlantic_cable_year_global_var').GetValue|V] and is thus the author of a technical masterpiece.#!"
 tesla_engineer_achievement_suez_india_cable_loc: "\n #indent_newline:3 • [GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetFullNameNoFormatting] oversaw the laying of the Suez-India cable in [GetGlobalVariable('tesla_suez_india_cable_year_global_var').GetValue|V], establishing a crucial link between continents through disciplined engineering.#!"
 tesla_engineer_achievement_transpacific_cable_loc: "\n #indent_newline:3 • [GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetFullNameNoFormatting] directed the transpacific cable expedition in [GetGlobalVariable('tesla_transpacific_cable_year_global_var').GetValue|V], achieving one of the most demanding feats in maritime telegraphy.#!"