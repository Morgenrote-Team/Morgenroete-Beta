 tesla_engineer_achievements_no_engineer_loc: "Osiągnięcia #V tego [concept_gaudi_engineer]#! będą wyświetlane tutaj, gdy tylko je zdobędziesz." #deepl:2624550252
 tesla_engineer_achievements_intro_loc: "#V Osiągnięcia tego inżyniera#!\n" #deepl:3891137056

 tesla_engineer_achievements_invented_steel_frame_loc: "\n[Scope.GetCharacter.GetLastNameNoFormatting] zbudował pierwszy #V budynek przy użyciu stalowych ram#!. Ten sposób budowy rozprzestrzenił się na całym świecie jak pożar." #deepl:3716706247
 tesla_engineer_achievements_invented_electric_telegraph_loc: "\n[Scope.GetCharacter.GetSheHe] was the first person to #V Send a Telegram#! using an alphabet [Scope.GetCharacter.GetSheHe] invented." #pleace replace
 tesla_engineer_achievements_invented_automobile_loc: "\W [Scope.Var('tesla_engineer_achievements_invented_automobile_year_var').GetValue] [Scope.GetCharacter.GetLastNameNoFormatting] wynalazł samochód #V z silnikiem spalinowym#! i przejechał nim długą trasę. Zapoczątkowało to gwałtowny rozwój motoryzacji." #deepl:88145422
 tesla_engineer_achievements_finished_road_project_loc: "\[Scope.GetCharacter.GetFullName] ulepszone #V sieci drogowe#!. Dzięki pracy [Scope.GetCharacter.GetHerHis] nad modernizacją dróg są one obecnie uważane za najnowocześniejsze na świecie." #deepl:2097415548
 tesla_engineer_achievements_finished_bridge_project_loc: "\n[Scope.GetCharacter.GetSheHe] zbudował wiele #V nowych mostów#!, co zaowocowało lepszą infrastrukturą." #deepl:2671184667
 tesla_engineer_achievements_finished_tunnel_project_loc: "\Dr [Scope.GetCharacter.GetLastNameNoFormatting] pracował nad budową wielu tuneli #V #! , które są małymi cudami techniki." #deepl:922154902
 tesla_engineer_achievements_finished_railway_project_loc: "\[Scope.GetCharacter.GetSheHe] masowo #V ulepszone linie kolejowe#! poprzez wdrożenie nowych technologii i innych ulepszeń." #deepl:721890021
 tesla_engineer_achievements_finished_construction_project_loc: "\Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  ulepszył Sektory Budowlane#! poprzez wprowadzenie nowoczesnego sprzętu i technik budowlanych." #deepl:987346687
 tesla_engineer_achievements_finished_topographic_map_project_loc: "\Na stronie[Scope.GetCharacter.GetSheHe] utworzono nową mapę topograficzną #V #! , która ułatwia przyszłe projekty budowlane." #deepl:2317700588
 tesla_engineer_achievements_finished_locomotive_project_loc: "\[Scope.GetCharacter.GetLastNameNoFormatting] #V  opracował nowe lokomotywy#!, które pobudzą rozwój kolei." #deepl:2246312284
 tesla_engineer_achievements_finished_production_methods_project_loc: "\n[Scope.GetCharacter.GetSheHe|U] pomógł różnym firmom w #V ulepszeniu ich produkcji#!." #deepl:3837789510
 tesla_engineer_achievements_finished_rifles_project_loc: "\Dr [Scope.GetCharacter.GetLastNameNoFormatting] #V  zaprojektował nowy karabin#!, który jest jednym z najnowocześniejszych na świecie." #deepl:373585695
 tesla_engineer_achievements_finished_tanks_project_loc: "\n[Scope.GetCharacter.GetSheHe] to #V Pionier projektowania i budowy zbiorników#!, który zmodernizował nasze zbiorniki." #deepl:1266234006
 tesla_engineer_achievements_finished_fieldworks_project_loc: "\n[Scope.GetCharacter.GetLastNameNoFormatting] #V  zrewolucjonizował prace polowe i obronę#!, co uratowało życie wielu żołnierzom." #deepl:3300715553
 tesla_engineer_achievements_finished_geomagnetic_observartory_project_loc: "#V \Dr [Scope.GetCharacter.GetLastNameNoFormatting] pomógł w prowadzeniu badań geomagnetycznych, budując Obserwatorium Geomagnetyczne#!." #deepl:2611684424
 tesla_engineer_achievements_finished_telegraphy_network_project_loc: "\Na stronie[Scope.GetCharacter.GetSheHe] zbudowano sieć telegraficzną #V #! ." #deepl:3900781177
 tesla_engineer_achievements_finished_radio_networ_project_loc: "\Dr [Scope.GetCharacter.GetLastNameNoFormatting] #V  zbudował sieć radiową#!." #deepl:494089721
 tesla_engineer_achievements_finished_airport_project_loc: "\[Scope.GetCharacter.GetLastNameNoFormatting] #V  zmodernizował porty lotnicze#!." #deepl:4174187253
 tesla_engineer_achievements_finished_warplane_project_loc: "\[Scope.GetCharacter.GetSheHe] opracowany #V Nowoczesne samoloty dla wojska#!." #deepl:3583316823
 tesla_engineer_achievements_bicycle_invented_loc: "W [Scope.Var('tesla_engineer_achievements_bicycle_invented_year_var').GetValue|0] [Scope.GetCharacter.GetLastNameNoFormatting] #V  wynaleziono pierwszy Bycycle#!. Wspaniały nowy sposób podróżowania przy użyciu własnej energii." #deepl:1060401141
