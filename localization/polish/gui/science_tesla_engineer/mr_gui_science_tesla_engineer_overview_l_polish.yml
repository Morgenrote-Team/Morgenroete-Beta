l_polish:
 MR_AUTOMATE_ENGINEER_TT: "#T Zautomatyzuj [concept_tesla_engineer] #! \n Jeśli zautomatyzujesz zadania, nie będziesz już musiał zlecać ich inżynierowi.\n Będzie on pracować samodzielnie i wykonywać zadania, które są w danym momencie sensowne. Nadal będziesz jednak otrzymywać informacje o niektórych zdarzeniach. \n\n#n Miej na uwadze, że automatyzacja inżyniera jest prawdopodobnie mniej efektywna, aniżeli byś samemu przydzielał mu zadania. #!"
 mr_engineering_automation_gui_tt: "Rozpocznij automatyzację zadań [concept_tesla_engineer]."
 mr_stop_engineering_automation_gui_tt: "Zakończ automatyzację zadań [concept_tesla_engineer]."
 MR_STOP_AUTOMATE_ENGINEER_TT: "#T Zakończ automatyzację [concept_tesla_engineer] #!\n Twój Inżynier nie będzie już wykonywał zadań samodzielnie. "
 MR_ENGINEER_RANKING_BUTTON: "Inżynierowie"
 MR_RANKING_BY_ENGINEER: "Pokaż ranking wszystkich [Concept('concept_tesla_engineer','$concept_tesla_engineers$')] na świecie."
 ENGINEER_ENGINEER_RANKING_HEADER: "#V [Concept('concept_tesla_engineer','$concept_tesla_engineers$')] świata, rankingowani według [concept_academics_experience]"
 tesla_experience_current_specialization_civil_loc: "[Character.MakeScope.GetVariable('tesla_civil_engineer_experience_var').GetValue|V0]"
 tesla_experience_current_specialization_mechanical_loc: "[Character.MakeScope.GetVariable('tesla_mechanical_engineer_experience_var').GetValue|V0]"
 tesla_experience_current_specialization_military_loc: "[Character.MakeScope.GetVariable('tesla_military_engineer_experience_var').GetValue|V0]"
 tesla_experience_current_specialization_electrical_loc: "[Character.MakeScope.GetVariable('tesla_electrical_engineer_experience_var').GetValue|V0]"
 tesla_experience_current_specialization_aeronautical_loc: "[Character.MakeScope.GetVariable('tesla_aeronautical_engineer_experience_var').GetValue|V0]"