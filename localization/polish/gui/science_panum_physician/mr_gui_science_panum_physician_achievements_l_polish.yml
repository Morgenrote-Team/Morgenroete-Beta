 panum_physician_no_physician_loc: "Osiągnięcia #V tego [concept_panum_physician]#! będą wyświetlane tutaj, gdy tylko je zdobędziesz." #deepl:3202202811
 panum_physician_achievements_intro_loc: "#V Osiągnięcia tego lekarza#!\n[Scope.GetCharacter.GetFullName] jest odnoszącym sukcesy lekarzem." #deepl:2011576622

 panum_physician_achievement_successful_treatments_loc: "\Dr [Scope.GetCharacter.GetLastNameNoFormatting] ma doświadczenie w leczeniu pacjentów i #o z powodzeniem leczył [GetPlayer.MakeScope.Var('panum_physician_var').GetVariable('panum_physician_successful_treatments_var').GetValue] pacjentów#!." #deepl:2185896488
 panum_physician_achievement_epidemiologist_loc: "\n[Scope.GetCharacter.GetSheHe|U] intensywnie badał choroby i stał się #o $panum_epidemiologist$ #! ." #deepl:1702393838
 panum_physician_achievement_surgeon_loc: "\n[Scope.GetCharacter.GetSheHe|U] przeprowadził wiele operacji i dlatego jest uważany za dobrego #o $panum_surgeon$ #! ." #deepl:3171499380
 panum_physician_achievement_psychiatrist_loc: "\Dr [Scope.GetCharacter.GetLastNameNoFormatting] dogłębnie zbadał ludzki umysł i jest #o znanym $panum_psychiatrist$#! ." #deepl:60079648
 panum_physician_achievement_military_physician_loc: "\Jako #o $panum_military_physician$ #! [Scope.GetCharacter.GetSheHe] widział okropności wojny i wie, jak traktować ludzi w strasznych okolicznościach." #deepl:696092700
 panum_physician_achievement_germ_theory_inventor_loc: "\Dr [Scope.GetCharacter.GetLastNameNoFormatting] wynalazł teorię #o Germ Theory#!, która uratowała już tysiące istnień ludzkich." #deepl:2770995117
 panum_physician_achievement_pneumothorax_inventor_loc: "\Jednym z największych wynalazków [Scope.GetCharacter.GetHerHim] jest urządzenie #o do wywoływania sztucznej odmy opłucnowej#!. Powoduje to zapadnięcie się płuc, co może pomóc w leczeniu gruźlicy." #deepl:304953214
 panum_physician_achievement_thoracoplasty_inventor_loc: "\Dzięki umiejętnościom chirurgicznym [Scope.GetCharacter.GetHerHis], doktor [Scope.GetCharacter.GetLastNameNoFormatting] wynalazł procedurę #o , która zrewolucjonizowała chirurgię płuc zwaną torakoplastyką#!, a tym samym umożliwiła lepsze leczenie pacjentów z gruźlicą." #deepl:3014173894
 panum_physician_achievement_attended_medical_congress_loc: "\[Scope.GetCharacter.GetSheHe] uczestniczył w co najmniej jednym kongresie medycznym #o #! i dzielił się pomysłami [Scope.GetCharacter.GetHerHis]." #deepl:1479296090
 mendelejew_chemist_achievement_aspirin_inventor_loc: "\Dr [GetPlayer.MakeScope.Var('mendelejew_chemist_var').GetCharacter.GetLastNameNoFormatting] jest uważany za kluczowego wynalazcę #o Aspirin#! i nie tylko zapewnił ulgę w bólu niezliczonym pacjentom, ale także zrewolucjonizował przemysł farmaceutyczny." #deepl:2162525717
 panum_physician_achievement_xray_inventor_loc: "\Dzięki odkryciu #o promieni rentgenowskich#!, dr [GetPlayer.MakeScope.Var('curie_physicist_var').GetCharacter.GetLastNameNoFormatting] jest uważany za jednego z czołowych międzynarodowych fizyków, który w równym stopniu zrewolucjonizował medycynę i fizykę." #deepl:34275984
 panum_physician_achievement_bloodtypes_inventor_loc: "\Wraz z odkryciem różnych #o grup krwi, a mianowicie A, B, AB i 0#!, dr [Scope.GetCharacter.GetLastNameNoFormatting] odegrał znaczącą rolę w zapewnieniu, że rozumiemy więcej na temat krwi jako takiej - i że transfuzje krwi są bardziej skuteczne." #deepl:3740473168
 panum_physician_achievement_ecg_inventor_loc: "\EKG #o #! , wynalezione przez dr [Scope.GetCharacter.GetLastNameNoFormatting], umożliwiło pomiar aktywności elektrycznej serca i stanowi kamień milowy w operacjach szpitalnych." #deepl:2321856106
 panum_physician_achievement_transplantation_inventor_loc: "\Dzięki #o pierwszej transplantacji#! dr [Scope.GetCharacter.GetLastNameNoFormatting] zapisał się w historii medycyny." #deepl:2933890993
 panum_physician_achievement_stereotactic_method_inventor_loc: "\Do dziś wynaleziona przez niego metoda #o Stereotactic Method#! [Scope.GetCharacter.GetSheHe] uważana jest za przełomową w chirurgii mózgu." #deepl:147308326
 panum_physician_achievement_cardiopulmonary_bypass_inventor_loc: "\Dzięki opracowaniu pomostowania krążeniowo-oddechowego #o #! , dr [Scope.GetCharacter.GetLastNameNoFormatting] osiągnął arcydzieło współczesnej medycyny." #deepl:3531788201
 panum_physician_achievement_endoscope_inventor_loc: "#o \Szczególnie pamiętany jest również wynalazek[Scope.GetCharacter.GetHerHis|U] endoskopu#!, dzięki któremu po raz pierwszy można było zbadać ludzkie wnętrze." #deepl:2202274893
 panum_physician_achievement_ophthalmoscope_inventor_loc: "\Dr [Scope.GetCharacter.GetLastNameNoFormatting] wynalazł aparat, który ułatwia badanie chorób oczu i tym samym oddał nieocenioną przysługę okulistyce: #o The Ophthalmoscope#!." #deepl:657308744
 panum_physician_achievement_chemotherapy_inventor_loc: "\Chemioterapia #o #! [Scope.GetCharacter.GetSheHe] opracowana w celu leczenia nawet najbardziej uporczywych chorób za pomocą różnych leków daje nawet pacjentom chorym na raka nadzieję, że nie wszystko idzie na marne." #deepl:1291980204
 panum_physician_achievement_iron_lung_inventor_loc: "\[GetPlayer.MakeScope.Var('tesla_engineer_var').GetCharacter.GetHerHis|U] #o  Budowa pierwszego żelaznego płuca#! w celu podtrzymania życia pacjentów chorych na polio jest uważana za jedno z najbardziej fascynujących osiągnięć inżynieryjnych naszych czasów." #deepl:2605796385
 panum_physician_achievement_military_medicine_project_finished_loc: "\Dr [Scope.GetCharacter.GetLastNameNoFormatting] wynalazł #o najnowsze metody w dziedzinie medycyny polowej#!, czyniąc wojskowe służby medyczne jednymi z najbardziej uznanych na świecie." #deepl:3753274088
 panum_physician_achievement_inaugurated_asylum_loc: "\Dr [Scope.GetCharacter.GetLastNameNoFormatting] odegrał kluczową rolę w założeniu #o First Mental Asylum#! w celu zapewnienia kompleksowej i humanitarnej pomocy chorym psychicznie." #deepl:2471346129
 panum_physician_achievement_anthrax_disease_loc: "#o \Dr [Scope.GetCharacter.GetLastNameNoFormatting] specjalizuje się w badaniach nad wąglikiem#! i opracował skuteczne metody jego zapobiegania i leczenia." #deepl:2201385397
 panum_physician_achievement_goiter_disease_loc: "#o \Dr [Scope.GetCharacter.GetLastNameNoFormatting] specjalizuje się w leczeniu wola#! i opracował skuteczne metody zapobiegania i leczenia tego schorzenia." #deepl:693298154
 panum_physician_achievement_nephrolithiasis_disease_loc: "#o \Dr [Scope.GetCharacter.GetLastNameNoFormatting] specjalizuje się w kamicy nerkowej#! i opracował skuteczne metody jej zapobiegania i leczenia." #deepl:3950905505
 panum_physician_achievement_pellagra_disease_loc: "#o \Dr [Scope.GetCharacter.GetLastNameNoFormatting] specjalizuje się w Pellagrze#! i opracował skuteczne metody jej zapobiegania i leczenia." #deepl:1987809959
 panum_physician_achievement_rickets_disease_loc: "#o \Dr [Scope.GetCharacter.GetLastNameNoFormatting] specjalizuje się w krzywicy#! i opracował skuteczne metody jej zapobiegania i leczenia." #deepl:660217329
 panum_physician_achievement_syphilis_disease_loc: "#o \Dr [Scope.GetCharacter.GetLastNameNoFormatting] specjalizuje się w kile#! i opracował skuteczne metody jej zapobiegania i leczenia." #deepl:908555016
 panum_physician_achievement_tetanus_disease_loc: "#o \Dr [Scope.GetCharacter.GetLastNameNoFormatting] specjalizuje się w tężcu#! i opracował skuteczne metody jego zapobiegania i leczenia." #deepl:1982558023
 panum_physician_achievement_basketball_inventor_loc: "\W serwisie [Scope.Var('panum_physician_achievement_basketball_inventor_year_var').GetValue|0] dr [Scope.GetCharacter.GetLastNameNoFormatting] #o  wynalazł nowy sport zespołowy o nazwie koszykówka.#!" #deepl:207476415
