ar('panum_physician_achievement_endoscope_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_ophthalmoscope_inventor_var').IsSet , Scope.Var('panum_physician_achievement_ophthalmoscope_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_chemotherapy_inventor_var').IsSet , Scope.Var('panum_physician_achievement_chemotherapy_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_attended_medical_congress_var').IsSet , Scope.Var('panum_physician_achievement_attended_medical_congress_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_anthrax_disease_var').IsSet , Scope.Var('panum_physician_achievement_anthrax_disease_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_goiter_disease_var').IsSet , Scope.Var('panum_physician_achievement_goiter_disease_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_nephrolithiasis_disease_var').IsSet , Scope.Var('panum_physician_achievement_nephrolithiasis_disease_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_pellagra_disease_var').IsSet , Scope.Var('panum_physician_achievement_pellagra_disease_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_rickets_disease_var').IsSet , Scope.Var('panum_physician_achievement_rickets_disease_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_syphilis_disease_var').IsSet , Scope.Var('panum_physician_achievement_syphilis_disease_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_tetanus_disease_var').IsSet , Scope.Var('panum_physician_achievement_tetanus_disease_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_military_medicine_project_finished_var').IsSet , Scope.Var('panum_physician_achievement_military_medicine_project_finished_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_inaugurated_asylum_var').IsSet , Scope.Var('panum_physician_achievement_inaugurated_asylum_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_aspirin_inventor_var').IsSet , Scope.Var('mendelejew_chemist_achievement_aspirin_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_basketball_inventor_var').IsSet , Scope.Var('panum_physician_achievement_basketball_inventor_var').GetFlagName)]"
 panum_physician_no_physician_loc: "#V Osiągnięcia tego [concept_panum_physician]#! będą wyświetlane tutaj, gdy będzie zatrudniony."
 panum_physician_achievements_intro_loc: "#V Osiągnięcia tego lekarza#!\n #indent_newline:3 • [Scope.GetCharacter.GetFullName] jest odnoszącym sukcesy lekarzem. #!"
 panum_physician_achievement_successful_treatments_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] eksperymentuje nad sposobami leczenia pacjentów i #o skutecznie wyleczył [GetPlayer.MakeScope.Var('panum_physician_var').GetVariable('panum_physician_successful_treatments_var').GetValue] pacjentów#!. #!"
 panum_physician_achievement_epidemiologist_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] szeroko badał choroby zakaźne i został #o $panum_epidemiologist$#!. #!"
 panum_physician_achievement_surgeon_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] przeprowadził wiele operacji, dzięki czemu jest uznawany za dobrego #o $panum_surgeon$#!. #!"
 panum_physician_achievement_psychiatrist_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] prowadził szerokie badania ludzkiego umysłu i jest #o uznanym $panum_psychiatrist$#!. #!"
 panum_physician_achievement_military_physician_loc: "\n #indent_newline:3 • Jako #o $panum_military_physician$#! [Scope.GetCharacter.GetSheHe] widział horrory wojny i wie, jak leczyć ludzi w okropnych okolicznościach. #!"
 panum_physician_achievement_germ_theory_inventor_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] opracował#o teorię zarazków#!, która ocaliła już tysiące żyć.#!"
 panum_physician_achievement_pneumothorax_inventor_loc: "\n #indent_newline:3 • Jednym z [Scope.GetCharacter.GetHerHim] największych wynalazków jest #o urządzenie do sztucznego wywoływania odmy opłucnowej#!. Prowadzi ona do zapaści płuc, pomocnej w leczeniu gruźlicy. #!"
 panum_physician_achievement_thoracoplasty_inventor_loc: "\n #indent_newline:3 • Dzięki [Scope.GetCharacter.GetHerHis] umiejętnościom chirurgicznym, Doktor [Scope.GetCharacter.GetLastNameNoFormatting] wynalazł #o procedurę która zrewolucjonizowała chirurgię płuc, zwaną torakoplastyką#!, która umożliwiła skuteczniejsze leczenie pacjentów z gruźlicą.#!"
 panum_physician_achievement_attended_medical_congress_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] wziął udział w przynajmniej jednym #o kongresie medycznym#!, na którym przedstawił [Scope.GetCharacter.GetHerHis] pomysły. #!"
 mendelejew_chemist_achievement_aspirin_inventor_loc: "\n #indent_newline:3 • Dr. [GetPlayer.MakeScope.Var('mendelejew_chemist_var').GetCharacter.GetLastNameNoFormatting] jest uznawany za głównego wynalazcę #o aspiryny#!, która nie tylko dostarczyła ulgę w bólu do niezliczonych pacjentów, ale także zrewolucjonizowała przemysł farmaceutyczny. #!"
 panum_physician_achievement_xray_inventor_loc: "\n #indent_newline:3 • Dzięki odkryciu #o promieniowania X#! Dr. [GetPlayer.MakeScope.Var('curie_physicist_var').GetCharacter.GetLastNameNoFormatting] jest uznawany za jednego z wiodących fizyków, który zrewolucjonizował medycynę i fizykę w równym stopniu. #!"
 panum_physician_achievement_bloodtypes_inventor_loc: "\n #indent_newline:3 • Dzięki odkryciu różnych #o grup krwi, dokładniej A, B, AB i 0#!, Dr. [Scope.GetCharacter.GetLastNameNoFormatting] odegrał kluczową rolę w zapewnieniu, że wiemy jak najwięcej o krwi - i że transfuzje krwi są bardziej skuteczne. #!"
 panum_physician_achievement_ecg_inventor_loc: "\n #indent_newline:3 • #o ECG#!, wynalezione przez Dr. [Scope.GetCharacter.GetLastNameNoFormatting], pozwoliło mierzyć aktywność elektryczną serca i stanowi milowy krok w operacjach w szpitalach. #!"
 panum_physician_achievement_transplantation_inventor_loc: "\n #indent_newline:3 • Dzięki #o pierwszej transplantacji#!, Dr. [Scope.GetCharacter.GetLastNameNoFormatting] zdobył miejsce w historii medycyny. #!"
 panum_physician_achievement_stereotactic_method_inventor_loc: "\n #indent_newline:3 • Aż po dziś dzień #o metoda stereotaktyczna#! którą [Scope.GetCharacter.GetSheHe] wynalazł jest uznawana za przełomową w zakresie operacji mózgu. #!"
 panum_physician_achievement_cardiopulmonary_bypass_inventor_loc: "\n #indent_newline:3 • Dzięki rozwinięciu metody #o obejścia sercowo-płucnego#!, Dr. [Scope.GetCharacter.GetLastNameNoFormatting] stworzył arcydzieło współczesnej medycyny. #!"
 panum_physician_achievement_endoscope_inventor_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetHerHis|U] jest szczególnie pamiętany za wynalazek #o endoskopu#!, który umożliwił zbadanie wnętrza człowieka. #!"
 panum_physician_achievement_ophthalmoscope_inventor_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] wynalazł urządzenie które ułatwia badanie chorób oczu, oddając niezmierzoną zasługę dziedzinie okulistyki:#o oftalmoskop#!.#!"
 panum_physician_achievement_chemotherapy_inventor_loc: "\n #indent_newline:3 • #o Chemioterapia#!, którą [Scope.GetCharacter.GetSheHe] rozwinął w celu leczenia nawet najbardziej upartych chorób przy użyciu różnych leków, daje nadzieję nawet pacjentom z rakiem.#!"
 panum_physician_achievement_iron_lung_inventor_loc: "\n #indent_newline:3 • [GetPlayer.MakeScope.Var('tesla_engineer_var').GetCharacter.GetHerHis|U] #o jest odpowiedzialny za pierwsze żelazne płuco#!, skonstruowane w celu podtrzymywania życia pacjentów z polio w stanie krytycznym, jest uznawane za jedno z najbardziej fascynujących osiągnięć inżynierii tych czasów.#!"
 panum_physician_achievement_military_medicine_project_finished_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #o opracował najnowsze metody w zakresie medycyny polowej#!, czyniąc wojskową służbę medyczną jedną najbardziej respoektowanych na świecie.#!"
 panum_physician_achievement_inaugurated_asylum_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] odegrał kluczową rolę w ufundowaniu #o pierwszego szpitala psychiatrycznego w kraju#!, w celu zapewnienia szerokiej i humanitarnej opieki chorym umysłowo.#!"
 panum_physician_achievement_anthrax_disease_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #o został specjalistą chorób wywoływanych przez laseczkę wąglika#! i rozwinął efektywne metody prewencji i leczenia.#!"
 panum_physician_achievement_goiter_disease_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #o został specjalistą chorób tarczycy#! i rozwinął efektywne metody prewencji i leczenia.#!"
 panum_physician_achievement_nephrolithiasis_disease_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #o został specjalistą kamicy nerkowej#! i rozwinął efektywne metody prewencji i leczenia.#!"
 panum_physician_achievement_pellagra_disease_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #o został specjalistą Pelagry#! i rozwinął efektywne metody prewencji i leczenia.#!"
 panum_physician_achievement_rickets_disease_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #o został specjalistą Krzywicy#! i rozwinął efektywne metody prewencji i leczenia.#!"
 panum_physician_achievement_syphilis_disease_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #o jest specjalistą Syfilisu#! i rozwinął efektywne metody prewencji leczenia.#!"
 panum_physician_achievement_tetanus_disease_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #o został specjalistą tężca#! i rozwinął efektywne metody jego prewencji leczenia.#!"
 panum_physician_achievement_basketball_inventor_loc: "\n #indent_newline:3 • W [Scope.Var('panum_physician_achievement_basketball_inventor_year_var').GetValue|0] Dr. [Scope.GetCharacter.GetLastNameNoFormatting]#o przedstawił i wypopularyzował nowy sport zespołowy zwany koszykówką#!#!"