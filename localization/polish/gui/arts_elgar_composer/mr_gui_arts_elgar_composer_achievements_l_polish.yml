l_polish:
 MR_COMPOSER_ACHIEVEMENTS_TT: "[AddLocalizationIf( Scope.IsSet , 'elgar_composer_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'elgar_composer_achievements_no_composer_loc')]"
 elgar_composer_achievements_loc: "$elgar_composer_achievements_intro_loc$[Scope.GetCharacter.GetCustom('elgar_composer_achievement_is_composer_virtuoso_type')][Scope.GetCharacter.GetCustom('elgar_composer_achievement_is_composer_conductor_type')]"
 elgar_composer_achievements_no_composer_loc: "#V Osiągnięcia tego [concept_elgar_composer]#! będą wyświetlane tutaj, gdy będziesz go mieć."
 elgar_composer_achievements_intro_loc: "#V Osiągnięcia tego kompozytora #!\n[Scope.GetCharacter.GetFullName] jest kompozytorem z reputacją równą [Scope.Var('elgar_composer_experience').GetValue|V0]. Dotychczas odbył [Scope.GetCharacter.GetSheHe] [Scope.Var('elgar_composer_num_tours_var').GetValue|V0] tras. Spośród [Scope.GetCharacter.GetHerHis] wielu prac, szczególnie wyróżnia się [Scope.Var('elgar_composer_num_compositions_var').GetValue|V0]."
 elgar_composer_achievement_is_composer_virtuoso_loc: "\n[Scope.GetCharacter.GetSheHe|U] jest wybitnym #V wirtuozem#!."
 elgar_composer_achievement_is_composer_conductor_loc: "\n[Scope.GetCharacter.GetSheHe|U] jest uznawany za sławnego#V dyrygenta#!."