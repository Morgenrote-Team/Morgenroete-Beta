 MR_AUTORACING_FOUND_AUTOMOBILE_CLUB_BUTTON: "Załóż Klub Samochodowy"
 MR_AUTORACING_FOUND_AUTOMOBILE_CLUB_BUTTON_TT: "#T Załóż Klub Samochodowy #!\nZałożenie klubu samochodowego jest pierwszym krokiem do budowy innych obiektów niezbędnych do uprawiania sportów motorowych.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_AUTORACING_LONG_DISTANCE_BUTTON: "Wyścig długodystansowy"
 MR_AUTORACING_LONG_DISTANCE_BUTTON_TT: "#T Zorganizuj wyścig długodystansowy#!\nWyścigi długodystansowe, często między miastami, były normą w początkach wyścigów samochodowych i trwały do połowy XX wieku. We Włoszech najbardziej znanymi przykładami są wyścigi takie jak Targa Florio czy Mille Miglia. Poddawały one człowieka i maszynę szczególnej próbie i przez długi czas były uważane za prawdziwe narodowe wyścigi samochodowe.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_AUTORACING_FOUND_GRAND_PRIX_BUTTON: "Zorganizuj Grand Prix"
 MR_AUTORACING_FOUND_GRAND_PRIX_BUTTON_TT: "#T Zorganizuj Grand Prix #!\nW 1906 roku zorganizowano pierwsze oficjalne Grand Prix w historii motoryzacji – wyścig Grand Prix de l'ACF. Niezależnie od kraju pochodzenia, dopuszczono do udziału maksymalnie trzy samochody wyścigowe od każdego producenta, zgodnie z pierwotną prośbą przedstawicieli francuskiego przemysłu. Zgodnie ze swoim statusem najważniejszych z wszystkich zawodów, wyścig odbywał się na dystansie ponad 1200 km i trwał dwa kolejne dni. W 1925 roku, z inicjatywy Automobile Club of Italy, ogłoszono w końcu wprowadzenie oficjalnych mistrzostw świata. Trzy oficjalne wyścigi Grand Prix sezonu (Francja, Włochy i Belgia) zostały wyznaczone jako wyścigi, a Indianapolis jako najważniejsze amerykańskie wydarzenie wyścigowe.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_AUTORACING_FOUND_GRAND_PRIX_BUTTON_TRIGGER_TT: "#default_text #V Przynajmniej 5 innych krajów #! posiada #V Klub Samochodowy #! i wynaleźli [GetTechnology('vikelas_international_sports_tech').GetName]. #!"
 MR_AUTORACING_RACE_TRACK_BUTTON: "Zbuduj tor wyścigowy"
 MR_AUTORACING_RACE_TRACK_BUTTON_TT: "#T Zbuduj tor wyścigowy #!\nWraz z rozwojem wyścigów Grand Prix stałe tory wyścigowe stają się coraz bardziej powszechne w sportach motorowych. Specjalny tor wyścigowy nie tylko pozwoliłby scentralizować międzynarodowe imprezy wyścigowe w jednym miejscu, ale jako tor testowy zapewniłby również naszym kierowcom wyścigowym dodatkowe doświadczenie każdego roku.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_HAS_RACER_TT: "#default_text [GetPlayer.GetName] posiada [concept_vikelas_racer]. #!"
 MR_AUTORACING_RACE_TRACK_BUTTON_TRIGGER_TT: "#default_text [GetPlayer.GetName] posiada [concept_incorporated_state] z [GetBuildingType('building_urban_center').GetName] o #V poziomie 15 lub wyższym #!. #!"
 MR_AUTORACING_FOUND_TEAM_BUTTON: "Załóż zespół wyścigowy"
 MR_AUTORACING_FOUND_TEAM_BUTTON_TT: "#T Załóż zespół wyścigowy #!\nPosiadanie własnego producenta samochodów wyścigowych sprawia, że jesteśmy niezależni od importu i możemy rozwijać własne samochody wyścigowe. Wymaga to posiadania własnego przemysłu motoryzacyjnego oraz inżyniera, który opracuje podstawowe plany.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_AUTORACING_FOUND_TEAM_BUTTON_TRIGGER_TT: "#default_text [GetPlayer.GetName] posiada przynajmniej jeden [GetBuildingType('building_automotive_industry').GetName] poziomu #p 2 #! lub wyższy z #V Produkcja Samochodów #! [concept_production_method]. #!"
 MR_AUTORACING_RACE_TRACK_APPLY_BUTTON: "Aplikuj do cyklu Grand Prix"
 MR_AUTORACING_RACE_TRACK_APPLY_BUTTON_TT: "#T Aplikuj do cyklu Grand Prix #!\nJako członek Międzynarodowego Stowarzyszenia Motoryzacyjnego i właściciel nowoczesnego toru wyścigowego możemy ubiegać się o nadanie naszemu torowi statusu oficjalnego toru Grand Prix. Wyścigi Grand Prix odbywałyby się wtedy co roku, co znacznie poprawiłoby status toru.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_HAS_RACE_TRACK_TT: "#default_text [GetPlayer.GetName] posiada przynajmniej jeden [GetBuildingType('building_vikelas_circuit').GetName]. #!"
 MR_MAXIMUM_5_RACE_TRACKS_TT: "#default_text Mniej niż 5 krajów posiada [GetBuildingType('building_vikelas_circuit').GetName]. #!"
 MR_AIACR_PRESIDENT_BUTTON: "Zostań Prezesem AIACR"
 MR_AIACR_PRESIDENT_BUTTON_TT: "#T Zostań Prezesem AIACR #!\nBez aktywnego prezesa AIACR możemy zająć takie stanowisko. Zakłada to, że kontrolujemy siedzibę Międzynarodowego Stowarzyszenia Motoryzacyjnego.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_AIACR_CONTROLS_HQ_TRIGGER_TT: "#default_text [GetPlayer.GetName] kontroluje [GetBuildingType('building_vikelas_aiacr').GetName] #!."
 MR_AUTORACING_RACE_TRACK_DECLARE_BUTTON: "Ogłoś tor wyścigowy Grand Prix"
 MR_AUTORACING_RACE_TRACK_DECLARE_BUTTON_TT: "#T Ogłoś tor wyścigowy Grand Prix #!\nJako prezes AIACR mamy zaszczyt ogłosić jeden z naszych torów wyścigowych torem Grand Prix.[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_IS_AIACR_PRESIDENT_TT: "#default_text [GetPlayer.GetName] jest #V Prezesem AIACR #!. #!"
 MR_AUTORACING_FOUND_AIACR_BUTTON: "Stowarzyszenie Motoryzacyjne"
 MR_AUTORACING_FOUND_AIACR_BUTTON_TT: "#T Stowarzyszenie Motoryzacyjne #!\nWyścigi stają się coraz bardziej międzynarodowym sportem, w którym kierowcy rywalizują samochodami różnych marek z różnych krajów. Wiele krajów zaczęło organizować własne wyścigi bez żadnych porozumień. Aby lepiej skoordynować zasady i warunki, konieczne jest utworzenie międzynarodowego organu: Międzynarodowego Stowarzyszenia Motoryzacyjnego.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_AUTORACING_FOUND_AIACR_BUTTON_TRIGGER_TT: "#default_text #V Przynajmniej 10 innych krajów #! posiada #V Klub Samochodowy #!. #!"
 MR_AUTORACING_NO_PARTICIPATION_BUTTON_TT: "#T Anuluj udział w wyścigu #!\nW niektórych sytuacjach, np. gdy kierowca jest uważany za zbyt porywczego lub samochód jest zbyt niedopracowany, co może skutkować poważnym wypadkiem, sensowne może być zawieszenie udziału w wyścigach.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 vikelas_no_participation_tt: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] nie będzie brał udziału w żadnych wyścigach, dopóki nie dostanie ponownie zezwolenia na udział w wyścigach."
 MR_AUTORACING_PARTICIPATION_BUTTON_TT: "#T Udział w wyścigu #!\nPozwala zawodnikowi ponownie uczestniczyć we wszystkich wyścigach.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 vikelas_participation_tt: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] ponownie weźmie udział w wyścigach, jak zwykle."
 MR_AUTORACING_LONG_DISTANCE_NOT_ONGOING_TRIGGER_TT: "#default_text #R Żadne #! inne państwo aktualnie nie jest gospodarzem #V Wyścigu Długodystansowego #!. #!"
 MR_AUTORACING_LONG_DISTANCE_STATE_TRIGGER_TT: "#default_text [GetPlayer.GetName] posiada przynajmniej #V 5 [Concept('concept_state', '$concept_states$')] #!. #!"
 MR_AUTORACING_LONG_DISTANCE_MODIFIER_TRIGGER_TT: "#default_text [GetPlayer.GetName] #R nie #! był gospodarzem #V Wyścigu Długodystansowego #! w ostatnim czasie. #!"
 vikelas_no_race_team_type: "Brak"