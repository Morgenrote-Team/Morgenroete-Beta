l_polish:
 MR_PADDOCK_IMPROVE_ENGINE_BUTTON: "Ulepsz silnik"
 MR_PADDOCK_IMPROVE_ENGINE_BUTTON_TT: "#T Ulepsz silnik #!\nNowy silnik poprawia niezawodność i prędkość pojazdu.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PADDOCK_IMPROVE_SAFETY_BUTTON: "Popraw bezpieczeństwo"
 MR_PADDOCK_IMPROVE_SAFETY_BUTTON_TT: "#T Popraw bezpieczeństwo #!\nMechanik może wymyślić różne nowe techniki bezpieczeństwa, aby zapewnić bezpieczeństwo życia kierowcy wyścigowego.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PADDOCK_IMPROVE_BODY_BUTTON: "Ulepsz nadwozie"
 MR_PADDOCK_IMPROVE_BODY_BUTTON_TT: "#T Ulepsz nadwozie#!\nUlepszenie nadwozia zapewnia lepszą aerodynamikę, a tym samym większą prędkość, natomiast ulepszenie materiału zapewnia większe bezpieczeństwo.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MECHANIC_TRIGGER: "#default_text [GetPlayer.GetName] posiada [concept_vikelas_mechanic]. #!"
 MR_PADDOCK_50_MECHANIC_INNOVATION_TRIGGER_TT: "#default_text [GetPlayer.GetName] posiada #V 50 lub więcej #! [Concept('concept_vikelas_mechanic','$concept_vikelas_mechanical_innovation$')] (obecnie [GetPlayer.MakeScope.Var('vikelas_mechanical_innovation_var').GetValue|0+]). #!"
 MR_PADDOCK_100_MECHANIC_INNOVATION_TRIGGER_TT: "#default_text [GetPlayer.GetName] posiada #V 100 lub więcej #! [Concept('concept_vikelas_mechanic','$concept_vikelas_mechanical_innovation$')] (obecnie [GetPlayer.MakeScope.Var('vikelas_mechanical_innovation_var').GetValue|0+]). #!"
 MR_PADDOCK_150_MECHANIC_INNOVATION_TRIGGER_TT: "#default_text [GetPlayer.GetName] posiada #V 150 lub więcej #! [Concept('concept_vikelas_mechanic','$concept_vikelas_mechanical_innovation$')] (obecnie [GetPlayer.MakeScope.Var('vikelas_mechanical_innovation_var').GetValue|0+]). #!"
 MR_PADDOCK_MOTOR_INDUSTRY_LEVEL_5_TRIGGER_TT: "#default_text [GetPlayer.GetName] posiada w sumie #V 5 lub więcej [GetBuildingType('building_automotive_industry').GetName] poziomów budynku #!. #!"
 MR_PADDOCK_MOTOR_INDUSTRY_LEVEL_10_TRIGGER_TT: "#default_text [GetPlayer.GetName] posiada w sumie #V 10 lub więcej [GetBuildingType('building_automotive_industry').GetName] poziomów budynku #!. #!"
 MR_PADDOCK_TOOLING_WORKSHOPS_LEVEL_5_TRIGGER_TT: "#default_text [GetPlayer.GetName] posiada w sumie #V 5 lub więcej [GetBuildingType('building_tooling_workshop').GetName] poziomów budynku #!. #!"
