 MR_PADDOCK_HAS_RACING_CIRCUIT_TRIGGER_TT: "#default_text [GetPlayer.GetName] posiada [GetBuildingType('building_vikelas_circuit').GetName]. #!"
 MR_PADDOCK_FIRE_MECHANIC_BUTTON: "Zwolnij Mechanika"
 MR_PADDOCK_FIRE_MECHANIC_BUTTON_TT: "#T Zwolnij Mechanika #!\nZespoły wyścigowe mogą zatrudnić nowego mechanika, jeśli obecny mechanik nie spełnia oczekiwanych wymagań. Jednak nowy mechanik może zostać zatrudniony dopiero po upływie dwóch lat.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PADDOCK_FIRE_RACER_BUTTON: "Zwolnij Kierowce Rajdowego"
 MR_PADDOCK_FIRE_RACER_BUTTON_TT: "#T Zwolnij Kierowce Rajdowego #!\nW przeciwieństwie do dawnych kierowców-dżentelmenów, kierowcy zespołów wyścigowych nie są niezastąpieni. Po zatrudnieniu nowego kierowcy wyścigowego stanowisko to nie może być obsadzone przez dwa lata.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_HAS_MECHANIC_TT: "#default_text [GetPlayer.GetName] posiada [concept_vikelas_mechanic]. #!"
 MR_NOT_HAS_NEW_MECHANIC_TT: "#default_text [GetPlayer.GetName] #R nie #! zatrudniano [concept_vikelas_mechanic] w przeciągu ostatnich #V dwóch lat #!. #!"
 MR_NOT_HAS_NEW_RACER_TT: "#default_text [GetPlayer.GetName] #R nie #! zatrudniano [concept_vikelas_racer] w przeciągu ostatnich #V dwóch lat #!. #!"
 MR_PADDOCK_INNOVATION_TO_RESEARCH_BUTTON: "Przekonwertuj innowacje mechaniczne"
 MR_PADDOCK_INNOVATION_TO_RESEARCH_BUTTON_TT: "#T Przekonwertuj innowacje mechaniczne #!\nPrzekształć innowacje mechaniczne w punkty badawcze, aby cały kraj mógł czerpać korzyści z osiągnięć sportów motorowych.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
