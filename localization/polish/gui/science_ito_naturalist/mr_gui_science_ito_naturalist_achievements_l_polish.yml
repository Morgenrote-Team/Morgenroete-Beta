l_polish:
 MR_NATURALIST_ACHIEVEMENTS_TT: "[AddLocalizationIf( Scope.IsSet , 'ito_naturalist_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'ito_naturalist_no_naturalist_loc')]"
 ito_naturalist_achievements_loc: "$ito_naturalist_achievements_intro_loc$[Scope.GetCharacter.GetCustom('ito_naturalist_achievement_total_zoo_animals_type')][Scope.GetCharacter.GetCustom('ito_naturalist_achievement_total_wildlife_documentaries_type')][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_invented_evolution_theory_var').IsSet , Scope.Var('ito_naturalist_achievement_invented_evolution_theory_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_attended_hippocampus_congress_var').IsSet , Scope.Var('ito_naturalist_achievement_attended_hippocampus_congress_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_showed_evolution_in_peppered_moths_var').IsSet , Scope.Var('ito_naturalist_achievement_showed_evolution_in_peppered_moths_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_finished_pacific_expedition_var').IsSet , Scope.Var('ito_naturalist_achievement_finished_pacific_expedition_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_wallace_line_discovered_var').IsSet , Scope.Var('ito_naturalist_achievement_wallace_line_discovered_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_great_barrier_reef_discovered_var').IsSet , Scope.Var('ito_naturalist_achievement_great_barrier_reef_discovered_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_inaugurated_zoo_var').IsSet , Scope.Var('ito_naturalist_achievement_inaugurated_zoo_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_found_victoria_amazonica_var').IsSet , Scope.Var('ito_naturalist_achievement_found_victoria_amazonica_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_found_attacus_atlas_var').IsSet , Scope.Var('ito_naturalist_achievement_found_attacus_atlas_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_found_amorphophallus_titanum_var').IsSet , Scope.Var('ito_naturalist_achievement_found_amorphophallus_titanum_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_found_goliathus_var').IsSet , Scope.Var('ito_naturalist_achievement_found_goliathus_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_natualist_achievement_forestry_improvement_finished_var').IsSet , Scope.Var('ito_natualist_achievement_forestry_improvement_finished_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_rubber_improvement_finished_var').IsSet , Scope.Var('ito_naturalist_achievement_rubber_improvement_finished_var').GetFlagName)]"
 ito_naturalist_no_naturalist_loc: "#V Osiągnięcia tego [concept_dubois_naturalist]#! zostaną tutaj opisane, gdy tylko zostanie osiągnięte takie wyróżnienie."
 ito_naturalist_achievements_intro_loc: "#V Osiągnięcia tego przyrodnika#!\n #indent_newline:3 • [Scope.GetCharacter.GetFullName] jest utalentowanym przyrodnikiem, który skolekcjonował [Scope.Var('dubois_naturalist_total_specimens_var').GetValue|0*V] [Concept('concept_dubois_specimen','$concept_dubois_specimens$')]. #!"
 ito_naturalist_achievement_total_zoo_animals_loc: "\n #indent_newline:3 • Podczas [Scope.GetCharacter.GetHerHis] pracy jako przyrodnika, łącznie [Scope.GetVariable('ito_naturalist_total_zoo_animals_var').GetValue|0+] [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] zostało złapanych i przywiezionych do [GetPlayer.MakeScope.GetCountry.GetName]. #!"
 ito_naturalist_achievement_total_wildlife_documentaries_loc: "\n #indent_newline:3 • [GetPlayer.MakeScope.Var('ito_naturalist_var').GetCharacter.GetFullName] has rendered invaluable service to science by documenting [GetPlayer.MakeScope.Var('ito_naturalist_var').GetVariable('ito_character_num_animal_documentations_var').GetValue|0+] [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] in their native habitats, thus contributing to the advancement of natural history.#!"
 ito_naturalist_achievement_invented_evolution_theory_loc: "\n #indent_newline:3 • Jednym z [Scope.GetCharacter.GetHerHis] największych osiągnięć była publikacja \"#V O powstawaniu gatunków#!\", która jako pierwsza przedstawiała teorię ewolucji. #!"
 ito_naturalist_achievement_attended_hippocampus_congress_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] brał udział w debacie której celem było ustalenie czy człowiek jest wyjątkowy czy jest zwierzęciem takim jak wszystkie inne. #!"
 ito_naturalist_achievement_showed_evolution_in_peppered_moths_loc: "\n #indent_newline:3 • Profesor [Scope.GetCharacter.GetLastNameNoFormatting] pokazał że #V krępak nabrzozak ewoluuje#! w celu adaptacji do zmieniającego się środowiska, co jest dowodem na korzyść teorii ewolucji. #!"
 ito_naturalist_achievement_finished_pacific_expedition_loc: "\n #indent_newline:3 • Podczas #V ekspedycji na Ocean Spokojny#!, Dr. [Scope.GetCharacter.GetLastNameNoFormatting] obszernie badał florę i faunę tej krainy czarów. Odkrył [Scope.GetCharacter.GetSheHe] wiele nowych gatunków. #!"
 ito_naturalist_achievement_wallace_line_discovered_loc: "\n #indent_newline:3 • Podczas podróży przez Pacyfik [Scope.GetCharacter.GetLastNameNoFormatting] zauważył #V wyraźną granicę między florą i fauną Azji i Australii#!. To odkrycie wspiera teorię ewolucji i sugeruje masywną separację wysp w przeszłości. #!"
 ito_naturalist_achievement_inaugurated_zoo_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] był kluczowy w procesie #V otwarcia zoo#!, miejsca, w którym zwierzęta z odległych miejsc mogą być oglądane z bliska. #!"
 ito_naturalist_achievement_found_victoria_amazonica_loc: "\n #indent_newline:3 • Podczas ekspedycji botanicznej do Amazonii, Profesor [Scope.GetCharacter.GetLastNameNoFormatting] odkrył #V wiktorię królewską#!, unikalną lilię wodną której liście mogą mieć średnicę nawet 3 metrów. #!"
 ito_naturalist_achievement_found_attacus_atlas_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] odkrył #V ćmę tytaniczną#! podczas ekspedycji botanicznej do Indochin. To jeden z największych motyli na świecie, który produkuje bardzo solidny jedwab. #!"
 ito_naturalist_achievement_found_amorphophallus_titanum_loc: "\n #indent_newline:3 • Podczas eksplorowania Borneo w ramach ekspedycji botanicznej, Profesor [Scope.GetCharacter.GetLastNameNoFormatting] odkrył #V wielki kwiat#!, który rośnie aż do trzech metrów wysokości. Prawdziwy botaniczny cud. #!"
 ito_naturalist_achievement_found_goliathus_loc: "\n #indent_newline:3 • Lasy deszczowe Konga są domem dla wielu cudów. Jeden z nich został odkryty przez Dr. [Scope.GetCharacter.GetLastNameNoFormatting] podczas ekspedycji botanicznej. #V Chrząszcz goliat#! jest jednym z największych owadów na świecie i to w dodatku bardzo rzadkim. #!"
 ito_natualist_achievement_forestry_improvement_finished_loc: "\n #indent_newline:3 • Profesor [Scope.GetCharacter.GetLastNameNoFormatting] jest dobrze znany za [Scope.GetCharacter.GetHerHis] prace na temat lasów oraz sposobów ulepszania leśnictwa. #!"
 ito_naturalist_achievement_rubber_improvement_finished_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetHerHis|U] prace na plantacjach kauczuku i eksperymenty z najlepszymi warunkami wzrostu pozwoliły naszemu krajowi na masywne ulepszenie produkcji kauczuku. #!"
 ito_naturalist_achievement_great_barrier_reef_discovered_loc: "\n #indent_newline:3 • Podczas Ekspedycji Pacyficznej Dr. [Scope.GetCharacter.GetLastNameNoFormatting] eksplorował szczegółowo #V Wielką Rafę Koralową#! i jako pierwszy naukowiec uznał jej wartość. #!"