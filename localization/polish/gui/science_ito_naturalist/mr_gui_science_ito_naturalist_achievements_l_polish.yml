 ito_naturalist_achievements_loc: "$ito_naturalist_achievements_intro_loc$[Scope.GetCharacter.GetCustom('ito_naturalist_achievement_total_zoo_animals_type')][Scope.GetCharacter.GetCustom('ito_naturalist_achievement_total_wildlife_documentaries_type')][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_invented_evolution_theory_var').IsSet , Scope.Var('ito_naturalist_achievement_invented_evolution_theory_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_attended_hippocampus_congress_var').IsSet , Scope.Var('ito_naturalist_achievement_attended_hippocampus_congress_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_showed_evolution_in_peppered_moths_var').IsSet , Scope.Var('ito_naturalist_achievement_showed_evolution_in_peppered_moths_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_finished_pacific_expedition_var').IsSet , Scope.Var('ito_naturalist_achievement_finished_pacific_expedition_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_wallace_line_discovered_var').IsSet , Scope.Var('ito_naturalist_achievement_wallace_line_discovered_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_inaugurated_zoo_var').IsSet , Scope.Var('ito_naturalist_achievement_inaugurated_zoo_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_found_victoria_amazonica_var').IsSet , Scope.Var('ito_naturalist_achievement_found_victoria_amazonica_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_found_attacus_atlas_var').IsSet , Scope.Var('ito_naturalist_achievement_found_attacus_atlas_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_found_amorphophallus_titanum_var').IsSet , Scope.Var('ito_naturalist_achievement_found_amorphophallus_titanum_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_found_goliathus_var').IsSet , Scope.Var('ito_naturalist_achievement_found_goliathus_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_natualist_achievement_forestry_improvement_finished_var').IsSet , Scope.Var('ito_natualist_achievement_forestry_improvement_finished_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_rubber_improvement_finished_var').IsSet , Scope.Var('ito_naturalist_achievement_rubber_improvement_finished_var').GetFlagName)]" #deepl:3859703363
 ito_naturalist_no_naturalist_loc: "Osiągnięcia #V tego [concept_dubois_naturalist]#! będą wyświetlane tutaj, gdy tylko je zdobędziesz." #deepl:2308010664
 ito_naturalist_achievements_intro_loc: "#V Osiągnięcia tego przyrodnika#!\n[Scope.GetCharacter.GetFullName] jest wybitnym przyrodnikiem, który zebrał [Scope.Var('dubois_naturalist_total_specimens_var').GetValue|0*V] [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] ." #deepl:2770611838

 ito_naturalist_achievement_total_zoo_animals_loc: "\Podczas kadencji [Scope.GetCharacter.GetHerHis] jako przyrodnik, łącznie [Scope.GetVariable('ito_naturalist_total_zoo_animals_var').GetValue|0+] [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] zostały schwytane i przywiezione do [GetPlayer.MakeScope.GetCountry.GetName]." #deepl:3523686073
 ito_naturalist_achievement_total_wildlife_documentaries_loc: "\n[GetPlayer.MakeScope.Var('dubois_naturalist_var').GetCharacter.GetFullName] jest dobrze znany z dokumentowania [GetPlayer.MakeScope.Var('dubois_naturalist_var').GetVariable('ito_character_num_animal_documentations_var').GetValue|0+] [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] w ich naturalnym środowisku." #deepl:2453492304
 ito_naturalist_achievement_invented_evolution_theory_loc: "\Jednym z największych osiągnięć [Scope.GetCharacter.GetHerHis] była książka "#V O pochodzeniu gatunków#!", w której po raz pierwszy opisano teorię ewolucji." #deepl:510074125
 ito_naturalist_achievement_attended_hippocampus_congress_loc: "\Dr [Scope.GetCharacter.GetLastNameNoFormatting] uczestniczył w debacie, która ustaliła, czy człowiek jest wyjątkowy, czy tylko zwierzęciem takim jak wszystkie inne." #deepl:1532833643
 ito_naturalist_achievement_showed_evolution_in_peppered_moths_loc: "\Profesor [Scope.GetCharacter.GetLastNameNoFormatting] wykazał, że ćma #V Peppered Moth ewoluuje#!, aby dostosować się do zmieniającego się środowiska. Dowód na teorię ewolucji." #deepl:4279082533
 ito_naturalist_achievement_finished_pacific_expedition_loc: "\Podczas wyprawy #V na Ocean Spokojny#!, dr [Scope.GetCharacter.GetLastNameNoFormatting] intensywnie badał florę i faunę tej cudownej krainy. [Scope.GetCharacter.GetSheHe] odkrył wiele nowych gatunków." #deepl:1584400015
 ito_naturalist_achievement_wallace_line_discovered_loc: "\Podczas podróży po Pacyfiku [Scope.GetCharacter.GetLastNameNoFormatting] zauważył #V wyraźną separację między azjatycką i australijską florą i fauną#!. Odkrycie to wspiera teorię ewolucji i sugeruje masowe oddzielenie się wysp w przeszłości." #deepl:970429435
 ito_naturalist_achievement_inaugurated_zoo_loc: "\n[Scope.GetCharacter.GetLastNameNoFormatting] odegrał kluczową rolę w #V otwarciu zoo#!. Miejsce, w którym zwierzęta z odległych miejsc można zobaczyć z bliska." #deepl:915470862
 ito_naturalist_achievement_found_victoria_amazonica_loc: "\Podczas ekspedycji botanicznej do amazońskiego lasu deszczowego profesor [Scope.GetCharacter.GetLastNameNoFormatting] znalazł #V Giant Waterlily#!. Unikalna roślina, która może wyhodować liście o średnicy do 3 metrów." #deepl:3652726149
 ito_naturalist_achievement_found_attacus_atlas_loc: "\Dr [Scope.GetCharacter.GetLastNameNoFormatting] znalazł #V Titanic Moth#! podczas wyprawy botamicznej w Indochinach. Jest to jeden z największych motyli na świecie i produkuje bardzo wytrzymały jedwab." #deepl:3954278434
 ito_naturalist_achievement_found_amorphophallus_titanum_loc: "\nPodczas eksploracji Borneo podczas wyprawy botanicznej, profesor [Scope.GetCharacter.GetLastNameNoFormatting] znalazł #V Ogromny kwiat#!, który dorasta do 3 metrów wysokości. Prawdziwy botaniczny cud." #deepl:998846928
 ito_naturalist_achievement_found_goliathus_loc: "\Lasy deszczowe Kongo kryją w sobie wiele cudów. Jeden z nich został odkryty przez dr [Scope.GetCharacter.GetLastNameNoFormatting] podczas wyprawy botanicznej. Chrząszcz #V Goliath Beetle#! jest jednym z największych owadów na świecie i najwyraźniej dość rzadkim." #deepl:3755908676
 ito_natualist_achievement_forestry_improvement_finished_loc: "\Profesor [Scope.GetCharacter.GetLastNameNoFormatting] jest dobrze znany z pracy [Scope.GetCharacter.GetHerHis] na temat lasów i sposobów poprawy leśnictwa." #deepl:3521424779
 ito_naturalist_achievement_rubber_improvement_finished_loc: "[Scope.GetCharacter.GetHerHis|U] \Praca na plantacjach kauczuku i eksperymenty z najlepszymi warunkami uprawy pozwoliły naszemu krajowi znacznie poprawić produkcję kauczuku." #deepl:1444884744
