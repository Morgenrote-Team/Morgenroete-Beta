 andersson_anthropologist_achievement_total_identified_human_fossils_anthropologist_loc: "\Na stronie[ROOT.Var('lepsius_anthropologist_var').GetCharacter.GetSheHe|U] zidentyfikowano łącznie [Scope.Var('lepsius_total_identified_human_fossils_anthropologist_var').GetValue|V0] ludzkich skamieniałości." #deepl:3015431739
 andersson_anthropologist_achievement_attended_origin_congress_loc: "\Profesor [Scope.GetCharacter.GetLastNameNoFormatting] uczestniczył w kongresie na temat #V pochodzenia współczesnego człowieka#!." #deepl:2823441805
 andersson_anthropologist_achievement_exposed_piltdown_fraud_loc: "\Dzięki [ROOT.Var('lepsius_anthropologist_var').GetCharacter.GetHerHim] #V  Piltdown Human został zdemaskowany jako oszustwo#!." #deepl:1017420061
 andersson_anthropologist_achievement_invented_anthropology_loc: "Dr [Scope.GetCharacter.GetLastNameNoFormatting] jest pierwszym naukowcem, który skrupulatnie i bardzo precyzyjnie rejestrował ludzkie kości i szkielety. [Scope.GetCharacter.GetSheHe] jest postrzegany jako #V pionier antropologii#!." #deepl:3155653452
 andersson_anthropologist_achievement_completed_cromagnon_anthropologist_loc: "\n[ROOT.Var('lepsius_anthropologist_var').GetCharacter.GetSheHe|U] po raz pierwszy naukowo #V sklasyfikował Cro-Magnon#!." #deepl:69566943
 andersson_anthropologist_achievement_completed_neanderthalensis_anthropologist_loc: "\Dr [Scope.GetCharacter.GetLastNameNoFormatting] był pierwszą osobą, która #V umieściła neandertalczyka w systematyce człowieka prehistorycznego#!." #deepl:523665278
 andersson_anthropologist_achievement_completed_erectus_anthropologist_loc: "\Zasługą [ROOT.Var('lepsius_anthropologist_var').GetCharacter.GetHerHis] było to, że nieznany wcześniej #V Homo Erectus stał się uchwytny jako gatunek ludzki#!." #deepl:991432050
 andersson_anthropologist_achievement_completed_australopithecus_anthropologist_loc: "\Profesor [Scope.GetCharacter.GetLastNameNoFormatting] był pierwszym, któremu udało się rozszyfrować pierwsze #V sekrety Australopithecus#! i wyciągnąć wnioski na temat jego sposobu życia i wyglądu." #deepl:994811918
 andersson_anthropologist_achievement_completed_paranthropus_anthropologist_loc: "\Niewielu osobom udało się #V zrekonstruować prehistorycznego człowieka#! na podstawie kilku kości, umożliwiając tym samym wyciągnięcie wniosków na temat jego środowiska życia. Dr. [Scope.GetCharacter.GetLastNameNoFormatting] udało się to w przypadku #V Paranthropus#!." #deepl:2683346481
