t_achievement_completed_erectus_anthropologist_var').IsSet , Scope.Var('andersson_anthropologist_achievement_completed_erectus_anthropologist_var').GetFlagName)][AddLocalizationIf( Scope.Var('andersson_anthropologist_achievement_completed_australopithecus_anthropologist_var').IsSet , Scope.Var('andersson_anthropologist_achievement_completed_australopithecus_anthropologist_var').GetFlagName)][AddLocalizationIf( Scope.Var('andersson_anthropologist_achievement_completed_paranthropus_anthropologist_var').IsSet , Scope.Var('andersson_anthropologist_achievement_completed_paranthropus_anthropologist_var').GetFlagName)][AddLocalizationIf( Scope.Var('andersson_anthropologist_achievement_completed_heidelbergensis_anthropologist_var').IsSet , Scope.Var('andersson_anthropologist_achievement_completed_heidelbergensis_anthropologist_var').GetFlagName)]"
 lepsius_anthropologist_no_anthropologist_loc: "#V Osiągnięcia tego [concept_lepsius_anthropologist]#! będą wyświetlane tutaj, gdy będziesz go mieć."
 lepsius_anthropologist_achievements_intro_loc: "#V Osiągnięcia tego antropologa#!\n[Scope.GetCharacter.GetFullName] jest [Scope.GetCharacter.GetCustom('lepsius_anthropologist_experience_level_type')]."
 andersson_anthropologist_achievement_famous_level_anthropologist_overview_loc: "sławnym [concept_lepsius_anthropologist]"
 andersson_anthropologist_achievement_experienced_level_anthropologist_overview_loc: "doświadczonym [concept_lepsius_anthropologist]"
 andersson_anthropologist_achievement_normal_level_anthropologist_overview_loc: "znakomitym [concept_lepsius_anthropologist]"
 andersson_anthropologist_achievement_total_human_fossils_anthropologist_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] znalazł łącznie [Scope.Var('lepsius_total_human_fossils_anthropologist_var').GetValue|V0] ludzkich kości. Te skamieniałości obejmują"
 andersson_anthropologist_achievement_no_human_fossils_anthropologist_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] nie znalazł jeszcze żadnych ludzkich kości."
 andersson_anthropologist_achievement_total_cromagnon_fossils_anthropologist_comma_loc: "[Scope.Var('lepsius_total_cromagnon_fossils_anthropologist_var').GetValue|V0] kości człowieka z Cro-Magnon,"
 andersson_anthropologist_achievement_total_cromagnon_fossils_anthropologist_no_comma_loc: "[Scope.Var('lepsius_total_cromagnon_fossils_anthropologist_var').GetValue|V0] kości człowieka z Cro-Magnon"
 andersson_anthropologist_achievement_total_neanderthalensis_fossils_anthropologist_comma_loc: "[Scope.Var('lepsius_total_neanderthalensis_fossils_anthropologist_var').GetValue|V0] kości Neandertalczyków,"
 andersson_anthropologist_achievement_total_neanderthalensis_fossils_anthropologist_no_comma_loc: "[Scope.Var('lepsius_total_neanderthalensis_fossils_anthropologist_var').GetValue|V0] kości Neandertalczyków"
 andersson_anthropologist_achievement_total_erectus_fossils_anthropologist_comma_loc: "[Scope.Var('lepsius_total_erectus_fossils_anthropologist_var').GetValue|V0] kości Homo Erectus,"
 andersson_anthropologist_achievement_total_erectus_fossils_anthropologist_no_comma_loc: "[Scope.Var('lepsius_total_erectus_fossils_anthropologist_var').GetValue|V0] kości Homo Erectus"
 andersson_anthropologist_achievement_total_australopithecus_fossils_anthropologist_comma_loc: "[Scope.Var('lepsius_total_australopithecus_fossils_anthropologist_var').GetValue|V0] kości Australopiteków,"
 andersson_anthropologist_achievement_total_australopithecus_fossils_anthropologist_no_comma_loc: "[Scope.Var('lepsius_total_australopithecus_fossils_anthropologist_var').GetValue|V0] kości Australopiteków"
 andersson_anthropologist_achievement_total_paranthropus_fossils_anthropologist_loc: "[Scope.Var('lepsius_total_paranthropus_fossils_anthropologist_var').GetValue|V0] kości Parantropów"
 andersson_anthropologist_achievement_total_identified_human_fossils_anthropologist_loc: "\n[ROOT.Var('lepsius_anthropologist_var').GetCharacter.GetSheHe|U] zidentyfikował łącznie [Scope.Var('lepsius_total_identified_human_fossils_anthropologist_var').GetValue|V0] ludzkich kości"
 andersson_anthropologist_achievement_attended_origin_congress_loc: "\nProfesor [Scope.GetCharacter.GetLastNameNoFormatting] wziął udział w Kongresie na temat #V pochodzenia człowieka współczesnego#!."
 andersson_anthropologist_achievement_exposed_piltdown_fraud_loc: "\nDzięki [ROOT.Var('lepsius_anthropologist_var').GetCharacter.GetHerHim] badaniom #V ujawniono, że człowiek z Piltdown to fałszerstwo#!."
 andersson_anthropologist_achievement_invented_anthropology_loc: "Dr. [Scope.GetCharacter.GetLastNameNoFormatting] to pierwszy naukowiec który skrupulatnie i precyzyjnie opisał ludzkie kości szkielety. Jest [Scope.GetCharacter.GetSheHe] widziany jako #V ojciec antropologii#!."
 andersson_anthropologist_achievement_completed_cromagnon_anthropologist_loc: "\n[ROOT.Var('lepsius_anthropologist_var').GetCharacter.GetSheHe|U] jako pierwszy naukowo #V sklasyfikował człowieka z Cro-Magnon#!."
 andersson_anthropologist_achievement_completed_neanderthalensis_anthropologist_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] był pierwszą osobą która #V wprowadziła Neandertalczyka do systematyki człowieka prehistorycznego#!."
 andersson_anthropologist_achievement_completed_erectus_anthropologist_loc: "\nDzięki [ROOT.Var('lepsius_anthropologist_var').GetCharacter.GetHerHis] badaniom wcześniej nieznany #V Homo Erectus został zidentyfikowany jako gatunek człowieka#!."
 andersson_anthropologist_achievement_completed_australopithecus_anthropologist_loc: "\nProfesor [Scope.GetCharacter.GetLastNameNoFormatting] jako pierwszy z powodzeniem odkrył pierwsze #V sekrety australopiteka#! i doszedł do konkluzji na temat jego sposobu życia i wyglądu."
 andersson_anthropologist_achievement_completed_paranthropus_anthropologist_loc: "\nNiewielu ludzi odniosło sukces #V próbując zrekonstruować prehistorycznego człowieka#! z kilku kości, umożliwiając w ten sposób wyprowadzanie konkluzji na temat jego środowiska życiowego. Dr. [Scope.GetCharacter.GetLastNameNoFormatting] odniósł sukces w tej dziedzinie jeżeli chodzi o #V parantropa#!."