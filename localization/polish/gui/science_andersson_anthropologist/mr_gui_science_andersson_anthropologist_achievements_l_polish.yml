 andersson_anthropologist_achievement_total_human_fossils_anthropologist_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] znalazł łącznie [Scope.Var('lepsius_total_human_fossils_anthropologist_var').GetValue|V0] ludzkich kości. Te skamieniałości obejmują"
