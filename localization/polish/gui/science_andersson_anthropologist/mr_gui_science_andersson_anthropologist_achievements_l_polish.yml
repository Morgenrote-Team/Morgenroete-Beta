 andersson_anthropologist_achievement_total_identified_human_fossils_anthropologist_loc: "\n #indent_newline:3 • [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetSheHe|U] zidentyfikował łącznie [Scope.Var('lepsius_total_identified_human_fossils_anthropologist_var').GetValue|V0] ludzkich kości. #!"
 andersson_anthropologist_achievement_attended_origin_congress_loc: "\n #indent_newline:3 • Profesor [Scope.GetCharacter.GetLastNameNoFormatting] wziął udział w Kongresie na temat #V pochodzenia człowieka współczesnego#!. #!"
 andersson_anthropologist_achievement_exposed_piltdown_fraud_loc: "\n #indent_newline:3 • Dzięki [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetHerHim] badaniom #V ujawniono, że człowiek z Piltdown to fałszerstwo#!. #!"
 andersson_anthropologist_achievement_invented_anthropology_loc: "\n  #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] to pierwszy naukowiec który skrupulatnie i precyzyjnie opisał ludzkie kości szkielety. Jest [Scope.GetCharacter.GetSheHe] widziany jako #V ojciec antropologii#!. #!"
 andersson_anthropologist_achievement_completed_cromagnon_anthropologist_loc: "\n #indent_newline:3 • [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetSheHe|U] jako pierwszy naukowo #V sklasyfikował człowieka z Cro-Magnon#!. #!"
 andersson_anthropologist_achievement_completed_neanderthalensis_anthropologist_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] był pierwszą osobą która #V wprowadziła Neandertalczyka do systematyki człowieka prehistorycznego#!. #!"
 andersson_anthropologist_achievement_completed_erectus_anthropologist_loc: "\n #indent_newline:3 • Dzięki [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetHerHis] badaniom wcześniej nieznany #V Homo Erectus został zidentyfikowany jako gatunek człowieka#!. #!"
 andersson_anthropologist_achievement_completed_australopithecus_anthropologist_loc: "\n #indent_newline:3 • Profesor [Scope.GetCharacter.GetLastNameNoFormatting] jako pierwszy z powodzeniem odkrył pierwsze #V sekrety australopiteka#! i doszedł do konkluzji na temat jego sposobu życia i wyglądu. #!"
 andersson_anthropologist_achievement_completed_paranthropus_anthropologist_loc: "\n #indent_newline:3 • Niewielu ludzi odniosło sukces #V próbując zrekonstruować prehistorycznego człowieka#! z kilku kości, umożliwiając w ten sposób wyprowadzanie konkluzji na temat jego środowiska życiowego. Dr. [Scope.GetCharacter.GetLastNameNoFormatting] odniósł sukces w tej dziedzinie jeżeli chodzi o #V parantropa#!. #!"