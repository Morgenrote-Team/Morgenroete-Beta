l_polish:
 MR_GORDON_BENNETT_CUP_BUTTON: "Puchar Gordona Bennetta"
 MR_GORDON_BENNETT_CUP_BUTTON_TT: "#T Puchar Gordona Bennetta #! \n Puchar Gordona Bennetta (lub Coupe Aéronautique Gordon Bennett) to najstarsze na świecie zawody balonowe--. Nazywane „niebieską wstążką” aeronautyki, wydarzenie to było sponsorowane przez Jamesa Gordona Bennetta Jr., sportowca milionera i właściciela gazety New York Herald. Cytując organizatorów cel zawodów „jest prosty: przelecieć jak najdalej od miejsca startu”. Zawody odbywały się w latach 1906–1938,+ z przerwą w latach 1914–1919 spowodowaną I wojną światową oraz w 1931 roku. \n\n [ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GORDON_BENNETT_PUBLISHER_BUILDING_TRIGGER_TT: "#default_text [GetPlayer.GetName] ma w sumie #V 10 lub więcej [GetBuildingType('building_manzoni_publishing_industry').GetName] poziomów posiadłości #!. #!"