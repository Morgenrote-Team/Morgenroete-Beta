l_polish:
 mr_science_geologist_tab_organization: "Organizacja"
 MR_GEOLOGIST_HIGHEST_MOUNTAIN_BUTTON: "Najwyższa Góra"
 MR_GEOLOGIST_HIGHEST_MOUNTAIN_BUTTON_TT: "#T Najwyższa Góra #!\n Od XVIII wieku dotychczasowy światopogląd geologiczny ulega coraz większym wstrząsom. Chociaż Andy przez długi czas uważano za najwyższe pasmo górskie świata, coraz większą popularność zyskują Himalaje. Poszukiwanie najwyższej góry pobudza wyobraźnię geologów, ale nadal jest dalekie od zakończenia.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GEOLOGIST_HIMALAYAS_ACCESS_TRIGGER_TT: "#default_text [GetPlayer.GetName] posiada zadeklarowany interes w regionie Himalajów. #!"
 MR_GEOLOGIST_NO_HIMALAYA_SURVEY_TRIGGER_TT: "#default_text Żadne inne państwo nie prowadzi obecnie poszukiwań najwyższej góry w Himalajach. #!"
 MR_GEOLOGIST_URANIUM_BUTTON: "Wyprawa w poszukiwaniu uranu"
 MR_GEOLOGIST_URANIUM_BUTTON_TT: "#T Wyprawa w poszukiwaniu uranu #! \n Geolog może poszukiwać złóż uranu za granicą i ewentualnie założyć tam własną kopalnię. Jednak aby uzyskać uran w naszym kraju, musimy zawrzeć odrębną umowę. Proces ten może trwać nawet pięć lat.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GEOLOGIST_FIND_URANIUM_TRIGGER_TT: "#default_text Istnieje co najmniej jedno nieodkryte złoże uranu. #!"
 MR_GEOLOGIST_URANIUM_STOP_BUTTON_TT: "#T Wyprawa w poszukiwaniu uranu #! \n Twój [concept_agassiz_geologist] obecnie poszukuje nieznanych złóż uranu na całym świecie.\n\n [ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 mr_geologist_uranium_stop_button_effect_tt: "Twój [concept_agassiz_geologist] zaprzestanie szukania uranu."