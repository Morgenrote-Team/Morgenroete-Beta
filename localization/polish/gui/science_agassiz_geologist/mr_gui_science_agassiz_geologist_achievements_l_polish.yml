l_polish:
 MR_GEOLOGIST_ACHIEVEMENTS: "[AddLocalizationIf( Scope.IsSet , 'agassiz_geologist_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'agassiz_geologist_no_geologist_loc')]"
 agassiz_geologist_achievements_loc: "$agassiz_geologist_achievements_intro_loc$[AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_invented_seismology_var').IsSet , Scope.Var('agassiz_geologist_achievement_invented_seismology_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_invented_plate_tectonics_var').IsSet , Scope.Var('agassiz_geologist_achievement_invented_plate_tectonics_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_attended_geologist_congress_var').IsSet , Scope.Var('agassiz_geologist_achievement_attended_geologist_congress_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_explored_volcano_var').IsSet , Scope.Var('agassiz_geologist_achievement_explored_volcano_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_discovered_helium_on_earth_var').IsSet , Scope.Var('agassiz_geologist_achievement_discovered_helium_on_earth_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_finished_pacific_expedition_var').IsSet , Scope.Var('agassiz_geologist_achievement_finished_pacific_expedition_var').GetFlagName)][AddLocalizationIf( Scope.Var('aagassiz_geologist_achievement_ring_of_fire_discovered_var').IsSet , Scope.Var('agassiz_geologist_achievement_ring_of_fire_discovered_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_moon_impact_var').IsSet , Scope.Var('agassiz_geologist_achievement_moon_impact_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_returned_from_center_of_earth_var').IsSet , Scope.Var('agassiz_geologist_achievement_returned_from_center_of_earth_var').GetFlagName)]"
 agassiz_geologist_no_geologist_loc: "#V Osiągnięcia tego [concept_agassiz_geologist]#! będą wyświetlane tutaj, gdy będziesz go mieć."
 agassiz_geologist_achievements_intro_loc: "#V Osiągnięcia tego geologa #! \n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] jest znakomitym geologiem, który zebrał [Scope.GetVariable('agassiz_geologist_minerals_var').GetValue|0V] [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')] i [Scope.GetVariable('agassiz_geologist_rare_minerals_var').GetValue|0V] [Concept('concept_agassiz_rare_mineral','$concept_agassiz_rare_minerals$')]. [Scope.GetCharacter.GetHerHis|U] badania w geologii dostarczyły nam [Scope.GetVariable('agassiz_geologist_geological_knowledge_var').GetValue|0V] [concept_agassiz_geological_knowledge]. #!"
 agassiz_geologist_achievement_invented_seismology_loc: "\n #indent_newline:3 • #V Wynalezienie sejsmologii#! to jedno z największych osiągnięć Dr. [Scope.GetCharacter.GetLastNameNoFormatting]. Pozwala na przewidywanie trzęsień ziemi i wybuchów wulkanów. #!"
 agassiz_geologist_achievement_invented_plate_tectonics_loc: "\n #indent_newline:3 • Czy #V stworzenie teorii płyt tektonicznych#! jest jednym z największych osiągnięć Dr. [Scope.GetCharacter.GetLastNameNoFormatting]? Jako że nie wszyscy [Scope.GetCharacter.GetHerHis] współpracownicy akceptują tą teorię, dopiero przyszłość powie, czy będzie ona uznana za [Scope.GetCharacter.GetHerHis] najważniejsze odkrycie czy zostanie zapomniana. #!"
 agassiz_geologist_achievement_attended_geologist_congress_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting]#V wziął udział w Kongresie Geologicznym na temat płyt tektonicznych#!. #!"
 agassiz_geologist_achievement_explored_volcano_loc: "\n #indent_newline:3 • #V Eksploracja wulkanu#! jest niebezpieczną misją, ale Dr. [Scope.GetCharacter.GetLastNameNoFormatting] wiele się nauczył podczas wyprawy na jeden z nich. #!"
 agassiz_geologist_achievement_discovered_helium_on_earth_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] was the first person to #V discover Helium on Earth#! which will surely be a very useful resource in the future.#!"
 agassiz_geologist_achievement_finished_pacific_expedition_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetFullNameNoFormatting] brał udział w#V Ekspedycji Pacyficznej#!. #!"
 agassiz_geologist_achievement_returned_from_center_of_earth_loc: "\n #indent_newline:3 • Podobno Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V osiągnął jądro Ziemi#! i wrócił stamtąd na powierzchnię. Ale czy ta historia jest prawdziwa? #!"
 agassiz_geologist_achievement_moon_impact_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] jest autorem hipotezy, według której #V Księżyc uformował się po tym, jak duże, nieznane ciało niebieskie zderzyło się z Ziemią#!. Bardzo spekulatywna teoria, ale za to bardzo oryginalna. #!"
 agassiz_geologist_achievement_ring_of_fire_discovered_loc: "\n #indent_newline:3 • Podczas #V ekspedycji na Ocean Spokojny#!, Dr. [Scope.GetCharacter.GetLastNameNoFormatting] odnotował sporą koncentrację wulkanów na skraju oceanu - #V Pierścień Ognia#! - i wierzy, że to nie jest przypadek. [Scope.GetCharacter.GetSheHe|U] dodał w ten sposób rozpędu badaniom geologicznym. #!"