l_polish:
 MR_GEOLOGIST_ACHIEVEMENTS: "[AddLocalizationIf( Scope.IsSet , 'agassiz_geologist_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'agassiz_geologist_no_geologist_loc')]"
 agassiz_geologist_achievements_loc: "$agassiz_geologist_achievements_intro_loc$[AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_invented_seismology_var').IsSet , Scope.Var('agassiz_geologist_achievement_invented_seismology_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_invented_plate_tectonics_var').IsSet , Scope.Var('agassiz_geologist_achievement_invented_plate_tectonics_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_attended_geologist_congress_var').IsSet , Scope.Var('agassiz_geologist_achievement_attended_geologist_congress_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_explored_volcano_var').IsSet , Scope.Var('agassiz_geologist_achievement_explored_volcano_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_discovered_helium_on_earth_var').IsSet , Scope.Var('agassiz_geologist_achievement_discovered_helium_on_earth_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_finished_pacific_expedition_var').IsSet , Scope.Var('agassiz_geologist_achievement_finished_pacific_expedition_var').GetFlagName)][AddLocalizationIf( Scope.Var('aagassiz_geologist_achievement_ring_of_fire_discovered_var').IsSet , Scope.Var('agassiz_geologist_achievement_ring_of_fire_discovered_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_moon_impact_var').IsSet , Scope.Var('agassiz_geologist_achievement_moon_impact_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_returned_from_center_of_earth_var').IsSet , Scope.Var('agassiz_geologist_achievement_returned_from_center_of_earth_var').GetFlagName)]"
 agassiz_geologist_no_geologist_loc: "#V Osiągnięcia tego [concept_agassiz_geologist]#! będą wyświetlane tutaj, gdy będziesz go mieć."
 agassiz_geologist_achievements_intro_loc: "#V Osiągnięcia tego geologa#!\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] jest znakomitym geologiem, który zebrał [Scope.GetVariable('agassiz_geologist_minerals_var').GetValue|0V] [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')] i [Scope.GetVariable('agassiz_geologist_rare_minerals_var').GetValue|0V] [Concept('concept_agassiz_rare_mineral','$concept_agassiz_rare_minerals$')]. [Scope.GetCharacter.GetHerHis|U] badania w geologii dostarczyły nam [Scope.GetVariable('agassiz_geologist_geological_knowledge_var').GetValue|0V] [concept_agassiz_geological_knowledge]."
 agassiz_geologist_achievement_invented_seismology_loc: "\n#V Wynalezienie sejsmologii#! to jedno z największych osiągnięć Dr. [Scope.GetCharacter.GetLastNameNoFormatting]. Pozwala na przewidywanie trzęsień ziemi i wybuchów wulkanów."
 agassiz_geologist_achievement_invented_plate_tectonics_loc: "\nCzy #V stworzenie teorii płyt tektonicznych#! jest jednym z największych osiągnięć Dr. [Scope.GetCharacter.GetLastNameNoFormatting]? Jako że nie wszyscy [Scope.GetCharacter.GetHerHis] współpracownicy akceptują tą teorię, dopiero przyszłość powie, czy będzie ona uznana za [Scope.GetCharacter.GetHerHis] najważniejsze odkrycie czy zostanie zapomniana."
 agassiz_geologist_achievement_attended_geologist_congress_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting]#V wziął udział w Kongresie Geologicznym na temat płyt tektonicznych#!."
 agassiz_geologist_achievement_explored_volcano_loc: "\n#V Eksploracja wulkanu#! jest niebezpieczną misją, ale Dr. [Scope.GetCharacter.GetLastNameNoFormatting] wiele się nauczył podczas wyprawy na jeden z nich."
 agassiz_geologist_achievement_discovered_helium_on_earth_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] był pierwszą osobą, która#V odkryła hel na Ziemi#!, który w przyszłości z pewnością będzie bardzo użytecznym zasobem."
 agassiz_geologist_achievement_finished_pacific_expedition_loc: "\n[Scope.GetCharacter.GetFullNameNoFormatting] brał udział w#V Ekspedycji Pacyficznej#!."
 agassiz_geologist_achievement_returned_from_center_of_earth_loc: "\nPodobno Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V osiągnął jądro Ziemi#! i wrócił stamtąd na powierzchnię. Ale czy ta historia jest prawdziwa?"
 mr_science_geologist_tab_organization: "Organization"
 MR_GEOLOGIST_HIGHEST_MOUNTAIN_BUTTON: "The Highest Mountain"
 MR_GEOLOGIST_HIGHEST_MOUNTAIN_BUTTON_TT: "#T The Highest Mountain#!\nSince the 18th century, the existing geological worldview has been increasingly shaken. While the Andes were long considered the world's highest mountain range, the Himalayas are increasingly coming to the fore. The search for the highest mountain has fueled the imagination of geologists—but is still far from over.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GEOLOGIST_HIMALAYAS_ACCESS_TRIGGER_TT: "#default_text [GetPlayer.GetName] has an interest in the Himalayas region.#!"
 MR_GEOLOGIST_NO_HIMALAYA_SURVEY_TRIGGER_TT: "#default_text No other nation is currently exploring the Himalayas for the highest mountain.#!"
 agassiz_geologist_achievement_moon_impact_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] hypothesized that the #V Moon was formed when an unknown, large celestial body collided with the Earth#!. A highly speculative theory, but one with great originality."
 agassiz_geologist_achievement_ring_of_fire_discovered_loc: "\nOn an #V Expedition to the Pacific Ocean#!, Dr. [Scope.GetCharacter.GetLastNameNoFormatting] noted the massive concentration of volcanoes at the edge of the ocean - the #V Ring of Fire#! - and believes this was no coincidence. [Scope.GetCharacter.GetSheHe|U] thus provided an important impetus to geological research."