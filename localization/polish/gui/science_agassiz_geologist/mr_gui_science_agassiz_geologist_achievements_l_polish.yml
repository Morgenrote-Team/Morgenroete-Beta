 MR_GEOLOGIST_ACHIEVEMENTS: "[AddLocalizationIf( Scope.IsSet , 'agassiz_geologist_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'agassiz_geologist_no_geologist_loc')]" #deepl:4065666483

 agassiz_geologist_achievements_loc: "$agassiz_geologist_achievements_intro_loc$[AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_invented_seismology_var').IsSet , Scope.Var('agassiz_geologist_achievement_invented_seismology_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_invented_plate_tectonics_var').IsSet , Scope.Var('agassiz_geologist_achievement_invented_plate_tectonics_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_attended_geologist_congress_var').IsSet , Scope.Var('agassiz_geologist_achievement_attended_geologist_congress_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_explored_volcano_var').IsSet , Scope.Var('agassiz_geologist_achievement_explored_volcano_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_discovered_helium_on_earth_var').IsSet , Scope.Var('agassiz_geologist_achievement_discovered_helium_on_earth_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_finished_pacific_expedition_var').IsSet , Scope.Var('agassiz_geologist_achievement_finished_pacific_expedition_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_returned_from_center_of_earth_var').IsSet , Scope.Var('agassiz_geologist_achievement_returned_from_center_of_earth_var').GetFlagName)]" #deepl:1006055885
 agassiz_geologist_no_geologist_loc: "Osiągnięcia #V tego [concept_agassiz_geologist]#! będą wyświetlane tutaj, gdy tylko je zdobędziesz." #deepl:2266901269
 agassiz_geologist_achievements_intro_loc: "#V Osiągnięcia tego geologa#!\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] jest wybitnym geologiem, który zebrał [Scope.GetVariable('agassiz_geologist_minerals_var').GetValue|0V] [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')] i [Scope.GetVariable('agassiz_geologist_rare_minerals_var').GetValue|0V] [Concept('concept_agassiz_rare_mineral','$concept_agassiz_rare_minerals$')] . [Scope.GetCharacter.GetHerHis|U] badania w dziedzinie geologii dostarczyły nam [Scope.GetVariable('agassiz_geologist_geological_knowledge_var').GetValue|0V] [concept_agassiz_geological_knowledge] ." #deepl:2506244890

 agassiz_geologist_achievement_invented_seismology_loc: "\Wynalezienie sejsmologii #V #! jest jednym z największych osiągnięć dr [Scope.GetCharacter.GetLastNameNoFormatting]. Pozwala ona przewidywać trzęsienia ziemi i wybuchy wulkanów." #deepl:4027906331
 agassiz_geologist_achievement_invented_plate_tectonics_loc: "\Czy wynalezienie #V teorii tektoniki płyt#! jest jednym z największych osiągnięć doktora [Scope.GetCharacter.GetLastNameNoFormatting]? Ponieważ nie wszyscy koledzy z [Scope.GetCharacter.GetHerHis] akceptują tę teorię, tylko przyszłość pokaże, czy zostanie ona uznana za [Scope.GetCharacter.GetHerHis] najważniejsze odkrycie, czy też zostanie zapomniana." #deepl:1012351458
 agassiz_geologist_achievement_attended_geologist_congress_loc: "\Dr [Scope.GetCharacter.GetLastNameNoFormatting] #V  wziął udział w Geological Congress on Plate Tectonics#!." #deepl:941722190
 agassiz_geologist_achievement_explored_volcano_loc: "\#V Eksploracja wulkanu#! to niebezpieczne przedsięwzięcie, ale dr [Scope.GetCharacter.GetLastNameNoFormatting] wiele się nauczył podczas wyprawy na jeden z nich." #deepl:3489984187
 agassiz_geologist_achievement_discovered_helium_on_earth_loc: "\Dr [Scope.GetCharacter.GetLastNameNoFormatting] był pierwszą osobą, która #V odkryła hel na Ziemi#!, który z pewnością będzie bardzo przydatnym surowcem w przyszłości." #deepl:1490724762
 agassiz_geologist_achievement_finished_pacific_expedition_loc: "\n[Scope.GetCharacter.GetFullNameNoFormatting] uczestniczył w wyprawie #V na Pacyfik#!." #deepl:1964542330
 agassiz_geologist_achievement_returned_from_center_of_earth_loc: "\Doktor [Scope.GetCharacter.GetLastNameNoFormatting] najwyraźniej #V dotarł do centrum Ziemi#! i powrócił stamtąd ponownie. Ale czy ta historia jest prawdziwa?" #deepl:3298936682
