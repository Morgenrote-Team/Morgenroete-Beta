 lepsius_archaeologist_no_archaeologist_loc: "Osiągnięcia #V tego [concept_lepsius_archaeologist]#! będą wyświetlane tutaj, gdy tylko je zdobędziesz." #deepl:2404800686
 lepsius_archaeologist_achievements_intro_loc: "#V Osiągnięcia tego archeologa#!\n[Scope.GetCharacter.GetFullName] to [Scope.GetCharacter.GetCustom('lepsius_archaeologist_experience_level_type')], który zebrał łącznie [Scope.Var('lepsius_total_artifact_minor_archaeologist_var').GetValue|0+] [Concept('concept_lepsius_artifact','$concept_lepsius_minor_artifacts$')] ." #deepl:2747108283

 lepsius_archaeologist_achievement_famous_level_archaeologist_overview_loc: "sławny [concept_lepsius_archaeologist]" #deepl:1164713858
 lepsius_archaeologist_achievement_experienced_level_archaeologist_overview_loc: "doświadczony [concept_lepsius_archaeologist]" #deepl:370998510
 lepsius_archaeologist_achievement_normal_level_archaeologist_overview_loc: "osiągnięty [concept_lepsius_archaeologist]" #deepl:139829371
 lepsius_archaeologist_achievement_expert_for_egyptian_archaeology_loc: "\n[Scope.GetCharacter.GetSheHe|U] jest ekspertem w dziedzinie archeologii egipskiej #V #! , skąd [Scope.GetCharacter.GetSheHe] zebrał [Scope.Var('lepsius_egyptian_artifact_minor_archaeologist_var').GetValue|0V] drobne artefakty." #deepl:2806539652
 lepsius_archaeologist_achievement_expert_for_mesopotamian_archaeology_loc: "\n[Scope.GetCharacter.GetSheHe|U] jest ekspertem w dziedzinie archeologii mezopotamskiej #V #! , skąd [Scope.GetCharacter.GetSheHe] zebrał [Scope.Var('lepsius_mesopotamian_artifact_minor_archaeologist_var').GetValue|0V] drobne artefakty." #deepl:4145665032
 lepsius_archaeologist_achievement_expert_for_aegean_archaeology_loc: "\n[Scope.GetCharacter.GetSheHe|U] jest ekspertem #V Aegean Archaeology#!, skąd [Scope.GetCharacter.GetSheHe] zebrał [Scope.Var('lepsius_aegean_artifact_minor_archaeologist_var').GetValue|0V] drobne artefakty." #deepl:3137059405
 lepsius_archaeologist_achievement_expert_for_precolumbian_archaeology_loc: "\n[Scope.GetCharacter.GetSheHe|U] jest ekspertem w dziedzinie archeologii prekolumbijskiej #V #! , skąd [Scope.GetCharacter.GetSheHe] zebrał [Scope.Var('lepsius_precolumbian_artifact_minor_archaeologist_var').GetValue|0V] drobne artefakty." #deepl:1609585460
 lepsius_archaeologist_achievement_expert_for_fareastern_archaeology_loc: "\n[Scope.GetCharacter.GetSheHe|U] jest ekspertem #V Fareastern Archaeology#!, skąd [Scope.GetCharacter.GetSheHe] zebrał [Scope.Var('lepsius_fareastern_artifact_minor_archaeologist_var').GetValue|0V] drobne artefakty." #deepl:3392738081
 lepsius_archaeologist_achievement_expert_for_oceanic_archaeology_loc: "\n[Scope.GetCharacter.GetSheHe|U] jest ekspertem #V Oceanic Archaeology#!, skąd [Scope.GetCharacter.GetSheHe] zebrał [Scope.Var('lepsius_oceanic_artifact_minor_archaeologist_var').GetValue|0V] drobne artefakty." #deepl:2787251010
 lepsius_archaeologist_achievement_not_expert_loc: ""
 lepsius_archaeologist_achievement_attended_exodus_congress_loc: "\[Scope.GetCharacter.GetSheHe|U] uczestniczył w kongresie archeologicznym #V na temat historyczności Exodusu#!." #deepl:3946194799
 lepsius_archaeologist_achievement_attended_civilization_congress_loc: "\n[Scope.GetCharacter.GetSheHe|U] uczestniczył w kongresie archeologicznym #V na temat pochodzenia cywilizacji#!." #deepl:395174587
 lepsius_archaeologist_achievement_attended_troy_congress_loc: "\[Scope.GetCharacter.GetSheHe|U] uczestniczył w kongresie archeologicznym #V na temat historyczności Troi.#!" #deepl:3218356213
 lepsius_archaeologist_achievement_invented_three_age_system_loc: "#V \Jednym z największych osiągnięć [Scope.GetCharacter.GetHerHis] jest wynalezienie systemu trzech epok#!, który pozwala archeologom klasyfikować artefakty na okresy epoki kamienia, brązu i żelaza." #deepl:3435944138
 lepsius_archaeologist_achievement_invented_early_archaeology_loc: "\Stosując metody stratygraficzne i obszernie dokumentując [Scope.GetCharacter.GetHerHis] znaleziska, [Scope.GetCharacter.GetLastNameNoFormatting] #V  zrewolucjonizował archeologię#! i przekształcił ją w prawdziwą naukę." #deepl:1482092133
 lepsius_archaeologist_achievement_inaugurated_museum_loc: "\Dr [Scope.GetCharacter.GetLastNameNoFormatting] odegrał kluczową rolę w #V utworzeniu Muzeum Archeologicznego#!, w którym [Scope.GetCharacter.GetSheHe] eksponowano wszystkie artefakty w znaczący sposób." #deepl:2255139215
 lepsius_archaeologist_achievement_new_methods_pompeii_loc: "\Profesor [Scope.GetCharacter.GetLastNameNoFormatting] opracował #V nowe metody zachowania znalezisk w nienaruszonym stanie#! w Pompejach." #deepl:3277007049
 lepsius_archaeologist_achievement_discovered_teotihuacan_loc: "\Dr [Scope.GetCharacter.GetLastNameNoFormatting] był główną postacią w projekcie #V rekonstrukcji Świątyni Słońca w Teotihuacán#!." #deepl:715105555
 lepsius_archaeologist_achievement_discovered_harappa_loc: "\Profesor [Scope.GetCharacter.GetLastNameNoFormatting] #V  odkrył cywilizację doliny Indusu#! w miejscu Harappa." #deepl:823513117
 lepsius_archaeologist_achievement_tomb_first_emperor_loc: "\Dr [Scope.GetCharacter.GetLastNameNoFormatting] #V  odkrył grobowiec pierwszego cesarza Qin#! strzeżony przez armię z terakoty." #deepl:3326302787
 lepsius_archaeologist_achievement_discovered_tikal_loc: "\Profesor [Scope.GetCharacter.GetLastNameNoFormatting] #V  odkrył miasto Majów Tikal#! w dżungli Gwatemali." #deepl:960255002
 lepsius_archaeologist_achievement_explored_petra_loc: "\Dr [Scope.GetCharacter.GetLastNameNoFormatting] #V  zbadał miasto Petra#! na palących pustyniach Bliskiego Wschodu." #deepl:230969931
 lepsius_archaeologist_achievement_found_sarcophagus_intact_loc: "\Odkrycie sarkofagu #V nieznanego faraona#! jest jednym z największych osiągnięć dr [Scope.GetCharacter.GetLastNameNoFormatting]." #deepl:397069606
 lepsius_archaeologist_achievement_found_sarcophagus_broken_loc: "\Chociaż dr [Scope.GetCharacter.GetLastNameNoFormatting] odkrył #V Grobowiec Nieznanego Faraona#!, odkrycie to zostało zrujnowane przez zniszczenie mumii faraona w wyniku nieszczęśliwego wypadku." #deepl:4134291227
 lepsius_archaeologist_achievement_found_tutankhamun_loc: "\Kamieniem milowym w karierze [Scope.GetCharacter.GetHerHis] było odkrycie nienaruszonego grobowca #V faraona Tutanchamona#!." #deepl:830597516
 lepsius_archaeologist_achievement_found_ship_of_khufu_loc: "\Odkrycie #V Ship of Khufu#! na zawsze unieśmiertelni nazwisko doktora [Scope.GetCharacter.GetLastNameNoFormatting] w książkach historycznych." #deepl:263837328
 lepsius_archaeologist_achievement_found_tower_of_babylon_loc: "\Podczas pobytu [Scope.GetCharacter.GetHerHis] w Mezopotamii, [Scope.GetCharacter.GetSheHe] znalazł #V Wieżę Babilonu#!, która jest znana wśród archeologów jako Zikurrat Etemenanki. Wspaniałe znalezisko!" #deepl:3958757656
 lepsius_archaeologist_achievement_found_gardens_of_sennacherib_loc: "\Dr [Scope.GetCharacter.GetLastNameNoFormatting] jest prawdopodobnie jedyną osobą, która może pochwalić się ponownym odkryciem jednego z siedmiu cudów świata. |U[Scope.GetCharacter.GetSheHe] faktycznie znalazł Wiszące Ogrody #V #! ." #deepl:1376956218
 lepsius_archaeologist_achivement_found_treasury_of_atreus_loc: "\Oczywiście dla archeologa wszystko jest skarbem, ale odkrycie dr [Scope.GetCharacter.GetLastNameNoFormatting] jest z pewnością prawdziwym skarbem. Skarby z Myken #V #! składały się z wielu przedmiotów, z których większość była wykonana ze złota, takich jak Złote Maski." #deepl:3793568389
 lepsius_archaeologist_achievement_found_tomb_of_pakal_loc: "#!\Grobowiec Pakala #V , który odkrył dr [Scope.GetCharacter.GetLastNameNoFormatting], był bardzo imponujący. Tak imponujący, jak powinien być dla największego króla Majów." #deepl:3301250790
 lepsius_archaeologist_achievement_raised_flag_on_pyramids_loc: "\Podczas pracy w Egipcie [Scope.GetCharacter.GetSheHe] #V  podniósł flagę na Wielkiej Piramidzie w Gizah#!." #deepl:453060665
 lepsius_archaeologist_achievement_reconstructed_ishtar_gate_loc: "\Profesor [Scope.GetCharacter.GetLastNameNoFormatting] nie tylko odnalazł bramę #V Ishtar Gate#!, ale także ją zrekonstruował. Teraz znów lśni w całej okazałości." #deepl:3899648836
 lepsius_archaeologist_achievement_found_lamassu_loc: "\Podczas wielkiej przygody pełnej niebezpieczeństw [Scope.GetCharacter.GetSheHe] odnalazł majestatyczny #V Lamassu#!." #deepl:1325115031
 lepsius_archaeologist_achievement_escaped_labyrinth_loc: "\Dr [Scope.GetCharacter.GetLastNameNoFormatting] uciekł z mitycznego labiryntu #V #! pełnego niebezpieczeństw." #deepl:3205955848
 lepsius_archaeologist_achievement_survived_maya_pyramid_loc: "\Czasami archeologia jest niebezpieczna. Profesor [Scope.GetCharacter.GetLastNameNoFormatting] przeżył swoją podróż przez tajemniczą piramidę #V Majów#!, która była bardziej przygodą niż archeologią." #deepl:2309875301
 lepsius_archaeologist_achievement_found_vilcabamba_loc: "#V \Dr [Scope.GetCharacter.GetLastNameNoFormatting] odkrył na nowo Vilacambę#!, ostatnie schronienie Inków." #deepl:1401010459
 lepsius_archaeologist_achievement_discovered_nazca_loc: "\[Scope.GetCharacter.GetSheHe|U] #V  znalazł na pustyni Nazca#! ogromne rysunki, które są widoczne tylko z nieba." #deepl:3398521121
 lepsius_archaeologist_achievement_dinosaur_myth_loc: "\Dr [Scope.GetCharacter.GetLastNameNoFormatting] jest wyśmiewany przez społeczność naukową. Twierdzi, że członkowie jego ekspedycji #V zostali zjedzeni przez dinozaury#!. Czy to stwierdzenie jest śmieszne czy prawdziwe?" #deepl:491140794
 lepsius_archaeologist_achievement_photo_evidence_independent_loc: "\Profesor [Scope.GetCharacter.GetLastNameNoFormatting] dostarczył fotograficzne dowody na istnienie #V żywych dinozaurów#!, mimo że nikt w to nie wierzył [Scope.GetCharacter.GetHerHim]." #deepl:1970351488
 lepsius_archaeologist_achievement_photo_support_loc: "\Dzięki wsparciu rządu profesor [Scope.GetCharacter.GetLastNameNoFormatting] był w stanie dostarczyć fotograficzne dowody na istnienie #V żywych dinozaurów#!, mimo że wcześniej był wyśmiewany." #deepl:278106961
