 lepsius_archaeologist_no_archaeologist_loc: "#V Osiągnięcia tego [concept_lepsius_archaeologist]#! będą wyświetlane tutaj, gdy będziesz go mieć."
 lepsius_archaeologist_achievements_intro_loc: "#V Achievements of this Archaeologist#!\n #indent_newline:3 • [Scope.GetCharacter.GetFullName] is [Scope.GetCharacter.GetCustom('lepsius_archaeologist_experience_level_type')] who collected a total of [Scope.Var('lepsius_total_artifact_minor_archaeologist_var').GetValue|0+] [Concept('concept_lepsius_artifact','$concept_lepsius_minor_artifacts$')].#!"
 lepsius_archaeologist_achievement_famous_level_archaeologist_overview_loc: "sławnym [concept_lepsius_archaeologist]"
 lepsius_archaeologist_achievement_experienced_level_archaeologist_overview_loc: "doświadczonym [concept_lepsius_archaeologist]"
 lepsius_archaeologist_achievement_normal_level_archaeologist_overview_loc: "znakomitym [concept_lepsius_archaeologist]"
 lepsius_archaeologist_achievement_expert_for_egyptian_archaeology_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] jest ekspertem w zakresie #V archeologii egipskiej#!. W Egipcie skolekcjonował [Scope.GetCharacter.GetSheHe] [Scope.Var('lepsius_egyptian_artifact_minor_archaeologist_var').GetValue|0V] pomniejszych artefaktów. #!"
 lepsius_archaeologist_achievement_expert_for_mesopotamian_archaeology_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] jest ekspertem w zakresie #V archeologii Mezopotamii#!. W Mezopotamii skolekcjonował [Scope.GetCharacter.GetSheHe] [Scope.Var('lepsius_mesopotamian_artifact_minor_archaeologist_var').GetValue|0V] pomniejszych artefaktów. #!"
 lepsius_archaeologist_achievement_expert_for_aegean_archaeology_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] jest ekspertem w zakresie #V archeologii egejskiej#!. W Grecji skolekcjonował [Scope.GetCharacter.GetSheHe] [Scope.Var('lepsius_aegean_artifact_minor_archaeologist_var').GetValue|0V] pomniejszych artefaktów. #!"
 lepsius_archaeologist_achievement_expert_for_precolumbian_archaeology_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] jest ekspertem w zakresie #V archeologii świata prekolumbijskiego#!. W Amerykach skolekcjonował [Scope.GetCharacter.GetSheHe] [Scope.Var('lepsius_precolumbian_artifact_minor_archaeologist_var').GetValue|0V] pomniejszych artefaktów. #!"
 lepsius_archaeologist_achievement_expert_for_fareastern_archaeology_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] jest ekspertem w zakresie #V archeologii Dalekiego Wschodu#!. Na Dalekim Wschodzie skolekcjonował [Scope.GetCharacter.GetSheHe] [Scope.Var('lepsius_fareastern_artifact_minor_archaeologist_var').GetValue|0V] pomniejszych artefaktów. #!"
 lepsius_archaeologist_achievement_expert_for_oceanic_archaeology_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] jest ekspertem w zakresie #V archeologii Oceanii#!. W Oceanii skolekcjonował [Scope.GetCharacter.GetSheHe] [Scope.Var('lepsius_oceanic_artifact_minor_archaeologist_var').GetValue|0V] pomniejszych artefaktów. #!"
 lepsius_archaeologist_achievement_not_expert_loc: ""
 lepsius_archaeologist_achievement_attended_exodus_congress_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] wziął udział w #V Kongresie Archeologicznym na temat historyczności Exodusu#!. #!"
 lepsius_archaeologist_achievement_attended_civilization_congress_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] wziął udział w #V Kongresie Archeologicznym na temat pochodzenia cywilizacji#!. #!"
 lepsius_archaeologist_achievement_attended_troy_congress_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] wziął udział w #V Kongresie Archeologicznym na temat historyczności Troi#!. #!"
 lepsius_archaeologist_achievement_invented_three_age_system_loc: "\n #indent_newline:3 • Jednym z [Scope.GetCharacter.GetHerHis] największych osiągnięć jest #V opracowanie systemu trzech epok#!, który pozwala archeologom na przypisywanie artefaktów do jednej z trzech epok: epoki kamienia, epoki brązu i epoki żelaza. #!"
 lepsius_archaeologist_achievement_invented_early_archaeology_loc: "\n #indent_newline:3 • Dzięki zastosowaniu metod stratygraficznych i szczegółowemu dokumentowaniu [Scope.GetCharacter.GetHerHis] znalezisk, [Scope.GetCharacter.GetLastNameNoFormatting] #V zrewolucjonizował archeologię #! i zmienił ją w prawdziwą naukę. #!"
 lepsius_archaeologist_achievement_inaugurated_museum_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] odegrał kluczową rolę w procesie #V ustanowienia muzeum archeologicznego#!, gdzie [Scope.GetCharacter.GetSheHe] wystawił wszystkie odnalezione artefakty. #!"
 lepsius_archaeologist_achievement_new_methods_pompeii_loc: "\n #indent_newline:3 • W Pompejach Profesor [Scope.GetCharacter.GetLastNameNoFormatting] rozwinął #V nowe metody zachowywania znalezisk w nienaruszonym stanie#!. #!"
 lepsius_archaeologist_achievement_discovered_teotihuacan_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] był centralną figurą procesu #V rekonstrukcji Świątyni Słońca w Teotihuacán#!. #!"
 lepsius_archaeologist_achievement_discovered_harappa_loc: "\n #indent_newline:3 • Profesor [Scope.GetCharacter.GetLastNameNoFormatting] #V odkrył cywilizację doliny Indusu#! podczas badań na wykopaliskach w Harappie. #!"
 lepsius_archaeologist_achievement_tomb_first_emperor_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V odkrył grób pierwszego Cesarza Qin#!, broniony przez Terakotową Armię. #!"
 lepsius_archaeologist_achievement_discovered_tikal_loc: "\n #indent_newline:3 • W dżungli Gwatemali Profesor [Scope.GetCharacter.GetLastNameNoFormatting] #V odkrył miasto Majów - Tikal#!. #!"
 lepsius_archaeologist_achievement_explored_petra_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V eksplorował Petrę#! w palących pustyniach Bliskiego Wschodu. #!"
 lepsius_archaeologist_achievement_found_sarcophagus_intact_loc: "\n #indent_newline:3 • Odkrycie #V sarkofagu Nieznanego Faraona#! jest jednym z największych osiągnięć Dr. [Scope.GetCharacter.GetLastNameNoFormatting]. #!"
 lepsius_archaeologist_achievement_found_sarcophagus_broken_loc: "\n #indent_newline:3 • Chociaż Dr. [Scope.GetCharacter.GetLastNameNoFormatting] odkrył #V grób Nieznanego Faraona#!, odkrycie zostało zrujnowane przez zniszczenie mumii Faraona w nieszczęśliwym wypadku. #!"
 lepsius_archaeologist_achievement_found_tutankhamun_loc: "\n #indent_newline:3 • Krokiem milowym w [Scope.GetCharacter.GetHerHis] karierze było odkrycie nienaruszonego grobowca #V Faraona Tutanchamona#!. #!"
 lepsius_archaeologist_achievement_found_ship_of_khufu_loc: "\n #indent_newline:3 • Odkrycie #V Statku z Khufu#! na zawsze zapisze nazwisko Dr. [Scope.GetCharacter.GetLastNameNoFormatting] w tomach historycznych. #!"
 lepsius_archaeologist_achievement_found_tower_of_babylon_loc: "\n #indent_newline:3 • Podczas [Scope.GetCharacter.GetHerHis] pobytu w Mezopotamii, [Scope.GetCharacter.GetSheHe] odkrył #V Wieżę Babel#!, znaną przez archeologów pod nazwą Zikkurat E-temenanki. Cudowne znalezisko! #!"
 lepsius_archaeologist_achievement_found_gardens_of_sennacherib_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] is probably the only person who can boast of rediscovering one of the seven wonders of the world. [Scope.GetCharacter.GetSheHe|U] actually found the #V Hanging Gardens#!.#!"
 lepsius_archaeologist_achievement_found_tomb_of_pakal_loc: "\n #indent_newline:3 • #V Grób Pakala#!, który odkrył Dr. [Scope.GetCharacter.GetLastNameNoFormatting], był bardzo imponujący, dokładnie tak jak imponujący być powinien grobowiec największego Króla Majów. #!"
 lepsius_archaeologist_achievement_raised_flag_on_pyramids_loc: "\n #indent_newline:3 • Podczas prac w Egipcie, [Scope.GetCharacter.GetSheHe] #V podniósł flagę na Wielkiej Piramidzie w Gizie#!. #!"
 lepsius_archaeologist_achievement_reconstructed_ishtar_gate_loc: "\n #indent_newline:3 • Profesor [Scope.GetCharacter.GetLastNameNoFormatting] nie tylko odkrył #V Bramę Isztar#!, ale także ją zrekonstruował. Teraz znów możemy ją oglądać w jej pełnej chwale. #!"
 lepsius_archaeologist_achievement_found_lamassu_loc: "\n #indent_newline:3 • Podczas wielkiej podróży pełnej niebezpieczeństw, [Scope.GetCharacter.GetSheHe] znalazł majestatycznego #V Lamassu#!. #!"
 lepsius_archaeologist_achievement_escaped_labyrinth_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] uciekł z #V mitycznego labiryntu#! pełnego niebezpieczeństw. #!"
 lepsius_archaeologist_achievement_survived_maya_pyramid_loc: "\n #indent_newline:3 • Czasami archeologia jest niebezpieczna. Profesor [Scope.GetCharacter.GetLastNameNoFormatting] przeżył [Scope.GetCharacter.GetHerHis] podróż przez tajemniczą #V piramidę Majów#!, która była bardziej przygodą niż archeologią. #!"
 lepsius_archaeologist_achievement_found_vilcabamba_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V odkrył Vilacambę#!, ostatnią fortecę Inków."
 lepsius_archaeologist_achievement_discovered_nazca_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] #V odkrył wielkie rysunki na pustyni w Nazca#!, które są widoczne tylko z powietrza. #!"
 lepsius_archaeologist_achievement_dinosaur_myth_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] jest wyśmiewany przez społeczność naukową. [Scope.GetCharacter.GetSheHe|U] twierdzi, że [Scope.GetCharacter.GetHerHis] #V członków ekspedycji zjadły dinozaury#!. Czy to twierdzenie to kłamstwo czy też nie? #!"
 lepsius_archaeologist_achievement_photo_evidence_independent_loc: "\n #indent_newline:3 • Profesor [Scope.GetCharacter.GetLastNameNoFormatting] dostarczył fotografię #V żyjącego dinozaura#!, chociaż nikt nie wierzył w [Scope.GetCharacter.GetHerHim] twierdzenia. #!"
 lepsius_archaeologist_achievement_photo_support_loc: "\n #indent_newline:3 • Dzięki wsparciu rządu, Profesor [Scope.GetCharacter.GetLastNameNoFormatting] był w stanie dostarczyć fotografię #V żyjącego dinozaura#!, chociaż wcześniej był on wyśmiewany. #!"
 lepsius_archaeologist_achievement_discovered_cliff_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] #V discovered the Cliff Palace#! of the Pueblo People.#!"
 lepsius_archaeologist_achievement_restored_angkor_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V restored the city of Angkor#! in the jungles of Cambodia.#!"
 lepsius_archaeologist_achievement_found_treasury_of_atreus_loc: "\n #indent_newline:3 • Sure, for an archaeologist everything is a treasure, but the discovery of Dr. [Scope.GetCharacter.GetLastNameNoFormatting] is surely a true treasure. The #V Treasures of Mycenae#! consisted of many things most of them made from gold like the Golden Masks.#!"
 lepsius_archaeologist_achievement_discovered_persepolis_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] was responsible for the 'V first modern excavation of Persepolis#!.#!"