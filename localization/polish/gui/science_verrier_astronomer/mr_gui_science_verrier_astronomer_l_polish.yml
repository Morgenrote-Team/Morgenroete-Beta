l_polish:
 MR_STANDARD_TIME_BUTTON: "Wprowadź czas standardowy"
 MR_STANDARD_TIME_BUTTON_TT: "#T Wprowadź czas standardowy #! \n Wraz ze wzrostem znaczenia minut i godzin w świecie, który nie bije już w rytmie dzwonów kościelnych, ale zegarów na dworcach, ważną kwestią stało się ujednolicenie czasu w całym kraju za pomocą czasu standardowego.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PRIME_MERIDIAN_BUTTON: "Południk zerowy"
 MR_PRIME_MERIDIAN_BUTTON_TT: "#T Południk zerowy #! \n Wraz z coraz powszechniejszym wprowadzaniem krajowych czasów standardowych pojawił się nowy problem: poszukiwanie południka zerowego, który mógłby służyć jako punkt odniesienia dla międzynarodowych stref czasowych.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_3_GREAT_POWERS_HAVE_STANDARD_TIME_TRIGGER_TT: "#default_text Przynajmniej #V 3 Wielkie Mocarstwa#! wprowadziły czas standardowy.#!"
