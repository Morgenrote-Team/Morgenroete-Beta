 verrier_astronomer_achievements_no_astronomer_loc: "#V Osiągnięcia tego [concept_verrier_astronomer]#! będą wyświetlane tutaj, gdy będziesz go mieć."
 verrier_astronomer_achievements_intro_loc: "#V Osiągnięcia tego astronoma#!\n #indent_newline:3 • [Scope.GetCharacter.GetFullName] jest utalentowanym astronomem, który odkrył [Scope.Var('verrier_astronomer_total_objects_var').GetValue|0V] [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]. #!"
 verrier_astronomer_achievement_measured_distance_cygni_loc: "\n #indent_newline:3 • Poprzez wyznaczenie #V dystansu do 61 Cygni na 11,4 lata świetlne#!, [Scope.GetCharacter.GetLastNameNoFormatting] skutecznie ukazał, że wszechświat jest o wiele większy niż wcześniej myślano. #!"
 verrier_astronomer_achievement_helium_discovered_loc: "\n #indent_newline:3 • Jednym z [Scope.GetCharacter.GetHerHis] największych osiągnięć jest #V odkrycie helu#! podczas badania spektrum elektromagnetycznego Słońca. #!"
 verrier_astronomer_achievement_uranus_discoverer_loc: "\n #indent_newline:3 • Nikt nie spodziewał się odkrycia nowej planety, ale Profesor [Scope.GetCharacter.GetLastNameNoFormatting] #V odkrył Urana#!. To odkrycie rozpoczęło poszukiwania kolejnych planet w naszym układzie słonecznym. #!"
 verrier_astronomer_achievement_ceres_discoverer_loc: "\n #indent_newline:3 • Wielu astronomów poszukiwało planety między Marsem a Jowiszem, ale to Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V odkrył Ceres#!. #!"
 verrier_astronomer_achievement_pallas_discoverer_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V odkrył planetę Pallas#! w obszarze między Marsem a Jowiszem. #!"
 verrier_astronomer_achievement_vesta_discoverer_loc: "\n #indent_newline:3 • Profesor [Scope.GetCharacter.GetLastNameNoFormatting] #V odkrył planetę Westę#! w obszarze między Marsem a Jowiszem. #!"
 verrier_astronomer_achievement_juno_discoverer_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] #V odkrył planetę Juno#! w obszarze między Marsem a Jowiszem. #!"
 verrier_astronomer_neptune_discoverer_loc: "\n #indent_newline:3 • Jednym z [Scope.GetCharacter.GetHerHis] największych osiągnięć było #V odkrycie Neptuna#!. To odkrycie zapewniło [Scope.GetCharacter.GetHerHim] imieniu miejsce w historycznych tomach na wieki. #!"
 verrier_astronomer_achievement_pluto_discoverer_loc: "\n #indent_newline:3 • Chociaż wielu dyskutowało, czy #V Pluton#! w ogóle istnieje, Profesor [Scope.GetCharacter.GetLastNameNoFormatting] zdołał #V odkryć#! małą planetę. Wielki astronomiczny sukces! #!"
 verrier_astronomer_achievement_discovered_1843_comet_loc: "\n #indent_newline:3 • W #V 1843#! roku był [Scope.GetCharacter.GetSheHe] pierwszym, który #V zauważył Wielką Kometę#!, której nadano z tego powodu nazwę na cześć [Scope.GetCharacter.GetLastNameNoFormatting]. #!"
 verrier_astronomer_achievement_discovered_1858_comet_loc: "\n #indent_newline:3 • Kiedy #V Wielka Kometa roku 1858#! minęła Ziemię, Dr. [Scope.GetCharacter.GetLastNameNoFormatting] jako pierwszy zdołał ją zauważyć. Z tego powodu kometa została nazwana na [Scope.GetCharacter.GetHerHim] cześć. #!"
 verrier_astronomer_achievement_discovered_1861_comet_loc: "\n #indent_newline:3 • Jako pierwszy który zdołał zaobserwować #V Wielką Kometę roku 1861#! na ciemnym nocnym niebie, Profesor [Scope.GetCharacter.GetLastNameNoFormatting] został imiennikiem tego ciała niebieskiego. #!"
 verrier_astronomer_achievement_discovered_1874_comet_loc: "\n #indent_newline:3 • Kiedy #V Wielka Kometa roku 1874#! pojawiła się po raz pierwszy, to właśnie Dr. [Scope.GetCharacter.GetLastNameNoFormatting] dostrzegł ją jako pierwszy. Teraz kometa będzie nosiła [Scope.GetCharacter.GetHerHis] imię na wieki. #!"
 verrier_astronomer_achievement_discovered_1882_comet_loc: "\n #indent_newline:3 • Rok #V 1882#! był spektakularny w świecie astronomii. Profesor [Scope.GetCharacter.GetLastNameNoFormatting] odkrył #V Wielką Kometę#! podczas jej przelotu koło Ziemi. Niesamowity spektakl. #!"
 verrier_astronomer_achievement_finished_pacific_expedition_loc: "\n #indent_newline:3 • Podczas #V ekspedycji pacyficznej#!, Dr. [Scope.GetCharacter.GetLastNameNoFormatting] odkrył wiele nowych #V obiektów astronomicznych#! na niebie południowym. #!"
 verrier_astronomer_achievement_observed_venus_transit_loc: "\n #indent_newline:3 • W roku #V 1874#!, Profesor [Scope.GetCharacter.GetLastNameNoFormatting] obserwował #V tranzyt Wenus#! na Oceanie Spokojnym. To zazwyczaj jedyne tego typu wydarzenie w życiu. #!"
 verrier_astronomer_achievement_observed_carrington_event_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] obserwował #V masywny rozbłysk słoneczny#! w [Scope.GetVariable('verrier_astronomer_achievement_observed_carrington_event_var').GetValue]. #!"
 verrier_astronomer_achievement_observed_corona_loc: "\n #indent_newline:3 • Odkrył #V Perły [Scope.GetCharacter.GetLastNameNoFormatting]#!, które zostały nazwane na [Scope.GetCharacter.GetHerHim] cześć. #!"
 verrier_astronomer_achievement_sun_photo_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] jest autorem #V pierwszego zdjęcia zaćmienia słońca#!. #!"
 verrier_astronomer_achievement_deimos_discoverer_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V odkrył naturalnego satelitę Marsa, którego nazwał Dejmos#!. #!"
 verrier_astronomer_achievement_phobos_discoverer_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] #V odkrył naturalnego satelitę Marsa, którego nazwał Fobos#!. #!"
 verrier_astronomer_achievement_amalthea_discoverer_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V odkrył naturalnego satelitę Jowisza, którego nazwał Amaltea#!. #!"
