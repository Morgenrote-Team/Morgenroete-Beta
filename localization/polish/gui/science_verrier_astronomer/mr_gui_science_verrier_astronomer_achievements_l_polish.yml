 verrier_astronomer_achievements_no_astronomer_loc: "Osiągnięcia #V tego [concept_verrier_astronomer]#! będą wyświetlane tutaj, gdy tylko je zdobędziesz." #deepl:2150212353

 verrier_astronomer_achievements_intro_loc: "#V Osiągnięcia tego astronoma#![Scope.GetCharacter.GetFullName] jest wybitnym astronomem, który odkrył [Scope.Var('verrier_astronomer_total_objects_var').GetValue|0V] [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] ." #deepl:2330629282
 verrier_astronomer_achievement_measured_distance_cygni_loc: "\Dzięki pomiarowi odległości #V od 61 Cygni wynoszącej 11,4 lat świetlnych#!, [Scope.GetCharacter.GetLastNameNoFormatting] udało się za jednym zamachem wykazać, że wszechświat jest znacznie większy niż wcześniej sądzono." #deepl:4180687375
 verrier_astronomer_achievement_helium_discovered_loc: "#V \Jednym z największych osiągnięć [Scope.GetCharacter.GetHerHis] jest odkrycie pierwiastka helu#! podczas badania widma elektromagnetycznego Słońca." #deepl:1824398573
 verrier_astronomer_achievement_uranus_discoverer_loc: "\Nikt nie spodziewał się odkrycia nowej planety, ale profesor [Scope.GetCharacter.GetLastNameNoFormatting] #V  odkrył planetę Uran#!. Odkrycie to doprowadziło do poszukiwania kolejnych planet w naszym Układzie Słonecznym." #deepl:596907633
 verrier_astronomer_achievement_ceres_discoverer_loc: "\Wielu astronomów szukało planety między Marsem a Jowiszem. Ale to dr [Scope.GetCharacter.GetLastNameNoFormatting] był tym, który #V odkrył Ceres#!." #deepl:134698821
 verrier_astronomer_achievement_pallas_discoverer_loc: "\Dr [Scope.GetCharacter.GetLastNameNoFormatting] #V  znalazł planetę Pallas#! w regionie między Marsem a Jowiszem." #deepl:2895291218
 verrier_astronomer_achievement_vesta_discoverer_loc: "\Profesor [Scope.GetCharacter.GetLastNameNoFormatting] #V  znalazł planetę Vesta#! w regionie między Marsem a Jowiszem." #deepl:3332363292
 verrier_astronomer_achievement_juno_discoverer_loc: "\n[Scope.GetCharacter.GetSheHe|U] #V  znalazł planetę Juno#! w regionie między Marsem a Jowiszem." #deepl:2722834301
 verrier_astronomer_neptune_discoverer_loc: "#V \Jednym z największych osiągnięć [Scope.GetCharacter.GetHerHis] było odkrycie planety Neptun#!. Odkrycie to zapewniło [Scope.GetCharacter.GetHerHim] miejsce w podręcznikach historii na zawsze." #deepl:740023144
 verrier_astronomer_achievement_pluto_discoverer_loc: "\Chociaż spierano się, czy #V Pluton#! w ogóle istnieje, profesor [Scope.GetCharacter.GetLastNameNoFormatting] faktycznie #V odkrył#! maleńką planetę. To wielkie astronomiczne osiągnięcie!" #deepl:2882859348
 verrier_astronomer_achievement_discovered_1843_comet_loc: "\W #V 1843#! [Scope.GetCharacter.GetSheHe] jako pierwszy #V odnalazł Wielką Kometę#!, której nadał imię [Scope.GetCharacter.GetLastNameNoFormatting]." #deepl:493581168
 verrier_astronomer_achievement_discovered_1858_comet_loc: "\Kiedy kometa #V Great Comet of 1858#! minęła Ziemię, dr [Scope.GetCharacter.GetLastNameNoFormatting] był pierwszym, który ją zobaczył. W rezultacie kometa została nazwana na cześć [Scope.GetCharacter.GetHerHim]." #deepl:2184348218
 verrier_astronomer_achievement_discovered_1861_comet_loc: "\Jako pierwszy, który odkrył #V Wielką Kometę z 1861 roku#! w ciemnościach nocnego nieba, profesor [Scope.GetCharacter.GetLastNameNoFormatting] stał się imiennikiem tego niebiańskiego obiektu." #deepl:2672737780
 verrier_astronomer_achievement_discovered_1874_comet_loc: "\Kiedy #V Wielka Kometa z 1874 roku#! pojawiła się po raz pierwszy, to właśnie dr [Scope.GetCharacter.GetLastNameNoFormatting] zauważył ją jako pierwszy. Teraz kometa będzie nosić nazwę [Scope.GetCharacter.GetHerHis] po wsze czasy." #deepl:333537749
 verrier_astronomer_achievement_discovered_1882_comet_loc: "\Rok #V 1882#! był spektakularny z astronomicznego punktu widzenia. Profesor [Scope.GetCharacter.GetLastNameNoFormatting] odkrył #V Wielką Kometę#! podczas jej przelotu obok Ziemi. Niesamowite widowisko." #deepl:3157970288
 verrier_astronomer_achievement_finished_pacific_expedition_loc: "\Podczas wyprawy #V na Pacyfik#! dr [Scope.GetCharacter.GetLastNameNoFormatting] odkrył różne nowe #V obiekty astronomiczne#! na półkuli południowej." #deepl:27168137
 verrier_astronomer_achievement_observed_venus_transit_loc: "\W roku #V 1874#! profesor [Scope.GetCharacter.GetLastNameNoFormatting] zaobserwował #V tranzyt Wenus#! na Oceanie Spokojnym. Zwykle jest to wydarzenie, które zdarza się raz w życiu." #deepl:885972622
 verrier_astronomer_achievement_observed_carrington_event_loc: "\Dr [Scope.GetCharacter.GetLastNameNoFormatting] zaobserwował masywny rozbłysk słoneczny #V #! w [Scope.GetVariable('verrier_astronomer_achievement_observed_carrington_event_var').GetValue]." #deepl:2882246181
 verrier_astronomer_achievement_observed_corona_loc: "\Odkrył koraliki #V [Scope.GetCharacter.GetLastNameNoFormatting] #! , których nazwa pochodzi od [Scope.GetCharacter.GetHerHim]." #deepl:2736282257
 verrier_astronomer_achievement_sun_photo_loc: "\Dr [Scope.GetCharacter.GetLastNameNoFormatting] jest autorem #V pierwszego zdjęcia zaćmienia Słońca.#!" #deepl:3755032771
 verrier_astronomer_achievement_deimos_discoverer_loc: "\Dr [Scope.GetCharacter.GetLastNameNoFormatting] #V  odkrył naturalnego satelitę Marsa, Deimosa#!." #deepl:69884165
