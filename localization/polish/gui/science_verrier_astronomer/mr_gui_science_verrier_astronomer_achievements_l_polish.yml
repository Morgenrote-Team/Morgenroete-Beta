 verrier_astronomer_achievement_moon_fission_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] jest uznawany za autora teorii, według której #V Księżyc był częścią Ziemi#! ale został od niej oderwany. #!"
 verrier_astronomer_achievement_moon_capture_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] jest uznawany za autora teorii, według której #V Księżyc to obce ciało które przechwyciła Ziemia#!. #!"
 verrier_astronomer_achievement_centaur_discoverer_loc: "\n #indent_newline:3 • While searching for Planet X, [Scope.GetCharacter.GetSheHe] #V found the first Centaur#! in [GetGlobalVariable('verrier_centaur_year_global_var').GetValue|V], a separate class of asteroids located between Jupiter and Neptune.#!"