l_polish:
 MR_SPORTS_MOUNTAINEERN_TT: "[AddLocalizationIf( Scope.IsSet , 'douglas_mountaineer_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'douglas_mountaineer_no_mountaineer_achievements_loc')]"
 douglas_mountaineer_achievements_loc: "$douglas_mountaineer_achievements_intro_loc$[AddLocalizationIf( Scope.Var('douglas_mountaineer_achievement_mount_everest_loc').IsSet , Scope.Var('douglas_mountaineer_achievement_mount_everest_loc').GetFlagName)]"
 douglas_mountaineer_no_mountaineer_achievements_loc: "#V Osiągnięcia tego [concept_douglas_mountaineer]#! będą wyświetlane tutaj, gdy będziesz go mieć."
 douglas_mountaineer_achievements_intro_loc: "#V Osiągnięcia tego wspinacza#!\n #indent_newline:3 • [Scope.GetCharacter.GetFullName] jest wspinaczem z doświadczeniem równym [Scope.Var('douglas_mountaineer_experience_var').GetValue|V0]. Dotychczas [Scope.GetCharacter.GetSheHe] dokonał [Scope.Var('douglas_mountaineer_num_mountain_ascents_var').GetValue|V0] wejść na szczyt. Spośród nich, [Scope.Var('douglas_mountaineer_num_summits_reached_var').GetValue|V0] było skuteczne, [Scope.Var('douglas_mountaineer_num_climbs_aborted_var').GetValue|V0] zostały przerwane i [Scope.Var('douglas_mountaineer_num_disasters_suffered_var').GetValue|V0] zakończyły się katastrofą. #!"
 douglas_mountaineer_achievement_mount_everest_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] jest uznawany za pierwszą osobę która #V zdobyła szczyt Mount Everest#! i tym samym jest jednym z najsłynniejszych wspinaczy wszech czasów. #!"