 MR_MOUNTAIN_UNCONQUERED_LEVEL_1_SUMMIT_TRIGGER_TT: "#default_text [GetPlayer.GetName] posiada przynajmniej jeden niezdobyty [concept_douglas_mountain_summit] na #V poziomie 1#! lub posiada #V patent wspinaczkowy#! od kraju, który takowy posiada. Po więcej informacji sprawdź [concept_douglas_mountain_summit_list].#!"
