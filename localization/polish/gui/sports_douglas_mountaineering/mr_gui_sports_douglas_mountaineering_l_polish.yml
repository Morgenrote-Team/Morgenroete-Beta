l_polish:
 MR_MOUNTAIN_GENERAL_TRIGGER_TT: "#default_text [GetPlayer.GetName] posiada #V generała#! z jedną z tych [concept_character_trait]: #V $douglas_mountaineer$#!, #V $douglas_mountaineer_veteran$#!, #V $mountain_commander$#!, #V $surveyor$#! lub #V $explorer$#!.#!"
 MR_MOUNTAINEERING_CLUB_BUTTON: "Klub Górski"
 MR_MOUNTAINEERING_CLUB_BUTTON_TT: "#T Ufunduj Klub Górski#!\nKlub Górski to pierwszy krok narodu w kierunku zorganizowanego alpinizmu. Musi być ufundowany przez doświadczonego dżentelmena (lub dżentelmenkę) z doświadczeniem alpinistycznym. Z tego klubu, nowi wspinacze mogą ruszać na podbój szczytów świata!\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ALPINE_CLUB_BUTTON: "Klub Alpejski"
 MR_ALPINE_CLUB_BUTTON_TT: "#T Załóż Klub Alpejski#!\nZałożony w Londynie w 1857, Klub Alpejski to najstarszy klub górski na świecie. Jego ustanowienie rozpoczęło erę zorganizowanego alpinizmu w wiktoriańskiej Anglii. Celem klubu było promowanie naukowej, geograficznej i atletycznej eksploracji Alp. Wśród jego założycieli był Edward Whymper, który jako pierwszy wszedł na Matterhorn w 1865 roku. Klub Alpejski odegrał kluczową rolę w Złotej Erze Alpinizmu i opublikował wpływowe prace, w tym Alpine Journal. Ustanowił standardy dla przyszłych klubów górskich na całym świecie.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ALPINE_CLUB_TRIGGER_TT: "#default_text Istnieje przynajmniej #G 6#! krajów z klubem górskim.#!"
 MR_ALPINE_CLUB_PRESIDENT_BUTTON: "Zostań prezesem Klubu Alpejskiego"
 MR_ALPINE_CLUB_PRESIDENT_BUTTON_TT: "#T Zostań prezesem Klubu Alpejskiego#!\nGdy nie ma prezesa Klubu Alpejskiego, sami możemy objąć tą pozycję. Oczywiście zakładając że kontrolujemy jego siedzibę.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ALPINE_CLUB_CONTROLS_HQ_TRIGGER_TT: "#default_text [GetPlayer.GetName] kontroluje [GetBuildingType('building_douglas_alpine_club').GetName]#!."
 douglas_alpine_club_board_member_tt: "[GetPlayer.GetName] zostaje członkiem zarządu Klubu Alpejskiego."
 douglas_become_alpine_club_president_tt: "[GetPlayer.GetName] zostaje prezesem Klubu Alpejskiego."
 MR_ALPINE_CLUB_EXPERIENCE_TRIGGER_TT: "#default_text Wspinacz ma przynajmniej #p 50#! #V doświadczenia#!.#!"
 MR_RECRUIT_MOUNTAINEER_BUTTON: "Zrekrutuj wspinacza"
 MR_RECRUIT_MOUNTAINEER_BUTTON_TT: "#T Zrekrutuj wspinacza#!\nDzięki klubowi górskiemu istnieje możliwość rekrutowania nowych wspinaczy. To oczywiście wymaga odpowiedniej ilości [concept_douglas_alpine_heritage].\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAINEERING_CLUB_TRIGGER_TT: "#default_text [GetPlayer.GetName] ma #V klub górski#!.#!"
 MR_ALPINE_HERITAGE_50_TRIGGER_TT: "#default_text [GetPlayer.GetName] ma przynajmniej #G 50#! [concept_douglas_alpine_heritage].#!"
 MR_MOUNTAIN_TROOPS_REGIMENT_BUTTON: "Pułk Piechoty Górskiej"
 MR_MOUNTAIN_TROOPS_REGIMENT_BUTTON_TT: "#T Pułk Piechoty Górskiej#!\nOdpowiedni generał mógłby, biorąc pod uwagę istnienie górskiego regionu z populacją fanatycznie oddaną swojej ojczyźnie, ustanowić pułk wytrenowany w taktykach walki w górach.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ALPINE_HERITAGE_25_TRIGGER_TT: "#default_text [GetPlayer.GetName] ma przynajmniej #G 50#! [concept_douglas_alpine_heritage].#!"
 MR_MOUNTAINEERING_EQUIPMENT_BUTTON: "Sprzęt do wspinaczki"
 MR_MOUNTAINEERING_EQUIPMENT_BUTTON_TT: "#T Sprzęt do wspinaczki#!\nLepszy #V sprzęt do wspinaczki#! daje większą gwarancję sukcesu. To wymaga nowych technologii na każdy krok.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAIN_EQUIPMENT_1_TRIGGER_TT: "#default_text [GetPlayer.GetName] posiada modyfikator #V $douglas_mountaineering_equipment_level_1_modifier$#!.#!"
