 MR_MOUNTAIN_EXPEDITION_LEVEL_1_BUTTON: "Ekspedycja alpinistyczna: szczyt poziomu 1"
 MR_MOUNTAIN_EXPEDITION_LEVEL_1_BUTTON_TT: "#T Ekspedycja alpinistyczna: szczyt poziomu 1#!\nTa kategoria gór może zostać zdobyta z ekwipunkiem alpinistycznym na poziomie 1. Poziom nie sugeruje wysokości czy ryzyka. Te szczyty obejmują: Mount Whitney, Citlaltépetl, Popocatépetl, Chimborazo, Pico Aneto, Mont Blanc, Großvenediger, Mount Cameroon, Ras Dashen, and Mount Giluwe. Po więcej informacji sprawdź [concept_douglas_mountain_summit_list].\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAIN_EXPEDITION_LEVEL_2_BUTTON: "Ekspedycja alpinistyczna: szczyt poziomu 2"
 MR_MOUNTAIN_EXPEDITION_LEVEL_2_BUTTON_TT: "#T Ekspedycja alpinistyczna: szczyt poziomu 2#!\nTa kategoria gór może zostać zdobyta z ekwipunkiem alpinistycznym na poziomie 2. Poziom nie sugeruje wysokości czy ryzyka. Te szczyty obejmują: Kibo (Kilimandżaro), Dufourspitze, Mount Cook, and Mount Wilhelm. Po więcej informacji sprawdź [concept_douglas_mountain_summit_list].\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAIN_EXPEDITION_LEVEL_3_BUTTON: "Ekspedycja alpinistyczna: szczyt poziomu 3"
 MR_MOUNTAIN_EXPEDITION_LEVEL_3_BUTTON_TT: "#T Ekspedycja alpinistyczna: szczyt poziomu 3#!\nTa kategoria gór może zostać zdobyta z ekwipunkiem alpinistycznym na poziomie 2. Poziom nie sugeruje wysokości czy ryzyka. Te szczyty obejmują: Mount Elias, Aconcagua, Aiguille Verte, Matterhorn, Batian (Mount Kenya), and Mount Stanley. Po więcej informacji sprawdź [concept_douglas_mountain_summit_list].\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAIN_EXPEDITION_LEVEL_4_BUTTON: "Ekspedycja alpinistyczna: szczyt poziomu 4"
 MR_MOUNTAIN_EXPEDITION_LEVEL_4_BUTTON_TT: "#T Ekspedycja alpinistyczna: szczyt poziomu 2#!\nTa kategoria gór może zostać zdobyta z ekwipunkiem alpinistycznym na poziomie 2. Poziom nie sugeruje wysokości czy ryzyka. Te szczyty obejmują: Mount Logan, Mount McKinley, Illimani, Monte Pissis, Shkara, Kamet, Kaufmann Peak, and Mount Gongga. Po więcej informacji sprawdź [concept_douglas_mountain_summit_list].\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAIN_EXPEDITION_LEVEL_5_BUTTON: "Ekspedycja alpinistyczna: szczyt poziomu 5"
 MR_MOUNTAIN_EXPEDITION_LEVEL_5_BUTTON_TT: "#T Ekspedycja alpinistyczna: szczyt poziomu 2#!\nTa kategoria gór może zostać zdobyta z ekwipunkiem alpinistycznym na poziomie 2. Poziom nie sugeruje wysokości czy ryzyka. Te szczyty obejmują: Huascarán, Chigolisa and Kabru. Po więcej informacji sprawdź [concept_douglas_mountain_summit_list].\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
