 MR_MOUNTAIN_UNCONQUERED_LEVEL_5_SUMMIT_TRIGGER_TT: "#default_text [GetPlayer.GetName] posiada przynajmniej jeden niezdobyty [concept_douglas_mountain_summit] na #V poziomie 5#! lub posiada #V patent wspinaczkowy#! od kraju, który takowy posiada. Po więcej informacji sprawdź [concept_douglas_mountain_summit_list].#!"
 MR_MOUNTAIN_EXPEDITION_LEVEL_1_BUTTON: "Ekspedycja: szczyt poziomu 1"
 MR_MOUNTAIN_EXPEDITION_LEVEL_1_BUTTON_TT: "#T Ekspedycja wspinaczkowa: szczyt poziomu 1#!\nTa kategoria gór może zostać zdobyta z ekwipunkiem do wspinaczki na poziomie 1. Poziom nie sugeruje wysokości czy ryzyka. Te szczyty obejmują: Mount Whitney, Citlaltépetl, Popocatépetl, Chimborazo, Pico Aneto, Mont Blanc, Großvenediger, Mount Cameroon, Ras Dashen, and Mount Giluwe. Po więcej informacji sprawdź [concept_douglas_mountain_summit_list].\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAIN_EXPEDITION_LEVEL_2_BUTTON: "Ekspedycja: szczyt poziomu 2"
 MR_MOUNTAIN_EXPEDITION_LEVEL_2_BUTTON_TT: "#T Ekspedycja wspinaczkowa: szczyt poziomu 2#!\nTa kategoria gór może zostać zdobyta z ekwipunkiem do wspinaczki na poziomie 2. Poziom nie sugeruje wysokości czy ryzyka. Te szczyty obejmują: Kibo (Kilimandżaro), Dufourspitze, Mount Cook, and Mount Wilhelm. Po więcej informacji sprawdź [concept_douglas_mountain_summit_list].\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAIN_EXPEDITION_LEVEL_3_BUTTON: "Ekspedycja: szczyt poziomu 3"
 MR_MOUNTAIN_EXPEDITION_LEVEL_3_BUTTON_TT: "#T Ekspedycja wspinaczkowa: szczyt poziomu 3#!\nTa kategoria gór może zostać zdobyta z ekwipunkiem do wspinaczki na poziomie 3. Poziom nie sugeruje wysokości czy ryzyka. Te szczyty obejmują: Mount Elias, Aconcagua, Aiguille Verte, Matterhorn, Mount Kenya, and Mount Stanley. Po więcej informacji sprawdź [concept_douglas_mountain_summit_list].\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAIN_EXPEDITION_LEVEL_4_BUTTON: "Ekspedycja: szczyt poziomu 4"
 MR_MOUNTAIN_EXPEDITION_LEVEL_4_BUTTON_TT: "#T Ekspedycja wspinaczkowa: szczyt poziomu 4#!\nTa kategoria gór może zostać zdobyta z ekwipunkiem do wspinaczki na poziomie 4. Poziom nie sugeruje wysokości czy ryzyka. Te szczyty obejmują: Mount Logan, Mount McKinley, Illimani, Monte Pissis, Shkara, Kamet, Kaufmann Peak, and Mount Gongga. Po więcej informacji sprawdź [concept_douglas_mountain_summit_list].\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAIN_EXPEDITION_LEVEL_5_BUTTON: "Ekspedycja: szczyt poziomu 5"
 MR_MOUNTAIN_EXPEDITION_LEVEL_5_BUTTON_TT: "#T Ekspedycja wspinaczkowa: szczyt poziomu 5#!\nTa kategoria gór może zostać zdobyta z ekwipunkiem do wspinaczki na poziomie 5. Poziom nie sugeruje wysokości czy ryzyka. Te szczyty obejmują: Huascarán, Chigolisa and Kabru. Po więcej informacji sprawdź [concept_douglas_mountain_summit_list].\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAINEER_TRAINING_BUTTON: "Trening wspinaczki"
 MR_MOUNTAINEER_TRAINING_BUTTON_TT: "#T Trening wspinaczki#!\nKraje mogą trenować swoich wspinaczy jeśli mają pasma górskie lub zdobyły szczyty, które są uznawane za bezpieczne.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_SPORTS_MOUNTAINEER_EXPEDITIONS_TAB: "Ekspedycje"
 MR_SPORTS_MOUNTAINEER_ORGANISATION_TAB: "Organizacja"
 MR_SPORTS_MOUNTAINEER_CLUB_TAB: "Klub"
 MR_ALPINE_CLUB_START_EXPEDITION_BUTTON: "Rozpocznij Ekspedycję Międzynarodową"
 MR_ALPINE_CLUB_START_EXPEDITION_BUTTON_TT: "#T Rozpocznij Ekspedycję Międzynarodową#!\nPrezes Klubu Alpejskiego ma prawo rozpocząć międzynarodową ekspedycję wspinaczkową. To jest możliwe tylko raz na 10 lat.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ALPINE_CLUB_PROPOSE_EXPEDITION_BUTTON: "Zaproponuj Ekspedycję Międzynarodową"
 MR_ALPINE_CLUB_PROPOSE_EXPEDITION_BUTTON_TT: "#T Zaproponuj Ekspedycję Międzynarodową#!\nCzłonkowie zarządu Klubu Alpejskiego mają prawo zaproponować międzynarodową ekspedycję wspinaczkową. Musi ona zostać zatwierdzona przez przez Prezesa.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ALPINE_CLUB_JOIN_EXPEDITION_BUTTON: "Dołącz do Ekspedycji Międzynarodowej"
 MR_ALPINE_CLUB_JOIN_EXPEDITION_BUTTON_TT: "#T Dołącz do Ekspedycji Międzynarodowej#!\nJako członek zarządu Klubu Alpejskiego, jesteśmy wezwani do uczestnictwa w Międzynarodowej Ekspedycji Wspinaczkowej, w celu zapewnienia jej sukcesu.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAIN_RECENT_INTERNATIONAL_EXPEDITION_TRIGGER_TT: "#default_text Ostatnia ekspedycja międzynarodowa odbyła się przynajmniej 10 lat temu.#!"
 MR_MOUNTAIN_RECENT_INTERNATIONAL_EXPEDITION_NO_SETBACK_TRIGGER_TT: "#default_text Prezes Klubu Alpejskiego nie zawetował ekspedycji międzynarodowej.#!"
 MR_MOUNTAIN_EQUIPMENT_INTERNATIONAL_EXPEDITION_TRIGGER_TT: "#default_text Prezes ma wymagany ekwipunek (Poziomu 3, Poziomu 4 lub Poziomu 5) aby organizować Ekspedycję Międzynarodową.#!"
 MR_MOUNTAIN_UNCONQUERED_SUMMIT_INTERNATIONAL_EXPEDITION_TRIGGER_TT: "#default_text Jest przynajmniej jeden szczyt który można podbić z ekwipunkiem Poziomu 2, Poziomu 3 lub Poziomu 4.#!"
 MR_ALPINE_PRESIDENT_HAS_ACTIVE_MOUNTAINEER_TRIGGER_TT: "#default_text Prezes ma [concept_douglas_mountaineer], który #V nie jest zajęty#!.#!"
 MR_MOUNT_EVEREST_EXPEDITION_BUTTON: "Ekspedycja na Mount Everest"
 MR_MOUNT_EVEREST_EXPEDITION_BUTTON_TT: "#T Ekspedycja na Mount Everest#!\nJako najwyższa góra świata, Mount Everest to marzenie wszystkich wspinaczy - ale czy ekspedycja na ten szczyt naprawdę jest spełnieniem wszystkich snów wspinaczy, czy raczej iluzją wielkości?\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
