l_polish:
 MR_PAINTER_ACHIEVEMENTS_TT: "[AddLocalizationIf( Scope.IsSet , 'klimt_painter_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'klimt_painter_achievements_no_painter_loc')]"
 klimt_painter_achievements_loc: "$klimt_painter_achievements_intro_loc$[AddLocalizationIf( Scope.Var('klimt_painter_achievement_vernissage_var').IsSet , Scope.Var('klimt_painter_achievement_vernissage_var').GetFlagName)][AddLocalizationIf( Scope.Var('klimt_painter_achievement_inaugurated_gallery_var').IsSet , Scope.Var('klimt_painter_achievement_inaugurated_gallery_var').GetFlagName)]"
 klimt_painter_achievements_no_painter_loc: "#V Osiągnięcia tego [concept_klimt_painter]#! będą wyświetlane tutaj, gdy będziesz go mieć."
 klimt_painter_achievements_intro_loc: "#V Osiągnięcia tego malarza#!\n[Scope.GetCharacter.GetFullName] jest [Scope.GetCharacter.GetCustom('klimt_painter_achievement_experience_type')].\n[Scope.GetCharacter.GetSheHe] namalował [Scope.Var('klimt_painter_num_paintings_var').GetValue|V0] obrazów, spośród których [Scope.Var('klimt_painter_num_masterworks_var').GetValue|V0] jest uznawanych za arcydzieła."
 klimt_painter_achievement_vernissage_loc: "\n[GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetLastName] wystawił swoje obrazy na wielkim wernisażu."
 klimt_painter_achievement_inaugurated_gallery_loc: "[Scope.GetCharacter.GetSheHe] otworzył nową galerię sztuki z [Scope.GetCharacter.GetHerHis] cudownymi obrazami. W przyszłości galeria z pewnością ujrzy jeszcze wiele więcej wielkich malarzy!"