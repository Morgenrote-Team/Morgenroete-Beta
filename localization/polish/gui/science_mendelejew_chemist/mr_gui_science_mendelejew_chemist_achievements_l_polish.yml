 MR_CHEMIST_ACHIEVEMENTS_TT: "[AddLocalizationIf( Scope.IsSet , 'mendelejew_chemist_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'mendelejew_chemist_achievements_no_chemist_loc')]"
 mendelejew_chemist_achievements_loc: "$mendelejew_chemist_achievements_intro_loc$[Scope.GetCharacter.GetCustom('mendelejew_chemist_theorized_elementes_type')][Scope.GetCharacter.GetCustom('mendelejew_chemist_discovered_elementes_type')][Scope.GetCharacter.GetCustom('mendelejew_chemist_isolated_elementes_type')][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_periodic_table_inventor_var').IsSet , Scope.Var('mendelejew_chemist_achievement_periodic_table_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_invented_dynamite_var').IsSet , Scope.Var('mendelejew_chemist_achievement_invented_dynamite_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_noble_gases_discoverer_var').IsSet , Scope.Var('mendelejew_chemist_achievement_noble_gases_discoverer_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_discovered_reason_fraunhofer_lines_var').IsSet , Scope.Var('mendelejew_chemist_achievement_discovered_reason_fraunhofer_lines_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_aspirin_inventor_var').IsSet , Scope.Var('mendelejew_chemist_achievement_aspirin_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_synthetic_oil_inventor_var').IsSet , Scope.Var('mendelejew_chemist_achievement_synthetic_oil_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_synthetic_rubber_inventor_var').IsSet , Scope.Var('mendelejew_chemist_achievement_synthetic_rubber_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_attended_chemist_congress_var').IsSet , Scope.Var('mendelejew_chemist_achievement_attended_chemist_congress_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_fertilizer_improvement_finished_var').IsSet , Scope.Var('mendelejew_chemist_achievement_fertilizer_improvement_finished_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_explosives_improvement_finished_var').IsSet , Scope.Var('mendelejew_chemist_achievement_explosives_improvement_finished_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_synthetics_improvement_finished_var').IsSet , Scope.Var('mendelejew_chemist_achievement_synthetics_improvement_finished_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_discovered_radioactivity_var').IsSet , Scope.Var('mendelejew_chemist_achievement_discovered_radioactivity_var').GetFlagName)]"
 mendelejew_chemist_achievements_intro_loc: "#V Osiągnięcia tego chemika#!\n #indent_newline:3 • [Scope.GetCharacter.GetFullName] jest utalentowanym chemikiem. #!"
 mendelejew_chemist_theorized_elementes_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting]#V teoretyzował istnienie [Scope.Var('mendelejew_theorized_elements_character_number_var').GetValue|0] pierwiastków#!. #!"
 mendelejew_chemist_discovered_elementes_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U]#V odkrył [Scope.Var('mendelejew_discovered_elements_character_number_var').GetValue|0] pierwiastków#!. #!"
 mendelejew_chemist_isolated_elementes_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting]#V wyizolował [Scope.Var('mendelejew_isolated_elements_character_number_var').GetValue|0] pierwiastków#!. #!"
 mendelejew_chemist_achievement_periodic_table_inventor_loc: "\n #indent_newline:3 • Profesor [Scope.GetCharacter.GetLastNameNoFormatting] jest znany ze #V stworzenia układu okresowego pierwiastków#!. #!"
 mendelejew_chemist_achievement_invented_dynamite_loc: "\n #indent_newline:3 • Dzięki #V wynalezieniu dynamitu#!, [Scope.GetCharacter.GetFullNameNoFormatting] zmienił górnictwo, budownictwo i wojskowość. #!"
 mendelejew_chemist_achievement_noble_gases_discoverer_loc: "\n #indent_newline:3 • #V Odkrycie gazów szlachetnych#! uczyniło Dr. [Scope.GetCharacter.GetLastNameNoFormatting] jednym z najbardziej znanych chemików w historii. #!"
 mendelejew_chemist_achievement_discovered_reason_fraunhofer_lines_loc: "\n #indent_newline:3 • Dr. [GetPlayer.MakeScope.Var('mendelejew_chemist_var').GetCharacter.GetLastNameNoFormatting] odkrył przyczyny powstawania Linii Fraunhofera i tym samym położył podwaliny pod rozwój astrospektroskopii. #!"
 mendelejew_chemist_achievement_synthetic_oil_inventor_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] umożliwił #V stworzenie syntetycznie oleju#!. #!"
 mendelejew_chemist_achievement_synthetic_rubber_inventor_loc: "\n #indent_newline:3 • Dzięki #V wynalezieniu syntetycznego kauczuku#! Dr. [Scope.GetCharacter.GetLastNameNoFormatting] uwolnił świat od konieczności zbierania kauczuku z drzew. #!"
 mendelejew_chemist_achievement_attended_chemist_congress_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] był jednym z uczestników #V pierwszego Międzynarodowego Kongresu Chemików#!. #!"
 mendelejew_chemist_achievement_fertilizer_improvement_finished_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] spędził wiele czasu badając sposoby na #V ulepszenie nawozów i metod ich produkcji#!. #!"
 mendelejew_chemist_achievement_explosives_improvement_finished_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] był pionierem produkcji #V ulepszonych materiałów wybuchowych i reakcji chemicznych koniecznych do ich uzyskania#!. #!"
 mendelejew_chemist_achievement_synthetics_improvement_finished_loc: "\n #indent_newline:3 • Znany za [Scope.GetCharacter.GetHerHis] prace nad #V ulepszeniem syntetyków i ich produkcji#!, Dr. [Scope.GetCharacter.GetLastNameNoFormatting] jest dobrze postrzegany pośród innych chemików i w przemyśle chemicznym. #!"
 mendelejew_chemist_achievement_discovered_radioactivity_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] osiągnął naukowy kamień milowy, będąc #V pierwszym, który odkrył radioaktywność #!. #!"
 mendelejew_chemist_achievements_no_chemist_loc: "The #V Achievements of this [concept_mendelejew_chemist]#! will be displayed here, once you have one."