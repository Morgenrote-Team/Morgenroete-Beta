 mendelejew_chemist_no_chemist_loc: "Osiągnięcia #V tego [concept_mendelejew_chemist]#! będą wyświetlane tutaj, gdy tylko je zdobędziesz." #deepl:991875360
 mendelejew_chemist_achievements_intro_loc: "#V Osiągnięcia tego chemika#!\n[Scope.GetCharacter.GetFullName] jest wybitnym chemikiem." #deepl:4244956880

 mendelejew_chemist_theorized_elementes_loc: "\Dr [Scope.GetCharacter.GetLastNameNoFormatting] #V  teoretyzował [Scope.Var('mendelejew_theorized_elements_character_number_var').GetValue|0] Elementy#!." #deepl:634278548
 mendelejew_chemist_discovered_elementes_loc: "\n[Scope.GetCharacter.GetSheHe|U] #V  odkryto [Scope.Var('mendelejew_discovered_elements_character_number_var').GetValue|0] Elementy#!." #deepl:156380566
 mendelejew_chemist_isolated_elementes_loc: "\Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  izolowane [Scope.Var('mendelejew_isolated_elements_character_number_var').GetValue|0] Elementy#!." #deepl:2897673687
 mendelejew_chemist_achievement_periodic_table_inventor_loc: "\Profesor [Scope.GetCharacter.GetLastNameNoFormatting] jest znany z #V wynalezienia układu okresowego#!." #deepl:3277759785
 mendelejew_chemist_achievement_invented_dynamite_loc: "\Dzięki #V Wynalezienie dynamitu#!, [Scope.GetCharacter.GetFullNameNoFormatting] zmieniło świat, niezależnie od tego, czy chodzi o górnictwo, budownictwo czy wojnę." #deepl:1710785871
 mendelejew_chemist_achievement_noble_gases_discoverer_loc: "\Odkrycie gazów szlachetnych #V #! sprawiło, że dr [Scope.GetCharacter.GetLastNameNoFormatting] stał się jednym z najsłynniejszych chemików wszech czasów." #deepl:4129935898
 mendelejew_chemist_achievement_discovered_reason_fraunhofer_lines_loc: "\Dr [GetPlayer.MakeScope.Var('mendelejew_chemist_var').GetCharacter.GetLastNameNoFormatting] odkrył przyczynę powstawania linii Fraunhofera i tym samym położył podwaliny pod astrospektroskopię." #deepl:518694575
 mendelejew_chemist_achievement_synthetic_oil_inventor_loc: "\Dzięki[Scope.GetCharacter.GetSheHe] możliwe stało się #V syntetyczne tworzenie ropy#!." #deepl:226827889
 mendelejew_chemist_achievement_synthetic_rubber_inventor_loc: "\Dzięki #V Wynalezieniu kauczuku syntetycznego#! dr [Scope.GetCharacter.GetLastNameNoFormatting] uwolnił świat od konieczności zbierania kauczuku z drzew." #deepl:179466189
 mendelejew_chemist_achievement_attended_chemist_congress_loc: "\Dr [Scope.GetCharacter.GetLastNameNoFormatting] był jednym z uczestników #V pierwszego Międzynarodowego Kongresu Chemików#!." #deepl:2235467193
 mendelejew_chemist_achievement_fertilizer_improvement_finished_loc: "\Dr [Scope.GetCharacter.GetLastNameNoFormatting] poświęcił wiele czasu na badania nad tym, jak #V ulepszyć nawozy i ich produkcję#!." #deepl:3581929820
 mendelejew_chemist_achievement_explosives_improvement_finished_loc: "\n[Scope.GetCharacter.GetSheHe] jest pionierem w produkcji ulepszonych materiałów wybuchowych #V i reakcji chemicznych do ich tworzenia#!." #deepl:3224674643
 mendelejew_chemist_achievement_synthetics_improvement_finished_loc: "\Znany z [Scope.GetCharacter.GetHerHis] pracy nad #V ulepszaniem syntetyków i ich produkcji#!, dr [Scope.GetCharacter.GetLastNameNoFormatting] jest dobrze oceniany przez innych chemików i przemysł chemiczny." #deepl:2742424092
