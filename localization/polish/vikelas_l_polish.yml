 vikelas.501.t: "The [ROOT.GetCountry.GetAdjectiveNoFormatting] Automobile Club"
 vikelas.501.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] is considered a passionate driver and has founded an automobile club with like-minded people to mark this occasion. This is intended to strengthen the domestic car industry and organize national car events."
 vikelas.501.f: "As early as the mid-1890s, the Automobile Club de France (ACF), founded in 1895 as the first automobile club in the world, organized a race once a year, which represented the highlight of the season. These were so-called 'city-to-city' races on public country roads, in which the participants were sent out individually at intervals. One of the triggers for the founding of the ACF was Albert de Dion's relegation from the Paris-Rouen race in 1894. In the following years, rapid development began, with ever more powerful vehicles greatly increasing the dangers of motorsport. The ACF therefore implemented rules for the first time in 1901, which can be considered the first motorsport regulations in the world. A central innovation was the division into categories that had to apply to all events supported by the ACF. The resulting weight limitation should initially help to reduce the immense number of tire defects due to overloading."
 vikelas.501.g: "A sport full of thrills!"
 vikelas.502.t: "First Grand Prix Race"
 vikelas.502.d: "Motorsport is taking a revolutionary turn: with the Grand Prix races, international races are to be held one after the other in all motorsport-loving nations. With this, an international championship was born. [SCOPE.sCountry('vikelas_gp_founder_scope').GetName] has invited all nations with an Automobile Club to participate at their first Grand Prix in the coming year."
 vikelas.502.f: "The annual races for the Gordon Bennett Cup were the first attempt to hold an automobile world championship from 1900 to 1905. In view of constantly increasing speeds, in 1902 the ACF issued technical regulations for the first time in the form of a so-called racing formula, which the participating cars had to adhere to. Nevertheless, the frequency of accidents continued to increase, so that from 1903 only circuit races could be held on closed courses. As the successor to the Gordon Bennett races, the main race organized by the ACF ran for the first time in 1906 under the name Grand Prix. The first Grand Prix winner in history was the Hungarian driver Ferenc Szisz in a Renault."
 vikelas.502.g: "So there is something to be won?"
 vikelas.503.t: "Association Internationale des Automobile Clubs Reconnus"
 vikelas.503.d: "Today the International Automobile Association was founded in [GetGlobalVariable('vikelas_aiacr_seat_global_var').GetStateRegion.GetCityHubName]. Its full name is Association Internationale des Automobile Clubs Reconnus (AIACR)."
 vikelas.503.f: "In order for the automobile manufacturers to be able to take part in all international races, it became necessary to have the technical and sporting regulations that had previously been independently stipulated by the French Automobile Club for its races in the form of the respective Grand Prix formula regulated across countries by an International Automobile Association. The association was founded on June 20, 1904 in Paris as the Association Internationale of the Automobile Club Reconnus (AIACR), after the decision to found it had been made a few days earlier by the automobile clubs of the most important racing nations as part of the Gordon Bennett Cup in Bad Homburg. The AIACR was to rename itself the FIA after the Second World War."
 vikelas.503.g: "From now on, automobile racing is international!"
 vikelas.504.t: "New Grand Prix Race Circuit"
 vikelas.504.d: "Another member of the AIACR has built an official Grand Prix circuit. There are now #G [GetGlobalVariable('vikelas_num_grand_prix_tracks_global_var').GetValue]#! #V Grand Prix circuits#! in the annual racing calendar."
 vikelas.504.f: "'Auto racing, bull fighting, and mountain climbing are the only real sports… all the others are games.' -Ernest Hemingway"
 vikelas.504.g: "Reserve the VIP seats in the stands."
 vikelas.505.t: "Racing Car Manufacturer Location"
 vikelas.505.d: "With [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')], [GetPlayer.GetName] has its first series racing team. The car factory in [SCOPE.sState('vikelas_team_state').GetName] is now enjoying great demand due to the established brand."
 vikelas.505.f: "With the slow development from individual men's drivers to professional racing teams with factory drivers, motorsport changed permanently. Amateurs with self-built cars became a rarity. Although it still happened that eccentric aristocrats with licenses from other car manufacturers sought the thrill, car development became the real center of motorsports."
 vikelas.505.g: "We can now design our own race cars!"
 vikelas.506.t: "Racing Car Mechanic"
 vikelas.506.d: "Chief engineer Dr. [SCOPE.sCharacter('gaudi_engineer_scope').GetLastName] has selected an excellent assistant from [SCOPE.sCharacter('gaudi_engineer_scope').GetHerHis] team who could act as mechanic for the newly founded racing team: [SCOPE.sCharacter('vikelas_new_mechanic_scope').GetFullName]. [SCOPE.sCharacter('vikelas_new_mechanic_scope').GetHerHis] specialization is in the field of..."
 vikelas.506.f: "Mechanics can make enhancements in the three areas of a car: engine, safety and body. Specialization helps to carry out modernization in a specific area twice as quickly. Basically - but not always - it is true that engines increase reliability (and speed), safety extensions increase safety and bodies increase speed (and safety)."
 vikelas.506.h: "Engine."
 vikelas.506.i: "Safety."
 vikelas.506.j: "Body."
 vikelas.511.t: "The Great [SCOPE.sState('vikelas_city_race_start_state').GetCityHubName]-[SCOPE.sState('vikelas_city_race_goal_state').GetCityHubName] Race"
 vikelas.511.d: "The [ROOT.GetCountry.GetCapital.GetCityHubName] [SCOPE.GetRootScope.GetCountry.GetCustom('generic_newspaper_type')] has announced a big car race in its current weekly edition. The city-to-city race is designed to go from [SCOPE.sState('vikelas_city_race_start_state').GetCityHubName] to [SCOPE.sState('vikelas_city_race_goal_state').GetCityHubName]. Numerous racing drivers are also expected from abroad."
 vikelas.511.f: "The early days of motor racing were characterized by so-called gentleman drivers who took part in city-to-city races in self-built cars with their mechanic, who often also served as chauffeur. This racing format was often advertised, organized and supported by newspapers and automobile clubs. Since the mechanics were often still in their infancy, it was more important to arrive at the destination at all. Fatal accidents like that of Marcel Renault in the Paris-Madrid race meant that this form of organization was only a transitional phase in the history of racing."
 vikelas.511.g: "Prepare for the event in three months."
 vikelas.512.t: "Race Participation"
 vikelas.512.d: "The upcoming [SCOPE.sState('vikelas_city_race_start_state').GetCityHubName]-[SCOPE.sState('vikelas_city_race_goal_state').GetCityHubName] race in [SCOPE.sCountry('vikelas_race_country').GetName] has led to speculation as to whether our country's premier racer, [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName], will also take part."
 vikelas.512.g: "An excellent opportunity!"
 vikelas.512.h: "This is too dangerous."
 vikelas.512.tt: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] will prepare for the race in three months."
 vikelas.513.t: "Free Ride"
 vikelas.513.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName] is lucky: [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe] can give full throttle on the open road. The engine stops, the corners are smooth. Best requirements for a racing driver."
 vikelas.513.f: "'When speed gets in the blood, one must drive to live.' -Rudolf Carraciola"
 vikelas.513.g: "Fantastic!"
 vikelas.514.t: "Beautiful, untouched Nature"
 vikelas.514.d: "As [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe] drives from city to city, [ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName] notices the untouched nature in the area [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe] is driving through. Maybe [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe] should take a souvenir with him?"
 vikelas.514.f: "In the early phase of motorsport, a special attraction was driving through landscapes that were as wild and untouched as possible, which presented the driver with challenges. The early race tracks were therefore also criticized because they supposedly required less driving skill and adaptation requirements. Of course, some remote valleys, beaches and mountain areas could offer surprises."
 vikelas.514.g: "We have a race to win!"
 vikelas.514.h: "Collect some plants."
 vikelas.514.i: "Collect some stones."
 vikelas.515.t: "Sugar in the Tank"
 vikelas.515.d: "During a short stop, [ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName] notices that [ROOT.Var('vikelas_racer_var').GetCharacter.GetHerHis] competitor [SCOPE.sCharacter('vikelas_racer_2_scope').GetLastName]'s car is also nearby. Apparently the car is completely unobserved."
 vikelas.515.f: "'If you're not cheating, you're not trying.'"
 vikelas.515.g: "A sweet revange."
 vikelas.516.t: "A little help for a friend?"
 vikelas.516.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName] is currently in a good position, but sees [SCOPE.sCharacter('vikelas_racer_2_scope').GetLastName]'s smoking car on the side of the road. Maybe [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe] should check to see if everything is okay?"
 vikelas.516.f: "Motor injuries and accidents were commonplace in the early days of racing. However, while in later times marshals were available on closed routes, a breakdown could be dangerous in long-distance races without an observer. Wolves were still seen at the Mille Miglia in the Apennines in the 1930s. That's why help between racing colleagues often comes naturally."
 vikelas.516.g: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName] should stop and help."
 vikelas.516.h: "Haha! Fools!"
 vikelas.517.t: "Engine problems"
 vikelas.517.d: "Something - even [ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName] can't explain it - is going on with the engine. A diagnosis has so far been unsuccessful. [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe|U] may have to continue the race at reduced speed."
 vikelas.517.f: "Engine problems occur in every form of motorsport - both then and now. There were numerous drivers who had to retire from a race early because they were in the lead. As things stand, [ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName] could still finish the race, but only if he slows down, which would make it much more difficult to win."
 vikelas.517.g: "Use all available mechanical fine-tuning measures."
 vikelas.517.h: "The car has to survive the race like this."
 vikelas.518.t: "Nails"
 vikelas.518.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName] was able to build up a certain lead over the rest of the field. Maybe [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe] could improve his chances of winning and make life difficult for the rest of the field?"
 vikelas.518.f: "'I know he was cheating because I was cheating and he beat me.'"
 vikelas.518.g: "Get the nails, Muttley."
 vikelas.518.h: "We refrain from such unsportsmanlike practices."
 vikelas.519.t: "Disqualification"
 vikelas.519.d: "Unfortunately, [ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName]'s sporting misconduct came to light. The racing commission therefore immediately excluded [ROOT.Var('vikelas_racer_var').GetCharacter.GetHerHim] from further racing."
 vikelas.519.f: "'According to the regulations of the city-to-city race in accordance with paragraph 12 paragraph 6 line 9, the participant has violated the general rules and will therefore be excluded early. Appeal is not possible.'"
 vikelas.519.g: "Disqualified? That's unfair!"
 vikelas.520.f: "#V End Results#!\n\nFirst Place: [SCOPE.sCharacter('vikelas_racer_1_scope').GetFullName] from [SCOPE.sCountry('vikelas_first_winner_scope').GetName]\nSecond Place: [SCOPE.sCharacter('vikelas_racer_2_scope').GetFullName] from [SCOPE.sCountry('vikelas_second_winner_scope').GetName]\nThird Place: [SCOPE.sCharacter('vikelas_racer_3_scope').GetFullName] from [SCOPE.sCountry('vikelas_third_winner_scope').GetName]"
 vikelas.520.g: "Champagne!"
 vikelas.521.t: "Victory for [ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName]"
 vikelas.521.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] took first place in the city-to-city race in [SCOPE.sCountry('vikelas_race_country').GetName]. [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe] drove a [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')] [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]."
 vikelas.521.g: "Champagne!"
 vikelas.522.t: "2nd Place for [ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName]"
 vikelas.522.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] took second place in the city-to-city race in [SCOPE.sCountry('vikelas_race_country').GetName]. [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe] drove a [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')] [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]."
 vikelas.522.g: "See you next time!"
 vikelas.523.t: "3rd Place for [ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName]"
 vikelas.523.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] took third place in the city-to-city race in [SCOPE.sCountry('vikelas_race_country').GetName]. [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe] drove a [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')] [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]."
 vikelas.524.t: "City-to-City Race ends"
 vikelas.524.d: "The big city-to-city race in [SCOPE.sCountry('vikelas_race_country').GetName] is over and the winners have been chosen. [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] drove a [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')] [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]. Although we didn't get good positioning, at least the car and driver arrived safe and sound."
 vikelas.531.t: "Endurance Race"
 vikelas.531.d: "[GetPlayer.GetName] has organized a major endurance race and invited racers from all over the world to take part."
 vikelas.531.f: "The first car races at the beginning of the 20th century were distance races with the greatest possible range. They should test the speed and reliability of the racing cars. While France dominated racing in the early stages, they soon moved on to Grand Prix racing. That didn't change the fact that there were still important international endurance races. The most traditional race was the Targa Florio in Sicily. From 1906 to 1977 it was held mostly in May as an important international event, some with World Cup status. After the Targa Florio, the Thousand Miles (Mille Miglia) was considered a classic among road races (the Carrera Panamericana was added in the 1950s) and the basis for the term 'Gran Turismo' (GT), which describes fast touring sports cars for long-distance racing, such as those developed by Ferrari specifically for the MM."
 vikelas.531.g: "See you at the finish line!"
 vikelas.533.t: "Tire Damage"
 vikelas.533.d: "In the middle of the race, a burst tire leads to a sudden stop for [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName]. Despite the incident, the driver remained uninjured and impressed with his level-headed actions, but lost important time."
 vikelas.533.f: "The Mille Miglia of 1931 was characterized by massive tire wear. Before arriving in Rome, Arcangeli had to change a tire nine times. Nuvolari also had several punctures, but he still led Caracciola by two minutes in Rome. On the return journey to the Adriatic, the Alfa Romeos maintained their spirited pace despite the tire problems. In between, Borzacchini led the competition by 18 minutes. Along the Mediterranean coast north, Campari was four minutes ahead of the resurgent Arcangeli. The lead changed several times within the Alfa Romeos and the Italians seemed to have everything under control after two thirds of the race distance. This was also due to a dense network of service stations, which made many tire changes possible. The decision was made in the last 80 kilometers, when heavy rain set in and the Alfa Romeos had accidents with their tires once again worn out."
 vikelas.533.g: "Bad luck."
 vikelas.534.t: "The Railway Crossing"
 vikelas.534.d: "While chasing another driver, a warning sound suddenly sounds: a railway barrier lowers itself in front of both cars. The car in front speeds through. [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] must decide whether to stop or risk crossing before the opponent gains too much space."
 vikelas.534.f: "The drivers of the Mille Miglia were prone to daring maneuvers, like Hans Hermann, who competed in 1954, who drove his car under a closing railway barrier, whereby he and his passenger had to duck their heads."
 vikelas.534.g: "Risk it!"
 vikelas.534.h: "This is too foolhardy!"
 vikelas.538.t: "Wolves & Revolvers"
 vikelas.538.d: "On a mountainous night drive, the racing team gets off track. Suddenly there is a howl. A pack of wolves appeared to be hanging around nearby."
 vikelas.538.f: "'We found ourselves in a blizzard, and we were chased by wolves. They were put to flight, however, by shots from the revolver I always kept under the seat cushion, and by the arrival of a group of road gangers armed with torches and guns.' -Enzo Ferrari"
 vikelas.538.g: "Kill the wolves."
 vikelas.538.h: "Drive around the area widely."
 vikelas.538.i: "This discovery is much more important than a stupid race."
 vikelas.539.t: "Racing car drives into spectators!"
 vikelas.539.d: "A terrible accident occurred when a racing car left the track during the race and drove into the crowd. The motorsport world is shaken and the debate about safety standards is flaring up again."
 vikelas.539.f: "Since the first Mille Miglia in 1927, the event had been spared from catastrophic accidents despite the large number of spectators lining the roadsides. That changed on April 3, 1938 at 4:30 p.m. At this point the two Genoese drivers Angelo Mignanego and his co-pilot Dr. Luigi Bruzzo in her Lancia Aprilia along Viale Berti Pichat in Bologna. At a speed of just under 100 km/h, the inexperienced Mignanego lost control of the car on the tram tracks laid there. The Lancia first crashed into a tree and then into a large group of spectators. While the two car occupants were almost uninjured, ten people, including seven children, died in the crash. 26 spectators were injured, some seriously. A 12-year-old girl died in another accident in Stanghella."
 vikelas.539.g: "A black day for racing."
 vikelas.540.t: "New Average Speed Record"
 vikelas.540.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] has achieved an unprecedented average speed in endurance racing. The record will go down as a milestone in the history of motorsport."
 vikelas.540.f: "With breathtaking precision and technical mastery, [GetPlayer.GetCustom('vikelas_race_team_name_type')] achieved an average speed that was previously thought impossible. The record will long be considered the highlight of this golden era of motorsport."
 vikelas.545.t: "Fan Gathering!"
 vikelas.545.d: "During the endurance race between two cities, a cheering crowd gathered to celebrate [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] passing by their city. This event marks the rise of motorsport as a public sensation."
 vikelas.545.f: "The streets were lined with people who crowded together to catch a glimpse of the car speeding by. Children waved flags and adults shouted the name of the rider whose skills and courage inspired them. As the car stopped, a wave of excitement washed over him. Flowers, applause and cheers accompanied the short stop before the driver set off again. It was a moment that ignited a passion for speed and technology in people's hearts - a taste of what motorsport would mean in the decades to come."
 vikelas.545.g: "Racing becomes popular."
 vikelas.541.t: "Endurance Race Ends"
 vikelas.541.d: "[SCOPE.sCharacter('vikelas_racer_1_scope').GetFullName] from [SCOPE.sCountry('vikelas_first_winner_scope').GetName] won the prestigious endurance race and also the hearts of the spectators."
 vikelas.541.f: "The last few kilometers were a real spectacle: dust swirled across the track, the engines roared and the excitement was palpable. When the winner finally crossed the finish line, thunderous cheers erupted. His car, covered with the marks of a bitter race, became a symbol of his will to win. Fans carried him on their shoulders as the crowd celebrated the moment. With this triumph, [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] becomes one of the most important personalities in the motor sport and his racing team [GetPlayer.GetCustom('vikelas_race_team_name_type')] becomes a highly respected brand."
 vikelas.542.d: "[SCOPE.sCountry('vikelas_endurance_race_country_scope').GetName]"
 vikelas.551.t: "Grand Prix of [GetPlayer.GetName]"
 vikelas.551.d: "The racing season has reached [GetPlayer.GetNameNoFormatting]. Numerous racing drivers and their racing teams have already arrived to prepare for the Grand Prix that our country will soon host."
 vikelas.551.f: "'To race is to live. All the rest is simply waiting.' -Rudolf Carraciola"
 vikelas.551.g: "May the fastest win."
 vikelas.552.t: "Fastest Lap"
 vikelas.552.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] achieved the fastest lap in race training. These are excellent prospects for the actual race."
 vikelas.552.f: "'Even before the start, I was sure of winning.' -Ettore Bugatti"
 vikelas.553.t: "Oil Slick"
 vikelas.553.d: "During the Grand prix race, [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] got into the oil slick of an accident vehicle and left the road. Driver and car are able to continue driving, but have lost a lot of time in the current race."
 vikelas.553.f: "'I make cars to go. Not to stop.' -Ettore Bugatti"
 vikelas.553.g: "Oh no!"
 vikelas.554.t: "Rain"
 vikelas.554.d: "The Grand Prix race was surprised by a sudden rain front. Some riders stopped to change their equipment. The question for [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] is whether [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe] should complete the race recklessly or slow down to be on the safe side."
 vikelas.554.f: "'Fear nothing. Only believe.' -Armand Peugeot"
 vikelas.554.g: "That doesn't throw a driver off track!"
 vikelas.554.h: "Slow down the pace."
 vikelas.555.t: "Overtaking Maneuver"
 vikelas.555.d: "A unique opportunity arises when [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] gets close to [SCOPE.sCharacter('vikelas_racer_2_scope').GetLastName], a racer from [SCOPE.sCountry('vikelas_race_country_scope').GetName]. Should [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe] attempt an overtaking maneuver?"
 vikelas.555.f: "'The perfect racing car crosses the finish line first and then falls apart into its individual parts.' -Ferdinand Porsche"
 vikelas.555.g: "Forza!"
 vikelas.555.h: "This is too risky."
 vikelas.556.t: "Overtaking Maneuver succeeds"
 vikelas.556.d: "The overtaking maneuver was a complete success. [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] is ahead and has a speed advantage."
 vikelas.556.f: "'When I see an Alfa Romeo go by, I tip my hat.' -Henry Ford"
 vikelas.556.g: "Hooray!"
 vikelas.557.t: "Overtaking Maneuver fails"
 vikelas.557.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] did not succeed in the overtaking maneuver. The opponent defended himself successfully and our racing driver lost a lot of time."
 vikelas.557.f: "'It's hard luck, but it's all in the game. I did my best, and since I've lost out, I'm for the man who picked the prize.' -Ralph DePalma"
 vikelas.557.g: "What a shame."
 vikelas.558.t: "Home Crowd motivates Racer"
 vikelas.558.d: "At the Grand Prix of [GetPlayer.GetNameNoFormatting], [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] is considered a local hero and receives particularly strong support from the audience. This motivates the racing driver enormously!"
 vikelas.558.f: "'No one remembers who took second place and that will never be me.' -Enzo Ferrari"
 vikelas.558.g: "Great!"
