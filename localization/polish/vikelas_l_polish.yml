 notification_vikelas_autorace_endurance_race_first_place_notification_desc: "Our [concept_vikelas_racer] took first place in an Endurance Race and gains #G 50#! experience. Our [concept_vikelas_mechanic] gains #G 25#! experience. We gain #G 100#! @vikelas_mechanical_innovation! [Concept('concept_vikelas_mechanic','$concept_vikelas_mechanical_innovation$')]."
 notification_vikelas_autorace_endurance_race_information_place_notification_name: "Endurance Race: Information"
 notification_vikelas_autorace_endurance_race_information_place_notification_desc: "Our [concept_vikelas_racer] wasn't able to win, but arrived safely and gains #G 20#! experience. Our [concept_vikelas_mechanic] gains #G 10#! experience. We gain #G 30#! @vikelas_mechanical_innovation! [Concept('concept_vikelas_mechanic','$concept_vikelas_mechanical_innovation$')]."
