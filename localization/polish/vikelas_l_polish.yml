 je_vikelas_mechanic_safety: "Improve Race Car Safety"
 je_vikelas_mechanic_safety_reason: "Our mechanic [ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName] is improving the safety of the car. The completion depends primarily on the characteristics and experience of the mechanic."
