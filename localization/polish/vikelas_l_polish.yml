 vikelas.581.d_level_2: "[ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName] improved the engine. The latest racing car model now uses a #V six-cylinder engine#!. The new car now bears the name [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')] [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]."
