 vikelas.592.d: "After spending years as a [concept_vikelas_racer], the well known Car Racer of our country has died. Will we ever be able to replace such an astonishing talent?"
 vikelas.592.g: "This is a huge loss!"
 vikelas.592_tt: "Sometimes the game kills off characters. A mod cannot stop this from happening. This event removes the role of that [concept_character] from the game, so that you are not haunted by a ghost of them."
 vikelas.593.t: "Fatal Car Accident"
 vikelas.593.d: "Racing driver [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] pushed his luck too far. [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe|U] left the road at too high a speed and suffered a fatal accident."
 vikelas.593.f: "'Racing is a great mania to which one must sacrifice everything, without reticence, without hesitation.' -Enzo Ferrari"
 vikelas.593.g: "Next one!"
 vikelas.594.t: "Car Breakdown"
 vikelas.594.d: "Unfortunately, racer [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] had to give up before the race was over. The car broke down, [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe] claims."
 vikelas.594.f: "'Bad luck does not exist.' -Enzo Ferrari"
 vikelas.594.g: "Was it the car, or did the driver overstimulate the engine?"
 vikelas.595.t: "A New Racer"
 vikelas.595.d: "A new [concept_vikelas_racer] has introduced [SCOPE.sCharacter('vikelas_new_racer_scope').GetHerselfHimself]. [SCOPE.sCharacter('vikelas_new_racer_scope').GetHerHis|U] name is [SCOPE.sCharacter('vikelas_new_racer_scope').GetFullName]."
 vikelas.595.g: "Let's hope [SCOPE.sCharacter('vikelas_new_racer_scope').GetSheHe] has more luck."
 vikelas.596.t: "A New Mechanic"
