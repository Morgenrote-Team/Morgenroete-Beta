 vikelas.561.d: "The Grand Prix Race is over and the winners have been chosen. The winner of the [GetPlayer.GetName] Grand Prize is [SCOPE.sCharacter('vikelas_racer_1_scope').GetFullName]. The racing event will be remembered by the population for a long time."
 vikelas.561.f: "#V End Results#!\n\nFirst Place: [SCOPE.sCharacter('vikelas_racer_1_scope').GetFullName] from [SCOPE.sCountry('vikelas_first_winner_scope').GetName]\nSecond Place: [SCOPE.sCharacter('vikelas_racer_2_scope').GetFullName] from [SCOPE.sCountry('vikelas_second_winner_scope').GetName]\nThird Place: [SCOPE.sCharacter('vikelas_racer_3_scope').GetFullName] from [SCOPE.sCountry('vikelas_third_winner_scope').GetName]"
 vikelas.561.g: "Champagne!"
 vikelas.571.t: "The First 24 Hours of Le Mans"
 vikelas.571.d: "In 1923, the first 24 Hours of Le Mans took place, quickly becoming one of the most prestigious events in motorsport, attracting drivers and manufacturers from around the world."
 vikelas.571.f: "On May 26 and 27, 1923, the first 24 Hours of Le Mans was held, organized by the Automobile Club de l'Ouest. The 17.3-kilometer track in the Sarthe region hosted 33 vehicles. The conditions were challenging: rain, muddy roads, and a course that ran through the city of Le Mans and surrounding country roads. Victory went to André Lagache and René Léonard, driving a Chenard & Walcker Sport, covering a distance of 2,209 kilometers in 24 hours. This race marked the beginning of a tradition that continues to celebrate innovation and endurance in motorsport."
 vikelas.571.g: "24 hours? This is crazy!"
 vikelas.572.t: "The Birth of the Targa Florio"
 vikelas.572.d: "In 1906, the Targa Florio was created, a spectacular race held on the winding roads of Sicily. Organized by Vincenzo Florio, it brought the region into the center of the motorsport world."
 vikelas.572.f: "On May 6, 1906, the first Targa Florio took place, a long-distance race that turned the steep mountain roads and picturesque villages of Sicily into a challenging racecourse. Organized by Vincenzo Florio, a motorsport enthusiast, the event fulfilled his vision of a sporting challenge. The track spanned 446 kilometers, divided into three laps of 148 kilometers each. Victory went to Alessandro Cagno, driving an Itala, who crossed the finish line with an average speed of 46.8 km/h. The Targa Florio quickly became a symbol of courage, skill, and the passion for speed."
 vikelas.572.g: "The Targa Florio Establishes a Tradition"
 vikelas.573.t: "The First Semmering Berg-Rennen"
 vikelas.573.d: "In 1899, the first hill climb at Semmering was held, testing the limits of early automobile engineering and driving skill. This event marked an important milestone in the history of motorsport."
 vikelas.573.f: "On August 27, 1899, the first Semmering Hill Climb was held, organized by the Austrian Automobile Club. The 9.8-kilometer route, running from Klamm am Semmering to the mountain pass, pushed the early automobiles and their drivers to the limit. With inclines of up to 7% and sharp curves, the race was a test of both technology and courage. Victory went to Count Jenő Zichy, driving a Mors automobile, who completed the course with an average speed of 22.2 km/h. The race attracted a large audience and laid the foundation for the tradition of hill climbing in Europe."
 vikelas.573.g: "The hill climb enthralls the masses."
