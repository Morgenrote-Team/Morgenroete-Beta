 je_vikelas_endurance_race: "Endurance Race"
 je_vikelas_endurance_race_reason: "An endurance race is currently taking place in several states of our country. Racing drivers from all racing-loving countries take part in the race. A host country has a slight advantage and receives additional events. Unlike Grand Prixs, reliability is more important than speed, as the cars have to last over a long distance. The risk of an engine breaking is also greater than a fatal accident."
 je_vikelas_endurance_race_success: "[GetPlayer.GetName] has collected at least #ORANGE 8 Endurance Race Progress#!."
