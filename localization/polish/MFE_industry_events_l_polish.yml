 flavor_loc: ""
 mfe_industry_events.1.t:0 "Powstanie Spółki Kolejowej"
 mfe_industry_events.1.d:0 "Polityk z koneksjami, [SCOPE.sCharacter('rich_dude').GetFullName], chce ufundować nową spółkę kolejową, ale [SCOPE.gsInterestGroup('ig_intelligentsia').GetName] nie wspiera tej propozycji."
 mfe_industry_events.1.f:0 "\"Gorączka kolei ogarnia cały świat, dając pełno możliwości do zarobienia, ale musimy działać, i to szybko. Co ty na to?\""
 mfe_industry_events.1.a:0 "Pozwól [SCOPE.sCharacter('rich_dude').GetFullName] na rozwój interesu"
 mfe_industry_events.1.b:0 "Zablokuj jakiekolwiek dalsze działania"
 mfe_industry_events.1.c:0 "Dotuj jego działania"
 mfe_industry_events.2.t:0 "Kwitnąca Spółka Kolejowa"
 mfe_industry_events.2.d:0 "Nowe tory w [SCOPE.sState('railway_state').GetName] są hitem wśród mieszkańców, którzy doceniają je całym sercem."
 mfe_industry_events.2.f:0 "\"Dawniej potrzeba było trzech godzin by pojechać z [SCOPE.sState('railway_state').GetName] do [ROOT.GetCountry.GetCapital.GetName], ale te nowe tory skróciły czas podróży o połowę.\""
 mfe_industry_events.2.a:0 "To wspaniale!"
 mfe_industry_events.3.t:0 "Kłopoty Spółki Kolejowej"
 mfe_industry_events.3.d:0 "Nagłe zmiany na giełdzie wywarły presję na [SCOPE.gsInterestGroup('ig_industrialists').GetName], zabierając źródło kapitału, a przerośnięte spółki kolejowe w [SCOPE.sState('railway_state').GetName] upadają."
 mfe_industry_events.3.f:0 "\"Oczywiście, gazety cieszą się z tego jak nigdy - każdego dnia pojawiają się artykuły napisane przez członków [SCOPE.gsInterestGroup('ig_intelligentsia').GetName] pastwiące się nad naszą tragedią - coś trzeba z tym zrobić.\""
 mfe_industry_events.3.a:0 "Dotuj kolej!"
 mfe_industry_events.3.b:0 "To przecież [SCOPE.gsInterestGroup('ig_industrialists').GetName] chcieli wolnego rynku..."
 subsidize_rail_state_tt:0 "Zacznij dotować linie kolejowe w [SCOPE.sState('railway_state').GetName]"