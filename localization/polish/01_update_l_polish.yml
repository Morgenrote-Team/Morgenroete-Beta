 je_gaudi_custom_monument_blueprint_research: "Architect's Masterwork" #deepl:645220185
 je_gaudi_custom_monument_blueprint_research_reason: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] cieszy się światową sławą jako jeden z najważniejszych architektów czasów [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis]. Aby unieśmiertelnić [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] imię, [ROOT.Var('gaudi_architect_var').GetCharacter.GetHeShe] pracuje nad projektem wyjątkowego pomnika, który sprawi, że nasz naród zabłyśnie na całym świecie jako centrum sztuki architektonicznej." #deepl:2632883859

 gaudi.81.t: "Architects Masterwork" #deepl:681011782
 gaudi.81.d: "W ostatnich latach portal [THIS.GetCountry.GetName] stał się jednym z wiodących krajów w dziedzinie architektury. [ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] odegrał znaczącą rolę w tym rozwoju. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] przyjął zlecenie zaprojektowania pomnika, który rywalizowałby z wielkimi cudami starożytności, średniowiecza i epoki nowożytnej." #deepl:2672646441
 gaudi.81.f: "Pomnik Architekta opiera się na preferowanym stylu Wielkiego Architekta: \n\Arth Deco Architekci zaprojektują [GetBuildingType('building_gaudi_people_monument').GetName].\nBauhaus Architekci zaoferują [GetBuildingType('building_gaudi_forum_monument').GetName].\nNeoclassical Architekci stworzą [GetBuildingType('building_gaudi_people_palace').GetName]." #deepl:4088582525
 gaudi.81.g: "Wspaniały." #deepl:573443058

