 douglas.211.t: "Szczyt" #deepl:3152681021
 douglas.211.d: "Po żmudnej wspinaczce grupa alpinistów w końcu dociera na szczyt. [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] jest pierwszym człowiekiem, który zdobył to miejsce na ziemi [ROOT.GetCountry.GetNameNoFormatting]. Teraz nie pozostaje nic innego, jak delektować się chwilą triumfu." #deepl:2761012191
 douglas.211.f: ""Pierwsze pytanie, które zadasz i na które muszę spróbować odpowiedzieć, brzmi: "Jaki jest pożytek ze wspinaczki na Mount Everest?", a moja odpowiedź musi od razu brzmieć: "Nie ma sensu". Być może dowiemy się czegoś o zachowaniu ludzkiego ciała na dużych wysokościach i być może medycy wykorzystają nasze obserwacje do celów lotniczych. Ale poza tym nic z tego nie wyniknie. Nie przywieziemy ani odrobiny złota czy srebra, ani klejnotu, ani węgla czy żelaza. Nie znajdziemy ani jednej stopy ziemi, którą można by obsadzić uprawami w celu wyhodowania żywności. Jeśli więc nie potrafisz zrozumieć, że w człowieku jest coś, co reaguje na wyzwanie tej góry i wyrusza, by mu sprostać, że walka jest walką samego życia w górę i zawsze w górę, to nie zrozumiesz, dlaczego wyruszamy. To, co czerpiemy z tej przygody, to czysta radość, a radość jest przecież celem życia. Nie żyjemy po to, by jeść i zarabiać pieniądze. Jemy i zarabiamy pieniądze, by móc cieszyć się życiem. To właśnie oznacza życie i po to ono jest."- George Leigh Mallory" #deepl:2116445992
 douglas.211.g: "Cieszmy się świtem!" #deepl:3916807741
 douglas.212.t: "Wspinaczka przerwana" #deepl:2889222354
 douglas.212.d: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName]Próba zdobycia szczytu zakończyła się niepowodzeniem. Nasz alpinista został zmuszony do porzucenia przedsięwzięcia i powrotu." #deepl:641296697
 douglas.212.f: "Może być wiele powodów, dla których wspinacz porzuca wspinaczkę. Czasami wystarczy zmiana pogody; czasami domniemany dostęp do szczytu okazuje się zbyt zdradliwy. Wspinaczka często trwa zbyt długo i przekracza okno czasowe, ponieważ pewne pory dnia i zmiany sprawiają, że wspinaczka jest trudna lub niemożliwa. A czasem po prostu wybiera się złą ścieżkę." #deepl:430022267
 douglas.212.g: "Rozczarowujące." #deepl:1131565686
 douglas.213.t: "Górska katastrofa!" #deepl:285221578
 douglas.213.d: "Podczas wspinaczki w górach [SCOPE.sState('douglas_location_scope').GetName], [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] popełnił straszny błąd, który zakończył wyprawę katastrofą - zginęło kilka osób, wraz z nimi spadł prowiant i sprzęt. Cały naród jest w szoku!" #deepl:2272067559
 douglas.213.f: ""Każdej nocy, rozumiesz, widzę moich towarzyszy z Matterhornu ślizgających się na plecach, z wyciągniętymi ramionami, jeden po drugim, w idealnej kolejności w równych odległościach - najpierw przewodnik Croza, potem Hadow, potem Hudson, a na końcu Douglas. Tak, zawsze będę ich widział...'- Edward Whymper" #deepl:3038127729
 douglas.213.g: "Tragedia!" #deepl:1503732790

