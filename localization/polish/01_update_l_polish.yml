 concept_vikelas_olympian_desc: "#n Ten wpis został poprawiony.#!" #deepl:1338387803

 concept_douglas_mountain_summit: "Mountain Summit" #deepl:193458424
 concept_douglas_mountain_summits: "Mountain Summits" #You can use this for plural [Concept('concept_douglas_mountain_summit','$concept_douglas_mountain_summits$')]
 concept_douglas_mountain_summit_desc: "Szczyty górskie to upragniony cel wszystkich alpinistów. Oznaczają one najwyższy punkt góry. Każdy szczyt ma trzy różne atrybuty, które określają, jak trudno jest do niego dotrzeć.#V Wysokość#!: Wysokość określa, ile kroków potrzeba, aby wspiąć się na górę - odzwierciedla to ogólną długość wyprawy. Na każde 1000 metrów potrzebny jest jeden krok postępu. Wartość jest zaokrąglana w górę, co oznacza, że Mount Whitney o wysokości 4 421 metrów wymaga 5 kroków, podczas gdy Kauffmann Peak o wysokości 7 134 metrów wymaga 8 kroków. Prestiż góry jest obliczany na podstawie jej wysokości: całkowita wysokość jest dzielona przez 250. Tak więc idealna góra o wysokości 5000 metrów zapewnia 20 prestiżu.#V Poziom#!: Poziom góry reprezentuje wymagania sprzętowe niezbędne do jej zdobycia. Nie jest to ściśle związane z jej wysokością. Na przykład, pomimo wysokości 5 636 metrów, Citlaltépetl ma tylko poziom 1 i wymaga jedynie podstawowego sprzętu. Dla kontrastu, Matterhorn, na wysokości zaledwie 4 478 metrów, jest uważany za znacznie bardziej wymagający na poziomie 3, wymagający przynajmniej przygotowania do pierwszej pomocy w nagłych wypadkach w Alpach.#V Ryzyko#!: Poziom ryzyka góry wskazuje prawdopodobieństwo wystąpienia negatywnych zdarzeń wpływających na wyprawę. Jest on niezależny zarówno od wysokości, jak i poziomu. Kluczowymi zagrożeniami są lawiny, mgła i trudne warunki pogodowe. Na Popocatépetl można było wejść już we wczesnych czasach nowożytnych ze względu na jego gościnne otoczenie. Z kolei znacznie mniejszy Großvenediger, o wysokości zaledwie 3666 metrów, jeszcze na początku XIX wieku stanowił poważne zagrożenie dla austriackich ekspedycji. Więcej informacji na temat poszczególnych szczytów można znaleźć w sekcji [concept_douglas_mountain_summit_list]." #deepl:3359948048
 concept_douglas_mountain_range: "Pasmo górskie" #deepl:3289022657
 concept_douglas_mountain_ranges: "Mountain Ranges" #You can use this for plural [Concept('concept_douglas_mountain_range','$concept_douglas_mountain_ranges$')]
 concept_douglas_mountain_range_desc: "Pasmo górskie jest definiowane jako formacja górska, która oferuje potencjał dla [concept_douglas_mountaineering] treningu na długich dystansach. Klasyczne pasma górskie obejmują Góry Skaliste, Andy, Alpy i Kaukaz. W przeciwieństwie do [Concept('concept_douglas_mountain_summit','$concept_douglas_mountain_summits$')], które należy zdobyć, istnieje również wiele mniej wymagających gór, w których nie ma ryzyka [concept_douglas_mountaineer] śmiertelnego upadku. Należy je raczej traktować jako trasę treningową. Kraje z pasmami górskimi mają większe szanse na wyprodukowanie alpinistów niż te bez tego elementu geograficznego." #deepl:2685064578
 concept_douglas_alpine_heritage: "Alpine Heritage" #deepl:3116364012
 concept_douglas_alpine_heritage_desc: "Dziedzictwo alpejskie to zbiorczy termin określający związek z górami i specjalizację we wspinaczce górskiej. Odnosi się również do potencjału rekrutacji nowych [Concept('concept_douglas_mountaineer','$concept_douglas_mountaineers$')]- ponieważ w większości przypadków doświadczeni alpiniści pochodzą z obszarów górskich. To zawsze daje przewagę krajom z [Concept('concept_douglas_mountain_range','$concept_douglas_mountain_ranges$')] lub [Concept('concept_douglas_mountain_summit','$concept_douglas_mountain_summits$')]. Rekrutacja nowych alpinistów, a także różne inne działania, kosztują Alpine Heritage." #deepl:707449492

 concept_douglas_mountain_summit_list: "Lista szczytów górskich" #deepl:4208448161
