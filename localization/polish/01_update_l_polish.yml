### LEPSIUS/ANDERSSON ###

 lepsius.1502_peking_d: "\nAlong with Java Man, Peking Man is believed to be the first Homo Erectus found and reinforced the belief that humanity originally came from Asia. The bones are said to be 400,000 to 780,000 years old." #please replace

 lepsius_state_trait_heidelbergensis_cave: "Prehistoryczna jaskinia" #deepl:59949327

 lepsius.1326.t: "Homo Heidelbergensis ukończony" #deepl:2121693630
 lepsius.1326.d: "[SCOPE.sCharacter('lepsius_anthropologist_scope').GetFullName] zebrała wystarczającą ilość kości, aby wyciągnąć konkretne wnioski na temat wymarłego gatunku. Homo Heidelbergensis nie jest już tajemnicą dla nauki i może być teraz zlokalizowany z pewnym stopniem pewności w drzewie genealogicznym człowieka, nawet jeśli wciąż pozostaje wiele pytań bez odpowiedzi." #deepl:4182329393
 lepsius.1326.f: "Dolna szczęka Homo heidelbergensis została odkryta w 1907 r. przez robotnika Daniela Hartmanna w piaskowni w pobliżu Mauer niedaleko Heidelbergu i opisana w 1908 r. przez anatoma Otto Schoetensacka; liczące około 600 000 lat znalezisko jest uważane za najstarszy dowód na istnienie wczesnych ludzi w Europie, morfologicznie stoi pomiędzy Homo erectus i Homo sapiens, wskazuje na szerokie rozpowszechnienie tej formy hominidów w Afryce, Europie i Azji, a ze względu na swoją wytrzymałość i szacowaną objętość mózgu pozwala na wyciągnięcie wniosków na temat zaawansowanej adaptacji fizycznej, używania narzędzi i organizacji społecznej." #deepl:2078634084
 
 lepsius.1336.t: "Człowiek z Heidelbergu" #deepl:140239375
 lepsius.1336.d: "Pewien robotnik dokonał niezwykłego odkrycia w kopalni w Mauer, mieście położonym niedaleko Heidelbergu. Profesor Uniwersytetu w Heidelbergu natychmiast rozpoznał jego wartość." #deepl:3838910430
 lepsius.1336.f: "Dolna szczęka Homo heidelbergensis została odkryta w 1907 r. przez robotnika Daniela Hartmanna w piaskowni w pobliżu Mauer niedaleko Heidelbergu i opisana w 1908 r. przez anatoma Otto Schoetensacka; liczące około 600 000 lat znalezisko jest uważane za najstarszy dowód na istnienie wczesnych ludzi w Europie, morfologicznie stoi pomiędzy Homo erectus i Homo sapiens, wskazuje na szerokie rozpowszechnienie tej formy hominidów w Afryce, Europie i Azji, a ze względu na swoją wytrzymałość i szacowaną objętość mózgu pozwala na wyciągnięcie wniosków na temat zaawansowanej adaptacji fizycznej, używania narzędzi i organizacji społecznej." #deepl:2078634084

