 gaudi.82.t: "Praca architekta przez całe życie" #deepl:1436757673
 gaudi.82.d: "Po miesiącach przygotowań, [ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] przedstawił plany, obliczenia, statystyki i ręcznie wykonany model. [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U] ambitny pomnik jest już uważany za marzenie sztuki architektonicznej. Pozostaje tylko pytanie, kto zrealizuje to marzenie?" #deepl:1546320616
 gaudi.82.f: ""Jutro będziemy robić piękne rzeczy". -Antoni Gaudí" #deepl:3107908861
 gaudi.82.g: "Pomnik dla nas samych." #deepl:3586195485

