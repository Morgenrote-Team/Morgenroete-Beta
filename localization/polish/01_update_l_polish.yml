 MR_ALPINE_CLUB_BUTTON: "Klub alpejski" #deepl:3580940097
 MR_ALPINE_CLUB_BUTTON_TT: "#T Założenie Alpine Club#!\nZałożony w Londynie w 1857 roku Alpine Club jest najstarszą na świecie organizacją alpinistyczną. Jego powstanie było początkiem zorganizowanego alpinizmu w wiktoriańskiej Anglii. Klub miał na celu promowanie naukowej, geograficznej i sportowej eksploracji Alp. Wśród jego członków-założycieli był Edward Whymper, który ukończył pierwsze wejście na Matterhorn w 1865 roku. Klub Alpejski odegrał kluczową rolę podczas "złotego wieku alpinizmu" i opublikował wpływowe prace, w tym Alpine Journal. Ustanowił standardy dla przyszłych klubów alpinistycznych na całym świecie.[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:1435537543
