 douglas.104.t: "The Mountain Within" #deepl:2079471330
 douglas.104.d: "Po pięciu wyczerpujących latach wspinaczki i treningów, [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] powraca." #deepl:862787273
 douglas.104.f: "Góra nie ma głosu, ale uczy. Przez pięć długich lat nasz alpinista mierzył się ze śnieżną ślepotą, kruszącymi się skałami, gryzącym wiatrem i ciszą, która tnie głębiej niż jakiekolwiek ostrze. Jednak każda trudność wyrzeźbiła wiedzę w mięśniach, cierpliwość w oddechu. To, co zaczęło się jako ambicja, jest teraz hartowane w umiejętności. Wspinacz nauczył się słuchać kamienia, przewidywać burze na podstawie zapachu, wiązać węzły z zamkniętymi oczami i spokojnym sercem. [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetSheHe|U] powraca odmieniony. To jest początek mistrzostwa." #deepl:1510753382
 douglas.104.g: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetSheHe|U] nie zdobywa już góry -[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetSheHe] rozumie ją" #deepl:2453485277

