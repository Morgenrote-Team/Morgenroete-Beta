 gaudi.10.t: "Architekt poprawił reputację" #deepl:3290657742
 gaudi.10.d: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] W ciągu ostatnich kilku lat firma [ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] wykazała się doświadczeniem w zakresie ulepszania i budowy nowych budynków w całym kraju, znacznie zwiększając reputację i umiejętności [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis]." #deepl:1621312069
 gaudi.10.f: ""Sztuką macierzystą jest architektura. Bez własnej architektury nie mamy duszy naszej cywilizacji." -Frank Lloyd Wright" #deepl:2640014774
 gaudi.10.g: "Przejdźmy do nowych zadań architektonicznych!" #deepl:4140846455

