 douglas.111.t: "Pierwszy krok" #deepl:1387851608
 douglas.111.d: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] wyposaża zespół w podstawowy sprzęt wspinaczkowy." #deepl:1200110309
 douglas.111.f: "Era improwizowanych wspinaczek dobiegła końca. Pod przewodnictwem [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] zespół otrzymuje swój pierwszy standardowy sprzęt: liny, czekany, czekany i solidne plecaki. Narzędzia te nie tylko ratują życie - zmieniają postrzeganie góry. Wspinaczka staje się bardziej metodyczna i skalkulowana. Tam, gdzie kiedyś liczyły się odwaga i brutalna siła, teraz technika i przygotowanie zajmują centralne miejsce. To skromny, ale definiujący epokę krok dla każdego, kto odważy się wkroczyć do bezlitosnego świata lodu i skał." #deepl:444296823
 douglas.111.g: "Teraz góry należą do przygotowanych." #deepl:660628980
 douglas.112.t: "Związany liną" #deepl:263345135
 douglas.112.d: "Nasz alpinista [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] ma nowy pomysł: Aby poprawić bezpieczeństwo, wprowadza się stałe zespoły linowe." #deepl:3311883976
 douglas.112.f: "Każdy krok w górach niesie ze sobą ryzyko - ale teraz nikt nie wspina się sam. Wprowadzenie zespołów linowych oznacza zmianę sposobu myślenia: nie jest to już jednostka przeciwko górze, ale łańcuch wspinaczy zjednoczonych zaufaniem - i plecionym sznurkiem. Ta zmiana wprowadza porządek, dyscyplinę i głębokie poczucie współodpowiedzialności. Jeśli ktoś spadnie, inni go podtrzymują. Niebezpieczeństwo nie jest eliminowane, ale redystrybuowane. Góra pozostaje dzika, ale nasza odpowiedź na nią nie jest już heroiczna, ale oparta na współpracy." #deepl:1978213156
 douglas.112.g: "Jedna lina. Jedna wola. Jeden zespół." #deepl:1569127386
 douglas.113.t: "Kruche ciało" #deepl:3178580481
 douglas.113.d: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] nalega na wprowadzenie systemu pierwszej pomocy dla zespołu." #deepl:887703212
 douglas.113.f: "Pęcherze, złamania, odmrożenia - góry nie okazują litości. To, co kiedyś było akceptowane jako część ryzyka, teraz jest systematycznie leczone. Mały zestaw medyczny, używany mądrze, może uratować życie. Szybko zbudowane schronienie może zyskać na czasie. Po raz pierwszy podstawowa wiedza medyczna staje się częścią szkolenia. Góra nadal wymaga wszystkiego - ale wraz z wprowadzeniem apteczek i planów awaryjnych zespół reaguje czymś więcej niż tylko żwawością. Ludzkie ciało nie jest już ignorowane - jest chronione." #deepl:563827659
 douglas.113.g: "Nawet najsilniejsi mogą upaść." #deepl:4107036891
 douglas.114.t: "Stone Speaks" #deepl:2102994496
 douglas.114.d: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] wprowadził naukowe metody w alpinizmie: Wiedza geologiczna została wprowadzona w celu poprawy analizy terenu." #deepl:3612073372
 douglas.114.f: "To, co kiedyś wydawało się tłem - kruszywem, osadem, skałą - teraz staje się językiem do odczytania. Jeden z członków zespołu wnosi wiedzę geologiczną: warstwy ujawniają starożytne ruchy, rodzaje skał ostrzegają przed lawinami, linie uskoków wyznaczają bezpieczne trasy. Góra nie jest już mitem - jest archiwum. Nauka przybywa z notatnikami i młotkami i nagle wyprawy stają się nie tylko przygodami, ale badaniami terenowymi. To nowy sposób patrzenia - cicha rewolucja." #deepl:1873707756
 douglas.114.g: "Nauczmy się, zanim zaczniemy się wspinać." #deepl:3896308340
 douglas.115.t: "Oddech wysokości" #deepl:1444940126
 douglas.115.d: "Dlaczego nie wykorzystać doświadczeń z wojny chemicznej do celów alpinistycznych? Nowa technologia umożliwia korzystanie z masek tlenowych na ekstremalnych wysokościach." #deepl:2351243748
 douglas.115.f: "Powyżej pewnej wysokości niebo się rozrzedza. Oddychanie staje się walką, ciało protestuje. Ale teraz, z pomocą urządzeń mechanicznych, ludzie docierają do miejsc, do których nigdy nie byli stworzeni. Maski tlenowe - niegdyś ciekawostka naukowa - stają się standardem. Na nowo definiują granice możliwości. Świat powyżej 7000 metrów staje się dostępny, choć za pewną cenę: wspinacz nie jest już naprawdę sam, ale częścią systemu podtrzymywania życia. Triumf nad górą nie zmniejsza się - jest tylko zimniejszy." #deepl:689433627
 douglas.115.g: "Oddychamy sztucznie, ale zwyciężamy." #deepl:53945526

