 je_douglas_mountaineering_expedition_reason: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName], nasz alpinista, prowadzi obecnie zespół alpinistów na wyprawie w [SCOPE.sState('douglas_location_scope').GetName]. Celem jest pierwsze wejście na szczyt. Szybkość wspinaczki zależy w dużej mierze od jego doświadczenia i cech charakteru. W zależności od trudności góry, mogą pojawić się większe niebezpieczeństwa. Jeśli ekspedycja nie osiągnie celu w określonym czasie, [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] przerwie wspinaczkę na szczyt. Jeśli ekspedycja z jakiegokolwiek powodu znajdzie się w największym możliwym niebezpieczeństwie, wydarzy się najgorsze." #deepl:488000629

