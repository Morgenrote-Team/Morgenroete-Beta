 MR_MOUNTAIN_EXPEDITION_LEVEL_1_BUTTON_TT: "#T Wyprawa alpinistyczna: Level 1 Summits#!\nTa kategoria gór może być zdobywana przy użyciu sprzętu alpinistycznego poziomu 1. Poziom nie oznacza wysokości ani ryzyka. Szczyty te obejmują: Mount Whitney, Citlaltépetl, Popocatépetl, Chimborazo, Pico Aneto, Mont Blanc, Großvenediger, Mount Cameroon, Ras Dashen i Mount Giluwe. Więcej informacji można znaleźć na stronie [concept_douglas_mountain_summit_list].\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:1466134091
