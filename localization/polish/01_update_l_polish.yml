 douglas.103.t: "Pułk wojsk górskich" #deepl:459726214
 douglas.103.d: "Ze względu na swoje imponujące doświadczenie w zdobywaniu gór i obronie górskiej, [SCOPE.sCharacter('douglas_mountain_veteran').GetFullName] postanowił wykorzystać swoje umiejętności do stworzenia elitarnej jednostki wojsk górskich." #deepl:3198382874
 douglas.103.f: "Gebirgsjäger, Alpini czy Chasseurs Alpins to tylko kilka przykładów elitarnych oddziałów z niektórych krajów, które specjalizowały się w wojnie na wysokościach. Założeni w 1872 roku Alpini są najstarszą aktywną piechotą górską na świecie. Ich pierwotną misją była ochrona granicy Włoch z Francją i Austro-Węgrami." #deepl:3963027024
 douglas.103.g: "Będą nieść jego dziedzictwo w przyszłość." #deepl:1701012348

