 je_gaudi_bauhaus_architecture: "Architektura Bauhausu" #deepl:2452320752
 je_gaudi_bauhaus_architecture_reason: "Bauhaus był niemiecką szkołą artystyczną działającą w latach 1919-1933, która łączyła rzemiosło i sztuki piękne. Szkoła zasłynęła ze swojego podejścia do projektowania, które próbowało zjednoczyć indywidualną wizję artystyczną z zasadami masowej produkcji i naciskiem na funkcję. U jej podstaw leżała idea stworzenia Gesamtkunstwerk (kompleksowego dzieła sztuki), w którym wszystkie sztuki zostałyby ostatecznie połączone. Styl Bauhaus stał się później jednym z najbardziej wpływowych nurtów w nowoczesnym designie, modernistycznej architekturze i edukacji architektonicznej." #deepl:1381087306
 je_gaudi_neoclassical_architecture: "Architektura neoklasyczna" #deepl:3915160230
 je_gaudi_neoclassical_architecture_reason: "Neoklasycyzm na początku XX wieku był odrodzonym ruchem architektonicznym i artystycznym, który dążył do ponownego nawiązania do formalnej jasności, symetrii i wielkości grecko-rzymskiego antyku. Powstając jako kontrapunkt dla ekscesów historyzmu i rosnącej abstrakcji sztuki nowoczesnej, styl ten podkreślał monumentalność, geometryczny porządek i wykorzystanie tradycyjnych form w racjonalnym, często usankcjonowanym przez państwo idiomie. Był ściśle związany z tożsamością narodową i architekturą obywatelską, promując ideały trwałości, autorytetu i zdyscyplinowanego piękna." #deepl:2628512539
 je_gaudi_art_deco_architecture: "Architektura w stylu Art Deco" #deepl:2695214977
 je_gaudi_art_deco_architecture_reason: "Ruch Art Deco powstał w latach dwudziestych XX wieku jako styl dekoracyjny i architektoniczny, który obejmował nowoczesność, zachowując jednocześnie elementy klasycznego porządku. Dzięki charakterystycznemu wykorzystaniu stylizowanych form, bogatych materiałów i ozdobnej geometrii, Art Deco łączyło bogactwo rzemiosła z wyłaniającą się estetyką maszynową. Celebrował postęp technologiczny i miejski dynamizm poprzez motywy inspirowane przemysłem, szybkością i egzotyką." #deepl:2018331500

 je_gaudi_splendour_bauhaus: "Triumf Bauhausu" #deepl:1539285104
 je_gaudi_splendour_bauhaus_reason: "Wraz z wprowadzeniem ducha Bauhausu, architekci zaczęli pozbywać się ornamentów i iluzji na rzecz jasności, precyzji i prawdy o materiale. Celem nie jest już imponowanie bogactwem lub przywoływanie wielkości dawnych imperiów, ale służenie społeczeństwu poprzez tworzenie przestrzeni, które są funkcjonalne, uczciwe i nowoczesne. Bauhaus to nie tylko estetyka - to filozofia projektowania, oparta na przekonaniu, że architektura i codzienne życie muszą być pogodzone poprzez prostotę, użyteczność oraz jedność formy i celu. Przyjmując zasady Bauhausu, stolica sygnalizuje nie tylko nowoczesność, ale postęp w najczystszej postaci: wyniesienie funkcji ponad fasadę, innowacji ponad tradycję." #deepl:3357423326
 je_gaudi_splendour_neoclassical: "Odrodzenie neoklasyczne" #deepl:3536136445
 je_gaudi_splendour_neoclassical_reason: "Neoklasycyzm to styl zakorzeniony w racjonalnej harmonii starożytności, w architektonicznej gramatyce kolumn, frontonów i symetrycznych układów. Jednak na początku XX wieku został na nowo wyobrażony dzięki nowoczesnym technikom budowlanym, czystszym liniom i często monumentalnej skali. Stała ona nie tylko za tradycją, ale także za zdyscyplinowaną wizją przyszłości - taką, w której życie publiczne, prawo i kultura będą otoczone budynkami budzącymi podziw i jedność. Architektura, która obejmuje te zasady, nadałaby naszej stolicy powagi i wielkości - czyniąc ją latarnią morska porządku, odporności i kultywowanej władzy w oczach świata." #deepl:605890088
 je_gaudi_splendour_art_deco: "Marzenie o Art Deco" #deepl:1198646901
 je_gaudi_splendour_art_deco_reason: "Wraz z wprowadzeniem Art Deco, architekci zrewolucjonizowali świat sztuki, na przykład poprzez zerwanie ze sztywnym historyzmem przeszłości. Ale w przeciwieństwie do wielu nowoczesnych szkół, ich budynki nie były wyrazem zwykłej funkcjonalności i obiektywizmu. Art Deco to rozwój w środku ogólnego przebudzenia klasycznego modernizmu, w którym twórcze połączenie elegancji formy, szlachetności materiałów, siły kolorów i zmysłowości tematu było na pierwszym planie. W czasach swojej świetności reprezentował luksus, przepych, bujność i wiarę w postęp społeczny i technologiczny. Architektura respektująca te zasady uczyniłaby nasz naród dzieckiem nowoczesności i bogactwa." #deepl:980834049

