 douglas.101.t: "Założono klub alpinistyczny" #deepl:222126293
 douglas.101.d: "[SCOPE.sCharacter('douglas_president_scope').GetFullName] woła - a góra odpowiada. Założenie Klubu Alpinistycznego wyznacza nową erę dla wszystkich, którzy dążą wyżej." #deepl:4067420597
 douglas.101.f: "[SCOPE.sCharacter('douglas_president_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('douglas_president_scope').GetLastName] Ekspedycje prowadziły [SCOPE.sCharacter('douglas_president_scope').GetHerHim] przez burze i lawiny - ale teraz [SCOPE.sCharacter('douglas_president_scope').GetSheHe] stara się przekazać dziedzictwo [SCOPE.sCharacter('douglas_president_scope').GetHerHis]. W [ROOT.GetCountry.GetCapital.GetCityHubName], [SCOPE.sCharacter('douglas_president_scope').GetSheHe] zakłada Klub Alpinistyczny [GetPlayer.GetName], nie sam, ale wraz z obiecującym nowicjuszem: [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] [SCOPE.sCharacter('douglas_president_scope').GetFullName] widzi w [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetHerHim] nie tylko ambicję, ale i przyszłą legendę. Razem stoją u progu ścieżki, która prowadzi nie tylko na szczyty, ale do chwały, odwagi - i być może do miejsca w historii. Klub jest otwarty dla wszystkich, którzy słyszą zew gór. Rozpoczyna się wspinaczka." #deepl:3771164746
 douglas.101.g: "Góra wzywa!" #deepl:249284577

 douglas.102.t: "Klub Alpejski" #deepl:1599559370
 douglas.102.d: "Klub Alpejski został oficjalnie założony w [ROOT.GetCountry.GetCapital.GetCityHubName] w [TimeKeeper.GetCurrentDate.Format('y')] i jest uznawany za pierwszą na świecie międzynarodową organizację alpinistyczną. Jego powstanie wyznacza instytucjonalny początek nowoczesnego alpinizmu." #deepl:3982546221
 douglas.102.f: "Historycznie rzecz biorąc, grupa brytyjskich dżentelmenów zebrała się w Londynie w 1857 roku, aby założyć klub poświęcony alpinizmowi. Prowadzony przez takie osobistości jak John Ball i Edward Kennedy, Alpine Club starał się promować systematyczną eksplorację Alp, łącząc wyzwania fizyczne z badaniami geograficznymi i przyrodniczymi. Klub zapewniał zorganizowane ramy do dzielenia się wiedzą, organizowania wypraw i wspierania poczucia wspólnoty wśród wspinaczy. Jego członkowie odegrali kluczową rolę w tym, co później będzie znane jako "Złoty Wiek Alpinizmu", osiągając liczne pierwsze wejścia i dokumentując swoje doświadczenia. Wkrótce potem rozpoczęto publikację Alpine Journal, przyczyniając się do powstania literatury alpinistycznej. Założenie Alpine Club położyło podwaliny pod zorganizowaną wspinaczkę na całym świecie i wyznaczyło trwałe standardy w eksploracji gór." #deepl:4126383378
 douglas.102.g: "Razem na szczyt!" #deepl:2506053391

