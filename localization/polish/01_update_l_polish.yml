 gaudi.11.t: "Wybór schematu: Pomnik miejski" #deepl:3177181239
 gaudi.11.d: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName]najważniejszy architekt w naszym kraju, podjął się ważnego zadania zaprojektowania planu nowego budynku. Pozostaje pytanie: Jaki budynek powinien zostać zaprojektowany?" #deepl:1652669912
 gaudi.11.f: "A [GetBuildingType('building_gaudi_statue').GetName] zwiększa #G legitymizację rządu#!. [GetTechnology('elgar_classicism_tech').GetName] jest wymagane.\nA [GetBuildingType('building_gaudi_fountain').GetName] poprawia #G standard życia#! państwa, w którym się znajduje.\nA [GetBuildingType('building_gaudi_arch').GetName] zmniejszy #G straty morale#! walczących żołnierzy. [GetTechnology('napoleonic_warfare').GetName] jest wymagane." #deepl:2246128148
 gaudi.11.g: "Statua." #deepl:2708296858
 gaudi.11.h: "Fontanna." #deepl:320933070
 gaudi.11.i: "Łuk triumfalny." #deepl:1127411794
 gaudi.12.t: "Blueprint Selection: Plac publiczny" #deepl:3080738332
 gaudi.12.f: "A [GetBuildingType('building_gaudi_park').GetName] będzie #G zmniejszać zanieczyszczenie#!.\nA [GetBuildingType('building_gaudi_luna').GetName] poprawia #G dochód podatkowy#! stanu, w którym się znajduje. [GetTechnology('curtiss_tourism_tech').GetName] jest wymagane.\nA [GetBuildingType('building_gaudi_parade').GetName] ma pozytywny wpływ na #G wskaźniki poboru#!. [GetTechnology('nationalism').GetName] jest wymagane." #deepl:4066407048
 gaudi.12.g: "Park publiczny." #deepl:2494674221
 gaudi.12.h: "Luna Park." #deepl:971224439
 gaudi.12.i: "The Parade Ground." #deepl:1574323515
 gaudi.13.t: "Blueprint Selection: Plac publiczny" #deepl:3080738332
 gaudi.13.f: "A [GetBuildingType('building_gaudi_almshouse').GetName] będzie #G przyciągać migrantów#!. [GetTechnology('egalitarianism').GetName] jest wymagane.\nA [GetBuildingType('building_gaudi_school').GetName] poprawia #G dostęp do edukacji#! stanu, w którym się znajduje. [GetTechnology('empiricism').GetName] jest wymagane.\nA [GetBuildingType('building_gaudi_prison').GetName] będzie #G zmniejszać zamieszanie#!. [GetTechnology('law_enforcement').GetName] jest wymagane." #deepl:1220690443
 gaudi.13.g: "Państwowy przytułek dla obłąkanych." #deepl:10701147
 gaudi.13.h: "Szkoła państwowa." #deepl:781611903
 gaudi.13.i: "Więzienie stanowe." #deepl:2831404965
 gaudi.14.t: "Wybór planu: Zdrowie publiczne" #deepl:1830009383
 gaudi.14.f: "A [GetBuildingType('building_gaudi_canalization').GetName] da państwu #G odporność na cholerę, żółtą febrę i dżumę#!. [GetTechnology('modern_sewerage').GetName] jest wymagane.\nA [GetBuildingType('building_gaudi_hospital').GetName] poprawia #G wskaźnik urodzeń#! stanu, w którym się znajduje. [GetTechnology('theiler_microbiology_tech').GetName] jest wymagane.\nA [GetBuildingType('building_gaudi_health').GetName] zmniejszy #G intensywność chorób#!. [GetTechnology('pharmaceuticals').GetName] jest wymagane." #deepl:3694299428
 gaudi.14.g: "System kanalizacyjny." #deepl:4218293714
 gaudi.14.h: "Szpital Uniwersytecki." #deepl:2453533946
 gaudi.14.i: "Departament Zdrowia." #deepl:1923211910
 gaudi.15.t: "Blueprint Selection: Krajowa Akademia" #deepl:4003607718
 gaudi.15.f: "A [GetBuildingType('building_gaudi_science').GetName] zwiększy nasz #G miesięczny postęp akademicki#!. [GetTechnology('dialectics').GetName] jest wymagane.\nA [GetBuildingType('building_gaudi_arts').GetName] zwiększy nasz #G miesięczny postęp artystyczny#!. [GetTechnology('romanticism').GetName] jest wymagane.\nA [GetBuildingType('building_gaudi_sports').GetName] zwiększy #G doświadczenie naszych sportowców#!. [GetTechnology('organized_sports').GetName] jest wymagane." #deepl:1533132803
 gaudi.15.g: "Akademia Nauki." #deepl:1181583251
 gaudi.15.h: "Akademia Sztuki." #deepl:369638717
 gaudi.15.i: "Akademia Sportu." #deepl:1127570803
 gaudi.11.j: "Nowy plan nie jest potrzebny." #deepl:4175354043

 gaudi.16.t: "Nowy plan" #deepl:4025940977
 gaudi.16.d: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] zakończył dziś pracę nad projektem i przekazał go klientowi." #deepl:3235089264
 gaudi.16.f: ""Ozdoby to zmarnowana praca, a zatem zmarnowane zdrowie. Dziś oznacza również zmarnowany materiał, a oba oznaczają zmarnowany kapitał. Współczesny człowiek, człowiek o nowoczesnych nerwach, nie potrzebuje ozdób; brzydzi się nimi. -Adolf Loos" #deepl:1476970686
 gaudi.16.g: "Nowy budynek!" #deepl:1359643446

