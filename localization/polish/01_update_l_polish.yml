 gaudi.35.t: "Dzielnica Art Nouveau w [SCOPE.sState('gaudi_art_nouveau_quarter_state').GetCityHubName]" #deepl:1088148255
 gaudi.35.d: "Nowy rozwój artystyczny nie zatrzymał się na [SCOPE.sState('gaudi_art_nouveau_quarter_state').GetCityHubName]: nowe budynki w stylu Art Nouveau powstają w dzielnicy, która jest obecnie uważana za dzielnicę awangardy." #deepl:3696139674
 gaudi.35.f: "Debiutowi architektury secesyjnej w Brukseli towarzyszyła fala sztuki dekoracyjnej w nowym stylu. Ważnymi artystami byli Gustave Strauven, który używał kutego żelaza, aby uzyskać barokowe efekty na brukselskich fasadach; projektant mebli Gustave Serrurier-Bovy, znany z bardzo oryginalnych krzeseł i przegubowych mebli metalowych; oraz projektant biżuterii Philippe Wolfers, który tworzył biżuterię w postaci ważek, motyli, łabędzi i węży. Styl ten został szybko zauważony w sąsiedniej Francji. Po wizycie w Hôtel Tassel Horty, Hector Guimard zbudował Castel Béranger, jeden z pierwszych paryskich budynków w nowym stylu. Paryżanie z zadowoleniem przyjęli oryginalny i malowniczy styl Guimarda; Castel Béranger został wybrany jako jedna z najlepszych nowych fasad w Paryżu, rozpoczynając karierę Guimarda. Wystawa powszechna w Paryżu w 1900 r. stanowiła szczytowy punkt secesji. Między kwietniem a listopadem 1900 roku przyciągnęła ona prawie pięćdziesiąt milionów odwiedzających z całego świata i zaprezentowała architekturę, wzornictwo, szkło, meble i przedmioty dekoracyjne tego stylu. Chociaż wystawa w Paryżu była zdecydowanie największa, inne wystawy również przyczyniły się do popularyzacji tego stylu." #deepl:3102882922
 gaudi.35.g: "Nowa, tętniąca życiem kultura." #deepl:3379987285

 gaudi.22.t: "Linie i miary" #deepl:2020920879
 gaudi.22.d: "Nasz architekt powraca - tym razem z prętem geodezyjnym w ręku i nowym spojrzeniem na ziemię." #deepl:505021070
 gaudi.22.f: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] kiedyś zadowalał się szkicowaniem fasad na placach miast, śledzeniem cieni i ornamentów. Teraz [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] rysuje linie na ziemi.\n\nPodczas podróży [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis], [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] porzucił miasta i udał się w głąb lądu. W dzikiej Galicji, na bagnach delty Padu i przez tory kolejowe w Midlands, [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] spacerował z inżynierami, rolnikami i brygadzistami. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] nauczył się czytać teren tak, jak inni czytają Pismo Święte. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] mówi teraz o nachyleniach i punktach geodezyjnych. Notatniki [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U] nie są wypełnione ozdobnikami, ale kątami, wysokościami i odległościami mierzonymi co do cala. Niektórzy twierdzą, że [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] stał się suchy - zbyt wymagający, zbyt sztywny. Ale kiedy [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] patrzy na puste pole, [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] już widzi, gdzie mogą przebiegać aleje." #deepl:3503840059
 gaudi.22.g: "Budynek zaczyna się na długo przed położeniem kamienia węgielnego." #deepl:960677900
 gaudi.23.t: "Architekt, który się liczy" #deepl:2805524520
 gaudi.23.d: "Po dwóch latach nauki nasz architekt powraca -[ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] umysł ostrzejszy, [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] rysunki dziwniejsze." #deepl:3720893
 gaudi.23.f: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] kiedyś szkicował instynktownie. Teraz [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] szkicuje za pomocą logiki.[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] spędził [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] czas nie wśród murarzy czy budowniczych, ale w salach wykładowych. Paryż, Getynga, nawet Sankt Petersburg. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] siedział pod tablicami wypełnionymi symbolami, studiował pod okiem ludzi, którzy nie budowali niczego rękami, ale wszystko umysłem. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] mówi teraz o symetrii, modułach, krzywych obciążenia opisanych eleganckimi wzorami. [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U] nowe plany są surowe, dziwne, niemal obce w swojej precyzji. Niektórym wydają się zimne, nieludzkie. Ale wtedy [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] wyjaśnia: piękno kopuły nie tkwi w jej dekoracji, ale w doskonałości jej krzywizny. Urzędnicy nie są pewni, co zrobić z [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHim]. [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U] koledzy szepczą o niepraktyczności. Ale inni - zwłaszcza młodzi - słuchają." #deepl:796837829
 gaudi.23.g: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] buduje to, co inni tylko sobie wyobrażają." #deepl:2581034432
 gaudi.24.t: "Papier przed kamieniem" #deepl:3533867777
 gaudi.24.d: "Nasz architekt powraca nie z narzędziami czy równaniami, ale z pieczątkami, podpisami i siecią urzędników." #deepl:223531508
 gaudi.24.f: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] W ciągu dwóch lat spędzonych za granicą, [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] nie tylko studiował architekturę -[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] studiował administrację. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] nauczył się, jak projekt żyje lub umiera nie przez projekt, ale przez dekret. W Wiedniu [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] obserwował ministerstwa przy pracy; w Brukseli [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] przyglądał się urzędnikom wydającym pozwolenia; w Marsylii [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] uczestniczył w posiedzeniach rady, podczas których kanalizacja decydowała o panoramie miasta.\n\nTeraz, po powrocie do kraju, [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] wie, jakie dokumenty przedłożyć, kiedy, na jakie przepisy się powołać, komu schlebiać, a kogo ignorować. Przepisy, jak mówi [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe], nie są ścianami, lecz rusztowaniami - można je przesuwać, łagodzić, zmieniać ich kształt. I jakimś cudem pozwolenia przychodzą szybciej niż kiedykolwiek." #deepl:3047390249
 gaudi.24.g: "Każda wspaniała struktura zaczyna się od podpisanego formularza." #deepl:3498658136
 gaudi.25.t: "Architekt powraca... Ostatecznie" #deepl:2911431628
 gaudi.25.d: "Nasz architekt w końcu powrócił z [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] wielkiego tournée. Nikt nie jest do końca pewien, co [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] przywiózł - z wyjątkiem opowieści." #deepl:3640320352
 gaudi.25.f: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] powraca z cygaretkami i anegdotami. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] ma nazwiska do rzucenia, opinie do wydania i długi [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] udaje, że nie pamięta.[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] mówi pięknie, nawet przekonująco o strukturach [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] nigdy nie mierzonych. Zapytany o plany, [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] zmienia temat. Kiedy naciska się na wyniki, [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] uśmiecha się i zapewnia, że genialności nie da się przyśpieszyć.\n\nNiektórzy mówią, że [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] to oszust. Inni nazywają [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHim] niezrozumianym geniuszem. Prawda? Prawdopodobnie gdzieś pomiędzy kawiarnią w Trieście a spóźnionym pociągiem w Neapolu." #deepl:3339735037
 gaudi.25.g: "Co [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] robił przez cały ten czas?!" #deepl:3328871879
 gaudi.26.t: "W cieniu mistrza" #deepl:1494314704
 gaudi.26.d: "Nasz architekt powraca - mądrzejszy, stabilniejszy i noszący znamiona wielkiego nauczyciela." #deepl:2040369888
 gaudi.26.f: "Podczas gdy inni dużo podróżowali, [ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] wybrał głębię zamiast odległości. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] spędził większość swoich lat pod okiem jednej postaci - starzejącego się architekta o legendarnej reputacji. Nie tylko w salach wykładowych, ale także na rusztowaniach i w ciszy, [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] nauczył się widzieć strukturę za ornamentem, intencję za fasadą. [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U] linie stały się czystsze. [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U] spojrzenie bardziej krytyczne. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] nauczył się nie tylko jak budować, ale także dlaczego. Wieść o mentorstwie [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] rozprzestrzeniła się przed [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHim]. Młodzi praktykanci już szukają [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHim], a urzędnicy miejscy witają go z nieoczekiwanym szacunkiem. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] powraca jako ktoś naznaczony ciągłością, tradycją i być może - pewnego dnia - dziedzictwem." #deepl:833263334
 gaudi.26.g: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] niesie ciężar mądrości innego człowieka" #deepl:1891012360

