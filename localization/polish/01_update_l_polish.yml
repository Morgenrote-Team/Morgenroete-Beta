 gaudi_capital_expansion_advance_tt: "Rozszerzenie kapitału wzrasta o jeden poziom" #deepl:3994648872
 je_gaudi_capital_expansion_project: "Ekspansja kapitałowa" #deepl:4033066520
 je_gaudi_capital_expansion_project_reason: "W latach 1836-1936 wiktoriańskie stolice przeszły głębokie przemiany urbanistyczne. Paryż został przekształcony przez szerokie bulwary Haussmanna i osiowe widoki. Wiedeń zburzył swoje mury w 1857 roku, zastępując je wielką Ringstraße. Berlin szybko się rozrastał dzięki kamienicom, dzielnicom przemysłowym, a później modernistycznym osiedlom mieszkaniowym. Londyn rozrastał się dzięki przedmieściom kolejowym, projektom infrastrukturalnym i pierwszemu na świecie metru. Na całym kontynencie europejskim miasta królewskie przekształciły się w nowoczesne metropolie - pomniki władzy, ambicji i rosnących napięć społecznych." #deepl:4052914498

 gaudi.41.t: "Miasto bez granic" #deepl:1231776512
 gaudi.41.d: "Stare mury zostały zburzone. W ich miejsce pojawia się powietrze, światło i obietnica rozwoju." #deepl:2117769530
 gaudi.41.f: "Przez wieki strona [ROOT.GetCountry.GetCapital.GetCityHubName] była otoczona murem: dumna, zwarta i zamknięta w sobie. Ale teraz mury rozsypują się w proch i pył. Średniowieczne fortyfikacje zostały zburzone. W ich miejsce powstały szerokie bulwary, wysadzane drzewami i szlachetnymi fasadami. Wozy targowe i spacerujące pary stąpają teraz tam, gdzie kiedyś maszerowali strażnicy. Bulwary to coś więcej niż drogi - to deklaracje: pewności siebie, ekspansji, przyszłości zbyt dużej, by ją powstrzymać. Niektórzy ubolewają nad utratą starożytnych bram. Ale [ROOT.GetCountry.GetCapital.GetCityHubName] w końcu wziął swój pierwszy głęboki oddech." #deepl:4076900735
 gaudi.41.g: "Budujemy na zewnątrz - z wizją i wigorem" #deepl:1116241139
 gaudi.42.t: "Pierścień postępu" #deepl:3156235256
 gaudi.42.d: "Nowy pierścień bulwarów łączy miasto i stan." #deepl:3367270166
 gaudi.42.f: "Tam, gdzie kiedyś stały błotniste nasypy, teraz rządzi kamień i żelazo. Wielka aleja zakrzywia się jak naszyjnik wokół serca [ROOT.GetCountry.GetCapital.GetCityHubName], wiążąc jego dzielnice w ruchu i świetle. Nie były to zwykłe prace drogowe. Całe bloki zostały przerysowane, parki wyrzeźbione, pomniki oprawione w idealną perspektywę. Lampy gazowe rozkwitają o zmierzchu niczym uporządkowane gwiazdy. Z każdym wybrukowanym metrem strona [ROOT.GetCountry.GetCapital.GetCityHubName] staje się bardziej czytelna - bardziej imperialna. Urzędnicy mówią o "miejskiej harmonii". A ludzie? Spacerują, wpatrując się w posągi, których nigdy wcześniej nie widzieli, na ulicach, którymi kiedyś bali się chodzić." #deepl:3543082084
 gaudi.42.g: "Pierścień nie obrony, ale kierunku." #deepl:2497263912
 gaudi.43.t: "Drogi władzy" #deepl:4104296278
 gaudi.43.d: "Nowy prefect zmienia kształt [ROOT.GetCountry.GetCapital.GetCityHubName]- jedna oś na raz. Szeroki, prosty i całkowicie bezkompromisowy." #deepl:2867872335
 gaudi.43.f: "To nie jest ekspansja. To operacja. Pod kompasem i planem znajdują się całe dzielnice. Ulice są rzeźbione jak bulwary przez niegdyś niesamowite dzielnice. Stare uliczki znikają. W ich miejsce powstają linie - długie, proste i zawsze prowadzące do pomnika, koszar lub ministerstwa. Powstaje opór, ale pozwolenia są podpisywane, domy wywłaszczane, a fasady wyrównywane. [ROOT.GetCountry.GetCapital.GetCityHubName] mówi teraz językiem porządku: widoczność, cyrkulacja, kontrola. Za wielkością kryje się intencja. Biedni nazywają to "szorowaniem". Urzędnicy nazywają to "Modernizacją". Prefekt nazywa to koniecznością." #deepl:4133801679
 gaudi.43.g: "Niech nikt nie uniknie planu" #deepl:2017759053
 gaudi.44.t: "Metropolitan Horizon" #deepl:3803938371
 gaudi.44.d: "[ROOT.GetCountry.GetCapital.GetCityHubName] nie jest już tylko stolicą. Staje się światem w miniaturze." #deepl:101717450
 gaudi.44.f: "Stare miasto miało krawędzie. To nie ma żadnych. Stal i szkło przebijają się tam, gdzie kiedyś dominował kamień. Linie kolejowe przecinają się pod publicznymi ogrodami. Elektryczne światła zacierają granice między zmierzchem a świtem. Ambasady, banki, galerie i kawiarnie kwitną jak orchidee w żelaznej oranżerii nowej ery. Obce języki odbijają się echem w arkadach. Wieżowce rzucają wyzwanie katedrom. [ROOT.GetCountry.GetCapital.GetCityHubName] nie prosi już o pozwolenie na rozwój - oczekuje przywództwa. Z każdej dzielnicy wyłania się jedna prawda: to już nie jest miasto narodu. To miasto narodów." #deepl:3494578230
 gaudi.44.g: "Powstajemy, ponieważ świat już patrzy." #deepl:1129952378

 gaudi_capital_expansion_project_progress_bar: "Ekspansja kapitałowa" #deepl:4033066520
 gaudi_capital_expansion_project_progress_bar_desc: "Ekspansja kapitałowa: #v [JournalEntry.GetCurrentBarProgress(ScriptedProgressBar.Self)|1%] #! ([JournalEntry.GetCurrentBarValue(ScriptedProgressBar.Self)|0]/30)" #deepl:707314599

 gaudi.511.d: "Jeśli chodzi o upiększanie [ROOT.GetCountry.GetCapital.GetCityHubName], nie było zgody w planowaniu urbanistycznym." #deepl:2161912626
 gaudi.512.t: "Posągi na obwodnicy" #deepl:1070850347
 gaudi.512.d: "Nowa grupa figur ma zostać wzniesiona na nowej obwodnicy [ROOT.GetCountry.GetCapital.GetCityHubName], ale nie jest jasne, która mitologiczna postać zajmie szczególne miejsce." #deepl:275330526
 gaudi.513.f: "Nowe ministerstwo miało zostać zbudowane jako okręt flagowy rządu, jednak ciągłe zmiany planów, rozbudowa i ukryta korupcja sprawiły, że budowa budynku przeciągnęła się, a wszystkie fundusze zostały wykorzystane do ukończenia. Niedokończony budynek można doprowadzić do stanu funkcjonalnego za pomocą kilku tymczasowych środków, ale prawdopodobnie nie leży to w interesie rządu, który musiałby zadowolić się mniejszymi biurami i mniejszym komfortem niż oczekiwano. Dalsza budowa jest możliwa, ale prawdopodobnie będzie kosztowna." #deepl:3580582680

 gaudi.511.t: "Fontanna czy pawilon?" #deepl:2151137688
 gaudi.511.f: "Można by to pomylić z kłótnią o brodę cesarza: z petitesse rozwinął się namacalny spór polityczny. Chodzi o projekt budowlany na reprezentacyjnym placu o wysokich walorach estetycznych. Jedna frakcja chciałaby zbudować tam pawilon do odpoczynku, druga opowiada się za budową fontanny. Ponieważ jest tylko jedna działka, można zbudować tylko jeden z projektów; kompromis jest niewykonalny." #deepl:1541667756
 gaudi.511.g: "Budujemy pawilon." #deepl:2064679099
 gaudi.511.h: "My budujemy fontannę." #deepl:2431357846
 gaudi.511.i: "Mam własne plany co do tego miejsca..." #deepl:53271135
 gaudi.512.f: "Podczas planowania obwodnicy kilka szczegółów jest nadal niejasnych. Nie ustalono jeszcze, które figury mają zostać umieszczone w widocznym miejscu. Oczywiste jest, że powinny to być postacie z rzymskiego panteonu. Niektóre grupy ludności identyfikują się z poszczególnymi postaciami - na przykład kapitaliści zasugerowali umieszczenie Merkurego, boga handlu, pośrodku. Z drugiej strony, arystokraci nalegają na Jowisza, ojca bogów. Wojsko preferuje Marsa, a naukowcy chcą Apolla w centrum." #deepl:3457913174
 gaudi.512.g: "Jowisz." #deepl:641978563
 gaudi.512.h: "Merkury." #deepl:4064282680
 gaudi.512.i: "Apollo." #deepl:2704921915
 gaudi.512.j: "Mars." #deepl:4251022611
 gaudi.513.t: "Budynek ministerstwa przekracza koszty" #deepl:3536337121
 gaudi.513.d: "Budowa nowego budynku ministerstwa zamienia się w mały skandal." #deepl:3745484689
 gaudi.513.g: "Ustalono budżet, którego należy przestrzegać." #deepl:2982007153
 gaudi.513.h: "Jest to niefortunne, ale powszechne w tej dziedzinie." #deepl:3799202878
 gaudi.513.i: "Ten projekt powinien otrzymać tyle pieniędzy i czasu, ile potrzebuje." #deepl:3703152475
 gaudi.514.t: "Nowa kawiarnia" #deepl:760472506
 gaudi.514.d: "Na Ringstrasse otwarto nową kawiarnię." #deepl:977697169
 gaudi.514.f: ""Kawiarnia pozostała naszym najlepszym miejscem edukacji wszystkiego, co nowe. Aby to zrozumieć, trzeba wiedzieć, że wiedeńska kawiarnia jest instytucją szczególnego rodzaju, której nie można porównać z żadną podobną instytucją na świecie. W rzeczywistości jest to rodzaj demokratycznego klubu, dostępnego dla każdego za tanią filiżankę kawy, gdzie za tę niewielką opłatę każdy gość może siedzieć godzinami, dyskutować, pisać, grać w karty, odbierać pocztę, a przede wszystkim konsumować nieograniczoną liczbę gazet i czasopism. Wszystkie wiedeńskie gazety były dostępne w lepszej wiedeńskiej kawiarni, i to nie tylko te wiedeńskie, ale te z całej Rzeszy Niemieckiej, francuskie, angielskie, włoskie i amerykańskie, a także wszystkie ważne recenzje literackie i artystyczne na świecie. Wiedzieliśmy więc wszystko, co działo się na świecie z pierwszej ręki, słyszeliśmy o każdej opublikowanej książce, o każdym przedstawieniu, gdziekolwiek się odbywało, i porównywaliśmy recenzje we wszystkich gazetach. Być może nic nie przyczyniło się tak bardzo do intelektualnej elastyczności i międzynarodowej orientacji Austriaka, jak fakt, że był on w stanie tak wszechstronnie orientować się we wszystkich wydarzeniach na świecie w kawiarni i jednocześnie dyskutować o nich w przyjaznych kręgach. Siedzieliśmy tam godzinami każdego dnia i nic nam nie umknęło". - Stefan Zweig" #deepl:1426019469
 gaudi.514.g: "[SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('gaudi_ruler').GetFullName] powinien go odwiedzić." #deepl:3567062403
 gaudi.514.h: "Podniesie to standard życia w Wiedniu." #deepl:993415000
 gaudi.515.t: "Ring Road Palais" #deepl:2889767777
 gaudi.515.d: "Pewien szlachcic przesadził z budową pałacu w nowej dzielnicy miasta [ROOT.GetCountry.GetCapital.GetCityHubName]. Na wpół ukończona ruina budynku straszy swoim wyglądem." #deepl:3082201997
 gaudi.515.f: "Ring Road Palace to określenie wspaniałych pałaców przy wiedeńskiej Ringstrasse. Budynki te zostały w większości zbudowane przez starą szlachtę lub bankierów i przemysłowców pod koniec XIX wieku. Pałace zostały zbudowane w stylu będącym mieszanką neobaroku i neorenesansu lub neomanieryzmu. Były również symbolem wzrostu i statusu. Jednak jeden z budowniczych niedawno przekroczył swoje możliwości i stoi w obliczu bankructwa. Mieszkańcy już teraz szydzą z tej szpecącej budowli, która w najgorszym wypadku musiałaby zostać ponownie wyburzona, co wydłużyłoby czas realizacji całego projektu." #deepl:2482976903
 gaudi.515.g: "Dzielimy się kosztami." #deepl:1778759255
 gaudi.515.h: "To nie nasza sprawa." #deepl:2515722656
 gaudi.516.t: "Rozszerzenie kapitału: Dobre postępy" #deepl:3725304670
 gaudi.516.d: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] stwierdził, że rozszerzenie kapitału może zostać zakończone wcześniej." #deepl:1876608469
 gaudi.516.f: "Z niewiadomych przyczyn wszystko rozwija się szybciej: może to być miłość do ojczyzny, wysokie zarobki, przyjazne wsparcie lokalnych elit lub po prostu lepsza pogoda." #deepl:771529955
 gaudi.516.g: "Wspaniały." #deepl:1621308786
 gaudi.517.t: "Rozszerzenie kapitału: Powolny postęp" #deepl:4246146058
 gaudi.517.d: "Niestety, kierownictwo budowy pod kierownictwem [ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] musiało dziś przyznać, że budowa nowej dzielnicy w [ROOT.GetCountry.GetCapital.GetCityHubName] jest opóźniona." #deepl:984753109
 gaudi.517.f: "Z nieznanych powodów wszystko postępuje wolniej: czy to agitacja wrogich elementów politycznych, podważanie etyki pracy przez związki zawodowe, spisek Iluminatów, czy po prostu zła pogoda." #deepl:967308050
 gaudi.517.g: "Godne pożałowania." #deepl:1477108256
 gaudi.518.t: "Pomnik na [SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('gaudi_ruler').GetFullName]" #deepl:4291665084
 gaudi.518.d: "Na Ringstrasse planowany jest nowy pomnik: będzie to posąg naszego króla [SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle]." #deepl:642834231
 gaudi.518.f: "Ringstrasse służyła zilustrowaniu historii Austrii. Z jednej strony uwieczniono długą linię monarchów z rodziny rządzącej Habsburgów, z których Maria Teresa otrzymała najbardziej bogaty pomnik. Ale także generałowie tacy jak Eugen von Savoyen czy Schwarzberg wzbogacili wiedeński krajobraz miejski. Tymczasem mieszczaństwo przywiązywało wielką wagę do uwieczniania swoich przedstawicieli, a mianowicie książąt poetów Goethego i Schillera, ale także wielkich kompozytorów Schuberta, Mozarta i Beethovena." #deepl:795951503
 gaudi.518.g: "Dobrze jest być [SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle]." #deepl:2477877691
 gaudi.518.h: "Pięknie - ale zamiast tego skup się na ukończeniu Ringstrasse." #deepl:1336009648
 gaudi.519.t: "Ognia!" #deepl:3279516897
 gaudi.519.d: "Niszczycielski pożar zniszczył kilka budynków na placu budowy w [ROOT.GetCountry.GetCapital.GetCityHubName]." #deepl:603406045
 gaudi.519.f: "Najbardziej znaną katastrofą na obwodnicy był pożar Ringtheater 8 grudnia 1881 roku. Jest to jedna z największych katastrof pożarowych XIX wieku. Szacunki mówią o setkach, jeśli nie ponad tysiącu ofiar. Przyczyną była usterka oświetlenia gazowego, która spowodowała ulatnianie się gazu i jego eksplozję przy następnej próbie zapłonu. Powstały w ten sposób pożar rozprzestrzenił się na kulisy, a następnie szybko rozprzestrzenił się na resztę sceny i ostatecznie na widownię. Pożar miał wpływ na krajową i międzynarodową prewencyjną ochronę przeciwpożarową, zwłaszcza w obszarze teatru i odpowiednie przepisy prawne dotyczące budowy teatrów w Austrii. Kompozytor Anton Bruckner, który miał bilety na wieczorny występ, uniknął śmierci tylko dzięki pozostaniu w domu z powodu złego samopoczucia." #deepl:1763422665
 gaudi.519.g: "Okropny dzień." #deepl:3953408834
 gaudi.520.t: "Uprzedzenia wobec rozbudowy miasta" #deepl:3932558777
 gaudi.520.d: "Przedstawiciele ludności wiejskiej postrzegają rozwój [ROOT.GetCountry.GetCapital.GetCityHubName] jako niekorzystny dla zwykłej ludności wiejskiej." #deepl:3359656956
 gaudi.520.f: ""Rząd daje jasno do zrozumienia swoją niewypowiedzianą swawolą w stolicy, że składa się z zdystansowanych mieszkańców miasta, którzy myślą tylko o kilku ulicach dalej i nigdy nie opuścili [ROOT.GetCountry.GetCapital.GetCityHubName]. Trwonione są tam ogromne sumy, które docierają tylko do stolicy, ale o których zwykli mieszkańcy wsi w małych miasteczkach lub wioskach nic nie zauważają. Stojąca za tym ideologia faworyzuje centralizm, faworyzuje biurokrację, faworyzuje i wspomaga aparat państwowy; ale jaką perspektywę taki dekadencki projekt oferuje zwykłemu człowiekowi?"." #deepl:2119590629
 gaudi.520.g: "Co powiesz na przyjazny prezent dla ciężko pracującej ludności wiejskiej?" #deepl:1425408969
 gaudi.520.h: "Miasto i prowincja są równe." #deepl:154752402
 gaudi.520.i: "Kogo obchodzi ta głupia gadka farmera?" #deepl:1424618973
 gaudi.521.t: "Rezydencja przemysłowa" #deepl:1054941492
 gaudi.521.d: "Bogaty biznesmen zlecił budowę nowego pałacu i w ten sposób wzbogacił [ROOT.GetCountry.GetCapital.GetCityHubName] o wspaniały budynek." #deepl:2324185893
 gaudi.521.f: "Pałace przemysłowców i bankierów były postrzegane jako sposób na podkreślenie ich nowej pozycji w państwie. Bogaci pochodzenia żydowskiego mogli również podkreślać swoją emancypację. Rozwój Wiednia w XIX wieku jest tego dobrym przykładem. Jednym z najbardziej znanych pałaców obwodnicy jest Palais Epstein. Został on zbudowany dla przemysłowca i bankiera Gustava Rittera von Epsteina. Architektem był Theophil Freiherr von Hansen, który zaprojektował również sąsiedni budynek austriackiego parlamentu. Pałac ma do pięciu pięter wysokości i został zbudowany w typowym dla swoich czasów stylu neorenesansowym." #deepl:2653721730
 gaudi.521.g: "[ROOT.GetCountry.GetCapital.GetCityHubName] rośnie i kwitnie." #deepl:2259204183
 gaudi.522.t: "Rozbudowa koszar" #deepl:3408528723
 gaudi.522.d: "Rozbudowa strony [ROOT.GetCountry.GetCapital.GetCityHubName] daje możliwość modernizacji i rozbudowy koszar." #deepl:933440251
 gaudi.522.f: "Koszary Franciszka Józefa były wiedeńskim budynkiem koszarowym w dzisiejszej okolicy Ringstrasse i przez długi czas stanowiły przeszkodę dla budowy projektu na dużą skalę. Koszary zostały nazwane na cześć cesarza Franciszka Józefa I i zbudowane w latach 1854-1857 w następstwie rewolucji 1848 roku. Wkrótce po wybudowaniu koszary stanęły na drodze rozwoju wiedeńskiej Ringstrasse, który rozpoczął się w 1857 roku, ale minęły cztery dekady, zanim wojsko ponownie się stąd wyprowadziło. Dlatego też nowe koszary musiały zostać wzniesione wcześniej, aby wchłonąć utratę koszar Franciszka Józefa." #deepl:4162429863
 gaudi.522.g: "Rozbudowa koszar." #deepl:2381627455
 gaudi.522.h: "Lepiej zainwestujmy ten czas gdzie indziej." #deepl:3269234038
 gaudi.523.t: "Rozszerzenie sektora budowlanego" #deepl:2392547084
 gaudi.523.d: "Ekspansja [ROOT.GetCountry.GetCapital.GetCityHubName] oferuje możliwość rozwoju sektora budowlanego. " #deepl:3106227577
 gaudi.523.f: ""Na ogół nazywamy naturę artysty sumą cech, które uniemożliwiają artyście tworzenie". - Arthur Schnitzler" #deepl:2115168723
 gaudi.523.g: "Rozbudowa biura konstrukcyjnego." #deepl:771559939
 gaudi.524.t: "Wspaniały park" #deepl:3707211248
 gaudi.524.d: "[ROOT.GetCountry.GetCapital.GetCityHubName]Nowy park został ukończony i jest teraz otwarty dla wszystkich mieszkańców na spacery." #deepl:2209166008
 gaudi.524.f: "Bramy nowego parku miejskiego otwierają się. Trawniki wiją się jak aksamit. Ścieżki wiją się między kwietnikami i posągami. Ale to, co najbardziej przyciąga tłumy, to nie trawa - to dźwięk. Orkiestra, mała orkiestra, walc dryfujący na wietrze. Muzyka publiczna, niegdyś zarezerwowana dla salonów i pałaców, teraz wypełnia powietrze dla wszystkich. W miastach takich jak Wiedeń Kursalon stał się obywatelską świątynią melodii. Wspaniały budynek w stylu włoskiego renesansu znajduje się przy Johannesgasse i posiada szeroki taras w parku. W czasach braci Straussów Kursalon był popularnym miejscem tańców i koncertów." #deepl:556984663
 gaudi.524.g: "Przejdźmy się." #deepl:3870101360
 gaudi.524.h: "Uczcijmy to koncertem!" #deepl:3249539672
 gaudi.525.t: "Rozszerzenie Opery" #deepl:3647447347
 gaudi.525.d: "Rozbudowa [ROOT.GetCountry.GetCapital.GetCityHubName] oferuje możliwość modernizacji i rozbudowy opery." #deepl:1640821642
 gaudi.525.f: "Pośród bulwarów i arkad, fontann i ministerstw, istniejąca opera zaczyna wydawać się skromna, a nawet prowincjonalna. Propozycja: nowa struktura lub rozległa rozbudowa. Więcej miejsc, lepsza akustyka, monumentalne fasady. Świątynia kultury na miarę rangi miasta. W całej Europie takie gesty stały się symbolami narodowego prestiżu. W Paryżu Opéra Garnier wznosi się z marmurowymi schodami i złotymi sufitami. W Wiedniu, Staatsoper, otwarta w 1869 roku, z elegancją i dumą zakotwicza Ringstraße." #deepl:2327891128
 gaudi.525.g: "Rozbudowa budynku opery." #deepl:4005131669
 gaudi.526.t: "Rozbudowa ratusza" #deepl:857877700
 gaudi.526.d: "Rozbudowa strony [ROOT.GetCountry.GetCapital.GetCityHubName] daje możliwość modernizacji i rozbudowy ratusza." #deepl:3575590115
 gaudi.526.f: "Stary ratusz wciąż nosi herb z innego stulecia. Wewnątrz: wąskie schody, przepełnione biura i księgi rachunkowe piętrzące się wyżej niż boazeria. Biurko burmistrza ledwo wystarcza na jego papierkową robotę, nie mówiąc już o władzy. Teraz propozycja: nowy ratusz, który odzwierciedla rosnącą rolę miasta w zarządzaniu, gospodarce i tożsamości obywatelskiej. Wysokie iglice lub powściągliwy klasycyzm - tak czy inaczej, musi on sygnalizować autorytet. W całej Europie miasta podjęły to wyzwanie. W Wiedniu neogotycki Rathaus (ukończony w 1883 roku) stał się symbolem miejskiej pewności siebie. Paryż odrestaurował swój Hôtel de Ville po 1871 roku z rozmachem i wyzywająco. Berliński Rotes Rathaus wyłonił się jako połączenie renesansowej formy i pruskiej funkcji." #deepl:2422046000
 gaudi.526.g: "Rozbudowa ratusza." #deepl:5728920
 gaudi.527.t: "Heldenplatz" #deepl:959071592
 gaudi.527.d: "Po ukończeniu budowy Heldenplatz (Placu Bohaterów), niektóre czołowe postacie polityczne naciskają na odpowiednią inaugurację." #deepl:1468121085
 gaudi.527.f: "Kiedy zbudowano Ringstrasse, "zewnętrzny Burgplatz" został zaprojektowany przez cesarza Franciszka Józefa jako część Kaiserforum, które nigdy nie zostało ukończone. Plan zakładał stworzenie prostokątnego placu, który byłby otoczony przez Skrzydło Leopoldyńskie, Nowy Hofburg, Kolekcje Habsburgów i odpowiednik Nowego Zamku, który nigdy nie został zbudowany w miejscu Volksgarten. Nazwa Heldenplatz została ustalona w 1878 roku; pochodzi od dwóch pomników konnych, z których oba są autorstwa Antona Dominika Fernkorna. Starszy z nich to pomnik arcyksięcia Karola, który został odsłonięty w 1860 roku. Jego odpowiednik, konny pomnik księcia Eugeniusza, również został ukończony w 1865 roku. Po przegranej I wojnie światowej, upadku podwójnej monarchii austro-węgierskiej pod rządami dynastii Habsburgów Lotaryńskich i założeniu pierwszej republiki austriackiej, Heldenplatz służył jako punkt zborny dla wszystkich obozów politycznych i jako plac defilad dla armii austriackiej." #deepl:562832934
 gaudi.527.g: "Zorganizować paradę i zaprosić naszych przyjaciół." #deepl:99539180
 gaudi.527.h: "Ustanowienie stałej parady wojskowej na kilka następnych lat." #deepl:3502479331
 gaudi.527.i: "I kto powinien za to wszystko zapłacić?" #deepl:3263444788
 gaudi.528.t: "Rozszerzenie uniwersytetu" #deepl:2548530815
 gaudi.528.d: "Rozbudowa [ROOT.GetCountry.GetCapital.GetCityHubName] oferuje możliwość modernizacji i rozbudowy uniwersytetu." #deepl:966048719
 gaudi.528.f: "Czym jest wielkie miasto bez myśli? Pośród linii kolejowych, ministerstw i teatrów, uniwersytet zaczyna nadwyrężać się pod wpływem własnego sukcesu. Zbyt wielu studentów na zbyt mało sal. Wydziały rozrzucone po wynajętych budynkach. Profesorowie przepychają się o przestrzeń między bibliotekami i laboratoriami. Propozycja jest jasna: nowy kampus lub poważna rozbudowa - nowoczesne sale wykładowe, dedykowane wydziały, monumentalna biblioteka. Takie projekty to coś więcej niż infrastruktura; to deklaracje intelektualnych ambicji. W Wiedniu uniwersytet został przeniesiony i odbudowany w latach 70. XIX wieku wzdłuż Ringstraße, z okazałą fasadą i symbolicznym centrum. W Paryżu Sorbona została gruntownie rozbudowana w ramach reform Julesa Ferry'ego, aby pomieścić rosnącą francuską klasę akademicką." #deepl:3542359765
 gaudi.528.g: "Rozbudowa uniwersytetu." #deepl:4228402238
 gaudi.529.t: "Rozszerzenie Akademii Sztuki" #deepl:1188603187
 gaudi.529.d: "Rozbudowa [ROOT.GetCountry.GetCapital.GetCityHubName] oferuje możliwość modernizacji i rozbudowy akademii sztuki." #deepl:2971034584
 gaudi.529.f: "Wraz z rozwojem miasta rośnie jego apetyt na sztukę. Jednak malarze i rzeźbiarze tłoczą się w małych pracowniach i na przyciemnionych strychach, ucząc się nie od mistrzów, ale z plotek i pożyczonych szkiców. Propozycja: prawdziwa akademia sztuki, z wypełnionymi światłem atelier, teatrami anatomicznymi i galeriami otwartymi na publiczne wystawy. W całej Europie takie akademie kształtują narodowy gust. École des Beaux-Arts w Paryżu wyznacza klasyczne standardy dla połowy kontynentu. W Wiedniu okazały budynek Akademie der bildenden Künste podkreśla prestiż kulturalny Ringstraße." #deepl:2427288221
 gaudi.529.g: "Rozszerzenie akademii." #deepl:3521772928
 gaudi.530.t: "Urania" #deepl:3604286803
 gaudi.530.d: "Wraz z Uranią w Wiedniu otwarto tak zwane "centrum edukacji ludowej", którego dokładny cel jest nadal kwestionowany." #deepl:2388110616
 gaudi.530.f: "W 1883 roku niemiecki astronom Max Wilhelm Meyer przybył do Wiednia, aby jako asystent na Uniwersytecie Wiedeńskim obliczać historyczne i przyszłe zaćmienia Słońca. Prowadził również wykłady z folkloru i rozwijał ideę instytucji edukacji ludowej. Ponieważ jednak w 1885 r. został wezwany do Berlina, nadal rozwijał tam swoje pomysły. Urania w Wiedniu była wzorowana na Uranii w Berlinie: miała miejsce dla 800 osób i zawierała salę wykładową dla 200 osób, sale do demonstracji naukowych i obserwatorium. Jednak ta "tymczasowa" Urania z trudem radziła sobie z napływem odwiedzających, więc wkrótce konieczny stał się nowy budynek przy Ringstrasse. Urania nie tylko rozszerzyła zakres swoich możliwości edukacyjnych (np. poprzez kursy językowe), ale także stała się miejscem koncertów, z własną orkiestrą symfoniczną Urania i chórem Urania. Niekonwencjonalny kształt i konstrukcja wywołały w Wiedniu zwyczajowy skandal. Budynek spodobał się jednak wiedeńczykom, a Urania szybko stała się jednym z symboli Wiednia." #deepl:2564552960
 gaudi.530.g: "Jest to architektoniczny punkt orientacyjny." #deepl:631489671
 gaudi.530.h: "Jest to przede wszystkim lokal rozrywkowy." #deepl:1069754801
 gaudi.530.i: "Przede wszystkim jest to obserwatorium." #deepl:2017455388

 gaudi.9.t: "Planowanie urbanistyczne zakończone" #deepl:1330111739
 gaudi.9.d: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] zakończyliśmy dziś prace nad planowaniem urbanistycznym [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] w ważnym mieście prowincjonalnym. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] jest teraz ponownie w pełni dostępny." #deepl:60424068
 gaudi.9.f: ""Architektura nie osiąga swojego najwyższego poziomu, dopóki nie jest tak nasycona wyobraźnią i fantazją - nie niezdyscyplinowaną wyobraźnią ani kapryśną fantazją - że uporządkowana tkanina zachwyca oko każdego inteligentnego obserwatora i wzbudza emocje jak wiersz". -Henry van Brunt" #deepl:2388189232
 gaudi.9.g: "Tak wiele projektów, tak mało czasu." #deepl:224764128

 gaudi_architecture_treatise_modifier: "Traktat o architekturze" #deepl:1594143488

 gaudi.8.t: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetLastName]Traktat o architekturze" #deepl:1170819237
 gaudi.8.d: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] ukończył pracę [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis]. [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U] traktat o architekturze historycznej i współczesnej, wzbogacony o [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] refleksje teoretyczne, wpłynie na przyszłe pokolenia architektów." #deepl:66798799
 gaudi.8.f: ""Architektura zapisała wielkie idee rasy ludzkiej. Nie tylko każdy symbol religijny, ale każda ludzka myśl ma swoją stronę w tej ogromnej księdze". -Victor Hugo" #deepl:864116211
 gaudi.8.g: "Praca dla potomnych." #deepl:575316054

