 je_gaudi_blueprint_research_reason: "Nasz architekt, [ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName], niestrudzenie pracuje nad nowym projektem budynku. Czas pracy zależy od umiejętności architekta; zazwyczaj zajmuje to trzy lata. Po zakończeniu badań dostępny będzie unikalny, nowy budynek." #deepl:201849280
