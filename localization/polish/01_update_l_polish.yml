 athletes.2.t: "Nasz Góral, [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullNameNoFormatting], przechodzi na emeryturę" #deepl:814507835
 athletes.2.d: "Po dziesięcioleciach spędzonych na [SCOPE.sCharacter('athletes_retired_person_scope').GetHerHis] wspinaniu się na szczyty, wytyczaniu nieznanych tras i prowadzeniu wypraw przez niebezpieczny teren, [SCOPE.sCharacter('athletes_retired_person_scope').GetFullName] zdecydował się przejść na emeryturę. [SCOPE.sCharacter('athletes_retired_person_scope').GetSheHe|U] nie będzie już służyć jako nasz [concept_douglas_mountaineer]." #deepl:3082522384
 athletes.2.f: ""
 athletes.2.g: "Szczyt nigdy nie był końcem - tylko widokiem przed zejściem." #deepl:3095673486
 athletes.12.t: "Nasz Góral umiera" #deepl:3903757311
 athletes.12.d: "Po całym życiu spędzonym na zdobywaniu szczytów i prowadzeniu innych przez najbardziej zdradzieckie wspinaczki, nasz najbardziej szanowany [concept_douglas_mountaineer] odszedł. Kto teraz poprowadzi nas w chmury?" #deepl:820605549
 athletes.12.f: ""
 athletes.12.g: "Ich lina może zniknąć, ale ich ślad pozostaje." #deepl:3208123983

