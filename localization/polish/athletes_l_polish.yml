l_polish:
 athletes.2.t: "Nasz wspinacz, [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullNameNoFormatting], przechodzi na emeryturę"
 athletes.2.d: "Po spędzeniu dekad [SCOPE.sCharacter('athletes_retired_person_scope').GetHerHis] życia na wspinaniu się na szczyty, mapowaniu nieznanych tras i prowadzeniu ekspedycji przez niebezpieczny teren, [SCOPE.sCharacter('athletes_retired_person_scope').GetFullName] zdecydował się przejść na emeryturę. [SCOPE.sCharacter('athletes_retired_person_scope').GetSheHe|U] nie będzie już dłużej pracować jako nasz [concept_douglas_mountaineer]."
 athletes.2.f: ""
 athletes.2.g: "Szczyt nigdy nie był końcem - tylko widokiem przed zejściem."
 athletes.12.t: "Nasz alpinista zmarł"
 athletes.12.d: "Po życiu spędzonym na zdobywaniu szczytów i przeprowadzaniu innych poprzez najbardziej zdradliwe ścieżki, nasz [concept_douglas_mountaineer] zmarł. Kto teraz poprowadzi nas w chmury?"
 athletes.12.f: ""
 athletes.12.g: "Jego lina mogła zniknąć, ale jego ślad pozostanie."
 athletes.52.t: "Nowy alpinista"
 athletes.52.d: "[SCOPE.sCharacter('douglas_new_mountaineer_scope').GetFullName] jest obiecującym talentem który pewnego dnia może być wśród najlepszych, którzy zdobyli nasze szczyty."
 athletes.52.f: ""
 athletes.52.g: "[SCOPE.sCharacter('douglas_new_mountaineer_scope').GetSheHe|U] wspina się z celem."
 athletes.102.t: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] jest teraz Weteranem Wspinaczki!"
 athletes.102.d: "Po stawieniu czoła lodowcom, przekroczeniu pasm górskich i poprowadzeniu ekspedycji w nieznane, nasz [concept_douglas_mountaineer] [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] jest teraz wystarczająco sławny by nazywać go Weteranem Wspinaczki!"
 athletes.102.f: ""
 athletes.102.g: "Władca Szczytów!"