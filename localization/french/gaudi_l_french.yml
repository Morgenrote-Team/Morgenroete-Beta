 je_gaudi_custom_monument_blueprint_research_reason: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] enjoys worldwide renown as one of the most important architects of [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] time. To immortalize [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] name, [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] is working on a blueprint for an outstanding monument that will make our nation shine throughout the world as a center of architectural art."
 gaudi.81.t: "Le travail de maître des architectes"
 gaudi.81.d: "Ces dernières années, [THIS.GetCountry.GetName] s'est hissé au rang des nations leaders dans le domaine de l'architecture. [ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] a joué un rôle important dans ce développement. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] a accepté la commande de concevoir un monument qui rivaliserait avec les grandes merveilles des époques antique, médiévale et moderne."
 gaudi.81.f: "The Architect's Monument is based on the preferred style of the Great Architect:\n\nArt Deco Architects will design the [GetBuildingType('building_gaudi_people_monument').GetName].\nBauhaus Architects will offer the [GetBuildingType('building_gaudi_people_forum').GetName].\nNeoclassical Architects will create the [GetBuildingType('building_gaudi_people_palace').GetName]."
 gaudi.81.g: "Magnificent."
 ACHIEVEMENT_gaudi_stalin: "Staline est vert de jalousie"
 ACHIEVEMENT_DESC_gaudi_stalin: "Posséder le Palais du peuple en tant que république de conseil avec une économie planifiée."
 gaudi.82.t: "L'œuvre d'une vie d'architecte"
 gaudi.82.d: "Après des mois de préparation, [ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] a présenté des plans, des calculs, des statistiques et une maquette réalisée à la main. [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U], monument ambitieux, est déjà considéré comme un rêve d'art architectural. La seule question qui subsiste est de savoir qui fera de ce rêve une réalité."
 gaudi.82.f: "Demain, nous ferons de belles choses. -Antoni Gaudí"
 gaudi.82.g: "Un monument à notre mémoire."
