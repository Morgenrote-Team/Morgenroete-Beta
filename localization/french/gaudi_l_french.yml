 gaudi.1407.d: "Our [concept_tesla_engineer] Dr. [GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetFullName] has discovered a new iron deposit in [SCOPE.sState('gaudi_deposit_state').GetName] using the most modern geophysical methods."
