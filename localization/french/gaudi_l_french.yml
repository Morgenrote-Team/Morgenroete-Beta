 gaudi.1409.d: "Our [concept_tesla_engineer] Dr. [GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetFullName] has discovered a new lead deposit in [SCOPE.sState('gaudi_deposit_state').GetName] using the most modern geophysical methods."
 gaudi.1407.f: "Il est possible de découvrir trois fois au cours de chaque partie un gisement spécial avec un ingénieur, à savoir du fer, du plomb et du pétrole. Cela nécessite également une certaine connaissance géomagnétique qui ne s’accumule qu’au fil des années. Il est donc conseillé de commencer les investigations géomagnétiques le plus tôt possible."
 gaudi.1407.g: "Heureka!"
