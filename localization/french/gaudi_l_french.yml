 ACHIEVEMENT_GROUP_gaudi_achievement_group: "Réalisations de Gaudí"
 ACHIEVEMENT_gaudi_kulturnation: "Culture"
 ACHIEVEMENT_DESC_gaudi_kulturnation: "En tant que nation allemande, achevez la cathédrale de Cologne, découvrez Neptune, fondez l'Allgemeine Deutscher Musikverein, créez le Festival Richard Wagner, transportez la porte d'Ishtar en Allemagne et faites de votre capitale le berceau de l'expressionnisme. Vous avez également besoin d'un chef d'orchestre actif et d'un archéologue célèbre et actif."
 ACHIEVEMENT_gaudi_segundo_siglo_de_oro: "Second Siglo de Oro"
 ACHIEVEMENT_DESC_gaudi_segundo_siglo_de_oro: "Ramenez l'Espagne au rang des grandes nations culturelles : découvrez Pluton, faites une grande découverte archéologique, faites de votre capitale le berceau de l'Art nouveau et complétez la Sagrada Família ! Vous devriez embaucher au moins un grand compositeur dans votre campagne."
