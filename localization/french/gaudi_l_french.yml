 je_gaudi_ben_phase_1_reason: "Le 16 octobre 1834, un incendie dévastateur détruit la majeure partie du palais de Westminster. Le ministère des Finances avait décidé de brûler le bois déchiqueté devenu superflu après une réforme fiscale de 1826. Les deux wagons furent brûlés dans deux fours, provoquant un incendie dans la Chambre des Lords. Seuls Westminster Hall, la Jewel Tower, la crypte de la chapelle Saint-Étienne et le cloître ont échappé à la destruction. Une commission décide en juin 1835 que le palais sera reconstruit sur le même emplacement ; soit de style gothique, soit de style Tudor. En 1836, après avoir examiné 97 propositions concurrentes, la commission sélectionna le plan de Charles Barry, qui prévoyait une reconstruction dans le style gothique."
 je_gaudi_ben_phase_2: "Une cloche distinctive"
 je_gaudi_ben_phase_2_reason: "Le nom Big Ben fait référence à la plus lourde des cinq cloches de la célèbre tour de l'horloge du palais de Westminster à Londres, pesant 13,5 tonnes. La tour a une hauteur de 96,3 mètres, avec les 61 premiers mètres en brique avec une façade en pierre calcaire et le sommet en fonte. Charles Barry, l'architecte du palais de Westminster, a chargé Augustus Pugin de concevoir la tour. Le mécanisme d'horlogerie a été développé en 1848 par Sir George Airy et Edmund Denison et fabriqué par l'horloger Edward John Dent. Le diamètre des quatre cadrans est de sept mètres chacun. Sous chacun des quatre cadrans se trouve l'inscription latine « Domine salvam fac reginam nostram Victoriam primam » (Dieu sauve notre reine Victoria Première)."
 je_gaudi_eiffel_phase_1_goal: "#E La progression de la construction#! atteint #BLUE 60#! points. Pour le moment, nous avons #G [GetGlobalVariable('gaudi_eiffel_progress').GetValue]#! points. Normalement, nous obtenons un point chaque mois."
