 gaudi.1221.t: "L'ordinateur mécanique"
 gaudi.1221.d: "Our [concept_tesla_mechanical_engineer] [GetPlayer.MakeScope.GetCountry.GetCustom('gaudi_dr_engineer_type')] has finally finished one of the greatest inventions of mankind: The Mechanical Computer. This invention will have an influence no one can yet grasp."
 gaudi.1221.f: "Les moteurs rugirent et le colosse commença à grincer et à craquer. Des milliers d'engrenages commencèrent à bouger et l'imprimante commença à cracher des chiffres les uns après les autres. Tout cela à une vitesse et avec une précision dont aucun humain ne serait capable."
 gaudi.1222.t: "Le moteur analytique"
 gaudi.1222.d: "[SCOPE.sCharacter('tesla_new_engineer_scope').GetFullName] a well-know polymath, designed a new machine that would be able to compute every calculation that exists. Now he is asking our government for support to actually build such a mechanical computer."
 gaudi.1222.f: "« Dès qu'une machine analytique existe, elle guidera nécessairement le cours futur de la science. Chaque fois que l'on cherche à obtenir un résultat à l'aide de cette machine, la question se pose alors : par quel calcul la machine peut-elle parvenir à ces résultats dans le temps le plus court ? » - Charles Babbage"
 gaudi.1222.g: "Quel projet fascinant !"
 gaudi.1222.h: "Nous pourrions construire tellement de navires de guerre à la place !"
 tesla_mechanical_computer_project_finished_engineer_loc: "\n[GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetFullNameNoFormatting] a inventé le premier #V ordinateur mécanique#!. L'une des plus grandes inventions de l'humanité."
