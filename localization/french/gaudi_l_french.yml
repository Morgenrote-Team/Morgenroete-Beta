 gaudi_neuschwanstein_phase_2_decision: "Neuschwanstein : un château de conte de fées"
 gaudi_neuschwanstein_phase_2_decision_desc: "Dès le début, Neuschwanstein n'était pas destiné à la représentation ou au public, mais comme une retraite privée pour le roi. Il fonde son œuvre sur les mythes chrétiens médiévaux, mais surtout sur les opéras de Richward Wagner, qu'il soutient financièrement et qu'il admire. Les idées toujours nouvelles du roi et son désir de construire pour l'éternité une scène d'opéra en pierre avec Neuschwanstein ont considérablement retardé la construction et ont amené Louis II au bord de la ruine."
