 gaudi.11.t: "Sélection de plans : Monument de la ville"
 gaudi.11.d: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName]L'architecte le plus important de notre pays s'est vu confier la tâche importante de concevoir le plan d'un nouveau bâtiment. La question demeure : Quel type de bâtiment doit-on concevoir ?"
 gaudi.11.f: "A [GetBuildingType('building_gaudi_statue').GetName] augmente la #G légitimité du gouvernement#!. [GetTechnology('elgar_classicism_tech').GetName] est nécessaire.\nA [GetBuildingType('building_gaudi_fountain').GetName] améliore le #G niveau de vie#! de l'état dans lequel il est situé.\nA [GetBuildingType('building_gaudi_arch').GetName] réduira #G la perte de moral#! des troupes combattantes. [GetTechnology('napoleonic_warfare').GetName] est nécessaire."
 gaudi.11.g: "La statue."
 gaudi.11.h: "La fontaine."
 gaudi.11.i: "L'arc de triomphe."
 gaudi.12.t: "Sélection du plan d'action : Place publique"
 gaudi.12.f: "A [GetBuildingType('building_gaudi_park').GetName] va #G réduire la pollution#!.\nA [GetBuildingType('building_gaudi_luna').GetName] améliore #G les revenus fiscaux#! de l'Etat dans lequel il est situé. [GetTechnology('curtiss_tourism_tech').GetName] est nécessaire.\nA [GetBuildingType('building_gaudi_parade').GetName] a un effet positif sur #G les taux de conscription#!. [GetTechnology('nationalism').GetName] est nécessaire."
 gaudi.12.g: "Le parc public."
 gaudi.12.h: "Le Luna Park."
 gaudi.12.i: "Le Parade Ground."
 gaudi.13.t: "Sélection du plan d'action : Place publique"
 gaudi.13.f: "A [GetBuildingType('building_gaudi_almshouse').GetName] will #G pull migrants#!. [GetTechnology('egalitarianism').GetName] is required.\nA [GetBuildingType('building_gaudi_school').GetName] improves #G education access#! of the state in which it is located. [GetTechnology('empiricism').GetName] is required.\nA [GetBuildingType('building_gaudi_prison').GetName] will #G decrease turmoil#!. [GetTechnology('law_enforcement').GetName] is required."
 gaudi.13.g: "L'aumônerie d'État."
 gaudi.13.h: "L'école publique."
 gaudi.13.i: "La prison d'État."
 gaudi.14.t: "Sélection du plan d'action : Santé publique"
 gaudi.14.f: "Une [GetBuildingType('building_gaudi_canalization').GetName] donnera à l'État #G une immunité contre le choléra, la fièvre jaune et la peste#!. [GetTechnology('modern_sewerage').GetName] est nécessaire.\NUne [GetBuildingType('building_gaudi_hospital').GetName] améliore le #G taux de natalité#! de l'État dans lequel elle est située. [GetTechnology('theiler_microbiology_tech').GetName] est nécessaire.\NUne [GetBuildingType('building_gaudi_health').GetName] diminuera #G l'intensité de la maladie#!. [GetTechnology('pharmaceuticals').GetName] est nécessaire."
 gaudi.14.g: "Le système d'assainissement."
 gaudi.14.h: "Hôpital universitaire."
 gaudi.14.i: "Le département de la santé."
 gaudi.15.t: "Sélection du plan d'action : Académie nationale"
 gaudi.15.f: "A [GetBuildingType('building_gaudi_science').GetName] will advance our #G monthly Academic Progress#!. [GetTechnology('dialectics').GetName] is required.\nA [GetBuildingType('building_gaudi_arts').GetName] will advance our #G monthly Artistic Progress#!. [GetTechnology('romanticism').GetName] is required.\nA [GetBuildingType('building_gaudi_sports').GetName] will #G boost the experience of our athletes#!. [GetTechnology('vikelas_international_sports_tech').GetName] is required."
 gaudi.15.g: "L'Académie des sciences."
 gaudi.15.h: "L'Académie des Arts."
 gaudi.15.i: "L'Académie des sports."
 gaudi.11.j: "Aucun nouveau projet n'est nécessaire."
 gaudi.16.t: "Un nouveau plan d'action"
 gaudi.16.d: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] a terminé aujourd'hui son travail sur le plan et l'a remis au client."
 gaudi.16.f: "L'ornementation est un gaspillage de travail et donc de santé. Aujourd'hui, il est aussi synonyme de gaspillage de matériel et, dans les deux cas, de gaspillage de capital. L'homme moderne, l'homme aux nerfs modernes, n'a pas besoin d'ornementation ; il l'abhorre\". -Adolf Loos"
 gaudi.16.g: "Un nouveau bâtiment !"
