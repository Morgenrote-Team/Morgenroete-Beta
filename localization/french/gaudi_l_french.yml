 gaudi.901.t: "Début de la construction du palais Gyeongbokgung"
 gaudi.901.d: "[SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('gaudi_ruler').GetFullName] a donné l'ordre de reconstruire l'ancienne résidence royale. Dans quelques années, il retrouvera son éclat d’antan."
 gaudi.901.f: "Le palais resta en ruines pendant deux siècles et demi. [SCOPE.sCharacter('gaudi_ruler').GetFullName] souhaite restaurer environ 500 bâtiments avec 7 700 pièces sur 40 hectares. Ce gigantesque projet architectural devrait être achevé dans quelques années seulement."
 gaudi.901.g: "Un tel palais ne convient que pour notre [SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle] !"
 gaudi.902.t: "Le palais Gyeongbokgung est terminé"
 gaudi.902.d: "Après des années, le Gyeongbokgung est enfin achevé. Il brille tel un joyau sur la capitale. Notre pays dispose enfin à nouveau d'un palais qui reflète la puissance et la richesse de la Corée."
 gaudi.902.f: "En 1867, pendant la régence de Daewongun, les bâtiments du palais furent reconstruits et formèrent un complexe massif de 330 bâtiments et 5 792 pièces. S'étendant sur 4 657 576 pieds carrés (432 703 mètres carrés), Gyeongbokgung est redevenu un symbole emblématique de la nation coréenne et de la famille royale coréenne. En 1894, les Japonais occupèrent le palais et forcèrent Gojong à établir un gouvernement pro-japonais. En raison de son statut de symbole de souveraineté nationale, Gyeongbokgung a été considérablement endommagé lors de l'occupation japonaise du début du XXe siècle. En 1911, la propriété des terrains du palais fut transférée au gouverneur général japonais. En 1915, sous prétexte d'exposition, plus de 90 % des bâtiments sont démolis. Après l'exposition, les Japonais ont rasé ce qui restait et ont construit leur siège colonial, le bâtiment du gouvernement général, sur le site."
 gaudi.902.g: "La splendeur de la Corée est revenue !"
 gaudi.909.t: "Séoul a perdu !"
 gaudi.909.d: "Avec la perte de Séoul, nous avons perdu toute opportunité de poursuivre la construction du palais Gyeongbokgung."
 gaudi.909.f: "Si Séoul devait être perdue pour une raison quelconque, l'avancement de la construction #R serait perdu dans son ensemble#!. Seule Séoul peut continuer la construction du palais Gyeongbokgung. Les envahisseurs étrangers ne montreront aucun intérêt à le construire."
 gaudi.909.g: "On ne peut pas leur laisser Séoul longtemps !"
 gaudi.911.t: "Des progrès lents dans la construction"
 gaudi.911.d: "Les travaux de construction de la résidence royale avancent lentement. Selon les calculs de l'architecte en chef, les progrès réalisés à ce jour accusent un retard de plusieurs mois."
 gaudi.911.f: "Pour des raisons inconnues, la construction du Gyeongbokgung progresse plus lentement : qu'il s'agisse d'une agitation d'éléments politiques hostiles, d'une atteinte à l'éthique du travail par les syndicats, d'une conspiration des Illuminati ou simplement du mauvais temps."
 gaudi.911.g: "Imposer des heures de travail plus longues."
 gaudi.911.h: "Versez une prime aux travailleurs."
 gaudi.911.i: "Nous attendons."
 gaudi.912.t: "Bons progrès de la construction"
 gaudi.912.d: "La construction du Gyeongbokgung progresse étonnamment rapidement. Selon l'architecte en chef, le palais pourrait être achevé plus tôt."
 gaudi.912.f: "Pour des raisons inconnues, la construction du Gyeongbokgung avance mieux : que ce soit l'amour de la patrie, les salaires élevés, le soutien amical des élites locales ou simplement le meilleur temps."
 gaudi.912.g: "Merveilleux."
 gaudi.913.t: "Feu!"
 gaudi.913.d: "Des nuages ​​de fumée s'élèvent au-dessus de la capitale et sont visibles à des kilomètres : un incendie s'est déclaré sur le plus grand chantier de construction de Corée !"
 gaudi.913.f: "La cause de l'incendie n'a pas encore été élucidée, mais l'incendie s'est propagé à de nombreux bâtiments et pièces en raison de la négligence et de la mauvaise organisation de la lutte contre l'incendie. Ce sont surtout les structures en bois vulnérables qui ont été détruites par les flammes. Le projet de construction a pris du retard de plusieurs semaines et mois !"
 gaudi.913.g: "Terrible!"
 gaudi.914.t: "Plus de chambres"
 gaudi.914.d: "Lors des travaux de construction, l'architecte en chef a dévoilé de nouveaux plans permettant une utilisation plus prudente de la zone. Des bâtiments et des pièces supplémentaires seraient alors possibles. Cependant, cela impliquait des coûts supplémentaires et un retard important."
 gaudi.914.f: "« Seulement 5 000 chambres ? Faisons-en 7 000 ! »"
 gaudi.914.g: "Nous avons besoin de plus d'espace pour le monarque et sa famille."
 gaudi.914.h: "C'est de la vanité !"
 gaudi.915.t: "Un visiteur impressionné"
 gaudi.915.d: "Ces derniers jours, [SCOPE.sCharacter('gaudi_sycophant_leader').GetFullName] a voulu constater par lui-même les dimensions et la beauté du palais en construction. Lorsqu’il a vu les structures émerger, il a été émerveillé par le chef-d’œuvre qui en résultait."
 gaudi.915.f: "'Mon [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], je n'étais pas conscient de ma propre punition avant de voir le Gyeongbokgung. Je me sentais comme un grain de poussière sur la grande plage, comme une étoile perdue dans le ciel du soir. Je n'étais qu'une luciole confrontée au soleil ce jour-là. En vérité, ce palais sera le palais le plus somptueux de tous les palais, un sanctuaire pour les rois, les empereurs – les dieux ! Ce n'est que grâce à vous que nous pouvons déjà entrevoir cette gloire, cette brillante idée de votre esprit. Je lèche ton ombre, même le crachat qui tombe de toi ne vaut pas la peine de toucher mon corps honteux après avoir vu la gloire. Oh, vraiment, moi, petit ver, j'ai douté, j'ai douté de toi, j'ai douté de la terre, j'ai douté de toutes les terres entre les mers et les cieux des étoiles ! Mais c’était moi qui avais tort, tort ici, tort là, tort en haut, tort en bas. Tout comme la grive saumonée parlait au roi des hérissons des prés, ainsi...'"
 gaudi.915.g: "Ces courtisans sont un fléau."
 gaudi.1005.t: "Le premier télégramme"
 gaudi.1005.d: "Aujourd'hui, [GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetFullName] a envoyé le premier message via un télégraphe électrique en utilisant un alphabet inventé par [GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetSheHe]. Le test a été une totale réussite."
 gaudi.1005.f: "In March 1843, the US Congress appropriated USD 30,000 to Samuel Morse to lay a telegraph line between Washington, D.C., and Baltimore, Maryland. Morse originally decided to lay the wire underground, asking Ezra Cornell to lay the line using a special cable-laying plow that Cornell had developed. However, the project was stopped after about 9.3 miles of wire was laid because the line was failing. Morse learned that Cooke and Wheatstone were using poles for their lines in England and decided to follow their lead. A test of the still incomplete line occurred on May 1, 1844, when news of the Whig Party's nomination of Henry Clay for U.S. President was sent from the party's convention in Baltimore to the Capitol Building in Washington. Morse's line was demonstrated on May 24, 1844, from the Old Supreme Court Chamber in the United States Capitol in Washington to the Mount Clare station of the railroad in Baltimore, and commenced with the transmission of Morse's first message (from Washington) to Alfred Vail (in Baltimore)."
 gaudi.1005.g: "Qu'est-ce que Dieu a fait"
 gaudi.1006.t: "La première automobile équipée d'un moteur à combustion"
 gaudi.1006.d: "Aujourd'hui, [GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetFullName] a conduit une automobile équipée d'un moteur à combustion interne du [SCOPE.sState('gaudi_car_state_1_scope').GetName] au [SCOPE.sState('gaudi_car_state_2_scope').GetName] et a atteint une vitesse de 16 kilomètres par heure."
 gaudi.1006.f: "\"16 kilomètres par heure ? C'est une vitesse meurtrière !\""
 gaudi.1006.g: "Vroum !"
