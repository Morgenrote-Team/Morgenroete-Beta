 gaudi_sagrada_phase_10_decision: "Sagrada Família : Flèche du Christ"
 gaudi_sagrada_phase_10_decision_desc: "La tour de Jésus est reliée par quatre ponts aux tours des évangélistes et surmontée d'une grande croix à six bras, haute de 13,5 m : dans sa partie centrale se trouve un agneau, ainsi que l'inscription 'Tu solus Sanctus, Tu solus Dominus, Tu solus Altissimus' et les mots 'Amen' et 'Hallelujah'. Chacun des quatre bras de la croix possède de puissants faisceaux de lumière visibles à de grandes distances, en souvenir du passage biblique qui définit Jésus comme « Je suis la lumière du monde ». À l'intérieur, la tour de Jésus sera divisée en trois étages, qui symboliseront la création de l'univers et la phrase liée au Christ « Je suis le Chemin, la Vérité et la Vie »."
 gaudi_sagrada_support_decision: "Soutenez la Sagrada Família"
 gaudi_sagrada_support_decision_desc: "La construction de la Sagrada Família est en fait censée reposer sur des dons - mais notre constitution actuelle permet d'interpréter ces « dons » de manière plus généreuse en motivant la population de notre pays à soutenir également le projet de construction. Cela nous accorde un point de construction supplémentaire chaque mois."
 gaudi_end_sagrada_support_decision: "Mettre fin au soutien à la Sagrada Família"
 gaudi_end_sagrada_support_decision_desc: "Nous pouvons toujours retirer notre soutien à la construction de la Sagrada Família, mais qui voudrait sérieusement cela ?"
 gaudi_activate_saxon_palace_decision: "Restaurer le palais saxon"
 gaudi_activate_saxon_palace_decision_desc: "Avec la libération de Varsovie s’ouvre un nouveau chapitre de l’histoire de la nation polonaise. Le palais saxon négligé, autrefois siège des rois de la dynastie Wettin, devait retrouver sa place, avec par exemple un mémorial pour le Soldat inconnu."
 gaudi.31.t: "Cinéma Art Déco au [SCOPE.sState('gaudi_art_deco_cinema_state').GetCityHubName]"
 gaudi.31.d: "Un nouveau cinéma moderne a ouvert ses portes aujourd'hui."
 gaudi.31.f: "Un genre important de bâtiments Art déco est la salle de cinéma. La période Art Déco a coïncidé avec la naissance du cinéma parlant et l’ère des salles de cinéma immenses et richement décorées. Beaucoup de ces salles de cinéma survivent encore, même si beaucoup ont été divisées à l'intérieur en salles de projection plus petites. Parmi les exemples les plus célèbres figurent le Paramount Theatre d'Oakland, en Californie, qui possédait un grand hall de quatre étages, accessible par vingt-sept portes et pouvant accueillir 3 746 personnes."
 gaudi.31.g: "Le nouveau Buster Keaton est-il déjà sorti ?"
 gaudi.32.t: "Gratte-ciel Art déco au [SCOPE.sState('gaudi_art_deco_skyscaper_state').GetCityHubName]"
 gaudi.32.d: "Avec ses ornements ludiques, ses fabuleuses mosaïques et ses formes attrayantes, le nouveau gratte-ciel du [SCOPE.sState('gaudi_art_deco_skyscaper_state').GetCityHubName] est bien plus qu'un simple bâtiment de grande hauteur."
 gaudi.32.f: "Le style Art Déco est né à Paris, mais aucun bâtiment n'était autorisé dans cette ville qui soit plus haut que la cathédrale Notre-Dame (à l'exception de la Tour Eiffel). En conséquence, les États-Unis ont rapidement pris la tête de la construction d’immeubles de grande hauteur. Les premiers gratte-ciel avaient été construits à Chicago dans les années 1880 dans le style Beaux-Arts ou néoclassique. Dans les années 1920, les architectes new-yorkais ont utilisé le nouveau style Art déco pour construire le Chrysler Building et l’Empire State Building. L’Empire State Building fut pendant quarante ans le plus haut bâtiment du monde. La décoration intérieure et extérieure des gratte-ciel était de type Art déco classique, avec des formes géométriques et des motifs en zigzag. Le Chrysler Building a mis à jour les gargouilles traditionnelles des cathédrales gothiques avec des sculptures sur les coins du bâtiment en forme d'ornements de radiateurs Chrysler."
 gaudi.32.g: "Des gratte-ciel avec style."
 gaudi.33.t: "Aéroport Art Déco"
 gaudi.33.d: "Un nouvel aéroport au luxueux style Art déco accueille des passagers du monde entier et montre aux étrangers la grandeur de notre nation dès leur arrivée."
 gaudi.33.f: "Au début du nouveau siècle, les aéroports sont le symbole du progrès : la conquête du ciel, longtemps considérée comme un rêve inaccessible de l’humanité, devient soudain une évidence. Les pilotes concouraient, battaient des records et tentaient de faire le tour du monde : en eux, l'idéal du héros antique se mêlait aux dernières technologies. En même temps, le vol de passagers était un symbole de statut social. L'exquis et le luxueux s'accrochaient à lui. Les aéroports Art Déco s'emparent de ce sujet et le transforment en une imagerie suggestive, soit à travers des décorations, soit à travers des proportions gigantesques."
 gaudi.33.g: "Howard Hughes en serait fier."
 gaudi.34.t: "Bureau Art Déco"
 gaudi.34.d: "Un nouveau bâtiment gouvernemental a ouvert ses portes aujourd'hui. Sa façade ludique proclame le triomphe du style Art Déco."
 gaudi.34.f: "Le style Art Déco était avant tout associé aux institutions associées à l'abondance et au luxe, telles que les bâtiments commerciaux, les bourses, les cinémas et les théâtres. Cependant, au fil du temps, ce style s’est également répandu dans les institutions étatiques. Les hôtels de ville, les palais de justice et les bâtiments gouvernementaux – comme les bureaux de poste – adopteront bientôt également ce style."
 gaudi.34.g: "Ce ne sont plus des salles d’écriture ordinaires !"
 gaudi.50.t: "Un rêve Art Déco"
 gaudi.50.d: "[ROOT.GetCountry.GetName] est devenu un brillant exemple d'architecture moderne et luxueuse. C’est un statut que le monde entier nous envie !"
 gaudi.50.f: "'Tout sert au luxe, aux plaisirs de ce monde.\nO le bon temps que ce siècle de fer !\nLe superflu, choisi tres nécessaire,\nA réuni l'un et l'autre hémisphère.\n\nCeux-ci, le luxe et les plaisirs surgissent;\nCet âge de fer apporte des jours heureux.\nLes choses superflues nécessaires apparaissent;\nElles ont réuni l'une ou l'autre sphère.'\n- Voltaire"
 gaudi.50.g: "Un enlèvement dans un autre monde !"
 gaudi.60.t: "Incendie du Palais d'été"
 gaudi.60.d: "Les officiers supérieurs de notre armée en Chine appellent à des représailles après la capture et l'assassinat de certains citoyens de notre pays. Plus jamais un Chinois ne devrait regarder de travers un de nos compatriotes !"
 gaudi.60.f: "« Il y avait, dans un coin du monde, une merveille du monde ; cette merveille s'appelait le Palais d'été. L'art a deux principes, l'Idée, qui produit l'art européen, et la Chimère, qui produit l'art oriental. Le Palais d'été était à l'art chimérique ce que le Parthénon est à l'art idéal. C'était une sorte de formidable chef-d'œuvre méconnu, aperçu de loin dans une sorte de crépuscule, comme une silhouette de la civilisation d'Asie à l'horizon de la civilisation d'Europe.\nCette merveille a disparu.\nUn jour, deux bandits entrèrent dans l'Été. Palais. L’un pillé, l’autre incendié. La victoire peut être une femme voleuse, du moins semble-t-il. La dévastation du Palais d'été a été accomplie par les deux vainqueurs agissant conjointement. L'un des deux vainqueurs remplit ses poches ; quand l'autre vit cela, il remplit ses coffres. Et de retour, ils sont revenus en Europe, bras dessus bras dessous, en riant. Telle est l'histoire des deux bandits.\nNous, les Européens, sommes les civilisés, et pour nous, les Chinois sont les barbares. C'est ce que la civilisation a fait à la barbarie. - Victor Hugo"
 gaudi.60.g: "Brûlez-le !"
 gaudi.60.h: "Seuls les barbares pourraient penser à cela."
 gaudi.61.t: "Le Palais d'été a brûlé !"
 gaudi.61.d: "Dans l'une des actions les plus barbares de l'histoire du monde, l'ennemi a mis à sac la résidence impériale de la dynastie Qing et a incendié le palais d'été !"
 gaudi.61.g: "Nous traversons véritablement une vallée de larmes…"
 gaudi.62.t: "Big Ben en feu"
 gaudi.62.d: "La vengeance est douce."
 gaudi.62.f: "'The crowd was quiet, rather pleased than otherwise; whew'd and whistled when the breeze came as if to encourage it: \"'The crowd was quiet, rather pleased than otherwise; whew'd and whistled when the breeze came as if to encourage it: \"« La foule était calme, plutôt contente qu'autrement ; ouf et sifflait quand la brise venait comme pour l'encourager : « La foule était calme, plutôt contente qu'autrement ; ouf et sifflait quand la brise venait comme pour l'encourager : « il y a une flambée (qu'est-ce que nous appelons briller) pour la Chambre des Lords. \"-\" Un jugement pour le Poor-Law Bill! voir n'importe où. -Thomas Carlyle"
 gaudi.63.t: "Le Parlement de Westminster a brûlé !"
 gaudi.63.d: "Dans l'une des actions les plus barbares de l'histoire du monde, l'ennemi a mis à sac le siège du Parlement britannique et a incendié Big Ben !"
 gaudi.100.t: "Un géant endormi"
 gaudi.100.d: "L'idéalisation du Moyen Âge au cours du romantisme a amené de plus en plus de gens à considérer l'achèvement de la cathédrale de Cologne comme une tâche nationale."
 gaudi.100.f: "En 1770, Johann Wolfgang von Goethe s'est enthousiasmé pour la cathédrale gothique de Strasbourg et a ainsi déclenché une redécouverte romantique du style architectural gothique. Plus tard, les publicistes ont célébré la cathédrale de Cologne comme une œuvre d’art qui n’avait pas encore été achevée. Finalement, le publiciste catholique Joseph Görres a renversé l'argument lorsqu'en 1814 il a fait l'éloge de la cathédrale comme sanctuaire national et en a ainsi fait un symbole de l'État national allemand souhaité. Sulpiz Boisserée, un marchand d'art basé à Cologne, était au centre de la campagne persistante pour l'achèvement de la cathédrale. Ses efforts furent stimulés lorsque, en 1814 et 1816, lui et Georg Moller purent redécouvrir le plan de façade de 1370 qui sous-tend la façade ouest de la cathédrale. Entre 1821 et 1831, Boisserée publie une série de gravures montrant la cathédrale achevée. Ces travaux ont considérablement favorisé l'enthousiasme pour la construction de cathédrales dans toute l'Allemagne. La transfiguration romantique du gothique, considéré à l'époque comme un style architectural authentiquement allemand, et la stylisation de la cathédrale en tant que monument national allemand ont finalement convaincu le prince héritier de Prusse Friedrich Wilhelm au projet de la cathédrale. L'idée d'achever la cathédrale, initialement poursuivie à Cologne, devint ainsi une affaire prussienne, voire nationale-allemande, et, pour la première fois, une option réaliste."
 gaudi.100.g: "C'est un type colossal."
 gaudi.101.t: "Début de la première phase de construction"
 gaudi.101.d: "La deuxième pierre de la cathédrale de Cologne a été posée aujourd'hui lors d'une cérémonie festive."
 gaudi.101.f: "Le 4 septembre 1842, le roi de Prusse Friedrich Wilhelm IV et le coadjuteur et plus tard archevêque Johannes von Geissel posèrent la première pierre de la poursuite de la construction de la cathédrale. La pierre a été remontée jusqu'à la tour sud, encore inachevée, et murée à cet endroit."
 gaudi.101.g: "Une nouvelle phase de construction commence."
 gaudi.102.t: "Première phase de construction terminée"
 gaudi.102.d: "Nous avons achevé la première phase de construction de la cathédrale de Cologne."
 gaudi.102.f: "Six ans seulement après la pose de la première pierre de la cathédrale, tous les bas-côtés de la nef et du transept furent voûtés et les bas-côtés centraux furent surélevés au-dessus du triforium. Au-dessus du triforium, une ferme de toit ouverte en bas a été installée afin que les zones de la nef et du transept puissent être utilisées malgré les travaux en cours au-dessus."
 gaudi.102.g: "Continuons notre bon travail."
 gaudi.103.t: "Début de la deuxième phase de construction"
 gaudi.103.d: "Nos constructeurs ont commencé à ériger et à décorer la façade sud de la cathédrale."
 gaudi.103.f: "Au Moyen Âge, les bâtisseurs avaient déjà achevé le chœur, mais négligé la nef et le transept. Une fois que les travaux de construction ont progressé dans les deux cas, on a pu se concentrer désormais sur la conception des grandes façades sur les côtés longs, la façade nord restant plus simple que la façade sud."
 gaudi.104.t: "Deuxième phase de construction terminée"
 gaudi.104.d: "Nous avons achevé la deuxième phase de construction de la cathédrale de Cologne."
 gaudi.104.f: "La façade sud a été conçue par le maître d'œuvre Ernst Friedrich Zwirner, qui a coordonné ses plans avec Karl Friedrich Schinkel, Sulpiz Boisserée et le roi Friedrich Wilhelm IV. Il a été construit entre 1842 et 1855 et est aujourd'hui considéré comme l'une des œuvres les plus importantes et les plus parfaites du style néo-gothique. Sur la façade se trouvent le portail Ursula à gauche, le portail de la Passion au milieu et le portail Gereons à droite."
 gaudi.105.t: "Début de la troisième phase de construction"
 gaudi.105.d: "Après plusieurs disputes, nos ingénieurs ont commencé les travaux sur le toit cathédrale."
 gaudi.105.f: "Face à la forte résistance de nombreux promoteurs de l'achèvement de la cathédrale, qui préconisaient des fermes de toit en bois, comme il en existait également sur les zones de la cathédrale achevées au Moyen Âge, le maître d'œuvre Ernst Friedrich Zwirner fit ériger les toits et la tour de passage en fer. structures. Il a cité les économies de coûts, le poids réduit et la charge calorifique inférieure comme arguments en faveur d'une construction aussi moderne."
 gaudi.106.t: "Troisième phase de construction terminée"
 gaudi.106.d: "Nous avons achevé la troisième phase de construction de la cathédrale de Cologne."
 gaudi.106.f: "En 1863, la nef et le transept furent achevés, à l'exception de la zone située entre les tours. Le mur de séparation provisoire, qui séparait pendant des siècles le chœur achevé de la zone inachevée, pouvait désormais être démoli et presque tout l'intérieur de la cathédrale pouvait être découvert pour la première fois."
 gaudi.107.t: "Début de la quatrième phase de construction"
 gaudi.107.d: "La grue de construction de la fin du Moyen Âge sur la tour sud de la cathédrale de Cologne, qui était auparavant considérée comme l'emblème de la ville, a été démontée aujourd'hui."
 gaudi.107.f: "Après l'achèvement de la nef et du transept, les tours furent enfin achevées. La Dombauhütte, qui employait à l'époque plus de 500 personnes, s'appuyait sur les technologies de construction les plus modernes, par ex. sur des wagons à treuil qui circulaient sur les voies ferrées au-dessus du chantier de construction ou sur l'utilisation d'une machine à vapeur."
 gaudi.108.t: "La cathédrale de Cologne terminée"
 gaudi.108.d: "Aujourd'hui est un jour glorieux pour l'architecture et la culture allemande : la cathédrale de Cologne a été achevée après des décennies de travaux. En vérité, nous avons surpassé les maîtres gothiques !"
 gaudi.108.f: "Lorsque la cathédrale fut finalement achevée, avec ses deux tours de plus de 157 mètres de haut, elle était l'édifice le plus haut du monde - même si le plan de la façade médiévale, élaboré 600 ans plus tôt, vers 1280/90, fut suivi. de très près lors de sa construction, était apparu. Seule la Tour Eiffel, produit de l'ère industrielle, devait surpasser la hauteur déjà prévue au Moyen Âge après son achèvement."
 gaudi.108.g: "Et c'est là qu'il appartient !"
 gaudi.109.t: "Cologne perdue !"
 gaudi.109.d: "Avec la perte de la Rhénanie du Nord, nous avons perdu toute opportunité de poursuivre la construction de la cathédrale de Cologne."
 gaudi.109.f: "Si la Rhénanie du Nord devait être perdue pour une raison quelconque, l'avancement de la construction ne serait pas perdu dans son ensemble. Une autre nation, si elle possède une culture primaire allemande, peut continuer à construire la cathédrale jusqu'à la dernière phase de construction. Les envahisseurs étrangers, en revanche, ne montreront aucun intérêt pour la poursuite des constructions."
 gaudi.109.g: "On ne peut pas leur laisser Cologne longtemps !"
 gaudi.111.t: "Matériau inférieur"
 gaudi.111.d: "La dernière livraison de matériel pour la cathédrale de Cologne s'est avérée médiocre."
 gaudi.111.f: "La première observation révéla que la pierre apportée présentait des taches poreuses. Le maître d’œuvre a donc rejeté l’accusation sans plus attendre. Cela retarderait certainement la construction et entraînerait des coûts supplémentaires, mais la qualité finit par l'emporter. Dans le même temps, certains disent que non seulement nous devrions utiliser la pierre pour des raisons de coût et de temps, mais que nous devrions également conserver certains des meilleurs matériaux de construction pour utiliser les recettes... ailleurs."
 gaudi.111.g: "La qualité a son prix."
 gaudi.111.h: "Comme si quelqu'un le remarquerait."
 gaudi.112.t: "Construction bâclée"
 gaudi.112.d: "La qualité inférieure des matériaux a fait des ravages : ce matin, une partie de la cathédrale de Cologne s'est effondrée et a causé des dégâts considérables."
 gaudi.112.f: "L'église de Cologne s'effondre,\nelle s'effondre, elle s'effondre,\nl'église de Cologne s'effondre,\nma belle dame !"
 gaudi.112.g: "Qui aurait pu prédire cela ?"
 gaudi.113.t: "Des progrès de construction plus rapides"
 gaudi.113.d: "Les travaux de la cathédrale de Cologne avancent mieux que prévu. Nous espérons être quelques mois en avance sur le calendrier."
 gaudi.113.f: "La technologie moderne, les processus de travail rapides, l'approvisionnement en matériaux sans interruption et le beau temps favorisent le progrès de la construction."
 gaudi.113.g: "Je l'avais prédit !"
 gaudi.114.t: "Accident"
 gaudi.114.d: "Un terrible accident a eu lieu sur le chantier de la cathédrale de Cologne. Certains ouvriers ont été blessés, certains même tués !"
 gaudi.114.f: "Malheureusement, même les meilleurs codes du bâtiment ne peuvent empêcher les accidents de se produire, surtout lorsque certains matériaux ont plus de quelques années."
 gaudi.114.g: "Quelle tragédie!"
 gaudi.115.t: "Nouveau travail"
 gaudi.115.d: "La construction de la cathédrale a entraîné un afflux massif de personnes à Cologne."
 gaudi.115.f: "Comme au Moyen Âge, la construction de la cathédrale a créé de nombreuses nouvelles exigences dans la vie urbaine, auxquelles seuls de nouveaux travailleurs ont pu répondre. Il ne suffit pas de recruter les ouvriers du bâtiment eux-mêmes. Ils dépendent également des restaurants et des magasins, des fournisseurs et de la construction de nouveaux appartements, qui doivent également être construits par quelqu'un. Cela a conduit à un essor à Cologne, dont certains souhaitent profiter directement ou indirectement."
 gaudi.115.g: "Un grand projet a besoin de gens formidables."
 gaudi.116.t: "Polémique politique sur la cathédrale"
 gaudi.116.d: "Tout le monde n’est pas favorable à l’achèvement de la cathédrale de Cologne. Un leader syndical a fustigé publiquement ce « gaspillage » aujourd’hui."
 gaudi.116.f: "« Et je vous le demande, messieurs : qu'est-ce qui pousse l'État à des dépenses aussi effroyables, qui ne font que favoriser le cléricalisme, le nationalisme et le capitalisme ? Le prestige augmente fortement, les riches augmentent leurs profits en participant à la construction, et l'Église, qui inculque la superstition et l'arriération au prolétariat, sort renforcée de cette politique réactionnaire. Mais qui, je vous le demande, construit ces maisons de luxe et de déchet ? C'est vrai, le travailleur ordinaire ! Le travailleur ordinaire qui est maltraité, mutilé ou tué dans des accidents de construction, et dont la seule récompense est la perspective d'un royaume des cieux inexistant. Cette cathédrale médiévale représente tout ce qui ne va pas dans cette nation !'"
 gaudi.116.g: "Et la météo ?"
 gaudi.116.h: "Il a un point."
 gaudi.117.t: "Soutien politique à la cathédrale"
 gaudi.117.d: "Un représentant de la petite bourgeoisie à l'esprit patriotique a prononcé aujourd'hui un discours passionné en faveur de la construction de la cathédrale de Cologne."
 gaudi.117.f: "« Messieurs, n'écoutez pas les objections des traîtres, des envieux et des mesquins. Avec l’achèvement prochain de la cathédrale de Cologne, notre nation s’affranchit de la décadence antérieure et marche sur les traces de ses ancêtres. Quand un pays a-t-il déjà mis en œuvre un projet majeur ? Il faut remonter aux bâtisseurs de cathédrales du Moyen Âge – ou même aux bâtisseurs de pyramides. Nous entrons dans un territoire historique. Et les générations futures, en contemplant ces tours colossales, se souviendront que nous avons pris la bonne décision à l’époque. Une cathédrale est plus qu'une église. C'est un monument, un bâtiment inspirant qui inspirera de nombreux Allemands à faire de nouvelles choses dans les décennies et les siècles à venir !'"
 gaudi.117.g: "Bravo! Bien parlé!"
 gaudi.117.h: "Nous devrions l'utiliser pour un soutien supplémentaire."
 gaudi.118.t: "Un projet national ou religieux ?"
 gaudi.118.d: "Il y a actuellement un débat sérieux au Parlement sur la question de savoir si la cathédrale de Cologne est avant tout un édifice national ou religieux."
 gaudi.118.f: "L'importance de la cathédrale pour les Allemands en tant que peuple « uni » était importante dès le début, lorsque les réflexions ont commencé pour achever l'édifice médiéval. Le Moyen Âge était considéré par beaucoup comme un lieu de réflexion pour la nation allemande, le Saint Empire romain germanique, notamment sous les Saliens et les Staufer, étant perçu comme le point culminant de l'Allemagne. D’autres y voient une dilution de l’idée chrétienne. Après tout, la cathédrale n’était pas seulement une église, mais le siège de l’un des évêques les plus puissants d’Allemagne. L'histoire chrétienne de Cologne a commencé dans l'Empire romain, et la question de Dieu et de la nation pouvait souvent conduire à des tendances à la division plutôt qu'à la conciliation."
 gaudi.118.g: "Il s'agit d'un projet national."
 gaudi.118.h: "Il s'agit d'un projet national et religieux."
 gaudi.118.i: "C'est un projet religieux."
 gaudi.119.t: "Loterie pour la construction de la cathédrale"
 gaudi.119.d: "La loterie de la construction de la cathédrale a réalisé des bénéfices si extraordinaires cette année que la construction de la cathédrale peut progresser beaucoup plus rapidement que prévu."
 gaudi.119.f: "A l'origine, le maître d'œuvre Zwirner avait estimé 1,2 million de thalers pour l'achèvement de la nef et la même somme pour les contreforts. Sur cette base, les coûts annuels de construction étaient calculés à 100 000 thalers, dont le roi de Prusse voulait couvrir la moitié avec un fonds de construction. Afin d'augmenter les coûts de construction restants, l'Association centrale de la construction de la cathédrale (Zentral-Dombau-Verein) de Cologne a été fondée, initialement financée par des cotisations. Lorsque l'intérieur fut achevé en 1863, les projections montrèrent que, en supposant le même flux financier, il faudrait encore 50 ans pour le terminer. L'association décide donc en 1864 de créer une loterie cathédrale, qui s'avère être une bonne source d'argent. Au total, la Dombau-Verein a supporté environ 60 pour cent de tous les coûts, l'État n'a participé qu'à environ 32 pour cent des coûts de construction de la cathédrale."
 gaudi.119.g: "Cagnotte!"
 gaudi.120.t: "[SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('gaudi_ruler').GetFullName] soutient la cathédrale"
 gaudi.120.d: "[SCOPE.sCharacter('gaudi_ruler').GetFullName] a un grand intérêt personnel pour le mouvement romantique. Il a donc soumis une donation personnelle pour la construction de la cathédrale."
 gaudi.120.f: "D'un point de vue historique, la construction de la cathédrale de Cologne est également due dans une certaine mesure à l'initiative personnelle du roi Friedrich Wilhelm IV, considéré comme un homme pieux et associé au romantisme. Tout au long de sa vie, il a eu un vif intérêt pour l'art et l'architecture."
 gaudi.120.g: "Vive notre bien [SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('gaudi_ruler').GetFullName] !"
 gaudi.121.t: "Une visite touristique"
 gaudi.121.d: "La cathédrale de Cologne est encore en construction, mais les progrès sont remarquables. Nous devrions inviter un allié et tout lui montrer."
 gaudi.121.f: "Même en tant qu'édifice inachevé, la cathédrale de Cologne a impressionné les visiteurs et stimulé leur imagination. Cela s'appliquait également à l'époque où la cathédrale était à nouveau un chantier de construction pendant des décennies. Robert Schumann a été inspiré pour écrire sa 3e symphonie à la vue de la poursuite de la construction, et la reine Victoria a été présentée et informée du projet lors d'une visite."
 gaudi.121.g: "Invitez notre allié à visiter Cologne."
 gaudi.121.h: "Cela ne fera que perturber nos efforts."
 gaudi.122.t: "Un don à la cathédrale de Cologne ?"
 gaudi.122.d: "Notre ambassadeur a été invité à une visite du chantier de construction de la cathédrale de Cologne. Ce fut une visite touristique impressionnante et maintenant l'ambassadeur nous demande si nous pourrions acquérir un prestige international en tant que donateur de la cathédrale."
 gaudi.122.f: "Même en tant qu'édifice inachevé, la cathédrale de Cologne a impressionné les visiteurs et stimulé leur imagination. Cela s'appliquait également à l'époque où la cathédrale était à nouveau un chantier de construction pendant des décennies. Robert Schumann a été inspiré pour écrire sa 3e symphonie à la vue de la poursuite de la construction, et la reine Victoria a été présentée et informée du projet lors d'une visite."
 gaudi.122.g: "Ce magnifique projet mérite notre soutien."
 gaudi.122.h: "Ce n'est pas si génial finalement."
 gaudi.123.t: "Don d'Ally"
 gaudi.123.d: "Après une tournée, l'ambassadeur de notre allié était tellement enthousiaste qu'il a décidé de se rendre disponible comme donateur au projet."
 gaudi.123.f: "Même en tant qu'édifice inachevé, la cathédrale de Cologne a impressionné les visiteurs et stimulé leur imagination. Cela s'appliquait également à l'époque où la cathédrale était à nouveau un chantier de construction pendant des décennies. Robert Schumann a été inspiré pour écrire sa 3e symphonie à la vue de la poursuite de la construction, et la reine Victoria a été présentée et informée du projet lors d'une visite."
 gaudi.123.g: "On reconnaît immédiatement les vrais amis."
 gaudi.124.t: "Nouvelles machines à Cologne"
 gaudi.124.d: "L'utilisation de machines de pointe accélère de plusieurs mois la construction laborieuse de la cathédrale de Cologne."
 gaudi.124.f: "L'utilisation de machines à vapeur a notamment permis d'acheminer les matériaux vers les niveaux supérieurs de la cathédrale. Mais de nombreuses autres avancées technologiques ont également contribué à rendre le travail beaucoup plus efficace qu’au Moyen Âge."
 gaudi.124.g: "C'est un progrès !"
 gaudi.125.t: "Le chemin de fer apporte des pierres à la cathédrale"
 gaudi.125.d: "La construction d'une voie ferrée dans la région de Cologne a accéléré de plusieurs mois la construction de la cathédrale."
 gaudi.125.f: "L'itinéraire classique pour les matériaux de construction jusqu'à Cologne était la navigation sur le Rhin. Dans les années qui suivirent, elle resta le moyen privilégié pour acheminer de grandes quantités vers la cité cathédrale. Cependant, l'augmentation du trafic ferroviaire a également contribué au fait que les itinéraires d'approvisionnement pouvaient être modifiés en cas d'urgence ou que les personnes et les machines pouvaient être transportées plus rapidement."
 gaudi.126.t: "Temps orageux"
 gaudi.126.d: "Une tempête a retardé de plusieurs semaines nos travaux dans la cathédrale de Cologne."
 gaudi.126.f: "Un orage a frappé Cologne hier soir. Le vent a arraché les bâches et renversé les échafaudages, endommageant quelques gargouilles et personnages."
 gaudi.126.g: "J'aurais préféré une comète."
 gaudi.127.t: "Enquêtes archéologiques à Cologne"
 gaudi.127.d: "Après une visite à Cologne, [SCOPE.sCharacter('gaudi_archaeologist').GetFullName] a découvert que la cathédrale se dressait apparemment sur des ruines romaines. Il demande un permis de fouille."
 gaudi.127.f: "Cologne est l’une des plus anciennes villes d’Allemagne et fut une colonie importante de l’Empire romain. L'héritage romain a continué à prévaloir dans la conscience urbaine de Cologne, tant dans la commune organisée en municipalité que dans la référence chrétienne à Saint-Pierre et à la stylisation en tant que fille de Rome. Il a été prouvé que le centre-ville repose sur des ruines romaines et même certaines rues ont survécu. Cependant, en raison de la densité du développement, personne n'a osé creuser sur place. Une fouille à proximité de la cathédrale affecterait considérablement les travaux de construction, mais pourrait aider notre archéologue à acquérir une expérience précieuse."
 gaudi.127.g: "Nous ne pouvons pas nous permettre un arrêt aussi long de la construction."
 gaudi.127.h: "Une opportunité archéologique unique."
 gaudi.200.t: "L'ascension d'Alfred Escher"
 gaudi.200.d: "En 1849, l'industriel Alfred Escher est élu pour la première fois président du Conseil national. En tant qu'homme politique, banquier, directeur d'une importante entreprise ferroviaire et exploitant du tunnel du Saint-Gothard, il deviendra l'une des personnalités les plus influentes de l'histoire de la Suisse."
 gaudi.200.f: "Johann Heinrich Alfred Escher vom Glas, connu sous le nom d'Alfred Escher, était un homme politique, chef d'entreprise et entrepreneur ferroviaire suisse. Par ses nombreuses fonctions politiques et ses activités de fondation et de direction au sein de la Chemin de fer suisse du Nord-Est, de l'École polytechnique fédérale, de l'Institut suisse du crédit, de la Caisse suisse d'assurance-vie et de pension et de la Compagnie des chemins de fer du Saint-Gothard, Escher a influencé le développement politique et économique de la Suisse comme aucun autre 19ème siècle."
 gaudi.200.g: "Il servira bien la Suisse."
 gaudi.200.h: "Cet homme est trop dangereux"
 gaudi.201.t: "Déresponsabilisation d'Alfred Escher"
 gaudi.201.d: "La construction du chemin de fer du Saint-Gothard met à rude épreuve les capacités d'Alfred Escher. Ses rivaux profitèrent de l'occasion pour lui demander de démissionner d'abord de son poste de président de la Kreditanstalt suisse, puis de renoncer à la présidence de la Compagnie des chemins de fer du Saint-Gothard."
 gaudi.201.f: "Grâce à ses nombreuses fonctions politiques et à ses fondations commerciales de la Nordostbahn et de la Kreditanstalt, Escher disposait d'une extraordinaire richesse de pouvoir, grâce à laquelle il fut surnommé « Roi Alfred Ier ». Cette suprématie a attiré les critiques sur la scène. Le mouvement démocratique exigeait que le peuple ait davantage son mot à dire sur les questions politiques. Le cercle politique assermenté autour d'Alfred Escher - le « système Escher » - est devenu l'ennemi déclaré des démocrates. Cette situation fut combattue par des pamphlets et des assemblées populaires, ce qui finit par affaiblir son influence. Cela devint encore plus difficile du fait que son chemin de fer du Nord-Est sombrait de plus en plus dans la crise financière dans les années 1870."
 gaudi.201.g: "Sa chute est-elle imminente ?"
 gaudi.202.t: "Décès d'Alfred Escher"
 gaudi.202.d: "Alfred Escher, peut-être la figure qui a le plus marqué la Suisse du XIXe siècle, est décédé aujourd'hui."
 gaudi.202.f: "Outre les agressions contre sa personne, Escher a dû faire face à des problèmes de santé. Il tomba malade à maintes reprises tout au long de sa vie et dut se rétablir grâce à des cures plus longues. Sa prédisposition à la maladie ne convenait pas à sa lourde charge de travail. Durant la phase critique du projet du Saint-Gothard, Escher faillit mourir au travail. Des hauts et des bas constants ont suivi : asthme, fièvre, problèmes oculaires, furoncles. Cependant, cela n'a pas empêché Escher de remplir ses obligations politiques et économiques autant que possible. Fin novembre 1882, il tomba de nouveau gravement malade. Le matin du 6 décembre 1882, Alfred Escher décède dans son domaine « Belvoir »."
 gaudi.202.g: "Il a conduit la Suisse vers l’ère moderne."
 gaudi.211.t: "Planification du chemin de fer du Saint-Gothard"
 gaudi.211.d: "Nous avons commencé à planifier le projet du Saint-Gothard. Outre l'arpentage et la détermination du tracé, cela comprend également la recherche de donateurs étrangers et la création d'une entreprise pour assurer un soutien financier."
 gaudi.211.f: "En 1852, le chef de l'Office fédéral des chemins de fer, Gottlieb Koller, présenta un premier projet de construction d'une ligne ferroviaire traversant le massif du Saint-Gothard et le 19 août 1853, le premier comité du Saint-Gothard, composé de neuf cantons, fut organisé. L'ingénieur Koller a développé un premier projet pour l'itinéraire de Flüelen au lac de Langen. En 1861, l'ingénieur zurichois Kaspar Wetli a mesuré en seulement cinq mois l'itinéraire d'Erstfeld à Lugano, ce qui est encore aujourd'hui considéré comme un chef-d'œuvre de la technique topographique."
 gaudi.211.g: "Une tâche gigantesque."
 gaudi.212.t: "Planification terminée"
 gaudi.212.d: "La planification et les préparatifs pour la construction de la ligne du Saint-Gothard sont terminés. Si les conditions sont réunies, nous pouvons donner le feu vert à la construction."
 gaudi.212.f: "Après de violentes disputes entre partisans du Saint-Gothard et partisans des variantes du Lukmanier et du Splügen, l'idée d'un tunnel sous le Saint-Gothard fut présentée pour la première fois en 1863 par les ingénieurs Wetli et Koller. La décision a été prise lorsque Alfred Escher, président des Chemins de fer suisses du Nord-Est, basé à Zurich, a finalement approuvé le tracé du Saint-Gothard. De plus, le trajet par le Saint-Gothard était le plus court. «Je suis convaincu depuis longtemps que, compte tenu de la conception du réseau ferroviaire de la Suisse et de nos pays voisins, un chemin de fer passant par le Saint-Gothard serait bien plus bénéfique aux intérêts de Zurich et des chemins de fer du Nord-Est qu'un chemin de fer passant par un col alpin.» dans les Grisons», déclare Escher."
 gaudi.212.g: "Le plus dur ne fait que commencer..."
 gaudi.213.t: "Construction du chemin de fer du Saint-Gothard"
 gaudi.213.d: "Les travaux de construction sur le massif du Saint-Gothard - sur le côté nord près de Göschenen et sur le côté sud près d'Airolo - ont commencé. La compagnie des chemins de fer du Saint-Gothard a embauché des milliers de travailleurs, principalement italiens."
 gaudi.213.f: "Après un délai de soumission extrêmement court de six semaines, sept offres pour la construction du tunnel du Saint-Gothard ont été reçues. La société genevoise « Entreprise du Grand Tunnel du Gothard » de Louis Favre a remporté le marché. Le principal concurrent était la société italienne « Società Italiana di Lavori Pubblici », dirigée par Severino Grattoni. Grattoni avait déjà construit le plus long tunnel du monde, le tunnel ferroviaire du Mont Cenis, long de 12 kilomètres. Il s'est également occupé du Saint-Gothard, a examiné la géologie et effectué des forages d'essai. Favre, qui n'avait jamais construit de tunnel de plus de 1000 mètres, a sous-coté ses concurrents, a accepté les termes ruineux du contrat et a versé une caution de 8 millions de francs. Il a promis une période de construction de huit ans – une entreprise risquée compte tenu de la géologie inconnue."
 gaudi.213.g: "Favre devrait avoir la chance de faire partie de cette œuvre historique."
 gaudi.214.t: "Chemin de fer du Saint-Gothard terminé !"
 gaudi.214.d: "Aujourd'hui est un grand jour pour notre pays : avec l'achèvement du chemin de fer du Saint-Gothard, non seulement l'Europe du Nord et du Sud ont été reliées, mais la Suisse est également devenue un carrefour du trafic ferroviaire international."
 gaudi.214.f: "« Au fond, je déteste les montagnes parce qu'elles sont froides et rongent des morceaux de ciel, c'est-à-dire la boule de lumière, et réduisent l'horizon. Mon fantasme préféré maintenant est de faire sauter le Saint-Gothard et toutes les Alpes avec de la dynamite de l'autre côté, au nord, pour que nous puissions avoir directement l'air italien. -Carl Spitteler"
 gaudi.214.g: "Heil Dir, Gotthardbahn!"
 gaudi.219.t: "La Suisse orientale est perdue !"
 gaudi.219.d: "Avec la perte de la Suisse orientale, nous avons perdu toute opportunité de poursuivre la construction du chemin de fer du Saint-Gothard."
 gaudi.219.f: "Si la Suisse orientale venait à disparaître pour quelque raison que ce soit, l'avancement de la construction ne serait pas perdu dans son ensemble. Un autre pays peut continuer à construire le tunnel jusqu'à la dernière phase de construction."
 gaudi.219.g: "On ne peut pas leur laisser longtemps la Suisse orientale !"
 gaudi.221.t: "Crédit d'Italie"
 gaudi.221.d: "Alfred Escher a rencontré à Milan plusieurs hommes d'affaires italiens désireux d'investir dans la construction du chemin de fer du Saint-Gothard et qui entretiennent de bonnes relations avec le gouvernement."
 gaudi.221.f: "Les coûts de construction du réseau routier de la future compagnie ferroviaire du Saint-Gothard étaient estimés avant le début des travaux à 187 millions de francs suisses. La plus grande partie (54,55%) des fonds a dû provenir du marché international des capitaux, l'Italie en a subventionné 24,05%, l'Allemagne et la Suisse 10,7% chacune. Un consortium financier dirigé par des banques allemandes a été constitué pour lever les 102 millions de francs sur le marché des capitaux. Il s'agissait d'un groupe allemand, italien et suisse, chacun devant lever 34 millions de francs."
 gaudi.221.g: "Toute aide est appréciée."
 gaudi.221.h: "Nous n'avons pas besoin de l'aide des étrangers."
 gaudi.222.t: "Crédit d'Allemagne"
 gaudi.222.d: "Alfred Escher a rencontré plusieurs hommes d'affaires allemands qui souhaitent investir dans la construction du chemin de fer du Saint-Gothard et qui sont en bons termes avec le gouvernement."
 gaudi.222.f: "Les coûts de construction du réseau routier de la future compagnie ferroviaire du Saint-Gothard étaient estimés avant le début des travaux à 187 millions de francs suisses. La plus grande partie (54,55%) des fonds a dû provenir du marché international des capitaux, l'Italie en a subventionné 24,05%, l'Allemagne et la Suisse 10,7% chacune. Un consortium financier dirigé par des banques allemandes a été constitué pour lever les 102 millions de francs sur le marché des capitaux. Il s'agissait d'un groupe allemand, italien et suisse, chacun devant lever 34 millions de francs."
 gaudi.223.t: "Société des chemins de fer du Saint-Gothard"
 gaudi.223.d: "Avec la création de la Compagnie des chemins de fer du Saint-Gothard (Gotthardbahn-Gesellschaft), une étape importante a été franchie vers la réalisation de ce projet ambitieux."
 gaudi.223.f: "La Compagnie des chemins de fer du Saint-Gothard a été fondée à Lucerne en tant que société par actions chargée de construire et d'exploiter la ligne du Saint-Gothard. Les décisions politiques et les négociations pour le financement du chemin de fer du Saint-Gothard dans la perspective de la création de la Société des chemins de fer du Saint-Gothard et de sa direction au début de la construction ont été essentiellement prises par l'ancien président du Conseil du gouvernement du canton de Zurich. et plus tard, le Dr Alfred Escher, trois fois président du Conseil national, l'a inventé. Après que le financement du projet du Saint-Gothard ait été assuré presque exclusivement par des subventions de l'État de la Suisse, de ses cantons et à partir de 1869 de l'Italie, de la Confédération de l'Allemagne du Nord et de son successeur légal à partir de 1871, le Reich allemand, la Compagnie des chemins de fer du Saint-Gothard a été fondée à partir de l'Association du Saint-Gothard. , qui a cédé ses droits à la Compagnie des chemins de fer du Saint-Gothard. Alfred Escher en devient le président et Joseph Zingg son vice-président. L’entreprise s’attaque ensuite à la construction proprement dite du chemin de fer du Saint-Gothard."
 gaudi.231.t: "Entrée d'eau dans le tunnel"
 gaudi.231.d: "Les infiltrations d'eau dans le tunnel du Saint-Gothard menacent l'avancement des travaux et la vie des ouvriers."
 gaudi.231.f: "Les différentes couches rocheuses du massif du Saint-Gothard ont posé des problèmes à plusieurs reprises. Parfois, des fondations sablonneuses alternaient avec des roches impénétrables - et dans des cas rares, mais d'autant plus dangereux, de l'eau ou de la pulpe rocheuse pénétrait dans le tunnel, ce qui devenait fatal pour certains ouvriers."
 gaudi.231.g: "Faites le nécessaire pour sceller le site, la sécurité avant tout."
 gaudi.231.h: "Payez des heures supplémentaires aux travailleurs pour réparer le fossé, mais soyez prudent."
 gaudi.231.i: "Bouchez le trou à tout prix et continuez à travailler, quelles que soient les pertes !"
 gaudi.232.t: "Test de résistance du viaduc"
 gaudi.232.d: "La direction de la construction ne sait pas si les nombreux tests de résistance que nous effectuons sur les nombreux viaducs sont vraiment nécessaires en nombre, car ils consomment du matériel et du temps."
 gaudi.232.f: "Compte tenu des délais serrés pour achever la ligne du Saint-Gothard, tous les projets ne peuvent pas bénéficier de la même attention. Par exemple, certains ingénieurs considèrent que les multiples tests de charge sur l'un de nos viaducs sont inutiles car la structure est suffisamment solide. Cependant, certains de nos consultants insistent pour ne pas interrompre les tests prématurément, car des dommages pourraient retarder notre travail de plusieurs mois et ternir notre réputation."
 gaudi.232.g: "Nous devrions faire un test supplémentaire."
 gaudi.232.h: "Je ne crains pas que ce viaduc soit instable."
 gaudi.233.t: "Le viaduc s'effondre !"
 gaudi.233.d: "Un de nos viaducs s'est effondré aujourd'hui. Apparemment, ce n'était pas aussi sûr que nous le pensions."
 gaudi.233.f: "Comment osez-vous nuire ainsi à la réputation de précision et de rigueur suisse ?"
 gaudi.233.g: "J'ai dit tout de suite qu'il aurait fallu faire un stress test !"
 gaudi.234.t: "Plus de pauses de travail"
 gaudi.234.d: "Les ouvriers du tunnel du Saint-Gothard trouvent leurs journées de travail trop longues et leurs pauses trop courtes."
 gaudi.234.f: "Outre les travaux risqués dans le tunnel du Saint-Gothard, la très mauvaise circulation de l'air a posé des problèmes. L’intérieur de la terre s’est également réchauffé jusqu’à plus de 33 degrés (et dans de rares cas : jusqu’à 40 degrés) à l’intérieur du tunnel. Néanmoins, les ouvriers devaient effectuer leur travail pénible et en sueur plus de 8 heures par jour."
 gaudi.234.g: "Une pause? Bah ! Ces Italiens paresseux ne savent même pas ce qu’est le travail !"
 gaudi.234.h: "Une petite pause, rien de plus."
 gaudi.234.i: "Donnez-leur un bonus au lieu d'une pause."
 gaudi.234.j: "Ils méritent des pauses régulières."
 gaudi.235.t: "Vertiges sous terre"
 gaudi.235.d: "La mauvaise qualité de l'air dans le tunnel du Saint-Gothard est devenue si mauvaise que certains ouvriers se sont effondrés à cause du vertige."
 gaudi.235.f: "La qualité de l’air dans le Saint-Gothard atteint un niveau alarmant. La poussière soulevée par les pioches et les machines y participe ; cependant, la dynamite fait le reste. Bien trop souvent, les ouvriers sont renvoyés dans le tunnel avant que la fumée des explosions ne se soit dissipée. L'un de nos gardiens a voulu inciter ces paresseux à retourner au travail, mais a succombé à un malheureux problème cardiovasculaire en pénétrant dans le tunnel."
 gaudi.235.g: "C'est dommage. Maintenant, continuez à travailler !"
 gaudi.235.h: "Inciter davantage les travailleurs à risquer leur vie…"
 gaudi.235.i: "Introduisez des changements de quarts de travail plus courts."
 gaudi.236.t: "Des prix exorbitants"
 gaudi.236.d: "Notre politique de prix pour la nourriture, les vêtements et d'autres produits de première nécessité a été vivement critiquée par les travailleurs du tunnel du Saint-Gothard."
 gaudi.236.f: "Un maximum de 1 645 ouvriers travaillaient à Göschenen et 1 302 à Airolo, pour la plupart des Italiens originaires des zones rurales pauvres du Piémont et de la Lombardie. Les mineurs et les ouvriers vivaient dans des cabanes sales et surpeuplées et étaient exploités financièrement. Un mineur gagnait environ 3,90 francs par poste de huit heures. Les deux tiers de ce salaire étaient déduits pour la nourriture et le logement, les lampes et l'huile - 30 centimes par jour - qu'ils devaient payer eux-mêmes. On leur déduisait également cinq francs par mois pour leurs vêtements et deux francs pour leur permis de séjour en Suisse. Une partie des bénéfices était versée sous forme de coupons qui ne pouvaient être échangés que dans les magasins de l'entreprise."
 gaudi.236.g: "Personne n'est obligé de travailler sur ce projet. Libre à chacun d'y aller !"
 gaudi.236.h: "Nous les exploitons et les payons avec leur propre argent pour leur faire faire des heures supplémentaires – une superbe idée !"
 gaudi.236.i: "Interdisez cette activité contraire à l’éthique !"
 gaudi.237.t: "Des cabanes sales"
 gaudi.237.d: "La misère dans les cabanes des ouvriers du tunnel du Saint-Gothard s'est tellement accrue que les directeurs des travaux ferroviaires craignent fortement qu'une révolte ne soit imminente."
 gaudi.237.f: "« J'ai trouvé que la situation à Göschenen avait peu changé ; les appartements Favre sont satisfaisants, mais dans une mesure extrêmement insuffisante, les appartements privés des citoyens sont en partie bons, en partie supportables, en partie mauvais ; les casernes ouvrières, construites sur la spéculation et louées, sont toujours aussi scandaleuses, notamment dans la grande maison jouxtant la poste, habitée par 240 personnes ; là, des coulées coulaient le long des murs extérieurs et gisaient en tas dans les couloirs et dans les coins ; les pièces et leurs meubles sont souillés de crasse, les fenêtres sont bien fermées, l'air est abominable, pire même que dans la plupart des porcheries, qui ont des portes et des bouches d'aération. Une conduite d'eau a été consciencieusement construite, mais de telle manière qu'elle a gelé et s'est déchirée, n'a rien livré tout l'hiver et est toujours en panne, même si elle n'a pas gelé sérieusement depuis des semaines."
 gaudi.237.g: "À chacun ses goûts."
 gaudi.237.h: "S’ils n’aiment pas tellement ça dans leurs maisons, ils devraient travailler davantage."
 gaudi.237.i: "Ces conditions scandaleuses devraient être abolies immédiatement dans un pays civilisé comme le nôtre !"
 gaudi.238.t: "Enterré vivant"
 gaudi.238.d: "Un grave accident s'est produit dans le tunnel du Saint-Gothard. Plusieurs ouvriers ont été ensevelis sous les décombres. Leurs chances de survie sont inconnues."
 gaudi.238.f: "199 ouvriers sont morts lors des travaux de construction du tunnel du Saint-Gothard. Sur les 171 morts mentionnés dans le registre des accidents des Archives fédérales, 53 ouvriers ont été écrasés par des wagons ou des locomotives, 49 ont été heurtés par des pierres et 46 ont été tués par de la dynamite. 23 ont péri d’une autre manière, l’un d’eux s’est noyé. Selon les déclarations officielles, le coupable serait soit le hasard, soit la victime elle-même. De nombreux autres hommes sont morts au cours des années suivantes à cause de la malnutrition, de maladies et de blessures subies lors de la construction du tunnel."
 gaudi.238.g: "Malheureusement, c'est le risque de ce travail. Continue à creuser!"
 gaudi.238.h: "Nous ne pouvons rien faire pour eux. Mettez en œuvre de meilleures règles pour l’avenir."
 gaudi.238.i: "Faites tout ce que vous pouvez pour sauver ces pauvres âmes !"
 gaudi.239.t: "De nouvelles machines dans le tunnel"
 gaudi.239.d: "L'introduction de nouvelles technologies a considérablement accéléré nos progrès dans la construction du tunnel du Saint-Gothard."
 gaudi.239.f: "L'entrepreneur en bâtiment Louis Favre reprend les premières foreuses de type Sommeiller du tunnel du Mont-Cenis. Pour ce faire, il a testé sur place les principales perceuses à percussion disponibles. Les deux chefs d'atelier d'Airolo et de Göschenen ont perfectionné les machines existantes : les machines devraient être moins sujettes aux réparations et les perceuses à percussion devraient être équipées d'un entraînement automatique. Seguin et Ferroux, les deux chefs d'atelier, ont pu faire des progrès significatifs : au début, trois machines devaient être remplacées chaque jour, vers la fin de la construction, une seule machine tous les trois jours. Dans le même temps, l'air évacué des perceuses pneumatiques à percussion a permis d'aérer le tunnel avec parcimonie. Six perceuses étaient montées sur des chariots. Les machines ont percé des trous d'environ un mètre de profondeur, qui ont ensuite été remplis de dynamite et explosés."
 gaudi.239.g: "Bravo pour la progression !"
 gaudi.240.t: "Les syndicats critiquent le projet du Saint-Gothard"
 gaudi.240.d: "Un dirigeant syndical au Parlement a déploré aujourd'hui les conditions épouvantables dans lesquelles le tunnel du Saint-Gothard est construit."
 gaudi.240.f: "De l'eau coule tous les jours, un travail dans la chaleur des hauts fourneaux, des logements misérables, des prix exorbitants et un salaire bon marché de moins de 4 francs par jour ! Il existe de nombreux chiens dans notre pays qui vivent mieux que les centaines d'ouvriers qui risquent leur vie au profit d'une compagnie ferroviaire ; avant d'être réduit en miettes par une charge de dynamite un jour de malchance. Je pensais que l'époque où un propriétaire terrien pouvait bousculer ses paysans comme du bétail était révolue ? Ce qui se passe à Göschenen et à Airolo semble bien pire ! Si quelque chose ne change pas de toute urgence, alors je vous promets que la situation va dégénérer !'"
 gaudi.240.g: "Cet homme ne comprend-il pas l'importance de notre projet ?"
 gaudi.240.h: "Certaines réformes pourraient effectivement s’avérer nécessaires."
 gaudi.241.t: "Escher fait un don d'argent"
 gaudi.241.d: "Alfred Escher, pour qui la construction de la ligne du Saint-Gothard est une préoccupation personnelle, a utilisé aujourd'hui ses fonds propres pour faire avancer la construction de la ligne."
 gaudi.241.f: "Escher n'a pas seulement accompagné le projet du Saint-Gothard depuis sa création jusqu'à son achèvement ; il s'est aussi personnellement sacrifié pour cela. Il ne s’agissait pas seulement de l’aspect financier. Il était accusé d'avoir littéralement travaillé jusqu'à la mort pour les chemins de fer du Saint-Gothard."
 gaudi.241.g: "Merci, M. Escher."
 gaudi.242.t: "Roche poreuse"
 gaudi.242.d: "Grâce à une pierre étonnamment tendre, les travaux du tunnel du Saint-Gothard progressent mieux que prévu."
 gaudi.242.f: "Outre les nombreux impondérables liés à la construction du tunnel du Saint-Gothard, qui ont souvent eu des conséquences plutôt désagréables, il y a toujours eu des surprises positives."
 gaudi.242.g: "Super!"
 gaudi.243.t: "Roche impénétrable"
 gaudi.243.d: "La roche étonnamment dure fait que les travaux du tunnel du Saint-Gothard avancent moins bien que prévu."
 gaudi.243.f: "La direction du site a été confrontée à plusieurs reprises à des problèmes liés à l'évolution de la roche. Au début de la construction, les ingénieurs n'étaient guère préparés à la mosaïque du massif du Saint-Gothard. Ce n’est qu’avec le temps que ces mauvaises surprises pourront être évitées. L'ingénieur en chef Robert Gerwig a chargé l'ingénieur minier allemand Friedrich Moritz Stapff de réaliser toutes les études géologiques nécessaires. Il a d'abord été affecté au secteur de la construction à Airolo, puis il est devenu chef du département géologique et minier de la direction centrale de la construction à Airolo. Les tâches de Stapff comprenaient la mise à jour des cartes géologiques existantes, l'observation des conditions géologiques, telles que les conditions de température, les infiltrations d'eau et l'état de la roche, afin que la construction ne soit pas retardée. Stapff a enregistré toutes les formations rocheuses le long de l'axe du tunnel et a collecté une pièce à main pour chaque formation rocheuse."
 gaudi.243.g: "Les bonnes choses prennent du temps."
 gaudi.243.h: "Les ouvriers devraient faire des heures supplémentaires !"
 gaudi.243.i: "Demandez à des experts de l’université de trouver une solution à long terme."
 gaudi.244.t: "Magnificent explosions"
 gaudi.244.d: "L'une de nos usines nationales de dynamite est devenue le fournisseur permanent de la construction du tunnel du Saint-Gothard. Le projet et l’entreprise en profitent également."
 gaudi.244.f: "Au cours des travaux de construction, le besoin en explosifs est devenu si grand qu'une usine d'explosifs distincte a été créée pour le tunnel sur le lac des Quatre-Cantons."
 gaudi.244.g: "Mais c'est vérifié pour des raisons de sécurité, n'est-ce pas ?"
 gaudi.245.t: "Afflux de travailleurs"
 gaudi.245.d: "De plus en plus de personnes affluent vers la Suisse orientale à la recherche de travail dans la construction du chemin de fer du Saint-Gothard."
 gaudi.245.f: "La construction du chemin de fer du Saint-Gothard a mobilisé plus de 5 000 personnes pendant près d'une décennie."
 gaudi.245.g: "Donnez une pelle à chacun, nous avons besoin de toutes les mains."
 gaudi.245.h: "Ils devraient s'installer pendant une période plus longue."
 gaudi.246.t: "Un nouvel investisseur étranger"
 gaudi.246.d: "Alfred Escher a réussi à attirer un autre riche investisseur étranger qui peut lever de nouveaux capitaux pour le projet du Saint-Gothard."
 gaudi.246.f: "Au fil des années, Escher a pu utiliser ses contacts à maintes reprises en cas d'urgence financière pour financer la construction notoirement coûteuse du tunnel du Saint-Gothard - qui était également indispensable."
 gaudi.246.g: "Nous avons soif comme un vagabond dans le désert !"
 gaudi.246.h: "Non merci."
 gaudi.247.t: "GRÈVE!"
 gaudi.247.d: "Mauvaise, mauvaise nouvelle ! Les ouvriers de la ligne du Saint-Gothard ont débrayé et réclament de meilleurs salaires, des logements, de la nourriture et des vêtements avant de reprendre leurs pelles !"
 gaudi.247.f: "Lors de la construction du tunnel du Saint-Gothard, la population de Göschenen a augmenté plusieurs fois. Les ouvriers du bâtiment vivaient dans des conditions précaires. Les ouvriers du tunnel italien se sont mis en grève, exigeant des salaires plus élevés et provoquant un tollé dans le village. L'élément déclencheur a été une dispute entre un chef de poste et les mineurs, qui ont refusé de poursuivre le forage jusqu'à ce que la fumée se soit dissipée des explosions. Une guerre des mots éclate alors jusqu'à ce que les mineurs quittent le chantier en colère. En sortant, une rumeur se répand selon laquelle une caisse de dynamite était en feu. Cela a également obligé le reste de l’équipe du tunnel à courir dehors. Les ouvriers se sont rendus au village, où ils se sont arrêtés devant le bureau de poste, où vivaient le maire et le facteur, et ont exprimé leur colère. Ici, Luigi Dissune a présenté sous les applaudissements les revendications des travailleurs : un franc de salaire en plus par jour, une ventilation fonctionnelle et de meilleures règles de sécurité. La menace selon laquelle plus aucun mineur n'entrerait dans le tunnel jusqu'à ce que cette obligation ne soit complètement remplie a été renforcée par la prise de poste devant l'entrée du tunnel afin qu'aucun mineur ne soit autorisé à entrer dans le tunnel à 22 heures. changement d'équipe."
 gaudi.247.g: "Appelez le justicier."
 gaudi.247.h: "Nous cédons à leurs demandes."
 gaudi.248.t: "Un triste jour pour la Suisse"
 gaudi.248.d: "Lorsqu'il y a eu un soulèvement ouvrier, nos forces de sécurité sont intervenues de manière assez brutale. Plusieurs ouvriers ont été tués. À cause de cela, nous avons subi une perte de réputation internationale."
 gaudi.248.f: "On ne sait pas pourquoi le premier coup de feu a été tiré ni par qui. Aucun ordre de tirer n'a été donné. Le déroulement exact de la fusillade n’est pas non plus clair. Ensuite, les manifestants se sont dispersés. Quatre d'entre eux sont morts et plusieurs ont été blessés. Selon les sources, deux ou trois sont morts sur place, un autre a succombé à ses blessures un jour plus tard, et selon le rapport d'enquête, le quatrième plusieurs jours plus tard. L'événement a été connu dans toute l'Europe grâce à des articles de presse accusateurs, y compris au-delà de la Suisse. En particulier, le contexte de la formation des unités de police impliquées a été remis en question."
 gaudi.248.g: "Ils l'ont commencé !"
 gaudi.249.t: "Point dur"
 gaudi.249.d: "Après des années d'efforts extrêmement difficiles, les ouvriers du bâtiment n'ont rencontré qu'un déplacement minime au milieu du massif du Saint-Gothard."
 gaudi.249.f: "Après sept ans et cinq mois, les équipes de construction qui ont traversé le massif montagneux du nord et du sud se sont rencontrées. Les écarts n'étaient que de 33 centimètres latéralement et de 5 centimètres en hauteur - un chef-d'œuvre de l'ingénierie et de la technologie d'arpentage de l'époque. L'événement a été célébré dans les médias européens et, avec ses 15 kilomètres, le tunnel le plus long du monde à l'époque a été construit. «On peut dire aujourd'hui que toute la presse du continent rend hommage au Gotthardwerk et lui rend hommage en termes de sincère reconnaissance», écrivait alors le Landbote de Zurich."
 gaudi.249.g: "Champagne!"
 gaudi.301.t: "Début de la construction du Cristo Redentor"
 gaudi.301.d: "Avec la construction des premiers échafaudages et structures en fer du Corcovado, les ouvriers du bâtiment ont commencé à travailler sur la statue du Christ."
 gaudi.301.f: "Christ the Redeemer is the largest statue in the world built in Art Deco style. The face of the statue was created by the sculptor Gheorghe Leonida who was born in Galati, Romania in 1893. He studied sculpture at the Bucharest Conservatory of Fine Arts and then, after studying in Italy for another three years, won the Reveil Sculpture Prize. Famed in France as a portraitist, he was recruited by Paul Landowski into the team that began work on Christ the Redeemer in 1922. Gheorghe Leonida contributed by depicting the face of Jesus Christ on the statue, a fact that made him famous. A group of engineers and technicians studied Landowski's presentations and made the decision to build the structure out of reinforced concrete (designed by Albert Caquot) rather than steel, which would be more appropriate for a cruciform statue. The outer layers are made of soapstone, chosen for its durability and ease of use. It took nine years to build and cost the equivalent of USD 250,000 (or USD 3.3 million in 2014 value)."
 gaudi.301.g: "Une étape importante pour notre nation."
 gaudi.302.t: "Christ sur la montagne du Corcovado"
 gaudi.302.d: "Après des années de travaux de construction, un point culminant de l'architecture Art déco a été complété aujourd'hui avec la statue du Christ - et l'un des nouveaux symboles du Brésil !"
 gaudi.302.f: "Lors de la cérémonie d'inauguration, la statue a été éclairée par une série de projecteurs déclenchés à distance par le pionnier de la radio à ondes courtes Guglielmo Marconi, qui se trouvait à 9 200 kilomètres de là à Rome, en Italie, mais en raison du mauvais temps, les lumières ont été allumées sur place. Une messe a également eu lieu lors de l'inauguration. Cristo Rednetor était la plus haute statue du Christ au monde de 1931 à 1981."
 gaudi.302.g: "Puisse-t-il protéger le pays et la ville."
 gaudi.309.t: "Rio a perdu"
 gaudi.309.d: "Avec la perte de Rio de Janeiro, nous avons perdu toute opportunité de continuer à construire le Cristo Redentor."
 gaudi.309.f: "Si nous perdons Rio de Janeiro, nous devrons recommencer la construction pour la reprendre. Seul un pays de culture brésilienne peut compléter le Christ Rédempteur."
 gaudi.309.g: "On ne peut pas leur laisser Rio de Janeiro bien longtemps !"
 gaudi.311.t: "Bon progrès"
 gaudi.311.d: "Les travaux sur le Cristo Redentor avancent mieux que prévu. Nous espérons être quelques mois en avance sur le calendrier."
 gaudi.311.f: "La technologie moderne, les processus de travail rapides, l'approvisionnement en matériaux sans interruption et le beau temps favorisent le progrès de la construction."
 gaudi.311.g: "Des nouvelles qui adoucissent la journée."
 gaudi.312.t: "Un don pour le Christ Rédempteur"
 gaudi.312.d: "En bon chrétien, [SCOPE.sCharacter('gaudi_cristo_donator').GetFullName] porte un grand intérêt personnel au Cristo Redentor. Il a donc soumis une donation personnelle pour la construction de la statue."
 gaudi.312.f: "L'érection de la statue du Christ était une suggestion qui circulait depuis des décennies avant d'être réalisée et qui constituait une préoccupation majeure, en particulier dans les cercles catholiques fervents. De nombreux donateurs ont soutenu le projet lorsqu’il a finalement été réalisé."
 gaudi.312.g: "Nous lui sommes redevables."
 gaudi.313.t: "Le clergé salue notre projet de construction"
 gaudi.313.d: "Le clergé brésilien est prêt à faire tout ce qui est en son pouvoir pour achever la statue du Christ Rédempteur de Rio de Janeiro. Les forces critiques de l’Église craignent que notre gouvernement soit trop influencé par l’Église."
 gaudi.313.f: "Des problèmes de financement ont retardé la construction du Cristo Rednetor pendant près de dix ans avant que l'inauguration puisse enfin avoir lieu avec le soutien de l'archidiocèse de Rio de Janeiro, du Saint-Siège et de la France."
 gaudi.313.g: "Nous devrions en bénéficier."
 gaudi.313.h: "Louez l’Église en public."
 gaudi.313.i: "Cette affaire n’implique pas l’Église !"
 gaudi.314.t: "Les syndicats critiquent le Christ Rédempteur"
 gaudi.314.d: "En tant que représentant des syndicats, [SCOPE.sCharacter('trade_unions_leader').GetFullName] a adressé aujourd'hui une pétition au gouvernement pour qu'il reconsidère le soutien controversé au Christ Rédempteur."
 gaudi.314.f: "Les dirigeants syndicaux du Brésil considèrent la construction actuelle du Christ Rédempteur comme un terrible gaspillage d'argent. S'ils ne peuvent pas empêcher la construction, même pour détourner les fonds vers des canaux caritatifs significatifs, ils exigent au moins un meilleur traitement et de meilleurs soins pour les constructeurs qui travaillent à des hauteurs dangereuses et doivent transporter des tonnes de matériaux jusqu'en haut de la montagne."
 gaudi.314.g: "Ignore les."
 gaudi.314.h: "Faites semblant de le faire."
 gaudi.314.i: "Dépenser de l'argent pour améliorer la situation du travailleur."
 gaudi.315.t: "Problèmes de transport"
 gaudi.315.d: "La montagne du Corcovado est certainement un endroit idéal pour construire un monument visible à des kilomètres. Mais sur le plan logistique, cela présente des inconvénients."
 gaudi.315.f: "Le Corcovado, qui signifie « bosse » en portugais, est une montagne de 710 mètres de haut située dans la zone métropolitaine de Rio de Janeiro, avec une chute presque verticale sur un côté. Bien qu'une ligne de chemin de fer ait ouvert la montagne à la fin du 19e siècle, le transport de composants plus gros en particulier s'est avéré plus difficile qu'on ne le pensait initialement, notamment en raison du chemin sinueux et étroit qui monte au sommet de la montagne."
 gaudi.315.g: "Tout ce que j'entends, ce ne sont que des plaintes !"
 gaudi.316.t: "Accident"
 gaudi.316.d: "Un accident s'est produit aujourd'hui sur le chantier du Christ Rédempteur, ce qui a retardé les travaux de plusieurs semaines."
 gaudi.316.f: "Malgré sa grande hauteur, la construction de la statue du Christ était moins dangereuse que la construction de nombreux gratte-ciel. Cependant, des accidents ne pouvaient être exclus. Même le directeur du chantier, Heitor Levy, a failli tomber d'un échafaudage dans le gouffre. Levy fut sauvé au dernier moment par les ouvriers du bâtiment et attribua ce miracle à une intervention de Jésus-Christ lui-même. En raison de cette expérience de mort imminente, le juif autochtone s’est ensuite converti au catholicisme."
 gaudi.316.g: "Un présage ?"
 gaudi.317.t: "Orage"
 gaudi.317.d: "Lors d'un orage, la foudre a frappé le Christ Rédempteur, détruisant des parties de celui-ci."
 gaudi.317.f: "Les orages ont été un problème constant pendant la construction et même après l'achèvement de la statue. Les coups de foudre ont détruit à plusieurs reprises des parties de la pierre stéatite ainsi que des parties plus grandes telles que les doigts."
 gaudi.317.g: "Un incident malheureux."
 gaudi.317.h: "Réparer les dégâts."
 gaudi.317.i: "Nous avons besoin de plus de paratonnerres."
 gaudi.317.j: "Réparez les dégâts et construisez de nouveaux paratonnerres."
 gaudi.318.t: "Un éloge"
 gaudi.318.d: "Un député du [SCOPE.sCountry('gaudi_cristo_neighbour').GetName] s'est rendu aujourd'hui à Rio de Janeiro et a exprimé sa joie devant la statue du Christ Rédempteur, qui prend forme chaque jour."
 gaudi.318.f: "La statue du Christ est déjà devenue un symbole national du Brésil et éclipse toute l’Amérique latine."
 gaudi.318.g: "Merci."
 gaudi.318.h: "Demandez-lui de récolter des soutiens dans son pays pour notre projet."
 gaudi.319.t: "Intervention athée"
 gaudi.319.d: "Dans un discours public aujourd'hui, [SCOPE.sCharacter('gaudi_cristo_atheist').GetFullName] a fustigé la construction de la statue du Christ comme un retour au Moyen Âge et a appelé les personnes partageant les mêmes idées à dénoncer le gaspillage d'argent."
 gaudi.319.f: "« Si Dieu voulait une statue de lui-même, pourquoi ne l'a-t-il pas dit ? Et s’il en a besoin, pourquoi ne pas le construire lui-même ? Le Brésil est un pays moderne qui n’a besoin ni de dieux ni de rois, seulement d’hommes. Un homme n’a-t-il pas droit à la sueur de son front ? Je ne crois en aucun Dieu, ni en aucun homme invisible dans le ciel. Pourquoi adorer un drapeau ou un Dieu, quand nous pouvons adorer ce qu'il y a de meilleur en nous : notre volonté d'être grand ?"
 gaudi.319.g: "Nous ne devrions pas trop défier ce groupe."
 gaudi.319.h: "DEUS VULTE !"
 gaudi.319.i: "Art Déco et des mots comme ça. J'ai un TRÈS mauvais pressentiment à propos de ce type."
 gaudi.320.t: "Investissements touristiques"
 gaudi.320.d: "L'industrie touristique considère la statue du Christ comme un facteur positif et souhaite soutenir le projet."
 gaudi.320.f: "La construction du Christ Rédempteur a coïncidé avec une époque où Rio de Janeiro devenait une destination de voyage à la mode en raison de l'interconnexion du trafic aérien, de sa plage de sable et de sa scène culturelle animée. La statue moderne du Corcovado était donc également un symbole pour l'industrie touristique émergente et un ajout bienvenu en tant que nouvelle attraction."
 gaudi.320.g: "Plage, soleil, hôtels et Christ Rédempteur !"
 gaudi.401.t: "Reprise de la construction de la Mole Antonelliana"
 gaudi.401.d: "Après que la ville de Turin ait achevé les dernières négociations avec la communauté juive, les travaux de construction ont repris aujourd'hui."
 gaudi.401.f: "A l'origine, la communauté juive de Turin souhaitait s'établir un siège cossu dans l'ancienne capitale du royaume de Sardaigne-Piémont. La nouvelle synagogue a été conçue pour démontrer la présence, l'avancement et l'intégration des citoyens juifs de la ville. L'architecte désigné, Alessandro Antonelli, devait assumer cette tâche. Cependant, Antonelli était également connu pour ses bâtiments monumentaux, dont il agrandit les dimensions. Dans la ville piémontaise de Castellamonte, par exemple, Antonelli avait projeté une cathédrale qui aurait rivalisé avec celle de Saint-Pierre de Rome ; mais le projet gigantesque est resté inachevé en raison du manque de financement. Un sort similaire menaçait désormais la communauté juive avec sa nouvelle synagogue, qui grandissait de jour en jour, mais menaçait de devenir un désastre financier pour la communauté juive. Les autorités de la ville de Turin achetèrent le bâtiment et dédommagèrent les Juifs avec de nouveaux terrains et une nouvelle synagogue, qui fut construite en quelques années. Au lieu de cela, la « Taupe » devrait devenir un symbole national de l'Italie."
 gaudi.401.g: "Espérons qu'Antonelli ne change pas encore ses plans..."
 gaudi.402.t: "Mole Antonelliana : Première phase terminée"
 gaudi.402.d: "Les structures de base de la Mole Antonelliana sont terminées. Cependant, concernant le toit et la flèche, Antonelli a de nouvelles idées farfelues."
 gaudi.402.f: "La Mole Antonelliana était initialement prévue pour avoir une coupole ordinaire. Cependant, Antonelli l'a construit toujours plus volumineux et plus haut, jusqu'à ce que le résultat soit la forme caractéristique à laquelle on l'associe aujourd'hui. Cela signifiait également que la finition de la construction au sommet prendrait plus de temps."
 gaudi.402.g: "Cet homme n'est-il jamais satisfait ?"
 gaudi.403.t: "Atteindre le ciel avec Antonelli"
 gaudi.403.d: "La phase finale de construction de la Mole Antonelliana a commencé."
 gaudi.403.f: "Conformément à son projet initial, Antonelli a décidé de terminer le Môle avec une terminaison presque pointue, dotée de colonnades entre le néogothique et le néoclassique, imitant ainsi une autre de ses œuvres antérieures, la pointe de la Basilique de San Gaudenzio, symbole de Novare. À partir de 90 mètres, il rompt donc avec le thème architectural carré en concevant une colonnade en granit à base circulaire, appelée « Lanterne », posée sur une base tronconique. De même, l'architecte a également conçu la conception d'une flèche d'environ 50 mètres au-dessus de la Lanterne, de section octogonale, et entrecoupée de dix terrasses circulaires, les deux premières encore équipées d'une colonnade, puis vers le haut progressivement de plus en plus petites et accessibles. par une petite échelle en zigzag."
 gaudi.403.g: "Et j'espérais que ce n'était que des finitions et des décorations..."
 gaudi.404.t: "Môle Antonelliana terminée"
 gaudi.404.d: "Les travaux de construction se sont achevés aujourd'hui cérémonieusement avec l'installation d'un génie. Turin et l'Italie sont plus riches d'un point de repère !"
 gaudi.404.f: "Antonelli a travaillé avec dévouement sur la Môle jusqu'à sa mort ; l'ascenseur rudimentaire actionné par une poulie qui transportait l'architecte de près de quatre-vingt-dix ans à plusieurs dizaines de mètres de hauteur, pour vérifier personnellement l'état des travaux, est devenu légendaire. Quelques mois après sa mort, l'architecte proposa de terminer la flèche avec une statue représentant un « Génie ailé ». La conception de la statue a été confiée au sculpteur Fumagalli ; le Génie, en cuivre repoussé et doré, pesait environ 300 kg et avait une lance dans une main et une branche de palmier dans l'autre. La statue atteignait une hauteur totale de 5,46 mètres. Après la mort d'Antonelli, l'achèvement de la flèche fut surtout supervisé par son fils Costanzo et son élève Crescentino Caselli. Avec la pose finale du « Génie ailé », le bâtiment a atteint une hauteur totale de 167,35 mètres, une hauteur, à l'époque, jamais atteinte par aucune construction en maçonnerie en Europe et dans le monde. Le Môle, la plus haute construction en maçonnerie du monde, est entrée en « concurrence » directe avec la Tour Eiffel à Paris, inaugurée dix jours plus tôt et qui aurait été le plus haut bâtiment du monde jusqu'en 1930."
 gaudi.404.g: "Viva Turin, viva l'Italia !"
 gaudi.409.t: "Turin a perdu !"
 gaudi.409.d: "Avec la perte du Piémont, nous avons perdu toute opportunité de continuer à construire la Mole Antonelliana."
 gaudi.409.f: "Si le Piémont devait être perdu pour quelque raison que ce soit, l'avancement de la construction ne serait pas perdu dans son ensemble. Seule l'Italie peut poursuivre la construction de la Mole Antonelliana dans la dernière phase de construction. Les envahisseurs étrangers, en revanche, ne montreront aucun intérêt pour la poursuite des constructions."
 gaudi.409.g: "On ne peut pas leur laisser Turin longtemps !"
 gaudi.411.t: "Mauvaises briques"
 gaudi.411.d: "La dernière livraison de matériel pour la Mole Antonelliana s'est avérée médiocre."
 gaudi.411.f: "Pendant un moment, l'activité habituelle sur le chantier de Turin, où la Mole Antonelliana grandissait chaque jour, s'est calmée. Un bref inventaire réalisé par Antonelli a révélé que les briques n'étaient pas de la qualité habituelle et a annoncé qu'il préférait attendre avant que son chef-d'œuvre ne soit compromis par ces briques. Cependant, des voix s'élèvent dans la direction de la construction selon lesquelles les briques devraient toujours être utilisées - non seulement parce que la construction pourrait être retardée, mais aussi parce que l'on craint qu'Antonelli puisse profiter de ce temps pour modifier à nouveau le plan..."
 gaudi.412.t: "Catastrophe!"
 gaudi.412.d: "La qualité inférieure des matériaux a fait des ravages : ce matin, une section de la Mole Antonelliana s'est effondrée et a causé des dégâts considérables."
 gaudi.412.f: "Peut-être qu’Antonelli aurait dû être écouté. Ce n'était peut-être pas une bonne idée d'utiliser des briques en ruine pour un monument aussi important que la Mole Antonelliana. Peut-être aurait-on donc dû réfléchir à deux fois à cette décision. Mais trop tard : les matériaux de qualité inférieure ont fait des ravages aujourd'hui, entraînant l'effondrement d'un mur et détruisant une grande partie des travaux de construction des derniers semaines et mois, lorsqu'une façade s'est effondrée."
 gaudi.413.t: "Enquêtes archéologiques à Turin"
 gaudi.413.d: "Après une visite à Turin, [SCOPE.sCharacter('gaudi_archaeologist').GetFullName] a découvert que la Mole Antonelliana se dresse apparemment sur des ruines romaines. Il demande un permis de fouille."
 gaudi.413.f: "Au premier siècle avant JC, les Romains fondèrent Augusta Taurinorum. La Via Garibaldi retrace le parcours exact du decumanus de la ville romaine qui commençait à la Porta Decumani, incorporée plus tard au Château ou Palais Madama. La Porta Palatina, située au nord du centre-ville actuel, est encore conservée dans un parc proche de la cathédrale. Des vestiges du théâtre de l'époque romaine sont conservés dans la zone de la Manica Nuova."
 gaudi.414.t: "Une nouvelle machine"
 gaudi.414.d: "L'industrie automobile de notre pays a récemment équipé le chantier de construction de la Mole Antonelliana d'une machine très moderne qui fait avancer les travaux."
 gaudi.414.f: "La Mole Antonelliana est surtout connue pour être l'une des plus grandes structures en brique de son époque, suivant à bien des égards les théories architecturales traditionnelles plutôt que progressistes. Mais même si le bâtiment n'utilisait pas de structures en acier ni de ciment, cela n'excluait pas l'utilisation d'autres machines. Turin, avec Milan et Gênes, était l'un des principaux sites industriels d'Italie, ce qui permettait de livrer des machines facilitant le travail si elles étaient commandées par Maître Antonelli."
 gaudi.415.t: "Don citoyen"
 gaudi.415.d: "Les représentants de la petite bourgeoisie à l'esprit patriotique, sous leur chef [SCOPE.sCharacter('pb_leader').GetPrimaryRoleTitle] [SCOPE.sCharacter('pb_leader').GetFullName], ont fait un don pour la construction de la Mole Antonelliana."
 gaudi.415.f: "Depuis sa reprise par les autorités municipales, la Mole Antonelliana est devenue plus qu'un simple symbole du pôle industriel en plein essor de Turin. La grandeur en quête du ciel n'était pas seulement un symbole de modernité, mais aussi de l'esprit national de l'Italie. Pour la bourgeoisie à l’esprit patriotique, le bâtiment était un symbole d’identification pour le nouvel État. Une fois terminé, le bâtiment abriterait le Musée du Risorgimento. Les Italiens à l’esprit national avaient donc tout intérêt à ce que le projet soit achevé rapidement."
 gaudi.415.g: "Nous leur devons une dette de gratitude."
 gaudi.416.t: "Antonelli vient d'avoir une autre idée..."
 gaudi.416.d: "Alessandro Antonelli, le constructeur du monument qui porte son nom, a récemment surpris la direction des travaux avec un changement..."
 gaudi.416.f: "Ce serait un euphémisme de qualifier Alessandro Antonelli d’architecte excentrique. Il est tout à fait naturel de planifier un bâtiment de 130 mètres de haut et d'insister ensuite sur le fait qu'une hauteur d'au moins 160 mètres est indigne d'un architecte en raison de ses propres exigences de perfection. Il va de soi également de planifier une église dans la province du Piémont aux dimensions de Saint-Pierre de Rome. Et ce n'est certainement pas un signe de légère mégalomanie qu'un nombre considérable de ses bâtiments ne soient jamais achevés parce qu'ils ne répondent pas aux propres exigences de chacun. Rien de tout cela ne conviendrait à Alessandro Antonelli. Quoi qu'il en soit, il a une nouvelle idée pour prolonger encore la construction de la Mole Antonelliana..."
 gaudi.416.g: "Maman Mia !"
 gaudi.416.h: "Saint Dio!"
 gaudi.416.i: "Porca miseria!"
 gaudi.416.j: "Cavolo !"
 gaudi.417.t: "L'Antonelliana grandit vers le ciel"
 gaudi.417.d: "La construction de la Mole Antonelliana avance plus vite que prévu pour des raisons qui ne sont pas précisées."
 gaudi.417.f: "Pour des raisons inconnues, la construction de la majestueuse Mole Antonelliana progresse. C'était peut-être le beau temps. Peut-être la prière à la Madone. Peut-être aussi les matériaux de construction de qualité inférieure que nous avons gaspillés l'autre jour et que nous espérons ne jamais retrouver. Une chose est sûre : ce monstre, qui a connu à plusieurs reprises des retards dus aux circonstances les plus diverses, devrait être terminé plus rapidement que prévu. En supposant qu'Antonelli n'utilise pas cela pour essayer de rattraper le temps gagné avec une nouvelle extension..."
 gaudi.418.t: "La poutre qui tombe détruit le mur de briques"
 gaudi.418.d: "La chute d'une poutre de support a causé aujourd'hui des dégâts considérables à la Mole Antonelliana et a retardé la construction."
 gaudi.418.f: "Cette poutre de support ne soutenait pas vraiment."
 gaudi.418.g: "Aggravant."
 gaudi.419.t: "Le monarque fait une visite"
 gaudi.419.d: "[SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('gaudi_ruler').GetFullName] a décidé de rendre une visite personnelle au chantier de construction de Molle Antonelliana."
 gaudi.419.f: "Notre monarque [SCOPE.sCharacter('gaudi_ruler').GetFullName] a déjà montré par le passé beaucoup d'intérêt pour ce qui se passe sur le chantier de Turin et a maintenant l'intention de visiter le chantier. Les préparatifs battent leur plein - et bien sûr, ils veulent offrir quelque chose à Sa Majesté ! De simples ouvriers du bâtiment, la direction de la construction et Antonelli personnellement ont donc fixé après l'annonce une vitesse de corde jusqu'alors inconnue."
 gaudi.419.g: "Sa Majesté sait motiver."
 gaudi.420.t: "Accident de chantier"
 gaudi.420.d: "Plusieurs hommes ont été blessés dans un accident aujourd'hui. La direction de la construction de la Mole Antonelliana estime qu'il y aura des retards importants si nous ne réparons pas les dégâts et ne recrutons pas du personnel de remplacement."
 gaudi.420.f: "Plusieurs hommes ont été blessés aujourd'hui dans un accident à Turin, certains grièvement et ont dû être transportés à l'hôpital. Parmi les blessés figurent des ouvriers qualifiés et expérimentés qui ont joué un rôle clé dans la construction. Sans eux, la construction risque d’être retardée jusqu’à ce qu’elle se rétablisse."
 gaudi.420.g: "Les accidents arrivent."
 gaudi.420.h: "Nous devons faire tout notre possible pour garantir que cela ne perturbe pas l’avancement des travaux."
 gaudi.421.t: "Menace de grève"
 gaudi.421.d: "Les ouvriers du bâtiment de la Mole Antonelliana ont annoncé une grève si nous ne voulons pas négocier de meilleurs salaires."
 gaudi.421.f: "Ah, le monde merveilleux des grèves ! Vous ne savez pas ce que vous ratez si vous n'avez pas vécu en Italie ce que c'est que d'être bloqué dans une gare parce que le syndicat des cheminots décide soudainement de la saboter. Elle ne concerne aujourd’hui qu’un seul chantier. Nous avons vraiment de la chance !"
 gaudi.421.g: "Nous ne négocierons pas."
 gaudi.421.h: "Payer quelques jaunes fera l'affaire."
 gaudi.421.i: "Appelez les carabiniers !"
 gaudi.421.j: "Négocier."
 gaudi.422.t: "Un orage détruit Spire"
 gaudi.422.d: "Un orage s'est transformé en phénomène semblable à une tornade et a arraché la flèche de la Mole Antonelliana pendant la nuit !"
 gaudi.422.f: "Une violente tempête, probablement un tourbillon, a provoqué la rupture de 47 mètres de la flèche et sa chute dans un petit jardin. La flèche, frôlant la fenêtre d'une pièce du dernier étage, a partiellement détruit un balcon, mais n'a causé aucun dommage aux personnes. Un sort similaire est arrivé à la Taupe le 23 mai 1953. La Taupe avec la flèche brisée peut être vue à la fin du générique d'ouverture du film de 1955 Les Amis de Michelangelo Antonini. Le titre d'édifice en maçonnerie le plus haut d'Europe est donc passé au clocher de la cathédrale d'Ulm, en Allemagne (161,53 mètres), tandis que l'hôtel de ville de Philadelphie a passé le titre d'édifice en maçonnerie le plus haut du monde (162,53 mètres). Cela était également dû au fait que la flèche ne serait plus reconstruite en maçonnerie, mais en béton armé."
 gaudi.422.g: "Une catastrophe!"
 gaudi.423.t: "Nietzsche admire la Taupe"
 gaudi.423.d: "Le célèbre philosophe allemand Friedrich Nietzsche a passé une grande partie des années 1870 et 1880 à Turin, ville qu'il tenait en haute estime. Il a fait l'éloge de la Mole Antonelliana comme l'un des plus grands bâtiments de son temps."
 gaudi.423.f: "«Je suis passé devant la Mole Antonelliana, l'édifice le plus ingénieux qui a peut-être été construit dans un élan absolu vers le haut - il ne rappelle rien d'autre que Zarathoustra. Je l'ai baptisé Ecce Homo et je l'ai entouré dans mon esprit d'un immense espace libre. - Friedrich Nietzsche"
 gaudi.423.g: "L'homme a du goût. Pas seulement depuis « Morgenröte »."
 gaudi.424.t: "Mongolfière italienne"
 gaudi.424.d: "La construction de la Mole Antonelliana devrait être financée par une mesure spéciale et susciter ainsi un intérêt supplémentaire."
 gaudi.424.f: "La municipalité avait prévu que l'achèvement de la Mole Antonelliana coïncide avec la tenue d'une grande exposition. Les visiteurs doivent observer de près la Mole Antonelliana. La structure n'a pas été construite à temps, mais pour compenser, il était encore possible de voir l'avancement des travaux en montgolfière moyennant un supplément de 5 lires. Le ballon lui-même a reçu le nom « Italo »."
 gaudi.424.g: "Un ballon touristique semble être une bonne idée."
 gaudi.424.h: "Quel gaspillage d'argent."
 gaudi.425.t: "Italo frappé par la foudre"
 gaudi.425.d: "Le ballon de la Mole Antonelliana a été détruit dans une tempête !"
 gaudi.425.f: "Le ballon \"Italo\", qui était devenu un passe-temps agréable pour la classe supérieure moyennant une petite excursion lors de la construction de la Mole Antonelliana, fut frappé par la foudre le 27 avril 1884 et s'écrasa au sol. Il n’y a eu aucun mort ni blessé."
 gaudi.425.g: "Construisez un nouveau ballon."
 gaudi.425.h: "Ces balades en montgolfière sont bien trop dangereuses."
 gaudi.501.t: "Début des travaux de construction sur la Ringstrasse"
 gaudi.501.d: "Par un décret, le [SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('gaudi_ruler').GetFullName] a lancé aujourd'hui le début de la construction du périphérique."
 gaudi.501.f: "«Je souhaite que l'expansion du centre-ville de Vienne soit abordée le plus rapidement possible en vue de le relier à la banlieue et que la réglementation et l'embellissement de ma résidence et de ma capitale impériale soient pris en compte. A cette fin, j'autorise l'abandon du mur et des fortifications du centre-ville, ainsi que des fossés qui l'entourent. La partie du terrain et des glacis obtenue par l'abandon du mur d'enceinte des fortifications et des douves de la ville, qui n'est pas réservée à une autre détermination conformément au plan de base à élaborer, doit être utilisée comme terrain à bâtir et le produit de cette opération doivent être utilisés pour constituer un fonds immobilier, à partir duquel les dépenses encourues par le Trésor public à la suite de cette mesure, en particulier également les coûts de construction de bâtiments publics, ainsi que le déménagement des institutions militaires qui sont encore nécessaires, doivent être satisfaits. - François Joseph I."
 gaudi.501.g: "Vienne deviendra une métropole de premier rang."
 gaudi.502.t: "Inauguration de la Ringstrasse"
 gaudi.502.d: "La Ringstrasse a été inaugurée aujourd'hui lors d'une cérémonie. Mais cela ne s'applique qu'à l'avenue en tant que telle : il lui manque encore la grandeur qui est censée mettre Vienne à égalité avec Londres et Paris."
 gaudi.502.f: "\"Votre Majesté a offert le plus beau cadeau de Noël à toute la population de sa fidèle ville de résidence en prenant généreusement la décision de faire tomber les murs de Vienne et d'agrandir la ville, car Vienne doit devenir l'une des villes les plus belles et les plus saines d'Europe. . La plus grande partie de la tâche assignée par Votre Majesté a été accomplie, les courtines d'enceinte ont disparu, une rue avec les plus beaux palais et maisons a été achevée, des jardins et des terrains ont été créés qui agrémentent la résidence et assurent la détente des habitants. . L'aqueduc tant attendu, qui est la condition de la propreté de la ville et de la santé de ses habitants, couronnera le grand travail d'expansion de la ville, et Votre Majesté, en tant que fondatrice, devra, même aux générations futures, le plus grand soin. merci. Permettez à Votre Majesté d'exprimer mes plus respectueux remerciements au nom des représentants de la ville de Vienne, pour qu'ils aient la grâce d'ouvrir aujourd'hui la Ringstrasse. - Andreas Zelinka, maire de Vienne"
 gaudi.502.g: "Vienne, tu es un joyau !"
 gaudi.503.t: "Un tournant pour Vienne"
 gaudi.503.d: "Le périphérique prend petit à petit forme. En particulier, la construction d'un grand opéra et d'un nouvel hôtel de ville renforcera la césure que cette phase de construction représente pour l'histoire de la ville de Vienne."
 gaudi.503.f: "«Je considère l'achèvement du périphérique comme une étape particulièrement importante dans le processus d'expansion urbaine. J'ai toujours consacré une attention particulière à ce dossier et vous exprime mon appréciation et ma gratitude, monsieur le maire, ainsi qu'au conseil municipal pour le soin particulier que vous avez apporté à l'embellissement de ma résidence. À l'avenir, je continuerai à prêter attention aux progrès ultérieurs de l'expansion de la ville et, dans la mesure du possible, je tiendrai compte des souhaits de la municipalité en ce qui concerne l'obtention de terrains à bâtir pour la construction d'écoles, d'entrepôts et de parcs à prix très raisonnables. Afin de résoudre rapidement l'une des questions les plus importantes, j'ai ordonné que la municipalité soit autorisée à assurer gratuitement l'approvisionnement en eau du Kaiserbrunnen, et j'espère que l'approvisionnement en eau parviendra ainsi à un conclusion rapide et heureuse. - François Joseph I."
 gaudi.504.t: "Splendeur de Vienne"
 gaudi.504.d: "Avec l'inauguration du nouvel Opéra d'État et l'emménagement dans le nouvel hôtel de ville, une étape importante a été franchie pour faire de Vienne une capitale véritablement digne de l'Autriche."
 gaudi.504.f: "« Les rues de Vienne sont pavées de culture. Les rues d'autres villes avec de l'asphalte. -Karl Kraus"
 gaudi.505.t: "Sur la route de la grandeur"
 gaudi.505.d: "Avec la planification de l'université, du Parlement et des musées d'art, la construction du Ringstrasse de Vienne entre dans sa phase finale. La tâche consiste désormais à créer une merveille architecturale à partir d’un quartier esthétique."
 gaudi.505.f: "«Vienne regorge de monuments et chaque Viennois se sent comme tel.» -Karl Kraus"
 gaudi.506.t: "Vienne Ringstrasse terminé"
 gaudi.506.d: "Aujourd’hui, la Ringstrasse a acquis son aspect déterminant. Même s'il ne peut être exclu que d'autres extensions puissent suivre à l'avenir, ce qui restera dans l'histoire sous le nom de « style ring house » a atteint ici et maintenant son apogée. L’Europe entière nous envie ce paysage !"
 gaudi.506.f: "\"Es war sehr schön, es hat mich sehr gefreut.\" - François Joseph I."
 gaudi.506.g: "C'était très sympa, c'était vraiment mon plaisir."
 gaudi.509.t: "Vienne perdue !"
 gaudi.509.d: "Avec la perte de Vienne, nous avons perdu toute opportunité de poursuivre la construction du Ringstrasse de Vienne."
 gaudi.509.f: "Si Vienne devait être perdue pour quelque raison que ce soit, les progrès de la construction ne seraient pas perdus dans leur ensemble. Seule l'Autriche peut poursuivre la construction du Ringstrasse de Vienne dans la dernière phase de construction. Les envahisseurs étrangers, en revanche, ne montreront aucun intérêt pour la poursuite des constructions."
 gaudi.509.g: "Nous ne pouvons pas leur laisser Vienne longtemps !"
 gaudi.601.t: "La crypte"
 gaudi.601.d: "La première phase de construction se concentrera sur la crypte et l'abside de la Sagrada Família. Il apparaît dès le départ que les dimensions sont plus grandes qu’on ne le pensait initialement."
 gaudi.601.f: "\"Le travail de la Sainte Famille est lent, parce que le Maître de ce travail n'est pas pressé.\" - Antoni Gaudi"
 gaudi.601.g: "Cela ne prendra pas si longtemps, n'est-ce pas ?"
 gaudi.602.t: "Crypte terminée"
 gaudi.602.d: "Aujourd'hui, la crypte de la Sagrada Família a été consacrée. Un premier service pourra y être célébré prochainement."
 gaudi.602.f: "« Les hommes peuvent être divisés en deux types : les hommes de parole et les hommes d'action. Le premier parle ; ce dernier acte. Je fais partie du deuxième groupe. Je n'ai pas les moyens de m'exprimer adéquatement. Je ne pourrais expliquer à personne mes concepts artistiques. Je ne les ai pas encore concrétisés. Je n'ai jamais eu le temps d'y réfléchir. Mes heures ont été consacrées à mon travail. - Antoni Gaudi"
 gaudi.602.g: "Neuf phases de construction supplémentaires..."
 gaudi.603.t: "L'abside"
 gaudi.603.d: "Avec un projet entièrement renouvelé et qui ne ressemble guère à ce qui était initialement prévu, Antoni Gaudí a ouvert la fenêtre d'une église qui n'avait jamais existé auparavant."
 gaudi.603.f: "\"Nous avons donné le titre à un fou ou à un génie, le temps nous le dira.\" - Elies Rogent, directeur de l'École d'architecture de Barcelone"
 gaudi.603.g: "Est-ce que cela est censé se terminer au cours de la vie d'un homme ?"
 gaudi.604.t: "Abside terminée"
 gaudi.604.d: "Après avoir terminé l'abside, les habitants de Barcelone ont un premier aperçu de ce que Gaudí prépare réellement. Le bâtiment présente déjà des formes inhabituelles."
 gaudi.604.f: "La ligne droite appartient à l'Homme. La ligne courbe appartient à Dieu. - Antoni Gaudi"
 gaudi.604.g: "Huit phases de construction supplémentaires..."
 gaudi.605.t: "La façade de la Nativité"
 gaudi.605.d: "Contrairement aux souhaits de l'administration municipale, la construction de la façade de la Nativité commence. Le souhait premier était de construire la Façade de la Passion car elle fait face à la ville."
 gaudi.605.f: "« Chacun trouve ses affaires dans le temple : les paysans voient des poules et des coqs ; les scientifiques, les signes du Zodiaque ; théologiens, la généalogie de Jésus ; mais l'explication, le raisonnement, n'est connu que des personnes compétentes et ne doit pas être vulgarisé. - Antoni Gaudi"
 gaudi.605.g: "J'aime les tortues."
 gaudi.606.t: "Façade de la Nativité terminée"
 gaudi.606.d: "La construction de la façade de la Nativité est terminée. Son aspect ludique et ses dimensions colossales ne convainquent pas seulement les habitants de Barcelone de soutenir la construction de l'église. Cela donne un avant-goût de l’ensemble de l’œuvre."
 gaudi.606.f: "« Il n'est pas possible qu'une seule génération atteigne le Temple tout entier, alors laissons un affichage aussi vigoureux de notre rythme afin que les générations futures ressentent l'incitation à faire de même ; et par contre on ne les lie pas pour la suite du travail (...). Nous avons réalisé une façade complète du Temple de telle sorte que son importance ne permette pas d'arrêter la poursuite des travaux. - Antoni Gaudi"
 gaudi.606.g: "Sept phases de construction supplémentaires."
 gaudi.607.t: "La Nef Principale"
 gaudi.607.d: "L'intérieur de la Sagrada Família s'enrichit chaque jour de détails ; cela ressemble plus à une forêt qu'à une maison."
 gaudi.607.f: "« L'intérieur du temple sera comme une forêt. (...) Les piliers de la nef principale seront des palmiers ; ce sont les arbres de la gloire, du sacrifice et du martyre. Celles des nefs latérales seront des lauriers, des arbres de gloire, d'intelligence. - Antoni Gaudi"
 gaudi.607.g: "Combien d’années cela prendra-t-il ?"
 gaudi.608.t: "Nef principale terminée"
 gaudi.608.d: "Le nonce papal a rendu visite à Gaudí lors de sa visite à la Sagrada Família. Selon le Nonntio, son œuvre et son mode de vie lui valent à juste titre le titre de « Dante de l'architecture ». Cependant, étant donné l'architecture grotesque, les critiques ne savent pas si l'église cite le paradis ou l'enfer."
 gaudi.608.f: "« La peinture, par la couleur, et la sculpture, par la forme, représentent des organismes existants. Les personnages, les arbres, les fruits... expriment leur intériorité à travers leur extériorité. L'architecture crée l'organisme. Elle doit donc être régie par une loi en harmonie avec celles de la nature. Les architectes qui ne respectent pas ce principe réalisent des travaux bâclés au lieu d'une œuvre d'art. - Antoni Gaudi"
 gaudi.608.g: "Six phases de construction supplémentaires."
 gaudi.609.t: "Flèches des Apôtres"
 gaudi.609.d: "Déjà avec la façade de la Nativité, Gaudí avait souligné que la Sagrada Família devait grandir en hauteur plutôt qu'en largeur afin de susciter plus d'enthousiasme ; la construction de tours individuelles donnera à la structure un grand effet."
 gaudi.609.f: "« Il y a quelque temps, un vieux voisin est venu de chez moi, qui m'avait connu enfant et, voyant le temple de la Sagrada Família, s'est naïvement s'écrié : Hélas, hélas ! il fait la même chose qu'il faisait quand il était petit ! Et il avait raison. C'est une aptitude, accumulée par héritage, qui m'anime et me guide. - Antoni Gaudi"
 gaudi.609.g: "Est-ce que cela finira un jour ?"
 gaudi.610.t: "Flèches des Apôtres terminées"
 gaudi.610.d: "Les premières tours de la Sagrada Família sont achevées. Les habitants sont en partie fascinés, en partie choqués."
 gaudi.610.f: "\"Contrairement à la plupart des églises de Barcelone, elle n'a pas été endommagée pendant la révolution. Elle a été épargnée en raison de sa 'valeur artistique', disaient les gens. Je pense que les anarchistes ont fait preuve de mauvais goût en ne le faisant pas exploser quand ils en avaient l'occasion, même s'ils ont accroché une bannière rouge et noire entre ses flèches. - George Orwell"
 gaudi.610.g: "Cinq phases de construction supplémentaires."
 gaudi.611.t: "La façade de la Passion"
 gaudi.611.d: "Avec la Façade de la Passion de la Sagrada Família, on crée actuellement une partie de l'église qui provoque également l'irritation des amis de Gaudí."
 gaudi.611.f: "« Quelqu'un trouvera cette porte trop chic ; mais j'aimerais que cela fasse peur, et pour y parvenir je n'épargnerai pas le clair-obscur, les motifs entrants et sortants, tout ce qui aboutit à l'effet le plus sombre. De plus, je suis prêt à sacrifier la construction elle-même, à briser des arcs et à couper des colonnes pour donner une idée du sanglant sacrifice. - Antoni Gaudi"
 gaudi.611.g: "Une horreur de la pierre."
 gaudi.612.t: "Façade Passion terminée"
 gaudi.612.d: "Contrairement à la façade de la Nativité, la façade de la Passion, qui reste simple, a un effet très moderne et est donc attrayante pour les uns, repoussante pour les autres. On comprend désormais parfaitement pourquoi Gaudí n’a pas voulu construire cette façade en premier."
 gaudi.612.f: "« Ce que j'ai vu à Barcelone – Gaudí – était l'œuvre d'une telle force, d'une telle foi, d'une capacité technique extraordinaire, manifestée pendant toute une vie de génie ; d'un homme qui a sculpté les pierres sous ses yeux selon un motif bien pensé. Gaudí est le « bâtisseur » du début du siècle, un homme adepte de la pierre, du fer et de la brique. Sa gloire se voit aujourd'hui dans son pays. Gaudí était un grand artiste ; il ne reste que ceux qui touchent le cœur sensible des gens doux. - Le Corbusier"
 gaudi.612.g: "Il ne reste que quatre phases de construction."
 gaudi.613.t: "Le transept"
 gaudi.613.d: "Malgré l'avancée réussie des travaux de construction, les critiques continuent de s'exprimer, notamment dans le monde de l'art. Ils ne veulent pas que le bâtiment réponde à des spécifications strictes, mais qu'il doive également évoluer avec les évolutions modernes de l'architecture. La direction de la construction a refusé ces demandes."
 gaudi.613.f: "\"Dans les livres, on trouve rarement ce que l'on cherche, et quand on y trouve, c'est souvent faux.\" - Antoni Gaudi"
 gaudi.613.g: "Hosanna en excelsis."
 gaudi.614.t: "Transept terminé"
 gaudi.614.d: "Maintenant que la Sagrada Família est achevée aux deux tiers, le pape l'a fait élever au rang de basilique mineure lors d'une messe."
 gaudi.614.f: "« Dans la Sagrada Familia, tout est providentiel : son emplacement est au centre de la ville et dans la plaine de Barcelone ; il y a la même distance du temple à la mer et aux montagnes, à Sants et Sant Andreu, et aux rivières Besòs et Llobregat. - Antoni Gaudi"
 gaudi.614.g: "Il ne reste que trois phases de construction."
 gaudi.615.t: "Flèches de Marie et des Évangélistes"
 gaudi.615.d: "Avec la conception des tours évangéliques, Gaudí a joué architecturalement avec des symboles, des éléments, des signes du zodiaque et des vertus. Maintenant, ils devraient devenir réalité."
 gaudi.615.f: "\"Vierge Marie, ça ne semble pas mal pour toi d'être petite, les fleurs et les étoiles aussi.\" - Antoni Gaudi"
 gaudi.615.g: "Ave Maria."
 gaudi.616.t: "Les flèches de Marie et des Évangélistes achevées"
 gaudi.616.d: "Les cinq hautes tours de la Sagrada Família dominent Barcelone ; la construction de la Flèche de Marie se termine avec la pose de l'étoile à douze branches."
 gaudi.616.f: "\"La Sagrada Família n'est pas la dernière des cathédrales, mais la première d'une nouvelle ère.\" - Antoni Gaudi"
 gaudi.616.g: "Deux dernières phases de chantier !"
 gaudi.617.t: "La façade de la gloire"
 gaudi.617.d: "La façade principale de la Sagrada Família est enfin réparée. Pour cela, de nouveaux terrains à bâtir doivent être acquis, au grand dam de la population de la ville. La direction n'a pas encore donné son accord."
 gaudi.617.f: "« Je ne compléterai ni ne développerai le fragment de la maquette des clochers de la façade principale. J'ai décidé de laisser le soin à une autre génération de collaborer au temple, comme on le voit à plusieurs reprises dans l'histoire des cathédrales, dont les façades ne sont pas seulement d'autres auteurs, mais aussi d'autres styles. - Antoni Gaudi"
 gaudi.617.g: "Sanctus, Sanctus, Sanctus."
 gaudi.618.t: "Façade de la Gloire terminée"
 gaudi.618.d: "Avec l'achèvement de la Façade de la Gloire, la Sagrada Família est désormais presque terminée."
 gaudi.618.f: "« La Sagrada Familia... est la plus grande œuvre d'architecture créative des vingt-cinq dernières années. C'est un esprit symbolisé dans la pierre !' -Louis Sullivan"
 gaudi.618.g: "Une dernière phase de chantier !"
 gaudi.619.t: "La flèche du Christ"
 gaudi.619.d: "Avec la flèche du Christ, la Sagrada Família dominera non seulement Barcelone, mais dépassera également la cathédrale d'Ulm - la plus haute église d'Europe à ce jour."
 gaudi.619.f: "\"L'originalité consiste à revenir aux origines.\" - Antoni Gaudi"
 gaudi.619.g: "Ce sera la plus haute église du monde."
 gaudi.620.t: "La Sagrada"
 gaudi.620.d: "C'est fini! C'est vraiment chose faite ! Merveille architecturale du monde, la Sagrada Família rayonne sur Barcelone et dans le monde entier !"
 gaudi.620.f: "Pater noster, qui es in caelis :\nsanctificetur nomen tuum :\nadveniat regnum tuum :\nfiat voluntas tua, sicut in caelo, et in terra.\nPanem nostrum quotidianum da nobis hodie :\net dimitte nobis debita nostra,sicut et nos dimittimus debitoribus nostris\net ne nos inducas in tentationem.\nSed libera nos a malo."
 gaudi.620.g: "Je n'aurais jamais pensé que je vivrais jusqu'à ce jour."
 gaudi.629.t: "Barcelone a perdu !"
 gaudi.629.d: "Avec la perte de Barcelone, nous avons perdu toute opportunité de continuer à construire la Sagrada Família."
 gaudi.629.f: "Si la Catalogne venait à disparaître pour quelque raison que ce soit, les progrès de la construction ne seraient pas perdus dans leur ensemble. Une autre nation, si elle possède une culture primaire ibérique, peut continuer à construire la cathédrale jusqu'à la dernière phase de construction. Les envahisseurs étrangers, en revanche, ne montreront aucun intérêt pour la poursuite des constructions."
 gaudi.629.g: "On ne peut pas leur laisser Barcelone longtemps !"
 gaudi.631.t: "Un don pieux à la Sagrada Família"
 gaudi.631.d: "En bon chrétien, [SCOPE.sCharacter('gaudi_sagrada_donator').GetFullName] porte un grand intérêt personnel à la Sagrada Família. Il a donc soumis une donation personnelle pour la construction de l'église."
 gaudi.631.f: "Pendant des décennies, la Sagrada Família a été principalement financée par des dons. C'est grâce à un don anonyme important peu avant le début des travaux qu'Antoni Gaudí a considérablement élargi ses projets de construction et a fait de la Sagrada Família le projet qu'elle est aujourd'hui. Les travaux de construction sont toujours financés, comme prévu initialement par Josep Maria Bocabella, avec des dons de fondations et des droits d'entrée. Environ 22 millions d'euros sont disponibles chaque année pour la construction ; en 2009, c'était 18 millions d'euros."
 gaudi.631.g: "Nous lui sommes redevables."
 gaudi.632.t: "La construction de la Sagrada Família ravit le clergé"
 gaudi.632.d: "Le clergé de notre pays est euphorique face à l'avancement des travaux de construction de la Sagrada Família et a proposé son aide. Cependant, on craint que cela ne donne à l’Église trop d’influence."
 gaudi.632.f: "Gaudí a entièrement consacré les dernières années de sa vie à la « Cathédrale des Pauvres », comme on l'appelait communément, pour laquelle il a fait l'aumône pour pouvoir continuer. Outre son dévouement à cette cause, il participa à quelques autres activités, dont la plupart étaient liées à sa foi catholique : en 1916, il participa à un cours de chant grégorien au Palau de la Música Catalana enseigné par le moine bénédictin Gregori M. .Sunyol. Monseigneur Ragonesi considérait Gaudí comme « le Dante de l'architecture ». Malgré ses dimensions gigantesques, la Sagrada Família n’est pas une église cathédrale et n’est pas financée par des sources officielles de l’Église."
 gaudi.632.g: "Nous devrions en bénéficier."
 gaudi.632.h: "Louez l’Église en public."
 gaudi.632.i: "Cette affaire n’implique pas l’Église !"
 gaudi.633.t: "Les syndicats critiquent la Sagrada Família"
 gaudi.633.d: "En tant que représentant des syndicats, [SCOPE.sCharacter('trade_unions_leader').GetFullName] a envoyé aujourd'hui une pétition au gouvernement pour qu'il reconsidère le soutien controversé à la Sagrada Família."
 gaudi.633.f: "Les dirigeants syndicaux considèrent la construction actuelle de la Sagrada Família comme un terrible gaspillage d'argent. S'ils ne peuvent pas empêcher la construction, même pour détourner les fonds vers des canaux caritatifs significatifs, ils exigent au moins un meilleur traitement et de meilleurs soins pour les constructeurs qui travaillent à des hauteurs dangereuses."
 gaudi.633.g: "Ignore les."
 gaudi.633.h: "Faites semblant de le faire."
 gaudi.633.i: "Dépenser de l'argent pour améliorer la situation du travailleur."
 gaudi.634.t: "Accident"
 gaudi.634.d: "Un accident s'est produit aujourd'hui sur le chantier de la Sagrada Família, ce qui a retardé les travaux de plusieurs semaines."
 gaudi.634.f: "Travailler à des hauteurs vertigineuses n’est pas le seul risque d’accident. Un pyromane a incendié la Sagrada Família en 2020, interrompant les travaux et organisant l'évacuation des ouvriers du bâtiment et des touristes présents. La sacristie a été touchée par l'incendie et a été endommagée."
 gaudi.634.g: "Regrettable."
 gaudi.635.t: "Les athées se précipitent contre la Sagrada Família"
 gaudi.635.d: "Aujourd'hui, dans un discours public, [SCOPE.sCharacter('gaudi_sagrada_atheist').GetFullName] a fustigé la construction de la Sagrada Família comme un retour au Moyen Âge et a appelé les personnes partageant les mêmes idées à dénoncer le gaspillage d'argent."
 gaudi.635.f: "« On peut être contre la Sagrada Família pour de nombreuses raisons. Pour de nombreuses bonnes raisons. Par exemple parce que c’est un cauchemar architectural, pour ne pas dire un horrible cauchemar. Même dans l’architecture européenne de notre époque, on ne peut rien découvrir d’aussi vulgaire et prétentieux. C'est un cauchemar qui grandit chaque jour vers le ciel, sous les formes les plus obscures et les plus absurdes, entre kitsch, superstition et folie humaine. C'est surtout de la folie, payée par nos contribuables pour que les curés maintiennent les stupides encore plus stupides et les pauvres encore plus pauvres. Mesdames et messieurs, laissez-moi vous dire : cette folie doit cesser. Pas demain, mais aujourd'hui !"
 gaudi.635.g: "Nous ne devrions pas trop défier ce groupe."
 gaudi.635.h: "DEUS VULTE !"
 gaudi.636.t: "Investissements touristiques"
 gaudi.636.d: "L'industrie du tourisme considère la Sagrada Família comme un facteur positif et souhaite soutenir le projet."
 gaudi.636.f: "Au cours du XXe siècle, la Sagrada Família est devenue le véritable symbole de Barcelone. Si l’aspect spirituel était primordial pour Gaudí, il devenait de plus en plus évident pour les entrepreneurs ingénieux que l’éternel chantier pouvait être commercialisé. Plus tard, des centaines de touristes trocs afflueront à Barcelone pour cette raison. Aujourd'hui, la Sagrada Família est l'une des destinations touristiques les plus populaires d'Espagne."
 gaudi.636.g: "Barcelone s'enrichira bientôt d'un monument."
 gaudi.637.t: "Nouvelles machines pour le chantier"
 gaudi.637.d: "L'industrie automobile de notre pays a récemment équipé le chantier de construction de la Sagrada Família d'une machine très moderne qui fait avancer les travaux."
 gaudi.637.f: "La construction de la Sagrada Família, qui a duré plus d'un siècle, a également connu un développement technologique qui devrait accélérer la construction. Alors que de nouvelles méthodes et machines de construction étaient utilisées au tournant du siècle, les simulations informatiques ont révolutionné la construction de l'église à la fin du siècle."
 gaudi.637.g: "C'est un progrès !"
 gaudi.638.t: "Menace de grève"
 gaudi.638.d: "Les ouvriers du bâtiment de la Sagrada Família ont annoncé une grève si nous ne voulons pas négocier de meilleurs salaires."
 gaudi.638.f: "Ah, le monde merveilleux des grèves ! Vous ne savez pas ce que vous ratez si vous n'avez pas vécu dans le sud de l'Europe ce que c'est que de se retrouver bloqué dans une gare parce que le syndicat des cheminots décide soudainement de la saboter. Elle ne concerne aujourd’hui qu’un seul chantier. Nous avons vraiment de la chance !"
 gaudi.638.g: "Nous ne négocierons pas."
 gaudi.638.h: "Payer quelques jaunes fera l'affaire."
 gaudi.638.i: "Appelez la Guardia Civil !"
 gaudi.638.j: "Négocier."
 gaudi.639.t: "Matériau inférieur"
 gaudi.639.d: "La dernière livraison de matériel pour la Sagrada Família s'est avérée médiocre."
 gaudi.639.f: "La première observation révéla que la pierre apportée présentait des taches poreuses. Le maître d’œuvre a donc rejeté l’accusation sans plus attendre. Cela retarderait certainement la construction et entraînerait des coûts supplémentaires, mais la qualité finit par l'emporter. Dans le même temps, certains disent que non seulement nous devrions utiliser la pierre pour des raisons de coût et de temps, mais que nous devrions également conserver certains des meilleurs matériaux de construction pour utiliser les recettes... ailleurs."
 gaudi.639.g: "La qualité a son prix."
 gaudi.639.h: "Comme si quelqu'un le remarquerait."
 gaudi.640.t: "Construction bâclée"
 gaudi.640.d: "La qualité inférieure des matériaux a fait des ravages : ce matin, une partie de la Sagrada Família s'est effondrée et a causé des dégâts considérables."
 gaudi.640.f: "Antoni Gaudí n’est pas amusé."
 gaudi.640.g: "Qui aurait pu prédire cela ?"
 gaudi.641.t: "Des progrès de construction plus rapides"
 gaudi.641.d: "Les travaux de la Sagrada Família avancent mieux que prévu. Nous espérons être quelques mois en avance sur le calendrier."
 gaudi.641.f: "La technologie moderne, les processus de travail rapides, l'approvisionnement en matériaux sans interruption et le beau temps favorisent le progrès de la construction."
 gaudi.641.g: "Je l'avais prédit !"
 gaudi.642.t: "Nouveaux emplois à Barcelone"
 gaudi.642.d: "La construction de l’église a entraîné un afflux massif de personnes à Barcelone."
 gaudi.642.f: "Comme au Moyen Âge, la construction d'une grande église créait de nombreuses nouvelles exigences dans la vie urbaine, auxquelles seuls de nouveaux ouvriers pouvaient souvent répondre. Il ne suffit pas de recruter les ouvriers du bâtiment eux-mêmes. Ils dépendent également des restaurants et des magasins, des fournisseurs et de la construction de nouveaux appartements, qui doivent également être construits par quelqu'un. Cela a donné lieu à un essor à Barcelone, dont certains souhaitent profiter directement ou indirectement."
 gaudi.642.g: "Un grand projet a besoin de gens formidables."
 gaudi.643.t: "Un gros don anonyme"
 gaudi.643.d: "Un riche donateur inconnu a transféré une somme d’argent importante qui permettra d’accélérer la construction de la Sagrada Família."
 gaudi.643.f: "Pendant des décennies, la Sagrada Família a été principalement financée par des dons. C'est grâce à un don anonyme important peu avant le début des travaux qu'Antoni Gaudí a considérablement élargi ses projets de construction et a fait de la Sagrada Família le projet qu'elle est aujourd'hui. Les travaux de construction sont toujours financés, comme prévu initialement par Josep Maria Bocabella, avec des dons de fondations et des droits d'entrée. Environ 22 millions d'euros sont disponibles chaque année pour la construction ; en 2009, c'était 18 millions d'euros."
 gaudi.643.g: "Apparemment, quelqu’un s’inquiète beaucoup de son salut."
 gaudi.644.t: "[SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('gaudi_ruler').GetFullName] soutient la Sagrada Família"
 gaudi.644.d: "[SCOPE.sCharacter('gaudi_ruler').GetFullName] a montré un grand intérêt personnel pour la Sagrada Família."
 gaudi.644.f: "Officiellement, la construction de la Sagrada Família ne bénéficie d'aucune aide gouvernementale. Pendant la guerre civile espagnole, les forces radicales de gauche ont même participé à empêcher la poursuite des constructions. Franco a montré peu d'intérêt pour La Sagrada, mais il ne pouvait pas faire grand-chose. Gaudí avait insisté pour que le financement soit assuré par la communauté catholique espagnole. Toutefois, cela n'exclut pas la possibilité qu'un chef d'État puisse utiliser des canaux cachés pour faire avancer le projet de manière significative, s'il est intéressé... qu'il s'agisse d'argent ou de liens avec le gouvernement local."
 gaudi.644.g: "Vive notre bien [SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('gaudi_ruler').GetFullName] !"
 gaudi.645.t: "Une visite touristique"
 gaudi.645.d: "La Sagrada Família est encore en construction, mais les progrès sont remarquables. Nous devrions inviter un allié et tout lui montrer."
 gaudi.645.f: "Même en tant que bâtiment inachevé, la Sagrada Família a impressionné les visiteurs et stimulé leur imagination. La conception du bâtiment elle-même a été polarisante. Les évaluations des collègues architectes de Gaudí étaient généralement positives ; Louis Sullivan l'admirait beaucoup, décrivant la Sagrada Família comme « la plus grande œuvre d'architecture créative des vingt-cinq dernières années ». C'est l'esprit symbolisé dans la pierre !'' Walter Gropius a fait l'éloge de la Sagrada Família, décrivant les murs du bâtiment comme 'une merveille de perfection technique'. Cependant, l'auteur et critique George Orwell l'a qualifié de « l'un des bâtiments les plus hideux au monde »."
 gaudi.645.g: "Invitez notre allié à visiter Barcelone."
 gaudi.645.h: "Cela ne fera que perturber nos efforts."
 gaudi.646.t: "Soutenir la construction de la Sagrada Família ?"
 gaudi.646.d: "Notre ambassadeur a été invité à une visite du chantier de la Sagrada Família. Ce fut une visite touristique impressionnante et maintenant l'ambassadeur nous demande si nous pourrions acquérir un prestige international pour nous-mêmes en tant que donateur à l'Église."
 gaudi.646.f: "Même en tant que bâtiment inachevé, la Sagrada Família a impressionné les visiteurs et stimulé leur imagination. La conception du bâtiment elle-même a été polarisante. Les évaluations des collègues architectes de Gaudí étaient généralement positives ; Louis Sullivan l'admirait beaucoup, décrivant la Sagrada Família comme « la plus grande œuvre d'architecture créative des vingt-cinq dernières années ». C'est l'esprit symbolisé dans la pierre !'' Walter Gropius a fait l'éloge de la Sagrada Família, décrivant les murs du bâtiment comme 'une merveille de perfection technique'. Cependant, l'auteur et critique George Orwell l'a qualifié de « l'un des bâtiments les plus hideux au monde »."
 gaudi.646.g: "Ce magnifique projet mérite notre soutien."
 gaudi.646.h: "Si cette « église » était vivante, elle aurait dû être tuée par le feu."
 gaudi.647.t: "Don d'Ally"
 gaudi.647.d: "Après une tournée, l'ambassadeur de notre allié était tellement enthousiaste qu'il a décidé de se rendre disponible comme donateur au projet."
 gaudi.647.f: "Même en tant que bâtiment inachevé, la Sagrada Família a impressionné les visiteurs et stimulé leur imagination. La conception du bâtiment elle-même a été polarisante. Les évaluations des collègues architectes de Gaudí étaient généralement positives ; Louis Sullivan l'admirait beaucoup, décrivant la Sagrada Família comme « la plus grande œuvre d'architecture créative des vingt-cinq dernières années ». C'est l'esprit symbolisé dans la pierre !'' Walter Gropius a fait l'éloge de la Sagrada Família, décrivant les murs du bâtiment comme 'une merveille de perfection technique'. Cependant, l'auteur et critique George Orwell l'a qualifié de « l'un des bâtiments les plus hideux au monde »."
 gaudi.647.g: "On reconnaît immédiatement les vrais amis."
 gaudi.648.t: "Enquêtes archéologiques à Barcelone"
 gaudi.648.d: "Après une visite à Barcelone, [SCOPE.sCharacter('gaudi_archaeologist').GetFullName] a découvert que la Sagrada Família se dresse apparemment sur des ruines romaines. Il demande un permis de fouille."
 gaudi.648.f: "Même si les Romains se sont installés à Barcino, elle était beaucoup moins importante que les capitales de Tarraco et Caesaraugusta. Le nom Barcino fut décidé à la fin du règne d'Auguste, le premier empereur de Rome. C'était la forme abrégée de Colonia Faventia Iulia Augusta Pia Barcino, fondée en 133 avant JC. En tant que colonie, elle a été conçue pour fournir des terres aux soldats à la retraite. Le géographe romain Pomponius Mela rapporte Barcino comme un certain nombre de petites colonies sous le contrôle de Tarragone (Tarraco). Néanmoins, la position stratégique de la ville sur un bras de la Via Augusta permit son développement économique et elle bénéficia ainsi d'une exonération fiscale."
 gaudi.648.g: "Nous ne pouvons pas nous permettre un arrêt aussi long de la construction."
 gaudi.648.h: "Une opportunité archéologique unique."
 gaudi.649.t: "[SCOPE.sCharacter('gaudi_chief_engineer').GetLastName] vient d'avoir une autre idée..."
 gaudi.649.d: "[SCOPE.sCharacter('gaudi_chief_engineer').GetFullName] a récemment surpris la direction de la construction avec un changement..."
 gaudi.649.f: "Quiconque construit un monstre comme la Sagrada Família deviendra tôt ou tard excentrique - ou l'est déjà."
 gaudi.649.g: "C'est presque aussi grave que la construction de la Mole Antonelliana..."
 gaudi.650.t: "[SCOPE.sCharacter('gaudi_chief_engineer').GetLastName] accélère la construction de la Sagrada Família"
 gaudi.650.d: "[SCOPE.sCharacter('gaudi_chief_engineer').GetFullName] a récemment surpris la direction de la construction avec l'avancement des travaux."
 gaudi.650.f: "C'est bien d'être l'ingénieur en chef."
 gaudi.650.g: "C'est presque aussi gratifiant que la construction du périphérique de Vienne."
 gaudi.1001.t: "Propagation de la charpente en acier dans la construction"
 gaudi.1001.d: "L’invention du bâtiment à ossature d’acier n’est pas l’œuvre d’une seule personne. Ce fut un processus lent. Cependant, [SCOPE.sCharacter('gaudi_engineer_scope').GetFullName], un ingénieur bien connu, favorise la diffusion de l'invention en construisant des bâtiments d'une résistance remarquable qui atteignent des hauteurs jamais vues auparavant."
 gaudi.1001.f: "Le nouveau bâtiment, qui abritera à l’avenir une banque, grandit de jour en jour. Tel un squelette, la charpente en acier était là, attendant d'être recouverte d'un autre matériau.\nMais ses architectes rêvaient déjà de bien plus que les 10 étages. Dans le futur, 50, voire 100 étages deviendraient possibles !"
 gaudi.1001.g: "Nos tours atteindront enfin le ciel !"
 gaudi.1002.t: "Pavillons Güell"
 gaudi.1002.g: "Un style artistique vraiment remarquable !"
 gaudi.1003.t: "[SCOPE.sCharacter('tesla_new_engineer_scope').GetFullName] wins on the Savio Circuit"
 gaudi.1003.d: "The young [SCOPE.sCharacter('tesla_new_engineer_scope').GetFullName] was first in the Grand Prix Race on the Savio Circuit in Ravenna. Maybe we could nurture this emerging talent somehow?"
 gaudi.1003.f: "L'odeur de l'essence dans l'air, le rugissement des moteurs, l'excitation, le danger, l'action, c'est pourquoi les gens affluaient en spectateurs aux courses automobiles.\n\nEn 1923, le jeune Enzo Ferrari remporte son premier Grand Prix et continue de courir jusqu'à la naissance de son fils, lorsqu'il a arrêté de courir lui-même. Mais il est resté fidèle à la course automobile en créant la Scuderia Ferrari, sa propre équipe de pilotes automobiles."
 gaudi.1003.g: "Quel spectacle !"
