 gaudi_quality_steel_factory_modifier: "Production d'acier de qualité"
 gaudi_faith_in_progress_modifier: "Tour Eiffel : la foi en progrès"
 gaudi_no_faith_in_progress_modifier: "Tour Eiffel : aucune foi en progrès"
 gaudi_admires_eiffel_tower_modifier: "Tour Eiffel : admire le progrès industriel"
 gaudi_eiffel_visionary_modifier: "Tour Eiffel : visionnaire"
 gaudi_revolting_against_eiffel_tower_modifier: "Tour Eiffel : protestation intellectuelle"
 gaudi.2101.t: "Naissance du Titan d'Acier"
 gaudi.2101.d: "Avec un grand intérêt de la part du public, les travaux de construction ont commencé avec les travaux d'excavation des fondations. Au total, 30 973 mètres cubes de terre seront excavés à cet effet. La Tour Eiffel a déjà établi un record sans avoir à poser une seule poutre en acier."
 gaudi.2101.f: "\"Cette tour symbolisera non seulement l'art de l'ingénieur moderne, mais aussi le siècle de l'Industrie et de la Science dans lequel nous vivons et dont la voie a été préparée par le grand mouvement scientifique du XVIIIe siècle et par la Révolution de 1789. , à qui ce monument sera construit en guise d'expression de la gratitude de la France. -Gustave Eiffel"
 gaudi.2101.g: "Vers le ciel, vers les étoiles !"
 gaudi.2102.t: "Inauguration de la Tour Eiffel"
 gaudi.2102.d: "Le titan d'acier, dont la réalisation était à la fois redoutée et attendue, s'élève désormais au-dessus de la capitale française. Tout Paris se trouve à l'ombre d'une tour, devenue le nouveau symbole de la ville. Les critiques ont été réduites au silence par l'enthousiasme avec lequel l'inauguration a été célébrée."
 gaudi.2102.f: "« Devant le fait accompli – et quel fait ! - nous devons nous incliner. Comme beaucoup d’autres, j’ai dit et cru que la Tour Eiffel était une folie, mais c’est une folie grandiose et fière. Certes, cette masse énorme submerge le reste de l'exposition, et lorsqu'on remonte sur le Champ de Mars, les immenses coupoles et galeries semblent minuscules. Mais, que veux-tu? La Tour Eiffel fait appel à l'imagination, c'est quelque chose d'inattendu, de fantastique qui flatte notre petitesse. A peine commencée, les artistes et écrivains les plus célèbres, de Meissonier à Zola, signèrent une ardente protestation contre la tour, considérée comme un terrible crime contre l'art. Le signeriez-vous encore aujourd’hui ? Non, certainement pas, et ils préféreraient que ce document de colère n'existe pas."
 gaudi.2102.g: "Vive la France!"
 gaudi.2109.t: "Paris perdu !"
 gaudi.2109.d: "Avec la perte de Paris, nous avons perdu toute opportunité de continuer à construire la Tour Eiffel."
 gaudi.2109.f: "Si Paris devait être perdu pour une raison quelconque, l'avancement de la construction #R serait perdu dans son ensemble#!. Seule la France peut continuer à construire la Tour Eiffel. Les envahisseurs étrangers ne montreront aucun intérêt à le construire."
 gaudi.2109.g: "On ne peut pas leur laisser Paris longtemps !"
 gaudi.2111.t: "Ascenseurs"
 gaudi.2111.d: "Les nouvelles avancées technologiques dans le domaine de la technologie des ascenseurs ont permis aux travaux de construction de la Tour Eiffel d'avancer plus rapidement que prévu."
 gaudi.2111.f: "L'ascension de la Tour Eiffel est rendue possible grâce à un total de neuf ascenseurs différents : cinq dans les piliers de la tour, qui relient l'entrée au deuxième étage, et deux paires d'ascenseurs à cabine double entre le deuxième et le troisième étage. Lors de la construction de la tour, Eiffel a délibérément utilisé des techniques et des fabricants différents afin de rester indépendant en cas d'erreur. Les ascenseurs Otis fonctionnèrent dans les piliers nord et sud jusqu'en 1910. Jusqu'en 1897, il y avait des ascenseurs de Roux, Combaluzie et Lepape dans les piliers est et ouest. Ils pouvaient transporter jusqu'à 200 personnes à l'aide d'une double chaîne sans fin. Les deux systèmes étaient actionnés par un système de convoyeur hydraulique. A l'occasion de l'Exposition universelle de 1900, Eiffel remplace les ascenseurs et les machines à vapeur qui alimentaient le système hydraulique par des moteurs électriques."
 gaudi.2111.g: "Magnifique!"
 gaudi.2112.t: "Tollé des intellectuels"
 gaudi.2112.d: "Dans un quotidien de renom, plusieurs figures de proue de la vie intellectuelle, académique et artistique ont protesté contre la construction de la Tour Eiffel, qu'ils fustigeent comme une vilaine horreur."
 gaudi.2112.f: "« Nous, écrivains, peintres, sculpteurs, architectes et passionnés de la beauté jusqu'ici intacte de Paris, protestons de toutes nos forces, de toute notre indignation, au nom du goût français méprisé, contre l'érection... de cet inutile et monstrueux Tour Eiffel... Pour ramener nos arguments à la maison, imaginez un instant une tour vertigineuse et ridicule dominant Paris telle une gigantesque cheminée noire, écrasant sous sa masse barbare Notre Dame, la Tour Saint-Jacques, le Louvre, le Dôme des Invalides. , l'Arc de Triomphe, tous nos monuments humiliés disparaîtront dans ce rêve effroyable. Et pendant vingt ans... nous verrons s'étendre comme une tache d'encre l'ombre odieuse de l'odieuse colonne de tôle boulonnée."
 gaudi.2112.g: "Reporter la construction."
 gaudi.2112.h: "Cette protestation nous encourage à construire la tour encore plus vite !"
 gaudi.2113.t: "Les industriels applaudissent le Titan d’Acier"
 gaudi.2113.d: "La Tour Eiffel, qui ne cesse de s'agrandir, est considérée par les industriels du pays comme un symbole du progrès économique et technique de la France. Ils attendent l’ouverture avec enthousiasme."
 gaudi.2113.f: "L'entrepreneur et archéologue Heinrich Schliemann, qui avait déjà pu gravir la Tour Eiffel avant l'ouverture officielle, a salué le bâtiment dans une lettre à Rudolf Virchow du 24 mai 1889 comme un miracle des compétences d'ingénierie, sans lequel l'Exposition universelle de Paris n'avait pas d'appel. Malgré l’euphorie qui l’a salué comme une auto-représentation nationale réussie et une démonstration de progrès technique, il y a également eu des critiques impitoyables."
 gaudi.2113.g: "Peut-être pouvez-vous aider un peu ?"
 gaudi.2113.h: "Merci à toi!"
 gaudi.2114.t: "Acier inférieur"
 gaudi.2114.d: "L'architecte en chef a vivement critiqué la qualité de la dernière livraison d'acier et l'a fait restituer. Le calendrier de construction de la Tour Eiffel évolue sensiblement."
 gaudi.2114.f: "Jusqu'à 250 personnes ont participé aux travaux de construction, dont environ 150 ont été utilisées pour riveter les éléments sur place. Outre les charpentiers, les ouvriers du bâtiment comprenaient également des ramoneurs, car ils étaient habitués à travailler à de grandes hauteurs. Les quarts de travail duraient neuf heures pendant les mois d'hiver et douze heures pendant les mois d'été. En septembre 1888, il y eut une grève des ouvriers ; trois mois plus tard, ils ont de nouveau arrêté le travail et ont exigé des salaires plus élevés. Gustave Eiffel négocie avec eux et leur installe une cantine dans le premier quai déjà terminé. Il n'y a eu qu'un seul accident mortel pendant toute la durée des travaux. Un ouvrier italien a eu un accident lors de l'installation des ascenseurs après l'ouverture officielle."
 gaudi.2114.g: "Achetez une nouvelle charge d'acier."
 gaudi.2115.t: "Acier de qualité"
 gaudi.2115.d: "L'acier des aciéries voisines de Paris s'est avéré d'une telle qualité lors de la construction de la Tour Eiffel que cela a non seulement accéléré l'efficacité des travaux, mais a également accru la demande d'acier de l'aciérie de la part d'autres clients."
 gaudi.2115.f: "Le 14 août 1888, le deuxième étage est construit et la partie supérieure est en porte-à-faux. Parallèlement, les quais sont équipés. Les différentes pièces, pré-percées en usine, ont été amenées sur place à leur position définitive à l'aide de mandrins coniques sous impact. Au total, 2,5 millions de rivets maintiennent les composants ensemble de la Tour Eiffel. Quatre hommes effectuaient chacun le rivetage. Le premier ouvrier fit estamper le rivet à chaud et le fit briller à l'aide d'une petite forge. Dans un deuxième temps, un autre ouvrier a guidé le rivet jusqu'au trou de perçage. Un troisième a donné forme à la tête de verrouillage. Dans une dernière étape, le boulon a été comprimé."
 gaudi.2115.g: "L'acier français est le meilleur acier."
 gaudi.2116.t: "Un mathématicien prédit l'effondrement"
 gaudi.2116.d: "Après que l'un des mathématiciens les plus respectés de France ait prédit que la Tour Eiffel s'effondrerait à une hauteur d'environ 230 mètres, la panique se répand parmi certains propriétaires."
 gaudi.2116.f: "Un habitant du Champ de Mars a porté plainte contre l'État et la ville de Paris, craignant que la Tour Eiffel ne s'effondre et ne détruise sa maison. Le tribunal n'autorise la poursuite de la construction qu'à la condition que Gustave Eiffel soit responsable de tout dommage. Cela a déclenché un débat fondamental en France et la question se pose de savoir dans quelle mesure la construction et les calculs d'Eiffel sont fiables. Mais les industriels voient dans cette critique un affront à l’idée de progrès en tant que telle."
 gaudi.2116.g: "C'est ridicule."
 gaudi.2116.h: "Eiffel devra payer si la tour s'effondre."
 gaudi_admires_liberty_statue_modifier: "Statue de la Liberté : admire les idéaux américains"
 gaudi_liberty_impressed_modifier: "Statue de la Liberté : impressionnée par Lady Liberty"
 gaudi_america_first_modifier: "Statue de la Liberté : un projet américain"
 gaudi.2201.t: "Une Française au port américain"
 gaudi.2201.d: "A l'initiative de la France, une gigantesque sculpture est en cours de réalisation qui accueillera bientôt tous ceux qui atteindront le Nouveau Monde comme un symbole de liberté."
 gaudi.2201.f: "L'île de Bedloe fut confiée à l'État de New York en 1796, mais en 1800, l'île fut finalement cédée au gouvernement fédéral des États-Unis. Les États-Unis ont décidé de construire des défenses sur Bedloe's Island (ainsi que sur Governor's Island et Ellis Island) pour protéger le port de New York. En juin 1871, le sculpteur Bartholdi se rend à New York. Ses yeux tombèrent sur l'île Bedloe, dans la partie supérieure de la baie de New York. Chaque navire arrivant devait passer par cette île, c'est pourquoi elle semblait appropriée comme emplacement pour une statue."
 gaudi.2201.g: "Nous avons déjà trouvé un endroit digne."
 gaudi.2202.t: "La liberté illumine le monde"
 gaudi.2202.d: "Plusieurs centaines de milliers de personnes ont célébré aujourd'hui l'inauguration de la Statue de la Liberté lors d'un défilé, avec [SCOPE.sCharacter('gaudi_ruler_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('gaudi_ruler_scope').GetLastName] lui-même à la barre. Un comité français est également en charge du défilé nautique, dont la destination est l'île Bedloe."
 gaudi.2202.f: "Pas comme le géant d'airain de la renommée grecque\nAvec des membres conquérants à cheval d'un pays à l'autre\nIci, à nos portes baignées par la mer, se dressera le coucher du soleil\nUne femme puissante avec une torche, dont la flamme\nEst l'éclair emprisonné, et son nom\nMère des Exilés. De sa main phare\nBrille la bienvenue dans le monde entier ; ses yeux doux commandent\nLe port à pont aérien qu'encadrent les villes jumelles.\n\"Gardez, terres anciennes, votre faste légendaire !\" crie-t-elle\nAvec des lèvres silencieuses. \"Donnez-moi vos fatigués, vos pauvres,\nVos masses regroupées aspirant à respirer librement,\nLes misérables déchets de votre rivage grouillant.\nEnvoyez-moi ceux-ci, les sans-abri, ballottés par la tempête :\nJe lève ma lampe près de la porte dorée. \""
 gaudi.2202.g: "C'est le nouveau colosse."
 gaudi.2209.t: "New York perdu !"
 gaudi.2209.d: "Avec la perte de New York, nous avons perdu toute opportunité de continuer à construire la Statue de la Liberté."
 gaudi.2209.f: "Si New York devait être perdue pour une raison quelconque, l'avancement de la construction #R serait perdu dans son ensemble#!. Seuls les États-Unis d'Amérique peuvent continuer à construire la Statue de la Liberté. Les envahisseurs étrangers ne montreront aucun intérêt à le construire."
 gaudi.2209.g: "On ne peut pas leur laisser New York longtemps !"
 gaudi.2211.t: "Ascenseurs"
 gaudi.2211.d: "De nouvelles avancées technologiques dans le domaine de la technologie des ascenseurs ont permis aux travaux de construction de la Statue de la Liberté de progresser plus rapidement que prévu."
 gaudi.2211.f: "« Les surfaces doivent être claires et simples, déterminées par un design audacieux et épuré, accentué aux endroits importants. Il convient d'éviter d'agrandir ou de multiplier les détails. En exagérant les formes pour les rendre plus visibles ou en y ajoutant des détails, on détruirait les proportions de l'œuvre. Enfin, le modèle, comme le dessin, doit avoir un caractère résumé, comme c'est le cas pour une ébauche rapide. Il faut que ce personnage soit le produit de la volonté et de l'observation, et que l'artiste, par la concentration de ses connaissances, retrouve la forme et la ligne dans leur plus grande simplicité. -Frédéric-Auguste Bartholdi"
 gaudi.2211.g: "Super!"
 gaudi.2213.t: "Les intellectuels impressionnés"
 gaudi.2213.d: "L’élite intellectuelle salue le projet de construction en cours à New York, qui incarne pleinement l’esprit démocratique et libéral des États-Unis. Les artistes se sentent inspirés pour écrire des poèmes et des compositions."
 gaudi.2213.f: "'Toi, gardien de la porte ouest, au-dessus de la baie de Manhattan,\nLes brouillards de doute qui cachaient ton visage sont chassés :\nTes yeux regardent enfin loin et clair, tu lèves haut ta main\nPour répandre la lumière du monde de la liberté- large pour chaque pays.'' -Henry van Dyke"
 gaudi.2213.g: "Peut-être qu'ils pourraient faire de la publicité ?"
 gaudi.2214.t: "Un projet américain ou français ?"
 gaudi.2214.d: "Plus la construction de la Statue de la Liberté avance et plus la base sur l'île au large de Manhattan s'élève, plus certains hommes politiques se demandent quel pays est réellement à l'origine du projet."
 gaudi.2214.f: "\"Nous ne sommes pas ici aujourd'hui pour nous incliner devant la représentation d'un dieu guerrier féroce, rempli de colère et de vengeance, mais nous contemplons avec joie notre propre divinité veillant et protégeant devant les portes ouvertes de l'Amérique et plus grande que tout ce qui a été célébré. dans une chanson ancienne. Au lieu de saisir dans sa main les éclairs de terreur et de mort, elle brandit en l’air la lumière qui éclaire le chemin de l’affranchissement de l’homme. Nous n’oublierons pas que la Liberté a élu domicile ici et que l’autel qu’elle a choisi ne sera pas négligé. Des fidèles volontaires entretiendront constamment ses feux et ceux-ci brilleront sur les rives de notre République sœur, et, joints aux rayons de réponse, un courant de lumière percera les ténèbres de l'ignorance et de l'oppression de l'homme, jusqu'à ce que la Liberté éclaire le monde. -Groover Cleveland"
 gaudi.2214.g: "Il s'agit d'un projet américain."
 gaudi.2214.h: "Il s'agit d'un projet franco-américain."
 gaudi.2214.i: "C'est un projet français."
 gaudi.2215.t: "Acier de qualité"
 gaudi.2215.d: "L'acier provenant des aciéries voisines de New York s'est avéré d'une telle qualité lors de la construction de la Statue de la Liberté que cela a non seulement accéléré l'efficacité des travaux, mais a également accru la demande d'acier provenant de l'aciérie provenant d'autres pays. clients."
 gaudi.2215.f: "«J'ai vu la Statue de la Liberté. Et je me suis dit : Madame, vous êtes si belle ! Vous avez ouvert les bras et vous avez attiré tous les étrangers ici. Donnez-moi une chance de prouver que j'en vaux la peine, de faire quelque chose, d'être quelqu'un en Amérique. Et cette statue était toujours dans mon esprit."
 gaudi.2215.g: "L'acier américain est le meilleur acier."
 gaudi.2216.t: "Le parti gouvernemental soutient Lady Liberty"
 gaudi.2216.d: "[SCOPE.sCharacter('gaudi_liberty_leader').GetFullName] est connu comme un ardent défenseur de la Statue de la Liberté. Il a déjà su rallier au projet plusieurs personnalités importantes de son entourage et a récolté des dons."
 gaudi.2216.f: "Bartholdi avait prévu d'installer des projecteurs sur le balcon de la torche recouverte de feuilles d'or pour l'éclairer. Une semaine avant l'inauguration, le Corps des ingénieurs de l'armée a rejeté la proposition, craignant qu'elle n'aveugle les pilotes des navires qui passent. Au lieu de cela, Bartholdi a fait découper des hublots dans la torche et logé les phares à l’intérieur."
 gaudi.2216.g: "Demandez un autre don."
 gaudi.2216.h: "Louez-le en public !"
 gaudi.2217.t: "Accident de chantier"
 gaudi.2217.d: "Lors d'un accident sur le chantier de construction de la Statue de la Liberté, plusieurs personnes ont été blessées et une partie a été détruite."
 gaudi.2217.f: "« Vous avez installé dans le port de New York une idole monstrueuse que vous appelez Liberty. Il ne reste plus qu'à achever ce monument, à mettre sur son piédestal l'inscription écrite par Dante sur la porte de l'enfer : Abandonnez tout espoir, vous qui entrez ici. -George Bernard Shaw"
 gaudi.2217.g: "L'acier américain est le meilleur acier - je pensais..."
 gaudi.2218.t: "Combien coûte Liberté ?"
 gaudi.2218.d: "[SCOPE.sCharacter('gaudi_opposition_leader').GetFullName] est considéré comme une critique décisive de la construction d'une Statue de la Liberté. L’argent qui serait collecté pourrait être investi dans des projets bien meilleurs."
 gaudi.2218.f: "Le comité américain a rencontré de grandes difficultés pour récolter les dons. La Statue de la Liberté n'était pas le seul projet à souffrir d'un manque de financement ; Par exemple, les travaux sur le Washington Monument ont duré trois décennies et demie, avec plusieurs interruptions. La statue de Bartholdi a été critiquée et le fait que les Américains aient dû payer pour le piédestal de ce cadeau a été critiqué. L’opinion dominante était également que les œuvres d’art publiques devaient être conçues par des Américains. Le magazine Harper's Weekly a déclaré que Bartholdi aurait pu faire don à la fois de la statue et de la base, et le New York Times a noté : « Aucun véritable patriote ne peut compter de telles dépenses pour les femmes de bronze dans l'état actuel de nos finances. »"
 gaudi.2218.g: "Mais ce projet est très important !"
 gaudi.2218.h: "Il y a peut-être des choses plus importantes..."
 gaudi.2301.t: "Cicatrisation des plaies à Londres"
 gaudi.2301.d: "Les Londoniens sont encore sous le choc lorsque l’ancien palais de Westminster a pris feu. L'incendie a laissé une cicatrice sur les rives de la Tamise, là où battait le cœur politique britannique. Les travaux de construction ont commencé par une cérémonie solennelle pour enfin refermer cette blessure."
 gaudi.2301.f: "Immédiatement après l'incendie, le roi Guillaume IV offrit au Parlement le palais de Buckingham, presque achevé, dans l'espoir de se débarrasser d'une résidence qui ne lui plaisait pas. Le bâtiment a cependant été jugé impropre à un usage parlementaire et le cadeau a été rejeté. La promotion d’un design néoclassique était populaire. Decimus Burton a créé le projet d'un nouveau Parlement néoclassique. Contrairement au style néo-gothique, ils ont loué ceux qui avaient construit la cathédrale Saint-Paul, à la satisfaction d'une postérité applaudie, dans le style le plus beau et le plus universel de l'architecture romaine. Augustus W. N. Pugin, le plus grand expert du gothique, a dû soumettre chacun de ses projets par l'intermédiaire, et donc au nom, d'autres architectes, James Gillespie Graham et Charles Barry, parce qu'il s'était récemment converti ouvertement et avec ferveur au catholicisme romain. Le projet pour le Parlement que Pugin a soumis par l'intermédiaire de Barry a remporté le concours."
 gaudi.2301.g: "Et j’espérais que nous pourrions laisser les politiciens vivre dans la rue."
 gaudi.2302.t: "Les Chambres terminées"
 gaudi.2302.d: "Avec l'achèvement de la Chambre des Lords et de la Chambre des Communes, le Parlement pourra reprendre ses opérations habituelles dans le nouveau Palais de Westminster. Il faudra cependant des années avant que le bâtiment soit terminé."
 gaudi.2302.f: "La Chambre des Lords a été achevée en 1847 et la Chambre des Communes en 1852 (date à laquelle Barry a reçu le titre de chevalier). Bien que la plupart des travaux aient été réalisés en 1860, à la mort de Charles Barry, la construction ne fut terminée qu'une décennie plus tard, sous la supervision de son fils Edward Middleton Barry."
 gaudi.2302.g: "Nous faisons des progrès décents, n'est-ce pas ?"
 gaudi.2303.t: "Grand Ben"
 gaudi.2303.d: "Dans la deuxième phase de construction, la décoration intérieure du bâtiment du Parlement et l'installation des énormes cloches sur la tour de l'horloge sont en cours."
 gaudi.2303.f: "Dans le cadre d'un processus supervisé par une Commission royale des beaux-arts sous la présidence de Prince Albert, un comité spécial comprenant Sir Robert Peel a commencé à recueillir les témoignages d'experts en 1841. Ces experts comprenaient Sir Martin Archer Shee, P.R.A., et Charles Lock Eastlake, peintre et autorité reconnue en histoire de l'art, bientôt premier directeur de la National Gallery et administrateur de facto de l'ensemble du projet de décoration de Westminster. Il fut décidé qu'il fallait saisir l'occasion pour encourager le développement d'une école nationale britannique de peinture d'histoire et que les peintures seraient réalisées à fresque."
 gaudi.2303.g: "Qu'est-ce que c'est que toute cette agitation autour d'une simple tour d'horloge ?"
 gaudi.2304.t: "Le palais de Westminster restauré"
 gaudi.2304.d: "Le nouveau Parlement britannique s'élève fièrement au-dessus des rives de la Tamise et dessine la silhouette de la ville. Le tintement des cloches de la tour de l'horloge est devenu un élément déterminant de la vie londonienne et accompagne les habitants d'heure en heure. C’est déjà devenu un point de repère pour tout le pays."
 gaudi.2304.f: "'Alors, lors de la prochaine heure des questions, vous voulez que je dise au Parlement que c'est de leur faute si la fonction publique est trop grande ?'\n'Mais c'est la vérité, Monsieur le Ministre.'\n'Je ne veux pas que vérité! Je veux quelque chose que je puisse dire au Parlement ! Humphrey, tu es mon secrétaire permanent, tu es censé mettre en œuvre mes politiques. Pourtant, je ne comprends toujours pas pourquoi vous semblez implacablement opposé à eux. Je dois savoir où vous en êtes dans tout cela.'\n'La position d'une personne, Monsieur le Ministre, dépend de sa position.'"
 gaudi.2304.g: "Ding-dong ding-dong, ding-dong ding-dong."
 gaudi.2309.t: "Londres perdue !"
 gaudi.2309.d: "Avec la perte de Londres, nous avons perdu toute opportunité de poursuivre la construction du palais de Westminster."
 gaudi.2309.f: "Si Londres devait être perdue pour une raison quelconque, l'avancement de la construction #R serait perdu dans son ensemble#!. Seule la Grande-Bretagne peut continuer à construire le palais de Westminster. Les envahisseurs étrangers ne montreront aucun intérêt à le construire."
 gaudi.2309.g: "On ne peut pas leur laisser Londres longtemps !"
 gaudi_ben_decoration_modifier: "Décorations du palais de Westminster"
 gaudi_praised_by_parliament_modifier: "Salué par le Parlement"
 gaudi_ben_decoration_tt: "Le Palais de Westminster sera plus prestigieux une fois terminé."
 gaudi.2311.t: "Mauvais calcaire"
 gaudi.2311.d: "La dernière livraison de matériel pour le Palais de Westminster s'est avérée médiocre."
 gaudi.2311.f: "L'espace d'un instant, l'activité habituelle sur le chantier, où le Parlement grandissait chaque jour, s'est calmée. Un bref inventaire réalisé par l'architecte a révélé que la pierre calcaire n'était pas de la qualité habituelle et a annoncé qu'il préférait attendre avant que le projet ne soit compromis. Cependant, certaines voix s'élèvent dans la direction de la construction selon lesquelles le calcaire devrait toujours être utilisé."
 gaudi.2311.g: "Nous apprécions le travail de qualité britannique."
 gaudi.2311.h: "Nous avons un planning à respecter !"
 gaudi.2312.t: "Catastrophe!"
 gaudi.2312.f: "Peut-être aurait-on dû écouter l'architecte. Ce n’était peut-être pas une bonne idée d’utiliser du calcaire en ruine pour un monument aussi important que le palais de Westminster. Peut-être aurait-on donc dû réfléchir à deux fois à cette décision. Mais trop tard : les matériaux de qualité inférieure ont fait des ravages aujourd'hui, entraînant l'effondrement d'un mur et détruisant une grande partie des travaux de construction des derniers semaines et mois, lorsqu'une façade s'est effondrée."
 gaudi.2313.t: "Une nouvelle machine"
 gaudi.2313.d: "L'industrie automobile de notre pays a récemment équipé le chantier de construction du Palais de Westminster d'une machine très moderne qui fait avancer les travaux."
 gaudi.2313.f: "\"C'est bien d'avoir des locomotives !\""
 gaudi.2313.g: "C'est un progrès !"
 gaudi.2314.t: "Palais de Westminster : de bons progrès"
 gaudi.2314.d: "La construction du Parlement progresse étonnamment rapidement. Selon l'état actuel, la construction pourrait être achevée plus tôt."
 gaudi.2314.f: "Pour des raisons inconnues, la construction du Palais de Westminster avance mieux : qu'il s'agisse de l'amour de la patrie, des salaires élevés, du soutien amical des élites locales ou simplement du meilleur temps."
 gaudi.2314.g: "Merveilleux."
 gaudi.2315.t: "Palais de Westminster : des progrès lents"
 gaudi.2315.d: "Malheureusement, la direction de la construction de Londres a dû admettre aujourd'hui que la construction du Parlement est en retard et prend plus de temps que prévu."
 gaudi.2315.f: "Pour des raisons inconnues, la construction du Palais de Westminster progresse plus lentement : qu'il s'agisse d'une agitation provoquée par des éléments politiques hostiles, d'une atteinte à l'éthique du travail par les syndicats, d'une conspiration jésuite ou simplement du mauvais temps."
 gaudi.2315.g: "Regrettable."
 gaudi.2316.t: "Le [SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle] fait une visite"
 gaudi.2316.d: "[SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('gaudi_ruler').GetFullName] a décidé de se rendre personnellement sur le chantier de construction du Palais de Westminster."
 gaudi.2316.f: "Notre monarque [SCOPE.sCharacter('gaudi_ruler').GetFullName] a déjà montré par le passé beaucoup d'intérêt pour ce qui se passe sur le chantier de construction de Londres et a désormais l'intention de visiter le chantier. Les préparatifs battent leur plein - et bien sûr, ils veulent offrir quelque chose à Sa Majesté ! De simples ouvriers du bâtiment, la direction de la construction et l'architecte en chef ont donc fixé après l'annonce une vitesse de corde jusqu'alors inconnue."
 gaudi.2316.g: "Sa Majesté sait motiver."
 gaudi.2317.t: "Temps orageux"
 gaudi.2317.d: "Une tempête a retardé nos travaux de construction à Londres de plusieurs semaines."
 gaudi.2317.f: "Un orage a frappé Londres hier soir. Le vent a arraché les bâches et renversé les échafaudages, endommageant les fenêtres, les personnages et le toit."
 gaudi.2317.g: "J'aurais préféré une comète."
 gaudi.2318.t: "Décorations du Palais de Westminster"
 gaudi.2318.d: "Il y a actuellement un débat qui domine la politique et la direction des chantiers sur la mesure dans laquelle le nouveau bâtiment du Parlement doit être équipé. Un architecte d'intérieur a suggéré un décor riche pour orner le palais de Westminster, mais certains craignent que cela n'ait un impact significatif sur l'achèvement du bâtiment."
 gaudi.2318.f: "Suite à la destruction par un incendie du Palais de Westminster en 1834, Augustus Pugin fut employé par Sir Charles Barry pour fournir des aménagements intérieurs pour sa candidature au concours d'architecture qui déterminerait qui construirait le nouveau Palais de Westminster. Les commissaires nommèrent ensuite Pugin pour aider à la construction de l'intérieur du nouveau palais, dont Pugin lui-même avait été le principal déterminant. À la fin de la vie de Pugin, en février 1852, Barry lui rendit visite à Ramsgate et Pugin lui fournit une conception détaillée de la tour de l'horloge emblématique du palais. La conception est très proche des conceptions antérieures de Pugin, y compris un projet non construit pour Scarisbrick Hall, dans le Lancashire. La tour fut la dernière conception de Pugin avant de sombrer dans la folie."
 gaudi.2318.g: "Cela prendra peut-être plus de temps, mais le Parlement britannique devrait être aussi opulent que possible."
 gaudi.2318.h: "Et après? Des housses de chaise en feuille d'or ?"
 gaudi.2319.t: "Soutien au nouveau Parlement"
 gaudi.2319.d: "[SCOPE.sCharacter('gaudi_ben_leader').GetFullName] est connu comme un ardent partisan de la construction d'un nouveau palais opulent de Westminster. Il a déjà pu rallier au projet plusieurs personnalités importantes de son entourage et a collecté des dons supplémentaires."
 gaudi.2319.f: "La construction du nouveau Palais débuta en 1840. Alors que Barry estimait un temps de construction à six ans, pour un coût estimé à @money ! 724 986, le projet a en fait pris plus de 30 ans, pour un coût de plus de @money ! 2 millions."
 gaudi.2319.g: "Demandez un autre don."
 gaudi.2319.h: "Louez-le en public !"
