 gaudi.74.t: "A New Vision in Stone"
 gaudi.74.d: "A bold new architect draws the eye of both clergy and the crown. His name is Alessandro Antonelli."
 gaudi.74.f: "'Born in 1798 in Ghemme, Piedmont, Alessandro Antonelli was long considered a promising but untested figure among Italy's architectural circles. That perception changed with his radical interventions in the Cathedral of Novara. Tasked with designing the new neoclassical altar, Antonelli presented a bold synthesis of classical geometry and soaring verticality that divided opinion—yet left no one indifferent. While some critics found his designs excessive, others saw in him a spirit worthy of the Italian Renaissance.\n\nAs his reputation rises, questions emerge about his future commissions, and whether he will be the man to reshape the skylines of the Kingdom."
 gaudi.74.g: "Antonelli is to become Sardinia's new chief architect."
 gaudi.74.h: "Give him a chair at an academy."
