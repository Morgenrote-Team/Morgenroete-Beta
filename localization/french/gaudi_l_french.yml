 gaudi.35.t: "Quartier Art nouveau en [SCOPE.sState('gaudi_art_nouveau_quarter_state').GetCityHubName]"
 gaudi.35.d: "Le nouveau développement artistique ne s'est pas arrêté à [SCOPE.sState('gaudi_art_nouveau_quarter_state').GetCityHubName]: de nouveaux bâtiments Art Nouveau sont construits dans un quartier qui est maintenant considéré comme un quartier d'avant-garde."
 gaudi.35.f: "Les débuts de l'architecture Art nouveau à Bruxelles s'accompagnent d'une vague d'art décoratif dans le nouveau style. Parmi les artistes importants, citons Gustave Strauven, qui utilise le fer forgé pour créer des effets baroques sur les façades bruxelloises, le créateur de meubles Gustave Serrurier-Bovy, connu pour ses chaises très originales et ses meubles métalliques articulés, et le créateur de bijoux Philippe Wolfers, qui crée des bijoux en forme de libellules, de papillons, de cygnes et de serpents. Le style est rapidement remarqué en France voisine. Après avoir visité l'Hôtel Tassel de Horta, Hector Guimard construit le Castel Béranger, l'un des premiers bâtiments parisiens de ce nouveau style. Les Parisiens accueillent favorablement le style original et pittoresque de Guimard ; le Castel Béranger est choisi comme l'une des meilleures nouvelles façades de Paris, ce qui lance la carrière de Guimard. L'Exposition universelle de Paris en 1900 marque l'apogée de l'Art nouveau. D'avril à novembre 1900, elle attire près de cinquante millions de visiteurs du monde entier et présente l'architecture, le design, la verrerie, le mobilier et les objets décoratifs de ce style. Si l'Exposition de Paris est de loin la plus importante, d'autres expositions ont largement contribué à populariser le style."
 gaudi.35.g: "Une nouvelle culture dynamique."
 gaudi.22.t: "Lignes et mesures"
 gaudi.22.d: "Notre architecte revient, cette fois avec un bâton de géomètre à la main et un nouveau regard sur le terrain."
 gaudi.22.f: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] se contentait autrefois d'esquisser des façades sur les places des villes, de tracer des ombres et des ornements. Aujourd'hui, [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] trace des lignes dans la terre. Au cours des voyages de [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis], [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] a abandonné les villes pour l'arrière-pays. Dans les régions sauvages de Galice, dans les marais du delta du Pô et à travers les voies ferrées des Midlands, [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] a marché avec des ingénieurs, des agriculteurs et des contremaîtres. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] a appris à lire le terrain comme d'autres lisent les écritures. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] Il peut vous dire où l'eau va couler, où l'argile va se déplacer, où une fondation va se fissurer dans cinq hivers.[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] parle maintenant de pentes et de points géodésiques. Les carnets de notes de [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U] ne sont pas remplis de fioritures, mais d'angles, de hauteurs et de distances mesurées au centimètre près. Certains disent que [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe]'est devenue sèche, trop exigeante, trop rigide. Mais lorsque [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] regarde un champ vide, [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] voit déjà où les avenues pourraient se dérouler."
 gaudi.22.g: "Une construction commence bien avant la pose de la première pierre."
 gaudi.23.t: "L'architecte qui compte"
 gaudi.23.d: "Après deux ans d'études, notre architecte revient -[ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] l'esprit plus vif, [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] les dessins plus étranges."
 gaudi.23.f: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] autrefois dessiné par instinct. Aujourd'hui, [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] dessine par la logique.[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] a passé [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] temps non pas parmi les maçons ou les constructeurs, mais dans les amphithéâtres. Paris, Göttingen, et même Saint-Pétersbourg. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] s'est assis sous des tableaux remplis de symboles, a étudié sous la direction d'hommes qui ne construisaient rien avec leurs mains, mais tout avec leur esprit. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] parle maintenant de symétrie, de module, de courbes de charge décrites par d'élégantes formules. [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U] les nouveaux plans sont austères, étranges, presque étrangers dans leur précision. Pour certains, ils semblent froids, inhumains. Mais [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] explique alors que la beauté d'un dôme ne réside pas dans sa décoration, mais dans la perfection de sa courbe.\NLes fonctionnaires ne savent pas quoi faire de [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHim]. [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U] Les collègues murmurent qu'il n'est pas pratique. Mais d'autres - en particulier les jeunes - écoutent."
 gaudi.23.g: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] construit ce que les autres ne font qu'imaginer."
 gaudi.24.t: "Le papier avant la pierre"
 gaudi.24.d: "Notre architecte ne revient pas avec des outils ou des équations, mais avec des tampons, des signatures et un réseau de fonctionnaires."
 gaudi.24.f: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] ne se bat plus sur la planche à dessin. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] glisse désormais dans les bureaux.\n- En deux ans à l'étranger, [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] n'a pas seulement étudié l'architecture -[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] a étudié l'administration. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] a appris comment un projet vit ou meurt, non pas en fonction de la conception, mais par décret. À Vienne, [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] a observé les ministères au travail ; à Bruxelles, [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] a suivi les fonctionnaires chargés des permis ; à Marseille, [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] a assisté à des réunions du conseil municipal au cours desquelles les égouts décidaient de la ligne d'horizon.\NMaintenant, de retour chez lui, [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] sait quels documents soumettre à quel moment, quelle réglementation citer, qui flatter et qui ignorer. Selon [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe], les règles ne sont pas des murs mais des échafaudages : elles peuvent être déplacées, adoucies, recadrées. Et d'une manière ou d'une autre, les permis arrivent plus vite que jamais."
 gaudi.24.g: "Toute grande structure commence par un formulaire signé."
 gaudi.25.t: "L'architecte revient... éventuellement"
 gaudi.25.d: "Notre architecte est enfin rentré de sa grande tournée [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis]. Personne ne sait exactement ce que [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] ramène - sauf des histoires."
 gaudi.25.f: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] Les membres de l'équipe sont partis avec des carnets de croquis. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] revient avec des cigarillos et des anecdotes. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] a des noms à donner, des opinions à donner et des dettes dont [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] fait semblant de ne pas se souvenir.\n-[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] parle magnifiquement, et même de manière convaincante, de structures que [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] n'a jamais mesurées. Lorsqu'on lui demande des plans, [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] change de sujet. Lorsqu'on lui demande des résultats, [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] sourit et assure qu'il ne faut pas précipiter les choses.\nCertains disent que [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] est un imposteur. D'autres qualifient [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHim] de génie incompris. La vérité ? Probablement quelque part entre un café à Trieste et un train manqué à Naples."
 gaudi.25.g: "Qu'est-ce que [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] a fait pendant tout ce temps ?"
 gaudi.26.t: "Dans l'ombre d'un maître"
 gaudi.26.d: "Notre architecte revient, plus sage, plus stable et portant la marque d'un grand maître."
 gaudi.26.f: "Alors que d'autres ont beaucoup voyagé, [ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] a préféré la profondeur à la distance. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] a passé la plupart de ses années sous la direction d'une seule personne - un architecte vieillissant à la réputation légendaire. Non seulement dans les amphithéâtres, mais aussi sur les échafaudages et dans le silence, [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] a appris à voir la structure derrière l'ornement, l'intention derrière la façade. [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U] les lignes sont devenues plus nettes. [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U] le regard plus critique. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] a appris non seulement comment construire, mais aussi pourquoi. La nouvelle du mentorat de [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] s'est répandue avant [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHim]. De jeunes apprentis cherchent déjà [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHim], et les fonctionnaires de la ville l'accueillent avec une déférence inattendue. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] revient comme quelqu'un marqué par la continuité, la tradition, et peut-être - un jour - par l'héritage."
 gaudi.26.g: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] porte le poids de la sagesse d'un autre homme"
 je_gaudi_study_trip: "Voyage d'étude d'un architecte"
 je_gaudi_study_trip_reason: "Notre architecte, [ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName], est actuellement en voyage pour visiter des sites architecturaux, des académies et rencontrer d'autres artistes. Nous ne pourrons pas le contacter avant deux ans."
 je_gaudi_study_trip_success: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] revient après deux ans."
 je_gaudi_study_trip_result: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] gagnera de l'expérience et (dans la plupart des cas) un nouveau trait."
