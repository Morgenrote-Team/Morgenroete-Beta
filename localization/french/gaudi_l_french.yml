 je_gaudi_secession_1: "La première sécession Art Nouveau"
 je_gaudi_secession_1_reason: "Le nouveau mouvement artistique de l'Art Nouveau a attiré de nombreux artistes. Cela peut, sous certaines conditions, donner naissance à un mouvement artistique établi, jouissant d'une renommée internationale et donnant un nouvel élan à la peinture et à l'architecture. Historiquement, l'une des associations les plus importantes de ce type était la Sécession viennoise. La Sécession viennoise, plus précisément l'Association des artistes autrichiens, est une association d'artistes viennois de la période fin de siècle. Dérivée de cela, la variante viennoise de l'Art Nouveau est également appelée style Sécession ou Art Nouveau Viennois."
 je_gaudi_secession_2: "La deuxième sécession Art Nouveau"
 je_gaudi_secession_2_reason: "Le nouveau mouvement artistique de l'Art Nouveau a attiré de nombreux artistes. Cela peut, sous certaines conditions, donner naissance à un mouvement artistique établi, jouissant d'une renommée internationale et donnant un nouvel élan à la peinture et à l'architecture. Historiquement, l'une des associations les plus importantes de ce type était la Sécession viennoise. La Sécession viennoise, plus précisément l'Association des artistes autrichiens, est une association d'artistes viennois de la période fin de siècle. Dérivée de cela, la variante viennoise de l'Art Nouveau est également appelée style Sécession ou Art Nouveau Viennois."
 je_gaudi_secession_3: "La troisième sécession Art Nouveau"
 je_gaudi_secession_3_reason: "Le nouveau mouvement artistique de l'Art Nouveau a attiré de nombreux artistes. Cela peut, sous certaines conditions, donner naissance à un mouvement artistique établi, jouissant d'une renommée internationale et donnant un nouvel élan à la peinture et à l'architecture. Historiquement, l'une des associations les plus importantes de ce type était la Sécession viennoise. La Sécession viennoise, plus précisément l'Association des artistes autrichiens, est une association d'artistes viennois de la période fin de siècle. Dérivée de cela, la variante viennoise de l'Art Nouveau est également appelée style Sécession ou Art Nouveau Viennois."
 je_gaudi_splendid_architecture: "Splendide nouvelle architecture"
 je_gaudi_splendid_architecture_reason: "Avec l'introduction de l'Art Nouveau et de l'Art Déco, les architectes ont révolutionné le monde de l'art, par exemple en rompant avec l'historicisme rigide du passé. Mais contrairement à de nombreuses écoles modernes, leurs bâtiments n’exprimaient pas simplement la fonctionnalité et l’objectivité. L'Art Déco est un développement au milieu de l'éveil général du modernisme classique, dans lequel la combinaison créative de l'élégance des formes, de la préciosité des matériaux, de la force des couleurs et de la sensualité du sujet était au premier plan. À son apogée, il représentait le luxe, le glamour, l’exubérance et la foi dans le progrès social et technologique. Une architecture qui respecte ces principes ferait de notre nation un modèle de modernité et de richesse."
 je_gaudi_splendid_architecture_goal: "#E Splendide Architecture#! atteint #BLUE 10#! points. Pour le moment, nous avons #G [ROOT.Var('gaudi_splendid_architecture').GetValue]#! @gaudi_architectural_splendor ! points. Construire des quartiers Art Nouveau, des cinémas Art Déco, des gratte-ciel Art Déco, des bureaux Art Déco et des aéroports Art Déco via Journal Entry vous donnera plus de points."
 je_gaudi_art_nouveau_quarter: "Quartier Art Nouveau"
 je_gaudi_art_nouveau_quarter_reason: "Les premières maisons et décorations intérieures Art Nouveau apparaissent à Bruxelles dans les années 1890, dans l'architecture et l'aménagement intérieur des maisons conçues par Paul Hankar, Henry van de Velde et surtout Victor Horta, dont l'Hôtel Tassel est achevé en 1893. Il s'installe rapidement à Bruxelles. Paris, où il a été adapté par Hector Guimard, qui a vu le travail de Horta à Bruxelles et a appliqué le style aux entrées du nouveau métro parisien. De la Belgique à la France, l'Art nouveau s'est répandu dans le reste de l'Europe, prenant des noms et des caractéristiques différents selon les pays. Elle apparaît souvent non seulement dans les capitales, mais aussi dans les villes en croissance rapide qui souhaitent établir des identités artistiques (Turin et Palerme en Italie ; Glasgow en Écosse ; Munich et Darmstadt en Allemagne) ainsi que dans les centres de mouvements indépendantistes (Helsinki en Finlande, alors partie de l'Empire russe ; Barcelone en Catalogne, Espagne)."
 je_gaudi_art_deco_cinema: "Cinéma Art Déco"
 je_gaudi_art_deco_cinema_reason: "La plupart des meilleurs exemples survivants de l’Art déco sont des cinémas construits dans les années 1920 et 1930. La période Art déco a coïncidé avec la conversion des films muets en films sonores, et les sociétés cinématographiques ont construit de grandes destinations d'affichage dans les grandes villes pour capter l'immense public venu voir des films. Les palais de cinéma des années 1920 combinaient souvent des thèmes exotiques avec un style art déco ; Le Théâtre égyptien de Grauman à Hollywood (1922) s'est inspiré des tombeaux et pyramides égyptiennes antiques, tandis que le Théâtre Fox de Bakersfield, en Californie, a attaché une tour de style Mission californienne à une salle Art déco."
 je_gaudi_art_deco_skyscraper: "Gratte-ciel Art Déco"
 je_gaudi_art_deco_skyscraper_reason: "Les gratte-ciel sont les clochers du présent. Mais qu’est-ce qu’un clocher sans un carillon distinctif ? Affiner un gratte-ciel dans le style Art Déco serait une entreprise prestigieuse qui susciterait l’admiration du monde entier."
 je_gaudi_art_deco_airport: "Aéroport Art Déco"
 je_gaudi_art_deco_airport_reason: "Autrefois, les caravelles ouvraient les océans aux Européens et reliaient les continents du monde connu au Nouveau. Maintenant que l’ère de l’aviation est arrivée, des frontières auparavant fixes s’ouvrent. Quel style plus approprié que l'art déco luxueux et prometteur pour accueillir les ports des nouveaux navires volants ? Aviateurs, dites bonjour au soleil !"
 je_gaudi_art_deco_office: "Bureau Art Déco"
 je_gaudi_art_deco_office_reason: "Le style Art déco dominait le monde commercial et l'industrie du divertissement, mais les gouvernements respectifs voulaient également impressionner avec des bâtiments modernes qui soulignaient la prospérité du pays et donnaient à leur propre population le sentiment de vivre dans une nation en devenir."
 je_gaudi_bauhaus: "Bauhaus"
 je_gaudi_bauhaus_reason: "Le Bauhaus était une école d'art allemande opérationnelle de 1919 à 1933 qui combinait l'artisanat et les beaux-arts. L'école est devenue célèbre pour son approche du design, qui tentait d'unifier la vision artistique individuelle avec les principes de la production de masse et l'accent mis sur la fonction. Il reposait sur l’idée de créer un Gesamtkunstwerk (œuvre d’art globale) dans lequel tous les arts seraient éventuellement réunis. Le style Bauhaus est devenu plus tard l’un des courants les plus influents du design moderne, de l’architecture moderniste et de l’enseignement de l’architecture."
 je_gaudi_summer_burn: "Incendie du Palais d'été"
 je_gaudi_summer_burn_reason: "Le Palais d'Été est le véritable siège de la famille impériale de la dynastie Qing depuis la première moitié du XVIIIe siècle. C'est le symbole de la grandeur et de la grandeur de la Chine. Une destruction signifiait non seulement une humiliation considérable pour l'ennemi, mais ouvrait également la possibilité d'obtenir un butin précieux..."
 je_gaudi_summer_burn_success: "Occuper toute la région de la capitale #T Pékin#!."
 je_gaudi_ben_burn: "Big Ben en feu"
 je_gaudi_ben_burn_reason: "Après l’incendie du Parlement de Westminster, la Grande-Bretagne a construit un nouveau bâtiment parlementaire emblématique qui souligne la revendication de l’Empire. Peut-être est-il temps de ramener la fierté britannique sur terre avec un autre feu ?"
 je_gaudi_ben_burn_success: "Occuper toute la région de la capitale #T Pays d'origine#!."
 je_gaudi_dombau_phase_1: "Cathédrale de Cologne : reprise des travaux"
 je_gaudi_dombau_phase_1_reason: "La cathédrale de Cologne est considérée comme la cathédrale gothique la plus parfaite au monde. La construction commença au XIIIe siècle et prit des proportions colossales. Après l'achèvement du chœur, les travaux s'arrêtèrent jusqu'à ce qu'ils soient complètement arrêtés au cours du XVe siècle. Aujourd'hui encore, la grue de construction de la fin du Moyen Âge domine toujours la tour sud, à moitié achevée. Avec la renaissance du sentiment national et romantique dans la bourgeoisie allemande et surtout après la redécouverte des plans de construction originaux et leur diffusion, la conviction grandit que l'achèvement de la cathédrale n'est pas seulement un projet pour la gloire de Dieu, mais aussi un symbole de la culture allemande et de l'unité de la nation allemande."
 je_gaudi_dombau_phase_1_goal: "#E La progression de la construction#! atteint #BLUE 120#! points. Pour le moment, nous avons #G [GetGlobalVariable('gaudi_dombau_progress').GetValue]#! points. Normalement, nous obtenons un point chaque mois."
 je_gaudi_dombau_phase_2: "Cathédrale de Cologne : façade sud"
 je_gaudi_dombau_phase_2_reason: "Après plusieurs années de travaux de construction, les architectes se sont retrouvés confrontés à la construction et à la décoration de la façade sud de la cathédrale. Avec sa riche décoration figurative, elle est non seulement considérée comme le summum de la sculpture allemande, mais simplement comme l'une des œuvres principales de l'architecture néo-gothique. La façade à elle seule a nécessité treize ans de construction, et dix-huit ans de finition et de décoration."
 je_gaudi_dombau_phase_2_goal: "#E La progression de la construction#! atteint #BLUE 120#! points. Pour le moment, nous avons #G [GetGlobalVariable('gaudi_dombau_progress').GetValue]#! points. Normalement, nous obtenons un point chaque mois."
 je_gaudi_dombau_phase_3: "Cathédrale de Cologne : structure du toit"
 je_gaudi_dombau_phase_3_reason: "La conception de la cathédrale de Cologne, basée sur l'idéal gothique, n'a pas empêché les maîtres d'œuvre d'utiliser les matériaux de construction les plus modernes de l'époque. La structure du toit était en fer, ce qui en faisait la plus grande structure fer-acier au monde jusqu'à la construction de la Tour Eiffel. Grâce à cette décision, la construction a survécu même face aux bombardements alliés pendant la Seconde Guerre mondiale."
 je_gaudi_dombau_phase_3_goal: "#E La progression de la construction#! atteint #BLUE 120#! points. Pour le moment, nous avons #G [GetGlobalVariable('gaudi_dombau_progress').GetValue]#! points. Normalement, nous obtenons un point chaque mois."
 je_gaudi_dombau_phase_4: "Cathédrale de Cologne : façade ouest et tours"
 je_gaudi_dombau_phase_4_reason: "La façade ouest de la cathédrale est la plus grande façade d'église jamais construite. Il suit en détail le plan médiéval développé par le maître d'œuvre Michael von Savoyen, qui a été enregistré en 1370 dans le plan de façade F. La silhouette de la cathédrale de Cologne est caractéristique de la façade à deux tours avec les deux flèches imposantes. Maître Michael avait conçu une flèche octogonale entièrement ajourée à entrelacs, couronnée par un fleuron à plusieurs niveaux. Avec ces solutions, qui exploraient les limites de ce qui est techniquement possible, les architectes gothiques ont voulu souligner que le bâtiment voulait être « un reliquaire monumental » abritant à l'intérieur les Rois Mages."
 je_gaudi_dombau_phase_4_goal: "#E La progression de la construction#! atteint #BLUE 120#! points. Pour le moment, nous avons #G [GetGlobalVariable('gaudi_dombau_progress').GetValue]#! points. Normalement, nous obtenons un point chaque mois."
 je_gaudi_gotthard_survey: "Chemin de fer du Saint-Gothard : plan et relevé"
 je_gaudi_gotthard_survey_reason: "Au XIXe siècle, la Suisse risquait d'être laissée de côté dans le trafic ferroviaire international et de perdre ainsi le contact non seulement avec le système de transport moderne, mais aussi avec la révolution industrielle. Avec l'ouverture d'une ligne ferroviaire au-dessus du col du Brenner, ce danger a pris une nouvelle dimension. Géographiquement, la Suisse avait de plus gros problèmes que l'Autriche : le col du Brenner était beaucoup plus facile à négocier que les routes alternatives suisses. Des décennies de discussions sur le tracé et le financement d'un tel projet ont précédé la construction d'un chemin de fer alpin en Suisse. L'homme politique et entrepreneur zurichois Alfred Escher a joué un rôle clé dans la détermination de la ligne du Saint-Gothard."
 je_gaudi_gotthard_survey_goal: "#E La progression de la planification#! atteint #BLUE 60#! points. Pour le moment, nous avons #G [GetGlobalVariable('gaudi_gotthard_progress').GetValue]#! points. Normalement, nous obtenons un point chaque mois."
 je_gaudi_gotthard_construction: "Chemin de fer du Saint-Gothard : construction"
 je_gaudi_gotthard_construction_reason: "La construction du chemin de fer du Saint-Gothard est considérée comme l'un des plus grands projets de construction du XIXe siècle et est comparée à la construction du canal de Suez en termes de dimensions et d'obstacles techniques. Dès le début, la partie essentielle et la plus ambitieuse était la réalisation d'un tunnel à travers le massif du Saint-Gothard. Lors de son ouverture en 1882, le tunnel du Saint-Gothard était le plus long tunnel du monde avec ses 15 kilomètres. Une centaine de petits et grands ponts, principalement en fer et en acier, constituent un autre élément de cet itinéraire ambitieux, qui non seulement relie l'Europe du Nord et du Sud, mais représente également un symbole de l'unité suisse."
 je_gaudi_gotthard_construction_goal: "#E La progression de la construction#! atteint #BLUE 120#! points. Pour le moment, nous avons #G [GetGlobalVariable('gaudi_gotthard_progress').GetValue]#! points. Normalement, nous obtenons un point chaque mois."
 je_gaudi_gotthard_discontent: "Chemin de fer du Saint-Gothart : mécontentement des travailleurs"
 je_gaudi_gotthard_discontent_reason: "Les conditions de travail lors de la construction du chemin de fer du Saint-Gothard étaient difficiles, même selon les normes contemporaines. La classe ouvrière était en grande partie composée d’étrangers, principalement originaires des vallées alpines les plus pauvres du nord de l’Italie, qui n’avaient de facto aucun droit. En particulier, les travaux dans le tunnel du Saint-Gothard étaient considérés comme mettant la vie en danger et mal payés. Cela a conduit à plusieurs reprises à des désaccords avec la direction de la construction, qui ont même menacé, au moins à un moment donné, l'ensemble du projet."
 je_gaudi_gotthard_discontent_goal: "Si le #E Insatisfaction des Travailleurs#! atteint la valeur maximale de #BLUE 10#! points, une grève peut éclater ! Pour le moment, la valeur est de #R [GetGlobalVariable('gaudi_gotthard_discontent').GetValue]#! points."
 je_gaudi_cristo: "Christ Rédempteur : Construction"
 je_gaudi_cristo_reason: "Le prêtre vincentien Pedro Maria Boss a été le premier à suggérer d'ériger un monument chrétien sur le mont Corcovado au milieu des années 1850 pour honorer la princesse Isabelle, régente du Brésil et fille de l'empereur Pierre II, mais le projet n'a pas été approuvé. Le Cercle catholique de Rio a fait une deuxième proposition pour une statue emblématique sur la montagne en 1920. L'ingénieur local Heitor da Silva Costa et l'artiste Carlos Oswald ont conçu la statue. Le sculpteur français Paul Landowski a créé l'œuvre. La statue Art Déco deviendra plus tard célèbre dans le monde entier en tant que symbole de Rio de Janeiro à côté du Pain de Sucre."
 je_gaudi_cristo_goal: "#E La progression de la construction#! atteint #BLUE 120#! points. Pour le moment, nous avons #G [GetGlobalVariable('gaudi_cristo_progress').GetValue]#! points. Normalement, nous obtenons un point chaque mois."
 je_gaudi_mole_phase_1: "Mole Antonelliana : de la synagogue au symbole national"
 je_gaudi_mole_phase_1_reason: "La Mole Antonelliana est un bâtiment en forme de pavillon avec son essai haut et effilé conçu par l'architecte turinois Alessandro Antonelli. Elle a été conçue comme une synagogue au nom de la communauté juive, mais l'ambition excessive de l'architecte a conduit à un projet qui dépassait les plans originaux. Les coûts ont grimpé en flèche et l’achèvement a été retardé de plusieurs années. Malgré des tentatives ambitieuses, la communauté juive n’a finalement pas réussi à réunir davantage d’argent. Cependant, les Turinois préconisaient que le projet soit repris par le gouvernement local afin d'achever l'édifice, déjà impressionnant dans sa forme brute, et de le consacrer à l'unité italienne."
 je_gaudi_mole_phase_1_goal: "#E La progression de la construction#! atteint #BLUE 120#! points. Pour le moment, nous avons #G [GetGlobalVariable('gaudi_mole_progress').GetValue]#! points. Normalement, nous obtenons un point chaque mois."
 je_gaudi_mole_phase_2: "Mole Antonelliana : lanterne et flèche"
 je_gaudi_mole_phase_2_reason: "Antonelli a continué à apporter des modifications à son bâtiment, par exemple en ajoutant ce qu'on appelle le « tempietto » - une colonnade hexagonale néoclassique à deux étages et une base carrée - qui reprend donc le style de base du pronaos. La vision originale d'Antonelli pour la flèche était de la couronner d'une étoile à cinq branches, mais il a ensuite opté pour une statue, représentant un génie ailé, ou « genio alato ». La statue a été commandée au sculpteur Fumagalli, quelques mois après la mort d'Antonelli. Le dessin comprenait un génie en cuivre gaufré et doré tenant une lance dans une main et une branche de palmier dans l'autre. Sur sa tête se trouvait une petite étoile à cinq branches soutenue par un poteau. Lorsque l'étoile fut mise en place le 10 avril 1889, la hauteur totale du môle s'élevait à 167,5 m (550 pi), ce qui en faisait le plus haut bâtiment en brique d'Europe à l'époque."
 je_gaudi_mole_phase_2_goal: "#E La progression de la construction#! atteint #BLUE 120#! points. Pour le moment, nous avons #G [GetGlobalVariable('gaudi_mole_progress').GetValue]#! points. Normalement, nous obtenons un point chaque mois."
 je_gaudi_ringstrasse_phase_1: "Ringstrasse de Vienne : Seigneur du périphérique"
 je_gaudi_ringstrasse_phase_1_reason: "Le périphérique de Vienne a été construit après le démantèlement des murs de la ville au milieu du XIXe siècle. Des années 1860 aux années 1890, de nombreux grands bâtiments publics ont été érigés le long de la Ringstrasse dans un style historiciste éclectique, parfois appelé Ringstraßenstil (« style Ring Road »), utilisant des éléments d'architecture classique, gothique, Renaissance et baroque. De nombreux bâtiments publics et privés ont été érigés tout au long du périphérique. Les aristocrates et autres riches particuliers se sont empressés de faire construire des palais représentatifs (palais du périphérique) dans le style historiciste monumental."
 je_gaudi_ringstrasse_phase_1_goal: "#E La progression de la construction#! atteint #BLUE 120#! points. Pour le moment, nous avons #G [GetGlobalVariable('gaudi_ringstrasse_progress').GetValue]#! points. Normalement, nous obtenons un point chaque mois."
 je_gaudi_ringstrasse_phase_2: "Ringstrasse de Vienne : Hofoper et Neues Rathaus"
 je_gaudi_ringstrasse_phase_2_reason: "Le périphérique a été inauguré comme tel dix ans seulement après la décision de construire un magnifique boulevard à l'emplacement des bastions viennois démolis. Mais à cette époque, elle était encore dominée par les terres en friche. L'un des projets les plus importants des années suivantes fut la réalisation d'un grand nouvel opéra, qui deviendra plus tard l'Opéra national de Vienne. Le nouvel hôtel de ville fut également construit au cours de cette période, au cours de laquelle la Ringstrasse fut transformée d'une simple avenue en un nouveau centre de Vienne dominé par des palais et des bâtiments publics."
 je_gaudi_ringstrasse_phase_2_goal: "#E La progression de la construction#! atteint #BLUE 120#! points. Pour le moment, nous avons #G [GetGlobalVariable('gaudi_ringstrasse_progress').GetValue]#! points. Normalement, nous obtenons un point chaque mois."
 je_gaudi_ringstrasse_phase_3: "Ringstrasse de Vienne : Universität et Kunstmuseen"
 je_gaudi_ringstrasse_phase_3_reason: "La Ringstrasse est déjà devenue l'adresse convoitée des industriels, des banquiers et de l'aristocratie. Les bâtiments publics occupent une place de choix et représentent le pays de la manière la plus esthétique. Néanmoins, une dernière phase de construction est nécessaire pour l'achèvement, au cours de laquelle la construction d'un nouveau bâtiment universitaire et la création de musées d'art devraient être au premier plan."
 je_gaudi_ringstrasse_phase_3_goal: "#E La progression de la construction#! atteint #BLUE 120#! points. Pour le moment, nous avons #G [GetGlobalVariable('gaudi_ringstrasse_progress').GetValue]#! points. Normalement, nous obtenons un point chaque mois."
 je_gaudi_sagrada_phase_1: "Sagrada Família : le rêve d'Antoni Gaudí"
 je_gaudi_sagrada_phase_1_reason: "Antoni Gaudí i Cornet était un architecte et designer catalan espagnol connu comme le plus grand représentant du modernisme catalan. Les œuvres de Gaudí ont un style sui generis très individualisé. En 1883, Gaudí fut chargé du projet récemment lancé de construction d'une église à Barcelone appelée Basílica i Temple Expiatori de la Sagrada Família. Gaudí a complètement modifié le projet initial et lui a imprégné son propre style. Jusqu'à sa mort, il se consacre entièrement à ce projet. Pendant des décennies, la Sagrada Família sera la plus grande église catholique inachevée au monde – un projet du siècle entre génie et folie."
 je_gaudi_sagrada_phase_1_goal: "#E La progression de la construction#! atteint #BLUE 120#! points. Pour le moment, nous avons #G [GetGlobalVariable('gaudi_sagrada_progress').GetValue]#! points. Normalement, nous obtenons un point chaque mois."
 je_gaudi_sagrada_phase_2: "Sagrada Família : l'abside"
 je_gaudi_sagrada_phase_2_reason: "Gaudí a achevé la crypte qu'il avait commencée essentiellement selon les plans de del Villar, les voûtes étant une révision de Gaudí. Au milieu des années 1880, les premiers services religieux purent y être célébrés et la crypte fut achevée en 1889. Parallèlement à la construction de la crypte, Gaudí commença à repenser fondamentalement les plans de l'église. En 1885, il présenta un nouveau concept global avec un langage de conception gothique, dans lequel 18 tours sont reconnaissables, bien qu'à une échelle plus petite que dans le projet actuel. Le mur extérieur de l'abside, achevé en 1893, est plus haut que le projet de del Villar. Il contient des éléments néo-gothiques, mais montre la signature de Gaudí dans l'utilisation idiosyncrasique des formes gothiques, des gargouilles naturalistes et des pointes des pinacles."
 je_gaudi_sagrada_phase_2_goal: "#E La progression de la construction#! atteint #BLUE 120#! points. Pour le moment, nous avons #G [GetGlobalVariable('gaudi_sagrada_progress').GetValue]#! points. Normalement, nous obtenons un point chaque mois."
 je_gaudi_sagrada_phase_3: "Sagrada Família : Façade de la Nativité"
 je_gaudi_sagrada_phase_3_reason: "Dédiée à la naissance de Jésus, la façade de la Nativité est décorée de scènes rappelant des éléments de la vie. Caractéristiques du style naturaliste de Gaudí, les sculptures sont richement disposées et décorées de scènes et d'images de la nature, chacune étant un symbole à sa manière. La façade fait face au soleil levant au nord-est, symbole de la naissance du Christ. Il est divisé en trois portiques dont chacun représente une vertu théologale (Espoir, Foi et Charité). L'Arbre de Vie s'élève au-dessus de la porte de Jésus dans le portique de la Charité."
 je_gaudi_sagrada_phase_3_goal: "#E La progression de la construction#! atteint #BLUE 120#! points. Pour le moment, nous avons #G [GetGlobalVariable('gaudi_sagrada_progress').GetValue]#! points. Normalement, nous obtenons un point chaque mois."
 je_gaudi_sagrada_phase_4: "Sagrada Família : Nef principale"
 je_gaudi_sagrada_phase_4_reason: "Le plan de l'église est celui d'une croix latine à cinq nefs. Les colonnes de l'intérieur sont une conception unique de Gaudí. En plus de se ramifier pour supporter leur charge, leurs surfaces en constante évolution sont le résultat de l'intersection de diverses formes géométriques. L'exemple le plus simple est celui d'une base carrée évoluant vers un octogone à mesure que la colonne s'élève, puis vers une forme à seize côtés, et finalement vers un cercle. Essentiellement, aucune des surfaces intérieures n’est plane ; l'ornementation est complète et riche, constituée en grande partie de formes abstraites qui combinent des courbes douces et des points irréguliers. Même les travaux les plus détaillés, tels que les balustrades en fer des balcons et des escaliers, regorgent d'élaborations tout en courbes."
 je_gaudi_sagrada_phase_4_goal: "#E La progression de la construction#! atteint #BLUE 120#! points. Pour le moment, nous avons #G [GetGlobalVariable('gaudi_sagrada_progress').GetValue]#! points. Normalement, nous obtenons un point chaque mois."
 je_gaudi_sagrada_phase_5: "Sagrada Família : Flèches des Apôtres"
 je_gaudi_sagrada_phase_5_reason: "La conception originale de Gaudí prévoit un total de dix-huit flèches, représentant par ordre croissant de hauteur les douze apôtres, la Vierge Marie, les quatre évangélistes et, le plus grand de tous, Jésus-Christ. Toutes les tours, dont les formes évoquent une crosse d'évêque, présentent de longues encoches verticales et des flèches colorées décorées d'animaux ou de symboles sacrés et de citations de la Bible. Ils portent une petite croix dorée avec le nom de l'apôtre respectif. Certaines tours sont reliées par d'étroits ponts de pierre."
 je_gaudi_sagrada_phase_5_goal: "#E La progression de la construction#! atteint #BLUE 120#! points. Pour le moment, nous avons #G [GetGlobalVariable('gaudi_sagrada_progress').GetValue]#! points. Normalement, nous obtenons un point chaque mois."
 je_gaudi_sagrada_phase_6: "Sagrada Família : Façade de la Passion"
 je_gaudi_sagrada_phase_6_reason: "Contrairement à la façade de la Nativité, très décorée, la façade de la Passion est austère, claire et simple, avec de grandes pierres nues et est sculptée de lignes droites dures pour ressembler aux os d'un squelette. Dédiée à la Passion du Christ, aux souffrances de Jésus lors de sa crucifixion, la façade était destinée à représenter les péchés de l'homme. Gaudí voulait que cette façade suscite la peur chez le spectateur. Il voulait « casser » les arcs et « couper » les colonnes, et utiliser l'effet du clair-obscur (ombres angulaires sombres contrastées par une lumière dure et rigide) pour montrer davantage la sévérité et la brutalité du sacrifice du Christ. Face au soleil couchant, indicatif et symbolique de la mort du Christ, la Façade de la Passion est soutenue par six grandes colonnes inclinées, conçues pour ressembler à des muscles tendus."
 je_gaudi_sagrada_phase_6_goal: "#E La progression de la construction#! atteint #BLUE 120#! points. Pour le moment, nous avons #G [GetGlobalVariable('gaudi_sagrada_progress').GetValue]#! points. Normalement, nous obtenons un point chaque mois."
 je_gaudi_sagrada_phase_7: "Sagrada Família : Transept"
 je_gaudi_sagrada_phase_7_reason: "Les thèmes de la décoration incluent des mots de la liturgie. Les clochers sont décorés de mots tels que « Hosanna », « Excelsis » et « Sanctus » ; les grandes portes de la façade de la Passion reproduisent des extraits de la Passion de Jésus du Nouveau Testament en différentes langues, principalement en catalan ; et la façade de la Gloire sera décorée avec les paroles du Symbole des Apôtres, tandis que sa porte principale reproduira l'intégralité du Notre Père en catalan, entourée de multiples variantes de « Donne-nous aujourd'hui notre pain quotidien » dans d'autres langues. Les trois entrées symbolisent les trois vertus : Foi, Espérance et Amour. Chacun d'eux est également dédié à une partie de la vie du Christ."
 je_gaudi_sagrada_phase_7_goal: "#E La progression de la construction#! atteint #BLUE 120#! points. Pour le moment, nous avons #G [GetGlobalVariable('gaudi_sagrada_progress').GetValue]#! points. Normalement, nous obtenons un point chaque mois."
 je_gaudi_sagrada_phase_8: "Sagrada Família : Flèches de Marie et des Évangélistes"
 je_gaudi_sagrada_phase_8_reason: "Les flèches des évangélistes sont surmontées de sculptures de leurs symboles traditionnels : un taureau ailé (Saint Luc), un homme ailé (Saint Matthieu), un aigle (Saint Jean) et un lion ailé (Saint Marc). Les extrémités des tours mesurent 22,5 m de haut et sont composées de trois parties différentes : la base est composée de quatre lignes d'hexagones avec les inscriptions Al·leluia et Amen entourées de palmes en céramique en forme de chevrons ; dans la partie centrale se trouve un icosaèdre entrecoupé d'une sphère recouverte de trencadís en céramique et de verre vénitien, qui contient les sources lumineuses ; et, pour finir, il y a les sculptures des Tétramorphes, ailés et avec un livre évangélique avec les initiales de chaque évangéliste. La tour de Marie est située sur l'abside et est surmontée d'une grande étoile à douze branches, qui symbolise l'étoile du matin. De plus, il porte plusieurs éléments iconographiques faisant allusion à la Vierge, comme le Je vous salue Marie et diverses fleurs comme symbole des attributs de la mère de Jésus."
 je_gaudi_sagrada_phase_8_goal: "#E La progression de la construction#! atteint #BLUE 120#! points. Pour le moment, nous avons #G [GetGlobalVariable('gaudi_sagrada_progress').GetValue]#! points. Normalement, nous obtenons un point chaque mois."
 je_gaudi_sagrada_phase_9: "Sagrada Família : Façade de la Gloire"
 je_gaudi_sagrada_phase_9_reason: "La façade la plus grande et la plus frappante est la façade de la Gloire. Dédié à la gloire céleste de Jésus, il représente le chemin vers Dieu : la mort, le jugement dernier et la gloire, tandis que l'enfer est réservé à ceux qui s'écartent de la volonté de Dieu. Pour atteindre le Portique de la Gloire, le grand escalier mène au passage souterrain construit sur la rue de Majorque avec la décoration représentant l'Enfer et le vice. Il sera décoré de démons, d'idoles, de faux dieux, d'hérésies et de schismes, etc. Le purgatoire et la mort seront également représentés, cette dernière utilisant des tombeaux au sol. Le portique comporte sept grandes colonnes dédiées aux dons du Saint-Esprit. À la base des colonnes se trouvent les représentations des sept péchés capitaux, et au sommet, les sept vertus célestes."
 je_gaudi_sagrada_phase_9_goal: "#E La progression de la construction#! atteint #BLUE 120#! points. Pour le moment, nous avons #G [GetGlobalVariable('gaudi_sagrada_progress').GetValue]#! points. Normalement, nous obtenons un point chaque mois."
 je_gaudi_sagrada_phase_10: "Sagrada Família : Flèche du Christ"
 je_gaudi_sagrada_phase_10_reason: "La tour de Jésus est reliée par quatre ponts aux tours des évangélistes et surmontée d'une grande croix à six bras, haute de 13,5 m : dans sa partie centrale se trouve un agneau, ainsi que l'inscription 'Tu solus Sanctus, Tu solus Dominus, Tu solus Altissimus' et les mots 'Amen' et 'Hallelujah'. Chacun des quatre bras de la croix possède de puissants faisceaux de lumière visibles à de grandes distances, en souvenir du passage biblique qui définit Jésus comme « Je suis la lumière du monde ». À l'intérieur, la tour de Jésus sera divisée en trois étages, qui symboliseront la création de l'univers et la phrase liée au Christ « Je suis le Chemin, la Vérité et la Vie »."
 je_gaudi_sagrada_phase_10_goal: "#E La progression de la construction#! atteint #BLUE 120#! points. Pour le moment, nous avons #G [GetGlobalVariable('gaudi_sagrada_progress').GetValue]#! points. Normalement, nous obtenons un point chaque mois."
 notification_gaudi_summer_palace_burned_notification_name: "Le Palais d'été incendié"
 notification_gaudi_summer_palace_burned_notification_desc: "Le splendide Palais d'Eté, résidence des empereurs chinois depuis un siècle, fut incendié au [INITIATOR_COUNTRY.GetName]."
 gaudi_dombau_phase_1_decision: "Terminez la cathédrale de Cologne"
 gaudi_dombau_phase_1_decision_desc: "La cathédrale de Cologne est considérée comme la cathédrale gothique la plus parfaite au monde. La construction commença au XIIIe siècle et prit des proportions colossales. Après l'achèvement du chœur, les travaux s'arrêtèrent jusqu'à ce qu'ils soient complètement arrêtés au cours du XVe siècle. Aujourd'hui encore, la grue de construction de la fin du Moyen Âge domine toujours la tour sud, à moitié achevée. Avec la renaissance du sentiment national et romantique dans la bourgeoisie allemande et surtout après la redécouverte des plans de construction originaux et leur diffusion, la conviction grandit que l'achèvement de la cathédrale n'est pas seulement un projet pour la gloire de Dieu, mais aussi un symbole de la culture allemande et de l'unité de la nation allemande."
 gaudi_dombau_phase_2_decision: "Façade sud de la cathédrale de Cologne"
 gaudi_dombau_phase_2_decision_desc: "Après plusieurs années de travaux de construction, les architectes se sont retrouvés confrontés à la construction et à la décoration de la façade sud de la cathédrale. Avec sa riche décoration figurative, elle est non seulement considérée comme le summum de la sculpture allemande, mais simplement comme l'une des œuvres principales de l'architecture néo-gothique. La façade à elle seule a nécessité treize ans de construction, et dix-huit ans de finition et de décoration."
 gaudi_dombau_phase_3_decision: "Structure du toit de la cathédrale de Cologne"
 gaudi_dombau_phase_3_decision_desc: "La conception de la cathédrale de Cologne, basée sur l'idéal gothique, n'a pas empêché les maîtres d'œuvre d'utiliser les matériaux de construction les plus modernes de l'époque. La structure du toit était en fer, ce qui en faisait la plus grande structure fer-acier au monde jusqu'à la construction de la Tour Eiffel. Grâce à cette décision, la construction a survécu même face aux bombardements alliés pendant la Seconde Guerre mondiale."
 gaudi_dombau_phase_4_decision: "Façade ouest et tours de la cathédrale de Cologne"
 gaudi_dombau_phase_4_decision_desc: "La façade ouest de la cathédrale est la plus grande façade d'église jamais construite. Il suit en détail le plan médiéval développé par le maître d'œuvre Michael von Savoyen, qui a été enregistré en 1370 dans le plan de façade F. La silhouette de la cathédrale de Cologne est caractéristique de la façade à deux tours avec les deux flèches imposantes. Maître Michael avait conçu une flèche octogonale entièrement ajourée à entrelacs, couronnée par un fleuron à plusieurs niveaux. Avec ces solutions, qui exploraient les limites de ce qui est techniquement possible, les architectes gothiques ont voulu souligner que le bâtiment voulait être « un reliquaire monumental » abritant à l'intérieur les Rois Mages."
 gaudi_gotthard_survey_decision: "Planifier et étudier le chemin de fer du Saint-Gothard"
 gaudi_gotthard_survey_decision_desc: "Au XIXe siècle, la Suisse risquait d'être laissée de côté dans le trafic ferroviaire international et de perdre ainsi le contact non seulement avec le système de transport moderne, mais aussi avec la révolution industrielle. Avec l'ouverture d'une ligne ferroviaire au-dessus du col du Brenner, ce danger a pris une nouvelle dimension. Géographiquement, la Suisse avait de plus gros problèmes que l'Autriche : le col du Brenner était beaucoup plus facile à négocier que les routes alternatives suisses. Des décennies de discussions sur le tracé et le financement d'un tel projet ont précédé la construction d'un chemin de fer alpin en Suisse. L'homme politique et entrepreneur zurichois Alfred Escher a joué un rôle clé dans la détermination de la ligne du Saint-Gothard."
 gaudi_gotthard_construction_decision: "Construire le chemin de fer du Saint-Gothard"
 gaudi_gotthard_construction_decision_desc: "La construction du chemin de fer du Saint-Gothard est considérée comme l'un des plus grands projets de construction du XIXe siècle et est comparée à la construction du canal de Suez en termes de dimensions et d'obstacles techniques. Dès le début, la partie essentielle et la plus ambitieuse était la réalisation d'un tunnel à travers le massif du Saint-Gothard. Lors de son ouverture en 1882, le tunnel du Saint-Gothard était le plus long tunnel du monde avec ses 15 kilomètres. Une centaine de petits et grands ponts, principalement en fer et en acier, constituent un autre élément de cet itinéraire ambitieux, qui non seulement relie l'Europe du Nord et du Sud, mais représente également un symbole de l'unité suisse."
 gaudi_cristo_construction_decision: "Construire le Christ Rédempteur"
 gaudi_cristo_construction_decision_desc: "Le prêtre vincentien Pedro Maria Boss a été le premier à suggérer d'ériger un monument chrétien sur le mont Corcovado au milieu des années 1850 pour honorer la princesse Isabelle, régente du Brésil et fille de l'empereur Pierre II, mais le projet n'a pas été approuvé. Le Cercle catholique de Rio a fait une deuxième proposition pour une statue emblématique sur la montagne en 1920. L'ingénieur local Heitor da Silva Costa et l'artiste Carlos Oswald ont conçu la statue. Le sculpteur français Paul Landowski a créé l'œuvre. La statue Art Déco deviendra plus tard célèbre dans le monde entier en tant que symbole de Rio de Janeiro à côté du Pain de Sucre."
 gaudi_mole_phase_1_decision: "Mole Antonelliana : de la synagogue au symbole national"
 gaudi_mole_phase_1_decision_desc: "La Mole Antonelliana est un bâtiment en forme de pavillon avec son essai haut et effilé conçu par l'architecte turinois Alessandro Antonelli. Elle a été conçue comme une synagogue au nom de la communauté juive, mais l'ambition excessive de l'architecte a conduit à un projet qui dépassait les plans originaux. Les coûts ont grimpé en flèche et l’achèvement a été retardé de plusieurs années. Malgré des tentatives ambitieuses, la communauté juive n’a finalement pas réussi à réunir davantage d’argent. Cependant, les Turinois préconisaient que le projet soit repris par le gouvernement local afin d'achever l'édifice, déjà impressionnant dans sa forme brute, et de le consacrer à l'unité italienne."
 gaudi_custom_tt_trigger_mole: "Jouer avec #yellow Italie#!"
 gaudi_mole_phase_2_decision: "Mole Antonelliana : lanterne et flèche"
 gaudi_mole_phase_2_decision_desc: "Antonelli a continué à apporter des modifications à son bâtiment, par exemple en ajoutant ce qu'on appelle le « tempietto » - une colonnade hexagonale néoclassique à deux étages et une base carrée - qui reprend donc le style de base du pronaos. La vision originale d'Antonelli pour la flèche était de la couronner d'une étoile à cinq branches, mais il a ensuite opté pour une statue, représentant un génie ailé, ou « genio alato ». La statue a été commandée au sculpteur Fumagalli, quelques mois après la mort d'Antonelli. Le dessin comprenait un génie en cuivre gaufré et doré tenant une lance dans une main et une branche de palmier dans l'autre. Sur sa tête se trouvait une petite étoile à cinq branches soutenue par un poteau. Lorsque l'étoile fut mise en place le 10 avril 1889, la hauteur totale du môle s'élevait à 167,5 m (550 pi), ce qui en faisait le plus haut bâtiment en brique d'Europe à l'époque."
 gaudi_ringstrasse_phase_1_decision: "Ringstrasse de Vienne : Seigneur du périphérique"
 gaudi_ringstrasse_phase_1_decision_desc: "Le périphérique de Vienne a été construit après le démantèlement des murs de la ville au milieu du XIXe siècle. Des années 1860 aux années 1890, de nombreux grands bâtiments publics ont été érigés le long de la Ringstrasse dans un style historiciste éclectique, parfois appelé Ringstraßenstil (« style Ring Road »), utilisant des éléments d'architecture classique, gothique, Renaissance et baroque. De nombreux bâtiments publics et privés ont été érigés tout au long du périphérique. Les aristocrates et autres riches particuliers se sont empressés de faire construire des palais représentatifs (palais du périphérique) dans le style historiciste monumental."
 gaudi_ringstrasse_phase_2_decision: "Ringstrasse de Vienne : Hofoper et Neues Rathaus"
 gaudi_ringstrasse_phase_2_decision_desc: "Le périphérique a été inauguré comme tel dix ans seulement après la décision de construire un magnifique boulevard à l'emplacement des bastions viennois démolis. Mais à cette époque, elle était encore dominée par les terres en friche. L'un des projets les plus importants des années suivantes fut la réalisation d'un grand nouvel opéra, qui deviendra plus tard l'Opéra national de Vienne. Le nouvel hôtel de ville fut également construit au cours de cette période, au cours de laquelle la Ringstrasse fut transformée d'une simple avenue en un nouveau centre de Vienne dominé par des palais et des bâtiments publics."
 gaudi_ringstrasse_phase_3_decision: "Ringstrasse de Vienne : Universität et Kunstmuseen"
 gaudi_ringstrasse_phase_3_decision_desc: "La Ringstrasse est déjà devenue l'adresse convoitée des industriels, des banquiers et de l'aristocratie. Les bâtiments publics occupent une place de choix et représentent le pays de la manière la plus esthétique. Néanmoins, une dernière phase de construction est nécessaire pour l'achèvement, au cours de laquelle la construction d'un nouveau bâtiment universitaire et la création de musées d'art devraient être au premier plan."
 gaudi_custom_tt_trigger_ringstrasse: "Jouer avec #yellow Autriche#!"
 gaudi_sagrada_phase_1_decision: "Sagrada Família : le rêve d'Antoni Gaudí"
 gaudi_sagrada_phase_1_decision_desc: "Antoni Gaudí i Cornet était un architecte et designer catalan espagnol connu comme le plus grand représentant du modernisme catalan. Les œuvres de Gaudí ont un style sui generis très individualisé. En 1883, Gaudí fut chargé du projet récemment lancé de construction d'une église à Barcelone appelée Basílica i Temple Expiatori de la Sagrada Família. Gaudí a complètement modifié le projet initial et lui a imprégné son propre style. Jusqu'à sa mort, il se consacre entièrement à ce projet. Pendant des décennies, la Sagrada Família sera la plus grande église catholique inachevée au monde – un projet du siècle entre génie et folie."
 gaudi_sagrada_phase_2_decision: "Sagrada Família : l'abside"
 gaudi_sagrada_phase_2_decision_desc: "Gaudí a achevé la crypte qu'il avait commencée essentiellement selon les plans de del Villar, les voûtes étant une révision de Gaudí. Au milieu des années 1880, les premiers services religieux purent y être célébrés et la crypte fut achevée en 1889. Parallèlement à la construction de la crypte, Gaudí commença à repenser fondamentalement les plans de l'église. En 1885, il présenta un nouveau concept global avec un langage de conception gothique, dans lequel 18 tours sont reconnaissables, bien qu'à une échelle plus petite que dans le projet actuel. Le mur extérieur de l'abside, achevé en 1893, est plus haut que le projet de del Villar. Il contient des éléments néo-gothiques, mais montre la signature de Gaudí dans l'utilisation idiosyncrasique des formes gothiques, des gargouilles naturalistes et des pointes des pinacles."
 gaudi_sagrada_phase_3_decision: "Sagrada Família : Façade de la Nativité"
 gaudi_sagrada_phase_3_decision_desc: "Dédiée à la naissance de Jésus, la façade de la Nativité est décorée de scènes rappelant des éléments de la vie. Caractéristiques du style naturaliste de Gaudí, les sculptures sont richement disposées et décorées de scènes et d'images de la nature, chacune étant un symbole à sa manière. La façade fait face au soleil levant au nord-est, symbole de la naissance du Christ. Il est divisé en trois portiques dont chacun représente une vertu théologale (Espoir, Foi et Charité). L'Arbre de Vie s'élève au-dessus de la porte de Jésus dans le portique de la Charité."
 gaudi_sagrada_phase_4_decision: "Sagrada Família : Nef principale"
 gaudi_sagrada_phase_4_decision_desc: "Le plan de l'église est celui d'une croix latine à cinq nefs. Les colonnes de l'intérieur sont une conception unique de Gaudí. En plus de se ramifier pour supporter leur charge, leurs surfaces en constante évolution sont le résultat de l'intersection de diverses formes géométriques. L'exemple le plus simple est celui d'une base carrée évoluant vers un octogone à mesure que la colonne s'élève, puis vers une forme à seize côtés, et finalement vers un cercle. Essentiellement, aucune des surfaces intérieures n’est plane ; l'ornementation est complète et riche, constituée en grande partie de formes abstraites qui combinent des courbes douces et des points irréguliers. Même les travaux les plus détaillés, tels que les balustrades en fer des balcons et des escaliers, regorgent d'élaborations tout en courbes."
 gaudi_sagrada_phase_5_decision: "Sagrada Família : Flèches des Apôtres"
 gaudi_sagrada_phase_5_decision_desc: "La conception originale de Gaudí prévoit un total de dix-huit flèches, représentant par ordre croissant de hauteur les douze apôtres, la Vierge Marie, les quatre évangélistes et, le plus grand de tous, Jésus-Christ. Toutes les tours, dont les formes évoquent une crosse d'évêque, présentent de longues encoches verticales et des flèches colorées décorées d'animaux ou de symboles sacrés et de citations de la Bible. Ils portent une petite croix dorée avec le nom de l'apôtre respectif. Certaines tours sont reliées par d'étroits ponts de pierre."
