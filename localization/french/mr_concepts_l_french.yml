 concept_verrier_comet: "Grande comète" #NT!
 concept_verrier_comets: "Grands comètes" #NT!
 concept_verrier_comet_desc: "L'âge victorien avait quelques #b Grands comètes #! qui ont attiré l'attention du public. Si vous avez un [concept_verrier_astronomer], il y a une chance que vous découvrirez d'abord l'un de ces grands comètes #b, ce qui entraîne un bonus au prestige et à la recherche." #NT!
  
