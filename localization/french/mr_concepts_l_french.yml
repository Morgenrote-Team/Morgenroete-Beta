l_french:
  
 ag_morgenroete_name: "[concept_morgenroete]" #NT!
 ag_morgenroete_tooltip: "Nous avons au moins une action possible pour une fonctionnalité [concept_morgenroete]." #NT!
  
 ###Morgenröte### 
 concept_morgenroete: "#r Morgenröte#!" #NT!
 concept_morgenroete_mr: "M" #NT!
 concept_morgenroete_concept: "Concept" #NT!
  
 ###ACADEMICS### 
 concept_pm_academics_university_humanities: "#b #BLUE Humanities-anthropological focus#!#!" #NT!
  
 concept_pm_academics_university_natural_history: "None" #NT!
  
 concept_pm_academics_university_mathematics: "#b #ORANGE Focus-technique mathématique #!#!" #NT!
  
 concept_academics_university_specialization: "Focus universitaire" #NT!
  
  
 concept_academics_academic: "Académique" #NT!
 concept_academics_academics: "Universitaires" #NT!
 concept_academics_scientist: "Scientifique" #NT!
 concept_academics_scientists: "Scientifiques" #NT!
 concept_academics_academic_desc: "Dans [concept_morgenroete] #b Academics#! sont des caractères spéciaux qui vous permettent d'utiliser certaines mécanismes du mod. You can get #b Academics#! in some events or by aquiring enough [concept_academics_progress].\nCurrently these #b Academics#! exist:\n - [concept_gaudi_engineer]\n - [concept_mendelejew_chemist]\n - #b0\n - #b1\n - #b2\n - #b3\n - #b4\n - #b5\n - #b6" #NT!
  
 concept_academics_progress: "Progrès académique" #NT!
 concept_academics_progress_desc: "En ajoutant 360 #b Progress académique #!, vous pouvez gagner un nouveau [concept_academics_academic]. Pour avoir même accès à #b Academic Progress#!, vous devez avoir la technologie #b Academia#! et au moins un #b University#!. \ Nyour #b Academic Progress#! est influencé par divers facteurs. Plus vous avez #!1, plus vous gagnez rapidement #b Progrès académique #! par exemple. Un autre facteur est le pourcentage de pop académiques dans votre pays. Vous obtiendrez le maximum #b Progress académique #! pour #!6 2% #! ou plus de pop académiques. De meilleures écoles, et une intelligentsia heureuse aident également à gagner #b progrès académique #!. Enfin, certains des foyers technologiques et des bâtiments spéciaux comme le [concept_academics_academic]0 ou le [concept_academics_academic]1 fourniront également des progrès académiques #b supplémentaires." #NT!
  
 concept_academics_scientific_society: "Société scientifique" #NT!
 concept_academics_scientific_societies: "Sociétés scientifiques" #NT!
 concept_academics_scientific_society_desc: "Le #b Scientific Society#! est une société de vos pays les plus brillants. Il représente les scientifiques et les universitaires de votre pays et vous permet de visiter votre [Concept('concept_academics_academic','$concept_academics_academics$')]. \ N \ nthe #b Scientific Society#! pourrait vous tasser avec [Concept('concept_academics_academic_mission','$concept_academics_missions$')] qui vous donnera des récompenses utiles." #NT!
  
 concept_academics_experience: "Expérience" #NT!
 concept_academics_experience_desc: "Certains universitaires rassemblent #b Experience#! au cours de leur vie. Dans [concept_morgenroete], les caractères obtiennent #b Experience#! lorsqu'ils sont créés. Habituellement, ils obtiennent 10 #b Experience#! pour chaque année de plus de 30 ans. \ Nadditionally, ils gagnent #b Experience#! en faisant leur travail, par exemple pour trouver un nouveau [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]. Ils acquièrent #b Experience#! passivement chaque année également. \ Na Le caractère qui obtient 100 #b Experience#! obtiendra le #b Trait#! expérimenté. Si un personnage atteint 300 #b Experience#!, il obtient le #b célèbre trait#! \ n que l'expérience #b #b d'un personnage, mieux c'est leur travail. Un [concept_morgenroete]2 expérimenté ou célèbre par exemple trouve plus [concept_morgenroete]3 et est meilleur dans la construction d'un [concept_morgenroete]4." #NT!
  
 concept_academics_academic_mission: "Mission académique" #NT!
 concept_academics_academic_missions: "Missions académiques" #NT!
 concept_academics_mission: "Mission" #NT!
 concept_academics_missions: "Missions" #NT!
 concept_academics_academic_mission_desc: "Votre [concept_academics_scientific_society] vous demandera parfois d'atteindre un certain objectif. Ces objectifs pourraient être de trouver une quantité spécifique de [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')], [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] ou de choses similaires. D'autres missions #b#! pourraient avoir besoin de vous pour trouver la planète x ou pour obtenir un [Concept('concept_lepsius_exhibition','$concept_lepsius_excellent_exhibition$')]. \ Nif vous échouez une mission #b Mission#! Votre #b Scientific Society#! sera malheureuse mais terminer une mission vous produira des récompenses utiles." #NT!
  
 ###CURTISS### 
 concept_curtiss_aviation: "Aviation" #NT!
 concept_curtiss_aviation_desc: "#b Aviation#! est l'une des principales caractéristiques de [concept_morgenroete]. Les 19e et 20e siècles ont vu la montée en puissance du vol humain. D'abord sous la forme de #b Balloons#! et #b Airships#!, puis avec #b planes#!. Le vol était une activité prestigieuse et a permis d'atteindre de nouveaux horizons. \ N \ nmany Les pays commencent leur voyage vers le ciel au début du jeu, lorsqu'ils commencent à parrainer un [Concept('concept_curtiss_balloonist_role','$concept_curtiss_balloonist_role_only_balloonist$')] pour battre des records. Briser l'une des récidives donnera à votre pays un coup de pouce technologique ainsi qu'un modificateur de prestige. \ Nresearching La technologie Zeppelin vous permettra de mener un #!0 si vous avez accès au pôle Nord et à un #!1. \ Nreseching plus loin dans le chemin de l'aviation vous permettra d'utiliser plusieurs nouveaux mécanismes. Vous pourrez construire #!2 qui produit les nouveaux vols #b #! bons ainsi que #b Services#!. Le #b Airport#! permettra à un #!9 de croître qui vous permettra d'utiliser l'action diplomatique [concept_morgenroete]0. Le #b Airpace Convention#! vous permettra d'accéder aux États et [concept_morgenroete]3 ainsi qu'au pôle Nord. Si votre #b Airline#! augmente suffisamment, vous pourrez construire un gigantesque dirigeable ou le plus grand avion du monde. \ La caractéristique la plus excitante arrive au début du 20e siècle: vous pourrez concourir au [concept_morgenroete]6. Le #b Schneider Trophy#! est une race d'hydravion dans lequel différents pays se disputent. Si vous gagnez, vous obtiendrez également du prestige et organisera le prochain événement. Et si vous parvenez à gagner la course 3 fois, vous garderez le #b Schneider Trophy#!." #NT!
  
 concept_curtiss_balloonist_role: "Rôle de ballonist" #NT!
 concept_curtiss_balloonist_role_only_balloonist: "Aéronaute" #NT!
 concept_curtiss_balloonists_role: "Ballonistes" #NT!
 concept_curtiss_balloonist_role_desc: "Un #b Balloonist#! est un caractère spécial qui peut être parrainé par une nation. Habituellement, les pays bien développés ou occidentaux parraineront #b ballonist#! et s'affronteront pour les dossiers et les nouvelles conclusions. Les Balloonists #b #! effectueront au hasard des vols et obtiendront des records soit pour la distance la plus longue, le temps de vol le plus long ou le vol le plus élevé. Pour chaque vol de ballon, le #b Balloonist#! obtiendra une expérience et un classement qui augmentera la chance de nouveaux records. Mais sachez que le ballon est une entreprise dangereuse et de nombreux ballonistes meurent tôt, surtout s'ils sont malades, alcooliques ou toxicomanes." #NT!
  
 concept_curtiss_arctic_expedition: "Expédition arctique" #NT!
 concept_curtiss_arctic_expeditions: "Expéditions arctiques" #NT!
 concept_curtiss_arctic_expedition_desc: "Si vous avez fait des recherches sur la technologie #b Zeppelin#!, ayez un [concept_verrier_observatory] avec une station météo #b #!, un [concept_curtiss_pilot] et un accès à un État proche du pôle Nord, vous pouvez effectuer un #b Arctic Expedition#!. Vous pouvez ces états sont #b Greenland#!, #b Northern Norway#!, #b Alaska#!, #b nunavut#! et #b nenetsia#!. Vous pouvez avoir accès en soit en soit en ayant un #!8 avec le propriétaire." #NT!
  
 concept_curtiss_pilot: "Pilote" #NT!
 concept_curtiss_pilots: "Pilotes" #NT!
 concept_curtiss_pilot_desc: "Un #b Pilot#! est un caractère avec le #b Pilot Trait#!. #b pilotes#! ont de faibles chances de reprendre après la découverte #b Aviation #!. De plus, dans les batailles sur un front en utilisant la reconnaissance aérienne comme méthode de production, il est possible qu'un #b Pilot#! émerge de la bataille via un événement. De meilleures technologies telles que des avions et de l'aviation moderne, mais également de l'établissement d'une école pilote via des décisions permet une meilleure chance qu'un personnage ait le trait #b Pilot#!. \ N#b pilotes#! vous aider de différentes manières. #b Airlines#! peut être intéressé par les pilotes #b pour stimuler leur image; Dans la bataille du #!8, les pilotes #b expérimentés ont une meilleure chance; et un #b pilot#! est nécessaire pour entreprendre le #b3. #b pilotes#! peut également être mis à niveau vers les pilotes ACE via un événement s'ils sont déployés sur un front." #NT!
  
 concept_curtiss_airport: "Aéroport" #NT!
 concept_curtiss_airports: "Aéroports" #NT!
 concept_curtiss_airport_desc: "Un #b Airport#! est un bâtiment qui est déverrouillé par la technologie #b Aviation#! moderne. Il s'agit d'un bâtiment purement civil et fournit des services [GetGoods('air_travel').GetName] et #b#! mais consomme une variété de biens à partir de [GetGoods('tools').GetName], [GetGoods('paper').GetName], [GetGoods('aeroplanes').GetName] et #!0. Plus tard, il a également besoin de #!1, #!2 et #!3. \ Nif vous avez suffisamment de #b aéroports#! Un #!6 sera fondé et avec vos aéroports #b croissants, la compagnie aérienne #b augmentera également et offrira plus de bonus." #NT!
  
 concept_curtiss_airline: "Compagnie aérienne" #NT!
 concept_curtiss_airlines: "Compagnies aériennes" #NT!
 concept_curtiss_airline_desc: "Une #b Airline#! est une entreprise ou une institution gérée par le gouvernement qui offre [GetGoods('air_travel').GetName] du niveau local jusqu'aux vols internationaux à la fin du jeu. #b Airlines#! fournit également divers autres bonus. #b Airlines#! a besoin de [Concept('concept_curtiss_airport','$concept_curtiss_airports$')] pour effectuer ces vols. Si vous vous développez #b Airports#!, le #b Airlines#!. \ Nif votre #b Airline#! est gérée par le gouvernement, vous aurez l'occasion de construire un énorme dirigeable et de le laisser parcourir de grandes distances. Si votre #b Airline#! est publique ou privée, vous pourriez plutôt avoir la possibilité de construire le plus grand avion jamais créé." #NT!
  
 concept_curtiss_airspace_convention: "Convention d'espace aérien" #NT!
 concept_curtiss_airspace_conventions: "Conventions d'espace aérien" #NT!
 concept_curtiss_airspace_convention_desc: "Le #b Airpace Convention#! est un [concept_diplomatic_pact] important qui vous permet d'interagir avec des régions loin de votre influence. Si vous avez une convention d'espace aérien #b avec une autre nation qui a un [concept_lepsius_excavation_site], vous pourrez mener un [concept_lepsius_expedition] sans avoir un [concept_active_interest] dans la région. \ NAN #b AIRSPACE Convention#! vous permettra d'envoyer un #!0 si vous ne possédez pas l'un des états nécessaires." #NT!
  
 concept_curtiss_schneider_trophy: "Trophée Schneider" #NT!
 concept_curtiss_schneider_trophy_desc: "La lutte pour ce prestigieux trophée, que le Français Jacques Schneider a donné peu de temps avant la Première Guerre mondiale, était principalement destiné à stimuler le développement des hydravions. Au fil du temps, la course de ce trophée est devenue une course de nations, le Royaume-Uni, les États-Unis et l'Italie en particulier en apportant à leurs équipes un soutien massif pour remporter le trophée convoité. En fait, le développement technologique a bénéficié du #b Schneider Trophy#! en utilisant des réservoirs plus rapides et plus avancés. \ NTHE #b Schneider Trophy#! peut être fondé s'il y a 5 nations qui ont inventé le #b plans \ n la gagnante de la victoire du Port et un Centre d'urban de niveau 10. Une nation avec une école pilote et un grand [concept_curtiss_airline] aura un avantage par exemple. Un grand [concept_curtiss_pilot] et un financement massif aideront également à gagner le trophée. \ N le vainqueur du dernier trophée sera en mesure de tenir le prochain s'ils ont un port ou sont en Suisse avec ses nombreux lacs. Gagner le trophée 3 fois de suite est encore meilleur, car la nation gardera le trophée pour toujours et obtiendra un bonus de prestige pour cela." #NT!
  
 concept_curtiss_balloonist: "Aéronaute" #NT!
 concept_curtiss_balloonist_desc: "Ce personnage est un ballonist qui se poursuit souvent sur des trajets aventureux en ballon." #NT!
  
 concept_curtiss_experienced_balloonist: "Balloniste expérimenté" #NT!
 concept_curtiss_experienced_balloonist_desc: "Ce personnage est un ballon expérimenté qui se déroule souvent sur des promenades en ballon aventureux. Les personnages avec ce trait ont plus de chances de définir de meilleurs enregistrements." #NT!
  
 concept_curtiss_famous_balloonist: "Ballonist célèbre" #NT!
 concept_curtiss_famous_balloonist_desc: "Ce personnage est un célèbre balloniste qui se déroule souvent sur des trajets aventureux en ballon. Les personnages avec ce trait ont plus de chances de définir de meilleurs enregistrements." #NT!
  
 ###DUBOIS### 
 concept_dubois_natural_history: "Histoire naturelle" #NT!
 concept_dubois_natural_history_desc: "#b Natural History#! est l'une des principales caractéristiques de [concept_morgenroete]. Le 19e siècle a vu de nombreuses grandes découvertes d'histoire naturelle: de nombreuses grandes expéditions, comme celles du Beagle, l'invention de la théorie de l'évolution, la découverte de centaines de milliers de nouvelles espèces et, bien sûr, la découverte de dinosaures. \ N \ nmajor et grands pouvoirs avec une flotte et un amiral peut envoyer un navire sur un [concept_dubois_pacific_expedition]. Sur un #b Pacific Expedition#!, vous pouvez trouver des plantes, des animaux et des fossiles rares, mener des recherches océanographiques, ou observer des phénomènes astronomiques tels que les éclipses solaires. \ N \ n les grands animaux que vous pouvez trouver, le [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')], peuvent être utilisés pour construire un [concept_dubois_zoo] et présenter ces animaux. Plus il y a d'animaux, plus l'effet est grand, le #b ZOO#! a. Vous pouvez trouver ces #b Animal #! sur les expéditions, vous pouvez les récupérer sur votre propre territoire ou demander à d'autres pays de vous les vendre. \ N \ nsmaller des animaux, des plantes et d'autres organismes sont appelés #!2. A #!3 peut collecter un tel spécimen #b. A #!6 #b Naturalist#!#! peut être envoyé sur #!9 aux États avec un modificateur d'état de la forêt tropicale. Si vous n'avez pas un tel état vous-même, vous pouvez acquérir un [concept_morgenroete]0 d'un autre pays. A #!6 #b Naturalist#!#! gagnera [concept_morgenroete]4 lorsqu'ils trouvent des spécimens rares. \ N \ n[concept_morgenroete]5 sont le champ d'un [concept_morgenroete]6, que ce soit des fossiles de plantes, d'insectes ou d'autres petits animaux. #b Fossils#! se trouvent sur #b Expeditions#! ou dans les états avec [concept_dubois_pacific_expedition]1. Si vous avez un #b Grand Formation#!, vous pourriez même être en mesure de trouver [concept_dubois_pacific_expedition]4. Et sinon, vous pouvez en accéder un en achetant un [concept_dubois_pacific_expedition]5. \ N \ nif Votre pays a accès à une chaîne de montagnes qu'un général peut participer au [concept_dubois_pacific_expedition]6 et gagner de meilleurs traits et un bonus de prestige." #NT!
  
 concept_dubois_naturalist: "#b #GREEN Naturalist#!#!" #NT!
 concept_dubois_naturalists: "#b #GREEN Naturalistes#!#!" #NT!
 concept_dubois_naturalist_desc: "#b #GREEN Naturalist#!#! sont des universitaires qui peuvent rassembler [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] et [concept_dubois_specimen]. Ils peuvent être envoyés à un [concept_dubois_pacific_expedition] ou un [concept_dubois_botanical_expedition] où ils peuvent trouver des plantes et des animaux rares qui vous donnent un petit bonus. #b #GREEN Naturalists#!#! Gain #GREEN0 Lorsqu'ils trouvent de nouveaux spécimens rares." #NT!
  
 concept_dubois_paleontologist: "#b #GREEN paléontologue#!#!" #NT!
 concept_dubois_paleontologists: "#b #GREEN paléontologues#!#!" #NT!
 concept_dubois_paleontologist_desc: "#b #GREEN Les paléontologues#!#! sont des universitaires qui creuseront pour [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] et [Concept('concept_dubois_fossil','$concept_dubois_fossils$')]. Pour les récupérer, vous avez besoin d'accéder à un [concept_dubois_formation]. Si vous avez accès à un #b Formation#! soit en le possédant vous-même ou avec un [concept_dubois_paleontological_licence], vous pouvez envoyer votre paléontologue #b sur un #GREEN1. \ Nafter collectionner ou reconstruire 5 #b dinosaur Bones#! Votre #b Paleontologist#! peut construire un #GREEN6. Comme #b #GREEN paléontologues#!#! gain #!#!0, ils iront mieux pour reconstruire #b dinosaur skeletons#! et le #b squeletons#!. Plus le #b Dinosaur Skeletons#!, plus votre #!#!7 fournira de prestige." #NT!
  
 concept_dubois_pacific_expedition: "Expédition du Pacifique" #NT!
 concept_dubois_pacific_expeditions: "Expéditions du Pacifique" #NT!
 concept_dubois_pacific_expedition_desc: "En tant que puissance majeure ou grande, vous pouvez envoyer une expédition dans l'océan Pacifique. Vous devez avoir le #b Empiricism#!, #b vis Frigate#! et #b Dialectics Technology#! recherché, vous avez besoin d'un port et d'une université, ainsi que d'une Navy d'au moins 15 et d'un amiral. \ Non a #b Pacific Expedition#! Vous pouvez trouver des plants rares, [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')], et [Concept('concept_dubois_fossil','$concept_dubois_fossils$')], procéder à des recherches océanographiques, ou observer l'astrono éclipses. Au début de l'expédition #b_3, vous pouvez également choisir un #b scientist#! pour votre expédition, soit un #b Surveyor#!, #!,6, #!,7 ou #!,8. Chacun aidera à apporter de meilleurs rendements dans des événements spécifiques liés à son expertise. \ Nyour Expedition peut choisir un accent sur ce qu'il explore exactement. Il peut être entièrement consacré aux mystères de la mer et améliorer vos connaissances océanographiques et astronomiques; Dans ce cas, seuls les événements océanographiques déclencheront. Si vous explorez les merveilles de la nature, vous serez confronté à des événements botaniques, zoologiques et paléontologiques. De grands pouvoirs auront également la possibilité d'entreprendre une mission de prestige, dans laquelle vous trouverez des artefacts, de la création de postes commerciaux ou de la mise en place de missions - particulièrement utile si vous n'avez pas d'intérêts diplomatiques en Océanie, mais que vous souhaitez essayer d'acquérir au moins une petite colonie par le biais de missionnaires. \ Nyou devra également choisir où exactement votre mission se déplacera vers: Océanie, l'Australie ou l'Indonésie. Chacun propose différents événements et récompenses." #NT!
  
 concept_dubois_habitat: "Habitat" #NT!
 concept_dubois_habitats: "Habitats" #NT!
 concept_dubois_animal_habitat: "Habitat animal" #NT!
 concept_dubois_habitat_desc: "Un #b Habitat#! est une région dans un état où vit un [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animal$')] spécifique. Dans #r Morgenröte#! #b Habitats#! pour les différents animaux existent dans diverses régions d'État. Si vous possédez un #b Habitat#!, vous pouvez transporter le #b Animal #! vers le #!1 ou même les vendre à d'autres pays. \ N \ nif Votre État atteint un #!2 de 2000 ou plus ou n'a plus #!3, le #b Exotic Animal #! ira #!6 Extinct après 10 ans. un [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animal$')]0 dans un état avec un #b Habitat#!" #NT!
  
 concept_dubois_nature_reserve: "Réserve naturelle" #NT!
 concept_dubois_nature_reserves: "Réserves naturelles" #NT!
 concept_dubois_royal_hunting_reserve: "Réserve de chasse royale" #NT!
 concept_dubois_nature_reserve_desc: "Un #b Nature Reserve#! est une zone protégée où vous pouvez protéger ou établir [Concept('concept_dubois_habitat','$concept_dubois_habitats$')]. \ N \ nif Vous avez déjà un #b Habitat#!, vous pouvez le protéger de la destruction par l'influence des humains en construisant le #b Nature Reserve#! Building dans l'État avec le #b Habitat#!. Pour construire un #b Nature Reserve#!, vous devez faire déverrouiller la technologie #b Genetics#! et avoir un état incorporé avec un #b Habitat#! qui est une patrie de l'une de vos cultures principales. \ N \ nif Vous ne possédez pas un #b Habitat#!, vous pouvez construire un #b Nature Reveser#! par le surveg GENETICS#! Technologie déverrouillée et au moins un [Concept('concept_dubois_habitat','$concept_dubois_habitats$')]1 de votre continent dans votre [Concept('concept_dubois_habitat','$concept_dubois_habitats$')]2. \ N \ na #b Nature Reserve#! ne protège pas seulement votre animal #b Habitats#!, il vous permet également de régler #b animaux exotiques #! de votre continent. Ce faisant, vous pouvez protéger tous les animaux exotiques #b #! de votre continent dans un seul état." #NT!
  
 concept_dubois_zoo_animal: "Zoo" #NT!
 concept_dubois_zoo_animals: "Zoo Animals" #NT!
 concept_dubois_exotic_animal: "Animal exotique" #NT!
 concept_dubois_exotic_animals: "Animaux exotiques" #NT!
 concept_dubois_zoo_animal_desc: "Il y a beaucoup d'animaux dans le monde que votre [concept_dubois_naturalist] peut attraper. Pour prendre un #b exotique animal#!, vous avez besoin d'un état avec un [concept_dubois_habitat]. Alternativement, vous pouvez acheter un #b Animal #! exotique dans un pays avec un #b Habitat#! \ Nonce capturé, le #b Zoo Animal #! peut être envoyé à votre #b0 qui vous permettra d'étendre le #b Zoo#!." #NT!
  
 concept_dubois_zoo: "Zoo" #NT!
 concept_dubois_zoos: "Zoos" #NT!
 concept_dubois_zoo_desc: "Un #b ZOO#! est un bâtiment spécial que vous pouvez construire après avoir rassemblé 5 [concept_dubois_zoo_animal]. Le #b ZOO#! abrite vos #b Animal #!, votre collection de [concept_dubois_specimen] et votre collection paléontologique." #NT!
  
 concept_dubois_specimen: "Spécimen" #NT!
 concept_dubois_specimens: "Spécimens" #NT!
 concept_dubois_specimen_desc: "Les différents insectes, plantes et animaux plus petits qu'un [concept_dubois_naturalist] peuvent collecter, sont appelés #b spécimen#!. Vous pouvez utiliser le spécimen #b pour construire un jardin botanique ou une collection d'échantillons dans votre [concept_dubois_zoo]." #NT!
  
 concept_dubois_botanical_expedition: "Expédition botanique" #NT!
 concept_dubois_botanical_expeditions: "Expéditions botaniques" #NT!
 concept_dubois_botanical_expedition_desc: "Vous pouvez envoyer un [concept_dubois_naturalist] sur une expédition botanique #b #b #! Expédition botanique#!. Mais parfois, ils trouveront une plante rare qui fera un excellent ajout à la collection botanique d'un #b3." #NT!
  
 concept_dubois_botanical_licence: "Licence botanique" #NT!
 concept_dubois_botanical_licences: "Licences botaniques" #NT!
 concept_dubois_botanical_licence_desc: "Si vous n'avez pas accès à un État avec le modificateur d'état Rainforest, vous pouvez toujours envoyer un [concept_dubois_botanical_expedition] en acquérant une licence botanique #b à partir d'un pays qui le fait. Vous devrez payer une petite somme d'argent, mais cela vous permettra de collecter [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] et de trouver des plantes rares." #NT!
  
 concept_dubois_fossil: "Fossile" #NT!
 concept_dubois_fossils: "Fossiles" #NT!
 concept_dubois_fossil_desc: "Un [concept_dubois_paleontologist] peut découvrir #b fossils#! des plantes et des animaux, qui sont longtemps éteints, si vous avez découvert un [concept_dubois_formation]." #NT!
  
 concept_dubois_dinosaur_bone: "Os de dinosaure" #NT!
 concept_dubois_dinosaur_bones: "Os de dinosaure" #NT!
 concept_dubois_dinosaur_bone_desc: "Un [concept_dubois_paleontologist] peut trouver des os de dinosaures dans un grand [Concept('concept_dubois_formation','$concept_dubois_formations$')]. \ Nan #b Paléontologue expérimenté #! peut également tenter de reconstruire un #b dinosaur os os#! à partir de 20 fragments [Concept('concept_dubois_fossil','$concept_dubois_fossils$')]. Un #b Dinosaur Bone#! ne peut être reconstruit que si au moins un os de dinosaure est disponible pour l'orientation. \ NTO effectuer l'une des actions, le paléontologue ne doit pas être épuisé ou occupé. Son succès dépend en grande partie du [concept_academics_experience] paléontologique. \ N#b Les os de dinosaures sont utilisés pour reconstruire [Concept('concept_dubois_formation','$concept_dubois_formations$')]2." #NT!
  
 concept_dubois_dinosaur_skeleton: "Squelette de dinosaure" #NT!
 concept_dubois_dinosaur_skeletons: "Squelettes de dinosaure" #NT!
 concept_dubois_dinosaur_skeleton_desc: "À partir de cinq [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] d'une région continentale, un [concept_dubois_paleontologist] peut reconstruire un dinosaure complet. Pour reconstruire un squelette de dinosaure #b, vous avez besoin de 5 #b os dinosaur ons#! de la même région. \ Nhopes avec votre paléontologue #b IST assez expérimenté pour reconstruire le droit squelette #b dinosaure. Sinon, vous risquez de perdre du prestige pour votre [concept_dubois_paleontologist]0. Cependant, si un squelette de dinosaure #b a été mal reconstruit, vous pouvez tenter de le réparer, ce qui entraînera une reconstruction légèrement meilleure." #NT!
  
 concept_dubois_paleontological_collection: "Collection paléontologique" #NT!
 concept_dubois_paleontological_collections: "Collections paléontologiques" #NT!
 concept_dubois_paleontological_collection_desc: "La collection paléontologique #b est le domaine de votre [concept_dubois_paleontologist]. Là, vous y trouverez tous les [Concept('concept_dubois_fossil','$concept_dubois_fossils$')], [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] et [Concept('concept_dubois_dinosaur_skeleton','$concept_dubois_dinosaur_skeletons$')] de votre nation. \ Nôtre mieux votre Paléontologue #b Monté ces squelettes de dinosaur #b, plus votre collection #b permettra. Si votre paléontologue #b a monté le #b Skeletons#! horriblement mauvais, cela pourrait même vous faire perdre du prestige. Mais peut-être que le même ou un autre #b paléontologue#! peut les remonter mieux!" #NT!
  
 concept_dubois_formation: "Formation" #NT!
 concept_dubois_formations: "Formations" #NT!
 concept_dubois_geological_formation: "Formation géologique" #NT!
 concept_dubois_formation_desc: "Il existe deux types de formations #b#!, Les formations normales permettent à votre [concept_dubois_paleontologist] de collecter [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] tandis que de grandes formations permettent la découverte de [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')]. \ N#b Formations#! peuvent être découvertes par votre paléontologue ou lorsque vous recherchez la technologie de paléontologie. \ Nif vous ne faites pas un #b pour accéder à vous-même." #NT!
  
 concept_dubois_paleontological_expedition: "Expédition paléontologique" #NT!
 concept_dubois_paleontological_expeditions: "Expéditions paléontologiques" #NT!
  
 concept_dubois_paleontological_licence: "Licence paléontologique" #NT!
 concept_dubois_paleontological_licences: "Licences paléontologiques" #NT!
 concept_dubois_paleontological_licence_desc: "Si vous n'avez pas accès à un [concept_dubois_formation], vous pouvez essayer d'accéder à un avec un #b Paleontology Licondem #!. Cette action diplomatique vous permet d'accéder à un #b grande formation #!. pour pouvoir l'utiliser, vous devez être un grand ou un grand pouvoir et l'autre nation a besoin d'un #b, espérons-le, mais vous en aurez la peine." #NT!
  
 concept_dubois_mountaineering: "Alpinisme" #NT!
 concept_dubois_mountaineering_desc: "Les pays qui possèdent au moins un [concept_dubois_mountain] ou qui ont une licence d'alpinisme #b #! avec un pays qui en a un peut participer à l'alpinisme. Pour démarrer un #b Mountain Expedition#!, vous avez besoin à la fois des technologies #b Prospecting#! et #b Nationalism#! ainsi qu'un général qui a soit le #b Mountainer#!, #b Explorer#!, #b commandant de montagne Le général sera le principal alpiniste. Ensuite, vous choisirez le sommet pour grimper. \ N a plus haut les montagnes, plus l'ascension est dangereuse. Les montagnes sont classées en fonction de leur hauteur en mètres allant de moins de 4000 mètres à plus de 8000 mètres. Le succès dépend des technologies militaires recherchées, de l'âge et de la santé du leader et de leurs caractéristiques. Les avalanches et les pentes abruptes peuvent présenter un risque majeur qui menace toute l'effort. \ Nyou peut même envoyer un #b9 supplémentaire lors du voyage. Un #!0 ou un #!1 aidera à en savoir plus sur la montagne sur laquelle vous avez grimpé. \ Nin à la fin, vous obtiendrez un bonus de prestige et votre général développera de meilleurs traits qui les aideront également au combat pour l'alpinisme." #NT!
  
 concept_dubois_mountain: "Montagne" #NT!
 concept_dubois_mountains: "Montagnes" #NT!
 concept_dubois_mountain_desc: "Il existe de nombreux #b Mountains#! qui peuvent être grimpés. \ N \ n#V Amérique du Nord: #! \ n#b Mount McKinley#! (Alaska), 6190 mètres \ n#b Mount Logan#! (Territoire Yukon), 5959 mètres \ n#b CitlalTepepetl#! (Méoxic Whitney#! (Californie), 4421 mètres \ n \ n#V Amérique du Sud: #! \ n#b Aconcagua#! (Mendoza), 6267 mètres \ n#b Huascarán#! (Territoire de Lima), 6768 mètres \ n#b_0 Chimborazo#! (Equator), 6267 mètres \ n \ n#V Europe: #! \ n#b Shkara#! (Greater Caucase), 5642 mètres \ n#b Dufourspitze#! (Dufourspitze), 4634 mètres \ n#b Mattehorn#! (West Switzer), 4478 Matterhorn#! (West Switzer), 4478 Matterhorn#! (West Switzer), 4478 Matterhorn#! (West Switzer), 4478 Matterhorn#! (West Switzer), 4478 Matterhorn#! (West Switzer), 4478 Matterhorn#! (West Switzer), 4478 Matterhorn#!. Aiguille verte#! (Savoy), 4122 mètres \ n#b pico de aneto#! (aragon), 3404 mètres \ n \ n#V Africa: #! \ n#b kibo#! (tanganyika), 5895 mètres \ n#b Batan#! (Kenya), 5199 mètres \ n#b Mount (Ouganda), 5109 mètres \ n#b Kamerunberg#! (South Cameroun), 4095 mètres \ n \ n#V Asia: #! \ n#b kamet#! (Delhi), 7756 mètres \ n#b Chogolisa#! (Kashmir), 7665 mètres \ n#b Kabru#! (Himalaya), 7412 mètres \ n#b Kaufmann Peak#! (Tadjikistan), 7134 mètres \ n \ n#V Australia et Océanie: #! \ n#b Mount Wilhelm#! (Eastern Nouveau Guinée), 4121 mètres \ n#b Mont Cook#! (South Island), 3724 Metters Metters Metters Metters Metters Metters Metters" #NT!
  
