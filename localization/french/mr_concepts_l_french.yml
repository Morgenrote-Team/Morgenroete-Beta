l_french:
 ag_morgenroete_name: "[concept_morgenroete]"
 ag_morgenroete_tooltip: "Nous avons au moins une action possible pour une fonctionnalité [concept_morgenroete]."
 concept_morgenroete: "#r Morgenröte#!"
 concept_morgenroete_mr: "M"
 concept_morgenroete_concept: "Concept"
 concept_pm_academics_university_humanities: "#b #BLUE Humanities-anthropological focus#!#!"
 concept_pm_academics_university_natural_history: "#b #GREEN Focus sur l'histoire naturelle#!#!"
 concept_pm_academics_university_mathematics: "#b #ORANGE Focus-technique mathématique #!#!"
 concept_academics_university_specialization: "Focus universitaire"
 concept_academics_academic: "Académique"
 concept_academics_academics: "Universitaires"
 concept_academics_scientist: "Scientifique"
 concept_academics_scientists: "Scientifiques"
 concept_academics_academic_desc: "In [concept_morgenroete] #b Academics#! are special characters that allow you to use certain mechanics of the mod. You can get #b Academics#! in some events or by aquiring enough [concept_academics_progress].\nCurrently these #b Academics#! exist:\n - [concept_tesla_engineer]\n - [concept_mendelejew_chemist]\n - [concept_verrier_astronomer]\n - [concept_agassiz_geologist]\n - [concept_dubois_paleontologist]\n - [concept_dubois_naturalist]\n - [concept_theiler_biologist]\n - [concept_panum_physician]\n - [concept_lepsius_archaeologist]\n - [concept_andersson_anthropologist]"
 concept_academics_progress: "Progrès académique"
 concept_academics_progress_desc: "En ajoutant 360 #b Progress académique #!, vous pouvez gagner un nouveau [concept_academics_academic]. Pour avoir même accès à #b Academic Progress#!, vous devez avoir la technologie #b Academia#! et au moins un #b University#!. \ Nyour #b Academic Progress#! est influencé par divers facteurs. Plus vous avez #!1, plus vous gagnez rapidement #b Progrès académique #! par exemple. Un autre facteur est le pourcentage de pop académiques dans votre pays. Vous obtiendrez le maximum #b Progress académique #! pour #!6 2% #! ou plus de pop académiques. De meilleures écoles, et une intelligentsia heureuse aident également à gagner #b progrès académique #!. Enfin, certains des foyers technologiques et des bâtiments spéciaux comme le [concept_academics_academic]0 ou le [concept_academics_academic]1 fourniront également des progrès académiques #b supplémentaires."
 concept_academics_scientific_society: "Société scientifique"
 concept_academics_scientific_societies: "Sociétés scientifiques"
 concept_academics_scientific_society_desc: "Le #b Scientific Society#! est une société de vos pays les plus brillants. Il représente les scientifiques et les universitaires de votre pays et vous permet de visiter votre [Concept('concept_academics_academic','$concept_academics_academics$')]. \ N \ nthe #b Scientific Society#! pourrait vous tasser avec [Concept('concept_academics_academic_mission','$concept_academics_missions$')] qui vous donnera des récompenses utiles."
 concept_academics_experience: "Expérience"
 concept_academics_experience_desc: "Certains universitaires rassemblent #b Experience#! au cours de leur vie. Dans [concept_morgenroete], les caractères obtiennent #b Experience#! lorsqu'ils sont créés. Habituellement, ils obtiennent 10 #b Experience#! pour chaque année de plus de 30 ans. \ Nadditionally, ils gagnent #b Experience#! en faisant leur travail, par exemple pour trouver un nouveau [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]. Ils acquièrent #b Experience#! passivement chaque année également. \ Na Le caractère qui obtient 100 #b Experience#! obtiendra le #b Trait#! expérimenté. Si un personnage atteint 300 #b Experience#!, il obtient le #b célèbre trait#! \ n que l'expérience #b #b d'un personnage, mieux c'est leur travail. Un [concept_morgenroete]2 expérimenté ou célèbre par exemple trouve plus [concept_morgenroete]3 et est meilleur dans la construction d'un [concept_morgenroete]4."
 concept_academics_academic_mission: "Mission académique"
 concept_academics_academic_missions: "Missions académiques"
 concept_academics_mission: "Mission"
 concept_academics_missions: "Missions"
 concept_academics_academic_mission_desc: "Votre [concept_academics_scientific_society] vous demandera parfois d'atteindre un certain objectif. Ces objectifs pourraient être de trouver une quantité spécifique de [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')], [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] ou de choses similaires. D'autres missions #b#! pourraient avoir besoin de vous pour trouver la planète x ou pour obtenir un [Concept('concept_lepsius_exhibition','$concept_lepsius_excellent_exhibition$')]. \ Nif vous échouez une mission #b Mission#! Votre #b Scientific Society#! sera malheureuse mais terminer une mission vous produira des récompenses utiles."
 concept_curtiss_aviation: "Aviation"
 concept_curtiss_aviation_desc: "#b Aviation#! est l'une des principales caractéristiques de [concept_morgenroete]. Les 19e et 20e siècles ont vu la montée en puissance du vol humain. D'abord sous la forme de #b Balloons#! et #b Airships#!, puis avec #b planes#!. Le vol était une activité prestigieuse et a permis d'atteindre de nouveaux horizons. \ N \ nmany Les pays commencent leur voyage vers le ciel au début du jeu, lorsqu'ils commencent à parrainer un [Concept('concept_curtiss_balloonist_role','$concept_curtiss_balloonist_role_only_balloonist$')] pour battre des records. Briser l'une des récidives donnera à votre pays un coup de pouce technologique ainsi qu'un modificateur de prestige. \ Nresearching La technologie Zeppelin vous permettra de mener un #!0 si vous avez accès au pôle Nord et à un #!1. \ Nreseching plus loin dans le chemin de l'aviation vous permettra d'utiliser plusieurs nouveaux mécanismes. Vous pourrez construire #!2 qui produit les nouveaux vols #b #! bons ainsi que #b Services#!. Le #b Airport#! permettra à un #!9 de croître qui vous permettra d'utiliser l'action diplomatique [concept_morgenroete]0. Le #b Airpace Convention#! vous permettra d'accéder aux États et [concept_morgenroete]3 ainsi qu'au pôle Nord. Si votre #b Airline#! augmente suffisamment, vous pourrez construire un gigantesque dirigeable ou le plus grand avion du monde. \ La caractéristique la plus excitante arrive au début du 20e siècle: vous pourrez concourir au [concept_morgenroete]6. Le #b Schneider Trophy#! est une race d'hydravion dans lequel différents pays se disputent. Si vous gagnez, vous obtiendrez également du prestige et organisera le prochain événement. Et si vous parvenez à gagner la course 3 fois, vous garderez le #b Schneider Trophy#!."
 concept_curtiss_balloonist_role: "Rôle de ballonist"
 concept_curtiss_balloonist_role_only_balloonist: "Aéronaute"
 concept_curtiss_balloonists_role: "Ballonistes"
 concept_curtiss_balloonist_role_desc: "Un #b Balloonist#! est un caractère spécial qui peut être parrainé par une nation. Habituellement, les pays bien développés ou occidentaux parraineront #b ballonist#! et s'affronteront pour les dossiers et les nouvelles conclusions. Les Balloonists #b #! effectueront au hasard des vols et obtiendront des records soit pour la distance la plus longue, le temps de vol le plus long ou le vol le plus élevé. Pour chaque vol de ballon, le #b Balloonist#! obtiendra une expérience et un classement qui augmentera la chance de nouveaux records. Mais sachez que le ballon est une entreprise dangereuse et de nombreux ballonistes meurent tôt, surtout s'ils sont malades, alcooliques ou toxicomanes."
 concept_curtiss_arctic_expedition: "Expédition arctique"
 concept_curtiss_arctic_expeditions: "Expéditions arctiques"
 concept_curtiss_arctic_expedition_desc: "Si vous avez fait des recherches sur la technologie #b Zeppelin#!, ayez un [concept_verrier_observatory] avec une station météo #b #!, un [concept_curtiss_pilot] et un accès à un État proche du pôle Nord, vous pouvez effectuer un #b Arctic Expedition#!. Vous pouvez ces états sont #b Greenland#!, #b Northern Norway#!, #b Alaska#!, #b nunavut#! et #b nenetsia#!. Vous pouvez avoir accès en soit en soit en ayant un #!8 avec le propriétaire."
 concept_curtiss_pilot: "Pilote"
 concept_curtiss_pilots: "Pilotes"
 concept_curtiss_pilot_desc: "Un #b Pilot#! est un caractère avec le #b Pilot Trait#!. #b pilotes#! ont de faibles chances de reprendre après la découverte #b Aviation #!. De plus, dans les batailles sur un front en utilisant la reconnaissance aérienne comme méthode de production, il est possible qu'un #b Pilot#! émerge de la bataille via un événement. De meilleures technologies telles que des avions et de l'aviation moderne, mais également de l'établissement d'une école pilote via des décisions permet une meilleure chance qu'un personnage ait le trait #b Pilot#!. \ N#b pilotes#! vous aider de différentes manières. #b Airlines#! peut être intéressé par les pilotes #b pour stimuler leur image; Dans la bataille du #!8, les pilotes #b expérimentés ont une meilleure chance; et un #b pilot#! est nécessaire pour entreprendre le #b3. #b pilotes#! peut également être mis à niveau vers les pilotes ACE via un événement s'ils sont déployés sur un front."
 concept_curtiss_airport: "Aéroport"
 concept_curtiss_airports: "Aéroports"
 concept_curtiss_airport_desc: "Un #b Airport#! est un bâtiment qui est déverrouillé par la technologie #b Aviation#! moderne. Il s'agit d'un bâtiment purement civil et fournit des services [GetGoods('air_travel').GetName] et #b#! mais consomme une variété de biens à partir de [GetGoods('tools').GetName], [GetGoods('paper').GetName], [GetGoods('aeroplanes').GetName] et #!0. Plus tard, il a également besoin de #!1, #!2 et #!3. \ Nif vous avez suffisamment de #b aéroports#! Un #!6 sera fondé et avec vos aéroports #b croissants, la compagnie aérienne #b augmentera également et offrira plus de bonus."
 concept_curtiss_airline: "Compagnie aérienne"
 concept_curtiss_airlines: "Compagnies aériennes"
 concept_curtiss_airline_desc: "Une #b Airline#! est une entreprise ou une institution gérée par le gouvernement qui offre [GetGoods('air_travel').GetName] du niveau local jusqu'aux vols internationaux à la fin du jeu. #b Airlines#! fournit également divers autres bonus. #b Airlines#! a besoin de [Concept('concept_curtiss_airport','$concept_curtiss_airports$')] pour effectuer ces vols. Si vous vous développez #b Airports#!, le #b Airlines#!. \ Nif votre #b Airline#! est gérée par le gouvernement, vous aurez l'occasion de construire un énorme dirigeable et de le laisser parcourir de grandes distances. Si votre #b Airline#! est publique ou privée, vous pourriez plutôt avoir la possibilité de construire le plus grand avion jamais créé."
 concept_curtiss_airspace_convention: "Convention d'espace aérien"
 concept_curtiss_airspace_conventions: "Conventions d'espace aérien"
 concept_curtiss_airspace_convention_desc: "Le #b Airpace Convention#! est un [concept_diplomatic_pact] important qui vous permet d'interagir avec des régions loin de votre influence. Si vous avez une convention d'espace aérien #b avec une autre nation qui a un [concept_lepsius_excavation_site], vous pourrez mener un [concept_lepsius_expedition] sans avoir un [concept_active_interest] dans la région. \ NAN #b AIRSPACE Convention#! vous permettra d'envoyer un #!0 si vous ne possédez pas l'un des états nécessaires."
 concept_curtiss_schneider_trophy: "Trophée Schneider"
 concept_curtiss_schneider_trophy_desc: "La lutte pour ce prestigieux trophée, que le Français Jacques Schneider a donné peu de temps avant la Première Guerre mondiale, était principalement destiné à stimuler le développement des hydravions. Au fil du temps, la course de ce trophée est devenue une course de nations, le Royaume-Uni, les États-Unis et l'Italie en particulier en apportant à leurs équipes un soutien massif pour remporter le trophée convoité. En fait, le développement technologique a bénéficié du #b Schneider Trophy#! en utilisant des réservoirs plus rapides et plus avancés. \ NTHE #b Schneider Trophy#! peut être fondé s'il y a 5 nations qui ont inventé le #b plans \ n la gagnante de la victoire du Port et un Centre d'urban de niveau 10. Une nation avec une école pilote et un grand [concept_curtiss_airline] aura un avantage par exemple. Un grand [concept_curtiss_pilot] et un financement massif aideront également à gagner le trophée. \ N le vainqueur du dernier trophée sera en mesure de tenir le prochain s'ils ont un port ou sont en Suisse avec ses nombreux lacs. Gagner le trophée 3 fois de suite est encore meilleur, car la nation gardera le trophée pour toujours et obtiendra un bonus de prestige pour cela."
 concept_curtiss_balloonist: "Aéronaute"
 concept_curtiss_balloonist_desc: "Ce personnage est un ballonist qui se poursuit souvent sur des trajets aventureux en ballon."
 concept_curtiss_experienced_balloonist: "Balloniste expérimenté"
 concept_curtiss_experienced_balloonist_desc: "Ce personnage est un ballon expérimenté qui se déroule souvent sur des promenades en ballon aventureux. Les personnages avec ce trait ont plus de chances de définir de meilleurs enregistrements."
 concept_curtiss_famous_balloonist: "Ballonist célèbre"
 concept_curtiss_famous_balloonist_desc: "Ce personnage est un célèbre balloniste qui se déroule souvent sur des trajets aventureux en ballon. Les personnages avec ce trait ont plus de chances de définir de meilleurs enregistrements."
 concept_dubois_natural_history: "Histoire naturelle"
 concept_dubois_natural_history_desc: "#b Natural History#! est l'une des principales caractéristiques de [concept_morgenroete]. Le 19e siècle a vu de nombreuses grandes découvertes d'histoire naturelle: de nombreuses grandes expéditions, comme celles du Beagle, l'invention de la théorie de l'évolution, la découverte de centaines de milliers de nouvelles espèces et, bien sûr, la découverte de dinosaures. \ N \ nmajor et grands pouvoirs avec une flotte et un amiral peut envoyer un navire sur un [concept_dubois_pacific_expedition]. Sur un #b Pacific Expedition#!, vous pouvez trouver des plantes, des animaux et des fossiles rares, mener des recherches océanographiques, ou observer des phénomènes astronomiques tels que les éclipses solaires. \ N \ n les grands animaux que vous pouvez trouver, le [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')], peuvent être utilisés pour construire un [concept_dubois_zoo] et présenter ces animaux. Plus il y a d'animaux, plus l'effet est grand, le #b ZOO#! a. Vous pouvez trouver ces #b Animal #! sur les expéditions, vous pouvez les récupérer sur votre propre territoire ou demander à d'autres pays de vous les vendre. \ N \ nsmaller des animaux, des plantes et d'autres organismes sont appelés #!2. A #!3 peut collecter un tel spécimen #b. A #!6 #b Naturalist#!#! peut être envoyé sur #!9 aux États avec un modificateur d'état de la forêt tropicale. Si vous n'avez pas un tel état vous-même, vous pouvez acquérir un [concept_morgenroete]0 d'un autre pays. A #!6 #b Naturalist#!#! gagnera [concept_morgenroete]4 lorsqu'ils trouvent des spécimens rares. \ N \ n[concept_morgenroete]5 sont le champ d'un [concept_morgenroete]6, que ce soit des fossiles de plantes, d'insectes ou d'autres petits animaux. #b Fossils#! se trouvent sur #b Expeditions#! ou dans les états avec [concept_dubois_pacific_expedition]1. Si vous avez un #b Grand Formation#!, vous pourriez même être en mesure de trouver [concept_dubois_pacific_expedition]4. Et sinon, vous pouvez en accéder un en achetant un [concept_dubois_pacific_expedition]5. \ N \ nif Votre pays a accès à une chaîne de montagnes qu'un général peut participer au [concept_dubois_pacific_expedition]6 et gagner de meilleurs traits et un bonus de prestige."
 concept_dubois_naturalist: "#b #GREEN Naturalist#!#!"
 concept_dubois_naturalists: "#b #GREEN Naturalistes#!#!"
 concept_dubois_naturalist_desc: "#b #GREEN Naturalist#!#! sont des universitaires qui peuvent rassembler [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] et [concept_dubois_specimen]. Ils peuvent être envoyés à un [concept_dubois_pacific_expedition] ou un [concept_dubois_botanical_expedition] où ils peuvent trouver des plantes et des animaux rares qui vous donnent un petit bonus. #b #GREEN Naturalists#!#! Gain #GREEN0 Lorsqu'ils trouvent de nouveaux spécimens rares."
 concept_dubois_paleontologist: "#b #GREEN paléontologue#!#!"
 concept_dubois_paleontologists: "#b #GREEN paléontologues#!#!"
 concept_dubois_paleontologist_desc: "#b #GREEN Les paléontologues#!#! sont des universitaires qui creuseront pour [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] et [Concept('concept_dubois_fossil','$concept_dubois_fossils$')]. Pour les récupérer, vous avez besoin d'accéder à un [concept_dubois_formation]. Si vous avez accès à un #b Formation#! soit en le possédant vous-même ou avec un [concept_dubois_paleontological_licence], vous pouvez envoyer votre paléontologue #b sur un #GREEN1. \ Nafter collectionner ou reconstruire 5 #b dinosaur Bones#! Votre #b Paleontologist#! peut construire un #GREEN6. Comme #b #GREEN paléontologues#!#! gain #!#!0, ils iront mieux pour reconstruire #b dinosaur skeletons#! et le #b squeletons#!. Plus le #b Dinosaur Skeletons#!, plus votre #!#!7 fournira de prestige."
 concept_dubois_pacific_expedition: "Expédition du Pacifique"
 concept_dubois_pacific_expeditions: "Expéditions du Pacifique"
 concept_dubois_pacific_expedition_desc: "En tant que puissance majeure ou grande, vous pouvez envoyer une expédition dans l'océan Pacifique. Vous devez avoir le #b Empiricism#!, #b vis Frigate#! et #b Dialectics Technology#! recherché, vous avez besoin d'un port et d'une université, ainsi que d'une Navy d'au moins 15 et d'un amiral. \ Non a #b Pacific Expedition#! Vous pouvez trouver des plants rares, [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')], et [Concept('concept_dubois_fossil','$concept_dubois_fossils$')], procéder à des recherches océanographiques, ou observer l'astrono éclipses. Au début de l'expédition #b_3, vous pouvez également choisir un #b scientist#! pour votre expédition, soit un #b Surveyor#!, #!,6, #!,7 ou #!,8. Chacun aidera à apporter de meilleurs rendements dans des événements spécifiques liés à son expertise. \ Nyour Expedition peut choisir un accent sur ce qu'il explore exactement. Il peut être entièrement consacré aux mystères de la mer et améliorer vos connaissances océanographiques et astronomiques; Dans ce cas, seuls les événements océanographiques déclencheront. Si vous explorez les merveilles de la nature, vous serez confronté à des événements botaniques, zoologiques et paléontologiques. De grands pouvoirs auront également la possibilité d'entreprendre une mission de prestige, dans laquelle vous trouverez des artefacts, de la création de postes commerciaux ou de la mise en place de missions - particulièrement utile si vous n'avez pas d'intérêts diplomatiques en Océanie, mais que vous souhaitez essayer d'acquérir au moins une petite colonie par le biais de missionnaires. \ Nyou devra également choisir où exactement votre mission se déplacera vers: Océanie, l'Australie ou l'Indonésie. Chacun propose différents événements et récompenses."
 concept_dubois_habitat: "Habitat"
 concept_dubois_habitats: "Habitats"
 concept_dubois_animal_habitat: "Habitat animal"
 concept_dubois_habitat_desc: "Un #b Habitat#! est une région dans un état où vit un [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animal$')] spécifique. Dans #r Morgenröte#! #b Habitats#! pour les différents animaux existent dans diverses régions d'État. Si vous possédez un #b Habitat#!, vous pouvez transporter le #b Animal #! vers le #!1 ou même les vendre à d'autres pays. \ N \ nif Votre État atteint un #!2 de 2000 ou plus ou n'a plus #!3, le #b Exotic Animal #! ira #!6 Extinct après 10 ans. un [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animal$')]0 dans un état avec un #b Habitat#!"
 concept_dubois_nature_reserve: "Réserve naturelle"
 concept_dubois_nature_reserves: "Réserves naturelles"
 concept_dubois_royal_hunting_reserve: "Réserve de chasse royale"
 concept_dubois_nature_reserve_desc: "Un #b Nature Reserve#! est une zone protégée où vous pouvez protéger ou établir [Concept('concept_dubois_habitat','$concept_dubois_habitats$')]. \ N \ nif Vous avez déjà un #b Habitat#!, vous pouvez le protéger de la destruction par l'influence des humains en construisant le #b Nature Reserve#! Building dans l'État avec le #b Habitat#!. Pour construire un #b Nature Reserve#!, vous devez faire déverrouiller la technologie #b Genetics#! et avoir un état incorporé avec un #b Habitat#! qui est une patrie de l'une de vos cultures principales. \ N \ nif Vous ne possédez pas un #b Habitat#!, vous pouvez construire un #b Nature Reveser#! par le surveg GENETICS#! Technologie déverrouillée et au moins un [Concept('concept_dubois_habitat','$concept_dubois_habitats$')]1 de votre continent dans votre [Concept('concept_dubois_habitat','$concept_dubois_habitats$')]2. \ N \ na #b Nature Reserve#! ne protège pas seulement votre animal #b Habitats#!, il vous permet également de régler #b animaux exotiques #! de votre continent. Ce faisant, vous pouvez protéger tous les animaux exotiques #b #! de votre continent dans un seul état."
 concept_dubois_zoo_animal: "Zoo"
 concept_dubois_zoo_animals: "Zoo Animals"
 concept_dubois_exotic_animal: "Animal exotique"
 concept_dubois_exotic_animals: "Animaux exotiques"
 concept_dubois_zoo_animal_desc: "Il y a beaucoup d'animaux dans le monde que votre [concept_dubois_naturalist] peut attraper. Pour prendre un #b exotique animal#!, vous avez besoin d'un état avec un [concept_dubois_habitat]. Alternativement, vous pouvez acheter un #b Animal #! exotique dans un pays avec un #b Habitat#! \ Nonce capturé, le #b Zoo Animal #! peut être envoyé à votre #b0 qui vous permettra d'étendre le #b Zoo#!."
 concept_dubois_zoo: "Zoo"
 concept_dubois_zoos: "Zoos"
 concept_dubois_zoo_desc: "Un #b ZOO#! est un bâtiment spécial que vous pouvez construire après avoir rassemblé 5 [concept_dubois_zoo_animal]. Le #b ZOO#! abrite vos #b Animal #!, votre collection de [concept_dubois_specimen] et votre collection paléontologique."
 concept_dubois_specimen: "Spécimen"
 concept_dubois_specimens: "Spécimens"
 concept_dubois_specimen_desc: "Les différents insectes, plantes et animaux plus petits qu'un [concept_dubois_naturalist] peuvent collecter, sont appelés #b spécimen#!. Vous pouvez utiliser le spécimen #b pour construire un jardin botanique ou une collection d'échantillons dans votre [concept_dubois_zoo]."
 concept_dubois_botanical_expedition: "Expédition botanique"
 concept_dubois_botanical_expeditions: "Expéditions botaniques"
 concept_dubois_botanical_expedition_desc: "You can send a [concept_dubois_naturalist] on a #b Botanical Expedition#! if you have access to a state with [concept_ito_medicinal_plants] either by owning such a state or by acquiring a [concept_dubois_botanical_licence].\nYour #b Naturalist#! will collect [concept_ito_medicinal_plants] and [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] during the one year journey. Sometimes they will find a rare plant that will make a great addition to the botanical collection of a [concept_dubois_zoo]."
 concept_dubois_botanical_licence: "Licence botanique"
 concept_dubois_botanical_licences: "Licences botaniques"
 concept_dubois_botanical_licence_desc: "Si vous n'avez pas accès à un État avec le modificateur d'état Rainforest, vous pouvez toujours envoyer un [concept_dubois_botanical_expedition] en acquérant une licence botanique #b à partir d'un pays qui le fait. Vous devrez payer une petite somme d'argent, mais cela vous permettra de collecter [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] et de trouver des plantes rares."
 concept_dubois_fossil: "Fossile"
 concept_dubois_fossils: "Fossiles"
 concept_dubois_fossil_desc: "Un [concept_dubois_paleontologist] peut découvrir #b fossils#! des plantes et des animaux, qui sont longtemps éteints, si vous avez découvert un [concept_dubois_formation]."
 concept_dubois_dinosaur_bone: "Os de dinosaure"
 concept_dubois_dinosaur_bones: "Os de dinosaure"
 concept_dubois_dinosaur_bone_desc: "Un [concept_dubois_paleontologist] peut trouver des os de dinosaures dans un grand [Concept('concept_dubois_formation','$concept_dubois_formations$')]. \ Nan #b Paléontologue expérimenté #! peut également tenter de reconstruire un #b dinosaur os os#! à partir de 20 fragments [Concept('concept_dubois_fossil','$concept_dubois_fossils$')]. Un #b Dinosaur Bone#! ne peut être reconstruit que si au moins un os de dinosaure est disponible pour l'orientation. \ NTO effectuer l'une des actions, le paléontologue ne doit pas être épuisé ou occupé. Son succès dépend en grande partie du [concept_academics_experience] paléontologique. \ N#b Les os de dinosaures sont utilisés pour reconstruire [Concept('concept_dubois_formation','$concept_dubois_formations$')]2."
 concept_dubois_dinosaur_skeleton: "Squelette de dinosaure"
 concept_dubois_dinosaur_skeletons: "Squelettes de dinosaure"
 concept_dubois_dinosaur_skeleton_desc: "À partir de cinq [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] d'une région continentale, un [concept_dubois_paleontologist] peut reconstruire un dinosaure complet. Pour reconstruire un squelette de dinosaure #b, vous avez besoin de 5 #b os dinosaur ons#! de la même région. \ Nhopes avec votre paléontologue #b IST assez expérimenté pour reconstruire le droit squelette #b dinosaure. Sinon, vous risquez de perdre du prestige pour votre [concept_dubois_paleontologist]0. Cependant, si un squelette de dinosaure #b a été mal reconstruit, vous pouvez tenter de le réparer, ce qui entraînera une reconstruction légèrement meilleure."
 concept_dubois_paleontological_collection: "Collection paléontologique"
 concept_dubois_paleontological_collections: "Collections paléontologiques"
 concept_dubois_paleontological_collection_desc: "La collection paléontologique #b est le domaine de votre [concept_dubois_paleontologist]. Là, vous y trouverez tous les [Concept('concept_dubois_fossil','$concept_dubois_fossils$')], [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] et [Concept('concept_dubois_dinosaur_skeleton','$concept_dubois_dinosaur_skeletons$')] de votre nation. \ Nôtre mieux votre Paléontologue #b Monté ces squelettes de dinosaur #b, plus votre collection #b permettra. Si votre paléontologue #b a monté le #b Skeletons#! horriblement mauvais, cela pourrait même vous faire perdre du prestige. Mais peut-être que le même ou un autre #b paléontologue#! peut les remonter mieux!"
 concept_dubois_formation: "Formation"
 concept_dubois_formations: "Formations"
 concept_dubois_geological_formation: "Formation géologique"
 concept_dubois_formation_desc: "Il existe deux types de formations #b#!, Les formations normales permettent à votre [concept_dubois_paleontologist] de collecter [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] tandis que de grandes formations permettent la découverte de [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')]. \ N#b Formations#! peuvent être découvertes par votre paléontologue ou lorsque vous recherchez la technologie de paléontologie. \ Nif vous ne faites pas un #b pour accéder à vous-même."
 concept_dubois_paleontological_expedition: "Expédition paléontologique"
 concept_dubois_paleontological_expeditions: "Expéditions paléontologiques"
 concept_dubois_paleontological_licence: "Licence paléontologique"
 concept_dubois_paleontological_licences: "Licences paléontologiques"
 concept_dubois_paleontological_licence_desc: "Si vous n'avez pas accès à un [concept_dubois_formation], vous pouvez essayer d'accéder à un avec un #b Paleontology Licondem #!. Cette action diplomatique vous permet d'accéder à un #b grande formation #!. pour pouvoir l'utiliser, vous devez être un grand ou un grand pouvoir et l'autre nation a besoin d'un #b, espérons-le, mais vous en aurez la peine."
 concept_dubois_mountain: "Montagne"
 concept_dubois_mountains: "Montagnes"
 concept_dubois_mountain_desc: "There are many #b Mountains#! that can be climbed.\n\n#V North America:#!\n#b Mount McKinley#! (Alaska), 6190 meters\n#b Mount Logan#! (Yukon Territory), 5959 meters\n#b Citlaltépetl#! (México), 5636 meters\n#b Mount Whitney#! (California), 4421 meters\n\n#V South America:#!\n#b Aconcagua#! (Mendoza), 6267 meters\n#b Huascarán#! (Lima Territory), 6768 meters\n#b Illimani#! (La Paz), 6438 meters\n#b Chimborazo#! (Ecuador), 6267 meters\n\n#V Europe:#!\n#b Shkara#! (Greater Caucasus), 5642 meters\n#b Dufourspitze#! (Dufourspitze), 4634 meters\n#b Matterhorn#! (West Switzerland), 4478 meters\n#b Aiguille Verte#! (Savoy), 4122 meters\n#b Pico de Aneto#! (Aragon), 3404 meters\n\n#V Africa:#!\n#b Kibo#! (Tanganyika), 5895 meters\n#b Mount Kenya#! (Kenya), 5199 meters\n#b Mount Stanley#! (Uganda), 5109 meters\n#b Kamerunberg#! (South Cameroon), 4095 meters\n\n#V Asia:#!\n#b Kamet#! (Delhi), 7756 meters\n#b Chogolisa#! (Kashmir), 7665 meters\n#b Kabru#! (Himalayas), 7412 meters\n#b Kaufmann Peak#! (Tajikistan), 7134 meters\n\n#V Australia & Oceania:#!\n#b Mount Wilhelm#! (Eastern New Guinea), 4121 meters\n#b Mount Cook#! (South Island), 3724 meters"
 concept_elgar_music: "Culture musicale"
 concept_elgar_opera: "Opéra"
 concept_elgar_operas: "Opéras"
 concept_elgar_opera_house: "Opéra"
 concept_elgar_opera_houses: "Opéra"
 concept_elgar_musical_tradition: "Tradition musicale"
 concept_elgar_impressionism: "Impressionnisme"
 concept_elgar_expressionism: "Expressionnisme"
 concept_elgar_art_nouveau: "Art Nouveau"
 concept_elgar_architecture: "Architecture"
 concept_elgar_architectural_project: "Projet architectural"
 concept_elgar_architectural_projects: "Projets architecturaux"
 concept_lepsius_archaeology: "Archéologie"
 concept_lepsius_archaeology_desc: "#b Archaeology#! est l'une des principales caractéristiques de [concept_morgenroete]. \ N \ n there sont 8 [Concept('concept_lepsius_excavation_site','$concept_lepsius_excavation_sites$')] sur la carte. \ N \ n Pour pouvoir envoyer un [concept_lepsius_expedition], vous devez rechercher la technologie de l'antiquarisme, avoir un [concept_lepsius_archaeological_team] et avoir des acèmes à l'un des sites d'excavation. Vous pouvez soit avoir accès en possédant le site vous-même, soit en demandant à un pays avec un site un [concept_lepsius_excavation_licence]. \ N \ nyou peut désormais envoyer une expédition archéologique à l'un des sites d'excavation. Votre équipe découvrira [Concept('concept_lepsius_artifact','$concept_lepsius_minor_artifacts$')] et dans de très rares cas et l'aide d'un bon [concept_lepsius_archaeologist], vous pourriez même trouver un [concept_lepsius_major_artifact]. \ N \ nonce Votre équipe revient avec les artefacts, vous pourriez peut-être construire un #!0. Dans un musée archéologique, vous pourrez voir vos artefacts, créer #!1 et visiter votre #b #!3 Archaeologist#!#!. \ N \ n les plus artefacts et expositions que vous avez, le plus prestige vous obtiendrez. \ N \ n #b anthropology#! est une autre partie de l'archéologie. Si vous avez un #!7 et un #!8, vous pouvez trouver #!9 et reconstruire des espèces humaines préhistoriques. Chaque squelette vous donnera plus de prestige anthropologique. Avec suffisamment de prestige anthropologique, vous obtiendrez un modificateur de prestige pour votre pays."
 concept_lepsius_archaeologist: "#b #BLUE Archéologue#!#!"
 concept_lepsius_archaeologists: "#b #BLUE Archaeologists#!#!"
 concept_lepsius_archaeologist_desc: "#b #BLUE Archaeologists#!#! sont des universitaires que vous pouvez envoyer à [Concept('concept_lepsius_expedition','$concept_lepsius_expeditions$')]. Ils y rassembleront [Concept('concept_lepsius_artifact','$concept_lepsius_minor_artifacts$')]. Parfois, ils pourraient même trouver un [concept_lepsius_major_artifact]. \ Narchaeologists gagner [concept_academics_experience] pendant leur travail et passivement chaque année. Ils peuvent obtenir de meilleurs niveaux de trait d'archéologue en gagnant suffisamment #b Experience#!."
 concept_andersson_anthropologist: "#b #BLUE anthropologue#!#!"
 concept_andersson_anthropologists: "#b #BLUE anthropologues#!#!"
 concept_andersson_anthropologist_desc: "#b #BLUE anthropologues#!#! sont des universitaires qui étudient la préhistoire humaine, à la fois dans les sens paléontologiques et archéologiques. Ils recherchent [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')] dans [Concept('concept_lepsius_cave','$concept_lepsius_caves$')] ou identifient les os inconnus auparavant. Trois #b Fossiles humains sont suffisants pour reconstruire une espèce pré-humaine. La découverte et l'identification des os, ainsi que la systématisation des premières espèces humaines, apporte un prestige anthropologique. Ils peuvent également trouver des artefacts locaux tout en explorant les grottes."
 concept_lepsius_museum: "Musée archéologique"
 concept_lepsius_museum_desc: "Le #b Archaeological Museum#! est un bâtiment que vous pouvez construire qui affiche tous les [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] que votre nation a trouvés."
 concept_lepsius_excavation_site: "Site d'excavation historique"
 concept_lepsius_excavation_sites: "Sites d'excavation historiques"
 concept_lepsius_excavation_site_desc: "Il y a plusieurs sites d'excavation historiques #b #b dans différents pays, notamment: Haute et basse Égypte, Babylonie, Assyrie, Crète, Argolis, Yucatán et Pérou. Chaque site historique #b #! propose différents [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] et événements."
 concept_lepsius_expedition: "Expédition archéologique"
 concept_lepsius_expeditions: "Expéditions archéologiques"
 concept_lepsius_expedition_desc: "Un #b Archaeological Expedition#! est une expédition d'un [concept_lepsius_archaeologist] et de son [concept_lepsius_archaeological_team]. Il faudra plusieurs mois au cours desquels ils tenteront de rassembler autant de [Concept('concept_lepsius_artifact','$concept_lepsius_minor_artifacts$')] que possible. #b Expeditions#! sont le seul moyen de se mettre en possession de [Concept('concept_lepsius_major_artifact','$concept_lepsius_major_artifacts$')]. \ Nif Vous avez recherché une archéologie précoce, vous pouvez laisser votre équipe sur le site pour créer un [concept_lepsius_excavation] après un #b Expeditions réussi #b #!."
 concept_lepsius_archaeological_team: "Équipe archéologique"
 concept_lepsius_archaeological_teams: "Équipes archéologiques"
 concept_lepsius_excavation_team: "Équipe d'excavation"
 concept_lepsius_archaeological_team_desc: "Vous avez besoin d'un ou plusieurs #b Archaeological Team#! pour pouvoir mener [Concept('concept_lepsius_expedition','$concept_lepsius_expeditions$')]. Vous pouvez gagner jusqu'à 3 #b équipes archéologiques #!, mais chacune a des exigences plus élevées. \ N \ nyou peut obtenir votre premier #b Team#! en ayant recherché la technologie de l'antiquarisme, avoir une université de au moins le niveau 3 et une littératie de 33%. \ N \ nyou peut obtenir une autre équipe si vous avez recherché la technologie d'archéologie moderne, avoir une université de niveau au moins 15 et une littérature. Obtenez un autre #b Team#! après avoir recherché la technologie de l'antiquarisme et avoir un [concept_lepsius_archaeologist]. \ n \ nyou a besoin de #b Teams#! pour [Concept('concept_lepsius_expedition','$concept_lepsius_expeditions$')] et #!3."
 concept_lepsius_excavation_licence: "Permis d'excavation"
 concept_lepsius_excavation_licences: "Licences d'excavation"
 concept_lepsius_excavation_licence_desc: "Si vous ne possédez pas vous-même une partie du [Concept('concept_lepsius_excavation_site','$concept_lepsius_excavation_sites$')], vous pouvez toujours y accéder en utilisant l'action diplomatique #b Excavation \ 2."
 concept_lepsius_artifact: "Artefact"
 concept_lepsius_artifacts: "Artefacts"
 concept_lepsius_minor_artifact: "Artefact mineur"
 concept_lepsius_minor_artifacts: "Artefacts mineurs"
 concept_lepsius_oceanic_artifact: "Artefact océanique"
 concept_lepsius_oceanic_artifacts: "Artefacts océaniques"
 concept_lepsius_artifact_desc: "Vous pouvez obtenir des artefacts en envoyant [Concept('concept_lepsius_archaeological_team','$concept_lepsius_archaeological_teams$')] sur [Concept('concept_lepsius_expedition','$concept_lepsius_expeditions$')], [Concept('concept_lepsius_excavation','$concept_lepsius_excavations$')], sur [Concept('concept_dubois_pacific_expedition','$concept_dubois_pacific_expeditions$')] ou dans des événements. \ N \ NUSTALUX Vous obtiendrez mineur #b artefacts#!. nom. Vous pouvez généralement les trouver dans les expéditions, les fouilles et comme découvertes archéologiques."
 concept_lepsius_major_artifact: "Artefact majeur"
 concept_lepsius_major_artifacts: "Artefacts majeurs"
 concept_lepsius_major_artifact_desc: "#b Les principaux artefacts#! sont spéciaux [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] qui ont un nom et une identité. \ Nyou peut trouver #b artefacts majeurs de différentes manières. Certains d'entre eux vous trouverez pendant [Concept('concept_lepsius_expedition','$concept_lepsius_expeditions$')]. Pour d'autres, vous devez maintenir un [concept_lepsius_excavation] continu jusqu'à ce que vous trouviez. Et certains seront découverts dans une découverte majeure. \ Nake a #b Major Artifact#! d'un pays illégalement pourrait provoquer un incident diplomatique qui pourrait vous nuire plus que de posséder un #b Artefact #!. D'un autre côté, #b Artefacts #! vous permettent de créer un #!3 qui vous donnera un énorme bonus de prestige et est nécessaire pour certains #!4."
 concept_lepsius_exhibition: "Exposition"
 concept_lepsius_exhibitions: "Expositions"
 concept_lepsius_excellent_exhibition: "Excellente exposition"
 concept_lepsius_excavation: "Excavation"
 concept_lepsius_excavations: "Fouilles"
 concept_lepsius_excavation_desc: "Si vous avez recherché une archéologie précoce et terminé un [concept_lepsius_expedition], vous pouvez décider de laisser votre [concept_lepsius_archaeological_team] sur le site pour déterrer passivement [Concept('concept_lepsius_artifact','$concept_lepsius_minor_artifacts$')]. Vous pouvez toujours rappeler votre équipe à partir de la fouille #b #!."
 concept_andersson_human_fossil: "Fossile humain"
 concept_andersson_human_fossils: "Fossiles humains"
 concept_andersson_human_fossils_fossils: "Fossiles"
 concept_lepsius_human_bones: "Os humains"
 concept_andersson_human_fossil_desc: "#b Les fossiles humains appartiennent à l'une des cinq espèces différentes: Cro-Magnon, Néanderthal, Homo erectus, Australopithecus ou Paranthropus. [Concept('concept_andersson_anthropologist','$concept_andersson_anthropologists$')] peut les trouver dans [Concept('concept_lepsius_cave','$concept_lepsius_caves$')] et (généralement) identifier et les attribuer immédiatement. Cependant, les fossiles humains peuvent rarement être trouvés par les archéologues et les paléontologues. Seuls #b #BLUE anthropologues#!#! peuvent identifier correctement ces «fossiles humains inconnus». Trois os complètent une espèce, qui est récompensée par le prestige anthropologique. La première classification d'un humain précoce donne beaucoup plus de prestige. Les fossiles humains peuvent être achevés aussi souvent que souhaité."
 concept_lepsius_cave: "Grotte"
 concept_lepsius_caves: "Grottes"
 concept_lepsius_cave_desc: "#b Les grottes préhistoriques#! sont un endroit où les premières espèces humaines ou pré-humaines peuvent avoir quitté [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils_fossils$')] et, dans des types plus avancés, des outils. Les grottes peuvent être découvertes et explorées par [Concept('concept_andersson_anthropologist','$concept_andersson_anthropologists$')]. Certaines grottes sont également déverrouillées à travers des événements historiques. Les fossiles d'une seule espèce se trouvent dans chaque grotte - cela signifie que les os des humains Cro-Magnon et des Néandertaliens ne sont jamais dans la même grotte. Certaines grottes sont historiques, tandis que certaines sont distribuées au hasard au début du match sur l'un des trois continents d'Afrique, d'Asie et d'Europe. Ils sont à peu près basés sur la zone de distribution des pré-humains - l'Australopithecus, par exemple, ne se trouvera qu'en Afrique."
 concept_verrier_astronomy: "Astronomie"
 concept_verrier_observatory: "Observatoire"
 concept_verrier_observatories: "Observatoires"
 concept_verrier_astronomer: "#b #ORANGE astronome#!#!"
 concept_verrier_astronomers: "#b #ORANGE astronomes#!#!"
 concept_verrier_astronomical_object: "Objet astronomique"
 concept_verrier_astronomical_objects: "Objets astronomiques"
 concept_verrier_astronomical_object_icon: "@verrier_astronomicalobject!"
 concept_verrier_celestial_body: "Corps céleste"
 concept_verrier_celestial_bodies: "Corps célestes"
 concept_verrier_comet: "Grande comète"
 concept_verrier_comets: "Grands comètes"
 concept_verrier_comet_desc: "L'âge victorien avait quelques #b Grands comètes #! qui ont attiré l'attention du public. Si vous avez un [concept_verrier_astronomer], il y a une chance que vous découvrirez d'abord l'un de ces grands comètes #b, ce qui entraîne un bonus au prestige et à la recherche."
 concept_verrier_moon_photo: "Photo de lune"
 concept_verrier_moon_photos: "Photos de lune"
 concept_rapanui_christian_mission: "Mission chrétienne"
 concept_rapanui_christian_missions: "Missions chrétiennes"
 concept_rapanui_christian_mission_desc: "[Concept('concept_major_power','$concept_major_powers$')] ou [Concept('concept_great_power','$concept_great_powers$')] avec [Concept('concept_interest','$concept_interests$')] en Océanie peut essayer de convertir une nation insulaire décentralisée dans la région - mais cela n'est possible que si votre pays n'est pas trop laïque et que le groupe d'intérêt \"dévot\" n'est pas trop faible. \ N \ n le prosélytisme a lieu en trois étapes. Si vous envoyez un missionnaire, il sera reçue gentiment, ignoré - ou tué immédiatement. Si votre mission tourne mal, vous devrez attendre quelques années pour trouver un nouveau missionnaire pour diffuser la parole de Dieu. Ensuite, votre missionnaire convertira 1% de la population par an. Il peut y avoir des événements qui aident ou entravent la conversion. \ N \ n La deuxième étape commence lorsque vous atteignez 30% d'indigènes convertis. Maintenant, votre station missionnaire deviendra permanente. Si 51% des indigènes professent le christianisme, le chef se convertira à votre religion et se placera sous votre protection en tant que [concept_protectorate]. Des années plus tard, ces zones peuvent même être annexées si vous avez la technologie pour empêcher le paludisme. \ N \ Nin la troisième étape que vous pouvez prendre activement des décisions via l'entrée du journal. Soit vous renforcez la mission directement en envoyant des missionnaires supplémentaires, soit vous essayez de faire du commerce. Vous pouvez acquérir des [Concept('concept_lepsius_artifact','$concept_lepsius_oceanic_artifacts$')], [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] ou des perles rares qui augmentent le niveau de vie des riches."
 concept_manzoni_literary_tradition: "Tradition littéraire"
 concept_klimt_painters: "#PURPLE #b peintres#!#!"
 concept_klimt_painting_tradition: "Tradition de peinture"
 concept_vikelas_sports: "Sportif"
 concept_vikelas_sports_desc: "#b Sports#! est l'une des principales caractéristiques de [concept_morgenroete]. \ N \ nonce Un pays découvre #b Sports #! organisé, il a accès à différentes activités sportives. Le plus important est le fondement du [concept_vikelas_ioc] qui commencera à organiser le [concept_vikelas_olympic_games]. Les Jeux Olympiques vous donneront une chance de remporter des médailles d'or qui fourniront à votre pays [concept_prestige]."
 concept_vikelas_olympic_games: "Jeux olympiques"
 concept_vikelas_olympic_games_desc: "Une fois le [concept_vikelas_ioc] fondé, le #b Olympic Games#! peut avoir lieu tous les 4 ans. Chaque fois que le comitte votera pour un #b host#!. Le pays hôte obtiendra un gros coup de pouce [concept_prestige]. \ N Pendant les Jeux Olympiques, vos athlètes s'affronteront pour des médailles. De nombreux facteurs influencent le nombre de médailles que vous obtiendrez. Votre population a une petite influence, le [concept_sol] a une taurecue plus grande, certains événements influencent également vos chances et font donc un grand [Concept('concept_general', '$concept_generals$')] et un grand [Concept('concept_admiral', '$concept_admirals$')]. De plus, les caractères avec les centres de trait et urbain #b Athlète #b avec les installations sportives #b #! donnent également de petits coups de pouce. \ Nall ces facteurs ont une influence sur le nombre de médailles des 12 médailles d'or que votre pays obtiendra. Chaque médaille d'or vous accordera 5 [concept_prestige]."
 concept_vikelas_ioc: "Comité international olympique"
 concept_vikelas_ioc_desc: "A Nation that has researched #V $vikelas_international_sports_tech$#! can found the #b International Olympic Comittee#! or #b IOC#! in short. The IOC will then start organizing the [concept_vikelas_olympic_games]. Each member of the IOC can participate in the Olympic Games.\n The most important members of the IOC are the #b Board Members#!. The Founder of the IOC will become the #b President#! and therefore stay a board member forever while the other members will be elected every 4 years. The Board has space for 5 Great Powers, 2 European, 2 Asian, 2 American, 1 African and 1 Oceanic nation.\nThe main task of the Board Members is choosing the next Host of the Games. There will be 3 candidates (or 4 if a country decides to bribe the Board) to choose from.\nIf Greece founds the IOC, the Olympic Games will only be held in Greece resulting in the Board being less important, as they do not choose the Host."
 concept_lepsius_exhibition_desc: "Votre [concept_lepsius_museum] mettra automatiquement en place des expositions (sous la forme d'un [concept_production_method] pour chaque région) si vous avez suffisamment de [Concept('concept_lepsius_artifact','$concept_lepsius_minor_artifacts$')] du même genre. Pour les artefacts normaux, la première exposition sera créée pour 10 artefacts ou plus. De là, de meilleures expositions sont possibles avec 25 (exposition moyenne), 50 (grande exposition) et 100 artefacts mineurs (excellente exposition). L'excellente exposition a également besoin d'un [concept_lepsius_major_artifact]. \ N \ nlocal Les artefacts ont un ensemble d'expositions moins diversifié car ils sont limités à une exposition régulière et grande. L'exposition régulière nécessite 25 artefacts locaux et la grande exposition en nécessite 50."
 concept_vikelas_racer: "Coureur de voiture"
 concept_vikelas_racers: "Coureurs de voitures"
 concept_vikelas_racer_desc: "Un coureur de voiture est un [concept_character] spécial qui participe à [concept_vikelas_car_racing]."
 concept_vikelas_car_racing: "Course de voitures"
 concept_vikelas_car_racing_desc: "La course de voitures est un sport dans lequel [Concept('concept_vikelas_racer','$concept_vikelas_racers$')] rivalise les uns contre les autres sur une piste ou sur des routes régulières."
 concept_lepsius_archaeological_exhibition: "Exposition archéologique"
 concept_elgar_opera_desc: "Le #b Opera#! est le centre musical d'une nation. C'est là que les musiciens les plus importants se rassemblent et jouent pour les masses. \ Nthe #b Opera#! est un bâtiment séparé qui peut être construit dans les États si le centre urbain est au moins le niveau 5. Le #b Opera#! produira de la musique et consommera des instruments. Plus le niveau de l'Opera#! #b est élevé, plus [concept_elgar_musical_tradition] sera produit chaque année."
 concept_elgar_impressionism_desc: "#b Impressionism#! est un style de l'histoire de l'art qui se caractérise par la représentation atmosphérique des instantanés éphémères d'une scène. Il est sorti d'un mouvement dans la peinture en France dans la seconde moitié du XIXe siècle. Le terme impressionnisme a également été appliqué à certains styles de musique, de littérature, de cinéma et de photographie. Alors que de nombreux naturalistes tels que Heinrich Hart ont rejeté la musique comme un moyen d'exprimer un `` l'actionnisme de recherche de vérité '', les impressionnistes considéraient souvent le `` rêve sans objet à venir ' Intelligentsia avec une approbation de 5 ci-dessus. Si vous choisissez #b Impressionism#!, vous ne pourrez pas déverrouiller les deux autres branches. \ N \ nLe focus de #b Impressionism#! dans le jeu est de la musique. Par conséquent, il vous donnera le plus grand bonus au [concept_elgar_musical_tradition]."
 concept_elgar_expressionism_desc: "#b Expressionism#! est un style d'art. Ses débuts et ses précurseurs se trouvent à la fin du XIXe siècle. Comme l'impressionnisme, le symbolisme et le fauvisme, l'expressionnisme est un mouvement contre les tendances du naturalisme. Dans l'expressionnisme, le niveau expressif l'emporte sur le niveau esthétique, appelant et factuel. L'artiste veut représenter son expérience pour le spectateur. In contrast to musical impressionism, which depicts the perception of the external appearance of things, the expressionist art movements formulate the emotions of the human soul.\n\nIn the game, #b Expressionism#! is only unlockable with a journal entry that requires 1000 [concept_elgar_musical_tradition], an [concept_elgar_opera], a powerful intelligentsia or trade unions, landowners that are not powerful and either the Intelligentsia or the trade unions need an approval of 5 ou au-dessus. Si vous choisissez #b Expressionism#!, vous ne pourrez pas déverrouiller les deux autres branches. \ N \ n le focus de #b Expressionism#! dans le jeu serait de la littérature, mais il n'est pas encore mis en œuvre."
 concept_elgar_art_nouveau_desc: "#b Art Nouveau#! est un style artistique qui s'est développé à partir du mouvement #italic arts et artisanat #! et a été inspiré par des formes naturelles. Il se concentrait souvent sur le dynamisme et le mouvement et a utilisé des matériaux modernes. \ N \ nin le jeu, #b Art Nouveau#! ne peut être déverrouillable qu'avec une entrée de journal qui nécessite 1000 [concept_elgar_musical_tradition], un [concept_elgar_opera], de puissants industriels et une intelligentsia avec une approbation de 5 ou plus. Si vous choisissez #b Art Nouveau#!, vous ne pourrez pas déverrouiller les deux autres branches. \ N \ n le focus de #b Art Nouveau#! et #b Art déco#!, la prochaine technologie de cette branche, est l'architecture. Vous obtiendrez divers événements et entrées de journaux sur les actes architecturaux et pourrez obtenir un #!4."
 concept_elgar_composer: "#PURPLE #b Composer#!#!"
 concept_elgar_composers: "#PURPLE #b Composeurs#!#!"
 concept_elgar_composer_desc: "#b Les compositeurs#! sont des hommes et des femmes qui composent la musique. Les compositeurs sont des types de caractères spéciaux que vous pouvez gagner soit à partir d'événements, en gagnant suffisamment [concept_artistic_progress] pour en créer un dans votre nation ou en offrant un poste à un [concept_elgar_travelling_composer]. \ Nonce vous avez un #b composer#!, vous pouvez les laisser démarrer [Concept('concept_elgar_composing','$concept_elgar_composing_lower_case$')], [Concept('concept_elgar_conducting','$concept_elgar_conducting_lower_case$')], pour aller sur [Concept('concept_elgar_musical_tour','$concept_elgar_musical_tours$')] ou composer [Concept('concept_elgar_musical_masterwork','$concept_elgar_musical_masterwork_masterworks$')]. Chaque action est différente dans ce que fait le compositeur, ce dont il a besoin et ce que vous gagnez. Le composer#! #b sera #!2 après chaque tâche et doit se reposer un certain temps jusqu'à ce qu'il puisse travailler à nouveau. Plus la réputation #b #b est élevée, plus les avantages d'un compositeur #b sont élevés. #b Composers#! Atteindre une réputation #b #! de 500 deviendra [concept_artistic_progress]4, Titans of Music, connu dans le monde entier."
 concept_elgar_great_composer: "#PURPLE #b Great Composer#!#!"
 concept_elgar_great_composers: "#PURPLE #b Great Composers#!#!"
 concept_elgar_great_composer_desc: "#b Grands compositeurs#! sont les titans de la musique. Ceux dont les noms seront connus pour l'éternité. [Concept('concept_elgar_composer','$concept_elgar_composers$')] Atteindre 500 [concept_artists_experience], deviendra #b Grands compositeurs#!. Cela augmentera considérablement leur efficacité et permettra à votre nation de gagner beaucoup plus [concept_elgar_musical_tradition]. Un #b Great Composer#! peut créer une manière plus rapide de [concept_elgar_musical_masterwork] par exemple."
 concept_elgar_travelling_composer: "Compositeur itinérant"
 concept_elgar_travelling_composers: "Compositeur itinérant"
 concept_elgar_travelling_composer_desc: "#b Les compositeurs itinérants sont [Concept('concept_elgar_composer','$concept_elgar_composers$')] qui ne sont embauchés par aucune nation. Au lieu de cela, ils se déplacent lors de visites de concerts. Vous pouvez éventuellement acquérir un compositeur itinérant #b, mais plus ils ont de demandes. #b Composers#! avec une réputation #b plus élevée #b exigera de plus grandes maisons d'opéra, de la musique moderne #!3, un certain #!4 et certains pourraient ne rejoindre que #!5 ou #!6. \ NA Special Case est #!7 qui ne sont disponibles que pour les nations qui sont de la même identité nationale ou très similaire."
 concept_elgar_national_composer: "Compositeur national"
 concept_elgar_national_composers: "Compositeur national"
 concept_elgar_national_composer_desc: "#b Les compositeurs nationaux_1 sont [Concept('concept_elgar_composer','$concept_elgar_composers$')] qui apprécient beaucoup leur nation. Ils ne pourront pas être embauchés par d'autres nations. \ N si un compositeur national #b est à votre disposition ou non est décidé par [Concept('concept_cultural_trait','$concept_cultural_traits$')] de leur culture. L'une de vos cultures principales doit partager à la fois un non-héritage #b trait#! ainsi qu'un [concept_cultural_heritage_trait]. Cela signifie qu'un compositeur national #b nord-allemand sera accessible aux pays allemands ainsi qu'à la Suisse."
 concept_elgar_composing: "Composition"
 concept_elgar_composing_lower_case: "composition"
 concept_elgar_composing_compose: "composer"
 concept_elgar_composing_desc: "A [concept_elgar_composer] Who #b Compose#! reçoit 5 [concept_artists_experience] par an et ajoute 5 [concept_elgar_musical_tradition] au pays. De plus, il crée un nombre aléatoire de compositions chaque année. Un #b Composer#! avec des compétences spéciales telles que le chef d'orchestre, le virtuose, l'innovant ou le méticule crée une composition supplémentaire par an. Le nombre de compositions est décisive pour le succès dans plus tard [Concept('concept_elgar_musical_tour','$concept_elgar_musical_tour_tours$')]. Un composer #b compose jusqu'à ce que l'action soit annulée dans l'entrée du journal. Un compositeur #b #! qui compose coûte au pays un petit frais de maintenance annuel."
 concept_elgar_conducting: "Réalisateur"
 concept_elgar_conducting_lower_case: "réalisateur"
 concept_elgar_conducting_conduct: "conduire"
 concept_elgar_conducting_desc: "Le [concept_elgar_composer] se concentrera sur #b conductant #! pendant 24 mois et organisera une saison de concert. Cela améliorera la production musicale d'un [concept_elgar_opera] ou 5 à 10 ans aléatoire, donnera à votre nation un petit coup de pouce à [concept_elgar_musical_tradition] et donnez à votre #b composer#! un coup de pouce moyen à son [concept_artists_experience]. Si votre compositeur #b n'est pas encore conducteur, il peut gagner le #b0 à la fin de la saison. Vous devrez payer le compositeur #b #b pendant qu'il est #b conduct #!."
 concept_elgar_musical_tour: "Tournée de concert"
 concept_elgar_musical_tours: "Visites de concert"
 concept_elgar_musical_tour_tour: "Tournée"
 concept_elgar_musical_tour_tours: "Tournées"
 concept_elgar_musical_tour_desc: "Le [concept_elgar_composer] peut effectuer un concert #b Tour#! à l'étranger pendant 30 mois. #b Concert Tours#! Augmentez le [concept_prestige] de la nation #b Composer's#!. De plus, le composer #b compose #! gagne un coup de pouce de #b0 à la fin du #b Tour#! qui dépend du nombre de compositions du compositeur #b avec moins de 20 compositions ne devrait probablement pas aller sur #b Tourne #! et #b Compositeurs Le trait ne peut pas aller sur #b tournées#!."
 concept_elgar_musical_masterwork: "Chef-d'œuvre musical"
 concept_elgar_musical_masterworks: "Chefs-d'œuvre musicale"
 concept_elgar_musical_masterwork_masterwork: "Chef-d'œuvre"
 concept_elgar_musical_masterwork_masterworks: "Chef-d'œuvre"
 concept_elgar_musical_masterwork_of_music: "Masier-chef de la musique"
 concept_elgar_musical_masterworks_of_music: "Masterworks of Music"
 concept_elgar_musical_masterwork_desc: "Le [concept_elgar_composer] peut commencer à composer un #b Masterwork#! qui prendra plusieurs années. Plus le compositeur [concept_artists_experience] a #b a, plus il finira rapidement. Une fois que le Masterwork#! #b est composé, le compositeur #b gagnera 50 [concept_artists_experience] et le pays gagnera jusqu'à 150 #b1 en fonction de son #b2. \ Na #b Composer#! peut créer un maximum de 3 #b Masterworks#! et aura besoin d'un soutien financier de son pays tout en y travaillant."
 concept_elgar_composer_exhaustion: "Épuisement du compositeur"
 concept_elgar_composer_exhaustion_exhausted: "épuisé"
 concept_elgar_composer_exhaustion_desc: "Une fois un [concept_elgar_composer] terminé [Concept('concept_elgar_composing','$concept_elgar_composing_lower_case$')], [Concept('concept_elgar_conducting','$concept_elgar_conducting_lower_case$')], en composant [Concept('concept_elgar_musical_masterwork','$concept_elgar_musical_masterwork_masterworks$')] ou un [Concept('concept_elgar_musical_tour','$concept_elgar_musical_tours$')], il sera #b épuisé#! de l'œuvre. Un compositeur épuisé #b ne pourra pas travailler pendant un certain temps. Plus le compositeur #b #b, plus il faut débarrasser de l'échappement #b."
 concept_manzoni_writer: "#PURPLE #b Writer#!#!"
 concept_manzoni_writers: "#PURPLE #b Writers#!#!"
 concept_klimt_painter: "#PURPLE #b peintre#!#!"
 concept_pm_artists_academy_conservatory: "#b #PURPLE Conservatoire#!#!"
 concept_pm_artists_academy_conservatory_desc: "Un véranda spécialise l'Académie des arts pour la musique. Si vous avez un Conservatoire, vous pourrez promouvoir [Concept('concept_elgar_composer','$concept_elgar_composers$')]. Vous obtiendrez un modificateur de débit négatif #n #n pour la Art Academy ainsi qu'un effet négatif #n #! sur votre [concept_artistic_progress] lorsque vous modifiez cette méthode de production."
 concept_pm_artists_academy_salon: "#b #PURPLE Salon littéraire_2"
 concept_pm_artists_academy_salon_desc: "Un salon littéraire spécialisera l'Académie des arts pour la littérature. Si vous avez un salon de littérature, vous pourrez promouvoir [Concept('concept_manzoni_writer','$concept_manzoni_writers$')]. Vous obtiendrez un modificateur de débit négatif #n #n pour la Art Academy ainsi qu'un effet négatif #n #! sur votre [concept_artistic_progress] lorsque vous modifiez cette méthode de production."
 concept_pm_artists_academy_studio: "#b #PURPLE Studio Artistique#!#!"
 concept_pm_artists_academy_studio_desc: "Un studio d'art spécialisera l'Académie des arts pour la peinture. Si vous avez un studio d'art, vous pourrez promouvoir [Concept('concept_klimt_painter','$concept_klimt_painters$')]. Vous obtiendrez un modificateur de débit négatif #n #n pour la Art Academy ainsi qu'un effet négatif #n #! sur votre [concept_artistic_progress] lorsque vous modifiez cette méthode de production."
 concept_pm_artists_academy_specialization: "Focus de l'Académie des arts"
 concept_pm_artists_academy_specialization_desc: "Chaque académie des arts peut être spécialisée en modifiant sa méthode de production. \ Nan Arts Academy avec un [concept_pm_artists_academy_conservatory] vous permettra de promouvoir [Concept('concept_elgar_composer','$concept_elgar_composers$')]. \ Nan Arts Academy avec un [concept_pm_artists_academy_salon] vous permettra de promouvoir [Concept('concept_manzoni_writer','$concept_manzoni_writers$')]. \ Nan Arts Academy."
 concept_artists_artist: "Artiste"
 concept_artists_artists: "Artistes"
 concept_artistic_progress: "Progrès artistique"
 concept_artistic_progress_desc: "En ajoutant 1000 #b PROGRÈS ARTISTIQUES#!, vous pouvez gagner un nouveau [concept_artists_artist]. Pour avoir même accès à #b Artistic Progress#!, vous devez avoir une #b Arts Academy#! ou un #b Opera#!. \ Nyour #b PROGRESSAGE ARTISTIC#! est influencé par divers facteurs. Plus vous avez #!1, plus vous gagnez rapidement #b PROGRÈS ARTISTIQUESS_1 Par exemple. Vous pouvez obtenir des informations détaillées sur tous les facteurs influençant les progrès artistiques de la barre d'outils de la barre de progrès artistique dans la fenêtre des arts."
 concept_artists_experience: "Réputation"
 concept_artists_experience_desc: "Chaque [concept_artists_artist] a une réputation #b #!. La réputation représente à quel point l'artiste est bien considéré. Les artistes commencent par une petite réputation et peuvent acquérir une réputation supplémentaire en travaillant dans leur domaine. Les artistes qui ont acquis une réputation de 500, deviendront un #Great artistes#! et obtiendront le [concept_character_trait] correspondant."
 concept_manzoni_great_writer: "Grand écrivain"
 concept_manzoni_local_writer: "Écrivain local"
 concept_artists_center_of_arts: "Centre des arts"
 concept_artists_centers_of_arts: "Centres d'arts"
 concept_artists_center_of_classicism: "Centre du classicisme"
 concept_artists_center_of_romanticism: "Centre du romantisme"
 concept_artists_center_of_realism: "Centre de réalisme"
 concept_artists_center_of_impressionism: "Centre de l'impressionnisme"
 concept_artists_center_of_expressionism: "Centre d'expressionnisme"
 concept_artists_center_of_art_nouveau: "Centre d'art Nouveau"
 concept_klimt_great_painter: "#PURPLE #b Great Painter#!#!"
 concept_klimt_great_painters: "#PURPLE #b Grands peintres#!#!"
 concept_klimt_great_painter_desc: "#b Grands peintres#! sont [Concept('concept_klimt_painter','$concept_klimt_painters$')] qui seront connus pour l'éternité. #b peintres#! atteignant 500 [concept_artists_experience], deviendra #b de grands peintres#!. Cela augmentera considérablement leur efficacité et permettra à votre nation de gagner beaucoup plus [concept_klimt_painting_tradition]."
 concept_klimt_independent_painter: "Peintre indépendant"
 concept_klimt_independent_painters: "Peintres indépendants"
 concept_klimt_painter_trip: "Voyage éducatif du peintre"
 concept_klimt_painter_trip_journeys: "Voyages"
 concept_elgar_music_desc: "#b Music Culture#! est l'une des principales caractéristiques de [concept_morgenroete]. Au cours des XIXe et XXe siècles, la musique était importante comme un moyen de divertir la population et de montrer la grandeur des nations. \ N \ nto Accéder à la plupart du contenu musical du #r Morgenröte#! Vous devrez construire un [concept_elgar_opera]. Le #b Opera#! produira de la musique mais a besoin d'instruments pour fonctionner. Outre la production de la musique #b #! pour que votre population consommer, #b opéras#! ajoutera lentement #!2 à votre pays. \ N \ n#b Tradition musical#! reflète les réalisations et les traditions musicales d'une nation. Le montant de la tradition musicale #b vous donne un bonus de prestige et vous permet de choisir un chemin pour que l'art de votre nation avance. Vous pouvez soit suivre l'itinéraire de #!7, #!8 ou #!9. Chacun de ces styles d'art a un autre objectif. \ N \ na Une bonne façon de gagner encore plus #b tradition musicale #! est d'obtenir un [concept_morgenroete]2. Un compositeur pourra [concept_morgenroete]3, [concept_morgenroete]4, aller sur [concept_morgenroete]5 et même créer [concept_morgenroete]6. Ces actions amélioreront soit le compositeur #b #! [concept_morgenroete]9, soit améliorer vos nations #b tradition musicale #!."
 concept_artists_center_of_arts_desc: "Un #b Centre of Arts#! est le centre d'un [concept_artists_art_style] qui est créé dans un [concept_state_region] une fois qu'un style art #b est inventé. Il n'y a qu'un seul #b Centre of Arts#! par #b Style #!. \ N#b Centre of Arts#! est particulièrement important pour #!1 qui peut prendre #!2 pour étudier le style art #b. En dehors de cela, un peu de #b Centre of Arts#! offrent des événements uniques qui s'y produisent. Certains par exemple vous permettent de gagner #!7."
 concept_klimt_painting_culture: "Culture de peinture"
 concept_klimt_painting_culture_desc: "#b peinture Culture#! est l'une des principales caractéristiques de [concept_morgenroete]. Au cours du 19e et du 20e siècle, la peinture s'est développée rapidement, ce qui a entraîné divers nouveaux [Concept('concept_artists_art_style','$concept_artists_art_styles$')] qui ont apporté beaucoup de progrès aux individus et aux pays. \ N \ nto Accéder à la plupart du contenu de la peinture dans #r Morgeröte#!, vous devrez construire un #b Arts Academy#!. #b Arts Academies#! vous permettent de commencer à gagner #!0 et de recruter de nouveaux peintres #!1 \ n \ n#b #!. Comme il existe différents [Concept('concept_artists_art_style','$concept_artists_art_styles$')] pour les peintres #b sur sur laquelle vous concentrer, vous pouvez les laisser étudier des styles d'art #b supplémentaires #! sur un [concept_morgenroete]3. Une fois âgé de 40 ans, #b peintres#! se spécialisera dans l'un de leurs styles d'art #b et se concentrera sur la création de peintures dans ce style #b Art Style#!."
 concept_artists_art_style: "Style artistique"
 concept_artists_art_styles: "Styles d'art"
 concept_artists_art_style_style: "Style"
 concept_artists_art_style_desc: "Un #b Art Style#! est un objectif spécifique de l'art. Certains styles d'art #b #! sont là depuis le début comme #b Classicism#! et #b Romantisme#!. Les autres, #b réalisme#!, #b irrationalism#!, #!2, #!3 et #!4, n'apparaissent plus tard que après que certaines conditions sont remplies. Chaque style #b art#! a un #!7 correspondant dans le #!8 où il a commencé."
 concept_klimt_painter_desc: "#PURPLE #b peintres#!#! sont des hommes et des femmes qui créent des peintures et d'autres œuvres d'art. #b peintres#! sont des types de caractères spéciaux que vous pouvez gagner soit des événements, de gagner suffisamment [concept_artistic_progress] pour en créer un dans votre nation ou en offrant une position à un [concept_klimt_independent_painter]. \ N#b peintres#! commencera immédiatement à peindre et à créer un certain nombre de peintures chaque année selon leur [Concept('concept_character_trait','$concept_character_traits$')]. Parfois, ils peuvent même créer un #b Masterwork#! qui vous donnera encore plus #b2. \ N#b peintres#! peut étudier différents #b5 sur #b6. Chaque #b Painter#! se spécialisera dans un style #b Art Style#! une fois qu'ils auront 40 ans, ce qui leur permettra de peindre #b Masterworks#! d'un certain style."
 concept_klimt_independent_painter_desc: "[Concept('concept_klimt_painter','$concept_klimt_painters$')] qui ne sont pas embauchées par un pays sont #b peintres indépendants #!. #b peintres indépendants #! peuvent être embauchés par des pays qui ont un [Concept('concept_primary_cultures','$concept_primary_culture$')] qui partage un [concept_cultural_trait] avec la culture du #b peintre#!. \ n#b peintres indépendants#! a diverses exigences pour leur pays hôte. Vous aurez besoin de #b Arts Academies#!, certains #b2 ou #b3 selon le peintre #b #! #b6. De plus, vous devrez leur payer une somme d'argent qui dépend de leur #b Renown#! ainsi que des capacités financières de votre pays."
 concept_klimt_painter_trip_desc: "A [concept_klimt_painter] peut apprendre un nouveau [Concept('concept_artists_art_style','$concept_artists_art_styles$')] sur un #b Journey éducatif#! à l'un des [Concept('concept_artists_center_of_arts','$concept_artists_centers_of_arts$')]. \ Non un tel #b trip#! Un peintre peut gagner un [Concept('concept_character_trait','$concept_character_traits$')] positif et négatif qui influencera leur travail et le nombre de peintures qu'ils créent. Chaque #b Centre of Arts#! a des événements légèrement différents et donnera au #b peintre#! un #b trait#! unique qui peut devenir plus tard la spécialisation #b peintre's#!."
 concept_klimt_art_prize: "Prix ​​d'art"
 concept_klimt_art_prizes: "Prix ​​d'art"
 concept_klimt_art_prize_desc: "De temps en temps, des compétitions artistiques sont organisées dans lesquelles des prix sont décernés - qui promeuvent la réputation d'un artiste. Les nations qui ont un [concept_artists_center_of_arts] pour l'irrationalisme ou [concept_elgar_impressionism] choisissent les meilleurs musiciens d'un concours qui se déroule tous les cinq ans. Les propriétaires d'un [concept_klimt_art_gallery] ou d'un #b Center of Art of Realism#! viennent organiser un concours de peinture qui se déroule tous les cinq ans. Le pays à partir duquel les gagnants viennent reçoivent également de la musique ou de la peinture. Une forme spéciale de concours artistique est la Biennale, qui, tous les deux ans, accorde un prix d'art complet au pays qui a les artistes avec la plus grande réputation, ce qui augmente toutes les valeurs de tradition culturelle."
 concept_klimt_art_gallery: "Galerie d'art"
 concept_klimt_art_gallery_desc: "Le #b Art Gallery#! est un bâtiment spécial dans la capitale nationale qui est disponible à partir de #b Reality#!. Il ne peut être construit que si la nation a un [concept_klimt_painter] avec spécialisation. #b peintres#! avec une spécialisation déverrouiller la collection de leur [Concept('concept_artists_art_style','$concept_artists_art_style_style$')] - c'est-à-dire un artiste avec une spécialisation dans le style romantique débloque une collection de romantisme. Afin de mettre à niveau une collection vers une excellente collection, un chef-d'œuvre de ce type est requis, qui doit être peint par un peintre ou acquis à l'étranger."
 concept_manzoni_writer_novelist: "Romancier"
 concept_manzoni_writer_desc: "Un #b Writer#! est un caractère spécial qui écrira des œuvres de littérature pour votre pays. #b Writers#! commence généralement comme [concept_manzoni_local_writer] et écrit #b publications#! et parfois même [Concept('concept_manzoni_bestseller','$concept_manzoni_bestsellers$')]. Un #b best-seller#! accordera au #b écrivain#! une grande quantité de #!2 et #!3 à votre pays. Il y a une chance d'écrire un #b BestSeller#! chaque année, selon la proximité de l'écrivain #b #! #!8 au #!9. \ N \ na bien connu #b écrivain#! dont le #b2 est assez heureux, peut devenir votre #b3. Un écrivain national #b peut gagner #b6 ou créer un roman de journal. Si un scénariste #b gagne 500 #b réputation#!, ils peuvent devenir un #!1 et fournir à votre pays encore plus #b Tradition #!. \ N \ nbe prudent, si les écrivains #b sont mécontents de la situation politique dans un pays, ils peuvent décider de devenir #!6 ou d'interférer dans le discours politique."
 concept_manzoni_great_writer_desc: "Un grand écrivain #b est un [concept_manzoni_writer] connu partout dans le monde. Un #b écrivain#! peut devenir un grand écrivain #b une fois que leur [concept_artists_experience] atteint #V 500#!. Si votre grand écrivain #b est votre #!2, vous obtiendrez un bonus à votre gain #!3 annuel."
 concept_manzoni_local_writer_desc: "Presque tous les [concept_manzoni_writer] commence comme un #b écrivain local #!. Chaque pays peut avoir un maximum de 3 #b écrivains locaux #! qui créeront #b publications#!, vous accorde [concept_manzoni_literary_tradition] si leur [concept_manzoni_genre] correspond au [concept_manzoni_popular_taste] et à gagner #b0. \ Na #b écrivain local #! avec un #b réputant #b6 qui vous accordera plus #b Tradition littéraire #! et autres avantages supplémentaires. \ Nbe conscient que #b écrivains locaux #! mécontent de la situation politique actuelle peut commencer à interférer dans le discours politique ou même devenir un #!.1"
 concept_manzoni_national_writer: "Rédacteur national"
 concept_manzoni_national_writer_desc: "Un #b National Writer#! est un type de [concept_manzoni_writer] qui est considéré comme le visage de la littérature de votre pays. #b National Writers#! vous accorde un minimum de 1 et jusqu'à 5 [concept_manzoni_literary_tradition]. \ Nyou peut gagner un #b National Writer#! en nommant l'un de votre [Concept('concept_manzoni_local_writer','$concept_manzoni_local_writers$')]. Pour pouvoir nommer l'un de vos écrivains locaux #b #!, ils doivent avoir au moins #!1 150#! #!3 et leur #!4 doit avoir un #!5 positif. \ N"
 concept_manzoni_bestseller: "Best-seller"
 concept_manzoni_bestsellers: "Best-sellers"
 concept_manzoni_bestseller_desc: "Un #b Best-Seller#! est une #b publication#! d'un [concept_manzoni_writer] qui se vend très bien, généralement parce que le [concept_manzoni_genre] de l'#b auteur#! correspond ou se rapproche des [concept_manzoni_popular_taste] actuels.\nChaque année, un [concept_manzoni_national_writer] ou un [concept_manzoni_local_writer] a la possibilité d'écrire un #b best-seller#!. Le premier #b best-seller#! apportera une grande quantité de [concept_manzoni_literary_tradition] et chaque #b best-seller#! après le premier apportera au pays une quantité significative de #b Literary Tradition#!."
 concept_manzoni_genre: "Genre"
 concept_manzoni_genres: "Genres"
 concept_manzoni_genre_desc: "Chaque [Concept('concept_manzoni_writer','$concept_manzoni_writer_novelist$')] a un #b Genre#! spécifique pour son écriture. Le #b Genre#! est attribué lorsque l'écrivain #b est créé et dépend de nombreux facteurs. \ N#b Writers#! gagnera plus [concept_artists_experience] et écrira plus de #b0 lorsque leur #b Genre#! correspond ou est proche du #b3 du pays."
 concept_manzoni_popular_taste: "Goût populaire"
 concept_manzoni_popular_taste_audience: "Goût du public"
 concept_manzoni_popular_tastes_audience: "Goûts du public"
 concept_manzoni_popular_taste_desc: "La population de chaque nation a un #b Taste#! pour un [concept_manzoni_genre] spécifique. About every 10 years this #b Taste#! will change depending on political, social and cultural changes in the country itself.\n[Concept('concept_manzoni_writer','$concept_manzoni_writers$')] who have a #b Genre#! matching the #b Taste#! or close to it will gain more #!0 and write more #!1.\n\n#!2 Close Tastes:#!\n- #b #!5#!: #!7, #!8, §) #b9#!: #!1, #!7, §) #!8, #!9"
 concept_manzoni_book_licence: "Licence de livre"
 concept_manzoni_book_licences: "Licences de livre"
 concept_manzoni_book_licence_desc: "Les éditeurs étrangers peuvent obtenir des contrats avec un [concept_manzoni_national_writer] et offrir ses livres comme traductions sur leur propre marché. Cela se produit lorsqu'un écrivain rencontre le [Concept('concept_manzoni_popular_taste','$concept_manzoni_popular_tastes_audience$')] à l'étranger. Si un auteur obtient au moins cinq licences de livres, ses livres sont considérés comme de la littérature mondiale. Il peut ensuite faire une tournée en lecture."
 concept_manzoni_local_writers: "Écrivains locaux"
 concept_manzoni_library: "Bibliothèque nationale"
 concept_manzoni_library_desc: "Votre #b National Library#! configurera automatiquement les collections de livres (sous la forme d'un [concept_production_method]) si vous en avez suffisamment [concept_manzoni_publications]. La première collection de livres sera créée pour 1 000 publications ou plus. De là, de meilleures collections sont possibles avec 2.500 (petite collection de livres), 5.000 (petite collection de livres), 10.000 (collection de livres médiums), 25 000 (grande collection de livres), 50 000 (excellente collection de livres) et 100.000 (Great Book Collection)."
 concept_manzoni_publications: "Publications"
 concept_manzoni_publications_desc: "#b Publications#! Inclut tous les titres de livres, journaux, essais et autres produits écrits similaires dans une nation. Ils ne sont pas cohérents avec @manzoni_prints! $manzoni_prints$ circulant comme des matières premières. Les publications peuvent également apparaître indépendamment de l'industrie de l'édition, par exemple à travers les presses à imprimer internes des bâtiments ou des universités gouvernementaux. Les universitaires et les particuliers produisent également des publications en fonction de leur niveau d'alphabétisation. Cependant, l'industrie de l'édition explique la part du lion, et le facteur décisif est de savoir si une méthode de production moderne est utilisée ou non. Un grand nombre de publications sont fondamentales pour l'expansion d'un [concept_manzoni_library]."
 concept_curtiss_tourism: "Tourisme"
 concept_curtiss_tourism_desc: "Le tourisme offre à une nation culturellement supérieure un revenu supplémentaire. Les monuments uniques, les musées et les galeries d'art, les sites archéologiques, les centres d'art ainsi que les valeurs élevées dans les différentes traditions culturelles sont des facteurs qui font d'une nation une destination touristique attrayante. Les lois qui augmentent la liberté de mouvement et l'activité économique contribuent également à des revenus touristiques plus élevés. L'infrastructure joue également un rôle crucial - après tout, les endroits éloignés ne peuvent pas être atteints. Un aéroport en particulier révolutionne le tourisme et fournit une augmentation significative des revenus."
 concept_curtiss_private_airline: "Compagnie aérienne privée"
 concept_mendelejew_chemist: "#b #ORANGE Chemist#!#!"
 concept_manzoni_literature: "Culture littéraire"
 concept_manzoni_literature_desc: "#b Culture littéraire#!is L'une des principales caractéristiques de [concept_morgenroete]. La culture imprimée et la culture des journaux en particulier ont connu des bouleversements importants aux XIXe et 20e siècles. La masse des produits imprimés et de l'utilisation quotidienne est représentée par l'industrie de l'impression. La valeur culturelle de la littérature produite se reflète dans le [concept_manzoni_literary_tradition]. Ce dernier dépend en grande partie du [Concept('concept_manzoni_writer','$concept_manzoni_writers$')] d'un pays, et il y a [Concept('concept_manzoni_local_writer','$concept_manzoni_national_writers$')] et [Concept('concept_manzoni_national_writer','$concept_manzoni_local_writers$')]. Qu'ils vivent dans l'ombre ou deviennent des auteurs célèbres dépend du [concept_manzoni_popular_taste]."
 concept_morgenroete_desc: "#r Morgenröte - Dawn of Flavor #! is a mod created to broaden the cultural and scientific aspects of Victoria 3. It features content for various aspects of the Victorian Age:\n\n#V Lepsius: #! [concept_lepsius_archaeology]\n#V Verrier:#! [concept_verrier_astronomy]\n#V Gaudi:#! [concept_elgar_architecture] & [concept_tesla_engineering]\n#V Dubois:#! [concept_dubois_natural_history]\n#V Mendelejew:#! [concept_mendelejew_chemistry]\n#V Elgar:#! [concept_elgar_music]\n#V Manzoni:#! [concept_manzoni_literature]\n#V Klimt:#! [concept_klimt_painting_culture]\n#V Curtiss:#! [concept_curtiss_aviation]\n#V Vikelas:#! [concept_vikelas_sports]"
 concept_agassiz_mineral: "Minéral"
 concept_agassiz_minerals: "Minéraux"
 concept_agassiz_mineral_desc: "Les minéraux sont tous des types de types spéciaux de roches qui ne relèvent pas des ressources connues utilisées dans l'industrie. Une nation reçoit un certain nombre de minéraux chaque année une fois qu'il a inventé la technologie #b Geology#!. Si un [Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')] est au service de cette nation, il peut trouver des minéraux supplémentaires. Les emplacements des minéraux sont caractérisés par des modificateurs d'état: montagnes, déserts, zones arctiques, dépôts de matières premières (zones de charbon, de fer et de soufre, par exemple) ainsi que de [Concept('concept_dubois_formation','$concept_dubois_formations$')] et des volcans géologiques. Les déserts et les zones arctiques sont considérés comme pauvres en minéraux, tandis que de grandes formations géologiques et volcans sont considérés comme particulièrement riches en minéraux. Une forme plus précieuse de minéraux est [Concept('concept_agassiz_rare_mineral','$concept_agassiz_rare_minerals$')]."
 concept_agassiz_rare_mineral: "Minéral rare"
 concept_agassiz_rare_minerals: "Minéraux rares"
 concept_agassiz_rare_mineral_desc: "[Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')] peut trouver des minéraux rares sur leurs expéditions, telles que [Concept('concept_dubois_pacific_expedition','$concept_dubois_pacific_expeditions$')], [concept_douglas_mountaineering] expéditions, [concept_agassiz_volcano] expéditions ou pendant la prospection minérale. Contrairement au [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')] commun, ils ne se trouvent que en quantités très limitées. Des minéraux rares sont utilisés pour construire une armoire minérale."
 concept_agassiz_geologist: "#b #GREEN Géologue#!#!"
 concept_agassiz_geologists: "#b #GREEN Géologues#!#!"
 concept_agassiz_geologist_desc: "#b #GREEN Geologists#!#! are [Concept('concept_academics_academic','$concept_academics_academics$')] who primarily study rocks and earth history. They locate [Concept('concept_lepsius_cave','$concept_lepsius_caves$')], [Concept('concept_dubois_formation','$concept_dubois_formations$')] and [Concept('concept_curie_uranium','$concept_curie_uranium$')] deposits, which makes them irreplaceable colleagues for [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')], [Concept('concept_andersson_anthropologist','$concept_andersson_anthropologists$')] and [Concept('concept_curie_physicist','$concept_curie_physicists$')]. During their expeditions, they may find additional [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')] that a [concept_mendelejew_chemist] can use to discover or isolate [Concept('concept_mendelejew_element','$concept_mendelejew_elements$')]. They can find new deposits of raw materials. They are also active as volcanologists and can go on expeditions to local [Concept('concept_agassiz_volcano','$concept_agassiz_volcanoes$')] to research them in more detail. Together with [Concept('concept_tesla_engineer','$concept_tesla_engineers$')], they can develop new devices, such as seismographs, to learn more about the Earth's interior. Geologists can take part in [Concept('concept_dubois_pacific_expedition','$concept_dubois_pacific_expeditions$')] and [concept_douglas_mountaineering] expeditions."
 concept_agassiz_volcano: "Volcan"
 concept_agassiz_volcanoes: "Volcans"
 concept_curie_physicist: "#b #ORANGE Physicien#!#!"
 concept_curie_physicists: "#b #ORANGE Physiciens#!#!"
 concept_curie_physicist_desc: "#n à venir bientôt à Morgenröte! #!"
 concept_curie_uranium: "Uranium"
 concept_curie_uranium_desc: "L'uranium est un matériau extrêmement rare que l'on ne trouve que dans quelques provinces historiques sélectionnées par [Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')]. La physique moderne doit avoir été recherchée pour cela. À première vue, l'uranium est un minerai secondaire qui n'est utilisé que dans la production de céramique. Cependant, il sera nécessaire plus tard, en particulier dans le [concept_verrier_observatory]. Ce n'est que si les meilleures méthodes de production physique et chimique sont fournies en uranium qu'elles peuvent remplir leur objectif, que ce soit dans le domaine de la physique nucléaire ou dans la recherche d'éléments précédemment inconnus. Sans uranium, toutes les activités scientifiques dans le domaine de la radioactivité sont tout simplement impossibles. Il est donc particulièrement intéressant pour [Concept('concept_mendelejew_chemist','$concept_mendelejew_chemists$')] et [Concept('concept_curie_physicist','$concept_curie_physicists$')] dans la phase finale de Victoria 3."
 concept_mendelejew_chemistry: "Chimie"
 concept_mendelejew_chemistry_desc: "#b Chemistry#! is one of the main features of [concept_morgenroete]. Starting in the 18th Century, #b Chemistry#! rapidly developed into a modern science. Suddenly many new elements were discovered and chemical processes were invented. The 19th and 20th century saw even more discoveries in Chemistry, ranging from new elements to the invention of dynamite or the Haber-Bosch-Process.\n\nIn #b Morgenröte#! #b Chemistry#! will be conducted by [Concept('concept_mendelejew_chemist','$concept_mendelejew_chemists$')] who will be able to focus on different tasks.\nOne focus is the improvement of your countries #b $building_chemical_plant$#!, #b $building_explosives_factory$#! or #b $building_synthetics_plant$#!, which will make those [Concept('concept_building', '$concept_buildings$')] more efficient.\nIf you are looking for a more prestigous task, you can let your #b Chemist#! theorize, discover or isolate [Concept('concept_mendelejew_element','$concept_mendelejew_elements$')]. Each Element will add a little bit of [concept_prestige] depending on whether you theoriized, discovered or isolated it.\nLater in the game the #b Chemist#! will also be able to invent #b Synthetic Oil#! and #b Synthetic Rubber#!. This will unlock the #b $building_mendelejew_hydrogenation_plants$#! or the #b $building_mendelejew_synthetic_rubber_factory$#!."
 concept_mendelejew_chemists: "#b #ORANGE Chemists#!#!"
 concept_mendelejew_chemist_desc: "#b #ORANGE Chemists#!#! sont [Concept('concept_academics_academic','$concept_academics_academics$')] qui théoriseront, découvriront et isoler [Concept('concept_mendelejew_element','$concept_mendelejew_elements$')]. \ N#b #ORANGE Chemists#!#! Gain [concept_academics_experience] lorsqu'ils recherchent #b Elements#ORANGE0 ou assister à des conférences. Ils peuvent également améliorer les engrais, les explosifs et les synthétiques. Les chimistes peuvent inventer le tableau périodique ou le carburant synthétique, ce qui les rend précieux pour les pays sans accès à l'huile. Ils obtiennent également #b d'expérience #ORANGE0 passivement chaque année. Cela permet à #b #ORANGE Chemists#!#! d'obtenir de meilleurs traits chimistes. Ils peuvent également obtenir une spécialisation (théoricien, analyste, inspecteur) lorsqu'ils sont créés ou par événement."
 concept_mendelejew_element: "Élément chimique"
 concept_mendelejew_element_no_chemical: "Élément"
 concept_mendelejew_elements: "Éléments chimiques"
 concept_mendelejew_element_desc: "Dans les temps anciens, il était courant de croire que le monde était composé des quatre éléments: le feu, la terre, l'eau et l'air. Avec le début de l'émancipation de la chimie de l'alchimie, l'analyse scientifique des éléments chimiques est née. Ce processus était loin d'être complet au 19e siècle. \ N \ n[Concept('concept_mendelejew_chemist','$concept_mendelejew_chemists$')] peut poursuivre cette recherche en théorisant, en découvrant et en isolant les éléments un à la fois. Ce n'est que lorsqu'il est isolé, un élément considéré comme pleinement reconnu et donné son nom; Auparavant, ce n'est qu'un nombre. La catégorisation des éléments apporte un progrès scientifique et un chimiste [concept_academics_experience]. \ Nnot tous les éléments peuvent être théorisés, découverts et isolés dès le début. \ N La condition préalable est que le laboratoire chimique du [concept_verrier_observatory] a un équipement adéquat, dans certains cas également un institut de physique moderne. De nombreux éléments ne peuvent être recherchés que correctement avec la spectrographie; Vers la fin du jeu, un cyclotron peut être nécessaire. [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')] sont nécessaires pour la découverte et l'isolement des éléments chimiques. En plus des méthodes de production, l'expérience du chimiste et les traits de caractère jouent un rôle décisif dans la durée de la recherche. Les éléments \ n \ nrestrés sont une exigence pour le développement du tableau périodique et de l'organisation du Congrès de la chimie."
 concept_verrier_meteorite: "Météorite"
 concept_verrier_meteorites: "Météorites"
 concept_manzoni_national_writers: "Écrivains nationaux"
 concept_verrier_astronomy_desc: "#b astronomy#! est l'une des principales caractéristiques de [concept_morgenroete]. \ N \ nto accéder à #b astronomy#! Vous avez besoin d'un [concept_verrier_observatory] ou d'un [concept_verrier_astronomer]. \ N \ nonce vous avez un observatoire, vous découvrirez passivement [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]. \ N \ n si vous avez un [concept_verrier_astronomer] vous pourrez même trouver de nouveaux planètes, [Concept('concept_verrier_satellite','$concept_verrier_satellites$')], #!0 et vous pourrez même trouver des planètes, [Concept('concept_verrier_satellite','$concept_verrier_satellites$')], #!0 et vous pourrez même trouver des planètes, [Concept('concept_verrier_satellite','$concept_verrier_satellites$')], #!0 et vous pourrez même vous #!1. \ NSOMETHIQUES VOTRE #!2 pourrait également trouver #!3 qui peut être examiné par #b astronomes#! et #!6. \ N \ nevery que la découverte astronomique vous accordera #!7 qui vous sera ajouté #!8. Vérifiez le #!9 [concept_morgenroete]0 pour voir votre #b Prestige #!"
 concept_verrier_observatory_desc: "Un #b Observatory#! est l'épine dorsale des pays [concept_verrier_astronomy] et [concept_mendelejew_chemistry]. À partir de là, [Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')] peut découvrir des planètes, [Concept('concept_verrier_satellite','$concept_verrier_satellites$')], [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')], [Concept('concept_verrier_comet','$concept_verrier_comets$')] et prendre [Concept('concept_verrier_moon_photo','$concept_verrier_moon_photos$')]. \ Nto construire un observatoire #b #!, vous devez avoir une université et le #!1 ou #!2 #!3 recherché. De plus, un #b Observatory#! ne peut être construit qu'une seule fois dans votre capital."
 concept_verrier_astronomer_desc: "#b astronomes#! sont des universitaires qui exploreront le ciel et découvriront [Concept('concept_verrier_satellite','$concept_verrier_satellites$')], [Concept('concept_verrier_comet','$concept_verrier_comets$')] et [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]. \ N#b astronomes#! gain [concept_academics_experience] lorsqu'ils découvrent #b objets astronomiques #! ou assister à des conférences. Ils obtiennent également #b d'expérience #! passivement chaque année. Cela permet à #b astronores#! d'obtenir de meilleurs traits d'astronome. \ N \ nan #b astronome#! peut se concentrer sur la découverte de nouveaux satellites #b satellites#! ou #b en prenant la lune Photos#!. Cela réduira cependant la quantité d'objets astronomiques découverts #b"
 concept_verrier_astronomical_prestige: "Prestige astronomique"
 concept_verrier_astronomical_prestige_desc: "#b Prestige rstige#! est la quantité de [concept_prestige] que vous gagnez de l'astronomie. Divers facteurs influencent votre #b Prestige #!: \ n- La recherche d'une nouvelle planète vous accordera entre #V 15#! et #V 100#! Prestige en fonction de la difficulté de la trouver. \ N- chaque découverte [concept_verrier_satellite] vous accordera 10 prestige. \ N- Un #!0 terminé Prestige. \ N- Chaque #!3 vous accordera #V 1#! Prestige. \ N- Chaque #V 100#! #!8 vous accordera #V 1#! prestige."
 concept_verrier_astronomical_object_desc: "#b Les objets astronomiques#! sont des astéroïdes et des étoiles que vous avez découverts. Ces objets peuvent être découverts si vous avez un [concept_verrier_observatory]. Plus votre technologie d'astronomie est meilleure, plus vous trouverez d'objets. Vous découvrirez également plus d'objets #b#! Si vous avez un [concept_verrier_astronomer]. \ Nait assez #b Objets astronomiques #! Vous pourrez découvrir de nouvelles planètes ou la technologie de physique Astro."
 concept_verrier_moon_map: "Carte de la lune"
 concept_verrier_moon_photo_desc: "Si vous avez un [concept_verrier_observatory] et recherché la technologie de la caméra, vous pourrez commander votre [concept_verrier_astronomer] pour commencer à photographier la lune. Cela réduira la quantité de [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] de votre #b astronome#! mais vous donnera #b Moon Photos#! chaque année. \ Nif vous collectez suffisamment de #b Moon Photos#!, vous créera une carte précise du compagnon de la Terre. L'achèvement de la carte lunaire accordera à votre nation un peu [concept_verrier_astronomical_prestige]"
 concept_verrier_satellite: "Satellite"
 concept_verrier_satellites: "Satellites"
 concept_verrier_satellite_desc: "#b Satellites#! ou les lunes sont [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] qui en orbitent une planète. Certains satellites #b comme la lune de la Terre sont déjà découverts, mais un [concept_verrier_astronomer] peut essayer d'en trouver plus. \ Neach #b satellite#! découvert par votre pays lui accordera une petite quantité de [concept_verrier_astronomical_prestige]."
 concept_verrier_meteorite_desc: "Les météorites sont des corps solides relativement petits d'origine cosmique qui ont traversé l'atmosphère terrestre et ont atteint le sol. Dans de rares cas, des fragments de météorite peuvent être trouvés après une douche de météores. Les météorites qui frappent la Terre il y a des milliers d'années peuvent également être trouvées par [Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')] sur un terrain difficile comme les déserts et les zones arctiques. [Concept('concept_mendelejew_chemist','$concept_mendelejew_chemists$')] et [Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')] en particulier sont intéressés par les météorites et pourraient vouloir les analyser. \ N \ nadditionally #b Meteorites#! aider à élever votre [concept_agassiz_geological_score] et permettre une meilleure estimation du [concept_agassiz_age_of_earth]."
 concept_agassiz_volcano_desc: "#b Volcanoes#! sont un nouveau trait d'état dans #r morgenröte#!. Contrairement au jeu de base pour Victoria 3, ce ne sont pas des régions stratégiques mais plutôt des États avec des volcans qui sont liés à la question de savoir si une éruption volcanique a lieu. L'activité volcanique est nettement plus grande, mais elle n'est pas toujours destructrice. Dans les pays avec des volcans, un #b $building_agassiz_volcano_observatory$#! peut être construit, ce qui aide non seulement à prédire et à atténuer les éruptions par des observations, mais est également le point de départ d'une expédition volcanique. [Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')] peut acquérir de nouveaux [concept_agassiz_geological_knowledge], [Concept('concept_agassiz_rare_mineral','$concept_agassiz_rare_minerals$')], l'expérience et le trait volcanologiste lors d'une expédition volcano."
 concept_agassiz_geological_knowledge: "Connaissances géologiques"
 concept_agassiz_geological_knowledge_desc: "#b Geological Knowledge#! comprend la compréhension générale d'une nation de la nature de la terre. Il s'agit d'une ressource très rare qui peut être acquise principalement au cours des jalons géologiques. #b Geological Knowledge#! n'est pas la même que le [concept_agassiz_geological_score], mais c'est la composante la plus importante de celle-ci et est considérée comme particulièrement précieuse."
 concept_agassiz_geological_score: "Score géologique"
 concept_agassiz_geological_score_desc: "Le score géologique #b comprend toutes les réalisations et les connaissances d'une nation liées à la géologie. Le composant le plus important est [concept_agassiz_geological_knowledge], mais il existe de nombreux autres facteurs importants; comme l'expérience d'un [concept_agassiz_geologist], [concept_agassiz_oceanographic_knowledge], du nombre de [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')], [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] ou [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] et des technologies géologiques. Le score géologique est crucial pour remédier au [concept_agassiz_age_of_earth]."
 concept_agassiz_oceanographic_knowledge: "Connaissance océanographique"
 concept_agassiz_oceanographic_knowledge_desc: "#b Oceanographic Knowledge#! fait partie de [concept_agassiz_geological_knowledge] et correspond à des connaissances sur les mers, en particulier les courants océaniques, mais également des recherches marines générales combinées à des considérations géophysiques. #b Oceanographic Knowledge#! est largement acquis sur [Concept('concept_dubois_pacific_expedition','$concept_dubois_pacific_expeditions$')]. 50 #b Oceanographic Knowledge#! est nécessaire pour acquérir [concept_agassiz_geological_knowledge]."
 concept_agassiz_age_of_earth: "Âge de la Terre"
 concept_agassiz_age_of_earth_desc: "L'une des grandes questions du 19e siècle a été la question de l'âge #b de la Terre #!. Il a eu des implications d'histoire naturelle, en particulier en ce qui concerne la validité de la théorie de l'évolution et la séquence des événements géologiques. Seul un [concept_agassiz_geologist] peut déterminer un nouvel âge terrestre. Pour ce faire, sa nation doit avoir un [concept_agassiz_geological_score] plus élevé que la nation qui a déterminé une âge terrestre. Il partagera ensuite ses résultats de recherche avec d'autres collègues. Il n'a pas nécessairement besoin de réussir - les géologues trop jeunes et inexpérimentés ne seront pas entendus. Cependant, les nations étrangères sont un peu plus accommodantes lorsqu'aucune nouvelle théorie n'a été présentée depuis de nombreuses années. Les géologues ne peuvent estimer l'âge de la terre une fois dans leur vie - mais cela ne s'applique que s'ils réussissent. Si vous échouez, vous pouvez réessayer après une phase de motivation."
 concept_agassiz_geology: "Géologie"
 concept_agassiz_geology_desc: "#b Geology#! est l'une des principales caractéristiques de [concept_morgenroete]. Même avant le début de l'ère victorienne, la géologie avait déjà connu un boom significatif, c'est pourquoi il est disponible dans de nombreuses nations au début du jeu. \ N \ n[Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')] peut être utilisé de diverses manières: ils peuvent trouver [Concept('concept_dubois_formation','$concept_dubois_formations$')], [Concept('concept_lepsius_cave','$concept_lepsius_caves$')] et [concept_curie_uranium] des dépôts lors d'une recherche géologique, allez sur [concept_agassiz_volcano] Expeditions, déterminer [concept_agassiz_age_of_earth], trouver de nouveaux ordres et des dépôts pétroliers et go ou go in [concept_dubois_pacific_expedition] et #!0, 10, de nouveaux orages et des dépôts pétroliers ou go sur [concept_dubois_pacific_expedition] et [concept_dubois_pacific_expedition] Expéditions utiles comme compagnons scientifiques. Un #!1 évalue les connaissances globales d'une nation et est cruciale pour déterminer l'âge de la terre. #!2 et #!3 sont une partie essentielle de la géologie; Ce dernier peut être utilisé pour établir une armoire minérale dans le #!4. Une installation géologique spéciale est le #b #!6#!, qui effectue des études volcanologiques et sismiques."
 concept_theiler_biologist: "#b #GREEN Biologist#!#!"
 concept_theiler_biologists: "#b #GREEN Biologists#!#!"
 concept_theiler_biologist_desc: "A Biologist is an [concept_academics_academic] who researches all aspects of life.\nIn [concept_morgenroete] the Biologist is mostly responsible for researching [Concept('concept_theiler_microorganism','$concept_theiler_microorganisms$')], improving your Agriculture and finding [Concept('concept_theiler_pathogen','$concept_theiler_pathogens$')] and [Concept('concept_theiler_vaccine','$concept_theiler_vaccines$')].\nBiologists gain [concept_academics_experience] passively or by finishing projects."
 concept_gaudi_architect: "#b #PURPLE Architect#!#!"
 concept_gaudi_architects: "#b #PURPLE Architects#!#!"
 concept_academics_university_specialization_desc: "Each University can be specialized by changing its production method.\nA university with a [concept_pm_academics_university_humanities] will allow you to focus your nations research on society innovation and allows to specifically recruit [Concept('concept_panum_physician','$concept_panum_physicians$')], [Concept('concept_lepsius_archaeologist','$concept_lepsius_archaeologists$')] and [Concept('concept_andersson_anthropologist','$concept_andersson_anthropologists$')].\nA university with a [concept_pm_academics_university_natural_history] will allow you to focus your nations research on society innovation and allows to specifically recruit [Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')], [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')], [Concept('concept_dubois_naturalist','$concept_dubois_naturalists$')] and [Concept('concept_theiler_biologist','$concept_theiler_biologists$')].\nA university with a [concept_pm_academics_university_mathematics] will allow you to focus your nations research on production and military innovation and allows to specifically recruit [Concept('concept_tesla_engineer','$concept_tesla_engineers$')], [Concept('concept_mendelejew_chemist','$concept_mendelejew_chemists$')] and [Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')].\nChanging the Specialization will lead to [concept_academics_academic_confusion] which has a #n short negative effect#! for the building and your [concept_academics_progress].\nSpecialized Universities can influence various projects as well. Universities with a $concept_pm_academics_university_mathematics$ focus will help with engineering projects for example."
 concept_pm_academics_university_humanities_desc: "Un foyer en sciences humaines-anthropologiques spécialise l'université et permet une concentration nationale sur la recherche sur la société et de recruter spécifiquement [Concept('concept_lepsius_archaeologist','$concept_lepsius_archaeologists$')] et [Concept('concept_andersson_anthropologist','$concept_andersson_anthropologists$')]. Vous obtiendrez un modificateur de débit négatif #n pour l'université ainsi qu'un effet négatif #n #! sur votre [concept_academics_progress] lorsque vous modifiez cette méthode de production. \ Nspecialization de vos universités avec le Focus Humanities-anthropologique vous donnera un bonus sur la chance de succès des expéditions (maximum de +4 nécessitant 40 niveaux de spécialisation) et améliorent les progrès pour d'autres projets."
 concept_pm_academics_university_natural_history_desc: "A Natural History Focus specializes the University and allowsa national focus on Society Research and to specifically recruit [Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')], [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')], [Concept('concept_dubois_naturalist','$concept_dubois_naturalists$')] and [Concept('concept_dubois_biologist','$concept_dubois_biologists$')]. You will get a #n negative throughput modifier#! for the University as well as a #n negative effect#! on your [concept_academics_progress] when you change this production method.\nSpecializing your Universities with the Natural History Focus will give you a bonus to various projects of your Natural scientists."
 concept_pm_academics_university_mathematics_desc: "Mathematical-Technical Focus specializes the University and allows a national focus on Production and Military Research and to specifically recruit [Concept('concept_tesla_engineer','$concept_tesla_engineers$')] or [Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')]. You will get a #n negative throughput modifier#! for the University as well as a #n negative effect#! on your [concept_academics_progress] when you change this production method.\nSpecializing your Universities with the Mathematical-Technical Focus will give you a bonus to various projects of your [Concept('concept_tesla_engineer','$concept_tesla_engineers$')] and [Concept('concept_mendelejew_chemist','$concept_mendelejew_chemists$')]."
 concept_panum_physician: "#b #BLUE Physician#!#!"
 concept_panum_physicians: "#b #BLUE Physicians#!#!"
 concept_panum_physician_desc: "#b #BLUE Les médecins#!#! sont [Concept('concept_academics_academic','$concept_academics_academics$')] qui travaillent et recherchent dans le domaine de [concept_panum_medicine]. Leur tâche principale est d'écrire [Concept('concept_panum_disease_description','$concept_panum_disease_descriptions$')] et de trouver [Concept('concept_panum_disease_treatment','$concept_panum_disease_treatments$')].Ils peuvent également améliorer la recherche médicale, améliorer les soins de santé et guérir d'autres personnages. \ Nphysiciens gagnent [concept_academics_experience] pendant leur travail et passivement chaque année. Ils peuvent obtenir de meilleurs niveaux du trait du médecin en gagnant suffisamment #b Experience#!."
 concept_panum_medicine: "Médecine"
 concept_panum_medicine_desc: "La médecine est l'une des plus grandes extensions de [concept_morgenroete] pour Victoria 3. L'un des accent est mis sur l'épidémie [Concept('concept_panum_disease','$concept_panum_diseases$')] comme le choléra, la tuberculose et le typhus, qui tourmentent l'humanité depuis des siècles et ont finalement été maîtrisées grâce aux avancées scientifiques. Les maladies épidémiques sont donc l'un des événements négatifs du [concept_morgenroete]. Le confinement par la recherche d'un [concept_panum_disease_treatment] est donc encore plus important. Un élément central de la médecine est donc un [concept_panum_physician] qui est l'un des universitaires de l'orientation universitaire anthropologique-humaine. Il peut décrire les maladies épidémiques et trouver des traitements. Une méthode de traitement nécessite généralement un [concept_panum_disease_description] et une technologie. Un médecin peut également améliorer la recherche des technologies médicales ou étendre les soins de santé dans les hôpitaux, ainsi que de nouvelles techniques médicales et guérir d'autres personnages. Les conférences médicales aident à diffuser des connaissances médicales à l'international. Une étape importante dans la modernisation de la médecine est également la transition de la théorie du miasme au [concept_panum_germ_theory]. Une nation qui est un leader des découvertes médicales peut également démontrer un [concept_panum_medical_prestige] élevé."
 concept_panum_disease: "Maladie"
 concept_panum_diseases: "Maladies"
 concept_panum_disease_desc: "Le terme maladie fait généralement référence aux maladies épidémiques qui peuvent affecter une nation toutes les quelques années. Un [concept_panum_physician] peut les contrer en faisant [Concept('concept_panum_disease_description','$concept_panum_disease_descriptions$')] et en fournissant des maladies épidémiques [Concept('concept_panum_disease_treatment','$concept_panum_disease_treatments$')] ne se produisent généralement pas en même temps et il faut un certain temps pour que les maladies épidémiques éclatent à nouveau. Selon le type, les maladies épidémiques peuvent avoir un effet dévastateur et se propager dans plusieurs états. Il existe diverses méthodes [concept_panum_disease_prevention] pour retarder le début d'une telle maladie ou pour atténuer ses effets. Les déclencheurs d'une maladie peuvent être très différents. La fièvre jaune ne se produit que dans les régions tropicales et le choléra et la tuberculose nécessitent un minimum d'urbanisation pour avoir un effet. Le niveau de vie et le niveau de dévastation d'un État jouent également un rôle. \ N \ nin ajout à ces maladies épidémiques particulièrement redoutées, il existe également des maladies quotidiennes qu'un médecin peut examiner au hasard pendant la recherche médicale. Ces maladies incluent le rachitisme, le pellagra et la syphilis."
 concept_panum_disease_description: "Description de la maladie"
 concept_panum_disease_descriptions: "Description des maladies"
 concept_panum_disease_description_desc: "Les descriptions sont la première étape vers la compréhension d'un [concept_panum_disease]. Ils n'ont aucun impact sur la gravité d'une épidémie, mais sont fondamentaux pour trouver [Concept('concept_panum_disease_treatment','$concept_panum_disease_treatments$')], [Concept('concept_theiler_pathogen','$concept_theiler_pathogens$')] et [Concept('concept_theiler_vaccine','$concept_theiler_vaccines$')]. Les descriptions de la maladie n'ont pas d'autres exigences: tout ce qui est nécessaire est une maladie épidémique et un [concept_panum_physician]."
 concept_panum_disease_treatment: "Traitement de la maladie"
 concept_panum_disease_treatments: "Traitements de la maladie"
 concept_panum_disease_treatment_desc: "Un [concept_panum_physician], étant donné la bonne technologie et un [concept_panum_disease_description], peut trouver un traitement pour un [concept_panum_disease] dans un long processus. Les traitements ne sont pas les mêmes qu'un remède. Le médecin découvre plutôt la cause d'une maladie et développe des méthodes sur cette base pour prévenir ou limiter considérablement une épidémie. Les traitements de la maladie limitent la durée d'une maladie épidémique à quelques mois ou semaines et l'empêchent également de se propager à plusieurs États. Les traitements de la maladie font partie de la possible [concept_panum_disease_prevention] contre les épidémies épidémiques."
 concept_panum_disease_prevention: "Prévention des maladies"
 concept_panum_disease_prevention_no_disease: "Prévention"
 concept_panum_disease_prevention_desc: "Il existe plusieurs façons d'éviter ou du moins d'atténuer une épidémie [concept_panum_disease]. La méthode la plus connue est le [concept_panum_disease_treatment] développé par un [concept_panum_physician]. Il réduit considérablement le temps où une maladie fait rage et réduit également la probabilité qu'elle se propage à un autre pays. Le niveau de vie, les hôpitaux, les technologies et un haut niveau d'institutions de soins de santé ont également un impact. La prévention ultime est un [concept_theiler_vaccine] qui empêche une maladie de se produire en premier lieu. Les vaccins sont développés par [Concept('concept_theiler_biologist','$concept_theiler_biologists$')]. Cependant, il n'est efficace que si l'institution de santé a au moins atteint le niveau spécifié auprès de la faculté médicale. Après tout, la distribution d'un vaccin doit être organisée et supervisée."
 concept_panum_disease_type: "Type de maladie"
 concept_panum_disease_types: "Types de maladies"
 concept_panum_disease_type_desc: "L'épidémie [Concept('concept_panum_disease','$concept_panum_diseases$')] peut être différenciée en fonction de leur degré de distribution. #V Les maladies locales #!,, comme la scarlare, sont limitées à l'État dans lequel ils ont éclaté. #V Maladies régionales #!, comme la tuberculose, peut se propager à certains états environnants, mais pas au-delà. #V Maladies transrégionales#! - dont la plus notoire est le choléra - peut se propager dans tout le pays, même si les États n'ont pas à se border mutuellement."
 concept_panum_local_disease: "Maladie locale"
 concept_panum_local_diseases: "Maladies locales"
 concept_panum_regional_disease: "Maladie régionale"
 concept_panum_regional_diseases: "Maladies régionales"
 concept_panum_transregional_disease: "Épidémie transrégionale"
 concept_panum_transregional_diseases: "Épidémie transrégionale"
 concept_panum_germ_theory: "Théorie des germes"
 concept_panum_germ_theory_desc: "La théorie des germes est l'une des avancées scientifiques médicales fondamentales du 19e siècle. Il a remplacé les théories précédentes et plus archaïques, telles que la théorie du miasme, qui était répandue en Europe et représente toutes les tentatives traditionnelles pour expliquer la cause de [Concept('concept_panum_disease','$concept_panum_diseases$')]. La découverte de la théorie des germes profite non seulement au premier découvreur. Lorsque vous recherchez [Concept('concept_panum_disease_treatment','$concept_panum_disease_treatments$')], les chances de succès sont légèrement plus élevées car elle empêche certains événements négatifs et débloque plus d'événements positifs."
 concept_panum_medical_prestige: "Prestige médical"
 concept_panum_medical_prestige_desc: "Le prestige médical est composé du [Concept('concept_panum_disease_description','$concept_panum_disease_descriptions$')] (2 points), du [Concept('concept_panum_disease_treatment','$concept_panum_disease_treatments$')] (4 points), du [Concept('concept_theiler_pathogen','$concept_theiler_pathogens$')] (3 points) et du [Concept('concept_theiler_vaccine','$concept_theiler_vaccines$')] (4 points) découvert jusqu'à présent. Les premières découvertes donnent deux fois plus de points. Un prestige médical supplémentaire peut provenir de la guérison des maladies quotidiennes, de l'invente des méthodes de guérison spéciales ou de l'amélioration généralement du système de santé via un [concept_panum_physician]."
 concept_theiler_pathogen: "Pathogène"
 concept_theiler_pathogens: "Pathogènes"
 concept_theiler_pathogen_desc: "A Pathogen is the name for something that causes a [concept_panum_disease]. This could be anything from an organism to a [concept_theiler_microorganism]. Often it is a Bacterium, parasite or Virus.\nA Biologist with access to enough Microorganisms can try to find the Pathogen that causes a Disease. This can help tp prevent the disease and to discover and produce a [concept_theiler_vaccine]"
 concept_theiler_vaccine: "Vaccin"
 concept_theiler_vaccines: "Vaccins"
 concept_theiler_vaccine_desc: "The discovery of Vaccines has allowed humans to become immune to [Concept('concept_panum_disease','$concept_panum_diseases$')] without contracting them and can potentially save millions of lives.\nTo create a Vaccine, A [concept_theiler_biologist] must first find the [concept_theiler_pathogen] that causes a Disease. Then the development of a Vaccine can start if enough [Concept('concept_theiler_microorganism','$concept_theiler_microorganisms$')] are available."
 concept_panum_red_cross: "Croix Rouge"
 concept_panum_red_cross_desc: "La Croix-Rouge est l'une des premières organisations internationales et, dans de rares cas, offre la possibilité de recevoir des médecins de la Croix-Rouge dans une guerre. Les membres de la Croix-Rouge reçoivent également certains bonus. Selon la règle du jeu, la Croix-Rouge peut être fondée historiquement ou dynamiquement; Les États reconnus peuvent se joindre à certaines exigences technologiques. Le fondateur reçoit le siège de la Croix-Rouge dans sa capitale. Les membres peuvent accéder à jusqu'à trois [Concept('concept_panum_convention','$concept_panum_conventions$')] qui sont contraignants en vertu du droit international."
 concept_panum_convention: "Convention internationale"
 concept_panum_conventions: "Conventions internationales"
 concept_panum_convention_desc: "Une convention internationale est une déclaration d'intention conjointe des États pour établir certaines règles du jeu dans le trafic international. Il y en avait plusieurs exemples au cours du 19e siècle, comme la Convention de Genève ou le code de la guerre des terres de La Haye. Ce que toutes les conventions ont en commun, c'est qu'ils tentent d'atténuer les horreurs de la guerre. Les options militaires sont donc préférées aux soins médicaux sûrs pour les armes blessées et ultimes sont interdites, ce qui conduit à un certain confinement de la guerre. L'avantage est une plus grande flexibilité. Bien que l'adoption d'une convention soit considérée favorablement, l'abolition d'une convention peut conduire à la colère internationale. \ N \ ninternational Conventions sont généralement des déclarations d'intention non contraignantes. Cependant, si suffisamment de membres du [concept_panum_red_cross] le signent, au fil du temps, il deviendra un droit international valide, ce à quoi tous les signataires devraient se conformer - et les autres membres le signeront également. Cela se produit lorsque 65% de tous les membres et la majorité des grands pouvoirs conviennent de cette convention - alors tous les autres membres sont alors obligés de le respecter. Cette convention ne peut alors plus être abolie comme d'habitude. Afin d'éviter les conventions contraignantes, un retrait complet de la Croix-Rouge est nécessaire - avec toutes les conséquences."
 concept_manzoni_literary_tradition_desc: "#b Literary Tradition#! is a representation of a nation's literary achievements and traditions.\nThere are various ways to gain #b Literary Tradition#!. Having at least one $building_art_academy$, having one or more [Concept('concept_manzoni_local_writer','$concept_manzoni_local_writers$')], a [concept_manzoni_national_writer] and having certain [Concept('concept_artists_center_of_arts','$concept_artists_centers_of_arts$')] will passively add #b Literary Tradition#! to your country.\nThe more #b Literary Tradition#! your nation gains, the higher the prestige bonus you gain. Additionally it will allow you to unlock the [concept_elgar_expressionism] [concept_artists_art_style]."
 concept_elgar_musical_tradition_desc: "#b Musical Tradition#! est une représentation des réalisations et traditions musicales d'une nation. \ NELLIQUES DES DISTRICES DE GAGNER #b MUSICAL TRADITION#!. Si vous en avez au moins un [concept_elgar_opera], vous obtiendrez passivement #b Musical Tradition#!. Plus vous en avez sur #b #b, plus vous en avez. Vous pouvez également gagner plus #b Musical Tradition#! à partir des technologies musicales et artistiques. Chaque technologie donne un bonus différent. Vous pouvez également obtenir #b Musical Tradition#! à partir d'événements, surtout si vous avez un #!3. \ Nhe plus #b Musical Tradition#! Votre nation gagne, plus le bonus de prestige est élevé que vous gagnez. De plus, il vous permettra de déverrouiller le #!6 #!7."
 concept_klimt_painting_tradition_desc: "#b Tradition #! est une représentation des réalisations et traditions de peinture d'une nation. Il peut être obtenu en ayant des académies artistiques #b #!, un [concept_klimt_painter], certains [Concept('concept_technology', '$concept_technologies$')] ou des événements. \ N#b Tradition#! de la peinture vous permet de déverrouiller le [concept_elgar_art_nouveau] [concept_artists_art_style] et est utilisé pour calculer votre tradition culturelle #b_1."
 concept_mendelejew_theorized_elements: "Éléments théorisés"
 concept_mendelejew_discovered_elements: "Éléments découverts"
 concept_mendelejew_isolated_elements: "Éléments isolés"
 concept_panum_psycho_point: "Point psychothérapeutique"
 concept_panum_psycho_points: "Points psychothérapeutiques"
 concept_panum_psycho_point_desc: "Les points psychothérapeutiques sont une monnaie abstraite qui représente les progrès d'un pays dans le domaine de la psychiatrie et de la psychologie. Ils sont générés mensuellement à partir des technologies, un asile fou ou un [concept_panum_physician] avec #V psychiatre#! [concept_character_trait]. Les points psychothérapeutiques peuvent également être acquis via l'événement. Un nombre élevé de points psychothérapeutiques se traduit par une meilleure chance de guérir les personnages atteints de maladies mentales. Monter un niveau psychothérapeutique donne également des bonus de recherche et [concept_academics_progress]. Un certain nombre de points psychothérapeutiques sont une exigence pour la plupart des écoles psychologiques."
 concept_vikelas_mechanic: "Mécanicien"
 concept_vikelas_mechanic_desc: "Lorem Ipsum"
 concept_vikelas_mechanical_innovation: "Innovation mécanique"
 concept_vikelas_race_car: "Voiture de course"
 concept_vikelas_race_car_desc: "Lorem Ipsum"
 concept_vikelas_race_car_reliability: "Fiabilité de la voiture de course"
 concept_vikelas_race_car_safety: "Sécurité des voitures de course"
 concept_vikelas_race_car_speed: "Vitesse de voiture de course"
 concept_dubois_dinosaur_bone_no_dinosaur: "Os"
 concept_dubois_dinosaur_bones_no_dinosaur: "Os"
 concept_dubois_paleontological_expedition_desc: "Un [concept_dubois_paleontologist] peut être envoyé à [Concept('concept_dubois_formation','$concept_dubois_formations$')]. Cela prendra 1 an et selon le succès de l'expédition, vous obtiendrez [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] et [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')]. Lorsque vous terminez une expédition et si vous avez un [concept_dubois_paleontological_team] gratuit, vous pouvez configurer un [concept_dubois_paleontological_excavation] pour gagner passivement des fossiles et des os de cette région. \ N le moyen le plus simple d'accéder à une formation est de contrôler l'état associé. Cependant, l'accès peut également être acquis pacifiquement via [Concept('concept_dubois_paleontological_licence','$concept_dubois_paleontological_licences$')]."
 concept_dubois_paleontological_team: "Équipe paléontologique"
 concept_dubois_paleontological_teams: "Équipes paléontologiques"
 concept_dubois_paleontological_team_desc: "Les équipes paléontologiques peuvent être utilisées pour créer un [concept_dubois_paleontological_excavation] après avoir terminé un [concept_dubois_paleontological_expedition]. Cela vous permettra d'obtenir passivement [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] et [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')]."
 concept_dubois_paleontological_excavation: "Fouille paléontologique"
 concept_dubois_paleontological_excavations: "Fouilles paléontologiques"
 concept_dubois_paleontological_excavation_desc: "Vous pouvez configurer une expédition paléontologique après avoir terminé un [concept_dubois_paleontological_expedition] si vous avez un [concept_dubois_paleontological_team] gratuit. Une fouille paléontologique permettra à votre équipe de produire passivement [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] et [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')]."
 concept_verrier_venus_transit: "Venus Transit"
 concept_verrier_venus_transit_desc: "The transit of Venus refers to the rare occurrence of the moon passing between Earth and Venus. However, it occurred twice in the 19th century: in 1874 and 1882. Since observations of the transit of Venus allow conclusions to be drawn about the size of the solar system and a more precise determination of the size of the astronomical unit (AU), these were major scientific events. Countries located in the [concept_verrier_venus_transit_zone] can observe the event from there; other countries must send expeditions. The success of the observation depends on the experience of the [concept_verrier_astronomer], the availability of an [concept_tesla_engineer], and a bit of luck: sometimes the weather can prevent a good image. The better the observation, the greater the bonus."
 concept_verrier_venus_transit_zone: "Venus Transit Zone"
 concept_verrier_venus_transit_zone_desc: "The Venus Transit Zone refers to the part of the Earth from which a complete (not just partial) transit of Venus can be observed. In 1874, this was particularly true for the East Asia-Pacific region, and in 1882 for almost the entire American continent. A detailed breakdown of the strategic regions is provided below.\n\n#V Venus Transit 1874:#!\nIndonesia, Indochina, Oceania, South China, North China, manchuria, Japan, Central India, Madras, Bengal, Himalayas; also, the State of Indian Ocean Territory.\n\n#V Venus Transit 1882:#!\nBrazil, La Plata, Andes, Gran Columbia, Mexico, Central America, Carribean, The Midwest, Dixie, New England; also, the States of Ontario and Quebec."
 concept_vikelas_coach: "Coach"
 concept_vikelas_coaches: "Coaches"
 concept_vikelas_coach_desc: "Coaches are the national trainers of a country in a specific national sport. National sports include [concept_vikelas_football], baseball, basketball, and cricket. Coaches provide bonuses for the respective team in competitions – whether at International World Championships or at international matches. The latter are played secretly at regular intervals and increase a coach's experience value upon victory. High experience points and positive [Concept('concept_character_trait','$concept_character_traits$')] increase the chance of winning a World Championship. Positive traits are those that particularly motivate players – such as ambitious or charismatic – while demotivating traits reduce the chance of winning a match. These include traits such as ruthless or cruel.\n\n#R NOTE: At the moment only football is integrated.#!"
 concept_vikelas_football: "Football"
 concept_vikelas_football_desc: "Football is a possible national sport. The first football clubs can be established in Europe and South America; this will require a relatively liberal legal system, a strong petty bourgeoisie, or considerable average standard of living. After that, occasional football matches could be played. With the establishment of FIFA, international matches and the World Cup also become possible. The eight best teams automatically qualify for the World Cup. The teams are calculated according to the National Football Team Value (NFTV), which is derived from the parameters of standard of living (fitness of the population), strength of the petty bourgeoisie (club system), literacy (tactics), and tradition (national sport: yes or no?). In matches, not only the NFTV is taken into account, but also the character traits and experience of the [concept_vikelas_coach]."
 concept_gaudi_architectural_splendour: "Architectural Splendour"
 concept_gaudi_architectural_splendour_desc: "Architectural Splendour is a collective term for the spectacular advances in modern architecture, referring primarily to Art Deco, Bauhaus, and Neoclassicism as they emerged in the early 20th century. The value represents the transformation of outdated forms into a future-ready architecture. Art Deco requires reaching a higher threshold to fulfill the dream of an Art Deco city — yet the benefits are greater."
 concept_artists_artist_desc: "In [concept_morgenroete] #b Artists#! are special characters that allow you to use certain mechanics of the mod. You can get #b Artists#! in some events or by aquiring enough [concept_artistic_progress]. Artists have [concept_artists_experience] that reflects their standing in their respective field.\nCurrently these #b Artists#! exist:\n - [concept_elgar_composer]\n - [concept_klimt_painter]\n - [concept_manzoni_writer]\n - [concept_gaudi_architect]"
 concept_elgar_architecture_desc: "Architecture is one of the core concepts of [concept_morgenroete]. It is divided into two major parts.\n\nOn the one hand, [concept_gaudi_monuments] have been completely redesigned: they are no longer built directly, but expanded step by step based on decisions. On the other hand, numerous monuments have been added - some of which must be built, others exist at the start of the game.\n\nThe other key point is the introduction of the [concept_gaudi_architect], who can upgrade cities and design up to 15 new unique buildings by researching [Concept('concept_gaudi_architectural_blueprint','$concept_gaudi_architectural_blueprints$')]. Architects can also rebuild a country in the Bauhaus, Neoclassical, and Art Deco styles. A [concept_gaudi_great_architect] can even design their own [concept_gaudi_custom_monument]!"
 concept_gaudi_architect_desc: "#PURPLE #b Architects#!#! are [Concept('concept_artists_artist','$concept_artists_artists$')] whose skills relate to urban planning, building design and construction. They are special character types that you can gain either from events, from gaining enough [concept_artistic_progress] to create one in your nation or by offering a position to a [concept_gaudi_independent_architect].\nWhile other artists are more likely to accumulate cultural tradition, architects only rarely generate the very valuable [concept_gaudi_architectural_splendour] when they are involved in urban planning or the expansion of the capital—or when they completely redesign the country in a particular architectural style. Their main task is more practical in nature. They work in public construction, thus providing a nation with additional construction points. They improve infrastructure through planning and enhance capital cities into livable places. Architects can also hone their skills on a study tour or write an architectural treatise.\nOf paramount importance is the design of new, unique buildings, for which they create a [concept_gaudi_architectural_blueprint]. A total of 15 of these [concept_gaudi_blueprint_buildings] can be researched—since this takes a long time, it's worth considering which ones make sense.\nArchitects also provide a passive bonus: their mere presence accelerates the construction of [concept_gaudi_monuments] by 100 percent. The greatest achievement of an architect is the design of their own [concept_gaudi_custom_monument]. This is only possible with a [concept_gaudi_great_architect]."
 concept_douglas_mountaineering: "Alpinisme"
 concept_douglas_mountaineering_desc: "Countries that own at least one [concept_douglas_mountain_summit] or have a #b Mountaineering License#! with a country that has one can participate in mountaineering. To start a #b Mountain Expedition#! you need both the #b Prospecting#! and #b Nationalism#! technologies as well as a general that has either the #b Mountaineer#!, #b Explorer#!, #b Mountain Commander#! or #b Surveyor#! Trait.\nAs soon as you start a #b Mountain Expedition#! you will have to first choose which general will be the main Mountaineer. Then you will choose the summit to climb.\nThe higher the mountains, the more dangerous is the ascent. The Mountains are classified according to their height in meters ranging from under 4000 meters upt to over 8000 meters. Success depends on researched military technologies, the age and health of the leader, and their characteristics. Avalanches and steep slopes can pose a major risk that threatens the entire endeavor.\nYou can even send an additional [Concept('concept_academics_academic','$concept_academics_scientist$')] on the trip. Either a [concept_dubois_naturalist] or a [concept_dubois_paleontologist] will help discover more about the mountain you climbed on.\nIn the end you will get a prestige bonus and your general will develop better traits that will help them in combat as well for mountaineering."
 concept_gaudi_great_architect: "#PURPLE #b Grand architecte#!#!"
 concept_gaudi_great_architects: "#PURPLE #b Great Architects#!#!"
 concept_gaudi_great_architect_desc: "#b Les grands architectes#! sont [Concept('concept_gaudi_architect','$concept_gaudi_architects$')] qui sont considérés comme les plus importants dans leur domaine. #b Les architectes#! qui atteignent 500 [concept_artists_experience] deviennent #b Grands architectes#!. Si un artiste atteint ce rang spécial, il ou elle peut concevoir le plan d'une [concept_gaudi_custom_monument] vraiment exceptionnelle qui incarne l'esprit de la nation."
 concept_gaudi_monuments: "Monuments à l'intérieur de #R Morgenröte#!"
 concept_gaudi_monuments_desc: "De nombreuses nations ont reçu de nouveaux monuments #b #! en [concept_morgenroete]: #b  la cathédrale de Cologne#! en Allemagne, #b le Gotthardbahn#! en Suisse, #b le Cristo Redentor#! au Brésil, #b le Mole Antonelliana#! en Italie, #b le Palais d'été#! en Chine, le #b Sagrada Família#! en Espagne, le #b Schloss Neuschwanstein#! en Bavière, le #b Palacio de Bellas Artes#! au Mexique et le #b Gyeongbokgung Palace#! en Corée.\Tous les bâtiments, à l'exception du #b Summer Palace#! et du #b Campanile#!, doivent être construits par leur propriétaire. Le #b Saxon Palace#! peut être réactivé par une nation polonaise. Il y a aussi de nouveaux monuments au début du jeu comme les #b Bouddhas de Bamiyan#! ou le #b Palais du Potala#!. Il y a aussi la possibilité d'avoir un [concept_gaudi_custom_monument] conçu par un [concept_gaudi_great_architect]. Contrairement au jeu vanille, #b Les monuments#! ne sont pas construits directement, mais plutôt à travers une décision. La construction se déroule en plusieurs étapes, en fonction de la taille du bâtiment, et peut prendre des années, voire des décennies - et est nettement plus coûteuse."
 concept_athletes_athlete: "Athlète"
 concept_athletes_athletes: "Athletes"
 concept_athletes_athlete_desc: "Dans [concept_morgenroete] #b  Les athlètes#! sont des personnages spéciaux qui vous permettent d'utiliser certains mécanismes du mod.#b Les athlètes#! sont généralement créés par le biais d'événements ou d'un bouton. Comme les autres personnages, les #b Athlètes#! possèdent des expériences qui leur garantissent une plus grande réussite dans leur domaine.\Nactuellement, ces #b Athlètes#! existent:\n - [concept_curtiss_balloonist]\n - [concept_curtiss_pilot]\n - [concept_vikelas_olympian]\n - [concept_douglas_mountaineer]\n - [concept_vikelas_coach]\n - [concept_vikelas_racer]"
 concept_gaudi_independent_architect: "Architecte indépendant"
 concept_gaudi_independent_architects: "Independent Architects"
 concept_gaudi_independent_architect_desc: "[Concept('concept_gaudi_architect','$concept_gaudi_architects$')] qui ne sont pas engagés par un pays sont #b Architectes indépendants#!.\nContrairement à de nombreux autres artistes, il y a peu d'exigences pour recruter un #b Architecte indépendant#!, à l'exception d'un minimum d'exigences technologiques. Ce sont de véritables globe-trotters qui n'exigent généralement qu'une bonne rémunération."
 concept_gaudi_architectural_blueprint: "Plan d'architecture"
 concept_gaudi_architectural_blueprints: "Architectural Blueprints"
 concept_gaudi_architectural_blueprint_desc: "Architectural blueprints can be researched by [Concept('concept_gaudi_architect','$concept_gaudi_architects$')]. They are essential for the construction of special [concept_gaudi_blueprint_buildings] that can only be erected once in a nation. There are a total of 15 different buildings in five different categories. Certain blueprints require technologies to be researched. Since research can sometimes take years, it's wise to decide beforehand which blueprints are most important. The buildings can potentially be constructed in any state, but require a certain level of urbanization. In some cases, there may be additional requirements."
 concept_gaudi_blueprint_buildings: "Blueprint Buildings"
 concept_gaudi_blueprint_buildings_desc: "Blueprint buildings are buildings which need a bluprint researched by [Concept('concept_gaudi_architect','$concept_gaudi_architects$')]. These buildings can only be built once in a nation. There are 15 different buildings:\n\n#b Monument#!\n- [GetBuildingType('building_gaudi_statue').GetName]\n- [GetBuildingType('building_gaudi_fountain').GetName]\n- [GetBuildingType('building_gaudi_arch').GetName]\n\n#b Public Square#!\n- [GetBuildingType('building_gaudi_park').GetName]\n- [GetBuildingType('building_gaudi_luna').GetName]\n- [GetBuildingType('building_gaudi_parade').GetName]\n\n#b Service Buildings#!\n- [GetBuildingType('building_gaudi_almshouse').GetName]\n- [GetBuildingType('building_gaudi_school').GetName]\n- [GetBuildingType('building_gaudi_prison').GetName]\n\n#b Health Institutions#!\n- [GetBuildingType('building_gaudi_canalization').GetName]\n- [GetBuildingType('building_gaudi_hospital').GetName]\n- [GetBuildingType('building_gaudi_health').GetName]\n\n#b National Academies#!\n- [GetBuildingType('building_gaudi_science').GetName]\n- [GetBuildingType('building_gaudi_arts').GetName]\n- [GetBuildingType('building_gaudi_sports').GetName]"
 concept_gaudi_custom_monument: "Monument personnalisé"
 concept_gaudi_custom_monument_desc: "Un monument sur mesure est le plus grand chef-d'œuvre possible d'un [concept_gaudi_architect]. Il peut rivaliser avec d'autres monuments ordinaires. Seul un [concept_gaudi_great_architect] peut élaborer de tels plans. Il nécessite des recherches sur les technologies architecturales les plus modernes. Le type de monument conçu par un architecte dépend en grande partie de son style architectural. Les architectes Art déco conçoivent le [GetBuildingType('building_gaudi_people_monument').GetName], les architectes Bauhaus le [GetBuildingType('building_gaudi_people_forum').GetName], et les architectes néoclassiques le [GetBuildingType('building_gaudi_people_palace').GetName]."
 concept_douglas_mountaineer: "Montagnard"
 concept_douglas_mountaineers: "Les Montagnards"
 concept_douglas_mountaineer_desc: "#b Mountaineers#! are [Concept('concept_athletes_athlete','$concept_athletes_athletes$')] who can climb unconquered [concept_douglas_mountain_summit]. They can be recruited against [concept_douglas_alpine_heritage] after the establishment of a mountaineering club. Countries with geographical features such as mountains, peaks, or volcanoes therefore have an advantage in recruitment. Mountaineering traits and experience are the most important factors for progress in conquering a mountain or overcoming a dangerous situation.#!"
 concept_vikelas_olympian: "Olympien"
 concept_vikelas_olympian_desc: "#n Cet article est en cours de révision.#!"
 concept_douglas_mountain_summit: "Sommet de la montagne"
 concept_douglas_mountain_summits: "Mountain Summits"
 concept_douglas_mountain_summit_desc: "Mountain Summits are the coveted goal of all mountaineers. They mark the highest point of a mountain. Each summit has three distinct attributes that define how difficult it is to reach successfully.\n\n#V Height#!: Height determines how many steps are required to climb a mountain—this reflects the overall length of an expedition. For every 1,000 meters, one progress step is needed. The value is rounded up, meaning that the 4,421-meter-high Mount Whitney requires 5 steps, while the 7,134-meter-high Kauffmann Peak demands 8. A mountain's prestige is calculated based on its height: the total height is divided by 300. Thus, an ideal mountain of 4,500 meters grants 15 prestige.\n\n#V Level#!: A mountain's level represents the equipment demands necessary to climb it. This is not strictly tied to its height. For example, despite its 5,636 meters, Citlaltépetl is only Level 1 and requires just basic equipment. In contrast, the Matterhorn, at only 4,478 meters, is considered significantly more demanding at Level 3, requiring at least first aid preparation for Alpine emergencies.\n\n#V Risk#!: A mountain's risk level indicates the likelihood of negative events affecting an expedition. It is independent of both height and level. Avalanches, fog, and severe weather are key concerns. Popocatépetl could be ascended already in early modern times due to its hospitable surroundings. In contrast, the much smaller Großvenediger, at just 3,666 meters, still posed a serious threat to Austrian expeditions well into the early 19th century.\n\nMore information about individual summits can be found under the [concept_douglas_mountain_summit_list] section."
 concept_douglas_mountain_range: "Chaîne de montagnes"
 concept_douglas_mountain_ranges: "Mountain Ranges"
 concept_douglas_mountain_range_desc: "Une chaîne de montagnes est définie comme une formation montagneuse qui offre la possibilité de s'entraîner sur de longues distances ( [concept_douglas_mountaineering] ). Les chaînes de montagnes classiques comprennent les montagnes Rocheuses, les Andes, les Alpes et le Caucase. Contrairement aux [Concept('concept_douglas_mountain_summit','$concept_douglas_mountain_summits$')] qu'il faut conquérir, il existe également de nombreuses montagnes moins difficiles où il n'y a pas de risque de chute mortelle pour [concept_douglas_mountaineer]. Elles doivent plutôt être considérées comme des itinéraires d'entraînement. Les pays dotés de chaînes de montagnes ont plus de chances de former des alpinistes que ceux qui n'ont pas cette caractéristique géographique."
 concept_douglas_alpine_heritage: "Patrimoine alpin"
 concept_douglas_alpine_heritage_desc: "Le patrimoine alpin est un terme collectif désignant un lien avec les montagnes et une spécialisation dans l'escalade des montagnes. Il fait également référence au potentiel de recrutement de nouveaux [Concept('concept_douglas_mountaineer','$concept_douglas_mountaineers$')]- puisque, dans la plupart des cas, les alpinistes expérimentés sont originaires de régions montagneuses. Cela donne toujours un avantage aux pays dotés de [Concept('concept_douglas_mountain_range','$concept_douglas_mountain_ranges$')] ou [Concept('concept_douglas_mountain_summit','$concept_douglas_mountain_summits$')]. Le recrutement d'un nouvel alpiniste, ainsi que diverses autres actions, coûtent au Patrimoine alpin."
 concept_douglas_mountain_summit_list: "Liste des sommets de montagne"
 concept_douglas_mountain_summit_list_desc: "There are many [Concept('concept_douglas_mountain_summit','$concept_douglas_mountain_summits$')] that can be climbed.\n\n#V North America:#!\n#b Mount McKinley#! (Alaska), Height 6190 meters, Level 4\n#b Mount Logan#! (Yukon Territory), Height 5959 meters, Level 4\n#b Citlaltépetl#! (México), Height 5636 meters, Level 1\n#b Mount Whitney#! (California), Height 4421 meters, Level 1\n\n#V South America:#!\n#b Aconcagua#! (Mendoza), Height 6267 meters, Level 3\n#b Huascarán#! (Lima Territory), Height 6768 meters, Level 5\n#b Illimani#! (La Paz), Height 6438 meters, Level 4\n#b Chimborazo#! (Ecuador), Height 6267 meters, Level 1\n\n#V Europe:#!\n#b Shkara#! (Greater Caucasus), Height 5642 meters, Level 4\n#b Dufourspitze#! (Dufourspitze), Height 4634 meters, Level 2\n#b Matterhorn#! (West Switzerland), Height 4478 meters, Level 3\n#b Aiguille Verte#! (Savoy), Height 4122 meters, Level 3\n#b Pico de Aneto#! (Aragon), Height 3404 meters, Level 1\n\n#V Africa:#!\n#b Kibo#! (Tanganyika), Height 5895 meters, Level 2\n#b Mount Kenya#! (Kenya), Height 5199 meters, Level 3\n#b Mount Stanley#! (Uganda), Height 5109 meters, Level 3\n#b Mount Cameroon#! (South Cameroon), 4095 meters, Level 1\n\n#V Asia:#!\n#b Kamet#! (Delhi), Height 7756 meters, Level\n#b Chogolisa#! (Kashmir), Height 7665 meters, Level 5\n#b Kabru#! (Himalayas), Height 7412 meters, Level 5\n#b Kaufmann Peak#! (Tajikistan), Height 7134 meters, Level 4\n\n#V Australia & Oceania:#!\n#b Mount Wilhelm#! (Eastern New Guinea), Height 4121 meters, Level 2\n#b Mount Cook#! (South Island), Height 3724 meters, Level 2"
 concept_panum_disease_description_describe: "describe"
 concept_panum_disease_description_described: "described"
 concept_panum_disease_treatment_treat: "treat"
 concept_panum_disease_treatment_treated: "treated"
 concept_roy_ethnologist: "#b #ORANGE Ethnologist#!#!"
 concept_roy_ethnologists: "#b #ORANGE Ethnologists#!#!"
 concept_roy_ethnologist_desc: "#n Coming soon to Morgenröte!#!"
 ag_morgenroete_desc: "We have open alerts from the [concept_morgenroete] Mod."
 concept_tesla_engineer: "#b #ORANGE Engineer#!#!"
 concept_tesla_engineers: "#b #ORANGE Engineers#!#!"
 concept_tesla_civil_engineer: "#b #ORANGE Civil Engineer#!#!"
 concept_tesla_civil_engineers: "#b #ORANGE Civil Engineers#!#!"
 concept_tesla_civil_engineering: "#b #ORANGE Civil Engineering#!#!"
 concept_tesla_mechanical_engineer: "#b #ORANGE Mechanical Engineer#!#!"
 concept_tesla_mechanical_engineers: "#b #ORANGE Mechanical Engineers#!#!"
 concept_tesla_mechanical_engineering: "#b #ORANGE Mechanical Engineering#!#!"
 concept_tesla_military_engineer: "#b #ORANGE Military Engineer#!#!"
 concept_tesla_military_engineers: "#b #ORANGE Military Engineers#!#!"
 concept_tesla_military_engineering: "#b #ORANGE Military Engineering#!#!"
 concept_tesla_electrical_engineer: "#b #ORANGE Electrical Engineer#!#!"
 concept_tesla_electrical_engineers: "#b #ORANGE Electrical Engineers#!#!"
 concept_tesla_electrical_engineering: "#b #ORANGE Electrical Engineering#!#!"
 concept_tesla_aeronautical_engineer: "#b #ORANGE Aeronautical Engineer#!#!"
 concept_tesla_aeronautical_engineers: "#b #ORANGE Aeronautical Engineers#!#!"
 concept_tesla_aeronautical_engineering: "#b #ORANGE Aeronautical Engineering#!#!"
 concept_tesla_engineering: "Engineering"
 concept_tesla_engineering_desc: "#b Engineering#! is one of the main features of [concept_morgenroete].\n\nTo get access to #b Engineering#!, you need to have an [concept_tesla_engineer]. #b Engineers#! can start #b Engineering Projects#! depending on their specialization. There are five specialized #b Engineers#!:\n- The [concept_tesla_civil_engineer] focuses on improving the infrastructure of a country.\n- The [concept_tesla_mechanical_engineer] focuses on mechanical inventions that benefit the industry, for example.\n- The [concept_tesla_military_engineer] focuses on improving the army and navy of a country.\n- The [concept_tesla_electrical_engineer] focuses on improving the electrical infrastructure of a country.\n- The [concept_tesla_aeronautical_engineer] focuses on making human flight possible and improving airplanes and other aircraft."
 concept_tesla_engineer_desc: "#b #ORANGE Engineers#!#! are Academics that will help with the construction of special buildings by providing expertise.\nAdditionally #b #ORANGE Engineers#!#! will provide a bonus to the [concept_technology_spread] of your nation. The bonus depends on how many nations have more technologies researched than your nation."
 concept_tesla_civil_engineer_desc: "#b Civil Engineers#! focus on improving the infrastructure of a country.\nThey can start #b Engineering Projects#! to add [Concept('concept_modifier','$concept_modifiers$')] to states that raise [concept_infrastructure], to improve your #b Construction Sectors#! or to research [Concept('concept_technology', '$concept_technologies$')]."
 concept_tesla_mechanical_engineer_desc: "#b Mechanical Engineer#! focus on mechanical innovations that improve your industry, machines or the lifes of your population.\nThey can start #b Engineering Projects#! to add [Concept('concept_modifier','$concept_modifiers$')] to your industrial building that improve [concept_throughput], [concept_good_production] and [concept_input_mult], to improve your #b Railways#! with new locomotives or to research industrial [Concept('concept_technology', '$concept_technologies$')]."
 concept_tesla_military_engineer_desc: "#b Military Engineer#! focus on improving our army and navy by introducing new innovations.\nThey can start #b Engineering Projects#! to gain new [Concept('concept_mobilization_option','$concept_mobilization_options$')] by inventing weapons, new field works and better tanks or to research military or naval [Concept('concept_technology', '$concept_technologies$')]."
 concept_tesla_electrical_engineer_desc: "#b Electrical Engineer#! focus on improving your country with electrical innovations.\nThey can start #b Engineering Projects#! to research the geomagnetic field of the Earth, to build telegraph or radio networks or to research electrical [Concept('concept_technology', '$concept_technologies$')]."
 concept_tesla_aeronautical_engineer_desc: "#b Aeronautical Engineer#! focus on developing means to fly and improving airplanes and Zeppelins.\nThey can start #b Engineering Projects#! to add [Concept('concept_modifier','$concept_modifiers$')] to your #V Airports#! that improve [concept_throughput], [concept_good_production] and [concept_input_mult], to unlock #V Advanced Aircraft#! as [Concept('concept_mobilization_option','$concept_mobilization_options$')] or to research aviation [Concept('concept_technology', '$concept_technologies$')]."
 concept_vikelas_national_sport: "National Sport"
 concept_vikelas_national_sport_desc: "Any country can declare one of the following sports as its national sport: cricket, baseball, football, or basketball. Three of these four sports (the exception being cricket) were only invented during the 19th century. The country that first invents a sport is considered the 'mother country' of that sport. From this point on, sports spread throughout the world, but not under the same conditions: the spread of cricket and baseball is more limited, while that of football and baseball is subject to less stringent conditions. Sports can be spread by an overlord among subjects to improve relations. Different sports can coexist within a country, but to spread nationwide in every sports facility, they must be a national sport."
 concept_theiler_microorganism: "Microorganism"
 concept_theiler_microorganisms: "Microorganisms"
 concept_theiler_microorganism_desc: "Microorganisms are tiny organisms like bacteria, viruses and single celled organisms.\nThey can be found by a [concept_theiler_biologst] through the $je_theiler_microorganism_research$ [concept_journal_entry] which Biologists conduct when they are not busy.\nMicroorganisms can mainly be used to discover [Concept('concept_theiler_pathogen','$concept_theiler_pathogens$')] and [Concept('concept_theiler_vaccine','$concept_theiler_vaccines$')] which help a country to protect their population from [Concept('concept_panum_disease','$concept_panum_diseases$')]."
 concept_theiler_biology: "Biology"
 concept_theiler_biology_desc: "#n Coming soon to Morgenröte!#!"
 concept_ito_medicinal_plants: "Medicinal Plants"
 concept_ito_medicinal_plants_desc: "Medicinal Plants are plants that have medicinal properties which can be used to create pharmaceuticals and other useful chemicals.\nYou can gather Medicinal Plants by sending a [concept_dubois_naturalist] on a [concept_dubois_botanical_expedition]. Once enough Medicinal Plants are gathered a [concept_mendelejew_chemist] can start to isolate the chemical substance. Once that is done a [concept_theiler_biologist] will be able to start producing a pharmaceutical."
 concept_academics_academic_confusion: "Academic Confusion"
 concept_academics_academic_confusion_desc: "Changing the [concept_academics_university_specialization] of a University will lead to many confused academics. This will result in a reduction of the scientific output for a short period of time."