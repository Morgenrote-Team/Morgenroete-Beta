 concept_gaudi_architectural_splendour: "Architecture splendide" #NT!
 concept_gaudi_architectural_splendour_desc: "Une nation qui a découvert #b Art Déco#! est capable de créer une architecture splendide #b #b en construisant des bâtiments dans le style #b art deco#!. Vous pouvez construire des cinémas, des gratte-ciel ou des aéroports d'art. Si vous collectez 10 #b Splendid Architecture#! Points, votre nation sera connue pour sa splendide architecture #b dans le style #b art deco#! qui vous accordera le prestige." #NT!
  
 ###LEPSIUS### 
 concept_lepsius_archaeology: "Archéologie" #NT!
 concept_lepsius_archaeology_desc: "#b Archaeology#! est l'une des principales caractéristiques de [concept_morgenroete]. \ N \ n there sont 8 [Concept('concept_lepsius_excavation_site','$concept_lepsius_excavation_sites$')] sur la carte. \ N \ n Pour pouvoir envoyer un [concept_lepsius_expedition], vous devez rechercher la technologie de l'antiquarisme, avoir un [concept_lepsius_archaeological_team] et avoir des acèmes à l'un des sites d'excavation. Vous pouvez soit avoir accès en possédant le site vous-même, soit en demandant à un pays avec un site un [concept_lepsius_excavation_licence]. \ N \ nyou peut désormais envoyer une expédition archéologique à l'un des sites d'excavation. Votre équipe découvrira [Concept('concept_lepsius_artifact','$concept_lepsius_minor_artifacts$')] et dans de très rares cas et l'aide d'un bon [concept_lepsius_archaeologist], vous pourriez même trouver un [concept_lepsius_major_artifact]. \ N \ nonce Votre équipe revient avec les artefacts, vous pourriez peut-être construire un #!0. Dans un musée archéologique, vous pourrez voir vos artefacts, créer #!1 et visiter votre #b #!3 Archaeologist#!#!. \ N \ n les plus artefacts et expositions que vous avez, le plus prestige vous obtiendrez. \ N \ n #b anthropology#! est une autre partie de l'archéologie. Si vous avez un #!7 et un #!8, vous pouvez trouver #!9 et reconstruire des espèces humaines préhistoriques. Chaque squelette vous donnera plus de prestige anthropologique. Avec suffisamment de prestige anthropologique, vous obtiendrez un modificateur de prestige pour votre pays." #NT!
  
 concept_lepsius_archaeologist: "#b #BLUE Archéologue#!#!" #NT!
 concept_lepsius_archaeologists: "#b #BLUE Archaeologists#!#!" #NT!
 concept_lepsius_archaeologist_desc: "#b #BLUE Archaeologists#!#! sont des universitaires que vous pouvez envoyer à [Concept('concept_lepsius_expedition','$concept_lepsius_expeditions$')]. Ils y rassembleront [Concept('concept_lepsius_artifact','$concept_lepsius_minor_artifacts$')]. Parfois, ils pourraient même trouver un [concept_lepsius_major_artifact]. \ Narchaeologists gagner [concept_academics_experience] pendant leur travail et passivement chaque année. Ils peuvent obtenir de meilleurs niveaux de trait d'archéologue en gagnant suffisamment #b Experience#!." #NT!
  
 # 1.8.6 
  
 concept_lepsius_anthropologist: "#b #BLUE anthropologue#!#!" #NT!
 concept_lepsius_anthropologists: "#b #BLUE anthropologues#!#!" #NT!
 concept_lepsius_anthropologist_desc: "#b #BLUE anthropologues#!#! sont des universitaires qui étudient la préhistoire humaine, à la fois dans les sens paléontologiques et archéologiques. Ils recherchent [Concept('concept_lepsius_human_fossil','$concept_lepsius_human_fossils$')] dans [Concept('concept_lepsius_cave','$concept_lepsius_caves$')] ou identifient les os inconnus auparavant. Trois #b Fossiles humains sont suffisants pour reconstruire une espèce pré-humaine. La découverte et l'identification des os, ainsi que la systématisation des premières espèces humaines, apporte un prestige anthropologique. Ils peuvent également trouver des artefacts locaux tout en explorant les grottes." #NT!
  
 # 1.8.6 End 
  
 # 1.8.7 
  
 concept_lepsius_museum: "Musée archéologique" #NT!
 concept_lepsius_museum_desc: "Le #b Archaeological Museum#! est un bâtiment que vous pouvez construire qui affiche tous les [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] que votre nation a trouvés." #NT!
  
 # 1.8.7 End 
  
 concept_lepsius_excavation_site: "Site d'excavation historique" #NT!
 concept_lepsius_excavation_sites: "Sites d'excavation historiques" #NT!
 concept_lepsius_excavation_site_desc: "Il y a plusieurs sites d'excavation historiques #b #b dans différents pays, notamment: Haute et basse Égypte, Babylonie, Assyrie, Crète, Argolis, Yucatán et Pérou. Chaque site historique #b #! propose différents [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] et événements." #NT!
  
 concept_lepsius_expedition: "Expédition archéologique" #NT!
 concept_lepsius_expeditions: "Expéditions archéologiques" #NT!
 concept_lepsius_expedition_desc: "Un #b Archaeological Expedition#! est une expédition d'un [concept_lepsius_archaeologist] et de son [concept_lepsius_archaeological_team]. Il faudra plusieurs mois au cours desquels ils tenteront de rassembler autant de [Concept('concept_lepsius_artifact','$concept_lepsius_minor_artifacts$')] que possible. #b Expeditions#! sont le seul moyen de se mettre en possession de [Concept('concept_lepsius_major_artifact','$concept_lepsius_major_artifacts$')]. \ Nif Vous avez recherché une archéologie précoce, vous pouvez laisser votre équipe sur le site pour créer un [concept_lepsius_excavation] après un #b Expeditions réussi #b #!." #NT!
  
 concept_lepsius_archaeological_team: "Équipe archéologique" #NT!
 concept_lepsius_archaeological_teams: "Équipes archéologiques" #NT!
 concept_lepsius_excavation_team: "Équipe d'excavation" #NT!
 concept_lepsius_archaeological_team_desc: "Vous avez besoin d'un ou plusieurs #b Archaeological Team#! pour pouvoir mener [Concept('concept_lepsius_expedition','$concept_lepsius_expeditions$')]. Vous pouvez gagner jusqu'à 3 #b équipes archéologiques #!, mais chacune a des exigences plus élevées. \ N \ nyou peut obtenir votre premier #b Team#! en ayant recherché la technologie de l'antiquarisme, avoir une université de au moins le niveau 3 et une littératie de 33%. \ N \ nyou peut obtenir une autre équipe si vous avez recherché la technologie d'archéologie moderne, avoir une université de niveau au moins 15 et une littérature. Obtenez un autre #b Team#! après avoir recherché la technologie de l'antiquarisme et avoir un [concept_lepsius_archaeologist]. \ n \ nyou a besoin de #b Teams#! pour [Concept('concept_lepsius_expedition','$concept_lepsius_expeditions$')] et #!3." #NT!
  
 concept_lepsius_excavation_licence: "Permis d'excavation" #NT!
 concept_lepsius_excavation_licences: "Licences d'excavation" #NT!
 concept_lepsius_excavation_licence_desc: "Si vous ne possédez pas vous-même une partie du [Concept('concept_lepsius_excavation_site','$concept_lepsius_excavation_sites$')], vous pouvez toujours y accéder en utilisant l'action diplomatique #b Excavation \ 2." #NT!
  
 concept_lepsius_artifact: "Artefact" #NT!
 concept_lepsius_artifacts: "Artefacts" #NT!
 concept_lepsius_minor_artifact: "Artefact mineur" #NT!
 concept_lepsius_minor_artifacts: "Artefacts mineurs" #NT!
 concept_lepsius_oceanic_artifact: "Artefact océanique" #NT!
 concept_lepsius_oceanic_artifacts: "Artefacts océaniques" #NT!
 concept_lepsius_artifact_desc: "Vous pouvez obtenir des artefacts en envoyant [Concept('concept_lepsius_archaeological_team','$concept_lepsius_archaeological_teams$')] sur [Concept('concept_lepsius_expedition','$concept_lepsius_expeditions$')], [Concept('concept_lepsius_excavation','$concept_lepsius_excavations$')], sur [Concept('concept_dubois_pacific_expedition','$concept_dubois_pacific_expeditions$')] ou dans des événements. \ N \ NUSTALUX Vous obtiendrez mineur #b artefacts#!. nom. Vous pouvez généralement les trouver dans les expéditions, les fouilles et comme découvertes archéologiques." #NT!
  
 concept_lepsius_major_artifact: "Artefact majeur" #NT!
 concept_lepsius_major_artifacts: "Artefacts majeurs" #NT!
 concept_lepsius_major_artifact_desc: "#b Les principaux artefacts#! sont spéciaux [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] qui ont un nom et une identité. \ Nyou peut trouver #b artefacts majeurs de différentes manières. Certains d'entre eux vous trouverez pendant [Concept('concept_lepsius_expedition','$concept_lepsius_expeditions$')]. Pour d'autres, vous devez maintenir un [concept_lepsius_excavation] continu jusqu'à ce que vous trouviez. Et certains seront découverts dans une découverte majeure. \ Nake a #b Major Artifact#! d'un pays illégalement pourrait provoquer un incident diplomatique qui pourrait vous nuire plus que de posséder un #b Artefact #!. D'un autre côté, #b Artefacts #! vous permettent de créer un #!3 qui vous donnera un énorme bonus de prestige et est nécessaire pour certains #!4." #NT!
  
 concept_lepsius_exhibition: "Exposition" #NT!
 concept_lepsius_exhibitions: "Expositions" #NT!
  
 concept_lepsius_excellent_exhibition: "Excellente exposition" #NT!
  
  
 concept_lepsius_excavation: "Excavation" #NT!
 concept_lepsius_excavations: "Fouilles" #NT!
 concept_lepsius_excavation_desc: "Si vous avez recherché une archéologie précoce et terminé un [concept_lepsius_expedition], vous pouvez décider de laisser votre [concept_lepsius_archaeological_team] sur le site pour déterrer passivement [Concept('concept_lepsius_artifact','$concept_lepsius_minor_artifacts$')]. Vous pouvez toujours rappeler votre équipe à partir de la fouille #b #!." #NT!
  
 # 1.8.6 
  
 concept_lepsius_human_fossil: "Fossile humain" #NT!
 concept_lepsius_human_fossils: "Fossiles humains" #NT!
 concept_lepsius_human_fossils_fossils: "Fossiles" #NT!
 concept_lepsius_human_bones: "Os humains" #NT!
 concept_lepsius_human_fossil_desc: "#b Les fossiles humains appartiennent à l'une des cinq espèces différentes: Cro-Magnon, Néanderthal, Homo erectus, Australopithecus ou Paranthropus. [Concept('concept_lepsius_anthropologist','$concept_lepsius_anthropologists$')] peut les trouver dans [Concept('concept_lepsius_cave','$concept_lepsius_caves$')] et (généralement) identifier et les attribuer immédiatement. Cependant, les fossiles humains peuvent rarement être trouvés par les archéologues et les paléontologues. Seuls #b #BLUE anthropologues#!#! peuvent identifier correctement ces «fossiles humains inconnus». Trois os complètent une espèce, qui est récompensée par le prestige anthropologique. La première classification d'un humain précoce donne beaucoup plus de prestige. Les fossiles humains peuvent être achevés aussi souvent que souhaité." #NT!
  
 concept_lepsius_cave: "Grotte" #NT!
 concept_lepsius_caves: "Grottes" #NT!
 concept_lepsius_cave_desc: "#b Les grottes préhistoriques#! sont un endroit où les premières espèces humaines ou pré-humaines peuvent avoir quitté [Concept('concept_lepsius_human_fossil','$concept_lepsius_human_fossils_fossils$')] et, dans des types plus avancés, des outils. Les grottes peuvent être découvertes et explorées par [Concept('concept_lepsius_anthropologist','$concept_lepsius_anthropologists$')]. Certaines grottes sont également déverrouillées à travers des événements historiques. Les fossiles d'une seule espèce se trouvent dans chaque grotte - cela signifie que les os des humains Cro-Magnon et des Néandertaliens ne sont jamais dans la même grotte. Certaines grottes sont historiques, tandis que certaines sont distribuées au hasard au début du match sur l'un des trois continents d'Afrique, d'Asie et d'Europe. Ils sont à peu près basés sur la zone de distribution des pré-humains - l'Australopithecus, par exemple, ne se trouvera qu'en Afrique." #NT!
  
 # 1.8.6 End 
  
