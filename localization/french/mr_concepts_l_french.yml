 ### 1.9.0 ### 
  
 ###VIKELAS### 
 concept_vikelas_sports: "Sportif" #NT!
 concept_vikelas_sports_desc: "#b Sports#! est l'une des principales caractéristiques de [concept_morgenroete]. \ N \ nonce Un pays découvre #b Sports #! organisé, il a accès à différentes activités sportives. Le plus important est le fondement du [concept_vikelas_ioc] qui commencera à organiser le [concept_vikelas_olympic_games]. Les Jeux Olympiques vous donneront une chance de remporter des médailles d'or qui fourniront à votre pays [concept_prestige]." #NT!
  
 concept_vikelas_olympic_games: "Jeux olympiques" #NT!
 concept_vikelas_olympic_games_desc: "Une fois le [concept_vikelas_ioc] fondé, le #b Olympic Games#! peut avoir lieu tous les 4 ans. Chaque fois que le comitte votera pour un #b host#!. Le pays hôte obtiendra un gros coup de pouce [concept_prestige]. \ N Pendant les Jeux Olympiques, vos athlètes s'affronteront pour des médailles. De nombreux facteurs influencent le nombre de médailles que vous obtiendrez. Votre population a une petite influence, le [concept_sol] a une taurecue plus grande, certains événements influencent également vos chances et font donc un grand [Concept('concept_general', '$concept_generals$')] et un grand [Concept('concept_admiral', '$concept_admirals$')]. De plus, les caractères avec les centres de trait et urbain #b Athlète #b avec les installations sportives #b #! donnent également de petits coups de pouce. \ Nall ces facteurs ont une influence sur le nombre de médailles des 12 médailles d'or que votre pays obtiendra. Chaque médaille d'or vous accordera 5 [concept_prestige]." #NT!
  
 concept_vikelas_ioc: "Comité international olympique" #NT!
 concept_vikelas_ioc_desc: "Une nation qui a fait des recherches #V $organized_sports$#! peut trouver le #b Comittee ymplympique international #! ou #b ioc#! en bref. Le CIO commencera alors à organiser le [concept_vikelas_olympic_games]. Chaque membre du CIO peut participer aux Jeux Olympiques. \ N Les membres les plus importants du CIO sont les membres #b du conseil d'administration#!. Le fondateur du CIO deviendra le #b président#! et restera donc membre du conseil d'administration pour toujours tandis que les autres membres seront élus tous les 4 ans. Le conseil d'administration a de l'espace pour 5 grandes puissances, 2 européennes, 2 asiatiques, 2 américaines, 1 africaine et 1 nation océanique. \ N La tâche principale des membres du conseil d'administration est de choisir la prochaine multitude des jeux. Il y aura 3 candidats (ou 4 si un pays décide de soudoyer le conseil d'administration)." #NT!
  
 concept_lepsius_exhibition_desc: "Votre [concept_lepsius_museum] mettra automatiquement en place des expositions (sous la forme d'un [concept_production_method] pour chaque région) si vous avez suffisamment de [Concept('concept_lepsius_artifact','$concept_lepsius_minor_artifacts$')] du même genre. Pour les artefacts normaux, la première exposition sera créée pour 10 artefacts ou plus. De là, de meilleures expositions sont possibles avec 25 (exposition moyenne), 50 (grande exposition) et 100 artefacts mineurs (excellente exposition). L'excellente exposition a également besoin d'un [concept_lepsius_major_artifact]. \ N \ nlocal Les artefacts ont un ensemble d'expositions moins diversifié car ils sont limités à une exposition régulière et grande. L'exposition régulière nécessite 25 artefacts locaux et la grande exposition en nécessite 50." #NT!
  
  ### 2.0.4 ### 
  
 ########################################################################################## 
  
 concept_elgar_architecture_desc: "#b Architecture#! est l'une des principales caractéristiques de [concept_morgenroete]. \ N \ nmany Les nations ont reçu de nouveaux #b monuments#!: la Cathédrale Cologne #b en Suisse, le #b Cristo Redentor#! in ital #b Vienna Ringstrasse#! En Autriche, le #b Summer Palace#! En Chine, le #b Sagrada Família#! en Espagne, le #b Schloss Neuschwanstein#! en Bavaria, le #b Palacio de Bellas Arace#! in Mexi Corée. \ Nall Buildings Sauf pour le #b Summer Palace#!, le #b Saxon Palace#! et le #b Campanile#! doivent être construits par leur propriétaire, le #b Saxon Palace#! peut être réactivé par un pays polonais. \ Nthere sont des entrées et des événements de la construction. est encore plus contenu car ils peuvent démarrer la transformation de leurs villes pour réaliser un #b5" #NT!
  
 concept_gaudi_engineering: "Ingénierie" #NT!
 concept_gaudi_engineering_desc: "#b Engineering#! est l'une des principales caractéristiques de [concept_morgenroete]. \ N \ nto accéder à #b Engineering#!, vous devez avoir un [concept_gaudi_engineer]. #b Engineers#! peut démarrer #b Projets d'ingénierie #! en fonction de leur spécialisation. Il existe cinq ingénieurs #b spécialisés#!: \ n- Le #!2 se concentre sur l'amélioration de l'infrastructure d'un pays. \ N- Le #!3 se concentre sur l'amélioration de l'armée et de la navy d'un pays. #!6 se concentre sur la renforcement du vol humain et l'amélioration des avions et d'autres avions." #NT!
  
 ### Replace those please### 
  
  
  
 concept_gaudi_engineer_desc: "#b #ORANGE Engineers#!#! sont des universitaires qui aideront à la construction de bâtiments spéciaux en fournissant une expertise. \ Nadditionally #b #ORANGE Engineers#!#! fournira un bonus au [concept_technology_spread] de votre nation. Le bonus dépend du nombre de nations qui ont plus de technologies recherchées que votre nation." #NT!
  
 concept_gaudi_civil_engineer_desc: "#b Civil Engineers#! Focus sur l'amélioration de l'infrastructure d'un pays. \ Nthey peut démarrer #b Projets d'ingénierie #! pour ajouter [Concept('concept_modifier','$concept_modifiers$')] aux états qui soulèvent [concept_infrastructure], pour améliorer vos secteurs de construction #b #b #! ou à la recherche [Concept('concept_technology', '$concept_technologies$')]." #NT!
  
 concept_gaudi_mechanical_engineer_desc: "#b Ingénieur mécanique #! Focus sur les innovations mécaniques qui améliorent votre industrie, vos machines ou les vies de votre population. \ NETHEY PEUT COMMENCER #b PROJECTS D'INGÉNIERIE#! pour ajouter [Concept('concept_modifier','$concept_modifiers$')] à votre bâtiment industriel qui améliore [concept_throughput], [concept_good_production] et [concept_input_mult], pour améliorer votre #b Railways#! avec de nouveaux locomotives ou sur la recherche industrielle #!0." #NT!
  
 concept_gaudi_military_engineer_desc: "#b Military Engineer#! Focus sur l'amélioration de notre armée et de notre marine en introduisant de nouvelles innovations. \ Nhey peut démarrer #b Projets d'ingénierie #! pour gagner un nouveau [Concept('concept_mobilization_option','$concept_mobilization_options$')] en inventant des armes, de nouveaux travaux de terrain et de meilleurs chars ou à la recherche militaire ou navale [Concept('concept_technology', '$concept_technologies$')]." #NT!
  
 concept_gaudi_electrical_engineer_desc: "#b Electrical Engineer#! Focus sur l'amélioration de votre pays avec des innovations électriques. \ Nthey peut démarrer #b Projets d'ingénierie #! pour rechercher le champ géomagnétique de la Terre, construire des réseaux télégraphiques ou radio ou pour rechercher l'électricité [Concept('concept_technology', '$concept_technologies$')]." #NT!
  
 concept_gaudi_aeronautical_engineer_desc: "#b Ingénieur aéronautique#! Focus sur le développement des moyens de voler et l'amélioration des avions et des zeppelins. \ Nthey peut démarrer #b Projets d'ingénierie #! pour ajouter [Concept('concept_modifier','$concept_modifiers$')] à vos aéroports #V qui améliorent [concept_throughput], [concept_good_production] et [concept_input_mult], à déverrouiller #V avancé avancé." #NT!
  
  ### 2.0.5 ### 
  
 concept_vikelas_racer: "Coureur de voiture" #NT!
 concept_vikelas_racers: "Coureurs de voitures" #NT!
 concept_vikelas_racer_desc: "Un coureur de voiture est un [concept_character] spécial qui participe à [concept_vikelas_car_racing]." #NT!
  
 concept_vikelas_car_racing: "Course de voitures" #NT!
 concept_vikelas_car_racing_desc: "La course de voitures est un sport dans lequel [Concept('concept_vikelas_racer','$concept_vikelas_racers$')] rivalise les uns contre les autres sur une piste ou sur des routes régulières." #NT!
  
 concept_lepsius_archaeological_exhibition: "Exposition archéologique" #NT!
  
  
 concept_elgar_opera_desc: "Le #b Opera#! est le centre musical d'une nation. C'est là que les musiciens les plus importants se rassemblent et jouent pour les masses. \ Nthe #b Opera#! est un bâtiment séparé qui peut être construit dans les États si le centre urbain est au moins le niveau 5. Le #b Opera#! produira de la musique et consommera des instruments. Plus le niveau de l'Opera#! #b est élevé, plus [concept_elgar_musical_tradition] sera produit chaque année." #NT!
  
 concept_elgar_impressionism_desc: "#b Impressionism#! est un style de l'histoire de l'art qui se caractérise par la représentation atmosphérique des instantanés éphémères d'une scène. Il est sorti d'un mouvement dans la peinture en France dans la seconde moitié du XIXe siècle. Le terme impressionnisme a également été appliqué à certains styles de musique, de littérature, de cinéma et de photographie. Alors que de nombreux naturalistes tels que Heinrich Hart ont rejeté la musique comme un moyen d'exprimer un `` l'actionnisme de recherche de vérité '', les impressionnistes considéraient souvent le `` rêve sans objet à venir ' Intelligentsia avec une approbation de 5 ci-dessus. Si vous choisissez #b Impressionism#!, vous ne pourrez pas déverrouiller les deux autres branches. \ N \ nLe focus de #b Impressionism#! dans le jeu est de la musique. Par conséquent, il vous donnera le plus grand bonus au [concept_elgar_musical_tradition]." #NT!
 concept_elgar_expressionism_desc: "#b Expressionism#! est un style d'art. Ses débuts et ses précurseurs se trouvent à la fin du XIXe siècle. Comme l'impressionnisme, le symbolisme et le fauvisme, l'expressionnisme est un mouvement contre les tendances du naturalisme. Dans l'expressionnisme, le niveau expressif l'emporte sur le niveau esthétique, appelant et factuel. L'artiste veut représenter son expérience pour le spectateur. In contrast to musical impressionism, which depicts the perception of the external appearance of things, the expressionist art movements formulate the emotions of the human soul.\n\nIn the game, #b Expressionism#! is only unlockable with a journal entry that requires 1000 [concept_elgar_musical_tradition], an [concept_elgar_opera], a powerful intelligentsia or trade unions, landowners that are not powerful and either the Intelligentsia or the trade unions need an approval of 5 ou au-dessus. Si vous choisissez #b Expressionism#!, vous ne pourrez pas déverrouiller les deux autres branches. \ N \ n le focus de #b Expressionism#! dans le jeu serait de la littérature, mais il n'est pas encore mis en œuvre." #NT!
 concept_elgar_art_nouveau_desc: "#b Art Nouveau#! est un style artistique qui s'est développé à partir du mouvement #italic arts et artisanat #! et a été inspiré par des formes naturelles. Il se concentrait souvent sur le dynamisme et le mouvement et a utilisé des matériaux modernes. \ N \ nin le jeu, #b Art Nouveau#! ne peut être déverrouillable qu'avec une entrée de journal qui nécessite 1000 [concept_elgar_musical_tradition], un [concept_elgar_opera], de puissants industriels et une intelligentsia avec une approbation de 5 ou plus. Si vous choisissez #b Art Nouveau#!, vous ne pourrez pas déverrouiller les deux autres branches. \ N \ n le focus de #b Art Nouveau#! et #b Art déco#!, la prochaine technologie de cette branche, est l'architecture. Vous obtiendrez divers événements et entrées de journaux sur les actes architecturaux et pourrez obtenir un #!4." #NT!
 concept_elgar_composer: "#PURPLE #b Composer#!#!" #NT!
 concept_elgar_composers: "#PURPLE #b Composeurs#!#!" #NT!
 concept_elgar_composer_desc: "#b Les compositeurs#! sont des hommes et des femmes qui composent la musique. Les compositeurs sont des types de caractères spéciaux que vous pouvez gagner soit à partir d'événements, en gagnant suffisamment [concept_artistic_progress] pour en créer un dans votre nation ou en offrant un poste à un [concept_elgar_travelling_composer]. \ Nonce vous avez un #b composer#!, vous pouvez les laisser démarrer [Concept('concept_elgar_composing','$concept_elgar_composing_lower_case$')], [Concept('concept_elgar_conducting','$concept_elgar_conducting_lower_case$')], pour aller sur [Concept('concept_elgar_musical_tour','$concept_elgar_musical_tours$')] ou composer [Concept('concept_elgar_musical_masterwork','$concept_elgar_musical_masterwork_masterworks$')]. Chaque action est différente dans ce que fait le compositeur, ce dont il a besoin et ce que vous gagnez. Le composer#! #b sera #!2 après chaque tâche et doit se reposer un certain temps jusqu'à ce qu'il puisse travailler à nouveau. Plus la réputation #b #b est élevée, plus les avantages d'un compositeur #b sont élevés. #b Composers#! Atteindre une réputation #b #! de 500 deviendra [concept_artistic_progress]4, Titans of Music, connu dans le monde entier." #NT!
  
 concept_elgar_great_composer: "#PURPLE #b Great Composer#!#!" #NT!
 concept_elgar_great_composers: "#PURPLE #b Great Composers#!#!" #NT!
 concept_elgar_great_composer_desc: "#b Grands compositeurs#! sont les titans de la musique. Ceux dont les noms seront connus pour l'éternité. [Concept('concept_elgar_composer','$concept_elgar_composers$')] Atteindre 500 [concept_artists_experience], deviendra #b Grands compositeurs#!. Cela augmentera considérablement leur efficacité et permettra à votre nation de gagner beaucoup plus [concept_elgar_musical_tradition]. Un #b Great Composer#! peut créer une manière plus rapide de [concept_elgar_musical_masterwork] par exemple." #NT!
  
 concept_elgar_travelling_composer: "Compositeur itinérant" #NT!
 concept_elgar_travelling_composers: "Compositeur itinérant" #NT!
 concept_elgar_travelling_composer_desc: "#b Les compositeurs itinérants sont [Concept('concept_elgar_composer','$concept_elgar_composers$')] qui ne sont embauchés par aucune nation. Au lieu de cela, ils se déplacent lors de visites de concerts. Vous pouvez éventuellement acquérir un compositeur itinérant #b, mais plus ils ont de demandes. #b Composers#! avec une réputation #b plus élevée #b exigera de plus grandes maisons d'opéra, de la musique moderne #!3, un certain #!4 et certains pourraient ne rejoindre que #!5 ou #!6. \ NA Special Case est #!7 qui ne sont disponibles que pour les nations qui sont de la même identité nationale ou très similaire." #NT!
  
 concept_elgar_national_composer: "Compositeur national" #NT!
 concept_elgar_national_composers: "Compositeur national" #NT!
 concept_elgar_national_composer_desc: "#b Les compositeurs nationaux_1 sont [Concept('concept_elgar_composer','$concept_elgar_composers$')] qui apprécient beaucoup leur nation. Ils ne pourront pas être embauchés par d'autres nations. \ N si un compositeur national #b est à votre disposition ou non est décidé par [Concept('concept_cultural_trait','$concept_cultural_traits$')] de leur culture. L'une de vos cultures principales doit partager à la fois un non-héritage #b trait#! ainsi qu'un [concept_cultural_heritage_trait]. Cela signifie qu'un compositeur national #b nord-allemand sera accessible aux pays allemands ainsi qu'à la Suisse." #NT!
  
 concept_elgar_composing: "Composition" #NT!
 concept_elgar_composing_lower_case: "composition" #NT!
 concept_elgar_composing_compose: "composer" #NT!
 concept_elgar_composing_desc: "A [concept_elgar_composer] Who #b Compose#! reçoit 5 [concept_artists_experience] par an et ajoute 5 [concept_elgar_musical_tradition] au pays. De plus, il crée un nombre aléatoire de compositions chaque année. Un #b Composer#! avec des compétences spéciales telles que le chef d'orchestre, le virtuose, l'innovant ou le méticule crée une composition supplémentaire par an. Le nombre de compositions est décisive pour le succès dans plus tard [Concept('concept_elgar_musical_tour','$concept_elgar_musical_tour_tours$')]. Un composer #b compose jusqu'à ce que l'action soit annulée dans l'entrée du journal. Un compositeur #b #! qui compose coûte au pays un petit frais de maintenance annuel." #NT!
  
 concept_elgar_conducting: "Réalisateur" #NT!
 concept_elgar_conducting_lower_case: "réalisateur" #NT!
 concept_elgar_conducting_conduct: "conduire" #NT!
 concept_elgar_conducting_desc: "Le [concept_elgar_composer] se concentrera sur #b conductant #! pendant 24 mois et organisera une saison de concert. Cela améliorera la production musicale d'un [concept_elgar_opera] ou 5 à 10 ans aléatoire, donnera à votre nation un petit coup de pouce à [concept_elgar_musical_tradition] et donnez à votre #b composer#! un coup de pouce moyen à son [concept_artists_experience]. Si votre compositeur #b n'est pas encore conducteur, il peut gagner le #b0 à la fin de la saison. Vous devrez payer le compositeur #b #b pendant qu'il est #b conduct #!." #NT!
  
 concept_elgar_musical_tour: "Tournée de concert" #NT!
 concept_elgar_musical_tours: "Visites de concert" #NT!
 concept_elgar_musical_tour_tour: "Tournée" #NT!
 concept_elgar_musical_tour_tours: "Tournées" #NT!
 concept_elgar_musical_tour_desc: "Le [concept_elgar_composer] peut effectuer un concert #b Tour#! à l'étranger pendant 30 mois. #b Concert Tours#! Augmentez le [concept_prestige] de la nation #b Composer's#!. De plus, le composer #b compose #! gagne un coup de pouce de #b0 à la fin du #b Tour#! qui dépend du nombre de compositions du compositeur #b avec moins de 20 compositions ne devrait probablement pas aller sur #b Tourne #! et #b Compositeurs Le trait ne peut pas aller sur #b tournées#!." #NT!
  
 concept_elgar_musical_masterwork: "Chef-d'œuvre musical" #NT!
 concept_elgar_musical_masterworks: "Chefs-d'œuvre musicale" #NT!
 concept_elgar_musical_masterwork_masterwork: "None" #NT!
 concept_elgar_musical_masterwork_masterworks: "Chef-d'œuvre" #NT!
 concept_elgar_musical_masterwork_of_music: "Masier-chef de la musique" #NT!
 concept_elgar_musical_masterworks_of_music: "Masterworks of Music" #NT!
 concept_elgar_musical_masterwork_desc: "Le [concept_elgar_composer] peut commencer à composer un #b Masterwork#! qui prendra plusieurs années. Plus le compositeur [concept_artists_experience] a #b a, plus il finira rapidement. Une fois que le Masterwork#! #b est composé, le compositeur #b gagnera 50 [concept_artists_experience] et le pays gagnera jusqu'à 150 #b1 en fonction de son #b2. \ Na #b Composer#! peut créer un maximum de 3 #b Masterworks#! et aura besoin d'un soutien financier de son pays tout en y travaillant." #NT!
  
 concept_elgar_composer_exhaustion: "Épuisement du compositeur" #NT!
 concept_elgar_composer_exhaustion_exhausted: "épuisé" #NT!
 concept_elgar_composer_exhaustion_desc: "Une fois un [concept_elgar_composer] terminé [Concept('concept_elgar_composing','$concept_elgar_composing_lower_case$')], [Concept('concept_elgar_conducting','$concept_elgar_conducting_lower_case$')], en composant [Concept('concept_elgar_musical_masterwork','$concept_elgar_musical_masterwork_masterworks$')] ou un [Concept('concept_elgar_musical_tour','$concept_elgar_musical_tours$')], il sera #b épuisé#! de l'œuvre. Un compositeur épuisé #b ne pourra pas travailler pendant un certain temps. Plus le compositeur #b #b, plus il faut débarrasser de l'échappement #b." #NT!
  
 concept_manzoni_writer: "#PURPLE #b Writer#!#!" #NT!
 concept_manzoni_writers: "#PURPLE #b Writers#!#!" #NT!
  
 concept_klimt_painter: "#PURPLE #b peintre#!#!" #NT!
  
  
 concept_pm_artists_academy_conservatory: "#b #PURPLE Conservatoire#!#!" #NT!
 concept_pm_artists_academy_conservatory_desc: "Un véranda spécialise l'Académie des arts pour la musique. Si vous avez un Conservatoire, vous pourrez promouvoir [Concept('concept_elgar_composer','$concept_elgar_composers$')]. Vous obtiendrez un modificateur de débit négatif #n #n pour la Art Academy ainsi qu'un effet négatif #n #! sur votre [concept_artistic_progress] lorsque vous modifiez cette méthode de production." #NT!
  
 concept_pm_artists_academy_salon: "#b #PURPLE Salon littéraire_2" #NT!
 concept_pm_artists_academy_salon_desc: "Un salon littéraire spécialisera l'Académie des arts pour la littérature. Si vous avez un salon de littérature, vous pourrez promouvoir [Concept('concept_manzoni_writer','$concept_manzoni_writers$')]. Vous obtiendrez un modificateur de débit négatif #n #n pour la Art Academy ainsi qu'un effet négatif #n #! sur votre [concept_artistic_progress] lorsque vous modifiez cette méthode de production." #NT!
  
 concept_pm_artists_academy_studio: "None" #NT!
 concept_pm_artists_academy_studio_desc: "Un studio d'art spécialisera l'Académie des arts pour la peinture. Si vous avez un studio d'art, vous pourrez promouvoir [Concept('concept_klimt_painter','$concept_klimt_painters$')]. Vous obtiendrez un modificateur de débit négatif #n #n pour la Art Academy ainsi qu'un effet négatif #n #! sur votre [concept_artistic_progress] lorsque vous modifiez cette méthode de production." #NT!
  
 concept_pm_artists_academy_specialization: "Focus de l'Académie des arts" #NT!
 concept_pm_artists_academy_specialization_desc: "Chaque académie des arts peut être spécialisée en modifiant sa méthode de production. \ Nan Arts Academy avec un [concept_pm_artists_academy_conservatory] vous permettra de promouvoir [Concept('concept_elgar_composer','$concept_elgar_composers$')]. \ Nan Arts Academy avec un [concept_pm_artists_academy_salon] vous permettra de promouvoir [Concept('concept_manzoni_writer','$concept_manzoni_writers$')]. \ Nan Arts Academy." #NT!
  
 concept_artists_artist: "Artiste" #NT!
 concept_artists_artists: "Artistes" #NT!
  
  
 concept_artistic_progress: "Progrès artistique" #NT!
 concept_artistic_progress_desc: "En ajoutant 1000 #b PROGRÈS ARTISTIQUES#!, vous pouvez gagner un nouveau [concept_artists_artist]. Pour avoir même accès à #b Artistic Progress#!, vous devez avoir une #b Arts Academy#! ou un #b Opera#!. \ Nyour #b PROGRESSAGE ARTISTIC#! est influencé par divers facteurs. Plus vous avez #!1, plus vous gagnez rapidement #b PROGRÈS ARTISTIQUESS_1 Par exemple. Vous pouvez obtenir des informations détaillées sur tous les facteurs influençant les progrès artistiques de la barre d'outils de la barre de progrès artistique dans la fenêtre des arts." #NT!
  
 concept_artists_experience: "Réputation" #NT!
 concept_artists_experience_desc: "Chaque [concept_artists_artist] a une réputation #b #!. La réputation représente à quel point l'artiste est bien considéré. Les artistes commencent par une petite réputation et peuvent acquérir une réputation supplémentaire en travaillant dans leur domaine. Les artistes qui ont acquis une réputation de 500, deviendront un #Great artistes#! et obtiendront le [concept_character_trait] correspondant." #NT!
  
 concept_manzoni_great_writer: "Grand écrivain" #NT!
  
 concept_manzoni_local_writer: "Écrivain local" #NT!
  
  ### 2.1.1 ### 
  
 concept_artists_center_of_arts: "Centre des arts" #NT!
 concept_artists_centers_of_arts: "Centres d'arts" #NT!
  
 concept_artists_center_of_classicism: "Centre du classicisme" #NT!
 concept_artists_center_of_romanticism: "Centre du romantisme" #NT!
 concept_artists_center_of_realism: "Centre de réalisme" #NT!
 concept_artists_center_of_impressionism: "Centre de l'impressionnisme" #NT!
 concept_artists_center_of_expressionism: "Centre d'expressionnisme" #NT!
 concept_artists_center_of_art_nouveau: "Centre d'art Nouveau" #NT!
  
 concept_klimt_great_painter: "#PURPLE #b Great Painter#!#!" #NT!
 concept_klimt_great_painters: "#PURPLE #b Grands peintres#!#!" #NT!
 concept_klimt_great_painter_desc: "#b Grands peintres#! sont [Concept('concept_klimt_painter','$concept_klimt_painters$')] qui seront connus pour l'éternité. #b peintres#! atteignant 500 [concept_artists_experience], deviendra #b de grands peintres#!. Cela augmentera considérablement leur efficacité et permettra à votre nation de gagner beaucoup plus [concept_klimt_painting_tradition]." #NT!
  
 concept_klimt_independent_painter: "Peintre indépendant" #NT!
 concept_klimt_independent_painters: "Peintres indépendants" #NT!
  
  
 concept_klimt_painter_trip: "Voyage éducatif du peintre" #NT!
 concept_klimt_painter_trip_journeys: "Voyages" #NT!
  
  ### 2.1.2 ### 
  
 concept_elgar_music_desc: "#b Music Culture#! est l'une des principales caractéristiques de [concept_morgenroete]. Au cours des XIXe et XXe siècles, la musique était importante comme un moyen de divertir la population et de montrer la grandeur des nations. \ N \ nto Accéder à la plupart du contenu musical du #r Morgenröte#! Vous devrez construire un [concept_elgar_opera]. Le #b Opera#! produira de la musique mais a besoin d'instruments pour fonctionner. Outre la production de la musique #b #! pour que votre population consommer, #b opéras#! ajoutera lentement #!2 à votre pays. \ N \ n#b Tradition musical#! reflète les réalisations et les traditions musicales d'une nation. Le montant de la tradition musicale #b vous donne un bonus de prestige et vous permet de choisir un chemin pour que l'art de votre nation avance. Vous pouvez soit suivre l'itinéraire de #!7, #!8 ou #!9. Chacun de ces styles d'art a un autre objectif. \ N \ na Une bonne façon de gagner encore plus #b tradition musicale #! est d'obtenir un [concept_morgenroete]2. Un compositeur pourra [concept_morgenroete]3, [concept_morgenroete]4, aller sur [concept_morgenroete]5 et même créer [concept_morgenroete]6. Ces actions amélioreront soit le compositeur #b #! [concept_morgenroete]9, soit améliorer vos nations #b tradition musicale #!." #NT!
  
 concept_artists_center_of_arts_desc: "Un #b Centre of Arts#! est le centre d'un [concept_artists_art_style] qui est créé dans un [concept_state_region] une fois qu'un style art #b est inventé. Il n'y a qu'un seul #b Centre of Arts#! par #b Style #!. \ N#b Centre of Arts#! est particulièrement important pour #!1 qui peut prendre #!2 pour étudier le style art #b. En dehors de cela, un peu de #b Centre of Arts#! offrent des événements uniques qui s'y produisent. Certains par exemple vous permettent de gagner #!7." #NT!
  
 concept_klimt_painting_culture: "Culture de peinture" #NT!
 concept_klimt_painting_culture_desc: "#b peinture Culture#! est l'une des principales caractéristiques de [concept_morgenroete]. Au cours du 19e et du 20e siècle, la peinture s'est développée rapidement, ce qui a entraîné divers nouveaux [Concept('concept_artists_art_style','$concept_artists_art_styles$')] qui ont apporté beaucoup de progrès aux individus et aux pays. \ N \ nto Accéder à la plupart du contenu de la peinture dans #r Morgeröte#!, vous devrez construire un #b Arts Academy#!. #b Arts Academies#! vous permettent de commencer à gagner #!0 et de recruter de nouveaux peintres #!1 \ n \ n#b #!. Comme il existe différents [Concept('concept_artists_art_style','$concept_artists_art_styles$')] pour les peintres #b sur sur laquelle vous concentrer, vous pouvez les laisser étudier des styles d'art #b supplémentaires #! sur un [concept_morgenroete]3. Une fois âgé de 40 ans, #b peintres#! se spécialisera dans l'un de leurs styles d'art #b et se concentrera sur la création de peintures dans ce style #b Art Style#!." #NT!
  
 concept_artists_art_style: "Style artistique" #NT!
 concept_artists_art_styles: "Styles d'art" #NT!
 concept_artists_art_style_style: "Style" #NT!
 concept_artists_art_style_desc: "Un #b Art Style#! est un objectif spécifique de l'art. Certains styles d'art #b #! sont là depuis le début comme #b Classicism#! et #b Romantisme#!. Les autres, #b réalisme#!, #b irrationalism#!, #!2, #!3 et #!4, n'apparaissent plus tard que après que certaines conditions sont remplies. Chaque style #b art#! a un #!7 correspondant dans le #!8 où il a commencé." #NT!
  
 concept_klimt_painter_desc: "#PURPLE #b peintres#!#! sont des hommes et des femmes qui créent des peintures et d'autres œuvres d'art. #b peintres#! sont des types de caractères spéciaux que vous pouvez gagner soit des événements, de gagner suffisamment [concept_artistic_progress] pour en créer un dans votre nation ou en offrant une position à un [concept_klimt_independent_painter]. \ N#b peintres#! commencera immédiatement à peindre et à créer un certain nombre de peintures chaque année selon leur [Concept('concept_character_trait','$concept_character_traits$')]. Parfois, ils peuvent même créer un #b Masterwork#! qui vous donnera encore plus #b2. \ N#b peintres#! peut étudier différents #b5 sur #b6. Chaque #b Painter#! se spécialisera dans un style #b Art Style#! une fois qu'ils auront 40 ans, ce qui leur permettra de peindre #b Masterworks#! d'un certain style." #NT!
  
 concept_klimt_independent_painter_desc: "[Concept('concept_klimt_painter','$concept_klimt_painters$')] qui ne sont pas embauchées par un pays sont #b peintres indépendants #!. #b peintres indépendants #! peuvent être embauchés par des pays qui ont un [Concept('concept_primary_cultures','$concept_primary_culture$')] qui partage un [concept_cultural_trait] avec la culture du #b peintre#!. \ n#b peintres indépendants#! a diverses exigences pour leur pays hôte. Vous aurez besoin de #b Arts Academies#!, certains #b2 ou #b3 selon le peintre #b #! #b6. De plus, vous devrez leur payer une somme d'argent qui dépend de leur #b Renown#! ainsi que des capacités financières de votre pays." #NT!
  
 concept_klimt_painter_trip_desc: "A [concept_klimt_painter] peut apprendre un nouveau [Concept('concept_artists_art_style','$concept_artists_art_styles$')] sur un #b Journey éducatif#! à l'un des [Concept('concept_artists_center_of_arts','$concept_artists_centers_of_arts$')]. \ Non un tel #b trip#! Un peintre peut gagner un [Concept('concept_character_trait','$concept_character_traits$')] positif et négatif qui influencera leur travail et le nombre de peintures qu'ils créent. Chaque #b Centre of Arts#! a des événements légèrement différents et donnera au #b peintre#! un #b trait#! unique qui peut devenir plus tard la spécialisation #b peintre's#!." #NT!
  
 concept_klimt_art_prize: "Prix ​​d'art" #NT!
 concept_klimt_art_prizes: "Prix ​​d'art" #NT!
 concept_klimt_art_prize_desc: "De temps en temps, des compétitions artistiques sont organisées dans lesquelles des prix sont décernés - qui promeuvent la réputation d'un artiste. Les nations qui ont un [concept_artists_center_of_arts] pour l'irrationalisme ou [concept_elgar_impressionism] choisissent les meilleurs musiciens d'un concours qui se déroule tous les cinq ans. Les propriétaires d'un [concept_klimt_art_gallery] ou d'un #b Center of Art of Realism#! viennent organiser un concours de peinture qui se déroule tous les cinq ans. Le pays à partir duquel les gagnants viennent reçoivent également de la musique ou de la peinture. Une forme spéciale de concours artistique est la Biennale, qui, tous les deux ans, accorde un prix d'art complet au pays qui a les artistes avec la plus grande réputation, ce qui augmente toutes les valeurs de tradition culturelle." #NT!
  
 concept_klimt_art_gallery: "Galerie d'art" #NT!
 concept_klimt_art_gallery_desc: "Le #b Art Gallery#! est un bâtiment spécial dans la capitale nationale qui est disponible à partir de #b Reality#!. Il ne peut être construit que si la nation a un [concept_klimt_painter] avec spécialisation. #b peintres#! avec une spécialisation déverrouiller la collection de leur [Concept('concept_artists_art_style','$concept_artists_art_style_style$')] - c'est-à-dire un artiste avec une spécialisation dans le style romantique débloque une collection de romantisme. Afin de mettre à niveau une collection vers une excellente collection, un chef-d'œuvre de ce type est requis, qui doit être peint par un peintre ou acquis à l'étranger." #NT!
  
  ### 2.1.4 ### 
  
 concept_artists_artist_desc: "Dans [concept_morgenroete] #b artistes#!, il y a des caractères spéciaux qui vous permettent d'utiliser certaines mécanismes du mod. Vous pouvez obtenir #b Artists#! dans certains événements ou en amer suffisamment [concept_artistic_progress]. Les artistes ont [concept_artists_experience] qui reflète leur statut dans leur domaine respectif. \ Ncurrencé ces artistes #b existant: \ n - [concept_elgar_composer] \ n - #b0 \ n - #b1" #NT!
  
 concept_manzoni_writer_novelist: "Romancier" #NT!
  
 concept_manzoni_writer_desc: "Un #b Writer#! est un caractère spécial qui écrira des œuvres de littérature pour votre pays. #b Writers#! commence généralement comme [concept_manzoni_local_writer] et écrit #b publications#! et parfois même [Concept('concept_manzoni_bestseller','$concept_manzoni_bestsellers$')]. Un #b best-seller#! accordera au #b écrivain#! une grande quantité de #!2 et #!3 à votre pays. Il y a une chance d'écrire un #b BestSeller#! chaque année, selon la proximité de l'écrivain #b #! #!8 au #!9. \ N \ na bien connu #b écrivain#! dont le #b2 est assez heureux, peut devenir votre #b3. Un écrivain national #b peut gagner #b6 ou créer un roman de journal. Si un scénariste #b gagne 500 #b réputation#!, ils peuvent devenir un #!1 et fournir à votre pays encore plus #b Tradition #!. \ N \ nbe prudent, si les écrivains #b sont mécontents de la situation politique dans un pays, ils peuvent décider de devenir #!6 ou d'interférer dans le discours politique." #NT!
  
 concept_manzoni_great_writer_desc: "Un grand écrivain #b est un [concept_manzoni_writer] connu partout dans le monde. Un #b écrivain#! peut devenir un grand écrivain #b une fois que leur [concept_artists_experience] atteint #V 500#!. Si votre grand écrivain #b est votre #!2, vous obtiendrez un bonus à votre gain #!3 annuel." #NT!
  
 concept_manzoni_local_writer_desc: "Presque tous les [concept_manzoni_writer] commence comme un #b écrivain local #!. Chaque pays peut avoir un maximum de 3 #b écrivains locaux #! qui créeront #b publications#!, vous accorde [concept_manzoni_literary_tradition] si leur [concept_manzoni_genre] correspond au [concept_manzoni_popular_taste] et à gagner #b0. \ Na #b écrivain local #! avec un #b réputant #b6 qui vous accordera plus #b Tradition littéraire #! et autres avantages supplémentaires. \ Nbe conscient que #b écrivains locaux #! mécontent de la situation politique actuelle peut commencer à interférer dans le discours politique ou même devenir un #!.1" #NT!
  
 concept_manzoni_national_writer: "Rédacteur national" #NT!
 concept_manzoni_national_writer_desc: "Un #b National Writer#! est un type de [concept_manzoni_writer] qui est considéré comme le visage de la littérature de votre pays. #b National Writers#! vous accorde un minimum de 1 et jusqu'à 5 [concept_manzoni_literary_tradition]. \ Nyou peut gagner un #b National Writer#! en nommant l'un de votre [Concept('concept_manzoni_local_writer','$concept_manzoni_local_writers$')]. Pour pouvoir nommer l'un de vos écrivains locaux #b #!, ils doivent avoir au moins #!1 150#! #!3 et leur #!4 doit avoir un #!5 positif. \ N" #NT!
  
 concept_manzoni_bestseller: "Best-seller" #NT!
 concept_manzoni_bestsellers: "Best-sellers" #NT!
 concept_manzoni_bestseller_desc: "None" #NT!
  
 concept_manzoni_genre: "Genre" #NT!
 concept_manzoni_genres: "Genres" #NT!
 concept_manzoni_genre_desc: "Chaque [Concept('concept_manzoni_writer','$concept_manzoni_writer_novelist$')] a un #b Genre#! spécifique pour son écriture. Le #b Genre#! est attribué lorsque l'écrivain #b est créé et dépend de nombreux facteurs. \ N#b Writers#! gagnera plus [concept_artists_experience] et écrira plus de #b0 lorsque leur #b Genre#! correspond ou est proche du #b3 du pays." #NT!
  
 concept_manzoni_popular_taste: "Goût populaire" #NT!
 concept_manzoni_popular_taste_audience: "Goût du public" #NT!
 concept_manzoni_popular_tastes_audience: "Goûts du public" #NT!
 concept_manzoni_popular_taste_desc: "La population de chaque nation a un #b Taste#! pour un [concept_manzoni_genre] spécifique. About every 10 years this #b Taste#! will change depending on political, social and cultural changes in the country itself.\n[Concept('concept_manzoni_writer','$concept_manzoni_writers$')] who have a #b Genre#! matching the #b Taste#! or close to it will gain more #!0 and write more #!1.\n\n#!2 Close Tastes:#!\n- #b #!5#!: #!7, #!8, §) #b9#!: #!1, #!7, §) #!8, #!9" #NT!
  
 concept_manzoni_book_licence: "Licence de livre" #NT!
 concept_manzoni_book_licences: "Licences de livre" #NT!
 concept_manzoni_book_licence_desc: "Les éditeurs étrangers peuvent obtenir des contrats avec un [concept_manzoni_national_writer] et offrir ses livres comme traductions sur leur propre marché. Cela se produit lorsqu'un écrivain rencontre le [Concept('concept_manzoni_popular_taste','$concept_manzoni_popular_tastes_audience$')] à l'étranger. Si un auteur obtient au moins cinq licences de livres, ses livres sont considérés comme de la littérature mondiale. Il peut ensuite faire une tournée en lecture." #NT!
  
 concept_manzoni_local_writers: "Écrivains locaux" #NT!
  
 concept_manzoni_library: "Bibliothèque nationale" #NT!
 concept_manzoni_library_desc: "Votre #b National Library#! configurera automatiquement les collections de livres (sous la forme d'un [concept_production_method]) si vous en avez suffisamment [concept_manzoni_publications]. La première collection de livres sera créée pour 1 000 publications ou plus. De là, de meilleures collections sont possibles avec 2.500 (petite collection de livres), 5.000 (petite collection de livres), 10.000 (collection de livres médiums), 25 000 (grande collection de livres), 50 000 (excellente collection de livres) et 100.000 (Great Book Collection)." #NT!
 concept_manzoni_publications: "Publications" #NT!
 concept_manzoni_publications_desc: "#b Publications#! Inclut tous les titres de livres, journaux, essais et autres produits écrits similaires dans une nation. Ils ne sont pas cohérents avec @manzoni_prints! $manzoni_prints$ circulant comme des matières premières. Les publications peuvent également apparaître indépendamment de l'industrie de l'édition, par exemple à travers les presses à imprimer internes des bâtiments ou des universités gouvernementaux. Les universitaires et les particuliers produisent également des publications en fonction de leur niveau d'alphabétisation. Cependant, l'industrie de l'édition explique la part du lion, et le facteur décisif est de savoir si une méthode de production moderne est utilisée ou non. Un grand nombre de publications sont fondamentales pour l'expansion d'un [concept_manzoni_library]." #NT!
  
  ### 2.1.5 ### 
  
 concept_curtiss_tourism: "Tourisme" #NT!
 concept_curtiss_tourism_desc: "Le tourisme offre à une nation culturellement supérieure un revenu supplémentaire. Les monuments uniques, les musées et les galeries d'art, les sites archéologiques, les centres d'art ainsi que les valeurs élevées dans les différentes traditions culturelles sont des facteurs qui font d'une nation une destination touristique attrayante. Les lois qui augmentent la liberté de mouvement et l'activité économique contribuent également à des revenus touristiques plus élevés. L'infrastructure joue également un rôle crucial - après tout, les endroits éloignés ne peuvent pas être atteints. Un aéroport en particulier révolutionne le tourisme et fournit une augmentation significative des revenus." #NT!
  
 concept_curtiss_private_airline: "Compagnie aérienne privée" #NT!
  
  ### 2.2.1 ### 
  
 concept_mendelejew_chemist: "#b #ORANGE Chemist#!#!" #NT!
  
  ### 2.2.1a ### 
  
 concept_manzoni_literature: "Culture littéraire" #NT!
 concept_manzoni_literature_desc: "#b Culture littéraire#!is L'une des principales caractéristiques de [concept_morgenroete]. La culture imprimée et la culture des journaux en particulier ont connu des bouleversements importants aux XIXe et 20e siècles. La masse des produits imprimés et de l'utilisation quotidienne est représentée par l'industrie de l'impression. La valeur culturelle de la littérature produite se reflète dans le [concept_manzoni_literary_tradition]. Ce dernier dépend en grande partie du [Concept('concept_manzoni_writer','$concept_manzoni_writers$')] d'un pays, et il y a [Concept('concept_manzoni_local_writer','$concept_manzoni_national_writers$')] et [Concept('concept_manzoni_national_writer','$concept_manzoni_local_writers$')]. Qu'ils vivent dans l'ombre ou deviennent des auteurs célèbres dépend du [concept_manzoni_popular_taste]." #NT!
  
  ### 2.2.2 ### 
  
 concept_morgenroete_desc: "#r Morgenröte - Dawn of Flavour #! est un mod créé pour élargir les aspects culturels et scientifiques de Victoria 3. Il présente du contenu pour divers aspects de l'âge victorien: \ n \ n#V Lepsius: #! [concept_lepsius_archaeology] \ n#V verrier: #! [concept_verrier_astronomy] \ n#V Dubois: #! #!4 \ n#V Mendelejew: #! #!7 \ n#V Elgar: #! #V0 \ n#V manzoni: #! #V3 \ n#V klimt: #! #V6 \ n#V Curtic Vikelas: #! #!2" #NT!
  
 concept_agassiz_mineral: "Minéral" #NT!
 concept_agassiz_minerals: "Minéraux" #NT!
 concept_agassiz_mineral_desc: "Les minéraux sont tous des types de types spéciaux de roches qui ne relèvent pas des ressources connues utilisées dans l'industrie. Une nation reçoit un certain nombre de minéraux chaque année une fois qu'il a inventé la technologie #b Geology#!. Si un [Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')] est au service de cette nation, il peut trouver des minéraux supplémentaires. Les emplacements des minéraux sont caractérisés par des modificateurs d'état: montagnes, déserts, zones arctiques, dépôts de matières premières (zones de charbon, de fer et de soufre, par exemple) ainsi que de [Concept('concept_dubois_formation','$concept_dubois_formations$')] et des volcans géologiques. Les déserts et les zones arctiques sont considérés comme pauvres en minéraux, tandis que de grandes formations géologiques et volcans sont considérés comme particulièrement riches en minéraux. Une forme plus précieuse de minéraux est [Concept('concept_agassiz_rare_mineral','$concept_agassiz_rare_minerals$')]." #NT!
 concept_agassiz_rare_mineral: "Minéral rare" #NT!
 concept_agassiz_rare_minerals: "Minéraux rares" #NT!
 concept_agassiz_rare_mineral_desc: "[Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')] peut trouver des minéraux rares sur leurs expéditions, telles que [Concept('concept_dubois_pacific_expedition','$concept_dubois_pacific_expeditions$')], [concept_dubois_mountaineering] expéditions, [concept_agassiz_volcano] expéditions ou pendant la prospection minérale. Contrairement au [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')] commun, ils ne se trouvent que en quantités très limitées. Des minéraux rares sont utilisés pour construire une armoire minérale." #NT!
 concept_agassiz_geologist: "#b #GREEN Géologue#!#!" #NT!
 concept_agassiz_geologists: "#b #GREEN Géologues#!#!" #NT!
 concept_agassiz_geologist_desc: "#b #GREEN Les géologues#!#! sont [Concept('concept_academics_academic','$concept_academics_academics$')] qui étudient principalement les roches et l'histoire de la Terre. Ils localisent les dépôts [Concept('concept_lepsius_cave','$concept_lepsius_caves$')], [Concept('concept_dubois_formation','$concept_dubois_formations$')] et [Concept('concept_curie_uranium','$concept_curie_uranium$')], ce qui en fait des collègues irremplaçables pour [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')], [Concept('concept_lepsius_anthropologist','$concept_lepsius_anthropologists$')] et [Concept('concept_curie_physicist','$concept_curie_physicists$')]. Au cours de leurs expéditions, ils peuvent trouver #GREEN0 supplémentaire qu'un #GREEN1 peut utiliser pour découvrir ou isoler #GREEN2. Ils peuvent trouver de nouveaux dépôts de matières premières. Ils sont également actifs en tant que volcanologues et peuvent faire des expéditions au #GREEN3 local pour les rechercher plus en détail. Avec #GREEN4, ils peuvent développer de nouveaux appareils, tels que les sismographes, pour en savoir plus sur l'intérieur de la Terre. Les géologues peuvent participer aux expéditions #GREEN5 et #GREEN6." #NT!
 concept_agassiz_volcano: "Volcan" #NT!
 concept_agassiz_volcanoes: "Volcans" #NT!
 concept_curie_physicist: "#b #ORANGE Physicien#!#!" #NT!
 concept_curie_physicists: "#b #ORANGE Physiciens#!#!" #NT!
 concept_curie_physicist_desc: "#n à venir bientôt à Morgenröte! #!" #NT!
 concept_curie_uranium: "Uranium" #NT!
 concept_curie_uranium_desc: "L'uranium est un matériau extrêmement rare que l'on ne trouve que dans quelques provinces historiques sélectionnées par [Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')]. La physique moderne doit avoir été recherchée pour cela. À première vue, l'uranium est un minerai secondaire qui n'est utilisé que dans la production de céramique. Cependant, il sera nécessaire plus tard, en particulier dans le [concept_verrier_observatory]. Ce n'est que si les meilleures méthodes de production physique et chimique sont fournies en uranium qu'elles peuvent remplir leur objectif, que ce soit dans le domaine de la physique nucléaire ou dans la recherche d'éléments précédemment inconnus. Sans uranium, toutes les activités scientifiques dans le domaine de la radioactivité sont tout simplement impossibles. Il est donc particulièrement intéressant pour [Concept('concept_mendelejew_chemist','$concept_mendelejew_chemists$')] et [Concept('concept_curie_physicist','$concept_curie_physicists$')] dans la phase finale de Victoria 3." #NT!
  
 concept_mendelejew_chemistry: "Chimie" #NT!
 concept_mendelejew_chemistry_desc: "#b Chemistry#! est l'une des principales caractéristiques de [concept_morgenroete]. À partir du XVIIIe siècle, #b Chemistry#! est rapidement devenu une science moderne. Soudain, de nombreux nouveaux éléments ont été découverts et des processus chimiques ont été inventés. Les 19e et 20e siècle ont vu encore plus de découvertes en chimie, allant de nouveaux éléments à l'invention de la dynamite ou du processement de bober-bosch. \ N \ nin #b Morgenröte#! #b Chemistry#! sera mené par [Concept('concept_mendelejew_chemist','$concept_mendelejew_chemists$')] qui sera en mesure de se concentrer sur différents tasks. \ Aucune Focus est l'amélioration de vos pays #b #!1#!. §) Chaque élément ajoutera un peu de [concept_morgenroete]3 selon que vous l'avez théorisé, découvert ou isolé. Cela déverrouillera le #b #b1#! ou le #b #b4#!." #NT!
  
 concept_mendelejew_chemists: "#b #ORANGE Chemists#!#!" #NT!
 concept_mendelejew_chemist_desc: "#b #ORANGE Chemists#!#! sont [Concept('concept_academics_academic','$concept_academics_academics$')] qui théoriseront, découvriront et isoler [Concept('concept_mendelejew_element','$concept_mendelejew_elements$')]. \ N#b #ORANGE Chemists#!#! Gain [concept_academics_experience] lorsqu'ils recherchent #b Elements#ORANGE0 ou assister à des conférences. Ils peuvent également améliorer les engrais, les explosifs et les synthétiques. Les chimistes peuvent inventer le tableau périodique ou le carburant synthétique, ce qui les rend précieux pour les pays sans accès à l'huile. Ils obtiennent également #b d'expérience #ORANGE0 passivement chaque année. Cela permet à #b #ORANGE Chemists#!#! d'obtenir de meilleurs traits chimistes. Ils peuvent également obtenir une spécialisation (théoricien, analyste, inspecteur) lorsqu'ils sont créés ou par événement." #NT!
 concept_mendelejew_element: "Élément chimique" #NT!
 concept_mendelejew_element_no_chemical: "Élément" #NT!
 concept_mendelejew_elements: "Éléments chimiques" #NT!
 concept_mendelejew_element_desc: "Dans les temps anciens, il était courant de croire que le monde était composé des quatre éléments: le feu, la terre, l'eau et l'air. Avec le début de l'émancipation de la chimie de l'alchimie, l'analyse scientifique des éléments chimiques est née. Ce processus était loin d'être complet au 19e siècle. \ N \ n[Concept('concept_mendelejew_chemist','$concept_mendelejew_chemists$')] peut poursuivre cette recherche en théorisant, en découvrant et en isolant les éléments un à la fois. Ce n'est que lorsqu'il est isolé, un élément considéré comme pleinement reconnu et donné son nom; Auparavant, ce n'est qu'un nombre. La catégorisation des éléments apporte un progrès scientifique et un chimiste [concept_academics_experience]. \ Nnot tous les éléments peuvent être théorisés, découverts et isolés dès le début. \ N La condition préalable est que le laboratoire chimique du [concept_verrier_observatory] a un équipement adéquat, dans certains cas également un institut de physique moderne. De nombreux éléments ne peuvent être recherchés que correctement avec la spectrographie; Vers la fin du jeu, un cyclotron peut être nécessaire. [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')] sont nécessaires pour la découverte et l'isolement des éléments chimiques. En plus des méthodes de production, l'expérience du chimiste et les traits de caractère jouent un rôle décisif dans la durée de la recherche. Les éléments \ n \ nrestrés sont une exigence pour le développement du tableau périodique et de l'organisation du Congrès de la chimie." #NT!
  
 concept_verrier_meteorite: "Météorite" #NT!
 concept_verrier_meteorites: "Météorites" #NT!
  
  ### 2.2.2a ### 
  
 concept_manzoni_national_writers: "Écrivains nationaux" #NT!
  
  ### 2.2.3 ### 
  
 concept_verrier_astronomy_desc: "#b astronomy#! est l'une des principales caractéristiques de [concept_morgenroete]. \ N \ nto accéder à #b astronomy#! Vous avez besoin d'un [concept_verrier_observatory] ou d'un [concept_verrier_astronomer]. \ N \ nonce vous avez un observatoire, vous découvrirez passivement [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]. \ N \ n si vous avez un [concept_verrier_astronomer] vous pourrez même trouver de nouveaux planètes, [Concept('concept_verrier_satellite','$concept_verrier_satellites$')], #!0 et vous pourrez même trouver des planètes, [Concept('concept_verrier_satellite','$concept_verrier_satellites$')], #!0 et vous pourrez même trouver des planètes, [Concept('concept_verrier_satellite','$concept_verrier_satellites$')], #!0 et vous pourrez même vous #!1. \ NSOMETHIQUES VOTRE #!2 pourrait également trouver #!3 qui peut être examiné par #b astronomes#! et #!6. \ N \ nevery que la découverte astronomique vous accordera #!7 qui vous sera ajouté #!8. Vérifiez le #!9 [concept_morgenroete]0 pour voir votre #b Prestige #!" #NT!
  
 concept_verrier_observatory_desc: "Un #b Observatory#! est l'épine dorsale des pays [concept_verrier_astronomy] et [concept_mendelejew_chemistry]. À partir de là, [Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')] peut découvrir des planètes, [Concept('concept_verrier_satellite','$concept_verrier_satellites$')], [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')], [Concept('concept_verrier_comet','$concept_verrier_comets$')] et prendre [Concept('concept_verrier_moon_photo','$concept_verrier_moon_photos$')]. \ Nto construire un observatoire #b #!, vous devez avoir une université et le #!1 ou #!2 #!3 recherché. De plus, un #b Observatory#! ne peut être construit qu'une seule fois dans votre capital." #NT!
  
 concept_verrier_astronomer_desc: "#b astronomes#! sont des universitaires qui exploreront le ciel et découvriront [Concept('concept_verrier_satellite','$concept_verrier_satellites$')], [Concept('concept_verrier_comet','$concept_verrier_comets$')] et [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]. \ N#b astronomes#! gain [concept_academics_experience] lorsqu'ils découvrent #b objets astronomiques #! ou assister à des conférences. Ils obtiennent également #b d'expérience #! passivement chaque année. Cela permet à #b astronores#! d'obtenir de meilleurs traits d'astronome. \ N \ nan #b astronome#! peut se concentrer sur la découverte de nouveaux satellites #b satellites#! ou #b en prenant la lune Photos#!. Cela réduira cependant la quantité d'objets astronomiques découverts #b" #NT!
  
 concept_verrier_astronomical_prestige: "Prestige astronomique" #NT!
 concept_verrier_astronomical_prestige_desc: "#b Prestige rstige#! est la quantité de [concept_prestige] que vous gagnez de l'astronomie. Divers facteurs influencent votre #b Prestige #!: \ n- La recherche d'une nouvelle planète vous accordera entre #V 15#! et #V 100#! Prestige en fonction de la difficulté de la trouver. \ N- chaque découverte [concept_verrier_satellite] vous accordera 10 prestige. \ N- Un #!0 terminé Prestige. \ N- Chaque #!3 vous accordera #V 1#! Prestige. \ N- Chaque #V 100#! #!8 vous accordera #V 1#! prestige." #NT!
  
 concept_verrier_astronomical_object_desc: "#b Les objets astronomiques#! sont des astéroïdes et des étoiles que vous avez découverts. Ces objets peuvent être découverts si vous avez un [concept_verrier_observatory]. Plus votre technologie d'astronomie est meilleure, plus vous trouverez d'objets. Vous découvrirez également plus d'objets #b#! Si vous avez un [concept_verrier_astronomer]. \ Nait assez #b Objets astronomiques #! Vous pourrez découvrir de nouvelles planètes ou la technologie de physique Astro." #NT!
  
 concept_verrier_moon_map: "Carte de la lune" #NT!
 concept_verrier_moon_photo_desc: "Si vous avez un [concept_verrier_observatory] et recherché la technologie de la caméra, vous pourrez commander votre [concept_verrier_astronomer] pour commencer à photographier la lune. Cela réduira la quantité de [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] de votre #b astronome#! mais vous donnera #b Moon Photos#! chaque année. \ Nif vous collectez suffisamment de #b Moon Photos#!, vous créera une carte précise du compagnon de la Terre. L'achèvement de la carte lunaire accordera à votre nation un peu [concept_verrier_astronomical_prestige]" #NT!
  
 concept_verrier_satellite: "Satellite" #NT!
 concept_verrier_satellites: "Satellites" #NT!
 concept_verrier_satellite_desc: "#b Satellites#! ou les lunes sont [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] qui en orbitent une planète. Certains satellites #b comme la lune de la Terre sont déjà découverts, mais un [concept_verrier_astronomer] peut essayer d'en trouver plus. \ Neach #b satellite#! découvert par votre pays lui accordera une petite quantité de [concept_verrier_astronomical_prestige]." #NT!
  
 concept_verrier_meteorite_desc: "Les météorites sont des corps solides relativement petits d'origine cosmique qui ont traversé l'atmosphère terrestre et ont atteint le sol. Dans de rares cas, des fragments de météorite peuvent être trouvés après une douche de météores. Les météorites qui frappent la Terre il y a des milliers d'années peuvent également être trouvées par [Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')] sur un terrain difficile comme les déserts et les zones arctiques. [Concept('concept_mendelejew_chemist','$concept_mendelejew_chemists$')] et [Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')] en particulier sont intéressés par les météorites et pourraient vouloir les analyser. \ N \ nadditionally #b Meteorites#! aider à élever votre [concept_agassiz_geological_score] et permettre une meilleure estimation du [concept_agassiz_age_of_earth]." #NT!
  
 concept_agassiz_volcano_desc: "#b Volcanoes#! sont un nouveau trait d'état dans #r morgenröte#!. Contrairement au jeu de base pour Victoria 3, ce ne sont pas des régions stratégiques mais plutôt des États avec des volcans qui sont liés à la question de savoir si une éruption volcanique a lieu. L'activité volcanique est nettement plus grande, mais elle n'est pas toujours destructrice. Dans les pays avec des volcans, un #b $building_agassiz_volcano_observatory$#! peut être construit, ce qui aide non seulement à prédire et à atténuer les éruptions par des observations, mais est également le point de départ d'une expédition volcanique. [Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')] peut acquérir de nouveaux [concept_agassiz_geological_knowledge], [Concept('concept_agassiz_rare_mineral','$concept_agassiz_rare_minerals$')], l'expérience et le trait volcanologiste lors d'une expédition volcano." #NT!
  
 concept_agassiz_geological_knowledge: "Connaissances géologiques" #NT!
 concept_agassiz_geological_knowledge_desc: "#b Geological Knowledge#! comprend la compréhension générale d'une nation de la nature de la terre. Il s'agit d'une ressource très rare qui peut être acquise principalement au cours des jalons géologiques. #b Geological Knowledge#! n'est pas la même que le [concept_agassiz_geological_score], mais c'est la composante la plus importante de celle-ci et est considérée comme particulièrement précieuse." #NT!
 concept_agassiz_geological_score: "Score géologique" #NT!
 concept_agassiz_geological_score_desc: "Le score géologique #b comprend toutes les réalisations et les connaissances d'une nation liées à la géologie. Le composant le plus important est [concept_agassiz_geological_knowledge], mais il existe de nombreux autres facteurs importants; comme l'expérience d'un [concept_agassiz_geologist], [concept_agassiz_oceanographic_knowledge], du nombre de [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')], [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] ou [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] et des technologies géologiques. Le score géologique est crucial pour remédier au [concept_agassiz_age_of_earth]." #NT!
 concept_agassiz_oceanographic_knowledge: "Connaissance océanographique" #NT!
 concept_agassiz_oceanographic_knowledge_desc: "#b Oceanographic Knowledge#! fait partie de [concept_agassiz_geological_knowledge] et correspond à des connaissances sur les mers, en particulier les courants océaniques, mais également des recherches marines générales combinées à des considérations géophysiques. #b Oceanographic Knowledge#! est largement acquis sur [Concept('concept_dubois_pacific_expedition','$concept_dubois_pacific_expeditions$')]. 50 #b Oceanographic Knowledge#! est nécessaire pour acquérir [concept_agassiz_geological_knowledge]." #NT!
 concept_agassiz_age_of_earth: "Âge de la Terre" #NT!
 concept_agassiz_age_of_earth_desc: "L'une des grandes questions du 19e siècle a été la question de l'âge #b de la Terre #!. Il a eu des implications d'histoire naturelle, en particulier en ce qui concerne la validité de la théorie de l'évolution et la séquence des événements géologiques. Seul un [concept_agassiz_geologist] peut déterminer un nouvel âge terrestre. Pour ce faire, sa nation doit avoir un [concept_agassiz_geological_score] plus élevé que la nation qui a déterminé une âge terrestre. Il partagera ensuite ses résultats de recherche avec d'autres collègues. Il n'a pas nécessairement besoin de réussir - les géologues trop jeunes et inexpérimentés ne seront pas entendus. Cependant, les nations étrangères sont un peu plus accommodantes lorsqu'aucune nouvelle théorie n'a été présentée depuis de nombreuses années. Les géologues ne peuvent estimer l'âge de la terre une fois dans leur vie - mais cela ne s'applique que s'ils réussissent. Si vous échouez, vous pouvez réessayer après une phase de motivation." #NT!
 concept_agassiz_geology: "Géologie" #NT!
 concept_agassiz_geology_desc: "#b Geology#! est l'une des principales caractéristiques de [concept_morgenroete]. Même avant le début de l'ère victorienne, la géologie avait déjà connu un boom significatif, c'est pourquoi il est disponible dans de nombreuses nations au début du jeu. \ N \ n[Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')] peut être utilisé de diverses manières: ils peuvent trouver [Concept('concept_dubois_formation','$concept_dubois_formations$')], [Concept('concept_lepsius_cave','$concept_lepsius_caves$')] et [concept_curie_uranium] des dépôts lors d'une recherche géologique, allez sur [concept_agassiz_volcano] Expeditions, déterminer [concept_agassiz_age_of_earth], trouver de nouveaux ordres et des dépôts pétroliers et go ou go in [concept_dubois_pacific_expedition] et #!0, 10, de nouveaux orages et des dépôts pétroliers ou go sur [concept_dubois_pacific_expedition] et [concept_dubois_pacific_expedition] Expéditions utiles comme compagnons scientifiques. Un #!1 évalue les connaissances globales d'une nation et est cruciale pour déterminer l'âge de la terre. #!2 et #!3 sont une partie essentielle de la géologie; Ce dernier peut être utilisé pour établir une armoire minérale dans le #!4. Une installation géologique spéciale est le #b #!6#!, qui effectue des études volcanologiques et sismiques." #NT!
  
  ### 2.2.3b ### 
  
 concept_theiler_biologist: "#b #GREEN Biologist#!#!" #NT!
 concept_theiler_biologists: "#b #GREEN Biologists#!#!" #NT!
 concept_theiler_biologist_desc: "#n à venir bientôt à Morgenröte! #!" #NT!
 concept_gaudi_architect: "#b #PURPLE Architect#!#!" #NT!
 concept_gaudi_architects: "#b #PURPLE Architects#!#!" #NT!
 concept_gaudi_architect_desc: "#n à venir bientôt à Morgenröte! #!" #NT!
  
  ### 2.2.4 ### 
  
 concept_academics_university_specialization_desc: "Chaque université peut être spécialisée en modifiant sa méthode de production. \ Na University avec un [concept_pm_academics_university_humanities] vous permettra de concentrer la recherche sur votre nations sur l'innovation de la société et permet de recruter spécifiquement [Concept('concept_lepsius_archaeologist','$concept_lepsius_archaeologists$')] et [Concept('concept_lepsius_anthropologist','$concept_lepsius_anthropologists$')]. \ Na University avec un [concept_pm_academics_university_natural_history] vous permettra de concentrer vos recherches sur l'innovation de la société et permet de recruter spécifique Pour recruter spécifiquement [Concept('concept_gaudi_engineer','$concept_gaudi_engineers$')] ou [Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')]. \ Nchanging, la spécialisation aura un #n à court effet négatif [Concept('concept_lepsius_archaeologist','$concept_lepsius_archaeologists$')]0 pour le bâtiment et votre [Concept('concept_lepsius_archaeologist','$concept_lepsius_archaeologists$')]1. \ Les universités nspecialized peuvent également influencer divers projets. Les universités ayant une orientation [Concept('concept_lepsius_archaeologist','$concept_lepsius_archaeologists$')]2 aideront par exemple les projets d'ingénierie." #NT!
  
 concept_pm_academics_university_humanities_desc: "Un foyer en sciences humaines-anthropologiques spécialise l'université et permet une concentration nationale sur la recherche sur la société et de recruter spécifiquement [Concept('concept_lepsius_archaeologist','$concept_lepsius_archaeologists$')] et [Concept('concept_lepsius_anthropologist','$concept_lepsius_anthropologists$')]. Vous obtiendrez un modificateur de débit négatif #n pour l'université ainsi qu'un effet négatif #n #! sur votre [concept_academics_progress] lorsque vous modifiez cette méthode de production. \ Nspecialization de vos universités avec le Focus Humanities-anthropologique vous donnera un bonus sur la chance de succès des expéditions (maximum de +4 nécessitant 40 niveaux de spécialisation) et améliorent les progrès pour d'autres projets." #NT!
  
 concept_pm_academics_university_natural_history_desc: "Un objectif d'histoire naturelle spécialise l'université et permet une concentration nationale sur la recherche sur la société et de recruter spécifiquement [Concept('concept_dubois_naturalist','$concept_dubois_naturalists$')] et [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')]. Vous obtiendrez un modificateur de débit négatif #n pour l'université ainsi qu'un effet négatif #n #! sur votre [concept_academics_progress] lorsque vous modifiez cette méthode de production. \ Nspecializer vos universités avec la mise au point de l'histoire naturelle vous donnera un bonus à divers projets de vos scientifiques naturels." #NT!
  
 concept_pm_academics_university_mathematics_desc: "L'objectif technique mathématique est spécialisé à l'université et permet un accent national sur la production et la recherche militaire et de recruter spécifiquement [Concept('concept_gaudi_engineer','$concept_gaudi_engineers$')] ou [Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')]. Vous obtiendrez un modificateur de débit négatif #n pour l'université ainsi qu'un effet négatif #n #! sur votre [concept_academics_progress] lorsque vous modifiez cette méthode de production. \ Nspecializer vos universités avec le foyer technique mathématique vous donnera un bonus pour divers projets de vos [Concept('concept_gaudi_engineer','$concept_gaudi_engineers$')] et [Concept('concept_mendelejew_chemist','$concept_mendelejew_chemists$')]." #NT!
  
  ### 2.3.0 ### 
  
 concept_panum_physician: "#b #BLUE Physician#!#!" #NT!
 concept_panum_physicians: "#b #BLUE Physicians#!#!" #NT!
 concept_panum_physician_desc: "#b #BLUE Les médecins#!#! sont [Concept('concept_academics_academic','$concept_academics_academics$')] qui travaillent et recherchent dans le domaine de [concept_panum_medicine]. Leur tâche principale est d'écrire [Concept('concept_panum_disease_description','$concept_panum_disease_descriptions$')] et de trouver [Concept('concept_panum_disease_treatment','$concept_panum_disease_treatments$')].Ils peuvent également améliorer la recherche médicale, améliorer les soins de santé et guérir d'autres personnages. \ Nphysiciens gagnent [concept_academics_experience] pendant leur travail et passivement chaque année. Ils peuvent obtenir de meilleurs niveaux du trait du médecin en gagnant suffisamment #b Experience#!." #NT!
  
 concept_panum_medicine: "Médecine" #NT!
 concept_panum_medicine_desc: "La médecine est l'une des plus grandes extensions de [concept_morgenroete] pour Victoria 3. L'un des accent est mis sur l'épidémie [Concept('concept_panum_disease','$concept_panum_diseases$')] comme le choléra, la tuberculose et le typhus, qui tourmentent l'humanité depuis des siècles et ont finalement été maîtrisées grâce aux avancées scientifiques. Les maladies épidémiques sont donc l'un des événements négatifs du [concept_morgenroete]. Le confinement par la recherche d'un [concept_panum_disease_treatment] est donc encore plus important. Un élément central de la médecine est donc un [concept_panum_physician] qui est l'un des universitaires de l'orientation universitaire anthropologique-humaine. Il peut décrire les maladies épidémiques et trouver des traitements. Une méthode de traitement nécessite généralement un [concept_panum_disease_description] et une technologie. Un médecin peut également améliorer la recherche des technologies médicales ou étendre les soins de santé dans les hôpitaux, ainsi que de nouvelles techniques médicales et guérir d'autres personnages. Les conférences médicales aident à diffuser des connaissances médicales à l'international. Une étape importante dans la modernisation de la médecine est également la transition de la théorie du miasme au [concept_panum_germ_theory]. Une nation qui est un leader des découvertes médicales peut également démontrer un [concept_panum_medical_prestige] élevé." #NT!
  
 concept_panum_disease: "Maladie" #NT!
 concept_panum_diseases: "Maladies" #NT!
 concept_panum_disease_desc: "Le terme maladie fait généralement référence aux maladies épidémiques qui peuvent affecter une nation toutes les quelques années. Un [concept_panum_physician] peut les contrer en faisant [Concept('concept_panum_disease_description','$concept_panum_disease_descriptions$')] et en fournissant des maladies épidémiques [Concept('concept_panum_disease_treatment','$concept_panum_disease_treatments$')] ne se produisent généralement pas en même temps et il faut un certain temps pour que les maladies épidémiques éclatent à nouveau. Selon le type, les maladies épidémiques peuvent avoir un effet dévastateur et se propager dans plusieurs états. Il existe diverses méthodes [concept_panum_disease_prevention] pour retarder le début d'une telle maladie ou pour atténuer ses effets. Les déclencheurs d'une maladie peuvent être très différents. La fièvre jaune ne se produit que dans les régions tropicales et le choléra et la tuberculose nécessitent un minimum d'urbanisation pour avoir un effet. Le niveau de vie et le niveau de dévastation d'un État jouent également un rôle. \ N \ nin ajout à ces maladies épidémiques particulièrement redoutées, il existe également des maladies quotidiennes qu'un médecin peut examiner au hasard pendant la recherche médicale. Ces maladies incluent le rachitisme, le pellagra et la syphilis." #NT!
  
 concept_panum_disease_description: "Description de la maladie" #NT!
 concept_panum_disease_descriptions: "Description des maladies" #NT!
 concept_panum_disease_description_desc: "Les descriptions sont la première étape vers la compréhension d'un [concept_panum_disease]. Ils n'ont aucun impact sur la gravité d'une épidémie, mais sont fondamentaux pour trouver [Concept('concept_panum_disease_treatment','$concept_panum_disease_treatments$')], [Concept('concept_theiler_pathogen','$concept_theiler_pathogens$')] et [Concept('concept_theiler_vaccine','$concept_theiler_vaccines$')]. Les descriptions de la maladie n'ont pas d'autres exigences: tout ce qui est nécessaire est une maladie épidémique et un [concept_panum_physician]." #NT!
  
 concept_panum_disease_treatment: "Traitement de la maladie" #NT!
 concept_panum_disease_treatments: "Traitements de la maladie" #NT!
 concept_panum_disease_treatment_desc: "Un [concept_panum_physician], étant donné la bonne technologie et un [concept_panum_disease_description], peut trouver un traitement pour un [concept_panum_disease] dans un long processus. Les traitements ne sont pas les mêmes qu'un remède. Le médecin découvre plutôt la cause d'une maladie et développe des méthodes sur cette base pour prévenir ou limiter considérablement une épidémie. Les traitements de la maladie limitent la durée d'une maladie épidémique à quelques mois ou semaines et l'empêchent également de se propager à plusieurs États. Les traitements de la maladie font partie de la possible [concept_panum_disease_prevention] contre les épidémies épidémiques." #NT!
  
 concept_panum_disease_prevention: "Prévention des maladies" #NT!
 concept_panum_disease_prevention_no_disease: "Prévention" #NT!
 concept_panum_disease_prevention_desc: "Il existe plusieurs façons d'éviter ou du moins d'atténuer une épidémie [concept_panum_disease]. La méthode la plus connue est le [concept_panum_disease_treatment] développé par un [concept_panum_physician]. Il réduit considérablement le temps où une maladie fait rage et réduit également la probabilité qu'elle se propage à un autre pays. Le niveau de vie, les hôpitaux, les technologies et un haut niveau d'institutions de soins de santé ont également un impact. La prévention ultime est un [concept_theiler_vaccine] qui empêche une maladie de se produire en premier lieu. Les vaccins sont développés par [Concept('concept_theiler_biologist','$concept_theiler_biologists$')]. Cependant, il n'est efficace que si l'institution de santé a au moins atteint le niveau spécifié auprès de la faculté médicale. Après tout, la distribution d'un vaccin doit être organisée et supervisée." #NT!
  
 concept_panum_disease_type: "Type de maladie" #NT!
 concept_panum_disease_types: "Types de maladies" #NT!
 concept_panum_disease_type_desc: "L'épidémie [Concept('concept_panum_disease','$concept_panum_diseases$')] peut être différenciée en fonction de leur degré de distribution. #V Les maladies locales #!,, comme la scarlare, sont limitées à l'État dans lequel ils ont éclaté. #V Maladies régionales #!, comme la tuberculose, peut se propager à certains états environnants, mais pas au-delà. #V Maladies transrégionales#! - dont la plus notoire est le choléra - peut se propager dans tout le pays, même si les États n'ont pas à se border mutuellement." #NT!
 concept_panum_local_disease: "Maladie locale" #NT!
 concept_panum_local_diseases: "Maladies locales" #NT!
 concept_panum_regional_disease: "Maladie régionale" #NT!
 concept_panum_regional_diseases: "Maladies régionales" #NT!
 concept_panum_transregional_disease: "Épidémie transrégionale" #NT!
 concept_panum_transregional_diseases: "Épidémie transrégionale" #NT!
  
 concept_panum_germ_theory: "Théorie des germes" #NT!
 concept_panum_germ_theory_desc: "La théorie des germes est l'une des avancées scientifiques médicales fondamentales du 19e siècle. Il a remplacé les théories précédentes et plus archaïques, telles que la théorie du miasme, qui était répandue en Europe et représente toutes les tentatives traditionnelles pour expliquer la cause de [Concept('concept_panum_disease','$concept_panum_diseases$')]. La découverte de la théorie des germes profite non seulement au premier découvreur. Lorsque vous recherchez [Concept('concept_panum_disease_treatment','$concept_panum_disease_treatments$')], les chances de succès sont légèrement plus élevées car elle empêche certains événements négatifs et débloque plus d'événements positifs." #NT!
  
 concept_panum_medical_prestige: "Prestige médical" #NT!
 concept_panum_medical_prestige_desc: "Le prestige médical est composé du [Concept('concept_panum_disease_description','$concept_panum_disease_descriptions$')] (2 points), du [Concept('concept_panum_disease_treatment','$concept_panum_disease_treatments$')] (4 points), du [Concept('concept_theiler_pathogen','$concept_theiler_pathogens$')] (3 points) et du [Concept('concept_theiler_vaccine','$concept_theiler_vaccines$')] (4 points) découvert jusqu'à présent. Les premières découvertes donnent deux fois plus de points. Un prestige médical supplémentaire peut provenir de la guérison des maladies quotidiennes, de l'invente des méthodes de guérison spéciales ou de l'amélioration généralement du système de santé via un [concept_panum_physician]." #NT!
  
 concept_theiler_pathogen: "Pathogène" #NT!
 concept_theiler_pathogens: "Pathogènes" #NT!
 concept_theiler_pathogen_desc: "#n à venir bientôt à Morgenröte! #!" #NT!
  
 concept_theiler_vaccine: "Vaccin" #NT!
 concept_theiler_vaccines: "Vaccins" #NT!
 concept_theiler_vaccine_desc: "#n à venir bientôt à Morgenröte! #!" #NT!
  
  ### 2.3.2 ### 
  
 concept_panum_red_cross: "Croix Rouge" #NT!
 concept_panum_red_cross_desc: "La Croix-Rouge est l'une des premières organisations internationales et, dans de rares cas, offre la possibilité de recevoir des médecins de la Croix-Rouge dans une guerre. Les membres de la Croix-Rouge reçoivent également certains bonus. Selon la règle du jeu, la Croix-Rouge peut être fondée historiquement ou dynamiquement; Les États reconnus peuvent se joindre à certaines exigences technologiques. Le fondateur reçoit le siège de la Croix-Rouge dans sa capitale. Les membres peuvent accéder à jusqu'à trois [Concept('concept_panum_convention','$concept_panum_conventions$')] qui sont contraignants en vertu du droit international." #NT!
 concept_panum_convention: "Convention internationale" #NT!
 concept_panum_conventions: "Conventions internationales" #NT!
  
  ### 2.3.3 ### 
  
 concept_panum_convention_desc: "Une convention internationale est une déclaration d'intention conjointe des États pour établir certaines règles du jeu dans le trafic international. Il y en avait plusieurs exemples au cours du 19e siècle, comme la Convention de Genève ou le code de la guerre des terres de La Haye. Ce que toutes les conventions ont en commun, c'est qu'ils tentent d'atténuer les horreurs de la guerre. Les options militaires sont donc préférées aux soins médicaux sûrs pour les armes blessées et ultimes sont interdites, ce qui conduit à un certain confinement de la guerre. L'avantage est une plus grande flexibilité. Bien que l'adoption d'une convention soit considérée favorablement, l'abolition d'une convention peut conduire à la colère internationale. \ N \ ninternational Conventions sont généralement des déclarations d'intention non contraignantes. Cependant, si suffisamment de membres du [concept_panum_red_cross] le signent, au fil du temps, il deviendra un droit international valide, ce à quoi tous les signataires devraient se conformer - et les autres membres le signeront également. Cela se produit lorsque 65% de tous les membres et la majorité des grands pouvoirs conviennent de cette convention - alors tous les autres membres sont alors obligés de le respecter. Cette convention ne peut alors plus être abolie comme d'habitude. Afin d'éviter les conventions contraignantes, un retrait complet de la Croix-Rouge est nécessaire - avec toutes les conséquences." #NT!
  
  ### 2.3.4 ### 
  
 concept_manzoni_literary_tradition_desc: "#b Litterary Tradition#! est une représentation des réalisations et traditions littéraires d'une nation. \ NETHERE DES DISTRICES DE GAGNER #b Tradition littéraire #!. Ayant au moins un $building_arts_academy$, avoir un ou plusieurs [Concept('concept_manzoni_local_writer','$concept_manzoni_local_writers$')], un [concept_manzoni_national_writer] et avoir certains [Concept('concept_artists_center_of_arts','$concept_artists_centers_of_arts$')] ajoutera passivement #b Tradition littéraire #! à votre pays. \ Nhe plus #b Tradition littéraire #! Votre nation gagne, plus le bonus de prestige est élevé. De plus, il vous permettra de déverrouiller le #!2 #!3." #NT!
 concept_elgar_musical_tradition_desc: "#b Musical Tradition#! est une représentation des réalisations et traditions musicales d'une nation. \ NELLIQUES DES DISTRICES DE GAGNER #b MUSICAL TRADITION#!. Si vous en avez au moins un [concept_elgar_opera], vous obtiendrez passivement #b Musical Tradition#!. Plus vous en avez sur #b #b, plus vous en avez. Vous pouvez également gagner plus #b Musical Tradition#! à partir des technologies musicales et artistiques. Chaque technologie donne un bonus différent. Vous pouvez également obtenir #b Musical Tradition#! à partir d'événements, surtout si vous avez un #!3. \ Nhe plus #b Musical Tradition#! Votre nation gagne, plus le bonus de prestige est élevé que vous gagnez. De plus, il vous permettra de déverrouiller le #!6 #!7." #NT!
 concept_klimt_painting_tradition_desc: "#b Tradition #! est une représentation des réalisations et traditions de peinture d'une nation. Il peut être obtenu en ayant des académies artistiques #b #!, un [concept_klimt_painter], certains [Concept('concept_technology', '$concept_technologies$')] ou des événements. \ N#b Tradition#! de la peinture vous permet de déverrouiller le [concept_elgar_art_nouveau] [concept_artists_art_style] et est utilisé pour calculer votre tradition culturelle #b_1." #NT!
  
  ### 2.3.5 ### 
  
 concept_mendelejew_theorized_elements: "Éléments théorisés" #NT!
 concept_mendelejew_discovered_elements: "Éléments découverts" #NT!
 concept_mendelejew_isolated_elements: "Éléments isolés" #NT!
  
 concept_panum_psycho_point: "Point psychothérapeutique" #NT!
 concept_panum_psycho_points: "Points psychothérapeutiques" #NT!
 concept_panum_psycho_point_desc: "Les points psychothérapeutiques sont une monnaie abstraite qui représente les progrès d'un pays dans le domaine de la psychiatrie et de la psychologie. Ils sont générés mensuellement à partir des technologies, un asile fou ou un [concept_panum_physician] avec #V psychiatre#! [concept_character_trait]. Les points psychothérapeutiques peuvent également être acquis via l'événement. Un nombre élevé de points psychothérapeutiques se traduit par une meilleure chance de guérir les personnages atteints de maladies mentales. Monter un niveau psychothérapeutique donne également des bonus de recherche et [concept_academics_progress]. Un certain nombre de points psychothérapeutiques sont une exigence pour la plupart des écoles psychologiques." #NT!
  
