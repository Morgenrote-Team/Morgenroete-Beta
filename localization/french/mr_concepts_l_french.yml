 concept_dubois_dinosaur_bone_no_dinosaur: "Os" #NT!
 concept_dubois_dinosaur_bones_no_dinosaur: "Os" #NT!
  
 concept_dubois_paleontological_expedition_desc: "Un [concept_dubois_paleontologist] peut être envoyé à [Concept('concept_dubois_formation','$concept_dubois_formations$')]. Cela prendra 1 an et selon le succès de l'expédition, vous obtiendrez [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] et [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')]. Lorsque vous terminez une expédition et si vous avez un [concept_dubois_paleontological_team] gratuit, vous pouvez configurer un [concept_dubois_paleontological_excavation] pour gagner passivement des fossiles et des os de cette région. \ N le moyen le plus simple d'accéder à une formation est de contrôler l'état associé. Cependant, l'accès peut également être acquis pacifiquement via [Concept('concept_dubois_paleontological_licence','$concept_dubois_paleontological_licences$')]." #NT!
  
 concept_dubois_paleontological_team: "Équipe paléontologique" #NT!
 concept_dubois_paleontological_teams: "Équipes paléontologiques" #NT!
 concept_dubois_paleontological_team_desc: "Les équipes paléontologiques peuvent être utilisées pour créer un [concept_dubois_paleontological_excavation] après avoir terminé un [concept_dubois_paleontological_expedition]. Cela vous permettra d'obtenir passivement [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] et [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')]." #NT!
  
 concept_dubois_paleontological_excavation: "Fouille paléontologique" #NT!
 concept_dubois_paleontological_excavations: "Fouilles paléontologiques" #NT!
 concept_dubois_paleontological_excavation_desc: "Vous pouvez configurer une expédition paléontologique après avoir terminé un [concept_dubois_paleontological_expedition] si vous avez un [concept_dubois_paleontological_team] gratuit. Une fouille paléontologique permettra à votre équipe de produire passivement [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] et [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')]." #NT!
