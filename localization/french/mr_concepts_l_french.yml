 concept_rapanui_christian_mission: "Mission chrétienne" #NT!
 concept_rapanui_christian_missions: "Missions chrétiennes" #NT!
 concept_rapanui_christian_mission_desc: "[Concept('concept_major_power','$concept_major_powers$')] ou [Concept('concept_great_power','$concept_great_powers$')] avec [Concept('concept_interest','$concept_interests$')] en Océanie peut essayer de convertir une nation insulaire décentralisée dans la région - mais cela n'est possible que si votre pays n'est pas trop laïque et que le groupe d'intérêt "dévot" n'est pas trop faible. \ N \ n le prosélytisme a lieu en trois étapes. Si vous envoyez un missionnaire, il sera reçue gentiment, ignoré - ou tué immédiatement. Si votre mission tourne mal, vous devrez attendre quelques années pour trouver un nouveau missionnaire pour diffuser la parole de Dieu. Ensuite, votre missionnaire convertira 1% de la population par an. Il peut y avoir des événements qui aident ou entravent la conversion. \ N \ n La deuxième étape commence lorsque vous atteignez 30% d'indigènes convertis. Maintenant, votre station missionnaire deviendra permanente. Si 51% des indigènes professent le christianisme, le chef se convertira à votre religion et se placera sous votre protection en tant que [concept_protectorate]. Des années plus tard, ces zones peuvent même être annexées si vous avez la technologie pour empêcher le paludisme. \ N \ Nin la troisième étape que vous pouvez prendre activement des décisions via l'entrée du journal. Soit vous renforcez la mission directement en envoyant des missionnaires supplémentaires, soit vous essayez de faire du commerce. Vous pouvez acquérir des [Concept('concept_lepsius_artifact','$concept_lepsius_oceanic_artifacts$')], [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] ou des perles rares qui augmentent le niveau de vie des riches." #NT!
  
