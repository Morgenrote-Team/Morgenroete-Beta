 pius.121.h_tt: "Cette mesure peut avoir des conséquences graves inconnues."
 pius.101.t: "L'apparition à La Salette"
 pius.101.d: "Deux enfants dans les montagnes du sud-est de la France prétendent avoir été témoin d'une apparition de la Vierge Marie, provoquant des vagues d'enthousiasme spirituel - et de préoccupation - dans le monde catholique."
 pius.101.f: "«Rapprochez-vous, mes enfants, n'ayez pas peur. Je suis ici pour vous apporter de grandes nouvelles… '\ n \ nhigh dans les pâturages alpins au-dessus du village de La Salette, près du corps du sud-est de la France, deux enfants de berger signalent une vision qui suscite maintenant les cœurs à travers la chrétienté. Une dame, radieuse avec légère et drapée de chagrin, leur est apparue. Elle a pleuré - des larmes tombant amoureux d'un monde détourné de Dieu. Elle a parlé de blasphèmes prononcés sans honte, du dimanche profane, et de famine et de ruine à venir si l'humanité ne se repentera pas. \ Ce qui semblait d'abord qu'une légende rustique soit devenue un mouvement. Les pèlerins affluent vers la pente de montagne éloignée. Les moines et les journalistes gravissent les mêmes sentiers. L'Église vacille: certains embrassent la vision comme un appel divin à la pénitence; D'autres craignent la montée du mysticisme populaire et de la ferveur irrationnelle. \ Nthe Bishop of Grenoble offre une approbation prudente. Les autorités laïques restent suspectes. \ Nand Rome? Rome regarde - silencieux. Mais déjà, les cloches pénètrent."
 pius.101.g: "Un avertissement céleste."
 pius.101.h: "Rester rationnel."
 pius.102.t: "L'apparition à Lourdes"
 pius.102.d: "Dans la petite ville de Lourdes, une fillette de quatorze ans prétend avoir vu une dame rayonnante dans une grotte. Ses visions attirent rapidement des pèlerins, la controverse - et l'attention de Rome."
 pius.102.f: "«Elle était jeune, pieds nus et pauvre. Pourtant, elle a parlé de la beauté qu'aucun mot ne pouvait décrire. '\ N \ nin une grotte éloignée près de Lourdes, dans les contreforts des Pyrénées, une paysanne nommée Bernadette Soubirous raconte une dame vêtue de blanc, avec une ceinture bleue et des roses dorées sur ses pieds. La vision ne dit rien au début - ne sourit que. Puis elle parle: de pénitence, de prière, de souffrance et de miséricorde divine. Elle se nomme simplement: la conception immaculée. \ Nat d'abord, les villageois se moquent. Mais lorsque Bernadette découvre un printemps caché et affirme qu'il est une source de guérison, des milliers de personnes commencent à arriver - en espérant, en priant, en pleurant. Les béquilles sont laissées pour compte. Les témoignages se propagent. Les sceptiques dénoncent l'hystérie. Les médecins, les prêtres et les politiciens descendent sur Lourdes. \ Nhe Church Enquête. L'État regarde avec prudence. Et toujours les gens viennent."
 pius.102.g: "Un sanctuaire à la guérison et à l'espoir."
 pius.102.h: "Hallucinations!"
 pius.103.t: "La vision silencieuse à Knock"
 pius.103.d: "Dans le village irlandais de Knock, quinze témoins signalent une apparition silencieuse de la Vierge Marie, Saint Joseph et Saint-Jean de l'évangéliste. La vision suscite un peuple longtemps accablé par la pauvreté, l'exil et la règle étrangère."
 pius.103.f: "«Ils n'ont pas dit un mot. Pourtant, dans ce silence, une nation a entendu l'espoir. Et pourtant, quinze villageois se tenaient transpercés. Devant eux, baigné de lumière sur le mur du pignon sud, se tenait un assemblage silencieux: la Vierge Marie dans la pose de prière; Saint Joseph à ses côtés; Saint Jean-Evangéliste, s'est volé et tenant un évangile. Derrière eux, un agneau sur un autel, et une croix. \ Nno Message a été prononcé. Aucun mouvement fait. Et pourtant, les témoins ont juré par ce qu'ils ont vu - jeunes et vieux, hommes et femmes. \ Nin une terre portée par la famine, l'émigration et le désir spirituel, la vision silencieuse résonnait plus fort que les sermons. Les pèlerins sont rapidement arrivés, cherchant la guérison, les signes et la consolation. Les autorités anglaises se sont moqués. Certains dans l'église ont hésité. Mais parmi les pauvres et les dévots de l'Irlande, Knock est devenu un sacré cri pour la dignité."
 pius.103.g: "Une lumière sous la pluie."
 pius.103.h: "Le rejeter comme folklore."
 pius.104.t: "Les secrets de Fátima"
 pius.104.d: "Dans le centre du Portugal, trois enfants de berger signalent des apparitions répétées de la Vierge Marie, aboutissant à un phénomène miraculeux observé par des milliers. Leurs visions portent des prophéties de guerre, de souffrance et de l'avenir de l'Église."
 pius.104.f: "«En fin de compte, mon cœur immaculé triomphera. Pendant six mois, elle apparaît à maintes reprises, avertissant de la guerre mondiale, de la montée des idéologies impitoyables et de la persécution des fidèles. Elle appelle à la pénitence, à la prière et à la consécration de la Russie à son cœur. \ Non le 13 octobre 1917, alors que des dizaines de milliers se tiennent sous la pluie battante, le soleil semble se détacher des cieux, tournant et s'écrasant dans le ciel. Certains tombent à genoux. D'autres fuient. Lorsque la lumière s'estompe, leurs vêtements sont secs. La foule se disperse en silence, impressionnée et effrayée. \ NLa l'église est prudente. La presse est divisée. Mais parmi les gens - en particulier les pauvres, les blessés et les fidèles - une nouvelle flamme est éclairée: l'une d'espoir, une avertissement, qui voit la vierge non seulement comme mère, mais comme la sentinelle de l'époque à venir."
 pius.104.g: "Tenez compte des avertissements de Fátima."
 pius.104.h: "Débitez le miracle solaire."
 pius.105.t: "Notre-Dame de [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName]"
 pius.105.d: "Dans un village isolé près de [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName], des rapports émergent d'une apparition de la Vierge Marie. L'histoire se propage rapidement, attirant des pèlerins, des sceptiques et l'attention des autorités de l'Église."
 pius.105.f: "«Elle se tenait au-dessus des champs, dans une couronne de lumière, et nous regardait comme si elle connaissait la douleur de chaque âme. Il a parlé d'une dame plus brillante que l'aube, masquée de radiance et de chagrin, qui est apparue en silence et a regardé le monde avec un chagrin profond et connaissant. D'autres ont prétendu la voir aussi. Certains sont tombés à genoux. D'autres ont couru. Tous se souvenaient de l'immobilité qui a suivi. \ NLe histoire s'est répandue au-delà du village. Les pèlerins sont arrivés, des bougies en main. Les fidèles ont prié. Les affligés espéraient. Les prêtres débattent. Les responsables ont haussé les sourcils. Mais les gens n'arrêtaient pas de venir - non pas par certitude, mais par quelque chose de plus âgé: la nécessité de croire. \ Nwhether miracle, vision ou mythe, l'événement a déjà façonné le cœur de ceux qui en ont été témoins - et la vie de ceux qui doivent maintenant décider ce que cela signifie."
 pius.105.g: "Un signe pour les fidèles."
 pius.105.h: "Supprimer l'hystérie."
 pius.111.t: "La procession non invitée"
 pius.111.d: "Malgré les ordres officiels interdisant les expositions publiques, une foule des fidèles a commencé une procession spontanée envers le site de l'apparition mariale au [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName]."
 pius.111.f: "«Nous n'avons allumé aucune torche, nous n'avons porté aucune bannière. Seuls les chapelets, le silence et nos pieds dans la poussière. '\ N \ nthey est venu à l'aube, en deux et trois, marchant dans les champs et les hameaux, chuchotant des prières. À midi, ils étaient des centaines, en streaming le long des routes de campagne, des pieds nus, certains pleurant. Les femmes tenaient des fleurs. Les vieillards murmuraient des litanies. Les enfants serrés des icônes sculptés du bois. \ Ns les autorités avaient déclaré que le site fermé. Les soldats ont regardé. Pourtant, personne n'a arrêté la foule. C'était peut-être le chant. Peut-être le silence. Peut-être quelque chose d'invisible. \ Nas les fidèles ont atteint la place de la vision, ils se sont agenouillés, murmuraient des prières et ont allumé des bougies dans le sol. Aucune voix ne tonna du ciel. Aucun miracle n'a été observé. Mais quelque chose avait déjà changé. Un peuple avait agi - non pas au mépris du droit, mais dans l'obéissance à quelque chose de plus âgé que le droit."
 pius.111.g: "Laissez-les prier."
 pius.111.h: "Observez tranquillement."
 pius.111.i: "Disperser par la force."
 pius.112.t: "Sang sur le sol saint"
 pius.112.d: "Une confrontation entre les autorités et les fidèles sur le site de la procession mariale interdite est devenue violente. Le sol où les visions ont autrefois inspiré l'espoir porte maintenant la tache de sang."
 pius.112.f: "«Il y avait des prières, puis il y a eu des cris.» \ N \ n les bougies étaient toujours à la fois scintillantes lorsque les soldats sont arrivés. Des voix ont augmenté de confusion, puis en plaidant. Une femme est tombée. Un garçon a crié. Personne ne sait qui a donné l'ordre - mais les mousquets aboyaient, les bâtons se balançaient, les bottes se déplaçaient à travers l'encens et le sol. Lorsque le silence est revenu, il était plus lourd qu'auparavant. \ NL'ÉGLISE EST BRESSION. Les fidèles sont indignés. La presse parle dans des tons étouffés - certains l'appellent un accident, d'autres un massacre. Le site, une fois chuchoté pour être saint, est maintenant maudit par la mémoire. Et toujours les gens se rassemblent - pas avec des fleurs, mais avec de la colère, avec un silence, avec un regard, aucune loi ne peut éteindre."
 pius.112.g: "Nous regrettons ce qui s'est passé."
 pius.112.h: "Ils ont apporté cela sur eux-mêmes."
 pius.113.t: "La voix dans la chaire"
 pius.113.d: "Un prêtre local a augmenté comme le premier défenseur de la Marian Apparition à [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName]. Ses sermons attirent des foules, ses paroles inspirent l'espoir - et défient l'autorité de l'État. Son nom est Père [SCOPE.sCharacter('pius_marian_priest_scope').GetFirstName]."
 pius.113.f: "«Elle est apparue aux humbles, pas aux puissants. Et c'est peut-être pourquoi ils souhaitent la faire taire. '\ N \ Nin l'église en pierre au-dessus du village, un prêtre nommé père [SCOPE.sCharacter('pius_marian_priest_scope').GetFirstName] a commencé à prêcher - non seulement de la miséricorde de la Vierge, mais de sa justice. Ses paroles résonnent au-delà de la nef: «Si le ciel a parlé ici, alors aucun gouvernement ne peut interdire son écho.» \ Npilgrims affluer vers ses sermons. Son nom se propage dans les chuchotements et dans les hymnes. Il exhorte la paix, mais sa présence galvanise les troubles. Certains l'appellent un prophète. D'autres, un rebelle en robes. \ Les nauthorités deviennent mal à l'aise. L'armée parle d'incitation. La hiérarchie de l'église hésite - déchirée entre le dogme et la diplomatie. Une proposition silencieuse arrive sur votre bureau: il pourrait être supprimé. Tranquillement. Discrètement. \ Nbut certains hommes, lorsqu'ils sont réduits au silence, parlent encore plus fort."
 pius.113.g: "Laissez-le prêcher."
 pius.113.h: "Le convoque à la capitale pour négociation."
 pius.113.i: "Faites-le disparaître."
 pius.114.t: "La procession qui a secoué la nation"
 pius.114.d: "Partout au pays, les croyants catholiques ont commencé des manifestations publiques à l'appui de l'apparition mariale. Ce qui a commencé comme un pèlerinage rural est devenu un mouvement national."
 pius.114.f: "«Ils ont marché avec des chapelets dans leurs mains, leurs enfants sur leurs épaules et le nom de la vierge sur leurs lèvres. Aucune bannière n'est pilotée - seules des statues, des icônes et un seul nom murmuraient encore et encore: Maria. Ce qui a commencé comme dévotion est devenu le défi. \ Nin Réponse à la violence sur le site sacré de [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName] Les fidèles ont descendu dans les rues. Ils ne crient pas. Ils prient. Mais leur nombre augmente quotidiennement. \ Nsom dans le gouvernement de la tolérance à la tolérance. D'autres exigent des répressions. L'armée est agitée. Et dans les maisons de l'autre côté du pays, même la merveille douteuse: si beaucoup le croient, cela peut-il encore être un mensonge?"
 pius.114.g: "Permettre le cortège national."
 pius.114.h: "Interdire la procession nationale."
 pius.115.t: "Les champs sont vides"
 pius.115.d: "Une grave défaillance des cultures a frappé plusieurs régions rurales de [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName]. Parmi les fidèles, un chuchotement dangereux commence à se propager: que la Vierge, une fois silencieuse par l'État, pleure maintenant - et punit."
 pius.115.f: "«Elle a demandé des prières. Nous lui avons donné des soldats. '\ N \ nthe Rains a échoué. Le blé jaunit trop tôt. Les pommes de terre pourries sous la terre, invisibles et amères. Les villageois parlent de champs qui se sentent ... abandonnés. Pas seulement par les hommes, mais par la miséricorde. \ Nand alors ils chuchotaient. De la femme à la lumière qui est apparue autrefois - et s'est moquée. Du prêtre qui a disparu. Du sanctuaire scellé et des pèlerins battus. Maintenant, disent-ils, elle a détourné son visage. \ Ncandles brûle à nouveau, mais maintenant derrière des fenêtres fermées. Les mères baptisent les enfants en secret. Les vieillards enterrent des croûtes de pain comme offrandes. L'église n'ose pas parler, mais les gens croient déjà: c'est sa douleur. Ou son avertissement."
 pius.115.g: "Superstition! J'espère..."
 pius.116.t: "Le silence au-delà de la cloche"
 pius.116.d: "Après des années de répression et nié des miracles, de nombreux citoyens autrefois dévoués ont commencé à abandonner leur foi en [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName]. Un nombre croissant se décrivent désormais non pas comme catholique - mais comme rien du tout."
 pius.116.f: "«Elle ne vient plus. Pas dans les rêves, pas dans les visions. Les bougies ne sont pas éminées. '\ N \ n le sanctuaire est fermé. Le prêtre est parti. Les champs sont silencieux. \ Nothere était une époque où même les plus pauvres, avenue chuchotée Marias avant de dormir, où les icônes pendaient à côté des foyers et que les larmes sont tombées sur le son des cloches. Maintenant, les églises sont vides. Les enfants demandent ce qu'était la «confession». Les jeunes parlent de la raison, du progrès, de rien. \ Ns les gens ne se sont pas tournés vers l'idéologie. Ils se sont tournés vers Ash. Ce ne sont pas des radicaux. Ils sont épuisés. Et quelque part dans le silence creux, la question persiste: \ ndid elle nous quitte - ou l'avons-nous quitté?"
 pius.116.g: "L'âge de la foi est passé."
 pius.119.t: "Fermeture du sanctuaire"
 pius.119.d: "Le gouvernement athée nouvellement établi a ordonné la fermeture du site de pèlerinage Marian. Ce qui était autrefois un lieu de lumière et de prière est maintenant bouclé, silencieux sous la montre d'État."
 pius.119.f: "«Aucune cloche n'a sonné. Aucune bougie brûlé. Les portes étaient verrouillées avant le lever du soleil. '\ N \ n le sanctuaire qui a autrefois attiré des milliers de personnes se tient désormais seule. Un avis a été cloué à la porte de la chapelle: \"Par ordre de l'assemblée des gens, cette structure est déclarée non essentielle.\" Les gardes se lèvent, non pour protéger, mais pour empêcher. \ Nno La force a été utilisée. Aucune protestation autorisée. Le changement est venu tranquillement, bureaucratiquement - une absence plutôt qu'une explosion. Pourtant, dans des maisons à travers le pays, les mains plus anciennes tremblent. Les grands-mères cachent leurs chapelets. Les enfants demandent pourquoi les pèlerins ne chantent plus. \ N le clergé est silencieux. Le parti parle de science, de raison et de progrès. Et quelque part derrière les portes verrouillées, une question scintille comme une bougie à moitié dépensée: était-ce vraiment nécessaire?"
 pius.119.g: "Nous ne construisons plus de monuments en illusions."
 pius.121.t: "Que veut-elle dire?"
 pius.121.d: "L'apparition mariale au [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName] a été officiellement reconnue comme un signe positif. Mais même maintenant, sa vraie signification reste ouverte à l'interprétation."
 pius.121.f: "Au cours des semaines qui ont suivi le chiffre radiant aux villageois, aucun autre signe n'a suivi. Pas de feu du ciel. Pas de voix dans les nuages. Seuls ciel calme, et l'écho persistant de l'émerveillement. \ Nyet le peuple parle - de paix, de guérison, de quelque chose qui s'est déplacé dans l'âme de la nation. Les pèlerins ne viennent pas dans la frénésie, mais dans le respect. Le clergé prêche doucement. La presse, pour une fois, des rapports sans moquerie: que signifie ce miracle?"
 pius.121.g: "Une bénédiction pour les gens du commun."
 pius.121.h: "Un signe divin à notre clergé."
 pius.121.i: "Une indication de la légitimité de notre gouvernement."
 pius.122.t: "Le sanctuaire de [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName]"
 pius.122.d: "Le site de l'apparition Marian est maintenant devenu un lieu de pèlerinage pleinement reconnu, attirant les fidèles de près et de loin en nombre croissant."
 pius.122.f: "«Où une fois qu'il n'y avait que des pâturages, maintenant des bougies, des roses et des pas silencieux de milliers. Les champs ont été effacés. Une chapelle modeste s'élève près de l'endroit où les enfants parlaient autrefois d'une dame vêtue de lumière. Chaque jour, les pèlerins arrivent: les agriculteurs avec leurs fils, les veuves en noir, les soldats en congé, les mères chuchotant des prières pour leur naissance. Un sanctuaire est en cours de construction. Les marchés fleurissent sur ses bords, offrant du pain, des médailles, des chapelets, du vin. Qu'est-ce qui était autrefois une histoire doutée dans les salons est maintenant une présence ressentie dans les os de la nation. \ Nand comme les cloches annulantes dans la vallée, on se demande: cette foi renaissait-elle - ou une graine de quelque chose de plus grand encore à venir?"
 pius.122.g: "TOTUS TUUS."