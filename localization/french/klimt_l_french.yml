 klimt.20.g: "Passe une bonne journée." #NT!
  
 klimt.30.t: "Une bouffée d'air frais pour l'art" #NT!
 klimt.30.d: "[SCOPE.sState('klimt_secession_state').GetCityHubName] est devenu le centre d'un mouvement artistique international exceptionnel profondément lié à Art Nouveau. Le cercle artistique se décrit comme la «sécession [SCOPE.sState('klimt_secession_state').GetCityHubName]»." #NT!
 klimt.30.f: "La sécession de Vienne est un mouvement artistique, étroitement lié à Art Nouveau, qui a été formé en 1897 par un groupe de peintres autrichiens, de graphistes, de sculpteurs et d'architectes, dont Josef Hoffman, Koloman Moser, Otto Wagner et Gustav Klimt. Ils ont démissionné de l'Association des artistes autrichiens pour protester contre son soutien aux styles artistiques plus traditionnels. Leur travail architectural le plus influent était le bâtiment de sécession conçu par Joseph Maria Olbrich comme lieu pour les expositions du groupe. Leur magazine officiel s'appelait Ver Sacrum (Sacred Spring, en latin), qui a publié des œuvres très stylisées et influentes d'art graphique. En 1905, le groupe lui-même s'est séparé, lorsque certains des membres les plus éminents, dont Klimt, Wagner et Hoffmann, ont démissionné dans un différend sur les priorités, mais il a continué à fonctionner et fonctionne toujours aujourd'hui, depuis son siège social dans le bâtiment de la sécession. Dans sa forme actuelle, la galerie d'exposition de sécession est dirigée indépendamment et gérée par des artistes." #NT!
 klimt.30.g: "Ce baiser pour le monde entier!" #NT!
 klimt.30.h: "Klimt? Vous voulez dire Gustav Klimt?" #NT!
 klimt.30_tt: "Déclenche l'événement #white #b la première sécession#!#!" #NT!
  
 klimt.40.t: "Vernissage" #NT!
 klimt.40.d: "L'exposition dans [SCOPE.sState('klimt_vernissage_state').GetCityHubName] a été entièrement dédiée aux œuvres de [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName]. L'événement est considéré comme l'un des points forts culturels de l'année et lui a été acclamé par la critique. Pour notre pays, c'est la confirmation que nous sommes une nation culturelle de premier plan." #NT!
 klimt.40.f: "«Qu'est-ce que je suis aux yeux de la plupart des gens - une non-entité, une personne excentrique ou désagréable - quelqu'un qui n'a pas de position dans la société et n'aura jamais; En bref, le plus bas des bas. Très bien, alors - même si c'était absolument vrai, alors je devrais un jour montrer par mon travail ce qu'un tel excentrique, un tel personne, a dans son cœur. \ Nthat est mon ambition, basée moins sur le ressentiment que sur l'amour malgré tout, basé davantage sur un sentiment de sérénité que sur la passion. Je vois des peintures ou des dessins dans les chalets les plus pauvres, dans les coins les plus sales. Et mon esprit est poussé vers ces choses avec un élan irrésistible. -Vincent van Gogh" #NT!
 klimt.40.g: "Comment était le buffet?" #NT!
  
 klimt.101.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_classicism')]" #NT!
 klimt.101.d: "À son Vernissage, Maestro [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName] a présenté [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetHerHis] la dernière peinture au public: «[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_classicism')]» est une œuvre typique du classicisme et est déjà considérée comme significative dans ce genre." #NT!
 klimt.101.f: "Le nouveau travail de [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetLastName] a immédiatement attiré l'attention des experts en art. En particulier, les universitaires les plus conservateurs aimaient les formes esthétiques et l'équilibre des lignes et des couleurs. L'intégrité morale et la sublimité de l'œuvre d'art ont été particulièrement soulignées. L'image est déjà considérée comme un excellent patrimoine culturel de notre nation et devrait être la parure de toute galerie." #NT!
 klimt.101.g: "Cela appartient à une ... galerie!" #NT!
 klimt.102.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_romanticism')]" #NT!
 klimt.102.d: "Le peintre national [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName] a présenté le travail [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetHerHis] au public avec quelques invités. La sensualité et la puissance des couleurs font une impression sur le public. La peinture est déjà considérée comme une œuvre clé du romantisme." #NT!
 klimt.102.f: "«[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_romanticism')]» a déjà eu un fort impact sur certains visiteurs le premier soir. L'esprit derrière le chef-d'œuvre est clairement perceptible. Les critiques se sont plaints que les contours étaient flous à certains endroits, d'autres ont vu la force du sujet dans ce manque de clarté combinée à la richesse de la couleur. Avec cette peinture, [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetLastName] a certainement obtenu une entrée dans les livres de l'histoire de l'art." #NT!
 klimt.103.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_realism')]" #NT!
 klimt.103.d: "Lors d'une soirée, [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName] a profité de l'occasion de montrer une nouvelle peinture qui peut clairement être affectée au réalisme. Certains experts en art présents ont salué l'œuvre." #NT!
 klimt.103.f: "Certains invités présents avaient craint une surprise plus provocante, mais «[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_realism')]» s'est avéré être une représentation très sobre. À première vue, certains invités l'ont confondu en tant que peinture de genre. Mais plus ceux présents ont regardé la représentation d'une scène quotidienne, plus l'idée subtile et inflammatoire derrière elle et les problèmes sociaux auxquels l'auteur faisait allusion est devenu clair. [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetLastName] peut avoir aliéné quelques membres de la société du soir avec l'approche socialement critique, mais l'opinion écrasante est qu'un tel trésor d'art appartient à une exposition digne au niveau national." #NT!
 klimt.104.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_impressionism')]" #NT!
 klimt.104.d: "Lors d'une grande exposition d'art par des représentants de haut rang de la National Painting Society, [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName] a présenté une œuvre qui, bien qu'elle a attiré une attention considérable, a également attiré le ridicule de certains critiques. Cependant, une offre à prix élevé d'un marchand d'art étranger l'a soudainement rendu très populaire." #NT!
 klimt.104.f: "Les opinions ont été divisées lorsque «[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_impressionism')]» a été présentée. Certains ont trouvé l'idylle presque naïve et sans aspirations politiques ou sociales, d'autres ont critiqué le manque de forme et de lignes. Quelqu'un s'est moqué que le paysage dissolvant était probablement dû au cerveau dissolvant de l'auteur. Les partisans ne pouvaient pas prévaloir jusqu'à ce qu'un concessionnaire d'art de [SCOPE.sCountry('klimt_art_dealer_country').GetName] ait particulièrement souligné la qualité et l'esprit innovant du chef-d'œuvre. Il a été immédiatement prêt à payer un prix écrasant pour la peinture et à le ramener dans son pays. Après cet épisode, l'intérêt pour l'image a augmenté davantage, qui a été immédiatement déclaré patrimoine culturel national. [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetLastName] peut être plus qu'heureux à ce sujet." #NT!
 klimt.105.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_expressionism')]" #NT!
 klimt.105.d: "La dernière image de [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName] a suscité l'horreur, la haine, la colère et le dégoût parmi les publics et les critiques. En d'autres termes: ce fut un succès sensationnel!" #NT!
 klimt.105.f: "«Qu'est-ce que cela signifie même:« [SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_expressionism')] »? Quel est le point? Quelles sont ces couleurs d'un livre de coloriage de la maternelle? Ces personnages bruts? Ces scènes délicieuses? Vous appelez cet art? ART?! Toi charlatan! Si vous crachez sur l'image, ce serait plus d'art qu'il ne l'est maintenant! '\ N \ nand C'était l'un des commentaires les plus positifs lors de la présentation. [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetLastName] a ainsi provoqué un scandale historique qui ne fait qu'augmenter l'importance de l'image." #NT!
 klimt.106.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_art_nouveau')]" #NT!
 klimt.106.d: "Après la publication de sa nouvelle œuvre '[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_art_nouveau')]' ', [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName] est considérée comme l'un des artistes les plus importants de la scène internationale. Il a ravi les traditionalistes et l'avant-garde." #NT!
 klimt.106.f: "«Qu'est-ce que c'est, art nouveau? L'art ne peut jamais être nouveau. -Alphonse Mucha" #NT!
  
 klimt.110.t: "Une commande discrète" #NT!
 klimt.110.d: "Un marchand d'art et d'antiquités expérimenté a proposé de se procurer un chef-d'œuvre rare à l'étranger. Une discrétion extrême est nécessaire dans cette affaire - le concessionnaire achète également des concurrents et même des adversaires de guerre. [SCOPE.sCharacter('klimt_art_dealer').GetFullName] a assuré qu'il remplira tranquillement sa commande - en supposant un bon salaire et quelques peintures en retour." #NT!
 klimt.110.f: "Afin d'acheter une peinture étrangère, un marchand d'art à l'étranger doit faire une offre appropriée. Cela comprend non seulement de l'argent, mais aussi de quelques peintures en retour - ce qui endommagera notre [concept_klimt_painting_tradition]. Un marchand d'art ne peut acheter des chefs-d'œuvre que dans des pays qui ont plus d'une peinture du même style - ils ne vendront pas une pièce unique. De même, une nation ne peut pas acheter plus d'un chef-d'œuvre d'un style à l'étranger. Il faudra environ six mois pour que l'accord soit conclu et pour que le tableau arrive dans notre galerie nationale." #NT!
 klimt.110.g: "Obtenez un chef-d'œuvre du classicisme." #NT!
 klimt.110.h: "Obtenez un chef-d'œuvre du romantisme." #NT!
 klimt.110.i: "Obtenir un chef-d'œuvre du réalisme." #NT!
 klimt.110.j: "Obtenir un chef-d'œuvre de l'impressionnisme." #NT!
 klimt.110.k: "Obtenir un chef-d'œuvre de l'expressionnisme." #NT!
 klimt.110.l: "Obtenez un chef-d'œuvre d'art Nouveau." #NT!
  
 klimt.111.t: "Un chef-d'œuvre du classicisme" #NT!
 klimt.111.d: "«[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_classicism')]» est arrivé aujourd'hui en tant que nouveau chef-d'œuvre à la National Gallery. Le gouvernement était très satisfait de la pièce. Le marchand d'art voit son travail comme fait." #NT!
 klimt.111.f: "Les grandes attentes n'ont pas été déçues. '[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_classicism')]' répond exactement aux exigences et devrait être un excellent ajout à la collection d'images de [GetPlayer.GetNameNoFlag]. La presse commerciale convient également que cet achat valait chaque centime dépensé. Une exposition est prévue pour le mois prochain qui se concentrera sur ce summum du classicisme." #NT!
 klimt.111.g: "Un autre trésor d'art pour notre collection!" #NT!
 klimt.112.t: "Un chef-d'œuvre du romantisme" #NT!
 klimt.112.d: "Certains spectateurs se sont réunis à la National Gallery aujourd'hui. Des représentants de la presse locale et nationale assistaient également à l'endroit depuis les premières heures du matin. Le mot a déjà contourné que «[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_romanticism')]», un chef-d'œuvre romantique, est sur le point d'arriver dans la collection d'images." #NT!
 klimt.112.f: "Il y a déjà eu des rumeurs sur «[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_romanticism')]». Ce devrait être une peinture colorée qui stimule les sens. Aucune autre information n'est connue sur le sujet. Le concessionnaire d'art inconnu, qui pourrait fournir plus d'informations, serait parti à l'étranger avec une grande partie de l'argent et a fait des plans pour sa retraite. Il n'était plus disponible pour des entretiens." #NT!
 klimt.113.t: "Un chef-d'œuvre du réalisme" #NT!
 klimt.113.d: "Le nouveau chef-d'œuvre «[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_realism')]» a été présenté au public lors d'une cérémonie aujourd'hui dans le cadre d'une exposition spéciale. La pièce appartient au genre du réalisme et est considérée comme l'une des peintures clés de cette époque d'art. La foule était en conséquence grande. Les billets pour l'événement ont été complètement vendus des semaines auparavant." #NT!
 klimt.113.f: "«C'est à la fois un grand honneur et un plaisir pour moi, en tant que directeur de la National Gallery, de pouvoir vous présenter aujourd'hui le nouveau chef-d'œuvre qui enrichira notre collection d'images d'aujourd'hui. Comme vous le savez, nous travaillons depuis longtemps pour pouvoir appeler le nôtre un travail clé de réalisme. «[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_realism')]» est exactement cela. Je n'ai pas besoin de dire grand-chose sur le peintre, vous le connaissez tous. Avec sa représentation sobre et sa pertinence quotidienne, il a été initialement mal compris par les critiques comme peinture de genre ou sans spiritueux. Mais en réalité, son contenu est profond. Notez les détails de la coloration qui donnent l'impression que ... '" #NT!
 klimt.114.t: "Un chef-d'œuvre de l'impressionnisme" #NT!
 klimt.114.d: "Le marchand d'art a rempli sa mission aujourd'hui et a livré «[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_impressionism')]» aux responsables à la National Gallery pour une lourde récompense. Le processus s'est bien passé. Le directeur a également commenté positivement l'achat, mais s'est plaint que les couleurs étaient un peu floues." #NT!
 klimt.114.f: "«Je suis très déprimé et profondément dégoûté de la peinture. C'est vraiment une torture continue. -Claude Monet" #NT!
 klimt.115.t: "Un chef-d'œuvre de l'expressionnisme" #NT!
 klimt.115.d: "'[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_expressionism')]', le chef-d'œuvre de l'étranger acheté par un marchand d'art de confiance, est enfin arrivé au [GetPlayer.GetNameNoFlag]. Cependant, on ne peut pas parler d'approbation indivise. Le concessionnaire d'art est également parti après avoir payé et ne peut être trouvé." #NT!
 klimt.115.f: "Après l'arrivée de «[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_expressionism')]», certains connaisseurs d'art ont exprimé leur surprise, sinon la critique. La composition inhabituelle a donné l'impression qu'il ne pouvait guère être l'œuvre d'un artiste renommé. Le nom inhabituel, qui n'avait pas grand-chose à voir avec le Daubing, a également suscité un soupçon quant à savoir s'ils avaient peut-être rencontré un charlatan qui avait eu une blague. Le fait qu'un autographe authentique ait été trouvé sur l'image a aggravé les choses plutôt que mieux. Soyez prêt à de fortes réactions du public." #NT!
 klimt.116.t: "Un chef-d'œuvre d'art nouveau" #NT!
 klimt.116.d: "Le directeur de la National Gallery a été soulagé de découvrir aujourd'hui que le chef-d'œuvre était arrivé d'outre-mer. [SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_art_nouveau')] est un bonbon pour les yeux." #NT!
 klimt.116.f: "Lorsque [SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_art_nouveau')] a finalement été sorti de la boîte, il a immédiatement capturé le cœur de ceux présents comme un nouveau tigre dans un zoo. Ou un nouvel artefact majeur dans un musée. Ou une planète nouvellement trouvée dans un observatoire. Ou le nouveau chef-d'œuvre musical d'un compositeur. Ou un squelette remonté d'un paléontologue. Ou les restes trouvés d'un ancêtre humain. Ou ..." #NT!
 klimt.116.g: "Ou une victoire au trophée Schneider?" #NT!
  
 klimt.301.t: "Le [SCOPE.sState('klimt_art_capital').GetCityHubName]" #NT!
 klimt.301.d: "L'élite de notre pays amoureux de l'art fait pression pour un prix d'artiste pour les meilleures peintures." #NT!
 klimt.301.f: "Les nations qui ont une galerie organisent parfois des concours artistiques. Les cinq peintres les plus qualifiés reçoivent un prix qui a un fort impact sur leur réputation. Un prix d'art est généralement attribué tous les cinq ans. Les grands peintres ne sont pas invités - ils ont déjà reçu leur récompense." #NT!
 klimt.301.g: "Nous devons organiser un concours d'art." #NT!
 klimt.301.h: "Quel gaspillage d'argent!" #NT!
 klimt.302.t: "Le [SCOPE.sState('klimt_art_capital').GetCityHubName]" #NT!
 klimt.302.d: "Le jury est arrivé à une conclusion et a sélectionné les meilleures peintures. La liste des cinq gagnants fait déjà le tour." #NT!
 klimt.302.f: "1. [SCOPE.sCharacter('klimt_character_first_winner_scope').GetFullName] de [GetGlobalVariable('klimt_prize_winner_1_global_var').GetCountry.GetName] \ n2.   [SCOPE.sCharacter('klimt_character_second_winner_scope').GetFullName] de [GetGlobalVariable('klimt_prize_winner_2_global_var').GetCountry.GetName] \ n3.   [SCOPE.sCharacter('klimt_character_third_winner_scope').GetFullName] de [GetGlobalVariable('klimt_prize_winner_3_global_var').GetCountry.GetName] \ n4.   [SCOPE.sCharacter('klimt_character_fourth_winner_scope').GetFullName] de [GetGlobalVariable('klimt_prize_winner_4_global_var').GetCountry.GetName] \ n5.   [SCOPE.sCharacter('klimt_character_fifth_winner_scope').GetFullName] de [GetGlobalVariable('klimt_prize_winner_5_global_var').GetCountry.GetName]" #NT!
 klimt.302.g: "None" #NT!
  
 klimt.401.t: "Destination de voyage du peintre" #NT!
 klimt.401.d: "[GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName] a déjà emballé les choses [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetHerHis]. Quelle école d'art devrait étudier [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetSheHe]?" #NT!
 klimt.401.f: "Un [concept_klimt_painter] qui poursuit son éducation lors d'un voyage d'art ne générera pas [concept_klimt_painting_tradition] en son absence. [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetSheHe] ne peut étudier que des styles d'art qui lui sont auparavant inconnus. En règle générale, un tel voyage dure un an, mais il peut y avoir des obstacles ou des opportunités qui prolongent le séjour." #NT!
 klimt.401.g: "Classicisme." #NT!
 klimt.401.h: "Romantisme." #NT!
 klimt.401.i: "Réalisme." #NT!
 klimt.401.j: "Impressionnisme." #NT!
 klimt.401.k: "Expressionnisme." #NT!
 klimt.401.l: "Art Nouveau." #NT!
 klimt.401.m: "Pas grave." #NT!
 klimt.402.t: "Arrivée en [SCOPE.sState('klimt_center_of_art_scope').GetCityHubName]" #NT!
 klimt.402.d: "Bonnes nouvelles! [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName] est arrivé en [SCOPE.sState('klimt_center_of_art_scope').GetCityHubName]. [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetSheHe] est toujours à la recherche d'une pièce libre et commencera ses études bientôt." #NT!
 klimt.402.f: ""
 klimt.402.g: "Ah ... [SCOPE.sState('klimt_center_of_art_scope').GetCityHubName]" #NT!
 klimt.403.t: "[GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetLastName] revient de Painter Trip" #NT!
  
 klimt.403.f: "«L'art n'est que de l'art où c'est une fin en soi, où il est absolument libre, laissé à lui-même, où il ne connaît pas de lois plus élevées que les siennes, les lois de la vérité et de la beauté. -Ludwig Feuerbach" #NT!
 klimt.403.g: "Et tout le voyage n'était pas seulement pour le plaisir?" #NT!
  
 klimt.411.t: "D'autres peintres entre eux" #NT!
 klimt.411.d: "[GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName] a rencontré un collègue peintre de [SCOPE.sCharacter('klimt_fellow_painter').GetHomeCountry.GetName] lors de son voyage d'étude. Les deux se reconnaissent comme des collègues égaux. [SCOPE.sCharacter('klimt_fellow_painter').GetFullName] semble être un esprit doué et sociable." #NT!
 klimt.411.f: "Si par hasard, plusieurs nations ont envoyé un peintre lors d'un voyage d'étude en même temps, il est possible qu'ils se réuniront et qu'il y aura des effets synergiques positifs. Les rivalités et les inimities peuvent alors disparaître rapidement dans l'intérêt de l'enthousiasme partagé pour l'art." #NT!
 klimt.411.g: "Ils devraient échanger leurs connaissances artistiques." #NT!
 klimt.411.h: "Ils peuvent certainement apprendre des techniques de l'autre." #NT!
 klimt.411.i: "La connaissance sera utile dans le monde de l'art pour se soutenir mutuellement." #NT!
  
 klimt.421.t: "Sur les traces des géants" #NT!
 klimt.421.d: "Notre peintre a écrit dans son lieu d'étude que [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetSheHe] prévoit déjà son avenir dans des visions glorieuses. Ce dont [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetSheHe] a besoin, cependant, c'est plus de temps et plus d'argent." #NT!
 klimt.421.f: "À Rome, [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName] est confronté à certains des peintres les plus importants de l'histoire de l'art ainsi qu'aux restes de l'architecture romaine. Maintes et maintes fois, les voyageurs de Rome ont développé une relation spéciale avec cette ville et son histoire. Le désir de suivre les traces des classiques a déplacé de nombreux artistes. L'ambition de [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetLastName] devient un jour devenu un artiste aussi grand que l'une des idoles [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetHerHis]. Cela peut se limiter à la mégalomanie, mais surtout, il faudra du temps, de la patience - et d'autres études, comme l'a dit [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetSheHe] dans une lettre." #NT!
 klimt.421.g: "[GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetLastName] devrait prendre son temps et imiter Michel-Ange et Raphaël." #NT!
 klimt.421.h: "[GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetLastName] devrait peindre, pas la rêverie!" #NT!
 klimt.422.t: "Esprit des romantiques" #NT!
 klimt.422.d: "[GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName] n'a pas écrit de Bamberg depuis des jours. Apparemment, [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetSheHe] se livre à la rêverie." #NT!
 klimt.422.f: "Bamberg n'est pas seulement un endroit pittoresque avec de nombreuses maisons à pointe et un riche héritage baroque qui vous invite à s'attarder romantiquement. Il y a quelque chose dans cette ville qui l'a rendu incroyablement attrayant pour les romantiques. Ludwig Tieck et Heinrich Wackenroder étaient des romantiques importants qui venaient en fait de Berlin, mais sur lesquels Franconian a quitté leur marque. Eux aussi étaient moins intéressés par leurs études et plus intéressés par le pays, ses habitants et le riche héritage des villes de la région. E. T. A. Hoffmann, un autre romantique de Prusse, a connu sa percée littéraire pendant son séjour de cinq ans à Bamberg. Quel était son voyage en Italie pour Goethe, cette partie de l'Allemagne était pour les jeunes romantiques. Dans le paysage culturel, ils ont non seulement trouvé un lien avec les moyen-âges allemands idéalisés, mais aussi aux peintures d'Albrecht Dürer à Nuremberg et au catholicisme, dont la spiritualité faisait plus appel aux romantiques que sur le protestantisme sécularisé." #NT!
 klimt.422.g: "La vie d'un bon à rien ..." #NT!
 klimt.423.t: "Conversion" #NT!
 klimt.423.d: "En fait, [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName] n'a pas eu beaucoup de relation avec la foi jusqu'à présent. Cependant, le fort catholicisme auquel il a été confronté, à la fois dans l'art et dans la vie quotidienne, a déclenché quelque chose dans [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetHerHim]. De plus en plus [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetSheHe] sent une connexion que [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetSheHe] n'aurait jamais pensé possible jusque-là. Inspiré par cela, [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetSheHe] peint [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetHerHis] Première image religieuse." #NT!
 klimt.423.f: "«Voir Bamberg et devenir catholique» était une devise parmi les romantiques allemands. En fait, le romantisme allemand a été l'une des rares époques influencée plus par les penseurs catholiques que les penseurs protestants, dont de nombreux convertis. De la même manière, Rome a également amené les sceptiques dans le giron de l'église. Cela peut être surprenant à un âge matérialiste dans lequel le progrès et la science ont joué un rôle de premier plan dans la société, mais c'est précisément la nécessité d'une contre-réponse qui a finalement conduit un hédoniste au monastère." #NT!
 klimt.423.g: "J'espère que ce n'est pas une image ringarde de la Madonna." #NT!
 klimt.423.tt: "[GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName] perd tous les traits addictifs négatifs et convertit en #YELLOW catholicisme#! si [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetSheHe] n'est pas encore catholique." #NT!
 klimt.424.t: "Souci du détail" #NT!
 klimt.424.d: "[GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName] Trouvé dans [SCOPE.sState('klimt_center_of_art_scope').GetCityHubName] un maître du réalisme qui l'aiderait à améliorer la technique de peinture [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetHerHis]. Cependant, cela prendra des mois - et les frais sont lourds." #NT!
 klimt.424.f: "«La peinture est un art essentiellement concret et ne peut être constituée que de la représentation de choses réelles et existantes.» -Gustave Coubert" #NT!
 klimt.424.g: "Cela peut prendre un certain temps, mais cela en vaut la peine." #NT!
 klimt.424.h: "[GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetLastName] devrait plutôt se concentrer sur la reconnaissance du maître." #NT!
 klimt.425.t: "Inspiration sans limites" #NT!
 klimt.425.f: ""Depuis l'apparition de l'impressionnisme, les salons officiels, qui étaient auparavant, sont devenus bleus, verts et rouges ... mais la menthe poivrée ou le chocolat, ce sont toujours des confiseries." -Claude Monet" #NT!
 klimt.425.g: "Ces nouvelles idées l'inspireront à créer de nombreuses peintures." #NT!
 klimt.425.h: "Ces nouvelles idées devraient inspirer notre culture à la maison." #NT!
 klimt.426.t: "La vie d'un artiste" #NT!
 klimt.426.d: "La vie sophistiquée dans [SCOPE.sState('klimt_center_of_art_scope').GetCityHubName] a également laissé sa marque sur [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName]. [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetSheHe|U] traîne souvent dans les bars et les pubs - et utilise des stimulants pour augmenter le pouvoir créatif [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetHerHis]. Sans une ou deux intoxications, [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetSheHe] ne serait guère en mesure de terminer sa charge de travail en si peu de temps." #NT!
 klimt.426.f: ""Après le premier verre, vous voyez les choses comme vous le souhaitez. \ Nafter la seconde, vous voyez les choses comme elles ne le sont pas. \ Nfinalement, vous voyez les choses comme elles sont vraiment, \ nhhich est la chose la plus horrible au monde." -Oscar Wilde" #NT!
 klimt.426.g: "Si cela inspire son art - où est le problème?" #NT!
 klimt.426.h: "Ensuite, cela prend plus de temps." #NT!
 klimt.427.t: "Vice d'un artiste" #NT!
 klimt.427.d: "Nous recevons des rapports inquiétants de [SCOPE.sState('klimt_center_of_art_scope').GetCityHubName]. Les dépendances de [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName] atteignent des proportions effrayantes. Apparemment, il utilise son absence pour se livrer aux vices et à la débauche, ce qui a mis une pression importante sur sa santé." #NT!
 klimt.427.f: "Camille Pissarro, Henri de Toulouse-Lautrec, Paul Gauguin, Oscar Wilde et Charles Baudelaire - ils ont tous été victimes de l'intoxication à l'absinthe. Il en va de même pour Vincent Van Gogh. Gabriele D'Annunzio, en revanche, cherchait des aventures érotiques. Jean Cocteau a découvert l'opium pour lui-même et a écrit un journal sur son utilisation et ses effets. Le fait que, dans de nombreux cas, ces dépendances et vices ont conduit à l'autodestruction et à la mort prématurée est l'un des épisodes tragiques de la vie des artistes." #NT!
 klimt.427.g: "Chaque artiste a un vice." #NT!
 klimt.427.h: "Nous devons intervenir!" #NT!
 klimt.427.tt: "Le voyage éducatif est annulé. [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName] est placé en garde à vue par nos agents en [SCOPE.sState('klimt_center_of_art_scope').GetCityHubName] et ramené à [GetPlayer.GetName]. Il y sera mis en cure de désintoxication pour les six prochains mois." #NT!
 klimt.428.t: "[GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetLastName] est à nouveau disponible" #NT!
 klimt.428.d: "Après une pause de plusieurs mois, notre peintre est retourné dans son entreprise de jour habituelle. [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName] n'a pas renoncé à son style de vie, mais au moins quelque chose de pire pourrait être empêché." #NT!
 klimt.428.f: "«Un enlèvement? Non, non, monsieur, c'était une intervention. Un enlèvement arriverait à vos souffrances, une intervention n'est initiée que pour votre bien ... que voulez-vous dire, nous ne savons pas ce qui est le mieux pour vous?" #NT!
 klimt.428.g: "Espérons que les choses reviendront à la normale maintenant." #NT!
  
 klimt.431.t: "Veduta" #NT!
 klimt.431.d: "Inspiré par la beauté de sa ville hôte [SCOPE.sState('klimt_center_of_art_scope').GetCityHubName] Notre peintre a commencé à peindre une image magistrale de Veduta lors d'un voyage éducatif. Cependant, cela pourrait prolonger un peu son séjour." #NT!
 klimt.431.f: "Un Veduta est une peinture très détaillée et généralement à grande échelle ou, plus souvent, l'impression d'un paysage urbain ou d'une autre Vista. Les peintres de Vedute sont appelés Vedutisti. Au XIXe siècle, des «impressions» plus personnelles des paysages urbains ont remplacé le désir de précision topographique, qui a été satisfaite plutôt par des panoramas peints et photographiés plus tard. Les peintres Veduta les plus importants de cette époque incluent David Roberts et Eduard Gaertner." #NT!
 klimt.431.g: "Une idée splendide." #NT!
 klimt.431.h: "Concentrez-vous sur l'étude." #NT!
 klimt.432.t: "Cercle de peinture" #NT!
 klimt.432.d: "[GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName] a été accueilli dans le groupe d'artistes locaux de [SCOPE.sState('klimt_center_of_art_scope').GetCityHubName] comme l'un des leurs." #NT!
 klimt.432.f: "«Je dois rester seul et savoir que je suis seul pour contempler et ressentir la nature dans son intégralité; Je dois m'abandonner à ce qui m'empêche, je dois fusionner avec mes nuages ​​et mes rochers afin d'être ce que je suis. La solitude est indispensable pour mon dialogue avec la nature. -Caspar David Friedrich" #NT!
 klimt.432.g: "Nous avons besoin de la reconnaissance du monde de la peinture." #NT!
 klimt.433.t: "Compréhension rapide" #NT!
 klimt.433.d: "Lors de son parcours éducatif au [SCOPE.sState('klimt_center_of_art_scope').GetCityHubName], notre artiste fait des progrès plus rapides que prévu. Peut-être qu'il peut revenir plus tôt." #NT!
 klimt.433.f: "«Le talent fait tout ce qu'il veut. Genius ne fait que ce qu'il peut. -Eugène Delacroix" #NT!
 klimt.433.g: "Vous pouvez voir le talent à première vue." #NT!
 klimt.434.t: "Marchand d'art" #NT!
 klimt.434.d: "Pendant son séjour éducatif, [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName] a trouvé un concessionnaire d'art renommé qui pourrait vendre quelques pièces." #NT!
 klimt.434.f: "«Je suis un homme d'affaires absolument sérieux. Les calomnies de mes concurrents que je vends des contrefaçons ne sont dues qu'à l'envie. Puis-je maintenant vous exciter pour ce tableau? Un vrai Leonardo da Vinci: La dame avec le sixtine degu. Une rareté! Une offre comme celle-ci ne reviendra plus jamais!" #NT!
 klimt.434.g: "Achetez des peintures." #NT!
 klimt.434.h: "Nous n'avons pas besoin de produits étrangers de second ordre." #NT!
 klimt.435.t: "La dernière mode" #NT!
 klimt.435.d: "Au cours de son parcours éducatif, notre artiste a découvert de nouvelles modes, de nouveaux styles architecturaux et de nouveaux passe-temps qui lui étaient auparavant inconnus." #NT!
 klimt.435.f: "«Les hommes venus d'Angleterre savaient comment dire à leurs amis étonnés que les gens de l'autre côté de la Manche, aussi sensibles, aimaient toujours beaucoup les plaisirs enfantins. Les jeunes se divertissent donc en donnant un coup de pied en cuir sur une prairie, d'autres ont frappé le ballon sur un filet avec une sorte de batteur de tapis, et cette folie attire des spectateurs dans chaque foule. Parmi eux, il y a des gens au pouvoir et à la dignité - qui parfois ne se dédaignent même pas pour s'impliquer eux-mêmes." #NT!
 klimt.435.g: "La nouvelle bouffée de nouvelle culture." #NT!
 klimt.435.h: "Mais est-il vraiment juste de suivre le zeitgeist?" #NT!
  
  ### 2.1.2 ### 
  
