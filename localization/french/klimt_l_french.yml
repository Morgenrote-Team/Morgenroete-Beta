 je_klimt_painter_trip: "Parcours éducatif" #NT!
 je_klimt_painter_trip_reason: "Sur un [concept_klimt_painter_trip], un peintre peut apprendre un style artistique auparavant inconnu et ainsi améliorer le [concept_klimt_painting_tradition] annuel. Ils peuvent également acquérir d'autres traits positifs et négatifs pendant leur séjour dans un [concept_artists_center_of_arts] étranger." #NT!
 je_klimt_painter_trip_goal: "En règle générale, un peintre termine ses études au #G 12 mois#!. Les événements peuvent s'allonger ou raccourcir cette fois." #NT!
  
 je_klimt_secession: "La sécession art nouveau" #NT!
 je_klimt_secession_reason: "Le nouveau mouvement artistique d'Art Nouveau a attiré de nombreux artistes. Dans certaines conditions, cela peut entraîner un mouvement artistique établi qui jouit de la renommée internationale et donne à la peinture et à l'architecture un nouvel élan. Historiquement, l'une des associations les plus importantes de ce type a été la sécession de Vienne. La sécession de Vienne, plus précisément l'association des artistes autrichiens, est une association d'artistes de Vienne de la période Fin de Siècle. En dérivé de cela, la variante viennoise d'Art Nouveau est également appelée style de sécession ou art viennois." #NT!
 je_klimt_secession_fail: "Une autre nation a débloqué la sécession devant nous." #NT!
  
