 klimt.2.t: "[GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetLastName] engage [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetHerselfHimself] à un style" #NT!
 klimt.2.d: "Après de nombreuses années au cours de laquelle [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName] a collecté des expériences et des impressions pour améliorer la technique [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetHerHis], [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetSheHe] s'est finalement réglé sur un style préféré." #NT!
 je_klimt_painter_trip_fail: "Si [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName] doit mettre fin à son voyage prématurément remplacé ou décède pendant son séjour dans un pays étranger, il n'acquérira pas de nouvelle école [concept_character_trait]." #NT!
