 klimt_recently_hired_independent_painter_modifier: "Peintre indépendant récemment embauché" #NT!
  
 klimt.2.f: "À l'âge d'environ 40 ans, un [concept_klimt_painter] considérera ses études complètes et s'installera enfin sur son style de peinture préféré. La règle de base est que ce style est basé sur le genre le plus moderne, Art Nouveau étant le plus moderne et le classicisme étant la forme d'art la plus archaïque. Les peintres avec un style de peinture spécialisé créeront des chefs-d'œuvre dans ce style d'art dans certaines conditions. Vous pouvez également lancer une collection d'art dans une galerie qui convient à votre goût. Un peintre spécialisé considère que sa formation en peinture est terminée et ne fera plus de voyages éducatifs." #NT!
 klimt.2.g: "Le style de peinture est maintenant mature." #NT!
  
 klimt.10.t: "Galerie inaugurée" #NT!
 klimt.10.d: "Le réalisateur nouvellement nommé a ouvert la nouvelle galerie d'art avec une cérémonie de fête. L'un des invités d'honneur était le [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName], qui a assisté à la loi avec satisfaction." #NT!
 klimt.10.f: "La construction d'une galerie nationale ouvre une variété de possibilités. Les peintres spécialisés créeront automatiquement une collection d'art adaptée à leurs goûts. En conséquence, les artistes qui ont abandonné le style romantique créeront une collection de peintures romantiques. Une telle collection d'art peut être encore améliorée avec un chef-d'œuvre pour en faire une excellente collection. Les chefs-d'œuvre peuvent être peints au hasard au fil du temps par des artistes de ce mouvement artistique ou acquis à l'étranger." #NT!
 klimt.10.g: "Enfin, nous n'avons plus à stocker ce truc dans le grenier!" #NT!
  
 klimt.20.t: "Galerie nationale" #NT!
 klimt.20.d: "Les chefs-d'œuvre déterminants d'une époque sont exposés dans la galerie d'art. Nous possédons actuellement les peintures uniques suivantes:" #NT!
