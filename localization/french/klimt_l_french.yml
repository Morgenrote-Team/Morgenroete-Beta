 MR_PAINTER_ACHIEVEMENTS_TT: "[GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName] est un [GetPlayer.GetCustom('klimt_painter_achievements_experience_tt_type')]. \ N[GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetSheHe] produit des peintures [GetPlayer.MakeScope.Var('klimt_painter_var').GetVariable('klimt_painter_num_paintings_var').GetValue|V0] dont [GetPlayer.MakeScope.Var('klimt_painter_var').GetVariable('klimt_painter_num_masterworks_var').GetValue|V0] sont considérés comme des maîtres.[GetPlayer.GetCustom('klimt_painter_achievements_vernissage_tt_type')][GetPlayer.GetCustom('klimt_painter_achievements_inaugurated_gallery_tt_type')]" #NT!
 klimt_painter_achievements_inaugurated_gallery_tt_loc: "[GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetSheHe] a inauguré une nouvelle galerie d'art avec [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetHerHis] peintures merveilleuses. La galerie verra sûrement beaucoup plus de grands peintres à l'avenir!" #NT!
  
 je_klimt_rossetti: "Fraternité préraphaélite" #NT!
 je_klimt_rossetti_reason: "Les préraphaélites sont un groupe d'artistes qui voient une rupture culturelle dans l'art de la Renaissance de Raphael et Michel-Ange. Ils préfèrent la peinture italienne du Trecento et du Quattrocento. Ils se considéraient comme un mouvement de réforme. Leur rivalité était moins avec les artistes réels de la Renaissance qu'avec les néoclassiciens qui se sont modélisés sur eux. Ils ont particulièrement repris des sujets médiévaux. L'un de ses représentants les plus célèbres était Dante Gabriele Rossetti." #NT!
 je_klimt_fattori: "Macchiaioli" #NT!
 je_klimt_fattori_reason: "Les Macchiaioli étaient un groupe artistique italien unique qui anticipait les innovations dans l'impressionnisme, mais restait largement inaperçu à leur temps. Le terme macchiaioli est dérivé du mot italien macchia, ce qui signifie spot (un deuxième sens est un broussailles, maquis). Leur représentant le plus important était Giovanni Fattori." #NT!
 je_klimt_barbizon: "L'école Barbizon" #NT!
 je_klimt_barbizon_reason: "L'école Barbizon a été formée par un groupe de peintres paysagistes français vers la fin du premier tiers du 19e siècle. Les artistes sont restés dans le village de Barbizon près de la forêt de Fontainebleau. La colonie du peintre, fondée par Théodore Rousseau et existait jusqu'en 1870, a eu une influence significative sur la peinture de paysage dans toute l'Europe, en particulier l'impressionnisme." #NT!
  
 klimt.501.t: "Les préraphaélites" #NT!
 klimt.501.d: "Avec les préraphaélites, une confrérie a été établie qui s'est opposée au classicisme et au réalisme, mais en même temps se considérait comme un mouvement de réforme. Leur soutien pourrait mettre de nouveaux talents à la lumière, mais cela contredit le style de notre peintre actuel, [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName]." #NT!
 klimt.501.f: "«Je suis déjà venu ici, \ nbut quand ou comment je ne peux pas dire: \ ni Connaître l'herbe au-delà de la porte, \ n la douce odeur passionnée, \ n le son soupirant, les lumières autour du rivage. -Dante Gabriele Rossetti" #NT!
 klimt.501.g: "Promouvoir la confrérie préraphaélite." #NT!
 klimt.501.h: "[GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetLastName] est bien meilleur" #NT!
 klimt.502.t: "Les macchiaioli" #NT!
 klimt.502.d: "Le groupe d'artistes Macchiaioli a été fondé à Florence aujourd'hui. Bien que son influence soit faible, le groupe inspire certains jeunes artistes à rechercher de nouveaux chemins dans l'art." #NT!
 klimt.502.f: "`` La tache (macchia) est la solidité des corps devant la lumière '-giovanni fattori" #NT!
 klimt.502.g: "Ils étaient donc Avantgarde avant l'Avantgarde?" #NT!
 klimt.503.t: "École de Barbizon" #NT!
 klimt.503.d: "Avec l'établissement d'un cercle de peintres près de Fontainebleau sous la direction de Théodore Rousseau, la peinture de paysage a connu de nouvelles impulsions à travers la scène artistique." #NT!
 klimt.503.f: "`` Si ma peinture dépeint fidèlement et sans trop remettre le caractère simple et vrai de l'endroit que vous avez fréquenté, si je réussis ... à donner sa vie à ce monde de végétation, alors vous entendrez les arbres gémissant sous le vent d'hiver, les oiseaux qui appellent leurs jeunes et pleurent après leur dispersion; Vous sentirez le vieux château trembler; Cela vous dira que, comme la femme que vous aimiez, elle aussi ... disparaîtra et renaîtra sous plusieurs formes ... on ne copie pas avec une précision mathématique ce que l'on voit, mais on ressent et interprète un monde réel, dont les décès vous tiennent rapidement. -Théodore Rousseau" #NT!
 klimt.503.g: "De beaux paysages!" #NT!
  
 klimt.601.t: "La mort de [SCOPE.sCharacter('klimt_painter_scope').GetLastName]" #NT!
 klimt.601.d: "[SCOPE.sCharacter('klimt_painter_scope').GetFullName], un peintre à l'échelle nationale et internationale, et l'une des personnalités artistiques exceptionnelles de notre pays, est décédée aujourd'hui. Il laisse un écart qui peut difficilement être comblé." #NT!
 klimt.601.f: "Le 26 juin 1835, Caspar David Friedrich a subi un accident vasculaire cérébral avec des symptômes de paralysie. Il a pris un remède à Teplitz, qu'il ne pouvait se permettre qu'en vendant des photos sur le poète Zhukovsky à la cour du tsar russe. Après le traitement, Friedrich a recommencé à peindre, ce qui lui a causé des difficultés. Néanmoins, le bord de mer de la peinture à l'huile par Moonlight a été créé en 1835/36. Jusqu'en 1839, il a principalement produit des dessins sépia et des aquarelles, moins de paysages et plus d'allégories de mort. Friedrich a envoyé des dessins sépia aux expositions d'art de Dresde en 1836 et 1838. Au cours de la dernière année de ma vie, le travail s'est arrêté. Friedrich est décédé à l'âge de 65 ans le 7 mai 1840 à Dresde et a été enterré au cimetière Trinity." #NT!
 klimt.601.g: "Mais qui peint son portrait de mort maintenant?" #NT!
 klimt.602.f: "En vieillissant Turner, il est devenu plus excentrique. Il avait peu d'amis proches à l'exception de son père, qui a vécu avec lui pendant 30 ans et a travaillé comme assistant de studio. La mort de son père en 1829 a eu un effet profond sur lui, et par la suite, il a été soumis à des épisodes de dépression. Turner est décédé du choléra au domicile de Sophia Caroline Booth, à Cheyne Walk à Chelsea, le 19 décembre 1851. Il est enterré dans la cathédrale Saint-Paul, où il se trouve près du peintre Sir Joshua Reynolds. Apparemment, ses derniers mots étaient "le soleil (ou son fils?) Est Dieu", bien que cela puisse être apocryphe." #NT!
 klimt.603.f: "Le 6 février 1848, la famille Cole a assisté à un service matinal à l'église épiscopale de Saint Luke à Catskill. Après le déjeuner, Cole s'est plaint de lassitude et à minuit, son état s'est aggravé et le médecin a été convoqué. Une attaque de pleurésie et de congestion de ses poumons a suivi. Thomas Cole est décédé dans la maison principale de Cedar Grove à 20 h le vendredi 11 février 1848." #NT!
 klimt.604.f: "L'hiver 1862/63 était extrêmement rude pour Delacroix; Il souffrait d'une mauvaise infection de la gorge qui semblait empirer au cours de la saison. Lors d'un voyage à Champrosay, il a rencontré un ami dans le train et s'est épuisé après avoir eu une conversation. Le 1er juin, il est retourné à Paris pour voir son médecin. Deux semaines plus tard, le 16 juin, il s'améliorait et retournait chez lui dans le pays. Mais au 15 juillet, il était assez malade pour voir à nouveau son médecin, qui a dit qu'il ne pouvait rien faire de plus pour lui. À ce moment-là, le seul aliment qu'il pouvait manger était les fruits. Delacroix a réalisé la gravité de son état et a écrit sa volonté, laissant un cadeau à chacun de ses amis. Pour sa femme de ménage de confiance, Jenny Le Guillou, il a laissé suffisamment d'argent pour qu'elle puisse vivre tout en ordonnant que tout dans son studio soit vendu. Il a également inséré une clause interdisant toute représentation de ses caractéristiques, «que ce soit par un masque de mort ou par dessin ou par photographie. Je l'interdise, expressément. Le 13 août, Delacroix est décédé." #NT!
 klimt.605.f: "Au cours des dernières années de sa vie, la vue d'Eckersberg a commencé à échouer. Cela l'a finalement conduit à abandonner complètement la peinture. Il est décédé à Copenhague du choléra le 22 juillet 1853 lors de la grande épidémie. Il est enterré au cimetière des Assistants de Copenhague." #NT!
  
 klimt.901.t: "Firmament de [GetPlayer.GetNameNoFlag]" #NT!
 klimt.901.d: "[GetPlayer.GetNameNoFlag] est une nation de premier plan dans le domaine de l'astronomie. Les découvertes exceptionnelles de [GetPlayer.MakeScope.Var('verrier_astronomer_var').GetCharacter.GetFullName] ont inspiré [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetLastName] pour créer une peinture représentant le ciel nocturne et le cosmos." #NT!
 klimt.901.f: "Les étapes d'une nation ont également un impact sur les peintres du pays. Des événements culturels extraordinaires, des avancées technologiques et des découvertes scientifiques peuvent inciter les artistes à les capturer sur toile pour l'éternité." #NT!
 klimt.901.g: "Beau!" #NT!
 klimt.902.t: "Trésors du Pacifique" #NT!
 klimt.902.d: "Le retour d'une expédition du Pacifique a laissé sa marque: les biens exotiques, les trésors d'art fascinants, les nouvelles connaissances océanographiques et les animaux sauvages ont atteint le [GetPlayer.GetNameNoFlag]. [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetLastName] a été inspiré par cela pour créer une peinture qui met en valeur la volonté de notre nation à découvrir et à explorer." #NT!
 klimt.903.t: "Art oriental" #NT!
 klimt.903.d: "Le nombre croissant d'expéditions au Moyen-Orient a éveillé une euphorie dans la société pour un mouvement artistique qui peut être décrite comme un «orientalisme». [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetLastName] a également été capturé par la fascination de l'Orient et peint une peinture fantastique de 1001 nuits." #NT!
 klimt.904.t: "L'impulsion d'une nouvelle ère" #NT!
 klimt.904.d: "[GetPlayer.GetNameNoFlag] est à l'avant-garde de la conquête du ciel. De nouvelles machines, que ce soit des avions ou des zeppelins, peuplent le ciel. Les nouveaux records sont battus chaque jour et nos pilotes sont considérés comme des héros nationaux. [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetLastName] a jeté l'esprit de cette nouvelle ère en couleur et célèbre le triomphe de la technologie, de la volonté et de l'héroïsme." #NT!
 klimt.905.t: "Portrait avec tigre et lion" #NT!
 klimt.905.d: "Lors de sa dernière visite au zoo, [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetLastName] a pu découvrir de première main les animaux exotiques que [GetPlayer.GetNameNoFlag] avait déjà apporté à la capitale du monde entier. En tant que zoologiste qualifié, le professeur [GetPlayer.MakeScope.Var('dubois_naturalist_var').GetCharacter.GetLastName] a donné à [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetHerHim|U] une tournée et lui a dit quelques faits intéressants sur les animaux. À la fin de son séjour, [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetSheHe|U] a créé un autoportrait extraordinaire." #NT!
 klimt.906.t: "Croquis de dinosaures" #NT!
 klimt.906.d: "Inspiré par les succès du professeur [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName], [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetLastName] a tenté de respirer la vie dans les reptiles éteints sur une image." #NT!
 klimt.907.t: "Secrets de la jungle" #NT!
 klimt.907.d: "Les découvertes archéologiques du Yucatan et les circonstances aventureuses dans lesquelles des chercheurs comme Prof. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] ont découvert à plusieurs reprises de nouveaux sites mayas a conduit [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetLastName] à immortaliser nos expéditions en images." #NT!
 klimt.908.t: "Portrait de [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName]" #NT!
 klimt.908.d: "Le travail infatigable et les points forts constamment nouveaux dans les travaux de Maestro [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetLastName] ont inspiré [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetLastName] pour créer un portrait du compositeur. Non seulement sa musique inégalée, mais aussi ce tableau augmentera sa renommée." #NT!
  
 klimt.911.t: "Un portrait du [SCOPE.sCharacter('klimt_ruler_scope').GetPrimaryRoleTitle]?" #NT!
 klimt.911.d: "Un portrait de [SCOPE.sCharacter('klimt_ruler_scope').GetFullName] est toujours absent à la galerie officielle des chefs d'État du [GetPlayer.GetNameNoFlag]. [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName] est considéré comme un candidat évident pour présenter correctement le souverain." #NT!
 klimt.911.f: "Chaque trimestre est une chance qu'un peintre soit invité à peindre un portrait du chef de gouvernement ou de chef de l'État. La question de savoir si cela réussit dépend de la réputation de l'artiste en question." #NT!
 klimt.911.g: "Créer un portrait." #NT!
 klimt.911.h: "Et si cela ne va pas - qui paiera pour cela?" #NT!
 klimt.912.t: "Un ... portrait remarquable" #NT!
 klimt.912.d: "[GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName] a dévoilé publiquement son portrait du [SCOPE.sCharacter('klimt_ruler_scope').GetPrimaryRoleTitle] aujourd'hui. Alors que les autres artistes mettent l'accent sur «l'audace» et «l'innovation», certaines parties du gouvernement sont horrifiées par elle." #NT!
 klimt.912.f: "«C'est dégoûtant!" #NT!
 klimt.912.g: "L'art est l'art." #NT!
 klimt.912.h: "Détruisez cette peinture!" #NT!
 klimt.913.t: "Un grand portrait" #NT!
 klimt.913.d: "[GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName] s'est surpassé avec sa peinture du [SCOPE.sCharacter('klimt_ruler_scope').GetPrimaryRoleTitle]. La peinture a immédiatement suscité l'enthousiasme et est considérée comme l'une de ses meilleures œuvres." #NT!
 klimt.913.f: "`` Six et demi de haut, des muscles comme Hercules, un ressembler à Napoléon, un visage comme Aphrodite - oui, c'est vrai, c'est moi! Douche l'artiste avec de l'argent." #NT!
  
 klimt_gallery_can_construct_capital_tt: "Ne peut construire qu'une galerie d'art dans la capitale." #NT!
  
