  ### 2.1.5 ### 
 klimt.11.t: "Dissolution d'une galerie" #NT!
 klimt.11.d: "Le gouvernement ne peut plus garantir une galerie nationale au [SCOPE.sState('klimt_gallery_state').GetName]. Il a été décidé de le dissoudre et de transférer les expositions les plus importantes à notre capital." #NT!
 klimt.11.f: "Si une galerie nationale existe en dehors de la capitale, elle sera automatiquement dissoute et exposée dans sa propre galerie nationale. S'il n'y a pas encore de galerie nationale, une nouvelle sera construite." #NT!
 klimt.11.g: "Cette collection exquise de peintures enrichira notre galerie nationale." #NT!
 klimt.11.h: "Prenez la collection comme base pour construire une nouvelle galerie nationale." #NT!
  
  ### 2.2.1 ### 
  
 alert_klimt_painter_trip_possible_alert_hint: "Vous avez un [concept_klimt_painter] qui pourrait étudier un nouveau style artistique dans un [concept_artists_center_of_arts]. Appuyez sur le bouton de l'onglet Artiste dans le #V Morgenröte Window#! pour les envoyer." #NT!
  
  ### 2.3.0 ### 
  
 klimt_add_x_painting_tradition_minus_x_tt: "[THIS.GetCountry.GetName] perd [SCOPE.GetValue('painting_tradition_amount')|0+] @klimt_painting_tradition! [concept_klimt_painting_tradition]." #NT!
 klimt_add_x_painting_tradition_0_tt: "[THIS.GetCountry.GetName] ne gagne pas @klimt_painting_tradition! [concept_klimt_painting_tradition]." #NT!
 klimt_add_x_painting_tradition_plus_x_tt: "[THIS.GetCountry.GetName] Gains [SCOPE.GetValue('painting_tradition_amount')|0+] @klimt_painting_tradition! [concept_klimt_painting_tradition]." #NT!
 klimt.403.d: "[GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName] est revenu du [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetHerHis] Trip d'étude et a apporté avec [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetHerHim] de nouvelles expériences, de nouvelles connaissances et une nouvelle inspiration. [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetSheHe|U] a également quelque peu amélioré la réputation [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetHerHis] dans le monde de l'art." #NT!
 klimt.425.d: "Depuis l'arrivée [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetHerHis] en [SCOPE.sState('klimt_center_of_art_scope').GetCityHubName], [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName] a eu des centaines et des milliers d'impressions. Cela fait longtemps qu'une idée a suivi la suivante. [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetLastName] peut littéralement sentir comment cet endroit revigore [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetHerHim]." #NT!
  
 country_klimt_decorative_painting_tradition_add: "@klimt_painting_tradition! [concept_klimt_painting_tradition] par an" #NT!
 country_klimt_decorative_painting_tradition_add_desc: "Le montant de [concept_klimt_painting_tradition] accumulé par votre pays par an." #NT!
  
