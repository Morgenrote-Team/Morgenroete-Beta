 klimt_spitzweg_not_funny_modifier: "Spitzweg suspect" #NT!
  
 klimt.1300.t: "Carl Spitzweg, le pauvre poète" #NT!
 klimt.1300.d: "Le pauvre poète (allemand: Der Arme Poet) est la peinture la plus connue et la plus populaire du peintre allemand Carl Spitzweg. Il a été exécuté en 1839 et avait trois versions. Il est considéré comme un chef-d'œuvre précoce." #NT!
 klimt.1300.f: "Carl Spitzweg était un peintre et poète romantique allemand. Il est considéré comme l'un des artistes les plus importants de l'ère Biedermeier. Son père, un riche marchand, avait été formé Carl en tant que pharmacien. Il a atteint sa qualification de l'Université de Munich, mais en se remettant d'une maladie, il a également pris la peinture. Spitzweg était autodidacte en tant qu'artiste et a commencé par copier les œuvres de Masters Flamand. Il a contribué son premier travail aux magazines satiriques. En recevant un héritage en 1833, il a pu se consacrer à la peinture. Ses peintures et dessins ultérieurs étaient souvent des œuvres de genre humoristiques. Beaucoup de ses peintures représentent des excentriques fortement caractérisés." #NT!
 klimt.1300.g: "Ahahah, un drôle de peintre!" #NT!
 klimt.1300.h: "Attendez! Satire contre qui?" #NT!
  
