 klimt_painter: "Peintre" #NT!
 klimt_painter_desc: "Ce personnage est un artiste qui est le principal objectif des peintures. Peut-être qu'un jour leurs peintures seront connues partout dans le monde?" #NT!
 klimt_great_painter: "Grand peintre" #NT!
 klimt_great_painter_desc: "Ce personnage est l'un des plus grands peintres du monde. Leurs peintures sont accrochées à toutes les galeries d'art importantes et les collectionneurs leur paient fortune." #NT!
  
