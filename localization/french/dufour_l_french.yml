 dufour.2100.t: "Martin Disteli - Caricaturist"
 dufour.2100.d: "[SCOPE.sCharacter('character_1_scope').GetFullName], a Painter and Caricaturist from Olten, is very interested in the liberal case. His political Caricatures might be a great boon for the Liberals, so maybe he would be of more use to us as an Agitator?"
 dufour.2100.f: "\"Would you like another caricature about angry catholic priests? Oh, I'm sure you would!\""
 dufour.2100.g: "The liberal cause needs good Caricatures!"
 dufour.2100.h: "He is a Painter!"
