l_french:
 dufour_celebrate_schwingfest_decision: "Créer le premier Eidgenössisches Schwing- und Älplerfest"
 dufour_celebrate_schwingfest_decision_desc: "Schwingen est devenu en quelque sorte un sport national suisse. Faisons-en un véritable sport national en célébrant une Schwing- und Älplerfest !"
 dufour_schwingfest_modifier: "Eidgenössisches Schwing- und Älplerfest"
 dufour_schwingerkonig: "Schwingerkönig"
 dufour_schwingerkonig_desc: "Ce personnage a remporté l'Eidgenössisches Schwingfest en Suisse. Il est considéré comme un champion par les masses."
 dufour.1000.t: "Les deux Appenzell n'appliquent pas le droit de vote des femmes"
 dufour.1000.d: "Le droit de vote des femmes a été introduit en Suisse. Malheureusement, certains cantons sont un peu lents. Dans les cantons d'Appenzell Rhodes-Intérieures et d'Appenzell Rhodes-Extérieures, les femmes sont autorisées à participer aux votes et élections fédérales, mais pas à celles des communes et du canton. Il faudrait d'abord une modification de la Constitution cantonale et celle-ci devrait être approuvée par une Landsgemeinde. Le processus pourrait prendre plusieurs années. Devons-nous intervenir et contraindre les Appenzellois à introduire le droit de vote des femmes ou attendre et espérer qu'ils le feront eux-mêmes ?"
 dufour.1000.f: "\"Nos hommes le font sûrement correctement !\"\n\n#b Historiquement#!, le droit de vote des femmes en Suisse a pris très longtemps. Ce n'est qu'en 1971 qu'il a été introduit pour les votes et élections suisses. Dans certains cantons, cela a pris encore plus de temps. Ce sont les deux Appenzellois qui ont mis le plus de temps. L'Appenzell Rhodes-Extérieures a adopté le droit de vote des femmes en 1989 dans une Landsgemeinde. L'Appenzell Rhodes-Intérieures a en revanche dû être contrainte par le Tribunal fédéral d'introduire le droit de vote des femmes en 1990.\nLa Suisse est donc l'un des pays qui ont introduit le droit de vote des femmes le plus récemment. Les pays qui ont introduit le droit de vote des femmes plus tôt sont l'Afghanistan, la Finlande, les États-Unis et bien d'autres."
 dufour.1000.g: "Forcez-les à laisser les femmes voter."
 dufour.1000.h: "Ils décideront sûrement bientôt de donner le droit de vote aux femmes."
 dufour_womens_suffrage_appenzell_effects_tt:0 "Vous n'obligez pas les deux cantons à introduire le droit de vote des femmes. Vous recevrez un événement s'il y a des progrès en la matière ou si votre décision est nécessaire."
 dufour.1001.t: "Défaite lors du vote sur le droit de vote des femmes dans les deux Appenzell"
 dufour.1001.d: "Le gouvernement d'Appenzell Rhodes-Extérieures et d'Appenzell Rhodes-Intérieures a proposé une législation visant à introduire le droit de vote des femmes au niveau cantonal. Le projet de loi a été rejeté. Cela signifie que les Appenzelloises n’ont toujours pas le droit de voter. Nous pourrions obliger les deux Appenzells à accorder leurs droits aux femmes, mais cela retournerait certainement la population locale contre nous."
 dufour.1001.f: "\"Levez la main si vous voulez introduire le droit de vote des femmes au niveau cantonal !\" De nombreuses mains se sont levées en l'air. Mais y en avait-il assez ? \"Vous avez rejeté l'introduction du droit de vote des femmes au niveau cantonal !\"\n\n#b Historiquement#!, le droit de vote des femmes en Suisse a pris très longtemps. Ce n'est qu'en 1971 qu'il a été introduit pour les votes et élections suisses. Dans certains cantons, cela a pris encore plus de temps. Ce sont les deux Appenzellois qui ont mis le plus de temps. L'Appenzell Rhodes-Extérieures a adopté le droit de vote des femmes en 1989 dans une Landsgemeinde. L'Appenzell Rhodes-Intérieures a en revanche dû être contrainte par le Tribunal fédéral d'introduire le droit de vote des femmes en 1990.\nLa Suisse est donc l'un des pays qui ont introduit le droit de vote des femmes le plus récemment. Les pays qui ont introduit le droit de vote des femmes plus tôt sont l'Afghanistan, la Finlande, les États-Unis et bien d'autres."
 dufour.1001.g: "Maintenant, j'en ai assez ! Forcez-les simplement à introduire le droit de vote des femmes !"
 dufour.1001.h: "Attendons encore un peu."
 dufour.1002.t: "Les deux Appenzell introduisent le droit de vote des femmes"
 dufour.1002.d: "Qui aurait pensé ça ? Les deux Appenzell ont introduit le droit de vote des femmes par un vote à main levée lors de leurs assemblées régionales. Cela signifie que les femmes peuvent désormais voter partout en Suisse."
 dufour.1002.f: "\"Levez la main si vous voulez introduire le droit de vote des femmes au niveau cantonal !\" De nombreuses mains se sont levées en l'air. Mais y en avait-il assez ? \"Vous avez approuvé l'introduction du droit de vote des femmes au niveau cantonal !\" Des acclamations ont éclaté !\n\n#b Historiquement#!, le droit de vote des femmes en Suisse a pris très longtemps. Ce n'est qu'en 1971 qu'il a été introduit pour les votes et élections suisses. Dans certains cantons, cela a pris encore plus de temps. Ce sont les deux Appenzellois qui ont mis le plus de temps. L'Appenzell Rhodes-Extérieures a adopté le droit de vote des femmes en 1989 dans une Landsgemeinde. L'Appenzell Rhodes-Intérieures a en revanche dû être contrainte par le Tribunal fédéral d'introduire le droit de vote des femmes en 1990.\nLa Suisse est donc l'un des pays qui ont introduit le droit de vote des femmes le plus récemment. Les pays qui ont introduit le droit de vote des femmes plus tôt sont l'Afghanistan, la Finlande, les États-Unis et bien d'autres."
 dufour.1002.g: "Cela leur a pris plus de temps que je ne l’aurais pensé !"
 dufour.1003.t: "Nouvel échec dans l'introduction du droit de vote des femmes dans les deux Appenzell"
 dufour.1003.d: "C'était déjà la deuxième tentative de certains Appenzellois progressistes d'introduire le droit de vote des femmes. Mais cette tentative a également échoué. Nous pourrions encore forcer l'introduction ou attendre encore plus longtemps et espérer que les Appenzellois introduiront volontairement le droit de vote des femmes."
 dufour.1003.f: "\"Levez la main si vous voulez introduire le droit de vote des femmes au niveau cantonal !\" De nombreuses mains se sont levées en l'air. Mais y en avait-il assez ? \"Vous avez rejeté l'introduction du droit de vote des femmes au niveau cantonal !\"\n\n#b Historiquement#!, le droit de vote des femmes en Suisse a pris très longtemps. Ce n'est qu'en 1971 qu'il a été introduit pour les votes et élections suisses. Dans certains cantons, cela a pris encore plus de temps. Ce sont les deux Appenzellois qui ont mis le plus de temps. L'Appenzell Rhodes-Extérieures a adopté le droit de vote des femmes en 1989 dans une Landsgemeinde. L'Appenzell Rhodes-Intérieures a en revanche dû être contrainte par le Tribunal fédéral d'introduire le droit de vote des femmes en 1990.\nLa Suisse est donc l'un des pays qui ont introduit le droit de vote des femmes le plus récemment. Les pays qui ont introduit le droit de vote des femmes plus tôt sont l'Afghanistan, la Finlande, les États-Unis et bien d'autres."
 dufour.1003.g: "Maudits montagnards. Ils ont eu leur chance, maintenant on les force !"
 dufour.1003.h: "Nous ne pouvons pas simplement saper le processus démocratique."
 dufour.1004.t: "Le Tribunal fédéral oblige l'Appenzell Rhodes-Intérieures à introduire le droit de vote des femmes"
 dufour.1004.d: "Après que l'Appenzell Rhodes-Extérieures a accepté le droit de vote des femmes lors de sa dernière Landsgemeinde, le Tribunal fédéral a rendu une décision dans le cas de l'Appenzell Rhodes-Intérieures. L'Appenzell Rhodes-Intérieures doit introduire le droit de vote des femmes. L’affaire est donc tranchée une fois pour toutes."
 dufour.1004.f: "\"Le Tribunal fédéral estime qu'Appenzell viole la Constitution de la Confédération suisse. Les femmes ont les mêmes droits que les hommes. L'Appenzell Rhodes-Intérieures est obligée d'introduire immédiatement le droit de vote des femmes !\"\n\n#b Historiquement#! le droit de vote des femmes en Suisse a pris un très long temps. Ce n'est qu'en 1971 qu'il a été introduit pour les votes et élections suisses. Dans certains cantons, cela a pris encore plus de temps. Ce sont les deux Appenzellois qui ont mis le plus de temps. L'Appenzell Rhodes-Extérieures a adopté le droit de vote des femmes en 1989 dans une Landsgemeinde. L'Appenzell Rhodes-Intérieures a en revanche dû être contrainte par le Tribunal fédéral d'introduire le droit de vote des femmes en 1990.\nLa Suisse est donc l'un des pays qui ont introduit le droit de vote des femmes le plus récemment. Les pays qui ont introduit le droit de vote des femmes plus tôt sont l'Afghanistan, la Finlande, les États-Unis et bien d'autres."
 dufour.1004.g: "Enfin!"
 dufour.2000.t: "Première Eidgenössisches Schwing- und Älplerfest à Bienne"
 dufour.2000.d: "Many Schwinger participated in the first Eidgenössisches Schwing- und Älplerfest. The event was held in the town of Biel and was planned by the Swiss Schwing clubs after the sport became more and more popular. After the immense success the participants and planners are looking forward to the next event in three years. And many Schwinger are eager to win the event and the first price - a strong bull."
 dufour.2000.f: "Two huge bodies are wrestling each other, neither one wants to fall. Both opponents go down under the cheers of the audience. Alfred Niklaus is on top. He is the first Schwingerkönig! But first he helps his opponent to get up and cleans his back from saw dust.\n\n#b Historically #! Schwingen - a form of wrestling with very strict rules - was a popular sport in Switzerland, although its origin can't be traced well. But the first local Schwingfest was held at the Unspunnenmatte in Interlaken. The first Eidgenössisches Schwing- und Älplerfest was held in 1895 in Biel and then regularly all two or three years. At the Schwing- und Älplerfest there are also the two other Swiss national sports Hornussen (a team sport featuring the hitting of a puck called \"Hornuss\") and Steinstossen (a form of stone put).\n\nThe Eidgenössisches Schwing- und Älplerfest is celebrated to this day. The most recent event occurred in Pratteln close to Basel in 2022 and the next event will be held in Mollis in 2025. The winner is awarded with a bull, the Schwingerkönig of 2022 - Joel Wicki - won the bull \"Magnus\" a Red Holstein."
 dufour.2000.g: "J'ai hâte du prochain événement !"
 dufour.2001.t: "[SCOPE.sCharacter('dufour_schwingerkonig_scope').GetLastName] [SCOPE.sCharacter('dufour_schwingerkonig_scope').GetFirstName] a remporté l'Eidgenössisches Schwingfest !"
 dufour.2001.d: "Après un combat acharné, [SCOPE.sCharacter('dufour_schwingerkonig_scope').GetLastName] [SCOPE.sCharacter('dufour_schwingerkonig_scope').GetFirstName] est devenu le vainqueur de l'Eidgenössisches Schwingfest de cette année."
 swiss_flavor_events.21.f1: "Deux corps énormes se battent, aucun ne veut tomber. Les deux adversaires tombent sous les acclamations du public. Un homme est au sommet, il a gagné ce \"Gang\". Il aide son adversaire à se relever et nettoie le dos de l'autre homme de la sciure."
 swiss_flavor_events.21.f2: "\n\nIl est intéressant de noter qu'à Schwingen, les noms des Schwinger sont inversés et commencent par le nom de famille. Si Abraham Lincoln avait été un Schwinger, il aurait été appelé Lincoln Abraham."
 swiss_flavor_events.21.f3: "\n\nIf an opponent has the same number of points as the Schwingerkönig he gets the title of \"Erstgekrönter\" which means first crowned."
 swiss_flavor_events.21.f4: "\n\nLes 15 pour cent des meilleurs d'un Eidgenössisches reçoivent une couronne. Ils sont généralement appelés les « Eidgenossen »."
 swiss_flavor_events.21.f5: "\n\nOther participants get prizes too. They are put in a temple of gifts. Each gift was donated by someone or by some organization."
 swiss_flavor_events.21.f6: "\n\nTrois Schwinger différents ont déjà été Schwingerkönig à trois reprises. Hans Stucki a gagné en 1900, 1902 et 1905. Rudolf Hunsperger a gagné en 1966, 1969 et 1974. Jörg Abderhalden a gagné en 1998, 2004 et 2007."
 swiss_flavor_events.21.f7: "\n\nIl existe d'autres Schwingfeste en Suisse. Deux des plus importants sont le \"Unspunnen-Schwinget\" près d'Interlaken et le \"Kilchberger Schwinget\" dans le canton de Zurich. Si un Schwinger remporte ces deux-là ainsi que les Eidgenössisches, cela s'appelle un « Schwinger-Grand-Slam »."
 swiss_flavor_events.21.f8: "\n\nÀ Schwingen, vous ne recevez pas seulement des points en gagnant. Si deux adversaires sont à égalité mais ont mené un combat attrayant, ils sont récompensés 0,25 points de plus que s'il s'agissait d'un combat ennuyeux. Même si vous perdez mais combattez courageusement et bien, vous obtenez 0,75 point de plus."
 swiss_flavor_events.21.f9: "\n\nLes Schwingfeste de grand prestige sont les \"Bergschwingfeste\", qui ont lieu dans les montagnes. Ce sont des festivals folkloriques et il y a aussi de la musique traditionnelle. Les Bergschwingfeste les plus connues sont le « Stoos-Schwinget », le « Rigi Schwing- und Älplerfest », le « Brünigschwinget », le « Schwarzsee-Schwinget », le « Weissenstein-Schwinget ». et le \"Schwägalp-Schwinget\"."
 dufour.2001.g: "Toutes nos félicitations!"
 ticinese: "Tessinois"
 SONDERBUND: "Sonderbund"
 SONDERBUND_ADJ: "Sonderbund"
 rumantsch: "Romanche alpin"
 dufour_ig_landowners_patricians_loc: "Patriciens"
 NEUCHATEL: "Neuchâtel"
 NEUCHATEL_ADJ: "Neuchâtel"
 je_group_dufour_confoederatio_helvetica: "Morgenröte : Confoederatio Helvetica"
 je_dufour_carte_dufour: "Carte topographique de la Suisse"
 je_dufour_carte_dufour_reason: "Depuis 1822, le cadastre relève de la Confédération suisse et non des cantons. Le général Dufour fut chargé de réaliser le levé de la Suisse selon des normes uniformes et d'enregistrer les résultats du levé sur une carte. Cela prendra du temps et coûtera un peu cher, mais cela contribuera au développement de la Suisse."
 je_dufour_carte_dufour_goal: "Les relevés sont terminés et la carte a été publiée."
 dufour_creating_carte_dufour_modifier: "Création de la Carte Dufour"
 dufour.900.t: "Publication de la Carte Dufour"
 dufour.900.d: "Après des années de travail acharné, la carte topographique de la Suisse est enfin terminée et les 25 feuilles sont soit publiées, soit le seront dans peu de temps."
 dufour.900.f: "Enfin vous pouvez voir le premier tirage de la Carte Dufour. Les lignes fines montrent les montagnes, les villes et même les maisons. Jamais auparavant une carte de la Suisse n'avait été aussi précise !\n\n#b Historiquement #! Dufour et son équipe ont travaillé sur la carte de 1832 à 1865. Les deux premières feuilles ont été publiées en 1845 et la dernière des 25 feuilles a été publiée dans 1865. La carte topographique a été imprimée selon un procédé de gravure et montrait une échelle de 1:100 000. Il est intéressant de noter que Dufour fut le premier général de la Suisse moderne et dirigea l'armée suisse contre le Sonderbund lors de la guerre civile suisse (Sonderbundskrieg) en 1848.\n\n#b Aujourd'hui #!, la Carte Dufour se trouve au Musée du Land suisse à Zürich. Mais vous pouvez réellement trouver la carte en ligne car elle a été publiée avec de nombreuses autres cartes nationales de la Suisse."
 dufour.900.g: "Il faudrait donner à une montagne le nom de Dufour !"
 dufour_carte_dufour_modifier: "Carte Dufour"
 dufour_add_x_carte_dufour_progress_minus_x_tt: "Perdre [SCOPE.GetValue('carte_dufour_progress_amount')|0+] #V Progression de la cartographie#!."
 dufour_add_x_carte_dufour_progress_minus_1_tt: "Perdre [SCOPE.GetValue('carte_dufour_progress_amount')|0+] #V Progression de la cartographie#!."
 dufour_add_x_carte_dufour_progress_0_tt: "Ne gagnez aucun #V Progression de la cartographie#!."
 dufour_add_x_carte_dufour_progress_plus_1_tt: "Gain [SCOPE.GetValue('carte_dufour_progress_amount')|0+] #V Progression de la cartographie#!."
 dufour_add_x_carte_dufour_progress_plus_x_tt: "Gain [SCOPE.GetValue('carte_dufour_progress_amount')|0+] #V Progression de la cartographie#!."
 dufour.901.t: "Les habitants perturbés par l'enquête"
 dufour.901.d: "Lors des travaux d'arpentage du [SCOPE.sState('dufour_mapping_scope').GetName], nos géomètres sont entrés en conflit avec les habitants ruraux de la région. Apparemment, ils perturbaient des funérailles avec leur travail."
 dufour.901.f: "\"Il vaut mieux y aller maintenant ! Vous n'avez pas entendu ? Nous n'avons pas besoin de votre carte, nous avons toujours trouvé notre propre chemin pour rentrer chez nous !\""
 dufour.901.g: "Mes condoléances."
 dufour.901.h: "Continuer!"
 dufour.902.t: "Un géomètre tué dans les montagnes"
 dufour.902.d: "Alors qu'ils effectuaient leurs relevés depuis l'une des hautes montagnes du [SCOPE.sState('dufour_mapping_scope').GetName], nos géomètres ont été surpris par un orage. Il y a eu un orage et une pluie battante. Les géomètres ont cherché refuge dans leur tente mais un éclair a tué l'un d'eux et blessé l'autre."
 dufour.902.f: "\"Ma jambe a été touchée par la foudre mais au bout de quelques jours, ça s'est amélioré. J'ai enfin pu descendre et me mettre en sécurité. C'était une épreuve !\""
 dufour.902.g: "Mon Dieu!"
 dufour.903.t: "Les habitants aident les géomètres"
 dufour.903.d: "Nos géomètres ont failli se perdre au [SCOPE.sState('dufour_mapping_scope').GetName], mais quelques locaux ont pu les aider et leur ont même proposé un hébergement et des informations sur les chemins les plus rapides. Cela aidera sûrement la carte à être terminée plus rapidement !"
 dufour.903.f: "\"Tu pourras travailler plus tard. Nous devons d'abord boire ensemble. C'est notre meilleur Kirsch !\""
 dufour.903.g: "Nous apprécions votre aide !"
 dufour.904.t: "Matériel perdu !"
 dufour.904.d: "Un de nos géomètres a perdu son équipement alors qu'il gravissait une montagne au [SCOPE.sState('dufour_mapping_scope').GetName]. Soit nous devons fournir du nouveau matériel, soit les progrès seront ralentis."
 dufour.904.f: "\"Il est juste tombé... Je ne pouvais pas le retenir... Qui aurait su que nous devions réparer l'équipement sur nos sacs à dos ?\""
 dufour.904.g: "Ils doivent composer avec."
 dufour.904.h: "Obtenez de nouveaux instruments !"
 dufour.905.t: "Blüemlisalp ou Frau"
 dufour.905.d: "Les habitants du [SCOPE.sState('dufour_mapping_scope').GetName] portent deux noms pour la même montagne : Blüemlisalp et Frau. Quel nom choisir ?"
 dufour.905.f: "\"Ne pouvons-nous pas simplement lancer une pièce de monnaie ?\""
 dufour.905.g: "Bleuemlisalp!"
 dufour.905.h: "Madame !"
 dufour.906.t: "Surveyor accélère le travail sur Map"
 dufour.906.d: "Grâce au soutien de [SCOPE.sCharacter('surveyor_scope').GetFullName], un géomètre bien connu, les progrès dans la création de la carte topographique ont fait un grand pas en avant."
 dufour.906.f: "\"Yes, this instrument is for measuring, not for staring at stars.\""
 dufour.906.g: "Bon travail!"
 dufour.907.t: "Un mathématicien aide aux calculs"
 dufour.907.d: "[SCOPE.sCharacter('mathematician_scope').GetFullName], qui a une formation en mathématiques, a pu aider notre équipe à résoudre divers calculs. Cela aidera à terminer la carte plus rapidement."
 dufour.907.f: "\"Who would have known that mathematics are actually useful!\""
 dufour.907.g: "Heureusement que nous avons des mathématiciens !"
 dufour.908.t: "Le vol en montgolfière inspire les artistes"
 dufour.908.d: "Grâce à [SCOPE.sCharacter('balloonist_scope').GetFullName], un aérostier bien connu, quelques artistes et géomètres ont pu voir le monde d'en haut. Les artistes se sont inspirés de la vue à couper le souffle et ont une idée plus réaliste de la manière de représenter notre pays sur une carte."
 dufour.908.f: "\"Oh mon Dieu ! J'espère que nous ne nous écraserons pas !\""
 dufour.908.g: "Voir le monde d’en haut, c’est impressionnant !"
 dufour.910.t: "Premières fiches publiées : Jura et Bâle"
 dufour.910.d: "Les premières feuilles de notre nouvelle carte topographique ont été publiées et se concentrent sur la zone autour de Bâle et du Jura."
 dufour.910.f: "The Jura is a range of small mountains that stretches from Savoy all the way to Basel and some Foothills even to Lake Constance. It encompases parts of Vaud, Neuchâtel, Bern, both Basel, Solothurn and Aargau. many big cities are close to the Jura.\n Basel for example is one of the most important cities of Switzerland. Basel borders both the Alsace as well as Baden and is well connected thanks to the Rhine River.\nJust a few years ago the Canton of Basel was divided into the Cantons of Basel Stadt (City) and Basel Land (Countryside). Interestingly the countryside was more liberal during that time, while the city was ruled by Patricians. Basel is a quite international and has an old University that harbored great thinkers like Leonhard Euler and Daniel Bernoulli.\nGeneva on the other hand is a big city surrounded by France. during Napoléon's reign it was part of France and returned to Switzerland in 1815. Now the first private banks get founded and Geneva slowly becomes a hub of the financial sector. Additionally it was home to Voltaire and Jean-Jaques Rousseau, two of Switzerland's greatest philosophers."
 dufour.910.g: "Intéressant!"
 dufour.910.h: "Je ne veux rien entendre sur la Suisse !"
 dufour.910.no_more_information_tt: "Vous ne recevrez #n plus#! d'événements décrivant uniquement la Suisse, sans aucun effet."
 dufour.911.t: "Nouvelles fiches publiées: Schaffhouse, Thurgovie et Saint-Gall"
 dufour.911.d: "D'autres fiches ont été publiées. Cette fois, l'accent est mis sur la Suisse du Nord et de l'Est, avec les cantons de Schaffhouse, Thurgovie et Saint-Gall."
 dufour.911.f: "Schaffhausen lies in the Northeast of Switzerland and is mostly surrounded by Germany. The city itself is located right next to the Rhine and very close to the Rhinefalls at Neuhausen. Thanks to the energy of the river, Schaffhausen was able to industrialize quite early and thanks to the rural people it became a liberal Canton in 1831.\nThurgau was ruled by another Canton that changed every year until the French Revolution spread to Switzerland. It is a full Canton since 1815 and a center of textile industries and agriculture. The high amount of pear trees lead to the name \"Mostindien\" meaning Cider India which is a play on Ost (east) and Most (Cider). Thurgau is one of the liberal Cantons since 1831 and wants more centralization in Switzerland.\nSt. Gallen is a split Canton in regards to religion and was once the seat of monastery and a Prince Bishopric. It is a center of the textile industry and a liberal Canton. The Canton of St. Gallen surrounds both Appenzell Cantons and the remarkable Säntis mountain range, a part of the Alps."
 dufour.912.t: "Nouvelles fiches publiées : les Grisons et les Alpes rhétiques"
 dufour.912.d: "D'autres fiches ont été publiées. Cette fois, l'accent est mis sur l'immense canton des Grisons et les Alpes rhétiques."
 dufour.912.f: "Grisons is not only the biggest Canton of Switzerland, it is also home to the Rumantsch speaking people, a minority in Switzerland and one group of the Alpine Romance language also found in South Tyrol and Friuli.\nGrisons is sparsely populated as it is dominated by the Alps. Particularly the Rhaetian Alps named after the ancient Rhaeti tribes. Grisons is mostly an agrarian Canton that profits from the transport of goods over the Alpine passes as well. The loss of some now Italian lands after the Napoleonic Wars was a catastrophe but Grisons still has some areas that have a majority of Italian speaking people making it a Canton with three language groups: German, Rumantsch and Italian\nPolitically Grisons is dominated by its municipalities that have a lot of power. But the liberal forces that want to centralize the Canton more gained ground lately."
 dufour.913.t: "Nouvelles fiches publiées: Suisse centrale"
 dufour.913.d: "D'autres fiches ont été publiées. Cette fois, l'accent est mis sur les nombreux cantons de Suisse centrale."
 dufour.913.f: "La Suisse centrale est le berceau de la \"Eidgenossenschaft\", la Confédération suisse. Les cantons d'Uri, de Schwyz et d'Underwald (aujourd'hui séparés en Nied- et Obwald) ont d'abord formé une alliance lâche qui s'est ensuite élargie de plus en plus.\nLa partie principale de l'économie des nombreux petits cantons de Suisse centrale est le transport de marchandises. principalement sur la route du Saint-Gothard. En dehors de cela, l'agriculture, l'exploitation forestière et une certaine production textile étaient importantes dans la région.\nPolitiquement, la Suisse centrale était dominée par des catholiques conservateurs. Alors que le canton de Lucerne était le plus libéral des cantons de Suisse centrale grâce à la ville de Lucerne, les cantons plus petits d'Uri, Schwyz, Ob et Nidwald, Glaris et Zoug étaient encore plus conservateurs et dominés par les classes supérieures locales. .\nSchwytz a été presque divisée en deux cantons dans les années 1830, lorsque les parties extérieures du canton exigeaient l'égalité et la participation politique. Après que Schwyz intérieur ait été occupé par les troupes du Tagsatzung (le « gouvernement » de la Suisse), Schwyz intérieur a finalement accepté ces points et Schwyz est resté un canton."
 dufour.914.t: "Nouvelles fiches publiées: Tessin"
 dufour.914.d: "D'autres fiches ont été publiées. Cette fois, l'accent est mis sur le canton le plus méridional de la Suisse, le Tessin."
 dufour.914.f: "Le Tessin est la seule possession restante de la Confédération suisse en Italie. Conquête des XVe et XVIe siècles, la région fut dominée par les anciennes localités (cantons) jusqu'à la fondation de la République helvétique. Mais depuis 1803, c'est un canton à part entière.\nLes secteurs économiques dominants du Tessin étaient l'agriculture et l'exploitation forestière. La production de soie était également une activité lucrative. Des produits agricoles qui ne poussaient pas ailleurs en Suisse pouvaient être cultivés au Tessin : par exemple des châtaignes, du tabac, de la soie et divers fruits.\nEn 1830, le Tessin fut l'un des premiers cantons à se doter d'une constitution libérale. La situation politique du canton est cependant instable : les libéraux veulent centraliser l'État tandis que les conservateurs préfèrent l'autonomie régionale."
 dufour.915.t: "Nouvelles fiches publiées : Berne et Friboug"
 dufour.915.d: "D'autres fiches ont été publiées. Cette fois, c'est Berne et Fribourg qui ont été concentrés."
 dufour.915.f: "Both the Canton of Bern and the Canton of Fribourg have French and German speaking parts. While Bern is a huge Canton Fribourg is a lot smaller. Bern reaches from the Jura mountain range all the way to the Alps in the south. Fribourg is located west of Bern and hosts towns like Fribourg and Gruyère where a well known cheese comes from.\nThe Canton of Bern is mostly dominated by agriculture but watchmaking has slowly spread from neighboring Neuchâtel to the Bernese Jura. Hopefully industrialization will soon help develop the Canton.\nPolitically Bern was long dominated by the Patricians of the city itself but in the 1830s the liberals from the smaller towns in the Canton were able to draw up a new constitution that balanced the rights of the people of Berne and the rural population.\nFribourg is a Canton dominated by agriculture, especially grain production and cheese. The cheese from Gruyère is especially well known.\nPolitically, Fribourg was dominated by the conservative Patricians and the Clergy. Even when a new constitution was issued in 1831, the Canton remained conservative and in the elections the conservatives still gained the majority of the votes."
 dufour.916.t: "Nouvelles fiches publiées: Zurich et Argovie"
 dufour.916.d: "D'autres fiches ont été publiées. Cette fois, l'accent a été mis sur Zurich et Argovie."
 dufour.916.f: "Both Zürich and Aargau are located in the north of Switzerland mostly in the relatively flat Mittelland (central land). Both Cantons are rapidly industrializing and might become industrial powerhouses quite soon.\nZürich is one of the old Cantons and was dominated by the city itself for quite a long time. Zürich is a center of the mechanized textile industry as well as the machine industry. Many factories are located at rivers and get their energy from those rivers.\nPolitically Zürich was dominated by the Patricians of the City until 1830/31 when the people of the countryside forced a new constitution to be enacted. In the next elections, the liberals and radicals gained a majority and are now dominating the politics in Zürich.\nAargau was ruled by the other Cantons until the time of the Helvetic Republic. Now that it is a full Canton, Aargau is industrializing fast, especially with textile factories. The many rivers of Aargau allowed for factories to get their energy from the water and lead to many decentralized factories.\nAargau was basically a counterweight to the cantons of Zurich and Bern and nearly did not become a full Canton in 1814/15. Even after 1815 Aargau stayed quite liberal unlike other Cantons. In 1831, a new constitution gave the population even more rights. The government responded to the resistance of the Catholic population to the increased control of the church by the state by occupying rebellious regions."
 dufour.917.t: "Nouvelles fiches publiées: Vaud et Valais"
 dufour.917.d: "D'autres fiches ont été publiées. Cette fois, c'est concentré sur Vaud et le Valais."
 dufour.917.f: "Valais is a big valley in the very south of Switzerland mostly separated from the rest of the country by the Alps. The Rhône river flows through the valley and then into the Lac Léman. The Northern coast of the Lake is part of Vaud, but the Canton extends from Geneva and the Alps to the Jura.\nVaud is still dominated by agriculture but the liberals started to implement changes to grow the industry since 1826. Time will tell if Vaud will remain an agricultural Canton or become a center of industry.\nThanks to diplomatic skill, the canton of Vaud was confirmed after Napoleon's defeat. In return, however, the canton had to accept a more conservative constitution. Thanks to the authoritarian leadership, the liberals gained ground and were able to push through a new constitution in 1830. In the meantime, the radicals were gaining ground and trying to promote democratization.\nValais is dominated by agriculture and its rural population. There is no significant industry and outside connections are limited.\nThe main political conflict in Valais was the one between the German speaking upper Valais and the French speaking lower Valais. Upper Valais has been the dominant part of the Canton even though the Lower Valais had a higher population. The question is whether the liberals and radicals of the lower valley are in a position to promote the democratization of Valais or whether the old forces can stabilize their rule."
 dufour.920.t: "Des voix s'élèvent pour ramener le bouquetin en Suisse"
 dufour.920.d: "Robert Mader, hôtelier propriétaire de l'hôtel « Walhalla » à Saint-Gall, souhaite ramener le bouquetin des Alpes en Suisse. Il propose de construire un parc animalier à Saint-Gall où il préparerait un enclos pour élever les bouquetins afin de les relâcher plus tard dans la nature."
 dufour.920.f: "\"Le bouquetin est un symbole national de la Suisse. Il faut le ramener !\""
 dufour.920.g: "Nous rendrons le bouquetin !"
 dufour.920.h: "Quelle perte de temps!"
