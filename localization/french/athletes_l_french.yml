l_french:
  
 ### 2.4.0 ### 

 athletes.2.t: "Notre montagnard, [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullNameNoFormatting], prend sa retraite" #deepl:814507835
 athletes.2.d: "Après avoir passé des décennies de sa vie [SCOPE.sCharacter('athletes_retired_person_scope').GetHerHis] à escalader des sommets, à tracer des itinéraires inconnus et à mener des expéditions en terrain périlleux, [SCOPE.sCharacter('athletes_retired_person_scope').GetFullName] a décidé de prendre sa retraite. [SCOPE.sCharacter('athletes_retired_person_scope').GetSheHe|U] ne sera plus notre [concept_douglas_mountaineer]." #deepl:3082522384
 athletes.2.f: ""
 athletes.2.g: "Le sommet n'a jamais été la fin - seulement la vue avant la descente." #deepl:3095673486
 athletes.12.t: "Décès de notre alpiniste" #deepl:3903757311
 athletes.12.d: "Après une vie passée à conquérir des sommets et à guider les autres dans les ascensions les plus périlleuses, notre site [concept_douglas_mountaineer] le plus vénéré s'est éteint. Qui va maintenant ouvrir la voie vers les nuages ?" #deepl:820605549
 athletes.12.f: ""
 athletes.12.g: "Leur corde a peut-être disparu, mais leur trace demeure." #deepl:3208123983

 athletes.52.t: "Un nouveau Mountaineer" #deepl:1807684299
 athletes.52.d: "[SCOPE.sCharacter('douglas_new_mountaineer_scope').GetFullName] est un talent prometteur qui pourrait un jour figurer parmi les plus grands de nos sommets." #deepl:1736780592
 athletes.52.f: ""
 athletes.52.g: "[SCOPE.sCharacter('douglas_new_mountaineer_scope').GetSheHe|U] grimpe avec détermination." #deepl:1012883623

 athletes.102.t: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] est désormais un vétéran Mountaineer !" #deepl:4259800261
 athletes.102.d: "Après avoir bravé des glaciers, franchi des lignes de crête et mené des expéditions dans l'inconnu, notre site [concept_douglas_mountaineer] [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] est désormais suffisamment réputé pour être qualifié de vétéran de l'alpinisme !" #deepl:334481273
 athletes.102.f: ""
 athletes.102.g: "Un maître de la montagne !" #deepl:1052077048