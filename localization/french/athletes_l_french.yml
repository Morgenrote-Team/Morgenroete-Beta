l_french:
 athletes.2.t: "Notre montagnard, [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullNameNoFormatting], prend sa retraite"
 athletes.2.d: "Après avoir passé des décennies de sa vie [SCOPE.sCharacter('athletes_retired_person_scope').GetHerHis] à escalader des sommets, à tracer des itinéraires inconnus et à mener des expéditions en terrain périlleux, [SCOPE.sCharacter('athletes_retired_person_scope').GetFullName] a décidé de prendre sa retraite. [SCOPE.sCharacter('athletes_retired_person_scope').GetSheHe|U] ne sera plus notre [concept_douglas_mountaineer]."
 athletes.2.f: ""
 athletes.2.g: "Le sommet n'a jamais été la fin - seulement la vue avant la descente."
 athletes.12.t: "Décès de notre alpiniste"
 athletes.12.d: "Après une vie passée à conquérir des sommets et à guider les autres dans les ascensions les plus périlleuses, notre site [concept_douglas_mountaineer] le plus vénéré s'est éteint. Qui va maintenant ouvrir la voie vers les nuages ?"
 athletes.12.f: ""
 athletes.12.g: "Leur corde a peut-être disparu, mais leur trace demeure."
 athletes.52.t: "Un nouveau Mountaineer"
 athletes.52.d: "[SCOPE.sCharacter('douglas_new_mountaineer_scope').GetFullName] est un talent prometteur qui pourrait un jour figurer parmi les plus grands de nos sommets."
 athletes.52.f: ""
 athletes.52.g: "[SCOPE.sCharacter('douglas_new_mountaineer_scope').GetSheHe|U] grimpe avec détermination."
 athletes.102.t: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] est désormais un vétéran Mountaineer !"
 athletes.102.d: "Après avoir bravé des glaciers, franchi des lignes de crête et mené des expéditions dans l'inconnu, notre site [concept_douglas_mountaineer] [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] est désormais suffisamment réputé pour être qualifié de vétéran de l'alpinisme !"
 athletes.102.f: ""
 athletes.102.g: "Un maître de la montagne !"
 athletes.53.t: "Un nouvel entraîner"
 athletes.53.d: "A new [concept_vikelas_coach] has introduced [SCOPE.sCharacter('vikelas_new_coach_scope').GetHerselfHimself]. [SCOPE.sCharacter('vikelas_new_coach_scope').GetHerHis|U] name is [SCOPE.sCharacter('vikelas_new_coach_scope').GetFullName]."
 athletes.53.f: ""
 athletes.53.g: "[SCOPE.sCharacter('vikelas_new_coach_scope').GetSheHe|U] mènera nos gars à la victoire."
 athletes.103.t: "[ROOT.Var('vikelas_coach_var').GetCharacter.GetFullName] est maintenant Entraîneur principal!"
 athletes.103.d: "[ROOT.Var('vikelas_coach_var').GetCharacter.GetFullName] s'est fait un nom en développant et en entraînant une génération entière de joueurs. [ROOT.Var('vikelas_coach_var').GetCharacter.GetSheHe] est désormais assez réputé pour être considéré comme un entraineur principal."
 athletes.103.f: ""
 athletes.103.g: "Une récompense pour savoir crier sans vergogne sur le terrain."