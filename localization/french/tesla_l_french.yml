l_french:
 
 ### 2.3.0 ###

 tesla_prototype_mechanical_computer_modifier: "Prototype d'ordinateur mécanique" #NT!
 tesla.223.t: "Un premier prototype" #NT!
 tesla.223.d: "Dans sa quête de construire un ordinateur mécanique, le Dr [ROOT.Var('gaudi_engineer_var').GetCharacter.GetLastName] a pu terminer un premier prototype capable d'effectuer des calculs simples. Bien que moins puissant qu'un véritable ordinateur, cet appareil pourrait aider nos scientifiques." #NT!
 tesla.223.f: "Il n'est pas encore capable de faire tous les calculs, mais au moins quelques-uns. L'addition, la soustraction, la multiplication et la division ne devraient pas poser de problème. Mais sachez qu'un de mes assistants a failli perdre son doigt, alors que la machine fonctionnait." #NT!
 tesla.223.g: "J'espère que [ROOT.Var('gaudi_engineer_var').GetCharacter.GetSheHe] finira plus qu'un simple prototype..." #NT!
 tesla.224.t: "Dérive des fonctionnalités" #NT!
 tesla.224.d: "Il semble que le Dr [ROOT.Var('gaudi_engineer_var').GetCharacter.GetLastName] déborde d'idées. Il ne se passe pas un jour sans que les plans de l'ordinateur mécanique ne soient modifiés. La seule question est de savoir si le projet sera un jour achevé." #NT!
 tesla.224.f: "« Mais imaginez s'il pouvait aussi jouer de la musique ! Ne serait-ce pas génial ? »" #NT!
 tesla.224.g: "Pourriez-vous simplement construire cet ordinateur ?" #NT!
 tesla.224.h: "Menacer de réduire le financement" #NT!
 tesla.225.t: "Un incendie endommage un ordinateur mécanique" #NT!
 tesla.225.d: "Un énorme incendie a endommagé des parties de l'ordinateur mécanique du Dr [ROOT.Var('gaudi_engineer_var').GetCharacter.GetLastName] et détruit certains plans de celui-ci. Nous ne savons pas encore dans quelle mesure cela va retarder le projet." #NT!
 tesla.225.f: "L'incendie s'est déclaré au niveau du module d'impression de l'ordinateur. Personne ne sait exactement ce qui a provoqué l'incendie, mais il semble que l'imprimante ait produit de grandes quantités de papier." #NT!
 tesla.225.g: "Cet ordinateur sera-t-il un jour construit ?" #NT!
 tesla.225.h: "Envoyez-leur des fonds supplémentaires." #NT!

 ### 2.3.1 ###

 tesla_modernized_railway_lines_state_modifier: "Lignes de chemin de fer modernisées" #NT!
  
 tesla_railway_project_new_priority_button: "$tesla_topographic_map_project_new_priority_button$" #NT!
 tesla_railway_project_new_priority_button_desc: "$tesla_topographic_map_project_new_priority_button_desc$" #NT!
 tesla_topographic_map_project_new_priority_button: "Changer les états prioritaires" #NT!
 tesla_topographic_map_project_new_priority_button_desc: "#T Changer les États prioritaires#!\nChange les [Concept('concept_state', '$concept_states$')] qui sont prioritaires pour ce projet.\n#n Attention : Mettez le jeu en pause pour vous assurer que la priorisation fonctionne correctement.#!" #NT!
  
 tesla_state_trait_irrigation: "Système d'irrigation" #NT!
 je_tesla_irrigation_project: "Système d'irrigation" #NT!
  
 tesla_states_with_irrigation_tt: "Tous les États [GetPlayer.GetAdjective] ont le trait d’État $tesla_state_trait_irrigation$ (actuellement [GetPlayer.MakeScope.GetVariable('tesla_num_states_irrigation_var').GetValue|+0] / [GetPlayer.MakeScope.GetVariable('tesla_num_states_var').GetValue|V0])." #NT!
  
 tesla_irrigation_project_finished_engineer_loc: "\nLe Dr [GetPlayer.MakeScope.GetVariable('gaudi_engineer_var').GetCharacter.GetLastName] a travaillé sur les nouveaux #b Systèmes d'irrigation#! du [GetPlayer.GetName] et a pu les étendre, ce qui a considérablement amélioré notre secteur agricole." #NT!
 gaudi.1111.t: "Le système d'irrigation de [GetPlayer.GetName]" #NT!
 gaudi.1111.d: "Notre [concept_gaudi_civil_engineer][GetPlayer.MakeScope.GetCountry.GetCustom('gaudi_dr_engineer_type')] a enfin terminé le projet de construction d'un système d'irrigation moderne dans le [GetPlayer.GetNameNoFormatting]. Maintenant que nous avons apprivoisé les rivières et apporté de l'eau aux champs, notre agriculture va sûrement se développer !" #NT!
 gaudi.1111.f: "\"Les rivières sauvages sont maintenant apprivoisées. La magie a disparu. Ce ne sont plus que des voies navigables rectilignes. Même le castor a disparu...\"" #NT!
 gaudi.1111.g: "J'espère que cela n'aura pas de conséquences imprévues..." #NT!

