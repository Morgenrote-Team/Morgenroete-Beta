 tesla_prototype_mechanical_computer_modifier: "Prototype d'ordinateur mécanique"
 tesla.223.t: "Un premier prototype"
 tesla.223.d: "Dans sa quête de construire un ordinateur mécanique, le Dr [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] a pu terminer un premier prototype capable d'effectuer des calculs simples. Bien que moins puissant qu'un véritable ordinateur, cet appareil pourrait aider nos scientifiques."
 tesla.223.f: "Il n'est pas encore capable de faire tous les calculs, mais au moins quelques-uns. L'addition, la soustraction, la multiplication et la division ne devraient pas poser de problème. Mais sachez qu'un de mes assistants a failli perdre son doigt, alors que la machine fonctionnait."
 tesla.223.g: "J'espère que [ROOT.Var('tesla_engineer_var').GetCharacter.GetSheHe] finira plus qu'un simple prototype..."
 tesla.224.t: "Dérive des fonctionnalités"
 tesla.224.d: "Il semble que le Dr [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] déborde d'idées. Il ne se passe pas un jour sans que les plans de l'ordinateur mécanique ne soient modifiés. La seule question est de savoir si le projet sera un jour achevé."
 tesla.224.f: "« Mais imaginez s'il pouvait aussi jouer de la musique ! Ne serait-ce pas génial ? »"
 tesla.224.g: "Pourriez-vous simplement construire cet ordinateur ?"
 tesla.224.h: "Menacer de réduire le financement"
 tesla.225.t: "Un incendie endommage un ordinateur mécanique"
 tesla.225.d: "Un énorme incendie a endommagé des parties de l'ordinateur mécanique du Dr [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] et détruit certains plans de celui-ci. Nous ne savons pas encore dans quelle mesure cela va retarder le projet."
 tesla.225.f: "L'incendie s'est déclaré au niveau du module d'impression de l'ordinateur. Personne ne sait exactement ce qui a provoqué l'incendie, mais il semble que l'imprimante ait produit de grandes quantités de papier."
 tesla.225.g: "Cet ordinateur sera-t-il un jour construit ?"
 tesla.225.h: "Envoyez-leur des fonds supplémentaires."
