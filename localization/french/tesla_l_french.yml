 tesla_state_trait_irrigation: "Système d'irrigation"
 je_tesla_irrigation_project: "Système d'irrigation"
 tesla_states_with_irrigation_tt: "Tous les États [GetPlayer.GetAdjective] ont le trait d’État $tesla_state_trait_irrigation$ (actuellement [GetPlayer.MakeScope.GetVariable('tesla_num_states_irrigation_var').GetValue|+0] / [GetPlayer.MakeScope.GetVariable('tesla_num_states_var').GetValue|V0])."
 tesla_irrigation_project_finished_engineer_loc: "\nLe Dr [GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetLastName] a travaillé sur les nouveaux #b Systèmes d'irrigation#! du [GetPlayer.GetName] et a pu les étendre, ce qui a considérablement amélioré notre secteur agricole."
 gaudi.1111.t: "Le système d'irrigation de [GetPlayer.GetName]"
 gaudi.1111.d: "Notre [concept_gaudi_civil_engineer][GetPlayer.MakeScope.GetCountry.GetCustom('gaudi_dr_engineer_type')] a enfin terminé le projet de construction d'un système d'irrigation moderne dans le [GetPlayer.GetNameNoFormatting]. Maintenant que nous avons apprivoisé les rivières et apporté de l'eau aux champs, notre agriculture va sûrement se développer !"
 gaudi.1111.f: "\"Les rivières sauvages sont maintenant apprivoisées. La magie a disparu. Ce ne sont plus que des voies navigables rectilignes. Même le castor a disparu...\""
 gaudi.1111.g: "J'espère que cela n'aura pas de conséquences imprévues..."
