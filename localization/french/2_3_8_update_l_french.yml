 je_verrier_venus_transit_1874_reason: "Un événement céleste rare approche. La planète Vénus passera directement entre la Terre et le Soleil, projetant son ombre minuscule sur le disque solaire. Les observatoires du monde entier se préparent à ce phénomène fugace, qui pourrait contribuer à définir l'échelle même de notre système solaire." #deepl:3195507086
