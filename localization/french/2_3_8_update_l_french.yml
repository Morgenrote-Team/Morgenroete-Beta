 MR_HIRE_COACH_BUTTON_TT: "#T Engager un entraîneur national#!\nAprès la création de la FIFA et les premiers matches internationaux, un entraîneur national peut être engagé. Les entraîneurs nationaux mettent leurs compétences au service de l'amélioration des résultats des matches. Si un entraîneur ne répond pas aux attentes, il ou elle peut être remplacé(e) après au moins trois ans.[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:3011015130
