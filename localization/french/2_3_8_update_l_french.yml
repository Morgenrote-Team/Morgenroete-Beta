 khaldun.101.d: "Il y a plusieurs siècles, Al-Qarawiyyin était un centre de science et d'apprentissage. Aujourd'hui, elle est redevenue l'une des principales universités du monde." #deepl:2097299752
 khaldun.101.f: "\Al-Qarawiyyin est une université depuis plus longtemps que toutes les universités d'Europe. Elle a abrité de nombreux livres, mais a malheureusement commencé à décliner. Aujourd'hui marque le jour où cette université reprend la place qui lui revient!\N-"" #deepl:2075544153
