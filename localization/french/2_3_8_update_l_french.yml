 nationalization.11.d: "En [TimeKeeper.GetCurrentDate.Format('y')], l'Italie a vu la publication d'un livre de cuisine révolutionnaire qui allait changer à jamais sa culture culinaire. L'auteur, Pellegrino Artusi, allait ainsi contribuer à l'établissement d'une cuisine italienne internationalement reconnue, qui mettait l'accent sur l'unité et la grandeur de la nation." #deepl:4223602969
 nationalization.11.f: "Publié en 1891, "La scienza in cucina e l'arte di mangiare bene" de Pellegrino Artusi est largement considéré comme le premier livre de cuisine italien moderne. À une époque où l'Italie commençait tout juste à se forger une identité nationale, l'ouvrage d'Artusi a joué un rôle essentiel dans l'unification des diverses cuisines régionales en une tradition culinaire nationale cohérente. Sa collection méticuleuse de recettes, présentées avec esprit et clarté, a non seulement établi une nouvelle norme pour la littérature culinaire, mais a également contribué de manière significative à l'amélioration du niveau de vie de la nation en promouvant la qualité, l'innovation et la fierté de la gastronomie locale." #deepl:2207143835
 nationalization.11.g: "Un triomphe de l'art culinaire !" #deepl:1345745332
 nationalization.11.t: "La science dans la cuisine et l'art de bien manger" #deepl:3987888764
 pius.101.d: "Dans les montagnes du sud-est de la France, deux enfants affirment avoir été témoins d'une apparition de la Vierge Marie, suscitant des vagues d'enthousiasme spirituel - et d'inquiétude - dans le monde catholique." #deepl:1912784731
 pius.101.f: "Approchez, mes enfants, n'ayez pas peur. Je suis venu vous annoncer une grande nouvelle...". Dans les alpages qui surplombent le village de La Salette, près de Corps, dans le sud-est de la France, deux enfants bergers rapportent une vision qui bouleverse aujourd'hui les cœurs dans toute la chrétienté. Une dame, rayonnante de lumière et drapée de chagrin, leur est apparue. Elle pleure - des larmes qui tombent pour un monde qui s'est détourné de Dieu. Elle parla de blasphèmes proférés sans honte, de dimanches profanés, de famine et de ruine à venir si l'humanité ne se repentait pas.nCe qui semblait d'abord être une légende rustique est devenu un mouvement. Les pèlerins affluent sur le versant isolé de la montagne. Des moines et des journalistes empruntent les mêmes sentiers. L'Église hésite : certains accueillent la vision comme un appel divin à la pénitence ; d'autres craignent la montée d'un mysticisme populaire et d'une ferveur irrationnelle.\NL'évêque de Grenoble offre une approbation prudente. Les autorités laïques restent méfiantes. Et Rome ? Rome observe, silencieuse. Mais déjà, les cloches sonnent." #deepl:2145205681
 pius.101.g: "Un avertissement céleste." #deepl:3313498992
 pius.101.h: "Rester rationnel." #deepl:499500707
 pius.101.t: "L'Apparition à La Salette" #deepl:3065761669
 pius.102.d: "Dans la petite ville de Lourdes, une jeune fille de quatorze ans affirme avoir vu une dame rayonnante dans une grotte. Ses visions attirent bientôt les pèlerins, la controverse et l'attention de Rome." #deepl:1624678567
 pius.102.f: "Elle était jeune, pieds nus et pauvre. Pourtant, elle parlait d'une beauté qu'aucun mot ne pouvait décrire. Dans une grotte isolée près de Lourdes, au pied des Pyrénées, une paysanne nommée Bernadette Soubirous parle d'une dame vêtue de blanc, avec une ceinture bleue et des roses d'or aux pieds. La vision ne dit d'abord rien, elle sourit. Puis elle parle : de pénitence, de prière, de souffrance, de miséricorde divine. Elle se nomme simplement : L'Immaculée Conception. Au début, les villageois se moquent. Mais lorsque Bernadette découvre une source cachée et affirme qu'elle est une source de guérison, des milliers de personnes commencent à arriver, espérant, priant, pleurant. Les béquilles sont abandonnées. Les témoignages se multiplient. Les sceptiques dénoncent l'hystérie. Médecins, prêtres et politiciens se rendent à Lourdes. L'Église enquête. L'État regarde avec circonspection. Et pourtant, les gens viennent." #deepl:580789021
 pius.102.g: "Un sanctuaire pour la guérison et l'espoir." #deepl:2629250679
 pius.102.h: "Hallucinations !" #deepl:3891021600
 pius.102.t: "L'apparition à Lourdes" #deepl:1767463178
 pius.103.d: "Dans le village irlandais de Knock, quinze témoins rapportent une apparition silencieuse de la Vierge Marie, de saint Joseph et de saint Jean l'Évangéliste. Cette vision bouleverse un peuple longtemps accablé par la pauvreté, l'exil et la domination étrangère." #deepl:143567078
 pius.103.f: "Ils n'ont pas dit un mot. Pourtant, dans ce silence, une nation a entendu l'espoir". La pluie ne cesse de tomber sur l'église paroissiale de Knock, dans le comté de Mayo. Pourtant, quinze villageois sont restés bouche bée. Devant eux, baignée de lumière sur le mur pignon sud, se tenait une assemblée silencieuse : la Vierge Marie en prière, Saint Joseph à ses côtés, Saint Jean l'Évangéliste, vêtu et tenant un Évangile. Derrière eux, un agneau sur un autel et une croix. Aucun message n'a été prononcé, aucun mouvement n'a été fait. Et pourtant, les témoins ont juré de ce qu'ils ont vu - jeunes et vieux, hommes et femmes. Dans un pays éprouvé par la famine, l'émigration et la nostalgie spirituelle, la vision silencieuse a résonné plus fort que les sermons. Des pèlerins arrivèrent bientôt, en quête de guérison, de signes et de consolation. Les autorités anglaises se moquent. Certains membres de l'Église hésitent. Mais parmi les pauvres et les dévots d'Irlande, Knock est devenu un cri sacré pour la dignité." #deepl:216954390
 pius.103.g: "Une lumière sous la pluie." #deepl:4199802423
 pius.103.h: "Ne pas le considérer comme du folklore." #deepl:2853965001
 pius.103.t: "La vision silencieuse à Knock" #deepl:3086062832
 pius.104.d: "Dans le centre du Portugal, trois enfants bergers rapportent des apparitions répétées de la Vierge Marie, qui aboutissent à un phénomène miraculeux dont des milliers de personnes ont été témoins. Leurs visions contiennent des prophéties sur la guerre, la souffrance et l'avenir de l'Église." #deepl:3494130064
 pius.104.f: "À la fin, mon Cœur Immaculé triomphera. Près de la ville de Fátima, dans les collines rurales de Cova da Iria, trois enfants - Lucia, Francisco et Jacinta - parlent d'une dame plus brillante que le soleil, vêtue d'éclat et de douleur. Pendant six mois, elle apparaît à plusieurs reprises, mettant en garde contre la guerre mondiale, la montée des idéologies impies et la persécution des fidèles. Elle appelle à la pénitence, à la prière et à la consécration de la Russie à son cœur. Le 13 octobre 1917, alors que des dizaines de milliers de personnes se tiennent sous une pluie battante, le soleil semble se détacher des cieux, tournoyant et s'écrasant dans le ciel. Certains tombent à genoux. D'autres s'enfuient. Lorsque la lumière s'estompe, leurs vêtements sont secs. La foule se disperse en silence, stupéfaite et effrayée. L'Église est prudente. La presse est divisée. Mais parmi les gens - en particulier les pauvres, les blessés et les fidèles - une nouvelle flamme s'allume : une flamme d'espoir, une flamme d'avertissement, une flamme qui voit la Vierge non seulement comme une mère, mais aussi comme une sentinelle de l'ère à venir." #deepl:2513437425
 pius.104.g: "Tenez compte des avertissements de Fátima." #deepl:1664428204
 pius.104.h: "Démystifier le miracle solaire." #deepl:958137642
 pius.104.t: "Les secrets de Fátima" #deepl:1100906175
 pius.105.d: "Dans un village isolé près de [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName], on signale une apparition de la Vierge Marie. L'histoire se répand rapidement, attirant les pèlerins, les sceptiques et l'attention des autorités ecclésiastiques." #deepl:45703861
 pius.105.f: "Elle se tenait au-dessus des champs, dans une couronne de lumière, et nous regardait comme si elle connaissait le chagrin de chaque âme. Le premier à parler fut un enfant - les yeux écarquillés de crainte, la voix tremblante. Il parla d'une dame plus brillante que l'aube, enveloppée d'éclat et de chagrin, qui apparaissait en silence et observait le monde avec un chagrin profond et conscient. D'autres ont affirmé l'avoir vue aussi. Certains tombèrent à genoux. D'autres ont couru. Tous se souviennent du silence qui a suivi.n L'histoire s'est répandue au-delà du village. Des pèlerins arrivèrent, bougies à la main. Les fidèles prièrent. Les affligés espèrent. Les prêtres débattent. Les fonctionnaires fronçaient les sourcils. Mais les gens continuaient à venir, attirés non par la certitude, mais par quelque chose de plus ancien : le besoin de croire. Qu'il s'agisse d'un miracle, d'une vision ou d'un mythe, l'événement a déjà façonné le cœur de ceux qui en ont été témoins - et la vie de ceux qui doivent maintenant décider de ce qu'il signifie." #deepl:3063415784
 pius.105.g: "Un signe pour les fidèles." #deepl:1177288670
 pius.105.h: "Réprimer l'hystérie." #deepl:1037767630
 pius.105.t: "Notre Dame de [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName]" #deepl:4095895438
 pius.111.d: "Malgré les ordres officiels interdisant les manifestations publiques, une foule de fidèles a entamé une procession spontanée vers le lieu de l'apparition mariale à l'adresse [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName]." #deepl:3379456873
 pius.111.f: "Nous n'avons pas allumé de torches, nous n'avons pas porté de bannières. Seulement des chapelets, le silence et nos pieds dans la poussière.' Ils sont arrivés à l'aube, par deux ou trois, marchant à travers les champs et les hameaux, en chuchotant des prières. À midi, ils étaient des centaines à déferler sur les routes de campagne, certains pieds nus, d'autres en pleurs. Les femmes tenaient des fleurs. Les vieillards marmonnaient des litanies. Les enfants tenaient des icônes sculptées dans le bois. Les autorités avaient déclaré le site fermé. Des soldats montaient la garde. Pourtant, personne n'a arrêté la foule. Peut-être est-ce dû aux chants. Peut-être le silence. Peut-être quelque chose d'invisible. Lorsque les fidèles atteignirent le lieu de la vision, ils s'agenouillèrent, murmurèrent des prières et allumèrent des bougies dans le sol. Aucune voix ne tonnait du ciel. Aucun miracle n'a été observé. Mais quelque chose avait déjà changé. Un peuple avait agi, non pas au mépris de la loi, mais en obéissant à quelque chose de plus ancien que la loi." #deepl:2369382513
 pius.111.g: "Qu'ils prient." #deepl:2163336687
 pius.111.h: "Observez tranquillement." #deepl:3862482018
 pius.111.h_tt: "Il y a de fortes chances qu'il y ait d'autres événements dans le sillage de l'apparition mariale." #deepl:2612943668
 pius.111.i: "Les disperser par la force." #deepl:1733449904
 pius.111.i_tt: "Risque très élevé de collision sanglante." #deepl:202372566
 pius.111.t: "Le cortège ininterrompu" #deepl:3613794317
 pius.112.d: "La confrontation entre les autorités et les fidèles sur le site de la procession mariale interdite a tourné à la violence. Le sol où des visions ont suscité l'espoir porte désormais des traces de sang." #deepl:2719807490
 pius.112.f: "Il y a eu des prières, puis des cris. Les bougies étaient encore allumées lorsque les soldats sont arrivés. Des voix s'élèvent, confuses, puis suppliantes. Une femme est tombée. Un garçon a crié. Personne ne sait qui a donné l'ordre, mais les mousquets ont aboyé, les matraques se sont balancées, les bottes se sont déplacées dans l'encens et la terre. Lorsque le silence est revenu, il était plus lourd qu'avant. L'Église est ébranlée. Les fidèles sont indignés. La presse parle à voix basse - certains parlent d'accident, d'autres de massacre. Le site, dont on murmurait autrefois qu'il était saint, est désormais maudit par la mémoire. Et pourtant, les gens se rassemblent - non pas avec des fleurs, mais avec colère, avec silence, avec un regard qu'aucune loi ne peut éteindre." #deepl:2186004653
 pius.112.g: "Nous regrettons ce qui s'est passé." #deepl:3313805008
 pius.112.h: "Ils sont responsables de cette situation." #deepl:402397332
 pius.112.t: "Du sang sur la terre sacrée" #deepl:1312740775
 pius.113.d: "Un prêtre local est devenu le principal défenseur de l'apparition mariale à [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName]. Ses sermons attirent les foules, ses paroles inspirent l'espoir - et défient l'autorité de l'État. Il s'appelle le père [SCOPE.sCharacter('pius_marian_priest_scope').GetFirstName]." #deepl:1046441460
 pius.113.f: "Elle est apparue aux humbles, pas aux puissants. Et c'est peut-être pour cela qu'ils veulent la faire taire. Dans l'église de pierre qui surplombe le village, un prêtre, le père [SCOPE.sCharacter('pius_marian_priest_scope').GetFirstName], a commencé à prêcher non seulement la miséricorde de la Vierge, mais aussi sa justice. Ses paroles résonnent au-delà de la nef : Si le Ciel a parlé ici, aucun gouvernement ne peut en interdire l'écho. Les pèlerins affluent à ses sermons. Son nom se répand dans les chuchotements et les hymnes. Il prône la paix, mais sa présence galvanise l'agitation. Certains le qualifient de prophète. D'autres, un rebelle en robe.Les autorités se sentent mal à l'aise. L'armée parle d'incitation. La hiérarchie de l'Église hésite, déchirée entre dogme et diplomatie. Une proposition discrète arrive sur votre bureau : Il pourrait être démis de ses fonctions. Discrètement. Discrètement. Mais certains hommes, lorsqu'ils sont réduits au silence, parlent encore plus fort." #deepl:2395659126
 pius.113.g: "Qu'il prêche." #deepl:3471579290
 pius.113.h: "Le convoquer dans la capitale pour négocier." #deepl:1641636788
 pius.113.i: "Le faire disparaître." #deepl:3010062703
 pius.113.t: "La voix dans la chaire" #deepl:3682486724
 pius.114.d: "Dans tout le pays, des croyants catholiques ont commencé à manifester publiquement leur soutien aux apparitions mariales. Ce qui n'était au départ qu'un pèlerinage rural est devenu un mouvement national." #deepl:3473602537
 pius.114.f: "Ils marchaient avec des chapelets à la main, leurs enfants sur les épaules et le nom de la Vierge sur les lèvres. Du village de pêcheurs à la ville industrielle, les signes sont les mêmes : des bougies brûlent aux fenêtres, des hymnes résonnent sur les places des villes, des milliers de personnes se rassemblent en silence. Aucune bannière n'est déployée - seulement des statues, des icônes et un seul nom murmuré encore et encore : Maria. Ce qui n'était au départ qu'une dévotion est devenu un défi. En réponse aux violences commises sur le site sacré de [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName], les fidèles sont descendus dans la rue. Ils ne crient pas. Ils prient. Mais leur nombre augmente chaque jour.\NCertains membres du gouvernement appellent à la tolérance. D'autres exigent des mesures de répression. L'armée est agitée. Et dans les foyers du pays, même les sceptiques s'interrogent : si tant de gens croient, cela peut-il encore être un mensonge ?" #deepl:3107082794
 pius.114.g: "Autoriser la procession nationale." #deepl:3918828179
 pius.114.h: "Interdire la procession nationale." #deepl:1813497751
 pius.114.t: "La procession qui a ébranlé la nation" #deepl:738056863
 pius.115.d: "Une grave perte de récoltes a frappé plusieurs régions rurales de [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName]. Parmi les fidèles, un dangereux murmure commence à se répandre : la Vierge, autrefois réduite au silence par l'État, pleure aujourd'hui - et punit." #deepl:3238123436
 pius.115.f: "Elle a demandé des prières. Nous lui avons donné des soldats. Les pluies n'ont pas été au rendez-vous. Le blé jaunit trop tôt. Les pommes de terre ont pourri sous la terre, invisibles et amères. Les villageois parlent de champs qui se sentent... abandonnés. Pas seulement par les hommes, mais par la miséricorde. Et c'est ainsi qu'ils chuchotent. De la femme de lumière qui est apparue un jour - et dont on s'est moqué. Du prêtre qui a disparu. Du sanctuaire scellé et des pèlerins battus. Aujourd'hui, disent-ils, elle a détourné son visage. Les bougies brûlent à nouveau, mais désormais derrière des fenêtres fermées. Les mères baptisent leurs enfants en secret. Des vieillards enterrent des croûtes de pain en guise d'offrande. L'Église n'ose pas parler, mais le peuple croit déjà : C'est son chagrin. Ou son avertissement." #deepl:2485032935
 pius.115.g: "Superstition ! J'espère..." #deepl:2447781343
 pius.115.t: "Les champs sont vides" #deepl:3151937266
 pius.116.d: "Après des années de répression et de miracles refusés, de nombreux citoyens autrefois fervents ont commencé à abandonner leur foi en [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName]. Un nombre croissant d'entre eux se décrivent aujourd'hui non pas comme catholiques, mais comme n'étant rien du tout." #deepl:1323000478
 pius.116.f: "Elle ne vient plus. Ni dans les rêves, ni dans les visions. Les bougies ne sont plus allumées. Le sanctuaire est fermé. Le prêtre est parti. Les champs sont silencieux. Il fut un temps où même les plus pauvres murmuraient des Ave Maria avant de s'endormir, où les icônes étaient suspendues à côté des foyers et où les larmes coulaient au son des cloches. Aujourd'hui, les églises sont vides. Les enfants demandent ce qu'était la "confession". Les jeunes parlent de raison, de progrès, de rien. Le peuple ne s'est pas tourné vers l'idéologie. Ils se sont tournés vers la cendre. Ce ne sont pas des radicaux. Ils sont épuisés. Et quelque part dans le silence creux, la question persiste : nous a-t-elle quittés - ou l'avons-nous quittée ?" #deepl:231766477
 pius.116.g: "L'âge de la foi est révolu." #deepl:146424195
 pius.116.t: "Le silence au-delà de la cloche" #deepl:2179217507
 pius.119.d: "Le nouveau gouvernement athée a ordonné la fermeture du site de pèlerinage marial. Ce qui était autrefois un lieu de lumière et de prière est aujourd'hui bouclé, silencieux, sous la surveillance de l'État." #deepl:1939840262
 pius.119.f: "Aucune cloche n'a sonné. Aucune bougie ne brûlait. Les portes ont été fermées avant le lever du soleil". Le sanctuaire qui attirait autrefois des milliers de personnes est aujourd'hui isolé. Un avis a été cloué sur la porte de la chapelle : "Par ordre de l'Assemblée du peuple, cette structure est déclarée non essentielle". Des gardes montent la garde, non pas pour protéger, mais pour empêcher. Aucune protestation n'a été autorisée. Le changement s'est fait discrètement, bureaucratiquement - une absence plutôt qu'une explosion. Pourtant, dans les foyers du pays, des mains âgées tremblent. Les grands-mères cachent leurs chapelets. Les enfants demandent pourquoi les pèlerins ne chantent plus. Le Parti parle de science, de raison et de progrès. Et quelque part, derrière des portes closes, une question clignote comme une bougie à moitié consumée : Était-ce vraiment nécessaire ?" #deepl:3255413028
 pius.119.f: "Aucune cloche n'a sonné. Aucune bougie ne brûlait. Les portes ont été fermées avant le lever du soleil". Le sanctuaire qui attirait autrefois des milliers de personnes est aujourd'hui isolé. Un avis a été cloué sur la porte de la chapelle : "Par ordre de l'Assemblée du peuple, cette structure est déclarée non essentielle". Des gardes montent la garde, non pas pour protéger, mais pour empêcher. Aucune protestation n'a été autorisée. Le changement s'est fait discrètement, bureaucratiquement - une absence plutôt qu'une explosion. Pourtant, dans les foyers du pays, des mains âgées tremblent. Les grands-mères cachent leurs chapelets. Les enfants demandent pourquoi les pèlerins ne chantent plus. Le Parti parle de science, de raison et de progrès. Et quelque part, derrière des portes closes, une question clignote comme une bougie à moitié consumée : Était-ce vraiment nécessaire ?" #deepl:3255413028
 pius.119.g: "Nous ne construisons plus de monuments aux illusions." #deepl:702720701
 pius.119.t: "Fermeture du sanctuaire" #deepl:589514149
 pius.121.d: "L'apparition mariale sur le site [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName] a été officiellement reconnue comme un signe positif. Mais aujourd'hui encore, sa véritable signification reste sujette à interprétation." #deepl:181746716
 pius.121.f: "Au cours des semaines qui ont suivi l'apparition de la silhouette rayonnante aux villageois, aucun autre signe n'a suivi. Pas de feu du ciel. Pas de voix dans les nuages. Seulement un ciel calme et l'écho persistant de l'émerveillement. Pourtant, les gens parlent - de paix, de guérison, de quelque chose qui a changé dans l'âme de la nation. Les pèlerins ne viennent pas avec frénésie, mais avec respect. Le clergé prêche doucement. La presse, pour une fois, rend compte de l'événement sans se moquer : Que signifie ce miracle ?" #deepl:3589438214
 pius.121.g: "Une bénédiction pour les gens ordinaires." #deepl:560950828
 pius.121.h: "Un signe divin pour notre clergé." #deepl:2114621818
 pius.121.h_tt: "Cette mesure peut avoir des conséquences inconnues et graves." #deepl:1123613034
 pius.121.i: "Une indication de la légitimité de notre gouvernement." #deepl:1976662076
 pius.121.t: "Que veut-elle dire ?" #deepl:1525290236
 pius.122.d: "Le site de l'apparition mariale est désormais un lieu de pèlerinage pleinement reconnu, qui attire des fidèles de plus en plus nombreux, de près ou de loin." #deepl:3557311135
 pius.122.f: "Là où il n'y avait autrefois que des pâturages, on trouve maintenant des bougies, des roses et les pas silencieux de milliers de personnes. Les routes se sont élargies. Les champs ont été défrichés. Une modeste chapelle s'élève près de l'endroit où les enfants parlaient autrefois d'une Dame vêtue de lumière. Chaque jour, des pèlerins arrivent : des paysans avec leurs fils, des veuves en noir, des soldats en permission, des mères murmurant des prières pour leurs enfants à naître.L'Eglise a reconnu le caractère sacré du site. Un sanctuaire est en cours de construction. Des marchés fleurissent à ses abords, offrant du pain, des médailles, des chapelets, du vin. Ce qui était autrefois une histoire dont on doutait dans les salons est maintenant une présence ressentie dans les os de la nation.\N-Et tandis que les cloches sonnent dans la vallée, on se demande : S'agit-il d'une foi renaissante ou d'un germe de quelque chose de plus grand encore à venir ?" #deepl:307938956
 pius.122.g: "Totus tuus." #deepl:314650754
 pius.122.t: "Le sanctuaire de [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName]" #deepl:3872076082
