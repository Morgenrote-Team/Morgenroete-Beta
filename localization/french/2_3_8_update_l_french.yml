 dubois.2173.f: "Le plésiosaure est un ordre de reptiles marins. On trouve des fossiles de ces animaux dans le monde entier. Selon les espèces, les animaux mesuraient entre 1,5 et 15 mètres de long. Selon l'espèce, ils se nourrissaient probablement de différents animaux. Leurs mâchoires en forme de U et leurs dents acérées, qui ressemblent à un piège à poissons, leur permettaient de disposer d'un outil utile." #deepl:1725138010
 dubois.2173.t: "Plesiosaurus" #deepl:3684543079
 dubois.2174.f: "Le basilosaurus n'est pas un dinosaure, mais une forme préhistorique de baleine. Son long corps rappelle celui d'un long serpent, mais avec une longueur allant jusqu'à 20 mètres, il est similaire en longueur au cachalot." #deepl:4279559397
 dubois.2174.t: "Basilosaurus" #deepl:3895138572
 dubois.2175.f: "Le gigantesque requin Megalodon est probablement le plus grand requin ayant jamais existé. Il est cependant difficile d'estimer sa longueur, car seules des dents et des vertèbres ont été retrouvées. Nos paléontologues estiment qu'il mesurait entre 9 et 30 mètres. Quoi qu'il en soit, ce squelette de requin est époustouflant et constitue l'un des joyaux de notre collection." #deepl:1066794911
 dubois.2175.t: "Mégalodon" #deepl:439976392
