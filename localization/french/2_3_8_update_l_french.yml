 concept_verrier_venus_transit: "Le transit de Vénus" #deepl:3328636769
 concept_verrier_venus_transit_desc: "Le transit de Vénus est un phénomène rare au cours duquel la lune passe entre la Terre et Vénus. Il s'est toutefois produit à deux reprises au cours du 19e siècle : en 1874 et en 1882. Les observations du passage de Vénus permettant de tirer des conclusions sur la taille du système solaire et de déterminer plus précisément la taille de l'unité astronomique (UA), il s'agit d'événements scientifiques majeurs. Les pays situés sur le site [concept_verrier_venus_transit_zone] peuvent observer l'événement depuis leur territoire, les autres pays doivent envoyer des expéditions. Le succès de l'observation dépend de l'expérience du [concept_verrier_astronomer], de la disponibilité d'un [concept_gaudi_engineer], et d'un peu de chance : il arrive que les conditions météorologiques empêchent d'obtenir une bonne image. Plus l'observation est bonne, plus la prime est importante." #deepl:1890935103
 concept_verrier_venus_transit_zone: "Zone de transit de Vénus" #deepl:535627695
 concept_verrier_venus_transit_zone_desc: "La zone de transit de Vénus désigne la partie de la Terre à partir de laquelle un transit complet (et pas seulement partiel) de Vénus peut être observé. En 1874, c'était particulièrement vrai pour la région Asie-Pacifique orientale, et en 1882 pour la quasi-totalité du continent américain. Une répartition détaillée des régions stratégiques est fournie ci-dessous.\n-#V Passage de Vénus 1874 :#!\nIndonésie, Indochine, Océanie, Chine du Sud, Chine du Nord, Mandchourie, Japon, Inde centrale, Madras, Bengale, Himalaya ; également, l'État du Territoire de l'Océan Indien.\#V Transit de Vénus 1882 :#! Brésil, La Plata, Andes, Grande Colombie, Mexique, Amérique centrale, Caraïbes, Midwest, Dixie, Nouvelle-Angleterre ; ainsi que les Etats de l'Ontario et du Québec." #deepl:1055797749
 concept_vikelas_coach: "Entraîneur" #deepl:3572285288
 concept_vikelas_coach_desc: "Les entraîneurs sont les formateurs nationaux d'un pays dans un sport national spécifique. Les sports nationaux comprennent [concept_vikelas_football], le baseball, le basket-ball et le cricket. Les entraîneurs apportent des bonus à leur équipe lors des compétitions, qu'il s'agisse de championnats du monde internationaux ou de matchs internationaux. Ces derniers sont joués secrètement à intervalles réguliers et augmentent la valeur d'expérience de l'entraîneur en cas de victoire. Des points d'expérience élevés et une adresse [Concept('concept_character_trait','$concept_character_traits$')] positive augmentent les chances de remporter un championnat du monde. Les traits positifs sont ceux qui motivent particulièrement les joueurs, comme l'ambition ou le charisme, tandis que les traits démotivants réduisent les chances de gagner un match. Il s'agit de traits tels que l'impitoyabilité ou la cruauté.#R NOTE : Pour l'instant, seul le football est intégré.#!" #deepl:183600896
 concept_vikelas_coaches: "Entraîneurs" #deepl:3998480532
 concept_vikelas_football: "Football" #deepl:3334413449
 concept_vikelas_football_desc: "Le football est un sport national possible. Les premiers clubs de football peuvent être créés en Europe et en Amérique du Sud ; il faut pour cela un système juridique relativement libéral, une petite bourgeoisie forte ou un niveau de vie moyen considérable. Par la suite, des matchs de football occasionnels pourront être joués. Avec la création de la FIFA, les matches internationaux et la Coupe du monde deviennent également possibles. Les huit meilleures équipes se qualifient automatiquement pour la Coupe du monde. Les équipes sont calculées en fonction de la valeur de l'équipe nationale de football (NFTV), qui est dérivée des paramètres suivants : niveau de vie (forme physique de la population), force de la petite bourgeoisie (système de clubs), alphabétisation (tactique) et tradition (sport national : oui ou non ?). Lors des matchs, on tient compte non seulement du NFTV, mais aussi des traits de caractère et de l'expérience du joueur [concept_vikelas_coach]." #deepl:3000477120
 country_artists_decorative_can_promote_architect_boolean_desc: "Si vous avez au moins un [GetBuildingType('building_arts_academy').GetName] avec le [concept_pm_artists_academy_school], vous pouvez promouvoir un [concept_gaudi_architect] dans la liste des artistes." #deepl:738833409
