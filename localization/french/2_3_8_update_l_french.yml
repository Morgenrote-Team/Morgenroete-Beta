 verrier.308.d: "Les astronomes ont prévu un transit de Vénus dans la région Australie-Indonésie-Pacifique en #ORANGE 1874#!. La communauté scientifique de [ROOT.GetCountry.GetNameNoFlag] demande à observer cet événement astronomique unique." #deepl:1738426681
 verrier.308.f: "Un transit de Vénus est un passage de la planète Vénus devant le Soleil. L'apparition ne se produit que quatre fois en 243 ans environ. Historiquement, la mesure précise de ces passages était d'une grande importance pour déterminer la distance entre la terre et le soleil (unité astronomique) et a donné lieu à de nombreuses expéditions et campagnes de mesures de la part d'instituts et de scientifiques importants. Le passage de Vénus en 1874 a été relativement défavorable aux mesures astronomiques. Il est resté invisible depuis la quasi-totalité de l'Europe, des temps de passage longs n'ont été observés que depuis l'Asie et des temps de passage courts depuis l'Australie, les îles du Pacifique Sud et le sud de l'océan Indien (notamment l'archipel des Kerguelen). Néanmoins, une soixantaine d'expéditions ont été envoyées." #deepl:3786277450
 verrier.308.g: "Nous ne devrions pas manquer cela." #deepl:2334937119
 verrier.308.t: "Le transit de Vénus en 1874" #deepl:3101017563
 verrier.309.d: "Les astronomes ont prédit un autre transit de Vénus pour les régions d'Amérique du Sud, d'Amérique centrale et d'Amérique du Nord-Est en #ORANGE 1882#!. La communauté scientifique de [ROOT.GetCountry.GetNameNoFlag] demande à observer cet événement astronomique unique." #deepl:3366532829
 verrier.309.f: "Un transit de Vénus est un passage de la planète Vénus devant le Soleil. L'apparition ne se produit que quatre fois en 243 ans environ. Historiquement, la mesure précise de ces passages était d'une grande importance pour déterminer la distance entre la terre et le soleil (unité astronomique) et a donné lieu à de nombreuses expéditions et campagnes de mesure de la part d'instituts et de scientifiques importants. Le passage de Vénus de 1882 présentait certains avantages par rapport à celui de 1874, car il était visible dans certaines régions plus accessibles. Ainsi, le passage était visible sur l'ensemble du continent américain, à l'exception du nord et du nord-est de l'Amérique du Nord." #deepl:1503344549
 verrier.309.t: "Le transit de Vénus en 1882" #deepl:2995649523
 verrier.311.d: "Un événement astronomique rare approche : la planète Vénus va traverser la face du soleil. Partout dans le monde, les observatoires et les gouvernements commencent à se préparer." #deepl:4200477530
 verrier.311.f: "La date a été calculée à la seconde près. Les télescopes sont emballés. Les horloges sont synchronisées. La planète Vénus va traverser la face du soleil. Les astronomes pensent que ce passage permettra de mesurer avec précision l'unité astronomique, l'échelle fondamentale du système solaire. Mais le succès de l'opération dépend entièrement de la visibilité, de l'emplacement, des conditions météorologiques et de la coordination." #deepl:2621945333
 verrier.311.g: "Nous observons le transit depuis notre domicile." #deepl:2383387639
 verrier.311.h: "Nous envoyons une expédition dans l'un de nos protectorats." #deepl:1098022190
 verrier.311.i: "Nous envoyons une expédition dans un pays lointain." #deepl:381412623
 verrier.311.j: "Nous devrions y réfléchir à nouveau." #deepl:1178423846
 verrier.311.t: "Préparation du transit de Vénus" #deepl:967668025
 verrier.319.d: "Une expédition de [SCOPE.sCountry('verrier_venus_transit_leader').GetName] est arrivée sur notre territoire pour observer le rare phénomène astronomique du passage de Vénus." #deepl:853589
 verrier.319.f: "Ils débarquent avec des caisses de lentilles, d'horloges et de cartes. Leurs porte-parole ont rencontré les responsables des universités, leur proposant une correspondance amicale et des séances d'information technique. Les assistants des observatoires sont curieux, les journaux neutres mais vigilants. Plusieurs départements débattent des implications : coopération scientifique, oui, mais aussi échange de données, souveraineté logistique et visibilité sur la scène mondiale." #deepl:209223472
 verrier.319.g: "Que la science soit notre langage commun." #deepl:183308092
 verrier.319.t: "Les yeux étrangers vers le ciel" #deepl:4019861958
 verrier.321.d: "Une violente tempête s'est abattue sur le navire d'expédition pendant la traversée. Au milieu des vagues déferlantes et du gréement chaotique, plusieurs caisses ont été arrachées du pont et perdues dans la mer, y compris de délicats instruments de transit." #deepl:2127492192
 verrier.321.f: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName] se sont accrochés à la rambarde alors que le ciel se brisait. La mer s'est soulevée comme une ennemie, projetant cordes et tonneaux sur le pont. Les caisses - il y en avait deux - glissèrent dans un arc effroyable avant de disparaître dans le noir.\NPlus tard, lorsque la tempête fut passée et qu'il ne resta plus que le silence, on compta les dégâts. L'héliomètre principal. Une double lentille de Königsberg. Plusieurs pièces d'horlogerie précises.\NLe Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] se tenait au milieu de l'équipage trempé et du bois cassé, regardant le vide où se trouvait l'équipement. Il y avait des sauvegardes. Et le temps, comme Vénus, n'attend personne." #deepl:2744264311
 verrier.321.g: "Poursuivez. Nous avons encore assez d'éléments pour poursuivre." #deepl:1985224258
 verrier.321.t: "Tempête sur le transit" #deepl:2256455346
 verrier.322.d: "Lors de l'étalonnage nocturne du champ d'étoiles, l'astronome de l'expédition a noté des mouvements irréguliers et des points fixes là où il ne devrait pas y en avoir. Une comparaison plus poussée avec les cartes stellaires disponibles l'a confirmé : l'équipe a peut-être identifié de nouveaux corps célestes non répertoriés." #deepl:2064965258
 verrier.322.f: "Le navire dérive sous un ciel de velours. Les nuages s'étaient dissipés quelques heures plus tôt, laissant derrière eux une clarté si pure qu'elle paraissait artificielle. Le docteur [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] se pencha à nouveau dans l'oculaire. Là, entre Altaïr et le bord de la grille du sextant, il y avait un mouvement. Trop lent pour une comète. Trop régulier pour une faille. Nuit après nuit, [ROOT.Var('verrier_astronomer_var').GetCharacter.GetSheHe] est retourné sur le même coin de ciel, dessinant, calculant, comparant. Finalement, les notes de [ROOT.Var('verrier_astronomer_var').GetCharacter.GetHerHis] l'ont confirmé : un objet planétaire mineur. Peut-être deux. Non répertorié. Vénus attendra. Mais les étoiles avaient déjà offert quelque chose d'autre." #deepl:1791725592
 verrier.322.g: "Qu'on se le dise : les cieux ont encore des secrets." #deepl:1342826733
 verrier.322.t: "Lumières inattendues" #deepl:1561684464
 verrier.323.d: "Lors d'une pause, l'équipe de l'expédition s'est aventurée à l'intérieur des terres afin de repérer des points d'élévation potentiels pour l'observation astronomique. Au lieu de cela, ils ont découvert un bosquet de plantes inconnues, dont aucune n'apparaît dans les archives botaniques disponibles." #deepl:3286240010
 verrier.323.f: "Tout a commencé par une odeur. Subtile, aiguë comme celle d'un agrume, s'élevant des fougères à l'orée de la forêt. Le docteur [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] suivit l'odeur à travers un sous-bois dense et trouva une clairière où la lumière s'accumulait comme de l'eau.\NIl y avait des tiges d'un violet profond qui fleurissaient en spirale parfaite. De la mousse rouge recouvrait des pierres de couleur obsidienne. Tout en haut, des grappes de vigne en forme d'étoiles pendantes se balançaient dans la brise. Personne ne pouvait les nommer.\NL'un des plus jeunes assistants murmura : "On dirait que le ciel est tombé sur la terre."\NIls étaient venus pour chasser la planète Vénus. Mais ici, dans l'air calme et la lumière filtrée, ils ont trouvé un autre type d'émerveillement." #deepl:808904157
 verrier.323.f: "Tout a commencé par une odeur. Subtile, aiguë comme celle d'un agrume, s'élevant des fougères à l'orée de la forêt. Le docteur [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] suivit l'odeur à travers un sous-bois dense et trouva une clairière où la lumière s'accumulait comme de l'eau.\NIl y avait des tiges d'un violet profond qui fleurissaient en spirale parfaite. De la mousse rouge recouvrait des pierres de couleur obsidienne. Tout en haut, des grappes de vigne en forme d'étoiles pendantes se balançaient dans la brise. Personne ne pouvait les nommer.\NL'un des plus jeunes assistants murmura : "On dirait que le ciel est tombé sur la terre."\NIls étaient venus pour chasser la planète Vénus. Mais ici, dans l'air calme et la lumière filtrée, ils ont trouvé un autre type d'émerveillement." #deepl:808904157
 verrier.323.g: "Prélever des échantillons et les conserver pour l'étude." #deepl:1767661174
 verrier.323.t: "Un jardin entre les étoiles" #deepl:2845961206
 verrier.324.d: "En cherchant un terrain d'observation surélevé, l'expédition est tombée sur un site d'un immense intérêt géologique. La pierre environnante présente des motifs et des inclusions rarement - voire jamais - observés auparavant." #deepl:539957699
 verrier.324.f: "Le Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] a passé sa main [ROOT.Var('verrier_astronomer_var').GetCharacter.GetHerHis] le long de la surface stratifiée de l'affleurement. Elle scintillait faiblement dans la lumière du matin, fracturée par des coutures aux reflets métalliques. Des tourbillons d'un vert profond s'enroulaient autour de noyaux de cristaux orange, formant un motif qui semblait presque délibéré.\NPrès de là, une autre dalle révélait une bulle fossilisée - creuse et toujours intacte. Un géologue de l'équipe a suggéré une origine volcanique. Un autre a secoué la tête : "C'est plus vieux que tout ce que j'ai vu."\NLes instruments qu'ils ont apportés ont été construits pour observer le ciel. Mais ici, dans la roche sous leurs bottes, se trouvait un fragment de la mémoire profonde de la Terre." #deepl:908721635
 verrier.324.f: "Le Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] a passé sa main [ROOT.Var('verrier_astronomer_var').GetCharacter.GetHerHis] le long de la surface stratifiée de l'affleurement. Elle scintillait faiblement dans la lumière du matin, fracturée par des coutures aux reflets métalliques. Des tourbillons d'un vert profond s'enroulaient autour de noyaux de cristaux orange, formant un motif qui semblait presque délibéré.\NPrès de là, une autre dalle révélait une bulle fossilisée - creuse et toujours intacte. Un géologue de l'équipe a suggéré une origine volcanique. Un autre a secoué la tête : "C'est plus vieux que tout ce que j'ai vu."\NLes instruments qu'ils ont apportés ont été construits pour observer le ciel. Mais ici, dans la roche sous leurs bottes, se trouvait un fragment de la mémoire profonde de la Terre." #deepl:908721635
 verrier.324.g: "Cette découverte fait partie de l'histoire de la Terre elle-même." #deepl:2450655201
 verrier.324.t: "La pierre au-delà du temps" #deepl:2335051515
 verrier.325.d: "L'expédition est arrivée au port d'entrée, mais les autorités douanières refusent un dédouanement immédiat. Plusieurs caisses de matériel scientifique ont été retenues pour inspection et les agents demandent des documents supplémentaires qui n'ont jamais été exigés auparavant." #deepl:2525277400
 verrier.325.f: "Le Dr [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] se tenait à côté du manifeste, les dents serrées. Les lentilles de mercure, les horloges de précision, les boîtiers en laiton poli - ils étaient inertes dans un entrepôt derrière une porte verrouillée, attendant l'encre et les timbres.\NLe douanier était poli, mais ferme : "Scientifiques ou non, tous les instruments étrangers doivent être déclarés, inspectés et taxés, sauf s'ils sont exemptés par un traité."\NIl n'y avait pas de temps pour les traités.\NDehors, le soleil se levait encore. Et Vénus n'attendrait pas la bureaucratie." #deepl:34765689
 verrier.325.f: "Le Dr [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] se tenait à côté du manifeste, les dents serrées. Les lentilles de mercure, les horloges de précision, les boîtiers en laiton poli - ils étaient inertes dans un entrepôt derrière une porte verrouillée, attendant l'encre et les timbres.\NLe douanier était poli, mais ferme : "Scientifiques ou non, tous les instruments étrangers doivent être déclarés, inspectés et taxés, sauf s'ils sont exemptés par un traité."\NIl n'y avait pas de temps pour les traités.\NDehors, le soleil se levait encore. Et Vénus n'attendrait pas la bureaucratie." #deepl:34765689
 verrier.325.g: "Payez la redevance et accélérez le processus de dédouanement." #deepl:240478226
 verrier.325.t: "Barrières sous le ciel" #deepl:2346862710
 verrier.340.d: "Après des semaines de préparation, le poste d'observation du passage de Vénus est terminé. Les instruments sont calibrés. Les cartes sont vérifiées. La seule inconnue est désormais le ciel." #deepl:1138273071
 verrier.340.f: "Le dôme s'élevait comme un phare d'airain et d'objectif tranquille. Qu'il ait été construit en pierre sur le sol national ou en toile et rivets dans un champ étranger, il abritait désormais le calme haletant de l'attente.  À l'intérieur, l'héliomètre brille sous la lumière de la lampe. Les engrenages tournent en chuchotant. Les minuteries cliquaient dans l'attente. À l'extérieur, des assistants balayaient la poussière des lentilles. Même l'air semble hésiter. Le docteur [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] se tient à la porte et touche le seuil. Pendant des mois, tout avait évolué vers ce moment. Maintenant, il n'y a plus rien à construire, il n'y a plus qu'à attendre. Au-dessus d'eux, quelque part dans le ciel invisible, Vénus suit sa trajectoire." #deepl:2967275520
 verrier.340.g: "La précision commence par des mains calmes." #deepl:2872475059
 verrier.340.t: "L'observatoire est prêt pour le transit de Vénus" #deepl:966063237
 verrier.341.d: "Le Dr. [ROOT.Var('gaudi_engineer_var').GetCharacter.GetLastName] a proposé une modification mineure mais significative du stabilisateur interne du télescope principal. Cette modification pourrait réduire les vibrations internes et augmenter la netteté optique au moment du contact." #deepl:491784908
 verrier.341.f: "Cela s'est passé non pas dans le dôme, mais dans la tente-atelier qui se trouve derrière. Le Dr [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] était en train d'étudier les tableaux lorsque le Dr [ROOT.Var('gaudi_engineer_var').GetCharacter.GetLastName] s'est approché, tenant un bloc-notes maculé de graisse. Une tension tampon recalculée. Un support révisé pour l'anneau de laiton intérieur.\NLes autres ont écouté avec un scepticisme respectueux - jusqu'à ce que les tests le prouvent : l'image était plus stable de quelques fractions de degré. Suffisamment pour déplacer la frontière entre le flou et la clarté." #deepl:2995793810
 verrier.341.g: "Un petit changement avec une grande précision." #deepl:1641676745
 verrier.341.t: "L'ajustement silencieux" #deepl:3486983252
 verrier.342.d: "Une récente avancée dans la théorie électromagnétique a permis d'appliquer une nouvelle méthode de filtrage optique au protocole d'observation du télescope. Les interférences dues à la diffusion de la lumière atmosphérique peuvent désormais être mieux prises en compte, ce qui permet d'obtenir des données visuelles plus claires." #deepl:2503805121
 verrier.342.f: "L'idée n'est pas venue du dôme, ni de l'établi du fabricant de lentilles, mais d'une page. Il s'agissait d'un raffinement des équations d'ondes - comment la lumière ne se comporte pas simplement comme une particule ou un rayon, mais comme un champ oscillant. Grâce à cela, un nouveau modèle d'interférence pouvait être prédit et une correction appliquée. Les filtres ont été recoupés. Les temps d'exposition ont été ajustés. Les ingénieurs ont revérifié leurs doutes.\NLorsque le Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] a regardé à travers l'objectif de test cette nuit-là, les étoiles n'ont plus tressailli. Elles se tenaient - précises, froides, réelles. Le ciel avait cessé de trembler." #deepl:914121255
 verrier.342.g: "Les mathématiques aiguisent le regard." #deepl:2639991371
 verrier.342.t: "L'équation de la clarté" #deepl:1039194191
 verrier.351.d: "À travers les continents et les océans, de Yokohama à la Réunion, de Kerguelen à Pékin, les astronomes ont observé la planète Vénus traverser la face du Soleil. Le transit de 1874 est terminé - et de nombreuses équipes font état de succès." #deepl:3119534429
 verrier.351.f: "Ils sont venus en bateau à vapeur, à dos de chameau, en train et à pied. Ingénieurs, botanistes, cartographes. Ils ont construit des observatoires dans les jungles et les déserts. Ils ont étudié le temps, chronométré les ombres, poli les lentilles jusqu'à ce qu'elles tremblent dans leurs mains.\NEt pendant six heures, le 9 décembre 1874, ils ont regardé un point noir glisser sur le disque solaire.\NVénus est entrée comme un murmure et est sortie comme un secret. Les mesures ne sont pas parfaites, mais suffisantes. La triangulation pouvait commencer. Pour la première fois, l'humanité pourrait connaître la véritable échelle de son système solaire, non pas sous forme de mythe ou de métaphore, mais sous forme de nombres tracés par l'ombre. Le docteur [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] ferma le carnet [ROOT.Var('verrier_astronomer_var').GetCharacter.GetHerHis] et expira : C'était fait." #deepl:1827747392
 verrier.351.g: "C'est magnifique" #deepl:2882436754
 verrier.351.t: "Le transit de 1874" #deepl:2395808814
 verrier.352.d: "Le 6 décembre 1882, la planète Vénus est repassée devant le Soleil. Pour la dernière fois depuis un siècle, les observateurs du monde entier ont fixé leurs instruments vers le ciel et ont capturé le disque noir de Vénus en vol." #deepl:3903856343
 verrier.352.f: "Cette fois, les navires sont partis plus tôt. Les observatoires sont plus solides. Les horloges plus précises. Les leçons apprises en 1874 ont guidé chaque main, chaque ombre, chaque calcul. Du New Jersey à la Patagonie, du Mexique à l'Australie, le monde s'est arrêté pour un point sur le soleil. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] a ajusté le dernier filtre. Le disque est apparu, glissant lentement sur le blanc flamboyant. Il n'y eut pas d'applaudissements, seulement le bruissement des stylos, le claquement des volets, le souffle silencieux du triomphe. Il faudra attendre 121 ans avant que Vénus ne revienne. Mais ici, en cet instant, le temps lui-même a été mesuré." #deepl:907305697
 verrier.352.g: "Nous ne verrons jamais le prochain." #deepl:2603880366
 verrier.352.t: "Le transit de 1882" #deepl:2224364038
 verrier.353.d: "Alors que le moment tant attendu approche, les conditions météorologiques commencent à se dégrader. Les nuages s'amoncellent - pas assez épais pour tout masquer, mais suffisamment pour fausser la clarté et la synchronisation." #deepl:1325753029
 verrier.353.f: "Le ciel ne s'est pas entièrement refermé, mais il n'obéit plus. Des couches de nuages à la dérive s'étendaient sur le soleil comme une gaze. La lumière s'affaiblit et s'enflamme en pulsations irrégulières. Chaque lentille luttait pour son équilibre, chaque assistant pour son souffle. Le Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] gardait [ROOT.Var('verrier_astronomer_var').GetCharacter.GetHerHis] l'œil fixé à travers le filtre. La silhouette de Vénus a émergé - faible, réfractée, dansant entre la vapeur et le calcul.\NCe n'était pas un arc propre. Ce n'était pas une observation classique. Mais c'étaient des données. Des données durement acquises sous un ciel capricieux." #deepl:1908038831
 verrier.353.g: "Si les cieux nous donnent des morceaux, nous devons les assembler." #deepl:1646978536
 verrier.353.t: "À travers les voiles de lumière" #deepl:674640397
 verrier.354.d: "Lors du passage de Vénus, une équipe d'observateurs a capturé non seulement des données précises, mais aussi des images. Des dizaines de plaques photographiques ont été exposées en séquence, puis assemblées en mouvement. Pour la première fois dans l'histoire, un transit planétaire a été enregistré sous forme de film." #deepl:2258153461
 verrier.354.f: "Il vacille. Il tremble. Mais elle bouge. Sur une série de plaques traitées, Vénus entre par le bord, un point noir parfait patinant sur le disque solaire. Il ne s'agit pas d'un simple calcul, ni d'une esquisse, mais d'un mouvement. Capturé dans le temps. Le Dr [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] se tenait dans la chambre noire, lanterne levée, regardant la brève séquence se répéter encore et encore. Six heures de mesures, condensées en quelques secondes d'émerveillement. Les astronomes ont applaudi. Ils savaient qu'ils avaient fait quelque chose de nouveau. Ils avaient fait bouger les cieux." #deepl:1856959975
 verrier.354.g: "Analyser les images pour améliorer les modèles de mouvement planétaire." #deepl:3348594448
 verrier.354.t: "Une ombre en mouvement" #deepl:969441096
 verrier.355.d: "Inspiré par l'enthousiasme mondial suscité par le passage de Vénus en 1882, un site [ROOT.Var('elgar_composer_var').GetCharacter.GetFullName] a composé un nouveau morceau de cérémonie. Présentée pour la première fois devant un large public, la marche capture à la fois la majesté de l'événement et le rythme d'un nouveau siècle scientifique." #deepl:1566390789
 verrier.355.f: "Un an après le transit de Vénus de 1882, John Philip Sousa a été chargé de composer une procession pour l'inauguration d'une statue en bronze du physicien américain Joseph Henry, décédé en 1878. Franc-maçon, Sousa était fasciné par ce que le groupe considérait comme des qualités mystiques dans des phénomènes par ailleurs naturels. La pièce n'a jamais été jouée du vivant de Sousa. Elle est restée injouée pendant de nombreuses années, après que les copies manuscrites de la musique de Sousa eurent été détruites lors d'une inondation." #deepl:3349639062
 verrier.355.g: "Certaines musiques sont écrites pour l'histoire, pas pour les foules." #deepl:1666827653
 verrier.355.t: "La marche de Vénus" #deepl:1281729794
 verrier_add_x_venus_success_0_tt: "Pas de gain #V Observation du transit de Vénus Succès#!." #deepl:2753469077
 verrier_add_x_venus_success_minus_x_tt: "Perdre [SCOPE.GetValue('verrier_venus_success_amount')|0+] #V  Succès de l'observation du transit de Vénus#!." #deepl:867568724
 verrier_add_x_venus_success_plus_x_tt: "Gain [SCOPE.GetValue('verrier_venus_success_amount')|0+] #V  Succès de l'observation du transit de Vénus#!." #deepl:667317191
 verrier_foreign_venus_expedition_modifier: "Expédition étrangère pour le transit de Vénus" #deepl:253236392
 verrier_venus_transit_diplomacy_modifier: "Négociations diplomatiques pour le transit de Vénus" #deepl:1903396933
 verrier_venus_transit_preparation_modifier: "Préparatifs pour le passage de Vénus" #deepl:3653758437
 vikelas.21.d: "Dans un gymnase [SCOPE.sState('vikelas_basketball_state').GetName], un nouveau jeu a été inventé, qui pourrait un jour résonner dans les salles et les stades du monde entier." #deepl:3471187932
 vikelas.21.f: "Pas de coup de pied. Pas de course avec le ballon. Et deux paniers de pêches cloués à une galerie. [TimeKeeper.GetCurrentDate.Format('y')], dans une école de [SCOPE.sState('vikelas_basketball_state').GetFarmHubName], le Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] a été confronté à un problème : comment garder [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] les élèves agités actifs à l'intérieur pendant l'hiver. [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis|U] solution était simple - et étrange. Un ballon de football, deux paniers de pêches surélevés et treize règles.\NLes garçons ont d'abord trouvé cela étrange. Pas de contact. Pas de dribble. Juste des passes prudentes et des lancers en arc de cercle. Mais quelque chose les a séduits. Le jeu se répandit dans d'autres écoles, puis dans d'autres villes. En moins d'une décennie, les gymnases de New York à Tokyo résonnaient au rythme des ballons rebondissants et des cris de "Basket ! Ce qui n'était à l'origine qu'un passe-temps de saison froide pourrait bien devenir quelque chose de plus grand. C'est un sport rapide, d'équipe, adapté à la vie moderne et, surtout, né sur le site [ROOT.GetCountry.GetAdjectiveNoFormatting]." #deepl:3707830614
 vikelas.21.g: "L'introduire dans les écoles et les gymnases." #deepl:2248999233
 vikelas.21.t: "Le jeu avec un panier de pêches" #deepl:2623215155
 vikelas.401.d: "Aujourd'hui, l'International Football Association a été fondée en [GetGlobalVariable('vikelas_fifa_seat_global_var').GetStateRegion.GetCityHubName] et son nom complet est Fédération Internationale de Football Association (FIFA)." #deepl:3487975302
 vikelas.401.f: "Le 21 mai 1904, les délégués de sept nations - Belgique, Danemark, France, Pays-Bas, Espagne, Suède et Suisse - signent une charte. L'objectif est de normaliser les règles du football, d'organiser des matches internationaux et d'élever le jeu à un niveau mondial. C'est ainsi qu'est née la Fédération Internationale de Football Association (FIFA). Au cours des premières décennies, la FIFA est modeste : une présidence à temps partiel, des joueurs amateurs et des conflits régionaux. Mais sous la surface, un mouvement mondial se développe. L'Angleterre hésite à la rejoindre, se méfiant des ingérences étrangères. Les Sud-Américains commencent à former leurs propres confédérations. En 1924 et 1928, les tournois olympiques révèlent la véritable portée du football : des foules de 60 000 personnes à Paris, acclamant non pas des armées, mais des équipes." #deepl:2154770056
 vikelas.401.g: "Adhérez à la FIFA et soutenez la compétition internationale." #deepl:1192623767
 vikelas.401.t: "Fédération Internationale de Football Association" #deepl:2948752940
 vikelas.411.d: "La FIFA a décidé que la Coupe du monde de cette année aurait lieu à [SCOPE.sCountry('vikelas_fifa_host_scope').GetName]. Après le tour préliminaire, la liste des favoris est réduite à huit équipes." #deepl:1721956240
 vikelas.411.f: "#V Les équipes nationales suivantes se sont qualifiées pour les quarts de finale#!\N[SCOPE.sCountry('vikelas_first_qualified_team_scope').GetName]\N[SCOPE.sCountry('vikelas_second_qualified_team_scope').GetName]\N[SCOPE.sCountry('vikelas_third_qualified_team_scope').GetName]\N[SCOPE.sCountry('vikelas_fourth_qualified_team_scope').GetName]\N[SCOPE.sCountry('vikelas_fifth_qualified_team_scope').GetName]\N[SCOPE.sCountry('vikelas_sixth_qualified_team_scope').GetName]\N[SCOPE.sCountry('vikelas_seventh_qualified_team_scope').GetName]\N[SCOPE.sCountry('vikelas_eighth_qualified_team_scope').GetName]" #deepl:1470693747
 vikelas.411.g: "Que la meilleure équipe l'emporte." #deepl:900366891
 vikelas.411.t: "Coupe du monde de football [TimeKeeper.GetCurrentDate.Format('y')]" #deepl:3683642621
 vikelas.412.d: "Notre équipe a triomphé sur la scène mondiale, en battant les meilleures équipes de tous les continents. Dans tout le pays, c'est la fête !" #deepl:1604872733
 vikelas.412.f: "Dans un match passionné contre [SCOPE.sCountry('vikelas_second_winner_team_scope').GetName], notre équipe a fait ses preuves en finale de la Coupe du monde à [SCOPE.sCountry('vikelas_fifa_host_scope').GetName]. Notre équipe nationale a soulevé le trophée d'or. Le coup de sifflet final a résonné dans les radios, les cafés, les casernes. Des mineurs du nord aux marchands du port, le peuple a rugi comme un seul homme. Le capitaine pleure sur le podium. Une nouvelle génération regarde et rêve." #deepl:1159882054
 vikelas.412.g: "Nous sommes les champions." #deepl:2663168066
 vikelas.412.t: "Champions du monde" #deepl:3853223886
 vikelas.413.d: "Notre équipe de football a atteint la finale - et a manqué de peu la gloire. Dans tout le pays, la fierté et le chagrin se mêlent à parts égales." #deepl:80141764
 vikelas.413.f: "Malheureusement, le meilleur de notre équipe n'a pas suffi. Dans un match éprouvant pour les nerfs contre [SCOPE.sCountry('vikelas_first_winner_team_scope').GetName], nos hommes ont échoué. Pendant des semaines, ils ont porté les espoirs d'une nation. Dans des champs boueux et sous une chaleur aveuglante, ils ont couru, ils se sont battus, ils ont cru. Match après match, ils sont devenus des légendes. Ils ont gardé la tête haute lorsque l'autre hymne a retenti. Pas de larmes, seulement un silence, puis des applaudissements qui montent lentement." #deepl:3695564906
 vikelas.413.g: "On nous l'a volé !" #deepl:3624655051
 vikelas.413.t: "La gloire d'argent en [SCOPE.sCountry('vikelas_fifa_host_scope').GetName]" #deepl:3043927783
 vikelas.414.d: "Notre équipe nationale a été éliminée prématurément de la Coupe du monde de la FIFA à [SCOPE.sCountry('vikelas_fifa_host_scope').GetName]. [SCOPE.sCountry('vikelas_first_winner_team_scope').GetName] a battu [SCOPE.sCountry('vikelas_second_winner_team_scope').GetName] en finale." #deepl:317995881
 vikelas.414.f: "Il y avait eu de l'espoir, un espoir réel et tangible. Des victoires applaudies dans les cours d'usine, des commentaires à la radio chuchotés dans les églises, des enfants rejouant des buts dans les ruelles. L'équipe représentait bien plus que le football : elle représentait l'ambition, la fierté, la conviction que nous pouvions nous dépasser. Mais le dernier match a tout changé. Un seul but encaissé. Une balle de handball non vue. Une occasion manquée. Aujourd'hui, le rêve est terminé et le monde passe à autre chose." #deepl:640236906
 vikelas.414.g: "Nous y avons cru. C'était suffisant." #deepl:4069550601
 vikelas.414.t: "Le rêve se termine tôt" #deepl:1366412702
 vikelas.490.d: "[ROOT.Var('vikelas_coach_var').GetCharacter.GetFullName] s'est fait un nom en formant et en développant toute une génération de joueurs. [ROOT.Var('vikelas_coach_var').GetCharacter.GetSheHe] est aujourd'hui suffisamment célèbre pour être considéré comme un entraîneur senior !" #deepl:3173542618
 vikelas.490.f: ""
 vikelas.490.g: "Une récompense pour avoir pu crier sans vergogne sur le terrain." #deepl:1195265680
 vikelas.490.t: "[ROOT.Var('vikelas_coach_var').GetCharacter.GetFullName] est désormais un Senior Coach !" #deepl:454610152
 vikelas.495.d: "Un nouveau [concept_vikelas_coach] a introduit [SCOPE.sCharacter('vikelas_new_coach_scope').GetHerselfHimself]. [SCOPE.sCharacter('vikelas_new_coach_scope').GetHerHis|U] s'appelle [SCOPE.sCharacter('vikelas_new_coach_scope').GetFullName]." #deepl:1753591119
 vikelas.495.f: ""
 vikelas.495.g: "[SCOPE.sCharacter('vikelas_new_coach_scope').GetSheHe|U] conduira nos garçons à la victoire." #deepl:1930939286
 vikelas.495.t: "Un nouvel entraîneur" #deepl:2806014865
 vikelas.601.d: "Une nouvelle invention a fait son apparition sur les boulevards : un engin à deux roues propulsé par des pédales fixées directement sur la roue avant. Il s'agit du vélocipède." #deepl:497189807
 vikelas.601.f: "Dans les parcs et les rues de la capitale, les têtes se tournent. Des messieurs en chapeau et en gilet sont juchés sur d'étranges cadres de fer, pédalant furieusement, vacillant à travers des foules effarées. Certains tombent. D'autres volent. Les enfants rient. Les hommes d'État plus âgés haussent les sourcils. Les journaux l'appellent le vélocipède - mi-jouet, mi-promesse. Inventé par un carrossier, ce "briseur d'os" est aussi lourd que révolutionnaire. Sur les pavés, il secoue la colonne vertébrale. Mais sur les promenades tranquilles, il se déplace avec une grâce surprenante. On murmure qu'il ne s'agit pas d'une simple nouveauté, mais du germe d'un nouveau type de mouvement." #deepl:2987098471
 vikelas.601.g: "Une mode amusante !" #deepl:3063453559
 vikelas.601.t: "Pédales sur la chaussée" #deepl:583302045
 vikelas.602.d: "Un nouveau modèle de bicyclette a vu le jour, avec des roues de taille égale, un essieu arrière entraîné par une chaîne et un meilleur équilibre. Contrairement aux bicyclettes précaires à grandes roues, cette "bicyclette de sécurité" est stable, abordable et fait rapidement sensation. Son inventeur ? [SCOPE.sCharacter('vikelas_bicycle_inventor_scope').GetFullName]!" #deepl:1082254426
 vikelas.602.f: "Les vieux vélocipèdes faisaient trembler les os et les nerfs. Les imposantes bicyclettes à un sou offraient de la vitesse, mais à un prix que peu de gens étaient prêts à payer : un faux mouvement et le cycliste s'envolait. Aujourd'hui, un nouveau type de vélo sort des ateliers de notre capitale : compact, élégant et sûr. Grâce à la transmission par chaîne de la roue arrière et aux pneus, même les femmes et les ouvriers commencent à rouler. Les rues, autrefois dominées par les calèches, résonnent désormais du doux ronronnement du caoutchouc sur la pierre. Dans les cafés comme dans les usines, le verdict est le même : ce n'est pas un jouet. C'est la liberté - rapide, silencieuse et soudainement à portée de main." #deepl:2048166631
 vikelas.602.g: "Permettez à chaque citoyen d'entrer dans l'ère moderne." #deepl:158167297
 vikelas.602.t: "Le vélo du futur" #deepl:3168239488
 vikelas.611.d: "Le jour est arrivé. Des coureurs venus de tout le pays se rassemblent sur la ligne de départ, impatients de mettre à l'épreuve l'homme et la machine sur la route. L'air crépite d'impatience." #deepl:3817467534
 vikelas.611.f: "Le soleil se lève sur le boulevard, déjà bondé de spectateurs. Les banderoles flottent. L'odeur de la graisse et de la poussière flotte dans l'air du matin. Des dizaines de cyclistes enfourchent leurs vélos - des machines rutilantes tout juste sorties de l'usine, d'autres bricolées dans des ateliers clandestins.\NUn coup de feu retentit. Les applaudissements fusent. Et les roues commencent à tourner.\NIls franchissent les portes de la ville et s'enfoncent dans la campagne. Les fermiers s'arrêtent dans leurs champs. Des enfants courent le long de la route. Les prêtres les bénissent. Les cyniques se moquent. Et pourtant, alors que la poussière traîne derrière eux, un sentiment étrange s'empare de la foule : on a l'impression que c'est le début de quelque chose de plus grand." #deepl:872369825
 vikelas.611.g: "Que chaque ville entende le ronflement du progrès." #deepl:4082081516
 vikelas.611.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]" #deepl:804172156
 vikelas.621.d: "Le vainqueur de la course cycliste nationale a conquis plus que la ligne d'arrivée : il a capté l'imagination de la nation. Aujourd'hui, tous les regards se tournent vers ce qu'il représente." #deepl:2904065614
 vikelas.621.f: "Les journaux l'appellent "le cavalier de fer". Né dans une famille de tisserands, orphelin à douze ans, ouvrier d'usine à seize ans. Sa victoire sur une bicyclette de sécurité abîmée - réparée, éraflée et huilée avec soin - n'est pas un simple triomphe sportif. C'est une parabole. Les foules scandent son nom. Les peintres le dessinent. Les enfants imitent sa posture. Mais plus encore, les idéologues en prennent note. Certains l'appellent le visage de la force ouvrière. D'autres disent qu'il prouve la vitalité de la nation. La presse se dispute pour savoir s'il est un travailleur, un patriote - ou quelque chose d'entièrement nouveau.n Le cavalier lui-même parle peu. Il sourit, hoche la tête et roule." #deepl:2953543537
 vikelas.621.g: "Faites-en un héros de la classe ouvrière." #deepl:2363628364
 vikelas.621.h: "Célébrons-le comme une icône nationale." #deepl:255033591
 vikelas.621.i: "L'encadrer comme un symbole du progrès et de l'homme moderne." #deepl:3398545154
 vikelas.621.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]" #deepl:804172156
 vikelas.622.d: "Un tragique accident s'est produit lors de la course cycliste nationale. Un coureur est mort et plusieurs autres sont blessés. Les applaudissements ont cessé." #deepl:644341100
 vikelas.622.f: "Une roue s'est prise dans une ornière. Un cri, un fracas, puis des hurlements. Les spectateurs s'avancent tandis que les vélos tombent comme des dominos. Le sang se mêle à la poussière. Les casques se fendent. Des os se brisent. Un jeune homme de dix-sept ans, apprenti dans une usine, meurt sur le coup. Les journaux sont divisés. Certains y voient le prix à payer pour le progrès, d'autres dénoncent l'insouciance du sport public." #deepl:1135060049
 vikelas.622.g: "Honorez les personnes tombées au combat." #deepl:3728569964
 vikelas.622.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]" #deepl:804172156
 vikelas.623.d: "Une étape particulière de la course a conquis le cœur du public. Les spectateurs n'en parlent pas seulement comme d'une compétition, mais comme d'une légende." #deepl:438486236
 vikelas.623.f: "À l'aube, les coureurs disparaissent dans les collines. La suite n'est plus une course, mais une épreuve d'esprit. Une douzaine d'entre eux ont pris du retard. Trois s'effondrent. L'un d'eux s'est écrasé dans un virage en épingle à cheveux et s'est relevé en sang, faisant signe aux secours. Mais l'un d'entre eux s'est élancé à travers le brouillard dans le cœur de milliers de personnes. La nation entière ne parle que de cela." #deepl:130901318
 vikelas.623.g: "Que la route se souvienne de son effort pendant des générations." #deepl:3983380699
 vikelas.623.h: "Commandez une peinture du moment." #deepl:1275386135
 vikelas.623.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]" #deepl:804172156
 vikelas.624.d: "Des accusations ont éclaté à la suite de la dernière étape de la course. Un coureur a été pris en flagrant délit de tricherie - même si certains affirment qu'il ne faisait que ce que tout le monde fait, mais de manière moins discrète." #deepl:3963790231
 vikelas.624.f: "Ils disent qu'il a changé de vélo derrière la grange. D'autres disent qu'il a été tiré vers le haut de la colline par un fil caché. Les faits sont flous. Ce qui est clair, c'est que le cycliste était trop rapide. Spectaculairement rapide. Trop frais après une montée brutale. Ses rivaux sont furieux. Les spectateurs s'étonnent. La presse sent le sang. Une photo montre un deuxième homme portant les mêmes vêtements. Un autre témoin affirme avoir vu le coureur poussé par une voiture lors de l'étape de nuit. L'accusé nie tout en bloc, invoquant l'envie et la politique." #deepl:2810733320
 vikelas.624.g: "Disqualifiez le coureur et dénoncez la fraude." #deepl:2198835421
 vikelas.624.h: "Couvrez-le pour le bien du sport." #deepl:3797817672
 vikelas.624.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]" #deepl:804172156
 vikelas.625.d: "Une rivalité féroce s'est emparée de la saison de course de cette année. Deux coureurs - égaux en force, opposés en style - ont divisé la nation en deux camps." #deepl:2483368762
 vikelas.625.f: "L'un est le feu : téméraire, audacieux, adoré par les jeunes. Il lance sa casquette à la foule, rit en pédalant et attaque sans prévenir.\NL'autre est la glace : calme, calculateur, presque mathématique. Il économise ses forces, gagne à la seconde près et ne parle que lorsque c'est nécessaire.\N- Leurs noms sont criés sur les toits. Les villes prennent parti. Les affiches sont imprimées en rouge ou en bleu. Les tailleurs vendent des casquettes à leurs couleurs. Les enfants imitent leurs positions sur des bicyclettes en bois.\NLes journaux parlent de bien plus qu'une simple course. Ils parlent de caractère, de philosophie, de ce que les gens veulent être. Et aucun des deux coureurs ne cède un pouce." #deepl:1380551122
 vikelas.625.g: "Cela profitera à la culture des journaux." #deepl:3508242265
 vikelas.625.h: "Utiliser la rivalité à des fins politiques." #deepl:442554493
 vikelas.625.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]" #deepl:804172156
 vikelas.626.d: "Une rivalité féroce s'est emparée de la saison de course de cette année. Deux coureurs - égaux en force, opposés en style - ont divisé la nation en deux camps." #deepl:2483368762
 vikelas.626.f: "Ils l'ont trouvé dans une forge du village, un marteau à la main, le visage noirci par la suie, seul. La descente était traîtresse. Un virage mal négocié, un craquement de gravier et la fourche avant se fendit. Son vélo s'est plié comme un oiseau blessé. La plupart des gens se seraient arrêtés. Mais pas lui. Il a boité dans la descente, traînant son cadre pendant des kilomètres. Dans un village isolé, il trouva une forge. Pas de mécanicien. Pas de voiture d'équipe. Juste un soufflet, une enclume et ses deux mains.\NPendant des heures, il a travaillé, les manches retroussées, la mâchoire serrée, refaisant la fourche avant par la mémoire et le toucher. Lorsque les officiels sont arrivés, il s'est arrêté pour lancer un regard noir et dire : "N'y touchez pas". Huit heures derrière les leaders, il a repris la route. Aucune chance de victoire. Mais tout au long du parcours, la foule s'est levée pour acclamer non pas le vainqueur, mais celui qui a refusé de s'arrêter." #deepl:896070649
 vikelas.626.f: "Ils l'ont trouvé dans une forge du village, un marteau à la main, le visage noirci par la suie, seul. La descente était traîtresse. Un virage mal négocié, un craquement de gravier et la fourche avant se fendit. Son vélo s'est plié comme un oiseau blessé. La plupart des gens se seraient arrêtés. Mais pas lui. Il a boité dans la descente, traînant son cadre pendant des kilomètres. Dans un village isolé, il trouva une forge. Pas de mécanicien. Pas de voiture d'équipe. Juste un soufflet, une enclume et ses deux mains.\NPendant des heures, il a travaillé, les manches retroussées, la mâchoire serrée, refaisant la fourche avant par la mémoire et le toucher. Lorsque les officiels sont arrivés, il s'est arrêté pour lancer un regard noir et dire : "N'y touchez pas". Huit heures derrière les leaders, il a repris la route. Aucune chance de victoire. Mais tout au long du parcours, la foule s'est levée pour acclamer non pas le vainqueur, mais celui qui a refusé de s'arrêter." #deepl:896070649
 vikelas.626.g: "Une histoire inspirante." #deepl:3324986220
 vikelas.626.h: "Autoriser les réparations d'urgence." #deepl:385201552
 vikelas.626.i: "Honorez-le !" #deepl:581594471
