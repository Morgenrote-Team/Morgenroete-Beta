 MR_FIFA_BUTTON_TT: "#T Trouvez le site de la FIFA#!\nLe nombre de matches inter-nationaux augmentant au fur et à mesure que le football se répandait, le besoin d'une instance dirigeante mondiale s'est fait sentir. La FIFA (Fédération Internationale de Football Association) est un organisme international d'autorégulation qui régit le football association, le futsal et le beach soccer. Fondée le 21 mai 1904, elle est l'une des plus anciennes et des plus grandes ONG du monde. La création de la FIFA permet d'organiser des matches internationaux entre des nations individuelles, dont les entraîneurs peuvent s'améliorer en remportant des matches. Cela aboutira finalement à la création d'une Coupe du monde.\N- La FIFA est l'une des plus anciennes et des plus importantes ONG au monde.[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:3292557058
