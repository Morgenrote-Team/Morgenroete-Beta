 elgar_faido_modifier: "Fado Music Culture"
 elgar.535.t: "The Sound of Saudade"
 elgar.535.d: "From the narrow alleys of Lisbon and the taverns of Alfama emerges a new musical form—mournful, raw, and profoundly Portuguese. It is called Fado."
 elgar.535.f: "By the early decades of the 19th century, a distinctive genre had taken root in the working-class quarters and port districts of Lisbon. Fado—literally “fate”—was sung by sailors, prostitutes, and the urban poor, often accompanied by the soft weeping of the Portuguese guitarra. The lyrics spoke of longing, resignation, and nostalgia, what the locals called saudade—a sentiment too complex to translate.\n\nThough initially dismissed as vulgar street music, Fado gradually gained artistic respectability. Aristocrats began to invite fadistas into salons, and by the 1840s, public performances were common in Lisbon's music halls. A new musical identity was taking shape—uniquely Portuguese, and echoing the sorrows and pride of a changing nation."
 elgar.535.g: "Let Fado flourish as a symbol of national identity."
 elgar.535.h: "Encourage formalization and professional performance."
