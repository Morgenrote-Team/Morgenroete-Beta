 elgar.9.t: "Technique de douze tons"
 elgar.9.d: "Après des décennies de stagnation musicale, les compositeurs modernes ont trouvé un nouveau concept qui révolutionnera le monde de la musique."
 elgar.9.f: "La technique de douze tons - également connue sous le nom de dodécaphonie, le sérialisme de douze tons et (à l'usage britannique) la composition de douze notes - est une méthode de composition musicale. La technique est un moyen de s'assurer que les 12 notes de l'échelle chromatique sont aussi souvent que les unes aux autres dans un morceau de musique tout en empêchant la note d'une note à travers l'utilisation de lignes de ton, des ordonnances des 12 classes de pitch. Les 12 notes sont donc accordées une importance plus ou moins égale, et la musique évite d'être dans une clé. Au fil du temps, la technique a considérablement augmenté en popularité et est finalement devenue très influente sur les compositeurs du XXe siècle. Il est généralement considéré comme une forme de sérialisme."
 elgar.9.g: "Je ne sais pas si c'était une bonne idée."
