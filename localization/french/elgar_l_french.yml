 elgar_adopt_national_anthem_decision: "Adopter un hymne national"
 elgar_adopt_national_anthem_decision_desc: "À mesure que le nationalisme avance, le fait de ne pas avoir d'hymne national équivaut à duper. Il suffit de sélectionner une musique cérémonielle raisonnablement acceptable à des fins de représentation. Les compositeurs peuvent créer des morceaux de musique au hasard qui seront utilisés plus tard, mais ils peuvent également être mis en service directement. Tous les hymnes ne doivent pas avoir des paroles - mais c'est beaucoup plus prestigieux."
