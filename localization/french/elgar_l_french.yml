 elgar_art_nouveau_tech_desc: "#R Cette technologie n'est disponible que via un bouton dans l'onglet Arts de la GUI Morgenröte! #!\n\n[concept_elgar_art_nouveau] est un style d'art international, de l'architecture et de l'art appliqué, en particulier les arts décoratifs. Le style est connu sous différents noms dans différentes langues: Jugendstil en allemand, Stile Liberty en italien, modernisme en catalan et également connu sous le nom de style moderne en anglais. Il était souvent inspiré par des formes naturelles telles que les courbes sinueuses des plantes et des fleurs. Les architectes et les concepteurs ont cherché une Gesamtkunstwerk spirituellement édifiante (\ \"l'œuvre totale d'art \") qui unifierait les arts."
 elgar_impressionism_tech_desc: "#R Cette technologie n'est disponible que via un bouton dans l'onglet Arts de la GUI Morgeröte! #!\n\n[concept_elgar_impressionism] est un style d'art du 19e siècle qui se caractérise par la représentation atmosphérique des instantanés éphémères. Le terme impressionnisme a également été appliqué à certains styles de musique, de littérature, de cinéma et de photographie."
 elgar_expressionism_tech_desc: "#R Cette technologie n'est disponible que via un bouton dans l'onglet Arts de la GUI Morgenröte! #!\n\n[concept_elgar_expressionism] est un mouvement moderniste, initialement en poésie et en peinture. Son trait typique est de présenter le monde uniquement dans une perspective subjective, de la déformer radicalement pour un effet émotionnel afin d'évoquer des humeurs ou des idées."
 elgar.423.d: "[SCOPE.sCharacter('elgar_conductor').GetFullName] se plaint que les conditions de travail [SCOPE.sCharacter('elgar_conductor').GetHerHis] ne sont pas assez bonnes compte tenu de ses multiples fonctions de bureau. Peut-être que les soutiens monétaires pourraient améliorer son «inspiration»."
 elgar.424.d: "[SCOPE.sCharacter('elgar_conductor').GetFullName] essaie de composer depuis un certain temps, mais [SCOPE.sCharacter('elgar_conductor').GetSheHe] continue d'être interrompu par une certaine personne."
 elgar_irrationalism_tech_desc: "L'irrationalisme est un mouvement philosophique qui a émergé au début du XIXe siècle, mettant l'accent sur la dimension non rationnelle de la vie humaine. Les irrationalistes déclarent que la raison humaine à elle seule est incapable de reconnaître les fondements, les liens et les lois de la réalité objective. En tant qu'alternatives pour les explications descriptives et normatives du monde, des fonctions cognitives plus élevées telles que, par exemple, l'intuition, la foi ou l'expérience directe sont suggérées."
