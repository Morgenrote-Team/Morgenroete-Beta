 notification_elgar_art_prize_5_notification_desc: "Notre [concept_elgar_composer] [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName] a remporté le cinquième prix lors du concours artistique de cette année en [GetGlobalVariable('elgar_art_prize_host_var').GetCountry.GetName]. Il a reçu #G 10#! #V réputation#! pour cela."
 je_elgar_accademia_santa_cecilia: "Élevez Santa Cecilia au grade de l'Académie"
 je_elgar_accademia_santa_cecilia_reason: "L'Accademia di Santa Cecilia a été fondée par le bull papal «félicitations» par SixTus V en 1585 sous la forme d'une congrégation. En 1838, la congrégation de Saint Cecilia a été officiellement nommée une académie puis la Pontifical Academy. Ses membres à l'époque comprenaient Luigi Cherubini, Mercadante, Donizetti, Rossini, Paganini, Auber, Liszt, Mendelssohn, Berlioz, Gounod et Meyerbeer. L'un de ses membres honoraires était la reine Victoria. En Italie unie, il est devenu un véhicule de premier plan."
 je_elgar_leipzig_conservatory: "Trouvé le Conservatoire de Leipzig"
 je_elgar_leipzig_conservatory_reason: "La ville musicale traditionnelle de Leipzig, où Johann Sebastian Bach était déjà active, offrait des conditions optimales pour la fondation d'une usine de talents musicaux et académique au début du 19e siècle. Quatre citoyens engagés de la ville, à savoir l'avocat Heinrich Conrad Schleinitz (deuxième directeur), le directeur de district de Leipzig Johann Paul von Falkenstein et le conseiller de la Cour Royal Saxon Johann Georg Keil ainsi que les idées précédentes de GEWANDHAUS KAPELLMEISTR FELIX MENDELSSOHN BARTHOLDY ont mis les idées précédentes dans la pratique."
 je_elgar_petrograd_conservatory: "Trouvé le Conservatoire de Petrograd"
 je_elgar_petrograd_conservatory_reason: "Lors de l'initiative de la Grande-Duchesse Elena Pavlovna, d'Anton Rubinstein, d'Andrei Nikolayevich Markovich et d'autres personnalités de la société et de la vie musicale, la Société de musique russe a été fondée, dont le premier conservatoire en Russie a été fondée. Anton Rubinstein a été le premier directeur du Conservatoire et professeur de piano. Le premier diplômé à terminer ses études de composition ici a été Peter Tchaikovsky. Nikolai Andreyevich Rimsky-Korsakov a joué un rôle particulièrement influent en tant que professeur de composition et d'instrumentation et chef de la classe d'orchestre."
 elgar.201.t: "Le prix [SCOPE.sState('elgar_art_capital').GetCityHubName]"
 elgar.201.d: "L'élite de notre pays qui aime l'art fait pression pour un prix d'artiste pour les meilleures compositions."
 elgar.201.f: "Les nations qui ont un centre d'irrationnalisme ou d'impressionnisme organisent de temps à autre des compétitions musicales. Les cinq compositeurs les plus qualifiés reçoivent un prix qui a un certain impact sur leur réputation. Un prix d'art est généralement attribué tous les cinq ans. Les grands compositeurs ne sont pas invités - ils ont déjà reçu leur récompense."
 elgar.201.g: "Nous devons organiser un concours d'art."
 elgar.201.h: "Quel gaspillage d'argent!"
 elgar.202.t: "Le [SCOPE.sState('elgar_art_capital').GetCityHubName]"
 elgar.202.d: "Le jury est arrivé à une conclusion et a sélectionné les meilleures compositions. La liste des cinq gagnants fait déjà le tour."
 elgar.202.f: "1. [SCOPE.sCharacter('elgar_character_first_winner_scope').GetFullName] de [GetGlobalVariable('elgar_prize_winner_1_global_var').GetCountry.GetName]\n2.   [SCOPE.sCharacter('elgar_character_second_winner_scope').GetFullName] de [GetGlobalVariable('elgar_prize_winner_2_global_var').GetCountry.GetName]\n3.   [SCOPE.sCharacter('elgar_character_third_winner_scope').GetFullName] de [GetGlobalVariable('elgar_prize_winner_3_global_var').GetCountry.GetName]\n4.   [SCOPE.sCharacter('elgar_character_fourth_winner_scope').GetFullName] de [GetGlobalVariable('elgar_prize_winner_4_global_var').GetCountry.GetName]\n5.   [SCOPE.sCharacter('elgar_character_fifth_winner_scope').GetFullName] de [GetGlobalVariable('elgar_prize_winner_5_global_var').GetCountry.GetName]"
 elgar.202.g: "Attribuer les gagnants."
 elgar.1201.t: "Daphnis et Chloé"
 elgar.1201.f: "Daphnis et Chloé est un Symphonie Chorégraphique, ou Symphonie chorégraphique, pour l'orchestre et le refrain sans paroles. C'est dans trois sections principales, ou parties, et une douzaine de scènes, la plupart des danses et durent un peu moins d'une heure, ce qui en fait le plus long travail du compositeur. En effet, c'est un ballet, et il a d'abord été présenté comme tel. Le scénario de danse a été adapté par le chorégraphe Michel Fokine d'une romance pastorale de l'écrivain grec Longus pensé à ce jour du 2e siècle après JC. Pendant près d'une heure, Daphnis et Chloé est le plus long travail de Ravel. Quatre leitmotifs discernables lui donnent une unité musicale. La musique, la plus passionnée du compositeur, est largement considérée comme parmi ses meilleures, avec des harmonies extraordinairement luxuriantes typiques du mouvement impressionniste; Même pendant la vie du compositeur, les commentateurs l'ont décrit comme son chef-d'œuvre pour l'orchestre."
 elgar.1202.t: "Rhapsodie Espagnole"
 elgar.1202.f: "Composé entre 1907 et 1908, le Rapsodie est l'une des premières œuvres majeures de Ravel pour l'orchestre. Il a été joué pour la première fois à Paris en 1908 et est rapidement entré dans le répertoire international. La pièce s'appuie sur l'héritage espagnol du compositeur et est l'une de plusieurs de ses œuvres qui se déroulent ou reflètent l'Espagne. La première de la Rapsodie a été donnée par les Concerts Orchester des Colonne, dirigés par Édouard Colonne, au Théâtre du Châtelet le 15 mars 1908. La réception critique était généralement favorable. Les voix dissidentes étaient Pierre Lalo, qui n'aimait habituellement pas la musique de Ravel, et Gaston Carraud, qui a appelé la partition \"mince, incohérente et fugitive\". Sinon, il y a eu beaucoup de louanges pour l'orchestration subtile et fraîche et la pittoresque de la musique."
 elgar.1203.t: "Boléro"
 elgar.1203.f: "«Je n'ai fait qu'un seul chef-d'œuvre, c'est le Boluro; Malheureusement, il ne contient aucune musique. -Maurice Ravel"
 elgar.1211.t: "Technique de douze tons"
 elgar.1211.f: "La technique de douze tons - également connue sous le nom de dodécaphonie, le sérialisme de douze tons et (à l'usage britannique) la composition de douze notes - est une méthode de composition musicale. La technique est un moyen de s'assurer que les 12 notes de l'échelle chromatique sont aussi souvent que les unes aux autres dans un morceau de musique tout en empêchant la note d'une note à travers l'utilisation de lignes de ton, des ordonnances des 12 classes de pitch. Les 12 notes sont donc accordées une importance plus ou moins égale, et la musique évite d'être dans une clé. Au fil du temps, la technique a considérablement augmenté en popularité et est finalement devenue très influente sur les compositeurs du XXe siècle. Il est généralement considéré comme une forme de sérialisme."
 elgar.1211.g: "Je ne sais pas si c'était une bonne idée."
 elgar.1212.t: "String Quartett no 2."
 elgar.1212.f: "Ce travail dans Four Movements a été écrit pendant une période très émotionnelle dans la vie de Schoenberg. Les troisième et quatrième mouvements sont assez inhabituels pour un quatuor à cordes, car ils incluent également un chanteur de soprano, en utilisant de la poésie écrite par Stefan George. En établissant George, Schoenberg lui-même a écrit plus tard: `` J'ai été inspiré par des poèmes de Stefan George, le poète allemand, pour composer de la musique à certains de ses poèmes et, étonnamment, sans aucune attente de ma part, ces chansons montraient un style tout à fait différent de tout ce que j'avais écrit auparavant. … De nouveaux sons ont été produits, un nouveau type de mélodie est apparu, une nouvelle approche de l'expression des humeurs et des personnages a été découverte."
 elgar.1212.g: "Super! Mais la «musique» peut-elle s'arrêter pour l'instant?"
 elgar.1213.t: "Symphonie de la chambre n ° 1"
 elgar.1213.f: "La première Symphonie de la Chambre de Schoenberg a été terminée en 1906 et a été créée le 8 février 1907 à Vienne par le Rosé Quartet avec un ensemble de vent du Vienne Philharmonique, sous le bâton du compositeur. En 1913, Schoenberg a de nouveau dirigé la pièce, dans le cadre du célèbre Skandalkonzert, dans lequel les tonalités hétérodoxes de la symphonie de Schoenberg et, plus encore, des œuvres de son étudiant Alban Berg ont incité les participants à Riot en protestation et à la fin prématurément du concert."
 elgar.1213.g: "Cela ne finira-t-il jamais?"
 elgar.1221.t: "The Firebird"
 elgar.1221.f: "Le Firebird est un travail de concert de ballet et d'orchestre basé sur les contes de fées russes du Firebird et la bénédiction et la malédiction qu'il possède pour son propriétaire. Les éléments mortels et surnaturels du ballet se distinguent par un système de leitmotils placé dans l'harmonie surnommée «leit-harmonie». Stravinsky a intentionnellement utilisé de nombreuses techniques spécialisées dans l'orchestre, notamment Ponticello, Col Le Legno, Flautando, Glissando et Flutter-Tonguting. Situé dans le château du mal immortel Koschei, le ballet suit le prince Ivan, qui combat Koschei avec l'aide du Magical Firebird."
 elgar.1222.t: "Petrouchka"
 elgar.1222.f: "Petrushka a été écrit pour la saison de Paris 1911 de la compagnie de Ballets Russes de Sergei Diaghilev. Le ballet raconte l'histoire des amours et des jalousies de trois marionnettes. Les trois sont animés par le charlatan lors de la foire Shrovetide de 1830 (Maslenitsa) à Saint-Pétersbourg. Petrushka rassemble de la musique, de la danse et du design dans un tout unifié. C'est l'une des plus populaires des Ballets Russes Productions. Il est généralement effectué aujourd'hui en utilisant les conceptions originales et la chorégraphie. Le travail est caractérisé par l'accord soi-disant Petrushka, un dispositif de bitonalité annonçant l'apparence du personnage principal."
 elgar.1223.t: "Sacre du Printemps"
 elgar.1223.f: "Le rite du printemps est un travail de concert de ballet et d'orchestre par le compositeur russe Igor Stravinsky. Il a été écrit pour la saison de Paris de 1913 de la compagnie de Ballets Russes de Sergei Diaghilev; La chorégraphie originale était de Vaslav Nijinsky avec des conceptions de scène et des costumes de Nicholas Roerich. Lorsqu'il a joué pour la première fois au Théâtre des Champs-Élysées le 29 mai 1913, la nature avant-gardiste de la musique et de la chorégraphie a provoqué une sensation. Beaucoup ont qualifié la réaction de première nuit de «émeute» ou de «quasi-émeute», bien que ce libellé ne soit pas venu avant les revues de performances ultérieures plus d'une décennie plus tard. Bien que conçue comme une œuvre pour la scène, avec des passages spécifiques accompagnant les personnages et l'action, la musique a atteint une reconnaissance égale sinon plus grande en tant que pièce de concert et est largement considérée comme l'une des œuvres musicales les plus influentes du 20e siècle."
