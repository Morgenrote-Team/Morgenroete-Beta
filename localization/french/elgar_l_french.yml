 elgar.801.t: "Un hymne national"
 elgar.801.d: "Avec le sentiment national croissant parmi notre peuple, le désir d'un hymne national qui représente correctement le souverain, le pays et le peuple se développe maintenant non seulement parmi les intellectuels mais aussi parmi les vastes sections de la population ordinaire."
 elgar.801.f: "Même avant le milieu du XIXe siècle, il y avait de nombreux pays en Europe et en Amérique qui jouaient certaines chansons à des occasions officielles, souvent pour représenter le monarque. Certains hymnes ont été codifiés dès le début, tandis que d'autres sont restés non officiels jusqu'au 20e siècle. Certains pays commencent donc par des hymnes nationaux prédéterminés, qui peuvent changer en raison d'une révolution ou d'une modification constitutionnelle. De nombreux pays, en revanche, doivent inventer leurs hymnes nationaux à partir de zéro - les compositeurs et les écrivains peuvent fournir une aide précieuse à cela."
 elgar.801.g: "Nous nous occuperons de cela plus tard."
