 elgar_classicism_tech: "Classicisme"
 elgar_classicism_tech_desc: "Le classicisme, dans les arts, se réfère généralement à une haute estime pour une période classique, l'antiquité classique dans la tradition occidentale, comme établissant des normes de goût que les classiciens cherchent à imiter. Dans sa forme la plus pure, le classicisme est une attitude esthétique qui dépend des principes basés sur la culture, l'art et la littérature de la Grèce antique et de Rome, en mettant l'accent sur la forme, la simplicité, la proportion, la clarté de la structure, la perfection, l'émotion retenue, ainsi que l'appel explicite à l'intellect."
 elgar_irrationalism_tech: "Irrationnalisme"
 elgar_modern_art_tech: "Art moderne"
 elgar_modern_art_tech_desc: "#R Cette technologie n'est qu'un mannequin et ne peut pas être recherchée. Complétez les entrées du journal pour obtenir [concept_elgar_impressionism], [concept_elgar_expressionism] ou [concept_elgar_art_nouveau]! #!"
 elgar_art_nouveau_tech: "Art Nouveau"
 elgar_art_deco_tech: "Art Déco"
 elgar_art_deco_tech_desc: "Art Déco a combiné les styles modernes avec un artisanat fin et des matériaux riches. À son apogée, il représentait le luxe, le glamour, l'exubérance et la foi dans le progrès social et technologique. Art déco est l'un des premiers styles véritablement internationaux, mais sa domination s'est terminée par le début de la Seconde Guerre mondiale."
 elgar_impressionism_tech: "Impressionnisme"
 elgar_neoclassicism_tech: "Néoclassicisme"
 elgar_neoclassicism_tech_desc: "Après le début du siècle, il y a eu un enthousiasme renouvelé pour les idéaux classiques: le néoclassicisme. Il englobait au moins de la musique, de la philosophie et de la littérature. Alors que les architectes utilisaient à nouveau la construction romaine et grecque comme modèles, les compositeurs redécouvraient la musique baroque comme source d'inspiration."
 elgar_expressionism_tech: "Expressionnisme"
 elgar_new_objectivity_tech: "Nouvelle objectivité"
 elgar_new_objectivity_tech_desc: "Bien que décrivant principalement une tendance dans la peinture allemande, le terme a pris sa propre vie et est venu caractériser l'attitude de la vie publique en Allemagne de Weimar ainsi que l'art, la littérature, la musique et l'architecture créés pour s'y adapter. Plutôt qu'un objectif de l'objectivité philosophique, il était censé impliquer un tournant vers un engagement pratique avec le monde - une attitude tout-entreprise, comprise par les Allemands comme intrinsèquement américains."
 elgar_mass_culture_tech: "Culture de masse"
 elgar_mass_culture_tech_desc: "#R Cette technologie n'est disponible que via une entrée de journal! #!\n\n'The Hostilité incompréhensible de la masse à toutes les traditions représentatives de la culture, l'intelligence vive et froide qui confonde la sagesse du paysan, le nouveau naturalisme trouvé qui, par rapport à toutes les questions du sexe et de la société Clôture de la culture et de l'ouverture d'une assez nouvelle phase d'existence humaine. - Oswald Spengler, déclin de l'Occident"
 elgar_stop_composing_button: "Arrêtez de composer"
 elgar_stop_composing_button_desc: "Le compositeur termine son travail de composition et est à nouveau disponible pour d'autres tâches."
 elgar_stopped_composing_tt: "#default_text Le compositeur ne doit pas avoir terminé la composition au cours des 30 derniers jours.#!"
