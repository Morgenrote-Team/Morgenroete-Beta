 elgar.802.t: "Hymne obsolète"
 elgar.802.d: "Après des changements récents à la loi, l'hymne national précédent ne semble plus approprié. Beaucoup l'interprètent comme un vestige anachronique d'un système politique révolue. La pression augmente pour se débarrasser des bagages."
 elgar.802.f: "«Nous avons un amiral sans flotte. Il gouverne un pays sans côte. C'est un royaume sans roi."
 elgar.802.g: "Cet hymne ne représente plus notre pays."
 elgar.803.t: "Hymne réactionnaire"
 elgar.803.d: "Les voix deviennent plus fortes pour annuler l'hymne national précédent. Les politiciens supérieurs appellent plutôt à une nouvelle pièce qui souligne plus clairement les réalisations de l'État moderne que représente [ROOT.GetCountry.GetNameNoFormatting]."
 elgar.803.f: "'Les gens avancés, vers le drapeau de la rédemption, le drapeau rouge \ nforward, vers la rédemption \ nred, le drapeau triomph."
 elgar.811.t: "L'hymne de [ROOT.GetCountry.GetNameNoFormatting]"
 elgar.811.d: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullNameNoFormatting] a adopté un décret selon lequel un morceau de musique spécifique doit être joué à des occasions officielles. Le choix est tombé sur ..."
 elgar.821.t: "Musique pour [ROOT.GetCountry.GetNameNoFormatting]"
 elgar.821.d: "[GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName] a demandé s'il y avait des souhaits particuliers concernant la composition à écrire et quel aspect méritait une attention particulière."
 elgar.821.f: "Il existe un total de cinq catégories d'hymnes nationaux. Les hymnes de la monarchie améliorent la légitimité, les hymnes folkloriques réduisent les tourmente, la valeur des hymnes améliorent la loyauté dans de meilleures conditions de vie et rendent les citoyens plus résistants à la détérioration, tandis que les hymnes militaires renforcent le pouvoir de défense d'une nation. Les républiques du Conseil peuvent commander des hymnes des travailleurs, ce qui augmente le pouvoir politique des syndicats. Selon la forme du gouvernement, chaque hymne n'est pas possible."
 elgar.821.g: "L'hymne est destiné à louer notre monarque."
 elgar.821.h: "Une chanson populaire populaire est destinée à lier le gouvernement et le peuple."
 elgar.821.i: "Hymne sublime de la composition qui représente les valeurs de notre pays."
 elgar.821.j: "Nous avons besoin d'une chanson qui motive nos gens au combat!"
 elgar.821.k: "Seule une chanson des travailleurs qui glorifie le prolétariat est acceptable."
 elgar.822.t: "Anthem Melody a terminé"
 elgar.822.d: "Maestro [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetLastName] a présenté aujourd'hui la partition de la proposition [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetHerHis] pour un éventuel nouvel hymne national. On ne sait toujours pas si l'État les acceptera réellement."
 elgar.822.f: "Il y a eu de nombreux hymnes qui ne sont jamais devenus l'hymne national. Les raisons en sont variées. L'État doit toujours les sanctionner. De plus, les hymnes nationaux qui ont à la fois une mélodie originale et des paroles sont plus forts."
 elgar.822.g: "J'espère que cela trouvera l'acceptation parmi les gens ..."
 elgar.831.t: "Les paroles de l'hymne ont terminées"
 elgar.831.d: "[GetPlayer.MakeScope.Var('manzoni_writer_var').GetCharacter.GetFullName] envisageait depuis longtemps la possibilité que le pays puisse avoir besoin de paroles dignes pour son hymne national. L'écrivain a rapidement écrit des mots appropriés pour les notes connues depuis longtemps."
 elgar.831.f: "'---------' -la Marcha Real"
