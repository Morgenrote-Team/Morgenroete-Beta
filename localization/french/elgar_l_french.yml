 elgar.91.t: "Tivoli Glass Hall"
 elgar.91.d: "Les jardins Tivoli sont extrêmement populaires auprès du public de Copenhague depuis des années. Il est prévu de construire une salle de concert pour environ 1 000 personnes pour divertir le public avec une musique stimulante."
 elgar.91.f: "Une salle de concert faisait partie des attractions où les jardins de Tivoli ont ouvert ses portes pour la première fois en 1843. C'était un bâtiment rectangulaire en bois conçu par Harald Conrad Stilling. Hans Christian Lumbye était directeur musical et chef d'orchestre en chef de 1843 à 1872. Il a écrit près de 700 compositions pour l'orchestre, en particulier Polkas, Valses et Galops. La salle de concert a été agrandie par Johan Andreas Stillmann en 1863."
 elgar.91.g: "J'espère que M. Lumbye se présentera avec ses célèbres Galops!"
 elgar.92.t: "Gran Teatro nacional"
 elgar.92.d: "Avec le plan de construction d'un grand opéra à Mexico, le gouvernement prévoit l'un des plus grands projets de construction de l'histoire du pays."
 elgar.92.f: "Le théâtre a été construit entre 1840 et 1844 par l'architecte Lorenzo de la Hidalga à Mexico. Les historiens le considèrent comme le travail architectural le plus important à Mexico entre l'achèvement de la cathédrale métropolitaine et la construction du Palacio de Bellas Artes. Le grand théâtre national a été inauguré dans l'un des termes d'Antonio López de Santa Anna en tant que président. Son nom a changé successivement, du grand théâtre de Santa Anna au grand théâtre Vergara, puis du grand théâtre impérial, et enfin du grand théâtre national. Au cours de la saison des opéra de 1852, le théâtre a présenté ses 17 opéras et a offert plus de 60 représentations."
 elgar.93.t: "Teatro Amazonas"
 elgar.93.d: "En raison du boom que la région connaît grâce à la culture du caoutchouc, Manaus doit recevoir un opéra opulent - au milieu de la jungle!"
 elgar.93.f: "L'Amazonas Theatre a été construit pendant l'Époque Belle à une époque où des fortunes ont été fabriquées dans le boom en caoutchouc. La construction du théâtre Amazon a été proposée pour la première fois en 1881 par un membre de la Chambre des représentants locale, Antonio Jose Fernandes Júnior, qui envisageait un «bijou» au cœur de la forêt amazonienne. Le style architectural du théâtre est considéré comme une renaissance généralement de la Renaissance. Les carreaux de toiture ont été importés d'Alsace, les murs en acier de Glasgow, en Écosse et le marbre de Carrara pour les escaliers, les statues et les colonnes, d'Italie. Le dôme est recouvert de 36 000 carreaux de céramique décorés peints dans les couleurs du drapeau national du Brésil. L'ameuble intérieur est venue de la France dans le style Louis Quinze. L'artiste italien Domenico de Angelis, le jeune a peint les panneaux qui décorent les plafonds de l'auditorium et de la chambre du public."
 elgar.101.t: "Un monument pour Beethoven"
 elgar.101.d: "Suite à un appel du compositeur Robert Schumann, plusieurs intellectuels, mais aussi des citoyens, des patriotes et des personnes intéressées par l'art se sont prononcées en faveur de l'érection d'un mémorial à Ludwig Van Beethoven à Bonn."
 elgar.101.f: "«Le mausolée de la mémoire future est déjà devant moi en personne - un cuboïde raisonnablement élevé, une lyre dessus avec l'année de naissance et de mort, le ciel au-dessus et quelques arbres à côté. Une nation entière confrontée à un Beethoven qui leur enseigne la grandeur et la fierté de chaque page, ne devraient-ils pas être en mesure de créer un monument de plus de plus pour lui? Si j'étais un prince, je lui construisais un temple dans le style palladien! Formez-le sous une forme gigantesque, comme Saint Borromeo sur Lago Maggiore, de sorte que, comme il l'a fait dans la vie, il puisse regarder par-dessus la montagne et les montagnes - et quand les navires du Rhin passent et que les étrangers demandent: ce que l'on signifie que l'empereur géant peut répondre: Beethoven est que - et ils penseront que c'est un empereur allemand. En un mot: levez-vous, lâchez votre flegme et considérez que le monument sera le vôtre! - Robert Schumann"
 elgar.101.g: "Beethoven était un titan de musique allemand!"
 elgar.101.h: "Nous sommes heureux de financer ce projet culturellement précieux."
 elgar.101.i: "Il ne peut pas être si génial s'il n'avait pas de monument auparavant."
 elgar.102.t: "Préparer le festival de Beethoven"
 elgar.102.d: "La touche finale du monument Beethoven est terminée. Il est maintenant temps de se préparer à l'inauguration."
 elgar.102.f: "Le festival de Beethoven pour l'inauguration du monument de Beethoven a été un événement musical majeur de statut international. En plus du roi prussien, la reine britannique Victoria a également été invitée, les grands intellectuels tels que Alexander von Humboldt faisaient partie des invités, et les compositeurs du grade d'Hector Berlioz, Giacomo Meyerbeer et surtout Franz Liszt a façonné les quatre jours. Des milliers de personnes étaient censées participer au festival, qui posait de graves problèmes à la petite ville de Bonn."
 elgar.102.g: "Envoyez les invitations!"
 elgar.103.t: "Invitation pour le festival de Beethoven"
 elgar.103.d: "Notre gouvernement a reçu une invitation officielle au Festival de Beethoven à Bonn, où le monument du compositeur doit être dévoilé."
 elgar.103.g: "Nous y assisterons avec plaisir."
 elgar.103.h: "La musique classique est surfaite."
 elgar.104.t: "Construisez la salle Beethoven"
 elgar.104.d: "En raison du nombre élevé de visiteurs, Franz Liszt a proposé de détourner des hommes et du matériel du chantier de construction de la cathédrale de Cologne à Bonn afin de construire une salle de festival en un temps record."
 elgar.104.f: "Le dévoilement officiel du monument Beethoven devait être le point culminant d'un festival de Beethoven de 3 jours. Un mois avant le début du festival, il n'y avait pas de lieu approprié pour détenir les 3 000 participants attendus. Aux urgences de Liszt, et seulement après avoir proposé de porter le coût total lui-même, le comité a engagé un architecte et des constructeurs pour construire le Beethoven Hall. Au moment où ils ont finalement commencé, ils avaient moins de deux semaines pour le faire et ont dû travailler 24 heures sur 24 pour le terminer à temps. Franz Liszt a également parlé aux constructeurs de la cathédrale de Cologne. Le bois a été chargé de Cologne à Bonn via le Rhin. Les décorations faites à Cologne sont également venues à Bonn si rapidement. En seulement onze jours, une salle de festival a été créée à partir de nulle part."
 elgar.104.g: "Splendide."
 elgar.105.t: "Le festival Beethoven"
 elgar.105.d: "Après quatre jours de musique de haut niveau, le Festival de Beethoven peut être considéré comme un succès complet, même si les événements de cette ampleur ne peuvent pas se passer de leurs scandales."
 elgar.105.f: "La cérémonie n'était pas sans ses moments gênants. Le monument de Beethoven a tourné le dos aux invités les plus importants, le roi Frederick William IV de Prusse et la reine britannique Victoria, qui avait pris leur place sur le balcon du palais de Fürstenberg. Alexander von Humboldt a sauvé la journée en faisant remarquer que Beethoven avait toujours été un gars grossier. Encore plus embarrassant était le fait que, lors des toasts au banquet du festival dans le «Goldene Stern», Liszt a snobé le contingent français dirigé par Berlioz et a presque causé une émeute. Le banquet a été perturbé par le comportement de Lola Montez, qui a dansé sur une table et a embarrassé Liszt en insistant sur le fait qu'elle était son invitée lors des célébrations et exigeant un siège approprié à son statut revendiqué, bouleversant ainsi un accord de sièges pré-organisé."
 elgar.105.g: "Beethoven nous tourne le dos?"
 elgar.105.h: "Alexander von Humboldt est un gentleman."
 elgar.105.i: "Ces Allemands n'ont pas d'élégance."
 elgar.105.j: "C'était inspirant."
 elgar.106.t: "Cantate de Liszt"
 elgar.106.d: "Franz Liszt avait le grand honneur d'écrire et d'exécuter publiquement la cantate pour l'inauguration du monument Beethoven."
 elgar.106.f: "`` Que cela puisse, sa cantate, vraiment bien pratiquée et chaleureusement applaudi par les trois quarts et la demie du couloir, est une grande et belle chose, qui élève tout de suite Liszt parmi les compositeurs. L'expression est vraie, la droite d'intonation, le style sublime et le nouveau, la forme bien conçue et exécutée consciencieusement, l'instrumentation remarquable pour sa vigueur et sa variété. Il n'y a jamais une succession des mêmes sons dans son orchestre, qui fait certaines œuvres, une fois précieux, si fastidieux pour l'auditeur; Il sait comment utiliser les petits et grands moyens, il ne demande ni les instruments ni les voix; En un mot, il a montré qu'un coup est tombé qu'il avait du style dans l'instrumentation et dans les autres parties de l'art musical, car on craignait qu'il ne l'avait pas encore trouvé. - Hector Berlioz"
 elgar.106.g: "Grêle! Grêle! Beethoven, grêle!"
 elgar.107.t: "Berlioz au Festival de Beethoven"
 elgar.107.d: "Les célébrations entourant le dévoilement du monument de Beethoven ont donné un inspiration considérable au compositeur Hector Belriz."
 elgar.107.f: "«C'est lors de ce voyage en Autriche, en Hongrie, en Bohême et en Silésie que j'ai commencé à composer ma légende de Faust, dont je réfléchissais depuis longtemps. Dès que j'ai décidé de l'entreprendre, j'ai dû me contenter de m'écrire la plupart du livret; Les fragments de la traduction française de Faust de Goethe par Gérard de Nerval, que j'avais déjà mis en musique vingt ans auparavant, et que j'avais l'intention d'inclure dans la nouvelle partition dans une version révisée, et deux ou trois autres scènes qui avaient été écrites avant mon départ de Paris par M. Gandonnière après mes instructions, n'a pas été rédigé jusqu'à mon travail de l'œuvre. Pendant le voyage dans l'ancien entraîneur de scène allemand, j'ai donc essayé d'écrire les versets destinés à ma musique. J'ai commencé avec l'invocation de Faust à la nature, sans tenter de traduire ou même d'imiter le chef-d'œuvre de Goethe, mais seulement pour s'en inspirer et extraire la substance musicale qu'il contenait. Une fois que j'ai commencé, j'ai écrit les versets restants car les idées musicales m'est venue, et j'ai composé la partition avec une facilité que j'ai rarement vécue avec mes autres œuvres. - Hector Berlioz"
 elgar.107.g: "Alors, le voyage en valait-il?"
 elgar.108.t: "Victoria visite la cathédrale de Cologne"
 elgar.108.d: "La reine Grande-Bretagne Victoria a utilisé son séjour en Rhénanie comme une opportunité de visiter la cathédrale de Cologne et d'en savoir plus sur la construction de la cathédrale qui vient de commencer."
 elgar.108.f: "Le départ précoce de la Royal Company du concert était dû au fait que dans l'après-midi, il y avait une visite de la cathédrale de Cologne, qui a eu lieu à la sonnerie festive des cloches. Les Majestés ont ensuite traversé l'entrée principale de la nef centrale de la chorale, dans laquelle une cantate de fête était interprétée par la Cologne Men's Choral Society avec l'accompagnement d'orgue du directeur musical Weber."
 elgar.108.g: "Nous sommes honorés."
 elgar.111.t: "Un monument pour Mozart"
 elgar.111.d: "Les préparatifs pour ériger un monument à Wolfgang Amadeus Mozart battent leur plein. Cependant, les dons sont toujours collectés."
 elgar.111.f: "En 1835, l'écrivain Julius Schilling, venu de Posen dans ce qui est maintenant Pologne, a suggéré un mémorial sur ce qui est maintenant Mozartplatz pour Mozart, qui était relativement inconnu à Salzbourg à l'époque. Des sponsors importants à l'étranger mais également à Vienne ont finalement soutenu la construction du monument. Le roi bavarois Ludwig I de la Bavière a fait don d'une somme considérable et a fait don de la base de la statue de bronze."
 elgar.111.g: "Mozart était un titan de musique allemand!"
 elgar.113.t: "Le monument Mozart"
 elgar.113.d: "Today the memorial for Salzburg's greatest son was unveiled in his birthplace."
 elgar.113.f: "Conçue par Ludwig Schwanthaler et castée par Johann Baptist Stiglmaier, le monument a été dévoilé cérémonieusement le 5 septembre 1842 en présence des deux fils survivants de Mozart, Franz Xaver et Carl Thomas. Cependant, la veuve de Mozart n'a pas pu voir l'inauguration. Elle était décédée peu de temps avant dans la maison de Mozartplatz 8. Un festival avec une procession en torch, des excursions en bateau, des trains alpins, des tirs cibles et des courses de chevaux ont encadré la célébration."
 elgar.114.t: "Un mémorial vivant"
 elgar.114.d: "Les efforts pour ériger un monument à Mozart augmentent en Autriche. Certains citoyens de Francfort veulent donc organiser un concert de prestations - et lier l'idée au contenu politique."
 elgar.114.f: "À l'origine, la citoyenneté de Francfort voulait organiser un concert pour percevoir suffisamment de dons pour un monument Mozart. Les personnalités des monuments aux bourgeois étaient une nouveauté en Allemagne. L'érection des monuments en l'honneur de personnalités nationales telles que les artistes ou les scientifiques était donc une occasion bienvenue d'exprimer des sentiments patriotiques. Certains à Francfurt suggèrent même d'organiser une réunion des chanteurs nationaux, dont le produit devrait se présenter dans une base pour les musiciens allemands pour promouvoir les jeunes musiciens."
 elgar.114.g: "Collectez de l'argent pour notre propre mémorial de vie - un festival en l'honneur de Mozart!"
 elgar.114.h: "Donnez de l'argent au monument à Salzbourg."
 elgar.115.t: "Invitation au sängerfest"
 elgar.115.d: "La citoyenneté de Francfort a invité des chanteurs patriotiques de notre nation à participer à un festival Mozart."
 elgar.115.g: "Une opportunité musicale et nationale."
 elgar.115.h: "Je ne supporte pas les chansons d'art."
 elgar.116.t: "Le festival Mozart"
 elgar.116.d: "42 Sociétés chorales de la Rhénanie, Baden, Hessen et Franconia se sont rencontrées à Francfort pour célébrer un festival de trois jours de la musique de Mozart. L'événement s'est cependant transformé en une manifestation pour l'unification politique de l'Allemagne. L'argent collecté a été collecté pour une fondation pour soutenir les jeunes compositeurs."
 elgar.116.f: "«La ville est allée dans des ravages. Les maisons étaient remplies de gens jusqu'aux puits de lumière. Les habitants de Mainz, Hanau et Offenbach sont venus en bateau au son des coups de canon, entourés de bateaux décorés de musique; à travers toutes les portes dans lesquelles ils sont entrés. C'était une vue puissamment émouvante, l'intérêt artistique est devenu secondaire, mais le National nous a approché puissamment; Je ne nierai pas que des larmes brillantes coulaient sur mes joues. - Heinrich Hoffmann"
 elgar.116.g: "La musique rassemble la nation."
 elgar.117.t: "Les fauteurs de troubles libéraux font du bruit à Francfort"
 elgar.117.d: "Il n'a pas échappé à notre avis que certains «patriotes» d'esprit de Jacobin ont exploité un supposé festival Mozart à Francfort pour leur agitation politique."
 elgar.117.f: "42 Sociétés chorales de la Rhénanie, Baden, Hessen et Franconia se sont rencontrées à Francfort pour célébrer un festival de trois jours de la musique de Mozart. L'événement s'est cependant transformé en une manifestation pour l'unification politique de l'Allemagne. L'événement était à l'origine basé sur le financement du monument Mozart, mais les initiateurs ont rapidement changé l'objectif de l'organisme de bienfaisance en faveur de leur propre fondation."
 elgar.117.g: "Une conspiration contre l'ordre dans la Confédération allemande!"
 elgar.117.h: "Laissez-les chanter."
 elgar.121.t: "La fondation de la General German Music Association"
 elgar.121.d: "Aujourd'hui, l'Allgemeiner Deutscher Musikverein (Association générale allemande de musique) a été fondée à [SCOPE.sState('elgar_musikverein_capital').GetCityHubName]. Une discussion s'est immédiatement engagée pour savoir si nous appartenons à la Nouvelle École allemande ou si nous défendons l'idée conservatrice de la musique."
 elgar.121.f: "La nouvelle école allemande est un terme introduit en 1859 par Franz Brendel, rédacteur en chef du Neue Zeitung Für Musik, pour décrire certaines tendances de la musique allemande. Il a été utilisé par différentes personnes à différents moments avec des significations différentes. Il est généralement convenu que Franz Liszt et Richard Wagner étaient parmi les représentants les plus éminents de la «nouvelle école allemande». Il y a aussi un consensus sur le fait que Johannes Brahms n'a pas participé. Au-delà de cela, les interprétations diffèrent. Le nouveau terme doit être compris comme indiquant toute la période depuis la mort de Beethoven. Selon Brendel, il était courant d'appeler la période de J.S. Bach et Handel «Old German School». La période suivante a été celle des maîtres viennois comme Mozart qui avaient été influencés par le style italien. Beethoven avait de nouveau redirigé l'intérêt vers le nord allemand et avec cela avait ouvert le «Neudeutsche Schule». Les compositeurs des deux côtés se regardaient sur Beethoven comme leur héros spirituel et artistique; Les conservateurs le considèrent comme un pic insurpassable, les progressistes comme un nouveau départ dans la musique."
 elgar.121.g: "Nous faisons partie de la nouvelle école allemande."
 elgar.121.h: "Nous défendons l'école allemande traditionnelle."
 elgar.122.t: "Appartenance à la General German Music Association"
 elgar.122.d: "Des artistes de notre nation ont été invités à la nouvelle Association générale de musique allemande. Une discussion s'est immédiatement présentée sur la question de savoir si nous appartenons à la nouvelle école allemande ou si nous défendons l'idée conservatrice de la musique."
 elgar.123.t: "Emplacement du prochain Congrès du musicien"
 elgar.123.d: "Les membres de la General German Music Association ont choisi [SCOPE.sState('elgar_musikverein_capital').GetCityHubName] comme lieu de la prochaine réunion du Tonkünstler-Versamnlung (Congrès du musicien)."
 elgar.123.f: "En 1859, la première réunion de Tonkünstler a eu lieu à l'occasion du 25e anniversaire du nouveau magazine pour la musique à Leipzig. Lors de la deuxième réunion de Tonkunstler (1861) à Weimar, les statuts de la General German Music Association (ADMV) ont été adoptés par plus de 700 membres fondateurs. Le nouveau magazine pour la musique est devenu l'orgue de l'association. À la fin du 19e siècle, l'ADMV était sous le protectorat du Grand-Duke de Weimar. L'ADMV a organisé un certain nombre de grands rassemblements de Tonkunstler. Il s'est principalement orienté vers la direction de la nouvelle école allemande représentée par Franz Liszt et Richard Wagner. Dans le cadre des objectifs artistiques de l'ADMV, les réunions annuelles de Tonkünstler à différents endroits devaient être organisées, avec des performances d'œuvres importantes, rarement entendues et en particulier de nouvelles œuvres musicales de toutes sortes. Cependant, les œuvres plus âgées qui n'étaient rarement ou non pas dues, mais qui sont intéressantes en raison de leur importance, devaient également être réalisées. De plus, de nouvelles œuvres, musicales ou savantes, devaient être imprimées."
 elgar.123.g: "Nous sommes honorés!"
 elgar.124.t: "Congrès du musicien en [SCOPE.sState('elgar_tonkunstler_state').GetCityHubName]"
 elgar.124.d: "Cette année, Tonkünstler-Versamnlung (Congrès du musicien) aura lieu au [SCOPE.sState('elgar_tonkunstler_state').GetCityHubName]. Nos artistes sont cordialement invités à discuter de la musique et à écouter la performance de nouveaux morceaux de musique oubliés."
 elgar.124.g: "Profitons de la musique et écoutons les contributions de personnes partageant les mêmes idées."
 elgar.124.h: "Juste le bon endroit pour se débarrasser de ces dilettantes musicales."
 elgar.124.i: "Ce sera le jour de la vérité - notre idée de la musique est la seule bonne!"
 elgar.125.t: "Guerre des romantiques"
 elgar.125.d: "Un différend entre les représentants de la nouvelle école allemande et les représentants les plus conservateurs a conduit à un scandale public. Une guerre à part entière entre les deux factions fait déjà rage dans la presse. Il est temps pour [ROOT.GetCountry.GetName] de se tenir derrière leurs artistes."
 elgar.125.f: "La «guerre des romantiques» est un terme utilisé par certains historiens de la musique pour décrire le schisme parmi les musiciens éminents dans la seconde moitié du 19e siècle. La structure musicale, les limites de l'harmonie chromatique et la musique de programme contre la musique absolue étaient les principaux domaines de la discorde. Les parties opposées se sont cristallisées au cours des années 1850. Les membres les plus éminents du cercle conservateur étaient Johannes Brahms, Joseph Joachim, Clara Schumann et le Conservatoire du Leipzig, qui avait été fondé par Felix Mendelssohn. Leurs adversaires, les progressistes radicaux principalement de Weimar, étaient représentés par Franz Liszt et les membres de la soi-disant nouvelle école allemande (allemand: Neudeutsche Schule), et par Richard Wagner. La controverse était d'origine allemande et d'Europe centrale; Des musiciens de la France, de l'Italie et de la Russie n'étaient que marginalement impliqués. Les compositeurs des deux côtés se regardaient sur Beethoven comme leur héros spirituel et artistique; Les conservateurs le considèrent comme un pic insurpassable, les progressistes comme un nouveau départ dans la musique."
 elgar.125.g: "Soutenez la nouvelle école allemande!"
 elgar.125.h: "Soutenez l'école allemande traditionnelle!"
 elgar.126.t_konservativ: "Les conservateurs remportent la «guerre des romantiques»"
 elgar.126.d_konservativ: "L'écrasante majorité des adeptes de l'école traditionnelle ont remporté le différend sur l'avenir de la musique. La question de savoir si le contenu est correct est d'une importance secondaire: la masse des contributions aux débats et aux polémiques détermine l'image publique."
 elgar.126.f_konservativ: "Un point central de désaccord entre ces deux groupes de musiciens était entre les formes musicales traditionnelles et nouvelles. Ce fut une excroissance du débat sur la viabilité du genre symphonique, qui s'était développé entre les mains de Ludwig Van Beethoven de celle destinée au divertissement à une forme qui comprenait des idéaux sociaux, moraux et culturels. Liszt et son cercle ont favorisé de nouveaux styles par écrit et des formes qui mélangeraient la musique avec des idées narratives et picturales. À cette fin, Liszt a développé le poème symphonique. L'école Leipzig / Berlin a défendu les formes utilisées par les Masters classiques, des formes codifiées par des musicologues tels que Adolf Bernhard Marx du début du 19e siècle. La validité de la musique du programme était également un point de discorde. Dans son livre de 1854, VOM Musikalisch-Schönen, Hanslick a déclaré que la musique n'avait et ne pouvait représenter rien d'autre que lui-même. \ n \ n En fin de compte, #G [GetGlobalVariable('elgar_neudeutsch_yes').GetValue]#! Les membres ont soutenu la nouvelle école allemande et #R [GetGlobalVariable('elgar_konservativ_yes').GetValue]#! Les membres ont soutenu l'école traditionnelle."
 elgar.126.g: "L'école traditionnelle est triomphante."
 elgar.126.t_neudeutsch: "Les progressistes gagnent la «guerre des romantiques»"
 elgar.126.d_neudeutsch: "L'écrasante majorité des adeptes de la nouvelle école allemande a remporté le différend sur l'avenir de la musique. La question de savoir si le contenu est correct est d'une importance secondaire: la masse des contributions aux débats et aux polémiques détermine l'image publique."
 elgar.126.f_neudeutsch: ""
 elgar.126.h: "La nouvelle école allemande est triomphante."
 elgar.131.t: "Franz Liszt commence sa tournée européenne"
 elgar.131.d: "Après un moment plutôt malheureux à Paris, Franz Liszt a décidé d'entreprendre une tournée après l'exemple de son rival Thalberg et de devenir un musicien célèbre internationalement. Sa première destination sera [SCOPE.sCountry('elgar_liszt_destination_scope').GetNameNoFlag]."
 elgar.131.f: "Franz Liszt était un compositeur austro-hongrois, pianiste, chef d'orchestre, directeur de théâtre, professeur de musique. Liszt était l'un des virtuoss de piano les plus importants et les plus influents et, avec une œuvre de plus de 1300 œuvres et arrangements, l'un des compositeurs les plus productifs du 19e siècle. Bien qu'une grande partie de son œuvre puisse être affectée à la littérature sur le piano, Liszt a également donné un élan clair à la musique orchestrale avec le développement du poème symphonique. Son concept de musique de programme et l'utilisation de nouveaux moyens harmoniques et formels l'ont fait - avec Richard Wagner - le protagoniste le plus connu de la nouvelle école allemande. Liszt a commencé une vaste tournée en Europe en 1839, qu'il a poursuivi au cours des huit prochaines années. Cette période a été la plus brillante de Liszt en tant que pianiste de concert et il a reçu de nombreux honneurs et beaucoup d'adulations lors de ses tournées. Au cours de cette période, les premiers rapports de réponses intenses des fans de Liszt sont apparus, qui ont été appelés Lisztomanie. Lisztomanie a été caractérisée par une réaction hystérique à Liszt et à ses concerts. Le jeu de Liszt aurait augmenté l'ambiance du public à un niveau d'extase mystique."
 elgar.131.g: "Nous lui souhaitons tout le meilleur."
 elgar.132.t: "Lisztomanie dans [ROOT.GetCountry.GetNameNoFlag]"
 elgar.132.d: "Le pianiste de renommée mondiale Franz Liszt a choisi notre pays comme la prochaine destination de sa tournée européenne. Les théâtres et les opéra sont déjà entièrement réservés!"
 elgar.132.g: "D'où viennent soudainement toutes ces femmes qui hurlent?"
 elgar.133.t: "Liszt part"
 elgar.133.d: "Liszt a terminé son séjour et a remercié pour l'hospitalité. Lisztomanie continuera en [SCOPE.sCountry('elgar_liszt_destination_scope').GetNameNoFlag]."
 elgar.133.f: "On estime que Liszt est apparu en public bien plus mille fois entre 1839 et 1847. De plus, sa grande renommée en tant que pianiste, qu'il continuerait à jouir longtemps après avoir officiellement pris sa retraite de la scène du concert, était principalement basée sur ses réalisations pendant cette période. Ajoutant à sa réputation, Liszt a donné une grande partie du produit de son travail à des causes caritatives et humanitaires. Il a fait don de grandes sommes au Fonds de construction de la cathédrale de Cologne et à la basilique St. Stephen en ravageur, et a fait des dons privés à des services publics tels que les hôpitaux et les écoles, ainsi que des organisations caritatives telles que le Leipzig Musicians Pension Fund. Après le grand incendie de Hambourg en mai 1842, il a donné des concerts au profit de ceux qui ont laissé des sans-abri. Afin de satisfaire le besoin de ses admirateurs pour une mèche de ses cheveux, Liszt a acquis un chien dont la fourrure a servi inaperçu comme source de boucles."
 elgar.301.t: "Bonnes répétitions"
 elgar.301.d: "Les répétitions d'orchestre, menées par un compositeur itinérant, étaient très prometteuses."
 elgar.301.f: "Un compositeur itinérant a conquis l'orchestre en tant que chef d'orchestre et a déjà impressionné par les répétitions!"
 elgar.301.g: "Bien."
 elgar.302.t: "Répétitions médiocres"
 elgar.302.d: "Malheureusement, les répétitions d'orchestre menées par un compositeur itinérant n'étaient pas aussi bonnes que la salle de concert l'avait espéré ..."
 elgar.302.f: "Que cela soit dû à des collègues non coopératifs, à des artistes mal préparés ou à des conditions dans la salle de concert - les répétitions n'augurent pas de bon augure pour la performance."
 elgar.302.g: "Ce n'est pas bien."
 elgar.303.t: "Un dévouement amoureux"
 elgar.303.d: "Une affaire pour une «petite» courtoisie suscite les températures."
 elgar.303.f: "Les artistes ont toujours été connus pour leur mode de vie quelque peu lâche et ont provoqué un ou deux scandales interpersonnels. L'attention repose sur un petit geste, qui a cependant un pouvoir explosif. Un compositeur itinérant a consacré une sonate à une femme mariée et lui a donné la partition originale en cadeau. Cependant, la femme est l'épouse d'un général très respecté dans notre armée. Le cadeau a suscité des spéculations et pourrait nuire à l'image publique de l'homme. L'armée demande une action."
 elgar.303.g: "Je ne vois pas le problème?"
 elgar.303.h: "Scandaleux!"
 elgar.304.t: "Une réception du soir"
 elgar.304.d: "Notre monarque a invité un compositeur itinérant à une réception princière. Le compositeur a montré sa gratitude avec une composition."
 elgar.304.f: "Bien que la culture musicale au 19e siècle ait de plus en plus cherché à se libérer du patronage, les nobles et les rois étaient toujours à l'avant-garde du patronage des arts, et de nombreuses œuvres musicales étaient toujours dédiées aux princes et aux rois. D'un autre côté, la relation personnelle signifiait souvent que les compositeurs qui étaient exclus des académies et des cercles d'art ont pu trouver le soutien d'un patient riche s'ils convenaient à son goût personnel. Une série entière de chefs-d'œuvre de Wagner, par exemple, n'aurait pas été possible sans le soutien personnel du roi Ludwig II de Bavière."
 elgar.304.g: "Quelle belle surprise!"
 elgar.305.t: "Épuisé!"
 elgar.305.d: "Une dispute sur une performance à guichets fermés par un grand compositeur a déclenché un tollé public!"
 elgar.305.f: "Le jour d'une première, une grande foule s'était rassemblée dans l'expectative devant l'opéra, qui avait été épuisée pendant des jours; Même le compositeur qui est apparu ne pouvait obtenir qu'un billet sur le marché noir. Cependant, comme un employé du théâtre avait lui-même vendu des billets supplémentaires, les billets vendus ont dépassé de loin le nombre de sièges. Il y avait des scènes tumultueuses à l'intérieur et devant le théâtre dans lesquelles la musique était presque complètement perdue; Ceux à l'extérieur ont crié pour être laissés entrer, ceux à l'intérieur ont crié pour le calme. Les chœurs d'ouverture pouvaient encore être effectués, mais l'orchestre a abandonné, ce qui était à ce moment-là que la raquette a vraiment commencé."
 elgar.305.g: "Qui en est responsable ?!"
 elgar.306.t: "Premiere surprenant"
 elgar.306.d: "Le travail d'un compositeur qui a échoué dans son pays d'origine a capturé le cœur de notre public."
 elgar.306.f: "Il y a toujours eu des cas dans lesquels la première des œuvres célèbres a échoué. De telles expériences ont souvent conduit non seulement à un doute sérieux et à la fin d'une carrière, mais aussi à une tentative d'exécuter le même jeu pour un public différent. Les classiques ultérieurs ne prévalaient souvent que lors de la deuxième ou de la troisième tentative. Pas le lieu de la première, mais le lieu de réussite a ensuite été rappelé comme l'étincelle initiale réelle. Hector Berlioz est un exemple de compositeur qui a connu un plus grand succès avec ses œuvres en Grande-Bretagne et en Allemagne qu'à la maison en France."
 elgar.306.g: "Notre public est plus reconnaissant."
 elgar.307.t: "Amitié musicale"
 elgar.307.d: "Un compositeur itinérant s'est immédiatement compris avec ses collègues musiciens sur place."
 elgar.307.f: "La relation entre les musiciens étrangers et résidents n'a pas toujours été facile. Ce n'était pas seulement le ressentiment national et les préjugés personnels. Certains orchestres ne pouvaient pas travailler avec le style conducteur d'un chef d'orchestre, parfois la nature à court terme des performances nécessitait des compromis, pour lesquels l'invité a à son tour blâmé le monde de la musique locale. De nombreux compositeurs ou chefs d'orchestre locaux craignaient également que l'influence des étrangers soit trop grande. Cependant, malgré tous ces obstacles, les amitiés ont continué de croître."
 elgar.307.g: "A fruitful friendship."
 elgar.308.t: "Rivalité musicale"
 elgar.308.d: "Le monde de la musique locale considère l'apparition d'un compositeur itinérant avec ressentiment et suspicion."
 elgar.308.f: "«Deux grandes œuvres pour l'Opéra, deux autres pour la Renaissance, deux autres pour l'opéra-copie, et encore une autre pour le théâtre Italien? Il semble que Monsieur Donizetti nous traite comme un pays conquis, c'est une véritable invasion. On ne peut plus parler des opéra de Paris, mais uniquement des opéra de monsieur Donizetti. - Hector Berlioz"
 elgar.308.g: "Ces musiciens devraient se rassembler!"
 elgar.309.t: "Inspirations"
 elgar.309.d: "Un compositeur étranger a inspiré les membres de l'orchestre d'État."
 elgar.309.f: "L'influence extérieure a souvent fait une différence dans le monde de la musique locale et nationale. Des pièces inconnues, une langue musicale étrangère ou l'apparition d'un musicien charismatique pouvaient souvent conduire les musiciens locaux à acquérir une perspective complètement nouvelle."
 elgar.309.g: "Inspiration? Je veux voir les résultats!"
 elgar.309.h: "Cela aura un effet positif sur l'orchestre."
 elgar.310.t: "Manie"
 elgar.310.d: "L'apparition d'un compositeur a conduit à un enthousiasme public sans précédent et presque hystérique pour son travail. Les gens n'ont rien d'autre en tête!"
 elgar.310.f: "`` Lorsque j'ai entendu parler des sorts d'évanouissement qui ont éclaté en Allemagne et spécialement à Berlin, lorsque Liszt s'est montré là-bas, j'ai haussé les épaules avec pitié et je pensais: Sabbataria Allemagne silencieuse ne souhaitait pas la possibilité d'obtenir le petit exercice nécessaire. des conditions politiquement non libres existant au-delà du Rhin. Pourtant, je me suis trompé, après tout, et je ne l'ai pas remarqué avant la semaine dernière, à l'opéra italien, où Liszt a donné son premier concert ... ce n'était vraiment pas un public berlinal et sentimental germaniquement, avant lequel Liszt jouait, tout à fait seul, ou plutôt, accompagné uniquement de son génie. Et pourtant, à quel point sa simple apparence les a affectées! À quel point les applaudissements étaient bruyants qui ont sonné pour le rencontrer! ... quel acclamation c'était! Une véritable folie, inédite dans les annales de la fureur! - Heinrich Heine"
 elgar.310.g: "Alors, ils sont complètement distraits?"
 elgar.311.t: "La musique rassemble les gens"
 elgar.311.d: "Un ambassadeur demande si nous pouvons lui faire un billet pour un concert d'un compositeur qui reste avec nous."
 elgar.311.f: "L'ambassadeur d'une grande puissance est un amoureux d'un compositeur itinérant qui visite actuellement notre pays. Il aimerait assister à une performance, mais il n'y a plus de sièges disponibles. Il nous a donc demandé d'utiliser notre influence politique afin qu'il puisse toujours assister à la performance."
 elgar.311.g: "Haha. Non."
 elgar.311.h: "Donnez-lui une place de choix."
 elgar.312.t: "Tentative d'assassinat à l'opéra!"
 elgar.312.d: "Une terrible tentative d'assassinat contre un homme politicien de premier plan dans notre pays a éclipsé la performance d'opéra d'aujourd'hui!"
 elgar.312.f: "Depuis un certain temps maintenant, le manque de légitimité de notre gouvernement a provoqué l'insatisfaction de la population. Un assassin sournois a profité du concert d'un compositeur populaire pour tourner un haut responsable du gouvernement pendant la représentation. [SCOPE.sCharacter('elgar_leader_victim').GetFullName] a été gravement blessé. L'auteur est toujours en fuite, la victime blessée mortelle a été immédiatement emmenée à l'hôpital le plus proche."
 elgar.312.g: "Où étaient les forces de sécurité ?!"
 elgar.313.t: "Une œuvre mineure"
 elgar.313.d: "Un petit travail composé par le grand compositeur de notre pays n'est peut-être pas un grand succès, mais il a trouvé ses fans."
 elgar.313.f: "Des œuvres occasionnelles de compositeurs créées en dehors des œuvres célèbres ne devaient pas être de qualité moyenne en même temps. Maintes et maintes fois, les petits morceaux ont réussi à attirer plus d'attention que beaucoup de travail de vie. Malgré sa richesse de travail, Nikolai Rimsky-Korsakov est célèbre dans la culture pop pour le `` Flight of the Bumblebee '' (de Tsar Saltan) et Edvard Grieg pour `` dans la salle du roi de la montagne '' (de Peer Gynt) - à tort, mais un succès musical est un succès musical."
 elgar.313.g: "Parfois, ce sont les petites choses qui apportent de la joie."
 elgar.314.t: "Aucune inspiration"
 elgar.314.d: "Décevant, notre invité trouve que le séjour dans notre pays est complètement sans inspiration."
 elgar.314.f: "Parfois, cela ne fonctionne tout simplement pas."
 elgar.314.g: "Déprimant."
 elgar.315.t: "Concert"
 elgar.315.d: "Outre les performances officielles, notre compositeur a donné un concert privé dans un petit cercle."
 elgar.315.f: "Les petits concerts privés de grands compositeurs ont une longue tradition. Le plus célèbre pour cela est Franz Schubert avec les Schubertiades nommés d'après lui. Lors du premier Schubertiades, Franz Schubert a joué le piano, et les barytones Johann Michael Vogl et plus tard Carl von Schönstein ont chanté ses chansons. Les soirées comprenaient également des lectures et des jeux de divertissement pleins d'esprit, qui avaient souvent un thème spécifique. Il s'agissait d'un mélange de réunions amicales et de salon musical littéraire."
 elgar.315.g: "C'était sympa."
 elgar.315.h: "Da capo!"
 elgar.316.t: "Un étudiant talentueux"
 elgar.316.d: "Le grand compositeur de notre pays a découvert le talent de l'un des dirigeants politiques de notre pays et a envisagé de lui instruire son art de composition."
 elgar.316.f: "On pourrait être surpris que les politiciens soient capables de talents artistiques, et que, en tant que mauvaises personnes, ils ne devraient en principe pas être complètement insensibles à tout art musical. Il y avait certainement des compositeurs avec des ambitions politiques, mais beaucoup moins de politiciens avec des ambitions musicales. Ce qui pourrait être possédé par ce politicien, son âme n'est peut-être pas irrémédiablement perdue après tout."
 elgar.316.g: "Un candidat prometteur."
 elgar.316.h: "Son énergie est mieux dépensée ailleurs."
 elgar.317.t: "Catastrophe musicale"
 elgar.317.d: "Une performance dans l'une de nos salles de concert pourrait être l'un des plus grands échecs de notre histoire musicale."
 elgar.317.f: "L'orchestre n'était pas préparé, le soliste a attrapé un rhume, le chef d'orchestre n'était pas reposé et le compositeur, en présence duquel la performance a eu lieu, menace de annuler notre pays de sa prochaine tournée. Il n'y a pas d'autre moyen de le décrire qu'un désastre!"
 elgar.317.g: "Une honte internationale!"
 elgar.318.t: "Concert de scandale"
 elgar.318.d: "Un concert scandaleux, qui a simplement mis le public les armes avec ses sons «modernes», non seulement la société, mais a également des conséquences juridiques."
 elgar.318.f: "Les rapports de presse parlent à l'époque d'émeutes tumultueuses. Les disciples du compositeur, ses élèves et ses adversaires se sont criés, se sont jetés les uns sur les autres, ont perturbé la performance, détruit les meubles, etc. Plusieurs fois, les conservateurs indignés du public ont grimpé la scène de la scène pour gifler le chef d'orchestre. Lorsqu'il a menacé que l'ordre serait créé avec l'aide de l'autorité publique, le tumulte aurait vraiment commencé. Puis il y avait une gifle dans le visage. Dans la suite judiciaire suivante, un compositeur de l'opérette qui était présent a déclaré: L'applaudissement des gifles «était la chose la plus mélodieuse que l'on pouvait entendre ce soir-là»."
 elgar.318.g: "La racine n'a aucun sens de la culture. C'était excellent!"
 elgar.318.h: "Retirez la pièce de la planche immédiatement."
 elgar.319.t: "Zeitgeist"
 elgar.319.d: "La pièce moderne, qu'un grand compositeur a personnellement mené aujourd'hui, frappe exactement le goût des masses."
 elgar.319.f: "Parfois, il faut juste avoir de la chance."
 elgar.319.g: "Excellent!"
 elgar.320.t: "Propagande musicale"
 elgar.320.d: "Certains politiciens du gouvernement examinent si la musique du compositeur qui reste actuellement avec nous pourrait être ... emprunté à des fins de propagande."
 elgar.320.f: "Surtout dès le début du 20e siècle et la société de masse qui a produit les régimes totalitaires de l'époque, l'idée de rendre les masses dociles à travers la musique a prévalu. Alors que certains musiciens ont résisté à la dictature même en ces temps, il y en avait d'autres qui ont mis leur travail directement au service d'une idéologie, ou du moins permis à leur talent d'être mis au service d'une direction politique."
 elgar.320.g: "La musique devrait être exempte de politique."
 elgar.320.h: "Parfois, la musique devrait servir la politique."
 elgar.321.t: "Grands compositeurs entre eux"
 elgar.321.d: "Notre invité musical a rencontré un grand compositeur employé par notre pays. Dans les conversations et les promenades d'une heure, ils ont échangé des pensées et des idées musicales."
 elgar.321.f: "Les grands esprits pensent de la même façon."
 elgar.321.g: "Une rencontre historique."
 elgar.406.t: "La mort de Maestro [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetLastName]"
 elgar.406.d: "[GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName], le principal autorité musicale de [GetPlayer.GetNameNoFlag], est décédé de façon inattendue aujourd'hui. Le monde de la musique pleure cette grande perte."
 elgar.406.f: "`` Alors que nous nous tenons ici sur la tombe de ce défunt, nous sommes pour ainsi dire les représentants d'une nation entière, pleurant la chute de la moitié très célébrée de ce qui nous a laissé de la splendeur disparue de l'art indigène et de la floraison intellectuelle patriotique. L'héritier et l'expanneur de Handel et de Bach, de la renommée immortelle de Haydn et de Mozart, a vécu sa vie, et nous nous faisons pleurer la chaîne brisée du jeu fané. \ Nof the Faded Play! Laissez-moi l'appeler ainsi! Car il était un artiste et ce qu'il était, il ne faisait que par l'art. -Franz Grillparzer"
 elgar.406.g: "Mais qui devrait y écrire maintenant?"
 elgar.411.t: "Superbe concerto"
 elgar.411.d: "La saison des concerts dirigée par notre chef d'orchestre [SCOPE.sCharacter('elgar_conductor').GetFullName] a de loin dépassé les attentes!"
 elgar.411.f: "«Le public devrait être strict, devrait siffler, mais leurs applaudissements ne devraient pas m'engager dans quoi que ce soit.» - Giuseppe Verdi"
 elgar.411.g: "Bravo!"
 elgar.412.t: "Concerto médiocre"
 elgar.412.d: "La saison de concert sous la direction de notre chef d'orchestre [SCOPE.sCharacter('elgar_conductor').GetFullName] se déroule comme d'habitude. Jusqu'à présent, il n'y a pas eu de moments exceptionnels."
 elgar.412.f: "\"Il ne faut pas se considérer comme divin que l'on ne peut pas parfois améliorer ses propres œuvres.\" - Ludwig van Beethoven"
 elgar.412.g: "*bâillement*"
 elgar.413.t: "Mauvais concerto"
 elgar.413.d: "Jusqu'à présent, la saison des concerts n'était pas seulement inférieure à la moyenne; Les performances de notre chef d'orchestre [SCOPE.sCharacter('elgar_conductor').GetFullName] sont considérées comme particulièrement décevantes cette année. Le public ne demande même pas de rappel ..."
 elgar.413.f: "\"Après les dernières notes de Gotterdammerung, j'avais l'impression d'avoir été dérangée de prison.\" - Pjotr ​​tchaikovsky"
 elgar.413.g: "Boooo!"
 elgar.414.t: "Un ambassadeur dans le public"
 elgar.414.f: "\"Le prélude à Tristan et Isolde me rappelle la vieille peinture italienne d'un martyr dont les intestins sont lentement déroulés de son corps sur une bobine.\" - Eduard Hanslick"
 elgar.414.g: "L'homme ne sait même pas ce qu'est la musique."
 elgar.414.h: "Enfin quelqu'un le dit!"
 elgar.415.t: "Ballet"
 elgar.415.d: "Une nouvelle pièce de ballet moderne a célébré sa première aujourd'hui."
 elgar.415.f: "«J'aime l'intrigue du casse-noisette - pas du tout. - Pjotr ​​tchaikovsky"
 elgar.415.g: "Danse!"
 elgar.416.t: "Films de musique"
 elgar.416.d: "L'une des premières bandes originales de films a été enregistrée aujourd'hui pour un long métrage sous la direction de notre chef d'orchestre."
 elgar.416.f: "«La musique de film devrait avoir la même relation avec le drame du film que le piano de quelqu'un qui joue dans mon salon a le livre que je lis. - Igor Stravinsky"
 elgar.416.g: "J'avais un complot de script sur un archéologue à la recherche de l'arche de l'alliance il y a longtemps, mais il a ensuite été volé."
 elgar.417.t: "La saison de conduction se termine"
 elgar.417.d: "La dernière performance de la saison des concerts a pris fin. Les avis sont déjà dans la presse. Il semble que [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetLastName] ait bien fait et a acquis une reconnaissance. La qualité de l'orchestre d'État se serait considérablement améliorée - ce qui augmente la réputation musicale de notre nation."
 elgar.417.f: "Les compositeurs qui ne sont pas encore des chefs d'orchestre peuvent acquérir la capacité de mener par la pratique à la fin d'une session de concert. Après la troisième saison au plus tard, l'acquisition du statut de conducteur est certaine. C'est un bon moyen de former des compositeurs non Virtuoso, puis de les envoyer en tournée."
 elgar.417.g: "Da capo!"
 elgar.421.d: "Notre compositeur souffre actuellement d'un bloc d'écriture massif."
 elgar.422.t: "Une promenade"
 elgar.422.d: "Sur une promenade dans la nature, [SCOPE.sCharacter('elgar_conductor').GetFullName] a trouvé une inspiration qui a fait avancer son travail."
 elgar.422.f: "La nature a déjà inspiré de nombreux compositeurs. Beethoven s'est retiré à la campagne et a recueilli des impressions qui l'ont inspiré plus tard à écrire la 6e symphonie. Gustav Mahler a même mis en place son propre chalet de petit compositeur."
 elgar.422.g: "Sur les traces de Beethoven."
 elgar.423.t: "Pas assez de confort"
 elgar.423.f: "Dès que vous donnez aux artistes un emploi important, ils viennent avec des demandes spéciales. Une figure publique sérieuse devient rapidement une diva si vous la faites se sentir importante. Avant de le savoir, la renommée va dans la tête de ces gens."
 elgar.423.g: "Lui donner du réconfort"
 elgar.424.t: "Perturbations"
 elgar.424.f: "Il y a une personne qui rend la vie difficile à [SCOPE.sCharacter('elgar_conductor').GetFullName]. Que ce soit un fan ou simplement une personne qui croit pouvoir acquérir une influence politique en étant particulièrement proche d'une personnalité publique célèbre. Vous pourriez presque l'appeler une groupie. Les perturbations sont désormais si mauvaises que [SCOPE.sCharacter('elgar_conductor').GetLastName] se plaint de la paraonie. Malheureusement, le «fan» est une figure politique de haut rang dont l'ostracisme public aurait des conséquences compréhensibles."
 elgar.424.g: "Ne le dérangez pas!"
 elgar.424.h: "Il doit y faire face."
 elgar.431.t: "[SCOPE.sCharacter('elgar_conductor').GetCustom('elgar_composer_masterpiece_for_concerto_event_type')]"
 elgar.431.d: "After several months of effort and artistic creativity, [SCOPE.sCharacter('elgar_conductor').GetFullName] today presented [SCOPE.sCharacter('elgar_conductor').GetHerHis] [SCOPE.sCharacter('elgar_conductor').GetCustom('elgar_composer_masterpiece_for_concerto_event_type')] today with him at the podium."
 elgar.431.f: "Un concerto est, de la fin de l'ère baroque, principalement compris comme une composition instrumentale, écrite pour un ou plusieurs solistes accompagnés d'un orchestre ou d'un autre ensemble. En tant que genre de musique instrumentale, les premières œuvres ont émergé du Concerto Grosso au début du XVIIIe siècle. Il trouve sa pleine expression dans la période classique. Il est généralement en trois mouvements, avec un mouvement lent au milieu."
 elgar.432.t: "[SCOPE.sCharacter('elgar_conductor').GetCustom('elgar_composer_masterpiece_for_symphony_event_type')]"
 elgar.432.d: "A very special performance is taking place in the concert hall tonight: high society has gathered to attend the premiere of [SCOPE.sCharacter('elgar_conductor').GetFullName]'s new [SCOPE.sCharacter('elgar_conductor').GetCharacter.GetCustom('elgar_composer_masterpiece_for_event_type')]."
 elgar.432.f: "Une symphonie est un terme pour les travaux instrumentaux de forme et d'instrumentation variables au cours des siècles. La forme classique de la symphonie s'est développée au XVIIIe siècle et a maintenu une position dominante dans le domaine de la musique orchestrale jusqu'au 20e siècle. Il s'agit d'une œuvre composée de plusieurs mouvements (généralement trois ou quatre, plus rarement cinq) pour l'orchestre sans solistes. Depuis la 9e symphonie de Ludwig Van Beethoven, les parties vocales (solistes et / ou chorales) sont également apparues parfois, par exemple à Gustav Mahler, bien que le rôle de l'orchestre reste dominant."
 elgar.433.t: "[SCOPE.sCharacter('elgar_conductor').GetCustom('elgar_composer_masterpiece_for_opera_event_type')]"
 elgar.433.d: "The opera '[SCOPE.sCharacter('elgar_conductor').GetCustom('elgar_composer_masterpiece_for_opera_event_type')]', composed by Maestro [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetLastName] after many weeks and months of effort, is considered a new highlight in the musical work of this artistic genius. The upcoming premiere promises to be a great success."
 elgar.433.f: "Opera est un genre musical de théâtre qui a émergé à l'époque baroque. Un opéra se compose d'un cadre musical d'un poème dramatique interprété par un ensemble de chanteurs, un orchestre qui l'accompagne, et parfois une chorale et un ensemble de ballet. En plus du chant, les acteurs interprètent le théâtre et la danse sur une scène de théâtre conçue à l'aide de la peinture, de l'architecture, des accessoires, de l'éclairage et de la technologie de scène. Les rôles des acteurs sont visuellement illustrés par des masques et des costumes. Claudio Monteverdi, qui établit des normes avec son Orfeo, est considéré comme l'oreille de l'opéra. Au 19e siècle, Richard Wagner a établi de nouvelles normes avec ses opéras."
 elgar.440.t: "Musique folklorique"
 elgar.440.d: "Voyageant à travers les régions les plus rurales du pays, [SCOPE.sCharacter('elgar_conductor').GetFullName] a trouvé un grand intérêt pour l'apprentissage, l'écriture et la collecte des danses et des chansons de la population locale."
 elgar.440.f: "Le nationalisme du XIXe siècle a signifié que de nombreuses formes de musique auparavant injuriées ont soudainement suscité l'intérêt parce qu'ils reflétaient l'âme nationale d'un pays. Les historiens locaux et les musiciens locaux ont collecté des chansons traditionnelles. Certains compositeurs se sont également inspirés des gens et les ont mis en musique d'une manière complètement nouvelle."
 elgar.440.g: "Une collection de musique intéressante."
 elgar.440.h: "[SCOPE.sCharacter('elgar_conductor').GetLastName] devrait se concentrer sur une culture élevée au lieu de gérer la musique de broyeur d'orgue."
 elgar.441.t: "Bidonville"
 elgar.441.d: "Inspiré par les actes de l'amiral [SCOPE.sCharacter('elgar_admiral').GetLastName], notre compositeur [SCOPE.sCharacter('elgar_conductor').GetFullName] a écrit un petit bidonville en mer sur le côté."
 elgar.441.f: "Le but pratique original du bidonville en tant que chanson de travail a toujours été primordial parmi les marins. Les aspects linguistiques et musicaux, en revanche, ont à peine joué un rôle. Avec le début de la révolution industrielle, des navires plus rapides étaient nécessaires. L'indiamen oriental à ventre à ventre a disparu et a été remplacé par des tondeuses et des frégates. Cela a finalement conduit les Shanties à perdre progressivement leur utilisation pratique pour la mer et être chantée uniquement pour les loisirs et le divertissement. Les musiciens ont collecté Old Sea Shanties ou ont été inspirés par eux pour créer leurs propres œuvres."
 elgar.441.g: "Yo ho!"
 elgar.442.t: "Mars"
 elgar.442.d: "Inspiré par les valeurs du général [SCOPE.sCharacter('elgar_general').GetFullName], notre compositeur [SCOPE.sCharacter('elgar_conductor').GetFullName] a écrit une nouvelle marche militaire."
 elgar.442.f: "La marche a prospéré en particulier au 19e et au début du XXe siècle avec ses tendances nationalistes et militaristes et ses révolutions. Un exemple de cela est Gioachino Rossini, qui non seulement incorporait régulièrement des marches pompantes dans ses opéras, mais a également composé un certain nombre de pièces pour les princes individuels: y compris une composition commandée pour le sultan turc Abdülmecid I (Marcia per Il Sultano), qui est toujours régulièrement interprétée sur le programme des bandes militaires italiennes. La production de la famille Strauss à Vienne, qui a composé une marche à chaque opportunité appropriée, a également été exemplaire pour les tendances du 19e siècle, qui a composé une marche."
 elgar.442.g: "Nouveau matériel pour l'armée."
 elgar.443.t: "Kunstlied"
 elgar.443.d: "Sur la base du poème d'un grand poète, [SCOPE.sCharacter('elgar_conductor').GetFullName] a écrit un kunstlied comme une œuvre secondaire."
 elgar.443.f: "Dans la tradition musicale classique occidentale, Lied est un terme pour mettre en place de la poésie à la musique classique pour créer un morceau de musique polyphonique. Le terme est utilisé pour tout type de chanson en allemand contemporain, mais parmi les anglophones et les français, le mensonge est souvent utilisé de manière interchangeable avec la `` chanson d'art '' pour englober les œuvres que la tradition a également inspirées dans d'autres langues. Les poèmes qui ont été transformés en Lieder se concentrent souvent sur des thèmes pastoraux ou des thèmes de l'amour romantique."
 elgar.443.g: "Cela n'aurait-il pas pu être autre chose ...?"
 elgar.444.t: "Sonate de piano dans [SCOPE.GetRootScope.GetCountry.GetCustom('elgar_custom_music_chord_name')] [SCOPE.GetRootScope.GetCountry.GetCustom('elgar_custom_music_major_minor_name')]"
 elgar.444.d: "Les pièces de piano font partie du répertoire standard de la musique classique. Comme exercice des doigts pour le prochain travail majeur, [SCOPE.sCharacter('elgar_conductor').GetFullName] a écrit une sonate et l'a exécutée hier soir lors d'une petite soirée."
 elgar.444.f: "Au début du 19e siècle, la forme de la sonate a été définie, à partir d'une combinaison de pratique précédente et des œuvres d'importants compositeurs classiques, en particulier Haydn, Mozart, Beethoven, mais des compositeurs tels que Clementi également. C'est au cours de cette période que les différences entre les mises en page à trois et à quatre mouvements sont devenues un sujet de commentaire, en mettant l'accent sur le concerto disposé en trois mouvements, et la symphonie en quatre. Parmi les ouvrages expressément étiquetés pour le piano, il y a les trois de Frédéric Chopin, ceux de Felix Mendelssohn, les trois de Robert Schumann, Franz Liszt's Sonata en b mineur, puis les sonates de Johannes Brahms et Sergei Rachmaninoff."
 elgar.444.g: "Un classique."
 elgar.445.t: "Traité sur la musique"
 elgar.445.d: "Ces derniers mois, [SCOPE.sCharacter('elgar_conductor').GetFullName] a travaillé largement sur un nouveau traité sur l'orchestration et l'étude des instruments de musique. Le traité est considéré comme une contribution aux innovations musicales."
 elgar.445.f: "\"Il faut beaucoup de temps pour trouver les océans de la musique, mais encore plus pour apprendre à les naviguer.\" -Hector Berlioz"
 elgar.445.g: "Un travail théorique important."
 elgar.446.t: "Requiem"
 elgar.446.d: "Un représentant influent du clergé catholique a récemment demandé à [SCOPE.sCharacter('elgar_conductor').GetFullName] d'écrire un nouveau travail sacré après la mort d'un évêque respecté."
 elgar.446.f: "La forme liturgique de la masse funéraire est le requiem. Le terme décrit à la fois la liturgie de la masse sainte au service funéraire de l'Église catholique et des compositions musicales de l'Église pour la commémoration des morts. Il est dérivé de l'incipit du requiem introim aeternam dona eis, domine («repos éternel, seigneur»). Le proprium de la liturgie du Requiem correspond à celui de toutes les âmes. En tant que premier morceau de la masse musicale, l'introit était généralement mis en musique par les compositeurs, tout comme l'offication, contrairement à la séquence, qui est parfois raccourcie ou omise entièrement pour diverses raisons. Gloria et Credo ne sont pas mis en musique dans le requiem car ils ne sont pas chantés ou parlés dans la liturgie de la messe funéraire."
 elgar.446.g: "Requiem aeternam dona eis, domine."
 elgar.447.t: "Un opéra audacieux"
 elgar.447.d: "La dernière composition de [SCOPE.sCharacter('elgar_conductor').GetFullName] a rencontré des critiques des autorités de censure. Il est certainement d'une grande valeur artistique, mais pourrait provoquer un tollé. L'intelligentsia du pays est déjà en armes."
 elgar.447.f: "Dans une grande partie du 19e siècle, même les plus grands compositeurs de leur temps ont dû se soumettre à la censure. Les nombreux paramètres différents de «Figaro» étaient considérés comme très critiques en raison du thème révolutionnaire. Le blasphème suspecté ou d'autres immoralités étaient également une épine à côté des censeurs. À un certain moment, certains compositeurs ne pouvaient plus supporter le harcèlement et quitter leur sponsor."
 elgar.447.g: "L'art devrait augmenter, pas provoquer un tollé."
 elgar.447.h: "Nous devons détendre un peu la censure."
 elgar.448.t: "Duel compositeur"
 elgar.448.d: "[SCOPE.sCharacter('rival_composer_scope').GetFullName], un compositeur de [SCOPE.sCountry('rival_composer_country_scope').GetName], dans un ajustement de l'arrogance typique de ce pays, a décrit notre compositeur [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName] comme un «numéro inconnu» et a fondamentalement remis en question le statut musical de notre nation."
 elgar.448.f: "`` La fragmentation et l'arbitraire de notre style musical ont été, sinon provoqués, au moins augmentés au plus haut pic par les efforts de Mendelssohn pour exprimer un contenu peu clair, presque dénué de sens aussi intéressant et aveuglément que possible. Alors que le dernier de la chaîne de nos véritables héros musicaux, Beethoven, avait le plus de désir et la plus grande capacité miraculeuse pour l'expression la plus claire et la plus certaine d'un contenu ineffable par la conception en plastique fortement coupée de ses images sonores, Mendelssohn, d'autre part, brouille ces figures acquises dans ses production Une vision artistique claire n'est guère touchée qu'avec l'espoir d'accomplissement. -Richard Wagner sur Felix Mendelssohn"
 elgar.448.g: "Nous acceptons le défi."
 elgar.448.h: "Nous ne pouvons pas survivre à ce duel."
 elgar.449.t: "Victoire dans le duel du compositeur"
 elgar.449.d: "Le [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName] s'est montré un compositeur beaucoup plus célèbre et capable que son rival smarmy, préservant ainsi la réputation de notre nation en tant que centre culturel."
 elgar.449.f: "«Rien ne montre plus clairement le pouvoir de Wagner et le genre de tempête et de stress qu'il a déchaîné que cette décadence que son travail a réellement consacré et qui a développé APACE depuis son temps. À quel point cet homme a dû être puissant d'avoir détruit une forme essentiellement musicale (Opera) avec une telle énergie que cinquante ans après sa mort, nous sommes toujours stupéfiants sous les ordures et la raquette du drame musical! Car le prestige de la synthèse des arts est toujours en vie. Est-ce ce qu'on appelle les progrès? Peut-être. À moins que les compositeurs ne trouvent la force de secouer cet lourde héritage en obéissant à l'admirable injonction de Verdi: «Revenons dans les temps anciens, et ce sera progressé». -Igor Stravinsky sur Richard Wagner"
 elgar.449.g: "Il est maintenant clair quel pays est la nation culturelle dominante!"
 elgar.450.t: "Défaite dans le duel du compositeur"
 elgar.450.d: "Malheureusement, notre compositeur a été vaincu par son rival étranger dans la compétition. Le monde entier est maintenant convaincu que nous sommes tombés en retard musicalement!"
 elgar.450.f: "«Wagner est-il même un être humain? N'est-il pas plus une maladie? Il rend tout ce qu'il touche malade, il a rendu la musique malade. -Friedrich Nietzsche sur Richard Wagner"
 elgar.450.g: "Il est maintenant clair quel pays est la nation culturelle dominante ..."
 elgar.451.t: "Le maestro se rend à [SCOPE.sCountry('elgar_composer_destination_scope').GetNameNoFlag]"
 elgar.451.d: "Notre compositeur [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName] a terminé tous les préparatifs. La première destination de la tournée de concert de deux ans et demi sera le [SCOPE.sCountry('elgar_composer_destination_scope').GetName]."
 elgar.451.f: "«Si le monde devait se terminer, j'irai à Vienne, car c'est là que tout se passe cinquante ans plus tard. - Gustav Mahler"
 elgar.451.g: "Envoyez-nous une carte postale!"
 elgar.452.t: "[SCOPE.sCharacter('elgar_composer_scope').GetLastName] arrive en [GetPlayer.GetNameNoFlag]"
 elgar.452.d: "Un compositeur itinérant s'est arrêté dans notre pays lors de sa tournée actuelle et a décidé de rester pendant un certain temps."
 elgar.452.f: "[SCOPE.sCharacter('elgar_composer_scope').GetCustom('elgar_composer_achievements_switch_to_character_scope_type')]"
 elgar.452.g: "Bienvenue, bienvenue!"
 elgar.453.t: "Compositeur itinérant part"
 elgar.453.d: "Après un séjour de plusieurs semaines et quelques performances qui lui ont valu la reconnaissance de la population locale, le compositeur itinérant a poursuivi sa tournée."
 elgar.453.f: "La destination d'un compositeur dépend d'une gamme complète de facteurs. Un critère décisif est les opéra et la proximité du dernier emplacement. Mais des facteurs tels que les technologies culturelles, la présence d'un centre d'art (impressionnisme, expressionnisme, art nouveau) ou l'existence d'un conservatoire jouent également un rôle. Les compositeurs évitent les endroits où une performance d'un compositeur rival a récemment eu lieu."
 elgar.453.g: "J'espère vous revoir bientôt!"
 elgar.455.t: "Le compositeur revient de la tournée"
 elgar.455.d: "[GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName] est revenu de la tournée [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetHerHis]. Il a laissé sa marque dans le monde de la musique et a considérablement amélioré sa réputation."
 elgar.455.f: "Les visites existent uniquement pour accroître la réputation d'un compositeur. Selon les capacités d'un compositeur, ce sera différent. Vos propres compositions jouent un rôle, mais les traits de caractère aussi - les personnages innovants ou ambitieux ont des avantages. Les compositeurs qui ont le trait du conducteur et le trait virtuose reçoivent un bonus spécial."
 elgar.455.g: "Bienvenue à nouveau, Maestro."
 elgar.501.t: "Canto degli italiani"
 elgar.501.d: "Dans un climat de lutte populaire pour l'unification et l'indépendance de l'Italie, l'étudiant de 20 ans et patriote Goffredo Mameli a écrit une chanson inspirante, l'appelant «la chanson des Italiens». Il est devenu assez populaire en peu de temps."
 elgar.501.f: "Il Canto degli Italiani (la chanson des Italiens) est surtout connu parmi les Italiens sous le nom de «Inno di Mameli» (Hymne de Mameli), après l'auteur des paroles, ou «Fratelli d'Italia» (frères d'Italie), de sa première ligne. Le texte a été mis en musique par une autre Michele Novaro. L'hymne a apprécié la popularité généralisée tout au long de la période du Risorgimento et dans les décennies suivantes. Il a également été imprimé sur des dépliants dans Gênes et publié le 10 décembre: la manifestation a été officiellement dédiée au 101e anniversaire de l'expulsion des puissances autrichiennes de la ville - en fait, c'était une excuse pour protester contre les occupations étrangères en Italie et induire Carlo Alberto pour embrasser la cause italienne du liberté. À cette occasion, le drapeau tricolore a été montré et l'hymne de Mameli a été publiquement chanté pour la première fois."
 elgar.501.g: "Il devrait y avoir une loi contre cela ..."
 elgar.501.h: "Fratelli d'Italia, L'Italia s'è desta!"
 elgar.503.t: "Deutschland."
 elgar.503.d: "En réponse au renouvellement du désir d'expansion de la France, qui considère le Rhin comme une frontière naturelle, le poète Hoffmann von Fallersleben a écrit une chanson qui est largement populaire en tant que «Deutschlandlied»."
 elgar.503.f: "La chanson des Allemands, également connue sous le nom de Deutschlandlied, a été écrite en août Heinrich Hoffmann von Fallersleben sur Heligoland. La raison spécifique de Hoffmann d'écrire la chanson était les revendications territoriales françaises à la Rhénanie pendant la crise du Rhin. Il a rejeté ces affirmations avec la chanson, comme cela s'est produit avec d'autres chansons allemandes du Rhin de l'époque. Il l'a complété par d'autres idées, en particulier celle de l'unité allemande, qui à elle seule pourrait fournir la condition préalable à la défense contre les attaques ennemies de toute taille. Le poète a créé son œuvre expressément à la mélodie de l'ancien hymne impérial «Dieu sauve Franz, l'empereur» de Joseph Haydn (1797). La chanson n'a gagné plus d'importance pendant la Première Guerre mondiale. Son troisième verset est le texte de l'hymne national allemand depuis 1952."
 elgar.503.g: "Vin allemand et chanson allemande!"
 elgar.503.h: "Allemagne, Allemagne avant tout!"
 elgar.503.i: "Vous devez vous tromper, la chanson s'appelle «Gott Erhalte Franz den Kaiser»."
 elgar.504.t: "La mort de Paganini"
 elgar.504.d: "La mort du célèbre violon virtuose Niccolò Paganini a déclenché une controverse entourant ses funérailles."
 elgar.504.f: "Niccolò Paganini était violoniste et compositeur italien. Il était le virtuose du violon le plus célèbre de son temps et a laissé sa marque comme l'un des piliers de la technique du violon moderne. Ses 24 caprices pour le violon en solo op. Je suis parmi les plus connus de ses compositions et ont servi d'inspiration à de nombreux compositeurs éminents. En mai 1840, l'évêque de Nice a envoyé à Paganini un curé local pour effectuer les derniers rites. Paganini a supposé que le sacrement était prématuré et a refusé. Une semaine plus tard, le 27 mai 1840, Paganini, 57 ans, est décédée d'une hémorragie interne avant qu'un prêtre ne puisse être convoqué. À cause de cela, et son association largement rumeur avec le diable, l'Église a refusé à son corps un enterrement catholique à Gênes. Cela a conduit à une discussion publique sur la façon de gérer Paganini. Il y a des voix en faveur de faire pression sur l'église et d'enterrer Paganini à Gênes, de convenir à son statut et de revendiquer son héritage. Cependant, cela conduirait à un différend ouvert avec les autorités ecclésiastiques."
 elgar.504.g: "Donnez-lui un enterrement digne et obtenez son héritage."
 elgar.504.h: "N'intervenir pas dans cette affaire délicate."
 elgar.505.t: "Nabucco"
 elgar.505.d: "Giuseppe Verdi a célébré jusqu'à présent le plus grand succès de sa carrière avec son dernier opéra. Dans le même temps, cela incite le sentiment national du peuple italien."
 elgar.505.f: "Nabucco est un opéra en langue italienne en quatre actes composés en 1841 par Giuseppe Verdi à un livret italien par Temistocle Solera. Le numéro le plus connu de l'opéra est le «refrain des esclaves hébreux», un refrain qui reçoit régulièrement un rappel dans de nombreuses maisons d'opéra lorsqu'il est exécuté aujourd'hui. Nabucco est l'opéra qui est considéré comme ayant établi en permanence la réputation de Verdi en tant que compositeur. Il a commenté que «c'est l'opéra avec lequel ma carrière artistique commence vraiment. Et même si j'ai eu beaucoup de difficultés à lutter, il est certain que Nabucco est né sous une star chanceuse. L'histoire de la captivité des Juifs en Babylonie est devenue une percée dans toute l'Italie, notamment parce que les Italiens se sentaient dominés par des puissances étrangères à l'ère du nationalisme. Dans quelle mesure Verdi a réellement servi les sentiments nationaux italiens à Nabucco est encore controversé aujourd'hui."
 elgar.505.g: "Va Peniero ..."
 elgar.505.h: "Ces Italiens rebelles à nouveau."
 elgar.507.t: "Aida"
 elgar.507.d: "À l'occasion de l'ouverture du canal de Suez, Giuseppe Verdi a créé son opéra teinté d'égyptien Aida - avec un léger retard."
 elgar.507.f: "Aida est un opéra en quatre actes de Giuseppe Verdi à un livret italien d'Antonio Ghislanzoni, basé sur un scénario souvent attribué à l'Égyptologue français Auguste Mariette, bien qu'il ait été soutenu que le scénario a été réellement écrit par Temistocle Solera. Isma'il Pacha, Khedive d'Egypte, a chargé Verdi d'écrire l'opéra, lui payant 150 000 francs, mais la première a été retardée. Aida a été acclamée lorsqu'elle a finalement ouvert ses portes au Caire. Les costumes et les accessoires de la première ont été conçus par Auguste Mariette, et il a supervisé la conception et la construction des décors, qui ont été créés à Paris et expédiés au Caire. Bien que Verdi n'ait pas assisté à la première au Caire, il était très insatisfait du fait que le public consistait en dignitaires, politiciens et critiques invités, mais aucun membre du grand public. Il a donc examiné la première italienne (et européenne), tenue à La Scala, Milan, et dans laquelle il était fortement impliqué à chaque étape, pour être sa véritable première."
 elgar.507.g: "Un triomphe pour l'Italie!"
 elgar.507.h: "Un triomphe pour [ROOT.GetCountry.GetNameNoFlag]!"
 elgar.509.t: "Franz Schubert"
 elgar.509.d: "13 ans après sa mort, la 5e symphonie de Franz Schubert a été présentée au grand public."
 elgar.509.f: "La cinquième symphonie, dans B Flat Major, est peut-être la plus accomplie de ses jeunes symphonies et est largement considérée comme la première symphonie mûre de Schubert. Son élaboration est de la perfection de la musique de chambre, car l'instrumentation est plus petite que celle de toute autre symphonie, et ses proportions sont finement réglées les unes aux autres. Il peut être compris comme l'examen productif de Schubert des œuvres symphoniques de Mozart et révèle l'altérité et l'indépendance complètes de Schubert. Selon les propres entrées de Schubert sur le score, les travaux ont été composés entre septembre et le 3 octobre 1816; Il a été écrit à un moment où Schubert cherchait sa propre langue musicale. La première représentation de la 5e Symphonie de Schubert a eu lieu avec un petit orchestre amateur à Vienne en 1816; La première représentation publique, en revanche, n'a eu lieu que le 17 octobre 1841, treize ans après la mort de Schubert, sous le bâton de Michael Leitermayer."
 elgar.509.g: "Même du ciel, Schubert nous ravit avec sa musique."
 elgar.510.t: "Controverse sur le poliuto"
 elgar.510.d: "Un différend inconciliable entre le roi et le compositeur Donizetti menace de déclencher son licenciement."
 elgar.510.f: "De 1829 à 1838, Gaetano Donizetti était directeur musical des théâtres royaux de Naples et, malgré des voyages et des commissions dans d'autres États, de facto la figure culturelle la plus importante du Royaume et son plus célèbre représentant. Toute une série de célèbres opéras Donizetti a été écrite à Naples, qui a consolidé la position du royaume des deux siciles comme un lieu de musique de haut niveau. Mais malgré les nombreux succès, Donizetti a dû se battre encore et encore avec la censure napolitaine, qui a dégradé son livre ou a annulé des opéras entiers. Dans le litige le plus récent, le roi lui-même est intervenu pour empêcher la performance de l'opéra «Poliuto». Après de nombreuses années de querelles avec la censure, Donizetti s'est lassé et s'est préparé à fuir pour Paris. L'élite politique s'est unie derrière le roi; Empêcher Donizetti de ses plans ne dérangerait non seulement le paysage politique et social, mais nuirait également massivement à l'autorité et à la réputation du roi."
 elgar.510.g: "Le roi a parlé, il peut emballer ses affaires."
 elgar.510.h: "Nous devons tout faire pour empêcher Donizetti de partir!"
 elgar.511.t: "Les Martyres, 1840"
 elgar.511.d: "Le compositeur italien Gaetano Donizetti a atteint Paris et y a joué son opéra «Les Martyres», qui a été extrêmement bien accueilli par le public."
 elgar.511.f: "Poliuto est une tragédia lirica en trois actes (ou un opéra tragique) de Gaetano Donizetti du livret italien par Salvadore Cammarano, qui était basé sur la pièce de Pierre Corneille en 1641/42. Il reflétait la vie du premier martyr chrétien Saint Polyeuctus. Considéré par un auteur comme \"l'opéra le plus personnel\" de Donizetti, la musique étant \"Certains des meilleurs Donizetti devaient composer\", Poliuto a été écrit en 1838 pour des performances prévues au Teatro San Carlo à Naples plus tard cette année-là. Cependant, près de l'époque pour que les répétitions commencent, le roi Ferdinand II a refusé de permettre au martyre d'un saint chrétien d'être vu sur scène et a interdit la production. En colère contre la décision et avec une commission pour l'Opéra de Paris en raison du compositeur, Donizetti a payé la pénalité au San Carlo pour ne pas avoir produit une œuvre originale en tant que substitut et a quitté Naples à Paris. En tant que première commission pour Paris, il a décidé de réviser Poliuto et entre 1839-1840, un texte français, avec le titre Les Martyres."
 elgar.511.g: "Pas mal pour un italien."
 elgar.512.t: "Le stabat mater"
 elgar.512.d: "Gaetano Donizetti visite Bologne pour diriger la première du stabat mater de Gioachino Rossini. La performance a été un succès complet."
 elgar.512.f: "Lorsque Donizetti est allé à Bologne pour le stabat Mater, Rossini a assisté à la troisième représentation, et les deux hommes - chaque ancienne étudiante du Conservatoire de Bologne - ont rencontré pour la première fois, Rossini déclarant que Donizetti était `` le seul maestro en Italie capable de mener mon stabat comme je l'aurais fait ''. Des amis, dont son beau-frère, Antonio Vasselli (connu sous le nom de Totò) - ont continuellement tenté de le persuader de prendre un poste académique à Bologne plutôt que dans l'engagement du tribunal de Vienne, si ce n'est pour aucune autre raison que cela donnerait au compositeur une base à partir de laquelle travailler et enseigner et ne pas se épuiser continuellement de voyager entre les villes. Donizetti a signalé la réaction du public: «L'enthousiasme est impossible à décrire. Même lors de la répétition finale, auquel Rossini a assisté, au milieu de la journée, il était accompagné chez lui de crier plus de 500 personnes. La même chose la première nuit, sous sa fenêtre, car il n'est pas apparu dans le couloir."
 elgar.512.g: "Rossini & Donizetti - Un match au paradis!"
 elgar.513.t: "Donizetti devient fou?"
 elgar.513.d: "Le déclin mental de plus en plus rapide de Donizetti l'a amené à s'engager dans un asile fou à Paris."
 elgar.513.f: "Donizetti a rapporté dans ses lettres sur une longue période, à partir des années 1820, sur les maux de tête, parfois des attaques de fièvre qui n'ont duré qu'un jour et aussi sur des humeurs dépressives occasionnelles. La quantité extraordinaire de travail qu'il a accomplie tout au long de sa vie, ainsi que les longs trajets qui étaient particulièrement pénibles à l'époque, surtout après avoir déménagé à Paris et plus tard à Vienne, a conduit à des symptômes accrus d'épuisement de 1842 à 1843. Les maux de tête occasionnels ont été accompagnés par des étourdissements et parfois des sensations de la tête. En 1845, la santé de Donizetti s'est détériorée rapidement et il s'est effondré dans la rue à Paris. Les médecins lui ont interdit de composer - ce qui le déprimait encore plus. Enfin, sous de fausses prétextes, il a été attiré dans l'asile fou d'Ivry-sur-Seine à son insu et contre sa volonté, et y a été interné de force. Le compositeur malade a rapidement considéré sa situation comme un «prisonnier» et la classification comme un «maniaque» et a écrit des lettres désespérées et déchirantes à des amis et à des parents demandant de l'aide."
 elgar.513.g: "Peut-être que c'est mieux de cette façon."
 elgar.513.h: "Sortez-le de l'asile fou et donnez-lui le repos à Bergame."
 elgar.514.f: "Il a fallu 17 mois pour que Donizetti soit sauvé de l'asile mental. Un départ prévu a été empêché par les médecins, mais aussi par le préfet de la police de Paris pour des raisons inscriptives. Ce n'est qu'avec l'aide de la pression diplomatique que le compositeur désormais complètement apathique être ramené par son frère Francesco et son neveu Andrea. La fille de la baronne Rosa Rota-Basoni a joué le piano pour le compositeur tous les jours et a chanté Arias de ses œuvres, son ami Dolci lui a parlé dans le dialecte bergamasque et il a reçu une visite du ténor Rubini, mais Donizetti n'a montré plus de réactions. Donizetti est décédé une semaine après un AVC apoplectique avec une hémiplégie, une forte fièvre et des infections ultérieures. Les résultats de l'autopsie ont montré des symptômes de méningite «passée» et d'une moelle épinière enflammée partiellement endommagée."
 elgar.514.g: "Une mort tragique."
 elgar.515.t: "Donizetti guéri"
 elgar.515.d: "Le compositeur s'est rétabli après un remède intensif et veut composer avec un zeste renouvelé à vie."
 elgar.515.f: "Sous la pression de notre gouvernement, Donizetti a été rapidement expulsé de l'asile fou. Sur les ordres du médecin, il devait découvrir un remède à plusieurs mois dans sa ville natale de Bergame dans les meilleures circonstances possibles. Le retour à la vie du pays, la liberté du stress et de la pression, et le retour à ses racines ont porté des fruits après plusieurs mois. Donizetti, apathique pendant des semaines, a répondu à l'un de ses propres Arias, chanté par Giovanna, fille de la baronne Rosa Rota-Basoni. Parler aux membres de la famille dans le dialecte local a également montré du progrès de jour en jour. Après des années de thérapie, le compositeur autrefois en phase terminale semble avoir été ramené à la vie."
 elgar.515.g: "Un miracle médical."
 elgar.516.t: "Liszt contre Thalberg"
 elgar.516.d: "Deux des pianistes les plus célèbres se sont affrontés à Paris: Franz Liszt a contesté le pianiste vivant le plus important, Sigismund Thalberg."
 elgar.516.f: "En hiver 1835/36, Sigismund Thalberg a fait ses débuts dans un concert privé donné par le secrétaire de l'ambassade autrichienne à Paris. Il a été accueilli avec enthousiasme par les artistes présents, y compris Rossini et Meyerbeer, et loué comme inventeur d'un nouveau style de piano. Alors que les concerts de Franz Liszt à Lyon ont apporté environ 500-600 francs, Thalberg a obtenu 10 000 francs d'un seul concert au théâtre italien. Avant que Thalberg n'apparaisse lors de son deuxième séjour à Paris, Liszt a publié une revue criblée d'insinuations et de polémiques. Selon Liszt, le succès de Thalberg est survenu uniquement grâce à la propagande. Thalberg est réapparu à Paris à partir de février 1837 et a de nouveau été célébré. Le 31 mars, les deux artistes se sont produits lors d'un événement caritatif organisé par la princesse Belgiojoso."
 elgar.516.g: "Thalberg était meilleur."
 elgar.516.h: "Liszt était meilleur."
 elgar.517.t: "Von der wiege zum Grabe"
 elgar.517.d: "À Rome, Franz Liszt a terminé son dernier poème symphonique. La communauté musicale ne sait pas quoi faire de la dernière «erreur» de ce compositeur."
 elgar.517.f: "Dans les dernières années de sa vie, Liszt s'est de plus en plus tourné vers la musique sacrée et la musique d'église. Son dernier poème de ton, «du berceau à la tombe» différait donc de tous ses prédécesseurs. Liszt a été inspiré par un dessin du peintre hongrois Mihály Zichy. De grandes sections de l'œuvre ne nécessitent pas un puissant orchestre, en particulier le début, cela ressemble à de la musique de chambre; De nombreuses îles de son se forment dans lesquelles le matériel musical est pauvre, et les passages en solo ne sont pas rares, en particulier à la fin des mouvements. Les harmoniques utilisées sont également un signe avant-coureur à venir. Au cours de sa vie, cependant, les critiques musicales ont évalué le travail comme «l'erreur d'un vieil homme»."
 elgar.517.g: "Les générations ultérieures comprendront."
 elgar.518.t: "Lohengrin"
 elgar.518.d: "La première de «Lohengrin» de Richard Wagner n'était pas seulement une foule complète - mais a déclenché une véritable admiration pour Wagner en Allemagne."
 elgar.518.f: "Lohengrin est un opéra romantique en trois actes du compositeur allemand Richard Wagner. Avec Lohengrin, Wagner a créé la nouvelle forme d'opéra de drame musical à travers. La composition n'est pas divisée en nombres individuels, mais est joué par ACT par ACT sans interruption. Wagner se distingue ainsi de la structure conventionnelle des opéras numériques avec des arias, des récitatives et des parties chorales. Afin de pouvoir traduire la vie intérieure des personnages de la scène en motifs musicaux clairement lisibles, Wagner a utilisé des leitmotifs (par exemple le motif du Graal et le motif d'interdiction de questions). L'opéra a inspiré d'autres œuvres d'art. Le roi Ludwig II de Bavaria a nommé son château du château de Neuschwanstein après le chevalier de cygne."
 elgar.518.g: "Inspirant."
 elgar.519.t: "Kunstwerk der Zukunft"
 elgar.519.d: "Au cours de son séjour en Suisse, le compositeur Richard Wagner a écrit de nombreux traités sur la musique et l'art qui devaient devenir révolutionnaires pour la compréhension allemande et internationale de l'esthétique."
 elgar.519.f: "L '«œuvre d'art de l'avenir» est un écrit théorique de l'art de Richard Wagner qu'il a écrit entre 1849 et 1852 à Zurich. Comme dans son écriture «l'art et la révolution», Wagner déplore la décomposition des arts et développe son modèle de la nouvelle unité des arts, le «Gesamtkunstwerk». Comme dans ses écrits précédents, Wagner a développé sa conviction selon laquelle l'art grec était ancré dans la religion et le mysticisme grecques et que, grâce à la destruction de la religion, l'art perdait également sa cohésion et devenait des `` arts individuels '' (drame, musique et danse) devaient dégénérer. Il se plaint que l'art de la musique comme un pur accompagnement de la Parole s'est flétri. Dans le cours de plus de sesexpanations, il entre en détail sur le développement des différents arts, de l'état idéal pendant l'antiquité à la décadence de son temps. Dans son travail écrit suivant et le plus important, l'opéra et le théâtre, Richard Wagner explique alors très précisément (et très théoriquement) comment il imagine l'optimale «union» de la musique et de la poésie. Un peu plus tard, il s'est mis à travailler sur l'exécution «pratique» et a écrit et composé son «ring des nibelungen» comme le drame musical par excellence après des années de travail."
 elgar.519.g: "Qui est censé comprendre ces phrases en boîte difficile à lire?"
 elgar.520.t: "Tristan und Isolde"
 elgar.520.d: "Tristan und Isolde est un opéra en trois actes de Richard Wagner dans un livret allemand par le compositeur, basé en grande partie sur la romance romance du XIIe siècle Tristan et Iseult par Gottfried von Strassburg. L'opéra était extrêmement influent parmi les compositeurs classiques occidentaux et a fourni une inspiration directe à des compositeurs tels que Gustav Mahler, Richard Strauss, Alban Berg, Arnold Schoenberg et Benjamin Britten. D'autres compositeurs comme Claude Debussy, Maurice Ravel et Igor Stravinsky ont formulé leurs styles contrairement à l'héritage musical de Wagner. Beaucoup considèrent Tristan comme une étape importante sur l'éloignement de l'harmonie et de la tonalité de la pratique commune et considère qu'elle jette les bases de la direction de la musique classique au 20e siècle."
 elgar.520.f: "«Le travail qui a toujours excité ma plus grande admiration est Tristan. Un étonnement tremblant me saisit devant ce gigantesque bâtiment, et il me semble toujours incroyable de voir comment un être humain pourrait concevoir et le réaliser. Je considère que le deuxième acte est l'une des créations les plus sublimes de l'Esprit jamais créées. Ce deuxième acte est merveilleux, merveilleux, indiciblement merveilleux. - Giuseppe Verdi"
 elgar.521.t: "Festival Richard Wagner"
 elgar.521.d: "La création de Festspielhaus de Richard Wganer est considérée comme l'un des points forts de la culture musicale du XIXe siècle."
 elgar.521.f: "Le Bayreuth Festival est un festival de musique qui s'est tenu chaque année, au cours desquels les performances des opéras par le compositeur allemand du XIXe siècle Richard Wagner sont présentées. Wagner lui-même a conçu et promu l'idée d'un festival spécial pour mettre en valeur ses propres œuvres, en particulier son cycle monumental «der ring des nibelungen» et «parsifal». Les performances ont lieu dans un théâtre spécialement conçu, le Bayreuth Festspielhaus. Wagner a personnellement supervisé la conception et la construction du théâtre, qui contenaient de nombreuses innovations architecturales pour accueillir les énormes orchestres pour lesquels Wagner a écrit ainsi que la vision particulière du compositeur sur la mise en scène de ses œuvres. Le festival est devenu une destination de pèlerinage pour les Wagnériens et les amateurs de musique classique. Kaiser Wilhelm, Dom Pedro II du Brésil, le roi Ludwig et d'autres membres de la noblesse, ainsi que le philosophe Frieg Niegsche, ainsi que le philosophe, Edvard Grieg, Pyotr Tchaikovsky, Franz Liszty et le jeune Arthur, sont des compositeurs de Franz, Franz Liszt et du jeune Arthur."
 elgar.521.g: "Un pic de la culture allemande!"
 elgar.523.t: "Scandale de Tannhäuser"
 elgar.523.d: "Une performance de Tannhäuser de Richard Wagner a provoqué un véritable scandale qui indiquait toute la société parisienne. En plus de la violation de Wagner sur les bonnes règles de la vie de l'opéra français, l'animosité entre les mondes musicaux allemands et français a également joué un rôle."
 elgar.523.f: "Wagner a toujours eu du mal à Paris, non seulement à cause de sa concurrence avec le populaire Giacomo Meyerbeer. Afin d'accueillir son opéra tannhäuser au Grand Opera, il a dû s'incliner devant les douanes françaises - comme l'installation d'un ballet. Mais Wagner a résisté avec véhémence aux spécifications et n'a inclus qu'un bacchanal. Dans le même temps, Wagner s'est rendu impopulaire avec les musiciens avec des répétitions longues. La première a provoqué un scandale: les messieurs du «Jockey Club» de Paris se sentaient trahi lorsque le ballet n'apparaissait pas après l'ouverture. Les messieurs ne sont pas venus à cause de la musique, mais de regarder les belles femmes et de les rendre visite plus tard dans le vestiaire. Comme ils n'ont pas obtenu ce qu'ils voulaient, ils ont saboté l'événement avec des sifflets et des cris. Le lendemain n'était pas meilleur: la presse parisienne a déchiré la performance en l'air. Non seulement la France, mais aussi les amis et les ennemis de Wagner en Allemagne vont surveiller notre réaction de près."
 elgar.523.g: "Il ne devrait plus jamais se présenter à Paris!"
 elgar.523.h: "Nous devons apaiser Herrn Wagner."
 elgar.524.t: "Suite Holberg"
 elgar.524.d: "La suite Holberg d'Edvard Grieg, qui a été présentée en première à Oslo, s'est non seulement avérée être un chef-d'œuvre musical, mais a également inspiré le sentiment national norvégien."
 elgar.524.f: "La suite Holberg, sous-titrée `` Suite dans le style ancien '', est une suite de cinq mouvements basés sur des formes de danse du XVIIIe siècle, écrites par Edvard Grieg en 1884 pour célébrer le 200e anniversaire de la naissance de Dano-Norwegian Humanist Ludvig Holberg (1684-1754). Il illustre la musique du XIXe siècle qui utilise des styles musicaux et des formes du siècle précédent. La suite Holberg a été initialement composée pour le piano, mais un an plus tard a été adaptée par Grieg lui-même pour l'orchestre de cordes. La suite se compose d'une introduction et d'un ensemble de danses. Il s'agit d'un premier essai dans le néoclassicisme, une tentative de faire écho autant que ce que l'on sait dans le temps de Grieg de la musique de l'ère de Holberg. Bien qu'il ne soit pas aussi célèbre que la musique accessoire de Grieg de Peer Gynt, qui est elle-même généralement effectuée comme disposée dans une paire de suites, de nombreux critiques considèrent les œuvres comme un mérite égal."
 elgar.525.t: "Nouvelles voies"
 elgar.525.d: "Dans le «Neue Magazin Für Musik», Robert Schumann a mentionné un nouvel artiste qui est soudain devenu célèbre du jour au lendemain. Son nom est Johannes Brahms et il a fait une forte impression sur Schumann et son épouse Clara."
 elgar.525.f: "«Et il est venu, jeune sang, aux grâces du berceau et aux héros qui ont surveillé. Son nom est Johannes Brahms, il est venu de Hambourg, y a travaillé dans un sombre silence, mais a été formé par un excellent professeur enthousiaste dans des contextes d'art difficiles, recommandés peu de temps avant par un maître vénéré et bien connu. À l'extérieur aussi, il portait tous les signes qui nous annoncent: il est un homme appelé. - Robert Schumann"
 elgar.525.g: "Nous nous attendons à de grandes choses de M. Brahms."
 elgar.526.t: "Gesang der Parzen"
 elgar.526.d: "`` Song of the Fates '' de Johannes Brahms a été créée à Bâle. Avec Vienne, la Suisse était l'un des endroits les plus importants de Brahms."
 elgar.526.f: "Le Gesang der Parzen (Song of the Fates) est la dernière composition de Choir et Orchestre de Johannes Brahms. Plus de 10 ans après la Cantata Rinaldo OP. 50 et l'Alto Rhapsody Op. 53, Brahms a de nouveau utilisé un texte de Johann Wolfgang von Goethe. Selon Max Kalbeck, Brahms a été inspiré à composer par l'actrice Charlotte Wolter, qui est apparue dans le rôle d'Iphigenia au Burgtheater à Vienne. Le 13 juin 1896, Brahms a écrit sur la pièce: «J'entends souvent philosophiser sur le sixième verset du parzenlied. Je pense que le cœur de l'auditeur sans méfiance devrait devenir doux et l'œil mouillé à la simple entrée du major; Ce n'est qu'alors que la misère de l'humanité le saisit."
 elgar.526.g: "C'est aussi merveilleux que dérangeant."
 elgar.527.t: "Un propriétaire de plantation orange composant"
 elgar.527.d: "Le fils de l'entrepreneur en laine bien connu, Julius Delius, a pris des leçons d'un organiste et a publié certaines de ses premières compositions."
 elgar.527.f: "Frederick Delius, un Anglais né, était le fils de l'entrepreneur en laine allemand Julius Delius. Le père voulait que son fils soit le successeur de l'entreprise, mais le fils a prêté peu d'attention aux affaires en Europe et était plus intéressé par l'art et la musique. Par conséquent, Delius Jr. Transféré dans une plantation d'orange en Floride pour l'éloigner des influences des métropoles européennes. Cependant, c'est ce transfert qui devait être d'une importance exceptionnelle pour sa créativité musicale ultérieure. À Jacksonville, Delius a rencontré l'organiste catholique Thomas Ward, qui, selon Delius, était le seul à lui avoir appris quoi que ce soit. Un peu plus tard, Delius devait publier ses premières compositions à Danville, en Virginie."
 elgar.527.g: "Qu'est-ce qui devait devenir bon à rien?"
 elgar.528.t: "Un autrichien à New York"
 elgar.528.d: "Après des litiges dans sa patrie autrichienne, Gustav Mahler a trouvé un public à New York, avec qui ses œuvres ont été très bien reçues. Certains des responsables dans le monde de la musique américaine aimeraient l'engager à long terme."
 elgar.528.f: "For some, the German doublet was too tight when they heard the name Mahler. Some out of excitement, but most out of anger. It has been like this from day one. He had an immediate effect, inciting, provocative, alarming - it doesn't matter: he belongs to the electric and electrifying natures that give off sparks or ignite at the slightest touch. In the beginning, of course, only his frenetic unpopularity made him popular. Carried by the favor of hate, carefully illuminated by envy, that eternally sleepless and powerful protector of all that is real, by ridicule, by envy and slander, proclaimed by the loudest sound carriers on every street corner, he has become famous. (...) And so it was heard every day that he mistreats his musicians, whips them into inhuman work, almost incites them to death, and that if they were only able, they would all like to drown him in a spoonful of water. It was said that he shortened his singers, drilled them like recruits, played with them like the Great Turk with his slaves. (...) The intensity of his being seemed to fill the whole city of New York. - Felix Salten"
 elgar.528.g: "Quel gars étrange."
 elgar.528.h: "Mahler devrait rester en Amérique."
 elgar.529.t: "Suite scythe"
 elgar.529.d: "Sergei Prokofiev, l'un des jeunes talents les plus prometteurs de la musique russe, a choqué le public aujourd'hui avec une performance scandaleuse."
 elgar.529.f: "Prokofiev a initialement écrit la musique du ballet ala i lolli, dont l'histoire se déroule parmi les Scythes. Commandé par Sergei Diaghilev, le ballet a été écrit dans un scénario du poète russe Sergey Gorodetsky. Mais lorsque Diaghilev a rejeté la partition avant même son achèvement, le compositeur a retravaillé la musique dans une suite pour la performance de concert. La performance est devenue le plus grand scandale de l'histoire des premières de Prokofiev. Le directeur du véranda à l'époque, Alexander Glazunov, a quitté la salle pendant le concert, la majorité du public a été indigné et les critiques ont été dévastatrices. Cependant, Prokofiev n'a pas été très impressionné et le lendemain a écrit succinctement à Moscou que la performance avait continué «avec une vraie raquette»."
 elgar.529.g: "Un chef-d'œuvre!"
 elgar.529.h: "Dégoûtant."
 elgar.530.t: "La symphonie rhénienne"
 elgar.530.d: "Robert Schumann a pris un emploi à Düsseldorf sur le Rhin et a été soudainement inspiré par les travaux de construction de la cathédrale de Cologne pour écrire une nouvelle œuvre."
 elgar.530.f: "Robert Schumann est considéré comme l'un des compositeurs les plus représentatifs de l'ère romantique. En 1850, il a conçu Ferdinand Hiller en tant que directeur musical et a déménagé à Düsseldorf. Bien que critiqué concernant ses pauvres compétences en chef d'orchestre et s'est moqué en raison de sa «désintégration créative», Schumann a composé sa dernière symphonie, le «rhéniste». Il a utilisé les symphonies de Beethoven et Mendelssohn en tant que modèle, mais a également été inspiré par ses impressions de la Rhénanie. Schumann lui-même a déclaré que son voyage vers Cologne et la vue de la cathédrale étaient sa principale inspiration pour cette composition, qui est devenue l'une de ses œuvres les plus célèbres."
 elgar.530.g: "C'était une bonne idée de continuer à construire la cathédrale, n'est-ce pas?"
 elgar.531.t: "La tentative de suicide de Schumann"
 elgar.531.d: "Le compositeur Robert Schumann a été sauvé de la rivière à la dernière minute aujourd'hui - il avait apparemment voulu se suicider dans la confusion mentale. On ne sait toujours pas comment traiter avec lui."
 elgar.531.f: "Le 10 février 1854, la souffrance psychologique de Schumann a augmenté de façon spectaculaire. Il s'est principalement plaint des «problèmes d'audition». Des tons, des accords, des pièces musicales entières faisaient rage dans sa tête et lui ont volé le sommeil. Pendant ce temps, Schumann a été surveillé jour et nuit par sa femme et ses enfants et était déjà sous surveillance médicale, mais il était toujours en mesure de quitter l'appartement le 27 février 1854 à un moment non observé. Il se dirigea vers le pont de ponton voisin, grimpa au-dessus de la balustrade et, après avoir jeté sa bague de mariage dans l'eau, s'est jeté dans la rivière. Il a été secouru par le maître du pont et d'autres inconnus, ramené à la maison et pris en charge par un médecin qui a été convoqué. Après sa tentative de suicide, il souhaitait être admis à l'institution pour le traitement et les soins aux gens mentaux et fous d'Endenich près de Bonn, qui a été ouvert en 1844 par le psychiatre Franz Richarz."
 elgar.531.g: "Nous ne pouvons rien faire."
 elgar.531.h: "Envoyez-le à l'asile mental moderne près d'Endenich."
 elgar.532.t: "La mort de Schumann"
 elgar.532.d: "Après plusieurs années de dérangement mental, Robert Schumann, autrefois un talent musical prometteur, est décédé dans un asile mental, ignoré par le monde."
 elgar.532.f: "Brahms a vu Schumann le 31 mars et le 19 août 1854 sans pouvoir lui parler. Le 11 janvier, les 23 février et le 2 avril 1855, cependant, ont tous deux pu parler en détail. Schumann allait si bien qu'il a pu jouer de la musique sur le piano carré avec Brahms et l'accompagner une partie du chemin de la gare de Bonn sous la supervision d'un gardien. Le 10 avril 1856, Brahms a trouvé Schumann dans un état précaire. Schumann ne pouvait plus parler intelligemment. Le 1er mai 1856, il a été mentionné pour la dernière fois dans les dossiers médicaux que Schumann a joué le piano. La plupart du temps, il pouvait à peine s'exprimer intelligemment. Le plan de Clara Schumann à partir d'avril 1856 pour amener Schumann à Düsseldorf et s'occuper de lui-même, elle n'a pas été réalisée. À partir de la mi-juillet 1856, Schumann a mangé de moins en moins. Le 26 juillet 1856, il avait «des contractions dans divers muscles, le visage et les membres». Des roes muqueuses ont suggéré une pneumonie. Robert Schumann est décédé le 29 juillet; Personne n'était présent."
 elgar.533.t: "La récupération miraculeuse de Robert Schumann"
 elgar.533.d: "Apparemment, les méthodes modernes du sanatorium endenich ont eu un effet. Schumann montre des signes d'amélioration, bien que son retour au travail prenne encore quelques mois."
 elgar.533.f: "Le rétablissement miraculeux de Schumann a commencé après avoir dit à Peters en septembre 1854, peu de temps avant leur 14e anniversaire de mariage, que Düsseldorf s'était effondré et que Clara et les enfants étaient morts. Afin de dissiper cette illusion, Peters a demandé à Clara Schumann une lettre à son mari. Cela a conduit au premier échange de lettres depuis l'admission. Désormais, Schumann a de nouveau pris une part active à la vie en dehors de l'institution. Il correspondait également à ses enfants, Johannes Brahms, Joseph Joachim et avec les éditeurs. Entre septembre 1854 et mai 1855, il écrit environ 25 lettres. Pendant ce temps, Schumann a souvent exprimé son souhait de pouvoir à nouveau quitter Endenich. Il a joué du piano de temps en temps. Il a étudié les compositions de Brahms. Le 11 janvier 1855, il a eu sa première visite de Johannes Brahms. Dès lors, l'état de Schumann s'est régulièrement amélioré jusqu'à ce que les médecins permettent à Clara Schumann de visiter. Avec son soutien et celui de Brahms, Schumann a rapidement recommencé à composer - et a donc initié un processus d'auto-guérison."
 elgar.533.g: "Mais comment est-ce possible?"
 elgar.534.t: "Tango"
 elgar.534.d: "L'interprète de Tango, Carlos Gardel, a enregistré son premier record avec Mi Noche Triste."
 elgar.534.f: "Carlos Gardel était la figure la plus importante de l'histoire du tango. Il était l'un des interprètes les plus influents de la musique populaire mondiale dans la première moitié du 20e siècle. Gardel est le chanteur de tango populaire le plus célèbre de tous les temps et est reconnu dans le monde entier. Il a créé le tango-canción en 1917 avec sa interprétation de Pascual Curtursi et Mi Noche Triste de Samuel Castriota. Avec «Mi Noche Triste», la naissance du tango sentimental a eu lieu. Nostalgique, mélodramatique et triste, les nouvelles paroles et la musique incarnaient Buenos Aires et ses habitants."
 elgar.534.g: "Le triomphe de la musique argentine."
 elgar.601.t: "La mort de [SCOPE.sCharacter('elgar_composer_scope').GetLastName]"
 elgar.601.d: "[SCOPE.sCharacter('elgar_composer_scope').GetFullName], l'un des plus grands esprits artistiques de notre pays et une star mousseuse dans le firmament musical, est décédé aujourd'hui. Il laisse un écart qui peut difficilement être comblé."
 elgar.601.g: "Un titan de l'histoire de la musique nous a quittés."
 elgar.603.t: "Rossini quitte la bologne"
 elgar.603.d: "Rossini a décidé de quitter Bologne. Les nouvelles ont non seulement surpris les résidents de la ville, mais ont également attristé tout le pays."
 elgar.603.f: "Lorsque Gioacchino Rossini a décidé de quitter Bologne et donc les États papaux, environ 20 ans s'étaient écoulés depuis sa retraite de la scène de l'opéra. Néanmoins, Rossini était toujours une figure très respectée et l'un des compositeurs les plus aimés d'Italie. Une raison principale pour laquelle Rossini est retourné à Paris - après un intermède à Florence - n'était probablement pas le moindre à cause de sa santé. Au cours de ses dernières années en tant que star de la musique européenne, il s'était déjà détérioré physiquement et mentalement. Paris a promis de meilleures perspectives de soins de santé, c'est pourquoi Rossini a pensé à y passer sa retraite."
 elgar.603.g: "Mais il n'a pas fini ses tortellini!"
 elgar.609.d: "Franz Lachner a annoncé aujourd'hui sa retraite du podium du conducteur. Il ne voit plus un avenir pour sa carrière."
 elgar.609.f: "Toute une série de circonstances a conduit au départ prématuré de Franz Lachner du monde de la musique. Le facteur décisif pour cela était la nouvelle musique de Richard Wagner et le triomphe de ses alliés. Lachner, qui avait connu Schubert et Beethoven, ne pouvait pas suivre ce développement et ne voulait pas le faire. Semblable à Rossini, qui a compris qu'il était considéré comme une relique d'autres fois alors que le monde avait évolué, Lachner s'est retiré, notamment à cause du ridicule et de la méchanceté des critiques fidèles à Wagner."
 elgar.609.g: "Une perte pour [GetPlayer.GetName]."
 elgar.613.f: "Gaetano Donizetti est décédé paisiblement ce matin après une vie longue et épanouissante dans les bras de sa deuxième femme et entourée de ses fils. Un cortège funèbre avec plusieurs groupes, des centaines de porteurs de torch et des milliers de spectateurs marquent les adieux à un homme qui aurait vécu une vie parfaite."
 elgar.614.f: "En 1867, Berlioz a appris que son fils était décédé à La Havane de fièvre jaune. MacDonald suggère que Berlioz a peut-être demandé la distraction de son chagrin en allant de l'avant avec une série de concerts prévus à Saint-Pétersbourg et à Moscou, mais loin de le rajeunir, le voyage a sapé sa force restante.  Il est allé bien pour récupérer dans le climat méditerranéen, mais est tombé sur des rochers au bord du rivage, peut-être à cause d'un accident vasculaire cérébral, et a dû retourner à Paris, où il a convaincu pendant plusieurs mois. En août 1868, il se sentait en mesure de se rendre brièvement à Grenoble pour juger un festival choral.  Après son retour à Paris, il s'est progressivement affaibli et est décédé chez lui dans la rue de Calais le 8 mars 1869, à l'âge de 65 ans. Il a été enterré au cimetière de Montmartre avec ses deux femmes, qui ont été exhumées et réprimandaient à côté de lui."
 elgar.615.f: "Après l'échec du mariage avec Carolyne Zu Sayn-Wittgenstein, Liszt s'est de plus en plus consacré aux compositions avec des thèmes religieux. À Rome, où il est surtout resté jusqu'en 1870, il a conduit une partie de la vie monastique banale et monastique et s'est retiré dans un monastère à l'été 1863, où le pape Pie IX lui a également rendu visite. En 1865, Liszt a subi une tonsure et a reçu les quatre ordres mineurs. À partir de ce moment, en tant que clerc, il portait le col romain et a été adressé comme un abbé. En 1886, Liszt a assisté au Festival Wagner. Au moment du voyage, Liszt était déjà gravement malade et est décédé quelques jours après son arrivée le 31 juillet 1886 à la suite de la pneumonie. Bernhard Schnappauf, docteur et ami de Richard Wagner, a passé les derniers jours sur son lit de mort et a rapporté que Liszt est mort tranquillement et avec dignité. Il a fermé les yeux et a fait le masque de mort, pour lequel, selon l'ancienne coutume, il avait droit au linceul et à la taie d'oreiller."
 elgar.616.f: "Le 16 septembre 1882, Wagner a voyagé avec sa famille à Venise, où il a passé plusieurs semaines avec Franz Liszt. Le 25 décembre, comme cadeau d'anniversaire pour Cosima, il a donné un concert conjoint pour la dernière fois au Teatro La Fenice; Il a dirigé sa jeunesse Symphony en C Major. Le 13 février 1883, il est resté dans l'aile latérale du Palazzo Vendramin-Calergi dans lequel lui et sa famille vivaient. Vers 15 heures, la famille a attendu à la table Wagner, qui, malgré une crise cardiaque, était dans son étude en écrivant un essai sur le féminin dans l'homme. La femme de chambre l'a trouvé affalé à son bureau sur les mots «Néanmoins, le processus d'émancipation de la femme ne se déroule qu'avec des convulsions extatiques. L'amour - tragédie '. Il a déclaré: «Ma femme et le médecin» avant de tomber inconscients et de mourir dans les bras de Cosima vers 15h30."
 elgar.617.f: "Edvard Grieg est décédé à l'hôpital municipal de Bergen, en Norvège, le 4 septembre 1907 à 64 ans d'insuffisance cardiaque. Il avait subi une longue période de maladie. Ses derniers mots étaient: \"Eh bien, si cela doit l'être.\" Les funérailles ont attiré 30 000 et 40 000 personnes dans les rues de sa ville natale pour l'honorer. Obéissant à son souhait, sa propre marche funéraire à la mémoire de Rikard Nordraak a été jouée avec orchestration par son ami Johan Halvorsen, qui avait épousé la nièce de Grieg. De plus, le mouvement de mars funéraires de la sonate de piano n ° 2 de Chopin a été joué. Grieg a été incinéré lors du premier crématorium norvégien ouvert à Bergen cette année-là, et ses cendres ont été enterrées dans une crypte de montagne près de sa maison, Troldhaugen. Après la mort de sa femme, ses cendres ont été placées aux côtés de la sienne."
 elgar.618.f: "Brahms est décédé le 3 avril 1897 tôt le matin à l'âge de 63 ans dans son appartement à Karlsgasse 4, où il vivait depuis 1872 - selon certaines biographies du cancer du foie, selon des informations plus récentes sur le carcinome pancréatique. Sa dernière apparition publique a eu lieu le 7 mars 1897 lorsqu'il a vu Hans Richter diriger sa symphonie n ° 4; Il y a eu une ovation après chacun des quatre mouvements. Après avoir été aménagé dans la maison de deuil, où Carl Kundmann a retiré son masque de mort et Ludwig Michalek a fait une dernière photo pastel, la consécration a eu lieu le 6 avril dans l'église de la ville luthérienne."
 elgar.619.f: "«Matin et Vienne. Un chaos. Vous vous accrochez aux détails que personne ne peut encore savoir. Il doit être enterré dans le petit cimetière de Pringing, à côté de sa petite fille. Le cadavre est apporté. L'autre matin. La route «Une den Langen Lüssen» mène à travers le pays aux cyprès. La chapelle est un petit espace, juste pour le cercueil et quelques couronnes. Les autres bordent les chemins vers la tombe. Une femme passe et dit à un autre: «Maintenant, il est en paix à l'intérieur. Tout était trop petit pour lui. L'église de souriant est petite, le cimetière étroit. Et un spectacle pour les Viennois est imminent. L'église et le cimetière seront bouclés. Seules les cartes donneront accès. Nous apprenons que Franz Schalk, Gregor et le conseil d'administration ont demandé que l'opéra soit fermé le jour des funérailles. Aucun mot à ce sujet. La Cour, la municipalité de Vienne, ne bouge pas. Et puis la célébration. Nous nous tenons devant l'église lorsque le cercueil est effectué. Il pleut. Nous arrivons à la tombe plus rapidement via un chemin du vignoble. Le cortège arrive. La pluie s'arrête. Un rossignol chante, les mottes tombent. Un arc-en-ciel. Et les centaines sont silencieuses. - Paul Stefan"
 elgar.701.g: "Ce fut une merveilleuse performance."
 elgar.701.h: "Embauchez cet homme brillant!"
 elgar.706.g: "À 20 ans, n'est-il pas un peu trop jeune pour un travail comme celui-ci?"
 elgar.701.t: "Grande symphonie funèbre et triomphale"
 elgar.701.d: "Pour marquer le dixième anniversaire de la révolution de juillet, Hector Berlioz a composé une pièce qui a attiré une grande admiration publique."
 elgar.701.f: "Le gouvernement français a commandé la Symphonie pour les célébrations marquant le dixième anniversaire de la révolution de juillet qui avait amené Louis-Philippe I au pouvoir, pour lequel il érigeait la chronique de juillet à la place de la Bastille. Berlioz avait peu de sympathie pour le Régime, mais a salué l'occasion d'écrire le travail parce que le gouvernement lui avait offert 10 000 francs pour cela. Le Symphonie militaire (renommé plus tard Symphonie Funèbre et Triomphale), plutôt que de suivre le modèle que Berlioz avait établi à Roméo et Juliette, représente une réversion d'un style pré-piéthovien antérieur dans la tradition de la musique cérémonielle publique française monumentale. Berlioz a révisé le score en janvier 1842, ajoutant une partie facultative pour les chaînes et un chœur final à un texte d'Antony Deschamps. Richard Wagner a assisté à une performance de cette nouvelle version à la Salle Vivienne le 1er février 1842. Le 5 février, il a déclaré à Robert Schumann qu'il avait trouvé des passages dans le dernier mouvement de la symphonie de Berlioz si `` magnifique et sublime qu'ils ne peuvent jamais être surpassés. ''."
 elgar.702.t: "Liszt à Weimar"
 elgar.702.d: "Après de nombreuses années de tournées de concerts, le virtuose du piano et le compositeur Franz Liszt envisage de s'installer à Weimar."
 elgar.702.f: "Les années Weimar ont été la période la plus productive de Franz Liszt. Il a écrit beaucoup de ses œuvres de piano à Weimar, telles que la sonate de piano en b mineur, les harmonies poéTIQUES et les religieuses cycle, quinze rhapsodies hongrois, ainsi que de nombreuses transcriptions, réductions de piano et révisions d'œuvres de piano antérieures, telles que les étages de Paganini. Deux de ses concertos de piano précédemment conçus ont également reçu leur forme finale ici. À Weimar, Liszt a mené de nombreuses œuvres de compositeurs contemporains, dont certains étaient controversés à l'époque, et ont également effectué leurs opéras. Il a mené des œuvres de Richard Wagner, qui était particulièrement proche de lui et qu'il a aidé à fuir à Zurich au printemps 1849 après le soulèvement de Dresden. Dans les années qui ont suivi, il a soutenu Wagner financièrement ainsi que moralement et a maintenu une correspondance animée avec lui. Plus tard, Liszt et Wagner sont souvent apparus ensemble comme conducteurs. À partir de 1865, après que Wagner ait eu une relation avec la fille de Liszt, Cosima, la relation s'est refroidie pendant longtemps."
 elgar.703.t: "Riienzi"
 elgar.703.d: "Un jeune compositeur a impressionné le public à Dresde et des artistes internationaux avec son opéra «Rienzi». Son nom est Richard Wagner."
 elgar.703.f: "'No subsequent experience has given me feelings even remotely similar to those I had on this day of the first performance of Rienzi. The only too well-founded anxiety as to their success has so dominated my feelings at all subsequent first performances of my works that I could never really enjoy them or take much notice of the way the audience was behaving. (...) The initial success of Rienzi was no doubt assured beforehand. But the uproarious way in which the public declared its partiality for me was extraordinary ... The public had been forcibly predisposed to accept it, because everyone connected with the theatre had been spreading such favourable reports ... that the entire population was looking forward to what was heralded as a miracle ... In trying to recall my condition that evening, I can remember it only as possessing all the features of a dream.' - Richard Wagner"
 elgar.704.t: "Concerto de piano en mineur"
 elgar.704.d: "Un concerto de piano d'Edvard Grieg a célébré sa première mondiale aujourd'hui à Copenhague. Il est déjà prévisible que ce sera l'une de ses pièces les plus populaires."
 elgar.704.f: "Le concerto de piano en mineur, op. 16, composé par Edvard Grieg en 1868, était le seul Concerto Grieg achevé. L'œuvre est parmi les premières œuvres importantes de Grieg, écrites par le compositeur de 24 ans en 1868 à Søllerød, au Danemark, lors d'une de ses visites là-bas pour bénéficier du climat. Le concerto de Grieg fournit des preuves de son intérêt pour la musique folklorique norvégienne; L'épanouissement d'ouverture est basé sur le motif d'une seconde en baisse, suivi d'un troisième majeur en baisse, qui est typique de la musique folklorique du pays d'origine de Grieg. Les travaux ont été présentés en première par Edmund Neupert le 3 avril 1869, à Copenhague, avec Holger Simon Paulli conduisant. Certaines sources affirment que Grieg lui-même, un excellent pianiste, était le soliste prévu, mais il n'a pas pu assister à la première en raison des engagements avec un orchestre à Christianie (maintenant Oslo). Parmi ceux qui ont assisté à la première figuraient le compositeur danois Niels Gade et le pianiste russe Anton Rubinstein, qui a fourni son piano pour l'occasion. Grieg a révisé le travail au moins sept fois, généralement de manière subtile, mais les révisions se sont élevées à plus de 300 différences par rapport à l'orchestration d'origine."
 elgar.705.t: "Variations sur un thème de Haydn"
 elgar.705.d: "Le compositeur Johannes Brahms a effectué un nouveau chef-d'œuvre aujourd'hui, mais en même temps, envisage de prendre un engagement permanent envers Vienne."
 elgar.705.f: "Les variations sur un thème de Haydn Op. 56a est un travail de variation pour l'orchestre de Johannes Brahms. Le travail a été créé à l'été 1873 à Tutzing. La première a eu lieu le 2 novembre 1873 à Vienne sous la direction de Brahms. La pièce tombe dans une époque dans laquelle Brahms voulait célébrer son séjour à Vienne. D'une part, il a quitté Detmold et Hambourg a déçu il y a des années. D'un autre côté, il s'est efforcé de vivre où ses grands modèles classiques avaient vécu et de continuer la tradition viennoise."
 elgar.706.t: "La première apparition de Mahler"
 elgar.706.d: "Dans Bad Hall, le jeune et talentueux chef d'orchestre Gustav Mahler a pris la position de Kapellmeister pour la première fois. Au cours des années suivantes, il montait l'échelle de carrière à l'opéra de l'État de Vienne"
 elgar.706.f: "'And there he was in person in the theater office when I came out from my first visit to Pollini: pale, thin, small in stature, long face, the steep forehead framed by deep black hair, important eyes behind glasses, furrows of suffering and of humor in his countenance, which, while speaking to another, showed the most amazing change of expression, just as interesting, demonic, intimidating incarnation of Kapellmeister Kreisler as the youthful reader of E.T.A. Hoffmann's fantasies could imagine; he kindly asked me about my musical ability and knowledge - to which I replied, to his evident satisfaction with a mixture of shyness and self-confidence - and left me in a sort of dazed and shaken state. (...) Mahler appeared to me in face and demeanor as genius and demon (...)' - Bruno Walter"
 elgar.707.t: "Concerto de piano n ° 2"
 elgar.707.d: "Après de nombreux revers, le compositeur Sergei Rachmaninoff a fait un retour impressionnant: son deuxième concerto au piano a provoqué des applaudissements frénétiques."
 elgar.707.f: "Après la première désastreuse en 1897 de sa première symphonie, Rachmaninoff a subi une rupture psychologique qui a empêché la composition pendant trois ans. Bien que la dépression ait sapé son énergie, il s'est toujours engagé dans la performance. Les leçons de réalisation et de piano sont devenues nécessaires pour atténuer sa situation financière. En 1899, il était censé effectuer le deuxième concerto de piano à Londres, qu'il n'avait pas encore composé en raison d'une maladie, et a plutôt fait ses débuts réussis. Des proches ont décidé de le présenter au neurologue Nikolai Dahl, qu'il a visité quotidiennement de janvier à avril 1900, ce qui a aidé à restaurer sa santé et sa confiance dans la composition. Rachmaninoff a consacré le concerto à Dahl pour l'avoir traité avec succès. Après avoir rempli son engagement de concert de Londres en 1908 au Queen's Hall sous Serge Koussevitzky, une revue flatteuse de The Times est apparue: `` L'expression directe de l'œuvre, la précision extraordinaire et l'exactitude du jeu de Rachmaninoff, et même l'économie stricte du mouvement des armes et des mains qu'il exerce, tous ont contribué à l'impression de complétude de la performance. ''"
 elgar.708.t: "Symphonie n ° 1 «classique»"
 elgar.708.d: "Avec sa première symphonie, Sergei Prokofiev s'est recommandé à nouveau en tant que compositeur prometteur. D'un autre côté, il pousse le jeune artiste dans le monde pour être mieux payé."
 elgar.708.f: "`` Ré répétition de la symphonie classique avec l'Orchestre d'État, je l'ai menée moi-même, improvisant complètement, après avoir oublié la partition et ne l'avez jamais étudiée dans une perspective conductrice. Je pensais que ce pourrait être une débâcle complète, mais rien ne s'est passé et en tout cas, les pièces ont tellement d'erreurs que la session s'est principalement transformée en une pour effectuer des corrections. À Kislovodsk, j'avais peur qu'il y ait un antagonisme d'un `` orchestre révolutionnaire '' jouant mes nouvelles œuvres, mais le contraire était le cas: l'orchestre d'État, imprégné de beaucoup de nouveau sang jeune, était flexible et attentif, et a joué la symphonie avec un plaisir évident. - Sergei Prokofiev"
 elgar.709.t: "Roméo et Juliette"
 elgar.709.d: "Pyotr Tchaikovsky, un jeune compositeur en herbe, a présenté son ouverture Roméo et Juliette. Le public a reçu le travail avec des sentiments mitigés."
 elgar.709.f: "Non seulement au début, mais tout au long de sa carrière, Tchaikovsky a dû s'affirmer contre les critiques et les concurrents. L'ouverture Roméo et Juliette, par exemple, devaient être un échec lors de sa publication. D'un autre côté, cette critique, que Tchaikovsky a reçue à plusieurs reprises tout au long de sa vie, a conduit le compositeur à éditer une œuvre et d'autres œuvres; Tchaikovsky est resté l'un des plus grands critiques de son propre travail tout au long de sa carrière. Ce n'est pas non plus sans ironie que les compositeurs nationaux d'esprit russe ont salué précisément ce travail, même s'ils feraient plus tard partie des critiques les plus dures de Tchaikovsky. Néanmoins, Tchaikovsky devait devenir l'un des compositeurs russes les plus importants de cette période au plus tard et, en quelques années, pour réaliser une renommée internationale que presque aucun autre musicien du siècle a obtenu."
 elgar.710.t: "Viva Verdi"
 elgar.710.d: "Avec la création de l'État national italien et l'ajout de l'opéra de Milan à notre territoire, nous avons l'occasion unique d'engager l'une des figures les plus importantes de l'histoire musicale italienne: Giuseppe Verdi."
 elgar.710.f: "Giuseppe Verdi était un compositeur et politicien italien, universellement reconnu comme l'un des plus grands artistes et compositeurs d'opéra de tous les temps, avec d'autres protagonistes du théâtre musical italien du XIXe siècle: Gioachino Rossini, Vincenzo Bellini et Gaetano Donizetti. Il a sympathisé avec le mouvement Risorgimento qui a poursuivi l'unification de l'Italie et a activement participé pendant une courte période dans la vie politique; Au cours de sa longue existence, il a établi une position unique parmi ses compatriotes, devenant un profond symbole artistique de l'unité du pays. C'est pour cette raison qu'un mois après sa mort, une procession solennelle et sans fin a traversé Milan, accompagnant ses restes avec les notes de «Va, Peniero» de Nabucco, écrite par lui 60 ans plus tôt, exprimant efficacement les sentiments des Italiens envers leur héros disparu. Cela a démontré dans quelle mesure la musique de Verdi avait été assimilée dans la conscience nationale. Ses œuvres restent parmi les plus connues et jouées dans les théâtres du monde entier, en particulier Aida (1871), le Nabucco susmentionné (1842) et le soi-disant `` Verdi Triad '': Rigoletto (1851), Il Trovatore (1853) et LA Traviata (1853)."
 elgar.711.t: "Symphonie du printemps"
 elgar.711.d: "La première symphonie de Robert Schumann a été jouée aujourd'hui sous la direction de Felix Mendelssohn Bartholdy. Schumann est marié à l'important pianiste Clara (née Wieck) et a jusqu'à présent attiré l'attention en tant que critique musical qu'en tant que compositeur. Les opinions diffèrent sur ses pièces pour le piano."
 elgar.711.f: "À l'exception de Franz Schubert, aucun compositeur germanophone n'était aussi mal jugé au cours de son vivant que Robert Schumann. Alors que l'importance de Schubert n'a été reconnue qu'après sa mort prématurée, Schumann a été accusé de commencer comme un génie et de se terminer comme un talent. Les contemporains n'avaient souvent pas accès à son travail ou ne comprenaient tout simplement pas ses œuvres. Ses pièces de piano, qui constituent une partie de sa renommée aujourd'hui, étaient surtout inconnues à l'époque. Les moqueurs ne le voyaient que comme l'homme au côté de la pianiste Clara Schumann. Dans sa Saxe natale, il se tenait à l'ombre de Mendelssohn. Wagner s'est opposé plus tard à lui, tandis que Brahms est devenu un proche confident de Clara et Robert. Liszt considérait Schumann comme un pionnier des progrès musicaux en Allemagne, mais n'a eu aucun succès avec le public lorsqu'il a inclus les œuvres de Schumann dans son répertoire. Les espoirs d'un poste permanent dans une importante institution musicale ont été anéantis à plusieurs reprises. Semblable à Schubert, Schumann a également rencontré une fin tragique prématurée."
 elgar.712.t: "Roi Olaf"
 elgar.712.d: "Edward Elgar s'est distingué ces dernières années avec ses cantates et ses œuvres chorales. «Les scènes de la saga du roi Olaf», son ouvrage le plus récent, ont été bien accueillies par le public."
 elgar.712.f: "Dans les années 1890, Edward Elgar a acquis une réputation croissante en tant que compositeur britannique majeur. Initialement fortement influencé par l'influence continentale - «King Olaf» montre également des échos du style Wganer - il a progressivement trouvé sa propre langue sonore, qui encouragerait les compositeurs britanniques ultérieurs à prendre des chemins complètement nouveaux. Elgar se sentait comme un étranger, non seulement musicalement, mais socialement. Dans les cercles musicaux dominés par les universitaires, il était un compositeur autodidacte; En Grande-Bretagne protestante, son catholicisme romain était considéré avec suspicion dans certains milieux; Et dans la société consciente de la classe de Grande-Bretagne victorienne et édouardienne, il était extrêmement sensible à ses humbles origines même après avoir obtenu la reconnaissance. Néanmoins, Elgar peut être considéré comme le compositeur britannique le plus important depuis Henry Purcell."
 elgar.713.t: "Directeur de musique Hofball"
 elgar.713.d: "Le poste de directeur musical de Hofball est ouvert depuis des années. Une position prestigieuse qui était en fait censée aller au compositeur Johann Strauss. On lui avait déjà refusé cet honneur pour des raisons politiques. Il y a maintenant des voix croissantes pour offrir le poste au fils du compositeur décédé tôt."
 elgar.713.f: "Johann Strauss était un chef de banque et compositeur autrichien et a été reconnu internationalement comme le «Waltz King». Il avait déjà composé sa première valse à l'âge de six ans et avait secrètement pris des leçons de violon parce que son père avait prévu une carrière de fonctionnaire. Parce que ce dernier avait brisé avec la famille, sa mère a soutenu sa formation musicale contre son testament. Sa première apparition au Casino Dommayer, un lieu de divertissement connu dans toute la région, a été un énorme succès. Des tournées l'ont initialement emmené à travers la monarchie du Danube avec son propre orchestre (qui a augmenté sa rivalité avec son père). Après la mort de son père, il a repris son orchestre et l'a fusionné avec le sien. Parce qu'il avait composé des œuvres pour les révolutionnaires de 1848 et a ainsi montré de la sympathie pour le mouvement insurrectionnaire, il a attiré l'attention des autorités de censure et est tombé en disgrâce au tribunal malgré sa popularité. En conséquence, il s'est vu refuser le poste de directeur musical de Court Ball jusqu'en 1863."
 elgar.713.g: "Il a raté sa chance, mais il est invité à composer."
 elgar.713.h: "Donnez au roi Waltz l'endroit qu'il mérite!"
 elgar.714.t: "Gagnant du prix de la composition de l'État"
 elgar.714.d: "Le gagnant du prix de la composition de l'État de cette année est un talent tchèque exceptionnel. Son nom est Antonín Dvořák."
 elgar.714.f: "Antonín Dvořák était un compositeur tchèque, qui employait fréquemment des rythmes et d'autres aspects de la musique folklorique de Moravie et de sa Bohême natale. Dvořák a affiché ses cadeaux musicaux à un âge précoce, étant un étudiant en violon approprié de six ans. En 1874, il a soumis au prix de la composition de l'État autrichien, y compris des dizaines de deux symphonies et autres œuvres. Bien que Dvořák n'en était pas au courant, Johannes Brahms était le principal membre du jury et était très impressionné. Le prix a été décerné à Dvořák en 1874 et de nouveau en 1876 et en 1877, lorsque Brahms et l'éminent critique Eduard Hanslick, également membre du jury, se fit connaître. Brahms a recommandé Dvořák à son éditeur, Simrock."
 elgar.714.g: "Un trophée bien mérité."
 elgar.714.h: "Nous ne devrions pas manquer ce talent."
 elgar.715.t: "Le compositeur bohème"
 elgar.715.d: "Claude Debussy a commencé comme le vainqueur du Prix de Rome, mais a jusqu'à présent peu fait avec son talent certifié autre que d'écrire de petites pièces de piano provocantes. Que deviendra de ce bohème?"
 elgar.715.f: "Même au Conservatoire, les évaluations du talent de Claude Debussy variaient considérablement. Certains l'ont loué en tant que pianiste et avaient de grands espoirs pour lui. D'autres l'ont décrit comme négligent. Pendant ce temps, il était déjà pianiste dans la maison de Nadezhda von Meck, le patron de Tchaikovsky. En 1884, Debussy a remporté le Prix de Rome, mais a été inhabituel pendant son séjour à Rome. Il a trouvé l'opéra italien ennuyeux et avait peu d'utilité pour le style dominant de Giuseppe Verdi. Il est retourné tôt à Paris et a vécu une vie instable là-bas: «Je suis sûr que l'institut n'approuverait pas, car, naturellement, il considère le chemin qu'il ordonne comme le seul bon. Mais il n'y a pas d'aide pour ça! Je suis trop amoureux de ma liberté, trop aimé de mes propres idées!"
 elgar.715.g: "Belle musique de piano, mais nous avons assez de vagabonds musicaux."
 elgar.1011.t: "Don Pasquale"
 elgar.1011.d: "Un grand compositeur vient de terminer un chef-d'œuvre musical!"
 elgar.1011.f: "Don Pasquale est un Opera Buffa en trois actes. L'opéra est l'un des plus célèbres de son genre et, avec L'Elisir d'Amore et Lucia di Lammermeror, est l'une des rares œuvres de Donizetti à avoir une tradition de performance presque continue depuis le 19e siècle. Sur la base des comédies de Carlo Goldoni, les personnages sont plus ou moins étroitement basés sur des types de la commandon delante, mais reçoivent des traits sentimentaux, i. H. Grâce à la capacité de ressentir et d'exprimer la tristesse, la douleur ou les remords, une différenciation qui va au-delà de leur type. Don Pasquale a été un succès instantané, comme seul I Puritani (1835) de Bellini avait déjà eu à Paris."
 elgar.1011.g: "Bravissimo!"
 elgar.1012.t: "Dom Sébastien"
 elgar.1012.f: "Dom Sébastien est un grand opéra français en cinq actes de Gaetano Donizetti.  Il s'agit d'une fiction historique sur le roi Sebastian du Portugal (1554-1578) et son expédition malheureuse de 1578 au Maroc. À l'époque, Donizetti tentait de composer une compétition d'opéra avec des opéras historiques similaires de Daniel Auber, de Halevy et Giacomo Meyerbeer. Une description critique de la nature de Dom Sébastien est «un enterrement en cinq actes». Le travail a été reçu avec réticence, que Donizetti lui-même a jugé un fiasco. Bien que Donizetti ait considéré son dernier opéra comme l'une de ses œuvres les plus importantes, Dom Sébastien est largement oublié aujourd'hui. Il a été écrit à un moment où Donizetti «n'avait plus de contrôle sans restriction sur son imagination», donc l'opéra était déjà marqué par la maladie naissante de Donizetti."
 elgar.1021.t: "Les Troyens"
 elgar.1021.f: "Les Troyens est un grand opéra français en cinq actes de Hector Berlioz. Le livret a été écrit par Berlioz lui-même du poème épique de Virgile The Aeneid; La partition a été composée entre 1856 et 1858. Les Troyens est le travail le plus ambitieux de Berlioz, le résumé de toute sa carrière artistique, mais il n'a pas vécu pour le voir joué dans son intégralité. Sous le titre Les Troyens à Carthage, les trois derniers actes ont été présentés avec de nombreuses coupes par la compagnie de Léon Carvalho, The Thétre Lyrique, à leur théâtre (maintenant le Théâtre de la Ville) sur le lieu du châtelet de Paris le 4 novembre 1863, avec 21 répétitions. Après des décennies de négligence, aujourd'hui l'opéra est considéré par certains critiques musicaux comme l'un des plus beaux jamais écrits."
 elgar.1022.t: "La damnation de Faust"
 elgar.1022.f: "La Damnation de Faust est une œuvre pour quatre voix solo, un refrain complet en sept parties, un chœur et un orchestre de grand enfants par le compositeur français Hector Berlioz. Il l'a qualifié de \"Légende Dramatique\" (légende dramatique). Le compositeur français a été inspiré par une traduction du poème dramatique de Goethe Faust et a produit une œuvre musicale qui, comme le chef-d'œuvre sur lequel il est basé, défie une catégorisation facile. Conçu à divers moments comme un oratorio de forme libre et en tant qu'opéra, sa forme de récit de voyage et sa perspective cosmique en ont fait un défi extrême de mettre en scène en tant qu'opéra. Berlioz lui-même était impatient de voir le travail mis en scène, mais une fois qu'il l'a fait, il a concédé que les techniques de production de son temps n'étaient pas à la hauteur de la tâche d'amener le travail à une vie dramatique. La majeure partie de la renommée de l'œuvre est passée par des performances de concert."
 elgar.1023.t: "Traité sur l'instrumentation"
 elgar.1023.f: "'This Traité d'Instrumentation is a highly paradoxical work. It begins with a preface of several lines unrelated to the subject, in which the author takes a stand against musicians who abuse modulations and whose penchant for dissonance matches the taste that certain animals have for salty plants and thorny bushes. Then he turns to the orchestral instruments and mixes strange assertions with the most solid truths and valuable advice.(...) In his treatise, as in his orchestration, Berlioz, for all its oddities, is simply fabulous. To him my generation owes its education, and I dare say a good one. Berlioz possessed the invaluable gift of igniting the imagination and arousing love for the art he taught.(...) These seemingly superfluous musical examples made one dream, they opened the door to a new world, to a vast one and fascinating glimpse of the future, of the Promised Land.' - Camille Saint-Saëns"
 elgar.1031.t: "Les préludes"
 elgar.1031.f: "Les Préludes est le troisième des treize poèmes symphoniques de Franz Liszt. La musique a été composée entre 1845-54, et a commencé comme une ouverture au cycle choral de Liszt Les Quatre Élémens (les quatre éléments), puis révisé comme une ouverture de concert autonome, avec un nouveau titre faisant référence à un poème d'Alphonse de Lamartine. Les Préludes est le premier exemple d'une œuvre orchestrale intitulée «Poème symphonique». Liszt considère les phases de la vie comme des préludes à la mélodie de la mort. Ces phases de la vie sont des luttes et des tempêtes, aiment le bonheur et la douleur, la consolation, l'expérience de la nature. Malgré les contrastes de ces humeurs reflétés dans Les Préludes, le travail est d'une grande cohérence. Il commence par une mélodie mélancolique, à partir duquel le premier thème principal orageux se développe, ce qui mène au deuxième thème via une partie pastorale. Ces deux thèmes sont développés dans des humeurs de glissement. Dans un point culminant, le thème original s'écoule dans le premier thème principal en tant que fanfare majestueux et glamour."
 elgar.1032.t: "Rhapsodies hongroises"
 elgar.1032.f: "Les Rhapsodies hongrois sont un ensemble de 19 pièces de piano basées sur des thèmes folkloriques hongrois, composés par Franz Liszt en 1846-1853, et plus tard en 1882 et 1885. Liszt a également organisé des versions pour l'orchestre, le duo de piano et le piano Trio. Certains sont mieux connus que d'autres, la Rhapsodie hongroise n ° 2 étant particulièrement célèbre et n ° 6, n ° 10, n ° 12 et n ° 14 (en particulier comme prévu pour le piano et l'orchestre en tant que fantasme hongrois) également bien connu. Liszt a incorporé de nombreux thèmes qu'il avait entendus dans sa Hongrie occidentale natale et qu'il croyait être de la musique folklorique, bien que beaucoup soient en fait écrits par des membres de la classe moyenne hongroise, ou par des compositeurs tels que József Kossovits. Dans leur forme de piano d'origine, les rhapsodies hongrois sont notés pour leur difficulté."
 elgar.1033.t: "Dante Symphony"
 elgar.1033.f: "Le «Dante Symphony» est une symphonie chorale composée par Franz Liszt. Écrit dans le style romantique élevé, il est basé sur le voyage de Dante Alighieri à travers l'enfer et le purgatoire, comme le montre la comédie divine. Certains critiques ont fait valoir que la Symphonie Dante n'est pas tant une symphonie au sens classique car ce sont deux poèmes symphoniques descriptifs. L'intention initiale de Liszt était de composer les travaux en trois mouvements: un enfer, un purgatorio et un paradiso. Les deux premiers devaient être purement instrumentaux et le choral final. Wagner, cependant, a persuadé Liszt qu'aucun compositeur terrestre ne pouvait exprimer fidèlement les joies du paradis. Liszt a abandonné le troisième mouvement mais a ajouté un Magnificat choral à la fin du deuxième mouvement. Le savant de Liszt, Humphrey Searle, soutient que si Liszt se sentait plus à l'aise pour dépeindre les régions infernales que les régions célestes, la tâche de représenter le paradis dans la musique n'aurait pas été au-delà de ses pouvoirs."
 elgar.1041.t: "Die Meistersinger von Nürnberg"
 elgar.1041.f: "«Die Meistersinger von Nürnberg» est un drame musical, ou opéra, en trois actes de Richard Wagner. C'est l'opéra le plus long couramment réalisé, prenant près de quatre heures et demie, sans compter deux pauses entre les actes, et n'est traditionnellement pas coupé. Le Meistersinger de Nuremberg occupe une place unique dans l'œuvre de Wagner. C'est la seule comédie parmi ses opéras matures et est également inhabituel parmi ses œuvres pour se dérouler dans un moment et un lieu historiquement bien définis plutôt que dans un cadre mythique ou légendaire. C'est le seul opéra Wagner mature basé sur une histoire entièrement originale. Il incorpore de nombreuses conventions d'opéra contre lesquelles Wagner avait réalisé dans ses essais sur la théorie de l'opéra: vers rimes, Arias, chœurs, quintette et même ballet."
 elgar.1042.t: "Die Walküre"
 elgar.1042.f: "«Die Walküre» se forme avec les opéras «das rheingold», «siegfried» et «götterdämmerung« l'œuvre complète »der ribe des nibelungen». Wagner a largement suivi les principes liés à la forme du drame musical, reflétant les sentiments et les humeurs derrière l'œuvre, en utilisant un système de leitmotives récurrentes pour représenter les personnes, les idées et les situations plutôt que les unités opératoires conventionnelles d'Arias, d'ensembles et de chœurs. L'histoire de Die Walküre est basée sur la mythologie nordique racontée dans la saga de Völsunga et l'Edda poétique."
 elgar.1043.t: "Parsifal"
 elgar.1043.f: "Le parsifal de Richard Wagner contient des éléments religieux tels que la musique sacrée, le dévoilement de la monstrance (Graal), le baptême et le rituel de la communion chrétienne. Déjà dans ses écrits d'art Zurich, il a développé l'idée d'utiliser l'art pour clarifier le cœur de la religion. Wagner a expliqué que pour transformer son message de parabole de salut et de régénération de l'humanité par compassion - représenté par le parsifal de recherche et les amfats souffrant - il a choisi une forme d'art qui, avec le symbolisme religieux, était destinée à avoir un `` effet entravé sur l'esprit ''. Wagner lui-même a décrit la pièce en trois actes comme une pièce de festival de consécration de scène et a décrété qu'il ne devrait être joué que dans le Bayreuth Festspielhaus."
 elgar.1051.t: "Pair gynt"
 elgar.1051.f: "Peer Gynt, op. 23, est la musique accessoire de la pièce de Henrik Ibsen en 1867 du même nom, écrit par le compositeur norvégien Edvard Grieg. Bien que la composition de nombreuses pièces de piano courtes et des œuvres de chambre, le travail Grieg a fait pour Henrik Ibsen se démarquait. Composant à l'origine 90 minutes de musique orchestrale pour la pièce, il est retourné plus tard et a extrait certaines sections pour les suites. Les voyages de Peer Gynt dans le monde et les terres lointaines sont représentées par les instruments que Grieg choisit d'utiliser. Grieg a créé plus tard deux suites de sa musique de pairs gynt. Une partie de la musique de ces suites a reçu une couverture dans la culture populaire, en particulier les pièces «Morning Mood», «dans la salle du roi de la montagne» et «Solveig's Song»."
 elgar.1052.t: "Lyrics"
 elgar.1052.f: "Lyric Pieces est une collection de 66 pièces courtes pour le piano solo écrit par Edvard Grieg. Ils ont été publiés en 10 volumes, de 1867 à 1901. La collection comprend plusieurs de ses pièces les plus connues, telles que le jour du mariage à Troldhaugen, au printemps, en mars des trolls et en papillon. Le thème de la première pièce de l'ensemble, Arietta, était l'une des mélodies préférées du compositeur. Selon les mots du pianiste Andrei Gavrilow, les pièces lyriques sont «un type de journal très spécial que Grieg a tenu tout au long de sa vie, ou une confession, car ils reflètent les moments les plus intimes de la vie du compositeur»."
 elgar.1053.t: "Danses norvégiennes"
 elgar.1053.f: "Les danses norvégiennes ont été la réponse du Norvégien aux danses slaves extrêmement réussies d'Antonín Dvořák et des danses hongroises de Johannes Brahms. Les deux collègues avaient publié leur série de danse pour Piano Four Hands en 1878 et 1881 par la maison d'édition SimRock. À cette époque, Grieg n'a pas osé orchestrer ses danses, car le terrain était occupé par les «Rhapsodies norvégiens» de son ami Johan Svendsen. La version orchestrale de ses danses norvégiennes a donc été organisée par Robert Henriques - à la satisfaction de Grieg. Pour la première danse, Grieg a utilisé la populaire March de Sinklar, pour les trois derniers soi-disant \"Hallings\", des danses nuptiales traditionnelles norvégiennes pour les jeunes hommes, qui sont rapides et très acrobatiques à jouer."
 elgar.1061.t: "Deutsches requiem"
 elgar.1061.f: "«Il n'y a pas grand-chose à dire ici, mais je dois encore vous dire que je suis complètement rempli de votre requiem, c'est une pièce très puissante, elle saisit toute la personne d'une manière comme quelques autres choses. Le sérieux profond, combiné à toute la magie de la poésie, a un effet merveilleux, choquant et apaisant. Comme vous le savez, je ne pourrai jamais vraiment le mettre en mots, mais je ressens tout le trésor riche de ce travail au cœur, et l'enthousiasme qui parle de chaque pièce me fait profondément, c'est pourquoi je ne peux pas m'en empêcher de prononcer… oh, si je pouvais l'entendre, qu'est-ce que je donnerais pour cela. - Clara Schuman"
 elgar.1062.t: "Danses hongroises"
 elgar.1062.f: "Les danses hongroises de Johannes Brahms sont un ensemble de 21 airs de danse animés basés principalement sur des thèmes hongrois, achevés en 1879. Ils varient d'une minute à cinq minutes. Ils sont parmi les œuvres les plus populaires de Brahms et ont été les plus rentables pour lui. Chaque danse a été organisée pour une grande variété d'instruments et d'ensembles. Brahms a initialement écrit la version de Piano Four Hands et a ensuite organisé les dix premières danses pour Solo Piano. Le violoniste Joseph Joachim, qui était un ami de Brahms, a créé un arrangement virtuose de toutes les danses hongroises pour violon et piano."
 elgar.1063.t: "Symphonie n ° 4"
 elgar.1063.f: "La symphonie n ° 4 est la dernière symphonie écrite par Johannes Brahms. Aujourd'hui, c'est l'une des œuvres orchestrales les plus populaires et les plus fréquemment interprétées du compositeur. À première vue, la manière sans compromis dont le travail est conçu était déconcertant. Lorsque Brahms et Ignaz Brüll ont joué la symphonie contre des amis sur deux pianos, Clara Schumann et le biographe de Brahms, Max Kalbeck, ont réagi avec le rejet. Eduard Hanslick se serait exclamé: \"Tout au long du mouvement, j'avais l'impression d'être battu par deux personnes terriblement intelligentes.\" Elisabeth von Herzogenberg a décrit l'œuvre comme «un petit monde pour les intelligents et compétents, dans lesquels les gens qui marchent dans l'obscurité ne pouvaient avoir qu'une petite partie». Lorsque Brahms a assisté à une performance de la Symphonie en 1897, peu de temps avant sa mort, il a reçu des applaudissements tonitruants du public viennois, que le travail a reçu à ce jour."
 elgar.1071.t: "Symphonie n ° 5"
 elgar.1071.f: "Comme certaines des autres symphonies de Mahler, la 5e symphonie n'a pas été comprise après sa première. En 1905, après une performance infructueuse à Hambourg, Mahler s'est plaint: «Le cinquième est une œuvre maudite. Personne ne l'obtient. Les critiques musicales dans les années qui ont suivi la première étaient pour la plupart négatives. Le critique musical Ferdinand Pfohl, par exemple, a jugé que la 5e symphonie était l'une des œuvres les plus faibles de Mahler. Seul le Neue Zeitung Für Musik a donné à la symphonie un témoignage bienveillant et a parlé d'une «richesse écrasante de beauté». Surtout par rapport à la 4ème symphonie écrite deux ans plus tôt, il représente une différence majeure de contenu et de forme. Avec le monde sonore plus rugueux de la 5e Symphonie, Mahler commence une nouvelle phase créative, qui se développe dans la 6e symphonie suivante. Ce n'est qu'après la mort de Mahler, le travail est devenu de plus en plus apprécié."
 elgar.1072.t: "Menti von der erde"
 elgar.1072.f: "'Is it really the same man who, 'in harmony with the infinite', erected the edifice of the Eighth that we now find in the drinking song of Earth's woes? Who creeps lonely in the autumn to his beloved resting place, longing for refreshment? Who looks at youth with a friendly look of old age, with gentle emotion at beauty? Who seeks to forget the meaningless earthly existence in drunkenness and finally says goodbye in melancholy? (...) It is hardly the same person and composer. All works up to that point had arisen from the feeling of life (...) The earth is disappearing, a different air is blowing in, a different light shines over it. (...) When I brought the autograph back to him, almost unable to say a word about it, he opened the 'Abschied' and said, 'What do you think? Is that bearable at all? Won't people kill themselves afterwards?' He then pointed to the rhythmic difficulties and asked jokingly, 'Any idea how to conduct that? Not me!' - Bruno Walter"
 elgar.1073.t: "Kindertotenlieder"
 elgar.1073.f: "«Je peux bien comprendre que l'on compose des paroles aussi terribles quand on n'a pas d'enfants ou quand on a perdu des enfants. Mais je ne peux pas comprendre comment vous pouvez chanter sur la mort des enfants si vous étreigniez et les embrassiez une demi-heure avant, heureux et en bonne santé! - Alma Mahler-Werfel, épouse de Gustav Mahler"
 elgar.1081.t: "Concerto de piano n ° 3"
 elgar.1081.f: "À cette époque, Mahler était le seul chef d'orchestre que je considérais comme digne d'être classé avec Nikisch. Il s'est consacré au concerto jusqu'à ce que l'accompagnement, ce qui est assez compliqué, ait été pratiqué à la perfection, bien qu'il ait déjà traversé une nouvelle répétition. Selon Mahler, chaque détail du score était important - une attitude trop rare parmi les conducteurs. ... Bien que la répétition devait se terminer à 12h30, nous avons joué et joué, bien au-delà de cette heure, et lorsque Mahler a annoncé que le premier mouvement serait à nouveau répété, je m'attendais à une protestation ou à la scène des musiciens, mais je n'ai pas remarqué un seul signe d'agacement. L'orchestre a joué le premier mouvement avec une appréciation vive ou peut-être encore plus étroite que la fois précédente. - Sergei Rachmaninoff"
 elgar.1082.t: "Rhapsody sur un thème de Paganini"
 elgar.1082.f: "La pièce se compose de 24 variations sur un thème que Niccolò Paganini lui-même a utilisé comme point de départ pour une série de variations. Cette mélodie a servi à plusieurs reprises de modèle pour divers compositeurs, notamment Johannes Brahms et Franz Liszt. Dans certaines variations, Rachmaninoff utilise une autre mélodie beaucoup plus ancienne: la séquence «meurt irae», autrefois partie intégrante de la masse latine pour les morts. Rachmaninoff a utilisé ce thème encore et encore dans ses œuvres. Il apparaît dans toutes les symphonies, les danses symphoniques, le poème symphonique die toteninsel et la première sonate de piano. La combinaison d'un thème Paganini avec le «Dies Irae» invite la recherche d'un fond programmatique pour l'œuvre. Selon la légende, le grand violoniste a vendu son âme au diable afin d'atteindre la perfection sur son instrument et l'amour d'une femme. Le motif «Dies Irae» représente le diable, le thème de Paganini pour le violoniste de la composition lui-même."
 elgar.1083.t: "Symphonie n ° 3"
 elgar.1083.f: "«Il a été joué à New York, Philadelphie, Chicago, etc. Lors des deux premières performances, j'étais présent. Il a été joué à merveille. Sa réception par le public et les critiques était aigre. Une critique me reste douloureusement dans mon esprit: que je n'avais plus de troisième symphonie en moi. Personnellement, je suis fermement convaincu que c'est un bon travail. Mais - parfois les compositeurs se trompent aussi! Quoi qu'il en soit, je tiens à mon avis jusqu'à présent. - Sergei Rachmaninoff"
 elgar.1091.t: "Roméo et Juliette"
 elgar.1091.f: "Roméo et Juliette sont le ballet le plus long et le plus connu de Sergei Prokofiev et est largement considéré comme sa contribution la plus importante au genre. Il est considéré comme un moment fort de son travail musical. L'instrumentation riche et variée ainsi que la complexité rythmique de la partition posent toujours des défis pour l'orchestre et les danseurs. Dans certains endroits, les dissonances bordent l'atonalité. La célèbre «danse des chevaliers», avec ses rythmes pointillés, est maintenant mieux connu comme un thème quasi-symphonique. En revanche, les thèmes associés à l'éveil de Juliette à aimer sont à la fois tendre et jeunes. Prokofiev a réutilisé la musique du ballet en trois suites pour orchestre et une œuvre de piano solo."
 elgar.1092.t: "Lieutenant Kijé"
 elgar.1092.f: "Le lieutenant Kijé Music a été écrit à l'origine pour accompagner le film du même nom. C'était la première tentative de musique de film de Prokofiev et sa première commission. Dans les premiers jours de Sound Cinema, parmi les différents compositeurs distingués prêts à s'essayer à la musique cinématographique, Prokofiev n'était pas un choix évident pour la commission. Basé à Paris pendant près d'une décennie, il avait une réputation d'expérimentation et de dissonance. Peu de temps après la sortie du film, Prokofiev a reçu une invitation du Moscou Radio Symphony Orchestra pour créer une suite orchestrale de sa musique de film Kijé - probablement la première instance d'une partition de film adaptée à une œuvre musicale importante. Alors que Prokofiev était aux États-Unis pour la première de Boston, il a été grandement recherché par les producteurs de films, mais bien qu'il ait été flatté et attiré par leurs offres, il n'a jamais composé une partition de film hollywoodien."
 elgar.1093.t: "Peter et le loup"
 elgar.1093.f: "Peter et le loup sont un «conte de fées symphoniques pour les enfants». Il s'agit de l'œuvre la plus fréquemment exécutée de Prokofiev et l'une des œuvres les plus fréquemment interprétées dans tout le répertoire classique. Le narrateur raconte une histoire pour enfants, tandis que l'orchestre l'illustre en utilisant différents instruments pour jouer un `` thème '' qui représente chaque personnage de l'histoire: `` Chaque personnage de cette histoire est représenté par un instrument correspondant dans l'orchestre: l'oiseau par un flûte, le canard par un obscur Le tir des chasseurs par les tambours de bouilloire et la tambour de basse. Avant une performance orchestrale, il est souhaitable de montrer ces instruments aux enfants et de jouer sur eux les leitmotifs correspondants. Ainsi, les enfants apprennent à distinguer les sons des instruments pendant la performance de cette histoire."
 elgar.1101.t: "Mourir"
 elgar.1101.f: "Fledermaus de Johann Strauss est considéré comme l'un des points forts de l'ère de l'opérette. Avec le Baron Gypsy et One Night à Venise, Die Fledermaus est l'une des trois plus célèbres opérettes de Strauss et également l'une des rares opérettes qui sont régulièrement jouées dans les principaux opéra internationaux. Les paroles sont accrocheuses et pleines d'ironie avec des vérités intemporelles. Les parties essentielles de la musique auraient été créées dans les 42 jours. L'ouverture, écrite sous forme de sonate libre, occupe une place spéciale et est l'une des plus grandes créations de Johann Strauss. Il résume les nombreux points forts musicaux de l'ensemble de l'œuvre et, avec sa dynamique variée, est toujours un défi même pour les meilleurs orchestres."
 elgar.1102.t: "Donauwalzer"
 elgar.1102.f: "La valse par le magnifique Danube bleu (souvent raccourci à: Danube Waltz) est sur le plan de la composition sur la base de mélodies que Johann Strauss avait déjà utilisées dans des œuvres antérieures. Déjà à sa première, il a suscité l'enthousiasme parmi le public. En raison du grand nombre de nouvelles sorties musicales dans la saison du carnaval à l'époque, la Waltz n'a pas initialement pris le dessus. Cependant, parce que Strauss est apparu à Paris à la foire mondiale de 1867 la même année et a créé de nouvelles compositions pour cela, il se souvient inclure cette valse dans le programme. Sous le nom du Beau Danube Bleu, la pièce est devenue un grand succès lors de cette exposition. On suppose que les éditions publiées de The Waltz, en particulier la version de piano à deux mains, ont été vendues près de 1 000 000 fois en peu de temps. La valse est considérée comme l'hymne secret de l'Autriche et l'une des pièces les plus populaires de toute l'histoire de la musique classique."
 elgar.1103.t: "Une nuit à Venise"
 elgar.1103.f: "Une nuit à Venise est une «opérette comique» en trois actes. L'action se déroule à Venise au milieu du XVIIIe siècle et est une comédie de déguisement et d'identité erronée avec la confusion d'amour entre deux classes. Comme beaucoup d'autres opérettes viennoises, le livret est une adaptation d'un opéra-comique français. La première à Berlin a été un échec. Cela était dû en partie à l'intrigue déroutante, mais aussi en partie en raison des textes sous-jacents. La pièce a donc été retravaillée pour la première au Theatre An Der Wien. L'ouverture a également été retravaillée par Strauss. Les numéros musicaux les plus célèbres sont la Waltz Lagoon et la chanson de gondole. En 1923 et de nouveau en 1931, il a été considérablement révisé par Erich Wolfgang Korngold; Une autre version a été écrite par Walter Felsenstein en 1954; La version originale n'est désormais que très rarement."
 elgar.1111.t: "Rigoletto"
 elgar.1111.f: "Rigoletto est un opéra de Giuseppe Verdi avec un livret de Francesco Maria Piave. Il est basé sur le mélodrame «le roi s'amuse» de Victor Hugo. L'opéra a été initialement critiqué par les censeurs; Verdi et Piave ont donc dû, entre autres, changer le titre initialement prévu et déplacer le cadre de Paris à Mantoue. Cependant, les éléments essentiels à Verdi, comme le personnage principal paralysé Rigoletto et le sac dans lequel sa fille mourante est mis, est restée intacte. L'opéra est considéré comme le premier chef-d'œuvre de Verdi et a établi sa renommée mondiale. Verdi lui-même considérait Rigoletto comme l'une de ses œuvres les plus accomplies, et contrairement à d'autres opéras de Verdi, il n'y a pas de révisions ou de nouvelles versions. Rigoletto a été un succès écrasant lors de sa première et a été joué dans presque tous les opéra européens au cours des prochaines années. L'opéra fait partie du répertoire de nombreux opéra depuis plus de 160 ans et reste l'un des opéras italiens les plus fréquemment interprétés."
 elgar.1112.t: "La Traviata"
 elgar.1112.f: "La Traviata est un opéra de Giuseppe Verdi et Francesco Maria Piave basé sur le roman La Dame aux Camelias par Alexandre Dumas le plus jeune. Comme auparavant dans Rigoletto et Il Trovatore, Verdi a placé une personne ostracisée et rejetée par la société au centre de l'action. Un opéra sur une courtisane qui meurt de tuberculose était une innovation scandaleuse à l'époque. Le travail a échoué à la première, même si Verdi l'avait mis en scène lui-même et, par précaution, a déplacé l'action à l'époque de Louis XIV. Après sa révision, Verdi l'a fait réaction un an plus tard - après quoi il est devenu l'un des opéras les plus réussis de l'histoire de la musique. Dans certains pays, c'est l'opéra le plus réalisé de tous les temps. En ce qui concerne le nombre d'enregistrements réalisés, La Traviata n'est dépassée que par Aida. Pour des raisons de censure, l'opéra a également été joué en Italie sous le titre de Violetta."
 elgar.1113.t: "Messa da requiem"
 elgar.1113.f: "Sous l'impression de la mort de Gioachino Rossini en 1868, Giuseppe Verdi a invité les douze compositeurs les plus importants en Italie à l'époque pour composer conjointement une masse funéraire, le soi-disant messa par Rossini. Il a lui-même repris le cadre du mouvement final, «Libera Me», dans ce requiem. Cependant, une performance n'a pas eu lieu en raison de circonstances défavorables. Verdi a de nouveau traité le matériel du requiem après la mort du poète Alessandro Manzoni en 1873. Verdi a profondément admiré le Manzoni très respecté. Il a offert à la ville de Milan la composition d'une messe à exécuter un an après la mort de Manzoni. Le «Libera Me» de la masse de Rossini est maintenant devenu le noyau du nouveau Requiem pour Manzoni. Le cadre de «Dies Irae» de la composition plus ancienne a été repris trois fois pour les passages de la séquence avec le même texte ou similaire. La première représentation, à l'église de San Marco de Milan le 22 mai 1874, a marqué le premier anniversaire de la mort de Manzoni. Verdi lui-même a conduit."
 elgar.1121.t: "Prélude à L'APRÈS-MIDI D'ONU FAUNE"
 elgar.1121.f: "«La musique de ce prélude est une illustration très gratuite du magnifique poème de Mallarmé. Il ne prétend en aucun cas être une synthèse de celui-ci. Il y a plutôt une succession de scènes à travers lesquelles passer les désirs et les rêves de la faune dans la chaleur de l'après-midi. Ensuite, fatigué de poursuivre le vol timique de nymphes et de naiades, il succombe à un sommeil enivrant, dans lequel il peut enfin réaliser ses rêves de possession dans la nature universelle. '\ N \ nprelude à l'après-midi d'un faune est un poème symphonique pour l'orchestre et l'une des œuvres les plus célèbres de Debussy. La pièce est considérée comme un tournant dans l'histoire de la musique d'art occidentale ainsi qu'un chef-d'œuvre de la composition impressionniste. Pierre Boulez considérait la partition comme le début de la musique moderne, observant que «la flûte de la faune a rendu le nouveau souffle à l'art de la musique»."
 elgar.1121.g: "Offrez-vous, rêve, profitez du moment sans fin ..."
 elgar.1122.t: "La Mer"
 elgar.1122.f: "`` Le concert de la nuit dernière a commencé avec beaucoup de daubers impressionnistes de couleur margledy-piggledy sur une palette tonale, avec jamais une pensée de forme ou de but, sauf pour créer de nouvelles combinaisons de sons. … Une seule chose était sûre, et c'est que l'océan du compositeur était un étang de grenouille et que certains de ses habitants étaient entrés dans la gorge de chacun des instruments en laiton. '\ N \ ncomposé entre 1903 et 1905, La Mer a été créée à Paris en octobre 1905. Il n'était initialement pas bien reçu. Même certains qui avaient été de solides partisans du travail de Debussy étaient sans enthousiasme, même si la pièce présentait trois aspects clés de l'esthétique de Debussy: impressionnisme, symbolisme et japonisme. Dans les décennies qui ont suivi la première, La Mer s'est établie dans le répertoire orchestral principal."
 elgar.1123.t: "Pelléas et Mélisande"
 elgar.1123.f: "«En tant que professeur, il était pédante - c'est le seul mot. Vraiment pédante ... il y avait un noyau de colère et d'amertume en lui - je pense souvent qu'il était un peu comme Golaud à Pelléas et pourtant il ne l'était pas. Il était - c'est dans toute sa musique - un homme très sensuel. Personne ne semblait l'aimer. Jean Périer, qui a joué Pelléas à ma mélisande, est devenu blanc avec colère si vous avez mentionné le nom de Debussy ... '\ n \ npelleas et Mélisande est un opéra en cinq actes. Le nom de genre du compositeur Claude Debussy est «Drame Lyrique». Le texte est une adaptation de la pièce Pelléas et Mélisande par Maurice Maeterlinck. Debussy a évité les Arias et les plus grandes scènes solo, ce qui a donné au texte un caractère réaliste. Pelléas devait être le seul opéra terminé de Debussy. Pour cette raison, il a parfois été comparé à Fidelio de Beethoven."
 elgar.1131.t: "Lac de cygne"
 elgar.1131.f: "Swan Lake est un ballet de renommée mondiale de la musique de Pyotr Ilyich Tchaikovsky, qui a été présenté en 1877 au Bolshoi Theatre de Moscou et fait partie du répertoire standard des compagnies de ballet classiques. Des motifs communs de nombreux contes de fées peuvent être trouvés dans le lac Swan: en particulier la malheureuse princesse enchantée qui est rachetée par l'amour d'un prince. La fin malheureuse du livret original est également un motif de conte de fées bien connu de la Swan Girl ou Swan Maiden. Tchaikovsky s'est appuyé sur des compositions précédentes pour son score de Swan Lake. Selon deux des proches de Tchaikovsky, le compositeur avait précédemment créé un petit ballet appelé «le lac des cygnes» à leur domicile en 1871. Ce ballet comprenait le célèbre Leitmotif. Il a également utilisé du matériel de «The Voyevoda», un opéra qu'il avait abandonné en 1868. En avril 1876, le score était terminé et les répétitions ont commencé. Bientôt, le chorégraphe Reisinger a commencé à mettre de côté certains nombres qu'il a surnommé «Undement». Reisinger a même commencé à chorégraphier des danses à la musique d'autres compositeurs, mais Tchaikovsky a protesté et ses pièces ont été rétablies."
 elgar.1132.t: "Symphonie n ° 6 «Pathétique»"
 elgar.1132.f: "«Je suis maintenant entièrement occupé par le nouveau travail ... et il est difficile pour moi de m'en déchirer. Je crois que cela vient d'être le meilleur de mes œuvres. Je dois le terminer le plus tôt possible, car je dois finir beaucoup d'affaires et je dois bientôt aller à Londres. Je vous ai dit que j'avais terminé une symphonie qui m'a soudainement mérité, et je l'ai déchiré. Maintenant, j'ai composé une nouvelle symphonie que je ne déchirerai certainement pas. '\ N \ ntwo des années après la première de sa symphonie n ° 5 en mi mineur, op. 64, a planifié Tchaikovsky, comme il l'a écrit à un ami, «pour écrire une magnifique symphonie qui formera la clé de voûte de tout mon travail». Le compositeur a intitulé l'œuvre «La symphonie passionnée». La caractéristique de l'œuvre est le mouvement final lent - inhabituel pour les symphonies - dont la fin rappelle un requiem."
 elgar.1133.t: "Concerto en violon en D Major"
 elgar.1133.f: "Le concerto en violon en D Major est le seul concerto en violon du compositeur russe Pyotr Ilyich Tchaikovsky. Tchaikovsky a écrit le Concerto en mars et avril 1878 à Clarens, une ville de viticole sur le lac Léman. Là, il s'est remis de la dépression et d'une grave dépression nerveuse. L'effet positif de son séjour s'est reflété dans le concert, dans lequel sa nouvelle joie de vie s'est manifestée. Les travaux de composition ont été achevés après trois semaines, bien que Tchaikovsky ait remplacé le mouvement moyen prévu à l'origine par l'Andante connu sous le nom de «Canzonetta». Les critiques de musique ont réagi négativement à l'œuvre. Tchaikovsky a réagi calmement et était convaincu que le concerto prévaudrait. À ce jour, c'est l'un des concertos de violon les plus célèbres, les plus interprétés et les plus joués au monde."
 elgar.1141.t: "Pompe et circonstance"
 elgar.1141.f: "Les marches militaires de la pompe et des circonstances sont une série de cinq (ou six) marches pour l'orchestre. Ils comprennent certaines des compositions les plus connues d'Elgar. Le plus connu des six marches, Pomp et Circonstance March n ° 1 à D, a eu sa première, avec mars n ° 2, à Liverpool le 19 octobre 1901. Elgar et sa femme ont assisté, et ce fut un succès «effréné». Le trio contient la mélodie connue sous le nom de «Land of Hope and Glory». En 1902, la mélodie a été réutilisée, sous une forme modifiée, pour la section «Land of Hope and Glory» de son couronnement pour le roi Edward VII. Les mots ont été modifiés pour s'adapter à la mélodie originale, et le résultat est depuis devenu un incontournable à la dernière nuit des Proms, et un hymne sportif anglais et une chanson patriotique générale."
 elgar.1141.g: "Terre d'espoir et de gloire!"
 elgar.1142.t: "La couronne de l'Inde"
 elgar.1142.f: "La Couronne de l'Inde, était un masque, une présentation théâtrale élaborée, organisée en 1912 pour célébrer la visite du décembre précédent du roi George V et de la reine Mary à Delhi pour leur couronnement en tant qu'empereur et impératrice de l'Inde. Pour ce masque, le compositeur anglais Sir Edward Elgar a écrit la musique, avec un livret de Henry Hamilton. Le Masque était composé de deux tableaux: «Les villes d'Ind» et «Ave Imperator!». Elgar a ensuite extrait cinq des pièces et ajouté un intermezzo pour le violon en solo pour créer la suite de la Couronne de l'Inde.  La suite a gagné en popularité immédiate: au cours de la vie d'Elgar, il y avait 102 performances en direct sur la BBC."
 elgar.1143.t: "Variations Enigma"
 elgar.1143.f: "Les variations Enigma sont une œuvre orchestrale qui décrit les personnes de l'environnement d'Elgar en 14 variations. Ils ont fait connaître Elgar à l'international après leur première par le chef d'orchestre Hans Richter. L'énigme du titre ne fait pas référence à la mission de la variation qui est dédiée à quel ami, mais à un autre puzzle. Selon Elgar, il existe un thème différent et plus grand qui traverse toute la composition, mais il n'est pas joué, et le thème réel est composé comme une contre-mélodie. Jusqu'à présent, diverses théories ont été avancées. La 9e variation (Nimrod) en particulier a gagné en popularité."
 elgar.1151.t: "La 9e symphonie"
 elgar.1151.f: "En 1892, Dvořák a déménagé aux États-Unis et est devenu directeur du National Conservatory of Music of America à New York. Aux États-Unis, Dvořák a écrit l'une de ses œuvres orchestrales les plus réussies: la symphonie «du Nouveau Monde», qui a répandu sa réputation dans le monde entier. Il a été dit que Dvořák a été inspiré par les «espaces grands ouverts» de l'Amérique, comme les Prairies qu'il a peut-être vues lors de son voyage dans l'Iowa à l'été 1893. Dvořák a également été influencé par le style et les techniques utilisés par des compositeurs classiques antérieurs, dont Beethoven et Schubert. Les Falling Fourths et Timpani sont dans le mouvement Scherzo du Nouveau Monde Symphonie évoquent le Scherzo de la Symphonie n ° 9 de Beethoven. Lors de la première dans le Carnegie Hall, la fin de chaque mouvement a été accueillie par un coup de tonnerre et Dvořák s'est senti obligé de se lever et de se lever."
 elgar.1152.t: "Danses slaves"
 elgar.1152.f: "Les danses slaves sont une collection de 16 pièces instrumentales d'Antonín Dvořák, écrites pour Piano Four Hands et chacune peu de temps après l'orchestre. Ils font partie des œuvres les plus célèbres du compositeur tchèque. Les compositions de Dvořák utilisent des modèles rythmiques caractéristiques des danses folkloriques bohème et moraves ainsi que celles des pays voisins. Cependant, ce sont encore des créations complètement indépendantes du compositeur. Dans la première rangée, il y a deux fusiants caractérisés par des changements de rythme, deux Sousedskás similaires au Ländler, deux Skočnás (danse rapide rapide), une polka et, en tant que seule danse non-col, une dumka ukrainienne. Dans la deuxième série, les danses non-collées prédominent, c'est pourquoi Dvořák a été exposé à une certaine hostilité. Il a été accusé de ne pas s'identifier suffisamment à sa patrie et de vouloir se rendre populaire à l'étranger."
 elgar.1153.t: "Rusalka"
 elgar.1153.f: "Rusalka est l'opéra le plus réussi d'Antonín Dvořák. Il a été créé sur la base d'un livret par Jaroslav Kvapil et revient aux mythes folkloriques slaves sur le Rusalky (esprits de l'eau, sirènes) et est similaire à l'histoire allemande Undine de Friedrich de la Motte Fouqué, Hans Christian Andersen's Fairy Tale, la petite saga de la mince-mémairs française. L'opéra avec le conte de fées lyriques du sous-titre est également connu sous le nom de «tchèque Undine». Avec The Bartered Bride de Bedřich Smetana, Rusalka est l'opéra tchèque le plus célèbre. L'opéra Rusalka occupe une place de choix dans le développement de la musique dramatique tchèque."
 elgar.1161.t: "Fantasie dans C-Dur"
 elgar.1161.f: "Le fantasme en C Major est l'une des compositions de piano les plus importantes de Robert Schumann. En plus des scènes de Kreisleriana et des enfants, c'est l'une des pièces les plus connues du compositeur et fait partie du cœur de la littérature romantique sur le piano. Il l'a consacré à Franz Liszt, le virtuose admiré qui l'a remercié des années plus tard en lui donnant sa grande sonate mineure. Le swing visionnaire de ce fantasme de piano et le pouvoir soutenu tout au long de la composition rappellent la maîtrise architecturale de Ludwig Van Beethoven, dont le cycle de la chanson `` à la lointaine bien-aimée 'Schumann Citations de la 7e Symphonie prend le troisième mouvement."
 elgar.1162.t: "Concerto de piano en mineur"
 elgar.1162.f: "Le concerto de piano dans une opération mineure. 54 est un concerto solo romantique pour le piano et l'orchestre qui a été écrit pendant la haute période romantique. Il porte de nombreuses caractéristiques de l'ère romantique. Comme certains autres concertos de piano du 19e siècle, le concerto mineur a un personnage symphonique. Depuis que l'œuvre a été initialement conçue comme un fantasme, tout le concert a des impressions romantiques et fantastiques. Schumann avait besoin de plus de cinq ans pour l'achèvement retardé. Sur la page de titre de l'autographe, Schumann souligne les différentes moments dans lesquels les mouvements ont été écrits. Les idées de base du travail sont désir et le bonheur de deux personnes amoureuses. Dans ce travail, Schumann traduit son combat pour Clara Wieck en musique. Le thème principal du premier mouvement est similaire à la mélodie du Florestan Aria de l'opéra de Beethoven Fidelio. Conguent avec Beethoven, ce thème signifie également la loyauté du conjoint et la lutte pour la liberté à Schumann."
 elgar.1163.t: "Kinderszennen"
 elgar.1163.f: "Le Kinderszennen (scènes pour enfants) est un cycle de Robert Schumann composé de treize pièces de piano courtes. Contrairement à «l'album pour les jeunes», ce sont des pièces qui n'étaient pas composées pour les enfants, mais, selon les propres mots de Schumann, comme un «reflet d'une personne âgée pour les personnes âgées». La pièce la plus célèbre et la plus longue du cycle est «Träumerei». Avec un temps de jeu d'un peu moins de 20 minutes, les scènes des enfants sont parmi les œuvres de piano romantique les plus populaires aujourd'hui. Bien que les scènes des enfants n'étaient pas particulièrement réussies au cours de la vie de Schumann, le travail avait une signification particulière, du moins pour lui. Un échange de lettres de 1839 montre que Schumann à cette époque croyait fermement en la possibilité d'une union conjugale avec Clara Wieck et que les scènes des enfants sont nées de son côté optimiste et joyeux."
 elgar.1171.t: "Concerto en violon en mi mineur"
 elgar.1171.f: "Le concerto en violon de Felix Mendelssohn en mineur est son dernier concerto. Bien accueilli à sa première, il est resté parmi les concertos de violon les plus importants et les plus considérés. Il occupe une place centrale dans le répertoire du violon et s'est développé une réputation de concerto essentiel pour tous les violonistes de concert en herbe à maîtriser, et généralement l'un des premiers concertos de l'ère romantique qu'ils apprennent. L'œuvre elle-même a été l'un des principaux concertos de violon de l'ère romantique et a eu une influence sur de nombreux autres compositeurs. Bien que le concerto se compose de trois mouvements dans une structure standard rapide et chaque mouvement suit une forme traditionnelle, elle était innovante et comprenait de nombreuses caractéristiques nouvelles à son époque. Les aspects distinctifs incluent l'entrée presque immédiate du violon au début de l'œuvre - plutôt que de suivre un aperçu orchestral des thèmes majeurs du premier mouvement, comme cela était typique dans les concertos de l'époque classique."
 elgar.1181.t: "Études"
 elgar.1181.f: "Frédéric Chopin a écrit un total de 27 Études pour le piano: 12 Études op. 10 (publié en 1833), 12 Études op. 25 (publié en 1837) et trois autres études pour la troisième partie (études de perfectionnement pour le piano, publiées en 1840) de la Piano School Méthodes des Méhodes par Ignaz Moscheles et François-Joseph Fétis. Les trois études ont ensuite été publiées séparément sous le titre Trois Nouvelles Études. En tant que «Magna Carta du piano jouant» (Karl Schumann), ils sont parmi les compositions de piano les plus importantes de l'histoire de la musique. Les grands compositeurs de piano tels qu'Alkan, Scriabin, Debussy et Rachmaninoff leur ont pris leur indice. Franz Liszt et Józef Wieniawski ont été les premiers pianistes à effectuer publiquement les études de Chopin."
 elgar.1191.t: "Une vie pour le tsar"
 elgar.1191.f: "Après des années d'écoute des chanteurs, de romancage des femmes avec sa musique et de rencontrer des gens célèbres, notamment Mendelssohn, Berlioz et Liszt, Glinka s'est rendu compte que la mission de sa vie était de retourner en Russie, d'écrire de manière russe et de faire pour la musique russe ce que Donizetti et Bellini avaient fait pour la musique italienne. Une vie pour le tsar a été la première des deux grands opéras de Glinka. Il était à l'origine intitulé Ivan Susanin. Situé en 1612, il raconte l'histoire du paysan russe et du héros patriotique Ivan Susanin qui sacrifie sa vie pour le tsar en sortant un groupe de poteaux en maraude qui le chassait. Avec cet opéra, Glinka a réussi à créer une musique russe indépendante; Il est considéré comme le premier opéra russe."
 elgar.1192.t: "Ruslan et Ludmila"
 elgar.1192.f: "Ruslan et Ludmila sont un «opéra fantastique» en cinq actes avec de la musique de Mikhail Glinka avec un livret de Nestor Kukolnik et d'autres basés sur le poème du même nom d'Alexander Sergeyevich Pouchkine. La mort de Pouchkin dans le célèbre duel l'a empêché d'écrire le livret lui-même comme prévu. Comme pour «une vie pour le tsar», Ruslan utilise certains aspects de la musique folklorique russe; Il est également noté pour l'utilisation imaginative de la dissonance, du chromaticisme et des éléments orientaux. Pour une conséquence particulière, l'utilisation de toute l'échelle du ton pour la première fois dans la musique russe. L'ouverture de Rollicking est l'une des pièces orchestrales les plus connues en Occident et connues pour être un cauchemar pour les bassistes."
 elgar.1193.t: "Kamarinskaya"
 elgar.1193.f: "Kamarinskaya est une danse folklorique russe traditionnelle, qui est surtout connue aujourd'hui comme la composition du compositeur russe Mikhail Glinka du même nom. Kamarinskaya de Glinka, écrite en 1848, a été la première œuvre orchestrale entièrement basée sur la chanson folklorique russe et pour utiliser les principes de composition de ce genre pour dicter la forme de la musique. Il est devenu une pierre de touche pour la génération suivante de compositeurs russes allant du Pyotr Ilyich Tchaikovsky orienté Occidental au groupe de nationalistes connu collectivement sous les cinq et a également été loué à l'étranger, notamment par le compositeur français Hector Berlioz. Pour Tchaikovsky, Kamarinskaya a offert un exemple viable des possibilités créatives des chansons folkloriques dans une structure symphonique, en utilisant une variété de combinaisons harmoniques et contrapuntées."
 elgar_great_composer: "Grand compositeur"
 elgar_great_composer_desc: "Les grands compositeurs sont la crème de la crème des compositeurs. Ils sont tout simplement les meilleurs et sont connus du monde entier."
