l_french:
 MR_PAINTER_ACHIEVEMENTS_TT: "[AddLocalizationIf( Scope.IsSet , 'klimt_painter_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'klimt_painter_achievements_no_painter_loc')]"
 klimt_painter_achievements_loc: "$klimt_painter_achievements_intro_loc$[AddLocalizationIf( Scope.Var('klimt_painter_achievement_vernissage_var').IsSet , Scope.Var('klimt_painter_achievement_vernissage_var').GetFlagName)][AddLocalizationIf( Scope.Var('klimt_painter_achievement_inaugurated_gallery_var').IsSet , Scope.Var('klimt_painter_achievement_inaugurated_gallery_var').GetFlagName)]"
 klimt_painter_achievements_no_painter_loc: "Les réalisations #V de ce [concept_klimt_painter]#! seront affichées ici, une fois que vous en aurez une."
 klimt_painter_achievements_intro_loc: "#V Réalisations de ce peintre#!\n[Scope.GetCharacter.GetFullName] est un [Scope.GetCharacter.GetCustom('klimt_painter_achievement_experience_type')].\n[Scope.GetCharacter.GetSheHe] a réalisé [Scope.Var('klimt_painter_num_paintings_var').GetValue|V0] peintures dont [Scope.Var('klimt_painter_num_masterworks_var').GetValue|V0] sont considérées comme des chefs-d'œuvre."
 klimt_painter_achievement_vernissage_loc: "\n[GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetLastName] a exposé ses peintures lors d'un grand vernissage."
 klimt_painter_achievement_inaugurated_gallery_loc: "[Scope.GetCharacter.GetSheHe] a inauguré une nouvelle galerie d'art avec [Scope.GetCharacter.GetHerHis] magnifiques peintures. Il est certain que la galerie accueillera de nombreux autres grands peintres à l'avenir !"