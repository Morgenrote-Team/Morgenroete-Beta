l_french:
 MR_COMPOSER_ACHIEVEMENTS_TT: "[AddLocalizationIf( Scope.IsSet , 'elgar_composer_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'elgar_composer_achievements_no_composer_loc')]"
 elgar_composer_achievements_loc: "$elgar_composer_achievements_intro_loc$[Scope.GetCharacter.GetCustom('elgar_composer_achievement_is_composer_virtuoso_type')][Scope.GetCharacter.GetCustom('elgar_composer_achievement_is_composer_conductor_type')]"
 elgar_composer_achievements_no_composer_loc: "Les réalisations #V de ce [concept_elgar_composer]#! seront affichées ici, une fois que vous en aurez une."
 elgar_composer_achievements_intro_loc: "#V Réalisations de ce compositeur#!\n[Scope.GetCharacter.GetFullName] est un compositeur dont la réputation n'est plus à faire [Scope.Var('elgar_composer_experience').GetValue|V0]. Jusqu'à présent, [Scope.GetCharacter.GetSheHe] a effectué des tournées [Scope.Var('elgar_composer_num_tours_var').GetValue|V0]. Parmi les nombreuses œuvres de [Scope.GetCharacter.GetHerHis], [Scope.Var('elgar_composer_num_compositions_var').GetValue|V0] se distingue particulièrement."
 elgar_composer_achievement_is_composer_virtuoso_loc: "\n[Scope.GetCharacter.GetSheHe|U] est un excellent #V Virtuose#!."
 elgar_composer_achievement_is_composer_conductor_loc: "\n[Scope.GetCharacter.GetSheHe|U] est considéré comme un célèbre #V Conducteur#!."