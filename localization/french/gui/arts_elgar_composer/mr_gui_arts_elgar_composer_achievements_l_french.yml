 elgar_composer_achievements_intro_loc: "#V Réalisations de ce compositeur#!\n[Scope.GetCharacter.GetFullName] est un compositeur dont la réputation n'est plus à faire [Scope.Var('elgar_composer_experience').GetValue|V0]. Jusqu'à présent, [Scope.GetCharacter.GetSheHe] a effectué des tournées [Scope.Var('elgar_composer_num_tours_var').GetValue|V0]. Parmi les nombreuses œuvres de [Scope.GetCharacter.GetHerHis], [Scope.Var('elgar_composer_num_compositions_var').GetValue|V0] se distingue particulièrement." #deepl:784174613

 elgar_composer_achievement_is_composer_virtuoso_loc: "\n[Scope.GetCharacter.GetSheHe|U] est un excellent #V Virtuose#!." #deepl:247745204
