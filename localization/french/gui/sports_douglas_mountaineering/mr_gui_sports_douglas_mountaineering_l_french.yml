 MR_MOUNTAINEERING_CLUB_BUTTON: "Club d'alpinisme" #deepl:2527856433
 MR_MOUNTAINEERING_CLUB_BUTTON_TT: "#T Fonder un club d'alpinisme#!\nUn club d'alpinisme est le premier pas d'une nation vers l'alpinisme organisé. Il doit être fondé par un homme (ou une femme) expérimenté(e) en matière d'alpinisme. C'est de ce club que naîtront les nouveaux alpinistes qui partiront à la conquête des sommets du monde!\N- La création d'un club d'alpinisme est une étape importante dans l'évolution de l'alpinisme.[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:2346036384

 MR_ALPINE_CLUB_BUTTON: "Club alpin" #deepl:3580940097
 MR_ALPINE_CLUB_BUTTON_TT: "#T Fonder le Club Alpin#!\nFondé à Londres en 1857, le Club Alpin est la plus ancienne organisation d'alpinisme au monde. Sa création a marqué le début de l'alpinisme organisé dans l'Angleterre victorienne. Le club visait à promouvoir l'exploration scientifique, géographique et sportive des Alpes. Parmi ses membres fondateurs figure Edward Whymper, qui a réalisé la première ascension du Cervin en 1865. Le Club alpin a joué un rôle clé pendant l'"âge d'or de l'alpinisme" et a publié des ouvrages influents, notamment l'Alpine Journal. Il a établi des normes pour les futurs clubs d'alpinisme du monde entier.[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:1435537543
 MR_ALPINE_CLUB_TRIGGER_TT: "#default_text Il y a au moins #G 6#! Pays avec un club d'alpinisme.#!" #deepl:877941772

 MR_ALPINE_CLUB_PRESIDENT_BUTTON: "Devenir président du club alpin" #deepl:2811041330
 MR_ALPINE_CLUB_PRESIDENT_BUTTON_TT: "#T Devenez président du Club Alpin#!\nSans président actif du Club Alpin, nous pouvons prendre cette position. Cela suppose que nous contrôlions le siège du Club Alpin.[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:2559860583
 MR_ALPINE_CLUB_CONTROLS_HQ_TRIGGER_TT: "#default_text [GetPlayer.GetName] contrôle le [GetBuildingType('building_douglas_alpine_club').GetName]#! ." #deepl:3575352074

