 MR_BAN_FOREIGN_MOUNTAINEERS_BUTTON_TT: "#T Ban Foreign Mountaineers#!\nThe state can issue a decree that local peaks may only be climbed by national mountaineers.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ALLOW_FOREIGN_MOUNTAINEERS_BUTTON: "Allow Foreign Mountaineers"
 MR_ALLOW_FOREIGN_MOUNTAINEERS_BUTTON_TT: "#T Allow Foreign Mountaineers#!\nAllows foreign mountaineers to climb local peaks for a mountaineering license.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
