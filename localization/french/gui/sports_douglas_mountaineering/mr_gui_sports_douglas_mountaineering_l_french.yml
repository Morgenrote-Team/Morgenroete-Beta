 MR_MOUNTAIN_GENERAL_TRIGGER_TT: "#default_text [GetPlayer.GetName] has a #V General#! with the #V $douglas_mountaineer$#!, #V $douglas_mountaineer_veteran$#!, #V $mountain_commander$#!, or #V $explorer$#! [concept_character_trait] #!."
 MR_MOUNTAINEERING_CLUB_BUTTON: "Club d'alpinisme"
 MR_MOUNTAINEERING_CLUB_BUTTON_TT: "#T Fonder un club d'alpinisme#!\nUn club d'alpinisme est le premier pas d'une nation vers l'alpinisme organisé. Il doit être fondé par un homme (ou une femme) expérimenté(e) en matière d'alpinisme. C'est de ce club que naîtront les nouveaux alpinistes qui partiront à la conquête des sommets du monde!\N- La création d'un club d'alpinisme est une étape importante dans l'évolution de l'alpinisme.[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ALPINE_CLUB_BUTTON: "Club alpin"
 MR_ALPINE_CLUB_BUTTON_TT: "#T Fonder le Club Alpin#!\nFondé à Londres en 1857, le Club Alpin est la plus ancienne organisation d'alpinisme au monde. Sa création a marqué le début de l'alpinisme organisé dans l'Angleterre victorienne. Le club visait à promouvoir l'exploration scientifique, géographique et sportive des Alpes. Parmi ses membres fondateurs figure Edward Whymper, qui a réalisé la première ascension du Cervin en 1865. Le Club alpin a joué un rôle clé pendant l'\"âge d'or de l'alpinisme\" et a publié des ouvrages influents, notamment l'Alpine Journal. Il a établi des normes pour les futurs clubs d'alpinisme du monde entier.[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ALPINE_CLUB_TRIGGER_TT: "#default_text Il y a au moins #G 6#! Pays avec un club d'alpinisme.#!"
 MR_ALPINE_CLUB_PRESIDENT_BUTTON: "Devenir président du club alpin"
 MR_ALPINE_CLUB_PRESIDENT_BUTTON_TT: "#T Devenez président du Club Alpin#!\nSans président actif du Club Alpin, nous pouvons prendre cette position. Cela suppose que nous contrôlions le siège du Club Alpin.[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ALPINE_CLUB_CONTROLS_HQ_TRIGGER_TT: "#default_text [GetPlayer.GetName] contrôle le [GetBuildingType('building_douglas_alpine_club').GetName]#! ."
 douglas_alpine_club_board_member_tt: "[GetPlayer.GetName] devient membre du conseil d'administration du Club Alpin."
 douglas_become_alpine_club_president_tt: "[GetPlayer.GetName] devient président du Club Alpin."
 MR_ALPINE_CLUB_EXPERIENCE_TRIGGER_TT: "#default_text L'alpiniste a au moins #p 50#! #V  Experiencen#!.#!"
 MR_ALPINE_CLUB_ASCENTS_TRIGGER_TT: "#default_text L'alpiniste a au moins fait #p 2#! #V  Ascensions#!.#!"
 MR_ALPINE_CLUB_SUMMITS_TRIGGER_TT: "#default_text L'alpiniste a au moins conquis #p 1#! #V  Sommet#!.#!"
 MR_RECRUIT_MOUNTAINEER_BUTTON: "Recruter Mountaineer"
 MR_RECRUIT_MOUNTAINEER_BUTTON_TT: "#T Recruter des alpinistes#!\nAvec un club d'alpinisme, il est possible de recruter de nouveaux alpinistes. Pour ce faire, il faut bien sûr disposer d'un nombre suffisant de [concept_douglas_alpine_heritage].[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAINEERING_CLUB_TRIGGER_TT: "#default_text [GetPlayer.GetName] a un #V Mountaineering Club#!.#!"
 MR_ALPINE_HERITAGE_50_TRIGGER_TT: "#default_text [GetPlayer.GetName] a au moins #G 50 ! [concept_douglas_alpine_heritage].#!"
 MR_MOUNTAIN_TROOPS_REGIMENT_BUTTON: "Régiment de troupes de montagne"
 MR_MOUNTAIN_TROOPS_REGIMENT_BUTTON_TT: "#T Régiment de troupes de montagne#!\NUn général approprié peut, compte tenu de la présence d'une région montagneuse avec une population passionnément dévouée à sa patrie, établir un régiment formé à la tactique de l'infanterie de montagne.\NIl est possible de créer un régiment formé à la tactique de l'infanterie de montagne.[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ALPINE_HERITAGE_25_TRIGGER_TT: "#default_text [GetPlayer.GetName] a au moins #G 50 ! [concept_douglas_alpine_heritage].#!"
 MR_MOUNTAINEERING_EQUIPMENT_BUTTON: "Équipement d'alpinisme"
 MR_MOUNTAINEERING_EQUIPMENT_BUTTON_TT: "#T Équipement d'alpinisme#!\nBetter #V Équipement d'alpinisme#! offre de meilleures chances de réussite. Cela nécessite de nouvelles technologies pour chaque étape.[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAIN_EQUIPMENT_1_TRIGGER_TT: "#default_text [GetPlayer.GetName] a le modificateur #V $douglas_mountaineering_equipment_level_1_modifier$ #! .#!"
