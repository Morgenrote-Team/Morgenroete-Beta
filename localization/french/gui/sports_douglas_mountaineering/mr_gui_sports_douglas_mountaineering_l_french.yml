 MR_RECRUIT_MOUNTAINEER_BUTTON: "Recruter Mountaineer" #deepl:2763543937
 MR_RECRUIT_MOUNTAINEER_BUTTON_TT: "#T Recruter des alpinistes#!\nAvec un club d'alpinisme, il est possible de recruter de nouveaux alpinistes. Pour ce faire, il faut bien sûr disposer d'un nombre suffisant de [concept_douglas_alpine_heritage].[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:2919268126
