 MR_MOUNTAIN_EXPEDITION_LEVEL_1_BUTTON: "Expédition d'alpinisme : Sommets de niveau 1" #deepl:250211038
 MR_MOUNTAIN_EXPEDITION_LEVEL_1_BUTTON_TT: "#T Expédition d'alpinisme : Sommets de niveau 1#!\nCette catégorie de montagnes peut être escaladée avec un équipement d'alpinisme de niveau 1. Le niveau n'indique pas l'altitude ou le risque. Ces sommets comprennent : Mont Whitney, Citlaltépetl, Popocatépetl, Chimborazo, Pico Aneto, Mont Blanc, Großvenediger, Mont Cameroun, Ras Dashen et Mont Giluwe. Pour plus d'informations, consultez le site [concept_douglas_mountain_summit_list].[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:1466134091
 MR_MOUNTAIN_EXPEDITION_LEVEL_2_BUTTON: "Expédition d'alpinisme : Sommets de niveau 2" #deepl:4123645909
 MR_MOUNTAIN_EXPEDITION_LEVEL_2_BUTTON_TT: "#T Expédition d'alpinisme : Sommets de niveau 2#!\nCette catégorie de montagnes peut être escaladée avec un équipement d'alpinisme de niveau 2. Le niveau n'indique pas l'altitude ni le risque. Ces sommets sont les suivants Kibo (Kilimandjaro), Dufourspitze, Mount Cook et Mount Wilhelm. Pour plus d'informations, consultez le site [concept_douglas_mountain_summit_list].[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:3695051657
 MR_MOUNTAIN_EXPEDITION_LEVEL_3_BUTTON: "Expédition d'alpinisme : Sommets de niveau 3" #deepl:2737423148
 MR_MOUNTAIN_EXPEDITION_LEVEL_3_BUTTON_TT: "#T Expédition d'alpinisme : Sommets de niveau 3#!\nCette catégorie de montagnes peut être escaladée avec un équipement d'alpinisme de niveau 3. Le niveau n'indique pas l'altitude ou le risque. Ces sommets comprennent : Le Mont Elias, l'Aconcagua, l'Aiguille Verte, le Cervin, le Batian (Mont Kenya) et le Mont Stanley. Pour plus d'informations, consultez le site [concept_douglas_mountain_summit_list].[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:2490101940
 MR_MOUNTAIN_EXPEDITION_LEVEL_4_BUTTON: "Expédition d'alpinisme : Sommets de niveau 4" #deepl:2827790528
 MR_MOUNTAIN_EXPEDITION_LEVEL_4_BUTTON_TT: "#T Expédition d'alpinisme : Sommets de niveau 4#!\nCette catégorie de montagnes peut être escaladée avec un équipement d'alpinisme de niveau 4. Le niveau n'indique pas l'altitude ou le risque. Ces sommets comprennent : Le Mont Logan, le Mont McKinley, l'Illimani, le Monte Pissis, le Shkara, le Kamet, le Kaufmann Peak et le Mont Gongga. Pour plus d'informations, consultez le site [concept_douglas_mountain_summit_list].[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:1095839829
