 MR_MOUNTAINEERING_EQUIPMENT_BUTTON_TT: "#T Équipement d'alpinisme#!\nBetter #V Équipement d'alpinisme#! offre de meilleures chances de réussite. Cela nécessite de nouvelles technologies pour chaque étape.[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:439750922

