l_french:
 MR_MOUNTAIN_GENERAL_TRIGGER_TT: "#default_text [GetPlayer.GetName] has a #V General#! with the #V $douglas_mountaineer$#!, #V $douglas_mountaineer_veteran$#!, #V $mountain_commander$#!, #V $surveyor$#! or #V $explorer$#! [concept_character_trait].#!"
 MR_MOUNTAINEERING_CLUB_BUTTON: "Club d'alpinisme"
 MR_MOUNTAINEERING_CLUB_BUTTON_TT: "#T Fonder un club d'alpinisme#!\nUn club d'alpinisme est le premier pas d'une nation vers l'alpinisme organisé. Il doit être fondé par un homme (ou une femme) expérimenté(e) en matière d'alpinisme. C'est de ce club que naîtront les nouveaux alpinistes qui partiront à la conquête des sommets du monde!\N- La création d'un club d'alpinisme est une étape importante dans l'évolution de l'alpinisme.[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ALPINE_CLUB_BUTTON: "Club alpin"
 MR_ALPINE_CLUB_BUTTON_TT: "#T Fonder le Club Alpin#!\nFondé à Londres en 1857, le Club Alpin est la plus ancienne organisation d'alpinisme au monde. Sa création a marqué le début de l'alpinisme organisé dans l'Angleterre victorienne. Le club visait à promouvoir l'exploration scientifique, géographique et sportive des Alpes. Parmi ses membres fondateurs figure Edward Whymper, qui a réalisé la première ascension du Cervin en 1865. Le Club alpin a joué un rôle clé pendant l'\"âge d'or de l'alpinisme\" et a publié des ouvrages influents, notamment l'Alpine Journal. Il a établi des normes pour les futurs clubs d'alpinisme du monde entier.[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ALPINE_CLUB_TRIGGER_TT: "#default_text Il y a au moins #G 6#! Pays avec un club d'alpinisme.#!"
 MR_ALPINE_CLUB_PRESIDENT_BUTTON: "Devenir président du club alpin"
 MR_ALPINE_CLUB_PRESIDENT_BUTTON_TT: "#T Devenez président du Club Alpin#!\nSans président actif du Club Alpin, nous pouvons prendre cette position. Cela suppose que nous contrôlions le siège du Club Alpin.[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ALPINE_CLUB_CONTROLS_HQ_TRIGGER_TT: "#default_text [GetPlayer.GetName] contrôle le [GetBuildingType('building_douglas_alpine_club').GetName]#! ."
 douglas_alpine_club_board_member_tt: "[GetPlayer.GetName] devient membre du conseil d'administration du Club Alpin."
 douglas_become_alpine_club_president_tt: "[GetPlayer.GetName] devient président du Club Alpin."
 MR_ALPINE_CLUB_EXPERIENCE_TRIGGER_TT: "#default_text The mountaineer has at least #p 50#! #V Experience#!.#!"
 MR_RECRUIT_MOUNTAINEER_BUTTON: "Recruter Mountaineer"
 MR_RECRUIT_MOUNTAINEER_BUTTON_TT: "#T Recruter des alpinistes#!\nAvec un club d'alpinisme, il est possible de recruter de nouveaux alpinistes. Pour ce faire, il faut bien sûr disposer d'un nombre suffisant de [concept_douglas_alpine_heritage].[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAINEERING_CLUB_TRIGGER_TT: "#default_text [GetPlayer.GetName] a un #V Mountaineering Club#!.#!"
 MR_ALPINE_HERITAGE_50_TRIGGER_TT: "#default_text [GetPlayer.GetName] has at least #G 50#! [concept_douglas_alpine_heritage].#!"
 MR_MOUNTAIN_TROOPS_REGIMENT_BUTTON: "Régiment de troupes de montagne"
 MR_MOUNTAIN_TROOPS_REGIMENT_BUTTON_TT: "#T Régiment de troupes de montagne#!\NUn général approprié peut, compte tenu de la présence d'une région montagneuse avec une population passionnément dévouée à sa patrie, établir un régiment formé à la tactique de l'infanterie de montagne.\NIl est possible de créer un régiment formé à la tactique de l'infanterie de montagne.[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ALPINE_HERITAGE_25_TRIGGER_TT: "#default_text [GetPlayer.GetName] has at least #G 50#! [concept_douglas_alpine_heritage].#!"
 MR_MOUNTAINEERING_EQUIPMENT_BUTTON: "Équipement d'alpinisme"
 MR_MOUNTAINEERING_EQUIPMENT_BUTTON_TT: "#T Mountaineering Equipment#!\nBetter #V Mountaineering Equipment#! provides better success chances. This requires new technologies for each step.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAIN_EQUIPMENT_1_TRIGGER_TT: "#default_text [GetPlayer.GetName] a le modificateur #V $douglas_mountaineering_equipment_level_1_modifier$ #! .#!"
 MR_MOUNTAIN_EQUIPMENT_2_TRIGGER_TT: "#default_text [GetPlayer.GetName] a le modificateur #V $douglas_mountaineering_equipment_level_2_modifier$ #! .#!"
 MR_MOUNTAIN_EQUIPMENT_3_TRIGGER_TT: "#default_text [GetPlayer.GetName] a le modificateur #V $douglas_mountaineering_equipment_level_3_modifier$ #! .#!"
 MR_MOUNTAIN_EQUIPMENT_4_TRIGGER_TT: "#default_text [GetPlayer.GetName] a le modificateur #V $douglas_mountaineering_equipment_level_4_modifier$ #! .#!"
 MR_MOUNTAIN_EQUIPMENT_5_TRIGGER_TT: "#default_text [GetPlayer.GetName] a le modificateur #V $douglas_mountaineering_equipment_level_5_modifier$ #! .#!"
 MR_MOUNTAIN_UNCONQUERED_LEVEL_1_SUMMIT_TRIGGER_TT: "#default_text [GetPlayer.GetName] possède au moins un sommet non conquis #V Niveau 1#! [concept_douglas_mountain_summit] ou possède une licence d'alpinisme #V #! avec une nation qui en possède une. Pour plus d'informations, consultez le site [concept_douglas_mountain_summit_list].#!"
 MR_MOUNTAIN_UNCONQUERED_LEVEL_2_SUMMIT_TRIGGER_TT: "#default_text [GetPlayer.GetName] possède au moins un sommet non conquis #V Niveau 2#! [concept_douglas_mountain_summit] ou possède une licence d'alpinisme #V #! avec une nation qui en possède une. Pour plus d'informations, consultez le site [concept_douglas_mountain_summit_list].#!"
 MR_MOUNTAIN_UNCONQUERED_LEVEL_3_SUMMIT_TRIGGER_TT: "#default_text [GetPlayer.GetName] possède au moins un sommet non conquis #V Niveau 3#! [concept_douglas_mountain_summit] ou possède une licence d'alpinisme #V #! avec une nation qui en possède une. Pour plus d'informations, consultez le site [concept_douglas_mountain_summit_list].#!"
 MR_MOUNTAIN_UNCONQUERED_LEVEL_4_SUMMIT_TRIGGER_TT: "#default_text [GetPlayer.GetName] possède au moins un sommet non conquis #V Niveau 4#! [concept_douglas_mountain_summit] ou possède une licence d'alpinisme #V #! avec une nation qui en possède une. Pour plus d'informations, consultez le site [concept_douglas_mountain_summit_list].#!"
 MR_MOUNTAIN_UNCONQUERED_LEVEL_5_SUMMIT_TRIGGER_TT: "#default_text [GetPlayer.GetName] possède au moins un sommet non conquis #V Niveau 5#! [concept_douglas_mountain_summit] ou possède une licence d'alpinisme #V #! avec une nation qui en possède une. Pour plus d'informations, consultez le site [concept_douglas_mountain_summit_list].#!"
 MR_MOUNTAIN_EXPEDITION_LEVEL_1_BUTTON: "Expedition: Level 1 Summits"
 MR_MOUNTAIN_EXPEDITION_LEVEL_1_BUTTON_TT: "#T Expédition d'alpinisme : Sommets de niveau 1#!\nCette catégorie de montagnes peut être escaladée avec un équipement d'alpinisme de niveau 1. Le niveau n'indique pas l'altitude ou le risque. Ces sommets comprennent : Mont Whitney, Citlaltépetl, Popocatépetl, Chimborazo, Pico Aneto, Mont Blanc, Großvenediger, Mont Cameroun, Ras Dashen et Mont Giluwe. Pour plus d'informations, consultez le site [concept_douglas_mountain_summit_list].[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAIN_EXPEDITION_LEVEL_2_BUTTON: "Expedition: Level 2 Summits"
 MR_MOUNTAIN_EXPEDITION_LEVEL_2_BUTTON_TT: "#T Expédition d'alpinisme : Sommets de niveau 2#!\nCette catégorie de montagnes peut être escaladée avec un équipement d'alpinisme de niveau 2. Le niveau n'indique pas l'altitude ni le risque. Ces sommets sont les suivants Kibo (Kilimandjaro), Dufourspitze, Mount Cook et Mount Wilhelm. Pour plus d'informations, consultez le site [concept_douglas_mountain_summit_list].[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAIN_EXPEDITION_LEVEL_3_BUTTON: "Expedition: Level 3 Summits"
 MR_MOUNTAIN_EXPEDITION_LEVEL_3_BUTTON_TT: "#T Mountaineering Expedition: Level 3 Summits#!\nThis category of mountains can be climbed with Level 3 mountaineering equipment. The level does not indicate the altitude or risk. These peaks include: Mount Elias, Aconcagua, Aiguille Verte, Matterhorn, Mount Kenya, and Mount Stanley. For more information, have a look at the [concept_douglas_mountain_summit_list].\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAIN_EXPEDITION_LEVEL_4_BUTTON: "Expedition: Level 4 Summits"
 MR_MOUNTAIN_EXPEDITION_LEVEL_4_BUTTON_TT: "#T Expédition d'alpinisme : Sommets de niveau 4#!\nCette catégorie de montagnes peut être escaladée avec un équipement d'alpinisme de niveau 4. Le niveau n'indique pas l'altitude ou le risque. Ces sommets comprennent : Le Mont Logan, le Mont McKinley, l'Illimani, le Monte Pissis, le Shkara, le Kamet, le Kaufmann Peak et le Mont Gongga. Pour plus d'informations, consultez le site [concept_douglas_mountain_summit_list].[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAIN_EXPEDITION_LEVEL_5_BUTTON: "Expedition: Level 5 Summits"
 MR_MOUNTAIN_EXPEDITION_LEVEL_5_BUTTON_TT: "#T Expédition d'alpinisme : Sommets de niveau 5#!\nCette catégorie de montagnes peut être escaladée avec un équipement d'alpinisme de niveau 5. Le niveau n'indique pas l'altitude ou le risque. Ces sommets sont les suivants : Huascarán, Chigolisa et Kabru. Pour plus d'informations, consultez le site [concept_douglas_mountain_summit_list].[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAINEER_TRAINING_BUTTON: "Mountaineering Training"
 MR_MOUNTAINEER_TRAINING_BUTTON_TT: "#T Mountaineering Training#!\nCountries can train their mountaineers if they have mountain ranges or conquered summits which are considered safe.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_SPORTS_MOUNTAINEER_EXPEDITIONS_TAB: "Expeditions"
 MR_SPORTS_MOUNTAINEER_ORGANISATION_TAB: "Organization"
 MR_SPORTS_MOUNTAINEER_CLUB_TAB: "Club"
 MR_ALPINE_CLUB_START_EXPEDITION_BUTTON: "Start International Expedition"
 MR_ALPINE_CLUB_START_EXPEDITION_BUTTON_TT: "#T Start International Expedition#!\nThe President of the Alpine Club has the right to initiate an international mountaineering expedition. This is only possible every ten years.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ALPINE_CLUB_PROPOSE_EXPEDITION_BUTTON: "Propose International Expedition"
 MR_ALPINE_CLUB_PROPOSE_EXPEDITION_BUTTON_TT: "#T Propose International Expedition#!\nAlpine Club board members have the right to propose an international mountaineering expedition. This must be approved by the president.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ALPINE_CLUB_JOIN_EXPEDITION_BUTTON: "Join International Expedition"
 MR_ALPINE_CLUB_JOIN_EXPEDITION_BUTTON_TT: "#T Join International Expedition#!\nAs a board member of the Alpine Club, we are called upon to participate in the International Mountaineering Expedition to ensure its success.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAIN_RECENT_INTERNATIONAL_EXPEDITION_TRIGGER_TT: "#default_text The last international expedition was at least 10 years ago.#!"
 MR_MOUNTAIN_RECENT_INTERNATIONAL_EXPEDITION_NO_SETBACK_TRIGGER_TT: "#default_text The President of the Alpine Club did not veto an international expedition.#!"
 MR_MOUNTAIN_EQUIPMENT_INTERNATIONAL_EXPEDITION_TRIGGER_TT: "#default_text The President has the necessary equipment (Level 3, Level 4, or Level 5) to host an International Expedition.#!"
 MR_MOUNTAIN_UNCONQUERED_SUMMIT_INTERNATIONAL_EXPEDITION_TRIGGER_TT: "#default_text There is at least one summit still to be conquered with level 2, level 3 or level 4.#!"
 MR_ALPINE_PRESIDENT_HAS_ACTIVE_MOUNTAINEER_TRIGGER_TT: "#default_text The President has a [concept_douglas_mountaineer] who is #V not busy#!.#!"
 MR_MOUNT_EVEREST_EXPEDITION_BUTTON: "Mount Everest Expedition"
 MR_MOUNT_EVEREST_EXPEDITION_BUTTON_TT: "#T Mount Everest Expedition#!\nAs the highest mountain in the world, Mount Everest is the dream destination of all mountaineers - but is an expedition there really the fulfillment of all mountaineering dreams, or rather delusions of grandeur?\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
