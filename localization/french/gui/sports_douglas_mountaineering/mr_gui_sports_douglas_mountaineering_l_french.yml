 MR_MOUNTAIN_TROOPS_REGIMENT_BUTTON: "Régiment de troupes de montagne" #deepl:459726214
 MR_MOUNTAIN_TROOPS_REGIMENT_BUTTON_TT: "#T Régiment de troupes de montagne#!\NUn général approprié peut, compte tenu de la présence d'une région montagneuse avec une population passionnément dévouée à sa patrie, établir un régiment formé à la tactique de l'infanterie de montagne.\NIl est possible de créer un régiment formé à la tactique de l'infanterie de montagne.[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:3951051985
