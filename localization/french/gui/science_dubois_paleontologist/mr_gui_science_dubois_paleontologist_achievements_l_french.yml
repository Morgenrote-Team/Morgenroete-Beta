me)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_plateosaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_plateosaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_giraffatitan_var').IsSet , Scope.Var('dubois_paleontologist_achievement_giraffatitan_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_spinosaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_spinosaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_psittacosaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_psittacosaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_velociraptor_var').IsSet , Scope.Var('dubois_paleontologist_achievement_velociraptor_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_muttaburrasaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_muttaburrasaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_rhoetosaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_rhoetosaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_mosasaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_mosasaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_plesiosaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_plesiosaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_basilosaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_basilosaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_megalodon_var').IsSet , Scope.Var('dubois_paleontologist_achievement_megalodon_var').GetFlagName)]" #deepl:3270133421

 dubois_paleontologist_no_paleontologist_loc: "Les réalisations #V de ce [concept_dubois_paleontologist]#! seront affichées ici, une fois que vous en aurez une." #deepl:2334446280
 dubois_paleontologist_achievements_intro_loc: "#V Les réalisations de ce paléontologue#!\n[Scope.GetCharacter.GetFullNameNoFormatting] est [Scope.GetCharacter.GetCustom('dubois_paleontologist_experience_level_type')] qui a recueilli un total de [Scope.Var('dubois_paleontologist_total_fossils_var').GetValue|0+] [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] et [Scope.Var('dubois_dinosaur_bone_total_paleontologist_var').GetValue|0+] [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] ." #deepl:39291484

 dubois_paleontologist_achievement_opened_first_paleontological_museum_loc: "\n[Scope.GetCharacter.GetSheHe|U] a fondé le #V premier musée paléontologique#! du monde, exposant divers fossiles." #deepl:2735413684
 dubois_paleontologist_achievement_attended_extinction_congress_loc: "Le Dr. [Scope.GetCharacter.GetLastNameNoFormatting] a participé à un congrès qui a tenté de déterminer comment les dinosaures se sont éteints." #deepl:3929204720
 dubois_paleontologist_achievement_fossil_amber_loc: "\n[Scope.GetCharacter.GetSheHe|U] a trouvé une pièce unique d'ambre #V #! dans laquelle un petit moustique était enfermé. Peut-être y a-t-il même du sang de dinosaure ?" #deepl:1354321492
 dubois_paleontologist_achievement_fossil_ammonite_loc: "\Le professeur [Scope.GetCharacter.GetLastNameNoFormatting] a trouvé une ammonite #V #! , qui aidera à la délimitation chronologique des sédiments marins." #deepl:2717312690
 dubois_paleontologist_achievement_fossil_archaeopteryx_loc: "\nBeaucoup considèrent la découverte du Dr [Scope.GetCharacter.GetLastNameNoFormatting] comme le premier oiseau. En effet, l'Archaeopteryx #V #! semble être le chaînon manquant entre les dinosaures et les oiseaux." #deepl:3644254959
 dubois_paleontologist_achievement_fossil_composita_loc: "\n#V Les Compositas#! sont des coquillages qui vivaient il y a des millions d'années sur presque tous les continents. Le professeur [Scope.GetCharacter.GetLastNameNoFormatting] en a trouvé un lors de l'une de ses fouilles [Scope.GetCharacter.GetHerHis]." #deepl:1938126946
 dubois_paleontologist_achievement_fossil_eusthenopteron_loc: "#! \Il est intéressant de noter que l'Eusthenopteron #V trouvé par [Scope.GetCharacter.GetSheHe] possède déjà un humérus, un cubitus et un radius distincts dans sa nageoire antérieure. Ces os sont présents chez tous les vertébrés terrestres." #deepl:1906215431
 dubois_paleontologist_achievement_fossil_ichthyosaurus_loc: "\n#V Ichthyosaura#!, dont le Dr. [Scope.GetCharacter.GetLastNameNoFormatting] a trouvé un exemplaire, est un reptile très unique. Il ressemble aux dauphins et ne pond pas d'œufs, mais donne naissance à ses petits vivants, ce qui est très rare chez les reptiles." #deepl:1058896905
 dubois_paleontologist_chievement_fossil_ichthyostega_loc: "\nEn découvrant #V Ichthyostega#!, le professeur [Scope.GetCharacter.GetLastNameNoFormatting] a découvert l'un des premiers animaux terrestres. Il s'agit du chaînon manquant entre les poissons et les tétrapodomorphes à membres." #deepl:178680301
 dubois_paleontologist_achievement_fossil_megatherium_loc: "\nLes paresseux sont petits aujourd'hui, mais il y en a eu d'énormes dans le passé, comme l'a montré l'une des découvertes du Dr. [Scope.GetCharacter.GetLastNameNoFormatting]. Le Megatherium #V #! mesurait jusqu'à 6 mètres de long." #deepl:2625011393
 dubois_paleontologist_achievement_fossil_pterodactylus_loc: "\n[Scope.GetCharacter.GetSheHe|U] a découvert un fossile de #V Pterodactylus#!, un dinosaure ailé qui vivait probablement près des lacs et des rivières." #deepl:1358755979
 dubois_paleontologist_achievement_fossil_smilodon_loc: "\nLe #V Smilodon#! est un prédateur effrayant qui vivait il y a encore quelques milliers d'années. Le professeur [Scope.GetCharacter.GetLastNameNoFormatting] en a trouvé un squelette très bien conservé." #deepl:209509221
 dubois_paleontologist_achievement_fossil_trilobite_loc: "\nLes Trilobites T#V #! constituent l'une des petites découvertes de [Scope.GetCharacter.GetHerHis]. Bien qu'ils ne soient pas spectaculaires, ce sont d'excellents fossiles d'index." #deepl:623281739
 dubois_paleontologist_achievement_fossil_haast_eagle_loc: "[Scope.GetCharacter.GetSheHe] \En Nouvelle-Zélande, le Dr [Scope.GetCharacter.GetLastNameNoFormatting] a fait une découverte fascinante en découvrant un aigle gigantesque, appelé aujourd'hui #V Haast Eagle#!." #deepl:758643186
 dubois_paleontologist_achievement_perfect_ankylosaurus_loc: "\Le professeur [Scope.GetCharacter.GetLastNameNoFormatting] a reconstitué un #V Ankylosaurus#! de manière parfaite. Les autres paléontologues sont émerveillés par cette reconstitution." #deepl:2799229951
 dubois_paleontologist_achievement_imperfect_ankylosaurus_loc: "\Le professeur [Scope.GetCharacter.GetLastNameNoFormatting] a reconstitué un #V Ankylosaurus#! mais de manière imparfaite." #deepl:3408874547
 dubois_paleontologist_achievement_poor_ankylosaurus_loc: "\Le professeur [Scope.GetCharacter.GetLastNameNoFormatting] a reconstitué un #V Ankylosaurus#!, mais c'était une tentative horrible et les autres paléontologues s'en sont moqués." #deepl:2085395454
 dubois_paleontologist_achievement_perfect_diplodocus_loc: "\n[Scope.GetCharacter.GetHerHis|U] reconstruction d'un #V Diplodocus#! est absolument parfaite et fait l'envie de tous les musées paléontologiques." #deepl:3626804845
 dubois_paleontologist_achievement_imperfect_diplodocus_loc: "\n[Scope.GetCharacter.GetHerHis|U] reconstruction d'un #V Diplodocus#! est suffisante." #deepl:412034719
 dubois_paleontologist_achievement_poor_diplodocus_loc: "[Scope.GetCharacter.GetHerHis|U] La reconstruction d'un Diplodocus #V #! est désastreuse et considérée comme une abomination." #deepl:3022704965
 dubois_paleontologist_achievement_perfect_triceratop_loc: "#V \nLa perfection de la reconstitution du Triceratops du Dr. [Scope.GetCharacter.GetLastNameNoFormatting]#! est largement connue et a rehaussé le prestige de notre collection paléontologique." #deepl:2010941711
 dubois_paleontologist_achievement_imperfect_triceratop_loc: "#V \La médiocrité de la reconstitution du Triceratops#! du Dr. [Scope.GetCharacter.GetLastNameNoFormatting] est suffisante pour notre musée, mais n'a rien d'exceptionnel." #deepl:996647347
 dubois_paleontologist_achievement_poor_triceratop_loc: "#V La terreur suscitée par la reconstitution du Triceratops#! du Dr. [Scope.GetCharacter.GetLastNameNoFormatting] est une honte pour notre collection." #deepl:1193371056
 dubois_paleontologist_achievement_perfect_tyrannosaurus_loc: "\nA #V Le Tyrannosaurus Rex#! est un spectacle merveilleux. Surtout celui que le professeur [Scope.GetCharacter.GetLastNameNoFormatting] a parfaitement assemblé." #deepl:2375174801
 dubois_paleontologist_achievement_imperfect_tyrannosaurus_loc: "\nA #V Le Tyrannosaurus Rex#! est une merveille. Même s'il n'est pas parfaitement assemblé comme celui que le professeur [Scope.GetCharacter.GetLastNameNoFormatting] a reconstitué." #deepl:2816655238
 dubois_paleontologist_achievement_poor_tyrannosaurus_loc: "\nUn #V Tyrannosaurus Rex#! est un spectacle merveilleux. Mais pas celui que le professeur [Scope.GetCharacter.GetLastNameNoFormatting] a assemblé. Celui-ci n'est qu'une absurde monstruosité." #deepl:2924846018
 dubois_paleontologist_achievement_perfect_stegosaurus_loc: "\nLe puissant #V Stegosaurus#! squelette que [Scope.GetCharacter.GetSheHe] a assemblé est une pièce parfaite pour notre exposition sur les dinosaures." #deepl:1011030116
 dubois_paleontologist_achievement_imperfect_stegosaurus_loc: "\nLe squelette de Stégosaure #V #! que [Scope.GetCharacter.GetSheHe] a assemblé est une bonne pièce pour notre exposition sur les dinosaures." #deepl:3364926958
 dubois_paleontologist_achievement_poor_stegosaurus_loc: "\L'horrible #V Stegosaurus#! squelette que [Scope.GetCharacter.GetSheHe] a assemblé est un gaspillage d'espace dans notre exposition sur les dinosaures." #deepl:1841850726
 dubois_paleontologist_achievement_perfect_antarctosaurus_loc: "\nTout le monde ne peut pas assembler un #V Antarctosaurus#! aussi parfaitement que le Dr. [Scope.GetCharacter.GetLastNameNoFormatting]. C'est l'une des pièces maîtresses de notre collection." #deepl:4276626573
 dubois_paleontologist_achievement_imperfect_antarctosaurus_loc: "\nAssembler un #V Antarctosaurus#! est une tâche difficile, mais le Dr. [Scope.GetCharacter.GetLastNameNoFormatting] l'a très bien réussie." #deepl:4006286419
 dubois_paleontologist_achievement_poor_antarctosaurus_loc: "\nTout le monde ne peut pas assembler un #V Antarctosaurus#!. Mais peu de gens l'assemblent aussi mal que le Dr. [Scope.GetCharacter.GetLastNameNoFormatting]. C'est la honte de notre collection." #deepl:3523325515
 dubois_paleontologist_achievement_perfect_argyrosaurus_loc: "\nLe merveilleux squelette d'Argyrosaurus #V #! de notre collection est l'œuvre du professeur [Scope.GetCharacter.GetLastNameNoFormatting]. Un squelette vraiment merveilleux." #deepl:2395444631
 dubois_paleontologist_achievement_imperfect_argyrosaurus_loc: "\nLe squelette d'Argyrosaurus #V #! de notre collection est l'œuvre du professeur [Scope.GetCharacter.GetLastNameNoFormatting]. Il s'agit d'un squelette très bien réalisé." #deepl:2170414433
 dubois_paleontologist_achievement_poor_argyrosaurus_loc: "\Le monstrueux #V Argyrosaurus#! squelette de notre collection est l'œuvre du professeur [Scope.GetCharacter.GetLastNameNoFormatting]. A manifestement le travail d'un paléontologue maladroit." #deepl:2917340443
 dubois_paleontologist_achievement_perfect_iguanodon_loc: "\n[Scope.GetCharacter.GetSheHe|U] a parfaitement assemblé un #V squelette d'Iguanodon#!." #deepl:3595520963
 dubois_paleontologist_achievement_imperfect_iguanodon_loc: "\n[Scope.GetCharacter.GetSheHe|U] a assemblé un #V squelette d'Iguanodon#!." #deepl:948446383
 dubois_paleontologist_achievement_poor_iguanodon_loc: "\n[Scope.GetCharacter.GetSheHe|U] a assemblé un #V squelette d'Iguanodon#! horriblement mal." #deepl:60351557
 dubois_paleontologist_achievement_perfect_plateosaurus_loc: "\nLe Dr. [Scope.GetCharacter.GetLastNameNoFormatting] a pu reconstituer parfaitement le squelette d'un #V Plateosaurus#!. Une belle exposition pour notre collection." #deepl:3288975063
 dubois_paleontologist_achievement_imperfect_plateosaurus_loc: "\nLe Dr. [Scope.GetCharacter.GetLastNameNoFormatting] a pu reconstituer le squelette d'un #V Plateosaurus#!." #deepl:3540574047
 dubois_paleontologist_achievement_poor_plateosaurus_loc: "\Le Dr [Scope.GetCharacter.GetLastNameNoFormatting] a réussi à reconstituer le squelette d'un #V Plateosaurus#!. Mais il a l'air très bizarre et déformé." #deepl:4210803243
 dubois_paleontologist_achievement_perfect_giraffatitan_loc: "\nLa reconstitution d'un #V Giraffatitan#! est un travail difficile qui nécessite beaucoup d'espace. Heureusement, le professeur [Scope.GetCharacter.GetLastNameNoFormatting] a pu utiliser la taille de notre musée pour préparer un magnifique squelette de dinosaure." #deepl:1815044749
 dubois_paleontologist_achievement_imperfect_giraffatitan_loc: "\nLa reconstitution d'un #V Giraffatitan#! est un travail difficile qui nécessite beaucoup d'espace. Heureusement, le professeur [Scope.GetCharacter.GetLastNameNoFormatting] a pu utiliser la taille de notre musée pour préparer le squelette du dinosaure." #deepl:3585680135
 dubois_paleontologist_achievement_poor_giraffatitan_loc: "\nReconstruire un #V Giraffatitan#! est un travail difficile qui nécessite beaucoup d'espace. Bien que [Scope.GetCharacter.GetSheHe] dispose de tout le musée pour travailler, le professeur [Scope.GetCharacter.GetLastNameNoFormatting] n'a pu créer qu'une version absurde du dinosaure." #deepl:2737374971
 dubois_paleontologist_achievement_perfect_spinosaurus_loc: "\nLe squelette effrayant de #V Spinosaurus#! de notre collection a été assemblé par le Dr. [Scope.GetCharacter.GetLastNameNoFormatting] et est une véritable œuvre d'art." #deepl:493475787
 dubois_paleontologist_achievement_imperfect_spinosaurus_loc: "\nLe squelette effrayant de #V Spinosaurus#! de notre collection a été assemblé par le Dr. [Scope.GetCharacter.GetLastNameNoFormatting]." #deepl:1960639131
 dubois_paleontologist_achievement_poor_spinosaurus_loc: "\nLe squelette amusant de #V Spinosaurus#! de notre collection a été assemblé par le Dr. [Scope.GetCharacter.GetLastNameNoFormatting]. Il est mal fait et ressemble plus à un poulet qu'à un dinosaure." #deepl:308117810
 dubois_paleontologist_achievement_perfect_psittacosaurus_loc: "\Avec sa bouche ressemblant à un bec, le Psittacosaurus #V #! que le professeur [Scope.GetCharacter.GetLastNameNoFormatting] a assemblé était un squelette extraordinaire." #deepl:3089964090
 dubois_paleontologist_achievement_imperfect_psittacosaurus_loc: "\Avec sa bouche ressemblant à un bec, le Psittacosaurus #V #! que le professeur [Scope.GetCharacter.GetLastNameNoFormatting] a assemblé était un beau squelette." #deepl:1049217798
 dubois_paleontologist_achievement_poor_psittacosaurus_loc: "\NLe Psittacosaurus #V #! avait-il vraiment un bec bizarre sur le dos et un tronc à la place de la bouche ? C'est en tout cas ce que pense le professeur [Scope.GetCharacter.GetLastNameNoFormatting], mais il est peut-être le seul." #deepl:4134331305
 dubois_paleontologist_achievement_perfect_velociraptor_loc: "\nL'effrayant #V Velociraptor#! est l'un des chefs-d'œuvre du Dr. [Scope.GetCharacter.GetLastNameNoFormatting]. Il est parfaitement assemblé." #deepl:2793253329
 dubois_paleontologist_achievement_imperfect_velociraptor_loc: "\nL'effrayant #V Velociraptor#! est un bon travail du Dr. [Scope.GetCharacter.GetLastNameNoFormatting]. [Scope.GetCharacter.GetSheHe] l'a très bien assemblé." #deepl:4153443130
 dubois_paleontologist_achievement_poor_velociraptor_loc: "\nL'effrayant #V Velociraptor#! est l'une des pires œuvres du Dr. [Scope.GetCharacter.GetLastNameNoFormatting]. Tout d'abord, il est beaucoup trop petit, ensuite, il n'avait sûrement pas 10 griffes en guise de couronne..." #deepl:3768344000
 dubois_paleontologist_achievement_perfect_muttaburrasaurus_loc: "#! \NLe Muttaburrasaurus #V que le professeur [Scope.GetCharacter.GetLastNameNoFormatting] a reconstitué était assez impressionnant, et pas seulement en raison de sa taille." #deepl:877060609
 dubois_paleontologist_achievement_imperfect_muttaburrasaurus_loc: "\nLe #V Muttaburrasaurus#! que le professeur [Scope.GetCharacter.GetLastNameNoFormatting] a reconstitué était assez impressionnant, principalement en raison de sa taille." #deepl:2230628960
 dubois_paleontologist_achievement_poor_muttaburrasaurus_loc: "\Le Muttaburrasaurus #V #! que le professeur [Scope.GetCharacter.GetLastNameNoFormatting] a reconstitué était horrible. Tous les paléontologues ont remarqué que la tête n'était pas attachée à la queue et que les genoux étaient pliés dans l'autre sens." #deepl:1428907282
 dubois_paleontologist_achievement_perfect_rhoetosaurus_loc: "\nLa taille du #V Rhoetosaurus#! est impressionnante. Mais sans les compétences du Dr [Scope.GetCharacter.GetLastNameNoFormatting], elle n'aurait certainement pas été aussi impressionnante." #deepl:2002445198
 dubois_paleontologist_achievement_imperfect_rhoetosaurus_loc: "\nLa taille du #V Rhoetosaurus#! est impressionnante. Mais sans l'habileté du Dr [Scope.GetCharacter.GetLastNameNoFormatting], elle aurait certainement été moins impressionnante"." #deepl:2197585922
 dubois_paleontologist_achievement_poor_rhoetosaurus_loc: "\nPenser que la queue appartient au dos du #V Rhoetosaurus#! a probablement été l'idée la plus stupide du Dr. [Scope.GetCharacter.GetLastNameNoFormatting]. Du moins jusqu'à présent..." #deepl:2580418601
 dubois_paleontologist_achievement_perfect_mosasaurus_loc: "\nLe Msasaurus #o #! que le professeur [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] a reconstitué est un gigantesque monstre marin." #deepl:4291663506
 dubois_paleontologist_achievement_imperfect_mosasaurus_loc: "\nLe #o Mosasaurus#! que le professeur [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] a reconstitué un grand monstre marin." #deepl:2251013384
 dubois_paleontologist_achievement_poor_mosasaurus_loc: "\nLe Mosasaurus #o #! que le professeur [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] a reconstitué était horrible. Il est certain que le Mosasaurus vivait dans l'océan, mais d'une manière ou d'une autre, le squelette s'est retrouvé avec des pattes." #deepl:2727769146
 dubois_paleontologist_achievement_perfect_plesiosaurus_loc: "\nLe #o Plesiosaurus#! reconstitué par le professeur [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] est un énorme reptile marin." #deepl:1469085529
 dubois_paleontologist_achievement_imperfect_plesiosaurus_loc: "\nLe #o Plesiosaurus#! reconstitué par le professeur [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] est un reptile marin qui vivait à l'époque des dinosaures." #deepl:1871243527
 dubois_paleontologist_achievement_poor_plesiosaurus_loc: "#! \nLe Plesiosaurus #o reconstruit par le professeur [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] est un peu bizarre. Il possède 4 extrémités semblables à celles d'un serpent, une tête très courte et pas de queue." #deepl:1919744229
 dubois_paleontologist_achievement_perfect_basilosaurus_loc: "\nLe #o Basilosaurus#! reconstitué par le professeur [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] est une baleine préhistorique qui vivait il y a des millénaires." #deepl:142765907
 dubois_paleontologist_achievement_imperfect_basilosaurus_loc: "\nLe #o Basilosaurus#! reconstitué par le professeur [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] est une baleine préhistorique." #deepl:1354996810
 dubois_paleontologist_achievement_poor_basilosaurus_loc: "#! \Le Basilosaurus #o reconstruit par le professeur [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] a une physiologie très étrange. Il ressemble plus à une boule qu'à autre chose, ce qui semble tout à fait anormal." #deepl:1206625829
 dubois_paleontologist_achievement_perfect_megalodon_loc: "\nLe #o Megalodon#! reconstitué par le Professeur [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] est un requin gigantesque. Un squelette vraiment impressionnant." #deepl:1878769616
 dubois_paleontologist_achievement_imperfect_megalodon_loc: "\nLe #o Megalodon#! reconstitué par le professeur [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] est un requin gigantesque." #deepl:117332675
 dubois_paleontologist_achievement_poor_megalodon_loc: "#! \Le Megalodon #o reconstitué par le professeur [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] semble un peu... décalé. L'énorme tête est montée sur un cou très fin et apparemment le requin avait des pointes bizarres qui couvraient tout son corps." #deepl:3797074524
