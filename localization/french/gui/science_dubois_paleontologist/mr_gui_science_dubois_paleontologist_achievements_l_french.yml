 MR_PALEONTOLOGIST_ACHIEVEMENTS_TT: "[AddLocalizationIf( Scope.IsSet , 'dubois_paleontologist_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'dubois_paleontologist_no_paleontologist_loc')]"
 dubois_paleontologist_achievements_loc: "$dubois_paleontologist_achievements_intro_loc$[AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_opened_first_paleontological_museum_var').IsSet , Scope.Var('dubois_paleontologist_achievement_opened_first_paleontological_museum_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_attended_extinction_congress_var').IsSet , Scope.Var('dubois_paleontologist_achievement_attended_extinction_congress_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_fossil_amber_var').IsSet , Scope.Var('dubois_paleontologist_achievement_fossil_amber_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_fossil_ammonite_var').IsSet , Scope.Var('dubois_paleontologist_achievement_fossil_ammonite_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_fossil_archaeopteryx_var').IsSet , Scope.Var('dubois_paleontologist_achievement_fossil_archaeopteryx_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_fossil_composita_var').IsSet , Scope.Var('dubois_paleontologist_achievement_fossil_composita_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_fossil_eusthenopteron_var').IsSet , Scope.Var('dubois_paleontologist_achievement_fossil_eusthenopteron_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_fossil_ichthyosaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_fossil_ichthyosaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_chievement_fossil_ichthyostega_var').IsSet , Scope.Var('dubois_paleontologist_chievement_fossil_ichthyostega_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_fossil_megatherium_var').IsSet , Scope.Var('dubois_paleontologist_achievement_fossil_megatherium_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_fossil_pterodactylus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_fossil_pterodactylus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_fossil_smilodon_var').IsSet , Scope.Var('dubois_paleontologist_achievement_fossil_smilodon_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_fossil_trilobite_var').IsSet , Scope.Var('dubois_paleontologist_achievement_fossil_trilobite_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_fossil_haast_eagle_var').IsSet , Scope.Var('dubois_paleontologist_achievement_fossil_haast_eagle_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_ankylosaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_ankylosaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_diplodocus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_diplodocus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_triceratop_var').IsSet , Scope.Var('dubois_paleontologist_achievement_triceratop_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_tyrannosaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_tyrannosaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_stegosaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_stegosaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_antarctosaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_antarctosaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_argyrosaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_argyrosaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_iguanodon_var').IsSet , Scope.Var('dubois_paleontologist_achievement_iguanodon_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_plateosaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_plateosaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_giraffatitan_var').IsSet , Scope.Var('dubois_paleontologist_achievement_giraffatitan_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_spinosaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_spinosaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_psittacosaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_psittacosaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_velociraptor_var').IsSet , Scope.Var('dubois_paleontologist_achievement_velociraptor_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_muttaburrasaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_muttaburrasaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_rhoetosaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_rhoetosaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_mosasaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_mosasaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_plesiosaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_plesiosaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_basilosaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_basilosaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_megalodon_var').IsSet , Scope.Var('dubois_paleontologist_achievement_megalodon_var').GetFlagName)]"
 dubois_paleontologist_no_paleontologist_loc: "Les réalisations #V de ce [concept_dubois_paleontologist]#! seront affichées ici, une fois que vous en aurez une."
 dubois_paleontologist_achievements_intro_loc: "#V Les réalisations de ce paléontologue#!\n[Scope.GetCharacter.GetFullNameNoFormatting] est [Scope.GetCharacter.GetCustom('dubois_paleontologist_experience_level_type')] qui a recueilli un total de [Scope.Var('dubois_paleontologist_total_fossils_var').GetValue|0+] [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] et [Scope.Var('dubois_dinosaur_bone_total_paleontologist_var').GetValue|0+] [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] ."
 dubois_paleontologist_achievement_opened_first_paleontological_museum_loc: "\n[Scope.GetCharacter.GetSheHe|U] a fondé le #V premier musée paléontologique#! du monde, exposant divers fossiles."
 dubois_paleontologist_achievement_attended_extinction_congress_loc: "Le Dr. [Scope.GetCharacter.GetLastNameNoFormatting] a participé à un congrès qui a tenté de déterminer comment les dinosaures se sont éteints."
 dubois_paleontologist_achievement_fossil_amber_loc: "\n[Scope.GetCharacter.GetSheHe|U] a trouvé une pièce unique d'ambre #V #! dans laquelle un petit moustique était enfermé. Peut-être y a-t-il même du sang de dinosaure ?"
 dubois_paleontologist_achievement_fossil_ammonite_loc: "\Le professeur [Scope.GetCharacter.GetLastNameNoFormatting] a trouvé une ammonite #V #! , qui aidera à la délimitation chronologique des sédiments marins."
 dubois_paleontologist_achievement_fossil_archaeopteryx_loc: "\nBeaucoup considèrent la découverte du Dr [Scope.GetCharacter.GetLastNameNoFormatting] comme le premier oiseau. En effet, l'Archaeopteryx #V #! semble être le chaînon manquant entre les dinosaures et les oiseaux."
 dubois_paleontologist_achievement_fossil_composita_loc: "\n#V Les Compositas#! sont des coquillages qui vivaient il y a des millions d'années sur presque tous les continents. Le professeur [Scope.GetCharacter.GetLastNameNoFormatting] en a trouvé un lors de l'une de ses fouilles [Scope.GetCharacter.GetHerHis]."
 dubois_paleontologist_achievement_fossil_eusthenopteron_loc: "#! \Il est intéressant de noter que l'Eusthenopteron #V trouvé par [Scope.GetCharacter.GetSheHe] possède déjà un humérus, un cubitus et un radius distincts dans sa nageoire antérieure. Ces os sont présents chez tous les vertébrés terrestres."
 dubois_paleontologist_achievement_fossil_ichthyosaurus_loc: "\n#V Ichthyosaura#!, dont le Dr. [Scope.GetCharacter.GetLastNameNoFormatting] a trouvé un exemplaire, est un reptile très unique. Il ressemble aux dauphins et ne pond pas d'œufs, mais donne naissance à ses petits vivants, ce qui est très rare chez les reptiles."
 dubois_paleontologist_chievement_fossil_ichthyostega_loc: "\nEn découvrant #V Ichthyostega#!, le professeur [Scope.GetCharacter.GetLastNameNoFormatting] a découvert l'un des premiers animaux terrestres. Il s'agit du chaînon manquant entre les poissons et les tétrapodomorphes à membres."
 dubois_paleontologist_achievement_fossil_megatherium_loc: "\nLes paresseux sont petits aujourd'hui, mais il y en a eu d'énormes dans le passé, comme l'a montré l'une des découvertes du Dr. [Scope.GetCharacter.GetLastNameNoFormatting]. Le Megatherium #V #! mesurait jusqu'à 6 mètres de long."
 dubois_paleontologist_achievement_fossil_pterodactylus_loc: "\n[Scope.GetCharacter.GetSheHe|U] a découvert un fossile de #V Pterodactylus#!, un dinosaure ailé qui vivait probablement près des lacs et des rivières."
 dubois_paleontologist_achievement_fossil_smilodon_loc: "\nLe #V Smilodon#! est un prédateur effrayant qui vivait il y a encore quelques milliers d'années. Le professeur [Scope.GetCharacter.GetLastNameNoFormatting] en a trouvé un squelette très bien conservé."
 dubois_paleontologist_achievement_fossil_trilobite_loc: "\nLes Trilobites T#V #! constituent l'une des petites découvertes de [Scope.GetCharacter.GetHerHis]. Bien qu'ils ne soient pas spectaculaires, ce sont d'excellents fossiles d'index."
 dubois_paleontologist_achievement_fossil_haast_eagle_loc: "[Scope.GetCharacter.GetSheHe] \En Nouvelle-Zélande, le Dr [Scope.GetCharacter.GetLastNameNoFormatting] a fait une découverte fascinante en découvrant un aigle gigantesque, appelé aujourd'hui #V Haast Eagle#!."
 dubois_paleontologist_achievement_perfect_ankylosaurus_loc: "\Le professeur [Scope.GetCharacter.GetLastNameNoFormatting] a reconstitué un #V Ankylosaurus#! de manière parfaite. Les autres paléontologues sont émerveillés par cette reconstitution."
 dubois_paleontologist_achievement_imperfect_ankylosaurus_loc: "\Le professeur [Scope.GetCharacter.GetLastNameNoFormatting] a reconstitué un #V Ankylosaurus#! mais de manière imparfaite."
 dubois_paleontologist_achievement_poor_ankylosaurus_loc: "\Le professeur [Scope.GetCharacter.GetLastNameNoFormatting] a reconstitué un #V Ankylosaurus#!, mais c'était une tentative horrible et les autres paléontologues s'en sont moqués."
 dubois_paleontologist_achievement_perfect_diplodocus_loc: "\n[Scope.GetCharacter.GetHerHis|U] reconstruction d'un #V Diplodocus#! est absolument parfaite et fait l'envie de tous les musées paléontologiques."
 dubois_paleontologist_achievement_imperfect_diplodocus_loc: "\n[Scope.GetCharacter.GetHerHis|U] reconstruction d'un #V Diplodocus#! est suffisante."
 dubois_paleontologist_achievement_poor_diplodocus_loc: "[Scope.GetCharacter.GetHerHis|U] La reconstruction d'un Diplodocus #V #! est désastreuse et considérée comme une abomination."
 dubois_paleontologist_achievement_perfect_triceratop_loc: "#V \nLa perfection de la reconstitution du Triceratops du Dr. [Scope.GetCharacter.GetLastNameNoFormatting]#! est largement connue et a rehaussé le prestige de notre collection paléontologique."
 dubois_paleontologist_achievement_imperfect_triceratop_loc: "#V \La médiocrité de la reconstitution du Triceratops#! du Dr. [Scope.GetCharacter.GetLastNameNoFormatting] est suffisante pour notre musée, mais n'a rien d'exceptionnel."
 dubois_paleontologist_achievement_poor_triceratop_loc: "#V La terreur suscitée par la reconstitution du Triceratops#! du Dr. [Scope.GetCharacter.GetLastNameNoFormatting] est une honte pour notre collection."
 dubois_paleontologist_achievement_perfect_tyrannosaurus_loc: "\nA #V Le Tyrannosaurus Rex#! est un spectacle merveilleux. Surtout celui que le professeur [Scope.GetCharacter.GetLastNameNoFormatting] a parfaitement assemblé."
 dubois_paleontologist_achievement_imperfect_tyrannosaurus_loc: "\nA #V Le Tyrannosaurus Rex#! est une merveille. Même s'il n'est pas parfaitement assemblé comme celui que le professeur [Scope.GetCharacter.GetLastNameNoFormatting] a reconstitué."
 dubois_paleontologist_achievement_poor_tyrannosaurus_loc: "\nUn #V Tyrannosaurus Rex#! est un spectacle merveilleux. Mais pas celui que le professeur [Scope.GetCharacter.GetLastNameNoFormatting] a assemblé. Celui-ci n'est qu'une absurde monstruosité."
 dubois_paleontologist_achievement_perfect_stegosaurus_loc: "\nLe puissant #V Stegosaurus#! squelette que [Scope.GetCharacter.GetSheHe] a assemblé est une pièce parfaite pour notre exposition sur les dinosaures."
 dubois_paleontologist_achievement_imperfect_stegosaurus_loc: "\nLe squelette de Stégosaure #V #! que [Scope.GetCharacter.GetSheHe] a assemblé est une bonne pièce pour notre exposition sur les dinosaures."
 dubois_paleontologist_achievement_poor_stegosaurus_loc: "\L'horrible #V Stegosaurus#! squelette que [Scope.GetCharacter.GetSheHe] a assemblé est un gaspillage d'espace dans notre exposition sur les dinosaures."
 dubois_paleontologist_achievement_perfect_antarctosaurus_loc: "\nTout le monde ne peut pas assembler un #V Antarctosaurus#! aussi parfaitement que le Dr. [Scope.GetCharacter.GetLastNameNoFormatting]. C'est l'une des pièces maîtresses de notre collection."
 dubois_paleontologist_achievement_imperfect_antarctosaurus_loc: "\nAssembler un #V Antarctosaurus#! est une tâche difficile, mais le Dr. [Scope.GetCharacter.GetLastNameNoFormatting] l'a très bien réussie."
 dubois_paleontologist_achievement_poor_antarctosaurus_loc: "\nTout le monde ne peut pas assembler un #V Antarctosaurus#!. Mais peu de gens l'assemblent aussi mal que le Dr. [Scope.GetCharacter.GetLastNameNoFormatting]. C'est la honte de notre collection."
 dubois_paleontologist_achievement_perfect_argyrosaurus_loc: "\nLe merveilleux squelette d'Argyrosaurus #V #! de notre collection est l'œuvre du professeur [Scope.GetCharacter.GetLastNameNoFormatting]. Un squelette vraiment merveilleux."
 dubois_paleontologist_achievement_imperfect_argyrosaurus_loc: "\nLe squelette d'Argyrosaurus #V #! de notre collection est l'œuvre du professeur [Scope.GetCharacter.GetLastNameNoFormatting]. Il s'agit d'un squelette très bien réalisé."
 dubois_paleontologist_achievement_poor_argyrosaurus_loc: "\Le monstrueux #V Argyrosaurus#! squelette de notre collection est l'œuvre du professeur [Scope.GetCharacter.GetLastNameNoFormatting]. A manifestement le travail d'un paléontologue maladroit."
 dubois_paleontologist_achievement_perfect_iguanodon_loc: "\n[Scope.GetCharacter.GetSheHe|U] a parfaitement assemblé un #V squelette d'Iguanodon#!."
 dubois_paleontologist_achievement_imperfect_iguanodon_loc: "\n[Scope.GetCharacter.GetSheHe|U] a assemblé un #V squelette d'Iguanodon#!."
 dubois_paleontologist_achievement_poor_iguanodon_loc: "\n[Scope.GetCharacter.GetSheHe|U] a assemblé un #V squelette d'Iguanodon#! horriblement mal."
 dubois_paleontologist_achievement_perfect_plateosaurus_loc: "\nLe Dr. [Scope.GetCharacter.GetLastNameNoFormatting] a pu reconstituer parfaitement le squelette d'un #V Plateosaurus#!. Une belle exposition pour notre collection."
 dubois_paleontologist_achievement_imperfect_plateosaurus_loc: "\nLe Dr. [Scope.GetCharacter.GetLastNameNoFormatting] a pu reconstituer le squelette d'un #V Plateosaurus#!."
 dubois_paleontologist_achievement_poor_plateosaurus_loc: "\Le Dr [Scope.GetCharacter.GetLastNameNoFormatting] a réussi à reconstituer le squelette d'un #V Plateosaurus#!. Mais il a l'air très bizarre et déformé."
 dubois_paleontologist_achievement_perfect_giraffatitan_loc: "\nLa reconstitution d'un #V Giraffatitan#! est un travail difficile qui nécessite beaucoup d'espace. Heureusement, le professeur [Scope.GetCharacter.GetLastNameNoFormatting] a pu utiliser la taille de notre musée pour préparer un magnifique squelette de dinosaure."
 dubois_paleontologist_achievement_imperfect_giraffatitan_loc: "\nLa reconstitution d'un #V Giraffatitan#! est un travail difficile qui nécessite beaucoup d'espace. Heureusement, le professeur [Scope.GetCharacter.GetLastNameNoFormatting] a pu utiliser la taille de notre musée pour préparer le squelette du dinosaure."
 dubois_paleontologist_achievement_poor_giraffatitan_loc: "\nReconstruire un #V Giraffatitan#! est un travail difficile qui nécessite beaucoup d'espace. Bien que [Scope.GetCharacter.GetSheHe] dispose de tout le musée pour travailler, le professeur [Scope.GetCharacter.GetLastNameNoFormatting] n'a pu créer qu'une version absurde du dinosaure."
 dubois_paleontologist_achievement_perfect_spinosaurus_loc: "\nLe squelette effrayant de #V Spinosaurus#! de notre collection a été assemblé par le Dr. [Scope.GetCharacter.GetLastNameNoFormatting] et est une véritable œuvre d'art."
 dubois_paleontologist_achievement_imperfect_spinosaurus_loc: "\nLe squelette effrayant de #V Spinosaurus#! de notre collection a été assemblé par le Dr. [Scope.GetCharacter.GetLastNameNoFormatting]."
 dubois_paleontologist_achievement_poor_spinosaurus_loc: "\nLe squelette amusant de #V Spinosaurus#! de notre collection a été assemblé par le Dr. [Scope.GetCharacter.GetLastNameNoFormatting]. Il est mal fait et ressemble plus à un poulet qu'à un dinosaure."
 dubois_paleontologist_achievement_perfect_psittacosaurus_loc: "\Avec sa bouche ressemblant à un bec, le Psittacosaurus #V #! que le professeur [Scope.GetCharacter.GetLastNameNoFormatting] a assemblé était un squelette extraordinaire."
 dubois_paleontologist_achievement_imperfect_psittacosaurus_loc: "\Avec sa bouche ressemblant à un bec, le Psittacosaurus #V #! que le professeur [Scope.GetCharacter.GetLastNameNoFormatting] a assemblé était un beau squelette."
 dubois_paleontologist_achievement_poor_psittacosaurus_loc: "\NLe Psittacosaurus #V #! avait-il vraiment un bec bizarre sur le dos et un tronc à la place de la bouche ? C'est en tout cas ce que pense le professeur [Scope.GetCharacter.GetLastNameNoFormatting], mais il est peut-être le seul."
 dubois_paleontologist_achievement_perfect_velociraptor_loc: "\nL'effrayant #V Velociraptor#! est l'un des chefs-d'œuvre du Dr. [Scope.GetCharacter.GetLastNameNoFormatting]. Il est parfaitement assemblé."
 dubois_paleontologist_achievement_imperfect_velociraptor_loc: "\nL'effrayant #V Velociraptor#! est un bon travail du Dr. [Scope.GetCharacter.GetLastNameNoFormatting]. [Scope.GetCharacter.GetSheHe] l'a très bien assemblé."
 dubois_paleontologist_achievement_poor_velociraptor_loc: "\nL'effrayant #V Velociraptor#! est l'une des pires œuvres du Dr. [Scope.GetCharacter.GetLastNameNoFormatting]. Tout d'abord, il est beaucoup trop petit, ensuite, il n'avait sûrement pas 10 griffes en guise de couronne..."
 dubois_paleontologist_achievement_perfect_muttaburrasaurus_loc: "#! \NLe Muttaburrasaurus #V que le professeur [Scope.GetCharacter.GetLastNameNoFormatting] a reconstitué était assez impressionnant, et pas seulement en raison de sa taille."
 dubois_paleontologist_achievement_imperfect_muttaburrasaurus_loc: "\nLe #V Muttaburrasaurus#! que le professeur [Scope.GetCharacter.GetLastNameNoFormatting] a reconstitué était assez impressionnant, principalement en raison de sa taille."
 dubois_paleontologist_achievement_poor_muttaburrasaurus_loc: "\Le Muttaburrasaurus #V #! que le professeur [Scope.GetCharacter.GetLastNameNoFormatting] a reconstitué était horrible. Tous les paléontologues ont remarqué que la tête n'était pas attachée à la queue et que les genoux étaient pliés dans l'autre sens."
 dubois_paleontologist_achievement_perfect_rhoetosaurus_loc: "\nLa taille du #V Rhoetosaurus#! est impressionnante. Mais sans les compétences du Dr [Scope.GetCharacter.GetLastNameNoFormatting], elle n'aurait certainement pas été aussi impressionnante."
 dubois_paleontologist_achievement_imperfect_rhoetosaurus_loc: "\nLa taille du #V Rhoetosaurus#! est impressionnante. Mais sans l'habileté du Dr [Scope.GetCharacter.GetLastNameNoFormatting], elle aurait certainement été moins impressionnante\"."
 dubois_paleontologist_achievement_poor_rhoetosaurus_loc: "\nPenser que la queue appartient au dos du #V Rhoetosaurus#! a probablement été l'idée la plus stupide du Dr. [Scope.GetCharacter.GetLastNameNoFormatting]. Du moins jusqu'à présent..."
 dubois_paleontologist_achievement_perfect_mosasaurus_loc: "\nLe Msasaurus #o #! que le professeur [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] a reconstitué est un gigantesque monstre marin."
 dubois_paleontologist_achievement_imperfect_mosasaurus_loc: "\nLe #o Mosasaurus#! que le professeur [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] a reconstitué un grand monstre marin."
 dubois_paleontologist_achievement_poor_mosasaurus_loc: "\nLe Mosasaurus #o #! que le professeur [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] a reconstitué était horrible. Il est certain que le Mosasaurus vivait dans l'océan, mais d'une manière ou d'une autre, le squelette s'est retrouvé avec des pattes."
 dubois_paleontologist_achievement_perfect_plesiosaurus_loc: "\nLe #o Plesiosaurus#! reconstitué par le professeur [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] est un énorme reptile marin."
 dubois_paleontologist_achievement_imperfect_plesiosaurus_loc: "\nLe #o Plesiosaurus#! reconstitué par le professeur [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] est un reptile marin qui vivait à l'époque des dinosaures."
 dubois_paleontologist_achievement_poor_plesiosaurus_loc: "#! \nLe Plesiosaurus #o reconstruit par le professeur [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] est un peu bizarre. Il possède 4 extrémités semblables à celles d'un serpent, une tête très courte et pas de queue."
 dubois_paleontologist_achievement_perfect_basilosaurus_loc: "\nLe #o Basilosaurus#! reconstitué par le professeur [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] est une baleine préhistorique qui vivait il y a des millénaires."
 dubois_paleontologist_achievement_imperfect_basilosaurus_loc: "\nLe #o Basilosaurus#! reconstitué par le professeur [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] est une baleine préhistorique."
 dubois_paleontologist_achievement_poor_basilosaurus_loc: "#! \Le Basilosaurus #o reconstruit par le professeur [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] a une physiologie très étrange. Il ressemble plus à une boule qu'à autre chose, ce qui semble tout à fait anormal."
 dubois_paleontologist_achievement_perfect_megalodon_loc: "\nLe #o Megalodon#! reconstitué par le Professeur [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] est un requin gigantesque. Un squelette vraiment impressionnant."
 dubois_paleontologist_achievement_imperfect_megalodon_loc: "\nLe #o Megalodon#! reconstitué par le professeur [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] est un requin gigantesque."
 dubois_paleontologist_achievement_poor_megalodon_loc: "#! \Le Megalodon #o reconstitué par le professeur [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] semble un peu... décalé. L'énorme tête est montée sur un cou très fin et apparemment le requin avait des pointes bizarres qui couvraient tout son corps."