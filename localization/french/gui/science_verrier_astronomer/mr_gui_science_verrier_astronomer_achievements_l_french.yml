 verrier_astronomer_achievements_no_astronomer_loc: "Les réalisations #V de ce [concept_verrier_astronomer]#! seront affichées ici, une fois que vous en aurez une."
 verrier_astronomer_achievements_intro_loc: "#V Réalisations de cet astronome#![Scope.GetCharacter.GetFullName] est un astronome accompli qui a découvert [Scope.Var('verrier_astronomer_total_objects_var').GetValue|0V] [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] ."
 verrier_astronomer_achievement_measured_distance_cygni_loc: "\En mesurant la distance #V de 61 Cygni à 11,4 années-lumière#!, [Scope.GetCharacter.GetLastNameNoFormatting] a réussi à démontrer d'un seul coup que l'univers était beaucoup plus grand qu'on ne le pensait auparavant."
 verrier_astronomer_achievement_helium_discovered_loc: "#V \nL'une des plus grandes réalisations de [Scope.GetCharacter.GetHerHis] est la découverte de l'élément hélium#! lors de l'étude du spectre électromagnétique du soleil."
 verrier_astronomer_achievement_uranus_discoverer_loc: "\Personne ne s'attendait à ce qu'une nouvelle planète soit découverte, mais le professeur [Scope.GetCharacter.GetLastNameNoFormatting] #V  a découvert la planète Uranus#!. Cette découverte a conduit à la recherche d'autres planètes dans notre système solaire."
 verrier_astronomer_achievement_ceres_discoverer_loc: "\nDe nombreux astronomes ont cherché la planète entre Mars et Jupiter. Mais c'est le Dr [Scope.GetCharacter.GetLastNameNoFormatting] qui #V a trouvé Cérès#!."
 verrier_astronomer_achievement_pallas_discoverer_loc: "\nLe Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  a trouvé la planète Pallas#! dans la région entre Mars et Jupiter."
 verrier_astronomer_achievement_vesta_discoverer_loc: "\nLe professeur [Scope.GetCharacter.GetLastNameNoFormatting] #V  a trouvé la planète Vesta#! dans la région située entre Mars et Jupiter."
 verrier_astronomer_achievement_juno_discoverer_loc: "\n[Scope.GetCharacter.GetSheHe|U] #V  a trouvé la planète Juno#! dans la région entre Mars et Jupiter."
 verrier_astronomer_neptune_discoverer_loc: "\nL'un des plus grands exploits de [Scope.GetCharacter.GetHerHis] a été la #V découverte de la planète Neptune#!. Cette découverte a assuré à [Scope.GetCharacter.GetHerHim] une place dans les livres d'histoire pour toujours."
 verrier_astronomer_achievement_pluto_discoverer_loc: "\nAlors que l'existence même de #V Pluton#! était contestée, le professeur [Scope.GetCharacter.GetLastNameNoFormatting] a en fait #V découvert#! la petite planète. Une grande réussite astronomique !"
 verrier_astronomer_achievement_discovered_1843_comet_loc: "\nEn #V 1843#! [Scope.GetCharacter.GetSheHe] a été le premier à #V trouver la Grande Comète#! qui a donc été nommée d'après [Scope.GetCharacter.GetLastNameNoFormatting]."
 verrier_astronomer_achievement_discovered_1858_comet_loc: "\nLorsque la #V Grande comète de 1858#! est passée près de la Terre, le Dr [Scope.GetCharacter.GetLastNameNoFormatting] a été le premier à voir la comète. C'est ainsi que la comète a été nommée en l'honneur de [Scope.GetCharacter.GetHerHim]."
 verrier_astronomer_achievement_discovered_1861_comet_loc: "\En tant que premier à découvrir la #V Grande comète de 1861#! dans l'obscurité du ciel nocturne, le professeur [Scope.GetCharacter.GetLastNameNoFormatting] est devenu l'homonyme de l'objet céleste."
 verrier_astronomer_achievement_discovered_1874_comet_loc: "\nLorsque la #V Grande comète de 1874#! est apparue pour la première fois, c'est le Dr. [Scope.GetCharacter.GetLastNameNoFormatting] qui l'a remarquée en premier. La comète portera désormais le nom de [Scope.GetCharacter.GetHerHis] pour toujours."
 verrier_astronomer_achievement_discovered_1882_comet_loc: "\nL'année #V 1882#! a été spectaculaire d'un point de vue astronomique. Le professeur [Scope.GetCharacter.GetLastNameNoFormatting] a découvert une #V Grande comète#! lors de son survol de la Terre. Un spectacle incroyable."
 verrier_astronomer_achievement_finished_pacific_expedition_loc: "\nLors d'une expédition dans le Pacifique #V #! , le Dr. [Scope.GetCharacter.GetLastNameNoFormatting] a découvert plusieurs nouveaux #V objets astronomiques#! dans l'hémisphère sud."
 verrier_astronomer_achievement_observed_venus_transit_loc: "\nEn l'an #V 1874#!, le professeur [Scope.GetCharacter.GetLastNameNoFormatting] a observé le #V transit de Vénus#! dans l'océan Pacifique. Un événement qui ne se produit généralement qu'une fois dans une vie."
 verrier_astronomer_achievement_observed_carrington_event_loc: "\nLe Dr. [Scope.GetCharacter.GetLastNameNoFormatting] a observé l'éruption solaire massive #V #! en [Scope.GetVariable('verrier_astronomer_achievement_observed_carrington_event_var').GetValue]."
 verrier_astronomer_achievement_observed_corona_loc: "\nDécouverte des #V [Scope.GetCharacter.GetLastNameNoFormatting] 's Beads#!, qui portent le nom de [Scope.GetCharacter.GetHerHim]."
 verrier_astronomer_achievement_sun_photo_loc: "\nLe Dr. [Scope.GetCharacter.GetLastNameNoFormatting] est l'auteur de la #V première photo d'une éclipse solaire.#!"
 verrier_astronomer_achievement_deimos_discoverer_loc: "\nLe Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  a découvert le satellite naturel de Mars, Deimos#!."
 verrier_astronomer_achievement_phobos_discoverer_loc: "\n[Scope.GetCharacter.GetSheHe|U] #V  a découvert le satellite naturel de Mars, Phobos#!."
 verrier_astronomer_achievement_amalthea_discoverer_loc: "\Le Dr [Scope.GetCharacter.GetLastNameNoFormatting] #V  a découvert le satellite naturel de Jupiter, Amalthea#!."
 verrier_astronomer_achievement_himalia_discoverer_loc: "\n[Scope.GetCharacter.GetSheHe|U] #V  a découvert le satellite naturel de Jupiter, Himalia#!."
 verrier_astronomer_achievement_elara_discoverer_loc: "\nLe Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  a découvert le satellite naturel de Jupiter, Elara#!."
 verrier_astronomer_achievement_pasiphae_discoverer_loc: "\n[Scope.GetCharacter.GetSheHe|U] #V  a découvert le satellite naturel de Jupiter, Pasiphae#!."
 verrier_astronomer_achievement_sinope_discoverer_loc: "\Le Dr [Scope.GetCharacter.GetLastNameNoFormatting] #V  a découvert le satellite naturel de Jupiter, Sinope#!."
 verrier_astronomer_achievement_lysithea_discoverer_loc: "\n[Scope.GetCharacter.GetSheHe|U] #V  a découvert le satellite naturel de Jupiter, Lysithea#!."
 verrier_astronomer_achievement_carme_discoverer_loc: "\nLe Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  a découvert le satellite naturel de Jupiter, Carme#!."
 verrier_astronomer_achievement_enceladus_discoverer_loc: "\n[Scope.GetCharacter.GetSheHe|U] #V  a découvert Encelade, le satellite naturel de Saturne#!."
 verrier_astronomer_achievement_mimas_discoverer_loc: "\Le Dr [Scope.GetCharacter.GetLastNameNoFormatting] #V  a découvert le satellite naturel de Saturne, Mimas#!."
 verrier_astronomer_achievement_hyperion_discoverer_loc: "\n[Scope.GetCharacter.GetSheHe|U] #V  a découvert le satellite naturel de Saturne, Hyperion#!."
 verrier_astronomer_achievement_phoebe_discoverer_loc: "\nLe Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  a découvert le satellite naturel de Saturne, Phoebe#!."
 verrier_astronomer_achievement_titania_discoverer_loc: "\n[Scope.GetCharacter.GetSheHe|U] #V  a découvert le satellite naturel d'Uranus, Titania#!."
 verrier_astronomer_achievement_oberon_discoverer_loc: "\Le Dr [Scope.GetCharacter.GetLastNameNoFormatting] #V  a découvert le satellite naturel d'Uranus, Oberon#!."
