 verrier_astronomer_achievement_triton_discoverer_loc: "\Le Dr [Scope.GetCharacter.GetLastNameNoFormatting] #V  a découvert le satellite naturel de Neptune, Triton,#!."
 verrier_astronomer_achievement_nereid_discoverer_loc: "\n[Scope.GetCharacter.GetSheHe|U] #V  a découvert le satellite naturel de Neptune, Nereid#!."
 verrier_astronomer_achievement_moon_fission_loc: "\n[Scope.GetCharacter.GetSheHe|U] is considered the founder of the theory that the #V Moon was a part of the Earth#! and split off."
 verrier_astronomer_achievement_moon_capture_loc: "\n[Scope.GetCharacter.GetSheHe|U] is considered the founder of the theory that the #VMoon is a foreign body that was captured by the Earth#!."