 verrier_astronomer_achievements_no_astronomer_loc: "Les réalisations #V de ce [concept_verrier_astronomer]#! seront affichées ici, une fois que vous en aurez une." #deepl:2150212353

 verrier_astronomer_achievements_intro_loc: "#V Réalisations de cet astronome#![Scope.GetCharacter.GetFullName] est un astronome accompli qui a découvert [Scope.Var('verrier_astronomer_total_objects_var').GetValue|0V] [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] ." #deepl:2330629282
 verrier_astronomer_achievement_measured_distance_cygni_loc: "\En mesurant la distance #V de 61 Cygni à 11,4 années-lumière#!, [Scope.GetCharacter.GetLastNameNoFormatting] a réussi à démontrer d'un seul coup que l'univers était beaucoup plus grand qu'on ne le pensait auparavant." #deepl:4180687375
 verrier_astronomer_achievement_helium_discovered_loc: "#V \nL'une des plus grandes réalisations de [Scope.GetCharacter.GetHerHis] est la découverte de l'élément hélium#! lors de l'étude du spectre électromagnétique du soleil." #deepl:1824398573
 verrier_astronomer_achievement_uranus_discoverer_loc: "\Personne ne s'attendait à ce qu'une nouvelle planète soit découverte, mais le professeur [Scope.GetCharacter.GetLastNameNoFormatting] #V  a découvert la planète Uranus#!. Cette découverte a conduit à la recherche d'autres planètes dans notre système solaire." #deepl:596907633
 verrier_astronomer_achievement_ceres_discoverer_loc: "\nDe nombreux astronomes ont cherché la planète entre Mars et Jupiter. Mais c'est le Dr [Scope.GetCharacter.GetLastNameNoFormatting] qui #V a trouvé Cérès#!." #deepl:134698821
 verrier_astronomer_achievement_pallas_discoverer_loc: "\nLe Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  a trouvé la planète Pallas#! dans la région entre Mars et Jupiter." #deepl:2895291218
 verrier_astronomer_achievement_vesta_discoverer_loc: "\nLe professeur [Scope.GetCharacter.GetLastNameNoFormatting] #V  a trouvé la planète Vesta#! dans la région située entre Mars et Jupiter." #deepl:3332363292
 verrier_astronomer_achievement_juno_discoverer_loc: "\n[Scope.GetCharacter.GetSheHe|U] #V  a trouvé la planète Juno#! dans la région entre Mars et Jupiter." #deepl:2722834301
 verrier_astronomer_neptune_discoverer_loc: "\nL'un des plus grands exploits de [Scope.GetCharacter.GetHerHis] a été la #V découverte de la planète Neptune#!. Cette découverte a assuré à [Scope.GetCharacter.GetHerHim] une place dans les livres d'histoire pour toujours." #deepl:740023144
 verrier_astronomer_achievement_pluto_discoverer_loc: "\nAlors que l'existence même de #V Pluton#! était contestée, le professeur [Scope.GetCharacter.GetLastNameNoFormatting] a en fait #V découvert#! la petite planète. Une grande réussite astronomique !" #deepl:2882859348
 verrier_astronomer_achievement_discovered_1843_comet_loc: "\nEn #V 1843#! [Scope.GetCharacter.GetSheHe] a été le premier à #V trouver la Grande Comète#! qui a donc été nommée d'après [Scope.GetCharacter.GetLastNameNoFormatting]." #deepl:493581168
 verrier_astronomer_achievement_discovered_1858_comet_loc: "\nLorsque la #V Grande comète de 1858#! est passée près de la Terre, le Dr [Scope.GetCharacter.GetLastNameNoFormatting] a été le premier à voir la comète. C'est ainsi que la comète a été nommée en l'honneur de [Scope.GetCharacter.GetHerHim]." #deepl:2184348218
 verrier_astronomer_achievement_discovered_1861_comet_loc: "\En tant que premier à découvrir la #V Grande comète de 1861#! dans l'obscurité du ciel nocturne, le professeur [Scope.GetCharacter.GetLastNameNoFormatting] est devenu l'homonyme de l'objet céleste." #deepl:2672737780
 verrier_astronomer_achievement_discovered_1874_comet_loc: "\nLorsque la #V Grande comète de 1874#! est apparue pour la première fois, c'est le Dr. [Scope.GetCharacter.GetLastNameNoFormatting] qui l'a remarquée en premier. La comète portera désormais le nom de [Scope.GetCharacter.GetHerHis] pour toujours." #deepl:333537749
 verrier_astronomer_achievement_discovered_1882_comet_loc: "\nL'année #V 1882#! a été spectaculaire d'un point de vue astronomique. Le professeur [Scope.GetCharacter.GetLastNameNoFormatting] a découvert une #V Grande comète#! lors de son survol de la Terre. Un spectacle incroyable." #deepl:3157970288
 verrier_astronomer_achievement_finished_pacific_expedition_loc: "\nLors d'une expédition dans le Pacifique #V #! , le Dr. [Scope.GetCharacter.GetLastNameNoFormatting] a découvert plusieurs nouveaux #V objets astronomiques#! dans l'hémisphère sud." #deepl:27168137
 verrier_astronomer_achievement_observed_venus_transit_loc: "\nEn l'an #V 1874#!, le professeur [Scope.GetCharacter.GetLastNameNoFormatting] a observé le #V transit de Vénus#! dans l'océan Pacifique. Un événement qui ne se produit généralement qu'une fois dans une vie." #deepl:885972622
 verrier_astronomer_achievement_observed_carrington_event_loc: "\nLe Dr. [Scope.GetCharacter.GetLastNameNoFormatting] a observé l'éruption solaire massive #V #! en [Scope.GetVariable('verrier_astronomer_achievement_observed_carrington_event_var').GetValue]." #deepl:2882246181
 verrier_astronomer_achievement_observed_corona_loc: "\nDécouverte des #V [Scope.GetCharacter.GetLastNameNoFormatting] 's Beads#!, qui portent le nom de [Scope.GetCharacter.GetHerHim]." #deepl:2736282257
 verrier_astronomer_achievement_sun_photo_loc: "\nLe Dr. [Scope.GetCharacter.GetLastNameNoFormatting] est l'auteur de la #V première photo d'une éclipse solaire.#!" #deepl:3755032771
 verrier_astronomer_achievement_deimos_discoverer_loc: "\nLe Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  a découvert le satellite naturel de Mars, Deimos#!." #deepl:69884165
 verrier_astronomer_achievement_phobos_discoverer_loc: "\n[Scope.GetCharacter.GetSheHe|U] #V  a découvert le satellite naturel de Mars, Phobos#!." #deepl:473150176
