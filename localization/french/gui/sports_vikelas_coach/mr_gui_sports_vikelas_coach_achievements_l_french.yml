l_french:
 MR_SPORTS_COACH_ACHIEVEMENTS_TT: "[AddLocalizationIf( Scope.IsSet , 'vikelas_coach_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'vikelas_coach_no_coach_achievements_loc')]"
 vikelas_coach_achievements_loc: "$vikelas_coach_achievements_intro_loc$[AddLocalizationIf( Scope.Var('vikelas_coach_world_championship_var').IsSet , Scope.Var('vikelas_coach_world_championship_var').GetFlagName)][AddLocalizationIf( Scope.Var('vikelas_coach_vice_world_championship_var').IsSet , Scope.Var('vikelas_coach_vice_world_championship_var').GetFlagName)]"
 vikelas_coach_no_coach_achievements_loc: "Les réalisations #V de ce [concept_vikelas_coach]#! seront affichées ici, une fois que vous en aurez une."
 vikelas_coach_achievements_intro_loc: "#V Réalisations de ce Coach#!\n[Scope.GetCharacter.GetFullName] est un Coach à succès."
 vikelas_coach_world_championship_loc: "\nEn [Scope.Var('vikelas_coach_world_championship_year_var').GetValue|0] [Scope.GetCharacter.GetLastNameNoFormatting] , l'équipe de [Scope.GetCharacter.GetHerHis] a remporté #V la Coupe du monde de football de la FIFA.#!"
 vikelas_coach_vice_world_championship_loc: "\nEn [Scope.Var('vikelas_coach_vice_world_championship_year_var').GetValue|0] [Scope.GetCharacter.GetLastNameNoFormatting] conduire l'équipe [Scope.GetCharacter.GetHerHis] à la #V deuxième place de la Coupe du monde de football de la FIFA#!"