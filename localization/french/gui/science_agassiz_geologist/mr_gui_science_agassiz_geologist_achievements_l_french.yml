l_french:
 MR_GEOLOGIST_ACHIEVEMENTS: "[AddLocalizationIf( Scope.IsSet , 'agassiz_geologist_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'agassiz_geologist_no_geologist_loc')]"
 agassiz_geologist_achievements_loc: "$agassiz_geologist_achievements_intro_loc$[AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_invented_seismology_var').IsSet , Scope.Var('agassiz_geologist_achievement_invented_seismology_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_invented_plate_tectonics_var').IsSet , Scope.Var('agassiz_geologist_achievement_invented_plate_tectonics_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_attended_geologist_congress_var').IsSet , Scope.Var('agassiz_geologist_achievement_attended_geologist_congress_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_explored_volcano_var').IsSet , Scope.Var('agassiz_geologist_achievement_explored_volcano_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_discovered_helium_on_earth_var').IsSet , Scope.Var('agassiz_geologist_achievement_discovered_helium_on_earth_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_finished_pacific_expedition_var').IsSet , Scope.Var('agassiz_geologist_achievement_finished_pacific_expedition_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_returned_from_center_of_earth_var').IsSet , Scope.Var('agassiz_geologist_achievement_returned_from_center_of_earth_var').GetFlagName)]"
 agassiz_geologist_no_geologist_loc: "Les réalisations #V de ce [concept_agassiz_geologist]#! seront affichées ici, une fois que vous en aurez une."
 agassiz_geologist_achievements_intro_loc: "#V Réalisations de ce géologue#!\nLe Dr. [Scope.GetCharacter.GetLastNameNoFormatting] est un géologue accompli qui a recueilli [Scope.GetVariable('agassiz_geologist_minerals_var').GetValue|0V] [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')] et [Scope.GetVariable('agassiz_geologist_rare_minerals_var').GetValue|0V] [Concept('concept_agassiz_rare_mineral','$concept_agassiz_rare_minerals$')] . [Scope.GetCharacter.GetHerHis|U] La recherche en géologie nous a fourni [Scope.GetVariable('agassiz_geologist_geological_knowledge_var').GetValue|0V] [concept_agassiz_geological_knowledge] ."
 agassiz_geologist_achievement_invented_seismology_loc: "\nL'invention de la sismologie #V #! est l'une des plus grandes réalisations du Dr. [Scope.GetCharacter.GetLastNameNoFormatting]. Elle permet de prévoir les tremblements de terre et les éruptions volcaniques."
 agassiz_geologist_achievement_invented_plate_tectonics_loc: "\L'invention de la théorie de la tectonique des plaques #V #! est-elle l'une des plus grandes réalisations du Dr. [Scope.GetCharacter.GetLastNameNoFormatting]? Comme tous les collègues de [Scope.GetCharacter.GetHerHis] n'acceptent pas la théorie, seul l'avenir nous dira si elle sera considérée comme [Scope.GetCharacter.GetHerHis] la plus importante découverte ou si elle tombera dans l'oubli."
 agassiz_geologist_achievement_attended_geologist_congress_loc: "\nLe Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  a participé au Congrès géologique sur la tectonique des plaques#!."
 agassiz_geologist_achievement_explored_volcano_loc: "\n#V L'exploration d'un volcan#! est une entreprise dangereuse, mais le Dr. [Scope.GetCharacter.GetLastNameNoFormatting] a beaucoup appris de l'expédition sur l'un d'entre eux."
 agassiz_geologist_achievement_discovered_helium_on_earth_loc: "\Le Dr [Scope.GetCharacter.GetLastNameNoFormatting] a été la première personne à #V découvrir l'hélium sur Terre#!, qui sera certainement une ressource très utile à l'avenir."
 agassiz_geologist_achievement_finished_pacific_expedition_loc: "\n[Scope.GetCharacter.GetFullNameNoFormatting] a participé à une expédition dans le Pacifique #V #! ."
 agassiz_geologist_achievement_returned_from_center_of_earth_loc: "#V \Le Dr [Scope.GetCharacter.GetLastNameNoFormatting] aurait apparemment atteint le centre de la Terre#! et en serait revenu. Mais cette histoire est-elle vraiment vraie ?"