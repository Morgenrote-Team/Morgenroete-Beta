 andersson_anthropologist_achievement_total_identified_human_fossils_anthropologist_loc: "\n[ROOT.Var('lepsius_anthropologist_var').GetCharacter.GetSheHe|U] a identifié un total de [Scope.Var('lepsius_total_identified_human_fossils_anthropologist_var').GetValue|V0] Fossiles humains" #deepl:3015431739
 andersson_anthropologist_achievement_attended_origin_congress_loc: "\nLe professeur [Scope.GetCharacter.GetLastNameNoFormatting] a participé au congrès sur #V l'origine de l'homme moderne#!." #deepl:2823441805
 andersson_anthropologist_achievement_exposed_piltdown_fraud_loc: "\NGrâce à [ROOT.Var('lepsius_anthropologist_var').GetCharacter.GetHerHim], l'homme de Piltdown #V a été révélé comme une fraude#!." #deepl:1017420061
 andersson_anthropologist_achievement_invented_anthropology_loc: "Le Dr. [Scope.GetCharacter.GetLastNameNoFormatting] est le premier scientifique à avoir enregistré des os et des squelettes humains de manière méticuleuse et très précise. [Scope.GetCharacter.GetSheHe] est considéré comme le #V pionnier de l'anthropologie#!." #deepl:3155653452
 andersson_anthropologist_achievement_completed_cromagnon_anthropologist_loc: "\n[ROOT.Var('lepsius_anthropologist_var').GetCharacter.GetSheHe|U] a classé scientifiquement #V le Cro-Magnon#! pour la première fois." #deepl:69566943
 andersson_anthropologist_achievement_completed_neanderthalensis_anthropologist_loc: "\nLe Dr. [Scope.GetCharacter.GetLastNameNoFormatting] a été le premier à #V positionner l'homme de Neandertal dans la systématique de l'homme préhistorique#!." #deepl:523665278
 andersson_anthropologist_achievement_completed_erectus_anthropologist_loc: "\nC'est grâce à [ROOT.Var('lepsius_anthropologist_var').GetCharacter.GetHerHis] que l'Homo Erectus, jusqu'alors inconnu #V , a pu être appréhendé en tant qu'espèce humaine#!." #deepl:991432050
 andersson_anthropologist_achievement_completed_australopithecus_anthropologist_loc: "\nLe professeur [Scope.GetCharacter.GetLastNameNoFormatting] a été le premier à réussir à déchiffrer les premiers #V secrets de l'Australopithèque#! et à tirer des conclusions sur son mode de vie et son apparence." #deepl:994811918
 andersson_anthropologist_achievement_completed_paranthropus_anthropologist_loc: "\Peu de gens ont réussi à #V essayer de reconstituer un homme préhistorique#! à partir de quelques ossements, ce qui permet de tirer des conclusions sur son environnement de vie. Le Dr [Scope.GetCharacter.GetLastNameNoFormatting] y est parvenu avec le #V Paranthropus#!." #deepl:2683346481
