l_french:
 theme_mr_paleontology: "Morgenröte: Paléontologie (Terreux)"
 theme_mr_paleontology_desc: "Une Interface Utilisateur inspirée par la Paléontologie, les Fossiles et les Os de Dinosaures."
 mr_papermap_coprolite: "Paléontologie: Coprolithe"
 mr_papermap_coprolite_desc: "Il semblerait qu'un Paléontologue soit en train de travailler sur un coprolithe. Vous vous demandez ce dont il s'agit ? C'est une crotte fossilisée. Dans le cas présent, probablement d'un dinosaure."
 mr_papermap_belemnite: "Paléontologie: Bélemnite"
 mr_papermap_belemnite_desc: "Un fossile de Bélemnite trouvé par un Paléontologue. Ces créatures écumaient les mers il y a de ça 358 à 66 millions d'années..."
 mr_papermap_ammonite: "Paléontologie: Ammonite"
 mr_papermap_ammonite_desc: "L'un des plus célèbres fossiles. Cette Ammonite parcourait jadis les mers, il y a des millions d'années de cela. Elle fait maintenant office de jolie déco pour votre table."
 mr_papermap_trilobite: "Paléontologie: Trilobite"
 mr_papermap_trilobite_desc: "Les Trilobites étaient parmi les premières arthropodes et ont eu beaucoup de succès. Hélas, ils se sont éteints pendant le Permien. Mais heureusement, certains furent fossilisés et vous pouvez toujours en avoir un sur votre table en souvenir."
 mr_papermap_battenberg_cake: "Culinaire: Gâteau de Battenberg"
 mr_papermap_battenberg_cake_desc: "Un petit creux ? Peut-être que vous devriez mettre ce délicieux gâteau sur votre table. C'est une pâtisserie à base de génoise couvert de pâte d'amandes et éponyme du prince Louis de Battenberg."
 mr_papermap_old_fashioned: "Culinaire: L'Old Fashioned"
 mr_papermap_old_fashioned_desc: "Quoi de mieux qu'un bon vieil Old Fashioned à la fin de la journée, hein ? Allez, le barman va vous redonner le sourire avec ce cocktail !"
 mr_papermap_cucumber_ice_cream: "Culinaire: Sorbet au Concombre"
 mr_papermap_cucumber_ice_cream_desc: "Le soleil est à son zénith. C'est un chaud jour d'été. Qu'est-ce qui vous irait mieux qu'un sorbet au concombre merveilleusement rafraîchissant ?"
 mr_papermap_croissant_hot_chocolate: "Culinaire: Croissant et Chocolat Chaud"
 mr_papermap_croissant_hot_chocolate_desc: "Un croissant et un chocolat chaud au petit matin, c'est la meilleure façon de démarrer la journée. Peu importe ce qui vous attend."