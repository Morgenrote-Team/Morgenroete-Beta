l_french:
 theme_mr_paleontology: "Morgenröte: Paléontologie (Terre)" #NT!
 theme_mr_paleontology_desc: "Une interface utilisateur inspirée de la paléontologie, des fossiles et des os de dinosaures." #NT!
  
 mr_papermap_coprolite: "Paleontologie: coprolite" #NT!
 mr_papermap_coprolite_desc: "Il semble qu'un paléontologue travaille actuellement à la préparation d'un coprolite. Vous vous demandez ce qu'est le coprolite? C'est du caca fossilisé. Dans ce cas, probablement à partir d'un dinosaure." #NT!
 mr_papermap_belemnite: "Paleontologie: Belemnite" #NT!
 mr_papermap_belemnite_desc: "Un fossile de belemnite trouvé par un paléontologue. Ces créatures ont parcouru les mers entre 358 et 66 millions d'années." #NT!
 mr_papermap_ammonite: "Paleontologie: ammonite" #NT!
 mr_papermap_ammonite_desc: "L'un des fossiles les plus célèbres. Cette ammonite parcourait autrefois la mer il y a des millions d'années. Maintenant, c'est une belle décoration pour votre table." #NT!
 mr_papermap_trilobite: "Paleontologie: trilobite" #NT!
 mr_papermap_trilobite_desc: "Les trilobites ont été parmi les premiers arthropodes et ont très réussi. Malheureusement, ils ont disparu dans le Permien. Heureusement, certains ont été fossilisés et vous pouvez les garder sur votre table en souvenir." #NT!
  
 mr_papermap_battenberg_cake: "Culinaire: gâteau de Battenberg" #NT!
 mr_papermap_battenberg_cake_desc: "Avez-vous faim? Vous devriez peut-être mettre ce délicieux gâteau sur votre table. C'est un gâteau éponge recouvert de massepain et nommé d'après le prince Louis de Battenberg." #NT!
 mr_papermap_old_fashioned: "Culinaire: à l'ancienne" #NT!
 mr_papermap_old_fashioned_desc: "Quoi de mieux qu'un bon vieux façonné à la fin d'une longue journée? Votre barreau vous amènera sûrement dans une humeur heureuse avec ce cocktail!" #NT!
 mr_papermap_cucumber_ice_cream: "Culinaire: crème glacée au concombre" #NT!
 mr_papermap_cucumber_ice_cream_desc: "Le soleil brille du ciel, c'est une chaude journée ensoleillée. Quoi de mieux qu'une glace au concombre merveilleusement rafraîchissante?" #NT!
 mr_papermap_croissant_hot_chocolate: "Culinaire: croissant et chocolat chaud" #NT!
 mr_papermap_croissant_hot_chocolate_desc: "Un croissant et un chocolat chaud le matin est la meilleure façon de commencer la journée. Peu importe ce qui vous attend." #NT!
