l_french:

 theme_mr_paleontology: "Morgenröte: Paléontologie (Terre)" #NT!
 theme_mr_paleontology_desc: "Une interface utilisateur inspirée de la paléontologie, des fossiles et des os de dinosaures." #NT!

 mr_papermap_coprolite: "Paléontologie : Coprolithe"
 mr_papermap_coprolite_desc: "Il semble qu'un paléontologue travaille actuellement à la préparation d'un coprolithe. Tu te demandes ce qu'est un coprolithe ? C'est du caca fossilisé. Dans ce cas, il s'agit probablement d'un dinosaure."
 mr_papermap_belemnite: "Paléontologie : Belemnite" #Please replace
 mr_papermap_belemnite_desc: "Fossile de bélemnite trouvé par un paléontologue. Ces créatures ont peuplé les mers il y a 358 à 66 millions d'années." #Please replace
 mr_papermap_ammonite: "Paléontologie : Ammonite" #Please replace
 mr_papermap_ammonite_desc: "L'un des fossiles les plus célèbres. Cette ammonite a parcouru la mer il y a des millions d'années. Aujourd'hui, elle constitue une belle décoration pour votre table." #Please replace
 mr_papermap_trilobite: "Paléontologie : Trilobite"
 mr_papermap_trilobite_desc: "Les trilobites ont été parmi les premiers arthropodes et ont connu un grand succès. Malheureusement, ils se sont éteints au Permien. Heureusement, certains ont été fossilisés et vous pouvez les conserver sur votre table en guise de souvenir."