 tesla_engineer_achievements_no_engineer_loc: "Les réalisations #V de ce [concept_gaudi_engineer]#! seront affichées ici, une fois que vous en aurez une." #deepl:2624550252
 tesla_engineer_achievements_intro_loc: "#V Réalisations de cet ingénieur#!\N" #deepl:3891137056

 tesla_engineer_achievements_invented_steel_frame_loc: "\n[Scope.GetCharacter.GetLastNameNoFormatting] a construit le premier #V Bâtiment à ossature métallique#!. Ce mode de construction s'est répandu dans le monde entier comme une traînée de poudre." #deepl:3716706247
 tesla_engineer_achievements_invented_electric_telegraph_loc: "\n[Scope.GetCharacter.GetSheHe] was the first person to #V Send a Telegram#! using an alphabet [Scope.GetCharacter.GetSheHe] invented." #pleace replace
 tesla_engineer_achievements_invented_automobile_loc: "\nEn [Scope.Var('tesla_engineer_achievements_invented_automobile_year_var').GetValue] [Scope.GetCharacter.GetLastNameNoFormatting] a inventé une #V voiture à moteur à combustion#! et l'a conduite sur une longue distance. C'est le début de la diffusion explosive de l'automobile." #deepl:88145422
 tesla_engineer_achievements_finished_road_project_loc: "\n[Scope.GetCharacter.GetFullName] amélioré #V Réseaux routiers#!. Grâce aux travaux de modernisation des routes effectués sur le site [Scope.GetCharacter.GetHerHis], les routes sont aujourd'hui considérées comme les plus modernes au monde." #deepl:2097415548
 tesla_engineer_achievements_finished_bridge_project_loc: "\n[Scope.GetCharacter.GetSheHe] a construit de nombreux #V Nouveaux ponts#! qui ont permis d'améliorer les infrastructures." #deepl:2671184667
 tesla_engineer_achievements_finished_tunnel_project_loc: "\Le Dr [Scope.GetCharacter.GetLastNameNoFormatting] travaillait à la construction de nombreux tunnels #V #! qui sont de petites merveilles de technologie." #deepl:922154902
 tesla_engineer_achievements_finished_railway_project_loc: "\n[Scope.GetCharacter.GetSheHe] a amélioré massivement #V les lignes ferroviaires#! en mettant en œuvre de nouvelles technologies et d'autres améliorations." #deepl:721890021
 tesla_engineer_achievements_finished_construction_project_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  a amélioré les secteurs de la construction#! en introduisant des équipements et des techniques de construction modernes." #deepl:987346687
 tesla_engineer_achievements_finished_topographic_map_project_loc: "\n[Scope.GetCharacter.GetSheHe] a créé une nouvelle carte topographique #V #! qui facilite les futurs projets de construction." #deepl:2317700588
 tesla_engineer_achievements_finished_locomotive_project_loc: "\n[Scope.GetCharacter.GetLastNameNoFormatting] #V  a développé de nouvelles locomotives#! qui donneront un coup de fouet aux chemins de fer." #deepl:2246312284
 tesla_engineer_achievements_finished_production_methods_project_loc: "\n[Scope.GetCharacter.GetSheHe|U] a aidé diverses entreprises à #V améliorer leur production#!." #deepl:3837789510
 tesla_engineer_achievements_finished_rifles_project_loc: "\Le Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  a conçu un nouveau fusil#! qui est l'un des plus modernes au monde." #deepl:373585695
 tesla_engineer_achievements_finished_tanks_project_loc: "\n[Scope.GetCharacter.GetSheHe] est un #V Pionnier de la conception et de la construction de réservoirs#! qui a modernisé nos réservoirs." #deepl:1266234006
 tesla_engineer_achievements_finished_fieldworks_project_loc: "\n[Scope.GetCharacter.GetLastNameNoFormatting] #V  a révolutionné les travaux sur le terrain et les défenses#!, ce qui a permis de sauver la vie de nombreux soldats." #deepl:3300715553
 tesla_engineer_achievements_finished_geomagnetic_observartory_project_loc: "\nLe Dr. [Scope.GetCharacter.GetLastNameNoFormatting] a contribué à la recherche géomagnétique en #V construisant un observatoire géomagnétique#!." #deepl:2611684424
 tesla_engineer_achievements_finished_telegraphy_network_project_loc: "\n[Scope.GetCharacter.GetSheHe] a construit un réseau de télégraphie #V #! ." #deepl:3900781177
 tesla_engineer_achievements_finished_radio_networ_project_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  a construit un réseau radio#!." #deepl:494089721
 tesla_engineer_achievements_finished_airport_project_loc: "\n[Scope.GetCharacter.GetLastNameNoFormatting] #V  a modernisé les aéroports#!." #deepl:4174187253
 tesla_engineer_achievements_finished_warplane_project_loc: "\n[Scope.GetCharacter.GetSheHe] développé #V Avions modernes pour les militaires#!." #deepl:3583316823
 tesla_engineer_achievements_bicycle_invented_loc: "En [Scope.Var('tesla_engineer_achievements_bicycle_invented_year_var').GetValue|0] [Scope.GetCharacter.GetLastNameNoFormatting] #V  a inventé le premier Bycycle#!. Une nouvelle façon de voyager en utilisant sa propre énergie." #deepl:1060401141
