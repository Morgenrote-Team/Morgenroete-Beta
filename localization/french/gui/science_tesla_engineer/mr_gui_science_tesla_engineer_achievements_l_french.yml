 tesla_engineer_achievements_loc: "$tesla_engineer_achievements_intro_loc$[AddLocalizationIf( Scope.Var('tesla_engineer_achievements_invented_steel_frame_var').IsSet , Scope.Var('tesla_engineer_achievements_invented_steel_frame_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_invented_electric_telegraph_var').IsSet , Scope.Var('tesla_engineer_achievements_invented_electric_telegraph_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_iron_lung_inventor_var').IsSet , Scope.Var('panum_physician_achievement_iron_lung_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_road_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_road_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_irrigation_project_finished_engineer_var').IsSet , Scope.Var('tesla_irrigation_project_finished_engineer_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_bridge_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_bridge_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_tunnel_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_tunnel_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_railway_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_railway_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_construction_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_construction_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_topographic_map_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_topographic_map_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_locomotive_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_locomotive_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_production_methods_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_production_methods_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_mechanical_computer_project_finished_engineer_var').IsSet , Scope.Var('tesla_mechanical_computer_project_finished_engineer_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_rifles_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_rifles_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_tanks_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_tanks_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_fieldworks_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_fieldworks_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_geomagnetic_observartory_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_geomagnetic_observartory_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_telegraphy_network_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_telegraphy_network_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_radio_networ_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_radio_networ_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_airport_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_airport_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_warplane_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_warplane_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_bicycle_invented_var').IsSet , Scope.Var('tesla_engineer_achievements_bicycle_invented_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievement_transatlantic_cable_var').IsSet , Scope.Var('tesla_engineer_achievement_transatlantic_cable_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievement_suez_india_cable_var').IsSet , Scope.Var('tesla_engineer_achievement_suez_india_cable_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievement_transpacific_cable_var').IsSet , Scope.Var('tesla_engineer_achievement_transpacific_cable_var').GetFlagName)]"
 tesla_engineer_achievements_no_engineer_loc: "The #V Achievements of this [concept_tesla_engineer]#! will be displayed here, once you have one."
 tesla_engineer_achievements_intro_loc: "#V Achievements of this Engineer#!\n"
 tesla_engineer_achievements_invented_steel_frame_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] built the first #V Building using Steel Frames#!. This way of construction spread around the world like a wildfire.#!"
 tesla_engineer_achievements_invented_electric_telegraph_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] was the first person to #V Send a Telegram#! using an alphabet [Scope.GetCharacter.GetSheHe] invented.#!"
 tesla_engineer_achievements_invented_automobile_loc: "\n #indent_newline:3 • In [Scope.Var('tesla_engineer_achievements_invented_automobile_year_var').GetValue] [Scope.GetCharacter.GetLastNameNoFormatting] invented a #V Car with a Combustion Engine#! and drove it a long distance. This marked the beginning of the explosive spread of the automobile.#!"
 tesla_engineer_achievements_finished_road_project_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetFullName] improved #V Road Networks#!. Thanks to [Scope.GetCharacter.GetHerHis] work to modernize the roads they are now considered to be the most modern in the world.#!"
 tesla_engineer_achievements_finished_bridge_project_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] built many #V New Bridges#! which resulted in a better infrastructure.#!"
 tesla_engineer_achievements_finished_tunnel_project_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] was working on the constructio of many #V Tunnels#! that are small marvels of technology.#!"
 tesla_engineer_achievements_finished_railway_project_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] massively #V improved Railway Lines#! by implementing new technology and other improvements.#!"
 tesla_engineer_achievements_finished_construction_project_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V improved Construction Sectors#!  by introducing modern equipment and construction techniques.#!"
 tesla_engineer_achievements_finished_topographic_map_project_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] created a new #V Topographic Map#! that eases future construction projects.#!"
 tesla_engineer_achievements_finished_locomotive_project_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] #V developed new Locomotives#! that will boost the Railroads.#!"
 tesla_engineer_achievements_finished_production_methods_project_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U|U] helped various companies to #V improve their Production#!.#!"
 tesla_engineer_achievements_finished_rifles_project_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V designed a new Rifle#! that is one of the most modern ones in the world.#!"
 tesla_engineer_achievements_finished_tanks_project_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] is a #V Pioneer of Tank Design and Construction#! who modernized our Tanks.#!"
 tesla_engineer_achievements_finished_fieldworks_project_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] #V revolutionized Fieldworks and Defenses#! which saved many soldier's lifes.#!"
 tesla_engineer_achievements_finished_geomagnetic_observartory_project_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] helped conducting geomagnetical research by #V building a Geomagnetic Observatory#!.#!"
 tesla_engineer_achievements_finished_telegraphy_network_project_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] built a #V Telegraphy Network#!.#!"
 tesla_engineer_achievements_finished_radio_networ_project_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V constructed a Radio Network#!.#!"
 tesla_engineer_achievements_finished_airport_project_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] #V modernized the Airports#!.#!"
 tesla_engineer_achievements_finished_warplane_project_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] developed #V Modern Airplanes for the Military#!.#!"
 tesla_engineer_achievements_bicycle_invented_loc: "\n #indent_newline:3 • In [Scope.Var('tesla_engineer_achievements_bicycle_invented_year_var').GetValue|0] [Scope.GetCharacter.GetLastNameNoFormatting] #V invented the first Bycycle#!. A great new way to travel using just your own energy.#!"
 tesla_engineer_achievement_transatlantic_cable_loc: "\n #indent_newline:3 • [GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetFullNameNoFormatting]  was chief engineer during the construction of the transatlantic cable in [GetGlobalVariable('tesla_transatlantic_cable_year_global_var').GetValue|V] and is thus the author of a technical masterpiece.#!"
 tesla_engineer_achievement_suez_india_cable_loc: "\n #indent_newline:3 • [GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetFullNameNoFormatting] oversaw the laying of the Suez-India cable in [GetGlobalVariable('tesla_suez_india_cable_year_global_var').GetValue|V], establishing a crucial link between continents through disciplined engineering.#!"
 tesla_engineer_achievement_transpacific_cable_loc: "\n #indent_newline:3 • [GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetFullNameNoFormatting] directed the transpacific cable expedition in [GetGlobalVariable('tesla_transpacific_cable_year_global_var').GetValue|V], achieving one of the most demanding feats in maritime telegraphy.#!"