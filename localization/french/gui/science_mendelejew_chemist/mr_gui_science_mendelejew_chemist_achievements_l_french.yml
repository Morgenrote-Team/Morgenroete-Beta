calizationIf( Scope.Var('mendelejew_chemist_achievement_explosives_improvement_finished_var').IsSet , Scope.Var('mendelejew_chemist_achievement_explosives_improvement_finished_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_synthetics_improvement_finished_var').IsSet , Scope.Var('mendelejew_chemist_achievement_synthetics_improvement_finished_var').GetFlagName)]" #deepl:3647271493
 mendelejew_chemist_no_chemist_loc: "Les réalisations #V de ce [concept_mendelejew_chemist]#! seront affichées ici, une fois que vous en aurez une." #deepl:991875360
 mendelejew_chemist_achievements_intro_loc: "#V Réalisations de ceChemist#!\n[Scope.GetCharacter.GetFullName] est un chimiste accompli." #deepl:4244956880

 mendelejew_chemist_theorized_elementes_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  a théorisé [Scope.Var('mendelejew_theorized_elements_character_number_var').GetValue|0] Éléments#!." #deepl:634278548
 mendelejew_chemist_discovered_elementes_loc: "\n[Scope.GetCharacter.GetSheHe|U] #V  découvert [Scope.Var('mendelejew_discovered_elements_character_number_var').GetValue|0] Éléments#!." #deepl:156380566
 mendelejew_chemist_isolated_elementes_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  isolé [Scope.Var('mendelejew_isolated_elements_character_number_var').GetValue|0] Éléments#!." #deepl:2897673687
 mendelejew_chemist_achievement_periodic_table_inventor_loc: "\nLe professeur [Scope.GetCharacter.GetLastNameNoFormatting] est célèbre pour l'invention #V du tableau périodique#!." #deepl:3277759785
 mendelejew_chemist_achievement_invented_dynamite_loc: "#!\nAvec l'invention de la dynamite #V , [Scope.GetCharacter.GetFullNameNoFormatting] le monde a changé, qu'il s'agisse de l'exploitation minière, de la construction ou de la guerre." #deepl:1710785871
 mendelejew_chemist_achievement_noble_gases_discoverer_loc: "\nLa découverte des gaz rares #V #! a fait du Dr. [Scope.GetCharacter.GetLastNameNoFormatting] l'un des chimistes les plus célèbres de tous les temps." #deepl:4129935898
 mendelejew_chemist_achievement_discovered_reason_fraunhofer_lines_loc: "\ [GetPlayer.MakeScope.Var('mendelejew_chemist_var').GetCharacter.GetLastNameNoFormatting] a découvert la raison des lignes de Fraunhofer et a ainsi jeté les bases de l'astrospectroscopie." #deepl:518694575
 mendelejew_chemist_achievement_synthetic_oil_inventor_loc: "\n[Scope.GetCharacter.GetSheHe] a permis de #V créer l'huile synthétiquement#!." #deepl:226827889
 mendelejew_chemist_achievement_synthetic_rubber_inventor_loc: "\nAvec l'invention du caoutchouc synthétique #V #! Le Dr. [Scope.GetCharacter.GetLastNameNoFormatting] a libéré le monde de la nécessité de récolter le caoutchouc des arbres." #deepl:179466189
 mendelejew_chemist_achievement_attended_chemist_congress_loc: "\nLe Dr. [Scope.GetCharacter.GetLastNameNoFormatting] a été l'un des participants au #V premier congrès international des chimistes#!." #deepl:2235467193
 mendelejew_chemist_achievement_fertilizer_improvement_finished_loc: "\nLe Dr. [Scope.GetCharacter.GetLastNameNoFormatting] a passé beaucoup de temps à chercher comment #V améliorer les engrais et leur production#!." #deepl:3581929820
 mendelejew_chemist_achievement_explosives_improvement_finished_loc: "\n[Scope.GetCharacter.GetSheHe] est un pionnier de la production d'explosifs améliorés #V et des réactions chimiques permettant de les créer#!." #deepl:3224674643
 mendelejew_chemist_achievement_synthetics_improvement_finished_loc: "\Connu pour [Scope.GetCharacter.GetHerHis] ses travaux sur #V l'amélioration des matières synthétiques et leur production#!, le Dr [Scope.GetCharacter.GetLastNameNoFormatting] jouit d'une bonne réputation auprès des autres chimistes et de l'industrie chimique." #deepl:2742424092
