l_french:
 MR_CHEMIST_ACHIEVEMENTS_TT: "[AddLocalizationIf( Scope.IsSet , 'mendelejew_chemist_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'mendelejew_chemist_achievements_no_chemist_loc')]"
 mendelejew_chemist_achievements_loc: "$mendelejew_chemist_achievements_intro_loc$[Scope.GetCharacter.GetCustom('mendelejew_chemist_theorized_elementes_type')][Scope.GetCharacter.GetCustom('mendelejew_chemist_discovered_elementes_type')][Scope.GetCharacter.GetCustom('mendelejew_chemist_isolated_elementes_type')][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_periodic_table_inventor_var').IsSet , Scope.Var('mendelejew_chemist_achievement_periodic_table_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_invented_dynamite_var').IsSet , Scope.Var('mendelejew_chemist_achievement_invented_dynamite_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_noble_gases_discoverer_var').IsSet , Scope.Var('mendelejew_chemist_achievement_noble_gases_discoverer_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_discovered_reason_fraunhofer_lines_var').IsSet , Scope.Var('mendelejew_chemist_achievement_discovered_reason_fraunhofer_lines_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_aspirin_inventor_var').IsSet , Scope.Var('mendelejew_chemist_achievement_aspirin_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_synthetic_oil_inventor_var').IsSet , Scope.Var('mendelejew_chemist_achievement_synthetic_oil_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_synthetic_rubber_inventor_var').IsSet , Scope.Var('mendelejew_chemist_achievement_synthetic_rubber_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_attended_chemist_congress_var').IsSet , Scope.Var('mendelejew_chemist_achievement_attended_chemist_congress_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_fertilizer_improvement_finished_var').IsSet , Scope.Var('mendelejew_chemist_achievement_fertilizer_improvement_finished_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_explosives_improvement_finished_var').IsSet , Scope.Var('mendelejew_chemist_achievement_explosives_improvement_finished_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_synthetics_improvement_finished_var').IsSet , Scope.Var('mendelejew_chemist_achievement_synthetics_improvement_finished_var').GetFlagName)]"
 mendelejew_chemist_no_chemist_loc: "Les réalisations #V de ce [concept_mendelejew_chemist]#! seront affichées ici, une fois que vous en aurez une."
 mendelejew_chemist_achievements_intro_loc: "#V Achievements of this Chemist#!\n[Scope.GetCharacter.GetFullName] is an accomplished chemist."
 mendelejew_chemist_theorized_elementes_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  a théorisé [Scope.Var('mendelejew_theorized_elements_character_number_var').GetValue|0] Éléments#!."
 mendelejew_chemist_discovered_elementes_loc: "\n[Scope.GetCharacter.GetSheHe|U] #V  découvert [Scope.Var('mendelejew_discovered_elements_character_number_var').GetValue|0] Éléments#!."
 mendelejew_chemist_isolated_elementes_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  isolé [Scope.Var('mendelejew_isolated_elements_character_number_var').GetValue|0] Éléments#!."
 mendelejew_chemist_achievement_periodic_table_inventor_loc: "\nLe professeur [Scope.GetCharacter.GetLastNameNoFormatting] est célèbre pour l'invention #V du tableau périodique#!."
 mendelejew_chemist_achievement_invented_dynamite_loc: "#!\nAvec l'invention de la dynamite #V , [Scope.GetCharacter.GetFullNameNoFormatting] le monde a changé, qu'il s'agisse de l'exploitation minière, de la construction ou de la guerre."
 mendelejew_chemist_achievement_noble_gases_discoverer_loc: "\nLa découverte des gaz rares #V #! a fait du Dr. [Scope.GetCharacter.GetLastNameNoFormatting] l'un des chimistes les plus célèbres de tous les temps."
 mendelejew_chemist_achievement_discovered_reason_fraunhofer_lines_loc: "\ [GetPlayer.MakeScope.Var('mendelejew_chemist_var').GetCharacter.GetLastNameNoFormatting] a découvert la raison des lignes de Fraunhofer et a ainsi jeté les bases de l'astrospectroscopie."
 mendelejew_chemist_achievement_synthetic_oil_inventor_loc: "\n[Scope.GetCharacter.GetSheHe|U] made it possible to #V create Oil synthetically#!."
 mendelejew_chemist_achievement_synthetic_rubber_inventor_loc: "\nAvec l'invention du caoutchouc synthétique #V #! Le Dr. [Scope.GetCharacter.GetLastNameNoFormatting] a libéré le monde de la nécessité de récolter le caoutchouc des arbres."
 mendelejew_chemist_achievement_attended_chemist_congress_loc: "\nLe Dr. [Scope.GetCharacter.GetLastNameNoFormatting] a été l'un des participants au #V premier congrès international des chimistes#!."
 mendelejew_chemist_achievement_fertilizer_improvement_finished_loc: "\nLe Dr. [Scope.GetCharacter.GetLastNameNoFormatting] a passé beaucoup de temps à chercher comment #V améliorer les engrais et leur production#!."
 mendelejew_chemist_achievement_explosives_improvement_finished_loc: "\n[Scope.GetCharacter.GetSheHe|U] is a pioneer of the production of #V improved Explosives and the chemical reactions to create them#!."
 mendelejew_chemist_achievement_synthetics_improvement_finished_loc: "\Connu pour [Scope.GetCharacter.GetHerHis] ses travaux sur #V l'amélioration des matières synthétiques et leur production#!, le Dr [Scope.GetCharacter.GetLastNameNoFormatting] jouit d'une bonne réputation auprès des autres chimistes et de l'industrie chimique."