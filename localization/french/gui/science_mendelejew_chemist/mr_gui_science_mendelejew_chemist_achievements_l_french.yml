l_french:
 MR_CHEMIST_ACHIEVEMENTS_TT: "[AddLocalizationIf( Scope.IsSet , 'mendelejew_chemist_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'mendelejew_chemist_achievements_no_chemist_loc')]"
 mendelejew_chemist_achievements_loc: "$mendelejew_chemist_achievements_intro_loc$[Scope.GetCharacter.GetCustom('mendelejew_chemist_theorized_elementes_type')][Scope.GetCharacter.GetCustom('mendelejew_chemist_discovered_elementes_type')][Scope.GetCharacter.GetCustom('mendelejew_chemist_isolated_elementes_type')][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_periodic_table_inventor_var').IsSet , Scope.Var('mendelejew_chemist_achievement_periodic_table_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_invented_dynamite_var').IsSet , Scope.Var('mendelejew_chemist_achievement_invented_dynamite_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_noble_gases_discoverer_var').IsSet , Scope.Var('mendelejew_chemist_achievement_noble_gases_discoverer_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_discovered_reason_fraunhofer_lines_var').IsSet , Scope.Var('mendelejew_chemist_achievement_discovered_reason_fraunhofer_lines_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_aspirin_inventor_var').IsSet , Scope.Var('mendelejew_chemist_achievement_aspirin_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_synthetic_oil_inventor_var').IsSet , Scope.Var('mendelejew_chemist_achievement_synthetic_oil_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_synthetic_rubber_inventor_var').IsSet , Scope.Var('mendelejew_chemist_achievement_synthetic_rubber_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_attended_chemist_congress_var').IsSet , Scope.Var('mendelejew_chemist_achievement_attended_chemist_congress_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_fertilizer_improvement_finished_var').IsSet , Scope.Var('mendelejew_chemist_achievement_fertilizer_improvement_finished_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_explosives_improvement_finished_var').IsSet , Scope.Var('mendelejew_chemist_achievement_explosives_improvement_finished_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_synthetics_improvement_finished_var').IsSet , Scope.Var('mendelejew_chemist_achievement_synthetics_improvement_finished_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_discovered_radioactivity_var').IsSet , Scope.Var('mendelejew_chemist_achievement_discovered_radioactivity_var').GetFlagName)]"
 mendelejew_chemist_achievements_intro_loc: "#V Réalisations de ce Chimiste #!\n#indent_newline:3 •  [Scope.GetCharacter.GetFullName] est un chimiste accompli.#!"
 mendelejew_chemist_theorized_elementes_loc: "\n#indent_newline:3 Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  a théorisé [Scope.Var('mendelejew_theorized_elements_character_number_var').GetValue|0] Éléments#!.#!"
 mendelejew_chemist_discovered_elementes_loc: "\n#indent_newline:3 [Scope.GetCharacter.GetSheHe|U] #V  découvert [Scope.Var('mendelejew_discovered_elements_character_number_var').GetValue|0] Éléments#!.#!"
 mendelejew_chemist_isolated_elementes_loc: "\n#indent_newline:3 Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  à isolé [Scope.Var('mendelejew_isolated_elements_character_number_var').GetValue|0] Éléments#!.#!"
 mendelejew_chemist_achievement_periodic_table_inventor_loc: "\n#indent_newline:3 Le professeur [Scope.GetCharacter.GetLastNameNoFormatting] est célèbre pour l'invention #V du tableau périodique#!.#!"
 mendelejew_chemist_achievement_invented_dynamite_loc: "#!\n#indent_newline:3 Avec l'invention de la dynamite #V , [Scope.GetCharacter.GetFullNameNoFormatting] le monde a changé, qu'il s'agisse de l'exploitation minière, de la construction ou de la guerre.#!"
 mendelejew_chemist_achievement_noble_gases_discoverer_loc: "\n#indent_newline:3 La #V découverte des gaz rares #! a fait du Dr. [Scope.GetCharacter.GetLastNameNoFormatting] l'un des chimistes les plus célèbres de tous les temps.#!"
 mendelejew_chemist_achievement_discovered_reason_fraunhofer_lines_loc: "\n#indent_newline:3 Le Dr. [GetPlayer.MakeScope.Var('mendelejew_chemist_var').GetCharacter.GetLastNameNoFormatting] a découvert la raison des lignes de Fraunhofer et a ainsi jeté les bases de l'astrospectroscopie.#!"
 mendelejew_chemist_achievement_synthetic_oil_inventor_loc: "\n#indent_newline:3 [Scope.GetCharacter.GetSheHe|U] a permis de #V créer l'huile synthétiquement#!.#!"
 mendelejew_chemist_achievement_synthetic_rubber_inventor_loc: "\n#indent_newline:3 Avec #V l'invention du caoutchouc synthétique  #! Le Dr. [Scope.GetCharacter.GetLastNameNoFormatting] a libéré le monde de la nécessité de récolter le caoutchouc des arbres.#!"
 mendelejew_chemist_achievement_attended_chemist_congress_loc: "\n#indent_newline:3 Le Dr. [Scope.GetCharacter.GetLastNameNoFormatting] a été l'un des participants au #V premier congrès international des chimistes#!.#!"
 mendelejew_chemist_achievement_fertilizer_improvement_finished_loc: "\n #indent_newline:3 • Le Dr. [Scope.GetCharacter.GetLastNameNoFormatting] a passé beaucoup de temps à chercher comment #V améliorer les engrais et leur production#!. #!"
 mendelejew_chemist_achievement_explosives_improvement_finished_loc: "\n#indent_newline:3 •  [Scope.GetCharacter.GetSheHe|U] est un pionnier de la production d'explosifs améliorés #V et des réactions chimiques permettant de les créer#!.#!"
 mendelejew_chemist_achievement_synthetics_improvement_finished_loc: "\n#indent_newline:3 Connu pour [Scope.GetCharacter.GetHerHis] ses travaux sur #V l'amélioration des matières synthétiques et leur production#!, le Dr [Scope.GetCharacter.GetLastNameNoFormatting] jouit d'une bonne réputation auprès des autres chimistes et de l'industrie chimique.#!"
 mendelejew_chemist_achievement_discovered_radioactivity_loc: "\n#indent_newline:3 Le Dr. [Scope.GetCharacter.GetLastNameNoFormatting] a franchi une étape scientifique majeure en étant le #V premier à découvrir la radioactivité#!.#!"
 mendelejew_chemist_achievements_no_chemist_loc: "The #V Achievements of this [concept_mendelejew_chemist]#! will be displayed here, once you have one."