 lepsius_archaeologist_no_archaeologist_loc: "Les réalisations #V de ce [concept_lepsius_archaeologist]#! seront affichées ici, une fois que vous en aurez une." #deepl:2404800686
 lepsius_archaeologist_achievements_intro_loc: "#V Réalisations de cet archéologue#!\n[Scope.GetCharacter.GetFullName] est [Scope.GetCharacter.GetCustom('lepsius_archaeologist_experience_level_type')] qui a recueilli un total de [Scope.Var('lepsius_total_artifact_minor_archaeologist_var').GetValue|0+] [Concept('concept_lepsius_artifact','$concept_lepsius_minor_artifacts$')] ." #deepl:2747108283

 lepsius_archaeologist_achievement_famous_level_archaeologist_overview_loc: "un célèbre [concept_lepsius_archaeologist]" #deepl:1164713858
 lepsius_archaeologist_achievement_experienced_level_archaeologist_overview_loc: "une personne expérimentée [concept_lepsius_archaeologist]" #deepl:370998510
 lepsius_archaeologist_achievement_normal_level_archaeologist_overview_loc: "une personne accomplie [concept_lepsius_archaeologist]" #deepl:139829371
 lepsius_archaeologist_achievement_expert_for_egyptian_archaeology_loc: "\n[Scope.GetCharacter.GetSheHe|U] est un expert en #V archéologie égyptienne#!, où [Scope.GetCharacter.GetSheHe] a collecté [Scope.Var('lepsius_egyptian_artifact_minor_archaeologist_var').GetValue|0V] des artefacts mineurs." #deepl:2806539652
 lepsius_archaeologist_achievement_expert_for_mesopotamian_archaeology_loc: "\n[Scope.GetCharacter.GetSheHe|U] est un expert en #V Archéologie mésopotamienne#!, où [Scope.GetCharacter.GetSheHe] a recueilli [Scope.Var('lepsius_mesopotamian_artifact_minor_archaeologist_var').GetValue|0V] Artéfacts mineurs." #deepl:4145665032
 lepsius_archaeologist_achievement_expert_for_aegean_archaeology_loc: "\n[Scope.GetCharacter.GetSheHe|U] est un expert pour #V Aegean Archaeology#!, où [Scope.GetCharacter.GetSheHe] a recueilli [Scope.Var('lepsius_aegean_artifact_minor_archaeologist_var').GetValue|0V] des artefacts mineurs." #deepl:3137059405
 lepsius_archaeologist_achievement_expert_for_precolumbian_archaeology_loc: "\n[Scope.GetCharacter.GetSheHe|U] est un expert pour #V Precolumbian Archaeology#!, où [Scope.GetCharacter.GetSheHe] a collecté [Scope.Var('lepsius_precolumbian_artifact_minor_archaeologist_var').GetValue|0V] Minor Artifacts." #deepl:1609585460
 lepsius_archaeologist_achievement_expert_for_fareastern_archaeology_loc: "\n[Scope.GetCharacter.GetSheHe|U] est un expert pour #V Fareastern Archaeology#!, où [Scope.GetCharacter.GetSheHe] a collecté [Scope.Var('lepsius_fareastern_artifact_minor_archaeologist_var').GetValue|0V] des artefacts mineurs." #deepl:3392738081
 lepsius_archaeologist_achievement_expert_for_oceanic_archaeology_loc: "\n[Scope.GetCharacter.GetSheHe|U] est un expert pour #V Oceanic Archaeology#!, où [Scope.GetCharacter.GetSheHe] a collecté [Scope.Var('lepsius_oceanic_artifact_minor_archaeologist_var').GetValue|0V] Minor Artifacts." #deepl:2787251010
 lepsius_archaeologist_achievement_not_expert_loc: ""
 lepsius_archaeologist_achievement_attended_exodus_congress_loc: "\n[Scope.GetCharacter.GetSheHe|U] a participé au #V Congrès archéologique sur l'historicité de l'Exode#!." #deepl:3946194799
 lepsius_archaeologist_achievement_attended_civilization_congress_loc: "\n[Scope.GetCharacter.GetSheHe|U] a participé au #V Congrès archéologique sur l'origine de la civilisation#!." #deepl:395174587
 lepsius_archaeologist_achievement_attended_troy_congress_loc: "\n[Scope.GetCharacter.GetSheHe|U] a participé au congrès archéologique #V sur l'historicité de Troie.#!" #deepl:3218356213
 lepsius_archaeologist_achievement_invented_three_age_system_loc: "#V \L'une des plus grandes réalisations de [Scope.GetCharacter.GetHerHis] est l'invention du système des trois âges#!, qui permet aux archéologues de classer les objets dans les périodes de l'âge de pierre, de l'âge de bronze et de l'âge de fer." #deepl:3435944138
 lepsius_archaeologist_achievement_invented_early_archaeology_loc: "\nEn utilisant des méthodes stratigraphiques et en documentant [Scope.GetCharacter.GetHerHis] ses découvertes de manière exhaustive, [Scope.GetCharacter.GetLastNameNoFormatting] #V  a révolutionné l'archéologie#! et l'a transformée en une véritable science." #deepl:1482092133
 lepsius_archaeologist_achievement_inaugurated_museum_loc: "#V \nLe Dr. [Scope.GetCharacter.GetLastNameNoFormatting] a joué un rôle déterminant dans l'établissement du musée archéologique#!, où [Scope.GetCharacter.GetSheHe] a exposé tous les artefacts de manière significative." #deepl:2255139215
 lepsius_archaeologist_achievement_new_methods_pompeii_loc: "\nLe professeur [Scope.GetCharacter.GetLastNameNoFormatting] a développé #V de nouvelles méthodes pour conserver intactes les découvertes#! à Pompéi." #deepl:3277007049
 lepsius_archaeologist_achievement_discovered_teotihuacan_loc: "\nLe Dr. [Scope.GetCharacter.GetLastNameNoFormatting] a été la figure centrale de la reconstruction #V du Temple du Soleil à Teotihuacán#!." #deepl:715105555
 lepsius_archaeologist_achievement_discovered_harappa_loc: "\nLe professeur [Scope.GetCharacter.GetLastNameNoFormatting] #V  a découvert la civilisation de la vallée de l'Indus#! sur le site de Harappa." #deepl:823513117
 lepsius_archaeologist_achievement_tomb_first_emperor_loc: "\nLe Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  a découvert la tombe du premier empereur Qin#! gardée par une armée de terre cuite." #deepl:3326302787
 lepsius_archaeologist_achievement_discovered_tikal_loc: "\nLe professeur [Scope.GetCharacter.GetLastNameNoFormatting] #V  a découvert la cité maya de Tikal#! dans la jungle du Guatemala." #deepl:960255002
 lepsius_archaeologist_achievement_explored_petra_loc: "\nLe Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  a exploré la ville de Petra#! dans les déserts brûlants du Moyen-Orient." #deepl:230969931
 lepsius_archaeologist_achievement_found_sarcophagus_intact_loc: "\nLa découverte du #V Sarcophage d'un pharaon inconnu#! est l'une des plus grandes réalisations du Dr. [Scope.GetCharacter.GetLastNameNoFormatting]." #deepl:397069606
 lepsius_archaeologist_achievement_found_sarcophagus_broken_loc: "\Bien que le Dr [Scope.GetCharacter.GetLastNameNoFormatting] ait découvert la #V Tombe d'un pharaon inconnu#!, cette découverte a été gâchée par la destruction de la momie du pharaon lors d'un malheureux accident." #deepl:4134291227
 lepsius_archaeologist_achievement_found_tutankhamun_loc: "#V \nLa découverte de la tombe intacte du pharaon Toutankhamon#! a constitué une étape importante de la carrière de [Scope.GetCharacter.GetHerHis]." #deepl:830597516
 lepsius_archaeologist_achievement_found_ship_of_khufu_loc: "\nLa découverte du navire de Khufu #V #! immortalisera à jamais le nom du Dr. [Scope.GetCharacter.GetLastNameNoFormatting] dans les livres d'histoire." #deepl:263837328
 lepsius_archaeologist_achievement_found_tower_of_babylon_loc: "\nLors d'un séjour en Mésopotamie, [Scope.GetCharacter.GetHerHis], [Scope.GetCharacter.GetSheHe] a trouvé la #V Tour de Babylone#!, connue des archéologues sous le nom de Zikurrat Etemenanki. Une merveilleuse découverte !" #deepl:3958757656
 lepsius_archaeologist_achievement_found_gardens_of_sennacherib_loc: "\nLe Dr. [Scope.GetCharacter.GetLastNameNoFormatting] est probablement la seule personne qui peut se vanter d'avoir redécouvert l'une des sept merveilles du monde. |U[Scope.GetCharacter.GetSheHe] a en effet trouvé les #V Hanging Gardens#!." #deepl:1376956218
 lepsius_archaeologist_achivement_found_treasury_of_atreus_loc: "\nCertes, pour un archéologue, tout est un trésor, mais la découverte du Dr. [Scope.GetCharacter.GetLastNameNoFormatting] est assurément un véritable trésor. Les #V Trésors de Mycènes#! comprenaient de nombreux objets, dont la plupart étaient en or, comme les masques d'or." #deepl:3793568389
 lepsius_archaeologist_achievement_found_tomb_of_pakal_loc: "\nLa tombe #V de Pakal#!, que le Dr. [Scope.GetCharacter.GetLastNameNoFormatting] a découverte, était très impressionnante. Aussi impressionnante qu'elle devrait l'être pour le plus grand roi des Mayas." #deepl:3301250790
 lepsius_archaeologist_achievement_raised_flag_on_pyramids_loc: "\nAlors qu'il travaillait en Égypte, [Scope.GetCharacter.GetSheHe] #V  a hissé un drapeau sur la grande pyramide de Gizah#!." #deepl:453060665
 lepsius_archaeologist_achievement_reconstructed_ishtar_gate_loc: "\Le professeur [Scope.GetCharacter.GetLastNameNoFormatting] n'a pas seulement trouvé la porte d'Ishtar #V #! , il l'a aussi reconstruite. Aujourd'hui, elle brille à nouveau de tout son éclat." #deepl:3899648836
 lepsius_archaeologist_achievement_found_lamassu_loc: "\NDans une grande aventure pleine de dangers, [Scope.GetCharacter.GetSheHe] a trouvé le majestueux #V Lamassu#!." #deepl:1325115031
 lepsius_archaeologist_achievement_escaped_labyrinth_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] s'est échappé d'un #V Labyrinthe mythique#! plein de dangers." #deepl:3205955848
 lepsius_archaeologist_achievement_survived_maya_pyramid_loc: "\NL'archéologie est parfois dangereuse. Le professeur [Scope.GetCharacter.GetLastNameNoFormatting] a survécu à son voyage dans une mystérieuse pyramide maya #V #! qui tenait plus de l'aventure que de l'archéologie." #deepl:2309875301
 lepsius_archaeologist_achievement_found_vilcabamba_loc: "\nLe Dr. [Scope.GetCharacter.GetLastNameNoFormatting] a #V redécouvert Vilacamba#!, le dernier refuge des Incas." #deepl:1401010459
 lepsius_archaeologist_achievement_discovered_nazca_loc: "\n[Scope.GetCharacter.GetSheHe|U] #V  a découvert dans le désert de Nazca#! d'immenses dessins qui ne sont vraiment visibles que du ciel." #deepl:3398521121
 lepsius_archaeologist_achievement_dinosaur_myth_loc: "\nLe docteur [Scope.GetCharacter.GetLastNameNoFormatting] est ridiculisé par la communauté scientifique. Il prétend que les membres de son expédition #V ont été mangés par des dinosaures#!. Cette affirmation est-elle ridicule ou vraie ?" #deepl:491140794
 lepsius_archaeologist_achievement_photo_evidence_independent_loc: "\nLe professeur [Scope.GetCharacter.GetLastNameNoFormatting] a fourni des preuves photographiques de la présence de #V dinosaures vivants#! alors que personne n'y croyait [Scope.GetCharacter.GetHerHim]." #deepl:1970351488
 lepsius_archaeologist_achievement_photo_support_loc: "\nAvec le soutien du gouvernement, le professeur [Scope.GetCharacter.GetLastNameNoFormatting] a pu fournir des preuves photographiques de la présence de #V dinosaures vivants#!, bien qu'il ait été ridiculisé auparavant." #deepl:278106961
