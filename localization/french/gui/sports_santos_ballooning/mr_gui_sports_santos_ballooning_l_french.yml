l_french:
 MR_GORDON_BENNETT_CUP_BUTTON: "La Coupe Gordon Bennett"
 MR_GORDON_BENNETT_CUP_BUTTON_TT: "#T La Coupe Gordon Bennett#!\n La Coupe Gordon Bennett (ou Coupe Aéronautique Gordon Bennett) est la plus ancienne course de ballons à gaz au monde. Surnommée le « ruban bleu » de l'aéronautique, cette compétition était parrainée par James Gordon Bennett Jr., millionnaire, sportif et propriétaire du journal New York Herald. Selon les organisateurs, l'objectif du concours était simple : « voler le plus loin possible du site de lancement ». La compétition s'est déroulée de 1906 à 1938, avec une interruption de 1914 à 1919 en raison de la Première Guerre mondiale, puis en 1931.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GORDON_BENNETT_PUBLISHER_BUILDING_TRIGGER_TT: "#default_text [GetPlayer.GetName] a un total de #V 10 ou plus [GetBuildingType('building_manzoni_publishing_industry').GetName] niveaux de bâtiment#!.#!"