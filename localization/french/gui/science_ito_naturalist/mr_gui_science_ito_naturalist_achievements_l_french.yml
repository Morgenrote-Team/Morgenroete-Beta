 MR_NATURALIST_ACHIEVEMENTS_TT: "[AddLocalizationIf( Scope.IsSet , 'ito_naturalist_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'ito_naturalist_no_naturalist_loc')]" #deepl:1239426788

 ito_naturalist_achievements_loc: "$ito_naturalist_achievements_intro_loc$[Scope.GetCharacter.GetCustom('ito_naturalist_achievement_total_zoo_animals_type')][Scope.GetCharacter.GetCustom('ito_naturalist_achievement_total_wildlife_documentaries_type')][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_invented_evolution_theory_var').IsSet , Scope.Var('ito_naturalist_achievement_invented_evolution_theory_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_attended_hippocampus_congress_var').IsSet , Scope.Var('ito_naturalist_achievement_attended_hippocampus_congress_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_showed_evolution_in_peppered_moths_var').IsSet , Scope.Var('ito_naturalist_achievement_showed_evolution_in_peppered_moths_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_finished_pacific_expedition_var').IsSet , Scope.Var('ito_naturalist_achievement_finished_pacific_expedition_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_wallace_line_discovered_var').IsSet , Scope.Var('ito_naturalist_achievement_wallace_line_discovered_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_inaugurated_zoo_var').IsSet , Scope.Var('ito_naturalist_achievement_inaugurated_zoo_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_found_victoria_amazonica_var').IsSet , Scope.Var('ito_naturalist_achievement_found_victoria_amazonica_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_found_attacus_atlas_var').IsSet , Scope.Var('ito_naturalist_achievement_found_attacus_atlas_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_found_amorphophallus_titanum_var').IsSet , Scope.Var('ito_naturalist_achievement_found_amorphophallus_titanum_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_found_goliathus_var').IsSet , Scope.Var('ito_naturalist_achievement_found_goliathus_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_natualist_achievement_forestry_improvement_finished_var').IsSet , Scope.Var('ito_natualist_achievement_forestry_improvement_finished_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_rubber_improvement_finished_var').IsSet , Scope.Var('ito_naturalist_achievement_rubber_improvement_finished_var').GetFlagName)]" #deepl:3859703363
 ito_naturalist_no_naturalist_loc: "Les réalisations #V de ce [concept_dubois_naturalist]#! seront affichées ici, une fois que vous en aurez une." #deepl:2308010664
 ito_naturalist_achievements_intro_loc: "#V Réalisations de ce naturaliste#!\n[Scope.GetCharacter.GetFullName] est un naturaliste accompli qui a collectionné [Scope.Var('dubois_naturalist_total_specimens_var').GetValue|0*V] [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] ." #deepl:2770611838

 ito_naturalist_achievement_total_zoo_animals_loc: "\nPendant que [Scope.GetCharacter.GetHerHis] était naturaliste, un total de [Scope.GetVariable('ito_naturalist_total_zoo_animals_var').GetValue|0+] [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] ont été capturés et amenés à [GetPlayer.MakeScope.GetCountry.GetName]." #deepl:3523686073
 ito_naturalist_achievement_total_wildlife_documentaries_loc: "\n[GetPlayer.MakeScope.Var('dubois_naturalist_var').GetCharacter.GetFullName] est bien connu pour documenter [GetPlayer.MakeScope.Var('dubois_naturalist_var').GetVariable('ito_character_num_animal_documentations_var').GetValue|0+] [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] dans leur habitat naturel." #deepl:2453492304
 ito_naturalist_achievement_invented_evolution_theory_loc: "\L'une des plus grandes réalisations de [Scope.GetCharacter.GetHerHis] a été le livre "#V On the Origin of Species" (L'origine des espèces)#!, qui décrit pour la première fois la théorie de l'évolution." #deepl:510074125
 ito_naturalist_achievement_attended_hippocampus_congress_loc: "\ [Scope.GetCharacter.GetLastNameNoFormatting] a participé au débat qui a permis de déterminer si l'homme était unique ou s'il s'agissait d'un animal comme les autres." #deepl:1532833643
 ito_naturalist_achievement_showed_evolution_in_peppered_moths_loc: "\nLe professeur [Scope.GetCharacter.GetLastNameNoFormatting] a montré que le #V papillon de nuit évolue#! pour s'adapter à son environnement changeant. Une preuve de la théorie de l'évolution." #deepl:4279082533
 ito_naturalist_achievement_finished_pacific_expedition_loc: "\nLors d'une expédition dans l'océan Pacifique #V #! , le Dr. [Scope.GetCharacter.GetLastNameNoFormatting] a exploré en profondeur la flore et la faune de ce pays merveilleux. [Scope.GetCharacter.GetSheHe] a découvert de nombreuses nouvelles espèces." #deepl:1584400015
 ito_naturalist_achievement_wallace_line_discovered_loc: "\NLors d'un voyage dans le Pacifique, [Scope.GetCharacter.GetLastNameNoFormatting] a remarqué une #V nette séparation entre la flore et la faune asiatiques et australiennes#!. Cette découverte soutient la théorie de l'évolution et suggère une séparation massive des îles dans le passé." #deepl:970429435
 ito_naturalist_achievement_inaugurated_zoo_loc: "\n[Scope.GetCharacter.GetLastNameNoFormatting] a joué un rôle déterminant dans l'ouverture du zoo #V #! . Un endroit où l'on peut voir de près des animaux venant de pays lointains." #deepl:915470862
 ito_naturalist_achievement_found_victoria_amazonica_loc: "\nLors d'une expédition botanique dans la forêt amazonienne, le professeur [Scope.GetCharacter.GetLastNameNoFormatting] a trouvé un #V Nénuphar géant#!. Une plante unique qui peut faire pousser des feuilles d'un diamètre allant jusqu'à 3 mètres." #deepl:3652726149
 ito_naturalist_achievement_found_attacus_atlas_loc: "\nLe Dr. [Scope.GetCharacter.GetLastNameNoFormatting] a trouvé un #V Titanic Moth#! lors d'une expédition botanique en Indochine. C'est l'un des plus grands papillons du monde et il produit une soie très robuste." #deepl:3954278434
 ito_naturalist_achievement_found_amorphophallus_titanum_loc: "#V \NLors d'une expédition botanique à Bornéo, le professeur [Scope.GetCharacter.GetLastNameNoFormatting] a découvert une énorme fleur#! qui peut atteindre jusqu'à 3 mètres de haut. Un véritable miracle botanique." #deepl:998846928
 ito_naturalist_achievement_found_goliathus_loc: "\nLes forêts tropicales du Congo abritent de nombreuses merveilles. L'une d'entre elles a été découverte par le Dr [Scope.GetCharacter.GetLastNameNoFormatting] lors d'une expédition botanique. Le scarabée Goliath #V #! est l'un des plus gros insectes du monde et il est apparemment assez rare." #deepl:3755908676
 ito_natualist_achievement_forestry_improvement_finished_loc: "[Scope.GetCharacter.GetHerHis] \Le professeur [Scope.GetCharacter.GetLastNameNoFormatting] est bien connu pour ses travaux sur les forêts et les moyens d'améliorer la sylviculture." #deepl:3521424779
 ito_naturalist_achievement_rubber_improvement_finished_loc: "\n[Scope.GetCharacter.GetHerHis|U] Le travail dans les plantations d'hévéas et les expériences sur les meilleures conditions de culture ont permis à notre pays d'améliorer massivement la production de caoutchouc." #deepl:1444884744
