 MR_ARCHITECT_ACHIEVEMENTS_TT: "[AddLocalizationIf( Scope.IsSet , 'gaudi_architect_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'gaudi_architect_achievements_no_architect_loc')]" #deepl:1164471392

 gaudi_architect_achievements_loc: "$gaudi_architect_achievements_intro_loc$[AddLocalizationIf( Scope.Var('gaudi_architecture_treatise_var').IsSet , Scope.Var('gaudi_architecture_treatise_var').GetFlagName)][AddLocalizationIf( Scope.Var('gaudi_architect_achievement_study_trip_var').IsSet , Scope.Var('gaudi_architect_achievement_study_trip_var').GetFlagName)][AddLocalizationIf( Scope.Var('gaudi_architect_achievement_urban_planning_var').IsSet , Scope.Var('gaudi_architect_achievement_urban_planning_var').GetFlagName)][AddLocalizationIf( Scope.Var('gaudi_architect_achievement_capital_expansion_var').IsSet , Scope.Var('gaudi_architect_achievement_capital_expansion_var').GetFlagName)][AddLocalizationIf( Scope.Var('gaudi_architect_achievement_art_deco_splendour_var').IsSet , Scope.Var('gaudi_architect_achievement_art_deco_splendour_var').GetFlagName)][AddLocalizationIf( Scope.Var('gaudi_architect_achievement_neoclassical_splendour_var').IsSet , Scope.Var('gaudi_architect_achievement_neoclassical_splendour_var').GetFlagName)][AddLocalizationIf( Scope.Var('gaudi_architect_achievement_bauhaus_splendour_var').IsSet , Scope.Var('gaudi_architect_achievement_bauhaus_splendour_var').GetFlagName)]AddLocalizationIf( Scope.Var('gaudi_architect_achievement_custom_monument_var').IsSet , Scope.Var('gaudi_architect_achievement_custom_monument_var').GetFlagName)]" #deepl:2413378168
 gaudi_architect_achievements_no_architect_loc: "Les réalisations #V de ce [concept_gaudi_architect]#! seront affichées ici, une fois que vous en aurez une." #deepl:1743789708
 gaudi_architect_achievements_intro_loc: "#V Réalisations de cet architecte#!\n[Scope.GetCharacter.GetFullName] est un [Scope.GetCharacter.GetCustom('gaudi_architect_achievement_experience_type')]. [Scope.GetCharacter.GetSheHe|U] a créé [Scope.Var('gaudi_character_num_blueprints_var').GetValue|V0] #V  Blueprints#! dans [Scope.GetCharacter.GetHerHis] carrière d'architecte jusqu'à présent." #deepl:1173506476

 gaudi_architect_achievement_study_trip_loc: "\n[Scope.GetCharacter.GetLastNameNoFormatting] a #V entrepris un voyage d'étude d'architecte#!." #deepl:4211949072
 gaudi_architect_achievement_urban_planning_loc: "\nAvec [Scope.GetCharacter.GetHerHis] #V  L'urbanisme#! [Scope.GetCharacter.GetSheHe] a contribué à améliorer la vie dans les villes." #deepl:2705387616
 gaudi_architect_achievement_treatise_loc: "\n[Scope.GetCharacter.GetHerHis|U] #V  Treatise on Architecture#! est considéré comme un ouvrage de référence." #deepl:447031677
 gaudi_architect_achievement_custom_monument_loc: "\n[Scope.GetCharacter.GetLastNameNoFormatting] est célèbre pour avoir créé le plan d'un #V Unique Monument#! - un chef-d'œuvre architectural !" #deepl:2063641685
 gaudi_architect_achievement_art_deco_splendour_loc: "\nL'une des réalisations les plus remarquables de la carrière de [Scope.GetCharacter.GetHerHis] a été la transformation complète de #V Urban dans le style Art déco#!." #deepl:1740370625
 gaudi_architect_achievement_neoclassical_splendour_loc: "\nL'une des réalisations les plus remarquables de la carrière de [Scope.GetCharacter.GetHerHis] a été la transformation urbaine complète de #V dans le style néoclassique#!." #deepl:1602590843
 gaudi_architect_achievement_bauhaus_splendour_loc: "\nL'une des réalisations les plus remarquables de la carrière de [Scope.GetCharacter.GetHerHis] a été la transformation complète de #V Urban dans le style Bauhaus#!." #deepl:2152483974
 gaudi_architect_achievement_capital_expansion_loc: "\n[Scope.GetCharacter.GetLastNameNoFormatting] a travaillé sans relâche au développement d'une capitale." #deepl:2991638746
