ar('panum_physician_achievement_endoscope_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_ophthalmoscope_inventor_var').IsSet , Scope.Var('panum_physician_achievement_ophthalmoscope_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_chemotherapy_inventor_var').IsSet , Scope.Var('panum_physician_achievement_chemotherapy_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_attended_medical_congress_var').IsSet , Scope.Var('panum_physician_achievement_attended_medical_congress_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_anthrax_disease_var').IsSet , Scope.Var('panum_physician_achievement_anthrax_disease_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_goiter_disease_var').IsSet , Scope.Var('panum_physician_achievement_goiter_disease_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_nephrolithiasis_disease_var').IsSet , Scope.Var('panum_physician_achievement_nephrolithiasis_disease_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_pellagra_disease_var').IsSet , Scope.Var('panum_physician_achievement_pellagra_disease_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_rickets_disease_var').IsSet , Scope.Var('panum_physician_achievement_rickets_disease_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_syphilis_disease_var').IsSet , Scope.Var('panum_physician_achievement_syphilis_disease_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_tetanus_disease_var').IsSet , Scope.Var('panum_physician_achievement_tetanus_disease_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_military_medicine_project_finished_var').IsSet , Scope.Var('panum_physician_achievement_military_medicine_project_finished_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_inaugurated_asylum_var').IsSet , Scope.Var('panum_physician_achievement_inaugurated_asylum_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_aspirin_inventor_var').IsSet , Scope.Var('mendelejew_chemist_achievement_aspirin_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_basketball_inventor_var').IsSet , Scope.Var('panum_physician_achievement_basketball_inventor_var').GetFlagName)]"
 panum_physician_no_physician_loc: "Les réalisations #V de ce [concept_panum_physician]#! seront affichées ici, une fois que vous en aurez une."
 panum_physician_achievements_intro_loc: "#V Achievements of this Physician#!\n[Scope.GetCharacter.GetFullName] is a successful Physician."
 panum_physician_achievement_successful_treatments_loc: "\nLe docteur [Scope.GetCharacter.GetLastNameNoFormatting] est expérimenté dans le traitement des patients et a #o traité avec succès [GetPlayer.MakeScope.Var('panum_physician_var').GetVariable('panum_physician_successful_treatments_var').GetValue] patients#!."
 panum_physician_achievement_epidemiologist_loc: "\n[Scope.GetCharacter.GetSheHe|U] a étudié les maladies de manière approfondie et est devenu un #o $panum_epidemiologist$ #! ."
 panum_physician_achievement_surgeon_loc: "\n[Scope.GetCharacter.GetSheHe|U] a effectué de nombreuses interventions chirurgicales et est donc considéré comme un bon #o $panum_surgeon$ #! ."
 panum_physician_achievement_psychiatrist_loc: "\nLe Dr. [Scope.GetCharacter.GetLastNameNoFormatting] a étudié de manière approfondie l'esprit humain et est un #o renommé $panum_psychiatrist$#! ."
 panum_physician_achievement_military_physician_loc: "\nEn tant que #o $panum_military_physician$ #! [Scope.GetCharacter.GetSheHe] a vu les horreurs de la guerre et sait comment traiter les gens dans des circonstances horribles."
 panum_physician_achievement_germ_theory_inventor_loc: "\Le docteur [Scope.GetCharacter.GetLastNameNoFormatting] a inventé la théorie du germe #o #! qui a déjà sauvé des milliers de vies."
 panum_physician_achievement_pneumothorax_inventor_loc: "\nL'une des plus grandes inventions de [Scope.GetCharacter.GetHerHim] est un #o dispositif permettant de provoquer un pneumothorax artificiel#!. Il en résulte un affaissement des poumons qui peut aider à traiter la tuberculose."
 panum_physician_achievement_thoracoplasty_inventor_loc: "\nGrâce aux compétences chirurgicales de [Scope.GetCharacter.GetHerHis], le docteur [Scope.GetCharacter.GetLastNameNoFormatting] a inventé une procédure #o qui a révolutionné la chirurgie pulmonaire appelée thoracoplastie#! et a ainsi permis d'améliorer le traitement des patients atteints de tuberculose."
 panum_physician_achievement_attended_medical_congress_loc: "\n[Scope.GetCharacter.GetSheHe|U] participated in at least one #o Medical Congress#! and shared [Scope.GetCharacter.GetHerHis] ideas."
 mendelejew_chemist_achievement_aspirin_inventor_loc: "\Le docteur [GetPlayer.MakeScope.Var('mendelejew_chemist_var').GetCharacter.GetLastNameNoFormatting] est considéré comme le principal inventeur de l'aspirine ( #o Aspirin#! ). Il a non seulement soulagé la douleur d'innombrables patients, mais aussi révolutionné l'industrie pharmaceutique."
 panum_physician_achievement_xray_inventor_loc: "\nAvec la découverte des rayons X #o #! , le Dr. [GetPlayer.MakeScope.Var('curie_physicist_var').GetCharacter.GetLastNameNoFormatting] est considéré comme l'un des principaux physiciens internationaux qui ont révolutionné la médecine et la physique à parts égales."
 panum_physician_achievement_bloodtypes_inventor_loc: "\Avec la découverte des différents groupes sanguins #o , à savoir A, B, AB et 0#!, le Dr. [Scope.GetCharacter.GetLastNameNoFormatting] a joué un rôle important en veillant à ce que nous comprenions mieux le sang en tant que tel - et à ce que les transfusions sanguines soient plus réussies."
 panum_physician_achievement_ecg_inventor_loc: "\nL'ECG #o #! , inventé par le Dr. [Scope.GetCharacter.GetLastNameNoFormatting], a permis de mesurer l'activité électrique du cœur et représente une étape importante dans les opérations hospitalières."
 panum_physician_achievement_transplantation_inventor_loc: "\Avec la #o Première transplantation#!, le Dr [Scope.GetCharacter.GetLastNameNoFormatting] est entré dans l'histoire de la médecine."
 panum_physician_achievement_stereotactic_method_inventor_loc: "\nAujourd'hui, la méthode stéréotaxique #o #! [Scope.GetCharacter.GetSheHe] inventée est considérée comme une innovation dans le domaine de la chirurgie du cerveau."
 panum_physician_achievement_cardiopulmonary_bypass_inventor_loc: "\nAvec le développement d'une dérivation cardio-pulmonaire #o #! , le Dr. [Scope.GetCharacter.GetLastNameNoFormatting] a réalisé un chef-d'œuvre de la médecine moderne."
 panum_physician_achievement_endoscope_inventor_loc: "\n[Scope.GetCharacter.GetHerHis|U] l'invention de l'endoscope #o #! , qui a permis d'examiner pour la première fois l'intérieur de l'être humain, est également très présente dans les mémoires."
 panum_physician_achievement_ophthalmoscope_inventor_loc: "\nLe Dr [Scope.GetCharacter.GetLastNameNoFormatting] a inventé un appareil qui facilite l'examen des maladies oculaires et a ainsi rendu un service inestimable à l'ophtalmologie : #o L'ophtalmoscope#!."
 panum_physician_achievement_chemotherapy_inventor_loc: "\nLa chimiothérapie #o #! [Scope.GetCharacter.GetSheHe] mise au point pour traiter les maladies les plus tenaces à l'aide d'une variété de médicaments donne même aux patients atteints de cancer l'espoir que tout n'est pas vain."
 panum_physician_achievement_iron_lung_inventor_loc: "\n[GetPlayer.MakeScope.Var('tesla_engineer_var').GetCharacter.GetHerHis|U] #o  La construction du premier poumon de fer#! pour maintenir en vie les patients atteints de polio qui en avaient cruellement besoin est considérée comme l'une des réalisations les plus fascinantes de notre époque en matière d'ingénierie."
 panum_physician_achievement_military_medicine_project_finished_loc: "\nLe Dr. [Scope.GetCharacter.GetLastNameNoFormatting] a #o inventé les dernières méthodes dans le domaine de la médecine de terrain#!, faisant des services médicaux militaires l'un des plus reconnus au monde."
 panum_physician_achievement_inaugurated_asylum_loc: "\Le docteur [Scope.GetCharacter.GetLastNameNoFormatting] a joué un rôle crucial dans la fondation du #o Premier asile psychiatrique du pays#! afin d'apporter une aide complète et humaine aux malades mentaux."
 panum_physician_achievement_anthrax_disease_loc: "#o \nLe Dr. [Scope.GetCharacter.GetLastNameNoFormatting] s'est spécialisé dans l'anthrax#! et a mis au point des méthodes de prévention et de traitement efficaces."
 panum_physician_achievement_goiter_disease_loc: "#o \nLe Dr. [Scope.GetCharacter.GetLastNameNoFormatting] s'est spécialisé dans le Goitre#! et a développé des méthodes de prévention et de traitement efficaces."
 panum_physician_achievement_nephrolithiasis_disease_loc: "#o \Le Dr [Scope.GetCharacter.GetLastNameNoFormatting] s'est spécialisé dans la néphrolithiase#! et a mis au point des méthodes de prévention et de traitement efficaces."
 panum_physician_achievement_pellagra_disease_loc: "#o \Le docteur [Scope.GetCharacter.GetLastNameNoFormatting] s'est spécialisé dans la pellagre#! et a mis au point des méthodes de prévention et de traitement efficaces."
 panum_physician_achievement_rickets_disease_loc: "#o \Le Dr [Scope.GetCharacter.GetLastNameNoFormatting] s'est spécialisé dans le rachitisme#! et a mis au point des méthodes de prévention et de traitement efficaces."
 panum_physician_achievement_syphilis_disease_loc: "#o \Le Dr [Scope.GetCharacter.GetLastNameNoFormatting] s'est spécialisé dans la syphilis#! et a mis au point des méthodes de prévention et de traitement efficaces."
 panum_physician_achievement_tetanus_disease_loc: "#o \Le docteur [Scope.GetCharacter.GetLastNameNoFormatting] s'est spécialisé dans le tétanos#! et a mis au point des méthodes de prévention et de traitement efficaces."
 panum_physician_achievement_basketball_inventor_loc: "\nEn [Scope.Var('panum_physician_achievement_basketball_inventor_year_var').GetValue|0], le Dr. [Scope.GetCharacter.GetLastNameNoFormatting] a #o inventé un nouveau sport d'équipe appelé basket-ball.#!"