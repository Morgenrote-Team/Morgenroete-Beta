 MR_ARCHITECT_MODERN_SPLENDOUR_BUTTON: "Splendeur moderne" #deepl:2927148504
 MR_ARCHITECT_MODERN_SPLENDOUR_BUTTON_TT: "#T Splendeur moderne#!\nSi nous disposons d'une école d'architecture moderne, nous pouvons transformer notre capitale nationale en un véritable rêve d'expériences architecturales audacieuses. L'Art déco est considéré comme le plus prestigieux, mais la transformation prendra plus de temps.[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:4119465333
 MR_ARCHITECT_ACTIVE_TRIGGER_TT: "#default_text [GetPlayer.GetName] a un [concept_gaudi_architect] qui est #V pas occupé#!.#!" #deepl:1810656164
 MR_MODERN_ARCHITECTURE_SCHOOL_TRIGGER_TT: "#default_text [GetPlayer.GetName] possède l'un des modificateurs suivants : #V Architecture Bauhaus#!, #V Architecture néoclassique#!, ou #V Architecture Art déco#!.#!" #deepl:1290977771

 MR_ARCHITECT_BLUEPRINTS_MONUMENT_BUTTON: "Plans d'exécution : Monuments de la ville" #deepl:3587838353
 MR_ARCHITECT_BLUEPRINTS_MONUMENT_BUTTON_TT: "#T Blueprints : Monuments de la ville#!\nUn architecte peut développer trois plans possibles dans la catégorie 'Monuments' : le [GetBuildingType('building_gaudi_statue').GetName], le [GetBuildingType('building_gaudi_fountain').GetName], et le [GetBuildingType('building_gaudi_arch').GetName]. Certains plans nécessitent des technologies ; et certains bâtiments ont des exigences particulières dans leurs états respectifs.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:1470268006
 MR_BLUEPRINTS_MONUMENT_TRIGGER_TT: "#default_text [GetBuildingType('building_gaudi_statue').GetName] nécessite [GetTechnology('elgar_classicism_tech').GetName].\n[GetBuildingType('building_gaudi_fountain').GetName] n'a aucune exigence.\n[GetBuildingType('building_gaudi_arch').GetName] nécessite [GetTechnology('napoleonic_warfare').GetName].#!" #deepl:4195128851

 MR_ARCHITECT_BLUEPRINTS_SQUARE_BUTTON: "Plans d'exécution : Places publiques" #deepl:3281228618
 MR_ARCHITECT_BLUEPRINTS_SQUARE_BUTTON_TT: "#T Les plans : Places publiques#!\nUn architecte peut développer trois plans possibles dans la catégorie 'Places' : le [GetBuildingType('building_gaudi_park').GetName], le [GetBuildingType('building_gaudi_luna').GetName], et le [GetBuildingType('building_gaudi_parade').GetName]. Certains plans nécessitent des technologies ; et certains bâtiments ont des exigences particulières dans leurs états respectifs.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:435233593
 MR_BLUEPRINTS_SQUARE_TRIGGER_TT: "#default_text [GetBuildingType('building_gaudi_park').GetName] n'a pas d'exigences.\N-[GetBuildingType('building_gaudi_luna').GetName] nécessite [GetTechnology('curtiss_tourism_tech').GetName].\N-[GetBuildingType('building_gaudi_parade').GetName] nécessite [GetTechnology('nationalism').GetName].#!" #deepl:1296999768

 MR_ARCHITECT_BLUEPRINTS_SERVICE_BUTTON: "Plans d'exécution : Bâtiments de service" #deepl:647432200
 MR_ARCHITECT_BLUEPRINTS_SERVICE_BUTTON_TT: "#T Blueprints : Bâtiments de services#!\nUn architecte peut développer trois plans possibles dans la catégorie 'Services' : le [GetBuildingType('building_gaudi_almshouse').GetName], le [GetBuildingType('building_gaudi_school').GetName], et le [GetBuildingType('building_gaudi_prison').GetName]. Certains plans nécessitent des technologies ; et certains bâtiments ont des exigences particulières dans leurs états respectifs.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:4211878095
 MR_BLUEPRINTS_SERVICE_TRIGGER_TT: "#default_text [GetBuildingType('building_gaudi_almshouse').GetName] nécessite [GetTechnology('egalitarianism').GetName].\N[GetBuildingType('building_gaudi_school').GetName] nécessite [GetTechnology('empiricism').GetName].\N[GetBuildingType('building_gaudi_prison').GetName] nécessite [GetTechnology('law_enforcement').GetName].#!" #deepl:2189127620

 MR_ARCHITECT_BLUEPRINTS_HEALTH_BUTTON: "Plans d'action : Institutions de santé" #deepl:310600916
 MR_ARCHITECT_BLUEPRINTS_HEALTH_BUTTON_TT: "#T Blueprints : Établissements de santé#!\nUn architecte peut développer trois plans possibles dans la catégorie "Santé" : le [GetBuildingType('building_gaudi_canalization').GetName], le [GetBuildingType('building_gaudi_hospital').GetName], et le [GetBuildingType('building_gaudi_health').GetName]. Certains plans nécessitent des technologies ; et certains bâtiments ont des exigences particulières dans leurs états respectifs.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:1053963744
 MR_BLUEPRINTS_HEALTH_TRIGGER_TT: "#default_text [GetBuildingType('building_gaudi_canalization').GetName] nécessite [GetTechnology('modern_sewerage').GetName].\N[GetBuildingType('building_gaudi_hospital').GetName] nécessite [GetTechnology('theiler_microbiology_tech').GetName].\N[GetBuildingType('building_gaudi_health').GetName] nécessite [GetTechnology('pharmaceuticals').GetName].#!" #deepl:339744591

 MR_ARCHITECT_BLUEPRINTS_ACADEMY_BUTTON: "Plans d'action : Académies nationales" #deepl:3161389971
 MR_ARCHITECT_BLUEPRINTS_ACADEMY_BUTTON_TT: "#T Blueprints : Académies nationales#!\nUn architecte peut développer trois plans possibles dans la catégorie "Académies" : le [GetBuildingType('building_gaudi_science').GetName], le [GetBuildingType('building_gaudi_arts').GetName], et le [GetBuildingType('building_gaudi_sports').GetName]. Certains plans nécessitent des technologies ; et certains bâtiments ont des exigences particulières dans leurs états respectifs.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:2209680759
 MR_BLUEPRINTS_ACADEMY_TRIGGER_TT: "#default_text [GetBuildingType('building_gaudi_science').GetName] nécessite [GetTechnology('dialectics').GetName].\N[GetBuildingType('building_gaudi_arts').GetName] nécessite [GetTechnology('romanticism').GetName].\N[GetBuildingType('building_gaudi_sports').GetName] nécessite [GetTechnology('organized_sports').GetName].#!" #deepl:1132947479

 mr_gui_has_urban_planning_tech_trigger_tt: "#default_text [GetPlayer.GetName] a fait des recherches sur [GetTechnology('urban_planning').GetName].#!" #deepl:563080575

 MR_ARCHITECT_PUBLIC_CONSTRUCTION_BUTTON: "Construction publique" #deepl:1107209085
 MR_ARCHITECT_PUBLIC_CONSTRUCTION_BUTTON_TT: "#T Construction publique#!\nEn fonction de son style architectural, un architecte peut apporter des points de construction au niveau national pour faire avancer la construction publique. Après cinq ans de travail continu, ils bénéficient d'un renforcement de leur réputation.[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:3434490324

 MR_ARCHITECT_CUSTOM_MONUMENT_BLUEPRINT_BUTTON: "Un chef-d'œuvre d'architecte" #deepl:100063765
 MR_ARCHITECT_CUSTOM_MONUMENT_BLUEPRINT_BUTTON_TT: "#T Le chef-d'œuvre d'un architecte#!\NUn jour, [concept_gaudi_great_architect] peut concevoir le plan d'un monument national unique de style moderne. L'œuvre de cette vie démentira le nom de l'architecte et donnera à notre pays sa propre merveille architecturale du monde.[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:4293486340
 MR_MODERN_ARCHITECT_TRIGGER_TT: "#default_text [GetPlayer.GetName] a un [concept_gaudi_architect] avec le #V $gaudi_bauhaus_style$ #! , #V $gaudi_neoclassical_style$ #! , ou #V $gaudi_art_deco_style$ #! [concept_character_trait] .#!" #deepl:2794417515
 MR_GREAT_ARCHITECT_TRIGGER_TT: "#default_text [GetPlayer.GetName] a un [concept_gaudi_great_architect].#!" #deepl:2285819377

 MR_ARCHITECT_URBAN_PLANNING_BUTTON: "Urbanisme" #deepl:1924995487
 MR_ARCHITECT_URBAN_PLANNING_BUTTON_TT: "#T Urbanisme#!\NLes architectes peuvent visiter les centres-villes d'un pays et y améliorer de manière significative les conditions grâce à une planification et à des règles de construction tournées vers l'avenir.[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:2905197364
 MR_ARCHITECT_URBAN_PLANNING_TRIGGER_TT: "#default_text Au moins un bâtiment [GetBuildingType('building_urban_center').GetName] de niveau 1 ou supérieur n'a pas les trois [Concept('concept_modifier','$concept_modifiers$')].#!" #deepl:2816455871

 MR_ARCHITECT_STUDY_TRIP_BUTTON: "Voyage d'étude d'un architecte" #deepl:471476780
 MR_ARCHITECT_STUDY_TRIP_BUTTON_TT: "#T Voyage d'étude de l'architecte#!\nEnvoyez votre architecte à l'étranger pendant deux ans pour qu'il acquière de nouvelles connaissances et compétences dans le domaine de l'architecture. L'architecte ne sera pas disponible pendant cette période.[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:1678337465
 MR_ARCHITECT_NO_TRIP_TRIGGER_TT: "#default_text Notre architecte n'a #R pas encore entrepris#! de voyage d'étude.#!" #deepl:1826272727
 MR_ARCHITECT_CAPITAL_EXPANSION_BUTTON: "Expansion du capital" #deepl:4033066520
 MR_ARCHITECT_CAPITAL_EXPANSION_BUTTON_TT: "#T Expansion de la capitale#!\nLes nouveaux styles architecturaux et les nouvelles technologies de construction offrent la possibilité de développer notre capitale, qui est passée en un siècle d'une petite ville endormie à l'une des plus importantes métropoles de notre époque.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:1403663647
 MR_HISTORICIST_ARCHITECT_TRIGGER_TT: "#default_text [GetPlayer.GetName] a un [concept_gaudi_architect] avec le #V $gaudi_historicism_style$ #! , #V $gaudi_bauhaus_style$ #! , #V $gaudi_neoclassical_style$ #! , ou #V $gaudi_art_deco_style$ #! [concept_character_trait] .#!" #deepl:1015348494

 MR_ARCHITECT_TREATISE_BUTTON: "Traité d'architecture" #deepl:1594143488
 MR_ARCHITECT_TREATISE_BUTTON_TT: "#T Expansion du capital#!\nUn architecte peut résumer ses idées théoriques sur l'architecture une fois dans sa vie. Ses résultats peuvent être dépassés par un autre architecte s'il est meilleur. Le résultat dépend largement de l'expérience. Un architecte qui travaille sur un traité est indisponible pendant un an.[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:2275758248
 MR_ARCHITECT_NO_TREATISE_TRIGGER_TT: "#default_text L'architecte n'a #R pas#! encore écrit de traité.#!" #deepl:1413391823
 MR_ARCHITECT_TREATISE_EXPERIENCE_TRIGGER_TT: "#default_text L'architecte a au moins une réputation #V #! de #p 250#!.#!" #deepl:2042893126
 MR_BETTER_TREATISE_TRIGGER_TT: "#default_text Le traité potentiel de l'architecte est #G mieux#! que le dernier traité.#!" #deepl:3972938599

 MR_PROMOTE_ARCHITECT_TT: "#T Promouvoir un architecte#!\n[Concept('concept_gaudi_architect','$concept_gaudi_architects$')] dirige la construction de nouveaux bâtiments dans votre pays. Ils donnent un bonus passif mais peuvent également être utilisés pour améliorer les États avec de nouveaux bâtiments.#n Note :#! Vous ne pouvez avoir qu'un seul architecte à la fois.[GetPlayer.GetCustom('mr_promote_has_painter_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:2593298
