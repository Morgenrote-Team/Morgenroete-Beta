 academics.2101.t: "Le [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] demande un musée"
 academics.2101.d: "En tant que l'une des nations les plus puissantes du monde, nous avons jusqu'à présent manqué de prestige archéologique. Par conséquent, le [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] nous demande de construire un musée archéologique."
 academics.2101.f: "Le [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] vous demande d'augmenter votre engagement envers l'archéologie. Explorer le passé, découvrir des cultures oubliées et récupérer des artefacts précieux est d'une importance primordiale pour la science ainsi que le prestige national. \ N Par conséquent, nous vous demandons, pour fonder un musée archéologique pour augmenter, transmettre et préserver les connaissances et les excellentes œuvres d'art des cultures passées. \ N \ nsigned, le Conseil du [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2101.g: "Nous irons à la chasse au trésor!"
 academics.2101.h: "Pas besoin d'un musée poussiéreux."
 academics.2101_goal_tt: "Vous devrez collecter #p 5#! [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] et construire un musée archéologique en #n 10#! ans."
 academics.2102.t: "Inauguration du musée archéologique"
 academics.2102.d: "Les représentants du [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] semblaient très satisfaits à l'ouverture du musée archéologique aujourd'hui."
 academics.2102.f: "Le [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] est ravi d'apprendre que le nouveau musée a été ouvert au public et que de nombreux citoyens peuvent désormais profiter des artefacts trouvés. Ils ont également une grande valeur scientifique. Cependant, comme cela ne peut être qu'un début, nous avons déjà organisé avec le directeur du musée qu'il devrait rappeler les futurs achats d'artefacts. Il est - bien sûr - également membre de notre société. \ N \ nsigned, le Conseil du [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2102.g: "Maintenant, nous avons besoin de quelque chose d'autre qui y appartient ..."
 academics.2103.t: "Une honte archéologique"
 academics.2103.d: "À la grande consternation du [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')], il a été noté aujourd'hui que malgré la promesse de promouvoir l'archéologie du pays, aucun effort n'a été fait dans cette direction."
 academics.2103.f: "Nous, les membres du [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')], sommes profondément déçus par l'ignorance du gouvernement. Un petit musée demande-t-il vraiment trop? \ N \ nsigned, les membres du [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2103.g: "Qui a besoin de ce musée poussiéreux de toute façon?"
 academics.2104.t: "Le directeur du musée suggère une exposition égyptienne"
 academics.2105.t: "Le directeur du musée suggère une exposition mésopotamienne"
 academics.2106.t: "Le directeur du musée suggère une exposition égéenne"
 academics.2107.t: "Museum director suggests a Pre-Columbian Exhibition"
 academics.2104.d: "Le directeur du musée archéologique a averti que notre musée pourrait prendre du retard dans la comparaison internationale si nous ne réunissons pas de toute urgence des artefacts manquants dans une seule exposition."
 academics.2104.f: "En tant que fier membre du [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')], je regrette la négligence de notre beau musée. Le monde entier recueille des artefacts égyptiens, récemment j'ai entendu parler de la statue de Bastet féline de l'étranger. Le dernier engouement absolu, je vous le dis! C'est censé être rose aussi, j'ai entendu. Et nous n'avons même pas assez de scarabes pour organiser une exposition appropriée. Si nous ne collectons pas bientôt au moins des artefacts pour une exposition de taille moyenne, je suis pessimiste à propos de l'avenir de l'archéologie dans notre pays. \ N \ nsigned, le directeur du musée archéologique"
 academics.2105.f: "En tant que membre ardent du [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')], je regrette la négligence de notre musée respecté. Les artefacts mésopotamiens font fureur ces jours-ci, et les grandes nations ne peuvent tout simplement pas en avoir assez. Bien sûr, je crois que la taille d'un Lamassu ne détermine pas sa valeur, mais ce que vous en faites. Cependant, nous n'avons même pas suffisamment de comprimés cunéiformes pour organiser une exposition appropriée. Si nous ne collectons pas bientôt au moins des artefacts pour une exposition de taille moyenne, je suis pessimiste à propos de l'avenir de l'archéologie dans notre pays. \ N \ nsigned, le directeur du musée archéologique"
 academics.2106.f: "En tant que membre important du [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')], je regrette la négligence de notre fier musée. Les artefacts égéens se vendent comme des hotcakes, c'est l'expérience des dernières années. Les épopées homériques sont devenues une culture populaire depuis que Troy a été redécouvert, et chaque Nouveau Riche a maintenant une statue antique dans son jardin. Et nous? Nous n'avons même pas quelques produits grave mycéniens viles à montrer! Si nous ne collectons pas bientôt au moins des artefacts pour une exposition de taille moyenne, je suis pessimiste à propos de l'avenir de l'archéologie dans notre pays. \ N \ nsigned, le directeur du musée archéologique"
 academics.2107.f: "En tant que beau membre du [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')], je regrette la négligence de notre important musée. Le mayanisme ne connaît plus de frontières. Les membres ésotériques de notre société dépensent beaucoup d'argent pour obtenir les pièces les plus exotiques d'Amérique centrale et du Sud. Le grave vol et la destruction de précieux actifs historiques battent leur plein. J'ai entendu dire qu'un chef d'expédition voulait même déplacer les pyramides de Tikal! En revanche, nous n'avons même pas quelques masques en pierre occulte pour effrayer les enfants du musée. Si nous ne collectons pas bientôt au moins des artefacts pour une exposition de taille moyenne, je suis pessimiste à propos de l'avenir de l'archéologie dans notre pays. \ N \ nsigned, le directeur du musée archéologique"
 academics.2104.g: "Fortune et gloire!"
 academics.2104.h: "Nous avons de meilleures choses à faire que la chasse au trésor."
 academics.2108.t: "Une nouvelle collection archéologique"
 academics.2108.d: "Le directeur du musée a exprimé sa joie que ses préoccupations concernant les nouveaux artefacts ont été entendues et ont informé ses amis du [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] que le musée organisera bientôt une nouvelle exposition."
 academics.2108.f: "L'entreprise remercie le gouvernement d'avoir aidé à accroître la réputation scientifique du pays. Les nombreux nouveaux artefacts sont une expression du talent artistique et de la recherche de recherche infatigable des meilleurs hommes et femmes de ce pays. \ N \ nsigned, les membres du [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2108.g: "Succès!"
 academics.2109.t: "Déception archéologique"
 academics.2109.d: "Frappé, consterné et choqué par la négation de ses préoccupations urgentes, le directeur du musée s'est retiré dans son bureau, en pleurant, en verrouillé et en refusant de parler à quiconque."
 academics.2109.f: "Bravo, bravo. La dernière fois que le directeur du musée était dans cet état, il s'est presque jeté par la fenêtre. C'est vraiment insensible à la façon dont certains représentants du gouvernement agissent. Il voulait juste des artefacts. Quelques petits artefacts terminaux. Il n'a rien au monde que quelques statuettes poussiéreuses et des vases cassés! J'espère que vous êtes heureux maintenant. Le pauvre est dévasté. \ N \ nsigned, les membres du [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] \""
 academics.2109.g: "Échec ..."
 academics.2104_goal_tt: "Vous devrez collecter #p 25#! égyptien [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] en #n 15#! ans."
 academics.2105_goal_tt: "Vous devrez collecter #p 25#! Mesopotamian [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] en #n 15#! ans."
 academics.2106_goal_tt: "Vous devrez collecter #p 25#! Aegean [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] en #n 15#! ans."
 academics.2107_goal_tt: "Vous devrez collecter #p 25#! précolombien [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] en #n 15#! ans."
 je_academics_found_archaeological_museum: "Concentrez-vous sur l'archéologie: trouvé un musée"
 je_academics_found_archaeological_museum_reason: "Le [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] veut que nous construisions un musée archéologique pour améliorer les connaissances, mais aussi la norme vivante de nos intellectuels. Construire un musée exige #p 5#! [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')], qui doit être trouvé par un [concept_lepsius_archaeologist] sur un [concept_lepsius_expedition], si nous n'avons pas la chance scandaleuse de les acquérir par un cadeau aléatoire ou une fouille locale. \ Nit est également très important parce que le slogan archéologique professionnel `` cela appartient à un musée! '' N'aurait pas beaucoup de sens sans un véritable musée. \ n \ nin fait, ce serait assez embarrassant."
 je_academics_egyptian_artifacts: "Focus sur l'archéologie: artefacts égyptiens"
 je_academics_egyptian_artifacts_reason: "Le [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] veut que nous trouvions au moins #p 25#! égyptien [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')], qui doit être trouvé par un [concept_lepsius_archaeologist] sur un [concept_lepsius_expedition] ou [concept_lepsius_excavation], si nous n'avons pas la chance scandaleuse de les acquérir par un cadeau aléatoire ou une excavation locale."
