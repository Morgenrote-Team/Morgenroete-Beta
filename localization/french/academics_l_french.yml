 academics.1010.t: "Étudier les femmes?"
 academics.1010.d: "Quelques femmes ont postulé pour étudier dans l'une de nos universités. Maintenant, la question se pose de savoir s'il leur est légal d'étudier et quelle est la position officielle de nos gouvernements sur l'étude des femmes."
 academics.1010.f: "\ \"Les cerveaux des femmes ne sont pas faits pour des pensées logiques mais plutôt pour les émotions. Ils ne devraient pas être autorisés à étudier! \" \ N \ n \ \"Vous avez juste peur qu'une femme devienne un scientifique plus compétent que vous. Ce qui se produira certainement, car vos arguments manquent de fondation scientifique! Laissez les femmes étudier dans les mêmes conditions que les hommes! \""
 academics.1010.g: "Laissez-les étudier!"
 academics.1010.h: "Attendez, ils n'ont pas pu étudier jusqu'à présent?"
 academics.1010.i: "Les femmes appartiennent au foyer!"
 academics.1011.t: "Une brillante femme scientifique"
 academics.1011.d: "[SCOPE.sCharacter('academics_female_scientist').GetFullName] est diplômé au sommet de sa classe dans l'une de nos universités. Dans un domaine dominé par les hommes, elle a pu terminer ses études en temps record et est impatient de commencer à travailler dans son domaine. C'est une brillante ..."
 academics.1011.f: "Mes sincères félicitations à vous pour votre diplôme incroyable! Qui aurait pensé cela possible pour une femme!"
 academics.1011.g: "...Ingénieur"
 academics.1011.h: "...Astronome"
 academics.1011.i: "...Naturaliste"
 academics.1011.j: "...Paléontologiste"
 academics.1011.k: "... archéologue"
 academics.1011.l: "...Anthropologiste"
 academics.1011.m: "Nous n'avons pas besoin d'elle."
