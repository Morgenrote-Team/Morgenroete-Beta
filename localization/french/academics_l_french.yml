 je_academics_first_railway: "Focus sur l'industrie: construire le premier chemin de fer de [SCOPE.GetRootScope.GetCountry.GetName]"
 je_academics_first_railway_reason: "Maintenant que l'invention du chemin de fer s'est répandue au [SCOPE.GetRootScope.GetCountry.GetName], bon nombre de nos industriels veulent que nous construisions un tel appareil pour faciliter le transport des marchandises. Cela nous aiderait à devenir une puissance industrielle."
 academics.2400.t: "Nous avons besoin de chemins de fer!"
 academics.2400.d: "Les chemins de fer permettent de transporter les marchandises plus facilement. Par conséquent, les capitaines de l'industrie du [SCOPE.GetRootScope.GetCountry.GetName] exigent la construction d'un chemin de fer dans notre pays au cours des 5 prochaines années."
 academics.2400.f: "\"We are still transporting our products on dirtroads and rivers. This situation is unacceptable. If we had a better way to transport goods and resources our profits would skyrocket and we could build more factories which would result in better living conditions for everyone. Build a railway now!\""
 academics.2400.g: "Pouvons-nous le construire?"
 academics_industrialists_happy_modifier: "Les industriels satisfaits"
 academics_industrialists_discontent_modifier: "Mécontentement industriel"
 academics_first_railway_modifier: "Premier chemin de fer"
 academics.2401.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_railway_line_title_custom_loc')]"
 academics_spanisch_broetli_title_loc: "Spanisch-Brötli-Bahn"
 academics_ferrovia_torino_genova_title_loc: "Ligne ferroviaire Turin-Gênes"
 academics_generic_title_loc: "La première ligne de chemin de fer de [SCOPE.GetRootScope.GetCountry.GetName]"
 academics.2401.d: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_railway_line_desc_custom_loc')]"
 academics_spanisch_broetli_desc_loc: "La Suisse a établi sa première connexion en train de la ville de Zurich à la ville de Baden. Espérons que cette route ferroviaire facilitera le transport de marchandises, de personnes et de courrier et de stimuler les industries de Baden et de Zurich. Au moins, cela permet à la riche gentry de Zurich d'envoyer leurs serviteurs à Baden le matin, d'obtenir une fraîcheur Spanisch Brötli, un célèbre rouleau de pain sucré fabriqué par un célèbre boulanger à Baden. Les industriels sont très heureux de cette nouvelle ligne de chemin de fer."
 academics_ferrovia_torino_desc_title_loc: "Le Ferrovia Torino-Genova a été officiellement ouvert en présence de [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullNameNoFormatting]. La ligne de train de Torino à Gênes est un chef-d'œuvre de l'ingénierie italienne. La ligne à double piste mesure 169 kilomètres de long, a plus de 30 ponts et, avec le tunnel Giovi de 3259 mètres de long, il a le plus long tunnel au monde. \ Nhopes, la ligne de train rendra le mouvement des marchandises et des passagers entre Torino et Génova plus rapidement et contribuera au développement de notre industrie. De toute évidence, nos capats de l'industrie sont ravis de cette première ligne de chemin de fer."
 academics_generic_desc_loc: "The construction of our first railway line was neither easy nor cheap. But thanks to superior [SCOPE.GetRootScope.GetCountry.GetAdjectiveNoFormatting] engineering it was finished in record time. The Industrialist are very happy as this line provides them with a fast way to move their goods and resources."
 academics.2401.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_railway_line_flavor_custom_loc')]"
 academics_spanisch_broetli_flavor_loc: "The mouth watering smell of a Spanisch Brötli rises to your nose. The delicious pastry was delivered with the first train of Switzerland, connecting Zürich to the town of Baden.\n\n#b Historically#! the railway from Zürich to Baden was finished in 1847, shortly before the Swiss civil war, the \"Sonderbundskrieg\" occurred. There were 4 locomotives that allowed four connections per day. They were able to travel the 23 kilometers in about 45 minutes. The Schweizerische Nordbahn, as it was officially named, had little economic success and soon expansion plans to Aarau were scraped and one of the daily services was dropped.\n\nA reconstruction of the \"Spanisch-Brötli-Bahn\" exists and is sometimes operated as a historic train on the modern railway tracks in Switzerland."
 academics_ferrovia_torino_genova_flavor_loc: "L'archevêque de Gênes a baptisé la première locomotive. Puis le géant a commencé à s'éloigner. C'était le premier train qui voyageait de Gênes à Torino. Il a été commandé par le roi Carlo Alberto I le 18 juillet 1844. Avant que la ligne ne soit terminée, les premières parties de la ligne ont été successivement ouvertes en une seule piste. Le 6 décembre 1853, la ligne a été officiellement ouverte. \ N La ligne de chemin de fer est rapidement devenue la ligne la plus utilisée en Italie. Surtout parce qu'il a permis le transport de marchandises du port de Gênes. En 1889, une ligne alternative a été construite sur le col de Giovi, avec des gradients inférieurs à l'ancienne ligne. \ N1898, l'équipe de train a suffoqué dans le tunnel Giovi et la locomotive s'est poursuivie sans conducteur. Il a percuté un train en attente et un total de 13 personnes ont été tuées. En conséquence, la ligne a été électrifiée."
 academics_generic_flavor_loc: "\"Il était aussi grand temps que nous ayons notre propre voie ferrée! Nous sommes loin derrière nos concurrents! Maintenant, nous pouvons enfin transporter tous nos produits de manière décente!\""
 academics.2401.g: "Oui nous le pouvons!"
 academics.2402.t: "Nous n'avons pas réussi à construire notre première ligne de chemin de fer"
 academics.2402.d: "Cela fait 5 ans que les industries nous ont demandé de construire la première ligne de chemin de fer de notre pays. Nous n'avons pas pu terminer la ligne à temps. Cela affectera sûrement la vision des industriels de notre gouvernement."
 academics.2402.f: "\"You can't even build a railway line. Your government is an absolute failure. Shame on you!\""
 academics.2402.g: "Non, nous ne pouvions pas"
