 academics.2301.t: "Fantastique collection fossile"
 academics.2301.d_rival: "Nous avons rassemblé une plus grande collection de [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] que notre rival [ROOT.Var('je_fossil_rival_nation_var').GetCountry.GetName]. Le [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] et notre population sont enthousiasmés par cette victoire de notre nation!"
 academics.2301.d_rival_gone: "Notre rival dans notre quête d'une énorme collection fossile a disparu. Le [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] et notre population sont enthousiasmés par cette victoire de notre nation!"
 academics.2301.f: "Il était clair dès le début que nous avions besoin d'une plus grande collection fossile que notre rival. Maintenant que nous avons collecté tant de fossiles du Cambrien jusqu'au quaternaire et de l'Amérique aux îles du Pacifique, nous avons vraiment une collection digne! De toute évidence, cela aurait dû être le cas il y a des années, et nous devrions exands encore plus cette collection. Pour le moment, la situation est \ \"assez bonne \", comme le disent les paysans. \ N \ nsigned, les membres du [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2301.g: "Cela met fin à cette querelle!"
 academics.2302.t: "Nous n'avons pas réussi à rassembler plus de fossiles que [ROOT.Var('je_fossil_rival_nation_var').GetCountry.GetName]"
 academics.2302.d: "Nous n'avons pas pu étendre notre collection de fossiles plus loin que nos rivaux en [ROOT.Var('je_fossil_rival_nation_var').GetCountry.GetName]. Les membres du [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] ne sont pas amusés."
 academics.2302.f: "Leur collection s'étend sur les éons, ils ont tout et nous avons des rochers poussiéreux avec des fossiles très visibles ... c'est horrible. C'est une période honteuse pour notre nation! Dégoûtant. \ N \ nthe [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2302.g: "Je n'ai pas besoin de vieux rochers de toute façon ..."
