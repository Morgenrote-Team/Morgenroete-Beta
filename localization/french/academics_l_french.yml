 academics.21.t: "Notre [concept_gaudi_engineer] est mort"
 academics.21.d: "Après avoir travaillé des décennies en tant que [concept_gaudi_engineer], notre ancien #b #ORANGE Ingénieur en chef #! #! est mort. Pourrons-nous remplacer un génie de son calibre ? "
 academics.21.g: "C'est une énorme perte!"
 academics.21_tt: "De manière aléatoire le jeu tue des personnages. Un mod ne peut pas empêcher cela d'arriver. Ce message enlève le rôle de ce scientifique ou artiste du jeu, pour que vous ne soyez pas hanté par leur fantôme."
