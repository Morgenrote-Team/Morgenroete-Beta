 ademics_our_own_dinosaur_modifier: "Notre nouveau dinosaure"
 ademics_no_dinosaur_modifier: "Pas de dinosaure"
 academics.2303_goal_tt: "Construire #G 1#! [concept_dubois_dinosaur_skeleton]"
 academics.2303_reward_tt: "En récompense, l'intelligence obtiendra #p 5 Approval#! et vous obtiendrez #p 5% #! plus de prestige pendant 4 ans. Nous obtiendrons également un investissement technologique moyen."
 je_academics_giant_of_the_past: "Focus paléontologique: géant du passé"
 je_academics_giant_of_the_past_reason: "L' [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] a demandé à collecter [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] et à reconstruire un [concept_dubois_dinosaur_skeleton]. Dans quelle condition il se trouve reste secondaire - l'essentiel est que nous avons une pièce opulente dans notre collection. Les os de dinosaures se trouvent dans de grandes formations. Si nous n'en avons pas sur notre territoire, un [concept_dubois_paleontological_licence] serait avantageux pour que notre paléontologue puisse chercher à l'étranger."
 academics.2303.t: "Géant du passé"
 academics.2303.d: "Certains scientifiques de premier plan ont déploré qu'en dépit de nos avancées paléontologiques, nous n'avons pas encore affiché un squelette de dinosaure complet. Notre société scientifique a également profondément regretté cette malheureuse situation dans une lettre et aimerait voir cette situation corrigée."
 academics.2303.f: "Nous voulons un dinosaure, et nous le voulons maintenant! \ N \ nsigned, les membres du [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2303.g: "Une excellente initiative!"
 academics.2303.h: "Ce n'est pas un parc d'attractions pour les petits garçons, mais un institut scientifique."
 academics.2304.t: "Le grain de lézard"
 academics.2304.d: "Le nouveau dinosaure est le morceau le plus spectaculaire de la collection paléontologique. Chaque jour, les nouveaux visiteurs affluent vers l'exposition pour voir le squelette."
 academics.2304.f: "Pouvons-nous en avoir un autre? \ N \ nsigned, les membres du [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2304.g: "Notre propre dinosaure!"
 academics.2305.t: "Pas de lézard"
 academics.2305.d: "La plate-forme réservée au squelette dinosaure prévu reste vide. La société scientifique a réagi à cela avec une grande irritation."
 academics.2305.f: "Devons-nous être encore plus clairs? \ N \ nsigned, les membres du [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2305.g: "Trouvez un autre jouet!"
 academics.2306_goal_tt: "Trouver #G 3#! #O Fossiles spéciaux #!"
 academics.2306_reward_tt: "En récompense, notre [concept_dubois_paleontologist] obtiendra #p 50 Experience#! Si nous n'avons pas encore de [concept_dubois_paleontologist], nous en obtiendrons un. Nous obtiendrons également un grand investissement technologique."
 je_academics_special_fossils: "Focus paléontologique: fossiles spéciaux"
 je_academics_special_fossils_reason: "Les fossiles spéciaux sont des fossiles uniques qui sont traités séparément en raison de leur statut exceptionnel. Il s'agit notamment des formes de transition telles que l'archéopteryx ou l'ichthyostega, mais aussi de grandes espèces de mammifères éteints tels que le mégatherium paresseux géant ou l'Ichthyosaurus semblable à des dauphins. Mais les petits fossiles qui sont utilisés pour définir une époque - les plus connus sont les ammonites et les trilobites - appartiennent également à cette catégorie. Au total, il existe une douzaine de fossiles spéciaux qui peuvent être trouvés non seulement dans les formations mais aussi sur les expéditions scientifiques."
 je_academics_special_fossils_success: "Trouver #G 3#! #O Fossiles spéciaux #!"
 academics.2306.t: "Fossiles extraordinaires"
 academics.2306.d: "La société scientifique a une demande extraordinaire de nous concernant des fossiles extraordinaires."
 academics.2306.f: "L'histoire de l'ascendance animale est un secret de la nature que nos chercheurs révèlent un peu plus chaque jour. Un rôle spécial est joué par les formes qui se trouvent aux seuils entre les espèces, les soi-disant «liens manquants». En même temps, il y a des créatures extraordinaires sur notre planète qui n'ont pas à être des dinosaures pour impressionner: des mammifères éteints tels que des tigres à dents de sabre ou des paresseux géants. Si nous collectons au moins 3 fossiles spéciaux, nous pourrions renforcer davantage la réputation de notre institut dans le monde. \ N \ nsigned, les membres du [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2306.g: "Special Fossils for a special collection."
 academics.2306.h: "Ne pouvons-nous pas concentrer nos capacités scientifiques sur quelque chose de plus significatif?"
 academics.2307.t: "Généraire de fossiles étonnants"
 academics.2307.d: "Il ne fait aucun doute que l'Institut national paléontologique a l'une des collections internationales les plus importantes. Il n'y a pratiquement aucun endroit comparable avec de telles pièces extraordinaires."
 academics.2307.f: "Les fossiles spéciaux peuvent ne pas toujours être aussi impressionnants qu'on pourrait d'abord le penser, mais ils ont une grande valeur scientifique. La société scientifique a donc envoyé une lettre de remerciement. Il y aura une exposition spéciale dans les prochains jours."
 academics.2307.g: "Magnifique."
 academics.2308.t: "Déception particulière"
 academics.2308.d: "La société scientifique a exprimé sa consternation face à la dernière défaillance paléontologique."
 academics.2308.f: "C'est une tragédie nationale que les préoccupations d'histoire naturelle du pays sont complètement ignorées. La recherche paléontologique est rejetée comme un non-sens sur les oiseaux morts et les lézards, les paiements de soutien aux expéditions spéciales sont rarement effectués et même les plus petits voeux sont ignorés. J'Asccuse! \ N \ nsigned, les membres du [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2308.g: "Oh cher."
 ademics_no_paleontological_hero_modifier: "Aucun héros de la paléontologie"
 academics.2309_goal_tt: "Avoir un #o célèbre#! [concept_dubois_paleontologist]"
 academics.2309_reward_tt: "En récompense, nous gagnerons #p 120#! [concept_academics_progress]."
 je_academics_famous_paleontologist: "Focus paléontologique: le célèbre paléontologue"
 je_academics_famous_paleontologist_reason: "La montée d'un [concept_dubois_paleontologist] s'accompagne de l'amélioration de son expérience. Comme tous les universitaires, un paléontologue reçoit 5 points d'expérience par an. Il acquiert une expérience supplémentaire dans une recherche paléontologique réussie des formations. De plus, un paléontologue peut être utilisé sur les expéditions d'alpinisme et les expéditions du Pacifique. La construction et la réassemblage avec succès des squelettes de dinosaures contribuent également à améliorer l'expérience d'un paléontologue."
 academics.2310.g: "Une inspiration pour les jeunes."
 academics.2311.t: "Aucun héros de la paléontologie"
 academics.2311.d: "Pour une raison quelconque, nous n'avons pas été en mesure de promouvoir un paléontologue et de le laisser atteindre la renommée mondiale."
 academics.2311.f: "Malheureusement, l'échec a signifié que les disciplines scientifiques continuent d'être rejetées comme des sujets d'orchidées et que l'enthousiasme pour les études académiques et l'entrée dans le service de recherche actif est limité. Les membres du [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] ressentent l'insatisfaction dans les conversations. L'élite intellectuelle blâme le gouvernement pour cette situation."
 academics.2311.g: "Décevant."
 academics_splendid_dinosaur_collection_modifier: "Splendide collection de dinosaures"
 academics.2312_goal_tt: "Avoir une évaluation #o Dinosaur#! d'au moins #G 5 #!"
 academics.2312_reward_tt: "En récompense, l'intelligence obtiendra le #p 5 Approval#!. en outre, vous obtiendrez #p 10% #! plus de prestige et le coût de la technologie de la société sera réduit de #p 5% #! pendant 10 ans."
 je_academics_dinosaur_rating: "Focus paléontologique: note de dinosaure"
 je_academics_dinosaur_rating_reason: "Afin d'améliorer la notation #O Dinosaure#!, non seulement de nouveaux squelettes de dinosaures sont nécessaires, mais aussi une reconstruction parfaite. Cela peut prendre des années. Le [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] a donc décidé de ne pas définir de limite de temps."
 je_academics_dinosaur_rating_success: "Avoir une évaluation #o Dinosaur#! d'au moins #G 5 #!"
 academics.2312.t: "La splendeur de la paléontologie"
 academics.2312.d: "La branche paléontologique de notre recherche scientifique a déjà une bonne réputation. Il est maintenant temps de le faire connaître dans le monde entier en améliorant considérablement notre exposition de dinosaures."
 academics.2312.f: "Nous aimerions peut-être montrer un dinosaure différent dans notre exposition. Un plus grand nombre de squelettes bénéficieraient non seulement de la recherche scientifique, mais aussi de notre réputation nationale. Le monde entier creuse pour les os de dinosaures et est fasciné par la préhistoire inconnue auparavant. Il ne devrait pas être seulement une question de quantité, mais aussi de la qualité. Nous devons viser à être le précurseur dans la reconstruction du squelette de dinosaure. \ N \ nsigned, les membres du [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2312.g: "Ce sera une entreprise colossale!"
 academics.2312.h: "Pas à nouveau ce non-sens paléontologique."
 academics.2313.t: "Une splendide collection"
 academics.2313.d: "La Scientific Society était fière d'annoncer aujourd'hui une exposition spéciale de squelettes de dinosaures."
 academics.2313.f: "Nous sommes profondément redevables au gouvernement d'avoir finalement eu une collection de dinosaures qui souligne le niveau élevé de recherche paléontologique dans notre pays. Il n'y a pratiquement plus de collections exquises que celle-ci. Il a fallu beaucoup de travail acharné et d'efforts, ainsi qu'une soif de recherche et de persévérance. La société peut examiner ce travail avec Pride, tandis que l'étranger le regarde avec envie. Gentleman: C'est un grand jour pour la science en général et la paléontologie en particulier! \ N \ nsigned, les membres du [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2313.g: "Merveilleux!"
 academics_royalist_reaction_modifier: "Réaction royaliste"
 academics_royalist_weakness_modifier: "Faiblesse royaliste"
 academics_constitution_suspended_modifier: "StaatsgrundgeSetz suspendu"
 academics_constitution_confirmed_modifier: "StaatsgrundgeSetz a confirmé"
 academics_academic_purge_modifier: "Purge académique \ n #R -1#! #o Progress académique #!"
 academics_good_to_be_british_modifier: "C'est bon d'être britannique"
 academics_supported_hanover_modifier: "Soutenu Hanover"
 academics_supported_goettinger_seven_modifier: "GOETTINER SOUPEND"
 academics_kneeling_decree_modifer: "Décret à genoux"
 academics_germanistentag_modifier: "Congrès des germanistes"
 je_goettinger_seven_monument: "Sept monuments de Göttingen"
 je_goettinger_seven_monument_reason: "Une nation allemande unie pourrait honorer la mémoire des Göttingen Seven - à condition que la principale puissance unificatrice les a déjà défendues. Un monument inspirerait des générations d'universitaires! Bien sûr, cela suppose que le gouvernement allemand partage les idées libérales des professeurs légendaires."
 academics.3101.t: "La Constitution de Hanover"
 academics.3101.d: "En tant que l'un de ses premiers actes officiels, le roi a annoncé qu'il abolirait la Constitution, les soi-disant Staatsgrundgesetz («loi fondamentale de l'État»). Ernest Augustus a souligné qu'il ne se sent pas lié."
 academics.3101.f: "Hanover avait reçu sa première constitution, accordée par le prince régent, en 1819; Cela n'a rien fait de plus que de dénoter le changement de Hanover d'un électorat à un royaume, garanti par le Congrès de Vienne. Le duc de Cambridge, en tant que vice-roi du roi William à Hanovre, a recommandé une réorganisation approfondie du gouvernement hanovrien. William IV avait donné son consentement à une nouvelle constitution en 1833; Le consentement du duc de Cumberland n'a été ni demandé ni reçu, et il avait officiellement protesté contre l'adoption de la Constitution sans son consentement. Immédiatement à son arrivée à Hanovre, le roi a dissous le parlement hanovrien, qui avait été convoqué dans le cadre de la constitution contestée. Il a proclamé la suspension de la Constitution, au motif que son consentement n'avait pas été demandé et qu'il ne répondait pas aux besoins du Royaume."
 academics.3101.g: "Suspendre la Constitution."
 academics.3101.h: "Le roi n'est pas au-dessus des lois."
 academics.3102.t: "Les Göttingen Seven"
 academics.3102.d: "L'historien et politicien Friedrich Christoph Dahlmann a contesté les plans d'Ernest de changer la constitution à son goût, car Dahlmann lui-même avait contribué au cadrage de la Constitution. Six autres professeurs célèbres de l'Université de Göttingen ont rejoint la manifestation et ont défendu la Constitution de 1833. Bientôt, les hommes étaient connus sous le nom de «Göttingen Seven» - et ont été une nuisance pour le roi."
 academics.3102.f: "Le document de Dahlmann a rencontré une influence explosive - les étudiants de l'université ont produit plusieurs centaines, voire des milliers d'exemplaires et les ont diffusés à travers l'Allemagne. Les six autres manifestants étaient les frères allemandistes Wilhelm et Jacob Grimm (célèbres scénaristes et conteurs de conte de fées et conteurs, connus ensemble sous le nom de frères Grimm), le juriste Wilhelm Eduard Albrecht, l'historien Georg Gottfried Gervinus, le physicien Wilhelm Eduard Weber, et le et l'origine et orientaliste Heinrich Georg. L'impact de la manifestation a forcé le roi à prendre des mesures et les sept professeurs provocants ont été interrogés devant le tribunal universitaire."
 academics.3102.g: "Ils devraient être retirés de leurs positions et être bannis!"
 academics.3102.h: "Céder à leurs demandes avant que la situation ne dégénère."
 academics.3103.d: "Après l'adhésion de la reine Victoria au trône au Royaume-Uni, il y a eu une certaine tristesse à la perte de l'union personnelle avec Hanover qui avait duré plus de 120 ans. Mais après les derniers événements en Allemagne, vous pouvez dire en toute confiance: c'est bien que nous allions séparer."
 academics.3103.f: "Quelques mois seulement après l'adhésion du nouveau roi au trône, Hanover a dissous la Constitution qui avait été émise sous le régime britannique. Le nouveau roi Ernest Augustus fait maintenant face à toute une opposition des universitaires. Les gens parlent déjà de ce différend dans toute l'Allemagne. Vraiment, dès qu'un pays quitte la sphère britannique bénéfique d'influence, elle tombe dans la barbarie."
 academics.3103.g: "C'est tellement bon d'être britannique."
 academics.3104.d: "Les États de la Confédération allemande sont ébranlés par le conflit entre le roi de Hanovre et sept professeurs récalcitrants: après que le roi Ernest Auguste a aboli la Constitution, les «Göttingen Seven» se sont rebelles contre lui. Ils ont perdu leurs positions - mais ont gagné beaucoup de sympathie dans le camp allemand libéral."
 academics.3104.f: "L'historien et politicien Friedrich Christoph Dahlmann a contesté les plans d'Ernest de changer la constitution à son goût, car Dahlmann lui-même avait contribué au cadrage de la Constitution. Six autres professeurs célèbres de l'Université de Göttingen ont rejoint la manifestation et ont défendu la Constitution de 1833. Les six autres manifestants étaient les frères allemandistes Wilhelm et Jacob Grimm (célèbre contes de fées et contes de contes folk Eduard Weber et théologien et orientaliste Heinrich Georg August Ewald. Les effets directs de la manifestation étaient limités, mais la sensation publique et l'intérêt des médias étaient élevés en Allemagne et en une grande partie de l'Europe, et les sept étaient populaires parmi le grand public."
 academics.3104.g: "Avec tout le respect que je vous dois, le roi est allé trop loin."
 academics.3104.h: "Cette racine académique a reçu sa punition juste."
 academics.3105.t: "Un débat houleux sur Hanover"
 academics.3105.d: "Le conflit avec le «Göttinger Seven» n'est pas passé inaperçu dans les autres États de la Confédération allemande. Même en Grande-Bretagne, les gens sont irrités que le roi ait abrogé la Constitution."
 academics.3105.f: "[SCOPE.sCountry('academics_anti_hanover_country').GetName] est l'un des nombreux États allemands qui ont critiqué les actions d'Ernest Augustus. Mais il y a encore des pays, en particulier ceux qui ont un régime autoritaire, qui ont montré une compréhension du processus. Il s'agit notamment de [SCOPE.sCountry('academics_pro_hanover_country').GetName]."
 academics.3105.g: "Ce ne sont pas leurs affaires!"
 academics.3106.t: "Propagande des étudiants"
 academics.3106.d: "Malgré tous les efforts de l'État pour empêcher la propagation de la propagande en faveur des «Göttingen Seven», les cercles étudiants libéraux ont réussi à distribuer des tracts à grande échelle dans les grandes villes."
 academics.3106.f: "Souvenez-vous de nos héros! Rappelez-vous le Göttingen Seven! Louez leurs vertus! Lorsque le professeur Dahlmann a publié ses documents contre le roi de Hanover, il a reçu le soutien populaire des étudiants et des libéraux allemands. Il a eu une influence explosive dans les États de la Confédération allemande. Les étudiants de l'Université de Göttingen ont produit plusieurs centaines, voire des milliers de copies et les ont diffusés à travers l'Allemagne."
 academics.3106.g: "Ce pack d'étudiants rodaux!"
 academics.3107.t: "Jacob Grimm dans [ROOT.GetCountry.GetNameNoFlag]"
 academics.3107.d: "Après avoir été banni de Hanovre, le célèbre érudit et avocat allemand Jacob Grimm cherche une nouvelle maison. Nos sympathies pour les «Göttinger Seven» lui se sont propagées, c'est pourquoi il espère un nouvel emploi."
 academics.3107.f: "Jacob Ludwig Karl Grimm était un auteur allemand, linguiste, philologue, juriste et folkloriste. Il a formulé la loi de linguistique de Grimm et a été co-auteur de la Deutsches Wörterbuch, l'auteur de Deutsche Mythologie, et le rédacteur en chef de Grimms 'Fairy Tales. Il était le frère aîné de Wilhelm Grimm; Ensemble, ils étaient le duo littéraire connu sous le nom de Brothers Grimm."
 academics.3107.g: "Accueille-le."
 academics.3107.h: "Nous n'avons pas besoin d'un autre universitaire grincheux."
 academics.3108.t: "Wilhelm Eduard Weber dans [ROOT.GetCountry.GetNameNoFlag]"
 academics.3108.d: "Après avoir été banni de Hanover, le célèbre physicien Wilhelm Eduard Weber cherche une nouvelle maison. Nos sympathies pour les «Göttinger Seven» lui se sont propagées, c'est pourquoi il espère un nouvel emploi."
 academics.3108.f: "Wilhelm Eduard Weber était un physicien allemand et, avec Carl Friedrich Gauss, inventeur du premier télégraphe électromagnétique."
 academics.3111.t: "Le Grimm"
 academics.3111.d: "Les frères Jacob et Wilhelm Grimm ont présenté le premier volume d'un dictionnaire allemand qui vise à couvrir l'ensemble du vocabulaire allemand. Une tâche gigantesque, mais qui rapproche encore la nation culturelle allemande."
 academics.3111.f: "Das Deutsche Wörterbuch (le dictionnaire allemand) est l'un des dictionnaires les plus importants de la langue allemande. C'est pour l'allemand ce que le dictionnaire d'anglais Oxford est pour l'anglais, contenant des informations historiques détaillées sur l'origine et l'utilisation au fil du temps des mots allemands, avec des exemples tirés de documents réels. En allemand, le dictionnaire est également connu sous le nom de «der Grimm». Il a été lancé par les frères Grimm en 1838. Au début, ils s'attendaient à ce que le projet prenne dix ans et produit 6 ou 7 volumes. En fait, le premier volume n'a été publié qu'en 1854. Wilhelm Grimm est décédé en 1859 et Jacob en 1863, tout en travaillant sur l'entrée pour «frucht» (fruit). Après leur mort, plusieurs institutions ont été impliquées dans les travaux, notamment l'Académie prussienne des sciences et la Berlin Academy, avec un centre de Göttingen également impliqué. Enfin terminé en 1961, le dictionnaire contiendra 32 volumes et comprendra environ 350 000 entrées principales. Le «Grimm» n'était pas seulement un travail scientifique, mais aussi national."
 academics.3111.g: "Cela devrait être publié dans tous les États allemands!"
 academics.3112.g: "J'espérais qu'ils ont fait un nouveau livre de conte de fées au lieu de cela ..."
 academics.3113.t: "Premier Germanistentag à Francfort"
 academics.3113.d: "Plusieurs intellectuels allemands ont invité des personnes partageant les mêmes idées à une conférence à Francfort, le jour des «Germanistes». Alors que beaucoup veulent voir ce rassemblement comme un simple événement culturel, le message politique est tout aussi clair."
 academics.3113.f: "Les «jours allemandistes» étaient, contrairement à ce que le nom suggère, pas un événement uniquement pour les allemandistes. Ils ont été une initiative des scientifiques de l'université allemand dans le cadre du développement d'un sentiment national allemand. Contrairement à aujourd'hui, le terme études allemandes avait un sens plus large dans le Vormärz: il a lié les historiens, les avocats et les linguistes et les érudits littéraires qui ont traité l'histoire allemande, le droit allemand et la langue allemande. Lors de la première journée des allemandistes, initiée à Francfort en 1846 par l'avocat de Tübingen August Ludwig Reyscher, Friedrich Christoph Dahlmann, Georg Waitz et Johann Gustav Droysen ont parlé de l'indivisibilité de Scheleswig-Holstein. Jacob Grimm a parlé de la «valeur des sciences imprécises», son frère Wilhelm a parlé du dictionnaire allemand. Les conférences ont eu lieu dans le Römer à Francfort. Un deuxième jour des allemandistes a suivi à Lübeck en 1847. Le troisième jour des allemandistes, qui devait avoir lieu à Nuremberg en 1848, n'a pas eu lieu en raison de la révolution de mars."
 academics.3113.g: "L'Allemagne est une nation culturelle."
 academics.3113.h: "Leurs idéaux libéraux sont un guide pour nous."
 academics.3115.t: "Controverse à genoux"
 academics.3115.d: "Avec les annexions des terres environnantes à l'ère napoléonienne, la Bavière a gagné de grands territoires qui étaient protestants. En ce temps, le roi a promu un politique plus tolérant envers ses sujets. Un exemple était l'édit, que les soldats protestants n'avaient pas à se genoux devant une masse ou une procession catholique. Cependant, le ministre Karl von Abel a proposé de changer cela."
 academics.3115.f: "Le soi-disant conflit de véritables a eu lieu dans le Royaume de Bavière dans la première moitié du XIXe siècle. Il a commencé par un décret du ministre bavarois Karl von Abel, qui a également obligé les soldats protestants à authentifier devant le Saint-Sacrement pendant les services militaires. L'édit est devenu connu comme le «décret à genoux». Cela a conduit à un argument animé dans la chambre des députés qui a duré plusieurs années."
 academics.3115.g: "Nous sommes un pays catholique et les gens s'agenouillent ici!"
 academics.3115.h: "Mais qu'en est-il de nos compatriotes protestants?"
