 academics.2104_reward_tt: "En récompense, nous gagnerons #p 5% Prestige#! pendant 5 ans, en outre le [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName] obtiendra #p 5 Approval#! et le coût de la technologie de production sera réduit de #p 5% #! pendant 3 ans. Notre archéologue obtiendra #p 15 Experience#!."
