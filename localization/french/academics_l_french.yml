 country_academics_decorative_can_promote_humanities_boolean_desc: "If you have at least one [GetBuildingType('building_university').GetName] with the [concept_pm_academics_university_humanities] you can promote a [concept_panum_physician], [concept_lepsius_archaeologist] or [concept_andersson_anthropologist] in the Academic Overview."
