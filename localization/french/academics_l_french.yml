 academics.2309.t: "L'ambition de [SCOPE.sCharacter('dubois_paleontologist_scope').GetFullName]"
 academics.2309.d: "Le professeur [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] est considéré comme une référence nationale dans le domaine paléontologique. La Société scientifique souhaite faire de [SCOPE.sCharacter('dubois_paleontologist_scope').GetHerHim] une personnalité de l'international sur le plan international afin d'utiliser [SCOPE.sCharacter('dubois_paleontologist_scope').GetHerHim] comme figure de proue académique."
 academics.2309.f: "Nous sommes arrivés à la ferme conclusion que notre collègue, le professeur [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastNameNoFormatting], serait idéalement adapté pour représenter notre nation comme un lieu scientifique. [SCOPE.sCharacter('dubois_paleontologist_scope').GetSheHe] devrait recevoir chaque soutien possible pour augmenter la réputation [SCOPE.sCharacter('dubois_paleontologist_scope').GetHerHim]. Cela motiverait les jeunes en particulier à poursuivre eux-mêmes une carrière scientifique. \ N \ nsigned, les membres du [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2309.g: "[SCOPE.sCharacter('dubois_paleontologist_scope').GetSheHe|U] will become famous."
 academics.2309.h: "[SCOPE.sCharacter('dubois_paleontologist_scope').GetSheHe|U] shouldn't become megalomaniac."
 academics.2310.t: "Gloire paléontologique"
 academics.2310.d: "Avec [SCOPE.sCharacter('dubois_paleontologist_scope').GetHerHis], la renommée en tant que paléontologue, [SCOPE.sCharacter('dubois_paleontologist_scope').GetFullName] est maintenant la figure de proue scientifique que la société scientifique voulait."
 academics.2310.f: "We are now receiving many new students who are inspired by the greatness and fame of Professor [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastNameNoFormatting]. [SCOPE.sCharacter('dubois_paleontologist_scope').GetSheHe|U] not only vitalized [SCOPE.sCharacter('dubois_paleontologist_scope').GetHerHis] own subject, but also fundamentally awakened a fascination for the sciences. Being a scientist is no more than a quirky career with few prospects, but rather an exciting job that promises fame and adventure.\n\nSigned, the members of the [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics_academy_promote_physician_loc: "[GetPlayer.GetName] fait actuellement la promotion d'un [concept_panum_physician]."
