 academics.109.f: ""
 academics.109.g: "Une vraie rock star!"
 academics.140.t: "Notre ingénieur, [ROOT.Var('tesla_engineer_var').GetCharacter.GetFullName], est maintenant ingénieur civil"
 academics.140.d: "Des années de travail en génie civil ont porté leurs fruits. Après avoir construit de nombreux ponts et tunnels, le Dr [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] est désormais considéré comme un vrai [concept_gaudi_civil_engineer]. Cela améliorera sûrement ses projets !"
 academics.140.f: ""
 academics.140.g: "L'ingénieur de notre avenir!"
 academics.141.t: "Notre ingénieur, [ROOT.Var('tesla_engineer_var').GetCharacter.GetFullName], est maintenant ingénieur en mécanique"
 academics.141.d: "Des années de travail avec des machines ont porté leurs fruits. Les nombreuses inventions et nouvelles machines, que le Dr [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] a créées l'ont finalement laissé devenir vrai [concept_gaudi_mechanical_engineer]. Nous espérons des projets plus impressionnants !"
 academics.141.f: ""
 academics.141.g: "Un vrai moteur du progrès!"
 academics.142.t: "Notre ingénieur, [ROOT.Var('tesla_engineer_var').GetCharacter.GetFullName], est maintenant un ingénieur militaire"
 academics.142.d: "Des années de travail pour l'armée ont porté leurs fruits. Après avoir construit des forteresses, construit de nouvelles armes et équipé nos soldats pendant des années, le Dr [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] est désormais considéré comme un [concept_gaudi_military_engineer] approprié. J'espère qu'il continuera à servir notre nation !"
 academics.142.f: ""
 academics.142.g: "Engineering les bases de nos militaires!"
 academics.143.t: "Notre ingénieur, [ROOT.Var('tesla_engineer_var').GetCharacter.GetFullName], est maintenant un ingénieur électricien"
 academics.143.d: "Exploiter le pouvoir de l'électricité a toujours été un rêve du Dr [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName]. Après de nombreuses percées dans ce domaine, [ROOT.Var('tesla_engineer_var').GetCharacter.GetSheHe] est désormais considéré comme un [concept_gaudi_electrical_engineer]."
 academics.143.f: ""
 academics.143.g: "Une étincelle de connaissances!"
 academics.144.t: "Notre ingénieur, [ROOT.Var('tesla_engineer_var').GetCharacter.GetFullName], est maintenant ingénieur aéronautique"
 academics.144.d: "Pendant longtemps, les humains ont rêvé de voler. Maintenant que l'ère du vol a commencé, le Dr [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] est à la pointe de l'ingénierie aéronautique. Après de nombreuses percées dans ce domaine, [ROOT.Var('tesla_engineer_var').GetCharacter.GetSheHe] est désormais considéré comme un [concept_gaudi_aeronautical_engineer]."
 academics.144.f: ""
 academics.144.g: "Envolons-nous!"
 notification_academics_yearly_experience_gain_notification_name: "Gain d'expérience annuel des universitaires"
 notification_academics_yearly_experience_gain_notification_desc: "Chaque universitaire qui peut acquérir de l'expérience gagne entre #p #! et #p 5#! d’expérience."
 dubois_humanities_receive_promotion_loc: "Les raideurs et les pilleurs de tombes ne contribuent en rien à notre société!"
 dubois_natural_history_receive_promotion_loc: "Pourquoi les collectionneurs de papillons et les constructeurs de monstres obtiennent-ils tout le financement et nous devons faire avec les restes?"
 dubois_mathematics_receive_promotion_loc: "Il est complètement absurde que les bricoleurs fous et ceux qui ne regardent que le ciel aient tous leurs souhaits exaucés, alors que nous devons faire avec des miettes!"
 academics_engineer_focus_atmospheric_engine_loc: "Nous essayons d'exploiter la puissance de la vapeur pour remplacer les travailleurs par des machines. Cela permettrait de réduire les coûts d'extraction des ressources ou de production !"
 academics_engineer_focus_computer_loc: "Nous essayons de construire une machine qui peut effectuer toutes sortes de calculs. Cela rendrait les calculateurs humains inutiles. Nous pourrions tout calculer avec la plus haute précision et sans erreurs!"
 academics_engineer_focus_washing_machine_loc: "Notre objectif est de créer une machine qui peut laver le linge sans avoir besoin de travail. Cela révolutionnerait notre société car nous n'aurions pas à perdre notre temps avec le lavage du linge sale!"
 academics_engineer_focus_lighter_loc: "Pouvez-vous imaginer à quel point un petit briquet de poche serait utile? Celui qui crée une grosse flamme et peut allumer des bougies ou des cigarettes? C'est une fortune qui attend d'être exploitée!"
 academics_engineer_focus_rocket_loc: "Nous voulons créer une fusée capable d'atteindre l'espace. Imaginez simplement les applications militaires d'une telle fusée. Vous pourriez frapper vos ennemis et ils ne pourraient rien faire contre ça!"
 academics_engineer_focus_telephone_loc: "Imaginez un appareil que vous pourriez utiliser pour parler à quelqu'un à grande distance! C'est ce sur quoi nous travaillons dans notre laboratoire en ce moment!"
 academics_engineer_focus_combustion_engine_loc: "Trains are great but they are huge and need rails. What if we could build a small motor that is able to propel a small vehicle. Everyone could travel everywhere. There are many useful applications of such a motor. And that is exactly what my team is working on right now!"
 academics_engineer_focus_basic_research_alloys_loc: "Nous effectuons des recherches fondamentales pour trouver autant d'alliages utiles que possible. Si nous trouvons les bons alliages, cela pourrait conduire à de meilleures constructions, des machines et des appareils plus efficaces qui sont considérés comme impossibles en ce moment!"
 academics_engineer_focus_basic_research_factory_machinery_loc: "My team is working on improving the machines used in factories. That could lead to a massive boost in our production and the wealth of our nation!"
 academics_engineer_focus_basic_research_housing_loc: "Nous examinons le moyen le plus efficace de construire des maisons pour créer un espace de vie à moindre coût. Cela pourrait aider la population à offrir de meilleures conditions de vie et stimuler notre secteur de la construction."
 academics_engineer_focus_basic_research_urban_planing_loc: "Nos villes ne sont pas assez efficaces. Par conséquent, nous devons découvrir comment rendre les villes plus efficaces pour élever le niveau de vie de notre population!"
 academics.2001.t: "Le [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] nous demande de nous concentrer sur la cartographie du ciel."
 academics.2001.d: "Notre nation n'a pas encore beaucoup de recherches astronomiques et nous n'avons même pas d'[concept_verrier_astronomer]. Par conséquent, le [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] veut que nous créions une nouvelle cartes des étoiles et que l'on nomme un astronome."
 academics.2001.f: "Le [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] vous demande d'augmenter votre engagement envers l'astronomie. Un tel objectif nous permettrait de gagner de nouvelles connaissances sur le ciel et l'univers, \n nous vous demandons donc, tout d'abord, de créer une nouvelle carte des étoiles mise à jour et, deuxièmement, de recruter un astronome. \n \n Signer, le Conseil du [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2001.g: "Ad astra!"
 academics.2001.h: "Des étoiles? Nous avons de meilleures choses à faire!"
 academics_unhappy_intelligentsia: "La société scientifique est malheureuse"
 academics.2001_goal_tt: "Vous devrez découvrir #p 75#! [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] et obtenir un [concept_verrier_astronomer] en #n 10#! ans."
 academics.2001_reward_tt: "En tant que récompense, votre astronome obtiendra #p 15 Expérience #!,, en outre, l'élite intellectuelle obtiendra #p 5 approbation#! et le coût des technologies de production sera réduit de #p 5% #! pendant 3 ans."
 je_academics_find_more_stars: "Focus sur l'astronomie: la carte des étoiles"
 je_academics_find_more_stars_reason: "Le [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] veut que nous trouvions [JournalEntry.GetGoalAddValue] nouveau [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] pour créer une nouvelle carte des étoiles et nommer un nouveau [concept_verrier_astronomer]. \n \n Pour l'instant, nous avons trouvé [JournalEntry.GetGoalProgressValue] #b objets astronomiques #!."
 je_academics_find_more_stars_success: "Trouver #p 75 #! Nouveau #b Objets spatiaux #!"
 je_academics_find_more_stars_event_tt: "Notre nouveau [concept_verrier_astronomer] présentera la nouvelle carte des étoiles"
 je_academics_find_more_stars_goal: ""
 academics.2002.t: "Le Dr [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] présente une nouvelle carte des étoiles"
 academics.2002.d: "Nous avons pu créer une nouvelle carte des étoiles et trouvé un nouveau [concept_verrier_astronomer]. La [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] sera heureuse!"
 academics.2002.f: "\"Cette nouvelle carte des étoiles est très précise ! Je l'ai comparée à celle des autres nations et la nôtre est évidemment supérieure. De plus, nous avons trouvé de nombreuses nouvelles étoiles, dont certaines sont assez fascinantes ! Celle-ci, par exemple, est plus rouge que d'habitude.\""
 academics.2002.g: "Hourra!"
 academics_scientific_society_happy: "La société scientifique est heureuse"
 academics.2003.t: "Notre concentration sur l'astronomie a échoué!"
 academics.2003.d: "Nous n'avons pas pu nous concentrer suffisamment sur l'astronomie pour atteindre les objectifs qui nous ont été donnés par la [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]. Ils ne seront pas heureux!"
 academics.2003.f: "\"Il semble que la guerre, l'économie, même le vin et l'alcool sont plus importants pour nos dirigeants que la science. Nous sommes déçus. J'espère que notre grande nation se reconcentrera sur la science !\""
 academics.2003.g: "Quel dommage !"
 academics.2004.t: "La [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] demande une nouvelle carte des étoiles de notre [concept_verrier_astronomer]"
 academics.2004.d: "Selon la [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')], notre nation doit se concentrer sur la cartographie du ciel. Ils ont demandé que l'[ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] trouve de nouvelles étoiles et autres [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] et de produire un nouvelle carte des étoiles."
 academics.2004_goal_tt: "Vous devrez découvrir #p 100#! [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] en #n 10#! ans."
 academics.2004_reward_tt: "En tant que récompense, votre astronome obtiendra #p 25 Experience#!,, en plus, l'intelligence obtiendra #p 5 approbation#! et le coût de la technologie de production sera réduit de #p 5% #! pendant 3 ans."
 je_academics_create_star_chart: "Focus sur l'astronomie: le graphique des étoiles de notre astronome"
 je_academics_create_star_chart_reason: "Le [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] veut que notre [concept_verrier_astronomer] trouve [JournalEntry.GetGoalAddValue] nouveau [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] pour créer un nouveau graphique d'étoiles. \ N \ nso loin nous avons trouvé [JournalEntry.GetGoalProgressValue] #b objets astronomiques#!."
 je_academics_create_star_chart_success: "Trouver #p 100#! Nouveau #b Objets astronomiques #!"
 je_academics_create_star_chart_event_tt: "Notre [concept_verrier_astronomer] présentera le nouveau tableau des étoiles."
 je_academics_create_star_chart_event_without_astronomer_tt: "Notre nouveau tableau des étoiles sera publié."
 je_academics_create_star_chart_failed_event_tt: "Notre [concept_verrier_astronomer] ne fournit pas le nouveau tableau des étoiles."
 je_academics_create_star_chart_failed_event_without_astronomer_tt: "Après avoir perdu [concept_verrier_astronomer], nous ne fournirons pas un graphique étoile."
 je_academics_create_star_chart_goal: ""
 academics.2005.t: "Le Dr [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] présente un nouveau tableau des étoiles"
 academics.2005.f: "Le Dr [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] était entouré de [ROOT.Var('verrier_astronomer_var').GetCharacter.GetHerHis] lorsqu'ils ont trinqué ensemble.\n\n « Cher ami, je savais que vous pouviez facilement y arriver. Votre nouvelle carte du ciel est extraordinaire ! Un véritable chef-d'œuvre ! »"
 academics.2006.t: "Le Dr [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] a échoué!"
 academics.2006.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName] n'a pas réussi à créer un nouveau tableau des étoiles. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetSheHe] n'a pas pu trouver suffisamment d'étoiles et d'autres [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] pour que cela en vaille la peine. Le reste du [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] est extrêmement déçu de l'échec de [ROOT.Var('verrier_astronomer_var').GetCharacter.GetHerHis]."
 academics.2006.f: "Cher [ROOT.Var('verrier_astronomer_var').GetCharacter.GetFirstName], \n\n Nous avons remarqué que vous n'aviez pas été en mesure de soumettre une nouvelle carte stellaire, ce qui montre une fois de plus que vous préférez d'autres activités à la science. Malheureusement, cela aura un impact négatif sur notre société. Nous espérons que vous ferez mieux à l'avenir !\n\n L'[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]."
 academics.2006.g: "Quel dommage !"
 academics.2007.t: "Un nouveau graphique d'étoiles"
 academics.2007.d: "Malheureusement en l'absence de notre ancien [concept_verrier_astronomer], le nouveau graphique étoile a été présenté au [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]. Les universitaires semblent être très satisfaits du nouveau tableau."
 academics.2007.f: "\ \"Grâce à ce nouveau tableau des étoiles, nous pourrons étudier encore mieux le ciel! J'espère que nous trouverons de nombreuses nouvelles idées sur la façon dont ces corps bougent! \ NE c'était possible grâce au [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]! Un toast sur nous, messieurs! \""
 academics.2008.t: "Pas d'astronome, pas de graphique d'étoiles"
 academics.2008.d: "La perte de notre [concept_verrier_astronomer] a conduit à moins de découvertes d'étoiles et d'autres [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')], que nous espérions. Nous n'avons donc pas pu trouver suffisamment d'éléments pour créer une nouvelle carte stellaire. L'[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] n'est pas satisfaite de ce résultat."
 academics.2008.f: "\ \"Non seulement notre gouvernement a perdu son brillant astronome en chef, mais ils n'étaient pas non plus en mesure de soutenir suffisamment nos astronomes dans leur travail. Résultant en beaucoup moins d'observations. Cela signifie que nous nous replierons dans notre recherche astronomique. C'est vraiment horrible! \""
 academics.2009.t: "Nous devons trouver plus d'étoiles que [SCOPE.sCountry('rival_scope').GetName]"
 academics.2009.d: "Les membres du [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] sont mécontents que [SCOPE.sCountry('rival_scope').GetName] ait découvert plus [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] que notre nation. Ils nous demandent de trouver plus d'objets astronomiques #b au total que [SCOPE.sCountry('rival_scope').GetName] dans 10 ans."
 academics.2009.f: "Il est dommage qu'une nation aussi insignifiante que [SCOPE.sCountry('rival_scope').GetName] ait trouvé plus d'objets astronomiques que nous. Nous devons dépasser ces astronomes amateurs non civilisés dès que possible et trouver plus d'objets astronomiques dans l'ensemble qu'ils ne le font. \ N \ nsigned, les membres du [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2009_goal_tt: "Vous devrez découvrir plus [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] que votre rival, [SCOPE.sCountry('rival_scope').GetName], en #n 10#! ans. Ils ont [GetPlayer.MakeScope.Var('je_rival_nation_var').GetVariable('verrier_astronomical_objects').GetValue|0+], nous avons [GetPlayer.MakeScope.Var('verrier_astronomical_objects').GetValue|0+]."
 academics.2009_reward_tt: "En récompense, l'intelligence obtiendra #p 5 Approval#! et vous obtiendrez #p 10% #! plus de prestige pendant 4 ans."
 academics.2009.g: "Laissez-les les battre!"
 academics.2009.h: "Ce n'est pas une course spatiale ..."
 academics_no_competition_with_rival: "A perdu la course pour les étoiles"
 academics_competition_with_rival_won: "A remporté la course pour les étoiles"
 je_academics_rivalry_for_stars: "Concentrez-vous sur l'astronomie: la race des étoiles"
 je_academics_rivalry_for_stars_reason: "Le [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] veut que nous trouvions plus [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] que notre rival [SCOPE.sCountry('target').GetName]. \ N \ nour #b Objets astronomiques #!: [ROOT.Var('verrier_astronomical_objects').GetValue|0+] \ n[SCOPE.sCountry('target').GetName]'s #b Objets astronomiques#!: [ROOT.Var('je_rival_nation_var').GetVariable('verrier_astronomical_objects').GetValue|0+]"
 je_academics_rivalry_for_stars_success: "Vous ([GetPlayer.MakeScope.Var('verrier_astronomical_objects').GetValue|0+]) avez plus [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] que [SCOPE.sCountry('target').GetName] ([GetPlayer.MakeScope.Var('je_rival_nation_var').GetVariable('verrier_astronomical_objects').GetValue|0+])."
 academics.2010.t: "Nous avons gagné la course pour les étoiles"
 academics.2010.d_rival: "Nous avons découvert plus d'objets astronomiques que [ROOT.Var('je_rival_nation_var').GetCountry.GetName]. Le [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] et notre population sont enthousiasmés par cette victoire de notre nation!"
 academics.2010.d_rival_gone: "Notre rival dans la course aux étoiles a disparu. Le [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] et notre population sont enthousiasmés par cette victoire de notre nation!"
 academics.2010.f: "Nous, les membres du [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')], sommes très satisfaits de notre victoire scientifique sur notre rival. Leurs scientifiques se sont avérés coincés dans l'âge de pierre et incapables de découvrir plus d'objets astronomiques. C'est une grande journée pour notre nation! \ N \ nsigned, les membres du [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2011.t: "Nous avons perdu la course pour les étoiles"
 academics.2011.d: "Nous n'avons pas pu trouver plus [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] que [ROOT.Var('je_rival_nation_var').GetCountry.GetName]. Les membres du [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] sont totalement déçus."
 academics.2011.f: "Cet échec de notre universitaire prouve une fois de plus que notre nation n'est pas sur la science et les avancées scientifiques. Nous proposons donc de cesser les hostilités et ces plans de conquête mondiale en faveur de la science. \ N \ nthe [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2012.t: "Le [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] exige un [concept_verrier_observatory]"
 academics.2012.d: "Les membres de notre [concept_academics_scientific_society] exigent que nous construisions un [concept_verrier_observatory] moderne en 10 ans ou moins. Cela nous permettrait de mener [concept_verrier_astronomy] et de trouver [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]."
 academics.2012.f: "Comme chaque grande nation possède aujourd'hui un observatoire, nous, les membres du [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')], exigeons la construction d'un observatoire. Sans observatoire, nous ne serons jamais à l'avant-garde de la science. Par conséquent, un observatoire est clairement une nécessité. \ N \ nsigned, le Conseil du [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2012.g: "J'ai besoin de nos meilleurs architectes et ingénieurs en ce moment!"
 academics.2012.h: "Qui a besoin d'un observatoire de toute façon?"
 academics.2012_goal_tt: "Vous devrez construire un [concept_verrier_observatory] en #n 10#! ans."
 academics.2012_reward_tt: "En récompense, l'intelligence obtiendra #p 5 approbation #! et le coût de la technologie de production sera réduit de #p 5% #! pendant 5 ans, vous gagnerez également #p 5% #! loyalistes parmi les universitaires."
 je_academics_build_observatory: "Concentrez-vous sur l'astronomie: construire un observatoire"
 je_academics_build_observatory_reason: "Le [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] veut que nous construisions un [concept_verrier_observatory]. Pour construire un observatoire, nous devons avoir au moins une université et soit recherché #b Astronomy#! moderne ou avoir un [concept_verrier_astronomer]."
 academics.2013.t: "L'observation commence l'observatoire"
 academics.2013.d: "Un nouveau [concept_verrier_observatory] a ouvert ses portes et a commencé à observer le ciel. Les membres du [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] sont heureux ... pour l'instant."
 academics.2013.f: "Après avoir construit un observatoire, notre nation est finalement en mesure d'explorer le ciel nocturne. Félicitations. Maintenant, nous sommes réellement considérés comme un pays scientifiquement avancé. \ N \ nsigned, les membres du [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2013.g: "Nous découvrirons les mystères du ciel nocturne!"
 academics.2014.t: "Une échec astronomique"
 academics.2014.d: "Nous n'avons pas pu construire un [concept_verrier_observatory]. Les membres du [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] sont profondément déçus!"
 academics.2014.f: "La construction d'un observatoire doit être une chose extrêmement difficile car notre nation n'a pas réussi à le faire depuis 10 ans! Pendant ce temps, nous aurions pu trouver une nouvelle planète des centaines d'étoiles ou calculé le mouvement de nombreuses comètes. Mais sans télescope approprié, ce n'est pas possible. Un affichage honteux. \ N \ nthe [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2014.g: "C'était la faute de la comète!"
 academics.2015.t: "Le [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] veut que nous trouvions la planète x"
 academics.2015.d: "Les membres de notre [concept_academics_scientific_society] sont convaincus que la découverte de Planet X sera le plus grand succès scientifique de ce siècle. Ils nous demandent de nous concentrer sur la recherche de la mystérieuse planète avant que quelqu'un d'autre le fasse."
 academics.2015.f: "Nous avons entendu dire que d'autres nations sont impatientes de trouver Planet X. Mais cette percée nous appartient seule! Nous devons battre tout le monde dans cette tâche colossale! \ N \ nsigned, le Conseil du [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2015.g: "Focus all our resources on finding that planet!"
 academics.2015.h: "Planet X? Plus comme Planet Y ..."
 academics.2015_goal_tt: "Vous devrez trouver #b Planet X#! avant quiconque. Pour avoir une chance de le découvrir, nous aurons besoin d'un [concept_verrier_astronomer] et #p 1500#! découvert [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]."
 academics.2015_reward_tt: "En récompense, l'intelligence obtiendra #p 5 approbation#! et le coût de la technologie de production sera réduit de #p 5% #! pendant 10 ans, vous gagnerez également #p 10% #! loyalistes entre les universitaires et votre [concept_verrier_astronomer] gagnera #p 50#! [concept_academics_experience]."
 je_academics_find_planet_x: "Concentrez-vous sur l'astronomie: trouver la planète X"
 je_academics_find_planet_x_reason: "Le [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] veut que nous trouvions la mystérieuse planète #o x#!. pour avoir une chance de le découvrir, nous aurons besoin d'un [concept_verrier_astronomer] et #p 1500#! découvert [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]."
 je_academics_find_planet_x_complete_tt: "Découvrez #o Planet X#! avant quiconque."
 je_academics_find_planet_x_fail_tt: "Quelqu'un d'autre a découvert #o Planet X#! avant vous."
 academics.2016.t: "Nous avons trouvé la planète X"
 academics.2016.d: "Nous sommes les premiers à trouver Planet X! J'espère que cela plaira le [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]."
 academics.2016.f: "La lettre a été gribouillée avec des formules et des diagrammes étranges. Il y avait des taches qui ressemblaient à quelqu'un à renverser du liquide sur la lettre et si vous deviez deviner, vous pouviez jurer qu'il y avait également des restants de caviar sur le papier. Vous ne pouviez pas arrêter de vous demander ce qui s'est passé ici."
 academics.2016.g: "C'est la découverte astronomique la plus importante du siècle!"
 academics.2017.t: "We were too late to find Planet X"
 academics.2017.d: "Une autre nation a découvert la planète X devant nous. Les membres du [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] sont écrasés par cette défaite!"
 academics.2017.f: "Inacceptable. \ N \ nthe [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]."
 academics.2017.g: "Ce n'est pas une vraie planète de toute façon!"
