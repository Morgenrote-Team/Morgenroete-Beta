 country_academics_decorative_humanities_project_add: "Progrès pour les projets en sciences humaines-anthropologiques"
 country_academics_decorative_humanities_project_add_desc: "La quantité de progrès que vous gagnez des niveaux de [GetBuildingType('building_university').GetName] avec le [concept_pm_academics_university_humanities] pour les projets en sciences humaines-anthropologiques. Ces projets comprennent:"
