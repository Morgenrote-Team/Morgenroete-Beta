 country_academics_decorative_excavation_add_desc: "La quantité de progrès que vous gagnez des niveaux de [GetBuildingType('building_university').GetName] avec le [concept_pm_academics_university_humanities] pour certaines fouilles archéologiques."
 country_academics_decorative_natural_history_project_add: "Progrès pour les projets d'histoire naturelle"
 country_academics_decorative_natural_history_project_add_desc: "La quantité de progrès que vous gagnez des niveaux de [GetBuildingType('building_university').GetName] avec le [concept_pm_academics_university_natural_history] pour les projets d'histoire naturelle. Ces projets comprennent: Expedition paléontologique, projets d'amélioration des naturalistes, documenter les animaux indigènes et les projets d'amélioration du géologue."
 country_academics_decorative_animal_breeding_progress_add: "Progrès pour l'élevage d'animaux"
 country_academics_decorative_animal_breeding_progress_add_desc: "La quantité de progrès que vous gagnez des niveaux de [GetBuildingType('building_university').GetName] avec le [concept_pm_academics_university_natural_history] pour l'élevage [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')]."
 country_academics_decorative_mathematical_project_add: "Progrès des projets techniques mathématiques"
 country_academics_decorative_mathematical_project_add_desc: "La quantité de points de progrès que vous gagnez des niveaux de [GetBuildingType('building_university').GetName] avec le [concept_pm_academics_university_mathematics] pour les projets techniques mathématiques. Ces projets comprennent: Les projets d' [concept_gaudi_engineering] , les projets d'amélioration de [concept_mendelejew_chemist] et la théorie, la découverte et l'isolement de [Concept('concept_mendelejew_element','$concept_mendelejew_elements$')]."
 academics.121.d: "Après des années de travail dans les hôpitaux, les laboratoires et autres installations pour sauver des vies, notre [concept_panum_physician] Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] est maintenant célèbre dans le monde de la médecine!"
 academics.102.d: "Après avoir passé des centaines de nuits dans l'observatoire, en regardant le ciel, notre [concept_verrier_astronomer] Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] est maintenant expérimenté!"
