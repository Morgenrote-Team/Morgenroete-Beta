 academics.2300.t: "Nous devons trouver plus de fossiles que [SCOPE.sCountry('rival_scope').GetName]"
 academics.2300.d: "Nous manquons suffisamment de [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] pour une plus grande collection que [SCOPE.sCountry('rival_scope').GetName]. Par conséquent, le [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] veut que nous trouvions plus de #b fossiles#! au total que [SCOPE.sCountry('rival_scope').GetName]. Ils l'apprécieraient sûrement beaucoup si nous pouvions battre ce rival."
 academics.2300.f: "Bien que nos rivaux dans [SCOPE.sCountry('rival_scope').GetName] aient divers fossiles de différents âges et lieux du monde entier, les nôtres sont assez limités à la fois dans le délai et le cadre géographique. C'est une honte énorme et non accapable pour une nation aussi grande que la nôtre. \ Nwe doit étendre notre collection fossile immédiatement! \ N \ nsigned, les membres du [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2300_goal_tt: "Vous devrez rassembler plus de [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] que votre rival, [SCOPE.sCountry('rival_scope').GetName], en #n 10#! ans. Ils ont [GetPlayer.MakeScope.Var('je_fossil_rival_nation_var').GetVariable('dubois_fossil').GetValue|0+], nous avons [GetPlayer.MakeScope.Var('dubois_fossil').GetValue|0+]."
 academics.2300_reward_tt: "En récompense, l'intelligence obtiendra #p 5 Approval#! et vous obtiendrez #p 10% #! plus de prestige pendant 4 ans."
 academics.2300.g: "Ah, une querelle fossile!"
 academics.2300.h: "Nous n'avons pas besoin de rochers poussiéreux ..."
