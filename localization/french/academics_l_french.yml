 je_academics_mesopotamian_artifacts: "Focus sur l'archéologie: artefacts mésopotamiens"
 je_academics_mesopotamian_artifacts_reason: "Le [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] veut que nous trouvions au moins #p 25#! mésopotamien [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')], qui doit être trouvé par un [concept_lepsius_archaeologist] sur un [concept_lepsius_expedition] ou [concept_lepsius_excavation], si nous n'avons pas la chance scandaleuse de les acquérir par un cadeau aléatoire ou une excavation locale."
 je_academics_mesopotamian_artifacts_success: "Collectez #p 25#! #b artefacts mésopotamiens #!"
 je_academics_mesopotamian_artifacts_goal: ""
 je_academics_aegean_artifacts: "Concentrez-vous sur l'archéologie: artefacts aégiens"
 je_academics_aegean_artifacts_reason: "Le [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] veut que nous trouvions au moins #p 25#! Aegean [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')], qui doit être trouvé par un [concept_lepsius_archaeologist] sur un [concept_lepsius_expedition] ou [concept_lepsius_excavation], si nous n'avons pas la chance scandaleuse de les acquérir par un cadeau aléatoire ou une excavation locale."
 je_academics_aegean_artifacts_success: "Collectez #p 25#! #b Artefacts aegean#!"
 je_academics_aegean_artifacts_goal: ""
 je_academics_precolumbian_artifacts: "Focus sur l'archéologie: artefacts précolombiens"
 je_academics_precolumbian_artifacts_reason: "The [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] wants us to find at least #p 25#! Precolumbian [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')], which must be found by an [concept_lepsius_archaeologist] on an [concept_lepsius_expedition] or [concept_lepsius_excavation], should we not have the outrageous luck of acquiring them through a random gift or a local excavation."
 je_academics_precolumbian_artifacts_success: "Collectez #p 25#! #b Artefacts précolombien"
 je_academics_precolumbian_artifacts_goal: ""
 academics.2110.t: "Le directeur du musée veut un artefact majeur"
 academics.2110.d: "Le directeur du musée archéologique a écrit aujourd'hui une lettre ouverte au gouvernement au nom du [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]."
 academics.2110.f: "C'est avec grand regret que je dois dire que, malgré le riche fonds d'artefacts, notre musée n'a toujours pas une attraction majeure qui pourrait être appelée une pièce maîtresse de la collection. Malheureusement, le gouvernement n'a jusqu'à présent pas réussi à se concentrer sur la qualité en tant que norme archéologique pour les objets au lieu de la quantité. Je conseille donc fortement que ce grief soit rectifié au cours des prochaines années, ou que notre nation sera au mieux classé comme des compteurs de haricots dans le monde scientifique. \ N \ n signé, directeur du musée archéologique"
 academics.2110.g: "Une entreprise prestigieuse."
 academics.2110.h: "Cela ne vaut pas la peine."
 academics.2110_goal_tt: "Vous devrez collecter #p 1#! [concept_lepsius_major_artifact] en #n 15#! ans."
 academics.2111.t: "Splendeur du musée"
 academics.2111.d: "Le [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] a exprimé sa gratitude dans sa lettre aujourd'hui."
 academics.2111.f: "Félicitations pour la décision de faire de l'archéologie la priorité nationale du pays. Le spécimen exceptionnel récemment acquis sera exposé dans une exposition spéciale au cours des prochaines semaines. Le monde nous envient! \ N \ nsigned, le directeur du musée archéologique"
 academics.2111.g: "Merveilleux."
 academics.2112.t: "Un endroit poussiéreux"
 academics.2112.d: "Dans une lettre ouverte aujourd'hui au nom du [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')], le directeur du musée archéologique a exprimé son regret que l'archéologie ne soit pas entendue dans notre nation."
 academics.2112.f: "Jamais été aussi ruiné par si peu en si peu de temps. \ N \ nsigned, le directeur du musée archéologique"
 academics.2112.g: "Et?"
 je_academics_major_artifact: "Focus sur l'archéologie: artefact majeur"
 je_academics_major_artifact_reason: "Le [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] veut que nous trouvions au moins #p 1#! [concept_lepsius_major_artifact]. Les principaux artefacts peuvent être acquis par des découvertes majeures, par des fouilles permanentes ou dans des chaînes d'événements aléatoires pendant les expéditions."
 je_academics_major_artifact_success: "Avoir #p 1#! [concept_lepsius_major_artifact]."
 academics.2113.t: "Le directeur du musée exige une excellence archéologique"
 academics.2113.d: "Le directeur du musée archéologique a souligné que peu de choses manquaient pour rendre l'exposition presque parfaite."
 academics.2113.f: "Je suis un homme humble. Comme vous le savez, mes affirmations ne sont pas particulièrement extravagantes. Je n'ai jamais demandé à ce gouvernement une faveur sophistiquée. Je me suis toujours retenu, car il sied à la conservatrice d'une telle institution. Aussi: une dernière petite glaçage sur le gâteau est manquante pour élever notre belle collection à la classe mondiale. Tout ce qu'il faut, c'est une excellente exposition. Pas plus. Obtenir 100 artefacts d'une région et un artefact majeur ne sera, espérons-le pas, il est difficile, non? \ N \ nsigned, le directeur du musée archéologique"
 academics.2113.g: "Un défi bienvenu."
 academics.2113.h: "C'est trop risqué."
 academics.2112_goal_tt: "You will have to arrange an Excellent Exhibition in #n 20#! years."
 academics.2114.t: "Archéologie à son apogée"
 academics.2114.d: "Une lettre adoucie et à peine lisible nous a atteint aujourd'hui le musée archéologique."
 academics.2114.f: "Seul l'expéditeur pouvait encore être déchiffré. La signature appartenait clairement au directeur du musée. Le secrétaire soupçonne des larmes de joie alors qu'il écrit la lettre."
 academics.2114.g: "Il est heureux et nous aussi."
 academics.2115.t: "Setback for Archaeology"
 academics.2115.d: "Une lettre adoucie et à peine lisible nous a atteint aujourd'hui le musée archéologique."
 academics.2115.f: "Seul l'expéditeur pouvait encore être déchiffré. La signature appartenait clairement au directeur du musée. Le secrétaire suppose que les larmes sont venues aux yeux alors qu'il l'écrivait. Notre échec sur la dernière mission archéologique a dû l'avoir jeté dans une profonde dépression."
 academics.2115.g: "Il est triste et nous aussi."
 je_academics_excellent_collection: "Focus sur l'archéologie: excellente collection"
 je_academics_excellent_collection_reason: "L' [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] veut que nous créions une excellente exposition. Nous avons besoin de #G 100 #! [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] et #p 1 #! [concept_lepsius_major_artifact] d'une région archéologique pour le faire."
 academics.2116.t: "Nous devons trouver plus d'artefacts que [SCOPE.sCountry('rival_scope').GetName]"
 academics.2116.d: "Les members de la [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] sont mécontents que [SCOPE.sCountry('rival_scope').GetName] ait rassemblé plus [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] que notre nation. Ils nous demandent de trouver plus #b d'artefacts #! au total que [SCOPE.sCountry('rival_scope').GetName] dans 10 ans."
 academics.2116.f: "Il est dommage qu'une nation aussi insignifiante que [SCOPE.sCountry('rival_scope').GetName] ait une plus grande collection d'artefacts que nous. Nous devons dépasser ces raiders de tombes qui ne creusent que pour la trésure et ne mènent même pas une véritable archéologie! Combien de connaissances ont été perdues à cause de ces barbares? \ N \ nsigned, les membres du [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2116_goal_tt: "Vous devrez rassembler plus de [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] que votre rival, [SCOPE.sCountry('rival_scope').GetName], en #n 10#! ans. Ils ont [GetPlayer.MakeScope.Var('je_artifacts_rival_nation_var').GetVariable('lepsius_total_artifacts').GetValue|0+], nous avons [GetPlayer.MakeScope.Var('lepsius_total_artifacts').GetValue|0+]."
 academics.2116_reward_tt: "En récompense, l'intelligence obtiendra #p 5 Approval#! et vous obtiendrez #p 10% #! plus de prestige pendant 4 ans."
 academics.2116.g: "Je suis archéologue et je creuse un trou!"
 academics.2116.h: "L'archéologie n'est pas une chasse au trésor!"
 academics_no_competition_with_rival_total_artifacts: "A perdu la chasse au trésor"
 academics_competition_with_rival_won_total_artifacts: "A remporté la chasse au trésor"
 je_academics_rivalry_for_artifacts: "Focus sur l'archéologie: la chasse au trésor"
 je_academics_rivalry_for_artifacts_reason: "Le [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] veut que nous trouvions plus [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] que notre rival [SCOPE.sCountry('target').GetName]. \ N \ nour #b Total Artefacts#!: [ROOT.Var('lepsius_total_artifacts').GetValue|0+] \ n[SCOPE.sCountry('target').GetName]'s #b Total Artefacts#!: [ROOT.Var('je_artifacts_rival_nation_var').GetVariable('lepsius_total_artifacts').GetValue|0+]"
 je_academics_rivalry_for_artifacts_success: "Vous ([GetPlayer.MakeScope.Var('lepsius_total_artifacts').GetValue|0+]) avez plus [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] que [SCOPE.sCountry('target').GetName] ([GetPlayer.MakeScope.Var('je_artifacts_rival_nation_var').GetVariable('lepsius_total_artifacts').GetValue|0+])."
 academics.2117.t: "Collection d'artefacts merveilleux"
 academics.2117.d_rival: "Nous avons rassemblé une plus grande collection d'artefacts que notre rival [ROOT.Var('je_artifacts_rival_nation_var').GetCountry.GetName]. Le [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] et notre population sont enthousiasmés par cette victoire de notre nation!"
 academics.2117.d_rival_gone: "Notre rival archéologique a disparu. Le [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] et notre population sont enthousiasmés par cette victoire de notre nation!"
 academics.2117.f: "Il devrait être évident que notre nation doit avoir une meilleure collection archéologique que ces barbares. Le [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] est satisfait de cette collection. Bien qu'il y ait plus d'artefacts qui doivent être sauvés de ces sauvages. \ N \ nsigned, les membres du [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2117.g: "Tant d'artefacts sauvés!"
 academics.2118.t: "Nous n'avons pas réussi à étendre notre collection archéologique"
 academics.2118.d: "Nous n'avons pas pu étendre notre collection archéologique plus loin que nos rivaux dans [ROOT.Var('je_artifacts_rival_nation_var').GetCountry.GetName]. Les membres du [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] sont totalement déçus."
 academics.2118.f: "Les mains sales de ces sauvages souillent l'histoire même de l'humanité. Comment avez-vous pu laisser tous ces artefacts être dérobés par ces pilleurs de tombes ? Tant de connaissances auront été perdues parce qu'ils préfèrent les trésors à la préservation de notre histoire. C'est écœurant ! \n\n Le [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2118.g: "Nous n'avons pas besoin de ces artefacts poussiéreux."
 academics.2200.t: "Nous devons trouver plus de spécimens que [SCOPE.sCountry('rival_scope').GetName]"
 academics.2200.d: "Les members de la [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] sont mécontents que [SCOPE.sCountry('rival_scope').GetName] ait rassemblé plus [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] que notre nation. Ils nous demandent de trouver plus de #b spécimens #! au total que [SCOPE.sCountry('rival_scope').GetName] dans 10 ans."
 academics.2200.f: "Nos collections d'échantillons ne sont rien en comparaison avec celles du [SCOPE.sCountry('rival_scope').GetName]. Ils ont tout ce que nous désirons! J'ai même entendu dire qu'ils avaient une gigantesque fleur qui sent les cadavres pourris. Notre fierté est un papillon orange. Nous devons trouver de nouveaux spécimens, des spécimens que personne n'a trouvés avant nous! Sinon, ils pourraient tomber entre les mains de ces bouchers animaux! \ N \ nsigned, les membres du [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2200_goal_tt: "Vous devrez rassembler plus de [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] que votre rival, [SCOPE.sCountry('rival_scope').GetName], en #n 10#! ans. Ils ont [GetPlayer.MakeScope.Var('je_specimen_rival_nation_var').GetVariable('dubois_specimen').GetValue|0+], nous avons [GetPlayer.MakeScope.Var('dubois_specimen').GetValue|0+]."
 academics.2200_reward_tt: "En récompense, l'intelligence obtiendra #p 5 Approval#! et vous obtiendrez #p 10% #! plus de prestige pendant 4 ans."
 academics.2200.g: "Nous devons envoyer notre naturaliste immédiatement!"
 academics.2200.h: "Quelle perte de temps!"
 academics_no_competition_with_rival_specimen: "A perdu la course pour le spécimen"
 academics_competition_with_rival_won_specimen: "A remporté la course pour le spécimen"
 je_academics_rivalry_for_specimen: "Concentrez-vous sur le naturalisme: la course pour les spécimens"
 je_academics_rivalry_for_specimen_reason: "Le [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] veut que nous trouvions plus [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] que notre rival [SCOPE.sCountry('target').GetName]. \ N \ nour #b Total Specimens#!: [ROOT.Var('dubois_specimen').GetValue|0+] \ n[SCOPE.sCountry('target').GetName]'s #b Total Specimens#!: [ROOT.Var('je_specimen_rival_nation_var').GetVariable('dubois_specimen').GetValue|0+]"
 je_academics_rivalry_for_specimen_success: "Vous ([GetPlayer.MakeScope.Var('dubois_specimen').GetValue|0+]) avez plus [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] que [SCOPE.sCountry('target').GetName] ([GetPlayer.MakeScope.Var('je_specimen_rival_nation_var').GetVariable('dubois_specimen').GetValue|0+])."
 academics.2201.t: "Collection d'échantillons étonnante"
 academics.2201.d_rival: "Nous avons rassemblé une plus grande collection de [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] que notre rival [ROOT.Var('je_specimen_rival_nation_var').GetCountry.GetName]. Le [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] et notre population sont enthousiasmés par cette victoire de notre nation!"
 academics.2201.d_rival_gone: "Notre rival dans notre quête d'une énorme collection biologique a disparu. Le [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] et notre population sont enthousiasmés par cette victoire de notre nation!"
 academics.2201.f: "Enfin, nous avons une collection de spécimens #b digne de notre grande nation. Il est temps que nous puissions montrer les êtres vivants les plus fascinants de cette planète. Le [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] est satisfait de notre collection pour le moment. De toute évidence, nous devrons continuer à développer notre collection pour empêcher d'autres nations de boucher ces animaux et plantes pauvres. \ N \ nsigned, les membres du [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2201.g: "Une collection digne!"
 academics.2202.t: "Nous n'avons pas réussi à rassembler plus de spécimens que [ROOT.Var('je_specimen_rival_nation_var').GetCountry.GetName]"
 academics.2202.d: "Nous n'avons pas pu étendre notre collection d'échantillons plus loin que nos rivaux dans [ROOT.Var('je_specimen_rival_nation_var').GetCountry.GetName]. Les membres du [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] sont absolument écrasés."
 academics.2202.f: "Maintenant, ils ont également trouvé l'animal le plus fascinant du monde. Un lézard volant. Ils l'ont nommé d'après le président de leur académie des sciences. Vous avez échoué. \ N \ nthe [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2202.g: "Je ne me remettrai jamais de cela scientifiquement!"
 academics.2203.t: "Le [ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName] veut [SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] pour notre zoo"
 academics.2203.d: "Le [ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName] a demandé à notre gouvernement d'acquérir [SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] pour notre [concept_dubois_zoo] en 10 ans."
 academics.2203.f: "Il y a un [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animal$')] qui manque à notre zoo. Nous avons besoin de notre gouvernement pour trouver [SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] et l'apporter à notre zoo. Nous ne pouvons pas permettre à notre zoo de ne pas avoir ce merveilleux animal après tout. \ N \ nsigned, les représentants du [ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName]"
 academics.2203_goal_tt: "Vous devrez acquérir un [GetPlayer.MakeScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] pour notre [concept_dubois_zoo] dans 10 ans."
 academics.2203_reward_tt: "En récompense, le [GetPlayer.MakeScope.Var('academics_mission_interest_group_var').GetInterestGroup.GetName] gagnera #p 5#! Approbation de votre gouvernement et #p 5% #! Plus d'attraction pop et votre pays obtiendra #p 5% #! plus de prestige pendant 5 ans."
 academics.2203.g: "Je dois les attraper tous!"
 academics.2203.h: "Je dirige une grande nation. Je n'ai pas de relations avec un zoo!"
 je_academics_get_exotic_animal: "Concentrez-vous sur le naturalisme: acquérir [GetPlayer.MakeScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] pour notre zoo"
 je_academics_get_exotic_animal_reason: "Le [ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName] veut que nous acquérons [SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] pour notre [concept_dubois_zoo]. \ Nothere sont diverses façons d'acquérir un tel [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animal$')]."
 academics.2204.t: "Une nouvelle maison pour [SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')]"
 academics.2204.d: "Nous avons réussi à acquérir [SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] pour notre [concept_dubois_zoo]. Cela rendra sûrement le [ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName] heureux."
 academics.2204.f: "Your government successfully acquired [SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] for our glorious country. This shows that our country is powerful enough to spend its resources on the amusement of our population. Thank you!\n\nSigned, the representatives of the [ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName]"
 academics.2204.g: "Un animal merveilleux!"
 academics.2205.t: "Pas d'un nouvel animal dans notre zoo"
 academics.2205.d: "Nous n'avons pas pu acquérir [SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] pour notre zoo. Le [ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName] ne sera pas amusé."
 academics.2205.f: "Vous ne pouvez même pas acquérir un animal pour notre zoo. Comment devrions-nous vous faire confiance pour guider ce pays? \ N \ nsigned, les représentants du [ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName]"
 academics.2205.g: "Nous n'avons pas le temps pour des animaux aléatoires!"
 academics_exotic_animal_acquired_ig_modifier: "Animal exotique acquis"
 academics_exotic_animal_not_acquired_ig_modifier: "Animal exotique non acquis"
 academics_exotic_animal_acquired_country_modifier: "Animal exotique acquis"
 academics.2206.t: "Le [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] exige un zoo"
 academics.2206.d: "Les succès scientifiques précédents dans le domaine de la recherche naturelle peuvent être décrits comme maigres. Certains représentants scientifiques influents se sont donc tournés vers le gouvernement avec une pétition."
 academics.2206.f: "Afin de renforcer la recherche biologique en général et la recherche zoologique en particulier, un zoo avec une collection d'animaux rares est essentiel. Une telle installation améliorerait également considérablement le bien-être de la population. Le [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] suggère donc que tous les moyens devraient être utilisés pour établir un zoo national et aiderait également à la formation d'un zoologiste énergique. \ N \ nsigned, le Conseil du [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2206.g: "Quelques animaux peuvent certainement être trouvés."
 academics.2206.h: "Ces gens n'ont-ils quelqu'un d'autre à ennuyer?"
 academics.2207.t: "Le nouveau zoo"
 academics.2207.d: "Certains représentants de la société scientifique ont personnellement assisté à l'inauguration du nouveau zoo."
 academics.2207.f: "Excellent, vraiment excellent le nouveau zoo. Les membres ont passé une merveilleuse journée et sont particulièrement heureux de la nourriture gratuite pour animaux de compagnie. Nous espérons que ce ne sera qu'un début, et que le zoo qui vient de s'ouvrir sera bientôt élargi et rempli de créatures plus précieuses, exotiques et merveilleuses. \ N \ nsigned, le Conseil du [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2207.g: "Laissez-moi des arachides!"
 academics.2208.t: "Pas de zoo"
 academics.2208.d: "Le [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] a écrit une lettre amère aujourd'hui se plaignant que le souhait d'un nouveau zoo n'a pas été réalisé."
 academics.2208.f: "À notre grand regret, nous avons constaté que le gouvernement actuel semble être composé d'ennemis pur et simple de la science, de la biologie en général et de la zoologie en particulier, ou du moins un tas de haineux animaux inhumains. Peut-être que dans un tel environnement, les magnifiques animaux seraient gaspillés en vain. \ N \ nsigned, le Conseil du [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2208.g: "Si vous êtes têtu, vous n'aurez certainement aucun souhait répondu."
 academics.2206_goal_tt: "Vous devrez collecter #p 5#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] et construire un [concept_dubois_zoo] en #n 5#! ans."
 academics.2206_reward_tt: "En récompense, notre naturaliste obtiendra #p 50 Experience#! Si nous n'avons pas encore de naturaliste, nous en aurons un."
 academics.2209.t: "Élargissement du zoo"
 academics.2209.d: "Une lettre ouverte du [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] déplore le fait que le zoo national offre peu de variété."
 academics.2209.f: "Bien que notre capitale possède désormais un zoo qui offre une certaine variété aux scientifiques pour étudier les animaux et pour le public payant, cette installation a à peine atteint la norme digne de la taille de la ville et de notre importance nationale. Afin d'augmenter le prestige, de divertir la population et de faire progresser la science, nous recommandons donc d'étendre le zoo actuel à au moins un moyen."
 academics.2209.g: "Apportez plus d'animaux!"
 academics.2209.h: "Nous avons de meilleures choses à faire."
 academics.2210.t: "Un zoo encore plus grand"
 academics.2210.d: "Une lettre ouverte du [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] déplore le fait que le zoo national offre peu de variété."
 academics.2210.f: "Bien que nous ayons permis à notre zoo de passer à une taille respectable dans le passé, il ne jouit pas encore de l'importance internationale qu'elle pourrait et devrait avoir pour impressionner d'autres nations par notre passion zoologique. Nous avons besoin d'animaux de plus en plus exotiques. Non seulement la science est en jeu ici, mais aussi notre prestige. Nous conseillons fortement la mise à niveau de notre zoo vers un grand zoo. \ N \ nsigned, le Conseil du [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2211.t: "Un jardin zoologique floogène"
 academics.2211.d: "Le jardin zoologique élargi est l'une des principales attractions de la capitale et est très populaire auprès des érudits et des citoyens ordinaires. La société scientifique est heureuse de noter que leur souhait a été exaucé."
 academics.2211.f: "Bien joué! Le nouveau zoo est plus spacieux et répond à l'exigence de représenter un spectre plus large du monde animal du monde. J'espère que vous avez aussi pensé à un ornithorynque? Nous aimerions reprendre un parrainage pour cela. Est-ce que cela s'appelle Perry? \ N \ nSigned, le Conseil du [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2211.g: "Les animaux du monde dans notre maison!"
 academics.2212.t: "Déception zoologique"
 academics.2212.d: "La société scientifique se demande si la demande du gouvernement en vaut toujours la peine lorsque leurs préoccupations sont piétinées de manière à la petite demande pour quelques animaux de zoo."
 academics.2212.f: "Nous sommes très, très déçus. \ N \ nsigned, le Conseil du [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2212.g: "Ils devraient faire des recherches au lieu de s'amuser dans le zoo."
 academics.2209_goal_tt: "Vous devrez agrandir votre [concept_dubois_zoo] à #p taille 3#! (zoo de taille moyenne) en #n 10#! ans."
 academics.2210_goal_tt: "Vous devrez agrandir votre [concept_dubois_zoo] à #p taille 4#! (grand zoo) en #n 10#! ans."
 academics.2209_reward_tt: "En récompense, notre naturaliste obtiendra #p 50 Experience#! Si nous n'avons pas encore de naturaliste, nous en aurons un."
 je_academics_found_zoo: "Concentrez-vous sur le naturalisme: trouvé un zoo"
 je_academics_found_zoo_reason: "The [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] wants us to build a [concept_dubois_zoo] to enhance knowledge, but also the living standard of our intellectuals. Building a zoo requires #p 5#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')], which may be caught by a [concept_dubois_naturalist] on a local Zoological Expedition or a Heia Safari. Animals may also be bought from other countries."
 je_academics_medium_zoo: "Concentrez-vous sur le naturalisme: agrandir le zoo"
 je_academics_medium_zoo_reason: "The [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] has requested an extension of the [concept_dubois_zoo] We have a total of ten years to upgrade our zoo to a #p medium-sized zoo#!. This requires more [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')], which may be caught by a [concept_dubois_naturalist] on a local Zoological Expedition or a Heia Safari. Animals may also be bought from other countries."
