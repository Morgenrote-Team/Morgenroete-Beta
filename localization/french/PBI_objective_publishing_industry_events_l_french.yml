l_french:
 pbi_objective_publishing_industry_events.200.t: "Un roman de presse à succès"
 pbi_objective_publishing_industry_events.200.d: "Le roman de [SCOPE.sCharacter('target_character').GetFullName] a été publié en série dans un journal [SCOPE.sState('target_state').GetName], et après une parution très populaire, la série s'est terminée."
 pbi_objective_publishing_industry_events.200.f: "Durant la période de sérialisation, les ventes de journaux ont finalement triplé. L'éditeur a publié un livre résumant la sérialisation et a même traduit le livre pour le marché international, et les ventes de ces livres ont régulièrement augmenté."
 pbi_objective_publishing_industry_events.200.a: "Bon travail!"
 pbi_objective_publishing_industry_events.200.good: "La progression de l'écriture du roman sera #positive_value augmentée#!"
 pbi_objective_publishing_industry_events.200.bad: "La progression de l'écriture du roman sera #negative_value réduite#!"
 pbi_objective_publishing_industry_events.200.stop: "#negative_value Augmente la probabilité de nouvelles réinitialisations de progrès futures#!"
 pbi_objective_publishing_industry_events.201.t: "Annulation de la sérialisation"
 pbi_objective_publishing_industry_events.201.d: "Le roman, qui était en cours de publication dans un journal [SCOPE.sState('target_state').GetName], s'est terminé inachevé lorsque l'écrivain ne pouvait plus continuer à écrire."
 pbi_objective_publishing_industry_events.201.f: "De nombreux lecteurs ne pourront plus lire la suite des romans feuilletons qu’ils attendaient avec tant d’impatience."
 pbi_objective_publishing_industry_events.201.a: "Dommage"
 pbi_objective_publishing_industry_events.202.t: "Grand écrivain du futur"
 pbi_objective_publishing_industry_events.202.d: "Une société de presse [SCOPE.sState('target_state').GetName] cherche à publier un nouveau journal.\nIls recherchent un nouveau romancier pour ce journal ambitieux."
 pbi_objective_publishing_industry_events.202.f: "De nos jours, ce n'est pas la déclaration politique, l'éditorial plein d'esprit du rédacteur en chef ou l'article sensationnel de trois pages qui détermine les ventes d'un journal, mais l'intérêt de la fiction feuilletonnée."
 pbi_objective_publishing_industry_events.202.a: "[SCOPE.sCharacter('target_character_1').GetFullName] est le grand écrivain du futur !"
 pbi_objective_publishing_industry_events.202.a.tt: "Commencez à écrire une série de romans"
 pbi_objective_publishing_industry_events.202.b: "Je sens une intelligence débordante du [SCOPE.sCharacter('target_character_2').GetFullName] !"
 pbi_objective_publishing_industry_events.202.c: "L'écriture de [SCOPE.sCharacter('target_character_3').GetFullName] a un attrait irrésistible !"
 pbi_objective_publishing_industry_events.202.e: "Il doit y avoir d’autres joyaux bruts qui brillent !"
 pbi_objective_publishing_industry_events.202.e.tt: "Nous chercherons d'autres candidats"
 pbi_objective_publishing_industry_events.203.t: "Impossible de continuer à écrire"
 pbi_objective_publishing_industry_events.203.d: "[SCOPE.sCharacter('target_character').GetFullName] a du mal à progresser sur le roman [SCOPE.sCharacter('target_character').GetHerHis]. Si cela continue, la sérialisation s'arrêtera probablement."
 pbi_objective_publishing_industry_events.203.f: "Un éditeur en charge s'est rendu au domicile de [SCOPE.sCharacter('target_character').GetLastName] tôt le matin pour vérifier l'avancement du manuscrit, mais [SCOPE.sCharacter('target_character').GetSheHe] n'était pas là. Le domestique dit que le maître n'était pas chez lui depuis trois jours et ne savait pas où se trouvait [SCOPE.sCharacter('target_character').GetSheHe]."
 pbi_objective_publishing_industry_events.203.a: "Attachez [SCOPE.sCharacter('target_character').GetHerHim] à une chaise, mais continuez à écrire [SCOPE.sCharacter('target_character').GetHerHim] !"
 pbi_objective_publishing_industry_events.203.b: "[SCOPE.sCharacter('target_character').GetSheHe] a besoin de changer d'air"
 pbi_objective_publishing_industry_events.204.t: "À qui appartient le manuscrit ?"
 pbi_objective_publishing_industry_events.204.d: "L'auteur refuse de permettre à l'éditeur de réviser le contenu d'un roman que [SCOPE.sCharacter('target_character').GetFullName] est en train de sérialiser."
 pbi_objective_publishing_industry_events.204.f: "L'éditeur craint que la représentation de certains personnages dans le roman puisse être perçue comme une moquerie de certains hommes politiques."
 pbi_objective_publishing_industry_events.204.a: "Les éditeurs ont des droits de révision"
 pbi_objective_publishing_industry_events.204.b: "La volonté de l'auteur doit être respectée"
 pbi_objective_publishing_industry_events.205.t: "Contenu immoral"
 pbi_objective_publishing_industry_events.205.d: "[SCOPE.gsInterestGroup('target_ig').GetName] exige des améliorations aux romans sérialisés de [SCOPE.sCharacter('target_character').GetFullName] en raison de leur contenu immoral."
 pbi_objective_publishing_industry_events.205.f: "\"Le contenu du roman controversé de [SCOPE.sCharacter('target_character').GetLastName], qui a été publié en feuilleton dans les journaux, est inacceptable\""
 pbi_objective_publishing_industry_events.205.a: "Les grandes œuvres sont inacceptables pour les anciennes valeurs"
 pbi_objective_publishing_industry_events.205.b: "Nous devons revoir le contenu"
 pbi_objective_publishing_industry_events.206.t: "Soupçon de plagiat"
 pbi_objective_publishing_industry_events.206.d: "None"
 pbi_objective_publishing_industry_events.206.f: "« La prétendue créativité de votre écrivain tant estimé est une pure fraude. Cette scène qu'il prétend avoir inventée est basée sur le chapitre d'un de mes livres. Comment peux-tu le nier ? La scène avec la baigneuse est tout à fait unique. Je revendique mes droits d'auteur !'"
 pbi_objective_publishing_industry_events.206.a: "C'est une fausse accusation"
 pbi_objective_publishing_industry_events.207.t: "Un roman comme une prophétie"
 pbi_objective_publishing_industry_events.207.d: "Le contenu des romans en série de [SCOPE.sCharacter('target_character').GetFullName] a attiré l'attention pour sa similitude frappante avec un meurtre bizarre récent dans [SCOPE.sState('target_state').GetName]."
 pbi_objective_publishing_industry_events.207.f: "« Il ne fait aucun doute que le problème de la pauvreté auquel notre société est actuellement confrontée est à l'origine de tels incidents. Et il est surprenant que le roman de [SCOPE.sCharacter('target_character').GetLastName], actuellement en cours de publication, contienne exactement la même description, comme s'il prédisait l'apparition d'une telle situation."
 pbi_objective_publishing_industry_events.207.a: "C'est une pièce qui capture l'époque"
 pbi_objective_publishing_industry_events.208.t: "Critiques de livres favorables par des célébrités"
 pbi_objective_publishing_industry_events.208.d: "[SCOPE.sCharacter('target_character_1').GetFullName], un membre influent du [SCOPE.gsInterestGroup('target_ig_1').GetName], a publié une critique favorable du roman [SCOPE.sCharacter('target_character').GetFullName] en cours de sérialisation."
 pbi_objective_publishing_industry_events.208.f: "« Tous les journaux publient des romans, mais celui de [SCOPE.sCharacter('target_character').GetFullName] est le plus intéressant de tous. Franchement, je suis étonné que [SCOPE.sCharacter('target_character').GetSheHe] ait un tel talent littéraire."
 pbi_objective_publishing_industry_events.208.a: "[SCOPE.sCharacter('target_character_1').GetLastName] a des yeux pour voir"
 pbi_objective_publishing_industry_events.208.b: "Je n'ai pas besoin de [SCOPE.sCharacter('target_character_1').GetHerHis] faveurs"
 pbi_objective_publishing_industry_events.209.t: "Critiques de livres critiques par des célébrités"
 pbi_objective_publishing_industry_events.209.d: "[SCOPE.sCharacter('target_character_1').GetFullName], un membre éminent du [SCOPE.gsInterestGroup('target_ig_1').GetName], a publié une critique critique d'un roman que [SCOPE.sCharacter('target_character').GetFullName] est en train de sérialiser."
 pbi_objective_publishing_industry_events.209.f: "« La laideur des romans feuilletons de [SCOPE.sCharacter('target_character').GetLastName] est exceptionnelle par rapport aux romans feuilletons de ces dernières années. En particulier, le roman publié cette semaine était banal. Il n’est plus possible de réparer cette histoire brisée. J'éprouve même de la sympathie pour [SCOPE.sCharacter('target_character').GetLastName], qui doit continuer à écrire des romans même si [SCOPE.sCharacter('target_character').GetSheHe] est devenu la risée du monde.'"
 pbi_objective_publishing_industry_events.209.a: "[SCOPE.sCharacter('target_character_1').GetLastName] révèle sa propre ignorance"
 pbi_objective_publishing_industry_events.210.t: "Les romans en série attirent l'attention"
 pbi_objective_publishing_industry_events.210.d: "Les romans de [SCOPE.sCharacter('target_character').GetFullName], publiés en feuilleton dans les journaux [SCOPE.sState('target_state').GetName], attirent de plus en plus d'attention à chaque épisode."
 pbi_objective_publishing_industry_events.210.f: "L'histoire des difficultés et des efforts du protagoniste, basée sur sa propre vie, a conquis le cœur de nombreux lecteurs."
 pbi_objective_publishing_industry_events.210.a: "J'ai hâte de voir la suite !"
 pbi_objective_publishing_industry_events.211.t: "Fan ardent"
 pbi_objective_publishing_industry_events.211.d.rich: "Les romans sérialisés de [SCOPE.sCharacter('target_character').GetFullName] sont populaires auprès de [concept_upper_strata] de [SCOPE.sState('target_state').GetName]."
 pbi_objective_publishing_industry_events.211.d.middle: "Les romans sérialisés de [SCOPE.sCharacter('target_character').GetFullName] sont populaires auprès de [concept_middle_strata] de [SCOPE.sState('target_state').GetName]."
 pbi_objective_publishing_industry_events.211.d.poor: "Les romans sérialisés de [SCOPE.sCharacter('target_character').GetFullName] sont populaires auprès de [concept_lower_strata] de [SCOPE.sState('target_state').GetName]."
 pbi_objective_publishing_industry_events.211.f: "Alors que l'on peut apprécier des romans provenant de divers journaux dans [SCOPE.sState('target_state').GetName], le travail de [SCOPE.sCharacter('target_character').GetFullName] a été extrêmement populaire ces dernières années."
 pbi_objective_publishing_industry_events.211.a: "Avez-vous prévu des événements de dédicaces ?"
 pbi_objective_publishing_industry_events.212.t: "Suspension de la sérialisation"
 pbi_objective_publishing_industry_events.212.d: "Le tribunal a ordonné que les romans en série de [SCOPE.sCharacter('target_character').GetFullName] cessent d'être publiés au motif que les personnages qui les composent calomnient certains hommes politiques."
 pbi_objective_publishing_industry_events.212.f: "Tous ceux qui ont lu le roman savent que les personnages du roman de [SCOPE.sCharacter('target_character').GetFullName] sont calqués sur certains politiciens."
 pbi_objective_publishing_industry_events.212.a: "Oh mon Dieu"
 pbi_objective_publishing_industry_events.300.t: "Les journalistes sur le champ de bataille"
 pbi_objective_publishing_industry_events.300.d: "Les articles envoyés depuis le [SCOPE.sFront('target_front').GetName] par des journalistes ayant servi dans la guerre du [SCOPE.sWar('target_war').GetName] ont suscité beaucoup d'intérêt."
 pbi_objective_publishing_industry_events.300.f: "« Le général [SCOPE.sCharacter('target_character').GetFullName] a ordonné des assauts répétés et a finalement réussi à forcer l'ennemi à battre en retraite, mais nos forces ont également subi d'énormes dégâts. Le résultat de cette bataille, qui a duré une demi-journée, n'a été qu'une avance de 100 mètres sur notre position."
 pbi_objective_publishing_industry_events.300.a: "Recrutons des bénévoles"
 pbi_objective_publishing_industry_events.300.b: "Collectons des dons"
 pbi_objective_publishing_industry_events.400.t: "Gagner la bataille diplomatique"
 pbi_objective_publishing_industry_events.400.d: "Nos discussions médiatisées avec [SCOPE.sCountry('target_country').GetName] ont été rapportées en masse dans la presse [SCOPE.sCountry('target_country').GetName]. Si cela a donné un élan au [Concept('concept_radical', '$concept_radicals$')] du [SCOPE.sCountry('target_country').GetName], cela a également suscité la condamnation du [SCOPE.sCountry('target_country').GetName] parmi les pays concernés."
 pbi_objective_publishing_industry_events.400.f: "'En réponse à la demande insolente #bold du diplomate [SCOPE.sCountry('target_country').GetName]#!, [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName] #bold a refusé de rencontrer#! le diplomate et l'a informé par l'intermédiaire de #bold un officier subalterne#! qu'il n'avait #bold plus rien à dire#! .'"
 pbi_objective_publishing_industry_events.400.a: "Même les imbéciles et les journaux peuvent être utiles entre les mains d'une personne intelligente."
 pbi_objective_publishing_industry_events.402.t: "Guerre de l'information"
 pbi_objective_publishing_industry_events.402.d: "Les journaux ont désormais plus de pouvoir que le discours de n'importe quel homme politique. Si nous utilisons ce pouvoir efficacement, nous devrions être capables de faire des dégâts à nos ennemis."
 pbi_objective_publishing_industry_events.402.f: "\"Vous fournissez les images et je fournirai la guerre.\"\nWilliam Randolph Hearst"
 pbi_objective_publishing_industry_events.402.a: "[SCOPE.sCountry('target_country_1').GetName] est notre ennemi"
 pbi_objective_publishing_industry_events.402.b: "Nous ne pouvons pas laisser [SCOPE.sCountry('target_country_2').GetName] continuer à croître"
 pbi_objective_publishing_industry_events.402.c: "Nous devons régler le problème avec [SCOPE.sCountry('target_country_3').GetName]"
 pbi_objective_publishing_industry_events.402.e: "Nous devrions y réfléchir attentivement"
 pbi_objective_publishing_industry_events.402.tt: "Nous reporterons d'un mois la décision sur le pays cible"
 pbi_objective_publishing_industry_events.403.t: "Poudrière"
 pbi_objective_publishing_industry_events.403.d: "Les journaux [SCOPE.sCountry('target_country').GetName] se sont plaints du fait que nos affirmations dans la région [SCOPE.sState('target_state').GetStateRegion.GetStrategicRegion.GetName] sont injustifiées."
 pbi_objective_publishing_industry_events.403.f: "Pour le [SCOPE.sState('target_state').GetStateRegion.GetStrategicRegion.GetName], un [concept_strategic_region] pour nous comme pour le [SCOPE.sCountry('target_country').GetName], les journaux [SCOPE.sCountry('target_country').GetName] font sans cesse appel à la légitimité de leurs droits. Les problèmes dans ce domaine stimuleront fortement l’opinion publique [SCOPE.sCountry('target_country').GetName]."
 pbi_objective_publishing_industry_events.403.a: "Il n'y a aucun moyen de ne pas en profiter"
 pbi_objective_publishing_industry_events.404.t: "Demande insolente"
 pbi_objective_publishing_industry_events.404.d: "Le gouvernement [SCOPE.sCountry('target_country').GetName], par l'intermédiaire de ses diplomates, nous demande des concessions et cherche une réunion secrète avec [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName]."
 pbi_objective_publishing_industry_events.404.f: "L'opinion publique [SCOPE.sCountry('target_country').GetName] commence à insister pour que la guerre soit ouverte si leur supériorité dans la région [SCOPE.sState('target_state').GetStateRegion.GetStrategicRegion.GetName] n'est pas reconnue. Il est presque certain que la dernière demande du gouvernement [SCOPE.sCountry('target_country').GetName] reflète son désir d'éviter la guerre en réprimant l'opinion publique nationale, qui est de plus en plus dominée par le camp favorable à la guerre ouverte."
 pbi_objective_publishing_industry_events.404.a: "Ils veulent tirer le rideau.\nEt de la manière qui leur convient le mieux !"
 pbi_objective_publishing_industry_events.405.t: "Télégramme du destin"
 pbi_objective_publishing_industry_events.405.d: "Un télégramme a été remis à [SCOPE.sCharacter('target_character').GetFullName], informant [SCOPE.sCharacter('target_character').GetHerHim] du contenu d'une réunion secrète avec [SCOPE.sCountry('target_country').GetName] diplomates dans la villa de [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName] au [SCOPE.sState('target_state_2').GetName]. Le [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] indiquait que le [ROOT.GetCountry.GetRuler.GetSheHe] laisserait au gouvernement le soin de décider s'il devait rendre public son contenu."
 pbi_objective_publishing_industry_events.405.f: "« Les diplomates [SCOPE.sCountry('target_country').GetName] ont non seulement exigé avec force une rencontre avec [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName], ils ont également demandé le retrait de notre [concept_interest] dans la région [SCOPE.sState('target_state').GetStateRegion.GetStrategicRegion.GetName] et, comme preuve de leur engagement, d'abdiquer. Le [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] a répondu en informant les diplomates que le [ROOT.GetCountry.GetRuler.GetSheHe] ne pouvait et ne devait pas prendre un tel engagement et que le [ROOT.GetCountry.GetRuler.GetSheHe] n'avait plus rien à dire lors de la réunion et que les négociations étaient interrompues."
 pbi_objective_publishing_industry_events.405.a: "Rendez-le public. Mais un peu excitant"
 pbi_objective_publishing_industry_events.405.a.tt: "Les choses se transforment en un [concept_diplomatic_incident]"
 pbi_objective_publishing_industry_events.405.b: "Ne pas être publié"
 pbi_objective_publishing_industry_events.405.b.tt: "La situation sera résolue à l'amiable"
 pbi_objective_publishing_industry_events.500.t: "Allumez la lumière"
 pbi_objective_publishing_industry_events.500.d: "Alors que les journaux commencent à publier des photos plutôt que des illustrations, la réalité brute de notre société est mise en lumière."
 pbi_objective_publishing_industry_events.500.f: "La photo montre une favela avec une sécurité médiocre et des conditions sanitaires médiocres. De nombreux travailleurs sont contraints d’effectuer des travaux dangereux pour de bas salaires. Les enfants sont obligés de travailler parce qu’ils ne sont pas autorisés à aller à l’école."
 pbi_objective_publishing_industry_events.500.a: "Nous devons nous concentrer sur l’expansion du bien-être."
 pbi_objective_publishing_industry_events.500.b: "[SCOPE.sCharacter('target_character_1').GetLastName] semble avoir changé d'avis à propos de [GetLawGroup('lawgroup_childrens_rights').GetName]"
 pbi_objective_publishing_industry_events.500.c: "[SCOPE.sCharacter('target_character_2').GetLastName] semble avoir changé d'avis à propos de [GetLawGroup('lawgroup_welfare').GetName]"
 pbi_objective_publishing_industry_events.500.e: "[SCOPE.sCharacter('target_character_3').GetLastName] semble avoir changé d'avis à propos de [GetLawGroup('lawgroup_citizenship').GetName]"
 gaudi_transatlantic_cable_expedition_modifier: "Expédition par câble transatlantique"
 gaudi_transatlantic_cable_expedition_failed_modifier: "Échec de l'expédition du câble transatlantique"