l_french:
 thriving_culture_lesson_start_tutorial_button_loc: "Démarrer le tutoriel"
 mr_tutorial_buttons: "Boutons Morgenröte"
 mr_tutorial_buttons_desc: "La plupart des éléments de Morgenröte sont accessibles dans les fenêtres de Morgenröte. Vous pouvez y accéder en cliquant sur les boutons de la barre latérale. Actuellement, ces fenêtres existent : #V Science Window#!: Vous y trouverez vos [Concept('concept_academics_academic','$concept_academics_academics$')], leurs activités, vos [concept_academics_progress] et les expéditions scientifiques.\n- #V Fenêtre Arts#!: Vous y trouverez vos [Concept('concept_artists_artist','$concept_artists_artists$')], leurs activités, vos [concept_artistic_progress] et [Concept('concept_artists_art_style','$concept_artists_art_styles$')].\N- #V Fenêtre Sports#!: Vous trouverez ici divers sports et personnages liés aux sports ainsi qu'à l'aéronautique, leurs activités, et les organisations sportives internationales."
 mr_tutorial_science_window_open: "Ouvrir la fenêtre scientifique"
 mr_tutorial_science_window_open_desc: "Nous allons maintenant examiner de plus près la fenêtre scientifique. Ouvrez la fenêtre scientifique en cliquant sur le bouton ou en appuyant sur la touche \"M\" de votre clavier."
 mr_tutorial_science_window_open_tt: "Ouvrez la fenêtre scientifique en cliquant sur le bouton science ou en appuyant sur \N \"M\N\"."
 mr_tutorial_science_tab: "La fenêtre scientifique"
 mr_tutorial_science_tab_desc: "The science window is the place where you can find information and actions for your scientific endeavours.\n\n\nIt is seperated in 4 tabs:\n\n- #V Overview#!: This tab contains [concept_academics_progress], #V General Scientific Expeditions#! and the #V Scientific Focus#!\n\n- #V Mathematical-Technical#!: This tab contains the [concept_tesla_engineer], [concept_mendelejew_chemist] and [concept_verrier_astronomer]\n\n- [concept_dubois_natural_history]: This tab contains the [concept_agassiz_geologist], [concept_dubois_paleontologist] and [concept_dubois_naturalist]\n\n- #V Humanities-Anthropological#!: This tab contains the [concept_panum_physician], [concept_lepsius_archaeologist] and [concept_lepsius_anthropologist]"
 mr_tutorial_science_tab_tt: "La fenêtre scientifique est ouverte"
 mr_tutorial_science_overview_tab_open: "Ouvrir l'onglet Vue d'ensemble"
 mr_tutorial_science_overview_tab_open_desc: "L'onglet Vue d'ensemble vous permet d'accéder aux pages [concept_academics_progress], #V General Scientific Expeditions#! et #V Scientific Focus#!\n\nAccéder à l'onglet Vue d'ensemble en cliquant sur le bouton de l'onglet."
 mr_tutorial_science_overview_tab_open_tt: "Accédez à l'onglet Vue d'ensemble en cliquant sur le bouton de l'onglet."
 mr_tutorial_science_overview_tab_promote_academics: "Promouvoir l'enseignement"
 mr_tutorial_science_overview_tab_promote_academics_desc: "Le cœur de Morgenröte, ce sont les personnages. Mais comment obtenir ces personnages ? \NPour obtenir un nouveau [concept_academics_academic], vous devez gagner suffisamment de [concept_academics_progress]. Vous pouvez survoler la barre de progression pour voir quels facteurs influencent le gain de progrès.\NVous pouvez promouvoir un Académicien spécifique si vous avez une Université avec un [concept_academics_university_specialization].\NVous pouvez également investir de l'argent pour gagner du progrès académique plus rapidement.\NVous pouvez également obtenir des Académiciens avec des événements ou en en achetant un avec une action diplomatique si vous êtes une nation qui n'appartient pas aux pays les plus avancés scientifiquement."
 mr_tutorial_science_overview_tab_scientific_focus: "Focus scientifique"
 mr_tutorial_science_overview_tab_scientific_focus_desc: "Il peut arriver que vous souhaitiez vous concentrer sur un type de recherche spécifique. Vous pouvez utiliser les foyers scientifiques si vous répondez à leurs exigences. Ils favoriseront essentiellement la recherche de certains groupes technologiques et réduiront l'efficacité d'autres groupes."
 mr_tutorial_science_overview_tab_scientific_expedition: "Expéditions scientifiques"
 mr_tutorial_science_overview_tab_scientific_expedition_desc: "Les expéditions scientifiques sont des expéditions que votre pays peut lancer. Selon le type d'expédition, votre pays peut en tirer de grands avantages. Actuellement, les expéditions suivantes existent:\N- [concept_dubois_pacific_expedition]\N- [concept_verrier_venus_transit] Expédition \N- Expédition pour trouver le passage du Nord-Ouest \N- Expédition Zeppelin \N- Expédition pour poser un câble transatlantique"
 mr_tutorial_science_natural_history_tab_open: "Ouvrir l'onglet Histoire naturelle"
 mr_tutorial_science_natural_history_tab_open_desc: "Examinons maintenant l'un des sites [Concept('concept_academics_academic','$concept_academics_academics$')]. Ouvrez l'onglet Histoire naturelle pour continuer."
 mr_tutorial_science_natural_history_tab_open_tt: "Accédez à l'onglet Histoire naturelle en cliquant sur le bouton de l'onglet."
 mr_tutorial_science_natural_history_tab_character: "Universitaires"
 mr_tutorial_science_natural_history_tab_character_desc: "Le cœur de Morgenröte, ce sont ses personnages. Dans l'onglet Science, ces personnages sont les [Concept('concept_academics_academic','$concept_academics_academics$')]. Sur le côté gauche de chaque nouveau rôle de personnage, vous pouvez voir un portrait de votre académicien et des informations supplémentaires à son sujet."
 mr_tutorial_science_natural_history_tab_character_rating: "Classement des personnages"
 mr_tutorial_science_natural_history_tab_character_rating_desc: "Pour la plupart des personnages, vous trouverez une petite icône à côté de leur nom. Cette icône indique leur aptitude à jouer leur rôle. Vous pouvez voir quels facteurs influencent cette note en survolant l'icône.\NExplication des icônes:\N@mr_rating_fantastic !  Parfait !@mr_rating_very_good !  Très bon!\n@mr_rating_good !  Bon!@mr_rating_mediocre !  Médiocre !  Mauvais@mr_rating_très_mauvais !  Très mauvais"
 mr_tutorial_science_natural_history_tab_character_experience_bar: "Expérience des personnages"
 mr_tutorial_science_natural_history_tab_character_experience_bar_desc: "Chaque personnage possède [concept_academics_experience] dans son domaine d'expertise. Plus l'expérience est élevée, plus le personnage est performant dans diverses tâches.\NL'expérience s'acquiert passivement chaque année ainsi qu'activement en accomplissant des tâches et en remportant des succès. [Concept('concept_academics_academic','$concept_academics_academics$')] obtient des traits plus élevés s'il atteint 100 (expérimenté) et 300 (célèbre) d'expérience."
 mr_tutorial_science_natural_history_tab_character_achievements: "Réalisations des personnages"
 mr_tutorial_science_natural_history_tab_character_achievements_desc: "[Concept('concept_academics_academic','$concept_academics_academics$')] réalisent parfois des exploits impressionnants. Vous pouvez toujours vérifier ce que votre académicien a accompli jusqu'à présent en survolant cette icône."
 mr_tutorial_science_natural_history_tab_currencies: "Discoveries and Values"
 mr_tutorial_science_natural_history_tab_currencies_desc: "La plupart des personnages de Morgenröte ont des valeurs qui leur sont attachées. Ces valeurs sont affichées au centre de chaque académie. Pour la géologie, vous verrez par exemple combien de minéraux ont été trouvés ou quel est votre niveau de connaissance en géologie."
 mr_tutorial_science_natural_history_visit_button: "Visiter le bouton"
 mr_tutorial_science_natural_history_visit_button_desc: "La plupart des sites [Concept('concept_academics_academic','$concept_academics_academics$')] ont des boutons de visite spéciaux qui vous permettent d'en savoir plus sur l'université en question. Le site [concept_dubois_naturalist], par exemple, a un bouton qui vous permet de visiter le zoo et d'en savoir plus sur les animaux qui s'y trouvent."
 mr_tutorial_science_natural_history_ranking: "Classement"
 mr_tutorial_science_natural_history_ranking_desc: "Peut-être aimez-vous vous comparer à d'autres pays. Dans ce cas, le classement pourrait vous intéresser. En survolant cette icône, vous verrez apparaître différentes listes qui vous permettront de comparer vos performances dans un certain domaine de la Morgenröte par rapport à d'autres pays.\NLa page [concept_agassiz_geologist] vous permet par exemple de comparer votre score géologique, vos connaissances géologiques, vos connaissances océaniques, vos minerais et vos minerais rares."
 mr_tutorial_science_natural_history_project_buttons: "Boutons de projet et autres boutons"
 mr_tutorial_science_natural_history_project_buttons_desc: "Cette partie de l'interface est l'une des plus importantes pour vous. Elle vous permet de confier des projets à votre [Concept('concept_academics_academic','$concept_academics_academics$')] et de lancer d'autres interactions importantes.\NUn [concept_agassiz_geologist] peut partir en expédition, améliorer vos industries, recalculer l'âge de la terre et vous pouvez fonder un cabinet de minerais ou lancer un congrès sur la dérive des continents."
 mr_tutorial_science_natural_history_view_switch_buttons: "Modifier la mise en page"
 mr_tutorial_science_natural_history_view_switch_buttons_desc: "Si vous préférez un interfacage plus dense, vous pouvez en changer l'aspect en utilisant ce bouton. Pour le jeu lui-même, la variante utilisée n'a pas d'importance. Choisissez donc la variante qui vous plaît le plus."
 mr_start_culture_tutorial_button_loc: "Tutoriel sur la culture"
 mr_tutorial_not_yet_implemented_tt: "Ce tutoriel n'est pas encore prêt."
 mr_tutorial_arts_window_open: "Ouvrir la fenêtre Arts"
 mr_tutorial_arts_window_open_desc: "Nous allons maintenant examiner de plus près la fenêtre des arts. Ouvrez la fenêtre des arts en cliquant sur le bouton ou en appuyant sur les touches \"Ctrl + A\" de votre clavier."
 mr_tutorial_arts_window_open_tt: "Ouvrez la fenêtre des arts en cliquant sur le bouton science ou en appuyant sur \"Ctrl + A\"."
 mr_tutorial_arts_tab: "Onglet Arts"
 mr_tutorial_arts_tab_desc: "Les arts ont joué un rôle important aux 19e et 20e siècles. Les grands [Concept('concept_artists_artist','$concept_artists_artists$')] de cette époque sont encore bien connus aujourd'hui.\NMorgenröte propose différents types d'artistes et leurs œuvres d'art.\NLa fenêtre des arts elle-même comporte deux onglets. L'un vous donne une vue d'ensemble des arts dans votre pays, l'autre vous permet de trouver vos artistes et de recruter des artistes étrangers."
 mr_tutorial_arts_tab_cultural_tradition: "Tradition culturelle"
 mr_tutorial_arts_tab_cultural_tradition_desc: "La Tradition culturelle est une valeur représentant les réalisations culturelles de votre pays.\NElle se compose de [concept_elgar_musical_tradition], [concept_manzoni_literary_tradition] et [concept_klimt_painting_tradition].\NLa Tradition culturelle est calculée en utilisant la formule suivante:\NTradition musicale / 4 + Tradition picturale / 3 + Tradition littéraire / 2 .\NVous gagnerez en plus [concept_prestige] grâce à votre Tradition artistique. Chaque tranche de 5 points de Tradition artistique rapporte 1 Prestige supplémentaire."
 mr_tutorial_arts_overview_tab_open_tt: "Ouvrir l'onglet Vue d'ensemble des arts"
 mr_tutorial_arts_tab_artist_progress: "Progrès de l'artiste"
 mr_tutorial_arts_tab_artist_progress_desc: "Vous pouvez obtenir de nouveaux [Concept('concept_artists_artist','$concept_artists_artists$')] de différentes manières : Vous pouvez les recruter, les gagner avec des événements ou en collectant suffisamment de [concept_artistic_progress]. Alors que les événements et le recrutement ne sont pas possibles pour toutes les nations, gagner des artistes en remplissant la barre de progression artistique est possible une fois que vous possédez un $building_elgar_opera$ ou un $building_art_academy$. Vous pouvez voir une liste complète des facteurs influençant le gain mensuel en survolant la barre de progression . En outre, vous pouvez patronner les arts pour gagner plus de progrès et promouvoir certains artistes si vous avez le [concept_production_method] nécessaire dans votre $building_art_academy$."
 mr_tutorial_arts_tab_center_of_arts: "Centre des arts"
 mr_tutorial_arts_tab_center_of_arts_desc: "[Concept('concept_artists_center_of_arts','$concept_artists_centers_of_arts$')] sont les lieux où un [concept_artists_art_style] est né. Certains Centres d'art existent déjà au début du jeu. D'autres peuvent être débloqués par [Concept('concept_journal_entry','$concept_journal_entries$')] ou en appuyant sur l'un des boutons que vous pouvez voir ici. Survolez le Centre d'art pour voir comment vous pouvez l'acquérir. Les Centres d'art sont évidemment utiles pour vous et votre pays car ils vous donnent accès à des bonus."
 mr_tutorial_arts_tab_artists_tab_open: "Ouvrir l'onglet Artistes"
 mr_tutorial_arts_tab_artists_tab_open_desc: "Examinons maintenant de plus près le site [Concept('concept_artists_artist','$concept_artists_artists$')]. Ouvrez l'onglet Artistes en cliquant sur le bouton de l'onglet."
 mr_tutorial_arts_tab_artists_tab_open_open_tt: "Ouvrir l'onglet Artistes"
 mr_tutorial_arts_tab_artists: "Onglet Artistes"
 mr_tutorial_arts_tab_artists_desc: "Les [Concept('concept_artists_artist','$concept_artists_artists$')] ressemblent beaucoup aux Academics, mais leur fonctionnement est légèrement différent.\n- Actuellement, il y a 3 Artists:\n- [concept_elgar_composer]\n- [concept_manzoni_writer]\n- [concept_klimt_painter]"
 mr_tutorial_arts_tab_artists_invite: "Invitation aux artistes"
 mr_tutorial_arts_tab_artists_accquisation_desc: "Comme nous l'avons déjà mentionné, [Concept('concept_artists_artist','$concept_artists_artists$')] ne peut pas seulement être acquis en gagnant suffisamment de [concept_artistic_progress] mais aussi en les invitant simplement.\NChaque type d'artiste a des exigences différentes. Vous pouvez inviter [Concept('concept_elgar_travelling_composer','$concept_elgar_travelling_composers$')] du monde entier, mais vous devez être un pays avec suffisamment de $building_elgar_opera$et une assez bonne [concept_elgar_musical_tradition].\N-[Concept('concept_klimt_independent_painter','$concept_klimt_independent_painters$')] ne peut être invité que s'il a une culture similaire.\N-[Concept('concept_manzoni_writer','$concept_manzoni_writers$')] en revanche ne peut pas être invité du tout."
 mr_tutorial_arts_tab_artists_character: "Informations générales"
 mr_tutorial_arts_tab_artists_character_desc: "La partie la plus à gauche de la fenêtre vous montre quelques informations de base sur votre artiste.\NVous pouvez voir ici:\N-Le portrait\N-Le nom et le classement\N-L'adresse [concept_artists_experience]\N- Le nom de l'artiste et le nom de l'artiste. [Concept('concept_character_trait','$concept_character_traits$')]"
 mr_tutorial_arts_tab_artists_currencies: "Valeurs artistiques importantes"
 mr_tutorial_arts_tab_artists_currencies_desc: "Cette partie de l'interface vous permet de voir des informations générales concernant cet aspect spécifique de l'art.\NPour le site [concept_elgar_composer], il affiche le site [concept_elgar_musical_tradition], les compositions et les œuvres maîtresses de votre compositeur et un aperçu des cinq meilleurs compositeurs du monde par exemple.\NEn outre, vous pouvez trouver un classement en survolant la petite icône dans le coin supérieur droit."
 mr_tutorial_arts_tab_artists_actions: "Actions des artistes"
 mr_tutorial_arts_tab_artists_actions_desc: "[Concept('concept_artists_artist','$concept_artists_artists$')] ont également des actions. Ici, vous pouvez voir sur quoi vos artistes peuvent travailler ou quelles décisions vous pouvez prendre avec votre nation. Voilà les informations les plus importantes concernant les artistes. Vous pouvez continuer avec le Tutoriel pour les Sports à partir d'ici ou continuer votre jeu."
 mr_start_sports_tutorial_button_loc: "Tutoriel sur le sport"
 mr_tutorial_sports_window_open: "Ouvrir la fenêtre Sports"
 mr_tutorial_sports_window_open_desc: "Nous allons maintenant examiner de plus près la fenêtre des sports. Ouvrez la fenêtre des sports en cliquant sur le bouton ou en appuyant sur les touches \"Ctrl + S\" de votre clavier."
 mr_tutorial_sports_window_open_tt: "Ouvrez la fenêtre des sports en cliquant sur le bouton science ou en appuyant sur \"Ctrl + S\"."
 mr_tutorial_sports_window: "Fenêtre de sport"
 mr_tutorial_sports_window_desc: "La fenêtre des sports vous permet d'accéder à tous les sports différents et aux personnages qui sont pertinents pour les sports.\NLa fenêtre est séparée en sports normaux et aéronautique.\NLes sports normaux comprennent:\N- [concept_vikelas_olympic_games]\N- [concept_douglas_mountaineering]\N- Sports de balle\N- [concept_vikelas_car_racing]\NL'aéronautique comprend:\N- [concept_curtiss_balloonist]\N- [concept_curtiss_pilot]"
 mr_tutorial_sports_tab: "Onglet Sports"
 mr_tutorial_sports_tab_desc: "L'onglet Sports vous donne un aperçu de diverses activités et personnages liés au sport. Contrairement aux Universitaires et aux Artistes, les personnages de l'onglet Sports sont souvent des généraux ou des politiciens."
 mr_tutorial_sports_tab_open_tt: "Ouvrir l'onglet Sports"
 mr_tutorial_sports_tab_character_overview: "Aperçu des personnages"
 mr_tutorial_sports_tab_character_overview_desc: "Cette partie de l'interface utilisateur vous donne un aperçu de [concept_character]. Certains personnages comme [concept_vikelas_coach] et Car Racer sont des personnages que vous pouvez obtenir et qui ont donc [concept_academics_experience]. D'autres, comme le Mountaineer, n'ont pas d'expérience."
 mr_tutorial_sports_tab_currencies: "Valeurs et informations"
 mr_tutorial_sports_tab_currencies_desc: "Au milieu, vous pouvez voir des informations importantes concernant ce sport spécifique.\NLa page [concept_vikelas_olympic_games], par exemple, présente le président et le conseil d'administration de [concept_vikelas_ioc], le nombre de membres et le nombre de médailles obtenues jusqu'à présent."
 mr_tutorial_sports_tab_actions: "Actions"
 mr_tutorial_sports_tab_actions_desc: "Le côté droit vous permet de prendre des mesures spécifiques pour ce sport.\NCes mesures sont essentiellement des décisions qui vous permettent d'utiliser votre [Concept('concept_character', '$concept_characters$')] ou d'établir quelque chose de nouveau comme [concept_vikelas_ioc]."
 mr_tutorial_sports_tab_aeronautics_tab_open: "Ouvrir l'onglet Aéronautique"
 mr_tutorial_sports_tab_aeronautics_tab_open_desc: "Examinons maintenant de plus près l'onglet Aéronautique. Ouvrez l'onglet en cliquant sur le bouton."
 mr_tutorial_aeronautics_tab_open_tt: "Ouvrir l'onglet Aéronautique"
 mr_tutorial_aeronautics_tab: "Onglet Aéronautique"
 mr_tutorial_aeronautics_tab_desc: "L'onglet Aéronautique est en grande partie identique à l'onglet Sports. Une grande différence réside dans les personnages eux-mêmes. Vous pouvez sponsoriser et automatiser le [concept_curtiss_balloonist] et le [concept_curtiss_pilot] apparaîtra dans diverses circonstances. \NCeci est la fin de l'aperçu du Tutoriel. N'hésitez pas à utiliser la Vickypedia ou les Concepts que nous avons ajoutés si vous souhaitez en savoir plus sur les personnages de Morgenröte."
 mr_tutorial_lesson_button_finish: "Tutoriel de finition"
