 douglas.103.t: "Régiment de troupes de montagne"
 douglas.103.d: "Grâce à son expérience impressionnante en matière de conquête et de défense des montagnes, [SCOPE.sCharacter('douglas_mountain_veteran').GetFullName] a décidé d'utiliser ses compétences supérieures pour créer une unité d'élite de troupes de montagne."
 douglas.103.f: "Les Gebirgsjäger, les Alpini ou les Chasseurs Alpins ne sont que quelques exemples des troupes d'élite de certains pays qui se sont spécialisées dans la guerre sur les hauteurs. Créés en 1872, les Alpini sont la plus ancienne infanterie de montagne active au monde. Leur mission initiale était de protéger la frontière de l'Italie avec la France et l'Autriche-Hongrie."
 douglas.103.g: "Ils porteront son héritage à l'avenir."
