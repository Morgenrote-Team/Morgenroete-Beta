 douglas.101.t: "Création du club d'alpinisme"
 douglas.101.d: "[SCOPE.sCharacter('douglas_president_scope').GetFullName] et la montagne répond. La création du Club d'alpinisme marque une nouvelle ère pour tous ceux qui visent plus haut."
 douglas.101.f: "[SCOPE.sCharacter('douglas_president_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('douglas_president_scope').GetLastName] Les expéditions de [SCOPE.sCharacter('douglas_president_scope').GetHerHim] ont traversé des tempêtes et des avalanches, mais aujourd'hui, [SCOPE.sCharacter('douglas_president_scope').GetSheHe] cherche à transmettre l'héritage de [SCOPE.sCharacter('douglas_president_scope').GetHerHis]. Sur [ROOT.GetCountry.GetCapital.GetCityHubName], [SCOPE.sCharacter('douglas_president_scope').GetSheHe] fonde le club d'alpinisme de [GetPlayer.GetName], non pas seul, mais aux côtés d'un nouveau venu prometteur : [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] [SCOPE.sCharacter('douglas_president_scope').GetFullName] voit en [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetHerHim] non seulement de l'ambition, mais aussi une future légende. Ensemble, ils se trouvent au seuil d'un chemin qui ne mène pas seulement aux sommets, mais à la gloire, au courage et peut-être à une place dans l'histoire. Le club est ouvert à tous ceux qui entendent l'appel de la montagne. L'ascension commence."
 douglas.101.g: "La montagne vous appelle !"
 douglas.102.t: "Le Club Alpin"
 douglas.102.d: "Le Club Alpin a été officiellement fondé à [ROOT.GetCountry.GetCapital.GetCityHubName] en [TimeKeeper.GetCurrentDate.Format('y')] et est reconnu comme la première organisation internationale d'alpinisme au monde. Sa création marque le début institutionnel de l'alpinisme moderne."
 douglas.102.f: "Historiquement, un groupe de gentlemen britanniques s'est réuni à Londres en 1857 pour créer un club dédié à l'alpinisme. Dirigé par des personnalités telles que John Ball et Edward Kennedy, l'Alpine Club cherchait à promouvoir l'exploration systématique des Alpes, en combinant le défi physique avec l'étude géographique et naturelle. Le club offrait un cadre structuré pour le partage des connaissances, l'organisation d'expéditions et le développement d'un sens de la communauté parmi les alpinistes. Ses membres ont joué un rôle clé dans ce que l'on appellera plus tard \"l'âge d'or de l'alpinisme\", en réalisant de nombreuses premières ascensions et en documentant leurs expériences. La publication de l'Alpine Journal a commencé peu après, contribuant à la littérature naissante de l'alpinisme. La création du Club Alpin a jeté les bases de l'organisation de l'escalade dans le monde entier et a établi des normes durables en matière d'exploration des montagnes."
 douglas.102.g: "Ensemble vers le sommet !"
