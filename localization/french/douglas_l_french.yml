 douglas.211.t: "Le sommet"
 douglas.211.d: "Après une ascension laborieuse, le groupe d'alpinistes atteint enfin le sommet. [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] est le premier homme à prendre d'assaut cet endroit de la terre pour [ROOT.GetCountry.GetNameNoFormatting]. Il ne reste plus qu'à savourer ce moment de triomphe."
 douglas.211.f: "La première question que vous poserez et à laquelle j'essaierai de répondre est la suivante : \"A quoi sert l'ascension de l'Everest\", et ma réponse doit être immédiate : Cela ne sert à rien. Il n'y a pas la moindre perspective de gain. Oh, nous apprendrons peut-être un peu sur le comportement du corps humain à haute altitude, et peut-être que les médecins utiliseront nos observations pour les besoins de l'aviation. Mais sinon, il n'en sortira rien. Nous ne ramènerons pas un seul morceau d'or ou d'argent, pas une pierre précieuse, pas de charbon ni de fer. Nous ne trouverons pas un seul pied de terre qui puisse être cultivé pour produire de la nourriture. Cela ne sert à rien. Si vous ne pouvez pas comprendre qu'il y a quelque chose dans l'homme qui répond au défi de cette montagne et qui va à sa rencontre, que la lutte est la lutte de la vie elle-même vers le haut et pour toujours vers le haut, alors vous ne comprendrez pas pourquoi nous partons. Ce que nous retirons de cette aventure, c'est la joie pure et simple. Et la joie est, après tout, la fin de la vie. Nous ne vivons pas pour manger et gagner de l'argent. Nous mangeons et gagnons de l'argent pour pouvoir profiter de la vie. C'est ce que la vie signifie et à quoi elle sert\" - George Leigh Mallory"
 douglas.211.g: "Profitons de l'aube !"
 douglas.212.t: "Escalade interrompue"
 douglas.212.d: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName]La tentative d'atteindre le sommet a échoué pour l'instant. Notre alpiniste est contraint d'abandonner l'aventure et de rentrer."
 douglas.212.f: "Les raisons pour lesquelles un alpiniste abandonne l'ascension peuvent être multiples. Parfois, un changement de temps suffit ; parfois, un accès supposé au sommet s'avère trop périlleux. Une ascension prend souvent trop de temps et dépasse une fenêtre de temps parce que certaines heures de la journée et certains changements rendent l'ascension difficile ou impossible. Et parfois, vous avez tout simplement choisi le mauvais chemin."
 douglas.212.g: "Décevant."
 douglas.213.t: "Désastre de l'alpinisme !"
 douglas.213.d: "Lors de l'ascension des montagnes de [SCOPE.sState('douglas_location_scope').GetName], [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] a commis une terrible erreur qui a entraîné la catastrophe de l'expédition : plusieurs personnes sont mortes, des provisions et du matériel sont tombés avec elles. Tout le pays est en état de choc !"
 douglas.213.f: "Chaque nuit, comprends-tu, je vois mes camarades du Cervin glisser sur le dos, les bras tendus, l'un après l'autre, dans un ordre parfait et à égale distance - Croz le guide, d'abord, puis Hadow, puis Hudson, et enfin Douglas. Oui, je les verrai toujours...\"- Edward Whymper"
 douglas.213.g: "Une tragédie !"
