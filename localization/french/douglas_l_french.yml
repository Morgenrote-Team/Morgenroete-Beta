 douglas_stop_mountaineering_project_button_desc: "Arrêtez votre projet d'alpinisme en cours. Vos progrès en matière d'alpinisme seront perdus."
 douglas_stop_mountaineering_project_tt: "Vous avez décidé d'arrêter le projet en cliquant sur le bouton #italic Stop Mountaineering Project#!."
 douglas.104.t: "La montagne intérieure"
 douglas.104.d: "Après cinq années épuisantes d'escalade et d'entraînement, [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] est de retour."
 douglas.104.f: "La montagne n'a pas de voix, mais elle enseigne. Pendant cinq longues années, notre alpiniste a affronté l'aveuglement dû à la neige, les parois rocheuses qui s'effritent, le vent mordant et le silence qui coupe plus profondément que n'importe quelle lame. Pourtant, chaque épreuve a transformé le savoir en muscle, la patience en souffle. Ce qui n'était au départ qu'une ambition s'est transformé en compétence. Le grimpeur a appris à écouter la pierre, à prédire les tempêtes à l'odeur, à faire des nœuds les yeux fermés et le cœur tranquille. [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetSheHe|U] revient transformé. C'est le début de la maîtrise."
 douglas.104.g: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetSheHe|U] ne conquiert plus la montagne -[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetSheHe] la comprend"
