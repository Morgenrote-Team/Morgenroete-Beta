 je_douglas_mountaineering_equipment_success: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] terminera le travail sur [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetHerHis] après un an."
 douglas.111.t: "La première étape"
 douglas.111.d: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] équipe l'équipe avec du matériel d'escalade de base."
 douglas.111.f: "L'ère des ascensions improvisées est révolue. Sous la direction d'un [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName], l'équipe reçoit son premier équipement standardisé : cordes, piolets, pitons et sacs solides. Ces outils ne sont pas seulement salvateurs, ils modifient la perception même de la montagne. L'ascension devient plus méthodique, plus calculée. Alors qu'autrefois le courage et la force brute étaient les seules choses qui comptaient, la technique et la préparation occupent désormais le devant de la scène. C'est une étape modeste, mais déterminante pour tous ceux qui osent entrer dans le monde impitoyable de la glace et du rocher."
 douglas.111.g: "Aujourd'hui, les montagnes appartiennent aux préparés."
 douglas.112.t: "Liés par une corde"
 douglas.112.d: "Notre alpiniste [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] a une nouvelle idée : Pour améliorer la sécurité, des équipes de cordes fixes sont mises en place."
 douglas.112.f: "Chaque pas en montagne comporte un risque, mais désormais, plus personne ne grimpe seul. L'introduction des cordées marque un changement d'état d'esprit : ce n'est plus l'individu contre la montagne, mais une chaîne de grimpeurs unis par la confiance et par une corde tissée. Ce changement apporte de l'ordre, de la discipline et un profond sentiment de responsabilité partagée. Si l'un tombe, les autres le retiennent. Le danger n'est pas éliminé, mais redistribué. La montagne reste sauvage, mais notre réponse n'est plus héroïque, mais coopérative."
 douglas.112.g: "Une corde. Une volonté. Une équipe."
 douglas.113.t: "Le corps fragile"
 douglas.113.d: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] insiste sur la mise en place d'un système de premiers secours pour l'équipe."
 douglas.113.f: "Ampoules, fractures, engelures, la montagne est sans pitié. Ce qui était autrefois accepté comme faisant partie du risque est aujourd'hui traité de manière systématique. Une petite trousse médicale, utilisée à bon escient, peut sauver une vie. Un abri rapidement construit peut faire gagner du temps. Pour la première fois, les connaissances médicales de base font partie de la formation. La montagne exige toujours tout, mais avec l'introduction des trousses de secours et des plans d'urgence, l'équipe répond avec plus que du cran. Le corps humain n'est plus ignoré, il est protégé."
 douglas.113.g: "Même les plus forts peuvent tomber."
 douglas.114.t: "La pierre parle"
 douglas.114.d: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] a introduit des méthodes scientifiques dans l'alpinisme : Les connaissances géologiques sont introduites pour améliorer l'analyse du terrain."
 douglas.114.f: "Ce qui semblait être un arrière-plan - bulles, sédiments, roches - devient maintenant un langage à lire. Un membre de l'équipe apporte son expertise géologique : les couches révèlent les mouvements anciens, les types de roches mettent en garde contre les avalanches, les lignes de faille guident les itinéraires de sécurité. La montagne n'est plus un mythe, c'est une archive. La science arrive avec des carnets et des marteaux, et soudain, les expéditions ne sont plus seulement des aventures, mais des études de terrain. C'est une nouvelle façon de voir, une révolution tranquille."
 douglas.114.g: "Apprenons avant de grimper."
 douglas.115.t: "Le souffle de l'altitude"
 douglas.115.d: "Pourquoi ne pas utiliser l'expérience acquise dans le domaine de la guerre chimique pour les travaux d'alpinisme ? Les nouvelles technologies permettent d'utiliser des masques à oxygène à des hauteurs extrêmes."
 douglas.115.f: "A partir d'une certaine altitude, le ciel s'amenuise. La respiration devient un combat, le corps proteste. Mais aujourd'hui, grâce à des appareils mécaniques, l'homme atteint des endroits où il n'était pas censé aller. Les masques à oxygène - autrefois une curiosité de la science - deviennent la norme. Ils redéfinissent les limites du possible. Le monde au-dessus de 7 000 mètres devient accessible, mais à un certain prix : l'alpiniste n'est plus vraiment seul, mais fait partie d'un système de survie. Le triomphe sur la montagne n'en est pas diminué, il est seulement rendu plus froid."
 douglas.115.g: "Nous respirons artificiellement, mais nous nous imposons."
