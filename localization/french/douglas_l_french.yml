 je_douglas_mountaineering_equipment_reason: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] est en train de rééquiper l'équipe d'alpinistes de notre pays. Cette remise à niveau prendra un an, mais elle améliorera leurs chances de réussite lors de la tentative d'ascension du sommet."
 douglas_mountaineering_equipment_advance_tt: "L'équipement d'alpinisme se modernise d'un niveau"
