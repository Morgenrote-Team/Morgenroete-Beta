 douglas.201.t: "Expédition d'alpinisme - Niveau 1"
 douglas.201.d: "Le club d'alpinisme a créé une sélection de montagnes qui ne nécessitent qu'un minimum d'équipement d'alpinisme pour tenter une ascension."
 douglas.202.t: "Expédition d'alpinisme - Niveau 2"
 douglas.202.d: "Le club d'alpinisme a créé une sélection de montagnes qui nécessitent un équipement d'alpinisme standard pour tenter l'ascension."
 douglas.203.t: "Expédition d'alpinisme - Niveau 3"
 douglas.203.d: "Le club d'alpinisme a créé une sélection de montagnes qui nécessitent un bon équipement d'alpinisme pour tenter l'ascension."
 douglas.204.t: "Expédition d'alpinisme - Niveau 4"
 douglas.204.d: "Le Club d'alpinisme a créé une sélection de montagnes qui nécessitent un équipement d'alpinisme de haute qualité pour tenter l'ascension."
 douglas.205.t: "Expédition d'alpinisme - Niveau 5"
 douglas.205.d: "Le club d'alpinisme a créé une sélection de montagnes qui nécessitent le meilleur équipement d'alpinisme pour tenter l'ascension."
