 je_douglas_mountaineering_expedition_reason: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName]Notre alpiniste est actuellement à la tête d'une équipe d'alpinistes pour une expédition à [SCOPE.sState('douglas_location_scope').GetName]. L'objectif est la première ascension d'un sommet. La rapidité de l'ascension dépend en grande partie de son expérience et de ses traits de caractère. Selon la difficulté de la montagne, des dangers plus importants peuvent survenir. Si l'expédition n'atteint pas son objectif dans un certain délai, [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] abandonnera l'ascension du sommet. Si, pour une raison ou une autre, l'expédition s'enfonce dans le plus grand danger imaginable, le pire se produira."
