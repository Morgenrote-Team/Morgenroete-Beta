 khaldun_reorganize_library_button: "Réorganiser la bibliothèque" #NT!
 khaldun_reorganize_library_button_desc: "La bibliothèque présente de nombreux vieux tomes et livres, mais il a été négligé au fil des ans. Une réorganisation des œuvres est nécessaire d'urgence." #NT!
 khaldun_accquire_modern_books_button: "Acquir Livres modernes" #NT!
 khaldun_accquire_modern_books_button_desc: "Il y a des pays qui sont scientifiquement loin devant nous. Nous devrions essayer d'accorder certains de leurs livres pour permettre à notre bibliothèque de redevenir une source de Knwoledge." #NT!
