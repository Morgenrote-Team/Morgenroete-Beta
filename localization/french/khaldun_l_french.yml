 khaldun_al_qarawiyyin_center_of_learning_modifier: "Centre d'apprentissage à al-Qarawiyyin" #NT!
  
 khaldun.101.t: "Al-Qarawiyyin: Centre d'apprentissage" #NT!
 khaldun.101.d: "Il y a des siècles, Al-Qarawiyyin a été un centre de science et d'apprentissage. Maintenant, il est revenu à sa place comme l'une des principales universités du monde." #NT!
 khaldun.101.f: "\ "Al-Qarawiyyin a été une université plus longue que toutes les universités d'Europe. Il a abrité de nombreux livres mais a malheureusement commencé à décliner. Aujourd'hui marque le jour où cette université reprend sa place légitime! \"" #NT!
 khaldun.101.g: "Al-Qarawiyyin sera un phare d'apprentissage!" #NT!
 khaldun.101.h: "Al-Qarawiyyin sera un phare de mathématiques et d'ingénierie!" #NT!
 khaldun.101.i: "Al-Qarawiyyin sera un phare de l'histoire naturelle!" #NT!
 khaldun.101.j: "Al-Qarawiyyin sera un phare des sciences humaines!" #NT!