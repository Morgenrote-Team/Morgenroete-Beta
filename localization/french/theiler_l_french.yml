 theiler_biologist_medicinal_plant_project_progress_bar_at_full_tt: "The Pharmaceutical Progress has reached #variable 100%#!"
 je_theiler_medicinal_plant_emetine: "Carapichae Ipecacuanha"
 je_theiler_medicinal_plant_emetine_reason: "The process of inventing a new pharmaceutical typically follows this sequence: Based on the level of your Medical Technique, a [concept_panum_physician] proposes finding specific [concept_ito_medicinal_plants] for medicinal use, in this case at least #V 5 [AddLocalizationIf( Scope.Var('theiler_physician_demand_var').IsSet , Scope.Var('theiler_physician_demand_var').GetFlagName)]#!. A [concept_dubois_naturalist] is tasked with collecting enough samples to isolate them. A [concept_mendelejew_chemist] then isolates the chemical substance. Once it has been found, a [concept_theiler_biologist] can produce the pharmaceutical.\n\nCarapichea ipecacuanha is a tropical plant native to South America, especially Brazil. Its roots contain the alkaloids emetine and cephaeline, which induce vomiting and have antiparasitic effects. Traditionally, ipecac root was used as an emetic to treat poisoning and as an expectorant in cough syrups."
 je_theiler_medicinal_plant_emetine_success: "[GetPlayer.GetName] has collected at least #V 5 Carapichae Ipecacuanha#!."
 je_theiler_medicinal_plant_atropine: "Atropa Belladonna"
 je_theiler_medicinal_plant_atropine_reason: "The process of inventing a new pharmaceutical typically follows this sequence: Based on the level of your Medical Technique, a [concept_panum_physician] proposes finding specific [concept_ito_medicinal_plants] for medicinal use, in this case at least #V 5 [AddLocalizationIf( Scope.Var('theiler_physician_demand_var').IsSet , Scope.Var('theiler_physician_demand_var').GetFlagName)]#!. A [concept_dubois_naturalist] is tasked with collecting enough samples to isolate them. A [concept_mendelejew_chemist] then isolates the chemical substance. Once it has been found, a [concept_theiler_biologist] can produce the pharmaceutical.\n\nAtropa belladonna, also known as deadly nightshade, is a perennial plant native to Europe, North Africa, and Western Asia. It contains toxic alkaloids such as atropine, scopolamine, and hyoscyamine, which affect the nervous system by blocking acetylcholine receptors. Historically, it was used as a sedative, pain reliever, and to dilate pupils. In modern medicine, purified atropine is used in ophthalmology and to treat bradycardia or poisoning by organophosphates."
 je_theiler_medicinal_plant_atropine_success: "[GetPlayer.GetName] has collected at least #V 5 Atropa Belladonna#!."
 je_theiler_medicinal_plant_aloin: "Aloe Vera"
 je_theiler_medicinal_plant_aloin_reason: "The process of inventing a new pharmaceutical typically follows this sequence: Based on the level of your Medical Technique, a [concept_panum_physician] proposes finding specific [concept_ito_medicinal_plants] for medicinal use, in this case at least #V 5 [AddLocalizationIf( Scope.Var('theiler_physician_demand_var').IsSet , Scope.Var('theiler_physician_demand_var').GetFlagName)]#!. A [concept_dubois_naturalist] is tasked with collecting enough samples to isolate them. A [concept_mendelejew_chemist] then isolates the chemical substance. Once it has been found, a [concept_theiler_biologist] can produce the pharmaceutical.\n\nAloe vera is a succulent plant native to North Africa and the Arabian Peninsula. Its thick leaves contain a gel rich in polysaccharides, vitamins, and enzymes with soothing and moisturizing properties. The gel is widely used in cosmetics and medicine to treat burns, wounds, and skin irritations. Dried latex from the leaf's inner layer contains aloin, a compound with strong laxative effects."
 je_theiler_medicinal_plant_aloin_success: "[GetPlayer.GetName] has collected at least #V 5 Aloe Vera#!."
 je_theiler_medicinal_plant_digitoxin: "Digitalis Purpurea"
 je_theiler_medicinal_plant_digitoxin_reason: "The process of inventing a new pharmaceutical typically follows this sequence: Based on the level of your Medical Technique, a [concept_panum_physician] proposes finding specific [concept_ito_medicinal_plants] for medicinal use, in this case at least #V 5 [AddLocalizationIf( Scope.Var('theiler_physician_demand_var').IsSet , Scope.Var('theiler_physician_demand_var').GetFlagName)]#!. A [concept_dubois_naturalist] is tasked with collecting enough samples to isolate them. A [concept_mendelejew_chemist] then isolates the chemical substance. Once it has been found, a [concept_theiler_biologist] can produce the pharmaceutical.\n\nDigitalis purpurea, or foxglove, is a biennial plant native to Europe. Its leaves contain cardiac glycosides such as digoxin and digitoxin, which strengthen heart contractions and regulate heartbeat. Traditionally, extracts were used to treat heart failure and arrhythmias. Purified cardiac glycosides are carefully dosed in medicine for heart conditions, while the raw plant is avoided due to severe poisoning risks."
 je_theiler_medicinal_plant_digitoxin_success: "[GetPlayer.GetName] has collected at least #V 5 Digitalis Purpurea#!."
 je_theiler_medicinal_plant_quinine: "Cinchona Pubescens"
 je_theiler_medicinal_plant_quinine_reason: "The process of inventing a new pharmaceutical typically follows this sequence: Based on the level of your Medical Technique, a [concept_panum_physician] proposes finding specific [concept_ito_medicinal_plants] for medicinal use, in this case at least #V 5 [AddLocalizationIf( Scope.Var('theiler_physician_demand_var').IsSet , Scope.Var('theiler_physician_demand_var').GetFlagName)]#!. A [concept_dubois_naturalist] is tasked with collecting enough samples to isolate them. A [concept_mendelejew_chemist] then isolates the chemical substance. Once it has been found, a [concept_theiler_biologist] can produce the pharmaceutical.\n\nCinchona pubescens is a tree native to South America, especially the Andean regions. Its bark contains quinine and other alkaloids, which have strong antimalarial properties. Traditionally, the bark was used to treat fever and malaria. Even today, quinine and its derivatives remain important in medicine for managing malaria. The tree is also cultivated in tropical regions for its medicinal bark."
 je_theiler_medicinal_plant_quinine_success: "[GetPlayer.GetName] has collected at least #V 5 Cinchona Pubescens#!."
 je_theiler_medicinal_plant_thymol: "Thymus Vulgaris"
 je_theiler_medicinal_plant_thymol_reason: "The process of inventing a new pharmaceutical typically follows this sequence: Based on the level of your Medical Technique, a [concept_panum_physician] proposes finding specific [concept_ito_medicinal_plants] for medicinal use, in this case at least #V 5 [AddLocalizationIf( Scope.Var('theiler_physician_demand_var').IsSet , Scope.Var('theiler_physician_demand_var').GetFlagName)]#!. A [concept_dubois_naturalist] is tasked with collecting enough samples to isolate them. A [concept_mendelejew_chemist] then isolates the chemical substance. Once it has been found, a [concept_theiler_biologist] can produce the pharmaceutical.\n\nThymus vulgaris, or common thyme, is a small perennial herb native to the Mediterranean. Its leaves and oil contain thymol, carvacrol, and other essential oils with antimicrobial, antioxidant, and anti-inflammatory properties. Traditionally, thyme has been used to treat respiratory infections, coughs, and digestive issues. It is widely used in herbal medicine, aromatherapy, and as a natural preservative or flavoring agent in food."
 je_theiler_medicinal_plant_thymol_success: "[GetPlayer.GetName] has collected at least #V 5 Thymus Vulgaris#!."
 je_theiler_medicinal_plant_pilocarpine: "Pilocarpusp Pennatifolius"
 je_theiler_medicinal_plant_pilocarpine_reason: "The process of inventing a new pharmaceutical typically follows this sequence: Based on the level of your Medical Technique, a [concept_panum_physician] proposes finding specific [concept_ito_medicinal_plants] for medicinal use, in this case at least #V 5 [AddLocalizationIf( Scope.Var('theiler_physician_demand_var').IsSet , Scope.Var('theiler_physician_demand_var').GetFlagName)]#!. A [concept_dubois_naturalist] is tasked with collecting enough samples to isolate them. A [concept_mendelejew_chemist] then isolates the chemical substance. Once it has been found, a [concept_theiler_biologist] can produce the pharmaceutical.\n\nPilocarpus pennatifolius is a tropical shrub native to Brazil. Its leaves contain the alkaloid pilocarpine, which stimulates salivary and sweat glands. Traditionally, it was used to treat dry mouth and eye conditions. In modern medicine, pilocarpine is used to manage glaucoma by reducing intraocular pressure and to treat xerostomia (dry mouth) caused by radiation or medications. The plant is valued primarily for its pharmacologically active alkaloids."
 je_theiler_medicinal_plant_pilocarpine_success: "[GetPlayer.GetName] has collected at least #V 5 Pilocarpusp Pennatifolius#!."
 je_theiler_medicinal_plant_ephedrine: "Ephedra Sinica"
 je_theiler_medicinal_plant_ephedrine_reason: "The process of inventing a new pharmaceutical typically follows this sequence: Based on the level of your Medical Technique, a [concept_panum_physician] proposes finding specific [concept_ito_medicinal_plants] for medicinal use, in this case at least #V 5 [AddLocalizationIf( Scope.Var('theiler_physician_demand_var').IsSet , Scope.Var('theiler_physician_demand_var').GetFlagName)]#!. A [concept_dubois_naturalist] is tasked with collecting enough samples to isolate them. A [concept_mendelejew_chemist] then isolates the chemical substance. Once it has been found, a [concept_theiler_biologist] can produce the pharmaceutical.\n\nEphedra sinica, also known as ma huang, is a shrub native to China and Central Asia. Its stems contain ephedrine and pseudoephedrine, alkaloids that stimulate the nervous system and bronchodilation. It was used in Chinese medicine to treat asthma, bronchitis, and nasal congestion. Its use is limited due to risks of hypertension, heart problems, and other side effects."
 je_theiler_medicinal_plant_ephedrine_success: "[GetPlayer.GetName] has collected at least #V 5 Ephedra Sinica#!."
 je_theiler_medicinal_plant_strophantine: "Strophanthus Gratus"
 je_theiler_medicinal_plant_strophantine_reason: "The process of inventing a new pharmaceutical typically follows this sequence: Based on the level of your Medical Technique, a [concept_panum_physician] proposes finding specific [concept_ito_medicinal_plants] for medicinal use, in this case at least #V 5 [AddLocalizationIf( Scope.Var('theiler_physician_demand_var').IsSet , Scope.Var('theiler_physician_demand_var').GetFlagName)]#!. A [concept_dubois_naturalist] is tasked with collecting enough samples to isolate them. A [concept_mendelejew_chemist] then isolates the chemical substance. Once it has been found, a [concept_theiler_biologist] can produce the pharmaceutical.\n\nStrophanthus gratus is a climbing plant native to West Africa. Its seeds contain cardiac glycosides such as ouabain, which strongly affect heart contractions. Traditionally, extracts were used as arrow poisons and in small doses to treat heart conditions. Ouabain has been studied for heart failure and arrhythmias."
 je_theiler_medicinal_plant_strophantine_success: "[GetPlayer.GetName] has collected at least #V 5 Strophanthus Gratus#!."
