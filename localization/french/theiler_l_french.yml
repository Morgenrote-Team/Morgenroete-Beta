 theiler.2201.t: "Agricultural Improvements"
 theiler.2201.d: "Dr. [SCOPE.sCharacter('theiler_biologist_scope').GetLastName] has achieved [SCOPE.sCharacter('theiler_biologist_scope').GetHerHis] goal. Through careful selection and application of [SCOPE.sCharacter('theiler_biologist_scope').GetHerHis]  biological expertise, [SCOPE.sCharacter('theiler_biologist_scope').GetSheHe] has sustainably strengthened our country's agricultural industry.\n\nTotal improved buildings: [GetPlayer.MakeScope.Var('mr_num_improved_agriculture_buildings_var').GetValue|V0]\n$concept_theiler_microorganisms$ from Project: [JournalEntry.MakeScope.ScriptValue('ito_specimens_from_forestry_project_value')|+0] @theiler_microorganisms_texticon!"
 theiler.2201.f: "'These idiots still think that they have domesticatied all those plants. In reality the plants have domesticated us humans. Just look at the care we give the!'"
 theiler.2201.g: "Our economy is growing!"
