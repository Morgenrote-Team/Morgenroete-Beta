 theiler_microbiology_tech_desc: "Les examens microbiologiques ont été réalisés avec les premiers microscopes dès le XVIIe siècle, mais ce n'est qu'avec les progrès médicaux du XIXe siècle et l'amélioration de la technologie des microscopes qu'une nouvelle branche de la recherche biologique et médicale a émergé, changeant fondamentalement de nombreux domaines de la vie quotidienne."
