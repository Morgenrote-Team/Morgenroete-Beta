 je_theiler_cydia_pesticide: "Cydia Pesticide"
 je_theiler_cydia_pesticide_reason: "With a basic knowledge of insecticides, a biologist, in collaboration with a chemist, can find an effective remedy against the codling moth.\n\nIf the biologist or chemist dies during their work, work on the pesticide will be stopped but will continue as soon as both academics are available again."
 je_theiler_cydia_pesticide_success: "A [concept_theiler_biologist] has worked at least #ORANGE 12 months#! on a new pesticide."
 je_theiler_cydia_pesticide_goal: ""
 je_theiler_lead_arsenate: "Lead Arsenate"
 je_theiler_lead_arsenate_reason: "Our fruit growers can control the codling moth and other pests with the newly invented lead arsenate, assuming there is no lead shortage on the market. It should be possible to bring the parasite under control in a state every month."
 theiler.31.t: "Lead Arsenate"
 theiler.31.d: "In collaboration with Dr. [SCOPE.sCharacter('mendelejew_chemist_scope').GetLastName], Dr. [SCOPE.sCharacter('theiler_biologist_scope').GetLastName] has developed an effective pesticide whose mass production could revolutionize agriculture. The codling moth has finished its last meal in apples!"
 theiler.31.f: "Lead arsenate (PbHAsO₄) was developed in 1892 by Melville Thurston Cook in Massachusetts to control the codling moth (Cydia pomonella) in orchards. It was a more stable, plant-friendly alternative to the toxic copper arsenite ('Paris Green'). The powder killed insects as they fed, adhered to leaves and fruit for a long time, and enabled effective control in commercial fruit production for the first time. Lead arsenate remained widely used until the introduction of synthetic pesticides such as DDT, despite being harmful to the environment and human health."
 theiler.31.g: "We literally poison them?"
 theiler.31.tt: "From now on, farmers will use lead arsenate on their orchards to get rid of the Cydia modifier."
 theiler.32.t: "The Codling Moth Spreads to [SCOPE.sState('theiler_state_scope').GetName]!"
 theiler.32.d: "The codling moth has expanded its home range: from a neighboring region it has also spread into [SCOPE.sState('theiler_state_scope').GetName] to infest the orchards there."
 theiler.32.f: "The codling moth (Cydia pomonella) originates from Eurasia and spread with apple cultivation in the 19th century across Central Europe, Northern Italy, the Balkans, Hungary, parts of Russia west of the Urals, North America, and Australia. Nordic, very hot, or dry regions were largely spared. In the 20th century, it reached almost all temperate apple-growing regions worldwide, including Scandinavia, the Baltic States, and South America, and became one of the most significant pests in orchards."
 theiler.32.g: "Fruit prices will raise, it seems."
 theiler.33.t: "The Codling Moth Spreads to South America!"
 theiler.33.d: "Naturalists and biologists today presented a report that is worrying farmers and traders alike. The infamous codling moth, native to Europe and Western Asia, has been discovered in our orchards for the first time. This is the first sighting in South America!"
 theiler.33.g: "This is not how I imagined the benefits of international trade would be..."
 theiler.34.t: "The Codling Moth Spreads to South Africa!"
 theiler.34.d: "Naturalists and biologists today presented a report that is worrying farmers and traders alike. The infamous codling moth, native to Europe and Western Asia, has been discovered in our orchards for the first time. This is the first sighting in South Africa!"
 theiler.35.t: "The Codling Moth Spreads to Oceania!"
 theiler.35.d: "Naturalists and biologists today presented a report that is worrying farmers and traders alike. The infamous codling moth, native to Europe and Western Asia, has been discovered in our orchards for the first time. This is the first sighting in Oceania!"
 theiler.41.t: "[AddLocalizationIf( Scope.Var('theiler_physician_demand_var').IsSet , Scope.Var('theiler_physician_demand_var').GetFlagName)]"
 theiler.41.d: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] has discovered in several treatments with #V [AddLocalizationIf( Scope.Var('theiler_physician_demand_var').IsSet , Scope.Var('theiler_physician_demand_var').GetFlagName)]#! that it has advanced healing potential. However, this requires a larger procurement quantity—and thorough investigation to isolate the active ingredient. This would make a completely new medicine possible!"
 theiler.41.g: "So, [AddLocalizationIf( Scope.Var('theiler_physician_demand_var').IsSet , Scope.Var('theiler_physician_demand_var').GetFlagName)] is a new miracle plant?"
