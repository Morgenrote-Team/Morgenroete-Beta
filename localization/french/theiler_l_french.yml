 je_theiler_improve_agriculture_project_reason: "Your [concept_theiler_biologist] Dr. [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] focuses on improving the production of the [JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetName] in [JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetState.GetName].\n$mr_divider_for_je$\nThe project will get progress every month. Every time the progress reaches 24 the current building will receive a new modifier. Once all chosen buildings for this project have the modifiers, the project ends.\n\nThere is a total number of 3 modifiers. Each new modifier needs the progress to fill up again.\n\nEvery completed building provides some [Concept('concept_theiler_microorganism','$concept_theiler_microorganisms$')]. Additionally your Biologist might gain the $ito_botanist$ or $ito_zoologist$ trait when a building's improvement is finished.\n$mr_divider_for_je$\nCurrent Building: [JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetName] in [JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetState.GetName]\n[JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetCustom('je_theiler_improve_agriculture_project_modifier_1_type')]\n[JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetCustom('je_theiler_improve_agriculture_project_modifier_2_type')]\n[JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetCustom('je_theiler_improve_agriculture_project_modifier_3_type')]\n\nTotal Remaining Buildings (excluding current): [JournalEntry.MakeScope.Var('mr_number_of_remaining_list_entries_var').GetValue|V0]\n$concept_theiler_microorganisms$ from Project: [JournalEntry.MakeScope.ScriptValue('ito_specimens_from_forestry_project_value')|+0] @theiler_microorganisms_texticon!\n\nCurrent monthly progress: #underline #tooltip:[GetRawTextTooltipTag('theiler_monthly_biologist_improvement_progress_var_tt')] [GetPlayer.MakeScope.ScriptValue('theiler_improve_agriculture_project_progress_value')|+2] #!#!"
