 theiler.2101.t: "Microbiological Institute"
 theiler.2101.d: "The intensive research into the pathogen has led leading scientists in the [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] team to establish a microbiology institute to advance research more efficiently."
 theiler.2101.f: "Following his successes in identifying pathogens (anthrax in 1876, tuberculosis in 1882, cholera in 1884), Robert Koch received support from the Prussian government to establish his own institute. It was the first research center to systematically and institutionally investigate microorganisms as the cause of disease. Louis Pasteur's 'Laboratoire de Chimie Physiologique' in Paris (from 1887) already demonstrated the character of such a research facility. Officially, however, the Robert Koch Institute (1891) is considered the first microbiological institute in the modern sense."
 theiler.2101.g: "The institute should be dedicated to general research."
 theiler.2101.h: "The institute should be dedicated to pathogen research."
 theiler.2102.t: "Improved Laboratory Method"
 theiler.2102.d: "Dr. [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] modernized the microbiology laboratory's equipment and introduced new stains and improved microscopes, leading to a breakthrough in pathogen research."
 theiler.2102.f: "Since the 1860s, synthetic aniline dyes revolutionized microbiology. Methylene blue, fuchsin, and later Gram (1884) and Ziehl-Neelsen stains enabled the differentiation of bacteria for the first time. Around 1900, special stains for spores, capsules, and diphtheria bacilli were added; from 1920 onward, Giemsa and silver stains became widespread, and the first fluorescence methods appeared in the 1940s."
 theiler.2102.g: "Good."
 theiler.2103.t: "International Cooperation"
 theiler.2103.d: "Dr. [SCOPE.sCharacter('theiler_biologist_scopet').GetLastName] from [SCOPE.sCountry('theiler_country_scope').GetName] wrote a letter. The biologist, a friend of Dr. [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName]'s, provided some clues to [ROOT.Var('theiler_biologist_var').GetCharacter.GetHerHis] pathogen research."
 theiler.2103.f: "From 1885 onward, the Japanese physician Shibasaburo Kitasato worked at Robert Koch's Berlin Institute. Under Koch's guidance, he achieved the first pure culture of the tetanus pathogen in 1889, a milestone in bacteriology. Together, they laid the foundations for serum therapy, which was later used to treat tetanus and diphtheria. Their collaboration is considered an early example of successful international research."
 theiler.2103.g: "This will accelerate pathogen research."
 theiler.2103.h: "This knowledge gives us further insights."
 theiler.2104.t: "Laboratory Accident"
 theiler.2104.d: "During the search for the pathogen, a serious incident occurred - due to lax safety precautions, it infected our researchers. Numerous employees have to be quarantined, and scientific operations could be disrupted for months."
 theiler.2104.f: "Working with pathogens was extremely risky. Numerous microbiologists became infected during their research: Robert Koch contracted anthrax and tuberculosis repeatedly, Emil von Behring was infected during diphtheria toxin experiments, and Max von Pettenkofer ingested cholera bacteria to test his theory. Protective measures were rudimentary, resulting in many researchers suffering from mild to severe infections. These experiences later contributed to the development of modern laboratory safety standards."
 theiler.2104.g: "A disaster!"
 theiler.2104.h: "We must reorganize the laboratory at all costs!"
 theiler.2105.t: "Contamined Samples"
 theiler.2105.d: "As it turns out, some of the samples Doctor [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName]'s scientific team was working with were contaminated, unfortunately setting back the search for the pathogen."
 theiler.2105.f: "Work on anthrax, tuberculosis, or diphtheria was often contaminated by mold, other bacteria, or impure serum samples. Pasteur's early vaccine experiments also suffered from this. Such contamination led to erroneous conclusions about pathogens and significantly advanced the development of pure culture techniques, sterilization, and aseptic procedures. Cell culture research makes such an incident less likely."
 theiler.2105.g: "Which scientist was responsible for this?"
 theiler.2106.t: "Researchers' Dispute"
 theiler.2106.d: "A high-level scientific dispute has erupted over the search for pathogens. Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], one of our country's leading physicians, has criticized Dr. [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName]'s previous discoveries in an exchange with him. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] claims that the biologist is on the completely wrong track. [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName], on the other hand, claims that the doctor has no idea about the subject at all."
 theiler.2106.f: "'Your experiments stink worse than a Petri dish after two weeks!'\n'And you diagnose diseases with the certainty of a coin toss!'\n'Please, I save lives while you pet bacteria like pets!'\n'Ha! Better pets than patients who swallow your pills in a panic!'\nMicroscope marauder!'\n'Stethoscope sodomist!'"
 theiler.2106.g: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] is right."
 theiler.2106.h: "Dr. [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] is right."
 theiler.2106.i: "They should research, not argue!"
 theiler.2107.t: "Research Assistants"
 theiler.2107.d: "Our biologist Dr. [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] has proposed withdrawing some students and assistants from academia and sending them to the laboratory to support [ROOT.Var('theiler_biologist_var').GetCharacter.GetHerHis] research."
 theiler.2107.f: "'We could ruin their careers, but hey, it's in the name of SCIENCE!'"
 theiler.2107.g: "Hire additional assistants."
 theiler.2107.h: "Young academics are needed elsewhere."
 theiler.2111.t: "Military Vaccine Use"
 theiler.2111.d: "The vaccine Dr. [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] is working on has achieved significant success. The military is already showing great interest in it as a way to ensure the health of its soldiers and reduce casualties in the next war."
 theiler.2111.f: "Vaccinations provided decisive advantages in war: British troops in India used smallpox variolation and vaccination, which protected them against epidemics. Similarly, yellow fever vaccination in tropical zones in the early 20th century reduced casualties due to epidemics. Vaccinated soldiers remained fit for duty, while unvaccinated troops were weakened by disease—vaccines thus acted like strategic weapons."
 theiler.2111.g: "The military has priority for vaccination."
 theiler.2111.h: "Use the knowledge from this field study to improve the vaccine."
 theiler.2112.t: "Lucky Find"
 theiler.2112.d: "An assistant unexpectedly discovered a sample in a waste jar containing a surprisingly effective preparation."
 theiler.2112.f: "Louis Pasteur discovered that an 'old' bacterial culture of chicken cholera did not make chickens sick. This coincidence led to the development of an attenuated vaccine that provided protection. Jonas Salk exploited the discovery that polio viruses could grow in cell cultures and be inactivated simultaneously. This led to the creation of the first safe polio vaccine. Alexander Fleming accidentally noticed that mold killed bacteria, which led to the discovery of penicillin."
 theiler.2112.g: "Reward the assistant."
 theiler.2113.t: "Successful Test"
 theiler.2113.d: "An initial trial of the new vaccine has proven unexpectedly effective. Dr. [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] is considering starting mass production and mass vaccination much sooner. This is a happy day for vaccinology!"
 theiler.2113.f: "An outstanding example of a successful vaccine pilot trial is the cholera and plague vaccine developed by Waldemar Haffkine at the end of the 19th century. Haffkine, a Russian-Jewish microbiologist, conducted the first clinical trials of a cholera vaccine in India in 1892, which was later used on a large scale. In 1897, he developed a vaccine against the plague, which was tested in India in 1898 and led to a drastic reduction in deaths. His work is considered a milestone in modern vaccine development."
 theiler.2113.g: "A major step forward for vaccine development!"
 theiler.2113.h: "These are new clues for medical research."
 theiler.2114.t: "Unintended Side Effects"
 theiler.2114.d: "In [SCOPE.sState('theiler_state_scope').GetCityHubName], Dr. [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName]'s new vaccine has shown drastic side effects. Many of the test subjects became seriously ill, and some even died. The trial has not only shaken public confidence but could also significantly set back vaccine development."
 theiler.2114.f: "In the 1930s, a serious vaccination incident occurred in Lübeck: 251 newborns received a BCG vaccine against tuberculosis that was contaminated with virulent tuberculosis bacteria due to faulty manufacturing. 208 children became ill, and 77 died. The 'Lübecker Impfunglück' (Lübeck Vaccination Incident) triggered a public scandal, delayed the introduction of the BCG vaccine in Germany, and led to the introduction of stricter safety standards in vaccine production."
 theiler.2114.g: "Who could have foreseen this?"
 theiler.2114.h: "Still carry out the experiments in the area."
 theiler.2115.t: "Allegation of Plagiarism"
 theiler.2115.d: "A foreign biologist from [SCOPE.sCountry('theiler_country_scope').GetName] has thoroughly investigated the production of the new vaccine currently being developed by Dr. [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName]. [SCOPE.sCharacter('theiler_biologist_scope').GetSheHe] makes serious allegations: [SCOPE.sCharacter('theiler_biologist_scope').GetSheHe] claims it is a plagiarism of a very similar serum that Dr. [SCOPE.sCharacter('theiler_biologist_scope').GetLastName] intended to patent."
 theiler.2115.f: "Between the 19th and early 20th centuries, the lack of patent protection and international standards led to disputes over authorship in vaccinology. Pasteur claimed credit for the bovine cholera vaccine, even though his collaborator Toussaint had experimented earlier. Later, BCG strains and Haffkine's cholera and plague vaccines sparked controversy. Debates over priority and 'plagiarism' were typical of a time when vaccination methods were highly sensitive and valuable."
 theiler.2115.g: "Apologize."
 theiler.2115.h: "This is mere coincidence."
 theiler.2116.t: "Cost Explosion"
 theiler.2116.d: "It looks like Dr. [SCOPE.sCharacter('theiler_biologist_scope').GetLastName] underestimated the cost of the new vaccine. [SCOPE.sCharacter('theiler_biologist_scope').GetHerHis|U] optimistic estimate could now jeopardize the entire development."
 theiler.2116.f: "'Money? Money?! Filthy lucre! Have you no idea that I'm sacrificing my life for science? After all, this is about the final victory over death! About eradicating a scourge of humanity! And you have the nerve to come to me with lists, tables, and balance sheets? What are you? An accountant? Get out of my lab!'"
 theiler.2116.g: "Subsidizes the new vaccine."
 theiler.2116.h: "Recruit more academics as temporary workers."
 theiler.2116.i: "Deal with it."
