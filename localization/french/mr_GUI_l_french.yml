 MR_EXTEND_ZOO_FAMOUS_BUTTON: "Étendre le [concept_dubois_zoo] (célèbre)"
 MR_EXTEND_ZOO_FAMOUS_BUTTON_TT: "#T étendez le zoo à la taille célèbre #!\n[Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] est le bonheur de chacun: les gens se dispersent dans le zoo, les scientifiques peuvent poursuivre leurs études zoologiques et le prestige international est accordé à ceux qui peuvent montrer le plus grand nombre possible de faune étrangère. À chaque expansion, le prestige d'une nation augmente. Certaines étapes d'extension nécessitent non seulement de collecter de nombreux animaux, mais aussi de différentes parties du monde. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_EXTEND_ZOO_SMALL_40_TOTAL_ANIMALS_TRIGGER_TT: "#default_text [GetPlayer.GetName] a #V 40 Total#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')]. Vous avez actuellement [GetPlayer.MakeScope.Var('dubois_zoo_animal_total').GetValue|0+]#!"
 MR_SPECIMEN_GARDEN_BUTTON: "Jardin botanique trouvé"
 MR_SPECIMEN_GARDEN_BUTTON_TT: "#T Trouvé Botanical Garden#!\nA Le jardin botanique de votre zoo le rendra encore plus prestige. Nous pouvons planter toutes les plantes exotiques collectées par notre [concept_dubois_naturalist]. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_SPECIMEN_GARDEN_SPECIMEN_TRIGGER_TT: "#default_text [GetPlayer.GetName] a #V 50000 ou plus#! [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] (actuellement [GetPlayer.MakeScope.Var('dubois_specimen').GetValue|0+]) .#!"
