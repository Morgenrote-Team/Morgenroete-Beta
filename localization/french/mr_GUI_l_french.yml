 MR_RECRUIT_PHYSICIAN_BUTTON: "Recruter"
 MR_RECRUIT_PHYSICIAN_BUTTON_TT: "#T Recruter Physician#!\nOwning Un grand hôpital général offre une occasion unique de recruter immédiatement des médecins du service de pratique. De plus, un médecin peut être sélectionné en fonction de sa spécialité. Cela permet une recherche médicale beaucoup plus ciblée. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
