 MR_VISIT_PALEONTOLOGICAL_COLLECTION_REQUIREMENTS_TRIGGER_TT: "#default_text [GetPlayer.GetName] a soit un [concept_dubois_paleontologist], [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] ou [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')].#!"
