 MR_ART_NOUVEAU_BUTTON_TT: "#T Choisissez Art Nouveau#!\n[concept_elgar_art_nouveau], principalement en relation avec l'Italie également la liberté, est une époque historique de l'art au tournant du 19e au 20e siècle. Les courants qui peuvent être affectés à Art Nouveau sont le style de réforme (après le mouvement de réforme), le style de sécession (après la sécession de Vienne), le modernisme en Catalogne, dans le style Suisse Sapin et dans le style USA Tiffany. En plus de l'expression, Art Nouveau, qui est dominant en français, en anglais et en italien, le style moderne est également utilisé en anglais et en stile Floreale en italien. En termes de temps, Art Nouveau appartient à la fin de siècle. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
