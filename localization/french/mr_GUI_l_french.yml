 MR_EXTEND_ZOO_MEDIUM_BUTTON_TT: "#T étendez le zoo à la taille moyenne #!\n[Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] sont le bonheur de chacun: les gens se dispersent dans le zoo, les scientifiques peuvent poursuivre leurs études zoologiques et le prestige international est accordé à ceux qui peuvent montrer le plus grand nombre possible de faune étrangère. À chaque expansion, le prestige d'une nation augmente. Certaines étapes d'extension nécessitent non seulement de collecter de nombreux animaux, mais aussi de différentes parties du monde. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_EXTEND_ZOO_SMALL_20_TOTAL_ANIMALS_TRIGGER_TT: "#default_text [GetPlayer.GetName] a #V 20 total#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')]. Vous avez actuellement [GetPlayer.MakeScope.Var('dubois_zoo_animal_total').GetValue|0+].#!"
