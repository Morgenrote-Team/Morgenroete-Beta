 MR_SPECIMEN_COLLECTION_BUTTON: "Collection de spécimens trouvé"
 MR_SPECIMEN_COLLECTION_BUTTON_TT: "#T Trouvé des spécimens Collection #!\nOrdering Tous nos insectes exotiques, papillons et autres [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] montreraient au monde à quel point notre nation est avancée scientifique. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_SPECIMEN_GARDEN_NO_SPECIMEN_COLLECTION_TRIGGER_TT: "#default_text [GetPlayer.GetName] n'a pas encore de perception d'échantillons #V"
