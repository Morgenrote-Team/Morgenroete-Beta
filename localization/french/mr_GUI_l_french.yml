 VISIT_SCIENTIFIC_SOCIETY_BUTTON: "Visiter la société scientifique"
 VISIT_SCIENTIFIC_SOCIETY_BUTTON_TT: "#T Visitez la Scientific Society#!\nThe [concept_academics_scientific_society] offre un aperçu de votre [Concept('concept_academics_academic','$concept_academics_academics$')] et de leurs accomplishs et des théorèmes scientifiques. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_VISIT_SCIENTIFIC_SOCIETY_TRIGGER_TT: "#default_text Vous êtes #V pas actuellement #! Visiter la #V Scientific Society#!.#!"
