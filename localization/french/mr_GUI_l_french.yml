 VISIT_MUSEUM_BUTTON: "Visiter le musée"
 VISIT_MUSEUM_BUTTON_TT: "#T Visitez le musée archéologique#!\nThe [concept_lepsius_museum] est l'endroit où tous vos [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] sont présentés. Il offre un aperçu de votre collection archéologique. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_VISIT_MUSEUM_BUILDING_TRIGGER_TT: "#default_text [GetPlayer.GetName] a un [GetBuildingType('building_lepsius_archaeological_museum').GetName].#!"
