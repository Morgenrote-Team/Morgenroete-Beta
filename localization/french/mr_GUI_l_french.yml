 MR_ASTEROID_CONGRESS_BUTTON: "Congrès sur les astéroïdes"
 MR_ASTEROID_CONGRESS_BUTTON_TT: "#T Congrès sur les astéroïdes#!\nSince La découverte de Ceres en 1801, les astronomes ont trouvé de plus en plus d'organismes célestes, c'est pourquoi le nombre de planètes dans le système solaire a continué d'augmenter. La découverte de Neptune a soulevé la question de savoir si une nouvelle catégorie pourrait avoir plus de sens pour les nombreux objets plus petits que l'on trouve en particulier entre Mars et Jupiter. En particulier, l'invention de nouveaux symboles astronomiques et leurs astronomes relativement petites ont conduit les astronomes à supposer qu'ils étaient plus probablement des «petites étoiles» ou des «petites planètes». Bien sûr, cette catégorisation signifierait que certains des objets précédemment considérés comme des planètes perdraient leur statut et seraient dégradés en simples rochers. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ASTEROID_CONGRESS_NEPTUNE_TT: "#default_text #V Neptune#! a été découvert.#!"
 MR_ASTEROID_CONGRESS_OBSERVATORY_BUILDING_TRIGGER_TT: "#default_text [GetPlayer.GetName] a un [GetBuildingType('building_verrier_observatory').GetName].#!"
 MR_ASTEROID_CONGRESS_ASTRONOMER_TRIGGER_TT: "#default_text a un [concept_verrier_astronomer].#!"
 MR_ASTEROID_CONGRESS_OBJECTS_TRIGGER_TT: "#default_text Un total d'au moins #BLUE 1500#! @verrier_astronomicalObject! [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] ont été découverts dans le monde entier (actuellement [GetGlobalVariable('verrier_total_astronomical_objects').GetValue|+0] @verrier_astronomicalobject! Ont été trouvés) .#!"
 MR_CARTE_DE_CIEL_CONGRESS_BUTTON: "Carte du Ciel"
 MR_CARTE_DE_CIEL_CONGRESS_BUTTON_TT: "Le #T Congrès sur la carte du Ciel#!\nA Projet de cartographie international sans précédent et sans précédent a été lancé en 1887 par la directrice de l'Observatoire de Paris, Amédée Mouchez, qui a réalisé le potentiel du nouveau processus photographique de la plaque sèche pour révolutionner le processus de fabrication de cartes des étoiles. À la suite du Congrès astrographique de plus de 50 astronomes organisés à Paris en avril 1887, 20 observatoires du monde entier ont convenu de participer au projet. Nous pouvons accueillir un tel congrès pour partager les connaissances astronomiques de la communauté internationale. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ASTRONOMY_CONGRESS_5_YEARS_TRIGGER_TT: "#default_text Là #V n'a pas été un Congrès astronomique #! dans le #V 5 dernières années #! (le dernier hôte n'a pas le \ \"hébergé un Congrès astronomique \" Modificateur) .#!"
 MR_CARTE_DE_CIEL_CONGRESS_OBJECTS_TRIGGER_TT: "#default_text Un total d'au moins #BLUE 7000#! @verrier_astronomicalObject! [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] ont été découverts dans le monde entier (actuellement [GetGlobalVariable('verrier_total_astronomical_objects').GetValue|+0] @verrier_astronomicalobject! Ont été trouvés) .#!"
 MR_CARTE_DE_CIEL_CONGRESS_UNIVERSITY_BUILDING_TRIGGER_TT: "#default_text [GetPlayer.GetName] a un [GetBuildingType('building_university').GetName] de #V niveau 10 ou supérieur#!.#!"
 MR_GREAT_DEBATE_CONGRESS_BUTTON: "Grand débat"
 MR_GREAT_DEBATE_CONGRESS_BUTTON_TT: "#T Le grand débat#!\nThe Shapley-Curtis Debate, également connu sous le nom de grand débat, a regroupé les discussions du début du XXe siècle qui ont finalement conduit à une nouvelle compréhension de la nature des galaxies et de la taille de l'univers. Il tournait autour de la taille de la voie lactée et si les galaxies alors connues sous le nom de nébuleuses en spirale sont de petits objets dans la voie lactée ou beaucoup plus éloignés et séparés de la Voie lactée. Ce jour-là, les deux scientifiques ont présenté des articles techniques indépendants sur l'échelle de taille de l'univers, suivi d'une discussion publique dans la soirée. Nous pouvons tenir un tel congrès pour discuter des mystères ultimes de l'univers. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
