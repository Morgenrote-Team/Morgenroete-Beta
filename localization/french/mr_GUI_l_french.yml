 MR_GEOLOGIST_AGE_EARTH_BUTTON_TT: "#T Calculer l'âge de la Terre #!\nA Le géologue peut calculer l'âge de la terre une fois dans sa vie et présenter sa théorie à tous les autres géologues. S'ils sont d'accord, sa détermination du temps de la Terre sera la détermination décisive. S'il est rejeté, il peut réessayer après une période de dépression. Pour présenter une nouvelle théorie, le score géologique national doit être plus élevé que le score utilisé pour déterminer la dernière ère terrestre. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
