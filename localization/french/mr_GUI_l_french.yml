 MR_VISIT_GALLERY_BUTTON: "Visiter la galerie"
 MR_VISIT_GALLERY_BUTTON_TT: "#T Visitez la galerie #!\nThe Valeur totale de notre tradition de peinture et ses œuvres peuvent être vérifiées dans la galerie. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_VISIT_GALLERY_BUTTON_TRIGGER_TT: "#default_text Vous êtes #V pas actuellement en visite #! la galerie.#!"
 MR_PAINTER_TRIP_BUTTON: "Parcours éducatif"
 MR_PAINTER_TRIP_BUTTON_TT: "#T Journey éducatif#!\nOn a [concept_klimt_painter_trip], un artiste peut apprendre un style artistique auparavant inconnu et ainsi améliorer le [concept_klimt_painting_tradition] annuel. Ils peuvent également acquérir d'autres traits positifs et négatifs au cours de leur séjour dans un étranger [concept_artists_center_of_arts]. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ACQUIRE_MASTERWORK_BUTTON: "Acquérir un chef-d'œuvre"
 MR_ACQUIRE_MASTERWORK_BUTTON_TT: "#T Acquérir un chef-d'œuvre #!\nWe peut acheter un chef-d'œuvre d'un style à l'étranger que nous ne possédons pas encore. Cependant, cela suppose qu'une autre nation a au moins plus d'un chef-d'œuvre de ce style. De plus, nous avons besoin d'une galerie nationale pour accrocher la peinture. En plus des coûts d'approvisionnement, nous devons également négocier certaines de nos peintures, ce qui nous coûte #R 100#! [concept_klimt_painting_tradition]. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_VERNISSAGE_BUTTON: "Vernissage"
 MR_VERNISSAGE_BUTTON_TT: "#T Vernissage#!\nAt A Vernissage, A [concept_klimt_painter] peut présenter certaines de ses photos et en retour acquérir la réputation et [concept_klimt_painting_tradition]. Un vernisage n'est possible qu'une fois dans la vie d'un peintre. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
