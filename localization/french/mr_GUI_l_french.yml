 MR_ACADEMICS_PROMOTE_UNIVERSITY_NEUTRAL_TT: "#default_text [GetPlayer.GetName] a au moins une université sans [concept_academics_university_specialization].#!"
 MR_ACADEMICS_PROMOTE_ENGINEER_EFFECT_TT: "Your next scientist will be an [concept_tesla_engineer]."
 MR_ACADEMICS_PROMOTE_ASTRONOMER_EFFECT_TT: "Votre prochain scientifique sera un [concept_verrier_astronomer]."
 MR_ACADEMICS_PROMOTE_NATURALIST_EFFECT_TT: "Votre prochain scientifique sera un [concept_dubois_naturalist]."
 MR_ACADEMICS_PROMOTE_PALEONTOLOGIST_EFFECT_TT: "Votre prochain scientifique sera un [concept_dubois_paleontologist]."
 MR_ACADEMICS_PROMOTE_ARCHAEOLOGIST_EFFECT_TT: "Votre prochain scientifique sera un [concept_lepsius_archaeologist]."
 MR_ACADEMICS_PROMOTE_ANTHROPOLOGIST_EFFECT_TT: "Votre prochain scientifique sera un [concept_andersson_anthropologist]."
 MR_ACADEMICS_PROMOTE_UNIVERSITY_INVESTMENT_TT: "#T Investment académique #!\nA L'investissement général du gouvernement général dans nos universités augmentera #O Progrès académique#! par #G + 1#! par mois. Le financement est prévu pour 10 ans. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ACADEMICS_PROMOTE_UNIVERSITY_INVESTMENT_TRIGGER_TT: "[GetPlayer.GetAdjective] n'investit pas déjà dans le monde universitaire."
 MR_ACADEMICS_AVANTGARDE_TT: "#T Avantgarde Intelligentsia#!\nA Clique des universitaires avec des idées culturelles, sociologiques et anthropologiques claires déterminent la vie scientifique quotidienne. En revanche, les champs pratiques sont de moindre importance. \ N#R Remarque #!: augmente l'apparence des universitaires d'un point par mois. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ACADEMICS_NO_AVANTAGRDE_OR_CONFUSION_TT: "#default_text [GetPlayer.GetName] n'a pas encore le focus #b Avantgarde Intelligentsia#! et n'a pas récemment changé de concentration.#!"
 MR_ACADEMICS_AVANTGARDE_BUILDING_REQUIREMENT_TT: "#default_text Au moins #p 50% #! des universités [GetPlayer.GetAdjective] ont le [concept_pm_academics_university_humanities].#!"
 MR_ACADEMICS_PRACTICAL_TT: "#T Academia#!\nThe scientifiques pratiques de notre pays essaie sans relâche de faire des découvertes de tous les domaines adaptés à un usage quotidien pratique. Il s'agit de servir les progrès généraux et la paix de l'humanité. \ N#R Note#!: augmente l'apparence des universitaires d'un point par mois. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ACADEMICS_NO_PRACTICAL_OR_CONFUSION_TT: "#S [GetPlayer.GetName] n'a pas encore le #b académie pratique académique_3 et n'a pas récemment changé de concentration.#!"
 MR_ACADEMICS_PRACTICAL_BUILDING_REQUIREMENT_TT: "#default_text Au moins #p 50% #! des universités [GetPlayer.GetAdjective] ont le [concept_pm_academics_university_natural_history].#!"
 MR_ACADEMICS_MILITARY_TT: "#T complexe militaire-industriel#!\nCooperation entre les industriels privés et les militaires a conduit au développement d'un réseau de connexions, de liens et de connaissances personnels particulièrement importants, avec juste un soupçon de corruption toujours aussi léger, qui peut être décrit comme un complexe militaire-industriel. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ACADEMICS_NO_MILITARY_OR_CONFUSION_TT: "#default_text [GetPlayer.GetName] n'a pas encore le complexe militaire-industriel #b."
 MR_ACADEMICS_MILITARY_BUILDING_REQUIREMENT_TT: "#default_text Au moins #p 50% #! des universités [GetPlayer.GetAdjective] ont le [concept_pm_academics_university_mathematics].#!"
 MR_ACADEMICS_MILITARY_BUILDING_REQUIREMENT_2_TT: "#default_text [GetPlayer.GetName] has at least one [GetBuildingType('building_automotive_industry').GetName], [GetBuildingType('building_arms_industry').GetName], [GetBuildingType('building_munition_plant').GetName] or [GetBuildingType('building_artillery_foundry').GetName] of level #p 5#! or higher.#!"
 MR_ACADEMICS_MILITARY_ARMY_SIZE_REQUIREMENT_TT: "#default_text L'armée [GetPlayer.GetAdjective] est au moins de taille #b 50#! ou supérieure.#!"
 MR_ACADEMICS_BUSINESS_TT: "#T écoles de commerce et capitalisme de magnat #!\nThe individuel indépendant combiné à une période de progrès prospère a conduit à une mentalité dans laquelle les écoles de commerce, les entreprises de taille moyenne et les grandes sociétés ont une influence décisive sur les sciences du pays. Vice-versa, les universités travaillent à augmenter la prospérité acquise du pays à travers de nouvelles technologies et à générer des idées sociales à travers le progrès. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ACADEMICS_NO_BUSINESS_OR_CONFUSION_TT: "#default_text [GetPlayer.GetName] n'a pas encore le focus #b des écoles de commerce et un magazine Capitalism#! et n'a pas récemment changé de concentration.#!"
 MR_ACADEMICS_BUSINESS_BUILDING_REQUIREMENT_TT: "#default_text Au moins #p 35% #! des universités [GetPlayer.GetAdjective] ont le [concept_pm_academics_university_mathematics].#!"
 MR_ACADEMICS_BUSINESS_BUILDING_REQUIREMENT_2_TT: "#default_text Au moins #p 35% #! des universités [GetPlayer.GetAdjective] ont le [concept_pm_academics_university_humanities].#!"
 MR_ACADEMICS_BUSINESS_BUILDING_REQUIREMENT_3_TT: "#default_text [GetPlayer.GetName] has either [GetBuildingType('building_textile_mill').GetName] or [GetBuildingType('building_furniture_manufactory').GetName] of at least level #p 15#! or either [GetBuildingType('building_tooling_workshop').GetName] or [GetBuildingType('building_steel_mill').GetName] of at least level #p 10#! or either [GetBuildingType('building_motor_industry').GetName] or [GetBuildingType('building_electrics_industry').GetName] of at least level #p 5#!.#!"
 MR_ACADEMICS_SEAPOWER_TT: "#T Sea Power & Merchant Marine#!\nThe Navy et le commerce international jouent un immense rôle pour notre pays. L'augmentation de la prospérité grâce à la production avancée et au commerce mondial de nos produits est tout aussi important que la défense de ce qui a déjà été gagné. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ACADEMICS_NO_SEAPOWER_OR_CONFUSION_TT: "#default_text [GetPlayer.GetName] n'a pas encore le focus #b Sea Power & Merchant Marine#! et n'a pas récemment changé de concentration.#!"
 MR_ACADEMICS_SEAPOWER_BUILDING_REQUIREMENT_TT: "#default_text Au moins #p 35% #! des universités [GetPlayer.GetAdjective] ont le [concept_pm_academics_university_mathematics].#!"
 MR_ACADEMICS_SEAPOWER_BUILDING_REQUIREMENT_2_TT: "#default_text Au moins #p 35% #! des universités [GetPlayer.GetAdjective] ont le [concept_pm_academics_university_natural_history].#!"
 MR_ACADEMICS_SEAPOWER_NAVY_SIZE_REQUIREMENT_TT: "#default_text La marine [GetPlayer.GetAdjective] est au moins de taille #b 50#! ou supérieure.#!"
 MR_ACADEMICS_USEFUL_TT: "#T L'académie d'ivoire utile est considérée dans notre pays comme un paradis pour les esprits excentriques qui comptent les coléoptères, les vieux vases polonais et les bizarreries dans les étranges. Cependant, on ne peut nier que l'isolement de la tour d'ivoire de la société a également ses avantages. Non perturbé, beaucoup de professeur travaille mieux. \ N#R note#!: augmente l'apparence des universitaires d'un point par mois. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ACADEMICS_NO_USEFUL_OR_CONFUSION_TT: "#default_text [GetPlayer.GetName] n'a pas encore la focus #b utile de la tour d'ivoire #! et n'a pas récemment changé son objectif.#!"
 MR_ACADEMICS_USEFUL_BUILDING_REQUIREMENT_TT: "#default_text Au moins #p 35% #! des universités [GetPlayer.GetAdjective] ont le [concept_pm_academics_university_humanities].#!"
 MR_ACADEMICS_USEFUL_BUILDING_REQUIREMENT_2_TT: "#default_text Au moins #p 35% #! des universités [GetPlayer.GetAdjective] ont le [concept_pm_academics_university_natural_history].#!"
 MR_ACADEMICS_USEFUL_BUILDING_REQUIREMENT_3_TT: "#default_text [GetPlayer.GetName] a soit un [GetBuildingType('building_lepsius_archaeological_museum').GetName], un [GetBuildingType('building_verrier_observatory').GetName] ou un [GetBuildingType('building_dubois_zoo').GetName].#!"
 MR_MOUNTAIN_EXPEDITION_TT: "#T Mountain Expedition#!\nWith L'ascension du Mont Blanc en 1786, une nouvelle ère de conquête des plus hauts sommets du monde a commencé; Une tendance qui n'a augmenté qu'au cours des XIXe et 20e siècles. Si nous avons une chaîne de montagnes sur l'un de nos territoires qui n'a pas encore été à l'échelle, nous pourrions déléguer la conquête à un général compétent avec les compétences appropriées. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAIN_UNCONQUERED_SUMMIT_TRIGGER_TT: "#default_text [GetPlayer.GetName] possède au moins un #V Summit#! invaincu ou a une licence d'alpinisme #V avec une nation qui en possède un.#!"
 MR_MOUNTAIN_RECENT_EXPEDITION_TRIGGER_TT: "#default_text [GetPlayer.GetName] n'a pas récemment atteint avec succès une nouvelle montagne ou a échoué une expédition de montagne.#!"
 MR_ZEPPELIN_EXPEDITION_TT: "#T Zeppelin Expedition#!\nThe Aeroarctic, la «Société internationale de l'étude pour l'exploration de l'Arctique par dirigeable» était une association scientifique non gouvernementale qui s'était fixé l'objectif d'utiliser des dirigeables dans la recherche polaire. Il a été fondé principalement sur l'initiative de l'Aeronaut et plus tard secrétaire général de la société, Walther Bruns. Le président fondateur en 1924 était Fridtjof Nansen. Après plusieurs années de travail préparatoire, l'entreprise a réussi en 1931 à utiliser un dirigeable pour une expédition polaire purement scientifique pour la première fois. À travers le vol arctique du LZ 127 Graf Zeppelin, la connaissance de la géographie des régions polaires avancées a été considérablement élargie. Dès 1926, Umberto Nobile a survolé le pôle Nord avec son dirigeable «Norge» et a ensuite entrepris une expédition avec «Italia». \ N \ n [ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ZEPPELIN_OBSERVATORY_TRIGGER_TT: "#default_text [GetPlayer.GetName] a un [GetBuildingType('building_verrier_observatory').GetName] avec la méthode de production de la station météorologique #V #!.#!"
 MR_ZEPPELIN_ACCESS_TRIGGER_TT: "#default_text [GetPlayer.GetName] possède ou a des accès avec un [concept_curtiss_airspace_convention] à l'un de ces états: #V Greenland#!, #V NORDERN NORWAY#!, #V Alaska#!, #V Nunavut [GetPlayer.GetName]0 ou #V nenetsia[GetPlayer.GetName]0.[GetPlayer.GetName]0"
 MR_ZEPPELIN_RECENT_EXPEDITION_TRIGGER_TT: "#default_text [GetPlayer.GetName] n'est pas #V sur une expédition Zeppelin#! ou #V a récemment eu un #!.#!"
 MR_PACIFIC_EXPEDITION_TT: "#T Pacific Expedition#!\nAlong Avec les poteaux, l'océan Pacifique est l'une des dernières zones de la Terre qui détiennent toujours des secrets. Les chercheurs de plusieurs disciplines scientifiques sont intéressés par une mission de recherche pour mener des études naturalistes, paléontologiques, astronomiques et océanographiques. Encore une fois, pour les grandes puissances, cela pourrait être une affaire prestigieuse de montrer leur influence à la fin du monde. \ N \ n [ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PACIFIC_RANK_TRIGGER_TT: "#default_text [GetPlayer.GetName] est soit un #V majeur Power#!, soit un #V Grand Power#!.#!"
 MR_PACIFIC_PORT_BUILDING_TRIGGER_TT: "#default_text [GetPlayer.GetName] a un [GetBuildingType('building_port').GetName].#!"
 MR_PACIFIC_UNIVERSITY_BUILDING_TRIGGER_TT: "#default_text [GetPlayer.GetName] a un [GetBuildingType('building_university').GetName].#!"
 MR_PACIFIC_15_FLOTILLAS_TRIGGER_TT: "#default_text [GetPlayer.GetName] a #V 15 ou plus Flottilas#!.#!"
 MR_PACIFIC_ADMIRAL_AVAILABLE_TRIGGER_TT: "#default_text [GetPlayer.GetName] a un #V admiral#! qui est #V pas occupé#!.#!"
 MR_PACIFIC_RECENT_EXPEDITION_TRIGGER_TT: "#default_text [GetPlayer.GetName] n'est pas #V sur une expédition du Pacifique#! ou #V a récemment eu un #!.#!"
 ARCHAEOLOGY_HEADER_TEXT: "Archéologue"
 ENGINEERING_HEADER_TEXT: "Ingénieur"
 ASTRONOMY_HEADER_TEXT: "Astronome"
