 MR_EXTEND_ZOO_LARGE_BUTTON: "Étendre le [concept_dubois_zoo] (grand)"
 MR_EXTEND_ZOO_LARGE_BUTTON_TT: "#T étendez le zoo à des grandes taille #!\n[Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] sont le bonheur de chacun: les gens se dispersent dans le zoo, les scientifiques peuvent poursuivre leurs études zoologiques et le prestige international est accordé à ceux qui peuvent montrer le plus grand nombre possible de faune étrangère. À chaque expansion, le prestige d'une nation augmente. Certaines étapes d'extension nécessitent non seulement de collecter de nombreux animaux, mais aussi de différentes parties du monde. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
