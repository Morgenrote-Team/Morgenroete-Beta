 MR_AERONAUTICAL_ENGINEER_AIRPLANE_FOCUS_TRIGGER_TT: "#default_text [GetPlayer.GetName] a le #V \ \"$curtiss_airplane_focus_modifier$ \" #! [concept_modifier].#!"
