 MR_NEWSPAPER_NOVEL_BUTTON: "Roman de journal"
 MR_NEWSPAPER_NOVEL_BUTTON_TT: "#T Écrivez un roman de journal #!\nIn Le 19e siècle, le roman de journal a garanti à de nombreux auteurs un revenu sécurisé et une renommée nationale. De nombreux écrivains bien connus de l'époque, tels que Tolstoy, Dostoyevsky, Flaubert et Dumas, ont d'abord publié leurs romans en tant que romans en série dans les journaux avant d'être publiés sous forme de livres. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
