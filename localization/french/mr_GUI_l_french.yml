 MR_ARCHAEOLOGY_MODERN_ARCHAEOLOGY_EXPERIENCED_OR_FAMOUS_TRIGGER: "#default_text [GetPlayer.GetName] a un #V expérimenté ou célèbre [concept_lepsius_archaeologist]#!.#!"
