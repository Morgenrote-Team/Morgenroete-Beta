 MR_GEOLOGIST_TECTONICS_CONGRESS_BUTTON_TT: "#T Congrès sur la dérive continentale #!\nFor siècles La croyance était inébranlable que les continents étaient fixes et immobiles. Un éminent géologue ayant des connaissances géologiques considérables pourrait effondrer ce mantra. Qu'il le gérera est plutôt discutable. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
