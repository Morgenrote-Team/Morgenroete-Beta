 MR_CHEMIST_ISOLATION_BUTTON: "#V Isolate an Element#!\nYour [concept_mendelejew_chemist] can try to isolate an element that is not yet isolated. Isolating an element is very prestigous.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
