 MR_PROMOTE_ENGINEER_TT: "#T Promote Engineer#!\n[Concept('concept_tesla_engineer','$concept_tesla_engineers$')] are versatile technicians in the military and in construction. They also speed up the construction of monuments by twice as much.\n\n#n Note:#! You can only have one Engineer at a time.[GetPlayer.GetCustom('mr_promote_has_engineer_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTE_ASTRONOMER_TT: "#T Promouvoir l'astronome 11"
 MR_PROMOTE_CHEMIST_TT: "#T Promouvoir Chemist#!\n[Concept('concept_mendelejew_chemist','$concept_mendelejew_chemists$')] sont des scientifiques qui se concentrent sur la découverte de nouveaux éléments et sur l'amélioration de votre industrie chimique. \ N \ n#n Remarque: #! Vous ne pouvez avoir qu'un seul chimiste à la fois.[GetPlayer.GetCustom('mr_promote_has_chemist_type')] \ n \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTE_GEOLOGIST_TT: "#T Promouvoir les géologues #!\n[Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')] Mineraux d'étude, les volcans et autres formations géologiques. \ N \ n#n Remarque: #! Vous ne pouvez avoir qu'un seul géologue à la fois.[GetPlayer.GetCustom('mr_promote_has_geologist_type')] \ n \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTE_NATURALIST_TT: "#T Promouvoir le naturaliste #!\n[Concept('concept_dubois_naturalist','$concept_dubois_naturalists$')] peut capturer des animaux à la maison ou à l'étranger, trouver des spécimens ou diriger les expéditions botaniques. \ N \ n#n Remarque: #! Vous ne pouvez avoir qu'un seul naturaliste à la fois.[GetPlayer.GetCustom('mr_promote_has_naturalist_type')] \ n \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTE_PALEONTOLOGIST_TT: "#T Promouvoir le paléontologue#!\n[Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')] peut examiner les formations géologiques pour les fossiles et les os de dinosaures ou les trouver sur les expéditions. \ N \ n#n Remarque: #! Vous ne pouvez avoir qu'un seul paléontologue à la fois.[GetPlayer.GetCustom('mr_promote_has_paleontologist_type')] \ n \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTE_ARCHAEOLOGIST_TT: "#T Promouvoir l'archéologue#!\n[Concept('concept_lepsius_archaeologist','$concept_lepsius_archaeologists$')] peut trouver des artefacts, faire des découvertes majeures et assister à des conférences archéologiques. \ N \ n#n Remarque: #! Vous ne pouvez avoir qu'un seul archéologue à la fois.[GetPlayer.GetCustom('mr_promote_has_archaeologist_type')] \ n \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTE_ANTHROPOLOGIST_TT: "#T Promouvoir l'anthropologue#!\n[Concept('concept_andersson_anthropologist','$concept_andersson_anthropologists$')] Étudier les origines des humains, depuis le début de l'évolution humaine à l'âge de pierre. \ N \ n#n Remarque: #! Vous ne pouvez avoir qu'un seul anthropologue à la fois.[GetPlayer.GetCustom('mr_promote_has_anthropologist_type')] \ n \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTE_COMPOSER_TT: "#T Promouvoir le composer#!\n[Concept('concept_elgar_composer','$concept_elgar_composers$')] est nécessaire pour créer une culture musicale florissante. Ils aideront un pays à créer plus de [concept_elgar_musical_tradition]. \ N \ n#n Remarque: #! Vous ne pouvez avoir qu'un seul compositeur à la fois.[GetPlayer.GetCustom('mr_promote_has_composer_type')] \ n \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTE_WRITER_TT: "#T Promouvoir l'écrivain#!\n[Concept('concept_manzoni_writer','$concept_manzoni_writers$')] sont des maîtres de la narration et du travail sur les livres et autres littérature. Avec leur travail, ils renforcent un pays [concept_manzoni_literary_tradition]. \ N \ n#n Remarque: #! Vous ne pouvez avoir qu'un seul écrivain national et 3 écrivains locaux à la fois.[GetPlayer.GetCustom('mr_promote_has_writers_type')] \ n \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTE_PAINTER_TT: "#T Promouvoir Painter#!\n[Concept('concept_klimt_painter','$concept_klimt_painters$')] Capture les impressions, les paysages et les merveilles du monde sur toile. À travers leurs chefs-d'œuvre, ils renforcent le [concept_klimt_painting_tradition] d'un pays. \ N \ n#n Remarque: #! Vous ne pouvez avoir qu'un seul peintre à un moment.[GetPlayer.GetCustom('mr_promote_has_painter_type')] \ n \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
