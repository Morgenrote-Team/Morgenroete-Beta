 MR_MOZART_MONUMENT_BUTTON: "Construisez le monument Mozart"
 MR_MOZART_MONUMENT_BUTTON_TT: "#T Build the Mozart Monument#!\nWolfgang Amadeus Mozart est l'un des compositeurs les plus importants de tous les temps, mais certains lui refusent toujours cette reconnaissance. Plus récemment, toute une génération de compositeurs l'a redécouvert comme point de départ pour la musique contemporaine. L'érection d'un monument Mozart dans son lieu de naissance Salzbourg inspirera les générations futures à vouloir suivre ses traces. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
