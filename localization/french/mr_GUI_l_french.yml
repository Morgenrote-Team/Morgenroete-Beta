 DINOSAUR_BONE_VAR_TT: "#header [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')]#!\n[GetPlayer.GetName] has found a total of @dubois_dinosaur_bone! [GetPlayer.MakeScope.Var('dubois_dinosaur_bone_total').GetValue|V0] [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')].\n\n#yellow Africa:#!\n[GetPlayer.MakeScope.Var('dubois_african_dinosaur_bone').GetValue|V0] (unused) / [GetPlayer.MakeScope.Var('dubois_african_dinosaur_bone_total').GetValue|V0] (total)\n#yellow Asia:#!\n[GetPlayer.MakeScope.Var('dubois_asian_dinosaur_bone').GetValue|V0] (unused) / [GetPlayer.MakeScope.Var('dubois_asian_dinosaur_bone_total').GetValue|V0] (total)\n#yellow Australia:#!\n[GetPlayer.MakeScope.Var('dubois_australian_dinosaur_bone').GetValue|V0] (unused) / [GetPlayer.MakeScope.Var('dubois_australian_dinosaur_bone_total').GetValue|V0] (total)\n#yellow Europe:#!\n[GetPlayer.MakeScope.Var('dubois_european_dinosaur_bone').GetValue|V0] (unused) / [GetPlayer.MakeScope.Var('dubois_european_dinosaur_bone_total').GetValue|V0] (total)\n#yellow North America:#!\n[GetPlayer.MakeScope.Var('dubois_north_american_dinosaur_bone').GetValue|V0] (unused) / [GetPlayer.MakeScope.Var('dubois_north_american_dinosaur_bone_total').GetValue|V0] (total)\n#yellow South America:#!\n[GetPlayer.MakeScope.Var('dubois_south_american_dinosaur_bone').GetValue|V0] (unused) / [GetPlayer.MakeScope.Var('dubois_south_american_dinosaur_bone_total').GetValue|V0] (total)\n#yellow General:#!\n[GetPlayer.MakeScope.Var('dubois_general_dinosaur_bone').GetValue|V0] (unused) / [GetPlayer.MakeScope.Var('dubois_general_dinosaur_bone_total').GetValue|V0] (total)"
