 MR_PROMOTING_ENGINEER_TT: "#T Promote Engineer#!\n#p You are currently promoting the Engineer.#!\n[Concept('concept_tesla_engineer','$concept_tesla_engineers$')] are versatile technicians in the military and in construction. They also speed up the construction of monuments by twice as much."
 MR_PROMOTING_ASTRONOMER_TT: "#T Promouvoir l'astronome#!\n#p Vous faites actuellement la promotion de l'astronome.#!\n[Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')] Trouvez de nouveaux objets astronomiques, découvrez des étoiles et des planètes ou peut participer à des congrès astronomiques."
 MR_PROMOTING_NATURALIST_TT: "#T Promouvoir Naturalist#!\n#p Vous faites actuellement la promotion du naturaliste.#!\n[Concept('concept_dubois_naturalist','$concept_dubois_naturalists$')] peut capturer des animaux à la maison ou à l'étranger, trouver des spécimens ou diriger des expéditions botaniques."
 MR_PROMOTING_PALEONTOLOGIST_TT: "#T Promouvoir le paléontologue#!\n#p Vous faites actuellement la promotion du paléontologue.#!\n[Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')] peut examiner les formations géologiques pour les fossiles et les os de dinosaures ou les trouver dans les expéditions."
 MR_PROMOTING_ARCHAEOLOGIST_TT: "#T Promouvoir l'archéologue#!\n#p Vous faites actuellement la promotion de l'archéologue.#!\n[Concept('concept_lepsius_archaeologist','$concept_lepsius_archaeologists$')] Vous pouvez trouver des artefacts, faire des découvertes majeures et assister à des conférences archéologiques. \ N"
 MR_PROMOTING_ANTHROPOLOGIST_TT: "#T Promouvoir l'anthropologue#!\n#p Vous faites actuellement la promotion de l'anthropologue.#!\n[Concept('concept_andersson_anthropologist','$concept_andersson_anthropologists$')] Étudiez les origines des humains, depuis le début de l'évolution humaine à l'âge de pierre.#T Investment académique#!"
 MR_ACADEMICS_INVESTMENT_ACTIVE_TT: "#T Investment académique#!\n#p Vous investissez dans le monde universitaire.#!\nA L'investissement général général dans nos universités augmentera #O Progress académique #! par #G + 1#! par mois. Le financement est prévu pour 10 ans."
 MR_PROMOTING_COMPOSER_TT: "#T Promouvoir le compositeur#!\n#p Vous faites actuellement la promotion du compositeur.#!\n[Concept('concept_elgar_composer','$concept_elgar_composers$')] sont nécessaires pour créer une culture musicale florissante. Ils aideront un pays à créer plus de [concept_elgar_musical_tradition]."
 MR_PROMOTING_WRITER_TT: "#T Promouvoir l'écrivain#!\n#p Vous faites actuellement la promotion de l'écrivain.#!\n[Concept('concept_manzoni_writer','$concept_manzoni_writers$')] sont des maîtres de la narration et du travail sur les livres et autres littérature. Avec leur travail, ils renforcent un pays [concept_manzoni_literary_tradition]."
 MR_PROMOTING_PAINTER_TT: "#T Promouvoir Painter#!\n#p Vous faites actuellement la promotion du peintre.#!\n[Concept('concept_klimt_painter','$concept_klimt_painters$')] Capture des impressions, des paysages et des merveilles du monde sur toile. À travers leurs chefs-d'œuvre, ils renforcent le [concept_klimt_painting_tradition] d'un pays."
 MR_AVANTGARDE_INTELLIGENTSIA_ACTIVE_TT: "#T Avantgarde Intelligentsia#!\n#p Avantgarde Intelligentsia est actuellement votre orientation scientifique active.#!\nA Clique des universitaires avec des idées culturelles, sociologiques et anthropologiques claires déterminent la vie scientifique quotidienne. En revanche, les champs pratiques sont de moindre importance. \ N#R Remarque#!: augmente l'apparence des universitaires d'un point par mois."
 MR_PRACTICAL_ACADEMIA_ACTIVE_TT: "#T Academia#!\n#p Academia pratique est actuellement votre orientation scientifique active.#!\nThe Les scientifiques de notre pays essaient sans relâche de faire des découvertes de tous les domaines adaptés à un usage quotidien pratique. Il s'agit de servir les progrès généraux et la paix de l'humanité. \ N#p Remarque #!: augmente l'apparence des universitaires d'un point par mois."
 MR_MILITARY_INDUSTRIAL_COMPLEX_ACTIVE_TT: "#T complexe militaire-industriel #!\n#p Le complexe militaire industriel est actuellement votre orientation scientifique active.#!\nCooperation entre les industriels privés et l'armée a conduit au développement d'un réseau de connexions, de liens et de connaissances personnels particulièrement importants, avec juste un souci de corruption toujours aussi léger, qui peut être décrit comme un complexe militaire-industriel."
 MR_BUSINESS_AND_TYCOON_ACTIVE_TT: "#T écoles de commerce et capitalisme de magnat #!\n#p Les écoles de commerce et le capitalisme de magnat sont actuellement votre orientation scientifique active.#!\nThe individuel indépendant combiné à un moment de progrès prospère a conduit à une mentalité dans laquelle les écoles de commerce, les entreprises de taille moyenne et les grandes sociétés ont une influence décisive sur les sciences du pays. Vice-versa, les universités travaillent à accroître la prospérité acquise du pays grâce à de nouvelles technologies et à stimuler les idées sociales à travers les progrès."
 MR_SEA_POWER_AND_MERCHANT_ACTIVE_TT: "#T Sea Power & Merchant Marine#!\n#p Sea Power & Merchant Marine est actuellement votre orientation scientifique active.#!\nThe La marine et le commerce international jouent un rôle immense pour notre pays. L'augmentation de la prospérité grâce à la production avancée et au commerce mondial de nos produits est tout aussi importante que la défense de ce qui a déjà été gagné."
 MR_IVORY_TOWER_ACTIVE_TT: "#T Tour d'ivoire utile #!\n#p La tour d'ivoire utile est actuellement votre orientation scientifique active.#!\nThe L'académie est considérée dans notre pays comme un paradis pour les esprits excentriques qui comptent les coléoptères, les vieux vases polonais et les plombs dans les étranges. Cependant, on ne peut nier que l'isolement de la tour d'ivoire de la société a également ses avantages. Non perturbé, de nombreux professeurs travaillent mieux. \ N#p Remarque #!: augmente l'apparence des universitaires d'un point par mois."
 MR_ON_PACIFIC_EXPEDITION_TT: "#T Pacific Expedition#!\n#p Il y a actuellement une expédition du Pacifique en cours.#!\nAlong Avec les poteaux, l'océan Pacifique est l'une des dernières zones de la Terre qui contiennent toujours des secrets. Les chercheurs de plusieurs disciplines scientifiques sont intéressés par une mission de recherche pour mener des études naturalistes, paléontologiques, astronomiques et océanographiques. Encore une fois, pour les grandes puissances, il pourrait être une affaire prestigieuse de montrer leur influence à la fin du monde."
 MR_ON_NORTHWEST_EXPEDITION_TT: "#T The Northwest Passage#!\n#p Il y a actuellement une expédition en cours pour trouver le passage nord-ouest.#!\nAlready Au tournant du siècle dernier, les aventuriers audacieux ont exploré les parties extérieures de la mer Arctique. Un vieux rêve reste insatisfait: la découverte du passage du Nord-Ouest entre le Canada et l'océan Arctique. Mais qui oserait une expédition aussi dangereuse?"
 MR_ON_ARCTICA_EXPEDITION_TT: "#T Zeppelin Expedition#!\n#p Il existe actuellement une expédition de Zeppelin en cours.#!\nThe Aeroarctic, la «Société internationale de l'étude pour l'exploration de l'Arctique par dirigeable» était une association scientifique non gouvernementale qui s'était fixé l'objectif d'utiliser des aérovistes dans la recherche polaire. Il a été fondé principalement sur l'initiative de l'Aeronaut et plus tard secrétaire général de la société, Walther Bruns. Le président fondateur en 1924 était Fridtjof Nansen. Après plusieurs années de travail préparatoire, l'entreprise a réussi en 1931 à utiliser un dirigeable pour une expédition polaire purement scientifique pour la première fois. À travers le vol arctique du LZ 127 Graf Zeppelin, la connaissance de la géographie des régions polaires avancées a été considérablement élargie. Dès 1926, Umberto Nobile a survolé le pôle Nord avec son dirigeable «Norge» et a ensuite entrepris une expédition avec «l'Italia»."
 MR_IS_CIVIL_ENGINEER_TT: "#T [concept_tesla_civil_engineer]#!\nYour [concept_tesla_engineer] is focusing on [Concept('concept_tesla_civil_engineer','$concept_tesla_civil_engineering$')]."
 MR_IS_MECHANICAL_ENGINEER_TT: "#T [concept_tesla_mechanical_engineer]#!\nYour [concept_tesla_engineer] is focusing on [Concept('concept_tesla_mechanical_engineer','$concept_tesla_mechanical_engineering$')]."
 MR_IS_MILITARY_ENGINEER_TT: "#T [concept_tesla_military_engineer]#!\nYour [concept_tesla_engineer] is focusing on [Concept('concept_tesla_military_engineer','$concept_tesla_military_engineering$')]."
 MR_IS_ELECTRICAL_ENGINEER_TT: "#T [concept_tesla_electrical_engineer]#!\nYour [concept_tesla_engineer] is focusing on [Concept('concept_tesla_electrical_engineer','$concept_tesla_electrical_engineering$')]."
 MR_IS_AERONAUTICAL_ENGINEER_TT: "#T [concept_tesla_aeronautical_engineer]#!\nYour [concept_tesla_engineer] is focusing on [Concept('concept_tesla_aeronautical_engineer','$concept_tesla_aeronautical_engineering$')]."
 MR_SAFARI_ACTIVE_TT: "#T heia safari#!\n#p Votre naturaliste est actuellement sur un safari.#!\nOn Un safari africain, par suivi constant et piégeage, le grand jeu peut être capturé puis transporté vers un [concept_dubois_zoo]. Il est seulement possible d'attraper un animal par safari. Selon les espèces animales, cela diffère que vous ayez besoin de pièges ou que vous ayez à rester sur leur sentier. En règle générale, les grands animaux lents ont besoin de plus de pièges, tandis que les animaux rapides nécessitent plus de suivi."
 MR_ZOOLOGICAL_EXPEDITION_ACTIVE_TT: "#T attraper les animaux locaux #!\n#p Votre naturaliste IST attrape actuellement des animaux locaux.#!\nOur Nation a des habitats animaux avec des espèces fascinantes qui pourraient être affichées dans un [concept_dubois_zoo]. Un [concept_dubois_naturalist] consiste à voyager à travers le pays pendant un an pour collecter [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] pour un zoo."
 MR_CHEMIST_IMPROVE_FERTILIZER_BUTTON: "Améliorer les engrais"
