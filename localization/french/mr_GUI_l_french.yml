 MR_CHEMIST_CONGRESS_BUTTON_TT: "#T Congrès chimiste #!\nThe Karlsruhe Congress a été le premier symposium international sur la chimie moderne. Il a eu lieu du 3 au 5 au 5 septembre 1860 sur l'initiative de Friedrich August Kekulé von Stradonitz, Charles Adolphe Wurtz et Karl Weltzien dans le Ständehaus à Karlsruhe. Les sujets comprenaient la nomenclature des composés chimiques et leur représentation de formule ainsi que la question des poids atomiques et moléculaires des composés chimiques. C'était la première conférence internationale en chimie au monde. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
