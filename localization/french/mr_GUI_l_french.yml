 MR_HIPPOCAMPUS_CONGRESS_SPECIMEN_TRIGGER_TT: "#default_text [GetPlayer.GetName] a #V 20000 ou plus #! [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] (actuellement [GetPlayer.MakeScope.Var('dubois_specimen').GetValue|0+]) .#!"
 MR_HIPPOCAMPUS_CONGRESS_GLOBAL_SPECIMEN_TRIGGER_TT: "#default_text #V 100000 ou plus#! [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] ont été collectés dans le monde entier (actuellement [GetGlobalVariable('dubois_global_specimen').GetValue|0+]) .#!"
 MR_EXTEND_ZOO_SMALL_BUTTON: "Étendre le [concept_dubois_zoo] (petit)"
 MR_EXTEND_ZOO_SMALL_BUTTON_TT: "#T étendez le zoo à la petite taille#!\n[Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] est le bonheur de chacun: les gens se dispersent dans le zoo, les scientifiques peuvent poursuivre leurs études zoologiques, et le prestige international est accordé à ceux qui peuvent montrer le plus grand nombre possible de faune étrangère. À chaque expansion, le prestige d'une nation augmente. Certaines étapes d'extension nécessitent non seulement de collecter de nombreux animaux, mais aussi de différentes parties du monde. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_EXTEND_ZOO_SMALL_10_TOTAL_ANIMALS_TRIGGER_TT: "#default_text [GetPlayer.GetName] a #V 10 Total#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')]. Vous avez actuellement [GetPlayer.MakeScope.Var('dubois_zoo_animal_total').GetValue|0+].#!"
 MR_EXTEND_ZOO_SMALL_2_SPECIAL_ANIMALS_TRIGGER_TT: "#default_text [GetPlayer.GetName] a #V 2 African#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] (actuellement [GetPlayer.MakeScope.Var('dubois_zoo_animal_africa').GetValue|0+]), #V 2 asian#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] (actuellement [GetPlayer.MakeScope.Var('dubois_zoo_animal_asia').GetValue|0+]) ou #V 2 Oceanic#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] (actuellement [GetPlayer.GetName]3)."
