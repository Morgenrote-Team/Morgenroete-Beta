 MR_ASTRONOMER_ACTIVE_TRIGGER_TT: "#default_text [GetPlayer.GetName] a un [concept_verrier_astronomer] qui est #V pas occupé#!.#!"
 MR_ASTRONOMER_MOON_MAP_BUTTON_TT: "#T Map The Moon#!\nWith L'aide de la caméra et des télescopes modernes, il est possible de cartographier l'ensemble du compagnon de la Terre en qualité sans précédent. Une carte lunaire serait une étape importante en astronomie. Cependant, un astronome trouvera moins d'objets astronomiques s'il poursuit des études sélénographiques. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
