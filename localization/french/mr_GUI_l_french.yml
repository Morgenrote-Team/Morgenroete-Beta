 MR_SAFARI_EXPEDITION_BUTTON_TT: "#T Heia Safari#!\nOn Un safari africain, grâce à un suivi et à un piégeage constants, le grand jeu peut être capturé puis transporté vers un [concept_dubois_zoo]. Il est seulement possible d'attraper un animal par safari. Selon les espèces animales, cela diffère que vous ayez besoin de pièges ou que vous ayez à rester sur leur sentier. En règle générale, les grands animaux lents ont besoin de plus de pièges, tandis que les animaux rapides nécessitent plus de suivi. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_SAFARI_EXPEDITION_NATURALIST_TRIGGER_TT: "#default_text [GetPlayer.GetName] a un [concept_dubois_naturalist] qui est #V pas occupé#!.#!"
 MR_SAFARI_EXPEDITION_HAS_SMALL_OR_BIGGER_ZOO_TRIGGER_TT: "#default_text Vous avez un [concept_dubois_zoo] qui est au moins #V de petite taille #!.#!"
 MR_SAFARI_EXPEDITION_HABITAT_TRIGGER_TT: "#default_text [GetPlayer.GetName] #V possède au moins un habitat animal africain avec un grand jeu ou il y a un tel habitat dans un État #V appartenant à une nation décentralisée#!.#!"
 MR_SAFARI_EXPEDITION_RECENT_TRIGGER_TT: "#default_text [GetPlayer.GetName] n'est pas #V sur un safari#! ou #V a récemment eu un #!.#!"
 MR_ZOOLOGICAL_EXPEDITION_BUTTON_TT: "#T Catch Animal #!\nOur Nation a des habitats animaux avec des espèces fascinantes qui pourraient être affichées dans un [concept_dubois_zoo]. Un [concept_dubois_naturalist] consiste à voyager à travers le pays pendant un an pour collecter [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] pour un zoo. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ZOOLOGICAL_EXPEDITION_LOCAL_ANIMALS_TRIGGER_TT: "#default_text [GetPlayer.GetName] possède au moins un habitat animal qui abrite un [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] qui ne vit pas dans notre [concept_dubois_zoo].#!"
 MR_ZOOLOGICAL_EXPEDITION_CURRENT_EXPEDITION_TRIGGER_TT: "#default_text [GetPlayer.GetName] n'est pas #V attraper actuellement des animaux locaux #!.#!"
 MR_HIPPOCAMPUS_CONGRESS_BUTTON: "Congrès de l'hippocampe"
 MR_HIPPOCAMPUS_CONGRESS_BUTTON_TT: "#T Hippocampus Congress#!\nHow Unique est l'homme? Combien d'animaux est-il? Les Grecs anciens avaient déjà remarqué une proximité entre les humains et les singes. Le fait que Carl Linneaus a classé les singes et les humains comme des primates - le rang «le plus élevé» parmi les animaux - montre que le champ n'était pas si controversé. Cependant, avec la formulation de la théorie de l'évolution et la descente présumée de l'homme d'un parent semblable à un singe, des conflits sont apparus qui doivent maintenant être résolus. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_NATURALIST_TRIGGER_TT: "#default_text [GetPlayer.GetName] a un [concept_dubois_naturalist]#!"
