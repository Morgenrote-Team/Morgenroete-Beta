 MR_BAN_ANIMAL_EXPORT_BUTTON: "Interdire l'exportation des animaux"
 MR_BAN_ANIMAL_EXPORT_BUTTON_TT: "#T Interdiction des exportations animales_1 Une interdiction des exportations d'animaux, nous indiquons clairement que nous ne sommes prêts à vendre aucun de nos animaux à l'étranger. D'autres nations s'abstiendront des demandes. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
