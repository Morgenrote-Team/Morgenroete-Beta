 VISIT_ZOO_BUTTON: "Visiter le zoo"
 VISIT_ZOO_BUTTON_TT: "#T Visitez le zoo#!\nThe [concept_dubois_zoo] vous donne un aperçu de tous vos [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] et vous permet de les visiter. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_VISIT_ZOO_BUILDING_TRIGGER_TT: "#default_text [GetPlayer.GetName] a un [GetBuildingType('building_dubois_zoo').GetName].#!"
 MR_VISIT_ZOO_TRIGGER_TT: "#default_text Vous êtes #V pas actuellement #! Visiter le #V zoo#!.#!"
 VISIT_PALEONTOLOGICAL_COLLECTION_BUTTON: "Visiter Institut de paléontologie"
