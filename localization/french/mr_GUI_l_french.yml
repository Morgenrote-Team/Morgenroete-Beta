 MR_CHEMIST_CONGRESS_BUTTON: "Congrès de chimiste"
 MR_CHEMIST_TRIGGER_TT: "#default_text a un [concept_mendelejew_chemist].#!"
 MR_CHEMIST_CONGRESS_5_CHEMISTS_TRIGGER_TT: "#default_text Au moins #V 5 pays#! ont un [concept_mendelejew_chemist].#!"
 MR_CHEMIST_CONGRESS_ELEMENTS_TRIGGER_TT: "#default_text Un total d'au moins #V 60#! [Concept('concept_mendelejew_element','$concept_mendelejew_elements$')] a été vérifié dans le monde entier [GetGlobalVariable('mendelejew_isolated_elements_global_number_var').GetValue|+0] ont été isolés) .#!"
 MR_MOUNT_SKELETON_ACTIVE_TT: "#T Construire un dinosaure squelette#!\n#p Votre paléontologue construit actuellement un squelette de dinosaure.#!\nYour [concept_dubois_paleontologist] peut construire un nouveau [concept_dubois_dinosaur_skeleton] avec 5 [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] du même continent."
 MR_REMOUNT_SKELETON_ACTIVE_TT: "#T Remount Dinosaur Skeleton#!\n#p Votre paléontologue remoute actuellement un squelette de dinosaure.#!\nIf Vous avez un [Concept('concept_dubois_dinosaur_skeleton','$concept_dubois_dinosaur_skeletons$')] imparfait, vous pouvez laisser votre [concept_dubois_paleontologist] essayer de le remédier. Si votre paléontologue est suffisamment expérimenté, le squelette Remountette pourrait être de meilleure qualité."
 MR_UPPER_EGYPT_EXPEDITION_ACTIVE_TT: "#T Expédition dans la vallée des Kings#!\n#p Votre archéologue est actuellement en expédition dans la vallée du roi.#!\nWith La vieille capitale et la vallée des rois, la Haute-Égypte est considérée comme la Mecque de l'Égyptologie. Nous devons acquérir une licence d'excavation pour la région et rechercher des trésors égyptiens."
 MR_LOWER_EGYPT_EXPEDITION_ACTIVE_TT: "#T Expédition aux pyramides#!\n#p Votre archéologue est actuellement en expédition aux pyramides.#!\nSince Le début des temps, les pyramides égyptiennes ont fasciné l'humanité. On dit que d'autres tombes, temples et même des villes qui ont disparu dans les sables de la Basse-Égypte attendent d'être redécouverts."
 MR_BABYLONIA_EXPEDITION_ACTIVE_TT: "#T Expédition à Babylonia#!\n#p Votre archéologue est actuellement en expédition à Babylonia.#!\nBabylonia, La partie sud de la Mésopotamie, doit son nom à la ville autrefois puissante de Babylon. La région est considérée comme le «berceau de la civilisation» où de précieux artefacts archéologiques sont découverts encore et encore. Ils appartiennent définitivement à un musée."
 MR_ASSYRIA_EXPEDITION_ACTIVE_TT: "#T Expédition en Assyria#!\n#p Votre archéologue est actuellement en expédition en Assyria.#!\nAssyria fait référence à la partie nord de la Mésopotamie avec les deux villes importantes d'Assur et de Ninive. Les connaissances clairsemées sur le pays peuvent encore être retracées à la Bible en tant que source - mais peut-être qu'il existe des preuves historiques qui sont plus fiables?"
 MR_ARGOLIS_EXPEDITION_ACTIVE_TT: "#T Expédition à Argolis#!\n#p Votre archéologue est actuellement en expédition à Argolis.#!\nAfter La découverte de Troy, même les scientifiques sceptiques se rendent compte que les mythes des anciens Grecs sont plus que de simples contes de fées. On dit que les restes des villes de l'âge du bronze se trouvent à Argolis à ce jour, dont les plus connus sont Mycenae. Nous devons nous convaincre de cela."
 MR_CRETE_EXPEDITION_ACTIVE_TT: "#T Expédition à Crete#!\n#p Votre archéologue est actuellement en expédition en Crète.#!\nThe Le légendaire roi Minos aurait une fois gouverné en Crète. Semblable à Troy et Mycenae, il semble également y avoir quelque chose dans cette histoire: des artefacts de la culture minoenne légendaire se trouvent de plus en plus sur l'île. Notre nation devrait également en obtenir quelques-unes."
 MR_YUCATAN_EXPEDITION_ACTIVE_TT: "#T Expédition au Yucatán#!\n#p Votre archéologue est actuellement en expédition au Yucatán.#!\nReports de villes inconnues et énormes au milieu de la jungle. Nous devons étudier davantage et envoyer une expédition archéologique au Yucatán."
 MR_PERU_EXPEDITION_ACTIVE_TT: "#T Expédition à Pérou §_ Votre archéologue est actuellement en expédition au Pérou.#!\nPilots Rapport étranges forteresses et structures clos dans les Andes qu'ils ont vues sur leurs vols au-dessus du Pérou. Peut-être que les Espagnols n'ont pas complètement détruit la culture des Incas? Certaines villes de résistance indigène n'ont pas été trouvées à ce jour."
 MR_FOSSIL_IDENTIFICATION_ACTIVE_TT: "#T Identifier les fossiles#!\n#p Votre anthropologue identifie actuellement les fossiles.#!\nAn [concept_andersson_anthropologist] a la capacité d'analyser un os inconnu au fil du temps et de les attribuer à une espèce humaine ou pré-humane spécifique. S'il parvient à attribuer trois os à la même espèce, il peut systématiser avec succès cette espèce. Le temps nécessaire pour identifier correctement un os dépend de l'expérience de l'anthropologue."
 MR_CONDUCTING_ACTIVE_TT: "#p Votre compositeur mène actuellement une saison à l'opéra.#!\n[Localize('concept_elgar_conducting_desc')]"
 MR_MUSIC_TOUR_ACTIVE_TT: "#p Votre compositeur est actuellement en tournée musicale.#!\n[Localize('concept_elgar_musical_tour_desc')]"
 MR_NEWSPAPER_NOVEL_ACTIVE_TT: "#T Novel #!\n#p Votre écrivain écrit actuellement un roman de journal.#!\nIn Le 19e siècle, le roman de journal a garanti à de nombreux auteurs un revenu sécurisé et une renommée nationale. De nombreux écrivains bien connus de l'époque, tels que Tolstoy, Dostoyevsky, Flaubert et Dumas, ont d'abord publié leurs romans en tant que romans en série dans les journaux avant d'être publiés sous forme de livres."
 MR_READNG_TOUR_ACTIVE_TT: "#T Reading Tour#!\n#p Votre écrivain est actuellement en tournée de lecture.#!\nAn Écrivain internationalement reconnu qui est en contact avec des éditeurs étrangers peut augmenter la renommée du pays s'il part en tournée de lecture. Cela ne favorisera pas seulement les relations mutuelles, mais aussi sa réputation."
 MR_PAINTER_TRIP_ACTIVE_TT: "#T Journey éducatif#!\n#p Votre peintre est actuellement sur un parcours éducatif.#!\nOn A [concept_klimt_painter_trip], un artiste peut apprendre un style artistique auparavant inconnu et ainsi améliorer le [concept_klimt_painting_tradition] annuel. Ils peuvent également acquérir d'autres traits positifs et négatifs pendant leur séjour dans un [concept_artists_center_of_arts] étranger."
 MR_MOUNTAIN_EXPEDITION_ACTIVE_TT: "#T Mountain Expedition#!\n#p Il y a actuellement une expédition en cours de montagne.#!\nWith L'ascension du Mont Blanc en 1786, une nouvelle ère de conquête des plus hauts sommets du monde a commencé; Une tendance qui n'a augmenté qu'au cours des XIXe et 20e siècles. Si nous avons une chaîne de montagnes sur l'un de nos territoires qui n'a pas encore été à l'échelle, nous pourrions déléguer la conquête à un général compétent avec les compétences appropriées."
 MR_AIR_COMBAT_MISSION_ACTIVE_TT: "#T Air Combat Mission#!\n#p Votre pilote est actuellement sur une mission de combat aérien.#!"
 MR_AIRCRAFT_PARADE_ACTIVE_TT: "#T Parade d'avions #!\n#p Votre pilote participe actuellement à un défilé d'avion.#!"
 academics_academy_progress_observatory_tt_loc: "\n#p 1 Point#! for #V promoting an#! [concept_tesla_engineer], [concept_mendelejew_chemist] or [concept_verrier_astronomer] and having an [GetBuildingType('building_verrier_observatory').GetName]."
