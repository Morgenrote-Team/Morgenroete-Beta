 MR_BREEDING_ANIMALS_BUTTON: "Breed Animals"
 MR_BREEDING_ANIMALS_BUTTON_TT: "#T Breed Animals in Your Nature Reserve#!\nTry pour établir un nouveau [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animal$')] [concept_dubois_habitat] dans un état avec un [concept_dubois_nature_reserve]. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BREEDING_ANIMALS_TRIGGER: "#default_text Vous pouvez élever [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] si vous avez un état avec un [concept_dubois_nature_reserve] qui n'a pas encore l'animal spécifique de la même région que la réserve naturelle #V [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')]0 pourtant et si vous avez #b alpine ibexes#! dans votre #b zoo#!.#!"
