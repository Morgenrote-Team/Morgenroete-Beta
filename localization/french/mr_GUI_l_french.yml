 MR_RED_CROSS_BUTTON: "J'ai trouvé le [concept_panum_red_cross]"
 MR_RED_CROSS_BUTTON_TT: "#T a constaté que la Croix-Rouge internationale [concept_panum_red_cross]#!\nThe est l'une des premières institutions supranationales. La création de cette organisation a été une étape importante vers le droit international. Il a été fondé pour protéger la vie et la santé humaines, pour garantir le respect de tous les êtres humains et pour prévenir et soulager les souffrances humaines. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_IRC_INFAMY_TRIGGER_TT: "#default_text [GetPlayer.GetName] a moins de #V 35 [concept_infamy]#!.#!"
 MR_JOIN_RED_CROSS_BUTTON: "Rejoignez le [concept_panum_red_cross]"
 MR_JOIN_RED_CROSS_BUTTON_TT: "#T Rejoignez le [concept_panum_red_cross]#!\nOur Nation peut rejoindre la Croix-Rouge internationale et améliorer sa réputation à travers des accords internationaux - au détriment de la guerre impitoyable. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_SIGN_FIRST_CONVENTION_BUTTON: "Signez la première convention"
 MR_SIGN_FIRST_CONVENTION_BUTTON_TT: "#T Signe la première convention °_1 Première Convention de Genève, officiellement la convention pour l'amélioration de l'état des blessés dans les armées sur le terrain définit «la base sur laquelle reposent les règles du droit international pour la protection des victimes des conflits armés». L'une de ses réglementations les plus importantes est l'immunité de la capture et de la destruction de tous les établissements pour le traitement des soldats blessés et malades et la réception impartiale et le traitement de tous les combattants. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_SIGN_SECOND_CONVENTION_BUTTON: "Signez la deuxième convention"
 MR_SIGN_SECOND_CONVENTION_BUTTON_TT: "#T Signe que les deuxième congrès les conventions de La Haye de 1899 et 1907 sont une série de traités et de déclarations internationaux négociés lors de deux conférences internationales de paix à La Haye aux Pays-Bas. Les deux conférences comprenaient des négociations concernant le désarmement, les lois de la guerre et les crimes de guerre. La conférence de 1907 a mis l'accent sur la guerre navale. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_SIGN_THIRD_CONVENTION_BUTTON: "Signez la troisième convention"
 MR_SIGN_THIRD_CONVENTION_BUTTON_TT: "#T Signe le troisième protocole Convention#!\nThe pour l'interdiction de l'utilisation dans la guerre d'asphyxiant, toxique ou d'autres gaz, et des méthodes bactériologiques de guerre, généralement appelés le protocole de Genève, est un traité interdisant l'utilisation d'armes chimiques et biologiques dans les conflits armés internationaux. Il a été signé à Genève le 17 juin 1925. \ n \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_LEAVE_RED_CROSS_BUTTON: "Quitte la Croix-Rouge"
 MR_LEAVE_RED_CROSS_BUTTON_TT: "#T Laissez la Croix-Rouge #!\nHomo Homini Lupus. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PHYSICIAN_INTRODUCE_MEDICAL_TECHNIQUES_LEVEL_BUTTON_TT: "#T Introduire des techniques médicales#!\nDirects Le médecin introduire des équipements, des méthodes et des traitements modernes et de nouveaux traitements aux propriétés médicales à travers le pays. Parfois, un médecin peut développer de nouvelles inventions spectaculaires. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PHYSICIAN_INTRODUCE_MEDICAL_TECHNIQUES_LEVEL_BUTTON_ACTIVE_TT: "#T Présentation des techniques médicales#!\nYour Le médecin introduit actuellement des équipements, des méthodes et des traitements modernes aux propriétés médicales à travers le pays. Parfois, un médecin peut développer de nouvelles inventions spectaculaires."
