 MR_CHEMIST_DISCOVERY_BUTTON: "#V Discover an Element#!\nYour [concept_mendelejew_chemist] can try to discover an element that is already theorized. Once an element has been discovered, the chemist can start isolating it.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
