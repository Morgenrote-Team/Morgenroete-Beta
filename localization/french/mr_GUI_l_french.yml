 MR_REMOUNT_SKELETON_BUTTON: "Remouter squelette de dinosaure"
 MR_REMOUNT_SKELETON_BUTTON_TT: "#T Remount Dinosaur Skeleton#!\nIf Vous avez un [Concept('concept_dubois_dinosaur_skeleton','$concept_dubois_dinosaur_skeletons$')] imparfait, vous pouvez laisser votre [concept_dubois_paleontologist] essayer de le remettre en remontage. Si votre paléontologue est suffisamment expérimenté, le squelette Remountette pourrait être de meilleure qualité. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_REMOUNT_SKELETON_ACTIVE_BUTTON_TRIGGER: "#default_text Vous n'êtes pas déjà #V envisageant de retirer un [concept_dubois_dinosaur_skeleton]#!.#!"
 MR_REMOUNT_SKELETON_PALEONTOLOGIST_TRIGGER: "#default_text [GetPlayer.GetName] has a [concept_dubois_paleontologist] that is #V not busy#!.#!"
 MR_REMOUNT_SKELETON_TRIGGER_TT: "#default_text [GetPlayer.GetName] a au moins un #V imparfait#! [concept_dubois_dinosaur_skeleton].#!"
 MR_TRANSFORM_FOSSILS_TO_BONES_BUTTON: "Fossiles aux os"
 MR_TRANSFORM_FOSSILS_TO_BONES_BUTTON_TT: "#T Transformer les fossiles en os#!\nAn [concept_dubois_paleontologist] expérimenté ou célèbre peut transformer 20 [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] en un [concept_dubois_dinosaur_bone] si vous possédez déjà au moins un os et que vous n'avez pas trop d'os de chaque continent. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_TRANSFORM_FOSSILS_TO_BONES_TRANSFORMABLE_DINOSAUR_BONE_TRIGGER: "#default_text [GetPlayer.GetName] a déjà #V au moins 1#! [concept_dubois_dinosaur_bone] et #V n'a pas tous les os nécessaires de chaque continent encore #!.#!"
 MR_TRANSFORM_FOSSILS_TO_BONES_FOSSILS_TRIGGER: "#default_text [GetPlayer.GetName] a #V 20 ou plus #! [Concept('concept_dubois_fossil','$concept_dubois_fossils$')].#!"
 MR_TRANSFORM_FOSSILS_TO_BONES_PALEONTOLOGIST_TRIGGER: "#default_text [GetPlayer.GetName] a un [concept_dubois_paleontologist] expérimenté ou célèbre qui n'est pas occupé en ce moment.#!"
 MR_EXTINCTION_CONGRESS_BUTTON: "Congrès d'extinction"
 MR_EXTINCTION_CONGRESS_BUTTON_TT: "#T Extinction Congress#!\nOne des mystères les plus déroutants de l'histoire naturelle reste la disparition des dinosaures. Le père de la paléontologie, Georges Cuvier, a découvert qu'il y avait eu une extinction de masse à la fin de la période du Crétacé au cours de laquelle les dinosaures ont également disparu. Mais comment les désirs des lézards, qui ont dominé la Terre pendant des millions d'années, sont-ils soudainement devenus obsolètes? \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_HAS_PALEONTOLOGIST_TRIGGER_TT: "#default_text [GetPlayer.GetName] a un [concept_dubois_paleontologist].#!"
 MR_EXTINCTION_CONGRESS_15_PALEONTOLOGISTS_TRIGGER_TT: "#default_text 15 pays ont un [concept_dubois_paleontologist]#!"
 MR_EXTINCTION_CONGRESS_HAS_DINOSAUR_SKELETON_TRIGGER_TT: "#default_text [GetPlayer.GetName] a au moins #p 1#! @dubois_dinosaur_skeleton! [concept_dubois_dinosaur_skeleton].#!"
 MR_EXTINCTION_CONGRESS_5_COUNTRIES_DINOSAUR_SKELETON_TRIGGER_TT: "#default_text Au moins #V 5 pays#! ont au moins #p 1#! @dubois_dinosaur_skeleton! [concept_dubois_dinosaur_skeleton].#!"
 MR_EXTINCTION_CONGRESS_GLOBAL_FOSSIL_TT: "#default_text au moins #V 500#! @dubois_fossile! [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] ont été trouvés dans le monde entier (actuellement [GetGlobalVariable('dubois_global_fossil').GetValue|+0] @dubois_fossile! Ont été trouvés) #!"
