 MR_BEETHOVEN_MONUMENT_BUTTON: "Construisez le monument Beethoven"
 MR_BEETHOVEN_MONUMENT_BUTTON_TT: "#T Build the Beethoven Monument#!\nThere est sans aucun doute que Ludwig Van Beethoven était le plus grand compositeur de tous les temps et que toute la musique romantique est une excroissance de son travail. Chaque artiste contemporain lui doit un hommage. Il est d'autant plus étonnant qu'il soit encore trop peu apprécié. Après un appel de Robert Schumann, cependant, plusieurs associations, villes, princes et gouvernements ont collecté de l'argent pour ériger un mémorial dans son lieu de naissance Bonn. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
