 MR_FOSSIL_IDENTIFICATION_BUTTON_TT: "#T Identifier les fossiles#!\nAn [concept_andersson_anthropologist] a la capacité d'analyser un os inconnu au fil du temps et de les attribuer à une espèce humaine ou pré-humaine spécifique. S'il parvient à attribuer trois os à la même espèce, il peut systématiser avec succès cette espèce. Le temps nécessaire pour identifier correctement un os dépend de l'expérience de l'anthropologue. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
