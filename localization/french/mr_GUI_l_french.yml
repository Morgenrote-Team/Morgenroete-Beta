 MR_ARCHAEOLOGY_5_COUNTRIES_WITH_ARCHAEOLOGIST_TRIGGER_TT: "#default_text 5 pays ou plus ont un [concept_lepsius_archaeologist].#!"
 MR_ARCHAEOLOGY_10_COUNTRIES_WITH_ARCHAEOLOGIST_TRIGGER_TT: "#default_text 10 pays ou plus ont un [concept_lepsius_archaeologist].#!"
 MR_ARCHAEOLOGY_15_COUNTRIES_WITH_ARCHAEOLOGIST_TRIGGER_TT: "#default_text 15 pays ou plus ont un [concept_lepsius_archaeologist].#!"
 MR_UPPER_EGYPT_EXPEDITION_TT: "#T Envoyez une expédition dans la vallée des Kings#!\nWith The Old Capital Thèbes et la vallée des Kings, la Haute-Égypte est considérée comme la Mecque de l'Égyptologie. Nous devons acquérir une licence d'excavation pour la région et rechercher des trésors égyptiens. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_EGYPT_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text #V Lepsius a écrit une lettre à Rosellini#! qui a commencé l'archéologie en Égypte.#!"
 MR_UPPER_EGYPT_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text [GetPlayer.GetName] #V n'est pas actuellement financée#! un [concept_lepsius_expedition] à la haute Égypte.#!"
 MR_UPPER_EGYPT_EXPEDITION_ACCESS_TRIGGER_TT: "#default_text [GetPlayer.GetName] #V est propriétaire de l'état de l'Egypte supérieure_3 ou a un [concept_lepsius_excavation_licence] avec son propriétaire.#!"
 MR_LOWER_EGYPT_EXPEDITION_TT: "#T Envoyez une expédition aux Pyramides#!\nSince Le début des temps, les pyramides égyptiennes ont fasciné l'humanité. On dit que d'autres tombes, temples et même des villes qui ont disparu dans les sables de la Basse Égypte attendent d'être redécouverts. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_LOWER_EGYPT_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text [GetPlayer.GetName] #V n'est pas actuellement financée#! un [concept_lepsius_expedition] à la baisse de l'Egypte.#!"
 MR_LOWER_EGYPT_EXPEDITION_ACCESS_TRIGGER_TT: "#default_text [GetPlayer.GetName] #V est propriétaire de l'état de la basse Égypte#! ou a un [concept_lepsius_excavation_licence] avec son propriétaire.#!"
 MR_BABYLONIA_EXPEDITION_TT: "#T Envoyez une expédition au berceau de la civilisation#!\nBabylonia, La partie sud de la Mésopotamie, doit son nom à la ville autrefois puissante de Babylone. La région est considérée comme le «berceau de la civilisation» où de précieux artefacts archéologiques sont découverts encore et encore. Ils appartiennent définitivement à un musée. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MESOPOTAMIA_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text #V La langue akkadienne a été déchiffrée#!, permettant l'archéologie en Mésopotamie.#!"
 MR_BABYLONIA_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text [GetPlayer.GetName] #V n'est pas actuellement financier #! un [concept_lepsius_expedition] à babylonia.#!"
 MR_BABYLONIA_EXPEDITION_ACCESS_TRIGGER_TT: "#default_text [GetPlayer.GetName] #V est propriétaire de l'état de Baghdad#! ou a un [concept_lepsius_excavation_licence] avec son propriétaire.#!"
 MR_ASSYRIA_EXPEDITION_TT: "#T Envoyer une expédition dans les jardins d'Assyria#!\nAssyria fait référence à la partie nord de la Mésopotamie avec les deux villes importantes d'Assur et Nineveh. Les connaissances clairsemées sur le pays peuvent encore être retracées à la Bible en tant que source - mais peut-être qu'il existe des preuves historiques qui sont plus fiables? \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ASSYRIA_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text [GetPlayer.GetName] #V n'est pas actuellement financée#! un [concept_lepsius_expedition] à Assyria.#!"
 MR_ASSYRIA_EXPEDITION_ACCESS_TRIGGER_TT: "#default_text [GetPlayer.GetName] #V est propriétaire de l'état de Mossul#! ou a un [concept_lepsius_excavation_licence] avec son propriétaire.#!"
 MR_ARGOLIS_EXPEDITION_TT: "#T Envoyez une expédition à la ville d'Agamemnon #!\nAfter La découverte de Troy, même les scientifiques sceptiques se rendent compte que les mythes des anciens Grecs sont plus que de simples contes de fées. On dit que les restes des villes de l'âge du bronze se trouvent à Argolis à ce jour, dont les plus connus sont Mycenae. Nous devons nous convaincre de cela. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GREECE_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text #V Schliemann a découvert Troy#!, autorisant l'archéologie en Grèce.#!"
 MR_ARGOLIS_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text [GetPlayer.GetName] #V n'est pas actuellement financée#! un [concept_lepsius_expedition] à Argolis.#!"
 MR_ARGOLIS_EXPEDITION_ACCESS_TRIGGER_TT: "#default_text [GetPlayer.GetName] #V est propriétaire de l'état de peloponnese#! ou a un [concept_lepsius_excavation_licence] avec son propriétaire.#!"
 MR_CRETE_EXPEDITION_TT: "#T Envoyer une expédition aux palais de Crete#!\nThe Le légendaire roi Minos aurait une fois régné sur la Crète. Semblable à Troy et Mycenae, il semble également y avoir quelque chose dans cette histoire: des artefacts de la culture minoenne légendaire se trouvent de plus en plus sur l'île. Notre nation devrait également en obtenir quelques-uns. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_CRETE_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text [GetPlayer.GetName] #V n'est pas actuellement financier #! un [concept_lepsius_expedition] à Crete.#!"
 MR_CRETE_EXPEDITION_ACCESS_TRIGGER_TT: "#default_text [GetPlayer.GetName] #V est propriétaire de l'état de Crète#! ou a un [concept_lepsius_excavation_licence] avec son propriétaire.#!"
 MR_YUCATAN_EXPEDITION_TT: "#T Envoyez une expédition aux villes perdues du Maya#!\nReports des villes inconnues et énormes au milieu de la jungle ont augmenté. Nous devons enquêter davantage et envoyer une expédition archéologique au Yucatán. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_YUCATAN_EXPEDITION_DISCOVERED_TRIGGER_TT: "#default_text #V Stephens & Catherwood a entrepris une expédition #!, permettant l'archéologie dans le yucatán.#!"
 MR_YUCATAN_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text [GetPlayer.GetName] #V n'est pas actuellement financée#! un [concept_lepsius_expedition] à yucatán.#!"
 MR_YUCATAN_EXPEDITION_ACCESS_TRIGGER_TT: "#default_text [GetPlayer.GetName] #V est propriétaire de l'état du yucatán#! ou a un [concept_lepsius_excavation_licence] avec son propriétaire.#!"
 MR_PERU_EXPEDITION_TT: "#T Envoyez une expédition pour rechercher l'héritage caché de l'incas#!\nPilots Rapport étranges forteresses et structures murales dans les Andes qu'ils ont vues sur leurs vols au-dessus du Pérou. Peut-être que les Espagnols n'ont pas complètement détruit la culture des Incas? Certaines villes de résistance indigène n'ont pas été trouvées à ce jour. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PERU_EXPEDITION_DISCOVERED_TRIGGER_TT: "#default_text #V Bingham a découvert Machu Picchu#!, autorisant l'archéologie au Pérou.#!"
 MR_PERU_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text [GetPlayer.GetName] #V n'est pas actuellement financée#! un [concept_lepsius_expedition] à Pérou.#!"
 MR_PERU_EXPEDITION_ACCESS_TRIGGER_TT: "#default_text [GetPlayer.GetName] #V est propriétaire de l'état de $STATE_ICA$#! ou a un [concept_lepsius_excavation_licence] avec son propriétaire.#!"
 MR_EXODUS_CONGRESS_BUTTON: "Congrès sur l'Exode"
 MR_EXODUS_CONGRESS_BUTTON_TT: "#T Congrès sur l'Exodus#!\nWith L'augmentation des recherches sur l'Égypte et le Levant, la question de l'historicité des événements bibliques se pose à nouveau. En particulier, la non-menttion de l'Exode, c'est-à-dire le départ des Hébreux d'Egypte, a soulevé la question de savoir si les cinq livres de Moïse ne sont pas seulement de simples inventions. Les radicaux exigent même que toutes les histoires bibliques soient complètement ignorées. Un autre groupe soutient que les histoires de la Bible ne peuvent pas être prises littéralement, mais elles ont une valeur scientifique. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_EXODUS_CONGRESS_EGYPTIAN_ARTIFACTS_TT: "#default_text [GetPlayer.GetName] a besoin au moins #V 25#! @Lepsius_Egypt_minor! Égyptien [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] (actuellement [GetPlayer.MakeScope.Var('lepsius_egyptian_artifact_minor').GetValue|0+]) .#!"
 MR_EXODUS_CONGRESS_GLOBAL_ARTIFACTS_TT: "#default_text au moins #V 150#! @Lepsius_Egpt_minor! [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] ont été trouvés dans le monde entier (actuellement [GetGlobalVariable('lepsius_global_artifacts').GetValue|+0] @lepsius_egypt_minor! Ont été trouvés) .#!"
 MR_CIVILIZATION_CONGRESS_BUTTON: "Congrès sur la civilisation"
 MR_CIVILIZATION_CONGRESS_BUTTON_TT: "#T Congrès sur la montée en puissance de la civilisation#!\nFor siècles. Mais avec l'augmentation quotidienne des découvertes de l'Assyrie et de la Babylonie, cette théorie a été clairement ébranlée. Il s'avère plutôt que l'écriture a été apparemment inventée en Mésopotamie - tout comme de nombreuses autres réalisations qui accompagnaient le début de la civilisation. Est-il peut-être le cas que chaque civilisation a finalement émergé de Babylone - et que chaque forme de religion dérive des mythes babyloniens? L'épopée de Gilgamesh est-elle peut-être l'inspiration pour tous les types de littérature - de la Bible aux épopées homériques? \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_CIVILIZATION_CONGRESS_MESOPOTAMIAN_ARTIFACTS_TT: "#default_text [GetPlayer.GetName] a besoin au moins #V 25#! @Lepsius_Mesopotamia_Minor! Mesopotamien [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] (actuellement [GetPlayer.MakeScope.Var('lepsius_mesopotamian_artifact_minor').GetValue|0+]) .#!"
 MR_CIVILIZATION_CONGRESS_GLOBAL_ARTIFACTS_TT: "#default_text au moins #V 300#! @Lepsius_Mesopotamia_minor! [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] ont été trouvés dans le monde entier (actuellement [GetGlobalVariable('lepsius_global_artifacts').GetValue|+0] @lepsius_mesopotamia_minor! Ont été trouvés) .#!"
 MR_TROY_CONGRESS_BUTTON: "Congrès sur Troy"
 MR_TROY_CONGRESS_BUTTON_TT: "#T Congrès sur Troy#!\nSchliemann a trouvé Troy. C'est du moins ce qu'il prétend. Bien que les voix critiques qui considéraient Troy comme une simple invention aient diminué, toute une série de questions reste sans réponse. Le Troy est-il trouvé par Schliemann le Homérique Troy? Et qu'est-ce que Troy était de toute façon? Un certain nombre d'universitaires restent sceptiques. Et les nouvelles découvertes d'Anatolie pourraient jetter un tout nouveau éclairage sur les découvertes. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_TROY_CONGRESS_AEGEAN_ARTIFACTS_TT: "#default_text [GetPlayer.GetName] a besoin au moins #V 25#! @Lepsius_aegean_minor! Aegean [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] (actuellement [GetPlayer.MakeScope.Var('lepsius_aegean_artifact_minor').GetValue|0+]) .#!"
 MR_TROY_CONGRESS_GLOBAL_ARTIFACTS_TT: "#default_text au moins #V 300#! @Lepsius_aegean_minor! [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] ont été trouvés dans le monde entier (actuellement [GetGlobalVariable('lepsius_global_artifacts').GetValue|+0] @Lepsius_aegean_minor! Ont été trouvés) .#!"
 MR_INSPECT_EXCAVATION_BUTTON: "Inspecter l'excavation"
 MR_INSPECT_EXCAVATION_BUTTON_TT: "#T Inspecter l'excavation#!\nWe peut envoyer un archéologue expérimenté dans une zone où nous fouillons pour intensifier nos efforts là-bas. Notre archéologue ouvrira un nouveau site d'excavation en environ un an et effectuera des recherches intensives, au cours desquelles nous pouvons trouver d'autres indications de découvertes archéologiques majeures auparavant inconnues. Le succès dépend en grande partie de l'expérience de notre archéologue. L'établissement d'une société archéologique augmente également nos chances. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_INSPECT_EXCAVATION_TRIGGER_TT: "#default_text [GetPlayer.GetName] a #V au moins un [concept_lepsius_excavation]#! en cours dans une zone où aucune découverte archéologique majeure n'a été faite.#!"
 MR_INSPECT_EXCAVATION_ARTIFACT_FOR_DISCOVERY_TRIGGER_TT: "#default_text [GetPlayer.GetName] doit avoir #V étudié au moins 30 [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')]#! dans une région spécifique avant de rechercher des indices là-bas.#!"
 MR_CANCEL_EXCAVATION_BUTTON: "Annuler l'excavation"
 MR_CANCEL_EXCAVATION_BUTTON_TT: "#T Annuler l'excavation#!\nIn Certaines situations Il peut être utile de rappeler une équipe d'excavation. Nos artefacts et collections acquis resteront, mais notre fouille permanente prendra fin. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ARCHAEOLOGY_ON_ARCHAEOLOGICAL_EXCAVATION_TRIGGER_TT: "#default_text [GetPlayer.GetName] a au moins #V 1#! [Concept('concept_lepsius_archaeological_team','$concept_lepsius_excavation_team$')] faire un [concept_lepsius_excavation].#!"
 MR_LOCAL_EXCAVATION_BUTTON: "Fouille locale"
 MR_LOCAL_EXCAVATION_BUTTON_TT: "#T Excavation locale Treasures n'attend pas seulement d'être découverte loin. Bien que les fouilles locales soient considérées comme moins prestigieuses que la recherche des artefacts célèbres, il donne un aperçu de l'ère principalement préhistorique de notre région d'origine. Contrairement aux fouilles après une expédition, les fouilles locales ne peuvent pas être terminées tant que le financement s'épuise. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ARCHAEOLOGICAL_MUSEUM_BUILDING_TRIGGER_TT: "#default_text [GetPlayer.GetName] a un [GetBuildingType('building_lepsius_archaeological_museum').GetName].#!"
 MR_LITERACY_RATE_33_TRIGGER_TT: "#default_text [GetPlayer.GetName] a un [concept_literacy] #V Taux 33% #! ou supérieur.#!"
