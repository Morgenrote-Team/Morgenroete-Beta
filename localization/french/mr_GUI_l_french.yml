 MR_IMPRESSIONISM_BUTTON: "Impressionnisme"
 MR_IMPRESSIONISM_BUTTON_TT: "#T Choisissez l'impressionism#!\n[concept_elgar_impressionism] est un style de l'histoire de l'art qui se caractérise par la représentation atmosphérique des instantanés éphémères d'une scène. Il est sorti d'un mouvement dans la peinture en France dans la seconde moitié du XIXe siècle. Le terme impressionnisme a également été appliqué à certains styles de musique, de littérature, de cinéma et de photographie. Alors que de nombreux naturalistes tels que Heinrich Hart ont rejeté la musique comme un moyen d'exprimer un «actionnisme en recherche de vérité», les impressionnistes considéraient souvent le `` rêver sans objet à venir '' à des accords colorés finement diplômés comme un plaisir. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_POWERFUL_LANDOWNERS_TRIGGER_TT: "#default_text Les [GetPlayer.GetAdjective] [GetInterestGroupVariant('ig_landowners',GetPlayer).GetName] sont [concept_powerful].#!"
 MR_NOT_POWERFUL_INTELLIGENTSIA_TRIGGER_TT: "#default_text Le [GetPlayer.GetAdjective] [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName] n'est pas [concept_powerful].#!"
 MR_HAPPY_INTELLIGENTSIA_TRIGGER_TT: "#default_text Le [GetPlayer.GetAdjective] [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName] a un [concept_approval] de #V 5 ou plus"
 MR_EXPRESSIONISM_BUTTON: "Expressionnisme"
 MR_EXPRESSIONISM_BUTTON_TT: "#T Choisissez Expressionism#!\n[concept_elgar_expressionism] est un style d'art. Ses débuts et ses précurseurs se trouvent à la fin du XIXe siècle. Comme l'impressionnisme, le symbolisme et le fauvisme, l'expressionnisme est un mouvement contre les tendances du naturalisme. Dans l'expressionnisme, le niveau expressif l'emporte sur le niveau esthétique, appelant et factuel. L'artiste veut représenter son expérience pour le spectateur. Contrairement à l'impressionnisme musical, qui décrit la perception de l'apparence externe des choses, les mouvements d'art expressionniste formulent les émotions de l'âme humaine. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_POWERFUL_INTELLIGENTSIA_OR_TRADE_UNIONS_TRIGGER_TT: "#default_text soit le [GetPlayer.GetAdjective] [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName] ou [GetInterestGroupVariant('ig_trade_unions',GetPlayer).GetName] sont [concept_powerful].#!"
 MR_NOT_POWERFUL_LANDOWNERS_TRIGGER_TT: "#default_text Les [GetPlayer.GetAdjective] [GetInterestGroupVariant('ig_landowners',GetPlayer).GetName] ne sont pas [concept_powerful].#!"
