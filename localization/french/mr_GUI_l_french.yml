 MR_NEWSPAPER_NOVEL_BUTTON_NO_WRITER_EFFECT_TT: "Votre [concept_manzoni_national_writer] devient #V occupé#! et écrit un roman de journal."
 MR_READING_TOUR_BUTTON: "Tournée en lecture"
 MR_READING_TOUR_BUTTON_TT: "#T Envoyer un écrivain sur un écrivain de lecture Tour#!\nAn internationalement reconnu qui est en contact avec des éditeurs étrangers peut augmenter la propre renommée du pays s'il fait une tournée de lecture. Cela ne favorisera pas seulement les relations mutuelles, mais aussi sa réputation. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
