 MR_GEOLOGIST_ORE_VEIN_BUTTON_TT: "#T Prospect Ore#!\nA [concept_agassiz_geologist] can search for new raw material deposits near already established mines and thus increase the production of the ore.\n\nThe building would gain the $agassiz_building_production_mult_modifier_with_tooltip$ [concept_modifier]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GEOLOGIST_ORE_VEIN_STOP_BUTTON_TT: "#T Stop Prospecting Ore#!\nA Votre [concept_agassiz_geologist] recherche actuellement de nouveaux dépôts de matières premières près des mines déjà établies et augmentant ainsi la production du minerai. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GEOLOGIST_OIL_BUTTON_TT: "#T Prospect Oil#!\nA [concept_agassiz_geologist] can search for new oil wells near already established oil rigs and thus increase production.\n\nThe building would gain the $agassiz_building_production_2_mult_modifier_with_tooltip$ [Concept('concept_modifier','$concept_modifiers$')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 VISIT_OBSERVATORY_BUTTON: "Visiter le planétarium"
 VISIT_OBSERVATORY_BUTTON_TT: "#T Visit the Planetarium#!\nThe Planetarium offers you an overview of the astronomical knowledge of your country, other countries and the scientific community."
 MR_SELL_MINERALS_FOR_RARE_MINERAL_BUTTON_TT: "#T Vendre des minéraux pour les minéraux rares #!\nA [concept_agassiz_geologist] peut acheter [Concept('concept_agassiz_rare_mineral','$concept_agassiz_rare_minerals$')] auprès de collègues, collectionneurs et autres passionnés géologiques. Pour cela, il doit échanger une quantité considérable de minéraux communs. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GEOLOGIST_PALEONTOLOGIST_SYMPOSIUM_BUTTON: "Symposium interdisciplinaire"
 MR_GEOLOGIST_PALEONTOLOGIST_SYMPOSIUM_BUTTON_TT: "#T Symposium géologique-paleontologique #!\nThe Les intersections entre la géologie et la paléontologie sont importantes. Nous devons rassembler les luminaires dans le domaine et utiliser les synergies qui découlent de cet échange pour créer de nouvelles théories scientifiques sur l'histoire de la Terre. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTING_GEOLOGIST_TT: "#T Promouvoir les géologues #!\n#p Vous faites actuellement la promotion du géologue.#!\n[Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')] Mineraux d'étude, volcans et autres formations géologiques."
