 MR_AERONAUTICAL_ENGINEER_SPEED_AIRPLANE_BUTTON: "Avion à grande vitesse"
 MR_AERONAUTICAL_ENGINEER_SPEED_AIRPLANE_BUTTON_TT: "#T Aircraft à grande vitesse #!\nOur L'ingénieur aéronautique peut construire un avion à grande vitesse pour briser l'enregistrement existant. Pour construire l'avion le plus rapide du monde, vous avez besoin non seulement d'un ingénieur mais aussi d'un pilote pour piloter l'avion. Le succès dépend de l'expérience de l'ingénieur et du pilote, ainsi que des technologies avancées. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_AERONAUTICAL_ENGINEER_NO_RECORD_TECH_TRIGGER_TT: "#default_text [GetPlayer.GetName] Est-ce que #R not#! tient actuellement l'enregistrement de vitesse #V #!.#!"
