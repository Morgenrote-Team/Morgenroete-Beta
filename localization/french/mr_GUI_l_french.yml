 MR_CHEMIST_SYNTHETIC_RUBBER_BUTTON_TT: "#T Synthétique Rubber#!\nRubber est limité à une très petite zone climatique. Sans colonies ni importations, il n'est guère possible d'obtenir cette précieuse matière première. Mais peut-être que les possibilités de la chimie peuvent compenser ce qui nous manque ailleurs? \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
