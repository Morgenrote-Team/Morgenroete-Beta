 AEGEAN_MINOR_VAR_TT: "#header Minor Aegean [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')]#!\n[GetPlayer.GetName] has collected @lepsius_aegean_minor! [GetPlayer.MakeScope.Var('lepsius_aegean_artifact_minor').GetValue|V0] Minor Aegean [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')]"
