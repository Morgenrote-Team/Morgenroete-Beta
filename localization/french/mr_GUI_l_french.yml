 MR_PALEONTOLOGICAL_EXPEDITION_RECALL_BUTTON: "Rappeler l'expédition paléontologique"
 MR_PALEONTOLOGICAL_EXPEDITION_RECALL_BUTTON_TT: "#T Rappeler l'expédition paléontologique#!\nOrders le paléontologue de son enquête paléontologique pour d'autres utilisations - comme la construction ou la rénovation des squelettes de dinosaures. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNT_SKELETON_BUTTON: "Construire un squelette de dinosaure"
 MR_MOUNT_SKELETON_BUTTON_TT: "#T Construire un dinosaure squelette#!\nYour [concept_dubois_paleontologist] peut construire un nouveau [concept_dubois_dinosaur_skeleton] avec 5 [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] du même continent. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
