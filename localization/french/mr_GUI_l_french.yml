 MR_MEDICAL_CONGRESS_BUTTON_TT: "#T Congrès médical hôte #!\nWith La révolution dans la recherche médicale et la propagation simultanée des épidémies dangereuses, la nécessité de partager des découvertes lors de congrès internationaux au profit de l'humanité a augmenté. Avec un peu de chance, les connaissances sur les descriptions de maladies, les agents pathogènes, les traitements de la maladie et les vaccins peuvent être échangées. Les médecins dominent l'événement, mais les microbiologistes sont également présents. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
