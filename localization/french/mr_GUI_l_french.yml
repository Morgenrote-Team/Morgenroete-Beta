 MR_GEOLOGIST_GEOLOGICAL_RESEARCH_BUTTON_TT: "#T Geological Research#!\nA geologist can travel the country to conduct Geological Research. In this way he can also find geological formations, caves or (later) even uranium. Geologists who have the Mineralogist trait double the number of minerals acquired annually.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
