 MR_MILITARY_ENGINEER_ADVANCED_WEAPONS_BUTTON: "Fusils avancés"
 MR_MILITARY_ENGINEER_ADVANCED_WEAPONS_BUTTON_TT: "#T Develop Advanced Rifles#!\nLet your [concept_tesla_engineer] focus on developing advanced rifles. This will allow you to use a new [concept_mobilization_option] or raise its tier. This project will add #n expenses#! to your country.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MILITARY_ENGINEER_ADVANCED_TANKS_BUTTON: "Chars avancés"
 MR_MILITARY_ENGINEER_ADVANCED_TANKS_BUTTON_TT: "#T Develop Advanced Tanks#!\nLet your [concept_tesla_engineer] focus on developing advanced tanks. This will allow you to use a new [concept_mobilization_option] or raise its tier. This project will add #n expenses#! to your country.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MILITARY_ENGINEER_ADVANCED_DEFENCE_BUTTON: "Fieldworks avancé"
 MR_MILITARY_ENGINEER_ADVANCED_DEFENCE_BUTTON_TT: "#T Develop Advanced Fieldworks#!\nLet your [concept_tesla_engineer] focus on developing advanced fieldwork techniques. This will allow you to use a new [concept_mobilization_option] or raise its tier. This project will add #n expenses#! to your country.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ELECTRICAL_ENGINEER_RESEARCH_BUTTON: "Recherche électrique"
 MR_ELECTRICAL_ENGINEER_MAGNETIC_RESEARCH_STATION_BUTTON: "Rejoignez l'association géomagnétique"
 MR_ELECTRICAL_ENGINEER_MAGNETIC_RESEARCH_STATION_BUTTON_TT: "#T Rejoignez l'association géomagnétique#!\nJoining L'association magnétique à Göttingen est une exigence obligatoire pour commencer nos recherches dans le domaine du magnétisme terrestre et pour mettre en place un observatoire géomagnétique. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ELECTRICAL_ENGINEER_TELEGRAPH_BUTTON: "Réseau télégraphique"
 MR_ELECTRICAL_ENGINEER_TELEGRAPH_BUTTON_TT: "#T Établir un réseau télégraphique#!\nTelegraphy révolutionne les communications d'un pays, l'amélioration des services et des infrastructures dans les régions où un réseau télégraphique existe. Le câblage d'une nation devient plus difficile, plus le pays est grand. Les poteaux télégraphiques ne peuvent être construits que dans un État dont l'État voisin a également un poteau télégraphique. Pour le télégraphe à l'étranger, le télégraphe électrique et l'électromagnétisme sont nécessaires pour poser des câbles sous-marins. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ELECTRICAL_ENGINEER_TELEGRAPH_RAILWAY_CAPITAL_TRIGGER_TT: "#default_text [GetPlayer.GetName] a un [GetBuildingType('building_railway').GetName] dans la capitale.#!"
 MR_ELECTRICAL_ENGINEER_TELEGRAPH_RAILWAY_65_PERCENT_TRIGGER_TT: "#default_text [GetPlayer.GetName] a un [GetBuildingType('building_railway').GetName] en #p 65% #! de tous les états.#!"
 MR_ELECTRICAL_ENGINEER_RADIO_BUTTON: "Réseau de radio"
 MR_ELECTRICAL_ENGINEER_RADIO_BUTTON_TT: "#T Construisez une station de radio Network#!\nThe Le temps pour les câbles enchevêtrés ennuyeux est terminé! Avec l'invention de la technologie radio, les messages peuvent désormais être envoyés via l'antenne. Cela permet non seulement d'échanger des nouvelles, mais aussi d'établir des programmes radio. Avant cela, bien sûr, un réseau national de stations radio doit être configuré. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ELECTRICAL_ENGINEER_MAGNETIC_RESSOURCE_1_BUTTON: "Recherchez le dépôt de fer"
 MR_ELECTRICAL_ENGINEER_MAGNETIC_RESSOURCE_1_BUTTON_TT: "#T Recherche d'un dépôt de fer#!\nGeophysics et du géomagnétisme a de nombreuses utilisations pratiques. L'extraction en particulier a bénéficié de la découverte de dépôts possibles. Les grandes entreprises ont utilisé des connaissances géophysiques pour localiser des dépôts auparavant inconnus de fer, de plomb et de pétrole. Avec les bonnes technologies et la cartographie du champ magnétique de la Terre, il devrait être facile de faire un usage productif des connaissances théoriques actuelles. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ELECTRICAL_ENGINEER_OBSERVATORY_WITH_MAGNETIC_OBSERVATORY_TRIGGER_TT: "#default_text [GetPlayer.GetName] a un [GetBuildingType('building_verrier_observatory').GetName] avec l'Observatoire géomagnétique #V#! [concept_production_method].#!"
 MR_ELECTRICAL_ENGINEER_MAGNETIC_RESSOURCE_2_BUTTON: "Dépôt de plomb de recherche"
 MR_ELECTRICAL_ENGINEER_MAGNETIC_RESSOURCE_2_BUTTON_TT: "#T Recherche d'un dépôt de plomb#!\nGeophysics et du géomagnétisme a de nombreuses utilisations pratiques. L'extraction en particulier a bénéficié de la découverte de dépôts possibles. Les grandes entreprises ont utilisé des connaissances géophysiques pour localiser des dépôts auparavant inconnus de fer, de plomb et de pétrole. Avec les bonnes technologies et la cartographie du champ magnétique de la Terre, il devrait être facile de faire un usage productif des connaissances théoriques actuelles. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ELECTRICAL_ENGINEER_MAGNETIC_RESSOURCE_3_BUTTON: "Recherchez le dépôt d'huile"
 MR_ELECTRICAL_ENGINEER_MAGNETIC_RESSOURCE_3_BUTTON_TT: "#T Recherche d'un dépôt d'huile #!\nGeophysics et du géomagnétisme a de nombreuses utilisations pratiques. L'extraction en particulier a bénéficié de la découverte de dépôts possibles. Les grandes entreprises ont utilisé des connaissances géophysiques pour localiser des dépôts auparavant inconnus de fer, de plomb et de pétrole. Avec les bonnes technologies et la cartographie du champ magnétique de la Terre, il devrait être facile de faire un usage productif des connaissances théoriques actuelles. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
