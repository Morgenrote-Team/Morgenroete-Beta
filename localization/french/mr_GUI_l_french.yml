 MR_AERONAUTICAL_ENGINEER_GIANT_ZEPPELIN_BUTTON_TT: "#T Le voyage géant Zeppelin#!\nAirship a atteint son apogée. Notre nation est considérée comme le lieu de naissance des Zeppelins les plus grands et les plus morne du monde. Il est temps d'étonner le monde entier avec un gigantesque dirigeable et de parcourir le globe. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_AERONAUTICAL_ENGINEER_AIRLINE_LEVEL_4_TRIGGER_TT: "#default_text [GetPlayer.GetName] a un [concept_curtiss_airline] de niveau #V 4 ou supérieur#!.#!"
 MR_AERONAUTICAL_ENGINEER_ZEPPELIN_FOCUS_TRIGGER_TT: "#default_text [GetPlayer.GetName] a le #V \ \"$curtiss_zeppelin_focus_modifier$ \" #! [concept_modifier].#!"
 MR_AERONAUTICAL_ENGINEER_GIANT_AIRPLANE_BUTTON: "Avion géant"
 MR_AERONAUTICAL_ENGINEER_GIANT_AIRPLANE_BUTTON_TT: "#T Giant Airplane#!\nThe Sky est la dernière limite. Ce qui était autrefois l'âge de la découverte au début de la période moderne est maintenant la conquête du ciel. Mais par rapport aux galions des Espagnols, les navires célestes d'aujourd'hui ne sont que des brefs. Les géants de l'océan naviguent dans les mers aujourd'hui, mais le ciel n'a jusqu'à présent été dominé que par les petites machines. Le rêve de construire un gigantesque avion qui peut transporter non pas des dizaines, mais des centaines de personnes semblent utopiques. Mais une industrie des avions florissante et une puissante compagnie aérienne dirigée par l'homme droit pourraient bouleverser le monde ... \ n \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_AERONAUTICAL_ENGINEER_PRIVATE_AIRLINE_TRIGGER_TT: "#default_text [GetPlayer.GetName] a un [Concept('concept_curtiss_airline','$concept_curtiss_private_airline$')].#!"
