 MR_ASTRONOMER_DISCOVER_SATELLITES_BUTTON_TT: "#T Découvrez les nouveaux satellites #!\nMany Les planètes du système solaire ont encore inconnu [Concept('concept_verrier_satellite','$concept_verrier_satellites$')] similaire à la lune de la Terre. Selon le niveau de technologie, les méthodes de production de notre observatoire et les compétences de l'astronome, la possibilité de trouver un compagnon planétaire auparavant complètement inconnu peut survenir. Cependant, un astronome trouvera moins d'objets astronomiques s'il recherche de nouveaux satellites. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
