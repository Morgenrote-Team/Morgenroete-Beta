 MR_PHYSICIAN_DESCRIBE_DISEASE_BUTTON_TT: "#T Disection Description#!\nA Le médecin peut décrire une maladie auparavant non décrite dans des détails scientifiques si elle fait rage comme une épidémie sur le territoire national. Il s'agit d'une étape préliminaire importante dans le développement d'une méthode de traitement ultérieure. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PHYSICIAN_DESCRIBE_DISEASE_ACTIVE_TT: "#T Disease Description#!\n#p Votre $concept_panum_physician$ travaille actuellement sur une première description d'une maladie.#!\nA Le médecin peut décrire une maladie auparavant non décrite dans des détails plus scientifiques s'il fait rage comme une épidémie sur le territoire national. Il s'agit d'une étape préliminaire importante dans le développement d'une méthode de traitement ultérieure."
 MR_ACTIVE_PHYSICIAN_TRIGGER: "#default_text [GetPlayer.GetName] a un [concept_panum_physician] qui est #V pas occupé#!.#!"
 MR_PHYSICIAN_CAN_DESCRIBE_LOCAL_DISEASE_TRIGGER_TT: "#default_text [GetPlayer.GetName] souffre d'une maladie épidémique qui n'a pas encore été entièrement décrite.#!"
 MR_PHYSICIAN_DESCRIBE_DISEASE_FOREIGN_BUTTON_TT: "#T Expédition d'observation médicale #!\nA Le médecin peut entreprendre une expédition dans un pays lointain où une épidémie fait rage et y décrit la maladie. Ce processus prend plus de temps qu'un diagnostic dans son propre pays. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PHYSICIAN_DESCRIBE_DISEASE_FOREIGN_ACTIVE_TT: "#T Expédition d'observation médicale#!\n#p Votre $concept_panum_physician$ est actuellement sur une expédition d'observation médicale.#!\nA Le médecin peut entreprendre une expédition dans un pays lointain où une épidémie fait rage et décrivez la maladie là-bas. Ce processus prend plus de temps qu'un diagnostic dans son propre pays."
 MR_PHYSICIAN_CAN_DESCRIBE_FOREIGN_DISEASE_TRIGGER_TT: "#default_text [GetPlayer.GetName] a un intérêt pour un pays qui souffre d'une maladie épidémique qui n'a pas encore été entièrement décrite.#!"
 MR_PHYSICIAN_FIND_TREATMENT_BUTTON_TT: "#T Traitement de la maladie#!\nA Le médecin peut trouver un traitement pour une maladie qui fait rage comme une épidémie sur le territoire national. Bien que le traitement n'empêche pas la maladie, il limitera considérablement son effet. Pour certaines maladies, des recherches sur une technologie spécifique sont nécessaires avant qu'une méthode de traitement puisse être trouvée. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PHYSICIAN_FIND_TREATMENT_ACTIVE_TT: "#T Traitement de la maladie#!\n#p Votre $concept_panum_physician$ recherche un traitement pour une maladie.#!\nA Le médecin peut trouver un traitement pour une maladie qui fait rage comme une épidémie sur le territoire national. Bien que le traitement n'empêche pas la maladie, il limitera considérablement son effet. Pour certaines maladies, des recherches sur une technologie spécifique sont nécessaires avant une méthode de traitement."
 MR_PHYSICIAN_CAN_FIND_LOCAL_TREATMENT_TRIGGER_TT: "#default_text [GetPlayer.GetName] souffre d'une épidémie décrite mais pour laquelle il n'y a toujours pas de traitement et a également la technologie correspondante.#!"
 MR_PHYSICIAN_FIND_TREATMENT_FOREIGN_BUTTON_TT: "#T Expédition de recherche médicale#!\nA Le médecin peut entreprendre une expédition dans une terre lointaine où une épidémie fait rage et étudie la maladie là pour trouver un traitement. Ce processus prend plus de temps que dans son propre pays. Pour certaines maladies, des recherches sur une technologie spécifique sont nécessaires avant qu'une méthode de traitement puisse être trouvée. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PHYSICIAN_FIND_TREATMENT_FOREIGN_ACTIVE_TT: "#T Expédition de recherche médicale#!\n#p Votre $concept_panum_physician$ recherche un traitement pour une maladie.#!\nA Le médecin peut entreprendre une expédition dans un pays lointain où une épidémie fait rage et étudie la maladie là pour trouver un traitement. Ce processus prend plus de temps que dans son propre pays. Pour certaines maladies, des recherches sur une technologie spécifique sont nécessaires avant une méthode de traitement."
 MR_PHYSICIAN_CAN_FIND_FOREIGN_TREATMENT_TRIGGER_TT: "#default_text [GetPlayer.GetName] a un intérêt pour un pays qui souffre d'une maladie épidémique qui a été décrite mais pour laquelle il n'y a toujours pas de traitement et a également la technologie correspondante.#!"
