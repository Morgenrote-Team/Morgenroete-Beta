 panum_grays_anatomy_modifier: "Anatomie de Gray" #NT!
 panum_diagram_of_mortality_modifier: "Diagramme de mortalité" #NT!
 panum_cell_theory_modifier: "Théorie cellulaire" #NT!
 panum_anthropological_criminology_modifier: "Criminologie anthropologique" #NT!
  
 panum.2111.t: "Anatomie de [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting]" #NT!
 panum.2111.d: "Dans sa lutte contre les autorités locales pour étendre les soins médicaux, le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a découvert à quel point la formation des jeunes chirurgiens était médiocre. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] a donc écrit un ouvrage de référence pour mettre un terme à ce grief." #NT!
 panum.2111.f: "L'Anatomie du corps humain de Henry Gray, généralement appelé simplement Gray's Anatomy, est un livre sur l'anatomie humaine. Il est considéré comme un classique du sujet, en particulier dans les pays anglophones. La première édition est parue en 1858 en Grande-Bretagne et un an plus tard aux États-Unis sous le nom de Gray's Anatomy: Descriptive and Surgical." #NT!
 panum.2111.g: "Chaque étudiant devrait lire ce livre pendant sa formation." #NT!
 panum.2111.h: "L’application pratique est plus importante que l’enseignement." #NT!
 panum.2112.t: "Diagramme des causes de mortalité" #NT!
 panum.2112.d: "Lors de ses visites dans les hôpitaux militaires, le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a constaté combien peu de matériel statistique était utilisé pour sensibiliser les jeunes médecins au danger des maladies infectieuses sur le champ de bataille. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] a donc créé un grand nombre de diagrammes significatifs." #NT!
 panum.2112.f: "En raison d’une maladie contractée pendant la guerre de Crimée, Florence Nightingale ne pouvait pas se rendre compte par elle-même de la situation dans une caserne, un hôpital ou un hospice. Elle se concentra donc sur la collecte de données, leur préparation, leur analyse et en tira des conclusions. Les questionnaires étaient un outil important pour son travail et elle utilisait également les données existantes. Ils montraient entre autres de graves problèmes dans le domaine des soins de santé militaire. Dans son rapport au gouvernement britannique, Florence Nightingale a trouvé des mots clairs pour expliquer cela. Si 11 civils sur 1 000 mouraient chaque année, mais que 17, 19 et 20 soldats sur 1 000 de l’infanterie de ligne, de l’artillerie et des gardes stationnés en Angleterre mouraient, cela serait tout aussi criminel que de conduire 1 100 hommes chaque année dans la plaine de Salisbury et de les y abattre. Florence Nightingale est considérée comme l’une des pionnières de la préparation graphique de telles données." #NT!
 panum.2112.g: "Ces statistiques devraient être étudiées attentivement par les médecins sur le champ de bataille." #NT!
 panum.2112.h: "L’application pratique est plus importante que l’enseignement." #NT!
 panum.2113.t: "Omnis cellule et cellule" #NT!
 panum.2113.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a élargi la théorie cellulaire connue jusqu'à présent en y incluant le principe selon lequel chaque cellule naît d'une autre cellule et que les maladies naissent donc également de cellules malades. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] a décrit cette thèse en détail dans son ouvrage sur la pathologie cellulaire, qui est utilisé comme manuel dans les nouvelles cliniques et hôpitaux." #NT!
 panum.2113.f: "La pathologie cellulaire est une théorie des maladies selon laquelle les maladies sont dues à des troubles des cellules de l'organisme ou de leurs fonctions. Elle a été développée dans les années 1850 par Rudolf Virchow, qui a également inventé le terme de « pathologie cellulaire » en 1855. Son ouvrage du même nom est devenu un ouvrage de référence. En tant que concept de maladie basé sur la théorie cellulaire, elle a remplacé la pathologie humorale qui était en vigueur depuis l'Antiquité et est donc responsable d'une révolution complète dans la conception du développement des maladies et des affections en général. Avec la pharmacologie expérimentale, la physiologie et la microbiologie, elle constitue une base unifiée pour la médecine clinique et un fondement de la médecine scientifique." #NT!
 panum.2113.g: "La connaissance des cellules malades devrait être la norme dans les universités." #NT!
 panum.2113.h: "C’est une idée extrêmement importante." #NT!
 panum.2114.t: "Né criminel" #NT!
 panum.2114.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a étudié de manière intensive la psyché des criminels et la génétique humaine et a découvert que les éléments criminels peuvent être identifiés en fonction de leur physionomie. [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis|U] de nombreux contacts avec des patients malades, des fous et des fonctionnaires paresseux au cours de ses tentatives de réforme du système médical ont inspiré [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] tout au long de son travail." #NT!
 panum.2114.f: "Inspiré par la théorie de l'évolution, le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a mené des études sur des centaines de personnes dans des pénitenciers et des asiles psychiatriques et a découvert qu'un type atavique est répandu parmi les criminels. Certaines formes de criminalité peuvent donc être observées dans les types de visages et les formes de crânes. Le criminel ne devient pas criminel de son plein gré, mais en raison de sa prédisposition génétique, il a un problème qu'il « ne peut pas résoudre ». Le criminel représente un type anthropologique distinct, l'homo deliquens. Il s'agit d'un type d'individu évolutif rétrograde, plus ancien et plus primitif qui apparaît comme immoral et guidé par l'instinct." #NT!
 panum.2114.g: "Vous êtes donc un criminel de naissance." #NT!
  
 panum.2121.t: "L'amour du Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] pour les crânes" #NT!
 panum.2121.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a poursuivi sa thèse de criminologie anthropologique et a donc mesuré des milliers de crânes à travers le pays. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] en garde même chez lui." #NT!
 panum.2121.f: "« La criminologie est une science naturelle sérieuse, qui a été trop longtemps imprégnée de philosophie. Ma révolution consiste à la doter du même empirisme que toutes les sciences modernes de ce siècle. La biologie et les mathématiques sont des disciplines incorruptibles, et la psychiatrie et la criminologie peuvent en tirer des leçons. Si vous mesurez et comparez chaque crâne - et je l'ai fait avec des milliers de criminels, de fous et de personnes exécutées - vous pouvez alors recueillir des données statistiques qui montrent le même résultat statistique encore et encore. À partir de cela, des valeurs presque parfaites peuvent être dérivées pour déduire l'asymétrie du visage du criminel. Ces mesures précises sont beaucoup plus sûres que des hypothèses complètement infondées sur l'esprit humain : nous avons ici des chiffres, des faits, en bref des études empiriques, là des bavardages sans fin. »\n\nExtrait de « L'homme criminel » de [ROOT.Var('panum_physician_var').GetCharacter.GetFullName]" #NT!
 panum.2121.g: "Un... joli passe-temps." #NT!
 panum.2122.t: "Déterminisme biologique" #NT!
 panum.2122.d: "Après de nouveaux mois d'études, le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] approfondit ses thèses précédentes sur le « criminel né » et publie de nouvelles découvertes choquantes." #NT!
 panum.2122.f: "'Le criminel est un dégénéré. Alors que l'homme évolue, le criminel représente une régression, une forme d'apostasie humaine. Il est le « sauvage moderne », il nous permet de revenir à l'homme de l'âge de pierre, qui était moins subtil, moins sensible à la douleur et moins empathique. Le criminel ne remarque pas la souffrance de l'autre personne, tout comme il n'a qu'une capacité limitée de compassion. Puisque le criminel agit par prédisposition criminelle, on peut supposer que cette prédisposition criminelle est héréditaire. On pourrait donc supposer que si les gens ne commettent pas leurs actes de leur plein gré, mais plutôt par détermination biologique, cela devrait être une circonstance atténuante dans la peine. Mais c'est le contraire qui se produit, car le criminel ne peut pas être impressionné par une peine dissuasive, il n'est ni réintégrable ni prévisible. L'accent est mis sur la protection de la société. Il est donc préférable de penser à la réclusion à perpétuité ou à la peine de mort. Nous ne pouvons pas permettre à ces dangereux criminels de nuire à des personnes innocentes.'\n\nExtrait de 'L'homme criminel' par [ROOT.Var('panum_physician_var').GetCharacter.GetFullName]" #NT!
 panum.2122.g: "Avons-nous d’autres choix que d’accepter cela comme théorie dominante ?" #NT!
 panum.2123.t: "Un criminel dangereux Sujet" #NT!
 panum.2123.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a soigneusement étudié la physionomie de [SCOPE.sCharacter('panum_victim_scope').GetFullName] et en particulier la forme du crâne de [SCOPE.sCharacter('panum_victim_scope').GetHerHis] et est arrivé à la conclusion que [SCOPE.sCharacter('panum_victim_scope').GetSheHe] est une personne très dangereuse avec une énergie criminelle qui devrait être retirée de tous les services immédiatement - pour protéger la société !" #NT!
 panum.2123.f: "'Les voleurs ont généralement le visage et les mains très mobiles ; les yeux sont petits, agités, souvent louches ; les sourcils froncés et entrechoqués ; le nez est tordu ou émoussé, la barbe est clairsemée, les cheveux sont rarement épais, le front est presque toujours petit et fuyant, l'oreille dépasse souvent comme une anse...\n\nLes meurtriers ont un regard vitreux, glacial, fixe ; leurs yeux sont parfois injectés de sang. Le nez est grand, souvent un nez d'aigle ou plutôt de faucon ; les mâchoires sont fortes, les oreilles longues, les joues larges, les cheveux bouclés, pleins et foncés, la barbe souvent clairsemée ; les lèvres sont fines, les canines sont grandes... En général, chez les criminels dès la naissance, les oreilles sont en forme d'anse, les cheveux sont fournis, la barbe est clairsemée, les sinus frontaux sont arqués, la mâchoire est énorme, le menton est carré ou saillant, les pommettes sont larges.' -Césare Lombroso" #NT!
 panum.2123.g: "Cette personne a en fait un visage criminel." #NT!
 panum.2123.h: "Le médecin va trop loin avec ses accusations [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] !" #NT!
 panum.2124.t: "Un autre amoureux des crânes !" #NT!
 panum.2124.d: "Aujourd'hui, le Docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] nous présente un aspirant universitaire qui aime les crânes presque autant que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe]. Cependant, le Docteur [SCOPE.sCharacter('lepsius_new_anthropologist_scope').GetLastName] s'intéresse davantage aux crânes des personnes décédées." #NT!
 panum.2124.f: "'[SCOPE.sCharacter('lepsius_new_anthropologist_scope').GetFullName] est un excellent scientifique qui comprend l'importance d'examiner les crânes afin de tirer des conclusions sur la personne à laquelle appartient le crâne. Malheureusement, [SCOPE.sCharacter('lepsius_new_anthropologist_scope').GetSheHe] ne traite que des crânes de personnes décédées depuis un temps incommensurable. Incroyable ! On ne peut pas être sûr qu'il s'agissait vraiment de criminels. En quoi cela est-il censé aider ?'" #NT!
 panum.2124.g: "C'est une... surprise étonnamment agréable." #NT!
  
 panum.4003.t: "La fin de la variole" #NT!
 panum.4003.d: "Contre toute attente, notre campagne contre la variole a connu un succès sans précédent : la maladie a désormais été éradiquée." #NT!
 panum.4003.f: "Pour beaucoup, c'est une journée qui commence comme n'importe quelle autre, sans se rendre compte à quel point c'est une matinée magnifique. Pour ceux qui sont au courant, c'est l'aboutissement d'une vie de travail, d'un rêve à peine imaginable qui se concrétise enfin. Beaucoup ne pensaient pas que cela pourrait être fait de leur vivant, que ce serait une œuvre légendaire pour la fin du XXe siècle, ou même pour le XXIe, et pourtant, ici, maintenant, c'est fait en l'an [TimeKeeper.GetCurrentDate.Format('y')]. Le dernier cas confirmé s'est terminé sans qu'un seul nouvel individu ne soit infecté, confinant cette maladie à l'histoire. Pour la première fois dans l'histoire, la menace de cette maladie ne pèse plus sur personne.\n\nEt cela ne signifie qu'une chose : la variole n'existe plus.\n\nBeaucoup pensaient que ce serait impossible... mais même ceux qui ne sont pas au courant ne peuvent s'empêcher d'entendre les célébrations dans les universités et les hôpitaux, de voir les toasts des médecins et des scientifiques, et de savoir que c'est une bonne journée." #NT!
 panum.4003.g: "L’homme a fait son propre miracle ce jour-là." #NT!
  
 panum.2211.t: "Recherche sur les maladies" #NT!
 panum.2211.d: "Au cours des examens médicaux du [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis], le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] s'est rendu compte que le [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] souhaitait étudier en détail une maladie sur laquelle très peu de choses ont été publiées dans notre pays, mais qui est devenue une maladie répandue dans certaines régions." #NT!
 panum.2211.f: "Outre les grandes maladies épidémiques, il existe de nombreuses maladies courantes et répandues, ainsi que des fléaux de l'humanité connus depuis longtemps dont les causes et les méthodes de guérison sont encore inconnues. Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] se demande s'il ne devrait pas se concentrer sur une maladie bien spécifique." #NT!
 panum.2211.g: "Examinez la maladie du trieur de laine." #NT!
 panum.2211.h: "Examiner la maladie du goitre." #NT!
