 panum.840.t: "Le mystère de la mort noire"
 panum.840.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a écrit un traité complet sur les causes, la transmission et les mesures contre la peste. Une digression particulièrement notable traite du rôle des rats et des puces."
 panum.840.f: "Dans son traité sur la peste, le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a résumé de nombreuses nouvelles découvertes. En plus de recommander un système de rotation pour la désinfection et un sérum spécialement développé par [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim], [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] pointe la relation entre les puces comme porteurs de la peste Bacillus et l'infection des rats. La transmission se produit de la puce au rat, du rat à la rat et du rat à l'homme."
 panum.840.g: "Un ancien ennemi devient soudainement en appuiable."
 panum.841.t: "Une propagation remarquable"
 panum.841.d: "Au cours des dernières semaines, le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a beaucoup traité de la première apparition et des endroits où la peste s'est propagée."
 panum.841.f: "«Au cours des dernières semaines, j'ai fait envoyer des cartes par le ministère du Commerce et je les ai comparées aux dossiers de mes collègues à l'étranger. Les médecins qui prétendent que la maladie est liée à un climat ou une géographie particulière se trompe. On peut plutôt observer une propagation en forme de vague sur terre et une propagation à travers les ports les plus étroits. Cela ne devrait pas être surprenant, car la grande épidémie de peste du Moyen Âge a également fait rage en Scandinavie, en Méditerranée et au Moyen-Orient. Mais cela convaincra-t-il mes collègues? '\ N \ nfrom du Journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [TimeKeeper.GetCurrentDate.Format('y')]"
 panum.841.g: "Cela n'a donc pas grand-chose à voir avec la géographie."
 panum.842.t: "Nettoyage de rotation"
 panum.842.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a testé une nouvelle procédure dans [SCOPE.sState('panum_disease_state').GetName] qui s'avère extrêmement efficace."
 panum.842.f: "«La désinfection systématique de la ville a été tentée, mais s'est avérée une entreprise très coûteuse, et a été abandonnée en faveur d'un programme de« nettoyage de la maison », dans lequel un personnel d'inspecteurs sanitaires européens et de coolies a été constamment employé. Les districts ont été traités en rotation, de sorte que chaque maison d'immeuble a été nettoyée au moins trois fois par an. Cette méthode présente tous les avantages de la simplicité, de l'efficacité et de l'économie. Chaque inspecteur se verra attribuer un certain nombre de sols par jour; Les occupants dévoilent leurs biens domestiques, les sols et les cabines sont emportés et les planches à lit sont nettoyées dans des réservoirs de fer portables. Une inspection est effectuée pour les illégalités structurelles mineures, les rats et les trous similaires sont remplis de ciment à la fois, et toutes les ordures sont transportées. '\ N \ nfrom Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'s Instructions for the Better Disinfection of [SCOPE.sState('panum_disease_state').GetName]"
 panum.842.g: "Ce système doit être mis en œuvre partout."
 panum.843.t: "Une mortalité intéressante"
 panum.843.d: "En parcourant les statistiques, le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a découvert que le nombre de décès parmi les attrapeurs de rat est exorbitant."
 panum.843.f: "«Le chef de l'agence m'a dit que je confondais la corrélation et la causalité. En principe, il a été trop mis l'accent sur l'infection des rats avant une épidémie de peste, a-t-il dit presque littéralement. Je me demande maintenant sérieusement si la majorité des autorités supposaient que les épidémies de la peste avaient quelque chose à voir avec les rats, s'ils s'en tiendraient à leur propre théorie étant donné un nombre similaire d'indications d'une maladie purement tropicale. La mortalité manifestement plus élevée chez les capteurs de rat par rapport au reste de la population est une «corrélation» trop pour moi."
 panum.843.g: "Combien de preuves supplémentaires sont nécessaires?"
 panum.844.t: "Ce sont les rats, stupides!"
 panum.844.d: "Au cours de l'enquête plus approfondie sur l'épidémie de la peste au [SCOPE.sState('panum_disease_state').GetName], le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a été informé qu'avant que la peste n'éclate, tous les rats de la région sont morts."
 panum.844.f: "\"Je vois beaucoup de rats morts gisant sur le sol\", a écrit Alexandre Yersin à son arrivée à Hong Kong le 15 juin 1894. \"Les rats sont certainement les vrais épandeurs de l'épidémie.\""
 panum.844.g: "Une thèse audacieuse."
 panum.845.t: "Un échantillon"
 panum.845.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a réussi à prélever un échantillon de tissu d'une victime de peste dans une morgue. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] a dû faire beaucoup de convaincage. Ou plutôt, [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] a dû soudoyer quelques personnes pour l'obtenir."
 panum.845.f: "«Ils se trouvent dans leurs cercueils, qui sont complètement couverts de citron vert. Un cercueil est ouvert. Je repousse la chaux pour exposer la zone de l'aine. La bosse est clairement visible. Je l'ai coupé en moins d'une minute. -Alexandre Yersin"
 panum.845.g: "Nous rembourserons les coûts."
 panum.851.t: "'Simplement la pauvreté et la saleté'"
 panum.851.d: "Le médecin de district du [SCOPE.sState('panum_disease_state').GetName], au nom des autorités locales, a rejeté les enquêtes actuelles du docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] comme sans fondement. Les causes et les méthodes de traitement de la peste sont «bien connues»."
 panum.851.f: "«Nous devons exprimer notre surprise que le gouvernement central du [ROOT.GetCountry.GetCapital.GetCityHubName] juge nécessaire d'envoyer un médecin, même si nous avons suffisamment le contrôle de la situation. Les mesures de désinfection et d'assainissement ont eu un impact, en particulier le nettoyage des maisons et l'amélioration des conditions de vie des résidents. Le poison est probablement développé à partir de conditions atmosphériques sous des maisons dans certains districts, et qu'elle est causée simplement par la pauvreté et la saleté. Au sens ordinaire, la maladie n'est pas infectieuse ou contagieuse. '\ N \ nfrom une lettre du médecin de district au gouvernement"
 panum.851.g: "Le succès parle de lui-même ..."
 panum.852.t: "Nourriture contaminée"
 panum.852.d: "Plusieurs scientifiques, dans une controverse directe avec Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], ont clairement indiqué que la peste est une maladie intestinale causée par une mauvaise nutrition."
 panum.852.f: "«Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] peut avoir des théories passionnantes, mais [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] a beaucoup trop peu d'expérience dans la maladie. Les médecins locaux du [SCOPE.sState('panum_disease_state').GetName] ont fait appel à plusieurs reprises aux autorités de ne pas remettre en question les conclusions établies. Les faits sont les suivants: 40% des patients atteints de peste souffrent de vomissements, 30% supplémentaires de la diarrhée et près de 20% des douleurs abdominales. Dans l'ensemble, les plaintes gastro-intestinales ont été documentées chez près de 60% des patients. Il est donc clair qu'il s'agit d'une infection du tube digestif, et il est d'autant plus clair qu'il est apparemment dû à une nutrition gâtée, mauvaise ou autrement déficiente. '\ N \ n"
 panum.852.g: "Docteur - Que répondez-vous?"
 panum.853.t: "Une maladie tropicale"
 panum.853.d: "Plusieurs médecins de renommée internationale ont avancé la théorie selon laquelle la peste est une autre maladie tropicale qui ne se produirait guère à l'extérieur de certaines zones climatiques, et si c'était le cas, seulement sporadiquement. C'est donc une maladie climatique."
 panum.853.f: "«Nous avons déjà constaté dans le passé qu'un climat plus frais a entraîné l'onde de la peste. Les implications sont claires: la peste est une maladie fortement liée aux changements climatiques. Les données météorologiques et les peintures survivantes montrent que la dernière vague de peste a eu lieu dans un environnement beaucoup plus chaud qu'aujourd'hui. La disparition de la peste de la fin du XVIIe siècle est en corrélation avec un refroidissement du temps jusqu'à ce que la peste disparaisse complètement. La hausse des températures des dernières années, en revanche, est en corrélation avec la propagation de la peste dans les zones qui étaient auparavant considérées comme plus froides. Dois-je aller plus loin? '\ N \ na Lettre de Doktor Angelika Hasenbein à Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetFullNameNoFormatting]"
 panum.853.g: "Donc, juste une variante de fièvre jaune."
 panum.854.t: "La fausse peste"
 panum.854.d: "Au cours des derniers jours, le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] avait été condamné à plusieurs hôpitaux pour y examiner les patients. Il s'est avéré qu'ils n'étaient pas des personnes souffrant de peste mais des personnes souffrant de typhus."
 panum.854.f: "«La mort noire, le typhus, le choléra, la consommation, la peste bubonique ... oh, ce sont les jours. -Un Undertaker inconnu"
 panum.854.g: "Regrettable."
 panum.854.h: "Si nous perdons du temps, peut-être que le médecin peut l'utiliser?"
 panum.861.t: "L'opium n'est pas une réponse"
 panum.861.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a soigneusement examiné les effets de guérison présumés de l'opium contre les maladies de la peste et est arrivé clairement."
 panum.861.f: "'Cela ne fonctionne pas.' \ N \ nconclusion par le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] concernant l'utilisation de l'opium"
 panum.861.g: "C'est un peu décevant et éclairant à la fois."
 panum.862.t: "Septicamia"
 panum.862.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a pu prouver que plusieurs expériences qui étaient censées suggérer une maladie gastro-intestinale comme cause de la peste ont été complètement mal interprétées."
 panum.862.f: "L'opinion de l'infection via le tractus alimentaire, en raison des aliments spécifiquement contaminés, a été largement accepté pendant plusieurs années, bien qu'il y ait eu ceux qui considéraient les `` émanations du souffle et de la peau '' comme étant le facteur étiologique le plus important. Un grand nombre d'expériences d'alimentation animale, avec du matériau de peste ont été entreprises, et la couleur a été prêtée à l'hypothèse gastro-intestinale, car de nombreux animaux et oiseaux sont morts d'une maladie septicémique ressemblant à la peste. Cependant, les résultats n'étaient pas concluants et ont finalement été contestés à Hong Kong en 1904 par l'actuel médecin de santé, qui a exprimé tout son désaccord, avec ce point de vue."
 panum.862.g: "C'est un coup dur pour la théorie selon laquelle la peste a été causée par la contamination des aliments."
 panum.863.t: "Antibiotiques"
 panum.863.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a pu montrer dans plusieurs expériences que les patients atteints de peste réagissent parfaitement au traitement antibiotique et recommande expressément cette approche."
 panum.863.f: "«Appeler mes expériences un succès complet serait un euphémisme. En fait, j'ai été surpris de savoir comment les antibiotiques fonctionnaient. Quelques patients ont même dit qu'ils avaient l'impression d'avoir été guéri. Si cet effet est confirmé, la recherche d'un vaccin pour la peste peut devenir inutile. '\ N \ nfrom Le Journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [TimeKeeper.GetCurrentDate.Format('y')]"
 panum.863.g: "N'y a-t-il pas d'inconvénients aux antibiotiques?"
 panum.864.t: "Insecticides"
 panum.864.d: "L'utilisation à grande échelle d'insecticides dans un hotspot de peste n'a eu aucun effet. Selon le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], c'est un succès surprenant."
 panum.864.f: "«Vous avez raison de demander pourquoi je suis satisfait de cet échec. Mais les scientifiques apprennent également des défaites perçues. En ce sens, ce n'était pas une défaite, mais une preuve. Un certain nombre de mes collègues ont suggéré que la peste pourrait être une maladie tropicale qui ne ressemble pas au paludisme, qui s'est avéré transmis par un moustique. Au moins, nous pouvons mettre cette hypothèse de côté. '\ N \ nfrom Une interview avec le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] dans un journal local"
 panum.864.g: "Une option de moins."
 panum.865.t: "Latrines"
 panum.865.d: "Lors d'une enquête sur les mesures d'hygiène au [SCOPE.sState('panum_disease_state').GetName], le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a constaté que les eaux usées modernes et les infrastructures latrines laissaient quelque chose à désirer, en particulier dans un district infesté de peste et ont contacté les autorités locales."
 panum.865.f: "`` Même si cela n'a pas encore été clarifié de manière concluante comment faire face au mieux avec la peste, et quelle que soit ce que mes théories personnelles et celles de mes collègues ressemblent - l'expérience a montré que les planchers contaminés par des fèces et des eaux polluées permanentes sont en principe à être supprimés, que ce soit à cause des miasmas qui sont soupçonnés de provenir d'eux, ou parce qu'ils sont focaux des germes. Si nous voulons contrôler non seulement la peste mais aussi d'autres sources de maladie à l'avenir, alors nous devons prendre des mesures préventives. '\ N \ ndr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] dans une lettre au Govenrment local"
 panum.865.g: "Ce sera cher, mais c'est inévitable."
 panum.870.t: "Bacillus pestis"
 panum.870.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a examiné l'échantillon de tissus avec son microscope et déterminé définitivement: la peste est transmise par un bacille!"
 panum.870.f: "«20 juin 1894. Les bosses contiennent, clairement et clairement visible, un grand nombre de bacilles. Ils sont petits, courts et ont des extrémités arrondies. C'est sans aucun doute le microbe de la peste. -Alexandre Yersin"
 panum.870.g: "Cela change tout!"
 panum.871.t: "Puces"
 panum.871.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] peut avoir fait l'une des découvertes les plus cruciales de l'histoire de la peste: la relation entre les puces, les rats et l'épidémie de peste."
 panum.871.f: "Dans [TimeKeeper.GetCurrentDate.Format('y')], [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] a découvert le vecteur de rat-flage qui entraîne la maladie. Le [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] avait noté que les personnes qui sont tombées malades ne devaient pas être en contact étroit les unes avec les autres pour acquérir la maladie. Au Yunnan, en Chine, les habitants fuiraient leurs maisons dès qu'ils avaient vu des rats morts, et sur l'île de Formosa (Taiwan), les résidents ont considéré la manipulation de rats morts accru les risques de la peste développée. Ces observations ont conduit [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] à soupçonner que la puce pourrait être un facteur intermédiaire dans la transmission de la peste, car les gens n'ont acquis la peste que si elles étaient en contact avec des rats morts moins de 24 heures auparavant. Dans une expérience désormais classique, [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a démontré comment un rat sain est mort de la peste après que les puces infectées l'aient sauté d'un rat qui était récemment mort de la peste."
 panum.871.g: "Fascinant."
 panum.872.t: "Sérum anti-place"
 panum.872.d: "Sur la base des connaissances antérieures de la transmission et de l'origine de la peste, ainsi que des expériences avec la peste Bacillus, le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a développé un sérum anti-prlague très efficace et l'a testé avec succès sur un premier patient."
 panum.872.f: "«De minuit, le patient devient plus calme, et à six heures du matin (…), il se réveille et déclare qu'il se sent guéri. -Alexandre Yersin"
 panum.872.g: "Ça marche!"
