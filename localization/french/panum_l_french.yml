 panum.61.t: "Départ de l'équipe médicale" #NT!
 panum.61.d: "Après que les assistants de recherche ont présenté à nos médecins locaux les méthodes de traitement médical modernes de notre pays suzerain, ils disent au revoir et retournent dans leur pays d'origine." #NT!
 panum.61.f: "« La seule chose qui comptera, quand nous partirons, ce seront les traces d'amour que nous aurons laissées derrière nous. » - Albert Schweitzer" #NT!
 panum.61.g: "Notre seigneur prend soin de nous ?" #NT!
 panum.62.t: "Départ de l'équipe médicale de vaccination" #NT!
 panum.62.d: "Après que les assistants de recherche ont présenté à nos médecins locaux les vaccins modernes de notre pays suzerain, ils disent au revoir et retournent dans leur patrie." #NT!
  
 je_panum_overlord_medical_treatment_team: "Équipe de soins médicaux d'Overlord" #NT!
 je_panum_overlord_medical_treatment_team_reason: "Des assistants médicaux d’un autre pays diffusent actuellement des méthodes de traitement médical modernes dans notre pays." #NT!
 je_panum_overlord_medical_treatment_team_goal: "L'équipe médicale de traitement restera sur place pendant environ un an." #NT!
 je_panum_overlord_medical_vaccination_team: "Équipe de vaccination médicale d'Overlord" #NT!
 je_panum_overlord_medical_vaccination_team_reason: "Des assistants médicaux d’un autre pays diffusent actuellement des vaccins modernes dans notre pays." #NT!
 je_panum_overlord_medical_vaccination_team_goal: "L'équipe médicale de vaccination restera sur place pendant environ un an." #NT!
  
