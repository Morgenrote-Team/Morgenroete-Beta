 je_panum_military_medicine_project: "Médecine militaire" #NT!
 je_panum_military_medicine_project_reason: "Les médecins militaires et les médecins de la Croix-Rouge ont l'opportunité unique d'améliorer les soins médicaux sur le champ de bataille et ainsi de sauver de nombreuses vies - et peut-être de faire basculer une guerre. En fonction des traits de caractère et de l'expérience, cette amélioration se produit à des rythmes différents. Après la réforme médicale militaire [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis], un niveau [concept_mobilization_option] ou supérieur sera débloqué." #NT!
 panum_military_medicine_progress_bar_at_full_tt: "La barre de médecine militaire a atteint #variable 100%#!" #NT!
  
 panum.2500.t: "Assistance médicale avancée" #NT!
 panum.2500.d: "Notre [concept_panum_physician] Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] travaille depuis des années à améliorer le soutien médical en temps de guerre. Les nouvelles méthodes et moyens peuvent désormais être utilisés sur le champ de bataille !" #NT!
 panum.2500.f: "\n'Faites attention à l'utilisation exacte de cette seringue. Et ayez toujours suffisamment de sérum à portée de main. Et des pansements. De préférence une trousse de premiers secours. Savez-vous au moins ce que signifie la stérilisation ?'" #NT!
 panum.2500.g: "Les soldats construiront un jour un monument au docteur." #NT!
 panum_advanced_medical_support_mobilization_option_tt: "Vous obtenez l’accès à un nouveau [concept_mobilization_option] ou à un nouveau niveau de celui-ci." #NT!
  
