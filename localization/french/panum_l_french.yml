 ### 2.3.4 ###

 panum.139.d: "Après de grands efforts, le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a finalement écrit [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] traité sur une méthode de traitement efficace de la maladie [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_disease_title')]. Il est considéré comme une étape importante dans la médecine [ROOT.GetCountry.GetAdjectiveNoFlag]." #NT!
  
