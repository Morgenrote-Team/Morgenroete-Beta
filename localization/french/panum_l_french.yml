 panum_cholera_desc: "Le choléra est une maladie infectieuse dangereuse de l'intestin grêle. Il est considéré comme une épidémie déterminante du 19e siècle avec des millions de morts dans le monde."
 panum.2626.t: "Le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] montre"
 panum.2626.d: "Le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a obtenu [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] propre émission à la radio dans laquelle [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] donne des conseils aux personnes qui veulent parler de leurs problèmes. Le format est très populaire."
 panum.2626.f: "«Bonjour, Ethan. J'écoute. '\ N'hi, Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName].' \ N'en est-il Ils me battent toujours. J'ai un 160 IQ. Je suis dans le club de l'astronomie et je déteste les sports. '\ N'Well, vous savez, Ethan, les autres enfants agissent simplement par la jalousie et l'immaturité, et je sais que cela n'aide pas grand-chose en ce moment, mais le jour viendra dans les prochaines années quand vous aurez le dernier rire, tout le monde, tout le monde, tout le monde, je trouve ce conseil Patron, Simplist, dans le Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], je trouve ce conseil Patron, SIMPLIST, Dr. mpit sans inspiration. La vraie surprise ici est qu'ils vous paient pour éteindre ce jus de ballon. '\ N'ethan, d'où appelez-vous?' \ N'home. '\ N'well, si l'un des camarades de classe d'Ethan écoute, vous savez où il est, et il ne peut pas y rester pour toujours. Merci pour votre appel."
 panum.2626.g: "Attendez, je connais ce spectacle!"
 ACHIEVEMENT_panum_biologist_job: "Le travail d'un biologiste?"
 ACHIEVEMENT_DESC_panum_biologist_job: "Inventez un vaccin contre la fièvre jaune - avec un médecin."
 panum.1007.t: "Clinique de la polio"
 panum.1007.d: "Sister [SCOPE.sCharacter('panum_polio_nurse').GetFirstName] a fondé une clinique de polio en [SCOPE.sState('panum_disease_state').GetName] pour pouvoir s'occuper des nombreux patients là-bas."
 panum.1007.f: "«C'était une femme très grande et élégante, et elle a inspiré la confiance juste par sa manière et la façon dont elle s'est transportée. Elle avait un accent délicieux qui faisait d'elle une personne intéressante à écouter. Si je ferme les yeux, je peux toujours la visualiser debout à côté de mon lit avec une longue robe noire et un grand chapeau avec une belle plume d'autruche ... elle ne portait pas de bijoux, et elle ne portait aucun maquillage. Je me souviens que son visage était fort et angulaire, et ses yeux étaient très intenses. Quand elle vous a regardé dans les yeux, cette intensité a exigé toute votre attention, et quand elle a parlé, les gens l'ont écoutée ... tout le monde savait qui était en charge, et nous avons reçu le traitement qu'elle a recommandé. Je n'ai jamais connu personne aussi affirmé qu'elle. '\ N \ nray G., Polio Survivor"
 panum.1007.g: "Merci, sœur [SCOPE.sCharacter('panum_polio_nurse').GetFirstName]."
 panum.1008.t: "Dépression de la polio"
 panum.1008.d: "Les nombreux enfants mutilés à vie ont non seulement un impact sur la santé physique de la prochaine génération, mais aussi sur les parents, qui accusent le gouvernement de faire trop peu."
 panum.1008.f: "«Je me souviens très bien du premier jour où j'ai porté l'attelle à l'école. C'était le milieu de la journée scolaire. Apparemment, j'étais allé chez le médecin ce matin-là pour faire monter l'attelle. Ma mère m'a laissé tomber à la porte, et je me souviens qu'elle avait des larmes dans ses yeux alors que je m'éloignais. '\ N \ nedmund sass, polio Survivor"
 panum.1008.g: "Irrationnel, mais pas incompréhensible."
