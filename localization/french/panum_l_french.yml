 je_panum_measles: "Épidémie de rougeole" #NT!
 je_panum_measles_reason: "La rougeole est une maladie très contagieuse connue pour ses plaques rouges typiques sur la peau. Elle peut avoir des conséquences catastrophiques, en particulier dans les populations qui n'étaient pas immunisées auparavant. En tant que maladie suprarégionale, la rougeole peut se propager à d'autres régions.\n\nL'invention des #ORANGE antibiotiques#! revêt une importance particulière dans la lutte contre la rougeole. Grâce à cette technologie, un [concept_panum_physician] peut trouver un #V traitement contre la rougeole#!. Seul un très bon système de santé peut y aider. Tout cela conduit à une meilleure prévention et à une meilleure guérison de la maladie.\n\nMalheureusement, l'invention d'un #V vaccin contre la rougeole#! dépasse le cadre de l'époque victorienne." #NT!
 je_panum_scarlet: "Épidémie de scarlatine" #NT!
 je_panum_scarlet_reason: "La scarlatine est une maladie très répandue qui était l'une des causes de mortalité les plus courantes chez les enfants jusqu'au début du 20e siècle.\n\nL'invention des #ORANGE antitoxines#! revêt une importance particulière dans la lutte contre la scarlatine. Grâce à cette technologie, un [concept_panum_physician] peut trouver un #V traitement contre la scarlatine#!. Un bon système de santé y contribuera. Tout cela conduit à une meilleure prévention et à une meilleure guérison de la maladie.\n\nLe développement d'un #V vaccin contre la scarlatine#! par un [concept_theiler_biologist] est possible, mais très difficile." #NT!
 je_panum_plague: "Épidémie de peste" #NT!
 je_panum_plague_reason: "La peste bubonique est comparée à la « peste noire » du Moyen-Âge, l'une des pires catastrophes de l'histoire. On pensait qu'elle avait disparu jusqu'à sa réapparition à la fin du XIXe siècle. Dans les pays à faible richesse et aux systèmes de santé faibles, la peste peut se propager dans de multiples régions.\n\nL'invention des #ORANGE antitoxines#! revêt une importance particulière dans la lutte contre la peste. Grâce à cette technologie, un [concept_panum_physician] peut trouver un #V traitement contre la peste#!. Un système de santé rudimentaire déjà peut aider. Tout cela conduit à une meilleure prévention et à une meilleure guérison de la maladie.\n\nAfin de vaincre la peste une fois pour toutes, un #V vaccin contre la peste#! est nécessaire, qui doit être développé par un [concept_theiler_biologist]." #NT!
 je_panum_diphteria: "Épidémie de diphtérie" #NT!
 je_panum_diphteria_reason: "La diphtérie est une maladie dangereuse qui peut entraîner des complications mortelles et des conséquences à long terme. En raison de la mortalité infantile et des problèmes respiratoires qui lui sont associés, la diphtérie est surnommée « l'ange étrangleur des enfants ». Les effets restent localisés.\n\nL'invention des #ORANGE antitoxines#! revêt une importance particulière dans la lutte contre la diphtérie. Grâce à cette technologie, un [concept_panum_physician] peut trouver un #V traitement contre la diphtérie#!. Seul un bon système de santé peut y aider. Tout cela conduit à une meilleure prévention et à une meilleure guérison de la maladie.\n\nPour vaincre la diphtérie une fois pour toutes, il faut un #V vaccin contre la diphtérie#! développé par un [concept_theiler_biologist]." #NT!
 je_panum_polio: "Polio" #NT!
 je_panum_polio_reason: "La poliomyélite est une maladie qui touche principalement les enfants et qui entraîne souvent la mort ou des complications physiques à vie. Bien qu'elle ne soit apparue que de manière sporadique dans le passé, la polio est devenue endémique au cours du XIXe siècle. La polio ne se propage pas au-delà de l'État où elle sévit.\n\nL'invention des #ORANGE antitoxines#! revêt une importance particulière dans la lutte contre la polio. Grâce à cette technologie, un [concept_panum_physician] peut trouver un #V traitement contre la polio#!. Seul un bon système de santé peut y aider. Tout cela conduit à une meilleure prévention et à une meilleure guérison de la maladie.\n\nMalheureusement, l'invention d'un #V vaccin contre la polio#! dépasse le cadre de l'époque victorienne." #NT!
  
