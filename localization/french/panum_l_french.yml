 je_panum_measles_treatment_reason: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] examine actuellement plusieurs patients au [SCOPE.sState('panum_disease_state').GetName] pour déterminer la cause de la #YELLOW rougeole#!. Seules les véritables causes de l'apparition de la maladie peuvent aider à faire des préventions qui mèneront à une méthode de traitement moderne. Lorsque le médecin aura terminé son travail, il présentera sa thèse au public. Cela n'empêchera pas de futures épidémies - cela nécessite l'identification de l'agent pathogène et éventuellement un vaccin - mais les effets d'une nouvelle épidémie seront relativement faibles." #NT!
