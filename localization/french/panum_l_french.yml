 je_panum_medical_system_project: "Développer le système médical" #NT!
 je_panum_medical_system_project_reason: "Un médecin qui doit développer le système médical travaille principalement sur place pour améliorer les soins de santé. Mais il faut aussi une infrastructure administrative. Un médecin avec des talents avantageux qui font bonne impression sur la bureaucratie est utile ici. Ses compétences et son expérience stimulent les progrès mensuels dans la création et la construction de nouveaux hôpitaux et cliniques.\n\nLes médecins essaieront d'abord de créer des cliniques dans des zones particulièrement bien développées avant de se tourner vers des cliniques dans des régions moins développées. Les médecins préféreront l'État qui a le plus de bâtiments administratifs.\n\nChaque fois que la barre de progression se remplit, une nouvelle clinique/un nouvel hôpital est activé et le travail continue dans l'État approprié suivant. Les médecins activeront autant de cliniques et d'hôpitaux que possible comme méthode de production jusqu'à ce qu'il n'y ait plus d'États avec les exigences nécessaires ou jusqu'à ce que le travail soit arrêté manuellement." #NT!
  
 panum.2101.t: "Système médical élargi" #NT!
 panum.2101.d: "Le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a terminé son travail et a agrandi et modernisé les installations médicales locales. Le médecin est désormais à nouveau disponible pour d'autres activités." #NT!
 panum.2101.f: "« La médecine est une science sociale, et la politique n'est rien d'autre que de la médecine à grande échelle. » - Rudolf Virchow" #NT!
 panum.2101.g: "Retour au travail." #NT!
 panum.2102.t: "Clinique spécialisée à [SCOPE.sState('panum_clinic_state').GetName]" #NT!
 panum.2102.d: "Avec l'aide enthousiaste du Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], la première clinique spécialisée de notre pays a été créée à [SCOPE.sState('panum_clinic_state').GetCityHubName]. Le docteur a annoncé que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] dirigera [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself] et se spécialisera dans un domaine - bien qu'il ne soit pas encore clair sur quel domaine les spécialistes devraient se concentrer." #NT!
 panum.2102.f: "« L'enseignement médical n'a pas pour but de fournir aux étudiants un moyen de gagner leur vie, mais d'assurer la santé de la communauté. » - Rudolf Virchow" #NT!
 panum.2102.g: "Chirurgie." #NT!
 panum.2102.h: "Psychiatrie." #NT!
 panum.2102.i: "Épidémiologie." #NT!
 panum.2102.j: "Médecine militaire." #NT!
 panum.2102.k: "Médecine générale." #NT!
 panum.2103.t: "Hôpital à [SCOPE.sState('panum_clinic_state').GetName]" #NT!
 panum.2103.d: "Aujourd'hui, avec un grand intérêt public et la présence de la presse, le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a inauguré le premier hôpital moderne du pays à [SCOPE.sState('panum_clinic_state').GetCityHubName], qui annonce un tournant avec ses salles d'opération et son équipement médical moderne." #NT!
 panum.2103.f: "« C'est la malédiction de l'humanité qu'elle apprend à tolérer même les situations les plus horribles par habitude. » - Rudolf Virchow" #NT!
 panum.2103.g: "Bravo!" #NT!
  
 panum_medical_research_project_progress_bar: "Recherche médicale" #NT!
 panum_medical_research_project_progress_bar_desc: "Progrès de la recherche médicale : #v [JournalEntry.GetCurrentBarProgress(ScriptedProgressBar.Self)|1%]#! ([JournalEntry.GetCurrentBarValue(ScriptedProgressBar.Self)|0]/40)" #NT!
 panum_medical_research_project_progress_physician_erudite_trait_tt: "#default_text [concept_panum_physician] a le #V $erudite$#! [concept_character_trait].#!" #NT!
 panum_medical_research_project_progress_physician_innovative_trait_tt: "#default_text 0,5 Le point [concept_panum_physician] a le #V $innovative$#! [concept_character_trait].#!" #NT!
 gaudi_medical_research_project_progress_negative_character_trait_tt: "#default_text #n -0,3 Points#! [concept_panum_physician] a le #V $hedonist$#!, #V $arrogant$#! ou #V #n1#! #n3.#!" #NT!
  
 je_panum_medical_research_project: "Recherche médicale" #NT!
 je_panum_medical_research_project_reason: "Le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] fait actuellement avancer la recherche médicale. En plus des innovations médicales, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] peut également trouver des remèdes pour des maladies qui ne font pas partie des dix maladies épidémiques classiques. Chaque fois que les progrès atteignent [JournalEntry.GetTotalGoalValue|V0], nous obtiendrons un petit coup de pouce technologique. #n Ce projet se poursuivra indéfiniment. Utilisez le bouton pour l'arrêter.#!" #NT!
  
 notification_panum_technology_boost_from_physician_notification_name: "Le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] accélère la recherche" #NT!
 notification_panum_technology_boost_from_physician_notification_desc: "Grâce au Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], une technologie médicale a connu un essor considérable." #NT!
  
 panum_medical_score_prestige_modifier: "Prestige médical" #NT!
  
 panum_add_x_medical_score_points_minus_x_tt: "Perdre [SCOPE.GetValue('medical_score_points_amount')|0+] [concept_panum_medical_prestige]." #NT!
 panum_add_x_medical_score_points_0_tt: "Ne gagnez pas [concept_panum_medical_prestige]." #NT!
 panum_add_x_medical_score_points_plus_x_tt: "Gagner [SCOPE.GetValue('medical_score_points_amount')|0+] [concept_panum_medical_prestige]." #NT!
  
 panum_vitamins_tech: "Vitamines" #NT!
 panum_vitamins_tech_desc: "En isolant certains nutriments dont le corps a besoin, il est possible de garantir qu’un plus grand nombre de personnes aient une alimentation saine et équilibrée." #NT!
  
 panum.2006.t: "La théorie des germes est renforcée" #NT!
 panum.2006.d: "Le congrès médical a également été l'occasion pour plusieurs médecins d'échanger leurs idées sur les causes de la maladie. Il apparaît de plus en plus évident que de moins en moins de chercheurs croient à la théorie traditionnelle des miasmes. La théorie des germes est désormais considérée comme la norme par les chercheurs les plus respectés." #NT!
 panum.2006.f: "« Il est vrai que depuis quelque temps, les pays ne procèdent plus de manière aussi partiale qu'auparavant et que chacun prend le relais de l'autre en ce qui semble avoir fait ses preuves en matière de moyens de défense. Mais, face à la diversité toujours grande des moyens de lutte contre la tuberculose, il faut se demander quelles mesures répondent le mieux aux exigences scientifiques et aux connaissances générales en matière de lutte contre les maladies contagieuses. Mais avant de répondre à cette question, il faut bien comprendre comment se produit la contamination par la tuberculose, c'est-à-dire comment les bacilles tuberculeux envahissent l'organisme humain ; car toutes les mesures prophylactiques contre une maladie infectieuse ne peuvent avoir pour but que d'empêcher les germes de la maladie d'envahir l'organisme. » - Robert Koch" #NT!
 panum.2006.g: "Ces preuves ne peuvent être rejetées d’emblée." #NT!
 panum.2201.t: "La théorie des miasmes perd sa souveraineté interprétative" #NT!
 panum.2201.d: "À mesure que le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] se concentre davantage sur de nouvelles méthodes de recherche, la théorie traditionnelle des miasmes perd de sa pertinence. La théorie des germes semble plus convaincante." #NT!
 panum.2201.f: "« Messieurs, ce sont les microbes qui auront le dernier mot ! » - Louis Pasteur" #NT!
 panum.2201.g: "La théorie des miasmes est donc discutable ?" #NT!
  
 panum_physician_recent_treatment_modifier: "Traitement récent" #NT!
 panum_physician_recent_treatment_conducted_modifier: "Traitement récent effectué" #NT!
 panum_physician_botched_treatment_modifier: "Traitement bâclé" #NT!
 panum_physician_botched_treatment_ig_modifier: "Traitement bâclé" #NT!
  
 panum.2301.t: "Traitement réussi des [SCOPE.sCharacter('chosen_character').GetFullName] et [SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')]" #NT!
 panum.2301.d: "Le Dr [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] a traité avec succès le [SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')] de [SCOPE.sCharacter('chosen_character').GetFullName]." #NT!
 panum.2301.f: "« Ne vous inquiétez pas, monsieur, ce traitement fonctionnera sûrement ! Je l'ai fait au moins 2 fois et un seul patient est mort ! »" #NT!
 panum.2301.g: "Bien!" #NT!
  
 panum.2302.t: "Traitement neutre des [SCOPE.sCharacter('chosen_character').GetFullName] et [SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')]" #NT!
 panum.2302.d: "Le Dr [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] a traité les [SCOPE.sCharacter('chosen_character').GetFullName] et [SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')] mais rien n'a vraiment changé." #NT!
 panum.2302.f: "« Je pensais vraiment que boire suffisamment d’eau ferait l’affaire ! »" #NT!
 panum.2302.g: "Au moins, ça n'a pas fait mal." #NT!
  
 panum.2303.t: "Traitement bâclé des [SCOPE.sCharacter('chosen_character').GetFullName] et [SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')]" #NT!
 panum.2303.d: "Le Dr [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] a traité le [SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')] de [SCOPE.sCharacter('chosen_character').GetFullName] si mal que cela a rendu l'état de [SCOPE.sCharacter('chosen_character').GetHerHis] encore pire." #NT!
 panum.2303.f: "« C'est la troisième fois que cela arrive cette semaine... »" #NT!
 panum.2303.g: "Cela n’aurait pas dû arriver !" #NT!
  
 panum.2304.t: "Traitement fatal [SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')]" #NT!
 panum.2304.d: "Le Dr [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] a malheureusement provoqué la mort du patient lors du traitement [SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')]." #NT!
 panum.2304.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_fatal_flavor_text_type')]" #NT!
 panum.2304.g: "Une tragédie !" #NT!
  
 panum_foreign_medical_expedition_modifier: "Expédition médicale à l'étranger" #NT!
  
 panum.137.t: "L'expédition veut faire des recherches sur les maladies" #NT!
 panum.137.d: "Une expédition étrangère a atteint les frontières de notre pays. Elle est composée principalement de médecins, de scientifiques et de leurs assistants. Ils veulent apparemment enquêter sur l'épidémie qui sévit." #NT!
 panum.137.f: "Les expéditions médicales peuvent se rendre dans d'autres pays pour effectuer des recherches scientifiques sur les traitements des maladies et rédiger des descriptions de maladies pour leur pays d'origine. Les pays d'accueil en profitent à leur tour, car les médecins examinent les patients dans les zones d'épidémie." #NT!
 panum.137.g: "Bienvenue à ces hommes et femmes courageux." #NT!
  
 panum.2202.t: "Maladie ancienne" #NT!
 panum.2202.d: "Notre Docteur a apporté un éclairage précieux au travail de notre Anthropologue !" #NT!
 panum.2202.f: "« … mais, bien sûr, si vous examinez cette partie de leur crâne, vous pouvez voir qu’ils avaient en fait commencé à guérir de leurs blessures. »\n\n« Alors ce n’était certainement pas la cause du décès ? »\n\n« Très probablement ! Un coup violent, mais pas mortel. J’estime qu’ils ont passé encore six mois environ en vie avant qu’une autre blessure ne les emporte, ou peut-être que la blessure s’est aggravée. »\n\n« Hmmm. Fascinant. À en juger par la nature du coup, j’ai pensé qu’il s’agissait probablement d’une sorte d’instrument contondant. »\n\n« Une massue, très probablement, ou peut-être un outil avec une pierre contondante. Je pense que cette côte présente la véritable cause du décès. Notez le rétrécissement des os, ici et ici. »\n\n« Une blessure ? »\n\n« La tuberculose, très probablement. Je parierais que votre homme est mort après des années de lutte contre cette mort blanche. »" #NT!
 panum.2202.g: "La science interdisciplinaire reste la meilleure science." #NT!
 panum.2203.t: "Médecine étrange" #NT!
 panum.2203.d: "Avec un peu de temps libre ensemble, notre Docteur et notre Archéologue ont partagé leurs recherches !" #NT!
 panum.2203.f: "« Ah, mais c'est là que les choses deviennent intéressantes, docteur ! Ces bocaux viennent d'Égypte et contiennent ce que nous pensons être des échantillons de médecine ancienne. »\n\nFascinant, fascinant. Est-ce l'huile de momie ? »\n\n'... N'est-ce pas ce qu'on trouve sur les corps, avec des propriétés curatives ? La résine autour de leurs bandages ? »\n\n'Oh, non, pas du tout ! La momie est un type d'huile qu'ils trouvent dans le sol, apparentée au pétrole. Pourquoi ? »\n\n'... Je pense qu'il vaut mieux que nous examinions ces médicaments plus en détail. Il existe toutes sortes de teintures. Jetez-y un œil, s'il vous plaît, et je reviens dans un instant. Je dois me débarrasser de... quelque chose. »\n\n'Eh bien, on dirait qu'ils ont été parfumés et... est-ce que vous mangez quelque chose là-dedans ? »" #NT!
 panum.2203.g: "...tu ne manges pas la momie, n'est-ce pas ?" #NT!
 panum.2204.t: "Remèdes à base de plantes?" #NT!
 panum.2204.d: "Après avoir eu le temps d'examiner leurs trouvailles, notre naturaliste a livré au cabinet de notre médecin des plantes aux propriétés potentiellement médicinales." #NT!
 panum.2204.f: "« Ah, vous voilà ! J'étais en train de cataloguer certains des échantillons que nous avons rapportés de la dernière expédition botanique, et j'en ai trouvé quelques-uns qui pourraient vous intéresser. »\n\n« Ah, vraiment ? Comment ça ? »\n\n« Certains d'entre eux sont liés à des plantes aux propriétés médicinales connues, comme celles qui combattent les inflammations ou la fièvre. Certains d'entre eux nous sont complètement étrangers, mais sont accompagnés de bons mots de la part des autochtones et méritent d'être étudiés plus en détail. »\n\n« La phytothérapie n'est pas une science très bonne... mais on ne sait jamais. Il pourrait y avoir quelque chose d'intéressant dans ces plantes. Vous savez les merveilles qu'ils ont découvertes dans le pavot, après tout. »\n\n« Ah, la morphine ! »\n\n« En effet, en effet ! Je vais demander à mes assistants de préparer des échantillons en poudre, pour un examen plus approfondi. »" #NT!
 panum.2204.g: "Je crois que la feuille de coca est particulièrement fascinante, docteur." #NT!
  
  panum_germ_theory_loc: "Current Theory: #V Germ#!"
  panum_miasma_theory_loc: "Current Theory: #V Miasma#!"
  
 panum_physician_achievement_successful_treatments_loc: "\nLe Dr [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] est expérimenté dans le traitement des patients et a #o traité avec succès [GetPlayer.MakeScope.Var('panum_physician_var').GetVariable('panum_physician_successful_treatments_var').GetValue] patients#!." #NT!
 panum_physician_achievement_epidemiologist_loc: "\n[GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetSheHe|U] a étudié les maladies de manière approfondie et est devenu un #o $panum_epidemiologist$#!." #NT!
 panum_physician_achievement_surgeon_loc: "\n[GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetSheHe|U] a effectué de nombreuses interventions chirurgicales et est donc considéré comme un bon #o $panum_surgeon$#!." #NT!
 panum_physician_achievement_psychiatrist_loc: "\nLe Dr [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] a étudié en profondeur l'esprit humain et est un #o renommé $panum_psychiatrist$#!." #NT!
 panum_physician_achievement_military_physician_loc: "\nEn tant que #o $panum_military_physician$#! [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetSheHe] a vu les horreurs de la guerre et sait comment traiter les gens dans des circonstances horribles." #NT!
 panum_physician_achievement_germ_theory_inventor_loc: "\nLe Dr [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] a inventé la #o théorie des germes#! qui a déjà sauvé des milliers de vies." #NT!
 panum_physician_achievement_pneumothorax_inventor_loc: "\nL'une des plus grandes inventions de [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetHerHim] est un #o dispositif pour induire un pneumothorax artificiel#!. Cela entraîne l'affaissement des poumons, ce qui peut aider à traiter la tuberculose." #NT!
 panum_physician_achievement_thoracoplasty_inventor_loc: "\nGrâce à ses compétences chirurgicales, le docteur [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] a inventé une procédure #o qui a révolutionné la chirurgie pulmonaire appelée thoracoplastie#! et a ainsi permis d'améliorer le traitement des patients atteints de tuberculose." #NT!
 panum_physician_achievement_attended_medical_congress_loc: "\n[GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetSheHe] a participé à au moins un #o Congrès médical#! et a partagé [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetHerHis] idées." #NT!
  
 panum_no_epidemic_corruption_modifier: "Pas de corruption épidémique" #NT!
 panum_measles_depression_modifier: "Dépression due à la rougeole" #NT!
 panum_sailor_quarantine_modifier: "La rougeole paralyse les marins" #NT!
  
 panum.600.t: "Épidémie de rougeole" #NT!
 panum.600.d: "Une épidémie a éclaté dans l'un de nos États : la #YELLOW rougeole#! fait des ravages en [SCOPE.sState('panum_disease_state').GetName] !" #NT!
 panum.600.f: "Comme la variole, la rougeole a été mentionnée par le médecin persan Rhazès au Xe siècle et semble avoir été répandue dans la région eurasienne tout au long du Moyen Âge. La rougeole était endémique en Europe jusqu'au XIXe siècle et est devenue encore plus importante avec l'augmentation de l'urbanisation. Une caractéristique particulière de Masenr est l'éruption cutanée qui commence sur le visage et le cou et se propage sur tout le corps en quelques jours. Avec la variole, la rougeole est considérée comme l'une des maladies qui ont frappé une grande partie de la population indigène indienne au XVIe siècle." #NT!
 panum.600.g: "Mais ce n’est qu’une maladie infantile inoffensive… n’est-ce pas ?" #NT!
 panum.620.t: "Fin de l'épidémie de rougeole" #NT!
 panum.620.d: "L'épidémie de rougeole semble terminée. Un dernier couple de parents a enterré leur enfant mort." #NT!
 panum.620.f: "« Comme la rougeole, l'amour est plus dangereux quand il survient tard dans la vie. » - Lord Byron" #NT!
  
 panum.602.t: "L'épidémie de rougeole atteint [SCOPE.sCountry('panum_infected_country').GetName]" #NT!
 panum.602.d: "Nous avons reçu des informations selon lesquelles les premiers cas de rougeole ont été signalés aujourd'hui dans la région de [SCOPE.sCountry('panum_infected_country').GetName]. Les autorités nous reprochent de ne pas avoir fait assez pour empêcher la propagation de la maladie." #NT!
 panum.602.g: "Il n’y avait aucun moyen d’empêcher cela." #NT!
 panum.603.t: "La rougeole tue des enfants" #NT!
 panum.603.d: "Au [SCOPE.sState('panum_disease_state').GetName], l'épidémie de rougeole a été beaucoup plus grave que prévu. Elle a particulièrement touché les nourrissons et les jeunes enfants et a affaibli de manière permanente toute une génération." #NT!
 panum.603.f: "La rougeole a toujours été considérée comme une maladie infantile, même si elle peut également toucher les adultes. Ses effets sont les plus dévastateurs entre 2 et 3 ans. Le taux de mortalité chute ensuite rapidement. En 1963, avant l'invention d'un vaccin, les statistiques officielles estimaient que 2 millions de décès par rougeole survenaient chaque année dans le monde. Environ 5 à 10 % des cas de rougeole se terminaient par un décès." #NT!
 panum.603.g: "N’existe-t-il aucun remède contre cette terrible maladie ?" #NT!
 panum.604.t: "La rougeole paralyse les marins" #NT!
 panum.604.d: "Pour des raisons mystérieuses, la rougeole affecte particulièrement les pêcheurs et les marins. Les taux de mortalité sont négligeables, mais la perte d'emploi est notable dans les chantiers de pêche et chez les baleiniers." #NT!
 panum.604.f: "Au cours de ses recherches aux îles Féroé, Peter Panum a constaté que la rougeole touchait également les adultes, en particulier dans les populations les plus isolées. Les raisons de ce phénomène sont restées longtemps obscures. En principe, on a toutefois pu constater que les pêcheurs et leurs familles vivant loin des villes les plus fréquentées étaient particulièrement touchés." #NT!
 panum.604.g: "Mais qui part en mer maintenant ?" #NT!
 panum.605.t: "Clinique pédiatrique pour la rougeole" #NT!
 panum.605.d: "[SCOPE.sCharacter('panum_government_leader').GetFullName] a constaté le nombre élevé d'enfants atteints de rougeole dans [SCOPE.sState('panum_disease_state').GetName], en particulier parmi les familles les plus pauvres où les taux de mortalité sont plus élevés. Le politicien aimerait financer une clinique pour enfants contre la rougeole et a demandé un don public." #NT!
 panum.605.f: "« C'est une honte de voir les bons parents de [SCOPE.sState('panum_disease_state').GetName] à la merci de cette terrible maladie. Les politiciens doivent agir et prendre leurs responsabilités. Pendant trop longtemps, trop peu a été fait par trop de gens. Un hôpital pour enfants devrait aider à protéger la chose la plus précieuse que possèdent les parents. Nous allons aider. Je vous le promets. Tant que je m'appelle [SCOPE.sCharacter('panum_government_leader').GetFullNameNoFormatting]... comment voulez-vous dire que je fais des discours électoraux ? »" #NT!
 panum.605.g: "Une initiative qui mérite d'être soutenue." #NT!
 panum.605.h: "Ce parti ne veut exploiter la maladie qu’à des fins politiques." #NT!
 panum.606.t: "Dépression due à la rougeole" #NT!
 panum.606.d: "« Les nombreux enfants malades et morts de [SCOPE.sState('panum_disease_state').GetName] ont laissé des traces chez de nombreux parents. Certains parlent de nombreuses personnes qui traversent une crise de vie. »" #NT!
 panum.606.f: "« Mme Miller a dû enterrer son troisième enfant ce mois-ci. Elle n'est qu'une des nombreuses mères qui n'ont plus d'enfant. M. Miller, qui tient une boulangerie en ville, a fermé son magasin depuis plusieurs semaines. De nombreuses familles de cette région sont comme les Miller. Il n'y a guère de clan qui n'ait pas perdu un enfant. Cependant, le fatalisme s'est transformé en mécontentement depuis des semaines. Les gens de cette région sont devenus beaucoup plus sensibles si la situation continue à empirer. Beaucoup de gens blâment désormais le gouvernement pour leur malheur. »\n\nArticle du [SCOPE.sState('panum_disease_state').GetCityHubName] Herald" #NT!
 panum.606.g: "Pas totalement incompréhensible compte tenu de la situation." #NT!
  
 panum.622.t: "Incubation de la rougeole" #NT!
 panum.622.d: "Le Dr [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] a compilé une liste méticuleuse de cas de rougeole qui montre à peu près la période d’incubation de la rougeole." #NT!
 panum.622.f: "« On ne peut nier que le stade de desquamation puisse être infectieux, mais il faut être prudent en acceptant cette opinion dans la mesure où, d'une manière générale, on pourrait soupçonner le contraire. Il semble presque que, parce qu'une période de latence aussi longue ne pouvait être conçue, un stade ultérieur de la maladie ait été choisi comme stade infectant. Dans les villages de Hove et Lobre, sur l'île de Suderø, vers la fin de l'épidémie, il s'est produit un intervalle de plus de quatorze jours entre les générations de l'exanthème dans le même foyer, sans que je puisse démontrer une nouvelle infection de l'extérieur ; pourtant ces deux cas peuvent s'expliquer par une infection qui a été transmise pendant la phase de convalescence. D'après les données présentées ici, je crois que la période d'incubation de la rougeole peut être estimée avec une grande certitude à environ quatorze jours, sans toutefois insister sur le fait que cet intervalle ne peut pas être modifié par des circonstances particulières, comme par exemple un voyage ; de nombreux facteurs parlent a priori contre un tel dicton absolu, ainsi que l'analogie avec l'incertitude des périodes de latence d'autres maladies. » -Pierre Panum" #NT!
 panum.623.t: "Caractère unique de la rougeole" #NT!
 panum.623.d: "Dans une nouvelle étape intermédiaire, le Dr [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] a différencié les différentes formes de rougeole et a non seulement noté les différences avec d’autres maladies similaires telles que la variole, la rubéole et la rougeole, mais a également souligné les symptômes uniques." #NT!
 panum.623.f: "« La littérature sur la rougeole est insignifiante et incomplète en comparaison de celle sur d'autres exanthèmes aigus, comme par exemple la scarlatine et la variole. Hormis quelques rapports épars dans les revues concernant des épidémies isolées, il n'existe que quelques monographies, dont plusieurs remontent au siècle précédent. Cette fièvre exanthémique, certainement inconnue des médecins grecs et arabes, était si insuffisamment différenciée même au siècle dernier que de Haën maintenait l'identité de la rougeole avec la variole, sur la base des symptômes, et les auteurs antérieurs à la fin du XVIIe siècle décrivaient les deux maladies comme appartenant à la même famille. » - Peter Panum" #NT!
 panum.624.t: "Populations vierges et immunité à vie" #NT!
 panum.624.d: "Le Dr [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] a pu récemment démontrer très clairement que lorsque la rougeole touche un individu, elle ne réapparaît pas. Les populations qui n'ont jamais été exposées à la maladie sont donc particulièrement à risque." #NT!
 panum.624.f: "« Il est remarquable de constater que parmi les nombreuses personnes âgées qui vivaient encore aux îles Féroé et qui avaient eu la rougeole en 1781, aucune, autant que j’ai pu le savoir après une enquête minutieuse, n’a été atteinte une seconde fois. J’ai moi-même vu quatre-vingt-dix-huit de ces personnes âgées, qui étaient exemptées parce qu’elles avaient eu la maladie dans leur jeunesse. Cela est d’autant plus remarquable qu’un âge avancé ne diminue en rien la sensibilité à la rougeole, car, autant que je sache, toutes les personnes âgées qui n’avaient pas eu la rougeole dans leur jeunesse ont été atteintes lorsqu’elles ont été exposées à l’infection ; alors que certaines personnes jeunes, bien qu’exposées en permanence, en étaient exemptes. Si le fait d’avoir guéri de la rougeole soixante-cinq ans auparavant pouvait assurer les gens contre une seconde infection, on peut supposer qu’une protection encore plus grande serait offerte par une guérison plus récente » - Peter Panum" #NT!
  
 panum.700.t: "Épidémie de scarlatine" #NT!
 panum.700.d: "Une épidémie s'est déclarée dans l'un de nos États : la #YELLOW Scarlatine#! fait des ravages en [SCOPE.sState('panum_disease_state').GetName] !" #NT!
 panum.700.f: "La scarlatine est connue depuis l'Antiquité et a été bien décrite au XVIIe siècle, notamment par Thomas Sydenham. Si la scarlatine semble avoir diminué de dangerosité au XVIIIe siècle, elle réapparaît au XIXe siècle sous une forme nouvelle. Pierre Fidèle Bretonneau, par exemple, affirme n'avoir connu vers 1800 aucun cas mortel de scarlatine, tandis qu'en 1824 il observe à Tours une épidémie dont la mortalité est telle qu'il la met au même niveau que la peste et le choléra. La scarlatine s'accompagne d'une éruption cutanée caractéristique. Contrairement à la variole ou à la rougeole, la scarlatine se caractérise par une zone amygdalienne gonflée et une langue couleur fraise." #NT!
 panum.700.g: "Chaque enfant doit traverser cela à un moment donné. Espérons-le." #NT!
 panum.720.t: "Fin de l'épidémie de scarlatine" #NT!
 panum.720.d: "L'épidémie de scarlatine qui sévit dans notre pays quitte peu à peu les villes et les villages. De nombreux parents poussent un soupir de soulagement." #NT!
 panum.720.f: "« C'est comme la scarlatine : il faut la guérir. »\n\n« Il faudrait alors inventer un moyen d'inoculer l'amour, comme la vaccination. » - Léon Tolstoï" #NT!
  
 panum.722.t: "Connaissances anciennes" #NT!
 panum.722.d: "Grâce à un antiquaire, [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] a pu trouver plusieurs livres anciens qui résument les descriptions de la scarlatine dans le passé et qui pourraient également être utiles dans le présent." #NT!
 panum.722.f: "On ne peut pas dire avec certitude si la scarlatine était déjà connue dans l'Antiquité ou si elle était confondue avec des maladies similaires telles que la diphtérie, la rougeole et la rubéole. Des traces d'une maladie similaire à la scarlatine existent déjà chez Celse, Caelius Aurelianus, Arataeus de Cappadoce et Aetius d'Amida. Des descriptions similaires sont trouvées dans la région arabo-pérsienne dès le Moyen Âge, notamment chez Avicenne, Ali Abbas et Rhazès. La première description définitive de la scarlatine est celle de Giovanni Filippo Ingrassia de 1553. Une autre position importante est occupée par le médecin Daniel Sennert, également du XVIe siècle. Le nom de « Scarlatine » remonte à Thomas Sydenham et à sa description de 1675. Bien que la description de Sydenham soit considérée comme faisant autorité, elle présente des lacunes importantes et le terme scarlatine semble également avoir été répandu en Angleterre dès le milieu du XVIe siècle." #NT!
 panum.723.t: "Symptômes de la scarlatine" #NT!
 panum.723.d: "Le Dr [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] a progressé dans sa description de la scarlatine et a résumé les symptômes pour la première fois." #NT!
 panum.723.f: "« Les malades ressentent des frissons et des frissons, comme dans les autres fièvres. Les symptômes sont cependant modérés ; ensuite, toute la peau se couvre de petites taches rouges, plus épaisses que celles de la rougeole, plus larges, plus rouges et moins uniformes. Ces taches durent deux ou trois jours, puis disparaissent. Le malade présente non seulement une éruption, mais aussi une inflammation des amygdales. Il peut y avoir des complications telles que des rhumatismes et de l'hydropisie. »\n\nUne lettre du docteur [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] à la Faculté de médecine" #NT!
 panum.724.t: "Scarlatina n'aime pas le larynx" #NT!
 panum.724.d: "Le Dr [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] a identifié les différences spécifiques entre la scarlatine et la diphtérie." #NT!
 panum.724.f: "« Dans la scarlatine, l'inflammation s'étend largement aux amygdales, au palais et au pharynx et n'est pas, comme dans la diphtérie, d'abord limitée à un seul endroit ; et deuxièmement, l'inflammation scarlatine du pharynx n'a pas tendance à se propager aux voies respiratoires. En bref : la scarlatine n'aime pas le larynx. »\n\nUne lettre du docteur [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] à la Faculté de médecine" #NT!
  
 panum_plague_quarantine_modifier: "Quarantaine de peste" #NT!
 panum_plague_hospitals_modifier: "Maisons de la peste" #NT!
 panum_plague_burn_everything_modifier: "Brûlez tout !" #NT!
 panum_plague_rat_killer_modifier: "Tuez tout !" #NT!
 panum_plague_loss_of_trust_modifier: "Perte de confiance" #NT!
  
 panum.800.t: "Le retour de la peste" #NT!
 panum.800.d: "Depuis plusieurs années, des rumeurs courent selon lesquelles la peste serait revenue dans certaines régions de notre pays. Jusqu'à présent, elle se limitait à des zones rurales reculées. Mais avec l'épidémie de [SCOPE.sState('panum_disease_state').GetName], il est enfin clair que la peste étend à nouveau ses doigts noueux !" #NT!
 panum.800.f: "La troisième pandémie de peste (après la peste de Justinien au VIe siècle et la « peste noire » au XIVe siècle) a débuté en Chine à la fin du XIXe siècle. On pense que la pandémie est originaire du Yunnan, où une épidémie s'est déclarée dès 1792, en 1855 et à nouveau en 1866. Une épidémie s'est déclarée dans la ville voisine de Guangzhou à partir de janvier 1894, tuant 80 000 personnes. À partir de mars 1894, des scientifiques et des médecins britanniques à Hong Kong ont pris connaissance de l'épidémie. Après les vagues de choléra des dernières décennies, on s'attendait à ce que la vague de peste provoque de nombreux décès, en particulier en Chine et en Inde, et conduise finalement à l'instabilité des États. Elle coûterait environ 15 millions de vies dans le monde." #NT!
 panum.800.g: "Impossible ! La peste est une maladie du passé oublié !" #NT!
  
 panum.820.t: "Fin de l'épidémie de peste" #NT!
 panum.820.d: "La terrible peste, l'un des pires fléaux de l'humanité, a de nouveau quitté notre pays. Espérons qu'elle reviendra là où elle doit être : dans les abysses de l'histoire." #NT!
 panum.820.f: "« Mais qu'est-ce que ça veut dire, la peste ? C'est la vie, c'est tout. » - Albert Camus" #NT!
  
 panum.802.t: "La peste se propage à [SCOPE.sCountry('panum_infected_country').GetName]" #NT!
 panum.802.d: "Des cas de peste sont désormais signalés également au-delà de nos frontières. Les autorités n'ont apparemment pas réussi à endiguer la maladie. L'ambassadeur a formulé de graves accusations contre nous." #NT!
 panum.802.g: "À long terme, la peste touche tout le monde..." #NT!
 panum.803.t: "Épidémie de peste" #NT!
 panum.803.d: "Une épidémie s'est déclarée dans l'un de nos États : la #YELLOW Peste#! fait des ravages en [SCOPE.sState('panum_disease_state').GetName] !" #NT!
 panum.803.g: "La peste noire frappe à la porte." #NT!
 panum.804.t: "La peste : une troisième vague" #NT!
 panum.804.d: "Des nouvelles inquiétantes nous parviennent du [SCOPE.sCountry('panum_plague_country').GetName]. Une violente épidémie y aurait sévi il y a quelques semaines. Les médecins s'inquiètent : il s'agirait de la fameuse peste." #NT!
 panum.804.g: "Nous devrions organiser une expédition médicale pour nous préparer à cela." #NT!
 panum.805.t: "Quarantaine de peste" #NT!
 panum.805.d: "La situation au [SCOPE.sState('panum_disease_state').GetName] risque de devenir incontrôlable. Des politiciens influents, des chefs d'État et des particuliers réclament une quarantaine pour empêcher la propagation de la peste. Il s'agit principalement de personnes qui ne vivent pas au [SCOPE.sState('panum_disease_state').GetName]." #NT!
 panum.805.f: "Les quarantaines strictes et de longue durée avaient déjà fait leurs preuves au Moyen Âge. Le terme de quarantaine remonte en effet au mot 40 dans la langue italienne et aurait été utilisé pour la première fois en période de peste. La République de Venise en particulier, en tant que nation commerçante avec un trafic maritime important, était connue pour cette mesure, car les villes portuaires et commerciales étaient particulièrement touchées par les épidémies." #NT!
 panum.805.g: "Toute la zone devrait être mise en quarantaine." #NT!
 panum.805.h: "Il ne faut pas dramatiser à l’excès." #NT!
 panum.806.t: "Maisons de la peste" #NT!
 panum.806.d: "Les autorités locales de [SCOPE.sState('panum_disease_state').GetName] ont proposé de créer des maisons de peste pour mieux isoler la population saine de la population malade. Cela affecterait particulièrement les classes les plus pauvres, qui ne peuvent pas fuir comme les riches." #NT!
 panum.806.f: "Une maison de peste était utilisée pour soigner les malades pendant les épidémies de peste. Comme l'épidémie était considérée comme incurable pendant la période de pointe de ces vagues de maladie, à la fin du Moyen Âge et au début de l'époque moderne, et qu'elle n'était donc qu'un soulagement grâce aux soins médicaux, les maisons de peste étaient principalement destinées à isoler les malades de la population saine. À cette fin, des maisons de peste similaires aux léproseries étaient généralement construites à l'extérieur ou à la périphérie d'une ville. Un autre type de maison de peste était destiné à servir à la prévention dans le sens d'une période de quarantaine. Les personnes à proximité immédiate de la peste étaient emmenées dans la maison de peste, qu'elles n'étaient autorisées à quitter que si elles s'avéraient non infectées." #NT!
 panum.806.g: "C'est seulement pour leur bien. Même s'ils ne le veulent pas." #NT!
 panum.806.h: "Cela ne ferait que provoquer des troubles." #NT!
 panum.807.t: "Le médecin de la peste" #NT!
 panum.807.d: "Le médecin chef de l’un de nos hôpitaux spécialisés dans la peste en [SCOPE.sState('panum_disease_state').GetName] a acquis une telle expérience dans ce domaine qu’il pourrait être d’une aide précieuse au niveau national." #NT!
 panum.807.f: "« Laissez-moi passer ! Je suis médecin et je sais exactement comment traiter cette maladie. »" #NT!
 panum.807.g: "Donnez au médecin un poste de haut rang en tant que médecin." #NT!
 panum.808.t: "La fuite des riches" #NT!
 panum.808.d: "Le nombre d'émigrants augmente chaque jour en [SCOPE.sState('panum_disease_state').GetName]. Les familles qui en ont les moyens tentent surtout d'échapper à la peste. Ceux qui ne peuvent pas se permettre une telle évasion sont très mécontents. D'autres avertissent que cela ne fera qu'aggraver la situation." #NT!
 panum.808.f: "« Certains, peut-être les plus sains de jugement, comme nous aussi les plus durs de caractère, affirmèrent qu'il n'y avait pas de remède contre la maladie plus efficace que la fuite ; suivant cette prescription, une multitude d'hommes et de femmes, négligeant tout sauf eux-mêmes, abandonnèrent leur ville, leurs maisons, leurs terres, leurs parents, leurs biens, et s'exilèrent volontairement, ou émigrèrent vers les campagnes, comme si Dieu, en frappant les hommes de cette peste en récompense de leurs iniquités, ne les poursuivait pas de sa colère, où qu'ils soient, mais avait l'intention de détruire ceux qui restaient seuls dans l'enceinte des murs de la ville ; ou estimant, peut-être, qu'il était maintenant temps pour tous de la fuir, et que sa dernière heure était venue. » - Bocaccio" #NT!
 panum.809.t: "Des tas de cadavres" #NT!
 panum.809.d: "Le nombre de morts dues à la peste a atteint des proportions telles qu'il est devenu difficile de le maîtriser. Certains recommandent déjà des brûlages publics et des fosses communes." #NT!
 panum.809.f: "Au plus fort de la peste de 1894 à Hong Kong, les hospitalisations atteignaient en moyenne 80 par jour et le nombre de décès dépassait les 100 par jour. Par le biais du trafic maritime, l'épidémie s'est propagée au reste du pays après 1894 et s'est finalement propagée jusqu'à l'Inde britannique, où environ dix millions d'Indiens ont été tués. Les principales mesures de prévention consistaient à mettre en place des hôpitaux pour pestiférés et à déployer du personnel médical pour traiter et isoler les malades ; à mener des opérations de recherche de maison en maison, à découvrir et à transférer les malades, à nettoyer et à désinfecter les maisons et les zones infectées ; et à créer des cimetières désignés et à désigner une personne responsable du transport et de l'enterrement des morts de la peste." #NT!
 panum.810.t: "La peste noire fait des ravages" #NT!
 panum.810.d: "L'épidémie de peste fait particulièrement rage à [SCOPE.sState('panum_disease_state').GetName] ces jours-ci. De nombreux décès ont été signalés, plus encore que d'habitude." #NT!
 panum.810.f: "La maladie est restée localisée dans le sud-ouest de la Chine pendant plusieurs années avant de se propager. Dans la ville de Canton, à partir de janvier 1894, la maladie avait tué 80 000 personnes en juin. Le trafic maritime quotidien avec la ville voisine de Hong Kong a rapidement propagé la peste dans cette ville, tuant plus de 2 400 personnes en deux mois lors de la peste de Hong Kong de 1894." #NT!
 panum.810.g: "Personne n’échappe à la Grande Faucheuse !" #NT!
 panum.811.t: "Brûlez tout !" #NT!
 panum.811.d: "Le nettoyage et la désinfection des habitations des personnes touchées constituent souvent le seul moyen de stopper la propagation de la peste. Cela implique souvent de brûler tout ce qui entre en contact avec un malade." #NT!
 panum.811.f: "« Je dis donc que telle était l'énergie de la contagion de ladite peste, qu'elle ne se propageait pas seulement d'homme à homme, mais, ce qui est beaucoup plus surprenant, on observait fréquemment que des objets qui avaient appartenu à un malade ou à un mort de la maladie, s'ils étaient touchés par une autre créature vivante, non de l'espèce humaine, étaient la cause, non seulement d'une maladie, mais d'une mort presque instantanée. Ce dont mes propres yeux (comme je l'ai dit un peu plus haut) ont eu connaissance, un jour entre d'autres, par l'expérience suivante. Les haillons d'un pauvre homme qui était mort de la maladie étaient éparpillés sur la rue, deux cochons sont venus là, et après, comme ils ont l'habitude, jouant avec leur groin, ont pris les haillons entre leurs dents et les ont jetés de côté et d'autre autour de leurs jambières ; sur quoi, presque aussitôt, ils se retournèrent quelques fois et tombèrent morts, comme empoisonnés, sur les haillons qu'ils avaient dérangés dans une heure malheureuse. - Boccace" #NT!
 panum.811.g: "Brûlez des vêtements, des meubles et même des maisons si nécessaire !" #NT!
 panum.811.h: "Ce n'est pas nécessaire." #NT!
 panum.812.t: "Tuez tout !" #NT!
 panum.812.d: "On a très tôt soupçonné que les rats pouvaient être porteurs de la peste. Le [SCOPE.sState('panum_disease_state').GetName] appelle à éradiquer spécifiquement les animaux et les nuisibles afin d'empêcher la propagation de la maladie." #NT!
 panum.812.f: "Au lendemain de la troisième pandémie de peste, les villes européennes ont créé de véritables « corps anti-rats » chargés de rechercher et de tuer les animaux ou de les plonger dans des seaux d’essence. Cependant, il a souvent été avancé que d’autres sources de peste, telles que des parasites infectés spécifiques à l’homme ou des parasites mordants, comme les puces et les poux, ont joué un rôle important dans la transmission en Europe pendant la troisième pandémie. Le faible nombre de rats infectés par la peste découverts lors des épidémies européennes suggère qu’ils ont joué un rôle relativement mineur dans la transmission de la peste. Cependant, certains chercheurs ont avancé que les autorités avaient peu de chances de trouver des rats infectés par la peste car ils se cacheraient." #NT!
 panum.812.g: "Exterminer les rats." #NT!
 panum.812.h: "C'est trop cher." #NT!
 panum.813.t: "Perte de confiance" #NT!
 panum.813.d: "De nombreux habitants de [SCOPE.sState('panum_disease_state').GetName] trouvent la situation médicale actuelle scandaleuse. Les nombreux décès et l'échec évident du gouvernement ont conduit à une perte de confiance généralisée envers le gouvernement." #NT!
 panum.813.f: "L'épidémie de peste du XIXe siècle a fait un grand nombre de victimes, notamment en Chine, ce qui a gravement ébranlé la confiance dans le gouvernement et le mandat céleste des empereurs Qing." #NT!
 panum.813.g: "Alors fais ton bazar tout seul !" #NT!
  
 panum.822.t: "La Peste Noire" #NT!
 panum.822.d: "En s'appuyant sur plusieurs sources historiques, le Dr [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] a pu prouver que la nouvelle vague de peste est en réalité une maladie qui correspond à la peste noire du Moyen Âge." #NT!
 panum.822.f: "La découverte de la propagation de la peste en Inde a eu une importance capitale dans la conception de la peste dans son acception actuelle de maladie moderne. Elle a d'abord conduit à penser qu'il n'y avait qu'une seule voie de propagation de la maladie. Les recherches se sont maintenant étendues à un grand nombre de rongeurs et à un grand nombre d'espèces de puces. La mortalité élevée dans les colonies a conduit à des efforts accrus de recherche pour cartographier les caractéristiques de l'épidémie. Le fait qu'il s'agissait toujours de la peste n'a pas été remis en question comme point de départ. La maladie a été désignée sous le terme historique de peste. L'identité de la peste médiévale avec la peste étudiée en Inde a été supposée." #NT!
 panum.823.t: "Saison de la peste" #NT!
 panum.823.d: "Le Dr [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] a épluché tous les documents. Que ce soit lors de cette épidémie ou avant, que ce soit dans un passé proche ou lointain : il n'y a pas d'épidémie de peste en hiver. La raison pour laquelle il en est ainsi reste obscure, mais cela pourrait jouer un rôle dans la recherche des causes de l'apparition de la maladie." #NT!
 panum.823.f: "« Ainsi se termine cette année... Il est vrai que nous avons traversé une grande mélancolie à cause de la grande peste, et j'ai dû supporter de lourdes charges en gardant ma famille longtemps à Woolwich, et moi-même et une autre partie de ma famille, mes commis, à ma charge à Greenwich... Mais maintenant la peste est presque tombée à néant... Mais beaucoup de ceux que je connais très bien sont morts. Pourtant, à notre grande joie, la ville se remplit rapidement et les magasins commencent à rouvrir. Priez Dieu de continuer à faire décroître la peste - car elle éloigne la Cour de son lieu de travail, et ainsi tout va à vau-l'eau en ce qui concerne les affaires publiques, car à cette distance, ils n'y pensent pas. » - Samuel Pepys" #NT!
 panum.824.t: "Peste bubonique et peste pulmonaire" #NT!
 panum.824.d: "Le Dr [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] a pu démontrer qu’il existe plus d’une forme de peste." #NT!
 panum.824.f: "La peste bubonique est généralement considérée comme une maladie infectieuse. La période d'incubation est de quelques heures à sept jours. Les symptômes sont de la fièvre, des maux de tête et des courbatures, une forte sensation de malaise et des étourdissements. Les troubles de la conscience surviennent plus tard. Le nom de peste bubonique vient des bosses très enflées et très douloureuses sur le cou, les aisselles et l'aine. La peste pulmonaire est nettement plus rare. Elle est probablement similaire à la grippe, bien que sa capacité de propagation soit beaucoup plus faible. La propagation est si spécifique qu'elle ne peut devenir épidémique que dans des circonstances particulièrement favorables. Tout d'abord, les sources d'infection sont rares. Seule une petite partie de la population infectée par la peste contracte la peste pulmonaire, par exemple en cas de peste bubonique et de faible résistance." #NT!
  
  
 panum.241.t: "L'expérience du lapin" #NT!
 panum.241.d: "Le docteur [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] a mis au point une expérience audacieuse qui prouvera finalement la contagiosité de la tuberculose. Il s'agit d'inoculation. Et il s'agit de beaucoup de petits lapins morts." #NT!
 panum.241.f: "« Pour ma première expérience, j'ai acheté une paire de lapins mignons de trois semaines dans le but de déterminer la contagiosité de la tuberculose. J'ai aspergé l'un d'eux d'extrait tuberculeux provenant du tissu d'un patient tuberculeux décédé 33 heures auparavant. J'ai répété la procédure deux fois. Après quelques jours, j'ai disséqué les animaux et découvert que le lapin était infecté par la tuberculose.\n\nUn mois plus tard, j'ai répété l'expérience avec trois beaux petits lapins. J'ai répété la procédure à nouveau, en ajoutant plus tard un lapin. J'ai ensuite disséqué un des lapins chaque jour pendant quatre jours consécutifs. Tous souffraient de tuberculose, bien qu'à quatre stades différents de la maladie. Je n'avais inoculé que le premier.\n\nLors de ma troisième tentative, j'ai acquis quatre paires de jeunes lapins mignons, âgés de trois mois... »\n\nExtrait du livret expérimental du docteur [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] « La cause et la nature de la tuberculose »" #NT!
 panum.241.g: "Arrêtez ces terribles expériences sur les animaux !" #NT!
 panum.241.h: "Répétons l'expérience pour être sûr." #NT!
 panum.241.i: "Une troisième expérience sur le lapin pour la science !" #NT!
 panum.241.j: "[GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetSheHe|U] peut tuer autant de lapins que possible pour prouver la théorie." #NT!
  
 panum.261.t: "Pneumothorax artificiel" #NT!
 panum.261.d: "Le docteur [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] a inventé un dispositif qui affaisse artificiellement les poumons et pourrait aider à combattre la tuberculose." #NT!
 panum.261.f: "Avec l'aide de son frère, Carlo Forlanini a conçu et construit un dispositif simple capable d'administrer des gaz par voie intrapleurale. La présence de gaz dans le liquide intrapleural a provoqué l'affaissement du poumon, créant ainsi un pneumothorax artificiel. Après avoir construit l'appareil, Forlanini a essayé de traiter deux cas de tuberculose en provoquant un pneumothorax chez les deux patients et a obtenu des résultats positifs. Au fil des ans, la technique de Forlanini a été développée et améliorée, augmentant ainsi le taux de réussite de la procédure. Le pneumothorax artificiel a continué à être utilisé comme traitement jusqu'à l'introduction de la streptomycine." #NT!
 panum.262.t: "Thoracoplastie" #NT!
 panum.262.d: "Grâce aux compétences chirurgicales du Docteur [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetHerHis], le Docteur [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] a inventé une procédure qui a révolutionné la chirurgie pulmonaire et a ainsi permis d'améliorer le traitement des patients atteints de tuberculose." #NT!
 panum.262.f: "La thoracoplastie est une intervention chirurgicale qui consiste à retirer des côtes ou des parties de côtes d'un côté du thorax afin de provoquer l'affaissement du poumon ou de certaines parties du poumon. Cette procédure remonte à Édouard de Cérenville et était principalement utilisée pour traiter la tuberculose pulmonaire, mais elle est devenue de moins en moins importante avec l'introduction d'antibiotiques efficaces." #NT!
 panum.263.t: "Le Docteur l'a encore fait !" #NT!
 panum.263.d: "Afin de prouver une fois de plus la contagiosité de la tuberculose, le Dr [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] a une fois de plus tué d'innombrables lapins mignons." #NT!
 panum.263.f: "« Des quatre paires que j'ai acquises cette fois-ci, j'ai tué immédiatement le premier animal de la première paire. Il ne présentait aucune lésion pulmonaire. »\n\nExtrait du livret expérimental du docteur [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] « La cause et la nature de la tuberculose »" #NT!
 panum.263.g: "Il s’agit de sauver des vies humaines." #NT!
 panum.263.h: "Ce médecin a un sérieux problème." #NT!
  
