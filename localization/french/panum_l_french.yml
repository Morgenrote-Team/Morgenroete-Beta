 panum_character_treatment_fatal_fallback_loc: "\ \"Qui aurait pensé que couper ce vaisseau sanguin tuerait le patient? \""
 panum_character_treatment_fatal_tripple_death_loc: "Le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a planifié une intervention chirurgicale rapide pour traiter le patient [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]. Le [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] a pu effectuer la chirurgie en un peu plus de 2 minutes mais a ampuré les doigts d'un assistant - qui décède plus tard d'une infection. Malheureusement, le patient est également décédé d'une infection plus tard. De plus, un spectateur dont les queues de manteau ont également été accidentellement coupées se sont effondrées parce qu'il a fait que ses organes vitaux ont été blessés, plus tard, il a été découvert qu'il est mort d'un choc."
 panum_character_treatment_fatal_unwashed_hands_loc: "La chirurgie était parfaite. Le patient était vivant, tous les problèmes ont été résolus et tout le monde ce serait une récupération rapide. Quelques jours plus tard cependant, une infection a été découverte qui s'est propagée comme des incendies de forêt. Quelques heures plus tard, le patient est décédé. Le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] était très confus sur la façon dont cela aurait pu se produire, car le [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] a changé le couteau après la chirurgie précédente quelques minutes plus tôt."
 panum_character_treatment_fatal_forgotten_snack_loc: "Après la mort du patient, une autopsie a été effectuée. À l'intérieur du patient. À la surprise de tout le monde, un sandwich à moitié mangé a été trouvé. Personne ne savait comment cela était arrivé jusqu'à ce qu'un assistant se souvienne que le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a mangé un sandwich pendant la chirurgie."
 panum_character_treatment_fatal_blood_loss_loc: "Au début, la chirurgie s'est bien déroulée. Il semblait que le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] avait pu traiter le patient avec succès. Cependant, le patient ne s'est jamais rétabli. Il semble qu'il y ait trop de sang perdu qui mde le patient très semaine et a entraîné la mort après 3 jours de plus."
 panum_character_treatment_fatal_morphine_overdose_loc: "La chirurgie semblait bien se passer, grâce à l'utilisation de la morphine, le patient n'a ressenti aucune douleur pendant la procédure. Malheureusement, le patient ne ressentait plus de douleur car la quantité de morphine était trop et le patient est mort."
 panum_character_treatment_fatal_drunken_doctor_loc: "Tout le monde était un peu confus lorsque le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a commencé à boire l'alcool médical pendant la chirurgie. Cela n'a pas aidé non plus que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] ait commencé à couper aux mauvais endroits, à crier aux assistants et à finalement frapper une artère majeure. Malheureusement, le patient n'a pas pu être sauvé même après qu'un autre médecin ait été appelé pour aider."
 panum_character_treatment_fatal_forgotten_instruments_loc: "Après une chirurgie réussie, le patient du Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a semblé s'améliorer. Mais juste un jour plus tard, le patient est décédé. Une autopsie a révélé un scalpel qui a été oublié en quelque sorte à l'intérieur du patient. Au fur et à mesure que le patient se déplaçait, le scalpel a commencé à couper à travers les tissus et les vaisseaux sanguins qui ont provoqué des saignements internes."
 panum_character_treatment_fatal_deadly_anaesthesia_loc: "Une chirurgie très réussie a malheureusement eu une fin horrible. Le patient ne s'est jamais réveillé de l'anesthésie. Personne ne sait ce qui aurait pu le causer mais le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] suppose que le corps du patient était déjà trop faible."
 panum_character_treatment_fatal_fake_doctor_loc: "Au début, la chirurgie semblait se passer assez bien. L'un du médecin a quitté la pièce, il n'a pas fallu longtemps jusqu'à ce que la situation change pour le pire. Soudain, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a fait irruption dans la pièce et a dit que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] était tellement désolé d'arriver tard. Tout le monde était confus car le médecin vient de procéder à la chirurgie. Il semble qu'une personne aléatoire prétend être le chirurgien et a effectué la chirurgie. Malheureusement, le patient est décédé et personne ne sait qui est responsable pour la mort."
 panum_character_treatment_fatal_slippery_floor_loc: "Ce fut une grande opération jusqu'à ce que le pied du Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ait rencontré une flaque de sang sur le sol. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] a glissé et est tombé juste au-dessus du patient. Malheureusement, le scalpel a empalé le cœur du patient qui a causé la mort du patient."
 panum.242.t: "Mort de la foule"
 panum.242.d: "Le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] trouve que la tuberculose se produit régulièrement dans des zones densément peuplées, mais seulement rarement dans les régions peu peuplées."
 panum.242.f: "«J'ai examiné de plus près certains des traités qui recommandent des stations de santé climatiques pour guérir la tuberculose. Un article ne me semblait pas convaincant que je pense que mon collègue a confondu la corrélation avec la causalité. Il suppose que les habitants des montagnes sont en meilleure santé car l'air est plus sain et n'est donc pas victime de la tuberculose. Mais n'est-il pas évident qu'en principe, nous pouvons observer que la tuberculose n'apparaît pas dans les montagnes parce qu'il y a moins de gens là-bas? Cela parle pour l'interprétation d'Europe du Sud que nous traitons moins avec le miasme que le contagium. La tuberculose peut être une maladie contagieuse après tout. '\ N \ nfrom Le Journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] in [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]"
 panum.242.g: "Il s'agit d'une théorie qui souligne que la tuberculose est une maladie contagieuse."
 panum.242.h: "C'est une théorie qui souligne que la théorie du miasme est erronée."
 panum.243.t: "Un ermite de tuberculose"
 panum.243.d: "Le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a fait une découverte intéressante dans un échange avec un survivant de la tuberculose."
 panum.243.f: "«Vous avez dit que votre frère est mort de tuberculose?» \ N'Correct. J'avais alors dix-neuf ans. Je l'ai vu mourir sous mes yeux. '\ N'andis que vous êtes également tombé malade plus tard avec la tuberculose?' ' J'ai supposé que comme lui, je mourrais bientôt. C'était sûr pour moi. Je me suis donc retiré dans une zone éloignée pour mourir. Je voulais passer mes derniers jours dans la nature, loin de la civilisation. '\ N'A But que vous avez survécu. Selon vous, quelle est la raison de cela? '\ N'''''sHealthy Eating and Exercise. À un moment donné, j'ai rassemblé suffisamment de force pour surmonter la maladie. '\ N'hm.'"
 panum.243.g: "Est-ce vraiment tout?"
 panum.244.t: "Rien d'héréditaire"
 panum.244.d: "Après de longs examens, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] arrive à la conclusion qu'il n'y a pas grand-chose à suggérer que la tuberculose est en fait une maladie héréditaire."
 panum.244.f: "«Si vous m'aviez dit lors de ma formation que je poursuivrais un jour un travail généalogique, j'aurais été assez surpris. Mais il n'y avait pratiquement aucun moyen de confirmer ma théorie autre que de demander aux familles affectées elles-mêmes, ainsi que les autorités et le clergé. Si la tuberculose est en effet une maladie héréditaire, alors qui peut rester non détectée pendant des générations. Il y a des arbres familiaux entiers sans cas de tuberculose, seulement pour qu'elle élimine soudainement une famille entière. Et c'est un fait frappant que la tuberculose n'est pas une maladie statique et gérable, mais n'est plutôt devenue le danger qu'elle représente aujourd'hui au cours des dernières décennies. Permettez-moi de le dire de cette façon: si la tuberculose est une maladie héréditaire, alors nous avons évidemment tous une prédisposition. Comme vous pouvez le voir dans l'annexe de mon étude, les statistiques parlent d'elles-mêmes. '\ N \ nlecture par [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] à la faculté médicale"
 panum.244.g: "Donc, théoriquement, quelqu'un peut être infecté?"
 panum.245.t: "Tubercules"
 panum.245.d: "Au cours d'un examen anatomique, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a acquis de nouvelles perspectives sur les tumeurs du tissu pulmonaire qui donnent à la maladie son nom."
 panum.245.f: "René Lanence a développé le stéthoscope, à l'origine pour examiner la tuberculose. Dans les années qui ont suivi, il a aidé que la maladie puisse être détectée plus tôt en étant en mesure d'écouter les changements dans le système respiratoire à un stade précoce. Dans le même temps, les connaissances sur le développement de la tuberculose au sein du corps ont augmenté."
 panum.245.g: "Petits progrès - mais progrès."
 panum.246.t: "Style de vie et immunité"
 panum.246.d: "Le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a de graves doutes sur les théories traditionnelles sur la cause de la tuberculose après avoir examiné de manière approfondie plusieurs patients et leurs biographies."
 panum.246.f: "«L'examen de plusieurs patients en [SCOPE.sState('panum_disease_state').GetCityHubName], y compris leurs antécédents personnels, soulève plus de questions que de réponses; à condition que l'on s'attend à des vérités aussi simples que possible, plutôt qu'à de simples fragments de la vérité. Il est vrai que le prolétariat en particulier est gravement affecté par la tuberculose, mais je trouve qu'il est discutable si une personne riche dans le même milieu ne serait pas non plus victime de la maladie. Je suis convaincu que une bonne nutrition, l'air frais et l'exercice physique offrent un certain niveau de résilience contre la maladie - mais je ne pense pas qu'ils puissent donc être exclus en principe. En bref: je crois que l'idée que quelqu'un obtient une tuberculose parce qu'elle est un artiste ou un prolétaire est une affirmation scientifiquement intenable. Si tel était le cas, alors la tuberculose aurait choisi son affiliation ces dernières années et préférerait désormais les travailleurs d'usine comme victimes très spirituellement choisies au lieu de musiciens et de poètes. Personne ne peut sérieusement le croire."
 panum.246.g: "Ce sera une grande déception pour certains génies non reconnus."
 panum.247.t: "Une maladie notifiable"
 panum.247.d: "Le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a expérimenté un système de déclaration du [SCOPE.sState('panum_disease_state').GetCityHubName] qui pourrait aider à freiner la tuberculose."
 panum.247.f: "«La classification de la tuberculose du [SCOPE.sState('panum_disease_state').GetCityHubName] en tant que maladie notifiable a provoqué un certain ressentiment parmi la population parce que de nombreuses personnes considèrent que la maladie est une affaire privée. Mais ce n'est pas le cas, surtout pas lorsqu'il se produit sous forme épidémique. Au moment où une maladie est considérée comme contagieuse - et dans le cas de la tuberculose, il y a beaucoup à suggérer que c'est - c'est une affaire publique qui peut mettre en danger le bien-être public. Mieux vaut avoir une maladie à déclarer qu'une quarantaine. L'isolement des sources individuelles d'infection a montré que la propagation de la tuberculose pouvait être empêchée sans mettre une ville entière dans un état d'urgence. Malheureusement, la stigmatisation que les grues de tuberculose portent désormais auront des conséquences personnelles désagréables. Les personnes souffrant de tuberculose sont désormais traitées comme des lépreux. '\ N \ nfrom Le Journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] in [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]"
 panum.247.g: ""
 panum.248.t: "Tuer les microbes"
 panum.248.d: "Le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a développé un processus chimique basé sur une connaissance antérieure des micro-organismes. Il pourrait empêcher la tuberculose à l'avenir."
 panum.248.f: "La pasteurisation fait référence au chauffage à court terme des aliments liquides ou pâteux à des températures d'au moins 72 ° C à un maximum de 100 ° C pour tuer les phases végétatives des micro-organismes afin de préserver les aliments d'une manière douce. Le processus a été utilisé pour le vin à partir du milieu du 19e siècle. Ce n'est que plus tard qu'il a été utilisé dans le lait cru, à travers lequel les agents pathogènes de la tuberculose bovine pouvaient être transmis à l'homme. La pasteurisation du lait cru a donc joué un rôle dans la contenu de la tuberculose. Cette constatation est plus importante que l'on pourrait d'abord penser: pendant longtemps, les médecins, les biologistes et les chimistes ont supposé que la tuberculose des bovins ne pouvait pas être transmise aux humains. Même l'expert en tuberculose Robert Koch avait tort à cet égard, et il n'a révisé plus tard son opinion - une période où de nombreux enfants ont été infectés par le lait et le beurre de la tuberculose."
 panum.248.g: "Et je pensais que le lait était fondamentalement sain!"
 panum.249.t: "Crachat du Perosnal"
 panum.249.d: "Le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a remarqué un accessoire qui est devenu particulièrement populaire parmi les femmes souffrant de tuberculose. Il a un boîtier en verre bleu sophistiqué qui a l'air si à la mode que vous oublierez que c'est un crachage."
 panum.249.f: "«La plupart d'entre nous ont cela ici. Il a également un nom avec nous, un surnom, assez amusant. Sans aucune retenue, avec un visage obstinément ignorant, elle a prononcé l'expression sombre «Le Blue Heinrich». -Thomas Mann, Zauberberg"
 panum.249.g: "Si chaque personne malade portait quelque chose comme ça ..."
 panum.251.t: "Une maladie cellulaire?"
 panum.251.d: "L'étude des principaux anciens d'un spécialiste allemand sur la tuberculose renverse les résultats précédents du Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] parce que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] n'a pas encore été en mesure de trouver un contre-réponse approprié."
 panum.251.f: "«Il y a des collègues qui affirment passionnément que la tuberculose peut être transmise par l'infection. Lorsqu'ils sont confrontés au fait qu'il y a de nombreux patients qui ont développé la maladie sans être près d'une grue tuberculose, ils affirment qu'il a probablement été infecté il y a des années. Comment prouver cela? Mes propres études montrent plutôt que les tubercules du tissu pulmonaire doivent être interprétés comme une prolifération cellulaire. La tuberculose doit donc être interprétée, comme le carcinome, à la suite de la prolifération des cellules locales. Il peut être clairement identifié comme une maladie constitutionnelle. '\ N \ ndr. Angelika Hasenbein, «Tuberculose, une maladie cancer»"
 panum.251.g: "La tuberculose fonctionne donc comme une tumeur cellulaire?"
 panum.252.t: "Bronchectasie"
 panum.252.d: "Comme le Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] l'a découvert, certaines conclusions présumées selon lesquelles [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] pensaient que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] avait obtenu des patients tuberculose était incorrecte. Ils souffraient d'une maladie complètement différente."
 panum.252.f: "«Malheureusement, certaines recherches se sont avérées être une impasse. J'ai donc cru que certains patients atteints de tuberculose s'étaient rétablis dans certaines circonstances. En réalité, ils n'avaient pas de tuberculose, mais une bronchectasie. Il n'est pas exclu que la tuberculose puisse favoriser la bronchectasie, mais ce sont deux maladies différentes et tous les résultats ne sont donc pas applicables. Cela est susceptible de retarder considérablement la recherche d'une méthode de traitement réussie. '\ N \ nfrom Le Journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] dans [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]"
 panum.252.g: "Temps perdu!"
 panum.253.t: "Charlatanisme"
 panum.253.d: "Une visite à un sanatorium en [SCOPE.sState('panum_disease_state').GetCityHubName] s'est avérée être une déception totale pour le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]."
 panum.253.f: "«De nombreux collègues et des médecins spécialistes reconnus m'ont recommandé le Sanatorium en [SCOPE.sState('panum_disease_state').GetCityHubName]. Il s'agit d'une institution exemplaire qui opère dans le domaine de la tuberculose avec des méthodes extrêmement graves - ont-ils déclaré. Plusieurs patients ont parlé de miracles médicaux qui s'y produisent. \ N \ nhowever, après des semaines de visite, j'ai réalisé que c'était principalement du marketing. Alors que les médecins sur place m'ont assuré à quel point les chances de rétablissement étaient formidables, j'ai découvert exactement le contraire. Lorsque j'ai parcouru les dossiers des patients, j'ai constaté que près de 50% des patients admis sont morts la première semaine. Tout ce sanatorium est une arnaque! \ N \ nfrom du Journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] in [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]"
 panum.253.g: "Mais ... mais ... le dîner devrait être excellent!"
 panum.254.t: "Contact avec la mort blanche"
 panum.254.d: "Apparemment, les nombreuses visites aux patients atteints de tuberculose ont un effet involontaire: le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] crache du sang aujourd'hui!"
 panum.254.f: "«Quelle journée malheureuse. Mes transactions avec la tuberculose et mes connaissances supposées de la maladie se vengent maintenant. D'une part, j'avais tort à tant de niveaux qu'il est juste que ma fierté soit puni. D'un autre côté, c'est une indication qu'il s'agit d'une maladie contagieuse. Mais à quel prix ai-je eu pour faire cette découverte? \ N \ nfrom Le Journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] in [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]"
 panum.254.g: "Le médecin se remettra de cela - non?"
 panum.264.t: "De contagione"
 panum.264.d: "Les intérêts historiques du Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ont conduit [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] à rencontrer un ancien livre de la Renaissance - qui a une valeur incommensurable."
 panum.264.f: "Dès 1546, le médecin veronais Girolamo fracastoro a postulé que les maladies étaient principalement causées par une infection par de minuscules particules qui rappelaient les germes ultérieurs. Il doutait donc de la théorie du miasme il y a plus de 300 ans. En ce qui concerne la tuberculose, Fracastoro dit également qu'il s'agit d'une maladie contagieuse transmise par ces agents pathogènes. Le livre est parfois plus convaincant que de nombreux traités modernes. Ce qui est révolutionnaire, c'est que Fracastoro suppose que ces soi-disant «Fomites» entrent via le système respiratoire ou les pores du corps afin de chercher de la nourriture. Cela ferait progresser la maladie."
 panum.264.g: "Cela stimulera la recherche d'un traitement."
 panum.264.h: "C'est beaucoup plus convaincant que la théorie du miasme."
 panum.264.i: "Un petit agent pathogène pourrait-il provoquer une tuberculose?"
 panum.240.t: "Tuberculose - une maladie contagieuse"
 panum.240.d: "Grâce à plusieurs expériences et examens des patients, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a pu prouver de manière concluante que la tuberculose n'est pas seulement une maladie contagieuse, mais a également pu en tirer plusieurs méthodes de prévention de cela dans le traité [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] '[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_treatment_title')]'."
 panum.240.f: "«Les connaissances selon lesquelles la tuberculose est une maladie qui peut être transmise de personne en personne et également d'un animal à une personne mène à toute une série de mesures pour empêcher la maladie. L'utilisation de spittoons publics et personnels. \ nfourth, la santé publique doit être améliorée pour minimiser l'infection parmi les prolétaires. \ nfifth, la pasteurisation du lait cru est essentielle. '\ n \ nfrom: [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_treatment_title')]"
 panum.240.g: "La tuberculose n'est plus le destin."
 panum_add_dubious_yellow_fever_treatment_clues_effect_tt: "Cela donne un indice ... probablement."
 panum.540.t: "Prévenir? Empêcher!"
 panum.540.d: "Après des semaines de recherche et d'études, notre médecin a conçu un moyen d'arrêter la propagation de la fièvre jaune!"
 panum.540.f: "'... mais à la fin, une preuve est restée, certaine et inexcusable. Que ce soit par net, fumée ou pesticide, mon enquête a révélé que chaque fois que le chemin du moustique était interrompu pour une raison quelconque, la propagation de la fièvre jaune était interrompue. Il doit donc s'agir d'une maladie insectorne. Si nous pouvons interrompre le processus de frai, nous pouvons très bien empêcher les nouveaux moustiques d'arriver pour infecter notre peuple. Ce n'est qu'une question de moyens, et j'ai conçu un plan à trois points. \ N \ ni: Vaporisez les étangs locaux, les tourbières et les marécages avec des pesticides pour les rendre inadaptés au frai. Si possible, égoutter entièrement des plans d'eau. en action, alors nous pourrions bien voir la fin de la fièvre jaune endémique de notre vie, et la fin de cette plus persistante des ennemis. '\ n \ nfrom: [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_treatment_title')] par Dr.[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]"
 panum.540.g: "Bravo, docteur. Maintenant, pour obtenir des moustiquaires et des insectes ..."
 panum.541.d: "Docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], notre médecin en chef, est arrivé au [SCOPE.sState('panum_disease_state').GetName] pour enquêter sur la mystérieuse fièvre jaune."
 panum.541.f_america: "«Nous sommes arrivés à [SCOPE.sState('panum_disease_state').GetCityHubName] bien avant l'aube, notre train atteignant la gare pour trouver une plate-forme dépourvue de passagers et avec une fiole de soupe chaude pour le conducteur et ses collègues du moteur. Peu d'hommes pourraient quitter un train si tôt le matin, mais j'avais été peu en mesure de me reposer; Les lettres et les notes du gouvernement local pesaient lourdement dans mon esprit, car ils parlaient d'une étrange maladie, de la fièvre jaune. Le nom provient de la jaunisse qui vient avec la maladie, bien que ce ne soit guère la fin des problèmes - vomissements, douleurs de l'abdomen, saignement des yeux, et ces tues de nombreux. C'est là que j'ai trouvé le but et l'énergie pour réveiller mes collègues, et les conduire du train et dans la ville, sous la lueur des lampes à gaz autour duquel les moustiques bourdonnent sans cesse. Si nous voulons jamais vaincre cette maladie, nous devons apprendre la plus grande question de tous. Que combattons-nous?"
 panum.541.f_africa: "«Il était juste après midi lorsque notre navire s'est arrêté dans le port, et le capitaine nous a informés que nous avions atteint notre destination. L'un des grands avant-postes de notre empire colonial, l'administration locale avait renvoyé le mot à la capitale d'une étrange maladie mortelle qu'ils avaient du mal à comprendre - pas de grippe commune, mais la infâme fièvre jaune. Ce n'est pas un véritable étranger à moi, ni à personne bien lue sur l'histoire de la maladie tropicale ... mais pour tout ce que nous connaissons de ses nombreux moyens de tuer, nous connaissons si peu la maladie elle-même. \ N \ naccompanied par mes assistants et une escorte armée, nous avons établi un laboratoire non loin du centre de la ville. Là, nous pourrions garder nos échantillons, faire notre maison et effectuer les recherches nécessaires pour déchiffrer les mystères de la fièvre jaune ... mais d'abord, nous devons trouver ces échantillons, et la présence incessante de moustiques est une distraction indésirable. Pourtant, cela ne nous tiendra pas de notre travail. '\ N \ nfrom Le Journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], écrivant de fièvre jaune dans [SCOPE.sState('panum_disease_state').GetName], [TimeKeeper.GetCurrentDate.Format('y')]"
 panum.541.g: "Venez, messieurs ... bâille."
 panum.541.h: "... Damned Mosquitoes."
 panum.542.t: "Guerres d'hier"
 panum.542.d: "Dans le but d'en savoir plus sur l'histoire de la fièvre jaune dans ces terres, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a décidé de consulter le commandant d'une garnison locale."
 panum.542.f: "«Ah, ravi de vous voir, docteur. Mes hommes sont toujours heureux de savoir qu'ils sont entre de bonnes mains si la maladie vient. Que puis-je faire pour vous? '\ N'LE PLUSE EST LE MINE, COLONEL. On m'a dit que vous pourriez avoir des enregistrements de campagnes passées ici? En avez-vous qui pourraient avoir vu une épidémie de fièvre jaune parmi les troupes? '\ N'oh, très certainement ... ici. C'était une terrible campagne, c'était, croyez-moi, et pas seulement l'ennemi. De nombreux gars qui meurent dans la guerre meurent des éléments, de la maladie, de l'exposition. Ils l'appellent l'attrition. '\ N's ... l'attrition était particulièrement mauvaise, alors?' \ N'Worse que mauvais. Entre la maladie et la saison des pluies, un homme avait plus à craindre au camp que sur le champ de bataille. La chaleur était aussi horrible et les insectes."
 panum.542.g: "Insectes, maladie, pluie ... un enfer de la propre fabrication de la nature, pourrait dire."
 panum.543.t: "Champs de malheur"
 panum.543.d: "Mission [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] continue pour en savoir plus sur la fièvre jaune, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a voyagé hors de la colonie à un foyer apparente de l'infection - une ferme rurale."
 panum.543.f: "«Je l'admets, il a fallu près d'une heure pour apprendre à comprendre cet accent rural, mais le propriétaire de la ferme s'est avéré assez informatif. Bien que cette région soit souvent assez humide, il y a toujours le besoin de travaux d'irrigation. Pourtant, creuser ces tranchées prend une force significative, fournie par de nombreuses dizaines de travailleurs locaux, qui vivent souvent ensemble dans une caserne crampée et encombrée. De telles conditions peuvent engendrer une maladie, et il n'est pas surprenant que la fièvre jaune soit trouvée là-bas avant longtemps. \ N \ n le fermier lui-même croit qu'il provenait d'un marchand itinérant d'une certaine sorte, ou peut-être avec les commerçants qui ramassent les outils de récolte ou de livraison, il ne peut pas dire avec certitude, mais je douterais de cela moi-même. Il ressemble plus à cette fièvre jaune émergé ici seul ... mais si oui, alors comment? '\ N \ nfrom du Journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], écrivant de fièvre jaune dans [SCOPE.sState('panum_disease_state').GetName], [TimeKeeper.GetCurrentDate.Format('y')]"
 panum.543.g: "Comment une maladie pourrait-elle simplement ... sortir de nulle part?"
 panum.544.t: "L'eau ...?"
 panum.544.d: "Enquêtant sur la possibilité que la fièvre jaune pourrait être une maladie d'origine hydrique, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a rassemblé des échantillons à partir de voies navigables et de puits locaux."
 panum.544.f: "«Une possibilité que j'avais considérée était que cette maladie pourrait être de nature similaire au choléra, qui pourrait être transportée dans l'eau malade. Décidant de voir si c'était le cas, j'ai ordonné à mes assistants de rassembler des échantillons avant de trouver un endroit calme pour mon microscope, où je pourrais travailler sans être perturbé. L'air humide et tropical est distrayant, tout comme le buzz incessant des moustiques, mais avant longtemps, les échantillons ont commencé à glisser sous la lentille, me permettant de regarder dans cette moindre monde. Certains étaient plus sales que d'autres, portant même des vers de minuscules et autres, mais ceux-ci ne correspondaient pas au motif de l'infecté, qui se disperse à travers la carte comme un spray de baignoire. Quoi qu'il en soit, je ne trouve aucun indice sur la nature de la fièvre jaune dans cette eau ... '\ n \ nfrom du Journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], écrivant de la fièvre jaune dans [SCOPE.sState('panum_disease_state').GetName], [TimeKeeper.GetCurrentDate.Format('y')]"
 panum.544.g: "... Mais s'ils ne sont pas là, alors où se cachent-ils?"
 panum.545.t: "L'île"
 panum.545.d: "Intéressé par une «rupture» apparente dans le modèle des infections, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] s'est aventuré dans un endroit inhabituel - une pêche insulaire."
 panum.545.f: "«Ah, tu dois être docteur ... oh. Pardonnez la puanteur, docteur. Attention, vous ne tombez pas non plus. Les poissons qui mangent les tripes que nous jetons sont comme vous manger, s'ils le peuvent. '\ N' ... s'il vous plaît, faites-le rapidement. Parlez-moi de cet endroit. '\ N'aye, eh bien, je pense que vous serez heureux de savoir qu'il n'y a pas de maladie ici. Pas cette fièvre jaune, de toute façon. Y a-t-il quelque chose qui pourrait épargner vos hommes? '\ N'MIGHT qu'ils passent si peu de temps à terre. La plupart du temps, ils sont en mer, et certains vont plus loin et ne reviennent pas pendant un jour ou plus. Mais il doit y avoir plus que cela, je pense. Ils passent leur temps libre ici sur l'île, dans la caserne ou dans leurs maisons, et il n'y a pas de fièvre ici du tout. '\ N'en enquêterai ... Non, mes assistants peuvent après mon retour.' \ N'IT SERVEZ que tout le monde savoir, Docteur ... et ils n'ont même pas dit au revoir. ''"
 panum.545.g: "... Mais d'abord, un bain savonneux. Un bain très, très savonneux."
 panum.546.t: "Gas de marais?"
 panum.546.d: "Dans ce qui pourrait être un retour obsédant de l'ancienne théorie du miasme, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a trouvé des rapports surprenants - la fièvre jaune pourrait être liée aux fumées des marais!"
 panum.546.f: "«Cela me fait mal à quel point cela semble si peu ici. Rien ne s'aligne sur les théories établies que nous connaissons, et je me retrouve à serrer les pailles. Cependant, il y a une ligne de promesse - les marécages. Mes assistants ont préparé des diapositives pour le microscope, et ils regorgent et prospèrent de microbes, mais rien que nous pourrions identifier. Et pourtant, malgré cela, la peste explose sur les rives. Les maisons près de ces tourbières sont les moins touchées par la fièvre jaune. Certains mentionnent même l'avoir dans l'enfance. \ N \ nand pourtant, il n'y a aucun signe de ... comment. Ils ne boivent pas l'eau, ils ne mangent pas de poisson pris dedans, et pourtant la puanteur de celle-ci se promène sur leur maison sur la brise, les inonde de puanteur et la maladie suit bientôt. Les anciens textes crieraient «Miasma», mais cela ne peut pas l'être ... mais sinon, comment la maladie pourrait-elle se répandre du marais à la maison?"
 panum.546.g: "... ou peut-être que c'est astrologique ... non, cela n'a aucun sens ... n'est-ce pas?"
 panum.547.t: "Le rival"
 panum.547.d: "Décidant de rechercher une expertise locale, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a décidé de visiter un allié potentiel - le coroner local."
 panum.547.f: "«Ah, ravi de vous rencontrer, docteur. Mes excuses si nous ne serrons pas la main, j'ai un corps sur la dalle dans l'autre pièce. '\ N'Yel Fever?' \ N'YVI le penserait, mais non. Le paludisme, le croiriez-vous? De toutes les fois pour voir une épidémie, nous l'obtenons maintenant, en même temps. '\ N'an malheureuse coïncidence?' \ N'en peut-être, mais je suis ici assez longtemps pour avoir vu un modèle. Les deux ont tendance à venir par paires, et pire encore, ils ont des symptômes similaires et des décès similaires. En fait une terrible corvée pour distinguer les deux, je vous le dis. Je les aurais pensé la même chose. '\ N'AUS ... assez fascinant, en fait. Avez-vous de bons records de cela? '\ N'OH, bien sûr. Je vais demander à mon assistant de vous les envoyer, même si je ne sais pas à quel point ils pourraient être utiles. Je ne sais pas comment cette chose se propage, docteur, mais je parierais si vous pouvez trouver l'un, vous pourriez trouver l'autre."
 panum.547.g: "Ensuite, nous pourrions peut-être tuer deux oiseaux avec une pierre."
 panum.548.t: "La route fourchue"
 panum.548.d: "Intéressé par la nature de la fièvre jaune, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a écrit dans la capitale pour demander d'autres instructions."
 panum.548.f: "'... et pourtant, essayez comme je le ferais, je me retrouve à perdre sur la façon de procéder. Il y a peu de «racontes» pour guider mon cours d'enquête, et bien que j'aie examiné un grand nombre de revues médicales et consulté avec des experts locaux, je ne suis pas entièrement certain de ce qu'est vraiment la fièvre jaune. Une maladie à être certaine, mais de quel genre? Une maladie de l'air, comme dans un miasme? Quelque chose dans l'eau ou dans la nourriture? Comment se propage-t-il de l'homme à l'homme, ou peut-être, du marais à l'homme? Si je ne trouve pas la maladie, je ne peux pas espérer le combattre directement, mais mon enquête n'est pas entièrement sans fruits. J'ai peut-être trouvé deux avenues de recherche possibles à considérer: \ n \ nfirstly, afin que nous puissions essayer de trouver un modèle sur la façon dont il est réparti. Peut-être qu'avec une enquête ciblée, nous pouvons discerner une logique sur la façon dont la maladie est transmise, et l'interrompre ainsi. Peut-être que l'arrêt de la propagation révélera la vraie cause. \ N \ nsecond, que nous essayons de concevoir une forme de guérison ou de vaccin, peut-être en étudiant les enfants qui en étaient infectés dans la jeunesse mais qui ont récupéré complètement, ainsi que ceux qui survivent. Nous ne connaissons peut-être pas ses origines, mais nous pouvons peut-être le mieux le mieux."
 panum.548.g: "Une once de prévention vaut une livre de remède."
 panum.548.h: "Nous jouons pour toutes les billes. Nous aurons un vaccin."
 panum.551.t: "Le chemin de la prévention"
 panum.551.d: "Après l'instruction de la capitale, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a commencé à étudier comment empêcher la propagation de la fièvre jaune."
 panum.551.f: "'... Bien sûr, il est difficile de déterminer ce qui doit être fait exactement pour empêcher la propagation d'une maladie que nous comprenons à peine plus que la façon dont elle pourrait induire la mort. Pourtant, si c'est le défi auquel je dois faire face, alors tant pis. J'ai découvert un certain nombre de pistes prometteuses jusqu'à présent; Ma carte de l'infection est sporadique, mais ici et là, certaines îles d'irrégularité apparaissent ... des endroits où l'épidémie tombe de manière significative, même entièrement. \ n \ ni peut peu prétendre à vraiment comprendre la nature de cette maladie, mais la maladie n'est guère irrégulière. Il y a un modèle ici, en attendant d'être découvert, et s'il peut être trouvé, nous pourrions très bien résoudre ce puzzle et être débarrassé de la fièvre jaune pour de bon. '\ N \ nfrom du Journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], écrivant de fièvre jaune dans [SCOPE.sState('panum_disease_state').GetName], [TimeKeeper.GetCurrentDate.Format('y')]"
 panum.551.g: "Nous construisons une forteresse, une brique à la fois."
 panum.552.t: "Fiffet o 'Faits"
 panum.552.d: "Tout en travaillant sur un moyen d'empêcher la propagation de la fièvre jaune, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a été visité par l'un des assistants [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]."
 panum.552.f: "«Ah, c'est bon de vous revoir, mon garçon et - mon Dieu! Quelle est cette odeur de puanteur? J'ai trouvé quelque chose de très intéressant! J'ai examiné comment la fièvre jaune n'a pas affecté les hommes de la pêche et j'ai commencé à la suivre jusqu'au continent. Il y a un fumoir sur le rivage, et les travailleurs partent par elle, et personne ne fait de la fièvre jaune là-bas. Et cela m'a fait penser ... peut-être que la fumée l'éloigne? Donc, j'ai commencé à chercher des endroits avec beaucoup de fumée, et j'ai trouvé ce savon, et ils ont mis des herbes et des huiles dans leur brûleur. Pas une seule fièvre jaune dans leur ménage. '\ N'hmmm ... c'est un travail fascinant. Continuez vos observations et tenez-moi informé et, oh, bon travail."
 panum.552.g: "Des étapes impatientes envoient l'assistant ... mais laisse le médecin à réfléchir."
 panum.553.t_america: "La mission"
 panum.553.d_america: "Suite à la voie des lacunes dans l'épidémie, les recherches du Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] les ont conduits à une ancienne mission coloniale."
 panum.553.f_america: "«Il n'a pas fallu longtemps pour trouver la mission ici. C'était l'un des premiers bâtiments soulevés après la colonisation, nos ancêtres frais à partir de terres qu'ils pourraient ne plus jamais revoir. Ce n'est pas une grande cathédrale, mais elle a été construite avec amour, et au fil du temps, les missionnaires et les membres de la mère église l'ont vu grandir, explosant avec des quartiers et des salles. C'était l'un des premiers endroits où les malades pourraient être amenés, entretenus par les religieuses et tous les volontaires pieux prêts à aider. \ N \ nby Tous les comptes, il aurait très bien dû devenir un abattoir qui lui est propre ... et pourtant, ce n'est pas le cas. Alors que d'autres hôpitaux comptent leurs morts et voient la maladie sauter de Ward à Ward, ici, rien. Une famille a été amenée après le feu de TA House, mais après une semaine, aucun d'entre eux n'a attrapé de la fièvre jaune, malgré son abri mais à quelques pièces. Cela me laisse perplexe, car la mission et l'hôpital se ressemblent, mais il y a une différence majeure: les filets. Un sermon est une chose sacrée, et ne peut pas être interrompue par des moustiques bourdonnants et leurs semblables, donc le clergé a mis des filets sur chaque fenêtre pour empêcher les moustiques, même dans les quartiers. \ N \ nand comme ça, la fièvre jaune semble disparaître entièrement."
 panum.553.g: "Car je vais vous restaurer la santé ..."
 panum.553.t_africa: "Le bidonville"
 panum.553.d_africa: "Après la voie des lacunes dans l'épidémie, les recherches du Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] les ont conduits dans un endroit curieux - les bidonvilles."
 panum.553.f_africa: "Les bidonvilles étaient assez proches pour faire douter de tout homme l'importance de notre grande entreprise coloniale dans ces terres. Filthy et misérable, emballé à l'éclatement de femmes et d'enfants, attendant que leurs hommes reviennent des plantations ou des mines ou partout où elles pourraient travailler. Les pompes à eau surmenées remplissent les pots, les mouches du buzz et un manque d'assainissement distinct se combinerait tous pour faire en sorte que cet endroit ressemble à un chaudron de maladie. En effet, il est. \ N \ na Rare Sight dans ces endroits, un médecin comme j'ai été emmené avec impatience de maison en maison par des guides locaux et avec l'escorte de la gendarmerie, a demandé de donner un aperçu d'une maladie ou de l'autre. En échange, je leur ai posé des questions: qu'en est-il de la fièvre jaune? J'ai vu des cas de choléra et de dysenterie, mais pas la maladie pour laquelle je chasse. Une femme a pointé vers les fenêtres, ou où ils devraient être - au lieu du verre, un mur de tissu, un filet. Pour eux, il a gardé le paludisme, mais aussi, peut-être, la fièvre jaune ... qui, selon eux, pourrait très bien être perdue par les insectes. '\ N \ nfrom du Journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], écrivant de fièvre jaune dans [SCOPE.sState('panum_disease_state').GetName], [TimeKeeper.GetCurrentDate.Format('y')]"
 panum.553.h: "... Et peut-être, juste peut-être, les habitants ont raison?"
 panum.554.t: "Le plus gros tueur"
 panum.554.d: "En lisant les dossiers qui leur sont donnés par les forces militaires locales, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a fait une découverte."
 panum.554.f: "«Ah, c'est bon de vous rencontrer à nouveau, colonel. J'ai des questions sur ces dossiers que vous m'avez donnés? Avez-vous un moment à perdre? '\ N'OH, mais bien sûr! Tout à aider. '\ N'it mentionne ici que la dernière campagne a été menée par un officier qui, semble-t-il, profondément troublé par les piqûres d'insectes. Les piqûres ne font qu'une partie de la vie dans ce pays, mais d'où elles venaient ... aucune. '\ N'I VOIR, je vois ... mais elle mentionne aussi que l'armée a été affligeée à la fois avec le paludisme et la fièvre jaune, qui a tué plus par la maladie que dans la bataille.' \ N'ATTRITION EST LONGE UNE PARTIE DE WARFARE, j'ai peur. '\ N' ... mais une fois qu'ils ont ordonné de faire l'usage de Pyrethrum, les cas de la pavillon jaune et de mal. Puis, une semaine plus tard, il a commandé la pulvérisation de la région, et encore une fois, les taux ont chuté. Qu'est-ce que c'est exactement ce pyrethrum?"
 panum.554.g: "«Oh, Pyrethrum? Il est utilisé pour détenir les troupes. Tue les insectes, vous voyez."
 panum.555.t_america: "Les souvenirs d'antan"
 panum.555.d_america: "Enfermé dans la bataille contre une maladie qui tourmente en Amérique du Sud depuis des siècles, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] chasse des réponses dans un endroit étrange - le passé."
 panum.555.f_america: "«Certains disent que le passé est un pays différent. Dans les Amériques, c'est peut-être plus vrai que partout ailleurs, car beaucoup de choses ont changé depuis Columbus, mais à ma grande surprise, la maladie que je combat n'est pas une. Il a fallu des semaines pour retrouver les revues et les dossiers des premiers colons de ces terres, mais enfin, ils ont fait leur chemin entre mes mains. C'est une découverte précieuse. Avec eux, j'ai les récits des médecins antérieurs, des esprits brillants qui auraient pu manquer des outils que nous tenons aujourd'hui pour acquis. \ N \ nyet, alors que nous avons peut-être hérité de leur bataille inachevée, ils nous ont laissé des informations précieuses qui pourraient me permettre de terminer ce qu'ils ont commencé. Il y a une précieuse révélation, cachée, difficile à remarquer sans de tels comptes. De temps en temps, il y a une explosion de fièvre jaune dans cette région, presque comme un travail d'horlogerie. Cela seul est inutile, mais il est en corrélation presque exactement avec des revues qui parlent de pluie intense et même d'inondations, enregistrées ici comme des maisons emportées par des inondations qui sont ensuite suivies par des épidémies de fièvre jaune. Les deux pourraient-ils être liés?"
 panum.555.g: "Nous nous tenons tous sur les épaules des géants ... ils avaient juste moins de géants sur lesquels se tenir."
 panum.555.t_africa: "Remèdes folkloriques"
 panum.555.d_africa: "Peut-être controversé, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a demandé les conseils des personnes qui pourraient connaître la fièvre jaune le mieux - les indigènes."
 panum.555.f_africa: "«Il y a ceux qui m'appelleraient fou pour avoir choisi de consulter les indigènes plutôt qu'un journal médical, mais je pense qu'ils manquent de raisonnement solide pour un tel jugement. La fièvre jaune est une maladie trouvée ici, en Afrique, et ces gens ont vécu ici beaucoup plus longtemps que nous. En effet, il y a la chance que cette maladie ait émergé dans ce pays en premier lieu. C'est peut-être le cas, pour de nombreuses épidémies ici, les Européens peuvent faire l'objet d'Européens et d'autres avec facilité, mais donner aux Africains indigènes rien de plus que des symptômes apparentés à une grippe légère. \ N \ NYET, malgré cela, il y a une compréhension. J'ai parlé avec un certain nombre de guérisseurs locaux et même des représentants de tribus plus loin dans la terre, et ils mentionnent certaines pratiques préventives ... l'incendie de la bouse d'éléphants et de diverses plantes, portant même cette fumée à l'intérieur, ce qui pousse les moustiques qui, selon eux, sont liés au paludisme, et peut-être, à la fièvre jaune. Plus que cela, ils ont un moyen de lire le terrain qui les entoure et de prédire le début de la saison «pluvieux», qui, selon eux, correspond au pire du paludisme et de la fièvre jaune. Cela prendra une étude et une considération plus approfondies, mais cela est prometteur. '\ N \ nfrom Le Journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], écrivant de la fièvre jaune dans [SCOPE.sState('panum_disease_state').GetName], [TimeKeeper.GetCurrentDate.Format('y')]"
 panum.555.h: "Sagesse, à l'endroit le moins attendu."
 panum.556.t: "Tissu simple?"
 panum.556.d: "Bien que destinés à soutenir nos troupes dans une garnison de la frontière, de nouveaux tissus imprégnés d'insecticides sont arrivés dans la même ville que le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] enquête."
 panum.556.f: "«Êtes-vous censé être dans ce domaine - oh, je vois, vous êtes le médecin de la capitale. Je ne sais pas s'il y a beaucoup ici pour vous, docteur. Il n'est pas un seul cas de cette fièvre ici. '\ N' ... que je peux le dire. Qu'est-ce que c'est? Voir? Regardez le sol. Des dizaines de salauds, sont déjà morts. '\ N'it doit être très efficace pour les tuer si rapidement. Combien d'hommes restent dans ces tentes? '\ N'HET La plus partie d'un bataillon, probablement environ six cents. Le tissu est nouveau depuis que les anciens ont été détruits dans une mousson l'année dernière. Temps terrible, fièvre partout et paludisme aussi. Maintenant, nous avons ça, rien."
 panum.556.g: "... Vous venez de dire qu'il n'y a pas une seule fièvre depuis que vous avez ce nouveau tissu?"
