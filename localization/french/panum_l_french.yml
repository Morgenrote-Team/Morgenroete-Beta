 panum_has_psychiatrist_tt: "[GetPlayer.GetName] a [concept_panum_physician] avec le psychiatre #V [concept_character_trait]#!."
 je_panum_functionalism: "École psychologique du fonctionnalisme"
 je_panum_functionalism_reason: "La psychologie fonctionnelle ou le fonctionnalisme fait référence à une école psychologique de pensée qui était une excroissance directe de la pensée darwinienne qui concentre l'attention sur l'utilité et le but du comportement qui a été modifié au fil des années d'existence humaine. Edward L. Thorndike, surtout connu pour ses expériences avec l'apprentissage des essais et des erreurs, est devenu le leader du mouvement vaguement défini. Le fonctionnalisme nie le principe de l'introspection, qui tend à étudier le fonctionnement interne de la pensée humaine plutôt que de comprendre les processus biologiques de la conscience humaine. \ N \ neach pays ne peut établir que le #R One#! Psychological School."
 je_panum_psychoanalysis: "École psychologique de psychanalyse"
 je_panum_psychoanalysis_reason: "La psychanalyse est une théorie psychologique, la théorie culturelle, la forme psychothérapeutique du traitement et la méthode de conscience de soi, qui a été développée vers 1890 par le docteur viennais Sigmund Freud a été fondée. Le terme psychanalyse représente le modèle de description et d'explication de la psyché humaine basée sur les théories de Freud sur la psychodynamique de l'inconscient ainsi que de la psychothérapie analytique et de la méthodologie psychanalytique, qui traite également de l'enquête sur les phénomènes culturels. Dans les trois aspects, la psychanalyse continue d'être développée et modifiée par les cliniciens et les chercheurs aujourd'hui. \ N \ neach Le pays ne peut établir que la #R One#! Psychological School."
 je_panum_analytical_psychology: "École psychologique de psychologie analytique"
 je_panum_analytical_psychology_reason: "La psychologie analytique est une école psychologique psychanalytique fondée par le psychiatre suisse Carl Gustav Jung en 1913. Semblable à la psychanalyse, il traite des parties inconscientes de la psyché humaine, en supposant que l'inconscient a une influence beaucoup plus grande que la perception consciente. Jung et ses successeurs ont particulièrement souligné les possibilités d'expression symbolique de l'inconscient et ont essayé de les utiliser psychothérapeutiques. \ N \ neach pays ne peut établir que #R One#! Psychological School."
 je_panum_behaviorism: "École psychologique du comportement"
 je_panum_behaviorism_reason: "Le comportementalisme est le concept de théorie scientifique d'examiner et d'expliquer le comportement des personnes et des animaux utilisant des méthodes scientifiques - c'est-à-dire sans introspection ni empathie. Le comportementalisme a été fondé par John B. Watson au début du 20e siècle après d'importants travaux préliminaires d'Edward Lee Thorndike. Ivan Petrovich Pavlov a également effectué d'importants travaux pionniers avec ses expériences sur le conditionnement classique du comportement. Aux États-Unis, les défenseurs du comportementalisme ont été pendant des décennies les chercheurs comportementaux les plus influents dans les universités et les opposants fidèles aux écoles psychanalytiques qui émergeaient en même temps. \ N \ n \ neach Le pays ne peut établir que la #R One#! Psychological School."
 panum_functionalism_school_founded_tt: "L'école psychologique du fonctionnalisme a été fondée dans un autre pays."
 panum_psychoanalysis_school_founded_tt: "L'école psychologique de la psychanalyse a été fondée dans un autre pays."
 panum_analytical_psychology_school_founded_tt: "L'école psychologique de psychologie analytique a été fondée dans un autre pays."
 panum_behaviorism_school_founded_tt: "L'école psychologique du comportementalisme a été fondée dans un autre pays."
 panum_psychotherapeutic_level_rises_tt: "Le niveau psychothérapeutique du [GetPlayer.GetName] augmente."
 panum.541.t: "Dans le cœur fiévreux"
 panum_yellow_fever_fork_note_tt: "#R Remarque: #! La deuxième option sera possible si le médecin a le trait biologiste ou microbiologiste."
 panum.165.t: "Le cœur de l'infection"
 panum_physician_health_bonus_modifier: "En toute sécurité désolé"
 panum.168.f: "'Arrêt! Qui est en déplacement à ce moment de - Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] Quoi que vous fassiez ces derniers temps? '\ N \ N'LI AVANT ROND À FAIRE, et ils n'attendront pas le lever du soleil. Chaque minute est précieuse, même celles après minuit. '\ N \ n'good ciel! Ces rues ne sont pas en sécurité la nuit! Si vous m'excusez, constable, il y a plus de travail à faire avant que mon huile de lanterne ne brûle. J'ai une douzaine de flacons à remplir d'eau des canaux et des pompes, des maisons à visiter, des fossés à examiner. '\ N \ N'aye, eh bien, très bien alors. Vous ne faites rien de mal, mais mieux je vous donne une escorte tout de même."
 panum.3033.d: "L'écrasante majorité des membres de la Croix-Rouge ont convenu de la troisième convention internationale sur l'utilisation d'armes chimiques. Il est maintenant contraignant pour tous les membres."
 notification_panum_technology_boost_from_physician_notification_name: "Boost de recherche pour [GetPlayer.MakeScope.GetCountry.GetCustom('panum_medical_research_next_technology_type')]"
 notification_panum_technology_boost_from_physician_notification_desc: "Merci au Dr [GetPlayer.MakeScope.GetVariable('panum_physician_var').GetCharacter.GetLastName] [GetPlayer.MakeScope.GetCountry.GetCustom('panum_medical_research_next_technology_type')] a obtenu un coup de pouce de recherche."
 je_panum_medical_research_project_reason: "[ROOT.GetCountry.GetCustom('panum_medical_research_project_active_type')] In addition to medical innovations, [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] can also find cures for diseases that are not among the ten classic epidemic diseases.\n\nThis is the default project of the [concept_panum_physician]. It is active when the Physician is not busy with another project.\nEvery time the progress reaches [JournalEntry.GetTotalGoalValue|V0] we will get a small technology boost.\n\nTechnology for the next boost: [GetPlayer.MakeScope.GetCountry.GetCustom('panum_medical_research_next_technology_type')]"
 panum.2611.t: "Institutionnalisation"
 panum.2611.d: "Compte tenu des conditions inacceptables dans certains asiles mentaux, les médecins et les personnalités politiques font pression pour que les pratiques soient réformées. Ils préconisent des endroits isolés où les psychiatres peuvent vivre une vie solitaire avec leurs patients, loin de la circulation."
 panum.2611.f: "L'ère moderne de la disposition institutionnalisée pour la prise en charge des malades mentaux, a commencé au début du 19e siècle avec un grand effort dirigé par l'État. Les asiles mentaux publics ont été créés en Grande-Bretagne après le décès de la loi sur les asiles du comté de 1808. Ces magistrats ont permis de construire des asiles soutenus par les taux dans chaque comté pour abriter les nombreux «fous de pauvre». La Lunacy Act 1845 a été un point de repère important dans le traitement des malades mentaux, car il a explicitement changé le statut des personnes atteintes de malades mentales en patients qui ont eu besoin d'un traitement. La loi a créé la Lunacy Commission, dirigée par Lord Shaftesbury, pour se concentrer sur la réforme de la législation sur la folie. Le Journal de la psychiatrie devrait être mentionné comme un organe de psychiatrie institutionnelle allemande entre 1830 et 1860. Il a été fondée par Heinrich Damerow avec Carl Friedrich Flemming et Christian Friedrich Wilhelm Roller en 1844."
 panum.2611.g: "La recherche psychiatrique et psychologique progresse."
 panum.2612.t: "Maladie du cerveau"
 panum.2612.d: "En psychiatrie, la théorie de l'évolution s'accompagne de changements importants. Une nouvelle génération de psychiatres postulent que les maladies mentales sont des maladies du cerveau. La psychiatrie orientée scientifique remplace la vision des sciences humaines précédemment en vigueur."
 panum.2612.f: "Wilhelm Griesinger est considéré comme l'une des figures les plus importantes du revirement scientifique en psychiatrie. Il a rencontré François Magendie, le fondateur de la physiologie expérimentale et auteur du premier manuel moderne sur la physiologie, dont l'approche de recherche l'a grandement influencé. En 1839, il a déménagé à Friedrichshafen sur le lac Constance en tant que médecin pratiquant. L'année suivante, 1840, il a reçu une offre de travail en tant que médecin secondaire à l'asile Insane Winnanthal. Au cours des deux années suivantes, il y a travaillé, Griesinger a acquis une richesse d'expérience pratique, qui est devenue la base de son ouvrage majeur «La pathologie et la thérapie des maladies mentales», publiée en 1845 et inaugurant une nouvelle ère en psychiatrie. Il y a tenté de trouver la psychiatrie sur la base de la physiologie médicale et de la pathologie. La célèbre déclaration de Griesinger peut être trouvée à la première page, selon laquelle, afin de comprendre tous les symptômes de la maladie, il est nécessaire de localiser le phénomène en question et de reconnaître toutes les maladies mentales comme des maladies du cerveau."
 panum.2613.t: "Classification des troubles mentaux"
 panum.2613.d: "Les psychiatres et les psychologues ont commencé à classer les maladies mentales selon un programme qui n'était auparavant disponible que dans le reste de la médecine. Bien qu'ils ne connaissaient auparavant que «imbécile» et «folie», ils reconnaissent désormais 7 catégories: manie, mélancolie, monomanie, parésie, démence, dipsomanie et épilepsie."
 panum.2613.f: "Le système triadique de la tradition psychiatrique allemande est un système de maladies psychiatriques qui est classé selon leurs causes. La première description remonte à Emil Krapelin; Kraepelin, à son tour, était basée sur le travail préparatoire de Karl Ludwig Kahlbaum. Krapelin a annoncé qu'il avait trouvé une nouvelle façon de regarder la maladie mentale, se référant à la vision traditionnelle comme «symptomatique» et à son point de vue comme «clinique». Cela s'est avéré être sa synthèse de paradigme des centaines de troubles mentaux classés par le 19e siècle, regroupant les maladies en fonction de la classification du syndrome - des modèles communs de symptômes au fil du temps - plutôt que par une simple similitude de symptômes majeurs à la manière de ses prédécesseurs."
 panum.2614.t: "Remède parlant"
 panum.2614.d: "Malgré de nombreuses réserves, l'approche psychologique devient de plus en plus populaire parmi les psychiatres. Le cas d'une jeune femme qui semble avoir été guéri à la suite de longues discussions est considérée comme un modèle pour un nouveau tournant dans le traitement des patients atteints de malades mentaux."
 panum.2614.f: "Les expériences que Josef Breuer a acquises tout en traitant Bertha Pappenheim (pseudonyme: Anna O.) en 1880/1881 a constitué la base des études sur l'hystérie publiée avec Sigmund Freud en 1895. Ce travail (et l'histoire du cas sous-jacente) a été décrit par Freud comme le point racine et de départ de la psychanalyse. Après le travail pionnier de Sigmund Freud, les idées résultant de la théorie psychanalytique ont également commencé à prendre racine en psychiatrie. La théorie psychanalytique est devenue populaire auprès des psychiatres car elle a permis aux patients d'être traités dans des pratiques privées au lieu d'être entreposées dans les asiles."
 panum.2615.t: "Psychologie et philosophie"
 panum.2615.d: "En plus de l'influence des écoles psychologiques sur la psychiatrie, il existe également une compréhension croissante des influences philosophiques. La domination des sciences naturelles semble être brisée."
 panum.2615.f: "Karl Jaspers a été parmi les premiers psychiatres du 20e siècle à examiner et à réfléchir sur les hypothèses philosophiques de leur discipline. La «psychopathologie générale» de Jaspers (1913) est considérée comme le début de la recherche psychopathologique réfléchie méthodique - aux côtés de Wilhelm Griesinger, qui a défini les maladies mentales comme des maladies du cerveau, et Emil Krapelin, qui a été la première à introduire un système de référence nosologique utile en psychiatrie. Jaspers a fait référence aux premiers travaux de Husserl sur la psychologie descriptive et la distinction très discutée de Wilhelm Dilthey entre «expliquer» et «compréhension», avec laquelle il a également complété la psychopathologie au sens méthodologique."
 panum.2131.t: "Une assiette à gagner"
 panum.2131.d: "Avec la découverte du rôle que la pauvreté pourrait jouer dans le rachitisme, les syndicalistes ont pris le manteau de lutte pour les repas scolaires et le lait gratuits!"
 panum.2131.f: "Cela a commencé lentement au début - un wagon ici ou là se stationner à l'extérieur de l'école, donnant aux enfants du lait, de la soupe et un peu de pain. Maintenant, il est devenu beaucoup plus: les syndicats, socialistes et militants travaillistes de la nation ont adopté la cause de ne pas se battre pour la classe de prolétariat, mais aussi pour leurs enfants. Des affiches avec des images d'enfants avec des bols vides et des yeux plaidants sont de plus en plus courants dans les rues, et le non-respect du gouvernement à l'offre de ses citoyens les plus jeunes et les plus vulnérables est un gâteau facile à la condamner et à son système. Vraiment, est-ce pour?"
 panum.2131.g: "Nous aurons notre facture de lait gratuite, oui nous le ferons, oui nous le ferons!"
 panum.2131.h: "Il n'y a pas de lait gratuit."
 panum_free_milk_modifier: "Lait gratuit"
 panum_no_free_milk_modifier: "Pas de lait gratuit"
 panum_medical_techniques_level_rises_tt: "Le niveau des techniques médicales de [GetPlayer.GetName] augmente."
 panum.561.t: "Le chemin vers un vaccin?"
 panum.561.d: "Après l'instruction de la capitale, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a commencé à étudier comment traiter ou même guérir la fièvre jaune."
 panum.561.f: "'' ... Pourtant, je me demande si j'étais peut-être trop confiant dans mon évaluation que je pourrais, en fait, vaincre la fièvre jaune. La maladie a peu de certitudes connues, même avec ses moyens de transmission un mystère, pour ne rien dire de ses origines. Est-ce, pourrait suggérer une résurgence de la théorie du miasme d'autrefois? Qui peut revendiquer la certitude face à un tel mystère? \ N \ nyet Pour tous ces mystères, il y a quelque chose que nous savons. Tous ceux qui rencontrent cette mort énigmatique ne sont pas tués par lui; Certains n'ont pratiquement aucun signe qu'il s'agissait du tout cette fièvre jaune, et plus que quelques-uns se remettent avant de devenir mortel. Rencontrer de la fièvre jaune, c'est danser avec la mort, certainement, mais ce n'est pas une certitude que cela vous revendiquera ... '"
 panum.561.g: "... Et si nous pouvons l'arrêter n'importe où, nous pourrions encore être en mesure de l'arrêter partout."
 panum.562.t: "L'orphelinat"
 panum.562.d: "En examinant tous les cas de récupération de la fièvre jaune, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] est arrivé à un domicile avec un grand nombre de survivants - un orphelinat."
 panum.562.f: "«Ah, bonjour, tu dois être la maîtresse de cet orphelinat ... Je vois que les enfants ont joué avec de la peinture aujourd'hui. J'ai peur que les toux se soient déjà défrichées, donc il n'y a pas - '\ N'AM Am peur de ne pas être ce docteur, madame. Je viens de la capitale, enquêtant sur la fièvre jaune. On m'a dit que la maladie était ... passée ici? '\ N'oh oui, les petits. Ils l'ont même eu, un grand nombre. Certains proviennent de familles anéanties par la maladie, les pauvres, mais elle aime épargner les enfants, semble-t-il. '\ Nfascining. Avez-vous des théories - '\ n'children! Viens, viens! Il y a un homme gentil de la capitale ici pour vous parler! '\ N'OH ... Bonjour, les enfants. Je m'appelle le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], et j'aimerais parler de fièvre jaune ..."
 panum.562.g: "Quelle est la raison pour laquelle les parents meurent mais les enfants survivent?"
 panum.563.t_america: "Le vieux sang"
 panum.563.d_america: "Dans le but d'en savoir plus sur la fièvre jaune, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a décidé de visiter les familles de certains des premiers colons de ces terres."
 panum.563.f_america: "'' ... Et pourtant, toutes les premières familles de ces terres n'ont pas disparu. Il y en a encore qui peuvent retracer leur histoire aux toutes premières expéditions ici, grandes ou petites. C'est à ces familles que j'ai tourné mon enquête, car certaines d'entre elles maintiennent toujours des revues et des dossiers précieux qui nous donnent un aperçu du passé avant les archives historiques appropriées. Il révèle quelque chose de particulièrement fascinant: les premiers cas de fièvre jaune sont apparus dans ces terres en 1685 environ. \ N \ nyet, depuis son apparition, certains de ces grands de [ROOT.GetCountry.GetNameNoFlag] ont voyagé à l'étranger en tant qu'explorateurs et aventuriers ... et certains, qui n'avaient jamais tombé de fièvre jaune et ont récupéré, ont rencontré cette maladie, en Afrique, et pourtant ils ne tombaient jamais malades. Cela me pousse vers une vérité."
 panum.563.g_america: "Ce sont la même maladie. L'immunité à l'un est l'immunité à l'autre."
 panum.563.t_africa: "Les membres de la tribu"
 panum.563.d_africa: "Dans le but d'en savoir plus sur la fièvre jaune, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a recherché ceux qui ont le plus d'expérience de la fièvre jaune - les Africains indigènes."
 panum.563.f_africa: "'... Et pourtant, alors que nous pourrions périr rapidement, les Africains indigènes endurent. C'est une maladie avec laquelle ils sont profondément intimes; Bien que la barrière linguistique présente un obstacle important, il ne faut que quelques descriptions pour qu'ils comprennent la maladie dont je parle. Ont-ils une résistance naturelle, semblable à celle que les Européens pourraient avoir pour la variole qui gaspille les Amériques? Peut-être, mais ceux du patrimoine africain qui travaillent dans nos villes meurent au même rythme que nous faisons - un autre facteur doit donc être en jeu. Diététique? La clé culturelle? \ N \ nthe, peut-être, est peut-être l'exposition à l'enfance dans la tribu. C'est une possibilité qu'ils soient exposés jeunes à la fièvre jaune et développent ainsi une immunité durable, tout comme la vomage pourrait accorder une protection contre la variole."
 panum.563.g_africa: "Et s'ils peuvent être rendus immunisés ... alors il devrait être possible de faire un vaccin."
 panum.564.t: "La nature de l'ennemi"
 panum.564.d: "La lutte contre une maladie nécessite de découvrir plus sur sa nature, et le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a conçu un test fascinant."
 panum.564.f: "'... Pourtant, depuis la révélation que le choléra était une maladie d'origine hydrique, nous avons eu la possibilité d'examiner la possibilité d'éliminer de telles maladies de l'eau avec une filtration appropriée. Il a fallu un certain temps pour être livré, mais je trouve mes mains sur un filtre de Berkefeld, un engin fantastique qui peut filtrer l'eau à travers la terre diatomée. C'est une chose extrêmement précise, capable d'éliminer même les bactéries. J'ai préparé un flacon composé de sang de plusieurs des infectés, je l'ai dilué avec de l'eau distillée, puis je l'ai versé à travers le filtre. Ce qui a émergé était clair, pur liquide ... ou du moins je pensais. \ N \ nand il y a la surprise: quoi qu'il en soit, il a fait le filtre, prouvé par un volontaire assez courageux pour le faire injecter. Ils sont tombés malades et se battent maintenant pour leur vie. Pourtant, cela prouve que la fièvre jaune n'est pas un simple microbe, c'est quelque chose de encore plus petit qu'une bactérie, quelque chose que nous ne pouvons pas voir. \ N \ ni l'aurait appelé une impossibilité, mais j'ai trouvé une note d'une telle chose dans un journal médical. Ils l'appellent un virus."
 panum.564.g: "Connaissez l'ennemi, détruisez l'ennemi."
 panum.565.t: "INTÉRÉTABLE?"
 panum.565.d: "Espoir pour tout signe de traitement approprié, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a visité des cliniques et des hôpitaux locaux pour enquêter sur leurs pratiques de traitement."
 panum.565.f: "Ah, Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], c'est un plaisir de vous rencontrer! Nous ici à la clinique - '\ n'y ai peur de devoir interrompre les plaisanteries, docteur. J'ai besoin de visiter d'autres cliniques, hôpitaux, quartiers, environ deux douzaines de nuits. Parlez-moi de l'efficacité de votre traitement. '\ N'AH, euh ... eh bien, nous suivons les directives établies -' \ n'avez pas de succès? Permettez-moi de prendre des notes. '\ N'Uhm ... sans.' \ N'Mortalités? '\ N'Quite ... High.' \ N'HOW BEAUCOUP Vous avez perdu cette semaine? '\ N'A Cent et soixante-six. Vous travaillez selon les directives de traitement, correct? '\ N'yes, docteur!' \ N'Then qui exclut les médicaments à base de plantes, l'électrothérapie, la radiothérapie, l'hydrothérapie, la médecine populaire, la médecine moderne et ... hmm, à peu près toutes les formes de traitement que nous connaissons, y compris les protéger du ciel nocturne dans le cas où il est astrologique. n'aura du tout aucun effet. Dommage."
 panum.565.g: "Un changement de tactique, alors - nous devons avoir un vaccin."
 panum.566.t: "La première fissure"
 panum.566.d: "Bien que ses recherches aient été un échec jusqu'à présent, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a expérimenté avec des singes dans le but de concevoir un vaccin."
 panum.566.f: "Pour beaucoup, la vue d'un singe mort dans une cage ne serait pas beaucoup de motif de célébration, mais pour l'équipe du Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] et du [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis], c'était un progrès remarquable. Le développement d'un vaccin pour cette terrible maladie a nécessité la capacité de produire la maladie dans un laboratoire à la demande, et pourtant d'essayer comme ils le pouvaient, il les avait échappés ... jusqu'à aujourd'hui. Avec des singes et des chimpanzés africains indigènes apparemment à l'abri de la maladie, il a fallu l'arrivée d'un macaque indien pour fournir un sujet de test approprié. Inoculée avec du sérum en prenant les veines d'un homme infecté, le macaque avait éclipsé et, finalement, est mort. \ N \ n pour certains, cela peut sembler une cruauté inactive, mais ici, maintenant, il présentait un énorme bond en avant. Enfin, ils avaient des sujets sur lesquels tester."
 panum.566.g: "Hmmm. Ce sont des progrès ... en tuant des singes, au moins."
 panum.567.t: "Le secret du sérum"
 panum.567.d: "Avec l'accès à un «sujet de test» fiable, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a commencé à tester les possibilités d'inoculation en utilisant le sang des patients en récupération."
 panum.567.f: "'1. Transfusion macaque à macaque: maladie transférée, pas d'immunité, macaque décédé. Confirme la transmission sanguine, la maladie est probablement portée par des insectes - moustiques? \n2. Transfusion humaine à macaque: maladie transférée, aucune immunité, le macaque a survécu. Confirme que l'infection peut traverser directement les espèces. \n3. Fièvre jaune sud-américaine et africaine pour survivre macaque: immunité, le macaque a survécu. Confirme l'immunité partagée aux deux formes de maladie. \n4. Pathogène mort dans le sérum, stérilisé sous une chaleur extrême: n'a pas réussi à fournir une protection, macaque décédée à la suite de l'inoculation avec un agent pathogène vivant. Échec significatif, exclut les possibilités d'un vaccin contre le pathogène mort. \n5. Transfert de sérum en récupération vers macaque: empêché d'infection future! Prometteur! Démarrage potentiel pour un vaccin?"
 panum.567.g: "Vous ne pouvez pas faire une omelette sans casser quelques macaques ..."
 panum.568.t: "Le prototype"
 panum.568.d: "Ayant eu le temps de continuer à travailler sur leur vaccin, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a atteint un point critique - un vaccin prototype."
 panum.568.f: "«Ce devrait être un moment incroyable, mais je me suis efforcé de maintenir ma sobriété. En utilisant de grandes quantités de sérum humain, tirées d'un certain nombre de malades en convalescence, mon équipe et moi avons réussi à les transformer sous une forme distillée, potentiellement capable de livrer l'immunité au volontaire. Ce fut une bonne première ébauche et un tremplin potentiel et critique, et nous avons donc commencé à le tester sur les macaques. Un bon nombre est mort, un bon nombre vécu, mais un macaque n'est pas un homme. \ N \ nit a besoin de tests en direct. Dix bénévoles, rassemblés d'ici, là-bas et partout. Certaines troupes de la garnison locale, un membre de ma propre équipe, quelques hommes sans travail de la ville ont influencé par la promesse de quelques pence. Quelque deux douzaines de bénévoles, pour autant de tirs. D'entre eux? Sept n'avait aucun symptôme, puis confirmé l'immunité une semaine plus tard. Cinq avaient une maladie mineure, puis l'immunité. Six autres étaient plus malades, puis immunisés. Le reste? Tous ont développé de la fièvre jaune proprement dite et une est morte. C'est un pas dans la bonne direction, indéniablement, mais ... qu'en est-il des morts?"
 panum.568.g: "Le coût du progrès est élevé."
 panum.569.t: "Un nouveau sujet"
 panum.569.d: "Avec la première tentative de vaccin contre un succès mitigé, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] est déterminé à affiner le processus."
 panum.569.f: "Pour le soulagement de quelques gestionnaires et l'horreur des autres, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] avait fait une découverte critique - les macaques n'étaient pas le seul animal à incuber la maladie, et un hôte plus récent et plus approprié a été trouvé: la souris de recherche commune. Le lot qu'ils pourraient jouer dans l'industrie naissante de la recherche médicale ne peuvent pas être sous-estimés, mais ici, ils jouent un rôle particulièrement critique: leur liquide cérébral, la goo autour de leur minuscule cerveau, est un moyen de croissance approprié pour le virus de la fièvre jaune. Ce processus, cependant, a un avantage distinct. \ N \ neach passage de la souris à la souris prend moins de temps que le dernier, affaiblissant le virus comme il le fait. Lentement mais sûrement, ce tueur d'hommes est amené au talon, une souris à la fois."
 panum.569.g: "Oh bien, d'abord les macaques, maintenant les souris ..."
 panum.570.t: "Le deuxième prototype"
 panum.570.d: "Le raffinement continu du vaccin contre le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a conduit au développement d'une version améliorée."
 panum.570.f: "«Bien que la dernière tentative n'ait pas été un échec, je n'ose pas l'appeler un succès. Ces pauvres garçons ont donné leur vie à l'espoir de débarrasser l'humanité de cette maladie, et je leur dois de s'améliorer autant que possible. Je crois que j'ai fait exactement cela. En transférant la question des macaques aux souris, j'ai pu atténuer lentement mais sûrement le virus, l'affaiblissant considérablement les heures supplémentaires. Après plus de trente passages, la fièvre jaune résultante est une créature affaiblie, beaucoup plus susceptible d'être utile dans un vaccin que les premières tentatives. \ N \ nusant la même approche qu'auparavant, j'ai créé une combinaison de sérum immunitaire et de culture vivante mais de virus affaibli, le présent présent pour réduire le risque de certaines complications immunitaires. Il y avait moins de bénévoles que la dernière fois, mais un de mes collègues a décidé de prendre le risque. Ils n'avaient ni vaccination ni exposition à la fièvre jaune et ont été intensivement mis en quarantaine pendant une semaine avant l'inoculation. Outre une petite rougeur de la zone, ils n'ont pas réussi à développer la fièvre jaune. Des résultats très prometteurs jusqu'à présent."
 panum.570.g: "Cela semble que nous allons enfin quelque part ..."
 panum.570.h: "... Alors commençons cette campagne de vaccination!"
 panum.571.t: "Incendie de forêt"
 panum.571.d: "Catastrophe! La distribution du vaccin sérum développé par le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a transféré par inadvertance les maladies sanguines!"
 panum.571.f: "Il était, avec le recul, assez évident que la fabrication d'un vaccin utilisant du sérum sanguin humain était peut-être une idée terrible. Les mystères du sang humain avaient été partiellement déchiffrés, mais dans un monde où le microscope révélait de nouveaux microbes et une nouvelle théorie des corps viraux commençait à émerger, il y avait toujours une préoccupation toujours pressante que quelque chose d'inattendu pouvait se produire, quelque chose de désastreux. dans tous les soldats aux représentants du gouvernement. Ce virus était auparavant inconnu de notre science et échappe toujours à la détection par beaucoup de nos esprits les plus brillants ... contrairement aux dommages à notre image nationale. Bien qu'il y ait eu peu de décès, le cas échéant, l'échec évident de ce projet de vaccination a laissé notre communauté médicale en ruine, la crosse de blagues à travers le monde."
 panum.571.g: "Ceci est une catastrophe pour nos recherches médicales ..."
 panum.572.t: "Ajustements finaux?"
 panum.572.d: "Près d'un vaccin finalisé, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] est au milieu du développement final."
 panum.572.f: "Si l'on ne savait pas autrement, ils auraient pu penser que le laboratoire du Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ressemble à une cuisine très étrange. Le sel, l'eau, l'huile et les œufs jonchaient les comptoirs, aux côtés de hotplates, une large sélection de verres et un réfrigérateur de pointe. La scène était apparemment prête à préparer le petit déjeuner, pas une percée médicale, mais c'est exactement ce qui est en cours. Le sérum est trop cher pour faire un vaccin qui peut être distribué à grande échelle, trop gênant pour travailler avec les grandes échelles nécessaires pour inoculer une colonie ou une ville. Il doit être retiré de l'équation, mais sinon cela, alors quoi? \ N \ nmurmuring tranquillement, apparemment au bord de la folie, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] fonctionne sans relâche. Une sélection soigneusement préparée de tissu de souris est, soigneusement, plongée dans le jaune d'oeuf, puis, soigneusement, toujours soigneusement, placée dans le compartiment de lyophilisation. Un lot antérieur est sorti, son contenu maintenant une fine poudre. Ajoutez-le à une solution saline ... \ n \ n le médecin a souri. \ N \ n'at dernier '', dit le bon docteur. «Je l'ai."
 panum.572.g: "Heureka!"
 panum.573.t: "Le prototype final"
 panum.573.d: "Après avoir terminé les travaux sur leur vaccin, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a commencé à le déployer dans un groupe de test final."
 panum.573.f: "«C'était une route longue et dure, mais la fin est enfin en vue. La phase finale consistait à rendre le vaccin plus facilement disponible, et maintenant il s'agit: après avoir échangé le sérum contre une solution saline, le paquet de vaccins résultant s'apparente à celui utilisé pour la variole. Il n'y a pas besoin d'une injection, simplement la même pratique de scarification. En effet, les deux pourraient même être livrés en même temps. Selon tous les comptes, cela devrait être un moyen fiable, sûr et efficace de délivrer ce vaccin, pas seulement à quelques milliers, mais à des millions. \ N \ nyet, les tests passés remplissent mon cœur avec une appréhension. Il y a peu de bénévoles, pas assez pour créer un groupe de test ... mais si l'on devait prendre en compte moi-même, alors il y en a assez. J'ai déjà pris les dispositions - un général ne peut envoyer autant de leurs hommes dans la ligne de feu avant qu'ils ne soient censés prendre sur le terrain pour eux-mêmes. Ce soir, à huit heures, je serai inoculé avec ce vaccin. Si cela fonctionne, alors, lorsque je suis injecté avec la fièvre jaune dans deux semaines, je n'aurai rien de plus qu'un léger bouleversement."
 panum.573.g: "Souhait [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] chance."
 panum.574.t: "Un vaccin contre la fièvre jaune"
 panum.574.d: "Les nouvelles ont atteint la capitale: le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a réussi à créer un vaccin pour la fièvre jaune!"
 panum.574.f: "'... Mais à la fin, mon équipe et moi avons réussi à réussir contre toute attente. Bien qu'il y ait encore beaucoup de mystères de fièvre jaune non encore non résolus, nous avons réussi un vaccin viable, prêt pour une production à grande échelle. Il peut nécessiter des installations spécialisées, habitées par de grands esprits, mais il peut être produit à grande échelle, et des millions et des millions bénéficieraient d'une campagne rapide de vaccination qui pourrait rendre la fièvre jaune une chose du passé. \ N \ nyet, une grande vie a été perdue, y compris un numéro sur ma propre équipe, de Humble Assistants qui ont déposé leur vie dans leurs recherches pour les bénévoles qui ont connu des tests pour tous les tests. Un mot de louange doit également être donné aux macaques, et aux souris, qui ont joué un rôle critique dans cette entreprise. \ N \ nby leur sacrifice, et notre effort collectif, nous avons maintenant un vaccin qui peut mettre fin à cette fièvre jaune endémique en quelques années, et peut-être même un jour, éradiquer cette nuisance, une fois et pour toutes. ''"
 panum.574.g: "Bravo, docteur! Maintenant, commençons le déploiement immédiat!"
 panum_wildfire_modifier: "Expérience de vaccination complètement échoué"
