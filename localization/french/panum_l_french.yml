 panum.3000.t: "La Croix-Rouge"
 panum.3000.d: "Compte tenu des horreurs de la guerre moderne, un «Comité international des sociétés d'aide pour la prise en charge des blessés» a été fondée au [SCOPE.sState('panum_red_cross_state').GetName]. Il est destiné à travailler dans les nations pour aider les personnes blessées en guerre."
 panum.3000.f: "La Croix-Rouge a adopté les résolutions suivantes: \ n- La création de sociétés nationales de secours pour la guerre blessée \ n- la neutralité de la blessure \ n-envoyant des infirmières bénévoles sur le champ de bataille pour fournir l'assistance \ n- l'organisation et la mise en œuvre de nouvelles conférences internationales \ n- l'introduction d'une identification et un symbole protecteur sous la forme d'un brassard blanc avec une croix rouge avec une croix rouge avec une identification et un symbole protecteur sous la forme d'un brassard blanc avec une croix rouge avec une croix rouge avec une identification et un symbole protecteur sous la forme d'un brassard blanc avec une croix rouge avec une croix rouge avec une identification et un symbole protecteur sous la forme d'un brassard blanc avec une croix rouge avec une croix rouge avec une Croix-Rge"
 panum.3000.g: "Un pas en avant décisif dans la coopération internationale."
 panum.3001.d: "Compte tenu des horreurs de la guerre moderne, un «Comité international des sociétés d'aide pour la prise en charge des blessés» a été fondée au [SCOPE.sState('panum_red_cross_state').GetName]. Il est destiné à travailler dans les nations pour aider les personnes blessées en guerre. Un envoyé a demandé si notre nation aimerait également rejoindre cette association."
 panum.3001.g: "Nous rejoignons cette organisation en tant que membre fondateur."
 panum.3001.h: "Intéressant."
 panum.3002.d: "Reconnaissant les horreurs de la guerre moderne, le marchand suisse Henry Dunant a fondé un «Comité international des sociétés d'aide pour les soins aux blessés». Il est destiné à travailler dans les nations pour aider les personnes blessées en guerre."
 panum.3002.f: "En 1859, le marchand suisse Henry Dunant est tombé sur le champ de bataille de Solferino par hasard. Secoué par les cris à l'aide d'environ 40 000 soldats mourants et blessés, il commence à encourager les bénévoles de la région à aider les victimes - que ce soit des amis ou des ennemis. Son livre de 1862 «A Memory of Solferino» a attiré les horreurs de la guerre moderne à l'attention des masses. Les gouvernements et les citoyens développent un intérêt pour le confinement de la guerre. Le 17 février 1863, le comité de cinq membres dont Dunant était membre a fondé le comité international de la Croix-Rouge. Les délégués de 16 nations se sont réunis lors de la 1ère conférence de Genève du 26 au 29 octobre 1863 pour développer davantage les idées de Dunant. La Croix-Rouge sur un drapeau blanc devient le symbole international de protection des aides. En 1901, Dunant a reçu le premier prix Nobel de la paix au monde."
 panum.3011.t: "La convention [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_convention_title')]"
 panum.3011.d: "Une conférence internationale a été convoquée au [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_convention_title')] pour établir la protection des blessés, la neutralité du personnel médical et la Croix-Rouge comme symbole de protection."
 panum.3011.f: "«Mais les femmes de Castiglione, voyant que je ne fais aucune distinction entre les nationalités, a suivi mon exemple, montrant la même gentillesse à ces hommes dont les origines étaient si différentes, et toutes des étrangers pour elles. «Tutti Fratelli», ont-ils répété en se sentant en sensation. Tout honneur à ces femmes, à ces filles de Castiglione! Imperturbable, incessant, sans faille, leur sacrifice tranquille silencieux faisait peu de fatigue et d'horreurs, et de leur propre dévotion. -Henry Dunant"
 panum.3011.g: "[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_convention_title')] Convention. Ça a l'air bien."
 panum.3012.t: "Les traités [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_convention_title')]"
 panum.3012.d: "Une conférence internationale a été prévue au [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_convention_title')] pour promouvoir le désarmement et étendre les règles de droit international précédentes pour la guerre foncière à la guerre de la mer."
 panum.3012.f: "«Le sens moral de l'importance de la vie humaine; le désir humain d'éclaircir un peu les tourments de tous ces pauvres misérables, ou de restaurer leur courage brisé; l'activité furieuse et implacable qu'un homme invoque à de tels moments; Tous ceux-ci se combinent pour créer une sorte d'énergie qui gise une envie positive pour soulager autant que possible. -Henry Dunant"
 panum.3012.g: "[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_convention_title')] traités. Ça a l'air bien."
 panum.3013.t: "Le protocole [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_convention_title')]"
 panum.3013.d: "Une conférence internationale a été convoquée au [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_convention_title')] pour interdire l'utilisation du gaz toxique en guerre."
 panum.3013.f: "«Puisque les nouvelles et terribles méthodes de destruction sont inventées quotidiennement, avec une persévérance digne d'un meilleur objet, et puisque les inventeurs de ces instruments de destruction sont applaudis et encouragés dans la plupart des grands États européens, qui sont engagés dans une race d'armement; Et comme finalement l'état d'esprit en Europe se combine avec de nombreux autres symptômes pour indiquer la perspective des guerres futures, dont l'évitement, tôt ou tard, semble à peine possible, compte tenu de tout cela, pourquoi ne pourrait-il pas être pris pour une période de calme et de calme relatif pour enquêter et essayer de résoudre une question d'une importance aussi immense et mondiale, à la fois du point de vue humain et chrétien? -Henry Dunant"
 panum.3013.g: "[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_convention_title')] Protocole. Ça a l'air bien."
 panum.3021.t: "Un médecin de la Croix-Rouge"
 panum.3021.d: "Après une défaite extrêmement sanglante, un médecin a distingué le [SCOPE.sCharacter('panum_new_physician_scope').GetHerselfHimself] à l'hôpital de campagne. [SCOPE.sCharacter('panum_new_physician_scope').GetSheHe|U] appartient à la Croix-Rouge et est peut-être appelé à quelque chose de plus élevé que le simple service de terrain."
 panum.3021.f: "«Dans l'un des hôpitaux Cremona, un médecin italien avait dit: Nous gardons les bonnes choses pour nos amis de l'armée alliée et donnons à nos ennemis les nécessités nues. S'ils meurent, tellement pire! et il a ajouté, pour excuser ces paroles barbares, qu'il avait entendu des soldats italiens qui étaient revenus de Vérone et de Mantoue, que les Autrichiens ont permis aux blessés de l'armée franco-sardinienne de mourir sans exception. Une noble dame de Cremona, comtesse ..., qui avait entendu les paroles du médecin et s'était consacrée aux hôpitaux avec le plus grand zèle, a fait la hâte de montrer sa désapprobation en déclarant qu'elle accorde exactement la même attention aux Autrichiens qu'aux alliés, et n'a fait aucune différence entre amis et ennemis. Car, a-t-elle dit, notre Seigneur Jésus-Christ n'a fait aucune distinction de telles hommes entre les hommes. -Henry Dunant"
 panum.3021.g: "Bienvenue, Doctor [SCOPE.sCharacter('panum_new_physician_scope').GetLastName]."
 panum.740.t: "Un moins de peur des enfants"
 panum.740.d: "Après de grands efforts, le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a finalement écrit le traité [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] sur une méthode de traitement réussie pour [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_disease_title')]. Il est considéré comme une étape importante en médecine [ROOT.GetCountry.GetAdjectiveNoFlag]."
 panum.740.f: "La faculté médicale attendait avec impatience le document scientifique sur la méthode de traitement du [ROOT.Var('panum_physician_var').GetCharacter.GetFullName]. Dans le traité [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis], le médecin décrit toute une série de mesures efficaces pour lutter contre la fièvre écarlate. La médecine moderne offre une gamme complète d'options pour maintenir efficacement la fièvre écarlate à distance même après la défaillance de la maladie. Un antitoxine nouvellement inventé joue un rôle clé. Le travail du docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] porte le nom [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_treatment_title')]."
 panum.740.g: "D'innombrables parents dormiront désormais plus paisiblement."
 panum.741.t: "Le test [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting]"
 panum.741.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a développé une procédure nommée d'après [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] qui détermine si un patient a une immunité à la fièvre écarlate ou non."
 panum.741.f: "Le test de la bite, développé en 1924 par George F. Dick et Gladys Dick, a été utilisé pour identifier les personnes sensibles à la fièvre écarlate. Le test de la bite impliquait l'injection d'une souche diluée des streptocoques connus pour provoquer une fièvre écarlate; Une réaction dans la peau sur le site d'injection a identifié les personnes susceptibles de développer la fièvre écarlate. La réaction pouvait être observée quatre heures après l'injection, mais était plus perceptible après 24 heures. Si aucune réaction n'a été observée dans la peau, alors la personne était supposée ne pas être à risque de la maladie, y ayant développé une immunité."
 panum.741.g: "Une procédure utile."
 panum.742.t: "Sérum Scarlet Fever"
 panum.742.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a développé un sérum efficace contre la fièvre écarlate, que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] a obtenu à partir de sang de cheval."
 panum.742.f: "Le sérum de Scarlet Fever a été utilisé à partir de novembre 1900 après son développement dans le laboratoire séro-thérapeutique de l'hôpital Rudolph à Vienne, en Autriche. Le sérum a été prélevé du sang des chevaux. Les enfants infectés ont été injectés dans leur peau abdominale par le Dr Paul Moser. Les taux de mortalité de la fièvre écarlate (également connue sous le nom de Scarlatina) ont diminué de manière significative après l'utilisation du sérum sanguin. L'antitoxine de Moser a réduit la mortalité de la fièvre écarlate de 40%."
 panum.742.g: "Blood de cheval? Urgh."
 panum.743.t: "L'antitoxine"
 panum.743.d: "Après plusieurs tests, le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] est sûr que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] a produit une antitoxine qui est efficace contre la fièvre écarlate."
 panum.743.f: "«Malgré les avancées importantes récentes dans les connaissances et le traitement de la fièvre écarlate, cette maladie très redoutée a fait un grand saut par rapport à ses prévalences saisonnières. Lorsqu'il est administré assez tôt, l'antitoxine atténuera le danger de la fièvre écarlate et ses fréquentes complications ultérieures. La maladie maintient toujours des aspects, cependant, qui rendent sa révision extrêmement désirable. Il a été constaté que l'augmentation des doses de la toxine donnée aux susceptibles rendra ces personnes à l'immunité."
 panum.743.g: "Une percée décisive!"
