 je_group_panum_medicine: "Morgenröte : #ORANGE Médecine Panum#!" #NT!
  
 je_panum_cholera: "Épidémie de choléra" #NT!
 je_panum_cholera_reason: "Le choléra est considéré comme la pire épidémie du XIXe siècle. Il a une signification similaire pour l'époque victorienne à celle de la peste au Moyen Âge. Il se propage plus rapidement que toute autre maladie et se présente sous une forme mortelle.\n\nL'invention du #ORANGE système d'égouts moderne#! a une importance particulière dans la lutte contre le choléra. Grâce à cette technologie, un [concept_panum_physician] peut trouver un #V traitement contre le choléra#!. Même un système de santé modérément bon peut aider. Tout cela conduit à une meilleure prévention et à une meilleure guérison de la maladie. Les capitales qu'un [concept_gaudi_architect] équipe d'un système d'égouts moderne sont en principe protégées contre les épidémies de choléra.\n\nAfin de vaincre le choléra une fois pour toutes, un #V vaccin contre le choléra#! est nécessaire, développé par un [concept_theiler_biologist]." #NT!
 je_panum_tuberculosis: "Épidémie de tuberculose" #NT!
 je_panum_tuberculosis_reason: "Avec le choléra, la tuberculose était l'une des causes de mortalité les plus fréquentes au XIXe siècle. La « Mort blanche » a commencé comme une maladie romantique et est finalement devenue de plus en plus une maladie du prolétariat. La tuberculose est principalement limitée à quelques États au niveau de vie bas et à l'urbanisation élevée.\n\nL'invention de la #ORANGE pasteurisation#! a une importance particulière dans la lutte contre la tuberculose. Grâce à cette technologie, un [concept_panum_physician] peut trouver un #V Traitement de la tuberculose#!. Un bon système de santé y contribuera. Tout cela conduit à une meilleure prévention et à une meilleure guérison de la maladie. Dans de rares cas, des stations climatiques peuvent émerger en réponse à la tuberculose, bien que les résultats de guérison soient discutables.\n\nPour vaincre la tuberculose une fois pour toutes, il faut un #V Vaccin contre la tuberculose#! qui soit développé par un [concept_theiler_biologist]." #NT!
 je_panum_smallpox: "Épidémie de variole" #NT!
 je_panum_smallpox_reason: "La variole est l'un des grands fléaux de l'humanité qui a décimé des peuples entiers. Grâce à la variolisation et à la vaccination antivariolique, elle a perdu sa terreur au cours du 18e siècle, mais sans précautions, elle peut encore montrer son visage hideux.\n\nL'invention de la #ORANGE Vaccination#! a une importance particulière dans la lutte contre la variole. Grâce à cette technologie, un [concept_panum_physician] peut trouver un #V Traitement contre la variole#!. Un système de santé rudimentaire déjà y contribuera. Tout cela mène à une meilleure prévention et à une meilleure guérison de la maladie.\n\nPour vaincre la variole une fois pour toutes, un #V Vaccin contre la variole#! est nécessaire, qui sera développé par un [concept_theiler_biologist]." #NT!
 je_panum_typhus: "Épidémie de typhus" #NT!
 je_panum_typhus_reason: "Bien que le typhus soit connu depuis la fin du Moyen Âge, ses effets les plus dévastateurs se sont produits pendant les guerres napoléoniennes. Il a donc conservé son horreur pour les générations après 1815. La fièvre typhoïde peut se propager rapidement dans plusieurs pays. Les régions fortement dévastées sont particulièrement touchées. Elle est donc considérée comme une maladie de guerre classique et affecte particulièrement les soldats et leurs casernes exiguës.\n\nL'invention des #ORANGE antibiotiques#! a une importance particulière dans la lutte contre le typhus. Grâce à cette technologie, un [concept_panum_physician] peut trouver un #V traitement contre le typhus#!. Un système de santé rudimentaire déjà y aidera. Tout cela conduit à une meilleure prévention et à une meilleure guérison de la maladie.\n\nPour vaincre le typhus une fois pour toutes, il faut un #V vaccin contre le typhus#! développé par un [concept_theiler_biologist]." #NT!
 je_panum_yellow_fever: "Épidémie de fièvre jaune" #NT!
 je_panum_yellow_fever_reason: "La fièvre jaune est une maladie régionale qui sévit près des tropiques, mais au 19e siècle, elle s'est propagée dans le sud des États-Unis et en Europe. Elle ne se propage généralement que dans quelques États, mais elle n'en fait pas moins de victimes.\n\nL'invention de la #ORANGE Prévention du paludisme#! revêt une importance particulière dans la lutte contre la fièvre jaune. Grâce à cette technologie, un [concept_panum_physician] peut trouver un #V Traitement contre la fièvre jaune#!. Un système de santé rudimentaire déjà peut aider. Tout cela conduit à une meilleure prévention et à une meilleure guérison de la maladie.\n\nPour vaincre la fièvre jaune une fois pour toutes, il faut un #V Vaccin contre la fièvre jaune#! développé par un [concept_theiler_biologist]." #NT!
  
 panum.100.t: "L'épidémie de choléra de [TimeKeeper.GetCurrentDate.Format('y')]" #NT!
 panum.100.d: "#YELLOW Le choléra#!,, l'un des pires fléaux de l'humanité, s'est propagé dans l'une de nos villes. Des temps sombres ont commencé. Nous devons nous attendre à ce qu'il se propage à travers le pays - et fasse des ravages." #NT!
 panum.100.f: "Le choléra, endémique en Asie de l'Est, s'est probablement manifesté dans le sous-continent indien pendant plusieurs siècles sous forme d'épidémies localisées, mais il était inconnu sur d'autres continents. La première pandémie s'est produite entre 1817 et 1824 et a touché certaines régions d'Asie ainsi que l'Afrique de l'Est et l'Asie Mineure, puis la Russie et l'Europe. En 1830, il est apparu en Galicie orientale et en Hongrie, puis en juin 1831 à Vienne. Il a submergé le monde en six pandémies au total et est devenu le fléau de la société industrielle émergente. Bien que la plupart des infections (environ 85 %) soient asymptomatiques, le taux de mortalité au début se situe entre 20 et 70 %, si la maladie n'est pas traitée." #NT!
 panum.100.g: "La Grande Faucheuse est à notre porte." #NT!
 panum.101.t: "Le choléra se propage au [SCOPE.sState('panum_disease_state').GetName]" #NT!
 panum.101.d: "L'épidémie de choléra s'est propagée malgré tous nos efforts. Elle sévit désormais également en [SCOPE.sState('panum_disease_state').GetName]." #NT!
 panum.101.g: "Ce fléau est complètement hors de contrôle !" #NT!
 panum.102.t: "L'épidémie de choléra atteint [SCOPE.sCountry('panum_infected_country').GetName]" #NT!
 panum.102.d: "Nous avons reçu des informations selon lesquelles les premiers cas de choléra ont été signalés aujourd'hui au [SCOPE.sCountry('panum_infected_country').GetName]. Les autorités nous reprochent de ne pas en faire assez pour empêcher la propagation." #NT!
 panum.102.g: "C'est censé être notre faute...?" #NT!
 panum.103.t: "Le choléra dans les usines" #NT!
 panum.103.d: "Plusieurs usines de [SCOPE.sState('panum_disease_state').GetName] signalent les premiers cas de choléra parmi les ouvriers. Les autorités locales proposent une réglementation pour lutter contre la propagation. Cela aurait un impact massif sur l'industrie." #NT!
 panum.103.f: "Le premier cas de choléra s'est déclaré la semaine dernière dans un moulin à eau situé à la périphérie de la ville. Bien que le bâtiment ait été mis en quarantaine, d'autres incidents ont été signalés plus loin dans plusieurs usines. On ne sait toujours pas exactement comment la maladie s'est propagée, mais certains responsables politiques locaux conviennent qu'il faut recourir à des restrictions strictes pour regagner la confiance perdue de la population." #NT!
 panum.103.g: "Mettez les usines en quarantaine !" #NT!
 panum.103.h: "Les usines doivent continuer à tourner, à tout prix !" #NT!
 panum.104.t: "[SCOPE.sCharacter('disease_victim_scope').GetFullName] a contracté le choléra !" #NT!
 panum.104.d: "Il y a quelques jours à peine, [SCOPE.sCharacter('disease_victim_scope').GetFullName] semblait en parfaite santé, mais hier soir, [SCOPE.sCharacter('disease_victim_scope').GetSheHe] a montré les premiers symptômes de la terrible maladie qui a balayé [ROOT.GetCountry.GetNameNoFlag]. [SCOPE.sCharacter('disease_victim_scope').GetHerHis|U] la santé est déplorable." #NT!
 panum.104.f: "Les deux premières vagues de choléra du XIXe siècle ont également fait des victimes célèbres. En Prusse, le philosophe Georg Friedrich Wilhelm Hegel et le général August Neidhardt von Gneisenau ont péri lors de l'épidémie de choléra de 1831. Le compositeur Piotr Ilitch Tchaïkovski est également considéré comme une victime du choléra, même si les circonstances - ingestion consciente ou inconsciente d'eau contaminée - sont controversées." #NT!
 panum.104.g: "Assurez-vous le meilleur traitement possible !" #NT!
 panum.104.h: "Notre meilleur médecin s'occupera personnellement de [SCOPE.sCharacter('disease_victim_scope').GetHerHim]." #NT!
 panum.104.i: "[SCOPE.sCharacter('disease_victim_scope').GetSheHe|U] n'est pas si important..." #NT!
 panum.105.t: "L'exode des riches" #NT!
 panum.105.d: "La classe supérieure de [SCOPE.sState('panum_disease_state').GetName] utilise ses ressources financières pour quitter la région le plus rapidement possible ou pour s'échapper vers la campagne. De nombreux pots-de-vin ont été versés pour contourner les règles de quarantaine. Les gens du peuple voient cette évolution avec mépris." #NT!
 panum.105.f: "L'une des caractéristiques du choléra était qu'il tuait aussi bien les riches que les pauvres, ce qui en faisait un fléau comparable à celui du Moyen Âge. Les familles influentes et riches faisaient donc de leur mieux pour éviter la peste. L'aristocratie considérait le choléra comme une sorte de « maladie révolutionnaire » car il ne faisait aucune distinction entre les classes. Les mesures laxistes envers la classe supérieure ont fait du choléra un problème politique en raison de ces conflits sociaux. On a souvent affirmé que les épidémies de choléra du début des années 1830 en Europe et les mouvements révolutionnaires s'inscrivaient dans un contexte." #NT!
 panum.105.g: "Laissez-les partir." #NT!
 panum.105.h: "Il y a une raison pour laquelle nous l’appelons LE GRAND ÉGALISEUR." #NT!
 panum.106.t: "L'opposition tente d'exploiter le choléra" #NT!
 panum.106.d: "L'opposition utilise l'épidémie pour régler ses comptes : elle accuse le gouvernement d'avoir commis d'énormes erreurs dans la lutte contre l'épidémie." #NT!
 panum.106.f: "En raison de leurs implications sociales et politiques, les épidémies de choléra étaient un domaine dans lequel les libéraux pouvaient particulièrement blâmer les conservateurs. Des mesures plus progressistes et de nouvelles méthodes étaient recommandées comme alternative à l'élite « arriérée ». Il n'est pas surprenant que cette séparation entre conservateurs et libéraux se soit répétée dans des circonstances différentes et avec des partis différents." #NT!
 panum.106.g: "Vous avez raison, nous avons tort. Maintenant, luttons contre l'épidémie !" #NT!
 panum.106.h: "Ce gouvernement a la situation parfaitement sous contrôle." #NT!
 panum.107.t: "Fosses communes" #NT!
 panum.107.d: "Les critiques à l'encontre des nouvelles fosses communes creusées au [SCOPE.sState('panum_disease_state').GetName] se multiplient. Les classes populaires en particulier considèrent ce processus comme un processus presque mécanique au lieu de considérer qu'il s'agit d'un soin approprié pour les morts." #NT!
 panum.107.f: "Dans le sillage des décès massifs et des risques d'infection, l'enterrement de masse des morts est devenu un phénomène inévitable. Le fait que les citoyens les plus riches puissent se permettre des funérailles selon le style habituel, alors que les corps des personnes pauvres étaient simplement enterrés, a provoqué une explosion sociale." #NT!
 panum.107.g: "Nous n'avons pas de temps à perdre avec les funérailles !" #NT!
 panum.107.h: "Tout le monde mérite un enterrement digne." #NT!
 panum.108.t: "Hôpitaux pour le choléra" #NT!
 panum.108.d: "Plusieurs partis politiques, pour défendre leurs propres intérêts, ont décidé de créer des hôpitaux pour soigner les malades du choléra, mais ils ne sont pas très populaires." #NT!
 panum.108.f: "La construction d'hôpitaux de masse lors d'épidémies telles que le choléra ou la tuberculose était souvent controversée. Les familles préféraient soigner leurs malades à domicile plutôt que de les confier à l'anonymat, où ils étaient entassés dans un espace restreint avec d'autres malades, ce qui faisait que beaucoup étaient convaincus qu'ils tomberaient malades et mourraient là-bas. L'accusation circulait qu'il s'agissait avant tout d'une mesure visant à isoler les pauvres des riches et à protéger ces derniers." #NT!
 panum.108.g: "Battez-les dans les hôpitaux s'il le faut !" #NT!
 panum.108.h: "Vous ne pouvez pas forcer ces bœufs têtus à vivre." #NT!
 panum.109.t: "Panique publique" #NT!
 panum.109.d: "Malgré tous les efforts déployés par le gouvernement local de [SCOPE.sState('panum_disease_state').GetName], la population a commencé à succomber à l’un des aspects les plus dangereux de toute épidémie : la panique." #NT!
 panum.109.f: "« Il est facile de penser que nous sommes au-dessus de toute autre bête sur cette Terre, mais enlevez le vernis de la raison et vous découvrez que l'Homme est toujours un animal, gouverné par la peur et la terreur d'un lendemain inconnu. L'apparition et la propagation d'une maladie peuvent remplir de terreur le cœur même des soldats vétérans, car qui peut combattre un ennemi qu'il ne peut même pas voir ? Non, la terreur peut ronger leur cœur et leur faire voir des ennemis dans tous les coins, et là où il y a des ennemis, il y a des ennemis à combattre. L'homme malade, qu'on jette des pierres pour les éloigner. Des murmures sur cette famille qui n'a pas franchi le pas de sa porte. L'homme tranquille et honnête rentre chez lui avec une arme, craignant que le prochain coup à la porte n'apporte des vols et des cambriolages, et non de l'aide.\n\nCe n'est pas la fin du monde. C'est la fin de l'illusion : l'Homme est un animal, et il a peur. »\n\nExtrait d'un article de presse sur l'apparition du [TimeKeeper.GetCurrentDate.Format('y')], du [SCOPE.sState('panum_disease_state').GetName] Times." #NT!
 panum.109.g: "Quelle peur maudite ! Comment pouvons-nous les aider s'ils ne veulent pas entendre raison ?" #NT!
 panum.110.t: "Objectif commun" #NT!
 panum.110.d: "L’épidémie de choléra en [SCOPE.sState('panum_disease_state').GetName] semble avoir favorisé un sentiment d’unité nationale, les habitants de la région s’unissant pour tenter de lutter contre l’épidémie." #NT!
 panum.110.f: "« Une salle d’hôpital est un endroit sinistre, car elle nous rappelle que nous vivons dans un monde maladif. Mais cette maladie ne se soucie pas de qui vous êtes : elle ne se soucie pas de votre religion, du maître que vous avez, de la couleur de votre peau ou des opinions politiques qui vous tiennent à cœur. Regardez le lit et vous voyez un homme, une femme ou un enfant. Vous voyez des gens qui ont besoin d’aide. Ils ne se soucient pas de savoir qui les apporte. Ils ne se soucient pas de savoir si le médecin est un prêtre, un soldat ou un simple ouvrier qui offre le peu de temps dont il dispose, se mettant en danger pour aider un étranger. Ils ne s’attendent pas à voir en lui un monarchiste, un républicain, un agitateur ou quoi que ce soit d’autre que ce qu’ils sont vraiment. Ils le regardent et ils voient un homme. Un frère, un fils, un compatriote, mais surtout, un homme comme eux. » Extrait d’un article de presse sur l’épidémie de [TimeKeeper.GetCurrentDate.Format('y')], paru dans le [SCOPE.sState('panum_disease_state').GetName] Times." #NT!
 panum.110.g: "Nous sommes unis contre le choléra !" #NT!
 panum.111.t: "L'horreur" #NT!
 panum.111.d: "Les montagnes de cadavres du [SCOPE.sState('panum_disease_state').GetName] s'amoncellent. Il n'y a plus personne qui ne connaisse au moins une personne contaminée par le choléra. La région est devenue l'épicentre de l'épidémie." #NT!
 panum.111.f: "En 42 ans, de 1831 à 1873, Berlin fut frappée par le choléra à treize reprises. Les épidémies de 1848-1849, 1852, 1855 et 1866 furent particulièrement graves dans toute la Prusse. Dans ce dernier cas, 114 683 personnes moururent officiellement du choléra. L’épidémie de choléra qui frappa Londres en 1848-1849 fut bien plus grave que celle de 1832-1832. Au cours de cette épidémie, 15 000 personnes moururent à Londres, soit plus de 0,5 pour cent de la population de la ville qui comptait alors environ 2,5 millions d’habitants. Au cours de la première semaine de septembre 1849, 300 personnes moururent par jour. Lors de la troisième pandémie, entre 1852 et 1860, environ un million de personnes moururent en Russie, ce qui fut facilité par la guerre de Crimée qui se déroulait au même moment. Le commandant en chef britannique, Lord Raglan, et le commandant de la flotte française, Armand Joseph Bruat, moururent de cette maladie. On estime que le choléra a fait plus de victimes que les combats." #NT!
 panum.111.g: "Combien de morts supplémentaires ?!" #NT!
  
 panum.120.t: "Fin de l'épidémie de choléra" #NT!
 panum.120.d: "Tout le pays pousse un soupir de soulagement : les autorités viennent d'annoncer qu'il n'y a plus de cas de choléra dans la dernière zone touchée. L'état d'urgence est terminé. Il est temps de compter les morts et de revenir à la normale." #NT!
 panum.120.f: "« Que Dieu soit avec moi ! Que le Ciel bénisse cette nouvelle année. Qu'elle soit une année de fécondité, de paix et de prospérité ; qu'elle soit une année de paix et d'unité pour toute l'humanité ; que le monde soit libéré du choléra. » - Giacomo Meyerberr" #NT!
 panum.120.g: "Mais à quel prix ?" #NT!
  
 panum.200.t: "Épidémie de tuberculose" #NT!
 panum.200.d: "Une épidémie a éclaté dans l’un de nos États : la #YELLOW tuberculose#! fait des ravages en [SCOPE.sState('panum_disease_state').GetName] !" #NT!
 panum.200.f: "Au début du Moyen Âge, la tuberculose jouait un rôle mineur en Europe en raison de la faible densité de population. Elle n'était plus présente que dans quelques zones métropolitaines. Après une précédente épidémie en Italie dans la seconde moitié du XVe siècle, la vague de tuberculose la plus importante et la plus longue de l'histoire a commencé au XVIIe siècle. La tuberculose a suscité un intérêt généralisé au XIXe et au début du XXe siècle en tant que maladie endémique des pauvres des villes. En 1815, un quart des décès en Angleterre et en 1918 en France, un sixième des décès étaient dus à la tuberculose. Vers 1880, un décès sur deux en Allemagne dans la tranche d'âge de 15 à 40 ans était dû à cette maladie. La tuberculose était également la cause de décès la plus fréquente dans les zones rurales." #NT!
 panum.200.g: "Y a-t-il au moins un temps pour une mort romantique ?" #NT!
  
 panum.220.t: "Fin de l'épidémie de tuberculose" #NT!
 panum.220.d: "Les médecins de ville et de campagne signalent que le pic de tuberculose est déjà passé depuis quelques semaines. Bien que la maladie n'ait pas complètement disparu, elle est revenue dans les limites habituelles." #NT!
 panum.220.f: "« Je ne peux pas me laisser tromper par cette couleur ; cette goutte de sang est mon arrêt de mort ; je dois mourir. » - John Keats" #NT!
  
 panum.300.t: "Épidémie de variole" #NT!
 panum.300.d: "Une épidémie a éclaté dans l’un de nos États : la #YELLOW variole#! fait des ravages en [SCOPE.sState('panum_disease_state').GetName] !" #NT!
 panum.300.f: "La variole est probablement connue depuis des milliers d'années et est apparue dans les premières colonies du nord-est de l'Afrique il y a 12 000 ans. De là, ils ont peut-être été amenés en Inde par des commerçants égyptiens. Les conquérants européens ont apporté avec eux la variole en Amérique, où elle a provoqué des épidémies dévastatrices parmi les Indiens à partir de 1518, causant des millions de morts. En Europe, la variole était parfois considérée comme une maladie infantile, et la maladie, dont mouraient jusqu'à la fin du XVIIIe siècle jusqu'à 10 % de tous les jeunes enfants, était également appelée « maladie des enfants ». À partir du XVIIIe siècle, les cas de variole se sont multipliés et ont remplacé la peste comme la pire maladie. On estime que 400 000 personnes meurent chaque année de la variole et qu’un tiers de ceux qui ont survécu sont devenus aveugles. Souvent, les enfants n’étaient considérés comme faisant partie de la famille qu’une fois qu’ils avaient survécu à la variole. Malgré l’introduction réussie de la vaccination contre la variole vers 1800, la variole est restée une maladie épidémique jusqu’à la seconde moitié du siècle." #NT!
 panum.300.g: "Les produits cosmétiques deviendront bientôt populaires, je suppose." #NT!
  
 panum.320.t: "Fin de l’épidémie de variole" #NT!
 panum.320.d: "La terrible variole, l'un des pires fléaux de l'humanité, disparaît peu à peu de l'humanité. Ceux qui ont survécu sont marqués à vie." #NT!
 panum.320.f: "« Les nations futures sauront seulement par l'histoire que la variole répugnante a existé et que vous l'avez éradiquée. » - Thomas Jefferson" #NT!
  
 panum.400.t: "Épidémie de typhus" #NT!
 panum.400.d: "Une épidémie s'est déclarée dans l'un de nos États : le #YELLOW typhus#! fait des ravages en [SCOPE.sState('panum_disease_state').GetName] !" #NT!
 panum.400.f: "Le typhus, qui existait probablement dans l'Antiquité mais n'a été décrit de manière fiable qu'au XVIe siècle, se présentait avant tout comme une épidémie typique de guerre et de misère. Le typhus devint un sérieux problème pour l'armée de Napoléon pendant la campagne de Russie. Lorsque la Grande Armée, qui s'était déplacée en Russie en juin 1812, se retira à l'automne 1813, Mayence fut la première escale sur le sol français. 15 000 à 17 000 membres de l'équipage français et autant de civils y moururent. La maladie, qui était alors également appelée « fièvre nerveuse » en raison des symptômes neurologiques qu'elle provoquait, resta dans la langue française sous le nom de typhus de Mayence. Jusqu'à la fin du mois d'octobre 1814, 14 000 cas de typhus avaient été recensés dans la région franconienne autour du grand-duché de Wurtzbourg, dont 2 500 mortels. Une autre épidémie, qui a fait environ deux millions et demi de morts, s'est produite à la suite de la guerre et de la guerre civile entre 1918 et 1922 en Russie." #NT!
 panum.400.g: "Peut-être changer de vêtements ?" #NT!
  
 panum.420.t: "Fin de l'épidémie de typhus" #NT!
 panum.420.d: "Il semble que la phase la plus grave de l'épidémie de typhus soit terminée. Même si le décompte des victimes n'a pas encore été terminé, il est déjà clair que personne ne peut être tenu pour responsable de cette terrible épidémie." #NT!
 panum.420.f: "« Les seuls patients anglais que j'ai connus qui refusent le thé sont des cas de typhus ; et le premier signe de leur amélioration a été leur envie de thé. » - Florence Nightingale" #NT!
  
 panum.500.t: "Épidémie de fièvre jaune" #NT!
 panum.500.d: "Une épidémie a éclaté dans l'un de nos États : la #YELLOW fièvre jaune#! fait des ravages en [SCOPE.sState('panum_disease_state').GetName] !" #NT!
 panum.500.f: "La fièvre jaune est endémique dans les régions tropicales et subtropicales d'Amérique du Sud et d'Afrique. Aux XVIIIe et XIXe siècles, l'Amérique centrale, les Caraïbes et le sud des États-Unis actuels étaient également touchés. La maladie est probablement originaire d'Afrique et a atteint le Nouveau Monde via le commerce triangulaire atlantique. La première épidémie probable de la maladie s'est produite au Yucatan en 1648, où la maladie était appelée xekik (vomissement noir). Au moins 25 épidémies majeures ont suivi, comme celle de Philadelphie en 1793, au cours de laquelle plusieurs milliers de personnes sont mortes et le gouvernement américain et le président de l'époque, George Washington, ont été contraints de quitter la ville. L'une des premières descriptions médicales de la fièvre jaune en Amérique du Nord a été faite par John Lining (1756), un médecin de Charleston, où la fièvre jaune s'est déclarée en 1728 et 1732. Des épidémies occasionnelles ont également été signalées en Europe, par exemple à Barcelone en 1821, qui a fait plusieurs milliers de morts. En 1867, une éruption s'est produite à Fort Jefferson en Floride. En 1878, une éruption dans la vallée du Mississippi a tué 20 000 personnes, et la dernière éruption aux États-Unis a eu lieu à la Nouvelle-Orléans en 1905." #NT!
 panum.500.g: "Est-ce que les fruits avariés sont à blâmer ?" #NT!
  
 panum.520.t: "Fin de l'épidémie de fièvre jaune" #NT!
 panum.520.d: "Après que des rues entières et des familles ont été décimées par la fièvre jaune, les médecins et les autorités donnent le feu vert : l'épidémie est enfin terminée." #NT!
 panum.520.f: "« On l'appelle fièvre jaune, mais elle ne ressemble à rien de ce que les médecins connaissent ou lisent. » - Thomas Jefferson" #NT!

 ### 2.2.3c ###

 building_panum_tuberculosis_sanatorium: "Sanatorium pour la tuberculose" #NT!
 pmg_panum_sanatorium: "Sanatorium pour la tuberculose" #NT!
 pm_panum_sanatorium: "Sanatorium pour la tuberculose" #NT!
 building_panum_tuberculosis_sanatorium_tt: "Un sanatorium antituberculeux peut être fondé à la suite d'une épidémie de tuberculose dans les régions montagneuses. #R Il n'est activé que via un événement. #!" #NT!
  
 panum_tuberculosis: "Tuberculose" #NT!
 panum_tuberculosis_desc: "La tuberculose, également connue sous le nom de « mort blanche », était l’une des principales causes de décès à l’époque victorienne." #NT!
  
 panum_forbidden_spitting_modifier: "Interdiction de cracher" #NT!
 panum_tuberculosis_quarantine_modifier: "Quarantaine pour la tuberculose" #NT!
 panum_tuberculosis_sanatorium_cost_modifier: "Coût du sanatorium" #NT!
 panum_help_against_tuberculosis_modifier: "Aide contre la tuberculose" #NT!
 panum_praised_for_tuberculosis_initiative_modifier: "Félicité pour son discours sur la tuberculose" #NT!
 panum_supports_health_care_initiative_modifier: "Soutient l'initiative en matière de soins de santé" #NT!
 panum_opposes_health_care_initiative_modifier: "S'oppose à l'initiative sur les soins de santé" #NT!
 panum_tuberculosis_hospital_modifier: "Hôpital de la tuberculose" #NT!
  
 panum.201.t: "La tuberculose se propage à [SCOPE.sState('panum_disease_state').GetName]" #NT!
 panum.201.d: "L'épidémie de tuberculose s'est propagée malgré tous nos efforts. Elle sévit désormais également en [SCOPE.sState('panum_disease_state').GetName]." #NT!
 panum.201.g: "La mort blanche semble imparable." #NT!
 panum.202.t: "Une maladie héréditaire ?" #NT!
 panum.202.d: "Malgré tous les examens médicaux, l'origine de la tuberculose reste controversée. Certains membres de notre personnel médical pensent qu'il s'agit d'une maladie héréditaire ou du moins basée sur des « facteurs internes ». D'autres médecins pensent qu'il s'agit d'une maladie classique et contagieuse et recommandent des mesures radicales." #NT!
 panum.202.f: "En ce qui concerne le concept de pathogénèse, différentes traditions existaient dans les pays européens des XVIIIe et XIXe siècles. De nombreux auteurs médicaux de l'époque considéraient la tuberculose, ou la tuberculose, qui n'était pas toujours synonyme de tuberculose, comme la pire des épidémies connues à l'époque. Ils attribuaient les causes à une répartition inégale des humeurs corporelles, à des exhalaisons menaçantes du sol, à l'urbanisation ou au déclin des coutumes. En Italie, en revanche, il existait une tendance traditionnelle à une cause contagieuse, c'est-à-dire transmissible. Par conséquent, au milieu du XVIIIe siècle, la République de Venise a introduit l'obligation écrite de signaler les cas de phtisie (phtisie due à la tuberculose pulmonaire). Les effets personnels des personnes décédées de la maladie étaient brûlés pour réduire le risque d'infection. En Angleterre et dans les pays nordiques, en revanche, on pensait généralement que la maladie était due à une cause héréditaire." #NT!
 panum.202.g: "C'est une maladie héréditaire et nous ne pouvons rien faire." #NT!
 panum.202.h: "C’est une maladie contagieuse et nous devons faire tout ce que nous pouvons pour empêcher sa propagation !" #NT!
 panum.203.t: "Cracher dans la rue" #NT!
 panum.203.d: "En raison du manque de connaissances sur les causes de la tuberculose, ces mesures ont également suscité des controverses. Ceux qui pensaient que la maladie était contagieuse préconisaient des interdictions radicales, notamment de cracher dans les lieux publics, pour empêcher la propagation de la maladie. Cela touchait particulièrement les classes populaires. Les sceptiques voyaient dans ces réglementations un moyen de harceler les gens ordinaires." #NT!
 panum.203.f: "Même si les règles de bienséance du XVIIIe siècle ont éradiqué certaines « mauvaises habitudes » dans les classes supérieures et moyennes, de nombreuses manies douteuses sur le plan hygiénique sont restées longtemps répandues dans les masses. Au début du XIXe siècle, les mouchoirs et les crachoirs n'étaient pas encore très répandus dans la société et ce n'est qu'au tournant du siècle qu'il est devenu courant d'interdire de cracher dans les transports publics, par exemple." #NT!
 panum.203.g: "Bannissez cette habitude dégoûtante !" #NT!
 panum.203.h: "Annoncez une interdiction draconienne et faites payer les malfaiteurs !" #NT!
 panum.203.i: "Cracher est une chose humaine qui ne peut être interdite." #NT!
 panum.204.t: "[SCOPE.sCharacter('disease_victim_scope').GetFullName] a contracté la tuberculose !" #NT!
 panum.204.d: "L'épidémie de tuberculose a également touché notre artiste [SCOPE.sCharacter('disease_victim_scope').GetFullName] ! Étonnamment, [SCOPE.sCharacter('disease_victim_scope').GetSheHe] ne la considère pas comme le pire coup du sort." #NT!
 panum.204.f: "Au début du XIXe siècle, mais aussi bien au-delà, la tuberculose était considérée comme une « maladie romantique ». Elle donnait à la victime le temps de se préparer à la mort et beaucoup considéraient la pâleur qui lui était associée comme tout simplement noble. Des écrivains lui ont consacré plusieurs œuvres, comme Dumas le Jeune avec La Dame aux camélias. On lui trouve une transfiguration similaire dans les opéras de Verdi (La Traviata) et de Puccini (La Bohème). George Sand, la compagne de Chopin, aurait noté : « Chopin tousse avec une grâce infinie. »" #NT!
 panum.204.i: "Ne serait-ce pas une occasion inspirante pour un requiem ?" #NT!
 panum.204.j: "Mais la tuberculose n’a-t-elle pas toujours été le sujet des écrivains ?" #NT!
 panum.204.k: "Mais cette maladie même n’incite-t-elle pas à visualiser la misère ?" #NT!
 panum.205.t: "Sanatorium pour la tuberculose" #NT!
 panum.205.d: "En raison de l'épidémie de tuberculose qui sévit en [SCOPE.sState('panum_disease_state').GetName], un médecin de cette localité a suggéré de transférer certains patients fortunés dans les montagnes. Le climat de haute altitude et l'air purifiant les guériraient de la maladie. Il faudrait créer un sanatorium pulmonaire spécialement dédié à cet effet. [SCOPE.sState('panum_davos_scope').GetName] semble être l'endroit idéal pour un tel sanatorium." #NT!
 panum.205.f: "La cure d'air est une forme de thérapie climatique qui a longtemps été considérée comme la thérapie standard contre la tuberculose à partir du XIXe siècle. Les patients s'allongent sur des chaises longues en plein air ou dans des salons ouverts pendant plusieurs heures par jour. Le traitement par l'air était effectué dans des sanatoriums pulmonaires spéciaux. En Allemagne, le docteur Hermann Brehmer fut le premier à décrire la tuberculose, une maladie jusqu'alors incurable, comme guérissable à l'aide de la thérapie par l'air. En 1856, il rédigea sa thèse sur la guérison de la tuberculose chronique des poumons. Il partait du principe qu'il existe des « lieux immuns » qui, d'une part, en raison de leur climat, protègent efficacement les habitants contre l'apparition de la tuberculose et, d'autre part, ont un effet curatif après l'apparition de la maladie. En Suisse, le médecin d'origine allemande Alexander Spengler fut un pionnier de la thérapie par l'air. Il commença à exercer comme médecin de campagne à Davos en 1853 et arriva rapidement à la conclusion que les habitants de la région ne souffraient généralement pas de tuberculose, ce qu'il attribuait au climat de haute montagne. Thomas Mann a glorifié Davos comme station climatique dans son « Zauberberg »." #NT!
 panum.205.g: "Construisez un Sanatorium à [SCOPE.sState('panum_davos_scope').GetName] !" #NT!
 panum.205.h: "Tout cela n’est que de la charlatanerie de luxe." #NT!
 panum.206.t: "La maladie des prolétaires" #NT!
 panum.206.d: "L’épidémie de tuberculose du [SCOPE.sState('panum_disease_state').GetName] frappe plus durement les classes populaires. Le [SCOPE.sCharacter('union_leader').GetFullName] a donc particulièrement critiqué les conditions actuelles et appelé à des changements en profondeur." #NT!
 panum.206.f: "La tuberculose a suscité un intérêt généralisé au XIXe et au début du XXe siècle en tant que maladie endémique des pauvres des zones urbaines. En 1815, un quart des décès en Angleterre et en 1918 en France un sixième des décès étaient causés par la tuberculose. Vers 1880, en Allemagne, un décès sur deux dans la tranche d'âge de 15 à 40 ans était dû à cette maladie." #NT!
 panum.206.g: "Peut-être que les pauvres devraient simplement se laver davantage ?" #NT!
 panum.206.h: "Des améliorations sélectives dans ce domaine sont nécessaires." #NT!
 panum.206.i: "La question des soins de santé est une affaire nationale." #NT!
 panum.206.j: "Bravo pour cette initiative !" #NT!
 panum.207.t: "Initiative religieuse" #NT!
 panum.207.d: "[SCOPE.sCharacter('devout_leader').GetFullName] a personnellement défendu les intérêts des nombreux malades du [SCOPE.sState('panum_disease_state').GetName]. [SCOPE.sCharacter('devout_leader').GetSheHe|U] aimerait y créer prochainement un hôpital à but non lucratif." #NT!
 panum.207.f: "« Il n’existe guère de pays où, d’une manière ou d’une autre, la lutte contre la tuberculose n’ait pas été entreprise, et il est extrêmement gratifiant de voir comment la campagne est désormais menée de manière assez générale et avec une vigueur considérable contre ce dangereux ennemi. » - Robert Koch" #NT!
 panum.207.g: "Ces conteurs essaient juste d’acquérir de l’influence !" #NT!
 panum.208.t: "La peste blanche fait des ravages" #NT!
 panum.208.d: "L'épidémie de tuberculose en [SCOPE.sState('panum_disease_state').GetName] s'est aggravée. Le nombre de malades et de morts augmente de jour en jour. Aucun médecin ne s'attendait à cette évolution." #NT!
 panum.208.f: "« Comme je suis pâle ! Je voudrais mourir de tuberculose, je crois… car alors toutes les femmes diraient : « Regardez ce pauvre Byron, comme il a l’air intéressant en mourant ! » – Lord Byron" #NT!
 panum.208.g: "Est-ce que cela ne finira jamais ?" #NT!

 ### 2.2.4 ###

