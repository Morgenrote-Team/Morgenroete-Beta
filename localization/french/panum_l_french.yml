 je_panum_disease_investigation: "Examen de la maladie" #NT!
 je_panum_disease_investigation_reason: "Il arrive parfois qu'un médecin, dans le cadre de ses recherches médicales habituelles, se lance dans l'étude d'une maladie bien précise. Il ne s'agit pas d'une maladie épidémique, mais plutôt de maladies courantes, de maladies infantiles ou de maladies répandues. On peut citer comme exemples le rachitisme, les calculs rénaux ou la syphilis.\n\nContrairement à d'autres cas, le médecin effectue ces recherches à côté, ce qui signifie qu'il n'est pas occupé et qu'il n'est pas disponible pour d'autres activités. Si un médecin décède, le projet n'est pas perdu, mais mis en suspens jusqu'à ce qu'un autre médecin prenne la relève." #NT!
  
