 je_panum_medical_techniques_project: "Introduire les techniques médicales" #NT!
 je_panum_medical_techniques_project_reason: "L'objectif du docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] est de diffuser les dernières technologies médicales dans le [GetPlayer.GetName]. La rapidité avec laquelle ce processus se déroule dépend des traits de caractère et de l'expérience du [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]. Une fois la réforme médicale achevée, notre nation recevra un meilleur modificateur pour remplacer l'ancien. Dans certains cas, un [concept_panum_physician] peut développer ses propres inventions qui révolutionnent l'histoire de la médecine." #NT!
 panum_medical_techniques_advance_tt: "Les techniques médicales au [GetPlayer.GetName] s'améliorent d'un niveau" #NT!
  
 panum.2401.t: "Vaccination" #NT!
 panum.2401.d: "L’introduction d’un programme général de vaccination a d’abord été accueillie avec scepticisme par la population, mais après que le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a visité plusieurs provinces du pays et a démontré la procédure, la plupart des patients s’y sont habitués." #NT!
 panum.2401.f: "L'idée d'une campagne de vaccination avait suscité une certaine résistance, du moins au début. Des mères inquiètes avec leurs enfants effrayés, des vieux messieurs ratatinés qui se montraient sceptiques face à cette nouvelle merveille, des personnes très pieuses qui craignaient que la science ne falsifie quelque chose qui dépassait leur entendement. L'éducation a réglé ce problème - des explications sur le fonctionnement et les raisons de cette nouvelle merveille - mais les résultats ont été bien plus que cela. Des enfants qui ont conservé la vue et la santé, et non les terribles séquelles d'une des maladies les plus mortelles que l'humanité ait jamais connue. Peu de gens avaient besoin d'être convaincus lorsqu'ils les ont vus sans cicatrices et pleins de vie." #NT!
 panum.2401.g: "C'est une révolution médicale !" #NT!
 panum.2401.h: "Nos normes médicales et d’hygiène augmentent." #NT!
 panum.2402.t: "Anesthésie" #NT!
 panum.2402.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a déjà fait la démonstration de cette nouvelle méthode d'anesthésie dans plusieurs cliniques. Elle est désormais considérée comme la méthode standard pour les opérations particulièrement désagréables." #NT!
 panum.2402.f: "« Zzz. »" #NT!
 panum.2402.g: "Des opérations médicales sans conscience ? Est-ce autorisé ?" #NT!
 panum.2403.t: "Seringues et pinces" #NT!
 panum.2403.d: "Le nouvel équipement médical introduit par le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] demande un certain temps d'adaptation, mais il est désormais standard dans tous les cabinets médicaux." #NT!
 panum.2403.f: "« Quel genre d'outil est-ce, docteur ? »\n« Pas un outil, mais une seringue. On peut s'en servir pour injecter du liquide. »\n« Et c'est pour la chirurgie dentaire, je suppose ? »\n« Non, des forceps. »\n« Bien, bien. Et c'est un nouveau scalpel ? »\n« Mes couverts pour le déjeuner. »" #NT!
 panum.2403.g: "La professionnalisation dans ce domaine est tout simplement étonnante." #NT!
 panum.2404.t: "Stérilisation" #NT!
 panum.2404.d: "Ayant prouvé avec succès l'importance de la stérilisation, le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a fait de la pratique courante pour tous les médecins de [GetPlayer.GetName] de se laver les mains et de nettoyer leurs instruments !" #NT!
 panum.2404.f: "« Bien sûr, il y a encore des gens qui croient que ces pratiques sont inutiles, et beaucoup d'entre eux sont des hommes érudits qui ont sauvé de nombreuses vies auparavant. À ces hommes sacrés, je dis ceci : écoutez les preuves. La découverte de la théorie des germes a prouvé que la maladie naît d'une créature microscopique, qui pourrait être détruite bien avant l'infection, sauvant ainsi des vies qui autrement auraient pu être perdues. Rien n'est plus flagrant que dans la maternité du plus grand hôpital de la ville, où le taux de mortalité des nouvelles mères a été considérablement réduit de 18,3 % à seulement 2,2 % un seul mois plus tard. » « De toute évidence, messieurs, les résultats parlent d'eux-mêmes. »" #NT!
 panum.2404.g: "Qui aurait cru que se laver les mains après avoir touché des personnes malades était si important ?" #NT!
 panum.2404.h: "Ah, donc un médecin a une autre raison pour une bouteille d'alcool !" #NT!
 panum.2404.i: "Hmm. Cela semble être une excuse pratique..." #NT!
 panum.2405.t: "Dossiers médicaux" #NT!
 panum.2405.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a largement modernisé le séjour du patient, que ce soit au cabinet médical ou à l'hôpital, avec un meilleur enregistrement et la création de dossiers médicaux." #NT!
 panum.2405.f: "Un dossier médical décrit la documentation systématique des antécédents médicaux et des soins d'un patient au fil du temps dans la juridiction d'un prestataire de soins de santé particulier. L'histoire médicale est un enregistrement longitudinal de ce qui est arrivé au patient depuis sa naissance. Il relate les maladies, les affections majeures et mineures, ainsi que les étapes de croissance. Il donne au clinicien une idée de ce qui est arrivé au patient auparavant. Par conséquent, il peut souvent donner des indices sur l'état actuel de la maladie. L'histoire médicale comprend plusieurs sous-ensembles tels que les antécédents chirurgicaux, les médicaments et les allergies médicales, les habitudes ou l'historique des vaccinations. Dans le dossier médical, les rencontres médicales individuelles sont marquées par des résumés discrets des antécédents médicaux d'un patient par un médecin, une infirmière praticienne ou un assistant médical et peuvent prendre plusieurs formes. Lorsqu'un patient est hospitalisé, des mises à jour quotidiennes sont saisies dans le dossier médical pour documenter les changements cliniques." #NT!
 panum.2405.g: "Statistiques, mathématiques, bureaucratie et médecine – enfin réunis !" #NT!
 panum.2406.t: "Présentation de l'ambulance" #NT!
 panum.2406.d: "Il y a quelques jours, un riche entrepreneur de [ROOT.GetCountry.GetCapital.GetCityHubName] a généreusement fait don d'un nouveau véhicule à l'hôpital local : la première ambulance autonome de tout [GetPlayer.GetName]" #NT!
 panum.2406.f: "« ... et là, je l'ai vue. Peinte d'un blanc éclatant et fièrement ornée d'une croix, la nouvelle ambulance n'avait pas besoin de chevaux ni de la force des hommes, mais portait plutôt la puissance de son propre moteur. Pour la première fois, des hommes et des femmes blessés ayant le plus besoin d'aide pouvaient être conduits rapidement vers le confort et les soins de l'hôpital, une chose qui sauverait à coup sûr la vie d'innombrables âmes qui autrement auraient pu être perdues. Cela m'a ému le cœur de la voir, car ici, le meilleur de l'homme, l'amour qu'il peut porter aux étrangers, était exposé aux yeux de tous. »\n\nExtrait d'un journal local, la Gazette [ROOT.GetCountry.GetCapital.GetCityHubName], [TimeKeeper.GetCurrentDate.Format('y')]." #NT!
 panum.2406.g: "Magnifique ! Il ne manque plus qu'une sirène..." #NT!
 panum.2406.h: "Excellent! Nos hôpitaux en feront grand usage!" #NT!
 panum.2407.t: "L'ambulance aérienne" #NT!
 panum.2407.d: "Une nouvelle vient d'arriver dans la capitale : un pilote vient de transporter une femme en travail depuis la campagne jusqu'à un hôpital, le premier vol médical de l'histoire de [GetPlayer.GetName] !" #NT!
 panum.2407.f: "« ... bien sûr, c'était assez difficile de se concentrer. Un avion n'a pas de sièges pour beaucoup de monde, vous savez, et on pouvait presque entendre les gémissements de l'accouchement par-dessus le bruit de l'hélice et du moteur. Bien sûr, ce ne sont que des détails insignifiants comparés à l'acte lui-même - il n'y a pas une âme sur cette Terre qui puisse étouffer les cris d'une femme dans le besoin, alors quand elle a commencé à accoucher sur le site d'observation, j'ai fait ce que toute bonne âme ferait, et je l'ai confiée aussi rapidement que possible aux mains expertes et compétentes d'un hôpital. On m'a dit que cela aurait été un accouchement par le siège dangereux, mais le fait d'être là si tôt a permis au médecin d'ajuster la position de l'enfant avant une naissance saine et naturelle.\nEh bien oui, je crois que l'enfant a été nommé d'après moi. »\n\nInterview d'un journal local, la Gazette [ROOT.GetCountry.GetCapital.GetCityHubName], [TimeKeeper.GetCurrentDate.Format('y')]." #NT!
 panum.2407.g: "Les bébés arrivent donc vraiment par avion !" #NT!
 panum.2407.h: "Un soupir de soulagement pour les mères du monde entier !" #NT!
  
 panum.52.l: "L'épidémie de rougeole au [SCOPE.sCountry('panum_measles_country_scope').GetName]." #NT!
 panum.52.n: "L'épidémie de peste au [SCOPE.sCountry('panum_plague_country_scope').GetName]." #NT!
 panum.52.o: "L'épidémie de diphtérie au [SCOPE.sCountry('panum_diphteria_country_scope').GetName]." #NT!
 panum.52.p: "L'épidémie de polio au [SCOPE.sCountry('panum_polio_country_scope').GetName]." #NT!
  
