 panum.52.t: "Expédition d'observation médicale"
 panum.52.d: "Le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a mis en place une petite équipe d'experts et d'assistants qui conviennent pour observer de près une épidémie à l'étranger et en tirer des conclusions. La question se pose désormais de quelle maladie doit être observée dans quel pays."
 panum.52.f: "Il existe deux types différents d'expéditions médicales qu'un médecin peut entreprendre: les expéditions d'observation et les expéditions de recherche. Les expéditions d'observation aident à terminer une description d'une maladie, des expéditions de recherche pour découvrir une méthode de traitement. Cependant, une expédition n'est pas aussi efficace que la recherche sur place et il peut prendre plusieurs tentatives pour rechercher pleinement une maladie."
