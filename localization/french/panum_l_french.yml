 je_panum_cholera_treatment_expedition_reason: "Le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] dirige une expédition médicale en [SCOPE.sCountry('target').GetName] pour trouver des méthodes de traitement contre le #YELLOW choléra#!. Tant que la maladie fait rage dans le pays, [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] a une chance mensuelle de traquer les causes de la maladie et de la contenir.\n\nSi la maladie s'atténue, les progrès scientifiques ne seront pas perdus, mais seront également présents lors du prochain examen." #NT!
