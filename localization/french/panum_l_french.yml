 panum.51.t: "Le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] se rend à l'état épidémique"
 panum.51.f: "Une description complète d'une maladie est une première étape vers la compréhension et la lutte ultérieurement. Les descriptions n'ont pas encore d'effet direct sur l'atténuation, mais sont le fondement d'une méthode de traitement ultérieure. Les médecins qui étudient une épidémie dans leur propre pays travaillent plus efficacement que les médecins en voyage à l'étranger."
 je_panum_cholera_description: "Diagnostic du choléra"
 je_panum_tuberculosis_description: "Diagnostic de tuberculose"
 je_panum_smallpox_description: "Diagnostic de variole"
 je_panum_typhus_description: "Diagnostic de typhus"
 je_panum_yellow_fever_description: "Diagnostic de fièvre jaune"
 je_panum_cholera_description_reason: "Le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] examine actuellement plusieurs patients pour déterminer les symptômes de #YELLOW cholera#!. Il est crucial de pouvoir différencier d'autres maladies similaires ou coexistantes. À la fin de son travail, le scientifique met sa description à la disposition du public afin que les générations futures aient de meilleures chances de reconnaître le contexte de la maladie et de trouver des méthodes de traitement."
