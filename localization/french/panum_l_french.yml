 panum.139.d: "Après de grands efforts, le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a finalement écrit le traité [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] sur une méthode de traitement réussie pour la maladie [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_disease_title')]. Il est considéré comme une étape importante en médecine [ROOT.GetCountry.GetAdjectiveNoFlag]."
