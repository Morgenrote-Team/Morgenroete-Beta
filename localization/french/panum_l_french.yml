 panum.138.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_description_title')]" #NT!
 panum.138.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a présenté aujourd'hui la description de la maladie [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] de [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_disease_title')]. La Faculté de médecine la considère déjà comme un classique." #NT!
 panum.138.f: "Dans le traité [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis], les [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_description_title')] et [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] traitent de la maladie de manière plus détaillée que n'importe quel autre médecin de notre pays avant lui. Ils renseignent le lecteur sur les symptômes, la période d'incubation et la différenciation par rapport à d'autres maladies, ainsi que sur la chronologie des épidémies passées et d'autres descriptions épidémiologiques traditionnelles." #NT!
 panum.138.g: "Maintenant, nous connaissons mieux la bête." #NT!
 panum.139.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_treatment_title')]" #NT!
 panum.139.d: "Après de grands efforts, le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a finalement écrit son [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] sur une méthode de traitement efficace de la maladie [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_disease_title')]. Il est considéré comme une étape importante dans la médecine [ROOT.GetCountry.GetAdjectiveNoFlag]." #NT!
 panum.139.f: "La Faculté de médecine attendait avec impatience la publication d'un article scientifique sur la méthode de traitement de [ROOT.Var('panum_physician_var').GetCharacter.GetFullName]. Ce travail pourrait-il être une percée ? [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_treatment_title')] pourrait potentiellement sauver la vie d'innombrables personnes. Les raisons qui ont conduit à l'apparition de [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_disease_title')] et les moyens de la prévenir ou de la traiter par la suite pourraient changer fondamentalement la façon dont cette maladie est considérée." #NT!
 panum.139.g: "[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_disease_title')] perd son horreur." #NT!
  
 panum.140.t: "Le choléra : une maladie transmise par l’eau !" #NT!
 panum.140.d: "Grâce au travail héroïque du docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], l’épidémie de choléra en [SCOPE.sState('panum_disease_state').GetCityHubName] a été définitivement écrasée !" #NT!
 panum.140.f: "« Depuis le début de mon séjour ici à [SCOPE.sState('panum_disease_state').GetCityHubName], j'ai recueilli une grande quantité d'informations qui mènent toutes à une seule conclusion : le choléra est une maladie transmise par l'eau. La maladie qui a tué tant de personnes pendant des siècles ne se trouve pas dans l'air, sous forme de miasmes, mais se tortille et grouille dans les gouttes d'eau. Ingérée, elle se développe dans les intestins et se manifeste sous forme de choléra que nous avons appris à combattre. C'est une leçon durement apprise, mais rapidement mise en pratique. La semaine dernière, ils ont retiré les poignées de la pompe à eau au cœur de cette épidémie. Aujourd'hui, je me retire ce soir sans qu'un seul nouveau cas ne soit apporté à ma table. C'est irréfutable. La bête est tuée.\n\nPourtant, je ressens un pincement au cœur pour tout cela. Je ne souhaite pas pouvoir revendiquer l'entière et seule responsabilité des découvertes que nous avons faites ici, seulement qu'elles auraient pu être découvertes encore plus tôt. De nombreuses vies ont été perdues à cause du manque d'eau potable, jeunes et vieux. Si nous avons de la chance, que ce soit la dernière fois que nous serons confrontés au choléra.\n\nExtrait du journal du Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], qui relate la grande épidémie de choléra du [TimeKeeper.GetCurrentDate.Format('y')], concluant l'enquête au [SCOPE.sState('panum_disease_state').GetCityHubName]." #NT!
 panum.140.g: "Incroyable ! C'est un coup mortel pour la théorie des miasmes !" #NT!
 panum.141.t: "La Brasserie" #NT!
 panum.141.d: "L'enquête du docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a conduit [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] vers un îlot de sécurité au cœur de l'épidémie : une brasserie de bière." #NT!
 panum.141.f: "« Bonjour ! On m'a dit que vous étiez le contremaître de la brasserie. Je suis le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] et je suis ici pour enquêter sur l'épidémie. S'il vous plaît, dites-m'en plus. »\n\n« Eh bien, ça n'a pas été un gros problème ici. La plupart des autres usines ont fermé, mais pas nous. »\n\n« Le choléra ne vous affecte pas beaucoup, ici ? Vous avez une idée de pourquoi ? »\n\n« Ce n'est pas le premier indice, j'en ai peur. Mais si je devais parier, c'est parce que les gars ne rentrent pas chez eux avec toute cette puanteur. »\n\n« Ils mangent à la brasserie ? »\n\n« Oui, et ils boivent aussi ! Le patron nous laisse tous prendre quelques-uns des vieux lots qui ne se vendent pas bien avec le déjeuner, un petit remontant pour les garçons à moindre coût. Pas d'eau de puits pour nous, juste une pinte de bière pour presque aussi peu que son coût de production." #NT!
 panum.141.g: "Hmmm...donc tu ne bois pas l'eau locale. Très fascinant." #NT!
 panum.142.t: "Créatures d'habitude" #NT!
 panum.142.d: "L'enquête du docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] continue - [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] a trouvé ce qui pourrait être le centre de l'épidémie." #NT!
 panum.142.f: "'... mais les cas étaient si fréquents dans la région que j'ai réalisé que j'avais besoin de plus de conseils. Heureusement, le bureau local du coroner s'est avéré d'une aide précieuse : ils avaient noté l'adresse de chaque maison dans laquelle ils avaient prélevé un corps ou constaté une maladie, ce qui m'a fourni les moyens de placer chacune d'elles avec précision sur une simple carte. La zone résultante est vaste, englobant bien plus d'une centaine de maisons, mais elle forme également un vaste cercle.\n\nCela va à l'encontre de la pensée traditionnelle. S'il s'agissait d'un miasme, il serait alors sûrement emporté par la brise, voyageant avec les vents dominants. Au lieu de cela, il va au-delà des vents, rond et d'une netteté troublante. J'ai marché jusqu'au centre de tout cela, espérant peut-être trouver un indice... et je n'ai trouvé rien d'autre qu'une pompe à eau. Chaque maison sur la carte était à distance de marche. Il doit y avoir une sorte de connexion.'\n\nExtrait du journal du Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], écrivant sur la grande épidémie de choléra du [TimeKeeper.GetCurrentDate.Format('y')], enquêtant dans le [SCOPE.sState('panum_disease_state').GetCityHubName]." #NT!
 panum.142.g: "Est-ce que ça pourrait être dans la pompe, d'une manière ou d'une autre ?" #NT!
 panum.143.t: "Les bizarres" #NT!
 panum.143.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a découvert quelque chose d’intéressant : une rupture dans le modèle." #NT!
 panum.143.f: "« Oh, Dieu merci ! Vous devez être le docteur dont ils parlent, docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ! S'il vous plaît, vous devez nous aider. »\n\n« J'en ai bien l'intention, madame. S'il vous plaît, dites-moi tout ce que vous pouvez sur vous et les vôtres, et n'épargnez pas le moindre détail si vous le pouvez. Le vôtre semble être l'un des seuls cas dans ce quartier ? »\n\n« Oui, oui, nous le sommes ! C'est sorti de nulle part ! Nous avons pris toutes les précautions, nous avons même porté l'un de ces masques fleuris avec toutes les fleurs pour éviter la puanteur ! »\n\n« Alors vous êtes allé dans la zone de l'épidémie ? Pour quoi que ce soit ? »\n\n« Ma mère, ma chère mère... elle a toujours préféré l'eau de leur pompe, mais quand je l'ai ramenée, la maladie a dû coller à mes vêtements et est rentrée à la maison avec moi. »" #NT!
 panum.143.g: "...tu as dit que tu avais ramené de l'eau de leur pompe ?" #NT!
 panum.144.t: "Les filtres" #NT!
 panum.144.d: "Dans le but de découvrir plus d'indices sur l'épidémie, le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a découvert que toutes les victimes s'approvisionnent en eau auprès de la même entreprise !" #NT!
 panum.144.f: "'... mais c'est la chose la plus curieuse de toutes. Quand je me suis rendu sur la route ou en amont de la rivière, dans des maisons entretenues par la New River Company, le nombre de cas de choléra a chuté de façon spectaculaire. Il n'était pas plus élevé que d'habitude, si ce n'est moins. De retour au sud, on découvre que les rues sont en feu à cause du choléra, remplies de la puanteur des intestins dérangés et de la mort. Serait-ce une localisation de sol miasmatique ?\n\nJe ne pense pas. Cela semble trop clairement indiqué. J'ai contacté les honorables messieurs de la New River Company, et ils m'ont informé que leurs canalisations avaient récemment été fermées pendant qu'ils ajoutaient de nouveaux filtres, à grands frais, à leur station de pompage. Ces filtres pourraient-ils jouer un rôle invisible dans tout cela ? Serait-ce la propreté oisive de l'eau qui maintient les miasmes à distance, ou quelque chose de plus ?'\n\nExtrait du journal du Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], écrivant sur la grande épidémie de choléra du [TimeKeeper.GetCurrentDate.Format('y')], enquêtant au [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.144.g: "...y a-t-il quelque chose dans l’eau qui apporte des maladies ?" #NT!
 panum.145.t: "Eau brune" #NT!
 panum.145.d: "Équipé des derniers instruments de recherche, le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a utilisé un microscope [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] pour examiner des échantillons de l'épidémie de choléra." #NT!
 panum.145.f: "Il n'avait pas été facile d'amener le microscope jusqu'à [SCOPE.sState('panum_disease_state').GetCityHubName], car une bosse sur la route avait presque brisé toutes les lentilles... mais maintenant qu'il était là, le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] avait à sa disposition l'un des meilleurs outils de la médecine moderne. Quelques dizaines d'échantillons prélevés dans l'eau locale, soigneusement préparés, et chacun observé au microscope. Certains venaient de zones où le choléra était moins répandu. C'étaient les plus propres, remarqua [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe].\n\nMais les sales ? Ceux qui étaient infestés de crasse de la plus vile espèce ?\n\nC'étaient ceux des zones les plus touchées. Un sourcil frotté, un instant de réflexion. Des lueurs de crasse flottant dans le liquide, comme des flocons de neige sale. Ici, là, les minuscules mouvements de microbes inoffensifs, voletant innocemment dans la misérable soupe." #NT!
 panum.145.g: "...ou n'es-tu pas aussi inoffensif que tu le parais ?" #NT!
 panum.145.h: "Une preuve supplémentaire pour une autre théorie." #NT!
 panum.145.i: "Il doit y avoir plus que ça." #NT!
 panum.146.t: "La première mort" #NT!
 panum.146.d: "Après un travail et une enquête inlassables, le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a réussi à remonter à l'origine de l'épidémie jusqu'au premier cas enregistré : un nouveau-né." #NT!
 panum.146.f: "Il y avait peu de souvenirs plus sinistres de ce que faisait le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] que la visite au domicile d'une femme en plein deuil, une femme qui avait été une fois épouse et une fois mère, mais qui n'était désormais ni l'une ni l'autre. Déjà, à peine sorti de sa porte, le docteur prenait leurs notes.\n\nUn nouveau-né emporté dans la rue pour rendre visite à sa grand-mère. Il est revenu avec le choléra. Les couches lavées, peut-être porteuses de la maladie.\n\nLe mari est revenu du travail. Soif après son service à l'aciérie. Il a bien mangé, bien bu, est mort à la fin de la semaine, du choléra.\n\nDerrière eux, des gémissements. Devant eux, des rues pluvieuses et désolées. Au milieu de tout cela, une phrase murmurée." #NT!
 panum.146.g: "S'il vous plaît, que tout cela prenne fin." #NT!
 panum.147.t: "La fosse" #NT!
 panum.147.d: "En menant l'enquête [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis], le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a découvert quelque chose qui avait été négligé : une fosse septique." #NT!
 panum.147.f: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] n'aimait pas la théorie des miasmes, mais [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] se trouva très reconnaissant pour les masques floraux censés les tenir à distance. La fosse était pleine de déchets pourris et complètement rances. Même l'inspecteur de police s'écarta de son bord.\n\n'Docteur ! Une telle fosse doit sûrement être la source de ces miasmes, et du misérable choléra qu'elle nous donne !'\n\n'Peut-être, mais regardez ici, inspecteur. Voyez-vous la façon dont la pluie s'écoule dans la terre, ici ?'\n\n'Oui, je la vois, mais qu'en est-il ?'\n\n'L'eau de pluie coule de cette fosse là-bas, vers les gouttières. Elle doit les traverser, mais si c'est le cas, elle amènerait l'eau près de la pompe. Si les raccords sont compromis...'\n\n'... alors les eaux usées auraient coincé jusqu'à la poignée. Beurk. Heureusement que la maladie ne se propage pas par l'eau...'" #NT!
 panum.147.g: "...droite?" #NT!
 panum.147.h: "Faux!" #NT!
 panum.148.t: "Le Manoir" #NT!
 panum.148.d: "L'enquête du docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a conduit [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] dans un curieux trou dans l'emprise de l'épidémie : la maison d'un homme riche." #NT!
 panum.148.f: "« J'ai visité aujourd'hui la résidence d'un gentilhomme local, une demeure plus imposante dans les limites de la ville, dangereusement proche du cœur de l'épidémie. Elle semble être un vestige d'une époque antérieure de l'histoire de cette ville, lorsque cette partie était plus riche qu'un petit bidonville. Le maître de maison était tout à fait fasciné par l'enquête et m'a fourni un grand nombre de livres sur l'histoire locale dans l'espoir qu'ils puissent faire la lumière sur les épidémies passées. Plus intéressant encore, ils m'ont clairement fait comprendre que le choléra n'avait pas encore atteint les murs de leur maison. Cela m'a fasciné, car selon les principes de la théorie des miasmes, la maladie est dans l'air, dans l'odeur, et ne devrait pas faire de distinction entre riches et pauvres de cette manière. Même ses domestiques ne sont pas touchés, ceux qui vivent dans les locaux, du moins. Ils mangent dans la réserve et boivent dans le puits artésien à l'intérieur des murs, et d'une manière ou d'une autre, cela les rend indemnes. Une énigme curieuse. Est-ce quelque chose qu'ils ont que les autres n'ont pas ?\n\nExtrait du journal du Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], écrivant sur la grande épidémie de choléra du [TimeKeeper.GetCurrentDate.Format('y')], enquêtant sur le [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.148.g: "Ou peut-être que les domestiques manquent de quelque chose que les malades pourraient avoir ?" #NT!
 panum.149.t: "La petite mort" #NT!
 panum.149.d: "L'enquête du docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a peut-être révélé le coupable : un microbe !" #NT!
 panum.149.f: ""... mais il me fallait être particulièrement sûr. J'ai demandé de nouveaux échantillons, prélevés à la fois dans l'eau et dans les effluents spécialement préparés des malades. Placé sur la vitre de mon microscope, j'ai pu observer l'intérieur de ces liquides et confirmer la présence de ce qui doit être notre grand ennemi dans cette bataille : les vibrions.\n\nÀ première vue, ces microbes semblent inoffensifs, plus comme des tubes que n'importe quel grand prédateur. Mais chaque échantillon des malades confirme leur présence, et il semble certain que ces créatures jouent un rôle dans cette maladie. Sont-ils... le choléra lui-même ? Peut-être. Si c'est le cas, c'est une preuve solide de la théorie selon laquelle des germes comme celui-ci provoquent des maladies.\n\nMais une chose est sûre : nous avons trouvé l'ennemi. Maintenant, nous devons le tuer. "\n\nExtrait du journal du Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], écrivant sur la grande épidémie de choléra du [TimeKeeper.GetCurrentDate.Format('y')], enquêtant dans le [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.149.g: "Nettoyez et traitez jusqu'à ce que ce soit terminé." #NT!
 panum.149.h: "Cette découverte va bien au-delà du choléra." #NT!
 panum.150.t: "Une question pratique" #NT!
 panum.150.d: "Allié rare dans la lutte contre la maladie, le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] rencontre le coroner de [SCOPE.sState('panum_disease_state').GetCityHubName] pour discuter de leurs conclusions." #NT!
 panum.150.f: "« Ah, vous devez être le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ! Pardonnez-moi de ne pas vous serrer la main, j'ai passé ces derniers jours à fouiller dans les cadavres. »\n\n'... croyez-moi, vous n'avez pas besoin de me demander pardon. Vous êtes le coroner local, s'il vous plaît, faites-moi part de vos découvertes. »\n\n'Comme vous le savez, le choléra est une maladie des intestins. Plus que cela, je n'ai pas besoin de le dire. Vomissements, purgations, un intestin tellement encombré qu'il ressemble à du blanc d'œuf, quelqu'un d'aussi savant que vous connaîtra la liste. »\n\n'Bien sûr, mais qu'est-ce que vous trouvez intéressant ? »\n\n'Eh bien... ils n'arrêtent pas de me dire que c'est un miasme, que cette mort est dans l'air... mais honnêtement, je ne pense pas. Je serais déjà mort si c'était le cas. J'ai eu beaucoup de corps sur cette table, docteur. Ça pue l'intoxication alimentaire, mais ce n'en est pas une. »" #NT!
 panum.150.g: "Une pensée des plus fascinantes. Dites-m'en plus." #NT!
  
 panum_physician_health_bonus_modifier: "Économisez plus de Désolé" #NT!
 panum_physician_health_malus_modifier: "Travail agité" #NT!
  
 panum.151.t: "L'usine d'outils" #NT!
 panum.151.d: "Alors qu'il travaille sur l'enquête de [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis], le voyage du docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] dans une usine d'outils locale soulève plus de questions qu'il n'apporte de réponses." #NT!
 panum.151.f: "« Quand je suis allé à l'usine d'outillage l'autre jour, les choses me semblaient avoir un sens au début. Cette usine est spécialisée dans les couteaux, les outils de boucher et autres, et elle dispose donc d'une station d'affûtage. Elle utilise des roues hydrauliques pour faire tourner un grand nombre de pierres à aiguiser, des meules d'affûtage pour finir le tranchant de chaque lame. Chaque ouvrier se couche sur le ventre près de la meule et peut être aspergé d'eau. Tout cela est logique, et si l'épidémie à l'usine avait été limitée à cet endroit, cela aurait été logique.\n\nCe qui devient étrange, c'est que cela rompt avec une tendance observée partout ailleurs. Des hommes de l'usine tombent malades alors qu'ils n'ont jamais été près de la rue au cœur de cette épidémie, ni près des meules d'affûtage. Comment cela a-t-il pu être possible ? »\n\nExtrait du journal du Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], écrivant sur la grande épidémie de choléra du [TimeKeeper.GetCurrentDate.Format('y')], enquêtant au [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.151.g: "Apparemment un mauvais indice." #NT!
 panum.151.h: "Apparemment une théorie erronée." #NT!
 panum.152.t: "Le pot" #NT!
 panum.152.d: "Malheureusement, le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] s'est retrouvé dans une impasse : un cas local d'intoxication alimentaire, sans rapport avec le choléra." #NT!
 panum.152.f: "« Aujourd'hui fut une journée des plus pénibles. J'ai été appelé par la police pour enquêter sur une soudaine épidémie de choléra dans un hôtel populaire. J'avais rassemblé toutes mes affaires pour enquêter, alertant les autorités compétentes pour qu'elles trouvent des lits et soignent les malades, mais dès mon arrivée, j'ai su qu'il ne s'agissait pas du choléra. Les symptômes étaient faux, l'apparition soudaine trop rapide. Une cause plus locale devait être en cause et, sans surprise, toutes les personnes atteintes avaient mangé le même repas.\n\nUne incursion dans les cuisines a révélé le coupable : un pot de pâté de canard sûrement périmé, étalé sur du pain fin par un cuisinier dont le nez était trop bouché par un rhume pour sentir la pourriture. Une perte de temps s'il en est. L'intoxication alimentaire n'est pas le choléra. »\n\nExtrait du journal du Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], écrivant sur la grande épidémie de choléra du [TimeKeeper.GetCurrentDate.Format('y')], enquêtant dans le [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.152.g: "... eh bien, au moins, nous savons qu'il faut vider les placards." #NT!
 panum.153.t: "Déplacements égarés" #NT!
 panum.153.d: "Un accident s'est produit lors de l'enquête du Docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] - [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] qui ont mélangé leurs échantillons !" #NT!
 panum.153.f: "Mais au beau milieu de mon travail, une interruption m'a frappé. Des cris, des hurlements, le bruit d'une bagarre dans la rue. Une bagarre d'ivrognes, une tasse de trop. Les gendarmes ont été prompts à mettre de l'ordre, les entraînant loin, criant toujours.\n\nIl ne m'a fallu qu'un instant pour me lever de mon siège et fermer les volets, et encore moins pour retourner à mon travail. Suis-je encore plus stupide de ne pas avoir remarqué que j'avais déposé les échantillons dans le mauvais ordre, et où donc faire mon travail sinon dans le mauvais ordre, pour enregistrer chaque échantillon dans le mauvais ordre ?\n\nExtrait du journal du Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], écrivant sur la grande épidémie de choléra du [TimeKeeper.GetCurrentDate.Format('y')], enquêtant sur le [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.153.g: "Des semaines de travail gaspillées. Damnation." #NT!
 panum.154.t: "Le tueur imitateur ?" #NT!
 panum.154.d: "L'enquête sur l'épidémie de choléra au [SCOPE.sState('panum_disease_state').GetCityHubName] a pris une tournure alarmante : il semble qu'il pourrait y avoir une autre maladie !" #NT!
 panum.154.f: "« Ah, ravi de vous revoir, docteur %Name%. Ma table a été très occupée la semaine dernière. »\n\nJe ne dirais pas que c'est un plaisir de vous rencontrer, coroner. Qu'avons-nous ? »\n\n« D'autres corps arrivent. Je pensais que c'était plutôt le choléra, et c'est peut-être le cas, mais ce n'est pas tout à fait vrai. »\n\n« Une intoxication alimentaire ? »\n\nNon, pas au rythme où ils meurent. Surtout des enfants et des personnes âgées. »\n\n« Le choléra est encore plus mortel pour les personnes vulnérables que pour n'importe qui d'autre. Vous êtes sûr que ce n'est pas ça ? »\n\n« Ce n'est pas comme si son nom était inscrit à l'intérieur de leurs veines. Dysenterie, choléra, typhus ? Une intoxication alimentaire courante ? Qui peut le dire ? La seule chose que je sais, c'est que ça ne semble pas pareil. Il n'y a pas de blanc comme le choléra, mais la mort est la même.'\n\n'Alors nous pourrions bien avoir une deuxième maladie... horreur et damnation. Comment faire la différence entre les deux ?'\n\n'C'est vous le docteur, pas moi.'" #NT!
 panum.154.g: "Je ne peux pas élaborer un plan si je ne sais pas contre quoi je me bats." #NT!
 panum.155.t: "Le miasme...?" #NT!
 panum.155.d: "L'enquête du docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] et [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] a rencontré un problème : le miasme pourrait-il être réel ?" #NT!
 panum.155.f: "''... mais les résultats de ce dernier quadrant de l'enquête défient les raisonnements de la théorie des germes, et je ne peux pas, pour ma part, comprendre pourquoi. Les maisons sont situées à côté d'un canal peu profond, fréquemment emprunté par des barges livrant du charbon aux fonderies. Elles ne sont pas à portée de marche d'une pompe à eau, à l'exception d'un vieux puits. L'eau est pure, peut-être la plus pure de la ville.\n\nPourtant, pour une raison qui m'échappe, le choléra est là. Déjà, ils travaillent pour maintenir la puanteur à distance, et la puanteur, le miasme, est vraiment là. Le canal pue l'effluent... mais s'ils ne boivent pas cette eau, comment peuvent-ils être blessés sinon par l'odeur seule ?'\n\nExtrait du journal du Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], écrivant sur la grande épidémie de choléra du [TimeKeeper.GetCurrentDate.Format('y')], enquêtant sur le [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.155.g: "Le miasme ne peut pas être correct... n'est-ce pas ?" #NT!
 panum.156.t: "Déconstruit" #NT!
 panum.156.d: "Avec une soif de toujours plus de terres à bâtir, le développement de [SCOPE.sState('panum_disease_state').GetCityHubName] n'a pas le temps de s'arrêter, même pour l'enquête du Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]." #NT!
 panum.156.f: "''... qui es-tu déjà ?'\n\n'Le docteur qui enquête sur cette épidémie. Cette rue était pleine de gens malades. Où sont-ils ?'\n\n'Aucune idée. Mes gars et moi sommes juste ici pour commencer à démolir ces maisons.'\n\n'Les démolir ? Quoi ? Ces maisons abritaient une douzaine de familles, toutes infectées par le choléra !'\n\n'Eh bien, elles ne sont plus. Le propriétaire les a jetées à la rue.'\n\n'Ils ont QUOI ?'\n\n'Ils les ont jetées dehors ! Je ne paie pas de loyer comme ça, mais ça n'aurait pas d'importance de toute façon. Le terrain va devenir une usine textile, et si ça ne te dérange pas, moi et les gars devons commencer à démolir ces maisons.''" #NT!
 panum.156.g: "Oh, pour l'amour du ciel. Maintenant, je dois retrouver les malades... mais ne buvez rien." #NT!
 panum.157.t: "Contaminé" #NT!
 panum.157.d: "Quelle terrible nouvelle ! Le médecin a été infecté par le choléra !" #NT!
 panum.157.f: "« Je ne sais pas comment c'est arrivé. Des miasmes ? J'ai côtoyé des malades, des morts et des mourants pendant des semaines, plus que quiconque. Des germes ? Je n'ai pas bu l'eau, mais qu'en est-il de la contamination ? Pourrait-elle se propager par le toucher ? Dans l'air, sur des surfaces ? Je ne sais pas.\n\nMais je connais les symptômes. Les maux d'estomac, et comment cela ne finit jamais. Je ferais aussi bien de ne rien manger ni boire, pour tout le bien que cela me fait. Cela dit mille vérités, et une.\n\nJ'ai le choléra. »\n\nExtrait du journal du Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], écrivant sur la grande épidémie de choléra du [TimeKeeper.GetCurrentDate.Format('y')], enquêtant dans le [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.157.g: "Oh, j’espère que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] ira mieux bientôt." #NT!
  
 panum.161.t: "Un peu de gin" #NT!
 panum.161.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a pris un peu de temps loin de son travail pour « enquêter » sur son autre passion : l'alcool." #NT!
 panum.161.f: "« ... mais alors que j'étais sur mon deuxième verre de cette boisson des plus merveilleuses, j'ai commencé à réaliser quelque chose d'assez étrange. Plus les gens venaient à cet endroit pour boire, moins ils étaient susceptibles d'être touchés par le choléra. En effet ! Ma propre carte de tracé montre que les maisons les plus proches de cet endroit ont beaucoup moins de chances d'être touchées par cette misérable maladie.\n\nIl y a là un schéma, je le sens. J'ai parlé davantage avec le propriétaire et un certain nombre des habitants les plus affables, et ils semblent d'accord. Il y a quelque chose dans cet endroit qui semble aider à repousser la maladie. Je devrais enquêter davantage. »\n\nExtrait du journal du Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], écrivant sur la grande épidémie de choléra du [TimeKeeper.GetCurrentDate.Format('y')], enquêtant dans le [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.161.g: "Ah, les merveilles du travail et du plaisir réunis en un seul objet." #NT!
 panum.162.t: "Le bas est en haut" #NT!
 panum.162.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a pris la décision la plus audacieuse de toutes : [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] a donné le choléra à [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself] en buvant de l'eau contaminée !" #NT!
 panum.162.f: "''... bien sûr, toute la meilleure théorie du monde n'est rien sans la pratique. Malgré tout le travail, cela ne reste qu'un hasard pour mes détracteurs, qui continuent à prétendre qu'il n'existe aucune preuve irréfutable sur laquelle cimenter mes pensées. Très bien, alors. Je vais les affronter de front, et de la manière la plus directe de toutes : en buvant la même eau qui se trouve au cœur de cette épidémie, apportée par un fidèle coureur. S'ils ont raison, alors je ne tomberai pas malade même une fois éloigné de cet endroit. Si c'est le cas, alors je lutterai bientôt pour ma vie, mais qu'est-ce qu'une vie, comparée à tant d'autres qui pourraient être sauvées si je peux prouver mes affirmations ?\n\nAlors, mon cher journal, un toast à la santé.\n\nExtrait du journal du Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], écrivant sur la grande épidémie de choléra du [TimeKeeper.GetCurrentDate.Format('y')], enquêtant au [SCOPE.sState('panum_disease_state').GetCityHubName]." #NT!
 panum.162.g: "« Oh, mon Dieu, je me sens... oh non. »" #NT!
 panum.162.h: "Dissuadons le médecin de cette manœuvre téméraire !" #NT!
 panum.163.t: "Une carte vers le succès" #NT!
 panum.163.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a réussi à dresser une superbe carte du foyer de l'épidémie, permettant de suivre facilement l'évolution de la maladie." #NT!
 panum.163.f: "« Messieurs, je vous présente ma carte de l'infection au [SCOPE.sState('panum_disease_state').GetName]. Elle couvre, avec des détails superbes, la localisation de chaque infection dans la région, chronométrée et horodatée en conséquence, avec le nom et le nombre de décès, d'infections, etc. Elle présente une chronologie écrite de toute la progression de l'épidémie de choléra dans ce quartier. Un exemple : ici, nous voyons une pompe à eau et le nombre de maisons à distance de marche.\n\nEn outre, je présente les tableaux suivants, établis en tabulant les informations de cette carte. Si vous, messieurs, jetez un œil par vous-mêmes, vous verrez que les zones desservies par cette pompe à eau ont les taux de mortalité les plus élevés de toutes. Ici, sur ce tableau, nous voyons que la compagnie des eaux, [SCOPE.sState('panum_disease_state').GetName] Wells, a une corrélation directe avec ces pompes, ce qui montre à son tour que cette compagnie présente le risque le plus élevé de choléra de toutes les zones desservies..." #NT!
 panum.163.g: "Ce sera une science un jour." #NT!
 panum.164.t: "Feu et fureur" #NT!
 panum.164.d: "Le manque de progrès dans la lutte contre l'épidémie de choléra en [SCOPE.sState('panum_disease_state').GetName] a épuisé la patience du docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]" #NT!
 panum.164.f: "Les cris pouvaient être entendus à près d'un pâté de maisons, et le bruit des livres et des tasses jetés de leur table depuis bien au-delà de la porte. Une rafale de jurons, des excuses frénétiques et désespérées des assistants effrayés, puis plus de cris, et plus encore.\n\n"Vous êtes des imbéciles ! Vous êtes des imbéciles absolus ! Nous sommes ici pour une RAISON ! Des gens meurent devant notre porte, et ils comptent sur nous pour les sauver, et nous les sauverons ! "\n\nLa main du docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] se serra en un poing.\n\n"Si vous ne pouvez pas obéir même aux instructions les plus simples, alors vous ne devriez pas être ici ! Ceux d'entre vous qui le peuvent, suivez mes ordres à la lettre, et nous vaincrons ce fléau misérable ! Vous m'entendez ? "\n\n"Oui, docteur ! "\n\n"Maintenant, retournez là-bas et trouvez-moi d'autres échantillons ! Les BONS, cette fois ! "" #NT!
 panum.164.g: "Et ainsi, le médecin met son armée en marche, prête à faire la guerre à la maladie elle-même." #NT!
 panum.165.t: "Théa, le cœur de l'infection" #NT!
 panum.165.d: "Dans un moment de courage absolu, le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] s'est rendu dans l'un des hôpitaux les plus touchés de [SCOPE.sState('panum_disease_state').GetCityHubName] pour y interroger les patients." #NT!
 panum.165.f: "La salle de cet hôpital de fortune était bondée, pleine de choses à voir et à entendre, mais elle était plus odorante que toute autre. L'odeur de la maladie, l'odeur de la mort. Des fleurs avaient été apportées pour tenter de tenir la puanteur à distance, ainsi que de l'encens, mais malgré tout, peu de gens venaient dans cette salle des damnés. C'était trop risqué, disaient-ils, trop dangereux pour leur propre santé. Comment pouvaient-ils espérer aider les autres, s'ils étaient eux aussi mourants dans un lit ? Peu de gens venaient, mais aucun. Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] était l'un d'eux, et ils traversèrent ce lieu de mort et de mourants avec un courage incessant et une énergie sans limite. Ils s'assirent aux côtés des malades et des solitaires, posant des questions, prenant des notes. Chaque pensée, chaque réponse était précieuse. Elles étaient les indices du salut, les indices de l'origine de cette mort et de la façon dont elle aussi pouvait être tuée." #NT!
 panum.165.g: "Et dans cette salle de la mort, un ange de vie marchait, un journal à la main." #NT!
 panum.166.t: "Le pouvoir de la prière" #NT!
 panum.166.d_christian: "En quête de compréhension et peut-être de réconfort, le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a rencontré un prêtre dans une cathédrale locale." #NT!
 panum.166.d_muslim: "En quête de compréhension et peut-être de réconfort, le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a consulté un imam dans une mosquée locale." #NT!
 panum.166.d_other: "En quête de compréhension et peut-être de réconfort, le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a cherché un prêtre dans un temple local." #NT!
 panum.166.f_christian: "« Bonjour, père. Je suis le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], envoyé par la capitale pour enquêter sur cette épidémie et pour offrir toute l'aide possible. Je vous demanderais votre aide, si vous pouvez me la prêter. »\n\n« Je ne suis qu'un humble prêtre, pas le Tout-Puissant, mais je ferai ce que je peux. Dis-moi, mon enfant. De quoi as-tu besoin ? »\n\n« J'aimerais en savoir autant que tu peux sur les premiers jours de cette infection. Qui a succombé le premier ? Où ? As-tu une idée de l'origine de cette infection ? »\n\n« Seul Dieu peut avoir la réponse à certaines de ces questions, mais oui, j'en sais beaucoup sur mon troupeau. Allons, allons. J'ai moi-même pris des écrits, après tout. »" #NT!
 panum.166.f_muslim: "« As-salamu alaykum, imam. Je suis le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], envoyé par la capitale pour enquêter sur cette épidémie et pour offrir toute l'aide possible. Je vous demanderais votre aide, si vous pouvez me l'apporter. »\n\n« Je ne suis qu'un humble clerc, pas le Tout-Puissant, mais je ferai ce que je peux. Dites-moi, de quoi avez-vous besoin ? »\n\n« J'aimerais en savoir autant que vous pouvez sur les premiers jours de cette infection. Qui a succombé le premier ? Où ? Avez-vous une idée de l'origine de cette infection ? »\n\n« Seul Allah peut avoir la réponse à certaines de ces questions, mais oui, j'en sais beaucoup sur la communauté d'ici. Allons, allons. J'ai moi-même pris des écrits, après tout. »" #NT!
 panum.166.f_other: "« Salutations, prêtre. Je suis le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], envoyé par la capitale pour enquêter sur cette épidémie et pour offrir toute l'aide possible. Je vous demanderais votre aide, si vous pouvez me la prêter. »\n\n« Je ne suis qu'un humble gardien de ce temple, pas un des dieux, mais je ferai ce que je peux. Dites-moi, docteur. De quoi avez-vous besoin ? »\n\n« J'aimerais en savoir autant que vous pouvez sur les premiers jours de cette infection. Qui a succombé le premier ? Où ? Avez-vous une idée de l'origine de cette infection ? »\n\n« Seuls les théologiens peuvent avoir la réponse à certaines de ces questions, mais oui, j'en sais beaucoup sur les gens d'ici. Allons, allons. J'ai pris mes propres écrits, après tout. »" #NT!
 panum.166.g_christian: "La propreté est proche de la piété." #NT!
 panum.166.g_muslim: "Il existe un remède à chaque maladie." #NT!
 panum.166.g_other: "Sachez bien ce qui vous fait avancer et ce qui vous retient." #NT!
 panum.167.t: "En sécurité, c'est fini, désolé" #NT!
 panum.167.d: "Afin de rester en sécurité tout en menant son enquête, le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a isolé [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself] en toute sécurité des personnes infectées." #NT!
 panum.167.f: "« Certains appelleraient cela de la lâcheté. Je dirais que c'est du pragmatisme. Ce n'est pas une bataille qui peut être gagnée rapidement, où l'on peut simplement empaler une baïonnette dans le ventre de l'ennemi et le laisser mourir rapidement. C'est un combat plus dur, contre un ennemi que nous ne pouvons ni voir ni entendre, mais qui pourrait être n'importe où autour de nous.\n\nNe pas se protéger correctement est une folie. L'isolement est la plus grande clé. La nourriture et l'eau provenant de zones sûres, un endroit propre pour étudier et tout contact avec les infectés et leurs biens se fait par des intermédiaires. À l'abri de la maladie, je peux faire des recherches en paix et concentrer tous mes efforts sur la découverte de la vérité derrière cette maladie. »\n\nExtrait du journal du Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], écrivant sur la grande épidémie de choléra du [TimeKeeper.GetCurrentDate.Format('y')], enquêtant dans le [SCOPE.sState('panum_disease_state').GetCityHubName]." #NT!
 panum.167.g: "...mais même [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] devra éventuellement se salir les mains" #NT!
 panum.168.t: "Travail agité" #NT!
 panum.168.d: "Déterminé à se rendre à la base de l'épidémie de choléra, le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a travaillé particulièrement tard." #NT!
 panum.168.f: "« Halte ! Qui est dehors à cette heure-ci de... Docteur %Nom% ? Que faites-vous à cette heure-ci ? »\n\n« J'ai des rondes à faire, et elles n'attendront pas le lever du soleil. Chaque minute est précieuse, même celles après minuit. »\n\n« Mon Dieu ! Ces rues ne sont pas sûres la nuit ! »\n\nEt elles ne le sont pas non plus pendant la journée, tant que ce choléra n'est pas terminé. Si vous voulez bien m'excuser, constable, il y a encore du travail à faire avant que l'huile de ma lanterne ne s'épuise. J'ai une douzaine de fioles à remplir avec l'eau des canaux et des pompes, des maisons à visiter, des fossés à examiner. »\n\n« Oui, eh bien, très bien alors. Vous ne faites rien de mal, mais il vaut mieux que je vous fournisse une escorte tout de même. »" #NT!
 panum.168.g: "Alors, par tous les moyens, parcourons ensemble ces rues, gendarme." #NT!
  
