 je_panum_yellow_fever_description_reason: "Le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] examine actuellement plusieurs patients pour déterminer les symptômes de #YELLOW la fièvre jaune#!.. Il est essentiel de pouvoir différencier d'autres maladies similaires ou coexistantes. À la fin de son travail, le scientifique met sa description à la disposition du public afin que les générations futures aient de meilleures chances de reconnaître les origines de la maladie et de trouver des méthodes de traitement." #NT!
  
 panum.52.t: "Expédition d'observation médicale" #NT!
 panum.52.d: "Le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a réuni une petite équipe d'experts et d'assistants qui sont aptes à observer de près une épidémie à l'étranger et à en tirer des conclusions. La question se pose maintenant de savoir quelle maladie doit être observée dans quel pays." #NT!
 panum.52.f: "Il existe deux types d'expéditions médicales différentes qu'un médecin peut entreprendre : les expéditions d'observation et les expéditions de recherche. Les expéditions d'observation permettent de compléter la description d'une maladie, les expéditions de recherche de découvrir une méthode de traitement. Cependant, une expédition n'est pas aussi efficace que la recherche sur le terrain et il peut falloir plusieurs tentatives pour étudier complètement une maladie." #NT!
 panum.52.g: "L'épidémie de choléra au [SCOPE.sCountry('panum_cholera_country_scope').GetName]." #NT!
 panum.52.h: "L'épidémie de tuberculose au [SCOPE.sCountry('panum_tuberculosis_country_scope').GetName]." #NT!
 panum.52.i: "L'épidémie de variole au [SCOPE.sCountry('panum_smallpox_country_scope').GetName]." #NT!
 panum.52.j: "L'épidémie de typhus au [SCOPE.sCountry('panum_typhus_country_scope').GetName]." #NT!
 panum.52.k: "L'épidémie de fièvre jaune au [SCOPE.sCountry('panum_yellow_fever_country_scope').GetName]." #NT!
  
