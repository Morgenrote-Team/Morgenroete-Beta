 notification_panum_foreign_treatment_possible_notification_desc: "Vous pouvez envoyer votre [concept_panum_physician] lors d'une expédition de recherche médicale pour décrire une maladie."
 panum.131.t: "Études de maladie abandonnées"
 panum.131.d: "Étant donné que l'épidémie dangereuse du [GetPlayer.GetName] a pris fin et que les derniers patients se sont maintenant rétablis, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a terminé les études [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] pour le moment. Le médecin a été en mesure de collecter des informations importantes qui devraient simplifier une future description scientifique de la maladie, mais [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] n'a pas encore réalisé une percée"
 panum.131.f: "«Toutes les spéculations quant à son origine et à ses causes, si des causes peuvent être considérées comme adéquates pour produire une si grande perturbation, je laisse à d'autres écrivains, que laïc ou professionnel; Pour moi, je vais simplement poser sa nature et expliquer les symptômes par lesquels peut-être le Student peut être reconnu par l'élève, si elle devait jamais éclater. Je peux mieux le faire, car j'avais moi-même la maladie et j'ai regardé son fonctionnement dans le cas des autres. -Chucydide"
 panum.131.g: "Une autre étape a été prise."
 panum.133.t: "Expédition médicale abandonnée"
 panum.133.d: "L'expédition médicale a terminé ses travaux pour l'instant car l'épidémie est terminée. Le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] n'a pas réussi à effectuer une description scientifique, mais les études [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] devraient être précieuses pour l'avenir."
 panum.134.d: "La terrible épidémie qui a frappé notre pays est passée. Mais cela signifie également que le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] doit arrêter les enquêtes [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] pour le moment parce que le [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] ne peut effectuer aucune autre expérience pour trouver une méthode de traitement pour la maladie. Néanmoins, le médecin a acquis des informations précieuses qui seront certainement utiles à l'avenir."
 panum.134.f: "«La contagion passe d'une chose à une autre et est à l'origine causée par une infection de la particule imperceptible. -Girolamo fracastoro"
 panum.134.g: "Ce n'est qu'une question de temps avant de trouver un remède."
 panum.136.d: "Malheureusement, l'expédition de recherche médicale est terminée pour le moment sans aucun résultat final. Depuis que l'épidémie a quitté le pays, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] n'a pas vérifié les théories [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]. Les résultats provisoires seront disponibles pour [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] et les générations futures pour enfin trouver une méthode de traitement."
