 je_panum_germ_theory: "Germes et miasmes" #NT!
 je_panum_germ_theory_reason: "Hippocrate de Cos est considéré comme le fondateur de la théorie des miasmes, ces exhalaisons toxiques du sol qui sont emportées dans l'air et contribuent ainsi à la propagation des maladies. Au XIXe siècle, en raison d'un manque de connaissances sur les bactéries et les virus, les médecins et les chercheurs attribuaient simplement les épidémies telles que le choléra à de mauvaises odeurs qui se propageaient via des « miasmes ». Cette théorie s'est avérée plus tard être une fausse piste en médecine, bien que le modèle des miasmes expliquait déjà en partie d'où venaient les épidémies et comment elles se propageaient. Le conflit entre les contagionnistes, qui prétendaient à une infection interhumaine, et les anti-contagionnistes, les partisans de la théorie des miasmes, était parfois amer au milieu du XIXe siècle. Les faiblesses du modèle des miasmes ont été reconnues à Londres, même si les règles de fortune pour traiter les miasmes, telles que la propreté et l'isolement, ont permis de limiter dans une certaine mesure les épidémies. Si une nation trouve suffisamment de preuves en faveur de la théorie des germes et contre celle des miasmes, ce changement de paradigme permettra de réduire le nombre d'événements négatifs dans la recherche de méthodes de traitement ou dans les épidémies. Le premier découvreur de la théorie des germes recevra un bonus de recherche supplémentaire." #NT!
 je_panum_germ_theory_goal: ""
  
 notification_panum_germ_theory_notification_name: "Percée de la théorie des germes" #NT!
 notification_panum_germ_theory_notification_desc: "Un [concept_panum_physician] du [GetGlobalVariable('panum_germ_theory_invented_global_var').GetCountryDefinition.GetName] a pu pour la première fois étayer de manière concluante la théorie des germes dans toutes ses facettes. La théorie des miasmes a été complètement rejetée." #NT!
  
 panum.11.t: "La théorie des germes" #NT!
 panum.11.d: "Compte tenu des preuves accablantes en faveur de la théorie des germes et des preuves tout aussi accablantes contre la théorie des miasmes, un changement de paradigme médical s'est produit. C'est en grande partie grâce au Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] que la théorie des germes est désormais établie." #NT!
 panum.11.f: "La théorie des miasmes est un exemple typique de thèse scientifique difficile à réfuter, car elle est censée être confirmée partout. Le fait que les règles de nettoyage et d'hygiène pour un « air pur » aient effectivement permis la disparition de certaines maladies semblait confirmé au XIXe siècle. En même temps, elle empêchait la science médicale de faire des percées dans de nombreux domaines, car les véritables causes et donc les méthodes de guérison restaient inconnues. Désormais, les médecins auront plus de succès dans la recherche de méthodes de traitement - et la voie est libre pour la recherche sur les agents pathogènes et les vaccins." #NT!
 panum.11.g: "Mais voulions-nous vraiment savoir ce qui se passe dans l'eau...?" #NT!
  
 panum.53.t: "Le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] se rend dans l'État épidémique" #NT!
 panum.53.f: "Les méthodes de traitement constituent l'étape la plus importante dans la lutte contre une maladie. Elles constituent la base d'un éventuel futur vaccin qui pourrait prévenir une épidémie. Cependant, même une méthode de traitement efficace est suffisamment efficace pour contenir les futures épidémies et minimiser leur durée et leur gravité, ce qui se traduit par un nombre de victimes nettement inférieur. Les médecins qui étudient une épidémie dans leur propre pays travaillent plus efficacement que ceux qui se rendent à l'étranger." #NT!
 panum.53.g: "Cette horreur doit cesser !" #NT!
  
 panum.54.t: "Expédition de recherche médicale" #NT!
 panum.54.d: "Le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a réuni une petite équipe d'experts et d'assistants aptes à étudier de manière intensive une épidémie à l'étranger et éventuellement à développer une nouvelle méthode de traitement. La question se pose maintenant de savoir quelle maladie doit être observée dans quel pays." #NT!
  
