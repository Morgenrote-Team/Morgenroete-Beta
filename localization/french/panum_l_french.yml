 panum.2221.t: "La maladie du trieur de laine" #NT!
 panum.2221.d: "En examinant la soi-disant « maladie du trieur de laine », le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a découvert qu'il s'agissait en fait d'anthrax." #NT!
 panum.2221.f: "L'anthrax est apparu chez l'homme principalement comme une maladie professionnelle chez les tanneurs et les personnes qui travaillaient la fourrure, les poils et les cheveux, mais aussi chez les travailleurs des ports et des transports qui manipulaient ces matières, ainsi que chez les écorcheurs. Le pic de l'apparition de la maladie a eu lieu pendant les périodes de crise de l'industrie du cuir, lorsqu'un nombre croissant de peaux d'animaux bon marché étaient importées de régions où les abattages étaient peu ou pas contrôlés par des vétérinaires. Pendant longtemps, l'origine mystérieuse de la maladie est restée inconnue. On pensait qu'il s'agissait d'un cas d'empoisonnement et on l'appelait « maladie du trieur de laine ». Avec les progrès de la microbiologie et la mise en œuvre de la théorie des germes, les liens réels entre cette maladie animale extrêmement dommageable pour l'économie et cette maladie mortelle pour l'homme ont été établis et ont conduit à de nouvelles réglementations et prescriptions destinées à assurer la protection des travailleurs." #NT!
 panum.2221.g: "Adoptez des mesures de protection strictes." #NT!
 panum.2222.t: "La maladie du goitre" #NT!
 panum.2222.d: "Après avoir examiné plusieurs personnes atteintes de goitres gigantesques dans des vallées de montagne reculées, le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a expérimenté un traitement à base d'iode. Après plusieurs tentatives, la thérapie a fonctionné." #NT!
 panum.2222.f: "Dans les régions alpines de Styrie, du Tyrol et de Suisse, mais aussi dans d’autres régions de montagne ou dans les Midlands anglais, les goitres étaient une maladie quotidienne. On a très tôt soupçonné que la formation de goitres avait quelque chose à voir avec l’eau d’un certain territoire. Paracelse soupçonnait le manque de certains minéraux et recommandait de boire de l’eau contenant du plomb. Dans la Chine ancienne, les médecins recommandaient de manger des algues et des éponges. Avec une meilleure compréhension du fonctionnement de la glande thyroïde et de l’importance de l’iode, les premiers efforts de guérison ont finalement commencé. À partir de 1918, le médecin suisse Otto Bayard a introduit le sel iodé en ajoutant correctement de la potasse iodée au sel de table dans les communes de sa zone de pratique du Nikolaital et a montré que cela permettait d’éliminer les troubles du développement, l’élargissement de la glande thyroïde et la formation de goitres et de nodules sans effets indésirables ni dommages." #NT!
 panum.2222.g: "C'est donc une maladie liée à l'alimentation !" #NT!
 panum.2223.t: "Néphrolithiase" #NT!
 panum.2223.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a développé une procédure permettant d’opérer avec succès les patients souffrant de calculs rénaux." #NT!
 panum.2223.f: "Les calculs rénaux sont un phénomène connu depuis toujours ; Napoléon en souffrait déjà. Bien que plusieurs procédés d'extraction des calculs rénaux aient été mis au point depuis la Renaissance, l'opération restait dangereuse. Le chirurgien américain Henry Jacob Bigelow a réalisé une percée : il a introduit la technique médicale de litholapaxie. En 1878, il a publié « Lithotrity by a Single Operation », dans lequel il décrit sa technique pour « écraser et retirer un calcul de la vessie en une seule séance ». Auparavant, les chirurgiens écrasaient un calcul vésical puis ne consacraient que quelques minutes à retirer les morceaux. Grâce à cette nouvelle méthode, le taux de mortalité est passé d'environ 24 % à 2,4 %." #NT!
 panum.2223.g: "Je deviens nerveux rien que d'y penser." #NT!
 panum.2224.t: "Pellagre" #NT!
 panum.2224.d: "Comme l’a découvert le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] après des années de recherche, la pellagre est une maladie causée par un manque d’acide nicotinique." #NT!
 panum.2224.f: "Après la découverte de l'Amérique par Christophe Colomb, le maïs fut l'une des premières plantes à être introduites en Europe, où il se répandit rapidement en raison de ses rendements élevés. Bientôt, dans les régions où l'on consommait beaucoup de maïs, une étrange maladie appelée « peau rugueuse », d'après le symptôme clé, la pellagre, apparut. Le lien entre la pellagre et la consommation importante de maïs (par exemple sous forme de polenta) fut suspecté pour la première fois au XVIIIe siècle. Les explications avancées à l'époque étaient le maïs moisi ou empoisonné, une infection ou l'hérédité. Joseph Goldberger et ses collègues prouvèrent au début du XXe siècle que la pellagre humaine et la maladie de la langue noire chez les chiens étaient toutes deux dues à une malnutrition, que Conrad Elvehjem attribua à une carence en acide nicotinique. La découverte que la pellagre pouvait être traitée avec de la levure de bière entraîna une diminution soudaine du nombre de détenus dans les hôpitaux psychiatriques des régions concernées." #NT!
 panum.2224.g: "Le simple résultat d’une alimentation déséquilibrée ?" #NT!
 panum.2225.t: "Rachitisme" #NT!
 panum.2225.d: "Après avoir étudié pendant de nombreuses années des patients atteints de rachitisme, le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] arrive à la conclusion que la maladie osseuse est liée à une carence en nutriments - et recommande l'huile de foie de morue et le soleil comme prévention." #NT!
 panum.2225.f: "Bien que le rachitisme ait été décrit de nombreuses fois au fil du temps, ses causes sont restées longtemps inconnues. Au XIXe siècle, de grands pathologistes ont avancé diverses causes du rachitisme, notamment la syphilis congénitale et l'infection tuberculeuse paternelle. La véritable compréhension moderne des bases physiopathologiques du rachitisme n'a commencé qu'au début du XXe siècle. En 1919, Edward Mellanby a découvert et publié un article sur la « quatrième vitamine », affirmant que « le rachitisme est une maladie due à une carence qui se développe en raison de l'absence d'un ou de plusieurs facteurs alimentaires accessoires. Il semble donc probable que la cause du rachitisme soit une diminution de l'apport d'un facteur antirachitique, qui est soit le facteur A liposoluble, soit celui dont la distribution est similaire à celle-ci »." #NT!
 panum.2225.g: "Parlons-nous d’une vitamine D ?" #NT!
 panum.2226.t: "Syphilis" #NT!
 panum.2226.d: "La syphilis, ancien fléau de l'humanité, semble bientôt être mise enchaînée par la science - le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] prétend avoir inventé un remède miracle en utilisant les méthodes médicales les plus modernes." #NT!
 panum.2226.f: "Jusqu'au début du XXe siècle, la syphilis était principalement traitée avec du mercure toxique, appliqué sur de grandes surfaces du corps du patient, ce qui entraînait, entre autres effets indésirables, généralement une perte complète des poils et de toutes les dents et un déclin rapide de toutes les fonctions corporelles. Le mercure avait déjà été utilisé plusieurs siècles auparavant comme agent thérapeutique plus ou moins efficace contre la lèpre et diverses autres maladies de la peau. Les expériences avec des préparations à base d'arsenic telles que l'atoxyl et l'arsacétine ainsi que la préparation 418 (arsénophénylglycine), qui n'ont été couronnées de succès que dans les expérimentations animales et ont été développées et testées par Paul Uhlenhuth et Paul Ehrlich en 1907/1908, ont échoué, principalement en raison des effets secondaires graves. En 1909, Sahachiro Hata et Paul Ehrlich ont développé le composé organique de l'arsenic arsphénamine (Salvarsan), qui a été le premier à tenter un traitement chimiothérapeutique ciblé de la syphilis." #NT!
 panum.2226.g: "Sauve... quoi ?" #NT!
 panum.2227.t: "Tétanos" #NT!
 panum.2227.d: "Après plusieurs tests, le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] annonce aujourd'hui avoir trouvé une antitoxine contre le tétanos." #NT!
 panum.2227.f: "Le tétanos était bien connu des civilisations antiques, qui reconnaissaient le lien entre les blessures et les spasmes musculaires mortels. En 1884, Arthur Nicolaier a isolé la toxine du tétanos, semblable à la strychnine, à partir de bactéries anaérobies libres du sol. Il a détecté l'agent pathogène du tétanos dans le sol en inoculant de la terre de jardin à des animaux de laboratoire. L'étiologie de la maladie a été élucidée plus avant en 1884 par Antonio Carle et Giorgio Rattone, deux pathologistes de l'Université de Turin, qui ont démontré pour la première fois la transmissibilité du tétanos. En 1891, C. tetani a été isolé d'une victime humaine par Kitasato Shibasaburō, qui a montré plus tard que l'organisme pouvait provoquer une maladie lorsqu'il était injecté à des animaux, et que la toxine pouvait être neutralisée par des anticorps spécifiques. En 1890, Kitasato et Emil von Behring ont finalement réussi à obtenir une antitoxine spécifique du tétanos, qui pouvait permettre l'immunité contre le tétanos chez les animaux. Avec cette production d'antitoxine, Behring a posé les bases de la « thérapie sérique » (tout comme avec la découverte de l'antitoxine diphtérique, également en 1890)." #NT!
 panum.2227.g: "Qui aurait pensé que la terre du jardin pouvait être si dangereuse ?" #NT!
  
 country_panum_kidney_stone_treatment_success_chance_mult: "Chances de succès du traitement des calculs rénaux" #NT!
 country_panum_syphilis_treatment_success_chance_mult: "Chances de succès du traitement de la syphilis" #NT!
  
 panum_physician_achievement_anthrax_disease_loc: "\nLe Dr [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] s'est #o spécialisé sur l'anthrax#! et a développé des méthodes efficaces de prévention et de traitement de cette maladie." #NT!
 panum_physician_achievement_goitre_disease_loc: "\nLe Dr [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] s'est #o spécialisé sur le goitre#! et a développé des méthodes efficaces de prévention et de traitement pour celui-ci." #NT!
 panum_physician_achievement_nephrolithiasis_disease_loc: "\nLe Dr [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] s'est #o spécialisé sur la néphrolithiase#! et a développé des méthodes efficaces de prévention et de traitement pour celle-ci." #NT!
 panum_physician_achievement_pellagra_disease_loc: "\nLe Dr [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] s'est #o spécialisé sur la pellagre#! et a développé des méthodes efficaces de prévention et de traitement pour celle-ci." #NT!
 panum_physician_achievement_rickets_disease_loc: "\nLe Dr [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] s'est #o spécialisé sur le rachitisme#! et a développé des méthodes efficaces de prévention et de traitement pour celui-ci." #NT!
 panum_physician_achievement_syphilis_disease_loc: "\nLe Dr [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] s'est #o spécialisé sur la syphilis#! et a développé des méthodes efficaces de prévention et de traitement pour celle-ci." #NT!
 panum_physician_achievement_tetanus_disease_loc: "\nLe Dr [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] s'est #o spécialisé sur le tétanos#! et a développé des méthodes efficaces de prévention et de traitement de cette maladie." #NT!
  
 panum.922.t: "Croupe" #NT!
 panum.922.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a constaté que de nombreux médecins ne savent généralement pas faire la différence entre le croup, plutôt inoffensif, et la dangereuse diphtérie et a mis en évidence ces différences dans un article." #NT!
 panum.922.f: "Lorsque le médecin prussien Abraham Jacobi, lors d'une conférence médicale en 1860, constata qu'il y avait environ 122 cas de diphtérie à New York, ses collègues furent stupéfaits : ils n'avaient diagnostiqué aucun cas de diphtérie pendant la même période. Le manque de connaissances dans le domaine des maladies infantiles fut l'une des raisons de la création des premiers hôpitaux pour enfants aux États-Unis, dans lesquels la diphtérie joua un rôle particulier. Jacobi est considéré comme le père de la pédiatrie américaine." #NT!
 panum.923.t: "Larynx coriace" #NT!
 panum.923.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a identifié l'une des principales caractéristiques de la diphtérie comme étant la pseudomembrane coriace qui s'étend jusqu'au larynx et provoque la suffocation. Cette caractéristique est typique de la maladie pour la distinguer des autres." #NT!
 panum.923.f: "« Nous pouvons établir l'identification de l'angine maligne de quatre manières :\n\nPar des recherches approfondies sur l'anatomie morbide de la maladie, soixante autopsies étant pratiquées en quelques mois ;\n\nPar des observations cliniques, par lesquelles nous avons prouvé que l'angine, si elle était laissée à elle-même, avait presque invariablement tendance à attaquer le larynx, et ainsi à donner lieu à des symptômes de croup ;\n\nPar un examen chimique, par lequel il a prouvé l'identité de composition de la fausse membrane du pharynx avec celle de la trachée ;\n\nPar l'étude des travaux des auteurs antérieurs. »" #NT!
  
 panum.940.t: "L'antidote contre la diphtérie" #NT!
 panum.940.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a annoncé publiquement aujourd’hui que les expériences réalisées avec l’antitoxine diphtérique [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] produite ont été un succès complet." #NT!
 panum.940.f: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a expliqué à la foule étonnée que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] avait utilisé une toxine diphtérique affaiblie pour infecter des chevaux et obtenir ainsi à partir de leur sang un sérum très efficace contre la diphtérie. Bien qu'il s'agisse d'une grande avancée, [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a également souligné qu'il ne fallait pas confondre cela avec un vaccin car il n'active pas le système immunitaire du patient. « Il reste encore beaucoup de travail à faire ici », a déclaré [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]. Mais tous les parents qui craignaient pour la vie de leurs enfants haletants la nuit pourront désormais dormir beaucoup plus tranquilles." #NT!
 panum.940.g: "Nous coupons l’air de la diphtérie avant qu’elle ne nous fasse la même chose." #NT!
  
 panum.941.t: "Perchlorate de fer" #NT!
 panum.941.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a trouvé dans des documents anciens que le perchlorate de fer était recommandé comme remède contre la diphtérie. Il semble en effet avoir un effet." #NT!
 panum.941.f: "« Étonnamment, cette recette de type alchimique a eu un effet sur certains patients. Apparemment, c'est l'un des rares remèdes contre la diphtérie. »\n\nUne brève note du docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] sur la diphtérie" #NT!
 panum.941.g: "Mais est-ce que cela nous mène vraiment quelque part ?" #NT!
 panum.942.t: "Intubation" #NT!
 panum.942.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a essayé de donner de l'air à un patient par intubation. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] a obtenu un petit succès contre la diphtérie." #NT!
 panum.942.f: "« Le processus est compliqué et critique, mais toute indication de lutte contre la diphtérie m'est utile en ce moment. »\n\nUne brève note du docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] sur la diphtérie" #NT!
 panum.942.g: "Mais cela ne peut sûrement pas être une solution à long terme ?" #NT!
 panum.943.t: "Trachéotomie" #NT!
 panum.943.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a eu des expériences plutôt mitigées avec la trachéotomie, bien que tous ses collègues médecins [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] utilisent cette procédure chirurgicale pour traiter la diphtérie." #NT!
 panum.943.f: "« Je n'arrive pas à comprendre pourquoi tous ces experts en diphtérie - ou du moins ceux qui prétendent l'être - ont pu faire état d'un quelconque succès. Trousseau prétend avoir sauvé la vie de près de la moitié de ses patients atteints de diphtérie, mais d'après mon expérience professionnelle, ce chiffre est de moins d'un sur dix. »\n\nUne brève note du docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] sur la diphtérie" #NT!
 panum.943.g: "Et maintenant ?" #NT!
 panum.944.t: "Mercure" #NT!
 panum.944.d: "Malheureusement, un traitement au mercure contre la diphtérie s'est terminé exactement comme le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] l'avait prévu : par un empoisonnement." #NT!
 panum.944.f: "« Aurais-je dû savoir mieux ? Oui ! Mais la littérature spécialisée ne laisse aucun doute sur le fait que le mercure aide depuis des siècles contre la diphtérie. C'est vrai ! Désormais, je trouve d'autres remèdes qui sont censés aider : le nitrate d'argent, par exemple. Ou l'acide chlorhydrique ! Quelqu'un a-t-il vraiment eu affaire à cette maladie ? »\n\nUne brève note du docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] sur la diphtérie" #NT!
 panum.944.g: "Tout cela semble encore plus mortel que la diphtérie." #NT!
 panum.945.t: "Saignement" #NT!
 panum.945.d: "Les experts recommandent une bonne saignée en cas de diphtérie. Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a essayé cette méthode [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself] dans deux cas - et a constaté que la méthode était plutôt contre-productive." #NT!
 panum.945.f: "« Affaiblir encore davantage un patient affaibli serait comme détruire un autre pilier d'un pont avec un pilier branlant. Ce que tout ingénieur comprend est considéré comme hérétique en médecine. »\n\nUne brève note du docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] sur la diphtérie" #NT!
 panum.945.g: "Il n’y a pas d’amélioration ?" #NT!
  
 panum.951.t: "Le hochet dans la nuit" #NT!
 panum.951.d: ""
 panum.951.f: "Le soleil s'était retiré derrière les maisons. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] marchait dans l'ombre. C'était une nouvelle journée d'échecs. Trois autres enfants morts. Comme toujours, la même cause de décès. Même si le pic de l'épidémie était passé. Il restait un risque résiduel que la mort infantile erre dans les rues et leur plonge sa faux dans les mâchoires. La noyade et la suffocation étaient parmi les formes de mort les plus cruelles.\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetLastName] s'était spécialisé dans les maladies épidémiques pendant des années. Mais la diphtérie était différente. Ce n'était pas seulement une maladie infantile comme la rougeole ou la scarlatine, qui pouvait avoir une issue bénigne. La diphtérie faisait haleter les enfants. La diphtérie étranglait l'enfant dans la nuit comme un ange vengeur.\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetLastName] avait déclaré la guerre à la diphtérie. Mais cela semblait une guerre sans espoir. Chaque pas que faisait [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe], la maladie le suivait - et inversait à nouveau [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim]. Toutes les méthodes qui avaient été transmises se révélèrent inutiles. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] a lutté avec la mort. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] a lutté avec le diable.\n\nEt ils ont fait ressentir à [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] le désespoir et l'impuissance. Cette nuit-là, quand [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] est rentré à la maison. Comme un halètement a accueilli [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] dans l'obscurité. Parce qu'il y avait un patient qui attendait [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] n'avait pas sur la liste. La diphtérie s'était propagée. Jusqu'à la rue [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]. Jusqu'à la maison [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis].\n\nJusqu'au lit du fils [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]." #NT!
 panum.951.g: "Les expériences du docteur ont-elles...?" #NT!
 panum.952.t: "Traitement de la diphtérie" #NT!
 panum.952.d: ""
 panum.952.f: "Une déglutition désespérée. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] s'était habitué à ce bruit. D'habitude, on l'entendait à peine quand les autres avalaient. Mais c'était la même agonie que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] avait si souvent entendue auparavant. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] avait mémorisé le son. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] pouvait mettre un linge froid sur la tête de [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] fils. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] pouvait lui parler de manière apaisante.\n\nMais [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] ne pouvait rien faire pour lui. Pas plus que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] n'avait fait pour les autres enfants. Pour les nombreux autres, des dizaines d'enfants morts.\n\nS'il y avait quelqu'un qui savait à quel point ces médicaments contre la diphtérie ne valaient rien, c'était [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim]. Le mercure qui empoisonnait le corps. Le nitrate d'argent et le perchlorate de fer aux effets variés. La trachéotomie, qui était considérée comme l'art chirurgical le plus élevé - et qui échouait presque toujours.\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] l'avait fait si souvent. Et pourtant, c'était différent. Il ne s'agissait plus de la maladie. Il s'agissait de [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] maintenant. Cette épidémie détestée se vengeait de [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim]. Parce que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] avait voulu lui résister. Parce que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] voulait l'éradiquer, comme elle l'avait fait aux petits enfants. Elle se vengeait. Elle voulait lui prendre ce qu'il avait de plus précieux. Pas son honneur de médecin, pas son espoir de guérison.\n\nLe cliquetis de la nuit revient. Des liquides scintillent dans de petites fioles. Un scalpel brille au clair de lune." #NT!
 panum.952.g: "Traitez le garçon avec du perchlorate de fer." #NT!
 panum.952.h: "Effectuer une trachéotomie." #NT!
 panum.952.i: "Examiner un échantillon de tissu au microscope." #NT!
 panum.953.t: "L'ange étrangleur" #NT!
 panum.953.d: ""
 panum.953.f: "Plus de cliquetis. Le bruit qui avait tourmenté [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim], qui avait accompagné [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] et lui avait appris à avoir peur, avait disparu. Mais il n'y avait pas eu de triomphe. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] avait méprisé le son.\n\nMais maintenant [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] souhaitait que ce bruit effroyable revienne.\n\nSilence. Un silence de mort, comme [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] l'avait connu pendant des mois. C'était ce moment où l'on pouvait entendre le silence. Un silence de cimetière étrange qui s'étendait et aspirait toute force vitale. Le silence pouvait être entendu et ressenti. Il emplissait le corps de vide. Ce n'était pas une contradiction. C'était logique. C'était empirique.\n\nMais la logique et l'empirisme échouèrent à [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] cette nuit-là. Les doigts de [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis|U] agrippèrent la main froide d'un enfant. Pâle comme le clair de lune qui brillait à travers les fenêtres. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] avait défié la diphtérie.\n\nEt la diphtérie piétina [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] et la fit tomber à terre et tortura [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] avec plaisir parce que l'arrogance de [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim]1 avait aveuglé [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim]." #NT!
 panum.953.g: "Le médecin aura du mal à gérer ça." #NT!
 panum.954.t: "Pas le larynx, mais le cœur et les yeux" #NT!
 panum.954.d: ""
 panum.954.f: "La lune s’était couchée. Le soleil s’était levé à nouveau. Les jours s’étaient écoulés dans une alternance d’obscurité nocturne et de stores baissés. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] attendait au chevet du patient. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] n’avait jusque-là soigné aucun patient. Le travail de [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] ne s’était pas concentré sur les personnes, mais sur les maladies. Il était facile d’administrer du nitrate d’argent pour expérimenter, il était facile d’injecter un sérum pour un simple test, et il était facile d’opérer la trachée pour ne pas traiter un être humain, mais seulement la peau, les muscles, la chair, les os.\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetLastName] avait déjà traité des maladies. La diphtérie avait transformé les gens en patients, les histoires en dossiers médicaux et la souffrance en symptômes. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] voulait libérer les gens de l’essoufflement. Pourtant, c’était [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] qui avait besoin de guérison. Pas dans le larynx, mais dans les yeux et le cœur de [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis].\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] pouvait voir à nouveau. Et un sourire apprivoisé rayonnait vers [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim]." #NT!
 panum.954.g: "[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] l'a fait !" #NT!
 panum.955.t: "Le sacrifice" #NT!
 panum.955.d: ""
 panum.955.f: "Une âme perdue. Un monde gagné. Des microbes s'activaient sous le microscope. Des microbes comme ceux qu'on avait trouvés dans de nombreux autres cas. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] l'avait exclu jusqu'ici. Mais c'était l'explication la plus raisonnable. Le fils de [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis|U] n'avait eu aucun contact avec des patients atteints de diphtérie. Seul [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] en avait eu. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself] avaient apporté les germes dans cette maison. Pendant des jours. Peut-être pendant des semaines. Sans s'en rendre compte. De la douzaine d'autres enfants malades. De la douzaine d'autres enfants morts. Qui étaient maintenant une victime plus riche. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] avait un échantillon. Et [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] avait des cochons d'Inde et des lapins dont aucun enfant ne s'occupait plus, avec lesquels aucun enfant ne jouait plus. Ils seraient un sacrifice. Tout comme [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] avait fait des sacrifices. S'ils tombaient malades, c'était une preuve. Il s'agissait d'éradiquer la diphtérie. C'était un objectif plus grand que [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself].\n\nEt plus grand que tout autre objectif." #NT!
 panum.955.g: "Un sacrifice qui ne restera pas impuni." #NT!
 panum.956.t: "Changement radical du théorème" #NT!
 panum.956.d: ""
 panum.956.f: "Les dernières semaines ont déclenché une césure importante pour [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] ne qualifierait certainement pas cela de retournement copernicien. Mais rarement événement n'aura autant poussé [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] à remettre en question les méthodes des [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself] et [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]. L'impuissance face à la diphtérie a des effets durables. Et [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] sait qu'elle reviendra.\n\nSeule une solution réussie et à long terme peut empêcher que cet épisode ne se reproduise.\n\nLes verres s'entassent donc dans le cabinet du médecin. Les livres et les traités de médecine s'entassent. Et les médicaments. [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis|U] tend la main frénétiquement vers tout ce que l'on suppose savoir sur la diphtérie.\n\nChaque prétendu remède. Chaque prétendu manuel. Chaque prétendu traité.\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetLastName] débarrasse la table. Jette tout ce qu'il y avait à la poubelle. Ils avaient tous tort. Bretonneau. Guersant. Trousseau. Bochut. Daviot !\n\nDécrypter la cause de la diphtérie signifiait enfin guérir la diphtérie. Et après tout ce que [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] avait lu et essayé jusqu'à présent, une seule possibilité restait ouverte. La diphtérie était contagieuse. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] avait infecté son propre fils après un contact avec d'autres patients. Il y avait un agent. Peu importe ce que disaient les experts.\n\nIl devait y avoir un pathogène." #NT!
 panum.956.g: "Tous les efforts sont désormais concentrés sur la recherche du pathogène." #NT!
 panum.956.h: "La recherche devrait déjà se concentrer sur un éventuel vaccin." #NT!
  
 panum.961.t: "La toxine diphtérique" #NT!
 panum.961.d: ""
 panum.961.f: "Le poison était la clé. Un poison du type de celui sécrété par l'agent pathogène de la diphtérie. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] avait entendu dire qu'un biologiste faisait des expériences avec ce poison. La toxine était trop forte pour être arrêtée. Si on l'infectait avec, les animaux mouraient.\n\nMais [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] savait que c'était une information qui allait secouer le monde scientifique. On pouvait en lire des articles dans les revues spécialisées. Et il y avait des imitateurs dans le monde entier qui isolaient également la toxine de la diphtérie dans l'espoir d'induire un effet immunologique chez un animal sans qu'il meure de la même manière que les millions d'enfants dont les cadavres reposent en hommage sur l'autel de la diphtérie.\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] allait enquêter. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] devait trouver la toxine. Et mener ses propres expériences." #NT!
 panum.961.g: "C'est peut-être l'étape cruciale..." #NT!
 panum.961.h: "Ce processus est déjà connu grâce à la production de la toxine tétanique..." #NT!
 panum.961.i: "La bonne quantité d’iode pourrait aider à résoudre ce problème." #NT!
 panum.962.t: "L'antitoxine diphtérique" #NT!
 panum.962.d: ""
 panum.962.f: "Une percée. Une percée décisive qui compensait tous les sacrifices, toutes les souffrances, toutes les morts que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] avait dû accompagner, y compris les parents et les proches en deuil. Les adieux larmoyants. Le désespoir et le désespoir.\n\nC'était si simple. Et si efficace. La toxine devait être affaiblie. Finalement, une solution d'iode aiderait. Les chevaux étaient les sujets de test parfaits. Le reste était facile. L'animal développa des pouvoirs immunitaires contre la toxine - et fut ainsi le fournisseur d'un sérum. Une antitoxine contre la diphtérie.\n\nLorsque [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] tint le flacon dans sa main ce jour-là, [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] ressentit un sentiment de satisfaction. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] avait effectué les premiers tests. Tous les enfants n'avaient pas répondu. Mais plus que ce dont [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] avait osé rêver. Maintenant, cette arme contre l'ennemi invisible devait être produite en masse - et distribuée. Dans chaque clinique. Dans chaque cabinet médical.\nLa guerre de [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] contre la diphtérie n'était pas terminée. Ce n'était que le début." #NT!
 panum.962.g: "Commandez autant de ce sérum que possible !" #NT!
 panum.963.t: "L'ombre" #NT!
 panum.963.d: ""
 panum.963.f: "Il faut éradiquer la diphtérie ! Elle doit disparaître !\n\nC'était peut-être une pensée maniaque. Mais c'était une pensée qui maintenait le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] en vie. La guerre de [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis|U] contre la diphtérie portait ses fruits. Tant de vies sauvées. Tant d'enfants qui auraient souffert l'agonie et seraient morts dans un autre monde !\n\nLe bien du plus grand nombre l'emportait sur le bien de l'individu. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] aurait donné sa propre vie si [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] avait pu détruire la diphtérie. Mais le destin n'a pas été clément envers [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim]. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] n'avait pas vendu [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself] au diable - mais le fils de [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] en avait décidé ainsi. Pour lui.\n\nDepuis cette nuit-là, un voile était descendu sur [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim]. Une colère contre la maladie. Mais [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] l'avait effacée. Avec des pensées rationnelles qui noyaient le ressentiment envers [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself] dans le travail et la vengeance. Mais il y a quelques jours, cette colère a disparu. Paradoxalement, plus [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] sauvait d'enfants, plus [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] voyait clair.\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] vit [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself]. Et [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] détestait ce que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] voyait.\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetHerHis|U] l'arrogance avait trompé [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim]. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] croyait que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] sauvait des vies humaines. Pourtant [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] avait choisi une seule personne. Comme un bourreau. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] n'avait même pas touché le scalpel. Ou du moins un petit verre de nitrate d'argent. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] avait accordé plus de valeur à l'échantillon et au pathogène - qu'au patient [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]. Un être humain.\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetHerHis|U] sa propre chair et son propre sang.\n\nCela dégoûtait [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] depuis lors. Et dans l'appartement solitaire de [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis], les seuls compagnons étaient des diplômes, des prix et des photos avec des politiciens et des universitaires importants. Sinon, juste un lit vide. Et une pensée qui devenait plus forte. [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis|U] La tête me faisait mal. C'était devenu un mal de tête atroce : je devais être éradiqué. Je devais disparaître.\n\n'Mon fils. Mon cher fils...'" #NT!
 panum.963.g: "Docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]... Docteur !" #NT!
  
 panum.640.t: "« Observations faites pendant l'épidémie de rougeole »" #NT!
 panum.640.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a présenté [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] des recommandations pour le traitement de la rougeole, qui visent à mieux comprendre les causes et la transmission de la maladie afin d’atténuer et de prévenir les épidémies à l’avenir." #NT!
 panum.640.f: "« La contagion s'est répandue très rapidement dans la ville densément peuplée de Thorshavn, et de là, elle a été transportée par bateau vers les autres îles. Les déplacements vers et depuis les lieux de commerce, la fréquentation des églises et des écoles et les déplacements des ouvriers agricoles ont propagé l'infection vers les autres villages. La contagion a été introduite à Suderø depuis Thorshavn par un individu identifié, et après enquête, il a été possible de démontrer presque partout comment et par qui l'infection avait été apportée dans chaque village. Il semble plutôt douteux que l'infection puisse être transmise par des choses telles que les vêtements, le linge et les lettres, et je n'ai vu ni entendu parler d'aucun exemple de transmission de ce type pendant l'épidémie. » - Peter Panum, Observations faites pendant l'épidémie de rougeole aux îles Féroé en 1846" #NT!
 panum.640.g: "Un nouveau Peter Panum !" #NT!

