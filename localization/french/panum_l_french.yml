 panum.51.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetFullName], l'un des principaux cerveaux de la société médicale de [GetPlayer.GetName], a accepté de se rendre dans un État touché par l'épidémie et d'y faire des recherches sur la maladie. Le médecin espère que cela pourra aboutir à une description complète de la maladie." #NT!
 panum.53.d: "L'épidémie rampante a conduit [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] à l'étudier de plus près pour en déterminer les causes et développer de nouvelles méthodes pour traiter cette terrible maladie." #NT!

