 je_panum_military_medicine_project_reason: "Les médecins militaires et les médecins de la Croix-Rouge ont l'occasion unique d'améliorer les soins médicaux sur le champ de bataille et de sauver ainsi de nombreuses vies - et peut-être de décider d'une guerre. Selon les traits de caractère et l'expérience, cette amélioration se produit à différentes vitesses. Après la réforme médicale militaire [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis], un [concept_mobilization_option] ou un niveau supérieur sera déverrouillé."
 panum_military_medicine_progress_bar_at_full_tt: "Le barreau de médecine militaire a atteint le #variable 100% #!"
 panum.2500.t: "Soutien médical avancé"
 panum.2500.d: "Notre [concept_panum_physician] Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a travaillé pendant des années pour améliorer le soutien médical en guerre. Les nouvelles méthodes et moyens peuvent désormais être utilisés sur le champ de bataille!"
 panum.2500.f: "\ N'APPORTEZ-VOUS L'utilisation exacte de cette seringue. Et avoir toujours assez de sérum sous la main. Et bandages. De préférence une trousse de premiers soins. Savez-vous même ce que signifie la stérilisation?"
 panum.2500.g: "Les soldats construiront un jour un monument au médecin."
