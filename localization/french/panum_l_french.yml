 je_panum_cholera_treatment_reason: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] examine actuellement plusieurs patients pour déterminer la cause du #YELLOW choléra#!.. Seules les véritables causes de l'apparition de la maladie peuvent aider à faire des mesures de prévention qui mèneront à une méthode de traitement moderne. Lorsque le médecin aura terminé son travail, il présentera sa thèse au public. Cela n'empêchera pas de futures épidémies - cela nécessite l'identification de l'agent pathogène et éventuellement un vaccin - mais les effets d'une nouvelle épidémie seront relativement faibles." #NT!
