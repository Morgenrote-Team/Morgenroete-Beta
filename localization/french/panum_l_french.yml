 je_panum_functionalism: "École psychologique du fonctionnalisme" #NT!
 je_panum_functionalism_reason: "La psychologie fonctionnelle ou fonctionnalisme fait référence à une école de pensée psychologique issue directement de la pensée darwinienne qui met l'accent sur l'utilité et le but du comportement qui a été modifié au fil des années d'existence humaine. Edward L. Thorndike, surtout connu pour ses expériences sur l'apprentissage par essais et erreurs, est devenu le chef de file de ce mouvement vaguement défini. Le fonctionnalisme nie le principe d'introspection, qui tend à étudier le fonctionnement interne de la pensée humaine plutôt qu'à comprendre les processus biologiques de la conscience humaine.\n\nChaque pays ne peut établir qu'une seule école psychologique." #NT!
 je_panum_psychoanalysis: "École psychologique de psychanalyse" #NT!
 je_panum_psychoanalysis_reason: "La psychanalyse est une théorie psychologique, une théorie culturelle, une forme de traitement psychothérapeutique et une méthode de prise de conscience de soi, qui a été développée vers 1890 par le médecin viennois Sigmund Freud. Le terme psychanalyse désigne le modèle de description et d'explication de la psyché humaine basé sur les théories de Freud sur la psychodynamique de l'inconscient ainsi que la psychothérapie analytique et la méthodologie psychanalytique, qui traite également de l'étude des phénomènes culturels. Dans ces trois aspects, la psychanalyse continue d'être développée et modifiée par les cliniciens et les chercheurs aujourd'hui.\n\nChaque pays ne peut créer qu'une seule école psychologique." #NT!
 je_panum_analytical_psychology: "École de psychologie analytique" #NT!
 je_panum_analytical_psychology_reason: "La psychologie analytique est une école psychologique fondée en 1913 par le psychiatre suisse Carl Gustav Jung. Comme la psychanalyse, elle s'intéresse aux parties inconscientes de la psyché humaine, en partant du principe que l'inconscient a une influence beaucoup plus grande que la perception consciente. Jung et ses successeurs ont particulièrement mis l'accent sur les possibilités d'expression symbolique de l'inconscient et ont essayé de les utiliser de manière psychothérapeutique.\n\nChaque pays ne peut créer qu'une seule école psychologique." #NT!
 je_panum_behaviorism: "École psychologique du behaviorisme" #NT!
 je_panum_behaviorism_reason: "Le behaviorisme est un concept de théorie scientifique qui consiste à examiner et à expliquer le comportement des humains et des animaux à l'aide de méthodes scientifiques, c'est-à-dire sans introspection ni empathie. Le behaviorisme a été fondé par John B. Watson au début du XXe siècle après d'importants travaux préliminaires d'Edward Lee Thorndike. Ivan Petrovich Pavlov a également réalisé d'importants travaux pionniers avec ses expériences sur le conditionnement classique du comportement. Aux États-Unis, les partisans du behaviorisme ont été pendant des décennies les chercheurs comportementaux les plus influents dans les universités et les opposants farouches aux écoles psychanalytiques qui émergeaient à la même époque.\n\nChaque pays ne peut créer qu'une seule école psychologique." #NT!
  
