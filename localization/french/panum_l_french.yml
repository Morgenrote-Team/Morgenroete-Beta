 je_panum_medical_techniques_project: "Introduire des techniques médicales"
 je_panum_medical_techniques_project_reason: "L'objectif du docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] est de diffuser les dernières technologies médicales du [GetPlayer.GetName]. La rapidité avec laquelle ce processus se déroule dépend des traits et de l'expérience de caractère [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]. Après avoir terminé la réforme médicale, notre nation recevra un meilleur modificateur pour remplacer l'ancien. Dans certains cas, un [concept_panum_physician] peut développer ses propres inventions qui révolutionnent l'histoire de la médecine."
 panum_medical_techniques_advance_tt: "Les techniques médicales du [GetPlayer.GetName] s'améliorent par un niveau"
 panum.2401.t: "Vaccination"
 panum.2401.d: "L'introduction d'un programme de vaccination générale s'est initialement rencontré par le scepticisme parmi la population, mais après que le médecin [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a visité plusieurs provinces du pays et a démontré la procédure, la plupart des patients s'y sont habitués."
 panum.2401.f: "Il y avait eu une certaine résistance à l'idée d'une campagne de vaccination, du moins au début. Préoccupés par les mères de leurs enfants effrayés, déprimaient les vieux messieurs qui étaient sceptiques à l'égard de cette nouvelle merveille, les très pietes qui craignaient que la science falsifie quelque chose au-delà de leur compréhension. L'éducation a réglé ceci - des explications sur la façon dont cela a fonctionné, pourquoi - mais bien plus que cela en était les résultats. Les enfants qui se sont retrouvés avec leur vue et leur santé, et non avec les horribles conséquences de l'une des maladies les plus meurtrières que l'humanité ait jamais rencontrées. Peu devaient être convaincus quand ils les ont vus exempts de cicatrices et pleins de vie."
 panum.2401.g: "Ceci est une révolution médicale!"
 panum.2401.h: "Nos normes médicales et d'hygiène augmentent."
 panum.2402.t: "Anesthésie"
 panum.2402.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a maintenant démontré la nouvelle méthode d'anesthésie dans plusieurs cliniques. Il est désormais considéré comme la méthode standard pour les opérations particulièrement désagréables."
 panum.2402.f: "'Zzz.'"
 panum.2402.g: "Opérations médicales sans conscience? Est-ce autorisé?"
 panum.2403.t: "Seringues et pinces"
 panum.2403.d: "Le nouvel équipement médical que Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a introduit demande à s'habituer, mais ils sont désormais standard dans chaque cabinet de médecin."
 panum.2403.f: "«Quel genre d'outil est-ce, docteur? Vous pouvez l'injecter du liquide. Et c'est un nouveau scalpel? '\ N'Smy Cutlery pour le déjeuner.'"
 panum.2403.g: "La professionnalisation dans ce domaine est tout simplement étonnante."
 panum.2404.t: "Stérilisation"
 panum.2404.d: "Ayant réussi a prouvé l'importance de la stérilisation, le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a fait sa pratique standard pour tous les médecins du [GetPlayer.GetName] de se laver les mains et de nettoyer leurs outils!"
 panum.2404.f: "«Bien sûr, il y a encore ceux qui croient que ces pratiques ne sont pas nécessaires, et beaucoup d'entre elles seront apprises des messieurs qui ont sauvé de nombreuses vies auparavant. À ces hommes sacrés, je dis ceci: écoutez les preuves. La découverte de la théorie des germes a prouvé que la maladie est née d'une créature microscopique, qui pourrait être détruite bien avant l'infection, sauvant des vies qui pourraient autrement être perdues. Ce n'est pas plus que ce n'est que dans la maternité du plus grand hôpital du [ROOT.GetCountry.GetCapital.GetCityHubName], où le taux de mortalité pour les nouvelles mères a été si considérablement réduit de 18,3% à seulement 2,2% par mois plus tard. '\ N'Clearly, Good Gentlemen, les résultats parlent d'eux-mêmes.' '"
 panum.2404.g: "Qui savait que se laver les mains après avoir touché les malades était si important?"
 panum.2404.h: "Ah, donc un médecin a une autre raison pour une bouteille de liqour!"
 panum.2404.i: "Hmmm. Cela semble être une excuse pratique ..."
 panum.2405.t: "Dossiers médicaux"
 panum.2405.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a largement modernisé le séjour des patients, que ce soit dans le cabinet du médecin ou à l'hôpital, avec une meilleure inscription et la création de dossiers médicaux."
 panum.2405.f: "Un dossier médical décrit la documentation systématique des antécédents médicaux et des soins d'un seul patient dans le temps dans la juridiction d'un fournisseur de soins de santé en particulier. Les antécédents médicaux sont un dossier longitudinal de ce qui est arrivé au patient depuis la naissance. Il raconte les maladies, les maladies majeures et mineures, ainsi que les repères de croissance. Cela donne au clinicien une idée de ce qui s'est passé auparavant au patient. En conséquence, il peut souvent donner des indices à l'état pathologique actuel. Les antécédents médicaux comprennent plusieurs sous-ensembles comme les antécédents chirurgicaux, les médicaments et les allergies médicales, les habitudes ou les antécédents de vaccination. Dans le dossier médical, les rencontres médicales individuelles sont marquées par des sommations discrètes des antécédents médicaux d'un patient par un médecin, une infirmière praticienne ou un médecin et peuvent prendre plusieurs formes. Lorsqu'un patient est hospitalisé, les mises à jour quotidiennes sont entrées dans le dossier médical documentant les changements cliniques."
 panum.2405.g: "Statistiques, mathématiques, bureaucratie et médecine - enfin unis!"
 panum.2406.t: "Introduction de l'ambulance"
 panum.2406.d: "Il y a quelques jours, un entrepreneur riche en [ROOT.GetCountry.GetCapital.GetCityHubName] a généreusement donné un nouveau véhicule à l'hôpital local: la première ambulance auto-alimentée dans tout [GetPlayer.GetName]"
 panum.2406.f: "'... Et là, je l'ai vu. Peint un blanc brillant et fièrement arborant une croix, la nouvelle ambulance n'avait pas besoin de la piétinement des chevaux ou de la force des hommes, mais portait plutôt la puissance de son propre moteur. Pour la première fois, les hommes et les femmes blessés qui ont le plus averti d'aide pourraient être livrés au confort et aux soins de l'hôpital à la vitesse, une chose qui sauve la vie d'innombrables âmes qui pourraient autrement être perdues. Cela a remué mon cœur de le voir, car ici, le meilleur de l'homme, l'amour qu'il pourrait supporter pour les étrangers, était exposé pour que tout le monde puisse. '\ N \ Nexcerpt d'un Newpasper local, la Gazette [ROOT.GetCountry.GetCapital.GetCityHubName], [TimeKeeper.GetCurrentDate.Format('y')]."
 panum.2406.g: "Magnifique! Maintenant, il n'a besoin que d'une sirène ..."
 panum.2406.h: "Excellent! Nos hôpitaux en feront très usage!"
 panum.2407.t: "L'ambulance aérienne"
 panum.2407.d: "News vient d'atteindre la capitale de quelque chose d'incroyable: un pilote vient de voler une femme en travail de la campagne rurale à l'hôpital, le premier vol médical de l'histoire de [GetPlayer.GetName]!"
 panum.2407.f: "'... Bien sûr, c'était assez difficile à se concentrer. Un avion n'a pas de sièges pour beaucoup, vous savez, et vous pourriez presque entendre les gémissements du travail sur le son du propulseur et du moteur. Bien sûr, ce ne sont que des questions inférieures à l'acte lui-même - il n'y a pas d'âme sur cette terre qui pourrait refuser les cris d'une femme dans le besoin, alors quand elle est entrée en travail sur les terrains de visionnage, j'ai fait ce que toute bonne âme ferait et l'a livrée aussi rapidement que possible aux mains qualifiées et capables d'un hôpital. On m'a dit que cela aurait été une naissance de culasse dangereuse, mais être là si tôt a permis au médecin d'ajuster la position de l'enfant avant une naissance saine et naturelle. \ NWHY Oui, je crois que l'enfant a été nommé d'après moi. '\ N \ Ninterview d'un Newpasper local, la Gazette [ROOT.GetCountry.GetCapital.GetCityHubName], [TimeKeeper.GetCurrentDate.Format('y')]."
 panum.2407.g: "Alors les bébés viennent vraiment par air!"
 panum.2407.h: "Un soupir de soulagement, pour les mères partout!"
 panum.52.l: "L'épidémie de rougeole en [SCOPE.sCountry('panum_measles_country_scope').GetName]."
 panum.52.n: "L'épidémie de peste en [SCOPE.sCountry('panum_plague_country_scope').GetName]."
 panum.52.o: "L'épidémie de diphtérie dans le [SCOPE.sCountry('panum_diphteria_country_scope').GetName]."
 panum.52.p: "L'épidémie de polio dans [SCOPE.sCountry('panum_polio_country_scope').GetName]."
