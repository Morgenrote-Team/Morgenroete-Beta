 panum_character_treatment_fatal_fallback_loc: "« Qui aurait pensé que couper ce vaisseau sanguin tuerait le patient ? »" #NT!
 panum_character_treatment_fatal_tripple_death_loc: "Le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a planifié une intervention chirurgicale rapide pour soigner le patient [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]. Le [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] a pu réaliser l'opération en un peu plus de 2 minutes mais a amputé les doigts d'un assistant - qui est décédé plus tard d'une infection. Malheureusement, le patient est également décédé d'une infection plus tard. De plus, un spectateur dont les pans de veste ont également été accidentellement coupés s'est effondré parce qu'il pensait que ses organes vitaux étaient blessés. On a découvert plus tard qu'il était mort de choc." #NT!
 panum_character_treatment_fatal_unwashed_hands_loc: "L'opération s'est déroulée parfaitement. Le patient était en vie, tous les problèmes étaient résolus et tout le monde pensait qu'il se rétablirait rapidement. Quelques jours plus tard, cependant, une infection a été découverte et s'est propagée comme une traînée de poudre. Quelques heures plus tard, le patient est décédé. Le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] était très confus quant à la façon dont cela avait pu se produire, car [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] avait changé de couteau après l'opération précédente quelques minutes plus tôt." #NT!
 panum_character_treatment_fatal_forgotten_snack_loc: "Après la mort du patient, une autopsie a été pratiquée. À l'intérieur du patient, à la surprise générale, un sandwich à moitié mangé a été retrouvé. Personne ne savait comment il était arrivé là jusqu'à ce qu'un assistant se souvienne que le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] avait mangé un sandwich pendant l'opération." #NT!
 panum_character_treatment_fatal_blood_loss_loc: "Au début, l'opération s'est bien déroulée. Il semble que le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ait pu traiter le patient avec succès. Cependant, le patient ne s'est jamais rétabli. Il semble qu'il ait perdu trop de sang, ce qui a affaibli le patient et a entraîné son décès au bout de trois jours." #NT!
 panum_character_treatment_fatal_morphine_overdose_loc: "L'opération s'est bien déroulée, grâce à l'utilisation de la morphine, le patient n'a ressenti aucune douleur pendant l'intervention. Malheureusement, le patient n'a plus ressenti aucune douleur car la quantité de morphine était trop importante et le patient est décédé." #NT!
 panum_character_treatment_fatal_drunken_doctor_loc: "Tout le monde était un peu confus lorsque le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a commencé à boire de l'alcool médical pendant l'opération. Le fait que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] ait commencé à couper aux mauvais endroits, à crier sur les assistants et à finalement toucher une artère importante n'a pas aidé non plus. Malheureusement, le patient n'a pas pu être sauvé même après qu'un autre médecin ait été appelé à l'aide." #NT!
 panum_character_treatment_fatal_forgotten_instruments_loc: "Après une opération réussie, le patient du Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] semblait aller mieux. Mais un jour plus tard, le patient est décédé. Une autopsie a révélé qu'un scalpel avait été oublié à l'intérieur du patient. Alors que le patient bougeait à nouveau, le scalpel a commencé à couper les tissus et les vaisseaux sanguins, ce qui a provoqué une hémorragie interne." #NT!
 panum_character_treatment_fatal_deadly_anaesthesia_loc: "Une opération chirurgicale qui s'est très bien passée a malheureusement eu une fin horrible. Le patient ne s'est jamais réveillé de l'anesthésie. Personne ne sait ce qui a pu provoquer ce drame, mais le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] suppose que le corps du patient était déjà trop faible." #NT!
 panum_character_treatment_fatal_fake_doctor_loc: "Au début, l'opération semblait s'être bien déroulée. Une fois que le médecin a quitté la pièce, la situation n'a pas tardé à empirer. Soudain, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a fait irruption dans la pièce et a dit que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] était vraiment désolé d'être arrivé en retard. Tout le monde était confus car le médecin venait de procéder à l'opération. Il semble qu'une personne au hasard se soit fait passer pour le chirurgien et ait procédé à l'opération. Malheureusement, à la fin, le patient est décédé et personne ne sait qui est responsable de ce décès." #NT!
 panum_character_treatment_fatal_slippery_floor_loc: "C'était une opération formidable jusqu'à ce que le pied du Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] rencontre une flaque de sang sur le sol. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] a glissé et est tombé sur le patient. Malheureusement, le scalpel a transpercé le cœur du patient, ce qui a provoqué sa mort." #NT!
  
 panum.242.t: "La mort de la foule" #NT!
 panum.242.d: "Le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] trouve frappant que la tuberculose soit systématiquement présente dans les zones densément peuplées, mais qu’elle soit rare dans les régions peu peuplées." #NT!
 panum.242.f: "« J'ai étudié de plus près certains traités qui recommandent des stations climatiques pour soigner la tuberculose. Un article m'a semblé si peu convaincant que je pense que mon collègue a confondu corrélation et causalité. Il suppose que les gens qui vivent dans les montagnes sont en meilleure santé parce que l'air y est plus sain et qu'ils ne sont donc pas victimes de la tuberculose. Mais n'est-il pas évident qu'en principe, nous pouvons observer que la tuberculose n'apparaît pas dans les montagnes parce qu'il y a moins de gens là-bas ? Cela témoigne de l'interprétation de l'Europe du Sud selon laquelle nous avons moins affaire à des miasmes qu'à une contagion. La tuberculose est peut-être une maladie contagieuse après tout. »\n\nExtrait du journal du Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] dans [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.242.g: "Il s’agit d’une théorie qui souligne que la tuberculose est une maladie contagieuse." #NT!
 panum.242.h: "Il s’agit d’une théorie qui souligne que la théorie des miasmes est fausse." #NT!
 panum.243.t: "Un ermite tuberculeux" #NT!
 panum.243.d: "Le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a fait une découverte intéressante lors d’un échange avec un survivant de la tuberculose." #NT!
 panum.243.f: "« Tu as dit que ton frère était mort de la tuberculose ? »\n« C'est vrai. J'avais dix-neuf ans à l'époque. Je l'ai vu mourir sous mes yeux. »\n« Et toi aussi, tu es tombé malade de la tuberculose ? »\n« Exactement. J'ai supposé que, comme lui, je mourrais bientôt. C'était sans danger pour moi. Je me suis donc retiré dans une région éloignée pour mourir. Je voulais passer mes derniers jours dans la nature, loin de la civilisation. »\n« Mais tu as survécu. Quelle en est la raison, selon toi ? »\n« Une alimentation saine et de l'exercice. À un moment donné, j'ai rassemblé suffisamment de forces pour vaincre la maladie. »\n« Hm. »" #NT!
 panum.243.g: "C'est vraiment tout ?" #NT!
 panum.244.t: "Rien d'héréditaire" #NT!
 panum.244.d: "Après de longs examens, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] arrive à la conclusion que rien ne permet de penser que la tuberculose est réellement une maladie héréditaire." #NT!
 panum.244.f: "« Si vous m'aviez dit pendant ma formation que je me consacrerais un jour à la généalogie, j'aurais été très surpris. Mais je n'avais guère d'autre moyen de confirmer ma théorie que d'interroger les familles concernées, ainsi que les autorités et le clergé. Si la tuberculose est effectivement une maladie héréditaire, elle peut rester indétectable pendant des générations. Il existe des arbres généalogiques entiers sans cas de tuberculose, mais elle anéantit soudainement une famille entière. Et il est frappant de constater que la tuberculose n'est pas une maladie statique et gérable, mais qu'elle n'est devenue le danger qu'elle représente aujourd'hui qu'au cours des dernières décennies. Je le dis ainsi : si la tuberculose est une maladie héréditaire, alors nous avons tous une prédisposition. Comme vous pouvez le constater dans l'annexe de mon étude, les statistiques parlent d'elles-mêmes. »\n\nConférence de [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] à la Faculté de médecine" #NT!
 panum.244.g: "Donc théoriquement, n’importe qui peut être infecté ?" #NT!
 panum.245.t: "Tubercules" #NT!
 panum.245.d: "Au cours d’un examen anatomique, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a acquis de nouvelles connaissances sur les tumeurs du tissu pulmonaire qui donnent son nom à la maladie." #NT!
 panum.245.f: "René Laennec a mis au point le stéthoscope, à l'origine pour examiner la tuberculose. Au cours des années qui ont suivi, il a permis de détecter la maladie plus tôt, en auscultant les changements dans le système respiratoire à un stade précoce. Dans le même temps, les connaissances sur le développement de la tuberculose dans l'organisme se sont accrues." #NT!
 panum.245.g: "De petits progrès, mais des progrès." #NT!
 panum.246.t: "Mode de vie et immunité" #NT!
 panum.246.d: "Le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a de sérieux doutes sur les théories traditionnelles sur la cause de la tuberculose après avoir examiné minutieusement plusieurs patients et leurs biographies." #NT!
 panum.246.f: "« L’examen de plusieurs patients du [SCOPE.sState('panum_disease_state').GetCityHubName], y compris leurs histoires personnelles, soulève plus de questions que de réponses ; à condition que l’on s’attende à des vérités aussi simples que possible, plutôt qu’à de simples fragments de vérité. Il est vrai que le prolétariat en particulier est gravement touché par la tuberculose, mais je trouve qu’il est douteux qu’une personne aisée du même milieu ne soit pas également victime de la maladie. Je suis convaincu qu’une bonne alimentation, l’air frais et l’exercice physique offrent une certaine résistance à la maladie – mais je ne crois pas qu’on puisse pour autant les exclure en principe. En bref : je crois que l’idée que quelqu’un attrape la tuberculose parce qu’il est artiste ou prolétaire est une affirmation scientifiquement intenable. Si tel était le cas, la tuberculose aurait choisi son appartenance ces dernières années et préférerait maintenant les ouvriers d’usine comme victimes hautement choisies spirituellement aux musiciens et aux poètes. Personne ne peut sérieusement croire cela. »\n\nExtrait du journal du Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] au [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.246.g: "Ce sera une grande déception pour certains génies méconnus." #NT!
 panum.247.t: "Une maladie à déclaration obligatoire" #NT!
 panum.247.d: "Le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a expérimenté au [SCOPE.sState('panum_disease_state').GetCityHubName] un système de signalement qui pourrait aider à freiner la tuberculose." #NT!
 panum.247.f: "« La classification de la tuberculose comme maladie à déclaration obligatoire par le Dr [SCOPE.sState('panum_disease_state').GetCityHubName] a provoqué un certain ressentiment au sein de la population, car beaucoup de gens considèrent que la maladie est une affaire privée. Mais ce n'est pas le cas, surtout lorsqu'elle se manifeste sous forme épidémique. Dès qu'une maladie est considérée comme contagieuse - et dans le cas de la tuberculose, tout porte à croire que c'est le cas -, elle devient une affaire publique qui peut mettre en danger le bien-être public. Il vaut mieux avoir une maladie à déclaration obligatoire qu'une quarantaine. L'isolement des sources individuelles d'infection a montré que la propagation de la tuberculose pouvait être évitée sans mettre toute une ville en état d'urgence. Malheureusement, la stigmatisation que portent aujourd'hui les grues tuberculeuses aura des conséquences personnelles désagréables. Les personnes atteintes de tuberculose sont désormais traitées comme des lépreux. »\n\nExtrait du journal du Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] dans [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.247.g: ""
 panum.248.t: "Tuer les microbes" #NT!
 panum.248.d: "Le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a développé un procédé chimique basé sur des connaissances antérieures sur les micro-organismes. Il pourrait permettre de prévenir la tuberculose à l'avenir." #NT!
 panum.248.f: "La pasteurisation désigne le chauffage à court terme d'aliments liquides ou pâteux à des températures d'au moins 72 °C et d'au plus 100 °C pour tuer les phases végétatives des micro-organismes afin de conserver les aliments de manière douce. Ce procédé a été utilisé pour le vin dès le milieu du XIXe siècle. Ce n'est que plus tard qu'il a été utilisé pour le lait cru, par lequel les agents pathogènes de la tuberculose bovine pouvaient être transmis à l'homme. La pasteurisation du lait cru a donc joué un rôle dans la lutte contre la tuberculose. Cette découverte est plus importante qu'on ne pourrait le penser à première vue : pendant longtemps, les médecins, les biologistes et les chimistes ont supposé que la tuberculose des bovins ne pouvait pas être transmise à l'homme. Même le spécialiste de la tuberculose Robert Koch s'est trompé à ce sujet, et il n'a révisé son opinion que plus tard - à une époque où de nombreux enfants ont été infectés par le lait et le beurre tuberculeux." #NT!
 panum.248.g: "Et je pensais que le lait était fondamentalement sain !" #NT!
 panum.249.t: "Crachoir personnel" #NT!
 panum.249.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a remarqué un accessoire qui est devenu particulièrement populaire auprès des femmes atteintes de tuberculose. Il est doté d'un boîtier en verre bleu sophistiqué qui a l'air si à la mode qu'on en oublierait qu'il s'agit d'un crachoir." #NT!
 panum.249.f: "« La plupart d'entre nous ont cela ici. Il a aussi un nom chez nous, un surnom, c'est assez amusant. » Sans aucune retenue, avec un visage obstinément ignorant, elle prononça l'expression sinistre « Le Heinrich bleu ». - Thomas Mann, Zauberberg" #NT!
 panum.249.g: "Si chaque malade portait quelque chose comme ça..." #NT!
  
 panum.251.t: "Une maladie cellulaire ?" #NT!
 panum.251.d: "L'étude très remarquée d'un spécialiste allemand de la tuberculose contredit les conclusions précédentes du Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], car [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] n'a pas encore pu trouver de contre-réponse appropriée." #NT!
 panum.251.f: "« Certains collègues affirment avec passion que la tuberculose peut être transmise par infection. Lorsqu'on leur dit que de nombreux patients ont développé la maladie sans avoir été à proximité d'une grue antituberculeuse, ils affirment que la maladie a probablement été contractée il y a des années. Comment le prouver ? Mes propres études montrent plutôt que les tubercules du tissu pulmonaire doivent être interprétés comme une prolifération cellulaire. La tuberculose doit donc être interprétée, comme le carcinome, comme le résultat de la prolifération de cellules locales. Elle peut être clairement identifiée comme une maladie constitutionnelle. »\n\nDr. Angelika Hasenbein, « La tuberculose, une maladie cancéreuse »" #NT!
 panum.251.g: "Donc la tuberculose fonctionne comme une tumeur cellulaire ?" #NT!
 panum.252.t: "Bronchectasie" #NT!
 panum.252.d: "Comme le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] l'a découvert, certaines des découvertes que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] pensait avoir obtenues auprès de patients atteints de tuberculose étaient erronées. Ces derniers souffraient d'une maladie complètement différente." #NT!
 panum.252.f: "« Malheureusement, certaines recherches se sont révélées être une impasse. J'ai donc cru que certains patients atteints de tuberculose s'étaient rétablis dans certaines circonstances. En réalité, ils n'avaient pas la tuberculose, mais des bronchiectasies. Il n'est pas exclu que la tuberculose puisse favoriser les bronchiectasies, mais ce sont deux maladies différentes et tous les résultats ne sont donc pas applicables. Cela risque de retarder considérablement la recherche d'une méthode de traitement efficace. »\n\nExtrait du journal du Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] dans [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.252.g: "Temps perdu !" #NT!
 panum.253.t: "Charlatanisme" #NT!
 panum.253.d: "Une visite au sanatorium de [SCOPE.sState('panum_disease_state').GetCityHubName] s’est avérée être une déception totale pour le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]." #NT!
 panum.253.f: "« De nombreux collègues et médecins spécialistes reconnus m'ont recommandé le sanatorium de [SCOPE.sState('panum_disease_state').GetCityHubName]. C'est une institution exemplaire qui opère dans le domaine de la tuberculose avec des méthodes extrêmement sérieuses - ont-ils dit. Plusieurs patients ont parlé de miracles médicaux qui s'y sont produits.\n\nCependant, après des semaines de visites, j'ai réalisé qu'il s'agissait surtout de marketing. Alors que les médecins sur place m'assuraient des grandes chances de guérison, j'ai découvert exactement le contraire. En parcourant les dossiers des patients, j'ai constaté que près de 50 pour cent des patients admis sont décédés au cours de la première semaine. Tout ce sanatorium est une arnaque !\n\nExtrait du journal du Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] dans [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.253.g: "Mais... mais... le dîner devrait être excellent !" #NT!
 panum.254.t: "Contact avec la Mort Blanche" #NT!
 panum.254.d: "Apparemment, les nombreuses visites aux patients atteints de tuberculose ont un effet inattendu : le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a craché du sang aujourd'hui !" #NT!
 panum.254.f: "« Quel jour malheureux ! Mes relations avec la tuberculose et ma prétendue connaissance de la maladie se vengent maintenant. D'un côté, je me suis trompé à tant de niveaux qu'il est juste que mon orgueil soit puni. De l'autre, c'est un indice qu'il s'agit d'une maladie contagieuse. Mais à quel prix ai-je dû faire cette découverte ?\n\nExtrait du journal du Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] dans [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.254.g: "Le docteur s'en remettra, n'est-ce pas ?" #NT!
  
 panum.264.t: "De Contagione" #NT!
 panum.264.d: "Les intérêts historiques du Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ont conduit [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] à découvrir un livre ancien de la Renaissance, d'une valeur incommensurable." #NT!
 panum.264.f: "En 1546 déjà, le médecin véronais Girolamo Fracastoro postulait que les maladies étaient principalement provoquées par des infections par de minuscules particules qui rappelaient des germes ultérieurs. Il a donc remis en question la théorie des miasmes il y a plus de 300 ans. En ce qui concerne la tuberculose, Fracastoro affirme également qu'il s'agit d'une maladie contagieuse transmise par ces agents pathogènes. Le livre est parfois plus convaincant que de nombreux traités modernes. Ce qui est révolutionnaire, c'est que Fracastoro suppose que ces « fomites » pénètrent par le système respiratoire ou les pores du corps pour chercher de la nourriture. Cela ferait progresser la maladie." #NT!
 panum.264.g: "Cela stimulera la recherche de traitement." #NT!
 panum.264.h: "C'est beaucoup plus convaincant que la théorie des miasmes." #NT!
 panum.264.i: "Un petit pathogène pourrait-il causer la tuberculose ?" #NT!
  
 panum.240.t: "La tuberculose – une maladie contagieuse" #NT!
 panum.240.d: "Grâce à plusieurs expériences et examens de patients, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a pu prouver de manière concluante que la tuberculose n'est pas seulement une maladie contagieuse, mais il a également pu en déduire plusieurs méthodes de prévention dans le traité [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] '[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_treatment_title')]'." #NT!
 panum.240.f: "« Le fait de savoir que la tuberculose est une maladie qui peut se transmettre d'homme à homme et aussi d'animal à homme conduit à toute une série de mesures pour prévenir la maladie.\nPremièrement, les malades atteints de tuberculose doivent être tenus à l'écart des masses.\nDeuxièmement, la maladie doit être déclarée afin que sa propagation puisse être limitée.\nTroisièmement, des réglementations doivent être édictées pour assurer l'hygiène publique - comme l'interdiction de cracher en public ou au moins l'utilisation de crachoirs publics et personnels.\nQuatrièmement, la santé publique doit être améliorée pour minimiser l'infection parmi les prolétaires.\nCinquièmement, la pasteurisation du lait cru est essentielle. »\n\nExtrait de :[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_treatment_title')]" #NT!
 panum.240.g: "La tuberculose n’est plus une fatalité." #NT!
  
 panum_add_dubious_yellow_fever_treatment_clues_effect_tt: "Cela donne un indice... probablement." #NT!
  
 panum.540.t: "Prévenir ? Prévenir !" #NT!
 panum.540.d: "Après des semaines de recherche et d’études, notre médecin a mis au point un moyen d’arrêter la propagation de la fièvre jaune !" #NT!
 panum.540.f: "« ... mais en fin de compte, une preuve est restée, certaine et inexcusable. Que ce soit par un filet, de la fumée ou des pesticides, mon enquête a révélé que chaque fois que le chemin du moustique était interrompu pour une raison quelconque, la propagation de la fièvre jaune était stoppée. Il doit donc s'agir d'une maladie transmise par les insectes. Si nous pouvons interrompre le processus de reproduction, nous pouvons très bien empêcher de nouveaux moustiques d'arriver pour infecter notre population. Ce n'est qu'une question de moyens, et j'ai conçu un plan en trois points.\n\nI : Pulvériser les étangs, les tourbières et les marais locaux avec des pesticides pour les rendre impropres à la reproduction. Si possible, drainez entièrement les plans d'eau moins importants.\nII : Déployez des moustiquaires, des couvertures en tissu imprégnées de pesticides, sur toutes les ouvertures des bâtiments publics, en particulier les hôpitaux.\nIII : Informez les gens de la nature de cette maladie transmise par le moustique, et encouragez l'utilisation de moustiquaires, d'insecticides et de fumée pour fumiger leurs maisons.\n\nJe crois sincèrement que si ces méthodes sont mises en pratique, nous pourrions bien voir la fin de la fièvre jaune endémique de notre vivant, et la fin de cet ennemi le plus persistant.'\n\nDe :[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_treatment_title')] par Dr.[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]" #NT!
 panum.540.g: "Bien joué, docteur. Maintenant, il faut aller chercher des moustiquaires et de l'insectifuge..." #NT!
  
 panum.541.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], notre médecin-chef, est arrivé à [SCOPE.sState('panum_disease_state').GetName] pour enquêter sur la mystérieuse fièvre jaune." #NT!
 panum.541.f_america: "« Nous arrivâmes à [SCOPE.sState('panum_disease_state').GetCityHubName] bien avant l’aube, et notre train atteignit la gare pour trouver un quai vide de passagers et avec seulement un flacon de soupe chaude pour le conducteur et ses collègues dans la locomotive. Peu d’hommes auraient pu quitter un train si tôt le matin, mais je n’avais guère pu me reposer ; les lettres et les notes du gouvernement local pesaient lourd sur mon esprit, car elles parlaient d’une étrange maladie, la fièvre jaune. Le nom vient de la jaunisse qui accompagne la maladie, bien que ce ne soit pas la fin des ennuis – vomissements, douleurs abdominales, saignements des yeux, et ces symptômes tuent beaucoup de gens. Mais si les résultats nous sont familiers, écrits dans des récits remontant à la première colonisation de ces terres, la nature même de la maladie a longtemps échappé à la science. C’est là que j’ai trouvé la détermination et l’énergie pour réveiller mes collègues et les conduire hors du train vers la ville, sous la lueur des lampes à gaz autour desquelles les moustiques bourdonnent sans cesse. Si nous voulons vaincre cette maladie, nous devons répondre à la plus grande question de toutes : contre quoi luttons-nous ?\n\nExtrait du journal du Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], qui parle de la fièvre jaune dans les [SCOPE.sState('panum_disease_state').GetName], [TimeKeeper.GetCurrentDate.Format('y')]" #NT!
 panum.541.f_africa: "« Il était un peu plus de midi lorsque notre navire est arrivé au port et le capitaine nous a informés que nous avions atteint notre destination. L'administration locale, l'un des grands avant-postes de notre empire colonial, avait envoyé un message à la capitale concernant une étrange maladie mortelle qu'elle avait du mal à comprendre - pas une simple grippe commune, mais la tristement célèbre fièvre jaune. Ce n'est pas vraiment une nouveauté pour moi, ni pour quiconque connaît bien l'histoire des maladies tropicales... mais malgré tout ce que nous savons de ses nombreux moyens de tuer, nous en savons si peu sur la maladie elle-même.\n\nAccompagnés de mes assistants et d'une escorte armée, nous avons établi un laboratoire non loin du centre-ville. Là, nous pourrions conserver nos échantillons, nous installer et effectuer les recherches nécessaires pour déchiffrer les mystères de la fièvre jaune... mais d'abord, nous devons trouver ces échantillons, et la présence incessante des moustiques est une distraction indésirable. Cependant, cela ne nous empêchera pas de travailler.\n\nExtrait du journal du Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], qui parle de la fièvre jaune dans [SCOPE.sState('panum_disease_state').GetName], [TimeKeeper.GetCurrentDate.Format('y')]" #NT!
 panum.541.g: "Venez, messieurs...bâillez." #NT!
 panum.541.h: "...maudits moustiques." #NT!
 panum.542.t: "Les guerres d'hier" #NT!
 panum.542.d: "Afin d'en savoir plus sur l'histoire de la fièvre jaune dans ces terres, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a décidé de consulter le commandant d'une garnison locale." #NT!
 panum.542.f: "« Ah, content de vous voir, docteur. Mes hommes sont toujours heureux de savoir qu'ils sont entre de bonnes mains en cas de maladie. Que puis-je faire pour vous ? »\n« Tout le plaisir est pour moi, colonel. On m'a dit que vous aviez peut-être des archives de campagnes passées ici ? En avez-vous qui auraient pu voir une épidémie de fièvre jaune parmi les troupes ? »\n« Oh, très certainement... ici. C'était une campagne terrible, croyez-moi, et pas seulement l'ennemi. Beaucoup de gars qui meurent à la guerre meurent à cause des éléments, de la maladie, du froid. Ils appellent cela l'attrition. »\n« Cette... attrition était particulièrement mauvaise, alors ? »\n« Pire que pire. Entre la maladie et la saison des pluies, un homme avait plus à craindre au camp que sur le champ de bataille. La chaleur était aussi terrible, et les insectes. »" #NT!
 panum.542.g: "Insectes, maladies, pluie... un enfer créé par la nature elle-même, pourrait-on dire." #NT!
 panum.543.t: "Champs de malheur" #NT!
 panum.543.d: "Poursuivant sa mission visant à en savoir plus sur la fièvre jaune, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] s'est rendu à l'extérieur de la colonie, dans un foyer apparent d'infection : une ferme rurale." #NT!
 panum.543.f: "« Je dois admettre qu'il m'a fallu près d'une heure pour comprendre cet accent rural, mais le propriétaire de la ferme s'est révélé très instructif. Bien que cette région soit souvent assez humide, il y a toujours besoin de travaux d'irrigation. Pourtant, creuser ces tranchées demande une force considérable, fournie par des dizaines de travailleurs locaux, qui vivent souvent ensemble dans des baraquements exigus et encombrés. De telles conditions peuvent engendrer des maladies, et il n'est pas surprenant que la fièvre jaune ait été découverte là-bas avant longtemps.\n\nLe fermier lui-même pense qu'elle est venue d'un marchand ambulant ou peut-être de commerçants ramassant la récolte ou livrant des outils, il ne peut pas le dire avec certitude, mais j'en doute moi-même. Il semble plutôt que la fièvre jaune soit apparue ici d'elle-même... mais si c'est le cas, alors comment ? »\n\nExtrait du journal du Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], qui parle de la fièvre jaune dans [SCOPE.sState('panum_disease_state').GetName], [TimeKeeper.GetCurrentDate.Format('y')]" #NT!
 panum.543.g: "Comment une maladie peut-elle surgir de nulle part ?" #NT!
 panum.544.t: "L'eau...?" #NT!
 panum.544.d: "Enquêtant sur la possibilité que la fièvre jaune puisse être une maladie d’origine hydrique, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a recueilli des échantillons dans les cours d’eau et les puits locaux." #NT!
 panum.544.f: "« J'avais envisagé une possibilité : cette maladie pourrait être de nature similaire au choléra, qui pourrait être transmis par l'eau contaminée. Décidant de voir si c'était le cas, j'ai ordonné à mes assistants de recueillir des échantillons avant que je trouve un endroit calme pour mon microscope, où je pourrais travailler sans être dérangé. L'air humide et tropical est distrayant, tout comme le bourdonnement incessant des moustiques, mais avant longtemps, les échantillons ont commencé à glisser sous l'objectif, me permettant d'observer ce monde minuscule.\n\nMalheureusement, ce fut une entreprise infructueuse. Certains étaient plus sales que d'autres, portant même de minuscules vers et autres, mais ceux-ci ne correspondaient pas au schéma des infectés, qui se dispersent sur la carte comme un jet de grenaille. Quoi qu'il en soit, je ne trouve aucun indice quant à la nature de la fièvre jaune dans cette eau... »\n\nExtrait du journal du Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], qui parle de la fièvre jaune dans [SCOPE.sState('panum_disease_state').GetName], [TimeKeeper.GetCurrentDate.Format('y')]" #NT!
 panum.544.g: "...mais s’ils ne sont pas là, où se cachent-ils ?" #NT!
 panum.545.t: "L'île" #NT!
 panum.545.d: "Intrigué par une apparente « rupture » dans le schéma des infections, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] s'est aventuré dans un endroit inhabituel : une pêcherie insulaire." #NT!
 panum.545.f: "« Ah, vous devez être docteur... oh. Pardonnez-moi la puanteur, docteur. Faites attention à ne pas tomber dedans non plus. Les poissons qui mangent les entrailles que nous leur lançons sont tout aussi susceptibles de vous manger, s'ils le peuvent. »\n'... s'il vous plaît, faites vite. Parlez-moi de cet endroit. »\n'Oui, eh bien, je pense que vous serez heureux d'apprendre qu'il n'y a aucune maladie ici. Pas cette fièvre jaune, en tout cas. »\n'Comment ça ? Y a-t-il quelque chose qui pourrait épargner vos hommes ? »\n'Peut-être qu'ils passent si peu de temps à terre. La plupart du temps, ils sont en mer, et certains s'éloignent plus loin et ne reviennent pas avant un jour ou plus. Mais il doit y avoir plus que ça, je pense. Ils passent leur temps libre ici sur l'île, dans les casernes ou chez eux, et il n'y a pas du tout de fièvre ici.'\n'Je vais enquêter... non, mes assistants pourront le faire après mon retour.'\n'Je ne manquerai pas de le faire savoir à tout le monde, docteur... et ils n'ont même pas dit au revoir.'" #NT!
 panum.545.g: "...mais d'abord, un bain savonneux. Un bain très, très savonneux." #NT!
 panum.546.t: "Gaz des marais ?" #NT!
 panum.546.d: "Dans ce qui pourrait être un retour obsédant de la vieille théorie des miasmes, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a trouvé des rapports surprenants - la fièvre jaune pourrait être liée aux fumées des marais !" #NT!
 panum.546.f: "« Cela me fait mal de voir que si peu de choses semblent avoir du sens ici. Rien ne correspond aux théories établies que nous connaissons, et je me retrouve à m'accrocher à des brins de paille. Cependant, il y a une ligne prometteuse : les marais. Mes assistants ont préparé des lames pour le microscope, et ils grouillent et prospèrent de microbes, mais rien que nous puissions identifier. Et pourtant, malgré cela, la peste explose sur les rivages. Les maisons proches de ces tourbières sont les plus touchées par la fièvre jaune. Certains mentionnent même l'avoir eue dans leur enfance.\n\nEt pourtant, il n'y a aucun signe de... comment. Ils ne boivent pas l'eau, ils ne mangent pas de poisson pêché dedans, et pourtant, la puanteur se propage dans leurs maisons avec la brise, les inonde de puanteur, et la maladie s'ensuit rapidement. Les anciens textes crieraient « miasme », mais ce n'est pas possible... mais sinon, comment la maladie pourrait-elle se propager du marais à la maison ? Extrait du journal du Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], qui parle de la fièvre jaune dans les [SCOPE.sState('panum_disease_state').GetName], [TimeKeeper.GetCurrentDate.Format('y')]" #NT!
 panum.546.g: "...ou peut-être que c'est astrologique...non, cela n'a aucun sens...n'est-ce pas ?" #NT!
 panum.547.t: "Le rival" #NT!
 panum.547.d: "Décidant de faire appel à une expertise locale, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a décidé de rendre visite à un allié potentiel : le coroner local." #NT!
 panum.547.f: "« Ah, ravi de vous rencontrer, docteur. Je m'excuse si nous ne nous serrons pas la main, j'ai un corps sur la dalle dans l'autre pièce. »\n« Fièvre jaune ? »\n« Vous le pensez, mais non. Le paludisme, vous le croyez ? De toutes les fois où l'on voit une épidémie, nous l'avons maintenant, en même temps. »\n« Une malheureuse coïncidence ? »\n« Peut-être, mais je suis ici depuis assez longtemps pour avoir vu un schéma. Les deux ont tendance à venir par paires, et pire encore, ils ont des symptômes similaires et des décès similaires. C'est une terrible corvée de les différencier, je vous le dis. J'aurais pensé qu'ils étaient pareils. »\n« C'est... assez fascinant, en fait. Avez-vous de bons documents à ce sujet ? »\n« Oh, bien sûr. Je vais demander à mon assistant de vous les envoyer, même si je ne sais pas à quel point ils pourraient être utiles. Je ne sais pas comment cette chose se propage, docteur, mais je parie que si vous pouvez trouver l'un, vous trouverez peut-être l'autre." #NT!
 panum.547.g: "Alors peut-être pourrions-nous faire d’une pierre deux coups." #NT!
 panum.548.t: "La route bifurquée" #NT!
 panum.548.d: "Intrigué par la nature de la fièvre jaune, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a écrit à la capitale pour demander des instructions supplémentaires." #NT!
 panum.548.f: "« ... et pourtant, malgré tous mes efforts, je ne sais pas comment procéder. Il y a peu d'indices pour guider mon enquête, et bien que j'aie examiné un grand nombre de revues médicales et consulté des experts locaux, je ne suis pas entièrement certain de ce qu'est vraiment la fièvre jaune. Une maladie, bien sûr, mais de quelle sorte ? Une maladie de l'air, comme un miasme ? Quelque chose dans l'eau ou dans la nourriture ? Comment se transmet-elle d'homme à homme, ou peut-être d'un marais à l'autre ? Ce sont des questions auxquelles je ne peux pas répondre et dont je ne découvrirai peut-être jamais la vérité. Si je ne parviens pas à trouver la maladie, je ne peux pas espérer la combattre directement, mais mon enquête n'est pas entièrement vaine. J'ai peut-être trouvé deux pistes de recherche possibles à considérer : tout d'abord, nous pourrions tenter de trouver un modèle de propagation. Peut-être qu'avec une enquête ciblée, nous pourrions discerner une certaine logique quant à la manière dont la maladie se transmet, et ainsi l'interrompre. Peut-être que l'arrêt de la propagation révélera la véritable cause.\n\nDeuxièmement, que nous essayions de concevoir une forme de traitement ou de vaccin, peut-être en étudiant les enfants qui ont été infectés par le virus dans leur jeunesse mais qui se sont complètement rétablis, ainsi que ceux qui survivent. Nous ne connaissons peut-être pas ses origines, mais nous pouvons peut-être encore le surpasser.\n\nAinsi, j'écris à la capitale, à vous, messieurs estimés du savoir et de la science, et je vous demande : quel sera le centre de mes recherches ici ?\n\nUne lettre du Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] dans [SCOPE.sState('panum_disease_state').GetName], [TimeKeeper.GetCurrentDate.Format('y')]" #NT!
 panum.548.g: "Mieux vaut prévenir que guérir." #NT!
 panum.548.h: "Nous jouons pour toutes les billes. Nous aurons un vaccin." #NT!
  
 panum.551.t: "Le chemin vers la prévention" #NT!
 panum.551.d: "Suite aux instructions de la capitale, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a commencé à enquêter sur les moyens de prévenir la propagation de la fièvre jaune." #NT!
 panum.551.f: "« ... bien sûr, il est difficile de déterminer exactement ce qu'il faut faire pour empêcher la propagation d'une maladie dont nous ne comprenons guère plus que la manière dont elle peut provoquer la mort. Pourtant, si c'est le défi auquel je dois faire face, qu'il en soit ainsi. J'ai découvert un certain nombre de pistes prometteuses jusqu'à présent ; ma carte de l'infection est sporadique, mais ici et là, certains îlots d'irrégularité apparaissent... des endroits où l'épidémie diminue considérablement, voire complètement.\n\nJe ne peux pas prétendre vraiment comprendre la nature de cette maladie, mais la maladie n'est guère irrégulière. Il y a ici un modèle, qui attend d'être découvert, et si nous pouvons le trouver, alors nous pourrions très bien résoudre ce casse-tête et nous débarrasser définitivement de la fièvre jaune. »\n\nExtrait du journal du Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], qui parle de la fièvre jaune dans [SCOPE.sState('panum_disease_state').GetName], [TimeKeeper.GetCurrentDate.Format('y')]" #NT!
 panum.551.g: "Nous construisons une forteresse, une brique à la fois." #NT!
 panum.552.t: "Faits sur le Filet O'" #NT!
 panum.552.d: "Alors qu'il travaillait sur un moyen de prévenir la propagation de la fièvre jaune, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a reçu la visite d'un des assistants de [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]." #NT!
 panum.552.f: "« Ah, c'est bon de te revoir, mon garçon, et - mon Dieu ! Quelle est cette puanteur ? »\n« Désolé, docteur... Je reviens juste de la pêcherie, celle que vous m'avez envoyé enquêter. J'ai trouvé quelque chose de très intéressant ! »\n« Tellement intéressant que vous n'avez pas eu le temps de prendre un bain, semble-t-il... »\n« Pardonnez-moi, mais oui. J'ai cherché comment la fièvre jaune n'affectait pas les hommes de la pêcherie, et j'ai commencé à la suivre jusqu'au continent. Il y a un fumoir sur le rivage, et les travailleurs sortent par là, et personne n'attrape la fièvre jaune là-bas. Et cela m'a fait penser... peut-être que la fumée l'éloigne ? Alors, j'ai commencé à chercher des endroits avec beaucoup de fumée, et j'ai trouvé ce fabricant de savon, et ils ont mis des herbes et des huiles dans leur brûleur. Pas une seule fièvre jaune dans leur maison. »\n« Hmmm... c'est un travail fascinant. Continuez vos observations et tenez-moi au courant et, oh, bon travail. »" #NT!
 panum.552.g: "Des pas pressés éloignent l'assistant... mais laissent le médecin réfléchir." #NT!
 panum.553.t_america: "La Mission" #NT!
 panum.553.d_america: "En suivant le chemin parcouru par les brèches de l'épidémie, les recherches du Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] les ont conduits vers une ancienne mission coloniale." #NT!
 panum.553.f_america: "« Il n’a pas fallu longtemps pour trouver la mission ici. C’était l’un des premiers bâtiments construits après la colonisation, nos ancêtres fraîchement arrivés de terres qu’ils ne reverraient peut-être jamais. Ce n’est pas une grande cathédrale, mais elle a été construite avec amour, et au fil du temps, les missionnaires et les membres de l’Église mère l’ont vue grandir, se doter de ses propres salles et couloirs. C’était l’un des premiers endroits où les malades pouvaient être amenés, soignés par des religieuses et des bénévoles pieux disposés à aider. De l’avis général, l’hôpital aurait très bien pu devenir un abattoir à lui tout seul… et pourtant, ce n’est pas le cas. Alors que d’autres hôpitaux comptent leurs morts et voient la maladie se propager d’une salle à l’autre, ici, rien. Une famille a été amenée après l’incendie d’une maison, mais au bout d’une semaine, aucun d’entre eux n’a attrapé la fièvre jaune, bien qu’ils aient été abrités à quelques pièces de là. Cela me laisse perplexe, car la mission et l’hôpital sont semblables, mais il y a une différence majeure : les moustiquaires. Un sermon est une chose sacrée et ne peut être interrompu par le bourdonnement des moustiques et autres créatures de ce genre. Le clergé a donc placé des moustiquaires sur toutes les fenêtres pour empêcher les moustiques d'entrer, même dans les salles communes. Et c'est ainsi que la fièvre jaune semble disparaître complètement. Extrait du journal du Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], qui parle de la fièvre jaune dans les [SCOPE.sState('panum_disease_state').GetName], [TimeKeeper.GetCurrentDate.Format('y')]" #NT!
 panum.553.g: "Car je te rendrai la santé..." #NT!
 panum.553.t_africa: "Le bidonville" #NT!
 panum.553.d_africa: "En suivant le chemin parcouru par les brèches dans l'épidémie, les recherches du Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] les ont conduits dans un endroit curieux : les bidonvilles." #NT!
 panum.553.f_africa: "Les bidonvilles étaient suffisamment proches pour faire douter n’importe quel homme de l’importance de notre grande entreprise coloniale dans ces terres. Sale et misérable, bondé de femmes et d’enfants, attendant que leurs hommes reviennent des plantations ou des mines ou de n’importe quel autre travail. Des pompes à eau surchargées remplissent les marmites, des mouches bourdonnent et un manque flagrant d’hygiène, tout cela concourait à faire de cet endroit un chaudron de maladies. En effet, c’est le cas.\n\nC’était rare dans ces endroits, un médecin comme moi était emmené avec empressement de maison en maison par des guides locaux et avec l’escorte de la gendarmerie, et on lui demandait de donner son avis sur telle ou telle maladie. En échange, je leur posais des questions : qu’en est-il de la fièvre jaune ? J’ai vu des cas de choléra et de dysenterie, mais pas la maladie que je recherche. Une femme a montré les fenêtres, ou plutôt l’endroit où elles devraient être – au lieu d’une vitre, un mur de tissu, un filet. Pour eux, cela les empêchait de contracter le paludisme, mais aussi, peut-être, la fièvre jaune... qui, selon eux, pourrait très bien être transmise par des insectes.\n\nExtrait du journal du Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], qui parle de la fièvre jaune dans [SCOPE.sState('panum_disease_state').GetName], [TimeKeeper.GetCurrentDate.Format('y')]" #NT!
 panum.553.h: "...et peut-être, juste peut-être, les locaux ont raison ?" #NT!
 panum.554.t: "Le plus grand tueur" #NT!
 panum.554.d: "En parcourant les dossiers qui leur ont été remis par les forces militaires locales, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a fait une découverte." #NT!
 panum.554.f: "« Ah, c'est un plaisir de vous revoir, colonel. J'ai quelques questions à vous poser sur ces documents que vous m'avez donnés ? Avez-vous un moment à me consacrer ? » « Oh, mais bien sûr ! Je peux vous aider. » « Il est mentionné ici que la dernière campagne a été menée par un officier qui était, semble-t-il, profondément affecté par les piqûres d'insectes. » « Affecté et très, très ennuyé, j'en ai peur. Les piqûres font partie de la vie dans ce pays, mais d'où elles viennent... aucune. » « Je vois, je vois... mais il est également mentionné que l'armée était affligée à la fois par la malaria et la fièvre jaune, qui tuaient plus par maladie que par combat. » « L'usure fait partie depuis longtemps de la guerre, j'en ai peur. » « ... mais une fois qu'ils ont ordonné l'utilisation du pyrèthre, les cas de fièvre jaune et de paludisme ont chuté de façon spectaculaire. Puis, une semaine plus tard, il a ordonné la pulvérisation de la région locale, et de nouveau, les taux ont chuté. Qu'est-ce que c'est exactement que ce pyrèthre ? »" #NT!
 panum.554.g: "« Ah, le pyrèthre ? On s'en sert pour désinfecter les troupes. Ça tue les insectes, voyez-vous. »" #NT!
 panum.555.t_america: "Les souvenirs d'antan" #NT!
 panum.555.d_america: "Enfermé dans une bataille contre une maladie qui sévit en Amérique du Sud depuis des siècles, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] cherche des réponses dans un endroit étrange : le passé." #NT!
 panum.555.f_america: "« Certains disent que le passé est un pays différent. Dans les Amériques, c’est peut-être plus vrai que partout ailleurs, car beaucoup de choses ont changé depuis Colomb, mais à ma grande surprise, la maladie que je combats n’en fait pas partie. Il m’a fallu des semaines pour retrouver les journaux et les dossiers des premiers colons de ces terres, mais ils sont enfin parvenus jusqu’à moi. C’est une trouvaille précieuse. Avec eux, j’ai les récits des médecins du passé, des esprits brillants qui manquaient peut-être des outils que nous considérons aujourd’hui comme acquis. Pourtant, même si nous avons hérité de leur bataille inachevée, ils nous ont laissé des informations précieuses qui pourraient me permettre de terminer ce qu’ils ont commencé. Il y a une révélation précieuse, cachée, difficile à remarquer sans de tels récits. De temps en temps, il y a une explosion de fièvre jaune dans cette région, presque comme une horloge. Cela seul est inutile, mais cela correspond presque exactement aux journaux qui parlent de pluies intenses et même d’inondations, enregistrées ici comme des maisons emportées par les eaux, suivies d’épidémies de fièvre jaune. Les deux pourraient-ils être liés ?\n\nExtrait du journal du Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], qui parle de la fièvre jaune dans [SCOPE.sState('panum_disease_state').GetName], [TimeKeeper.GetCurrentDate.Format('y')]" #NT!
 panum.555.g: "Nous nous tenons tous sur les épaules de géants... ils avaient juste moins de géants sur lesquels se tenir." #NT!
 panum.555.t_africa: "Remèdes populaires" #NT!
 panum.555.d_africa: "De manière peut-être controversée, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a demandé conseil aux personnes qui connaissent le mieux la fièvre jaune : les autochtones." #NT!
 panum.555.f_africa: "« Certains me traiteraient de fou de choisir de consulter les indigènes plutôt qu’une revue médicale, mais je pense qu’ils manquent de raisonnement pour porter un tel jugement. La fièvre jaune est une maladie que l’on trouve ici, en Afrique, et ces gens vivent ici bien plus longtemps que nous. En fait, il est possible que cette maladie soit apparue sur ce territoire en premier lieu. C’est peut-être vrai, car de nombreuses épidémies ici peuvent facilement tuer des Européens et autres, mais ne donner aux indigènes africains que des symptômes proches d’une légère grippe.\n\nPourtant, malgré cela, il y a de la compréhension. J’ai parlé avec un certain nombre de guérisseurs locaux et même avec des représentants de tribus plus éloignées du pays, et ils mentionnent certaines pratiques préventives… brûler des excréments d’éléphant et diverses plantes, et même ramener cette fumée à l’intérieur, ce qui éloigne les moustiques qu’ils croient liés au paludisme, et peut-être à la fièvre jaune. De plus, ils ont un moyen de lire le terrain qui les entoure et de prédire le début de la saison des « pluies », qui, selon eux, correspond au pire du paludisme et de la fièvre jaune. Cela nécessitera des études et des réflexions plus approfondies, mais c'est prometteur.'\n\nExtrait du journal du Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], qui parle de la fièvre jaune dans [SCOPE.sState('panum_disease_state').GetName], [TimeKeeper.GetCurrentDate.Format('y')]" #NT!
 panum.555.h: "La sagesse, à l'endroit où on l'attend le moins." #NT!
 panum.556.t: "Tissu simple ?" #NT!
 panum.556.d: "Bien que destinés à soutenir nos troupes dans une garnison frontalière, de nouveaux tissus imprégnés d'insecticides sont arrivés dans la même ville que celle que le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] étudie." #NT!
 panum.556.f: "« Vous êtes censé être dans cette zone ? Oh, je vois, vous êtes le docteur de la capitale. Je ne sais pas s'il y a grand-chose pour vous ici, docteur. Il n'y a pas un seul cas de cette fièvre par ici. »\n« ... que je sache. Qu'est-ce que c'est ? »\n« Les généraux chez eux ont découvert qu'ils pouvaient doser les pesticides directement dans le tissu et tenir ces foutus insectes à distance. Vous voyez ? Regardez le sol. Des dizaines de bâtards, déjà morts. »\n« Ce doit être très efficace de les tuer si rapidement. Combien d'hommes restent dans ces tentes ? »\n« La meilleure partie d'un bataillon, probablement environ six cents. Le tissu est neuf depuis que les anciennes ont été détruites par la mousson l'année dernière. Une période terrible, de la fièvre partout, et le paludisme aussi. Maintenant que nous avons ça, plus rien. »" #NT!
 panum.556.g: "...tu viens de dire qu'il n'y a pas une seule fièvre depuis que tu as ce nouveau tissu ?" #NT!

