 notification_panum_description_progress_notification_desc: "Notre [concept_panum_physician] Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a acquis de nouvelles connaissances en observant la maladie épidémique et a obtenu un indice supplémentaire." #NT!
  
 panum_antitoxins_tech: "Antitoxines" #NT!
 panum_antitoxins_tech_desc: "Une antitoxine est un anticorps capable de neutraliser une toxine spécifique. Les antitoxines contre les toxines diphtériques et tétaniques ont été produites par Emil Adolf von Behring et ses collègues à partir de 1890. Elles sont considérées comme l'une des grandes étapes de l'histoire de la médecine." #NT!
  
