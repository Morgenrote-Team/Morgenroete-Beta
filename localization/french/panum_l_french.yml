 panum_congress_host_modifier: "J'ai récemment organisé un congrès médical" #NT!
 panum_congress_attend_modifier: "Participe au congrès médical" #NT!
  
 panum.2000.t: "Préparations pour le congrès médical" #NT!
 panum.2000.d: "Avant la tenue du prochain Congrès médical international dans notre pays, la question se pose de savoir si le congrès doit se concentrer sur une maladie spécifique ou non." #NT!
 panum.2000.f: "Les congrès médicaux peuvent être consacrés à une maladie spécifique si le pays hôte dispose au moins d'une description de la maladie. Un congrès ne peut être organisé qu'une fois pour chaque maladie. Les médecins et microbiologistes présents reçoivent des indices supplémentaires afin de faire avancer plus rapidement leurs recherches. Lors d'un congrès général, les pays participants reçoivent simplement un bonus pour leurs progrès académiques." #NT!
 panum.2000.g: "Il s’agit censée être une conférence médicale générale." #NT!
 panum.2001.t: "Congrès médical" #NT!
 panum.2001.d: "La capitale se prépare à accueillir la rencontre internationale des médecins spécialistes. [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] présidera les réunions en tant que président. [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_congress_title')]" #NT!
 panum.2001.f: "Les congrès médicaux sont une excellente occasion d'échanger des connaissances médicales. Les réalisations qui étaient auparavant réservées à un seul pays sont ici partagées de manière fraternelle. Les congrès médicaux ne peuvent être organisés que par des médecins, mais les biologistes spécialisés en microbiologie sont également invités et peuvent partager leurs connaissances dans le domaine des agents pathogènes et des vaccins. Si un pays dispose à la fois d'un médecin et d'un microbiologiste, les deux peuvent y participer." #NT!
 panum.2001.g: "Envoyez les invitations !" #NT!
 panum.2002.t: "Invitation au congrès médical" #NT!
 panum.2002.d: "[SCOPE.sCountry('panum_congress_host_country').GetName] invite les principales nations médicales à un congrès international dans sa capitale. Sont invités médecins et microbiologistes. [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_congress_title')]" #NT!
 panum.2002.g: "N'oubliez pas les stéthoscopes et les microscopes !" #NT!
 panum.2003.t: "Descriptions et traitements" #NT!
 panum.2003.d: "Le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a l'occasion unique d'acquérir des connaissances épidémiologiques révolutionnaires lors du Congrès médical de [SCOPE.sCountry('panum_congress_host_country').GetName]. Sur quelle maladie doit-on se concentrer ?" #NT!
 panum.2003.f: "Si un pays participant au congrès médical connaît une description d'une maladie ou un traitement pour une maladie qu'un autre pays ne connaît pas, ce dernier peut l'apprendre lors du congrès. Les connaissances ne peuvent être améliorées que sur une seule maladie. Si aucune nouvelle connaissance n'est possible lors du congrès, il est toujours possible d'accumuler des connaissances générales et d'améliorer une technologie médicale. La participation d'un médecin est cruciale à cet effet." #NT!
 panum.2003.g: "Le médecin devrait recueillir certaines connaissances médicales générales auprès de ses collègues." #NT!
 panum.2003.h: "Choléra." #NT!
 panum.2003.i: "Tuberculose." #NT!
 panum.2003.j: "Variole." #NT!
 panum.2003.k: "Typhus." #NT!
 panum.2003.l: "Fièvre jaune." #NT!
 panum.2003.m: "Rougeole." #NT!
 panum.2003.n: "Scarlatine." #NT!
 panum.2003.o: "Peste." #NT!
 panum.2003.p: "Diphtérie." #NT!
 panum.2003.q: "Polio." #NT!
 panum.2004.t: "Agent pathogène et vaccin" #NT!
 panum.2004.d: "C'est avec plaisir que le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a constaté que de nombreuses personnes partageant les mêmes idées étaient présentes au congrès de [SCOPE.sCountry('panum_congress_host_country').GetName] et étaient prêtes à partager leurs connaissances en microbiologie. La seule question est de savoir sur quelles maladies merveilleuses [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] il aimerait en savoir plus à l'avenir ?" #NT!
 panum.2004.f: "Si un pays participant au congrès médical connaît un agent pathogène d'une maladie ou un vaccin contre une maladie qu'un autre pays ne possède pas, ce dernier peut l'apprendre lors du congrès. Les connaissances ne peuvent être améliorées que sur une seule maladie. Si aucune nouvelle connaissance n'est possible lors du congrès, il est toujours possible d'accumuler des connaissances générales et d'améliorer une technologie biologique. La participation d'un biologiste ayant le profil de microbiologiste est cruciale à cet effet." #NT!
 panum.2004.g: "Notre scientifique devrait recueillir certaines connaissances biologiques générales auprès de ses collègues." #NT!
 panum.2005.t: "Une vision médicale" #NT!
 panum.2005.d_general: "Les médecins et les biologistes présents au congrès ont notamment décidé de moderniser et d'améliorer la formation des futurs étudiants en médecine et ont rédigé une déclaration commune à ce sujet." #NT!
 panum.2005.d_special: "Compte tenu de l’objectif principal de la conférence, les médecins et les biologistes ont voté pour concentrer tous les efforts sur la lutte contre une maladie spécifique au cours des prochaines années." #NT!
 panum.2005.f: "Si un thème particulier a été déclaré thème principal au début du congrès médical, toutes les nations participantes recevront des informations supplémentaires sur cette maladie – selon qu'un physicien, un microbiologiste ou les deux sont présents. S'il s'agit d'un congrès général, l'accent est mis sur la formation de nouveaux personnels médicaux." #NT!
 panum.2005.g: "L'événement en valait la peine." #NT!
  
 panum.2009.t: "Fin du congrès médical" #NT!
 panum.2009.d: "Le congrès médical de [SCOPE.sCountry('panum_congress_host_country').GetName] s'est terminé hier. Les médecins et les microbiologistes sont de retour chez eux et rapportent de nombreuses découvertes." #NT!
 panum.2009.f: "Le Congrès international de médecine est une série de conférences scientifiques internationales sur la médecine qui ont eu lieu périodiquement de 1867 à 1913. L'idée d'un tel congrès est venue en 1865, lors du troisième congrès médical annuel de France ; le professeur Henri Giutrac a proposé d'organiser une conférence médicale internationale en 1867, profitant du fait que des médecins et des chirurgiens du monde entier seraient sûrement à Paris pour assister à l'Exposition internationale de cette année-là." #NT!
 panum.2009.g: "J'espère que le buffet était bon ?" #NT!
  
 panum_surgeon: "Chirurgien" #NT!
 panum_surgeon_desc: "Les chirurgiens sont à l’aise dans la vie médicale quotidienne, mais peuvent être utiles dans la recherche médicale ou les traités anatomiques." #NT!
 panum_psychiatrist: "Psychiatre" #NT!
 panum_psychiatrist_desc: "Les psychiatres s’intéressent à l’amélioration des conditions de vie des personnes souffrant de maladies mentales et encouragent la recherche et le développement de nouvelles méthodes de traitement dans ce domaine." #NT!
 panum_military_physician: "Médecin militaire" #NT!
 panum_military_physician_desc: "Ce médecin est spécialisé dans les soins aux blessés sur le champ de bataille et réussit particulièrement bien à améliorer les premiers secours." #NT!
 panum_yellow_fever: "Fièvre jaune" #NT!
  
