 ### 2.3.1 ###

 panum.101.t: "Troisième pandémie de choléra" #NT!
 panum.101.d: "Des nouvelles inquiétantes en provenance du delta du Gange sont parvenues aujourd'hui à la capitale. Les cas de maladie y ont augmenté rapidement. Après un bref examen par des médecins locaux, ils ont été choqués de découvrir que le choléra a de nouveau fait son apparition." #NT!
 panum.101.g: "D’une manière ou d’une autre, le choléra est revenu." #NT!
 panum.1000.t: "Épidémie de polio" #NT!
 panum.1000.d: "Une épidémie a éclaté dans l’un de nos États : la #YELLOW Polio#! fait des ravages en [SCOPE.sState('panum_disease_state').GetName] !" #NT!
 panum.1000.f: "Des images de l’Égypte antique suggèrent que la poliomyélite existe depuis longtemps et qu’elle est endémique. Cependant, elle n’a atteint le statut d’épidémie qu’à la fin du XIXe siècle, lorsqu’elle s’est soudainement déclarée en Suède et aux États-Unis. En 1910, des épidémies fréquentes sont devenues des événements réguliers dans le monde développé, principalement dans les villes pendant les mois d’été. À son apogée dans les années 1940 et 1950, la polio paralysait ou tuait plus d’un demi-million de personnes dans le monde chaque année. La peur et la réponse collective à ces épidémies ont donné lieu à une réaction et une mobilisation publiques extraordinaires, qui ont encouragé le développement de nouvelles méthodes de prévention et de traitement de la maladie et ont révolutionné la philanthropie médicale." #NT!
 panum.1000.g: "Les béquilles et les fauteuils roulants deviennent des objets du quotidien..." #NT!
 je_panum_germ_theory_success: "[GetPlayer.GetName] a collecté au moins #V 20 éléments de preuve#! pour renforcer la théorie des germes et réfuter la théorie des miasmes." #NT!
  
 panum_aspirin_factory_modifier: "Usine d'aspirine" #NT!
 panum_xray_modifier: "Radiographies" #NT!
 panum_bloodtypes_modifier: "Transfusions sanguines" #NT!
 panum_ecg_modifier: "Électrocardiographie" #NT!
 panum_transplantation_modifier: "Transplantations" #NT!
 panum_stereotactic_method_modifier: "Méthode stéréotaxique" #NT!
 panum_cardiopulmonary_bypass_modifier: "Circulation extracorporelle" #NT!
 panum_chemotherapy_modifier: "Chimiothérapie" #NT!
  
 panum.2007.t: "Inventions médicales" #NT!
 panum.2007.d: "Au congrès, on a entendu dire qu'il y avait des spécialistes qui avaient réussi des innovations médicales et qu'ils étaient prêts à partager leurs connaissances." #NT!
 panum.2007.f: "Les innovations uniques en médecine, comme les transplantations, le développement des rayons X ou de la chimiothérapie, sont d'une telle importance pour l'humanité que leurs inventeurs partagent leurs connaissances sans réserve. En fin de compte, il en va du bien-être de tous." #NT!
 panum.2007.g: "Santé à l'humanité !" #NT!
  
 panum.2205.t: "Expérimentation animale" #NT!
 panum.2205.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] est considéré comme un scientifique impitoyable, avec un certain penchant pour la cruauté. Le nombre d'animaux [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] tués « pour le bien de la science » serait à trois chiffres. Néanmoins, ces expériences ont leurs succès." #NT!
 panum.2205.f: "Les expériences sur les animaux à des fins médicales existent depuis l'Antiquité, mais ce n'est qu'au XIXe siècle que des expériences d'une ampleur jusqu'alors inconnue ont été réalisées. C'est notamment à l'époque de la découverte de la théorie des germes et par la suite que de nombreuses expériences ont été menées, au cours desquelles les animaux ont été consciemment infectés par des agents pathogènes à de nombreuses reprises et sont devenus littéralement des « cobayes » pour de nouveaux médicaments. Cette période a également vu l'introduction généralisée des expériences sur les animaux et de la vivisection dans les universités pour les étudiants." #NT!
 panum.2205.g: "Le médecin est libre de ses actes." #NT!
 panum.2205.h: "Les étudiants devraient apprendre à disséquer les animaux." #NT!
 panum.2205.i: "Cela va clairement trop loin." #NT!
  
 panum.2411.t: "Aspirine" #NT!
 panum.2411.d: "Notre chimiste Dr [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName], a inventé un véritable miracle médical qui pourrait révolutionner la pharmacie : l'aspirine. Le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a confirmé les effets analgésiques." #NT!
 panum.2411.f: "L'acide salicylique est utilisé en médecine depuis l'Antiquité. Des médicaments à base de bois de saule et d'autres plantes riches en salicylate apparaissent dans des tablettes d'argile de l'ancienne Sumer et dans le papyrus Ebers de l'Égypte ancienne. Hippocrate fait référence à l'utilisation du thé salicylique pour réduire la fièvre en 400 av. J.-C. Les plantes riches en salicylate faisaient partie de la pharmacopée de la médecine occidentale dans l'Antiquité classique et au Moyen Âge. L'extrait d'écorce de saule est devenu connu au milieu du XVIIIe siècle pour ses effets spécifiques sur la fièvre, la douleur et l'inflammation. Au XIXe siècle, les pharmaciens ont expérimenté et prescrit une variété de produits chimiques associés à la salicine, le composant actif de l'extrait de saule. En 1853, le chimiste Charles Frédéric Gerhardt a traité pour la première fois le chlorure d'acétyle avec du salicylate de sodium pour produire de l'acide acétylsalicylique. En 1897, les scientifiques des usines de médicaments et de peintures de Bayer ont commencé à étudier l'acide acétylsalicylique comme un substitut moins irritant pour l'estomac aux médicaments à base de salicylate standard courants et ont créé une nouvelle voie de synthèse sans impuretés. En 1899, Bayer avait baptisé ce médicament aspirine et le vendait dans le monde entier." #NT!
 panum.2411.g: "Le médicament sera le point de départ de nouvelles recherches médicales." #NT!
 panum.2411.h: "La chimie nous réserve certainement des découvertes encore plus spectaculaires." #NT!
 panum.2411.i: "L’industrie pharmaceutique en bénéficiera." #NT!
 panum.2412.t: "Radiographies" #NT!
 panum.2412.d: "Notre physicien Dr. [ROOT.Var('curie_physicist_var').GetCharacter.GetLastName] a fait une découverte spectaculaire : [ROOT.Var('curie_physicist_var').GetCharacter.GetSheHe] a découvert des rayons jusqu'alors inconnus qui peuvent être utilisés pour éclairer le corps. Le Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a mis en évidence les possibilités pour la médecine." #NT!
 panum.2412.f: "Les rayons X sont des ondes électromagnétiques dont l'énergie quantique est supérieure à environ 100 eV, ce qui correspond à des longueurs d'onde inférieures à environ 10 nm. Les rayons X se situent dans le spectre électromagnétique, dans la gamme d'énergie supérieure à la lumière ultraviolette. Les rayons X ont été découverts en 1895 par le scientifique allemand Wilhelm Conrad Röntgen, qui les a appelés rayonnement X pour désigner un type de rayonnement inconnu. Les rayons X peuvent pénétrer de nombreuses substances solides telles que les matériaux de construction et les tissus vivants. La radiographie aux rayons X est donc largement utilisée dans les diagnostics médicaux (par exemple, pour vérifier les os cassés) et dans la science des matériaux (par exemple, pour identifier certains éléments chimiques et détecter les points faibles des matériaux de construction)." #NT!
 panum.2412.g: "Effrayant – comme voir sa propre mort." #NT!
 panum.2413.t: "Groupes sanguins" #NT!
 panum.2413.d: "Le Dr [ROOT.Var('curie_physicist_var').GetCharacter.GetLastName] a fait une découverte étonnante qui expliquerait pourquoi le sang humain se mélange parfois et parfois s'agglutine : il semblerait qu'il existe différents groupes sanguins. Il s'agit d'une avancée décisive pour le don et la transfusion sanguine." #NT!
 panum.2413.f: "« J'ai récemment observé et déclaré que le sérum de personnes normales est capable d'agglutiner les globules rouges d'autres individus sains... Comme on le dit couramment, on peut dire que dans ces cas, il existe au moins deux types différents d'agglutinines, l'un en A, l'autre en B, les deux ensemble en C. Les cellules sont naturellement insensibles aux agglutinines de leur propre sérum. » - Karl Landsteiner" #NT!
 panum.2413.g: "La recherche sur les groupes sanguins doit être encouragée." #NT!
 panum.2413.h: "La clinique est censée collecter les groupes sanguins et les collecter pour les transfusions sanguines." #NT!
 panum.2414.t: "Électrocardiographie" #NT!
 panum.2414.d: "Le docteur [ROOT.Var('curie_physicist_var').GetCharacter.GetLastName] a inventé un appareil étonnant qui enregistre l'activité électrique des fibres musculaires du cœur. Le médecin appelle cet appareil un électrocardiographe, un ECG." #NT!
 panum.2414.f: "En 1843, Carlo Matteucci découvre, grâce à des expériences sur des coeurs de pigeons, que l'activité cardiaque est basée sur des processus électriques. En 1882, le physiologiste Augustus Desiré Waller réalise le premier ECG sur son chien Jimmy en trempant ses quatre pattes dans une solution conductrice de chlorure de sodium. En 1887, il parvient pour la première fois à enregistrer les courants cardiaques à l'aide d'un électromètre capillaire. Les instruments sont considérablement améliorés en 1903 par Willem Einthoven, qui, sur la base de son galvanomètre à cordes développé en 1895, fait de l'ECG une procédure de diagnostic utile et l'introduit dans la clinique. La terminologie qu'il a introduite est encore utilisée aujourd'hui." #NT!
 panum.2414.g: "Cet appareil devrait être présent dans tous les hôpitaux." #NT!
 panum.2415.t: "Première transplantation" #NT!
 panum.2415.d: "Le talent chirurgical du Dr [ROOT.Var('curie_physicist_var').GetCharacter.GetLastName] est connu dans tout le pays, mais [ROOT.Var('curie_physicist_var').GetCharacter.GetSheHe] a récemment surpris les experts avec une procédure audacieuse : le médecin a transplanté du tissu thyroïdien humain sous la peau et dans la cavité abdominale d'un jeune homme." #NT!
 panum.2415.f: "La première transplantation au sens moderne du terme, c'est-à-dire l'implantation de tissu organique pour remplacer une fonction organique, fut la transplantation de la thyroïde en 1883. Elle fut réalisée par le chirurgien suisse Theodor Kocher, futur lauréat du prix Nobel. Au cours des décennies précédentes, Kocher avait perfectionné l'ablation du tissu thyroïdien excédentaire en cas de goitre, au point de pouvoir retirer l'organe entier sans que la personne concernée ne meure des suites de l'opération. Dans certains cas, Kocher a procédé à l'ablation totale de l'organe pour éviter une récidive de goitre. Au cours des années suivantes, Kocher et d'autres chirurgiens ont également utilisé la transplantation de la thyroïde pour traiter une déficience thyroïdienne apparue spontanément, sans ablation préalable de l'organe. La transplantation de la thyroïde est devenue le modèle d'une toute nouvelle stratégie thérapeutique : la transplantation d'organes." #NT!
 panum.2415.g: "Et les gens pensaient que Frankenstein était un roman d’horreur !" #NT!
 panum.2416.t: "Méthode stéréotaxique" #NT!
 panum.2416.d: "Le génie chirurgical du Dr [ROOT.Var('curie_physicist_var').GetCharacter.GetLastName] ne connaît pas de limites : le médecin a révolutionné la neurochirurgie avec une nouvelle opération du cerveau." #NT!
 panum.2416.f: "La chirurgie cérébrale stéréotaxique désigne les procédures de neurochirurgie et de radiothérapie mini-invasives au cours desquelles la tête du patient et les instruments médicaux sont fixés dans un cadre vissé de manière étanche afin d'obtenir une précision maximale. Pour la première fois au cours des dernières années du XIXe siècle, des opérations isolées ont été réalisées sur le cerveau exposé à l'aide d'une procédure déjà connue à l'époque sous le nom de stéréotaxie. Au cours de l'intervention, le corps du patient et surtout la tête étaient solidement fixés dans un système de cadre fiable et rigide. À cette époque, les possibilités de tester les possibilités dans le cadre de la recherche et de la chirurgie psychiatrique étaient encore très limitées et simples. Au cours des décennies suivantes, les outils et la méthodologie ont été affinés." #NT!
 panum.2416.g: "Brillant!" #NT!
 panum.2417.t: "Pontage cardio-pulmonaire" #NT!
 panum.2417.d: "Avec la mise au point du pontage cardiopulmonaire, le docteur Hasenbein a réalisé un chef-d'œuvre de la médecine moderne. Il ne faudra pas longtemps avant que les gens puissent subir une opération cardiaque sans problème." #NT!
 panum.2417.f: "Lors d'une circulation extracorporelle, le sang quitte le corps via un système de canules et de tubes, est enrichi en oxygène et renvoyé à nouveau par pompage. C'est ce qu'on appelle la circulation extracorporelle. Le sang passe généralement par la veine cave ou l'oreillette droite ainsi que par les cavités cardiaques et les artères coronaires ouvertes dans la zone chirurgicale et, après filtrage, enrichissement en oxygène et élimination du dioxyde de carbone ainsi que réchauffement et filtrage supplémentaire, revient par l'artère principale ou une artère fémorale. Le physiologiste français Le Gallois a publié l'idée de la circulation extracorporelle en 1812. En 1885, Maximilian von Frey et son collègue Max von Gruber de l'Université de Leipzig ont construit le précurseur des machines cœur-poumons actuelles avec un oxygénateur à film avec une pompe à piston pour la première utilisation de la circulation sanguine dans un système extracorporel fermé." #NT!
 panum.2417.g: "C’est la naissance de la chirurgie cardiaque moderne !" #NT!
 panum.2418.t: "Endoscope" #NT!
 panum.2418.d: "Une nouvelle invention du Dr [ROOT.Var('curie_physicist_var').GetCharacter.GetLastName] pourrait fournir des services d’examen médical inestimables : elle peut être utilisée pour visualiser l’intérieur du corps !" #NT!
 panum.2418.f: "Un endoscope est un appareil qui peut être utilisé pour examiner et manipuler l'intérieur des organismes ou des cavités techniques. L'utilisation de l'endoscope, connue sous le nom d'endoscopie, a été développée à l'origine pour le diagnostic médical humain. Après l'invention de Thomas Edison, l'utilisation de la lumière électrique a été une étape majeure dans l'amélioration de l'endoscope. Les premières lumières de ce type étaient externes, mais suffisamment capables d'éclairer pour permettre la cystoscopie, l'hystéroscopie et la sigmoïdoscopie ainsi que l'examen des cavités nasales (et plus tard thoraciques) comme cela était effectué systématiquement sur des patients humains par Sir Francis Cruise (en utilisant son propre endoscope disponible dans le commerce) en 1865 à l'hôpital Mater Misericordiae de Dublin, en Irlande." #NT!
 panum.2418.g: "Un dispositif médical utile." #NT!
 panum.2419.t: "Ophtalmoscope" #NT!
 panum.2419.d: "Le Dr [ROOT.Var('curie_physicist_var').GetCharacter.GetLastName] a inventé un appareil qui facilite l’examen des maladies oculaires et a ainsi rendu un service inestimable à l’ophtalmologie." #NT!
 panum.2419.f: "L'ophtalmoscopie ou fond d'œil est l'examen des parties visibles de l'œil effectué à l'aide d'un ophtalmoscope. Il permet notamment d'examiner la rétine et les vaisseaux sanguins qui l'alimentent. L'ophtalmoscope, inventé en 1850, a été décrit pour la première fois par son inventeur Hermann von Helmholtz au début du mois d'octobre 1851. L'ophtalmoscope permet de détecter les maladies du nerf optique, de la rétine, de la choroïde et du corps vitré. C'est ainsi que débute l'histoire de l'ophtalmologie en tant que discipline médicale et scientifique indépendante. Par la suite, l'ophtalmoscope a pris une importance croissante pour le diagnostic des maladies internes." #NT!
 panum.2419.g: "Un dispositif médical intéressant." #NT!
 panum.2420.t: "Chimiothérapie" #NT!
 panum.2420.d: "Une nouvelle procédure médicale que le Dr [ROOT.Var('curie_physicist_var').GetCharacter.GetLastName] teste actuellement pourrait offrir une lueur d'espoir à de nombreuses personnes malades - même le cancer ne serait pas guérissable, mais au moins partiellement traitable." #NT!
 panum.2420.f: "La chimiothérapie est un traitement médicamenteux contre le cancer ou les infections. Paul Ehrlich a utilisé le terme chimiothérapie pour décrire le traitement des maladies infectieuses à l'aide de substances chimiques qui agissent directement contre l'agent pathogène. En 1904, il a découvert le rouge trypan comme premier médicament de chimiothérapie efficace, qu'il a utilisé pour guérir des souris atteintes de la maladie du sommeil. Le 31 août 1909, Ehrlich a commencé d'autres expériences à Francfort-sur-le-Main en injectant des agents pathogènes de la syphilis à des rats, puis en les traitant à l'aide de procédures de chimiothérapie. Ces expériences ont eu un tel effet convaincant qu'elles ont été considérées comme la nouvelle « arme » de la médecine contre les maladies infectieuses. Ehrlich a ensuite été qualifié de « créateur de la chimiothérapie ». Les médicaments utilisés sont fabriqués artificiellement ou sont des dérivés de substances naturelles." #NT!
 panum.2420.g: "Cela pourrait-il être une réponse à la souffrance des patients atteints de cancer ?" #NT!
  
 panum.2100.t: "Recrutement de médecins" #NT!
 panum.2100.d: "L'un des médecins les plus prometteurs de l'hôpital général est [SCOPE.sCharacter('panum_new_physician_scope').GetFullName]. [SCOPE.sCharacter('panum_new_physician_scope').GetSheHe|U] serait un excellent candidat pour devenir le nouveau médecin-chef. La spécialité [SCOPE.sCharacter('panum_new_physician_scope').GetHerHis|U] est..." #NT!
 panum.2100.f: "$concept_panum_physician_desc$\n\nLe #V nouveau#! Médecin, [SCOPE.sCharacter('panum_new_physician_scope').GetFullName], est un #tooltip:[SCOPE.sCharacter('panum_new_physician_scope').GetTooltipTag],panum_physician_rating_tt_loc [SCOPE.sCharacter('panum_new_physician_scope').GetCustom('panum_physician_rating_new_physician_icon_text_type')]#! Médecin.[GetPlayer.GetCustom('panum_physician_rating_display_existing_physician_type')]" #NT!
 panum.2100.g: "Épidémiologie." #NT!
 panum.2100.h: "Chirurgie." #NT!
 panum.2100.i: "Psychiatrie." #NT!
 panum.2100.j: "Médecine militaire." #NT!
  
 panum_cholera_condition: "Choléra" #NT!
 panum_cholera_condition_desc: "Le choléra est une maladie dangereuse de l'intestin grêle. Elle est considérée comme l'une des épidémies majeures du XIXe siècle, ayant fait des millions de morts dans le monde." #NT!
 panum_tuberculosis_condition: "Tuberculose" #NT!
 panum_tuberculosis_condition_desc: "La tuberculose est considérée, avec le choléra, comme l'une des causes de décès les plus courantes à l'époque victorienne. Également connue sous le nom de tuberculose, elle affecte principalement les poumons." #NT!
 panum_smallpox_condition: "Variole" #NT!
 panum_smallpox_condition_desc: "Connue pour ses pustules, qui défigurent le visage et le corps, la variole a longtemps été l’une des maladies les plus mortelles de l’histoire." #NT!
 panum_typhus_condition: "Typhus" #NT!
 panum_typhus_condition_desc: "Le typhus a terrorisé les soldats au cours des siècles, notamment lors des guerres napoléoniennes, où il a tué des milliers de militaires. Il a fait rage à maintes reprises après des catastrophes naturelles" #NT!
 panum_yellow_fever_condition: "Fièvre jaune" #NT!
 panum_yellow_fever_condition_desc: "La fièvre jaune touche principalement les régions tropicales d'Amérique du Sud et d'Afrique. Dans les Caraïbes, la maladie a fait plus de victimes parmi les soldats en poste que n'importe quelle guerre." #NT!
 panum_measles_condition: "Rougeole" #NT!
 panum_measles_condition_desc: "La rougeole est une maladie extrêmement contagieuse caractérisée par des plaques rouges sur la peau. Elle peut avoir des conséquences catastrophiques, en particulier dans les populations qui n'étaient pas immunisées auparavant." #NT!
 panum_scarlet_condition: "Scarlatine" #NT!
 panum_scarlet_condition_desc: "La scarlatine est une maladie très répandue qui était l’une des causes de décès les plus courantes chez les enfants jusqu’au début du XXe siècle." #NT!
 panum_plague_condition: "Peste" #NT!
 panum_plague_condition_desc: "La peste bubonique est comparée à la « peste noire » du Moyen-Âge, l'une des pires catastrophes de l'histoire. Son nom vient des boutons gonflés et douloureux qu'elle provoque." #NT!
 panum_diphteria_condition: "Diphtérie" #NT!
 panum_diphteria_condition_desc: "La diphtérie est une maladie dangereuse qui peut entraîner des complications potentiellement mortelles et des conséquences à long terme." #NT!
 panum_polio_condition: "Polio" #NT!
 panum_polio_condition_desc: "La poliomyélite est une maladie qui touche principalement les enfants, entraînant souvent la mort ou des complications physiques à vie." #NT!
  
