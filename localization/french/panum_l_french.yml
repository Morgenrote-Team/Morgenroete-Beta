 je_panum_medical_system_project_success_3: "Tous les [GetPlayer.GetAdjective] [GetBuildingType('building_government_administration').GetName] qui sont #R de niveau 4 ou inférieur#! ont une #V Méthode de production sans clinique#!." #NT!
  
 panum.1001.t: "Une nouvelle épidémie" #NT!
 panum.1001.d: "La poliomyélite est une maladie connue sous de nombreux noms différents au XIXe siècle. Il est choquant de constater que de plus en plus de cas de polio se terminent par des paralysies et la mort. Ce qui était auparavant une maladie qui ne se produisait que dans des cas isolés semble maintenant survenir régulièrement. La polio est désormais une maladie épidémique." #NT!
 panum.1001.g: "Des nouvelles inquiétantes." #NT!
 panum.1002.d: "Plusieurs journaux rapportent de manière indépendante qu'une grave épidémie de polio sévit actuellement en [SCOPE.sState('panum_disease_country').GetName]. La maladie, qui ne se manifestait auparavant que par des cas isolés, semble être devenue une épidémie !" #NT!
 panum.1003.t: "Une épidémie violente" #NT!
 panum.1003.d: "L'épidémie de polio en [SCOPE.sState('panum_disease_state').GetName] s'est révélée particulièrement grave. Le nombre de décès augmente chaque jour." #NT!
 panum.1003.f: "« Le matin du troisième jour de mon hospitalisation, le 1er ou le 2 septembre, j'ai pris des céréales, du jus de fruit et du lait au chocolat au petit déjeuner. Je me souviens avoir essayé de ramasser le lait au chocolat et il m'est tombé entre les mains. Je me sentais tellement mal parce que je ne pouvais plus bouger. Les infirmières se sont précipitées pour nettoyer le désordre. Je me souviens que je voulais du lait au chocolat, mais je ne l'ai pas eu. À la place, elles m'ont apporté une paille et j'ai bu du jus de fruit. Après cela, des médecins sont venus dans ma chambre et m'ont fait compter à rebours, 10-9-8-7-6, aussi longtemps que je me souvienne. J'étais allongée à ce moment-là parce que j'avais du mal à m'asseoir. »\n\nMarilynne R., survivante de la polio" #NT!
 panum.1003.g: "N'y a-t-il pas de remède ?" #NT!
 panum.1004.t: "Une génération brisée" #NT!
 panum.1004.d: "Plus l’épidémie du [SCOPE.sState('panum_disease_state').GetName] dure, plus cela devient évident : il y aura une génération entière qui devra vivre avec des mutilations et des paralysies." #NT!
 panum.1004.f: "« Je me souviens très bien du jour où j'ai reçu le diagnostic de polio. Ce matin-là, j'étais en cours d'éducation physique à l'école et nous étions sur le terrain de football. J'ai remarqué que pendant que je courais, ma jambe s'affaiblissait ou s'effondrait sous moi. Je n'y ai pas vraiment prêté attention, mais plus tard dans la journée, je jouais avec la fanfare du lycée lors d'un défilé de charité pour la polio à Hibbing, à environ 50 kilomètres de Coleraine, où j'ai grandi. Pendant le défilé, mes jambes se sont à nouveau affaiblies. En fait, elles étaient si faibles que j'ai dû quitter la ligne de marche et je suis retourné au bus scolaire pour m'allonger. »\n\nDavid K., survivant de la polio" #NT!
 panum.1004.g: "Cet effet durera longtemps..." #NT!
 panum.1005.t: "Survivants de la polio" #NT!
 panum.1005.d: "On dit que ceux qui survivent à cette épidémie nourrissent en eux une profonde colère. C'est une forme de revanche contre la maladie qui a tant ravagé ces personnes. De plus en plus d'associations de survivants de la polio se forment dans notre pays." #NT!
 panum.1005.f: "« Être différent est très difficile au lycée. J'ai fini par ne pas participer à beaucoup d'activités auxquelles j'aurais probablement participé si je n'avais pas eu de handicap. J'aurais aimé faire une audition pour devenir cheerleader, mais les gens se moquaient de moi juste parce que j'en parlais. J'ai donc fini par garder beaucoup de sentiments en moi. Je ne voulais pas aller à un bal parce que j'étais gênée par ma boiterie. Je ne voulais pas que les gens me regardent pendant que je marchais sur la piste de danse. Je détestais que les gens me regardent bouche bée et se moquent de moi. Je pense que tous les adolescents sont gênés, mais quand on a un handicap physique, cela amplifie vraiment cette gêne. Aujourd'hui encore, je déteste que les gens fixent ma jambe quand je porte un short. »\n\nGail B., survivante de la polio" #NT!
 panum.1005.g: "La société civile se mobilise contre la polio." #NT!
 panum.1006.t: "Un homme politique crée la Fondation contre la polio" #NT!
 panum.1006.d: "Face à l'épidémie de polio, aux parents en deuil, aux mutilés et aux morts, [SCOPE.sCharacter('panum_opposition_leader').GetFullName] a eu l'idée de créer une fondation pour lutter contre la maladie. Ses détracteurs affirment qu'il ne cherche qu'à redorer son blason politique." #NT!
 panum.1006.f: "Le président américain Franklin D. Roosevelt séjournait régulièrement dans les thermes de Warm Springs depuis 1924 et y est décédé en 1945. En 1921, il souffrit d'une paralysie des jambes, considérée comme une polio vertébrale ; selon des recherches plus récentes, il s'agirait du syndrome de Guillain-Barré, encore peu connu à l'époque. Roosevelt fonda en 1927 la Georgia Warm Springs Foundation, dont la mission première était initialement le traitement de la paralysie vertébrale. Aujourd'hui, l'établissement s'appelle Roosevelt Warm Springs Institute for Rehabilitation et prend en charge des patients souffrant de tous types de handicaps dans vingt-six services différents." #NT!
 panum.1006.g: "Un vrai philanthrope." #NT!
 panum.1006.h: "Et les prochaines élections sont une pure coïncidence, je suppose ?" #NT!
 panum.1007.t: "Dépression liée à la polio" #NT!
 panum.1007.d: "Les nombreux enfants mutilés à vie ont non seulement un impact sur la santé physique de la génération suivante, mais aussi sur celle des parents, qui accusent le gouvernement de ne pas en faire assez." #NT!
 panum.1007.f: "« Je me souviens très bien du premier jour où j'ai porté le corset à l'école. C'était au milieu de la journée d'école. Apparemment, j'étais allé chez le médecin ce matin-là pour me faire poser le corset. Ma mère m'a déposé à la porte et je me souviens qu'elle avait les larmes aux yeux quand je suis parti. »\n\nEdmund Sass, survivant de la polio" #NT!
 panum.1007.g: "Irrationnel, mais pas incompréhensible." #NT!
 panum.1008.t: "Clinique de polio" #NT!
 panum.1008.d: "Sœur [SCOPE.sCharacter('panum_polio_nurse').GetFirstName] a fondé une clinique de polio à [SCOPE.sState('panum_disease_state').GetName] pour pouvoir soigner les nombreux patients qui s’y trouvaient." #NT!
 panum.1008.f: "« C'était une femme très grande et élégante, et elle inspirait confiance par ses manières et sa façon de se tenir. Elle avait un accent charmant qui en faisait une personne intéressante à écouter. Si je ferme les yeux, je peux encore la visualiser debout à côté de mon lit, portant une longue robe noire et un grand chapeau avec une belle plume d'autruche... Elle ne portait pas de bijoux et ne portait pas de maquillage. Je me souviens de son visage fort et anguleux, et de ses yeux très intenses. Lorsqu'elle vous regardait dans les yeux, cette intensité exigeait toute votre attention, et lorsqu'elle parlait, les gens l'écoutaient... Tout le monde savait qui était responsable, et nous recevions le traitement qu'elle recommandait. Je n'ai jamais connu quelqu'un d'aussi sûr de lui qu'elle. »\n\nRay G., survivant de la polio" #NT!
 panum.1008.g: "Merci, sœur [SCOPE.sCharacter('panum_polio_nurse').GetFirstName]." #NT!
 panum.1009.t: "Panique publique" #NT!
 panum.1009.d: "Malgré tous les efforts déployés par le gouvernement local de [SCOPE.sState('panum_disease_state').GetName], la population a commencé à succomber à l’un des aspects les plus dangereux de toute épidémie : la panique." #NT!
 panum.1009.f: "Le samedi 17 juin 1916, une annonce officielle de l'existence d'une épidémie de polio fut faite à Brooklyn, New York. Cette année-là, on dénombra 27 363 cas et 7 130 décès dus à la polio aux États-Unis, dont plus de 2 000 dans la seule ville de New York. L'épidémie de 1916 provoqua une panique générale et des milliers de personnes quittèrent la ville pour se réfugier dans les stations de montagne voisines. Les cinémas furent fermés, les réunions annulées, les rassemblements publics quasi inexistants, et les enfants furent avertis de ne pas boire l'eau des fontaines et d'éviter les parcs d'attractions, les piscines et les plages." #NT!
 panum.1009.g: "Quelle peur maudite !" #NT!
 panum.1010.t: "Quarantaine" #NT!
 panum.1010.d: "Bien qu’il ne soit pas certain que la polio soit une maladie contagieuse, de plus en plus de voix s’élèvent au Venezuela pour demander l’instauration d’une quarantaine afin d’éviter sa propagation." #NT!
 panum.1010.f: "La maladie s’est déclarée sans prévenir et a nécessité de longues périodes de quarantaine pendant lesquelles les parents étaient séparés de leurs enfants : il était impossible de savoir qui allait contracter la maladie et qui serait épargné. Les noms et adresses des personnes dont le cas de polio était confirmé étaient publiés quotidiennement dans la presse, leurs maisons étaient identifiées par des pancartes et leurs familles étaient mises en quarantaine." #NT!
 panum.1010.g: "Cela causera plus de mal que de bien." #NT!
 panum.1010.h: "Appliquer un ordre de quarantaine strict." #NT!
  
 panum.1020.t: "Fin de l'épidémie de polio" #NT!
 panum.1020.d: "Les cliniques de [SCOPE.sState('panum_disease_state').GetName] signalent une diminution sensible des cas de polio. Les conséquences de l'épidémie continueront de préoccuper la région pendant des années encore." #NT!
 panum.1020.f: "« Je ne suis pas malade. Je suis brisée. Mais je suis heureuse d'être en vie tant que je peux peindre. » - Frida Kahlo" #NT!
  
 panum.1022.t: "Le début de la poliomyélite" #NT!
 panum.1022.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a envoyé aujourd’hui un bref résumé des symptômes qui apparaissent lors d’une épidémie de poliomyélite précoce." #NT!
 panum.1022.f: "« Les enfants en bonne santé et en bonne santé, âgés de 6 à 36 mois, et exceptionnellement un peu plus âgés, tombent malades après avoir joui jusque-là d'une santé sans problème, avec ou sans signes antérieurs de malaise, tels que : roulement des yeux, soudain sous les manifestations de la chaleur, états congestifs et irritatifs, fièvre, soif, mauvaise humeur, pleurs, somnolence sans sommeil réel, ainsi que parfois les symptômes d'une évolution perturbée de processus pathologiques aigus et exanthématiques. Peu de temps après, des convulsions plus ou moins graves éclatent, qui se répètent à des intervalles plus ou moins longs.\n\nDans d'autres cas, la maladie apparaît soudainement sans les symptômes mentionnés, avec des convulsions ou des nausées, un affaissement du corps, de l'écume à la bouche et au nez, une coloration bleue, etc.\n\nParfois, cependant, tous ces symptômes sont absents ou ne sont présents qu'à un degré très léger, et la paralysie s'installe lentement et inaperçue. »" #NT!
  
 panum.1040.t: "Contributions à la connaissance de la maladie de Heine-Medin" #NT!
 panum.1040.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a présenté aujourd’hui à la Faculté de médecine un article révolutionnaire qui servira de point de départ pour maîtriser les épidémies de polio et améliorer le traitement des survivants de la polio." #NT!
 panum.1040.f: "Dans le [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] « Contributions à la connaissance de la maladie de Heine-Medin », le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a mentionné plusieurs aspects qui devraient aider à prévenir et à propager la poliomyélite. L'un des points clés est que la polio est une maladie infectieuse. Outre les mesures qui en découlent, il existe également une variété de méthodes pour aider les patients. Les régimes riches en protéines, les programmes de physiothérapie et les nouvelles inventions comme le poumon d'acier donnent un nouvel espoir que la polio ne soit pas éradiquée, mais qu'elle puisse être mieux gérée à l'avenir." #NT!
 panum.1040.g: "Nous avons besoin d’un Temple de la renommée de la polio." #NT!
  
 panum.1041.t: "Physiothérapie" #NT!
 panum.1041.d: "Le médecin rencontre une infirmière qui bouleverse ses connaissances antérieures sur le traitement de la polio." #NT!
 panum.1041.f: "« Et depuis combien de temps faites-vous cela maintenant ? »\n« Dix ans, docteur. »\n« Vous mettez des coussins chauffants sous les patients ? »\n« Oui, docteur. »\n« Et vous dites que cela a aidé ? »\n« Votre scepticisme ne peut pas occulter le succès. Il ne s'agit pas seulement du coussin chauffant. Des massages et des exercices de relaxation sont nécessaires. Un muscle qui est attelé ne se développe plus. Il a besoin d'exercice. »\n« Hmm... »" #NT!
 panum.1041.g: "Mais... les patients atteints de polio ont besoin de repos et de stabilisation !" #NT!
 panum.1042.t: "La rue" #NT!
 panum.1042.d: "Lors de l’inspection de la zone d’épidémie de polio, le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] procède de manière systématique." #NT!
 panum.1042.f: "« Si l'on suit la propagation de la poliomyélite qui sévit à [SCOPE.sState('panum_disease_state').GetCityHubName], on ne peut manquer une découverte intéressante. Les chutes sont enfilées les unes aux autres comme un collier de perles. On peut suivre une route et voir les cas côte à côte. J'ai pu retracer l'apparition chronologique sur une ligne de chemin de fer de la région. Ce n'est pas une coïncidence. »\n\nExtrait du journal du Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.1042.g: "Mais cette preuve est-elle suffisante pour conclure à une infection ?" #NT!
 panum.1043.t: "La Paroisse" #NT!
 panum.1043.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a visité une communauté isolée dans la zone touchée par la peste pour approfondir ses recherches sur les causes de la polio." #NT!
 panum.1043.f: "« 49 cas dans cette communauté ? »\n« En tant que maire, je regrette de devoir dire cela, docteur. »\n« Lorsque vous avez dressé la carte des endroits où ces cas se sont produits dans la paroisse, avez-vous remarqué quelque chose ? »\n« Avec tout le respect que je vous dois, je ne suis pas un scientifique. »\n« Les maladies se sont propagées à partir d'un seul point. C'est l'école du village. »" #NT!
 panum.1043.g: "La polio n’est-elle pas une maladie héréditaire mais contagieuse ?" #NT!
 panum.1044.t: "Philanthropie" #NT!
 panum.1044.d: "Des survivants de la polio se sont adressés au Docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]. Vous souhaitez soutenir les travaux scientifiques liés à la recherche sur la polio par le biais d'une fondation." #NT!
 panum.1044.f: "Au début du XXe siècle, la polio était une maladie qui alarmait une grande partie de la société car son origine était inconnue et même les classes moyennes ou aisées pouvaient être touchées. Certains survivants de la polio devenus riches ont également fait campagne contre la maladie tout au long de leur vie et ont soutenu des initiatives privées et gouvernementales. La philanthropie a joué un rôle majeur dans la lutte contre la polio." #NT!
 panum.1044.g: "Un soutien précieux." #NT!
 panum.1044.h: "L’argent devrait être consacré de manière égale à la recherche sur les vaccins." #NT!
 panum.1044.i: "L’argent de la fondation bénéficierait également à la recherche générale." #NT!
 panum.1045.t: "Antibiotiques" #NT!
 panum.1045.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a obtenu de bons résultats dans le traitement de la polio en utilisant des antibiotiques." #NT!
 panum.1045.f: "« Il n'existe pas de remède contre la polio. Et malheureusement, je ne vois pas comment cela sera possible à l'avenir. Il ne peut y avoir que la prévention, la recherche sur les causes et la prévention de la propagation - et le traitement pour soulager les symptômes. Les antibiotiques peuvent aider à protéger les muscles affaiblis contre les infections. C'est un pas dans la bonne direction. Espérons que d'autres suivront. »\n\nExtrait du journal du Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.1045.g: "Vive les antibiotiques !" #NT!
 panum.1046.t: "Ostracisme social" #NT!
 panum.1046.d: "Dans un document de réforme, le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a fait remarquer à ses collègues universitaires que la réinsertion des survivants de la polio ne se limite pas à guérir, traiter ou atténuer la maladie. La stigmatisation sociale des individus doit être réduite – et éliminée." #NT!
 panum.1046.f: "« Je me souviens que le plus grand défi pour moi était de monter dans le bus scolaire. La première marche pour monter dans le bus m'a semblé longue d'un kilomètre et je n'y arrivais pas. Pendant un moment, ma mère est sortie et j'étais très gênée parce qu'elle sortait ce tabouret. Mais je ne pouvais pas supporter cette gêne, alors mon père et le chauffeur du bus (il s'appelait Bill et je me souviens très bien de lui) se sont réunis et ont discuté de la façon dont ils pourraient résoudre ce problème. Mon père s'est rendu à l'endroit où le bus s'arrêtait et a creusé une tranchée dans la terre. Bill enfonçait la roue avant du bus dans cette tranchée, ce qui abaissait la marche jusqu'à ce qu'elle soit vraiment proche du sol. Ensuite, je pouvais monter dans le bus sans problème. Et personne ne l'a vraiment remarqué... »\n\nJennifer W., survivante de la polio" #NT!
 panum.1046.g: "Les survivants de la polio ne sont pas des citoyens de seconde classe." #NT!
 panum.1047.t: "Le prix du progrès" #NT!
 panum.1047.d: "Dans son enquête sur les causes des épidémies de polio qui se produisent depuis des années, le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] est arrivé à une vérité désagréable." #NT!
 panum.1047.f: "« La polio est connue depuis l'Antiquité, mais, d'après mes recherches, jusqu'à la fin du XIXe siècle, elle n'était pas une maladie épidémique comme aujourd'hui. La raison en est paradoxale : l'amélioration des soins de santé. Avant l'introduction des égouts et de l'assainissement, les enfants étaient exposés à la polio beaucoup plus tôt, entre 6 mois et 4 ans. À cette époque, la maladie est plus bénigne et confère une immunité. Plus une personne infectée par la polio est âgée, plus elle risque de souffrir de paralysie. L'amélioration des normes sanitaires a fait que moins de personnes ont développé une immunité et sont plus vulnérables aux conséquences dangereuses de la maladie. »\n\nExtrait du journal du Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.1047.g: "La maladie se propage parce que la santé publique s’est améliorée ?" #NT!
 panum.1048.t: "Bacille ou virus ?" #NT!
 panum.1048.d: "On ne sait encore rien de l'agent causal de la poliomyélite. C'est pourquoi le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] se retrouve dans une vive dispute avec ses collègues." #NT!
 panum.1048.f: "Bien que la poliomyélite soit connue depuis longtemps et qu’avec le développement de la microbiologie, il soit devenu évident qu’il s’agissait d’un agent pathogène, les croyances ont continué à diverger pendant longtemps quant à savoir s’il s’agissait de bactéries ou de virus de la polio." #NT!
 panum.1048.g: "Tout porte à croire qu'il s'agit d'un virus." #NT!
 panum.1048.h: "Ce bavardage inutile distrait le médecin de son travail !" #NT!
 panum.1049.t: "Acceptation des fauteuils roulants" #NT!
 panum.1049.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a constaté qu'il n'est pas seulement important de fournir des fauteuils roulants aux patients : ils doivent également être acceptés socialement afin que les survivants de la polio puissent facilement réintégrer une vie normale." #NT!
 panum.1049.f: "« J'étais vraiment naïf à l'idée d'aller à l'université et j'ai été surpris de découvrir que l'université n'était pas accessible aux personnes en fauteuil roulant. Mais c'était comme ça à l'époque. Il y avait des marches partout et ce n'était pas comme au lycée où j'avais un groupe d'amis pour me porter... Souvent, j'ai dû trouver un groupe de bénévoles ou simplement recruter des gens alors qu'ils se précipitaient d'une classe à l'autre et parfois ils me disaient : "Je n'ai tout simplement pas le temps. Je ne peux pas vous aider". J'ai dû vivre dans un appartement hors campus car aucun des dortoirs n'était accessible. »\n\n David K., survivant de la polio" #NT!
 panum.1049.g: "Nous soutenons une campagne pour une meilleure acceptation des fauteuils roulants." #NT!
 panum.1049.h: "Financer un programme visant à ajouter des rampes accessibles aux fauteuils roulants aux bâtiments publics." #NT!
  
 panum.1051.t: "Conseils sur la polio" #NT!
 panum.1051.d: "Une recommandation d'action sur la polio circule actuellement dans le monde académique et donne au docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] toutes les peines du monde à faire respecter ses propres thèses sur le traitement de la polio." #NT!
 panum.1051.f: "'Administrer de l'oxygène par les extrémités inférieures, par électricité positive. Bains fréquents à base de farine d'amandes ou d'eau oxydante. Applications de cataplasmes de camomille romaine, d'orme rouge, d'arnica, de moutarde, de cantharis, d'huile d'amygdale dulcis et, plus particulièrement, d'huile de nard et de xanthoxolinum. Utiliser en interne de la caféine, du Fl. Kola, du muriate sec de quinine, de l'élixir de quinquina, de l'eau de radium, du chlorure d'or, de la liqueur de calcis et du vin de pepsine.'\n\nDr. Angelika Hasenbein, 'Une monographie sur l'épidémie de poliomyélite (paralysie infantile)'" #NT!
 panum.1051.g: "En fait, cela semble très convaincant." #NT!
 panum.1052.t: "Plâtres et appareils orthodontiques" #NT!
 panum.1052.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a appris de plusieurs « experts en polio » que les attelles de jambe sont le meilleur moyen d’améliorer la situation initiale des patients – mais [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] n’est pas convaincu." #NT!
 panum.1052.f: "Les patients souffrant de paralysie résiduelle étaient traités avec des appareils orthopédiques et on leur apprenait à compenser la perte de fonction à l'aide d'étriers, de béquilles et de fauteuils roulants. L'utilisation d'appareils tels que des appareils orthopédiques rigides et des plâtres corporels, qui tendaient à provoquer une atrophie musculaire en raison de la limitation des mouvements de l'utilisateur, était également présentée comme un traitement efficace. La plupart de ces traitements se sont révélés peu efficaces sur le plan thérapeutique." #NT!
 panum.1052.g: "Peut-être que ça aide...?" #NT!
 panum.1053.t: "Chirurgie inutile" #NT!
 panum.1053.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a été assuré par les chirurgiens que les interventions chirurgicales ont un effet positif sur la polio." #NT!
 panum.1053.f: "« J'ai passé d'innombrables heures à interviewer des collègues, à étudier des livres et à examiner des patients pour me convaincre du succès des interventions chirurgicales contre la polio. Les médecins sont très fiers de leurs résultats. La façon dont ils traitent les mutilations rappelle celle des mécaniciens de précision qui croient qu'ils installent un mécanisme d'horlogerie. Ils utilisent des outils de précision pour travailler sur des machines humaines. Mais j'ai l'impression que l'accent n'est pas mis ici sur la maladie, ni sur le patient, mais sur la réputation des médecins. Jusqu'à présent, je n'ai connaissance d'aucun cas dans lequel cette méthode a réellement conduit à un traitement réussi de la polio. »\n\nExtrait du journal du Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.1053.g: "Une fausse piste." #NT!
 panum.1054.t: "Sérum de convalescence" #NT!
 panum.1054.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a testé un sérum très apprécié, considéré comme un remède efficace dans la médecine actuelle contre la polio. Bien que ses collègues [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] soient convaincus de la méthode, le docteur estime que c'est une perte de temps." #NT!
 panum.1054.f: "« À l'époque, on pensait qu'il s'agissait d'une maladie infectieuse. On m'a donc administré un sérum de convalescent, fabriqué à partir du sang de personnes guéries de la polio. Ce type de traitement était à la mode à l'époque. Il semble peu probable qu'il ait eu un quelconque effet, car la maladie a évolué vers une paralysie assez prononcée, sans aucun mouvement des jambes ni des muscles abdominaux. On m'a mis en isolement et je pense qu'on m'a dit que j'avais la poliomyélite. Cependant, je ne savais pas ce qu'était la poliomyélite. Personne ne m'a dit que j'avais une paralysie infantile, ce que j'aurais reconnu parce que Roosevelt était président à l'époque et je savais qu'il avait souffert d'une paralysie importante due à la maladie. »\n\nRichard O., survivant de la polio" #NT!
 panum.1054.g: "Mais tous les médecins le prescrivent ?" #NT!
 panum.1055.t: "Isolement" #NT!
 panum.1055.d: "Certains spécialistes de la polio estiment qu'il est conseillé, en plus de la contention des membres, d'isoler complètement les patients. Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a lui-même mené de telles expériences et est arrivé à la conclusion qu'il s'agissait d'une thérapie inefficace et inhumaine." #NT!
 panum.1055.f: "« Après la ponction lombaire et le diagnostic de polio, on m'a immédiatement placée en isolement et on m'a dit de ne pas lever la tête. Je me souviens qu'on m'a mise dans un berceau ! J'avais neuf ans et je ne comprenais pas pourquoi on m'avait mise dans un berceau. C'était très dégradant. Je n'allais certainement pas sortir du lit, ni me retourner et tomber. En fait, je pouvais à peine bouger. Alors que j'étais allongée dans ce berceau, j'ai senti le virus s'installer. C'était comme si une porte se refermait. J'avais l'impression que mon monde avait complètement changé. Pour couronner le tout, il faisait terriblement chaud et humide, et bien sûr, c'était avant l'arrivée de la climatisation ; je me souviens m'être sentie très mal à l'aise... »\n\nSharon K., survivante de la polio" #NT!
 panum.1055.g: "C'est inacceptable !" #NT!
 panum.1055.h: "Cela pourrait être le début d’une deuxième carrière." #NT!
 panum.1055.i: "Que ces enregistrements disparaissent rapidement." #NT!
 panum.1056.t: "Syndrome post-polio" #NT!
 panum.1056.d: "Lors d'un examen récent, le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a découvert qu'après l'infection par la polio, y compris ses effets, il peut y avoir des séquelles sous la forme du syndrome post-polio. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] est complètement désespéré par cette évolution." #NT!
 panum.1056.f: "« Quand j’avais 35 ou 40 ans, j’ai commencé à ressentir de terribles douleurs dans les articulations et les muscles. Je me fatiguais très vite. Je suis allée chez le médecin et j’ai passé des radios et des analyses de sang. J’ai pris des médicaments et suivi une thérapie physique. Rien n’a aidé. » En attendant qu’on me trouve les dossiers médicaux, j’ai expliqué à la personne qui m’aidait que je ressentais toutes ces nouvelles douleurs et que j’espérais que les dossiers pourraient m’aider à comprendre pourquoi. Elle m’a demandé si j’avais entendu parler du syndrome post-polio. J’ai répondu : « Non, qu’est-ce que c’est ? » Elle m’a expliqué qu’environ 30 ou 40 ans après avoir eu la polio, c’est comme si on la contractait à nouveau. » Penser à devoir à nouveau affronter la polio était au-delà de mes forces. Je me suis effondrée. J’ai appelé ma belle-sœur et je lui ai raconté ce que j’avais découvert. J’ai aussi parlé à ma famille. J’ai beaucoup pleuré. J’ai montré mes dossiers médicaux à mes médecins locaux et je leur ai expliqué mon rendez-vous à l’Institut Sister Kenny. Ils m'ont répété que la polio était une chose du passé. J'ai répondu : « Oui, mais je suis là maintenant et je la revis ! »\n\nJanice G., survivante de la polio" #NT!
 panum.1056.g: "Quelle situation désespérée." #NT!
  
 panum.1061.t: "Expériences" #NT!
 panum.1061.d: "Dans une expérience douteuse mais non moins réussie, le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a infecté des singes avec la polio." #NT!
 panum.1061.f: "« J'ai récemment lu un article sur un procédé utilisé par Jean-Antoine Villemin pour prouver la contagiosité de la tuberculose. Il a mené des expériences sur des lapins en les mettant délibérément en contact avec les tissus de tuberculeux. Des dizaines de canidés morts plus tard, il a pu prouver sa thèse. Mon expérience sur des singes repose sur une hypothèse similaire. »\n\nExtrait du journal du Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.1061.g: "Si les animaux peuvent être infectés, les humains peuvent également l’être entre eux." #NT!
 panum.1062.t: "Poumon d'acier" #NT!
 panum.1062.d: "Le brillant ingénieur [ROOT.Var('gaudi_engineer_var').GetCharacter.GetFullName] a aidé le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] à construire un appareil ingénieux qui a révolutionné le traitement de la polio." #NT!
 panum.1062.f: "Le poumon d'acier est l'un des premiers dispositifs médicaux permettant la ventilation mécanique d'un être humain. Vers 1920, l'ingénieur américain Philip Drinker l'a développé pour ventiler les patients atteints de maladies pulmonaires. Le corps du patient, à l'exception de la tête, est entièrement logé dans un cylindre creux. L'appareil ferme hermétiquement le cou et crée une dépression. La pression ambiante force alors l'air à travers le nez et la bouche du patient vers les poumons. L'expiration se produit en conséquence en créant une surpression dans la chambre. De nombreux patients atteints de polio n'ont eu besoin du poumon d'acier que pendant la phase aiguë de la maladie jusqu'à ce que la fonction musculaire reprenne. Certains patients ne l'ont utilisé que pendant la nuit, d'autres l'ont utilisé en continu." #NT!
 panum.1062.g: "Cela pourrait sauver de nombreuses vies." #NT!
 panum.1063.t: "Soutien psychologique" #NT!
 panum.1063.d: "En tant que psychiatre, le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a utilisé l’expérience de [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] pour faciliter la vie des patients atteints de polio." #NT!
 panum.1063.f: "« Nous prêtons à juste titre attention à la composante physique de la maladie lorsque nous parlons de poliomyélite. Mais à côté du corps endommagé, il y a une âme endommagée. La polio ne laisse pas que des traces physiques. En particulier lorsque je travaille avec des enfants, j'ai pu constater l'impact de cette horrible maladie sur leur vie privée et sociale. Les mots ne peuvent pas guérir. Mais ils peuvent apporter un soulagement. Et nous devons donner aux survivants une perspective pour qu'ils puissent non seulement survivre, mais qu'ils aient la volonté de survivre. »\n\nExtrait du journal du Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.1063.g: "Merci, Docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]." #NT!
 panum.1064.t: "Régime" #NT!
 panum.1064.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] préconise un régime alimentaire riche en nutriments pour les patients atteints de polio." #NT!
 panum.1064.f: "« Les succès obtenus dans la lutte contre le rachitisme, la carence en iode, le scorbut et la pellagre ont montré que notre alimentation peut jouer un rôle décisif dans la lutte contre les maladies. La polio n'est pas une maladie de carence. Mais on sait que les protéines jouent un rôle important dans la construction musculaire, et il est donc important de souligner que l'alimentation des patients atteints de polio doit être plus riche que celle des gens ordinaires. »\n\nExtrait du journal du Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.1064.g: "Enfin un certificat médical pour manger des steaks T-bone." #NT!
  
