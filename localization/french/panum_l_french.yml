 ### 2.2.4b ###

 panum_epidemiologist: "Épidémiologiste" #NT!
 panum_epidemiologist_desc: "Les épidémiologistes sont des experts dans le domaine de la description et du traitement des maladies épidémiques." #NT!

 ### 2.3.0 ###
 panum.51.t: "Le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] se rend dans l'État épidémique" #NT!
 panum.51.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetFullName], l'un des plus éminents esprits de la société médicale de [GetPlayer.GetName], s'est rendu à [SCOPE.sState('panum_disease_state').GetName] pour y approfondir ses recherches sur la maladie. Le médecin espère que cela pourra aboutir à une description complète de la maladie." #NT!
 panum.51.f: "Une description complète d'une maladie est un premier pas vers sa compréhension et sa lutte ultérieure. Les descriptions n'ont pas encore d'effet direct sur le soulagement, mais constituent la base d'une méthode de traitement ultérieure. Les médecins qui étudient une épidémie dans leur propre pays travaillent plus efficacement que ceux qui se rendent à l'étranger." #NT!
 panum.51.g: "Il faut connaître ses ennemis pour pouvoir les vaincre." #NT!
  
 je_panum_cholera_description: "Diagnostic du choléra" #NT!
 je_panum_tuberculosis_description: "Diagnostic de la tuberculose" #NT!
 je_panum_smallpox_description: "Diagnostic de la variole" #NT!
 je_panum_typhus_description: "Diagnostic du typhus" #NT!
 je_panum_yellow_fever_description: "Diagnostic de la fièvre jaune" #NT!
  
 je_panum_cholera_description_reason: "Le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] examine actuellement plusieurs patients pour déterminer les symptômes du #YELLOW choléra#!.. Il est essentiel de pouvoir différencier d'autres maladies similaires ou coexistantes. À la fin de son travail, le scientifique met sa description à la disposition du public afin que les générations futures aient de meilleures chances de reconnaître le contexte de la maladie et de trouver des méthodes de traitement." #NT!
 je_panum_tuberculosis_description_reason: "Le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] examine actuellement plusieurs patients pour déterminer les symptômes de #YELLOW la tuberculose#!.. Il est crucial de pouvoir différencier d'autres maladies similaires ou coexistantes. À la fin de son travail, le scientifique met sa description à la disposition du public afin que les générations futures aient de meilleures chances de reconnaître les origines de la maladie et de trouver des méthodes de traitement." #NT!
