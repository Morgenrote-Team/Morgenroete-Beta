 panum.641.t: "Une maladie à déclaration obligatoire" #NT!
 panum.641.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a écrit une lettre urgente aux autorités pour qu’elles cessent de traiter la rougeole comme une maladie bénigne et qu’elle devienne une maladie à déclaration obligatoire." #NT!
 panum.641.f: "« J'ai dû entendre des collègues, même très influents, des plus hautes instances de l'État et des universités, m'accuser d'exagérer le danger que représente la rougeole. On m'a même accusé d'avoir exagéré le problème de la rougeole pour améliorer ma position. Il est vrai que le taux de mortalité de la rougeole se situe entre 2 et 5 %. Mais si l'on part du principe que 2 personnes sur 100 meurent de la rougeole, cela représente plusieurs milliers de morts dans un pays de 10 millions d'habitants. Des millions de morts dans le monde pourraient être évitées grâce à de simples mesures de protection. Ne serait-il pas préférable que nous soyons tous un peu plus attentifs et que nous suivions les règles pour sauver des vies ? Ne voulons-nous pas commettre les mêmes erreurs que les femmes qui viennent d'accoucher et l'arrogance des médecins qui ne se lavent pas les mains, même si c'est un petit investissement de temps qui a un impact énorme ? »\n\nExtrait d'une lettre du docteur [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] au gouvernement local dans [SCOPE.sState('panum_disease_state').GetName]" #NT!
 panum.641.g: "Les petites choses peuvent avoir un grand impact." #NT!
 panum.642.t: "Infections animales par la rougeole" #NT!
 panum.642.d: "Dans une expérience animale très médiatisée, le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a infecté des singes avec la rougeole." #NT!
 panum.642.f: "« Étant donné la grande importance du sujet et l'apparente insensibilité des autres animaux, il nous a semblé hautement souhaitable de soumettre à des tests plus approfondis la question de la réceptivité des singes à l'infection de la rougeole. Nous avons commencé les travaux il y a un an et désirons maintenant rendre compte de certains résultats qui, selon nous, démontrent que le macaque rhésus est susceptible d'être infecté par le sang prélevé dans la circulation générale d'un cas de rougeole et qu'un singe ainsi infecté peut présenter une réaction fébrile définie ressemblant à l'évolution de la température dans certains types de rougeole chez le sujet humain, avec ou sans exanthème généralisé. Les détails complets de nos travaux seront donnés dans un document en cours de préparation. » Rapport du docteur [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] à la Faculté de médecine." #NT!
 panum.642.g: "Cela aidera à trouver un traitement efficace." #NT!
 panum.642.h: "Cela aidera à la recherche du pathogène." #NT!
 panum.643.t: "Une maladie qui évolue avec l'âge" #NT!
 panum.643.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a examiné plusieurs cas de maladie dans [SCOPE.sState('panum_disease_state').GetName] et a reconnu des différences significatives dans la mortalité des patients." #NT!
 panum.643.f: "« La rougeole est considérée comme une maladie infantile inoffensive. Cependant, mes recherches ont montré que cela n'est vrai que lorsque les enfants sont en âge d'aller à la maternelle. En revanche, la mortalité est particulièrement élevée chez les enfants âgés de 6 mois à 3 ans. Après cela, la mortalité diminue assez rapidement. Bien que la rougeole chez les adultes soit considérée comme inoffensive, les rapports de Ludvig Panum des îles Féroé ont montré qu'il est préférable que la vaccination ait lieu pendant l'enfance - les pêcheurs expérimentés signalent également une évolution grave de la maladie et même la mort. »\n\nExtrait du journal du Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [TimeKeeper.GetCurrentDate.Format('y')]" #NT!
 panum.643.g: "Il existe donc des groupes à risque particuliers." #NT!
 panum.644.t: "Très contagieux" #NT!
 panum.644.d: "Lors d'une visite dans une école de [SCOPE.sState('panum_disease_state').GetName], le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a pu constater pour [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself] qu'une fois que la maladie s'est déclarée, elle se propage presque inexorablement." #NT!
 panum.644.f: "« Merci d'être venu, docteur. »\n« La joie est de mon côté, mademoiselle. Combien de cas de rougeole l'école compte-t-elle actuellement ? »\n« Malheureusement, nous avons complètement perdu le compte. Hier, il y en avait 35, mais nous devrions avoir dépassé les 40 maintenant. »\n« Quand le premier cas de rougeole a-t-il été signalé ? »\n« La semaine dernière. »" #NT!
 panum.644.g: "Inquiétant." #NT!
 panum.645.t: "Éternuements et toux" #NT!
 panum.645.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] recommande des mesures de quarantaine telles que celles préconisées pour la grippe ou la tuberculose afin de limiter la rougeole." #NT!
 panum.645.f: "« La rougeole n'est pas considérée comme une maladie respiratoire, mais mes soupçons se sont confirmés : c'est le seul moyen d'arrêter sa propagation. La rougeole, l'une des maladies humaines les plus contagieuses, se transmet apparemment par infection par gouttelettes. On rapporte que des personnes présentes dans la chambre d'un malade ont été infectées alors qu'elles étaient sorties de la chambre depuis deux heures. Apparemment, les sécrétions infectieuses restent contagieuses plus tard. »\n\nExtrait du journal du Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [TimeKeeper.GetCurrentDate.Format('y')]" #NT!
 panum.645.g: "Heureusement, ce sont des méthodes bien connues." #NT!
 panum.646.t: "Antibiotiques" #NT!
 panum.646.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] voit la possibilité de réduire certains effets secondaires de la rougeole grâce à de nouveaux antibiotiques." #NT!
 panum.646.f: "« Le fait que la rougeole ne soit pas souvent prise au sérieux en tant que maladie est également dû au fait qu'elle n'entraîne souvent pas d'effets secondaires. Malheureusement, ce n'est pas toujours le cas. Des maladies secondaires, comme des infections de l'oreille ou des poumons, font souvent pencher la balance entre une évolution bénigne, grave et mortelle. Les antibiotiques ne peuvent pas guérir la rougeole, mais ils peuvent en atténuer l'horreur. »\n\nExtrait du journal du Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [TimeKeeper.GetCurrentDate.Format('y')]" #NT!
 panum.646.g: "Obtenez plus d’antibiotiques !" #NT!
 panum.646.h: "Ces résultats devraient aider à la recherche du véritable agent pathogène." #NT!
 panum.647.t: "Statistiques" #NT!
 panum.647.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] excellait particulièrement dans l’enregistrement statistique des cas de rougeole, le traitement des ménages infectés et l’évaluation des données." #NT!
 panum.647.f: "'Après une recherche minutieuse des données disponibles au cours des dernières années, j'ai examiné la mortalité des malades de la rougeole dans 22 pays et suis arrivé aux conclusions suivantes :'\n\nChili 4,84 %, Hongrie 4,43 %, Australie 0,24 %, Ecosse 0,35 %, Espagne 3,85 %, Italie, Angleterre et Pays de Galles 2,91 %, USA 1,08 %. Dans les pays où la rougeole était endémique, des épidémies se produisent tous les trois à cinq ans après le renouvellement de la population. Par la suite, des taux beaucoup plus élevés ont été signalés, atteignant 10 %, notamment dans les îles du Pacifique et en Afrique.'\n\nRapport du docteur [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] à la Faculté de médecine." #NT!
 panum.647.g: "Utile." #NT!
 panum.647.h: "Le médecin a du talent, [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] devrait approfondir les études [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]." #NT!
 panum.648.t: "Multiplication" #NT!
 panum.648.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a publié des chiffres étonnants sur la propagation et l’infection de la rougeole." #NT!
 panum.648.f: "« La rougeole est extrêmement contagieuse et on estime que 90 % des personnes non immunisées exposées à un individu infectieux contracteront la maladie. Les modèles mathématiques estiment le taux de reproduction de base à 12-18 ; c'est le nombre moyen d'infections secondaires qui suivent une seule introduction dans une population sensible. La rougeole est extrêmement contagieuse : neuf personnes sur dix qui ne sont pas immunisées et partagent l'espace de vie avec une personne infectée seront infectées. »\n\nRapport du docteur [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] à la faculté de médecine." #NT!
 panum.648.g: "Ce qui était auparavant reconnu uniquement par la perception est désormais prouvé par la science." #NT!
 panum.649.t: "Infection sans symptômes" #NT!
 panum.649.d: "Après quelques observations sur place, le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a émis l’hypothèse raisonnable que la rougeole se transmet également par des patients asymptomatiques, avant même l’apparition de signes extérieurs." #NT!
 panum.649.f: "'La forte prévalence de la rougeole est un phénomène bien connu et le risque d'infection est connu depuis l'Antiquité. Un gros problème est que des personnes apparemment en bonne santé sont également porteuses de la maladie, même si elle ne semble pas encore s'être déclarée. Cela contredit de nombreuses hypothèses qui étaient valables jusqu'à présent. La contagiosité - comme l'ont montré plusieurs observations au [SCOPE.sState('panum_disease_state').GetName] - commence 4 jours avant l'apparition de l'éruption et dure généralement jusqu'à 4 jours après l'apparition de l'éruption. Il semble que la contagiosité se situe juste avant le début de l'éruption.'\n\nRapport du docteur [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] à la Faculté de médecine." #NT!
 panum.649.g: "Des enquêtes plus approfondies sont donc nécessaires." #NT!
 panum.650.t: "Désinfection des casernes" #NT!
 panum.650.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a visité une caserne du [SCOPE.sState('panum_disease_state').GetName] qui a mis en œuvre des mesures exemplaires pour prévenir la propagation de la rougeole parmi les jeunes hommes." #NT!
 panum.650.f: "« Certaines de ces mesures comprenaient un isolement plus long et plus strict des recrues qui arrivaient qu'auparavant ; des mesures de police pour empêcher les rassemblements dans les casernes, les cantines, les théâtres et ailleurs ; l'étalement tête-bêche des lits de camp adjacents ; le nettoyage humide et la désinfection continus des sols, des murs, des tables, des poignées de porte. Tout le personnel portait des blouses et des masques de gaze, les changeait et se lavait les mains avec du savon, de l'eau ou des désinfectants entre chaque contact avec les patients, ce qui était une pratique peu courante auparavant. Certains services exigeaient que le personnel porte des gants en caoutchouc. Les patients étaient placés en isolement dans des cabines, des draps suspendus à des fils tendus autour du lit et devaient porter des masques. Les draps des cabines étaient parfois périodiquement aspergés de désinfectants. Les patients masqués n'étaient autorisés à entrer dans les toilettes qu'un à la fois sous la surveillance d'un préposé. »\n\nExtrait du journal du Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [TimeKeeper.GetCurrentDate.Format('y')]" #NT!
 panum.650.g: "Méthodes modernes de lutte contre la rougeole." #NT!
 panum.651.t: "Inoculation ratée" #NT!
 panum.651.d: "La tentative du docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] d’immuniser contre la rougeole en utilisant une procédure similaire à la variolisation de la variole s’est avérée un échec colossal." #NT!
 panum.651.f: "En 1757, le médecin écossais Francis Home découvre que la rougeole est causée par un agent pathogène : il transmet la maladie à des individus sains à partir du sang de patients infectés et démontre qu'elle est causée par un agent infectieux. Il teste un groupe de 12 enfants, dont 10 développent une éruption fébrile modérée caractéristique après une période d'incubation de 6 à 7 jours, et deux restent indemnes. Cette approche est rapidement abandonnée en raison de difficultés techniques, notamment pour obtenir du matériel rougeoleux au bon moment pour inoculer la maladie." #NT!
 panum.651.g: "Une perte de temps." #NT!
 panum.652.t: "Gargarisme de gorge" #NT!
 panum.652.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a essayé plusieurs remèdes de gargarismes vantés depuis des années par ses confrères pour soigner la rougeole. Ils se sont tous révélés être un échec." #NT!
 panum.652.f: "« Après la dernière expérience, je me retrouve avec plus qu'un arrière-goût amer. D'une part, parce que même l'huile de serpent a de meilleurs effets. D'autre part, parce que nous tolérons davantage de vendeurs d'huile de serpent et de charlatans dans notre guilde médicale, qui doivent être éliminés de toute urgence. »\n\nExtrait du journal du Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [TimeKeeper.GetCurrentDate.Format('y')]" #NT!
 panum.652.g: "Que veux-tu dire par "l'huile de serpent est inutile" ?" #NT!
 panum.653.t: "Spray désinfectant" #NT!
 panum.653.d: "Dans une caserne, des soldats atteints d'une épidémie de rougeole ont récemment commencé à ingérer du désinfectant. Le médecin pense que c'est une entreprise stupide et a dû faire preuve de beaucoup de persuasion." #NT!
 panum.653.f: "« Nous devrions vraiment mettre de petites images sur les étiquettes des produits chimiques et médicaux qui montreraient même au plus petit imbécile ce qu'il ne faut absolument PAS faire avec un liquide, un spray ou une autre substance. »\n\nExtrait d'une lettre du docteur [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] au docteur Angelika Hasenbein" #NT!
 panum.653.g: "C’est un temps précieux que nous perdons à essayer de trouver un traitement !" #NT!
 panum.661.t: "Prenez vos vitamines !" #NT!
 panum.661.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a découvert que la prise de vitamines pendant une rougeole est bénéfique pour éliminer les effets secondaires désagréables." #NT!
 panum.661.f: "« L'effet des vitamines est bien connu, mais dans le cas de la rougeole, leur effet m'a surpris. Les enfants qui souffrent d'une carence en vitamine A courent le risque de tomber gravement malades, voire de devenir aveugles. Les compléments en vitamine A peuvent renforcer le système immunitaire général, mais ils ne peuvent pas guérir la maladie. »\n\nRapport du docteur [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] à la Faculté de médecine." #NT!
 panum.661.g: "Très bien." #NT!
  
 panum.900.t: "Épidémie de diphtérie" #NT!
 panum.900.d: "Une épidémie a éclaté dans l’un de nos États : la #YELLOW Diphtérie#! fait des ravages en [SCOPE.sState('panum_disease_state').GetName] !" #NT!
 panum.900.f: "La diphtérie est une maladie infectieuse aiguë qui touche principalement les enfants et qui est causée par une infection des voies respiratoires supérieures (diphtérie pharyngée). Pierre Fidèle Bretonneau a introduit le terme diphtérie dans le langage médical en 1826 sous le nom de diphtérite. Le mot désigne les pseudomembranes brunâtres et foncées de la gorge (dépôts bruns et coriaces dans le larynx et la trachée) constituées de muqueuses mortes et de composants sanguins. La diphtérie est connue depuis l'Antiquité ; Hippocrate avait déjà décrit la maladie. La diphtérie est mortelle dans 5 à 10 % des cas. Chez les enfants de moins de cinq ans et les adultes de plus de 40 ans, le taux de mortalité peut atteindre 20 %." #NT!
 panum.900.g: "Ma gorge se serre aussi." #NT!
 panum.920.t: "Fin de l'épidémie de diphtérie" #NT!
 panum.920.d: "La grave épidémie de diphtérie qui a étouffé notre pays est terminée. Les médecins et les autorités ont donné leur feu vert, les enfants osent à nouveau sortir dans la rue, les personnes âgées sont soulagées." #NT!
 panum.920.f: "« Au cours d'une saison froide et humide, une maladie infantile, communément appelée « la maladie de la gorge », est apparue à Kingston, une ville de l'intérieur du New Hampshire située dans une plaine basse, d'une forme très maligne et de loin la plus mortelle jamais connue dans ce pays. » - Even Noah Webster" #NT!
  
