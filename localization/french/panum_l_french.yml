 panum.138.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_description_title')]"
 panum.138.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a présenté [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] Description de la maladie du [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_disease_title')] aujourd'hui. La faculté médicale le considère déjà comme un classique."
 panum.138.f: "Dans le traité [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_description_title')] [ROOT.Var('panum_physician_var').GetCharacter.GetFullName], traite de la maladie plus en détail que tout autre médecin de notre pays auparavant. Il éduque le lecteur sur les symptômes, la période d'incubation et la différenciation des autres maladies, ainsi qu'une chronologie des épidémies passées et d'autres descriptions épidémiologiques traditionnelles."
 panum.138.g: "Maintenant, nous connaissons mieux la bête."
 panum.139.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_treatment_title')]"
 panum.139.f: "La faculté médicale attendait avec impatience le document scientifique sur la méthode de traitement du [ROOT.Var('panum_physician_var').GetCharacter.GetFullName]. Ce travail aurait-il peut-être peut-être une percée? [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_treatment_title')] pourrait potentiellement sauver la vie d'innombrables personnes. Les raisons pour lesquelles il décrit pour le déclenchement de [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_disease_title')] et la façon dont il peut être évité ou traité par la suite pourrait changer fondamentalement la manière dont cette maladie a été pensée."
 panum.139.g: "[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_disease_title')] perd son horreur."
 panum.140.t: "Choléra - Une maladie née de l'eau!"
 panum.140.d: "Grâce au travail héroïque du docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], l'épidémie de choléra dans [SCOPE.sState('panum_disease_state').GetCityHubName] a été écrasée de manière décisive!"
 panum.140.f: "«Depuis le début de mon séjour ici au [SCOPE.sState('panum_disease_state').GetCityHubName], j'ai rassemblé beaucoup d'informations qui pointent tous vers une conclusion: le choléra est une maladie d'origine hydrique. La maladie qui en a tué tant depuis des siècles ne se trouve pas dans l'air, comme le miasme, mais se tortille et essaie dans des gouttes d'eau. Ingéré, il se développe dans l'intestin et se manifeste dans le choléra que nous avons appris à combattre. C'est une leçon durement apprise, mais a rapidement agi. La semaine dernière, ils ont retiré les poignées de la pompe à eau au cœur de cette épidémie. Aujourd'hui, je me retire pour la soirée sans un seul nouveau cas apporté à ma table. C'est irréfutable. La bête est tuée. \ N \ nyet, je ressens une pange de lamentation pour tout cela. Je ne souhaite pas pouvoir réclamer la responsabilité unique et unique pour les découvertes que nous avons faites ici, mais seulement qu'ils auraient pu être découvertes encore plus tôt. De nombreuses vies ont été perdues pour un manque d'eau potable, jeune et vieux. Si nous avons de la chance, que ce soit le dernier que nous sommes confrontés au choléra. '\ N \ nfrom du Journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], écrivant de la grande épidémie de choléra de [TimeKeeper.GetCurrentDate.Format('y')], concluant l'enquête sur [SCOPE.sState('panum_disease_state').GetCityHubName]."
 panum.140.g: "Incroyable! Ceci est un coup mortel à la théorie du miasme!"
 panum.141.t: "La brasserie"
 panum.141.d: "L'enquête sur le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a emmené [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] sur une île de sécurité dans l'épidémie - une brasserie de bière."
 panum.141.f: "'Bonjour! On m'a dit que vous deviez être le contremaître ici à la brasserie. Je suis le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], et je suis ici pour enquêter sur l'épidémie. S'il vous plaît, dites-moi plus. '\ N \ N'Well, ce n'est pas vraiment un problème ici. La plupart des autres usines ont clôturé, mais pas nous. '\ N \ N'LE Choléra ne vous affecte pas beaucoup, ici? Avez-vous une idée pourquoi? Mais si je devais parier, c'est parce que les gars ne rentrent pas chez eux. Le patron nous laisse tous avoir certains des lots plus anciens qui ne se vendent pas bien avec le déjeuner, un peu me chercher pour les garçons à bas prix. Aucune de ces eaux bien pour nous, juste une pinte de bière pour aussi peu que ce ne coûte pas."
 panum.141.g: "Hmmm ... donc vous ne buvez pas l'eau locale. Très fascinant."
 panum.142.t: "Créatures d'habitude"
 panum.142.d: "L'enquête du médecin [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] se poursuit - [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] a trouvé ce qui pourrait être le centre de l'épidémie."
 panum.142.f: "'... mais si courants étaient les cas dans la région que j'ai réalisé que j'avais besoin de plus de conseils. Heureusement, le bureau du coroner local s'est avéré être de la plus grande assistance: ils avaient écrit l'adresse de chaque maison à partir duquel ils avaient pris un corps ou pris note de maladie, et cela m'a fourni les moyens de placer chacun de ce type avec une précision sur une simple carte. La zone résultante est vaste, englobant bien plus d'une centaine de maisons, mais elle forme également un vaste cercle. \ N \ nE va à l'encontre de la pensée traditionnelle. S'il s'agissait d'un miasme, alors il serait sûrement porté par la brise, voyageant le long des vents dominants. Au lieu de cela, cela va au-delà des vents, ronds et inconstants. J'ai marché jusqu'au centre de tout cela, espérant peut-être trouver un indice ... et j'ai trouvé nul autre qu'une pompe à eau. Chaque maison sur le graphique était à distance de marche. Il doit y avoir une sorte de connexion. '\ N \ nfrom Le Journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], écrivant de la grande épidémie de choléra de [TimeKeeper.GetCurrentDate.Format('y')], enquêtant dans [SCOPE.sState('panum_disease_state').GetCityHubName]."
 panum.142.g: "Cela pourrait-il ... être dans la pompe, d'une manière ou d'une autre?"
 panum.143.t: "Les étranges"
 panum.143.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a trouvé quelque chose d'intéressant - une rupture du motif."
 panum.143.f: "«Oh, Dieu merci! Vous devez être le médecin dont ils parlent, docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]! S'il vous plaît, vous devez nous aider. '\ N \ n'i l'intention pleinement, madame. S'il vous plaît, dites-moi autant que vous le pouvez sur vous et les vôtres, et épargnez même le moindre détail si vous le pouvez. Le vôtre semble être l'un des seuls cas dans ce quartier? '\ N \ n'yes, oui, nous sommes! Il est juste sorti de nulle part! Nous avons pris toutes les précautions, même en portant l'un d'eux des masques floraux avec toutes les fleurs pour garder la puanteur à distance! Quoi qu'il en soit pour?"
 panum.143.g: "... Avez-vous dit que vous aviez ramené l'eau de leur pompe?"
 panum.144.t: "Les filtres"
 panum.144.d: "Dans le [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis], pour découvrir plus d'indices sur l'épidémie, le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a découvert que toutes les victimes ont leur eau de la même entreprise!"
 panum.144.f: "'... mais c'est la chose la plus curieuse de toutes. Lorsque j'ai voyagé sur la route, ou en amont, aux maisons soutenues par la New River Company, la quantité de caisses de choléra a baissé de façon spectaculaire. Ce n'était rien de plus que l'habitude, si cela. Revenez vers le sud, et on trouve que les rues sont en feu avec le choléra, remplies de puanteur des intestins non et de la mort. Serait-ce une localisation du sol miasmatique? \ N \ ni ne pense pas. Il semble trop proprement marqué. J'ai contacté les honorables messieurs de la New River Company, et ils m'ont informé que leurs tuyaux étaient récemment fermés pendant qu'ils ont ajouté de nouveaux filtres, à grands frais, à leur station de pompage. Ces filtres pourraient-ils jouer un rôle invisible là-dedans? Serait-ce la propreté inactive de l'eau en gardant le miasme à distance, ou quelque chose de plus? '\ N \ nfrom du Journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], écrivant de la grande épidémie de choléra de [TimeKeeper.GetCurrentDate.Format('y')], enquêtant sur [SCOPE.sState('panum_disease_state').GetCityHubName]"
 panum.144.g: "... Y a-t-il quelque chose dans l'eau qui entraîne une maladie?"
 panum.145.t: "Eau brune"
 panum.145.d: "Équipé des derniers instruments pour la recherche [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis], Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a utilisé le microscope [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] pour examiner les échantillons de l'épidémie de choléra."
 panum.145.f: "Cela n'avait pas été facile d'amener le microscope jusqu'à [SCOPE.sState('panum_disease_state').GetCityHubName], car une bosse sur la route avait presque brisé chaque lentille ... mais maintenant qu'il était ici, le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] avait l'un des plus grands outils de la médecine moderne à sa disposition. Quelques dizaines d'échantillons recueillis dans l'eau locale, soigneusement préparés, et chacun vu au microscope. Certains provenaient de zones avec moins de choléra. Ce sont les plus propres, [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] noté. \ N \ nbut les sales? Ceux montés avec la saleté du genre le plus vil? Un front brossé, une pensée d'un moment. Des scintiller de crasse flottant dans le liquide, comme des flocons de neige sale. Ici, là, les minuscules mouvements des microbes inoffensifs, flottant innocemment sur la misérable soupe."
 panum.145.g: "... ou n'êtes-vous pas aussi inoffensif que vous le paraissiez?"
 panum.145.h: "Plus de preuves d'une autre théorie."
 panum.145.i: "Il doit y en avoir plus."
 panum.146.t: "La première mort"
 panum.146.d: "Après un travail infatigable et une enquête, le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a retracé l'épidémie au premier cas enregistré - un nouveau-né."
 panum.146.f: "Il y a eu peu de rappels plus sombres de ce que le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a fait que de visiter la maison d'une femme dans le pire deuil, une femme qui avait été autrefois une femme et une fois une mère, mais qui n'était plus ni l'un ni l'autre. Déjà, à peine des marches de sa porte, le médecin prenait leurs notes. \ N \ nnewborn Boy emporté de la rue pour visiter grand-mère. Retourné avec le choléra. Les couches lavées, portant peut-être une maladie. \ N \ nhusband est revenu du travail. Soif après le quart de travail à l'acier. Bien mangé, bien bu, est mort à la fin de la semaine, le choléra. \ N \ nbehind les gémit. Avant, des rues pluvieuses et désolées. Parmi tout cela, une phrase chuchotée."
 panum.146.g: "S'il vous plaît, laissez il y a une fin à tout cela."
 panum.147.t: "La fosse"
 panum.147.d: "Tout en menant une enquête [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis], le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a trouvé quelque chose de négligé - un Cesspit."
 panum.147.f: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] n'aimait pas la théorie du miasme, mais [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] s'est retrouvé très reconnaissant pour les masques floraux destinés à le garder à distance. Le Cesspit était plein de déchets pourrie et totalement, totalement rance. Même l'inspecteur de la police s'est éloigné de son bord. \ N \ N'Doctor! Une telle fosse doit sûrement être la source de ce miasme, et le misérable choléra qu'il nous donne! Voyez-vous la façon dont la pluie coule dans la terre, ici? '\ N \ n'aye, je le fais, mais qu'en est-il? Il doit s'écouler, mais si c'est le cas, cela prendrait l'eau près de la pompe. Si les raccords sont compromis ... '\ n \ n' ... alors il avait collé les eaux usées dans la poignée. Pouah. Une bonne chose ne se propage pas dans l'eau ... '"
 panum.147.g: "...droite?"
 panum.147.h: "Faux!"
 panum.148.t: "Le manoir"
 panum.148.d: "L'enquête sur le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a emmené [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] à un trou curieux dans la compréhension de l'épidémie - un foyer d'un homme riche."
 panum.148.f: "«J'ai visité la résidence d'un gentleman local aujourd'hui, une habitation plus grande dans les limites de la ville, dangereusement proche du cœur de l'épidémie. Cela semblerait un reste d'un jour précédent de l'histoire de cette ville, alors que cette partie était plus riche qu'un petit bidonville. Le maître de la maison a été assez fasciné par l'enquête et m'a fourni un grand nombre de livres sur l'histoire locale dans l'espoir qu'ils pourraient éclairer les épidémies passées. Plus intéressant, ils ont clairement indiqué que le choléra n'avait pas encore atteint leurs murs. \ N \ nthat était assez fascinant pour moi, car par les directeurs de la théorie du miasme, la maladie est dans l'air, dans l'odeur, et ne devrait pas discriminer entre riche ou pauvre de cette manière. Même ses serviteurs ne sont pas affligés, ceux qui vivent au moins dans les quartiers. Ils mangent dans le cellier et boivent de l'artésian bien dans les murs, et en quelque sorte, cela les rend non affectés. Une énigme curieuse. Est-ce quelque chose qu'ils ont que les autres ne font pas?"
 panum.148.g: "Ou ... peut-être que les serviteurs manquent de quelque chose que les malades pourraient avoir?"
 panum.149.t: "La minuscule mort"
 panum.149.d: "L'enquête sur Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a peut-être révélé le coupable - un microbe!"
 panum.149.f: "'' ... Mais quand même, je devais être particulièrement sûr. J'ai appelé à des échantillons frais, prélevés à la fois dans l'eau et à des effluents spécialement préparés des malades. Placés sur le verre de mon microscope, j'ai pu regarder à l'intérieur de ces liquides et confirmer la présence de ce qui doit être notre grand ennemi dans cette bataille: Vibriones. \ N \ nat Premier Glance, ces microbes semblent être inoffensifs, plus comme des tubes que n'importe quel grand prédateur. Mais chaque échantillon des malades confirme sa présence, et il semble confiant de dire que ces créatures jouent un rôle dans cette maladie. Sont-ils ... le choléra lui-même? Peut-être. Dans l'affirmative, il s'agit de preuves tangibles pour la théorie que les germes comme cette maladie provoquent une maladie. \ N \ nbut Une chose est sûre: nous avons trouvé l'ennemi. Maintenant, nous devons les tuer."
 panum.149.g: "Nettoyez et traitez, jusqu'à ce que cela soit fait."
 panum.149.h: "Cette découverte va bien au-delà du choléra."
 panum.150.t: "Une question pratique"
 panum.150.d: "Rare allié dans la bataille contre la maladie, le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] rencontre le coroner en [SCOPE.sState('panum_disease_state').GetCityHubName] pour discuter de leurs conclusions."
 panum.150.f: "«Ah, vous devez être docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]! Pardonnez-moi de ne pas vous serrer la main, je fouille dans les cadavres depuis quelques jours. '\ N \ n' ... croyez-moi, vous n'avez pas besoin de demander mon pardon. Vous êtes le coroner local, s'il vous plaît, parlez-moi de vos conclusions. '\ N \ N'AS Vous savez, le choléra est une maladie des intestins. Plus que cela, je n'ai pas besoin de dire. Les vomissements, la purge, un intestin si bouché, il ressemble à des blancs d'oeufs, quelqu'un aussi appris que vous le connaissez. '\ N \ N'of Course, mais qu'est-ce que vous trouvez intéressant?' \ N \ N'Well ... Ils continuent de me dire que c'est du miasma, que cette mort est dans l'air ... mais honnêtement, je ne pense pas. Je serais mort maintenant si oui. J'ai eu beaucoup de corps sur cette table, docteur. Cela pue d'intoxication alimentaire, mais ce n'est pas le cas."
 panum.150.g: "Une pensée la plus fascinante. Dites-moi plus."
 panum_physician_health_malus_modifier: "Travail agité"
 panum.151.t: "L'usine d'outils"
 panum.151.d: "Tout en travaillant sur l'enquête [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis], le voyage du docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] dans une usine d'outils locaux soulève plus de questions que ce qu'il ne répond."
 panum.151.f: "«Quand je suis allé à l'usine d'outils l'autre jour, les choses semblaient avoir un sens au début. Cette usine se spécialise dans les couteaux, les outils de boucher et similaires, et donc ils ont une station d'affûtage. Il utilise des roues à eau pour tourner un grand nombre de pierres d'assistance, des roues affûtées pour terminer le bord sur chaque lame. Chaque travailleur gisait sur le ventre près du moulin et pouvait être éclaboussé d'eau. Tel a un sens, et si l'épidémie à l'usine avait été limitée là-bas, cela aurait eu du sens. \ N \ nowhers Les choses deviennent étranges, alors, c'est que cela brise une tendance vue partout ailleurs. Il y a des hommes à l'usine tombant malades après ne jamais être près de la rue au cœur de cette épidémie, ni aux roues aiguisées. Comment cela pourrait-il être possible?"
 panum.151.g: "Apparemment un mauvais indice."
 panum.151.h: "Apparemment une mauvaise théorie."
 panum.152.t: "Le pot"
 panum.152.d: "Malheureusement, le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a poursuivi une impasse - un cas local d'intoxication alimentaire, sans rapport avec le choléra."
 panum.152.f: "«Aujourd'hui a été une journée des plus aggravantes. J'ai été appelée par la gendarme pour enquêter sur une épidémie soudaine de maladie dans un hôtel populaire, qui semblait être un éclat soudain de choléra. J'avais rassemblé toutes mes affaires pour enquêter, alertant les autorités appropriées pour trouver des lits et prendre soin des malades, mais au moment où je suis arrivé, je savais que ce n'était pas du choléra. Les symptômes étaient mauvais, le début soudain trop rapidement. Une cause plus locale devait être en faute, et sans surprise, tout le monde affligé avait mangé le même repas. \ N \ na L'aventure dans les cuisines a révélé le coupable: un pot de pâté de canard sûrement expiré, enduit de pain fin par un cuisinier avec un nez trop bloqué par un froid pour sentir la pourriture. Une perte de temps s'il y en avait un. L'empoisonnement alimentaire n'est pas le choléra."
 panum.152.g: "... Eh bien, au moins, nous savons éliminer les placards, au moins."
 panum.153.t: "Mât"
 panum.153.d: "Un accident s'est produit lors de l'enquête sur le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] - [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] a mélangé leurs échantillons!"
 panum.153.f: "Mais en plein milieu du travail, j'ai eu une interruption. Criant, criant, le bruit d'un combat dans la rue. Une bagarre ivre, une tasse de trop. La constabulary n'a pas tardé à le mettre sur commande, les traînant, criant immobile. \ N \ nit n'a pris qu'un moment pour se lever de mon siège et fermer les volets, et moins encore pour revenir à mon travail. Plus de imbécile suis-je que je n'ai pas remarqué que je mets les échantillons dans le mauvais ordre, et d'où à partir de là que de faire mon travail dans le mauvais ordre, de se connecter chacun dans le mauvais ordre? \ N \ nfrom du Journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], écrivant de la grande épidémie de cholera de [TimeKeeper.GetCurrentDate.Format('y')], enquêtant sur [SCOPE.sState('panum_disease_state').GetCityHubName]"
 panum.153.g: "Des semaines de travail, gaspillées. Damnation."
 panum.154.t: "Le tueur de copieur?"
 panum.154.d: "L'enquête sur l'épidémie de choléra en [SCOPE.sState('panum_disease_state').GetCityHubName] a pris un virage alarmant - il semble qu'il pourrait y avoir une autre maladie!"
 panum.154.f: "«Ah, ravi de vous rencontrer à nouveau, docteur% nom%. Ma table a été occupée la semaine dernière. '\ N \ ni ne l'appellerait pas bien de vous rencontrer, coroner. Qu'avons-nous? Surtout les enfants aussi, et les personnes âgées. '\ N \ N'Cholera est encore plus mortelle pour les vulnérables qu'à quiconque. Êtes-vous sûr que n'est-ce pas? Dysenterie, choléra, typhus? Intoxication alimentaire courante? Qui peut dire? La seule chose que je sais, c'est que cela ne semble pas le même. Il n'est pas le blanc, comme le choléra, mais la mort est la même. '\ N \ N'Then que nous pourrions bien avoir une deuxième maladie ... l'explosion et la damnation. Comment distinguer les deux?"
 panum.154.g: "Je ne peux pas faire de plan si je ne sais pas ce que je me bats."
 panum.155.t: "Le miasme ...?"
 panum.155.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] et le [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] enquête ont rencontré un problème - Serait-ce que le miasme est réel?"
 panum.155.f: "'' ... mais les résultats de ce dernier quadrant de l'enquête défient les raisonnements de la théorie des germes, et je ne peux pas pour moi de moi. Les maisons sont assises à côté d'un canal peu profond, fréquemment parcouru par des barges offrant du charbon aux fonderies. Ils ne sont pas dans une gamme de marche facile des pompes à eau, à l'exception d'un vieux puits. C'est pur, peut-être le plus pur de la ville. \ N \ nyet, pour une raison quelconque au-delà de moi, le choléra est ici. Déjà, ils travaillent pour garder la puanteur à distance, et la puanteur, le miasme, est vraiment là. Le canal pue des effluents ... mais s'ils ne boivent pas cette eau, alors comment peuvent-ils être blessés, sauf par la seule odeur?"
 panum.155.g: "Le miasma ne peut pas être correct ... n'est-ce pas?"
 panum.156.t: "Déconstruit"
 panum.156.d: "Avec une faim pour de plus en plus de terres sur lesquelles s'appuyer, le développement du [SCOPE.sState('panum_disease_state').GetCityHubName] n'a pas le temps de s'arrêter, même pour l'enquête du Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]."
 panum.156.f: "'' ... qui êtes-vous à nouveau? Cette rue était pleine de gens malades. Où sont-ils? '\ N \ n'not un indice. Moi les gars et moi sommes juste là pour commencer à déchirer ces maisons. Quoi? Ces maisons abritaient une douzaine de familles, toutes infectées par le choléra! '\ N \ N'well, elles ne sont plus. Le propriétaire a tourné le lot de la rue. Ne paie pas comme ça, mais il n'aurait pas d'importance de toute façon. Land va être un moulin à textile, et si cela ne vous dérange pas, moi et les garçons devons commencer à travailler ces maisons."
 panum.156.g: "Oh pour l'amour du ciel. Maintenant, je dois retrouver les malades ... ne buvez rien."
 panum.157.t: "Contaminé"
 panum.157.d: "Terrible nouvelle! Le médecin a été infecté par le choléra!"
 panum.157.f: "«Je ne sais pas comment cela s'est produit. Miasme? Je suis dans les malades, les morts et les mourants depuis des semaines, plus que quiconque. Germes? Je n'ai pas bu de l'eau, mais qu'en est-il de la contamination? Cela pourrait-il être réparti par le toucher? Dans les airs, sur des surfaces? Je ne sais pas. \ N \ nbut Je connais les symptômes. L'estomac se retourne et comment il ne se termine jamais. Je pourrais aussi bien manger et ne rien boire, pour tout le bien que cela me fait. Il dit mille vérités, et une. \ N \ ni ont le choléra. '\ N \ nfrom du Journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], écrivant de la grande épidémie de choléra de [TimeKeeper.GetCurrentDate.Format('y')], enquêtant sur [SCOPE.sState('panum_disease_state').GetCityHubName]"
 panum.157.g: "Oh, j'espère que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] ira mieux bientôt."
 panum.161.t: "Une tache de gin"
 panum.161.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a pris un peu de temps loin de leur travail pour «enquêter» leur autre passion: l'alcool."
 panum.161.f: "'... Mais alors que sur mon deuxième verre de cette boisson la plus merveilleuse, j'ai commencé à réaliser quelque chose d'assez étrange. Plus il y a de personnes qui sont venues à boire, moins elles devaient être affectées par le choléra. En effet! Ma propre carte de complot montre que ces maisons les plus proches de cet endroit ont beaucoup moins de chances d'être affligées de cette misérable maladie. \ N \ nothere est un modèle là-bas, je sens. J'ai parlé davantage avec le propriétaire et un certain nombre des habitants les plus affables, et ils semblent être d'accord. Il y a quelque chose dans cet endroit qui semble aider à repousser la maladie. Je devrais enquêter davantage."
 panum.161.g: "Ah, les merveilles des affaires et du plaisir en un."
 panum.162.t: "Bottom est en place"
 panum.162.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a pris le mouvement le plus audacieux de tous - [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] a donné le choléra [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself] en buvant de l'eau contaminée!"
 panum.162.f: "'' ... Bien sûr, toute la meilleure théorie du monde n'est rien sans pratique. Pour tout le travail, cela ne reste que pour mes détracteurs, qui continuent de prétendre qu'il n'y a pas de preuves irréfutables pour cimenter mes pensées. Très bien, alors. Je les rencontrerai de front, et de la manière la plus directe de tous: en buvant la même eau qui se trouve au cœur de cette épidémie, livrée par un fidèle coureur. S'ils ont raison, alors je ne suis pas malade même lorsqu'il est retiré de l'endroit. Si je suis, alors je me battrai bientôt pour ma vie, mais quelle est une vie, par rapport à tant de personnes qui pourraient être sauvées si je peux prouver mes affirmations? \ N \ nso, mon cher journal, un toast à la santé. \ N \ nfrom Le Journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], écrivant de la grande épidémie de choléra de [TimeKeeper.GetCurrentDate.Format('y')], enquêtant dans [SCOPE.sState('panum_disease_state').GetCityHubName]."
 panum.162.g: "«Oh, ma chérie, je me sens ... oh non."
 panum.162.h: "Dissuadez le médecin de cette manœuvre téméraire!"
 panum.163.t: "Une carte du succès"
 panum.163.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a réussi à élaborer une superbe carte du noyau de l'épidémie, ce qui facilite le suivi des progrès de la maladie."
 panum.163.f: "«Messieurs, messieurs, je vous présente ma carte de l'infection dans [SCOPE.sState('panum_disease_state').GetName]. Il couvre, en détail, l'emplacement de chaque infection dans la région, chronométré et tamponné en conséquence, avec le nom et le nombre de décès, d'infections, etc. Il présente une chronologie écrite de toute la progression de l'épidémie de choléra dans ce quartier. Un exemple: ici, nous voyons une pompe à eau et le nombre de maisons à distance de marche. \ N \ nin, je présente les tables suivantes, rédigées en tabulant les informations de cette carte. Si vous, des messieurs fines, je vous pensions, vous verrez que les zones desservies par cette pompe à eau ont les taux de mortalité les plus élevés de tous. Ici, sur ce tableau, nous voyons que la société d'eau, [SCOPE.sState('panum_disease_state').GetName] Wells, a une corrélation directe avec ces pompes, ce qui montre à son tour que cette entreprise présente le risque le plus élevé de choléra de toutes les zones desservies ..."
 panum.163.g: "Ce sera un jour une science."
 panum.164.t: "Feu et fureur"
 panum.164.d: "L'absence de progrès dans la lutte contre l'épidémie de choléra en [SCOPE.sState('panum_disease_state').GetName] a épuisé la patience du docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]"
 panum.164.f: "Les cris pouvaient être entendus à près d'un pâté de maisons, et le bruit des livres et des tasses jetés de leur table bien devant la porte. Une vague de malédictions, des excuses frénétiques et désespérées des assistants effrayés, puis plus de cris, et plus encore. \ N \ N'you Fools! Vous avez des imbéciles absolus et absolus! Nous sommes là pour une raison! Les gens meurent devant notre porte, et ils nous regardent pour les sauver, et les sauver, nous le ferons! Ceux d'entre vous qui peuvent, suivre mes ordres à la lettre, et nous allons battre cette misérable peste! Tu m'entends? Les bons, cette fois!"
 panum.164.g: "Et donc, le médecin met son armée en marche, prêt à faire la guerre à la maladie elle-même."
 panum.165.d: "Dans un moment de courage total, le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a visité l'un des hôpitaux les plus affligés de [SCOPE.sState('panum_disease_state').GetCityHubName] pour interviewer les patients là-bas."
 panum.165.f: "Le quartier de cet hôpital de fortune était un endroit bondé, plein de sites et de sons, mais sent plus que tout autre. L'odeur de la maladie. L'odeur de la mort. Des fleurs avaient été amenées pour essayer de garder la puanteur à distance, et aussi de l'encens, mais même encore, peu sont venus dans cette salle des damnés. C'était trop risqué, ont-ils dit, trop dangereux pour leur propre santé. Comment pouvaient-ils espérer aider les autres, s'ils se sont également couchés dans un lit? \ N \ nfew venaient, mais pas aucun. Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] était l'un d'eux, et ils ont traversé ce lieu de mort et mourir avec un courage incessant et une énergie sans fond. Ils se sont assis sur le côté des malades et seuls, posant des questions, prenant des notes. Chaque pensée, chaque réponse, était précieuse. Ils étaient les indices du salut, les indices de l'origine de cette mort et de la façon dont elle pourrait aussi être tuée."
 panum.165.g: "Et dans ce Hall of Death, un ange de vie a marché, journal à la main."
 panum.166.t: "Le pouvoir de la prière"
 panum.166.d_christian: "À la recherche de la perspicacité et peut-être du confort, le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a demandé un prêtre dans une cathédrale locale."
 panum.166.d_muslim: "À la recherche de la perspicacité et peut-être du confort, le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a demandé un imam dans une mosquée locale."
 panum.166.d_other: "À la recherche de la perspicacité et peut-être du confort, le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a demandé un prêtre dans un temple local."
 panum.166.f_christian: "«Bonjour, père. Je suis docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], envoyé par la capitale pour enquêter sur cette épidémie et pour offrir toute l'aide que je peux. Je demanderais votre aide à ce sujet, si vous pouvez le prêter. '\ N \ n'y suis mais un humble prêtre, pas le Tout-Puissant, mais je ferai ce que je peux. Dis-moi, enfant. De quoi avez-vous besoin? '\ N \ n'i aimerait en savoir autant que vous pouvez me dire sur les premiers jours de cette infection. Qui a été le premier à succomber? Où? Avez-vous une pensée d'où cela pourrait provenir? '\ N \ n'on peut avoir la réponse à certaines de ces questions, mais oui, je sais beaucoup de choses sur mon troupeau. Viens, viens. J'ai pris mes propres écrits, après tout."
 panum.166.f_muslim: "«As-Salamu alaykum, imam. Je suis docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], envoyé par la capitale pour enquêter sur cette épidémie et pour offrir toute l'aide que je peux. Je demanderais votre aide à ce sujet, si vous pouvez le prêter. '\ N \ n'y suis mais un humble clerc, pas le Tout-Puissant, mais je ferai ce que je peux. Dites-moi, de quoi avez-vous besoin? '\ N \ N'LI aimerait en savoir autant que vous pouvez me dire sur les premiers jours de cette infection. Qui a été le premier à succomber? Où? Avez-vous une pensée d'où cela pourrait provenir? '\ N \ N'only Allah pourrait avoir la réponse à certaines de ces questions, mais oui, je connais beaucoup de choses sur la communauté ici. Viens, viens. J'ai pris mes propres écrits, après tout."
 panum.166.f_other: "«Salutations à vous, prêtre. Je suis docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], envoyé par la capitale pour enquêter sur cette épidémie et pour offrir toute l'aide que je peux. Je demanderais votre aide à ce sujet, si vous pouvez le prêter. '\ N \ n'y suis mais un humble gardien de ce temple, pas l'un des dieux, mais je ferai ce que je peux. Dis-moi, docteur. De quoi avez-vous besoin? '\ N \ n'i aimerait en savoir autant que vous pouvez me dire sur les premiers jours de cette infection. Qui a été le premier à succomber? Où? Avez-vous une pensée d'où cela pourrait provenir? '\ N \ N'only Les Divins pourraient avoir la réponse à certaines de ces questions, mais oui, je connais beaucoup sur les gens ici. Viens, viens. J'ai pris mes propres écrits, après tout."
 panum.166.g_christian: "La propreté est à côté de la piété."
 panum.166.g_muslim: "Il y a un remède pour chaque maladie."
 panum.166.g_other: "Sachez bien ce qui vous fait avancer et ce qui vous retient."
 panum.167.t: "En toute sécurité désolé"
 panum.167.d: "Dans le but de rester en sécurité tout en menant leur enquête, le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a isolé [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself] en toute sécurité de l'infecté."
 panum.167.f: "«Il y en a qui appelleraient cette lâcheté. Je l'appellerais le pragmatisme. Ce n'est pas une bataille qui peut être gagnée rapidement, où l'on peut simplement empêcher une baïonnette dans le ventre de l'ennemi et les laisser mourir rapidement. C'est un combat plus difficile, contre un ennemi que nous ne pouvons ni voir ni entendre, mais qui pourrait être n'importe où autour de nous. \ N \ nto manque de protection appropriée est une folie. L'isolement est la plus grande clé. La nourriture et l'eau des zones sûres, un endroit propre pour étudier et tous les contacts avec les infectés et leurs biens réalisés par le biais d'intermédiaires. À l'abri des maladies, je peux rechercher en paix et concentrer tous mes efforts sur la découverte de la vérité derrière cette maladie. '\ N \ nfrom du Journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], écrivant de la grande épidémie de choléra de [TimeKeeper.GetCurrentDate.Format('y')], enquêtant sur [SCOPE.sState('panum_disease_state').GetCityHubName]."
 panum.167.g: "... mais même [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] devra éventuellement salir les mains [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]"
 panum.168.t: "Travail agité"
 panum.168.d: "Déterminé à se rendre à la base de l'épidémie de choléra, Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a travaillé particulièrement en retard."
 panum.168.g: "Ensuite, par tous les moyens, promenons ces rues ensemble, constable."
 je_panum_cholera_treatment_goal: ""
 je_panum_germ_theory: "Germes et miasme"
 je_panum_germ_theory_reason: "Hippocrate de KOS est considéré comme le fondateur de la théorie des miasmes, les exhalations toxiques du sol qui sont emportées dans l'air et contribuent ainsi à la propagation des maladies. Au 19e siècle, en raison d'un manque de connaissances sur les bactéries et les virus, les médecins et les chercheurs ont simplement attribué des épidémies telles que le choléra à de mauvaises odeurs qui se sont propagées via des «miasmes». Cette théorie s'est révélée plus tard être une mauvaise voie en médecine, bien que le modèle de miasme ait déjà expliqué en partie d'où proviennent les épidémies et comment elles se propagent. Le conflit entre les contagionnistes, qui a revendiqué une infection humaine à humaine, et les anticontagionnistes, les partisans de la théorie du miasme, était parfois amer au milieu du 19e siècle. Les faiblesses du modèle MIASM ont été reconnues à Londres, bien que les règles de fortune pour traiter les miasmes, telles que la propreté et l'isolement, aient limité les épidémies dans une certaine mesure. \ N \ NSHALD Une nation trouvera des preuves suffisantes en faveur de la théorie des germes et contre la théorie de la miasme, puis ce changement de paradigme permettra de moins d'événements négatifs dans la recherche de méthodes de traitement ou d'épidémie. Le premier découvreur de la théorie des germes reçoit un bonus de recherche supplémentaire."
 je_panum_germ_theory_goal: ""
 notification_panum_germ_theory_notification_name: "Percée de la théorie des germes"
 notification_panum_germ_theory_notification_desc: "Un [concept_panum_physician] de [GetGlobalVariable('panum_germ_theory_invented_global_var').GetCountryDefinition.GetName] a, pour la première fois, en mesure de justifier de manière concluante la théorie des germes dans toutes ses facettes. La théorie du miasme a été complètement rejetée."
 panum.11.t: "La théorie des germes"
 panum.11.d: "Compte tenu des preuves écrasantes de la théorie des germes et des preuves tout aussi écrasantes contre la théorie du miasme, un changement de paradigme médical s'est produit. Il n'est pas le moins grâce au Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] que la théorie des germes s'est maintenant établie."
 panum.11.f: "La théorie du miasme est un exemple typique d'une thèse scientifique difficile à réfuter, car elle est vraisemblablement confirmée partout. Le fait que les réglementations de nettoyage et d'hygiène pour «l'air pur» ont permis que certaines maladies disparaissent réellement sembler confirmées au 19e siècle. Dans le même temps, il a empêché la science médicale de faire des percées dans une grande variété de domaines parce que les vraies causes et donc les méthodes de guérison réelles sont restées inconnues. Désormais, les médecins auront un plus grand succès à trouver des méthodes de traitement - et le chemin est clair pour la recherche sur les agents pathogènes et les vaccins."
 panum.11.g: "Mais voulions-nous vraiment savoir ce qui se passe dans l'eau ...?"
 panum.53.t: "Le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] se rend à l'état épidémique"
 panum.53.f: "Les méthodes de traitement sont l'étape la plus importante dans la lutte contre une maladie. C'est la base d'un futur vaccin possible qui peut empêcher une épidémie. Cependant, même une méthode de traitement réussie est suffisamment forte pour contenir de futures épidémies et minimiser leur longueur et leur gravité - ce qui se traduit par un nombre significativement inférieur de victimes. Les médecins qui étudient une épidémie dans leur propre pays travaillent plus efficacement que les médecins en voyage à l'étranger."
 panum.53.g: "Cette horreur doit se terminer!"
 panum.54.t: "Expédition de recherche médicale"
 panum.54.d: "Le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a mis en place une petite équipe d'experts et d'assistants qui conviennent pour étudier intensivement une épidémie à l'étranger et éventuellement développer une nouvelle méthode de traitement. La question se pose désormais de quelle maladie doit être observée dans quel pays."
 notification_panum_epidemic_spread_notification_name: "L'épidémie se propage"
 notification_panum_epidemic_spread_notification_desc: "L'épidémie s'est propagée à un autre État malgré nos meilleurs efforts."
 panum_add_germ_theory_effect_tt: "[concept_panum_germ_theory] remplace #ORANGE miasma théorie#! comme paradigme médical commun."
