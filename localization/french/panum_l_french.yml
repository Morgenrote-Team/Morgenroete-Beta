 panum.1100.t: "La grippe [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective]" #NT!
 panum.1100.d: "Plusieurs hôpitaux, cliniques et cabinets médicaux ont signalé un nombre inhabituellement élevé de cas d'une étrange maladie qu'ils ont d'abord pris pour une grippe ordinaire. Les lits des grues sont désormais surchargés et les salles communes doivent être évacuées. Les pires craintes se confirment : il s'agit apparemment de la redoutable grippe [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] qui a frappé les pays voisins." #NT!
 panum.1100.f: "Au début, les médecins parlaient d'une épidémie de grippe normale. Les premiers jours, la presse prétendait qu'il s'agissait d'une étrange maladie épidémique, mais qu'elle était inoffensive et sans décès. Mais c'est tout le contraire. Chaque jour, l'épidémie de grippe atteint une nouvelle ville, une nouvelle région et exige une réorganisation complète des soins médicaux. Là où hier deux hommes souffraient de symptômes dans une caserne, ils sont déjà 700 aujourd'hui. Le caractère sinistre de la maladie se reflète dans le fait qu'elle ne tue pas les enfants et les personnes âgées comme d'habitude, mais plutôt les jeunes entre 20 et 40 ans. Un malade sur vingt ne survit pas à la grippe. D'où vient-elle, comment est-elle apparue, ce qu'elle est : cette pandémie reste un mystère. Mais ce qui se dessine déjà, c'est que cette grippe pourrait complètement changer la normalité telle que nous la connaissions auparavant. L'appel à l'action gouvernementale se fait de plus en plus fort. Comment [GetPlayer.GetName] va-t-il réagir à cela ?" #NT!
 panum.1100.g: "C'est une maladie bénigne, n'est-ce pas ?" #NT!
 panum.1101.t: "La grippe espagnole" #NT!
 panum.1101.d: "Plusieurs hôpitaux, cliniques et cabinets médicaux ont signalé un nombre inhabituellement élevé de cas d'une étrange maladie qu'ils ont d'abord cru être une grippe ordinaire. Les lits des grues sont désormais surchargés et les salles communes doivent être vidées. Les pires craintes se confirment : il s'agit apparemment d'une pandémie d'une ampleur jusqu'alors inconnue." #NT!
 panum.1101.f: "La grippe espagnole est une pandémie provoquée par un dérivé du virus de la grippe, d'une virulence inhabituelle. Elle s'est propagée en trois vagues entre 1918 et 1920, faisant entre 20 et 50 millions de morts, pour une population mondiale estimée entre 1,8 milliard et 100 millions de personnes.\nCela signifie que la grippe espagnole a fait plus de morts que les actes de guerre de la Première Guerre mondiale (environ 17 millions de morts). Au total, environ 500 millions de personnes ont été infectées, ce qui correspond à un taux de mortalité de 5 à 10 %, nettement supérieur à celui des maladies causées par d'autres agents pathogènes de la grippe.\n\nLa grippe espagnole avait la particularité de toucher plutôt les jeunes (entre 20 et 40 ans), alors que les virus grippaux mettent particulièrement en danger les jeunes enfants et les personnes âgées. La grippe est devenue « espagnole » lorsque le 29 juin 1918, le directeur de la santé publique espagnol Martín Salazar a annoncé qu'il n'avait pas de rapport sur une maladie comparable dans le reste de l'Europe. À partir de la fin du mois de juin 1918, la presse internationale a de plus en plus utilisé le terme de « grippe espagnole », qui a également été encouragé par certains gouvernements belligérants afin de dissimuler la propagation réelle de la maladie. Elle est considérée comme la « mère de toutes les pandémies »." #NT!
 panum.1101.g: "Alors les gens parlent déjà de la grippe espagnole ?" #NT!
 panum.1102.t: "La grande pandémie" #NT!
 panum.1102.d: "Plusieurs hôpitaux, cliniques et cabinets médicaux ont signalé un nombre inhabituellement élevé de cas d'une étrange maladie qu'ils ont d'abord cru être une grippe ordinaire. Les lits des grues sont désormais surchargés et les salles communes doivent être vidées. Les pires craintes se confirment : il s'agit apparemment d'une pandémie d'une ampleur jusqu'alors inconnue." #NT!
 panum.1102.f: "Au début, les médecins parlaient d'une épidémie de grippe normale. Les premiers jours, la presse prétendait qu'il s'agissait d'une étrange maladie épidémique, mais qu'elle était inoffensive et sans décès. Mais c'est tout le contraire. Chaque jour, l'épidémie de grippe atteint une nouvelle ville, une nouvelle région et exige une réorganisation complète des soins médicaux. Là où hier deux hommes souffraient de symptômes dans une caserne, ils sont déjà 700 aujourd'hui. Le caractère sinistre de la maladie se reflète dans le fait qu'elle ne tue pas les enfants et les personnes âgées comme d'habitude, mais plutôt les jeunes entre 20 et 40 ans. Un malade sur vingt ne survit pas à la grippe. D'où vient-elle, comment est-elle apparue, ce qu'elle est : cette pandémie reste un mystère. Mais ce qui se dessine déjà, c'est que cette grippe pourrait complètement changer la normalité telle que nous la connaissions auparavant. L'appel à l'action gouvernementale se fait de plus en plus fort. Comment [GetPlayer.GetName] va-t-il réagir à cela ?" #NT!
 panum.1102.g: "Alors les gens parlent déjà de la grippe [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] ?" #NT!
 panum.1103.t: "Politique de pandémie" #NT!
 panum.1103.a.tt: "Des mesures strictes étoufferont l’économie, mais ont de meilleures chances de prendre effet plus tôt et de stopper la pandémie dans au moins certains États." #NT!
 panum.1103.b.tt: "Ces mesures prendront beaucoup plus de temps à entrer en vigueur et à produire un impact, mais l’économie en souffrira moins." #NT!
 panum.1103.c.tt: "La pandémie suit son cours naturel et les mesures établies sont complètement abolies." #NT!
 panum.1104.t: "[GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] La grippe dans [SCOPE.sState('panum_flu_fading_state').GetName] s'estompe" #NT!
 panum.1104.d: "Apparemment, les restrictions du [SCOPE.sState('panum_flu_fading_state').GetName] ont eu leurs premiers effets. Après quelques semaines, on constate une baisse du nombre de décès." #NT!
 panum.1104.f: "Dans certaines conditions, une pandémie peut s'atténuer dans un État au bout de quelques semaines. Des mesures strictes, un bon système de santé, un médecin de premier ordre ou des techniques médicales très développées contribuent à amorcer ce processus." #NT!
 panum.1104.g: "Un signe d'espoir." #NT!
 panum.1105.t: "[GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] La grippe dans [SCOPE.sState('panum_flu_disappearing_state').GetName] disparaît" #NT!
 panum.1105.d: "Après que la pandémie ait sensiblement diminué au cours des dernières semaines en [SCOPE.sState('panum_flu_disappearing_state').GetName], aucun nouveau cas n'a été enregistré ces jours-ci. La région est totalement exempte de grippe !" #NT!
 panum.1105.f: "Pour qu'une pandémie disparaisse complètement d'un État, il faut qu'elle ait déjà disparu. Il est alors possible qu'une région soit débarrassée de la grippe avant la fin de la pandémie proprement dite. Des mesures rigoureuses, un bon système de santé, un médecin de premier ordre ou des techniques médicales très développées aident à se débarrasser de la grippe." #NT!
 panum.1105.g: "Les mesures ont-elles contribué à cela ?" #NT!
 panum.1106.t: "Victime de la grippe [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective]" #NT!
 panum.1106.d: "[SCOPE.sCharacter('panum_pandemic_victim').GetFullName] a contracté la grippe [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] il y a quelques jours et connaît une évolution sévère de la maladie. Les médecins s'attendent au pire." #NT!
 panum.1106.f: "« Vers midi, j’ai commencé à avoir chaud. J’avais tellement de fièvre que j’avais peur de mettre le feu à mes vêtements. J’avais une toux qui me déchirait les entrailles, car je ne pouvais pas la contrôler. Il faisait sombre ; j’avais sûrement une pneumonie et je n’avais jamais été aussi désespéré et mal à l’aise de ma vie. … Puis j’ai découvert que je transpirais à grosses gouttes et que, alors que j’aurais dû être plus à l’aise, j’étais plus malheureux que jamais. Quand la lumière est finalement arrivée, j’étais un spécimen de misère – je ne pouvais pas respirer sans une toux atroce et il n’y avait plus d’espoir en moi. » - Franklin Martin, survivant de la grippe [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective]" #NT!
 panum.1106.g: "Nous ne pouvons rien faire." #NT!
 panum.1107.t: "Les rapports sur la grippe créent un sentiment anti-guerre" #NT!
 panum.1107.d: "Les rapports faisant état de nombreux décès dus à la grippe aviaire en [SCOPE.sState('panum_disease_state').GetName] nuisent au soutien populaire à nos efforts de guerre." #NT!
 panum.1107.f: "« C'est une folie d'envoyer des hommes à la guerre alors que ce fléau ravage nos foyers. L'État ne devrait-il pas donner la priorité à la vie de ses citoyens plutôt qu'à leur mort ? »" #NT!
 panum.1107.g: "Nous n’interférerons pas avec la presse libre." #NT!
 panum.1107.h: "Diffusez une propagande rassurante appuyée par la science médicale." #NT!
 panum.1107.i: "Censurer les informations sur les taux de mortalité et les infections." #NT!
 panum.1108.t: "Les mesures de lutte contre la pandémie contribuent à la pauvreté" #NT!
 panum.1108.d: "Alors que de nombreuses personnes ne peuvent plus travailler en raison des mesures de lutte contre la pandémie, les citoyens les plus pauvres du [SCOPE.sState('panum_disease_state').GetName] ont du mal à payer leur loyer. Les travailleurs nouvellement au chômage risquent d'être expulsés, car les propriétaires refusent leurs demandes de sursis." #NT!
 panum.1108.f: "« Ils m'ont dit que je ne pouvais pas travailler parce que l'usine était surpeuplée. Toutes les usines sont surpeuplées ! Le propriétaire, qu'il brûle dans les flammes éternelles, ne se soucie pas le moins du monde de notre situation et exige le paiement du loyer avant la fin de la semaine sous peine d'expulsion. Ma famille sera certainement chassée de chez nous. »" #NT!
 panum.1108.g: "Instaurer un gel des loyers et une interdiction d’expulsion." #NT!
 panum.1108.h: "Augmenter temporairement la sécurité sociale." #NT!
 panum.1108.i: "Nous ne pouvons rien y faire." #NT!
 panum.1109.t: "La Ligue Anti-Masque" #NT!
 panum.1109.d: "[SCOPE.sCharacter('anti_mask_ig_leader').GetFullName] a formé la Ligue Anti-Masque en opposition à nos mesures de lutte contre la pandémie. Ils contestent l'efficacité de nos politiques et exigent que nous les révoquions au nom de l'économie en difficulté." #NT!
 panum.1109.f: "« Portez un masque et sauvez votre vie ! L'urgence à laquelle notre pays est actuellement confronté dépasse les capacités du ministère de la Santé. Ceux qui ne portent pas de masque tombent malades. L'homme, la femme ou l'enfant qui refuse de porter un masque est un dangereux fainéant ! »" #NT!
 panum.1109.g: "Ignorez la Ligue." #NT!
 panum.1109.h: "Abandonner les mesures anti-peste." #NT!
 panum.1109.i: "Discréditer la Ligue avec la science médicale." #NT!
  
 panum.1120.t: "La grippe [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] se termine" #NT!
 panum.1120.d: "Beaucoup n'espéraient plus que ce jour viendrait. Après de nombreux mois, comme jamais auparavant, la grippe [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] disparaît peu à peu de notre pays. Il s'agit vraiment de la mère de toutes les pandémies !" #NT!
 panum.1120.f: "« L'interdiction a été levée aujourd'hui. Plus de masques. Tout est ouvert aussi. Le roman de Tarzan est diffusé au Coliseum [movie theater] comme il y a environ 6 semaines. J'aimerais vraiment le voir. L'école ouvre cette semaine, jeudi ! Et vous ? Comme s'ils n'avaient pas pu attendre lundi ! » - Violet Harris, survivante de la grippe [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective]" #NT!
 panum.1120.g: "Nous espérons qu’elle ne reviendra jamais." #NT!
  
 je_panum_spanish_flu: "La grippe [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective]" #NT!
 je_panum_spanish_flu_reason: "La grippe [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] est une pandémie de grippe provoquée par un dérivé inhabituellement virulent du virus de la grippe, apparue au début du XXe siècle, qui a fait entre 20 et 50 millions de morts, avec des estimations allant d'une population mondiale d'environ 1,8 milliard à 100 millions de personnes. Au total, environ 500 millions de personnes auraient été infectées, ce qui se traduit par un taux de mortalité de 5 à 10 %, ce qui est nettement plus élevé que celui des maladies causées par d'autres agents pathogènes de la grippe.\n\nUne particularité de la grippe [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] était qu'elle touchait plutôt les jeunes (entre 20 et 40 ans), alors que les virus grippaux mettent particulièrement en danger les jeunes enfants et les personnes âgées. Elle est considérée comme la « mère de toutes les pandémies ». La grippe est devenue « [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] » lorsque le directeur de la santé [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] a annoncé qu'il n'avait pas de rapports sur une maladie comparable dans le reste du monde. À partir de ce moment-là, la presse internationale a de plus en plus utilisé le terme de « grippe [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] », encouragé également par certains gouvernements afin de dissimuler la véritable propagation du virus." #NT!
 panum_remove_spanish_flu_effect_tt: "Abroge toutes les politiques liées à la pandémie et leurs effets." #NT!
  
 panum_recent_pandemic_policy_change_modifier: "Changement récent de politique face à la pandémie" #NT!
 panum_spanish_flu_lockdown_modifier: "Confinement pandémique" #NT!
 panum_spanish_flu_measures_modifier: "Mesures de lutte contre la pandémie" #NT!
 panum_spanish_flu_fading_modifier: "La pandémie s'estompe" #NT!
  
 panum.2600.t: "Un nouvel asile" #NT!
 panum.2600.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a célébré aujourd'hui l'inauguration du nouvel asile psychiatrique avec un discours." #NT!
 panum.2600.f: "De nombreuses personnalités étaient présentes à l'inauguration, dont des hommes politiques de l'opposition. Tandis que le médecin exposait les nouvelles méthodes et toute une série de symptômes clairs qui avaient conduit à l'admission dans la clinique, les opposants sceptiques au gouvernement soupçonnaient qu'une telle institution pouvait également être propice aux abus." #NT!
 panum.2600.g: "Enfin le bon endroit pour les politiques, les journalistes, les acteurs..." #NT!
  
 panum.2601.t: "Une admission psychiatrique urgente" #NT!
 panum.2601.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a préparé un rapport montrant que [SCOPE.sCharacter('chosen_character').GetFullName] a besoin de soins de santé mentale urgents. Malheureusement, [SCOPE.sCharacter('chosen_character').GetLastName] passera de nombreuses années dans un asile psychiatrique. Peut-être... de très nombreuses années." #NT!
 panum.2601.f: "« Comme il peut arriver un jour qu'il faille trouver une victime, j'ai une petite liste, j'ai une petite liste, de délinquants de la société qui pourraient bien être dans la clandestinité, et qui ne manqueraient jamais, qui ne manqueraient jamais ! Il y a les nuisibles pestilentiels qui écrivent pour des autographes, tous les gens qui ont les mains flasques et des rires irritants, tous les enfants qui sont en rendez-vous et qui vous mettent à terre, toutes les personnes qui, en vous serrant la main, vous serrent la main comme ça, et toutes les tierces personnes qui, pour gâcher les tête-à-tête, insistent pour qu'aucun d'entre eux ne leur manque, aucun d'entre eux ne leur manque ! »" #NT!
 panum.2601.g: "[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] les a sur la liste — Et aucun d'entre eux ne leur manquera !" #NT!
 panum.2601.tt: "[SCOPE.sCharacter('chosen_character').GetFullName] disparaît à jamais dans les méandres de l'asile psychiatrique..." #NT!
  
 panum_physician_recent_asylum_conducted_modifier: "Admission récente à l'asile psychiatrique" #NT!
 panum_send_leader_to_asylum_modifier: "L'abus politique de la psychiatrie" #NT!
  
 panum_checkmark_loc: "@green_checkmark!" #NT!
 panum_cross_loc: "@croix_rouge!" #NT!
  
 panum.21.t: "Dispersion des malades" #NT!
 panum.21.d: "On attribue au docteur Hasnebein le mérite d'avoir développé un système moderne permettant de trier les malades et les blessés en fonction de la gravité de leurs blessures, augmentant ainsi les chances de survie du patient." #NT!
 panum.21.f: "Le chirurgien russe Nikolaï Ivanovitch Pirogov, qui a vécu la guerre du Caucase et la guerre de Crimée, a développé des procédures de traitement chirurgical graduées et le principe de « dispersion des malades » (traitement réparti des blessés et des malades) pour organiser les salles de pansements surchargées et répartir les blessés en cinq étapes (principe de sélection de Pirogov). L'armée prussienne a adopté le principe russe en 1866, et il a ensuite été également appliqué aux autres services médicaux des armées alliées en Europe. Au cours des développements ultérieurs, de nombreuses avancées en médecine et en méthodes chirurgicales ont également été transférées à l'organisation du service médical militaire. Cependant, le principe de Pirogov est resté intact pendant la Première Guerre mondiale." #NT!
 panum.21.g: "Il y a donc une hiérarchie des malades ?" #NT!
 panum.22.t: "Un traitement contre le paludisme" #NT!
 panum.22.d: "En extrayant efficacement la quinine de l’écorce de l’arbre à quinquina, le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a inventé une méthode de traitement qui aide contre le paludisme." #NT!
 panum.22.f: "Les jésuites avaient déjà le monopole de fait de l'utilisation du quinquina pour soigner le paludisme à l'époque moderne, même si au début il y avait des réserves dans certains pays protestants. Au début du XIXe siècle, peu après la découverte de la morphine, la quinine fut trouvée comme ingrédient déterminant l'efficacité de l'écorce de quinquina et en fit une pierre angulaire de la chimie végétale naissante. Elle fut produite à l'état impur par Antoine François de Fourcroy en 1792 et isolée de l'écorce de quinquina en 1820 par Pierre Joseph Pelletier et Joseph Bienaimé Caventou par extraction à l'alcool. En 1823, la quinine fut obtenue pour la première fois à l'échelle industrielle à partir de l'écorce de l'espèce Cinchona par le pharmacien Friedrich Koch à Oppenheim. La quinine stimula par la suite la recherche en chimie végétale." #NT!
 panum.22.g: "Un médicament précieux." #NT!
 panum.23.t: "Juste une catégorie différente de patients" #NT!
 panum.23.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a envoyé aujourd'hui une lettre urgente au gouvernement. Dans celle-ci, [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] critique le traitement réservé aux malades mentaux et préconise de les traiter comme des patients qui méritent un meilleur traitement, et non comme des personnes asociales qui doivent être exclues de la société." #NT!
 panum.23.f: "Le premier pas décisif vers le traitement psychologique des malades a eu lieu au XVIIIe siècle, lorsque les malades mentaux et les condamnés ordinaires n'étaient plus « enfermés » dans les mêmes chambres, mais dans des institutions séparées. Ces dernières étaient encore bien en deçà de tout standard humain. Une étape supplémentaire a été franchie lorsque les lourdes chaînes de glace avec lesquelles les aliénés étaient enchaînés ont été abolies au profit d'une plus grande liberté de mouvement. Dès le début du XIXe siècle, il est devenu évident que ces personnes étaient également malades et avaient droit à un traitement. En Angleterre, la loi sur l'aliénation mentale de 1845 a constitué un jalon important, car elle a explicitement changé le statut des malades mentaux en celui de patients." #NT!
 panum.23.g: "La vie mentale de ces personnes compte également." #NT!
 panum.24.t: "Connaissances médicales et infirmières" #NT!
 panum.24.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] nous rappelle que le personnel moins qualifié est parfois d’une grande utilité comme infirmier pour les nombreuses victimes sur le champ de bataille, et plaide pour un recours accru aux femmes comme infirmières." #NT!
 panum.24.f: "Alors que dans d'autres pays européens, notamment en France et en Allemagne, les ordres catholiques se donnaient pour mission de former des infirmières, ce n'était pas le cas en Grande-Bretagne ou dans d'autres pays protestants. Très peu de monastères et d'ordres survécurent à la Réforme anglaise. Le public britannique en prit douloureusement conscience grâce aux publications de Florence Nightingale. La formation du personnel infirmier était alors considérée comme une tâche nationale pour laquelle on collectait des dons. La Nightingale School of Nursing de l'hôpital St Thomas de Londres, fondée par Florence Nightingale, devint le noyau de cette professionnalisation. Avec sa phrase « Les médecins s'occupent des maladies, les infirmières s'occupent des personnes », elle aurait posé les bases d'une philosophie des soins infirmiers." #NT!
 panum.24.g: "Les femmes au premier plan." #NT!
  
 je_panum_spanish_flu_research: "La grippe [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] : la recherche" #NT!
 je_panum_spanish_flu_research_reason: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a décidé d'enquêter plus en détail sur la mystérieuse pandémie. Personne ne sait quel sera le succès de [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe]. Cependant, un médecin expérimenté devrait avoir plus de chances d'obtenir un résultat." #NT!
 je_panum_spanish_flu_research_complete_tt: "Un [concept_panum_physician] peut acquérir de nouvelles connaissances à partir de la pandémie : par exemple, le lieu d’origine, une description de la maladie ou encore l’agent pathogène." #NT!
  
 state_harvest_condition_panum_spanish_flu_condition_impact_mult: "[GetHarvestConditionType('panum_spanish_flu_condition').GetName] [concept_panum_disease] Impact" #NT!
 state_harvest_condition_panum_spanish_flu_condition_impact_mult_desc: "Une augmentation ou une diminution de l’impact de la pandémie." #NT!
 panum_spanish_flu_physician_help_modifier: "Un médecin lutte contre la pandémie" #NT!
  
 panum.1110.t: "Le docteur et la pandémie" #NT!
 panum.1110.d: "L'apparition de la pandémie est une heure cruciale pour le Docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] : désormais [ROOT.Var('panum_physician_var').GetCharacter.GetGetSheHe] peut briller ! Mais la question se pose : vaut-il mieux lutter activement contre la pandémie ou faire des recherches à son sujet ?" #NT!
 panum.1110.f: "« Le jour où il est devenu évident que nous n'allions pas avoir affaire à une vague de grippe ordinaire, j'ai ressenti une grande motivation pour faire ma part. Et en même temps, j'ai senti un poids énorme sur mes épaules. Les attentes étaient énormes. Serais-je un jour capable de réaliser les espoirs qu'on plaçait en moi ? »\n\nEntrée de journal de [ROOT.Var('panum_physician_var').GetCharacter.GetFullName]" #NT!
 panum.1110.g: "Combattez la pandémie." #NT!
 panum.1110.h: "Faites des recherches sur la pandémie." #NT!
 panum.1111.t: "Agent pathogène de la pandémie" #NT!
 panum.1111.d: "Notre médecin-chef, le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], et notre biologiste en chef, le docteur [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName], ont fait une brillante découverte aujourd'hui : ils ont découvert l'agent pathogène qui cause la grippe [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] !" #NT!
 panum.1111.f: "Le virus de la grippe A H1N1 (A/H1N1) désigne un sous-type du virus de la grippe A (espèce Alphainfluenzavirus influenzae) de la famille des Orthomyxoviridae, présent chez les canards, les humains et les porcs, mais qui infecte également de nombreuses autres espèces de mammifères. Les virus de la grippe H1N1 se sont établis chez les humains et les porcs à la suite de la grippe espagnole de 1918. Ce sous-type a causé des dizaines de millions de décès humains.\n\nLors de la grippe espagnole, l'agent pathogène était encore inconnu. Certains chercheurs avaient déjà soupçonné un « virus filtrable ». Dans les manuels scolaires, la bactérie désormais appelée Haemophilus influenzae était considérée comme la cause de la grippe. Cependant, aucun agent pathogène n'a pu être détecté à l'aide des méthodes habituelles de la bactériologie : il n'a pu être coloré ni cultivé sur des milieux de culture artificiels. Si la grippe espagnole a permis une avancée dans les connaissances, c'est dans la mesure où l'agent pathogène de cette variante de la grippe était encore inconnu à l'époque, ce qui a permis d'exclure l'hypothèse d'une bactérie comme Haemophilus influenzae. Ce n'est qu'en 1996 que le génome du virus a été séquencé." #NT!
 panum.1111.g: "Heureka !" #NT!
 panum.1112.t: "Origine de la pandémie" #NT!
 panum.1112.d_historical: "Après une enquête scientifique exceptionnelle qui combine histoire, criminologie et connaissances médicales, le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a fait une découverte révolutionnaire : la pandémie n'a pas éclaté en Espagne, comme on le prétend souvent, mais en Amérique !" #NT!
 panum.1112.f_historical: "La découverte du médecin est précédée d'une enquête minutieuse. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] a comparé les dossiers des patients et a remonté jusqu'aux premiers cas survenus dans notre pays afin de reconstituer un réseau d'infections. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] a également recueilli des données auprès de collègues à l'étranger et leur a parfois rendu visite lui-même. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] a évalué les conclusions d'autres médecins qui ont entrepris des efforts similaires dans leur pays. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] ne peut pas dire avec certitude où la première infection a eu lieu, mais tout indique que c'est dans l'État du Kansas. Que la maladie se soit effectivement déclarée en Amérique est désormais un fait scientifique." #NT!
 panum.1112.g_historical: "Cela signifie-t-il que nous devrions parler de la grippe américaine ?" #NT!
 panum.1112.d_dynamic: "Après une enquête scientifique exceptionnelle mêlant histoire, criminologie et connaissances médicales, le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a fait une découverte révolutionnaire : la pandémie n’a pas éclaté en [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetName], comme on le prétend si souvent, mais en [SCOPE.sCountry('panum_pandemic_country').GetName] !" #NT!
 panum.1112.f_dynamic: "La découverte du médecin est précédée d'une enquête minutieuse. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] a comparé les dossiers des patients et remonté jusqu'aux premiers cas dans notre pays afin de reconstituer un réseau d'infections. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] a également recueilli des données auprès de collègues à l'étranger et leur a parfois rendu visite lui-même. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] a évalué les conclusions d'autres médecins qui ont entrepris des efforts similaires dans leur pays. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] ne peut pas dire avec certitude où la première infection a eu lieu. Que la maladie se soit effectivement déclarée en [SCOPE.sCountry('panum_pandemic_country').GetNameNoFormatting] est désormais un fait scientifique." #NT!
 panum.1112.g_dynamic: "Cela veut-il dire que nous devrions parler de la grippe [SCOPE.sCountry('panum_pandemic_country').GetAdjectiveNoFormatting] ?" #NT!
 panum.1113.t: "Traitement de la pandémie" #NT!
 panum.1113.d: "Au cours de ses recherches sur la grippe [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective], le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a inventé plusieurs remèdes et pratiques et a élaboré un plan d'action pour contenir la maladie. Bien que ces découvertes arrivent trop tard, elles peuvent être utiles aux générations futures." #NT!
 panum.1113.f: "« Je me sens beaucoup mieux et je suis habillée aujourd'hui. Presque épuisée par l'inquiétude et le manque de sommeil. Tant de maladies et de morts cette semaine, mais un grand rayon de lumière et d'espoir sur l'issue de la guerre alors que la paix est revenue l'an dernier. » - Helen Viola Jackson Kent, survivante de la grippe [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective]" #NT!
 panum.1113.g: "Eh bien, nous avons appris quelque chose." #NT!
 panum.1114.t: "Description de la pandémie" #NT!
 panum.1114.d: "Malheureusement, le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] n'a pas fait beaucoup de progrès pendant la pandémie. Cependant, [ROOT.Var('panum_physician_var').GetCharacter.GetGetSheHe] a rédigé une description de la maladie qui pourrait éventuellement être utile pour reconnaître les symptômes des variantes de la grippe [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective]." #NT!
 panum.1114.f: "« Ces hommes commencent par ce qui semble être une attaque de grippe et lorsqu'ils sont amenés à l'hôpital, ils développent très rapidement le type de pneumonie le plus visqueux qui ait jamais été observé. Deux heures après leur admission, ils ont des taches acajou sur les os des joues et quelques heures plus tard, on peut commencer à voir la cyanose s'étendre de leurs oreilles à tout le visage, jusqu'à ce qu'il soit difficile de distinguer les hommes de couleur des blancs. Ce n'est qu'une question de quelques heures avant que la mort ne survienne et il s'agit simplement d'une lutte pour respirer jusqu'à ce qu'ils suffoquent. C'est horrible. On peut supporter de voir un, deux ou vingt hommes mourir, mais voir ces pauvres diables tomber comme des mouches, ça vous tape sur les nerfs. » - N. Roy Grist, survivant de la grippe [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective]" #NT!
 panum.1114.g: "Nous nous attendions à un peu plus." #NT!
 panum.1115.t: "Le mystère de la pandémie" #NT!
 panum.1115.d: "Malheureusement, le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] n'a pas été à la hauteur des exigences de la pandémie. [ROOT.Var('panum_physician_var').GetCharacter.GetGetSheHe|U] n'a pas pu trouver de réponses sur l'origine, la manière de combattre ou de décrire la maladie. Mais le docteur a écrit un petit poème." #NT!
 panum.1115.f: "« J'avais un petit oiseau, qui s'appelait Enza. J'ai ouvert la fenêtre et j'ai eu la grippe. »" #NT!
 panum.1115.g: "Décevant." #NT!
  
