 panum.2621.t: "Le concept d'anxiété"
 panum.2621.d: "Søren Kierkegaard, le principal philosophe du Danemark, a publié «le concept d'anxiété», un travail esthétique, philosophique et psychologique qui a retenu l'attention du public de Copenhague."
 panum.2621.f: "«La possibilité de la liberté n'est pas la capacité de choisir le bien ou le mal. La possibilité est de pouvoir. Dans un système logique, il est pratique de dire que la possibilité passe dans la réalité. Cependant, en réalité, ce n'est pas si pratique et un terme intermédiaire est requis. Le terme intermédiaire est l'anxiété, mais il n'explique pas plus le saut qualitatif qu'il ne peut le justifier de manière éthique. L'anxiété n'est ni une catégorie de nécessité ni une catégorie de liberté; Il est enchevêtré la liberté, où la liberté n'est pas libre en soi mais enchevêtrée, non pas par nécessité, mais en soi. -Søren Kierkegaard"
 panum.2621.g: "L'un des plus grands esprits du Danemark."
 panum.2621.h: "Kierkegaard deviendra le nouvel écrivain national du Danemark."
 panum.2622.t: "L'étrange cas de [SCOPE.sCharacter('panum_phineas_gage').GetFullName]"
 panum.2622.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a enquêté sur l'étrange cas du contremaître [SCOPE.sCharacter('panum_phineas_gage').GetFullName]. Au cours d'une explosion, une tige de fer a chuté de bas en haut à travers son crâne, créant un grand canal enroulé. Selon le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], il a été physiquement récupéré après quelques semaines, et ses capacités intellectuelles, notamment la perception, la mémoire, l'intelligence, la capacité linguistique, ainsi que ses habiletés motrices étaient complètement intactes. Cependant, au cours de la période qui a suivi l'accident, [SCOPE.sCharacter('panum_phineas_gage').GetLastName] a connu des changements de personnalité notables."
 panum.2622.f: "«Horrible accident. - Comme [SCOPE.sCharacter('panum_phineas_gage').GetFullName], un contremaître sur le chemin de fer en [SCOPE.sState('panum_phineas_gage_state').GetName], était hier engagé dans le tampon pour une explosion, la poudre a explosé, portant un instrument de fer à travers la tête d'un pouce et une quatrième circonférence, et trois pieds et huit pouces de longueur, qu'il utilisait à l'époque. The iron entered on the right side of his face, shattering the upper jaw, and passing back of the left eye, and out at the top of the head.\n\nThe most singular circumstance connected with this melancholy affair is, that he was alive at two o'clock this afternoon, and in full possession of his reason, and free from pain.\n\nThe [ROOT.GetCountry.GetCapital.GetCityHubName] Chronicle"
 panum.2622.g: "Les zones de psyché et de cerveau sont donc connectées?"
 panum.2623.t: "Psychologie transculturelle"
 panum.2623.d: "Lors d'une visite au [SCOPE.sState('panum_colonial_state').GetName], le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a été étonné de constater que les maladies mentales, telles que celles qui se produisent fréquemment dans [ROOT.GetCountry.GetCapital.GetCityHubName], se produisent à peine dans ce domaine."
 panum.2623.f: "Emil Krapelin s'est rendu à Java pendant quatre mois en 1904 et a examiné 225 personnes dans l'asile mental Buitenzorg (maintenant Bogor). En tant que seul psychiatre de premier plan de son temps qui était intéressé à enquêter sur les phénomènes transculturels en psychiatrie, il voulait découvrir, d'une part, si certaines formes de folie, qui forment le contenu principal de nos institutions, existent également dans des conditions de vie complètement différentes et parmi les tribus complètement différentes se produisent de la même manière et de la même fréquence que dans les nôtres. D'un autre côté, il a prédit que «la fréquence et les formes de folie formeront un jour un trésor riche pour une compréhension plus profonde des particularités d'un peuple»."
 panum.2623.g: "Apparemment, certaines névroses sont liées aux antécédents culturels."
 panum.2624.t: "Drogue"
 panum.2624.d: "Le chimiste en chef [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] a récemment expérimenté plusieurs fois avec des substances à la suggestion du docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] afin de produire des médicaments psychotropes efficaces. Le résultat, cependant, était ... surprenant."
 panum.2624.f: "«Tu voulais me voir urgemment?» \ N'YES. Je soupçonne que l'expérience a réussi. '\ N'You Suspect?' \ N'LE Le nouveau médicament a définitivement un effet annulaire. Il est efficace contre la fatigue. Et cela aide à la peur. Peut-être même un peu trop bon."
 panum.2624.g: "Diéthylamide d'acide lysergique? Qu'est-ce que c'est?"
 panum.2624.h: "Nos soldats pourraient bénéficier d'un chocolat blindé."
 panum.2625.t: "Psychophysique"
 panum.2625.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a postulé certaines théories intéressantes concernant l'interrélation entre l'expérience psychologique subjective et les stimuli physiques mesurables quantitativement."
 panum.2625.f: "La psychophysique étudie quantitativement la relation entre les stimuli physiques et les sensations et les perceptions qu'ils produisent. La psychophysique a été décrite comme «l'étude scientifique de la relation entre le stimulus et la sensation». De nombreuses techniques et théories classiques de la psychophysique ont été formulées en 1860 par Gustav Theodor Fechner. Il a inventé le terme «psychophysique», décrivant la recherche visant à relier les stimuli physiques au contenu de la conscience tels que les sensations. En tant que physicien et philosophe, Fechner visait à développer une méthode qui concerne la matière à l'esprit, reliant le monde observable publiquement et l'impression en privé d'une personne. Le travail de Fechner a été étudié et étendu par Charles S. Peirce, qui a été aidé par son étudiant Joseph Jastrow, qui est rapidement devenu un psychologue expérimental distingué à part entière."
 panum.2625.g: "Je n'ai pas compris un mot, mais les bonus ont l'air bien!"
