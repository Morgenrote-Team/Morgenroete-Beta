 je_panum_measles_treatment_reason: "Le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] examine actuellement plusieurs patients au [SCOPE.sState('panum_disease_state').GetName] pour déterminer la cause de la fère #YELLOW à la rougeole_3, seules les véritables raisons de la survenue de la maladie peuvent aider à faire des pré endettement qui conduisent à une méthode de traitement moderne. Lorsque le médecin aura terminé son travail, il présentera sa thèse au public. Cela n'empêchera pas les épidémies futures - cela nécessite l'identification du pathogène et peut-être un vaccin - mais les effets d'une nouvelle épidémie seront relativement faibles."
