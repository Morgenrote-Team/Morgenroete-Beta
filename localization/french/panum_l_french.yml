 panum.165.t: "Le cœur de l'infection" #NT!
 panum_physician_health_bonus_modifier: "En sécurité, c'est fini, désolé" #NT!
 panum.168.f: "« Halte ! Qui est dehors à cette heure-ci ? Docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] Que faites-vous à cette heure-ci ? »\n\n« J'ai des rondes à faire, et elles n'attendront pas le lever du soleil. Chaque minute est précieuse, même celles après minuit. »\n\n« Mon Dieu ! Ces rues ne sont pas sûres la nuit ! »\n\nElles ne le sont pas non plus le jour, tant que ce choléra n'est pas terminé. Si vous voulez bien m'excuser, constable, il y a encore du travail à faire avant que l'huile de ma lanterne ne s'épuise. J'ai une douzaine de fioles à remplir avec l'eau des canaux et des pompes, des maisons à visiter, des fossés à examiner. »\n\n« Oui, eh bien, très bien alors. Vous ne faites rien de mal, mais il vaut mieux que je vous fournisse une escorte tout de même. »" #NT!
 panum.3033.d: "La grande majorité des membres de la Croix-Rouge ont adhéré à la Troisième Convention internationale sur l’emploi des armes chimiques. Elle est désormais contraignante pour tous les membres." #NT!
 notification_panum_technology_boost_from_physician_notification_name: "Boost de recherche pour [GetPlayer.MakeScope.GetCountry.GetCustom('panum_medical_research_next_technology_type')]" #NT!
 notification_panum_technology_boost_from_physician_notification_desc: "Grâce au Dr. [GetPlayer.MakeScope.GetVariable('panum_physician_var').GetCharacter.GetLastName] [GetPlayer.MakeScope.GetCountry.GetCustom('panum_medical_research_next_technology_type')] a obtenu un coup de pouce dans ses recherches." #NT!
 je_panum_medical_research_project_reason: "Le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] fait actuellement avancer la recherche médicale. En plus des innovations médicales, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] peut également trouver des remèdes pour des maladies qui ne font pas partie des dix maladies épidémiques classiques. Chaque fois que les progrès atteignent [JournalEntry.GetTotalGoalValue|V0], nous obtiendrons un petit coup de pouce technologique.\nTechnologie pour le prochain coup de pouce : [GetPlayer.MakeScope.GetCountry.GetCustom('panum_medical_research_next_technology_type')]\n#n Ce projet se poursuivra indéfiniment. Utilisez le bouton pour l'arrêter.#!" #NT!

 panum.2611.t: "Institutionnalisation" #NT!
 panum.2611.d: "Face aux conditions de vie inacceptables dans certains asiles psychiatriques, médecins et responsables politiques réclament une réforme des pratiques. Ils prônent des lieux isolés où les psychiatres pourraient vivre une vie solitaire avec leurs patients, loin de la circulation." #NT!
 panum.2611.f: "L'ère moderne de prise en charge institutionnalisée des malades mentaux a commencé au début du XIXe siècle grâce à un effort important mené par l'État. Des asiles psychiatriques publics ont été créés en Grande-Bretagne après l'adoption de la loi de 1808 sur les asiles de comté. Cette loi autorisait les magistrats à construire des asiles subventionnés dans chaque comté pour héberger les nombreux « aliénés pauvres ». La loi de 1845 sur la folie a marqué une étape importante dans le traitement des malades mentaux, car elle a explicitement changé le statut des personnes atteintes de maladie mentale en patients nécessitant un traitement. La loi a créé la Lunacy Commission, dirigée par Lord Shaftesbury, pour se concentrer sur la réforme de la législation sur la folie. Le General Journal of Psychiatry doit être mentionné comme un organe de la psychiatrie institutionnelle allemande entre 1830 et 1860. Il a été fondé par Heinrich Damerow avec Carl Friedrich Flemming et Christian Friedrich Wilhelm Roller en 1844." #NT!
 panum.2611.g: "La recherche psychiatrique et psychologique progresse." #NT!
 panum.2612.t: "Maladie du cerveau" #NT!
 panum.2612.d: "En psychiatrie, la théorie de l'évolution s'accompagne de changements importants. Une nouvelle génération de psychiatres postule que les maladies mentales sont des maladies du cerveau. La psychiatrie à orientation scientifique remplace la vision humaniste qui prévalait jusqu'alors." #NT!
 panum.2612.f: "Wilhelm Griesinger est considéré comme l'un des plus grands acteurs du tournant scientifique en psychiatrie. Il rencontre François Magendie, fondateur de la physiologie expérimentale et auteur du premier manuel moderne de physiologie, dont la démarche de recherche l'influence beaucoup. En 1839, il s'installe à Friedrichshafen, au bord du lac de Constance, pour y exercer la médecine. L'année suivante, en 1840, il reçoit une offre de travail comme médecin de second plan à l'asile de fous de Winnenthal. Au cours des deux années suivantes, Griesinger acquiert une riche expérience pratique qui devient la base de son ouvrage majeur « Pathologie et thérapie des maladies mentales », publié en 1845 et inaugurant une nouvelle ère en psychiatrie. Il y tente de fonder la psychiatrie sur la base de la physiologie médicale et de la pathologie. Sur la première page se trouve la célèbre déclaration de Griesinger, selon laquelle, pour comprendre chaque symptôme de maladie, il est nécessaire de localiser le phénomène en question et de reconnaître toutes les maladies mentales comme des maladies du cerveau." #NT!
 panum.2613.t: "Classification des troubles mentaux" #NT!
 panum.2613.d: "Les psychiatres et les psychologues ont commencé à classer les maladies mentales selon un système qui n'existait auparavant que dans le reste de la médecine. Alors qu'ils ne connaissaient auparavant que « imbécile » et « folie », ils reconnaissent désormais sept catégories : la manie, la mélancolie, la monomanie, la parésie, la démence, la dipsomanie et l'épilepsie." #NT!
 panum.2613.f: "Le système triadique de la tradition psychiatrique allemande est un système de maladies psychiatriques classé selon leurs causes. La première description remonte à Emil Kraepelin, qui s'appuyait à son tour sur les travaux préparatoires de Karl Ludwig Kahlbaum. Kraepelin annonçait qu'il avait trouvé une nouvelle façon de considérer la maladie mentale, se référant à la vision traditionnelle comme « symptomatique » et à sa vision comme « clinique ». Il s'est avéré qu'il s'agissait de sa synthèse paradigmatique des centaines de troubles mentaux classés au XIXe siècle, regroupant les maladies en fonction de la classification des syndromes (schémas communs de symptômes au fil du temps) plutôt que de la simple similitude des symptômes majeurs à la manière de ses prédécesseurs." #NT!
 panum.2614.t: "Parler de la guérison" #NT!
 panum.2614.d: "Malgré de nombreuses réserves, l'approche psychologique est de plus en plus populaire auprès des psychiatres. Le cas d'une jeune femme qui semble avoir été guérie après de longues discussions est considéré comme un modèle pour un nouveau tournant dans le traitement des patients souffrant de troubles mentaux." #NT!
 panum.2614.f: "Les expériences que Josef Breuer a faites en traitant Bertha Pappenheim (pseudonyme : Anna O.) en 1880/1881 ont servi de base aux études sur l'hystérie publiées en collaboration avec Sigmund Freud en 1895. Ce travail (et l'histoire clinique sous-jacente) a été décrit par Freud comme la racine et le point de départ de la psychanalyse. Après le travail pionnier de Sigmund Freud, les idées issues de la théorie psychanalytique ont également commencé à prendre racine en psychiatrie. La théorie psychanalytique est devenue populaire parmi les psychiatres car elle permettait aux patients d'être traités dans des cabinets privés au lieu d'être parqués dans des asiles." #NT!
 panum.2615.t: "Psychologie et philosophie" #NT!
 panum.2615.d: "Outre l'influence des écoles psychologiques sur la psychiatrie, on assiste également à une prise de conscience croissante des influences philosophiques. La domination des sciences naturelles semble être rompue." #NT!
 panum.2615.f: "Karl Jaspers fut l'un des premiers psychiatres du XXe siècle à examiner et à réfléchir sur les hypothèses philosophiques de sa discipline. Sa « Psychopathologie générale » (1913) est considérée comme le début d'une recherche psychopathologique méthodiquement réfléchie, aux côtés de Wilhelm Griesinger, qui définissait les maladies mentales comme des maladies du cerveau, et d'Emil Kraepelin, qui fut le premier à introduire un système de référence nosologique utile en psychiatrie. Jaspers se référait aux premiers travaux de Husserl sur la psychologie descriptive et à la distinction très controversée de Wilhelm Dilthey entre « expliquer » et « comprendre », avec laquelle il complétait également la psychopathologie au sens méthodologique." #NT!
  
 panum.2131.t: "Une assiette à gagner" #NT!
 panum.2131.d: "Avec la découverte du rôle que la pauvreté pourrait jouer dans le rachitisme, les syndicalistes ont pris l’initiative de se battre pour des repas scolaires et du lait gratuits !" #NT!
 panum.2131.f: "Au début, tout a commencé lentement : un chariot se garait ici ou là devant l'école, donnant aux enfants du lait, de la soupe et un peu de pain. Aujourd'hui, c'est devenu bien plus que cela : les syndicats de travailleurs, les socialistes et les militants ouvriers du pays ont adopté la cause de la lutte non seulement pour la classe prolétarienne, mais aussi pour leurs enfants. Les affiches avec des images d'enfants avec des bols vides et des yeux suppliants sont de plus en plus courantes dans les rues, et l'incapacité du gouvernement à subvenir aux besoins de ses citoyens les plus jeunes et les plus vulnérables est un moyen facile de le condamner, lui et son système. L'idée d'un repas et d'un lait gratuits à l'école se répand comme une traînée de poudre et est reprise même par les branches les plus extrêmes du mouvement : si l'on ne peut pas faire confiance au gouvernement pour subvenir aux besoins des enfants du pays, alors à qui, vraiment, sert-il ?" #NT!
 panum.2131.g: "Nous aurons notre facture de lait gratuit, oui nous l'aurons, oui nous l'aurons !" #NT!
 panum.2131.h: "Le lait gratuit n’existe pas." #NT!
 panum_free_milk_modifier: "Du lait gratuit" #NT!
 panum_no_free_milk_modifier: "Pas de lait gratuit" #NT!
  
 panum_medical_techniques_level_rises_tt: "Le niveau des techniques médicales de [GetPlayer.GetName] augmente." #NT!
  
 panum.561.t: "La voie vers un vaccin ?" #NT!
 panum.561.d: "Suivant les instructions de la capitale, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a commencé à rechercher comment traiter, voire guérir, la fièvre jaune." #NT!
 panum.561.f: "''... pourtant, je me demande si je n'ai pas été trop confiant dans mon évaluation de ma capacité à vaincre la fièvre jaune. Cette maladie a peu de certitudes connues, et même ses moyens de transmission sont un mystère, sans parler de ses origines. S'agit-il, pourrait-on suggérer, d'une résurgence de la vieille théorie des miasmes ? Qui peut prétendre à la certitude face à un tel mystère ?\n\nPourtant, malgré tous ces mystères, il y a quelque chose que nous savons. Tous ceux qui rencontrent cette mort énigmatique ne sont pas tués par elle ; certains n'ont pratiquement aucun signe qu'il s'agissait de cette fièvre jaune, et plus d'un guérit avant qu'elle ne mette sa vie en danger. Rencontrer la fièvre jaune, c'est danser avec la mort, certes, mais il n'est pas certain qu'elle vous emporte...''" #NT!
 panum.561.g: "...et si nous pouvons l’arrêter n’importe où, nous pourrions peut-être encore l’arrêter partout." #NT!
 panum.562.t: "L'Orphelinat" #NT!
 panum.562.d: "Après avoir examiné tous les cas de guérison de la fièvre jaune, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] est arrivé dans un foyer comptant de nombreux survivants : un orphelinat." #NT!
 panum.562.f: "'Ah, bonjour, vous devez être la maîtresse de cet orphelinat... Je vois que les enfants ont joué avec de la peinture aujourd'hui.'\n'Croyez-moi, je n'ai pas la moindre idée d'où ils l'ont eue - oh, vous devez être le médecin qu'ils ont dit qu'il allait appeler ! J'ai peur que la toux ait déjà disparu, donc il n'y a pas...'\n'Je crains de ne pas être ce médecin, madame. Je viens de la capitale, j'enquête sur la fièvre jaune. On m'a dit que la maladie était... passée par ici ?'\n'Oh oui, les petits. Ils l'ont eue, un grand nombre même. Certains viennent de familles décimées par la maladie, les pauvres, mais elle aime épargner les enfants, semble-t-il.'\nFascinant. Avez-vous des théories ? -\n'Les enfants ! Venez, venez ! Il y a un gentil monsieur de la capitale ici pour vous parler !'\n'Oh... bonjour, les enfants. Je m'appelle Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] et j'aimerais parler de la fièvre jaune..." #NT!
 panum.562.g: "Quelle est la raison pour laquelle les parents meurent mais les enfants survivent ?" #NT!
 panum.563.t_america: "Le vieux sang" #NT!
 panum.563.d_america: "Afin d’en savoir plus sur la fièvre jaune, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a décidé de rendre visite aux familles de certains des premiers colons de ces terres." #NT!
 panum.563.f_america: "''... et pourtant, toutes les premières familles de ces terres n'ont pas disparu. Certaines peuvent encore retracer leur histoire jusqu'aux toutes premières expéditions ici, grandes ou petites. C'est vers ces familles que j'ai tourné mon enquête, car certaines d'entre elles conservent encore de précieux journaux et documents qui nous donnent un aperçu du passé avant les archives historiques appropriées. Cela révèle quelque chose de particulièrement fascinant : les premiers cas de fièvre jaune sont apparus dans ces terres vers 1685.\n\nPourtant, depuis son apparition, certains de ces grands de [ROOT.GetCountry.GetNameNoFlag] ont voyagé à l'étranger en tant qu'explorateurs et aventuriers... et certains, qui ont eu la fièvre jaune ici et se sont rétablis, ont rencontré cette maladie là-bas, en Afrique, et pourtant ils ne sont jamais tombés malades. Cela me pousse vers une vérité.''" #NT!
 panum.563.g_america: "Il s’agit de la même maladie. L’immunité contre l’une équivaut à l’immunité contre l’autre." #NT!
 panum.563.t_africa: "Les membres de la tribu" #NT!
 panum.563.d_africa: "Dans le but d'en savoir plus sur la fièvre jaune, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a recherché ceux qui ont le plus d'expérience en la matière : les Africains autochtones." #NT!
 panum.563.f_africa: "« ... et pourtant, alors que nous pourrions périr rapidement, les Africains indigènes survivent. C'est une maladie avec laquelle ils sont profondément familiers ; bien que la barrière de la langue représente un obstacle important, il suffit de quelques descriptions pour qu'ils comprennent la maladie dont je parle. Ont-ils une résistance naturelle à cette maladie, semblable à celle que les Européens pourraient avoir pour la variole qui a ravagé les Amériques ? Peut-être, mais ceux d'origine africaine qui travaillent dans nos villes meurent au même rythme que nous - un autre facteur doit donc entrer en jeu. L'alimentation ? La culture ? La clé, peut-être, est l'exposition pendant l'enfance dans la tribu. Il est possible qu'ils soient exposés jeunes à la fièvre jaune et qu'ils développent ainsi une immunité durable, tout comme la vaccine pourrait offrir une protection contre la variole. »" #NT!
 panum.563.g_africa: "Et s’ils peuvent être rendus immunisés… alors il devrait être possible de fabriquer un vaccin." #NT!
 panum.564.t: "La nature de l'ennemi" #NT!
 panum.564.d: "Combattre une maladie nécessite d’en savoir plus sur sa nature, et le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a mis au point un test fascinant." #NT!
 panum.564.f: "« ... depuis que nous avons découvert que le choléra était une maladie transmise par l'eau, nous avons eu l'occasion d'examiner la possibilité d'éliminer ces maladies de l'eau grâce à une filtration appropriée. Il a fallu un certain temps pour que cela soit possible, mais je me retrouve avec un filtre Berkefeld, un dispositif fantastique qui peut filtrer l'eau à travers de la terre de diatomées. C'est un appareil extrêmement précis, capable d'éliminer même les bactéries. J'ai préparé une fiole contenant le sang de plusieurs personnes infectées, je l'ai dilué avec de l'eau distillée, puis je l'ai versé dans le filtre. Ce qui en est ressorti était un liquide clair et pur... du moins c'est ce que je pensais. Et là est la surprise : quoi que ce soit, il a réussi à traverser le filtre, comme l'a prouvé un volontaire assez courageux pour se le faire injecter. Ils sont tombés malades et se battent maintenant pour leur vie. Pourtant, cela prouve que la fièvre jaune n'est pas un simple microbe, c'est quelque chose d'encore plus petit qu'une bactérie, quelque chose que nous ne pouvons pas voir. J'aurais appelé cela une impossibilité, mais j'ai trouvé une note sur une telle chose dans une revue médicale. Ils appellent ça un virus." #NT!
 panum.564.g: "Connaissez l’ennemi, détruisez l’ennemi." #NT!
 panum.565.t: "Incurable ?" #NT!
 panum.565.d: "Espérant trouver un signe de traitement approprié, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a visité des cliniques et des hôpitaux locaux pour enquêter sur leurs pratiques de traitement." #NT!
 panum.565.f: "Ah, docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], c'est un plaisir de vous rencontrer ! Nous, ici à la clinique...'\n'Je crains que nous devions couper court aux plaisanteries, docteur. Je dois visiter d'autres cliniques, hôpitaux, services, une vingtaine d'ici la tombée de la nuit. Parlez-moi de l'efficacité de votre traitement.'\n'Ah, euh... eh bien, nous suivons les directives établies...'\n'Avec succès ? Laissez-moi prendre des notes.'\n'Euh... sans.'\n'Mortalités ?'\n'Assez... élevées.'\n'Combien avez-vous perdu cette semaine ?'\n'Cent soixante-seize.'\n'Ce qui fait que vous et les six dernières cliniques, nous arrivons à bien plus de trois mille décès. Vous suivez les directives de traitement, n'est-ce pas ? »\n« Oui, docteur ! »\n« Cela exclut donc les médicaments à base de plantes, l'électrothérapie, la radiothérapie, l'hydrothérapie, la médecine populaire, la médecine moderne et... hmm, à peu près toutes les formes de traitement que nous connaissons, y compris le fait de les protéger du ciel nocturne dans le cas où il serait de nature astrologique. »\n« Alors... cela ne veut-il pas dire qu'il n'existe aucun traitement, docteur ? »\n« En effet, il semble probable que tout traitement n'aura aucun effet. C'est dommage." #NT!
 panum.565.g: "Un changement de tactique donc : il faut un vaccin." #NT!
 panum.566.t: "La première fissure" #NT!
 panum.566.d: "Bien que ses recherches aient été un échec jusqu’à présent, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a mené des expériences sur des singes pour tenter de mettre au point un vaccin." #NT!
 panum.566.f: "Pour beaucoup, la vue d'un singe mort dans une cage n'aurait pas été un motif de réjouissance, mais pour le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] et l'équipe [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis], c'était un progrès remarquable. Le développement d'un vaccin contre cette terrible maladie nécessitait la capacité de produire la maladie en laboratoire sur demande, et pourtant, malgré tous leurs efforts, elle leur avait échappé... jusqu'à aujourd'hui. Les singes et les chimpanzés d'Afrique étant apparemment immunisés contre la maladie, il a fallu l'arrivée d'un macaque indien pour fournir un sujet de test approprié. Inoculé avec du sérum prélevé dans les veines d'un homme infecté, le macaque est tombé malade et est finalement mort.\n\nPour certains, cela pourrait sembler une cruauté inutile, mais ici, maintenant, cela représentait un énorme bond en avant. Enfin, ils avaient des sujets sur lesquels tester." #NT!
 panum.566.g: "Hmm. C'est un progrès... en matière de destruction des singes, du moins." #NT!
 panum.567.t: "Le secret du sérum" #NT!
 panum.567.d: "Ayant accès à un « sujet de test » fiable, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a commencé à tester les possibilités d’inoculation en utilisant le sang de patients en convalescence." #NT!
 panum.567.f: "'1. Transfusion de macaque à macaque : maladie transmise, pas d'immunité, macaque décédé. Confirme la transmission par le sang, la maladie est probablement transmise par des insectes - moustiques ?\n2. Transfusion d'humain à macaque : maladie transmise, pas d'immunité, macaque survécu. Confirme que l'infection peut traverser directement les espèces.\n3. Fièvre jaune sud-américaine et africaine pour un macaque survivant : immunité, macaque survécu. Confirme l'immunité partagée aux deux formes de maladie.\n4. Agent pathogène mort dans le sérum, stérilisé sous une chaleur extrême : n'a pas fourni de protection, macaque décédé après inoculation avec un agent pathogène vivant. Échec significatif, exclut les possibilités d'un vaccin contre un agent pathogène mort.\n5. Transfert de sérum en convalescence à un macaque : a empêché une future infection ! Prometteur ! Début potentiel pour un vaccin ?'" #NT!
 panum.567.g: "On ne fait pas d'omelette sans casser quelques macaques..." #NT!
 panum.568.t: "Le prototype" #NT!
 panum.568.d: "Après avoir eu le temps de continuer à travailler sur son vaccin, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a atteint un point critique : un prototype de vaccin." #NT!
 panum.568.f: "« Ce devrait être un moment incroyable, mais je me retrouve à lutter pour rester sobre. En utilisant de grandes quantités de sérum humain, prélevé sur un certain nombre de malades en convalescence, mon équipe et moi avons réussi à les transformer en une forme distillée, potentiellement capable de délivrer l'immunité au volontaire. C'était une bonne première ébauche, et une étape potentiellement critique, et nous avons donc commencé à le tester sur les macaques. Un bon nombre sont morts, un bon nombre ont survécu, mais un macaque n'est pas un homme.\n\nIl fallait le tester en direct. Dix volontaires, rassemblés ici, là et partout. Des soldats de la garnison locale, un membre de ma propre équipe, quelques chômeurs de la ville influencés par la promesse de quelques sous. Une vingtaine de volontaires, pour presque autant de piqûres. Parmi eux ? Sept n'avaient aucun symptôme, puis l'immunité a été confirmée une semaine plus tard. Cinq ont eu une maladie mineure, puis l'immunité. Six autres étaient plus malades, puis immunisés. Le reste ? Tous ont développé une véritable fièvre jaune, et l'un est mort. C'est un pas dans la bonne direction, indéniablement, mais... qu'en est-il des morts ?" #NT!
 panum.568.g: "Le coût du progrès est élevé." #NT!
 panum.569.t: "Un nouveau sujet" #NT!
 panum.569.d: "La première tentative de vaccin ayant rencontré un succès mitigé, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] est déterminé à affiner le processus." #NT!
 panum.569.f: "Au grand soulagement de quelques spécialistes et à la consternation d'autres, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] avait fait une découverte cruciale : les macaques n'étaient pas les seuls animaux capables d'incuber la maladie, et un nouvel hôte plus adapté avait été trouvé : la souris de recherche commune. Le rôle qu'ils pourraient jouer dans l'industrie florissante de la recherche médicale ne peut être sous-estimé, mais ici, ils jouent un rôle particulièrement crucial : leur liquide cérébral, la substance visqueuse qui entoure leur minuscule cerveau, est un milieu de croissance approprié pour le virus de la fièvre jaune. Ce processus présente cependant un avantage certain. Chaque passage d'une souris à l'autre prend moins de temps que le précédent, ce qui affaiblit le virus. Lentement mais sûrement, ce tueur d'hommes est maîtrisé, une souris à la fois." #NT!
 panum.569.g: "Oh bien, d'abord les macaques, maintenant les souris..." #NT!
 panum.570.t: "Le deuxième prototype" #NT!
 panum.570.d: "Les améliorations continues apportées au vaccin du Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ont conduit au développement d’une version améliorée." #NT!
 panum.570.f: "« Bien que la dernière tentative n’ait pas été un échec, je n’ose pas la qualifier de succès. Ces pauvres garçons ont donné leur vie dans l’espoir de débarrasser l’humanité de cette maladie, et je leur dois de faire de mon mieux pour améliorer la situation. Je crois que j’ai fait exactement cela. En transférant la matière des macaques aux souris, j’ai pu atténuer lentement mais sûrement le virus, l’affaiblissant considérablement au fil du temps. Après plus de trente passages, la fièvre jaune qui en résulte est une créature affaiblie, bien plus susceptible d’être utilisée dans un vaccin que les premières tentatives.\n\nEn utilisant la même approche que précédemment, j’ai créé une combinaison de sérum immun et de virus vivant mais affaibli, le sérum étant présent pour réduire le risque de certaines complications immunitaires. Il y avait moins de volontaires que la dernière fois, mais un de mes collègues a décidé de prendre le risque. Ils n’avaient pas été vaccinés ni exposés à la fièvre jaune, et ont été mis en quarantaine intensive pendant une semaine avant l’inoculation. À part une petite rougeur de la zone, ils n’ont pas développé la fièvre jaune. Des résultats très prometteurs jusqu’à présent. »" #NT!
 panum.570.g: "On dirait qu'on arrive enfin à quelque chose..." #NT!
 panum.570.h: "...alors lançons cette campagne de vaccination !" #NT!
 panum.571.t: "Incendie de forêt" #NT!
 panum.571.d: "Catastrophe ! La distribution du vaccin-sérum développé par le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a transmis par inadvertance des maladies transmises par le sang !" #NT!
 panum.571.f: "Avec le recul, il était évident que fabriquer un vaccin à partir de sérum sanguin humain était peut-être une très mauvaise idée. Les mystères du sang humain avaient été partiellement percés, mais dans un monde où le microscope révélait sans cesse de nouveaux microbes et où une nouvelle théorie des corps viraux commençait à émerger, il y avait toujours cette crainte pressante qu'un événement inattendu, un désastre, puisse se produire.\n\nCe désastre s'est produit : des dizaines de milliers de personnes ont été injectées sans le savoir avec du sérum contaminé par un virus, un virus qui a provoqué la jaunisse chez tout le monde, des soldats aux fonctionnaires du gouvernement. Ce virus était jusqu'alors inconnu de notre science, et échappe toujours à la détection de nombre de nos esprits les plus brillants... contrairement aux dommages causés à notre image nationale. Bien qu'il n'y ait eu que peu de décès, voire aucun, l'échec évident de ce projet de vaccination a laissé notre communauté médicale en ruine, la cible de plaisanteries dans le monde entier." #NT!
 panum.571.g: "C'est une catastrophe pour notre recherche médicale..." #NT!
 panum.572.t: "Derniers ajustements ?" #NT!
 panum.572.d: "Proche d’un vaccin finalisé, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] est en plein développement final." #NT!
 panum.572.f: "Si l'on ne savait pas le contraire, on aurait pu penser que le laboratoire du Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ressemblait à une cuisine très étrange. Du sel, de l'eau, de l'huile et des œufs jonchaient les comptoirs, à côté de plaques chauffantes, d'une large sélection de verres et d'un réfrigérateur à la pointe de la technologie. La scène semblait être prête pour préparer le petit-déjeuner, pas pour une percée médicale, mais c'est exactement ce qui est en cours. Le sérum est trop cher pour fabriquer un vaccin qui puisse être distribué à grande échelle, trop difficile à utiliser à grande échelle pour inoculer une colonie ou une ville. Il faut le retirer de l'équation, mais sinon, que faire ?\n\nEn murmurant doucement, apparemment au bord de la folie, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] travaille sans relâche. Une sélection soigneusement préparée de tissus de souris est soigneusement trempée dans du jaune d'œuf, puis soigneusement, toujours soigneusement, placée dans le compartiment de lyophilisation. Un lot précédent est sorti, son contenu étant maintenant une fine poudre. Ajoutez-le à une solution saline...\n\nLe docteur sourit.\n\n« Enfin, dit le bon docteur. »" #NT!
 panum.572.g: "Heureka !" #NT!
 panum.573.t: "Le prototype final" #NT!
 panum.573.d: "Après avoir terminé le travail sur leur vaccin, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a commencé à le déployer dans un dernier groupe de test." #NT!
 panum.573.f: "« Ce fut un long et dur chemin, mais nous en sommes enfin arrivés à la fin. La phase finale consistait à rendre le vaccin plus facilement disponible, et c'est désormais chose faite : après avoir remplacé le sérum par une solution saline, le vaccin obtenu est semblable à celui utilisé pour la variole. Il n'y a pas besoin d'injection, il suffit de procéder à la même scarification. En fait, les deux pourraient même être administrés en même temps. De l'avis général, ce devrait être un moyen fiable, sûr et efficace d'administrer ce vaccin, non seulement à quelques milliers, mais à des millions de personnes.\n\nPourtant, les tests passés me remplissent le cœur d'inquiétude. Il y a peu de volontaires, pas assez pour créer un groupe de test... mais si l'on tient compte de moi, alors il y en a assez. J'ai déjà pris les dispositions nécessaires - un général ne peut envoyer qu'un nombre limité de ses hommes sur la ligne de tir avant qu'ils ne soient censés se rendre sur le terrain. Ce soir, à 20 heures, je serai vacciné avec ce vaccin. Si cela fonctionne, lorsque je recevrai l'injection de la fièvre jaune dans deux semaines, je n'aurai rien de plus qu'un léger désagrément." #NT!
 panum.573.g: "Je vous souhaite bonne chance." #NT!
 panum.574.t: "Un vaccin contre la fièvre jaune" #NT!
 panum.574.d: "La nouvelle est arrivée dans la capitale : le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a réussi à créer un vaccin contre la fièvre jaune !" #NT!
 panum.574.f: "« … mais au final, mon équipe et moi avons réussi contre toute attente. Bien qu’il reste encore de nombreux mystères à élucider autour de la fièvre jaune, nous avons réussi à produire un vaccin viable, prêt pour une production à grande échelle. Il faudra peut-être des installations spécialisées, gérées par de grands esprits, mais il peut être produit à grande échelle, et des millions et des millions de personnes bénéficieraient d’une campagne de vaccination rapide qui pourrait faire de la fièvre jaune une chose du passé. » Pourtant, de nombreuses vies ont été perdues, y compris un certain nombre de membres de ma propre équipe, des humbles assistants qui ont donné leur vie pour poursuivre leurs recherches aux volontaires qui se sont présentés aux tests, qui devraient tous être reconnus comme les héros qu’ils sont. Un mot d’éloge doit également être adressé aux macaques et aux souris, qui ont joué un rôle essentiel dans cette entreprise. » Grâce à leur sacrifice et à notre effort collectif, nous disposons désormais d’un vaccin qui peut mettre fin à la fièvre jaune endémique en quelques années, et peut-être même un jour éradiquer cette nuisance, une fois pour toutes. »" #NT!
 panum.574.g: "Bien joué, docteur ! Maintenant, commençons le déploiement immédiat !" #NT!
  
 panum_wildfire_modifier: "Une expérience vaccinale complètement ratée" #NT!
 panum_physician_invented_yellow_fever_vaccine_modifier: "Le médecin a fait le travail d'un biologiste" #NT!
  
 ACHIEVEMENT_biologist_job: "Le métier de biologiste ?" #NT!
 ACHIEVEMENT_DESC_biologist_job: "Inventer un vaccin contre la fièvre jaune – avec un médecin." #NT!
  
 je_panum_yellow_fever_vaccine: "Vaccin contre la fièvre jaune" #NT!
 je_panum_yellow_fever_vaccine_reason: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] s'est donné pour mission ambitieuse de vaincre la fièvre jaune une fois pour toutes. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] réussira-t-il ou échouera-t-il lamentablement ?" #NT!
 je_panum_yellow_fever_vaccine_success: "[GetPlayer.GetName] a collecté au moins #ORANGE 10 indices sur les vaccins#!." #NT!
 je_panum_yellow_fever_vaccine_goal: ""
 je_panum_yellow_fever_vaccine_fail: "L'expérience se termine en désastre." #NT!
  
 panum_psychologist: "Psychologue" #NT!
 panum_psychologist_desc: "Cette personne pense que tu as eu des problèmes avec maman et papa." #NT!
  
 panum_metamphetamine_army_modifier: "Des soldats sous méthamphétamine" #NT!
  
 panum.2621.t: "Le concept d'anxiété" #NT!
 panum.2621.d: "Søren Kierkegaard, le plus grand philosophe danois, a publié « Le concept d'anxiété », une œuvre esthétique, philosophique et psychologique qui a capté l'attention du public de Copenhague." #NT!
 panum.2621.f: "« La possibilité de la liberté n’est pas la capacité de choisir le bien ou le mal. La possibilité, c’est de pouvoir. Dans un système logique, il est commode de dire que la possibilité passe à la réalité. Cependant, dans la réalité, ce n’est pas si commode, et un terme intermédiaire est nécessaire. Le terme intermédiaire est l’anxiété, mais il n’explique pas plus le saut qualitatif qu’il ne peut le justifier éthiquement. L’anxiété n’est ni une catégorie de nécessité ni une catégorie de liberté ; c’est une liberté enchevêtrée, où la liberté n’est pas libre en elle-même mais enchevêtrée, non par nécessité, mais en elle-même. » - Søren Kierkegaard" #NT!
 panum.2621.g: "L’un des plus grands esprits du Danemark." #NT!
 panum.2621.h: "Kierkegaard deviendra le nouvel écrivain national du Danemark." #NT!
 panum.2622.t: "L'étrange cas de [SCOPE.sCharacter('panum_phineas_gage').GetFullName]" #NT!
 panum.2622.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a enquêté sur le cas étrange du contremaître [SCOPE.sCharacter('panum_phineas_gage').GetFullName]. Lors d'une explosion, une tige de fer a traversé son crâne de bas en haut, créant un large canal de blessure. Selon le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], il s'est rétabli physiquement après quelques semaines et ses capacités intellectuelles, notamment la perception, la mémoire, l'intelligence, la capacité linguistique, ainsi que ses capacités motrices étaient complètement intactes. Cependant, dans la période qui a suivi l'accident, [SCOPE.sCharacter('panum_phineas_gage').GetLastName] a connu des changements de personnalité notables." #NT!
 panum.2622.f: "'Horrible accident. - Alors que [SCOPE.sCharacter('panum_phineas_gage').GetFullName], contremaître sur le chemin de fer de [SCOPE.sState('panum_phineas_gage_state').GetName], était occupé hier à bourrer pour une explosion, la poudre a explosé, emportant un instrument de fer dans sa tête d'un pouce et quart de circonférence et de trois pieds et huit pouces de longueur, qu'il utilisait à ce moment-là. Le fer est entré par le côté droit de son visage, brisant la mâchoire supérieure, passant derrière l'œil gauche et ressortant par le sommet de la tête.\n\nLa circonstance la plus singulière liée à cette triste affaire est qu'il était vivant à deux heures de l'après-midi, en pleine possession de sa raison et sans douleur.\n\nLa Chronique de [ROOT.GetCountry.GetCapital.GetCityHubName]" #NT!
 panum.2622.g: "Donc la psyché et les zones du cerveau sont connectées ?" #NT!
 panum.2623.t: "Psychologie transculturelle" #NT!
 panum.2623.d: "Lors d'une visite au [SCOPE.sState('panum_colonial_state').GetName], le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a été étonné de constater que les maladies mentales, telles que celles qui surviennent fréquemment au [ROOT.GetCountry.GetCapital.GetCityHubName], ne se produisent pratiquement pas dans cette région." #NT!
 panum.2623.f: "En 1904, Emil Kraepelin se rendit à Java pendant quatre mois et examina 225 personnes dans l'asile psychiatrique de Buitenzorg (aujourd'hui Bogor). En tant que seul psychiatre de premier plan de son époque à s'intéresser aux phénomènes transculturels en psychiatrie, il voulait savoir, d'une part, si certaines formes de folie, qui constituent le contenu principal de nos institutions, existent également dans des conditions de vie complètement différentes et parmi des tribus complètement différentes, de la même manière et avec la même fréquence que les nôtres. D'autre part, il prédisait que « la fréquence et les formes de folie formeront un jour un riche trésor pour une compréhension plus approfondie des particularités d'un peuple »." #NT!
 panum.2623.g: "Apparemment, certaines névroses sont liées à des origines culturelles." #NT!
 panum.2624.t: "Médicaments" #NT!
 panum.2624.d: "Le chimiste en chef [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] a récemment expérimenté plusieurs fois des substances sur la suggestion du docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] afin de produire des médicaments psychotropes efficaces. Le résultat, cependant, a été... surprenant." #NT!
 panum.2624.f: "« Vous vouliez me voir de toute urgence ? »\n« Oui. Je pense que l'expérience a été un succès. »\n« Vous pensez ? »\n« Le nouveau médicament a certainement un effet analgésique. Il est efficace contre la fatigue. Et il aide contre la peur. Peut-être même un peu trop. »" #NT!
 panum.2624.g: "Diéthylamide de l'acide lysergique ? Qu'est-ce que c'est ?" #NT!
 panum.2624.h: "Nos soldats pourraient bénéficier d'un peu de chocolat blindé." #NT!
 panum.2625.t: "Psychophysique" #NT!
 panum.2625.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a postulé quelques théories intéressantes concernant l’interrelation entre l’expérience psychologique subjective et les stimuli physiques mesurables quantitativement." #NT!
 panum.2625.f: "La psychophysique étudie quantitativement la relation entre les stimuli physiques et les sensations et perceptions qu'ils produisent. La psychophysique a été décrite comme « l'étude scientifique de la relation entre stimulus et sensation ». De nombreuses techniques et théories classiques de la psychophysique ont été formulées en 1860 par Gustav Theodor Fechner. Il a inventé le terme « psychophysique », décrivant la recherche visant à relier les stimuli physiques aux contenus de la conscience tels que les sensations. En tant que physicien et philosophe, Fechner visait à développer une méthode qui relie la matière à l'esprit, en reliant le monde observable publiquement et l'impression qu'une personne en a personnellement vécue. Le travail de Fechner a été étudié et étendu par Charles S. Peirce, qui a été aidé par son étudiant Joseph Jastrow, qui est rapidement devenu un psychologue expérimental distingué à part entière." #NT!
 panum.2625.g: "Je n'ai pas compris un mot, mais les bonus ont l'air bien !" #NT!
  
