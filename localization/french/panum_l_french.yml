 notification_panum_overlord_medical_vaccination_team_notification_desc: "Une équipe d’assistants que nous avons envoyée dans un État vassal est revenue de sa mission sur le terrain." #NT!
  
 panum_medical_treatment_team_cost_modifier: "Coût de l'équipe de traitement médical" #NT!
 panum_medical_vaccination_team_cost_modifier: "Coût de l'équipe médicale de vaccination" #NT!
  
 panum.840.t: "Le mystère de la peste noire" #NT!
 panum.840.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a écrit un traité complet sur les causes, la transmission et les mesures contre la peste. Une digression particulièrement remarquable porte sur le rôle des rats et des puces." #NT!
 panum.840.f: "Dans son traité sur la peste, le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] résume un grand nombre de découvertes récentes. Outre la recommandation d'un système de rotation pour la désinfection et d'un sérum spécialement développé par [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim], [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] souligne la relation entre les puces comme porteuses du bacille de la peste et l'infection des rats. La transmission se fait de la puce au rat, du rat au rat et du rat à l'homme." #NT!
 panum.840.g: "Un ancien ennemi devient soudainement apprivoisable." #NT!
  
 panum.841.t: "Une diffusion remarquable" #NT!
 panum.841.d: "Ces dernières semaines, le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] s'est longuement penché sur la première apparition et les lieux où la peste s'est propagée." #NT!
 panum.841.f: "« Ces dernières semaines, j'ai reçu des cartes du ministère du Commerce et je les ai comparées avec les dossiers de mes collègues à l'étranger. Les médecins qui prétendent que la maladie est liée à un climat ou à une géographie particulière se trompent. On observe plutôt une propagation par vagues sur terre et une propagation dans les ports les plus étroits. Cela ne devrait pas être surprenant, car la grande épidémie de peste du Moyen Âge a également fait rage en Scandinavie, en Méditerranée et au Moyen-Orient. Mais cela convaincra-t-il mes collègues ? »\n\nExtrait du journal du Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [TimeKeeper.GetCurrentDate.Format('y')]" #NT!
 panum.841.g: "Cela n’a donc pas grand-chose à voir avec la géographie." #NT!
 panum.842.t: "Nettoyage par rotation" #NT!
 panum.842.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a testé en [SCOPE.sState('panum_disease_state').GetName] une nouvelle procédure qui s'avère extrêmement efficace." #NT!
 panum.842.f: "'La désinfection systématique de la ville fut tentée, mais elle s'avéra une entreprise très coûteuse, et fut abandonnée en faveur d'un programme de « nettoyage général des maisons », dans lequel un personnel d'inspecteurs sanitaires européens et de coolies était constamment employé. Les quartiers étaient traités à tour de rôle, de sorte que chaque immeuble était nettoyé au moins trois fois par an. Cette méthode a tous les avantages de la simplicité, de l'efficacité et de l'économie. Chaque inspecteur se voit attribuer un certain nombre d'étages par jour ; les occupants sortent leurs effets personnels, les sols et les cabines sont lavés et les planches de lit sont nettoyées dans des cuves en fer portables. Une inspection est effectuée pour déceler les illégalités structurelles mineures, les passages de rats et autres trous similaires sont immédiatement remplis de ciment, et tous les déchets sont emportés.'\n\nExtrait des instructions du docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] pour une meilleure désinfection de [SCOPE.sState('panum_disease_state').GetName]" #NT!
 panum.842.g: "Ce système devrait être mis en œuvre partout." #NT!
 panum.843.t: "Une mortalité intéressante" #NT!
 panum.843.d: "En examinant les statistiques, le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a découvert que le nombre de décès parmi les chasseurs de rats est extrêmement élevé." #NT!
 panum.843.f: "« Le directeur de l'agence m'a dit que je confondais corrélation et causalité. En principe, on a trop insisté sur l'infection des rats avant une épidémie de peste, a-t-il dit presque littéralement. Je me demande maintenant sérieusement si, si la majorité des autorités supposaient que les épidémies de peste avaient quelque chose à voir avec les rats, elles s'en tiendraient à leur propre théorie étant donné un nombre similaire d'indices d'une maladie purement tropicale. La mortalité manifestement plus élevée parmi les chasseurs de rats par rapport au reste de la population est une « corrélation » de trop pour moi. »\n\nExtrait du journal du Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [TimeKeeper.GetCurrentDate.Format('y')]" #NT!
 panum.843.g: "De combien de preuves supplémentaires avons-nous besoin ?" #NT!
 panum.844.t: "Ce sont les rats, idiot !" #NT!
 panum.844.d: "Au cours d'une enquête plus approfondie sur l'épidémie de peste de [SCOPE.sState('panum_disease_state').GetName], le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a été informé qu'avant l'épidémie, tous les rats de la région étaient morts." #NT!
 panum.844.f: "« Je vois beaucoup de rats morts gisant sur le sol », écrit Alexandre Yersin à son arrivée à Hong Kong le 15 juin 1894. « Les rats sont certainement les véritables propagateurs de l'épidémie. »" #NT!
 panum.844.g: "Une thèse audacieuse." #NT!
 panum.845.t: "Un échantillon" #NT!
 panum.845.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a réussi à prélever un échantillon de tissu sur une victime de la peste dans une morgue. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] a dû faire preuve de beaucoup de persuasion. Ou plutôt, [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] a dû soudoyer quelques personnes pour l'obtenir." #NT!
 panum.845.f: "« Ils reposent dans leurs cercueils, qui sont entièrement recouverts de chaux. Un des cercueils est ouvert. J'écarte la chaux pour exposer la région de l'aine. La bosse est clairement visible. Je l'enlève en moins d'une minute. » - Alexandre Yersin" #NT!
 panum.845.g: "Nous rembourserons les frais." #NT!
  
 panum.851.t: "« Simplement la pauvreté et la saleté »" #NT!
 panum.851.d: "Le médecin de district de [SCOPE.sState('panum_disease_state').GetName], au nom des autorités locales, a rejeté les investigations actuelles du docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] comme étant sans fondement. Les causes et les méthodes de traitement de la peste sont « bien connues »." #NT!
 panum.851.f: "« Nous devons exprimer notre surprise que le gouvernement central de [ROOT.GetCountry.GetCapital.GetCityHubName] ait jugé nécessaire d'envoyer un médecin, alors que nous avons suffisamment sous contrôle la situation. Les mesures de désinfection et d'assainissement ont eu un effet, notamment le nettoyage des maisons et l'amélioration des conditions de vie des résidents. Le poison est probablement dû aux conditions atmosphériques sous les maisons de certains quartiers, et il est simplement causé par la pauvreté et la saleté. Au sens ordinaire du terme, la maladie n'est ni infectieuse ni contagieuse. »\n\nExtrait d'une lettre du médecin de district au gouvernement" #NT!
 panum.851.g: "Le succès parle de lui-même..." #NT!
 panum.852.t: "Aliments contaminés" #NT!
 panum.852.d: "Plusieurs scientifiques, dans une controverse directe avec le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], ont clairement démontré que la peste est une maladie intestinale causée par une mauvaise alimentation." #NT!
 panum.852.f: "« Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] a peut-être des théories intéressantes, mais [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] n'a pas assez d'expérience dans le traitement de la maladie. Les médecins locaux de [SCOPE.sState('panum_disease_state').GetName] ont demandé à plusieurs reprises aux autorités de ne pas remettre en question les résultats établis. Les faits sont les suivants : 40 % des patients atteints de peste souffrent de vomissements, 30 % de diarrhée et près de 20 % de douleurs abdominales. Au total, des troubles gastro-intestinaux ont été constatés chez près de 60 % des patients. Il est donc clair qu'il s'agit d'une infection du tube digestif, et il est d'autant plus évident qu'elle est apparemment due à une alimentation avariée, mauvaise ou autrement déficiente. »\n\n" #NT!
 panum.852.g: "Docteur, que répondez-vous ?" #NT!
 panum.853.t: "Une maladie tropicale" #NT!
 panum.853.d: "Plusieurs médecins de renommée internationale ont avancé la théorie selon laquelle la peste est une autre maladie tropicale qui ne se manifesterait guère en dehors de certaines zones climatiques et, si elle se manifestait, seulement de manière sporadique. Il s'agit donc d'une maladie climatique." #NT!
 panum.853.f: "« Nous avons déjà constaté par le passé qu'un climat plus frais avait entraîné un ralentissement de la vague de peste. Les implications sont claires : la peste est une maladie fortement liée aux changements climatiques. Les données météorologiques et les peintures survivantes montrent que la dernière vague de peste a eu lieu dans un environnement nettement plus chaud qu'aujourd'hui. La disparition de la peste à partir de la fin du XVIIe siècle est corrélée à un refroidissement du temps jusqu'à sa disparition complète. La hausse des températures de ces dernières années, en revanche, est corrélée à la propagation de la peste dans des zones qui étaient auparavant considérées comme plus froides. Dois-je aller plus loin ? »\n\nUne lettre du docteur Angelika Hasenbein au docteur [ROOT.Var('panum_physician_var').GetCharacter.GetFullNameNoFormatting]" #NT!
 panum.853.g: "Donc juste une variante de la fièvre jaune." #NT!
 panum.854.t: "La fausse peste" #NT!
 panum.854.d: "Ces derniers jours, le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] avait été envoyé dans plusieurs hôpitaux pour examiner les malades. Il s'avéra qu'il ne s'agissait pas de pestiférés mais de typhus." #NT!
 panum.854.f: "« La peste noire, le typhus, le choléra, la tuberculose, la peste bubonique... Oh, c'était le bon vieux temps. » - Un entrepreneur de pompes funèbres inconnu" #NT!
 panum.854.g: "Regrettable." #NT!
 panum.854.h: "Si nous perdons du temps, peut-être que le médecin pourrait l'utiliser ?" #NT!
  
 panum.861.t: "L’opium n’est pas une réponse" #NT!
 panum.861.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a soigneusement examiné les prétendus effets curatifs de l’opium contre les maladies de la peste et est arrivé à une conclusion claire." #NT!
 panum.861.f: "« Cela ne marche pas. »\n\nConclusion du Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] concernant l'utilisation de l'opium" #NT!
 panum.861.g: "C'est un peu décevant et éclairant en même temps." #NT!
 panum.862.t: "Septicamie" #NT!
 panum.862.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a pu prouver que plusieurs expériences qui étaient censées suggérer une maladie gastro-intestinale comme cause de la peste ont été complètement mal interprétées." #NT!
 panum.862.f: "L'hypothèse d'une infection par voie digestive, due à des aliments spécifiquement contaminés, a été largement acceptée pendant plusieurs années, même si certains considéraient que les « émanations de l'haleine et de la peau » étaient le facteur étiologique le plus important. De nombreuses expériences d'alimentation animale avec des produits de la peste ont été entreprises et l'hypothèse gastro-intestinale a été confirmée, car de nombreux animaux et oiseaux sont morts d'une maladie septicémique ressemblant à la peste. Cependant, les résultats n'ont pas été concluants et ont finalement été contestés à Hong Kong en 1904 par le médecin hygiéniste actuel, qui a exprimé son total désaccord avec cette hypothèse." #NT!
 panum.862.g: "Il s’agit d’un sérieux coup porté à la théorie selon laquelle la peste aurait été causée par une contamination alimentaire." #NT!
 panum.863.t: "Antibiotiques" #NT!
 panum.863.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a pu démontrer dans plusieurs expériences que les patients atteints de peste répondent parfaitement au traitement antibiotique et recommande expressément cette approche." #NT!
 panum.863.f: "« Dire que mes expériences ont été un succès complet serait un euphémisme. En fait, j'ai été surpris de l'effet des antibiotiques. Certains patients ont même déclaré qu'ils avaient eu l'impression d'être guéris. Si cet effet se confirme, la recherche d'un vaccin contre la peste pourrait devenir inutile. »\n\nExtrait du journal du Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [TimeKeeper.GetCurrentDate.Format('y')]" #NT!
 panum.863.g: "Les antibiotiques n’ont-ils pas d’inconvénients ?" #NT!
 panum.864.t: "Insecticides" #NT!
 panum.864.d: "L'utilisation massive d'insecticides dans un foyer de peste n'a eu aucun effet. Selon le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], il s'agit d'un succès surprenant." #NT!
 panum.864.f: "« Vous avez raison de me demander pourquoi je me réjouis de cet échec. Mais les scientifiques apprennent aussi de leurs défaites. En ce sens, ce n'était pas une défaite, mais une preuve. Plusieurs de mes collègues ont suggéré que la peste pourrait être une maladie tropicale semblable à la malaria, qui se transmet par un moustique. Au moins, nous pouvons mettre cette hypothèse de côté. »\n\nExtrait d'une interview du Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] dans un journal local" #NT!
 panum.864.g: "Une option de moins." #NT!
 panum.865.t: "Latrines" #NT!
 panum.865.d: "Lors d'une enquête sur les mesures d'hygiène au [SCOPE.sState('panum_disease_state').GetName], le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a constaté que les infrastructures modernes d'égouts et de latrines laissaient à désirer, surtout dans un quartier infesté de peste, et a contacté les autorités locales." #NT!
 panum.865.f: "« Même si la meilleure façon de lutter contre la peste n'est pas encore clairement établie et quelles que soient mes théories personnelles et celles de mes collègues, l'expérience montre que les sols contaminés par des matières fécales et les eaux stagnantes polluées doivent en principe être éliminés, que ce soit à cause des miasmes qu'on soupçonne d'en être la cause ou parce qu'ils constituent des foyers de germes. Si nous voulons lutter contre la peste mais aussi contre d'autres sources de maladies à l'avenir, nous devons prendre des mesures préventives. »\n\nDr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] dans une lettre adressée au gouvernement local" #NT!
 panum.865.g: "Cela coûtera cher, mais c’est inévitable." #NT!
  
 panum.870.t: "Bacillus pestis" #NT!
 panum.870.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a examiné l’échantillon de tissu avec son microscope et a déterminé définitivement : la peste est transmise par un bacille !" #NT!
 panum.870.f: "'20 juin 1894. Les bosses contiennent, clairement et nettement visiblement, un nombre énorme de bacilles. Elles sont petites, courtes et ont des extrémités arrondies. C'est sans conteste le microbe de la peste.' - Alexandre Yersin" #NT!
 panum.870.g: "Cela change tout !" #NT!
 panum.871.t: "Puces" #NT!
 panum.871.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a peut-être fait l’une des découvertes les plus cruciales de l’histoire de la peste : la relation entre les puces, les rats et l’épidémie de peste." #NT!
 panum.871.f: "Dans [TimeKeeper.GetCurrentDate.Format('y')], [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] a découvert le vecteur de la maladie, la puce-rat. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] avait noté que les personnes qui tombaient malades n’avaient pas besoin d’être en contact étroit les unes avec les autres pour contracter la maladie. Au Yunnan, en Chine, les habitants fuyaient leur maison dès qu’ils voyaient des rats morts, et sur l’île de Formose (Taïwan), les habitants considéraient que la manipulation de rats morts augmentait les risques de développer la peste. Ces observations ont conduit [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] à soupçonner que la puce pourrait être un facteur intermédiaire dans la transmission de la peste, puisque les personnes ne contractaient la peste que si elles étaient en contact avec des rats morts moins de 24 heures auparavant. Dans une expérience désormais classique, [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a démontré comment un rat sain est mort de la peste après que des puces infectées aient sauté sur lui à partir d’un rat qui était récemment mort de la peste." #NT!
 panum.871.g: "Fascinant." #NT!
 panum.872.t: "Sérum anti-peste" #NT!
 panum.872.d: "S'appuyant sur ses connaissances préalables sur la transmission et l'origine de la peste, ainsi que sur des expériences avec le bacille de la peste, le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a développé un sérum anti-peste très efficace et l'a testé avec succès sur un premier patient." #NT!
 panum.872.f: "« À partir de minuit, le patient devient plus calme, et à six heures du matin (…) il se réveille et déclare qu’il se sent guéri. » - Alexandre Yersin" #NT!
 panum.872.g: "Ça marche!" #NT!
  
