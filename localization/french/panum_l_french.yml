 je_group_panum_medicine: "Morgenröte: #ORANGE Panum Medicine#!"
 je_panum_cholera: "Épidémie de choléra"
 je_panum_cholera_reason: "Le choléra est considéré comme la pire épidémie du 19e siècle. Il a une signification similaire pour l'ère victorienne comme la peste au Moyen Âge. Il se propage plus rapidement que toute autre maladie et se présente dans une variété mortelle. \ N \ nhe invention de #ORANGE Modern Ewerage#! a une signification particulière dans la lutte contre le choléra. Avec cette technologie, un [concept_panum_physician] peut trouver un traitement #V pour cholera#!. Même un système de santé modérément bon aidera. Tout cela conduit à une meilleure prévention et guérir de la maladie. Les capitales qu'un [concept_gaudi_architect] équipent d'un système d'égout moderne sont en principe protégés contre les épidémies du choléra. \ N \ nin afin de vaincre le choléra une fois pour toutes, un vaccin #V contre le choléra#! est nécessaire qui est développé par un [concept_theiler_biologist]."
 je_panum_tuberculosis: "Épidémie de tuberculose"
 je_panum_tuberculosis_reason: "Avec le choléra, la tuberculose a été l'une des causes les plus courantes de décès au 19e siècle. La «mort blanche» a commencé comme une maladie romantique et est finalement devenue de plus en plus une maladie du prolétariat. La tuberculose est principalement limitée à quelques états à faible niveau de vie et à une grande urbanisation. \ N \ nLe invention de la pasteurisation #ORANGE #! a une signification particulière dans la lutte contre la tuberculose. Avec cette technologie, un [concept_panum_physician] peut trouver un traitement #V pour la tuberculose#!. Un bon système de santé aidera. Tout cela conduit à une meilleure prévention et guérir de la maladie. Dans de rares cas, les stations de santé climatiques peuvent émerger en réponse à la tuberculose, bien qu'avec des résultats de guérison discutables. \ N \ nin afin de vaincre la tuberculose une fois pour toutes, un vaccin #V contre la tuberculose#! est développé qui est développé par un [concept_theiler_biologist]."
 je_panum_smallpox: "Épidémie de variole"
 je_panum_smallpox_reason: "La variole est l'un des grands fléaux de l'humanité qui ont décimé des peuples entiers. En raison de la variolation et de la vaccination de la variole, il a perdu sa terreur au cours du XVIIIe siècle, mais sans précautions, il peut encore montrer sa vilaine visage. \ N \ nhe l'invention de la vaccination #ORANGE #! a une importance particulière dans la lutte contre la variole. Avec cette technologie, un [concept_panum_physician] peut trouver un traitement #V pour Smallpox#!. Déjà un système de santé rudimentaire aidera. Tout cela conduit à une meilleure prévention et guérison de la maladie. \ N \ nin afin de vaincre la variole une fois pour toutes, un vaccin #V contre la variole est nécessaire qui est développé par un [concept_theiler_biologist]."
 je_panum_typhus: "Épidémie de typhus"
 je_panum_typhus_reason: "Bien que le typhus soit connu depuis la fin du Moyen Âge, ses effets les plus dévastateurs se sont produits pendant les guerres napoléoniennes. Il a donc conservé son horreur pour les générations après 1815. La fièvre typhoïde peut se propager rapidement à plusieurs pays. Les régions à forte dévastation sont particulièrement affectées. Il est donc considéré comme une maladie de guerre classique et affecte particulièrement les soldats et leurs casernes exiguës. \ N \ NLE L'invention des antibiotiques #ORANGE a une signification particulière dans la lutte contre le typhus. Avec cette technologie, un [concept_panum_physician] peut trouver un traitement #V pour Typhus#!. Déjà un système de santé rudimentaire aidera. Tout cela conduit à une meilleure prévention et guérir de la maladie. \ N \ nin afin de vaincre le typhus une fois pour toutes, un vaccin #V contre Typhus#! est nécessaire qui est développé par un [concept_theiler_biologist]."
 je_panum_yellow_fever: "Épidémie de fièvre jaune"
 je_panum_yellow_fever_reason: "La fièvre jaune est une maladie régionale qui se produit près des tropiques, mais au 19e siècle, elle s'est propagée au sud des États-Unis et en Europe. Il ne se propage généralement que dans quelques états, mais il ne fait pas moins de ravage. Avec cette technologie, un [concept_panum_physician] peut trouver un traitement #V pour la fièvre jaune_1. Déjà un système de santé rudimentaire aidera. Tout cela conduit à une meilleure prévention et guérir de la maladie. \ N \ nin afin de vaincre une fois pour toutes la fièvre jaune, un vaccin #V contre la fièvre jaune est nécessaire qui est développé par un [concept_theiler_biologist]."
 panum.100.t: "L'épidémie de choléra de [TimeKeeper.GetCurrentDate.Format('y')]"
 panum.100.d: "#YELLOW Cholera#!, L'un des pires fléaux de l'humanité, s'est propagé à l'une de nos villes. Les temps sombres ont commencé. Nous devons nous attendre à ce qu'il se propage à travers le pays - et faire des ravages."
 panum.100.f: "Le choléra, endémique en Asie de l'Est, s'est probablement produit dans le sous-continent indien sur plusieurs siècles sous la forme d'épidémies localisées, mais était inconnue sur d'autres continents. La première pandémie s'est produite entre 1817 et 1824 et a touché des parties de l'Asie ainsi que de l'Afrique de l'Est et de l'Asie mineure, puis la Russie et l'Europe. En 1830, il est apparu dans l'est de la Galice et de la Hongrie, et en juin 1831 à Vienne. Il a submergé le monde dans un total de six pandémies et est devenu le fléau de la société industrielle émergente. Bien que la plupart des infections (environ 85%) soient asymptomatiques, le taux de mortalité au début se situe entre 20 et 70%, si la maladie n'est pas traitée."
 panum.100.g: "Grim Reaper est à notre porte."
 panum.102.t: "L'épidémie de choléra atteint [SCOPE.sCountry('panum_infected_country').GetName]"
 panum.102.d: "Nous avons reçu des informations selon lesquelles les premiers cas de choléra ont été signalés dans le [SCOPE.sCountry('panum_infected_country').GetName] aujourd'hui. Les autorités nous blâment de ne pas en faire assez pour empêcher la propagation."
 panum.102.g: "C'est censé être de notre faute ...?"
 panum.103.t: "Choléra dans les usines"
 panum.103.d: "Plusieurs usines du [SCOPE.sState('panum_disease_state').GetName] signalent les premiers cas de choléra parmi les travailleurs. Les autorités locales proposent un règlement pour lutter contre la propagation. Cela aurait un impact massif sur l'industrie."
 panum.103.f: "Le premier cas de choléra s'est produit la semaine dernière dans un moulin à eau à la périphérie de la ville. Bien que le bâtiment ait été mis en quarantaine, il y a eu d'autres incidents plus en aval dans plusieurs manufactures. On ne sait toujours pas comment la maladie s'est propagée, mais certains politiciens locaux conviennent que des restrictions difficiles devraient être utilisées pour retrouver la perte de confiance parmi la population."
 panum.103.g: "Quarantine les usines!"
 panum.103.h: "Les usines doivent continuer à fonctionner, à tout prix!"
 panum.104.t: "[SCOPE.sCharacter('disease_victim_scope').GetFullName] a contracté le choléra!"
 panum.104.d: "Il y a quelques jours à peine, [SCOPE.sCharacter('disease_victim_scope').GetFullName] semblait être entièrement en bonne santé, mais la nuit dernière [SCOPE.sCharacter('disease_victim_scope').GetSheHe] a montré les premiers symptômes de la terrible maladie qui a balayé [ROOT.GetCountry.GetNameNoFlag]. [SCOPE.sCharacter('disease_victim_scope').GetHerHis|U] La santé est déplorable."
 panum.104.f: "Les deux premières vagues du choléra au 19e siècle ont également tué des gens célèbres. En Prusse, le philosophe Georg Friedrich Wilhelm Hegel et le général d'août Neidhardt von Gneisenau sont morts dans l'épidémie de choléra de 1831. Le compositeur Pyotr Ilyich Tchaikovsky est également considéré comme une victime de choléra, même dans les circonstances."
 panum.104.g: "Assurez-vous le meilleur traitement possible!"
 panum.104.h: "Notre meilleur médecin s'occupera personnellement du [SCOPE.sCharacter('disease_victim_scope').GetHerHim]."
 panum.104.i: "[SCOPE.sCharacter('disease_victim_scope').GetSheHe|U] n'est pas si important ..."
 panum.105.t: "L'exode des riches"
 panum.105.d: "La classe supérieure de [SCOPE.sState('panum_disease_state').GetName] utilise ses ressources financières pour quitter la zone le plus rapidement possible ou pour s'échapper à la campagne. Beaucoup de pots-de-vin ont été payés pour contourner les réglementations de quarantaine. Les gens ordinaires voient ce développement avec mépris."
 panum.105.f: "L'une des caractéristiques du choléra était qu'elle avait tué à la fois riche et pauvre, ce qui le rendait comme la peste du Moyen Âge. Les familles influentes et riches ont donc essayé de leur mieux pour éviter la peste. L'aristocratie considérait le choléra comme une sorte de «maladie révolutionnaire» car elle n'a fait aucune distinction entre les classes. Les mesures laxistes vers la classe supérieure ont fait du choléra un problème politique en raison de ces conflits sociaux. Il a souvent été déclaré que les épidémies du choléra du début des années 1830 en Europe et les mouvements révolutionnaires se trouvaient dans un contexte."
 panum.105.g: "Laissez-les partir."
 panum.105.h: "Il y a un motif que nous l'appelons le grand égaliseur."
 panum.106.t: "L'opposition essaie d'exploiter le choléra"
 panum.106.d: "L'opposition utilise l'épidémie pour régler les scores: il accuse le gouvernement de faire d'énormes erreurs dans la lutte contre l'épidémie."
 panum.106.f: "En raison de leurs implications sociales et politiques, les épidémies du choléra étaient un domaine dans lequel les libéraux en particulier pouvaient blâmer les conservateurs. Des mesures plus progressives et de nouvelles méthodes ont été recommandées comme alternative à l'élite «arrière». Il ne devrait pas être surprenant que ce seuil entre les conservateurs et les libéraux se soit répété dans différentes circonstances et avec différentes parties."
 panum.106.g: "Vous avez raison, nous avons tort. Maintenant, combattons l'épidémie!"
 panum.106.h: "Ce gouvernement a la situation parfaitement sous contrôle."
 panum.107.t: "Fosses"
 panum.107.d: "La critique des nouvelles tombes de masse creusées en [SCOPE.sState('panum_disease_state').GetName] augmente. La classe inférieure en particulier considère le processus comme un processus presque mécanique au lieu des soins appropriés pour les morts."
 panum.107.f: "Dans le sillage des décès de masse et des risques d'infection possibles, l'enterrement de masse des morts est devenu un phénomène inévitable. Le fait que des citoyens plus riches puissent se permettre d'avoir des funérailles dans le style habituel, tandis que les corps des pauvres étaient simplement enterrés, ont provoqué l'explosivité sociale."
 panum.107.g: "Nous n'avons pas le temps de perdre avec les funérailles!"
 panum.107.h: "Tout le monde mérite un enterrement digne."
 panum.108.t: "Hôpitaux du choléra"
 panum.108.d: "Plusieurs partis politiques, par leurs propres intérêts, ont décidé de créer des hôpitaux de choléra pour prendre soin de la classe inférieure. Cependant, ils ne sont pas très populaires."
 panum.108.f: "La construction d'hospitalisations de masse pendant les épidémies telles que le choléra ou la tuberculose était souvent controversée. Les familles préféraient s'occuper de leurs malades à la maison au lieu de les donner à l'anonymat, où elles étaient entassées dans un petit espace avec d'autres malades, c'est pourquoi beaucoup étaient convaincus qu'ils tomberaient malades et y mourraient. L'accusation a circulé qu'il s'agissait principalement d'une mesure pour isoler les pauvres des riches et ainsi protéger ce dernier."
 panum.108.g: "Battez-les dans les hôpitaux si vous le devez!"
 panum.108.h: "Vous ne pouvez pas forcer ces bœufs obstinés à vivre."
 panum.109.t: "Panique publique"
 panum.109.d: "Malgré les meilleurs efforts du gouvernement local au [SCOPE.sState('panum_disease_state').GetName], la population a commencé à succomber à l'une des parties les plus dangereuses de toute épidémie: la panique."
 panum.109.f: "`` Il est facile de penser que nous sommes au-dessus de toute autre bête sur cette terre, mais que nous supprimons le placage de la raison, et vous constatez que l'homme est toujours un animal, gouverné par la peur et la crainte d'un demain inconnu. L'épidémie et la propagation de la maladie peuvent remplir le cœur même des troupes vétérans avec terreur, car qui peut combattre un ennemi qu'ils ne peuvent même pas voir? Non, la terreur peut mâcher leur cœur et les laisser voir des ennemis dans tous les coins, et là où il y a des ennemis, il y a des ennemis à combattre. Le malade, a piétiné de pierres pour les éloigner. Murmure à propos de cette famille qui n'est pas sortie de leur porte. L'homme calme et honnête ramène à la maison une arme à feu, peur que le prochain coup sur la porte apporte un petit vol et un vol, et non de l'aide. \ N \ n’est pas la fin du monde. C'est la fin de l'illusion: l'homme est un animal, et il a peur. '\ N \ nan extrait d'un article de presse sur l'épidémie de [TimeKeeper.GetCurrentDate.Format('y')], du [SCOPE.sState('panum_disease_state').GetName] fois."
 panum.109.g: "Damnable peur! Comment pouvons-nous les aider s'ils ne voient pas la raison?"
 panum.110.t: "Objectif commun"
 panum.110.d: "L'épidémie de choléra en [SCOPE.sState('panum_disease_state').GetName] semble avoir favorisé un sentiment d'unité nationale, les habitants de la région s'unisant ensemble pour essayer de combattre le déclenchement."
 panum.110.f: "«Une salle d'hôpital est un endroit sombre, car c'est un rappel que nous vivons dans un monde maladif. Mais cette maladie ne se soucie pas de qui vous êtes: il ne se soucie pas de la religion que vous gardez, pour le maître que vous avez, pour la couleur de votre peau ou la politique que vous tenez près de votre cœur. Regardez vers le lit, et voyez un homme, une femme ou un enfant. Vous voyez Pople, ayant besoin d'aide. Ils ne se soucient pas de qui l'apporte. Ils ne se soucient pas si le médecin est prêtre, ou un soldat, ou un travailleur commun offrant le peu de temps qu'il a pour épargner, se dresser pour aider un étranger. Ils ne se tournent pas vers lui pour voir un monarchiste, un républicain, ou un agitateur, ou autre chose que ce qu'ils sont vraiment. \ N \ nthey le regarde, et ils voient un homme. Un frère, un fils, un compatriote, mais surtout un son compatriote. '\ N \ nan Extrait d'un article de presse sur l'épidémie de [TimeKeeper.GetCurrentDate.Format('y')], du [SCOPE.sState('panum_disease_state').GetName] fois."
 panum.110.g: "Nous sommes unis contre le choléra!"
 panum.111.t: "L'horreur"
 panum.111.d: "Les montagnes des cadavres en [SCOPE.sState('panum_disease_state').GetName] s'accumulent maintenant. Il n'y a personne qui ne connaît pas au moins une connaissance qui a été infectée par le choléra. La région est devenue un épicentre de l'épidémie."
 panum.111.f: "Berlin seul a été frappé par le choléra treize fois en 42 ans entre 1831 et 1873. Les épidémies de 1848/49, 1852, 1855 et 1866 étaient particulièrement sévères dans toute la Prusse. Dans ce dernier cas, 114 683 personnes sont officiellement décédées du choléra. Une épidémie de choléra à Londres en 1848/1849 a été beaucoup plus grave que l'épidémie de choléra en 1832/1832. Au cours de cette épidémie, 15 000 personnes sont mortes à Londres, plus de 0,5% de la population de la ville au moment d'environ 2,5 millions. Au cours de la première semaine de septembre 1849, 300 personnes sont décédées par jour. Dans la troisième pandémie entre 1852 et 1860, environ un million de personnes sont mortes en Russie, qui a été facilitée par la guerre de Crimée qui se déroulait en même temps. Le commandant en chef britannique, Lord Raglan, et le commandant de la flotte française, Armand Joseph Bruat, sont décédés de la maladie. On pense que plus de gens sont morts du choléra que de combats."
 panum.111.g: "Combien de plus morts ?!"
 panum.120.t: "Terminées épidémiques du choléra"
 panum.120.d: "L'ensemble de [ROOT.GetCountry.GetNameNoFlag] pousse un soupir de soulagement: les autorités viennent de signaler qu'il n'y a plus de cas de choléra dans la dernière zone de la maladie. L'état d'urgence est terminé. Il est maintenant temps de compter les morts et de retourner à la normalité."
 panum.120.f: "«Que Dieu soit avec moi! Que le ciel bénisse cette nouvelle année. Que ce soit une année de fécondité, de paix et de prospérité; Que ce soit une année de paix et d'unité pour toute l'humanité; Que le monde soit libéré du choléra. -Giacomo meyerberr"
 panum.120.g: "Mais à quel prix?"
 panum.200.t: "Épidémie de tuberculose"
 panum.200.d: "Une épidémie a éclaté dans l'un de nos États: #YELLOW tuberculosis#! ravagent dans [SCOPE.sState('panum_disease_state').GetName]!"
 panum.200.f: "Au début du Moyen Âge, la tuberculose a joué un rôle mineur en Europe en raison de la population clairsemée. Il n'était que plus fortement représenté dans les quelques zones métropolitaines. Après une épidémie précédente en Italie dans la seconde moitié du XVe siècle, la plus grande et la plus longue vague de tuberculose de l'histoire a commencé au XVIIe siècle. La tuberculose a suscité un intérêt généralisé dans le 19e et au début du 20e siècle en tant que maladie endémique des pauvres urbains. En 1815, un quart des décès en Angleterre et en 1918 en France, un sixième de décès a été causé par la tuberculose. Vers 1880, chaque seconde décès en Allemagne dans le groupe d'âge des 15 à 40 ans était due à cette maladie. La tuberculose était également la cause la plus fréquente de décès dans les zones rurales."
 panum.200.g: "Y a-t-il au moins le temps pour une mort romantique?"
 panum.220.t: "Tuberculosis Épidémique Ends"
 panum.220.d: "La ville et les médecins ruraux rapportent que le zénith des cas de tuberculose a déjà été adopté depuis quelques semaines. Bien que la maladie n'ait pas complètement disparu, elle est de retour dans les limites habituelles."
 panum.220.f: "«Je ne peux pas être trompé dans cette couleur; \ nat la goutte de sang est mon warrant de mort; \ n je dois mourir. -John Keats"
 panum.300.t: "Épidémie de variole"
 panum.300.d: "Une épidémie a éclaté dans l'un de nos États: #YELLOW Smallpox#! ravage dans [SCOPE.sState('panum_disease_state').GetName]!"
 panum.300.f: "La variole est probablement connue depuis des milliers d'années et est apparue dans les premières colonies en Afrique du Nord-Est il y a 12 000 ans. De là, ils ont peut-être été amenés en Inde par des commerçants égyptiens. Les conquérants européens ont apporté la variole avec eux en Amérique, où il a provoqué des épidémies dévastatrices parmi les Indiens commençant en 1518, causant des millions de morts. En Europe, la variole était parfois considérée comme une maladie infantile, et la maladie, à partir de laquelle jusqu'à 10% de tous les petits enfants sont morts jusqu'à la fin du XVIIIe siècle, était également appelé «maladie des enfants». À partir du XVIIIe siècle, les cas de variole ont augmenté et remplacé la peste comme la pire maladie. On estime que 400 000 personnes sont mortes de variole chaque année, et un tiers de ceux qui ont survécu sont devenus aveugles. Souvent, les enfants n'étaient considérés comme faisant que partie de la famille une fois qu'ils avaient survécu à la variole. Malgré l'introduction réussie de la vaccination par variole vers 1800, la variole est restée une maladie épidémique jusqu'à la seconde moitié du siècle."
 panum.300.g: "Les produits cosmétiques deviendront bientôt populaires, je suppose."
 panum.320.t: "Termins épidémique de la variole"
 panum.320.d: "La terrible variole, l'un des pires fléaux de l'humanité, disparaît lentement du [ROOT.GetCountry.GetNameNoFlag]. Ceux qui ont survécu sont marqués à vie."
 panum.320.f: "«Les nations futures sauront par l'histoire seulement que la variole répugnante a existé et que vous avez été extirpée.» -Thomas Jefferson"
 panum.400.t: "Épidémie de typhus"
 panum.400.d: "Une épidémie a éclaté dans l'un de nos États: #YELLOW Typhus#! ravage dans [SCOPE.sState('panum_disease_state').GetName]!"
 panum.400.f: "La fièvre du typhus, qui existait probablement dans les temps anciens mais n'a été décrite de manière fiable au XVIe siècle, est apparue principalement comme une épidémie typique de la guerre et de la misère. Typhus est devenu un problème grave pour l'armée de Napoléon pendant la campagne russe. Lorsque la Grande Arme, qui avait déménagé en Russie en juin 1812, s'est retirée à l'automne 1813, Mayin a été le premier arrêt sur le sol français. 15 000 à 17 000 membres d'équipage français et autant de civils y sont morts. La maladie, qui était ensuite également appelée «fièvre nerveuse» en raison des symptômes neurologiques qu'elle a provoqués, est resté dans la langue française comme Typhus de Mayence. Fin octobre 1814, 14 000 cas de typhus avaient été enregistrés dans la région franconienne autour du Grand Duché de Würzburg, dont 2 500 étaient mortels. Une autre épidémie avec environ deux millions et demi de morts s'est produite à la suite de la guerre et de la guerre civile entre 1918 et 1922 en Russie."
 panum.400.g: "Peut-être changer vos vêtements?"
 panum.420.t: "Typhus Epidemic Ends"
 panum.420.d: "Il semble que la pire phase du typhus épidémique soit terminée. Bien que le nombre de corps n'ait pas encore été achevé, il est déjà clair que personne ne peut être tenu responsable de cette terrible épidémie."
 panum.420.f: "«Les seuls patients anglais que j'ai jamais connus du thé à l'abri des déchets ont été des cas de typhus; Et le premier signe de leur amélioration était à nouveau leur envie de thé. -Florence Nightingale"
 panum.500.t: "Épidémie de fièvre jaune"
 panum.500.d: "Une épidémie a éclaté dans l'un de nos États: #YELLOW Yellow Fever#! ravage dans [SCOPE.sState('panum_disease_state').GetName]!"
 panum.500.f: "La fièvre jaune est endémique pour les zones tropicales et subtropicales en Amérique du Sud et en Afrique. Aux XVIIIe et XIXe siècles, l'Amérique centrale, les Caraïbes et le sud de ce qui est maintenant les États-Unis ont également été affectés. La maladie est probablement originaire d'Afrique et a atteint le Nouveau Monde via le commerce triangulaire de l'Atlantique. La première épidémie probable de la maladie s'est produite dans le Yucatan en 1648, où la maladie a été appelée Xekik (Vomit noir). Au moins 25 épidémies majeures ont suivi, comme à Philadelphie en 1793, au cours de laquelle plusieurs milliers de personnes sont mortes et le gouvernement américain, puis le président George Washington a été contraint de quitter la ville. L'une des premières descriptions médicales de la fièvre jaune en Amérique du Nord a été de John Lining (1756), un médecin à Charleston, où la fièvre jaune s'est produite en 1728 et 1732. Des épidémies occasionnelles ont également été enregistrées en Europe, par exemple à Barcelone en 1821 avec plusieurs milliers de morts. En 1867, il y a eu une éruption à Fort Jefferson en Floride. En 1878, une éruption dans la vallée du Mississippi a tué 20 000 personnes, et la dernière éruption aux États-Unis était à la Nouvelle-Orléans en 1905."
 panum.500.g: "Les fruits gâtés sont-ils à blâmer?"
 panum.520.t: "Elimides épidémiques de la fièvre jaune"
 panum.520.d: "Après que les rues et les familles entières ont été anéanties par la fièvre jaune insidieuse, les médecins et les autorités donnent le peu clair: l'épidémie est enfin terminée."
 panum.520.f: "\"Il est appelé une fièvre jaune, mais ce n'est comme rien de connu ou de lecture par les médecins.\" -Thomas Jefferson"
 building_panum_tuberculosis_sanatorium: "Sanatorium de tuberculose"
 pmg_panum_sanatorium: "Sanatorium de tuberculose"
 pm_panum_sanatorium: "Sanatorium de tuberculose"
 building_panum_tuberculosis_sanatorium_tt: "Un sanatorium de tuberculose peut être fondé à la suite d'une épidémie de tuberculose dans les zones de montagnes. #R Il n'est activé que via l'événement.#!"
 panum_tuberculosis: "Tuberculose"
 panum_tuberculosis_desc: "La tuberculose, également connue sous le nom de «mort blanche», a été une principale cause de décès à l'époque victorienne."
 panum_forbidden_spitting_modifier: "Interdiction de cracher"
 panum_tuberculosis_quarantine_modifier: "Tuberculose quarantaine"
 panum_tuberculosis_sanatorium_cost_modifier: "Coût du sanatorium"
 panum_help_against_tuberculosis_modifier: "Aide contre la tuberculose"
 panum_praised_for_tuberculosis_initiative_modifier: "Loué pour la parole de la tuberculose"
 panum_supports_health_care_initiative_modifier: "Soutient l'initiative des soins de santé"
 panum_opposes_health_care_initiative_modifier: "S'oppose à l'initiative des soins de santé"
 panum_tuberculosis_hospital_modifier: "Hôpital de tuberculose"
 panum.201.t: "La tuberculose se propage à [SCOPE.sState('panum_disease_state').GetName]"
 panum.201.d: "L'épidémie de tuberculose s'est propagée malgré nos meilleurs efforts. Maintenant, il fait également rage dans [SCOPE.sState('panum_disease_state').GetName]."
 panum.201.g: "La mort blanche semble imparable."
 panum.202.t: "Une maladie héréditaire?"
 panum.202.d: "Malgré tous les examens médicaux, l'origine de la tuberculose reste une zone controversée. Certains de nos membres du personnel médical supposent qu'il s'agit d'une maladie héréditaire, ou au moins une basée sur des «facteurs internes». D'autres médecins sont d'avis qu'il s'agit d'une maladie classique et contagieuse et recommande des mesures radicales."
 panum.202.f: "En ce qui concerne le concept de pathogenèse, différentes traditions existaient dans les pays européens des XVIIIe et 19e siècles. De nombreux auteurs médicaux de ce temps considéraient la tuberculose, ou consommation, qui n'en était pas toujours synonyme, comme le pire des épidémies connues à l'époque. Ils ont vu les causes comme une distribution inégale d'humeurs corporelles, des exhalations inquiétantes du sol, de l'urbanisation ou du déclin des coutumes. En Italie, en revanche, il y avait une tendance traditionnelle vers un contagieux, c'est-à-dire h. cause transmittable. Par conséquent, au milieu du XVIIIe siècle, la République de Venise a introduit l'obligation écrite de signaler les cas de phtisie (consommation due à la tuberculose pulmonaire). Les effets personnels de ceux qui sont morts de la maladie ont été brûlés pour réduire le risque d'infection. En Angleterre et dans les pays nordiques, cependant, on croyait généralement que la maladie était due à une cause héréditaire."
 panum.202.g: "C'est une maladie héréditaire et nous ne pouvons rien faire."
 panum.202.h: "C'est une maladie contagieuse et nous devons faire tout notre possible pour l'empêcher de se propager!"
 panum.203.t: "Cracher dans les rues"
 panum.203.d: "En raison du manque de connaissances sur les causes de la tuberculose, les mesures étaient également controversées. Ceux qui ont assumé une cause contagieuse ont préconisé des interdictions radicales - y compris le crachat dans les espaces publics - pour empêcher la propagation. Cela a particulièrement affecté les classes inférieures. Les sceptiques ont vu des réglementations telles que le simple moyen de harceler les gens ordinaires."
 panum.203.f: "Même si les règles de l'étiquette du XVIIIe siècle ont éradiqué certaines «mauvaises habitudes» dans les classes supérieures et moyennes, de nombreuses bizarreries douteuses hygiéniquement sont restées longtemps parmi les masses. Les mouchoirs et les spittoons ne s'étaient pas encore répandus dans la société au début du 19e siècle, et ce n'est qu'au tournant du siècle qu'il est devenu une pratique courante d'interdire à cracher les transports publics, par exemple."
 panum.203.g: "Interdire cette habitude dégoûtante!"
 panum.203.h: "Annoncez une interdiction draconienne et faites payer les malfaiteurs!"
 panum.203.i: "Le crachage est une nature humaine qui ne peut pas être interdite."
 panum.204.t: "[SCOPE.sCharacter('disease_victim_scope').GetFullName] a contracté la tuberculose!"
 panum.204.d: "L'épidémie de tuberculose a également affecté notre artiste [SCOPE.sCharacter('disease_victim_scope').GetFullName]! Étonnamment, [SCOPE.sCharacter('disease_victim_scope').GetSheHe] ne le voit pas comme le pire coup du sort."
 panum.204.f: "Au début du 19e siècle, mais aussi bien au-delà, la tuberculose était considérée comme une «maladie romantique». Cela a donné à la victime suffisamment de temps pour se préparer à la mort, et beaucoup considéraient la pâleur associée comme rien de moins que noble. Les écrivains lui ont créé des monuments avec plusieurs œuvres, comme Dumas le plus jeune avec la «dame des camélias». Elle trouve une transfiguration similaire dans les opéras de Verdi (La Traviata) et Puccini (La Bohème). George Sand, le partenaire de Chopin, aurait noté: \"Chopin tousse avec une grâce infinie.\""
 panum.204.i: "Ne serait-ce pas une occasion inspirante pour un requiem?"
 panum.204.j: "Mais la tuberculose n'a-t-elle pas toujours fait l'objet d'écrivains?"
 panum.204.k: "Mais cette maladie même n'encourage-t-elle pas à visualiser la misère?"
 panum.205.t: "Sanatorium de tuberculose"
 panum.205.d: "Compte tenu de l'épidémie de tuberculose qui fait rage dans le [SCOPE.sState('panum_disease_state').GetName], l'un des médecins a suggéré que certains patients riches soient transférés dans les montagnes. On dit que le climat à haute altitude et l'air nettoyant les guérissent de la maladie. Il devrait y avoir un sanatorium pulmonaire dédié à cette fin. [SCOPE.sState('panum_davos_scope').GetName] semble être l'endroit idéal pour un tel sanatorium."
 panum.205.f: "La guérison de l'air est une forme de thérapie climatique qui a été considérée comme la thérapie standard de la tuberculose pendant longtemps à partir du 19e siècle. Les patients sont allongés sur des chaises de pont à l'extérieur ou dans des salons ouverts pendant plusieurs heures par jour. Le traitement de l'air a été effectué dans des sanatoriums pulmonaires spéciaux. En Allemagne, le docteur Hermann Brehmer a été le premier à décrire la tuberculose de la maladie précédemment incurable comme curable à l'aide de la thérapie aérienne. En 1856, il a écrit sa thèse sur la curabilité de la tuberculose chronique des poumons. Il a supposé qu'il y avait des «lieux immunitaires» qui, d'une part, en raison de leur climat, protègent efficacement les résidents de la survenue de tuberculose et, d'autre part, ont un effet de guérison après la rupture de la maladie. En Suisse, le médecin d'origine allemande Alexander Spengler a été un pionnier de la thérapie aérienne. Il a commencé à pratiquer en tant que médecin de pays à Davos en 1853 et est rapidement arrivé à la conclusion que les résidents de la région ne souffraient généralement pas de tuberculose, qu'il a attribuée au climat de la haute montagne. Thomas Mann a glorifié Davos en tant que complexe de santé climatique dans son «Zauberberg»."
 panum.205.g: "Construisez un sanatorium en [SCOPE.sState('panum_davos_scope').GetName]!"
 panum.205.h: "Ce n'est que de la charlatanry luxueuse."
 panum.206.t: "La maladie des prolétaires"
 panum.206.d: "L'épidémie de tuberculose en [SCOPE.sState('panum_disease_state').GetName] frappe la classe inférieure la plus durement. [SCOPE.sCharacter('union_leader').GetFullName] a donc particulièrement critiqué les conditions actuelles et appelé à des changements de grande envergure."
 panum.206.f: "La tuberculose a suscité un intérêt généralisé dans le 19e et au début du 20e siècle en tant que maladie endémique des pauvres urbains. En 1815, un quart des décès en Angleterre et en 1918 en France, un sixième de décès a été causé par la tuberculose. Vers 1880, chaque seconde décès en Allemagne dans le groupe d'âge des 15 à 40 ans était due à cette maladie."
 panum.206.g: "Peut-être que les pauvres devraient simplement se laver davantage?"
 panum.206.h: "Des améliorations sélectives dans ce domaine sont justifiées."
 panum.206.i: "La question des soins de santé est une matière nationale."
 panum.206.j: "Applaudissements pour cette initiative!"
 panum.207.t: "Initiative religieuse"
 panum.207.d: "[SCOPE.sCharacter('devout_leader').GetFullName] a personnellement plaidé pour les nombreuses personnes malades en [SCOPE.sState('panum_disease_state').GetName]. [SCOPE.sCharacter('devout_leader').GetSheHe|U] souhaite y installer un hôpital à but non lucratif bientôt."
 panum.207.f: "\"À peine un pays demeure où, d'une manière ou d'une autre, de la lutte contre la tuberculose n'a pas été repris, et il est extraordinairement gratifiant de voir comment la campagne est désormais en général et avec une vigueur considérable contre cet ennemi dangereux.\" -Robert Koch"
 panum.207.g: "Ces conteurs essaient simplement de gagner de l'influence!"
 panum.208.t: "La peste blanche fait des ravages"
 panum.208.d: "L'épidémie de tuberculose en [SCOPE.sState('panum_disease_state').GetName] s'est aggravée. Le nombre de personnes malades et mortes augmente chaque jour. Aucun des médecins ne s'attendait à ce développement."
 panum.208.f: "«Comme je suis pâle! - Je voudrais, je pense, mourir de consommation… parce que alors les femmes diraient toutes: «Voir ce pauvre Byron - à quel point il a l'air intéressant en mourant! -Lord Byron"
 panum.208.g: "Cela ne finira-t-il jamais?"
 panum_has_physician_tt: "#default_text a un [concept_panum_physician].#!"
 panum_has_active_physician_tt: "#default_text a un [concept_panum_physician] qui n'est pas occupé.#!"
 panum_physician_experienced: "Médecin expérimenté"
 panum_physician_experienced_desc: "Après avoir passé des années à travailler pour traiter les patients, ce $panum_physician$ est vécu dans leur domaine."
 panum_physician_famous: "Célèbre médecin"
 panum_physician_famous_desc: "Les innovations médicales et les découvertes faites par ce $panum_physician$ les rendent célèbres dans le domaine de la médecine."
 panum_typhus_quarantine_modifier: "Quarantaine de typhus"
 panum_typhus_fever_sheds_modifier: "Fièvre"
 panum_typhus_rigid_rules_modifier: "Règles rigides"
 panum_typhus_fever_sheds_help_modifier: "La fièvre a une aide"
 panum_additional_fever_shed_protection_modifier: "Protection contre la fièvre"
 panum_additional_funeral_aids_modifier: "Aide funéraire supplémentaire"
 panum_typhus_barracks_modifier: "Typhus en caserne"
 panum_yellow_fever_quarantine_modifier: "Quarantine de fièvre jaune"
 panum_plantation_quarantine_modifier: "Quarantaine de plantations"
 panum_administrative_evacuation_modifier: "Évacuation administrative"
 panum_yellow_fever_barracks_modifier: "Fièvre jaune dans la caserne"
 panum_yellow_fever_port_modifier: "Fièvre jaune dans le port"
 panum.301.t: "Smallpox se propage à [SCOPE.sState('panum_disease_state').GetName]"
 panum.301.d: "Selon les derniers rapports, la maladie de la variole est désormais également répandue au [SCOPE.sState('panum_disease_state').GetName]. Nos efforts pour arrêter l'épidémie ont échoué."
 panum.301.g: "Smallpox partout!"
 panum.302.t: "L'épidémie de variole atteint [SCOPE.sCountry('panum_infected_country').GetName]"
 panum.302.d: "Nous avons reçu des informations selon lesquelles les premiers cas de variole ont été signalés au [SCOPE.sCountry('panum_infected_country').GetName] aujourd'hui. Les autorités nous blâment de ne pas en faire assez pour empêcher la propagation."
 panum.302.g: "Qui aurait pu deviner ça ...?"
 panum.303.t: "Variole hors de contrôle"
 panum.303.d: "Le système de santé du [SCOPE.sState('panum_disease_state').GetName] a été amené au bord de l'effondrement. Les médecins quittent déjà la région parce qu'ils risquent eux-mêmes de s'impliquer. Malheureusement, nous devons ajuster le nombre de morts dans la région vers le haut."
 panum.303.f: "«Aucune tentative n'a été faite pour compter les victimes, et il n'est pas possible de les compter dans aucune de ces tribus avec précision; On pense que si le numéro 17 200 pour les Indiens du Missouri supérieur était doublé, l'agrégat ne serait pas trop grand pour ceux qui sont tombés à l'est des montagnes Rocheuses."
 panum.303.g: "N'y a-t-il pas de remède pour cette terrible maladie?"
 panum.401.t: "Typhus se propage à [SCOPE.sState('panum_disease_state').GetName]"
 panum.401.d: "Le dangereux typhus s'est apparemment répandu à un autre état. Les rapports de [SCOPE.sState('panum_disease_state').GetName] suggèrent que de plus en plus de personnes sont victimes de la maladie."
 panum.401.g: "Typhus semble imparable ..."
 panum.402.t: "Une maladie de corruption morale?"
 panum.402.d: "Étant donné la connaissance limitée de ce qu'est le typhus, ce qui les cause et comment le combattre efficacement, il existe de nombreuses théories quant à ce qui favorise l'infection. L'opinion dominante est qu'il s'agit d'une maladie liée au mode de vie, et non à la transmission."
 panum.402.f: "Semblable à la tuberculose, il y avait de nombreux médecins qui ont supposé que le typhus n'était pas une maladie contagieuse. Alors que la tuberculose était considérée de manière presque romantique - c'était une maladie des romantiques et donc des esprits «nobles» - dans le cas du typhus, la maladie était considérée comme une stigmatisation de discrédité morale. Le fait que les classes supérieures n'aient pas été affectées ont conduit à un certain sentiment de supériorité. Tout comme au Moyen Âge, les maladies étaient souvent attribuées à une influence ou une punition divine, il semblait être un fait prouvé que les défauts de caractère ou la dépravation étaient dans une certaine mesure liés à certaines maladies. Ce n'est qu'à partir du deuxième tiers du XIXe siècle que cette vue a commencé à changer."
 panum.402.g: "Il y a une raison pour laquelle le typhus affecte principalement les criminels, les prostituées et les soldats immoraux."
 panum.402.h: "Cela importe probablement moins ce que sont ces gens que là où ils vivent."
 panum.403.t: "Quarantaine"
 panum.403.d: "Il y a un désir, en particulier de la part des classes moyennes et supérieures, de fournir les classes sociales inférieures affectées par le typhus avec leurs propres installations. Ces «maisons de fièvre» seraient également payées par des organisations à but non lucratif. Cependant, certains représentants des classes les plus pauvres considèrent cela comme une méthode d'exclusion que des soins de santé. Certains membres du gouvernement, en revanche, veulent une quarantaine complète, que la classe moyenne en particulier considère comme une mesure complètement excessive."
 panum.403.f: "Comme beaucoup d'autres épidémies, le typhus a servi à séparer. L'appel à une quarantaine générale était donc impopulaire dans de nombreux endroits, car on pensait que certaines personnes pouvaient être attribuées à la maladie, d'autant plus que beaucoup croyaient que c'était héréditaire. Cependant, la peur sous-jacente de l'infection a joué un rôle, c'est pourquoi les maisons de fièvre ont été construites dans de nombreux endroits. Pendant la grande épidémie de typhus en Amérique du Nord en 1847, l'idée qu'il s'agissait d'une maladie contagieuse est devenue si répandue que les masses d'immigrants irlandais infectés ont été de facto expulsés vers de telles institutions."
 panum.403.g: "Toute la zone doit être mise en quarantaine."
 panum.403.h: "Emmenez les personnes souffrant de Typhus dans des maisons spéciales."
 panum.403.i: "Le typhus n'est pas une maladie contagieuse, donc la quarantaine n'a aucun sens."
 panum.404.t: "Saignement sale"
 panum.404.d: "La situation dans les maisons de fièvre présumées, qui se transforment de plus en plus en cercueils surpeuplés pleins d'excréments et de misère, est déjà devenu un problème grave dans le [SCOPE.sState('panum_disease_state').GetName]. Les pasteurs et les soignants malades ont écrit une lettre appelant à ces terribles maisons démantelées."
 panum.404.f: "La fièvre était sale et encombrée, avec des patients allongés en deux niveaux de couchettes qui permettaient à la saleté de la couchette supérieure de tomber sur le bas. Selon le rapport du Comité sénatorial, deux ou trois invalides seraient placés ensemble dans une couchette, quel que soit l'âge ou le sexe. Il n'y avait pas de pain: les repas étaient composés de thé, de bouillie ou de bouillon servis trois fois par jour. Comme l'eau potable était transportée, il n'y avait jamais assez pour les patients atteints de fièvre. Un prêtre catholique, le père Moylan, a déclaré avoir donné de l'eau à des invalides dans une tente qui n'avait pas pu boire depuis 18 heures. Les hangars n'étaient pas à l'origine destinés à abriter des patients atteints de fièvre et n'avaient aucune ventilation; De nouveaux hangars ont été construits sans privies. Le Comité sénatorial a déclaré qu'en raison du manque de personnel et d'espace, les invalides résidaient dans leurs propres excréments pendant des jours et il n'y avait pas suffisamment de personnel pour enlever ceux qui sont morts pendant la nuit."
 panum.404.g: "Nous ne pouvons pas risquer que plus de personnes soient infectées."
 panum.404.h: "Améliorez la situation des personnes souffrant de typhus et fournissez une aide médicale."
 panum.404.i: "Démantelez ces maisons inhumaines!"
 panum.405.t: "Émeutes contre la fièvre"
 panum.405.d: "La peur du typhus se propage dans le [SCOPE.sState('panum_disease_state').GetName] a radicalisé certains citoyens dans la mesure où ils ont formé une foule en colère. Il y a une rumeur selon laquelle ils veulent pousser les maisons de fièvre et leurs patients dans la rivière la plus proche!"
 panum.405.f: "En 1847, le nombre de hangars à Montréal atteindrait 22, les troupes bouclant la région afin que les malades ne puissent pas s'échapper. Lorsqu'une foule a menacé de jeter la fièvre dans la rivière, le maire de Montréal, John Easton Mills, a réprimé l'émeute et prodiguait des soins, donnant aux patients de l'eau et changeant de literie. Il est décédé en novembre, servant moins d'un an au pouvoir."
 panum.405.g: "Cette barbarie n'a pas sa place dans notre pays!"
 panum.405.h: "Ils meurent de toute façon."
 panum.406.t: "Cadavres non enterrés"
 panum.406.d: "Le nombre de décès en [SCOPE.sState('panum_disease_state').GetName] augmente si rapidement que les entrepreneurs peuvent difficilement suivre le nombre. Il y a un danger que les corps non enterrés puissent entraîner des problèmes encore plus importants."
 panum.406.f: "Dans les années 1860, les conditions météorologiques exceptionnellement dures et les pertes de récolte ont affligé ce qui était alors le Grand Duché de Finlande, conduisant à la famine et à la maladie épidémique. 1866-1868 a vu la faim et surtout ce à quoi on pensait à l'époque comme Typhus tuant 270 000 personnes dans la région."
 panum.406.g: "Utilisez tous les moyens disponibles pour empêcher ce problème de devenir écrasant."
 panum.406.h: "Creusez les fosses massiques habituelles."
 panum.406.i: "Nos capacités sont épuisées, vous devez organiser les choses vous-même!"
 panum.407.t: "Typhus en caserne"
 panum.407.d: "Typhus contamine actuellement principalement les installations militaires de [SCOPE.sState('panum_disease_state').GetName]. Il y fait des ravages mortels."
 panum.407.f: "De nombreux historiens croient que l'épidémie de typhus parmi les troupes de Napoléon est la vraie raison pour laquelle il a bloqué sa campagne militaire en Russie, plutôt que la famine ou le froid. Le typhus était un tueur important pendant la guerre civile américaine, bien que la fièvre typhoïde soit la cause la plus répandue de la «fièvre du camp» de la guerre civile américaine. Jusqu'à 900 000 décès ont été attribués à la fièvre du typhus pendant la guerre de Crimée en 1853-1856. Typhus était endémique en Pologne et dans plusieurs pays voisins avant la Première Guerre mondiale (1914-1918), mais est devenu épidémique pendant la guerre. Typhus a ravagé les armées du front oriental, où plus de 150 000 sont morts en Serbie seulement. Les décès se situaient généralement entre 10% et 40% des personnes infectées et la maladie était une cause majeure de décès pour ceux qui soignent les malades."
 panum.407.g: "Un ennemi invisible plus meurtrier que n'importe quelle armée ..."
 panum.408.t: "Tourmenté dans la maladie, pas en guerre"
 panum.408.d: "L'épidémie de typhus dans notre caserne continue de se propager tous les jours. Les soldats sont désormais parmi les plus fréquemment tués dans le [SCOPE.sState('panum_disease_state').GetName] - et sans influence ennemie."
 panum.408.f: "«La guerre n'est pas une aventure. C'est une maladie. C'est comme Typhus. Antoine de Saint-Exupéry"
 panum.408.g: "Terrible!"
 panum.501.t: "La fièvre jaune se propage à [SCOPE.sState('panum_disease_state').GetName]"
 panum.501.d: "Les rapports de nouveaux cas de fièvre jaune ont confirmé nos pires craintes. La maladie fait maintenant rage dans [SCOPE.sState('panum_disease_state').GetName]!"
 panum.501.g: "Pourquoi n'était-il pas possible d'arrêter cela?"
 panum.502.t: "Une maladie contagieuse?"
 panum.502.d: "Bien qu'il ne soit pas clair si la fièvre jaune est une maladie contagieuse ou possède d'autres causes, de nombreux citoyens d'esprit en sécurité appellent à la quarantaine pour arrêter la propagation. Si nous ne faisons pas cela, ils pourraient le voir comme l'ignorance ou le désintérêt de leurs besoins."
 panum.502.f: "Les premières épidémies de fièvre jaune au 17ème siècle ont provoqué la panique et la désorientation. Même au XVIIIe siècle, les gens étaient largement en désaccord sur ce qui a déclenché une infection. Bien que les gouvernements et les individus aient eu recours à des mesures ou une prévention strictes, il n'y a eu aucun succès. La peur de la fièvre jaune signifiait qu'aucune opportunité n'a été gaspillée pour empêcher sa propagation supplémentaire, parfois avec des mesures expérimentales ou draconiennes. Certaines actions pourraient donc avoir des raisons psychologiques plutôt que médicales afin d'éviter d'escalader le mécontentement de la population."
 panum.502.g: "Il n'y a aucune preuve qu'il s'agit d'une maladie contagieuse."
 panum.503.t: "La fièvre jaune affecte les plantations"
 panum.503.d: "Des rapports sont reçus quotidiennement selon lesquels les plantations du [SCOPE.sState('panum_disease_state').GetName] en particulier ont un taux élevé de victimes de fièvre jaune. Certains conseillers gouvernementaux poussent à arrêter de travailler complètement pour réduire la propagation."
 panum.503.f: "«Un pauvre noir, nommé Sampson, est allé constamment de maison en maison où se trouvait la détresse, et sans aide, sans frais ni récompense. Il a été frappé par le trouble et est mort. Après sa mort, sa famille a été négligée par ceux qu'il avait servi. Sarah Bass, une pauvre veuve noire, a apporté toute l'aide qu'elle pouvait, dans plusieurs familles, pour lesquelles elle n'a rien reçu; Et quand tout ce qui lui avait été offert, elle l'a laissé à l'option de ceux qu'elle a servi. -Richard Allen"
 panum.503.g: "Sortez les travailleurs des champs!"
 panum.503.h: "La plantation doit continuer à fonctionner, à tout prix!"
 panum.504.t: "Évacuation"
 panum.504.d: "La situation de santé du [SCOPE.sState('panum_disease_state').GetName] continue de s'aggraver. Les membres du gouvernement local et de l'administration ont demandé à quitter la ville et à organiser l'administration depuis la campagne. Certains le considèrent comme une suggestion intelligente, d'autres le considèrent comme une lâcheté."
 panum.504.f: "Au cours de l'épidémie de fièvre jaune de 1793 à Philadelphie, 5 000 personnes ou plus ont été répertoriées dans le registre des décès entre le 1er août et le 9 novembre. La grande majorité d'entre eux sont morts de fièvre jaune, faisant de l'épidémie dans la ville de 50 000 habitants de l'histoire des États-Unis. Fin septembre, 20 000 personnes avaient fui la ville, y compris les responsables du Congrès et exécutif du gouvernement fédéral. La plupart ne sont revenus qu'après que l'épidémie ait diminué fin novembre. Le président George Washington a quitté la ville pour son domaine Mount Vernon. Le taux de mortalité a culminé en octobre avant que Frost ait finalement tué les moustiques et mis fin à l'épidémie. Certaines villes voisines ont refusé de laisser entrer les réfugiés de Philadelphie, craignant qu'ils portent la fièvre. Les principales villes portuaires, y compris celles de Baltimore et de New York, avaient des quarantaines contre les réfugiés et les marchandises de Philadelphie, bien que New York ait envoyé une aide financière à Philadelphie."
 panum.504.g: "Évacuer les autorités."
 panum.504.h: "L'administration locale ne doit pas s'effondrer."
 panum.505.t: "La fièvre jaune se propage à la caserne"
 panum.505.d: "La fièvre jaune contamine actuellement principalement les installations militaires du [SCOPE.sState('panum_disease_state').GetName]. Il y fait des ravages mortels."
 panum.505.f: "Pour les rebelles en Haïti au tournant des XVIIIe et 19e siècles et à Cuba près de 100 ans plus tard, la fièvre jaune était le grand allié contre les armées coloniales envoyées d'Europe. Le chef de la lutte de l'indépendance cubaine a parlé de ses «généraux invincibles en juin, juillet, août» - ces mois où les pluies viennent et avec eux les moustiques. Les Britanniques ont eu des expériences similaires lors du siège de Carthagène en 1741. 29 000 soldats britanniques assiégé la forteresse. Lorsque les pluies ont commencé, 22 000 ont péri misérablement en quelques semaines. Le taux de mortalité dans les garnisons britanniques en Jamaïque était sept fois celle des garnisons au Canada, principalement en raison de la fièvre jaune et d'autres maladies tropicales."
 panum.505.g: "Non! Ils étaient destinés à une mort honorable sur le champ de bataille!"
 panum.506.t: "La maladie du marin"
 panum.506.d: "Les opérations portuaires en [SCOPE.sState('panum_disease_state').GetName] sont arrivées à l'arrêt virtuel en raison de la fièvre jaune. D'une part, de nombreux quais et marins sont malades. D'un autre côté, autant de navires que possible tentent d'éviter la région maudite."
 panum.506.f: "«Les ravages les plus déplorables se font à la Nouvelle-Orléans par la fièvre jaune. Des milliers ont été emportés par ses ravages, et chaque jour ajoute 200 de plus au record horrible. Les morts sont enterrés dans des tranchées par des gangs de chaînes de nègres, embauchés en Guinée une heure. Et ainsi, avec les chansons et les plaisanteries obscènes des gravagistes, le bourdonnement des mouches, les cris de chant des hommes qui conduisent les chariots morts, les joyeuses sifflement rideau. Entre-temps, les amusements, les régates, les balles, etc. sont précédents comme d'habitude, comme si aucune peste aussi épouvantable n'était dans la ville condamnée. -Cambridge hebdomadaire News en 1853"
 panum.506.g: "Un effondrement pour l'expédition!"
 panum.507.t: "Vomir noir"
 panum.507.d: "Dans [SCOPE.sState('panum_disease_state').GetName], la fièvre jaune frappe plus violemment que prévu. Les médecins rapportent que plus de personnes qu'auparavant sont mortes de la maladie."
 panum.507.f: "«Ceux qui se sont aventurés à l'étranger, avaient des mouchoirs ou des éponges imprégnés de vinaigre de camphre au nez, ou des bouts odorants pleins de vinaigre des voleurs. D'autres transportaient des morceaux de corde goudronnée dans leurs mains ou leurs poches, ou des sacs de camphre attachés autour de leur cou ... Les gens ont déplacé à la hâte leur cours à la vue d'un corbillard venant vers eux. Beaucoup n'ont jamais marché sur le sentier, mais sont allés au milieu des rues, pour éviter d'être infecté en passant par des maisons dans lesquelles les gens étaient morts. Les connaissances et les amis se sont évités dans les rues et ne signifiaient que leur respect par un signe de tête à froid. La vieille coutume de se serrer la main est tombée en désuétude aussi générale, que beaucoup se sont rétrécis avec l'offre, même l'offre d'une main. Une personne avec du crêpe de deuil, ou toute apparence de deuil, a été évité comme une vipère. '' -Mathew Carey"
 panum.507.g: "Quand serons-nous enfin libérés de cette peste?"
