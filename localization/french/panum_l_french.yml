 je_panum_cholera_description_expedition_reason: "Le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] dirige une expédition médicale en [SCOPE.sCountry('target').GetName] pour acquérir de précieuses connaissances sur #YELLOW le choléra#!. Tant que la maladie fait rage dans le pays, [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] a une chance mensuelle d'acquérir de nouvelles connaissances afin de rédiger un avis scientifique complet sur la maladie.\n\nSi la maladie s'atténue, les progrès scientifiques ne seront pas perdus, mais seront également présents lors du prochain examen." #NT!
