 panum.440.t: "Typhus - un problème social"
 panum.440.d: "Dans son traité [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_treatment_title')], le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a mis un accent particulier sur le fait que le typhus est une maladie évitable lorsque les forces politiques et sociales travaillent ensemble."
 panum.440.f: "«Des conditions exiguës, des vêtements remplis de poux et des appartements délabrés ou des chambres de soldats m'ont présenté une image mémorable. La fièvre du typhus était partout là-bas. Partout où les gens vivaient dans les mêmes conditions exiguës, mais dans les conditions hygiéniques de la chambre d'hôpital, aucune propagation n'a pu être observée. La médecine ne doit pas être considérée comme une prise en charge de l'individu, mais plutôt en termes de santé publique, ce qui implique également de résoudre des problèmes sociaux. Il ne fait aucun doute qu'une telle propagation épidémique de typhus que nous l'avons récemment vu ne s'est produite que dans des conditions de vie telles que la pauvreté et le manque d'éducation. Emmenez ces circonstances et je suis sûr que nous verrons des améliorations significatives dans la lutte contre la maladie. '\ N \ ndr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] dans son mémorandum au gouvernement"
 panum.440.g: "Typhus perd sa terreur."
 panum.441.t: "Une autopsie"
 panum.441.d: "Le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a entrepris plusieurs autopsies sur les décès de typhus en [SCOPE.sState('panum_disease_state').GetCityHubName] et a fait des conclusions cruciales."
 panum.441.f: "«On sait depuis longtemps que la fièvre typhoïde et le typhus sont deux maladies différentes. Mais il y a encore quelques chercheurs qui croient qu'une mauvaise nutrition, une infection du tractus intestinal ou du moins une carence nutritionnelle pourrait être liée à l'épidémie de typhus. Les raisons alimentaires sont toujours considérées comme une cause possible de nombreuses maladies. Au cours de mes examens, je n'ai trouvé rien qui suggérait en aucune façon un trouble digestif. La fièvre du typhus n'a rien à voir avec le régime alimentaire ou la digestion. '\ N \ nfrom Un rapport d'autopsie du Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] dans [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]"
 panum.441.g: "Mais qu'est-ce que cela pourrait être?"
 panum.442.t: "Non lavé et emmêlé"
 panum.442.d: "Dans [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] Recherche de la cause de l'épidémie de typhus, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] s'est rendu compte que les résultats précédents devaient être remis en question."
 panum.442.f: "«J'ai entendu plusieurs fois dans ma carrière que la mauvaise hygiène est un moyen pour le miasme ou les germes - tout ce que les gens peuvent croire - s'installer dans les vêtements et contribuer à la maladie. Je pense que cela est discutable en détail, mais pas dans la déclaration de base. Les soldats, les condamnés, les pauvres, les criminels et les prostituées sont parmi les victimes classiques de l'épidémie de typhus. Mais les pauvres non lavés parce qu'ils veulent être non lavés, ou n'est-ce pas plutôt le cas qu'ils ne sont pas lavés parce qu'ils sont pauvres? Je ne veux pas croire que la tuberculose est plus la maladie d'un artiste que le typhus n'affecte que les criminels parce qu'ils sont moralement méchants. Il existe de nombreux criminels riches qui n'ont pas été touchés par le typhus dans cette épidémie. Il y a des prêtres sans licenciement dans les bidonvilles qui se sacrifient pour les autres et qui succombent eux-mêmes à la maladie. Alors, quel est le lien le plus convaincant entre les victimes? '\ N \ nfrom du Journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] in [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]"
 panum.442.g: "[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] essaie-t-il de prétendre que le typhus peut également affecter les gens honnêtes?"
 panum.443.t: "Chaleur et froid"
 panum.443.d: "Après plusieurs visites dans les maisons des familles souffrant de typhus, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] arrive à la conclusion que ce n'est pas, comme on le prétend souvent, une maladie saisonnière."
 panum.443.f: "«Il y a des maladies saisonnières et cela semble également être le cas avec le typhus. Les rapports précédents indiquent une augmentation des saisons plus froides, qui peuvent également inclure un ressort humide ou un automne. Je pense qu'il a été prouvé que le froid et la chaleur ont une influence sur la maladie. Il est discutable de savoir si cela dépend des saisons. Il peut devenir tout aussi chaud dans une pièce chauffée serrée. La maladie n'a pas eu lieu à tous les endroits à la même période de l'année. Si tel était le cas, non seulement certaines zones d'une ville, mais toute la ville devrait être également affectée. Mais il est toujours apparu où les gens étaient bondés ensemble. J'ai pu déterminer cela lors de plusieurs visites à domicile. '\ N \ nfrom du Journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] in [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]"
 panum.443.g: "Cela contredit les études précédentes."
 panum.444.t: "Transpirer et respirer"
 panum.444.d: "Le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] est maintenant complètement convaincu que le typhus doit être une maladie contagieuse, même si toutes les circonstances n'ont pas encore été clarifiées."
 panum.444.f: "«Au début de mon enquête, j'étais fermement convaincu que le typhus n'était pas une maladie contagieuse. Cependant, à mesure que ma famille avec Typhus augmentait, j'ai grandi pour croire fermement à la contagion de la maladie, et je souligne la nature contaminante de la transpiration. J'ai vu une infirmière masculine qui, tout en rasant un patient mourant, a inhalé le souffle du patient. L'infirmière a décrit le souffle du patient comme ayant un «goût nauséeux» et est presque immédiatement tombé malade. De même, un assistant soutenait un autre patient décédé peu de temps après, il a senti la sueur piquante du patient sur sa peau, et l'assistant a été pris immédiatement avec les symptômes du typhus. Il est clair que la proximité avec les patients atteints de typhus met un risque de contracter la maladie. '\ N \ nfrom du Journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] dans [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]"
 panum.444.g: "Cela peut être utile, mais cela transmet-il vraiment d'une personne à l'autre?"
 panum.445.t: "Est-ce la faim?"
 panum.445.d: "Dans un différend animé avec un collègue en [SCOPE.sState('panum_disease_state').GetCityHubName], le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a réfuté ses théories."
 panum.445.f: "«Est-ce un type spécial de typhus, le typhus de la faim.» \ N \ n'hunger typhus? En conséquence, la faim, ou plutôt la famine, est un déclencheur du typhus. Les changements dans le sang ont probablement également quelque chose à voir avec cela. '\ N \ N'1726, 1727 et 1728 étaient des années de famine, mais il n'y avait pas de typhus. 1829 a été une année prospère, mais il y avait du typhus. Il est compréhensible qu'un corps affaibli soit plus susceptible de devenir malade - mais la cause?"
 panum.445.g: "Le terme «fièvre de la faim» est donc incorrect."
 panum.446.t: "Pas l'emplacement, mais la situation"
 panum.446.d: "Le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] pense que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] a découvert que ce qui compte n'est pas tant la façon dont les gens atteints de typhus vivent, mais où ils vivent."
 panum.446.f: "«Lors de ma visite au [SCOPE.sState('panum_disease_state').GetCityHubName], j'ai découvert que toute la maladie n'a affecté qu'une seule partie de la ville. La zone est connue pour sa pauvreté et sa dépravation morale, qui a soutenu certaines théories selon lesquelles le typhus est une maladie d'individus moralement inférieurs. Mais pour autant que je sache, c'est le quartier densément peuplé et la situation économique des personnes touchées. À mon avis, la propagation de la maladie ne concerne pas la corruption morale, mais la proximité physique. '\ N \ nfrom du Journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] in [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]"
 panum.446.g: "Cela signifie au moins que la maladie peut théoriquement être surmontée ..."
 panum.447.t: "Poux"
 panum.447.d: "Le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a proposé une théorie très controversée selon laquelle, bien que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] ne puisse le prouver, pourrait changer la compréhension de la maladie de typhus à l'avenir."
 panum.447.f: "«S'il y a une chose que j'ai remarquée dans mes nombreuses observations, c'est que presque tous les patients étaient dans un état infesté de poux. Que les soldats de la caserne surpeuplée, les familles avec leurs innombrables enfants, les condamnés dans leurs cellules délabrées. Je ne crois plus que c'est une coïncidence. Bien sûr, je manque de preuves. Ces dernières années, plusieurs scientifiques ont pu prouver encore et encore que les maladies peuvent être transmises entre les animaux et les humains. Si c'est différent dans cette situation, je serais heureux d'être prouvé le contraire. Pour l'instant, je crois que le mystère du typhus ne peut pas être résolu sans examiner de plus près le rôle des poux. '\ N \ nfrom Le Journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] dans [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]"
 panum.447.g: "Comment quelque chose d'aussi minuscule peut-il causer autant de dévastation?"
 panum.447.h: "Quelque chose d'aussi minuscule doit provoquer tellement de dévastation."
 panum.448.t: "Un hôpital hygiénique"
 panum.448.d: "Lors d'une visite à un exemplairehospital, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a pu convaincre [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself] que la transmission de la maladie n'est que minimale dans des conditions favorables."
 panum.448.f: "«Lorsque les malades ont commencé à être emmenés dans les hôpitaux ici et là, il était craindre que la situation ne s'aggrave en raison d'une éventuelle infection. On a supposé que de nouvelles sources d'infection pouvaient se former, à partir de laquelle l'épidémie frapperait avec une violence encore plus grande. Rien de tout cela ne s'est produit, bien qu'un tel effet ait été observé dans de nombreux hangar de fièvre. Comme je l'ai observé dans d'autres cas, les conditions hygiéniques les plus favorables ont fait la différence. '\ N \ nfrom Le Journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] dans [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]"
 panum.448.g: "Ce n'est donc pas l'étroitesse en tant que telle, mais les conditions."
 panum.449.t: "Assistance épidémique"
 panum.449.d: "En livrant de la nourriture, des couvertures et des médicaments au [SCOPE.sState('panum_disease_state').GetCityHubName], le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a pu s'assurer que l'épidémie se calmerait légèrement."
 panum.449.f: "«Cela peut sembler banal, mais avec une expédition de marchandises destinée à soulager la misère des résidents, les épidémies de maladie ont chuté la semaine dernière. Quelque chose de similaire avait déjà été observé dans d'autres domaines où le typhus avait fait rage dans le passé. Les secours ont distribué du riz et des pois, construit des hôpitaux de tentes improvisés et ont également apporté des médicaments et de nouveaux vêtements. Le cas le prouve avant tout: le typhus n'est pas une maladie héréditaire. Cela dépend certainement des facteurs environnementaux. '\ N \ na Lettre du Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] au Dr Dementive"
 panum.449.g: "Parfois, la seule façon d'approcher une solution est d'utiliser les critères d'exclusion."
 panum.450.t: "Vêtements contaminés?"
 panum.450.d: "Le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a remarqué un cas étrange dans un hangar de fièvre qui correspond à des expériences similaires."
 panum.450.f: "«Est-ce la preuve d'une contagion présumée? Il ne fait aucun doute que cette affaire correspond à des expériences très similaires que j'ai eues ailleurs. Parfois, ce sont des manteaux, parfois des vestes ou des chemises. Une victime de Typhus avait un frère qui a pris son manteau. Quelques jours plus tard, il était également malade. Les enfants qui ont joué avec le manteau auraient été infectés de la même manière. Dans les classes les plus pauvres, il est assez courant de transmettre des vêtements de parents, en particulier dans les saisons froides. Que les vêtements soient contaminés ou non - le changement de vêtements semble être l'une des mesures raisonnables pour éviter le typhus."
 panum.450.g: "Les hommes devraient changer leurs chaussettes et leurs sous-vêtements? Impossible!"
 panum.451.t: "Climat de typhus"
 panum.451.d: "Après qu'un médecin étranger a fourni une nouvelle hypothèse sur les origines du typhus, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] doute [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] propre recherche."
 panum.451.f: "«Un« collègue »m'a envoyé son volume sur les causes du typhus il y a deux jours. Je suis assez étonné, de ne pas dire démotivé. Il a formulé très précisément et rigoureusement comment les conditions météorologiques et météorologiques sont liées au développement de la maladie. En conséquence, le miasme se forme en cas d'humidité dans la terre, puis monte dans l'air. Cela expliquerait la présence fréquente de typhus dans les mois froids et humides. Alors, est-ce miasme après tout? '\ N \ nfrom le journal de [ROOT.Var('panum_physician_var').GetCharacter.GetFullName]"
 panum.451.g: "Mais est-ce vraiment la bonne solution?"
 panum.452.t: "Putréfaction"
 panum.452.d: "Certaines des conclusions que le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a récemment résumées ne correspondent pas à la théorie précédente [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]."
 panum.452.f: "«Jusqu'à présent, je n'ai pas beaucoup pensé à la théorie selon laquelle les processus putréfactifs jouent un rôle crucial dans la propagation de la maladie. Mais partout où je vais, partout où le typhus fait rage, je trouve des animaux, je trouve des exhalations, je trouve des matières humaines, animales et végétales. Cela pourrait-il réellement dissoudre et laisser derrière lui Miasma - ou peut-être des poisons? '\ N \ nfrom du Journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] in [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]"
 panum.452.g: "Un revers désagréable."
 panum.453.t: "Courants d'air négatifs"
 panum.453.d: "Une publication par un médecin allemand reconnu secoue jusqu'à présent les progrès du Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]. Il a donc été prouvé que les courants d'air sont responsables de la survenue de typhus."
 panum.453.f: "«Un tel air chaud et humide peut être transporté par un courant d'air équatorial aux latitudes du nord et nous verrons alors le typhus éclater sous la domination des vents du sud et de l'ouest en saisons relativement chaudes. Une telle relation doit être la plus excellente en été, lorsque le soleil est dans sa position nord, les rives de la Méditerranée sont incluses dans l'extension des alizés et dans notre pays, la bataille avec le courant du Nord se déroule dans une saison des pluies avec un caractère changeant. C'est ainsi que les épidémies de typhus de l'été et du début de l'automne peuvent être expliquées. '\ N \ ndr. Angelika Hasenbein, «Comment les courants d'air provoquent le typhus et la pluie d'automne provoque la grippe»"
 panum.453.g: "C'est en fait très convaincant."
 panum.454.t: "Malade"
 panum.454.d: "Le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] se sent plus pire depuis quelques jours. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] est-il infecté?"
 panum.454.f: "«Où est Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]? [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] voulait visiter le patient du typhus dans la salle cinq aujourd'hui? '\ N \ N'it que le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself] est malade.'"
 panum.454.g: "Le médecin doit se reposer."
 panum.454.h: "Le médecin devrait continuer à travailler!"
 panum.455.t: "Documents perdus"
 panum.455.d: "Le médecin a gaspillé certaines des notes [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] qui auraient pu être utiles pour développer un traitement pour le typhus."
 panum.455.f: "- - - - - - - - - - \ n \ n- - - - - - - - - - \ n \ n- - - - - - - - - - \ n \ nnot du Journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]"
 panum.455.g: "Comment embarrassant."
 panum.461.t: "Cours et maisons"
 panum.461.d: "Le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a créé un tableau des divers victimes de typhus vivant au [SCOPE.sState('panum_disease_state').GetCityHubName], où ils vivent et quel niveau de vie ils ont. La fièvre du typhus est donc une maladie «sociale»."
 panum.461.f: "«Les tables statistiques montrent à quel point l'influence des appartements sur la santé des résidents est grande. Par exemple, dans une étude de la banlieue de la ville, j'ai constaté que le taux de mortalité dans les rues de deuxième classe était de 18% et dans les rues de troisième classe 68% plus importantes que dans la première classe; Et cette mortalité était de 31% plus élevée dans les maisons de seconde classe et 78% de plus dans des maisons de troisième classe que dans les maisons de première classe. La mortalité s'était améliorée de 25% dans les mauvaises routes qui ont été améliorées. '\ N \ N'From Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]' 'Tables et statistiques sur l'épidémie de typhus dans [SCOPE.sState('panum_disease_state').GetCityHubName]'"
 panum.461.g: "Le médecin est donc également un critique social?"
 panum_typhus: "Typhus"
 panum_typhus_desc: "Cette personne souffre de typhus, une maladie dangereuse."
 panum.12.t: "Le premier vaccin"
 panum.12.d: "[SCOPE.sCharacter('panum_physician_scope').GetFullName] a fait une invention révolutionnaire. En utilisant un nouveau processus, la vaccination, il a réussi à inventer un moyen efficace de protection contre la variole redoutée."
 panum.12.f: "Selon le biographe d'Edward Jenner, John Baron, Jenner aurait exploité la croyance populaire que les laitiers infectés par la cowpox n'avaient généralement pas de variole (`` mythe de la laitière ''). John Filster avait observé qu'un patient qui avait auparavant (inoffensif) la cowpox ne pouvait pas être varioté avec la variole. Jenner a donc émis l'hypothèse que l'inoculation avec la cowpox fournirait la même immunité que la cowpox et fournirait donc une protection contre la variole. Jenner a d'abord recueilli des cas et des études d'observation de personnes qui avaient auparavant eu une vache ou un cavalier, mais qui se sont ensuite révélées immunitaires en cas de variolation ultérieure ou dans une véritable épidémie de variole. Le 14 mai 1796, il a vacciné James Phipps, 8 ans, avec des virus de la vache ou de la vaccina qu'il avait pris à partir d'une pustule de vaches de la main de la laitière Sarah Nelmes, qui avait de la cowpox. Environ six semaines plus tard, le 1er juillet 1796, Jenner a varié le garçon avec la variole PUS; Il s'est avéré immunitaire."
 panum.12.g: "Un héros de la médecine!"
 je_panum_vaccine: "Le vaccin"
 je_panum_vaccine_reason: "Notre nation est en train d'introduire un vaccin connu dans notre pays pour la première fois et de le distribuer à l'échelle nationale."
 je_panum_vaccine_success: "[GetPlayer.GetName] a collecté au moins #ORANGE 4"
 je_panum_smallpox_treatment_success: "[GetPlayer.GetName] a collecté au moins #ORANGE 3 Clues de traitement #!."
 panum.351.t: "L'ancien ennemi"
 panum.351.d: "La variole, peut-être la maladie la plus meurtrière connue de l'homme, a fait une résurgence dans nos terres."
 panum.351.f: "La variole est un ennemi familier et dangereux. Alors qu'il se fraye un chemin à travers les terres du [GetPlayer.GetName], il pourrait prendre la vie d'un tiers complet de ceux qui sont infectés et laisser les autres aveugles pour le reste de leurs jours. Presque tous ceux infectés porteront à jamais la carte d'appel de ce meurtrier sur leur chair - la cicatrisation emblématique du visage et du corps, le symbole immortel et sans âge d'une maladie presque aussi ancienne que la civilisation elle-même. Il a traqué tous les coins du globe, de l'ancien Moyen-Orient au Nouveau Monde, une armée dont la marche a gâché les empires, a tué des millions et a humilié les plus grands dirigeants à avoir jamais marché sur la terre. Là où l'homme est parti, la variole a suivi, un chasseur pour toujours poursuivre sa proie. \ N \ nnow, dans nos terres, il a trouvé de nouvelles victimes, suffisamment pour rompre sa forme endémique et pour redevenir une épidémie."
 panum.351.g: "Et donc nous nous battons encore contre la variole ..."
 panum.352.t: "Rumeurs de traitement de la variole"
 panum.352.d: "Suite aux rumeurs d'un traitement pour la variole, nos gens ont commencé à essayer des pratiques étranges à faire avec les pustules eux-mêmes!"
 panum.352.f: "La vue d'un savant messieurs mangeant des croûtes de personnes infectées par la variole pourrait être une vue qui est à la fois dégoûtante et horrible dans la même mesure, mais c'est un remède désespéré saisi par un homme désespéré. Il y a des rumeurs de traitement pour cette horrible maladie ailleurs dans le monde, et, soi-disant, cela fonctionne de manière similaire ... mais comment? Quelles sorcieries, quelle science peut les débarrasser de cette horrible peste? Les nouvelles proviennent des terres lointaines de l'Europe que le fléau de la variole a été poussée en retraite, que les villes entières peuvent vivre sans un seul cas. \ N \ n pour certains, c'est une chose d'espoir. S'il peut y être battu, alors nous pourrions le battre ici. \ N \ n pour certains, c'est un mensonge. Nos plus grands esprits n'ont pas encore réussi à trouver un traitement, mais peut-être, peut-être ..."
 panum.352.g: "... auraient-ils pu réussir là où nous avons échoué?"
 panum.353.t: "Le fléau de la variole"
 panum.353.d: "Non traité et non traitable, la variole est dévastat notre société ... et surtout nos jeunes."
 panum.353.f: "Sanglotant. Gémit. Les cris effrénés des désespérés, qui prennent à peine une seconde du dernier souffle à haleter avant de tomber dans le chagrin dont aucune main ne peut les soulever. Les pères frappent leurs poings contre les murs jusqu'à ce que leurs paumes deviennent rouges de sang et leurs jointures sont brisées et à plat. Les mères rejeteront les commandes avec la force des géants pour une dernière touche, pour une dernière caresse d'une joue froide et pâle. Ce sont des sites courants dans le [GetPlayer.GetName], car la variole a la faim du plus vulnérable de nous tous: nos enfants, nés et à naître. Plus de quatre-vingts pour cent des nourrissons infectés par la variole mourront, cette maladie se frayant un chemin dans l'avenir de nos terres. \ N \ nand sans traitement, nous ne pourrions faire que de pleurer pour la vie qui aurait dû être."
 panum.353.g: "Il doit y avoir une fin pour ce cauchemar ..."
 panum.354.t: "Le vaccin contre la variole"
 panum.354.d: "Nos diplomates ramènent plus que les nouvelles - ils apportent des échantillons d'un «vaccin» contre la variole!"
 panum.354.f_generic: "Lors d'une visite en Europe lointaine, nos dignitaires ont découvert quelque chose de fascinant - ils ont ce qui semble être un traitement * fonctionnant * pour la variole. En effet, ils ont appris l'histoire de cette maladie! Apparemment, la pratique de la variolation, ou l'utilisation d'échantillons de croûtes de variole séchées à partir des malades en récupération pour donner aux enfants une forme `` plus faible '' de cette maladie, avait été observée dans l'Empire ottoman ... mais c'était une solution défectueuse, dangereuse, car vous pourriez le surmonter. Cowpox, une maladie presque inoffensive, comme moyen de se protéger contre son frère aîné mortel. Cela fournit un bouclier sûr, économique et pratiquement garanti contre la peste de la variole. \ N \ nat Trop trop pour croire, nos médecins sceptiques ont testé ce remède pour eux-mêmes ... et cela fonctionne *. Pour la première fois de notre histoire, nous pouvons riposter contre la variole."
 panum.354.g_generic: "Nous ... nous devons importer cela, immédiatement!"
 panum.354.f_fareast: "Lors d'une visite en Europe lointaine, nos dignitaires ont découvert quelque chose de fascinant - ils ont ce qui semble être un traitement * fonctionnant * pour la variole. En effet, ils ont appris l'histoire de cette maladie! Bien que nos médecins connaissent bien la pratique de la variolation, qui pourrait utiliser des croûtes séchées de la récupération pour protéger les non infectées, ils semblent avoir découvert une protection encore plus grande. En utilisant des échantillons dérivés de la cowpox relativement bénigne, les Européens ont développé un «vaccin», capable d'inoculer les enfants, ou même le vaccinant récemment infecté ... un vaccin qui peut considérablement augmenter leur risque de survie. \ N \ nour Les médecins les plus instruits pourraient à peine croire cela. Seuls ceux qui ont été éduqués à la manière européenne et intitulés «médecins» pourraient garantir son potentiel en tant que protection sûre, économique et puissante contre la variole. Plus que cela, ils ont déjà commencé à le tester parmi nos employés, et ont constaté que ces affirmations ne sont pas simplement des affirmations, oh non, mais des faits."
 panum.354.g_fareast: "Il semblerait que nos nouveaux ... médecins ... ont montré leur valeur. Importez-le immédiatement."
 panum.354.f_latino: "Lors d'une visite dans la mère mère-pays en Europe, nos dignitaires ont découvert quelque chose de fascinant - ils ont ce qui semble être un traitement * fonctionnant * pour la variole. Bien que nous connaissions depuis longtemps la pratique de la variolation, où nos médecins pourraient utiliser des échantillons prélevés sur la récupération pour donner à ceux qui ont désespérément besoin de protection, ils ont depuis développé un traitement beaucoup plus sophistiqué. Plutôt que d'utiliser des croûtes de variole et une infection au risque par cette maladie mortelle, ils utilisent des matériaux tirés de la cowpox, une maladie courante et généralement inoffensive. Ce nouveau sérum est à la fois bon marché, commun et surtout efficace. \ N \ nnow avec accès aux dernières revues médicales, nos médecins ne peuvent célébrer cette découverte. La variole n'est pas étrangère aux Amériques, car elle a décimé les peuples autochtones de ces terres ... mais maintenant, nous avons une arme puissante pour faire de ce fléau une chose du passé."
 panum.354.g_latino: "Envoyer des remerciements à la patrie et une demande d'importation d'un envoi pour une utilisation immédiate."
 panum.355.t: "La vaccination commence"
 panum.355.d: "Avec un vaccin à variole viable maintenant présent au [GetPlayer.GetName], le gouvernement a commencé une campagne de vaccination."
 panum.355.f: "Il y avait eu une certaine résistance à l'idée d'une campagne de vaccination, du moins au début. Préoccupés par les mères de leurs enfants effrayés, déprimaient les vieux messieurs qui étaient sceptiques à l'égard de cette nouvelle merveille, les très pietes qui craignaient que la science falsifie quelque chose au-delà de leur compréhension. L'éducation a réglé ceci - des explications sur la façon dont cela a fonctionné, pourquoi - mais bien plus que cela en était les résultats. Les enfants qui se sont retrouvés avec leur vue et leur santé, et non avec les horribles conséquences de l'une des maladies les plus meurtrières que l'humanité ait jamais rencontrées. Peu devaient être convaincus quand ils les ont vus exempts de cicatrices et pleins de vie. \ N \ nlittle à petit, un par un, les files d'attente ont commencé à croître. Dans les écoles, les cabinets de médecin, les lieux de travail, la campagne de vaccination commence à prendre de la vapeur ... et avec elle, la variole commence à diminuer."
 panum.355.g: "Aie. Je déteste les aiguilles, mais si ça me gardera en sécurité ..."
 panum.356.t: "Une maladie en retraite"
 panum.356.d: "Après d'innombrables siècles de décès et de misère, la récente prolifération de la vaccination contre la variole a mis cet ancien ennemi en retraite complète."
 panum.356.f: "Il a fallu beaucoup d'efforts inlassables des mains et des esprits au-delà du comptage, mais dans notre bien-aimé [GetPlayer.GetName], la variole est une menace qui devient lentement mais sûrement une chose du passé. Le résultat d'une vaste campagne pour vacciner la jeunesse du pays et tous ceux qui sont prêts à prendre l'aiguille, la capacité de la variole à se frayer un chemin à travers nos familles et nos communautés est en panne, tirant la promesse que les enfants d'aujourd'hui ne porteront pas les cicatrices de leurs grands-parents. Avec chaque piqûre de l'aiguille, la lame de la variole devient de plus en plus terne, et la nature de cette peste devient encore plus une chose du passé. \ N \ nit est une réalisation capitale, un jour glorieux de notre histoire: bien que la bataille ne soit pas encore gagnée, la victoire est en vue. La variole mourra ici, et sinon à notre main, alors celle de nos héritiers."
 panum.356.g: "Un jour, un jour, nous allons mettre cette bête hideuse pour de bon."
 panum_smallpox_vaccination_character_modifier: "Vacciné"
 panum.340.t: "Variolation"
 panum.340.d: "Le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a trouvé une méthode de traitement pour la variole - bien qu'elle ne soit pas entièrement inoffensive."
 panum.340.f: "La variolation (également l'inoculation) est le transfert du contenu de la variole de la variole de la variole de la personne à la personne par inoculation. Il s'agit d'une technique de vaccination contre les maladies virales qui a été utilisée chez les personnes, principalement en Chine et au Moyen-Orient, jusqu'au XVIIIe siècle. Ici, les collectifs de virus des blessures des personnes souffrant de variole qui avaient survécu à la maladie ont été utilisés. Habituellement, le matériel a été tiré d'un pustule chez les malades utilisant un lancet, qui a ensuite été introduit par voie sous-cutanée, c'est-à-dire par de petites blessures, dans le bras ou la jambe de personnes en bonne santé. Cela signifiait que des virus atténués étaient administrés à des personnes en bonne santé. La réaction immunitaire doit être déclenchée par la multiplication des virus. Cependant, les virus pourraient redevenir la maladie par la maladie par mutation inversée lorsqu'ils se multipliaient, ce qui a conduit à un taux de mortalité relativement élevé (2-3%) parmi ceux traités de cette manière."
 panum.340.g: "A ... progrès."
