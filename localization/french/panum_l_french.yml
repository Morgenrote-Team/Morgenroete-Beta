 panum.55.t: "Le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] peut décrire une maladie étrangère"
 panum.55.d: "Un autre pays a une épidémie de maladie que votre [concept_panum_physician] pourrait étudier pour décrire la maladie."
 panum.55.g: "Envoyez notre médecin immédiatement!"
 panum.55.h: "Pas pour le moment."
 panum.55.i: "Me notifier de manière moins intrusive."
 panum.55.j: "Ne me parlez plus à ce sujet."
