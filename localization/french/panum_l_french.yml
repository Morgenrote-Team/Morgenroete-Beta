 panum.1001.t: "Une nouvelle épidémie"
 panum.1001.d: "La poliomyélite est une maladie connue sous de nombreux noms différents au 19e siècle. Étonnamment, il y a des nouvelles croissantes dans le [SCOPE.sState('panum_disease_state').GetName] sur les cas de polio se terminant par des paralysants et la mort. Ce qui était auparavant une maladie qui ne s'est produite que dans des cas isolés semble maintenant se produire régulièrement. La polio est maintenant une maladie épidémique."
 panum.1001.g: "Nouvelles inquiétantes."
 panum.1002.d: "Plusieurs journaux rapportent indépendamment qu'une sévère épidémie de polio fait rage dans [SCOPE.sState('panum_disease_country').GetName]. La maladie, qui ne se produisait auparavant que dans des cas isolés, semble être devenue une épidémie!"
 panum.1003.t: "Une épidémie violente"
 panum.1003.d: "L'épidémie de polio en [SCOPE.sState('panum_disease_state').GetName] s'est avérée particulièrement sévère. Le nombre de décès augmente chaque jour."
 panum.1003.f: "«Le matin du troisième jour où j'ai été hospitalisé, qui était le premier ou le deuxième septembre, j'avais des céréales, du jus et du lait au chocolat pour le petit déjeuner. Je me souviens avoir essayé de ramasser le lait au chocolat, et il est tombé dans ma main. Je me sentais tellement mal parce que je ne pouvais plus bouger. Les infirmières se sont tous précipitées et ont nettoyé le gâchis. Je me souviens que je voulais le lait au chocolat, mais je ne l'ai pas compris. Au lieu de cela, ils m'ont apporté une paille et j'ai bu du jus. Après cela, certains médecins sont entrés dans ma chambre et m'ont fait compter en arrière, 10-9-8-7-6 depuis aussi longtemps que je me souviens. J'étais allongé à ce moment-là parce que j'avais du mal à m'asseoir. '\ N \ nmarynne R., polio Survivor"
 panum.1003.g: "N'y a-t-il pas de remède?"
 panum.1004.t: "Une génération brisée"
 panum.1004.d: "Plus l'épidémie du [SCOPE.sState('panum_disease_state').GetName] dure, plus cela devient évident: il y aura une génération entière qui devra vivre avec des mutilations et une paralysie."
 panum.1004.f: "«Je me souviens très bien du jour où j'ai été très bien diagnostiqué avec la polio. Ce matin-là, j'étais en cours d'éducation physique à l'école, et nous étions sur le terrain de football en jouant au football Touch. J'ai remarqué que pendant que je courais, ma jambe serait faible ou en quelque sorte s'effondrer sous moi. Je n'en ai pas vraiment réfléchi, mais plus tard dans la journée, je jouais avec la fanfare du lycée lors d'un défilé de prestations de polio à Hibbing, qui se trouve à environ 30 miles de Coleraine où j'ai grandi. Pendant la marche dans ce défilé, mes jambes sont de nouveau faibles. En fait, ils étaient si faibles que j'ai dû abandonner la ligne de mars, et je suis retourné dans le bus scolaire pour m'allonger. '\ N \ ndavid K., Polio Survivor"
 panum.1004.g: "Cet effet durera longtemps ..."
 panum.1005.t: "Survivants de la polio"
 panum.1005.d: "Ceux qui survivent à cette épidémie seraient en colère en eux-mêmes. C'est une forme de vengeance contre la maladie qui a tellement dévasté ces personnes. De plus en plus d'associations de survivants de la polio se forment dans notre pays."
 panum.1005.f: "«Être différent est vraiment difficile lorsque vous êtes au lycée. J'ai fini par ne pas participer à beaucoup de choses auxquelles j'aurais probablement participé si ce n'était pas pour mon handicap. J'aurais aimé essayer pour le cheerleading, mais les gens se sont moqués de moi juste pour en parler. J'ai donc fini par garder beaucoup de sentiments à l'intérieur. Je ne voulais pas aller à une danse parce que j'étais conscient de ma boiterie. Je ne voulais pas que des gens me regardent alors que je traversais la piste de danse. Je détestais que les gens se givaient et se moquent de moi. Je pense que tous les adolescents sont conscients de soi, mais quand vous avez un handicap physique, cela amplifie vraiment cette conscience de soi. À ce jour, je déteste quand les gens me regardent la jambe quand je porte des shorts. '\ N \ ngail B., Polio Survivor"
 panum.1005.g: "La société civile se rassemble contre la polio."
 panum.1006.t: "Le politicien établit la fondation de la polio"
 panum.1006.d: "Face à l'épidémie de polio rampante, les parents en deuil, les mutilés et les morts, [SCOPE.sCharacter('panum_opposition_leader').GetFullName], ont proposé le plan visant à mettre en place une base pour lutter contre la maladie. Les critiques disent qu'il essaie simplement de brondrer sa réputation politique."
 panum.1006.f: "Le président américain Franklin D. Roosevelt était resté régulièrement dans le spa de Warm Springs depuis 1924 et est décédé ici en 1945. En 1921, il souffrait de paralysie de ses jambes, qui était considérée comme la polio vertébrale; Selon des recherches plus récentes, c'était le syndrome de Guillain-Barré, qui était encore peu connu à l'époque. Roosevelt a fondé la Georgia Warm Springs Foundation en 1927, dont la mission principale devait être initialement le traitement de la paralysie vertébrale. Aujourd'hui, l'établissement s'appelle le Roosevelt Warm Springs Institute for Rehabilitation et s'occupe des patients ayant tous les types de handicaps dans vingt-six départements différents."
 panum.1006.g: "Un vrai philanthrope."
 panum.1006.h: "Et la prochaine élection est une pure coïncidence, je suppose?"
 panum.1009.t: "Panique publique"
 panum.1009.d: "Malgré les meilleurs efforts du gouvernement local au [SCOPE.sState('panum_disease_state').GetName], la population a commencé à succomber à l'une des parties les plus dangereuses de toute épidémie: la panique."
 panum.1009.f: "Le samedi 17 juin 1916, une annonce officielle de l'existence d'une infection à la polio épidémique a été faite à Brooklyn, New York. Cette année-là, il y a eu 27 363 cas et 7 130 décès dus à la polio aux États-Unis, avec plus de 2 000 décès à New York seulement. L'épidémie de 1916 a provoqué une panique généralisée et des milliers de personnes ont fui la ville dans les stations de montagne voisines; Les cinémas ont été fermés, les réunions ont été annulées, les rassemblements publics étaient presque inexistants et les enfants ont été avertis de ne pas boire dans des fontaines à eau et ont dit d'éviter les parcs d'attractions, les piscines et les plages."
 panum.1009.g: "Damnable peur!"
 panum.1010.t: "Quarantaine"
 panum.1010.d: "Bien qu'il ne soit pas clair si la polio est une maladie contagieuse, il existe des voix croissantes dans le [SCOPE.sState('panum_disease_state').GetName] pour introduire une quarantaine pour s'assurer qu'elle ne se propage pas."
 panum.1010.f: "La maladie a frappé sans avertissement et a nécessité de longues périodes de quarantaine pendant lesquelles les parents étaient séparés des enfants: il était impossible de dire qui obtiendrait la maladie et qui serait épargné.  Les noms et adresses des personnes ayant des cas de polio confirmés ont été publiés quotidiennement dans la presse, leurs maisons ont été identifiées avec des pancartes et leurs familles ont été mise en quarantaine."
 panum.1010.g: "Cela causera plus de mal que de bien."
 panum.1010.h: "Appliquer une commande stricte de quarantaine."
 panum.1020.t: "Terminales épidémiques de la polio"
 panum.1020.d: "Les cliniques du [SCOPE.sState('panum_disease_state').GetName] indiquent que les cas de polio ont considérablement diminué. Les conséquences de l'épidémie continueront de concerner la région pour les années à venir."
 panum.1020.f: "«Je ne suis pas malade. Je suis brisé. Mais je suis heureux d'être en vie tant que je peux peindre. -Frida Kahlo"
 panum.1022.t: "Le début de la poliomyélite"
 panum.1022.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a envoyé aujourd'hui un bref résumé des symptômes qui se produisent lorsque la poliomyélite précoce éclate."
 panum.1022.f: "«Des enfants sains et surtout en fleurs âgés de 6 à 36 mois, dans des cas exceptionnels un peu plus âgés, tombent malades après avoir joué auparavant une santé non troublée, avec ou sans indications précédentes d'indisposition, telles que: le roulement des yeux, soudainement sous les manifestations de chaleur, de congédie Processus pathologiques exanthémateux. Peu de temps après, les convulsions d'une éclatement plus douce ou plus sévère, qui se répètent à des intervalles plus courts ou plus longs. \ N \ NIN D'AUTRES CAS, la maladie apparaît soudainement sans les symptômes énumérés, avec des convulsions ou des nausées, la baisse du corps, la mousseuse à la bouche et le nez, devenant bleu, etc. lentement et inaperçu."
 panum.1040.t: "Contributions à la connaissance de la maladie de Heine-Medin"
 panum.1040.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a présenté un article révolutionnaire à la Faculté de médecine aujourd'hui qui servira de point de départ pour maîtriser les épidémies de la polio - et l'amélioration du traitement des survivants de la polio."
 panum.1040.f: "Dans le [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] «contributions à la connaissance de la maladie de Heine-Medin», le médecin [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a mentionné plusieurs aspects qui devraient aider à prévenir et répandre la poliomyélite. Un aperçu clé est que la polio est une maladie infectieuse. En plus des mesures en dérivé, il existe également une variété de méthodes pour aider les patients. Les régimes riches en protéines, les programmes de physiothérapie et les nouvelles inventions comme le poumon du fer donnent un nouvel espoir que la polio peut ne pas être éradiquée, mais peut être mieux gérée à l'avenir."
 panum.1040.g: "Nous avons besoin d'un Temple de la renommée de la polio."
 panum.1041.t: "Physiothérapie"
 panum.1041.d: "Le médecin rencontre une infirmière qui transforme le [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] des connaissances antérieures sur le traitement de la polio sur sa tête."
 panum.1041.f: "«Et depuis combien de temps faites-vous cela maintenant? Il ne s'agit pas seulement du coussin chauffant. Des massages et des exercices de relaxation sont nécessaires. Un muscle qui est atteint ne se développe plus. Il a besoin d'exercice. '\ N'hmm ...'"
 panum.1041.g: "Mais ... les patients politiques ont besoin de repos et de stabilisation!"
 panum.1042.t: "La rue"
 panum.1042.d: "Lors de l'inspection de la zone d'épidémie de la polio, Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] se déroule systématiquement."
 panum.1042.f: "«Si quelqu'un suit la propagation de la poliomyélite qui fait rage dans le [SCOPE.sState('panum_disease_state').GetCityHubName], on ne peut pas manquer une découverte intéressante. Les chutes sont tendues ensemble comme une chaîne de perles. Vous pouvez suivre une route et voir les caisses côte à côte. J'ai pu retracer l'occurrence chronologique sur une ligne de chemin de fer dans la région. Ce n'est pas une coïncidence."
 panum.1042.g: "Mais cette preuve est-elle suffisante pour l'infection?"
 panum.1043.t: "La paroisse"
 panum.1043.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a visité une communauté éloignée dans la zone de peste pour poursuivre ses recherches sur les causes de la polio."
 panum.1043.f: "'49 Cas dans cette communauté? '\ N'AS Maire, je regrette de dire ceci, docteur.' \ N'HENDE QUE VOUS FAITES LA MATE DE LA MOTEUR DE CES CASSEUSS DANS LA PAROISSE, avez-vous remarqué quelque chose? '\ N'avez pas le respect que je suis dû, je ne suis pas un scientifique.' \ N'S Les maladies se sont répandues à partir d'un seul point. C'est l'école du village."
 panum.1043.g: "La polio n'est peut-être pas une maladie héréditaire mais contagieuse?"
 panum.1044.t: "Philanthropie"
 panum.1044.d: "Les survivants de la polio sont venus chez Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]. Vous souhaitez soutenir les travaux scientifiques liés à la recherche sur la polio avec une fondation."
 panum.1044.f: "Au début du XXe siècle, la polio était une maladie qui alarait de grandes parties de la société parce que ses antécédents étaient inconnus et même des classes de classe moyenne ou riches pouvaient être affectées. Certains survivants de la polio qui sont devenus riches ont également fait campagne contre la maladie tout au long de leur vie et ont soutenu des initiatives privées et gouvernementales. La polio est une maladie que la philanthropie a joué un rôle majeur dans la lutte."
 panum.1044.g: "Un soutien précieux."
 panum.1044.h: "L'argent devrait être également dans la recherche sur les vaccins."
 panum.1044.i: "L'argent de la Fondation bénéficierait également aux recherches générales."
 panum.1045.t: "Antibiotiques"
 panum.1045.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a réussi le traitement de la polio en utilisant des antibiotiques."
 panum.1045.f: "«Il n'y a pas de remède contre la polio. Et malheureusement, je ne vois pas comment cela sera possible à l'avenir. Il ne peut y avoir que la prévention, la recherche sur les causes et l'évitement de la propagation - et le traitement pour atténuer les symptômes. Les antibiotiques peuvent aider à protéger les muscles affaiblis des infections. Ceci est un pas dans la bonne direction. Espérons que d'autres suivront."
 panum.1045.g: "Bravo aux antibiotiques!"
 panum.1046.t: "Ostracisme social"
 panum.1046.d: "Dans un document de réforme, le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a souligné à ses collègues académiques que la réintégration des survivants de la polio signifie plus que de guérir, de traiter ou de soulager la maladie. La stigmatisation sociale des individus doit être réduite - et éliminée."
 panum.1046.f: "«Je me souviens que le plus grand défi pour moi a été de monter dans le bus scolaire. Cette première marche dans le bus semblait être un mile, et je ne pouvais tout simplement pas le faire. Pendant un moment, ma mère est sortie, et c'était tellement embarrassant parce qu'elle faisait ressortir ce tabouret. Mais je ne pouvais pas supporter l'embarras, donc mon père et le chauffeur de bus (son nom étaient Bill, et je me souviens de lui de façon vivante) se sont réunis et ont discuté de la façon dont ils pouvaient résoudre ce problème. Ce que mon père a fait, c'est de sortir où le bus s'est arrêté, et il a creusé une tranchée dans la saleté. Bill conduirait la roue avant du bus dans cette tranchée, ce qui réduirait la pas vers le bas là où il était très proche du sol. Ensuite, je pourrais juste monter dans le bus sans problème. Et personne n'a vraiment remarqué ... '\ n \ njennifer W., polio Survivor"
 panum.1046.g: "Les survivants de la polio ne sont pas des citoyens de deuxième classe."
 panum.1047.t: "Le prix du progrès"
 panum.1047.d: "Dans son enquête sur les causes des épidémies de la polio qui se produisent depuis des années, le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] est venu à une vérité désagréable."
 panum.1047.f: "«La polio est connue depuis les temps anciens, mais - en ce qui concerne mes recherches - jusqu'à la fin du 19e siècle, ce n'était pas une maladie épidémique comme aujourd'hui. La raison de cela, si elle est confirmée, est paradoxale: de meilleurs soins de santé. Avant l'introduction des égouts et de l'assainissement, les enfants ont été exposés à la polio beaucoup plus tôt, environ 6 mois à 4 ans. Pendant ce temps, la maladie est plus douce et offre une immunité. Plus une personne infectée par la polio est âgée, plus la paralysie est probable. Des normes de santé améliorées ont signifié que moins de personnes ont développé une immunité et sont plus vulnérables aux conséquences dangereuses de la maladie. '\ N \ nfrom du Journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [SCOPE.sState('panum_disease_state').GetCityHubName]"
 panum.1047.g: "La maladie se propage parce que la santé publique s'est améliorée?"
 panum.1048.t: "Bacillus ou virus?"
 panum.1048.d: "Rien n'est encore connu sur l'agent causal de la poliomyélite. Pour cette raison, le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] trouve [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself] dans un différend animé avec des collègues."
 panum.1048.f: "Bien que la poliomyélite soit connue depuis longtemps et, avec le développement de la microbiologie, il est devenu clair qu'il s'agissait d'un agent pathogène, les croyances ont continué à différer pendant longtemps pour savoir s'il s'agissait de bactéries de polio ou de virus de la polio."
 panum.1048.g: "Tout pointe vers un virus."
 panum.1048.h: "Ce bavardage inutile distrait le médecin de son travail!"
 panum.1049.t: "Acceptation en fauteuil roulant"
 panum.1049.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a constaté qu'il n'est pas seulement important de fournir aux patients des fauteuils roulants - ils doivent également être socialement acceptés afin que les survivants de la polio puissent facilement se réintégrer dans la vie normale."
 panum.1049.f: "«J'étais vraiment très naïf d'aller à l'université et j'ai été surpris de constater que l'université n'était pas accessible pour une personne en fauteuil roulant. Mais c'était comme ça. Il y avait des pas partout, et ce n'était pas comme un lycée où j'avais un groupe d'amis pour me porter ... plusieurs fois, j'ai dû obtenir un tas de bénévoles ou simplement recruter des gens alors qu'ils se précipitaient de classe en classe, et parfois ils disaient: «Je n'ai tout simplement pas le temps. Je ne peux pas vous aider. J'ai dû vivre dans un appartement hors du campus parce qu'aucun des dortoirs n'était accessible. '\ N \ n David K., Polio Survivor"
 panum.1049.g: "Nous soutenons une campagne pour plus d'acceptation en fauteuil roulant."
 panum.1049.h: "Fonds un programme pour ajouter des rampes accessibles en fauteuil roulant aux bâtiments publics."
 panum.1051.t: "Conseil de la polio"
 panum.1051.d: "Une recommandation d'action sur les maladies de la polio circule actuellement dans le monde académique et provoque le médecin [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] tous les problèmes pour appliquer [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] posséder des thèses sur le traitement de la polio."
 panum.1051.f: "«Donnez de l'oxygène par les membres inférieurs, par électricité positive. Baignoires fréquentes à l'aide de farine d'amande ou oxydant l'eau. Applications des cataplasmes de la camomille romaine, de l'orme glissant, de l'Arnica, de la moutarde, du cantharis, de l'huile d'amygdalae dulcis, et du mérite spécial, de l'huile de épikenard et du xanthoxolinum. Utilisez en interne la caféine, FL. Kola, muriate sèche de la quinine, élixir de Cinchone, eau de radium, chlorure d'or, calcis de liqueur et vin de pepsine. '\ N \ ndr. Angelika Hasenbein, «une monographie sur l'épidémie de poliomyélite (paralysie infantile)»"
 panum.1051.g: "Cela semble en fait très convaincant."
 panum.1052.t: "Plâtre coulées et accolades"
 panum.1052.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a appris de plusieurs \"experts de la polio\" que les attelles de jambe sont le meilleur moyen d'améliorer la situation initiale pour les patients - mais [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] n'est pas convaincu."
 panum.1052.f: "Les patients atteints de paralysie résiduelle ont été traités avec des accolades et ont appris à compenser la fonction perdue à l'aide d'étriers, de béquilles et de fauteuils roulants. L'utilisation de dispositifs tels que les accolades rigides et les moulages corporels, qui avaient tendance à provoquer une atrophie musculaire en raison du mouvement limité de l'utilisateur, ont également été présentés comme des traitements efficaces. La plupart de ces traitements se sont avérés de peu de valeur thérapeutique"
 panum.1052.g: "Peut-être que ça aide ...?"
 panum.1053.t: "Chirurgie inutile"
 panum.1053.d: "Les chirurgiens du docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ont été assurés que les procédures chirurgicales ont un effet positif sur la polio."
 panum.1053.f: "«J'ai passé d'innombrables heures à interviewer des collègues, à étudier des livres et à examiner les patients pour me convaincre du succès des interventions chirurgicales pour la polio. Les médecins sont très fiers de leurs résultats. La façon dont ils s'occupent des mutilations rappellent les mécanismes de précision qui croient qu'ils mettent en place un travail d'horlogerie. Ils utilisent des outils de précision pour travailler sur les machines humaines. Mais mon impression est que l'accent n'est pas mis sur la maladie, non pas sur le patient - mais sur la réputation des médecins. Jusqu'à présent, je ne connais aucun cas dans lequel cette méthode a en fait conduit à un traitement de polio réussi. '\ N \ nfrom du Journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [SCOPE.sState('panum_disease_state').GetCityHubName]"
 panum.1053.g: "Une fausse avance."
 panum.1054.t: "Sérum de convalescence"
 panum.1054.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a essayé un sérum très acclamé qui est considéré comme un remède efficace en médecine de la polio actuelle. Bien que les collègues [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] soient convaincus de la méthode, le médecin pense que c'est une perte de temps."
 panum.1054.f: "«À ce moment-là, ils avaient une idée que c'était une maladie infectieuse, donc on m'a donné ce qu'on appelait le« sérum de convalescence »qui a été fabriqué à partir du sang des personnes qui s'étaient remises de la polio. Cette forme de traitement était en vogue à l'époque. Il semble peu probable que cela ait eu un effet puisque la maladie a progressé pour une paralysie plutôt prononcée sans mouvement dans les deux jambes et sans mouvement dans mes muscles abdominaux. J'ai été mis en isolement, et je pense que l'on pouvait dire que j'avais de la poliomyélite. Cependant, je ne savais pas ce qu'était la poliomyélite. Personne ne m'a dit que j'avais une paralysie infantile, que j'aurais reconnue parce que Roosevelt était président à ce moment-là, et je savais qu'il avait subi une paralysie importante de la maladie. '\ N \ nrichard O., Polio Survivor"
 panum.1054.g: "Mais chaque médecin le prescrit?"
 panum.1055.t: "Isolement"
 panum.1055.d: "En plus de retenir les membres, certains experts de la polio pensent qu'il est conseillé d'isoler complètement les patients. Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a lui-même réalisé de telles expériences - et est arrivée à la conclusion qu'il s'agissait d'une thérapie inefficace et inhumaine."
 panum.1055.f: "«Une fois la colonne vertébrale terminée et le diagnostic de polio, j'ai été immédiatement placé isolément et j'ai dit que je ne devrais pas lever la tête. Je me souviens qu'ils m'ont mis dans un berceau! J'avais neuf ans et je ne comprenais pas pourquoi j'avais été placé dans un berceau. C'était très dégradant. Je n'allais certainement pas sortir du lit, et je n'étais susceptible de rouler et de tomber. En fait, je pouvais à peine bouger. Alors que je m'allongeais dans ce berceau, je pouvais sentir le virus vraiment s'installer. C'était comme une porte qui claquait. J'avais l'impression que mon monde avait totalement changé. Pour aggraver les choses, c'était terriblement chaud et humide, et bien sûr, c'était avant la climatisation; Je me souviens de me sentir très mal à l'aise ... '\ n \ nsharon K., Polio Survivor"
 panum.1055.g: "C'est inacceptable!"
 panum.1055.h: "Cela pourrait être le début d'une deuxième carrière."
 panum.1055.i: "Laissez ces enregistrements disparaître rapidement."
 panum.1056.t: "Syndrome post-polio"
 panum.1056.d: "Au cours d'un examen récent, Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a constaté qu'après l'infection réelle de la polio, y compris ses effets, il peut y avoir des effets après les effets sous forme de syndrome post-polio. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] est complètement désespéré sur cette évolution."
 panum.1056.f: "«Quand j'avais environ 35 ou 40 ans, j'ai commencé à avoir une douleur terrible dans mes articulations et mes muscles. Je me suis fatigué très facilement. Je suis allé chez le médecin et j'avais des radiographies et des tests sanguins. J'ai eu des pilules et j'ai eu une thérapie physique. Rien n'a aidé. \ Nas J'ai attendu qu'ils trouvent les dossiers, j'ai expliqué à la personne qui m'aidait que je ressentais toute cette nouvelle douleur, et j'espérais que les dossiers pourraient aider à expliquer pourquoi. Eh bien, elle m'a demandé si j'avais entendu parler du syndrome post-polio. J'ai dit: \"Non, qu'est-ce que c'est?\" Elle a expliqué qu'environ 30 ou 40 ans après avoir eu la polio, c'est comme si vous le réduisiez à nouveau. \ Neugone à nouveau avec la polio était plus que ce que je pouvais gérer. Je viens de s'effondrer. J'ai appelé ma belle-sœur et je lui ai dit ce que j'avais découvert. J'ai aussi dit à ma famille. J'ai beaucoup pleuré. J'ai montré à mes médecins locaux mes dossiers médicaux et j'ai expliqué mon rendez-vous au Sister Kenny Institute. Ils m'ont de nouveau dit que la polio appartenait au passé. J'ai dit: 'Oui, mais je suis ici maintenant, et je le vis encore!' \ N \ njanice G., Polio Survivor"
 panum.1056.g: "Quelle situation désespérée."
 panum.1061.t: "Expériences"
 panum.1061.d: "Dans une expérience douteuse mais non moins réussie, le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a infecté des singes par la polio."
 panum.1061.f: "«J'ai récemment lu une procédure que Jean-Antoine Villemin a utilisé pour prouver la contagosité de la tuberculose. Il a effectué des expériences sur des lapins en les mettant délibérément en contact avec le tissu des personnes souffrant de tuberculose. Des dizaines de chiens morts plus tard, il a pu prouver sa thèse. Mon expérience avec les singes est basée sur une hypothèse similaire. '\ N \ nfrom Le Journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [SCOPE.sState('panum_disease_state').GetCityHubName]"
 panum.1061.g: "Si les animaux peuvent être infectés, les humains peuvent également entre eux."
 panum.1062.t: "Poumon de fer"
 panum.1062.d: "L'ingénieur brillant [ROOT.Var('tesla_engineer_var').GetCharacter.GetFullName] a aidé le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] à construire un appareil ingénieux qui a révolutionné le traitement de la polio."
 panum.1062.f: "Un poumon de fer a été l'un des premiers dispositifs cliniques qui permettait une ventilation mécanique d'un humain. Vers 1920, l'ingénieur américain Philip Drinker l'a développé pour ventiler les patients atteints de maladies pulmonaires. Le corps du patient, à l'exception de la tête, se trouve complètement à l'intérieur d'un cylindre creux. L'appareil scelle le cou étanche à l'air et crée une pression négative. Cela provoque la pression ambiante de forcer l'air par le nez et la bouche du patient dans les poumons. L'expiration se produit en conséquence en augmentant la pression excessive dans la chambre. De nombreux patients atteints de polio n'avaient besoin que du poumon de fer dans la phase aiguë de la maladie jusqu'à ce que la fonction musculaire ait repris. Certains patients ne les ont utilisés que pendant la nuit, d'autres les ont utilisés en continu."
 panum.1062.g: "Cela peut sauver beaucoup de vies."
 panum.1063.t: "Soutien psychologique"
 panum.1063.d: "En tant que psychiatre, le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a utilisé l'expérience [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] pour faciliter la vie des patients politiques."
 panum.1063.f: "«Nous prêtons à juste titre attention à la composante physique de la maladie lorsque nous parlons de poliomyélite. Mais à côté du corps endommagé, il y a une âme endommagée. La polio ne laisse pas seulement des traces physiques. Surtout lorsque je travaille avec des enfants, j'ai eu l'impact que cette horrible maladie a sur leur vie privée et sociale. Les mots ne peuvent pas guérir. Mais ils peuvent soulager. Et nous devons donner une perspective sur les survivants afin qu'ils non seulement survivent, mais que nous avons la volonté de survivre. '\ N \ nfrom du Journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [SCOPE.sState('panum_disease_state').GetCityHubName]"
 panum.1063.g: "Merci, Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]."
 panum.1064.t: "Régime"
 panum.1064.d: "Le médecin [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] préconise un régime riche en nutriments pour les patients atteints de polio."
 panum.1064.f: "«Les succès antérieurs dans la lutte contre le rachitisme, la carence en iode, le scorbut et le pellagra ont montré que notre alimentation peut jouer un rôle décisif dans la lutte contre les maladies. La polio n'est pas une maladie de carence. Mais il est connu que les protéines jouent un rôle important dans la construction des muscles, et il est donc important de souligner que le régime alimentaire des patients atteints de polio doit être plus riche que celui des gens ordinaires. '\ N \ nfrom du Journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [SCOPE.sState('panum_disease_state').GetCityHubName]"
 panum.1064.g: "Enfin, un certificat de médecin pour manger des steaks T-Bone."
