 panum_congress_host_modifier: "A récemment organisé un congrès médical"
 panum_congress_attend_modifier: "Assiste au Congrès médical"
 panum.2000.t: "Préparatifs pour le Congrès médical"
 panum.2000.d: "Avant que le prochain Congrès médical international ne se tient dans notre pays, la question se pose de savoir si le Congrès devrait se concentrer ou non sur une maladie spécifique."
 panum.2000.f: "Les conférences médicales peuvent se concentrer sur une maladie spécifique si la nation hôte a au moins une description de la maladie. Un Congrès ne peut être tenu qu'une seule fois pour chaque maladie. Les médecins et les microbiologistes présents reçoivent des indices supplémentaires afin qu'ils puissent faire avancer leurs recherches plus rapidement. Lors d'un congrès général, les pays participants reçoivent simplement un bonus à leurs progrès académiques."
 panum.2000.g: "C'est censé être une conférence médicale générale."
 panum.2001.t: "Congrès médical"
 panum.2001.d: "La capitale se prépare à la réunion internationale des médecins spécialistes. [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] présidera les réunions en tant que président. [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_congress_title')]"
 panum.2001.f: "Les conférences médicales sont une excellente occasion d'échanger des connaissances médicales. Les réalisations qui étaient auparavant réservées à un seul pays sont partagées ici de manière fraternelle. Les conférences médicales ne peuvent être organisées que par des médecins, mais les biologistes avec la spécialisation en microbiologie sont également invités et peuvent partager leurs connaissances dans le domaine des agents pathogènes et des vaccins. Si un pays a à la fois un médecin et un microbiologiste, les deux peuvent participer."
 panum.2001.g: "Envoyez les invitations!"
 panum.2002.t: "Invitation pour le congrès médical"
 panum.2002.d: "[SCOPE.sCountry('panum_congress_host_country').GetName] invite les principales nations médicales à un congrès international dans sa capitale. Les médecins et les microbiologistes sont invités. [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_congress_title')]"
 panum.2002.g: "N'oubliez pas les stéthoscopes et les microscopes!"
 panum.2003.t: "Descriptions et traitements"
 panum.2003.d: "Le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a l'occasion unique de gagner des informations épidémiologiques révolutionnaires au Congrès médical au [SCOPE.sCountry('panum_congress_host_country').GetName]. Quelle maladie devrait être au centre?"
 panum.2003.f: "Si une nation participant au Congrès médical connaissait une description d'une maladie ou d'un traitement pour une maladie qu'un autre pays ne possède pas, ce dernier peut l'apprendre au Congrès. Les connaissances ne peuvent être améliorées que sur une seule maladie. Si aucune nouvelle connaissance n'est possible au Congrès, il est toujours possible d'accumuler des connaissances générales et d'améliorer une technologie médicale. La participation d'un médecin est cruciale pour cela."
 panum.2003.g: "Le médecin doit recueillir des connaissances médicales générales des collègues."
 panum.2003.h: "Choléra."
 panum.2003.i: "Tuberculose."
 panum.2003.j: "Variole."
 panum.2003.k: "Typhus."
 panum.2003.l: "Fièvre jaune."
 panum.2003.m: "Rougeole."
 panum.2003.n: "Scarlatine."
 panum.2003.o: "Peste."
 panum.2003.p: "Diphtérie."
 panum.2003.q: "Polio."
 panum.2004.t: "Pathogène et vaccin"
 panum.2004.d: "C'est avec plaisir que le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a constaté qu'il y avait beaucoup de personnes partageant les mêmes idées au Congrès en [SCOPE.sCountry('panum_congress_host_country').GetName] qui étaient prêtes à partager leurs connaissances microbiologiques. La seule question est laquelle des merveilleuses maladies [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] aimerait en savoir plus à l'avenir?"
 panum.2004.f: "Si une nation participant au Congrès médical connaissait un pathogène d'une maladie ou un vaccin contre une maladie qu'un autre pays ne possède pas, alors ce dernier peut l'apprendre au Congrès. Les connaissances ne peuvent être améliorées que sur une seule maladie. Si aucune nouvelle connaissance n'est possible au Congrès, il est toujours possible d'accumuler des connaissances générales et d'améliorer une technologie biologique. La participation d'un biologiste avec le trait microbiologiste est cruciale pour cela."
 panum.2004.g: "Notre scientifique devrait recueillir des connaissances biologiques générales des collègues."
 panum.2005.t: "Une vision médicale"
 panum.2005.d_general: "Les médecins et les biologistes du Congrès ont décidé, en particulier, de moderniser et d'améliorer la formation des étudiants potentiels en médecine et d'écrire une déclaration conjointe à ce sujet."
 panum.2005.d_special: "Compte tenu de l'objectif principal de la conférence, les médecins et les biologistes ont voté pour déplacer tous les efforts pour lutter contre une maladie spécifique au cours des prochaines années."
 panum.2005.f: "Si un certain sujet a été déclaré le sujet principal au début du Congrès médical, tous les pays participants recevront des indices supplémentaires sur cette maladie - selon un physicien, un microbiologiste ou les deux sont présents. S'il s'agit d'un Congrès général, l'accent est mis sur la formation de nouveaux membres du personnel médical."
 panum.2005.g: "L'événement en valait la peine."
 panum.2009.t: "Le congrès médical se termine"
 panum.2009.d: "Le Congrès médical du [SCOPE.sCountry('panum_congress_host_country').GetName] s'est terminé hier. Les médecins et les microbiologistes sont à nouveau sur le chemin du retour et rapportent de nombreuses conclusions."
 panum.2009.f: "Le Congrès médical international (français: Congès International de Médecine) a été une série de conférences scientifiques internationales sur la médecine qui ont eu lieu, de 1867 à 1867 à 1913. L'idée d'un tel Congrès est venue en 1865, lors du troisième Congrès médical annuel de France; Le professeur Henri Giutrac a proposé de tenir une conférence médicale internationale en 1867, profitant du fait que les médecins et les chirurgiens du monde entier seraient sûrement à Paris pour assister à l'exposition internationale de cette année."
 panum.2009.g: "J'espère que le buffet était bon?"
 panum_surgeon: "Chirurgien"
 panum_surgeon_desc: "Les chirurgiens sont à la maison dans la vie médicale quotidienne, mais peuvent être utiles dans la recherche médicale ou les traités anatomiques."
 panum_psychiatrist: "Psychiatre"
 panum_psychiatrist_desc: "Les psychatristes sont intéressés à améliorer les conditions des personnes malades mentales et conduisent des recherches et de nouvelles méthodes de traitement dans ce domaine."
 panum_military_physician: "Médecin militaire"
 panum_military_physician_desc: "Ce médecin est spécialisé dans la prise en charge des blessés sur le champ de bataille et réussit particulièrement à améliorer les premiers soins."
