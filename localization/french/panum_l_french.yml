 panum.112.t: "Une lueur d'espoir" #NT!
 panum.112.d: "Dans les hôpitaux de choléra de [SCOPE.sState('panum_disease_state').GetName], un médecin a particulièrement distingué [SCOPE.sCharacter('panum_new_physician_scope').GetHerselfHimself] dans l'épidémie actuelle. Le fonctionnement de [SCOPE.sCharacter('panum_new_physician_scope').GetFullName] a déjà acquis une importance nationale. Ce médecin pourrait potentiellement jouer un rôle important dans la lutte contre l'épidémie de [GetPlayer.GetName]." #NT!
 panum.209.t: "Docteur Tuberculose" #NT!
 panum.209.d: "Le directeur du sanatorium pour tuberculose, le Dr [SCOPE.sCharacter('panum_new_physician_scope').GetLastName], a offert ses services au milieu de l'épidémie qui fait rage." #NT!
 panum.112.f: "« Dieu m'a parlé et m'a appelé à Son service. La voix n'a pas précisé quelle forme ce service devait prendre. » - Florence Nightingale" #NT!
 panum.112.g: "Donnez immédiatement à [SCOPE.sCharacter('panum_new_physician_scope').GetHerHim] une position officielle !" #NT!
 panum.112.h: "Le médecin doit former les générations futures à lutter contre la prochaine épidémie." #NT!
  
 panum.122.t: "Incubation du choléra" #NT!
 panum.122.d: "Après plusieurs observations et entretiens, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a découvert qu’un certain temps s’écoule avant que les symptômes typiques du choléra n’apparaissent chez un patient." #NT!
 panum.122.f: "Le médecin estime que cette période varie d'une demi-journée à cinq jours, la moyenne étant de trois jours. [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] a eu plusieurs entretiens avec des victimes de la maladie et leurs proches. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] a ainsi pu reconstituer les événements à partir de plusieurs témoignages oculaires. Même si la cause reste obscure, on peut tirer ultérieurement des conclusions de ces observations sur ce qui s'est passé exactement le premier jour." #NT!
 panum.122.g: "Bien observé." #NT!
 panum.124.g: "Précisément observé." #NT!
 panum.123.t: "Symptômes du choléra" #NT!
 panum.123.d: "Aujourd’hui, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a envoyé à la Faculté de médecine une liste complète des symptômes du choléra." #NT!
 panum.123.f: "Comme on le sait déjà, mais jusqu'à présent seulement de manière rudimentaire, le choléra est une maladie de l'intestin grêle humain. Les conséquences sont une diarrhée extrême avec des selles bleues typiques de type « eau de riz » et des vomissements violents. On a dit que le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] avait un certain côté sadique parce que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] a envoyé une description complète de ces symptômes et d'autres symptômes extrêmement désagréables à temps pour le dîner académique." #NT!
 panum.124.t: "Choléra asiatique" #NT!
 panum.124.d: "Dans un rapport très acclamé, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a établi les différences entre le choléra et d’autres maladies apparentées, ce qui est considéré comme une étape importante dans la description future des maladies." #NT!
 panum.124.f: "Le nom choléra, dérivé du mot grec pour bile, désignait à l'origine toutes les formes possibles de diarrhée ou de problèmes intestinaux (« écoulement biliaire »). Bien que Jakob de Bondt ait déjà décrit une maladie choléra spécifiquement indienne en 1642, le choléra est resté un terme purement collectif. Ce n'est qu'avec l'apparition des grandes pandémies de choléra du XIXe siècle que ce nouveau type spécifique de choléra, qui s'est avéré être la maladie la plus dévastatrice du siècle, a également été défini par un nom propre pour le différencier clairement : Cholera Asiatica." #NT!
  
 panum.222.t: "Incubation de la tuberculose" #NT!
 panum.222.d: "Dans ses recherches sur la tuberculose, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a remarqué certaines particularités liées à la maladie. Apparemment, il faut parfois plusieurs semaines avant qu'une personne malade ne présente des symptômes typiques." #NT!
 panum.222.f: "Qu'il s'agisse de la théorie des miasmes ou de la théorie des germes, la tuberculose reste un mystère. S'il s'agit d'une maladie infectieuse, il semble que les symptômes ne se manifestent qu'au bout de plusieurs semaines : le médecin estime qu'il faut compter entre deux et douze semaines ! De plus, tous ceux qui vivent avec une personne malade ne sont pas directement infectés, comme l'ont montré de nombreuses enquêtes menées auprès de patients et de proches. Soit les scientifiques ont raison avec leur théorie selon laquelle la tuberculose n'est pas une maladie infectieuse et que d'autres facteurs sont en cause, soit le risque d'infection est plus faible qu'on ne le pensait au départ." #NT!
 panum.223.t: "Symptômes de la tuberculose" #NT!
 panum.223.d: "Après que le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ait étudié de manière intensive les symptômes de la tuberculose, [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] est arrivé à une conclusion qui a même surpris certains collègues universitaires : la tuberculose est une maladie beaucoup plus compliquée avec une grande variété de symptômes qui vont bien au-delà des problèmes pulmonaires." #NT!
 panum.223.f: "Bien que l'attaque des poumons et leur destruction lente et douloureuse soient l'une des caractéristiques les plus connues de la tuberculose, la toux n'est qu'un des nombreux symptômes. La tuberculose pulmonaire n'est qu'un type de tuberculose, qui peut également affecter d'autres organes. La fatigue, la fièvre, la perte d'appétit, les sueurs nocturnes ou les crachats de sang étaient auparavant des symptômes connus. Le fait que la tuberculose n'attaque pas seulement le corps en dehors des poumons, mais que deux types différents de tuberculose peuvent survenir en même temps, a considérablement modifié la vision du monde de certains membres de la Faculté de médecine." #NT!
 panum.224.t: "Tuberculose et scrofule" #NT!
 panum.224.d: "Le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a étudié de manière approfondie les différentes formes possibles de tuberculose et, malgré les nombreuses similitudes avec d'autres symptômes de maladies, il a élaboré les différences spécifiques entre la tuberculose et la scrofule, mais a également souligné en même temps les liens." #NT!
 panum.224.f: "La tuberculose est décrite depuis des siècles, mais elle n'a pas eu d'effets aussi dévastateurs jusqu'au XIXe siècle en raison d'une urbanisation plus faible. Elle a été connue sous d'autres noms jusqu'au XIXe siècle - le terme « tuberculose » a été utilisé dans le monde anglophone jusqu'au XXe siècle. René Laennec est considéré comme l'un des pionniers de la recherche sur la tuberculose, inventeur du stéthoscope pour l'examen des poumons. Johann Lukas Schönlein a inventé le terme tuberculose en 1832 et l'a associé à un tableau clinique spécifique. Une découverte importante de ces années était que la scrofule et la tuberculose étaient deux maladies différentes, mais qu'il était difficile de les différencier en raison du grand nombre de symptômes de la tuberculose." #NT!
  
 panum.322.t: "Incubation et symptômes de la variole" #NT!
 panum.322.d: "Dans un récent résumé, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a noté que les premiers symptômes de la variole ne sont pas sans rappeler ceux de la grippe avant l'apparition des fameuses pustules. On peut supposer qu'il s'écoule une à deux semaines entre l'infection et les symptômes." #NT!
 panum.322.f: "« Ceux qui ont été facilement guéris de la peste me semblent avoir été préalablement séchés et purgés en ce qui concerne tout le corps, car des vomissements se sont produits chez certains d'entre eux et l'estomac a été dérangé chez tous. Et, de la même manière, chez ceux déjà purgés qui allaient être sauvés, des pustules sombres apparaissent clairement sur tout le corps, la plupart ulcéreuses, toutes sèches. (...) À l'extérieur, le corps n'était pas chaud au toucher, ni pâle ; la peau était plutôt rouge, livide, et éclatait en petites ampoules et ulcères. » - Galien" #NT!
 panum.323.t: "Varicelle ou variole ?" #NT!
 panum.323.d: "Au cours de l'observation de patients atteints de variole, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a pu présenter un rapport partiel selon lequel la varicelle est une maladie indépendante et inoffensive. Cette théorie a été jusqu'à présent très controversée." #NT!
 panum.323.f: "« La varicelle éclate chez beaucoup de gens sans aucune maladie ni signe préalable ; chez d’autres, elle est précédée d’un léger frisson, de lassitude, de toux, d’un sommeil perturbé, de douleurs errantes, d’une perte d’appétit et de fièvre pendant trois jours. La plupart d’entre elles sont de la taille habituelle de la variole, mais certaines sont plus petites. Je n’en ai jamais vu confluentes ni très nombreuses. Le plus grand nombre que j’aie jamais observé était d’environ douze sur le visage et de deux cents sur le reste du corps. Le deuxième ou au plus tard le troisième jour après le début de l’éruption, autant de pustules que celles qui ne sont pas rompues semblent arrivées à leur pleine maturité, et celles qui sont les plus pleines de cette liqueur jaune ressemblent beaucoup à ce que sont les vraies pustules le cinquième ou le sixième jour, en particulier lorsqu’il se trouve qu’il y a un espace plus grand que d’habitude occupé par le sérum extravasé. » - William Heberden" #NT!
 panum.324.t: "La différence entre la rougeole et la variole" #NT!
 panum.324.d: "Le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a comparé avec le plus grand soin les symptômes des malades atteints de variole, de rougeole et de varicelle et a pu les classer très précisément." #NT!
 panum.324.f: "'L'éruption de la variole est précédée d'une fièvre persistante, de douleurs dans le dos, de démangeaisons dans le nez et de cauchemars pendant le sommeil. Ce sont les symptômes les plus aigus de son apparition, avec une douleur notable dans le dos accompagnée de fièvre et de démangeaisons ressenties par le patient sur tout le corps. Un gonflement du visage apparaît, qui va et vient, et on remarque une coloration inflammatoire générale perceptible sous forme de forte rougeur sur les deux joues et autour des deux yeux. On ressent une lourdeur de tout le corps et une grande agitation, qui se traduit par de nombreux étirements et bâillements. On ressent une douleur dans la gorge et la poitrine et on a du mal à respirer et à tousser. Les symptômes supplémentaires sont : haleine sèche, crachats épais, enrouement de la voix, douleur et lourdeur de la tête, agitation, nausées et anxiété. Notez la différence : l'agitation, les nausées et l'anxiété sont plus fréquentes avec la rougeole qu'avec la variole. En revanche, les douleurs dans le dos sont plus apparentes avec la variole qu'avec la rougeole.' -Rhazès" #NT!
  
 panum.422.t: "Symptômes et incubation du typhus" #NT!
 panum.422.d: "Dans un premier rapport intermédiaire, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a énuméré les symptômes du typhus, ainsi qu'une première estimation du moment où ils apparaissent pour la première fois au cours de la maladie." #NT!
 panum.422.f: "« Fièvre, frissons, maux de tête, toux, éruption cutanée, vomissements : tous ces symptômes sont des signes du typhus. Mais tous ces symptômes peuvent aussi se retrouver dans des maladies similaires. En revanche, les nausées et la confusion sont typiques du typhus classique. L'évolution caractéristique de la fièvre est une augmentation de la température pendant deux à trois jours, suivie d'une fièvre continue pendant environ dix jours et d'une baisse ultérieure sur plusieurs jours. D'après mes calculs, il s'écoule environ dix à quatorze jours entre l'infection et les premiers symptômes. »" #NT!
 panum.423.t: "La fièvre du camp" #NT!
 panum.423.d: "Après avoir comparé les rapports historiques d'épidémies dans l'armée avec les symptômes actuels des personnes atteintes du typhus, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] arrive à la conclusion qu'assimiler le typhus et la « fièvre des camps » n'est d'aucune aide." #NT!
 panum.423.f: "« Il s’agit bien d’une fièvre des camps, mais est-ce LA fièvre des camps ? » Le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a posé des questions comme celles-ci qui ont fait réfléchir les membres de la Faculté de médecine. Historiquement connue sous le nom de « fièvre des camps », elle a longtemps été associée aux épidémies dans les grandes armées ou les casernes, en particulier comme maladie qui a infligé des pertes massives à l’armée napoléonienne. Mais toutes les maladies de l’armée connues sous le nom de « fièvre des camps » ne peuvent pas être assimilées au typhus. La fièvre récurrente et la fièvre des tranchées sont d’autres maladies connues pour avoir touché le personnel militaire dans des espaces confinés. La maladie qui a particulièrement sévi pendant la guerre civile américaine, en revanche, est souvent appelée typhus, mais il s’agissait en fait de fièvre typhoïde." #NT!
 panum.424.t: "Typhus : deux maladies en une ?" #NT!
 panum.424.d: "En examinant des patients atteints du typhus, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a découvert que plusieurs hypothèses étaient fondamentalement fausses. Si les médecins précédents avaient diagnostiqué une « altération morbide » des intestins, [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] n'a rien pu détecter chez les personnes décédées du typhus. Le médecin suppose plutôt que la maladie intestinale est une maladie qu'il faut distinguer du typhus, que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] appelle « fièvre typhoïde »." #NT!
 panum.424.f: "Jusqu'au milieu du XIXe siècle, les médecins ne faisaient pas de distinction entre typhus et fièvre typhoïde. Ils étaient simplement considérés comme des manifestations de la même maladie avec des symptômes plus ou moins prononcés. En 1836, le médecin américain William Gerhard a observé que chez certains patients atteints de typhus, les intestins n'étaient pas touchés par la maladie, même si jusqu'alors c'était l'un des symptômes les plus fréquemment diagnostiqués. De plus, des observations similaires l'ont amené à penser que le typhus n'était pas une maladie des intestins, mais qu'il attaquait plutôt d'autres organes : la confusion mentale et les douleurs musculaires étaient beaucoup plus fréquentes que les problèmes du tube digestif. L'identification séculaire du typhus et de la fièvre typhoïde a non seulement conduit à une similitude des noms, mais a également conduit au fait que dans certaines langues, la fièvre typhoïde est appelée typhus, par exemple en allemand." #NT!
  
 panum.522.t: "Deux traitements contre la fièvre jaune" #NT!
 panum.522.d: "Lors d’une observation attentive de la fièvre jaune, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a découvert que la maladie peut progresser de deux façons." #NT!
 panum.522.f: "Le médecin a constaté que dans de nombreux cas connus, la fièvre jaune se manifeste de manière bénigne et disparaît au bout de quelques jours. On estime que cinq patients sur six souffrent de cette forme bénigne de la fièvre jaune. L'autre évolution de la maladie est dangereuse et peut être mortelle. Les patients souffrent d'une deuxième évolution toxique. Elle se caractérise par une fièvre récurrente, accompagnée d'une jaunisse due à une lésion hépatique, ainsi que de douleurs abdominales. Des saignements dans la bouche, le nez, les yeux et le tube digestif provoquent des vomissements contenant du sang, d'où l'un des noms espagnols de la fièvre jaune, vómito negro ('vomissement noir'). Il peut également y avoir une insuffisance rénale, un hoquet et un délire. On estime que 20 à 50 pour cent des victimes de la fièvre jaune qui atteignent ce deuxième stade de la maladie meurent, conclut le chercheur dans le rapport présenté." #NT!
 panum.523.t: "Saisons de la fièvre jaune" #NT!
 panum.523.d: "Le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a découvert que les épidémies de fièvre jaune suivent un certain schéma temporel." #NT!
 panum.523.f: "Les données historiques et actuelles suggèrent que la fièvre jaune se déclare principalement en été. Le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] n'a pas encore pu expliquer pourquoi la maladie ne se déclare pas chaque année comme la grippe, mais disparaît complètement sur de longues périodes. Il est frappant de constater que la fièvre jaune était particulièrement répandue les années pluvieuses." #NT!
 panum.524.t: "Une maladie locale ?" #NT!
 panum.524.d: "En décrivant la maladie de la fièvre jaune, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] souligne le fait que la fièvre jaune est une maladie limitée à certains territoires et se propage principalement dans les zones marécageuses et tropicales, à quelques exceptions près." #NT!
 panum.524.f: "Le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a examiné plusieurs rapports et rapports sur d'autres épidémies de fièvre jaune. Il est frappant de constater que celles-ci se sont produites dans une zone très limitée. Les régions tropicales et les marais d'Afrique et d'Amérique sont principalement touchés. Bien que dans certains cas l'épidémie se propage plus au nord - par exemple à Philadelphie aux États-Unis et à Barcelone en Espagne - le médecin est convaincu que certaines zones climatiques ont quelque chose à voir avec l'apparition de la maladie. Le fait que des foyers isolés de la maladie se soient produits dans des ports anglais ne dérange pas [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] - car la maladie ne s'est pas propagée beaucoup plus loin que les environs de la ville portuaire." #NT!
  
