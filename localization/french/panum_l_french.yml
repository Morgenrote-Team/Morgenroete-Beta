 je_panum_measles_description_reason: "Le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] examine actuellement plusieurs patients au [SCOPE.sState('panum_disease_state').GetName] pour déterminer les symptômes de la #YELLOW rougeole#!.. Il est crucial de pouvoir différencier d'autres maladies similaires ou coexistantes. À la fin de son travail, le scientifique met sa description à la disposition du public afin que les générations futures aient de meilleures chances de reconnaître le contexte de la maladie et de trouver des méthodes de traitement." #NT!
