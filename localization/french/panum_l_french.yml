 panum.101.t: "Troisième pandémie de choléra"
 panum.101.d: "Les rapports inquiétants du Delta du Gange ont atteint la capitale aujourd'hui. Les cas de maladie y ont augmenté rapidement. Après un bref examen par des médecins locaux, ils sont choqués de découvrir que le choléra a à nouveau élevé sa tête laide."
 panum.101.g: "D'une manière ou d'une autre, le choléra est revenu."
 panum.1000.t: "Épidémie de polio"
 panum.1000.d: "Une épidémie a éclaté dans l'un de nos États: #YELLOW Polio#! ravage dans [SCOPE.sState('panum_disease_state').GetName]!"
 panum.1000.f: "Il existe déjà des images de l'Égypte ancienne qui suggèrent que la poliomyélite existe depuis longtemps et est endémique. Cependant, il n'a atteint son statut de maladie épidémique que vers la fin du 19e siècle, lorsqu'il a soudainement éclaté à travers la Suède et les États-Unis. En 1910, les épidémies fréquentes sont devenues des événements réguliers dans le monde développé principalement dans les villes pendant les mois d'été. À son apogée dans les années 40 et 1950, la polio paralyserait ou tuerait plus d'un demi-million de personnes dans le monde chaque année. La peur et la réponse collective à ces épidémies entraîneraient une réaction et une mobilisation extraordinaires du public stimulant le développement de nouvelles méthodes pour prévenir et traiter la maladie et révolutionner la philanthropie médicale."
 panum.1000.g: "Les béquilles et les fauteuils roulants deviennent des objets de tous les jours ..."
 je_panum_germ_theory_success: "[GetPlayer.GetName] a collecté au moins #V 20 éléments de preuve#! pour renforcer la théorie des germes et réfuter la théorie du miasme."
