 panum.1100.t: "La grippe [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective]"
 panum.1100.d: "Plusieurs hôpitaux, cliniques et cabinets de médecin ont signalé un nombre inhabituellement élevé de cas de maladie étrange qu'ils pensaient d'abord la grippe commune. Les lits de grue sont maintenant surpeuplés et les chambres publiques doivent être dégagées. Les pires craintes sont confirmées qu'il s'agit apparemment de la grippe [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] redoutée qui a frappé dans les pays voisins."
 panum.1100.f: "Au début, les médecins ont parlé d'une épidémie de grippe normale. Dans les premiers jours, la presse a affirmé qu'il s'agissait d'une étrange maladie de type épidémie, mais qu'elle était inoffensive et sans décès. \ N \ nbut L'inverse est le cas. Chaque jour, l'épidémie de grippe atteint une nouvelle ville, une nouvelle région et exige une réorganisation complète du traitement médical. Hier, deux hommes dans une caserne ont souffert de symptômes, il y en a déjà 700. La nature sinistre de la maladie se reflète dans le fait qu'elle ne tue pas les enfants et les personnes âgées comme d'habitude, mais plutôt les jeunes de 20 à 40 ans. Un sur vingt malade ne survit pas à la grippe. D'où il vient, comment cela est venu, ce qu'il est: cette pandémie reste un mystère. \ N \ nhat est déjà nul, cependant, c'est que cette grippe pourrait changer complètement la normalité comme nous le savions auparavant. L'appel à l'action du gouvernement devient plus fort. Comment [GetPlayer.GetName] va-t-il répondre à cela?"
 panum.1100.g: "C'est une maladie bénigne, n'est-ce pas?"
 panum.1101.t: "La grippe espagnole"
 panum.1101.d: "Plusieurs hôpitaux, cliniques et cabinets de médecin ont signalé un nombre inhabituellement élevé de cas de maladie étrange qu'ils pensaient d'abord la grippe commune. Les lits de grue sont maintenant surpeuplés et les chambres publiques doivent être dégagées. Les pires craintes sont confirmées qu'il s'agit apparemment d'une pandémie de proportions auparavant inconnues."
 panum.1101.f: "La grippe espagnole était une pandémie de grippe causée par un dérivé inhabituellement virulent du virus de la grippe qui s'est propagé en trois vagues entre 1918 et 1920, revenant entre 20 millions et 50 millions de vies, avec des estimations allant d'une plus grande population de la grippe espagnole de la grippe espagnole de la guerre des premières guerre dans la première guerre mondiale (approx. Un total d'environ 500 millions de personnes auraient été infectées, ce qui entraîne un taux de mortalité de 5 à 10%, ce qui était significativement plus élevé que celui des maladies causées par d'autres agents pathogènes de la grippe. \ N \ NA Caractéristique spéciale de la grippe espagnole était qu'il avait affecté plutôt les jeunes (âgés de 20 et 40 ans), tandis que les virus influennés, autrement en particulier les petits enfants et les personnes âgées. La grippe est devenue «espagnol» lorsque, le 29 juin 1918, le directeur espagnol de la santé Martín Salazar a annoncé qu'il n'avait aucun rapport d'une maladie comparable dans le reste de l'Europe. À la fin de juin 1918, la presse internationale a de plus en plus utilisé le terme «grippe espagnole», qui a également été encouragée par certains gouvernements belligérants afin de couvrir la propagation réelle. Il est considéré comme la «mère de toutes les pandémies»."
 panum.1101.g: "Alors les gens parlent déjà de la grippe espagnole?"
 panum.1102.t: "La grande pandémie"
 panum.1102.d: "Plusieurs hôpitaux, cliniques et cabinets de médecin ont signalé un nombre inhabituellement élevé de cas de maladie étrange qu'ils pensaient d'abord la grippe commune. Les lits de grue sont maintenant surpeuplés et les chambres publiques doivent être dégagées. Les pires craintes sont confirmées qu'il s'agit apparemment d'une pandémie de proportions auparavant inconnues."
 panum.1102.f: "Au début, les médecins ont parlé d'une épidémie de grippe normale. Dans les premiers jours, la presse a affirmé qu'il s'agissait d'une étrange maladie de type épidémie, mais qu'elle était inoffensive et sans décès. \ N \ nbut L'inverse est le cas. Chaque jour, l'épidémie de grippe atteint une nouvelle ville, une nouvelle région et exige une réorganisation complète du traitement médical. Hier, deux hommes dans une caserne ont souffert de symptômes, il y en a déjà 700. La nature sinistre de la maladie se reflète dans le fait qu'elle ne tue pas les enfants et les personnes âgées comme d'habitude, mais plutôt les jeunes de 20 à 40 ans. Un sur vingt malade ne survit pas à la grippe. D'où il vient, comment cela est venu, ce qu'il est: cette pandémie reste un mystère. \ N \ nhat est déjà nul, cependant, c'est que cette grippe pourrait changer complètement la normalité comme nous le savions auparavant. L'appel à l'action du gouvernement devient plus fort. Comment [GetPlayer.GetName] va-t-il répondre à cela?"
 panum.1102.g: "Alors les gens parlent déjà de la grippe [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective]?"
 panum.1103.t: "Politique pandémique"
 panum.1103.a.tt: "Des mesures strictes étoufferont l'économie, mais auront plus de chances de prendre effet plus tôt et d'arrêter la pandémie dans au moins certains États."
 panum.1103.b.tt: "Les mesures prendront beaucoup plus de temps pour prendre effet et avoir un impact, mais l'économie sera moins endommagée."
 panum.1103.c.tt: "La pandémie suit son cours naturel et les mesures établies sont complètement abolies."
 panum.1104.t: "[GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] grippe en [SCOPE.sState('panum_flu_fading_state').GetName] s'estompe"
 panum.1104.d: "Apparemment, les restrictions en [SCOPE.sState('panum_flu_fading_state').GetName] ont eu leurs premiers effets. Après des semaines, une baisse du nombre de décès y est perceptible."
 panum.1104.f: "Dans certaines conditions, une pandémie peut se calmer dans un état après quelques semaines. Des mesures rigides, un bon système de santé, un médecin de première classe ou des techniques médicales très développées aident à initier ce processus."
 panum.1104.g: "Un signe d'espoir."
 panum.1105.t: "[GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] La grippe en [SCOPE.sState('panum_flu_disappearing_state').GetName] disparaît"
 panum.1105.d: "Après que la pandémie du [SCOPE.sState('panum_flu_disappearing_state').GetName] ait considérablement diminué au cours des dernières semaines, aucun nouveau cas n'y a été enregistré ces jours-ci. La région est complètement sans grippe!"
 panum.1105.f: "Pour qu'une pandémie disparaisse complètement d'un État, elle doit déjà avoir disparu. Il est alors possible qu'une région soit exempte de grippe avant la fin de la pandémie réelle. Des mesures rigides, un bon système de santé, un médecin de première classe ou des techniques médicales très développées aident à se débarrasser de la grippe."
 panum.1105.g: "Les mesures ont-elles contribué à cela?"
 panum.1106.t: "Victime de la grippe [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective]"
 panum.1106.d: "[SCOPE.sCharacter('panum_pandemic_victim').GetFullName] a contracté la grippe [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] il y a quelques jours et connaît un cours grave de la maladie. Les médecins attendent le pire."
 panum.1106.f: "«Vers 12 heures, j'ai commencé à me sentir chaud. J'étais tellement fiévreux que j'avais peur de déclencher les vêtements. J'avais une toux qui a déchiré mes entrailles quand je ne pouvais pas la supprimer. Il faisait sombre; J'avais sûrement une pneumonie et je n'ai jamais été aussi désespérée et inconfortable dans ma vie. … Ensuite, j'ai découvert que je pénétrais dans un déluge de transpiration et même si j'aurais dû être plus à l'aise, j'étais plus misérable que jamais. Lorsque la lumière est finalement venue, j'étais un spécimen de misère - je ne pouvais pas respirer sans une toux atroce et il n'y avait aucun espoir en moi. -Franklin Martin, [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] survivant de la grippe"
 panum.1106.g: "Nous ne pouvons rien faire."
 panum.1107.t: "Rapports sur la grippe créant un sentiment anti-guerre"
 panum.1107.d: "Les rapports des nombreux décès résultant de la grippe [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] dans [SCOPE.sState('panum_disease_state').GetName] nuisent à un soutien populaire à nos efforts de guerre."
 panum.1107.f: "«C'est la folie que nous envoyions des hommes à la guerre pendant que cette peste délire nos maisons. L'État ne devrait-il pas prioriser la vie de ses citoyens à leur mort?"
 panum.1107.g: "Nous n'interférerons pas avec la presse libre."
 panum.1107.h: "Distribuez la propagande rassurante soutenue par la science médicale."
 panum.1107.i: "NOUVELLES DES CENSAUX DES TAUX DE MORTALITÉ ET INFECTIONS."
 panum.1108.t: "Mesures pandémiques contribuant à la pauvreté"
 panum.1108.d: "Avec beaucoup de personnes incapables de travailler en raison de nos mesures anti-pandemiques, les citoyens les plus pauvres en [SCOPE.sState('panum_disease_state').GetName] ont du mal à payer le loyer. Les travailleurs sans emploi sont confrontés à l'expulsion alors que les propriétaires refusent leurs plaidoyers de sursis."
 panum.1108.f: "«Ils m'ont dit que je ne pouvais pas travailler parce que l'usine est surpeuplée. Chaque usine est surpeuplée! Le propriétaire, qu'il brûle dans les incendies éternels, ne se soucie pas de notre sort et exige le loyer avant la fin de la semaine sur la douleur de l'expulsion. Ma famille sera sûrement forcée de notre maison."
 panum.1108.g: "Instituer un gel des loyers et une interdiction d'expulsion."
 panum.1108.h: "Augmenter temporairement la sécurité sociale."
 panum.1108.i: "Nous ne pouvons rien faire à ce sujet."
 panum.1109.t: "La ligue anti-masque"
 panum.1109.d: "[SCOPE.sCharacter('anti_mask_ig_leader').GetFullName] a formé la ligue anti-masque en opposition à nos mesures pandémiques. Ils contestent l'efficacité de nos politiques et exigent que nous les révoquons pour l'économie en difficulté."
 panum.1109.f: "«Portez un masque et sauvez votre vie! L'urgence qui confronte désormais notre pays dépasse les installations du service de santé. \ Nthose qui ne les porte pas est malade. L'homme, la femme ou l'enfant qui ne portera pas un masque maintenant est un slacker dangereux!"
 panum.1109.g: "Ignorez la ligue."
 panum.1109.h: "Abandonnez les mesures anti-anti-place."
 panum.1109.i: "Discréditer la ligue avec la science médicale."
 panum.1120.t: "La grippe [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] se termine"
 panum.1120.d: "Beaucoup n'avaient plus espéré que ce jour viendrait. Après plusieurs mois, comme lesquels [GetPlayer.GetName] n'a pas connu, la grippe [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] disparaît lentement de notre pays. Vraiment, c'était la mère de toutes les pandémies!"
 panum.1120.f: "'The ban was lifted to-day. No more .... masks. Everything open too. 'The Romance of Tarzan' is on at the Coliseum (movie theater) as it was about 6 weeks ago. I'd like to see it awfully. School opens this week—Thursday! Did you ever? As if they couldn't have waited till Monday!' -Violet Harris, [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] Flu survivor"
 panum.1120.g: "Nous espérons qu'elle ne reviendra jamais."
 je_panum_spanish_flu: "La grippe [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective]"
 je_panum_spanish_flu_reason: "La grippe [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] était une pandémie de grippe causée par un dérivé inhabituellement virulent du virus de la grippe qui est apparu au début du 20e siècle, affirmant entre 20 millions et 50 millions de vies, avec des estimations allant d'une population mondiale d'environ 1,8 milliard à 100 millions. Un total d'environ 500 millions de personnes auraient été infectés, ce qui entraîne un taux de mortalité de 5 à 10%, ce qui était significativement plus élevé que celui des maladies causées par d'autres agents pathogènes de la grippe. Il est considéré comme la «mère de toutes les pandémies». La grippe est devenue «[GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective]» lorsque le directeur de la santé [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] a annoncé qu'il n'avait aucun rapport d'une maladie comparable dans le reste du monde. À partir de ce moment, la presse internationale a de plus en plus utilisé le terme «Flux [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective]», qui a également été encouragée par certains gouvernements afin de couvrir la propagation réelle."
 panum_remove_spanish_flu_effect_tt: "Abroge toutes les politiques pandémiques et leurs effets."
 panum_recent_pandemic_policy_change_modifier: "Changement de politique pandémique récent"
 panum_spanish_flu_lockdown_modifier: "Verrouillage pandémique"
 panum_spanish_flu_measures_modifier: "Mesures pandémiques"
 panum_spanish_flu_fading_modifier: "Décoloration de la pandémie"
 panum.2600.t: "Un nouvel asile"
 panum.2600.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a célébré l'inauguration du nouvel asile mental avec un discours aujourd'hui."
 panum.2600.f: "De nombreuses personnalités éminentes étaient également présentes à l'inauguration, y compris les politiciens de l'opposition. Alors que le médecin a souligné les nouvelles méthodes et toute une série de symptômes clairs qui ont conduit à l'admission à la clinique, les adversaires du gouvernement sceptique soupçonnaient qu'une telle institution pourrait également être adaptée aux abus."
 panum.2600.g: "Enfin le bon endroit pour les politiciens, les journalistes, les acteurs ..."
 panum.2601.t: "Une admission psychiatrique urgente"
 panum.2601.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a préparé un rapport montrant que [SCOPE.sCharacter('chosen_character').GetFullName] nécessite des soins de santé mentale urgents. Malheureusement, [SCOPE.sCharacter('chosen_character').GetLastName] passera de nombreuses années dans l'asile mental. Peut-être ... très d'années."
 panum.2601.f: "`` Comme un jour, il peut arriver qu'une victime soit trouvée \ ni d'avoir une petite liste - j'ai une petite liste de délinquants de la société qui pourraient bien être souterrains \ nands qui ne nous manqueraient jamais - qui ne manqueraient jamais! Se serrant la main, serrez la main de vous comme ce que toutes les tiers qui en gâtent Tête-á-Têtes insistent sur le fait que ce n'est pas manqué - ils n'auraient rien manqué! '"
 panum.2601.g: "[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] les a sur la liste - et ils ne manquent pas!"
 panum.2601.tt: "[SCOPE.sCharacter('chosen_character').GetFullName] disparaît pour toujours dans les voies de l'asile mental ..."
 panum_physician_recent_asylum_conducted_modifier: "Entrée récente à l'asile mental"
 panum_send_leader_to_asylum_modifier: "Abus politique de la psychiatrie"
 panum_checkmark_loc: "@green_checkmark!"
 panum_cross_loc: "@red_cross!"
 panum.21.t: "Dispersion des malades"
 panum.21.d: "Le docteur Hasnebein est reconnu pour avoir développé un système moderne pour tri les malades et blessés en fonction de la gravité de leurs blessures, augmentant ainsi les chances de survie du patient."
 panum.21.f: "D'après ses expériences dans la guerre du Caucase et la guerre de Crimée, le chirurgien russe Nikolai Ivanovich Pirogov a développé des procédures de traitement chirurgical graduées et le principe de la `` dispersion des malades '' (traitement distribué des blessés et des malades) pour ordonner les zones de vestiaire surpeuplées et diviser les cas de sécheption sur cinq étapes). L'armée prussienne a adopté le principe russe en 1866, et il a ensuite été également appliqué aux autres services médicaux des armées alliées en Europe. Dans un développement ultérieur, de nombreuses avancées en médecine et en méthodes chirurgicales ont également été transférées à l'organisation du service médical militaire. Cependant, le principe de Pirogov est resté intact pendant la Première Guerre mondiale."
 panum.21.g: "Il y a donc une hiérarchie des malades?"
 panum.22.t: "Un traitement du paludisme"
 panum.22.d: "En extrayant efficacement la quinine de l'écorce d'arbre du cinchonona, Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a inventé une méthode de traitement qui aide contre le paludisme."
 panum.22.f: "Les jésuites avaient déjà un monopole de facto sur l'utilisation de Cinchona pour guérir le paludisme au début de la période moderne, même s'il y avait initialement des réserves dans certains pays protestants. Au début du XIXe siècle, peu de temps après la découverte de la morphine, la quinine a été trouvée comme l'ingrédient qui détermine l'efficacité de l'écorce de cinchonona et en a fait une pierre angulaire de la chimie des plantes émergentes. Il a été produit dans un état impur par Antoine François de Fourcroy en 1792 et isolé de l'écorce de Cinchona en 1820 par Pierre Joseph Pelletier et Joseph bienémé caventou par extraction avec de l'alcool. En 1823, la quinine a d'abord été obtenue à l'échelle industrielle de l'écorce des espèces de Cinchona par le pharmacien Friedrich Koch à Oppenheim. La quinine a par la suite stimulé la recherche sur la chimie des plantes."
 panum.22.g: "Un médicament précieux."
 panum.23.t: "Juste une catégorie différente de patients"
 panum.23.d: "Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] sent an urgent letter to the government today. In it [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] criticizes the treatment of mentally ill people and advocates treating them as patients who deserve better treatment - and not as antisocial people who need to be excluded from society."
 panum.23.f: "La première étape décisive vers le traitement psychologique des patients a eu lieu au XVIIIe siècle, lorsque des personnes malades mentales et des condamnés ordinaires n'étaient plus «conservés» dans les mêmes pièces, mais les institutions distinctes sont devenues à la mode. Celles-ci étaient encore bien en dessous de toute norme humaine. Une autre étape a été prise lorsque les lourdes chaînes de glace avec lesquelles les Lunatics avaient été enchaînées ont été abolies en faveur d'une plus grande liberté de mouvement. À partir du début du 19e siècle, il est devenu clair que ces personnes étaient également malades et avaient droit au traitement. En Angleterre, la Lunacy Act 1845 a été un point de repère important, car elle a explicitement changé le statut des personnes malades mentales en patients."
 panum.23.g: "La vie mentale de ces personnes compte également."
 panum.24.t: "Connaissances médicales et infirmières"
 panum.24.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] nous a rappelé que le personnel moins qualifié est parfois très utile en tant qu'infirmières pour les nombreuses victimes sur le champ de bataille et défend une utilisation accrue des femmes comme infirmières."
 panum.24.f: "Alors que dans d'autres pays européens, en particulier la France et l'Allemagne, les ordres catholiques se sont donné pour mission de former des infirmières, ce que cela s'est produit en Grande-Bretagne ou dans d'autres pays protestants. Très peu de monastères et de commandes ont survécu à la Réforme anglaise. Le public britannique est devenu douloureusement conscient de ce fait par le biais de publications de Florence Nightingale. La formation du personnel infirmier a ensuite été considérée comme une tâche nationale pour laquelle des dons ont été collectés. L'école des soins infirmiers de Nightingale de l'hôpital St Thomas de Londres, fondée par Nightingale, est devenue le noyau de cette professionnalisation. Avec sa peine «les médecins traitent des maladies, les infirmières traitent des gens», elle aurait jeté les bases d'une philosophie des soins infirmiers."
 panum.24.g: "Femmes à l'avant."
 je_panum_spanish_flu_research: "La grippe [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective]: recherche"
 je_panum_spanish_flu_research_reason: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a décidé d'enquêter plus en détail sur la mystérieuse pandémie. Combien de succès [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] aura est de la supposition de quiconque. Cependant, un médecin expérimenté devrait avoir de meilleures chances d'obtenir un résultat."
 je_panum_spanish_flu_research_complete_tt: "A [concept_panum_physician] peut acquérir de nouvelles connaissances de la pandémie: par exemple, le lieu d'origine, une description de la maladie ou même du pathogène."
