 panum.2111.t: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting]'s Anatomy"
 panum.2111.d: "Dans [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] Battle avec les autorités locales pour étendre les soins médicaux, le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a découvert à quel point la formation des jeunes chirurgiens allait mal. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] a donc écrit un travail standard pour freiner ce grief."
 panum.2111.f: "L'anatomie d'Henry Gray du corps humain, généralement juste appelé Grey's Anatomy, est un livre sur l'anatomie humaine. Il est considéré comme un classique du sujet, en particulier dans les pays anglophones. La première édition est apparue en 1858 en Grande-Bretagne et un an plus tard aux États-Unis sous le nom de Gray's Anatomy: Descriptive and Surgical."
 panum.2111.g: "Chaque étudiant devrait lire ce livre pendant sa formation."
 panum.2111.h: "L'application pratique est plus importante que l'enseignement."
 panum.2112.t: "Diagramme des causes de la mortalité"
 panum.2112.d: "Lors de la visite des hôpitaux militaires, le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a remarqué à quel point le matériel statistique a été utilisé pour éduquer les jeunes médecins sur le danger de maladies infectieuses sur le champ de bataille. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] a donc créé un grand nombre de diagrammes significatifs."
 panum.2112.f: "En raison d'une maladie qu'elle avait contractée pendant la guerre de Crimée, Florence Nightingale n'a pas pu voir par elle-même à quoi ressemblerait la situation dans une caserne, un hôpital ou une maison pauvre. Elle s'est donc concentrée sur la collecte de données, la préparation et l'analyse, puis en tirer des conclusions. Les questionnaires étaient un outil important pour son travail et elle a également utilisé des données existantes. Entre autres choses, cela a démontré de graves problèmes avec les soins de santé militaires. Dans son rapport au gouvernement britannique, Nightingale a trouvé des mots clairs pour cela. Si 11 civils sur 1 000 décédaient chaque année, mais 17, 19 et 20 sur 1 000 soldats de l'infanterie de ligne, de l'artillerie et des gardes stationnés en Angleterre sont décédés, ce serait tout aussi criminel que 1 100 hommes chaque année sur la plaine de Salisbury et en leur tournant là-bas. Florence Nightingale est considérée comme l'un des pionniers de la préparation des données graphiques de ces données."
 panum.2112.g: "Ces statistiques doivent être étudiées attentivement par les médecins sur le champ de bataille."
 panum.2112.h: "L'application pratique est plus importante que l'enseignement."
 panum.2113.t: "Omnis cellula e Cellula"
 panum.2113.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a élargi la théorie des cellules précédemment connue pour inclure le principe selon lequel chaque cellule provient d'une autre cellule, et que les maladies proviennent donc également de cellules malades. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] a décrit cette thèse en détail dans son travail sur la pathologie cellulaire, qui est utilisé comme manuel dans de nouvelles cliniques et hôpitaux."
 panum.2113.f: "La pathologie cellulaire est une théorie de la maladie selon laquelle les maladies sont basées sur les troubles des cellules du corps ou leurs fonctions. Il a été développé dans les années 1850 par Rudolf Virchow, qui a également inventé le terme «pathologie cellulaire» en 1855. Son travail du même nom est devenu une œuvre standard. En tant que concept de maladie basé sur la théorie des cellules, il a remplacé la pathologie humorale qui était auparavant en vigueur depuis les temps anciens et est donc responsable d'une révolution complète dans l'idée du développement de la maladie et de la maladie en général. Avec la pharmacologie expérimentale, la physiologie et la microbiologie, il constitue une base unifiée pour la médecine clinique et un fondement de médecine scientifiquement basée."
 panum.2113.g: "Les connaissances sur les cellules malades devraient être standard dans les universités."
 panum.2113.h: "Il s'agit d'un aperçu extrêmement important."
 panum.2114.t: "Criminal né"
 panum.2114.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a étudié de manière intensive la psyché des criminels et de la génétique humaine et a découvert que des éléments criminels peuvent être identifiés en fonction de leur physionomie. [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis|U] De nombreux contacts avec des patients malades, des fous et des responsables paresseux lors de ses tentatives de réforme du système médical ont inspiré [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] tout au long."
 panum.2114.f: "Inspiré par la théorie de l'évolution, le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a mené des études de centaines de personnes dans des pénitenciers et des asiles mentaux et a découvert qu'un type ataviste est répandu parmi les criminels. Certaines formes de criminalité peuvent donc être observées dans les types faciaux et les formes de crâne. Le criminel ne devient pas un criminel de son libre arbitre, mais en raison de sa prédisposition génétique, il a un problème qu'il «ne peut pas s'empêcher». Le criminel représente un type anthropologique séparé, les Homo Dequens. Il est un type évolutionniste, plus tôt et plus primitif, qui apparaît comme immoral et axé sur l'instinct."
 panum.2114.g: "Vous êtes donc criminel dès la naissance."
 panum.2121.t: "L'amour du Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] pour les crânes"
 panum.2121.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a poursuivi sa thèse de criminologie anthropologique et a donc mesuré des milliers de crânes à travers le pays. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] en maintient même à la maison."
 panum.2121.f: "«La criminologie est une science naturelle grave qui est imprégnée de philosophie depuis trop longtemps. Ma révolution est de l'équiper du même empirisme que toutes les sciences modernes de ce siècle. La biologie et les mathématiques sont des matières incorruptibles, et la psychiatrie et la criminologie peuvent en apprendre. Si vous mesurez et comparez chaque crâne - et que je l'ai fait avec des milliers de criminels, de fous et de personnes exécutées - vous pouvez collecter des données statistiques qui montrent le même résultat statistique encore et encore. De cela, des valeurs presque parfaites peuvent être dérivées pour déduire l'asymétrie du visage du criminel. Ces mesures précises sont beaucoup plus sûres que les hypothèses complètement sans fondement sur l'esprit humain: nous avons ici des nombres, des faits, dans de courtes études empiriques, il y a un bavardage sans fond."
 panum.2121.g: "Un ... beau passe-temps."
 panum.2122.t: "Déterminisme biologique"
 panum.2122.d: "Après d'autres mois de ses études, le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a approfondi ses thèses précédentes sur le «criminel né» et a publié d'autres résultats choquants."
 panum.2122.f: "«Le criminel est dégénéré. Alors que l'homme évolue, le criminel représente une régression, une forme d'apostasie humaine. Il est le «sauvage moderne», il nous permet de revenir sur Stone Age Man, moins subtil, moins sensible à la douleur et moins empathique. Le criminel ne remarque pas la souffrance de l'autre personne, tout comme il n'a qu'une capacité limitée de compassion. Étant donné que le criminel agit d'une disposition criminelle, on peut supposer que cette disposition criminelle est héritée. On pourrait donc supposer que si les gens ne commettent pas leurs actes de leur propre libre arbitre, mais plutôt par détermination biologique, cela devrait être un facteur atténuant dans la punition. Mais l'inverse est le cas, car le criminel ne peut être impressionné par une peine dissuasif, il n'est ni réintégrable ni prévisible. L'accent est mis sur la protection de la société. Il est donc préférable de penser à l'emprisonnement à vie ou à la peine de mort. Nous ne pouvons pas permettre à ces criminels dangereux de nuire aux innocents. '\ N \ nfrom' The Criminal Man 'par [ROOT.Var('panum_physician_var').GetCharacter.GetFullName]"
 panum.2122.g: "Avons-nous un autre choix que de l'accepter comme la théorie gouvernante?"
 panum.2123.t: "Un sujet criminel dangereux"
 panum.2123.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a soigneusement étudié la physionomie de [SCOPE.sCharacter('panum_victim_scope').GetFullName] et en particulier la forme du crâne [SCOPE.sCharacter('panum_victim_scope').GetHerHis] et est arrivé à la conclusion que [SCOPE.sCharacter('panum_victim_scope').GetSheHe] est une personne très dangereuse avec l'énergie criminelle qui devrait être retirée de tous les services immédiatement - pour protéger la société!"
 panum.2123.f: "«Les voleurs ont généralement des visages et des mains très mobiles; Ses yeux sont petits, agités, souvent pliants; sourcils pliés et affrontés; Le nez est tordu ou émoussé, la barbe est clairsemée, les cheveux sont rarement épais, le front est presque toujours petit et en recul, l'oreille sort souvent comme une poignée ... \ n \ n les meurtriers ont un regard vitreux, glacé et fixe; Leurs yeux sont parfois injectés de sang. Le nez est grand, souvent le nez d'un aigle ou plutôt de faucon; Les mâchoires sont solides, les oreilles longues, les joues larges, les cheveux bouclés, pleins et sombres, la barbe souvent clairsemée; Les lèvres sont minces, les dents canines sont grandes ... En général, dans les criminels de la naissance, les oreilles sont en forme de poignée, les cheveux sont pleins, la barbe est clairsemée, les sinus frontaux sont cambrés, la mâchoire est énorme, le menton est carré ou sortant, les joues sont larges. -Ces sont Lombroso"
 panum.2123.g: "Cette personne a en fait un visage criminel."
 panum.2123.h: "Le médecin va trop loin avec les accusations [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]!"
 panum.2124.t: "Un autre amoureux du crâne!"
 panum.2124.d: "Aujourd'hui, le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a présenté un universitaire en herbe qui aime les crânes presque autant que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe]. Cependant, le docteur [SCOPE.sCharacter('andersson_new_anthropologist_scope').GetLastName] s'intéresse davantage aux crânes des morts."
 panum.2124.f: "«[SCOPE.sCharacter('andersson_new_anthropologist_scope').GetFullName] est un excellent scientifique qui comprend l'importance d'examiner les crânes afin de tirer des conclusions sur la personne à qui appartient le crâne. Malheureusement, [SCOPE.sCharacter('andersson_new_anthropologist_scope').GetSheHe] ne traite que les crânes de personnes décédées pendant un temps incommensurable. Incroyable! Vous ne pouvez pas être sûr s'ils étaient vraiment des criminels. Comment est-ce censé aider?"
 panum.2124.g: "Ceci est une ... surprise inattendue."
 panum.4003.t: "La fin de la variole"
 panum.4003.d: "Contre toute attente, notre campagne contre la variole a réussi au-delà de toute mesure - la maladie a maintenant été éradiquée."
 panum.4003.f: "Pour beaucoup, c'est une journée qui commence comme tout autre, ignorant la magnifique matinée qu'il est vraiment. Pour ceux qui connaissent, c'est le point culminant des vies de travail, d'un rêve à peine imaginable qui se concrétise enfin. Beaucoup ne pensaient pas que cela pouvait être fait au cours de leur vie, que ce serait un travail légendaire pour la fin du XXe siècle, ou même pour le vingt premier, et pourtant, ici, maintenant, cela se fait l'année de [TimeKeeper.GetCurrentDate.Format('y')]. Le dernier cas confirmé s'est terminé par une seule nouvelle personne infectée, confinant cette maladie à l'histoire. Pour la première fois dans l'histoire, la menace de cette maladie ne traîne pas une seule tête. \ N \ nand cela signifie qu'une chose: la variole n'est plus. \ N \ nmany pensait que ce serait une impossibilité ... mais même ceux qui ne savent pas ne peuvent s'empêcher d'entendre les célébrations dans les universités et les hôpitaux, voir les toasts des médecins et des scientifiques, et savent que c'est un bon jour."
 panum.4003.g: "L'homme a fait son propre miracle ce jour-là."
 panum.2211.t: "Recherche sur les maladies"
 panum.2211.d: "Au cours des examens médicaux [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis], le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] s'est rendu compte que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] voulait rechercher en détail une maladie sur laquelle très peu a été publiée dans notre pays, mais qui est devenue une maladie répandue dans certaines régions."
 panum.2211.f: "En plus des principales maladies épidémiques, il existe de nombreuses maladies quotidiennes et répandues, ainsi que des fléaux d'humanité connus depuis longtemps dont les causes et les méthodes de guérison sont encore inconnues. Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] se demande s'il ne devrait pas se concentrer sur une maladie très spécifique."
 panum.2211.g: "Examinez la maladie de la laine."
 panum.2211.h: "Examinez la maladie de Goitre."
 panum.2211.i: "Examinez la maladie des calculs rénaux."
 panum.2211.j: "Examinez Pellagra."
 panum.2211.k: "Examinez les rachiphéles."
 panum.2211.l: "Examiner la syphilis."
 panum.2211.m: "Examiner le tétanos"
 panum.2211.z: "Le médecin doit utiliser le temps pour se concentrer davantage sur la formation."
 panum_disease_investigation_project_progress_bar: "Enquête sur les maladies"
 panum_disease_investigation_project_progress_bar_desc: "Progrès de l'enquête sur la maladie: #v [JournalEntry.GetCurrentBarProgress(ScriptedProgressBar.Self)|1%]#! ([JournalEntry.GetCurrentBarValue(ScriptedProgressBar.Self)|0] / 60)"
 panum_disease_investigation_project_progress_physician_positive_character_trait_tt: "#default_text [concept_panum_physician] has the #V $persistent$#!, #V $meticulous$#! or #V $innovative$#! [concept_character_trait].#!"
 panum_disease_investigation_progress_bar_at_full_tt: "La barre d'enquête sur la maladie a atteint le #variable 100% #!"
 je_panum_disease_investigation: "Examen de la maladie"
 je_panum_disease_investigation_reason: "Sometimes it can happen that a physician, during his usual medical research, throws himself into the investigation of a very specific disease. This is not an epidemic disease, but rather everyday illnesses, childhood illnesses or widespread illnesses. Examples of this include rickets, kidney stones or syphilis.\n\nUnlike in other cases, the physician carries out this research on the side, which means he is not busy and is available for further activities. If a doctor dies, the project is not lost, but is put on hold until another doctor takes over."
 panum_woolsorters_disease_modifier: "Maladie de laine"
 panum_litholapaxy_modifier: "Litholapaxy"
 panum_salvarsan_modifier: "Salvarsan"
 panum_tetanus_antitoxin_modifier: "Antitoxine tétanique"
 goods_output_meat_mult: "Building @meat! Débit de viande"
 goods_output_meat_mult_desc: "Un bonus ou une pénalité au montant de @meat! Viande produite par les bâtiments"
 panum.2221.t: "La maladie de la laine"
 panum.2221.d: "Lors de l'examen de la soi-disant «maladie de la laine», le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a découvert qu'il s'agissait en fait d'anthrax."
 panum.2221.f: "L'anthrax chez l'homme s'est produit principalement comme une maladie professionnelle chez les travailleurs de la tannerie et chez les personnes qui ont traité la fourrure, les poils et les cheveux, mais aussi chez les travailleurs du port et des transports qui ont manipulé ces matériaux, ainsi qu'à Skinners. Le pic de l'occurrence était une période de crise dans l'industrie du cuir, lorsqu'un nombre croissant de peaux d'animaux bon marché a été importée de régions avec peu ou pas de contrôle vétérinaire de l'abattage. Pendant longtemps, l'origine mystérieuse de la maladie était inconnue. On croyait que c'était un cas d'empoisonnement et les gens l'appelaient la «maladie de Woolsorter». Avec l'avancement de la microbiologie et la mise en œuvre de la théorie des germes, les liens réels entre les maladies animales économiquement extrêmement dommageables et la maladie mortelle des humains ont été établies et ont conduit à de nouvelles réglementations et réglementations qui étaient destinées à assurer la protection des travailleurs."
 panum.2221.g: "Adopter des mesures de protection strictes."
 panum.2222.t: "La maladie de goitre"
 panum.2222.d: "Après avoir examiné plusieurs personnes dans des vallées de montagne reculées avec des goitres gigantesques, le Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a expérimenté un traitement utilisant de l'iode. Après plusieurs tentatives, la thérapie a fonctionné."
 panum.2222.f: "Dans les régions alpines de Styrie, du Tyrol et de la Suisse, mais aussi dans d'autres régions de montagne ou les Midlands anglais, les goitres étaient une maladie quotidienne. Il y avait un soupçon précoce que la formation de goitre avait quelque chose à voir avec l'eau sur un certain territoire. Paracelsus soupçonnait l'absence de certains minéraux et de l'eau potable recommandée contenant du plomb. Dans la Chine ancienne, les médecins ont recommandé de manger des algues et des éponges. Avec une meilleure compréhension de la fonction de la glande thyroïde et de l'importance de l'iode, les premiers efforts de guérison ont finalement commencé. À partir de 1918, le docteur suisse Otto Bayard a introduit le sel iodisé par l'ajout correctement dosé de potasse d'iode au sel de table dans les communautés de son domaine de pratique du Nikolaital et a montré que cela éliminait les troubles du développement, l'agrandissement du gland thyroïdien, et la formation de goiter et de nodule sans aucun effet indésirable et des dommages peuvent être traités avec succès."
 panum.2222.g: "C'est donc une maladie liée au régime!"
 panum.2223.t: "Néphrolithiase"
 panum.2223.d: "Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a développé une procédure pour fonctionner avec succès sur des patients atteints de calculs rénaux."
 panum.2223.f: "Les calculs rénaux sont un phénomène connu tout au long de l'histoire humaine; Même Napoléon en a souffert. Bien que plusieurs procédures pour éliminer les calculs rénaux se soient développées depuis la Renaissance, l'opération est restée dangereuse. Le chirurgien américain Henry Jacob Bigelow a réalisé une percée: il a présenté la technique médicale de Litholapaxy. En 1878, il a publié «la lithotrie par une seule opération», dans laquelle il a décrit sa technique pour «l'écrasement et le retrait d'une pierre de la vessie en une seule séance». Avant cela, les chirurgiens écraseraient une pierre de la vessie et ne passaient ensuite que quelques minutes à retirer les pièces. Avec cette nouvelle méthode, le taux de mortalité est passé d'environ 24% à 2,4%."
 panum.2223.g: "Je deviens imprégné d'y penser."
 panum.2224.t: "Pellagra"
 panum.2224.d: "Comme le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] l'a découvert après des années de recherche, Pellagra est une maladie causée par un manque d'acide nicotinique."
 panum.2224.f: "Après que Christophe Columbus ait découvert l'Amérique, le maïs a été l'une des premières plantes à être apportées en Europe, où elle s'est propagée rapidement en raison de ses rendements élevés. Bientôt, dans les zones à forte consommation de maïs, une étrange maladie appelée «peau rugueuse» après le symptôme clé, Pellagra, est apparu. Le lien entre le pellagra et la consommation élevée de maïs (par exemple sous forme de polenta) a d'abord été suspecté au XVIIIe siècle. Les explications à l'époque comprenaient du maïs moisi ou empoisonné, une infection ou une hérédité. Joseph Goldberger et ses collègues ont ensuite prouvé au début du 20e siècle que le soi-disant pellagra chez l'homme et la maladie de la langue noire chez les chiens résulte d'une malnutrition, que Conrad Elvehjem a pu attribuer à une carence en acide nicotinique. La découverte que Pellagra pouvait être traitée avec la levure de Brewer a entraîné une réduction soudaine du nombre de détenus dans les zones concernées dans les zones touchées."
 panum.2224.g: "Le simple résultat d'une alimentation déséquilibrée?"
 panum.2225.t: "Rachitisme"
 panum.2225.d: "Après de nombreuses années à étudier les patients atteints de rachitisme, le médecin [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] arrive à la conclusion que la maladie osseuse a à voir avec une carence en nutriments - et recommande l'huile de foie de morue et la lumière du soleil comme prévention."
 panum.2225.f: "Bien qu'il y ait eu de nombreuses descriptions scientifiques de rachitisme au fil du temps, ses causes sont restées inconnues depuis longtemps. Une variété de causes de ricotte a été proposée par les principaux pathologistes au XIXe siècle, notamment la syphilis congénitale et l'infection par la tuberculose paternelle. Une véritable compréhension moderne de la base physiopathologique des rachistes n'a commencé qu'au début du XXe siècle. En 1919, Edward Mellanby a découvert et publié sur la «4e vitamine», déclarant que «le rachitisme est une maladie de carence qui se développe en raison de l'absence de certains facteurs ou facteurs alimentaires accessoires. Il semble donc probable que la cause du rachitisme est une diminution de l'apport d'un facteur anti-rachitique, qui est soit un facteur de graisse A, soit il y a une distribution similaire »."
 panum.2225.g: "Parlons-nous d'une vitamine D?"
 panum.2226.t: "Syphilis"
 panum.2226.d: "La syphilis, l'ancien fléau de l'humanité, semble bientôt être mis sur la chaîne par la science - Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] prétend avoir inventé un remède miracle en utilisant les méthodes médicales les plus modernes."
 panum.2226.f: "Jusqu'au début du 20e siècle, la syphilis a été principalement traitée avec du mercure toxique, qui a été appliquée à de grandes zones du corps du patient, qui, entre autres effets indésirables, entraînait généralement une perte complète de poils du corps et de toutes les dents et le déclin rapide de toutes les fonctions corporelles initiées. Le mercure avait déjà été utilisé plusieurs siècles plus tôt comme agent thérapeutique plus ou moins efficace contre la lèpre et diverses autres maladies de la peau. Des expériences avec des préparations d'arsenic telles que l'atoxyle et l'arsacétine ainsi que la préparation 418 (arsénophénylglycine), qui n'a réussi que dans les expériences animales et ont été développées et testées par Paul Uhlenhuth et Paul Ehrlich en 1907/1908, ont échoué, principalement en raison des effets secondaires graves. En 1909, Sahachiro Hata et Paul Ehrlich ont développé l'arsphénamine du composé d'arsenic organique (salvarsan), qui a été le premier à tenter un traitement chimiothérapeutique ciblé de la syphilis."
 panum.2226.g: "Salvavw ... quoi?"
 panum.2227.t: "Tétanos"
 panum.2227.d: "Après plusieurs tests, le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a annoncé aujourd'hui qu'il avait trouvé une antitoxine contre le tétanos."
 panum.2227.f: "Le tétanos était bien connu des civilisations anciennes, qui ont reconnu la relation entre les blessures et les spasmes musculaires mortels. En 1884, Arthur Nicolaier a isolé la toxine de la strychnine du tétanus des bactéries du sol anaérobie libres. Il a détecté l'agent pathogène tétanos dans le sol en inoculant le sol du jardin sur des animaux d'essai. L'étiologie de la maladie a été encore élucidée en 1884 par Antonio Carle et Giorgio Rattone, deux pathologistes de l'Université de Turin, qui ont démontré la transmissibilité du tétanos pour la première fois. En 1891, C. tetani a été isolé d'une victime humaine de Kitasato Shibasaburō, qui a montré plus tard que l'organisme pouvait produire une maladie lorsqu'il est injecté dans les animaux, et que la toxine pouvait être neutralisée par des anticorps spécifiques. En 1890, Kitasato et Emil Von Behring ont finalement réussi à obtenir un tétanus antitoxine spécifique, ce qui pourrait permettre l'immunité du tétanos chez les animaux. Avec cette production d'antitoxine, Behring a jeté les bases de la «thérapie sérique» (ainsi qu'avec la découverte de l'antitoxine diphtérienne, également en 1890)."
 panum.2227.g: "Qui aurait pensé que le sol du jardin pourrait être si dangereux?"
 country_panum_kidney_stone_treatment_success_chance_mult: "Kidney Stone Treatment Success Chance"
 country_panum_syphilis_treatment_success_chance_mult: "Syphilis Treatment Success Chance"
 panum.922.t: "Croupe"
 panum.922.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a constaté que de nombreux médecins ne peuvent généralement pas faire la différence entre le croup plutôt inoffensif et la diphtérie dangereux et ont mis en évidence les différences dans un article."
 panum.922.f: "Lorsque le docteur né en prussien Abraham Jacobi a noté lors d'une conférence médicale en 1860 qu'il y avait environ 122 cas de diphtérie à New York, ses collègues étaient étonnés: ils n'avaient diagnostiqué aucune diphtérie pendant la même période. Le manque de connaissances dans le domaine des maladies des enfants a été l'une des raisons de la fondation des premiers hôpitaux pour enfants aux États-Unis, dans lesquels la diphtérie a joué un rôle particulier. Jacobi est considéré comme le père de la pédiatrie américaine."
 panum.923.t: "Larynx coriace"
 panum.923.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a identifié l'une des principales caractéristiques de la diphtérie comme la pseudomembrane coriace qui s'étend au larynx et provoque la suffocation. Cette caractéristique est typique de la maladie pour la distinguer des autres."
 panum.923.f: "«Nous pouvons établir l'identification de l'angine maligne de quatre manières: \ n \ nby Recherches sur l'anatomie morbide de la maladie, soixante autopsies étant effectuées au cours de quelques mois; \ n \ nby observations cliniques, par laquelle nous avons prouvé que la poitrine, si elle est laissée à elle-même, presque invariable pour attaquer le larynx et ainsi qu'il a prouvé l'identité dans la composition de la fausse membrane dans le pharynx avec celle de la trachée; \ n \ nby l'étude des œuvres des écrivains antérieurs."
 panum.940.t: "L'antidote pour la diphtérie"
 panum.940.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a annoncé publiquement aujourd'hui que les expériences avec l'antitoxine diphtérienne [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] produites ont été un succès complet."
 panum.940.f: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a expliqué à la foule étonnée que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] avait utilisé une toxine diphtérienne affaiblie pour infecter les chevaux et à son tour obtenir un sérum de leur sang qui était très efficace pour lutter contre la diphtérie. Bien qu'il s'agisse d'une grande avancée, [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a également souligné que cela ne devrait pas être confondu avec un vaccin car il n'activait pas le système immunitaire du patient. \"Il y a encore beaucoup de travail à faire ici\", a déclaré [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]. Mais tous les parents qui craignaient pour la vie de leurs enfants haletants la nuit pourront dormir beaucoup plus profondément à partir de maintenant."
 panum.940.g: "Nous avons coupé l'air de la diphtérie avant qu'il ne nous fasse de même."
 panum.941.t: "Perchlorate de fer"
 panum.941.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a trouvé dans les anciens dossiers que le perchlorate de fer a été recommandé comme remède contre la diphtérie. En fait, il semble avoir un effet."
 panum.941.f: "«Étonnamment, cette recette de type alchimique a eu un effet sur certains patients. Apparemment, c'est l'un des rares remèdes pour la diphtérie. '\ N \ na Broit note du docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] sur la diphtérie"
 panum.941.g: "Mais cela nous amène-t-il vraiment n'importe où?"
 panum.942.t: "Intubation"
 panum.942.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a tenté de donner un air du patient par intubation. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] a obtenu un petit succès contre la diphtérie."
 panum.942.f: "«Le processus est compliqué et critique, mais tout soupçon de lutte contre la diphtérie m'est utile pour le moment."
 panum.942.g: "Mais cela ne peut sûrement pas être une solution à long terme?"
 panum.943.t: "Trachéotomie"
 panum.943.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a eu des expériences assez mitigées avec la trachéotomie, bien que tous les collègues médicaux [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] utilisent cette procédure chirurgicale pour traiter la diphtérie."
 panum.943.f: "«Je ne peux pas pour la vie de moi comprendre pourquoi tous ces experts en diphtérie - ou du moins ceux qui prétendent être - ont pu signaler tout succès. Trousseau prétend avoir sauvé la vie de près de la moitié de ses patients atteints de diphtérie, mais d'après mon expérience professionnelle, c'est moins d'un sur dix. '\ N \ na note courte du médecin [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] sur la diphtérie"
 panum.943.g: "Et maintenant?"
 panum.944.t: "Mercure"
 panum.944.d: "Malheureusement, un traitement au mercure de la diphtérie s'est terminé exactement comme le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] attendu - avec empoisonnement."
 panum.944.f: "«Aurais-je dû mieux savoir? Oui! Mais la littérature spécialisée ne laisse aucun doute que Mercure a aidé contre la diphtérie pendant des siècles. Prétendument! À partir de maintenant, je trouve d'autres remèdes qui sont censés aider: le nitrate d'argent, par exemple. Ou acide chlorhydrique! Quelqu'un a-t-il vraiment traité avec cette maladie? '\ N \ na Remarque courte du docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] sur la diphtérie"
 panum.944.g: "Tout cela semble encore plus mortel que la diphtérie."
 panum.945.t: "Saignement"
 panum.945.d: "Les experts recommandent une bonne saignée pour la diphtérie. Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a essayé ce [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself] dans deux cas - et a constaté que la méthode était plutôt contre-productive."
 panum.945.f: "«Affaiblir encore un patient affaibli serait comme décomposer un autre pilier sur un pont avec un pilier tremblant. Ce que chaque ingénieur comprend est considéré comme hérétique en médecine. '\ N \ na note courte du docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] sur la diphtérie"
 panum.945.g: "N'y a-t-il aucune amélioration?"
 panum.951.t: "Le hochet dans la nuit"
 panum.951.d: ""
 panum.951.f: "Le soleil s'était retiré derrière les maisons. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a marché dans l'ombre. Cela avait été un autre jour d'échecs. Trois autres enfants morts. Comme toujours, la même cause de décès. Même si le pic de l'épidémie passait. Il restait un risque résiduel que la mort des enfants parcoure les rues et plongeait sa faux dans leurs mâchoires. La noyade et la suffocation étaient parmi les formes de décès les plus cruelles. \ N \ n[ROOT.Var('panum_physician_var').GetCharacter.GetLastName] s'étaient spécialisées dans les maladies épidémiques pendant des années. Mais la diphtérie était différente. Ce n'était pas seulement une maladie infantile comme la rougeole ou la scarlatine, ce qui pourrait avoir un léger résultat. La diphtérie a fait haleter les enfants pour l'air. La diphtérie a étranglé l'enfant dans la nuit comme un ange vengeant. \ N \ n[ROOT.Var('panum_physician_var').GetCharacter.GetLastName] avait déclaré la guerre à la diphtérie. Mais cela semblait une guerre sans espoir. Chaque étape [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] a franchie, la maladie a suivi - et inversé à nouveau [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim]. Toutes les méthodes qui avaient été transmises se sont avérées inutiles. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] a lutté avec la mort. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] a lutté avec le diable. \ N \ nand ils ont fait ressentir [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] désespoir et impuissance. Cette nuit-là, quand [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] est rentré à la maison. En tant que halètement, a salué [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] dans l'obscurité. Parce qu'il y avait un patient qui attendait [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] n'avait pas sur la liste. La diphtérie s'était propagée. Jusqu'à la rue [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]. Jusqu'à la maison [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]. \ N \ nup au lit du fils [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]."
 panum.951.g: "Les expériences du médecin sont-elles ...?"
 panum.952.t: "Traiter la diphtérie"
 panum.952.d: ""
 panum.952.f: "Une avaler désespérée. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] s'était habitué à ce son. Habituellement, vous pouviez à peine l'entendre lorsque d'autres personnes avalaient. Mais c'était la même agonie [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] avait entendu si souvent auparavant. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] avait mémorisé le son. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] pourrait mettre un tissu froid sur la tête du fils [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] pourrait lui parler de façon apaisante. \ N \ nbut [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] ne pouvait rien faire pour lui. Pas plus que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] n'avait fait pour les autres enfants. Pour les nombreux autres, des dizaines d'enfants morts. \ N \ nif Il y avait quelqu'un qui savait à quel point ces drogues diphtériennes valaient peu, c'était [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim]. Mercure qui a empoisonné le corps. Nitrate d'argent et perchlorate de fer avec des effets variables. La trachéotomie, qui était considérée comme l'art la plus élevé de la chirurgie - et a presque toujours échoué. \ N \ n[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] l'avait fait si souvent. Et pourtant c'était différent. Il ne s'agissait plus de la maladie. Il s'agissait de [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] maintenant. Cette épidémie détestait se venger du [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim]. Parce que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] avait voulu y résister. Parce que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] voulait l'éradiquer, comme il l'a fait aux petits enfants. Il se vengeait. Il voulait enlever la chose la plus précieuse que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] avait. Pas [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] Honor en tant que médecin, pas [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] Hope for A Cure. \ N \ nthe Rattling in the Night Returns. Les liquides brillent dans de petits flacons. Un scalpel brille au clair de lune."
 panum.952.g: "Traitez le garçon avec du perchlorate de fer."
 panum.952.h: "Effectuer une trachéotomie."
 panum.952.i: "Examinez un échantillon de tissu au microscope."
 panum.953.t: "L'ange étranglant"
 panum.953.d: ""
 panum.953.f: "Plus de cliquetis. Le son qui avait tourmenté [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim], qui avait accompagné [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] et enseigné [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] à la peur - disparu. Mais il n'y a pas eu de triomphe. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] avait méprisé le son. \ N \ nbut maintenant [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] souhaitait le bruit terrible. \ N \ nsilence. Silence mort, comme le [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] l'avait connu depuis des mois. C'était ce moment où on pouvait entendre le silence. Un silence de cimetière étrange qui s'est répandu et a aspiré chaque force vitale. Le silence pouvait être entendu et ressenti. Il a rempli le corps de vide. Ce n'était pas une contradiction. C'était logique. C'était empirique. \ N \ nbut logique et empirisme a échoué [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] cette nuit-là. [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis|U] Les doigts serraient la main d'un enfant froid. Pale comme le clair de lune qui brillait par les fenêtres. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] avait contesté la diphtérie. \ N \ nand diphtérie a piétiné [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] dans le terrain et torturé [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] avec plaisir parce que l'arrogance [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim]1 avait aveuglé [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim]."
 panum.953.g: "Le médecin aura du mal à y faire face."
 panum.954.t: "Pas larynx, mais le cœur et les yeux"
 panum.954.d: ""
 panum.954.f: "La lune avait coulé. Le soleil s'était levé à nouveau. Des jours étaient passés dans l'alternance des ténèbres nocturnes et des stores dessinés. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] attendait au chevet. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] n'avait pas guéri des patients jusque-là. [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] Le travail ne s'était pas concentré sur les gens, mais sur les maladies. Il était facile d'administrer du nitrate d'argent lors de l'expérimentation; Il était facile d'injecter un sérum lorsqu'il n'était qu'un simple test; Et il était facile d'effectuer une opération sur la trachée lorsqu'il ne traite pas un être humain, mais simplement la peau, simplement musclée, simplement chair, simplement os. \ n \ n[ROOT.Var('panum_physician_var').GetCharacter.GetLastName] avait déjà traité les maladies. La diphtérie avait transformé les personnes en patients, les histoires en dossiers médicaux et la souffrance en symptômes. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] voulait libérer les gens de l'essoufflement. Pourtant, c'est [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] qui avait besoin de guérison. Pas dans le larynx. Mais à [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] les yeux et le cœur. \ N \ n[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] pouvait revoir. Et un sourire apprivoisé rayonnait au [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim]."
 panum.954.g: "[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] l'a fait!"
 panum.955.t: "Le sacrifice"
 panum.955.d: ""
 panum.955.f: "Une âme perdue. Un monde gagné. Microbes rugants au microscope. Des microbes comme ceux qui avaient été trouvés dans de nombreux autres cas. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] l'avait exclu jusqu'à présent. Mais c'était l'explication la plus raisonnable. [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis|U] Son n'avait eu aucun contact avec les patients atteints de diphtérie. \ N \ nonly [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] avait. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself] avait amené les germes dans cette maison. Sur les jours. Peut-être pendant des semaines. Sans s'en rendre compte. Des autres dizaines d'enfants malades. De l'autre douzaine d'enfants morts. \ N \ nwho étaient maintenant une victime plus riche. \ N \ n[ROOT.Var('panum_physician_var').GetCharacter.GetLastName] avait un échantillon. Et [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] avait des cobayes et des lapins qu'aucun enfant ne s'occupait plus; qu'aucun enfant n'a joué avec. Ce serait un sacrifice. Tout comme [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] avait fait des sacrifices. S'ils tombaient malades, c'était la preuve. Il s'agissait d'éradiquer la diphtérie. C'était un objectif supérieur à [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself]. \ N \ nand plus grand que tout autre objectif."
 panum.955.g: "Un sacrifice qui ne restera pas impunis."
 panum.956.t: "Changement radical de théorème"
 panum.956.d: ""
 panum.956.f: "Les dernières semaines ont déclenché une césure importante pour [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] ne l'appellerait certainement pas un revirement copernicien. Mais rarement un événement a fait remettre en question [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] les méthodes [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself] et [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]. L'impuissance face à la diphtérie a un effet durable. Et [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] sait qu'il reviendra. \ N \ Notly Une solution réussie à long terme peut empêcher cet épisode de récurrer. \ N \ nglasses sont donc empilées dans la chirurgie du médecin. Les livres de médecine et les traités sont empilés. Et médicaments. [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis|U] La main atteint de manière maniquement tout ce qui est censé être connu sur la diphtérie. \ N \ nevery supposée cure. Chaque manuel présumé. Chaque traité supposé. \ N \ n[ROOT.Var('panum_physician_var').GetCharacter.GetLastName] efface le tableau. Jette tout dessus dans la poubelle. Ils avaient tous tort. Bretonneau. Guersant. Trousseau. Bochut. Daviot! \ N \ ndeciphinering La cause de la diphtérie signifiait enfin guérir la diphtérie. Et après que tout [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] avait lu et essayé jusqu'à présent, une seule possibilité est restée ouverte. La diphtérie était contagieuse. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] avait infecté [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] son propre fils après contact avec d'autres patients. Il y avait un agent. Peu importe ce que les experts ont dit. \ N \ n there devait être un pathogène."
 panum.956.g: "Tous les efforts sont désormais axés sur la recherche du pathogène."
 panum.956.h: "L'objectif de la recherche devrait déjà être sur un éventuel vaccin."
 panum.961.t: "La toxine diphtérie"
 panum.961.d: ""
 panum.961.f: "Un poison était la clé. Poison du type sécrété par l'agent pathogène de la diphtérie. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] avait entendu dire qu'un biologiste l'expérimentait. La toxine était trop forte pour être arrêtée. Si vous avez infecté des animaux, ils sont morts. \ N \ nbut [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] savait que c'était des informations qui secoueraient le monde scientifique. On pourrait en lire dans les revues spécialisées. Et il y a eu des imitateurs dans le monde qui isolaient également la toxine de diphtérie dans l'espoir d'induire un effet immunologique chez un animal sans qu'il meure de la même manière que les millions d'enfants dont les cadavres expliquent en hommage sur l'autel de la diphtérie. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] a dû trouver la toxine. Et mener [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] propres expériences."
 panum.961.g: "C'est peut-être l'étape cruciale ..."
 panum.961.h: "Ce processus est déjà connu dans la production de toxine tétanique ..."
 panum.961.i: "La bonne quantité d'iode pourrait aider à cela."
 panum.962.t: "La diphtérie antitoxine"
 panum.962.d: ""
 panum.962.f: "Une percée. Une percée décisive qui a compensé tous les sacrifices, toutes les souffrances, tous les morts [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] devaient accompagner, y compris les parents et les parents en deuil. Les adieux en larmes. Le désespoir et le désespoir. \ N \ nit était si simple. Et si efficace. La toxine devait être affaiblie. Enfin, une solution d'iode aiderait. Les chevaux étaient les sujets de test parfaits. Le reste était facile. L'animal a développé des pouvoirs immunitaires contre la toxine - et était donc le fournisseur d'un sérum. Une antitoxine contre la diphtérie. \ N \ nwhen [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a tenu le flacon dans sa main ce jour-là, [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] a ressenti un sentiment de satisfaction. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] avait effectué les premiers tests. Tous les enfants n'ont pas répondu. Mais plus que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] avait osé rêver. Maintenant, cette arme contre l'ennemi invisible a dû être produite en masse - et distribuée. Dans chaque clinique. En chirurgie de chaque médecin. La guerre de N[ROOT.Var('panum_physician_var').GetCharacter.GetLastName] contre la diphtérie n'était pas terminée. Ça commençait."
 panum.962.g: "Commandez autant de ce sérum que possible!"
 panum.963.t: "L'ombre"
 panum.963.d: ""
 panum.963.f: "La diphtérie doit être éradiquée! Il doit disparaître! \ N \ nit peut avoir été une pensée maniaque. Mais c'était une pensée qui a gardé le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] en vie. [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis|U] Guerre contre la diphtérie portait des fruits. Tant de vies sauvées. Tant d'enfants qui auraient subi une agonie et sont morts dans un autre monde! \ N \ n le bien des nombreux l'emportaient sur le bien de l'individu. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] aurait donné sa propre vie si [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] aurait pu détruire la diphtérie. Mais le destin n'était pas gentil avec [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim]. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] n'avait pas vendu [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself] au diable - mais [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] fils. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] avait décidé cela. Pour lui. \ N \ nsice cette nuit-là, un voile était descendu sur [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim]. Une colère contre la maladie. Mais [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] l'avait effacé. Avec des pensées rationnelles qui ont noyé le ressentiment envers [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself] dans le travail et la vengeance. Mais il y a quelques jours, cette colère a disparu. Paradoxalement, plus il y a d'enfants [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] enregistrés, plus le [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] est plus clair. \ N \ n[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] Saw [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself]. Et [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] détestait ce que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] Saw. \ N \ n[ROOT.Var('panum_physician_var').GetCharacter.GetHerHis|U] L'arrogance avait trompé [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim]. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] pensait que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] sauvait des vies humaines. Pourtant, [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] en avait décidé un. Comme un bourreau. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] n'avait même pas touché le scalpel. Ou au moins un petit verre de nitrate d'argent. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] avait placé plus de valeur sur l'échantillon et le pathogène - que sur le patient [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]. Un être humain. \ N \ n[ROOT.Var('panum_physician_var').GetCharacter.GetHerHis|U] propre chair et sang. \ N \ nit dégoûté [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] depuis. Et dans [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] appartement solitaire, [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis], seuls les compagnons étaient des certificats, des prix et des photos avec des politiciens et des universitaires importants. Sinon, juste un lit vide. Et une pensée qui est devenue plus forte. [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis|U] tête lancée. C'est devenu un mal de tête angoissant: je dois être éradiqué. Je dois disparaître. \ N \ n'my fils. Mon cher fils ... '"
 panum.963.g: "Docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ... Docteur!"
 panum.640.t: "«Observations faites pendant l'épidémie de rougeole»"
 panum.640.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a présenté [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] recommandations pour le traitement de la rougeole, qui sont destinés à mieux comprendre les causes et la transmission de la maladie afin d'atténuer et de prévenir les épidémies à l'avenir."
 panum.640.f: "«La contagion s'est propagée très rapidement dans le Thorhavn de peu peuplé, et de là a été transporté par des bateaux vers les autres îles. Les voyages vers et depuis les lieux commerciaux, la fréquentation de l'église et de l'école et les clés de justice répandaient l'infection aux autres villages. La contagion a été introduite à Suderø de Thorhavn par un individu identifié, et à enquête, il a été possible de démontrer presque partout comment et par qui l'infection avait été amenée dans chaque village. Que l'infection puisse être transmise par des choses telles que les vêtements, la lessive et les lettres semble plutôt douteuse, et je n'ai vu ni entendu parler de tels transmission pendant l'épidémie. -Peter Panum, observations faites pendant l'épidémie de rougeole sur les îles Féroé en 1846"
 panum.640.g: "Un nouveau Peter Panum!"
 panum.52.m: "L'épidémie écarlate de la fièvre dans [SCOPE.sCountry('panum_scarlet_country_scope').GetName]."
 panum.52.q: "En fait, c'est un mauvais plan ..."
 panum_no_expedition_effect_tt: "Votre [concept_panum_physician] est libre de réaliser à nouveau d'autres activités."
 panum.51.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetFullName], l'un des principaux esprits de la Société médicale de [GetPlayer.GetName], a accepté de se rendre dans un État touché par l'épidémie et d'y rechercher la maladie. Le médecin espère que cela pourrait entraîner une description complète de la maladie."
 panum.53.d: "L'épidémie rampante a conduit [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] à l'étudier de plus près pour déterminer les causes et développer de nouvelles méthodes pour traiter la terrible maladie."
 rule_panum_spanish_flu_rule: "#tooltip:[GetRawTextTooltipTag('mr_morgenroete_tt')] @mr_morgenroete_icon! #! grippe espagnole"
 setting_panum_dynamic_spanish_flu_rule: "#V dynamique espagnol Flu#!"
 setting_panum_dynamic_spanish_flu_rule_desc: "Dans le premier tiers du 20e siècle, une grippe mondiale commencera dans un pays industrialisé. La pandémie porte le nom du lieu d'origine."
 setting_panum_historical_spanish_flu_rule: "#V Historical Spanish Flu#!"
