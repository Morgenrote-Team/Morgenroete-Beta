 panum.2100.j: "Médecine militaire."
 panum_cholera_condition: "Choléra"
 panum_cholera_condition_desc: "Le choléra est une maladie dangereuse de l'intestin grêle. Il est considéré comme une épidémie déterminante du 19e siècle avec des millions de morts dans le monde."
 panum_tuberculosis_condition: "Tuberculose"
 panum_tuberculosis_condition_desc: "La tuberculose est considérée, avec le choléra, l'une des causes les plus courantes de décès à l'époque victorienne. Également connu sous le nom de consommation, il affecte principalement les poumons"
 panum_smallpox_condition: "Variole"
 panum_smallpox_condition_desc: "Connu pour ses pustules, qui défigurent le visage et le corps, la variole est depuis longtemps l'une des maladies les plus mortelles de l'histoire."
 panum_typhus_condition: "Typhus"
 panum_typhus_condition_desc: "Typhus a terrorisé des soldats au cours des siècles, en particulier dans les guerres napoléoniennes lorsqu'il a tué des milliers de membres du personnel de l'armée. Il a fait rage encore et encore après les catastrophes naturelles"
 panum_yellow_fever_condition: "Fièvre jaune"
 panum_yellow_fever_condition_desc: "La fièvre jaune affecte principalement les zones tropicales de l'Amérique du Sud et de l'Afrique. Dans les Caraïbes, la maladie a fait plus de vies parmi les soldats stationnés que n'importe quelle guerre."
 panum_measles_condition: "Rougeole"
 panum_measles_condition_desc: "La rougeole est une maladie très contagieuse connue pour ses parcelles de peau rouge typiques. Il peut avoir des conséquences catastrophiques, en particulier dans les populations dépourvues d'immunité antérieure."
 panum_scarlet_condition: "Scarlatine"
 panum_scarlet_condition_desc: "La fièvre écarlate est une maladie répandue qui a été l'une des causes les plus courantes de la mort chez les enfants jusqu'au début du 20e siècle."
 panum_plague_condition: "Peste"
 panum_plague_condition_desc: "La peste bubonique est assimilée à la «mort noire» du Moyen Âge, qui est l'une des pires catastrophes de l'histoire. Le nom vient des bosses enflées et douloureuses."
 panum_diphteria_condition: "Diphtérie"
 panum_diphteria_condition_desc: "La diphtérie est une maladie dangereuse qui peut entraîner des complications potentiellement mortelles et des conséquences à long terme."
 panum_polio_condition: "Polio"
 panum_polio_condition_desc: "La poliomyélite est une maladie qui affecte principalement les enfants, entraînant souvent la mort ou des complications physiques à vie."
