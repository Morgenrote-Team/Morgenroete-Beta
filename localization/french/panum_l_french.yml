 setting_panum_dynamic_red_cross_rule_desc: "La Croix-Rouge ne peut être fondée que via l'interface graphique du médecin. En conséquence, il n'apparaît généralement qu'après la date historique."
 panum_is_red_cross_member_tt: "Membre du [concept_panum_red_cross]"
 panum.3031.t: "Le premier conventin devient une convention contraignante"
 panum.3031.d: "L'écrasante majorité des membres de la Croix-Rouge ont accepté la première convention internationale concernant les soins des blessés de la guerre. Il est maintenant contraignant pour tous les membres."
 panum.3031.f: "Les conventions internationales sont généralement des déclarations d'intention non contraignantes. Cependant, si suffisamment de membres de la Croix-Rouge le signent, au fil du temps, il deviendra un droit international valide, ce à quoi tous les signataires devraient se conformer - et les autres membres le signeront également. Cela se produit lorsque 65% de tous les membres et la majorité des grands pouvoirs conviennent de cette convention - alors tous les autres membres sont alors obligés de le respecter. Cette convention ne peut alors plus être abolie comme d'habitude. Afin d'éviter les conventions contraignantes, un retrait complet de la Croix-Rouge est nécessaire - avec toutes les conséquences."
 panum.3031.g: "Un droit international à l'échelle mondiale est créé."
 panum.3032.t: "La deuxième convention devient une convention de liaison"
 panum.3032.d: "L'écrasante majorité des membres de la Croix-Rouge ont accepté la deuxième convention internationale sur le désarmement et la guerre navale. Il est maintenant contraignant pour tous les membres."
 panum.3033.t: "La troisième convention devient une convention contraignante"
 panum.3034.t: "La convention internationale devient contraignante"
 panum.3034.d: "L'écrasante majorité des membres de la Croix-Rouge ont accepté une convention. Il est maintenant contraignant pour tous les membres."
 panum.3034.g: "Nous vérifierons si c'est dans notre intérêt."
