 panum.112.t: "Une lueur d'espoir"
 panum.112.d: "Dans les hôpitaux du choléra de [SCOPE.sState('panum_disease_state').GetName], un médecin a particulièrement distingué [SCOPE.sCharacter('panum_new_physician_scope').GetHerselfHimself] dans l'épidémie actuelle. La façon dont [SCOPE.sCharacter('panum_new_physician_scope').GetFullName] fonctionne a déjà acquis une importance nationale. Ce médecin pourrait potentiellement jouer un rôle important pour lutter contre l'épidémie dans [GetPlayer.GetName]."
 panum.209.t: "Dre tuberculose"
 panum.209.d: "Le chef du Sanatorium de la tuberculose, le Dr [SCOPE.sCharacter('panum_new_physician_scope').GetLastName], a offert des services [SCOPE.sCharacter('panum_new_physician_scope').GetHerHis] au milieu de l'épidémie déchaînée."
 panum.112.f: "«Dieu m'a parlé et m'a appelé à son service. Quelle forme ce service était de prendre la voix n'a pas dit. -Florence Nightingale"
 panum.112.g: "Donnez immédiatement à [SCOPE.sCharacter('panum_new_physician_scope').GetHerHim] une position officielle!"
 panum.112.h: "Le médecin devrait former les générations futures pour lutter contre la prochaine épidémie."
 panum.122.t: "Incubation du choléra"
 panum.122.d: "Après plusieurs observations et entretiens, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a découvert qu'un certain temps passe avant que les symptômes typiques du choléra n'apparaissent chez un patient."
 panum.122.f: "Le médecin estime que cette période dure environ une demi-journée à cinq jours, la moyenne étant de trois jours. [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] a eu plusieurs discussions avec les victimes de la maladie et de leurs proches. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] a donc pu reconstruire les événements en fonction de plusieurs rapports de témoins oculaires. Même si la cause reste obscure, les conclusions peuvent ensuite être tirées de ces observations quant à ce qui s'est produit exactement le jour 1."
 panum.122.g: "Bien observé."
 panum.124.g: "Observé avec précision."
 panum.123.t: "Symptômes du choléra"
 panum.123.d: "Aujourd'hui, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a envoyé à la faculté médicale une liste complète des symptômes du choléra."
 panum.123.f: "Comme on le sait déjà, mais jusqu'à présent, seulement traité de manière rudimentaire, le choléra est une maladie de l'intestin grêle humain. Les conséquences sont une diarrhée extrême avec un «tabouret d'eau de riz de couleur bleue typique et des vomissements graves. Le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] aurait une certaine séquence sadique parce que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] a envoyé une description complète de ces symptômes et d'autres symptômes extrêmement peu recommandables à temps pour le dîner académique."
 panum.124.t: "Choléra asiatique"
 panum.124.d: "Dans un rapport très acclamé, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a élaboré les différences entre le choléra et d'autres maladies de type choléra, qui est considérée comme une étape importante dans la description future des maladies."
 panum.124.f: "Le nom du choléra, dérivé du mot grec pour la bile, a initialement fait référence à toutes les formes possibles de diarrhée ou de problèmes intestinaux («flux biliaire»). Bien que Jakob de Bondt ait déjà décrit une maladie du choléra spécifiquement indienne en 1642, le choléra est resté purement un terme collectif. Ce n'est qu'avec l'émergence des principales pandémies du choléra du 19e siècle que ce nouveau type de choléra spécifique, qui s'est avéré être la maladie la plus dévastatrice du siècle, a également été définie avec un nom propre pour le différencier clairement: le choléra asiatique."
 panum.222.t: "Incubation de la tuberculose"
 panum.222.d: "Dans ses recherches sur la tuberculose, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a remarqué certaines bizarreries liées à la maladie. Apparemment, cela peut prendre des semaines avant qu'une personne malade ne présente réellement des symptômes typiques."
 panum.222.f: "Que la théorie du miasme ou la théorie des germes: la tuberculose pose toujours un mystère. S'il s'agit d'une maladie infectieuse, il peut apparemment prendre des semaines pour que les symptômes éclatent: le médecin assume entre deux et même douze semaines! De plus, tous ceux qui vivent avec quelqu'un qui sont malades ne semble pas être infecté directement, comme le [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] l'a découvert dans de nombreuses enquêtes auprès des patients et des proches. Soit les universitaires ont raison avec leur théorie selon laquelle la tuberculose n'est pas une maladie infectieuse et d'autres facteurs sont responsables, soit le risque d'infection est inférieur à ce que la première pensée."
 panum.223.t: "Symptômes de la tuberculose"
 panum.223.d: "Après que le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ait étudié intensivement les symptômes de la tuberculose, [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] est arrivé à une conclusion qui a surpris même certains collègues académiques: la tuberculose est une maladie beaucoup plus compliquée avec une grande variété de symptômes qui vont bien au-delà des problèmes pulmonaires."
 panum.223.f: "Bien que l'attaque contre les poumons et leur destruction douloureuse et lente soit l'une des caractéristiques les plus connues de la tuberculose, la toux n'est qu'un des nombreux symptômes. La tuberculose pulmonaire n'est qu'un type de tuberculose, qui peut également affecter d'autres organes. La fatigue, la fièvre, la perte d'appétit, les sueurs nocturnes ou le sang crachant étaient des symptômes connues auparavant. Le fait que la tuberculose attaque non seulement le corps à l'extérieur des poumons, mais que deux types différents de tuberculose peuvent se produire en même temps, a considérablement changé la vision du monde de certains membres de la faculté médicale."
 panum.224.t: "Tuberculose et scrofule"
 panum.224.d: "Le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a traité intensivement les différentes formes de maladies possibles de la tuberculose et, malgré les nombreuses similitudes avec d'autres symptômes de maladie, a élaboré les différences spécifiques entre la tuberculose et le scrofule, mais en même temps, a également souligné les connexions."
 panum.224.f: "Des descriptions de la tuberculose existent depuis des siècles, mais il n'a eu des effets comparables et dévastateurs que le 19e siècle en raison de moins d'urbanisation. Il était encore connu sous d'autres noms jusqu'au 19e siècle - le terme «consommation» était toujours utilisé dans le monde anglophone jusqu'au 20e siècle. René Lanence est considéré comme l'un des pionniers de la recherche de tuberculose qui a inventé le stéthoscope pour l'examen pulmonaire. Johann Lukas Schönlein a inventé le terme tuberculose en 1832 et l'a associé à une image clinique spécifique. Une conclusion importante de ces années a été que le scrofula et la tuberculose étaient deux maladies différentes, mais ils pouvaient à peine être différenciés en raison du grand nombre de symptômes de tuberculose."
 panum.322.t: "Incubation et symptômes de la variole"
 panum.322.d: "Dans un résumé récent, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a noté que les symptômes initiaux de la variole ne sont pas différents de ceux de la grippe avant que les pustules infâmes n'apparaissent. On peut supposer qu'une à deux semaines passent entre l'infection et les symptômes."
 panum.322.f: "«Ceux qui sont facilement restaurés à la santé de la peste me semblent avoir été séché et purgé par rapport à tout le corps, car les vomissements se sont produits dans certains d'entre eux et l'estomac a été perturbé en tout. Et, de la même manière, dans ceux qui étaient déjà purgés qui allaient être sauvés, les pustules sombres apparaissent clairement sur tout le corps, dans la plupart des ulcères, en tout sec. (...) À l'extérieur, le corps n'était pas chaud au toucher, ni la pâleur; La peau était plutôt rouge, livide et a éclaté en petites cloques et ulcères. -Galen"
 panum.323.t: "Pépôle ou variole?"
 panum.323.d: "Au cours de l'observation [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] des patients atteints de variole, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a pu présenter un rapport partiel selon lequel la varicelle est une maladie indépendante et inoffensive. Cela a été une théorie très controversée jusqu'à présent."
 panum.323.f: "«La varicelle éclate sur beaucoup sans aucune maladie ni signe précédent: dans d'autres, ils sont précédés d'un petit degré de frisson, de lassitude, de toux, de sommeil cassé, de douleurs errantes, de perte d'appétit et de fiénation pendant trois jours. La plupart d'entre eux sont de la taille commune de la variole mais certains sont moins. Je ne les ai jamais vus confluents ni très nombreux. Le plus grand nombre que j'ai jamais observé était environ douze au visage et deux cents sur le reste du corps. Le deuxième ou au plus éloigné du troisième jour du début de l'éruption, car beaucoup de poches qui ne sont pas brisées semblent être arrivées à leur pleine maturité, et ceux qui sont les plus complets de cette liqueur jaune ressemblent beaucoup à ce que la variole authentique est le cinquième ou le sixième jour, en particulier là où il se trouve être un plus grand espace que l'ordre ordinaire par le sérum extravasé. -William Heberden"
 panum.324.t: "La différence entre la rougeole et la variole"
 panum.324.d: "Le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a comparé les symptômes des personnes souffrant de variole, des personnes souffrant de rougeole et de la varicelle avec des soins extrêmes et a pu les classer très précisément."
 panum.324.f: "«L'éruption de la variole est précédée d'une fièvre continue, de la douleur dans le dos, des démangeaisons dans le nez et des cauchemars pendant le sommeil. Ce sont les symptômes les plus aigus de son approche ainsi qu'une douleur notable dans le dos accompagnée de fièvre et d'une démangeaison ressentie par le patient sur tout son corps. Un gonflement du visage apparaît, qui va et vient, et on remarque une couleur inflammatoire globale visible comme une forte rougeur sur les deux joues et autour des deux yeux. On éprouve une lourdeur de tout le corps et une grande agitation, qui s'exprime comme beaucoup d'étirements et de bâillements. Il y a une douleur dans la gorge et la poitrine et on a du mal à respirer et à tousser. Les symptômes supplémentaires sont les suivants: sécheresse de la respiration, crachats épais, enrouement de la voix, douleur et lourdeur de la tête, agitation, nausées et anxiété. Notez la différence: l'agitation, les nausées et l'anxiété se produisent plus fréquemment avec la rougeole qu'avec la variole. D'un autre côté, la douleur à l'arrière est plus apparente avec la variole qu'avec la rougeole. -Rhazes"
 panum.422.t: "Typhus Symptômes et incubation"
 panum.422.d: "Dans un premier rapport intérimaire, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a énuméré les symptômes du typhus, ainsi qu'une estimation initiale du moment où ils apparaissent pour la première fois au cours de la maladie."
 panum.422.f: "«Fièvre, frissons, maux de tête, toux, éruption cutanée, vomissements - tous ce sont des signes de typhus. Cependant, tous ces symptômes peuvent également être trouvés dans des maladies similaires. Les nausées et la confusion en revanche sont typiques du typhus classique. Le cours caractéristique de la fièvre est une augmentation de deux à trois jours de température, suivi d'une fièvre continue d'environ dix jours et de déférences subséquentes sur plusieurs jours. Selon mes calculs, il faut environ dix à quatorze jours entre l'infection et les premiers symptômes."
 panum.423.t: "La fièvre du camp"
 panum.423.d: "Après que le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ait comparé des rapports historiques d'épidémies dans l'armée avec les symptômes actuels des personnes souffrant de typhus, il arrive à la conclusion que d'assimilation du typhus et de la «fièvre du camp» est peu utile."
 panum.423.f: "«C'est certainement une fièvre de camp - mais est-ce la fièvre du camp? Le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a posé des questions comme celles-ci qui ont fait penser aux membres de la faculté médicale. Historiquement connu sous le nom de «fièvre du camp», il a longtemps été associé aux épidémies dans les principales armées ou casernes, en particulier comme la maladie qui a infligé des victimes massives à l'armée napoléonienne. Mais toutes les maladies de l'armée connue sous le nom de «fièvre du camp» ne peuvent pas être assimilées au typhus. La fièvre et la fièvre de la tranchée rechute sont d'autres maladies connues pour avoir affecté le personnel militaire dans les espaces confinés. La maladie qui a particulièrement fait rage pendant la guerre civile américaine, en revanche, est souvent appelée typhus, mais était en fait de la fièvre typhoïde."
 panum.424.t: "Typhus: Deux maladies en une?"
 panum.424.d: "Tout en examinant les patients atteints de typhus, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a découvert qu'un certain nombre d'hypothèses étaient fondamentalement erronées. Si les médecins précédents avaient diagnostiqué un «changement morbide» dans les intestins, [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] ne pouvait pas détecter tout cela chez ceux qui sont morts de typhus. Le médecin suppose plutôt que la maladie intestinale est une maladie qui doit être distinguée du typhus, que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] appelle la «fièvre typhoïde»."
 panum.424.f: "Jusqu'au milieu du XIXe siècle, les médecins ne se sont pas différenciés entre le typhus et la fièvre typhoïde. Ils étaient simplement considérés comme des manifestations de la même maladie avec divers degrés de symptômes. En 1836, le médecin américain William Gerhard a observé que chez certains victimes de typhus, les intestins n'étaient pas affectés par la maladie, même s'il avait été l'un des symptômes couramment diagnostiqués jusqu'à ce point. De plus, des observations similaires l'ont amené à croire que le typhus n'était pas une maladie des intestins, mais plutôt attaqué d'autres organes: la confusion mentale et la douleur musculaire étaient beaucoup plus courantes que les problèmes du tube digestif. L'identification des siècles du typhus et de la fièvre typhoïde a non seulement conduit à une similitude de noms, mais a également conduit au fait que dans certaines langues, la fièvre typhoïde est appelée typhus, par exemple en allemand."
 panum.522.t: "Deux cours de fièvre jaune"
 panum.522.d: "Dans [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] Observation étroite de la fièvre jaune, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a fait la découverte que la maladie peut progresser de deux manières."
 panum.522.f: "Le médecin a constaté que dans de nombreux cas connus, la fièvre jaune a une légère manifestation qui passe après quelques jours. On estime que cinq patients sur six éprouvent cette forme légère de fièvre jaune. L'autre cours de la maladie est dangereux et peut être mortel. Les patients souffrent d'une seconde évolution toxique. Il se caractérise par une fièvre récurrente, accompagnée d'une ictère due aux lésions hépatiques, ainsi qu'aux douleurs abdominales. Les saignements dans la bouche, le nez, les yeux et le tractus gastro-intestinal provoquent un vomi contenant du sang, d'où l'un des noms en espagnol pour la fièvre jaune, Vómito Negro («Vomit noir»). Il peut également y avoir une insuffisance rénale, des hoquets et du délire. On estime que 20 à 50% des victimes de fièvre jaune qui atteignent cette deuxième étape de la maladie sont décédées - l'académique conclut dans le rapport présenté."
 panum.523.t: "Saisons de fièvre jaune"
 panum.523.d: "Le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a constaté que les épidémies de fièvre jaune suivent un certain modèle temporel."
 panum.523.f: "Les enregistrements historiques et les données actuelles suggèrent que la fièvre jaune se produit principalement en été. Le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] n'a pas encore été en mesure d'expliquer pourquoi la maladie ne se produit pas chaque année comme la grippe, mais disparaît plutôt complètement sur de longues périodes. Il est frappant que la fièvre jaune ait été particulièrement répandue pendant les années de pluie."
 panum.524.t: "Une maladie locale?"
 panum.524.d: "Lorsque vous décrivez la maladie de la fièvre jaune, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] souligne le fait que la fièvre jaune est une maladie limitée à certains territoires et se propage principalement dans les zones marécageuses et tropicales, à quelques exceptions près."
 panum.524.f: "Le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a examiné plusieurs rapports et dossiers d'autres épidémies de fièvre jaune. Ce qui est frappant, c'est que ceux-ci ont eu lieu dans une zone très limitée. Les régions tropicales et les marécages en Afrique et en Amérique sont principalement affectés. Bien que dans certains cas, l'épidémie se déplace plus au nord - par exemple à Philadelphie aux États-Unis et à Barcelone en Espagne - le médecin est convaincu que certaines zones climatiques ont quelque chose à voir avec la survenue de la maladie. Le fait qu'il y ait eu des épidémies isolées de la maladie dans les ports anglais ne dérange pas [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] - parce que la maladie ne s'est pas propagée beaucoup plus loin que les environs de la ville portuaire."
 notification_panum_description_progress_notification_name: "Progrès de la description de la maladie"
 notification_panum_description_progress_notification_desc: "Notre [concept_panum_physician] Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a acquis de nouvelles idées en observant la maladie épidémique et a obtenu un indice supplémentaire."
 panum_antitoxins_tech: "Antitoxines"
 panum_antitoxins_tech_desc: "Une antitoxine est un anticorps avec la capacité de neutraliser une toxine spécifique. Les antitoxines à la diphtérie et les toxines tétanos ont été produites par Emil Adolf Von Behring et ses collègues à partir de 1890. Ils sont considérés comme l'un des grands jalons des antécédents médicaux."
