 panum.440.t: "Le typhus – un problème social" #NT!
 panum.440.d: "Dans son traité [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_treatment_title')], le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a particulièrement insisté sur le fait que le typhus est une maladie évitable lorsque les forces politiques et sociales travaillent ensemble." #NT!
 panum.440.f: "« L'exiguïté, les vêtements infestés de poux et les appartements ou chambres de soldats délabrés m'ont laissé une image mémorable. La fièvre typhoïde était partout. Partout où les gens vivaient dans les mêmes conditions d'exiguïté mais dans les conditions d'hygiène d'une chambre d'hôpital, on ne pouvait pas observer de propagation. La médecine ne doit pas être considérée comme un soin de l'individu, mais plutôt comme une question de santé publique, ce qui implique également la résolution de problèmes sociaux. Il ne fait aucun doute qu'une propagation épidémique du typhus telle que nous l'avons vue récemment ne s'est produite que dans des conditions de vie telles que la pauvreté et le manque d'éducation. Si l'on met de côté ces circonstances, je suis sûr que nous verrons des améliorations significatives dans la lutte contre la maladie. »\n\nLe Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] dans son mémorandum au gouvernement" #NT!
 panum.440.g: "Le typhus perd de sa terreur." #NT!
  
 panum.441.t: "Une autopsie" #NT!
 panum.441.d: "Le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a entrepris plusieurs autopsies sur des décès dus au typhus en [SCOPE.sState('panum_disease_state').GetCityHubName] et a fait des découvertes cruciales." #NT!
 panum.441.f: "« On sait depuis longtemps que la fièvre typhoïde et le typhus sont deux maladies différentes. Mais certains chercheurs pensent encore qu'une mauvaise alimentation, une infection du tractus intestinal ou au moins une carence nutritionnelle pourraient être liées à l'apparition du typhus. Les raisons alimentaires sont toujours considérées comme une cause possible de nombreuses maladies. Lors de mes examens, je n'ai rien trouvé qui suggère de quelque façon que ce soit un trouble digestif. La fièvre typhoïde n'a rien à voir avec l'alimentation ou la digestion. »\n\nExtrait d'un rapport d'autopsie du Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] dans [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.441.g: "Mais qu'est-ce que cela pourrait être ?" #NT!
 panum.442.t: "Non lavé et emmêlé" #NT!
 panum.442.d: "Dans sa recherche de la cause de l’épidémie de typhus, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] s’est rendu compte que les conclusions précédentes devaient être remises en question." #NT!
 panum.442.f: "« J'ai entendu dire à plusieurs reprises dans ma carrière que le manque d'hygiène est un moyen pour les miasmes ou les germes - quoi que les gens puissent croire - de s'infiltrer dans les vêtements et de contribuer à la maladie. Je pense que c'est discutable dans le détail, mais pas dans l'affirmation de base. Les soldats, les condamnés, les pauvres, les criminels et les prostituées comptent parmi les victimes classiques de l'épidémie de typhus. Mais les personnes mal lavées sont-elles pauvres parce qu'elles veulent être mal lavées, ou ne sont-elles pas plutôt mal lavées parce qu'elles sont pauvres ? Je ne veux pas croire que la tuberculose est une maladie d'artiste, pas plus que le typhus ne touche les criminels uniquement parce qu'ils sont moralement mauvais. Il y a de nombreux criminels riches qui n'ont pas été touchés par le typhus dans cette épidémie. Il y a des prêtres irréprochables dans les bidonvilles qui se sacrifient pour les autres et qui succombent eux-mêmes à la maladie. Alors, quel est le lien le plus convaincant entre les victimes ? »\n\nExtrait du journal du Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] dans [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.442.g: "[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] essaie-t-il de prétendre que le typhus peut également toucher les gens honnêtes ?" #NT!
 panum.443.t: "Chaleur et froid" #NT!
 panum.443.d: "Après plusieurs visites au domicile de familles atteintes du typhus, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] arrive à la conclusion qu'il ne s'agit pas, comme on le prétend souvent, d'une maladie saisonnière." #NT!
 panum.443.f: "« Il existe des maladies saisonnières et cela semble être également le cas du typhus. Des rapports antérieurs indiquent une augmentation des saisons froides, qui peuvent également inclure un printemps ou un automne humides. Je pense qu'il est prouvé que le froid et la chaleur ont une influence sur la maladie. On peut se demander si cela dépend des saisons. Il peut faire tout aussi chaud dans une pièce bien remplie et chauffée. La maladie n'est pas apparue partout à la même époque de l'année. Si tel était le cas, non seulement certains quartiers d'une ville, mais toute la ville devrait être touchée de la même manière. Mais elle est toujours apparue là où les gens étaient entassés. J'ai pu le constater lors de plusieurs visites à domicile. »\n\nExtrait du journal du Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] dans [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.443.g: "Cela contredit les études précédentes." #NT!
 panum.444.t: "Sueur et souffle" #NT!
 panum.444.d: "Le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] est désormais complètement convaincu que le typhus doit être une maladie contagieuse, même si toutes les circonstances n’ont pas encore été élucidées." #NT!
 panum.444.f: "« Au début de mes recherches, j'étais fermement convaincu que le typhus n'était pas une maladie contagieuse. Mais à mesure que ma famille a grandi avec le typhus, j'ai fini par croire fermement à la contagion de la maladie et j'insiste sur le caractère contaminant de la sueur. J'ai vu un infirmier qui, alors qu'il rasait un patient mourant, inhalait l'haleine du patient. L'infirmier a décrit l'haleine du patient comme ayant « un goût nauséabond » et est presque immédiatement tombé malade. De même, un assistant qui soutenait un autre patient décédé peu après a senti la sueur âcre du patient sur sa peau et l'assistant a immédiatement ressenti les symptômes du typhus. Il est clair que la proximité avec des patients atteints du typhus fait courir le risque de contracter la maladie. »\n\nExtrait du journal du Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] dans [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.444.g: "Cela peut être utile, mais est-ce que cela se transmet vraiment d’une personne à une autre ?" #NT!
 panum.445.t: "Est-ce la faim ?" #NT!
 panum.445.d: "Dans une vive discussion avec un collègue du [SCOPE.sState('panum_disease_state').GetCityHubName], le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a réfuté ses théories." #NT!
 panum.445.f: "« Est-ce un type particulier de typhus, le typhus de la faim ? »\n\n« Le typhus de la faim ? »\n\n« On peut observer que partout où le typhus sévit, la malnutrition prévaut. Par conséquent, la faim, ou plutôt la famine, est un facteur déclenchant du typhus. Les changements dans le sang y sont probablement aussi pour quelque chose. »\n\n« 1726, 1727 et 1728 furent des années de famine, mais il n'y eut pas de typhus. 1829 fut une année prospère, mais il y eut le typhus. Il est compréhensible qu'un corps affaibli soit plus susceptible de tomber malade, mais quelle en est la cause ? »" #NT!
 panum.445.g: "Le terme « fièvre de la faim » est donc incorrect." #NT!
 panum.446.t: "Ce n'est pas l'emplacement, mais la situation" #NT!
 panum.446.d: "Le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] croit que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] a découvert que ce qui compte n’est pas tant la manière dont vivent les personnes atteintes du typhus, mais l’endroit où elles vivent." #NT!
 panum.446.f: "« Lors de ma visite à [SCOPE.sState('panum_disease_state').GetCityHubName], j'ai découvert que la maladie ne touchait qu'une seule partie de la ville. La région est connue pour sa pauvreté et sa dépravation morale, ce qui a conforté certaines théories selon lesquelles le typhus est une maladie d'individus moralement inférieurs. Mais d'après ce que j'ai pu constater, c'est le quartier densément peuplé et la situation économique des personnes touchées qui sont en cause. À mon avis, la propagation de la maladie n'est pas une question de corruption morale, mais de proximité physique. »\n\nExtrait du journal du Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] dans [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.446.g: "Cela signifie au moins que la maladie peut théoriquement être surmontée..." #NT!
 panum.447.t: "Poux" #NT!
 panum.447.d: "Le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a avancé une théorie très controversée qui, bien que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] ne puisse pas la prouver, pourrait changer la compréhension de la maladie du typhus à l’avenir." #NT!
 panum.447.f: "« S'il y a une chose que j'ai remarquée au cours de mes nombreuses observations, c'est que presque tous les patients étaient infestés de poux. Que ce soit les soldats dans les casernes surpeuplées, les familles avec leurs innombrables enfants, les détenus dans leurs cellules délabrées. Je ne crois plus qu'il s'agisse d'une coïncidence. Bien sûr, je manque de preuves. Ces dernières années, plusieurs scientifiques ont pu prouver à maintes reprises que des maladies peuvent se transmettre entre les animaux et les humains. Si c'est différent dans cette situation, je serais heureux qu'on me prouve le contraire. Pour l'instant, je crois que le mystère du typhus ne peut être résolu sans examiner de plus près le rôle des poux. »\n\nExtrait du journal du Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] dans [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.447.g: "Comment quelque chose d’aussi petit peut-il causer autant de dévastation ?" #NT!
 panum.447.h: "Quelque chose d’aussi petit doit causer tant de dévastation." #NT!
 panum.448.t: "Un hôpital hygiénique" #NT!
 panum.448.d: "Lors d’une visite dans un hôpital exemplaire, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a pu convaincre [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself] que la transmission de la maladie n’est minimale que dans des conditions favorables." #NT!
 panum.448.f: "« Quand les malades ont commencé à être transportés dans les hôpitaux ici et là, on a craint que la situation ne s'aggrave en raison d'une éventuelle infection. On a supposé que de nouveaux foyers d'infection pourraient se former, d'où l'épidémie frapperait avec encore plus de violence. Rien de tout cela ne s'est produit, bien qu'un tel effet ait été observé dans de nombreux cas de fièvre. Comme je l'ai observé dans d'autres cas, les conditions d'hygiène plus favorables ont fait la différence. »\n\nExtrait du journal du Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] dans [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.448.g: "Ce n’est donc pas l’étroitesse en tant que telle qui compte, mais les conditions." #NT!
 panum.449.t: "Assistance en cas d'épidémie" #NT!
 panum.449.d: "En livrant de la nourriture, des couvertures et des médicaments à [SCOPE.sState('panum_disease_state').GetCityHubName], le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a pu garantir que l’épidémie diminuerait légèrement." #NT!
 panum.449.f: "« Cela peut paraître banal, mais grâce à une cargaison de marchandises destinée à soulager la misère des habitants, des épidémies ont été signalées la semaine dernière. Quelque chose de similaire avait déjà été observé dans d'autres régions où le typhus avait sévi par le passé. Les secouristes ont distribué du riz et des pois, construit des hôpitaux improvisés sous des tentes et apporté également des médicaments et des vêtements neufs. Ce cas le prouve avant tout : le typhus n'est pas une maladie héréditaire. Il dépend certainement de facteurs environnementaux. »\n\nUne lettre du Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] au Dr Dementive" #NT!
 panum.449.g: "Parfois, la seule façon d’aborder une solution est d’utiliser des critères d’exclusion." #NT!
 panum.450.t: "Des vêtements contaminés ?" #NT!
 panum.450.d: "Le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a remarqué un cas étrange dans un hangar à fièvre qui correspond à des expériences similaires." #NT!
 panum.450.f: "« Est-ce la preuve d'une prétendue contagion ? Il ne fait aucun doute que ce cas correspond à des expériences très similaires que j'ai vécues dans d'autres endroits. Parfois il s'agit de manteaux, parfois de vestes ou de chemises. Un malade du typhus avait un frère qui lui avait pris son manteau. Quelques jours plus tard, il était également malade. On dit que les enfants qui jouaient avec le manteau ont été contaminés de la même manière. Dans les classes les plus pauvres, il est assez courant de transmettre des vêtements de la famille, surtout pendant les saisons froides. Que les vêtements soient contaminés ou non, le changement de vêtements semble être l'une des mesures judicieuses pour éviter le typhus. »\n\nExtrait du journal du Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] dans [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.450.g: "Les hommes devraient-ils changer de chaussettes et de sous-vêtements ? Impossible !" #NT!
  
 panum.451.t: "Typhus Climat" #NT!
 panum.451.d: "Après qu'un médecin étranger ait émis une nouvelle hypothèse sur les origines du typhus, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] doute de ses propres recherches." #NT!
 panum.451.f: "« Un « collègue » m'a envoyé il y a deux jours son ouvrage sur les causes du typhus. Je suis assez étonné, pour ne pas dire démotivé. Il a formulé de manière très précise et rigoureuse la relation entre le temps et les conditions météorologiques et le développement de la maladie. Ainsi, le miasme se forme lorsqu'il y a de l'humidité dans la terre et monte ensuite dans l'air. Cela expliquerait l'apparition fréquente du typhus pendant les mois froids et humides. S'agit-il donc de miasmes après tout ? »\n\nExtrait du journal de [ROOT.Var('panum_physician_var').GetCharacter.GetFullName]" #NT!
 panum.451.g: "Mais est-ce vraiment la bonne solution ?" #NT!
 panum.452.t: "Putréfaction" #NT!
 panum.452.d: "Certaines des conclusions que le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a récemment résumées ne correspondent tout simplement pas à la théorie précédente du [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]." #NT!
 panum.452.f: "« Jusqu'à présent, je n'avais pas beaucoup réfléchi à la théorie selon laquelle les processus de putréfaction jouent un rôle crucial dans la propagation des maladies. Mais partout où je vais, partout où le typhus fait rage, je trouve des animaux, je trouve des exhalaisons, je trouve des matières humaines, animales et végétales. Pourraient-elles réellement se dissoudre et laisser derrière elles des miasmes - ou peut-être des poisons ? »\n\nExtrait du journal du Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] dans [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.452.g: "Un revers désagréable." #NT!
 panum.453.t: "Courants d'air négatifs" #NT!
 panum.453.d: "Une publication d'un médecin allemand reconnu ébranle les progrès réalisés jusqu'à présent par le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]. Il a ainsi été prouvé que les courants d'air sont responsables de l'apparition du typhus." #NT!
 panum.453.f: "'De tels courants d'air chauds et humides peuvent être transportés par un courant d'air équatorial jusqu'aux latitudes septentrionales et nous verrons alors le typhus se déclarer sous la domination des vents du sud et de l'ouest pendant les saisons relativement chaudes. Une telle relation doit être particulièrement excellente en été, lorsque le soleil est dans sa position septentrionale, les côtes de la Méditerranée sont incluses dans le prolongement des alizés et dans notre pays, la lutte contre le courant du nord a lieu pendant une saison des pluies au caractère changeant. C'est ainsi que s'expliquent les épidémies de typhus de l'été et du début de l'automne.'\n\nDr. Angelika Hasenbein, 'Comment les courants d'air provoquent le typhus et les pluies d'automne provoquent la grippe'" #NT!
 panum.453.g: "C'est en fait très convaincant." #NT!
 panum.454.t: "Malade" #NT!
 panum.454.d: "Le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] se sent plus mal depuis quelques jours. Est-ce que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] a été infecté ?" #NT!
 panum.454.f: "« Où est le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ? [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] voulait rendre visite au patient atteint du typhus dans la chambre cinq aujourd'hui ? »\n\n« Il semble que le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself] soit malade. »" #NT!
 panum.454.g: "Le docteur devrait se reposer." #NT!
 panum.454.h: "Le docteur devrait continuer à travailler !" #NT!
 panum.455.t: "Documents perdus" #NT!
 panum.455.d: "Le docteur a gaspillé certaines des notes qui auraient pu être utiles au développement d'un traitement contre le typhus." #NT!
 panum.455.f: "- - - - - - - - -\n\n- - - - - - - - -\n\n- - - - - - - - -\n\nPAS tiré du journal du Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]" #NT!
 panum.455.g: "Quelle honte." #NT!
  
 panum.461.t: "Cours et maisons" #NT!
 panum.461.d: "Le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a dressé un tableau des différents malades du typhus vivant dans le [SCOPE.sState('panum_disease_state').GetCityHubName], de leur lieu de résidence et de leur niveau de vie. Le typhus est donc une maladie « sociale »." #NT!
 panum.461.f: "'Les tableaux statistiques montrent à quel point l'influence des appartements sur la santé des habitants est grande. Par exemple, dans une étude sur le faubourg de CITY, j'ai constaté que le taux de mortalité dans les rues de deuxième classe était de 18 pour cent et dans les rues de troisième classe de 68 pour cent plus élevé que dans les rues de première classe ; et que la mortalité était de 31 pour cent plus élevée dans les maisons de deuxième classe et de 78 pour cent plus élevée dans les maisons de troisième classe que dans les maisons de première classe. La mortalité s'était améliorée de 25 pour cent dans les mauvaises rues qui avaient été améliorées.'\n\n'Extrait du docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]' 'Tableaux et statistiques sur l'épidémie de typhus dans [SCOPE.sState('panum_disease_state').GetCityHubName]'" #NT!
 panum.461.g: "Donc le médecin est aussi un critique social ?" #NT!
  
 panum_typhus: "Typhus" #NT!
 panum_typhus_desc: "Cette personne souffre du typhus, une maladie dangereuse." #NT!
  
 panum.12.t: "Le premier vaccin" #NT!
 panum.12.d: "[SCOPE.sCharacter('panum_physician_scope').GetFullName] a fait une invention révolutionnaire. Grâce à un nouveau procédé, la vaccination, il a réussi à inventer un moyen efficace de protection contre la redoutable variole." #NT!
 panum.12.f: "Selon le biographe d'Edward Jenner, John Baron, ce dernier aurait exploité la croyance populaire selon laquelle les laitières infectées par la variole bovine ne contractaient généralement pas la variole (mythe de la laitière). John Fewster avait observé qu'un patient qui avait déjà eu la variole bovine (inoffensive) ne pouvait pas être variolé par la variole. Jenner a donc émis l'hypothèse que l'inoculation de la variole bovine procurerait la même immunité que la variole bovine et assurerait donc une protection contre la variole. Jenner a d'abord collecté des études de cas et d'observation de personnes qui avaient déjà eu la variole bovine ou équine, mais qui se sont ensuite révélées immunisées en cas de variolisation ultérieure ou lors d'une véritable épidémie de variole. Le 14 mai 1796, il a vacciné James Phipps, âgé de 8 ans, avec des virus de la variole bovine ou de la vaccine qu'il avait prélevés sur une pustule de variole bovine de la main de la laitière Sarah Nelmes, qui avait la variole bovine. Environ six semaines plus tard, le 1er juillet 1796, Jenner variola le garçon avec du pus de variole ; il se révéla immunisé." #NT!
 panum.12.g: "Un héros de la médecine !" #NT!
  
 je_panum_vaccine: "Le vaccin" #NT!
 je_panum_vaccine_reason: "Notre nation est en train d’introduire pour la première fois un vaccin connu dans notre pays et de le distribuer à l’échelle nationale." #NT!
 je_panum_vaccine_success: "[GetPlayer.GetName] a collecté au moins #ORANGE 4 indices sur les vaccins#!." #NT!
 je_panum_smallpox_treatment_success: "[GetPlayer.GetName] a collecté au moins #ORANGE 3 indices de traitement#!." #NT!
  
 panum.351.t: "Le vieil ennemi" #NT!
 panum.351.d: "La variole, peut-être la maladie la plus mortelle connue de l’homme, a fait une résurgence dans nos pays." #NT!
 panum.351.f: "La variole est un ennemi familier et dangereux. Alors qu'elle se fraie un chemin à travers les terres de [GetPlayer.GetName], elle pourrait coûter la vie à un tiers des personnes infectées et rendre les autres aveugles pour le reste de leurs jours. Presque toutes les personnes infectées porteront à jamais la carte de visite de ce meurtrier sur leur chair - la cicatrice emblématique du visage et du corps, le symbole immortel et sans âge d'une maladie presque aussi vieille que la civilisation elle-même. Elle a traqué tous les recoins du globe, de l'ancien Moyen-Orient au Nouveau Monde, une armée dont la marche a dévasté des empires, tué des millions de personnes et humilié les plus grands dirigeants ayant jamais marché sur la terre. Partout où l'homme est allé, la variole a suivi, un chasseur poursuivant sans cesse sa proie.\n\nMaintenant, sur nos terres, elle a trouvé de nouvelles victimes, suffisamment pour rompre avec sa forme endémique et redevenir une épidémie." #NT!
 panum.351.g: "Et ainsi nous luttons à nouveau contre la variole..." #NT!
 panum.352.t: "Rumeurs sur le traitement de la variole" #NT!
 panum.352.d: "Suite aux rumeurs d'un traitement contre la variole, nos gens ont commencé à essayer d'étranges pratiques à faire avec les pustules elles-mêmes !" #NT!
 panum.352.f: "La vue d'un érudit mangeant des croûtes de personnes infectées par la variole peut être à la fois dégoûtante et horrible, mais c'est un remède désespéré auquel s'accroche un homme désespéré. Des rumeurs circulent sur un traitement pour cette horrible maladie quelque part dans le monde, et il semblerait qu'il fonctionne de manière similaire... mais comment ? Quelles sorcelleries, quelle science, peuvent les débarrasser de cette horrible peste ? Des nouvelles arrivent des contrées lointaines de l'Europe selon lesquelles le fléau de la variole a été repoussé, que des villes entières peuvent vivre sans même un seul cas.\n\nPour certains, c'est une lueur d'espoir. Si on peut le vaincre là-bas, alors nous pourrions le vaincre ici.\n\nPour certains, c'est un mensonge. Nos plus grands esprits n'ont pas encore réussi à trouver un traitement, mais peut-être, peut-être..." #NT!
 panum.352.g: "...auraient-ils pu réussir là où nous avons échoué ?" #NT!
 panum.353.t: "Le fléau de la variole" #NT!
 panum.353.d: "Non traitée et incurable, la variole dévaste notre société... et surtout nos jeunes." #NT!
 panum.353.f: "Sanglots. Gémissements. Les cris frénétiques des désespérés, qui ne mettent qu'une seconde à respirer avant de sombrer dans un chagrin dont aucune main ne peut les relever. Les pères frappent les murs de leurs poings jusqu'à ce que leurs paumes deviennent rouges de sang et que leurs jointures soient brisées et plates. Les mères repoussent les aides-soignants avec la force de géants pour un dernier contact, pour une dernière caresse sur une joue froide et pâle. Ce sont des visions courantes au [GetPlayer.GetName], car la variole a faim des plus vulnérables d'entre nous : nos enfants, nés et à naître. Plus de quatre-vingt pour cent des nourrissons infectés par la variole mourront, cette maladie se frayant un chemin dans l'avenir de nos terres.\n\nEt sans traitement, nous ne pouvons rien faire d'autre que pleurer sur les vies qui auraient dû être vécues." #NT!
 panum.353.g: "Il doit y avoir une fin à ce cauchemar..." #NT!
 panum.354.t: "Le vaccin contre la variole" #NT!
 panum.354.d: "Nos diplomates rapportent plus que des nouvelles : ils ramènent des échantillons d'un « vaccin » contre la variole !" #NT!
 panum.354.f_generic: "Lors d'une visite dans la lointaine Europe, nos dignitaires ont découvert quelque chose de fascinant : ils ont ce qui semble être un traitement efficace contre la variole. En effet, ils ont appris l'histoire de cette maladie ! Apparemment, la pratique de la variolisation, ou l'utilisation d'échantillons de croûtes de variole séchées provenant de malades en convalescence pour donner aux enfants une forme « atténuée » de cette maladie, avait été observée dans l'Empire ottoman... mais c'était une solution imparfaite, dangereuse, car c'était une danse avec le diable : si vous vous approchez trop près, la variole vous arracherait aussi facilement que vous la surmonteriez.\n\nPourtant, aujourd'hui, ce que les Européens ont développé est un moyen d'utiliser la vaccine, une maladie presque inoffensive, comme moyen de protection contre son frère aîné mortel. Cela fournit un bouclier sûr, économique et pratiquement garanti contre le fléau de la variole.\n\nAu début, trop pour être cru, nos médecins sceptiques ont testé ce remède par eux-mêmes... et il *fonctionne*. Pour la première fois dans notre histoire, nous pouvons lutter contre la variole." #NT!
 panum.354.g_generic: "Nous...nous devons importer ceci, immédiatement !" #NT!
 panum.354.f_fareast: "Lors d'une visite dans la lointaine Europe, nos dignitaires ont découvert quelque chose de fascinant : ils ont ce qui semble être un traitement efficace contre la variole. En effet, ils ont appris l'histoire de cette maladie ! Bien que nos médecins soient bien familiarisés avec la pratique de la variolisation, qui consiste à utiliser des croûtes séchées sur les personnes en convalescence pour protéger les personnes non infectées, ils semblent avoir découvert une protection encore plus grande. En utilisant des échantillons dérivés de la vaccine relativement bénigne, les Européens ont développé un « vaccin » capable d'inoculer des enfants, ou même des personnes récemment infectées... un vaccin qui peut augmenter considérablement leurs chances de survie.\n\nNos médecins les plus instruits pouvaient à peine y croire. Seuls ceux qui ont été instruits à la manière européenne et qui portent le titre de « médecins » pouvaient se porter garant de son potentiel en tant que protection sûre, économique et puissante contre la variole. De plus, ils ont déjà commencé à le tester parmi notre peuple et ont découvert que ces affirmations ne sont pas de simples affirmations, oh non, mais des faits.\n\nAvec cela, nous avons une arme pour combattre la variole." #NT!
 panum.354.g_fareast: "Il semblerait que nos nouveaux...médecins...aient fait leurs preuves. Importez ceci immédiatement." #NT!
 panum.354.f_latino: "Lors d'une visite en Europe, nos dignitaires ont découvert quelque chose de fascinant : ils ont ce qui semble être un traitement efficace contre la variole. Bien que nous connaissions depuis longtemps la pratique de la variolisation, où nos médecins utilisaient des échantillons prélevés sur des personnes en convalescence pour les donner à ceux qui avaient désespérément besoin de protection, ils ont depuis développé un traitement beaucoup plus sophistiqué. Plutôt que d'utiliser des croûtes de variole et de risquer une infection par cette maladie mortelle, ils utilisent des matériaux provenant de la vaccine, une maladie courante et généralement inoffensive. Ce nouveau sérum est à la fois bon marché, courant et surtout efficace.\n\nMaintenant qu'ils ont accès aux dernières revues médicales, nos médecins ne peuvent que se réjouir de cette découverte. La variole n'est pas étrangère aux Amériques, car elle a décimé les peuples autochtones de ces terres... mais nous disposons désormais d'une arme puissante pour faire de ce fléau une chose du passé." #NT!
 panum.354.g_latino: "Envoyez des remerciements à la patrie et une demande d'importation d'un envoi pour une utilisation immédiate." #NT!
 panum.355.t: "La vaccination commence" #NT!
 panum.355.d: "Avec un vaccin viable contre la variole désormais présent au [GetPlayer.GetName], le gouvernement a lancé une campagne de vaccination." #NT!
 panum.355.f: "L'idée d'une campagne de vaccination avait rencontré une certaine résistance, du moins au début. Des mères inquiètes avec leurs enfants effrayés, des vieux messieurs ratatinés qui étaient sceptiques face à cette nouvelle merveille, des personnes très pieuses qui craignaient que la science ne falsifie quelque chose qui dépassait leur compréhension. L'éducation a réglé ce problème - des explications sur le fonctionnement et les raisons de cette nouvelle merveille - mais les résultats ont été bien plus que cela. Des enfants qui ont conservé la vue et la santé, et non les horribles séquelles de l'une des maladies les plus mortelles que l'humanité ait jamais rencontrées. Peu de gens ont eu besoin d'être convaincus lorsqu'ils les ont vus sans cicatrices et pleins de vie.\n\nPetit à petit, les files d'attente ont commencé à s'allonger. Dans les écoles, les cabinets médicaux, les lieux de travail, la campagne de vaccination a commencé à prendre de l'ampleur... et avec elle, la variole a commencé à décliner." #NT!
 panum.355.g: "Aïe. Je déteste les aiguilles, mais si cela peut me protéger..." #NT!
 panum.356.t: "Une maladie en recul" #NT!
 panum.356.d: "Après d’innombrables siècles de mort et de misère, la récente prolifération de la vaccination contre la variole a mis ce vieil ennemi en retrait." #NT!
 panum.356.f: "Il a fallu beaucoup d'efforts et d'esprits inlassables, mais dans notre chère [GetPlayer.GetName], la variole est une menace qui devient lentement mais sûrement une chose du passé. Le résultat d'une vaste campagne de vaccination de la jeunesse du pays et de tous ceux qui sont prêts à prendre l'aiguille, la capacité de la variole à se frayer un chemin dans nos familles et nos communautés est en train de s'effondrer, portant la promesse que les enfants d'aujourd'hui ne porteront pas les cicatrices de leurs grands-parents. À chaque piqûre d'aiguille, la lame de la variole s'émousse de plus en plus, et la nature de ce fléau devient encore plus une chose du passé.\n\nC'est un exploit capital, un jour glorieux de notre histoire : bien que la bataille ne soit pas encore gagnée, la victoire est en vue. La variole mourra ici, et si ce n'est pas de notre main, alors de celle de nos héritiers." #NT!
 panum.356.g: "Un jour, un jour, nous abattrons cette bête hideuse pour de bon." #NT!
  
 panum_smallpox_vaccination_character_modifier: "Vacciné" #NT!
  
 panum.340.t: "Variation" #NT!
 panum.340.d: "Le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a trouvé une méthode de traitement contre la variole – même si elle n’est pas totalement inoffensive." #NT!
 panum.340.f: "La variolisation (également appelée inoculation) est la transmission du contenu des pustules de la variole d'une personne à une autre par inoculation. Il s'agit d'une technique de vaccination contre les maladies virales qui a été utilisée chez l'homme, principalement en Chine et au Moyen-Orient, jusqu'au XVIIIe siècle. On y utilisait des collections de virus provenant des blessures des malades de la variole qui avaient survécu à la maladie. En général, on prélevait du matériel d'une pustule chez les malades à l'aide d'une lancette, qui était ensuite introduite par voie sous-cutanée, c'est-à-dire à travers de petites plaies, dans le bras ou la jambe des personnes en bonne santé. Cela signifiait que des virus atténués étaient administrés à des personnes en bonne santé. La réaction immunitaire était censée être déclenchée par la multiplication des virus. Cependant, les virus pouvaient redevenir pathogènes par mutation inverse lors de leur multiplication, ce qui entraînait un taux de mortalité relativement élevé (2 à 3 %) chez les personnes traitées de cette manière." #NT!
 panum.340.g: "Un... progrès." #NT!
  
