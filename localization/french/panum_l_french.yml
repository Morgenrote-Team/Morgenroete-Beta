 setting_panum_historical_and_dynamic_red_cross_rule_desc: "La Croix-Rouge peut être fondée via l'interface utilisateur graphique du médecin. À partir de 1862, la Suisse a reçu un événement qui crée automatiquement la Croix-Rouge." #NT!
 setting_panum_dynamic_red_cross_rule: "#V Fondation dynamique#!" #NT!
 setting_panum_dynamic_red_cross_rule_desc: "La Croix-Rouge ne peut être fondée que via l'interface utilisateur graphique du médecin. Par conséquent, elle n'apparaît généralement qu'après la date historique." #NT!
  
 panum_is_red_cross_member_tt: "Membre du [concept_panum_red_cross]" #NT!
 panum.3031.t: "La première Convention devient une Convention contraignante" #NT!
 panum.3031.d: "La grande majorité des membres de la Croix-Rouge ont adhéré à la Première Convention internationale concernant les soins aux blessés de guerre. Elle est désormais contraignante pour tous les membres." #NT!
 panum.3031.f: "Les conventions internationales sont généralement des déclarations d'intention non contraignantes. Cependant, si un nombre suffisant de membres de la Croix-Rouge les signent, elles deviendront au fil du temps un texte de loi international valable, que tous les signataires sont tenus de respecter - et les autres membres la signeront également. Cela se produit lorsque 65 % de tous les membres et la majorité des grandes puissances approuvent cette convention - alors tous les autres membres sont alors obligés de la respecter. Cette convention ne peut alors plus être abrogée comme d'habitude. Afin d'éviter des conventions contraignantes, un retrait complet de la Croix-Rouge est nécessaire - avec toutes les conséquences que cela implique." #NT!
 panum.3031.g: "Un droit international valable à l’échelle mondiale est créé." #NT!
 panum.3032.t: "La deuxième Convention devient une Convention contraignante" #NT!
 panum.3032.d: "La grande majorité des membres de la Croix-Rouge ont adhéré à la Deuxième Convention internationale sur le désarmement et la guerre navale. Elle est désormais contraignante pour tous les membres." #NT!
 panum.3033.t: "La Troisième Convention devient une Convention contraignante" #NT!
 panum.3034.t: "La Convention internationale devient contraignante" #NT!
 panum.3034.d: "La grande majorité des membres de la Croix-Rouge ont accepté la convention, qui est désormais contraignante pour tous les membres." #NT!
 panum.3034.g: "Nous vérifierons si cela est dans notre intérêt." #NT!
  
