 panum_vitamins_tech: "Vitamines"
 panum_vitamins_tech_desc: "En isolant certains nutriments dont le corps a besoin, il est possible de s'assurer que plus de personnes ont une alimentation saine et équilibrée."
 panum.2006.t: "La théorie des germes est renforcée"
 panum.2006.d: "Le Congrès médical a également offert à plusieurs médecins l'occasion d'échanger des idées sur les causes de la maladie. Il devient évident que de moins en moins de chercheurs croient en la théorie traditionnelle du miasme. La théorie des germes est désormais considérée comme la norme parmi les chercheurs les plus respectés."
 panum.2006.f: "«Récemment, un certain ajustement a en effet fait son apparition, dans la mesure où les pays individuels ne se déroulent plus de manière tout à fait biaisée qu'auparavant, et l'une prend le relais d'un autre qui semble être bien essayé en termes de moyens de défense. Cependant, au milieu de la grande variété persistante dans les manières et moyens de lutter contre la tuberculose, il est encore nécessaire de demander quelles mesures satisfont au mieux les exigences scientifiques et les conclusions générales dans la lutte contre les maladies contagieuses. \ N \ nbut, avant de venir répondre à cette question, nous devons parfaitement clairement clairement comment l'infection est provoquée dans l'organisation humaine; Pour toutes les mesures prophylactiques contre une maladie infectieuse, ne peut être dirigée que pour empêcher les germes de la maladie d'envahir le corps. -Robert Koch"
 panum.2006.g: "Ces preuves ne peuvent pas être rejetées d'emblée."
 panum.2201.t: "La théorie du miasme perd la souveraineté interprétative"
 panum.2201.d: "Avec chaque jour que le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] se concentre de plus en plus sur les nouvelles méthodes de recherche, la théorie traditionnelle du miasme devient moins pertinent. La théorie des germes semble plus convaincante."
 panum.2201.f: "«Messieurs, ce sont les microbes qui auront le dernier mot! -Louis Pasteur"
 panum.2201.g: "La théorie du miasme est donc discutable?"
 panum_physician_recent_treatment_modifier: "Traitement récent"
 panum_physician_recent_treatment_conducted_modifier: "Traitement récent effectué"
 panum_physician_botched_treatment_modifier: "Traitement bâclé"
 panum_physician_botched_treatment_ig_modifier: "Traitement bâclé"
 panum.2301.t: "Traitement réussi du [SCOPE.sCharacter('chosen_character').GetFullName] [SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')]"
 panum.2301.d: "Le Dr [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] a traité avec succès [SCOPE.sCharacter('chosen_character').GetFullName] [SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')]."
 panum.2301.f: "\ \"Pas de soucis, monsieur, ce traitement fonctionnera sûrement! Je l'ai fait au moins 2 fois et un seul patient est mort! \""
 panum.2301.g: "Bien!"
 panum.2302.t: "Traitement neutre de [SCOPE.sCharacter('chosen_character').GetFullName]'s [SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')]"
 panum.2302.d: "Le Dr [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] a traité [SCOPE.sCharacter('chosen_character').GetFullName] [SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')] de [SCOPE.sCharacter('chosen_character').GetFullName] mais rien n'a vraiment changé."
 panum.2302.f: "\ \"Je pensais vraiment que boire suffisamment d'eau ferait l'affaire! \""
 panum.2302.g: "Au moins, ça n'a pas fait de mal."
 panum.2303.t: "Traitement bâclé de [SCOPE.sCharacter('chosen_character').GetFullName]'s [SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')]"
 panum.2303.d: "Le Dr [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] a tellement traité [SCOPE.sCharacter('chosen_character').GetFullName] [SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')] de [SCOPE.sCharacter('chosen_character').GetFullName] qu'il a aggravé la condition [SCOPE.sCharacter('chosen_character').GetHerHis]."
 panum.2303.f: "\ \"C'est la troisième fois que cela se produit cette semaine ... \""
 panum.2303.g: "Cela n'aurait pas dû arriver!"
 panum.2304.t: "Traitement fatal [SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')]"
 panum.2304.d: "Le Dr [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] a malheureusement causé la mort du patient pendant le traitement [SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')]."
 panum.2304.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_fatal_flavor_text_type')]"
 panum.2304.g: "Une tragédie!"
 panum_foreign_medical_expedition_modifier: "Expédition médicale étrangère"
 panum.137.t: "Expedition veut rechercher des maladies"
 panum.137.d: "Une expédition étrangère a atteint les frontières de notre pays. Il se compose principalement de médecins, de scientifiques et de leurs assistants. Ils veulent apparemment rechercher l'épidémie rampante."
 panum.137.f: "Les expéditions médicales peuvent se rendre dans d'autres pays pour rechercher scientifiquement les traitements de maladies et rédiger des descriptions de maladies pour leur patrie. Les pays d'accueil en bénéficient à leur tour parce que les médecins examinent les patients dans les zones épidémiques."
 panum.137.g: "Bienvenue ces courageux hommes et femmes."
 panum.2202.t: "Maladie ancienne"
 panum.2202.d: "Notre médecin a apporté un aperçu précieux du travail de notre anthropologue!"
 panum.2202.f: "\"... Mais, bien sûr, si vous examinez cette partie de leur crâne, vous pouvez voir qu'ils avaient en fait commencé à guérir de leurs blessures. Un coup désagréable, mais pas mortel. J'estimerais qu'ils passaient environ six mois en vie avant qu'une autre blessure ne les fasse tomber, ou peut-être que la blessure s'est mal tournée. '\ N \ N'hmmm. Fascinant. À en juger par la nature du coup, j'ai pensé que c'était probablement une sorte d'instrument ... '\ n \ N'A Club, le plus comme, ou peut-être un outil avec une pierre émoussée. Je pense que cette côte présente la véritable cause du décès. Remarquez le rétrécissement des os, ici et ici. '\ N \ n'injury?' \ N \ N'TUBERCULOSIS, le plus. Je parie que votre homme est mort après des années à lutter contre cette mort blanche."
 panum.2202.g: "La science interdisciplinaire reste la meilleure science."
 panum.2203.t: "Médecine étrange"
 panum.2203.d: "Avec du temps libre ensemble, notre médecin et archéologue ont partagé leurs recherches!"
 panum.2203.f: "«Ah, mais c'est là que les choses deviennent intéressantes, docteur! Ces pots viennent d'Egypte et contiennent ce que nous croyons être des échantillons de médecine ancienne. '\ N \ nfascining, fascinant. Est-ce l'huile de Mummia? '\ N \ n' ... n'est-ce pas sur les corps, avec des propriétés de guérison? La résine autour de leurs emballages? '\ N \ n'oh, non, pas du tout! Mummia est un type d'huile qu'ils découvrent du sol, semblable au pétrole. Pourquoi? '\ N \ n' ... Je pense qu'il est préférable que nous examinions davantage ces médicaments. Il y a toutes sortes de teintures. S'il vous plaît, jetez un œil à-les et je serai de retour dans un instant. J'ai besoin de disposer de ... quelque chose. '\ N \ N'Well, ceux-ci semblent qu'ils auraient pu être parfumés et - mangez-vous quelque chose là-dedans?'"
 panum.2203.g: "... Vous ne mangez pas la maman, n'est-ce pas?"
 panum.2204.t: "Remèdes à base de plantes?"
 panum.2204.d: "Ayant eu un peu de temps pour examiner leurs découvertes, notre naturaliste a livré des plantes avec des propriétés potentiellement médicinales au bureau de notre médecin."
 panum.2204.f: "«Ah, voilà! Je cataloguais certains des échantillons que nous avons ramenés de la dernière expédition botanique, et j'en ai trouvé quelques-uns qui pourraient vous intéresser. '\ N \ N'oh, vraiment? Comment ça? Certains d'entre eux sont complètement étrangers pour nous, mais viennent avec de bons mots des indigènes et valent la peine d'être étudiés davantage. '\ N \ N'HERBAL La médecine n'est pas beaucoup bonne science ... mais on ne sait jamais. Il pourrait y avoir quelque chose d'intéressant dans ces derniers. Vous connaissez les merveilles qu'ils ont trouvées dans la plante de pavot, après tout. '\ N \ N'AH, Morphine!' \ N \ N'Indeed, en effet! Je vais demander à mes assistants de travailler pour préparer des échantillons en poudre, pour un examen plus approfondi."
 panum.2204.g: "Je crois que la feuille de coca est particulièrement fascinante, docteur."
 panum_germ_theory_loc: "Théorie actuelle: #V germ#!"
 panum_miasma_theory_loc: "Théorie actuelle: #V miasma#!"
 panum_no_epidemic_corruption_modifier: "Pas de corruption épidémique"
 panum_measles_depression_modifier: "Dépression de la rougeole"
 panum_sailor_quarantine_modifier: "Couche de la rougeole paralyse les marins"
 panum.600.t: "Épidémie de rougeole"
 panum.600.d: "Une épidémie a éclaté dans l'un de nos États: #YELLOW rougeole #! ravagent en [SCOPE.sState('panum_disease_state').GetName]!"
 panum.600.f: "Comme la variole, la rougeole a été mentionnée par le médecin persan Rhazes au 10e siècle et semble avoir été répandue dans la région eurasienne tout au long du Moyen Âge. La rougeole était endémique en Europe jusqu'au 19e siècle et est devenue encore plus importante à mesure que l'urbanisation augmentait. Une caractéristique particulière de Masenr est l'éruption cutanée qui commence sur le visage et le cou et se propage sur tout le corps en quelques jours. Avec la variole, la rougeole est considérée comme l'une des maladies qui ont frappé de grandes parties de la population indigène indienne au XVIe siècle."
 panum.600.g: "Mais c'est juste une maladie d'enfance inoffensive ... non?"
 panum.620.t: "Terminées épidémiques de la rougeole"
 panum.620.d: "L'épidémie de rougeole est apparemment terminée. Un dernier ensemble de parents a enterré leur enfant mort."
 panum.620.f: "\"Comme la rougeole, l'amour est le plus dangereux quand il arrive tard dans la vie.\" -Lord Byron"
 panum.602.t: "L'épidémie de rougeole atteint [SCOPE.sCountry('panum_infected_country').GetName]"
 panum.602.d: "Nous avons reçu des informations selon lesquelles les premiers cas de rougeole ont été signalés dans le [SCOPE.sCountry('panum_infected_country').GetName] aujourd'hui. Les autorités nous blâment de ne pas en faire assez pour empêcher la propagation."
 panum.602.g: "Il n'y avait aucun moyen d'empêcher cela."
 panum.603.t: "La rougeole tue les enfants"
 panum.603.d: "Dans [SCOPE.sState('panum_disease_state').GetName], l'épidémie de rougeole était beaucoup plus grave que prévu. L'épidémie a été particulièrement endémique chez les nourrissons et les jeunes enfants et a affaibli en permanence une génération entière."
 panum.603.f: "La rougeole a toujours été considérée comme une maladie infantile, bien qu'elle puisse également affecter les adultes. Il montre ses effets les plus dévastateurs entre 2 et 3 ans. Le taux de mortalité baisse ensuite rapidement. En 1963, avant l'invente d'un vaccin, les statistiques officielles ont estimé que 2 millions de décès en rougeole se produisaient dans le monde chaque année. Environ 5 à 10% des cas de la maladie se sont terminés mortellement."
 panum.603.g: "N'y a-t-il pas de remède pour cette terrible maladie?"
 panum.604.t: "Couche de la rougeole paralyse les marins"
 panum.604.d: "Pour des raisons mystérieuses, la rougeole en [SCOPE.sState('panum_disease_state').GetName] a particulièrement affecté les pêcheurs et les marins. Les taux de mortalité sont négligeables, mais la perte de travaux est perceptible dans les chantiers de poisson et parmi les baleiniers."
 panum.604.f: "Au cours de ses recherches sur les îles Féroé, Peter Panum a constaté que la rougeole a également affecté les adultes, en particulier dans les populations plus isolées. Les raisons de cela sont restées obscures pendant longtemps; En principe, cependant, il était à noter que les pêcheurs et leurs familles qui vivaient des villes les plus occupées étaient particulièrement touchés."
 panum.604.g: "Mais qui va en mer maintenant?"
 panum.605.t: "Clinique pour enfants pour la rougeole"
 panum.605.d: "[SCOPE.sCharacter('panum_government_leader').GetFullName] a noté le nombre élevé d'enfants souffrant de rougeole en [SCOPE.sState('panum_disease_state').GetName], en particulier parmi les familles plus pauvres où les taux de mortalité sont plus élevés. Le politicien aimerait financer une clinique pour enfants pour la rougeole et a demandé un don public."
 panum.605.f: "«C'est dommage de voir les bons parents de [SCOPE.sState('panum_disease_state').GetName] à la merci de cette terrible maladie. Les politiciens doivent agir et assumer la responsabilité. Depuis trop longtemps, beaucoup trop peu a été fait par trop. Un hôpital pour enfants devrait aider à protéger la chose la plus précieuse des parents. Nous aiderons. Je te le promets. Tant que mon nom est [SCOPE.sCharacter('panum_government_leader').GetFullNameNoFormatting] ... que voulez-vous dire, je prononce des discours électoraux?"
 panum.605.g: "Une initiative qui mérite d'être soutenue."
 panum.605.h: "Ce parti veut seulement exploiter la maladie à des fins politiques."
 panum.606.t: "Dépression de la rougeole"
 panum.606.d: "«Les nombreux enfants malades et morts en [SCOPE.sState('panum_disease_state').GetName] ont laissé leur marque sur de nombreux parents. Certains parlent de nombreuses personnes qui sont dans une crise de la vie."
 panum.606.f: "'MS. Miller a dû enterrer son troisième enfant ce mois-ci. Elle n'est qu'une des nombreuses mères qui sont maintenant sans enfant. M. Miller, qui dirige une boulangerie en ville, a fermé sa boutique pendant plusieurs semaines. De nombreuses familles dans ce domaine sont comme les millers. Il n'y a guère de clan qui n'a pas perdu d'enfant. Cependant, le fatalisme se transforme en insatisfaction depuis des semaines. Les habitants de cette région sont devenus beaucoup plus sensibles si les circonstances continuent de prendre un virage pire. Beaucoup de gens blâment maintenant le gouvernement pour leur misère. '\ N \ narticle du [SCOPE.sState('panum_disease_state').GetCityHubName] Herald"
 panum.606.g: "Pas tout à fait incompréhensible compte tenu de la situation."
 panum.622.t: "Incubation de la rougeole"
 panum.622.d: "Le Dr [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] a compilé une liste méticuleuse de cas de rougeole qui montre à peu près la période d'incubation de la rougeole."
 panum.622.f: "«On ne peut pas nier que le stade de desquamation peut être contagieux, mais il faut être prudent pour accepter cette vue dans la mesure où pour des raisons générales, on soupçonnerait l'inverse. Il apparaît presque que parce qu'une période latente aussi longue n'a pas pu être conçue, une étape ultérieure de la maladie a été choisie comme infecteur. Dans les villages de Hove et Lobre, sur Suderø, vers la fin de l'épidémie, il s'est produit un intervalle de plus de quatorze jours entre les générations de l'exanthem dans le même ménage, sans que je puisse démontrer une nouvelle infection de l'extérieur; Pourtant, ces deux cas peuvent s'expliquer par une infection qui a été transmise au stade de la convalescence. D'après les données présentées ici, je crois que la période d'incubation de la rougeole peut être estimée avec une grande assurance à environ quatorze jours, sans toutefois insistant sur le fait que cet intervalle est celui qui ne peut pas être modifié par des circonstances particulières, comme, par exemple, un voyage; De nombreux facteurs parlent a priori contre un tel dicton absolu, ainsi qu'une analogie avec l'incertitude des périodes latentes d'autres maladies. -Peter Panum"
 panum.623.t: "La rougeole"
 panum.623.d: "Dans une nouvelle étape intermédiaire, le Dr [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] a différencié les différentes formes de rougeole et a non seulement noté les différences des autres maladies similaires telles que la variole, la rubéole et la rougeole, mais a également mis en évidence les symptômes uniques."
 panum.623.f: "«La littérature sur la rougeole est insignifiante et incomplète par rapport à cet autre exanthétique aiguë, comme, par exemple, la fièvre écarlate et la variole. Mis à part les rapports dispersés dans les revues relatives aux épidémies uniques, il n'y a que quelques monographies, dont plusieurs remontent au siècle précédent. Cette fièvre exanthématique, certainement inconnue des médecins grecs et arabes, était si insuffisamment différenciée même au siècle dernier que De Haën a maintenu l'identité de la rougeole avec une variole, sur la base des symptômes et des écrivains avant la fin du XVIIe siècle décrit les deux maladies comme appartenant à la même famille. ''. -Peter Panum"
 panum.624.t: "Populations vierges et immunité à vie"
 panum.624.d: "Le Dr [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] a récemment été en mesure de montrer très clairement que lorsque la rougeole affecte un individu, cela ne se reproduira pas. Les populations qui n'ont jamais été exposées à la maladie sont donc particulièrement à risque."
 panum.624.f: "«À cet égard, il est cependant tout à fait remarquable que des nombreuses personnes âgées vivant encore sur les faroes qui avaient eu la rougeole en 1781, pas un, pour autant que je puisse le découvrir par une enquête minutieuse, a été attaqué la deuxième fois. J'ai moi-même vu quatre-vingt-dix-huit personnes âgées, qui étaient exemptées parce qu'elles avaient eu la maladie iii leur jeunesse. C'était d'autant plus remarquable dans le fait qu'un âge élevé réduisait la sensibilité à la rougeole, car, pour autant que je sache, toutes les personnes âgées qui n'avaient pas vécu avec la rougeole dans une vie antérieure ont été attaquées lorsqu'ils ont été exposés à une infection; tandis que certains jeunes, bien que constamment exposés, étaient exemptés. Si la récupération de la rougeole soixante-cinq ans auparavant pouvait garantir que les gens ne prennent pas la maladie une deuxième fois, il pourrait être supposé qu'une protection encore plus élevée serait offerte en s'était rétabli de lui un temps plus court avant «Panum-Peter"
 panum.700.t: "Épidémie de la fièvre écarlate"
 panum.700.d: "Une épidémie a éclaté dans l'un de nos États: #YELLOW Scarlet Fever#! ravage dans [SCOPE.sState('panum_disease_state').GetName]!"
 panum.700.f: "La fièvre écarlate est connue depuis les temps anciens et a été bien décrite au XVIIe siècle, notamment par Thomas Sydenham. Bien que la fièvre écarlate soit apparemment devenue moins dangereuse au XVIIIe siècle, elle a riposté sous une nouvelle forme au 19e siècle. Pierre Fidèle Bretonneau, par exemple, a déclaré que vers 1800, il n'avait pas connu un seul cas mortel de fièvre écarlate, tandis qu'en 1824, il observa une épidémie dans des visites avec une mortalité aussi élevée qu'il a placé la fièvre écarlate à la hauteur de la peste et du choléra. La fièvre écarlate est accompagnée d'une éruption cutanée caractéristique. Contrairement à la variole ou à la rougeole, la fièvre écarlate se caractérise par une zone d'amygdale enflée et une langue de couleur aux fraises."
 panum.700.g: "Chaque enfant doit passer par cela à un moment donné. Avec un peu de chance."
 panum.720.t: "Épidémie de la fièvre écarlate terminée"
 panum.720.d: "L'épidémie de Scarlet Fever qui a saisi notre pays quitte lentement les villes et les villages. D'innombrables parents poussent un soupir de soulagement."
 panum.720.f: "«C'est comme la fièvre écarlate: il faut le surmonter. -Leo Tolstoy"
 panum.722.t: "Connaissance ancienne"
 panum.722.d: "Grâce à un concessionnaire antique, [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] a pu trouver plusieurs vieux livres qui résument les descriptions de la fièvre écarlate dans le passé et pourraient également être utiles dans le présent."
 panum.722.f: "On ne peut pas dire avec certitude si la fièvre écarlate était connue dans les temps anciens ou si elle était confondue avec des maladies similaires telles que la diphtérie, la rougeole et la rubéole. Des preuves d'une maladie similaire à la fièvre écarlate existe déjà à Celsus, Caelius Aurelianus, Arataeus of Cappadocia et Aetius d'Amida. Des descriptions similaires peuvent être trouvées dans la région arabe-péririsienne à partir du Moyen Âge, à savoir Avicenne, Ali Abbas et Rhazes. La première description définitive de la fièvre écarlate est une description de Giovanni Filippo Ingrassia de 1553. Une autre position importante est occupé par le médecin Daniel Sennert, également du XVIe siècle. Le nom «Scarlatina» revient à Thomas Sydenham et à sa description de 1675. Bien que la description de Sydenham soit considérée comme faisant autorité, il y a des lacunes importantes, et le terme écarlate fièvre semble également avoir été répandu en Angleterre dès le milieu du XVIe siècle."
 panum.723.t: "Symptômes de la fièvre écarlate"
 panum.723.d: "Le Dr [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] a fait des progrès dans sa description de la fièvre écarlate et a résumé les symptômes pour la première fois."
 panum.723.f: "«Les patients ressentent des rigoros et des frissons, tout comme ils le font dans d'autres fièvres. Les symptômes, cependant, sont modérés; Ensuite, la peau entière devient couverte de petites maculae rouges, plus épaisses que celles de la rougeole, ainsi que plus large, plus rouge et moins uniforme. Ceux-ci durent deux ou trois jours, puis disparaissent. Le patient a non seulement une éruption cutanée, mais aussi une inflammation des amygdales. Il peut y avoir des complications telles que les rhumatismes et l'albage. '\ N \ na une lettre du docteur [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] à la faculté médicale"
 panum.724.t: "Scarlatina n'aime pas le larynx"
 panum.724.d: "Le Dr [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] a identifié les différences spécifiques entre les maladies écarlates et la diphtérie."
 panum.724.f: "«Dans la fièvre écarlate, l'inflammation est largement au-dessus des amygdales, du palais et du pharynx, et n'est pas, comme en diphtérie, d'abord limité à un seul endroit; Et deuxièmement, l'inflammation scarlatinale du pharynx n'a pas tendance à se soulever dans les passages respiratoires. Pour le dire brièvement: Scarlatina n'aime pas le larynx. '\ N \ na une lettre du docteur [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] à la faculté médicale"
 panum_plague_quarantine_modifier: "Plague en quarantaine"
 panum_plague_hospitals_modifier: "Maisons de peste"
 panum_plague_burn_everything_modifier: "Tout brûler!"
 panum_plague_rat_killer_modifier: "Tuez tout!"
 panum_plague_loss_of_trust_modifier: "Perte de confiance"
 panum.800.t: "Le retour de la peste"
 panum.800.d: "Il y a des rumeurs depuis plusieurs années selon lesquelles la peste est revenue dans certaines parties de notre pays. Auparavant, cela s'était limité aux districts ruraux éloignés. Cependant, avec l'épidémie en [SCOPE.sState('panum_disease_state').GetName], il est enfin clair: la peste étend à nouveau ses doigts noueux!"
 panum.800.f: "La troisième peste pandémique (après la peste justinienne au 6ème siècle et la «mort noire» au 14e siècle) a commencé en Chine à la fin du 19e siècle. On pense que la pandémie est originaire du Yunnan qui a vu une épidémie dès 1792, en 1855 et de nouveau en 1866. Une épidémie dans la ville voisine de Guangzhou à partir de janvier 1894 a tué 80 000. À partir de mars 1894, des scientifiques et des médecins britanniques de Hong Kong ont pris conscience de l'épidémie. Après les vagues de choléra des dernières décennies, la vague de la peste devait provoquer de nombreux décès, en particulier en Chine et en Inde, et a finalement conduit à l'instabilité de l'État. Cela coûterait environ 15 millions de vies dans le monde."
 panum.800.g: "Impossible! La peste est une maladie du passé oublié!"
 panum.820.t: "Plague l'épidémie se termine"
 panum.820.d: "La terrible peste, l'un des pires fléaux de l'humanité, a de nouveau quitté notre pays. Espérons qu'il reviendra là où il appartient: dans l'abîme de l'histoire."
 panum.820.f: "«Mais qu'est-ce que cela signifie, la peste? C'est la vie, c'est tout. -Albert Camus"
 panum.802.t: "La peste se propage à [SCOPE.sCountry('panum_infected_country').GetName]"
 panum.802.d: "Les cas de peste sont désormais également signalés au-delà de nos frontières. Apparemment, les autorités n'ont pas pu contenir la maladie. L'ambassadeur [SCOPE.sCountry('panum_infected_country').GetAdjectiveNoFlag] a fait de sérieuses accusations contre nous."
 panum.802.g: "À long terme, la peste vient à tout le monde ..."
 panum.803.t: "Épidémie de peste"
 panum.803.d: "Une épidémie a éclaté dans l'un de nos États: #YELLOW Plague#! ravagent dans [SCOPE.sState('panum_disease_state').GetName]!"
 panum.803.g: "La mort noire frappe."
 panum.804.t: "La peste: une troisième vague"
 panum.804.d: "Des nouvelles inquiétantes nous parviennent de [SCOPE.sCountry('panum_plague_country').GetName]. Une violente épidémie d'épidémie aurait fait rage il y a quelques semaines. Les médecins sont inquiets: il est censé être la tristement célèbre peste."
 panum.804.g: "Nous devons réaliser une expédition médicale pour nous y préparer."
 panum.805.t: "Plague en quarantaine"
 panum.805.d: "La situation dans le [SCOPE.sState('panum_disease_state').GetName] menace de devenir incontrôlable. Les politiciens influents, les chefs d'autorités et les particuliers appellent une quarantaine pour empêcher la peste de se propager davantage. Ce sont principalement des gens qui ne vivent pas dans le [SCOPE.sState('panum_disease_state').GetName]."
 panum.805.f: "De nombreuses quarts stricts avaient déjà fait ses preuves au Moyen Âge. En fait, le terme quarantaine remonte au mot 40 dans la langue italienne et a apparemment été utilisé pour la première fois en période de peste. La République de Venise en particulier, en tant que nation commercial avec un trafic d'expédition étendu, était connue pour cette mesure, car les villes portuaires et commerciales étaient particulièrement affectées par les épidémies."
 panum.805.g: "Toute la zone doit être mise en quarantaine."
 panum.805.h: "Nous ne devrions pas surmonter."
 panum.806.t: "Maisons de peste"
 panum.806.d: "Les autorités locales du [SCOPE.sState('panum_disease_state').GetName] ont fait une proposition de mise en place de maisons de peste pour mieux isoler la population saine de la population malade. Cela affecterait particulièrement les classes les plus pauvres, qui ne peuvent pas fuir comme les riches."
 panum.806.f: "Une maison de peste a été utilisée pour s'occuper des patients atteints de peste pendant les épidémies de peste. Étant donné que l'épidémie a été considérée comme incurable pendant la période de pointe de ces vagues de maladie, à la fin du Moyen Âge et au début des temps modernes, et n'était donc qu'un soulagement en raison de soins médicaux, les maisons de peste étaient principalement destinées à isoler les malades de la population saine. À cette fin, des maisons de peste similaires aux léprosoriums étaient généralement construites à l'extérieur ou à la périphérie d'une ville. Un autre type de maison de peste était destiné à servir la prévention au sens d'une période de quarantaine. Les personnes dans les environs immédiats duquel s'étaient produits par la peste ont été emmenés à la maison de la peste, qu'ils n'étaient autorisés à partir que s'ils se sont avérés non infectés."
 panum.806.g: "C'est seulement pour leur propre bien. Même s'ils ne le veulent pas."
 panum.806.h: "Cela ne ferait que provoquer des troubles."
 panum.807.t: "Le médecin de la peste"
 panum.807.d: "Le principal médecin dans l'un de nos hôpitaux de peste en [SCOPE.sState('panum_disease_state').GetName] a acquis tellement d'expérience dans ce domaine qu'il pourrait être d'une aide précieuse au niveau national."
 panum.807.f: "«Laisse-moi passer! Je suis médecin. Et je sais exactement comment gérer cette maladie."
 panum.807.g: "Donnez au médecin une position de haut rang en tant que médecin."
 panum.808.t: "Le vol des riches"
 panum.808.d: "Le nombre d'émigrants en [SCOPE.sState('panum_disease_state').GetName] augmente chaque jour. En particulier, les familles qui peuvent se permettre d'essayer d'échapper à la peste. Il y a un grand ressentiment parmi ceux qui ne peuvent pas se permettre une telle évasion. D'autres préviennent que cela rendra la peste plus répandue."
 panum.808.f: "«Certains encore, le plus sonore, peut-être, dans le jugement, comme nous avons aussi le plus dur à tempérament le plus dur, de tous, il n'y avait pas de médicament pour la maladie supérieure ou égale à l'efficacité au vol; Après quelle prescription une multitude d'hommes et de femmes, négligents de tous sauf eux-mêmes, ont déserté leur ville, leurs maisons, leur succession, leurs parents, leurs marchandises, et se sont rendus en exil volontaire, ou ont migré vers les parties de campagne, comme si Dieu en visitant les hommes avec cette peste dans la réalisation de leurs iniquités ne les poursuivrait pas comme le circons de la ville; ou juger, Perchance, qu'il était maintenant temps pour tous de s'enfuir, et que sa dernière heure était venue. -Bocaccio"
 panum.809.t: "Tas de cadavres"
 panum.809.d: "Le nombre de décès dus à la peste a atteint des proportions de telles proportions qu'elle pouvait difficilement être maîtrisée. Certains recommandent déjà des brûlures publiques et des fosses en masse."
 panum.809.f: "Au sommet de la peste de 1894 à Hong Kong, les admissions à l'hôpital ont été en moyenne de 80 par jour, et la mort a culminé à plus de 100 par jour. Grâce à la circulation maritime, l'épidémie s'est propagée au reste du pays après 1894 et s'est finalement répandue à British Raj India, où une dizaine d'Indiens ont été tués. Les principales mesures préventives étaient de mettre en place des hôpitaux de peste et du déploiement du personnel médical pour traiter et isoler les patients atteints de peste; effectuer des opérations de recherche de maison en maison, découvrir et transférer des patients de peste et nettoyer et désinfecter les maisons et les zones infectées; et la mise en place de cimetières désignés et l'attribution d'une personne responsable du transport et de l'enterrement de la peste morte."
 panum.810.t: "La mort noire fait des ravages"
 panum.810.d: "L'épidémie de peste est particulièrement rage dans le [SCOPE.sState('panum_disease_state').GetName] de nos jours. De nombreux décès ont été signalés, encore plus que d'habitude."
 panum.810.f: "La maladie est restée localisée dans le sud-ouest de la Chine pendant plusieurs années avant de se propager. Dans la ville de Canton, à partir de janvier 1894, la maladie avait tué 80 000 personnes en juin. La circulation hydraulique quotidienne avec la ville voisine de Hong Kong a rapidement répandu la peste là-bas, tuant plus de 2 400 en deux mois pendant la peste de Hong Kong en 1894."
 panum.810.g: "Personne ne s'échappe de Grim Reaper!"
 panum.811.t: "Tout brûler!"
 panum.811.d: "Le nettoyage et la désinfection des maisons des personnes touchées sont souvent le seul moyen d'arrêter la propagation de la peste. Cela comprend souvent la combustion de tout ce qui entre en contact avec un patient de peste."
 panum.811.f: "`` Je dis donc que telle était l'énergie de la contagion de ladite peste, qu'il n'était pas simplement propagé de l'homme à l'homme mais, ce qui est beaucoup plus surprenant, il a été souvent observé, que les choses qui appartenaient à une maladie ou à la maladie, si elles étaient touchées par une autre créature vivante, pas des espèces humaines, étaient l'occasion, pas mûr, mais d'une mort presque instante. De quoi mes propres yeux (comme je l'ai dit un peu auparavant) avaient une connaissance, un jour entre autres, par l'expérience suivante. Les chiffons d'un pauvre homme mort de la maladie éparpillés dans la rue ouverte, deux porcs sont venus là-bas, et après, comme c'est leur habitude, pas peu insignifiant avec leurs museaux, a pris les chiffons entre leurs dents et les a jetés de manière et de faire face à leurs gars; Sur quoi, presque immédiatement, ils ont donné quelques tours et sont tombés morts, comme par poison, sur les chiffons qui, dans une heure maléfique, ils avaient dérangé. -Boccaccio"
 panum.811.g: "Brûler des vêtements, des meubles et même des maisons si nécessaire!"
 panum.811.h: "Ce n'est pas nécessaire."
 panum.812.t: "Tuez tout!"
 panum.812.d: "On soupçonnait très tôt que les rats pouvaient être porteurs de la peste. Il y a des appels dans le [SCOPE.sState('panum_disease_state').GetName] pour éradiquer spécifiquement les animaux et la vermine afin de prévenir la propagation de la maladie."
 panum.812.f: "Dans le sillage de la troisième pandémie de peste, les villes européennes ont créé de vrais «corps anti-rat» chargés de rechercher et de tuer spécifiquement les animaux ou de les tremper dans des seaux d'essence. Cependant, il a souvent été proposé que d'autres sources de peste, telles que des parasites infectés par l'homme ou de l'homme, comme les puces et les poux, étaient importants pour la transmission en Europe pendant la troisième pandémie. Le faible nombre de rats infectés par la peste trouvés lors des épidémies européennes suggèrent qu'ils ont joué un rôle relativement mineur dans la transmission de la peste. Cependant, certains chercheurs ont fait valoir qu'il était peu probable que les autorités trouvent des rats infectés par la peste parce qu'ils se cacheraient."
 panum.812.g: "Exterminer les rats."
 panum.812.h: "C'est trop coûteux."
 panum.813.t: "Perte de confiance"
 panum.813.d: "De nombreux résidents du [SCOPE.sState('panum_disease_state').GetName] trouvent la situation médicale actuelle scandaleuse. Les nombreux décès et l'échec évident du gouvernement ont entraîné une perte de confiance généralisée dans le gouvernement."
 panum.813.f: "L'épidémie de peste du XIXe siècle a provoqué un grand nombre de victimes, en particulier en Chine, qui a gravement secoué la confiance dans le gouvernement et le mandat céleste des empereurs de Qing."
 panum.813.g: "Alors faites votre gâchis seul!"
 panum.822.t: "La mort noire"
 panum.822.d: "En utilisant plusieurs sources historiques, le Dr [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] a pu prouver que la nouvelle vague de peste est en fait une maladie qui correspond à la mort noire du Moyen Âge."
 panum.822.f: "La découverte de la propagation de la peste en Inde avait une signification dominante dans le point de vue de la peste dans sa signification actuelle de maladie moderne. Cela a initialement conduit à l'idée qu'il n'y avait qu'une seule façon de se propager la maladie. La recherche s'est désormais développée pour inclure un grand nombre de rongeurs et un grand nombre d'espèces aux puces. La mortalité élevée dans les colonies a entraîné une augmentation des efforts de recherche pour cartographier les caractéristiques épidémiques. Le fait que ce fut toujours la peste n'était pas remis en question comme le point de départ. La maladie a reçu le terme historique. L'identité de la peste médiévale avec la peste recherchée en Inde a été supposée."
 panum.823.t: "Saison de peste"
 panum.823.d: "Le Dr [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] a connu tous les dossiers. Que ce soit dans cette épidémie ou avant, que ce soit dans un passé proche ou lointain: il n'y a pas d'épidémie de peste en hiver. Pourquoi c'est le cas n'est pas clair, mais cela pourrait jouer un rôle dans la recherche des raisons de l'épidémie de la maladie."
 panum.823.f: "« Ainsi s'achève cette année... Il est vrai que nous avons traversé une grande mélancolie à cause de la grande peste, et j'ai dû supporter de lourdes charges à cause d'elle, en gardant ma famille longtemps à Woolwich, et moi-même et une autre partie de ma famille, mes clercs, à mes frais à Greenwich... Mais maintenant, la peste a presque disparu... Cependant, beaucoup de ceux que je connais très bien sont morts. Pour notre plus grande joie, la ville se remplit rapidement et les magasins recommencent à ouvrir. Prions Dieu pour que la peste continue de reculer, car cela éloigne la Cour des affaires courantes, et tout va à vau-l'eau en matière publique, eux qui, à cette distance, n'y pensent pas. » - Samuel Pepys"
 panum.824.t: "Peste bubonique et peste pneumonique"
 panum.824.d: "Le Dr [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] a pu montrer qu'il y a plus d'une forme de peste."
 panum.824.f: "La peste est généralement comprise comme signifiant la peste bubonique. La période d'incubation est de quelques heures à sept jours. Les symptômes sont la fièvre, les maux de tête et les douleurs corporelles, une forte sensation de maladie et des étourdissements. Les perturbations de la conscience se produisent plus tard. Le nom de la peste bubonique provient des bosses très enflées et très douloureuses sur le cou, les aisselles et l'aine. La peste pneumonique est considérablement plus rare. Il est probablement similaire à la grippe, bien que sa capacité à se propager soit beaucoup plus faible. La propagation est si spécifique qu'elle ne peut devenir une épidémie que dans des circonstances particulièrement favorables. Tout d'abord, les sources d'infection sont rares. Seule une petite proportion de la population infectée par la peste obtient une peste pneumonique, par exemple dans le cas de la peste bubonique et de la faible résistance."
 panum.241.t: "L'expérience de lapin"
 panum.241.d: "Le Dr [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] propose une expérience audacieuse qui prouvera finalement la contagosité de la tuberculose. Il s'agit de l'inoculation. Et il s'agit de beaucoup de petits lapins morts."
 panum.241.f: "«Pour ma première expérience, j'ai acheté une paire de lapins mignons trois semaines dans le but de déterminer la contagosité de la tuberculose. J'en ai saupoudré un avec un extrait tuberculitique du tissu d'un patient tuberculose décédé 33 heures auparavant. J'ai répété la procédure deux fois. Après quelques jours, j'ai disséqué les animaux et découvert que le lapin était infecté par la tuberculose. \ N \ na mois plus tard, j'ai répété l'expérience avec trois beaux petits lapins. J'ai répété la procédure à nouveau, ajoutant plus tard un lapin. J'ai ensuite disséqué l'un des lapins chaque jour pendant quatre jours consécutifs. Tous souffraient de tuberculose, bien que dans quatre étapes différentes de la maladie. Je n'avais pas inoculé le premier. \ N \ nin ma troisième tentative, j'ai acquis quatre paires de jeunes lapins mignons, trois mois ... '\ n \ nfrom docteur [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] Booklet expérimental' La cause et la nature de la tuberculose ''"
 panum.241.g: "Arrêtez ces terribles expériences animales!"
 panum.241.h: "Répétons l'expérience pour être sûr."
 panum.241.i: "Une troisième expérience de lapin pour la science!"
 panum.241.j: "[GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetSheHe|U] peut tuer autant de lapins que possible pour preuve de la théorie."
 panum.261.t: "Pneumothorax artificiel"
 panum.261.d: "Le docteur [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] a inventé un appareil qui efface artificiellement les poumons et pourrait aider à lutter contre la tuberculose."
 panum.261.f: "Avec l'aide de son frère, Carlo Forlanini a conçu et construit un appareil simple capable d'administrer des gaz par voie intrapeurrelle. La présence de gaz dans le liquide intrapleural a provoqué l'effondrement du poumon, créant ainsi un pneumothorax artificiel. Après avoir construit l'appareil, Forlanini a essayé de traiter deux cas de tuberculose en induisant un pneumothorax chez les deux patients et obtenu des résultats positifs. Au fil des ans, la technique de Forlanini a été développée et améliorée, augmentant ainsi le taux de réussite de la procédure. Le pneumothorax artificiel s'est poursuivi comme traitement jusqu'à l'introduction de la streptomycine."
 panum.262.t: "Thoracoplastie"
 panum.262.d: "Grâce aux compétences en chirurgie [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetHerHis], le médecin [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] a inventé une procédure qui a révolutionné la chirurgie pulmonaire et a ainsi permis un traitement amélioré des patients atteints de tuberculose."
 panum.262.f: "Une thoracoplastie est une procédure chirurgicale dans laquelle les côtes ou les parties des côtes d'un côté de la poitrine sont retirées chirurgicalement afin d'effondrer le poumon ou des parties du poumon. Cette procédure remonte à Edouarde de Cérenville et a été principalement utilisée pour traiter la tuberculose pulmonaire, mais est devenue de plus en moins importante avec l'introduction d'antibiotiques efficaces."
 panum.263.t: "Le médecin l'a fait à nouveau!"
 panum.263.d: "Afin de prouver à nouveau la contagosité de la tuberculose, le Dr [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] a de nouveau tué d'innombrables lapins mignons."
 panum.263.f: "«Des quatre paires que j'ai acquises cette fois, j'ai immédiatement tué le premier animal de la première paire. Il n'a montré aucune lésion des poumons. '\ N \ nfrom docteur [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] Booklet expérimental' La cause et la nature de la tuberculose ''"
 panum.263.g: "Il s'agit de sauver des vies humaines."
 panum.263.h: "Ce médecin a un grave problème."
 panum_pneumothorax_modifier: "Pneumothorax artificiel"
 panum_thoracoplasty_modifier: "Thoracoplastie"
