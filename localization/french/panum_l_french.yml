 panum_physician_achievement_aspirin_inventor_loc: "\nLe Dr [GetPlayer.MakeScope.Var('mendelejew_chemist_var').GetCharacter.GetLastName] est considéré comme l'inventeur principal de #o l'aspirine#! et a non seulement soulagé la douleur d'innombrables patients, mais a également révolutionné l'industrie pharmaceutique." #NT!
 panum_physician_achievement_xray_inventor_loc: "Avec la découverte des #o rayons X#!,, le Dr [GetPlayer.MakeScope.Var('curie_physicist_var').GetCharacter.GetLastName] est considéré comme l'un des plus grands physiciens internationaux qui ont révolutionné la médecine et la physique dans une égale mesure." #NT!
 panum_physician_achievement_bloodtypes_inventor_loc: "Avec la découverte de différents groupes sanguins #o, à savoir A, B, AB et 0#!,, le Dr [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] a joué un rôle important en veillant à ce que nous comprenions mieux le sang en tant que tel - et à ce que les transfusions sanguines soient plus efficaces." #NT!
 panum_physician_achievement_ecg_inventor_loc: "\nL'#o ECG#!, inventé par le Dr [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName], a permis de mesurer l'activité électrique du cœur et représente une étape importante dans le fonctionnement hospitalier." #NT!
 panum_physician_achievement_transplantation_inventor_loc: "Avec la #o Première Transplantation#!,, le Dr [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] a gagné une place dans l’histoire de la médecine." #NT!
 panum_physician_achievement_stereotactic_method_inventor_loc: "À ce jour, la #o méthode stéréotaxique#! [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetSheHe] inventée est considérée comme révolutionnaire en chirurgie cérébrale." #NT!
 panum_physician_achievement_cardiopulmonary_bypass_inventor_loc: "Avec le développement du #o pontage cardiopulmonaire#!,, le Dr [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] a réalisé un chef-d’œuvre de la médecine moderne." #NT!
 panum_physician_achievement_endoscope_inventor_loc: "On se souvient également particulièrement de l'invention de l'#o Endoscope#!, avec lequel l'intérieur humain a pu être examiné pour la première fois." #NT!
 panum_physician_achievement_ophthalmoscope_inventor_loc: "\nLe Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a inventé un appareil qui facilite l'examen des maladies oculaires et a ainsi rendu un service inestimable à l'ophtalmologie : #o L'ophtalmoscope#!." #NT!
 panum_physician_achievement_chemotherapy_inventor_loc: "\nLa #o chimiothérapie#! [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetSheHe] développée pour traiter même les maladies les plus tenaces avec une variété de médicaments donne même aux patients atteints de cancer l'espoir que tout n'est pas vain." #NT!
 panum_physician_achievement_iron_lung_inventor_loc: "\n[GetPlayer.MakeScope.Var('gaudi_engineer_var').GetCharacter.GetHerHis|U] #o La construction du premier poumon d’acier#! pour maintenir en vie les patients atteints de polio dans le besoin est considérée comme l’une des réalisations d’ingénierie les plus fascinantes de notre époque." #NT!
 panum_physician_achievement_military_medicine_project_finished_loc: "\nLe Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a #o inventé les méthodes les plus récentes dans le domaine de la médecine de campagne#!, faisant des services médicaux militaires l'un des plus reconnus au monde." #NT!
 panum_physician_achievement_inaugurated_asylum_loc: "\nLe Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a joué un rôle crucial dans la fondation du #o premier asile psychiatrique#! du pays afin de fournir une aide complète et humaine aux malades mentaux." #NT!

