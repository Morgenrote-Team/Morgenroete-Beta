 panum.55.t: "Le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] peut décrire une maladie étrangère" #NT!
 panum.55.d: "Un autre pays connaît une épidémie sur laquelle votre [concept_panum_physician] pourrait enquêter pour décrire la maladie." #NT!
 panum.55.g: "Envoyez notre médecin immédiatement !" #NT!
 panum.55.h: "Pas maintenant." #NT!
 panum.55.i: "Prévenez-moi de manière moins intrusive." #NT!
 panum.55.j: "Ne me parle plus de ça." #NT!
 panum_foreign_disease_research_only_notification_tt: "Désormais, vous serez informé par #V Notifications#! de la possibilité d'envoyer vos [concept_panum_physician] vers des pays où il y a des maladies." #NT!
 panum_foreign_disease_research_no_notification_tt: "Vous ne serez #n plus#! informé de la possibilité d'envoyer vos [concept_panum_physician] vers des pays où sévit une maladie." #NT!
  
 panum.56.t: "Le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] peut trouver un traitement pour une maladie étrangère" #NT!
 panum.56.d: "Un autre pays connaît une épidémie sur laquelle votre [concept_panum_physician] pourrait enquêter pour trouver un traitement à la maladie." #NT!
  
 notification_panum_foreign_description_possible_notification_name: "Expédition d'observation médicale possible" #NT!
 notification_panum_foreign_description_possible_notification_desc: "Vous pourriez envoyer votre [concept_panum_physician] dans une expédition d'observation médicale pour décrire une maladie." #NT!
 notification_panum_foreign_treatment_possible_notification_name: "Une expédition de recherche médicale est possible" #NT!
 notification_panum_foreign_treatment_possible_notification_desc: "Vous pourriez envoyer votre [concept_panum_physician] dans une expédition de recherche médicale pour décrire une maladie." #NT!
  
 panum.131.t: "Études sur les maladies abandonnées" #NT!
 panum.131.d: "Depuis que l'épidémie dangereuse de [GetPlayer.GetName] a pris fin et que les derniers patients sont maintenant guéris, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a terminé pour le moment les études de [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]. Le médecin a pu recueillir des informations importantes qui devraient simplifier une future description scientifique de la maladie, mais [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] n'a pas encore réalisé de percée" #NT!
 panum.131.f: "« Je laisse à d'autres auteurs, qu'ils soient profanes ou professionnels, le soin de spéculer sur son origine et ses causes, si tant est qu'on puisse trouver des causes adéquates pour produire un trouble aussi grave. Pour ma part, je vais simplement exposer sa nature et expliquer les symptômes par lesquels l'étudiant pourra peut-être la reconnaître, si elle devait jamais réapparaître. Je peux le faire d'autant mieux que j'ai moi-même été atteint de cette maladie et que j'ai observé son évolution chez d'autres personnes. » - Thucydide" #NT!
 panum.131.g: "Une nouvelle étape a été franchie." #NT!
 panum.133.t: "Expédition médicale interrompue" #NT!
 panum.133.d: "L'expédition médicale a terminé son travail pour l'instant car l'épidémie est terminée. Le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] n'a pas réussi à terminer une description scientifique, mais les études [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] devraient être précieuses pour l'avenir." #NT!
 panum.134.d: "La terrible épidémie qui a frappé notre pays est terminée. Mais cela signifie également que le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] doit arrêter temporairement ses recherches car il ne peut plus mener d'expériences pour trouver une méthode de traitement de la maladie. Néanmoins, le médecin a acquis des connaissances précieuses qui lui seront certainement utiles à l'avenir." #NT!
 panum.134.f: "« La contagion passe d'une chose à une autre et est causée à l'origine par l'infection de la particule imperceptible. » - Girolamo Fracastoro" #NT!
 panum.134.g: "Ce n’est qu’une question de temps avant que nous trouvions un remède." #NT!
 panum.136.d: "Malheureusement, l'expédition de recherche médicale a été interrompue pour le moment sans aucun résultat final. Depuis que l'épidémie a quitté le pays, le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] n'a pas vérifié les théories de [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]. Les résultats intermédiaires seront mis à la disposition de [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] et des générations futures pour enfin trouver une méthode de traitement." #NT!
  
