 subject_medical_treatment_team_desc: "Un [concept_panum_physician] peut former une équipe médicale pour enseigner et diffuser des traitements médicaux dans un pays concerné." #NT!
 subject_medical_vaccination_team: "Envoyer une équipe médicale de vaccination" #NT!
