 panum_spanish_flu_physician_help_modifier: "Le médecin combat la pandémie"
 panum.1110.t: "Le médecin et la pandémie"
 panum.1110.d: "The outbreak of the pandemic is a crucial hour for Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]: now [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] can shine! But the question arises: should it be better to actively fight the pandemic or research it?"
 panum.1110.f: "«Le jour où il est devenu clair que nous ne ferions pas affaire à une vague de grippe ordinaire, j'ai ressenti une grande motivation pour faire ma part. Et en même temps, j'ai ressenti le poids effréné sur mes épaules. Les attentes étaient énormes. Serais-je jamais en mesure de réaliser les espoirs qui m'ont été placés? '\ N \ ndiary Entrée de [ROOT.Var('panum_physician_var').GetCharacter.GetFullName]"
 panum.1110.g: "Combattre la pandémie."
 panum.1110.h: "Recherchez la pandémie."
 panum.1111.t: "Pathogène de la pandémie"
 panum.1111.d: "Notre médecin en chef, Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], et notre biologiste en chef, Doctor [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName], ont fait une brillante découverte aujourd'hui: ils ont découvert l'agent pathogène qui provoque la grippe [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective]!"
 panum.1111.f: "Le virus de la grippe A H1N1 (A / H1N1) fait référence à un sous-type du virus de la grippe A (espèce alphainfluenzavirus grippale) de la famille Orthomyxoviridae, qui se produit chez les canards, les humains et les porcs, mais infecte également de nombreuses autres espèces mères. Les virus de la grippe H1N1 se sont établis chez l'homme et les porcs à la suite de la grippe espagnole de 1918. Ce sous-type a causé des dizaines de millions de morts humaines. Certains chercheurs avaient déjà soupçonné un «virus filtrable». Dans les manuels, la bactérie maintenant appelée Haemophilus influenzae était considérée comme la cause de la grippe. Cependant, aucun agent pathogène n'a pu être détecté en utilisant les méthodes habituelles de bactériologie: il ne pourrait ni être teint ni cultivé sur des milieux de culture artificielle. S'il y avait une avancée dans la connaissance en raison de la grippe espagnole, alors elle était dans la mesure où le pathogène réel de cette variante de grippe était encore inconnu à l'époque, ce qui signifie que Haemophilus influenzae était exclu comme pathogène. Ce n'est qu'en 1996 que le génome du virus a été séquencé."
 panum.1111.g: "Heureka!"
 panum.1112.t: "Origine de la pandémie"
 panum.1112.d_historical: "Après une enquête scientifique exceptionnelle qui combine l'histoire, la criminologie et les connaissances médicales, le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a fait une découverte révolutionnaire: la pandémie n'a pas éclaté en Espagne, comme cela le prétend si souvent, mais en Amérique!"
 panum.1112.f_historical: "La découverte du médecin est précédée d'une enquête méticuleuse. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] a comparé les fichiers des patients et retracé aux premiers cas de notre pays afin de reconstruire un réseau d'infections. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] a également collecté des données auprès de collègues à l'étranger et les a parfois rendues en visite lui-même. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] a évalué les conclusions d'autres médecins qui ont entrepris des efforts similaires dans leur pays. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] ne peut pas dire avec certitude où la première infection s'est produite, mais tout pointe vers l'état du Kansas. Le fait que la maladie éclate en Amérique est désormais un fait scientifique."
 panum.1112.g_historical: "Cela signifie-t-il que nous devrions parler de la grippe américaine?"
 panum.1112.d_dynamic: "Après une enquête scientifique exceptionnelle qui combine l'histoire, la criminologie et les connaissances médicales, le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a fait une découverte révolutionnaire: la pandémie n'a pas éclaté en [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetName], comme on le prétend si souvent, mais en [SCOPE.sCountry('panum_pandemic_country').GetName]!"
 panum.1112.f_dynamic: "La découverte du médecin est précédée d'une enquête méticuleuse. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] a comparé les fichiers des patients et retracé aux premiers cas de notre pays afin de reconstruire un réseau d'infections. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] a également collecté des données auprès de collègues à l'étranger et les a parfois rendues en visite lui-même. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] a évalué les conclusions d'autres médecins qui ont entrepris des efforts similaires dans leur pays. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] ne peut pas dire avec certitude où la première infection s'est produite. Le fait que la maladie éclate en réalité au [SCOPE.sCountry('panum_pandemic_country').GetNameNoFormatting] est désormais un fait scientifique."
 panum.1112.g_dynamic: "Cela signifie-t-il que nous devrions parler de la grippe [SCOPE.sCountry('panum_pandemic_country').GetAdjectiveNoFormatting]?"
 panum.1113.t: "Traitement de la pandémie"
 panum.1113.d: "Au cours de la recherche [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] sur la grippe [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective], le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a inventé plusieurs remèdes et pratiques et élaboré un plan d'action pour contenir la maladie. Bien que ces résultats soient tous trop tard, ils peuvent être utiles pour les générations futures."
 panum.1113.f: "'Mell much better and dressed today. Almost worn out with worry and loss of sleep. So much sickness and death this week, but one great ray of light and hope on the outcome of the war as peace came this past (11th).' -Helen Viola Jackson Kent, [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] Flu survivor"
 panum.1113.g: "Eh bien, nous avons appris quelque chose."
 panum.1114.t: "Description de la pandémie"
 panum.1114.d: "Unfortunately, Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] has made little progress during the pandemic. However, [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] has written a description of the disease that could possibly be helpful in recognizing the symptoms of variants of the [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] flu."
 panum.1114.f: "«Ces hommes commencent par ce qui semble être une attaque de La Grippe ou de la grippe, et lorsqu'ils sont amenés à l'hôpital, ils développent très rapidement le type de pneumonie le plus visqueux qui ait jamais été vu. Deux heures après l'admission, ils ont les taches en acajou sur les os de la joue, et quelques heures plus tard, vous pouvez commencer à voir la cyanose s'étendre de leurs oreilles et se propager sur tout le visage, jusqu'à ce qu'il soit difficile de distinguer les hommes colorés du blanc. Ce n'est qu'une question de quelques heures que jusqu'à ce que la mort arrive, et c'est simplement une lutte pour l'air jusqu'à ce qu'ils suffosent. C'est horrible. On peut le supporter pour voir un, deux ou vingt hommes mourir, mais pour voir ces pauvres démons tomber comme des mouches en quelque sorte vous nerveux. -N. Roy Grist, [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] survivant de la grippe"
 panum.1114.g: "Nous nous attendions un peu plus."
 panum.1115.t: "Mystère de la pandémie"
 panum.1115.d: "Unfortunately, Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] was not up to the demands of the pandemic. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] was unable to find any answers about the origin, how to combat or describe the disease. But the doctor wrote a little poem."
 panum.1115.f: "«J'avais un petit oiseau, \ Nits le nom était enza. \ Ni a ouvert la fenêtre, \ nand in-flu-enza."
 panum.1115.g: "Décevant."
