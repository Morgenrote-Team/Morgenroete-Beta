 panum.2007.t: "Inventions médicales"
 panum.2007.d: "Le mot a fait au Congrès qu'il y avait des spécialistes qui avaient réussi des innovations médicales. Ils sont prêts à partager leurs connaissances."
 panum.2007.f: "Les innovations uniques en médecine, telles que les transplantations, le développement des rayons X ou de la chimiothérapie, sont d'une grande importance pour l'humanité que les inventeurs partagent les connaissances sans réserve. En fin de compte, il s'agit du bien-être de tous."
 panum.2007.g: "Bravo à l'humanité!"
 panum.2205.t: "Tests animaux"
 panum.2205.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] est considéré comme un scientifique glacé avec un certain penchant pour la cruauté. Le nombre d'animaux [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] tué «au profit de la science» serait en trois chiffres. Néanmoins, ces expériences ont leurs succès."
 panum.2205.f: "Bien que les tests animaux au profit de la médecine aient existé depuis l'Antiquité, ce n'est qu'au 19e siècle que les tests ont eu lieu à une échelle qui était auparavant inconnue. En particulier au cours de la découverte de la théorie des germes - et après - de nombreuses expériences ont été réalisées dans lesquelles les animaux ont été conscients par des agents pathogènes d'innombrables fois et sont littéralement devenus des «cobayes» pour de nouveaux médicaments. Cette phase a également vu l'introduction répandue des tests animaux et de la vivisection dans les universités pour les étudiants."
 panum.2205.g: "Le médecin est libre comme le [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe]."
 panum.2205.h: "Les élèves devraient apprendre à disséquer les animaux."
 panum.2205.i: "Cela va clairement trop loin."
 panum.2411.t: "Aspirine"
 panum.2411.d: "Notre chimiste Dr. [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName], a inventé un véritable miracle médical qui pourrait révolutionner la pharmacie: l'aspirine. Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a confirmé les effets de la douleur."
 panum.2411.f: "L'acide salicylique est utilisé en médecine depuis les temps anciens. Les médicaments fabriqués à partir de bois de saule et d'autres plantes riches en salicylate apparaissent dans des comprimés d'argile à partir de Sumer antique et dans l'Ebers papyrus de l'Égypte ancienne. Hippocrate a fait référence à 400 av. Colombie-Britannique sur l'utilisation du thé salicylique pour réduire la fièvre. Les plantes riches en salicylates faisaient partie de la pharmacopée de la médecine occidentale dans l'antiquité classique et le Moyen Âge. L'extrait d'écorce de saule est devenu connu au milieu du XVIIIe siècle pour ses effets spécifiques sur la fièvre, la douleur et l'inflammation. Au 19e siècle, les pharmaciens ont expérimenté et prescrit une variété de produits chimiques associés à la salicine, la composante active de l'extrait de saule. En 1853, le chimiste Charles Frédéric Gerhardt a traité du chlorure d'acétyle avec du salicylate de sodium pour la première fois pour produire de l'acide acétylsalicylique. En 1897, les scientifiques des usines de médicament et de peinture de Bayer ont commencé à étudier l'acide acétylsalicylique comme un remplacement moins d'irritation de l'estomac pour les médicaments de salicylate standard communs et ont créé une nouvelle route synthétique sans impuretés. En 1899, Bayer avait appelé cette aspirine et l'avait vendu dans le monde entier."
 panum.2411.g: "Le médicament sera le point de départ pour de nouvelles recherches médicales."
 panum.2411.h: "La chimie ouvrira certainement des découvertes encore plus spectaculaires."
 panum.2411.i: "L'industrie pharmaceutique en bénéficiera."
 panum.2412.t: "Rayons X"
 panum.2412.d: "Notre physicien Dr. [ROOT.Var('curie_physicist_var').GetCharacter.GetLastName] a fait une découverte spectaculaire: [ROOT.Var('curie_physicist_var').GetCharacter.GetSheHe] a découvert des rayons inconnus auparavant qui peuvent être utilisés pour éclairer le corps. Le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a souligné les possibilités de médecine."
 panum.2412.f: "Les rayons X sont des ondes électromagnétiques avec des énergies quantiques supérieures à environ 100 eV, correspondant à des longueurs d'onde inférieures à environ 10 nm. Les rayons X se trouvent dans le spectre électromagnétique dans la gamme d'énergie au-dessus de la lumière ultraviolette. Des radiographies ont été découvertes en 1895 par le scientifique allemand Wilhelm Conrad Röntgen, qui l'a nommé radiation pour signifier un type de rayonnement inconnu. Les rayons X peuvent pénétrer de nombreuses substances solides telles que les matériaux de construction et les tissus vivants, de sorte que la radiographie aux rayons X est largement utilisée dans les diagnostics médicaux (par exemple, la vérification des os cassés) et la science des matériaux (par exemple, l'identification de certains éléments chimiques et la détection des points faibles dans les matériaux de construction)."
 panum.2412.g: "Spooky - comme voir votre propre mort."
 panum.2413.t: "Groupes sanguins"
 panum.2413.d: "Le Dr [ROOT.Var('curie_physicist_var').GetCharacter.GetLastName] a fait une découverte étonnante qui expliquerait pourquoi le sang humain se mélange parfois et parfois les touffes: apparemment, il existe différents groupes sanguins. Il s'agit d'une percée décisive pour les dons de sang et les transfusions sanguines."
 panum.2413.f: "`` J'ai récemment observé et déclaré que le sérum des gens normaux est capable d'agrandir les globules rouges d'autres individus en bonne santé ... comme étant couramment exprimés, on peut dire que dans ces cas, au moins deux types différents d'agglutines existent, un type dans A, l'autre en B, tous deux en C. Les cellules sont naturellement insensibles aux agglutines dans leur propre sérum. ''. -Karl Landsteiner"
 panum.2413.g: "La recherche sur les groupes sanguins doit être promue."
 panum.2413.h: "La clinique est censée collecter des groupes sanguins et les recueillir pour des transfusions sanguines."
 panum.2414.t: "Électrocardiographie"
 panum.2414.d: "Le Dr [ROOT.Var('curie_physicist_var').GetCharacter.GetLastName] a inventé un appareil étonnant qui enregistre l'activité électrique des fibres musculaires cardiaques. Le médecin appelle l'appareil un électrocardiographie - un ECG."
 panum.2414.f: "En 1843, Carlo Matteucci s'est rendu compte par des expériences sur les cœurs de pigeons que l'activité cardiaque est basée sur des processus électriques. En 1882, le physiologiste Augustus Desiré Waller a effectué le premier ECG sur son chien Jimmy en trempant ses quatre pattes dans une solution de chlorure de sodium conductrice. En 1887, il a pu enregistrer les courants cardiaques pour la première fois à l'aide d'un électromètre capillaire. Les instruments ont été considérablement améliorés en 1903 par Willem Einthoven, qui, sur la base de son galvanomètre à cordes développé en 1895, a développé l'ECG en une procédure de diagnostic utile et l'a introduite à la clinique. La terminologie qu'il a présentée est toujours utilisée aujourd'hui."
 panum.2414.g: "Cet appareil devrait être dans chaque hôpital."
 panum.2415.t: "Première transplantation"
 panum.2415.d: "Le talent chirurgical du Dr [ROOT.Var('curie_physicist_var').GetCharacter.GetLastName] est connu dans tout le pays, mais [ROOT.Var('curie_physicist_var').GetCharacter.GetSheHe] a récemment surpris des experts avec une procédure audacieuse: le médecin a transplanté le tissu thyroïdien humain sous la peau et dans la cavité abdominale d'un jeune homme."
 panum.2415.f: "La première transplantation au sens moderne - l'implantation du tissu organique afin de remplacer une fonction d'organe - était une greffe de thyroïde en 1883. Elle a été réalisée par le chirurgien suisse et le lauréat du prix Nobel plus tard Theodor Kocher. Au cours des décennies précédentes, Kocher avait perfectionné l'élimination de l'excès de tissu thyroïdien en cas de goiter dans une certaine mesure qu'il a pu retirer l'organe entier sans que la personne ne meure de l'opération. Kocher a effectué l'élimination totale de l'organe dans certains cas comme mesure pour empêcher le goiter récurrent. Au cours des années suivantes, Kocher et d'autres chirurgiens ont également utilisé la transplantation thyroïdienne pour traiter une carence thyroïdienne qui est apparue spontanément, sans élimination des organes précédents. La transplantation thyroïdienne est devenue le modèle d'une toute nouvelle stratégie thérapeutique: la transplantation d'organes."
 panum.2415.g: "Et les gens pensaient que Frankenstein était un roman d'horreur!"
 panum.2416.t: "Méthode stéréotaxique"
 panum.2416.d: "Le génie chirurgical du Dr [ROOT.Var('curie_physicist_var').GetCharacter.GetLastName] ne connaît aucune limite: le médecin a révolutionné la neurochirurgie avec une nouvelle opération cérébrale."
 panum.2416.f: "La chirurgie du cerveau stéréotaxique fait référence à des procédures de neurochirurgie et de radiothérapie mini-invasives dans lesquelles la tête et les instruments médicaux du patient sont fixés dans un cadre étroitement vissé pour atteindre une précision maximale. Pour la première fois au cours des dernières années du 19e siècle, des opérations isolées ont été effectuées sur le cerveau exposé en utilisant une procédure qui était déjà connue à l'époque sous le nom de stéréotaxie. Pendant la procédure, le corps du patient et en particulier la tête ont été rigidement serrés dans un système de cadre rigide de manière fiable. Les tests des possibilités dans le contexte de la curiosité de la recherche et de la chirurgie psychiatrique étaient encore très limités et simples à l'époque. Au cours des décennies suivantes, les outils et la méthodologie ont été affinés."
 panum.2416.g: "Brillant!"
 panum.2417.t: "Contournement cardiopulmonaire"
 panum.2417.d: "Avec le développement d'un pontage cardiopulmonaire, le docteur Hasenbein a obtenu un chef-d'œuvre de la médecine moderne. Il ne faudra pas longtemps avant que les gens ne puissent subir une chirurgie cardiaque sans aucun problème."
 panum.2417.f: "Lors d'un pontage cardiopulmonaire, le sang quitte le corps via une canule et un système de tube, est enrichi d'oxygène et pompé à nouveau. Ceci est appelé circulation extracorporelle. Le chemin du sang s'étend généralement de la veine cavae ou de l'atrium droit ainsi que des chambres cardiaques et des artères coronaires ouvertes dans la zone chirurgicale et, après filtrage, enrichissement en oxygène et élimination du dioxyde de carbone ainsi que le réchauffement et le filtrage supplémentaire, via l'artère principale ou l'artère fémorale. Le physiologiste français Le Galloi a publié l'idée de la circulation extracorporelle en 1812. En 1885, Maximilian von Frey et son collègue Max von Gruber à l'Université de Leipzig ont construit le précurseur des machines cardiaques d'aujourd'hui avec un film de film avec une pompe à piston pour la première utilisation de la circulation sanguine dans un système extracorporel fermé."
 panum.2417.g: "C'est la naissance de la chirurgie cardiaque moderne!"
 panum.2418.t: "Endoscope"
 panum.2418.d: "Une nouvelle invention du Dr [ROOT.Var('curie_physicist_var').GetCharacter.GetLastName] pourrait fournir des services d'examen médical inestimables - il peut être utilisé pour voir l'intérieur du corps!"
 panum.2418.f: "Un endoscope est un appareil qui peut être utilisé pour examiner et manipuler l'intérieur des organismes ou des cavités techniques. L'utilisation de l'endoscope, connue sous le nom d'endoscopie, a été initialement développée pour les diagnostics médicaux humains. Après l'invention de Thomas Edison, l'utilisation de la lumière électrique a été une étape majeure dans l'amélioration de l'endoscope. Les premières lumières de ces telles étaient externes bien que suffisamment capables d'éclairage pour permettre la cystoscopie, l'hystéroscopie et la sigmoïdoscopie ainsi que l'examen des cavités nasales (et plus tard thoraciques) comme cela a été réalisé régulièrement chez les patients humains par Sir Francis Cruise (en utilisant son propre endoscope disponible dans le commerce) par 1865 dans l'hôpital Mater Misricordiae dans Dublin, Irdeland."
 panum.2418.g: "Un dispositif médical utile."
 panum.2419.t: "Ophtalmoscope"
 panum.2419.d: "Le Dr [ROOT.Var('curie_physicist_var').GetCharacter.GetLastName] a inventé un appareil qui facilite l'examen des maladies oculaires et a donc rendu un service inestimable à l'ophtalmologie."
 panum.2419.f: "L'ophtalmoscopie ou la fundoscopie est l'inspection des parties visibles de l'œil réalisées à l'aide d'un ophtalmoscope. En particulier, la rétine et les vaisseaux sanguins qui le fournissent peuvent être examinés. L'ophtalmoscope, inventé pour en 1850, a été décrit pour la première fois par son inventeur Hermann von Helmholtz début octobre 1851. L'ophtalmoscope peut être utilisé pour détecter les maladies du nerf optique, de la rétine, de la choroïde et du corps vitreux. Cela a marqué le début de l'histoire de l'ophtalmologie en tant que discipline médicale et scientifique indépendante. Après cela, l'ophtalmoscope est devenu de plus en plus important pour le diagnostic des maladies internes."
 panum.2419.g: "Un dispositif médical intéressant."
 panum.2420.t: "Chimiothérapie"
 panum.2420.d: "Une nouvelle procédure médicale que le Dr [ROOT.Var('curie_physicist_var').GetCharacter.GetLastName] teste actuellement pourrait offrir une lueur d'espoir à de nombreuses personnes malades - même le cancer ne serait pas guérissable, mais au moins partiellement traitable."
 panum.2420.f: "La chimiothérapie est un traitement médicamenteux pour le cancer ou les infections. Paul Ehrlich a utilisé la chimiothérapie pour décrire le traitement des maladies infectieuses avec des substances chimiques qui fonctionnent directement contre l'agent pathogène. En 1904, il a découvert Trypan Red comme le premier médicament de chimiothérapie efficace, qu'il a utilisé pour guérir les souris souffrant de maladie du sommeil. Ehrlich a commencé d'autres expériences le 31 août 1909 à Francfurt AM Main en injectant les agents pathogènes de la syphilis en rats, puis en les traitant à l'aide de procédures chimiothérapeutiques. Ces expériences ont eu un effet si convaincant qu'ils étaient considérés comme la nouvelle «arme» de la médecine contre les maladies infectieuses. Ehrlich a ensuite été appelé «créateur de chimiothérapie». Les médicaments utilisés sont fabriqués artificiellement ou sont des dérivés de substances naturelles."
 panum.2420.g: "Serait-ce une réponse à la souffrance des patients atteints de cancer?"
 panum.2100.t: "Recrutement de médecins"
 panum.2100.d: "L'un des médecins les plus prometteurs de l'hôpital général est le [SCOPE.sCharacter('panum_new_physician_scope').GetFullName]. [SCOPE.sCharacter('panum_new_physician_scope').GetSheHe|U] serait un excellent candidat pour devenir le nouveau médecin en chef. [SCOPE.sCharacter('panum_new_physician_scope').GetHerHis|U] La spécialité est ..."
