 je_panum_measles: "Épidémie de rougeole"
 je_panum_measles_reason: "La rougeole est une maladie très contagieuse connue pour ses parcelles de peau rouge typiques. Il peut avoir des conséquences catastrophiques, en particulier dans les populations dépourvues d'immunité antérieure. En tant que maladie suprrégionale, la rougeole peut se propager à d'autres zones. \ N \ nhe invention of #ORANGE Antibiotics#! a une signification particulière dans la lutte contre la rougeole. Avec cette technologie, un [concept_panum_physician] peut trouver un traitement #V pour la rougeole#!. Seul un très bon système de santé aidera. Tout cela conduit à une meilleure prévention et guérison de la maladie. \ N \ nunfortunely, l'invention d'un vaccin #V contre la rougeole est au-delà de la portée du délai victorien."
 je_panum_scarlet: "Épidémie de la fièvre écarlate"
 je_panum_scarlet_reason: "La fièvre écarlate est une maladie répandue qui a été l'une des causes les plus courantes de la mort chez les enfants jusqu'au début du 20e siècle. \ N \ nhe invention of #ORANGE Antitoxins#! a une signification particulière dans la lutte contre la scarlatine. Avec cette technologie, un [concept_panum_physician] peut trouver un traitement #V pour Scarlet Fever#!. Un bon système de santé aidera. Tout cela conduit à une meilleure prévention et guérir de la maladie. \ N \ ndeveloping a #V Vaccin contre Scarlet Fever#! par un [concept_theiler_biologist] est possible, mais très difficile."
 je_panum_plague: "Épidémie de peste"
 je_panum_plague_reason: "La peste bubonique est assimilée à la «mort noire» du Moyen Âge, qui est l'une des pires catastrophes de l'histoire. On pensait qu'il avait disparu jusqu'à ce qu'il réapparaisse à la fin du 19e siècle. Dans les pays à faible richesse et à faibles systèmes de santé, la peste peut se propager sur plusieurs zones. \ N \ nhe invention of #ORANGE Antitoxins#! a une signification particulière dans la lutte contre la peste. Avec cette technologie, un [concept_panum_physician] peut trouver un traitement #V pour Plague#!. Déjà un système de santé rudimentaire aidera. Tout cela conduit à une meilleure prévention et guérir de la maladie. \ N \ nin afin de vaincre la peste une fois pour toutes, un vaccin #V contre Plague#! est nécessaire qui est développé par un [concept_theiler_biologist]."
 je_panum_diphteria: "Épidémie de diphtérie"
 je_panum_diphteria_reason: "La diphtérie est une maladie dangereuse qui peut entraîner des complications potentiellement mortelles et des conséquences à long terme. En raison de la mortalité infantile et des problèmes respiratoires qui y sont associés, la diphtérie est surnommée «l'ange étranglant des enfants». Les effets restent localisés. \ N \ nhe invention of #ORANGE Antitoxins#! a une signification particulière dans la lutte contre la diphtérie. Avec cette technologie, un [concept_panum_physician] peut trouver un traitement #V pour diphtheria#!. Seul un bon système de santé aidera. Tout cela conduit à une meilleure prévention et guérison de la maladie. \ N \ nin afin de vaincre la diphtérie une fois pour toutes, un vaccin #V contre la diphthéria#! est nécessaire qui est développé par un [concept_theiler_biologist]."
 je_panum_polio: "Polio"
 je_panum_polio_reason: "La poliomyélite est une maladie qui affecte principalement les enfants, entraînant souvent la mort ou des complications physiques à vie. Bien que cela ne se soit produit sporadiquement dans le passé, la polio est devenue endémique au 19e siècle. La polio ne se propage pas au-delà de l'état où elle se produit. \ N \ nLe invention des #ORANGE Antitoxins#! a une signification particulière dans la lutte contre la polio. Avec cette technologie, un [concept_panum_physician] peut trouver un traitement #V pour Polio#!. Seul un bon système de santé aidera. Tout cela conduit à une meilleure prévention et guérison de la maladie. \ N \ nunfortunely, l'invention d'un vaccin #V contre Polio#! est au-delà de la portée du délai victorien."
