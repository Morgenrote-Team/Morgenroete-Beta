 country_panum_psychological_treatment_success_chance_mult: "Chance de réussite du traitement psychologique"
 panum.641.t: "Une maladie notifiable"
 panum.641.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a écrit une lettre urgente aux autorités pour cesser de traiter la rougeole comme une maladie bénigne et en faire une maladie signalable."
 panum.641.f: "«J'ai dû écouter des accusations de collègues, même des collègues très influents des corps d'État et universitaires les plus élevés, que j'exagérais le danger posé par la rougeole. J'ai même été accusé d'avoir rendu le problème de la rougeole plus grand qu'il ne l'était juste pour améliorer ma position. Il est vrai que le taux de mortalité pour la rougeole se situe entre 2 et 5%. Mais si nous supposons seulement qu'environ 2 personnes sur 100 meurent de la rougeole, alors dans un pays de 10 millions, cela signifie plusieurs milliers de morts. Il y a des millions de morts dans le monde qui pourraient être évitées avec des mesures de protection simples. N'est-ce pas mieux si nous avons tous payé un peu plus d'attention et avons suivi les règles pour sauver la vie des gens? Voulons-nous commettre les mêmes erreurs que les femmes qui ont récemment accouché et l'arrogance des médecins pour ne pas se laver les mains, même si c'est un petit investissement de temps avec un impact énorme? '\ N \ Nexcerpt d'une lettre du docteur [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] au gouvernement local en [SCOPE.sState('panum_disease_state').GetName]"
 panum.641.g: "De petites choses peuvent avoir un grand impact."
 panum.642.t: "Infections animales avec la rougeole"
 panum.642.d: "Dans une expérience animale très médiatisée, le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a infecté des singes par rougeole."
 panum.642.f: "`` Compte tenu de la grande importance du sujet et de l'insusceptibilité apparente d'autres animaux, il nous a semblé hautement souhaitables pour poser la question de la réceptivité des singes à l'infection de la rougeole pour être testé. Peut montrer une réaction fébrile définie ressemblant au cours de la température dans certains types de rougeole dans le sujet humain, avec ou sans exanthem."
 panum.642.g: "Cela aidera à trouver un traitement réussi."
 panum.642.h: "Cela aidera à la recherche du pathogène."
 panum.643.t: "Une maladie fluctuante de l'âge"
 panum.643.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a examiné plusieurs cas de maladie au [SCOPE.sState('panum_disease_state').GetName] et a reconnu des différences significatives dans la mortalité des patients."
 panum.643.f: "«La rougeole est considérée comme une maladie infantile inoffensive. Cependant, mes recherches ont montré que cela n'est vrai que lorsque les enfants ont l'âge de la maternelle. En revanche, la mortalité est particulièrement élevée chez les enfants âgés de 6 mois et 3 ans. Après cela, la mortalité tombe assez rapidement. Bien que la rougeole chez les adultes soit considérée comme inoffensive, les rapports de Ludvig panum des îles Féroé ont montré qu'il est préférable que l'immunisation se produise dans l'enfance - les pêcheurs expérimentés signalent également un cours grave de la maladie et même de la mort. '\ N \ nfrom Le Journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [TimeKeeper.GetCurrentDate.Format('y')]"
 panum.643.g: "Il existe donc des groupes de risques spéciaux."
 panum.644.t: "Très contagieux"
 panum.644.d: "Lors d'une visite dans une école du [SCOPE.sState('panum_disease_state').GetName], le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a pu voir pour [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself] qu'une fois que la maladie a éclaté, elle se propage presque sans topppe."
 panum.644.f: "«Merci d'être venu, docteur.» \ N'joy est de mon côté, mademoiselle. Combien de cas de rougeole a maintenant l'école? '\ N'AUSTUNEMENT, nous avons complètement perdu la trace. Hier, il y en avait 35, mais nous aurions dû dépasser 40 maintenant. '\ N'HENNE LE PREMIER CAS DE RECHECLE DÉCLARÉ?' \ N'LAST SEMAINE. '"
 panum.644.g: "Inquiétant."
 panum.645.t: "Éternuements et toux"
 panum.645.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] recommande des mesures de quarantaine telles que celles recommandées pour la grippe ou la tuberculose afin de limiter la rougeole."
 panum.645.f: "«La rougeole n'est pas perçue comme une maladie respiratoire, mais mes soupçons ont été confirmés que c'est le seul moyen d'arrêter sa propagation. La rougeole - l'une des maladies humaines les plus contagieuses - est apparemment transmise par l'infection des gouttelettes. Il y a des informations selon lesquelles les gens dans la salle d'une personne malade sont infectés même s'ils sont hors de la pièce depuis deux heures. Apparemment, les sécrétions infectieuses restent contagieuses plus tard. '\ N \ nfrom du Journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [TimeKeeper.GetCurrentDate.Format('y')]"
 panum.645.g: "Heureusement, ce sont des méthodes bien connues."
 panum.646.t: "Antibiotiques"
 panum.646.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] voit la possibilité de réduire certains des effets secondaires de la rougeole dans de nouveaux antibiotiques."
 panum.646.f: "«Le fait que la rougeole n'est souvent pas prise au sérieux en tant que maladie est également due au fait qu'elle n'a souvent pas d'autres effets secondaires. Malheureusement, ce n'est pas toujours le cas. Les maladies secondaires, telles que les infections dans l'oreille ou les poumons, ont souvent fait basculer les échelles entre un cours léger, sévère et mortel. Les antibiotiques ne peuvent pas guérir la rougeole, mais ils peuvent en retirer l'horreur. '\ N \ nfrom du Journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [TimeKeeper.GetCurrentDate.Format('y')]"
 panum.646.g: "Obtenez plus d'antibiotiques!"
 panum.646.h: "Ces résultats devraient aider à la recherche du pathogène réel."
 panum.647.t: "Statistiques"
 panum.647.d: "Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a particulièrement excellé dans l'enregistrement statistique des cas de rougeole, le traitement des ménages infectés et l'évaluation des données."
 panum.647.f: "`` Dans des recherches méticuleuses sur les données disponibles des dernières années, j'ai examiné la mortalité des victimes de la rougeole dans 22 pays et j'ai fait les conclusions suivantes: '\ n \ nchile 4,84%, Hongrie 4,43%, Australie 0,24%, Écosse 0,35%, Espagne 3,85%, Italie, Angleterre et Pays de Galles 2,91%, États-Unis 1,08%. Dans les pays où la rougeole était endémique, des épidémies épidémiques se produisent tous les trois à cinq ans après le renouvellement de la population. Par la suite, des taux beaucoup plus élevés ont été signalés, atteignant 10%, en particulier dans les îles du Pacifique et l'Afrique."
 panum.647.g: "Utile."
 panum.647.h: "Le médecin a un talent, [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] devrait approfondir les études [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]."
 panum.648.t: "Multiplication"
 panum.648.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a publié des chiffres étonnants sur la propagation et l'infection de la rougeole."
 panum.648.f: "«La rougeole est extrêmement transmissible et on estime que 90% des personnes non immunes exposées à une personne infectieuse contracteront la maladie. Les modèles mathématiques estiment le nombre de reproduction de base à 12–18; Il s'agit du nombre moyen d'infections secondaires qui suivent une seule introduction dans une population sensible. Il est extrêmement contagieux: neuf personnes sur dix qui ne sont pas immunisées et partagent un espace de vie avec une personne infectée seront infectées. '\ N \ nreport du docteur [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] à la faculté médicale."
 panum.648.g: "Ce qui n'était auparavant reconnu que par la perception a été prouvé par la science."
 panum.649.t: "Infection sans symptômes"
 panum.649.d: "Après certaines observations sur place, le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a fait l'hypothèse raisonnable que la rougeole est également transmise par les patients asymptomatiques, avant même que les signes externes n'apparaissent."
 panum.649.f: "«La prévalence élevée de la rougeole est un phénomène bien connu et le risque d'infection est connu depuis les temps anciens. Un gros problème est que les personnes apparemment en bonne santé portent également la maladie, même si elle ne semble pas encore avoir éclaté. Cela renverse de nombreuses hypothèses qui étaient auparavant valides. La contagabilité - comme plusieurs observations en [SCOPE.sState('panum_disease_state').GetName] l'ont montré - commence 4 jours avant l'apparition de l'éruption et dure généralement jusqu'à 4 jours après l'apparition de l'éruption. Il semble que la contagosité soit juste avant le début de l'éruption."
 panum.649.g: "Des enquêtes plus approfondies sont donc justifiées."
 panum.650.t: "Caserne de caserne"
 panum.650.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a visité une caserne du [SCOPE.sState('panum_disease_state').GetName] qui a mis en œuvre certaines mesures exemplaires pour empêcher la propagation de la rougeole chez les jeunes hommes."
 panum.650.f: "«Certaines de ces mesures comprenaient une isolation plus longue et plus stricte des recrues arrivant qu'auparavant; police pour empêcher la congrégation dans les casernes, les cantines, les théâtres et ailleurs; Échec de la tête à pied des lits de caserne adjacents; Tableau et désinfection humide continue des planchers, murs, tables, boutons de porte. Tout le personnel portait des robes et des masques de gaze, les a changé et a été lavé avec du savon, de l'eau ou des désinfectants entre le contact avec les patients, qui étaient des pratiques rares auparavant. OME WARDS a obligé le personnel à porter des gants en caoutchouc. Les patients ont été placés dans l'isolement de la cabine, suspendus aux draps de lit à partir de fils enfermés autour du lit et devaient porter des masques. Les feuilles de cabine étaient parfois périodiquement pulvérisées de désinfectants. Les patients masqués n'ont été autorisés aux toilettes que dans le temps sous surveillance. '\ N \ nfrom du Journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [TimeKeeper.GetCurrentDate.Format('y')]"
 panum.650.g: "Méthodes modernes de lutte contre la rougeole."
 panum.651.t: "Inoculation échoué"
 panum.651.d: "La tentative de Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] d'immuniser la rougeole en utilisant une procédure similaire à la variolation de la variole de la variole s'est avérée une défaillance colossale."
 panum.651.f: "En 1757, le docteur écossais Francis Home a découvert que la rougeole était causée par un agent pathogène: il a transmis la maladie à des individus en bonne santé utilisant le sang des patients infectés et a démontré qu'il était causé par un agent infectieux. Il a testé un groupe de 12 enfants, dont 10 ont développé une éruption fébrile modérée caractéristique après une période d'incubation de 6 à 7 jours, et dont deux sont restées non infectées. Cette approche a été rapidement abandonnée en raison de difficultés techniques, en particulier pour l'obtention du matériel de la rougeole au bon moment pour inoculer la maladie."
 panum.651.g: "Une perte de temps."
 panum.652.t: "Gargarisation de la gorge"
 panum.652.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a essayé plusieurs remèdes de gargarisme qui ont été vantés par des autres médecins pour guérir la rougeole depuis des années. Ils se sont tous révélés être un échec."
 panum.652.f: "«Après la dernière expérience, je me retrouve avec plus qu'un simple arrière-goût amer. D'une part, car même l'huile de serpent a de meilleurs effets. D'un autre côté, parce que nous tolérons davantage de vendeurs d'huiles de serpent et de charlatans dans notre guilde médicale, qui ont de toute urgence être réglée. '\ N \ nfrom du Journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [TimeKeeper.GetCurrentDate.Format('y')]"
 panum.652.g: "Que voulez-vous dire, l'huile de serpent est inutile?"
 panum.653.t: "Pulvérisation de désinfectant"
 panum.653.d: "Dans une caserne, les soldats souffrant d'une épidémie de rougeole ont récemment commencé à ingérer un langage désinfectant. Le médecin pense que c'est une aventure stupide et a dû faire beaucoup de convaincre."
 panum.653.f: "`` Nous devrions vraiment mettre de petites images sur les étiquettes des produits chimiques et médicaux qui montrent même le plus petit imbécile de ce que vous ne devriez certainement pas faire avec un liquide, une pulvérisation ou une autre substance. '\ N \ nfrom Une lettre du docteur [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] au docteur Angelika Hasenbein"
 panum.653.g: "C'est un temps précieux que nous perdons en essayant de trouver un traitement!"
 panum.661.t: "Prenez vos vitamines!"
 panum.661.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a constaté que la prise de vitamines pendant une maladie de la rougeole est bénéfique pour éliminer les effets secondaires désagréables."
 panum.661.f: "«L'effet des vitamines est bien connu, mais dans le cas de la rougeole, leur effet m'a surpris. Les enfants atteints de carence en vitamine A présentent le risque de maladie grave ou même de cécité. Les suppléments de vitamine A peuvent renforcer le système immunitaire général, bien qu'ils ne puissent pas guérir la maladie. '\ N \ nReport de Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] à la faculté médicale."
 panum.661.g: "Très bien."
 panum.900.t: "Épidémie de diphtérie"
 panum.900.d: "Une épidémie a éclaté dans l'un de nos États: #YELLOW Diphtheria#! ravage dans [SCOPE.sState('panum_disease_state').GetName]!"
 panum.900.f: "La diphtérie est une maladie infectieuse aiguë qui se produit principalement chez les enfants et est causée par une infection des voies respiratoires supérieures (diphtérie pharyngée). Pierre Fidèle Bretonneau a introduit le terme diphtérie en usage médical en 1826 sous forme de diphtérite («diphtérite»). Le mot fait référence aux pseudomembranes bronzés de gorge (dépôts bruns coriaces dans le larynx et la trachée) en muqueuse morte et composants sanguins. La diphtérie est connue depuis les temps anciens; Hippocrate avait déjà décrit la maladie. La diphtérie est mortelle dans 5 à 10% des cas. Chez les enfants de moins de cinq ans et les adultes de plus de 40 ans, le taux de mortalité peut atteindre 20%."
 panum.900.g: "Ma gorge se resserre aussi."
 panum.920.t: "Tépidémie de diphtérie se termine"
 panum.920.d: "La grave épidémie de diphtérie qui a tenu notre pays dans un emprise a atteint sa fin. Les médecins et les autorités donnent aux enfants des enfants."
 panum.920.f: "\"Dans une saison froide humide, est apparue à Kingston, une ville intérieure du New Hampshire, située dans une basse plaine, une maladie chez les enfants, communément appelée la` `Disptemper de la gorge '', d'un type des plus malignes, et de loin le plus mortel jamais connu de ce pays.\" -Men Noah Webster"
