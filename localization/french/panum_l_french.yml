 panum_vaccination_tech: "Vaccination"
 panum_vaccination_tech_desc: "Le vaccin contre la variole est le premier vaccin à avoir été développé contre une maladie contagieuse. En 1796, le médecin britannique Edward Jenner a démontré qu'une infection par le virus relativement légère de la cowpox conférait l'immunité contre le virus mortel de la variole."
 panum_physician: "Médecin"
 panum_physician_desc: "Ce personnage est déterminé à aider les gens en fournissant une expertise médicale."
