 je_panum_medical_system_project: "Développer un système médical"
 je_panum_medical_system_project_reason: "Un médecin qui est censé étendre le système médical travaille principalement localement pour améliorer les soins de santé. Mais il y a aussi un besoin d'une infrastructure administrative. Un médecin avec des talents avantageux qui font une impression sur la bureaucratie est utile ici. Ses compétences et son expérience stimulent les progrès mensuels dans la mise en place et la construction de nouveaux hôpitaux et cliniques. \ N \ ndoctors tenteront d'abord de mettre en place des cliniques dans des domaines particulièrement bien développés avant de se tourner vers les cliniques dans des régions moins développées. Les médecins préféreront l'État qui a le plus haut niveau de bâtiments administratifs. \ N \ Nevery Time La barre de progression se remplit, une nouvelle clinique / hôpital est activée et le travail se poursuit dans le prochain État approprié. Les médecins activeront autant de cliniques et d'hôpitaux qu'une méthode de production que possible jusqu'à ce qu'il n'y ait plus d'États avec les exigences nécessaires ou jusqu'à ce que les travaux soient arrêtés manuellement."
 panum.2101.t: "Système médical s'est étendu"
 panum.2101.d: "Le Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a terminé son travail et élargi et mis à jour les installations médicales locales. Le médecin est à nouveau disponible pour d'autres activités."
 panum.2101.f: "«La médecine est une science sociale, et la politique n'est rien de plus que la médecine à grande échelle.» - Rudolf Virchow"
 panum.2101.g: "Retour au travail."
 panum.2102.t: "Clinique spécialisée en [SCOPE.sState('panum_clinic_state').GetName]"
 panum.2102.d: "Avec l'aide impatiente du Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], la première clinique spécialisée de notre pays a été établie au [SCOPE.sState('panum_clinic_state').GetCityHubName]. Le médecin a annoncé que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] l'exécutera [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself] et se spécialisera dans un domaine - bien qu'il ne soit pas encore clair sur quelle zone les spécialistes devraient se concentrer."
 panum.2102.f: "\"L'éducation médicale n'existe pas pour fournir aux étudiants un moyen de gagner sa vie, mais pour assurer la santé de la communauté.\" -Rudolf Virchow"
 panum.2102.g: "Chirurgie."
 panum.2102.h: "Psychiatrie."
 panum.2102.i: "Épidémiologie."
 panum.2102.j: "Médecine militaire."
 panum.2102.k: "Médecine générale."
 panum.2103.t: "Hôpital en [SCOPE.sState('panum_clinic_state').GetName]"
 panum.2103.d: "Aujourd'hui, avec un grand intérêt public et la présence de la presse, le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a ouvert le premier hôpital moderne du pays en [SCOPE.sState('panum_clinic_state').GetCityHubName], qui annonce un tournant avec ses salles d'opération et ses équipements médicaux modernes."
 panum.2103.f: "«C'est la malédiction de l'humanité qu'il apprend à tolérer même les situations les plus horribles de l'habituation.» -Rudolf Virchow"
 panum.2103.g: "Bravo!"
