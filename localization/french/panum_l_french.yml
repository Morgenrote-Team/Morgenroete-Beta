 panum.61.t: "L'équipe de traitement médical part"
 panum.61.d: "Après que les assistants de recherche ont présenté nos médecins locaux aux méthodes de traitement médical moderne de notre pays Overlord, ils disent au revoir et retournent dans leur pays d'origine."
 panum.61.f: "«La seule chose d'importance, à notre départ, sera la trace de l'amour que nous avons laissé.» -Albert Schweitzer"
 panum.61.g: "Notre Overlord prend soin de nous?"
 panum.62.t: "L'équipe de vaccination médicale part"
 panum.62.d: "Après que les assistants de recherche ont présenté nos médecins locaux aux vaccins modernes de notre pays Overlord, ils disent au revoir et retournent dans leur pays d'origine."
