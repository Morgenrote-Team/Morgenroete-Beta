 panum.3000.t: "La Croix-Rouge" #NT!
 panum.3000.d: "Compte tenu des horreurs de la guerre moderne, un « Comité international des sociétés d'aide aux blessés » a été fondé en 1900. Son objectif est de travailler dans plusieurs pays pour aider les blessés de guerre." #NT!
 panum.3000.f: "La Croix-Rouge a adopté les résolutions suivantes :\n- la création de sociétés nationales de secours aux blessés de guerre\n- la neutralité des blessés\n- l'envoi d'infirmières volontaires sur le champ de bataille pour porter assistance\n- l'organisation et la mise en œuvre de nouvelles conférences internationales\n- l'introduction d'un symbole d'identification et de protection sous la forme d'un brassard blanc avec une croix rouge" #NT!
 panum.3000.g: "Une étape décisive dans la coopération internationale." #NT!
 panum.3001.d: "Compte tenu des horreurs de la guerre moderne, un « Comité international des sociétés d'aide aux blessés » a été fondé en 1900. Son objectif est de travailler dans plusieurs pays pour aider les blessés de guerre. Un envoyé a demandé si notre pays souhaitait également rejoindre cette association." #NT!
 panum.3001.g: "Nous rejoignons cette organisation en tant que membre fondateur." #NT!
 panum.3001.h: "Intéressant." #NT!
 panum.3002.d: "Conscient des horreurs de la guerre moderne, le marchand suisse Henry Dunant fonde un « Comité international des sociétés d'aide aux blessés ». Son objectif est de travailler dans plusieurs pays pour aider les blessés de guerre." #NT!
 panum.3002.f: "En 1859, le marchand suisse Henry Dunant tombe par hasard sur le champ de bataille de Solferino. Ébranlé par les appels à l'aide de près de 40 000 soldats blessés ou mourants, il commence à encourager les volontaires de la région à venir en aide aux victimes, qu'elles soient amies ou ennemies. Son livre de 1862, Un souvenir de Solferino, attire l'attention du grand public sur les horreurs de la guerre moderne. Les gouvernements et les citoyens s'intéressent de plus en plus à la maîtrise de la guerre. Le 17 février 1863, le comité de cinq membres dont Dunant faisait partie fonde le Comité international de la Croix-Rouge. Des délégués de 16 nations se réunissent lors de la 1ère Conférence de Genève du 26 au 29 octobre 1863 pour développer les idées de Dunant. La croix rouge sur un drapeau blanc devient le symbole international de protection des secouristes. En 1901, Dunant reçoit le premier prix Nobel de la paix au monde." #NT!
  
 panum.3011.t: "La Convention [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_convention_title')]" #NT!
 panum.3011.d: "Une conférence internationale a été convoquée en [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_convention_title')] pour établir la protection des blessés, la neutralité du personnel médical et la Croix-Rouge comme symbole de protection." #NT!
 panum.3011.f: "« Mais les femmes de Castiglione, voyant que je ne faisais aucune distinction entre les nationalités, suivirent mon exemple, témoignant la même bonté à ces hommes d'origines si différentes et qui leur étaient tous étrangers. Tutti fratelli, répétaient-elles avec émotion. Honneur à ces femmes, à ces filles de Castiglione ! Imperturbables, infatigables, inébranlables, leur sacrifice tranquille faisait peu de cas de la fatigue, des horreurs et de leur propre dévouement. » - Henry Dunant" #NT!
 panum.3011.g: "[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_convention_title')] Convention. Ça a l'air bien." #NT!
 panum.3012.t: "Les traités [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_convention_title')]" #NT!
 panum.3012.d: "Une conférence internationale a été prévue en [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_convention_title')] pour promouvoir le désarmement et étendre les anciennes règles du droit international régissant la guerre terrestre à la guerre maritime." #NT!
 panum.3012.f: "« Le sens moral de l'importance de la vie humaine, le désir humain d'alléger un peu les tourments de tous ces malheureux, ou de redonner courage à leur courage brisé, l'activité furieuse et implacable dont un homme fait preuve dans de tels moments, tout cela se combine pour créer une sorte d'énergie qui donne à chacun un désir réel de soulager autant de personnes que possible. Il n'y a plus de chagrin à ressentir devant les multiples scènes de cette tragédie effrayante et solennelle. » - Henry Dunant" #NT!
 panum.3012.g: "[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_convention_title')] Traités. Cela semble bien." #NT!
 panum.3013.t: "Le protocole [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_convention_title')]" #NT!
 panum.3013.d: "Une conférence internationale a été convoquée en 1900 pour interdire l'utilisation de gaz toxiques en temps de guerre." #NT!
 panum.3013.f: "« Puisque de nouvelles et terribles méthodes de destruction sont inventées chaque jour avec une persévérance digne d'un meilleur but, et puisque les inventeurs de ces instruments de destruction sont applaudis et encouragés dans la plupart des grands États européens, engagés dans une course aux armements ; et puisque enfin l'état d'esprit en Europe se combine avec beaucoup d'autres symptômes pour indiquer la perspective de guerres futures, dont l'évitement, tôt ou tard, semble difficilement possible, au vu de tout cela, pourquoi ne pourrait-on pas profiter d'un temps de calme et de tranquillité relative pour enquêter et essayer de résoudre une question d'une importance aussi immense et mondiale, tant du point de vue humain que chrétien ? » - Henry Dunant" #NT!
 panum.3013.g: "[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_convention_title')] Protocole. Ça a l'air bien." #NT!
  
 panum.3021.t: "Un médecin de la Croix-Rouge" #NT!
 panum.3021.d: "Après une défaite extrêmement sanglante, un médecin s'est distingué [SCOPE.sCharacter('panum_new_physician_scope').GetHerselfHimself] dans l'hôpital de campagne. [SCOPE.sCharacter('panum_new_physician_scope').GetSheHe|U] appartient à la Croix-Rouge et est peut-être appelé à quelque chose de plus élevé qu'un simple service de campagne." #NT!
 panum.3021.f: "« Dans un des hôpitaux de Crémone, un médecin italien avait dit : Nous gardons les bonnes choses pour nos amis de l'armée alliée, et donnons à nos ennemis le strict nécessaire. S'ils meurent, tant pis ! » et il ajoutait, pour excuser ces paroles barbares, qu'il avait entendu dire par des soldats italiens revenus de Vérone et de Mantoue, que les Autrichiens laissaient mourir sans soins les blessés de l'armée franco-sarde. Une noble dame de Crémone, la comtesse..., qui avait entendu les paroles du médecin et qui se consacrait aux hôpitaux avec le plus grand zèle, s'empressa de manifester sa désapprobation en déclarant qu'elle accordait exactement les mêmes soins aux Autrichiens qu'aux Alliés, et qu'elle ne faisait aucune différence entre amis et ennemis. Car, disait-elle, Notre Seigneur Jésus-Christ ne faisait pas de telles distinctions entre les hommes en faisant le bien. » - Henry Dunant" #NT!
 panum.3021.g: "Bienvenue, Docteur [SCOPE.sCharacter('panum_new_physician_scope').GetLastName]." #NT!
  
 panum.740.t: "Un enfant en moins qui fait peur" #NT!
 panum.740.d: "Après de grands efforts, le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a finalement écrit le traité [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] sur une méthode de traitement efficace pour le [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_disease_title')]. Il est considéré comme une étape importante dans la médecine [ROOT.GetCountry.GetAdjectiveNoFlag]." #NT!
 panum.740.f: "La Faculté de médecine attendait avec impatience la publication scientifique sur la méthode de traitement du docteur [ROOT.Var('panum_physician_var').GetCharacter.GetFullName]. Dans son traité [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis], le docteur décrit toute une série de mesures efficaces pour lutter contre la scarlatine. La médecine moderne offre toute une série de possibilités pour lutter efficacement contre la scarlatine même après l'apparition de la maladie. Une nouvelle antitoxine joue un rôle clé. L'ouvrage du docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] porte le nom de [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_treatment_title')]." #NT!
 panum.740.g: "D’innombrables parents dormiront désormais plus paisiblement." #NT!
  
 panum.741.t: "Le test [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting]" #NT!
 panum.741.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a développé une procédure nommée d’après [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] qui détermine si un patient est immunisé contre la scarlatine ou non." #NT!
 panum.741.f: "Le test de Dick, mis au point en 1924 par George F. Dick et Gladys Dick, a été utilisé pour identifier les personnes susceptibles de contracter la scarlatine. Le test de Dick consistait à injecter une souche diluée de streptocoques connus pour provoquer la scarlatine. Une réaction cutanée au point d'injection permettait d'identifier les personnes susceptibles de développer la scarlatine. La réaction était visible quatre heures après l'injection, mais était plus visible après 24 heures. Si aucune réaction cutanée n'était observée, on considérait alors que la personne n'était pas à risque de contracter la maladie, car elle avait développé une immunité contre celle-ci." #NT!
 panum.741.g: "Une procédure utile." #NT!
 panum.742.t: "Sérum contre la scarlatine" #NT!
 panum.742.d: "Le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a développé un sérum efficace contre la scarlatine, qu'il [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] a obtenu à partir de sang de cheval." #NT!
 panum.742.f: "Le sérum contre la scarlatine a été utilisé à partir de novembre 1900 après sa mise au point au laboratoire sérothérapeutique de l'hôpital Rudolph de Vienne, en Autriche. Le sérum était prélevé à partir du sang de chevaux. Le Dr Paul Moser injectait le sérum dans la peau abdominale des enfants infectés. Les taux de mortalité dus à la scarlatine ont diminué de manière significative après l'utilisation du sérum sanguin. L'antitoxine de Moser a réduit la mortalité due à la scarlatine de 40 %." #NT!
 panum.742.g: "Du sang de cheval ? Beurk." #NT!
 panum.743.t: "L'antitoxine" #NT!
 panum.743.d: "Après plusieurs tests, le docteur [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] est sûr que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] a produit une antitoxine efficace contre la scarlatine." #NT!
 panum.743.f: "« Malgré les progrès récents dans la connaissance et le traitement de la scarlatine, cette maladie redoutée a fait un bond en avant par rapport à ses prévalences saisonnières. Lorsqu'elle est administrée suffisamment tôt, l'antitoxine atténue le danger de la scarlatine et ses complications ultérieures fréquentes. La maladie conserve cependant des aspects qui rendent son éradication extrêmement souhaitable. On a constaté que des doses croissantes de toxine administrées aux personnes sensibles rendaient ces personnes immunisées. »" #NT!
 panum.743.g: "Une percée décisive !" #NT!
  
