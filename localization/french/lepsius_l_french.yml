 je_lepsius_excavation_harappa: "Fouilles d'Harappa"
 je_lepsius_excavation_harappa_reason: "#T Les ruines de Palmyre en Syrie sont un endroit fascinant pour les archéologues.#!\n$mr_divider_for_je$\nEach mois, vous progresserez en fonction de nombreux facteurs différents. À certains moments de la fouille, vous recevrez un événement vous accordant [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')], de l'expérience et modifiant le trait d'état qui se traduit par plus de revenus [concept_curtiss_tourism].\n$mr_divider_for_je$\n$lepsius_excavation_progress_loc$"
 je_lepsius_excavation_harappa_0_loc: "Les ruines sont encore pour la plupart dans l’état où elles étaient depuis des siècles."
 je_lepsius_excavation_harappa_1_loc: "Les récentes fouilles et la restauration partielle du temple de Bel ont attiré davantage de personnes désireuses de visiter le site antique."
 je_lepsius_excavation_harappa_2_loc: "Nos archéologues ont fouillé et restauré plusieurs temples comme le temple de Bel, la vallée des tombeaux avec ses tombeaux-tours et bien d'autres lieux. Cela a pour conséquence d'attirer de plus en plus de visiteurs."
 lepsius.5020.t: "Le site de Harappa"
 lepsius.5020.d: "Nous ne savons pas encore grand-chose sur le site d’Harappa, mais nos archéologues sont impatients de découvrir les mystères de l’ancienne cité."
 lepsius.5020.f: "On ne sait pas encore à quel point le site a été endommagé pendant tout ce temps. Mais nos équipes archéologiques se préparent déjà à fouiller le site et explorent différents endroits pour voir où les fouilles seraient les plus prometteuses."
 lepsius.5020.g: "Un site d’une grande importance pour l’Inde"
 lepsius.5021.t: "Une ville en forme de grille"
 lepsius.5021.d: "Les fouilles ont permis de découvrir une ville construite en quadrillage. La ville devait être immense et nous ne savons pas encore combien de personnes ont pu y vivre autrefois."
 lepsius.5021.f: "\"It is quite fascinating that apart from Mesopotamia and Egypt there was another place where civilization originated. I would have never thought that India of all places could be home to one of the biggest bronze-age cities of the world.\" - One of your Archaeologists"
 lepsius.5021.g: "Un nouveau berceau de civilisation"
 lepsius.5022.t: "Les murs d'Harappa"
 lepsius.5022.d: "Nos archéologues ont fouillé un endroit qu'ils appellent aujourd'hui la Citadelle. On ne sait pas encore pourquoi les habitants de Harappa avaient besoin d'une place fortifiée dans leur ville."
 lepsius.5022.f: "\"Je suis absolument sûr qu'ils craignaient l'invasion des Marins !\"\n\"Les Marins étaient en Méditerranée, pas ici ! Je pense qu'ils devaient protéger leur nourriture de ces paysans embêtants !\"\n\"J'en doute fortement. Ils ont dû ériger un temple fortifié pour leurs dieux !\""
 lepsius.5022.g: "C'est fascinant !"
 lepsius.5023.t: "Système de drainage de Harappa"
 lepsius.5023.d: "Our excavation has brought a complex system of drainage and waste disposal to light. There even seem to be some toilets that were connected to those drainages."
 lepsius.5023.f: "« Je n'ai même pas de toilettes aussi modernes que celles des Harappéens ! Ils devaient être extrêmement avancés ! »"
 lepsius.5023.g: "Et dire que nous luttons encore aujourd'hui contre les eaux usées..."
 je_lepsius_petra: "Pétra – L'héritage des Nabatéens"
 je_lepsius_petra_reason: "Vers 1800, seuls quelques érudits connaissaient l'existence d'une cité légendaire creusée dans la roche au Moyen-Orient. Pétra n'a été redécouverte qu'en 1812 par l'aventurier suisse arabe Johann Ludwig Burckhardt. Bien que de nombreux voyageurs aient ensuite visité le site, une étude archéologique détaillée de Pétra n'a pas encore été réalisée."
 lepsius.77.t: "L'héritage des Nabatéens"
 lepsius.77.d: "Le docteur [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] a mené la première enquête archéologique sérieuse sur la ville de Pétra et a récupéré des vestiges du passé. Un acte scientifique inspirant !"
 lepsius.77.f: "Pétra, un site de ruines situé dans l'actuelle Jordanie, était autrefois la capitale de l'empire nabatéen. En raison de ses temples funéraires monumentaux, dont les façades ont été taillées directement dans la roche, elle est considérée comme un monument culturel unique. L'histoire de la ville est étroitement liée à celle de l'empire nabatéen, le premier empire arabe de l'histoire. Cependant, à l'exception de quelques inscriptions, les Nabatéens n'ont laissé que peu de traces écrites. Leur histoire et celle de Pétra ne peuvent donc être comprises que de manière fragmentaire et indirecte à travers des sources bibliques, grecques et romaines. Le bâtiment le plus célèbre de Pétra est le Khazne al-Firaun, haut de près de 40 mètres et large de 25 mètres, construit dans le style hellénistique. Le « Trésor du Pharaon », comme l'appelaient les Bédouins, était en fait l'une des nombreuses tombes rupestres. Il a peut-être été créé pour le roi nabatéen Arétas IV, qui régna au 1er siècle avant J.-C. D'autres chercheurs, cependant, datent le Khazne seulement du IIe siècle après J.-C., à l'époque de l'empereur Hadrien."
 lepsius.77.g: "C'est un endroit où l'on pourrait également cacher des objets occultes chrétiens."
