 lepsius_heidelbergensis_complete_tt: "Systématiser l'Homo Heidelbergensis en tant qu'espèce"
 andersson_anthropologist_achievement_completed_heidelbergensis_anthropologist_loc: "From a few fossils and thanks to the use of modern tools and [GetPlayer.MakeScope.Var('andersson_anthropologist_var').GetCharacter.GetHerHis] own incomparable genius, Professor [GetPlayer.MakeScope.Var('andersson_anthropologist_var').GetCharacter.GetLastNameNoFormatting] was the first to classify #o Homo Heidelbergensis#!."
 notification_lepsius_heidelbergensis_systemized_notification_name: "Homo Heidelbergensis décrit pour la première fois"
 notification_lepsius_heidelbergensis_systemized_notification_desc: "Des scientifiques ont identifié et analysé pour la première fois les ossements de l'Homo Heidelbergensis et ont décrit l'espèce en détail."
 lepsius_ishtar_gate_modifier: "Ishtar Gate"
 lepsius.313.h: "We need Dr. [SCOPE.sCharacter('lepsius_relaxing_archaeologist').GetLastName] elsewhere more urgently."
 lepsius.321.t: "Cataloging Completed"
 lepsius.321.d: "After many months of painstakingly organizing, identifying, numbering, and evaluating the remains found on the expedition, Doctor [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] has a free hand again."
 lepsius.321.f: "'Ultimately, we're history's bookkeepers—except our balance sheets are always in the red. We compile ignorance into tabular form. The only consolation is that, unlike archivists, we sometimes see the sun.'"
 lepsius.321.g: "If you do this for too long, you'll end up collecting the same dust as the artifacts."
 je_lepsius_cataloging: "Archaeological Cataloging"
 je_lepsius_cataloging_reason: "Archaeological cataloging refers to the systematic process of documenting, describing, and entering finds from archaeological excavations or existing collections into a database or inventory system. Each find is linked to its contextual data: location, stratigraphy, circumstances of discovery, material, dimensions, or dating.\n\nThe process takes significantly longer than an expedition and is often the reason why it takes so long for an archaeological team to set their sights on a new target. But what archaeologist would not be proud to fulfill this highly exciting duty?"
 je_archaeologist_dies_tt: "The Journal Entry will fail if the [concept_lepsius_archaeologist] dies."
