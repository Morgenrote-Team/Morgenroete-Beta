 lepsius_specialization_egypt_button: "égyptologie"
 lepsius_specialization_egypt_button_desc: "L'égyptologie explore tous les domaines de la civilisation égyptienne antique (vie quotidienne, langue et littérature, histoire, religion, culture et art, économie, droit, éthique et vie intellectuelle) depuis la préhistoire du 5ème millénaire avant JC. avant JC (par exemple les cultures Negade et Badari) jusqu'à la fin de la domination romaine au 4ème siècle après JC."
 lepsius_specialization_mesopotamia_button: "Assyriologie"
 lepsius_specialization_mesopotamia_button_desc: "L'assyriologie, également connue sous le nom d'études cunéiformes ou d'études sur le Proche-Orient ancien, est l'étude archéologique, anthropologique, historique et linguistique des cultures qui utilisaient l'écriture cunéiforme. Le domaine couvre la Mésopotamie prédynastique, Sumer, les premières cités-États suméro-akkadiennes, l'Empire akkadien, Ebla, les États de langue akkadienne et araméenne impériale d'Assyrie, de Babylonie et de la dynastie Sealand, les dynasties étrangères migrantes du sud de la Mésopotamie, y compris la Gutiens, Amoréens, Kassites, Araméens, Sutéens et Chaldéens."
 lepsius_specialization_aegean_button: "Archéologie égéenne"
 lepsius_specialization_aegean_button_desc: "La civilisation égéenne est un terme général désignant les civilisations de l'âge du bronze de la Grèce autour de la mer Égée. Il existe trois régions géographiques distinctes mais communicantes et en interaction couvertes par ce terme : la Crète, les Cyclades et le continent grec. La Crète est associée à la civilisation minoenne du début de l’âge du bronze. La civilisation cycladique converge avec le continent au début de la période helladique et avec la Crète au cours de la période minoenne moyenne. À partir de c. 1450 avant JC (Helladique tardif, Minoen supérieur), la civilisation grecque mycénienne s'étend en Crète, probablement par conquête militaire."
 lepsius_specialization_precolumbian_button: "Archéologie précolombienne"
 lepsius_specialization_precolumbian_button_desc: "Dans l'histoire des Amériques, l'ère précolombienne s'étend du peuplement initial des Amériques au Paléolithique supérieur jusqu'à la colonisation européenne, qui a commencé avec le voyage de Christophe Colomb en 1492. Habituellement, l'ère couvre l'histoire des cultures autochtones jusqu'à une influence significative. par les Européens. Cela peut s'être produit des décennies, voire des siècles après Colomb pour certaines cultures."
 lepsius_alexander_search_clue_button: "Trouver plus d'indices"
 lepsius_alexander_search_clue_button_desc: "Nous pouvons entreprendre une expédition archéologique spéciale pour trouver un autre indice sur le tombeau d'Alexandre le Grand."
 lepsius_ark_search_clue_button: "Trouver plus d'indices"
 lepsius_ark_search_clue_button_desc: "Nous pouvons entreprendre une expédition archéologique spéciale pour trouver un autre indice sur l’Arche d’Alliance."
 lepsius_atlantis_search_clue_button: "Trouver plus d'indices"
 lepsius_atlantis_search_clue_button_desc: "Nous pouvons entreprendre une expédition archéologique spéciale pour trouver un autre indice sur l’Atlantide."
 lepsius_eldorado_search_clue_button: "Trouver plus d'indices"
 lepsius_eldorado_search_clue_button_desc: "Nous pouvons entreprendre une expédition archéologique spéciale pour trouver un autre indice sur l’El Dorado."
 lepsius_legendary_expedition_modifier: "Expédition archéologique légendaire"
 lepsius_alexander_intensive_study_button: "Siwa"
 lepsius_alexander_intensive_study_button_desc: "L'oasis de Siwa est considérée comme l'un des lieux clés de la vie d'Alexandre. Certains prétendent même qu'il a été enterré ici plutôt qu'à Alexandrie, en raison de sa forte association avec le dieu égyptien Ammon, dont l'oracle se trouvait ici. Grâce à nos connaissances exceptionnelles dans le domaine de l’égyptologie, nous pouvons facilement trouver ici un indice supplémentaire. Notre archéologue voyagera en privé et secrètement, sans les tracas d'une expédition."
 lepsius_ark_intensive_study_button: "Jérusalem"
 lepsius_ark_intensive_study_button_desc: "On pense que le Mont du Temple de Jérusalem est le dernier endroit où l’Arche d’Alliance a été conservée avant sa disparition. Il est très probable qu’il existe encore sous le Mont du Temple des indices importants sur ce qui a réellement pu se produire dans le chaos de la conquête babylonienne. Grâce à nos connaissances exceptionnelles dans le domaine de l’assyriologie, nous pouvons facilement trouver ici un indice supplémentaire. Notre archéologue voyagera en privé et secrètement, sans les tracas d'une expédition."
 lepsius_atlantis_intensive_study_button: "Santorin"
 lepsius_atlantis_intensive_study_button_desc: "Santorin (Théra) est célèbre pour son éruption volcanique massive, qui a gravement affecté une ville minoenne de l'île et peut-être l'ensemble de la civilisation minoenne. La thèse selon laquelle l'éruption du volcan serait à l'origine de l'histoire de Platon sur le naufrage de l'Atlantide est l'une des nombreuses hypothèses de localisation concernant l'Atlantide. Grâce à nos connaissances exceptionnelles dans le domaine de l’archéologie égéenne, nous pouvons facilement trouver ici un indice supplémentaire. Notre archéologue voyagera en privé et secrètement, sans les tracas d'une expédition."
 lepsius_eldorado_intensive_study_button: "Bogota"
 lepsius_eldorado_intensive_study_button_desc: "Bogota est considérée comme l'ancienne capitale de la Muisca, une civilisation associée au mythe de l'or de l'Eldorado. Chaque nouveau souverain de la Muisca faisait un sacrifice au dieu soleil lors de son entrée en fonction, son corps nu étant recouvert d'une pâte faite de poussière d'or. Grâce à nos connaissances exceptionnelles dans le domaine de l’archéologie précolombienne, nous pouvons facilement trouver ici un indice supplémentaire. Notre archéologue voyagera en privé et secrètement, sans les tracas d'une expédition."
 lepsius_2_sub_archaeological_team_tt: "Perdez #R 2#! équipes d'excavation."
 lepsius_egypt_specialist: "Spécialisation : Égyptologie"
 lepsius_egypt_specialist_desc: "Cet archéologue est un expert dans le domaine de l’Égypte ancienne et trouve donc plus facilement des artefacts et des indices."
 lepsius_mesopotamia_specialist: "Spécialisation : Assyriologie"
 lepsius_mesopotamia_specialist_desc: "Cet archéologue est un expert dans le domaine de la Mésopotamie antique et trouve donc plus facilement des artefacts et des indices."
 lepsius_aegean_specialist: "Spécialisation : Archéologie égéenne"
 lepsius_aegean_specialist_desc: "Cet archéologue est un expert de la civilisation mycénienne et minoenne et trouve donc plus facilement des artefacts et des indices."
 lepsius_precolumbian_specialist: "Spécialisation : Archéologie précolombienne"
 lepsius_precolumbian_specialist_desc: "Cet archéologue est un expert des civilisations précolombiennes et trouve donc plus facilement des artefacts et des indices."
 lepsius_state_trait_alexander: "Traces d'Alexandre"
 lepsius_state_trait_ark: "Traces de l'Arche"
 lepsius_state_trait_atlantis: "Traces de l'Atlantide"
 lepsius_state_trait_eldorado: "Les traces de l'Eldorado"
 lepsius.1001.t: "L'appel d'Alexandre"
 lepsius.1001.d: "L'inauguration d'une excellente collection d'objets égyptiens de renommée mondiale ramène un souvenir que certains scientifiques du Musée archéologique avaient depuis longtemps supprimé..."
 lepsius.1001.f: "Le souvenir du temple macédonien dans le sable se réveille à mesure que [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetFullName] regarde l'exposition. Car il existe d’autres pièces de la période ptolémaïque, certaines même de l’époque de la conquête grecque. Les pièces du puzzle, auparavant impossibles à interpréter, prennent soudain un sens. Un indice qu'il pourrait y en avoir d'autres qui dorment dans le désert égyptien. Quelque chose de si grand et si massif que le Sahara tout entier ne suffit pas à l'enterrer. La dernière demeure d’Alexandre le Grand reste encore aujourd’hui un mystère. Mais les nombreuses découvertes, la grande quantité de connaissances et la brillante expertise archéologique du Dr [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] constituent un mélange historiquement unique. L'archéologue en est sûr : Alexandre était un homme qui appartenait aux vivants, pas aux morts. Et quiconque trouverait un jour son lieu de repos éternel obtiendrait une renommée éternelle."
 lepsius.1001.g: "Le rêve de tout archéologue..."
 lepsius.1002.t: "L'Arche"
 lepsius.1002.d: "L'inauguration d'une excellente collection d'objets mésopotamiens de renommée mondiale ramène un souvenir que certains scientifiques du Musée archéologique avaient depuis longtemps supprimé..."
 lepsius.1002.f: "Les Chérubins décoraient l'Arche d'Alliance. Créatures hybrides telles qu'elles se produisent en Mésopotamie. Abraham, l'ancêtre d'Israël et de trois religions mondiales, était originaire d'Ur. Le récit de la création montre des parallèles avec les mythes babyloniens. Babylone est en même temps un lieu de destin pour Israël : ce sont les dirigeants de la Mésopotamie qui détruisirent les premiers États juifs, réduisirent le Temple en cendres et déportèrent la population. Depuis ce jour, l’Arche d’Alliance, dans laquelle Moïse aurait placé les Dix Commandements, a également disparu sans laisser de trace. Il s’agit de l’un des objets perdus les plus importants de l’histoire du monde. En gardant un œil sur la collection parfaite, [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetFullName] a trouvé des indices qui montrent que l'Arche d'Alliance n'a peut-être pas été perdue pour toujours et qu'elle attend d'être récupérée depuis 2 500 ans."
 lepsius.1003.t: "Le plus grand mythe de tous"
 lepsius.1003.d: "L'inauguration d'une excellente collection d'objets égéens de renommée mondiale ramène un souvenir que certains scientifiques du Musée archéologique avaient depuis longtemps supprimé..."
 lepsius.1003.f: "[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetFullName] a regardé l'orichalque entre [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] doigts. Une petite boule brillante. Un matériau qui n'avait pas le droit d'exister. Il était tombé entre les mains du [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] après l'ouverture par le Musée Archéologique de sa magnifique exposition. Une exposition dans laquelle d'autres pièces provenant de la région minoenne-égéenne ont également consolidé l'opinion du [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] selon laquelle il s'agissait d'une frontière entre science et mythe. Un archéologue avait-il le droit de rêver ? Personne n'a cru Schliemann lorsqu'il cherchait Troie. La Tour de Babel a également été considérée comme une simple métaphore. Mais qu’en est-il du plus grand mythe de tous les temps ? Un mythe si grand que même le monde antique ne semblait plus savoir ce qu'était le récit ou ce qu'était l'histoire.\nDr. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] regarde la petite boule brillante dans laquelle se reflète le visage de [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis]. Le sort de toute une civilisation perdue revient."
 lepsius.1004.t: "La malédiction de l'or"
 lepsius.1004.d: "L'inauguration d'une excellente collection d'objets précolombiens de renommée mondiale ramène un souvenir que certains scientifiques du Musée archéologique avaient depuis longtemps supprimé..."
 lepsius.1004.f: "Depuis l’arrivée des Européens en Amérique, des rumeurs circulent. Des rumeurs meurtrières. D’innombrables hommes ont péri parce que leur avidité d’or les a poussés : dans les bras de tribus en guerre, dans des marécages infestés de paludisme et dans des tempêtes en mer. Ponce de Léon cherchait la fontaine de jouvence. Vázquez de Coronado a recherché les Sept Cités d'Or. Hernando de Soto a parcouru une grande partie de l'Amérique du Nord à la recherche de richesses inconnues. L'espoir de devenir célèbre et riche comme Cortés et Pizarro était trop séduisant, bien que trompeur. Mais maintenant que [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetFullName] s'inspire de la supposée idole inca et la compare avec d'autres artefacts de la riche exposition précolombienne, [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerselfHimself] craint que [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] ne succombe à la même fièvre de l'or. Au final, est-ce la science qui a conduit le [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim] sur la route de l'Eldorado ?"
 je_lepsius_archaeology_start_in_egypt: "La naissance de l'égyptologie"
 je_lepsius_archaeology_start_in_egypt_reason: "Il existe encore de nombreux trésors à découvrir dans les déserts égyptiens. L'un de nos archéologues inaugurera-t-il une nouvelle ère de l'égyptologie et rendra-t-il possible le [Concept('concept_lepsius_expedition','$concept_lepsius_expeditions$')] en Égypte ?"
 lepsius.22.t: "La naissance de l'égyptologie"
 lepsius.22.d_egyptology: "Après une expédition en Égypte, le Dr [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] a présenté les recherches [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis]. Non seulement [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] a pu trouver divers nouveaux sites grâce au déchiffrement des hiéroglyphes, mais les découvertes de [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] ont également suscité un nouvel intérêt dans la région."
 lepsius.22.f_egyptology: "#b Contexte historique :#! Après la mort de François Champollion, les recherches sur les hiéroglyphes s'arrêtent. En 1837, le jeune philologue allemand Karl Richard Lepsius écrivit une lettre à Ippolito Rosellini, un proche compagnon de Champollion et co-responsable de l'expédition franco-toscane égyptienne de 1829. Lepsius systématisa et présenta les connaissances accumulées par Champollion et contribua à élever l'égyptologie. à une science sérieuse. D’autre part, il a convaincu les élites politiques européennes de futures expéditions en Égypte."
 notification_lepsius_birth_of_egyptology_notification_name: "La naissance de l'égyptologie"
 notification_lepsius_birth_of_egyptology_notification_desc: "Un archéologue du [GetGlobalVariable('lepsius_egyptology_invented_country_global_var').GetCountry.GetName] s'est lancé dans une expédition en Égypte, inaugurant une nouvelle ère de l'égyptologie. Nous devrions aussi envoyer un archéologue en Égypte, comme toutes les grandes nations !"
 je_lepsius_yucatan_expedition: "Expédition au Yucatán"
 je_lepsius_yucatan_expedition_reason: "Des rumeurs circulent concernant des ruines antiques dans les jungles du Yucatán. On dit que des trésors fantastiques attendent un explorateur courageux. Peut-être qu’un archéologue pourra nous trouver les trésors mayas ? Cela nous permettrait, ainsi qu'à d'autres pays, d'embarquer sur le [Concept('concept_lepsius_expedition','$concept_lepsius_expeditions$')] vers le Yucatán."
 lepsius.23.t: "[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] Expédition"
 lepsius.23.d: "L'équipe des Drs [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] et [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] a passé des mois dans les jungles du Yucatán. Ils sont désormais revenus avec des trésors, des informations et divers dessins des ruines qu'ils ont trouvées. Cela marquera le début d’une nouvelle ère pour l’archéologie en Amérique centrale."
 lepsius.23.f: "#b Contexte historique :#! Le Nouveau Monde abritait-il uniquement des sauvages et des barbares avant que les Européens n'atteignent le continent ? Les explorateurs John Lloyd Stephens et Frederick Catherwood ont profondément ébranlé cette vision du monde. Pendant plusieurs années, l'Américain et le Britannique ont parcouru la jungle de la péninsule du Yucatan et, selon leurs propres déclarations, ont visité 44 lieux différents d'une culture mésoaméricaine disparue depuis longtemps. Les habitants racontent depuis longtemps des histoires de villes oubliées dans la jungle et de temples cachés dans la jungle ; mais les rapports de Stephens, et en particulier les superbes lithographies de Catherwood, ouvrent un monde jusqu'alors complètement inconnu. Les images de temples, de statues et de stèles n’inspirent pas seulement les fantasmes des romantiques. Une vague d’intérêt pour cette civilisation inconnue se répand aux États-Unis et en Europe, allant de la curiosité à la glorification en passant par un véritable intérêt scientifique."
 notification_lepsius_yucatan_expedition_notification_name: "Expédition au Yucatán"
 notification_lepsius_yucatan_expedition_notification_desc: "Un archéologue du [GetGlobalVariable('lepsius_yucatan_expedition_country_global_var').GetCountry.GetName] revient d'un voyage aventureux dans la péninsule du Yucatán et raconte des ruines légendaires dans la jungle. Les scientifiques ont exprimé leur intérêt pour une exploration plus approfondie de la culture maya."
 lepsius.1011.t: "[SCOPE.sState('lepsius_location_state').GetNameNoFormatting]"
 lepsius.1011.d_alexander: "Un autre chapitre de la recherche du tombeau de l’homme le plus puissant de l’Antiquité commence. Les informations jusqu'à présent suggèrent qu'il pourrait y avoir une piste dans le [SCOPE.sState('lepsius_location_state').GetName] qui pourrait aider à localiser le mausolée d'Alexandre. Les équipes de fouilles et le Dr [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] sont prêts."
 lepsius.1011.d_ark: "Un vent chaud du désert touche l'équipe d'expédition et le Dr [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] alors qu'ils atteignent le but de leur recherche avec [SCOPE.sState('lepsius_location_state').GetName]. Le secret de l’Arche d’Alliance sera une nouvelle fois dévoilé ici."
 lepsius.1011.d_atlantis: "Est-ce que [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] était un imbécile ? Un parmi des milliers d’années ? Combien avaient cru à l’histoire de Platon et n’y étaient jamais revenus – ou étaient pleins de honte et de chagrin ? Le Dr [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] le sait : il n'y a eu que du succès dans ce voyage. Tout le reste signifiait la fin de la carrière du [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis]."
 lepsius.1011.d_eldorado: "Les membres de l'expédition se plaignent du climat tropical. Le Dr [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] se rafraîchit avec un ventilateur. Le sentier mène à une région isolée. Certains porteurs disent qu'ils pourraient devenir aussi perdus que tant de troupes de conquistadors espagnols dans leur quête d'or..."
 lepsius.1011.f: "« Demandez-vous : pourquoi cherchez-vous la Coupe du Christ ? Est-ce pour sa gloire ou pour la vôtre ?"
 lepsius.1011.g: "Creusez plus profondément."
 lepsius.1012.t: "Retour réussi"
 lepsius.1012.d_alexander: "La chaleur insupportable disparaît un instant. Le Dr [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] examine les notes du [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis]. De nouvelles relations jettent un nouvel éclairage sur la recherche du mausolée d'Alexandre le Grand. Une pensée traverse l’esprit du [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis]. Il ne faudrait pas longtemps avant que [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] rencontre l'histoire... et entre dans l'histoire."
 lepsius.1012.d_ark: "La recherche de l’Arche d’Alliance était plus qu’une simple recherche d’un artefact archéologique. C'était la recherche d'un objet de culte perdu qui promettait le contact avec Dieu. Le Dr [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] en avait fait l'expérience à maintes reprises au cours de ce voyage. Mais combien de pèlerinages archéologiques le [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] a-t-il dû endurer avant que ce contact n'ait lieu ?"
 lepsius.1012.d_atlantis: "Le mythe de l’Atlantide perdure. Le Dr [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] sait que le voyage n’est pas encore terminé. Tandis que [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] regarde la mer depuis le port et voit les oiseaux tourner en rond, [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] philosophe sur les nombreux défis qu'il reste encore à surmonter avant d'atteindre enfin leur destination."
 lepsius.1012.d_eldorado: "À la surprise du reste de l’équipe de l’expédition, les scientifiques reviennent vivants et sains et saufs. Pendant un instant, il semble oublier que le Dr [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] les a envoyés en mission suicide. La réussite de cette étape sur le chemin de l'El Dorado donne raison au [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim]."
 lepsius.1012.f: "« La recherche du Graal est la recherche du divin en chacun de nous. Mais si vous voulez des faits, je n'en ai aucun à vous donner. À mon âge, je suis prêt à accepter certaines choses avec foi."
 lepsius.1012.g: "Un autre fragment d'une grande mosaïque."
 lepsius.1013.t_alexander: "Siwa"
 lepsius.1013.d_alexander: "Déguisé en Bédouin, le Dr [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] a pu à lui seul accéder à l'Oracle d'Ammon détruit. Au cours de l'enquête, [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] a trouvé des papyrus conservés du début du règne des Ptolémées dans une zone auparavant inaccessible, qui fournissent des informations sur le culte d'Alexandre."
 lepsius.1013.t_ark: "Jérusalem"
 lepsius.1013.d_ark: "Où, ailleurs que dans la Ville Sainte, pourrait-on trouver avec plus de certitude un indice indiquant le sort de l’Arche d’Alliance ? Avec un mélange de corruption et d'infraction à la loi, le Dr [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] a réussi à fouiller dans le système de tunnels cachés sous le Dôme du Rocher et à trouver un indice crucial sur l'endroit où se trouve le précieux artefact."
 lepsius.1013.t_atlantis: "Santorin"
 lepsius.1013.d_atlantis: "Des traces minoennes sont encore visibles à Santorin sous les décombres de l'éruption massive d'il y a des milliers d'années. Le Dr [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] a examiné un ancien palais victime du désastre catastrophique ; [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] a mis au jour et restauré toute une série de fresques enterrées. L’un d’eux montre une carte qui, de manière surprenante, montre avec précision les caractéristiques de la Méditerranée et de la côte ouest atlantique."
 lepsius.1013.t_eldorado: "Bogota"
 lepsius.1013.d_eldorado: "Le Dr [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] a exploré les environs de Bogotá, où vivait autrefois le mystérieux peuple Musica. Les conseils des habitants ont conduit le [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim] vers un lieu jusqu'alors inconnu, où de nombreux artefacts Muisca fournissent plus d'informations sur le rituel de « l'Homme d'or »."
 lepsius.1013.f: "Les pays qui se concentrent sur une branche archéologique spécifique cohérente avec l'objectif d'une expédition légendaire ont des avantages considérables dans leur quête d'une sensation archéologique. Cela ne s'applique pas seulement à l'obtention d'un indice supplémentaire qui accélérera votre recherche."
 lepsius.1013.g: "Un autre fragment d'une grande mosaïque."
 lepsius_discovery_vilcabamba_modifier: "La découverte de Vilcabamba"
 lepsius_peru_inspection_modifier: "Notre archéologue visite notre équipe de fouilles au Pérou pour établir un nouveau site de fouilles."
 lepsius_add_1_vilcabamba_clue_tt: "Obtenez #G 1#! nouvel indice sur une découverte archéologique importante au Pérou."
 lepsius_add_2_vilcabamba_clue_tt: "Obtenez #G 2#! nouvel indice sur une découverte archéologique importante au Pérou."
 lepsius_add_3_vilcabamba_clue_tt: "Obtenez #G 3#! nouvel indice sur une découverte archéologique importante au Pérou."
 je_lepsius_discovery_vilcabamba: "Enquêtes au Pérou"
 je_lepsius_discovery_vilcabamba_reason: "Nous avons toutes les raisons de croire que tous les mystères incas n’ont pas encore été résolus. La recherche pourrait nous prendre des années. Celui qui réussit à faire cette découverte devrait avoir une place dans l’histoire."
 je_lepsius_discovery_vilcabamba_goal: ""
 je_lepsius_disovery_vilcabamba_success: "Si nous parvenons à trouver dix indices au Pérou, nous aurons rassemblé suffisamment de matériel pour redécouvrir un lieu perdu d'une grande importance historique."
 je_lepsius_disovery_vilcabamba_fail: "Nos efforts seront vains si une autre nation trouve devant nous dix indices au Pérou."
 lepsius.801.n: "Pérou"
 lepsius.811.t_per: "Tombe d'un conquistador"
 lepsius.811.f_per: "Avec beaucoup d'intérêt, les archéologues ont découvert une porte verrouillée qui aurait donné accès au lieu de sépulture perdu d'un prince inca, peut-être même d'un dirigeant. Malheureusement, l'équipe a dû découvrir qu'il ne s'agissait pas de la tombe d'un Inca de haut rang, mais d'un conquistador espagnol. Cependant, le Dr [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] a déterminé qu'au moins l'intérieur et certains artefacts datent de la période inca, c'est pourquoi au moins quelques conclusions peuvent être tirées."
 lepsius.812.t_per: "Mine inca"
 lepsius.812.f_per: "Dans les profondeurs des Andes, le Dr [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] a trouvé un chemin perdu qui l'a conduit dans une fosse. Au début, cela semblait n'avoir aucune signification jusqu'à ce que l'équipe retire soigneusement les débris. Il s’est avéré que la fosse était l’entrée d’un système de grottes complexe créé artificiellement. Des investigations plus approfondies ont permis de découvrir des outils miniers, des objets du quotidien et des murs peints. Était-ce l’un des grands sites d’extraction d’or et d’argent à partir desquels les Incas fabriquaient leurs objets artistiques ?"
 lepsius.813.t_per: "Temple du Soleil"
 lepsius.813.f_per: "Une chance pour l'archéologie : le Dr [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] rapporte qu'il a découvert un complexe de temples jusqu'alors totalement inconnu dans les montagnes du Pérou. Il s'agit apparemment d'un lieu de culte pour le dieu solaire Inti. Les scientifiques ont non seulement trouvé de nombreux objets sur place, mais également des peintures et des robes de temple. Cette découverte fait sensation dans l’archéologie précolombienne."
 lepsius.971.t: "Découverte de Vilcabamba"
 lepsius.971.d: "C'est une journée sensationnelle pour la science internationale. Nous avons fait une belle découverte : La Cité Perdue de Vilcabamba a été découverte aujourd'hui par [ROOT.GetCountry.GetAdjectiveNoFlag] archéologues !"
 lepsius.971.f: "Vilcabamba fut la capitale de l'État néo-inca de 1539 à 1572. L'État néo-inca fut le dernier refuge de l'empire inca jusqu'à ce qu'il tombe aux mains des Espagnols et de leurs alliés indigènes en 1572, marquant la fin de la résistance des Incas à la domination espagnole. . Par la suite, Vilcabamba fut abandonnée et son emplacement oublié. En 1911, l'explorateur Hiram Bingham a identifié par erreur la ruine abandonnée du Machu Picchu comme étant Vilcabamba, mais il a également visité une ruine appelée Espiritu Pampa par les Péruviens locaux. En 1964, Gene Savoy a identifié Espiritu Pampa comme étant la légendaire Vilcabamba, une désignation largement acceptée par les archéologues et les historiens."
 lepsius.971.g: "Ce que même les conquistadors ne pouvaient pas faire, nous l'avons fait."
 lepsius.972.d: "[SCOPE.sCountry('lepsius_vilcabamba_discoverer').GetName] a fait une belle découverte : La Cité Perdue de Vilcabamba a été découverte aujourd'hui !"
 lepsius.972.f: ""
 lepsius.972.g: "C'est dommage qu'ils ne soient pas perdus."
 je_lepsius_nazca: "Les étranges lignes de Nazca"
 je_lepsius_nazca_reason: "Les lignes étranges du paysage proche de la ville de Nazca suscitent des interrogations depuis la conquête espagnole. Certains les considèrent comme des vestiges d'un réseau routier ou de ravines d'eau. Un archéologue pourrait peut-être obtenir une vue d'ensemble correcte - avec l'aide d'un pilote."
 lepsius.76.t: "Le mystère de Nazca vu du ciel"
 lepsius.76.d: "[GetPlayer.MakeScope.Var('curtiss_pilot_var').GetCharacter.GetLastName] took Dr. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] on a flight. Now the scientist can see much more clearly what the lines on the ground mean. When viewed from a suitable height, the lines turn out to be something more complex. There are dozens of scratched images of animals and figures from pre-Columbian times. An incredible archaeological discovery!"
 lepsius.76.f: "Les lignes de Nazca sont plus de 1 500 immenses images à gratter (géoglyphes) situées dans le désert près de Nazca et de Palpa au Pérou, qui ne peuvent être vues et reconnues que depuis les airs et depuis les collines environnantes. Les lignes, le désert et la culture portent le nom de la ville de Nazca, située non loin de la plaine. La culture Paracas et la culture Nazca sont considérées comme à l'origine des lignes. Sur une superficie de 500 km², la plaine de Nazca présente des lignes droites mortes, des triangles et des surfaces trapézoïdales pouvant atteindre 20 km de long, ainsi que des personnages dont la taille varie d'une dizaine à plusieurs centaines de mètres, par exemple des images de personnes, de singes, d'oiseaux et baleines. Les lignes qui forment la silhouette n'ont souvent que quelques centimètres de profondeur. En raison de leur taille énorme, ils ne peuvent être vus que de très loin, depuis les collines environnantes ou depuis les avions. En ce sens, les lignes de Nazca n’ont été découvertes que dans les années 1920 ou au plus tard dans les années 1930, lorsque des avions survolaient régulièrement le désert de Nazca. En 1926, les lignes de Nazca ont été décrites pour la première fois scientifiquement."
 lepsius.76.g: "Mais quelle pourrait être la véritable signification de ces images ?"
