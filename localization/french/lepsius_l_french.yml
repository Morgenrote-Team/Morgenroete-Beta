 lepsius.1601.t: "Don de [SCOPE.sCharacter('lepsius_donator_scope').GetLastName]"
 lepsius.1601.d: "[SCOPE.sCharacter('lepsius_donator_scope').GetFullName] est considéré comme un collectionneur de raretés égyptiennes rares. Ses intérêts égyptologiques l’ont amené à posséder aujourd’hui une remarquable collection. Il a généreusement proposé de faire don de ses objets exquis au Musée archéologique."
 lepsius.1602.d: "C’est un fait bien connu que [SCOPE.sCharacter('lepsius_donator_scope').GetFullName] possède probablement la collection privée d’objets mésopotamiens la plus impressionnante. Il a signalé au gouvernement que cette collection pourrait être transférée aux mains de l'État, même si certains observateurs critiques préviennent qu'il pourrait exiger quelque chose en retour."
 lepsius.1603.d: "[SCOPE.sCharacter('lepsius_donator_scope').GetFullName] n'est peut-être pas considéré comme l'homme le plus amateur d'art, mais par hasard, il a découvert des trésors archéologiques de grande valeur sur sa propriété, qu'il garde sous clé depuis quelques années. Comme il ne peut pas faire grand-chose avec eux, il a proposé au gouvernement d'en faire don au Musée Archéologique."
 lepsius.1604.d: "[SCOPE.sCharacter('lepsius_donator_scope').GetFullName] a effectué plusieurs voyages à travers l'Amérique du Sud ces dernières années, où il a rassemblé d'importantes reliques des cultures mésoaméricaines et andines comme souvenirs. Il a maintenant annoncé qu'il souhaitait faire don de ces objets au musée."
 lepsius.1605.d: "[SCOPE.sCharacter('lepsius_donator_scope').GetFullName] a été impressionné par les anciennes cultures égéennes. Il collectionne des objets de Crète depuis quelques années et a même fait apporter une fresque minoenne entière dans sa villa. Cependant, connaissant ses obligations sociales, il décida de faire don de ses trésors au peuple [ROOT.GetCountry.GetAdjectiveNoFlag]."
 lepsius.1601.f: "De nombreuses collections archéologiques remontent aux princes de la Renaissance, qui collectionnaient des objets d'art anciens et les achetaient par l'intermédiaire de marchands. En 1824, le roi Charles Félix acquiert le matériel de la collection Drovetti (5 268 pièces, dont 100 statues, 170 papyrus, stèles, momies et autres objets) que le consul général de France, Bernardino Drovetti, avait construit lors de son séjour en Égypte. Cela devint plus tard la base du Musée égyptien de Turin. Les riches entrepreneurs et les élites influentes avaient également intérêt à collectionner des symboles de statut social, qu’ils faisaient souvent don au public dans leur testament. Il arrive souvent que les gens souhaitent non seulement améliorer leur propre réputation grâce à de tels dons, mais espèrent également une meilleure position dans la société."
 lepsius.1601.g: "Un merveilleux don pour notre musée !"
 lepsius.1601.h: "Ce flagorneur essaie juste d'en profiter."
 lepsius.1606.t: "Égyptomanie"
 lepsius.1606.d: "Un groupe de personnes passionnées par l’Égypte s’est réuni. Le groupe est dirigé par [SCOPE.sCharacter('lepsius_esoteric_leader').GetFullName]. Certains ne partagent peut-être pas l’admiration presque fanatique de l’Égypte ancienne, mais son apparence peut présenter des avantages."
 lepsius.1606.f: "Bien que le XIXe siècle soit considéré comme progressiste à bien des égards et dominé par l’esprit scientifique, c’est précisément à cette époque que plusieurs formes de phénomènes occultes et pseudo-scientifiques se sont répandues. Le plus connu d’entre eux est le spiritualisme, qui voulait prouver l’existence des esprits. La recherche archéologique a non seulement inspiré de nombreuses théories erronées, mais aussi des mouvements pseudo-scientifiques et ésotériques tels que le panbabylonisme, le mayanisme et la croyance en l’Atlantide. Bien que de tels phénomènes puissent souvent avoir un effet corrosif sur la science, certains phénomènes ont bénéficié d'une certaine mode et ont popularisé la recherche scientifique selon laquelle ils pouvaient avoir des effets secondaires très fructueux."
 lepsius.1606.g: "Qu'ils s'adonnent à leur petit culte."
 lepsius.1606.h: "Bannissez cette connerie."
 lepsius.1607.t: "Mayanisme"
 lepsius.1607.d: "Certaines élites de notre pays sont tombées dans l’étrange idée fausse selon laquelle le monde suit un ancien calendrier remontant aux Mayas. De plus, ce peuple aurait possédé des connaissances détenant les secrets de l’univers. On pourrait rire de ces idées absurdes si le groupe influent n'était pas dirigé par [SCOPE.sCharacter('lepsius_esoteric_leader').GetFullName]."
 lepsius.1608.t: "Panbabylonisme"
 lepsius.1608.d: "Un groupe de personnes a provoqué un émoi dans la société et la science en insistant sur le fait que toute connaissance vient de Babylone ; même les religions juive et chrétienne ne sont qu’une simple imitation. [SCOPE.sCharacter('lepsius_esoteric_leader').GetFullName] est également impliqué dans ce « Club des Panbabylonistes » qui tentent de diffuser leurs idées."
 lepsius.1608.g: "C'est de la pseudoscience !"
 lepsius.1608.h: "Super."
 lepsius.1609.t: "Atlantisme"
 lepsius.1609.d: "[SCOPE.sCharacter('lepsius_esoteric_leader').GetFullName] dirige un groupe ésotérique-pseudo-scientifique qui prétend que l'Atlantide n'est pas un mythe, mais une ville historique dotée d'une technologie avancée à l'époque glaciaire. De plus, toutes les cultures descendent de l’Atlantide. Il souhaite entrer en contact avec les esprits des Atlantides lors de séances hebdomadaires."
 lepsius.1609.h: "Qui peut dire si c'est vrai ou si c'est juste une légende ?"
 lepsius.1609.i: "Il existe des preuves solides de l’Atlantide."
 lepsius.1610.t: "Investissement archéologique"
 lepsius.1610.d: "Le directeur du Musée archéologique a proposé de soutenir la formation de nouveaux spécialistes. Cependant, cela entraînerait des coûts supplémentaires."
 lepsius.1610.f: "L'Institut a appris que le gouvernement porte actuellement un intérêt particulier à la promotion de l'archéologie dans notre pays. Un soutien financier supplémentaire pourrait aider à recruter de nouveaux assistants prometteurs.»"
 lepsius.1610.g: "Donnez au musée une injection financière supplémentaire."
 lepsius.1610.h: "Cela n'en vaut pas la peine."
 lepsius.1611.t: "Billets de musée"
 lepsius.1611.d: "Afin de couvrir la hausse des coûts, le musée est contraint d'augmenter le prix des billets. L’État pourrait s’emparer des bénéfices supplémentaires. Cependant, cela pourrait légèrement nuire à notre réputation."
 lepsius.1611.f: "'Pas de ticket!'"
 lepsius.1611.g: "Augmentez le prix des billets."
 lepsius.1611.h: "Baisser le prix des billets."
 lepsius.1611.i: "Des billets? Le musée devrait avoir une entrée gratuite !"
 lepsius.1612.t: "L'héritage du réalisateur [SCOPE.sCharacter('lepsius_director_scope').GetLastName]"
 lepsius.1612.d: "Le directeur du musée [SCOPE.sCharacter('lepsius_director_scope').GetLastName], récemment décédé, était un homme respecté. Il jouissait d'une excellente réputation scientifique. Mais une récente découverte pourrait ternir son héritage."
 lepsius.1612.f: "Une enquête a montré que [SCOPE.sCharacter('lepsius_director_scope').GetFullName] a reçu à plusieurs reprises des dons privés de personnes anonymes au cours de son mandat. Cependant, il n'a jamais donné ces objets au musée, mais les a gardés pour lui. Bien qu’il n’y ait que quelques pièces individuelles, elles n’en sont pas moins précieuses. L’Intelligentsia tout entière est menacée d’un véritable scandale."
 lepsius.1612.g: "La vérité doit éclater !"
 lepsius.1612.h: "[SCOPE.sCharacter('lepsius_director_scope').GetFullName] était un homme honorable."
 je_lepsius_pompeii: "Fouilles modernes à Pompéi"
 je_lepsius_pompeii_reason: "L'ancienne ville romaine de Pompéi, qui a été ensevelie par une éruption du Vésuve en 79 après JC, a été fouillée depuis le XVIIIe siècle. À bien des égards, cependant, ce type d’exploration peut en grande partie être décrit comme du pillage, détruisant du matériel scientifique pour acquérir des trésors artistiques ou détruisant du matériel de valeur par pure ignorance. De nouvelles méthodes archéologiques pourraient améliorer considérablement la recherche à Pompéi."
 je_lepsius_teotihuacan: "Teotihuacan"
 je_lepsius_teotihuacan_reason: "Teotihuacán était déjà considérée comme un lieu mystérieux par les Aztèques, apparus bien avant leur domination : pour eux, cette ville en ruines devait être le lieu de naissance des dieux. En fait, de nombreuses preuves suggèrent que Teotihuacán était une ville ancienne qui a influencé une grande partie de l’Amérique centrale des siècles avant l’empire aztèque et constitue l’un des plus grands sites précolombiens des Amériques. Le gouvernement mexicain a donc plus que de simples raisons scientifiques pour enquêter plus en détail sur cet endroit. Teotihuacán peut être considérée comme le symbole d’une culture longue et ininterrompue au Mexique et donc comme un précurseur de notre nation. La reconstruction de la Pyramide du Soleil de Teotihuacán, partiellement détruite, avant le 100e anniversaire de l'indépendance, vise à souligner ce symbolisme et à célébrer l'unité et l'histoire nationales."
 je_lepsius_harappa: "La civilisation de la vallée de l'Indus"
 je_lepsius_harappa_reason: "Bien que le site de ruines d'Harappa soit connu depuis un certain temps et ait été décrit pour la première fois par Charles Masson en 1844 dans son livre « Récit de divers voyages au Baloutchistan, en Afghanistan et au Panjab » comme « une fortification en ruine construite en brique », sa signification est pas encore complètement éclairci. Peut-être existe-t-il également en Inde des trésors archéologiques jusqu’alors totalement inconnus ?"
 je_lepsius_first_emperor: "Le tombeau du premier empereur"
 je_lepsius_first_emperor_reason: "La Chine est une nation jeune dans le domaine de l'archéologie. Nos chercheurs ont besoin de partir à la découverte du monde et d'acquérir de l'expérience pour approfondir leurs connaissances. Ce n'est que lorsque nous aurons suffisamment de succès et que nos archéologues seront suffisamment formés que nous pourrons tenter la plus grande aventure archéologique : à savoir examiner le tombeau du Premier Empereur, une tâche que personne n'a encore osé entreprendre."
 lepsius.7.t: "Les fouilles de Pompéi"
 lepsius.7.d: "A Pompéi, de nouvelles méthodes scientifiques doivent être testées sous la direction du Prof. [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName]. Il s’agit d’un tournant dans l’histoire des fouilles de Pompéi. Cependant, l’orientation de la recherche doit encore être décidée."
 lepsius.7.f: "Les fouilles de Giuseppe Fiorelli ont ouvert un nouveau chapitre dans l'étude et les fouilles de Pompéi. Lors des premières fouilles du site, des vides occasionnels dans la couche de cendres ont été découverts, contenant des restes humains. Fiorelli s'est rendu compte qu'il s'agissait d'espaces laissés par les corps décomposés et a donc conçu la technique consistant à y injecter du plâtre pour recréer les formes des victimes du Vésuve. Cette technique est toujours utilisée aujourd'hui, avec une résine transparente désormais utilisée à la place du plâtre car elle est plus durable et ne détruit pas les os, permettant une analyse plus approfondie. Fiorelli a également introduit la documentation scientifique. Il a divisé la ville en neuf quartiers et pâtés de maisons actuels et a numéroté les entrées des maisons individuelles. Fiorelli a également publié le premier périodique contenant des rapports de fouilles. Sous ses successeurs, toute la partie ouest de la ville fut exposée."
 lepsius.7.g: "Nous nous intéressons principalement aux artefacts."
 lepsius.7.h: "Nous devons en savoir plus sur le passé."
 lepsius.7.i: "Nous voulons former une nouvelle génération de scientifiques."
 lepsius.8.t: "La Pyramide du Soleil de Teotihuacán"
 lepsius.8.d: "[SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName] regarde le panorama de Teotihuacán depuis le point culminant de la pyramide reconstruite : ce projet prestigieux a surmonté un obstacle important, mais on ne sait toujours pas quel bénéfice concret le pays tirera des fouilles."
 lepsius.8.f: "Teotihuacán, dans les hauts plateaux du centre du Mexique, est l'une des métropoles de ruines préhistoriques les plus importantes des Amériques, surtout connue pour ses temples à gradins tels que la Grande Pyramide du Soleil. La région de Teotihuacán était habitée en permanence depuis le VIe siècle avant JC. Entre 100 et 650 après JC, la ville était le centre culturel, économique et militaire dominant de la Méso-Amérique. Au sommet de son développement, elle comptait peut-être jusqu'à 200 000 habitants. À l’époque, elle était de loin la plus grande ville du continent américain et l’une des plus grandes au monde. À partir de 650 environ, son importance déclina jusqu'à environ 750, elle fut en grande partie abandonnée pour des raisons qui ne sont pas entièrement comprises. Leurs influences culturelles ont continué à façonner le centre du Mexique jusqu'à la conquête espagnole du Mexique."
 lepsius.9.t: "Une civilisation inconnue"
 lepsius.9.d: "[SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName] est complètement étonné. Il semble qu'il ait trouvé les traces d'une culture jusqu'alors totalement inconnue, installée dans la vallée de l'Indus il y a des milliers d'années - et qui serait donc un berceau de civilisation comme l'Egypte ou Babylone. Des décennies de recherche sont en cours, mais quelles sont les priorités ?"
 lepsius.9.f: "La civilisation de l'Indus de l'âge du bronze, également connue sous le nom de civilisation de l'Indus ou culture harappéenne, était l'une des premières civilisations urbaines. Il existait entre 2800 et 1800 avant JC environ le long de l'Indus, au nord-ouest du sous-continent indien. La civilisation de l'Indus s'étendait sur presque tout ce qui est aujourd'hui le Pakistan ainsi que sur certaines parties de l'Inde et de l'Afghanistan. En 1912, J. Fleet découvrit des phoques aux caractères inconnus dans ce qui était alors l’Inde britannique, ce qui suscita l’intérêt du public scientifique européen. Des fouilles furent ensuite menées à Harappa et Mohenjo-Daro en 1921/22 sous la direction de John Marshall, alors directeur du British Antiquities Service. La similitude des deux villes fouillées a rapidement montré qu'une culture avancée jusqu'alors inconnue avait été découverte ici."
 lepsius.70.t: "Une armée de terre cuite"
 lepsius.70.d: "[SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName] a fait une découverte étonnante en examinant la zone autour du mausolée du premier empereur Qin : une armée entièrement faite de terre cuite qui défend encore aujourd'hui l'empereur mort."
 lepsius.70.f: "« Au neuvième mois, le Premier Empereur fut enterré au Mont Li. Les travaux de fouille et de préparation du mont Li ont commencé lorsque le premier empereur est arrivé sur le trône. Plus tard, après avoir unifié son empire, 700 000 hommes y furent envoyés de tout son empire. Ils ont creusé trois couches d’eau souterraine et ont coulé du bronze pour le cercueil extérieur. Des palais et des tours panoramiques pour une centaine de fonctionnaires ont été construits, et le tombeau était rempli d'objets rares et de merveilleux trésors. Les artisans ont reçu l'ordre de fabriquer des arbalètes et des flèches prêtes à tirer sur toute personne entrant dans la tombe. Mercure a été utilisé pour simuler les cent fleuves, le Yangtsé, le fleuve Jaune et la grande mer, et a été mis à s'écouler mécaniquement. Au-dessus se trouvaient la représentation des constellations célestes, en dessous, les caractéristiques de la terre. Les bougies étaient fabriquées à partir de graisse d'« homme-poisson », conçue pour brûler et ne pas s'éteindre pendant longtemps. -Sima Qian"
 lepsius.70.g: "La grandeur ancienne de la Chine est stupéfiante."
 lepsius.61.t: "Les fouilles au [SCOPE.sState('lepsius_excavation_state').GetName]"
 lepsius.61.d: "Pendant l'occupation du [SCOPE.sState('lepsius_excavation_state').GetName], les équipes archéologiques et les artefacts sont tombés entre nos mains. Les archéologues insistent pour ne pas interrompre les travaux scientifiques et protéger le site de fouilles. Certains officiers insistent cependant pour que nous nous servions nous-mêmes du butin."
 lepsius.61.f: "Malheureusement, le pillage d’importants sites de fouilles n’est pas rare. Les armées qui approchaient n’étaient pas toujours à la hauteur de leur réputation de préservation et de protection des trésors artistiques. Dans certains cas, c'est seulement la perspective de revenir avec un butin supplémentaire qui a éveillé les désirs d'hommes ambitieux - pourquoi ce qui était vrai à l'époque de Sulla serait-il différent aujourd'hui ?"
 lepsius.61.g: "Pillez le site de fouilles !"
 lepsius.61.h: "Protégez le chantier de fouille."
 lepsius.62.t: "Chantier de fouilles pillé !"
 lepsius.62.d: "La guerre dans l'un de nos pays de fouilles a laissé des traces : les troupes ennemies ont occupé la région dans laquelle un site archéologique est étudié et ont sommairement confisqué les artefacts trouvés par notre équipe, laissant derrière elles une traînée de destruction."
 lepsius.62.f: "Les sites de fouilles archéologiques peuvent devenir victimes de guerres et de destructions – cela affecte également les équipes archéologiques neutres qui ne font pas partie d’une nation belligérante en tant que tierce partie. Les nations rapaces peuvent alors utiliser les artefacts qui n’ont pas encore été restitués à leurs pays d’origine respectifs. Ne vous inquiétez pas : l'équipe de fouille reste sur place et la fouille n'est pas perdue. Il faudra cependant trois ans avant que les archéologues aient réparé les dégâts de manière à ce que les opérations normales soient à nouveau possibles. Pendant cette période, aucun artefact annuel provenant de ce site archéologique ne parviendra à nos musées."
 lepsius.62.g: "Ces barbares !"
 lepsius_excavation_sacked_state_modifier: "Site archéologique pillé"
 lepsius_excavation_protected_state_modifier: "Site archéologique protégé"
 lepsius_4_excavation_team_needed_tt: "Disposer d'au moins #G 4#! équipes d'excavation."
 lepsius.2101.t: "Vestiges d'une bataille romaine"
 lepsius.2101.f: "\"Monsieur, j'ai trouvé un autre clou !\"\n\"Fabuleux ! Cela renforce la théorie selon laquelle cet endroit a été le théâtre d'une ancienne bataille ! J'espère que nous trouverons également des ossements bientôt !\""
 lepsius.2101.g: "Pas une découverte prestigieuse, mais importante !"
 lepsius.2102.t: "Villa Rustica découverte"
 lepsius.2102.f: "\"La Villa Rustica n'était pas seulement un important producteur de produits agricoles, de nourriture et de boissons. Elle permettait également aux voyageurs de se reposer pendant leur voyage et jouait un rôle déterminant dans l'approvisionnement des légions. Ces vestiges nous permettent de tirer des conclusions sur la production alimentaire et la vie des Romains. et l'agriculture dans l'Imperium Romanum.\""
 lepsius.2102.g: "Cela nous en apprendra beaucoup sur la vie des Romains ruraux !"
 lepsius.2103.t: "Des tablettes romaines antiques découvertes"
 lepsius.2103.f: "Claudia Severa à ses salutations Lepidina.\nLe 11 septembre, ma sœur, pour le jour de la célébration de mon anniversaire, je vous invite chaleureusement à faire en sorte que vous veniez chez nous, pour que votre arrivée me rende la journée plus agréable. , si vous êtes présent. Saluez votre Cerialis. Mon Aelius et mon petit fils lui envoient leurs salutations.\nJe t'attends, sœur. Adieu, sœur, ma très chère âme, alors que j'espère prospérer, et je vous salue.\nA Sulpicia Lepidina, épouse de Cerialis, de Cl. Sévère."
 lepsius.2103.g: "Tous les trésors ne sont pas faits d’argent et d’or !"
 lepsius.2104.t: "Découverte d'un trésor de pièces de monnaie romaines"
 lepsius.2104.d: "Les trésors de pièces de monnaie romaines sont une trouvaille rare. Néanmoins, un a été trouvé au [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]. Le Dr [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] a pu récupérer le trésor qui était probablement caché pendant une période de crise pour l'Imperium Romanum."
 lepsius.2104.f: "\"Je me demande si les archéologues du futur trouveront un jour des pièces que nous avons laissées et se demanderont comment elles se sont retrouvées là.\""
 lepsius.2104.g: "Mon précieux!"
 lepsius.2111.t: "Sarcophage persan antique"
 lepsius.2111.f: "\"Attention, attention. Nous ne pouvons pas laisser cette trouvaille être endommagée. Veuillez vous abstenir d'utiliser un pied de biche dessus !\""
 lepsius.2111.g: "Quelle trouvaille incroyable!"
 lepsius.2112.t: "Trésor de Palais Perse"
 lepsius.2112.d: "L'indice d'un agriculteur a conduit [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullName] à un palais persan perdu de la période achéménide. Lors des fouilles qui ont suivi, une surprise s'est produite."
 lepsius.2112.f: "La Mésopotamie était l’une des principales provinces de l’ancien empire perse. Au cours de la conquête, les Achéminides rapportèrent dans leur pays de nombreuses œuvres d'art ainsi que des tablettes cunéiformes. Néanmoins, il a été surprenant pour l’équipe archéologique de déterrer des archives entières de tablettes mésopotamiennes dans une partie du palais qu’elles ont découvert."
 lepsius.2112.g: "Collectez les tous!"
 lepsius.2113.t: "Statue égyptienne dans le tombeau persan"
 lepsius.2113.d: "Une petite fouille dans la tombe d'un noble perse a mis au jour une petite figure du dieu égyptien Thot."
 lepsius.2113.f: "Les Perses ont gouverné l’Égypte pendant plus d’un siècle. Mais même avant et après, il y avait un échange culturel entre les deux civilisations, même si la guerre était courante entre les deux empires."
 lepsius.2113.g: "Comment l’artefact est-il arrivé ici ?"
 lepsius.2114.t: "Inscription monumentale"
 lepsius.2114.d: "Un glissement de terrain a mis au jour une inscription rupestre monumentale dans une montagne que l’on croyait perdue. Le Dr [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] s'est mis directement à évaluer l'ancien rapport."
 lepsius.2114.f: "Les inscriptions ou reliefs rupestres persans ont une place permanente dans l’art de l’empire déchu. La plus célèbre est l'inscription de Behistun, qui est une inscription royale achéménide multilingue et un grand relief rocheux sur une falaise du mont Behistun dans la province de Kermanshah en Iran, établie par Darius le Grand. Elle était importante pour le déchiffrement du cunéiforme, car il s'agit de la plus longue inscription cunéiforme trilingue connue, écrite en vieux persan, élamite et babylonien (une variété d'akkadien)."
 lepsius.2114.g: "Une source primaire importante sur l’histoire perse !"
 lepsius_state_trait_tikal: "Tikal - City in the Jungle\n#G +1#! @lepsius_local_minor! Local Artifact from Archaeological Projects"
 je_lepsius_tikal: "Tikal - Ville dans la jungle"
 je_lepsius_tikal_reason: "L'expédition de Stephens & Catherwood a suscité un grand intérêt, en particulier après qu'un livre présentait de nombreuses illustrations de cités mayas perdues. Mais les deux aventuriers n'avaient pas trouvé toutes les places. De nombreux sites méconnus attendaient encore d’être redécouverts. L'un d'eux était le légendaire Tikal."
 lepsius.71.t: "Tikal - Ville dans la jungle"
 lepsius.71.d: "Après une recherche laborieuse au cœur des jungles du Guatemala, une expédition dirigée par le professeur [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] a retrouvé la légendaire cité maya de Tikal. Un événement historique pour notre nation, mais quelle conclusion devons-nous en tirer ?"
 lepsius.71.f: "Tikal est une ancienne ville maya située dans les forêts tropicales humides du Petén, au nord du Guatemala, dotée de temples à marches remarquables. C'était l'une des villes les plus importantes de la période maya classique (du IIIe au IXe siècle) et l'une des villes mayas les mieux étudiées. Les premières traces de peuplement remontent au début du 1er millénaire avant JC. Au IIe siècle, le véritable développement urbain commença avec la construction de temples, de stèles et de complexes palais-temples. Un premier point culminant a été atteint au 5ème siècle, lorsqu'une puissante dynastie dirigeante a soumis les petits États voisins les uns après les autres et les a transformés en royaumes vassaux, ce qui a abouti à un conflit à long terme avec le puissant État voisin de Calakmul. Tikal a connu un deuxième apogée au 8ème siècle après la défaite de Calakmul en tant que rival. Au début du IXe siècle, la puissance de Tikal déclina et la construction cessa. Au plus tard au Xe siècle, la ville était complètement déserte."
 LEPSIUS_NO_MORE_EXPEDITIONS_FOR_YEARS_TT: "Vous #n ne#! ne pourrez pas réaliser de [Concept('concept_lepsius_expedition','$concept_lepsius_expeditions$')] pendant #n 3 à 5 ans#!, car votre [concept_lepsius_archaeologist] sera occupé à cataloguer les trouvailles."
 LEPSIUS_SUB_TEAM_WITH_EXPLANATION_TT: "Perdez #R 1#! [Concept('concept_lepsius_archaeological_team','$concept_lepsius_excavation_team$')]. Vous pouvez le récupérer #p#! après le [concept_lepsius_expedition] ou le laisser là pendant un [concept_lepsius_excavation] si vous avez recherché le #V Technologie d'archéologie ancienne#!."
 lepsius_long_expedition_tt: "Un [concept_lepsius_expedition] long prendra environ #V 1 an#!. Après l'expédition le [concept_lepsius_archaeologist] devra cataloguer les trouvailles et vous ne pourrez #p pas#! mener une autre expédition pendant #n 5 ans#!."
 lepsius_medium_expedition_tt: "Un médium [concept_lepsius_expedition] prendra environ #V 10 mois#!. Après l'expédition le [concept_lepsius_archaeologist] devra cataloguer les trouvailles et vous #p ne#! pourrez mener une autre expédition pendant #n 4 ans#!."
 lepsius_short_expedition_tt: "Un court [concept_lepsius_expedition] prendra environ #V 8 mois#!. Après l'expédition le [concept_lepsius_archaeologist] devra cataloguer les trouvailles et vous ne pourrez #p pas#! mener une autre expédition pendant #n 3 ans#!."
 lepsius_leave_team_for_excavation_tt: "Vous laisserez votre [Concept('concept_lepsius_archaeological_team','$concept_lepsius_excavation_team$')] configurer un [concept_lepsius_excavation] qui donnera généralement #V 1#! [concept_lepsius_artifact] #V par an#!."
 lepsius.2101.d: "Lorsqu'un citoyen a trouvé un poignard de fer au [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName], [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullName] a rassemblé une équipe et a commencé une fouille. Ils ont trouvé divers vestiges d’une ancienne bataille romaine, allant de parties d’un bouclier à des clous et quelques pièces de monnaie. Les pièces de monnaie ont permis aux archéologues de dater la bataille avec assez de précision."
 lepsius.2102.d: "Un agriculteur a trouvé des restes anciens dans l'un de ses champs. Heureusement, il a contacté l'université et le Dr [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] a pu découvrir une ancienne Villa Rustica au [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]. La variété des découvertes archéologiques permet de tirer des conclusions sur la vie de la population romaine à la campagne."
 lepsius.2103.d: "La découverte de diverses tablettes romaines en bois mince au [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] est célébrée parmi les archéologues. Bien que le Dr [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] n'ait pu trouver la signification de quelques tablettes avec les méthodes actuelles, même ces quelques tablettes ouvrent une fenêtre sur la vie romaine."
 lepsius.2111.d: "Une découverte extraordinaire de l’ancien empire perse a été faite au [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]. Un fermier a trouvé un vieux sarcophage en bronze et a contacté le Dr [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]. Grâce à l'expertise du [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis], le Dr [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] a pu ouvrir le sarcophage et a découvert un squelette recouvert de bijoux luxueux. Les bijoux suggèrent qu'il s'agissait d'un dignitaire achéménide."
 je_lepsius_dreamtime: "Le temps du rêve"
 je_lepsius_dreamtime_reason: "L'ethnologue britannique Walter Baldwin Spencer et son collègue australien Francis James Gillen ont traduit le mot alcheringa de la langue d'Australie centrale Arrernte par rêve. Pour les Autochtones, le temps du rêve concerne l’ordre spirituel, naturel et moral du cosmos. Dans ce contexte, rêver signifie la capacité collective à comprendre et à utiliser correctement le monde et ses connexions, à réfléchir sur le monde mythique dans le cadre d'un acte culte et à disposer d'une force vitale. Un certain nombre de lieux de culte liés à ce temps du rêve, d'autres mythes aborigènes et des vestiges archéologiques et anthropologiques sont répartis à travers l'Australie. Il est temps d’examiner en profondeur le passé du dernier continent."
 lepsius_2_excavation_team_needed_tt: "Disposer d'au moins #G 2#! équipes d'excavation."
 lepsius.72.t: "Moment de rêve"
 lepsius.72.d: "During their journey throughout Australia, the Professors [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] and [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName] have carried out valuable scientific research that sheds light on the continent's previously unexplored past."
 lepsius.72.f: "Après leur retour, les scientifiques ont surpris la Société académique avec toute une série de découvertes impressionnantes. Ils avaient réalisé des dessins et des croquis de peintures rupestres, rapporté des ossements vieux de plusieurs milliers d'années, récupéré des artefacts de l'histoire ancienne et récente et enregistré les mythes et les histoires des aborigènes. Aucun des collègues ne s'attendait à un butin aussi riche."
 lepsius.72.g: "Oh, il y a même un didgeridoo !"
 je_lepsius_gwanggaeto: "La stèle de Gwanggaeto"
 je_lepsius_gwanggaeto_reason: "La stèle de Gwanggaeto est une pierre commémorative dédiée à Gwanggaeto, qui fut roi de Goguryeo de 391 jusqu'à sa mort. La stèle se trouve en Chine, près de la frontière avec la Corée du Nord. L'inscription gravée dans la stèle est la source la plus ancienne et la plus détaillée de l'histoire du royaume de Goguryeo. Lorsque le royaume de Goguryeo et son successeur Balhae tombèrent en 668, la région autour de Guonei et Wandu perdit de son importance. Après la conquête mandchoue de l'empire chinois en 1644, les empereurs de la nouvelle dynastie Qing ont déclaré une vaste zone au nord de la rivière Yalu zone réglementée. Ce n'est que dans la seconde moitié du XIXe siècle que la région fut à nouveau ouverte à la colonisation. Vers 1876, un responsable chinois redécouvre la stèle, entièrement envahie par la végétation et partiellement enfoncée dans le sol."
 lepsius_gwanggaeto_modifier: "L'héritage de Goguryeo"
 lepsius.73.t: "Stèle de Gwanggaeto"
 lepsius.73.d: "La découverte accidentelle d'une grande stèle datant de l'époque de l'empire perdu de Goguryeo donne non seulement un aperçu d'un passé jusqu'alors inconnu, mais soulève également des énigmes - des énigmes qui contiennent des explosifs politiques."
 lepsius.74.t: "Goguryeo – Un empire coréen"
 lepsius.74.d: "Après la découverte d'une stèle dédiée au roi Gwanggaeto, la Chine a affirmé avec audace qu'il s'agissait d'une preuve que Goguryeo n'était pas un État coréen, mais un État chinois – ou du moins un État dépendant de la Chine. Le Japon prétend cependant que cela prouve la domination japonaise dans le sud de la Corée."
 lepsius.75.t: "L'invasion de Wa"
 lepsius.75.d: "Le Gwanggaeto Stelo récemment découvert fournit la preuve d'une invasion japonaise réussie de la Corée du Sud et de l'assujettissement des États de cette région."
 lepsius.73.f: "The stele discovered by [SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName] is a massive monument, possibly even the largest stele in existence in the world. Although it is a unique source for constructing the history of the Goguryeo state in northern Korea and southern Manchuria, difficult-to-read parts, as well as the dispute over the identity of the Goguryeo Kingdom, have political consequences that cannot be dismissed, especially in one Time when nationalism also awakened in the Far Eastern states. The Goguryeo Kingdom shares deep historical and cultural ties with modern Korean ethnic groups, but China is not unreasonably concerned that the multi-ethnic part of southern Manchuria, which was a center of Goguryeo, could be claimed by irredentist Korean nationalists. On the other hand, a passage about a possible invasion by Japan (Wa) has given rise to speculation about Japanese rule in South Korea, while the Korean interpretation argues for an invasion of Japan by Korean states."
 lepsius.73.g: "Un passé instructif qui mérite d’être décrypté."
 lepsius.73.h: "Goguryeo était un État chinois important."
 lepsius.73.i: "Cela souligne que la Mandchourie du Sud était à l’origine une terre coréenne."
 lepsius.73.j: "Un indice de l'influence japonaise sur la Corée."
 lepsius.2131.t: "Fragments de crâne trouvés dans une colonie aztèque"
 lepsius.2131.d: "Une horrible découverte a été faite au [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]. Divers fragments de crâne ont amené le Dr [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] à croire qu'il s'agissait là de l'emplacement d'un Tzompantli, un râtelier à crâne."
 lepsius.2131.f: "Les Aztèques avaient tendance à sacrifier les captifs de la Guerre des Fleurs. Souvent, les crânes de ces sacrifices humains étaient ensuite collectés dans un Tzompantli ou un râtelier à crânes. Souvent, les crânes étaient simplement empilés les uns sur les autres pour créer une sorte de mur de crânes. Certains temples ont même des murs en pierre dans lesquels des tailleurs de pierre ont gravé des crânes comme décoration."
 lepsius.2131.g: "Comme c'est cruel !"
 lepsius.2132.t: "Inscription aztèque enregistrée par un érudit local"
 lepsius.2132.d: "Lorsqu'un trottoir du [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] a été remplacé, personne ne pensait que les pavés révéleraient une découverte archéologique, mais un érudit local a trouvé diverses inscriptions aztèques sur les pierres. Le professeur [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] a été appelé sur place et a pu sauvegarder les inscriptions."
 lepsius.2132.f: "La découverte décrit une sorte de bataille menée par les Mexica. Nous ne savons pas encore exactement ce que signifie tout le nahuatl, mais il existe de nombreux toponymes. Ainsi, nous pouvons au moins comprendre quels endroits sont mentionnés."
 lepsius.2132.g: "Dieu merci, il a pu le trouver avant qu'il ne finisse comme un trottoir."
 lepsius.2133.t: "Découverte de ruines aztèques"
 lepsius.2133.d: "De vieilles ruines aztèques ont été découvertes au [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]. Le professeur [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] a immédiatement commencé les fouilles. Malheureusement, il n’y avait pas grand chose à trouver à part les bâtiments eux-mêmes."
 lepsius.2133.f: "\"Bien que les ruines aient déjà été pillées, elles donnent un aperçu de la vie du peuple mexicain avant l'arrivée des Européens. C'est toujours une découverte importante pour nous !\""
 lepsius.2133.g: "Intéressant."
 lepsius.2134.t: "Découverte du miroir d'obsidienne"
 lepsius.2134.d: "Un chef-d'œuvre de l'artisanat aztèque a été découvert au [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]. Le Dr [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] a pu récupérer un miroir d'obsidienne parfait utilisé par les Aztèques dans leurs rituels religieux."
 lepsius.2134.f: "\"On pensait que les miroirs d'obsidienne étaient un moyen de communiquer avec le monde souterrain. Un dieu, Tezcatlipoca, était même représenté comme ayant un miroir au lieu d'un pied. C'est une grande découverte archéologique !\""
 lepsius.2134.g: "Incroyable!"
 lepsius.2141.t: "Une épave carthaginoise découverte"
 lepsius.2141.d: "Les plongeurs de perles du [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] ont découvert une ancienne épave carthaginoise. Le Dr [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] a décidé que le navire resterait en mer pour le moment mais que grâce aux plongeurs, la cargaison pourrait être analysée et enregistrée, permettant ainsi de nouvelles informations sur les routes commerciales carthaginoises."
 lepsius.2141.f: "\"Il existe de nombreux tissus violets, probablement destinés à la noblesse de divers pays.\""
 lepsius.2141.g: "Les plus grands commerçants de la Méditerranée !"
 lepsius.2142.t: "Navire de guerre punique échoué"
 lepsius.2142.d: "Qui aurait pensé que les Carthaginois, les maîtres de la mer, s'échouaient. Eh bien, c'est apparemment arrivé au [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]. Le Dr [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] a pu récupérer de nombreuses découvertes sur ce navire de guerre autrefois puissant. Le bois était déjà en grande partie décomposé."
 lepsius.2142.f: "\"Est-ce une Birème, une Trirème, un Quinquirème ou encore plus de rème ?\""
 lepsius.2142.g: "Un navire autrefois magnifique !"
 lepsius.2143.t: "Découverte du port punique"
 lepsius.2143.d: "Un ancien port de Carthage a été découvert au [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]. Le professeur [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] a ordonné une enquête approfondie sur le site. Malheureusement, seules des pièces ont pu être récupérées, car un riche industriel souhaitait y construire immédiatement une nouvelle usine."
 lepsius.2143.f: "\"Au moins, nous avons pu trouver des amphores. Elles nous apprendront sûrement beaucoup de choses sur l'ancien commerce méditerranéen.\""
 lepsius.2143.g: "Un port entièrement inconnu ! Quelle découverte !"
 lepsius.2144.t: "Découverte de pièces de monnaie de l'ancienne Carthage"
 lepsius.2144.d: "Un trésor de pièces de monnaie anciennes a été découvert par un agriculteur au [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]. Malheureusement, même une enquête approfondie menée par le Dr [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] n'a pas fourni d'autres artefacts puniques. C'est un mystère de savoir comment les pièces ont fini dans ce champ."
 lepsius.2144.f: "\"Cette pièce représente Hasdrubal, frère d'Hanibal. Il doit évidemment s'agir d'une pièce relativement nouvelle.\""
 lepsius.2144.g: "Je suis riche maintenant !"
 lepsius.2151.t: "Chaudron celtique découvert"
 lepsius.2151.d: "Les Celtes utilisaient des chaudrons pour de nombreuses raisons. Maintenant, l'un de ces énormes chaudrons a été trouvé au [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]. Le professeur [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] a réussi à intégrer cet énorme objet métallique dans notre collection."
 lepsius.2151.f: "\"Il existe une légende selon laquelle un grand guerrier tombait dans un chaudron rempli de potion magique qui confère à tous ceux qui en boivent une force inhumaine. Apparemment, ce guerrier était si fort qu'il pouvait soulever d'énormes rochers. Il aimait aussi combattre les Romains.\""
 lepsius.2151.g: "J'espère que personne n'est encore tombé dans le Chaudron Magique !"
 lepsius.2152.t: "Couverture de bouclier celtique en bronze trouvée"
 lepsius.2152.d: "Dans le lit boueux d'une rivière au [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName], une plaque de bronze a été trouvée. Lorsque le Dr [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] est arrivé, [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] a pu déterminer que la plaque de métal faisait autrefois partie d'un bouclier celtique."
 lepsius.2152.f: "\"Certaines histoires disent que les chefs celtiques étaient portés sur des boucliers, mais il s'agit très certainement d'une histoire pour enfants. Tacite nous parle cependant de chefs élevés sur un bouclier lorsqu'ils ont été déclarés nouveaux chefs. Cela pourrait être la source historique. pour ces histoires.\""
 lepsius.2152.g: "Un bouclier digne d'un grand chef !"
 lepsius.2153.t: "Casque celtique en bronze récupéré"
 lepsius.2153.d: "Un casque à cornes en bronze a été trouvé au [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]. Le professeur [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] a rapidement déterminé qu'il ne s'agissait en fait pas d'un casque porté au combat mais plutôt d'un objet de culte celtique."
 lepsius.2153.f: "\"Vous avez peut-être vu des représentations de Celtes portant des casques avec des ailes ou des cornes, mais ces représentations sont fausses. Dans une bataille, un tel casque aurait été un obstacle. De tels casques existaient mais n'étaient souvent que des objets de culte faisant référence à certains dieux celtiques.\ \""
 lepsius.2153.g: "What a magnifcient helmet!"
 lepsius.2154.t: "Découverte d'un menhir antique"
 lepsius.2154.d: "Lors d'une des [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] randonnées à travers la campagne, le Dr [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] a trouvé une pierre étrange au [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]. Il s’est avéré qu’il s’agit d’un menhir celtique érigé autrefois par la tribu celtique locale. Maintenant, le Dr [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] étudie le Menhir en profondeur."
 lepsius.2154.f: "\"Nous ne savons pas pourquoi les Celtes ont érigé des menhirs, car ils n'ont laissé aucun témoignage écrit. Mais il pourrait bien s'agir d'une sorte de site de culte. Certains habitants ont leur propre histoire à propos d'un célèbre guerrier et de son puissant chien. Cet Obélix a apparemment été parfaitement réalisé. a façonné des menhirs et les a érigés sans aucune aide. Mais ce n'est qu'une histoire idiote.\""
 lepsius.2154.g: "Était-ce l'œuvre d'Obélix ?"
 lepsius.2161.t: "Fresque égéenne trouvée"
 lepsius.2161.d: "A local excavation of an Aegean ruin unearthed a magnificent fresco in [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]. Professor [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] ordered drawings of the find to be produced as the fresco is connected to the ruins."
 lepsius.2161.f: "\"Ces motifs sont incroyables ! J'aimerais que nous puissions créer une telle beauté à l'époque d'aujourd'hui !\""
 lepsius.2161.g: "Ceci est de l'art!"
 lepsius.2162.t: "Des ruines égéennes découvertes"
 lepsius.2162.d: "Lors des travaux de construction au [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName], une ancienne ruine égéenne a été découverte. Le Dr [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] a commencé par une enquête approfondie du site. Malheureusement, il ne reste pas beaucoup de découvertes, mais les ruines peuvent aider à comprendre la vie des gens qui vivaient ici autrefois."
 lepsius.2162.f: "\"Ces arches se dressent ici depuis des millénaires. Je me demande si nos bâtiments survivront aussi longtemps...\""
 lepsius.2162.g: "Cela nous en apprendra beaucoup sur la vie dans l’ancienne mer Égée."
 lepsius.2163.t: "Des bijoux égéens découverts"
 lepsius.2163.d: "Par chance, un agriculteur est tombé sur une découverte fascinante au [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]. Lorsque le professeur [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] est arrivé, [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] ne pouvait que s'émerveiller devant les fascinants bijoux égéens."
 lepsius.2163.f: "\"De si jolis bijoux. J'aimerais que nous puissions créer des bijoux similaires aujourd'hui !\""
 lepsius.2163.g: "Magnifique savoir-faire !"
 lepsius.2164.t: "Coupe d'Or d'Origine Égée"
 lepsius.2164.d: "Le Dr [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] a pu découvrir une coupe en or dans l'un de nos sites de fouilles locaux. Personne ne s'attendait à une trouvaille aussi merveilleuse, mais apparemment, [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]. offre encore de nombreuses opportunités de belles trouvailles."
 lepsius.2164.f: "\"La coupe représente une scène avec un homme et plusieurs taureaux. Les taureaux sont assez dynamiques et dans des poses variées.\""
 lepsius.2164.g: "J'aimerais une tasse comme celle-ci !"
 lepsius.2171.t: "Peintures murales égyptiennes"
 lepsius.2171.d: "Des peintures murales égyptiennes antiques ont été trouvées par le professeur [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] lors de l'un des [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] voyages au [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]. Les peintures murales représentent des scènes de l’Égypte ancienne."
 lepsius.2171.f: "\"Ce qui est fascinant, c'est que les murs sont encore peints, alors qu'en Grèce tout est juste blanc. Mais apparemment, soit les Égyptiens étaient plus friands de couleurs, soit le désert gardait mieux les couleurs intactes.\""
 lepsius.2171.g: "Magnifiques images!"
 lepsius.2172.t: "Un temple égyptien antique découvert"
 lepsius.2172.d: "Qui aurait pensé qu'il y avait encore des temples inconnus au [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] ? Apparemment, il y en a et le professeur [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] en a trouvé un sous le sable. C'est une belle trouvaille, même si tout ce qui avait de la valeur avait disparu depuis longtemps."
 lepsius.2172.f: "\"Regardez ce temple ! Pouvez-vous imaginer les cérémonies religieuses qui se déroulent ici ? N'est-ce pas incroyable ?\""
 lepsius.2172.g: "Il y a tellement de choses à apprendre ici !"
 lepsius.2173.t: "Statue égyptienne récupérée"
 lepsius.2173.d: "Même si la statue est brisée, elle reste l’œuvre d’un tailleur de pierre égyptien inconnu. La statue trouvée au [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] représentait probablement un faucon avant qu'il ne se brise. C'est du moins ce que croit le Dr [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]."
 lepsius.2173.f: "\"Cela n'a l'air de rien, mais cette statue nous en dira beaucoup sur la façon dont les Égyptiens fabriquaient de telles statues !\""
 lepsius.2173.g: "Ce sont des œuvres fantastiques de tailleurs de pierre !"
 lepsius.2174.t: "Une momie égyptienne découverte"
 lepsius.2174.d: "Les momies sont probablement l’une des découvertes les plus courantes en Égypte. Celui-ci a été trouvé au [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]. Le professeur [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] a commencé à l'examiner très attentivement, mais certaines personnes ont... d'autres idées."
 lepsius.2174.f: "\"Imaginez si nous pouvions utiliser ces momies pour découvrir ce que les habitants de l'Égypte ancienne mangeaient, ce qu'ils buvaient, dans quelle mesure ils étaient en bonne santé. Ce serait fantastique !\""
 lepsius.2174.g: "La mort est seulement le début."
 lepsius.2174.h: "J'ai entendu dire que certaines personnes aiment manger des momies ! Vendons-le !"
 lepsius.2181.t: "Site de bataille hellénique découvert"
 lepsius.2181.d: "Les guerres des Diadoques ont ravagé de nombreuses régions du monde. Au [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] par exemple, il semble y avoir eu une bataille limitée. Il reste encore à déterminer si cela faisait partie de la guerre des Diadochis. Le professeur [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] a trouvé diverses armes et pièces d'armure."
 lepsius.2181.f: "\"Il a dû y avoir une petite bataille ici. Pas aussi grande que d'autres mais quand même importante. Je suis sûr que nous en saurons plus sur ce site !\""
 lepsius.2181.g: "Quel dommage ces guerres..."
 lepsius.2182.t: "Pièces helléniques trouvées"
 lepsius.2182.d: "Les anciens Hellènes ont laissé leurs traces dans des régions lointaines du monde, de la Méditerranée jusqu’en Inde. Souvent, des pièces peuvent être trouvées, comme cela s'est produit au [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]. Grâce aux pièces, le Dr [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] pourra déterminer la présence grecque dans la région."
 lepsius.2182.f: "\"Je suppose que je suis riche maintenant !\""
 lepsius.2182.g: "Fascinant!"
 lepsius.2183.t: "Ruines helléniques fouillées"
 lepsius.2183.d: "[SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] est le site le plus récent à proposer une ruine hellénique. Les villes helléniques peuvent être trouvées depuis l’Espagne jusqu’en Inde. Le professeur [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] pense que cette ville spécifique nous en dira plus sur les colonies Greel"
 lepsius.2183.f: "\"Pouvez-vous imaginer une culture s'étendant sur une distance aussi immense ? C'est vraiment incroyable !\""
 lepsius.2183.g: "Les villes grecques sont partout, n'est-ce pas ?"
 lepsius.2184.t: "Représentation d'un dieu grec"
 lepsius.2184.d: "Les dieux grecs et leur religion ont voyagé dans des pays lointains. Au [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName], une représentation d'un Dieu grec a été récemment découverte. Le Dr [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] a déterminé qu'il devait s'agir de Dionysos, le dieu grec du vin."
 lepsius.2184.f: "\"En fait, l'histoire grecque raconte qu'à peine Dionysos naquit, Zeus le recousit à la cuisse et l'emporta à Nysa en Ethiopie, au-delà de l'Egypte ; et quant à Pan, les Grecs ne savent pas ce qu'il devint. après sa naissance. Il est donc clair pour moi que les Grecs ont appris les noms de ces deux dieux plus tard que les noms de tous les autres, et font remonter la naissance des deux au moment où ils ont acquis cette connaissance.\"\n- Hérodote"
 lepsius.2184.g: "Buvons du vin à cette découverte !"
 lepsius.2500.t: "Nouvelle carte archéologique du [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]"
 lepsius.2500.d: "Le professeur [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] a travaillé dur pour enregistrer toutes les découvertes archéologiques des dernières années au [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] sur une carte. Cette carte permet de tirer des conclusions quant aux endroits où d'autres découvertes sont possibles."
 lepsius.2500.f: "\"Ici nous avons trouvé des clous et là-bas nous avons trouvé des os de mouton ! N'est-ce pas incroyable ?!\""
 lepsius.2500.g: "Cela vous ouvrira les portes de nouvelles trouvailles !"
 lepsius.2501.t: "Un catalogue archéologique illustré du [GetPlayer.GetName]"
 lepsius.2501.d: "Le professeur [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] est non seulement un formidable archéologue mais aussi un artiste étonnant. Grâce à cette compétence, il a pu publier un catalogue archéologique illustré du [GetPlayer.GetNameNoFormatting] qui est considéré comme une entrée étonnante dans l'archéologie par de nombreux profanes."
 lepsius.2501.f: "\"Regardez ces illustrations ! On dirait que nous sommes dans un musée et que nous pouvons voir les objets juste devant nous ! Incroyable !\""
 lepsius.2501.g: "Un livre merveilleux !"
 lepsius.2502.t: "Nouveau catalogue de toutes les découvertes archéologiques du [GetPlayer.GetName]"
 lepsius.2502.d: "Avec son nouveau catalogue de toutes les découvertes archéologiques du [GetPlayer.GetNameNoFormatting], le Dr [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] a accompli un travail diligent que presque personne n'aurait cru possible. Grâce à son travail extraordinaire, nous disposons désormais d'un catalogue précis de toutes les trouvailles réalisées à ce jour en 7 volumes."
 lepsius.2502.f: "\"Numéro 7342 : Un morceau de pierre, probablement néolithique, nommé Rocky.\""
 lepsius.2502.g: "Cela nous sera utile à l'avenir !"
 lepsius.2503.t: "Le professeur [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] arrête la contrebande d'artefacts"
 lepsius.2503.d: "Après des mois de travail, le Dr [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] a réussi à arrêter un réseau de contrebande qui faisait passer clandestinement des artefacts à travers notre pays. Les objets ont été saisis et sont désormais conservés en toute sécurité dans notre collection."
 lepsius.2503.f: "\"Vous avez détruit de précieuses informations archéologiques, espèce de scélérats !\""
 lepsius.2503.g: "Cela appartient à un musée !"
 lepsius.2600.t: "L'étoile perdue"
 lepsius.2600.d: "Le Dr [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] a toujours été confus par les représentations anciennes des étoiles, car elles ne semblaient pas refléter les étoiles que nous voyons aujourd'hui. Grâce à l'aide du professeur [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName], il a finalement pu comprendre ce qui n'allait pas. Ensemble, ils découvrirent une nouvelle étoile dans le ciel nocturne."
 lepsius.2600.f: "\"Voilà ! La voilà, comme me l'ont dit les anciens Égyptiens ! Nous avons enfin trouvé l'étoile perdue !\""
 lepsius.2600.g: "Une formidable découverte scientifique !"
 lepsius.2601.t: "Estimation des dates d'événements historiques en utilisant les connaissances astronomiques des éclipses solaires"
 lepsius.2601.d: "Dans un effort conjoint, les professeurs [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] et [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] ont pu utiliser les connaissances astronomiques modernes sur les éclipses solaires pour dater des événements historiques spécifiques dans des sources primaires."
 lepsius.2601.f: "\"Évidemment Thalès de Milet parlait de l'éclipse solaire du 28 mai 585 après J.-C. et pas d'une autre éclipse solaire !\""
 lepsius.2601.g: "C'est un grand pas pour l'archéologie"
 lepsius.2602.t: "Aperçu de la connaissance astronomique des cultures passées"
 lepsius.2602.d: "Le Dr [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] et le professeur [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] ont publié un nouveau livre présentant un aperçu des connaissances astronomiques des civilisations anciennes."
 lepsius.2602.f: "\"Oui, ils savaient que la Terre n'était le centre de rien. Non, même à l'époque, ils n'étaient pas assez stupides pour croire que la Terre est plate. Oui, j'en suis absolument sûr.\""
 lepsius.2602.g: "Une lecture intéressante !"
 lepsius.2603.t: "La machine à vapeur du héros reconstruite"
 lepsius.2603.d: "Lorsque le professeur [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] a parlé au Dr [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] de l'ancienne machine à vapeur de Hero, cette dernière a immédiatement mis le feu pour en faire une reconstruction. Ensemble, ils ont construit une petite reconstruction de l'Aeolipile."
 lepsius.2603.f: "\"Comme vous pouvez le constater, il manque à l'Aeolipile un moyen de transmettre de l'énergie. Il s'agit donc plus d'un jouet que d'une véritable machine. Malheureusement, il n'a jamais été développé davantage.\""
 lepsius.2603.g: "Comment se fait-il qu’ils ne se soient pas industrialisés ?"
 lepsius_illustrated_archaeological_catalog_modifier: "A écrit un catalogue illustré d'archéologie"
 lepsius.12.f: "Actuellement, la collection égyptienne compte #p [ROOT.Var('lepsius_egyptian_artifact_minor').GetValue]#! @lepsius_egypt_minor ! artefacts mineurs et #p [ROOT.Var('lepsius_egyptian_artifact_major').GetValue]#! @lepsius_egypt_major ! des artefacts majeurs. \n\n La collection égyptienne pourra éventuellement être #T réaménagé#! et ainsi initier une nouvelle exposition. Toutefois, cela nécessite un certain nombre d’artefacts. \n\n Une #T petite exposition#! nécessite #p 10#! @lepsius_egypt_minor ! artefacts, une exposition moyenne #T#! nécessite #p 25#! @lepsius_egypt_minor ! artefacts, une #T grande exposition#! nécessite #p 50#! @lepsius_egypt_minor!, et une #T excellente exposition#! nécessite #p 100#! @lepsius_egypt_minor!. De plus, l'excellente exposition #T#! nécessite #p 1#! @lepsius_egypt_major ! artefact majeur. \n\n Le réaménagement de la collection et les préparatifs d'une nouvelle exposition prendront environ six mois. Les bonus d'une exposition restent permanents - jusqu'à ce qu'elle soit à nouveau réorganisée."
 lepsius.13.f: "Actuellement, la collection mésopotamienne compte #p [ROOT.Var('lepsius_mesopotamian_artifact_minor').GetValue]#! @lepsius_mesopotamia_minor ! artefacts mineurs et #p [ROOT.Var('lepsius_mesopotamian_artifact_major').GetValue]#! @lepsius_mesopotamia_major ! des artefacts majeurs. \n\n La collection mésopotamienne pourra éventuellement être #T réagencement#! et ainsi initier une nouvelle exposition. Toutefois, cela nécessite un certain nombre d’artefacts. \n\n Une #T petite exposition#! nécessite #p 10#! @lepsius_mesopotamia_minor ! artefacts, une exposition moyenne #T#! nécessite #p 25#! @lepsius_mesopotamia_minor ! artefacts, une #T grande exposition#! nécessite #p 50#! @lepsius_mesopotamia_minor!, et une #T excellente exposition#! nécessite #p 100#! @lepsius_mesopotamia_minor!. De plus, l'excellente exposition #T#! nécessite #p 1#! @lepsius_mesopotamia_major ! artefact majeur. \n\n Le réaménagement de la collection et les préparatifs d'une nouvelle exposition prendront environ six mois. Les bonus d'une exposition restent permanents - jusqu'à ce qu'elle soit à nouveau réorganisée."
 lepsius.14.f: "Actuellement, la collection Aegean compte #p [ROOT.Var('lepsius_aegean_artifact_minor').GetValue]#! @lepsius_aegean_minor ! artefacts mineurs et #p [ROOT.Var('lepsius_aegean_artifact_major').GetValue]#! @lepsius_aegean_major ! des artefacts majeurs. \n\n La collection égéenne pourra éventuellement être #T réagencement#! et ainsi initier une nouvelle exposition. Toutefois, cela nécessite un certain nombre d’artefacts. \n\n Une #T petite exposition#! nécessite #p 10#! @lepsius_aegean_minor ! artefacts, une exposition moyenne #T#! nécessite #p 25#! @lepsius_aegean_minor ! artefacts, une #T grande exposition#! nécessite #p 50#! @lepsius_aegean_minor!, et une #T excellente exposition#! nécessite #p 100#! @lepsius_aegean_minor!. De plus, l'excellente exposition #T#! nécessite #p 1#! @lepsius_aegean_major ! artefact majeur. \n\n Le réaménagement de la collection et les préparatifs d'une nouvelle exposition prendront environ six mois. Les bonus d'une exposition restent permanents - jusqu'à ce qu'elle soit à nouveau réorganisée."
 lepsius.15.f: "Actuellement, la collection précolombienne compte #p [ROOT.Var('lepsius_precolumbian_artifact_minor').GetValue]#! @lepsius_precolumbian_minor ! artefacts mineurs et #p [ROOT.Var('lepsius_precolumbian_artifact_major').GetValue]#! @lepsius_precolumbian_major ! des artefacts majeurs. \n\n La collection précolombienne pourra éventuellement être #T réaménagé#! et ainsi initier une nouvelle exposition. Toutefois, cela nécessite un certain nombre d’artefacts. \n\n Une #T petite exposition#! nécessite #p 10#! @lepsius_precolumbian_minor ! artefacts, une exposition moyenne #T#! nécessite #p 25#! @lepsius_precolumbian_minor ! artefacts, une #T grande exposition#! nécessite #p 50#! @lepsius_precolumbian_minor!, et une #T excellente exposition#! nécessite #p 100#! @lepsius_precolumbian_minor!. De plus, l'excellente exposition #T#! nécessite #p 1#! @lepsius_precolumbian_major ! artefact majeur. \n\n Le réaménagement de la collection et les préparatifs d'une nouvelle exposition prendront environ six mois. Les bonus d'une exposition restent permanents - jusqu'à ce qu'elle soit à nouveau réorganisée."
 lepsius.99.t: "Déménagement du musée archéologique"
 lepsius.99.d: "Pour une raison quelconque, nous avons un [GetBuildingType('building_lepsius_archaeological_museum').GetName] mais il n'est pas situé dans notre merveilleuse Capitale. Il faut évidemment le déplacer dans la Capitale !"
 lepsius.99.f: "\"S'il vous plaît soyez prudent avec les vases, ils sont très fragiles ! Non ! Vous ne pouvez pas les jeter dans une boîte comme ça, ils ont besoin d'une sorte de rembourrage ! Je ne pense vraiment pas que ce soit une bonne idée !\""
 lepsius.99.g: "Maintenant, je peux y aller tous les jours !"
 lepsius.140.d: "Notre archéologue a utilisé les connexions [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] pour recruter du personnel hautement qualifié pour l'expédition."
 lepsius.250.f: "Cela a commencé par une dispute, suivie d'injures, de menaces et enfin de coups de poing. L’incident s’est terminé par une véritable bagarre dans une taverne. Au milieu : notre chef d’expédition. Le tempérament [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] nous a coûté beaucoup de réputation. Un rapport sur le faux pas est parvenu ce matin à un haut dignitaire. Nous avons évité un incident diplomatique majeur, mais la mauvaise impression persistera longtemps."
 lepsius.260.f: "Bonnes nouvelles! Il s'est avéré que notre chef d'expédition s'est révélé être un [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetCustom('academics_gentleman_or_gentlewoman_type')] impeccable lors du [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] du voyage. L'attitude pleine de tact et charismatique du [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis|U] est assimilée au comportement typique du [ROOT.GetCountry.GetAdjectiveNoFlag]. La réputation de notre nation y a considérablement augmenté."
 lepsius.270.d: "Le chef de notre expédition se démarque avant tout parce que [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] s'assoit tous les jours au café pour boire des sodas et manger des glaces."
 lepsius.270.f: "Il y a des dirigeants ambitieux qui ne font que travailler toute la journée. Ils veulent réaliser de grandes choses ou accumuler des richesses. Certains veulent être célèbres pour leurs actes. D’autres sont obsédés par chaque détail. Ce n’est pas le cas de notre directeur archéologique. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] a pris l'habitude de combattre la chaleur tous les jours en se gaveant de soda et en avalant de la glace. On pourrait appeler ça de la paresse. Pour d’autres, c’est un signe d’élégance humaine, de bon goût et d’avoir les bonnes priorités dans la vie."
 lepsius.280.d: "Les compétences diplomatiques de notre chef d'expédition ont permis à [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim] d'être invité et récompensé par le gouverneur local."
 lepsius.311.d: "Le chef de la dernière expédition archéologique à l'étranger a décidé de publier le journal que [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] a rédigé pendant le voyage."
 lepsius.312.d: "[SCOPE.sCharacter('lepsius_scientific_writer').GetFullName] a décidé de publier l'article scientifique que [SCOPE.sCharacter('lepsius_scientific_writer').GetSheHe] a écrit pendant le voyage."
 lepsius.408.f: "Un nazar est une amulette destinée à protéger du mauvais œil. Une telle superstition existe dans une grande partie de l’Orient, mais aussi dans certaines régions de la Méditerranée. Bien sûr, il serait absurde de penser qu’un esprit scientifiquement formé puisse se protéger avec un talisman pour empêcher les forces du mal de faire des ravages au cours de l’expédition. La situation est différente avec les aides et porteurs locaux. Ils demandent au chef de se procurer l'une des amulettes, convaincus que sinon [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] fera face à un grand malheur. Quelles que soient les capacités du nazar, si cela n'affecte pas l'expédition, cela affectera au moins le moral de nos serviteurs."
 lepsius.409.f: "A mesure que notre expédition progressait le long d'une côte, ils rencontrèrent bientôt une large baie dont les extrêmes promontoires se touchaient presque. Au lieu de faire le tour, des pêcheurs grecs ont proposé de nous faire traverser la baie. Le chef de l'expédition accepta rapidement l'offre. Lors d'une conversation avec les pêcheurs, [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] a également pu obtenir des informations importantes sur une ruine non loin de là, qui date probablement de l'époque préclassique."
 lepsius.421.d: "Notre archéologue a trouvé un petit scarabée égyptien en lapis-lazuli que [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] aimerait conserver."
 lepsius.452.f: "Dans le passé, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] avait entendu à plusieurs reprises qu'il devait y avoir des archives historiques sur des sites archéologiques détruits depuis longtemps dans la région. Il y a quelques jours, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] a reçu un conseil utile : un marchand possédait un manuscrit du XVIe siècle contenant une copie de documents perdus depuis longtemps. Les originaux sont probablement perdus à jamais, mais il existe au moins une possibilité de reconstruction."
 lepsius.461.f: "Il y avait cette sensation étrange et écrasante. Au milieu de la nuit. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] s'est levé, croyant au vent qui frappait contre la tente dressée dans le sable du désert ; mais c'était plus que du vent. C'était un murmure étrange. Un murmure qui s'est élevé jusqu'à des tons dissonants jusqu'à devenir un chant mélodique. Comme le chant des sirènes, il séduisait – et obscurcissait les sens. C'est du moins ce qu'affirmait [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetLastName] lorsque, après des heures de recherche, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] fut retrouvé aux pattes du Grand Sphinx de Gizeh, creusant comme un fou, convaincu que sous le Sphinx se trouvait une chambre secrète d'où la connaissance devait être extraite. trouvé caché depuis des milliers d’années. L'état du [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetHerHis] ne s'est guère amélioré depuis. Cet endroit a une très mauvaise influence sur le [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetHerHim]."
 lepsius.462.f: "There was this strange, crushing feeling. Middle of the night. [SCOPE.sCharacter('lepsius_military_attache').GetFullName] stood up, believing in the wind beating against the pitched tent in the desert sand; but it was more than wind. It was an odd whisper. A murmur that rose to dissonant tones until it increased to a melodic song. Like siren song, it beguiled - and clouded the senses. At least, that was what [SCOPE.sCharacter('lepsius_military_attache').GetLastName] claimed when, after hours of searching, [SCOPE.sCharacter('lepsius_military_attache').GetSheHe] was found at the paws of the Great Sphinx of Giza, digging like a madman, convinced that beneath the Sphinx was a secret chamber from which knowledge was to be found been hidden for thousands of years. [SCOPE.sCharacter('lepsius_military_attache').GetHerHis] condition has hardly improved since then. This place has a truly bad influence on [SCOPE.sCharacter('lepsius_military_attache').GetHerHim]."
 lepsius.465.f: "Notre chef d'expédition ne cache pas son origine, la langue que [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] parle, la nourriture que [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] préfère et la culture que [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] considère comme supérieure. Les insultes contre la population locale augmentent de jour en jour – que ce soit contre le personnel recruté ou contre des personnes aléatoires. En voyageant à travers différents villages, [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] a développé une attitude consistant à traiter les maires comme des subordonnés [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis]. Même le geste le plus hospitalier ne suffit pas pour le [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim]. Il y a déjà eu plusieurs plaintes de diverses parties de l'administration locale concernant le comportement arrogant et diffamatoire de [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName], et notre expédition dégénère de plus en plus en une campagne publicitaire négative pour notre pays."
 lepsius.467.f: "Il ne reste pas grand-chose de l'ancien Moyen-Orient chrétien, et pourtant il existe des communautés chrétiennes dispersées de coptes, de maronites, de chaldéens et d'arméniens qui ont survécu pendant des siècles. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName], qui n'avait en réalité aucune intention religieuse lorsque [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] a commencé le voyage, a demandé à un prêtre local de conduire [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim] dans une église oubliée depuis longtemps hier soir. Intéressant sur le plan archéologique et historique, le prêtre n'a dévoilé que plus tard un reliquaire contenant une relique d'un père de l'Église que l'on croyait perdue. Comme il était déjà tard et que le camp était éloigné, le chef de l'expédition y resta une nuit et une matinée. Un rêve qui n'a pas laissé [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim] se reposer depuis et dont [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] ne parle presque jamais signifie que [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] veut changer la vie du [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] dans certains domaines. Le prêtre a proposé de donner à [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim] une partie de la relique oubliée pour renforcer [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim] dans sa foi nouvellement retrouvée."
 lepsius.467.g: "Est-ce que [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] avait une vision béatifique ?"
 lepsius.471.g: "[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe|U] devrait prendre son temps et se renseigner le plus possible sur les lieux."
 lepsius.471.h: "[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe|U] est autorisé à y rester plus longtemps - si [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] apporte des artefacts avec lui."
 lepsius.471.i: "[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe|U] est autorisé à visiter les lieux, mais seulement aussi longtemps que nécessaire."
 lepsius.472.f: "[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] a une explication incroyable de l'énorme perte de personnes et de matériel. C’est à la fois scandaleux et honteux – surtout pour l’esprit d’un individu raisonnablement éclairé. Le chef de l'expédition affirme que les hommes [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] et [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetHerHis] ont été perdus pendant une semaine avant de tomber sur une vallée inconnue entourée de hautes montagnes dans la forêt impénétrable du Yucatán. Dans l'espoir de trouver un site maya jusqu'alors inconnu, ils ont élaboré un plan pour explorer la vallée - une énorme erreur, en fin de compte. Car la vallée abrite de terribles monstres, de puissants lézards. En fait, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] nous a expliqué que des dinosaures disparus vivent dans ce « monde perdu » depuis des millions d'années, ayant survécu parce qu'ils étaient isolés. Les bêtes ont terrorisé l'équipe d'expédition et ont impitoyablement mutilé plusieurs porteurs et chercheurs. En fuite, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] aurait dû abandonner une grande partie de l'équipement. Maintenant, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] nous supplie de rééquiper toute l'expédition. Nous ne savons pas pourquoi [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] pense que [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] peut nous impressionner avec cette histoire de conte de fées - des doutes sont plutôt soulevés quant à savoir si [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] est toujours la bonne personne pour diriger cette entreprise !"
 lepsius.472.g: "Est-ce que [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] dit que les dinosaures ont mangé notre expédition ?!"
 lepsius.501.h: "Laissez [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim] enquêter plus en détail."
 lepsius.506.f_engine: "Malheureusement, les membres de notre expédition n’ont guère eu le temps d’explorer plus en détail le tombeau du Pharaon inconnu. Des roches se sont effondrées du plafond et du sable a coulé à travers les fissures supérieures tandis que nos archéologues se frayaient un chemin à travers la chambre funéraire. Apparemment, l’environnement était constitué d’une roche beaucoup plus poreuse qu’on ne le pensait ; et le rocher détaché avait terminé la construction. Avec un esprit vif, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] a maintenu le cap malgré le risque et s'est battu [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] jusqu'au sarcophage pour que tous les hommes disponibles l'enlèvent. Une pièce magnifique et unique qui nous consolera probablement de la perte des trouvailles restantes - après tout, le tombeau royal tout entier menace de s'effondrer en quelques minutes..."
 lepsius.506.f_muscular: "Ce fut une expérience véritablement historique lorsque [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] est entré dans la chambre funéraire proprement dite. Une surprise spéciale attendue [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim] : le sarcophage ainsi que la momie du Pharaon Inconnu reposaient encore là où il a été enterré il y a plus de 3 000 ans ! Encore une fois, Padoue, d'une force incomparable, devait nous aider et sortir le sarcophage en bois et la momie de l'enceinte de granit. Mais aussi heureux qu’aient été nos archéologues au début, leur mécontentement ultérieur a été encore plus grand. Pendant la pause déjeuner, alors que l'équipe partageait le pain dans la galerie décorée, un terrible craquement et craquement retentit depuis la chambre funéraire. À la grande horreur des assistants de fouille et de notre chef d'expédition, l'homme musclé géant s'était également accordé une pause - et s'était accidentellement assis sur le sarcophage. Il ne reste que des restes de la momie royale et du cercueil en bois..."
 lepsius.532.f: "L'attaché militaire a mis en garde à plusieurs reprises contre l'entrée sur le territoire kurde. Les expéditions passées dans cette région n'ont pas eu de bonnes expériences avec les locaux. Les Kurdes sont considérés comme libres, honorables – mais aussi fiers. Envahir leur territoire pourrait les mettre en colère. [SCOPE.sCharacter('lepsius_military_attache').GetFullName] a donc insisté pour armer plusieurs hommes afin de pouvoir lutter plus efficacement contre les incidents désagréables. Alors que l'attaché s'attend au pire, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] aimerait retrouver au plus vite la tribu kurde afin de négocier avec elle et trouver un règlement à l'amiable afin de remettre rapidement les Lamassu entre [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] mains propres. Le [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] propose de diviser les troupes : les hommes non armés, les porteurs non formés et la plupart des provisions et du matériel devraient rester sur place tandis que le [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] avance avec l'attaché militaire pour créer une force plus flexible capable de rechercher efficacement le lamassu. L'attaché, en revanche, s'est dit préoccupé par le fait que le reste de l'expédition se retrouverait alors complètement impuissant en cas d'attaque kurde."
 lepsius.534.f: "Bien trop tard, le chef de l'expédition réalisa que sa dernière tentative pour gagner les faveurs des tribus indigènes produisait le contraire de ce que [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] avait prévu. Un cri retentit dans la tente et, instinctivement, certains de ses subordonnés mettaient déjà la main sur leurs armes. La tension est désormais dans l'air, et l'attaché militaire voit se confirmer son inquiétude sur le fait que ce conflit ne peut pas être réglé par la diplomatie, mais seulement par la violence. Il ne dispose que de peu de temps pour aligner les hommes qu'il a amenés avec lui. Certains assistants de recherche insistent déjà pour faire leurs valises et prendre le plus de distance possible."
 lepsius.551.f: "[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullNameNoFormatting] had worked late that day. The Greek sun brooded on [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] head, the wind from the mountains and from the sea remained absent. The boring and tedious cataloging of dull archaeological objects dragged on for days. The finds often amounted to only measly fragments of broken glass and chicken bones left behind, which the archaeologist attributed less to the Minoan food culture and more to the proletarian eating manners of the excavation helpers. In a mood of weariness and resignation, [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] strolled the sprawling grounds of a little-explored palace complex. The last time [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastNameNoFormatting] was sighted was near a structure classified as late Bronze Age or early Archaic. A crash echoed through the Cretan hills, drowning out cicadas and startling doves as the archaeologist broke through the ground - and despite a two-day search could not be found."
 lepsius.552.d: "When [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] regains consciousness, [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullNameNoFormatting] finds [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerselfHimself] in an unfamiliar subterranean building."
 lepsius.552.f: "It was perhaps the strangest experience in the archaeological leader's life. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe|U] thought [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] had fallen down a meter-long rabbit hole; the shaft had been so narrow, accompanied at the same time by sand and mud, which had pressed [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim] down like quicksand in excruciating lengths. Impossible that anyone could have followed [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim]; and impossible to see anything as no sunlight followed [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim] down the shaft. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe|U] felt plates under [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] palms upon impact. In the glow of [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] lighter [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] recognizes the smoothly hewn walls, to which remains of paint are stuck. Frescoes from a lost culture, which [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] initially wants to assign to the Minoan, but soon no longer knows which century they come from. Apparently there are smooth transitions between Minoan and Mycenaean influences. Looking around, [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastNameNoFormatting] finds [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerselfHimself] in a hall not unlike a Megaron. The archaeologist slowly feels [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] way forward, hearing [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] own footsteps echoing in the hollow space. Corridors without ornaments, without objects, without distinguishable details follow; forks in the road; chambers; and dead ends. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastNameNoFormatting] realizes that [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] has ended up in an ancient labyrinth that [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] has no overview of. The more [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] thinks [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe]'s exploring it, the bigger and more unknown it becomes..."
 lepsius.553.d: "After some time of trial and error, [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullNameNoFormatting] realizes that [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] has arrived at the starting point of the labyrinth..."
 lepsius.553.f: "Legs heavy, head foggy - could it be that [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] had been here before? The spot on the plates where [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] landed when [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] fell from above is unmistakable. And with growing horror the question arises: how long was [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] here? How many hours had passed? Maybe days? And would [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] find out before hunger and thirst tormented him to death...?"
 lepsius.554.d: "In the labyrinth, the missing person comes across a mosaic. The question is whether [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] chooses one of the two corridors or the stairs."
 lepsius.554.f: "After corridors and stairs without distinction, [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullNameNoFormatting] reaches a larger room. A corridor opens to the left and right, and a staircase leads up and down. A mosaic on the floor catches the eye. A sea scene confirms the thesis that the walls may come from Minoan times, while the rare jewelry bears witness to Mycenaean influences. The gods depicted are predecessors of the classical Greek pantheon. Surrounded by dolphins, father of the gods Zeus stretches his arm in the air with a thunderbolt. Demeter and Persephone point to the west, ears of corn in hand; Artemis is accompanied by two lions looking east. Finally Poseidon, the father of the gods of the Mycenaeans: with a trident he makes the earth tremble beneath him."
 lepsius.557.d: "In a hall, [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullNameNoFormatting] again encounters a riddle."
 lepsius.557.f: "Four passes. Four pictures. Above each passage, the prisoner of the labyrinth can see outlines engraved in stone. It takes some time before [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] realizes that these are the shores of islands. Based on [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] experiences on Crete, [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] can roughly assign them. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe|U] assigns the first passage to the island of Rhodes; the second of the island of Delos; the third of the island of Euoboea; the fourth of the island of Naxos. Unfortunately, [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] cannot find any further clues."
 lepsius.558.d: "After several days, our excavation team found the missing archaeologist near a cliff. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullNameNoFormatting] was completely exhausted - and has been mentally confused ever since."
 lepsius.558.f: "It remains a mystery where [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullNameNoFormatting] has been for the past 72 hours. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe|U] was found a few miles from the actual excavation site - in a pitiful condition, as if mauled by a wild animal. Although [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] has since regained consciousness, the expedition doctor believes [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] must have received a severe blow to the head. At least [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] language center seems disturbed. Again and again [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] falls into an almost delusional style when [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] has to tell what happened. The team has left the area because they are concerned [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] might go on a quest again - to prove [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe]'s not crazy."
 lepsius.559.f: "The police examined the body of the former archaeologist yesterday evening. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullNameNoFormatting] became known to the public mainly because of a mental illness after [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] went missing under mysterious circumstances during an excavation on Crete and was found again days later under just as mysterious circumstances. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe|U] just hasn't been the same person since then. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe|U] feared being alone, thought [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] saw monsters in the shadows. In the end [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] only slept when the light was on because nightmares kept [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim] awake all night. In the last days of [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] life, Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastNameNoFormatting] had not only become heavily dependent on medication and had visibly deteriorated both physically and mentally, but [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] had also drawn the ridicule of [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] academic colleagues because of abstruse claims about [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] Crete research. Despised by the scientific world, ridiculed in newspapers and visually reduced to a caricature of [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] former self, investigators agree that [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] took [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] own life."
 lepsius.560.f: "At first Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastNameNoFormatting] was surprised how far away from the old excavation site [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] finally saw the sun again. It was several hours before [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] rejoined the rest of the digging mission, much to the relief of [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] colleagues. There, to the surprise of those present, [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] was able to report on [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] find - a truly magnificent discovery that could perhaps change the way we have interpreted the myths of the ancient Greeks. A mysterious ball of fabric that [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] found there allows only one conclusion."
 lepsius.561.f: "Haze hangs over the Yucatec hills as the column pushes through the selva. Jaguars cry in the distance; the air hums with mosquitoes, and fever fells more than one of our helpers. What remains is a party of three and a few porters. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] signals a halt. Stelae and carved stones stud the ground; half-buried steps, slick with moss, climb a broken terrace. The outline of a Maya pyramid emerges. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe|U] cocks an ear as a porter raises his hand and calls: 'Patrón—an opening!'"
 lepsius.562.f: "Insisting on entering alone, the expedition leader passes the bleached bones of an earlier intruder and confronts a panel crowded with glyphs. Four recessed cartouches—visages of great gods—can be pressed like keys. Beneath them runs the distich: the one who rises in the east, blazes at zenith, descends at dusk, and keeps the count of days. The device is plainly a test; one mistake could be [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetHerHis] undoing."
 lepsius.563.f: "Footfalls echo in a narrow passage. By torch‑light the walls glimmer with engravings; roots of giant trees bite through a fallen lintel. Beyond, a chamber opens—a low altar at its heart, an idol glinting faintly in the gloom. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe|U] weighs a satchel of sand in [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetHerHis] left hand, judges the idol’s mass with the right, and steadies [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetHerHis] breath. One clean exchange—then out."
 lepsius.564.d: "It may be that [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] read the riddle amiss—or merely that the builders trusted no one. A thunder rolls; a stone sphere tears free and barrels down the corridor toward [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetHerHim]."
 lepsius.564.f: "The switch is made; the bag rests upon the altar. For a heartbeat nothing moves. Then a dull tremor builds, dust sifts from the ceiling, and a roar answers from above—it is a gigantic rolling boulder!"
 lepsius.565.d_wrong: "When [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] stumbles into the light, a worse surprise awaits: the camp has been overrun, and armed men demand the idol—or [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetHerHis] life."
 lepsius.565.f_right: "It was an affair of wit, not muscle. Choosing K'inich Ajaw, the Sun Lord who 'keeps the count of days,' spared [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetHerHim] the device’s malice. Slipping through the contrivances unscathed, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] secures the idol and hastens out; word reaches [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetHerHim] that a rival party is on the way, and so the team quits the site at once."
 lepsius.565.f_wrong_right: "As [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] flees the passage, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] catches a root and swings clear while the stone hurtles past and bursts into the jungle. Outside lie scattered spears and fallen men—the wreckage of an ambush undone by the same trap. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe|U] cannot prove it, but the scene bears the touch of a foreign rival who meant to let us spring the hazards for him. No matter—time to move on."
 lepsius.565.f_wrong: "With a final leap [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] gains the threshold—only to be ringed by bowmen. A suave voice with a soft [SCOPE.sCountry('lepsius_archaeological_rival').GetAdjectiveNoFlag] accent drifts from the trees as a man in pale linen steps forward: 'A pleasure at last. But this piece belongs in better hands.' Outnumbered and with the porters slain, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe|U] yields the idol. 'Too bad the Hovitos do not know you as I do,' [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] mutters—and seizes a chance to escape, empty‑handed."
 lepsius.581.d: "[SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] a fait part d'une préoccupation personnelle : [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] veut prouver que le « Monde perdu » existe réellement et ainsi restaurer son honneur. [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe|U] collecte des fonds pour une expédition privée."
 lepsius.581.f: "Plusieurs années se sont écoulées depuis qu’une grande partie de l’expédition du Yucatán a mystérieusement disparu. [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] est depuis devenu la risée de l'académie. Les dessins animés dans les journaux décrivent [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHim] comme un fou avec [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHis] « Histoires de dinosaures ». Le traumatisme a laissé de profondes cicatrices : [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] est obsédé par l’idée de prouver au monde que la prétendue vallée est réelle. On dit que [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe|U] a maintenant dépensé [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHis] l'intégralité de son héritage pour organiser une expédition à ses frais [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHis]. Bien entendu, [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] a également demandé à l'État le soutien du [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHis] voyage complètement insensé. Nos experts déconseillent cette mission suicide : tout le monde sait comment s'est déroulée la dernière expédition au Yucatán. Certaines voix s’élèvent donc pour vouloir interdire purement et simplement une telle expédition. Cependant, cela ne pouvait qu’aggraver l’état mental du [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHis]. D'autres encore pensent que le [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] devrait être abandonné, mais sans autre ingérence officielle ; après tout, personne ne veut être associé au voyage d’un homme apparemment dérangé mentalement. Seule une minorité pense même à ouvrir son portefeuille à cette folie. Ils soutiennent que nous avons une prétendue responsabilité dans la condition [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHis]..."
 lepsius.581.h: "Mai [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] chasse [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHis] dinosaures."
 lepsius.582.f: "Quelques mois après la disparition de [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] dans les forêts du Yucatán, l'aventurier épuisé est réapparu dans la capitale provinciale de Mérida. Encore une fois, [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] avait perdu de nombreux assistants et le reste de la troupe [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHis] était dans un état lamentable. Aux côtés d'un certain nombre de témoins, cependant, [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] disposait d'un élément de preuve convaincant : grâce à des photographies modernes, dont l'authenticité a été vérifiée par plusieurs chercheurs, [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] possède des affirmations imbattables sur [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHis] histoires folles. Et en effet : on voit bien des ptérosaures et des brontosaures herbivores sur les illustrations ! Les gens célèbrent le [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] comme une idole, le monde professionnel est choqué et notre gouvernement est considéré comme un groupe d'ignorants têtus qui ont refusé à un héros national la renommée que mérite le [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] !"
 lepsius.583.d: "Nous n'avons pas eu de nouvelles de [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] depuis des mois. Apparemment, [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] est perdu dans les profondeurs inconnues de la forêt du Yucatán."
 lepsius.583.f: "Peut-être qu’un jour on pourrait faire des pièces tragiques sur ce sujet. [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName], qui était presque fou peu avant [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHis], a apparemment cherché jusqu'au bout les traces de la prétendue vallée des dinosaures. La maladie et les tribus mayas hostiles ont tué [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHis] expédition. L'un des rares survivants rapporte que [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] a affirmé en dernier lieu avoir redécouvert les pentes du plateau dans lequel se trouve la vallée. Mais le dernier des hommes se serait mutiné et serait rentré chez lui. Personne ne sait ce qu'est devenu le [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHim]. Cependant, nous avons des raisons de croire que seul et émacié, [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] avait peu de chances de survivre à ce qui a finalement tué [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHim]."
 lepsius.583.g: "[SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe|U] n'était vraiment pas un méchant. Un mauvais explorateur oui, mais pas un méchant."
 lepsius.584.f: "En fait, tout le monde s'attendait à ce que ce voyage ne soit pas long : soit parce que les circonstances condamnaient les hommes à mort, soit parce qu'une mutinerie éclaterait. La découverte un matin n’en fut que plus étonnante. [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] dirigeait la troupe à travers les forêts impénétrables du Yucatán depuis des jours comme un prospecteur maniaque. Il semblait que [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] reconnaissait chaque arbre et chaque pierre. Les autres membres de l'expédition avaient considéré cela soit comme de la folie, soit comme faisant partie d'un plan élaboré visant à les tromper et à leur donner de faux espoirs. Mais voilà, sur les pentes d'un vaste plateau, au creux duquel s'étend la mythique vallée dont on parle depuis des années, certains révisent leur vision. Le cri d'un ptérodactyle résonne dans l'air et perce si profondément les oreilles des participants que tous les doutes sont dissipés."
 lepsius.586.f: "En fait, [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] devrait être satisfait : [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] avait raison avec toutes les affirmations [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHis]. L’équipe a déjà rassemblé toute une série de preuves qui devraient faire sensation chez nous. Mais en explorant de plus près le Monde Perdu, il s'avère de plus en plus que [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] n'était pas la première personne dans cette vallée. En fait, il semble y avoir eu une présence maya importante dans cette région il y a environ 1 500 ans. Apparemment, les habitants d'une ville maya jusqu'alors inconnue venaient à intervalles réguliers dans cette vallée. [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] spécule que la tradition du sacrifice humain pourrait trouver ses origines ici. Quoi qu’il en soit, il existe des preuves solides que la vallée remplissait une fonction religieuse. Un collaborateur a récemment mis au jour des artefacts mayas, suggérant que leur découverte pourrait provoquer une sensation encore plus grande que celle de quelques lézards géants dispersés. Le problème : le site maya présumé se trouve au milieu d’une zone habitée par des rapaces ! La plupart des membres de l’expédition insistent donc pour rentrer chez eux immédiatement au lieu de laisser une mission suicide suivre la suivante."
 lepsius.587.f: "Un seul survivant. Il ne reste plus rien de l'expédition. Il s'agit d'un jeune assistant de recherche à l'université. Il est traumatisé et physiquement en mauvais état. C’est ce que rapporte un télégramme du Yucatán. On ne pouvait pas lui tirer grand-chose. Apparemment, notre chef d'expédition a commis une erreur cruciale et tragique en tentant d'étudier un site maya dans le Monde Perdu. Une erreur que presque tous les membres de l’expédition ont payé de leur vie. L'incident a provoqué un tel choc que tous les voyages au Yucatán qui n'étaient pas strictement archéologiques ont été interdits pour une durée indéterminée."
 lepsius.587.g: "[SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe|U] a choisi... mal."
 lepsius.588.f: "Kukulkan était connu des Mayas sous le nom de serpent à plumes, une divinité vénérée par les Aztèques sous le nom de Quetzalcoatl. Était-ce une coïncidence si les Mayas connaissaient cette vallée ? Y avait-il un lien entre le Monde Perdu et le culte de Kukulkan ? [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] ne peut pas encore en décider. Ce que [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] a découvert, cependant, c'est qu'entre les nids de rapaces se trouvait un sanctuaire oublié depuis longtemps qui représentait le serpent à plumes appelé Kukulkan dans ce pays. Une mystérieuse pierre précieuse sertie dans une amulette était frappante. Sa beauté est si étonnante que le chef de l'expédition l'a surnommé « le joyau de Kulkulkan » : la divinité possédait un joyau avec lequel il pouvait contrôler le vent. Il s’agit probablement de l’une des plus grandes découvertes archéologiques d’Amérique centrale et d’Amérique du Sud."
 lepsius.588.g: "[SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe|U] a choisi judicieusement."
 lepsius.589.d: "Notre expédition du Monde Perdu dirigée par [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] est de retour. [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe|U] et son équipe sont célébrés comme des héros par le peuple."
 lepsius.589.g: "Gloire au [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHim] !"
 lepsius.803.d: "[SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] a terminé ses préparatifs de voyage. [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetSheHe|U] partira aujourd'hui pour faire avancer les connaissances sur un chantier de fouille déjà établi."
 lepsius.803.f: "L'absence de notre archéologue est estimée à environ un an mais peut varier selon la situation. A la fin de l'activité [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetHerHis] [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetSheHe] ouvrira un nouveau chantier de fouille dont la qualité peut varier. [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetSheHe] trouvera également des références à des sites archéologiques jusqu'alors inconnus."
 lepsius.811.f_vok: "[SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] rapporte que [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetSheHe] a découvert un petit tombeau dans la Vallée des Rois. Les pilleurs de tombes auraient déjà volé un grand nombre d'objets, et des graffitis montrent que cela était également connu dans l'Antiquité tardive. Les chefs de l'expédition décidèrent d'y effectuer des fouilles dans l'espoir de pouvoir rapporter ultérieurement d'autres découvertes."
 lepsius.811.f_ass: "Les fouilles en Assyrie ont connu dès le début des difficultés. Après quelques jours, [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] ne parvenait toujours pas à trouver un bon site de fouille, alors [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetSheHe] s'est contenté du deuxième meilleur site. Jusqu’à présent, ils n’ont découvert que les fondations d’un sanctuaire qui aurait pu faire partie d’un complexe plus vaste."
 lepsius.812.f_bab: "Les temps n’ont pas dévoré tous les témoins de la grandeur babylonienne en Mésopotamie. Après que [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] ait rafraîchi les réserves d'eau de [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetHerHis], les habitants ont parlé à [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetHerHim] d'une étrange ruine que les fervents musulmans de la région évitent en raison de leurs origines païennes. Il s’est avéré qu’il s’agit du reste d’une ziggourat. Le complexe est étonnamment bien conservé et, selon les derniers rapports, nos archéologues ont même mis au jour les premières découvertes."
 lepsius.813.f_vok: "Un télégramme sensationnel est arrivé ce matin. [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] rapporte que [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetSheHe] a découvert le tombeau d'une reine. L'identité du défunt n'est pas tout à fait claire, mais selon les premiers rapports, la chambre funéraire est étonnamment intacte. Les peintures murales et les objets précieux donnent un aperçu précieux de l'Égypte ancienne, inconnu depuis longtemps."
 lepsius.813.f_bab: "Les légendes des portes babyloniennes et des remparts de la ville survivent depuis des milliers d’années. Mais c'est toujours autre chose lorsqu'ils sont devant vous. Au début, [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] ne pouvait pas y croire alors que [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetSheHe] marchait mur après mur et découvrait les dimensions énormes d'une cité perdue. Cette découverte nous occupera pendant des années."
 lepsius.813.f_ass: "En plus d’être une puissance militaire majeure, les Assyriens étaient également célèbres pour leurs jardins. Certains prétendent même que les célèbres jardins de Babylone étaient en réalité situés dans la capitale assyrienne de Ninive. Lors des fouilles d'un complexe de palais et des terrasses attenantes, [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] a pu constater pour [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetHerselfHimself] la splendeur de la culture assyrienne. La direction du musée se réjouit."
 lepsius.2191.t: "Un complexe balnéaire inca découvert"
 lepsius.2191.d: "Le Dr [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] a fait une découverte spectaculaire au [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]. Le site a révélé un complexe thermal de l'Empire Inca. Les premières hypothèses sont que le complexe était utilisé pour des cérémonies rituelles."
 lepsius.2191.f: "\"N'est-il pas ironique que nous ayons creusé un bain et que nous puissions utiliser un bain nous-mêmes maintenant ?\""
 lepsius.2191.g: "Un bain serait génial en ce moment !"
 lepsius.2192.t: "Découverte d'un crâne inca avec un trou"
 lepsius.2192.d: "Un fonds étrange a été créé au [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]. Lors de la fouille d'un site inca, le Professeur [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] tomba sur un grand nombre d'ossements. Un crâne en particulier a attiré l'attention du [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis]. Le crâne présentait un trou qui semblait avoir été fait exprès. Apparemment, le défunt a survécu au procès, car le trou s'était partiellement refermé."
 lepsius.2192.f: "\"Je suis sûr que cela a dû être un sacrifice humain ! Qu'en pensez-vous ?\""
 lepsius.2192.g: "Extraterrestres!"
 lepsius_recent_excavation_inspection_modifier: "Recent Archaeological Inspection"
 lepsius.2193.t: "Momies des montagnes incas"
 lepsius.2193.d: "Lors d'une expédition avec [SCOPE.sCharacter('lepsius_mountaineer_character_scope').GetFullName] dans [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName], le Dr [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] a fait une découverte choquante. Sur une montagne, ils ont trouvé les restes d'une jeune fille, qui était maintenant momifiée. Il semble qu'il s'agisse d'une \"qhapaq hucha\" des Incas, un sacrifice d'enfant. Bien qu'il s'agisse d'une triste découverte, elle pourrait permettre d'en savoir plus sur les Incas."
 lepsius.2193.f: "\"Il faisait un froid glacial, le vent déchirait nos vêtements et nous ne pouvions presque rien voir. Lorsque nous avons remarqué le corps, nous avons d'abord pensé qu'il s'agissait d'un alpiniste qui était mort dans des circonstances similaires à celles que nous devions endurer maintenant. Mais nous avons vite réalisé qu'il ne s'agissait pas d'un alpiniste, mais d'une jeune fille.\""
 lepsius.2193.g: "C'est assez triste."
 lepsius.2194.t: "Ruines incas"
 lepsius.2194.d: "Le Dr [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] a fait une découverte dans une région éloignée de [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]. Il a trouvé diverses ruines datant de l'époque de l'Empire Inca. La plupart des ruines sont brûlées et du matériel européen a été trouvé, ce qui a conduit à l'idée que cette colonie a été détruite par les Espagnols. Ceux-ci ont probablement aussi pillé le village, car aucune autre découverte n'a été faite. Tout ce qui avait de la valeur semblait avoir été enlevé."
 lepsius.2194.f: "\"Il y a bien longtemps, ces ruines devaient être des habitations bien construites. Elles semblent pouvoir résister aux tremblements de terre. Seulement... Les envahisseurs espagnols semblent plus forts que les tremblements de terre.\""
 lepsius.2194.g: "Pas d'or ? Pourquoi s'en préoccuper ?"
