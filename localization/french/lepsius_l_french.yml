 lepsius.16.t: "[SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName]"
 lepsius.16.d: "Il s'agit du bureau du plus grand archéologue de notre pays, le professeur [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName]."
 lepsius.16.f: "[SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName] a une expérience archéologique totale de #G [ROOT.Var('lepsius_archaeologist_var').GetVariable('lepsius_archaeologist_experience_var').GetValue]#!\n\n Nombre total d'expéditions financées par notre nation : #G [ROOT.Var('lepsius_total_expeditions').GetValue]#!\n\n Nombre total de découvertes majeures que notre nation a faites : #G [ROOT.Var('lepsius_total_discoveries').GetValue]#!"
 lepsius.16.g: "Organiser un grand congrès archéologique"
 lepsius.17.t: "Artefacts majeurs"
 lepsius.17.d: "Ceci est un aperçu de tous les principaux artefacts du musée."
 lepsius.17.egypt: "\n#T Égypte :#!\n"
 lepsius.17.sarcophagus: "Nous avons trouvé le #E Sarcophage du Pharaon inconnu#! dans un tombeau perdu de la Vallée des Rois.\n"
 lepsius.17.nefertiti: "Le #E Buste de Néfertiti#! fut la récompense de fouilles minutieuses et de disputes diplomatiques.\n"
 lepsius.17.tut: "#E Le masque mortuaire de Toutankhamon#! est le joyau de la couronne du tombeau légendaire de la Vallée des Rois.\n"
 lepsius.17.narmer: "La #E Palette de Narmer#! est l'une des plus anciennes découvertes écrites de l'humanité et est considérée par certains comme le document fondateur de l'Égypte.\n"
 lepsius.17.mesopotamia: "\n#T Mésopotamie :#!\n"
 lepsius.17.lamassu: "Nous avons reçu le #E Lamassu du roi Sargon#! d'Assyrie de manière aventureuse.\n"
 lepsius.17.meskalamdug: "Nous avons trouvé le #E Casque de Meskalamdug#! après des fouilles intensives en Babylonie.\n"
 lepsius.17.sargon: "Nous avons trouvé le #E Masque de Sargon#! lors d'une fouille approfondie de l'ancienne capitale assyrienne de Ninive.\n"
 lepsius.17.gilgamesh: "Après une recherche constante de nouvelles pièces et des recherches de pointe, nous avons réussi à reconstituer des parties de l'Épopée #E de Gilgamesh#!.\n"
 lepsius.17.greece: "\n#T Grèce :#!\n"
 lepsius.17.agamemnon: "Le #E Masque d'Agamamenon#! fut la principale trouvaille de notre grande découverte à Mycènes.\n"
 lepsius.17.priam: "Nous avons reçu #E Le trésor de Priam#! en cadeau de Heinrich Schliemann.\n"
 lepsius.17.snake: "Nous avons pu apporter la soi-disant #E Déesse Serpent#! de Crète, l'un des artefacts les plus importants de la culture minoenne, dans notre musée d'une manière quelque peu peu orthodoxe.\n"
 lepsius.17.diskos: "Après de persistants travaux de fouille, nous avons mis au jour le #E Diskos de Phaistos#!.\n"
 lepsius.17.southamerica: "\n#T Amérique du Sud :#!\n"
 lepsius.17.kukulkan: "La #E Gemme de Kukulkan#! a été obtenue par l'un de nos archéologues au cours d'un voyage fantastique et dangereux.\n"
 lepsius.17.pakal: "Nos archéologues ont sécurisé le #E Trésor funéraire de Pakal#! après des années de fouilles à Palenque.\n"
 lepsius.17.other: "\n#T Autre :#!\n"
 lepsius.17.abraham: "Le #E bâton d'Abraham#! a été trouvé par l'un de nos archéologues lors d'un voyage spirituel.\n"
 lepsius.17.arne: "Dans une aventure fantastique, nos courageux archéologues ont trouvé le #E Manuscrit d'Arne Saknussemm#! comme preuve qu'il a voyagé au centre de la terre au 16ème siècle.\n"
 lepsius.17.skull: "Nous avons acquis un #E crâne de cristal#! très mystérieux auprès d'un antiquaire de confiance.\n"
 lepsius.17.hoa: "La mystérieuse statue de #E Moai Hoa Hakananai'a#! a été trouvée par un aventurier sur l'île de Pâques.\n"
 lepsius.17.summer: "Lors de l'incendie de la résidence impériale chinoise, nous avons récupéré une quantité importante de #E butin précieux du palais d'été#!.."
 lepsius.18.t: "Collection Cultures du monde"
 lepsius.18.d: "Cette section comprend des artefacts de différentes cultures du monde."
 lepsius.18.f: "Cette collection est une collection à la fois anthropologique et archéologique de différentes cultures, dont certaines existent encore. #G 10#! artefacts suffisent pour accueillir une exposition. Il n’existe pas de collections plus importantes, mais les collections individuelles ont plus de valeur. Actuellement, cette collection se compose des sections suivantes : \n\n #G [ROOT.Var('lepsius_oceanic_artifact_minor').GetValue]#! @lepsius_oceanian_minor ! artefacts mineurs d'Océanie \n #G [ROOT.Var('lepsius_oceanic_artifact_major').GetValue]#! @lepsius_oceanian_major ! artefacts majeurs d'Océanie \n\n #G [ROOT.Var('lepsius_fareastern_artifact_minor').GetValue]#! @lepsius_east_asian_minor ! artefacts mineurs d'Extrême-Orient \n #G #!2#! @lepsius_east_asian_major ! principaux artefacts d'Extrême-Orient \n"
 lepsius.18.g: "Organisez une exposition d'Extrême-Orient."
 lepsius.18.h: "Organisez une exposition océanique."
 lepsius.22.d: "The assembled elite of our capital is on its feet: the Archaeological Museum comes up with a new exhibition."
 lepsius.22.f: "People from the upper and middle class crowd in front of the entrance of the museum in the morning. The new exhibition begins with a lecture by a leading archaeologist who will give a first-hand account of the latest expedition and the excavations at the site. Afterwards, art lovers and onlookers can take a look at the exhibits themselves. The press is on site preparing their articles. A big day for [ROOT.GetCountry.GetNameNoFlag], nationally and internationally; the great powers look on with envy at our prestigious collection."
 lepsius.22.g: "I hope I get another ticket."
 lepsius.24.t: "New Aegean Exhibition"
 lepsius.25.t: "New Pre-Columbian Exhibition"
 lepsius.26.t: "Archaeological Congress ends"
 lepsius.26.d: "The congress organized by our Archaeological Society is drawing to a close today. Professor [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] has expanded his knowledge in the process."
 lepsius.26.f: "Several weeks of meetings, readings, conferences and cozy get-togethers are coming to an end. National and international archaeologists close to the society exchanged discoveries, expeditions and theories. The event was a complete success - and broadened the horizons of everyone involved."
 lepsius.26.g: "Always these arguments about who has the finest leather jackets..."
 lepsius.27.t: "New World Cultures Exhibition"
 lepsius.30.t: "Nouveau scientifique principal"
 lepsius.30.d: "Le Musée archéologique a nommé un nouveau scientifique principal. Il s'agit du [SCOPE.sCharacter('lepsius_museum_lead_scientist').GetPrimaryRoleTitle] [SCOPE.sCharacter('lepsius_museum_lead_scientist').GetFullName]."
 lepsius.30.f: ""
 lepsius.30.g: "Toutes nos félicitations!"
 lepsius.31.t: "Un scientifique principal devient directeur du musée"
 lepsius.31.d: "[SCOPE.sCharacter('lepsius_museum_lead_scientist').GetPrimaryRoleTitle] [SCOPE.sCharacter('lepsius_museum_lead_scientist').GetFullName] a eu l'honneur d'être nommé nouveau directeur du musée. Il prendra ainsi sa retraite du service actif."
 lepsius.31.f: "[SCOPE.sCharacter('lepsius_museum_lead_scientist').GetFullName] a consacré sa vie à la science et à la culture pendant des années et s'est depuis longtemps lassé de la politique. Pour beaucoup, la décision de se concentrer uniquement sur les opérations des musées n’a pas été une surprise. Il ne sera plus disponible politiquement ni pour des expéditions. Il y a des promotions qui sont regrettables."
 lepsius.31.g: "Adieu..."
 lepsius.80.t: "Une nouvelle ère de l'archéologie !"
 lepsius.80.d_egypt: "Le Dr [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] a utilisé de nouvelles méthodes archéologiques pour découvrir de nombreux détails d'un ancien village égyptien. L'utilisation de la stratigraphie et du système des trois âges ainsi que la documentation des découvertes du [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] marquent une nouvelle ère en archéologie."
 lepsius.80.d_mesopotamia: "Le Dr [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] a utilisé de nouvelles méthodes archéologiques pour découvrir de nombreux détails d'un ancien village mésopotamien. L'utilisation de la stratigraphie et du système des trois âges ainsi que la documentation des découvertes du [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] marquent une nouvelle ère en archéologie."
 lepsius.80.d_aegean: "Le Dr [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] a utilisé de nouvelles méthodes archéologiques pour découvrir de nombreux détails d'un ancien village égéen. L'utilisation de la stratigraphie et du système des trois âges ainsi que la documentation des découvertes du [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] marquent une nouvelle ère en archéologie."
 lepsius.80.d_precolumbian: "Le Dr [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] a utilisé de nouvelles méthodes archéologiques pour découvrir de nombreux détails d'un ancien village précolombien. L'utilisation de la stratigraphie et du système des trois âges ainsi que la documentation des découvertes du [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] marquent une nouvelle ère en archéologie."
 lepsius.80.f: "\"Les couches du sol dans lesquelles nous avons trouvé les artefacts de ce village nous en disent long. Une couche par exemple contient beaucoup de charbon et marque la fin des découvertes de cette période. Cela signifie probablement qu'un incendie a détruit \""
 lepsius.80.g: "Tellement civilisé !"
 lepsius.100.t: "Préparation de l'expédition archéologique [ROOT.GetCountry.GetAdjectiveNoFlag]"
 lepsius.100.d: "Les préparatifs de l'expédition archéologique sont en cours. Cependant, on ne sait toujours pas exactement combien de temps le voyage devrait être financé."
 lepsius.100.f: "Non seulement le financement en tant que tel, mais aussi la durée de l'expédition devraient bientôt devenir une question politique après que [ROOT.GetCountry.GetName] eut décidé de céder aux souhaits de ses universitaires et d'envoyer l'expédition tant attendue. L'aller-retour à lui seul prendrait un temps précieux, tandis que les grincheux du Cabinet insistaient pour envoyer seulement quelques négociateurs acquérir quelques objets chez l'antiquaire."
 lepsius.100.g: "Ne faites pas les choses à moitié, ce sera un long voyage."
 lepsius.100.h: "Un trajet moyen long est un bon compromis."
 lepsius.100.i: "Un court trajet suffit."
 lepsius.110.t: "Polémique sur le leadership"
 lepsius.110.d: "L'intelligentsia se considère comme la favorite pour avoir un de ses représentants à la tête de l'expédition archéologique. Mais les voix dissidentes sont nombreuses."
 lepsius.110.f: "Les élites du pays sont divisées. Le soutien de l’État à l’expédition a suscité des critiques et des envieux. L'intelligentsia du pays considère l'entreprise comme sa souveraineté. Les forces de l'opposition et du gouvernement exigent qu'ils obtiennent un poste d'observateurs. Il est indéniable qu'un représentant de l'intelligentsia serait le mieux qualifié pour cette tâche, mais il existe d'autres possibilités..."
 lepsius.110.g: "L'intelligentsia est la plus qualifiée."
 lepsius.110.h: "Un représentant du gouvernement doit accompagner l'expédition."
 lepsius.110.i: "Un homme politique de l'opposition convient à cela."
 lepsius.110.j: "Une personne ayant une expérience en archéologie devrait faire le travail."
 lepsius.110.k: "Cet honneur n'appartient qu'à l'héritier du trône."
 lepsius.120.t: "Attaché militaire"
 lepsius.120.d: "Il est fortement conseillé de recruter un attaché militaire pour l'expédition archéologique."
 lepsius.120.f: "L'armée a suggéré trois candidats possibles pour servir d'attaché militaire pour l'expédition. La décision a été communiquée aujourd'hui par le ministère de la Guerre. La sélection n'a pas encore été confirmée."
 lepsius.120.g: "[SCOPE.sCharacter('lepsius_military_attache_1').GetFullName]."
 lepsius.120.h: "[SCOPE.sCharacter('lepsius_military_attache_2').GetFullName]."
 lepsius.120.i: "[SCOPE.sCharacter('lepsius_military_attache_3').GetFullName]."
 lepsius.130.t: "Des artistes rejoignent l'expédition"
 lepsius.130.d: "Un groupe d'artistes de notre Académie a exprimé son intérêt à participer à la prochaine expédition archéologique."
 lepsius.130.f: "La rumeur a circulé à l'académie des beaux-arts qu'une expédition serait bientôt à la recherche de cités perdues et de trésors artistiques inconnus. Dessinateurs et peintres s'inspiraient déjà de l'atmosphère, des couleurs et des scènes de l'expédition égyptienne de Napoléon. Il y a suffisamment de candidats qui souhaitent réaliser pour nous des dessins et des croquis de sites archéologiques. Il va sans dire qu'une telle extension de l'expédition entraîne des coûts supplémentaires, mais elle en vaut certainement la peine."
 lepsius.130.a: "Ils sont cordialement invités."
 lepsius.130.b: "Merci mais, non merci."
 lepsius.140.t: "Un archéologue recrute des chercheurs expérimentés"
 lepsius.140.f: "Des intérêts communs nous unissent : notre chef a des liens avec d’autres spécialistes de l’archéologie, de l’histoire et de l’anthropologie. Une telle augmentation du nombre de membres de l’expédition aurait certainement un effet positif sur les résultats financiers de l’entreprise. Cependant, il ne s’agit pas d’un service amical : l’État doit payer la nourriture, le logement et le salaire. Certains pourraient qualifier de népotisme un tel approvisionnement par les « amis » du chef de l’expédition, mais il nous a assuré que la justification de cette expansion était purement scientifique."
 lepsius.140.a: "Un enrichissement pour l'équipe."
 lepsius.140.b: "Nous ne payons pas les cliques de nos archéologues !"
 lepsius.150.t: "Des naturalistes se joignent à l'expédition"
 lepsius.150.d: "Les scientifiques souhaitent mener des expériences lors de la prochaine expédition."
 lepsius.150.f: "Les universités de notre pays ne sont pas restées insensibles aux événements actuels. Certains scientifiques souhaiteraient accompagner l'expédition pour étudier les conditions géographiques, comparer des calculs astronomiques ou réaliser des expériences météorologiques. D'autres pensent que les échantillons de roches et de bois peuvent améliorer les résultats scientifiques de l'expédition. De nombreux scientifiques sélectionnés ont clairement montré qu'ils attendaient depuis des lustres l'heure de se rendre dans les pays étrangers tant attendus: ils n'attendaient qu'un prétexte pour se présenter comme passagers gratuits. Et ils ont aussi des souhaits coûteux !"
 lepsius.150.a: "A magnificent idea!"
 lepsius.150.b: "Nous ne pouvons pas nous occuper de toutes les barbes hirsutes..."
 lepsius.200.t: "L'expédition atteint le lieu de départ"
 lepsius.200.d: "L'expédition a atteint son point de départ. Il est temps de faire quelques derniers préparatifs avant le départ."
 lepsius.200.f_ex_upe: "« Louxor, Louxor ! » le cri traverse les rangs alors que le temple de Karnak se profile à l'horizon. Le bateau menace de basculer dans le Nil alors que les membres de l'expédition s'entassent près de la rambarde, jetant un coup d'œil à la silhouette de la ville connue dans l'Égypte ancienne sous le nom de Thèbes. Des ruines de structures millénaires bordent les rives du Nil, des obélisques se dressent entre des maisons délabrées et des tentes. Sur l'autre rive du Nil, cependant, s'élèvent les chaînes de montagnes sablonneuses où se cache la légendaire Vallée des Rois et où l'on dit qu'il se trouve encore des tombeaux inconnus des pharaons. Mais avant d’en arriver là, il nous reste encore quelques petites choses à régler à Louxor…"
 lepsius.200.f_ex_loe: "La « Mère du Monde » se trouve au-dessus des eaux du Nil scintillant au soleil. Minarets et dômes ornent le panorama et témoignent de la puissance et de l'importance de cette ville, qui a contribué autrefois et aujourd'hui à déterminer le destin du Moyen-Orient. Des bazars et des tapis colorés caractérisent les rues ainsi que la fine ornementation de l'architecture fatimide. Mais la vue va plus loin, bien au-delà, là où les sommets des pyramides annoncent une époque révolue, ce qui est le véritable but de notre voyage. Mais avant cela, il faut prendre quelques précautions au Caire."
 lepsius.200.f_ex_bab: "Bagdad, la plus grande ville de Mésopotamie, regorge d'activité. Comme Le Caire, c'est un centre du monde arabe ; comme Le Caire, c'était le siège du pouvoir et du prestige. Mais contrairement au Caire, où les pyramides lointaines de Gizeh annoncent un monde encore plus ancien, il y a peu de choses à Bagdad qui évoquent les empires de Babylone et d’Akkad. Même les prétendues antiquités achetées par un membre de l'expédition quelque peu imprudent à un marchand douteux se sont révélées être des contrefaçons. Alors que les bâtiments en pierre des Égyptiens et des Mayas témoignent encore des civilisations perdues, il n'y a pratiquement rien de comparable ici. Nous devrons probablement repartir de zéro."
 lepsius.200.f_ex_ass: "Que peut-on trouver d’autre en Assyrie après les fouilles de Layard à Nimrud ? Beaucoup, selon un commerçant de Mossoul. Il y a à peine un mois, la tête d'un lamassu émergeait du sable. Et le bazar propose toujours de bonnes pièces, nous confie-t-il. Le fait que toute une série de pièces n'aient pas pu être récupérées est également dû aux clans kurdes de la région, qui ne permettent pas à tout le monde de braconner dans leur région - indépendamment du permis de fouille. Nous emporterons l'avertissement avec nous et obtiendrons l'essentiel avant de commencer le voyage."
 lepsius.200.f_ex_arg: "Ah, cette bonne vieille Athènes ! Pas assez vieux pour ce que recherche notre équipe d’expédition, mais assez bon pour passer des jours supplémentaires en Attique. La Grèce ne compte pas beaucoup de grandes villes, notre équipe d'expédition n'a donc d'autre choix que d'y faire les préparatifs les plus nécessaires avant de partir à la campagne. Notre guide d'archéologie nous met à rude épreuve, car certains érudits consacrent beaucoup trop de temps aux distractions, qu'il s'agisse de marbre classique ou de vin grec. Le soleil chaud, l'ombre des oliviers et l'idylle akkadienne invitent à s'attarder et à se détendre - certains semblent avoir déjà oublié pourquoi nous sommes réellement ici."
 lepsius.200.f_ex_cre: "Une légère brise souffle de la mer Égée alors que notre expédition atteint le port d'Héraklion. Les anciens bastions vénitiens saluent, rappelant l'époque où Candie était une plaque tournante commerciale au Moyen Âge. Après le déchargement de la cargaison sous le coassement des mouettes et le débarquement des participants, l'accueil amical laisse place à l'amère réalité. Alors que certains participants se plaignent de la cuisine locale et exigent un meilleur hébergement, l'archéologue principal a peu de sympathie pour ces demandes moins intellectuelles. Parce qu'Héraklion n'est pour lui qu'une étape : les trésors des Minoens l'attendent à l'intérieur de l'île."
 lepsius.200.f_ex_yuc: "A Mérida, notre équipe de fouilles effectue les derniers préparatifs avant le grand départ. Les traces de la conquête et de la colonisation espagnole caractérisent la ville qui, malgré sa taille raisonnable, montre qu'elle était autrefois, avec Campeche, le lieu à partir duquel les Espagnols exerçaient leur contrôle sur la péninsule. À moins de 100 miles de là se trouveraient des sites mayas que la jungle a récupérés au cours des derniers siècles. Les membres de notre expédition ne seront pas épargnés par la nécessité de creuser plus profondément dans les sous-bois s'ils souhaitent découvrir de nouveaux temples ou même des villes..."
 lepsius.200.f_ex_per: "Les Andes dominent comme des rois la tête de leurs sujets ; leurs sommets nous regardent majestueusement, comme pour tester notre dignité à entrer dans leurs vallées. Le voyage jusqu'à Cuzco a été ardu, mais les progrès technologiques font que les expéditions ne deviennent plus des voyages aventureux et imprévisibles. Dans les rues de l’ancienne capitale des Incas, la domination historique espagnole se conjugue au charme de l’architecture andine. Entre les deux, des murs cyclopéens sans soudure témoignent encore de l'architecture des anciens souverains. Les ruines de la forteresse inca de Sacsayhuamán, à quelques pas du centre-ville, sont un avant-goût de ce que les membres de l'expédition rechercheront au cours de ce voyage."
 lepsius.200.g: "Ah, l'Egypte."
 lepsius.200.h: "Ah, la Mésopotamie."
 lepsius.200.i: "Ah, la Grèce."
 lepsius.200.j: "Ah, les moustiques et les maladies mortelles."
 lepsius.200.k: "Ah, le Pérou."
 lepsius.210.t: "Les interprètes et le guide mystérieux"
 lepsius.210.d: "Il y a un désaccord parmi les membres de l'expédition sur la question de savoir si nous devrions plutôt dépenser notre argent restant pour quelques interprètes qualifiés ou pour un guide mystérieux."
 lepsius.210.f: "Ce n'est pas une question de quantité ou de qualité, même si certains membres de notre expédition l'expriment ainsi. Les interprètes ont non seulement l’avantage de parler la langue, mais aussi de permettre à la population locale de leur faire confiance plus rapidement. Les chances d’obtenir des informations sur les artefacts sont considérablement plus élevées. D’un autre côté, le mystérieux guide pourrait nous emmener dans des endroits spéciaux que nous ne trouverions pas autrement ou que nous trouverions avec beaucoup de difficulté – des endroits avec des artefacts spéciaux et des défis inconnus."
 lepsius.210.a: "Nous pourrions avoir recours à des interprètes."
 lepsius.210.b: "Nous avons besoin d'un guide qui connaît les secrets de la région."
 lepsius.220.t: "Un archéologue achète des objets"
 lepsius.220.d: "Notre chef d'expédition a trouvé et acquis des objets précieux sur le marché local."
 lepsius.220.f: "Les pilleurs de tombes, les chasseurs de trésors et les aventuriers parcouraient les sites de fouilles du monde bien avant que le premier archéologue ne pose le pied sur terre. C'est une vérité amère. Dans de nombreux cas, les objets sont perdus sans laisser de trace, finissent dans des collections privées ou - s'ils sont constitués de métaux précieux - sont même fondus. Mais même les découvertes qui peuvent être récupérées ont le défaut de ne jamais clarifier leur origine. Les archéologues expérimentés ont le don non seulement de fouiller des artefacts, mais aussi de les trouver dans le commerce et de reconstituer leur provenance."
 lepsius.220.g: "Quelle belle surprise."
 lepsius.230.t: "Écrire un journal"
 lepsius.230.d: "Inspiré par les environs exotiques et les impressions quotidiennes, notre chef d'expédition a commencé à tenir un journal."
 lepsius.230.f: "Chaque pays et lieu a ses propres couleurs et odeurs. Le mysticisme de l'Orient, la magie de la Grèce et les légendes des Mayas et des Incas ont captivé les gens. D’autres s’inspirent du quotidien inconnu, des langues incompréhensibles ou de l’étrangeté du monde dans lequel un aventurier est plongé. Parfois, il suffisait d'écrire pour traiter l'impact des impressions - et les enregistrer."
 lepsius.230.g: "Esprit romantique incorrigible."
 lepsius.240.t: "Écrire un traité"
 lepsius.240.d: "Notre chef d'expédition a décidé de rédiger un article scientifique sur le déroulement de l'expédition."
 lepsius.240.f: "Cela peut paraître surprenant, mais tout le monde n’a pas le temps de tenir ses propres archives parallèlement à son travail réel. Certains sujets ne trouvent pas leur place dans les rapports officiels, peut-être parce qu'ils s'écartent trop du sujet réel - ou parce que la thèse n'est pas encore assez mûre. Quoi qu'il en soit : notre chef d'expédition a apparemment trouvé un sujet sur lequel il aimerait travailler en dehors des reportages officiels et le publier plus tard."
 lepsius.240.g: "Espérons qu'il en résulte quelque chose d'utile."
 lepsius.250.t: "Combat de taverne"
 lepsius.250.d: "Les mauvaises qualités de notre chef d'expédition ont conduit à un incident diplomatique."
 lepsius.250.g: "Embarrassant..."
 lepsius.260.t: "Appréciation"
 lepsius.260.d: "Les qualités de notre chef d'expédition ont conduit à une large reconnaissance de notre entreprise archéologique."
 lepsius.260.g: "Merveilleux"
 lepsius.270.t: "Glace et limonade"
 lepsius.270.g: "Il faut voyager avec style."
 lepsius.280.t: "Un public"
 lepsius.280.f: "Le gouverneur local avait eu vent de l'expédition et avait convoqué le chef de la mission archéologique. Il s'intéressait aux buts et était extrêmement curieux au sujet de l'invité. Au cours de la conversation qui a suivi, notre chef a non seulement réussi à bien divertir l'hôte, mais il l'a également suffisamment impressionné par ses compétences pour que le gouverneur lui propose de l'aider. Il s’est avéré qu’il possédait un artefact précieux qu’il a offert à notre expédition en guise de geste aimable."
 lepsius.280.g: "Un merveilleux cadeau !"
 lepsius.290.t: "Un attaché embauche des gardes"
 lepsius.290.d: "L'attaché militaire de notre expédition archéologique a engagé des mercenaires pour assurer la sécurité de notre voyage."
 lepsius.290.f: "Apparemment, le ministère de la Guerre a eu de la chance en sélectionnant notre attaché militaire. Ses compétences lui ont valu l'approbation d'un officier militaire local et il lui a parlé de l'envoi d'un groupe de gardes pour protéger notre expédition. En échange, il a rendu visite à un contingent de troupes du pays hôte et a partagé son expertise."
 lepsius.290.g: "L’armée a choisi la bonne personne."
 lepsius.300.t: "L'expédition archéologique commence !"
 lepsius.300.d: "Les choses sont emballées, les derniers secours ont été recrutés, le plan d'expédition est en place – le voyage peut commencer."
 lepsius.300.f: ""
 lepsius.300.g: "On y va!"
 lepsius.310.t: "Fin de l'expédition archéologique"
 lepsius.310.d: "L'expédition archéologique est terminée. Il est temps de compter le rendement !"
 lepsius.310.f: "Ce fut un voyage ardu, semé de nombreuses difficultés et obstacles, mais notre nation a non seulement approfondi sa connaissance du passé au cours de l'expédition, mais a également acquis des objets précieux pour le musée. Certains assistants se sont déjà licenciés, certains membres des fouilles aspirent à rentrer chez eux. Pendant ce temps, le chef de l'expédition compte les pièces plus petites acquises qui font le succès de l'expédition. Le catalogage sec suit l'aventure romantique."
 lepsius.310.g: "Bravo à la science ! Maintenant, ramenez nos garçons."
 lepsius.310.h: "Ce n'est qu'un début : organiser des fouilles archéologiques à long terme."
 lepsius.311.t: "L'archéologue publie son journal"
 lepsius.311.f: ""
 lepsius.311.g: "Une inspiration pour nous tous."
 lepsius.312.t: "Un archéologue publie un article scientifique"
 lepsius.312.f: ""
 lepsius.312.g: "Nous devrions en obtenir un exemplaire pour la bibliothèque nationale."
 lepsius.313.t: "Le chef de l'expédition rentre chez lui"
 lepsius.313.d: "[SCOPE.sCharacter('lepsius_relaxing_archaeologist').GetFullName] has returned after an archaeological expedition. The experiences on the trip left a deep impression. Nevertheless, the laborious evaluation of the artifacts found now awaits - even the less significant pieces, such as shards, scraps of fabric, and pieces of wood."
 lepsius.313.f: "The actual archaeological work, the dry cataloging of all the objects, their classification, and conclusions about the past within musty university walls, is less appealing and adventurous than the archaeologist's life suggests. #V It will typically take three years.#! Should the nation nevertheless need its archaeologist—perhaps for a local excavation—it might be better to relieve the scientist of [SCOPE.sCharacter('lepsius_relaxing_archaeologist').GetHerHis] duties immediately. Doctor [SCOPE.sCharacter('lepsius_relaxing_archaeologist').GetLastName] might even be grateful for it."
 lepsius.313.g: "Let's catalog!"
 lepsius.401.t_bedouin: "Raid bédouin"
 lepsius.401.t_kurdish: "Raid kurde"
 lepsius.401.d: "Notre expédition archéologique a été attaquée par des tribus locales."
 lepsius.401.f_bedouin: "Toutes les zones du désert ne sont pas sous le contrôle total du gouvernement. Certaines tribus bédouines résistent avec succès à la modernisation de l’État et au changement social. Les clans vivent toujours comme leurs ancêtres il y a des siècles. Les raids contre les caravanes et les voyageurs imprudents font partie du quotidien. Une attaque bédouine a également affecté notre expédition : des objets de valeur et du matériel archéologique ont été volés et des chameaux ont été kidnappés. Le chef de l'expédition nous demande de parler au gouvernement afin que de tels incidents mettant en danger l'expédition ne se reproduisent plus. Bien entendu, cela sera perçu comme une ingérence dans les affaires intérieures…"
 lepsius.401.f_kurdish: "Les monts Zagros, qui bordent la Mésopotamie au nord et à l’est, ont toujours abrité des tribus kurdes qui ne sont que vaguement sous le contrôle du gouvernement local. Beaucoup d’entre eux agissent de leur propre chef, ne reconnaissant que leur tribu comme autorité. Encore et encore, ils participent à des raids. Cette fois, une attaque kurde a également affecté notre expédition : des objets de valeur et du matériel archéologique ont été volés et des chameaux ont été kidnappés. Le chef de l'expédition nous demande de parler au gouvernement afin que de tels incidents mettant en danger l'expédition ne se reproduisent plus. Bien entendu, cela sera perçu comme une ingérence dans les affaires intérieures…"
 lepsius.401.g: "Déposez une plainte officielle auprès du gouvernement."
 lepsius.401.h: "Nous nous arrangeons."
 lepsius.401.i: "Punissez-les !"
 lepsius.401.j: "Gardes !"
 lepsius.402.t_desert: "Tempête du désert"
 lepsius.402.t_tropical: "Tempête tropicale"
 lepsius.402.d: "Notre expédition archéologique fait face à une tempête dévastatrice !"
 lepsius.402.f_desert: "Au début, ce n'était qu'une légère brise qui soufflait du sable dans les yeux de notre équipe d'expédition. Mais alors le vent devint si fort qu'il accabla les hommes et les bêtes de somme. Même après des heures, la tempête du désert n'a rien perdu de sa violence. Lorsque nos archéologues ont interrogé un habitant local sur ce phénomène, il a répondu que ce type de tempêtes était normal à cette période de l'année. Ces tempêtes du désert pourraient mettre en danger toute notre expédition !"
 lepsius.402.f_tropical: "Aucun tonnerre ni aucun éclair n'ont précédé les pluies soudaines qui ont balayé nos équipes d'expédition un après-midi. Au début, ils ont cherché un abri, mais au bout de quelques heures, ils ont réalisé que cette tempête tropicale était très différente des précipitations habituelles dans cette région. L’un de nos porteurs a même suggéré qu’il pourrait s’agir d’un véritable ouragan !"
 lepsius.402.g: "Cette douce brise ne nous arrêtera pas."
 lepsius.402.h: "La situation est trop dangereuse, l'expédition doit attendre."
 lepsius.403.t: "Brouillard dans les Andes"
 lepsius.403.d: "Après que l'attaché militaire ait une nouvelle fois mis notre expédition dans une situation dangereuse, les autres participants réclament des conséquences."
 lepsius.403.f: "L'équipage de notre expédition dans les Andes se plaint de l'attaché militaire. À plusieurs reprises, il a conduit le groupe dans la mauvaise direction à la recherche d'un ancien site inca. Récemment, il est même arrivé que, dans son ambition d'atteindre son objectif le plus rapidement possible, il ne comptait pas sur le brouillard dans les montagnes. L'expédition a perdu un temps important à cause de cela. Certains hommes font pression pour nommer un nouveau leader."
 lepsius.403.g: "Il devrait être relevé de ses fonctions."
 lepsius.403.h: "Il a fait du bon travail."
 lepsius.404.t_aegean: "Pont brisé"
 lepsius.404.t_peru: "Pont suspendu cassé"
 lepsius.404.d: "Un pont détruit empêche notre expédition de progresser."
 lepsius.404.f_aegean: "La Grèce et la Crète sont connues pour leurs paysages accidentés. Alors que notre expédition atteint une gorge, il s'avère qu'un pilier du pont a été emporté par un récent glissement de terrain. Nous sommes confrontés à la décision de savoir s'il faut réparer le pont et viser notre objectif initial, ou aller vers un autre endroit. Cette dernière option est plus rapide et moins coûteuse, mais probablement couronnée de moins de succès archéologiques."
 lepsius.404.f_peru: "Après une ascension ardue à travers les cols andins et les routes étroites à flanc de montagne, notre expédition archéologique se trouve confrontée à un problème inattendu. Un pont suspendu qui, selon les habitants, mène à un temple entouré de légendes a été complètement détruit. Certains membres de l'expédition recommandent d'abandonner la quête et de se diriger vers un site archéologique plus facile, mais les habitants estiment que cela en vaudrait la peine. Toutefois, si nous voulons reconstruire le pont, cela nous coûtera du temps et de l’argent."
 lepsius.404.g: "Reconstruisez le pont."
 lepsius.404.h: "Trouvez un autre moyen."
 lepsius.405.t_mesopotamia: "Mauvaises routes en Mésopotamie"
 lepsius.405.t_yucatan: "Mauvaises routes au Yucatán"
 lepsius.405.d: "Le mauvais état des routes présente à notre expédition des défis jusqu'alors insoupçonnés."
 lepsius.405.f_mesopotamia: "Malheureusement, toutes les routes n’ont pas la qualité à laquelle on pourrait s’attendre. En particulier, les routes secondaires et les sentiers qui séparent les principales routes commerciales sont dans un état remarquablement déplorable. Mais les destinations potentielles de notre voyage sont très éloignées des centres de civilisation. Le voyage est difficile et certains membres de l'expédition se plaignent déjà que nous aurions dû prendre un autre chemin."
 lepsius.405.f_yucatan: "Les jungles du Yucatán sont encore sous-développées, même à l’époque moderne. Cela en fait des destinations archéologiques intéressantes, car de nombreuses ruines n'ont pas été examinées de près par les humains depuis des siècles. D’un autre côté, le voyage est semé d’embûches. À l'exception de quelques sentiers forestiers très fréquentés, il n'y a presque pas de routes. Les membres de l’expédition se plaignent déjà de la décision d’emprunter cette route."
 lepsius.405.g: "Essayez un autre chemin."
 lepsius.405.h: "Investissez dans de nouveaux hommes et bêtes de somme pour rendre le voyage plus agréable."
 lepsius.405.i: "Nous restons sur cette route."
 lepsius.406.t: "Naufrage de l’expédition !"
 lepsius.406.d: "Notre attaché militaire est responsable d'un événement des plus malheureux."
 lepsius.406.f: "L'un de nos navires d'expédition a fait naufrage en mer Égée. Heureusement, personne n'a été blessé, mais une grande partie de notre équipement archéologique a coulé au large. La majorité de notre équipe d'expédition reproche à notre capitaine d'avoir négligé un banc. Il s'est toutefois défendu en affirmant qu'il souhaitait terminer le voyage rapidement et que le récif n'était répertorié sur aucune carte. Il existe un consensus croissant parmi les hommes selon lequel, avec le leader actuel, nos chances de succès diminuent."
 lepsius.406.g: "Il est responsable."
 lepsius.406.h: "Achetez du nouvel équipement et faisons comme si de rien n'était."
 lepsius.407.t: "L'Oasis"
 lepsius.407.d: "Au cours de leur voyage, nos archéologues ont découvert une oasis jusqu'alors inconnue et ont rafraîchi leurs réserves d'eau."
 lepsius.407.f: "En fait, les membres de l'expédition s'attendaient à endurer quelques jours de difficultés : une ruine égyptienne antique qu'ils voulaient explorer était censée se trouver quelque part dans le désert à deux ou trois jours de marche. Mais à leur grande surprise, ils découvrirent qu'il y avait une oasis sur le chemin : des palmiers aux dattes grasses et des figuiers aux fruits sucrés les attendaient. Les réserves d'eau ont été réapprovisionnées et certains participants ont profité de l'occasion pour se baigner sous le soleil égyptien."
 lepsius.407.g: "Des nouvelles rafraîchissantes."
 lepsius.408.t: "Amulette de Nazar"
 lepsius.408.d: "Certains porteurs embauchés pensent que notre chef archéologique est poursuivi par le « mauvais œil ». Ils le pressent d'acheter une amulette."
 lepsius.408.g: "Achetez l'amulette."
 lepsius.408.h: "Cette superstition contredit toutes les convictions scientifiques !"
 lepsius.409.t: "Des pêcheurs sympathiques"
 lepsius.409.d: "De sympathiques pêcheurs, de passage sur la côte, nous ont proposé de transporter le matériel de notre expédition sur quelques kilomètres."
 lepsius.409.g: "Très utile."
 lepsius.410.t_yucatan: "Perroquet, mascotte"
 lepsius.410.t_peru: "Condor menaçant"
 lepsius.410.d_yucatan: "Depuis que nous avons plongé dans la jungle du Yucatán, un petit perroquet coloré nous accompagne."
 lepsius.410.d_peru: "Depuis que nous avons escaladé les Andes, l’ombre d’un puissant condor plane chaque jour sur nous."
 lepsius.410.f_yucatan: "Les forêts du Yucatán regorgent de dangers : jaguars, serpents et insectes venimeux se cachent dans les buissons. Dans le même temps, les membres de l'expédition sont fascinés par la flore et la faune, en particulier par un petit perroquet coloré qui s'envole au-dessus des chapeaux et des casques et ne quitte pas les voyageurs. L’oiseau semble extrêmement intelligent et peut désormais même être nourri régulièrement. Le chef de l'expédition a déclaré que le perroquet est la mascotte de l'entreprise et a l'intention de le ramener chez lui à la fin du voyage."
 lepsius.410.f_peru: "Le condor est le roi des Andes. Les énormes oiseaux dominent l’air, leur ombre s’agrandit jusqu’à atteindre une taille inimaginable. Depuis le début de l'expédition, il surplombe les alpagas et les porteurs d'une manière carrément menaçante. Les habitants ne font pas confiance à l'animal. En tant que vautour, on sait qu’il tourne autour des cadavres plutôt que des vivants. Le sentiment de nausée se propage chez certains participants."
 lepsius.410.g: "De bon augure."
 lepsius.410.h: "Il devrait devenir un perroquet de compagnie."
 lepsius.410.i: "Un mauvais présage."
 lepsius.410.j: "Il sera à nous."
 lepsius.411.t: "Des bêtes de somme épuisées"
 lepsius.411.d: "Il semblerait que nous ayons surmené nos bêtes de somme."
 lepsius.411.f: "Depuis des jours, nous réclamons nos bêtes de somme. Certains disent même : trop longtemps. Les signes de fatigue sont désormais perceptibles. Certains animaux refusent même d’aller plus loin et ne peuvent être déplacés qu’avec des coups. Ce matin, notre premier animal s'est effondré."
 lepsius.411.g: "Ils peuvent se reposer quand ils sont morts."
 lepsius.411.h: "Laissez-les se reposer !"
 lepsius.412.t: "Expédition archéologique perdue !"
 lepsius.412.d: "Tout contact avec notre expédition archéologique est perdu depuis deux mois."
 lepsius.412.f: "Parfois, on n'a tout simplement pas de chance. Certains locaux superstitieux prétendent même que toute notre entreprise est maudite. Quoi qu’il en soit : le contact avec notre expédition archéologique a été complètement perdu. Le dernier message a mis du temps à arriver. Nous sommes sûrs que les archéologues vont bientôt reculer, mais dans l'état actuel des choses, l'ensemble du personnel semble s'être égaré."
 lepsius.412.g: "Malédictions !"
 lepsius.413.t: "Maladies exotiques"
 lepsius.413.d: "Certains participants de notre expédition archéologique sont gravement malades."
 lepsius.413.f: "La maladie a toujours rendu les longs voyages difficiles. Que ce soit sous les tropiques, dans les déserts, dans les marécages ou en haute montagne : les membres de nos expéditions ne sont pas habitués aux conditions et des agents pathogènes inconnus se cachent partout. Le paludisme, en particulier, fait à nouveau constamment ses victimes. Pendant le voyage, certains hommes tombent si gravement malades qu’ils ne peuvent tout simplement plus travailler."
 lepsius.413.g: "Nous attendons et les guérissons."
 lepsius.413.h: "Laissez-les derrière vous."
 lepsius.414.t: "la corruption"
 lepsius.414.d: "Notre expédition est harcelée par les autorités locales et empêchée de progresser."
 lepsius.414.f: "Depuis le début de notre expédition, ses participants ont été confrontés à toute une série de harcèlements. Les petits et moyens fonctionnaires nous compliquent la vie avec des timbres et des taxes spéciales. On a même remis en question notre visa et voulu nous infliger une amende. La situation est extrêmement confuse. Apparemment, on ne peut pas réussir dans ce pays sans de bons contacts ou des liens familiaux."
 lepsius.414.g: "Des voleurs !"
 lepsius.414.h: "Voleurs!"
 lepsius.414.i: "Les politiciens!"
 lepsius.415.t: "L'inondation"
 lepsius.415.d: "Alors qu'une inondation dévaste le pays, notre chef d'expédition aperçoit une femme emportée par les eaux de crue."
 lepsius.415.f: "Les pluies incessantes de ces derniers jours ont fait déborder l'eau ; une météo exceptionnelle, mais rien à quoi nos membres de l'expédition n'étaient pas préparés. Tandis que le fleuve est devenu un torrent, nos hommes continuent le voyage – jusqu'au moment où un cri retentit sur la berge. Pendant un instant, notre chef d’expédition peut voir un paquet coloré emporté. Il est désormais important de réagir rapidement, même si cela pourrait entraîner un retard décisif dans le voyage."
 lepsius.415.g: "Sauvez-la !"
 lepsius.415.h: "L'expédition ne peut pas attendre !"
 lepsius.416.t: "Beau temps"
 lepsius.416.d: "L’expédition archéologique progresse étonnamment bien."
 lepsius.416.f: "Notre équipe d’expédition progresse bien. Parfois, l'absence de nouvelles est la meilleure des nouvelles, et dans ce cas, nos archéologues sont sûrs de trouver un bon ou un très bon site problématique. Sinon, il n'y a rien à signaler - à part le beau temps !"
 lepsius.416.g: "Quelle satisfaction."
 lepsius.417.t: "Des habitants hospitaliers"
 lepsius.417.d: "Les locaux ont accueilli notre expédition de manière amicale, mais peut-être pourrions-nous en tirer encore plus..."
 lepsius.417.f: "Notre expédition s'est arrêtée dans un petit village. Les résidents sont extrêmement hospitaliers et ont offert à l'équipe un bon lieu de repos et ont fourni de la nourriture aux animaux. En discutant avec les habitants, il a été suggéré qu'ils en sachent peut-être davantage sur la région - y compris les héritages anciens..."
 lepsius.417.g: "Nous devons tout découvrir."
 lepsius.417.h: "C'est bien comme ça."
 lepsius.418.t: "Guide local"
 lepsius.418.d: "Un guide local a proposé ses services à notre expédition."
 lepsius.418.f: "Parfois, il faut juste avoir de la chance. Notre expédition a gagné un guide local qui possède une excellente connaissance de la région et en sait davantage sur les sites touristiques de la région."
 lepsius.418.g: "Parfait!"
 lepsius.419.t: "Raccourci"
 lepsius.419.d: "L'attaché militaire de l'expédition a trouvé un raccourci vers une ruine, mais exige quelque chose en retour."
 lepsius.419.f: "Notre attaché militaire signale un raccourci. Lorsque nous avons fait une pause hier après-midi, il en a profité pour explorer les environs et prétend avoir trouvé une ancienne route qui ne figure sur aucune carte. Si cela est vrai, cela pourrait aider davantage notre expédition, mais cela signifie aussi bien le récompenser..."
 lepsius.419.g: "Récompensez-le et suivez-le !"
 lepsius.419.h: "Ne le rendons pas plus important qu'il ne l'est."
 lepsius.420.t: "Des hommes motivés"
 lepsius.420.d: "Notre expédition a eu la chance d'embaucher des hommes particulièrement motivés. Cela améliore considérablement nos chances de succès."
 lepsius.420.f: "Des sifflements et des chants peuvent être entendus de loin. L’expédition archéologique progresse étonnamment bien. L'équipe est très motivée et confiante dans la réussite. Les hommes sont plus détendus face aux obstacles et aux problèmes. Nous ne savons pas ce qui a causé cela, peut-être avons-nous eu de la chance en choisissant notre peuple. Dans tous les cas, cela augmente énormément nos chances de succès."
 lepsius.420.g: "Carpe Diem."
 lepsius.421.t: "Le scarabée"
 lepsius.421.f: "Malheureusement, lors d'une petite fouille près d'un mastaba, notre équipe de fouilles n'a rien trouvé, à l'exception d'un petit scarabée bleu lapis-lazuli. Le scarabée était considéré comme un porte-bonheur dans l’Egypte ancienne. Le comportement du scarabée consistant à faire rouler des boules de fumier devant lui était lié à Re et à son voyage à travers le ciel sur la barge solaire. Notre chef d'expédition nous a demandé si nous pouvions peut-être faire une petite exception et garder la pièce essentiellement secondaire comme souvenir pour lui."
 lepsius.421.g: "Il peut garder l'artefact."
 lepsius.421.h: "Tous les objets trouvés doivent être donnés à un musée – sans exception !"
 lepsius.422.t: "Temple dans le sable"
 lepsius.422.d: "Nos archéologues ont découvert ce qui ressemble à un temple macédonien."
 lepsius.422.f: "Au début, nos hommes pensaient qu'il s'agissait d'une dune, mais un minuscule sommet de calcaire travaillé a révélé à nos archéologues que cette montagne de sable inhabituelle dans le désert égyptien détenait un secret. En quelques jours, l'expédition découvrit un temple. Pour certains, le résultat a été décevant car il ne ressemblait pas à une structure égyptienne antique, mais s’est avéré être une structure de l’époque d’Alexandre le Grand. Cependant, les experts affirment que le temple était un témoignage des activités du général grec en Égypte, dont la tombe n'a pas été retrouvée à ce jour."
 lepsius.422.g: "Sur les traces d'Alexandre le Grand..."
 lepsius.422.h: "Tous les contes de vieilles femmes."
 lepsius.423.t: "Un lion ailé"
 lepsius.423.d: "Nos archéologues ont mis au jour en Mésopotamie une statuette qui ressemble à un chérubin."
 lepsius.423.f: "Les créatures hybrides humaines et animales sont répandues en Orient. Notre expédition a eu la chance de récupérer une statuette d'une beauté exceptionnelle et bien conservée lors de la recherche d'un site de fouilles ; il est déjà en route vers notre musée. Une inscription cunéiforme identifiant l'être comme un gardien du temple est également révélatrice. Nos archéologues ont émis l'hypothèse que ces gardiens du temple représentent un lien avec les chérubins israélites mentionnés dans la Bible. Deux d’entre eux protégeaient également l’Arche d’Alliance qui se trouvait dans le Temple de Jérusalem."
 lepsius.423.g: "Parlons-nous de l’Arche perdue ?"
 lepsius.423.h: "Saint Marc, c'est toi ?"
 lepsius.423.i: "Tous les contes de vieilles femmes."
 lepsius.424.t: "Dépôt cunéiforme"
 lepsius.424.d: "Nos archéologues ont découvert de nombreux artefacts mésopotamiens."
 lepsius.424.f: "Lorsque nos archéologues ont examiné un ancien mur d'enceinte à la périphérie d'une petite ville, ils ne s'attendaient pas à trouver grand-chose. Ce n’est qu’en palpant la pierre qu’ils remarquèrent qu’il y avait des cavités dans la structure. Après une enquête détaillée, ils ont brisé le mur à un certain moment – ​​il s'est avéré que des tablettes cunéiformes avaient été intégrées dans le mur ! Le dépôt est étonnamment bien conservé et fournit des informations sur l'ancienne Mésopotamie."
 lepsius.424.g: "Une découverte étonnante !"
 lepsius.425.t: "De l'orichalque ?"
 lepsius.425.d: "Nos archéologues ont découvert un artefact fabriqué à partir d'un matériau étrange et inconnu."
 lepsius.425.f: "Lors d'une de nos expéditions grecques, nos archéologues ont fait une curieuse découverte. Une petite balle est arrivée dans la matinée à la direction du musée. Le réalisateur ne comprit pas d'abord pourquoi ses hommes lui renvoyaient une bille ; dans des circonstances normales, ce n’était qu’une découverte insignifiante. Mais la sphère de couleur ambre est constituée d’un matériau inconnu que nous n’avons jamais rencontré ailleurs. Jusqu’à présent, les experts ne savent pas quoi penser de l’artefact, certains pensant qu’il s’agit d’un faux. D'autres prétendent que cela indique que notre connaissance du monde égéen est totalement insuffisante."
 lepsius.425.g: "Platon n'a-t-il pas mentionné quelque chose comme ça dans son dialogue Critias... ?"
 lepsius.425.h: "Tous les contes de vieilles femmes."
 lepsius.426.t: "Trésor en céramique"
 lepsius.426.d: "Nos archéologues ont découvert de nombreux artefacts égéens."
 lepsius.426.f: "Ce qui était un déchet pour les anciens est un trésor pour un archéologue. Cette devise n'est devenue réalité que récemment, lorsque notre expédition s'est arrêtée dans une ruine plus petite à la recherche d'un site de fouilles et, après un examen plus approfondi, a découvert une fosse avec un dépôt de poterie. De nombreux fragments doivent encore être réparés, mais les nombreuses découvertes enrichiront certainement notre collection muséale."
 lepsius.426.g: "Et tout cela nous appartient !"
 lepsius.427.t: "Maya-Jade"
 lepsius.427.d: "Nos archéologues ont découvert de précieux artefacts mayas en jade."
 lepsius.427.f: "Le jade était un matériau largement utilisé par les Mayas dans les domaines de l'art et de la religion. L'élite se parait de jade et le dieu solaire était également représenté dans des bijoux en jade. Cependant, les peuples d’Amérique centrale fabriquaient également des outils en jade, car c’était l’un des matériaux les plus durs connus du Nouveau Monde. Nos archéologues ont eu la chance de trouver quelques artefacts en jade lors de leurs dernières fouilles."
 lepsius.427.g: "Cela aurait fière allure dans notre collection."
 lepsius.428.t: "Idole Inca"
 lepsius.428.d: "Nos archéologues ont mis au jour une mystérieuse idole inca dorée."
 lepsius.428.f: "Une statuette dorée du dieu inca Inti est arrivée ce matin au musée par livraison express. Nos archéologues ne disent pas comment ni où ils l'ont obtenu. Une grimace, horrible et belle à la fois, regarde l'observateur. Certains experts ont déjà exprimé des doutes quant à l'origine inca de la pièce. Le dessin indique une culture inconnue. De plus, presque tout l’or inca a été volé au Pérou. Il s’agit peut-être de l’objet le plus unique de notre collection précolombienne à ce jour. Le directeur du musée murmure déjà à huis clos que certaines légendes pourraient finalement être vraies."
 lepsius.428.g: "L'Eldorado, ça vous dit ?"
 lepsius.428.h: "Tous les contes de vieilles femmes."
 lepsius.429.t: "Le crâne de cristal"
 lepsius.429.d: "Nos archéologues ont trouvé... quelque chose."
 lepsius.429.f: "Un revendeur de confiance, notre excavateur le jure, lui a récemment montré une pièce extraordinairement intéressante et sinistre. Il s’agit d’un crâne humain entièrement constitué de quartz mésoaméricain. La surface est étonnamment bien polie et l’œuvre surpasse tout ce que nous avons jamais connu sur les cultures du continent sud-américain. Mais les doutes sont grands. Même notre archéologue en chef n'est pas sûr à 100 % de ce qu'il doit penser de cet artefact."
 lepsius.429.g: "Nous l'ajoutons à la collection."
 lepsius.429.h: "Certainement un faux."
 lepsius.430.t: "Faux crâne de cristal"
 lepsius.430.d: "Le prétendu artefact qui nous a été vendu il y a des années pour faire sensation est en réalité un faux."
 lepsius.430.f: "Comment cela a-t-il pu arriver ? Étions-nous trop négligents ? Trop égoïste parce que nous courons de sensation en sensation et ne croyons que ce que nous voulons croire ? Le légendaire crâne de cristal que notre musée a acquis comme attraction il y a des années est une contrefaçon bon marché. Il faudra des années avant que notre place dans le monde archéologique soit rétablie !"
 lepsius.430.g: "Une honte nationale pour notre archéologie !"
 lepsius.431.t: "Le local connaît la ruine"
 lepsius.431.d: "Un local serviable a pu nous aider à trouver des artefacts."
 lepsius.431.f: "Lorsque notre expédition fait escale dans une petite ville sur notre route, nous rencontrons un agriculteur âgé qui a entendu parler de notre destination. En échange d'un peu de pain, de sel et d'eau, il se montre extrêmement accommodant. « Les autres villageois m'ont déjà dit ce que vous cherchiez », explique-t-il. Il nous emmène pendant une demi-journée en territoire inconnu. Nos archéologues sont surpris lorsqu'il nous conduit directement vers une ruine antique. Nous avons pu trouver des artefacts pour notre musée afin de nous en assurer."
 lepsius.431.g: "Ce doit être notre jour de chance !"
 lepsius.432.t: "Artefact des métiers locaux"
 lepsius.432.d: "Un local veut nous vendre un artefact."
 lepsius.432.f: "Notre expédition s'arrête dans une plus grande ville. Lorsque les porteurs achetaient de la nourriture pour les bêtes de somme, un commerçant prit la parole. Apparemment, la nouvelle de notre voyage s'est également largement répandue parmi les locaux. Pour un bon prix, il est prêt à vendre une œuvre d'art précieuse qu'il a obtenue auprès d'un pilleur de tombes. L'origine de l'artefact n'est pas claire, mais l'offre est attractive, même si elle a un prix."
 lepsius.432.g: "Il appartient à un musée."
 lepsius.432.h: "Nous ne sommes pas intéressés par des accords aussi louches."
 lepsius.433.t: "Authentique ou faux ?"
 lepsius.433.d: "Un antiquaire à la réputation douteuse souhaite nous vendre un artefact."
 lepsius.433.f: "Tous les marchands d’objets archéologiques supposément précieux ne sont pas dignes de confiance. C'est par exemple le cas d'un commerçant qui, un peu trop zélé, souhaite nous vendre un trésor d'art. L'empiétement et son mécanisme de prix flexible, censé nous promettre un « prix amical », ont suscité des doutes parmi nos chefs d'expédition quant à savoir s'il s'agit réellement d'une offre sûre. C'est pourquoi ils ont demandé au musée s'il devait accepter l'artefact des mains douteuses du marchand."
 lepsius.433.g: "Nous devons prendre le risque."
 lepsius.433.h: "Ne lui faites pas confiance."
 lepsius.434.t: "Des pilleurs de tombes arrêtés"
 lepsius.434.d: "Notre expédition a capturé un groupe de pilleurs de tombes et leur butin, mais nous ne savons pas quoi en faire."
 lepsius.434.f: "Nos archéologues pensaient avoir déjà trouvé un bon site de fouille, jusqu'à se rendre compte que le site avait été pillé pendant des siècles. Alors qu'ils remballaient leurs affaires, quelques gardiens de feu de camp ont pu appréhender plusieurs personnages louches qui tentaient de faire sortir clandestinement un artefact du site abandonné. En fait, nous devrions remettre les hommes aux autorités et restituer l’œuvre d’art volée. Cependant, certaines personnes pensent que nous devrions récupérer l'artefact pour nous-mêmes et acheter le silence des pilleurs de tombes."
 lepsius.434.g: "L'artefact devrait être le nôtre."
 lepsius.434.h: "Déposez une plainte et restituez l'artefact aux autorités locales."
 lepsius.435.t: "Enchères"
 lepsius.435.d: "La pression politique nous pousse à envisager de vendre un artefact récemment découvert."
 lepsius.435.f: "Certains membres du gouvernement craignent que nos projets archéologiques à l'étranger ne soient qu'un gaspillage d'argent, sacrifiant la production économique de notre pays au profit des tours d'ivoire d'une petite clique de scientifiques. Ils veulent non seulement des résultats scientifiques, mais aussi des preuves financières du sens de ces expéditions. Un groupe de politiques réclame donc qu'un artefact récemment découvert soit vendu pour couvrir les dépenses occasionnées par nos aventures archéologiques."
 lepsius.435.g: "Vendez-le aux enchères."
 lepsius.435.h: "Mais sa place est dans un musée !"
 lepsius.436.t: "Chambre cachée"
 lepsius.436.d: "Nos archéologues ont découvert une tombe, apparemment pillée par des pillards. Mais après avoir approfondi leurs investigations, ils trouvèrent une chambre derrière un faux mur."
 lepsius.436.f: "Le dernier arrêt a commencé par une déception. Notre chef d'expédition attendait beaucoup de ce site historique : il s'agissait de la tombe d'un haut fonctionnaire de la noblesse, ayant peut-être aussi une fonction sacrée. En tout cas, les informations fournies par certains agriculteurs laissent penser que tel était le cas. Sur place, la déception est d'autant plus grande : le tombeau est vide, les murs sont nus et il n'y a même aucun signe d'une quelconque signification historique. À première vue, cela ressemblait à une simple grotte taillée en douceur. Cependant, cela a changé brusquement lorsque l'assistant de recherche a accidentellement découvert le contour d'un cadre de porte alors qu'il s'appuyait contre le mur supposé. Il a fallu deux heures pour découvrir les débris, les volets et les roches – et révéler l'accès à une chambre auparavant cachée."
 lepsius.436.g: "Mon trésor!"
 lepsius.437.t: "Campement abandonné"
 lepsius.437.d: "Nous avons trouvé le camp abandonné d'une équipe de fouilles étrangère. Après avoir récupéré deux artefacts, l'ambassadeur du pays les réclame pour lui-même."
 lepsius.437.f: "Lorsque nos hommes atteignirent le camp de fouilles, ils examinaient les restes d'une expédition qui avait exploré un temple voisin quelques mois plus tôt. Il s'est avéré que les fouilleurs ont déblayé la zone un peu trop rapidement : deux objets qui n'avaient pas été ramassés ont été trouvés dans une boîte. Nos archéologues ont sécurisé la découverte, mais ont rapidement reçu la visite de l'ambassadeur du pays, qui a récupéré les artefacts trouvés par son pays. L'affaire a déclenché un incident diplomatique avec une grande puissance."
 lepsius.437.g: "Nous l'avons trouvé, c'est le nôtre."
 lepsius.437.h: "Partageons les artefacts."
 lepsius.437.i: "Nous partageons plutôt nos connaissances."
 lepsius.437.j: "Ils en sont les propriétaires légitimes."
 lepsius.438.t: "L'Eremite"
 lepsius.438.d: "Malheureusement, un ermite qui dispose d’un artefact n’est que légèrement disposé à coopérer."
 lepsius.438.f: "Nous avons entendu parler d'un ermite bizarre qui possèderait un artefact. Il possède une connaissance impressionnante du passé et une mémoire étendue. À bien des égards, même les érudits de notre expédition sont étonnés par ses connaissances. Le vieil homme grincheux aimerait nous en dire plus, mais il n'est pas question qu'il abandonne l'artefact. Apparemment, nous devons recourir à la force."
 lepsius.438.g: "Je veux cet artefact et je le veux maintenant !"
 lepsius.438.h: "Écoutez-le simplement."
 lepsius.439.t: "Dynamiter?"
 lepsius.439.d: "Parfois, des défis particuliers nécessitent des mesures spéciales."
 lepsius.439.f: "Lors d'une fouille, notre guide arrive à la conclusion qu'un passage peut être caché derrière un mur ; au moins il prétend avoir repéré une cavité derrière le mur. Des mesures drastiques étaient à l’ordre du jour aux débuts de l’archéologie, notamment l’utilisation d’explosifs pour poursuivre ses objectifs scientifiques plus élevés. Bien entendu, nous pourrions ne rien faire si le prétendu espace creux était une tromperie et si nous mettions en péril le site de fouilles précédemment sécurisé."
 lepsius.439.g: "KA-BOOM !"
 lepsius.439.h: "C'est barbare rien que d'y penser."
 lepsius.440.t: "Un morceau cassé"
 lepsius.440.d: "Nous avons trouvé un artefact cassé. La pièce manquante est en possession d’un pouvoir insignifiant."
 lepsius.440.f: "Lors d'une fouille, les archéologues ont découvert un trésor artistique précieux, du moins en partie. L’autre pièce s’avère être entre les mains d’une puissance mineure qui l’a achetée à un antiquaire il y a quelques années. Nous pourrions utiliser notre service diplomatique pour récupérer la pièce manquante et assembler l’artefact, mais l’ambassadeur a déjà clairement indiqué que cela constituerait un engagement politique."
 lepsius.440.g: "Nous leur demandons de bien vouloir le faire."
 lepsius.440.h: "L’affaire n’est finalement pas si importante."
 lepsius.441.t: "Un obélisque oublié"
 lepsius.441.d: "Un obélisque inachevé donne à nos scientifiques des informations sur les anciennes pratiques de construction."
 lepsius.441.f: "Dans une ancienne carrière égyptienne, nos archéologues ont découvert ce qui ressemble à un obélisque inachevé. Les travaux sur le monolithe massif n’ont apparemment jamais été achevés. Bien qu'elle ne comporte pas de hiéroglyphes et qu'elle ne puisse pas être transportée en raison de ses dimensions, nos scientifiques ont acquis de nouvelles connaissances sur la façon dont les anciens Égyptiens fabriquaient et érigeaient ces structures."
 lepsius.441.g: "Très intéressant."
 lepsius.442.t: "Animaux momifiés"
 lepsius.442.d: "La gestion des animaux momifiés récemment découverts a suscité une controverse parmi les archéologues."
 lepsius.442.f: "Il y a quelques jours, des archéologues ont découvert une chambre funéraire avec une trouvaille particulière : outre le noble enterré là-bas, des sarcophages plus petits contenant des animaux ont également été découverts. À en juger par leur apparence, il s’agit d’un chat, d’un chien et d’un singe. Une discussion a éclaté parmi les scientifiques après une découverte : les animaux momifiés pourraient faire la lumière sur leur élevage et la vie des animaux domestiques dans l'Égypte ancienne, mais en même temps entraîner la destruction de ces objets rares."
 lepsius.442.g: "Ils nécessitent une enquête approfondie."
 lepsius.442.h: "N'y touchez pas, ce sont des pièces de musée importantes !"
 lepsius.443.t: "Dispute à propos d'un crocodile"
 lepsius.443.d: "Une étrange dispute à propos d'un crocodile mort divise nos scientifiques et l'attaché militaire."
 lepsius.443.f: "La faune du Nil a incité nos scientifiques à intensifier leurs études biologiques. Ils accordent une attention particulière au crocodile du Nil, que les universitaires rencontrent avec peur, dégoût et fascination. A la demande de nos scientifiques, notre attaché militaire a tué un crocodile. Mais aujourd'hui, il refuse de remettre l'animal : il préfère le faire empailler et le suspendre au-dessus de sa cheminée."
 lepsius.443.g: "Il doit remettre le crocodile aux chercheurs."
 lepsius.443.h: "Vive le taxidermisme !"
 lepsius.443.i: "C'est en effet un joli crocodile..."
 lepsius.444.t: "Malédiction du Pharaon"
 lepsius.444.d: "Après quelques incidents mystérieux, non seulement les aides locaux, mais même certains scientifiques croient désormais que notre aventure en Égypte est maudite !"
 lepsius.444.f: "Tout a commencé après que notre chef d'expédition a ouvert une tombe égyptienne : dans le sarcophage se trouvait une momie hideuse, qui s'est décomposée en quelques minutes sous les yeux des participants. Quelques jours plus tard, une mystérieuse maladie touchait presque tous les participants. Un assistant de recherche présent lors du dévoilement de la momie est décédé. Le lendemain, une tempête de sable a rendu le travail impossible pendant une semaine. Ce matin, les réserves d'eau se sont révélées contaminées et imbuvables ; il scintille d’une couleur jaune cuivré. De plus en plus d'acteurs sont désormais convaincus qu'ils doivent payer pour leur profanation de tombe : la malédiction du pharaon inconnu est sur eux !"
 lepsius.444.g: "Qu'est-ce que c'est? Comète aperçue ?!"
 lepsius.445.t: "Morceau de l'épopée de Gilgamesh"
 lepsius.445.d: "Les scientifiques ont découvert un morceau de la célèbre épopée de Gilgamesh. Il est considéré comme l’œuvre la plus ancienne de la littérature humaine."
 lepsius.445.f: "L'épopée de Gilgamesh est le contenu d'un groupe d'œuvres littéraires provenant principalement de la région babylonienne et contenant l'un des sceaux écrits les plus anciens survivants. L'Épopée de Gilgamesh dans ses différentes versions est l'œuvre la plus connue de la littérature akkadienne et sumérienne. L'épopée raconte l'histoire de Gilgamesh, un roi d'Uruk, ses exploits et aventures, son amitié avec Enkidu, sa mort et la quête d'immortalité de Gilgamesh. #T @lepsius_gilgamesh_fragment ! Cinq morceaux de l'épopée sont nécessaires pour reconstituer une version de base.#!"
 lepsius.445.g: "Nous devons trouver plus de pièces."
 lepsius.445.h: "C'est la dernière pièce !"
 lepsius.445.i: "Plus de pièces sont toujours les bienvenues."
 lepsius.446.t: "Fresque minoenne"
 lepsius.446.d: "Lors de recherches en Crète, notre équipe de fouilles a découvert des vestiges de la culture minoenne."
 lepsius.446.f: "Une belle fresque a attiré l'attention de nos archéologues. Des fragments de pêcheurs, de danseurs et de joueurs de balle donnent une idée de la vie quotidienne de l'ancienne civilisation minoenne. Le mur que l'équipe d'expédition a découvert en Crète montre même des traces de peinture - après 4 000 ans ! Il est certain que d’autres trouvailles suivront cette fabuleuse découverte."
 lepsius.446.g: "Une culture perdue revit sous nos yeux."
 lepsius.447.t: "Murs cyclopéens"
 lepsius.447.d: "Lors de recherches en Argolide, notre équipe de fouilles a découvert des vestiges de la culture mycénienne."
 lepsius.447.f: "Après plusieurs revers, des archéologues grecs ont découvert ce que les locaux ont d'abord surnommé une terrasse pour les oliviers, mais qui n'était en réalité que le sommet d'un mur cyclopéen. Les membres de l’expédition n’ont pas trouvé grand-chose jusqu’à présent, mais c’est au moins un début."
 lepsius.447.g: "Comment ont-ils pu construire de manière si fluide à l’époque ?"
 lepsius.448.t: "Stèle Maya"
 lepsius.448.d: "L'équipe archéologique du Yucatán a progressé dans le déchiffrement des hiéroglyphes mayas."
 lepsius.448.f: "Au cœur de la jungle du Yucatán, nos membres de l'expédition sont tombés sur une inscription datant de l'époque maya. Les scientifiques les datent approximativement du 6ème siècle avant JC. La découverte a considérablement accru notre connaissance de la culture perdue, mais certains hiéroglyphes restent encore un mystère pour nos archéologues. Cependant, les personnes impliquées nous laissent espérer que le déchiffrement de l’écriture maya n’est qu’une question de temps."
 lepsius.448.g: "Il faut le déchiffrer."
 lepsius.449.t: "Grotte Maya"
 lepsius.449.d: "L'équipe de l'expédition a trouvé des traces de la culture maya, mais n'a pas grand-chose à démontrer."
 lepsius.449.f: "Les Mayas utilisaient autrefois les grottes pour célébrer leurs rituels à l’intérieur. Le contenu exact n’a pas encore été clarifié à ce jour. Peut-être que nos archéologues pourront en dire davantage à l’avenir. Ils ont découvert l'entrée d'une grotte maya dans le nord du Guatemala. Mais jusqu’à présent, les résultats ont été plutôt maigres."
 lepsius.449.g: "Pour quoi êtes-vous réellement payé ?"
 lepsius.450.t: "Momies andines"
 lepsius.450.d: "Au sommet d'une montagne, nos scientifiques ont découvert les cadavres d'enfants incas victimes d'un rituel : le froid les a préservés pendant des siècles."
 lepsius.450.f: "Capacocha était un rite sacrificiel important chez les Incas qui impliquait généralement le sacrifice d'enfants. Les enfants des deux sexes étaient sélectionnés dans tout l'empire inca pour être sacrifiés lors de cérémonies de capacocha, qui se déroulaient dans d'importants sanctuaires répartis à travers l'empire. La justification de ce type de rite sacrificiel a généralement été comprise comme le fait que les Incas essayaient de garantir que les meilleurs de l'humanité soient envoyés rejoindre leurs divinités. Les enfants choisis pour être sacrifiés lors d'une cérémonie de capacocha recevaient généralement de l'alcool et des feuilles de coca et étaient déposés sur le lieu de la cérémonie. Les Incas accordèrent une attention particulière à un certain nombre de sites cérémoniels wak'a situés à très haute altitude. Dans un certain nombre de cas, généralement dans la plus importante de ces montagnes, ces sites contiennent les restes momifiés d'enfants sacrifiés lors des cérémonies de capacocha."
 lepsius.450.g: "Peu agréable, mais précieux."
 lepsius.451.t: "Une statue"
 lepsius.451.d: "Les archéologues ont découvert une statue remarquable au cours de leur voyage. Malheureusement, en raison de leur taille, ils ne peuvent pas être transportés."
 lepsius.451.f: "En route vers le prochain chantier de fouilles, notre expédition est tombée sur une statue colossale dans une zone accidentée et jusqu'alors peu explorée. Même de nombreux aides et porteurs locaux l'ignoraient ; et cela a fasciné les compagnons scientifiques dès le premier instant. Notre chef d'expédition a immédiatement proposé que la statue soit transportée, mais sa taille et son ancrage dans le sol rendent un tel projet difficile. La plupart des participants ont donc estimé que la meilleure chose à faire était de retracer toutes les inscriptions sur la statue et de réaliser un dessin précis du monument. Il y a cependant quelques voix éparses et infâmes qui disent que cette belle trouvaille devrait être découpée et expédiée vers notre capitale..."
 lepsius.451.g: "Ils doivent faire un dessin précis et copier méticuleusement l’écriture."
 lepsius.451.h: "Coupez la statue en morceaux et renvoyez-les chez vous."
 lepsius.452.t: "Une transcription"
 lepsius.452.d: "Notre chef d’expédition a acquis un document ancien décrivant des matériaux détruits depuis longtemps."
 lepsius.452.g: "Mieux que rien."
 lepsius.453.t: "Les artistes capturent le paysage sur papier"
 lepsius.453.d: "Les artistes que nous avons engagés dans l’expédition archéologique ont enregistré le paysage avec une telle clarté que ces enregistrements seront utiles aux scientifiques pendant des décennies."
 lepsius.453.f: "Tout au long de l’histoire, les expéditions archéologiques ont accompagné non seulement des érudits classiques, mais souvent diverses personnalités scientifiques, telles que des géographes, des biologistes, des mathématiciens, des astronomes ou des artistes, qui ont enregistré l’environnement avec un stylo et du papier. Tous les participants ont apporté avec eux des connaissances importantes afin de pouvoir offrir aux universitaires non participants chez eux la description la plus précise possible du site archéologique respectif. C'est précisément cette approche interdisciplinaire qui a fait des expéditions depuis l'invasion de l'Égypte par Napoléon une entreprise aux multiples facettes, dans laquelle des jalons scientifiques ont été franchis simultanément dans plusieurs domaines."
 lepsius.453.g: "Heureux de les avoir embauchés."
 lepsius.454.t: "Les scientifiques mènent des recherches"
 lepsius.454.d: "Nos scientifiques ont mené diverses expériences sur place, non seulement en faisant des comparaisons, mais aussi en fournissant des conseils utiles à nos archéologues."
 lepsius.454.f: "Tout au long de l’histoire, les expéditions archéologiques ont accompagné non seulement des érudits classiques, mais souvent diverses personnalités scientifiques, telles que des géographes, des biologistes, des mathématiciens, des astronomes ou des artistes, qui ont enregistré l’environnement avec un stylo et du papier. Tous les participants ont apporté avec eux des connaissances importantes afin de pouvoir offrir aux universitaires non participants chez eux la description la plus précise possible du site archéologique respectif. C'est précisément cette approche interdisciplinaire qui a fait des expéditions depuis l'invasion de l'Égypte par Napoléon une entreprise aux multiples facettes, dans laquelle des jalons scientifiques ont été franchis simultanément dans plusieurs domaines."
 lepsius.455.t: "Expédition rivale"
 lepsius.455.d: "A quelques kilomètres de la nature, l'équipe de notre chef d'expédition rencontre une escouade d'hommes émaciés. Ce sont les misérables restes d'une expédition étrangère."
 lepsius.455.f: "Nos archéologues ne sont pas les seuls à s’aventurer en territoire inexploré. Une petite expédition privée d'un érudit excentrique traverse notre entreprise d'État. Contrairement à notre propre équipe, les hommes de l'entreprise concurrente sont mal équipés. Vous pouvez voir en eux le manque et la privation. L'aumônier de notre expédition propose de les aider - ce qui pourrait aussi être interprété comme un geste de bienveillance dans le pays d'origine. D’autres membres de l’expédition y voient en revanche l’opportunité d’échanger leurs connaissances avec des chercheurs étrangers. L'attaché militaire, quant à lui, y voit une opportunité d'offrir son aide, en échange de la réception d'un artefact précieux provenant des fonds de l'expédition."
 lepsius.455.g: "Les aider à."
 lepsius.455.h: "Nous les aidons en échange de leurs connaissances."
 lepsius.455.i: "Nourriture et aide seulement s'ils nous laissent leur trésor."
 lepsius.461.t: "Le Sphinx qui murmure"
 lepsius.461.d: "Son mode de vie plus que discutable contribue au fait que notre chef d'expédition [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] souffre d'hallucinations mémorables."
 lepsius.462.d: "Son mode de vie plus que discutable contribue au fait que notre attaché militaire [SCOPE.sCharacter('lepsius_military_attache').GetFullName] souffre d'hallucinations mémorables."
 lepsius.461.g: "Cet homme a vraiment besoin de repenser son style de vie."
 lepsius.463.t: "Bastet, la déesse chat"
 lepsius.463.d: "Au cours de son voyage, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] a découvert son faible pour les chats grâce à ses études."
 lepsius.463.f: "Parmi les différentes divinités aux formes animales, l’Egypte ancienne connaissait également la déesse chat Bastet. Les chats étaient autrefois très vénérés par les Égyptiens car ils gardaient la vermine comme les souris, mais aussi les serpents, hors des greniers. Au cours de sa fascination pour l'Égypte, notre chef d'expédition a commencé à s'intéresser beaucoup à cette déesse et a commencé à prendre son propre chat sous son aile. Le compagnon animal a également signifié que son caractère dur s'est quelque peu affaibli."
 lepsius.463.g: "Il y a des gens avec des chats et des gens avec des chiens."
 lepsius.464.t: "Chasser avec un Saluki"
 lepsius.464.d: "Notre attaché militaire [SCOPE.sCharacter('lepsius_military_attache').GetFullName] a acquis un chien de chasse indigène lors d'un voyage en Mésopotamie."
 lepsius.464.f: "Les chiens n’ont généralement pas une bonne réputation au Moyen-Orient. Les lévriers comme le Saluki constituent une exception. Les Bédouins le considèrent comme un noble compagnon qui fait également un excellent travail de chasse aux lapins ou aux gazelles. Notre attaché militaire a reçu un excellent chien en cadeau d'un local, et un lien profond entre l'humain et l'animal se noue depuis quelques semaines."
 lepsius.464.g: "Il y a des gens avec des chiens et des gens avec des chats."
 lepsius.465.t: "Un comportement de supériorité problématique"
 lepsius.465.d: "Le caractère arrogant de [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] a conduit au ressentiment dans notre pays d'expédition."
 lepsius.465.g: "Pourquoi devrions-nous nous en soucier ? Après tout, ce sont des barbares !"
 lepsius.465.h: "Nous devons à tout prix remédier à ce faux pas diplomatique."
 lepsius.466.t: "Le cartographe"
 lepsius.466.d: "Au cours de l'expédition archéologique, l'attaché militaire a développé un grand intérêt pour la cartographie et a créé son propre matériel cartographique. Il semble qu'il ait un talent pour l'arpentage."
 lepsius.466.f: "Dès le début de l'expédition, l'attaché militaire tenait un registre strict des mouvements et de la progression des troupes, dressant ses propres cartes. Lors d'un briefing, il s'est avéré qu'il possédait déjà une collection impressionnante. Un assistant scientifique l'a accompagné à plusieurs reprises la semaine dernière et l'a aidé un peu sous ses bras à élargir ses découvertes cartographiques ; maintenant, il peut aussi utiliser les instruments de mesure. L'assistant scientifique lui propose de le former pour devenir géomètre professionnel."
 lepsius.466.g: "Il a une belle carrière devant lui !"
 lepsius.466.h: "Ses cartes sont bonnes, mais il devrait se concentrer sur les questions militaires."
 lepsius.467.t: "Une relique oubliée"
 lepsius.467.d: "Le chef de notre expédition archéologique a pris contact avec une petite minorité chrétienne d'Orient. Il a des choses étonnantes à dire à ce sujet."
 lepsius.467.h: "Il devrait étudier la relique."
 lepsius.468.t: "Un attaché arrêté en train de voler des objets"
 lepsius.468.d: "Ce matin, un de nos creuseurs a trouvé dans la tente de notre attaché militaire deux artefacts que l'on croyait perdus depuis quelques semaines. Il voulait visiblement les garder pour lui."
 lepsius.468.f: "Tout le monde connaît l'histoire de notre attaché, mais les autres membres de l'expédition s'attendaient effectivement à ce que [SCOPE.sCharacter('lepsius_military_attache').GetFullName] ne retombe pas dans les vieux schémas. Mais ils avaient manifestement tort : bandit un jour, bandit toujours. Car après qu'un ouvrier des fouilles ait trouvé par hasard deux objets issus de la fouille la plus récente, ce que l'attaché n'a pas signalé, la seule conclusion que l'on peut en tirer est qu'il voulait soit les garder pour lui, soit les vendre. Le chef de l'expédition ne l'a pas encore confronté directement aux allégations, mais considère qu'un accord sur la manière de procéder serait plus judicieux avant de tirer les conséquences de cette affaire."
 lepsius.468.g: "Gardez le silence sur cette question."
 lepsius.468.h: "Traitez l'affaire avec précaution, mais insistez pour qu'il rende les artefacts."
 lepsius.468.i: "Exposez-le publiquement et disciplinez-le !"
 lepsius.471.t_karnak: "Karnak"
 lepsius.471.t_memphis: "Memphis"
 lepsius.471.t_uruk: "Uruk"
 lepsius.471.t_niniveh: "Ninive"
 lepsius.471.t_tiryns: "Tirynthe"
 lepsius.471.t_phaistos: "Phaistos"
 lepsius.471.t_itza: "Chichen Itza"
 lepsius.471.t_olla: "Ollantaytombo"
 lepsius.471.d: "[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] souhaite visiter un site célèbre. Bien que le site ait une grande importance archéologique, cela gênerait énormément notre expédition."
 lepsius.471.f_karnak: "Le temple de Karnak, au nord de Louxor, est considéré comme l'un des plus grands complexes de temples du monde antique. Après l'élévation d'Amon-Rê de Thèbes au rang de dieu local, puis de dieu impérial, les dirigeants du début de l'Empire du Milieu commencèrent à construire un temple qui fut agrandi au fil des milliers d'années pour former le complexe du temple actuel, où se trouvent les prêtres. d'Amon dirigeait le service quotidien du temple. 30 pharaons y auraient construit."
 lepsius.471.f_memphis: "Manéthon rapporte que selon la légende, Memphis aurait été fondée par le roi Ménès en 3000 avant JC. Elle fut la capitale de l'Égypte pendant l'Ancien Empire et resta une ville importante dans l'histoire égyptienne. Memphis était sous la protection du dieu Ptah, patron des artisans, dont le temple Hut-Ka-Ptah était situé au centre de la ville. L’ascension et la chute de Memphis sont intrinsèquement liées à l’histoire du pays tout entier."
 lepsius.471.f_uruk: "Uruk est le lieu de la première écriture. C'était déjà à la fin du IVe millénaire avant JC. l'un des principaux centres politiques du début de la période sumérienne. Dans l’Antiquité, la ville mésopotamienne se trouvait au bord du fleuve. Dans le mythe et la littérature, Uruk était célèbre comme la capitale de Gilgamesh, héros de l'épopée de Gilgamesh. Les érudits identifient Uruk comme l'Érech biblique (Genèse 10 : 10), la deuxième ville fondée par Nimrod à Shinar."
 lepsius.471.f_niniveh: "Ninive est située sur la rive orientale du Tigre et fut la capitale et la plus grande ville de l'empire néo-assyrien, ainsi que la plus grande ville du monde pendant plusieurs décennies. Au cours de l'Empire néo-assyrien, en particulier à partir de l'époque d'Assurnasirpal II, il y a eu une expansion architecturale considérable. Certaines des portes principales étaient flanquées de portes colossales en pierre lamassu pesant jusqu'à 30 000 kilogrammes (30 t)."
 lepsius.471.f_tiryns: "Tirynthe a atteint son apogée entre 1400 et 1200 avant JC, lorsqu'elle est devenue l'un des centres les plus importants du monde mycénien, et en particulier de l'Argolide. Ses caractéristiques les plus remarquables étaient son palais, ses tunnels cyclopéens et surtout ses murs, qui donnèrent à la ville son épithète homérique de « Tirynthe puissante et fortifiée ». Tirynthe est devenue associée aux mythes entourant Héraclès, car la ville était la résidence du héros pendant ses travaux, et certaines sources la citent comme son lieu de naissance."
 lepsius.471.f_phaistos: "Selon la légende, la ville de Phaistos a été fondée par le roi Minos et doit son nom à un fils ou petit-fils d'Héraclès (Héros Phaistos), qui fut tué par Idoménée, petit-fils de Minos et plus tard roi de Crète. Le premier dirigeant de Phaistos aurait été Rhadamanthys, le frère de Minos. La ville possède le deuxième plus grand complexe palatial de Crète après Knossos."
 lepsius.471.f_itza: "Chichén Itzá est l'une des ruines les plus importantes de la péninsule du Yucatán au Mexique. Elle est située à environ 120 kilomètres à l’est de Mérida, dans l’État du Yucatán. Ses ruines datent de la fin de la période maya. D'une superficie de 1 547 hectares, Chichén Itzá est l'un des sites les plus étendus du Yucatán. Le centre est occupé par de nombreux bâtiments monumentaux représentatifs à caractère religieux et politique, d'où dépasse une grande pyramide à degrés en grande partie conservée."
 lepsius.471.f_olla: "Pendant l'Empire Inca, Ollantaytambo était le domaine royal de l'empereur Pachacuti, qui conquit la région et construisit la ville et un centre cérémoniel. Au moment de la conquête espagnole du Pérou, elle servit de bastion à Manco Inca Yupanqui, chef de la résistance inca. Ollantaytambo est le seul exemple subsistant d’urbanisme inca. Les bâtiments et terrasses incas ainsi que les rues étroites de la ville sont encore dans leur état d'origine. Les rues droites et étroites forment 15 blocs carrés (canchas), chacun avec une entrée sur la cour centrale entourée de maisons."
 lepsius.471.j: "Absolument pas, l'expédition est prioritaire !"
 lepsius.472.t: "Un monde perdu ?"
 lepsius.472.d: "Après que notre expédition n'a pas rendu compte depuis longtemps, elle fait état de pertes importantes en hommes, bêtes de somme et outils. L’excuse donnée par le chef de l’expédition est des plus étonnantes."
 lepsius.501.t: "Tombeau d'un pharaon inconnu"
 lepsius.501.d: "Notre chef d'expédition [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] a entendu parler d'un tombeau perdu dans la Vallée des Rois. Il appartient apparemment à un pharaon jusqu’alors inconnu. Les locaux affirment en avoir trouvé l'entrée."
 lepsius.501.f: "Il y a plus de 3 000 ans, les pharaons d’Égypte étaient enterrés dans la légendaire Vallée des Rois. Beaucoup de ces tombes étaient déjà connues dans l’Antiquité et étaient considérées comme des attractions touristiques – des graffitis romains et grecs en témoignent. Les chrétiens coptes ont même transformé certaines tombes ouvertes en chapelles. Pendant des siècles, des pilleurs de tombes des environs ont volé des œuvres d'art dans les tombes et les temples et les ont vendues sur le marché. Pour cette raison, de nombreuses tombes ne subsistent que des cavités. Et pourtant, encore et encore, des gens d'ici et d'ailleurs tombaient sur des tombes oubliées depuis et contenant des objets trouvés, des images ou des chambres non ouvertes. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] a récemment reçu une notification concernant une tombe qui pourrait être en bon état."
 lepsius.501.g: "We don't have time for this."
 lepsius.502.t: "Du sable, beaucoup de sable"
 lepsius.502.d: "Lorsque les archéologues arrivent sur place, ils constatent qu'il existe bien des traces d'un tombeau royal, mais que le site est entièrement enseveli sous le sable."
 lepsius.502.f: "Personne ne pensait que les fouilles seraient faciles. Mais lorsqu'un local guide les archéologues vers l'endroit où se trouve la tombe, la première chose que les membres de l'expédition rencontrent est une paroi rocheuse verticale à laquelle s'accroche une dune de sable et de boue. Il n'y a aucune trace de tombe nulle part. Interrogé, l'habitant explique qu'il n'a jamais vu l'entrée du tombeau ; mais son grand-père le savait toujours et son père en avait au moins eu un aperçu lorsqu'il était enfant. En raison des précipitations, la Vallée des Rois est sujette à des coulées de boue ; et le vent et le sable égyptien sont connus pour cacher des sites vieux de plusieurs siècles. Bien que certains assistants expriment des doutes quant à l'existence de la tombe, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] reste déterminé à rechercher la tombe perdue. Il faudra toutefois des fonds supplémentaires pour évacuer les masses de sable accumulées au fil des années."
 lepsius.502.g: "Nous avons besoin de plus d'outils !"
 lepsius.503.t: "Le rocher"
 lepsius.503.d: "Après avoir utilisé avec persistance toutes les pelles en vente dans un rayon de 16 km, l'équipe a creusé l'entrée – pour se retrouver face à un énorme rocher bloquant l'entrée."
 lepsius.503.f: "Les journées passées à pelleter du sable et de la boue devraient être récompensées - c'est du moins ce qu'espéraient les membres de l'expédition. Lorsque le linteau de la porte de la tombe fut effectivement découvert, l'humeur dépressive des hommes épuisés se transforma en euphorie. En quelques heures seulement, le ret de l'entrée fut exposé. Mais à peine avez-vous avancé que vous avez découvert la raison pour laquelle cette tombe avait été épargnée par le pillage : un énorme rocher, probablement détaché de la paroi rocheuse il y a des décennies, voire des siècles, en bloquait l'entrée. Pas même un petit garçon ne pouvait le dépasser, car les décombres et la boue solidifiée remplissaient le reste du couloir comme du mortier. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] a été confronté à une décision importante : comment essayer de supprimer l'obstacle à l'entrée de la tombe ?"
 lepsius.503.g: "Nous utilisons des méthodes sophistiquées."
 lepsius.503.h: "Nous utilisons une mécanique sophistiquée."
 lepsius.503.i: "Nous utilisons de la nitroglycérine sophistiquée."
 lepsius.503.j: "Nous utilisons la force musculaire pure."
 lepsius.504.t: "Tombe détruite par la nitroglycérine"
 lepsius.504.d: "Malheureusement, l'utilisation d'explosifs a apporté plus de problèmes que de bien : l'explosion a non seulement détruit le rocher, mais tout le complexe funéraire !"
 lepsius.504.f: "L'organisation des explosifs, bien que n'étant pas la tâche la plus facile, a été résolue en quelques jours lorsque l'équipe a pu acheter des réserves à un géologue à un bon prix. Aucun des membres de l'expédition ne se serait décrit comme un expert en démolition, mais [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] était d'avis que la gestion de la nitroglycérine très dangereuse ne représentait pas un défi particulièrement important. Peut-être aurait-il été préférable de consulter un expert au préalable, car nos gens ont dû mal évaluer la quantité nécessaire : au lieu de se contenter de faire sauter le rocher, l'expédition archéologique a fait sauter toute la paroi rocheuse ! Ce n'est que par miracle que les membres de l'expédition ont pu se sauver avant qu'une cascade de rochers ne tombe de la montagne la plus proche et ne réduise toute la zone en décombres. Ce qui se trouvait derrière l'entrée : il devait maintenant avoir été irrémédiablement détruit..."
 lepsius.504.g: "C'était peut-être exagéré ?"
 lepsius.505.t_archaeology: "Galerie Peintures"
 lepsius.505.t_engine: "Une galerie détruite"
 lepsius.505.t_muscular: "Galerie Peintures"
 lepsius.505.d_archaeology: "Après une enquête archéologique détaillée et l'enlèvement soigneux du rocher à l'aide des méthodes les plus récentes, nos archéologues pénètrent dans la galerie bien conservée du tombeau du pharaon."
 lepsius.505.d_engine: "À l’aide d’une machine, l’équipe parvient à retirer le rocher – avec des effets secondaires négatifs."
 lepsius.505.d_muscular: "Après avoir embauché un puissant Italien, nous avons pu retirer le rocher et pénétrer dans le site archéologique bien conservé."
 lepsius.505.f_archaeology: "Semblable à une opération compliquée, les archéologues se sont approchés du rocher. Ils ont autopsié la roche, vérifié le matériel, cueilli avec des pelles et des pioches. Après une enquête approfondie, ils ont décidé d'enlever la masse en petites couches en utilisant un processus complexe et de longue haleine, de manière à ce que les hiéroglyphes à l'entrée ne soient pas endommagés. C'était un processus exigeant en main-d'œuvre, mais qui en valait vraiment la peine. Armés de lampes à huile à la main, ils parcoururent à tâtons le premier couloir et contemplèrent la beauté de l'Egypte ancienne : des peintures dans un état remarquable représentant des paysans dans les champs, la cour du Pharaon et les dieux du jugement vacillaient sur les murs. Même si les archéologues n'ont pu trouver aucun artefact - des traces de pillage ont certainement pu être trouvées - l'ensemble prometteur incitait à lui seul à une exploration approfondie de la tombe."
 lepsius.505.f_engine: "La technologie la plus récente devrait faciliter nos fouilles dans la Tombe du Pharaon Inconnu : avec une machine qui devrait extraire le rocher du puits d'entrée via un coulis. Au début, la roche n'a pas bougé ni bougé, alors nos scientifiques ont mis le moteur à pleine puissance. Une erreur fatidique : bien que la pierre ait brièvement quitté son support et ait été entraînée le long de la pente, elle s'est rapidement détachée de la ceinture et a roulé de toutes ses forces vers la tombe - et y a provoqué une destruction mortelle ! [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] et ses assistants se sont rapidement précipités dans le passage découvert, mais ont été choqués de découvrir que la roche avait non seulement complètement démoli ce qui était autrefois une galerie magnifiquement peinte, mais avait également gravement endommagé un mur important utilisé pour la statique de l'ensemble du système. ..."
 lepsius.505.f_muscular: "De retour à Louxor, les membres de notre expédition ont trouvé un chiffre impressionnant. Il s'agissait d'un homme de Padoue qui était initialement venu en Égypte pour montrer au pacha un dispositif hydraulique destiné à aider à la crue du Nil. Cependant, l’entreprise n’a pas abouti. Le géant, mesurant environ deux mètres et doté des muscles d'un taureau, a déclaré qu'il avait auparavant travaillé dans le cirque sous le nom d'\"Hercule de Patagonie\". Selon un témoignage fiable de son serviteur anglais, il pouvait soulever six hommes à la fois. Ce sont ces compétences particulières qui nous ont convaincus de l'embaucher pour débloquer l'accès. A peine arrivé sur place, il fit rouler la pierre dans un geste admirable. Armés de lampes à huile à la main, nos archéologues se sont précipités dans le couloir et ont contemplé la beauté de l'Égypte ancienne : des peintures dans un état remarquable représentant des paysans dans les champs, la cour du Pharaon et les dieux du jugement vacillaient sur les murs. Cet ensemble prometteur invitait à lui seul à une exploration approfondie du tombeau."
 lepsius.505.g: "La splendeur de l'Egypte ancienne !"
 lepsius.505.h: "Oops."
 lepsius.506.t_archaeology: "Un beau sarcophage"
 lepsius.506.t_engine: "Un sarcophage en voie de disparition"
 lepsius.506.t_muscular: "Un sarcophage brisé"
 lepsius.506.d_archaeology: "Nos archéologues entrent dans la Chambre du Roi avec étonnement et respect et récupèrent un magnifique sarcophage et une momie de la 20e dynastie."
 lepsius.506.d_engine: "Les dégâts causés par l'engin sont clairement visibles dans la chambre funéraire : les archéologues ont à peine le temps de faire le point et se démènent pour transporter le sarcophage à l'extérieur au plus vite !"
 lepsius.506.d_muscular: "Nos archéologues parviennent à pénétrer dans la chambre funéraire intacte et joliment décorée du pharaon inconnu - mais alors un accident imprévu se produit."
 lepsius.506.f_archaeology: "Ce fut une expérience véritablement historique lorsque nos archéologues, dirigés par [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName], sont entrés dans la chambre funéraire réelle. En plus de quelques jarres contenant des offrandes sacrificielles et d'un chien momifié, une surprise particulière les attendait : en effet, le sarcophage ainsi que la momie du Pharaon Inconnu reposaient encore là où il fut enterré il y a plus de 3 000 ans ! Les scientifiques ont soigneusement palpé cette découverte surprenante, ont balayé la poussière et ont reconnu un cercueil en bois bien conservé après avoir retiré le couvercle, qui avait été endommagé par les pilleurs de tombes. Notre musée s'est enrichi d'un témoignage unique sur la culture égyptienne !"
 lepsius.506.g: "L'archéologie a sauvé la situation."
 lepsius.506.h: "Déplacez-le vite !"
 lepsius.506.i: "Oops."
 lepsius.511.t: "Une question d'honneur"
 lepsius.511.d: "Selon certains agriculteurs, une expédition étrangère aurait hissé il y a quelques jours le drapeau de leur pays sur la pyramide de Khéops. Les Patriots de notre équipe se sentent mis au défi et veulent faire de même."
 lepsius.511.f: "L'expédition se déroulait près du Caire lorsque la nouvelle a choqué tous les participants : la semaine dernière, quelqu'un aurait planté le drapeau de son propre pays au sommet de la pyramide de Gizeh ! De tels airs et grâces sont en réalité interdits dans le domaine scientifique, et on ne sait pas si le Pacha a accepté un geste aussi triomphal. Une seule chose est claire : tout au long de l'expédition, on avait le sentiment fervent de faire de même, ne serait-ce que pour ne pas laisser sa propre patrie paraître déshonorante."
 lepsius.511.g: "Nous n'avons pas le temps pour ça."
 lepsius.511.h: "Nous le ferons - pour [ROOT.GetCountry.GetName] !"
 lepsius.512.t: "Aube"
 lepsius.512.d: "L'expédition part tôt le matin pour gravir la Grande Pyramide de Gizeh !"
 lepsius.512.f_wine: "Les participants à l'ascension de la pyramide se lèvent déjà à 5 heures du matin ; hier, ils ont préparé un drapeau de cinq mètres de haut et ont roulé l'immense bannière devant le grand Sphinx jusqu'à la pyramide de Khéops. Une dinde froide est prête pour le petit-déjeuner, certains sont encore épuisés par le travail d'hier sur le drapeau. Une partie de l'expédition séjourne sous une tente dressée aux pieds du Sphinx, le reste se dirige vers la pyramide. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] promet qu'il y aura une bouteille de vin spécialement réservée pour célébrer au sommet de la pyramide."
 lepsius.512.f_no_wine: "Les participants à l'ascension de la pyramide se lèvent déjà à 5 heures du matin ; hier, ils ont préparé un drapeau de cinq mètres de haut et ont roulé l'immense bannière devant le grand Sphinx jusqu'à la pyramide de Khéops. Une dinde froide est prête pour le petit-déjeuner, certains sont encore épuisés par le travail d'hier sur le drapeau. Une partie de l'expédition séjourne sous une tente dressée aux pieds du Sphinx, le reste se dirige vers la pyramide. Ce n'est que lorsque le groupe s'approche de la Grande Pyramide que l'attaché militaire se rend compte que [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] a oublié le plus important ce matin : le vin à trinquer !"
 lepsius.512.g: "J'espère qu'il apportera le meilleur vin..."
 lepsius.512.h: "Il a oublié le vin ?"
 lepsius.513.t: "L'ascension"
 lepsius.513.d: "Le chef archéologique et l'attaché militaire se tiennent au pied de la grande pyramide. Il existe un désaccord quant à savoir qui devrait diriger cette entreprise audacieuse."
 lepsius.513.f: "Notre équipe atteint la base de la Grande Pyramide du Pharaon Khéops. La question se pose de savoir combien d'étapes il faut pour atteindre le paradis - et [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] peut répondre avec précision qu'il y en a 203. Il y a tellement de couches de pierres à conquérir. Entre-temps, la question se pose de savoir qui doit diriger la hausse. [SCOPE.sCharacter('lepsius_military_attache').GetFullName] a déjà affirmé qu'il était tout aussi apte qu'un alpiniste..."
 lepsius.513.g: "[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] devrait nous conduire plus loin."
 lepsius.513.h: "[SCOPE.sCharacter('lepsius_military_attache').GetFullName] devrait nous conduire plus loin."
 lepsius.514.t: "L'entrée d'origine"
 lepsius.514.d: "Notre équipe a gravi un niveau inférieur de la pyramide. Ils se trouvent désormais sur la dix-septième marche, tout près de l’entrée originelle de la chambre funéraire."
 lepsius.514.f: "La première étape est franchie. Notre expédition est encore très proche du fond mais a fait une pause. Notre chef d'expédition aimerait explorer de plus près l'entrée historique de la pyramide de Khéops et descendre à l'intérieur avec quelques aides aux fouilles. Certains membres de l'expédition font une pause pour déjeuner. Tout le monde sait que l’ascension sera désormais plus dangereuse."
 lepsius.514.i: "Cet endroit est assez bien pour notre drapeau."
 lepsius.515.t: "100 étapes"
 lepsius.515.d: "Notre équipe a gravi la centième marche de la pyramide. La troupe est désormais presque à mi-chemin de l’ascension."
 lepsius.515.f: "Une centaine de marches ne semblent pas beaucoup, mais avec un grand groupe, des bagages et un espace limité, le défi est tout autre. Notre banderole est toujours enroulée et portée par cinq hommes. Certains membres de l'Expeiditon annoncent déjà que la perspective est à ce stade suffisamment élevée. Le [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName], quant à lui, regarde le sommet avec inquiétude, car la phase la plus risquée de l'ascension est imminente."
 lepsius.516.t: "La chute"
 lepsius.516.d: "Au cours de la dernière étape de la pyramide, notre chef et son peuple ont apparemment fait trop d'efforts : un incident dévastateur s'est produit !"
 lepsius.516.f: "C'était peut-être une erreur humaine, peut-être qu'un plan n'a pas fonctionné, mais peut-être que le destin nous a puni pour notre arrogance. Cependant, lors de l'ascension des pyramides, un assistant a glissé sur une marche de la pyramide et a entraîné avec lui les autres membres de l'expédition et leurs chargements dans l'abîme. Notre chef d'expédition et notre attaché militaire ont pu éviter le pire, mais ont été grièvement blessés. Certains porteurs s'en sont tirés avec des ravitaillements, d'autres se plaignent de fractures. Nous avons dû renoncer à l'ambitieux projet de hisser notre drapeau sur la Grande Pyramide."
 lepsius.516.g: "Une honte pour nous tous."
 lepsius.517.t: "Au sommet de la Grande Pyramide"
 lepsius.517.d: "Une journée vraiment exceptionnelle pour l'équipe de l'expédition et pour notre pays : le drapeau [ROOT.GetCountry.GetAdjectiveNoFlag] flotte sur la Grande Pyramide de Gizeh !"
 lepsius.517.f: "Un grand moment pour l'archéologie, un grand moment pour le [ROOT.GetCountry.GetName]. Notre expédition a grimpé au sommet de la pyramide de Khéops et a célébré cet exploit par une petite fête. Les noms de Champollion, Lepsius et Rosellini résonnaient à l'unisson dans un chaleureux « hip-hip-hourra ! et enfin les patriotes hissèrent le drapeau. À la lumière du soleil couchant, notre bannière brille désormais sur toute la vallée du Nil !"
 lepsius.517.g: "Levez le drapeau du [ROOT.GetCountry.GetName] - et bravo !"
 lepsius.517.h: "Levez le drapeau du [ROOT.GetCountry.GetName] !"
 lepsius.521.t: "La porte d'Ishtar"
 lepsius.521.d: "Lors de leurs fouilles à Babylone, les archéologues ont découvert les vestiges colossaux de la légendaire porte d'Ishtar. La porte historique de la ville est dans un état remarquablement bon."
 lepsius.521.f: "Lors de leurs fouilles sur le site de l'ancienne capitale babylonienne, les fouilleurs ont découvert pour la première fois des briques vernissées, ce qui suggérait un bâtiment prestigieux et représentatif. Plus les archéologues creusaient sur le site, plus ils faisaient de découvertes. Enfin, ils pouvaient même distinguer les murs et les tours de la porte de la ville, parfaitement conservée, sur lesquelles se pavanaient des lions, des taureaux et des créatures mythiques. Le chef de l'expédition [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] a présenté à notre gouvernement un plan audacieux : démonter la porte entière et la reconstruire fidèle à l'original dans la capitale. Une entreprise coûteuse, comportant de nombreux impondérables - et en même temps si attractive que des intellectuels de premier plan et la direction du musée se sont ralliés à l'idée."
 lepsius.521.g: "Prenez juste quelques pièces. Il devrait rester là où il est."
 lepsius.521.h: "Il doit être transporté au [SCOPE.sState('capital_scope').GetCityHubName] et reconstruit."
 lepsius.522.t: "Transport de briques de Mésopotamie"
 lepsius.522.d: "Un lot grandeur nature de briques destinées à la reconstruction des briques est arrivé aujourd'hui au musée à [SCOPE.sState('capital_scope').GetCityHubName]."
 lepsius.522.f: ""
 lepsius.522.g: "J'adore l'odeur des briques mésopotamiennes le matin."
 lepsius.523.t: "Les briques d'Ishtar entre des mains étrangères"
 lepsius.523.d: "Nous ne sommes pas les seuls à avoir creusé à Babylone au cours des dernières décennies. Il s’avère qu’un pays étranger possède également certaines cargaisons de briques nécessaires à la reconstruction de la porte d’Ishta. Nous sommes obligés de demander humblement."
 lepsius.523.f: ""
 lepsius.523.g: "Nous allons probablement nous humilier."
 lepsius.523.h: "Pour des briques sans valeur ? Jamais!"
 lepsius.524.t: "L'ennemi bloque notre transport de briques !"
 lepsius.524.d: "L’envoi tant attendu de briques mésopotamiennes pour reconstruire la porte d’Ishtar de notre musée n’est pas arrivé depuis des mois. Nous avons appris que les transports étaient bloqués pendant la guerre."
 lepsius.524.f: ""
 lepsius.524.g: "C'est du sabotage !"
 lepsius.525.t: "Un tarif spécial"
 lepsius.525.d: "Apparemment, le pays de fouilles d'où proviennent les briques de la porte d'Ishtar essaie de profiter de notre entreprise. Lorsque les briques étaient exportées, une « taxe spéciale » était facturée sur les briques !"
 lepsius.525.f: ""
 lepsius.525.g: "Nous paierons chaque morceau de pierre..."
 lepsius.526.t: "Petit Transport de briques de Mésopotamie"
 lepsius.526.d: "Des circonstances inconnues ont fait que notre vaisseau n'est cette fois qu'à moitié rempli de briques de la porte d'Ishtar."
 lepsius.526.f: ""
 lepsius.526.g: "Qu'y a-t-il de si difficile à expédier quelques briques ?"
 lepsius.527.t: "Un chargement de briques arrive au port"
 lepsius.527.d: "Un nombre inhabituellement élevé de briques nécessaires à la reconstruction de la porte d'Ishtar sont parvenues aujourd'hui au musée. Apparemment, le chargement en Mésopotamie progresse mieux que prévu."
 lepsius.527.f: ""
 lepsius.527.g: "Ah, encore des briques !"
 lepsius.528.t: "Mauvaises briques"
 lepsius.528.d: "Malheureusement, lorsque nous avons examiné les briques arrivées au [SCOPE.sState('capital_scope').GetCityHubName], nos conservateurs ont constaté que certaines boîtes étaient totalement inutilisables. Pour le meilleur ou pour le pire, nous devons nous en passer."
 lepsius.528.f: ""
 lepsius.528.g: "Mes précieuses briques - non !"
 lepsius.529.t: "Prosternation diplomatique"
 lepsius.529.d: "Une nation étrangère s’est humiliée devant le public mondial simplement pour nous supplier de lui fournir des objets archéologiques sans valeur qu’un antiquaire nous a vendus il y a quelques années. Bien sûr, nous avons accepté le geste avec plaisir et nous sommes libérés de ces cochonneries."
 lepsius.529.f: ""
 lepsius.529.g: "Redoutable!"
 lepsius.530.t: "Porte d'Ishtar reconstruite !"
 lepsius.530.d: "Après des années de travail et d'assemblage minutieux de dizaines de milliers de fragments babyloniens, la légendaire porte d'Ischtar brille d'un nouvel éclat - notamment dans sa taille originale dans notre musée !"
 lepsius.530.f: "La porte d'Ishtar était la huitième porte du centre-ville de Babylone. Il a été construit vers 575 avant notre ère sur ordre du roi Nabuchodonosor II, du côté nord de la ville. Cela faisait partie d'une voie processionnelle à grande muraille menant à la ville. Les murs étaient finis en briques vernissées principalement bleues, avec des animaux et des divinités en bas relief à intervalles, celles-ci également constituées de briques moulées et colorées différemment. Le devant de la porte présente un motif en bas-relief avec un motif répété d'images de deux des principaux dieux du panthéon babylonien. Marduk, divinité nationale et dieu principal, avec son dragon serviteur Mušḫuššu. est représenté comme un dragon avec une tête et une queue en forme de serpent, un corps d'écailles de lion et de puissantes serres pour les pattes arrière. Marduk était considéré comme le champion divin du bien contre le mal, et les incantations des Babyloniens recherchaient souvent sa protection. Le deuxième dieu représenté dans le motif des reliefs de la porte d'Ishtar est Adad (également connu sous le nom d'Ishkur), dont l'animal sacré était l'aurochs, un ancêtre aujourd'hui disparu du bétail. Adad avait le pouvoir sur les tempêtes destructrices et les pluies bénéfiques. La conception de la porte d'Ishtar comprend également des bordures linéaires et des motifs de rosaces, souvent considérés comme des symboles de fertilité. Les briques de la porte d'Ishtar étaient fabriquées à partir d'argile finement texturée pressée dans des formes en bois. Chacun des reliefs d'animaux a également été réalisé à partir de briques formées en pressant de l'argile dans des moules réutilisables."
 lepsius.530.g: "Magnificent!"
 lepsius.531.t: "La légende du Lamassu"
 lepsius.531.d: "Nos archéologues ont entendu l'histoire d'un lamassu extraordinairement magnifique, qui aurait été perdu il y a longtemps et se trouverait quelque part dans la région kurde."
 lepsius.531.f: "C'était un soir où notre équipe installait les tentes, allumait le feu de camp et préparait le mouton pour terminer la journée. Dans les teintes brûlantes de noir, de bleu et de rouge de l’aube, un vieux berger est arrivé au camp pour demander des provisions. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] s'est conformé et on lui a raconté une histoire incroyable. Il y a environ 30 ans, une autre expédition archéologique aurait recherché des trésors et des œuvres d'art extraordinaires dans cette région afin d'impressionner la direction du musée local et de rentrer chez elle avec gloire et gloire. Le point culminant des fouilles était un immense lamassu, encore connu aujourd'hui des habitants en raison de sa taille monumentale et de son bon état. Mais un accident s'est produit pendant le transport. Tandis que des dizaines d'hommes déplaçaient la statue géante de l'hybride mésopotamien, les chefs de l'expédition se brouillent avec la tribu kurde locale. Apparemment, ils voulaient escroquer les salaires des assistants kurdes recrutés. La tribu a donc tendu une embuscade aux membres de l’expédition et a pris ce qu’on croyait leur appartenir. Le lamassu est cependant resté là où il était – et attend toujours d’être récupéré dans la région kurde. Le berger a proposé de nous indiquer l'emplacement du légendaire Lamassu en échange de notre aide."
 lepsius.531.g: "Il est bien trop dangereux de se mettre inutilement en danger à cause de tels contes de fées."
 lepsius.531.h: "Il faut à tout prix récupérer ce lamassu !"
 lepsius.532.t: "À la recherche du Lamassu"
 lepsius.532.d: "Notre expédition s'est lancée dans le dangereux voyage vers la région kurde. Certains préconisent la séparation en raison des plus grandes chances de succès."
 lepsius.532.g: "Nous ne devrions pas nous séparer."
 lepsius.532.h: "Nous devrions diviser l'expédition."
 lepsius.533.t: "Cadeaux"
 lepsius.533.d: "Notre expédition a rencontré les chefs de clan pour obtenir l'autorisation de traverser la zone paisiblement et de récupérer le lamassu."
 lepsius.533.f: "Ne pas diviser l'expédition s'est avéré être un avantage inattendu : la lenteur du train de bagages a permis aux chefs du clan kurde local de nous retrouver plus rapidement que prévu. Bientôt, le chef de l'expédition et l'attaché militaire furent amenés devant les patriarches, considérés comme les véritables dirigeants de cette région. Ils se heurtèrent à une méfiance inconfortable. Apparemment, les souvenirs désagréables de la dernière expédition archéologique perdurent avec eux. On s’attend également à ce que nous, en tant qu’invités, apportions des cadeaux. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] avait prévu cette éventualité, mais apparemment, les matériaux acquis ne suffisent tout simplement pas à de nombreux dirigeants pour les convaincre de nos intentions."
 lepsius.533.g: "Nous proposons des tissus raffinés."
 lepsius.533.h: "Rappelez-leur leur honneur et leur hospitalité."
 lepsius.533.i: "Montrez-leur un geste de soumission."
 lepsius.534.t: "Insulté"
 lepsius.534.d: "La tentative de convaincre les patriarches kurdes a été un échec total : nous les avons plutôt retournés contre nous. Une escalade de la situation menace toute notre expédition !"
 lepsius.534.g: "Gardes !"
 lepsius.534.h: "Défendre!"
 lepsius.534.i: "Fuir!"
 lepsius.535.t: "Des membres de l'expédition kidnappés par des Kurdes"
 lepsius.535.d: "Après des recherches infructueuses de la part de l'expédition réduite, ils découvrent avec horreur à leur retour que certains membres de l'équipe restés sur place ont été victimes d'une attaque kurde."
 lepsius.535.f: "La stratégie consistant à diviser l’expédition s’est ensuite révélée être une erreur dévastatrice. Apparemment, une tribu kurde n'attendait qu'une proie et a profité de l'occasion lorsque la partie armée dirigée par l'attaché militaire s'est séparée du reste du convoi. Comme la plupart des matériaux qu'ils emportaient avec eux n'avaient que peu de valeur pour les pilleurs, ils ont brusquement kidnappé une bonne douzaine d'assistants comme otages, apparemment convaincus qu'ils pourraient obtenir une rançon pour eux. Cependant, l'équipe de l'expédition a décidé de ne pas accepter une telle offre - cela pourrait créer un précédent pour l'avenir. Tandis que [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] insiste pour négocier avec les dirigeants kurdes, [SCOPE.sCharacter('lepsius_military_attache').GetFullName] insiste pour attaquer le camp kurde et donner une leçon aux pilleurs."
 lepsius.535.g: "Essayez de négocier."
 lepsius.535.h: "Attaquez-les !"
 lepsius.536.t: "La négociation a échoué !"
 lepsius.538.t: "La Nuit des Douleurs"
 lepsius.538.d: "La recherche du lamassu a échoué."
 lepsius.538.f: "L’équipe de l’expédition quitte la région kurde les mains vides. Tels des chiens frappés, ils parcourent la nuit les collines pour reprendre l'ancien itinéraire. La perte de personnes et de matériel déprime tous les membres de l'expédition. La question du sens de tout le voyage laisse derrière elle mélancolie et découragement."
 lepsius.538.g: "Nous reviendrons..."
 lepsius.539.t: "Une mort noble"
 lepsius.539.d: "[SCOPE.sCharacter('lepsius_military_attache').GetFullName], notre attaché militaire, est tombé au combat contre les Kurdes !"
 lepsius.539.f: "Ce fut une bataille acharnée, mais nos troupes peu entraînées ne purent pratiquement rien contre les combattants kurdes éprouvés et courageux. L'attaché ordonna la retraite et resta sur place avec ses propres hommes pour couvrir nos arrières. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] n'a pu que jeter un dernier regard en arrière et voir comment il est tombé au sol dans la défaite. Il a fait gagner à l'équipe un temps précieux pour se mettre en sécurité, alors que pour lui, toute aide arrivait trop tard."
 lepsius.539.g: "Il a donné sa vie pour la nôtre."
 lepsius.540.t: "Le Lamassu"
 lepsius.540.d: "[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] a réussi à convaincre les Kurdes de nos préoccupations. La manière de récupérer le Lamassu est claire."
 lepsius.540.d_victory: "Nous avons remporté une victoire militaire sur la tribu kurde indigène et nous sommes frayés un chemin vers le légendaire Lamassu !"
 lepsius.540.f: "Il n'a pas été facile de convaincre les Kurdes de nos bonnes intentions, mais les qualités utiles de notre chef d'expédition ont fait de cette entreprise apparemment impossible un succès. Après seulement quelques jours de recherche, nous avons trouvé le lamassu décrit près d'une falaise. Une apparition majestueuse rayonnant sur toute la vallée ! Nos archéologues ont été heureux de constater que le colosse est presque intact. Il est déjà clair qu'il s'agira de l'exposition principale de notre collection mésopotamienne."
 lepsius.540.f_victory: "Après une dure et âpre bataille, notre héroïque attaché [SCOPE.sCharacter('lepsius_military_attache').GetFullName], grâce à ses compétences supérieures (et un peu d'aide de ses soldats), réussit à mettre l'ennemi en fuite. Impressionnés par cette leçon, les Kurdes n'osèrent plus faire obstacle au rétablissement du lamassu. Après seulement quelques jours de recherche, nous avons trouvé le lamassu décrit près d'une falaise. Une apparition majestueuse rayonnant sur toute la vallée ! Nos archéologues ont été heureux de constater que le colosse est presque intact. Il est déjà clair qu'il s'agira de l'exposition principale de notre collection mésopotamienne."
 lepsius.540.g: "C'est merveilleux!"
 lepsius.551.t: "L'accident archéologique"
 lepsius.551.d: "There was a terrible accident on an excavation site - Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] has disappeared!"
 lepsius.551.g: "What happened to [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim]?"
 lepsius.552.t: "Le labyrinthe"
 lepsius.552.g: "J'espère que nous ne rencontrerons pas de créatures mythiques ressemblant à des taureaux..."
 lepsius.553.t: "Le labyrinthe - encore une fois"
 lepsius.553.g: "C'est un sacré déjà-vu !"
 lepsius.554.t: "Salle des Dauphins"
 lepsius.554.g: "Zeus - go left."
 lepsius.554.h: "Demeter and Persephone - go right."
 lepsius.554.i: "Artemis - go upstairs."
 lepsius.554.j: "Poseidon - go downstairs."
 lepsius.555.t: "Salle du Soleil"
 lepsius.555.d: "La fin d'un couloir se divise en trois voies. Les restes d'une fresque se trouvent sur le mur."
 lepsius.555.f: "On the fresco, the blue color shines towards [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullNameNoFormatting]. The sky takes up the whole wall. Eos, the goddess of dawn, stands in the east and dominates the scene. Opposite her to the west is her husband Astraios, who is only recognizable as a silhouette at night. In between the sun shines at noon."
 lepsius.555.g: "Eos - take the left corridor."
 lepsius.555.h: "Astraios - take the right corridor."
 lepsius.555.i: "Helios - take the middle corridor."
 lepsius.556.t: "Salle des Femmes"
 lepsius.556.d: "Le Perdu atteint une pièce au fond de laquelle se trouvent quatre portes ouvertes. Devant elle se dressent les petites sculptures de quatre femmes."
 lepsius.556.f: "The four sculptures show women of different ages and sexes. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullNameNoFormatting] cannot determine whether they are goddesses or mortals. Their forms are primitive and limited to the essentials. Her color has long faded; what makes them different is the objects in their hands. The first holds a ball of yarn in her hand, from which she plucks a thread. The second is holding a mirror and looking at herself. The third is holding a snake. The last leads an arch."
 lepsius.556.g: "The Ball of Yarn - door I."
 lepsius.556.h: "The Mirror - door II."
 lepsius.556.i: "The Snake - door III."
 lepsius.556.j: "The Arch - door IV."
 lepsius.557.t: "Salle des Îles"
 lepsius.557.g: "Rhodes."
 lepsius.557.h: "Délos."
 lepsius.557.i: "Eubée."
 lepsius.557.j: "Naxos."
 lepsius.558.t: "La colère du Minotaure"
 lepsius.558.g: "Que s'est-il passé là-bas ?"
 lepsius.559.t: "The Tragic Death of [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullNameNoFormatting]"
 lepsius.559.d: "Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastNameNoFormatting] was found dead in his apartment under mysterious circumstances."
 lepsius.559.g: "Mais était-ce vraiment un suicide ?"
 lepsius.560.t: "Échappé du labyrinthe!"
 lepsius.560.d: "After finally escaping the maze, [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullNameNoFormatting] can tell [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] colleagues about the incredible discovery. To prove that [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] hadn't gone mad, [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] brought with [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim] a striking piece of evidence that [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] had found in the depths of the labyrinth."
 lepsius.560.g: "Serait-ce là… le labyrinthe légendaire de Daidalos ?"
 lepsius.561.t: "La mystérieuse pyramide"
 lepsius.561.d: "Our archaeological expedition has identified a hitherto unrecorded pyramid, half-swallowed by the Yucatec selva. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] has encountered lore of this place before and resolves to attempt an entry ..."
 lepsius.561.g: "J'ai un mauvais pressentiment à propos de ceci."
 lepsius.561.h: "Intéressant. Tu y vas en premier."
 lepsius.562.t: "The Glyph-Riddle"
 lepsius.562.d: "At the end of a long corbelled passage stands a dressed-stone panel bearing a riddle. Four recessed cartouches, each carved with the visage of a great Maya god, can be depressed; the masonry fairly reeks of a mechanical contrivance. Beneath runs a distich: “I rise in the east in fiery glory; at zenith I blaze like jade; at dusk I descend the road beneath the earth. I keep the count of days and seat the lords.” One cartouche must be pressed."
 lepsius.562.g: "K'inich Ajaw (Sun Lord)."
 lepsius.562.h: "Chaac (Rain/Thunder)."
 lepsius.562.i: "Itzamnaaj (Creator/Sky)."
 lepsius.562.j: "Kukulkan (Feathered Serpent)."
 lepsius.563.t: "L'idole"
 lepsius.563.d_right: "Our archaeologist attains the goal of the venture; the mechanism yields and a sanctum opens."
 lepsius.563.d_wrong: "Our archaeologist gains the inner chamber; yet the facility of access offends reason—surely the device has not had its last word."
 lepsius.563.g: "Doucement... soigneusement... faites-le..."
 lepsius.563.h: "I know this scene—it never works out. Grab the damn artifact and RUN!"
 lepsius.564.t: "C'est un piège!"
 lepsius.564.g: "COURIR!"
 lepsius.564.h: "I knew it—blast!"
 lepsius.565.t_right: "Quitter la pyramide"
 lepsius.565.t_wrong: "Un rival archéologique"
 lepsius.565.d_right: "Against expectation, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] survives the contrivances within the pyramid and succeeds in securing the idol!"
 lepsius.565.g: "Charlie, démarre le moteur !"
 lepsius.565.h: "Je ne peux pas supporter ce type."
 lepsius.566.t: "Une offre archéologique"
 lepsius.566.d: "Un archéologue privé nous offre une excellente marchandise qu'il avait auparavant arrachée à un rival étranger."
 lepsius.566.f: "A private expedition has reported a Mayan pyramid deep in the selva of Yucatán. Its leader—alas, a compatriot—claims to have procured a sacred idol which, by a curious turn, had just been wrested from the grasp of a fedora‑wearing [PREV.GetCountry.GetAdjectiveNoFlag] archaeologist. The latter, so the tale goes, perished shortly thereafter in a violent skirmish with Hovitos tibesmen. However shaded the circumstances, the piece would be a singular attraction for our museum’s Pre‑Columbian collection—provided we meet the asking price."
 lepsius.566.g: "This artifact will look splendid in our collection!"
 lepsius.566.h: "We do not buy artifacts from ruthless grave robbers."
 lepsius.581.t: "Retour au monde perdu"
 lepsius.581.g: "Il devrait restaurer son honneur."
 lepsius.581.i: "Nos intérêts nationaux l’emportent sur les egos meurtris d’individus moche."
 lepsius.582.t: "Un explorateur négligé revient triomphant"
 lepsius.582.d: "À la surprise du monde scientifique tout entier, [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] est revenu du Yucatán - et a la preuve de ses affirmations bizarres !"
 lepsius.582.g: "Il avait raison?"
 lepsius.583.t: "Un explorateur négligé disparaît au Yucatán"
 lepsius.584.t: "Entrer dans le monde perdu"
 lepsius.584.d: "Après des semaines, l'expédition a atteint une vallée totalement inconnue. Il semble que [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] ait réellement raison avec ses affirmations fantastiques !"
 lepsius.584.g: "Incroyable!"
 lepsius.585.t: "Photographier des dinosaures"
 lepsius.585.d: "Les nouvelles possibilités techniques permettent de capturer par caméra la flore et la faune uniques du Monde Perdu."
 lepsius.585.f: "C'est comme regarder à travers une fenêtre un monde il y a des millions d'années : des ptérosaures règnent sur le ciel, des brontosaures géants secouent la terre et de dangereux rapaces chassent des proies imprudentes. Les plantes ici sont également complètement différentes de celles des autres régions du Yucatán. Un compagnon scientifique a profité du moment et a pris toute une série de photos avec son appareil photo, qui lui servent de preuve pour son domicile. Les scientifiques pourront peut-être encore mieux reconstruire les débuts de l’histoire de la Terre."
 lepsius.585.g: "S'il vous plaît, faites « ROAR » !"
 lepsius.586.t: "Présence maya"
 lepsius.586.d: "Après une exploration approfondie de la vallée, le chef de l'expédition a élaboré un plan risqué."
 lepsius.586.g: "Une opportunité unique !"
 lepsius.586.h: "Prenons avec nous uniquement les preuves les plus nécessaires."
 lepsius.587.t: "L’expédition se termine par un horrible désastre"
 lepsius.587.d: "L'expédition a pris la pire tournure possible après une attaque de rapaces."
 lepsius.588.t: "Joyau de Kukulkan"
 lepsius.588.d: "Contre toute attente, notre chef d'expédition a réussi à mettre la main sur la légendaire Gemme de Kukulkan !"
 lepsius.589.t: "Les héros reviennent du monde perdu"
 lepsius.589.f: "Quelle journée! Après un voyage dangereux et aventureux jusqu'au bout du monde, notre expédition a pu partager ses découvertes extraordinaires pour prouver au public que [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] n'est pas un fou, mais en fait un scientifique réputé - et un véritable héros ! La presse et la population ont révisé en détail leur attitude et reconnaissent également que le soutien du gouvernement est la bonne décision. Cependant, le chef de l'expédition s'est engagé à garder secrète la véritable localisation de la vallée afin d'y conserver la flore et la faune et de réduire les risques de braconnage."
 lepsius.701.t: "Les étrangers veulent voler notre héritage"
 lepsius.701.d: "[SCOPE.sCountry('lepsius_smuggler_country').GetAdjectiveNoFlag] Aujourd'hui, des archéologues ont été surpris en train d'essayer de déplacer illégalement un artefact majeur hors du pays. Comment devons-nous réagir ?"
 lepsius.701.f: "Des étrangers du [SCOPE.sCountry('lepsius_smuggler_country').GetName] à qui nous avons accordé des licences de fouilles ont été surpris en train d'essayer de transporter un artefact extrêmement précieux hors du pays aujourd'hui. Selon les lois en vigueur, les archéologues étrangers sont tenus de remettre la moitié des objets découverts au pays des fouilles. Apparemment, ils ont essayé de ramener clandestinement la trouvaille chez nous sans que nous puissions l'inspecter."
 lepsius.701.g: "Manifestation!"
 lepsius.701.h: "Que ferons-nous de ce vieux charabia ?"
 lepsius.702.t: "Incident diplomatique"
 lepsius.702.d: "Malheureusement, les autorités du [SCOPE.sCountry('lepsius_protest_country').GetName] ont remarqué notre tentative d'introduire ce précieux artefact dans notre pays. Comment devons-nous réagir ?"
 lepsius.702.f: "À partir de la fin du XIXe siècle, la forme la plus courante d'autorisation de fouilles archéologiques reposait sur le partage des découvertes : le fouilleur donnait la moitié des objets trouvés au pays dans lequel il menait une fouille. Les autorités ont inspecté les objets trouvés et ont veillé particulièrement à ce que les pièces les plus précieuses ne soient pas sorties du pays. Cependant, il arrivait à maintes reprises que certains pays insistaient pour ne pas restituer une pièce qui avait été fouillée ; dans d’autres cas, les parties ont convenu dans un accord de la manière de procéder."
 lepsius.702.g: "Celui qui le trouve le garde."
 lepsius.702.h: "Nous trouverons certainement un accord à l'amiable."
 lepsius.702.i: "Faites don de l’artefact en gage de notre philanthropie."
 lepsius.703.t: "Les étrangers se moquent de nous !"
 lepsius.703.d: "Les barbares du [SCOPE.sCountry('lepsius_smuggler_country').GetName] se sont moqués de nos affirmations. Ils ne songeraient pas à nous laisser participer à la découverte - et ont ramené clandestinement l'artefact dans leur pays d'origine."
 lepsius.703.f: "L’ère victorienne regorge d’innombrables histoires d’artefacts sortis illégalement du pays, en particulier par les puissances européennes. Dans certains cas, les musées ont encore à ce jour des demandes de remboursement."
 lepsius.703.g: "Cette arrogance est incroyable !"
 lepsius.704.t: "Concessions accordées"
 lepsius.704.d: "[SCOPE.sCountry('lepsius_smuggler_country').GetName] nous a hébergés et a accepté nos réclamations comme justifiées. Diplomatiquement et financièrement, ils veulent nous accorder des concessions. Ils nous proposent également de nombreuses autres trouvailles pour nous inciter à leur remettre le précieux trésor."
 lepsius.704.f: "Dans de nombreux cas de pillage ou de vol de tombes présumés, les puissances européennes ont accommodé les pays des fouilles. Après les fouilles de Troie, par exemple, Schliemann a dû se présenter à la Sublime Porte parce qu'il avait fait passer des objets en contrebande à l'étranger. Schliemann a non seulement remis quelques trouvailles, mais a également payé cinq fois le montant demandé. Une telle procédure n'était certes pas la manière la plus charmante de traiter au niveau international, mais elle valait toujours mieux que de tromper complètement le pays des fouilles et était souvent acceptée par les pays plaignants comme un règlement à l'amiable."
 lepsius.704.g: "Heureux qu'ils aient réalisé qu'ils avaient tort."
 lepsius.706.t: "L'artefact majeur est arrivé !"
 lepsius.706.d: "Avec un léger retard, le précieux artefact est finalement arrivé au musée aujourd'hui. Le réalisateur lui a déjà choisi un endroit très spécial !"
 lepsius.706.f: "Les objets majeurs font la fierté de chaque exposition et musée. Heureux un pays qui peut s’approprier de tels joyaux !"
 lepsius.711.t: "Masque de Toutankhamon"
 lepsius.711.d: "Après avoir découvert le tombeau perdu de Toutankhamon, nos archéologues ont pu récupérer un artefact très particulier : le masque du pharaon !"
 lepsius.711.f: "Le masque de Toutankhamon est un masque en or du pharaon égyptien Toutankhamon de la XVIIIe dynastie. Le masque mortuaire est l’une des œuvres d’art les plus connues au monde et un symbole éminent de l’Égypte ancienne. À l'effigie d'Osiris, dieu égyptien de l'au-delà, il mesure 54 centimètres de haut, pèse plus de 10 kilogrammes ou 321,5 onces troy et est décoré de pierres semi-précieuses. Un ancien sortilège du Livre des Morts est inscrit en hiéroglyphes sur les épaules du masque. Le visage représente l'image standard du pharaon, et la même image a été retrouvée par les fouilleurs ailleurs dans la tombe, notamment dans les statues des gardiens. Selon l'égyptologue Nicholas Reeves, le masque est « non seulement l'image par excellence de la tombe de Toutankhamon, mais c'est peut-être l'objet le plus connu de l'Égypte ancienne elle-même »."
 lepsius.711.g: "Ce sera la plus belle exposition de notre collection."
 lepsius.711.h: "Nous devrions essayer de faire sortir l'artefact du pays en toute sécurité..."
 lepsius.712.t: "Buste de Néfertiti"
 lepsius.712.d: "Lors de nos fouilles en Egypte, nos archéologues ont découvert un artefact vraiment exceptionnel : le buste de Néfertiti !"
 lepsius.712.f: "Le buste de Néfertiti est un buste en pierre calcaire peint et recouvert de stuc de Néfertiti, la grande épouse royale du pharaon égyptien Akhénaton. C'est l'une des œuvres les plus copiées de l'Égypte ancienne. Néfertiti est devenue l’une des femmes les plus célèbres du monde antique et une icône de la beauté féminine. On sait peu de choses sur Néfertiti. Les théories suggèrent qu'elle aurait pu être une royale égyptienne de naissance, une princesse étrangère ou la fille d'un haut fonctionnaire du gouvernement nommé Ay, devenu pharaon après Toutankhamon. Elle a peut-être été la co-régente de l'Égypte avec Akhénaton, qui a régné de 1352 avant notre ère à 1336 avant notre ère. Le buste ne porte aucune inscription, mais peut certainement être identifié comme étant Néfertiti grâce à la couronne caractéristique, qu'elle porte dans d'autres représentations survivantes."
 lepsius.713.t: "Palette de Narmer"
 lepsius.713.d: "Nos archéologues ont mis au jour un artefact extraordinaire lors de leurs fouilles : la Palette de Narmer !"
 lepsius.713.f: "La palette Narmer, également connue sous le nom de palette du Grand Hiérakonpolis ou palette de Narmer, est une découverte archéologique égyptienne importante, datant d'environ le 31e siècle avant JC, appartenant, au moins nominalement, à la catégorie des palettes cosmétiques. Il contient certaines des premières inscriptions hiéroglyphiques jamais découvertes. Certains pensent que la tablette représente l’unification de la Haute et de la Basse-Égypte sous le roi Narmer. Avec la tête de masse du Scorpion et les têtes de masse de Narmer, également trouvées ensemble dans le gisement principal de Nekhen, la palette de Narmer constitue l'une des premières représentations connues d'un roi égyptien. La Palette présente de nombreuses conventions classiques de l'art égyptien antique, qui devaient déjà avoir été formalisées au moment de la création de la Palette. L'égyptologue Bob Brier a qualifié la palette de Narmer de « premier document historique au monde »."
 lepsius.722.t: "Masque de Sargon"
 lepsius.722.d: "Lors de fouilles à Ninive dans le cadre de la découverte des Jardins Suspendus, nos archéologues ont découvert un artefact remarquable : le Masque de Sargon !"
 lepsius.722.f: "La tête en bronze d'un roi, portant le casque-perruque des anciens dirigeants sumériens, est probablement Sargon lui-même. Bien que dépourvue de ses yeux incrustés et légèrement endommagée ailleurs, cette tête est à juste titre considérée comme l'un des grands chefs-d'œuvre de l'art ancien. La tête est un buste en bronze grandeur nature trouvé à Ninive. Le bouclage et les motifs complexes de la barbe et la coiffure complexe suggèrent la royauté, le pouvoir et la richesse d'un homme idéal dans la société. Outre ses caractéristiques esthétiques, cette pièce est spectaculaire car il s’agit de la première sculpture en fonte creuse connue à utiliser le procédé de coulée à la cire perdue. Il y a des dommages délibérés sur le côté gauche du visage et de l'œil, ce qui indique que le buste a été intentionnellement lacéré ultérieurement pour démontrer une iconoclasme politique."
 lepsius.723.t: "Casque de Meskalamdug"
 lepsius.723.d: "Lors de nos fouilles en Babylonie, nos archéologues sont tombés sur une découverte particulière : le Casque de Meskalamdug !"
 lepsius.723.f: "Le casque de Meskalamdug est l'une des découvertes les plus célèbres des tombeaux royaux d'Ur. Meskalamdug était l'un des premiers dirigeants sumériens de la première dynastie d'Ur au 26ème siècle avant notre ère. Le casque était gaufré en feuille d'or et ne convenait donc guère comme vêtement de protection pour la guerre. Il a peut-être été davantage utilisé dans le domaine cérémonial/cultuel. Hormis les oreilles travaillées sur les côtés, l’œuvre dans son ensemble s’apparente davantage à une perruque, puisque ses fines gravures imitent une coiffure ondulée. Sur le côté en revanche, on retrouve des boucles qui sont séparées de la coiffure ondulée par une tresse autour de la tête. La tresse est nouée en bouton au bout de la tête. Le casque présente une série de petits trous sur le bord, auxquels une doublure était probablement fixée."
 lepsius.731.t: "Masque d'Agamemnon"
 lepsius.731.d: "Après avoir découvert les trésors de Mycènes, un artefact en particulier a attiré notre attention : un masque mortuaire en or, le soi-disant Masque d'Agamemnon !"
 lepsius.731.f: "Le « Masque d'Agamemnon » est le nom donné à un masque funéraire en or découvert sur le site grec antique de Mycènes. L'archéologue allemand Heinrich Schliemann, qui a découvert l'artefact en 1876, croyait avoir trouvé le corps du roi mycénien Agamemnon, chef des Achéens dans l'épopée d'Homère sur la guerre de Troie, l'Iliade, mais les recherches archéologiques modernes suggèrent que le masque date de environ 1600 avant JC, précédant de 300 à 400 ans la période de la légendaire guerre de Troie. Le masque est fait d'une feuille d'or solide jaune-rougeâtre et a une hauteur d'environ 26 cm et une largeur de 26,5 cm. Le visage d'un homme avec une barbe, une moustache et des sourcils est gravé dans la tôle. Il y a un trou à côté de chaque lobe d’oreille, qui servait probablement à la fixation. Le masque a été décrit par Cathy Gere comme la « Joconde de la préhistoire »."
 lepsius.732.t: "Disque de Phaistos"
 lepsius.732.d: "Des fouilles en Crète ont mis au jour un artefact idiosyncrasique et mystérieux : le disque de Phaistos !"
 lepsius.732.f: "Le disque de Phaistos est un disque d'argile cuite provenant du palais minoen de Phaistos sur l'île de Crète, datant peut-être du milieu ou de la fin de l'âge du bronze minoen (deuxième millénaire avant JC). Le disque mesure environ 15 cm de diamètre et est recouvert sur ses deux faces d'une spirale de symboles estampés. Sa destination et son lieu de fabrication d'origine restent controversés. Le disque a été découvert en 1908 par l'archéologue italien Luigi Pernier sur le site du palais minoen de Phaistos et comporte 241 jetons, comprenant 45 signes distincts, qui ont apparemment été réalisés en pressant des « sceaux » hiéroglyphiques dans un disque d'argile molle, dans un séquence dans le sens des aiguilles d’une montre en spirale vers le centre du disque. Le disque de Phaistos a captivé l'imagination des archéologues amateurs et professionnels, et de nombreuses tentatives ont été faites pour déchiffrer le code derrière les signes du disque."
 lepsius.733.t: "Déesse Serpent"
 lepsius.733.d: "Un artefact minoen d’une importance artistique et historique particulière est tombé entre nos mains lors de fouilles en Crète : la Déesse Serpent !"
 lepsius.733.f: "Deux figurines de déesse serpent minoenne ont été fouillées en 1903 dans le palais minoen de Knossos, sur l'île grecque de Crète. Les figurines de Cnossos, toutes deux très incomplètes, datent de la fin de la période néo-palatiale de la civilisation minoenne, vers 1600 avant notre ère. C'est Evans qui a appelé la plus grande de sa paire de figurines une « Déesse Serpent », la plus petite une « Prêtresse Serpent » ; depuis lors, on se demande si Evans avait raison, ou si les deux figurines représentent des prêtresses, ou si les deux représentent la même divinité ou des divinités distinctes. La combinaison de vêtements élaborés qui laissent les seins complètement nus et de « luttes de serpents » a attiré une publicité considérable, sans parler de diverses contrefaçons, et la silhouette plus petite en particulier reste une icône populaire de l'art et de la religion minoens, désormais aussi généralement appelée en tant que « Déesse Serpent »."
 lepsius.771.t: "Trésor funéraire de Pakal"
 lepsius.771.d: "Après avoir découvert le tombeau du roi Pakal, nous avons pu récupérer des artefacts spéciaux : les trésors funéraires de Pakal !"
 lepsius.771.f: "Il est remarquable que les Mayas, qui ne disposaient pas d'outils métalliques, créaient de nombreux objets à partir d'un matériau très épais et dense, le jade (jadéite), notamment toutes sortes d'éléments vestimentaires (royaux), tels que des plaques de ceinture - ou celtes - des bobines d'oreilles, pendentifs, mais aussi masques. Les Celtes (c'est-à-dire des ornements plats en forme de celte) étaient parfois gravés d'une représentation du roi en forme de stèle (par exemple, la « plaque de Leyde ») du début du classique. L'exemple de masque le plus connu est probablement le masque mortuaire du roi de Palenque Pakal, recouvert de plaques de marbre de forme irrégulière et dont les yeux sont en nacre et en obsidienne. Pacal le Grand était à proximité de la cité-état maya de Palenque à la fin de la période classique de la chronologie mésoaméricaine précolombienne. Il accède au trône en juillet 615 et règne jusqu'à sa mort. Il régna 68 ans."
 lepsius.772.t: "Belt Plaque"
 lepsius.772.d: "A Pre-Columbian artifact of particular artistic and historical importance fell into our hands during excavations in Yucatan: the Belt Plaque!"
 lepsius.772.f: "The Leyden Plaque is a significant Maya artifact carved from pale green jadeite, serving as a belt pendant. Discovered in 1864 near Puerto Barrios, Guatemala, it is renowned as one of the oldest dated objects from the Maya civilization. The plaque features delicate incised drawings on both sides. The obverse depicts a Maya lord—often identified as Siyaj Chan K'awiil I of Tikal—standing in profile and trampling a bound captive. The reverse bears a Long Count date (8.14.3.1.12), corresponding to September 320 CE, marking the ruler's accession. As a primary source for Early Classic Maya history, it provides vital insights into early royal iconography and epigraphy. Named after the city where it is curated, the plaque is currently held by the National Museum of Ethnology in Leiden, Netherlands."
 lepsius.721.t: "L'épopée de Gilgamesh"
 lepsius.721.d: "Nos assyriologues ont réussi à reconstituer les traits fondamentaux de l'épopée de Gilgamesh à partir des tablettes cunéiformes trouvées."
 lepsius.721.f: "Gilgamish se leva en interprétant des rêves,\n s'adressant à sa mère.\n \"Ma mère !\" pendant ma nuit, moi, devenu vigoureux, j'errais\n au milieu des présages.\n Et des étoiles apparurent dans les cieux,\n Comme un ... du ciel, il tomba sur moi.\n J'ai porté lui, mais il était trop lourd pour moi.\n Il portait un filet mais je n'étais pas capable de le supporter.\n J'ai convoqué le pays pour qu'il se rassemble autour de lui,\n afin que les héros puissent lui baiser les pieds.\n Il se leva devant lui. moi\n et ils se sont tenus en face de moi\n, je l'ai soulevé et je l'ai emmené vers toi.'"
 lepsius.721.g: "La plus ancienne épopée de l'histoire de l'humanité..."
 lepsius.741.t: "Le Trésor de Priam"
 lepsius.741.d: "Après sa découverte révolutionnaire de Troie, Heinrich Schliemann cherche un musée approprié auquel il pourrait faire don du trésor de Priam."
 lepsius.741.f: "Bien que Schliemann ait ébranlé les experts avec ses fouilles et joui d'une popularité dans toute l'Europe, il s'est heurté à la résistance des experts, notamment en raison de ses méthodes de recherche. Il y avait encore un certain nombre de mises en garde. Par exemple, les historiens et les archéologues doutaient que le soi-disant trésor de Priam puisse réellement provenir d'une couche correspondant à Troie homérique. De plus, lorsque Schliemann décida de faire don de ses trouvailles à un musée, il n'obtint pas la réponse qu'il aurait espérée ; les anciens clients étaient dédaigneux. Des musées célèbres comme l'Ermitage ou le Louvre ont également refusé. Le découvreur exposa temporairement le trésor à Londres jusqu'à ce qu'il décide en 1881 de léguer la découverte « au peuple allemand pour une possession perpétuelle et une garde dans la capitale du Reich »."
 lepsius.741.g: "... et je connais l'emplacement idéal pour ce trésor !"
 lepsius.743.t: "Schliemann fait don du trésor de Priam"
 lepsius.743.d: "Après de longues délibérations, [SCOPE.sCharacter('lepsius_new_archaeologist_scope').GetFullName] a décidé de confier le trésor de Priam à notre musée !"
 lepsius.743.g: "Nous aménagerons une salle pour cela - et lui donnerons le nom de Schliemann !"
 lepsius.743.h: "[SCOPE.sCharacter('lepsius_new_archaeologist_scope').GetLastName] est le vrai trésor !"
 lepsius.744.t: "Schliemann fait don du trésor de Priam à un musée"
 lepsius.744.d: "Aujourd'hui, nous avons malheureusement appris que Heinrich Schliemann avait légué le trésor de Priam à un musée. Malheureusement, ce n'est pas le nôtre."
 lepsius.744.g: "Comment a-t-il pu nous trahir ainsi ?"
 lepsius.801.t: "Site de fouille"
 lepsius.801.d: "Sur quel chantier de fouilles devons-nous envoyer notre archéologue ?"
 lepsius.801.f: "Lorsque M. Coffeecake s'est rendu compte que la carte au trésor d'un réalisme impressionnant provenait en réalité d'une machine à boules de gomme, il a dû modifier ses projets de voyage archéologique d'une manière jamais vue auparavant."
 lepsius.801.g: "Haute Egypte."
 lepsius.801.h: "Basse Egypte."
 lepsius.801.i: "Babylonie."
 lepsius.801.j: "Assyrie."
 lepsius.801.k: "Argolide."
 lepsius.801.l: "Yucatán."
 lepsius.801.m: "Pas grave."
 lepsius.802.t: "Archéologue"
 lepsius.802.d: "Quel archéologue devrions-nous envoyer pour établir un nouveau chantier de fouilles ?"
 lepsius.802.f: "La plupart des pays n'ont qu'un seul archéologue, qui occupe souvent également le poste de scientifique principal ; cependant, si un pays - pour une raison quelconque - dispose d'archéologues plus expérimentés, il est possible de sélectionner ici une deuxième personne."
 lepsius.802.g: "[SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName]"
 lepsius.802.h: "[SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName]"
 lepsius.803.t: "Départ"
 lepsius.803.g: "Bonne chance!"
 lepsius.811.t_vok: "Tombe d'un noble"
 lepsius.811.t_pyr: "Sanctuaire de Bastet"
 lepsius.811.t_bab: "Tombeau sumérien"
 lepsius.811.t_ass: "Sanctuaire assyrien"
 lepsius.811.t_arg: "Sanctuaire de Mycènes"
 lepsius.811.t_yuc: "Maison de stockage"
 lepsius.811.d: "Notre archéologue a mis en place un chantier de fouilles médiocre."
 lepsius.811.f_pyr: "[SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] a découvert les ruines d'un ancien complexe de temples égyptiens dans une partie marécageuse du delta du Nil en Basse-Égypte - c'est ce qu'il semblait au début. Malheureusement, il s'est avéré qu'il s'agissait d'une découverte beaucoup plus petite : le temple supposé était plutôt un sanctuaire dédié à la déesse chat Bastet. Néanmoins, nos chercheurs ont commencé les fouilles – après tout, il faut bien commencer quelque part."
 lepsius.811.f_bab: "Les Sumériens constituent peut-être la plus ancienne civilisation du monde. [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] en Babylonie a découvert accidentellement un tombeau d'anciens peuples qui auraient inventé la roue et l'écriture. Malheureusement, il s'est avéré peu de temps après que la plupart des artefacts avaient été volés ou détruits. Les archéologues ont commencé à travailler."
 lepsius.811.f_arg: ""
 lepsius.811.f_yuc: "Malheureusement, notre équipe de fouilles au Yucatán a eu peu de succès dans sa recherche de vestiges de la culture maya. Dans une vallée latérale, les archéologues ont découvert un ancien entrepôt qui n'offrait auparavant que des poteries brisées. Dans un télégramme, [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] a confirmé qu'il fallait s'attendre à davantage à l'avenir."
 lepsius.811.g: "Un endroit médiocre, mais c'est le nôtre..."
 lepsius.812.t_vok: "Tombeau d'un prince"
 lepsius.812.t_pyr: "Temple de Râ"
 lepsius.812.t_bab: "Ziggourat de la Lune"
 lepsius.812.t_ass: "Forteresse assyrienne"
 lepsius.812.t_arg: "Tombeau de chambre"
 lepsius.812.t_yuc: "Observatoire Maya"
 lepsius.812.d: "Notre archéologue a mis en place un bon site de fouilles."
 lepsius.812.f_vok: "Bonne nouvelle d'Egypte ! Après de nombreuses épreuves, [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] a découvert une tombe jusqu'alors inconnue. Selon les premières informations, c'est le lieu de repos final d'un ancien prince égyptien. Bien qu'il manque certains artefacts qui auraient pu être volés et vendus par les locaux dans le passé, c'est par ailleurs un bon point de départ pour de nouvelles fouilles archéologiques."
 lepsius.812.f_pyr: "Sous un ciel égyptien clair, le dernier reste d'électron clignote au sommet d'un obélisque à l'horizon - et marque l'entrée d'un temple du dieu solaire Ra ! [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] a immédiatement sécurisé le site et commencé les fouilles."
 lepsius.812.f_ass: "Jusqu’à ce jour, la Bible a dessiné l’image des Assyriens sous un jour plutôt négatif auprès des juifs et des chrétiens. Connu comme un peuple guerrier qui a harcelé à plusieurs reprises les Israélites et a finalement détruit le royaume du nord, ils sont entrés dans l’histoire comme une puissance militaire majeure. Même si toute cette propagande négative n’est pas vraie, la découverte d’une forteresse assyrienne a montré que les anciens dirigeants du Moyen-Orient possédaient une culture militaire impressionnante."
 lepsius.812.f_arg: "[SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] a récemment trouvé une tombe à chambre mycénienne. Cette forme d'architecture mortuaire était utilisée à la fin de l'âge du bronze dans les zones sous l'influence culturelle de la mer Égée. Les tombes sont taillées dans la roche et ont une structure tripartite (chambre, stomion et dromos), souvent avec des niches supplémentaires et des chambres latérales dans lesquelles avaient lieu des sépultures primaires ou secondaires. Le directeur de notre musée a mis une bouteille de champagne au frais."
 lepsius.812.f_yuc: "Les Mayas s'intéressaient vivement à l'astronomie. Apparemment, ils possédaient une connaissance particulière des phénomènes célestes, supérieure à celle des anciens Grecs à bien des égards. [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] a découvert un bâtiment dans la jungle doté d'un escalier en colimaçon en forme de serpent à son sommet. Nos chercheurs sont impatients de voir quelles informations et quels artefacts cette découverte nous réserve."
 lepsius.812.g: "Un bel endroit pour une fouille."
 lepsius.813.t_vok: "Tombeau d'une reine"
 lepsius.813.t_pyr: "Pyramide inexplorée"
 lepsius.813.t_bab: "Porte et murs babyloniens"
 lepsius.813.t_ass: "Palais assyrien"
 lepsius.813.t_arg: "Citadelle de Mycènes"
 lepsius.813.t_yuc: "Pyramide Maya"
 lepsius.813.d: "Notre archéologue a mis en place un excellent site de fouilles."
 lepsius.813.f_pyr: "Lorsque le dernier télégramme du [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] est arrivé aujourd'hui, nos chercheurs n'ont pas voulu y croire au début : apparemment, nos archéologues ont redécouvert une pyramide jusqu'alors inconnue dans le désert égyptien. Bien que les habitants aient déjà parlé de l'objet, entièrement recouvert de sable, ils n'ont pas trouvé d'entrée. Notre nation peut s’approprier de nombreuses découvertes de l’Ancien Empire !"
 lepsius.813.f_arg: "Les demi-dieux ou les cyclopes ont-ils vraiment construit les villes antiques ? Une formidable citadelle mycénienne s'élève au-dessus des collines grecques alors que notre équipe d'expédition rapporte succès sur succès une semaine après sa découverte. Non seulement l'architecture est impressionnante, mais les découvertes d'argile et d'or promettent également de nouvelles découvertes à l'avenir. [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] a même dit que l'Anneau de Ménélas avait été retrouvé."
 lepsius.813.f_yuc: "Lorsque la pluie s'est calmée après des heures et qu'il ne restait plus qu'un léger film de brouillard de la douche, qui enveloppait la cime des arbres de la jungle, l'expédition a vu une image magnifique. Au-dessus de la cime des arbres, d'innombrables marches couvertes de sous-bois et de lianes s'élevaient vers le ciel : une puissante pyramide à degrés occupait le panorama, au milieu d'une nature sauvage peuplée d'oiseaux et de tapirs. [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] a immédiatement récupéré certaines des premières trouvailles et les a envoyées au musée par livraison express."
 lepsius.813.g: "Cet endroit est parfait !"
 lepsius.190.t: "L'équipe archéologique rappelée"
 lepsius.190.d: "De quel site archéologique devons-nous rappeler notre équipe ?"
 lepsius.190.f: "Quelqu'un a dû calomnier Henry J., car, sans que ce soit de sa faute, il a été rappelé de son chantier de fouilles un matin."
 lepsius.190.g: "Haute Egypte"
 lepsius.190.h: "Basse Egypte"
 lepsius.190.i: "Babylonie"
 lepsius.190.j: "Assyrie"
 lepsius.190.k: "Argolide"
 lepsius.190.l: "Crète"
 lepsius.190.m: "Yucatán"
 lepsius.190.n: "Pérou"
 lepsius.190.o: "Continue."
 lepsius.901.t: "Tombeau de Toutankhamon"
 lepsius.901.d: "C'est une journée sensationnelle pour la science internationale. Nous avons fait une grande découverte : le tombeau de Toutankhamon a été découvert aujourd'hui par [ROOT.GetCountry.GetAdjectiveNoFlag] archéologues !"
 lepsius.901.f: "Lentement, désespérément lent, nous sembla-t-il tandis que nous regardions, les restes de débris de passage qui encombraient la partie inférieure de la porte furent enlevés, jusqu'à ce qu'enfin nous ayons toute la porte dégagée devant nous. Le moment décisif était arrivé. Les mains tremblantes, j'ai fait une petite brèche dans le coin supérieur gauche. L’obscurité et l’espace vide, aussi loin que pouvait atteindre une sonde de fer, montraient que tout ce qui se trouvait au-delà était vide et non rempli comme le passage que nous venions de dégager. Des tests de bougies ont été effectués par mesure de précaution contre d'éventuels gaz nauséabonds, puis, élargissant un peu le trou, j'ai inséré la bougie et j'ai regardé à l'intérieur. Au début, je ne pouvais rien voir, l'air chaud s'échappant de la chambre faisant vaciller la flamme de la bougie, mais bientôt, alors que mes yeux s'habituaient à la lumière, des détails de la pièce à l'intérieur émergeaient lentement de la brume, des animaux étranges, des statues et de l'or - partout un reflet d'or. Pour l'instant - cela a dû paraître une éternité aux autres personnes présentes - je suis resté muet d'étonnement, et lorsque mon collègue, incapable de supporter plus longtemps le suspense, m'a demandé avec anxiété : « Voyez-vous quelque chose ? c'était tout ce que je pouvais faire pour faire sortir les mots : « Oui, des choses merveilleuses »."
 lepsius.901.g: "Des choses merveilleuses, en effet."
 lepsius.902.d: "[SCOPE.sCountry('lepsius_tut_discoverer').GetName] a fait une grande découverte : le tombeau de Toutankhamon a été découvert aujourd'hui !"
 lepsius.902.f: ""
 lepsius.902.g: "Espérons que la malédiction du pharaon les frappe."
 lepsius.911.t: "Navire de Khéops"
 lepsius.911.d: "C'est une journée sensationnelle pour la science internationale. Nous avons fait une grande découverte : le navire de Khéops a été découvert aujourd'hui par [ROOT.GetCountry.GetAdjectiveNoFlag] archéologues !"
 lepsius.911.f: "Il respira profondément, ferma les yeux pour les habituer à la pénombre de ses fouilles puis les rouvrit lentement. D'une main ferme, il recommença à couper. Il a travaillé rapidement lorsque le boîtier a cédé et s'est effondré. Il a fait le trou suffisamment profond pour pouvoir tordre son corps dans une position différente vers le bas et a travaillé à seulement quelques centimètres de sa tête. Il a continué à couper et à couper. Le temps ne voulait rien dire. Il n'avait pas conscience d'être fatigué ni d'être allongé dans une position perpendiculaire. Il a sondé. Il a coupé. Soudain et miraculeusement, ses mains se retrouvèrent dans le néant. Il gisait comme en transe. Il ferma les yeux. Une odeur presque imperceptible s'insinua dans ses narines. Il ne pouvait pas définir de quoi il s'agissait. C'était presque doux. Ce ne pouvait pas être de l'encens. Ou était-ce? Était-ce peut-être l’odeur même de l’histoire ? Alors il a su. C'était du bois de cèdre ! Ses yeux n'étaient toujours pas ouverts. Il inspira profondément et détermina qu'il s'agissait bien de bois de cèdre. Il ressentait un sentiment d’épanouissement tel qu’il n’en avait jamais connu auparavant. Le bonheur le parcourut. Ses yeux étaient toujours fermés. Il murmura une prière de remerciement à Dieu. Son esprit interrogateur recommença à fonctionner. S'il sentait effectivement du bois de cèdre provenant d'un bateau solaire en contrebas, cela ne voulait pas dire que la fourmi blanche n'était pas occupée. Peut-être que le bois précieux avait été rongé par des hordes de fourmis blanches. \"C'est le bateau !\", a-t-il crié. « C'est le bateau ! »"
 lepsius.911.g: "Peut-il encore naviguer sur l'eau après plus de 4 000 ans ?"
 lepsius.912.d: "[SCOPE.sCountry('lepsius_ship_discoverer').GetName] a fait une grande découverte : la tombe du navire de Khéops a été découverte aujourd'hui !"
 lepsius.912.f: ""
 lepsius.912.g: "Certainement une partie importante de leur nouvelle flotte."
 lepsius.921.t: "Tour de Babylone"
 lepsius.921.d: "C'est une journée sensationnelle pour la science internationale. Nous avons fait une belle découverte : la Tour de Babel a été découverte aujourd'hui par [ROOT.GetCountry.GetAdjectiveNoFlag] archéologues !"
 lepsius.921.f: "Au-delà de cette crête s'étend une plaine assez considérable et remarquablement uniforme vers la colline d'Amran Ibn Ali, à travers laquelle passe en diagonale la route de notre village de Kweiresh à Hilleh. On l'appelle « Sachn », littéralement : le pan, mais dans le langage actuel, cela désigne l'espace libre entouré d'arcades qui entoure les grandes mosquées de pèlerinage, comme celle de Karbala ou de Nedschef. Mais notre \"Sachn\" n'est rien d'autre que l'apparence actuelle de l'ancienne enceinte sacrée, dans laquelle s'élevait le Zikurrat Etemenanki, la \"Pierre fondamentale du ciel et de la terre\", la tour de Babylone, entourée d'un mur d'enceinte auquel toutes sortes de bâtiments liés au culte. Nous ne connaissons pas toute la hauteur de la tour. Mais Nabupolassar, comme Nabuchodonosor, met un accent particulier sur eux dans son inscription sur cylindre d'Etemenanki. Le premier dit : « À cette époque, Mardouk m'ordonna... à la tour de Babylone, qui avait été affaiblie et renversée avant moi, de poser fermement ses fondations sur la poitrine des enfers, tandis que son sommet aspire au ciel. .'"
 lepsius.921.g: "La Bible n’avait donc pas tort après tout."
 lepsius.922.d: "[SCOPE.sCountry('lepsius_babylon_discoverer').GetName] a fait une grande découverte : la Tour de Babel a été découverte aujourd'hui !"
 lepsius.922.f: ""
 lepsius.922.g: "On ne peut que souhaiter qu'ils soient ensuite aussi confus que les constructeurs de la tour."
 lepsius.931.t: "Jardins de Sennachérib"
 lepsius.931.d: "C'est une journée sensationnelle pour la science internationale. Nous avons fait une belle découverte : les Jardins Suspendus ont été découverts aujourd'hui par [ROOT.GetCountry.GetAdjectiveNoFlag] archéologues !"
 lepsius.931.f: "Les jardins suspendus étaient-ils vraiment à Babylone ? Selon la dernière découverte, cette affirmation s’est avérée fausse. En effet, en comparant les sources historiques, nos archéologues les plus compétents ont constaté que très peu de sources placent les jardins légendaires à Babylone. De plus, ce sont les Assyriens, et non les Babyloniens, qui étaient connus pour leurs techniques de jardinage sophistiquées. Les reliefs témoignent de vastes jardins sur plusieurs étages. Une équipe d'archéologues a profité de cette occasion pour effectuer des fouilles expérimentales dans le grand palais du roi assyrien Sennachérib, dans une partie que l'on pensait peu explorée. Le constat est clair : la merveille perdue du monde se trouvait clairement à Ninive. Nos archéologues bénéficient donc non seulement de la découverte, mais aussi de la clarification d'un mystère qui dure depuis deux millénaires et demi."
 lepsius.931.g: "Cela signifie-t-il donc qu’il s’agissait en réalité des jardins suspendus de Ninive ?"
 lepsius.932.d: "[SCOPE.sCountry('lepsius_semiramis_discoverer').GetName] a fait une belle découverte : les Jardins Suspendus ont été découverts aujourd'hui !"
 lepsius.932.f: ""
 lepsius.932.g: "Il y a presque certainement une confusion ici."
 lepsius.941.t: "Trésors de Mycènes"
 lepsius.941.d: "C'est une journée sensationnelle pour la science internationale. Nous avons fait une grande découverte : les trésors de Mycènes ont été découverts aujourd'hui par [ROOT.GetCountry.GetAdjectiveNoFlag] archéologues !"
 lepsius.941.f: "L'excavation de loin la plus importante et la plus intéressante était celle située directement derrière la Porte du Lion. Lors de ses fouilles expérimentales en 1874, Schliemann avait déjà constaté que le rocher situé au point le plus bas du château était recouvert de décombres le plus profondément. Selon les paroles de Pausanias, il considérait comme probable que les tombes de la famille régnante se trouvaient à l'intérieur des murs du château et dut se souvenir de ces paroles lorsque, peu après le début des travaux, trois pierres tombales avec des reliefs anciens furent découvertes à une profondeur de 3 à 5 mètres. Lorsque les pierres ont été enlevées, dit Schliemann, il s'est avéré qu'elles ne se trouvaient pas sur le sol, comme on le pensait auparavant, mais sur la terre qui remplissait les puits enfoncés verticalement dans la roche pour faire les tombes. Ils ont creusé cinq de ces puits, et après avoir enlevé à une certaine profondeur les couches de pierre qui servaient d'autels après l'enterrement des victimes mortes, la hache a frappé le sol à environ 6 mètres de profondeur. Au fond gisaient quinze cadavres répartis dans les cinq tombes, ornées de riches, pour ainsi dire, fabuleux bijoux en or. Des masques d'or, imitant les traits des défunts, recouvraient le visage des hommes, des plaques d'or, richement décorées de spirales, couvraient leurs seins, les robes des femmes étaient chargées d'or."
 lepsius.941.g: "Agamemnon, c'est toi ?"
 lepsius.942.d: "[SCOPE.sCountry('lepsius_mycenae_discoverer').GetName] a fait une grande découverte : les trésors de Mycènes ont été découverts aujourd'hui !"
 lepsius.942.f: ""
 lepsius.942.g: "En cas de doute, ces escrocs y ont eux-mêmes caché ces « trésors »."
 lepsius.961.t: "L'héritage de Pakal"
 lepsius.961.d: "C'est une journée sensationnelle pour la science internationale. Nous avons fait une grande découverte : le tombeau et les trésors funéraires de Pakal ont été découverts aujourd'hui par les archéologues [ROOT.GetCountry.GetAdjectiveNoFlag] !"
 lepsius.961.f: "Ma première impression fut une mosaïque de vert, de rouge et de blanc. Ensuite, cela s'est résolu en détails - des ornements en jade vert, des dents et des os peints en rouge et des fragments de masque. Je contemplais le visage mortuaire de celui pour qui avait été bâtie toute cette œuvre prodigieuse - la crypte, la sculpture, l'escalier, la grande pyramide avec son temple couronné -, la dépouille mortelle d'un des plus grands hommes de Palenque ! Il s’agissait d’un sarcophage, le premier jamais découvert dans une pyramide maya !"
 lepsius.961.g: "Le tombeau de Toutankhamon d'Amérique du Sud !"
 lepsius.962.d: "[SCOPE.sCountry('lepsius_pakal_discoverer').GetName] a fait une grande découverte : le tombeau et les trésors funéraires de Pakal ont été découverts aujourd'hui !"
 lepsius.962.f: ""
 lepsius.962.g: "Le masque était plutôt hideux de toute façon."
 lepsius_local_excavation_modifier: "Fouilles locales"
 lepsius_local_excavation_state_modifier: "Fouilles locales"
 lepsius_local_excavation_cost_modifier: "Coût d'excavation locale"
 lepsius.1101.t: "Congrès Archéologique : L'Exode"
 lepsius.1101.d: "Notre nation a fait tous les préparatifs nécessaires pour organiser le prochain Congrès archéologique. L'accent sera mis sur le rôle de la Bible dans la recherche archéologique et antique. Des invitations seront envoyées à tous les grands archéologues du monde. Le Professeur [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] présidera la séance."
 lepsius.1101.f: "Dès l’époque romaine, le manque de sources sur l’Égypte ancienne signifiait que les écrits historiques étaient basés sur des sources secondaires telles qu’Hérodote. Le développement s'est poursuivi au Moyen Âge. La Bible a fourni des indices et a longtemps été considérée comme une source fiable pour l’histoire du Proche-Orient – ​​notamment parce qu’il n’existait tout simplement pas d’autres traditions. Avec le déchiffrement des hiéroglyphes et le début de l’égyptologie moderne, les partisans et les critiques de la Bible ont tenté de présenter la preuve que les récits bibliques étaient faux ou corrects. Avec le début de l’exploration de l’ancienne Babylonie, cette tendance s’est encore accentuée. Un exemple de controverse sur l’historicité des récits bibliques est l’Exode – le départ du peuple d’Israël d’Égypte – pour lequel il n’existe aucune preuve dans les sources égyptiennes."
 lepsius.1101.g: "Le monde archéologique devrait être notre invité."
 lepsius.1102.d: "[SCOPE.sCountry('lepsius_congress_host_country').GetName] a été invité à un congrès archéologique. Le thème sera l'historicité de la Bible à partir de l'exemple de l'Exode. Notre professeur archéologue [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] a reçu une chaleureuse invitation."
 lepsius.1102.g: "Toujours ces disputes pour savoir qui a les plus belles vestes en cuir..."
 lepsius.1103.t_laughed: "Le ridicule de la société archéologique"
 lepsius.1103.t_respected: "Une apparence confiante"
 lepsius.1103.t_lauded: "Admiration et félicitations"
 lepsius.1103.d_laughed: "L'apparition du professeur [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] a été accueillie avec amusement. [ROOT.GetCountry.GetNameNoFlag] n'a pas exactement la réputation d'avoir réalisé quelque chose d'exceptionnel dans le domaine de l'égyptologie. Il y avait clairement des blagues à huis clos."
 lepsius.1103.d_respected: "Avant le début du Congrès archéologique, notre archéologue a été chaleureusement accueilli et les coutumes habituelles ont été échangées. [ROOT.GetCountry.GetNameNoFlag] jouit d'une réputation reconnue dans le monde de la recherche."
 lepsius.1103.d_lauded: "L'arrivée du Professeur [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] a été accueillie avec une grande joie. Il est considéré comme l’un des invités les plus attendus. Une foule se forme rapidement autour de lui, car [ROOT.GetCountry.GetNameNoFlag] est considéré comme un pionnier dans le domaine de l'égyptologie."
 lepsius.1103.f_laughed: "'Pourquoi les archéologues [ROOT.GetCountry.GetAdjectiveNoFlag] ne trouvent-ils pas de filles ?\n\nParce qu'ils ont les pires techniques de rencontres !'"
 lepsius.1103.f_respected: "À son arrivée, le professeur [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] a eu quelques conversations agréables avec des collègues sur des ruines pour la plupart ennuyeuses qu'un non-scientifique aurait considérées comme des formations rocheuses encore plus ennuyeuses."
 lepsius.1103.f_lauded: "Le professeur [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] semblait presque dépassé par l'assaut. De nombreux collègues ont cherché à lui parler et ont voulu profiter de ses expéditions et de ses expériences. Certains l’ont même exhorté à donner une conférence privée."
 lepsius.1103.g: "Que c'est embarrassant!"
 lepsius.1103.h: "Enfin entre personnes partageant les mêmes idées."
 lepsius.1103.i: "Nous sommes une nation archéologique leader !"
 lepsius.1104.t: "L’Exode : mérite historique ou invention ?"
 lepsius.1104.d: "La conférence thématique s’est rapidement transformée en une question de principe. Au début, on voulait seulement discuter de l’exode biblique et des sources égyptiennes, mais cela s’est rapidement transformé en un débat sur la valeur de la Bible dans l’histoire et l’archéologie. Deux camps universitaires s’opposent désormais irrémédiablement."
 lepsius.1104.f: "[SCOPE.sCharacter('lepsius_bible_defender_scope').GetFullName] avait en fait voulu donner une conférence sur la culture de la mémoire du peuple israélien et le statut de l'exode lorsque [SCOPE.sCharacter('lepsius_bible_attacker_scope').GetFullName] posait la question provocatrice et justifiée de savoir si une telle déclaration n'était pas simplement une perte de temps - car en fin de compte, elle aurait Il reste à clarifier si la Bible peut être considérée comme une source, puisqu'il n'y avait aucune tradition archéologique qui parle de l'historicité de l'Exode. Il n’y avait également aucune tradition dans les textes aujourd’hui traduits. C’est pourquoi, en principe, ils devraient se demander si les cinq livres de Moïse sont réellement des histoires inventées et donc inutiles. « L'archéologie est une affaire de faits, pas de vérité », a-t-il conclu. [SCOPE.sCharacter('lepsius_bible_defender_scope').GetFullName] a répondu à ces accusations en disant qu'il ne fallait pas comprendre les textes bibliques comme des témoignages oculaires, mais plutôt comme une source secondaire sur des événements qui constituaient une pièce du puzzle de la culture de la mémoire ancienne. « Rejeter complètement la Bible est tout aussi absurde que d'en accepter chaque mot comme un fait historique. Il s'agit plutôt de poser les bonnes questions», a-t-il déclaré."
 lepsius.1104.g: "La Bible a une certaine valeur historique en tant que source secondaire."
 lepsius.1104.h: "La Bible n’a aucune valeur historique."
 lepsius.1105.t: "Archéologues entre eux"
 lepsius.1105.d: "En marge du congrès archéologique en cours, notre archéologue s'est lié d'amitié avec un collègue étranger et a échangé des idées."
 lepsius.1105.f: "Le congrès durait depuis plusieurs jours et, au début, le professeur [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] n'avait le temps de parler avec un collègue jusqu'alors inconnu que pendant les pauses. La réunion a été suivie d'un repas ensemble, et plus les scientifiques parlaient entre eux, plus ils en apprenaient les uns sur les autres - et les uns des autres. Il s’avère que [SCOPE.sCharacter('lepsius_foreign_archaeologist_scope').GetFullName] est une personne possédant une riche expérience."
 lepsius.1105.g: "Encore un ami de l'archéologie !"
 lepsius.1106.t: "L'artefact d'un négociateur"
 lepsius.1106.d: "Le négociateur d'un antiquaire a assisté au congrès archéologique du [SCOPE.sCountry('lepsius_congress_host_country').GetName]. Il tente de vendre un artefact à un musée intéressé au nom d'un aristocrate secret. Pour l'instant, il n'a pas trouvé de client."
 lepsius.1106.f: "Le professeur [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] a pu se convaincre de l'authenticité de l'artefact. Mais compte tenu du prix élevé, il hésite à acheter et attend un engagement du capital avant d'agir."
 lepsius.1106.g: "Cher mais précieux."
 lepsius.1106.h: "Pas assez précieux."
 lepsius.1107.t: "Discussion amicale"
 lepsius.1107.d: "En marge du Congrès archéologique du [SCOPE.sCountry('lepsius_congress_host_country').GetName], notre archéologue a présenté le [ROOT.GetCountry.GetNameNoFlag] sous un jour très positif lors d'une conversation avec plusieurs collègues."
 lepsius.1107.f: "On ne sait pas exactement ce que le professeur [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] a dit, mais apparemment, il a touché une corde sensible chez les autres archéologues. Ils répandront sûrement cette impression positive dans leur pays d’origine."
 lepsius.1107.g: "Améliorons nos relations."
 lepsius.1107.h: "Améliorons notre réputation."
 lepsius.1108.t: "Un assistant"
 lepsius.1108.d: "Un jeune homme en herbe qui voulait entrer au Congrès archéologique mais qui en a été empêché par les gardiens de la porte attire l'attention du professeur [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName]."
 lepsius.1108.f: "Bien sûr, l'étudiant n'a pas été autorisé à entrer dans la salle avec la compagnie choisie d'archéologues internationaux, mais sa persévérance a tellement impressionné [SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName] qu'il a voulu mieux connaître le jeune homme. Il s’est avéré qu’il avait accumulé une richesse de connaissances pour son époque, tant en langues anciennes qu’en géographie. Au bout de quelques heures seulement, le professeur a décidé d'en faire son assistant après le congrès dans l'espoir qu'il puisse bientôt enrichir le monde académique."
 lepsius.1108.g: "Nous nous attendons à une carrière universitaire."
 lepsius.1109.t_merit: "L'Exode : plus qu'une histoire"
 lepsius.1109.t_invention: "L’Exode : une fiction, pas un fait"
 lepsius.1109.d_merit: "Après de nombreuses rencontres, débats et débats, le Congrès archéologique a pris fin et une déclaration finale a été rédigée. En conséquence, la Bible n’est pas une source historique primaire, mais elle a néanmoins une valeur historique à certains égards, même si elle n’est pas directement applicable à l’Égypte et à Babylone."
 lepsius.1109.d_invention: "Après de nombreuses rencontres, débats et débats, le Congrès archéologique a pris fin et une déclaration finale a été rédigée. En conséquence, la Bible n’a aucune valeur pour l’archéologie ou l’histoire. Il s’agit plutôt d’une série d’inventions qui constituent plus un obstacle qu’une aide à l’étude de l’Antiquité."
 lepsius.1109.f_merit: "Un groupe plus restreint d’archéologues considérait la déclaration comme un compromis, mais d’autres la reconnaissaient comme une approche plus nuancée du passé allant au-delà des positions absolues. Malgré une référence directe à l’Exode, certains archéologues ont souligné un passage récemment découvert du pharaon Merenptah qui mentionnait la dévastation subie par le peuple d’Israël. Un autre groupe a souligné que, selon le portail Bubastis traduit par Champollion, le pharaon Shishak avait en réalité pillé Jérusalem. Tout cela indique qu’il est moins important d’utiliser le livre littéralement, mais de le considérer comme une pièce du puzzle dans la recherche sur l’histoire ancienne. Des interprétations erronées sont inévitables, mais cela s’applique à tous les domaines scientifiques."
 lepsius.1109.f_invention: "En fin de compte, le groupe des sceptiques a réussi à l’emporter avec ses revendications maximales. Désormais, les récits bibliques ne devraient plus avoir de valeur que, par exemple, les légendes sur les 7 rois de Rome ou les récits mythiques grecs - la place prépondérante de la Bible avait alors pris fin dans le monde occidental, du moins dans cette zone. Les références désespérées aux coïncidences entre les découvertes archéologiques et les passages bibliques ont été reconnues pour ce qu'elles étaient : des coïncidences. La question de savoir que faire de la Bible relevait donc simplement de la littérature. Certains archéologues ont également évoqué la possibilité que les récits bibliques aient tout au plus été copiés à partir d’histoires égyptiennes ou de mythes babyloniens. Il ne s’agirait ici que de l’investigation nécessaire de la dépendance. Sinon, l’affaire était close pour l’archéologie et l’histoire : la Bible était en grande partie un recueil d’histoires inventées sans valeur pour la science."
 lepsius.1109.g: "Il faut classer et interpréter correctement les textes."
 lepsius.1109.h: "La Bible est un livre d'histoires inutile."
 lepsius.1109.i: "Nous le savions déjà auparavant."
 lepsius.1111.t: "Congrès archéologique : L'essor de la civilisation"
 lepsius.1111.d: "Notre nation a fait tous les préparatifs nécessaires pour organiser le prochain Congrès archéologique. L’accent sera mis sur la question de savoir où la civilisation est apparue pour la première fois. Selon les dernières informations, il s'agit probablement de Babylonie. Cela soulève en outre la question de savoir dans quelle mesure la culture babylonienne a influencé d’autres cultures. Des invitations seront envoyées à tous les grands archéologues du monde. Le Professeur [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] présidera la séance."
 lepsius.1111.f: "La connaissance de l'existence d'une civilisation babylonienne n'a jamais été complètement perdue - même à l'époque des Grecs, il existait des informations sur les Babyloniens et les Assyriens. Cependant, le décodage de l’akkadien a révélé qu’il existait des cultures beaucoup plus anciennes, comme celle des Sumériens, dont l’histoire éclipsait même celle des Égyptiens en termes d’âge. Toute une série d’inventions typiques de la civilisation ont façonné la vie quotidienne de ces peuples anciens, et de nombreux philologues et archéologues ont vite soupçonné que Babylone était le véritable berceau de la civilisation. La fascination pour l'ancienne Mésopotamie conduisit bientôt à faire remonter toutes les zones de civilisation à Babylone : non seulement la Bible, mais aussi les cultures du Levant et de Perse, et même les Égyptiens, n'étaient que de simples « destinataires culturels » ou « transmetteurs culturels ». ' de la culture babylonienne originelle. Cette étroitesse scientifique acquit bientôt un nom moqueur que ses adeptes se servaient eux-mêmes : Panbabylonisme."
 lepsius.1111.g: "Le monde archéologique devrait être notre invité."
 lepsius.1112.d: "[SCOPE.sCountry('lepsius_congress_host_country').GetName] a été invité à un congrès archéologique. L’accent sera mis sur la question de savoir où la civilisation est apparue pour la première fois. Selon les dernières informations, il s'agit probablement de Babylonie. Cela soulève en outre la question de savoir dans quelle mesure la culture babylonienne a influencé d’autres cultures. Notre professeur archéologue [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] a reçu une chaleureuse invitation."
 lepsius.1112.g: "Toujours ces disputes pour savoir qui a les plus belles vestes en cuir..."
 lepsius.1113.d_laughed: "L'apparition du professeur [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] a été accueillie avec amusement. [ROOT.GetCountry.GetNameNoFlag] n'a pas exactement la réputation d'avoir réalisé quelque chose d'exceptionnel dans le domaine de l'assyriologie. Il y avait clairement des blagues à huis clos."
 lepsius.1113.d_respected: "Avant le début du Congrès archéologique, notre archéologue a été chaleureusement accueilli et les coutumes habituelles ont été échangées. [ROOT.GetCountry.GetNameNoFlag] jouit d'une réputation reconnue dans le monde de la recherche."
 lepsius.1113.d_lauded: "L'arrivée du Professeur [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] a été accueillie avec une grande joie. Il est considéré comme l’un des invités les plus attendus. Une foule se forme rapidement autour de lui, car [ROOT.GetCountry.GetNameNoFlag] est considéré comme un pionnier dans le domaine de l'assyriologie."
 lepsius.1114.t: "Babylone : le berceau de la civilisation ?"
 lepsius.1114.d: "Au cours du congrès, la question de l'origine de la civilisation s'est progressivement développée pour devenir la question de savoir si et dans quelle mesure Babylone a influencé toutes les cultures du Moyen-Orient et de la Méditerranée orientale. Certains supposent que presque toutes les idées qui ont joué un rôle plus tard ont été conçues dans l’ancienne Babylone !"
 lepsius.1114.f: "Le professeur [SCOPE.sCharacter('lepsius_babylon_defender_scope').GetLastName] a commencé par une contribution très intéressante sur les réalisations culturelles et le haut niveau de connaissances babyloniennes il y a plus de 4 000 ans : « Le monde culturel suméro-babylonien présuppose une théorie du monde selon laquelle toutes les organisations étatiques et sociales étaient réglementées. Toutes les sciences et tous les arts remontent à une sagesse primordiale révélée par le ciel, selon laquelle la propriété est gérée et protégée. Le panbabylonisme vise à prouver que cette vision astrale du monde a laissé sa marque sur toutes les cultures et religions du monde. Mais ce point de vue a suscité une forte opposition de la part de nombreux universitaires, dont le porte-parole s'est rapidement révélé être [SCOPE.sCharacter('lepsius_babylon_attacker_scope').GetFullName]. Il rejetait l’idée selon laquelle tous les mythes provenaient des Babyloniens. « Ce que [SCOPE.sCharacter('lepsius_babylon_defender_scope').GetLastName] a dit étaient plus des constructions que des faits. L'idée selon laquelle il ne pourrait y avoir de développements parallèles est farfelue : les hiéroglyphes égyptiens, par exemple, ne sont pas inspirés du cunéiforme. Et tandis que les panbabylonistes essayaient de créer une priorité qui reléguait la Mésopotamie au centre et toutes les autres mythologies à la périphérie, ils ont complètement négligé le fait que les cultures peuvent vivre sur un spectre commun."
 lepsius.1114.g: "Babylone est le berceau de la civilisation."
 lepsius.1114.h: "La civilisation est née en plusieurs endroits."
 lepsius.1119.t_panbabylonism: "Naissance de la civilisation : le panbabylonisme triomphe"
 lepsius.1119.t_antipanbabylonism: "Naissance de la civilisation : le panbabylonisme réfuté"
 lepsius.1119.d_panbabylonism: "Après un débat passionné qui a donné lieu à des divisions entre de nombreux universitaires, le congrès a pu se mettre d'accord sur une déclaration finale. La Mésopotamie n’est donc pas seulement le berceau de la civilisation, mais aussi le point de départ de toutes les idées mythologiques du Moyen-Orient."
 lepsius.1119.d_antipanbabylonism: "Les batailles sont terminées, et après de vives disputes verbales, les savants ont pu se ressaisir et signer une déclaration finale qui a scellé la défaite finale du camp panbabylonien. Il est vrai que la Mésopotamie était reconnue comme l’un des berceaux les plus importants de la civilisation ; mais pas le seul. La tentative de faire remonter chaque mythologie aux Babyloniens a été étouffée dans l’œuf."
 lepsius.1119.f_panbabylonism: "La déclaration finale confirmait toutes les théories avancées par les partisans panbabyloniens : la dépendance de la mythologie et de la littérature orientales à l'égard de la culture babylonienne était évidente. La Bible et les mythes égyptiens dépendent évidemment d’idées babyloniennes bien connues, telles que celles trouvées dans l’épopée de Gilgamesh. En dernière analyse, tout le développement du Moyen-Orient a été culturellement fortement influencé par l’astronomie et l’astrologie de cette culture originelle, dont les idées étaient tantôt plus, tantôt moins évidentes."
 lepsius.1119.f_antipanbabylonism: "Les partisans du panbabylonisme se sont récemment retrouvés en minorité. Les universitaires ont reconnu que bon nombre des réalisations des cultures mésopotamiennes faisaient partie du cœur de la structure intellectuelle du Moyen-Orient. Cependant, dans la déclaration finale, les scientifiques ont rejeté la prétention à l'absolu, voire même la prétention à une « culture originale ». La recherche astronomique, qui était considérée comme le point de départ de la pensée babylonienne, a été présentée comme un développement ultérieur mal placé au début. Les universitaires n'ont pas non plus pu reconnaître une priorité de la tradition babylonienne : il s'est plutôt avéré que les différentes histoires « babyloniennes » étaient en fait un héritage commun de traditions de la région que les Babyloniens ont en fait écrites en premier. Une phrase ressort particulièrement amère, qualifiant sommairement le panbabylonisme de pseudoscience : « Cette sagesse mystique n'a pas plus de signification scientifique que la « révélation originelle » de toutes les dimensions du monde dans la grande pyramide, qui malheureusement trouve encore des adeptes."
 lepsius.1119.g: "Tout a commencé en Mésopotamie."
 lepsius.1119.h: "Il n’y a pas qu’une seule origine."
 lepsius.1121.t: "Congrès archéologique : Le statut de Troie"
 lepsius.1121.d: "Notre nation a fait tous les préparatifs nécessaires pour organiser le prochain Congrès archéologique. La conférence vise à résoudre définitivement la question de Troie. Malgré les fouilles spectaculaires d'Heinrich Schliemann, la question est tout à fait justifiée de savoir ce qu'Heinrich Schliemann a réellement trouvé, s'il s'agissait réellement de Troie et si Troie a même existé sous cette forme. Des invitations seront envoyées à tous les grands archéologues du monde. Le Professeur [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] présidera la séance."
 lepsius.1121.f: "Après que Schliemann eut annoncé la découverte de Troie, il fallut un certain temps aux esprits les plus sceptiques pour surmonter leur état de choc. Des inspections ultérieures ont révélé non seulement que Schliemann avait creusé dans la mauvaise couche, mais également que le prétendu « trésor de Priam » qu'il avait trouvé était beaucoup plus ancien que Troie homérique. Une rumeur se répandit bientôt selon laquelle Schliemann aurait pu fouiller la mauvaise ville. D'autres ont insisté sur le fait qu'on ne pouvait rien déterrer qui n'existait pas. D'autres encore défendirent la découverte de Schliemann et considérèrent que la preuve en était apportée, car Schliemann s'était basé sur des descriptions anciennes. Les découvertes romaines ont également prouvé que les Grecs et les Romains considéraient également cet endroit comme le site de la guerre de Troie. La découverte de Troie n’a pas mis fin au débat scientifique, mais a seulement marqué une nouvelle phase."
 lepsius.1121.g: "Le monde archéologique devrait être notre invité."
 lepsius.1122.d: "[SCOPE.sCountry('lepsius_congress_host_country').GetName] a été invité à un congrès archéologique. La conférence vise à résoudre définitivement la question de Troie. Malgré les fouilles spectaculaires d'Heinrich Schliemann, la question est tout à fait justifiée de savoir ce qu'Heinrich Schliemann a réellement trouvé, s'il s'agissait réellement de Troie et si Troie a même existé sous cette forme. Notre professeur archéologue [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] a reçu une chaleureuse invitation."
 lepsius.1122.g: "Toujours ces disputes pour savoir qui a les plus belles vestes en cuir..."
 lepsius.1123.d_laughed: "L'apparition du professeur [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] a été accueillie avec amusement. [ROOT.GetCountry.GetNameNoFlag] n'a pas exactement la réputation d'avoir réalisé quelque chose d'exceptionnel dans le domaine de l'archéologie égéenne. Il y avait clairement des blagues à huis clos."
 lepsius.1123.d_respected: "Avant le début du Congrès archéologique, notre archéologue a été chaleureusement accueilli et les coutumes habituelles ont été échangées. [ROOT.GetCountry.GetNameNoFlag] jouit d'une réputation reconnue dans le monde de la recherche."
 lepsius.1123.d_lauded: "L'arrivée du Professeur [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] a été accueillie avec une grande joie. Il est considéré comme l’un des invités les plus attendus. Une foule s'est rapidement formée autour de lui, car [ROOT.GetCountry.GetNameNoFlag] est considéré comme un pionnier dans le domaine de l'archéologie égéenne."
 lepsius.1124.t: "Troie : Juste un mythe ?"
 lepsius.1124.d: "Le débat sur le statut de Troie est encore plus controversé que prévu. Non pas deux, mais trois camps ont émergé. Le premier groupe est constitué de partisans passionnés de Schliemann, totalement convaincus que toutes les thèses qu'il a avancées sont correctes. À cela s'oppose un camp opposé irréconciliable qui ne voit que de très maigres preuves qu'Homère Troie a quelque chose à voir avec le chantier de fouilles de Schliemann. Un troisième groupe estime que Schliemann a commis de graves erreurs, mais que c'était en fait la ville qu'il recherchait."
 lepsius.1124.f: "« Si Schliemann n'a pas trouvé Troie, alors qu'a-t-il trouvé ? Il trouve un lieu qui correspond aux descriptions de l'Iliade et des auteurs anciens. Il trouve une structure qui lui convient cette fois. Et nous trouvons une structure qui semble avoir été détruite par les ennemis. Combien de preuves supplémentaires sont nécessaires ? Le professeur [SCOPE.sCharacter('lepsius_troy_defender_scope').GetLastName] a commencé son cours, mais a ensuite été interrompu par de nombreuses questions de son collègue [SCOPE.sCharacter('lepsius_troy_attacker_scope').GetLastName]. Par exemple, les anciens Grecs ne savaient plus où se trouvait Troie à l’époque classique et avaient déjà identifié à tort cet endroit avec Troie. Que le nom de la ville est inconnu et qu’il n’y a aucune idée de son lien avec le monde grec. Et qu’il n’y a jamais eu de sources historiques fiables sur une guerre de Troie sous quelque forme que ce soit qui ressemble aux descriptions d’Homère. Ensuite, M. [SCOPE.sCharacter('lepsius_troy_mediator_scope').GetLastName] est intervenu : \"Chers collègues, Schliemann a certainement commis des erreurs - mais voulons-nous perdre de vue la situation dans son ensemble ?\""
 lepsius.1124.g: "Schliemann a trouvé Troie."
 lepsius.1124.h: "Schliemann a bel et bien trouvé « Troie », mais l'affaire est plus compliquée."
 lepsius.1124.i: "Il n’y a aucune preuve réelle qu’il s’agisse réellement de Troie."
 lepsius.1129.t_homeric: "Troie : l'histoire, pas le mythe"
 lepsius.1129.t_historical: "Troie : histoire et mythe"
 lepsius.1129.t_myth: "Troie : un mythe, pas une histoire"
 lepsius.1129.t_disputed: "Troie : un mystère non résolu"
 lepsius.1129.d_homeric: "Après des débats intenses et de nombreuses conférences, le camp des partisans de Schliemann, qui reconnurent l'Ilion homérique sur la colline d'Hisarlik, parvint à l'emporter. Non seulement l’historicité de Troie, mais aussi la guerre de Troie et d’autres éléments des épopées homériques sont reconnus comme réalité historique."
 lepsius.1129.d_historical: "Les archéologues réunis au congrès du [SCOPE.sCountry('lepsius_congress_host_country').GetName] sont arrivés à la conclusion qu'au moins certaines parties de la tradition homérique contiennent un noyau de vérité. Même si Schliemann s'est trompé lors des fouilles, certaines preuves suggèrent qu'Hisarlik correspond au lieu généralement reconnu comme Troie dans la littérature et l'historiographie - le reste est une question de clarification des détails."
 lepsius.1129.d_myth: "Le Congrès est arrivé à la conclusion que le débat sur Troie, après des siècles, était terminé : la prétendue découverte de Troie a renforcé les critiques, qui soupçonnent encore plus fortement que les épopées homériques sont de pure fiction. Quoi que Schliemann ait découvert, il ne peut pas s’agir de Troie car elle n’a jamais existé."
 lepsius.1129.d_disputed: "La guerre de tranchées entre universitaires a récemment conduit à une grande désillusion et à une grande apathie. Il n’y a aucune solution en vue à la question de Troie – ils n’ont même pas réussi à se mettre d’accord sur une déclaration finale commune. Certains représentants sont partis plus tôt, d'autres ont perdu leur temps avec d'autres discussions inutiles."
 lepsius.1129.f_homeric: "Les partisans de Schliemann célèbrent aujourd'hui un grand triomphe : ils ont envoyé avec enthousiasme un télégramme au découvreur de Troie pour lui annoncer que toutes ses thèses seraient confirmées et qu'il serait même nommé membre honoraire de la société. Il fouilla définitivement Troie et apporta ainsi la preuve que la guerre de Troie des épopées homériques n'était pas une invention, ni un vague souvenir, mais un événement historique. Il est désormais encore plus important de rechercher dans la région égéenne d'autres artefacts susceptibles de fournir encore plus d'informations sur une époque autrefois déguisée en « mythique ». L'enthousiasme des chercheurs devrait garantir que des fouilles plus intensives auront bientôt lieu pour étayer les thèses de Schliemann : peut-être seront-ils bientôt retrouvés la maison d'Ulysse, le tombeau d'Achille ou la baignoire dans laquelle Agamemnon a été tué ? Il est surprenant que Schliemann n'ait pas encore répondu au télégramme..."
 lepsius.1129.f_historical: "Après de longues discussions et beaucoup de persuasion, il a été possible de parvenir à un compromis entre la plupart des membres du Congrès. La grande majorité de l'assemblée archéologique internationale est d'avis que Schliemann a commis de graves erreurs lors des fouilles de Troie - entre autres choses, il est clair qu'il a fouillé dans la mauvaise couche de fouilles. Cependant, cela signifie simplement que Schliemann a trouvé le « mauvais » Troie au « bon » endroit. Une autre couche pourrait en réalité contenir la ville qui remonte à l’époque de la guerre de Troie. Les archéologues n’ont finalement pas pu déterminer s’il s’agissait d’un véritable événement historique ; Le fait est que la colline sur laquelle se trouve Troie a été plusieurs fois victime d’incendies et de guerres. En ce qui concerne l'identité de la ville, la thèse d'une influence hittite se confirme. Les scientifiques ont annoncé qu'ils utiliseraient ces résultats comme une opportunité pour approfondir leurs recherches et qu'ils continueraient à discuter intensivement de la question de Troie."
 lepsius.1129.f_myth: "Après de sérieuses disputes, les archéologues et les historiens, certains avec des grognements au ventre, ont pu se résoudre à signer une déclaration commune. En conséquence, ils considèrent les épopées homériques uniquement comme des produits littéraires qui font éventuellement référence à des événements plus anciens, mais qui sont difficiles à reconstituer pour l'archéologie moderne. Il se pourrait plutôt que la guerre de Troie soit considérée comme une « guerre en tant que telle » dans laquelle se reflète l’expérience humaine globale. Troie pourrait donc avoir à peu près autant de contenu historique que l’Atlantide : une sorte d’utopie, un lieu littéraire où s’affrontent les idées. En principe, le congrès a déclaré que la recherche sur Troie était une activité « en marge de la pseudoscience », à la fois inutile et sans but. L'archéologie devrait s'orienter vers des domaines plus intéressants."
 lepsius.1129.f_disputed: "« Eh bien, au moins, la nourriture était bonne ! »"
 lepsius.1129.g: "Schliemann a donc trouvé Troie !"
 lepsius.1129.h: "Schliemann a déterré le mauvais Troie, mais l'emplacement est correct."
 lepsius.1129.i: "Troie est très probablement de la pure littérature."
 lepsius.1129.j: "Tout ce congrès a été une perte de temps totale !"
 lepsius.1201.t: "Site de fouilles locales au [SCOPE.sState('lepsius_excavation_site').GetName]"
 lepsius.1201.d: "[SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName] a identifié un nouveau site de fouille au [SCOPE.sState('lepsius_excavation_site').GetName]. Lui et son équipe se sont immédiatement mis au travail. Cependant, on ne sait pas encore combien de temps les fouilles seront financées."
 lepsius.1201.f: "Une fouille peut être autorisée pour 5, 7 ou 10 ans. Contrairement à une fouille se déroulant à l’étranger, celle-ci ne peut être annulée à aucun moment. L'archéologue principal restera sur le chantier de fouille pendant 6, 12 ou 18 mois, selon la durée, jusqu'à son retour. Il n'est pas disponible pendant cette période."
 lepsius.1201.g: "10 années."
 lepsius.1201.h: "7 ans."
 lepsius.1201.i: "5 années."
 lepsius.1202.t: "Le professeur [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] revient du site d'excavation"
 lepsius.1202.d: "[SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName] a contribué à la mise en place du site de fouilles archéologiques de [SCOPE.sState('lepsius_excavation_site').GetName] au cours des derniers mois et a fait quelques premières découvertes. Il retourne à son université pour une évaluation, tandis que l'équipe poursuit les fouilles de manière indépendante pendant les prochaines années jusqu'à épuisement des fonds."
 lepsius.1202.f: "« Dans peu de types de travaux, les résultats dépendent aussi directement de la personnalité de l'ouvrier que dans le cas des fouilles. Le vieil adage selon lequel un homme trouve ce qu’il cherche dans un sujet est trop vrai ; ou s'il n'a pas assez de perspicacité pour être sûr de trouver ce qu'il cherche, il est du moins malheureusement vrai qu'il ne trouve rien qu'il ne cherche. -Flinders Petrie"
 lepsius.1202.g: "Content de te revoir."
 lepsius.1203.t: "Fouilles locales terminées"
 lepsius.1203.d: "L'équipe de fouille a terminé les fouilles locales et rangé quelques dernières découvertes. Il est désormais à nouveau disponible pour d'autres fouilles ou expéditions."
 lepsius.1203.f: "'Dunkel sind des Schicksals Wege,\nungewiß der Zukunft Stern,\neh ich mich zu Bette lege,\ntrink ich einen Kognak gern.' -Robert Koldewey"
 lepsius.1203.g: "Nous devrions bientôt faire une autre fouille."
 lepsius.2000.t: "[SCOPE.sCharacter('lepsius_new_archaeologist_scope').GetLastName] invente le système des trois âges"
 lepsius.2000.d: "Le directeur du Musée national du Danemark, [SCOPE.sCharacter('lepsius_new_archaeologist_scope').GetFullName], a inventé un système pour classer les découvertes archéologiques dans les trois périodes #b Âge de pierre#!, #b Âge du bronze#! et #b Âge du fer#!. C'est révolutionnaire pour l'archéologie !"
 lepsius.2000.f: "\"Vous voyez, certains artefacts apparaissent toujours ensemble et certains matériaux n'apparaissent jamais dans la même fouille. L'argent, par exemple, ne se trouve que là où se trouvent également des outils et des armes en fer. L'or, en revanche, peut être trouvé avec du fer et du bronze. outils.\nIl est également fascinant que certains matériaux n'apparaissent que dans certaines formes de tombes. Les outils en pierre ne peuvent être trouvés que dans les cadavres non incinérés et les tombes à chambre en pierre. Le fer se trouve dans les tombes à chambre dans les tumulus.\nTout cela nous permet de dater nos découvertes de manière beaucoup plus précise. Il y a d'abord eu des outils en pierre, puis il y a eu des outils en bronze et seulement ensuite il y a eu des outils en fer.\""
 lepsius.2000.g: "Un si grand esprit doit travailler pour nous !"
 lepsius.2000.h: "Il peut rester dans son musée..."
