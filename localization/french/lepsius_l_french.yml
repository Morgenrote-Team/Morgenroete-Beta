 je_lepsius_archaeological_default_project_reason: "[ROOT.GetCountry.GetCustom('je_lepsius_archaeological_default_project_active_type')]A [concept_lepsius_archaeologist] who is not busy will work on various Archaeological Projects in their country. Archaeologists who conduct local excavations for extended periods can acquire the #V $lepsius_local_specialist$#! [concept_character_trait]. Every year of work will result in one [concept_lepsius_artifact].\n$mr_divider_for_je$\nYou could gain these types of [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')]:[ROOT.GetCountry.GetCustom('je_lepsius_archaeological_default_project_egyptian_artifacts_possible_type')][ROOT.GetCountry.GetCustom('je_lepsius_archaeological_default_project_mesopotamian_artifacts_possible_type')][ROOT.GetCountry.GetCustom('je_lepsius_archaeological_default_project_aegean_artifacts_possible_type')][ROOT.GetCountry.GetCustom('je_lepsius_archaeological_default_project_precolumbian_artifacts_possible_type')]\n- @lepsius_local_minor! Minor #V Local Artifacts#!\n\n$mr_divider_for_je$\nIn addition to this annual artifact, archaeologists may find additional @lepsius_local_minor! Minor #V Local Artifacts#! per year, depending on the following factors:\n[ROOT.GetCountry.GetCustom('je_lepsius_archaeological_default_project_early_archaeology_type')][ROOT.GetCountry.GetCustom('je_lepsius_archaeological_default_project_modern_archaeology_type')][ROOT.GetCountry.GetCustom('je_lepsius_archaeological_default_project_minor_site_type')][ROOT.GetCountry.GetCustom('je_lepsius_archaeological_default_project_local_archaeologist_trait_type')]\n\n$mr_divider_for_je$\nArchaeologists which have the $lepsius_archaeologist_famous$ and the $lepsius_local_specialist$ [concept_character_trait] may also find @lepsius_local_major! Major #V Local Artifacts#!."
