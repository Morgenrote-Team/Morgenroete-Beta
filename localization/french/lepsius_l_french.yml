 lepsius.12.d: "Cette section comprend des artefacts de Haute et Basse Égypte."
 lepsius.12.g: "Organisez une petite exposition."
 lepsius.12.h: "Organisez une exposition de taille moyenne."
 lepsius.12.i: "Organisez une grande exposition."
 lepsius.12.j: "Organisez une excellente exposition."
