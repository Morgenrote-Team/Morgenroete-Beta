 lepsius.5000.t: "Les ruines de Palmyre"
 lepsius.5000.d: "Notre pays abrite les ruines de l'ancienne cité de Palmyre. Nos archéologues sont impatients de commencer à fouiller le site et d'en apprendre le plus possible."
 lepsius.5000.f: "Palmyre est une ancienne cité syrienne qui a existé pendant des siècles. La ville était bien connue pour ses marchands. Les riches marchands ont construit de nombreux monuments qui ont survécu au temps. En conséquence, de nombreux bâtiments anciens ont subi des modifications, une situation difficile pour les archéologues.\nLa ville est célèbre non seulement pour ses marchands, mais aussi pour Zénobie, reine de l'éphémère empire de Palmyre. Elle a pris le contrôle de l'est de l'empire romain pendant un certain temps jusqu'à ce que l'empereur Aurélien reconquière l'est et détruise la ville de Palmyre."
 lepsius.5000.g: "Je me demande ce que nous allons trouver !"
 lepsius.5001.t: "Le temple de Bel restauré"
 lepsius.5001.d: "Nos archéologues ont travaillé sans relâche pour restaurer le Temple de Bel. Il a fallu supprimer les ajouts et les modifications datant de la période musulmane de la ville et dégager les parties enfouies de l'édifice."
 lepsius.5001.f: "Le Tell ou colline sur lequel le temple a été construit était déjà utilisé par les humains dès 3000 avant J.-C., comme l'a révélé notre analyse stratigraphique. Le temple que nous avons reconstruit autant que possible est un temple romain, datant de la fin du premier et de la première moitié du deuxième siècle après J.-C.\nPlus tard, le temple a été transformé en église chrétienne et une fois que les Arabes ont conquis la région, il est devenu une mosquée.\n\n#V Aujourd'hui :#! Malheureusement, le temple de Bel a été détruit par l'EI en 2015. Il existe cependant des plans pour reconstruire le temple avec les parties qui existent encore."
 lepsius.5001.g: "Je me demande ce que nous allons trouver !"
 lepsius.5002.t: "La Vallée des Tombes fouillée"
 lepsius.5002.d: "Il existe de nombreux tombeaux à l'ouest de Palmyre. Ils abritent d'impressionnantes tours funéraires que nos archéologues ont fouillées et en partie restaurées."
 lepsius.5002.f: "La nécropole appelée Vallée des Tombeaux abrite de nombreuses tours-tombeaux. La plus ancienne remonte à 9 av. J.-C. et s'appelle Tour d'Atenaton. Une autre tour, la tour d'Elahbel, fut construite sous le règne de l'empereur Trajan par l'aristocrate palmyrénien Marcus Ulpius Elahbelus. Elahbelus semble être devenu citoyen romain lorsque l'empereur Trajan était au pouvoir car ils partagent leur prénom et leur deuxième nom.\nUne autre découverte intéressante sont des fragments de soie qui ont probablement été apportés de Chine.\n\n#V Aujourd'hui :#! De nombreuses tombes ont été détruites lorsque l'EI a pris le contrôle de Palmyre. Parmi elles se trouvaient la tour d'Elahbel et la tour de Jamblique."
 lepsius.5002.g: "Impressionnant!"
 lepsius.5003.t: "Palmyre – La cité des palmiers"
 lepsius.5003.d: "Nos archéologues ont passé de nombreuses années à déterrer les vestiges de Palmyre et à reconstruire ce qui était possible. Aujourd'hui, cette ville autrefois prospère est à nouveau un endroit qui mérite d'être visité."
 lepsius.5003.f: "Les ruines de Palmyre attirent à nouveau les visiteurs. Beaucoup de gens veulent voir les ruines de la ville autrefois grande qui a même conquis Rome mais a perdu. Les majestueuses tours funéraires, la grande colonnade, le temple de Bel et le temple de Baalshamin témoignent tous de la grande richesse de la ville. Cela devait être un spectacle fantastique lorsque la Cité des palmiers était à son apogée !"
 lepsius.5003.g: "Un endroit merveilleux à visiter !"
