 je_ishtar_gate: "Reconstruction de la porte d'Ishtar"
 je_ishtar_gate_reason: "Après qu'une expédition en Babylonie ait permis de récupérer les restes de la légendaire porte d'Ishtar, nous avons prolongé notre permis de fouille pour que les briques babyloniennes soient expédiées à notre musée."
 je_ishtar_gate_success: "Au total, 200 000 briques sont nécessaires pour redonner à la porte son lustre d'antan. Environ 20 000 briques devraient nous parvenir chaque année, si aucun problème ne survient."
 je_ishtar_gate_goal: ""
 je_lepsius_priams_treasure: "Le trésor de Priam"
 je_lepsius_priams_treasure_reason: "Heinrich Schliemann cherche un endroit approprié pour le trésor légendaire de Priam, qu'il prétend avoir trouvé à Troie. Même si des érudits sérieux doutent que ces exploits s’inscrivent réellement dans l’époque temporelle suggérée par Schliemann, cela est secondaire. Il s’agit après tout d’une occasion unique d’entrer en possession de l’un des plus grands trésors archéologiques du siècle. Notre musée serait l’endroit idéal pour cela."
 je_lepsius_priams_treasure_fail: "Si un concurrent est plus rapide que nous à réaliser les souhaits de Schliemann, nous perdons la chance unique d'obtenir le trésor de Priam."
 je_lepsius_the_labyrinth: "Le labyrinthe"
 je_lepsius_the_labyrinth_reason: "Trapped in a strange, ancient labyrinth, Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastNameNoFormatting] must find [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] way back out. If [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] makes too many mistakes, [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] risks getting lost down there forever!"
 je_lepsius_discovery_tut: "Enquête dans la Vallée des Rois"
 je_lepsius_discovery_tut_reason: "Nous avons toutes les raisons de croire que la Vallée des Rois recèle un site caché d'une grande valeur historique. La recherche pourrait nous prendre des années. Celui qui réussit à faire cette découverte devrait avoir une place dans l’histoire."
 je_lepsius_disovery_tut_success: "Si nous parvenons à trouver dix indices en Haute-Égypte, nous aurons rassemblé suffisamment de matériel pour redécouvrir un lieu perdu d'une grande importance historique."
 je_lepsius_disovery_tut_fail: "Nos efforts seront vains si une autre nation trouve devant nous dix indices en Haute-Égypte."
 je_lepsius_discovery_ship: "Enquêtes près des Pyramides"
 je_lepsius_discovery_ship_reason: "Nous avons toutes les raisons de croire que les pyramides cachent quelque chose d’une grande valeur historique. La recherche pourrait nous prendre des années. Celui qui réussit à faire cette découverte devrait avoir une place dans l’histoire."
 je_lepsius_disovery_ship_success: "Si nous parvenons à trouver dix indices en Basse-Égypte, nous aurons rassemblé suffisamment de matériel pour redécouvrir un lieu perdu d'une grande importance historique."
 je_lepsius_disovery_ship_fail: "Nos efforts seront vains si une autre nation trouve devant nous dix indices en Basse-Égypte."
 je_lepsius_discovery_babylon: "Enquêtes à Babylone"
 je_lepsius_discovery_babylon_reason: "Nous avons toutes les raisons de croire qu’il pourrait y avoir quelque chose de plus grand dans la région de Babylone que nous n’avons pas encore découvert. La recherche pourrait nous prendre des années. Celui qui réussit à faire cette découverte devrait avoir une place dans l’histoire."
 je_lepsius_disovery_babylon_success: "Si nous parvenons à trouver dix indices en Babylonie, nous aurons rassemblé suffisamment de matériel pour redécouvrir un lieu perdu d'une grande importance historique."
 je_lepsius_disovery_babylon_fail: "Nos efforts seront vains si une autre nation trouve devant nous dix indices en Babylonie."
 je_lepsius_discovery_semiramis: "Enquêtes en Assyrie"
 je_lepsius_discovery_semiramis_reason: "Nous avons toutes les raisons de croire que l’Assyrie cache peut-être une merveille dont personne n’a conscience. La recherche pourrait nous prendre des années. Celui qui réussit à faire cette découverte devrait avoir une place dans l’histoire."
 je_lepsius_disovery_semiramis_success: "Si nous parvenons à trouver dix indices en Assyrie, nous aurons rassemblé suffisamment de matériel pour redécouvrir un lieu perdu d'une grande importance historique."
 je_lepsius_disovery_semiramis_fail: "Nos efforts seront vains si une autre nation trouve devant nous dix indices en Assyrie."
 je_lepsius_discovery_mycenae: "Enquêtes à Mycènes"
 je_lepsius_discovery_mycenae_reason: "Nous avons toutes les raisons de croire que l’ancienne ville de Mycènes recèle encore un secret. La recherche pourrait nous prendre des années. Celui qui réussit à faire cette découverte devrait avoir une place dans l’histoire."
 je_lepsius_disovery_mycenae_success: "Si nous parvenons à trouver dix indices en Argolide, nous aurons rassemblé suffisamment de matériel pour redécouvrir un lieu perdu d'une grande importance historique."
 je_lepsius_disovery_mycenae_fail: "Nos efforts seront vains si une autre nation trouve devant nous dix indices en Argolide."
 je_lepsius_discovery_pakal: "Enquêtes au Yucatán"
 je_lepsius_discovery_pakal_reason: "Nous avons toutes les raisons de croire que tous les mystères mayas n’ont pas encore été résolus. La recherche pourrait nous prendre des années. Celui qui réussit à faire cette découverte devrait avoir une place dans l’histoire."
 je_lepsius_disovery_pakal_success: "Si nous parvenons à trouver dix indices au Yucatán, nous aurons rassemblé suffisamment de matériel pour redécouvrir un lieu perdu d'une grande importance historique."
 je_lepsius_disovery_pakal_fail: "Nos efforts seront vains si une autre nation trouve devant nous dix indices au Yucatán."
 je_lepsius_archaoelogical_society: "Fonder une société archéologique"
 je_lepsius_archaoelogical_society_reason: "Non seulement l’intérêt pour l’archéologie ne cesse de croître dans notre pays. Après de nombreuses années d’expéditions, de fouilles et de découvertes d’artefacts, notre pays a bâti une étonnante expertise archéologique. Un archéologue exceptionnel pourrait créer une société archéologique pour rassembler les forces scientifiques et intellectuelles et donner un nouvel élan. Cela améliorerait non seulement notre production scientifique, mais renforcerait également l’expérience des générations futures d’archéologues."
