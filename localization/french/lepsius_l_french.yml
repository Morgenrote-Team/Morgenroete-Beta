 lepsius.1502_peking_d: "\nAlong with Java Man, Peking Man is believed to be the first Homo Erectus found and reinforced the belief that humanity originally came from Asia. The bones are said to be 400,000 to 780,000 years old."
 lepsius_state_trait_heidelbergensis_cave: "Grotte préhistorique"
 lepsius.1326.t: "Homo Heidelbergensis terminé"
 lepsius.1326.d: "[SCOPE.sCharacter('andersson_anthropologist_scope').GetFullName] has collected enough bones to draw specific conclusions about the extinct species. Homo Heidelbergensis is no longer a mystery to science and can now be located with a certain degree of certainty in the human family tree, even if there are still many questions unanswered."
 lepsius.1326.f: "La mâchoire inférieure de l'Homo heidelbergensis a été découverte en 1907 par l'ouvrier Daniel Hartmann dans une carrière de sable près de Mauer, près de Heidelberg, et décrite en 1908 par l'anatomiste Otto Schoetensack. Cette découverte, vieille d'environ 600 000 ans, est considérée comme la plus ancienne preuve de l'existence des premiers hommes en Europe, se situe morphologiquement entre l'Homo erectus et l'Homo sapiens, indique une large distribution de cette forme d'hominidé en Afrique, en Europe et en Asie et, en raison de sa robustesse et du volume estimé de son cerveau, permet de tirer des conclusions sur l'adaptation physique avancée, l'utilisation d'outils et l'organisation sociale."
 lepsius.1336.t: "L'homme de Heidelberg"
 lepsius.1336.d: "Un ouvrier a fait une découverte remarquable dans une mine de Mauer, une ville proche de Heidelberg. Un professeur de l'université de Heidelberg en a immédiatement reconnu la valeur."
 lepsius.1336.f: "La mâchoire inférieure de l'Homo heidelbergensis a été découverte en 1907 par l'ouvrier Daniel Hartmann dans une carrière de sable près de Mauer, près de Heidelberg, et décrite en 1908 par l'anatomiste Otto Schoetensack. Cette découverte, vieille d'environ 600 000 ans, est considérée comme la plus ancienne preuve de l'existence des premiers hommes en Europe, se situe morphologiquement entre l'Homo erectus et l'Homo sapiens, indique une large distribution de cette forme d'hominidé en Afrique, en Europe et en Asie et, en raison de sa robustesse et du volume estimé de son cerveau, permet de tirer des conclusions sur l'adaptation physique avancée, l'utilisation d'outils et l'organisation sociale."
 lepsius.1501_heidelbergensis_human_fossils: "\n#G [ROOT.Var('lepsius_heidelbergensis_human_fossil').GetValue] #! #E  Homo Heidelbergensis Fossiles#!."
 lepsius.1501_taxonomy_heidelbergensis: "\n#E Homo Heidelbergensis#! a été classé par [SCOPE.sCountry('lepsius_heidelbergensis_systemizer_country').GetName]."
 lepsius.1502_mauer_t: "#T Homo Heidelbergensis#! discovered by [SCOPE.sCountry('lepsius_heidelbergensis_finder_country').GetName]"
 lepsius.1502_mauer_d: "\La mâchoire inférieure de l'Homo heidelbergensis a été découverte près de Heidelberg. Elle est considérée comme la plus ancienne preuve de l'existence d'un humain primitif en Europe et marque une transition importante entre l'Homo erectus et les hominines ultérieurs."
 dubois_add_fossil_mauer_tt: "Gagnez #G 1#! @dubois_human_fossil ! #O Fossile humain spécial#!: L'homme de Heidelberg."
 lepsius_add_heidelbergensis_fossil_tt: "Gagnez #G 1#! @dubois_human_fossil ! #O Fossile d'Homo Heidelbergensis#!"
