 mfe_industry_events.1.t:0 "Une compagnie ferroviaire émerge"
 mfe_industry_events.1.d:0 "Un homme politique bien connecté, [SCOPE.sCharacter('rich_dude').GetFullName], souhaite financer une nouvelle entreprise ferroviaire, mais le [SCOPE.gsInterestGroup('ig_intelligentsia').GetName] ne soutient pas la nouvelle proposition."
 mfe_industry_events.1.f:0 "\"La fièvre du rail s'empare du monde entier, avec de nombreuses opportunités de gagner de l'argent, mais nous devons agir, et agir vite. Qu'en dites-vous ?\""
 mfe_industry_events.1.a:0 "Autoriser [SCOPE.sCharacter('rich_dude').GetFullName] à poursuivre ses activités"
 mfe_industry_events.1.b:0 "Bloquer tout autre effort"
 mfe_industry_events.1.c:0 "Subventionner leurs efforts"
 mfe_industry_events.2.t:0 "Compagnie ferroviaire prospère"
 mfe_industry_events.2.d:0 "Les nouveaux chemins de fer du [SCOPE.sState('railway_state').GetName] connaissent un succès retentissant auprès des habitants, qui les ont adoptés sans réserve."
 mfe_industry_events.2.f:0 "\"Auparavant, il fallait trois heures pour voyager du [SCOPE.sState('railway_state').GetName] au [ROOT.GetCountry.GetCapital.GetName], mais ces nouveaux itinéraires réduisent le temps de trajet de moitié.\""
 mfe_industry_events.2.a:0 "C'est bien!"
 mfe_industry_events.3.t:0 "Compagnie ferroviaire en difficulté"
 mfe_industry_events.3.d:0 "Des changements soudains sur le marché boursier ont mis la pression sur le [SCOPE.gsInterestGroup('ig_industrialists').GetName], tarissant les sources de capitaux, et les compagnies ferroviaires surchargées du [SCOPE.sState('railway_state').GetName] sont en faillite."
 mfe_industry_events.3.f:0 "\"Bien sûr, la presse s'en donne à coeur joie - chaque jour, des articles écrits par les membres du [SCOPE.gsInterestGroup('ig_intelligentsia').GetName] chantent notre désespoir - il faut faire quelque chose.\""
 mfe_industry_events.3.a:0 "Subventionnez les Rails !"
 mfe_industry_events.3.b:0 "Les [SCOPE.gsInterestGroup('ig_industrialists').GetName] étaient ceux qui voulaient un marché libre..."
 subsidize_rail_state_tt:0 "Commencez à subventionner les chemins de fer au [SCOPE.sState('railway_state').GetName]"