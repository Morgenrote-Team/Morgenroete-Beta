 mr_swe_nor_union_decision_1: "Nommer un nouveau gouverneur général en Norvège"
 mr_swe_nor_union_decision_1_desc: "Le poste de chef du gouvernement norvégien à Christiania est actuellement vacant. Nous devons décider qui nommer à la tête du gouvernement norvégien en l'absence du roi."
 mr_swe_nor_union_decision_2: "Exigez que nos ministres puissent participer aux débats parlementaires"
 mr_swe_nor_union_decision_2_desc: "Actuellement, les ministres n'ont pas le droit de s'exprimer au sein du Stortinget. Cette situation ne peut pas perdurer."
 mr_swe_nor_union_decision_3: "Exigez que tous les symboles du syndicat soient retirés de notre drapeau"
 mr_swe_nor_union_decision_3_desc: "Nous devrions utiliser un drapeau norvégien propre, sans symboles syndicaux."
 mr_swe_nor_union_decision_4: "Demander des bureaux consulaires norvégiens"
 mr_swe_nor_union_decision_4_desc: "With the increase in Norwegian shipping, the Swedish consular offices are not enough. We need Norwegian offices."
 mr_swe_nor_union_decision_5: "Exigez que le roi Charles XV tienne sa promesse"
 mr_swe_nor_union_decision_5_desc: "Avec le couronnement de Charles XV comme roi de Suède et de Norvège, il est temps pour lui de tenir sa promesse d'abolir le poste de gouverneur général."
 da_appoint_governor_general: "Nommer le gouverneur général"
 da_appoint_governor_general_desc: "Change le Gouverneur Général d'un [concept_subject]. [concept_liberty_desire] peut changer en fonction du candidat choisi."
 da_appoint_governor_general_action_name: "Nommer le gouverneur général"
 da_appoint_governor_general_action_notification_name: "[TARGET_COUNTRY.GetName] obtient un nouveau gouverneur général"
 da_appoint_governor_general_action_notification_desc: "[INITIATOR_COUNTRY.GetName] a remplacé le gouverneur général du [TARGET_COUNTRY.GetName] par une nouvelle personne."
 da_appoint_governor_general_action_notification_third_party_name: "[TARGET_COUNTRY.GetName] obtient un nouveau gouverneur général"
 da_appoint_governor_general_action_notification_third_party_desc: "[INITIATOR_COUNTRY.GetName] a remplacé le gouverneur général du [TARGET_COUNTRY.GetName] par une nouvelle personne."
 mr_swe_nor_union_event.1.t: "Nomination d'un nouveau gouverneur général"
 mr_swe_nor_union_event.1.d: "Le poste de gouverneur général de Christiania est vacant. Peut-être devrions-nous envisager de nommer quelqu'un pour occuper ce poste."
 mr_swe_nor_union_event.1.f: "Selon la Constitution norvégienne de 1814, un gouverneur général de nationalité suédoise ou norvégienne pouvait être nommé pour diriger le gouvernement norvégien en l'absence du roi, qui réside à Stockholm. En Suède, nombreux sont ceux qui estiment qu'il est essentiel qu'un gouverneur général agissant au nom du roi de Suède soit de nationalité suédoise. Toute interprétation contraire serait considérée comme une menace potentielle à la sécurité nationale."
 mr_swe_nor_union_event.1.a: "Nommer un gouverneur général suédois"
 mr_swe_nor_union_event.1.b: "Nommer un gouverneur général norvégien"
 mr_swe_nor_union_event.1.c: "Laisser le poste vacant pour les 5 prochaines années"
 mr_swe_nor_union_event.2.t: "Ministres norvégiens"
 mr_swe_nor_union_event.2.d: "Le Stortinget autorise les ministres norvégiens à participer aux discussions parlementaires."
 mr_swe_nor_union_event.2.f: "Le parlement norvégien, le Stortinget, a voté en faveur de la participation des ministres norvégiens aux discussions et négociations parlementaires. Ils attendent maintenant que le roi approuve leur décision."
 mr_swe_nor_union_event.2.a: "Refuser de reconnaître leur décision"
 mr_swe_nor_union_event.2.b: "Approuver leur décision"
 mr_swe_nor_union_event.3.t: "Le drapeau norvégien"
 mr_swe_nor_union_event.3.d: "La Norvège exige le droit d'utiliser un drapeau norvégien propre."
 mr_swe_nor_union_event.3.f: "Le Stortinget, le parlement norvégien, a voté l'adoption d'un nouveau drapeau « propre » sans les symboles habituels de l'union suédo-norvégienne. Devons-nous approuver leur décision ou leur refuser le droit d'utiliser le drapeau de leur choix ?"
 mr_swe_nor_union_event.3.a: "Ils garderont leur drapeau actuel"
 mr_swe_nor_union_event.3.b: "Laissez-les utiliser le drapeau de leur choix"
 mr_swe_nor_union_event.4.t: "Bureaux consulaires norvégiens"
 mr_swe_nor_union_event.4.d: "La Norvège exige le droit d'ouvrir ses propres bureaux consulaires partout dans le monde."
 mr_swe_nor_union_event.4.f: "Les bureaux consulaires de l'Union sont gérés par le ministère des Affaires étrangères de Stockholm, mais comme l'industrie maritime norvégienne a pris de l'importance, les Norvégiens soutiennent qu'un bureau consulaire norvégien est nécessaire. En Suède, la demande norvégienne est considérée comme la première étape vers un service extérieur norvégien et une demande potentielle future d'indépendance norvégienne."
 mr_swe_nor_union_event.4.a: "Il n'y a rien de mal avec nos bureaux"
 mr_swe_nor_union_event.4.b: "Plus il y a de bureaux, mieux c'est"
 mr_swe_nor_union_event.5.t: "La promesse de Charles XV"
 mr_swe_nor_union_event.5.d: "La Norvège exige que le nouveau roi, Charles XV, tienne sa promesse d'abolir le poste de gouverneur général à Christiania."
 mr_swe_nor_union_event.5.f: "Faire des promesses au peuple norvégien tout en étant l'héritier du trône est une chose, être le dirigeant de deux pays en est une autre. Faut-il abolir ce poste, comme promis, en remplaçant le gouverneur général de Christiania par un Premier ministre norvégien ?"
 mr_swe_nor_union_event.5.a: "Nous avons besoin de notre propre personne à Christiania"
 mr_swe_nor_union_event.5.b: "Une promesse doit être tenue"
 mr_swe_nor_union_event.6.t: "La promesse du prince héritier"
 mr_swe_nor_union_event.6.d: "L'héritier du trône, Karl Bernadotte, promet d'abolir le poste de gouverneur général à Christiania lors de son couronnement"
 mr_swe_nor_union_event.6.f: "Afin de s'assurer les faveurs du peuple norvégien, le futur roi s'engage solennellement à supprimer la fonction de gouverneur général de Christiania lors de son couronnement. Les réactions des propriétaires fonciers et des forces armées suédoises jettent sans surprise une ombre sur la proposition du jeune héritier."
 mr_swe_nor_union_event.6.a: "J'espère qu'il sait ce qu'il fait"
 mr_swe_nor_union_concessions_none: "Refus des concessions à la Norvège"
 mr_swe_nor_union_concessions_minor: "Des concessions mineures à la Norvège"
 mr_swe_nor_union_concessions_major: "Des concessions majeures à la Norvège"
 mr_swe_nor_clean_flag: "La Norvège supprime tous les symboles syndicaux de son drapeau"