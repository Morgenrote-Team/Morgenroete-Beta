### LEPSIUS/ANDERSSON ###

 lepsius.1502_peking_d: "\nAlong with Java Man, Peking Man is believed to be the first Homo Erectus found and reinforced the belief that humanity originally came from Asia. The bones are said to be 400,000 to 780,000 years old." #please replace

 lepsius_state_trait_heidelbergensis_cave: "Grotte préhistorique" #deepl:59949327

 lepsius.1326.t: "Homo Heidelbergensis terminé" #deepl:2121693630
 lepsius.1326.d: "[SCOPE.sCharacter('lepsius_anthropologist_scope').GetFullName] a recueilli suffisamment d'ossements pour tirer des conclusions précises sur l'espèce disparue. L'Homo Heidelbergensis n'est plus un mystère pour la science et peut désormais être situé avec un certain degré de certitude dans l'arbre généalogique de l'humanité, même si de nombreuses questions restent encore sans réponse." #deepl:4182329393
 lepsius.1326.f: "La mâchoire inférieure de l'Homo heidelbergensis a été découverte en 1907 par l'ouvrier Daniel Hartmann dans une carrière de sable près de Mauer, près de Heidelberg, et décrite en 1908 par l'anatomiste Otto Schoetensack. Cette découverte, vieille d'environ 600 000 ans, est considérée comme la plus ancienne preuve de l'existence des premiers hommes en Europe, se situe morphologiquement entre l'Homo erectus et l'Homo sapiens, indique une large distribution de cette forme d'hominidé en Afrique, en Europe et en Asie et, en raison de sa robustesse et du volume estimé de son cerveau, permet de tirer des conclusions sur l'adaptation physique avancée, l'utilisation d'outils et l'organisation sociale." #deepl:2078634084
 
 lepsius.1336.t: "L'homme de Heidelberg" #deepl:140239375
 lepsius.1336.d: "Un ouvrier a fait une découverte remarquable dans une mine de Mauer, une ville proche de Heidelberg. Un professeur de l'université de Heidelberg en a immédiatement reconnu la valeur." #deepl:3838910430
 lepsius.1336.f: "La mâchoire inférieure de l'Homo heidelbergensis a été découverte en 1907 par l'ouvrier Daniel Hartmann dans une carrière de sable près de Mauer, près de Heidelberg, et décrite en 1908 par l'anatomiste Otto Schoetensack. Cette découverte, vieille d'environ 600 000 ans, est considérée comme la plus ancienne preuve de l'existence des premiers hommes en Europe, se situe morphologiquement entre l'Homo erectus et l'Homo sapiens, indique une large distribution de cette forme d'hominidé en Afrique, en Europe et en Asie et, en raison de sa robustesse et du volume estimé de son cerveau, permet de tirer des conclusions sur l'adaptation physique avancée, l'utilisation d'outils et l'organisation sociale." #deepl:2078634084

