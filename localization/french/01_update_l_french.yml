 gaudi.10.t: "L'architecte a amélioré sa réputation" #deepl:3290657742
 gaudi.10.d: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] Au cours des dernières années, [ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] a démontré son expertise dans l'amélioration et la construction de nouveaux bâtiments dans tout le pays, ce qui a considérablement accru la réputation et les compétences de [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis]." #deepl:1621312069
 gaudi.10.f: ""L'art maternel est l'architecture. Sans une architecture qui nous soit propre, nous n'avons pas l'âme de notre propre civilisation." -Frank Lloyd Wright" #deepl:2640014774
