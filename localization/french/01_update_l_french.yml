 je_gaudi_capital_expansion_project: "Expansion du capital" #deepl:4033066520
 je_gaudi_capital_expansion_project_reason: "Entre 1836 et 1936, les capitales victoriennes ont connu de profondes transformations urbaines. Paris est remodelée par les grands boulevards et les perspectives axiales d'Haussmann. Vienne démolit ses murs en 1857 et les remplace par la grande Ringstraße. Berlin s'est rapidement développée avec des immeubles de rapport, des quartiers industriels et, plus tard, des lotissements modernistes. Londres s'est étendue grâce à des banlieues ferroviaires, des projets d'infrastructure et le premier métro du monde. Sur tout le continent européen, les villes royales se transforment en métropoles modernes, symboles de pouvoir, d'ambition et de tensions sociales croissantes." #deepl:4052914498

 gaudi.41.t: "Une ville sans frontières" #deepl:1231776512
 gaudi.41.d: "Les vieux murs tombent. Ils sont remplacés par de l'air, de la lumière et la promesse d'une croissance." #deepl:2117769530
 gaudi.41.f: "Pendant des siècles, [ROOT.GetCountry.GetCapital.GetCityHubName] a été une ville fortifiée : fière, compacte et fermée sur elle-même. Mais aujourd'hui, la maçonnerie tombe sous le coup de la pioche et de la poudre.n Les fortifications médiévales ont été démolies. À leur place s'élèvent de larges boulevards, bordés d'arbres et de nobles façades. Les chariots de marché et les couples de promeneurs foulent aujourd'hui le sol où marchaient autrefois les gardes. Les boulevards sont plus que des routes, ce sont des déclarations : de confiance, d'expansion, d'un avenir trop grand pour être contenu.\NCertains déplorent la perte des anciennes portes. Mais [ROOT.GetCountry.GetCapital.GetCityHubName] a finalement pris sa première grande respiration." #deepl:4076900735
 gaudi.41.g: "Nous construisons vers l'extérieur - avec vision et vigueur" #deepl:1116241139
 gaudi.42.t: "L'anneau du progrès" #deepl:3156235256
 gaudi.42.d: "Une nouvelle ceinture de boulevards relie la ville et l'État." #deepl:3367270166
 gaudi.42.f: "Là où s'élevaient des talus boueux, la pierre et le fer règnent désormais en maîtres. La grande avenue s'enroule comme un collier autour du cœur de [ROOT.GetCountry.GetCapital.GetCityHubName], liant ses quartiers dans le mouvement et la lumière.\NIl ne s'agit pas d'un simple travail de voirie. Des blocs entiers ont été redessinés, des parcs découpés, des monuments encadrés dans une perspective parfaite. Les lampes à gaz fleurissent au crépuscule comme des étoiles ordonnées. Avec chaque mètre pavé, [ROOT.GetCountry.GetCapital.GetCityHubName] devient plus lisible, plus impérial.\NLes fonctionnaires parlent d'"harmonie urbaine". Et les gens ? Ils se promènent, regardant des statues qu'ils n'ont jamais vues auparavant, dans des rues qu'ils craignaient autrefois d'emprunter." #deepl:3543082084
 gaudi.42.g: "Un anneau non pas de défense, mais de direction." #deepl:2497263912
 gaudi.43.t: "Les voies de l'autorité" #deepl:4104296278
 gaudi.43.d: "Le nouveau préfet remodèle [ROOT.GetCountry.GetCapital.GetCityHubName]- un axe à la fois. Large, droit et sans compromis." #deepl:2867872335
 gaudi.43.f: "Il ne s'agit pas d'expansion. Il s'agit d'une opération chirurgicale. Des quartiers entiers tombent sous le coup de la boussole et du plan. Les rues sont taillées comme des boulevards à travers des quartiers qui ressemblaient autrefois à des mégapoles. Les vieilles ruelles disparaissent. A leur place s'élèvent des lignes - longues, droites, et menant toujours à un monument, une caserne, ou un ministère.\NLa résistance gronde, mais les permis sont signés, les maisons expropriées, et les façades alignées. [ROOT.GetCountry.GetCapital.GetCityHubName] parle désormais le langage de l'ordre : visibilité, circulation, contrôle. Derrière la grandeur se cache l'intention.\NLes pauvres l'appellent "le nettoyage". Les fonctionnaires l'appellent "Modernisation". Le préfet parle de nécessité." #deepl:4133801679
 gaudi.43.g: "Que personne n'échappe au plan" #deepl:2017759053
 gaudi.44.t: "L'horizon métropolitain" #deepl:3803938371
 gaudi.44.d: "[ROOT.GetCountry.GetCapital.GetCityHubName] n'est plus seulement une capitale. Elle devient le monde en miniature." #deepl:101717450
 gaudi.44.f: "L'ancienne ville avait des bords. Celle-ci n'en a pas. L'acier et le verre percent là où la pierre dominait autrefois. Les lignes de chemin de fer se croisent sous les jardins publics. Les lumières électriques brouillent les frontières entre le crépuscule et l'aube. Les ambassades, les banques, les galeries et les cafés fleurissent comme des orchidées dans le conservatoire de fer d'une nouvelle ère.\NLes langues étrangères résonnent sous les arcades. Les gratte-ciel défient les cathédrales. [ROOT.GetCountry.GetCapital.GetCityHubName] ne demande plus la permission de grandir, il s'attend à diriger. Une seule vérité émerge de chaque quartier : ce n'est plus la ville d'une nation, c'est la ville des nations. C'est une ville de nations." #deepl:3494578230
 gaudi.44.g: "Nous nous levons, parce que le monde regarde déjà." #deepl:1129952378

