 ### Athletes ###

 athletes.2.t: "Notre montagnard, [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullNameNoFormatting], prend sa retraite" #deepl:814507835
 athletes.2.d: "Après avoir passé des décennies de sa vie [SCOPE.sCharacter('athletes_retired_person_scope').GetHerHis] à escalader des sommets, à tracer des itinéraires inconnus et à mener des expéditions en terrain périlleux, [SCOPE.sCharacter('athletes_retired_person_scope').GetFullName] a décidé de prendre sa retraite. [SCOPE.sCharacter('athletes_retired_person_scope').GetSheHe|U] ne sera plus notre [concept_douglas_mountaineer]." #deepl:3082522384
 athletes.2.f: ""
 athletes.2.g: "Le sommet n'a jamais été la fin - seulement la vue avant la descente." #deepl:3095673486
 athletes.12.t: "Décès de notre alpiniste" #deepl:3903757311
 athletes.12.d: "Après une vie passée à conquérir des sommets et à guider les autres dans les ascensions les plus périlleuses, notre site [concept_douglas_mountaineer] le plus vénéré s'est éteint. Qui va maintenant ouvrir la voie vers les nuages ?" #deepl:820605549
 athletes.12.f: ""
 athletes.12.g: "Leur corde a peut-être disparu, mais leur trace demeure." #deepl:3208123983

 athletes.52.t: "Un nouveau Mountaineer" #deepl:1807684299
 athletes.52.d: "[SCOPE.sCharacter('douglas_new_mountaineer_scope').GetFullName] est un talent prometteur qui pourrait un jour figurer parmi les plus grands de nos sommets." #deepl:1736780592
 athletes.52.f: ""
 athletes.52.g: "[SCOPE.sCharacter('douglas_new_mountaineer_scope').GetSheHe|U] grimpe avec détermination." #deepl:1012883623

 athletes.102.t: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] est désormais un vétéran Mountaineer !" #deepl:4259800261
 athletes.102.d: "Après avoir bravé des glaciers, franchi des lignes de crête et mené des expéditions dans l'inconnu, notre site [concept_douglas_mountaineer] [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] est désormais suffisamment réputé pour être qualifié de vétéran de l'alpinisme !" #deepl:334481273
 athletes.102.f: ""
 athletes.102.g: "Un maître de la montagne !" #deepl:1052077048

 ### MR Concepts ###

 concept_gaudi_architectural_splendour: "Architectural Splendour" #please replace
 concept_gaudi_architectural_splendour_desc: "Architectural Splendour is a collective term for the spectacular advances in modern architecture, referring primarily to Art Deco, Bauhaus, and Neoclassicism as they emerged in the early 20th century. The value represents the transformation of outdated forms into a future-ready architecture. Art Deco requires reaching a higher threshold to fulfill the dream of an Art Deco city — yet the benefits are greater." #please replace
 concept_artists_artist_desc: "In [concept_morgenroete] #b Artists#! are special characters that allow you to use certain mechanics of the mod. You can get #b Artists#! in some events or by aquiring enough [concept_artistic_progress]. Artists have [concept_artists_experience] that reflects their standing in their respective field.\nCurrently these #b Artists#! exist:\n - [concept_elgar_composer]\n - [concept_klimt_painter]\n - [concept_manzoni_writer] - [concept_gaudi_architect]" # Please replace
 concept_elgar_architecture_desc: "Architecture is one of the core concepts of [concept_morgenroete]. It is divided into two major parts.\n\nOn the one hand, [concept_gaudi_monuments] have been completely redesigned: they are no longer built directly, but expanded step by step based on decisions. On the other hand, numerous monuments have been added - some of which must be built, others exist at the start of the game.\n\nThe other key point is the introduction of the [concept_gaudi_architect], who can upgrade cities and design up to 15 new unique buildings by researching [Concept('concept_gaudi_architectural_blueprint','$concept_gaudi_architectural_blueprints$')]. Architects can also rebuild a country in the Bauhaus, Neoclassical, and Art Deco styles. A [concept_gaudi_great_architect] can even design their own [concept_gaudi_custom_monument]!" #Please replace
 concept_gaudi_architect_desc: "#PURPLE #b Architects#!#! are [Concept('concept_artists_artist','$concept_artists_artists$')] whose skills relate to urban planning, building design and construction. They are special character types that you can gain either from events, from gaining enough [concept_artistic_progress] to create one in your nation or by offering a position to a [concept_gaudi_independent_architect].\nWhile other artists are more likely to accumulate cultural tradition, architects only rarely generate the very valuable [concept_gaudi_architectural_splendour] when they are involved in urban planning or the expansion of the capital—or when they completely redesign the country in a particular architectural style. Their main task is more practical in nature. They work in public construction, thus providing a nation with additional construction points. They improve infrastructure through planning and enhance capital cities into livable places. Architects can also hone their skills on a study tour or write an architectural treatise.\nOf paramount importance is the design of new, unique buildings, for which they create a [concept_gaudi_architectural_blueprint]. A total of 15 of these [concept_gaudi_blueprint_buildings] can be researched—since this takes a long time, it's worth considering which ones make sense.\nArchitects also provide a passive bonus: their mere presence accelerates the construction of [concept_gaudi_monuments] by 100 percent. The greatest achievement of an architect is the design of their own [concept_gaudi_custom_monument]. This is only possible with a [concept_gaudi_great_architect]." #Please replace
 concept_douglas_mountaineering: "Alpinisme" #deepl:2724886722
 concept_douglas_mountaineering_desc: "Countries that own at least one [concept_douglas_mountain_summit] or have a #b Mountaineering License#! with a country that has one can participate in mountaineering. To start a #b Mountain Expedition#! you need both the #b Prospecting#! and #b Nationalism#! technologies as well as a general that has either the #b Mountaineer#!, #b Explorer#!, #b Mountain Commander#! or #b Surveyor#! Trait.\nAs soon as you start a #b Mountain Expedition#! you will have to first choose which general will be the main Mountaineer. Then you will choose the summit to climb.\nThe higher the mountains, the more dangerous is the ascent. The Mountains are classified according to their height in meters ranging from under 4000 meters upt to over 8000 meters. Success depends on researched military technologies, the age and health of the leader, and their characteristics. Avalanches and steep slopes can pose a major risk that threatens the entire endeavor.\nYou can even send an additional [Concept('concept_academics_academic','$concept_academics_scientist$')] on the trip. Either a [concept_dubois_naturalist] or a [concept_dubois_paleontologist] will help discover more about the mountain you climbed on.\nIn the end you will get a prestige bonus and your general will develop better traits that will help them in combat as well for mountaineering." #Please replace

 concept_gaudi_great_architect: "#PURPLE #b Grand architecte#!#!" #deepl:2311505900
 concept_gaudi_great_architects: "#PURPLE #b Great Architects#!#!" #You can use this for plural: [Concept('concept_gaudi_great_architect','$concept_gaudi_great_architects$')]
 concept_gaudi_great_architect_desc: "#b Les grands architectes#! sont [Concept('concept_gaudi_architect','$concept_gaudi_architects$')] qui sont considérés comme les plus importants dans leur domaine. #b Les architectes#! qui atteignent 500 [concept_artists_experience] deviennent #b Grands architectes#!. Si un artiste atteint ce rang spécial, il ou elle peut concevoir le plan d'une [concept_gaudi_custom_monument] vraiment exceptionnelle qui incarne l'esprit de la nation." #deepl:3535354395

 concept_gaudi_monuments: "Monuments à l'intérieur de #R Morgenröte#!" #deepl:3575665350
 concept_gaudi_monuments_desc: "De nombreuses nations ont reçu de nouveaux monuments #b #! en [concept_morgenroete]: #b  la cathédrale de Cologne#! en Allemagne, #b le Gotthardbahn#! en Suisse, #b le Cristo Redentor#! au Brésil, #b le Mole Antonelliana#! en Italie, #b le Palais d'été#! en Chine, le #b Sagrada Família#! en Espagne, le #b Schloss Neuschwanstein#! en Bavière, le #b Palacio de Bellas Artes#! au Mexique et le #b Gyeongbokgung Palace#! en Corée.\Tous les bâtiments, à l'exception du #b Summer Palace#! et du #b Campanile#!, doivent être construits par leur propriétaire. Le #b Saxon Palace#! peut être réactivé par une nation polonaise. Il y a aussi de nouveaux monuments au début du jeu comme les #b Bouddhas de Bamiyan#! ou le #b Palais du Potala#!. Il y a aussi la possibilité d'avoir un [concept_gaudi_custom_monument] conçu par un [concept_gaudi_great_architect]. Contrairement au jeu vanille, #b Les monuments#! ne sont pas construits directement, mais plutôt à travers une décision. La construction se déroule en plusieurs étapes, en fonction de la taille du bâtiment, et peut prendre des années, voire des décennies - et est nettement plus coûteuse." #deepl:1566202277

 concept_athletes_athlete: "Athlète" #deepl:850847351
 concept_athletes_athletes: "Athletes" #You can use this for plural: [Concept('concept_athletes_athlete','$concept_athletes_athletes$')]
 concept_athletes_athlete_desc: "Dans [concept_morgenroete] #b  Les athlètes#! sont des personnages spéciaux qui vous permettent d'utiliser certains mécanismes du mod.#b Les athlètes#! sont généralement créés par le biais d'événements ou d'un bouton. Comme les autres personnages, les #b Athlètes#! possèdent des expériences qui leur garantissent une plus grande réussite dans leur domaine.\Nactuellement, ces #b Athlètes#! existent:\n - [concept_curtiss_balloonist]\n - [concept_curtiss_pilot]\n - [concept_vikelas_olympian]\n - [concept_douglas_mountaineer]\n - [concept_vikelas_coach]\n - [concept_vikelas_racer]" #deepl:1061453309

 concept_gaudi_independent_architect: "Architecte indépendant" #deepl:2730756570
 concept_gaudi_independent_architects: "Independent Architects" #You can use this for plural: [Concept('concept_gaudi_independent_architect','$concept_gaudi_independent_architects$')]
 concept_gaudi_independent_architect_desc: "[Concept('concept_gaudi_architect','$concept_gaudi_architects$')] qui ne sont pas engagés par un pays sont #b Architectes indépendants#!.\nContrairement à de nombreux autres artistes, il y a peu d'exigences pour recruter un #b Architecte indépendant#!, à l'exception d'un minimum d'exigences technologiques. Ce sont de véritables globe-trotters qui n'exigent généralement qu'une bonne rémunération." #deepl:4188716455

 concept_gaudi_architectural_blueprint: "Plan d'architecture" #deepl:4294565305
 concept_gaudi_architectural_blueprints: "Architectural Blueprints" #You can use this for plural [Concept('concept_gaudi_architectural_blueprint','$concept_gaudi_architectural_blueprints$')]
 concept_gaudi_architectural_blueprint_desc: "Les plans architecturaux peuvent être recherchés sur [Concept('concept_gaudi_architect','$concept_gaudi_architects$')]. Ils sont essentiels pour la construction de bâtiments spéciaux ( [concept_gaudi_blueprint_buildings] ) qui ne peuvent être érigés qu'une seule fois dans un pays. Il existe un total de 15 bâtiments différents dans cinq catégories différentes. Certains plans nécessitent la recherche de technologies. Comme la recherche peut parfois prendre des années, il est sage de décider à l'avance quels plans sont les plus importants. Les bâtiments peuvent potentiellement être construits dans n'importe quel État, mais nécessitent un certain niveau d'urbanisation. Dans certains cas, il peut y avoir des exigences supplémentaires.\N-#R Important#!: Vous ne pouvez construire qu'un seul bâtiment d'une catégorie spécifique dans un état. Ainsi, si une fontaine est située dans un État, l'arc de triomphe ou la statue ne peuvent pas y être implantés." #deepl:1017261789
 concept_gaudi_blueprint_buildings: "Blueprint Buildings" #deepl:2672159620
 concept_gaudi_blueprint_buildings_desc: "Les bâtiments à empreinte bleue sont des bâtiments qui nécessitent une empreinte bleue recherchée par [Concept('concept_gaudi_architect','$concept_gaudi_architects$')]. Un seul bâtiment d'une catégorie spécifique peut être construit dans un État. Il existe 15 bâtiments différents :#b Monument#!\N- [GetBuildingType('building_gaudi_statue').GetName]\N- [GetBuildingType('building_gaudi_fountain').GetName]\N- [GetBuildingType('building_gaudi_arch').GetName]\N-#b Place publique#!\N- [GetBuildingType('building_gaudi_park').GetName]\N- [GetBuildingType('building_gaudi_luna').GetName]\N- [GetBuildingType('building_gaudi_parade').GetName]\N-#b Bâtiments de service#!\N- [GetBuildingType('building_gaudi_almshouse').GetName]\N- [GetBuildingType('building_gaudi_school').GetName]\N- [GetBuildingType('building_gaudi_prison').GetName]\N-#b Établissements de santé#!\N- [GetBuildingType('building_gaudi_canalization').GetName]\N- [GetBuildingType('building_gaudi_hospital').GetName]\N- [GetBuildingType('building_gaudi_health').GetName]\N-#b Académies nationales#!\N- [GetBuildingType('building_gaudi_science').GetName]\N- [GetBuildingType('building_gaudi_arts').GetName]\N- [GetBuildingType('building_gaudi_sports').GetName]" #deepl:3852362262

 concept_gaudi_custom_monument: "Monument personnalisé" #deepl:2715885677
 concept_gaudi_custom_monument_desc: "Un monument sur mesure est le plus grand chef-d'œuvre possible d'un [concept_gaudi_architect]. Il peut rivaliser avec d'autres monuments ordinaires. Seul un [concept_gaudi_great_architect] peut élaborer de tels plans. Il nécessite des recherches sur les technologies architecturales les plus modernes. Le type de monument conçu par un architecte dépend en grande partie de son style architectural. Les architectes Art déco conçoivent le [GetBuildingType('building_gaudi_people_monument').GetName], les architectes Bauhaus le [GetBuildingType('building_gaudi_people_forum').GetName], et les architectes néoclassiques le [GetBuildingType('building_gaudi_people_palace').GetName]." #deepl:759442240

 concept_douglas_mountaineer: "Montagnard" #deepl:3785520222
 concept_douglas_mountaineers: "Les Montagnards" #deepl:2642597122
 concept_douglas_mountaineer_desc: "#n Cet article est en cours de révision.#!" #deepl:1338387803
 concept_vikelas_olympian: "Olympien" #deepl:3681680819
 concept_vikelas_olympian_desc: "#n Cet article est en cours de révision.#!" #deepl:1338387803

 concept_douglas_mountain_summit: "Sommet de la montagne" #deepl:193458424
 concept_douglas_mountain_summits: "Mountain Summits" #You can use this for plural [Concept('concept_douglas_mountain_summit','$concept_douglas_mountain_summits$')]
 concept_douglas_mountain_summit_desc: "Les sommets de montagne sont l'objectif convoité de tous les alpinistes. Ils marquent le point culminant d'une montagne. Chaque sommet possède trois caractéristiques distinctes qui définissent la difficulté à l'atteindre.\n-#V Hauteur#!: La hauteur détermine le nombre de marches nécessaires pour gravir une montagne, ce qui reflète la longueur totale de l'expédition. Pour chaque tranche de 1 000 mètres, un pas de progression est nécessaire. La valeur est arrondie à l'unité supérieure, ce qui signifie que le Mont Whitney, d'une hauteur de 4 421 mètres, nécessite 5 marches, tandis que le Kauffmann Peak, d'une hauteur de 7 134 mètres, en nécessite 8. Le prestige d'une montagne est calculé en fonction de sa hauteur : la hauteur totale est divisée par 250. Ainsi, une montagne idéale de 5 000 mètres octroie 20 points de prestige.#V Niveau#!: Le niveau d'une montagne représente les exigences en matière d'équipement nécessaire pour la gravir. Il n'est pas strictement lié à la hauteur. Par exemple, malgré ses 5 636 mètres, le Citlaltépetl n'est que de niveau 1 et ne nécessite qu'un équipement de base. En revanche, le Cervin, qui ne culmine qu'à 4 478 mètres, est considéré comme beaucoup plus exigeant (niveau 3) et nécessite au moins une préparation aux premiers secours pour les urgences alpines.#V Risque#!: Le niveau de risque d'une montagne indique la probabilité que des événements négatifs affectent l'expédition. Il est indépendant de l'altitude et du niveau. Les avalanches, le brouillard et les intempéries sont les principales préoccupations. Le Popocatépetl a pu être gravi dès le début de l'ère moderne grâce à son environnement hospitalier. En revanche, le Großvenediger, beaucoup plus petit (3 666 mètres), représentait encore une menace sérieuse pour les expéditions autrichiennes jusqu'au début du 19e siècle.\NPlus d'informations sur les différents sommets peuvent être trouvées dans la section [concept_douglas_mountain_summit_list]." #deepl:3359948048
 concept_douglas_mountain_range: "Chaîne de montagnes" #deepl:3289022657
 concept_douglas_mountain_ranges: "Mountain Ranges" #You can use this for plural [Concept('concept_douglas_mountain_range','$concept_douglas_mountain_ranges$')]
 concept_douglas_mountain_range_desc: "Une chaîne de montagnes est définie comme une formation montagneuse qui offre la possibilité de s'entraîner sur de longues distances ( [concept_douglas_mountaineering] ). Les chaînes de montagnes classiques comprennent les montagnes Rocheuses, les Andes, les Alpes et le Caucase. Contrairement aux [Concept('concept_douglas_mountain_summit','$concept_douglas_mountain_summits$')] qu'il faut conquérir, il existe également de nombreuses montagnes moins difficiles où il n'y a pas de risque de chute mortelle pour [concept_douglas_mountaineer]. Elles doivent plutôt être considérées comme des itinéraires d'entraînement. Les pays dotés de chaînes de montagnes ont plus de chances de former des alpinistes que ceux qui n'ont pas cette caractéristique géographique." #deepl:2685064578
 concept_douglas_alpine_heritage: "Patrimoine alpin" #deepl:3116364012
 concept_douglas_alpine_heritage_desc: "Le patrimoine alpin est un terme collectif désignant un lien avec les montagnes et une spécialisation dans l'escalade des montagnes. Il fait également référence au potentiel de recrutement de nouveaux [Concept('concept_douglas_mountaineer','$concept_douglas_mountaineers$')]- puisque, dans la plupart des cas, les alpinistes expérimentés sont originaires de régions montagneuses. Cela donne toujours un avantage aux pays dotés de [Concept('concept_douglas_mountain_range','$concept_douglas_mountain_ranges$')] ou [Concept('concept_douglas_mountain_summit','$concept_douglas_mountain_summits$')]. Le recrutement d'un nouvel alpiniste, ainsi que diverses autres actions, coûtent au Patrimoine alpin." #deepl:707449492

 concept_douglas_mountain_summit_list: "Liste des sommets de montagne" #deepl:4208448161
 concept_douglas_mountain_summit_list_desc: "Il existe de nombreux sites [Concept('concept_douglas_mountain_summit','$concept_douglas_mountain_summits$')] que l'on peut escalader.\n-#V Amérique du Nord :#!\N-#b Mont McKinley#! (Alaska), Hauteur 6190 mètres, Niveau 4\N-#b Mont Logan#! (Territoire du Yukon), Hauteur 5959 mètres, Niveau 4\N-#b Citlaltépetl#! (Mexique), Hauteur 5636 mètres, Niveau 1\N-#b Mont Whitney#! (Californie), Hauteur 4421 mètres, Niveau 1\N-#V Amérique du Sud :#!\n#b Aconcagua#! (Mendoza), hauteur 6267 mètres, niveau 3\n#b Huascarán#! (Lima Territory), hauteur 6768 mètres, niveau 5\n#b Illimani#! (La Paz), hauteur 6438 mètres, niveau 4\n#b Chimborazo#! (Ecuador), hauteur 6267 mètres, niveau 1\n#V Europe :#!\n#b Shkara#! (Grand Caucase), Hauteur 5642 mètres, Niveau 4\n#b Dufourspitze#! (Dufourspitze), Hauteur 4634 mètres, Niveau 2\n#b Matterhorn#! (Suisse occidentale), Hauteur 4478 mètres, Niveau 3\n#b Aiguille Verte#! (Savoie), Hauteur 4122 mètres, Niveau 3\n#b Pico de Aneto#! (Aragon), Hauteur 3404 mètres, Niveau 1\n#V Afrique :#!\n#b Kibo#! (Tanganyika), hauteur 5895 mètres, niveau 2\n#b Batian#! (Kenya), hauteur 5199 mètres, niveau 3\n#b Mount Stanley#! (Ouganda), hauteur 5109 mètres, niveau 3\n#b Mount Cameroon#! (Sud Cameroun), 4095 mètres, niveau 1\n#V Asie :#!\n#b Kamet#! (Delhi), Hauteur 7756 mètres, Niveau#b Chogolisa#! (Cachemire), Hauteur 7665 mètres, Niveau 5\n#b Kabru#! (Himalaya), Hauteur 7412 mètres, Niveau 5\n#b Kaufmann Peak#! (Tadjikistan), Hauteur 7134 mètres, Niveau 4\n#V Australie &amp; Océanie :#!\#b Mont Wilhelm#! (Nouvelle-Guinée orientale), altitude 4121 mètres, niveau 2#b Mont Cook#! (Île du Sud), altitude 3724 mètres, niveau 2" #deepl:721187631

