 je_gaudi_custom_monument_blueprint_research_reason: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] jouit d'une renommée mondiale en tant que l'un des architectes les plus importants de l'époque [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis]. Pour immortaliser le nom de [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis], [ROOT.Var('gaudi_architect_var').GetCharacter.GetHeShe] travaille sur le projet d'un monument exceptionnel qui fera rayonner notre pays dans le monde entier en tant que centre d'art architectural." #deepl:2632883859

 gaudi.81.t: "Le travail de maître des architectes" #deepl:681011782
 gaudi.81.d: "Ces dernières années, [THIS.GetCountry.GetName] s'est hissé au rang des nations leaders dans le domaine de l'architecture. [ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] a joué un rôle important dans ce développement. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] a accepté la commande de concevoir un monument qui rivaliserait avec les grandes merveilles des époques antique, médiévale et moderne." #deepl:2672646441
 gaudi.81.f: "Le monument de l'architecte est basé sur le style préféré du grand architecte:\NLes architectes Art déco concevront le [GetBuildingType('building_gaudi_people_monument').GetName].\NLes architectes Bauhaus offriront le [GetBuildingType('building_gaudi_forum_monument').GetName].\NLes architectes néoclassiques créeront le [GetBuildingType('building_gaudi_people_palace').GetName]." #deepl:4088582525
 gaudi.81.g: "Magnifique." #deepl:573443058

