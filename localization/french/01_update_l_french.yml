 gaudi.11.d: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName]L'architecte le plus important de notre pays s'est vu confier la tâche importante de concevoir le plan d'un nouveau bâtiment. La question demeure : Quel type de bâtiment doit-on concevoir ?" #deepl:1652669912
 gaudi.11.f: "A [GetBuildingType('building_gaudi_statue').GetName] augmente la #G légitimité du gouvernement#!. [GetTechnology('elgar_classicism_tech').GetName] est nécessaire.\nA [GetBuildingType('building_gaudi_fountain').GetName] améliore le #G niveau de vie#! de l'état dans lequel il est situé.\nA [GetBuildingType('building_gaudi_arch').GetName] réduira #G la perte de moral#! des troupes combattantes. [GetTechnology('napoleonic_warfare').GetName] est nécessaire." #deepl:2246128148
