 lepsius.1502_mauer_d: "\La mâchoire inférieure de l'Homo heidelbergensis a été découverte près de Heidelberg. Elle est considérée comme la plus ancienne preuve de l'existence d'un humain primitif en Europe et marque une transition importante entre l'Homo erectus et les hominines ultérieurs." #deepl:219138034

