 gaudi.82.t: "L'œuvre d'une vie d'architecte" #deepl:1436757673
 gaudi.82.d: "Après des mois de préparation, [ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] a présenté des plans, des calculs, des statistiques et une maquette réalisée à la main. [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U], monument ambitieux, est déjà considéré comme un rêve d'art architectural. La seule question qui subsiste est de savoir qui fera de ce rêve une réalité." #deepl:1546320616
 gaudi.82.f: "Demain, nous ferons de belles choses. -Antoni Gaudí" #deepl:3107908861
 gaudi.82.g: "Un monument à notre mémoire." #deepl:3586195485

