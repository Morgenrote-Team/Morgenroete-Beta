 je_gaudi_bauhaus_architecture: "Architecture du Bauhaus" #deepl:2452320752
 je_gaudi_bauhaus_architecture_reason: "Le Bauhaus est une école d'art allemande qui a fonctionné de 1919 à 1933 et qui combinait l'artisanat et les beaux-arts. L'école est devenue célèbre pour son approche du design, qui tentait d'unifier la vision artistique individuelle avec les principes de la production de masse et l'accent mis sur la fonction. Elle était fondée sur l'idée de créer un Gesamtkunstwerk (œuvre d'art globale) dans lequel tous les arts seraient finalement réunis. Le style Bauhaus est devenu par la suite l'un des courants les plus influents du design moderne, de l'architecture moderniste et de l'enseignement de l'architecture." #deepl:1381087306
 je_gaudi_neoclassical_architecture: "Architecture néoclassique" #deepl:3915160230
 je_gaudi_neoclassical_architecture_reason: "Au début du XXe siècle, le néoclassicisme est un mouvement architectural et artistique qui cherche à renouer avec la clarté formelle, la symétrie et la grandeur de l'antiquité gréco-romaine. Apparu en contrepoint des excès de l'historicisme et de l'abstraction croissante de l'art moderne, ce style mettait l'accent sur la monumentalité, l'ordre géométrique et l'utilisation de formes traditionnelles dans un langage rationnel, souvent sanctionné par l'État. Il était étroitement lié à l'identité nationale et à l'architecture civique, projetant des idéaux de permanence, d'autorité et de beauté disciplinée." #deepl:2628512539
 je_gaudi_art_deco_architecture: "Architecture Art Déco" #deepl:2695214977
 je_gaudi_art_deco_architecture_reason: "Le mouvement Art déco est né dans les années 1920 comme un style décoratif et architectural qui embrassait la modernité tout en conservant des éléments de l'ordre classique. Avec son utilisation caractéristique de formes stylisées, de matériaux riches et de géométrie ornementale, l'Art déco associe l'opulence de l'artisanat à l'esthétique naissante de la machine. Il célèbre le progrès technologique et le dynamisme urbain à travers des motifs inspirés de l'industrie, de la vitesse et de l'exotisme." #deepl:2018331500

 je_gaudi_splendour_bauhaus: "Le triomphe du Bauhaus" #deepl:1539285104
 je_gaudi_splendour_bauhaus_reason: "Avec l'introduction de l'esprit du Bauhaus, les architectes ont commencé à se débarrasser de l'ornement et de l'illusion en faveur de la clarté, de la précision et de la vérité des matériaux. L'objectif n'est plus d'impressionner par l'opulence ou d'évoquer la grandeur des empires passés, mais de servir la société en créant des espaces fonctionnels, honnêtes et modernes. Le Bauhaus n'est pas seulement une esthétique, c'est une philosophie de la conception, fondée sur la conviction que l'architecture et la vie quotidienne doivent être réconciliées par la simplicité, l'utilité et l'unité de la forme et de l'objectif. En adoptant les principes du Bauhaus, une capitale ne signale pas seulement la modernité, mais le progrès dans sa forme la plus pure : l'élévation de la fonction au-dessus de la façade, de l'innovation au-dessus de la tradition." #deepl:3357423326
 je_gaudi_splendour_neoclassical: "Néoclassique" #deepl:3536136445
 je_gaudi_splendour_neoclassical_reason: "Le néoclassicisme est un style ancré dans l'harmonie rationnelle de l'Antiquité, dans la grammaire architecturale des colonnes, des frontons et des tracés symétriques. Au début du XXe siècle, il a été repensé à l'aide de techniques de construction modernes, de lignes plus nettes et d'une échelle souvent monumentale. Elle représente non seulement la tradition, mais aussi une vision disciplinée de l'avenir, dans laquelle la vie publique, le droit et la culture seraient encadrés par des bâtiments qui inspirent la crainte et l'unité. Une architecture qui embrasse ces principes donnerait à notre capitale de la gravité et de la grandeur, la transformant en un phare d'ordre, de résilience et de pouvoir cultivé aux yeux du monde." #deepl:605890088
 je_gaudi_splendour_art_deco: "Un rêve d'Art déco" #deepl:1198646901
 je_gaudi_splendour_art_deco_reason: "Avec l'introduction de l'Art déco, les architectes ont révolutionné le monde de l'art, notamment en rompant avec l'historicisme rigide du passé. Mais contrairement à de nombreuses écoles modernes, leurs bâtiments n'étaient pas l'expression d'une simple fonctionnalité et objectivité. L'Art déco est un développement au milieu de l'éveil général du modernisme classique, dans lequel la combinaison créative de l'élégance des formes, de la préciosité des matériaux, de la force des couleurs et de la sensualité du sujet était au premier plan. À son apogée, il représentait le luxe, le glamour, l'exubérance et la foi dans le progrès social et technologique. Une architecture qui respecte ces principes ferait de notre pays un exemple de modernité et de richesse." #deepl:980834049

