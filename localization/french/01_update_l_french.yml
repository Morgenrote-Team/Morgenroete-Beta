 gaudi.511.d: "En ce qui concerne l'embellissement du site [ROOT.GetCountry.GetCapital.GetCityHubName], il y a eu un désaccord en matière d'urbanisme." #deepl:2161912626
 gaudi.512.t: "Statues sur le périphérique" #deepl:1070850347
 gaudi.512.d: "Un nouveau groupe de figures doit être érigé sur le nouveau périphérique de [ROOT.GetCountry.GetCapital.GetCityHubName], mais on ne sait pas encore quelle figure mythologique occupera une place particulière." #deepl:275330526
 gaudi.513.f: "Un nouveau ministère devait être construit comme le fleuron du gouvernement, mais les changements constants de plan, l'expansion et la corruption latente ont fait que la construction du bâtiment a traîné en longueur et que tous les fonds ont été utilisés jusqu'à l'achèvement. Le bâtiment inachevé pourrait être mis en état de fonctionnement avec quelques mesures temporaires, mais ce n'est probablement pas dans l'intérêt du gouvernement, qui devrait se contenter de bureaux plus petits et moins confortables que prévu. Une nouvelle construction est possible, mais elle sera probablement coûteuse." #deepl:3580582680

 gaudi.511.t: "Fontaine ou Pavillon ?" #deepl:2151137688
 gaudi.511.f: "On pourrait croire qu'il s'agit d'une querelle à propos de la barbe de l'empereur : un conflit politique concret s'est développé à partir d'une bagatelle. Il s'agit d'un projet de construction sur une place représentative d'une grande valeur esthétique. Une faction souhaite y construire un pavillon pour s'y attarder, l'autre préconise la construction d'une fontaine. Comme il n'y a qu'une seule parcelle, seul l'un des projets peut être construit ; un compromis est irréalisable." #deepl:1541667756
 gaudi.511.g: "Nous construisons le pavillon." #deepl:2064679099
 gaudi.511.h: "Nous construisons la fontaine." #deepl:2431357846
 gaudi.511.i: "J'ai mes propres projets pour cet endroit..." #deepl:53271135
 gaudi.512.f: "Lors de la planification du périphérique, quelques détails restent encore flous. Il n'a pas encore été déterminé quelles figures doivent être placées dans une position proéminente. Il est clair qu'il s'agit de figures du panthéon romain. Certaines catégories de la population s'identifient aux figures respectives - par exemple, les capitalistes ont suggéré de placer Mercure, le dieu du commerce, au milieu. Les aristocrates, en revanche, insistent sur Jupiter, le père des dieux. Les militaires préfèrent Mars, les universitaires veulent Apollon au centre." #deepl:3457913174
 gaudi.512.g: "Jupiter." #deepl:641978563
 gaudi.512.h: "Le mercure." #deepl:4064282680
 gaudi.512.i: "Apollo." #deepl:2704921915
 gaudi.512.j: "Mars." #deepl:4251022611
 gaudi.513.t: "Le bâtiment du ministère dépasse les coûts" #deepl:3536337121
 gaudi.513.d: "La construction d'un nouveau bâtiment ministériel tourne au petit scandale." #deepl:3745484689
 gaudi.513.g: "Il y avait un budget et ce budget doit être respecté." #deepl:2982007153
 gaudi.513.h: "C'est regrettable, mais fréquent dans ce domaine." #deepl:3799202878
 gaudi.513.i: "Ce projet devrait recevoir autant d'argent et de temps qu'il en a besoin." #deepl:3703152475
 gaudi.514.t: "Nouveau café" #deepl:760472506
 gaudi.514.d: "Un nouveau café a ouvert ses portes sur la Ringstrasse." #deepl:977697169
 gaudi.514.f: "Le café est resté notre meilleur lieu d'éducation pour tout ce qui est nouveau. Pour comprendre cela, il faut savoir que le café viennois est une institution d'un genre particulier qui ne peut être comparée à aucune autre institution similaire dans le monde. Il s'agit en fait d'une sorte de club démocratique, accessible à tous pour une tasse de café bon marché, où, pour cette modique somme, chaque client peut s'asseoir pendant des heures, discuter, écrire, jouer aux cartes, recevoir son courrier et, surtout, consommer un nombre illimité de journaux et de magazines. Tous les journaux viennois étaient disponibles dans un meilleur café viennois, et pas seulement les journaux viennois, mais ceux de tout le Reich allemand, français, anglais, italien et américain, ainsi que toutes les revues littéraires et artistiques importantes du monde. Nous savions donc de première main tout ce qui se passait dans le monde, nous entendions parler de chaque livre publié, de chaque spectacle, où qu'il ait lieu, et nous comparions les critiques de tous les journaux. Rien n'a peut-être autant contribué à la flexibilité intellectuelle et à l'orientation internationale de l'Autrichien que le fait qu'il ait pu s'informer de manière aussi complète sur tous les événements du monde dans un café et en discuter en même temps dans des cercles d'amis. Nous étions assis là pendant des heures chaque jour, et nous ne manquions rien". - Stefan Zweig" #deepl:1426019469
 gaudi.514.g: "[SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('gaudi_ruler').GetFullName] devrait le visiter." #deepl:3567062403
 gaudi.514.h: "Cela permettra d'améliorer le niveau de vie à Vienne." #deepl:993415000
 gaudi.515.t: "Ring Road Palais" #deepl:2889767777
 gaudi.515.d: "Un noble s'est lancé à corps perdu dans la construction d'un palais dans le nouveau quartier de la ville de [ROOT.GetCountry.GetCapital.GetCityHubName]. La ruine de l'édifice à moitié achevé menace de devenir une horreur." #deepl:3082201997
 gaudi.515.f: "Le terme "Ring Road Palace" désigne les magnifiques palais situés sur la Ringstrasse de Vienne. Ces bâtiments ont été construits pour la plupart par l'ancienne noblesse ou par des banquiers et des industriels à la fin du XIXe siècle. Les palais ont été construits dans un mélange de style néo-baroque et néo-renaissance, ou néo-maniérisme. Ils étaient également un symbole d'élévation et de statut. Cependant, l'un des constructeurs a récemment été débordé et risque de faire faillite. La population se moque déjà de cette horreur qui, dans le pire des cas, devrait être démolie à nouveau, ce qui repousserait l'achèvement de l'ensemble du projet." #deepl:2482976903
 gaudi.515.g: "Nous partageons les coûts." #deepl:1778759255
 gaudi.515.h: "Cela ne nous regarde pas." #deepl:2515722656
 gaudi.516.t: "Extension du capital : Progrès satisfaisants" #deepl:3725304670
 gaudi.516.d: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] a déclaré que l'extension du capital pourrait être achevée plus tôt." #deepl:1876608469
 gaudi.516.f: "Pour des raisons inconnues, tout va plus vite : que ce soit l'amour de la patrie, les salaires élevés, le soutien amical des élites locales ou simplement le meilleur temps." #deepl:771529955
 gaudi.516.g: "Merveilleux." #deepl:1621308786
 gaudi.517.t: "Extension du capital : Progrès lents" #deepl:4246146058
 gaudi.517.d: "Malheureusement, la direction des travaux sous [ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] a dû admettre aujourd'hui que la construction d'un nouveau district à [ROOT.GetCountry.GetCapital.GetCityHubName] a pris du retard." #deepl:984753109
 gaudi.517.f: "Pour des raisons inconnues, tout progresse plus lentement : qu'il s'agisse de l'agitation d'éléments politiques hostiles, de l'affaiblissement de l'éthique du travail par les syndicats, d'une conspiration des Illuminati ou simplement du mauvais temps." #deepl:967308050
 gaudi.517.g: "C'est regrettable." #deepl:1477108256
 gaudi.518.t: "Monument à [SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('gaudi_ruler').GetFullName]" #deepl:4291665084
 gaudi.518.d: "Un nouveau monument est prévu pour la Ringstrasse : il s'agit d'une statue de notre roi [SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle]." #deepl:642834231
 gaudi.518.f: "La Ringstrasse a servi à illustrer l'histoire autrichienne. D'une part, la longue lignée de monarques de la famille régnante des Habsbourg a été immortalisée, parmi lesquels Marie-Thérèse a reçu le monument le plus opulent. Mais des généraux comme Eugen von Savoyen ou Schwarzberg ont également enrichi le paysage urbain viennois. La bourgeoisie, quant à elle, attachait une grande importance à l'immortalisation de ses représentants, à savoir les princes poètes Goethe et Schiller, mais aussi les grands compositeurs Schubert, Mozart et Beethoven." #deepl:795951503
 gaudi.518.g: "Il est bon d'être le [SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle]." #deepl:2477877691
 gaudi.518.h: "Charmant - mais concentrez-vous plutôt sur l'achèvement de la Ringstrasse." #deepl:1336009648
 gaudi.519.t: "Feu !" #deepl:3279516897
 gaudi.519.d: "Un incendie dévastateur a détruit plusieurs bâtiments sur un chantier de construction à [ROOT.GetCountry.GetCapital.GetCityHubName]." #deepl:603406045
 gaudi.519.f: "La catastrophe la plus connue sur le périphérique est l'incendie du Ringtheater le 8 décembre 1881. Il s'agit de l'une des plus grandes catastrophes du 19e siècle. Les estimations font état de centaines, voire de plus d'un millier de victimes. L'incendie est dû à un défaut de l'éclairage au gaz, qui s'est échappé et a explosé lors de la prochaine tentative d'allumage. L'incendie qui en a résulté s'est propagé aux trains de fond de scène avant de s'étendre rapidement au reste de la scène et finalement à l'auditorium. L'incendie a eu des répercussions nationales et internationales sur la protection préventive contre les incendies, en particulier dans la zone du théâtre, et sur les dispositions légales correspondantes pour la construction de théâtres en Autriche. Le compositeur Anton Bruckner, qui avait des billets pour la représentation du soir, n'a échappé à la mort qu'en restant chez lui parce qu'il était souffrant." #deepl:1763422665
 gaudi.519.g: "Une journée terrible." #deepl:3953408834
 gaudi.520.t: "Préjugés à l'encontre de l'expansion de la ville" #deepl:3932558777
 gaudi.520.d: "Les représentants de la population rurale considèrent le développement de [ROOT.GetCountry.GetCapital.GetCityHubName] comme un désavantage pour la population rurale commune." #deepl:3359656956
 gaudi.520.f: "Le gouvernement montre clairement, par son attitude inqualifiable dans la capitale, qu'il est composé de citadins distants qui ne pensent qu'à quelques rues et qui n'ont jamais quitté [ROOT.GetCountry.GetCapital.GetCityHubName]. Des sommes énormes y sont dilapidées, qui ne parviennent qu'à la capitale, mais dont les simples campagnards des petites villes ou des villages ne s'aperçoivent pas. L'idéologie qui le sous-tend favorise le centralisme, la bureaucratie, l'appareil d'État, mais quelle perspective un projet aussi décadent offre-t-il à l'homme de la rue ?" #deepl:2119590629
 gaudi.520.g: "Que diriez-vous d'un cadeau amical au profit de la population rurale qui travaille dur ?" #deepl:1425408969
 gaudi.520.h: "La ville et la province sont égales." #deepl:154752402
 gaudi.520.i: "Qui se soucie de ce stupide discours d'agriculteur ?" #deepl:1424618973
 gaudi.521.t: "Résidence d'industriels" #deepl:1054941492
 gaudi.521.d: "Un riche homme d'affaires a fait construire un nouveau palais et a ainsi enrichi [ROOT.GetCountry.GetCapital.GetCityHubName] d'un grand bâtiment." #deepl:2324185893
 gaudi.521.f: "Les palais des industriels et des banquiers étaient considérés comme un moyen de souligner leur nouvelle position au sein de l'État. Les riches d'origine juive pouvaient également souligner leur émancipation. Le développement de Vienne au XIXe siècle en est un bon exemple. L'un des plus célèbres palais du périphérique est le Palais Epstein. Il a été construit pour l'industriel et banquier Gustav Ritter von Epstein. L'architecte était Theophil Freiherr von Hansen, qui a également conçu le bâtiment voisin du Parlement autrichien. Il compte jusqu'à cinq étages et est construit dans le style néo-renaissance typique de son époque." #deepl:2653721730
 gaudi.521.g: "[ROOT.GetCountry.GetCapital.GetCityHubName] se développe et prospère." #deepl:2259204183
 gaudi.522.t: "Extension des casernes" #deepl:3408528723
 gaudi.522.d: "L'expansion du site [ROOT.GetCountry.GetCapital.GetCityHubName] offre la possibilité de moderniser et d'agrandir les casernes." #deepl:933440251
 gaudi.522.f: "La caserne François-Joseph était un bâtiment viennois situé dans le quartier actuel de la Ringstrasse et a longtemps constitué un obstacle à la construction du grand projet. La caserne porte le nom de l'empereur François-Joseph Ier et a été construite en 1854-1857 dans le sillage de la révolution de 1848. Peu après sa construction, la caserne a entravé le développement de la Ringstrasse viennoise, qui a débuté en 1857, mais il a fallu attendre quatre décennies pour que l'armée déménage à nouveau. De nouvelles casernes ont donc dû être construites au préalable afin de compenser la perte de la caserne François-Joseph." #deepl:4162429863
 gaudi.522.g: "Agrandir la caserne." #deepl:2381627455
 gaudi.522.h: "Mieux vaut investir ce temps ailleurs." #deepl:3269234038
 gaudi.523.t: "Extension du secteur de la construction" #deepl:2392547084
 gaudi.523.d: "L'expansion du site [ROOT.GetCountry.GetCapital.GetCityHubName] offre la possibilité de développer le secteur de la construction. " #deepl:3106227577
 gaudi.523.f: "Nous appelons généralement "nature de l'artiste" la somme des qualités qui empêchent l'artiste de produire. - Arthur Schnitzler" #deepl:2115168723
 gaudi.523.g: "Agrandir le bureau de la construction." #deepl:771559939
 gaudi.524.t: "Un parc magnifique" #deepl:3707211248
 gaudi.524.d: "[ROOT.GetCountry.GetCapital.GetCityHubName]Le nouveau parc de la ville est achevé et est désormais ouvert à tous les citoyens pour des promenades." #deepl:2209166008
 gaudi.524.f: "Les portes du nouveau Stadtpark s'ouvrent. Les pelouses roulent comme du velours. Les allées serpentent entre les parterres de fleurs et les statues. Mais ce qui attire le plus les foules, ce n'est pas l'herbe, c'est le son. Un kiosque à musique, un petit orchestre, une valse qui dérive dans la brise. La musique publique, autrefois réservée aux salons et aux palais, est désormais accessible à tous. Dans des villes comme Vienne, le Kursalon est devenu un temple civique de la mélodie. Le magnifique bâtiment de style Renaissance italienne est situé dans la Johannesgasse et dispose d'une large terrasse dans le parc. À l'époque des frères Strauss, le Kursalon était un lieu populaire pour la danse et les concerts." #deepl:556984663
 gaudi.524.g: "Allons nous promener." #deepl:3870101360
 gaudi.524.h: "Célébrons l'événement par un concert !" #deepl:3249539672
 gaudi.525.t: "Prolonger l'opéra" #deepl:3647447347
 gaudi.525.d: "L'expansion du site [ROOT.GetCountry.GetCapital.GetCityHubName] offre la possibilité de moderniser et d'agrandir l'opéra." #deepl:1640821642
 gaudi.525.f: "Au milieu des boulevards et des arcades, des fontaines et des ministères, l'actuel opéra commence à se sentir modeste, voire provincial. La proposition : une nouvelle structure ou un vaste agrandissement. Plus de places, une meilleure acoustique, des façades monumentales. Un temple de la culture à la hauteur de la ville. Dans toute l'Europe, de tels gestes sont devenus des symboles de prestige national. À Paris, l'Opéra Garnier s'élève avec ses escaliers de marbre et ses plafonds dorés. À Vienne, le Staatsoper, inauguré en 1869, s'impose avec élégance et fierté sur la Ringstraße." #deepl:2327891128
 gaudi.525.g: "Agrandir l'opéra." #deepl:4005131669
 gaudi.526.t: "Extension de l'hôtel de ville" #deepl:857877700
 gaudi.526.d: "L'extension du site [ROOT.GetCountry.GetCapital.GetCityHubName] offre la possibilité de moderniser et d'agrandir l'hôtel de ville." #deepl:3575590115
 gaudi.526.f: "L'ancien hôtel de ville porte encore les armoiries d'un autre siècle. À l'intérieur : des escaliers étroits, des bureaux surchargés et des registres empilés plus haut que les lambris. Le bureau du maire est à peine assez grand pour y déposer ses papiers, et encore moins pour y exercer son pouvoir. La proposition actuelle : un nouvel hôtel de ville qui reflète le rôle croissant de la ville en matière de gouvernance, d'économie et d'identité civique. Flèches imposantes ou classicisme sobre : dans tous les cas, il doit être synonyme d'autorité. Dans toute l'Europe, des villes ont relevé ce défi. À Vienne, le Rathaus néogothique (achevé en 1883) est devenu un symbole de confiance municipale. Paris a restauré son Hôtel de Ville après 1871 avec grandeur et défi. Le Rotes Rathaus de Berlin est né de la fusion de la forme Renaissance et de la fonction prussienne." #deepl:2422046000
 gaudi.526.g: "Agrandir l'hôtel de ville." #deepl:5728920
 gaudi.527.t: "Heldenplatz" #deepl:959071592
 gaudi.527.d: "Après l'achèvement de la Heldenplatz (Place des Héros), certaines personnalités politiques de premier plan réclament une inauguration digne de ce nom." #deepl:1468121085
 gaudi.527.f: "Lorsque la Ringstrasse a été construite, la "Burgplatz extérieure" a été conçue sous l'empereur François-Joseph dans le cadre du Kaiserforum, qui n'a jamais été achevé. Le plan prévoyait la création d'une place rectangulaire encadrée par l'aile Léopoldine, la nouvelle Hofburg, les collections Habsbourg et un pendant du nouveau château qui n'a jamais été construit à l'emplacement du Volksgarten. Le nom de Heldenplatz a été fixé en 1878 ; il provient des deux monuments équestres, tous deux réalisés par Anton Dominik Fernkorn. Le plus ancien est celui de l'archiduc Karl, inauguré en 1860. Le pendant, la statue équestre du prince Eugène, a également été achevé en 1865. Après la perte de la Première Guerre mondiale, l'effondrement de la double monarchie austro-hongroise sous le règne de la dynastie Habsbourg-Lorraine et la fondation de la première république autrichienne, la Heldenplatz a servi de point de ralliement pour tous les camps politiques et de terrain de parade pour l'armée autrichienne." #deepl:562832934
 gaudi.527.g: "Organiser une parade et inviter nos amis." #deepl:99539180
 gaudi.527.h: "Établir un défilé militaire permanent pour les prochaines années." #deepl:3502479331
 gaudi.527.i: "Et qui doit payer pour tout cela ?" #deepl:3263444788
 gaudi.528.t: "L'extension de l'université" #deepl:2548530815
 gaudi.528.d: "L'expansion du site [ROOT.GetCountry.GetCapital.GetCityHubName] offre la possibilité de moderniser et d'agrandir l'université." #deepl:966048719
 gaudi.528.f: "Qu'est-ce qu'une grande ville sans pensée ? Au milieu des voies ferrées, des ministères et des théâtres, l'université commence à souffrir de son propre succès. Trop d'étudiants pour trop peu de salles. Des départements disséminés dans des bâtiments loués. Les professeurs se bousculent pour trouver de l'espace entre les bibliothèques et les laboratoires. La proposition est claire : un nouveau campus ou un agrandissement majeur - des amphithéâtres modernes, des facultés dédiées, une bibliothèque monumentale. Plus que des infrastructures, ces projets sont des déclarations d'ambition intellectuelle. À Vienne, l'université a été déplacée et reconstruite dans les années 1870 le long de la Ringstraße, avec une façade grandiose et une centralité symbolique. À Paris, la Sorbonne a été profondément agrandie dans le cadre des réformes de Jules Ferry afin d'accueillir la classe universitaire française en pleine expansion." #deepl:3542359765
 gaudi.528.g: "Développer l'université." #deepl:4228402238
 gaudi.529.t: "Extension de l'académie des beaux-arts" #deepl:1188603187
 gaudi.529.d: "L'expansion du site [ROOT.GetCountry.GetCapital.GetCityHubName] offre la possibilité de moderniser et d'agrandir l'académie des beaux-arts." #deepl:2971034584
 gaudi.529.f: "L'appétit de la ville pour l'art grandit au fur et à mesure qu'elle se développe. Pourtant, les peintres et les sculpteurs s'entassent dans de petits ateliers et des greniers obscurs, apprenant non pas auprès de maîtres, mais à partir de rumeurs et d'esquisses empruntées. La proposition : une véritable académie d'art, avec des ateliers lumineux, des théâtres anatomiques et des galeries ouvertes aux expositions publiques. Dans toute l'Europe, ces académies façonnent le goût national. L'École des beaux-arts de Paris fixe les normes classiques pour la moitié du continent. À Vienne, le grand bâtiment de l'Akademie der bildenden Künste ancre le prestige culturel de la Ringstraße." #deepl:2427288221
 gaudi.529.g: "Élargir l'académie." #deepl:3521772928
 gaudi.530.t: "Uranie" #deepl:3604286803
 gaudi.530.d: "Avec l'Urania, un soi-disant "centre d'éducation populaire" a été ouvert à Vienne, dont l'objectif exact est toujours contesté." #deepl:2388110616
 gaudi.530.f: "En 1883, l'astronome allemand Max Wilhelm Meyer est venu à Vienne pour calculer les éclipses solaires historiques et futures en tant qu'assistant à l'université de Vienne. Il donne également des conférences sur le folklore et développe l'idée d'une institution d'éducation populaire. Cependant, comme il a été appelé à Berlin en 1885, il a continué à développer ses idées dans cette ville. L'Uranie de Vienne était calquée sur celle de Berlin : elle pouvait accueillir 800 personnes et comprenait une salle de conférence pour 200 personnes, des salles pour les démonstrations scientifiques et un observatoire. Toutefois, cette Uranie "temporaire" ne pouvait guère faire face à l'afflux de visiteurs, de sorte qu'un nouveau bâtiment sur la Ringstrasse s'avéra rapidement nécessaire. L'Urania ne se contente pas d'élargir son offre de formation (notamment par des cours de langues), mais devient également un lieu de concerts, avec son propre orchestre symphonique Urania et sa propre chorale Urania. La forme et la construction non conventionnelles du bâtiment ont provoqué le scandale habituel à Vienne. Les Viennois ont cependant apprécié le bâtiment et l'Urania s'est rapidement imposé comme l'un des points de repère de Vienne." #deepl:2564552960
 gaudi.530.g: "Il s'agit d'un point de repère architectural." #deepl:631489671
 gaudi.530.h: "Il s'agit avant tout d'un établissement de divertissement." #deepl:1069754801
 gaudi.530.i: "Il s'agit avant tout d'un observatoire." #deepl:2017455388

 gaudi.9.t: "Urbanisme terminé" #deepl:1330111739
 gaudi.9.d: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] a achevé aujourd'hui des travaux d'urbanisme dans une importante ville de province. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] est à nouveau disponible dans son intégralité." #deepl:60424068
 gaudi.9.f: "L'architecture n'atteint pas son apogée tant qu'elle n'est pas imprégnée d'imagination et de fantaisie - pas d'imagination indisciplinée ou de fantaisie capricieuse - au point que le tissu ordonné ravit l'œil de tout observateur intelligent et suscite des émotions comme un poème. -Henry van Brunt" #deepl:2388189232
 gaudi.9.g: "Tant de projets, si peu de temps." #deepl:224764128

 gaudi_architecture_treatise_modifier: "Traité d'architecture" #deepl:1594143488

 gaudi.8.t: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetLastName]Traité d'architecture" #deepl:1170819237
 gaudi.8.d: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] a achevé son travail [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis]. [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U] traité d'architecture historique et contemporaine, enrichi de [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] réflexions théoriques, influencera les générations futures d'architectes." #deepl:66798799
 gaudi.8.f: "L'architecture a enregistré les grandes idées de l'humanité. Non seulement tous les symboles religieux, mais aussi toutes les pensées humaines ont leur page dans ce vaste livre". -Victor Hugo" #deepl:864116211
 gaudi.8.g: "Un ouvrage pour la postérité." #deepl:575316054

 je_gaudi_architecture_treatise: "Traité d'architecture" #deepl:1594143488
 je_gaudi_architecture_treatise_reason: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] s'est retiré complètement pendant un an pour compiler [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] ses connaissances antérieures de l'art architectural dans un livre. Ce livre se veut un manifeste de [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] vie, résumant toutes [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] expériences et théories sur l'architecture. [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U] réputation joue un rôle décisif dans la détermination de la valeur de l'œuvre. Toutefois, les traits de caractère tels que $literary$, $erudite$, $innovative$, et $aesthete$ sont également précieux." #deepl:9152525
