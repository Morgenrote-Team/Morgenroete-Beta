 curie.11.t: "Uranium trouvé !"
 curie.11.d: "Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] a découvert des gisements exceptionnellement riches en uranium lors de collectes d'échantillons au [SCOPE.sState('curie_uranium_state_scope').GetName]. Les physiciens et les chimistes recommandent d'exploiter directement le gisement."
 curie.11.f: "L'uranium (du nom de la planète Uranus) est un élément chimique portant le symbole d'élément U et le numéro atomique 92. Les composés de l'uranium ont été utilisés tout au long du XIXe siècle pour colorer le verre et la céramique, les vases et les pièces décoratives, mais aussi les objets du quotidien tels que les bols ou les lunettes. Les verriers de Joachimsthal (Bohême) ont utilisé cette technique dès 1826. L'uranium a été utilisé pour colorer le verre jusqu'au milieu du XXe siècle, puis seulement il a été remplacé par d'autres minéraux colorants moins nocifs. Des émaux céramiques contenant de l'uranium allant de l'orange au rouge vif ont été utilisés sur tout, de la vaisselle aux accessoires architecturaux. Cette céramique, appelée « Fiestaware » aux États-Unis en raison du nom d'un fabricant, est probablement l'un des objets les plus radioactifs que l'on puisse encore trouver dans de nombreux foyers américains."
 curie.11.g: "Construis une mine d'uranium juste ici !"
 curie.12.t: "Joachimsthal"
 curie.12.d: "A ce jour, la mine d'uranium de Joachimsthal, en Bohème, n'a produit que des petites quantités. Avec la hausse de la demande causée par la potentielle utilisation d'uranium dans l'industrie et la science, il y a maintenant des projets pour accroître significativement la production."
 curie.12.g: "Joachimsthal sera le barycentre de la production d'uranium !"