 dubois.443.f: "Les hommes attendaient une heure pour l'académique, qui s'était arrêté quelque part sur une pente et avait soudainement retiré les outils [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis]. Secouant la tête au début, ils avaient décidé de combiner le désagréable avec l'utile et avaient fait avancer le repas afin de ne pas perdre de temps inutilement. Cependant, le Dr [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] n'avait aucune intention de manger ou de venir. Lorsque le chef a menacé de poursuivre l'expédition sans le géologue, [ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe] a soudainement rejoint le groupe - avec une pierre étincelante dans la main [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis], dont la beauté a impressionné tous les collègues [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis]."
