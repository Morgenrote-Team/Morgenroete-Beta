 dubois.39.d: "Après des semaines de tentatives infructueuses et d'efforts sans fin, l'animal tant attendu a finalement été capturé. Le professeur [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] est ravi. Les héros rentrent chez eux avec l'animal qu'ils ont gagné. Certes, ce sera plus heureux dans le Nice National Zoo de [ROOT.GetCountry.GetNameNoFlag] que dans cette nature inconfortable!"
