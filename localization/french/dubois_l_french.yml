 dubois.1032.t: "Enclos de tortue de mer"
 dubois.1032.d: "L'enceinte #o Sea Turtle#! se compose principalement d'eau, enroulée par quelques petites plages de sable. La plupart des gens se sont rassemblés autour d'un petit trou, qui a permis de regarder les tortues dans l'eau."
 dubois.1032.f1: "Dans le monde sous-marin vibrant de l'enceinte de la mer Océanienne, une magnifique tortue de mer glisse gracieusement dans les eaux céruléennes, sa coquille élégante scintillait au soleil. Intrigué par sa présence sereine, vous approchez d'un biologiste marin compétent, désireux d'en savoir plus sur ce fascinant reptile marin. \ N \ n \ \"La tortue de mer océanienne, également connue sous le nom de tortue de mer verte, est une créature captivante qui navigue dans le vaste océan avec la grâce, \" Le biologiste marin commence. \ \"Ils se trouvent dans des eaux tropicales et subtropicales à travers l'océan Pacifique. Leur carapace de couleur olive, ou la coquille supérieure, et leurs puissants nageoires leur permettent de naviguer dans les courants et d'entreprendre de longues migrations, revenant à des plages spécifiques pour pondre leurs œufs. \""
 dubois.1032.f2: "Dans le récif corallien animé de l'enceinte de paysage marin océanien, une tortue mère de mer glisse gracieusement à travers l'écosystème marin vibrant, accompagné d'une trace de nouveau-nés. Intrigué par leur voyage, vous cherchez un gardien de zoo compétent, espérant en découvrir davantage sur le cycle de vie remarquable de la tortue océanienne de la mer. \ N \ n \ \"Le cycle de vie de la tortue de mer océanienne est un spectacle merveilleux de la nature, \" Le gardien de zoo explique. \ \"Après s'accoupler dans l'océan, la femelle s'aventure à terre pour pondre ses œufs sur des plages de sable. Elle creuse un nid dans le sable et dépose soigneusement ses œufs avant de les recouvrir de sable. Après une période d'incubation, les nouveau-nés émergent et rendent leur périlleux voyage de retour à l'océan, instinctivement guidé par le clair de lune. \""
 dubois.1032.f3: "Dans le vaste sanctuaire marin de l'enceinte des mers océaniennes, une douce tortue de mer se prélasse sur un récif corallien dynamique, sa nature patient captivant les spectateurs. Intriguée par son rôle dans l'écosystème, vous abordez un biologiste marin compétent, dans l'espoir de mieux comprendre l'importance de la tortue océanienne. \ N \ n \ \"La tortue océanienne joue un rôle vital dans le maintien de la santé des écosystèmes marins, \" Le biologiste marin. \ \"En tant qu'herbivores, ils paissent les herbiers marins et les algues, aidant à maintenir ces habitats en équilibre."
 dubois.1032.k: "Retour aux enclos australiens et océaniens"
 zoo_australian_enclosures_tt: "Vous reviendrez dans les enclos australiens et océaniens du zoo."
 dubois.1033.t: "Boîtier de Ray Manta"
 dubois.1033.d: "Un énorme aquarium abritait plusieurs rayons manta #o #o."
 dubois.1033.f1: "Dans le vaste royaume océanique, un majestueux rayant de manta glisse sans effort à travers les eaux azure, ses larges ailes gracieusement ondulées. Intrigué par sa douce présence, vous approchez d'un biologiste marin compétent, désireux d'en savoir plus sur cette créature marine captivante. \ N \ n \ \"Le rayon de manta est un magnifique habitant des mers, \" Le biologiste marin commence. \ \"Avec leurs corps en forme de diamant distinctifs et leurs nageoires pectorales en forme d'ailes, ils sont parfaitement adaptés à la vie en Océan ouvert. Ces géants doux peuvent devenir des tailles impressionnantes, certains individus offrant des ailes de plus de 6 mètres, ce qui en fait l'un des plus grands rayons du monde. \""
 dubois.1033.f2: "Dans le récif corallien dynamique de l'enceinte de l'habitat océanique, un rayon de manta glisse gracieusement à travers l'écosystème vibrant, ses mouvements élégants captivant les spectateurs. Intriguée par son rôle dans la communauté des récifs, vous recherchez un gardien de zoo compétent, espérant en découvrir davantage sur l'importance du rayon manta. \ N \ n \ \"Le rayon de manta joue un rôle vital dans l'écosystème du récif corallien, \" Le gardien de zoo explique. \ \"En tant que mangeoires filtrantes, ils consomment de grandes quantités de plancton, aidant à réguler les populations de ces minuscules organismes. Ce faisant, ils contribuent à la santé et à l'équilibre globaux du récif, soutenant la diversité d'espèces qui reposent sur ces écosystèmes délicats pour la survie. \""
 dubois.1033.f3: "Dans la vaste étendue du sanctuaire océanique, un groupe de rayons manta nagera gracieusement en schémas synchronisés, effectuant un ballet sous-marine fascinant. Intrigué par leur comportement social, vous abordez un biologiste marin compétent, espérant avoir un aperçu de la vie fascinante des rayons manta. \ N \ n \ \"Les rayons manta sont des créatures très intelligentes et sociales, \" le biologiste marin explique. \ \"Ils sont connus pour présenter des comportements sociaux complexes, formant souvent des groupes et se livrant à des expositions complexes de cour."
 dubois.1034.t: "Enceinte de koala"
 dubois.1034.d: "L'enceinte #o Koala#! était dominée par une grande forêt d'Eucalyptus dans laquelle vous pouviez repérer certains des animaux gris."
 dubois.1034.f1: "Dans la charmante enceinte du zoo, un koala endormi repose sur une branche d'eucalyptus, sa fourrure grise moelleuse se mélangeant avec la palette de couleurs modérée de l'environnement. Intrigué par sa présence pittoresque, vous approchez d'un gardien de zoo bien informé, désireux d'en savoir plus sur ce marsupial attachant. \ N \ n \ \"Le Koala, un délicieux natif australien, a capturé le cœur de beaucoup avec son apparence charmante, \" Le gardien de zoo commence. \ \"Ces créatures arboricoles sont parfaitement adaptées à leur habitat d'eucalyptus. Avec leurs membres forts, leurs griffes pointues et leurs chiffres opposables, ils naviguent de manière experte dans les branches et passent la majorité de leur temps à se prélasser et à se régaler des feuilles d'Eucalyptus. \""
 dubois.1034.f2: "Dans l'enceinte de Koala, une mère Koala câble son minuscule Joey, leur doux lien rappelant une scène d'une époque révolue. Intrigués par leur relation de développement, vous recherchez un gardien de zoo bien informé, dans l'espoir de découvrir davantage les soins maternels uniques du koala. \ N \ n \ \"Les koalas sont réputés pour leurs instincts maternels exceptionnels, \" Le gardien de zoo explique. \ \"Après une période de gestation d'environ un mois, la mère donne naissance à un minuscule Joey sous-développé. Le Joey rampe ensuite dans la pochette de la mère, où elle continue de croître et de se développer pendant plusieurs mois. La pochette offre de la chaleur, de la protection et un approvisionnement prêt de lait pour la croissance de Joey. \""
 dubois.1034.f3: "Au milieu de l'enceinte, un groupe de koalas émet une symphonie de soufflets à faible aigu et de grognements doux, remplissant l'air d'une ambiance enchanteresse. Intrigués par leurs vocalisations, vous abordez un gardien de zoo bien informé, dans l'espoir de comprendre la signification de ces sons. \ N \ n \ \"Les koalas ne sont pas des animaux particulièrement vocaux, mais ils ont leur propre façon unique de communiquer, \" le gardien de zoo. \ \"Les soufflets aigus, souvent émis par les hommes, servent d'appels territoriaux, proclamant leur présence à d'autres koalas. De plus, des grognements et des grognements doux peuvent être entendus pendant la saison des accouplements ou lorsque les individus recherchent une interaction sociale."
 dubois.1035.t: "Enceinte de kangourou"
 dubois.1035.d: "Une enceinte comme steppe abritait le #o kangaroos#!. Il était dominé par le long gras et quelques roches rouges."
 dubois.1035.f1: "Dans l'enceinte spacieuse du zoo, un groupe de kangourous saute gracieusement à travers le paysage, leurs puissantes pattes postérieures les propulsant sans effort. Leurs silhouettes distinctives dans la toile de fond naturel évoquent un sentiment d'émerveillement. Intrigué par leur locomotion unique, vous abordez un gardien de zoo bien informé, désireux d'en savoir plus sur ces marsupiaux captivants. \ N \ n \ \"Le Kangourou est un symbole emblématique de l'Australie et une véritable merveille de la nature, \" Le gardien de zoo commence. \ \"Avec leurs puissants pattes arrière et leurs longues queues, les kangourous ont évolué pour être des cavaliers remarquables. Cette adaptation extraordinaire leur permet de couvrir facilement de grandes distances, atteignant des vitesses de 40 miles par heure. C'est un spectacle à voir, en particulier pendant leurs affichages liés ludiques. \""
 dubois.1035.f2: "Dans l'habitat paisible du kangourou du zoo, une mère kangourou berce tendrement son Joey dans sa poche, leur lien évident dans chaque mouvement doux. Leur fourrure douce et leur pâturage doux évoquent une ambiance sereine. Intrigués par leur comportement de développement, vous recherchez un gardien de zoo bien informé, dans l'espoir de découvrir davantage les soins maternels uniques des Kangourous. \ N \ n \ \"Les kangourous sont connus pour leurs instincts maternels exceptionnels, \" Le gardien de zoo explique. \ \"Après une période de gestation relativement courte, le minuscule et sous-développé Joey est né. Il rampe instinctivement dans la pochette de la mère, où elle continue de croître et de se développer, recevant une nourriture et une protection. La poche fournit un environnement chaleureux et sûr pour le Joey, lui permettant de croître à son rythme. \""
 dubois.1035.f3: "Au milieu de l'enceinte de kangourou tranquille dans le zoo, un kangourou mâle émet une série de grognements profonds et de clics, communiquant sa domination à d'autres hommes. Intriguée par leurs vocalisations, vous abordez un gardien de zoo bien informé, dans l'espoir de comprendre la signification de ces sons. \ N \ n \ \"Les kangourous ont une façon unique de vocaliser, \" le Zookeeper partage. \ \"Les mâles émettent souvent des grognements profonds et des clics comme une forme de communication, affirmant leur domination et leur territoire."
 dubois.1036.t: "Enclos en ornithorynque"
 dubois.1036.d: "L'enceinte #o Platypus#! était dominée par un grand étang d'eau claire et frais. Le Platypi a passé la plupart de leur temps."
 dubois.1036.f1: "Dans l'habitat de la rivière tranquille du zoo, une curieuse créature connue sous le nom de Platypus glisse gracieusement dans l'eau, son corps élégant et ses pieds palmés le propulsant avec facilité. Son apparence unique captive les spectateurs. Intriguée par sa nature extraordinaire, vous abordez un gardien de zoo bien informé, désireux d'en savoir plus sur ce monotreme remarquable. \ N \ n \ \"Le Platypus est une créature vraiment fascinante et énigmatique, \" Le gardien de zoo commence. \ \"Trouvé dans les habitats d'eau douce de l'Australie, il possède une combinaison de caractéristiques qui semblent presque paradoxales. Avec sa facture de canard, sa queue de castor et ses pieds palmés, il témoigne des merveilles de l'évolution. Le parlace est l'un des rares mammifères qui jettent des œufs, ce qui en fait un exemple extraordinaire de la diversité de la nature. \" \""
 dubois.1036.f2: "Dans l'enceinte serein en ornithorynque du zoo, un ornithorynque de mère berce tendrement ses jeunes dans un terrier soigneusement construit, leurs corps à fourrure nichés ensemble dans une démonstration de chaleur et de protection. Intrigué par leurs habitudes de reproduction uniques, vous recherchez un gardien de zoo bien informé, dans l'espoir de découvrir davantage le cycle de vie fascinant de l'ornithorynque. \ N \ N \ \"Le parlace a une stratégie de reproduction remarquable\", explique le zookeeper. \"Après s'accoupler, la féminine se retire dans son terrier, qu'elle borde avec des feuilles et des herbes pour l'isolation. Là, elle pond un à trois œufs coriaces et les incube pendant environ dix jours. La mère ornithorynque allaitait alors son jeune avec le lait, ce qu'elle sécrète à partir de glandes mammaires spécialisées. Le platype. L'ingénuité de la véritable Marvel de la nature.\""
 dubois.1036.f3: "Au milieu de la végétation luxuriante de l'habitat de l'ornithorynque, un ornithoral masculin émet une série de grognements bas et de clics, un affichage vocal de sa présence et de sa territorialité. Intriguée par leurs vocalisations, vous abordez un gardien de zoo bien informé, dans l'espoir de comprendre la signification de ces sons. \ N \ n \ \"Platypi communiquez à travers une gamme de vocalisations, \" le Zookeeper partage. \ \"Les hommes émettent souvent de faibles grognements et cliquent comme appels territoriaux, signalant leur présence et établissant leur domination. Ces vocalisations peuvent servir d'avertissements à d'autres mâles à rester à l'écart ou à des invitations à des partenaires potentiels. Le répertoire vocal unique de l'ornithorynque ajoute à sa nature et à sa dynamique sociale."
 dubois.1036.f4: "#o Platypus Perry a disparu du zoo! #!\nMystery a frappé le zoo comme l'un de ses platypi - Perry - ne peut plus être situé. Soit il s'est enfui de son enceinte, soit il est très bon pour se cacher. Les deux gardiens de zoo, Phineas Flynn et Ferb Fletcher, sont sûrs que le petit animal reviendra sous peu. \ \"Perry se cache souvent dans un endroit que personne ne s'attendrait à lui. Mais il peut généralement être revu plus tard le même jour. Nous ne sommes pas du tout inquiets. \" \ N \ n#o Le scientifique a miraculeusement sauvé de l'explosion en laboratoire! #!\nThe Le scientifique Dr Heinz Doofenshmirtz a été presque tué dans un accident en laboratoire. Par une raison pour laquelle une de ses expériences a provoqué une énorme explosion prenant presque la vie du Dr Doofenschmirtz. Si ce n'était pas pour un héros inconnu, sa vie serait sûrement terminée."
 dubois.1032.g: "Un ornithorynque? Perry l'ornithorynque!"
 dubois_unknown_hero_modifier: "Héros inconnu"
 dubois.1037.t: "Enclos de caso"
 dubois.1037.d: "L'enceinte de casso-toile abritait un environnement en forme de jungle pour l'oiseau coloré. C'est la maison du jardinier de la forêt tropicale."
 dubois.1037.f1: "Dans l'enceinte captivante sur le thème de la forêt tropicale du zoo, une créature unique et énigmatique connue sous le nom de Cassowary erre avec une présence puissante, son plumage bleu et noir frappant et un casque distinct en forme de casque captivant l'attention des visiteurs. Intriguée par sa nature mystérieuse, vous abordez un gardien de zoo bien informé, désireux d'en savoir plus sur cet oiseau remarquable. \ N \ n \"La Cassowary est un véritable symbole de la diversité et de la résilience de la forêt tropicale\", commence le gardien de zoo. \"Ces grands oiseaux sans vol jouent un rôle crucial dans le maintien de l'équilibre de l'écosystème. Ils sont connus sous le nom de« jardiniers de la forêt tropicale », car leur alimentation comprend une variété de fruits et de plantes. En consommant ces fruits et en distribuant les graines à travers leurs excréments, les casestions contre la reproche et la durabilité de l'origine pluviale.\""
 dubois.1037.f2: "Dans l'habitat luxuriant et verdoyant du zoo, une cassose se déplace gracieusement à travers le sous-bois, ses jambes puissantes et son apparence frappante évoquant un sentiment d'émerveillement. Intrigués par ses adaptations uniques, vous recherchez un gardien de zoo bien informé, dans l'espoir de découvrir davantage les caractéristiques intrigantes de cet oiseau insaisissable. \ N \ n \"Cassowars sont connus pour leurs caractéristiques et comportements distinctifs\", explique le gardien de zoo. \"Leur casque, une structure en forme de casque sur leur tête, jouerait un rôle dans l'amplification sonore et éventuellement dans l'attraction de compagnons. Ils ont également des griffes nettes et de poignard sur leurs pieds qui peuvent être utilisées pour la défense ou pour déterrer des aliments. Ces adaptations témoignent de leur évolution dans l'environnement de la forêt pluviale.\""
 dubois.1037.f3: "Au milieu du feuillage dense de l'habitat de caso, une souci femelle protège son pochette d'œufs verts vibrants, son regard vigilant révélant une mère dévouée. Intriguée par son comportement de nidification, vous abordez un gardien de zoo bien informé, dans l'espoir de comprendre la signification de cet affichage. \ N \ n \"Le comportement de nidification du cassoy met en valeur leurs instincts maternels uniques\", partage le zoo-gardien. \"Les femmes assument la responsabilité d'incubation des œufs et d'élever les poussins, tandis que les mâles jouent un rôle moins actif. Le dévouement de la mère à protéger son embrayage et à élever son jeune démontre la dynamique sociale complexe de ces oiseaux et leur contribution vitale à l'écosystème de la forêt tropicale.\""
 dubois.1038.t: "Boîtier de spécialisation néo-zélandais"
 dubois.1038.d: "L'enceinte de spécialisation était dominée par un grand lac qui contenait diverses rochers. S'il n'y avait qu'un moyen de voir le spécial sous l'eau, cependant ..."
 dubois.1038.f1: "Dans l'exposition sur le thème côtier du zoo, une créature charismatique et aimante marine connue sous le nom de Sea Lion de la Nouvelle-Zélande se précipita au soleil, son corps élégant et son expression attachante capturant l'attention des visiteurs. Intrigué par sa présence unique, vous abordez un gardien de zoo bien informé, désireux d'en savoir plus sur ce mammifère marin captivant. \ N \ n \"Le lion maritime néo-zélandais est une véritable icône des océans du sud\", commence le zookeeper. \"Endémique à la Nouvelle-Zélande, ces marins sont connus pour leur nature ludique et leur lien fort avec le milieu marin. Ce sont des nageurs et des plongeurs qualifiés, capables de couvrir de longues distances dans la recherche de nourriture.\""
 dubois.1038.f2: "Dans l'habitat de mer tranquille du zoo, un lion de mer néo-zélandais glisse gracieusement dans l'eau, ses puissantes nageoires le propulsant avec facilité. La vue de ses prouesses aquatiques captive l'attention des visiteurs. Intrigués par ses capacités de natation, vous cherchez un gardien de zoo bien informé, dans l'espoir de découvrir davantage la vie de ces mammifères marins. \ N \ n \"La Nouvelle-Zélande Les Lions de mer sont des nageurs et des plongeurs exceptionnels\", explique le zookeeper. \"Ils ont des corps rationalisés et de fortes nageoires qui leur permettent de naviguer dans les courants de l'océan et de chasser leur régime alimentaire préféré de poissons, de calmars et d'autres créatures marines. Leurs grands yeux fournissent une excellente vision sous-marine, leur permettant de repérer les proies même dans les eaux troubles. Les regarder nager est un témoignage de leur adaptation à leur environnement marin.\""
 dubois.1038.f3: "Au milieu du littoral rocheux de l'habitat du lion de mer, un lion de mer de la Nouvelle-Zélande mâle émet un rugissement profond et résonnant qui porte les vagues, une exposition de sa présence et de sa territorialité. Intrigué par ses vocalisations, vous abordez un gardien de zoo bien informé, dans l'espoir de comprendre la signification de ces sons. \ N \ n \"Les vocalisations font partie intégrante de la dynamique sociale des lions marins néo-zélandais\", partage le zoo-gardien. \"Les mâles utilisent leurs rugissements distinctifs pour établir la domination et défendre leur territoire pendant la saison de reproduction. Ces vocalisations jouent également un rôle dans l'attraction de femmes pour l'accouplement. La variété des sons et des affichages dans lesquels ces lions de mer s'engagent est un témoignage de leur communication complexe et de leur structure sociale.\""
