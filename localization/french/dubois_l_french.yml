 dubois.149.t: "Cat de Pallas"
 dubois.149.d: "Notre zoo est enrichi par un nouvel animal exotique: aujourd'hui, le #O de Pallas tant attendu a déménagé dans sa nouvelle enceinte."
 dubois.149.f: "Le chat de Pallas est un petit félin sauvage qui vit dans les prairies et les régions montagneuses d'Asie centrale. Connu pour sa fourrure dense et moelleuse et sa construction trapue, il est bien adapté aux environnements froids. Les chats de Pallas sont solitaires et insaisissables, se cachent souvent dans les crevasses ou les terriers pour éviter les prédateurs. Ils chassent principalement les petits mammifères comme les rongeurs et les oiseaux, utilisant leur vue aiguë et leur furtivité."
 dubois.149.g: "Beau!"
 visit_pallas_tt: "Vous visiterez l'enceinte du #o Pallas's Cats#!"
