 dubois.901.t: "Congrès naturaliste: la place de l'homme dans la nature"
 dubois.901.d: "Les préparatifs de ce qui est peut-être le Congrès scientifique le plus important des années passées et passées. Il ne s'agira rien de moins que la classification taxonomique des humains - l'un des sujets les plus vif de tous après la création de la théorie de l'évolution par [SCOPE.sCharacter('dubois_darwin_scope').GetFullName]. Des invitations seront envoyées à tous les naturalistes du monde. Le professeur [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] présidera la session."
 dubois.901.f: "Au cours du 19e siècle, le différend sur la classification taxonomique des humains est venu à la tête en lien avec la formulation de la théorie de l'évolution. Bien qu'il soit connu depuis longtemps que les humains étaient similaires aux grands singes, et Carl Linnaeus les avait déjà placés dans l'ordre des primates, il y avait plusieurs réserves. Afin de souligner le caractère unique des humains, Johann Friedrich Blumenbach l'a distingué de tous les autres primates comme \"à deux mains\" (Bimana) de \"quatre mains\" (quadrumana). Cette classification, bien que assez récente, a gagné en popularité dans les cercles académiques, tels que l'influent paléontologue britannique Richard Owen. Pour les partisans de la théorie de l'évolution, c'était une situation intenable et pour les anatomistes une horreur - cela signifiait que, selon cet ordre, un gorille était plus proche d'un babouin en steppe qu'un être humain."
 dubois.901.g: "Le monde de la science devrait être notre invité."
 dubois.902.d: "[SCOPE.sCountry('dubois_congress_host_country').GetName] a invité à un Congrès scientifique international. Le sujet sera la classification taxonomique des humains à la lumière de la théorie de l'évolution. Le professeur [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] a reçu une invitation chaleureuse."
 dubois.902.g: "Nous ne manquerons pas cet événement."
 dubois.904.t: "La place de l'homme dans la nature: unique ou juste un autre singe?"
 dubois.904.d: "Après seulement deux conférences, il est devenu clair à quel point ce qui est essentiellement un processus administratif en zoologie est essentiellement. Même les amitiés académiques sont divisées sur la question de savoir comment les gens doivent être classés. Apparemment, ce n'est plus la question scientifique en tant que telle qui a gagné le dessus, mais plutôt les implications associées."
 dubois.904.f: "Après que les éléments morphologiques ont été mis sur le terrain pour la première fois, le débat a atteint un aspect particulier de l'anatomie: le cerveau. [SCOPE.sCharacter('dubois_hippocampus_defender_scope').GetFullName] a présenté plusieurs articles sur les différences anatomiques entre les singes et les humains, soulignant l'impossibilité des singes transmutés en hommes. Il a affirmé que les humains n'étaient pas simplement un ordre biologique distinct des primates, mais un sous-classe séparé de mammifères, distinct de tous les autres primates et mammifères en général. Le professeur [SCOPE.sCharacter('dubois_hippocampus_defender_scope').GetLastName] a basé cette classification sur trois caractéristiques, la plus importante étant son affirmation selon laquelle seul le cerveau humain a une mineure d'hippocampe. Cela a été contré par [SCOPE.sCharacter('dubois_hippocampus_attacker_scope').GetFullName], qui a insisté sur le fait que ces caractéristiques supposées uniques pouvaient en effet être trouvées dans de grands singes. Lorsqu'on lui a demandé s'il pouvait vivre avec l'idée d'être juste un singe modifié, le professeur [SCOPE.sCharacter('dubois_hippocampus_attacker_scope').GetLastName] a répondu: \"Il est aussi respectable d'être un singe modifié que la saleté modifiée.\""
 dubois.904.g: "L'homme est unique dans le règne animal."
 dubois.904.h: "Les humains sont plus étroitement liés aux singes qu'on ne le pensait auparavant."
 dubois.905.t: "Discours respecté"
 dubois.905.d: "[SCOPE.sCharacter('dubois_naturalist_scope').GetFullName] a donné une conférence au personnel scientifique assemblé du [SCOPE.sCountry('dubois_congress_host_country').GetName] qui a inspiré le public et les jeunes universitaires."
 dubois.905.f: "'Dit Owen, vous pouvez voir le cerveau de chimpanzee \ nis toujours extrêmement petit, \ nwith the hinterm' Horn '\ nof extrémité élugit, \ nand no' hippocampus 'du tout. \ Nnext huxley répond, \ nthat owen il se trouve, \ nand gremble sa citation latin; Peu. \ ndetrimental à sa réputation. '\ n -Sir Philip Egerton."
 dubois.905.g: "Le professeur [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] fait une impression considérable."
 dubois.906.t: "Contribution précieuse au débat"
 dubois.906.d: "Une brillante conférence scientifique du professeur [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] a élargi les horizons du monde académique au Congrès scientifique au [SCOPE.sCountry('dubois_congress_host_country').GetName]. Il aura probablement un effet durable."
 dubois.906.f: "«Il a tenu des théories très étranges sur de nombreuses choses. Il s'était même levé une fois à la British Association et a déclaré que les singes avaient des majors d'Hippopotamus dans leur cerveau comme les hommes. Ce qui était choquant à dire; Car, s'il en était ainsi, que deviendrait de la foi, de l'espoir et de la charité des millions d'immortels? Vous pouvez penser qu'il existe d'autres différences plus importantes entre vous et un singe, comme pouvoir parler, faire des machines, et savoir le bien du mal, et dire vos prières, et d'autres petites questions de ce genre; Mais c'est la fantaisie d'un enfant, ma chère. Rien ne devrait dépendre que le grand test d'Hippopotamus. Si vous avez une majeure d'Hippopotamus dans votre cerveau, vous n'êtes pas un singe, bien que vous ayez quatre mains, pas de pieds et étiez plus apish que les singes de toutes les apéries. -Charles Kingsley"
 dubois.907.t: "La question de l'hippopotame"
 dubois.907.d: "Le débat sur le rôle des humains dans le règne animal a déjà reçu une grande attention du public - d'une manière qui n'est pas exactement flatteuse. L'écrivain [SCOPE.sCharacter('dubois_hippopotamus_writer').GetLastName] se moque déjà du différend savant dans une œuvre."
 dubois.907.f: "«Nous étions très ravis, et je peux dire, tout à fait intéressé, de constater que nous avions tous les hippopotames dans notre cerveau. Certes, je n'en ai jamais ressenti dans le mien; Mais peut-être que c'est mort, et donc n'a pas remué, et puis bien sûr, ça ne compte pas, tu sais. Tout le monde a des cerveaux dans sa tête, à moins qu'il ne soit un squelette; Et il enroula ses choses à queue comme un singe, que je sais, car je l'ai vu de mes propres yeux. C'était le professeur Huxley a dit que c'était dans sa queue - pas celle de M. Huxley, bien sûr, mais celle des singes: seuls les singes n'ont pas de queue, donc je ne vois pas tout à fait. Et puis l'autre gentleman qui s'est levé en dernier, M. Flower, vous savez, il a dit que c'était partout dans le singe, partout. Partout dans l'hippocampe, de la tête aux pieds, une pauvre bête, comme un chien partout dans les tiques! Je me demande pourquoi ils ne frottent pas Bluestone à l'arrière de son cou, comme on le fait à un pointeur. Eh bien, alors. Où étais-je? Oh! Et le professeur Owen a dit que ce n'était pas du tout en singes: mais seulement dans l'ordre Bimana, c'est toi et moi. Eh bien, il sait mieux. Et ils connaissent tous le mieux aussi, car ce sont des camarades intelligents monstrueux. Donc, il faut avoir raison, et tout le reste mal, sinon l'un d'eux mal, et tout le reste - vous le voyez? Je me demande pourquoi ils ne se lancent pas à ce sujet. -Charles Kingsley"
 dubois.907.g: "C'est hilarant."
 dubois.908.t: "Échange intellectuel ou matériel"
 dubois.908.d: "Notre naturaliste a gagné du temps libre sur la touche du Congrès et réfléchit maintenant à la meilleure façon de l'utiliser."
 dubois.908.f: "[SCOPE.sCharacter('dubois_naturalist_scope').GetFullName] a rencontré des collègues intéressants du Congrès scientifique qui souhaitent échanger des idées sur certains sujets scientifiques. Un échange d'expériences serait extrêmement fructueux. D'un autre côté, le professeur pourrait également utiliser son temps pour échanger des collections de coléoptères et de plantes avec d'autres collègues ..."
 dubois.908.g: "Échangez des idées avec des collègues."
 dubois.908.h: "Échangez des échantillons avec des collègues."
 dubois.909.t_unique: "L'homme est unique"
 dubois.909.t_primate: "L'homme et les singes sont liés"
 dubois.909.d_unique: "Les naturalistes ont réglé leurs longs débats. Les humains ont une position spéciale dans le règne animal - c'est ce que les universitaires ont déclaré dans une déclaration finale, que le président du Congrès a lu cérémonieusement aujourd'hui."
 dubois.909.d_primate: "Certains professeurs ont quitté avec colère la salle comme le Congrès se terminait et la déclaration finale a été lue. Les humains, selon les universitaires, sont plus étroitement liés aux singes qu'on ne le pensait auparavant."
 dubois.909.f_unique: "«Chez l'homme, le cerveau présente une étape astenue dans le développement, plus élevée et plus fortement marquée que celle par laquelle la sous-classe précédente s'est distinguée de celle en dessous. Non seulement les hémisphères cérébraux chevauchent les lobes et le cervelet olfactifs, mais ils s'étendent avant l'un, et plus loin que l'autre. Leur développement postérieur est si marqué que les anatomistes ont attribué à cette partie le caractère d'un troisième lobe; Il est particulier au genre Homo, et tout aussi particulier est la «corne postérieure du ventricule latéral» et «l'hippocampe mineur», qui caractérise le lobe postérieur de chaque hémisphère. La matière grise superficielle du cerveau, à travers le nombre et la profondeur des convolutions, atteint son maximum d'étendue chez l'homme. Les puissances mentales particulières sont associées à cette forme de cerveau la plus élevée, et leurs conséquences illustrent merveilleusement la valeur du caractère cérébral; Selon mon estimation, je suis amené à considérer le genre Homo, comme non seulement un représentant d'un ordre distinct, mais d'une sous-classe distincte des mammifères, pour laquelle je propose un nom de «archencephala»."
 dubois.909.f_primate: "«Il est certain que le singe qui s'approche le plus de l'homme est soit le chimpanzé, soit le gorille. Dans les proportions générales du corps et des membres, il y a une différence remarquable entre le gorille et l'homme dans la proportion que le gorille diffère de l'homme, les autres singes quittent encore plus largement du gorille et que, par conséquent, de telles différences de proportion ne peuvent avoir aucune valeur ordinale. Dans la question importante de la capacité crânienne, les hommes diffèrent plus largement les uns des autres que les singes; tandis que les singes les plus bas diffèrent autant, en proportion, du plus haut, comme le fait ce dernier de l'homme. Par conséquent, il est évident que, considérablement comme la dentition du singe le plus élevé diffère de l'homme, il diffère beaucoup plus de celui des singes inférieurs et les plus bas. Ainsi, quel que soit le système d'organes, la comparaison de leurs modifications dans la série APE conduit à un seul et même résultat - que les différences structurelles qui séparent l'homme du gorille et du chimpanzé ne sont pas aussi grandes que celles qui séparent le gorille des singes inférieurs. -Thomas Henry Huxley"
 dubois.909.g: "L'homme est la couronne de la création."
 dubois.909.h: "Sommes-nous juste des singes sans poils?"
 dubois.911.t: "Congrès anthropologique: origine des humains modernes"
 dubois.911.d: "Notre pays accueillera le Congrès le plus important de l'histoire de l'anthropologie. L'une des grandes questions de l'humanité, à savoir celle de son origine, doit être clarifiée. Les anthropologues du monde entier discuteront si cela s'est produit en Europe, en Asie ou en Afrique. [SCOPE.sCharacter('lepsius_anthropologist_scope').GetFullName] mènera le débat."
 dubois.911.f: "D'où vient l'homme? L'histoire biblique sur l'expulsion du paradis contient déjà le cœur de cette question - il ne vient évidemment pas de la région dans laquelle il vit aujourd'hui. Par conséquent, pendant longtemps en Europe, les anciens os humains étaient censés être les restes des personnes qui ont péri dans la grande inondation - tout comme les dinosaures étaient considérés depuis longtemps être des animaux qui n'avaient pas de place dans l'arche. Avec la postulation de la théorie de l'âge glaciaire et des études géologiques et paléontologiques ultérieures, qui ont montré que la Terre était significativement plus âgée que prévu, l'intérêt pour les «hommes des cavernes» augmentait. Au plus tard avec la théorie de l'évolution et la découverte d'os préhistoriques qui avaient plus de quelques milliers d'années, la question de la place d'origine des humains modernes est devenue plus virulente."
 dubois.911.g: "Où est le berceau de l'humanité?"
 dubois.912.d: "[SCOPE.sCountry('dubois_congress_host_country').GetName] a invité à un Congrès scientifique international. Le sujet sera l'origine des humains modernes. Le professeur [SCOPE.sCharacter('lepsius_anthropologist_scope').GetLastName] a reçu une invitation chaleureuse."
 dubois.914.t: "Les humains modernes ont-ils émergé en Europe, en Asie ou en Afrique?"
 dubois.914.d: "Le monde académique s'est divisé en trois camps. La question du berceau de l'humanité n'est pas seulement liée à une certaine fierté nationale, mais aussi à des thèses sur l'évolution humaine."
 dubois.914.f: "Dans un débat stimulant, les défenseurs respectifs des trois camps ont échangé leurs arguments. [SCOPE.sCharacter('dubois_europe_defender_scope').GetLastName] a amené l'Europe sur le terrain parce que les découvertes ont jusqu'à présent montré le plus grand volume cérébral des fossiles européens. Étant donné que le cerveau plus grand a précédé la marche verticale, cela est inévitable. [SCOPE.sCharacter('dubois_asia_defender_scope').GetLastName] doutait de cette théorie. Les fossiles de représentants de la marche droite, de type humain, ont déjà été trouvés en Asie - le cerveau n'a donc été développé qu'après la marche debout. [SCOPE.sCharacter('dubois_africa_defender_scope').GetLastName], en revanche, a souligné que les espèces de singes connues les plus proches des humains venaient d'Afrique, pas d'Asie. Comme l'inventeur de la théorie de l'évolution l'avait fondée, l'origine de l'humanité a dû y être trouvée."
 dubois.914.g: "Les humains modernes se sont développés en Europe."
 dubois.914.h: "Tout pointe vers une origine asiatique."
 dubois.914.i: "Le berceau de l'humanité réside en Afrique."
 dubois.915.t: "Discours respecté"
 dubois.915.d: "[SCOPE.sCharacter('lepsius_anthropologist_scope').GetFullName] a donné une conférence au personnel scientifique assemblé du [SCOPE.sCountry('dubois_congress_host_country').GetName] qui a inspiré le public et les jeunes universitaires."
 dubois.915.f: "«La Terre est le berceau de l'humanité, mais l'humanité ne peut pas rester dans le berceau pour toujours.» \ N -Konstantin Tsiolkovsky."
 dubois.915.g: "Le professeur [SCOPE.sCharacter('lepsius_anthropologist_scope').GetLastName] fait une impression considérable."
 dubois.916.t: "Contribution précieuse au débat"
 dubois.916.d: "Une brillante conférence scientifique du professeur [SCOPE.sCharacter('lepsius_anthropologist_scope').GetFullName] a élargi les horizons du monde académique au Congrès scientifique au [SCOPE.sCountry('dubois_congress_host_country').GetName]. Il aura probablement un effet durable."
 dubois.916.f: "«Il a tenu des théories très étranges sur de nombreuses choses. Il s'était même levé une fois à la British Association et a déclaré que les singes avaient des majors d'Hippopotamus dans leur cerveau comme les hommes. Ce qui était choquant à dire; Car, s'il en était ainsi, que deviendrait de la foi, de l'espoir et de la charité des millions d'immortels? Vous pouvez penser qu'il existe d'autres différences plus importantes entre vous et un singe, comme pouvoir parler, faire des machines, et savoir le bien du mal, et dire vos prières, et d'autres petites questions de ce genre; Mais c'est la fantaisie d'un enfant, ma chère. Rien ne devrait dépendre que le grand test d'Hippopotamus. Si vous avez une majeure d'Hippopotamus dans votre cerveau, vous n'êtes pas un singe, bien que vous ayez quatre mains, pas de pieds et étiez plus apish que les singes de toutes les apéries. -Charles Kingsley"
 dubois.917.t: "Crâne mystérieux"
 dubois.917.d: "Un anthropologue amateur s'est présenté à la conférence avec un fossile inconnu. Il aimerait le vendre à la société scientifique, mais à un prix horrible. De nombreux anthropologues rejettent l'approche «Pig in a poke»."
 dubois.917.f: ""
 dubois.917.g: "Chaque os est précieux pour notre collection."
 dubois.917.h: "... Mais cet os est évidemment sans valeur."
 dubois.919.t_europe: "Les humains modernes viennent d'Europe"
 dubois.919.t_asia: "Les humains modernes viennent d'Asie"
 dubois.919.t_africa: "Les humains modernes viennent d'Afrique"
 dubois.919.d_europe: "La science internationale a convenu d'une origine européenne de l'humanité moderne. Les chercheurs non européens ont dénoncé cette décision de suprématisme."
 dubois.919.d_asia: "Le Congrès anthropologique international a récemment convenu du compromis que les humains devaient provenir d'Asie. La plupart des membres de l'Assemblée étaient d'accord avec ce point de vue."
 dubois.919.d_africa: "Après un débat final très controversé, les scientifiques ont pu convenir par une majorité étroite que l'origine de l'humanité devrait être située en Afrique."
 dubois.919.f_europe: "Historiquement, la question du lieu d'origine de l'humanité n'a pas été résolue au début du 20e siècle. Alors qu'un petit groupe, en partie induit en erreur par la découverte du soi-disant homme de Piltdown, soupçonnait l'origine de l'homme moderne moins pour les raisons scientifiques que idéologiques, la théorie de l'Asie avait reçu le plus de soutien. Les découvertes sur Java et la récupération de l'homme de Pékin ont joué un grand rôle dans ce domaine. Ce n'est qu'à partir du milieu du 20e siècle que de plus en plus de trouvailles africaines ont commencé à éroder cette vue."
 dubois.919.f_asia: "Historiquement, la question du lieu d'origine de l'humanité n'a pas été résolue au début du 20e siècle. Alors qu'un petit groupe, en partie induit en erreur par la découverte du soi-disant homme de Piltdown, soupçonnait l'origine de l'homme moderne moins pour les raisons scientifiques que idéologiques, la théorie de l'Asie avait reçu le plus de soutien. Les découvertes sur Java et la récupération de l'homme de Pékin ont joué un grand rôle dans ce domaine. Ce n'est qu'à partir du milieu du 20e siècle que de plus en plus de trouvailles africaines ont commencé à éroder cette vue."
 dubois.919.f_africa: "Historiquement, la question du lieu d'origine de l'humanité n'a pas été résolue au début du 20e siècle. Alors qu'un petit groupe, en partie induit en erreur par la découverte du soi-disant homme de Piltdown, soupçonnait l'origine de l'homme moderne moins pour les raisons scientifiques que idéologiques, la théorie de l'Asie avait reçu le plus de soutien. Les découvertes sur Java et la récupération de l'homme de Pékin ont joué un grand rôle dans ce domaine. Ce n'est qu'à partir du milieu du 20e siècle que de plus en plus de trouvailles africaines ont commencé à éroder cette vue."
 dubois.919.g: "Comme prévu, l'humanité a évolué en Europe."
 dubois.919.h: "Toutes les preuves suggèrent que l'humanité a évolué en Asie."
 dubois.919.i: "«Out of Africa» est maintenant une thèse approuvée."
 dubois.921.t: "Congrès paléontologique: extinction des dinosaures"
 dubois.921.d: "Notre nation a l'honneur de préparer l'un des congrès les plus importants de la paléontologie. Les scientifiques du monde entier afflueront vers [SCOPE.sCountry('dubois_congress_host_country').GetName] pour répondre à la question de savoir pourquoi les dinosaures se sont éteints. [SCOPE.sCharacter('dubois_paleontologist_scope').GetFullName] a déjà choisi son casque de moelle préféré à porter lors de son discours d'ouverture."
 dubois.921.f: "La question de ce qui a conduit à l'extinction des dinosaures a tourmenté l'humanité depuis le jour où l'os du premier dinosaure a été trouvé et classé dans le cadre d'une espèce inconnue. Avant le XIXe siècle, les gens se contentaient de rejeter les dinosaures comme les animaux qui ne sont pas arrivés dans l'arche de Noé à l'inondation. À mesure que de nouvelles méthodes géologiques et paléontologiques se sont développées, l'image est devenue plus nuancée. L'idée d'inondation vivait toujours avec Georges Cuvier, bien que dans la direction opposée: il pensait que le niveau de la mer avait coulé et que les lézards qu'il avait situés dans les zones humides avaient perdu leur habitat. Ce n'était que l'une des nombreuses théories qui poussent au cours du siècle prochain et demi - des réponses insatisfaisantes."
 dubois.921.g: "Cette question sera-t-elle jamais répondue?"
 dubois.922.d: "[SCOPE.sCountry('dubois_congress_host_country').GetName] a invité à un Congrès scientifique international. Le sujet sera la cause de l'extinction des dinosaures. Le professeur [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] a reçu une invitation chaleureuse."
 dubois.922.f: "Ce sera l'événement de la décennie."
 dubois.923.t: "Théorie révolutionnaire de [SCOPE.sCharacter('verrier_astronomer_scope').GetLastName]"
 dubois.923.d: "Peu de temps avant le début du Congrès, l'astronome le plus reconnu de notre pays, [SCOPE.sCharacter('verrier_astronomer_scope').GetFullName], a annoncé qu'il avait sa propre idée de ce qui aurait pu conduire à l'extinction des dinosaures: un impact astéroïde! Il demande que cette thèse se propage parmi les paléontologues."
 dubois.923.f: "Bien que le professeur [SCOPE.sCharacter('verrier_astronomer_scope').GetLastName] ne soit pas paléontologue, il connaissait les phénomènes cosmiques - et connaissait leur pouvoir destructeur. Le XIXe siècle avait vu de grandes comètes incroyables dans le ciel, mais en même temps, dans le cas de Tunguska, il avait vécu ce que les morceaux de roche extraterrestres pouvaient faire. L'astronome a non seulement fait des calculs théoriques, mais a également fait prélever des échantillons qui contenaient des matériaux inhabituels dans certaines couches de roche, y compris celles à la fin du Crétacé. En communication constante avec le professeur [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName], les deux scientifiques célèbres ont échangé leurs opinions et, avec l'aide de la connaissance physique la plus moderne, sont arrivées à la conclusion qu'un impact astéroïde était la cause la plus logique de la fin de l'âge du dinosaure - pas tant à cause de l'impact, mais à cause des conséquences écologiques et climatiques."
 dubois.923.g: "C'est une idée fascinante."
 dubois.923.h: "C'est complètement absurde."
 dubois.924.t: "Pourquoi les dinosaures se sont-ils décédés?"
 dubois.924.d: "Les paléontologues se sont réunis - et les opinions diffèrent sur la question de l'extinction de masse à la fin du Crétacé. Il n'y a pas deux ou trois camps - mais un méli-mélo de thèses qui ne diffèrent souvent que légèrement en termes de probabilité et de folie."
 dubois.924.f: "Depuis la découverte des dinosaures, les tentatives les plus fantastiques pour expliquer pourquoi les dinosaures ont disparu de la terre circulaient. Voici juste une sélection."
 dubois.924.a: "La raison en était un impact astéroïde."
 dubois.924.g: "Le niveau de la mer a baissé et a détruit les habitats."
 dubois.924.h: "Les contenus d'oxygène de l'atmosphère de la Terre ont atteint des niveaux mieux adaptés aux oiseaux et aux mammifères."
 dubois.924.i: "Les traits inadaptés ont conduit à une impasse évolutive."
 dubois.924.j: "La diminution de l'activité sexuelle conduit à l'extinction."
 dubois.924.k: "Gigantisme pathologique!"
 dubois.924.l: "Concurrence avec des mammifères qui ont mangé leurs œufs."
 dubois.924.m: "Changement climatique."
 dubois.924.n: "Éruptions volcaniques."
 dubois.924.o: "Bombardement à partir de rayonnement cosmique ou ultraviolet."
 dubois.924.p: "La taille du cerveau des dinosaures a diminué au cours du Mésozoïque jusqu'à ce qu'ils soient devenus trop stupides pour vivre."
 dubois.929.t: "Le Congrès paléontologique se termine"
 dubois.929.d_asteroid: "Dans une dernière déclaration, le Congrès paléontologique a annoncé qu'elle avait pris une décision: la thèse qu'un impact astéroïde a scellé la fin des dinosaures seul semble être une idée convaincante."
 dubois.929.d_climate: "Avec un soupir consterné, le professeur du pays d'accueil a commencé une conférence aujourd'hui qui a souligné avec consternation l'extinction des dinosaures en raison du changement climatique."
 dubois.929.d_sex: "Un peu timide et avec beaucoup de clairière de la gorge, le président du Congrès paléontologique explique que le manque de reproduction sexuelle était la raison de la disparition des dinosaures. L'interjection du professeur Tottenham selon lequel il avait toujours pensé que sa femme était un brontosaure a été réprimandée dans les minutes."
 dubois.929.d_mammals: "Après des jours de discussion, les paléontologues sont arrivés à la conclusion que la concurrence avec les mammifères annonçait la fin des dinosaures. Ils soupçonnent que les rongeurs auraient préféré manger des œufs de dinosaures."
 dubois.929.d_fat: "Aujourd'hui, d'un ton de conviction, le président du Congrès paléontologique a lu avec toute la gravité un document qui a soutenu la croyance que les dinosaures étaient tout simplement devenus trop gros et trop gros, ce qui a conduit à leur extinction inévitable. Le commentaire du professeur Tottenham selon lequel cela signifiait que le siège du président deviendrait bientôt vacant a entraîné une réprimande publique."
 dubois.929.d_stupid: "La déclaration finale lue aujourd'hui par le Congrès paléontologique explique en détail que le cerveau des dinosaures est devenu de plus en plus petit au cours des millions d'années jusqu'à ce que, en fin de compte, ils étaient tout simplement trop stupides pour survivre. La déclaration du professeur Tottenham selon laquelle cela aurait également été souhaitable pour certains collègues scientifiques avant que le Congrès ne soit inclus dans le procès-verbal."
 dubois.929.f: "C'est ce que certains scientifiques importants du XIXe et du début du XXe siècle ont réellement cru réellement."
 dubois.929.g: "Un impact astéroïde était responsable."
 dubois.929.h: "Une théorie maladroite, mais la seule acceptée."
