 dubois.158.d: "Notre zoo est enrichi par un nouvel animal exotique: aujourd'hui, le #O thylacine#! tant attendu a déménagé dans sa nouvelle enceinte."
 dubois.158.f: "La thylacine, également connue sous le nom de tigre Tasmanien, était un marsupial carnivore originaire de Tasmanie et d'Australie. Il avait un dos rayé distinctif et était principalement nocturne. Les thylacines étaient des chasseurs solitaires, s'appuyant sur la furtivité pour attraper des proies telles que les petits mammifères et les oiseaux. Malheureusement, en raison de la chasse et de la perte d'habitat, la thylacine est désormais considérée comme éteinte."
 dubois.158.g: "Comme c'est mignon!"
 visit_thylacine_tt: "Vous visiterez l'enceinte du #o thylacines#!"
