 dubois.2051.iguanodon: "Iguanodon"
 dubois.2051.plateosaurus: "Plaque"
 dubois.2051.giraffatitan: "Giraffatitan"
 dubois.2051.spinosaurus: "Spinosaurus"
 dubois.2051.psittacosaurus: "Psittacosaurus"
 dubois.2051.velociraptor: "Vélociraptor"
 dubois.2051.muttaburrasaurus: "Muttaburrasaurus"
 dubois.2051.rhoetosaurus: "Rhoetosaure"
 dubois.2051.g: "Visitez les squelettes nord-américains."
 dubois.2051.h: "Visitez les squelettes sud-américains."
 dubois.2051.i: "Visitez les squelettes européens."
 dubois.2051.j: "Visitez les squelettes africains."
