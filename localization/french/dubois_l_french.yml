 dubois_theory_of_evolution_tech: "Théorie de l'évolution"
 dubois_theory_of_evolution_tech_desc: "La rupture cruciale du concept de types typologiques constantes en biologie est venue avec la théorie de l'évolution par la sélection naturelle. Darwin a noté que la croissance démographique conduirait à une «lutte pour l'existence» dans laquelle les variations favorables prévalaient à mesure que d'autres ont péri. Cela pourrait expliquer la diversité des plantes et des animaux d'une ascendance commune. Certains ont été dérangés par cela car cela impliquait que les humains n'avaient pas de place spéciale dans l'univers."
 dubois_paleontology_tech: "Paléontologie"
 dubois_paleontology_tech_desc: "Un intérêt pour l'histoire de la Terre et des animaux éteints remonte à l'antiquité et a atteint un premier pic avec les études de Georges Cuvier vers 1800. Mais la publication de la «sur l'origine des espèces» a été un événement de bassin versant dans toutes les sciences de la vie, en particulier la paléontologie. Le débat scientifique qui a commencé immédiatement après la publication de «Origin» a conduit à un effort concerté pour rechercher des fossiles de transition et d'autres preuves d'évolution dans le dossier fossile."
 dubois_genetics_tech: "Génétique"
 dubois_genetics_tech_desc: "La génétique moderne a commencé avec le travail du frère augustin Gregor Johann Mendel. La redécouverte de 1900 du travail de Mendel a conduit à des progrès rapides de la génétique. En 1915, les principes de base de la génétique mendélienne avaient été étudiés dans une grande variété d'organismes - notamment la mouche des fruits Drosophila melanogaster. Parallèlement aux travaux expérimentaux, les mathématiciens ont développé le cadre statistique de la génétique de la population, introduisant des explications génétiques dans l'étude de l'évolution."
 dubois_naturalist: "Naturaliste"
 dubois_naturalist_desc: "Les naturalistes collectent des spécimens et peuvent attraper des animaux."
 dubois_naturalist_experienced: "Naturaliste expérimenté"
 dubois_naturalist_experienced_desc: "Ce naturaliste a reçu une reconnaissance considérable pour ses efforts incessants pour accroître la connaissance de la nature et collecter des spécimens."
 dubois_naturalist_famous: "Naturaliste célèbre"
 dubois_naturalist_famous_desc: "En raison de ses contributions pionnières à la science naturelle, ce naturaliste est considéré comme le représentant le plus éminent de son domaine dans le monde."
 dubois_paleontologist: "Paléontologiste"
 dubois_paleontologist_desc: "Ce chercheur étudie les fossiles d'espèces animales éteintes."
