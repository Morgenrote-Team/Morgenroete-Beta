 dubois_getting_grizzly: "\ n- Vous pouvez trouver le #n Grizzly Bears#! dans les États de #bold Montana#!, #bold Washington#!, #bold British Columbia#!, #bold Alberta#! et #bold Idaho#!"
 dubois_nam_enclosure_eagle: "\ n- #o EAGLES BALD#!"
 dubois_getting_eagle: "\ n- Vous pouvez trouver le #n EAGLES BALD#! dans les États de #bold Maine#!, #bold Québec#!, #bold Ontario#!, #bold Carolina#! du Nord et #bold South Carolina#!"
