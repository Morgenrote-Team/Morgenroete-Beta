 dubois.139.d: "Notre zoo est enrichi par un nouvel animal exotique: aujourd'hui, le #O gorilla#! tant attendu a déménagé dans sa nouvelle enceinte."
 dubois.139.f: "Le gorille, originaire des forêts d'Afrique centrale, est le plus grand des grands singes. Avec sa construction puissante et son regard intelligent, il vit dans des groupes sociaux dirigés par un homme dominant connu sous le nom de Silverback. Les gorilles sont principalement des herbivores, se nourrissant de feuilles, de tiges et de fruits. Malgré leur taille et leur force, ils sont généralement doux et timides, passant la plupart de leur temps à chercher et à se reposer dans leur habitat forestier."
 dubois.139.g: "Ils sont énormes!"
 visit_gorilla_tt: "Vous visiterez l'enceinte du #o gorillas#!"
