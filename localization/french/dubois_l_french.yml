 dubois.2171.t: "Section générale du squelette"
 dubois.2171.d: "Quel squelette visiter?"
 dubois.2171.f: "Certains squelettes peuvent être trouvés dans le monde entier. La plupart d'entre eux étaient des dinosaures marins ou d'autres autres créatures des mers."
 dubois.2171.g: "Mosasaurus."
 dubois.2172.t: "Mosasaure"
 dubois.2172.f: "Mosasaurus n'est en fait pas un dinosaure mais un reptile marin. Ils vivaient dans les océans du Crétacé. Il existe de nombreuses espèces différentes de Mosasaurus qui s'adaptent à différentes régions. Beaucoup d'entre eux étaient des prédateurs Apex et des poissons, des requins et d'autres dinosaures et des reptiles marins."
 dubois.2172.h: "Retour à la collection générale"
