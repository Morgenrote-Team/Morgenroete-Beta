 dubois_panda_baby: "#b panda babies#!"
 dubois_lion_baby_birth_flavor: "Deux petits lions rampaient autour de leur mère. Il est né il y a quelques semaines, mais ils ont été gardés dans une cachette par leur mère pendant un certain temps. Maintenant, ils ont finalement pu voir le monde, jouer et Rollick. Ils étaient adorables!"
 dubois_otter_baby_birth_flavor: "C'était la première fois que la petite loutre allait dans l'eau pour nager. Cela avait l'air assez bien pour être une première fois. Puis le petit animal est sorti de l'eau et s'est couché sur une roche chaude."
 dubois_jaguar_baby_birth_flavor: "Le petit Jaguar, seulement environ 6 semaines, a suivi sa mère. Cela avait l'air assez maladroit. Mais bientôt, cela deviendrait un prédateur dangereux."
 dubois_koala_baby_birth_flavor: "Le petit koala s'est maintenu au dos de sa mère. C'était déjà assez vieux mais toujours dépendant de la mère. Soudain, il a attrapé une feuille de l'un des arbres et a commencé à grignoter dessus."
 dubois_panda_baby_birth_flavor: "Le petit panda avait l'air si innocent. Il a roulé et semblait être assez maladroit. Mais sa mère l'a gardé à son avis. Rien ne pouvait arriver à la petite chose."
 dubois.1250.t: "Parc national de Yosemite?"
 dubois.1250.d: "Certains écologistes influents veulent créer un parc national dans la vallée de Yosemite pour protéger son paysage unique. La vallée est un endroit unique avec des vues à couper le souffle. La question est de préférer une réserve naturelle ou voulons-nous utiliser la vallée pour l'agriculture, l'exploitation forestière et l'exploitation minière?"
 dubois.1250.f: "\ \"Mais aucun temple fait avec des mains ne peut se comparer avec Yosemite. Chaque rocher de son mur semble briller de vie. \" \ N - John Muir"
 dubois.1250.g: "C'est une excellente idée!"
 dubois.1250.h: "En fait, cela ressemble à un endroit idéal pour l'exploitation minière!"
 dubois.1251.t: "Les derniers sofes"
 dubois.1251.d: "Le sœur, le bison européen, est presque éteint. Seuls quelques animaux restent dans la forêt de Białowieża. Jusqu'en 1830, la forêt a été protégée, mais après le soulèvement de Novèmeber, presque tous les postes des forestiers ont été abolis. La visite de [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullNameNoFormatting] pourrait conduire à rétablir un [concept_dubois_nature_reserve] dans la forêt."
 dubois.1251.f: "\ \"Białowieża est la dernière forêt primitive de l'Europe et abrite les derniers sages. C'est une merveille naturelle! \" \ N \ \"mais ces arbres pourraient être abattus et stimuler notre économie! \""
 dubois.1251.g: "Nous devons protéger les sages!"
 dubois.1251.h: "Cette forêt est parfaite pour l'exploitation forestière."
 dubois.1252.t: "Une réserve de chasse royale à Gran Paradiso?"
 dubois.1252.d: "La chasse à Gran Paradiso est merveilleuse! D'autant plus que c'est le dernier endroit où vit le #b alpine ibex#!. Après une chasse là-bas, [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullNameNoFormatting] a pensé à établir un [Concept('concept_dubois_nature_reserve','$concept_dubois_royal_hunting_reserve$')] pour protéger les derniers ibex."
 dubois.1252.f: "\ \"Comment ces gens du commun osent-ils tuer mon ibex? Seulement, je suis autorisé à les chasser! Nous devons protéger mon jeu de ces sauvages! \" \ N \ n#b Historiquement, #! Le parc national de Gran Paradiso a été fondée en 1922 lorsque Vittorio Emanuele III a fait don des terres de la réserve de chasse royale pour créer le premier parc national d'Italie. La protection de l'Alpine Ibex était toujours l'une des tâches les plus importantes du parc. En 1922, il y avait environ 3000 ibexes dans le parc. Ce nombre a chuté pendant le régime fasciste et la Seconde Guerre mondiale, mais plus tard, la population s'est rétablie et il y a environ 4000 ibexes dans le parc national aujourd'hui."
 dubois.1252.g: "J'ai trouvé la réserve de chasse royale immédiatement!"
 dubois.1252.h: "Peut-être plus tard ..."
