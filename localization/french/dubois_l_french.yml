 dubois.52.t: "Foresterie de haute qualité"
 dubois.52.d: "Le Dr [ROOT.Var('dubois_naturalist_var').GetCharacter.GetLastName] a atteint l'objectif [ROOT.Var('dubois_naturalist_var').GetCharacter.GetHerHis]. Grâce à une sélection minutieuse de semis particulièrement résistants, à des mesures pour la lutte naturelle des ravageurs et à l'étude de plusieurs animaux et plantes dans la symbiose, [ROOT.Var('dubois_naturalist_var').GetCharacter.GetSheHe] a renforcé durablement l'industrie forestière de notre pays. Ces mesures écologiques sont également susceptibles d'apporter des avantages économiques."
 dubois.52.f: "«Je suis désolé, quoi? Voulez-vous couper les arbres? Je suis allé à tous les problèmes de les élever, de les nourrir et de m'occuper d'eux, et maintenant ces monstres capitalistes veulent tuer mes chéris? Oh mon Dieu, qu'est-ce que j'ai fait!"
 dubois.52.g: "Plus de bois pour tout le monde!"
 dubois.53.t: "Arbres en caoutchouc de haute qualité"
 dubois.53.d: "Le Dr [ROOT.Var('dubois_naturalist_var').GetCharacter.GetLastName] a atteint l'objectif [ROOT.Var('dubois_naturalist_var').GetCharacter.GetHerHis]. Grâce à une sélection minutieuse de semis particulièrement résistants, à des mesures pour la lutte naturelle des ravageurs et à l'étude de plusieurs animaux et plantes dans la symbiose, [ROOT.Var('dubois_naturalist_var').GetCharacter.GetSheHe] a renforcé durablement l'industrie forestière de notre pays. Ces mesures écologiques sont également susceptibles d'apporter des avantages économiques."
 dubois.53.f: "«Pourquoi tout le monde est-il intéressé par le caoutchouc complètement inutile? Je n'ai fait cela que parce que je suis intéressé par le moustique des marécages néohéspérialistes. Cet petit animal facilement mortel ne se reproduit que dans ce climat."
 dubois.53.g: "Plus de caoutchouc pour tout le monde!"
 dubois.22.t: "Prof. [ROOT.Var('dubois_naturalist_var').GetCharacter.GetLastName] Documents [SCOPE.GetRootScope.GetCountry.GetCustom('dubois_animal_documentation_name')]"
 dubois.22.d: "Après des mois d'observation de l'animal dans son habitat indigène, [ROOT.Var('dubois_naturalist_var').GetCharacter.GetFullName] a terminé ses observations. Son traité, #YELLOW '[SCOPE.GetRootScope.GetCountry.GetCustom('dubois_animal_documentation_title')]'#!, est maintenant disponible. [SCOPE.GetRootScope.GetCountry.GetCustom('dubois_animal_documentation_topic')]"
 dubois.22.g: "Réservez une copie pour la bibliothèque nationale."
 dubois_document_new_animal_tt: "Prof. [ROOT.Var('dubois_naturalist_var').GetCharacter.GetLastName] documente le #ORANGE [SCOPE.GetRootScope.GetCountry.GetCustom('dubois_animal_documentation_name')]#!"
 je_dubois_native_animal: "Documentation d'un animal indigène"
 je_dubois_native_animal_reason: "Le professeur [ROOT.Var('dubois_naturalist_var').GetCharacter.GetLastName] étudie un animal domestique dans son habitat naturel. L'expérience, les compétences et les traits de caractère, ainsi que l'université en mettant l'accent sur l'histoire naturelle, ont une influence sur la durée de ce processus. L'animal [ROOT.Var('dubois_naturalist_var').GetCharacter.GetSheHe] études est le #ORANGE [SCOPE.GetRootScope.GetCountry.GetCustom('dubois_animal_documentation_name')]#!."
