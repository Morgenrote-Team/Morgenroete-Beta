 dubois.31.l: "Pursue the Gorilla"
 dubois.32.t.gorilla_1: "Un gorille fort"
 dubois.32.t.gorilla_2: "Deuxième observation d'un gorille"
 dubois.32.t.gorilla_3: "Un autre gorille"
 dubois.32.f.gorilla.1: "Dans les forêts en bouc des Highlands, une poitrine profonde et résonante battent par le fait de sous-bois dense - un son qui envoie un frisson dans la colonne vertébrale de chaque créature vivante à portée de voix. Là, parmi les anciens arbres, le gorille à dos argenté fait connaître sa présence. Diminue et formidable, il est à la fois un protecteur et un souverain de sa troupe. Le professeur [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] regarde avec admiration le grand singe affirme sa domination, menant sa famille avec une grâce qui dément son immense pouvoir. Le naturaliste, déchiré entre l'admiration et le devoir, prépare son équipement, sachant que capturer cette créature majestueuse pour le zoo peut être la tâche la plus intimidante à ce jour."
 dubois.32.f.gorilla.2: "Alors que le soleil commence à se coucher derrière l'horizon montagneux, la jungle prend vie avec les sons de la nature. Grâce à la canopée dense, une famille de gorilles émerge, leurs mouvements délibérés et imprégnés de but. Le plus jeune parmi eux s'accroche au dos de sa mère, tandis que l'imposant arrière argenté évoque l'arrière, ses yeux vigilants scratant tout signe de danger. Le professeur [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] retient son souffle, ses jumelles formées sur cet aperçu rare et éphémère dans la vie de ces nobles créatures. L'idée de séparer une telle famille pèse lourdement dans son esprit, mais la pression des clients du zoo lui laisse peu de choix - il doit procéder, même si cela signifie perturber l'harmonie de la jungle."
 dubois.32.f.gorilla.3: "Au fond du cœur de la forêt tropicale, où l'air est épais avec l'odeur de la Terre et les appels des créatures invisibles, les gorilles font leur maison. Le silyback imposant, avec sa fourrure et sage et sage, connaissant les yeux, est le chef incontesté de sa troupe. Ses mains massives bercent doucement un jeune gorille, une rare affichage de tendresse d'un être aussi puissant. Le professeur [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] regarde ce moment intime à distance, en conflit par le dilemme éthique devant lui. Les clients du zoo s'attendent à des résultats, mais comme il observe les liens sociaux complexes entre ces animaux remarquables, il commence à se demander si une cage pourrait vraiment tenir l'esprit de la nature."
 dubois.33.d.gorilla: "À la recherche du #O Gorilla#!,, notre équipe de safari a rencontré une incroyable flore. Le professeur [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] est enclin à faire une pause."
 dubois.34.d.gorilla: "Le safari, qui visait à capturer le # o gorilla#!,, doit être interrompu. Le professeur [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] est manquant!"
 je_dubois_safari_gorilla: "Africa Safari: gorille"
 je_dubois_safari_gorilla_reason: "Sur un safari africain, grâce à un suivi et à un piégeage constants, le grand jeu peut être capturé puis transporté vers un [concept_dubois_zoo]. Il est seulement possible d'attraper un animal par safari. Selon les espèces animales, cela diffère que vous ayez besoin de pièges ou que vous ayez à rester sur leur sentier. En règle générale, les grands animaux lents ont besoin de plus de pièges, tandis que les animaux rapides nécessitent plus de suivi. Le safari dure 300 jours. Si aucun animal n'est capturé d'ici là, l'équipe de safari quittera à nouveau le pays - sans succès. Les animaux \ n \ naggants peuvent se défendre et attaquer lors du piégeage. Les animaux timides prennent leur envol. Un [concept_dubois_naturalist] qui a le trait zoologiste peut résoudre de telles situations sans désavantage. De nouvelles technologies telles que #ORANGE Machine Gun#! ou #ORANGE Moteur de combustion #! facilitent le suivi et le piégeage des animaux."
 dubois.228.d: "Qui aurait attendu un Majestiy Eagle provenant de la Nouvelle-Zélande de tous les endroits? Le professeur [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] a trouvé divers os d'un gigantesque aigle qui avait une envergure massive de 2,6 mètres (8 pi 6 po). Le professeur [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] suppose que cet oiseau a peut-être inspiré la légende de Pouākai, un mythe du maori."
