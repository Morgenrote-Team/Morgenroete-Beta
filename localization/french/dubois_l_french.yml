 dubois.1302.meerkat: "Suerkats"
 dubois.138.t: "Suerkat"
 dubois.138.d: "Notre zoo est enrichi par un nouvel animal exotique: aujourd'hui, le #O très attendu #O Meerkat#! a déménagé dans sa nouvelle enceinte."
 dubois.138.f: "Le Meerkat est une petite mangouste qui vit en Afrique. Les meerkats sont extrêmement sociaux et vivent ensemble dans des packs composés de 30 animaux. Habituellement, ils vivent dans des terriers ou des grottes où ils peuvent se cacher des prédateurs. Habituellement, au moins un meerkat est occupé à rechercher le danger et à avertir le pack. Le travail de Lookout alterne entre les animaux."
 dubois.138.g: "Comme c'est mignon!"
 visit_meerkat_tt: "Vous visiterez l'enceinte du #o Meerkats#!"
