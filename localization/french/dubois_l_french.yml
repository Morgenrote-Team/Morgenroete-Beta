 dubois.1021.t: "Les enclos asiatiques"
 dubois.1021.d: "La partie asiatique du zoo est décorée de motifs asiatiques traditionnels et de huttes et de pagodes asiatiques. Il y a même certaines statues de dragons et d'animaux asiatiques typiques. C'est comme si vous étiez en Asie."
