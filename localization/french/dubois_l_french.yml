 dubois.118.d: "Notre zoo est enrichi par un nouvel animal exotique: aujourd'hui, le #O tant attendu Capybara#! a déménagé dans sa nouvelle enceinte."
 dubois.118.f: "Le Capybara, le plus grand rongeur du monde, est originaire d'Amérique du Sud. Avec ses pieds palmés et son style de vie semi-aquatique, il prospère dans les zones humides et le long des berges. Les capybaras sont des animaux hautement sociaux, vivant souvent en groupes de 10 à 20 individus. Ils se nourrissent principalement d'herbes et de plantes aquatiques et sont connus pour leur nature douce et docile. Malgré leur taille, ce sont d'excellents nageurs et peuvent rester submergés pour éviter les prédateurs."
 dubois.118.g: "C'est un énorme cobaye!"
