 dubois.1069.t: "Enclos de capybara"
 dubois.1069.d: "L'enceinte de Capybara comprenait une zone herbeuse luxuriante entourant un grand étang. Tout de suite, vous avez remarqué plusieurs de ces grands rongeurs doux se prélasserant près du bord de l'eau, tandis que d'autres pataugeaient tranquillement dans l'eau peu profonde. Leur comportement de comportement détendu et d'un groupe serré a immédiatement attiré l'attention des visiteurs."
 dubois.1069.f1: "Dans l'enceinte de Capybara nouée au soleil, un petit groupe de ces grands rongeurs se détend par le bord de l'eau, certains grignotant paresseusement sur l'herbe tandis que d'autres se prélassent à l'ombre. Leur comportement social calme attire immédiatement l'attention des visiteurs. Curieux de leur style de vie, vous abordez un gardien de zoo pour plus d'informations. \ N \ \"Capybaras sont des animaux incroyablement sociaux, \" le gardien de zoo. \ \"Ils vivent en groupes, parfois aussi grands que 20 ou plus, et sont rarement vus seuls. Leurs forts liens sociaux sont essentiels à leur survie, offrant une protection contre les prédateurs et les aidant à maintenir leur structure familiale très unie. Ils communiquent avec une variété de sons, y compris des ronronnements et des sifflets, pour rester connectés les uns avec les autres. \""
 dubois.1069.f2: "Dans l'habitat animé de Capybara, un Capybara particulièrement aventureux se pose dans l'étang, s'immergeant jusqu'à son nez, tandis que les autres emboîtent le pas, éclaboussant avec espièglerie dans l'eau. La vue de ces grands rongeurs appréciant leurs nageurs captivait les spectateurs. Intrigués par ce comportement, vous demandez à un gardien de zoo plus de détails. \ N \ \"Les capybaras sont semi-aquatiques et sont d'excellents nageurs, \" Le Zookeeper partage. \ \"Ils passent beaucoup de temps dans l'eau, ce qui les aide à réguler leur température corporelle et à échapper aux prédateurs. Ils peuvent même dormir dans l'eau avec juste leur nez au-dessus de la surface. Cette affinité pour l'eau est une partie vitale de leur comportement naturel, et c'est là qu'ils se sentent le plus à l'aise. \""
 dubois.1069.f3: "Lorsque vous regardez le groupe Capybara dans leur enceinte, une vague soudaine de mouvement attire votre attention. L'un des plus jeunes Capybaras a trouvé une parcelle d'herbe particulièrement savoureuse et grignote avec enthousiasme, incitant les autres à vous rassembler et à se joindre à nous. L'alimentation communautaire est réconfortante de témoigner, et vous décidez d'en savoir plus en parlant à un gardien de zoo. \ N \ \"Capybaras sont des herbivores et en passant beaucoup de temps à rédiger ensemble, \" The Zookeeper explique. \ \"Leur régime se compose principalement de graminées et de plantes aquatiques, qu'ils partagent volontiers les uns avec les autres. Ils ont un système digestif unique qui leur permet d'extraire les nutriments maximaux de leur alimentation fibreuse, referment souvent leurs aliments pour s'assurer qu'ils obtiennent toute la nutrition dont ils ont besoin. Leur groupe d'alimentation de groupe renforce leurs fortes liaisons sociales et aide à maintenir la nutrition au sein du groupe. \" \""
