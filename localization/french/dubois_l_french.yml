 dubois.1210.t: "L'habitat dans le [ROOT.GetState.GetName] est en danger"
 dubois.1210.d: "La compréhension toujours croissante de la civilisation se heurte au [Concept('concept_dubois_habitat','$concept_dubois_animal_habitat$')] dans [ROOT.GetState.GetName]. Si nous ne protégeons pas notre faune locale en construisant un [concept_dubois_nature_reserve], les animaux disparaîtront dans environ 10 ans."
 dubois.1210.f: "Machines voraces qui mangent dans le sol. Des villes tentaculaires qui dévorent de plus en plus de terres. Les lignes de train qui traversent les étendues de floraison. Chaque jour, les animaux perdent plus de leur royaume. Étape par étape, les humains empiètent dessus."
 dubois.1210.g: "Nous devons protéger ces animaux!"
 dubois.1210.h: "Progres avant tout!"
 dubois_endangered_habitat_tt: "Lorsqu'un [concept_dubois_habitat] deviendra en danger, il sera supprimé après 10 ans. Vous pouvez l'empêcher en construisant un [concept_dubois_nature_reserve] dans l'État. De cette façon, vous protégerez le [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] contre l'extinction."
