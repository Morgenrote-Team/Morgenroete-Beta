 dubois.2011.d_to_location: "Le professeur [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] est le principal [concept_dubois_paleontologist] de notre pays. [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetSheHe] se rend actuellement à une formation rocheuse pour l'examiner de plus près."
 dubois.2011.d_from_location: "Le professeur [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] est le principal [concept_dubois_paleontologist] de notre pays. [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetSheHe] revient actuellement d'une chasse fossile."
 dubois.2011.d_default: "Le professeur [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] est le principal [concept_dubois_paleontologist] de notre pays. [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetSheHe] n'a actuellement aucune affectation."
 dubois.2011.d_other: "Le professeur [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] est le principal [concept_dubois_paleontologist] de notre pays. [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetSheHe] est occupé ailleurs pour le moment."
 dubois.2011.f: "[ROOT.Var('dubois_paleontologist_var').GetCharacter.GetFullName] a un [concept_academics_experience] paléontologique total de #G [ROOT.Var('dubois_paleontologist_var').GetVariable('dubois_paleontologist_experience_var').GetValue]#!\n\nPalaeontologists peut trouver de nouveaux fossiles en formations chaque année. De grandes formations ont également une chance de découvrir des os de dinosaures rares qui peuvent être utilisés pour reconstruire les squelettes. Pour ce faire, le [concept_dubois_paleontologist] doit être attribué à une formation. Si aucune formation n'est à l'intérieur de ses frontières, un accord de licence paléontologique peut également être négocié avec un pays qui a une grande formation. Sans affectation à une formation, le paléontologue reste inactif. Pendant ce temps, cependant, le [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetSheHe] peut être utilisé pour les expéditions, la reconstruction des os de dinosaures, la construction du squelette ou le remontage du squelette."
 dubois.2011.g: "Enquêter sur les formations en Amérique du Nord."
 dubois.2011.h: "Enquêter sur les formations en Amérique du Sud."
 dubois.2011.i: "Enquêter sur les formations en Europe."
 dubois.2011.j: "Enquêter sur les formations en Afrique."
