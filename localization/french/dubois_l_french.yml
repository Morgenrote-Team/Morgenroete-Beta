 dubois_show_animal_decisions_tt: "Montrer toutes les décisions animales."
 dubois_extend_zoo_small_decision: "Étendre le [concept_dubois_zoo] (petit)"
 dubois_extend_zoo_small_decision_desc: "[Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] sont le bonheur de chacun: les gens se dispersent dans le zoo, les scientifiques peuvent poursuivre leurs études zoologiques et le prestige international est accordé à ceux qui peuvent montrer le plus grand nombre possible de faune étrangère. À chaque expansion, le prestige d'une nation augmente. Certaines étapes d'expansion nécessitent non seulement de collecter de nombreux animaux, mais aussi de différentes parties du monde."
 dubois_extend_zoo_medium_decision: "Étendre le [concept_dubois_zoo] (médium)"
 dubois_extend_zoo_medium_decision_desc: "[Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] sont le bonheur de chacun: les gens se dispersent dans le zoo, les scientifiques peuvent poursuivre leurs études zoologiques et le prestige international est accordé à ceux qui peuvent montrer le plus grand nombre possible de faune étrangère. À chaque expansion, le prestige d'une nation augmente. Certaines étapes d'expansion nécessitent non seulement de collecter de nombreux animaux, mais aussi de différentes parties du monde."
 dubois_extend_zoo_large_decision: "Étendre le [concept_dubois_zoo] (grand)"
 dubois_extend_zoo_large_decision_desc: "[Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] sont le bonheur de chacun: les gens se dispersent dans le zoo, les scientifiques peuvent poursuivre leurs études zoologiques et le prestige international est accordé à ceux qui peuvent montrer le plus grand nombre possible de faune étrangère. À chaque expansion, le prestige d'une nation augmente. Certaines étapes d'expansion nécessitent non seulement de collecter de nombreux animaux, mais aussi de différentes parties du monde."
 dubois_extend_zoo_famous_decision: "Étendre le [concept_dubois_zoo] (célèbre)"
 dubois_extend_zoo_famous_decision_desc: "[Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] sont le bonheur de chacun: les gens se dispersent dans le zoo, les scientifiques peuvent poursuivre leurs études zoologiques et le prestige international est accordé à ceux qui peuvent montrer le plus grand nombre possible de faune étrangère. À chaque expansion, le prestige d'une nation augmente. Certaines étapes d'expansion nécessitent non seulement de collecter de nombreux animaux, mais aussi de différentes parties du monde."
 dubois_catch_local_animal_decision: "Attraper les animaux locaux"
 dubois_catch_local_animal_decision_desc: "Notre nation a des habitats animaux avec des espèces fascinantes qui pourraient être affichées dans un [concept_dubois_zoo]. Un expert animal doit voyager à travers le pays pendant un an pour collecter [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] pour un zoo."
 dubois_visit_zoo_decision: "Visitez le zoo"
 dubois_visit_zoo_decision_desc: "Ouvre l'événement du zoo où vous pouvez visiter votre zoo et voir tous les animaux que vous avez collectés."
 dubois_ban_animal_export_decision: "Interdire l'exportation des animaux"
 dubois_ban_animal_export_decision_desc: "Avec l'interdiction des exportations d'animaux, nous indiquons clairement que nous ne sommes pas prêts à vendre aucun de nos animaux à l'étranger. D'autres nations s'abstiendront des demandes de renseignements."
 dubois_allow_animal_export_decision: "Autoriser les exportations d'animaux"
 dubois_allow_animal_export_decision_desc: "Avec un permis d'exportation pour les animaux, nous pouvons gagner un bon revenu supplémentaire."
 dubois_collect_specimen_decision: "Collectez [concept_dubois_specimen]"
 dubois_collect_specimen_decision_desc: "Une collection de divers [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] d'origine zoologique et botanique bénéficierait non seulement à nos chercheurs à la maison, mais représenterait également une exposition de l'esprit et des découvertes intéressants de notre nation."
 dubois_safari_decision: "Afrique Safari"
 dubois_safari_decision_desc: "Sur un safari africain, grâce à un suivi et à un piégeage constants, le grand jeu peut être capturé puis transporté vers un [concept_dubois_zoo]. Il est seulement possible d'attraper un animal par safari. Selon les espèces animales, cela diffère que vous ayez besoin de pièges ou que vous ayez à rester sur leur sentier. En règle générale, les grands animaux lents ont besoin de plus de pièges, tandis que les animaux rapides nécessitent plus de suivi."
 je_dubois_safari: "Afrique Safari"
 je_dubois_safari_reason: "Sur un safari africain, grâce à un suivi et à un piégeage constants, le grand jeu peut être capturé puis transporté vers un [concept_dubois_zoo]. Il est seulement possible d'attraper un animal par safari. Selon les espèces animales, cela diffère que vous ayez besoin de pièges ou que vous ayez à rester sur leur sentier. En règle générale, les grands animaux lents ont besoin de plus de pièges, tandis que les animaux rapides nécessitent plus de suivi."
 je_dubois_safari_goal: "L'Africa Safari dure un demi-an. Si aucun animal n'est capturé d'ici là, l'équipe de safari quittera à nouveau le pays - sans succès."
 je_dubois_safari_fail: "L'Africa Safari dure un demi-an. Si aucun animal n'est capturé d'ici là, l'équipe de safari quittera à nouveau le pays - sans succès."
 je_dubois_dinosaur_excavation: "Excavation de dinosaures"
 je_dubois_dinosaur_excavation_reason: "Après avoir trouvé un os de dinosaure, le professeur [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] a commencé une fouille à grande échelle. Au cours de l'enquête d'un an, il est possible, selon l'expérience, que notre [concept_dubois_paleontologist] trouvera un à trois os de dinosaure supplémentaire. À la fin de l'excavation, une autre découverte de l'os de dinosaure est possible, nous n'avons donc pas encore trouvé tous les os possibles pour un squelette de dinosaure. Il faut 5 os pour construire un squelette dans la collection paléontologique."
 je_dubois_dinosaur_excavation_goal: "Après douze mois, notre [concept_dubois_paleontologist] résumera les résultats."
 je_dubois_mountain_expedition: "Tenter une première ascension"
 je_dubois_mountain_expedition_reason: "Une équipe d'alpinisme dirigée par le [SCOPE.sCharacter('dubois_mountain_expedition_leader').GetFullName] tente actuellement de gravir une montagne auparavant non clirée en [SCOPE.sState('dubois_summit_location').GetName]. La longueur de l'expédition et son succès dépendent de l'altitude des montagnes et de l'expérience du leader."
 je_dubois_mountain_expedition_goal: "La montagne est grimpée lorsque nous avons suffisamment de progrès #O d'escalade #! et aucune catastrophe n'arrive jusque-là."
 je_dubois_mountain_expedition_invalid: "L'expédition sera annulée si l'État dans lequel l'expédition a lieu change de main pour quelque raison que ce soit."
 dubois_specimen_tt: "Avoir au moins #G 50 000#! @dubois_specimen! #O biologique [Concept('concept_dubois_specimen','$concept_dubois_specimens$')]#!"
 dubois_promote_humanities_button: "Promouvoir les sciences humaines"
 dubois_promote_humanities_button_desc: "Afin de s'assurer que le prochain scientifique est un [concept_lepsius_archaeologist], nous devons avoir au moins une université avec un [concept_pm_academics_university_humanities]."
 dubois_promote_natural_history_button: "Promouvoir l'histoire naturelle"
 dubois_promote_natural_history_button_desc: "Afin de s'assurer que le prochain scientifique est un [concept_dubois_naturalist] et [concept_dubois_paleontologist], nous devons avoir au moins une université avec un [concept_pm_academics_university_natural_history]."
 dubois_promote_mathematics_button: "Promouvoir les mathématiques"
 dubois_promote_mathematics_button_desc: "Afin de s'assurer que le prochain scientifique est un [concept_gaudi_engineer] ou [concept_verrier_astronomer], nous devons avoir au moins une université avec un [concept_pm_academics_university_mathematics]."
 notification_dubois_paleontological_report_notification_name: "Rapport paléontologique annuel"
 notification_dubois_paleontological_report_notification_desc: "Nos [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')] ont trouvé [GetPlayer.MakeScope.Var('dubois_fossils_notification_var').GetValue|0+=] de nouveaux fossiles cette année."
 notification_dubois_java_man_notification_name: "[INITIATOR_COUNTRY.GetName] découvre Java Man"
 notification_dubois_java_man_notification_desc: "Un [concept_dubois_paleontologist] de [INITIATOR_COUNTRY.GetName] a découvert un squelette important sur Java qui pourrait répondre aux questions sur l'évolution humaine."
 notification_dubois_botanical_report_notification_name: "Rapport botanique annuel"
 notification_dubois_botanical_report_notification_desc: "Notre [Concept('concept_dubois_naturalist','$concept_dubois_naturalists$')] a trouvé [GetPlayer.MakeScope.Var('dubois_specimen_notification_var').GetValue|0+=] un nouveau spécimen cette année."
 dubois.1.t: "Inauguration du zoo"
 dubois.1.d: "Le jour de l'ouverture du nouveau [concept_dubois_zoo], les visiteurs affluent pour voir les animaux. Bientôt, il y avait un désir de construire encore plus de boîtiers et de régler les animaux."
 dubois.1.f: "«Il y a deux nuits, j'ai vu les Tigers Sup à Exeter changer. Sauf le lion de Veli Pacha dans la Morea, qui a suivi le gardien arabe comme un chien, le penchant de l'hyaena pour son gardien m'a le plus amusé. Une telle conversion! - Il y avait un «hippopotame», comme Lord Liverpool au visage; Et le «paresseux d'Ursine» a la voix et la manière même de mon voiturier - mais le tigre a trop parlé. L'éléphant a pris et m'a encore donné mon argent - a enlevé mon chapeau, a ouvert une porte. Tranche un fouet et se comporta si bien, que j'aurais aimé qu'il soit mon majordome. Le plus bel animal de la Terre est l'une des Panthers; Mais les pauvres antilopes étaient morts. Je devrais détester en voir un ici: la vue du chameau m'a fait du pin à nouveau pour l'Asie mineure. -Lord Byron"
 dubois.1.g: "Visitez le nouveau zoo."
 dubois.2.t: "Sur l'origine des espèces"
 dubois.2.d: "Avec la publication de son livre, le professeur [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] a fait une contribution scientifique révolutionnaire: il vise à expliquer rien de moins que l'origine des espèces."
 dubois.2.f: "'Owing to this struggle for life, any variation, however slight and from whatever cause proceeding, if it be in any degree profitable to an individual of any species, in its infinitely complex relations to other organic beings and to external nature, will tend to the preservation of that individual, and will generally be inherited by its offspring ... I have called this principle, by which each slight variation, if useful, is preserved, by the term of Natural Selection, in order to mark its relation au pouvoir de sélection de l'homme. -Charles Darwin"
 dubois.2.g: "Cette théorie révolutionnera la science."
 dubois.2.h: "Encore une fois, la science a réfuté les superstitions religieuses."
 dubois.3.t: "Retour du beagle"
 dubois.3.d: "Le HMS Beagle est retourné en Angleterre après un voyage de recherche de plusieurs années. Elle a apporté un riche fonds de spécimens, d'os, de dessins et d'autres résultats scientifiques. [concept_dubois_naturalist] [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] était également à bord."
 dubois.3.f: "«Lorsque HMS Beagle, en tant que naturaliste, a été très frappé par certains faits dans la distribution des habitants de l'Amérique du Sud et dans les relations géologiques du présent aux habitants passés de ce continent. Ces faits m'ont semblé éclairer l'origine des espèces - ce mystère des mystères, comme il a été appelé par l'un de nos plus grands philosophes. - Charles Darwin"
 dubois.3.g: "Un voyage incroyable - quel genre de suites aura-t-il?"
 dubois.4.t: "Kosmos"
 dubois.4.d: "Les Kosmos (généralement appelés en anglais comme «cosmos») étaient un traité influent sur la science et la nature écrite par le scientifique allemand et explorateur Alexander von Humboldt. Kosmos a commencé comme une série de conférences livrée par Humboldt à l'Université de Berlin et a été publié en cinq volumes entre 1845 et 1862 (le cinquième était posthume et incomplet)."
 dubois.4.f: "«Tard dans la soirée d'une vie bien remplie, je remets au public allemand une œuvre dont l'image vague plane devant mon âme pendant près d'un demi-siècle. Dans de nombreuses humeurs, j'ai considéré ce travail impossible: et quand je l'avais abandonné, j'y retourne à nouveau, peut-être négligemment. Je le dédie à mes contemporains avec la timidité qu'un juste méfiance envers la mesure de mes pouvoirs doit m'inspirer. J'essaie d'oublier que les écrits tant attendus jouissent généralement de moins d'indulgence. -Alexander von Humboldt"
 dubois.4.g: "Cet travail servira la science contemporaine."
 dubois.4.h: "Ce travail inspirera les générations futures."
 dubois.5.t: "Héritage de Mendel"
 dubois.5.d: "La redécouverte des travaux de l'abbé Gregor Mendel a provoqué une percée majeure dans le domaine de la génétique. Ses thèses déjà connues sous le nom de «règles de Mendel»."
 dubois.5.f: "«L'expérience de la fertilisation artificielle, telle qu'elle est effectuée avec les plantes ornementales afin d'obtenir de nouvelles variations de couleur, a conduit aux expériences qui seront ici discutées. La régulation de frappe avec laquelle les mêmes formes hybrides réapparaissait toujours chaque fois que la fertilisation a eu lieu entre la même espèce a induit de nouvelles expériences entreprenantes, dont l'objet était de suivre les développements des hybrides dans leur progéniture. -Gregor Mendel"
 dubois.5.g: "La naissance de la génétique moderne."
 dubois.6.t: "L'homme java"
 dubois.6.d: "Le docteur néerlandais et l'anatomiste [SCOPE.sCharacter('dubois_new_paleontologist_scope').GetFullName] a provoqué une sensation scientifique dans sa recherche ciblée des ancêtres de l'homme. Il a découvert le squelette d'un homme préhistorique qui vivait il y a un million d'années."
 dubois.6.f: "Les fossiles découverts pour la première fois par [SCOPE.sCharacter('dubois_new_paleontologist_scope').GetFullName] en 1891 sur les rives de la rivière solo près de Trinil dans l'est de Java sont appelés Java Man. Selon les connaissances actuelles, ils auraient environ un million d'années. Ils ont été les premiers fossiles des hominins à être découverts en dehors de l'Europe et, après les Néandertaliens, la deuxième preuve de parents fossiles d'humains anatomiquement modernes (Homo sapiens). Les découvertes de Java ont d'abord été appelées Anthropopithecus et plus tard comme Pithecanthropus erectus. Aujourd'hui, ils sont affectés à l'espèce homo erectus par la plupart des paléoanthropologues, par laquelle leur origine est parfois - comme suggéré par Franz Weidenreich en 1940 - souligné par l'ajout d'une épithet de sous-espèce: Homo erectus javanensis. Plus de 50 ans après la découverte de Dubois, Ralph von Koenigswald se souvient que «aucune autre découverte paléontologique n'a créé une telle sensation et a conduit à une telle variété d'opinions scientifiques conflictuelles»."
 dubois.6.g: "Nous avons besoin de cet homme comme notre paléontologue principal!"
 dubois.11.t: "Un nouveau [concept_dubois_zoo_animal]"
 dubois.11.d: "[SCOPE.sCountry('dubois_animal_country').GetName] a aimablement accepté de nous vendre un animal rare pour notre [concept_dubois_zoo]."
 dubois.11.f: "Un seul animal peut être acheté pour un zoo à la fois. Après l'achat, il faudra environ un mois ou deux pour que l'animal arrive au zoo. Ce n'est qu'après une introduction appropriée au zoo que un nouvel animal peut être sélectionné via une action diplomatique. Quel animal de zoo devrait-il être?"
 dubois.11.grizzly: "L'ours grizzly."
 dubois.11.eagle: "Le pygargue à tête blanche."
 dubois.11.bison: "Le bison."
 dubois.11.panther: "La Florida Panther."
 dubois.11.alligator: "L'alligator."
 dubois.11.axolotl: "L'axolotl."
 dubois.11.sloth: "L'éguleur à gorge brun."
 dubois.11.jaguar: "Le Jaguar."
 dubois.11.anteater: "Le fourmilier géant."
 dubois.11.armadillo: "Le tatou à neuf bandes."
 dubois.11.condor: "Le Condor andin."
 dubois.11.manatee: "Le Manatee des Antilles."
 dubois.11.monkey: "Le singe d'écureuil."
 dubois.11.lynx: "Le lynx ibérique."
 dubois.11.wolf: "Le loup eurasien."
 dubois.11.badger: "Le blaireau eurasien."
 dubois.11.stoat: "La stat."
 dubois.11.otter: "La loutre eurasienne."
 dubois.11.ibex: "L'Ibex alpin."
 dubois.11.wisent: "Le sœur."
 dubois.11.hippopotamus: "L'hippopotame."
 dubois.11.lion: "Le lion."
 dubois.11.elephant: "L'éléphant."
 dubois.11.giraffe: "La girafe."
 dubois.11.penguin: "Le pingouin africain."
 dubois.11.mole: "Le rat de taupe nu."
 dubois.11.zebra: "Le zèbre"
 dubois.11.panda: "Le panda géant."
 dubois.11.orangutan: "L'orang-outan."
 dubois.11.tiger: "Le Tiger du Bengale."
 dubois.11.tapir: "Le tapir malais."
 dubois.11.dragon: "Le dragon Komodo."
 dubois.11.leopard: "Le léopard des neiges."
 dubois.11.cheetah: "Le guépard asiatique"
 dubois.11.turtle: "La tortue de mer verte."
 dubois.11.manta: "Le Ray Manta."
 dubois.11.kangaroo: "Le kangourou rouge."
 dubois.11.koala: "Le koala."
 dubois.11.platypus: "L'ornithorynque."
 dubois.11.cassowary: "Le Cassowary."
 dubois.11.sealion: "Le lion marin néo-zélandais"
 dubois.11.no: "Peut-être que nous n'avons pas besoin d'un nouvel animal de zoo après tout."
 dubois.12.t: "Les passeurs atteignent l'habitat animal"
 dubois.12.d: "Le professeur [ROOT.Var('dubois_naturalist_var').GetCharacter.GetLastName] a réussi à pénétrer un habitat animal au [SCOPE.sCountry('dubois_animal_country').GetName]. Quel animal devrait-il ... emprunter à des fins scientifiques?"
 dubois.12.f: "\"Comment peut-il être un crime de chasser ou d'attraper un animal? Cela peut à peine être son propre propriétaire\", a expliqué le professeur lorsqu'un des compagnons lui a demandé à son retour si ses actions n'étaient pas au moins au bord de l'illégalité."
 dubois.13.t: "Les passeurs ont pris!"
 dubois.13.d: "Mauvaise nouvelle: le petit groupe de contrebandiers que nous avons envoyés à [SCOPE.sCountry('dubois_animal_country').GetName] a été pris en cours. Il n'est pas surprenant que l'affaire ait provoqué un scandale international - nous sommes accusés publiquement d'être des braconniers!"
 dubois.13.f: "Selon un rapport de journaux, nos hommes ont été capturés par certains responsables forestiers qui ont ensuite informé les forces de sécurité. Notre ambassadeur a ensuite été convoqué par le ministre des Affaires étrangères. Notre seule chance est que le professeur [ROOT.Var('dubois_naturalist_var').GetCharacter.GetLastName] a pu sortir de l'affaire à temps. Il est difficile d'imaginer ce que l'incident aurait signifié pour sa réputation."
 dubois.13.g: "Les choses se sont déroulées différemment que prévu."
 dubois.21.t: "Prof. [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] revient avec les animaux"
 dubois.21.d: "Le professeur [SCOPE.sCharacter('dubois_naturalist_scope').GetFullName] est revenu après un an de recherche d'animaux extraordinaires. Avec l'aide de certains chasseurs et trappeurs, il a réussi à capturer un nouveau [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')]."
 dubois.21.f: "Nombre d'animaux capturés: #G [ROOT.Var('dubois_catch_animal_total').GetValue]#!"
 dubois.21.g: "Magnifique!"
 dubois.31.t: "Safari commence"
 dubois.31.d: "L'équipe de safari dirigée par [SCOPE.sCharacter('dubois_naturalist_scope').GetFullName] est arrivée en Afrique. Cependant, il n'est pas encore clair quel animal sera capturé pour le National [concept_dubois_zoo]."
 dubois.31.f: "Tous les animaux ne peuvent pas être pris de la même manière qu'une autre. À ce stade, quelques conseils approximatifs: un éléphant a besoin de beaucoup plus de pièges qu'une girafe. Un lion, en revanche, modifie son emplacement plus fréquemment qu'un hippopotame."
 dubois.31.g: "Hippopotame."
 dubois.31.h: "Lion."
 dubois.31.i: "Éléphant."
 dubois.31.j: "Girafe."
 dubois.31.k: "Zèbre."
 dubois.32.t.hippopotamus_1: "Un énorme hippopotame"
 dubois.32.t.hippopotamus_2: "Deuxième observation d'un hippopotame"
 dubois.32.t.hippopotamus_3: "Un autre hippopotame"
 dubois.32.t.lion_1: "Un lion majestueux"
 dubois.32.t.lion_2: "Deuxième observation d'un lion"
 dubois.32.t.lion_3: "Un autre lion"
 dubois.32.t.elephant_1: "Un grand éléphant"
 dubois.32.t.elephant_2: "Deuxième observation d'un éléphant"
 dubois.32.t.elephant_3: "Un autre éléphant"
 dubois.32.t.giraffe_1: "Une girafe élégante"
 dubois.32.t.giraffe_2: "Deuxième observation d'une girafe"
 dubois.32.t.giraffe_3: "Une autre girafe"
 dubois.32.t.zebra_1: "Un zèbre rapide"
 dubois.32.t.zebra_2: "Deuxième observation d'un zèbre"
 dubois.32.t.zebra_3: "Un autre zèbre"
 dubois.32.d: "Le professeur [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] a localisé l'animal qu'il recherche. Maintenant, il est important de conduire l'animal dans une situation avec une approche minutieuse afin que nous puissions l'attraper."
 dubois.32.f.hippopotamus.1: "Un local dit qu'il a vu un troupeau de hippopotames se baigner dans la rivière la plus proche il y a quelques jours. Les habitants du village ne les abordent pas; Ils tendent vers une grande agression, même le grand jeu n'ose pas les aborder. Leur rugissement pourrait être entendu d'une grande distance. «Vous pouvez les entendre près du village, surtout la nuit lorsque les animaux sont particulièrement actifs et migrent vers leurs pâturages», explique le local. Une mère hippopotame aurait récemment tué un crocodile pour défendre un petit; Le professeur [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] a pu voir cela par lui-même lorsqu'il a examiné la carcasse du malheureux reptile."
 dubois.32.f.hippopotamus.2: "Alors que la brume du matin se soulève, la silhouette d'une créature colossale émerge des profondeurs troubles de la rivière. Les contes des géants de la rivière insaisissable se sont propagés parmi les habitants, parlant de leur force inégalée et de leur nature effrayante. Les hippopotames, avec leurs mâchoires massives et leurs défenses en ivoire, commandent le respect et inculquent la terreur dans le cœur de tous ceux qui traversent leur chemin. Seul un [concept_dubois_naturalist] audacieux comme le professeur [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] pourrait espérer capturer une bête aussi formidable, car il est dit que même le roi de la jungle marche légèrement dans leur domaine."
 dubois.32.f.hippopotamus.3: "Les rumeurs d'un Hippopotame légendaire ont captivé l'imagination des explorateurs, et leurs comptes résonnent à travers le sous-bois dense de la savane africaine. Ce géant, connu sous le nom de \ \"le géant de l'ivoire, possède des plaques d'armure de type ivoire qui brillent au soleil, la rendant presque invulnérable aux dents et aux griffes d'autres prédateurs. Les tribus locales vénèrent la créature, attribuant des pouvoirs mythiques à sa présence. Pour voir cette bête majestueuse, le professeur [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] doit naviguer sur des marécages perfides et surmonter les dangers de la nature, armés de ses connaissances et de l'espoir de capturer une légende vivante pour que le monde s'émerveille."
 dubois.32.f.lion.1: "À travers la vaste étendue des plaines africaines sauvages, un prédateur majestueux règne en maître. Le lion, avec sa crinière dorée et son regard perçant, est l'incarnation du pouvoir et de l'autorité royale. Son puissant rugissement résonne dans les airs, envoyant des frissons dans les épines de la proie et du prédateur. Les habitants parlent d'une lionne, connue sous le nom de \ \"la reine de la savane, \" qui a défendu à lui seul sa fierté contre les clans rivaux et a même repoussé les hyènes féroces. Pour capturer l'essence d'une telle magnificence, le professeur [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] doit s'aventurer au cœur de la savane, où le danger se cache dans chaque ombre, et assister aux prouesses brutes du monarque royal de la nature."
 dubois.32.f.lion.2: "Au plus profond du désert africain, un monarque félin commande son domaine avec une autorité inébranlable. Le lion, connu sous le nom de \ \"le souverain doré, possède une crinière qui scintille comme les rayons du soleil, ce qui en fait un symbole indubitable de pouvoir et de domination. Des contes de sa force et de sa furtivité incroyables ont voyagé loin, captivant l'esprit des aventuriers et des naturalistes. Les habitants chuchotent d'une observation rare, un affrontement de titans entre le souverain doré et un formidable buffle de Cape. Pour assister à cette rencontre épique, le professeur [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] doit parcourir soigneusement la savane, naviguer dans un royaume où seuls les intrépides osent s'aventurer."
 dubois.32.f.lion.3: "Au cœur du désert africain, où la chaleur étouffante est tempérée par la beauté impressionnante de la savane, erre une créature craint et vénérée par tous. Le lion, avec sa construction musculaire et sa grâce prédatrice, incarne l'essence de la Majesté sauvage. Son rugissement tonitruant résonne à travers les plaines, un appel résonnant à toutes les créatures que le roi des bêtes est proche. Les légendes racontent une fierté de lion dirigée par un patriarche indomptable, dont la présence pure oblige le respect des prédateurs les plus formidables. Pour observer ce souverain majestueux dans son habitat naturel, le professeur [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] doit surmonter les défis de la sauvage, se plongeant dans un monde où l'équilibre entre la vie et la mort est suspendu par un fil délicat."
 dubois.32.f.elephant.1: "Un troupeau d'éléphants piétine la poussière dans l'air. Une caravane, dirigée par une matriarche, se déplace à travers la campagne. Hudnerte, parfois des milliers de kilomètres de tels groupes couvrent parfois. Les jeunes animaux restent sous la garde de leur mère. Ensuite, le groupe s'arrête dans un petit bosquet, étirant leurs troncs dans les arbres. Le professeur [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] observe les événements à travers des jumelles et étudie le comportement social. Fondamentalement, il en a été malade de l'idée de saisir l'un des animaux du troupeau, mais les clients du zoo lui rappellent que son voyage et sa nourriture n'ont pas été fournis gratuitement par l'État - il y a un travail à faire."
 dubois.32.f.elephant.2: "Les doux géants de la savane, éléphants, parcourent les vastes paysages à la recherche de nourriture et d'eau. Leur taille immense respecte le respect, mais leurs interactions tendres au sein du troupeau révèlent un profond sentiment de liens familiaux. Dirigés par une matriarche sage, les éléphants traversent de grandes distances, leurs pas synchronisés résonnant à travers les prairies. Le professeur [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName], avec un cœur lourd, leur pose son regard, déchiré entre l'admiration pour leur grâce et la tâche qui nous attend. Pour capturer un éléphant pour le zoo, il doit concilier son devoir avec la compréhension que la perturbation de la tapisserie complexe de leur tissu social a un coût profond."
 dubois.32.f.elephant.3: "Dans l'ombre des imposants baobab, une congrégation d'éléphants, ornée de magnifiques défenses, se rassemble à un trou d'arrosage tranquille. Les yeux passionnés de la matriarche scanne dans l'environnement, assurant la sécurité de ses précieux proches. La symphonie harmonieuse de leurs trompettes remplit l'air, un témoignage de leur sagesse collective et de leurs expériences partagées. Le professeur [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName], en conflit par l'attrait de capturer l'un de ces êtres sensibles et le poids lancinant des responsabilités, lutte avec les implications morales de sa quête. Comme il observe leur dynamique sociale complexe, il se penche sur la question profonde de savoir si la poursuite de la connaissance justifie la perturbation d'une existence harmonieuse."
 dubois.32.f.giraffe.1: "Pendant des jours, le groupe Safari du professeur [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] avait cherché le simple signe d'une girafe, mais n'avait rien trouvé avant la fin. Mais un matin, le cou des animaux élégants s'étend dans les airs contre le soleil le matin levant et forme des ombres contre la boule de feu rougeâtre. L'équipe Safari se déroule immédiatement pour ne pas manquer cette opportunité."
 dubois.32.f.giraffe.2: "À travers les teintes dorées de l'aube africaine, une vue merveilleuse se déroule. Grands et gracieux, les girafes émergent du feuillage dense, leurs cous allongés atteignant les cieux. Comme les êtres éthérés, ils projettent des ombres allongées contre le ciel ardent, leurs taches se mélangeant parfaitement à la lumière pachée. Le professeur [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName], son cœur rempli de crainte, se précipite pour assembler son équipement, déterminé à ne pas laisser ce moment éphémère s'échapper. À chaque pas attentif, il s'aventure plus près des girafes, désireux de démêler les mystères cachés dans leur anatomie extraordinaire et d'observer la poésie de leurs mouvements."
 dubois.32.f.giraffe.3: "Dans les vastes plaines africaines, une vision de l'élégance se déroule alors que les girafes naviguent gracieusement dans le paysage verdoyant. Leurs jambes minces les portent avec une grâce ballétique, tandis que leurs longs cou s'étendent au-dessus des arbres, comme s'ils atteignent les cieux eux-mêmes. Le professeur [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] et son équipe de safari, leur cœur battant avec anticipation, témoignent ce spectacle fascinant. Avec un œil attentif pour le détail, le professeur étudie les modèles complexes de leurs taches et s'émerveille de leur capacité à prospérer dans leur habitat unique. Pour capturer l'essence de ces magnifiques créatures, il doit naviguer dans l'équilibre délicat entre l'observation et l'intrusion, préservant la magie qui fait des girafes la quintessence de la grâce dans la nature."
 dubois.32.f.zebra.1: "Quelques semaines après son arrivée en Afrique, le safari du professeur [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] a rattrapé les habitants du prochain troupeau de zèbres errant dans la région. Il ne faut pas longtemps avant de trouver les animaux avec les rayures caractéristiques du soleil du soir entre la poussière de savane, les buissons et les arbres noueux. Les animaux gracieux ne semblent même pas les remarquer. Le professeur [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] veut d'abord prendre le temps d'étudier le comportement et le mode de vie du troupeau zèbre, mais comme beaucoup d'autres chercheurs, il souhaite découvrir le contexte évolutif du célèbre modèle zèbre. Malheureusement, il est interrompu par un membre de l'équipe de safari, qui souligne que s'ils attendent trop longtemps, le troupeau pourrait redevenir."
 dubois.32.f.zebra.2: "Peut-être que suivre les zèbres n'était pas la meilleure décision. Ces animaux pourraient se déplacer jusqu'à 500 kilomètres d'un endroit à l'autre et ainsi changer le centre du troupeau en grandes latitudes géographiques. Cependant, il y avait une bizarrerie qui les rendait prévisibles: ils ne restaient généralement pas plus de 12 kilomètres d'une source d'eau. Le safari du professeur [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] prend ce détail comme une occasion d'attendre au prochain trou d'arrosage possible. Avec succès! Bientôt, le troupeau se reproduit, donnant l'occasion de prendre enfin l'un des animaux du zoo."
 dubois.32.f.zebra.3: "Après plusieurs semaines de recherche de zèbres, le professeur [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] repère la carcasse d'un animal mutilé au loin. C'était apparemment la victime d'une attaque de lion. Étant donné que les Lions ne se sont éloignés que récemment, l'équipe Safari est motivée à poursuivre la recherche plus intensive. Bientôt, des grognements bruyants et des appels mixtes de l'âne et des bruits en forme de cheval. Les queues de zèbre fouchent dans les airs au-dessus de l'herbe de savane. Les participants au safari regardent un troupeau de pâturage d'une colline."
 dubois.32.g: "L'équipe doit définir des pièges."
 dubois.32.h: "L'équipe devrait approcher l'animal."
 dubois.33.t: "Fleurs rares"
 dubois.33.d.hippopotamus: "À la recherche du #O Hippopotamus#!,, notre équipe Safari a rencontré une flore incroyable. Le professeur [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] est enclin à faire une pause."
 dubois.33.d.lion: "À la recherche du #O lion#!,, notre équipe de safari a rencontré une flore incroyable. Le professeur [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] est enclin à faire une pause."
 dubois.33.d.elephant: "À la recherche du #O elephant#!,, notre équipe de safari a rencontré une incroyable flore. Le professeur [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] est enclin à faire une pause."
 dubois.33.d.giraffe: "À la recherche du #O Girafe#!,, notre équipe de safari a rencontré une flore incroyable. Le professeur [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] est enclin à faire une pause."
 dubois.33.d.zebra: "À la recherche du #O Zebra#!,, notre équipe de safari a rencontré une incroyable flore. Le professeur [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] est enclin à faire une pause."
 dubois.33.f: "Le safari a été interrompu par un arrêt inhabituel lorsque le professeur [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] a ordonné aux hommes assemblés de s'arrêter. Une odeur inhabituelle avait atteint son nez. Une prairie de fleurs aux couleurs vives se trouvait devant ses yeux. Un seul échantillon était suffisant pour établir qu'ils étaient des plantes assez décentes de qualité inconnue qui pourraient peut-être être utilisées comme médicament ou pour soulager les symptômes. Le naturaliste s'est maintenant retrouvé dans un dilemme: car ces plantes africaines exotiques avaient une valeur indescriptible pour la recherche."
 dubois.33.g: "Nous devons avoir ces fleurs à tout prix."
 dubois.33.h: "Nous n'avons pas le temps de cueillir des fleurs. L'animal attend!"
 dubois.34.t: "Insectes inconnus"
 dubois.34.d.hippopotamus: "Le safari, qui visait à capturer le # O Hippopotamus#!,, doit être interrompu. Le professeur [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] est manquant!"
 dubois.34.d.lion: "Le safari, qui visait à capturer le # o lion#!,, doit être interrompu. Le professeur [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] est manquant!"
 dubois.34.d.elephant: "Le safari, qui visait à capturer le # o elephant#!,, doit être interrompu. Le professeur [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] est manquant!"
 dubois.34.d.giraffe: "Le safari, qui visait à capturer le # o giraffe#!,, doit être interrompu. Le professeur [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] est manquant!"
 dubois.34.d.zebra: "Le safari, qui visait à capturer le # o zebra#!,, doit être interrompu. Le professeur [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] est manquant!"
 dubois.34.f: "Peu de temps après s'être arrêté pour le déjeuner, les autres participants au Safari ont remarqué que leur chef avait soudainement disparu. Après une courte recherche, ils ont trouvé le professeur [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] sur un tas de saleté chatoyant qui ressemblait à un monticule de termite abandonné. Les couleurs des coléoptères vert, bleu et rouge de différentes tailles lui ont brillé. Le naturaliste était sur le point de laisser échapper des cris de joie, il était si ravi qu'il soit à sa découverte."
 dubois.34.g: "Recueillir des échantillons de ces insectes inconnus."
 dubois.34.h: "Et risquer l'animal qui nous échappe? Allez maintenant!"
 dubois.39.t: "Catch réussi!"
 dubois.39.f: "\"Tout en Afrique mord, mais le bug de safari est pire de tous.\" -Ernest Hemingway"
 dubois.39.g: "Super!"
 dubois.40.t: "Safari se termine"
 dubois.40.d.success: "Après un safari réussi, les héros rentrent chez eux avec l'animal qu'ils ont gagné. Certes, ce sera plus heureux dans le Nice National Zoo de [ROOT.GetCountry.GetNameNoFlag] que dans cette nature inconfortable!"
 dubois.40.d.fail: "À la fin d'une recherche infructueuse qui n'a apporté que des difficultés, le professeur [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] abandonne et revient à [ROOT.GetCountry.GetNameNoFlag] avec son équipe."
 dubois.40.f: "«Tout ce que je voulais faire, c'était de retourner en Afrique. Nous ne l'avions pas encore quitté, mais quand je me réveillais dans la nuit, je mensais, écoutant, mal du pays pour cela. Now, looking out the tunnel of trees over the ravine at the sky with white clouds moving across in the wind, I loved the country so that I was happy as you are after you have been with a woman that you really love, when, empty, you feel it welling up again and there it is and you can never have it all and yet what there is, now, you can have, and you want more and more, to have, and be, and live in, to possess now again for always, for that long sudden-ended always; Faire du temps immobile, parfois tout à fait encore qu'après vous attendez de l'entendre bouger, et il est lent de commencer. -Ernest Hemingway"
 dubois.40.g: "Hakuna Matata."
 dubois.41.t: "Plantes exotiques"
 dubois.41.d: "L'expédition a rencontré une variété de plantes exotiques, mais on ne sait pas à quel point cet endroit est sûr."
 dubois.41.f: "Les membres de l'expédition ont été fascinés. Ils avaient parcouru des rivières, des montagnes et des forêts, conquis des cascades. Mais les plantes grandioses avec leurs fleurs majestueuses les ont submergé. [SCOPE.sCharacter('expedition_leader').GetFullName] a en fait dit qu'ils ne seraient pas ici longtemps, mais ont ensuite permis à un assistant de recherche de collecter quelques échantillons. D'une part, il n'a pas non plus pu nier la valeur scientifique de cette découverte. D'un autre côté: il y avait ces bruits étranges dans la jungle qu'il ne pouvait pas dire s'ils provenaient de gens, d'animaux ou de démons ..."
 dubois.41.g: "Recueillir des échantillons de plantes."
 dubois.41.h: "Collectez autant de plantes que possible."
 dubois.42.t: "Papillons"
 dubois.42.d: "À leur propre surprise, l'expédition a atteint une clairière dans la jungle africaine où des dizaines de milliers de papillons colorés gambadent."
 dubois.42.f: "\"Mais ce sont des fleurs qui volent et chantent presque.\" -Robert Frost"
 dubois.42.g: "Nos naturalistes à la maison seront heureux."
 dubois.43.t: "Poisson de la rivière"
 dubois.43.d: "Lorsque vous traversez une rivière, certains compagnons de l'expédition ont remarqué que les poissons inconnus [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] nageaient dans l'eau. [SCOPE.sCharacter('expedition_leader').GetFullName], cependant, a ses propres idées sur ce qu'il faut en faire."
 dubois.43.f: "Ils étaient des poissons colorés et chatoyants. Beau poisson à regarder. Poisson inconnu. Fish mystérieux. Et: poisson savoureux. Ce qui a été une découverte importante pour le scientifique était la bienvenue de la nourriture pour le chef d'expédition afin d'améliorer le succès du voyage."
 dubois.43.g: "Récupérer le poisson."
 dubois.43.h: "Mangez le poisson."
 dubois.44.t: "Échantillons perdus"
 dubois.44.d: "L'expédition avait collecté quelques échantillons de grande valeur scientifique à partir d'insectes et de plantes inconnus il y a quelques jours. Cependant, après une inspection aujourd'hui, il s'est avéré que ceux-ci ont été perdus!"
 dubois.44.f: "Il était environ midi lorsqu'un cri paniqué a secoué l'expédition. Au début, le [SCOPE.sCharacter('expedition_leader').GetFullName] craignait l'invasion des indigènes hostiles. Mais c'était en fait un assistant de recherche qui avait remarqué que les échantillons collectés manquaient. Il a immédiatement insisté pour revenir en arrière et chercher la collection scientifique. Les porteurs l'ont ignoré et le chef le contredit: c'était trop dangereux pour cela - et on avait perdu suffisamment de temps à cueillir des fleurs. L'assistant de recherche a ensuite menacé de dénoncer cette ignorance à son retour et de dire à des amis très importants en science et politique."
 dubois.44.g: "L'expédition doit faire demi-tour et récupérer les échantillons."
 dubois.44.h: "Laissez cette ordure sans valeur derrière."
 dubois.45.t: "Une précieuse collection"
 dubois.45.d: "Un naturaliste, qui a quitté son expédition il y a des années et vit seul dans le désert africain à des fins de recherche, a construit une impressionnante collection de flore et de faune rares au cours des années de solitude."
 dubois.45.f: "L'homme était un spectacle étrange. Les années de solitude se sont montrées dans le gris de ses yeux et la longueur de ses cheveux. À quel point il avait collecté et catalogué de manière maniaque chaque bug, papillon, larve qu'il avait trouvé depuis la séparation de son équipe. Il avait conservé les feuilles de plantes tropicales. Des feuilles de papier en vrac et des cahiers griffonnés flottaient dans sa salle de stockage. [SCOPE.sCharacter('expedition_leader').GetFullName] s'est rapidement rendu compte que le naturaliste vivant comme ermite n'était pas devenu fou. Au contraire, il cherchait un moyen de retourner à la civilisation et de publier ses résultats, mais il avait peur de revenir parce qu'il était trop indépendant. Cette situation a ouvert des possibilités. Des deux côtés."
 dubois.45.g: "Nous voulons acquérir la collection."
 dubois.45.h: "Nous sommes plus intéressés par ses connaissances."
 dubois.72.t: "Formation géologique découverte"
 dubois.72.d: "Dans [SCOPE.sState('dubois_formation_state').GetName], [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')] ont découvert des formations rocheuses de des millions d'années. Ils soupçonnent qu'il y a encore des fossiles inconnus là-bas."
 dubois.72.f: "Les formations avec des strates rocheuses anciennes sont un paradis pour les paléontologues. Toutes les formations rocheuses contiennent des fossiles plus petits qui peuvent y être trouvés. De grandes formations peuvent même contenir les squelettes de dinosaures massifs. Leur paléontologique se déroule en plusieurs étapes. Il faut un paléontologue pour récupérer les fossiles des formations. Ils étudieront les formations par vous-même et trouveront des fossiles chaque année."
 dubois.72.g: "Nous devrions regarder de plus près."
 dubois.73.t: "Grande formation géologique découverte"
 dubois.73.d: "Dans le [SCOPE.sState('dubois_formation_state').GetName], les paléontologues ont découvert des formations rocheuses âgées de millions d'années. De nombreux fossiles sont susceptibles de dormir dans cette formation massive, probablement même des squelettes bien conservés dont nous ne pouvions rêver jusqu'à présent."
 dubois.101.t: "Ours blanc"
 dubois.101.d: "Notre zoo est enrichi par un nouvel animal fascinant: aujourd'hui, le #O Polar Bear#! tant attendu a déménagé dans sa nouvelle enceinte."
 dubois.101.f: "L'ours polaire (Ursus marititimus) est une espèce hypercarnivores d'ours. Son gamme indigène se trouve en grande partie dans le cercle arctique, englobant l'océan Arctique et ses mers environnantes et ses masses terrestres, qui comprend les régions les plus au nord de l'Amérique du Nord et de l'Eurasie. Les ours polaires chassent leur aliment préféré de phoques à partir du bord de la glace de mer, vivant souvent des réserves de graisse lorsqu'aucune glace de mer n'est présente. En raison de leur dépendance à la glace de mer, les ours polaires sont classés comme mammifères marins. Contrairement aux ours bruns, les ours polaires ne sont pas territoriaux. Bien que stéréotypés comme étant voracieusement agressifs, ils sont normalement prudents dans les confrontations et choisissent souvent de s'échapper plutôt que de se battre."
 dubois.101.g: "Cool."
 dubois.102.t: "Grizzli"
 dubois.102.d: "Notre zoo est enrichi par un nouvel animal fascinant: aujourd'hui, le Grizzly Bear#! tant attendu a déménagé dans sa nouvelle enceinte."
 dubois.102.f: "Le grizzli (Ursus arctos horribilis), également connu sous le nom de l'ours brun nord-américain ou simplement Grizzly, est une population ou une sous-espèce de l'ours brun habitant l'Amérique du Nord. Meriwether Lewis et William Clark l'ont d'abord décrit comme Grisley, qui pourrait être interprété comme \"Grizzly\" (c'est-à-dire \"grizzlet\" - c'est-à-dire avec les cheveux gris-àté) ou \"macabres\" (\"inspirant\", maintenant généralement \"horrible\"). Les grizzlis sont parmi les plus grandes sous-espèces d'ours brun, n'étant battus que par les ours bruns de Kamchatka et les ours Kodiak. Les grizzlis varient en taille en fonction du calendrier et des populations. La gamme originale des grizzlis comprend de grandes parties de l'Amérique du Nord occidentale et centrale. Il descend d'une population eurasienne d'ours bruns qui a migré à travers le détroit de Béring temporairement sec."
 dubois.102.g: "Terrifiant."
 dubois.103.t: "Pygargue à tête blanche"
 dubois.103.d: "Notre zoo est enrichi par un nouvel animal fascinant: aujourd'hui, le #O Bald Eagle § tant attendu a déménagé dans sa nouvelle enceinte."
 dubois.103.f: "Le pygargue à tête blanche (Haliaeetus leucocephalus) est un oiseau de proie trouvé en Amérique du Nord. Sa gamme comprend la majeure partie du Canada et de l'Alaska, tous les États-Unis contigus et le nord du Mexique. On le trouve près de grands corps en eau libre avec un approvisionnement alimentaire abondant et des arbres à l'ancienne pour la nidification. Le pygargue à tête blanche est un mangeoire opportuniste qui subsiste principalement sur les poissons, sur lesquels il se dirige vers le bas et s'arrête de l'eau avec ses serres. Les pygargues à tête blanche ne sont pas réellement chauves; Le nom dérive d'une signification plus ancienne du mot, «tête blanche». Le pygargue à tête blanche est l'oiseau national des États-Unis d'Amérique et apparaît sur son sceau."
 dubois.103.g: "Patriotique."
 dubois.104.t: "Bison américain"
 dubois.104.d: "Notre zoo est enrichi par un nouvel animal fascinant: aujourd'hui, le #O American Bison#! tant attendu a déménagé dans sa nouvelle enceinte."
 dubois.104.f: "Le bison américain (bison du bison), également appelé Buffalo américain ou simplement Buffalo, est une espèce de bison originaire d'Amérique du Nord. Il s'agit de l'une des deux espèces de bisons existantes, aux côtés du bison européen. Buffalo a été appliqué au bison américain par Samuel de Champlain alors que le mot français buffles en 1616, après avoir vu des peaux et un dessin. Ceux-ci lui ont été démontrés par les membres de la Première nation Nipissing. Le mot bison a été appliqué dans les années 1690. Un bison a un manteau hivernal hirsute, long et brun foncé et un manteau d'été plus léger et brun plus léger. Les bisons mâles sont nettement plus grands et plus lourds que les femmes. Une fois itinérant dans de vastes troupeaux, l'espèce s'est presque éteinte par une combinaison de chasse commerciale et d'abattage au 19e siècle et d'introduction de maladies bovines des bovins domestiques."
 dubois.104.g: "Hirsute."
 dubois.105.t: "Floride Panther"
 dubois.105.d: "Notre zoo est enrichi par un nouvel animal fascinant: aujourd'hui, le #O Florida Panther#! tant attendu a déménagé dans sa nouvelle enceinte."
 dubois.105.f: "La Florida Panther est un couguar nord-américain connu sous un certain nombre de noms communs, notamment Florida Cougar et Florida Puma. Il vit dans les Pinelands, les hamacs de bois dur tropical et les forêts de marais d'eau douce mélangées. Les Panthers de Floride sont repérés à la naissance et ont généralement des yeux bleus. À mesure que la panthère grandit, les taches s'estompent et le manteau devient complètement bronzé, tandis que les yeux prennent généralement une teinte jaune. Le ventre de la Panther est un blanc crémeux, et il a des pointes noires sur la queue et les oreilles. Les Panthers de la Floride n'ont pas la capacité de rugir et de faire des sons distincts qui incluent des sifflets, des gazouillis, des grognements, des sifflements et des ronronnements."
 dubois.105.g: "N'est-ce pas plus un Puma?"
 dubois.106.t: "Alligator"
 dubois.106.d: "Notre zoo est enrichi par un nouvel animal fascinant: aujourd'hui, le #O Alligator #O tant attendu a déménagé dans sa nouvelle enceinte."
 dubois.106.f: "Les alligators américains sont des prédateurs Apex et consomment des poissons, des amphibiens, des reptiles, des oiseaux et des mammifères. Les nouveau-nés se nourrissent principalement des invertébrés. Ils jouent un rôle important en tant qu'ingénieurs écosystémiques dans les écosystèmes des zones humides grâce à la création de trous d'alligator, qui fournissent des habitats humides et secs pour d'autres organismes. Tout au long de l'année, les alligators américains ont mentionné pour déclarer le territoire et localiser des amis appropriés. Au cours des XIXe et XXe siècles, des hommes plus grands atteignant 5 à 6 m ont été signalés. La plus grande taille individuelle signalée était un homme tué en 1890 sur l'île de Marsh, en Louisiane, et aurait mesuré à 5,84 m de long, mais aucun spécimen de bons n'était disponible, car l'alligator américain a été laissé sur une banque boueuse après avoir été mesurée en raison de la déménagement trop massif."
 dubois.106.g: "De même."
 dubois.107.t: "Axolotl"
 dubois.107.d: "Notre zoo est enrichi par un nouvel animal fascinant: aujourd'hui, le #O tant attendu axolotl#! a déménagé dans sa nouvelle enceinte."
 dubois.107.f: "L'axolotl est un amphibien à queue mexicain aquatique de la famille des tritons transversaux, qui ne se produit naturellement que sous forme de larves permanentes. Les axolotles atteignent la maturité sexuelle sans changer leur forme larvaire externe et sans subir une métamorphose qui est autrement courante chez les amphibiens. En août 1804, Alexander von Humboldt a été le premier à amener les axolotles en Europe, qui - conservés dans l'alcool - servaient de curiosité exotique au Musée de l'histoire naturelle de Paris. Les axolotls ont la capacité de restaurer les membres, les organes et même les parties du cerveau et du cœur. Les régénéres ne sont généralement pas paralysés, mais complets et fonctionnels. La capacité de régénérer fait de l'espèce un objet de recherche intéressant."
 dubois.107.g: "Qu'est-ce que c'est ... une créature étrange?"
 dubois.111.t: "Paresseux à gorge brun"
 dubois.111.d: "Notre zoo est enrichi par un nouvel animal merveilleux: aujourd'hui, le #O tant attendu #O Sloth#! à gorge brun est entré dans sa nouvelle enceinte."
 dubois.111.f: "Le paresseux à gorge brun (Bradypus variriegatus) est une espèce de paresse à trois doigts que l'on trouve dans le domaine néotropical d'Amérique centrale et du Sud. Les paresseux à gorge brun dorment de 15 à 18 heures par jour et ne sont actifs que pendant de brèves périodes, ce qui peut être pendant la journée ou la nuit. Bien qu'ils puissent marcher le long du sol et même nager, ils passent la majeure partie de leur vie dans les hautes branches des arbres, descendant une fois tous les huit jours environ pour déféquer dans le sol. Ils ne voyagent pas loin, avec des gammes domestiques d'environ 0,5 à 9 ha (1,2 à 22,2 acres), selon l'environnement local. Dans une gamme typique de 5 hectares (12 acres), un paresseux à gorge brun visitera environ 40 arbres et peut se spécialiser sur une espèce particulière, passant même jusqu'à 20% de son temps dans un seul arbre spécifique."
 dubois.111.g: "C'est la créature la plus noble qui ait jamais entré ce zoo."
 dubois.112.t: "Jaguar"
 dubois.112.d: "Notre zoo est enrichi par un nouvel animal merveilleux: aujourd'hui, le #O tant attendu Jaguar#! a déménagé dans sa nouvelle enceinte."
 dubois.112.f: "Le Jaguar (Panthera Onca) est le seul membre vivant du genre Panthera originaire des Amériques. Avec une longueur de corps allant jusqu'à 1,85 m (6 pi 1 po) et un poids allant jusqu'à 158 kg (348 lb), c'est la plus grande espèce de chat des Amériques et le troisième plus grand au monde. Son manteau distinctement marqué présente une fourrure de couleur jaune pâle à bronzage recouverte de taches qui passent aux rosettes sur les côtés, bien qu'un manteau noir mélaniste apparaisse chez certains individus. La morsure puissante du Jaguar lui permet de percer les carapaces des tortues et des tortues, et d'employer une méthode de meurtre inhabituelle: il mord directement le crâne de la proie de mammifères entre les oreilles pour porter un coup fatal au cerveau. Le mot «Jaguar» est peut-être dérivé du mot Tupi-guarani Yaguara signifiant «bête sauvage qui surmonte sa proie à une limite»."
 dubois.112.g: "Impressionnant."
 dubois.113.t: "Antiater géant"
 dubois.113.d: "Notre zoo est enrichi par un nouvel animal merveilleux: aujourd'hui, le #O Giant Anteater #O tant attendu a déménagé dans sa nouvelle enceinte."
 dubois.113.f: "Le fourmilier géant (Myrmecophaga tridactyla) est un mammifère insectivore originaire d'Amérique centrale et du Sud. Il s'agit de l'une des quatre espèces vivantes d'antilles, dont il est le plus grand membre. Il se nourrit principalement de fourmis et de termites, en utilisant ses griffes antérieures pour les déterrer et sa longue langue collante pour les récupérer. Bien que les anti-géants vivent dans des chaînes domestiques qui se chevauchent, elles sont principalement solitaires, sauf pendant les relations de progéniture mère, les interactions agressives entre les mâles et lors de l'accouplement. Le fourmilier géant est le plus terrestre des espèces de fourreaux vivants. Ses ancêtres peuvent à l'origine être adaptés à la vie arboricole."
 dubois.113.g: "Chic."
 dubois.114.t: "Armadillo à neuf bandes"
 dubois.114.d: "Notre zoo est enrichi par un nouvel animal merveilleux: aujourd'hui, le Armadillo#!, à neuf bandes, a déménagé dans sa nouvelle enceinte."
 dubois.114.f: "L'armadillo à neuf bandes (Dasypus Novemcinctus) est un mammifère trouvé en Amérique du Nord, du Central et du Sud, ce qui en fait le plus répandu des tatous. Ses ancêtres sont originaires d'Amérique du Sud et y sont restés jusqu'à la formation de l'isthme du Panama leur permettaient de pénétrer en Amérique du Nord dans le cadre du grand échangeur américain. L'armadillo à neuf bandes est un animal solitaire, principalement nocturne, trouvé dans de nombreux types d'habitats, des forêts tropicales matures et secondaires aux prairies et aux gommages secs. La coquille externe est composée de écailles dermiques ossifiées recouvertes d'écailles épidermiques kératinisées non chevauchantes, qui sont connectées par des bandes de peau flexibles. Cette armure couvre les surfaces du dos, des côtés, de la tête, de la queue et de l'extérieur des jambes."
 dubois.114.g: "Bien armé."
 dubois.115.t: "Condor Ande"
 dubois.115.d: "Notre zoo est enrichi par un nouvel animal merveilleux: aujourd'hui, le #O Andean Condor § tant attendu a déménagé dans sa nouvelle enceinte."
 dubois.115.f: "Le Condor Andeen (Vultur Gryphus) est un vautour géant cathartide sud-américain et est le seul membre du genre Vultur. Trouvé dans les Andes et les côtes du Pacifique adjacentes de l'Amérique du Sud occidentale, le Condor Andia est le plus grand oiseau volant du monde par une mesure combinée du poids et de la lèvre. C'est un gros vautour noir avec une ébauche de plumes blanches entourant la base du cou et, en particulier dans les grandes plaques blanches mâles sur les ailes. La tête et le cou sont presque sans plumes et sont une couleur rouge terne, qui peut rincer et donc changer de couleur en réponse à l'état émotionnel de l'oiseau. Le Condor Andia est un symbole national de la Bolivie, du Chili, de la Colombie, de l'Équateur et du Pérou et joue un rôle important dans le folklore et la mythologie des régions andines."
 dubois.115.g: "Céleste."
 dubois.116.t: "Lamantin des Antilles"
 dubois.116.d: "Notre zoo est enrichi par un nouvel animal merveilleux: aujourd'hui, le MANATEE #O tant attendu #O Addian a déménagé dans sa nouvelle enceinte."
 dubois.116.f: "Le Manatee antillais est un grand mammifère aquatique originaire des zones côtières chaudes des Caraïbes. Vivant seul ou en troupeaux, il se nourrit de plantes sous-marines et utilise ses moustaches pour naviguer. Étant donné que les lamantins sont des mammifères, ils respirent l'air, ont du sang chaud et produisent du lait. Le lamantin des Antilles a un museau préhensile, comme leur parent l'éléphant, pour avoir saisi la végétation et l'amener dans leur bouche. Parce que les lamantins ont évolué dans des habitats sans prédateurs naturels, ils manquent de comportement d'évitement des prédateurs. La grande taille et les faibles taux métaboliques de lamantins prêtent à leur capacité pour des plongées longues et profondes, ainsi que leur manque relatif de vitesse."
 dubois.116.g: "Délicat."
 dubois.117.t: "Singe écureuil"
 dubois.117.d: "Notre zoo est enrichi par un nouvel animal merveilleux: aujourd'hui, le #O Squirrel Squirrel tant attendu a déménagé dans sa nouvelle enceinte."
 dubois.117.f: "Les singes d'écureuil sont un genre de primates dans la famille des Capuchins. Ces primates relativement petits sont originaires de l'Amérique centrale et du Sud et vivent en grands groupes qui peuvent numéroter 12 à 100 personnes. Les groupes sont composés de nombreux hommes et femmes ainsi que des jeunes animaux communs. Ils ont une structure sociale qui est inhabituelle pour les singes: le groupe est construit autour des femmes, qui développent une hiérarchie fixe. Les mâles ne restent souvent qu'au bord du groupe. Les membres du groupe communiquent en sifflant et en caquetant. Les singes d'écureuil se nourrissent principalement d'insectes et de fruits, dont la proportion peut varier en fonction de la saison. Les insectes de chasse occupent la majeure partie de la journée (jusqu'à 50% de la journée), ne mangeant le fruit que d'environ 10%."
 dubois.117.g: "Charmant."
 dubois.121.t: "Lynx ibérique"
 dubois.121.d: "Notre zoo est enrichi par un nouvel animal fin: aujourd'hui, le #O très attendu #O Lynx#! ibérique a déménagé dans sa nouvelle enceinte."
 dubois.121.f: "Le lynx ibérique (Lynx Pardinus) est une espèce de chat sauvage endémique de la péninsule ibérique dans le sud-ouest de l'Europe. Le lynx ibérique a une fourrure tachetée de couleur jaunâtre brillant à couleurs fauves. Les taches varient en forme et en taille de petit rond à allongé. Ils sont disposés en lignes et diminuent de taille de l'arrière vers les côtés. Aux extrémités des petites oreilles triangulaires, il y a des poils de pinceau de trois centimètres de long. Comme pour le lynx eurasien, ils sont importants pour la capacité auditive de ces lynx. Dans le cas du lynx ibérien, des expériences ont montré que la perte de la brosse réduit la capacité d'entendre et de localiser. Le lynx ibérique est beaucoup plus petit que le lynx eurasien, ce qui est plus répandu dans le nord. Avec un poids corporel comprise entre 9 et 15 kilogrammes, ils pèsent moins des deux tiers d'un lynx eurasien."
 dubois.121.g: "Bien."
 dubois.122.t: "Loup eurasien"
 dubois.122.d: "Notre zoo est enrichi par un nouvel animal fin: aujourd'hui, le #O eurasien très attendu a déménagé dans sa nouvelle enceinte."
 dubois.122.f: "Le loup eurasien (canis lupus lupus), également connu sous le nom de loup commun, est une sous-espèce de loup gris originaire d'Europe et d'Asie. La fourrure des loups eurasiens est colorée gris jaunâtre, gris-brun ou gris foncé. Le dessous du museau et de la gorge sont plus légers, le dos des oreilles apparaît légèrement rougeâtre. Dans la plupart des cas, la coloration arrière montre un patch de selle sombre à noir. La pointe de la queue et l'avant des pattes avant sont également souvent de couleur plus foncée. Le hurlement du loup eurasien est beaucoup plus prolongé et mélodieux que celui de la sous-espèce de loup gris nord-américain, dont les hurlements sont plus forts et ont un accent plus fort sur la première syllabe."
 dubois.122.g: "Dangereux."
 dubois.123.t: "Blaireau eurasien"
 dubois.123.d: "Notre zoo est enrichi par un nouvel animal fin: aujourd'hui, le #O eurasien tant attendu a déménagé dans sa nouvelle enceinte."
 dubois.123.f: "Le blaireau européen (Meles Meles), également connu sous le nom de blaireau eurasien, est une espèce de blaireau dans la famille des mustelidae originaire de presque toute l'Europe. Le blaireau européen est un animal puissamment construit, noir, blanc, brun et gris avec une petite tête, un corps trapu, de petits yeux noirs et une queue courte. Son poids varie, étant de 7 à 13 kg (15-29 lb) au printemps, mais en construisant jusqu'à 15-17 kg (33-37 lb) en automne avant la période de sommeil hivernal. Il est nocturne et est un animal social et fouisé qui dort pendant la journée dans l'une des plusieurs séries de sa gamme territoriale. Les tanières qu'ils construisent (appelées setts) sont les plus complexes et sont transmises de génération en génération."
 dubois.123.g: "Intéressant."
 dubois.124.t: "Hermine"
 dubois.124.d: "Notre zoo est enrichi par un nouvel animal fin: aujourd'hui, le #O Stoat#! tant attendu a déménagé dans sa nouvelle enceinte."
 dubois.124.f: "Le Stoat (Mustela Erminea), également connu sous le nom d'hermine eurasienne, d'hermine berinienne et d'hermine, est un mustelid originaire de l'Eurasie et des parties du nord de l'Amérique du Nord. Le nom de l'hermine est utilisé pour les espèces du genre Mustela, en particulier la stat, dans son manteau d'hiver blanc pur ou sa fourrure. Le stoat est similaire aux moindres belettes en proportions générales, en posture et en mouvement, bien que la queue soit relativement plus longue, dépassant toujours un tiers de la longueur du corps, bien qu'elle soit plus courte que celle de la belette à longue queue. Comme pour la moindre belette, les rongeurs en forme de souris prédominent dans le régime alimentaire de la stat. Cependant, contrairement à la moindre belette, qui se nourrit presque exclusivement de petits campagnols, le stoat s'attaque régulièrement à des espèces de rongeurs et de lagomorphes plus grandes, et éliminera les individus beaucoup plus grands que lui-même."
 dubois.124.g: "Le véritable animal des monarques et des doges."
 dubois.125.t: "Loutre eurasienne"
 dubois.125.d: "Notre zoo est enrichi par un nouvel animal fin: aujourd'hui, le #O eurasien tant attendu a emménagé dans sa nouvelle enceinte."
 dubois.125.f: "La loutre de l'Eurasie (Lutra Lutra) est un mammifère semi-dirigée d'Eurasie. La loutre eurasienne a un régime principalement de poisson et est fortement territorial. Comme pour diverses autres espèces de mustelid, les loutres sont capables de surpuissant et de tuer des proies nettement plus grandes qu'elles, et sont connues pour chasser les grands oiseaux d'eau tels que les oies Greylag adultes à l'occasion. En raison de la structure inhabituelle de ses cheveux, la fourrure de la loutre offre une isolation particulièrement efficace contre le froid et la humidité: comme une fermeture éclair, les cheveux sont entrelacés avec des coins et des rainures imbriquées microscopiquement petites. Une tresse de fourrure extraordinairement dense est créée, qui piège les bulles d'air isolantes, mais repousse en même temps l'eau. Cela maintient la peau de la loutre sèche et son corps chaud."
 dubois.125.g: "Fascinant."
 dubois.126.t: "Ibex alpin"
 dubois.126.d: "Notre zoo est enrichi par un nouvel animal merveilleux: aujourd'hui, le #O Alpine Ibex#! tant attendu a déménagé dans sa nouvelle enceinte."
 dubois.126.f: "L'IBEX alpin est une espèce de chèvre sauvage qui vit dans les montagnes des Alpes européennes. C'est une espèce sexuellement dimorphe: les mâles sont plus grands et portent des cornes courbes plus longtemps que les femelles. Sa couleur de manteau est généralement gris brunâtre. Alpine Ibex a tendance à vivre dans un terrain raide et rugueux près de la ligne de neige. Ils sont également sociaux, bien que les hommes adultes et les femmes se séparent pendant la majeure partie de l'année, se réunissant uniquement pour s'accoupler. Les ibex alpins sont strictement herbivores, avec plus de la moitié de leur alimentation composée d'herbes, et le reste étant un mélange de mousses, de fleurs, de feuilles et de brindilles. L'IBEX Alpine a historiquement parcouru la France, l'Italie, la Suisse, le Liechtenstein, la Bavière, l'Autriche et la Slovénie. À partir du début du XVIe siècle et avec des armes à feu courantes, la population globale a diminué en raison de la surexploitation et du braconnage."
 dubois.126.g: "Têtu."
 dubois.127.t: "Sagesse"
 dubois.127.d: "Notre zoo est enrichi par un nouvel animal merveilleux: aujourd'hui, le #O tant attendu #O sofent#! a déménagé dans sa nouvelle enceinte."
 dubois.127.f: "Le bison sœur ou européen est une espèce européenne de bétail. Des aints ont été trouvés dans les forêts primitives des Europe occidentale, centrale et sud-est jusqu'au début du Moyen Âge. Leur habitat est des forêts à feuilles caduques, conifères et mixtes tempérées. Les vêtements sont des animaux de troupeau, mais selon leur habitat, ils ne se trouvent que dans les petits groupes. Depuis l'extinction des aurochs, le bison a été le mammifère terrestre le plus lourd et le plus grand d'Europe et également le dernier représentant des espèces bovines sauvages sur le continent européen. Dans la préhistoire et l'histoire précoce, sa zone de distribution s'étendait du nord de la péninsule ibérique à travers l'Europe centrale et le sud de la péninsule scandinave aux États baltes; De la baie de Riga, la limite de distribution était du sud-est à la mer Noire et au Caucase. Dans les années 1920, le sœur a été menacé d'extinction; Le dernier sœur libre (une montagne sage) a été abattu en 1927 dans le Caucase. Tous les sages vivants sont descendus aujourd'hui de douze soints conservés dans les zoos et les enclos animaux."
 dubois.127.g: "Rare."
 dubois.131.t: "Hippopotame"
 dubois.131.d: "Notre zoo est enrichi par un nouvel animal exotique: aujourd'hui, le #O tant attendu Hippopotamus#! a déménagé dans sa nouvelle enceinte."
 dubois.131.f: "L'Hippopotame (Hippopotamus amphibius) est un grand mammifère semi-carré originaire d'Afrique subsaharienne. Son nom vient de l'ancien grec pour «River Horse». Après les éléphants et les rhinocéros, l'hippopotame est le prochain mammifère terrestre. C'est également le plus grand artiodactyle terrestre existant. Les hippopotames habitent les rivières, les lacs et les marécages de mangrove. Les taureaux territoriaux président chacun une étendue d'eau et un groupe de cinq à trente vaches et veaux. Pendant la journée, les hippopotames restent frais en restant dans l'eau ou dans la boue, émergeant au crépuscule pour paître les herbes. Alors que les hippopotames se reposent près les uns des autres dans l'eau, le pâturage est une activité solitaire et les hippopotames n'affichent généralement pas de comportement territorial sur terre. Les hippopotames sont parmi les animaux les plus dangereux du monde en raison de leur nature agressive et imprévisible."
 dubois.131.g: "Énorme."
 dubois.132.t: "Lion"
 dubois.132.d: "Notre zoo est enrichi par un nouvel animal exotique: aujourd'hui, le #O Lion#! tant attendu a déménagé dans sa nouvelle enceinte."
 dubois.132.f: "Le lion (Panthera Leo) est un grand chat du genre Panthera originaire d'Afrique et de l'Inde. Il a un corps musclé et à torse large; tête courte et arrondie; oreilles rondes; et une touffe poilue au bout de sa queue. Il est sexuellement dimorphe; Les lions mâles adultes sont plus grands que les femmes et ont une crinière proéminente. Il s'agit d'une espèce sociale, formant des groupes appelés fiertés. Le lion habite les prairies, les savanes et les arbustes. Il est généralement plus diurne que les autres chats sauvages, mais lorsqu'il est persécuté, il s'adapte à être actif la nuit et au crépuscule. L'un des symboles animaux les plus reconnus dans la culture humaine, le lion a été largement représenté dans les sculptures et les peintures, sur les drapeaux nationaux et dans les films et la littérature contemporains."
 dubois.132.g: "Majestueux."
 dubois.133.t: "Éléphant"
 dubois.133.d: "Notre zoo est enrichi par un nouvel animal exotique: aujourd'hui, le #O Elephant#! tant attendu a déménagé dans sa nouvelle enceinte."
 dubois.133.f: "L'éléphant de brousse africain (Loxodonta africana) est l'une des deux espèces d'éléphants africaines existantes et l'une des trois espèces d'éléphants existantes. C'est le plus grand animal terrestre vivant, avec des taureaux atteignant une hauteur d'épaule allant jusqu'à 3,96 m (13 pi 0) et une masse corporelle allant jusqu'à 10,4 t (11,5 tonnes courtes). C'est un mammifère social, voyageant dans des troupeaux composés de vaches et de leur progéniture. L'éléphant de brousse africain a une peau grise avec des poils rares. Ses grandes oreilles couvrent toute l'épaule et aident à réduire la chaleur corporelle; Les battre crée des courants d'air et expose de grands vaisseaux sanguins sur les côtés intérieurs pour augmenter la perte de chaleur par temps chaud. Les éléphants de Bush Africa utilisent leurs troncs pour une communication tactile. Lors de la salutation, un individu de classement inférieur insérera la pointe de son coffre dans la bouche de son supérieur. Les éléphants étireront également leur tronc vers une personne qui approche qu'ils ont l'intention de saluer."
 dubois.133.g: "Super."
 dubois.134.t: "Girafe"
 dubois.134.d: "Notre zoo est enrichi par un nouvel animal exotique: aujourd'hui, le #O girafe#! tant attendu a déménagé dans sa nouvelle enceinte."
 dubois.134.f: "La girafe est un grand mammifère africain appartenant au genre Giraffa. C'est le plus haut animal terrestre vivant et le plus grand ruminant de la Terre. Les principales caractéristiques distinctives de la girafe sont son cou et ses jambes extrêmement longs, ses ossicones en forme de corne et ses motifs de manteau tachetés. Les girafes habitent généralement les savanes et les bois. Leur source de nourriture est des feuilles, des fruits et des fleurs de plantes ligneuses, principalement des espèces d'Acacia, qu'ils parcourent à des hauteurs que la plupart des autres herbivores ne peuvent pas atteindre. Les girafes se trouvent généralement dans les groupes qui varient en taille et en composition en fonction des facteurs écologiques, anthropiques, temporels et sociaux. Avec sa construction dégingandée et son manteau tacheté, la girafe a été une source de fascination tout au long de l'histoire humaine, et son image est répandue dans la culture."
 dubois.134.g: "Élégant"
 dubois.135.t: "Pingouin africain"
 dubois.135.d: "Notre zoo est enrichi par un nouvel animal exotique: aujourd'hui, le #O tant attendu #O africain Penguin#! a déménagé dans sa nouvelle enceinte."
 dubois.135.f: "Le pingouin africain (Spheniscus demersus) est une espèce de pingouin confiné aux eaux d'Afrique australe. Comme tous les pingouins existants, il est sans vol, avec un corps rationalisé et des ailes se raidies et aplaties en nageoires pour un habitat marin. L'espèce a des taches roses distinctives de peau au-dessus des yeux et un masque facial noir. Les parties supérieures du corps sont noires et fortement délimitées par les insistants blancs, qui sont repérés et marqués d'une bande noire. Le pingouin africain est un plongeur de poursuite et se nourrit principalement de poissons et de calmars et est la seule espèce de pingouin qui se reproduit en Afrique. Les pingouins africains sont une espèce couramment observée dans les zoos à travers le monde. Parce qu'ils ne nécessitent pas de températures particulièrement basses, ils sont souvent maintenus dans des enclos extérieurs."
 dubois.135.g: "Au moins, nous avons un pingouin."
 dubois.136.t: "Rat de taupe nue"
 dubois.136.d: "Notre zoo est enrichi par un nouvel animal exotique: aujourd'hui, le #O Mole Rat#! tant attendu a déménagé dans sa nouvelle enceinte."
 dubois.136.f: "Le rat de taupe nu présente un ensemble très inhabituel de traits physiologiques et comportementaux qui lui permettent de prospérer dans un environnement souterrain dur; Plus particulièrement, il s'agit du seul thermoconformateur de mammifère avec une forme de régulation de la température corporelle presque entièrement ectothermique (à sang froid), ainsi que présentant une structure sociale complexe répartie entre les castes reproductives et non reproductives, ce qui en fait et la classification damaraland étroitement apparentée) dans les seuls exemples largement reconnus de l'Eusocialité (la classification la plus élevée de la socialité) chez les mammaux. Le rat de taupe nu n'a pas de sensibilité à la douleur dans sa peau et a des fréquences métaboliques et respiratoires très faibles. Il est également remarquable pour sa longévité et sa résistance au cancer et à la privation d'oxygène."
 dubois.136.g: "Mignon."
 dubois.137.t: "Zèbre"
 dubois.137.d: "Notre zoo est enrichi par un nouvel animal exotique: aujourd'hui, le #O Zebra#! tant attendu a déménagé dans sa nouvelle enceinte."
 dubois.137.f: "Les zèbres sont un sous-genre du genre de cheval, qui se compose de trois espèces. Tous les représentants des zèbres se trouvent exclusivement en Afrique, où ils habitent principalement des paysages ouverts. Il y a plusieurs tentatives pour expliquer le développement évolutif des rayures; Une combinaison de plusieurs effets avantageuses est également concevable. D'une part, Charles Darwin et Alfred Russel Wallace, entre autres, soupçonnaient qu'ils pouvaient agir comme un camouflage dans de hautes herbes ou dans de l'air chaud et chatoyant. Parce que les zèbres vivent dans des troupeaux, cela pourrait rendre plus difficile pour les prédateurs de distinguer les proies. Selon une autre hypothèse testée expérimentalement, les rayures se sont formées pour le camouflage contre les mouches et les couvants de tsetse. D'autres scientifiques soupçonnent que les bandes sont utilisées pour la thermorégulation."
 dubois.137.g: "Chevalin."
 dubois.141.t: "Panda géant"
 dubois.141.d: "Notre zoo est enrichi par un nouvel animal spectaculaire: aujourd'hui, le géant #O tant attendu Panda#! a déménagé dans sa nouvelle enceinte."
 dubois.141.f: "Le panda géant (Ailuropoda melanoleuca) est une espèce d'ours caractérisée par son corps et son corps rotation audacieux en noir et blanc. Le nom «panda géant» est parfois utilisé pour le distinguer du panda rouge, un mustloïde voisin. Bien qu'il appartient à l'ordre Carnivora, le panda géant est un folivore, avec des pousses de bambou et des feuilles représentant plus de 99% de son alimentation. Les pandas géants sont généralement solitaires. Chaque adulte a un territoire défini et une femelle ne tolère pas les autres femmes de sa gamme. Les rencontres sociales se produisent principalement au cours de la brève saison de reproduction au cours de laquelle les pandas à proximité les uns avec les autres se réuniront. La faible qualité de nutrition du bambou signifie que les pandas doivent manger plus fréquemment, et en raison de leur manque de prédateurs majeurs, ils peuvent être actifs à tout moment de la journée."
 dubois.141.g: "Fantastique."
 dubois.142.t: "Orang-outan"
 dubois.142.d: "Notre zoo est enrichi par un nouvel animal spectaculaire: aujourd'hui, le #O tant attendu #O Orangutan#! a déménagé dans sa nouvelle enceinte."
 dubois.142.f: "Les orangs-outans sont de grands singes originaires des forêts tropicales de l'Indonésie et de la Malaisie. Le plus arboricole des grands singes, les orangs-outans passent la plupart de leur temps dans les arbres. Ils ont des bras proportionnellement longs et des jambes courtes et ont des cheveux bruns rougeâtre couvrant leur corps. Les mâles adultes dominants développent des tampons de joues ou des brides distinctifs et font de longs appels qui attirent les femmes et intimident les rivaux; Les hommes subordonnés plus jeunes ne ressemblent pas et ne ressemblent pas à des femmes adultes. Ils sont les plus solitaires des grands singes: les liens sociaux se produisent principalement entre les mères et leur progéniture dépendante. Les orangs-outans sont parmi les primates les plus intelligents. Ils utilisent une variété d'outils sophistiqués et construisent des nids de sommeil élaborés chaque nuit à partir de branches et de feuillage."
 dubois.142.g: "Avec ses compétences, il pourrait faire un bon bibliothécaire."
 dubois.143.t: "Tigre du Bengale"
 dubois.143.d: "Notre zoo est enrichi par un nouvel animal spectaculaire: aujourd'hui, le #O Bengal Tiger#! tant attendu a déménagé dans sa nouvelle enceinte."
 dubois.143.f: "Le Tiger du Bengale est une population de la sous-espèce Panthera Tigre Tigre et de la sous-espèce de tigre nommée. Il se classe parmi les plus grands chats sauvages vivants aujourd'hui. Le manteau du tigre du Bengale est jaune à orange clair, avec des rayures allant du brun foncé au noir; Le ventre et les parties intérieures des membres sont blancs et la queue est orange avec des anneaux noirs. L'unité sociale de base du tigre est composée d'une femme et de sa progéniture. Les animaux adultes ne se rassemblent temporairement que lorsque des conditions spéciales le permettent, comme des fournitures abondantes de nourriture. Sinon, ils mènent une vie solitaire, chassant individuellement pour les animaux de la forêt et des prairies sur lesquels ils s'attaquent. Dans la plupart des cas, les tigres s'approchent de leur victime de côté ou derrière de la distance aussi près que possible et saisissent la gorge de la proie pour la tuer."
 dubois.143.g: "Noble."
 dubois.144.t: "Tapir malais"
 dubois.144.d: "Notre zoo est enrichi par un nouvel animal spectaculaire: aujourd'hui, le #O Malaya Tapir#! tant attendu a déménagé dans sa nouvelle enceinte."
 dubois.144.f: "Le tapir malais (tapirus indicus) est la seule espèce de tapir vivante en dehors des Amériques. Il est facilement identifié par ses marques, notamment le patch de couleur claire qui s'étend de ses épaules à ses postes postérieurs. Il est recouvert de cheveux noirs, à l'exception des pointes de ses oreilles, qui, comme avec d'autres tapirs, sont bordées de blanc. Le motif est pour le camouflage; La coloration perturbée rompt son contour et le rend plus difficile à reconnaître; D'autres animaux peuvent le confondre avec un gros rocher, plutôt que des proies, lorsqu'il est allongé pour dormir. Les tapirs malais ont une très mauvaise vue, s'appuyant plutôt sur d'excellents sens de l'odeur et de l'ouïe."
 dubois.144.g: "Exotique."
 dubois.145.t: "Dragon de Komodo"
 dubois.145.d: "Notre zoo est enrichi par un nouvel animal spectaculaire: aujourd'hui, le #O Komodo Dragon#! tant attendu a déménagé dans sa nouvelle enceinte."
 dubois.145.f: "Le dragon de Komodo (Varanus Komodoensis) est membre de la famille de Lizard Varanidae Monitor qui est endémique aux îles indonésiennes de Komodo, Rinca, Flores et Gili Motang. Il s'agit de la plus grande espèce existante de lézard, atteignant une longueur maximale de 3 m (9,8 pieds), et pesant jusqu'à 70 kg (150 lb). En raison de leur taille, les dragons Komodo sont des prédateurs Apex et dominent les écosystèmes dans lesquels ils vivent. Komodo Dragons chasse et proie des embuscades, y compris les invertébrés, les oiseaux et les mammifères. Le comportement du groupe de Komodo Dragons dans la chasse est exceptionnel dans le monde des reptiles. Leur régime alimentaire se compose principalement de Javan Rusa (Rusa Timorensis), bien qu'ils mangent également des quantités considérables de charognes. Ils ont été enregistrés pour la première fois par des scientifiques occidentaux en 1910. Leur grande taille et leur réputation redoutable en font des expositions populaires du zoo."
 dubois.145.g: "Terrible."
 dubois.146.t: "Léopard de neige"
 dubois.146.d: "Notre zoo est enrichi par un nouvel animal spectaculaire: aujourd'hui, le #O Snow Leopard#! tant attendu a déménagé dans sa nouvelle enceinte."
 dubois.146.f: "Le léopard des neiges, communément appelé l'once, est originaire des chaînes de montagnes de l'Asie centrale et du Sud. Le léopard des neiges montre plusieurs adaptations pour vivre dans des environnements froids et montagneux. Ses petites oreilles arrondies aident à minimiser la perte de chaleur. Il est solitaire et surtout actif à l'aube jusqu'à tôt le matin, et encore l'après-midi et les premières soirées. Les léopards des neiges ne peuvent pas rugir malgré son os hyoïde partiellement ossifié, car leurs plis vocaux courts de 9 mm (0,35 po) fournissent peu de résistance au flux d'air. Les vocalisations du Snow Leopard incluent miaulement, grognement, Prustten et gémissant. Ils peuvent ronronner lors de l'expiration. Le léopard des neiges est largement utilisé dans l'héraldique et comme emblème en Asie centrale. Ils ont longtemps été utilisés comme symbole politique, les bars AQ («léopard blanc»), par Tatars, Kazakhs et Bulgars."
 dubois.146.g: "Sublime."
 dubois.147.t: "Guépard asiatique"
 dubois.147.d: "Notre zoo est enrichi par un nouvel animal spectaculaire: aujourd'hui, le #O tant attendu #O Asiatic Cheetah#! a déménagé dans sa nouvelle enceinte."
 dubois.147.f: "Le guépard est l'animal terrestre le plus rapide du monde. Dans un court laps de temps pendant une poursuite, un guépard peut produire 60 fois plus de chaleur qu'au repos, avec une grande partie de la chaleur produite à partir de la glycolyse, stockée pour éventuellement augmenter la température corporelle. Le guépard asiatique allait autrefois de l'Afrique du Nord subsaharienne à travers l'Asie centrale à l'Inde. Au cours du XIXe siècle, la gamme du guépard asiatique a continué de décliner avant qu'elle ne s'éteint dans presque toutes les régions, à l'exception d'une petite région en Iran. Dès la Première Guerre mondiale, les princes indiens avaient des guépards importés d'Afrique, car les espèces locales étaient presque éteintes."
 dubois.147.g: "Rapide."
 dubois.148.t: "Panda rouge"
 dubois.148.d: "Notre zoo est enrichi par un nouvel animal spectaculaire: aujourd'hui, le #O Red Panda#!, tant attendu, a déménagé dans sa nouvelle enceinte."
 dubois.148.f: "Les pandas rouges sont un genre de mammifères originaires de l'Himalaya oriental et du sud-ouest de la Chine et se nourrissent principalement de bambou. Contrairement aux hypothèses actuelles dans ce sens, le genre n'est pas étroitement lié au panda géant. En forme, ils ressemblent à un raton laveur, mais sont plus minces. Leur fourrure est longue et douce, brun rougeâtre à cuivre rouge sur le dessus, parfois avec une teinte jaunâtre et un noir brillant sur le fond. Le visage peut être coloré individuellement - il est principalement brun rougeâtre avec des stries de déchirures blanches, le museau est court et le nez est nu et noir. Les petits pandas sont des grimpeurs très qualifiés et acrobatiques. Pendant qu'ils partent à la recherche de nourriture le soir et la nuit, pendant la journée, ils dorment habituellement dans les fourches des arbres, dans les cavités des arbres, ils se recroquevillent et mettent la queue devant leurs visages pour les protéger. Ils sont très sensibles à la chaleur; Les températures supérieures à 25 ° C peuvent être très difficiles pour eux."
 dubois.148.g: "Celui-ci était difficile à trouver."
 dubois.151.t: "Tortue de mer verte"
 dubois.151.d: "Notre zoo est enrichi par un nouvel animal exceptionnel: aujourd'hui, le #O Green Sea Turtle#! tant attendu a déménagé dans sa nouvelle enceinte."
 dubois.151.f: "La tortue de mer verte (Chelonia Mydas) est une espèce de grande tortue de mer de la famille Cheloniidae. Le corps dorsoventralement aplati de C. mydas est recouvert d'une grande carapace en forme de larme; Il a une paire de grandes nageoires en forme de pagaie. Il est généralement légèrement coloré, bien que dans les populations du Pacifique oriental, les parties de la carapace peuvent être presque noires. Les adultes habitent généralement les lagunes peu profondes, se nourrissant principalement de diverses espèces de herbiers marins. Comme les autres tortues de mer, les tortues de mer vertes migrent de longues distances entre le terrain d'alimentation et les plages d'éclosion. De nombreuses îles dans le monde sont connues sous le nom de Turtle Island en raison des tortues de mer vertes nichées sur leurs plages. Les tortues de mer vertes peuvent vivre à 90 ans dans la nature."
 dubois.151.g: "Chenu."
 dubois.152.t: "Manta"
 dubois.152.d: "Notre zoo est enrichi par un nouvel animal exceptionnel: aujourd'hui, le #O Manta Ray#! tant attendu a déménagé dans sa nouvelle enceinte."
 dubois.152.f: "Le rayon océanique géant (Mobula Birostris) est une espèce de rayon dans les Mobulidae familiaux et le plus grand type de rayon au monde. Il est circonglobal et se trouve généralement dans les eaux tropicales et subtropicales, mais peut également être trouvée dans les eaux tempérées. Le rayon de manta océanique géant peut atteindre 9 m (30 pi) de longueur maximale et à une taille de disque de 7 m (23 pi) de diamètre avec un poids d'environ 3 000 kg (6 600 lb) mais la taille moyenne couramment observée est de 4,5 m (15 pi). La peau est lisse avec une diffusion de tubercules coniques et en forme de crête. La coloration de la surface dorsale (supérieure) est noire, brun foncé ou bleu d'acier, parfois avec quelques taches pâles et généralement avec un bord pâle. En raison de sa grande taille et de sa vitesse en cas de danger, le rayon manta océanique a très peu de prédateurs naturels qui pourraient y être mortels."
 dubois.152.g: "Gigantesque."
 dubois.153.t: "Kangourou rouge"
 dubois.153.d: "Notre zoo est enrichi par un nouvel animal exceptionnel: aujourd'hui, le #O Red Kangaroo#! tant attendu a déménagé dans sa nouvelle enceinte."
 dubois.153.f: "Le kangourou rouge (Osphanter Rufus) est le plus grand de tous les kangourous, le plus grand mammifère terrestre originaire d'Australie et le plus grand marsupial existant. Cette espèce est un très grand kangourou avec des oreilles longues et pointues et un museau en forme carrée. Ils sont sexuellement dimorphes car les mâles ont une fourrure courte et brun rouge, s'estompant à un buff pâle en dessous et sur les membres. Les mâles atteignent une longueur de tête et de corps de 1,3 à 1,6 m (4 pi 3 à 5 pi 3 pouces) avec une queue qui ajoute 1,2 m (3 pi 11 pouces) à la longueur totale et qui sont appelés Australiens «Big Reds». Les jambes du kangourou rouge fonctionnent un peu comme un élastique, avec le tendon d'Achille s'étendant lorsque l'animal descend, puis libérant son énergie pour propulser l'animal de haut en bas, permettant la locomotion de rebond caractéristique. Ils peuvent atteindre des vitesses d'environ 60 km / h (37 mph)."
 dubois.153.g: "Superbe."
 dubois.154.t: "Koala"
 dubois.154.d: "Notre zoo est enrichi par un nouvel animal exceptionnel: aujourd'hui, le #O Koala#!, tant attendu, a déménagé dans sa nouvelle enceinte."
 dubois.154.f: "Le Koala (Phascolarctos Cinereus) est un marsupial herbivore arboricole originaire d'Australie. Il est facilement reconnaissable par son corps robuste, sans queue et sa grande tête avec des oreilles rondes et moelleuses et un grand nez en forme de cuillère. La couleur de la fourrure varie du gris argenté au brun chocolat. Les koalas habitent généralement les bois d'eucalyptus ouverts, car les feuilles de ces arbres constituent la majeure partie de leur alimentation. Ce régime d'eucalypt a une faible teneur en nutrition et calorique et contient des toxines qui dissuadent la plupart des autres mammifères de se nourrir dessus. Les koalas sont largement sédentaires et dorment jusqu'à vingt heures par jour. Ce sont des animaux asociaux et le lien n'existe que entre les mères et la progéniture dépendante. En raison de son apparence distinctive, le koala ainsi que les kangourous sont reconnus dans le monde entier comme symboles de l'Australie."
 dubois.154.g: "Mignon."
 dubois.155.t: "Ornithorynque"
 dubois.155.d: "Notre zoo est enrichi par un nouvel animal exceptionnel: aujourd'hui, le scénario #O tant attendu a déménagé dans sa nouvelle enceinte."
 dubois.155.f: "L'enjeu (Ornithorhynchus anatinus) est l'une des cinq espèces existantes de monotrimes, mammifères qui pondent des œufs au lieu de donner naissance à des jeunes. Comme les autres monotrimes, il détecte les proies par électrolocation. C'est l'une des rares espèces de mammifères venimeux, car l'ornithorynque mâle a un éperon sur le pied postérieur qui délivre un venin, capable de provoquer une douleur intense aux humains. L'apparence inhabituelle de cette ponte des œufs, à bec de canard, à queue de castor et aux mammifères de tête de la tête de la gorge déconcertait les naturalistes européens déconcertés lorsqu'ils l'ont rencontré pour la première fois. En 1799, les premiers scientifiques à examiner un corps en ornithologue-orage préservé ont jugé un faux, composé de plusieurs animaux cousus ensemble. Les caractéristiques uniques de l'ornithorynque en font un sujet important dans l'étude de la biologie évolutive et un symbole reconnaissable et emblématique de l'Australie."
 dubois.155.g: "Paradoxe."
 dubois.156.t: "Casoar"
 dubois.156.d: "Notre zoo est enrichi par un nouvel animal exceptionnel: aujourd'hui, le Cassowary#! tant attendu tant attendu a déménagé dans sa nouvelle enceinte."
 dubois.156.f: "Les cassances sont des oiseaux sans vol sans quille sur leurs os de sternum. Trois espèces de casso -owary existent. Le plus courant, le Cassowary du Sud, est l'oiseau vivant le plus haut et le plus lourd, plus petit que l'autruche et l'émeu. Environ 90% du régime du Cassoary se compose principalement de fruits, bien que toutes les espèces soient des omnivores opportunistes. En règle générale, toutes les cassoues sont des oiseaux timides qui se trouvent dans la forêt profonde. Ils sont aptes à disparaître bien avant qu'un humain ne sache qu'ils étaient là, mais s'ils sont provoqués, ils sont capables d'infliger des blessures graves, voire mortelles, aux chiens et aux personnes. Le Cassowary a souvent été étiqueté «l'oiseau le plus dangereux du monde»."
 dubois.156.g: "À quoi sert ce casque?"
 dubois.157.t: "Lion de mer néo-zélandais"
 dubois.157.d: "Notre zoo est enrichi par un nouvel animal exceptionnel: aujourd'hui, la mer tant attendue #O Nouvelle-Zélande Sea Lion#! a emménagé dans sa nouvelle enceinte."
 dubois.157.f: "Le lion maritime néo-zélandais est un grand sceau à oreilles originaire de la zone sous-polaire. Les taureaux sont de couleur noire de couleur et d'atteinte de 2,45 mètres; Une crinière d'épaule les fait paraître massives. Les vaches sont plus délicates: elles sont brunes claires et au plus 2 mètres de long. Les colonies se trouvent dans le sud de la Nouvelle-Zélande sur les îles sous-antarctiques: les îles d'Auckland, les îles Snares et l'île Campbell. 95% des actions mondiales se trouvent dans trois colonies sur les îles d'Auckland. Au 19e siècle, de nombreux lions de mer ont été tués par des scellants. Les îles Sea des îles d'Auckland ont été complètement anéanties en seulement vingt ans après la découverte des îles en 1806. Aujourd'hui, les îles d'Auckland sont un sanctuaire de phoque désert où les populations se sont largement rétablies."
 dubois.157.g: "Robuste."
 dubois.200.t: "Ouverture du musée d'histoire naturelle"
 dubois.200.d: "Le professeur [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] a ouvert le musée d'histoire naturelle aujourd'hui, présentant le développement des êtres vivants et de l'évolution."
 dubois.200.f: "Lorsque le professeur [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] a fièrement annoncé l'ouverture du premier musée d'histoire naturelle de notre pays, certains avaient déjà oublié quel effort il avait fallu pour pousser ce projet. Le Musée national, qui avait auparavant abrité l'histoire naturelle, avait résisté à cette décision avec ses dirigeants. Pour beaucoup, l'histoire naturelle n'était qu'un département subordonné. C'est grâce au professeur [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] qu'il a utilisé ses contacts dans le gouvernement et a poursuivi son idée sans compromis. Surtout la recherche paléontologique en bénéficiera à l'avenir, et les visiteurs ont déjà exprimé leur grand intérêt pour les créatures éteintes, ainsi que pour poser des questions sur l'origine de l'homme. La paléontologie, anciennement une science purement auxiliaire ou une occupation temporaire des géologues, est maintenant devenue une science établie avec ses propres institutions et une réputation qui la met à égalité avec d'autres sciences naturelles."
 dubois.200.g: "Cela ressemble à un endroit idéal à visiter!"
 dubois_natural_history_museum_modifier: "Musée d'histoire naturelle"
 dubois.201.t: "Destination d'expédition paléontologique"
 dubois.201.f: "Un [concept_dubois_paleontologist] peut être envoyé à des formations où il déterre chaque année des fossiles jusqu'à ce qu'il soit rappelé de sa position. De grandes formations peuvent également contenir des os de dinosaures. Celles-ci varient d'un continent au continent. Le moyen le plus simple d'accéder à une formation est de contrôler l'état associé. Cependant, l'accès peut également être acquis pacifiquement grâce à des licences paléontologiques."
 dubois.201.g: "Pas grave."
 dubois.202.t: "Dent de requin"
 dubois.202.d: "Après avoir examiné une formation rocheuse, une équipe paléontologique a rassemblé une collection de dents de requin fossile."
 dubois.202.f: "Outre les vertèbres, les dents de requin fossile sont généralement les seuls fossiles survivants de requins éteints. Étant donné que les requins produisent un grand nombre de dents en raison de leurs dents de revolver, ce sont parmi les fossiles les plus fréquemment trouvés. Dès 1616, Fabio Colonna a pu montrer dans son traité de Glossopetris Dissertatio que les langues de vipère supposées sont en fait des dents de requin. Squalicorax Pristodontus avait des dents plates et triangulaires, jusqu'à un maximum de trois centimètres de long. Les bords de coupe étaient finement dentelés comme aujourd'hui dans le requin tigre. Au Crétacé, le genre Squalicorax a été distribué dans le monde. Des dents fossilisées ont été trouvées dans les sédiments mésozoïques des Amériques, de l'Afrique, du Japon, de l'Australie, de l'Inde, de la Russie, du Moyen-Orient et de l'Europe."
 dubois.202.g: "Sont-ils toujours tranchants?"
 dubois.203.t: "Empreintes de dinosaures?"
 dubois.203.d: "[SCOPE.sCharacter('pb_leader').GetFullName] doute une découverte récente du professeur [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName]."
 dubois.203.f: "Lorsque le professeur [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] a annoncé une nouvelle découverte dans une formation rocheuse, le chef de la petite bourgeoisie est également venu voir la sensation paléontologique pour lui-même. Cependant, il a montré peu de compréhension pour les prétendus empreintes de dinosaures. En fait, [SCOPE.sCharacter('pb_leader').GetFullName] a expliqué qu'il ne pouvait rien voir de spécial dans les étranges indentations. Le philistinisme du chef politique a suscité une dispute à part entière avec le professeur, qui a exigé des excuses sur place. Les querelles sont rapidement devenues un conflit entre les partisans de [SCOPE.sCharacter('pb_leader').GetLastName] et les universitaires autour du professeur [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName]."
 dubois.203.g: "Ce sont des empreintes de dinosaures."
 dubois.203.h: "Ces indentations peuvent être n'importe quoi."
 dubois.204.t: "Paléosinopa"
 dubois.204.d: "Les scientifiques ont récemment découvert le squelette d'un mammifère précoce. Il s'agit d'un exemple particulièrement bien conservé."
 dubois.204.f: "Palaeosinopa est un genre de mammifères dans la famille des Pantolestidae, maintenant éteint. Les animaux ressemblaient aux insectivores d'aujourd'hui et vivaient du Paléocène supérieur à l'Éocène inférieur il y a 59 à 48 millions d'années. Les preuves sont principalement connues d'Amérique du Nord, plus rarement d'Europe. Des découvertes importantes, y compris des squelettes complètes, viennent du nord-ouest des États-Unis. Le membre Fossil Butte de la Formation de Green River avec un âge d'environ 52 millions d'années et la formation de Willwood quelque peu plus âgée stratigraphiquement est particulièrement exceptionnelle. Les représentants de Palaeosinopa ont été caractérisés par un physique robuste et une longue queue. Les pattes avant plus courtes par rapport aux pattes arrière plus longues semblaient plutôt primitives. En raison du physique, un mode de vie semi-aquatique est reconstruit pour les animaux, la structure des dents parle à son tour des aliments à prédominance animale. En conséquence, Palaeosinopa semble avoir habité un habitat similaire à celui des loutres d'aujourd'hui."
 dubois.204.g: "Fantastique."
 dubois.204.h: "Un cadeau parfait pour un ami!"
 dubois.205.t: "Os dans la mine de mine"
 dubois.205.d: "Les mineurs ont trouvé des os d'une espèce préhistorique dans un arbre du [SCOPE.sState('dubois_excavation_state').GetName]. Le professeur [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] a accepté d'examiner le site de plus près."
 dubois.205.f: "Tout le monde n'était pas aussi enthousiaste à propos de la découverte en os dans la mine que le paléontologue qui avait été convoqué. La gestion des mines était préoccupée par le fait qu'une fouille paléontologique puisse interférer avec le travail. Et en effet, après une brève inspection des découvertes, le professeur [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] devrait déterminer que les travaux dans l'arbre devraient être reportés en faveur d'une fouille scientifique professionnelle. Les industriels ont déjà protesté. La découverte fossile devient ainsi un problème politique. Parce que l'intelligentsia est désormais également très intéressée et insiste pour fouiller les fossiles. La médiation des voix envisagez d'éviter une fouille et de tenir des registres, ce qui n'affecterait pas le travail minier et pourrait être un bon compromis politique, mais nous signifierait que nous ne serions pas en mesure de sauver les fossiles nous-mêmes."
 dubois.205.g: "Nous devons avoir ces fossiles à tout prix."
 dubois.205.h: "Notre scientifique peut examiner l'endroit mais ne devrait pas creuser la mine."
 dubois.205.i: "Ne dérangez pas ces messieurs."
 dubois.206.t: "Composition"
 dubois.206.d: "Cette année, [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')], sous la direction du professeur [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName], sur le site d'excavation de [SCOPE.sState('dubois_excavation_state').GetName], ont découvert des spécimens particulièrement beaux de la composition."
 dubois.206.f: "La composition est un genre brachiopode éteint qui vivait du Dévonien tardif au permien tardif. Composita avait une distribution mondiale cosmopolite, ayant vécu sur tous les continents, sauf en Antarctique ,.composita avait une coquille lisse avec un pli et un sulcus plus ou moins distincts et une ouverture ronde pour le pédicule sur la valve pédiculaire. La composition est incluse dans la famille des Athyridae (ordre athyriddida) et placée dans la sous-famille Spirigerellinae. Seuls les Philistins reconnaîtraient une simple coquille dans ce fossile résistant à l'époque."
 dubois.206.g: "C'est tellement ... excitant."
 dubois.207.t: "Trilobite"
 dubois.207.d: "Le professeur [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] a remis un excellent spécimen trilobite à la collection paléontologique aujourd'hui. Il a environ 400 millions d'années et d'une grande valeur scientifique. Au moins, il le dit."
 dubois.207.f: "Les trilobites sont une classe éteinte d'arthropodes marins. Ils ont existé pendant presque toute la durée du Paléozoïque, de la 2e série du Cambrien (commençant il y a 521 millions d'années) à l'événement d'extinction de masse à la fin du Permien, il y a environ 251 millions d'années. Un grand nombre de leurs exosquelettes, renforcés avec de la calcite (carbonate de calcium), ont été préservés en fossiles, ce qui permet de reconstruire l'évolution et la variété des formes des nombreuses espèces. Ceci, combiné à leur persistance stratigraphique et à leur large gamme géographique, fait des trilobites d'index importants fossiles pour le Paléozoïque, en particulier le Cambrien. La classe éteinte de Trilobita se compose de neuf ordres reconnus, de plus de 150 familles, de plus de 5000 genres et de plus de 15 000 espèces décrites."
 dubois.207.g: "Merci, professeur."
 dubois.208.t: "Ammonites"
 dubois.208.d: "Des ammonites trouvées dans le [SCOPE.sState('dubois_excavation_state').GetName] sont un autre ensemble remarquable de fossiles, enrichissant la collection paléontologique de notre nation."
 dubois.208.f: "Les Ammonites (Ammonoidea) sont un sous-groupe éteint de céphalopodes. Ce taxon était très diversifié avec plus de 1500 genres connus. Le nombre d'espèces peut être d'environ 30 000 à 40 000. La taille de la coquille des animaux adultes se situe généralement dans la plage de 1 à 30 cm. De leur première apparition dans le Dévonien inférieur à leur extinction à la fin du Crétacé (frontière du Crétacé-Paleogène), les ammonites représentent un grand nombre de fossiles d'index sur une période d'environ 350 millions d'années; En partie, la délimitation chronologique des sédiments marins est effectuée exclusivement sur la base des ammonites. Ils sont donc d'une grande importance pour la géologie et la paléontologie. Le taxon Ammonoidea a été mentionné pour la première fois en 1884 par Karl Alfred von Zittel dans son manuel sur la paléontologie. Le nom vient de l'antiquité, Pline l'aîné a qualifié les fossiles de «Ammonis cornua» (Horns d'Ammon)."
 dubois.208.g: "Laissez-moi un."
 dubois.209.t: "Flore fossilisée"
 dubois.209.d: "[Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')] ont trouvé une flore fossilisée des millions d'années dans une carrière."
 dubois.209.f: "Dans le carbonifère (il y a environ 360 à 300 millions d'années), les fougères (sous des formes plus grandes qu'aujourd'hui, généralement appelées fougères d'arbres) ainsi que des plantes en cabine et en lycopodes ont formé d'énormes forêts et créé la base de la plupart des dépôts de charbon d'aujourd'hui. Les découvertes fossiles les plus anciennes proviennent du Dévonien inférieur (il y a environ 400 millions d'années). Les fougères sont donc probablement plus anciennes que les plantes de graines, qui sont apparues pour la première fois dans le Dévonien supérieur."
 dubois.209.g: "La pierre angulaire de la révolution industrielle."
 dubois.210.t: "Œufs de dinosaure"
 dubois.210.d: "Certains objets ronds, d'abord considérés comme de simples pierres, se sont avérés être des œufs à un examen plus approfondi. Les scientifiques ne savent pas encore à qui ils appartenaient exactement, mais ils les attribuent sans aucun doute à une espèce de dinosaure."
 dubois.210.f: "En 1859, les premiers fossiles d'oeufs de dinosaures scientifiquement documentés ont été découverts dans le sud de la France par un prêtre catholique et un naturaliste amateur nommé le père Jean-Jacques Pouech; Il pensait cependant qu'ils étaient coupés par des oiseaux géants. Les premiers fossiles d'oeufs de dinosaures scientifiquement reconnus ont été découverts de manière fortuite en 1923 par une équipe américaine du musée d'histoire naturelle tout en recherchant des preuves de premiers humains en Mongolie. Ces œufs ont été attribués à tort aux protocératops d'herbivore localement abondants, mais sont maintenant connus pour être des œufs d'ovinaptor. Les découvertes d'œufs ont continué à monter dans le monde entier, ce qui conduit au développement de plusieurs schémas de classification concurrents."
 dubois.210.g: "Gérer attentivement."
 dubois.211.t: "Excavation de dinosaures"
 dubois.211.d: "Tout en enquêtant sur une grande formation, le professeur [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] a rencontré une découverte sensationnelle: un os de dinosaure! Le [concept_dubois_paleontologist] s'est immédiatement organisé pour une excavation à grande échelle pour commencer dans l'espoir de trouver plus de pièces."
 dubois.211.f: "`` La combinaison de ces personnages, certains, comme les sacrés, tout à fait particuliers parmi les reptiles, d'autres empruntes, pour ainsi dire, à des groupes maintenant distincts les uns des autres, et tous manifestés par des créatures dépassant de loin suffisamment de terrain pour établir une tribu distincte ou un sous-ordre de la répression saute. -Richard Owen"
 dubois.211.g: "Obtenez vos pelles!"
 dubois.213.t: "Fragments fossiles"
 dubois.213.d: "Sur le site de Dinosaur Dig, les scientifiques ont obtenu des découvertes fossiles plus petites."
 dubois.213.f: "\"Ce n'est peut-être pas ce que nous recherchons, mais un sou économisé est un sou gagné.\" -[SCOPE.sCharacter('dubois_paleontologist_scope').GetFullName]"
 dubois.213.g: "Collectez les fossiles!"
 dubois.214.t: "Os de dinosaure"
 dubois.214.d: "L'équipe scientifique du professeur [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] a fait une nouvelle découverte sur le site de Dinosaur Dig."
 dubois.214.f: "«À la vue d'un seul os, d'un seul morceau d'os, je reconnais et reconstruit la partie de l'ensemble dont elle aurait été prise. L'être entier auquel ce fragment appartenait apparaît dans mon esprit. -Georges Cuvier"
 dubois.214.g: "Un autre os pour la collection."
 dubois.215.t: "Crâne de dinosaure"
 dubois.215.d: "Les fouilles à la fosse de dinosaures ont mis au jour une magnifique tête squelettique."
 dubois.215.f: "«La tête était aussi longue ou plus longue que celle d'un grizzli complètement adulte, et les mâchoires étaient plus profondes en proportion de leur longueur. Le museau était plus court et plus profond que celui d'un chien de taureau. Les dents étaient toutes des crocs cylindriques tranchants, lisses et scintillantes et de taille irrégulière. À une certaine distance de chaque mâchoire, ils projetés à trois pouces au-dessus de la gomme et ont été coulés à un pouce dans la marge de la mâchoire, étant donc aussi long que les crocs d'un tigre, mais plus minces. Deux de ces crocs se sont croisés de chaque côté du milieu de l'avant. Outre les petits poissons, les reptiles ont sans aucun doute fourni les demandes de son appétit. -Edward buveur"
 dubois.215.g: "J'espère que c'est un tricératops!"
 dubois.216.t: "Squelette de dinosaure"
 dubois.216.d: "Après un travail minutieux, le professeur [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] a réussi à découvrir un impressionnant squelette de dinosaure, dont certains os sont particulièrement bien conservés."
 dubois.216.f: "`` Le squelette lui-même a été organisé au musée de la Philadelphia Academy of Sciences, selon cette restauration, et lorsque le professeur Cope m'a montré et a expliqué ses particularités, j'ai remarqué que les articulations des vertèbres ont été inversées et lui ont suggéré doucement qu'il avait tout le mal.  Son indignation était formidable, et il a affirmé dans un langage fort qu'il avait étudié l'animal pendant plusieurs mois et devrait au moins connaître une extrémité de l'autre. -Othniel Charles Marsh"
 dubois.216.g: "Fascinant."
 dubois.220.t: "Excavation terminée"
 dubois.220.d: "Les [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')] ont terminé leurs fouilles sur le site de Dinosaur. Une enquête scientifique importante prend fin."
 dubois.220.f: "«Le chasseur de fossiles doit d'abord être un passionné scientifique. Il doit être disposé à supporter toutes sortes de difficultés, à souffrir de froid au début du printemps et à la fin de l'automne et au début de l'hiver, pour souffrir de chaleur intense et l'éblouissement du soleil pendant les mois d'été, et il doit être prêt à boire de l'eau alcaline, et dans certaines régions pour lutter contre l'attaque du mosquito et d'autres parasites. Il doit être un ingénieur pour pouvoir gérer de grandes masses de pierre et les transporter sur des déchets de désert sans route au point d'expédition le plus proche; Il doit avoir une touche délicate et habile pour préserver les moindres fragments d'os lorsqu'il est fracturé; Il doit se contenter d'une vie très simple, car la profession est rarement, voire jamais, rémunération, et il est presque invariablement sous-payé; Il doit trouver sa principale récompense et stimulus dans le sens de la découverte et dans l'envoi de spécimens dans les musées qu'il n'a jamais vus au profit d'un public qui a peu de connaissances ou d'appréciation des auto-sacrifices que le chasseur de fossiles a fait. -Henry Fairfield Osborn"
 dubois.220.g: "Je m'attends à un nouveau squelette de dinosaure pour notre collection - au moins."
 dubois.221.t: "Eusthénoptère"
 dubois.221.d: "Le professeur [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] a découvert une forme de poisson préhistorique rare qui pourrait représenter une première étape de la transition des animaux aquatiques aux animaux terrestres."
 dubois.221.f: "EUSTHENOPTERON est un genre éteint de poisson pêcheur (Sarcopterygii) du Dévonien supérieur de l'Amérique du Nord et de l'Europe. Il est considéré comme un excellent exemple de représentants originaux du tétrapodomorpha. Étant donné que Eusthenopteron possédait un organe de la vessie pulmonaire et un puissant squelette FIN En plus des branchies, il aurait pu être possible de se déplacer brièvement à l'extérieur de l'eau. Dans le squelette des nageoires avant, les trois os de l'extrémité des vertébrés terrestres, humérus, ulna et rayon, peuvent déjà être différenciés. Les deux nageoires dorsales pointues ont été réglées loin en arrière, les nageoires pelviennes et les nageoires anales face à eux."
 dubois.221.g: "Incroyable."
 dubois.222.t: "Archéopteryx"
 dubois.222.d: "Lors d'une fouille dans les montagnes calcaires bavardes près de Solnhofen, le professeur [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] a fait une découverte étonnante qui équivalait à une sensation scientifique: a-t-il découvert le lien manquant entre les reptiles et les oiseaux?"
 dubois.222.f: ""
 dubois.223.t: "Mégatherium"
 dubois.223.d: "Au cours d'une enquête paléontologique, l'équipe du professeur [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] a récupéré des os appartenant à un paresseux géant."
 dubois.223.f: ""
 dubois.224.t: "Ichthyosaurus"
 dubois.224.d: "Le chef des fouilles paléontologiques rapporte qu'il a découvert un dinosaure qui ressemble à la moitié des poissons, à moitié dauphin."
 dubois.224.f: ""
 dubois.225.t: "Smilodon"
 dubois.225.d: "Le département d'histoire naturelle peut fièrement indiquer une découverte: notre paléontologue a apparemment trouvé le squelette d'un tigre à dents de sabre."
 dubois.225.f: ""
 dubois.226.t: "Ptérodactyle"
 dubois.226.d: "Les os découverts d'un petit ptérosaure ravissent le monde scientifique. Ils ont déjà été envoyés à la collection paléontologique."
 dubois.226.f: ""
 dubois.227.t: "Ichthyostega"
 dubois.227.d: "Lorsque la Zeppelin a atterri, l'expédition dans la glace éternelle a trouvé un fossile extraordinaire qui pourrait révolutionner la paléontologie. Il a été rapidement envoyé au premier paléontologue du pays, le professeur [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName]. Soi-disant c'est le lien manquant entre les animaux de poisson et terrestre!"
 dubois.227.f: ""
 dubois.301.t: "Destination d'expédition botanique"
 dubois.301.d: "Notre naturaliste, le professeur [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName], a fait les derniers préparatifs de départ. Dans quelle zone devrait-il voyager?"
 dubois.301.f: "Un [concept_dubois_naturalist] peut être envoyé aux forêts tropicales où il recherche chaque année un nouveau spécimen jusqu'à ce qu'il soit rappelé de sa position. Les États avec des forêts tropicales sont indiqués par un modificateur d'État en Amazonie, au Congo, à Bornéo et à l'Indochine. Le moyen le plus simple d'accéder à une forêt tropicale est de contrôler l'état associé. Cependant, l'accès peut également être acquis pacifiquement grâce à des licences botaniques."
 dubois.301.g: "En Amazonie."
 dubois.301.h: "Au Congo."
 dubois.301.i: "À Bornéo."
 dubois.301.j: "À l'Indochine."
 dubois.302.t: "Victoria Amazonica"
 dubois.302.d: "Lors de son expédition botanique, le professeur [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] a trouvé un lis à eau grandiose qui est sans pareil."
 dubois.302.f: "Victoria Amazonica, également connue sous le nom de Lily à eau géante d'Amazon, est une espèce végétale du genre des lys d'eau géants (Victoria) au sein de la famille de la famille des lys d'eau (Nymphaeaceae). Il est originaire des eaux peu profondes, telles que Oxbows et Bayous, du bassin amazonien. Il a été nommé d'après la reine britannique Victoria. Le pétiole submergé mesure 7 à 8 mètres de long. Les feuilles flottantes ont un bord d'environ 6 cm de haut, qui a deux incisions opposées. Ces incisions garantissent que le bord de la feuille ne se déchire pas pendant les mouvements lourds et que l'excès d'eau peut s'écouler facilement après de fortes précipitations. Dans la nature, chaque feuille atteint un diamètre allant jusqu'à 3 mètres, tandis que les plantes conservées dans les jardins botaniques ne dépassent généralement pas un diamètre de feuille de 2 mètres."
 dubois.302.g: "Ce spécimen fera bien dans notre exposition."
 dubois.302.h: "Le spécimen doit être scientifiquement catalogué et étudié."
 dubois.303.t: "Attacus Atlas"
 dubois.303.d: "Bien que lors d'une expédition qui ne se demande que de chercher des plantes, le professeur [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] ne peut pas cacher ses inclinations entomologiques lorsqu'il rencontre une colonie de papillons d'atlas spectaculaires dans la forêt tropicale."
 dubois.303.f: "Le papillon de l'atlas (Attacus Atlas) est un papillon (papillon) de la famille des papillons de paon (Saturniidae). C'est l'un des plus grands papillons du monde et a été nommé d'après l'atlas Titan de la mythologie grecque. Les femmes deviennent plus grandes que les hommes. La soie de fagara est fabriquée à partir des cocons du papillon de l'atlas. Il est brun clair et beaucoup plus robuste que la soie ordinaire."
 dubois.304.t: "Amorphophallus titanum"
 dubois.304.d: "En Indonésie, le professeur [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] a découvert un gigantesque Titan Arum, probablement la plus grande fleur du monde. Le naturaliste est ravi, le reste de l'expédition se plaint de la terrible odeur."
 dubois.304.f: "Le genre Amorphophallus est distribué avec environ 200 espèces dans les forêts tropicales de l'ancien monde de la Nouvelle-Guinée à l'Afrique de l'Ouest. A. Titanum produit la plus grande inflorescence non ramifiée du royaume végétal. La fleur, qui mesure plus de trois mètres de haut, sent la charogne, produit de la chaleur (jusqu'à 37 ° C) et attire ainsi les coléoptères, qui s'occupent de la pollinisation. Les événements de floraison spectaculaires de Titan Arum sont une attraction majeure dans les jardins botaniques du monde entier."
 dubois.305.t: "Goliath"
 dubois.305.d: "La découverte d'un coléoptère Goliath tire brièvement le professeur [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] de sa recherche botanique."
 dubois.305.f: "Les coléoptères de Goliath (Goliathus) représentent un genre de coléoptères de la sous-famille des Chafers Rose (Cetoniinae). Les coléoptères Goliath sont parmi les plus grands insectes de la Terre, s'ils sont mesurés en termes de taille, de vrac et de poids. Avec un poids larvaire allant jusqu'à 110 grammes, le scarabée Goliath est l'insecte le plus lourd de tous. Les bogues morts sont très populaires auprès des collectionneurs et récupèrent des prix élevés sur le marché."
 dubois.306.t: "Nouvelles espèces d'orchidées"
 dubois.306.d: "L'expédition botanique a découvert et catalogué plusieurs nouvelles espèces d'orchidées au plus profond de la forêt tropicale."
 dubois.306.f: "Aucune autre famille de plantes n'a un tel spectre de formes et de couleurs de fleurs que la famille des orchidées. La taille des fleurs varie de quelques millimètres à 20 centimètres et plus par fleur. Le spectre de couleurs varie des tons blancs et vert et bleu aux tons rouges et jaunes forts. Beaucoup de fleurs d'orchidées sont multicolores. Après la famille des marguerites, les orchidées sont la deuxième plus grande famille de plantes à fleurs. Environ 1 000 genres avec 15 000 à 30 000 espèces sont reconnus par les botanistes."
 dubois.306.g: "Plus de spécimens n'ont jamais fait de mal."
 dubois.307.t: "Plants médicinaux"
 dubois.307.d: "L'expédition de recherche dans la forêt tropicale a trouvé des herbes incroyables qui peuvent avoir des utilisations médicinales."
 dubois.307.f: "De nombreuses substances médicinales ont un fond à base de plantes - plus de la moitié pour être précis. L'exemple le plus connu est l'aspirine et son acide acétylsalicylique ingrédient actif, qui a été extrait de l'écorce des saules pendant des siècles. Cela contient la salicine à ingrédients actifs, qui est converti en acide salicylique dans le corps et développe son effet de douleur et de réduction de la fièvre. Au 19e siècle, l'aspirine d'aujourd'hui a été développée avec succès à partir de l'acide salicylique."
 dubois.307.g: "Étudiez les plantes."
 dubois.307.h: "Récupérer les plantes."
 dubois.308.t: "Belles fleurs inconnues"
 dubois.308.d: "Tout en explorant une partie inconnue de la forêt tropicale, l'expédition botanique est tombée sur de nombreuses fleurs inconnues."
 dubois.308.f: "Malgré leur beauté, cependant, le chef de l'expédition [SCOPE.sCharacter('dubois_naturalist_scope').GetFullName] hésite avant de les choisir. Les habitants considèrent les plantes maudites; une indication qu'ils pourraient être toxiques. L'idée est que les aides devraient choisir les plantes en masse, sans considérer les conséquences futures pour leur santé. Il serait certainement possible pour le professeur [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] de rechercher et de collecter les plantes en premier, mais cela pourrait également avoir des conséquences inconnues."
 dubois.308.g: "L'équipe d'expédition devrait collecter ces fleurs."
 dubois.308.h: "None"
 dubois.308.i: "Ne touchez pas ces fleurs."
 dubois.309.t: "Questions d'opposition Expédition botanique"
 dubois.309.d: "Le [SCOPE.sCharacter('dubois_sceptical_leader').GetLastName] considère que l'expédition botanique est un gaspillage inutile d'argent d'impôt qui serait mieux ailleurs. Il crie également sur un nuage."
 dubois.309.f: "«Une expédition ici, une expédition là-bas. Expéditions de Zeppelin, expéditions du Pacifique, expéditions archéologiques, expéditions paléontologiques, expéditions zoologiques. Rien que des ballonnes inutiles!"
 dubois.309.g: "Le professeur [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] devrait revenir immédiatement."
 dubois.309.h: "Nous ne ferons pas de la science un problème politique."
 dubois.310.t: "[SCOPE.sCharacter('dubois_naturalist_scope').GetFullName] tombe malade!"
 dubois.310.d: "Le professeur [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] s'est empoisonné tout en faisant son travail botanique dans la forêt tropicale. La maladie grave l'oblige à interrompre son travail."
 dubois.310.f: "Tant que notre naturaliste est malade, il est coincé sur l'expédition botanique et ne peut pas être rappelé. Il ne renverra aucun nouveau spécimens en cas de malade."
 dubois.310.g: "Inquiétant."
 dubois.311.t: "Graines exotiques"
 dubois.311.d: "Au cours de l'expédition botanique, le professeur [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] a trouvé des graines spéciales qui sont d'un grand intérêt scientifique et agricole."
 dubois.311.f: "L'échange de cultures entre différentes parties du monde était déjà normal au début de la période moderne. Par exemple, la canne à sucre de la région méditerranéenne a été largement cultivée en Amérique du Sud. À l'inverse, les Britanniques Henry Wickham ont introduit la contrebande de graines en caoutchouc du Brésil à l'Asie en 1876."
 dubois.311.g: "Les graines feront bien dans la collection scientifique."
 dubois.311.h: "Les nouvelles graines doivent être utilisées dans l'agriculture."
 dubois.411.t: "Les grimpeurs voulaient"
 dubois.411.d: "Certains grimpeurs expérimentés et hommes courageux ont déjà été recrutés pour participer à la tentative audacieuse du sommet. La question demeure quant à quel leader nous confions à cette entreprise."
 dubois.411.f: "La sélection du chef de l'expédition est d'une importance cruciale pour le WEAL et le malheur du voyage en montagne. Dans les montagnes basses, ses compétences ne sont pas particulièrement en demande, mais à partir d'une altitude de 3 000 mètres au plus tard, beaucoup dépend des compétences et des caractéristiques du leader. Les grimpeurs, les explorateurs et les commandants avec une expérience en montagne sont tout aussi utiles que le courage, la persévérance et la méticule. La mauvaise santé et la vieillesse, à leur tour, ont l'effet inverse."
 dubois.411.g: "[SCOPE.sCharacter('dubois_mountain_expedition_leader_1').GetFullName]."
 dubois.411.h: "[SCOPE.sCharacter('dubois_mountain_expedition_leader_2').GetFullName]."
 dubois.411.i: "[SCOPE.sCharacter('dubois_mountain_expedition_leader_3').GetFullName]."
 dubois.412.t: "Le sommet comme objectif"
 dubois.412.d: "L'équipe de l'ascension au sommet a été réunie. Mais la question se pose maintenant: quelle montagne la troupe devrait-elle grimper sous [SCOPE.sCharacter('dubois_mountain_expedition_leader').GetFullName]? Il y a plusieurs États parmi lesquels nous pouvons choisir."
 dubois.412.f: "Il y a jusqu'à trois chaînes de montagnes possibles. Leurs hauteurs et leurs difficultés diffèrent. Les montagnes de moins de 3 000 mètres - comme les Highlands écossaises et les montagnes des Appalaches - sont considérées comme des montagnes faciles qui peuvent être conquises en quelques pas et sans dangers majeurs. Les Alpes, les Pyrénées et les Rocheuses, en revanche, sont plus difficiles à maîtriser et à prendre plus de temps. Les montagnes de plus de 5 000 mètres sont considérées comme des défis, et l'Himalaya ne sera normalement pas gérable à cette époque."
 dubois.412.g: "[SCOPE.sState('dubois_summit_1').GetName]."
 dubois.412.h: "[SCOPE.sState('dubois_summit_2').GetName]."
 dubois.412.i: "[SCOPE.sState('dubois_summit_3').GetName]."
 dubois.413.t: "Compagnon scientifique"
 dubois.413.d: "Monter un pic auparavant inconnu a également son attrait pour la science. Les géologues, les naturalistes et les paléontologues sont des compagnons scientifiques potentiels."
 dubois.413.f: "Les géologues en particulier peuvent rassembler de nombreuses nouvelles découvertes pour les expéditions de la science sur les montagnes. Les naturalistes étudient la flore et la faune et collectent des spécimens; Les paléontologues peuvent collecter des fossiles, mais le rendement reste plutôt faible."
 dubois.413.g: "Un scientifique n'est pas nécessaire."
 dubois.413.h: "Un géologue comme [SCOPE.sCharacter('dubois_geologist_scope').GetFullName] serait le meilleur choix."
 dubois.413.i: "Notre naturaliste [SCOPE.sCharacter('dubois_naturalist_scope').GetFullName] sera utile."
 dubois.413.j: "Appelez notre paléontologue, [SCOPE.sCharacter('dubois_paleontologist_scope').GetFullName]."
 dubois.414.t: "Sur, jusqu'à la montagne!"
 dubois.414.d: "Les grimpeurs, dirigés par [SCOPE.sCharacter('dubois_mountain_expedition_leader').GetFullName], ont atteint la chaîne de montagnes en [SCOPE.sState('dubois_summit_location').GetName] et commencent à se préparer à l'ascension."
 dubois.414.f: "«Pourquoi vouliez-vous gravir le mont Everest? Cette question a été posée à George Leigh Mallory, qui était avec les deux expéditions envers le sommet de la plus haute montagne du monde, en 1921 et 1922, et qui est maintenant à New York. Il prévoit de repartir en 1924, et il a donné comme raison de persister dans ces tentatives répétées pour atteindre le sommet: «Parce qu'il est là»."
 dubois.414.g: "Les montagnes appellent et je dois y aller."
 dubois.420.t: "Le sommet"
 dubois.420.d: "Après une ascension ardue, le groupe d'alpinistes atteint enfin le sommet. [SCOPE.sCharacter('dubois_mountain_expedition_leader').GetFullName] est le premier homme à prendre l'assaut de cet endroit sur Terre pour [ROOT.GetCountry.GetNameNoFormatting]. Maintenant, il ne reste plus que de savourer ce moment de triomphe."
 dubois.420.f: "La première question à laquelle vous vous poserez et à laquelle je dois essayer de répondre est: «Quelle est l'utilisation de l'escalade du mont Everest? Et ma réponse doit être immédiatement: «Ce n'est pas utile». Il n'y a pas la moindre perspective de gain. Mais sinon rien n'en viendra. Nous ne ramènerons pas un seul peu d'or ou d'argent, pas de gemme, ni de charbon ou de fer. Nous ne trouverons pas un seul pied de terre qui peut être planté de cultures pour élever des aliments. Ce n'est pas utile. \ N \ nso, si vous ne pouvez pas comprendre qu'il y a quelque chose chez l'homme qui répond au défi de cette montagne et qui sort pour le rencontrer, que la lutte est la lutte de la vie elle-même vers le haut et pour toujours, alors vous ne verrez pas pourquoi nous allons. Ce que nous obtenons de cette aventure, c'est juste une pure joie. \ N \ nand Joy est, après tout, la fin de la vie. Nous ne vivons pas pour manger et gagner de l'argent. Nous mangeons et faisons de l'argent pour pouvoir profiter de la vie. C'est ce que signifie la vie et ce que la vie est pour .'- George Leigh Mallory"
 dubois.420.g: "Profitons de l'aube!"
 dubois.421.t: "Catastrophe de l'alpinisme!"
 dubois.421.d: "Tout en escaladant les montagnes en [SCOPE.sState('dubois_summit_location').GetName], le [SCOPE.sCharacter('dubois_mountain_expedition_leader').GetFullName] a fait une terrible erreur, qui a mis fin à l'expédition dans une catastrophe - plusieurs personnes sont mortes, des dispositions et de l'équipement sont tombés avec eux. Toute la nation est sous le choc!"
 dubois.421.f: "`` Chaque nuit, comprenez-vous, je vois mes camarades de la Cervin se glisser sur le dos, leurs bras tendus, l'un après l'autre, dans un ordre parfait à des distances égales - craquez le guide, d'abord, puis Hadow, puis Hudson, et enfin Douglas. Oui, je les verrai toujours ...'- Edward WhyMper"
 dubois.421.g: "Une tragédie!"
 dubois.422.t: "Montée abandonnée"
 dubois.422.d: "La tentative d'atteindre le plus haut sommet du [SCOPE.sState('dubois_summit_location').GetName] a échoué pour le moment. [SCOPE.sCharacter('dubois_mountain_expedition_leader').GetFullName] est obligé d'abandonner l'entreprise et le retour."
 dubois.422.f: "Il peut y avoir plusieurs raisons pour lesquelles un grimpeur abandonne l'ascension. Parfois, un changement de temps suffit; Parfois, un accès supposé au sommet se révèle trop dangereux. Une ascension prend souvent trop de temps et dépasse une fenêtre de temps car certaines périodes de la journée et les modifications rendent l'ascension difficile ou impossible. Et parfois, vous avez simplement choisi le mauvais chemin."
 dubois.422.g: "Décevant."
 dubois.423.t: "Troupes de montagne"
 dubois.423.d: "En raison de son expérience impressionnante dans la conquête des montagnes et la défense des montagnes, [SCOPE.sCharacter('dubois_mountain_veteran').GetFullName] a décidé d'utiliser ses compétences supérieures pour créer une unité d'élite de troupes de montagne."
 dubois.423.f: "Le Gebirgsjäger, les Alpini ou les Chasseurs Alpins ne sont que quelques exemples de troupes d'élite de certains pays qui se sont spécialisés dans la guerre contre les sommets. Créée en 1872, les Alpini sont le plus ancien infanterie de montagne active du monde. Leur mission initiale était de protéger la frontière italienne avec la France et l'Autriche-Hongrie."
 dubois.423.g: "Ils porteront son héritage dans le futur."
 dubois.424.t: "Une symphonie de montagne"
 dubois.424.d: "Inspiré par le récent succès de notre troupe d'alpinisme, notre compositeur a annoncé qu'il voulait écrire un travail musical majeur sur les montagnes et la lutte de l'homme contre la nature. Le monde de la musique est déjà d'accord pour dire que ce sera une œuvre importante."
 dubois.424.f: "Une symphonie alpine op. 64 est un poème symphonique du compositeur Richard Strauss, qui a été joué pour la première fois en 1915. Le travail est basé sur le concept du compositeur d'utiliser des moyens musicaux pour représenter l'ascension d'un pic alpin et le retour dans la vallée en une journée. L'idée du programme revient à une expérience de l'enfance de Strauss. À l'été 1879, il a perdu sa place dans le Heimgarten dans les Alpes bavaroises et a été pris dans un orage. Le lendemain, il a présenté cet événement au piano. De ce souvenir, il a développé le concept. C'était l'intention déclarée du compositeur de permettre à l'auditeur de vivre les étapes d'une randonnée en montagne en tant que peinture sonore d'une manière immédiatement sensuelle. Selon de nombreux critiques de musique, le travail atteint cet objectif de manière impressionnante."
 dubois.424.g: "J'espère qu'il n'y aura pas d'alpenhorns."
 dubois.430.t: "Une ascension facile"
 dubois.430.d: "L'équipe de l'alpinisme fait des progrès faciles au niveau inférieur de la chaîne de montagnes en [SCOPE.sState('dubois_summit_location').GetName]. Il n'y a pas d'occurrences notables."
 dubois.430.f: "«Il a de la chance qui, dans toute la marée de la vie, a connu une mesure de l'environnement actif qu'il désire le plus. En ces jours de bouleversements et de changements violents, lorsque les valeurs fondamentales d'aujourd'hui sont les rêves vains et brisés de demain, il y a beaucoup à dire pour une philosophie qui vise à vivre une vie pleine tandis que l'opportunité offre. Il y a peu de trésors de valeur plus durable que l'expérience d'un mode de vie qui est en soi totalement satisfaisant. Tels, après tout, sont les seuls biens dont aucun sort, aucune catastrophe cosmique ne peut nous priver; Rien ne peut modifier le fait si un instant dans l'éternité, nous avons vraiment vécu. -Eric Shipton"
 dubois.430.g: "Poursuivre!"
 dubois.431.t: "Une pente"
 dubois.431.d: "[SCOPE.sCharacter('dubois_mountain_expedition_leader').GetFullName] a repéré une petite pente dans les montagnes, mais cela ne devrait pas poser de problème majeur pour les grimpeurs."
 dubois.431.f: "Plus une équipe d'alpinisme est élevée, plus les défis sont élevés. Une pente peut être un obstacle initial, mais ne devrait pas être un problème pour une expédition modérément bien équipée."
 dubois.431.g: "L'équipe maîtrise cela."
 dubois.431.h: "C'est trop risqué."
 dubois.432.t: "Paroi abrugée"
 dubois.432.d: "Une falaise présente un obstacle majeur pour les grimpeurs sur leur randonnée jusqu'au sommet, mais [SCOPE.sCharacter('dubois_mountain_expedition_leader').GetFullName] est convaincu qu'il maîtrise cette tâche."
 dubois.432.f: "Des montagnes avec une altitude de 2 000 mètres, le groupe d'alpinisme peut rencontrer des falaises. Pour les montagnes basses, ils sont le dernier obstacle avant le sommet, mais dans de nombreux cas, c'est plus un programme d'échauffement. À partir de maintenant, une randonnée en montagne normale diffère d'une véritable montée en montagne."
 dubois.433.t: "Avalanche!"
 dubois.433.d: "Une avalanche dangereuse s'est détachée dans les hauteurs de [SCOPE.sState('dubois_summit_location').GetName], menaçant l'effort d'alpinisme. Les débris menaçant désormais l'itinéraire direct, trouver un autre itinéraire pourrait être plus sûr, mais coûter un temps précieux. Certains grimpeurs suggèrent d'attendre - qui comprend la possibilité que le sentier puisse devenir plus bloqué."
 dubois.433.f: "Les avalanches surviennent à partir de hauteurs enneigées et ont été un danger pour tous ceux qui vivaient dans les montagnes depuis des temps immémoriaux - pas seulement des sommets. Leur nature perfide a déjà conduit beaucoup à leur mort. Désormais, le blé est séparé de la paille."
 dubois.433.g: "Qui ne peut pas secouer un grimpeur."
 dubois.433.h: "Recherchez un autre itinéraire."
 dubois.434.t: "Abîme"
 dubois.434.d: "Une gorge dangereuse s'ouvre devant [SCOPE.sCharacter('dubois_mountain_expedition_leader').GetFullName] quand il a atteint la dernière formation rocheuse. L'obstacle apparemment insurmontable pose un défi pour les alpinistes."
 dubois.434.f: "«L'alpinisme est l'art de l'escalade des montagnes en confrontant les plus grands dangers à la plus grande prudence. L'art est utilisé ici pour signifier l'accomplissement des connaissances en action. Vous ne pouvez pas toujours rester sur les sommets. Vous devez redevenir. Alors à quoi ça sert? Seulement ceci: ce qui est ci-dessus sait ce qui est ci-dessous, ce qui est ci-dessous ne sait pas ce qui est ci-dessus. On grimpe, on voit. On descend, on ne voit plus, mais on l'a vu. Pendant l'escalade, prenez note de toutes les difficultés le long de votre chemin. Pendant la descente, vous ne les verrez plus, mais vous saurez qu'ils sont là si vous avez observé attentivement. -René Daumal"
 dubois.435.t: "Changement de météo"
 dubois.435.d: "Un changement de temps dans les montagnes de [SCOPE.sState('dubois_summit_location').GetName] présente des alpinistes avec un problème mortel. Il y a encore une fenêtre d'opportunité pour atteindre un emplacement plus abrité à des altitudes plus élevées, mais c'est une entreprise dangereuse. Les Mountaineers trouveraient un abri sûr dans le camp de base - mais cela ruinerait les progrès des derniers jours, voire des semaines."
 dubois.435.f: "Les changements météorologiques dans les montagnes peuvent être l'un des événements les plus menaçants qui peuvent se produire lors d'une tournée en montagne. Cela s'applique à la pluie, aux tempêtes et à la neige. En particulier aux altitudes les plus élevées, une chute de neige soudaine peut signifier qu'une tentative de sommet doit être abandonnée car les éléments imprévisibles peuvent se terminer par une tragédie."
 dubois.435.h: "Retour au dernier camp!"
 dubois.436.t: "Pas de mort"
 dubois.436.d: "Peu de temps avant le sommet, [SCOPE.sCharacter('dubois_mountain_expedition_leader').GetFullName] est confronté à un dernier défi ultime: une falaise imposante presque verticalement devant lui décide de la victoire ou de la défaite. Les grimpeurs rompent déjà selon lequel il s'agit d'un piège à mort; ou une étape de mort."
 dubois.436.f: "`` Après une heure, nous avançons, nous avons atteint le pied du problème le plus formidable sur la crête - une étape rocheuse de quarante pieds de haut. Nous avons réalisé qu'à cette altitude, cela pourrait bien faire la différence entre le succès et l'échec. Le rocher lui-même, lisse et presque sans retenue, aurait pu être un problème intéressant du dimanche après-midi pour un groupe de grimpeurs experts dans le Lake District, mais ici, c'était une barrière au-delà de notre faible force à surmonter. Je ne voyais aucun moyen de le tourner sur le bluff rocheux escarpé à l'ouest, mais heureusement, une autre possibilité de s'attaquer à celle-ci est restée. Du côté est se trouvait une autre grande corniche, et monter à quarante pieds de la marche se trouvait une fissure étroite entre la corniche et la roche. Laissant Tenzing pour m'assister du mieux qu'il pouvait, je me suis précipité dans cette fissure, puis je me bottant en arrière avec mes crampons, j'ai coulé leurs pointes profondément dans la neige gelée derrière moi et je me suis moqué du sol. Profitant de chaque petit rocher et toute la force du genou, de l'épaule et des bras que je pouvais rassembler, je me suis littéralement cramponnée en arrière sur la fissure, avec une prière fervente pour que la corniche reste attachée au rocher. -Edmund Hillary"
 dubois.437.t: "Manque d'oxygène"
 dubois.437.d: "Les hauteurs inhabituelles de [SCOPE.sState('dubois_summit_location').GetName] poussent les alpinistes à leurs limites. Le manque d'oxygène menace l'ascension au sommet."
 dubois.437.f: "Dans les hautes montagnes, la pression atmosphérique est plus faible et cela signifie que moins d'oxygène est disponible pour respirer. Il s'agit de la cause sous-jacente du mal d'altitude. Tout le monde doit s'acclimater, même des alpinistes exceptionnels qui ont déjà été à haute altitude. D'une manière générale, les alpinistes commencent à utiliser de l'oxygène en bouteille lorsqu'ils montent au-dessus de 7 000 m. Des alpinistes exceptionnels ont grimpé de 8000 mètres (y compris l'Everest) sans oxygène, presque toujours avec un programme d'acclimatation soigneusement planifié."
 dubois.437.g: "Bien que nous ayons nos bouteilles d'oxygène avec nous."
 dubois.437.h: "Annuler l'expédition avant le pire."
 dubois.438.t: "Blessures graves"
 dubois.438.d: "Un groupe de traînards est tombé en escaladant la dernière face rocheuse et a subi de graves blessures. [SCOPE.sCharacter('dubois_mountain_expedition_leader').GetFullName] doit décider comment procéder."
 dubois.438.f: "Les alpinistes font face à une variété de dangers. Lors de l'escalade des montagnes, il existe deux types de dangers, objectifs (à base de montagne) et subjectifs (à base humaine). Les dangers subjectifs sont liés au mauvais jugement d'un grimpeur, à une mauvaise planification, au manque de compétences, à une analyse défectueuse et à des conclusions, ou à un conditionnement inadéquat. De 1947 à 2018 aux États-Unis, 2 799 personnes auraient été impliquées dans des accidents d'alpinisme et 43% de ces accidents ont entraîné la mort."
 dubois.438.g: "Bien que nous ayons des équipements médicaux modernes."
 dubois.438.h: "Nous attendons qu'ils se rétablissent."
 dubois.439.t: "Corde"
 dubois.439.d: "Afin de sécuriser une ascension, les grimpeurs doivent former un groupe de corde. La pente semble tout sauf en sécurité. L'effort nécessite une planification minutieuse."
 dubois.439.f: "L'équipe à terme de corde provient à l'origine des sports de montagne, en particulier de l'escalade, et fait référence à un groupe de personnes reliées par une montagne ou une corde grimpante et donc garantie contre la chute. En utilisant une corde de sécurité partagée, une équipe de corde offre à ses membres une protection mutuelle contre les chutes. Dans le même temps, une équipe de corde forme également une communauté de danger, car dans des conditions défavorables, une chute d'un seul membre peut entraîner la chute de l'équipe de corde."
 dubois.439.g: "Bien que nous ayons une organisation moderne."
 dubois.440.t: "Science des montagnes"
 dubois.440.d: "Les sommets inconnus de [SCOPE.sState('dubois_summit_location').GetName] offrent [SCOPE.sCharacter('dubois_mountain_scientist').GetFullName] toute une gamme de nouvelles idées, qu'il recueille et écrit pendant la tournée en montagne."
 dubois.440.f: "Les scientifiques avaient souvent étudié la flore et la faune inhabituelles de la région aux premiers stades des expéditions de montagne. Les enquêtes géologiques étaient particulièrement intéressantes - non seulement pour des raisons scientifiques générales, mais aussi souvent pour simplifier les ascensions futures."
 dubois.440.g: "Pour la science!"
 dubois.441.t: "Un animal perdu"
 dubois.441.d: "Au niveau inférieur de l'Himalaya, notre naturaliste [SCOPE.sCharacter('dubois_mountain_scientist').GetFullName] a fait une étrange découverte: un seul animal abandonné se promène là-bas, frappé par la faim et le froid."
 dubois.441.f: "C'était un spectacle étrange pour le professeur [SCOPE.sCharacter('dubois_mountain_scientist').GetLastName] de trouver une si petite créature tendre, qui vivait autrement dans les forêts de bambou du Népal, dans cette friche déserte. Il connaissait des illustrations de livres et savait que les habitants vivaient dans les forêts les plus proches; Mais comment un seul animal pourrait-il arriver ici? Sur cette distance? Sans nourriture? Cela est resté un mystère. Le petit panda rouge avait-il également attrapé le bug de l'alpinisme? Ou avait-il fui les prédateurs? Quoi qu'il en soit, le naturaliste s'occupe de l'animal épuisé et le renvoie à la santé. Un spectacle que le [SCOPE.sCharacter('dubois_mountain_expedition_leader').GetFullName] n'aime pas: il voit l'ascension de montagne menacée par une telle sentimentalité zoologique. Il est convenu que l'assistant de recherche amènera le panda rouge au camp de base - et à partir de là le préparez pour son voyage au zoo local."
 dubois.441.g: "Est-ce le 43e animal légendaire?"
 dubois.450.t: "Montagnes du monde"
