 dubois.1012.t: "Enceinte d'Hippopotamus"
 dubois.1012.d: "L'enceinte #o Hippopotamus#! abrite un tas de ces énormes créatures. Heureusement, ils sont séparés des visiteurs par un grand fossé."
 dubois.1012.f1: "Les hippopotamis flottaient dans l'eau dans leur enceinte. Il n'y avait pas grand-chose. Vous vous êtes demandé s'ils faisaient quelque chose lorsqu'un gardien de zoo est apparu à côté de vous. \ N \ n \ \"Il est tellement fascinant de voir comment les hippopotames flottent généralement pendant la journée. Mais après le crépuscule, ils deviennent très actifs et commencent à se nourrir."
 dubois.1012.f2: "Soudain, un hippopotame a émergé de l'eau. Vous n'avez pas vu celui-là auparavant, même si vous regardiez l'enceinte pendant plusieurs minutes. Il doit avoir été dans l'eau depuis un certain temps. \ N \ na La personne à côté de vous a commencé à parler: \ \"n'est-ce pas fascinant? Ces hippopotames peuvent rester sous l'eau pendant cinq minutes. Quand ils s'étouffent, leurs narines et leurs oreilles sont fermées, donc aucune eau ne peut entrer. \""
 dubois.1012.f3: "L'un des Hippopotami a ouvert son énorme bouche et a montré ses longues dents incurvées. Ensuite, il a commencé à grogner et à éclabousser. \ N \ nyou a lu une fois que les hippopotames masculins font cela pour avertir les concurrents, car ils sont très protecteurs de leur territoire. Les hippopotames masculins utilisent également leurs excréments pour marquer des points spécifiques sur leur territoire. Parfois, ils regardent même d'autres hippopotames masculins comme une forme de domination."
 dubois.1012.k: "Retour aux enclos africains"
 zoo_african_enclosures_tt: "Vous reviendrez dans les enclos africains du zoo."
 dubois.1013.t: "Enclos de lion"
 dubois.1013.d: "Un pack de #o Lions#! peut être trouvé dans l'enceinte du lion. L'enceinte dispose d'un arbre pour l'ombre et d'un petit étang pour boire."
 dubois.1013.f1: "Les magnifiques lions allaient au milieu de sa fierté. La crinière du lion mâle était grande et assez sombre. Soudain, le lion bâillait et montrait ses dents. \ N \ Napparement La crinière des lions mâles pousse plus de plus en plus jusqu'à 16 cm. Plus le lion vieillit, plus sa crinière est sombre. La crinière a probablement deux objectifs principaux: attirer les femmes et pré-interpréter la gorge et le cou du lion pendant les combats. L'épaisseur de la crinière dépend des températures de l'habitat du lion. Dans les régions plus froides, les crinières sont beaucoup plus lourdes pour les lions vivant dans les zoos en Europe et en Amérique du Nord."
 dubois.1013.f2: "Au début, ce n'était qu'un lion rugissant, mais les autres se sont joints. Avec chaque lion, le rugissement devenait de plus en plus fort. Puis, soudain, ils se sont arrêtés en même temps. \ N \ nlions vivent généralement dans les fiers des animaux apparentés. La majorité des femmes restent dans la même fierté toute leur vie, tandis que les mâles rejoignent généralement d'autres fiertés ou coalitions d'autres lions mâles. Dans la fierté, les femelles sont généralement les chasseurs ayant une chance beaucoup plus élevée d'attraper des proies. Les mâles ont environ 10% de chances d'attraper leurs proies. Mais quand ils attrapent un grand animal, les lions peuvent manger jusqu'à 40 kg de viande."
 dubois.1013.f3: "Dans les limites d'un zoo, le puissant lion est en train de faire des allers-retours dans son enceinte. Son corps musclé respire la puissance et la grâce alors qu'elle examine son environnement. Les mouvements agités du lion attirent votre attention, vous incitant à réfléchir aux secrets derrière son comportement. Pendant que vous réfléchissez, un gardien de zoo bien informé s'approche, prêt à partager des idées sur ces magnifiques créatures. \ N \ n \ \"Il est fascinant d'observer les lions dans leur enceinte, \" Le gardien de zoo commence. \ \"Pendant la journée, ils s'engagent souvent dans une rythme répétitif, un comportement qui peut être vu à la fois dans les lions captifs et leurs homologues sauvages. Ce rythme est considéré comme le résultat de leur instinct naturel pour patrouiller et marquer leur territoire, même en l'absence de vastes prairies ou de paysages expansifs. \""
 dubois.1013.f4: "Au zoo, [SCOPE.sCharacter('dubois_prinz_eugen').GetFullName] est connu pour vérifier chaque jour le vieux lion dans l'enceinte. Le vétéran ressent un lien profond avec l'animal. Les deux ressemblent à des témoins du temps passé de gloire et d'honneur. Les visiteurs du zoo disent qu'il y a un lien entre cet animal spécifique et l'homme. \ N \ nbut Enfin, trois jours sont venus lorsque le lion n'a plus vu son maître, il a refusé de manger quoi que ce soit et a rythmé sans relâche de haut en bas dans l'enceinte. À environ trois heures du matin, il a laissé échapper un rugissement si le gardien des animaux a couru dans l'enceinte pour voir. En même temps, il a entendu le gell de la mort dans la chapelle et il savait donc que son maître, le grand général [SCOPE.sCharacter('dubois_prinz_eugen').GetLastName], était décédé à cette heure. C'est ce qui touche même le cœur le plus dur des soldats."
 dubois.1014.t: "Enclos d'éléphant"
 dubois.1014.d: "Dans une vaste enceinte, les éléphants errent. Ils sont l'une des plus grandes attractions du zoo et il y a toujours des gens qui les regardent."
 dubois.1014.f1: "Vous observiez les éléphants depuis un certain temps. L'un d'eux vous caresse. C'était un énorme éléphant femelle avec de longues défenses. Elle semblait parfois prendre les devants et les autres éléphants semblaient la respecter beaucoup. \ N \ n \ \"Je vois que vous avez trouvé la matriarche des éléphants! \", Vous n'avez même pas remarqué qu'un gardien de zoo se tenait à côté de vous, \ \"\" Ces créatures majestueuses vivent dans des unités familiales serrées connues sous le nom de troupeaux. Au sein du troupeau, vous trouverez souvent une matriarche, une femme sage et expérimentée qui mène et protège le groupe. Dans leur famille, les éléphants ont de forts liens sociaux. Ils pleurent même la perte d'un de leur groupe. Heureusement, nous n'avons pas eu de mort d'éléphants depuis des années! \ \""
 dubois.1014.f2: "One of the Elephants was trumpeting. It sounded great! You would probably even have heard it from hundreds of meters away.\n\nIt reminded you of a text you once read about elephants: \"One of the Elephants was trumpeting. It sounded great! You would probably even have heard it from hundreds of meters away.\n\nIt reminded you of a text you once read about elephants: \"L'un des éléphants a été la trompette. Ça sonnait très bien! Vous l'auriez probablement entendu à des centaines de mètres. \ N \ nit vous a rappelé un texte que vous avez lu sur les éléphants: \"L'un des éléphants était de la trompette. À travers une variété de vocalisations, telles que les trompettes, les grondements et les rugissements, ils transmettent des informations aux autres membres de leur troupeau, que ce soit un avertissement de danger ou un appel à se regrouper. \ \""
 dubois.1014.f3: "L'un des éléphants s'est rapproché de vous. Son tronc vous a lentement approché. N'est-ce pas l'éléphant que vous avez nourri de nourriture il y a un an? Non, ça ne pourrait pas l'être. Cela vous aurait oublié maintenant! Néanmoins, vous avez donné à l'éléphant un fruit que vous avez apporté pour vous-même. \ N \ n \ \"Je pense qu'elle se souvient de vous. \", Un gardien de zoo se tenait à côté de vous, \ \"Les éléphants peuvent se souvenir des choses au fil des ans, voire des décennies. C'est fascinant, ils se souviennent parfois d'un visiteur et agissent en conséquence. Une fois qu'un éléphant a pris un rappel d'une femme, elle a jeté une pierre et même en tant qu'éléphante en tant qu'enfant. Les individus qu'ils ont rencontrés."
 dubois.1015.t: "Enclos de girafe"
 dubois.1015.d: "Les girafes étaient visibles de loin. Leurs têtes atteignirent au-dessus du sol pour obtenir des feuilles fraîches des arbres."
 dubois.1015.f1: "La langue bleue de la girafe s'enroula autour des branches vertes dans votre main. Dans le processus, la langue a glissé sur votre main. C'était rugueux et très long. \ N \ nyou Rappelez-vous quelque chose que vous avez lu dans un livre: la langue de la girafe était parfaitement adaptée à son environnement. Il a été conçu pour paître les feuilles d'Acacia de la branche sans se blesser par les épines. Pour manger les 30 kilogrammes de feuilles par jour, la girafe doit déchirer les feuilles des arbres jusqu'à 12 heures. Dans le même temps, les feuilles couvrent également une grande partie des besoins en eau de la girafe."
 dubois.1015.f2: "Deux des girafes se tenaient côte à côte lorsqu'ils ont soudainement commencé à se frapper les côtés avec la tête. Leur long cou leur a permis de lancer la tête et de viser leur adversaire. Qu'est-ce qui pourrait provoquer un tel comportement sauvage? \ N \ n \ \"Ne pas avoir peur! C'est un comportement naturel. \", Un gardien de zoo se tenait à côté de vous et a commencé à expliquer: \ \"Les girafes sont des animaux sociaux qui forment des troupeaux lâches. Soufflement pour établir des droits d'accouplement à la domination ou à gagner."
 dubois.1015.f3: "Vous avez écouté un gardien de zoo parler des girafes avec un groupe de personnes: \ \"Les girafes ont un motif de manteau distinct qui ressemble à une mosaïque de plaques irrégulières. Savannah. \ \""
 dubois.1016.t: "Enclos de pingouin africain"
 dubois.1016.d: "Certains pingouins nageaient dans l'eau, d'autres se tenaient ensemble, l'un remontait avec ses ailes."
 dubois.1016.f1: "Dans l'exposition des pingouins animés du zoo, une colonie animée de pingouins africains est des dddles et des frocs dans l'eau. Leur plumage noir et blanc élégant brille sous la lumière du soleil, attirant l'attention des visiteurs. Assayé par leurs bouffonneries ludiques, vous vous approchez d'un gardien de zoo à proximité, désireux d'en savoir plus sur ces créatures charismatiques. \ N \ n \ \"Le pingouin africain, également connu sous le nom de pingouin de crétin en raison de son appel au braying ressemblant à l'âne, est une espèce remarquable\", \"commence le Zookeeper. \"Ces pingouins sont endémiques aux côtes de l'Afrique australe, spécifiquement trouvés dans les eaux entourant la Namibie et l'Afrique du Sud. Contrairement à leurs homologues en Antarctique, les pingouins africains prospèrent dans un climat plus chaud, ce qui les rend bien adaptés aux régions côtières qu'ils appellent chez eux. \""
 dubois.1016.f2: "Vous regardez un pingouin se débat avec un rocher. Des parties de la roche s'éloignent, donc ce doit être une roche douce. Vous regardez avec intérêt alors que le pingouin continue de creuser. \ N \ ndid pas en lisant quelque chose à ce sujet? Les pingouins africains creusent une grotte de nidification dans les dépôts de Guano. Ce guano provient des excréments de centaines de générations d'oiseaux. En Afrique du Sud, il y a de grands dépôts de Guano où les pingouins nichent. Ainsi, les partenaires se relaient à tour de rôle."
 dubois.1016.f3: "Alors que vous vous émerveillez des éclaboussures ludiques des Penguins dans l'eau, un gardien de zoo partage un détail fascinant: \ \"Une caractéristique unique des pingouins africains est leur capacité de natation exceptionnelle. Ils sont agiles et rationalisés sous-marins, s'appuyant sur leurs flippeurs à se propager par l'océan à la recherche de petits poissons et de la courbe, qui constituent la majorité de leur aliment. leur permettant de résister aux températures froides de l'océan. \ \""
 dubois.1017.t: "Boîtier de rat de taupe nu"
 dubois.1017.d: "En tant qu'animal qui était principalement souterrain, l'enceinte du rat nue n'était principalement qu'un tas de saleté. Mais grâce à une utilisation itelligente du verre, il a été possible de regarder les petits animaux dans leurs logements."
 dubois.1017.f1: "Dans l'habitat souterrain fascinant du zoo, une créature unique et industrieuse connue sous le nom de la taupe nue se précipite à travers ses tunnels complexes, son apparence sans poils et ridé capturant l'attention des visiteurs. Intrigué par son style de vie souterrain, vous abordez un gardien de zoo bien informé, désireux d'en savoir plus sur ce mammifère intrigant. \ N \ n \"Le rat de taupe nu est une véritable merveille d'adaptation\", commence le gardien de zoo. \"Ces rongeurs remarquables sont hautement spécialisés pour la vie dans des environnements sombres et souterrains. Leur manque de fourrure est un avantage, car il empêche la saleté et les débris de coller à leur peau pendant qu'ils creusent. Avec leurs dents pointues et leurs mâchoires puissantes, les rats de taupe nus sont des diggeurs qualifiés, créant des systèmes de tunnel élaborés qui offrent une protection, un stockage alimentaire et des structures sociales.\""
 dubois.1017.f2: "Dans les terriers souterrains captivants du zoo, une colonie de rats de taupe nus fonctionne harmonieusement, chaque individu contribuant aux tâches de creuser, de chercher et de prendre soin des jeunes. La vue de leurs activités communautaires captive l'attention des visiteurs. Intrigués par leur dynamique sociale, vous cherchez un gardien de zoo bien informé, dans l'espoir de découvrir davantage la vie de ces rongeurs fascinants. \ N \ n \"Naked Mole-Rats sont des créatures hautement sociales\", explique le zookeeper. \"Ils vivent dans des colonies avec une structure sociale complexe, similaire à celle des abeilles ou des fourmis. Au sein d'une colonie, il y a une seule femelle reproductrice, connue sous le nom de reine, qui est responsable de donner naissance à la majorité des jeunes. Le reste de la colonie est composé d'individus non reproduits, connus sous le nom de travailleurs, qui contribuent à des tasks tels que des tunnels, de la nourriture et de la prise en charge des jeunes.\""
 dubois.1017.f3: "Au milieu des tunnels complexes de l'habitat du rat-taupe, un groupe de rats de taupe nus se blottit ensemble, leurs corps ridés entrelacés alors qu'ils partagent de la chaleur et s'engagent dans le toilettage social. Intrigué par leur comportement commun, vous abordez un gardien de zoo bien informé, dans l'espoir de comprendre la signification de leurs interactions. \ N \ n \"Les comportements communaux des rats de taupe nus sont vraiment fascinants\", partage le zoo-gardien. \"Leur comportement blottissant sert de multiples fins, notamment le maintien de la température corporelle et la promotion des liaisons sociales."
 dubois.1018.t: "Boîtier zèbre"
 dubois.1018.d: "L'éclosure du zèbre était assez plate, pleine d'herbe et avait des arbres solitaires qui offraient de l'ombre. Cela ressemblait un peu à l'Afrique."
 dubois.1018.f1: "Dans l'enceinte vibrante sur le thème du zoo sur le thème de Savannah, un groupe de créatures captivantes et rayées connues sous le nom de zèbres paisiblement paisibles, leurs motifs en noir et blanc créant un affichage visuel fascinant sur la toile de fond des prairies. Intriguée par leur apparence frappante, vous abordez un gardien de zoo bien informé, désireux d'en savoir plus sur ces animaux africains emblématiques. \ N \ n \"Les zèbres sont non seulement connues pour leurs rayures en noir et blanc unique, mais aussi pour leurs comportements fascinants et leurs dynamiques sociales\", commence le gardien de zoo. \"Ces rayures servent de forme de camouflage, les aidant à se mélanger dans les prairies et à confondre les prédateurs. Les zèbres sont des animaux hautement sociaux, souvent trouvés dans des groupes familiaux appelés harems. Leurs comportements coopératifs, tels que le toilettage et la vigilance, contribuent à la sécurité et au bien-être du groupe.\""
 dubois.1018.f2: "Dans l'habitat sereine Savannah du zoo, un zèbre mâle affirme sa domination en s'engageant dans une démonstration animée de coups de pied et de posture, sa crinière et sa queue se balançant à chaque mouvement. La vue de son comportement captive l'attention des visiteurs. Intrigué par ses actions, vous recherchez un gardien de zoo bien informé, dans l'espoir de découvrir davantage les comportements sociaux de ces animaux africains charismatiques. \ N \ n \"Le comportement zèbre implique souvent des manifestations fascinantes de domination et de communication\", explique le gardien de zoo. \"Les zèbres masculins établissent leur hiérarchie au sein d'un groupe à travers divers comportements, tels que les vocalisations, la posture et les interactions physiques. Ils ont également des moyens uniques de communiquer entre eux, y compris des sons braying et des prouesses aiguës."
 dubois.1018.f3: "Au milieu du paysage de Savannah tentaculaire de l'habitat zèbre, un jeune poulain froliques et races autour de sa mère, son comportement ludique capturant l'essence de l'exubérance jeune. Intrigué par l'interaction, vous abordez un gardien de zoo bien informé, dans l'espoir de comprendre la signification du comportement du poulain. \ N \ n \"Les comportements énergétiques des poulains de zèbre sont vraiment captivants\", partage le zookeeper. \"Les poulains sont connus pour leur espièglerie, qui sert d'importants objectifs de développement. Le jeu leur permet de pratiquer les compétences physiques, de développer des liens sociaux et d'apprendre de leurs interactions avec les adultes dans le groupe. À travers ces comportements ludiques, les poulains acquièrent progressivement les compétences dont ils ont besoin pour prospérer dans la nature.\""
