 dubois_nature_protection_tech: "Protection de la nature"
 dubois_nature_protection_tech_desc: "La protection de la nature a commencé avec la nécessité de protéger les forêts. Plus tard, les espèces animales en voie de disparition et les zones entières de terre ont également été protégées. Aux 19e et XXe siècles, il y avait divers projets de conservation de la nature réussis, tels que la réintroduction de l'ibex alpin dans les Alpes suisses."
