 dubois.1030.t: "Boîtier de chat de Pallas"
 dubois.1030.d: "L'enceinte de chat de Pallas était un terrain rocheux parsemé de crevasses et de petites grottes. À première vue, le félin épais et moelleux semblait presque invisible, se fondant parfaitement dans son environnement. Ensuite, vous en avez repéré un - ses yeux ronds et larges jetant un coup d'œil prudemment par derrière un rocher, observant tranquillement tout autour de lui."
 dubois.1030.f1: "Dans l'enceinte rocheuse du zoo, le chat de Pallas regarde derrière un rocher, ses larges yeux ronds balayant l'environnement. Avec sa fourrure épaisse et argentée gonflée contre le froid, il ressemble à une petite boule sauvage de peluches. Contrairement à de nombreux autres chats sauvages, le chat de Pallas a une construction trapue et des jambes courtes, parfaitement adaptées aux régions froides et à haute altitude d'Asie centrale où elle vit."
 dubois.1030.f2: "Alors que le chat de Pallas émerge de sa cachette parmi les rochers, son visage plat et ses grands yeux expressifs lui donnent une apparence presque comique. Les visiteurs sont souvent surpris par sa petite taille et sa fourrure moelleuse, qui l'aident à se fondre dans son environnement enneigé. Solitaire par nature, le chat de Pallas est rarement vu dans la nature, préférant rester caché dans les crevasses et les terriers rocheux pendant la journée et émerger à l'aube ou au crépuscule pour chasser."
 dubois.1030.f3: "Au milieu de l'environnement steppe froid et simulé de son enceinte, le chat de Pallas se déplace avec une précision silencieuse, sa queue épaisse traînant comme un panache. Connu pour son comportement insaisissable, ce petit chat sauvage préfère la solitude et repose sur sa fourrure de camouflage pour éviter la détection par les prédateurs et les proies. Avec un régime composé principalement de petits mammifères, le chat de Pallas est un chasseur qualifié, utilisant sa vue vive pour repérer le mouvement sur le terrain ouvert."
