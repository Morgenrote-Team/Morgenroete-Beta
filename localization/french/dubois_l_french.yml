 dubois.442.t: "Connaissances géologiques"
 dubois.442.d: "Pendant son séjour dans les montagnes, le [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] a examiné la montagne en détail, l'a cartographié et fait des interprétations scientifiques. À la surprise de toute l'équipe de l'alpinisme, il les a surpris le lendemain matin avec une carte de secours montrant les pièges et les ascensions plus lisses de la montagne."
 dubois.442.f: "«Pourquoi ai-je fait ça? Oh, j'étais juste un peu ennuyé et j'avais également catalogué mes minéraux. Ce n'est rien de spécial! Je ne l'ai même pas coloré ... '"
 dubois.442.g: "Dieu merci, nous avons le Dr [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]"
 dubois.443.t: "Un beau minéral"
 dubois.443.d: "Le groupe d'alpinisme se plaignait déjà de la nature de Dilly-Dally du géologue, qui en tant que scientifique était plus un fardeau qu'une aide; Mais il s'avère que le Dr [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] a découvert un matériau rare tout en grimpant le pic."
 dubois.443.g: "Quelle belle petite surprise."
