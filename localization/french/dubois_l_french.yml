 dubois.7.t: "Le papillon parsemé évolue!"
 dubois.7.d: "Le Dr [ROOT.Var('dubois_naturalist_var').GetCharacter.GetLastName] a remarqué que l'apparence du papillon poivré avait changé ces dernières années, ce qui est une preuve claire de la théorie de l'évolution."
 dubois.7.f: "\ \"Alors que les bouleaux sur lesquels vit les papillons parsemés deviennent de plus en plus sombres à cause de la pollution, nous pouvons voir, que le nombre de papillons sombres clairement soulevés. Alors que plus de papillons blancs sont mangés par les prédateurs parce qu'ils sont beaucoup plus visibles, les papillons sombres commencent à prendre le relais. Historiquement #!, Le décalage évolutif de la couleur du papillon parsemé a été remarqué dès 1848 à Manchester. Ce n'est qu'en 1896 que J. W. Tutt a montré qu'il s'agissait d'un cas de sélection naturelle. \ Nnowadays Le phénotype blanc du papillon parsemé est à nouveau dominant, car l'air est de nouveau plus propre et la plupart des bouleaux sont à nouveau blancs."
 dubois.7.g: "Preuve claire de l'évolution!"
