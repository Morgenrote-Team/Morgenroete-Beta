 dubois.228.t: "Aigle haast"
 dubois.228.f: "\ \"D'abord, nous avons trouvé un énorme Talon et supposons que cela fasse partie d'un dinosaure, mais nous avons ensuite trouvé plus d'os et il est devenu de plus en plus évident que c'était un aigle. Heureusement, cet aigle est éteint aujourd'hui car il aurait probablement pu tuer les humains. \""
 dubois.228.g: "C'est effrayant!"
