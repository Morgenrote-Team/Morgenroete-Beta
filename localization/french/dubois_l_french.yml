 dubois.3000.t: "Le Dr [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] perd-il l'esprit [SCOPE.sCharacter('dubois_naturalist_scope').GetHerHis]?"
 dubois.3000.d: "Votre [concept_dubois_naturalist], [SCOPE.sCharacter('dubois_naturalist_scope').GetFullName], semble oublier de plus en plus de choses. Peut-être qu'il est temps pour [SCOPE.sCharacter('dubois_naturalist_scope').GetHerHim] de démissionner en tant que naturaliste?"
 dubois.3000.f: "Attendez une seconde ... où ai-je mis mon thé? Oh, est-ce ici? Ou était-ce la plante posionnée? Et pourquoi y a-t-il une énorme araignée assise dans le coin de la pièce?"
 dubois.3000.g: "Je ne pense pas que le [SCOPE.sCharacter('dubois_naturalist_scope').GetSheHe] devrait continuer à fonctionner."
 dubois.3000.h: "PFF, c'est tout à fait normal!"
 dubois.3010.t: "Spécimens perdus"
 dubois.3010.d: "Le Dr [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] est soudainement incapable de trouver des spécimens dans la collection [SCOPE.sCharacter('dubois_naturalist_scope').GetHerHis]. [SCOPE.sCharacter('dubois_naturalist_scope').GetSheHe] a dit qu'ils ont juste ... disparu."
 dubois.3010.f: "Je suis absolument sûr de les mettre ici sur ces épingles. Mais maintenant, ils sont partis. C'étaient de magnifiques insectes! Peut-être que je les mets juste ailleurs?"
 dubois.3010.g: "Comment ont-ils disparu? Je pensais qu'ils étaient morts ..."
 dubois.3011.t: "Naturaliste vend des parties de la collection"
 dubois.3011.d: "Apparemment, le professeur [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] avait acumulé d'énormes dettes. Il semble que la seule solution [SCOPE.sCharacter('dubois_naturalist_scope').GetSheHe] SAW était de vendre des parties de notre collection."
 dubois.3011.f: "\ \"Non, s'il vous plaît, ne faites rien à mon petit espoir. Elle n'a rien fait de mal! Je ferai tout pour obtenir l'argent! S'il vous plaît! Ne lui blessez pas. Elle est juste une petite araignée innocente! \""
 dubois.3011.g: "[SCOPE.sCharacter('dubois_naturalist_scope').GetSheHe|U] a fait quoi ?!"
 ito_botanist: "Botaniste"
 dubois_botanist_desc: "Des jungles aux déserts, de l'arbre à la mousse, ce personnage a consacré leur temps à la recherche de plantes du monde entier."
 ito_entomologist: "Entomologiste"
 dubois_entomologist_desc: "Why would anyone ever want to research bugs? Well this character does and has become a specialist."
 ito_marine_biologist: "Biologiste marin"
 dubois_marine_biologist_desc: "Ah, la mer! Ne serait-il pas génial de passer une fois là-bas? Peut-être pas comme un marin. Ce personnage peut passer leur vie à rechercher toutes les formes de vie dans la mer. Quelle vie merveilleuse!"
 ito_zoologist: "Zoologiste"
 dubois_zoologist_desc: "Les animaux sont excitants! Ils sont fascinants! Et ce personnage veut tous les connaître!"
