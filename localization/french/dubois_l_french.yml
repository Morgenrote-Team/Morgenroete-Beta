 dubois.1041.t: "Les enclos européens"
 dubois.1041.d: "L'enceinte européenne est dominée par une grande zone forestière, mais il y avait également d'autres enclos. Certains visiteurs mangeaient et buvaient quelque chose dans un restaurant qui était situé dans une maison traditionnelle à mi-parole européenne."
