 dubois.2171.h: "Plesiosaurus."
 dubois.2171.i: "Basilosaure."
 dubois.2171.j: "Megalodon."
 dubois.2173.t: "Plésiosaure"
 dubois.2173.f: "Plesiosaurus est un ordre de reptiles maritines. Leurs fossiles se trouvent partout dans le monde. Selon l'espèce, les animaux mesuraient entre 1,5 et 15 mètres de long. Selon l'espèce, ils se nourrissaient probablement de différents animaux. Des escargots et des moules aux poissons et aux autres proies. \ NETHES MAWS ET DE DÉTES SUPPLÉMENTAIRES en U, qui ressemblent à un piège à poisson, leur a fourni un outil utile."
 dubois.2174.t: "Basilosaure"
 dubois.2174.f: "Le basilosaure n'est pas un dinosaure, mais une forme préhistorique de baleine. Son corps long rappelle un long serpent, mais avec une longueur allant jusqu'à 20 mètres, il est similaire à la longueur du sperme."
 dubois.2175.t: "Mégalodon"
 dubois.2175.f: "Le gigantesque requin Megalodon est probablement le plus grand requin à avoir jamais existé. Cependant, l'estimation de sa longueur est difficile, car seules les dents et les vertèbres ont été trouvées. Nos paléontologues estiment que sa longueur se situe entre 9 et 30 mètres. Quoi qu'il en soit, le squelette de requin est à couper le souffle et l'un des joyaux de la couronne de notre collection."
