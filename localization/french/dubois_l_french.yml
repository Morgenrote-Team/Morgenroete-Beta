 dubois.2101.t: "Un squelette amélioré"
 dubois.2101.d: "Les efforts de notre [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')] ont porté des fruits: le squelette précédemment défectueux a été considérablement amélioré."
 dubois.2101.f: "Il a fallu un certain temps pour réfléchir à l'animal préhistorique, à sa locomotion, à son environnement écologique et à de nombreuses autres circonstances avant que le professeur [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] ne présente l'idée cruciale de mettre des os à leur place. L'ensemble du squelette a ainsi été significativement amélioré."
 dubois.2101.g: "Ça a l'air bien mieux!"
 dubois.2102.t: "Un squelette inchangé"
 dubois.2102.d: "Malgré de nombreuses tentatives pour améliorer le squelette, notre [concept_dubois_paleontologist] a échoué."
 dubois.2102.f: "Le professeur [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] a maintenu un grand soin dans le traitement du squelette. Dans un effort pour ne pas trop détruire et pour procéder prudemment, il est resté si prudent qu'il n'a presque rien changé."
 dubois.2102.g: "Inchangé? Qu'est-ce que ce [concept_dubois_paleontologist] est réellement payé?"
 dubois.2103.t: "Un squelette détérioré"
 dubois.2103.d: "Il aurait peut-être été préférable de ne pas avoir [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetFullName] travailler sur un squelette de dinosaure."
 dubois.2103.f: "C'était extrêmement surprenant pour toutes les personnes impliquées lorsque le professeur [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] a présenté la «version révisée» du squelette. Notamment parce qu'une hanche reposait désormais sur l'une des épaules et une deuxième queue formidable complétait l'animal - sur le front."
 dubois.2103.g: "Cet imbécile a aggravé!"
 dubois.2111.t: "Section des dinosaures nord-américains"
 dubois.2111.d: "Quel squelette de dinosaure visiter?"
 dubois.2111.f: "Les dinosaures nord-américains sont parmi les plus connus de leur genre. De nombreuses espèces de dinosaures ont été trouvées dans la formation Morrison à la fin du 19e siècle. Les spécimens bien connus sont Ankylosaurus, Diplodocus, Triceratops et Tyrannosaurus Rex."
 dubois.2111.g: "Ankylosaurus."
 dubois.2111.h: "Diplodocus."
 dubois.2111.i: "Triceratops."
 dubois.2111.j: "Tyrannosaurus Rex."
 dubois.2111.k: "Stegosaurus."
 dubois.2112.t: "Ankylosaure"
 dubois.2112.f: "Ankylosaurus est un genre remarquable de dinosaure blindé qui a prospéré à la fin du Crétacé, il y a environ 68 à 66 millions d'années. Appartenant au groupe de dinosaures herbivores connus sous le nom d'ankylosaurides, cette créature préhistorique est célébrée pour ses adaptations défensives distinctives et impressionnantes. \ NCharactérisée par un corps robuste et fortement blindé, Ankylosaurus possédait un profil large et à faible élan, offerte des plats oséclataires, ou des ostéodermes, un profil skin, offrant une protection de potentiel. Sa caractéristique la plus emblématique était le club de queue, formé par un bouton dense d'os à la pointe de sa queue, qui a probablement servi de dissuasion contre les attaquants et un outil de combat intraspécifique. \ Nit d'une longueur d'environ 20 à 30 pieds, Ankylosaurus était un herbivore quadrupède, utilisant sa végétation du bev large du bec large. Sa tête relativement petite, par rapport à son corps substantiel, indique des habitudes d'alimentation sélectives sur les plantes et les arbustes bas."
 dubois.2113.t: "Diplodocus"
 dubois.2113.f: "Diplodocus représente un genre emblématique de dinosaures colossaux à long cou qui a prospéré au cours de la période du Jurassique, il y a environ 154 à 152 millions d'années. Classé comme un sauropode, Diplodocus est réputé pour sa remarquable cou et sa taille immense, incarnant la grandeur de la vie préhistorique. \ NCharactérisée par son plan corporel distinct, Diplodocus possédait un cou et une queue allongés, avec une tête relativement petite qui présentait des dents pêches adaptées à la végétation. Sa longueur impressionnante allant jusqu'à 90 pieds a fait de l'un des animaux terrestres les plus longs à avoir jamais existé, tandis que son squelette relativement léger et sa position quadrupède ont facilité un mouvement efficace. \ Ndiplodocus aurait été un herbivore, en utilisant son long cou pour atteindre la légume au-dessus du sol, évitant la compétition avec d'autres herbivores. Les preuves fossiles suggèrent que ces dinosaures habitaient probablement des environnements luxuriants le long des berges, où une grande vie végétale était facilement disponible."
 dubois.2114.t: "Tricératops"
 dubois.2114.f: "Triceratops est un genre emblématique de dinosaures à cornes qui prospéraient à la fin du Crétacé, il y a environ 68 à 66 millions d'années. Classé comme un cératopside, Triceratops est célébré pour son apparence distinctive, marquée par une impressionnante gamme de cornes faciales et un volant osseux à l'arrière de sa tête. \ NCharactérized par ses formidables caractéristiques défensives, Triceratops a donné un grand corps robuste et une corde massive au-dessus des yeux nasaux proéminents au-dessus du ring et de deux cordes de pliance élongées au-dessus des yeux nasaux. Son volant, orné de fenestrae et de modèles complexes, a probablement joué des rôles dans la reconnaissance des espèces, la thermorégulation et les affichages de combat potentiels. \ Ntriceratops était un quadrupède herbivore qui habitait divers environnements allant des bois aux plaines. Son bec robuste lui a permis de cultiver efficacement la végétation, et ses mâchoires puissantes pourraient broyer du matériel végétal dur. Des preuves fossilisées de Triceratops os suggèrent qu'elle peut avoir adopté des comportements sociaux et des interactions hiérarchiques au sein des troupeaux."
 dubois.2115.t: "Tyrannosaurus Rex"
 dubois.2115.f: "Tyrannosaurus Rex, communément appelé T. Rex, est un dinosaure prédateur emblématique et colossal qui parcourait la Terre à la fin du Crétacé, il y a environ 68 à 66 millions d'années. Appartenant au groupe théropode des dinosaures, T. Rex se tenait au sommet de la chaîne alimentaire préhistorique comme l'un des plus grands prédateurs terrestres à exister. Son crâne imposant, équipé de dents de la taille d'une banane dentelées, indique un régime carnivore comprenant principalement d'autres dinosaures. Ses puissants membres postérieurs ont été adaptés au mouvement Swift, tandis que ses armes légères disproportionnées, rappelant les structures vestiges, continuent de captiver l'enquête scientifique. \ Npaleontologique suggère que T. Rex peut avoir été un prédateur apex, utilisant son sens aigu de l'odeur, de la vision binoculaire et de la force de la mâchoire pour sécuriser sa place au sommet de l'odeur préhistorique. Le débat sur ses comportements de chasse, que ce soit en tant que prédateur ou charognard actif, reste un sujet de recherche et de spéculation en cours."
 dubois.2116.t: "Stegosaurus"
 dubois.2116.f: "Stegosaurus est un genre emblématique de dinosaures herbivores qui a prospéré à la fin de la période jurassique, il y a environ 155 à 150 millions d'années. Classé comme un thyréophoran, Stegosaurus est célébré pour son apparence distinctive et frappante. Le but de ses plaques, que ce soit pour la régulation de la température, l'affichage ou la défense, reste un sujet de débat scientifique. Il a probablement parcouru une végétation basse dans son environnement jurassique. Les \ nfossiles de Stegosaurus ont été découverts principalement dans l'ouest de l'Amérique du Nord, notamment le Colorado et l'Utah, offrant des informations précieuses sur l'anatomie, le comportement et l'histoire évolutive des dinosaures thyréophoraux. Le caractère distinctif du Stegosaurus en a fait une figure populaire et durable en paléontologie et en culture populaire."
 dubois.2112.h: "Retour à la section nord-américaine."
 dubois.2121.t: "Section des dinosaures sud-américains"
 dubois.2121.d: "Quel squelette de dinosaure visiter?"
 dubois.2121.f: "À la fin du XIXe siècle, les os de dinosaures ont été de plus en plus trouvés dans les massifs de Patagonie de l'Amérique du Sud. Les premiers représentants incluent Antarctosaurus et Argyrosaurus."
 dubois.2121.g: "Antarctosaurus."
 dubois.2121.h: "Argyrosaurus."
 dubois.2122.t: "Antarctosaure"
 dubois.2122.f: "Antarctosaurus représente un genre notable de dinosaures sauropodes qui habitaient l'ancien continent du Gondwana à la fin du Crétacé, il y a environ 70 à 65 millions d'années. Classé dans les titanosaures, Antarctosaurus illustre la diversité des formes de sauropode qui parcouraient une fois la Terre. Son cou et sa queue allongés, ainsi qu'une tête relativement petite, indiquent une adaptation pour se nourrir de la végétation au-dessus du sol. Ce titanosaure est noté pour sa structure de membres robuste, qui a probablement soutenu son poids et a facilité son mouvement. \ Nfossiles d'Antarctosaure a été découvert principalement dans les continents du sud, y compris l'Amérique du Sud et l'Antarctique, où ils ont fourni des idées précieuses sur l'évolution et la distribution des sauteurs au cours du Crétacé tardif. Ces résultats contribuent à notre compréhension des écosystèmes uniques qui existaient au Gondwana au cours de cette période."
 dubois.2123.t: "Argyrosaure"
 dubois.2123.f: "Argyrosaurus est un genre important de dinosaures de sauropode qui ont parcouru les paysages anciens d'Amérique du Sud à la fin du Crétacé, il y a environ 90 à 70 millions d'années. Appartenant au sous-groupe de sauropode connu sous le nom de titanosaures, Argyrosaurus offre un aperçu de la faune préhistorique diversifiée de la région. \ Alors que certains aspects de sa biologie et de son comportement restent spéculatifs, l'argyrosaurus reste un sujet convaincant de l'étude paléontologique, éclairant la grandeur et complexité du passé préhistorique de la Terre dans l'hémisphère sud."
 dubois.2122.h: "Retour à la section sud-américaine."
 dubois.2131.t: "Section des dinosaures européens"
 dubois.2131.d: "Quel squelette de dinosaure visiter?"
 dubois.2131.f: "Depuis le début du XIXe siècle, de nouveaux fossiles de dinosaures ont été mis au jour dans les massifs européens, notamment à la suite de l'augmentation de l'exploitation minière. Entre autres, Iguanodon et Plateosaurus sont connus."
 dubois.2131.g: "Iguanodon."
 dubois.2131.h: "PlateOsaurus."
 dubois.2132.t: "Iguanodon"
 dubois.2132.f: "Iguanodon est un genre notable de dinosaures herbivores qui ont prospéré au début du Crétacé, il y a environ 140 à 120 millions d'années. Classé comme un iguanodontide, Iguanodon a joué un rôle pivot dans la formation de notre compréhension de l'anatomie et du comportement des dinosaures. Sa pointe de pouce, autrefois considérée comme une corne, aurait maintenant été utilisée pour la défense contre les prédateurs ou pour manipuler la végétation. \ Niguanodon habité des environnements, y compris les forêts et les plaines, et était un herbivore qualifié, en utilisant son bec édenté pour cultiver la végétation. Avec une longueur allant jusqu'à 33 pieds, c'était un herbivore proéminent de son temps, influençant les écosystèmes qu'il habitait. Les fossiles d'Iguanodon ont été découverts pour la première fois en Europe, notamment en Belgique et en Angleterre, et son étude a joué un rôle crucial dans le développement du domaine de la paléontologie."
 dubois.2133.t: "Plaque"
 dubois.2133.f: "Plateosaurus est un genre important de dinosaures herbivores qui ont prospéré au cours de la période tardive du Trias, il y a environ 214 à 204 millions d'années. Classé comme un protoropode, Plateosaurus offre des informations cruciales sur l'évolution précoce des dinosaures et leurs adaptations à différents environnements. Ses membres robustes et ses adaptations porteuses lui ont permis de se nourrir efficacement de la végétation et de naviguer dans son habitat. Ses dents larges en forme de feuilles ont facilité la consommation de matériel végétal."
 dubois.2132.h: "Retour à la section européenne."
 dubois.2141.t: "Section des dinosaures africains"
 dubois.2141.d: "Quel squelette de dinosaure visiter?"
 dubois.2141.f: "Ce n'est qu'au début du 20e siècle que la paléontologie en Afrique a connu un boom significatif, la Tanzanie et l'Afrique du Sud étant particulièrement remarquables, mais aussi l'Égypte. Les découvertes importantes étaient le giraffatitan et le spinosaurus."
 dubois.2141.g: "Giraffatitan."
 dubois.2141.h: "Spinosaurus."
 dubois.2142.t: "Giraffatitan"
 dubois.2142.f: "Giraffatitan, anciennement connu sous le nom de Brachiosaurus, est un genre notable de dinosaures colossaux à long cou qui ont prospéré au cours de la période du Jurassique tardif, il y a environ 154 à 150 millions d'années. Classé comme un sauropode, le giraffatitan est reconnu pour sa taille exceptionnelle et ses adaptations uniques. Avec une hauteur allant jusqu'à 39 pieds et une longueur supérieure à 80 pieds, il était l'un des animaux terrestres les plus hauts et les plus longs à avoir jamais existé. \ Ngiraffatitan était un herbivore qui habitait probablement des environnements luxuriants, tels que les vallées de la rivière et les plaines inondables, où il pourrait accéder à de nombreux aliments végétaux. Sa grande masse corporelle a été soutenue par des os des membres robustes et une poitrine massive en forme de baril. Des preuves fossiles de giraffatitan ont été découvertes principalement en Afrique, en particulier dans la Tanzanie actuelle et le Zimbabwe."
 dubois.2143.t: "Spinosaurus"
 dubois.2143.f: "Spinosaurus est un genre remarquable de dinosaures carnivorers qui habitaient l'Afrique du Nord pendant la période du Crétacé, il y a environ 112 à 93 millions d'années. Classé comme théropode, Spinosaurus est célébré pour ses caractéristiques distinctives et ses adaptations uniques. Sa voile a peut-être joué un rôle dans la thermorégulation ou la reconnaissance des espèces. Ses membres robustes et son crâne allongé suggèrent des adaptations pour la capture et la consommation de proies aquatiques, mettant en évidence son créneau écologique. Des restes fossiles de spinosaurus ont été découverts pour la première fois en Égypte et plus tard au Maroc."
 dubois.2142.h: "Retour à la section africaine."
 dubois.2151.t: "Section des dinosaures asiatiques"
 dubois.2151.d: "Quel squelette de dinosaure visiter?"
 dubois.2151.f: "Une première expédition américaine en Mongolie dans le premier tiers du 20e siècle devrait conduire à la découverte de nouveaux types de dinosaures en Asie. Psittacosaurus et Velociraptor sont parmi les plus longues espèces connues."
 dubois.2151.g: "Psittacosaurus."
 dubois.2151.h: "Velociraptor."
 dubois.2152.t: "Psittacosaurus"
 dubois.2152.f: "Psittacosaurus est un genre notable de petits dinosaures herbivores qui habitaient l'Asie au début du Crétacé, il y a environ 126 à 101 millions d'années. Classé comme un cératopsien, Psittacosaurus se distingue par ses caractéristiques et contributions intrigantes à notre compréhension de l'évolution des dinosaures. Ces boutons de plumes auraient pris en charge des structures de type poil, éventuellement pour l'affichage ou la thermorégulation. \ Nés d'une longueur allant d'environ 3 à 6,5 pieds, Psittacosaurus habitait une variété d'environnements, y compris les forêts et les plaines. Son bec et ses dents spécialisées suggèrent des adaptations pour le traitement d'une gamme diversifiée de matériel végétal. Des restes fossiles de psittacosaurus ont été découverts principalement en Chine et en Mongolie."
 dubois.2153.t: "Vélociraptor"
 dubois.2153.f: "Velociraptor est un genre renommé de dinosaures carnivores de petite à moyenne taille qui parcouraient des parties de l'Asie à la fin du Crétacé, il y a environ 75 à 71 millions d'années. Classé comme un théropode Dromaeosaurid, Velociraptor est célébré pour ses adaptations remarquables et son rôle dans la formation de la perception du public des dinosaures. Il possédait un corps élégant, une longue queue et une griffe distinctive en forme de faucille sur chaque pied, qu'il a probablement utilisé pour réduire sa proie. \ Ncontrary aux représentations antérieures, Velociraptor était relativement petit, avec une longueur d'environ 6,5 pieds et pesant environ 50 livres. Ses sens passionnés, ses dents pointues et ses comportements de chasse aux paquets, en cas de preuve et d'étude fossiles, ont contribué à sa réputation de formidable prédateur."
 dubois.2152.h: "Retour à la section asiatique."
 dubois.2161.t: "Section des dinosaures australiens"
 dubois.2161.d: "Quel squelette de dinosaure visiter?"
 dubois.2161.f: "En 1926, des os de dinosaures ont été découverts en Australie pour la première fois, ce qui a été le début d'une recherche plus intensive. Plus tard, le Muttaburrasaurus gagnerait une notoriété."
 dubois.2161.g: "Muttaburrasaurus."
 dubois.2161.h: "Rhoetosaurus."
 dubois.2162.t: "Muttaburrasaurus"
 dubois.2162.f: "Muttaburrasaurus est un genre notable de dinosaures d'ornithopode qui habitaient l'Australie au début du Crétacé, il y a environ 112 à 99 millions d'années. Classé comme un iguanodontien, Muttaburrasaurus offre des informations précieuses sur la faune préhistorique de cette région. Ses mâchoires puissantes étaient équipées de batteries de dents adaptées au broyage du matériel végétal, suggérant un régime herbivore. Ses membres robustes et sa taille relativement grande suggèrent des adaptations pour une locomotion efficace et des herbivores."
 dubois.2163.t: "Rhoetosaure"
 dubois.2163.f: "Le Rhoetosaurus est un genre notable de dinosaures de sauropode qui habitaient l'Australie pendant la période du Jurassique moyen, il y a environ 165 millions d'années. Classé dans le groupe sauropodomorphe, Rhoetosaurus offre un aperçu crucial de l'histoire ancienne des dinosaures australiens. \ Nistinguishiés par sa taille massive, le Rhoetosaurus était une tête colossale et rôtie. Bien que relativement plus petite par rapport à certains de ses parents sauropodes, le Rhoetosaurus mesurait encore environ 50 pieds de longueur, ce qui en fait l'un des plus grands animaux de son temps en Australie. \ Nthe Fossils of Rhoetosaurus a été découvert pour la première fois dans le Queensland, en Australie, et ils représentent certaines des preuves les plus précoces de dinosaures sauropodes dans cette région. Ses caractéristiques anatomiques, telles que son long cou et sa queue relativement allongée, reflètent les adaptations de l'herbivorie et l'exploitation d'une variété de ressources végétales."
 dubois.2162.h: "Retour à la section australienne."
 dubois.2112.d_perfect_dinosaur: "Ce squelette de dinosaure est considéré comme parfaitement assemblé. Il n'a pas besoin d'être modifié et donne une cote de dinosaure maximale."
 dubois.2112.d_imperfect_dinosaur: "Ce squelette de dinosaure est considéré comme imparfait assemblé. Il ne donne que la moitié de la cote de dinosaure possible. Il peut être réassemblé par un [concept_dubois_paleontologist] à condition qu'il ne soit pas occupé ou épuisé."
 dubois.2112.d_poor_dinosaur: "Ce squelette de dinosaure est considéré comme mal assemblé. Cela nuit massivement à notre cote de dinosaure. Il peut être réassemblé par un [concept_dubois_paleontologist] à condition qu'il ne soit pas occupé ou épuisé."
 dubois.2112.g: "Réasmettez ce squelette de dinosaure."
