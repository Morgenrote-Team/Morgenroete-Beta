 dubois.1321.t: "Une nouvelle maison pour le [GetPlayer.MakeScope.GetCountry.GetCustom('dubois_breeding_animal_type')]"
 dubois.1321.d: "Notre [concept_dubois_nature_reserve] nourrit maintenant assez [GetPlayer.MakeScope.GetCountry.GetCustom('dubois_breeding_animal_type')] pour un [concept_dubois_habitat] stable."
 dubois.1321.f: "C'est une excellente journée pour le [GetPlayer.MakeScope.GetCountry.GetCustom('dubois_breeding_animal_type')]. Maintenant, ils seront protéger pour l'avenir!"
 dubois.1321.g: "Merveilleux!"
 dubois.1322.t: "La sélection du [GetPlayer.MakeScope.GetCountry.GetCustom('dubois_breeding_animal_type')] a échoué"
 dubois.1322.d: "Malheureusement, notre tentative de trouver un nouveau [concept_dubois_habitat] stable dans le [concept_dubois_nature_reserve] de [ROOT.Var('dubois_breeding_state_var').GetState.GetName] a échoué. Si nous le voulons, nous pouvons réessayer et espérer que nous aurons plus de chance cette fois."
 dubois.1322.f: "Nous pleurons cette perte de [GetPlayer.MakeScope.GetCountry.GetCustom('dubois_breeding_animal_type')]."
 dubois.1322.g: "Quelle triste journée."
