 dubois.2011.d_asia: "Le professeur [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] est le principal [concept_dubois_paleontologist] de notre pays. [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetSheHe] mène actuellement des enquêtes dans une formation rocheuse dans #YELLOW Asia#!."
