 dubois.128.t: "Wapiti"
 dubois.128.d: "Notre zoo est enrichi par un nouvel animal exotique: aujourd'hui, le #O Elk#! tant attendu a déménagé dans sa nouvelle enceinte."
 dubois.128.f: "Le wapiti européen, également connu sous le nom d'orignal en Amérique du Nord, est le plus grand membre de la famille des cerfs. Originaires des forêts d'Europe et d'Asie, ces géants solitaires sont connus pour leurs bois massifs, que les mâles perdent et repoussent chaque année. Les élans sont des navigateurs, se nourrissent de feuilles, d'écorce et de plantes aquatiques. Malgré leur taille, ils sont agiles et bien adaptés à leurs habitats froids et boisés."
