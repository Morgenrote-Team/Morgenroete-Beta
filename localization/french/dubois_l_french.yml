 dubois_nam_enclosure_alligator: "\ n- #o Alligators#!"
 dubois_getting_alligator: "\ n- Vous pouvez trouver les #n Alligators#! dans les États de #bold Mississippi#!, #bold Alabama#!, #bold Louisiana#!, et #bold Texas#!"
 dubois_nam_enclosure_axolotl: "\ n- #o axolotls#!"
