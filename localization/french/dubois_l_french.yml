 dubois_send_paleontologist_to_excavation_button_desc: "Envoyez votre [concept_dubois_paleontologist] au [concept_dubois_paleontological_excavation]. \ Na Le paléontologue présent augmentera le montant de [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] et du [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] de l'excavation. \ N \ nyou peut toujours se souvenir du paléontologue, mais il ne pourra pas revenir à une excavation pendant un an."
