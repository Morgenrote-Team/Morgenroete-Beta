 dubois.261.t: "Systemisation complète"
 dubois.261.d: "Au fil des années de travail, le Dr [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName] a publié des théories [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetHerHis] sur les relations dans le monde des animaux et des plantes préhistoriques. La publication a déjà été reconnue par une fondation pour ses nouvelles perspectives sur l'arbre généalogique des êtres vivants."
 dubois.261.f: "«Je collecterai des plantes et des fossiles, et avec le meilleur des instruments, faire des observations astronomiques. Pourtant, ce n'est pas le but principal de mon voyage. Je m'efforcerai de découvrir comment les forces de la nature agissent les unes sur les autres, et de quelle manière l'environnement géographique exerce son influence sur les animaux et les plantes. Bref, je dois découvrir l'harmonie dans la nature. -Alexander von Humboldt"
 dubois.261.g: "C'est vraiment ... très intéressant."
 dubois.262.t: "Arbre généalogique d'un animal"
 dubois.262.d: "Après que le Dr [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName] ait comparé des rapports locaux et internationaux sur les fossiles d'une certaines espèces animales, [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetSheHe] remet en question fondamentalement les faits précédemment crus sur l'évolution de cette espèce."
 dubois.262.f: "«Absorbé par l'enquête spéciale, je n'ai pas prêté attention à l'édifice qui était en cours de construction inconsciemment. Ayant cependant terminé la comparaison des espèces fossiles à Paris, je voulais, pour une révision facile de la même chose, pour faire une liste en fonction de leur succession dans des formations géologiques, en vue de déterminer plus exactement les caractéristiques et de les apporter par leur énumération dans un soulagement plus audacieux. Quelle était ma joie et ma surprise de constater que l'énumération la plus simple des poissons fossiles en fonction de leur succession géologique était également une déclaration complète des relations naturelles des familles entre elles; Que l'on puisse donc lire le développement génétique de toute la classe dans l'histoire de la création, la représentation des genres et des espèces dans plusieurs familles qui y sont déterminées; En un mot, que la succession génétique des poissons correspond parfaitement à leur classification zoologique et à cette classification proposée par moi. -Louis Agassiz"
 dubois.262.g: "Avons-nous cet animal dans le zoo?"
 dubois.263.t: "Une petite acquisition"
 dubois.263.d: "Au cours de ses études, le Dr [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName] est entré en contact avec un autre paléontologue. Grâce aux canaux de négociation, [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetSheHe] a pu acquérir un fossile qui soutient sa dernière thèse - parfois aux frais de l'université."
 dubois.263.f: "«À la voix de l'anatomie comparative, chaque os et le fragment d'un os, reprend sa place. Je ne trouve pas de mots pour exprimer le plaisir que j'ai de voir, comme je l'ai découvert un personnage, comment toutes les conséquences, que j'ai prédites, ont été successivement confirmées; Les pieds ont été trouvés conformément aux personnages annoncés par les dents; les dents en harmonie avec celles indiquées au préalable par les pieds; Les os des jambes et des cuisses, et chaque partie de connexion des extrémités, ont été retrouvés de manière précisément telle que je les disposais, avant que mes conjectures ne soient vérifiées par la découverte des parties entières: en bref, chaque espèce était, pour ainsi dire, reconstruite à partir d'un seul de ses éléments composants. -William Buckland"
 dubois.263.g: "Cela en valait-il la peine?"
 dubois.264.t: "Suggestions géologiques"
 dubois.264.d: "Dans une conversation avec [GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetFullName] sur les emplacements des fossiles en couches rocheuses, [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetFullName] a acquis de nouvelles informations importantes sur la détermination chronologique."
 dubois.264.f: "\"Pourquoi personne n'a vu que les fossiles seuls ont donné naissance à une théorie sur la formation de la terre, que sans eux, personne n'aurait jamais rêvé qu'il y avait des époques successives dans la formation du globe.\" -Georges Cuvier"
 dubois.264.g: "Ah, les synergies de la géologie et de la paléontologie!"
 dubois.265.t: "Une conférence impressionnante"
 dubois.265.d: "Le Dr [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName] a donné une série de conférences très acclamées dans son université ce semestre qui est considérée comme inspirante pour la paléontologie. De nombreux nouveaux étudiants se sont inscrits à la matière."
 dubois.265.f: "'As one penetrates from seam to seam, from stratum to stratum and discovers, under the quarries of Montmartre or in the schists of the Urals, those animals whose fossilized remains belong to antediluvian civilizations, the mind is startled to catch a vista of the milliards of years and the millions of peoples which the feeble memory of man and an indestructible divine tradition have forgotten and whose ashes heaped on La surface de notre globe, forment les deux pieds de terre qui nous fournissent du pain et des fleurs. -Honoré de Balzac"
 dubois.265.g: "Un professeur populaire!"
