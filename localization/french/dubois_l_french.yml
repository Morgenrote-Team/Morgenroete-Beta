 notification_dubois_animal_breeding_notification_desc: "Cette année, le nombre de [GetPlayer.MakeScope.GetCountry.GetCustom('dubois_breeding_animal_type')] dans notre [concept_dubois_nature_reserve] a changé par [GetPlayer.MakeScope.Var('dubois_animal_breeding_change_var').GetValue|0+=]. Il y a actuellement [GetPlayer.MakeScope.Var('dubois_breeding_animal_amount_var').GetValue|0+] [GetPlayer.MakeScope.GetCountry.GetCustom('dubois_breeding_animal_type')]."
 dubois.1321.t: "Une nouvelle maison pour le [GetPlayer.MakeScope.GetCountry.GetCustom('dubois_breeding_animal_type')]"
 dubois.1321.d: "Notre [concept_dubois_nature_reserve] nourrit maintenant assez [GetPlayer.MakeScope.GetCountry.GetCustom('dubois_breeding_animal_type')] pour un [concept_dubois_habitat] stable."
 dubois.1321.f: "C'est une excellente journée pour le [GetPlayer.MakeScope.GetCountry.GetCustom('dubois_breeding_animal_type')]. Maintenant, ils seront protéger pour l'avenir!"
 dubois.1321.g: "Merveilleux!"
 dubois.1322.t: "La sélection du [GetPlayer.MakeScope.GetCountry.GetCustom('dubois_breeding_animal_type')] a échoué"
 dubois.1322.d: "Malheureusement, notre tentative de trouver un nouveau [concept_dubois_habitat] stable dans le [concept_dubois_nature_reserve] de [ROOT.Var('dubois_breeding_state_var').GetState.GetName] a échoué. Si nous le voulons, nous pouvons réessayer et espérer que nous aurons plus de chance cette fois."
 dubois.1322.f: "Nous pleurons cette perte de [GetPlayer.MakeScope.GetCountry.GetCustom('dubois_breeding_animal_type')]."
 dubois.1322.g: "Quelle triste journée."
 dubois.2001.t: "Collection paléontologique"
 dubois.2001.d: "Bienvenue à la collection paléontologique."
 dubois.2001.f_paleontologist: "Notre collection est actuellement gérée par notre [concept_dubois_paleontologist] [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetFullName]. Il dispose: \ n \ n#G [ROOT.Var('dubois_fossil').GetValue]#! @dubois_fossile! Fossiles \ n \ n#G [ROOT.Var('dubois_special_fossil').GetValue]#! @dubois_special_fossil! Fossiles spéciaux. \ N \ n#G [ROOT.Var('dubois_human_fossil').GetValue]#! @dubois_human_fossile! Fossiles humains \ n \ n#G [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetFullName]2#! @dubois_dinosaur_bone! Dinosaur Bones \ n \ n#G [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetFullName]5#! @dubois_dinosaur_skeleton! Squelettes de dinosaures \ n \ nour [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetFullName]7 Rating Dinosaur#! comme une note pour tous nos squelettes de dinosaures affichés est [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetFullName]9."
 dubois.2001.f_no_paleontologist: "Notre collection est actuellement gérée par #R Personne #!. IT Fonctionne: \ n \ n#G [ROOT.Var('dubois_fossil').GetValue]#! @dubois_fossile! Fossiles \ n \ n#G [ROOT.Var('dubois_special_fossil').GetValue]#! @dubois_special_fossil! Fossiles spéciaux. \ N \ n#G [ROOT.Var('dubois_human_fossil').GetValue]#! @dubois_human_fossile! Fossiles humains \ n \ n#G #!.2#! @dubois_dinosaur_bone! Dinosaur Bones \ n \ n#G #!.5#! @dubois_dinosaur_skeleton! Squelettes de dinosaures \ n \ nour #!.7 Rating Dinosaur#! comme une note pour tous nos squelettes de dinosaures affichés est #!.9."
