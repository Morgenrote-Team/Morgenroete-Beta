 dubois.231.t: "Rival a détruit Digsite"
 dubois.231.d: "Le Dr [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName] était sur la piste d'un dépôt prometteur. Quand il est arrivé, cependant, il a découvert qu'un rival avait déjà déterré de nombreux os, puis a fait exploser le site."
 dubois.231.f: "Si je ne peux pas avoir ces os, personne d'autre ne le fera!"
 dubois.231.g: "Pourquoi feraient-ils ça!"
 dubois.232.t: "Les habitants partagent des informations"
 dubois.232.d: "Les habitants d'un petit village avaient trouvé divers fossiles à proximité. Ils les ont joyeusement partagés avec le Dr [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName]. Cela rapprochera le [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetHerHim] de la découverte d'un nouveau Digsite!"
 dubois.232.f: "Mon grand-père a donc trouvé une fois une corne de licorne. Je sais que ce qui pense mais je pense que c'était l'os d'un dinosaure! Malheureusement, il l'a vendu. Mais il m'a dit où il l'avait trouvé en premier lieu. C'était sur le lit de la rivière. Je suis sûr que vous trouverez des os près de la rivière!"
 dubois.232.g: "Merci!"
 dubois.233.t: "Le paléontologue local partage la recherche"
 dubois.233.d: "Un résident d'un petit village est apparemment également un paléontologue de passe-temps. Comme [SCOPE.sCharacter('dubois_paleontologist_scope').GetFullName] est trop vieux pour fouiller les sites possibles, il a partagé toutes ses connaissances avec le Dr [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName]."
 dubois.233.f: "J'ai commencé à collectionner des fossiles quand j'étais enfant et je ne me suis jamais arrêté. Mais maintenant je suis trop vieux pour me mettre à genoux et creuser. J'espère donc que je pourrai au moins vous aider à trouver des os et des fossiles de dinosaures. Et si vous en trouvez, laissez-moi les voir!"
 dubois.233.g: "C'est une collection incroyable!"
 dubois.234.t: "Mudslide enterre un site prometteur"
 dubois.234.d: "Un jour juste après que l'équipe du Dr [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName] et du [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetHerHis] a découvert un site prometteur, il a été enterré par une glissement de boue massive. Il faudrait des mois ou même des années pour découvrir tout ce qui est caché sous toute la saleté."
 dubois.234.f: "Il faisait d'abord trop chaud pour creuser, puis il était trop mouillé pour creuser et maintenant c'est trop boueux pour creuser? Peut-être que vous n'aimez pas creuser!"
 dubois.234.g: "Merde, temps!"
 dubois.235.t: "Une nouvelle piste"
 dubois.235.d: "Le travail acharné du Dr [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName] semble enfin payer. Après avoir collecté des rapports sur les roches et les formations, [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetSheHe] a localisé divers sites prometteurs. Espérons que [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetSheHe] trouvera des os de dinosaures dans l'un de ces endroits."
 dubois.235.f: "Vous voyez, ces sédiments contiennent souvent des os de dinosaures. Ils remontent à la surface dans ces endroits, nous sommes donc sûrs de trouver des os dans l'un de ces endroits! Alors j'espère. Peut être."
 dubois.235.g: "Bon travail!"
