 dubois.271.t_cretaceous: "Paysage préhistorique: Crétacé"
 dubois.271.t_jurassic: "Paysage préhistorique: jurassique"
 dubois.271.t_triassic: "Paysage préhistorique: Trias"
 dubois.271.d: "Le Dr [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName] a invité aujourd'hui un groupe de collègues à visiter le nouveau paysage préhistorique. Les universitaires ont salué [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetHerHis] sens des détails."
 dubois.271.f_cretaceous: "Le climat du Crétacé était généralement chaud et équilibré. Il a permis à certains dinosaures d'atteindre les hautes latitudes du sud et du nord, au moins pendant les mois d'été. Les poteaux étaient sans glace et le niveau de la mer était en conséquence très élevé, atteignant sa valeur maximale dans le Turonien inférieur. Ce n'est qu'à la fin du Crétacé dans le Maastrichtien que le refroidissement et une régression marquée se sont produites. Comme dans la période Jurassique précédente, la macrofaune terrestre et la mégafaune étaient dominées par les dinosaures. Dans le Crétacé inférieur, les plantes de mousse de club, les fougères, les fougères d'arbres, les ginkgoales, les bennettitales et les conifères étaient les plantes prédominantes. Dans le Crétacé supérieur, de nombreux arbres à feuilles caduques tels que l'érable, le chêne et la noix étaient en concurrence avec des conifères tels que Sequoia et Geinitzia. Les herbes se sont propagées sur le continent et ont considérablement changé le comportement d'érosion."
 dubois.271.f_jurassic: "La période du Jurassique inférieur a peut-être terminé par des éruptions massives dans une grande province magmatique sur le Gondwana. Cela a conduit au réchauffement climatique, associé à une extinction de masse de second ordre. Les conifères à petite feuille et à la sécheresse sont alors devenus une partie importante de la flore et des sauropodes modernes développés parmi les dinosaures. La période jurassique, en particulier la période du Jurassique supérieur (Jurassique supérieur), a vu la première apogée des dinosaures, avec de grands théropodes tels que l'allosaure et les sauropodes géants tels que Diplodocus et Giraffatitan. La flore était dominée par les gymnospermes (y compris les plantes conifères telles que les séquoias et les pins, mais aussi les ginkgo arbres et les cycades). Le Jurassique est également connu comme l'âge des cycades car ils étaient très courants. Les fougères et les prêle ont formé le sous-étage des forêts."
 dubois.271.f_triassic: "Pendant le Trias, un climat chaud a prévalu presque en continu, bien que cela ait été soumis à de fortes fluctuations au début de la période. Le climat semble également avoir été assez sec dans le monde entier: la raison en était la forme de la Pangea Supercontinent et un effet de mousson qui en résulte. Il y avait probablement de vastes déserts à l'intérieur des terres. Le tour du Permien au Trias est associé à un changement faunique prononcé. Ceci est si drastique que, en raison du dossier fossile significativement modifié, le tour du Permien au Trias n'est pas seulement la frontière entre deux périodes, mais aussi entre deux époques de l'histoire de la Terre, le Paléozoïque et le Mésozoïque. En conséquence, de nombreux groupes d'invertébrés marins disparaissent complètement ou définitivement du dossier fossile. La faune vertébrée terrestre subit également des changements importants. Le changement dans le monde végétal des fougères aux gymnospermes qui avaient déjà eu lieu dans le Permien ont continué dans le Trias."
 dubois.271.g: "Beau!"
 dubois.272.t: "Matériels"
 dubois.272.d: "[GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetFullName] montre un perfectionnisme remarquable en terminant son paysage préhistorique. C'est pourquoi [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetSheHe] a déjà utilisé tout son budget."
 dubois.272.f: "Était-ce l'œuf de dinosaure spécialement commandé pour l'exposition? Les graines exquises? Ou la pointe de 300 livres que le portier a reçu pour la Terre naturelle? Pour toutes les raisons, le Dr [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName] peut à peine expliquer, l'argent coule entre ses mains."
 dubois.272.g: "Plus d'argent pour certaines plantes artificielles et lézards? Oublie ça!"
 dubois.272.h: "Nous voulons un beau diorama, épargne sans frais!"
 dubois.273.t: "Un travail ridicule?"
 dubois.273.d: "Certains «collègues» académiques se moquent du Dr [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName] en raison de l'obsession du [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetHerHis] pour les paysages préhistoriques non seulement derrière le dos [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetHerHis], mais maintenant assez directement. Certains chercheurs considèrent l'activité [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetHerHis] comme un passe-temps absurde et le projet comme une affaire fondamentalement ridicule."
 dubois.273.f: "«L'extrême rareté des formes de transition dans le dossier fossile persiste comme le secret commercial de la paléontologie.» -Søren Kierkegaard"
 dubois.273.g: "La paléontologie est une science sérieuse!"
 dubois.273.h: "Certes, notre paléontologue est un peu excentrique."
 dubois.273.i: "Achetez à ces érudits désagréables quelques bouteilles de sherry pour laisser le médecin seul."
 dubois.274.t: "Intérêt des étudiants"
 dubois.274.d: "Depuis quelques semaines maintenant, les étudiants de l'université ont regardé avec un intérêt croissant où le Dr [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName] construit un paysage préhistorique. Ce que certains considèrent comme une entreprise originale, d'autres considèrent comme une inspiration - soudain, le passé lointain devient tangible."
 dubois.274.f: "Dinosaur Court de Crystal Palace Park dans le sud de Londres est un parc à thème géologique et paléontologique. Il est connu pour les sculptures animales, qui ont été créées par Benjamin Waterhouse Hawkins au milieu du 19e siècle en tant que première représentation figurative grandeur nature du monde des animaux éteints. Le parc était destiné à servir à la fois l'amusement et l'éducation de ses visiteurs victoriens. Sur les îles du lac dans la partie du complexe conçu comme un jardin d'aménagement paysager anglais, un parc à thème a été conçu qui reflétait l'histoire géologique de la Grande-Bretagne. Selon un concept basé sur le géologue David Thomas Ansted, chacune des trois îles a été affectée à une époque du phanérozoïque et a été conçue avec les sédiments qui sont originaires de cette période. Hawkins a été conseillé par le paléontologue Richard Owen. Bien que les animaux préhistoriques ne correspondent plus à l'état de recherche au même siècle, ils ont suscité un grand intérêt et ont fourni des parties importantes de la population avec un niveau de base de connaissances paeontologique."
 dubois.274.g: "Une nouvelle génération de chercheurs!"
 dubois.274.h: "Ils devraient aider le médecin."
 je_dubois_safari_hippopotamus: "Africa Safari: Hippopotamus"
 je_dubois_safari_hippopotamus_reason: "Sur un safari africain, grâce à un suivi et à un piégeage constants, le grand jeu peut être capturé puis transporté vers un [concept_dubois_zoo]. Il est seulement possible d'attraper un animal par safari. Selon les espèces animales, cela diffère que vous ayez besoin de pièges ou que vous ayez à rester sur leur sentier. En règle générale, les grands animaux lents ont besoin de plus de pièges, tandis que les animaux rapides nécessitent plus de suivi. Le safari dure 300 jours. Si aucun animal n'est capturé d'ici là, l'équipe de safari quittera à nouveau le pays - sans succès. Les animaux \ n \ naggants peuvent se défendre et attaquer lors du piégeage. Les animaux timides prennent leur envol. Un [concept_dubois_naturalist] qui a le trait zoologiste peut résoudre de telles situations sans désavantage. De nouvelles technologies telles que #ORANGE Machine Gun#! ou #ORANGE Moteur de combustion #! facilitent le suivi et le piégeage des animaux."
