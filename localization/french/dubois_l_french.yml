 dubois_paleontologist_experienced_desc: "Ce paléontologue a acquis la réputation d'un excellent scientifique après plusieurs découvertes."
 dubois_paleontologist_famous: "Paléontologue célèbre"
 dubois_paleontologist_famous_desc: "En raison de ses nombreuses contributions dans le domaine de la paléontologie, cet universitaire est considéré comme une référence mondiale."
