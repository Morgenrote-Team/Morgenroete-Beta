 je_dubois_paleontological_expedition_reason: "Le paléontologue mène un [concept_dubois_paleontological_expedition]. \ N$mr_divider_for_je$ \ nfinishing que l'expédition prendra 12 mois. Une fois terminé, vous gagnerez [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] et [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] en fonction de la valeur #V Success#! de l'expédition. \ N$mr_divider_for_je$ \ neach Mois Une petite quantité de #V Success Chance#! est ajoutée. De plus, les événements aléatoires peuvent ajouter ou soustraire le succès. \ N \ ncurrent Changement de succès mensuel estimé: #underline $mr_divider_for_je$0 $mr_divider_for_je$1 #!#! (maximum: 1) \ n$mr_divider_for_je$ \ nyou pourra configurer un $mr_divider_for_je$4 si vous avez un $mr_divider_for_je$5 gratuit. Une fouille produira passivement plus de fossiles et d'os. \ N$mr_divider_for_je$ \ ncurrent $mr_divider_for_je$7 #underline $mr_divider_for_je$9 Rended#!#!#! de l'expédition: \ n[Concept('concept_dubois_fossil','$concept_dubois_fossils$')]1"
