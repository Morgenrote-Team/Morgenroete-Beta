 dubois.108.t: "Gila Monster"
 dubois.108.d: "Notre zoo est enrichi par un nouvel animal exotique: aujourd'hui, le #O Gila Monster#! tant attendu a déménagé dans sa nouvelle enceinte."
 dubois.108.f: "Le monstre Gila est un lézard venimeux originaire du sud-ouest des États-Unis et du nord-ouest du Mexique. Reconnaissable par ses marques noires et orange distinctes, il est l'un des rares lézards venimeux au monde. Les monstres Gila sont lents et principalement nocturnes, se nourrissant de petits mammifères, d'oiseaux et d'œufs. Ils stockent les graisses dans la queue, leur permettant de survivre à de longues périodes sans nourriture."
 dubois.108.g: "Ça n'a pas l'air aussi dangereux ..."
 visit_gila_tt: "None"
