 dubois.1049.t: "Enclos de wapiti"
 dubois.1049.d: "Dans l'enceinte boisée du zoo, un wapiti européen majestueux se dresse, ses bois massifs s'étendant vers le ciel."
 dubois.1049.f1: "Le comportement calme de l'Elk et la taille imposante attirent l'attention des visiteurs, qui s'émerveillent de l'échelle de ce doux géant. Curieux de ses impressionnants bois, vous abordez un gardien de zoo pour plus d'informations. \ N \ \"Europe, ou orignal, comme ils sont connus en Amérique du Nord, sont les plus grands membres de la famille des cerfs, \" le gardien de zoo. \ \"Leurs bois peuvent s'étendre jusqu'à six pieds de diamètre et sont utilisés principalement pendant la saison de la frontière, lorsque les mâles se disputent les partenaires. Ces bois sont perdus et regroupés chaque année, le nouvel ensemble devenant plus grand et plus complexe à mesure que les wapitis vieillissent. \""
 dubois.1049.f2: "Dans le coin ombragé de l'habitat du wapiti, un grand wapiti européen mâle baisse sa tête massive pour paître sur des pousses et des feuilles tendres. Le mouvement silencieux et rythmique de ses mâchoires alors qu'il mâche est presque hypnotique, attirant une foule de spectateurs. Intriguée par les habitudes d'alimentation des élans, vous cherchez un gardien de zoo pour en savoir plus. \ N \ \"Les wapitis sont des navigateurs, \" Le gardien de zoo explique. \ \"Contrairement aux brouteurs, qui mangent principalement de l'herbe, les wapitis préfèrent se nourrir d'une variété de végétation, y compris les feuilles, l'écorce et les plantes aquatiques. Ils ont un sens aigu, qui les aide à localiser les plantes les plus nutritives de leur environnement. Dans la nature, ils peuvent consommer jusqu'à 70 livres de nourriture en une journée, qui est nécessaire pour soutenir leurs grands corps. \""
 dubois.1049.f3: "Au milieu des arbres bruissants de l'enceinte, un wapiti européen laisse soudain un souffle profond et résonnant, son appel résonnant dans les airs. Le son attire l'attention de tout le monde à proximité, qui s'arrête pour écouter ce cri primaire. Curieux de la signification de cette vocalisation, vous abordez un gardien de zoo pour les idées. \ N \ \"qui était un appel en rut, \" Le gardien de zoo. \ \"Pendant la saison de reproduction, les wapitis mâles utilisent ces vocalisations bruyantes pour établir la domination et attirer les femelles. L'appel peut être entendu sur de longues distances et s'accompagne souvent de manifestations de bois et de posture agressive. Il s'agit d'un puissant rappel du rôle du wapitre en tant que force dominante dans son habitat naturel. \""
