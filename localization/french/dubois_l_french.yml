 dubois.1211.t: "L'habitat dans le [ROOT.GetState.GetName] est détruit"
 dubois.1211.d: "Comme nous n'avons pas réussi à protéger le [Concept('concept_dubois_habitat','$concept_dubois_animal_habitat$')] dans [ROOT.GetState.GetName] en établissant un [concept_dubois_nature_reserve], l'habitat a maintenant été détruit."
 dubois.1211.f: "Malheureusement, la création de la société minière est venue au prix de détruire l'habitat de l'un des animaux de notre pays. Mais qui s'en soucie? Les bénéfices nous attendent!"
 dubois.1211.g: "Oh non. De toute façon."
