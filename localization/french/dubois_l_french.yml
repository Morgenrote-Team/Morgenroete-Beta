 dubois.1000.t: "Le Carnaval des Animaux"
 dubois.1000.d: "Lors de sa récente visite au zoo, notre compositeur a été inspiré en particulier par le lion, l'éléphant, le kangourou et les tortues pour une petite œuvre humoristique, qu'il a baptisé «Carnaval des animaux»."
 dubois.1000.f: "Le «Carnival des animaux», sous-titré Grande Fantaisie Zoologique, a été composé par Camille Saint-Saëns en janvier 1886 dans un petit village autrichien. Ici, en quelques jours seulement, il a traité les premiers croquis pour le Carnaval, qui datent d'une époque où il travaillait comme enseignant dans une école de musique privée à Paris, commandée par Aristide Dietsch (1861/1865). Lorsque les parodies musicales y étaient dans le programme, Saint-Saëns a été persuadé par ses élèves de réaliser l'une de ses nombreuses idées pour un morceau de musique humoristique. Cependant, préoccupé par sa réputation, Saint-Saëns a décidé de ne pas publier les travaux pour l'Orchestre de Chamber. Parce qu'en dehors du fait que le compositeur a imité des appels d'animaux à travers les instruments dans les pièces, il avait parodié plusieurs de ses collègues professionnels. Bien que les compositeurs soient morts à ce moment-là, Saint-Saëns ne voulait pas bouleverser leurs admirateurs. L'œuvre n'a été publiée que par son éditeur Jacques Durand."
