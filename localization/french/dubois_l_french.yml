 dubois.1019.t: "Enceinte de poêle"
 dubois.1019.d: "L'éclosure de Meerkat était dominée par des rochers avec des grottes. Immédiatement, vous avez remarqué que de nombreux petits animaux se tenaient en courant."
 dubois.1019.f1: "\ \"Les suricates sont remarquables pour leur structure sociale hautement organisée\", explique le gardien de zoo. \ \"Chaque membre du groupe, connu sous le nom de« foule »ou« gang », se fait à tour de rôle comme une sentinelle, surveillant les prédateurs tandis que d'autres se nourrissent ou se reposent. Leur communication est nette et claire; différents appels signalent des niveaux de menace variables. Cette vigilance et cette coopération constantes sont la clé de leur survie dans la nature."
 dubois.1019.f2: "\ \"Meerkats sont des diggers experts, \" Le Zookeeper partage. \ \"Ils peuvent creuser plusieurs pieds de profondeur en quelques minutes, ce qui est essentiel pour trouver des aliments comme des insectes, de petits reptiles et des racines. Ce comportement de fouille joue également un rôle crucial dans la création de leurs systèmes de terrassement complexes, où ils vivent en groupes et élèvent leurs jeunes. Ces réseaux souterrains offrent une protection contre les prédateurs et les conditions météorologiques extrêmes. \""
 dubois.1019.f3: "\ \"Meerkats a un large éventail de vocalisations, \" Le gardien de zoo explique. \ \"Leurs sons incluent tout, des appels d'alarme pour coordonner leurs mouvements, aux appels plus doux utilisés pour maintenir le contact au sein du groupe. Lorsqu'un membre trouve de la nourriture, il appelle souvent à partager la découverte avec les autres, mettant l'accent sur la nature communautaire de sa société. Ces communications vocales font partie intégrante de leur survie, les aidant à rester connectés et coordonnés. \" \""
