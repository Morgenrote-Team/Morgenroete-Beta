 dubois.1039.t: "Enceinte de thylacine"
 dubois.1039.d: "Dans l'enceinte sombre du zoo, l'insaisissable thylacine rôde gracieusement le long du périmètre, son dos en arrière et son cadre mince lui donnant une apparence presque mythique. Les visiteurs, fascinés par sa présence d'un autre monde, se réunissent pour observer cette rare créature. Curieux de ses origines, vous abordez un gardien de zoo pour plus d'informations."
 dubois.1039.f1: "\ \"La thylacine, ou tigre Tasmanien, est un exemple fascinant d'évolution convergente, \" Le gardien de zoo explique. \ \"Bien qu'il ressemble à une canine avec son corps en forme de chien et son manteau rayé, il s'agit en fait d'un marsupial, plus étroitement lié aux kangourous et aux koalas. Native de Tasmanie et d'Australie continentale, la thylacine était autrefois le prédateur apex de son environnement."
 dubois.1039.f2: "\ \"Les thylacines étaient principalement des chasseurs nocturnes, \" Le Zookeeper partage. \ \"Ils se sont appuyés sur leur sens vif de la vue et de l'ouïe pour retrouver les proies, chassant souvent seuls ou par paires. Contrairement à de nombreux autres prédateurs, les thylacines étaient relativement silencieuses, utilisant la furtivité et la patience pour aborder leur carrière. Leur régime alimentaire était principalement composé d'animaux de petite à moyenne taille, y compris des wallabies, des oiseaux et des rongeurs. \" \""
 dubois.1039.f3: "\ \"Les vocalisations de la thylacine étaient rares mais mémorables, \" le gardien de zoo. \ \"Ils produiraient une série de yips, de grognements et de hurlements, en particulier pendant la saison de reproduction ou lorsqu'ils se sentaient menacés. Ces appels ont été utilisés pour communiquer avec d'autres thylacines sur de longues distances, en particulier dans les forêts denses de la Tasmanie. Bien que leur gamme vocale n'ait pas été aussi variée que certaines autres prédateurs, les appels de la thylacine étaient une partie essentielle de son comportement, ajoutant à sa mystique.\". \"."
