 dubois.10.t: "Dissolution d'un zoo"
 dubois.10.d: "Le gouvernement n'a aucun intérêt à continuer de maintenir le zoo au [SCOPE.sState('dubois_zoo_state').GetName]. Il doit être dissous et les animaux vendus."
 dubois.10.f: "Un pays ne peut maintenir qu'un seul zoo dans la capitale. Le montant d'argent et des spécimens reçoit en retour dépend de la taille du zoo."
 dubois.10.g: "Mais ... mais tous les merveilleux animaux!"
 alert_dubois_zoo_extension_possible_alert_hint: "Vous pouvez étendre votre [concept_dubois_zoo]. Accédez à la vue d'ensemble académique dans le #V Morgenröte Window#! pour l'étendre."
 alert_dubois_mountain_expedition_possible_alert_hint: "Notre pays est en mesure d'envoyer une expédition en montagne. Accédez à la vue d'ensemble sportive dans le #V Morgenröte Window#! pour l'envoyer."
 alert_dubois_naturalist_unused_alert_hint: "Votre [concept_dubois_naturalist] est inactif en ce moment et pourrait être utilisé pour faire quelque chose. Vous pouvez les envoyer dans l'aperçu académique du #V Morgenröte Window#!."
 alert_dubois_hippocampus_congress_alert_hint: "Vous pouvez héberger le congrès d'Hippocampus. Vous pouvez utiliser le bouton dans la vue d'ensemble académique du #V Morgenröte Window#! pour l'organiser."
 alert_dubois_paleontological_collection_alert_hint: "Vous pouvez créer une collection fossile pour votre [concept_dubois_zoo]. Vous pouvez utiliser le bouton dans la vue d'ensemble du paléontologue dans le #V Morgeröte Window#! pour le créer."
