 je_animal_breeding_reason: "Nous élevons [SCOPE.GetRootScope.GetCountry.GetCustom('dubois_breeding_animal_type')] dans l'espoir de créer un nouveau [concept_dubois_habitat] là-bas. \ N \ nright maintenant il y a [ROOT.Var('dubois_breeding_animal_amount_var').GetValue] [SCOPE.GetRootScope.GetCountry.GetCustom('dubois_breeding_animal_type')]. Si nous atteignons #p 4000#! [SCOPE.GetRootScope.GetCountry.GetCustom('dubois_breeding_animal_type')], la population sera viable et l'habitat sera établi."
