 dubois.2011.d_to_location: "Le professeur [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] est le principal [concept_dubois_paleontologist] de notre pays. [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetSheHe] se rend actuellement à une formation rocheuse pour l'examiner de plus près."
 dubois.2011.d_from_location: "Le professeur [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] est le principal [concept_dubois_paleontologist] de notre pays. [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetSheHe] revient actuellement d'une chasse fossile."
 dubois.2011.d_default: "Le professeur [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] est le principal [concept_dubois_paleontologist] de notre pays. [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetSheHe] n'a actuellement aucune affectation."
 dubois.2011.d_other: "Le professeur [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] est le principal [concept_dubois_paleontologist] de notre pays. [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetSheHe] est occupé ailleurs pour le moment."
 dubois.2011.f: "[ROOT.Var('dubois_paleontologist_var').GetCharacter.GetFullName] a un [concept_academics_experience] paléontologique total de #G [ROOT.Var('dubois_paleontologist_var').GetVariable('dubois_paleontologist_experience_var').GetValue]#!\n\nPalaeontologists peut trouver de nouveaux fossiles en formations chaque année. De grandes formations ont également une chance de découvrir des os de dinosaures rares qui peuvent être utilisés pour reconstruire les squelettes. Pour ce faire, le [concept_dubois_paleontologist] doit être attribué à une formation. Si aucune formation n'est à l'intérieur de ses frontières, un accord de licence paléontologique peut également être négocié avec un pays qui a une grande formation. Sans affectation à une formation, le paléontologue reste inactif. Pendant ce temps, cependant, le [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetSheHe] peut être utilisé pour les expéditions, la reconstruction des os de dinosaures, la construction du squelette ou le remontage du squelette."
 dubois.2011.g: "Enquêter sur les formations en Amérique du Nord."
 dubois.2011.h: "Enquêter sur les formations en Amérique du Sud."
 dubois.2011.i: "Enquêter sur les formations en Europe."
 dubois.2011.j: "Enquêter sur les formations en Afrique."
 dubois.2011.k: "Enquêter sur les formations en Asie."
 dubois.2011.l: "Enquêter sur les formations en Australie."
 dubois.2021.t: "Fossiles spéciaux"
 dubois.2021.d: "Cette collection abrite certains des fossiles les plus extraordinaires trouvés à ce jour."
 dubois.2021_amber: "#T Amber#!\nThe La résine a conservé un insecte qui a des millions d'années. \ N \ n"
 dubois.2021_ammonite: "#T Ammonite#!\nTens de milliers d'espèces d'ammonites ont façonné les mers pendant 350 millions d'années. \ N \ n"
 dubois.2021_archaeopteryx: "#T Archaeopteryx#!\nThis «Bird Primeval Bird» est considéré par certains chercheurs comme un lien possible entre les reptiles et les oiseaux. \ N \ n"
 dubois.2021_composita: "#T Composita#!\nComposita était une espèce répandue qui vivait du Dévonien tardif au permien tardif. \ N \ n"
 dubois.2021_eusthenopteron: "#T EUSTHENOPTERON#!\nThis Les poissons peuvent avoir survécu dans un bassin de la rivière séché et est considéré comme une étape importante vers les amphibiens. \ N \ n"
 dubois.2021_ichthyosaurus: "#T Ichthyosaur#!\nThis Reptile non seulement ressemblait étroitement à un dauphin, mais était également vivipare. \ N \ n"
 dubois.2021_ichthyostega: "#T ichthyostega#!\nA lien manquant possible entre les poissons et les tétrapodes. \ N \ n"
 dubois.2021_megatherium: "#T Megatherium#!\nA paresseuse du sol géante. Malheureux une espèce éteinte aussi. \ N \ n"
 dubois.2021_pterodactylus: "#T Pterodactylus#!\nA Petit ptérodactyle à queue courte qui vivait probablement sur les côtes. \ N \ n"
 dubois.2021_smilodon: "#T Smilodon#!\nOne des prédateurs de dents de sabre les plus connus. \ N \ n"
 dubois.2021_trilobite: "#T Trilobite#!\nThe De nombreuses occurrences et stratification de ces arthropodes en font des fossiles d'index importants pour le Paléozoïque."
 dubois.2041.t: "Os de dinosaure"
 dubois.2041.d: "Ici, les os de dinosaures peuvent être reconstruits à partir de fossiles et les os de dinosaures peuvent être construits dans des squelettes de dinosaures."
 dubois.2041.f: "À partir de cinq os de dinosaures d'une région continentale, un [concept_dubois_paleontologist] peut reconstruire un dinosaure complet. Un paléontologue expérimenté peut également tenter de reconstruire un os de dinosaure à partir de 20 fragments fossiles. Un os de dinosaure ne peut être reconstruit que si au moins un os de dinosaure est disponible pour l'orientation. Pour effectuer l'une des actions, le paléontologue ne doit pas être épuisé ou occupé. Its success depends largely on paleontological experience.\n\n#G [ROOT.Var('dubois_north_american_dinosaur_bone').GetValue]#! North American Dinosaur Bones\n#G [ROOT.Var('dubois_south_american_dinosaur_bone').GetValue]#! South American Dinosaur Bones\n#G [ROOT.Var('dubois_european_dinosaur_bone').GetValue]#! European Dinosaur Bones\n#G #G1#! African Dinosaur Bones\n#G #G4#! Asian Dinosaur Bones\n#G #G7#! OSORES DINOSAURES Australien"
 dubois.2041.g: "Reconstruire un os de dinosaure des fossiles."
 dubois.2042.t: "Bone dinosaure reconstruit"
 dubois.2042.d: "Le professeur [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] a réussi: avec l'aide de ses connaissances scientifiques, il a pu reconstruire un os de dinosaure à partir de fragments fossiles."
 dubois.2042.f: "C'était un jeu de puzzle stimulant, mais qui n'a pas posé de problème pour les compétences superlatives de notre [concept_dubois_paleontologist]. Après quelques mois d'étude et une combinatoire sophistiquée, il a réussi à reconstruire des morceaux d'os à partir de restes fossiles de la taille d'un allumette et donc des parties clés d'une espèce de dinosaure à partir desquelles seuls les os lâches étaient auparavant connus."
 dubois.2042.g: "Splendide!"
 dubois.2043.t: "Professeur perplexe"
 dubois.2043.d: "Malgré des mois de tests, le professeur [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] n'a pas pu produire de résultats en ce qui concerne les matériaux utilisés. Dommage avec les fossiles!"
 dubois.2043.f: "Où appartient cette partie à nouveau? Et ceci? Mais si cette pièce appartenait à celle-ci, l'autre ne pourrait plus tenir. Finalement, le [concept_dubois_paleontologist] ne pouvait plus le supporter. Il avait battu la tête toute la nuit, mais il ne pouvait pas et ne réussirait pas à dériver des connaissances utiles des objets trouvés jusqu'à ce que le squelette de dinosaure devait ressembler une fois."
 dubois.2043.g: "Le professeur a gaspillé nos fossiles!"
 dubois.2044.t: "Squelette parfaitement assemblé"
 dubois.2044.d: "Notre [concept_dubois_paleontologist] a fait un travail incroyable pour assembler le squelette, ajoutant une pièce importante à la collection d'histoire naturelle."
 dubois.2044.f: "Des applaudissements tonitruants ont rempli l'exposition alors que le professeur a présenté le squelette de dinosaure nouvellement assemblé au public. Ce faisant, il a résolu certains problèmes qui occupaient des experts pendant des années et ont montré une approche complètement nouvelle pour interpréter les os du dinosaure. Les paléontologues internationaux présents ont cherché à parler au professeur et souhaitent construire des découvertes similaires dans leurs collections de manière très similaire. Certains sont même allés jusqu'à appeler [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetFullName] un génie du puzzle du puzzle, ayant réussi à faire ce que d'autres avaient pris des décennies pour faire tout de suite."
 dubois.2044.g: "Excellent travail, professeur [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName]."
 dubois.2045.t: "Squelette imparfaitement assemblé"
 dubois.2045.d: "Le professeur [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] a fait de son mieux, mais malheureusement, le squelette de dinosaure assemblé a des erreurs."
 dubois.2045.f: "Lorsque le nouveau squelette de dinosaure a été présenté dans la collection d'histoire naturelle, il y avait des applaudissements polis mais plutôt retenus. Bien que le plus grand paléontologue du pays ait tout essayé, des collègues professionnels ont pu découvrir quelques défauts le jour de la présentation qui a assombri la performance. Néanmoins, le squelette répond aux exigences, au moins en termes généraux, et devrait enrichir l'exposition, même si une retouche sera nécessaire dans les années à venir."
 dubois.2045.g: "Ça marche, n'est-ce pas?"
 dubois.2046.t: "Squelette mal assemblé"
 dubois.2046.d: "Le squelette assemblé par [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetFullName] a laissé des experts ... étonné. Mais pas dans la façon dont la Société paléontologique espérait."
 dubois.2046.f: "Ce fut une journée mémorable, dépassée uniquement par la nature bizarre de l'événement. Le professeur [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] a dévoilé le nouveau squelette de dinosaure sous une bâche avec des gestes dramatiques et des applaudissements tonitruants attendus. Mais au lieu de cela: silence. Les chuchotements ont suivi. Puis: amusement. Les chercheurs impliqués ont souri, d'autres se rassemblaient, jusqu'à ce qu'un collègue, à moitié riant, à moitié incrédule, soit souligné vers la chiméra pavée et a appelé: «Est-ce un dinosaure à trois têtes?"
 dubois.2046.g: "Ce doit être une blague!"
 dubois.2051.t: "Squelettes de dinosaure"
 dubois.2051.d: "Les squelettes de dinosaures sont la fierté de toute collection d'histoire naturelle. Les squelettes parfaitement assemblés ont un effet positif sur notre cote de dinosaure."
 dubois.2051.f: "Notre collection de dinosaures se compose des squelettes suivants: \ n \ n"
