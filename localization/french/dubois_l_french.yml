 dubois.2001.f_paleontologist: "Notre collection est actuellement gérée par notre [concept_dubois_paleontologist] [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetFullName]. Il dispose: \ n \ n#G [ROOT.Var('dubois_fossil').GetValue]#! @dubois_fossile! Fossiles \ n \ n#G [ROOT.Var('dubois_special_fossil').GetValue]#! @dubois_special_fossil! Fossiles spéciaux. \ N \ n#G [ROOT.Var('dubois_human_fossil').GetValue]#! @dubois_human_fossile! Fossiles humains \ n \ n#G [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetFullName]2#! @dubois_dinosaur_bone! Dinosaur Bones \ n \ n#G [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetFullName]5#! @dubois_dinosaur_skeleton! Squelettes de dinosaures \ n \ nour [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetFullName]7 Rating Dinosaur#! comme une note pour tous nos squelettes de dinosaures affichés est [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetFullName]9."
 dubois.2001.f_no_paleontologist: "Notre collection est actuellement gérée par #R Personne #!. IT Fonctionne: \ n \ n#G [ROOT.Var('dubois_fossil').GetValue]#! @dubois_fossile! Fossiles \ n \ n#G [ROOT.Var('dubois_special_fossil').GetValue]#! @dubois_special_fossil! Fossiles spéciaux. \ N \ n#G [ROOT.Var('dubois_human_fossil').GetValue]#! @dubois_human_fossile! Fossiles humains \ n \ n#G #!.2#! @dubois_dinosaur_bone! Dinosaur Bones \ n \ n#G #!.5#! @dubois_dinosaur_skeleton! Squelettes de dinosaures \ n \ nour #!.7 Rating Dinosaur#! comme une note pour tous nos squelettes de dinosaures affichés est #!.9."
