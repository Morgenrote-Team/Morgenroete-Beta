 ask_for_zoo_animal_proposal_notification_desc: "[INITIATOR_COUNTRY.GetName] has expressed interest in procuring the [concept_dubois_zoo_animal] from our zoological collection for their menagerie."
 smuggle_zoo_animal: "Animal du zoo en contrebande"
 smuggle_zoo_animal_desc: "Des circonstances convaincantes - telles que des relations hostiles - peuvent rendre nécessaire qu'un animal [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animal$')] soit transféré de toute urgence à notre zoo en utilisant des «mesures spéciales»."
