 dubois.1061.t: "Les enclos sud-américains"
 dubois.1061.d: "L'enceinte sud-américaine a offert divers habitats très divers. Des forêts tropicales des tropicaux aux zones plus sèches, aux énormes rochers et à la Pampa."
