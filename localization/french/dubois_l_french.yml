 dubois.35.t: "Animal s'échappe!"
 dubois.35.d: "Lorsque l'équipe de safari essaie de suivre l'animal, elle s'enfuit soudainement - les assistants du professeur [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] risquent d'être secoués!"
 dubois.35.f: "\"Nous sommes encore loin d'avoir reconnu la vie animale, et nous étudions toujours les animaux dans le but de nous connaître.\" -Alfred Edmund Brehm"
 dubois.35.g: "Il n'y a rien que nous puissions faire ..."
 dubois.36.t: "Attcks d'animaux!"
 dubois.36.d: "Lorsque l'équipe de safari a voulu installer les pièges, ils ont surpris l'animal - qui a ensuite fait l'attaque!"
 dubois.36.f: "«Il est faux de dire que l'éléphant est un animal irritable. Sa nature est douce et calme. Il vit dans l'amitié et la paix avec chaque créature. -Alfred Edmund Brehm"
 dubois.36.g: "Fuir, vous imbéciles!"
 dubois.36.h: "Disposez les pièges de toute façon!"
 dubois.36.i: "Notre naturaliste a tout sous contrôle."
 dubois.37.t: "Accident de safari"
 dubois.37.d: "Sans préoccupation, l'équipe de safari a gâché le mauvais animal. Il a brisé tous les pièges, blessé des assistants, puis s'est enfui. Des semaines de travail ont été détruites en quelques heures. Le professeur [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] a dû annuler le safari à cause de cela."
 dubois.37.f: "\"Si j'ai déjà vu de la magie, elle a été en Afrique.\" -Ernest Hemingway"
 dubois.37.g: "Horrible!"
 dubois.36.success_tt: "L'équipe de safari définit toujours ses pièges."
 dubois.36.fail_tt: "Un grave accident conduit le safari annulé prématurément."
 dubois_safari_zoologist_tt: "Cela est possible car notre naturaliste a le trait zoologiste."
 dubois.38.t: "Extras de safari"
 dubois.38.d: "Le progrès technologique révolutionne également safari, que ce soit sous la forme de nouvelles armes ou véhicules."
 dubois.38.f: "«Je n'ai jamais connu une matinée en Afrique quand je me suis réveillé que je n'étais pas content. -Ernest Hemingway"
 dubois.38.machine_guns_tt: "Avec l'invention de la mitrailleuse, notre équipe est largement supérieure aux menaces humaines et animales."
 dubois.38.combustion_engine_tt: "Avec l'invention du moteur de combustion, nous pouvons facilement rattraper n'importe quel animal."
 dubois.38.g: "Cela donne «Heia Safari! un tout nouveau sens."
 dubois.40.d: "À la fin d'une recherche infructueuse qui n'a apporté que des difficultés, le professeur [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] abandonne et revient à [ROOT.GetCountry.GetNameNoFlag] avec son équipe."
