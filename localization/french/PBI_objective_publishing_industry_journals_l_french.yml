 pbi_je_objective_the_power_of_photography: "Le pouvoir de la photographie"
 pbi_je_objective_the_power_of_photography_status: "Promouvoir les photographes dans le pays"
 pbi_je_objective_the_power_of_photography_reason: "'Je voulais montrer ce qui devait être corrigé.\nJe voulais montrer les choses qui devaient être appréciées.'\nLewis Hine"
 pbi_je_objective_bestseller: "Un roman de journal populaire"
 pbi_je_objective_bestseller_reason: "« Comme chacun le sait, l'activité spéculative ignore peu ou rien de la valeur spirituelle des biens vendus. Tant que les marchandises se vendent bien et que les affaires se portent bien, peu importe que la santé publique en soit améliorée ou altérée. De par sa nature, la spéculation est aveugle et insensible, vendant de l'opium aux Chinois et des romans aux Français.'\nMembre de la Chambre des députés française"
 pbi_je_objective_bestseller_flag_character_in_writing: "Il y a un [THIS.GetCountry.GetName] [concept_character] présent qui écrit un roman en série"
 pbi_je_objective_bestseller_flag_not_character_in_writing: "Il n'y a pas de [THIS.GetCountry.GetName] [concept_character] présent qui écrit un roman en série"
 pbi_je_objective_bestseller_goal: "J'ai fini le roman"
 pbi_je_objective_from_the_battlefield: "Du champ de bataille"
 pbi_je_objective_from_the_battlefield_status: "Les journaux renforcent l'esprit de guerre du public"
 pbi_je_objective_from_the_battlefield_reason: "« À 11 h 35, pas un seul soldat britannique, à l'exception des morts et des mourants, n'a été laissé devant ces foutus canons moscovites… »\nWilliam Howard Russell (La charge de la brigade légère)"
 pbi_je_objective_from_the_battlefield_goal: "Un certain laps de temps s'écoule pendant que le [concept_front] hors du pays est maintenu"
 pbi_je_objective_bestseller_status: "Notre auteur écrit sans relâche une suite."