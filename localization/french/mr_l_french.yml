 je_mr_archaeology: "Archéologie"
 je_mr_archaeology_reason: "Le XIXe siècle et le début du XXe siècle ont vu un développement rapide dans le domaine de la recherche sur l'Antiquité : de la recherche de trésors à la science sérieuse. Les fouilles de Troie par Heinrich Schliemann et la découverte du tombeau de Toutankhamon par Howard Carter ne sont que deux des moments forts les plus célèbres de cette époque. Dans le même temps, ils montrent que non seulement la soif scientifique, mais aussi le prestige national ont joué un rôle important dans la récupération d’objets de valeur. Avec le déchiffrement (presque) complet des hiéroglyphes égyptiens par Karl Richard Lepsius en 1837, cette nouvelle ère allait commencer."
 mr_romantic_composer_button: "Embaucher un nouveau [concept_elgar_composer] (Romantisme)"
 mr_composer_button_desc: "Contrairement aux [Concept('concept_elgar_great_composer','$concept_elgar_great_composers$')], les [Concept('concept_elgar_composer','$concept_elgar_composers$')] ordinaires sont responsables des opérations quotidiennes. Ils peuvent être embauchés comme chefs d’orchestre et donner à leur pays un bonus passif [concept_elgar_musical_tradition]. Un compositeur peut être engagé trois fois par jeu, ce qui nécessite des recherches sur une technologie spécifique (Romantisme, Irrationalisme, Néoclassicisme/Nouvelle Objectivité/Art Déco). Un pays ne peut soutenir qu'un seul compositeur ordinaire, et un investissement de dix ans dans la culture musicale du pays est nécessaire."
 mr_wagnerian_composer_button: "Embaucher un nouveau [concept_elgar_composer] (Irrationalisme)"
 mr_modern_composer_button: "Embaucher un nouveau [concept_elgar_composer] (moderne)"
 mr_appoint_conductor_button: "Nommer un chef d'orchestre"
 mr_appoint_conductor_button_desc: "Les chefs d'orchestre dirigent le secteur musical national, en particulier le premier [Concept('concept_elgar_opera','$concept_elgar_opera_house$')] d'un pays. A l'opéra, on peut leur confier une tâche précise pendant trois ans : diriger, composer ou faire une tournée. De cette manière, ils sont similaires au [Concept('concept_elgar_great_composer','$concept_elgar_great_composers$')], bien que leurs revenus pour le [concept_elgar_musical_tradition] soient maintenus dans des limites gérables."
 mr_national_conservatory_button: "Fonder un Conservatoire National"
 mr_national_conservatory_button_desc: "\"Avec un Conservatoire, il y a une chance que des personnages ayant le trait Compositeur apparaissent au fil du temps sans avoir à les embaucher. La chance est très faible, mais elle est là. La probabilité peut être augmentée avec une école de ballet dans l'un de nos opéras. écoles."
 mr_santa_cecilia_button: "Faire de Santa Cecilia une Académie"
 mr_santa_cecilia_button_desc: "L'Académie de Santa Cecilia a été fondée par la bulle papale « Ratione congruit » de Sixte Quint en 1585 sous la forme d'une congrégation. En 1838, la Congrégation de Sainte-Cécile fut officiellement nommée Académie puis Académie pontificale. Ses membres comprenaient alors Luigi Cherubini, Mercadante, Donizetti, Rossini, Paganini, Auber, Liszt, Mendelssohn, Berlioz, Gounod et Meyerbeer. L'un de ses membres honoraires était la reine Victoria. Dans l'Italie unie, il est devenu un conservatoire de premier plan."
 mr_leipzig_conservatory_button: "Fondé le Conservatoire de Leipzig"
 mr_leipzig_conservatory_button_desc: "Leipzig, ville musicale traditionnelle, où Jean-Sébastien Bach était déjà actif, offrait au début du XIXe siècle des conditions optimales pour la création d'une fabrique de talents musicaux et académiques. Quatre citoyens engagés de la ville, à savoir l'avocat Heinrich Conrad Schleinitz (deuxième directeur), le directeur du district de Leipzig Johann Paul von Falkenstein et le conseiller de la cour royale de Saxe Johann Georg Keil ainsi que le maître de chapelle du Gewandhaus Felix Mendelssohn Bartholdy ont mis en pratique les idées précédentes. pratique."
 mr_petrograd_conservatory_button: "J'ai fondé le Conservatoire de Petrograd"
 mr_petrograd_conservatory_button_desc: "À l'initiative de la grande-duchesse Elena Pavlovna, d'Anton Rubinstein, d'Andrei Nikolaïevitch Markovitch et d'autres personnalités de la société et de la vie musicale, la Société musicale russe a été fondée, à partir des classes de musique de laquelle a été fondé le premier conservatoire de Russie. Anton Rubinstein fut le premier directeur du conservatoire et professeur de piano. Le premier diplômé à y terminer ses études de composition fut Peter Tchaïkovski. Nikolaï Andreïevitch Rimski-Korsakov a joué un rôle particulièrement influent en tant que professeur de composition et d'instrumentation et chef de la classe d'orchestre."
 mr_bayreuth_button: "Créer le Festival Richard Wagner"
 mr_bayreuth_button_desc: "Richard Wagner rêve depuis longtemps d’avoir sa propre salle des fêtes où sont jouées chaque année ses plus grandes œuvres. Un tel lieu pourrait rapidement devenir un lieu de pèlerinage pour tous les amateurs de musique et constituerait un mémorial durable et vivant en son honneur."
