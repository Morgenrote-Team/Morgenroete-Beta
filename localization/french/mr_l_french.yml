 objective_thriving_culture_name_BAV: "Bavière"
 objective_thriving_culture_desc_BAV: "Culturellement, la Bavière a toujours su rivaliser avec les grands Länder allemands. Le XIXe siècle est une époque où l'art et l'architecture sont en plein essor à Munich. Outre Walhalla et Neuschwanstein, la Bavière est également le lieu où l'Archaeopteryx a été découvert, le siège de la Sécession munichoise et le lieu de naissance du Spitzweg. En tant que puissance moyenne allemande, la Bavière peut-elle se défendre contre ses grands voisins en s’appuyant moins sur l’armée et davantage sur la science et l’art ?"
 objective_thriving_culture_name_MEX: "Mexique"
 objective_thriving_culture_desc_MEX: "À première vue, le Mexique ne semble pas être le premier choix lorsqu’il s’agit de faire prospérer une culture. Mais sa riche histoire archéologique est prometteuse. En théorie, le Mexique pourrait même réaliser une percée dans le passage du Nord-Ouest. Si le pays, secoué par les crises, retrouve l'harmonie, il peut couronner esthétiquement sa réussite avec le Palacio de Bellas Artes."
 je_mr_morgenrote_introduction_reason: "[concept_morgenroete] est un mod axé sur la science, les arts et la culture. Il comprend de nombreuses nouvelles mécaniques et beaucoup de contenu. Pour avoir un aperçu général du mod, essayez d'utiliser les concepts soit en allant dans le menu et sur Vickypedia soit en survolant ce [Concept('concept_morgenroete','$concept_morgenroete_concept$')].\n\nPour accéder à la plupart du contenu de Morgenröte, cliquez soit sur le bouton dans cette entrée de journal, soit sur celui proche de la barre latérale. Le bouton dans cette entrée de journal devrait toujours fonctionner."
 je_objective_cradle_of_culture_tt: "Soyez la première nation à inventer le #ORANGE Impressionnisme#!, #ORANGE Expressionnisme#! ou #ORANGE Art Nouveau#!."
 mr_divider_for_je: "@divider_start!@divider_mid!@divider_mid!@divider_mid!@divider_mid!@divider_mid!@divider_end!"
 objective_thriving_culture_name_SWE: "Suède"
 objective_thriving_culture_desc_SWE: "Au cours des 100 dernières années, la Suède est devenue une nation scientifique de premier plan, apportant des contributions significatives à la science, notamment un système de dénomination des organismes, l'échelle de température Celsius et un système de symboles d'éléments chimiques. \n La Suède peut-elle maintenir sa position à l'avant-garde de la science, ou est-il temps de réorienter l'attention vers les activités culturelles, en encourageant les écrivains et les compositeurs ?"
