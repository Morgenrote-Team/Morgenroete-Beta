 notification_vikelas_autorace_grand_prix_first_place_notification_desc: "Notre [concept_vikelas_racer] a remporté la première place dans une course de Grand Prix et gagne #G 40#! d'expérience. Notre [concept_vikelas_mechanic] gagne #G 20#! d'expérience. Nous gagnons #G 50#! @vikelas_mechanical_innovation! [Concept('concept_vikelas_mechanic','$concept_vikelas_mechanical_innovation$')]." #NT!
 notification_vikelas_autorace_grand_prix_second_place_notification_name: "Course du Grand Prix : Deuxième place" #NT!
 notification_vikelas_autorace_grand_prix_second_place_notification_desc: "Notre [concept_vikelas_racer] a pris la deuxième place dans une course de Grand Prix et gagne #G 30#! d'expérience. Notre [concept_vikelas_mechanic] gagne #G 15#! d'expérience. Nous gagnons #G 40#! @vikelas_mechanical_innovation! [Concept('concept_vikelas_mechanic','$concept_vikelas_mechanical_innovation$')]." #NT!
 notification_vikelas_autorace_grand_prix_third_place_notification_name: "Course du Grand Prix : Troisième place" #NT!
 notification_vikelas_autorace_grand_prix_third_place_notification_desc: "Notre [concept_vikelas_racer] a pris la troisième place dans une course de Grand Prix et gagne #G 20#! d'expérience. Notre [concept_vikelas_mechanic] gagne #G 10#! d'expérience. Nous gagnons #G 30#! @vikelas_mechanical_innovation! [Concept('concept_vikelas_mechanic','$concept_vikelas_mechanical_innovation$')]." #NT!
 notification_vikelas_autorace_grand_prix_information_place_notification_name: "Course du Grand Prix : informations" #NT!
 notification_vikelas_autorace_grand_prix_information_place_notification_desc: "Notre [concept_vikelas_racer] n'a pas pu obtenir l'une des trois premières places, mais est arrivé en toute sécurité et gagne #G 10#! d'expérience. Notre [concept_vikelas_mechanic] gagne #G 5#! d'expérience. Nous gagnons #G 10#! @vikelas_mechanical_innovation! [Concept('concept_vikelas_mechanic','$concept_vikelas_mechanical_innovation$')]." #NT!
  
 notification_vikelas_autorace_endurance_race_first_place_notification_name: "Course d'endurance : Victoire" #NT!
 notification_vikelas_autorace_endurance_race_first_place_notification_desc: "Notre [concept_vikelas_racer] a pris la première place dans une course d'endurance et gagne #G 50#! d'expérience. Notre [concept_vikelas_mechanic] gagne #G 25#! d'expérience. Nous gagnons #G 100#! @vikelas_mechanical_innovation! [Concept('concept_vikelas_mechanic','$concept_vikelas_mechanical_innovation$')]." #NT!
 notification_vikelas_autorace_endurance_race_information_place_notification_name: "Course d'endurance : informations" #NT!
