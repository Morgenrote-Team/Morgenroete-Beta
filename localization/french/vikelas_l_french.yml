 vikelas.583.d_level_3: "[ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName] a amélioré la carrosserie. La voiture de course a maintenant une #V carrosserie en acier embouti#!. La nouvelle voiture porte maintenant le nom [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')] [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]." #NT!
