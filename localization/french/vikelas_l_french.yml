 vikelas_autoracing_found_automobile_club_button: "Création d'un club automobile"
 vikelas_autoracing_found_automobile_club_button_desc: "La création d’un club automobile est la première étape vers la construction d’autres installations essentielles au sport automobile."
 vikelas_autoracing_long_distance_button: "Organiser une course d'endurance"
 vikelas_autoracing_long_distance_button_desc: "Les courses d'endurance, souvent disputées de ville à ville, étaient la norme aux débuts de la course automobile et se sont poursuivies jusqu'au milieu du XXe siècle. En Italie, des courses comme la Targa Florio ou la Mille Miglia en sont les exemples les plus connus. Elles mettaient l'homme et la machine à rude épreuve et ont longtemps été considérées comme les véritables courses automobiles nationales."
 vikelas_autoracing_found_grand_prix_button: "Trouvé Grand Prix Racing"
 vikelas_autoracing_found_grand_prix_button_desc: "En 1906, le premier Grand Prix officiel de l'histoire de l'automobile est organisé avec la course du Grand Prix de l'ACF. Quel que soit le pays d'origine, jusqu'à trois voitures de course par constructeur automobile sont homologuées, comme le demandaient à l'origine les représentants de l'industrie française. Fidèle à son statut de plus importante de toutes les compétitions, la course se déroule sur une distance de plus de 1200 km et sur deux jours consécutifs. En 1925, à l'instigation de l'Automobile Club d'Italie, l'introduction d'un championnat du monde officiel est finalement annoncée. Les trois courses officielles du Grand Prix de la saison (France, Italie et Belgique) sont désignées comme courses, ainsi qu'Indianapolis comme l'événement automobile américain le plus important."
 vikelas_autoracing_race_track_button: "Construire une piste de course"
 vikelas_autoracing_race_track_button_desc: "Avec les Grands Prix, les circuits fixes deviennent de plus en plus la norme pour les courses automobiles. Un circuit dédié permettrait non seulement de centraliser les événements de course internationaux en un seul endroit, mais en tant que piste d'essai, il offrirait également à nos pilotes de course un bonus d'expérience chaque année."
