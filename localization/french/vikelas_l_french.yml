 vikelas.571.t: "Les premières 24 Heures du Mans"
 vikelas.571.d: "En 1923, ont lieu les premières 24 Heures du Mans, devenant rapidement l'un des événements les plus prestigieux du sport automobile, attirant pilotes et constructeurs du monde entier."
 vikelas.571.f: "Les 26 et 27 mai 1923, se déroulent les premières 24 Heures du Mans, organisées par l'Automobile Club de l'Ouest. Le circuit sarthois de 17,3 kilomètres accueille 33 véhicules. Les conditions sont difficiles : pluie, routes boueuses, parcours traversant la ville du Mans et les routes de campagne environnantes. La victoire revient à André Lagache et René Léonard, au volant d'une Chenard & Walcker Sport, qui parcourent une distance de 2 209 kilomètres en 24 heures. Cette course marque le début d'une tradition qui continue de célébrer l'innovation et l'endurance dans le sport automobile."
 vikelas.571.g: "24 heures ? C'est fou !"
 vikelas.572.t: "La naissance de la Targa Florio"
 vikelas.572.d: "En 1906, la Targa Florio est créée, une course spectaculaire qui se déroule sur les routes sinueuses de Sicile. Organisée par Vincenzo Florio, elle place la région au centre du sport automobile mondial."
 vikelas.572.f: "Le 6 mai 1906, la première Targa Florio a eu lieu, une course longue distance qui transformait les routes de montagne escarpées et les villages pittoresques de Sicile en un circuit de course exigeant. Organisée par Vincenzo Florio, un passionné de sport automobile, l'événement concrétisait sa vision d'un défi sportif. Le circuit s'étendait sur 446 kilomètres, divisés en trois tours de 148 kilomètres chacun. La victoire est revenue à Alessandro Cagno, au volant d'une Itala, qui a franchi la ligne d'arrivée à une vitesse moyenne de 46,8 km/h. La Targa Florio est rapidement devenue un symbole de courage, d'habileté et de passion pour la vitesse."
 vikelas.572.g: "La Targa Florio établit une tradition"
 vikelas.573.t: "Le premier Semmering Berg-Rennen"
 vikelas.573.d: "En 1899, la première course de côte de Semmering a été organisée, testant les limites de la technologie automobile et des compétences de conduite. Cet événement a marqué une étape importante dans l'histoire du sport automobile."
 vikelas.573.f: "Le 27 août 1899, la première course de côte de Semmering fut organisée par l'Automobile Club autrichien. Le parcours de 9,8 kilomètres, reliant Klamm am Semmering au col, poussa les premières automobiles et leurs pilotes dans leurs retranchements. Avec des pentes allant jusqu'à 7 % et des virages serrés, la course était un test de technique et de courage. La victoire revint au comte Jenő Zichy, au volant d'une automobile Mors, qui termina le parcours à une vitesse moyenne de 22,2 km/h. La course attira un large public et posa les bases de la tradition des courses de côte en Europe."
 vikelas.573.g: "L'ascension de la colline fascine les masses."
