 vikelas_new_body_tt: "Le corps actuel sera modernisé."
 vikelas.584.t: "Le moteur V"
 vikelas.584.d: "Notre ingénieur Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] a fait une proposition révolutionnaire sur ce à quoi pourrait ressembler un nouveau moteur de course et a contacté le mécanicien [ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName]."
 vikelas.584.f: "Un moteur en V est un type de moteur à piston alternatif à plusieurs cylindres. Ceux-ci sont divisés en deux rangées de cylindres qui sont inclinées l'une par rapport à l'autre. Les moteurs en V sont largement utilisés, en particulier avec un nombre élevé de cylindres et un espace d'installation limité. La conception compacte permet d'économiser du matériau et donc du poids. Le premier moteur en V, un bicylindre en V à deux cylindres, a été conçu par Wilhelm Maybach et utilisé dans l'automobile Daimler Stahlradwagen de 1889. Le premier moteur V8 a été produit en 1903, sous la forme du moteur Antoinette conçu par Léon Levavasseur pour les bateaux de course et les avions."
 vikelas.584.g: "Heureka !"
 vikelas.585.t: "Carburant amélioré"
 vikelas.585.d: "Notre chimiste Dr. [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] a perfectionné le carburant pour moteurs à combustion interne de telle manière qu'il pourrait jouer un rôle crucial dans l'augmentation de l'efficacité et des performances des voitures de course. [ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName] a manifesté un grand intérêt pour les essais."
 vikelas.585.f: "Les premières décennies de l'essence ont été extrêmement changeantes. De nombreuses entreprises ont eu tendance à étirer le carburant ou à le mélanger à d'autres carburants purs. Nikolaus August Otto utilisait déjà de l'alcool rectifié. Dans certains pays, la pénurie de pétrole a conduit au développement d'alternatives - ou à une utilisation plus efficace de la quantité de carburant disponible. Dans les courses, des carburants et des huiles lubrifiantes améliorés ont été utilisés pour garantir une performance de conduite optimisée."
 vikelas.585.g: "Heureka !"
 vikelas.586.t: "Forces aérodynamiques"
 vikelas.586.d: "Notre physicien Dr. [ROOT.Var('curie_physicistvar').GetCharacter.GetLastName] a décrit quelques calculs sur les forces aérodynamiques qui pourraient être utiles pour la construction de véhicules. Le mécanicien automobile [ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName] a reçu une copie de l'article."
 vikelas.586.f: "« L'aérodynamique est pour ceux qui ne savent pas construire des moteurs. » - Enzo Ferrari"
 vikelas.586.g: "Heureka !"
 vikelas.590.t: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] est désormais un coureur célèbre !"
