 vikelas.501.t: "Le Club Automobile [ROOT.GetCountry.GetAdjectiveNoFormatting]"
 vikelas.501.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] est considéré comme un conducteur passionné et a fondé un club automobile avec des personnes partageant les mêmes idées pour marquer cet événement. Cela vise à renforcer l'industrie automobile nationale et à organiser des événements automobiles nationaux."
 vikelas.501.f: "Dès le milieu des années 1890, l'Automobile Club de France (ACF), fondé en 1895 en tant que premier club automobile au monde, organisait une fois par an une course qui représentait le point culminant de la saison. Il s'agissait de courses dites « de ville à ville » sur des routes de campagne publiques, dans lesquelles les participants étaient envoyés individuellement à intervalles réguliers. L'un des déclencheurs de la fondation de l'ACF fut la relégation d'Albert de Dion de la course Paris-Rouen en 1894. Dans les années suivantes, le développement rapide a commencé, avec des véhicules toujours plus puissants augmentant considérablement les dangers du sport automobile. L'ACF a donc mis en œuvre pour la première fois en 1901 des règles qui peuvent être considérées comme les premières réglementations du sport automobile au monde. Une innovation centrale était la division en catégories qui devaient s'appliquer à toutes les épreuves soutenues par l'ACF. La limitation de poids qui en résultait devait dans un premier temps contribuer à réduire le nombre immense de défauts de pneus dus à une surcharge."
 vikelas.501.g: "Un sport plein de sensations fortes !"
 vikelas.502.t: "Première course du Grand Prix"
 vikelas.502.d: "Le sport automobile prend un tournant révolutionnaire : avec les Grands Prix, des courses internationales vont se succéder dans toutes les nations passionnées de sport automobile. Un championnat international est ainsi né. [SCOPE.sCountry('vikelas_gp_founder_scope').GetName] a invité toutes les nations dotées d'un Automobile Club à participer à leur premier Grand Prix l'année prochaine."
 vikelas.502.f: "Les courses annuelles de la Coupe Gordon Bennett furent la première tentative d'organiser un championnat du monde automobile de 1900 à 1905. Compte tenu de l'augmentation constante des vitesses, l'ACF édicta pour la première fois en 1902 un règlement technique sous la forme d'une formule de course, que les voitures participantes devaient respecter. Néanmoins, la fréquence des accidents continua d'augmenter, de sorte qu'à partir de 1903, seules des courses sur circuit pouvaient être organisées sur des circuits fermés. En tant que successeur des courses Gordon Bennett, la course principale organisée par l'ACF se déroula pour la première fois en 1906 sous le nom de Grand Prix. Le premier vainqueur du Grand Prix de l'histoire fut le pilote hongrois Ferenc Szisz sur une Renault."
 vikelas.502.g: "Il y a donc quelque chose à gagner ?"
 vikelas.503.t: "Association Internationale des Automobile Clubs Reconnus"
 vikelas.503.d: "Aujourd'hui, l'Association Internationale de l'Automobile a été fondée en 1900. Son nom complet est Association Internationale des Automobile Clubs Reconnus (AIACR)."
 vikelas.503.f: "Pour que les constructeurs automobiles puissent participer à toutes les courses internationales, il était nécessaire de faire en sorte que les règlements techniques et sportifs, jusqu'alors définis de manière indépendante par l'Automobile Club français pour ses courses sous la forme de la formule du Grand Prix, soient réglementés par une Association Automobile Internationale. L'association a été fondée le 20 juin 1904 à Paris sous le nom d'Association Internationale des Automobile Clubs Reconnus (AIACR), après que la décision de la fonder eut été prise quelques jours plus tôt par les clubs automobiles des plus importantes nations de course dans le cadre de la Coupe Gordon Bennett à Bad Homburg. L'AIACR devait se rebaptiser FIA après la Seconde Guerre mondiale."
 vikelas.503.g: "Désormais, la course automobile est internationale !"
 vikelas.504.t: "Nouveau circuit de course du Grand Prix"
 vikelas.504.d: "Un autre membre de l'AIACR a construit un circuit officiel de Grand Prix. Il y a maintenant #G [GetGlobalVariable('vikelas_num_grand_prix_tracks_global_var').GetValue]#! #V circuits de Grand Prix#! dans le calendrier annuel des courses."
 vikelas.504.f: "« Les courses automobiles, la tauromachie et l'alpinisme sont les seuls vrais sports… tous les autres sont des jeux. » - Ernest Hemingway"
 vikelas.504.g: "Réservez les places VIP dans les tribunes."
 vikelas.505.t: "Emplacement du constructeur de voitures de course"
 vikelas.505.d: "Avec [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')], [GetPlayer.GetName] a sa première équipe de course de série. L'usine automobile de [SCOPE.sState('vikelas_team_state').GetName] bénéficie désormais d'une forte demande en raison de la renommée de la marque."
 vikelas.505.f: "Avec le lent développement des pilotes individuels vers les équipes de course professionnelles avec pilotes d'usine, le sport automobile a changé de manière permanente. Les amateurs avec des voitures construites par leurs soins sont devenus rares. Même s'il arrivait encore que des aristocrates excentriques avec des licences d'autres constructeurs automobiles recherchent le frisson, le développement automobile est devenu le véritable centre du sport automobile."
 vikelas.505.g: "Nous pouvons désormais concevoir nos propres voitures de course !"
 vikelas.506.t: "Mécanicien de voitures de course"
 vikelas.506.d: "L'ingénieur en chef Dr. [SCOPE.sCharacter('gaudi_engineer_scope').GetLastName] a sélectionné un excellent assistant de l'équipe [SCOPE.sCharacter('gaudi_engineer_scope').GetHerHis] qui pourrait agir en tant que mécanicien pour la nouvelle équipe de course fondée : [SCOPE.sCharacter('vikelas_new_mechanic_scope').GetFullName]. La spécialisation [SCOPE.sCharacter('vikelas_new_mechanic_scope').GetHerHis] est dans le domaine de..."
 vikelas.506.f: "Les mécaniciens peuvent améliorer trois domaines d'une voiture : le moteur, la sécurité et la carrosserie. La spécialisation permet de moderniser un domaine spécifique deux fois plus rapidement. En principe, mais pas toujours, il est vrai que les moteurs augmentent la fiabilité (et la vitesse), les extensions de sécurité augmentent la sécurité et les carrosseries augmentent la vitesse (et la sécurité)."
 vikelas.506.h: "Moteur."
 vikelas.506.i: "Sécurité."
 vikelas.506.j: "Corps."
 vikelas.511.t: "La grande course [SCOPE.sState('vikelas_city_race_start_state').GetCityHubName]-[SCOPE.sState('vikelas_city_race_goal_state').GetCityHubName]"
 vikelas.511.d: "Le [ROOT.GetCountry.GetCapital.GetCityHubName] [SCOPE.GetRootScope.GetCountry.GetCustom('generic_newspaper_type')] a annoncé dans son édition hebdomadaire actuelle une grande course automobile. La course de ville à ville est prévue du [SCOPE.sState('vikelas_city_race_start_state').GetCityHubName] au [SCOPE.sState('vikelas_city_race_goal_state').GetCityHubName]. De nombreux pilotes de course étrangers sont également attendus."
 vikelas.511.f: "Les débuts du sport automobile furent marqués par des gentlemen drivers qui participaient à des courses de ville en ville dans des voitures construites par leurs soins, accompagnés de leur mécanicien, qui faisait souvent office de chauffeur. Ce format de course était souvent annoncé, organisé et soutenu par les journaux et les clubs automobiles. Comme les mécaniciens étaient souvent encore en bas âge, il était plus important d'arriver à destination. Des accidents mortels comme celui de Marcel Renault lors de la course Paris-Madrid signifiaient que cette forme d'organisation ne constituait qu'une phase transitoire dans l'histoire du sport automobile."
 vikelas.511.g: "Préparez-vous à l’événement dans trois mois."
 vikelas.512.t: "Participation à la course"
 vikelas.512.d: "La prochaine course [SCOPE.sState('vikelas_city_race_start_state').GetCityHubName]-[SCOPE.sState('vikelas_city_race_goal_state').GetCityHubName] en [SCOPE.sCountry('vikelas_race_country').GetName] a donné lieu à des spéculations quant à savoir si le meilleur coureur de notre pays, [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName], y participera également."
 vikelas.512.g: "Une excellente opportunité !"
 vikelas.512.h: "C'est trop dangereux."
 vikelas.512.tt: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] se préparera pour la course dans trois mois."
 vikelas.513.t: "Trajet gratuit"
 vikelas.513.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName] a de la chance : [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe] peut donner le maximum sur la route ouverte. Le moteur s'arrête, les virages sont fluides. Les meilleures exigences pour un pilote de course."
 vikelas.513.f: "« Quand la vitesse entre dans le sang, il faut conduire pour vivre. » - Rudolf Carraciola"
 vikelas.513.g: "Fantastique!"
 vikelas.514.t: "Une nature magnifique et intacte"
 vikelas.514.d: "Alors que [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe] se déplace de ville en ville, [ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName] remarque la nature intacte de la région traversée par [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe]. Peut-être [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe] devrait-il emporter un souvenir avec lui ?"
 vikelas.514.f: "Au début du sport automobile, les paysages sauvages et intacts constituaient un attrait particulier pour le pilote, ce qui posait des défis. Les premiers circuits de course étaient donc également critiqués car ils exigeaient moins de compétences de conduite et d'adaptation. Bien entendu, certaines vallées, plages et zones montagneuses isolées pouvaient réserver des surprises."
 vikelas.514.g: "Nous avons une course à gagner !"
 vikelas.514.h: "Ramassez quelques plantes."
 vikelas.514.i: "Ramassez quelques pierres."
 vikelas.515.t: "Du sucre dans le réservoir"
 vikelas.515.d: "Lors d'un bref arrêt, [ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName] remarque que la voiture du concurrent [ROOT.Var('vikelas_racer_var').GetCharacter.GetHerHis] [SCOPE.sCharacter('vikelas_racer_2_scope').GetLastName] se trouve également à proximité. Apparemment, la voiture passe complètement inaperçue."
 vikelas.515.f: "« Si vous ne trichez pas, vous n’essayez pas. »"
 vikelas.515.g: "Une douce revanche."
 vikelas.516.t: "Un peu d'aide pour un ami ?"
 vikelas.516.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName] est actuellement en bonne position, mais il voit la voiture fumante de [SCOPE.sCharacter('vikelas_racer_2_scope').GetLastName] sur le bord de la route. Peut-être que [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe] devrait vérifier si tout va bien ?"
 vikelas.516.f: "Au début des courses, les accidents de la route étaient monnaie courante. Plus tard, même si des commissaires de course étaient présents sur les parcours fermés, une panne pouvait être dangereuse dans les courses de longue distance sans observateur. Dans les années 1930, on a encore vu des loups lors de la Mille Miglia dans les Apennins. C'est pourquoi l'entraide entre collègues de course est souvent naturelle."
 vikelas.516.g: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName] devrait s'arrêter et aider."
 vikelas.516.h: "Haha ! Imbéciles !"
 vikelas.517.t: "Problèmes de moteur"
 vikelas.517.d: "Il se passe quelque chose au niveau du moteur, même [ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName] ne peut l'expliquer. Un diagnostic n'a pas encore été établi. [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe|U] devra peut-être continuer la course à vitesse réduite."
 vikelas.517.f: "Les problèmes de moteur surviennent dans tous les sports mécaniques, à l'époque comme aujourd'hui. De nombreux pilotes ont dû abandonner prématurément une course parce qu'ils étaient en tête. Dans l'état actuel des choses, [ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName] pourrait encore terminer la course, mais seulement s'il ralentissait, ce qui rendrait sa victoire beaucoup plus difficile."
 vikelas.517.g: "Utiliser toutes les mesures de réglage mécanique disponibles."
 vikelas.517.h: "La voiture doit survivre à la course comme ça."
 vikelas.518.t: "Clous"
 vikelas.518.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName] a réussi à se construire une certaine avance sur le reste du peloton. Peut-être que [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe] pourrait améliorer ses chances de victoire et rendre la vie difficile au reste du peloton ?"
 vikelas.518.f: "« Je sais qu'il trichait parce que je trichais et il m'a battu. »"
 vikelas.518.g: "Prends les clous, Muttley."
 vikelas.518.h: "Nous nous abstenons de telles pratiques antisportives."
 vikelas.519.t: "Disqualification"
 vikelas.519.d: "Malheureusement, la mauvaise conduite sportive de [ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName] a été révélée. La commission des courses a donc immédiatement exclu [ROOT.Var('vikelas_racer_var').GetCharacter.GetHerHim] de toute course ultérieure."
 vikelas.519.f: "« Selon le règlement de la course de ville à ville conformément au paragraphe 12, alinéa 6, ligne 9, le participant a enfreint les règles générales et sera donc exclu prématurément. Il n'est pas possible de faire appel. »"
 vikelas.519.g: "Disqualifié ? C'est injuste !"
 vikelas.520.f: "#V Résultats finaux#!\n\nFirst Place : [SCOPE.sCharacter('vikelas_racer_1_scope').GetFullName] sur [SCOPE.sCountry('vikelas_first_winner_scope').GetName]\nDeuxième place : [SCOPE.sCharacter('vikelas_racer_2_scope').GetFullName] sur [SCOPE.sCountry('vikelas_second_winner_scope').GetName]\nTroisième place : [SCOPE.sCharacter('vikelas_racer_3_scope').GetFullName] sur [SCOPE.sCountry('vikelas_third_winner_scope').GetName]"
 vikelas.520.g: "Champagne!"
 vikelas.521.t: "Victoire pour [ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName]"
 vikelas.521.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] a pris la première place dans la course de ville à ville en [SCOPE.sCountry('vikelas_race_country').GetName]. [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe] a conduit un [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')] [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]."
 vikelas.521.g: "Champagne!"
 vikelas.522.t: "2ème place pour [ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName]"
 vikelas.522.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] a pris la deuxième place dans la course de ville à ville en [SCOPE.sCountry('vikelas_race_country').GetName]. [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe] a conduit un [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')] [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]."
 vikelas.522.g: "À la prochaine !"
 vikelas.523.t: "3ème place pour [ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName]"
 vikelas.523.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] a pris la troisième place dans la course de ville à ville en [SCOPE.sCountry('vikelas_race_country').GetName]. [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe] a conduit un [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')] [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]."
 vikelas.524.t: "La course de ville à ville se termine"
 vikelas.524.d: "La grande course de ville à ville du [SCOPE.sCountry('vikelas_race_country').GetName] est terminée et les vainqueurs ont été désignés. Le [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] a conduit un [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')] [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]. Même si nous n'avons pas eu un bon positionnement, au moins la voiture et le pilote sont arrivés sains et saufs."
 vikelas.531.t: "Course d'endurance"
 vikelas.531.d: "[GetPlayer.GetName] a organisé une grande course d'endurance et a invité des coureurs du monde entier à y participer."
 vikelas.531.f: "Les premières courses automobiles du début du XXe siècle étaient des courses de fond avec le plus grand nombre de participants possible. Elles devaient tester la vitesse et la fiabilité des voitures de course. Si la France dominait les courses au début, elle s'est rapidement tournée vers les Grands Prix. Cela ne changeait rien au fait qu'il existait encore d'importantes courses d'endurance internationales. La course la plus traditionnelle était la Targa Florio en Sicile. De 1906 à 1977, elle se déroulait principalement en mai en tant qu'événement international important, parfois avec le statut de Coupe du monde. Après la Targa Florio, les Mille Milles (Mille Miglia) étaient considérées comme un classique parmi les courses sur route (la Carrera Panamericana a été ajoutée dans les années 1950) et la base du terme « Gran Turismo » (GT), qui décrit les voitures de sport de tourisme rapides pour les courses de longue distance, telles que celles développées par Ferrari spécifiquement pour la MM."
 vikelas.531.g: "On se retrouve à la ligne d'arrivée !"
 vikelas.533.t: "Pneus endommagés"
 vikelas.533.d: "En pleine course, un pneu éclaté entraîne un arrêt brutal pour [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName]. Malgré l'incident, le pilote est sorti indemne et impressionné par son sang-froid, mais a perdu un temps important."
 vikelas.533.f: "Les Mille Miglia de 1931 ont été marquées par une usure massive des pneus. Avant d'arriver à Rome, Arcangeli a dû changer un pneu neuf fois. Nuvolari a également eu plusieurs crevaisons, mais il a quand même devancé Caracciola de deux minutes à Rome. Au retour vers l'Adriatique, les Alfa Romeo ont maintenu leur rythme soutenu malgré les problèmes de pneus. Entre-temps, Borzacchini a mené la compétition avec 18 minutes d'avance. Le long de la côte méditerranéenne au nord, Campari avait quatre minutes d'avance sur Arcangeli, qui était en pleine renaissance. La tête a changé plusieurs fois au sein des Alfa Romeo et les Italiens semblaient avoir tout sous contrôle après les deux tiers de la distance de course. Cela était également dû à un réseau dense de stations-service, qui permettait de nombreux changements de pneus. La décision a été prise dans les 80 derniers kilomètres, lorsque de fortes pluies se sont installées et que les Alfa Romeo ont eu des accidents avec leurs pneus à nouveau usés."
 vikelas.533.g: "Malchance."
 vikelas.534.t: "Le passage à niveau"
 vikelas.534.d: "Alors qu'un autre conducteur poursuit un autre véhicule, un bruit d'avertissement retentit soudainement : une barrière de chemin de fer s'abaisse devant les deux voitures. La voiture qui précède passe à toute vitesse. [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] doit décider s'il doit s'arrêter ou risquer de traverser avant que l'adversaire ne gagne trop d'espace."
 vikelas.534.f: "Les pilotes de la Mille Miglia étaient enclins à des manœuvres audacieuses, comme Hans Hermann, qui participait à la course de 1954, qui conduisit sa voiture sous une barrière de chemin de fer qui se refermait, obligeant lui et son passager à baisser la tête."
 vikelas.534.g: "Prenez le risque !"
 vikelas.534.h: "C'est trop téméraire !"
 vikelas.538.t: "Loups et revolvers"
 vikelas.538.d: "Lors d'une course nocturne en montagne, l'équipe de course sort de la piste. Soudain, un hurlement retentit. Une meute de loups semble rôder dans les environs."
 vikelas.538.f: "« Nous nous sommes retrouvés au milieu d'une tempête de neige et nous avons été poursuivis par des loups. Ils ont cependant été mis en fuite par des coups de feu tirés du revolver que je gardais toujours sous le coussin du siège et par l'arrivée d'un groupe de bandits armés de torches et de fusils. » - Enzo Ferrari"
 vikelas.538.g: "Tuez les loups."
 vikelas.538.h: "Conduisez largement dans la région."
 vikelas.538.i: "Cette découverte est bien plus importante qu’une course stupide."
 vikelas.539.t: "Une voiture de course fonce sur les spectateurs !"
 vikelas.539.d: "Un terrible accident s'est produit lorsqu'une voiture de course a quitté la piste pendant la course et a foncé dans la foule. Le monde du sport automobile est secoué et le débat sur les normes de sécurité reprend de plus belle."
 vikelas.539.f: "Depuis la première édition des Mille Miglia en 1927, l'événement n'avait connu aucun accident catastrophique malgré le grand nombre de spectateurs le long des routes. Le 3 avril 1938, à 16h30, les choses ont changé. Les deux pilotes génois Angelo Mignanego et son copilote Dr. Luigi Bruzzo ont alors pris la route dans leur Lancia Aprilia sur la Viale Berti Pichat à Bologne. À une vitesse d'un peu moins de 100 km/h, Mignanego, inexpérimenté, a perdu le contrôle de la voiture sur les rails du tramway. La Lancia a d'abord percuté un arbre, puis un grand groupe de spectateurs. Si les deux occupants de la voiture sont presque indemnes, dix personnes, dont sept enfants, ont péri dans l'accident. 26 spectateurs ont été blessés, certains grièvement. Une fillette de 12 ans est décédée dans un autre accident à Stanghella."
 vikelas.539.g: "Une journée noire pour les courses."
 vikelas.540.t: "Nouveau record de vitesse moyenne"
 vikelas.540.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] a réalisé une vitesse moyenne sans précédent en course d'endurance. Ce record restera dans les annales du sport automobile."
 vikelas.540.f: "Avec une précision et une maîtrise technique à couper le souffle, [GetPlayer.GetCustom('vikelas_race_team_name_type')] a atteint une vitesse moyenne que l'on croyait jusqu'alors impossible. Ce record restera longtemps considéré comme le point culminant de cette ère d'or du sport automobile."
 vikelas.545.t: "Rassemblement de fans !"
 vikelas.545.d: "Lors de la course d'endurance entre deux villes, une foule en liesse s'est rassemblée pour célébrer le passage de [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] dans leur ville. Cet événement marque l'essor du sport automobile en tant que sensation publique."
 vikelas.545.f: "Les rues étaient bordées de gens qui se pressaient pour apercevoir la voiture qui passait à toute vitesse. Les enfants agitaient des drapeaux et les adultes criaient le nom du pilote dont les compétences et le courage les inspiraient. Lorsque la voiture s'est arrêtée, une vague d'excitation l'a submergé. Des fleurs, des applaudissements et des acclamations ont accompagné ce bref arrêt avant que le conducteur ne reparte. Ce fut un moment qui a enflammé la passion pour la vitesse et la technologie dans le cœur des gens - un avant-goût de ce que le sport automobile allait signifier dans les décennies à venir."
 vikelas.545.g: "Les courses deviennent populaires."
 vikelas.541.t: "Fin de la course d'endurance"
 vikelas.541.d: "[SCOPE.sCharacter('vikelas_racer_1_scope').GetFullName] de [SCOPE.sCountry('vikelas_first_winner_scope').GetName] a remporté la prestigieuse course d'endurance et également le cœur des spectateurs."
 vikelas.541.f: "Les derniers kilomètres furent un véritable spectacle : la poussière tourbillonnait sur la piste, les moteurs rugissaient et l'excitation était palpable. Lorsque le vainqueur franchit enfin la ligne d'arrivée, des acclamations tonitruantes éclatèrent. Sa voiture, couverte des traces d'une course acharnée, devint le symbole de sa volonté de vaincre. Les fans le portèrent sur leurs épaules tandis que la foule célébrait l'instant. Avec ce triomphe, [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] devient l'une des personnalités les plus importantes du sport automobile et son équipe de course [GetPlayer.GetCustom('vikelas_race_team_name_type')] devient une marque très respectée."
 vikelas.542.d: "[SCOPE.sCountry('vikelas_endurance_race_country_scope').GetName]"
 vikelas.551.t: "Grand Prix de [GetPlayer.GetName]"
 vikelas.551.d: "La saison des courses automobiles a atteint la [GetPlayer.GetNameNoFormatting]. De nombreux pilotes de course et leurs équipes sont déjà arrivés pour se préparer au Grand Prix que notre pays accueillera bientôt."
 vikelas.551.f: "« Courir, c'est vivre. Tout le reste n'est qu'attente. » - Rudolf Carraciola"
 vikelas.551.g: "Que le plus rapide gagne."
 vikelas.552.t: "Tour le plus rapide"
 vikelas.552.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] a réalisé le tour le plus rapide lors de l'entraînement de course. Ce sont d'excellentes perspectives pour la course réelle."
 vikelas.552.f: "« Avant même le départ, j'étais sûr de gagner. » - Ettore Bugatti"
 vikelas.553.t: "Marée noire"
 vikelas.553.d: "Lors de la course du Grand Prix, [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] a été pris dans la nappe d'huile d'un véhicule accidenté et a quitté la route. Le pilote et la voiture peuvent continuer à rouler, mais ont perdu beaucoup de temps dans la course en cours."
 vikelas.553.f: "« Je fabrique des voitures pour rouler, pas pour s'arrêter. » - Ettore Bugatti"
 vikelas.553.g: "Oh non!"
 vikelas.554.t: "Pluie"
 vikelas.554.d: "La course du Grand Prix a été surprise par une pluie soudaine. Certains pilotes se sont arrêtés pour changer de matériel. La question pour [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] est de savoir si [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe] doit terminer la course de manière imprudente ou ralentir pour plus de sécurité."
 vikelas.554.f: "« Ne craignez rien. Croyez seulement. » - Armand Peugeot"
 vikelas.554.g: "Cela ne fait pas dérailler un pilote !"
 vikelas.554.h: "Ralentissez le rythme."
 vikelas.555.t: "Manœuvre de dépassement"
 vikelas.555.d: "Une opportunité unique se présente lorsque [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] se rapproche de [SCOPE.sCharacter('vikelas_racer_2_scope').GetLastName], un coureur de [SCOPE.sCountry('vikelas_race_country_scope').GetName]. [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe] doit-il tenter une manœuvre de dépassement ?"
 vikelas.555.f: "« La voiture de course parfaite franchit la ligne d'arrivée en premier, puis se désagrège en plusieurs parties. » - Ferdinand Porsche"
 vikelas.555.g: "Force!"
 vikelas.555.h: "C'est trop risqué."
 vikelas.556.t: "Manœuvre de dépassement réussie"
 vikelas.556.d: "La manœuvre de dépassement a été un succès total. [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] est devant et a un avantage de vitesse."
 vikelas.556.f: "« Quand je vois passer une Alfa Romeo, je tire mon chapeau. » - Henry Ford"
 vikelas.556.g: "Hourra !"
 vikelas.557.t: "Manœuvre de dépassement échouée"
 vikelas.557.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] n'a pas réussi la manœuvre de dépassement. L'adversaire s'est défendu avec succès et notre pilote de course a perdu beaucoup de temps."
 vikelas.557.f: "« C'est un manque de chance, mais c'est le jeu. J'ai fait de mon mieux, et comme j'ai perdu, je suis pour l'homme qui a choisi le prix. » - Ralph DePalma"
 vikelas.557.g: "Quelle honte."
 vikelas.558.t: "La foule locale motive le coureur"
 vikelas.558.d: "Lors du Grand Prix de [GetPlayer.GetNameNoFormatting], [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] est considéré comme un héros local et reçoit un soutien particulièrement fort du public. Cela motive énormément le pilote de course !"
 vikelas.558.f: "« Personne ne se souvient de qui a pris la deuxième place et ce ne sera jamais moi. » - Enzo Ferrari"
 vikelas.558.g: "Super!"
 vikelas.559.t: "Championnat de course automobile"
 vikelas.559.d: "[SCOPE.sCountry('vikelas_first_winner_scope').GetNameNoFlag] a dominé cette saison de course et a remporté le championnat automobile."
