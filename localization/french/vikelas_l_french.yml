 vikelas.592.t: "Notre [concept_vikelas_racer] est mort"
 vikelas.592.d: "Après avoir passé des années en tant que [concept_vikelas_racer], le célèbre pilote de course automobile de notre pays est décédé. Pourrons-nous un jour remplacer un talent aussi étonnant ?"
 vikelas.592.g: "C'est une perte énorme !"
 vikelas.592_tt: "Parfois, le jeu tue des personnages. Un modérateur ne peut pas empêcher cela. Cet événement supprime le rôle de ce [concept_character] du jeu, de sorte que vous ne soyez pas hanté par son fantôme."
 vikelas.593.t: "Accident de voiture mortel"
 vikelas.593.d: "Le pilote de course [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] a poussé sa chance trop loin. [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe|U] a quitté la route à une vitesse trop élevée et a subi un accident mortel."
 vikelas.593.f: "« La course est une grande manie à laquelle il faut tout sacrifier, sans réticence, sans hésitation. » - Enzo Ferrari"
 vikelas.593.g: "Le prochain !"
 vikelas.594.t: "Panne de voiture"
 vikelas.594.d: "Malheureusement, le coureur [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] a dû abandonner avant la fin de la course. La voiture est tombée en panne, affirme [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe]."
 vikelas.594.f: "« La malchance n'existe pas. » - Enzo Ferrari"
 vikelas.594.g: "Était-ce la voiture ou le conducteur avait-il surstimulé le moteur ?"
 vikelas.595.t: "Un nouveau coureur"
