 vikelas_mechanic_boost_button: "Investissement mécanique" #NT!
 vikelas_mechanic_boost_button_desc: "Nous pouvons réaliser des investissements mécaniques supplémentaires pour accélérer la construction de notre nouvelle voiture de course. Cependant, cela coûtera [Concept('concept_vikelas_mechanic','$concept_vikelas_mechanical_innovation$')] de plus." #NT!
 vikelas_mechanic_boost_modifier: "Investissement mécanique" #NT!
 vikelas_mechanic_improvement_cost_modifier: "Coût d'amélioration d'une voiture de course" #NT!
  
 je_vikelas_mechanic_engine: "Améliorer le moteur de la voiture de course" #NT!
 je_vikelas_mechanic_engine_reason: "Notre mécanicien [ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName] travaille sans relâche sur un nouveau moteur qui améliorera la fiabilité et la vitesse de la voiture. L'achèvement dépend principalement des caractéristiques et de l'expérience du mécanicien." #NT!
 je_vikelas_mechanic_safety: "Améliorer la sécurité des voitures de course" #NT!
 je_vikelas_mechanic_safety_reason: "Notre mécanicien [ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName] améliore la sécurité de la voiture. L'achèvement dépend principalement des caractéristiques et de l'expérience du mécanicien." #NT!
 je_vikelas_mechanic_body: "Améliorer la carrosserie d'une voiture de course" #NT!
 je_vikelas_mechanic_body_reason: "Notre mécanicien [ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName] construit une nouvelle carrosserie pour la voiture, la rendant plus rapide et peut-être même un peu plus sûre. La réalisation dépend principalement des caractéristiques et de l'expérience du mécanicien." #NT!
 vikelas_mechanic_progress_bar_at_full_tt: "La barre d'amélioration de la voiture de course a atteint #variable 100%#!" #NT!
  
 je_vikelas_endurance_race: "Course d'endurance" #NT!
 je_vikelas_endurance_race_reason: "Une course d'endurance se déroule actuellement dans plusieurs États de notre pays. Des pilotes de course de tous les pays amateurs de courses y participent. Le pays hôte a un léger avantage et reçoit des épreuves supplémentaires. Contrairement aux Grands Prix, la fiabilité est plus importante que la vitesse, car les voitures doivent tenir sur une longue distance. Le risque de casse du moteur est également plus élevé que celui d'un accident mortel." #NT!
 je_vikelas_endurance_race_success: "[GetPlayer.GetName] a collecté au moins #ORANGE 8 Progression de la course d'endurance#!." #NT!
 je_vikelas_endurance_race_goal: ""
  
 vikelas.501.t: "Le Club Automobile [ROOT.GetCountry.GetAdjectiveNoFormatting]" #NT!
 vikelas.501.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] est considéré comme un conducteur passionné et a fondé un club automobile avec des personnes partageant les mêmes idées pour marquer cet événement. Cela vise à renforcer l'industrie automobile nationale et à organiser des événements automobiles nationaux." #NT!
 vikelas.501.f: "Dès le milieu des années 1890, l'Automobile Club de France (ACF), fondé en 1895 en tant que premier club automobile au monde, organisait une fois par an une course qui représentait le point culminant de la saison. Il s'agissait de courses dites « de ville à ville » sur des routes de campagne publiques, dans lesquelles les participants étaient envoyés individuellement à intervalles réguliers. L'un des déclencheurs de la fondation de l'ACF fut la relégation d'Albert de Dion de la course Paris-Rouen en 1894. Dans les années suivantes, le développement rapide a commencé, avec des véhicules toujours plus puissants augmentant considérablement les dangers du sport automobile. L'ACF a donc mis en œuvre pour la première fois en 1901 des règles qui peuvent être considérées comme les premières réglementations du sport automobile au monde. Une innovation centrale était la division en catégories qui devaient s'appliquer à toutes les épreuves soutenues par l'ACF. La limitation de poids qui en résultait devait dans un premier temps contribuer à réduire le nombre immense de défauts de pneus dus à une surcharge." #NT!
 vikelas.501.g: "Un sport plein de sensations fortes !" #NT!
 vikelas.502.t: "Première course du Grand Prix" #NT!
 vikelas.502.d: "Le sport automobile prend un tournant révolutionnaire : avec les Grands Prix, des courses internationales vont se succéder dans toutes les nations passionnées de sport automobile. Un championnat international est ainsi né. [SCOPE.sCountry('vikelas_gp_founder_scope').GetName] a invité toutes les nations dotées d'un Automobile Club à participer à leur premier Grand Prix l'année prochaine." #NT!
 vikelas.502.f: "Les courses annuelles de la Coupe Gordon Bennett furent la première tentative d'organiser un championnat du monde automobile de 1900 à 1905. Compte tenu de l'augmentation constante des vitesses, l'ACF édicta pour la première fois en 1902 un règlement technique sous la forme d'une formule de course, que les voitures participantes devaient respecter. Néanmoins, la fréquence des accidents continua d'augmenter, de sorte qu'à partir de 1903, seules des courses sur circuit pouvaient être organisées sur des circuits fermés. En tant que successeur des courses Gordon Bennett, la course principale organisée par l'ACF se déroula pour la première fois en 1906 sous le nom de Grand Prix. Le premier vainqueur du Grand Prix de l'histoire fut le pilote hongrois Ferenc Szisz sur une Renault." #NT!
 vikelas.502.g: "Il y a donc quelque chose à gagner ?" #NT!
 vikelas.503.t: "Association Internationale des Automobile Clubs Reconnus" #NT!
 vikelas.503.d: "Aujourd'hui, l'Association Internationale de l'Automobile a été fondée en 1900. Son nom complet est Association Internationale des Automobile Clubs Reconnus (AIACR)." #NT!
 vikelas.503.f: "Pour que les constructeurs automobiles puissent participer à toutes les courses internationales, il était nécessaire de faire en sorte que les règlements techniques et sportifs, jusqu'alors définis de manière indépendante par l'Automobile Club français pour ses courses sous la forme de la formule du Grand Prix, soient réglementés par une Association Automobile Internationale. L'association a été fondée le 20 juin 1904 à Paris sous le nom d'Association Internationale des Automobile Clubs Reconnus (AIACR), après que la décision de la fonder eut été prise quelques jours plus tôt par les clubs automobiles des plus importantes nations de course dans le cadre de la Coupe Gordon Bennett à Bad Homburg. L'AIACR devait se rebaptiser FIA après la Seconde Guerre mondiale." #NT!
 vikelas.503.g: "Désormais, la course automobile est internationale !" #NT!
 vikelas.504.t: "Nouveau circuit de course du Grand Prix" #NT!
 vikelas.504.d: "Un autre membre de l'AIACR a construit un circuit officiel de Grand Prix. Il y a maintenant #G [GetGlobalVariable('vikelas_num_grand_prix_tracks_global_var').GetValue]#! #V circuits de Grand Prix#! dans le calendrier annuel des courses." #NT!
 vikelas.504.f: "« Les courses automobiles, la tauromachie et l'alpinisme sont les seuls vrais sports… tous les autres sont des jeux. » - Ernest Hemingway" #NT!
 vikelas.504.g: "Réservez les places VIP dans les tribunes." #NT!
 vikelas.505.t: "Emplacement du constructeur de voitures de course" #NT!
 vikelas.505.d: "Avec [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')], [GetPlayer.GetName] a sa première équipe de course de série. L'usine automobile de [SCOPE.sState('vikelas_team_state').GetName] bénéficie désormais d'une forte demande en raison de la renommée de la marque." #NT!
 vikelas.505.f: "Avec le lent développement des pilotes individuels vers les équipes de course professionnelles avec pilotes d'usine, le sport automobile a changé de manière permanente. Les amateurs avec des voitures construites par leurs soins sont devenus rares. Même s'il arrivait encore que des aristocrates excentriques avec des licences d'autres constructeurs automobiles recherchent le frisson, le développement automobile est devenu le véritable centre du sport automobile." #NT!
 vikelas.505.g: "Nous pouvons désormais concevoir nos propres voitures de course !" #NT!
 vikelas.506.t: "Mécanicien de voitures de course" #NT!
 vikelas.506.d: "L'ingénieur en chef Dr. [SCOPE.sCharacter('gaudi_engineer_scope').GetLastName] a sélectionné un excellent assistant de l'équipe [SCOPE.sCharacter('gaudi_engineer_scope').GetHerHis] qui pourrait agir en tant que mécanicien pour la nouvelle équipe de course fondée : [SCOPE.sCharacter('vikelas_new_mechanic_scope').GetFullName]. La spécialisation [SCOPE.sCharacter('vikelas_new_mechanic_scope').GetHerHis] est dans le domaine de..." #NT!
 vikelas.506.f: "Les mécaniciens peuvent améliorer trois domaines d'une voiture : le moteur, la sécurité et la carrosserie. La spécialisation permet de moderniser un domaine spécifique deux fois plus rapidement. En principe, mais pas toujours, il est vrai que les moteurs augmentent la fiabilité (et la vitesse), les extensions de sécurité augmentent la sécurité et les carrosseries augmentent la vitesse (et la sécurité)." #NT!
 vikelas.506.h: "Moteur." #NT!
 vikelas.506.i: "Sécurité." #NT!
 vikelas.506.j: "Corps." #NT!
  
 vikelas.511.t: "La grande course [SCOPE.sState('vikelas_city_race_start_state').GetCityHubName]-[SCOPE.sState('vikelas_city_race_goal_state').GetCityHubName]" #NT!
 vikelas.511.d: "Le [ROOT.GetCountry.GetCapital.GetCityHubName] [SCOPE.GetRootScope.GetCountry.GetCustom('generic_newspaper_type')] a annoncé dans son édition hebdomadaire actuelle une grande course automobile. La course de ville à ville est prévue du [SCOPE.sState('vikelas_city_race_start_state').GetCityHubName] au [SCOPE.sState('vikelas_city_race_goal_state').GetCityHubName]. De nombreux pilotes de course étrangers sont également attendus." #NT!
 vikelas.511.f: "Les débuts du sport automobile furent marqués par des gentlemen drivers qui participaient à des courses de ville en ville dans des voitures construites par leurs soins, accompagnés de leur mécanicien, qui faisait souvent office de chauffeur. Ce format de course était souvent annoncé, organisé et soutenu par les journaux et les clubs automobiles. Comme les mécaniciens étaient souvent encore en bas âge, il était plus important d'arriver à destination. Des accidents mortels comme celui de Marcel Renault lors de la course Paris-Madrid signifiaient que cette forme d'organisation ne constituait qu'une phase transitoire dans l'histoire du sport automobile." #NT!
 vikelas.511.g: "Préparez-vous à l’événement dans trois mois." #NT!
 vikelas.512.t: "Participation à la course" #NT!
 vikelas.512.d: "La prochaine course [SCOPE.sState('vikelas_city_race_start_state').GetCityHubName]-[SCOPE.sState('vikelas_city_race_goal_state').GetCityHubName] en [SCOPE.sCountry('vikelas_race_country').GetName] a donné lieu à des spéculations quant à savoir si le meilleur coureur de notre pays, [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName], y participera également." #NT!
 vikelas.512.g: "Une excellente opportunité !" #NT!
 vikelas.512.h: "C'est trop dangereux." #NT!
 vikelas.512.tt: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] se préparera pour la course dans trois mois." #NT!
 vikelas.513.t: "Trajet gratuit" #NT!
 vikelas.513.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName] a de la chance : [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe] peut donner le maximum sur la route ouverte. Le moteur s'arrête, les virages sont fluides. Les meilleures exigences pour un pilote de course." #NT!
 vikelas.513.f: "« Quand la vitesse entre dans le sang, il faut conduire pour vivre. » - Rudolf Carraciola" #NT!
 vikelas.513.g: "Fantastique!" #NT!
 vikelas.514.t: "Une nature magnifique et intacte" #NT!
 vikelas.514.d: "Alors que [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe] se déplace de ville en ville, [ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName] remarque la nature intacte de la région traversée par [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe]. Peut-être [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe] devrait-il emporter un souvenir avec lui ?" #NT!
 vikelas.514.f: "Au début du sport automobile, les paysages sauvages et intacts constituaient un attrait particulier pour le pilote, ce qui posait des défis. Les premiers circuits de course étaient donc également critiqués car ils exigeaient moins de compétences de conduite et d'adaptation. Bien entendu, certaines vallées, plages et zones montagneuses isolées pouvaient réserver des surprises." #NT!
 vikelas.514.g: "Nous avons une course à gagner !" #NT!
 vikelas.514.h: "Ramassez quelques plantes." #NT!
 vikelas.514.i: "Ramassez quelques pierres." #NT!
 vikelas.515.t: "Du sucre dans le réservoir" #NT!
 vikelas.515.d: "Lors d'un bref arrêt, [ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName] remarque que la voiture du concurrent [ROOT.Var('vikelas_racer_var').GetCharacter.GetHerHis] [SCOPE.sCharacter('vikelas_racer_2_scope').GetLastName] se trouve également à proximité. Apparemment, la voiture passe complètement inaperçue." #NT!
 vikelas.515.f: "« Si vous ne trichez pas, vous n’essayez pas. »" #NT!
 vikelas.515.g: "Une douce revanche." #NT!
 vikelas.516.t: "Un peu d'aide pour un ami ?" #NT!
 vikelas.516.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName] est actuellement en bonne position, mais il voit la voiture fumante de [SCOPE.sCharacter('vikelas_racer_2_scope').GetLastName] sur le bord de la route. Peut-être que [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe] devrait vérifier si tout va bien ?" #NT!
 vikelas.516.f: "Au début des courses, les accidents de la route étaient monnaie courante. Plus tard, même si des commissaires de course étaient présents sur les parcours fermés, une panne pouvait être dangereuse dans les courses de longue distance sans observateur. Dans les années 1930, on a encore vu des loups lors de la Mille Miglia dans les Apennins. C'est pourquoi l'entraide entre collègues de course est souvent naturelle." #NT!
 vikelas.516.g: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName] devrait s'arrêter et aider." #NT!
 vikelas.516.h: "Haha ! Imbéciles !" #NT!
 vikelas.517.t: "Problèmes de moteur" #NT!
 vikelas.517.d: "Il se passe quelque chose au niveau du moteur, même [ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName] ne peut l'expliquer. Un diagnostic n'a pas encore été établi. [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe|U] devra peut-être continuer la course à vitesse réduite." #NT!
 vikelas.517.f: "Les problèmes de moteur surviennent dans tous les sports mécaniques, à l'époque comme aujourd'hui. De nombreux pilotes ont dû abandonner prématurément une course parce qu'ils étaient en tête. Dans l'état actuel des choses, [ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName] pourrait encore terminer la course, mais seulement s'il ralentissait, ce qui rendrait sa victoire beaucoup plus difficile." #NT!
 vikelas.517.g: "Utiliser toutes les mesures de réglage mécanique disponibles." #NT!
 vikelas.517.h: "La voiture doit survivre à la course comme ça." #NT!
 vikelas.518.t: "Clous" #NT!
 vikelas.518.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName] a réussi à se construire une certaine avance sur le reste du peloton. Peut-être que [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe] pourrait améliorer ses chances de victoire et rendre la vie difficile au reste du peloton ?" #NT!
 vikelas.518.f: "« Je sais qu'il trichait parce que je trichais et il m'a battu. »" #NT!
 vikelas.518.g: "Prends les clous, Muttley." #NT!
 vikelas.518.h: "Nous nous abstenons de telles pratiques antisportives." #NT!
 vikelas.519.t: "Disqualification" #NT!
 vikelas.519.d: "Malheureusement, la mauvaise conduite sportive de [ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName] a été révélée. La commission des courses a donc immédiatement exclu [ROOT.Var('vikelas_racer_var').GetCharacter.GetHerHim] de toute course ultérieure." #NT!
 vikelas.519.f: "« Selon le règlement de la course de ville à ville conformément au paragraphe 12, alinéa 6, ligne 9, le participant a enfreint les règles générales et sera donc exclu prématurément. Il n'est pas possible de faire appel. »" #NT!
 vikelas.519.g: "Disqualifié ? C'est injuste !" #NT!
  
 vikelas.520.f: "#V Résultats finaux#!\n\nFirst Place : [SCOPE.sCharacter('vikelas_racer_1_scope').GetFullName] sur [SCOPE.sCountry('vikelas_first_winner_scope').GetName]\nDeuxième place : [SCOPE.sCharacter('vikelas_racer_2_scope').GetFullName] sur [SCOPE.sCountry('vikelas_second_winner_scope').GetName]\nTroisième place : [SCOPE.sCharacter('vikelas_racer_3_scope').GetFullName] sur [SCOPE.sCountry('vikelas_third_winner_scope').GetName]" #NT!
 vikelas.520.g: "Champagne!" #NT!
 vikelas.521.t: "Victoire pour [ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName]" #NT!
 vikelas.521.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] a pris la première place dans la course de ville à ville en [SCOPE.sCountry('vikelas_race_country').GetName]. [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe] a conduit un [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')] [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]." #NT!
 vikelas.521.g: "Champagne!" #NT!
 vikelas.522.t: "2ème place pour [ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName]" #NT!
 vikelas.522.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] a pris la deuxième place dans la course de ville à ville en [SCOPE.sCountry('vikelas_race_country').GetName]. [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe] a conduit un [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')] [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]." #NT!
 vikelas.522.g: "À la prochaine !" #NT!
 vikelas.523.t: "3ème place pour [ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName]" #NT!
 vikelas.523.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] a pris la troisième place dans la course de ville à ville en [SCOPE.sCountry('vikelas_race_country').GetName]. [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe] a conduit un [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')] [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]." #NT!
 vikelas.524.t: "La course de ville à ville se termine" #NT!
 vikelas.524.d: "La grande course de ville à ville du [SCOPE.sCountry('vikelas_race_country').GetName] est terminée et les vainqueurs ont été désignés. Le [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] a conduit un [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')] [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]. Même si nous n'avons pas eu un bon positionnement, au moins la voiture et le pilote sont arrivés sains et saufs." #NT!
  
 vikelas.531.t: "Course d'endurance" #NT!
 vikelas.531.d: "[GetPlayer.GetName] a organisé une grande course d'endurance et a invité des coureurs du monde entier à y participer." #NT!
 vikelas.531.f: "Les premières courses automobiles du début du XXe siècle étaient des courses de fond avec le plus grand nombre de participants possible. Elles devaient tester la vitesse et la fiabilité des voitures de course. Si la France dominait les courses au début, elle s'est rapidement tournée vers les Grands Prix. Cela ne changeait rien au fait qu'il existait encore d'importantes courses d'endurance internationales. La course la plus traditionnelle était la Targa Florio en Sicile. De 1906 à 1977, elle se déroulait principalement en mai en tant qu'événement international important, parfois avec le statut de Coupe du monde. Après la Targa Florio, les Mille Milles (Mille Miglia) étaient considérées comme un classique parmi les courses sur route (la Carrera Panamericana a été ajoutée dans les années 1950) et la base du terme « Gran Turismo » (GT), qui décrit les voitures de sport de tourisme rapides pour les courses de longue distance, telles que celles développées par Ferrari spécifiquement pour la MM." #NT!
 vikelas.531.g: "On se retrouve à la ligne d'arrivée !" #NT!
 vikelas.533.t: "Pneus endommagés" #NT!
 vikelas.533.d: "En pleine course, un pneu éclaté entraîne un arrêt brutal pour [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName]. Malgré l'incident, le pilote est sorti indemne et impressionné par son sang-froid, mais a perdu un temps important." #NT!
 vikelas.533.f: "Les Mille Miglia de 1931 ont été marquées par une usure massive des pneus. Avant d'arriver à Rome, Arcangeli a dû changer un pneu neuf fois. Nuvolari a également eu plusieurs crevaisons, mais il a quand même devancé Caracciola de deux minutes à Rome. Au retour vers l'Adriatique, les Alfa Romeo ont maintenu leur rythme soutenu malgré les problèmes de pneus. Entre-temps, Borzacchini a mené la compétition avec 18 minutes d'avance. Le long de la côte méditerranéenne au nord, Campari avait quatre minutes d'avance sur Arcangeli, qui était en pleine renaissance. La tête a changé plusieurs fois au sein des Alfa Romeo et les Italiens semblaient avoir tout sous contrôle après les deux tiers de la distance de course. Cela était également dû à un réseau dense de stations-service, qui permettait de nombreux changements de pneus. La décision a été prise dans les 80 derniers kilomètres, lorsque de fortes pluies se sont installées et que les Alfa Romeo ont eu des accidents avec leurs pneus à nouveau usés." #NT!
 vikelas.533.g: "Malchance." #NT!
 vikelas.534.t: "Le passage à niveau" #NT!
 vikelas.534.d: "Alors qu'un autre conducteur poursuit un autre véhicule, un bruit d'avertissement retentit soudainement : une barrière de chemin de fer s'abaisse devant les deux voitures. La voiture qui précède passe à toute vitesse. [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] doit décider s'il doit s'arrêter ou risquer de traverser avant que l'adversaire ne gagne trop d'espace." #NT!
 vikelas.534.f: "Les pilotes de la Mille Miglia étaient enclins à des manœuvres audacieuses, comme Hans Hermann, qui participait à la course de 1954, qui conduisit sa voiture sous une barrière de chemin de fer qui se refermait, obligeant lui et son passager à baisser la tête." #NT!
 vikelas.534.g: "Prenez le risque !" #NT!
 vikelas.534.h: "C'est trop téméraire !" #NT!
 vikelas.538.t: "Loups et revolvers" #NT!
 vikelas.538.d: "Lors d'une course nocturne en montagne, l'équipe de course sort de la piste. Soudain, un hurlement retentit. Une meute de loups semble rôder dans les environs." #NT!
 vikelas.538.f: "« Nous nous sommes retrouvés au milieu d'une tempête de neige et nous avons été poursuivis par des loups. Ils ont cependant été mis en fuite par des coups de feu tirés du revolver que je gardais toujours sous le coussin du siège et par l'arrivée d'un groupe de bandits armés de torches et de fusils. » - Enzo Ferrari" #NT!
 vikelas.538.g: "Tuez les loups." #NT!
 vikelas.538.h: "Conduisez largement dans la région." #NT!
 vikelas.538.i: "Cette découverte est bien plus importante qu’une course stupide." #NT!
 vikelas.539.t: "Une voiture de course fonce sur les spectateurs !" #NT!
 vikelas.539.d: "Un terrible accident s'est produit lorsqu'une voiture de course a quitté la piste pendant la course et a foncé dans la foule. Le monde du sport automobile est secoué et le débat sur les normes de sécurité reprend de plus belle." #NT!
 vikelas.539.f: "Depuis la première édition des Mille Miglia en 1927, l'événement n'avait connu aucun accident catastrophique malgré le grand nombre de spectateurs le long des routes. Le 3 avril 1938, à 16h30, les choses ont changé. Les deux pilotes génois Angelo Mignanego et son copilote Dr. Luigi Bruzzo ont alors pris la route dans leur Lancia Aprilia sur la Viale Berti Pichat à Bologne. À une vitesse d'un peu moins de 100 km/h, Mignanego, inexpérimenté, a perdu le contrôle de la voiture sur les rails du tramway. La Lancia a d'abord percuté un arbre, puis un grand groupe de spectateurs. Si les deux occupants de la voiture sont presque indemnes, dix personnes, dont sept enfants, ont péri dans l'accident. 26 spectateurs ont été blessés, certains grièvement. Une fillette de 12 ans est décédée dans un autre accident à Stanghella." #NT!
 vikelas.539.g: "Une journée noire pour les courses." #NT!
 vikelas.540.t: "Nouveau record de vitesse moyenne" #NT!
 vikelas.540.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] a réalisé une vitesse moyenne sans précédent en course d'endurance. Ce record restera dans les annales du sport automobile." #NT!
 vikelas.540.f: "Avec une précision et une maîtrise technique à couper le souffle, [GetPlayer.GetCustom('vikelas_race_team_name_type')] a atteint une vitesse moyenne que l'on croyait jusqu'alors impossible. Ce record restera longtemps considéré comme le point culminant de cette ère d'or du sport automobile." #NT!
 vikelas.545.t: "Rassemblement de fans !" #NT!
 vikelas.545.d: "Lors de la course d'endurance entre deux villes, une foule en liesse s'est rassemblée pour célébrer le passage de [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] dans leur ville. Cet événement marque l'essor du sport automobile en tant que sensation publique." #NT!
 vikelas.545.f: "Les rues étaient bordées de gens qui se pressaient pour apercevoir la voiture qui passait à toute vitesse. Les enfants agitaient des drapeaux et les adultes criaient le nom du pilote dont les compétences et le courage les inspiraient. Lorsque la voiture s'est arrêtée, une vague d'excitation l'a submergé. Des fleurs, des applaudissements et des acclamations ont accompagné ce bref arrêt avant que le conducteur ne reparte. Ce fut un moment qui a enflammé la passion pour la vitesse et la technologie dans le cœur des gens - un avant-goût de ce que le sport automobile allait signifier dans les décennies à venir." #NT!
 vikelas.545.g: "Les courses deviennent populaires." #NT!
  
 vikelas.541.t: "Fin de la course d'endurance" #NT!
 vikelas.541.d: "[SCOPE.sCharacter('vikelas_racer_1_scope').GetFullName] de [SCOPE.sCountry('vikelas_first_winner_scope').GetName] a remporté la prestigieuse course d'endurance et également le cœur des spectateurs." #NT!
 vikelas.541.f: "Les derniers kilomètres furent un véritable spectacle : la poussière tourbillonnait sur la piste, les moteurs rugissaient et l'excitation était palpable. Lorsque le vainqueur franchit enfin la ligne d'arrivée, des acclamations tonitruantes éclatèrent. Sa voiture, couverte des traces d'une course acharnée, devint le symbole de sa volonté de vaincre. Les fans le portèrent sur leurs épaules tandis que la foule célébrait l'instant. Avec ce triomphe, [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] devient l'une des personnalités les plus importantes du sport automobile et son équipe de course [GetPlayer.GetCustom('vikelas_race_team_name_type')] devient une marque très respectée." #NT!
 vikelas.542.d: "[SCOPE.sCountry('vikelas_endurance_race_country_scope').GetName]" #NT!
  
 vikelas.551.t: "Grand Prix de [GetPlayer.GetName]" #NT!
 vikelas.551.d: "La saison des courses automobiles a atteint la [GetPlayer.GetNameNoFormatting]. De nombreux pilotes de course et leurs équipes sont déjà arrivés pour se préparer au Grand Prix que notre pays accueillera bientôt." #NT!
 vikelas.551.f: "« Courir, c'est vivre. Tout le reste n'est qu'attente. » - Rudolf Carraciola" #NT!
 vikelas.551.g: "Que le plus rapide gagne." #NT!
  
 vikelas.552.t: "Tour le plus rapide" #NT!
 vikelas.552.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] a réalisé le tour le plus rapide lors de l'entraînement de course. Ce sont d'excellentes perspectives pour la course réelle." #NT!
 vikelas.552.f: "« Avant même le départ, j'étais sûr de gagner. » - Ettore Bugatti" #NT!
 vikelas.553.t: "Marée noire" #NT!
 vikelas.553.d: "Lors de la course du Grand Prix, [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] a été pris dans la nappe d'huile d'un véhicule accidenté et a quitté la route. Le pilote et la voiture peuvent continuer à rouler, mais ont perdu beaucoup de temps dans la course en cours." #NT!
 vikelas.553.f: "« Je fabrique des voitures pour rouler, pas pour s'arrêter. » - Ettore Bugatti" #NT!
 vikelas.553.g: "Oh non!" #NT!
 vikelas.554.t: "Pluie" #NT!
 vikelas.554.d: "La course du Grand Prix a été surprise par une pluie soudaine. Certains pilotes se sont arrêtés pour changer de matériel. La question pour [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] est de savoir si [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe] doit terminer la course de manière imprudente ou ralentir pour plus de sécurité." #NT!
 vikelas.554.f: "« Ne craignez rien. Croyez seulement. » - Armand Peugeot" #NT!
 vikelas.554.g: "Cela ne fait pas dérailler un pilote !" #NT!
 vikelas.554.h: "Ralentissez le rythme." #NT!
 vikelas.555.t: "Manœuvre de dépassement" #NT!
 vikelas.555.d: "Une opportunité unique se présente lorsque [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] se rapproche de [SCOPE.sCharacter('vikelas_racer_2_scope').GetLastName], un coureur de [SCOPE.sCountry('vikelas_race_country_scope').GetName]. [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe] doit-il tenter une manœuvre de dépassement ?" #NT!
 vikelas.555.f: "« La voiture de course parfaite franchit la ligne d'arrivée en premier, puis se désagrège en plusieurs parties. » - Ferdinand Porsche" #NT!
 vikelas.555.g: "Force!" #NT!
 vikelas.555.h: "C'est trop risqué." #NT!
 vikelas.556.t: "Manœuvre de dépassement réussie" #NT!
 vikelas.556.d: "La manœuvre de dépassement a été un succès total. [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] est devant et a un avantage de vitesse." #NT!
 vikelas.556.f: "« Quand je vois passer une Alfa Romeo, je tire mon chapeau. » - Henry Ford" #NT!
 vikelas.556.g: "Hourra !" #NT!
 vikelas.557.t: "Manœuvre de dépassement échouée" #NT!
 vikelas.557.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] n'a pas réussi la manœuvre de dépassement. L'adversaire s'est défendu avec succès et notre pilote de course a perdu beaucoup de temps." #NT!
 vikelas.557.f: "« C'est un manque de chance, mais c'est le jeu. J'ai fait de mon mieux, et comme j'ai perdu, je suis pour l'homme qui a choisi le prix. » - Ralph DePalma" #NT!
 vikelas.557.g: "Quelle honte." #NT!
 vikelas.558.t: "La foule locale motive le coureur" #NT!
 vikelas.558.d: "Lors du Grand Prix de [GetPlayer.GetNameNoFormatting], [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] est considéré comme un héros local et reçoit un soutien particulièrement fort du public. Cela motive énormément le pilote de course !" #NT!
 vikelas.558.f: "« Personne ne se souvient de qui a pris la deuxième place et ce ne sera jamais moi. » - Enzo Ferrari" #NT!
 vikelas.558.g: "Super!" #NT!
  
 vikelas.559.t: "Championnat de course automobile" #NT!
 vikelas.559.d: "[SCOPE.sCountry('vikelas_first_winner_scope').GetNameNoFlag] a dominé cette saison de course et a remporté le championnat automobile." #NT!
 vikelas.559.f: "#V Résultats finaux#!\n\nFirst Place : [SCOPE.sCountry('vikelas_first_winner_scope').GetName], [SCOPE.GetValue('vikelas_first_winner_points_scope')] Points, [SCOPE.GetValue('vikelas_first_winner_victories_scope')] Victoires\nDeuxième place : [SCOPE.sCountry('vikelas_second_winner_scope').GetName], [SCOPE.GetValue('vikelas_second_winner_points_scope')] Points, [SCOPE.GetValue('vikelas_second_winner_victories_scope')] Victoires\nTroisième place : [SCOPE.sCountry('vikelas_third_winner_scope').GetName], [SCOPE.GetValue('vikelas_third_winner_points_scope')] Points, #!\n\nFirst0 Victoires\nQuatrième place : #!\n\nFirst1, #!\n\nFirst2 Points, #!\n\nFirst3 Victoires\nCinquième place : #!\n\nFirst4, #!\n\nFirst5 Points, #!\n\nFirst6 Victoires" #NT!
 vikelas.559.g: "Écoutez maintenant Bizet." #NT!
 vikelas.559.h: "Je ne m'intéresse pas aux statistiques." #NT!
 vikelas.559.tt: "Les statistiques du Championnat Automobile Annuel ne sont plus affichées." #NT!
  
 vikelas.561.t: "Le Grand Prix de [GetPlayer.GetName] se termine" #NT!
 vikelas.561.d: "La course du Grand Prix est terminée et les gagnants ont été désignés. Le gagnant du Grand Prix [GetPlayer.GetName] est [SCOPE.sCharacter('vikelas_racer_1_scope').GetFullName]. L'événement de course restera longtemps dans les mémoires de la population." #NT!
 vikelas.561.f: "#V Résultats finaux#!\n\nFirst Place : [SCOPE.sCharacter('vikelas_racer_1_scope').GetFullName] sur [SCOPE.sCountry('vikelas_first_winner_scope').GetName]\nDeuxième place : [SCOPE.sCharacter('vikelas_racer_2_scope').GetFullName] sur [SCOPE.sCountry('vikelas_second_winner_scope').GetName]\nTroisième place : [SCOPE.sCharacter('vikelas_racer_3_scope').GetFullName] sur [SCOPE.sCountry('vikelas_third_winner_scope').GetName]" #NT!
 vikelas.561.g: "Champagne!" #NT!
  
 vikelas.571.t: "Les premières 24 Heures du Mans" #NT!
 vikelas.571.d: "En 1923, ont lieu les premières 24 Heures du Mans, devenant rapidement l'un des événements les plus prestigieux du sport automobile, attirant pilotes et constructeurs du monde entier." #NT!
 vikelas.571.f: "Les 26 et 27 mai 1923, se déroulent les premières 24 Heures du Mans, organisées par l'Automobile Club de l'Ouest. Le circuit sarthois de 17,3 kilomètres accueille 33 véhicules. Les conditions sont difficiles : pluie, routes boueuses, parcours traversant la ville du Mans et les routes de campagne environnantes. La victoire revient à André Lagache et René Léonard, au volant d'une Chenard & Walcker Sport, qui parcourent une distance de 2 209 kilomètres en 24 heures. Cette course marque le début d'une tradition qui continue de célébrer l'innovation et l'endurance dans le sport automobile." #NT!
 vikelas.571.g: "24 heures ? C'est fou !" #NT!
 vikelas.572.t: "La naissance de la Targa Florio" #NT!
 vikelas.572.d: "En 1906, la Targa Florio est créée, une course spectaculaire qui se déroule sur les routes sinueuses de Sicile. Organisée par Vincenzo Florio, elle place la région au centre du sport automobile mondial." #NT!
 vikelas.572.f: "Le 6 mai 1906, la première Targa Florio a eu lieu, une course longue distance qui transformait les routes de montagne escarpées et les villages pittoresques de Sicile en un circuit de course exigeant. Organisée par Vincenzo Florio, un passionné de sport automobile, l'événement concrétisait sa vision d'un défi sportif. Le circuit s'étendait sur 446 kilomètres, divisés en trois tours de 148 kilomètres chacun. La victoire est revenue à Alessandro Cagno, au volant d'une Itala, qui a franchi la ligne d'arrivée à une vitesse moyenne de 46,8 km/h. La Targa Florio est rapidement devenue un symbole de courage, d'habileté et de passion pour la vitesse." #NT!
 vikelas.572.g: "La Targa Florio établit une tradition" #NT!
 vikelas.573.t: "Le premier Semmering Berg-Rennen" #NT!
 vikelas.573.d: "En 1899, la première course de côte de Semmering a été organisée, testant les limites de la technologie automobile et des compétences de conduite. Cet événement a marqué une étape importante dans l'histoire du sport automobile." #NT!
 vikelas.573.f: "Le 27 août 1899, la première course de côte de Semmering fut organisée par l'Automobile Club autrichien. Le parcours de 9,8 kilomètres, reliant Klamm am Semmering au col, poussa les premières automobiles et leurs pilotes dans leurs retranchements. Avec des pentes allant jusqu'à 7 % et des virages serrés, la course était un test de technique et de courage. La victoire revint au comte Jenő Zichy, au volant d'une automobile Mors, qui termina le parcours à une vitesse moyenne de 22,2 km/h. La course attira un large public et posa les bases de la tradition des courses de côte en Europe." #NT!
 vikelas.573.g: "L'ascension de la colline fascine les masses." #NT!
  
 vikelas.581.t: "Nouveau moteur de voiture de course" #NT!
 vikelas.581.d_level_2: "[ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName] Le moteur a été amélioré. Le dernier modèle de voiture de course utilise désormais un #V moteur six cylindres#!. La nouvelle voiture porte désormais le nom [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')] [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]." #NT!
 vikelas.581.d_level_3: "[ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName] Le moteur a été amélioré. Le dernier modèle de voiture de course utilise désormais un #V moteur à compresseur à quatre cylindres#!. La nouvelle voiture porte désormais le nom [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')] [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]." #NT!
 vikelas.581.d_level_4: "[ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName] Le moteur a été amélioré. Le dernier modèle de voiture de course utilise désormais un #V moteur à compresseur à huit cylindres#!. La nouvelle voiture porte désormais le nom [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')] [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]." #NT!
 vikelas.581.f: "« Je construis des moteurs et j'y fixe des roues. » - Enzo Ferrari" #NT!
 vikelas.581.g: "Force!" #NT!
 vikelas_new_engine_tt: "Le moteur actuel sera mis à niveau." #NT!
 vikelas.582.t: "Nouvelles installations de sécurité pour les voitures de course" #NT!
 vikelas.582.d_level_2: "[ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName] a amélioré les installations de sécurité. Le dernier accessoire de sécurité pour voiture de course est un #V rétroviseur#!. La nouvelle voiture porte désormais le nom [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')] [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]." #NT!
 vikelas.582.d_level_3: "[ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName] les installations de sécurité ont été améliorées. Le dernier accessoire de sécurité pour les voitures de course est #V les freins hydrauliques#!. La nouvelle voiture porte désormais le nom [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')] [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]." #NT!
 vikelas.582.d_level_4: "[ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName] les installations de sécurité ont été améliorées. Le dernier accessoire de sécurité pour les voitures de course est #V des pneus modernes#!. La nouvelle voiture porte désormais le nom [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')] [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]." #NT!
 vikelas.582.f: "« Pour finir premier, il faut d'abord finir. » - Juan Manuel Fangio" #NT!
 vikelas_new_safety_tt: "Les installations de sécurité actuelles seront modernisées." #NT!
 vikelas.583.t: "Nouvelle carrosserie de voiture de course" #NT!
