 vikelas.583.f: "« La course automobile a commencé cinq minutes après la construction de la deuxième voiture. » - Henry Ford" #NT!
 vikelas_new_body_tt: "Le corps actuel sera modernisé." #NT!
  
 vikelas.584.t: "Le moteur V" #NT!
 vikelas.584.d: "Notre ingénieur Dr. [ROOT.Var('gaudi_engineer_var').GetCharacter.GetLastName] a fait une proposition révolutionnaire sur ce à quoi pourrait ressembler un nouveau moteur de course et a contacté le mécanicien [ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName]." #NT!
 vikelas.584.f: "Un moteur en V est un type de moteur à piston alternatif à plusieurs cylindres. Ceux-ci sont divisés en deux rangées de cylindres qui sont inclinées l'une par rapport à l'autre. Les moteurs en V sont largement utilisés, en particulier avec un nombre élevé de cylindres et un espace d'installation limité. La conception compacte permet d'économiser du matériau et donc du poids. Le premier moteur en V, un bicylindre en V à deux cylindres, a été conçu par Wilhelm Maybach et utilisé dans l'automobile Daimler Stahlradwagen de 1889. Le premier moteur V8 a été produit en 1903, sous la forme du moteur Antoinette conçu par Léon Levavasseur pour les bateaux de course et les avions." #NT!
 vikelas.584.g: "Heureka !" #NT!
 vikelas.585.t: "Carburant amélioré" #NT!
 vikelas.585.d: "Notre chimiste Dr. [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] a perfectionné le carburant pour moteurs à combustion interne de telle manière qu'il pourrait jouer un rôle crucial dans l'augmentation de l'efficacité et des performances des voitures de course. [ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName] a manifesté un grand intérêt pour les essais." #NT!
 vikelas.585.f: "Les premières décennies de l'essence ont été extrêmement changeantes. De nombreuses entreprises ont eu tendance à étirer le carburant ou à le mélanger à d'autres carburants purs. Nikolaus August Otto utilisait déjà de l'alcool rectifié. Dans certains pays, la pénurie de pétrole a conduit au développement d'alternatives - ou à une utilisation plus efficace de la quantité de carburant disponible. Dans les courses, des carburants et des huiles lubrifiantes améliorés ont été utilisés pour garantir une performance de conduite optimisée." #NT!
 vikelas.585.g: "Heureka !" #NT!
 vikelas.586.t: "Forces aérodynamiques" #NT!
 vikelas.586.d: "Notre physicien Dr. [ROOT.Var('curie_physicistvar').GetCharacter.GetLastName] a décrit quelques calculs sur les forces aérodynamiques qui pourraient être utiles pour la construction de véhicules. Le mécanicien automobile [ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName] a reçu une copie de l'article." #NT!
 vikelas.586.f: "« L'aérodynamique est pour ceux qui ne savent pas construire des moteurs. » - Enzo Ferrari" #NT!
 vikelas.586.g: "Heureka !" #NT!
  
 vikelas.590.t: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] est désormais un coureur célèbre !" #NT!
 vikelas.590.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] a remporté des courses dans le monde entier et est célèbre pour son style de course. [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe] est désormais suffisamment célèbre pour être considéré comme un coureur célèbre !" #NT!
 vikelas.590.f: ""
 vikelas.590.g: "Une légende vivante !" #NT!
 vikelas.591.t: "Notre pilote automobile, [SCOPE.sCharacter('vikelas_retired_racer_scope').GetFullNameNoFormatting], prend sa retraite" #NT!
 vikelas.591.d: "Après avoir passé des années de sa vie à piloter des voitures de course à travers le monde, [SCOPE.sCharacter('vikelas_retired_racer_scope').GetFullName] prend désormais sa retraite. [SCOPE.sCharacter('vikelas_retired_racer_scope').GetSheHe] ne sera plus actif en tant que [concept_vikelas_racer]." #NT!
 vikelas.591.g: "[SCOPE.sCharacter('vikelas_retired_racer_scope').GetSheHe|U] gagné [SCOPE.sCharacter('vikelas_retired_racer_scope').GetHerHis] retraite !" #NT!
 vikelas.591.h: "Il ferait un excellent ingénieur !" #NT!
 vikelas.591.new_racer_replace_tt: "[SCOPE.sCharacter('vikelas_retired_racer_scope').GetFullName] sera retiré et [SCOPE.sCharacter('vikelas_new_racer_scope').GetFullName] deviendra le nouveau [concept_vikelas_racer] de [GetPlayer.GetName]." #NT!
 vikelas.591.racer_to_engineer_tt: "[SCOPE.sCharacter('vikelas_retired_racer_scope').GetFullName] deviendra votre nouveau [concept_gaudi_engineer]. [SCOPE.GetRootScope.GetCountry.GetCustom('academics_replacement_engineer_custom_loc')]" #NT!
 vikelas.591.new_racer_tt: "[SCOPE.sCharacter('vikelas_new_racer_scope').GetFullName] deviendra le nouveau [concept_vikelas_racer] de [GetPlayer.GetName]." #NT!
 vikelas.592.t: "Notre [concept_vikelas_racer] est mort" #NT!
 vikelas.592.d: "Après avoir passé des années en tant que [concept_vikelas_racer], le célèbre pilote de course automobile de notre pays est décédé. Pourrons-nous un jour remplacer un talent aussi étonnant ?" #NT!
 vikelas.592.g: "C'est une perte énorme !" #NT!
 vikelas.592_tt: "Parfois, le jeu tue des personnages. Un modérateur ne peut pas empêcher cela. Cet événement supprime le rôle de ce [concept_character] du jeu, de sorte que vous ne soyez pas hanté par son fantôme." #NT!
 vikelas.593.t: "Accident de voiture mortel" #NT!
 vikelas.593.d: "Le pilote de course [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] a poussé sa chance trop loin. [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe|U] a quitté la route à une vitesse trop élevée et a subi un accident mortel." #NT!
 vikelas.593.f: "« La course est une grande manie à laquelle il faut tout sacrifier, sans réticence, sans hésitation. » - Enzo Ferrari" #NT!
 vikelas.593.g: "Le prochain !" #NT!
 vikelas.594.t: "Panne de voiture" #NT!
 vikelas.594.d: "Malheureusement, le coureur [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] a dû abandonner avant la fin de la course. La voiture est tombée en panne, affirme [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe]." #NT!
 vikelas.594.f: "« La malchance n'existe pas. » - Enzo Ferrari" #NT!
 vikelas.594.g: "Était-ce la voiture ou le conducteur avait-il surstimulé le moteur ?" #NT!
 vikelas.595.t: "Un nouveau coureur" #NT!
 vikelas.595.d: "Un nouveau [concept_vikelas_racer] a introduit [SCOPE.sCharacter('vikelas_new_racer_scope').GetHerselfHimself]. Le nom de [SCOPE.sCharacter('vikelas_new_racer_scope').GetHerHis|U] est [SCOPE.sCharacter('vikelas_new_racer_scope').GetFullName]." #NT!
 vikelas.595.g: "Espérons que [SCOPE.sCharacter('vikelas_new_racer_scope').GetSheHe] ait plus de chance." #NT!
 vikelas.596.t: "Un nouveau mécanicien" #NT!
 vikelas.596.d: "Un nouveau [concept_vikelas_mechanic] a introduit [SCOPE.sCharacter('vikelas_new_mechanic_scope').GetHerselfHimself]. Le nom de [SCOPE.sCharacter('vikelas_new_mechanic_scope').GetHerHis|U] est [SCOPE.sCharacter('vikelas_new_mechanic_scope').GetFullName]. La spécialisation de [SCOPE.sCountry('vikelas_new_mechanic_scope').GetHerhis] est dans le domaine de..." #NT!
  
 vikelas_autoracing_found_automobile_club_button: "Création d'un club automobile" #NT!
 vikelas_autoracing_found_automobile_club_button_desc: "La création d’un club automobile est la première étape vers la construction d’autres installations essentielles au sport automobile." #NT!
 vikelas_autoracing_long_distance_button: "Organiser une course d'endurance" #NT!
 vikelas_autoracing_long_distance_button_desc: "Les courses d'endurance, souvent disputées de ville à ville, étaient la norme aux débuts de la course automobile et se sont poursuivies jusqu'au milieu du XXe siècle. En Italie, des courses comme la Targa Florio ou la Mille Miglia en sont les exemples les plus connus. Elles mettaient l'homme et la machine à rude épreuve et ont longtemps été considérées comme les véritables courses automobiles nationales." #NT!
 vikelas_autoracing_found_grand_prix_button: "Trouvé Grand Prix Racing" #NT!
 vikelas_autoracing_found_grand_prix_button_desc: "En 1906, le premier Grand Prix officiel de l'histoire de l'automobile est organisé avec la course du Grand Prix de l'ACF. Quel que soit le pays d'origine, jusqu'à trois voitures de course par constructeur automobile sont homologuées, comme le demandaient à l'origine les représentants de l'industrie française. Fidèle à son statut de plus importante de toutes les compétitions, la course se déroule sur une distance de plus de 1200 km et sur deux jours consécutifs. En 1925, à l'instigation de l'Automobile Club d'Italie, l'introduction d'un championnat du monde officiel est finalement annoncée. Les trois courses officielles du Grand Prix de la saison (France, Italie et Belgique) sont désignées comme courses, ainsi qu'Indianapolis comme l'événement automobile américain le plus important." #NT!
 vikelas_autoracing_race_track_button: "Construire une piste de course" #NT!
 vikelas_autoracing_race_track_button_desc: "Avec les Grands Prix, les circuits fixes deviennent de plus en plus la norme pour les courses automobiles. Un circuit dédié permettrait non seulement de centraliser les événements de course internationaux en un seul endroit, mais en tant que piste d'essai, il offrirait également à nos pilotes de course un bonus d'expérience chaque année." #NT!
