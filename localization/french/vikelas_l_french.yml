 vikelas.21.t: "The Gentlemen's Game"
 vikelas.21.d: "In [SCOPE.sState('vikelas_cricket_state').GetName], a group of cricket players has come together for the first time to play matches together under established rules. The club thus assumes a pioneering role in the sport."
 vikelas.21.f: "The 19th century was the era in which cricket evolved from a rural pastime to a sport of national and international importance. The English upper classes made the game their favorite pastime: it was cultivated in boarding schools like Eton and Harrow and glorified as a 'gentleman's sport.' At the same time, its popularity grew among the working class, particularly in northern England, where factory workers founded their own clubs. This democratization of the game led to an unprecedented growth in clubs and spectators.\n\nInternational matches were not long in coming. In 1844, the world's first documented international match between Canada and the United States took place in New York."
 vikelas.21.g: "Pass me the bat!"
 vikelas.601.t: "Pédales sur le trottoir"
 vikelas.601.d: "Une nouvelle invention est apparue sur les boulevards - un engin à deux roues alimenté par des pédales attachées directement à la roue avant. Il s'appelle le «Velocicede»."
 vikelas.601.f: "Dans les parcs et dans les larges rues de la capitale, les têtes tournent. Messieurs dans des chapeaux et des gilets se perche au sommet d'étranges cadres de fer, pédalant furieusement, vacillant à travers des foules surpris. Certains tombent. Certains volent. Les enfants rient. Les hommes d'État plus âgés élèvent leurs sourcils. Les journaux l'appellent le Vélocipède - demi-jouet, moitié promesse. Inventé par un carrefour, ce «shaker osseux» est aussi lourd que révolutionnaire. Sur les pavés, il basse la colonne vertébrale. Mais sur des promenades lisses, il bouge avec une grâce surprenante. Il y a des murmures que ce n'est pas une simple nouveauté, mais la graine d'un nouveau type de mouvement."
 vikelas.601.g: "Une mode amusante!"
 vikelas.602.t: "Le vélo du futur"
 vikelas.602.d: "Un nouveau design de vélo a émergé, avec des roues de taille égale, un essieu arrière basé sur la chaîne et un équilibre amélioré. Contrairement aux précaires élevés, ce «vélo de sécurité» est stable, abordable et devenant rapidement une sensation. Son inventeur? [SCOPE.sCharacter('vikelas_bicycle_inventor_scope').GetFullName]!"
 vikelas.602.f: "Les anciens vélocipes secouaient les os et les nerfs. Les Penny-Farthings imposants offraient de la vitesse, mais à un prix, peu étaient prêts à payer - un faux mouvement, et le cavalier a volé. Maintenant, un nouveau type de vélo se propage à partir d'ateliers dans notre capital: compact, élégant et sûr. Avec une chaîne d'entraînement vers la roue arrière et des pneus pneumatiques, même les dames et les ouvriers commencent à rouler. Les rues autrefois dirigées par des voitures résonnent désormais avec le moulin doux de caoutchouc sur la pierre. Dans les cafés et les usines, le verdict est le même: ce n'est pas un jouet. C'est la liberté - rapide, silencieuse et soudainement à portée de main."
 vikelas.602.g: "Laissez chaque citoyen monter à l'ère moderne."
 vikelas.611.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]"
 vikelas.611.d: "La journée est venue. Les coureurs de tout le pays se réunissent sur la ligne de départ, désireux de tester l'homme et la machine sur la route ouverte. L'air crépite avec anticipation."
 vikelas.611.f: "Le soleil se lève sur le boulevard, déjà bondé de spectateurs. Banners Flutter. L'odeur de la graisse et de la poussière est suspendue dans l'air du matin. Des dizaines de cavaliers montent leurs vélos - certaines machines brillantes fraîches de l'usine, d'autres corrigées ensemble dans des ateliers de la back-alley. \ Na tir sonne. Les acclamations éclatent. Et les roues commencent à tourner. \ NETHEY READ à travers les portes de la ville et dans la campagne. Les agriculteurs s'arrêtent dans leurs champs. Les enfants courent à côté de la route. Les prêtres les bénissent. Cynics se moquer. Et pourtant, alors que la poussière traîne derrière eux, un sens étrange apparaît dans la foule: cela ressemble au début de quelque chose de plus grand."
 vikelas.611.g: "Que chaque ville entende le tourbillon du progrès."
 vikelas.621.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]"
 vikelas.621.d: "Le vainqueur de la course aux vélos nationaux a capturé plus que la ligne d'arrivée - il a capturé l'imagination de la nation. Maintenant, tous les yeux se tournent vers ce qu'il représente."
 vikelas.621.f: "Les journaux l'appellent «The Iron Rider». Né de la famille d'un tisserand, orphelin à douze ouvriers d'usine de seize ans. Sa victoire sur un vélo de sécurité battu - patchée, grattée et huilée avec soin - n'était pas un simple triomphe de sport. C'était une parabole. Des foules chantent son nom. Les peintres l'esquissent. Les enfants imitent sa posture. Mais plus que cela, les idéologues en prennent note. Certains l'appellent le visage de la force du travail. D'autres disent qu'il prouve la vitalité de la nation. La presse se plaide pour savoir s'il est un travailleur, un patriote - ou quelque chose de nouveau. \ Nthe Rider lui-même parle peu. Il sourit, hoche la tête et monte."
 vikelas.621.g: "Faites de lui un héros de la classe ouvrière."
 vikelas.621.h: "Célébrez-le comme une icône nationale."
 vikelas.621.i: "Le traduire comme un symbole du progrès et de l'homme moderne."
 vikelas.622.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]"
 vikelas.622.d: "Un accident tragique s'est produit pendant la course nationale à vélo. Un cavalier est mort et plusieurs autres blessés. Les applaudissements se sont arrêtés."
 vikelas.622.f: "Une roue a attrapé une ornière. Un cri, un crash, puis des cris. Les spectateurs ont bondi en avant alors que les vélos dégringolaient comme des dominos. Du sang mélangé avec de la poussière. Casques divisés. Les os ont cassé. Un jeune homme - dix-sept, un apprenti d'usine - est décédé sur l'impact. Les journaux sont divisés. Certains l'appellent un prix du progrès nécessaire, d'autres dénoncent l'insouciance du sport public."
 vikelas.622.g: "Honorer les morts."
 vikelas.623.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]"
 vikelas.623.d: "Une étape particulière de la race a capturé le cœur du public. Les spectateurs en parlent non seulement comme un concours, mais comme une légende."
 vikelas.623.f: "Les coureurs ont disparu dans les collines à l'aube. Ce qui a suivi n'était plus une course, mais un test d'esprit. Une douzaine a pris du retard. Trois s'effondrer. L'un s'est écrasé sur une courbe en épingle à cheveux et s'est levé des saignements, agitant l'aide. Mais l'un a coulé devant le brouillard dans le cœur de milliers. Toute la nation ne parle de rien d'autre."
 vikelas.623.g: "Laissez la route se souvenir de ses efforts depuis des générations."
 vikelas.623.h: "Commander une peinture du moment."
 vikelas.624.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]"
 vikelas.624.d: "Les accusations ont éclaté après la dernière étape de la course. Un cavalier a été surpris en train de tricher - bien que certains affirment qu'il ne faisait que ce que tout le monde fait, juste moins discrètement."
 vikelas.624.f: "«Ils ont dit qu'il avait changé de vélo derrière la grange. D'autres disent qu'il a été remorqué sur la colline par un fil caché. '\ N \ n les faits sont floues. Ce qui est clair, c'est le suivant: le cavalier était trop rapide. Spectaculairement rapide. Trop frais après une montée brutale. Ses rivaux fumées. Les spectateurs haletent. La presse sent le sang. Une photographie montre un deuxième homme dans des vêtements assortis. Un autre témoin affirme qu'il a vu le cavalier poussé par une voiture pendant la scène nocturne. L'accusé nie tout, l'appelant l'envie et la politique."
 vikelas.624.g: "Disqualifier le cavalier et exposer la fraude."
 vikelas.624.h: "Couvrez-le pour le bien du sport."
 vikelas.625.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]"
 vikelas.625.d: "Une rivalité féroce a saisi la saison de course de cette année. Deux coureurs - égaux en force, en face de style - ont divisé la nation en deux camps."
 vikelas.625.f: "L'un est le feu: téméraire, audacieux, adoré par les jeunes. Il jette sa casquette à la foule, rit alors qu'il pédale et attaque sans avertissement. \ NLe l'autre est de la glace: calme, calculant, presque mathématique. Il sauve sa force, gagne en quelques secondes et ne parle que si nécessaire. \ N \ ntheir Les noms sont criés sur les toits. Les villes prennent parti. Les affiches sont imprimées en rouge ou en bleu. Les tailleurs vendent des bouchons à leurs couleurs. Les enfants imitent leurs positions sur des vélos en bois. \ Nthe Newspapers parlent de plus qu'une simple course. Ils parlent de caractère, de philosophie, de qui le peuple veut être. Et aucun cavalier ne donne un pouce."
 vikelas.625.g: "Cela profitera à la culture des journaux."
 vikelas.625.h: "Utilisez la rivalité à des fins politiques."
 vikelas.626.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]"
 vikelas.626.d: "Une rivalité féroce a saisi la saison de course de cette année. Deux coureurs - égaux en force, en face de style - ont divisé la nation en deux camps."
 vikelas.626.f: "«Ils l'ont trouvé dans un village forge, marteau à la main, face noirci par de la suie, seul.» \ N \ n la descente était perfide. Un coin mal jugé, un croquant de gravier - et la fourche avant se sépare. Son vélo s'est plié comme un oiseau blessé. La plupart se seraient arrêtés. Mais pas lui. \ Nhe boignait la descente, traînant le cadre des kilomètres. Dans un village isolé, il a trouvé une forge. Pas de mécanique. Pas de voiture d'équipe. Juste des soufflets, de l'Anvil et de ses deux mains. \ N pour les heures qu'il a travaillées - des manches roulées, la mâchoire se serre - en faisant enlever la fourche avant par mémoire et sensation. Lorsque les responsables sont arrivés, il ne s'arrêta que pour regarder et dire: «Ne le touchez pas. Aucune chance de victoire. Mais tout au long du parcours, les foules se sont rendues en applaudissant - non pas pour le vainqueur, mais pour celui qui a refusé de s'arrêter."
 vikelas.626.g: "Une histoire inspirante."
 vikelas.626.h: "Permettre des réparations d'urgence."
 vikelas.626.i: "L'honorez-le!"
 vikelas.401.t: "Fédération Internationale de Football Association"
 vikelas.401.d: "Aujourd'hui, l'Association internationale de football a été fondée au [GetGlobalVariable('vikelas_fifa_seat_global_var').GetStateRegion.GetCityHubName]. Son nom complet est Fédération Internationale de Football Association (FIFA)."
 vikelas.401.f: "Le 21 mai 1904, les délégués de sept nations - le Belgium, le Danemark, la France, les Pays-Bas, l'Espagne, la Suède et la Suisse - ont signé une charte. L'objectif: standardiser les règles de football, organiser des matchs internationaux et élever le jeu à un niveau mondial. Ainsi est né la Fédération Internationale de Football Association - FIFA. Au cours de ses premières décennies, la FIFA était modeste: une présidence à temps partiel, des joueurs amateurs et des différends régionaux. Mais sous la surface, un mouvement mondial a augmenté. L'Angleterre a hésité à se joindre, méfiante des interférences étrangères. Les Sud-Américains ont commencé à former leurs propres confédérations. En 1924 et 1928, les tournois olympiques ont révélé la véritable portée du football: des foules de 60 000 personnes à Paris, applaudissant et non des armées, mais des équipes."
 vikelas.401.g: "Rejoignez la FIFA et soutenez la compétition internationale."
 vikelas.411.t: "Coupe du monde de football [TimeKeeper.GetCurrentDate.Format('y')]"
 vikelas.411.d: "La FIFA a décidé que la Coupe du monde de cette année aura lieu au [SCOPE.sCountry('vikelas_fifa_host_scope').GetName]. Après le tour préliminaire, la liste des favoris est réduite à huit équipes."
 vikelas.411.f: "#V Les équipes nationales suivantes se sont qualifiées pour les quarts de finale #!\n\n[SCOPE.sCountry('vikelas_first_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_second_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_third_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_fourth_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_fifth_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_sixth_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_seventh_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_eighth_qualified_team_scope').GetName]"
 vikelas.411.g: "Que la meilleure équipe l'emporte."
 vikelas.412.t: "Champions du monde"
 vikelas.412.d: "Notre équipe a triomphé sur la scène mondiale, battant les meilleures équipes de tous les continents. À travers le pays, les célébrations éclatent!"
 vikelas.412.f: "Dans un match animé contre le [SCOPE.sCountry('vikelas_second_winner_team_scope').GetName], notre équipe s'est révélée en finale de la Coupe du monde en [SCOPE.sCountry('vikelas_fifa_host_scope').GetName]. Notre équipe nationale a levé le trophée d'or. Le coup de sifflet final résonnait à travers les radios, les cafés, les casernes. Des mineurs du nord aux commerçants du port, les gens ont rugi comme un. Le capitaine pleure sur le podium. Une nouvelle génération regarde et rêves."
 vikelas.412.g: "Nous sommes les champions."
 vikelas.413.t: "Gloire d'argent dans [SCOPE.sCountry('vikelas_fifa_host_scope').GetName]"
 vikelas.413.d: "Notre équipe de football a atteint la finale - et est tombée en deçà de Glory. À travers le pays, la fierté et le chagrin se mélangent à égalité."
 vikelas.413.f: "Malheureusement, le meilleur de notre équipe n'était pas assez bon. Dans un match angoissant contre le [SCOPE.sCountry('vikelas_first_winner_team_scope').GetName], nos hommes ont échoué. Pendant des semaines, ils ont porté les espoirs d'une nation. Dans les champs boueux et la chaleur aveuglante, ils ont couru, ils ont combattu, croyaient-ils. Match by Match, ils sont devenus des légendes. Ils ont tenu la tête haute tandis que l'autre hymne jouait. Pas de larmes, seulement du silence - puis, des applaudissements lents et croissants."
 vikelas.413.g: "Cela nous a été volés!"
 vikelas.414.t: "Le rêve se termine tôt"
 vikelas.414.d: "Notre équipe nationale a été éliminée tôt de la Coupe du Monde de la FIFA en [SCOPE.sCountry('vikelas_fifa_host_scope').GetName]. [SCOPE.sCountry('vikelas_first_winner_team_scope').GetName] a vaincu [SCOPE.sCountry('vikelas_second_winner_team_scope').GetName] dans la finale."
 vikelas.414.f: "Il y avait eu de l'espoir - un espoir tangible. Les victoires ont applaudi dans les cours d'usine, les commentaires de la radio chuchotaient dans les églises, les enfants reconstituant les objectifs dans les ruelles. L'équipe représentait plus que le football: pour l'ambition, pour la fierté, pour la croyance que nous pourrions nous lever au-dessus de nous. Mais le dernier match a tout changé. Un seul but a concédé. Un handball invisible. Une occasion manquée. Maintenant, le rêve est terminé et le monde passe à autre chose."
 vikelas.414.g: "Nous croyions. C'était suffisant."
