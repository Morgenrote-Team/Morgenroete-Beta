 vikelas.113.k: "[SCOPE.sCountry('vikelas_olympics_candidate_fallback').GetName]"
 vikelas.114.t: "Les prochains Jeux olympiques en [SCOPE.sCountry('vikelas_olympics_candidate_scope').GetNameNoFlag]"
 vikelas.114.d: "Le CIO a tranché. [SCOPE.sCountry('vikelas_olympics_candidate_scope').GetName] dispose des meilleures conditions pour accueillir les prochains Jeux Olympiques."
 vikelas.114.f: "Accueillir les Jeux Olympiques est une affaire prestigieuse. La préparation implique certains coûts, mais l'effort en vaut la peine."
 vikelas.114.g: "Rendez-vous au [SCOPE.sCountry('vikelas_olympics_candidate_scope').GetNameNoFlag] !"
 vikelas.115.g: "On se voit dans... Hé, attends une minute, c'est nous ? Hourra!"
 vikelas.116.d: "Le monde entier s'est dirigé vers [ROOT.GetCountry.GetName]. Des athlètes des nations #BLUE [GetGlobalVariable('vikelas_olympic_participants_global_var').GetValue]#! participent à cet événement international. Nous sommes fiers d'être les hôtes – que nos athlètes bénéficient de l'avantage du terrain !"
 vikelas.116.f: "« L'important aux Jeux Olympiques n'est pas de gagner, mais d'y participer ; l'important dans la Vie n'est pas le triomphe, mais la lutte ; l'essentiel n'est pas d'avoir vaincu mais d'avoir bien combattu. Diffuser ces principes, c'est construire une humanité forte, plus vaillante et surtout plus scrupuleuse et plus généreuse. -Pierre de Coubertin"
 vikelas.116.g: "Que les jeux commencent!"
 vikelas.117.d: "Le monde entier s'est dirigé vers [SCOPE.sCountry('vikelas_olympic_country').GetName]. Des athlètes des nations #BLUE [GetGlobalVariable('vikelas_olympic_participants_global_var').GetValue]#! participent à cet événement international."
 vikelas.118.d: "Nos athlètes se sont battus avec courage. Il est maintenant temps de remporter la gloire."
 vikelas.119.t: "Le Comité International Olympique"
 vikelas.119.d: "Pour revitaliser les Jeux Olympiques, [SCOPE.sCharacter('vikelas_ioc_president_scope').GetFullName] a créé un Comité International Olympique (CIO), qui sera chargé de maintenir et d'organiser une forme moderne des Jeux antiques. La décision a été prise d'héberger les premiers jeux de l'ère moderne au [ROOT.GetCountry.GetName]."
 vikelas.119.f: "Le premier CIO était principalement composé des confidents de [SCOPE.sCharacter('vikelas_ioc_president_scope').GetFullName]. Ils se répartirent en un petit cercle. Plus tard, d’autres membres du CIO les rejoindront et le groupe de personnes partageant les mêmes idées deviendra une organisation internationale. L'une des premières décisions concernait le lieu des premiers Jeux Olympiques. Puisqu’il n’existe actuellement aucun État-nation grec souverain à qui cette tâche pourrait être déléguée, il a été décidé d’accueillir les jeux dans le pays fondateur, [ROOT.GetCountry.GetName]. Après cela, le conseil désignerait un emplacement différent tous les quatre ans."
 vikelas.119.g: "Ensuite nous organisons les jeux dans nos locaux."
 vikelas.120.t: "Le Comité International Olympique"
 vikelas.120.d: "Pour revitaliser les Jeux Olympiques, [SCOPE.sCharacter('vikelas_ioc_president_scope').GetFullName] a créé un Comité International Olympique (CIO), qui sera chargé de maintenir et d'organiser une forme moderne des Jeux antiques. La décision a été prise d'héberger les premiers jeux de l'ère moderne au [SCOPE.sCountry('vikelas_olympics_candidate_scope').GetNameNoFormatting]."
 vikelas.120.f: "Le premier CIO était principalement composé des confidents de [SCOPE.sCharacter('vikelas_ioc_president_scope').GetFullName]. Ils se répartirent en un petit cercle. Plus tard, d’autres membres du CIO les rejoindront et le groupe de personnes partageant les mêmes idées deviendra une organisation internationale. L'une des premières décisions concernait le lieu des premiers Jeux Olympiques. Puisqu’il n’existe actuellement aucun État-nation grec souverain à qui cette tâche pourrait être déléguée, il a été décidé d’accueillir les jeux dans le pays fondateur, [SCOPE.sCountry('vikelas_olympics_candidate_scope').GetNameNoFlag]. Après cela, le conseil désignerait un emplacement différent tous les quatre ans."
 vikelas.120.g: "Rendez-vous au [SCOPE.sCountry('vikelas_olympics_candidate_scope').GetNameNoFlag]"
 vikelas_3_winners_loc: "Les Jeux Olympiques de cette année comptent non seulement 1 ou 2 vainqueurs mais 3 ! [GetGlobalVariable('vikelas_medal_rank_1_this_year_global_var').GetCountry.GetName], [GetGlobalVariable('vikelas_medal_rank_2_this_year_global_var').GetCountry.GetName] et [GetGlobalVariable('vikelas_medal_rank_3_this_year_global_var').GetCountry.GetName] ont tous gagné [GetGlobalVariable('vikelas_medal_rank_1_this_year_global_var').GetVariable('vikelas_gold_medals_this_year_var').GetValue|0V] @vikelas_gold_medals ! Médailles d'or."
 vikelas_2_winners_loc: "[GetGlobalVariable('vikelas_medal_rank_1_this_year_global_var').GetCountry.GetName] et [GetGlobalVariable('vikelas_medal_rank_2_this_year_global_var').GetCountry.GetName] ont tous deux [GetGlobalVariable('vikelas_medal_rank_1_this_year_global_var').GetVariable('vikelas_gold_medals_this_year_var').GetValue|0V] @vikelas_gold_medals ! Médailles d'or. Cela signifie que les deux pays abritent les meilleurs athlètes du monde."
 vikelas_1_winner_loc: "[GetGlobalVariable('vikelas_medal_rank_1_this_year_global_var').GetCountry.GetName] a dominé ces Jeux Olympiques avec [GetGlobalVariable('vikelas_medal_rank_1_this_year_global_var').GetVariable('vikelas_gold_medals_this_year_var').GetValue|0V] @vikelas_gold_medals ! Médailles d'or."
 vikelas_medal_rank_1_this_year_global_loc: "\n1. [GetGlobalVariable('vikelas_medal_rank_1_this_year_global_var').GetVariable('vikelas_gold_medals_this_year_var').GetValue|V0] - [GetGlobalVariable('vikelas_medal_rank_1_this_year_global_var').GetCountry.GetName]"
