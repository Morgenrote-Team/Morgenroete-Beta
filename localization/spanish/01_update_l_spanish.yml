 douglas.211.t: "La Cumbre" #deepl:3152681021
 douglas.211.d: "Tras una ardua ascensión, el grupo de montañeros alcanza por fin la cumbre. [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] es el primer hombre que asalta este punto de la tierra para [ROOT.GetCountry.GetNameNoFormatting]. Ahora no queda más que saborear este momento de triunfo." #deepl:2761012191
 douglas.211.f: "La primera pregunta que me haréis y que debo intentar responder es: "¿Para qué sirve escalar el Everest?" Y mi respuesta debe ser: 'Es inútil.' Puede que aprendamos algo sobre el comportamiento del cuerpo humano a gran altitud, y puede que los médicos aprovechen nuestras observaciones para la aviación. Pero por lo demás nada saldrá de ello. No traeremos ni una pizca de oro o plata, ni una gema, ni carbón o hierro. No encontraremos ni un pie de tierra que pueda ser plantado para producir alimentos. Es inútil. Así pues, si no puedes entender que hay algo en el hombre que responde al desafío de esta montaña y sale a su encuentro, que la lucha es la lucha de la vida misma hacia arriba y para siempre hacia arriba, entonces no entenderás por qué vamos. Y la alegría es, después de todo, el fin de la vida. No vivimos para comer y ganar dinero. Comemos y ganamos dinero para poder disfrutar de la vida. Eso es lo que significa la vida y para qué sirve la vida.'- George Leigh Mallory" #deepl:2116445992
 douglas.211.g: "¡Disfrutemos del amanecer!" #deepl:3916807741
 douglas.212.t: "Escalada abortada" #deepl:2889222354
 douglas.212.d: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName]El intento de nuestro alpinista de alcanzar la cima fracasa por el momento. Nuestro montañero se ve obligado a abandonar la empresa y regresar." #deepl:641296697
 douglas.212.f: "Puede haber múltiples razones por las que un escalador abandone la ascensión. A veces basta con un cambio en el tiempo; otras, un supuesto acceso a la cumbre resulta ser demasiado traicionero. A menudo, una ascensión lleva demasiado tiempo y sobrepasa un margen de tiempo porque determinadas horas del día y los cambios dificultan o imposibilitan el ascenso. Y a veces simplemente se elige el camino equivocado." #deepl:430022267
 douglas.212.g: "Decepcionante." #deepl:1131565686
 douglas.213.t: "Desastre montañero" #deepl:285221578
 douglas.213.d: "Mientras escalaba las montañas en [SCOPE.sState('douglas_location_scope').GetName], [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] cometió un terrible error, que acabó con la expedición en una catástrofe - varias personas murieron, las provisiones y el equipo cayeron con ellos. Todo el país está conmocionado." #deepl:2272067559
 douglas.213.f: "Todas las noches, ¿comprendes?, veo a mis camaradas del Cervino deslizándose de espaldas, con los brazos extendidos, uno tras otro, en perfecto orden y a igual distancia: Croz, el guía, primero, luego Hadow, después Hudson y, por último, Douglas. Sí, siempre los veré..."- Edward Whymper" #deepl:3038127729
 douglas.213.g: "¡Una tragedia!" #deepl:1503732790

