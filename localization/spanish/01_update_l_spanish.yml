 je_douglas_mountaineering_expedition: "Expedición de montañismo" #deepl:4271916428
 je_douglas_mountaineering_expedition_reason: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName], nuestro alpinista, dirige actualmente un equipo de montañeros en una expedición en [SCOPE.sState('douglas_location_scope').GetName]. El objetivo es la primera ascensión a un pico. La rapidez de la ascensión depende en gran medida de su experiencia y de sus rasgos de carácter. Dependiendo de la dificultad de la montaña, pueden surgir mayores peligros. Si la expedición no alcanza su objetivo en un plazo determinado, [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] abortará la ascensión a la cumbre. Si por cualquier motivo la expedición se adentra en el mayor peligro imaginable, ocurrirá lo peor." #deepl:488000629

