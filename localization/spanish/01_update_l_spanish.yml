 je_gaudi_custom_monument_blueprint_research_reason: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] goza de renombre mundial como uno de los arquitectos más importantes de la época [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis]. Para inmortalizar el nombre de [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis], [ROOT.Var('gaudi_architect_var').GetCharacter.GetHeShe] está trabajando en el proyecto de un monumento excepcional que hará brillar a nuestra nación en todo el mundo como centro del arte arquitectónico." #deepl:2632883859

 gaudi.81.t: "Obra maestra de arquitectos" #deepl:681011782
 gaudi.81.d: "En los últimos años, [THIS.GetCountry.GetName] se ha convertido en una de las naciones líderes en el campo de la arquitectura. [ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] ha desempeñado un papel importante en este desarrollo. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] aceptó el encargo de diseñar un monumento que rivalizara con las grandes maravillas de las épocas antigua, medieval y moderna." #deepl:2672646441
 gaudi.81.f: "El Monumento al Arquitecto se basa en el estilo preferido del Gran Arquitecto:\nLos Arquitectos Art Decó diseñarán el [GetBuildingType('building_gaudi_people_monument').GetName].\nLos Arquitectos Bauhaus ofrecerán el [GetBuildingType('building_gaudi_forum_monument').GetName].\nLos Arquitectos Neoclásicos crearán el [GetBuildingType('building_gaudi_people_palace').GetName]." #deepl:4088582525
 gaudi.81.g: "Magnífico." #deepl:573443058

