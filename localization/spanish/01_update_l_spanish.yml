 gaudi.11.t: "Selección de planos: Monumento de la ciudad" #deepl:3177181239
 gaudi.11.d: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName], el arquitecto más importante de nuestro país, ha asumido la importante tarea de diseñar un anteproyecto para un nuevo edificio. La cuestión sigue siendo ¿Qué tipo de edificio debe diseñarse?" #deepl:1652669912
 gaudi.11.f: "A [GetBuildingType('building_gaudi_statue').GetName] aumenta la #G legitimidad del gobierno#!. Se requiere [GetTechnology('elgar_classicism_tech').GetName].\nA [GetBuildingType('building_gaudi_fountain').GetName] mejora el #G nivel de vida#! del estado en el que se encuentra.\nA [GetBuildingType('building_gaudi_arch').GetName] reducirá #G la pérdida de moral#! de las tropas combatientes. Se requiere [GetTechnology('napoleonic_warfare').GetName]." #deepl:2246128148
 gaudi.11.g: "La Estatua." #deepl:2708296858
 gaudi.11.h: "La Fuente." #deepl:320933070
 gaudi.11.i: "El Arco de Triunfo." #deepl:1127411794
 gaudi.12.t: "Selección de planos: Plaza Pública" #deepl:3080738332
 gaudi.12.f: "Un [GetBuildingType('building_gaudi_park').GetName] #G  disminuirá la contaminación#!.\nUn [GetBuildingType('building_gaudi_luna').GetName] mejora #G los ingresos fiscales#! del estado en el que se encuentra. [GetTechnology('curtiss_tourism_tech').GetName] es necesario.\nUn [GetBuildingType('building_gaudi_parade').GetName] tiene un efecto positivo en #G las tasas de reclutamiento#!. [GetTechnology('nationalism').GetName] es necesario." #deepl:4066407048
 gaudi.12.g: "El Parque Público." #deepl:2494674221
 gaudi.12.h: "El Luna Park." #deepl:971224439
 gaudi.12.i: "El patio de armas." #deepl:1574323515
 gaudi.13.t: "Selección de planos: Plaza Pública" #deepl:3080738332
 gaudi.13.f: "Un [GetBuildingType('building_gaudi_almshouse').GetName] #G  atraerá emigrantes#!. [GetTechnology('egalitarianism').GetName] es necesario.\nUn [GetBuildingType('building_gaudi_school').GetName] mejora #G el acceso a la educación#! del estado en el que se encuentra. [GetTechnology('empiricism').GetName] es necesario.\nUn [GetBuildingType('building_gaudi_prison').GetName] #G  disminuirá la agitación#!. [GetTechnology('law_enforcement').GetName] es necesario." #deepl:1220690443
 gaudi.13.g: "Limosnería del Estado." #deepl:10701147
 gaudi.13.h: "La Escuela del Estado." #deepl:781611903
 gaudi.13.i: "La prisión estatal." #deepl:2831404965
 gaudi.14.t: "Selección de planos: Salud Pública" #deepl:1830009383
 gaudi.14.f: "Un [GetBuildingType('building_gaudi_canalization').GetName] dará al estado #G inmunidad contra el cólera, la fiebre amarilla y la peste#!. Se requiere [GetTechnology('modern_sewerage').GetName].\nUn [GetBuildingType('building_gaudi_hospital').GetName] mejora la #G tasa de natalidad#! del estado en el que se encuentra. Se requiere [GetTechnology('theiler_microbiology_tech').GetName].\nUn [GetBuildingType('building_gaudi_health').GetName] disminuirá #G la intensidad de las enfermedades#!. Se requiere [GetTechnology('pharmaceuticals').GetName]." #deepl:3694299428
 gaudi.14.g: "El sistema de alcantarillado." #deepl:4218293714
 gaudi.14.h: "El Hospital Universitario." #deepl:2453533946
 gaudi.14.i: "El Departamento de Sanidad." #deepl:1923211910
 gaudi.15.t: "Selección de planos: Academia Nacional" #deepl:4003607718
 gaudi.15.f: "A [GetBuildingType('building_gaudi_science').GetName] impulsará nuestro #G progreso académico mensual#!. [GetTechnology('dialectics').GetName] es necesario.\nA [GetBuildingType('building_gaudi_arts').GetName] impulsará nuestro #G progreso artístico mensual#!. [GetTechnology('romanticism').GetName] es necesario.\nA [GetBuildingType('building_gaudi_sports').GetName] impulsará #G la experiencia de nuestros deportistas#!. [GetTechnology('organized_sports').GetName] es necesario." #deepl:1533132803
 gaudi.15.g: "La Academia de Ciencias." #deepl:1181583251
 gaudi.15.h: "La Academia de las Artes." #deepl:369638717
 gaudi.15.i: "La Academia del Deporte." #deepl:1127570803
 gaudi.11.j: "No se necesita un nuevo proyecto." #deepl:4175354043

 gaudi.16.t: "Un nuevo plan" #deepl:4025940977
 gaudi.16.d: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] ha terminado hoy su trabajo sobre el anteproyecto y se lo ha entregado al cliente." #deepl:3235089264
 gaudi.16.f: "La ornamentación es trabajo malgastado y, por tanto, salud malgastada. Hoy en día, también significa material desperdiciado, y ambos significan capital desperdiciado. El hombre moderno, el hombre con nervios modernos, no necesita ornamentos; los aborrece". -Adolf Loos" #deepl:1476970686
 gaudi.16.g: "¡Un edificio nuevo!" #deepl:1359643446

