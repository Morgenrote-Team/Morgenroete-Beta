 gaudi.35.t: "Barrio Art Nouveau de [SCOPE.sState('gaudi_art_nouveau_quarter_state').GetCityHubName]" #deepl:1088148255
 gaudi.35.d: "El nuevo desarrollo artístico no se ha detenido en [SCOPE.sState('gaudi_art_nouveau_quarter_state').GetCityHubName]: se están construyendo nuevos edificios Art Nouveau en un barrio que ahora se considera de vanguardia." #deepl:3696139674
 gaudi.35.f: "El debut de la arquitectura Art Nouveau en Bruselas vino acompañado de una oleada de Arte Decorativo en el nuevo estilo. Entre los artistas más destacados se encuentran Gustave Strauven, que utiliza el hierro forjado para conseguir efectos barrocos en las fachadas bruselenses; el diseñador de muebles Gustave Serrurier-Bovy, conocido por sus originales sillas y muebles de metal articulado; y el diseñador de joyas Philippe Wolfers, que fabrica joyas en forma de libélulas, mariposas, cisnes y serpientes. El estilo no tardó en calar en la vecina Francia. Tras visitar el Hôtel Tassel de Horta, Hector Guimard construyó el Castel Béranger, uno de los primeros edificios parisinos del nuevo estilo. Los parisinos acogieron con satisfacción el estilo original y pintoresco de Guimard; el Castel Béranger fue elegido como una de las mejores fachadas nuevas de París, lanzando la carrera de Guimard. La Exposición Universal de París de 1900 marcó el punto álgido del Art Nouveau. Entre abril y noviembre de 1900, atrajo a casi cincuenta millones de visitantes de todo el mundo y mostró la arquitectura, el diseño, la cristalería, el mobiliario y los objetos decorativos del estilo. Aunque la Exposición de París fue, con diferencia, la más importante, otras exposiciones contribuyeron en gran medida a popularizar el estilo." #deepl:3102882922
 gaudi.35.g: "Una nueva cultura vibrante." #deepl:3379987285

 gaudi.22.t: "Líneas y medidas" #deepl:2020920879
 gaudi.22.d: "Nuestro arquitecto regresa, esta vez con una vara de agrimensor en la mano y nuevos ojos para el terreno." #deepl:505021070
 gaudi.22.f: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] antes se contentaba con esbozar fachadas en las plazas, trazar sombras y ornamentos. Ahora [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] traza líneas en la tierra.\nEn sus viajes a [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis], [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] abandonó las ciudades por el interior. En las tierras salvajes de Galicia, en las marismas del delta del Po y a través de los tramos ferroviarios de las Midlands, [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] caminó con ingenieros, agricultores y capataces. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] aprendió a leer el terreno como otros leen las escrituras. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] habla ahora de pendientes y puntos geodésicos. Los cuadernos de [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U] no están llenos de florituras, sino de ángulos, alturas y distancias medidas al milímetro. Algunos dicen que [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] se ha vuelto árido, demasiado exigente, demasiado rígido. Pero cuando [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] mira a través de un campo vacío, [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] ya ve por dónde podrían discurrir las avenidas." #deepl:3503840059
 gaudi.22.g: "Un edificio comienza mucho antes de que se coloque la primera piedra." #deepl:960677900
 gaudi.23.t: "El arquitecto que cuenta" #deepl:2805524520
 gaudi.23.d: "Tras dos años de estudio, nuestro arquitecto regresa -[ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] mente más aguda, [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] dibujos más extraños." #deepl:3720893
 gaudi.23.f: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] antes esbozaba por instinto. Ahora [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] esboza por lógica.\n[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] pasó [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] tiempo no entre albañiles o constructores, sino en aulas. París, Gotinga, incluso San Petersburgo. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] se sentaba bajo pizarras llenas de símbolos, estudiaba con hombres que no construían nada con las manos, sino todo con la mente. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] habla ahora de simetría, de módulo, de curvas de carga descritas mediante elegantes fórmulas. [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U] los nuevos planos son austeros, extraños, casi ajenos a su precisión. A algunos les parecen fríos, inhumanos. Pero entonces [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] lo explica: la belleza de una cúpula no está en su decoración, sino en la perfección de su curva. Los funcionarios no saben qué hacer con [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHim]. [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U] Los colegas susurran que no es práctico. Pero otros -especialmente los jóvenes- escuchan." #deepl:796837829
 gaudi.23.g: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] construye lo que otros sólo imaginan." #deepl:2581034432
 gaudi.24.t: "El papel antes que la piedra" #deepl:3533867777
 gaudi.24.d: "Nuestro arquitecto no vuelve con herramientas ni ecuaciones, sino con sellos, firmas y una red de funcionarios." #deepl:223531508
 gaudi.24.f: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] En dos años en el extranjero, [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] no se limitó a estudiar arquitectura:[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] estudió administración. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] aprendió cómo un proyecto vive o muere no por el diseño, sino por decreto. En Viena, [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] observó el trabajo de los ministerios; en Bruselas, [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] siguió de cerca a los funcionarios encargados de los permisos; en Marsella, [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] asistió a reuniones del consejo en las que las alcantarillas decidían el horizonte.\n\nAhora, de vuelta en casa, [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] sabe qué documentos presentar y cuándo, qué normativa citar, a quién adular y a quién ignorar. Las normas, dice [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe], no son muros sino andamios: se pueden mover, suavizar, replantear. Y, de algún modo, los permisos llegan más rápido que nunca." #deepl:3047390249
 gaudi.24.g: "Toda gran estructura comienza con un formulario firmado." #deepl:3498658136
 gaudi.25.t: "El Arquitecto Regresa... Eventualmente" #deepl:2911431628
 gaudi.25.d: "Nuestro arquitecto ha regresado por fin de [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] grand tour. Nadie sabe a ciencia cierta qué trae [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe], salvo historias." #deepl:3640320352
 gaudi.25.f: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] vuelve con cigarritos y anécdotas. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] tiene nombres que soltar, opiniones que dar y deudas que [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] finge no recordar.\n[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] habla bonito, incluso convincente-de estructuras que [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] nunca midió. Cuando se le piden planes, [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] cambia de tema. Cuando se le pregunta por los resultados, [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] sonríe y asegura que la brillantez no se puede precipitar. Algunos dicen que [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] es un fraude. Otros llaman a [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHim] un genio incomprendido. ¿La verdad? Probablemente en algún lugar entre un café de Trieste y un tren perdido en Nápoles." #deepl:3339735037
 gaudi.25.g: "¡¿Qué ha hecho [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] todo este tiempo?!" #deepl:3328871879
 gaudi.26.t: "A la sombra de un maestro" #deepl:1494314704
 gaudi.26.d: "Nuestro arquitecto regresa más sabio, más firme y con la impronta de un gran maestro." #deepl:2040369888
 gaudi.26.f: "Mientras otros viajaban mucho, [ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] optó por la profundidad frente a la distancia. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] pasó la mayor parte de sus años bajo la guía de una sola figura: un anciano arquitecto de legendaria reputación. No sólo en las aulas, sino también en los andamios y en silencio, [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] aprendió a ver la estructura detrás del ornamento, la intención detrás de la fachada. [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U] las líneas se volvieron más limpias. [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U] la mirada más crítica. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] no sólo aprendió a construir, sino también por qué. Se ha corrido la voz de la tutoría de [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] antes que [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHim]. Los jóvenes aprendices ya buscan a [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHim], y los funcionarios de la ciudad le saludan con una deferencia inesperada. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] vuelve como alguien marcado por la continuidad, por la tradición y, quizá algún día, por el legado." #deepl:833263334
 gaudi.26.g: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] lleva el peso de la sabiduría de otro hombre" #deepl:1891012360

