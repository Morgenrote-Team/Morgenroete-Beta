 gaudi.82.d: "Tras meses de preparación, [ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] ha presentado planos, cálculos, estadísticas y una maqueta artesanal. [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U] ambicioso monumento se considera ya un sueño del arte arquitectónico. La única pregunta que queda es: ¿quién hará realidad este sueño?" #deepl:1546320616
 gaudi.82.f: "Mañana haremos cosas bellas". -Antoni Gaudí" #deepl:3107908861
 gaudi.82.g: "Un monumento a nosotros mismos." #deepl:3586195485

