 je_gaudi_capital_expansion_project: "Ampliación de capital" #deepl:4033066520
 je_gaudi_capital_expansion_project_reason: "Entre 1836 y 1936, las capitales victorianas experimentaron profundas transformaciones urbanas. París fue remodelada por los amplios bulevares y las vistas axiales de Haussmann. Viena demolió sus murallas en 1857 y las sustituyó por la gran Ringstraße. Berlín se expandió rápidamente con bloques de pisos, barrios industriales y, más tarde, urbanizaciones modernistas. Londres se expandió hacia el exterior con suburbios ferroviarios, proyectos de infraestructuras y el primer metro del mundo. En todo el continente europeo, las ciudades reales se convirtieron en metrópolis modernas, monumentos de poder, ambición y crecientes tensiones sociales." #deepl:4052914498

 gaudi.41.t: "Una ciudad sin fronteras" #deepl:1231776512
 gaudi.41.d: "Los viejos muros caen. En su lugar, aire, luz y la promesa de crecer." #deepl:2117769530
 gaudi.41.f: "Durante siglos, [ROOT.GetCountry.GetCapital.GetCityHubName] había sido una cosa amurallada: orgullosa, compacta y cerrada sobre sí misma. Pero ahora, la mampostería cae a pico y polvo.\nLas fortificaciones medievales han sido demolidas. En su lugar se levantan amplios bulevares, bordeados de árboles y fachadas nobles. Los carros del mercado y las parejas que pasean pisan ahora por donde antes desfilaban los guardias. Los bulevares son más que carreteras: son declaraciones de confianza, de expansión, de un futuro demasiado grande para ser contenido. Pero [ROOT.GetCountry.GetCapital.GetCityHubName] ha respirado hondo por primera vez." #deepl:4076900735
 gaudi.41.g: "Construimos hacia fuera con visión y vigor" #deepl:1116241139
 gaudi.42.t: "El anillo del progreso" #deepl:3156235256
 gaudi.42.d: "Un nuevo anillo de bulevares une la ciudad y el Estado." #deepl:3367270166
 gaudi.42.f: "Donde antes había terraplenes fangosos, ahora imperan la piedra y el hierro. La gran avenida se curva como un collar alrededor del corazón de [ROOT.GetCountry.GetCapital.GetCityHubName], uniendo sus distritos en movimiento y luz. Se redibujaron manzanas enteras, se esculpieron parques, se enmarcaron monumentos en perfecta perspectiva. Las farolas de gas florecen al anochecer como estrellas ordenadas. Con cada metro pavimentado, [ROOT.GetCountry.GetCapital.GetCityHubName] se hace más legible, más imperial. ¿Y la gente? Pasean contemplando estatuas que nunca habían visto, por calles por las que antes temían caminar." #deepl:3543082084
 gaudi.42.g: "Un anillo no de defensa, sino de dirección." #deepl:2497263912
 gaudi.43.t: "Vías de autoridad" #deepl:4104296278
 gaudi.43.d: "El nuevo prefecto da nueva forma a [ROOT.GetCountry.GetCapital.GetCityHubName], eje a eje. Ancho, recto y totalmente inflexible." #deepl:2867872335
 gaudi.43.f: "Esto no es expansión. Es cirugía. Barrios enteros caen bajo la brújula y el plan. Las calles se esculpen como bulevares a través de barrios que antes parecían mazmorras. Los viejos callejones desaparecen. En su lugar surgen líneas largas y rectas que conducen siempre a un monumento, un cuartel o un ministerio. Se crea resistencia, pero se firman permisos, se expropian casas y se alinean fachadas. [ROOT.GetCountry.GetCapital.GetCityHubName] habla ahora el lenguaje del orden: visibilidad, circulación, control. Detrás de la grandiosidad se esconde la intención. Los funcionarios lo llaman "Modernización". El Prefecto lo llama necesario." #deepl:4133801679
 gaudi.43.g: "Que nadie escape al plan" #deepl:2017759053
 gaudi.44.t: "El horizonte metropolitano" #deepl:3803938371
 gaudi.44.d: "[ROOT.GetCountry.GetCapital.GetCityHubName] ya no es sólo una capital. Se está convirtiendo en el mundo en miniatura." #deepl:101717450
 gaudi.44.f: "La ciudad antigua tenía bordes. El acero y el cristal se abren paso donde antes dominaba la piedra. Las vías del tren se cruzan bajo los jardines públicos. Las luces eléctricas desdibujan los límites entre el crepúsculo y el amanecer. Embajadas, bancos, galerías y cafés florecen como orquídeas en el invernadero de hierro de una nueva era. Los rascacielos desafían a las catedrales. [ROOT.GetCountry.GetCapital.GetCityHubName] ya no pide permiso para crecer: espera liderar. De cada distrito emerge una única verdad: ésta ya no es la ciudad de una nación. Es una ciudad de naciones." #deepl:3494578230
 gaudi.44.g: "Nos levantamos, porque el mundo ya mira." #deepl:1129952378

 gaudi_capital_expansion_project_progress_bar: "Ampliación de capital" #deepl:4033066520
 gaudi_capital_expansion_project_progress_bar_desc: "Ampliación de capital: #v [JournalEntry.GetCurrentBarProgress(ScriptedProgressBar.Self)|1%] #! ([JournalEntry.GetCurrentBarValue(ScriptedProgressBar.Self)|0]/30)" #deepl:707314599

 gaudi.511.d: "A la hora de embellecer [ROOT.GetCountry.GetCapital.GetCityHubName], se produjo un desacuerdo en la planificación urbanística." #deepl:2161912626
 gaudi.512.t: "Estatuas en la carretera de circunvalación" #deepl:1070850347
 gaudi.512.d: "Se va a erigir un nuevo grupo de figuras en la nueva carretera de circunvalación de [ROOT.GetCountry.GetCapital.GetCityHubName], pero no está claro qué figura mitológica ocupará un lugar especial." #deepl:275330526
 gaudi.513.f: "Se iba a construir un nuevo ministerio como buque insignia del gobierno, pero los constantes cambios de planes, la ampliación y la corrupción latente han hecho que la construcción del edificio se haya alargado y se hayan utilizado todos los fondos hasta su finalización. El edificio inacabado podría ponerse en estado funcional con algunas medidas provisionales, pero probablemente esto no convenga al gobierno, que tendría que contentarse con oficinas más pequeñas y menos confortables de lo esperado. Es posible seguir construyendo, pero probablemente será caro." #deepl:3580582680

 gaudi.511.t: "¿Fuente o pabellón?" #deepl:2151137688
 gaudi.511.f: "Se podría confundir con una disputa sobre la barba del emperador: de una petitesse ha surgido una disputa política tangible. Se trata de un proyecto de construcción en una plaza representativa de gran valor estético. Una facción quiere construir allí un pabellón para descansar, la otra aboga por la construcción de una fuente. Como sólo hay una parcela, sólo se puede construir uno de los proyectos; un compromiso es inviable." #deepl:1541667756
 gaudi.511.g: "Construimos el pabellón." #deepl:2064679099
 gaudi.511.h: "Construimos la fuente." #deepl:2431357846
 gaudi.511.i: "Tengo mis propios planes para este lugar..." #deepl:53271135
 gaudi.512.f: "A la hora de planificar la carretera de circunvalación, algunos detalles siguen sin estar claros. Aún no se ha determinado qué figuras se colocarán en un lugar destacado. Está claro que deben ser figuras del panteón romano. Ciertos sectores de la población se identifican con las respectivas figuras; por ejemplo, los capitalistas han sugerido colocar en el centro a Mercurio, el dios del comercio. Los aristócratas, en cambio, insisten en Júpiter, el padre de los dioses. Los militares prefieren a Marte, y los académicos a Apolo en el centro." #deepl:3457913174
 gaudi.512.g: "Júpiter." #deepl:641978563
 gaudi.512.h: "Mercurio." #deepl:4064282680
 gaudi.512.i: "Apolo." #deepl:2704921915
 gaudi.512.j: "Marte." #deepl:4251022611
 gaudi.513.t: "El edificio del Ministerio supera su coste" #deepl:3536337121
 gaudi.513.d: "La construcción de un nuevo edificio ministerial se está convirtiendo en un pequeño escándalo." #deepl:3745484689
 gaudi.513.g: "Había un presupuesto y ese presupuesto debe respetarse." #deepl:2982007153
 gaudi.513.h: "Esto es lamentable, pero habitual en este campo." #deepl:3799202878
 gaudi.513.i: "Este proyecto debe recibir todo el dinero y el tiempo que necesite." #deepl:3703152475
 gaudi.514.t: "Nueva cafetería" #deepl:760472506
 gaudi.514.d: "Un nuevo café ha abierto sus puertas en la Ringstrasse." #deepl:977697169
 gaudi.514.f: "El café sigue siendo nuestro mejor lugar para aprender todo lo nuevo. Para entender esto, hay que saber que el café vienés es una institución de un tipo especial que no puede compararse con ninguna institución similar en el mundo. En realidad, se trata de una especie de club democrático, accesible a todo el mundo por una taza de café barato, donde por esta módica cantidad cada invitado puede sentarse durante horas, discutir, escribir, jugar a las cartas, recibir su correo y, sobre todo, consumir un número ilimitado de periódicos y revistas. Todos los periódicos vieneses estaban disponibles en un café vienés mejor, y no sólo los vieneses, sino los de todo el Reich alemán, francés, inglés, italiano y americano, así como todas las revistas literarias y artísticas importantes del mundo. Así que sabíamos de primera mano todo lo que ocurría en el mundo, nos enterábamos de cada libro que se publicaba, de cada representación, dondequiera que tuviera lugar, y comparábamos las críticas de todos los periódicos. Quizá nada contribuyera tanto a la flexibilidad intelectual y a la orientación internacional del austriaco como el hecho de poder orientarse tan exhaustivamente sobre todos los acontecimientos del mundo en el café y, al mismo tiempo, discutirlos en círculos de amigos. Nos sentábamos allí durante horas todos los días, y no nos perdíamos nada". - Stefan Zweig" #deepl:1426019469
 gaudi.514.g: "[SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('gaudi_ruler').GetFullName] deberían visitarlo." #deepl:3567062403
 gaudi.514.h: "Esto elevará el nivel de vida en Viena." #deepl:993415000
 gaudi.515.t: "Palacio de la Circunvalación" #deepl:2889767777
 gaudi.515.d: "Un noble se ha excedido en la construcción de un palacio en el distrito de la ciudad nueva de [ROOT.GetCountry.GetCapital.GetCityHubName]. La ruina del edificio a medio terminar amenaza con convertirse en un adefesio." #deepl:3082201997
 gaudi.515.f: "Ring Road Palace es el término con el que se conoce a los magníficos palacios de la Ringstrasse de Viena. Estos edificios fueron construidos en su mayoría por la antigua nobleza o por banqueros e industriales a finales del siglo XIX. Los palacios se construyeron en una mezcla de estilo neobarroco y neorrenacentista, o neomanierismo. Eran también un símbolo de ascenso y estatus. Sin embargo, uno de los constructores se ha excedido recientemente y se enfrenta a la quiebra. La gente ya se burla del adefesio, que en el peor de los casos tendría que ser demolido de nuevo, lo que alargaría la finalización de todo el proyecto." #deepl:2482976903
 gaudi.515.g: "Compartimos los costes." #deepl:1778759255
 gaudi.515.h: "Eso no es asunto nuestro." #deepl:2515722656
 gaudi.516.t: "Ampliación de capital: Buen progreso" #deepl:3725304670
 gaudi.516.d: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] ha declarado que la ampliación de capital podría completarse antes." #deepl:1876608469
 gaudi.516.f: "Por razones desconocidas, todo progresa más deprisa: puede que sea el amor a la patria, los altos salarios, el apoyo amistoso de las élites locales o simplemente el mejor clima." #deepl:771529955
 gaudi.516.g: "Maravilloso." #deepl:1621308786
 gaudi.517.t: "Ampliación de capital: Avances lentos" #deepl:4246146058
 gaudi.517.d: "Por desgracia, la dirección de obras de [ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] ha tenido que admitir hoy que la construcción de un nuevo distrito en [ROOT.GetCountry.GetCapital.GetCityHubName] lleva retraso." #deepl:984753109
 gaudi.517.f: "Por razones desconocidas, todo avanza más lentamente: ya sea la agitación de elementos políticos hostiles, el debilitamiento de la ética del trabajo por los sindicatos, una conspiración de los Illuminati o simplemente el mal tiempo." #deepl:967308050
 gaudi.517.g: "Lamentable." #deepl:1477108256
 gaudi.518.t: "Monumento a [SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('gaudi_ruler').GetFullName]" #deepl:4291665084
 gaudi.518.d: "Se proyecta un nuevo monumento para la Ringstrasse: se trata de una estatua de nuestro Rey [SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle]." #deepl:642834231
 gaudi.518.f: "La Ringstrasse sirvió para ilustrar la historia austriaca. Por un lado, se inmortalizó la larga sucesión de monarcas de la familia reinante de los Habsburgo, de los cuales María Teresa recibió el monumento más opulento. Pero también generales como Eugen von Savoyen o Schwarzberg enriquecieron el paisaje urbano vienés. La burguesía, por su parte, concedió gran importancia a la inmortalización de sus exponentes, a saber, los príncipes poetas Goethe y Schiller, pero también los grandes compositores Schubert, Mozart y Beethoven." #deepl:795951503
 gaudi.518.g: "Es bueno ser el [SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle]." #deepl:2477877691
 gaudi.518.h: "Encantador, pero céntrate en completar la Ringstrasse." #deepl:1336009648
 gaudi.519.t: "¡Fuego!" #deepl:3279516897
 gaudi.519.d: "Un devastador incendio destruyó varios edificios de una obra en construcción en [ROOT.GetCountry.GetCapital.GetCityHubName]." #deepl:603406045
 gaudi.519.f: "La catástrofe más conocida en la carretera de circunvalación fue el incendio del Ringtheater el 8 de diciembre de 1881. Es una de las mayores catástrofes del siglo XIX. Se calcula que hubo cientos de víctimas, si no más de mil. La causa fue un fallo en la iluminación de gas, que provocó que el gas se escapara y explotara la siguiente vez que se intentó encender. El fuego resultante se propagó a los trenes de fondo antes de extenderse rápidamente al resto del escenario y, finalmente, al auditorio. El incendio tuvo repercusiones nacionales e internacionales en la protección preventiva contra incendios, especialmente en la zona del teatro, y en las correspondientes disposiciones legales para la construcción de teatros en Austria. El compositor Anton Bruckner, que tenía entradas para la representación de la noche, sólo escapó a la muerte quedándose en casa porque se encontraba indispuesto." #deepl:1763422665
 gaudi.519.g: "Un día terrible." #deepl:3953408834
 gaudi.520.t: "Prejuicios contra la ampliación de la ciudad" #deepl:3932558777
 gaudi.520.d: "Los representantes de la población rural ven el desarrollo de [ROOT.GetCountry.GetCapital.GetCityHubName] como una desventaja para la población rural común." #deepl:3359656956
 gaudi.520.f: "'El Gobierno deja claro con su incalificable fanfarronería en la capital que está formado por urbanitas distantes que sólo piensan a unas calles de distancia y que nunca han salido de [ROOT.GetCountry.GetCapital.GetCityHubName]. Allí se despilfarran enormes sumas que sólo llegan a la capital, pero de las que la gente común del campo en las pequeñas ciudades o pueblos no se da cuenta de nada. La ideología que hay detrás favorece el centralismo, favorece la burocracia, favorece y ayuda al aparato estatal; pero ¿qué perspectiva ofrece al hombre común un proyecto tan decadente?"." #deepl:2119590629
 gaudi.520.g: "¿Qué tal un regalo amistoso en beneficio de la trabajadora población rural?" #deepl:1425408969
 gaudi.520.h: "Ciudad y provincia son iguales." #deepl:154752402
 gaudi.520.i: "¿A quién le importa esta estúpida charla de granjeros?" #deepl:1424618973
 gaudi.521.t: "Residencia de industriales" #deepl:1054941492
 gaudi.521.d: "Un rico hombre de negocios hizo construir un nuevo palacio y enriqueció así [ROOT.GetCountry.GetCapital.GetCityHubName] con un gran edificio." #deepl:2324185893
 gaudi.521.f: "Los palacios de industriales y banqueros se consideraban una forma de enfatizar su nueva posición en el Estado. Los ricos de origen judío también podían destacar su emancipación. El desarrollo de Viena en el siglo XIX es un buen ejemplo de ello. Uno de los palacios más famosos de la circunvalación es el Palacio Epstein. Fue construido para el industrial y banquero Gustav Ritter von Epstein. El arquitecto fue Theophil Freiherr von Hansen, que también diseñó el edificio adyacente del Parlamento austriaco. Tiene hasta cinco pisos de altura y está construido en el estilo neorrenacentista típico de su época." #deepl:2653721730
 gaudi.521.g: "[ROOT.GetCountry.GetCapital.GetCityHubName] está creciendo y prosperando." #deepl:2259204183
 gaudi.522.t: "Ampliación del cuartel" #deepl:3408528723
 gaudi.522.d: "La ampliación de [ROOT.GetCountry.GetCapital.GetCityHubName] ofrece la oportunidad de modernizar y ampliar los barracones." #deepl:933440251
 gaudi.522.f: "El Cuartel Franz-Josephs fue un edificio cuartelario vienés situado en la actual zona de la Ringstrasse y durante mucho tiempo un obstáculo para la construcción del proyecto a gran escala. El cuartel debe su nombre al emperador Francisco José I y fue construido entre 1854 y 1857 a raíz de la revolución de 1848. Poco después de su construcción, el cuartel obstaculizó el desarrollo de la Ringstrasse de Viena, que comenzó en 1857, pero tuvieron que pasar cuatro décadas para que el ejército volviera a mudarse de aquí. Por tanto, hubo que construir antes nuevos cuarteles para absorber la pérdida del cuartel Franz Joseph." #deepl:4162429863
 gaudi.522.g: "Amplía los barracones." #deepl:2381627455
 gaudi.522.h: "Mejor invirtamos el tiempo en otra cosa." #deepl:3269234038
 gaudi.523.t: "Ampliar el sector de la construcción" #deepl:2392547084
 gaudi.523.d: "La expansión de [ROOT.GetCountry.GetCapital.GetCityHubName] ofrece la oportunidad de ampliar el sector de la construcción. " #deepl:3106227577
 gaudi.523.f: "Generalmente llamamos naturaleza del artista a la suma de cualidades que le impiden producir". - Arthur Schnitzler" #deepl:2115168723
 gaudi.523.g: "Ampliar la oficina de construcción." #deepl:771559939
 gaudi.524.t: "Un parque maravilloso" #deepl:3707211248
 gaudi.524.d: "[ROOT.GetCountry.GetCapital.GetCityHubName]El nuevo parque de la ciudad está terminado y abierto a todos los ciudadanos para pasear." #deepl:2209166008
 gaudi.524.f: "Las puertas del nuevo Stadtpark se abren. El césped se extiende como terciopelo. Los caminos se curvan entre parterres y estatuas. Pero lo que más atrae a la gente no es el césped, sino el sonido. Un quiosco de música, una pequeña orquesta, un vals a la deriva en la brisa. La música pública, antaño reservada a salones y palacios, llena ahora el aire para que la oiga todo el mundo. En ciudades como Viena, el Kursalon se había convertido en un templo cívico de la melodía. El magnífico edificio de estilo renacentista italiano está situado en la Johannesgasse y dispone de una amplia terraza en el parque. En la época de los hermanos Strauss, el Kursalon era un lugar popular para bailar y dar conciertos." #deepl:556984663
 gaudi.524.g: "Demos un paseo." #deepl:3870101360
 gaudi.524.h: "¡Celebrémoslo con un concierto!" #deepl:3249539672
 gaudi.525.t: "Ampliar la ópera" #deepl:3647447347
 gaudi.525.d: "La ampliación de [ROOT.GetCountry.GetCapital.GetCityHubName] ofrece la oportunidad de modernizar y ampliar la ópera." #deepl:1640821642
 gaudi.525.f: "En medio de bulevares y arcadas, fuentes y ministerios, la ópera existente empieza a parecer modesta, incluso provinciana. La propuesta: una nueva estructura o una gran ampliación. Más asientos, mejor acústica, fachadas monumentales. Un templo de la cultura a la altura de la ciudad. En toda Europa, estos gestos se han convertido en símbolos de prestigio nacional. En París, la Ópera Garnier se alza con escaleras de mármol y techos dorados. En Viena, la Staatsoper, inaugurada en 1869, ancla la Ringstraße con elegancia y orgullo." #deepl:2327891128
 gaudi.525.g: "Ampliar la ópera." #deepl:4005131669
 gaudi.526.t: "Ampliación del Ayuntamiento" #deepl:857877700
 gaudi.526.d: "La ampliación de [ROOT.GetCountry.GetCapital.GetCityHubName] ofrece la oportunidad de modernizar y ampliar el Ayuntamiento." #deepl:3575590115
 gaudi.526.f: "El antiguo ayuntamiento conserva el escudo de armas de otro siglo. Dentro: escaleras estrechas, oficinas abarrotadas y libros de contabilidad apilados más altos que el arrimadero. El escritorio del alcalde apenas es lo bastante grande para su papeleo, por no hablar del poder. Ahora la propuesta: un nuevo Ayuntamiento que refleje el creciente papel de la ciudad en el gobierno, la economía y la identidad cívica. En cualquier caso, debe ser una señal de autoridad. En toda Europa, las ciudades se han enfrentado a este reto. En Viena, el neogótico Rathaus (terminado en 1883) se convirtió en un símbolo de confianza municipal. París restauró su Hôtel de Ville después de 1871 con grandeza y desafío. El Rotes Rathaus de Berlín surgió como una fusión de la forma renacentista y la función prusiana." #deepl:2422046000
 gaudi.526.g: "Ampliar el ayuntamiento." #deepl:5728920
 gaudi.527.t: "Heldenplatz" #deepl:959071592
 gaudi.527.d: "Tras la finalización de la Heldenplatz (Plaza de los Héroes), algunas destacadas personalidades políticas presionan para que la inauguración sea digna." #deepl:1468121085
 gaudi.527.f: "Cuando se construyó la Ringstrasse, la "Burgplatz exterior" fue diseñada bajo el mandato del emperador Francisco José como parte del Kaiserforum, que nunca llegó a completarse. El plan consistía en crear una plaza rectangular que estaría enmarcada por el Ala Leopoldina, el Nuevo Hofburg, las Colecciones de los Habsburgo y por un homólogo del Castillo Nuevo que nunca llegó a construirse en el emplazamiento del Volksgarten. El nombre de Heldenplatz se fijó en 1878; procede de los dos monumentos ecuestres, ambos de Anton Dominik Fernkorn. El más antiguo es el del archiduque Karl, inaugurado en 1860. Su homóloga, la estatua ecuestre del príncipe Eugenio, también se terminó en 1865. Tras la I Guerra Mundial, el colapso de la monarquía dual austrohúngara bajo el dominio de la dinastía Habsburgo-Lorena y la fundación de la primera república austriaca, la Heldenplatz sirvió como punto de reunión de todos los bandos políticos y como plaza de armas del ejército austriaco." #deepl:562832934
 gaudi.527.g: "Organizar un desfile e invitar a nuestros amigos." #deepl:99539180
 gaudi.527.h: "Establecer un desfile militar permanente para los próximos años." #deepl:3502479331
 gaudi.527.i: "¿Y quién debe pagar todo esto?" #deepl:3263444788
 gaudi.528.t: "Ampliar la Universidad" #deepl:2548530815
 gaudi.528.d: "La ampliación de [ROOT.GetCountry.GetCapital.GetCityHubName] ofrece la oportunidad de modernizar y ampliar la universidad." #deepl:966048719
 gaudi.528.f: "¿Qué es una gran ciudad sin pensamiento? En medio de las líneas de ferrocarril, los ministerios y los teatros, la universidad comienza a tensarse bajo su propio éxito. Demasiados estudiantes para tan pocas aulas. Departamentos repartidos en edificios alquilados. Los profesores se disputan el espacio entre bibliotecas y laboratorios. La propuesta es clara: un nuevo campus o una gran ampliación: aulas modernas, facultades especializadas, una biblioteca monumental. Estos proyectos son más que infraestructuras: son declaraciones de ambición intelectual. En Viena, la universidad se trasladó y reconstruyó en la década de 1870 a lo largo de la Ringstraße, con una gran fachada y una centralidad simbólica. En París, la Sorbona se amplió con las reformas de Jules Ferry para dar cabida a la creciente clase académica francesa." #deepl:3542359765
 gaudi.528.g: "Ampliar la universidad." #deepl:4228402238
 gaudi.529.t: "Ampliación de la Academia de Arte" #deepl:1188603187
 gaudi.529.d: "La ampliación de [ROOT.GetCountry.GetCapital.GetCityHubName] ofrece la oportunidad de modernizar y ampliar la academia de arte." #deepl:2971034584
 gaudi.529.f: "A medida que la ciudad crece, también lo hace su apetito por el arte. Sin embargo, pintores y escultores se agolpan en pequeños estudios y oscuros áticos, aprendiendo no de los maestros, sino de rumores y bocetos prestados. La propuesta: una verdadera academia de arte, con talleres llenos de luz, teatros anatómicos y galerías abiertas a exposiciones públicas. En toda Europa, este tipo de academias configuran el gusto nacional. La École des Beaux-Arts de París marca las pautas clásicas de medio continente. En Viena, el gran edificio de la Akademie der bildenden Künste consolida el prestigio cultural de la Ringstraße." #deepl:2427288221
 gaudi.529.g: "Ampliar la academia." #deepl:3521772928
 gaudi.530.t: "Urania" #deepl:3604286803
 gaudi.530.d: "Con el Urania, se ha abierto en Viena un llamado "centro de educación popular", cuya finalidad exacta aún se discute." #deepl:2388110616
 gaudi.530.f: "En 1883, el astrónomo alemán Max Wilhelm Meyer llegó a Viena para calcular eclipses solares históricos y futuros como ayudante en la Universidad de Viena. También dio conferencias sobre folclore y desarrolló la idea de una institución de educación folclórica. Sin embargo, desde que fue llamado a Berlín en 1885, siguió desarrollando allí sus ideas. La Urania de Viena seguía el modelo de la de Berlín: tenía capacidad para 800 personas y contaba con una sala de conferencias para 200 personas, salas para demostraciones científicas y un observatorio. Sin embargo, esta Urania "provisional" apenas podía hacer frente a la afluencia de visitantes, por lo que pronto se hizo necesario un nuevo edificio en la Ringstrasse. La Urania no sólo amplió su oferta educativa (por ejemplo, con cursos de idiomas), sino que también se convirtió en sede de conciertos, con su propia orquesta sinfónica y coro Urania. Su forma y construcción poco convencionales causaron el escándalo habitual en Viena. Sin embargo, a los vieneses les gustó el edificio, y el Urania pronto se estableció como uno de los lugares emblemáticos de Viena." #deepl:2564552960
 gaudi.530.g: "Es un hito arquitectónico." #deepl:631489671
 gaudi.530.h: "Se trata principalmente de un establecimiento de ocio." #deepl:1069754801
 gaudi.530.i: "Ante todo, se trata de un observatorio." #deepl:2017455388

 gaudi.9.t: "Urbanismo terminado" #deepl:1330111739
 gaudi.9.d: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] ha finalizado hoy los trabajos de urbanismo de [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] en una importante ciudad de provincia. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] vuelve a estar plenamente disponible." #deepl:60424068
 gaudi.9.f: "La arquitectura no alcanza su máximo esplendor hasta que está tan impregnada de imaginación y fantasía -no de imaginación indisciplinada o fantasía caprichosa- que el tejido ordenado deleita la vista de todo observador inteligente y suscita emociones como un poema". -Henry van Brunt" #deepl:2388189232
 gaudi.9.g: "Tantos proyectos, tan poco tiempo." #deepl:224764128

 gaudi_architecture_treatise_modifier: "Tratado de arquitectura" #deepl:1594143488

 gaudi.8.t: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetLastName]Tratado de arquitectura" #deepl:1170819237
 gaudi.8.d: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] ha concluido la obra [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis]. [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U] tratado de arquitectura histórica y contemporánea, enriquecido con [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] reflexiones teóricas, influirá en las futuras generaciones de arquitectos." #deepl:66798799
 gaudi.8.f: "La arquitectura ha registrado las grandes ideas de la raza humana. No sólo cada símbolo religioso, sino cada pensamiento humano tiene su página en ese vasto libro". -Víctor Hugo" #deepl:864116211
 gaudi.8.g: "Una obra para la posteridad." #deepl:575316054

