 douglas.104.t: "La montaña interior" #deepl:2079471330
 douglas.104.d: "Tras cinco agotadores años de escalada y entrenamiento, [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] regresa." #deepl:862787273
 douglas.104.f: "La montaña no tiene voz, pero enseña. Durante cinco largos años, nuestro montañero se ha enfrentado a la ceguera de la nieve, al desmoronamiento de las paredes rocosas, al viento cortante y a un silencio que corta más profundo que cualquier espada. Sin embargo, cada dificultad ha convertido el conocimiento en músculo y la paciencia en aliento. Lo que empezó como ambición se ha convertido en habilidad. El escalador ha aprendido a escuchar la piedra, a predecir las tormentas por el olor, a hacer nudos con los ojos cerrados y el corazón firme. [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetSheHe|U] vuelve transformado. Este es el principio de la maestría." #deepl:1510753382
 douglas.104.g: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetSheHe|U] ya no conquista la montaña-[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetSheHe] la comprende" #deepl:2453485277

