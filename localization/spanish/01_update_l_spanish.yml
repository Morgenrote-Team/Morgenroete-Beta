 douglas.101.t: "Fundación del Club de Montañismo" #deepl:222126293
 douglas.101.d: "[SCOPE.sCharacter('douglas_president_scope').GetFullName] y la montaña responde. La fundación del Club de Alpinismo marca una nueva era para todos los que aspiran a lo más alto." #deepl:4067420597
 douglas.101.f: "[SCOPE.sCharacter('douglas_president_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('douglas_president_scope').GetLastName] expediciones llevaron a [SCOPE.sCharacter('douglas_president_scope').GetHerHim] a través de tormentas y avalanchas, pero ahora, [SCOPE.sCharacter('douglas_president_scope').GetSheHe] pretende transmitir el legado de [SCOPE.sCharacter('douglas_president_scope').GetHerHis]. En [ROOT.GetCountry.GetCapital.GetCityHubName], [SCOPE.sCharacter('douglas_president_scope').GetSheHe] funda el Club de Montañismo de [GetPlayer.GetName], no solo, sino junto a un prometedor recién llegado: [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] [SCOPE.sCharacter('douglas_president_scope').GetFullName] ve en [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetHerHim] no sólo ambición, sino una futura leyenda. Juntos se encuentran en el umbral de un camino que no sólo conduce a las cumbres, sino a la gloria, al valor y, tal vez, a un lugar en la historia. El club está abierto a todos los que escuchan la llamada de las montañas. Comienza el ascenso." #deepl:3771164746
 douglas.101.g: "¡La montaña llama!" #deepl:249284577

 douglas.102.t: "El Club Alpino" #deepl:1599559370
 douglas.102.d: "El Club Alpino se fundó oficialmente en [ROOT.GetCountry.GetCapital.GetCityHubName] en [TimeKeeper.GetCurrentDate.Format('y')] y está reconocido como la primera organización internacional de montañismo del mundo. Su creación marca el inicio institucional del alpinismo moderno." #deepl:3982546221
 douglas.102.f: "Históricamente, un grupo de caballeros británicos se reunió en Londres en 1857 para fundar un club dedicado al montañismo. Liderado por figuras como John Ball y Edward Kennedy, el Alpine Club pretendía promover la exploración sistemática de los Alpes, combinando el desafío físico con el estudio geográfico y natural. El club proporcionaba un marco estructurado para compartir conocimientos, organizar expediciones y fomentar el sentido de comunidad entre los alpinistas. Sus miembros desempeñaron un papel clave en lo que más tarde se conocería como la "Edad de Oro del alpinismo", logrando numerosas primeras ascensiones y documentando sus experiencias. Poco después comenzó a publicarse el Alpine Journal, que contribuyó a la incipiente literatura del alpinismo. La fundación del Club Alpino sentó las bases del alpinismo organizado en todo el mundo y estableció normas perdurables en la exploración de las montañas." #deepl:4126383378
 douglas.102.g: "¡A la cumbre juntos!" #deepl:2506053391

