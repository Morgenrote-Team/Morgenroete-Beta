 gaudi.51.t: "Renacimiento neoclásico" #deepl:3536136445
 gaudi.51.d: "[ROOT.GetCountry.GetName] se ha convertido en un dechado de arquitectura atemporal y digna. Se trata de un estatus que inspira admiración en todo el mundo civilizado." #deepl:1191503815
 gaudi.51.f: "La característica general y más destacada de las obras maestras de la Antigüedad es, en última instancia, una noble sencillez y una serena grandeza, tanto en la postura como en la expresión"." #deepl:3328862889
 gaudi.51.g: "Esta es la esencia del verdadero arte." #deepl:3736488828
 gaudi.52.t: "El triunfo de la Bauhaus" #deepl:1539285104
 gaudi.52.d: "[ROOT.GetCountry.GetName] se ha convertido en un faro de la arquitectura racional y progresista. Un estatus que suscita respeto y admiración en todo el mundo." #deepl:1188995024
 gaudi.52.f: "El diseño no es una profesión, sino una actitud", László Moholy-Nagy." #deepl:1692369698
 gaudi.52.g: "¡Necesidades del pueblo en lugar de necesidad de lujo!" #deepl:3765042267

 je_gaudi_bauhaus_architecture: "Arquitectura Bauhaus" #deepl:2452320752
 je_gaudi_bauhaus_architecture_reason: "La Bauhaus fue una escuela de arte alemana que funcionó de 1919 a 1933 y que combinaba la artesanía y las bellas artes. La escuela se hizo famosa por su enfoque del diseño, que intentaba unificar la visión artística individual con los principios de la producción en masa y el énfasis en la función. Se basaba en la idea de crear una Gesamtkunstwerk (obra de arte global) en la que todas las artes acabaran confluyendo. El estilo Bauhaus se convirtió más tarde en una de las corrientes más influyentes del diseño moderno, la arquitectura modernista y la enseñanza de la arquitectura." #deepl:1381087306
 je_gaudi_neoclassical_architecture: "Arquitectura neoclásica" #deepl:3915160230
 je_gaudi_neoclassical_architecture_reason: "El neoclasicismo de principios del siglo XX fue un movimiento arquitectónico y artístico renovador que pretendía volver a conectar con la claridad formal, la simetría y la grandeza de la antigüedad grecorromana. Surgido como contrapunto a los excesos del historicismo y la creciente abstracción del arte moderno, este estilo enfatizaba la monumentalidad, el orden geométrico y el uso de formas tradicionales en un lenguaje racional, a menudo sancionado por el Estado. Estaba estrechamente vinculado a la identidad nacional y a la arquitectura cívica, proyectando ideales de permanencia, autoridad y belleza disciplinada." #deepl:2628512539
 je_gaudi_art_deco_architecture: "Arquitectura Art Déco" #deepl:2695214977
 je_gaudi_art_deco_architecture_reason: "El movimiento Art Déco surgió en la década de 1920 como un estilo decorativo y arquitectónico que abrazaba la modernidad al tiempo que conservaba elementos de orden clásico. Con su característico uso de formas estilizadas, materiales ricos y geometría ornamental, el Art Déco combinaba la opulencia de la artesanía con la emergente estética maquinista. Celebraba el progreso tecnológico y el dinamismo urbano a través de motivos inspirados en la industria, la velocidad y el exotismo." #deepl:2018331500

 je_gaudi_splendour_bauhaus: "El triunfo de la Bauhaus" #deepl:1539285104
 je_gaudi_splendour_bauhaus_reason: "Con la introducción del espíritu de la Bauhaus, los arquitectos han empezado a despojarse del ornamento y la ilusión en favor de la claridad, la precisión y la verdad de los materiales. El objetivo ya no es impresionar mediante la opulencia o evocar la grandeza de imperios pasados, sino servir a la sociedad creando espacios funcionales, honestos y modernos. La Bauhaus no es sólo una estética: es una filosofía del diseño, basada en la creencia de que la arquitectura y la vida cotidiana deben reconciliarse a través de la simplicidad, la utilidad y la unidad de forma y propósito. Al adoptar los principios de la Bauhaus, una capital indica no sólo modernidad, sino progreso en su forma más pura: la elevación de la función sobre la fachada, de la innovación sobre la tradición." #deepl:3357423326
 je_gaudi_splendour_neoclassical: "Renacimiento neoclásico" #deepl:3536136445
 je_gaudi_splendour_neoclassical_reason: "El neoclasicismo es un estilo arraigado en la armonía racional de la Antigüedad, en la gramática arquitectónica de columnas, frontones y disposiciones simétricas. Sin embargo, a principios del siglo XX, se reinventó con técnicas de construcción modernas, líneas más limpias y una escala a menudo monumental. No sólo representaba la tradición, sino también una visión disciplinada del futuro, en la que la vida pública, el derecho y la cultura estarían enmarcados por edificios que inspirarían asombro y unidad. Una arquitectura que adoptara estos principios dotaría a nuestra capital de seriedad y grandeza, convirtiéndola en un faro de orden, resistencia y poder cultivado a los ojos del mundo." #deepl:605890088
 je_gaudi_splendour_art_deco: "Un sueño de Art Déco" #deepl:1198646901
 je_gaudi_splendour_art_deco_reason: "Con la introducción del Art Déco, los arquitectos revolucionaron el mundo del arte, por ejemplo rompiendo con el rígido historicismo del pasado. Pero a diferencia de muchas escuelas modernas, sus edificios no eran una expresión de mera funcionalidad y objetividad. El Art Déco es un desarrollo en pleno despertar general del modernismo clásico, en el que la combinación creativa de elegancia de formas, preciosismo de materiales, fuerza de colores y sensualidad del tema ocupaba un primer plano. Durante su apogeo, representó el lujo, el glamour, la exuberancia y la fe en el progreso social y tecnológico. Una arquitectura respetuosa con estos principios haría de nuestra nación un ejemplo de modernidad y riqueza." #deepl:980834049

