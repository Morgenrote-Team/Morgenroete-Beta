 douglas.111.t: "El primer paso" #deepl:1387851608
 douglas.111.d: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] equipa al equipo con material básico de escalada." #deepl:1200110309
 douglas.111.f: "Se acabó la época de las ascensiones improvisadas. Bajo la dirección de [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName], el equipo recibe su primer equipo estandarizado: cuerdas, piolets, pitones y mochilas resistentes. Estas herramientas no sólo salvan vidas, sino que modifican la percepción misma de la montaña. El ascenso se vuelve más metódico y calculado. Donde antes sólo importaban el valor y la fuerza bruta, ahora la técnica y la preparación ocupan un lugar central. Es un paso modesto, pero que marca una época para cualquiera que se atreva a adentrarse en el despiadado mundo del hielo y la roca." #deepl:444296823
 douglas.111.g: "Ahora las montañas pertenecen a los preparados." #deepl:660628980
 douglas.112.t: "Atado por una cuerda" #deepl:263345135
 douglas.112.d: "Nuestro alpinista [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] tiene una nueva idea: Para mejorar la seguridad, se introducen equipos de cuerda fija." #deepl:3311883976
 douglas.112.f: "Cada paso en la montaña conlleva un riesgo, pero ahora nadie escala solo. La introducción de los equipos de cordada marca un cambio de mentalidad: ya no es el individuo contra la montaña, sino una cadena de escaladores unidos por la confianza y por una cuerda tejida. Este cambio aporta orden, disciplina y un profundo sentido de la responsabilidad compartida. Si uno se cae, los demás lo sostienen. El peligro no se elimina, sino que se redistribuye. La montaña sigue siendo salvaje, pero nuestra respuesta ya no es heroica, sino cooperativa." #deepl:1978213156
 douglas.112.g: "Una cuerda. Una voluntad. Un equipo." #deepl:1569127386
 douglas.113.t: "El cuerpo frágil" #deepl:3178580481
 douglas.113.d: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] insiste en introducir un sistema de primeros auxilios para el equipo." #deepl:887703212
 douglas.113.f: "Ampollas, fracturas, congelaciones: la montaña no tiene piedad. Lo que antes se aceptaba como parte del riesgo ahora se trata sistemáticamente. Un pequeño botiquín, bien utilizado, puede salvar una vida. Un refugio construido rápidamente puede ganar tiempo. Por primera vez, los conocimientos médicos básicos forman parte de la formación. La montaña sigue exigiéndolo todo, pero con la introducción de botiquines y planes de emergencia, el equipo responde con algo más que agallas. El cuerpo humano ya no se ignora: se protege." #deepl:563827659
 douglas.113.g: "Incluso los más fuertes pueden caer." #deepl:4107036891
 douglas.114.t: "Habla la piedra" #deepl:2102994496
 douglas.114.d: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] ha introducido métodos científicos en el montañismo: Se introducen conocimientos geológicos para mejorar el análisis del terreno." #deepl:3612073372
 douglas.114.f: "Lo que antes parecía un fondo -burbujas, sedimentos, rocas- se convierte ahora en un lenguaje que hay que leer. Uno de los miembros del equipo aporta sus conocimientos geológicos: las capas revelan movimientos antiguos, los tipos de roca advierten de avalanchas, las líneas de falla guían rutas seguras. La montaña ya no es un mito, es un archivo. La ciencia llega con cuadernos y martillos y, de repente, las expediciones no son sólo aventuras, sino estudios de campo. Es una nueva forma de ver, una revolución silenciosa." #deepl:1873707756
 douglas.114.g: "Aprendamos antes de subir." #deepl:3896308340
 douglas.115.t: "Aliento de altura" #deepl:1444940126
 douglas.115.d: "¿Por qué no utilizar las experiencias en guerra química para los pruprosos del alpinismo? Las nuevas tecnologías permiten utilizar máscaras de oxígeno a alturas extremas." #deepl:2351243748
 douglas.115.f: "A partir de cierta altitud, el cielo se enrarece. Respirar se convierte en una lucha, el cuerpo protesta. Pero ahora, con la ayuda de aparatos mecánicos, los seres humanos llegan a lugares que nunca debieron alcanzar. Las máscaras de oxígeno -una curiosidad de la ciencia- se han convertido en un estándar. Redefinen los límites de lo posible. El mundo por encima de los 7.000 metros se vuelve accesible, aunque a un precio: el escalador ya no está realmente solo, sino que forma parte de un sistema de soporte vital. El triunfo sobre la montaña no disminuye, sólo se hace más frío." #deepl:689433627
 douglas.115.g: "Respiramos artificialmente, pero prevalecemos." #deepl:53945526

