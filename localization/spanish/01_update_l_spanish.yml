 MR_MOUNTAINEERING_CLUB_BUTTON_TT: "#T Fundar un club de montañismo#!\nUn club de montañismo es el primer paso de un país hacia el alpinismo organizado. Debe fundarlo un caballero (o una dama) con experiencia en alpinismo. De este club pueden surgir nuevos alpinistas para conquistar las cumbres del mundo.[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:2346036384

 MR_ALPINE_CLUB_BUTTON: "Club Alpino" #deepl:3580940097
 MR_ALPINE_CLUB_BUTTON_TT: "#T Fundación del Club Alpino#!\nFundado en Londres en 1857, el Club Alpino es la organización de montañismo más antigua del mundo. Su creación marcó el inicio del alpinismo organizado en la Inglaterra victoriana. El objetivo del club era promover la exploración científica, geográfica y atlética de los Alpes. Entre sus miembros fundadores se encontraba Edward Whymper, que completó la primera ascensión al Cervino en 1865. El Club Alpino desempeñó un papel clave durante la "Edad de Oro del Alpinismo" y publicó obras influyentes, como el Alpine Journal. Estableció normas para los futuros clubes de alpinismo de todo el mundo.[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:1435537543
