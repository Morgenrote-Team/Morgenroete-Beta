 ### MR Concepts ###

 concept_gaudi_architectural_splendour: "Architectural Splendour" #please replace
 concept_gaudi_architectural_splendour_desc: "Architectural Splendour is a collective term for the spectacular advances in modern architecture, referring primarily to Art Deco, Bauhaus, and Neoclassicism as they emerged in the early 20th century. The value represents the transformation of outdated forms into a future-ready architecture. Art Deco requires reaching a higher threshold to fulfill the dream of an Art Deco city — yet the benefits are greater." #please replace
 concept_artists_artist_desc: "In [concept_morgenroete] #b Artists#! are special characters that allow you to use certain mechanics of the mod. You can get #b Artists#! in some events or by aquiring enough [concept_artistic_progress]. Artists have [concept_artists_experience] that reflects their standing in their respective field.\nCurrently these #b Artists#! exist:\n - [concept_elgar_composer]\n - [concept_klimt_painter]\n - [concept_manzoni_writer] - [concept_gaudi_architect]" # Please replace
 concept_elgar_architecture_desc: "Architecture is one of the core concepts of [concept_morgenroete]. It is divided into two major parts.\n\nOn the one hand, [concept_gaudi_monuments] have been completely redesigned: they are no longer built directly, but expanded step by step based on decisions. On the other hand, numerous monuments have been added - some of which must be built, others exist at the start of the game.\n\nThe other key point is the introduction of the [concept_gaudi_architect], who can upgrade cities and design up to 15 new unique buildings by researching [Concept('concept_gaudi_architectural_blueprint','$concept_gaudi_architectural_blueprints$')]. Architects can also rebuild a country in the Bauhaus, Neoclassical, and Art Deco styles. A [concept_gaudi_great_architect] can even design their own [concept_gaudi_custom_monument]!" #Please replace
 concept_gaudi_architect_desc: "#PURPLE #b Architects#!#! are [Concept('concept_artists_artist','$concept_artists_artists$')] whose skills relate to urban planning, building design and construction. They are special character types that you can gain either from events, from gaining enough [concept_artistic_progress] to create one in your nation or by offering a position to a [concept_gaudi_independent_architect].\nWhile other artists are more likely to accumulate cultural tradition, architects only rarely generate the very valuable [concept_gaudi_architectural_splendour] when they are involved in urban planning or the expansion of the capital—or when they completely redesign the country in a particular architectural style. Their main task is more practical in nature. They work in public construction, thus providing a nation with additional construction points. They improve infrastructure through planning and enhance capital cities into livable places. Architects can also hone their skills on a study tour or write an architectural treatise.\nOf paramount importance is the design of new, unique buildings, for which they create a [concept_gaudi_architectural_blueprint]. A total of 15 of these [concept_gaudi_blueprint_buildings] can be researched—since this takes a long time, it's worth considering which ones make sense.\nArchitects also provide a passive bonus: their mere presence accelerates the construction of [concept_gaudi_monuments] by 100 percent. The greatest achievement of an architect is the design of their own [concept_gaudi_custom_monument]. This is only possible with a [concept_gaudi_great_architect]." #Please replace
 concept_douglas_mountaineering: "Montañismo" #deepl:2724886722
 concept_douglas_mountaineering_desc: "Countries that own at least one [concept_douglas_mountain_summit] or have a #b Mountaineering License#! with a country that has one can participate in mountaineering. To start a #b Mountain Expedition#! you need both the #b Prospecting#! and #b Nationalism#! technologies as well as a general that has either the #b Mountaineer#!, #b Explorer#!, #b Mountain Commander#! or #b Surveyor#! Trait.\nAs soon as you start a #b Mountain Expedition#! you will have to first choose which general will be the main Mountaineer. Then you will choose the summit to climb.\nThe higher the mountains, the more dangerous is the ascent. The Mountains are classified according to their height in meters ranging from under 4000 meters upt to over 8000 meters. Success depends on researched military technologies, the age and health of the leader, and their characteristics. Avalanches and steep slopes can pose a major risk that threatens the entire endeavor.\nYou can even send an additional [Concept('concept_academics_academic','$concept_academics_scientist$')] on the trip. Either a [concept_dubois_naturalist] or a [concept_dubois_paleontologist] will help discover more about the mountain you climbed on.\nIn the end you will get a prestige bonus and your general will develop better traits that will help them in combat as well for mountaineering." #Please replace

 concept_gaudi_great_architect: "#PURPLE #b Gran Arquitecto#!#!" #deepl:2311505900
 concept_gaudi_great_architects: "#PURPLE #b Great Architects#!#!" #You can use this for plural: [Concept('concept_gaudi_great_architect','$concept_gaudi_great_architects$')]
 concept_gaudi_great_architect_desc: "#b Los Grandes Arquitectos#! son [Concept('concept_gaudi_architect','$concept_gaudi_architects$')] que se consideran las mentes más importantes en su campo. #b Los arquitectos#! que alcancen los 500 [concept_artists_experience] se convertirán en #b Grandes Arquitectos#!. Si un artista alcanza este rango especial, puede diseñar el proyecto de una [concept_gaudi_custom_monument] verdaderamente excepcional que encarne el espíritu de la nación." #deepl:3535354395

 concept_gaudi_monuments: "Monumentos en #R Morgenröte#!" #deepl:3575665350
 concept_gaudi_monuments_desc: "Muchas naciones recibieron nuevos #b Monumentos#! en [concept_morgenroete]: la #b Catedral de Colonia#! en Alemania, el #b Gotthardbahn#! en Suiza, el #b Cristo Redentor#! en Brasil, la #b Mole Antonelliana#! en Italia, el #b Palacio de Verano#! en China, la #b Sagrada Familia#! en España, el #b Schloss Neuschwanstein#! en Baviera, el #b Palacio de Bellas Artes#! en México y el #b Palacio de Gyeongbokgung#! en Corea.\Todos los edificios excepto el #b Palacio de Verano#!, y el #b Campanile#! deben ser construidos por su propietario, el #b Palacio Sajón#! puede ser reactivado por una nación polaca. También hay nuevos monumentos al comienzo del juego, como los #b Budas de Bamiyan#! o el #b Palacio Potala#!\nTambién existe la posibilidad de tener un [concept_gaudi_custom_monument] diseñado por un [concept_gaudi_great_architect]. \nAl contrario que en el juego vainilla, #b Los monumentos#! no se construyen directamente, sino mediante una decisión. La construcción se lleva a cabo en varias etapas, dependiendo del tamaño del edificio, y puede durar años o incluso décadas - y es significativamente más caro." #deepl:1566202277

 concept_athletes_athlete: "Atleta" #deepl:850847351
 concept_athletes_athletes: "Athletes" #You can use this for plural: [Concept('concept_athletes_athlete','$concept_athletes_athletes$')]
 concept_athletes_athlete_desc: "En [concept_morgenroete] #b  Los Atletas#! son personajes especiales que permiten utilizar ciertas mecánicas del mod.#b Los Atletas#! suelen crearse a través de eventos o mediante un botón. Al igual que otros personajes, #b Atletas#! poseen experiencias que garantizan un mayor éxito en su campo.\nActualmente existen estos #b Atletas#!:\n - [concept_curtiss_balloonist]\n - [concept_curtiss_pilot]\n - [concept_vikelas_olympian]\n - [concept_douglas_mountaineer]\n - [concept_vikelas_coach]\n - [concept_vikelas_racer]" #deepl:1061453309

 concept_gaudi_independent_architect: "Arquitecto independiente" #deepl:2730756570
 concept_gaudi_independent_architects: "Independent Architects" #You can use this for plural: [Concept('concept_gaudi_independent_architect','$concept_gaudi_independent_architects$')]
 concept_gaudi_independent_architect_desc: "[Concept('concept_gaudi_architect','$concept_gaudi_architects$')] que no son contratados por un país son #b Arquitectos Independientes#!. A diferencia de muchos otros artistas, hay pocos requisitos para contratar a un #b Arquitecto Independiente#!, salvo un mínimo requisito tecnológico. Son auténticos trotamundos y normalmente sólo exigen una buena remuneración." #deepl:4188716455

 concept_gaudi_architectural_blueprint: "Plano arquitectónico" #deepl:4294565305
 concept_gaudi_architectural_blueprints: "Architectural Blueprints" #You can use this for plural [Concept('concept_gaudi_architectural_blueprint','$concept_gaudi_architectural_blueprints$')]
 concept_gaudi_architectural_blueprint_desc: "Los planos arquitectónicos pueden consultarse en [Concept('concept_gaudi_architect','$concept_gaudi_architects$')]. Son esenciales para la construcción de [concept_gaudi_blueprint_buildings] especiales que sólo pueden erigirse una vez en una nación. Hay un total de 15 edificios diferentes en cinco categorías distintas. Ciertos planos requieren que se investiguen tecnologías. Como a veces la investigación puede llevar años, conviene decidir de antemano qué planos son los más importantes. Los edificios pueden construirse en cualquier estado, pero requieren un cierto nivel de urbanización. En algunos casos, puede haber requisitos adicionales.\n\n#R Importante#!: Sólo se puede construir un edificio de una categoría específica en un estado. Por lo tanto, si en un estado hay una fuente, el arco del triunfo o la estatua no pueden ubicarse también allí." #deepl:1017261789
 concept_gaudi_blueprint_buildings: "Edificios Blueprint" #deepl:2672159620
 concept_gaudi_blueprint_buildings_desc: "Los edificios Blueprint son edificios que necesitan un bluprint investigado por [Concept('concept_gaudi_architect','$concept_gaudi_architects$')]. Sólo se puede construir un edificio de una categoría específica en un estado. [GetBuildingType('building_gaudi_hospital').GetName] Hay 15 edificios diferentes:\n#b Monumento#!\n- [GetBuildingType('building_gaudi_statue').GetName]\n- [GetBuildingType('building_gaudi_fountain').GetName]\n- [GetBuildingType('building_gaudi_arch').GetName]\n#b Plaza pública#!\n- [GetBuildingType('building_gaudi_park').GetName]\n- [GetBuildingType('building_gaudi_luna').GetName]\n- [GetBuildingType('building_gaudi_parade').GetName]\n#b Edificios de servicios#!\n- [GetBuildingType('building_gaudi_almshouse').GetName]\n- [GetBuildingType('building_gaudi_school').GetName]\n- [GetBuildingType('building_gaudi_prison').GetName]\n-#b Instituciones sanitarias#!\n- [GetBuildingType('building_gaudi_canalization').GetName]\n- [GetBuildingType('building_gaudi_health').GetName]\n-#b Academias nacionales#!\n- [GetBuildingType('building_gaudi_science').GetName]\n- [GetBuildingType('building_gaudi_arts').GetName]\n- [GetBuildingType('building_gaudi_sports').GetName]" #deepl:3852362262

 concept_gaudi_custom_monument: "Monumento personalizado" #deepl:2715885677
 concept_gaudi_custom_monument_desc: "Un monumento personalizado es la mayor obra maestra posible de [concept_gaudi_architect]. Puede competir con otros monumentos ordinarios. Sólo un [concept_gaudi_great_architect] puede elaborar este tipo de planos. Requiere la investigación de las tecnologías arquitectónicas más modernas. El tipo de monumento que diseña un arquitecto depende en gran medida de su estilo arquitectónico. Los arquitectos art déco diseñan el [GetBuildingType('building_gaudi_people_monument').GetName], los arquitectos de la Bauhaus el [GetBuildingType('building_gaudi_people_forum').GetName], y los arquitectos neoclásicos el [GetBuildingType('building_gaudi_people_palace').GetName]." #deepl:759442240

 concept_douglas_mountaineer: "Montañero" #deepl:3785520222
 concept_douglas_mountaineers: "Montañeros" #deepl:2642597122
 concept_douglas_mountaineer_desc: "#n Esta entrada está siendo revisada.#!" #deepl:1338387803
 concept_vikelas_olympian: "Olímpico" #deepl:3681680819
 concept_vikelas_olympian_desc: "#n Esta entrada está siendo revisada.#!" #deepl:1338387803

 concept_douglas_mountain_summit: "Cumbre de la Montaña" #deepl:193458424
 concept_douglas_mountain_summits: "Mountain Summits" #You can use this for plural [Concept('concept_douglas_mountain_summit','$concept_douglas_mountain_summits$')]
 concept_douglas_mountain_summit_desc: "Las cumbres de montaña son el objetivo codiciado de todos los alpinistas. Marcan el punto más alto de una montaña. Cada cumbre tiene tres atributos distintos que definen lo difícil que es alcanzarla con éxito.\n#V Altura#!: La altura determina cuántos pasos son necesarios para escalar una montaña-esto refleja la longitud total de una expedición. Por cada 1.000 metros, se necesita un paso de progresión. El valor se redondea hacia arriba, lo que significa que el Monte Whitney, de 4.421 metros de altura, requiere 5 pasos, mientras que el Pico Kauffmann, de 7.134 metros, exige 8. El prestigio de una montaña se calcula en función de su altura: la altura total se divide por 250. Así, una montaña ideal de 5.000 metros otorga 20 de prestigio.\n#V Nivel#!: El nivel de una montaña representa el equipamiento necesario para escalarla. No está estrictamente ligado a su altura. Por ejemplo, a pesar de sus 5.636 metros, el Citlaltépetl sólo es de nivel 1 y sólo requiere un equipo básico. Por el contrario, el Cervino, con sólo 4.478 metros, se considera significativamente más exigente en el Nivel 3, y requiere al menos una preparación de primeros auxilios para emergencias alpinas.\n\n#V Riesgo#!: El nivel de riesgo de una montaña indica la probabilidad de que se produzcan acontecimientos negativos que afecten a una expedición. Es independiente tanto de la altura como del nivel. Las avalanchas, la niebla y las condiciones meteorológicas adversas son las principales preocupaciones. El Popocatépetl pudo ser ascendido ya en los primeros tiempos modernos debido a su entorno hospitalario. En cambio, el Großvenediger, mucho más pequeño y de sólo 3.666 metros, seguía representando una seria amenaza para las expediciones austriacas hasta bien entrado el siglo XIX.\nEn la sección [concept_douglas_mountain_summit_list] encontrará más información sobre las distintas cumbres." #deepl:3359948048
 concept_douglas_mountain_range: "Cordillera" #deepl:3289022657
 concept_douglas_mountain_ranges: "Mountain Ranges" #You can use this for plural [Concept('concept_douglas_mountain_range','$concept_douglas_mountain_ranges$')]
 concept_douglas_mountain_range_desc: "Una cordillera se define como una formación montañosa que ofrece potencial para el entrenamiento [concept_douglas_mountaineering] en largas distancias. Las cordilleras clásicas son las Montañas Rocosas, los Andes, los Alpes y el Cáucaso. A diferencia de las [Concept('concept_douglas_mountain_summit','$concept_douglas_mountain_summits$')] que hay que conquistar, también hay muchas montañas menos desafiantes en las que no hay riesgo de que un [concept_douglas_mountaineer] sufra una caída fatal. Más bien, deben considerarse como una ruta de entrenamiento. Los países con cadenas montañosas tienen más probabilidades de producir alpinistas que los que carecen de este accidente geográfico." #deepl:2685064578
 concept_douglas_alpine_heritage: "Patrimonio alpino" #deepl:3116364012
 concept_douglas_alpine_heritage_desc: "Patrimonio alpino es un término colectivo que designa una conexión con las montañas y una especialización en el alpinismo. También se refiere al potencial para reclutar nuevos [Concept('concept_douglas_mountaineer','$concept_douglas_mountaineers$')]-ya que, en la mayoría de los casos, los montañeros experimentados proceden de zonas montañosas. Esto siempre supone una ventaja para los países con [Concept('concept_douglas_mountain_range','$concept_douglas_mountain_ranges$')] o [Concept('concept_douglas_mountain_summit','$concept_douglas_mountain_summits$')]. Reclutar a un nuevo alpinista, así como otras acciones diversas, cuesta el Patrimonio Alpino." #deepl:707449492

 concept_douglas_mountain_summit_list: "Lista de cumbres de montaña" #deepl:4208448161
 concept_douglas_mountain_summit_list_desc: "Hay muchos [Concept('concept_douglas_mountain_summit','$concept_douglas_mountain_summits$')] que se pueden escalar.\n#V Norteamérica:#!\n#b Monte McKinley#! (Alaska), Altura 6190 metros, Nivel 4\n#b Monte Logan#! (Territorio del Yukón), Altura 5959 metros, Nivel 4\n#b Citlaltépetl#! (México), Altura 5636 metros, Nivel 1\n#b Monte Whitney#! (California), Altura 4421 metros, Nivel 1\n#V Sudamérica:#!\n#b Aconcagua#! (Mendoza), Altura 6267 metros, Nivel 3\n#b Huascarán#! (Territorio de Lima), Altura 6768 metros, Nivel 5\n#b Illimani#! (La Paz), Altura 6438 metros, Nivel 4\n#b Chimborazo#! (Ecuador), Altura 6267 metros, Nivel 1\n#V Europa:#!\n#b Shkara#! (Gran Cáucaso), Altura 5642 metros, Nivel 4\n#b Dufourspitze#! (Dufourspitze), Altura 4634 metros, Nivel 2\n#b Cervino#! (Oeste de Suiza), Altura 4478 metros, Nivel 3\n#b Aiguille Verte#! (Saboya), Altura 4122 metros, Nivel 3\n#b Pico de Aneto#! (Aragón), Altura 3404 metros, Nivel 1\n#V África:#!\n#b Kibo#! (Tanganica), Altura 5895 metros, Nivel 2\n#b Batian#! (Kenia), Altura 5199 metros, Nivel 3\n#b Monte Stanley#! (Uganda), Altura 5109 metros, Nivel 3\n#b Monte Camerún#! (Camerún Sur), 4095 metros, Nivel 1\n#V Asia:#!\n#b Kamet#! (Delhi), Altura 7756 metros, Nivel \n#b Chogolisa#! (Cachemira), Altura 7665 metros, Nivel 5\n#b Kabru#! (Himalaya), Altura 7412 metros, Nivel 5\n#b Pico Kaufmann#! (Tayikistán), Altura 7134 metros, Nivel 4\n#V Australia y Oceanía:#!\n#b Monte Wilhelm#! (Nueva Guinea Oriental), Altura 4121 metros, Nivel 2\n#b Monte Cook#! (Isla Sur), Altura 3724 metros, Nivel 2" #deepl:721187631

