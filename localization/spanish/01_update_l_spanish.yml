 lepsius.1326.t: "Homo Heidelbergensis completado" #deepl:2121693630
 lepsius.1326.d: "[SCOPE.sCharacter('lepsius_anthropologist_scope').GetFullName] ha recogido suficientes huesos para sacar conclusiones concretas sobre la especie extinguida. El Homo Heidelbergensis ha dejado de ser un misterio para la ciencia y ahora puede situarse con cierto grado de certeza en el árbol genealógico humano, aunque aún queden muchas preguntas sin respuesta." #deepl:4182329393
 lepsius.1326.f: "La mandíbula inferior del Homo heidelbergensis fue descubierta en 1907 por el obrero Daniel Hartmann en un pozo de arena cerca de Mauer, cerca de Heidelberg, y descrita en 1908 por el anatomista Otto Schoetensack; el hallazgo, de unos 600.000 años de antigüedad, se considera la prueba más antigua de los primeros humanos en Europa, se sitúa morfológicamente entre el Homo erectus y el Homo sapiens, indica una amplia distribución de esta forma homínida en África, Europa y Asia y, debido a su robustez y al volumen cerebral estimado, permite extraer conclusiones sobre la adaptación física avanzada, el uso de herramientas y la organización social." #deepl:2078634084
 
 lepsius.1336.t: "Hombre de Heidelberg" #deepl:140239375
 lepsius.1336.d: "Un obrero hizo un descubrimiento extraordinario en una mina de Mauer, una localidad cercana a Heidelberg. Un profesor de la Universidad de Heidelberg reconoció inmediatamente su valor." #deepl:3838910430
 lepsius.1336.f: "La mandíbula inferior del Homo heidelbergensis fue descubierta en 1907 por el obrero Daniel Hartmann en un pozo de arena cerca de Mauer, cerca de Heidelberg, y descrita en 1908 por el anatomista Otto Schoetensack; el hallazgo, de unos 600.000 años de antigüedad, se considera la prueba más antigua de los primeros humanos en Europa, se sitúa morfológicamente entre el Homo erectus y el Homo sapiens, indica una amplia distribución de esta forma homínida en África, Europa y Asia y, debido a su robustez y al volumen cerebral estimado, permite extraer conclusiones sobre la adaptación física avanzada, el uso de herramientas y la organización social." #deepl:2078634084

