 douglas.103.t: "Regimiento de Tropas de Montaña" #deepl:459726214
 douglas.103.d: "Debido a su impresionante experiencia en la conquista y defensa de montañas, [SCOPE.sCharacter('douglas_mountain_veteran').GetFullName] decidió utilizar sus habilidades superiores para crear una unidad de élite de tropas de montaña." #deepl:3198382874
 douglas.103.f: "Los Gebirgsjäger, los Alpini o los Chasseurs Alpins son sólo algunos ejemplos de tropas de élite de algunos países que se han especializado en la guerra en las alturas. Creados en 1872, los Alpini son la infantería de montaña en activo más antigua del mundo. Su misión original era proteger la frontera de Italia con Francia y Austria-Hungría." #deepl:3963027024
 douglas.103.g: "Ellos llevarán su legado al futuro." #deepl:1701012348

