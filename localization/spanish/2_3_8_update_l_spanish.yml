 je_khaldun_al_qarawiyyin_reason: "Antaño gran centro de aprendizaje, el Al-Qarawiyyin ha decaído durante siglos. Pero quizá podamos revertir su curso y convertirlo de nuevo en un importante centro de ciencia." #deepl:1953836253
