 dubois_perfect_plesiosaurus_paleontologist_loc: "\nEl #o Plesiosaurus#! reconstruido por el profesor [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] es un enorme reptil marino." #deepl:1469085529
