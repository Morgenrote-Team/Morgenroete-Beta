 MR_VENUS_TRANSIT_1874_EXPEDITION_BUTTON_TT: "#T Observar el tránsito de Venus#!\nLa observación del tránsito de Venus, uno de los acontecimientos astronómicos más significativos del siglo XIX, es posible en 1872 y 1884. Dos años antes del año objetivo, se pueden hacer preparativos para no perder esta oportunidad.\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:3310758031
