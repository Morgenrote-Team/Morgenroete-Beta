 nationalization.11.d: "En [TimeKeeper.GetCurrentDate.Format('y')], Italia fue testigo de la publicación de un libro de cocina pionero que cambiaría para siempre su cultura culinaria. El autor, Pellegrino Artusi, contribuiría así al establecimiento de una cocina italiana reconocida internacionalmente que pone de relieve la unidad y la grandeza de la nación." #deepl:4223602969
 nationalization.11.f: "Publicado en 1891, "La scienza in cucina e l'arte di mangiare bene", de Pellegrino Artusi, está considerado el primer libro de cocina italiana moderna. En una época en la que Italia empezaba a forjarse una identidad nacional, la obra de Artusi desempeñó un papel fundamental en la unificación de las diversas cocinas regionales en una tradición culinaria nacional coherente. Su meticulosa colección de recetas, presentadas con ingenio y claridad, no sólo estableció un nuevo estándar para la literatura culinaria, sino que también contribuyó significativamente a la mejora del nivel de vida de la nación al promover la calidad, la innovación y el orgullo de la gastronomía local." #deepl:2207143835
 nationalization.11.g: "Un triunfo del arte culinario" #deepl:1345745332
 nationalization.11.t: "La ciencia culinaria y el arte de comer bien" #deepl:3987888764
 pius.101.d: "Dos niños en las montañas del sureste de Francia afirman haber sido testigos de una aparición de la Virgen María, provocando oleadas de entusiasmo espiritual - y preocupación - en todo el mundo católico." #deepl:1912784731
 pius.101.f: "Acérquense, hijos míos, no tengan miedo. En lo alto de los pastos alpinos sobre el pueblo de La Salette, cerca de Corps, en el sureste de Francia, dos niños pastores informan de una visión que ahora conmueve los corazones de toda la cristiandad. Una mujer, radiante de luz y vestida de dolor, se les apareció. Lloraba, lágrimas que caían por un mundo alejado de Dios. Habló de blasfemias proferidas sin vergüenza, de domingos profanados, y de hambre y ruina por venir si la humanidad no se arrepentía.\nLo que al principio parecía una leyenda rústica se ha convertido en un movimiento. Los peregrinos acuden en masa a la remota ladera de la montaña. Monjes y periodistas suben por los mismos senderos. La Iglesia vacila: algunos aceptan la visión como una llamada divina a la penitencia; otros temen el auge del misticismo popular y del fervor irracional. Las autoridades laicas desconfían. ¿Y Roma? Roma observa en silencio. Pero las campanas ya doblan." #deepl:2145205681
 pius.101.g: "Una advertencia celestial." #deepl:3313498992
 pius.101.h: "Mantente racional." #deepl:499500707
 pius.101.t: "Aparición en La Salette" #deepl:3065761669
 pius.102.d: "En la pequeña ciudad de Lourdes, una niña de catorce años afirma haber visto a una dama radiante en una gruta. Sus visiones no tardan en atraer a peregrinos, controversias y la atención de Roma." #deepl:1624678567
 pius.102.f: "Era joven, descalza y pobre. En una remota gruta cerca de Lourdes, en las estribaciones de los Pirineos, una campesina llamada Bernadette Soubirous habla de una dama vestida de blanco, con una banda azul y rosas doradas en los pies. Al principio, la visión no dice nada, sólo sonríe. Luego habla: de penitencia, de oración, de sufrimiento y de la misericordia divina. Se llama a sí misma simplemente: La Inmaculada Concepción. Al principio, los aldeanos se burlan. Pero cuando Bernadette descubre un manantial oculto y afirma que es una fuente de curación, miles de personas comienzan a llegar, esperando, rezando y llorando. Se dejan atrás las muletas. Los testimonios se extienden. Los escépticos denuncian la histeria. Médicos, sacerdotes y políticos acuden a Lourdes. La Iglesia investiga. El Estado mira con recelo. Y la gente sigue viniendo." #deepl:580789021
 pius.102.g: "Un santuario para la curación y la esperanza." #deepl:2629250679
 pius.102.h: "¡Alucinaciones!" #deepl:3891021600
 pius.102.t: "Aparición en Lourdes" #deepl:1767463178
 pius.103.d: "En el pueblo irlandés de Knock, quince testigos informan de una aparición silenciosa de la Virgen María, San José y San Juan Evangelista. La visión conmueve a un pueblo agobiado por la pobreza, el exilio y la dominación extranjera." #deepl:143567078
 pius.103.f: "No dijeron ni una palabra. Sin embargo, en ese silencio, una nación escuchó la esperanza". La lluvia caía a cántaros sobre la iglesia parroquial de Knock, en el condado de Mayo. Y, sin embargo, quince aldeanos se quedaron paralizados. Ante ellos, bañada por la luz del frontón sur, había una asamblea silenciosa: la Virgen María en actitud orante; San José a su lado; San Juan Evangelista, con túnica y un Evangelio en la mano. Detrás de ellos, un cordero sobre un altar y una cruz. Ningún movimiento. En una tierra castigada por el hambre, la emigración y el anhelo espiritual, la visión silenciosa resonó más fuerte que los sermones. Pronto llegaron peregrinos en busca de curación, señales y consuelo. Las autoridades inglesas se burlaron. Algunos miembros de la Iglesia dudaban. Pero entre los pobres y devotos de Irlanda, Knock se convirtió en un grito sagrado de dignidad." #deepl:216954390
 pius.103.g: "Una luz en la lluvia." #deepl:4199802423
 pius.103.h: "Descartarlo como folclore." #deepl:2853965001
 pius.103.t: "La visión silenciosa de Knock" #deepl:3086062832
 pius.104.d: "En el centro de Portugal, tres niños pastores informan de repetidas apariciones de la Virgen María, que culminan en un fenómeno milagroso presenciado por miles de personas. Sus visiones contienen profecías sobre la guerra, el sufrimiento y el futuro de la Iglesia." #deepl:3494130064
 pius.104.f: "Cerca de la ciudad de Fátima, en las colinas rurales de Cova da Iria, tres niños -Lucía, Francisco y Jacinta- hablan de una dama más brillante que el sol, vestida de resplandor y dolor. Durante seis meses, se aparece una y otra vez, advirtiendo de la guerra mundial, el auge de ideologías impías y la persecución de los fieles. Llama a la penitencia, a la oración y a la consagración de Rusia a su corazón.\NEl 13 de octubre de 1917, mientras decenas de miles de personas permanecen de pie bajo la lluvia torrencial, el sol parece desprenderse de los cielos, girando y estrellándose en el cielo. Algunos caen de rodillas. Otros huyen. Cuando la luz se desvanece, sus ropas están secas. La multitud se dispersa en silencio, sobrecogida y asustada. La prensa está dividida. Pero entre la gente -especialmente entre los pobres, los heridos y los fieles- se enciende una nueva llama: la de la esperanza, la de la advertencia, la que ve a la Virgen no sólo como madre, sino como centinela de la era venidera." #deepl:2513437425
 pius.104.g: "Presta atención a las advertencias de Fátima." #deepl:1664428204
 pius.104.h: "Desacreditar el milagro solar." #deepl:958137642
 pius.104.t: "Los secretos de Fátima" #deepl:1100906175
 pius.105.d: "En un remoto pueblo cercano a [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName] se informa de una aparición de la Virgen María. La historia se difunde rápidamente, atrayendo a peregrinos, escépticos y la atención de las autoridades eclesiásticas." #deepl:45703861
 pius.105.f: "El primero en hablar fue un niño, con los ojos muy abiertos por el asombro y la voz temblorosa. Habló de una dama más brillante que el amanecer, envuelta en un manto de luz y dolor, que aparecía en silencio y observaba el mundo con un profundo dolor. Otros afirmaron verla también. Algunos cayeron de rodillas. Otros corrieron. La historia se extendió más allá del pueblo. Llegaron peregrinos con velas en la mano. Los fieles rezaban. Los afligidos esperaban. Los sacerdotes discutían. Los funcionarios enarcaban las cejas. Pero la gente siguió viniendo, atraída no por la certeza, sino por algo más antiguo: la necesidad de creer.\NYa sea milagro, visión o mito, el acontecimiento ya ha moldeado los corazones de quienes lo presenciaron, y las vidas de quienes ahora deben decidir lo que significa." #deepl:3063415784
 pius.105.g: "Una señal para los fieles." #deepl:1177288670
 pius.105.h: "Suprimir la histeria." #deepl:1037767630
 pius.105.t: "Nuestra Señora de [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName]" #deepl:4095895438
 pius.111.d: "A pesar de las órdenes oficiales que prohíben las manifestaciones públicas, una multitud de fieles ha iniciado una procesión espontánea hacia el lugar de la aparición mariana en [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName]." #deepl:3379456873
 pius.111.f: "No encendimos antorchas, no llevamos estandartes. Llegaron al amanecer, de dos en dos y de tres en tres, caminando por campos y aldeas, susurrando oraciones. Al mediodía eran cientos, recorriendo caminos rurales, algunos descalzos, otros llorando. Las mujeres llevaban flores. Los ancianos murmuraban letanías. Las autoridades habían declarado cerrado el lugar. Los soldados vigilaban. Sin embargo, nadie detuvo a la multitud. Quizá por los cantos. Tal vez el silencio. Cuando los fieles llegaron al lugar de la visión, se arrodillaron, murmuraron oraciones y encendieron velas en el suelo. Ninguna voz tronó desde el cielo. No presenciaron ningún milagro. Pero algo ya había cambiado. Un pueblo había actuado, no en desafío a la ley, sino en obediencia a algo más antiguo que la ley." #deepl:2369382513
 pius.111.g: "Que recen." #deepl:2163336687
 pius.111.h: "Observa en silencio." #deepl:3862482018
 pius.111.h_tt: "Alta probabilidad de que se produzcan nuevos acontecimientos a raíz de la aparición mariana." #deepl:2612943668
 pius.111.i: "Dispérsalos por la fuerza." #deepl:1733449904
 pius.111.i_tt: "Muy alta probabilidad de una colisión sangrienta." #deepl:202372566
 pius.111.t: "La procesión imprevista" #deepl:3613794317
 pius.112.d: "Un enfrentamiento entre las autoridades y los fieles en el lugar de la procesión mariana prohibida se ha vuelto violento. El suelo donde las visiones inspiraban esperanza lleva ahora la mancha de sangre." #deepl:2719807490
 pius.112.f: "Las velas aún parpadeaban cuando llegaron los soldados. Se alzaron voces de confusión, luego de súplica. Una mujer cayó. Un niño gritó. Nadie sabe quién dio la orden, pero los mosquetes ladraron, las porras oscilaron, las botas se movieron entre el incienso y la tierra. Cuando volvió el silencio, era más pesado que antes. Los fieles están indignados. La prensa habla en voz baja: algunos lo llaman accidente, otros masacre. El lugar, que antes se consideraba sagrado, ahora está maldito por la memoria. Y aun así, la gente se reúne, no con flores, sino con rabia, con silencio, con una mirada que ninguna ley puede apagar." #deepl:2186004653
 pius.112.g: "Lamentamos lo ocurrido." #deepl:3313805008
 pius.112.h: "Ellos se lo buscaron." #deepl:402397332
 pius.112.t: "Sangre en el Campo Santo" #deepl:1312740775
 pius.113.d: "Un sacerdote local se ha erigido en el principal defensor de la aparición mariana en [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName]. Sus sermones atraen a multitudes, sus palabras inspiran esperanza y desafían a la autoridad estatal. Su nombre es Padre [SCOPE.sCharacter('pius_marian_priest_scope').GetFirstName]." #deepl:1046441460
 pius.113.f: "Se apareció a los humildes, no a los poderosos. En la iglesia de piedra sobre el pueblo, un sacerdote llamado Padre [SCOPE.sCharacter('pius_marian_priest_scope').GetFirstName] ha empezado a predicar, no sólo sobre la misericordia de la Virgen, sino también sobre su justicia. Sus palabras resuenan más allá de la nave: Los peregrinos acuden en masa a sus sermones. Su nombre se difunde en susurros y en los himnarios. Insta a la paz, pero su presencia galvaniza el descontento. Algunos le llaman profeta. Las autoridades se inquietan. Los militares hablan de incitación. La jerarquía eclesiástica duda entre el dogma y la diplomacia. Una propuesta silenciosa llega a su escritorio: Él podría ser removido. Tranquilamente. Discretamente. Pero algunos hombres, cuando son silenciados, hablan aún más alto." #deepl:2395659126
 pius.113.g: "Que predique." #deepl:3471579290
 pius.113.h: "Cítele a la capital para negociar." #deepl:1641636788
 pius.113.i: "Hazlo desaparecer." #deepl:3010062703
 pius.113.t: "La voz en el púlpito" #deepl:3682486724
 pius.114.d: "En todo el país, los creyentes católicos han iniciado manifestaciones públicas en apoyo de la aparición mariana. Lo que comenzó como una peregrinación rural se ha convertido en un movimiento nacional." #deepl:3473602537
 pius.114.f: "Desde los pueblos pesqueros hasta las ciudades industriales, los signos son los mismos: velas encendidas en las ventanas, himnos que resuenan en las plazas, miles de personas reunidas en silencio. No ondean estandartes, sólo estatuas, iconos y un único nombre que se murmura una y otra vez: María. Lo que empezó como devoción se ha convertido en desafío. En respuesta a la violencia en el lugar sagrado de [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName], los fieles han salido a la calle. No gritan. Rezan. Pero su número crece cada día. Algunos en el gobierno piden tolerancia. Otros exigen medidas enérgicas. Los militares están inquietos. Y en los hogares de todo el país, incluso los que dudan se preguntan: si tantos creen, ¿puede seguir siendo mentira?" #deepl:3107082794
 pius.114.g: "Permitir la procesión nacional." #deepl:3918828179
 pius.114.h: "Prohibir la procesión nacional." #deepl:1813497751
 pius.114.t: "La procesión que conmocionó al país" #deepl:738056863
 pius.115.d: "Una grave pérdida de cosechas ha asolado varias regiones rurales de [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName]. Entre los fieles empieza a extenderse un peligroso susurro: que la Virgen, antaño silenciada por el Estado, ahora llora... y castiga." #deepl:3238123436
 pius.115.f: "Ella pidió oraciones. Le dimos soldados.' Las lluvias fallaron. El trigo amarilleó demasiado pronto. Las patatas se pudrieron bajo la tierra, invisibles y amargas. Los aldeanos hablan de campos que se sienten... abandonados. No sólo por los hombres, sino por la misericordia. Y así lo susurran. De la mujer de luz que una vez apareció... y fue burlada. Del sacerdote que desapareció. Del santuario sellado y los peregrinos golpeados. Las velas vuelven a arder, pero ahora detrás de ventanas cerradas. Las madres bautizan a sus hijos en secreto. Los ancianos entierran cortezas de pan como ofrenda. La Iglesia no se atreve a hablar, pero el pueblo ya cree: Este es su dolor. O su advertencia." #deepl:2485032935
 pius.115.g: "¡Superstición! Espero..." #deepl:2447781343
 pius.115.t: "Los campos yacen vacíos" #deepl:3151937266
 pius.116.d: "Tras años de represión y milagros negados, muchos ciudadanos antaño devotos han empezado a abandonar su fe en [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName]. Cada vez son más los que se definen no como católicos, sino como no católicos." #deepl:1323000478
 pius.116.f: "Ella ya no viene. Ni en sueños, ni en visiones. Las velas se apagan. El santuario está cerrado. El sacerdote se ha ido. Hubo un tiempo en que incluso los más pobres susurraban Ave Marías antes de dormir, cuando los iconos colgaban junto a los hogares, y las lágrimas caían al sonido de las campanas. Ahora, las iglesias están vacías. Los niños preguntan qué era la "confesión". Los jóvenes hablan de la Razón, del Progreso, de la Nada. Se volvieron hacia la ceniza. No son radicales. Están exhaustos. Y en algún lugar del silencio, la pregunta persiste: "¿Nos dejó ella o la dejamos nosotros?" #deepl:231766477
 pius.116.g: "La Edad de la Fe ha pasado." #deepl:146424195
 pius.116.t: "El silencio más allá de la campana" #deepl:2179217507
 pius.119.d: "El recién instaurado gobierno ateo ha ordenado el cierre del lugar de peregrinación mariana. Lo que antes era un lugar de luz y oración ahora está acordonado, silencioso bajo la vigilancia del Estado." #deepl:1939840262
 pius.119.f: "'No sonaron campanas. No ardían velas. El santuario, que antaño atraía a miles de personas, ahora está solo. Se ha clavado un aviso en la puerta de la capilla: "Por orden de la Asamblea Popular, esta estructura se declara no esencial". Los guardias vigilan, no para proteger, sino para impedir. No se permitieron protestas. El cambio se produjo en silencio, burocráticamente: una ausencia más que una explosión. Sin embargo, en los hogares de todo el país, las manos de los ancianos tiemblan. Las abuelas esconden sus rosarios. Los niños preguntan por qué ya no cantan los peregrinos. El Partido habla de ciencia, razón y progreso. Y en algún lugar detrás de las puertas cerradas, una pregunta parpadea como una vela a medio consumir: ¿Era esto realmente necesario?" #deepl:3255413028
 pius.119.g: "Ya no construimos monumentos a las ilusiones." #deepl:702720701
 pius.119.t: "Clausura del Santuario" #deepl:589514149
 pius.121.d: "La aparición mariana en [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName] ha sido reconocida oficialmente como un signo positivo. Pero incluso ahora, su verdadero significado sigue abierto a la interpretación." #deepl:181746716
 pius.121.f: "En las semanas transcurridas desde que la figura radiante se apareció a los aldeanos, no se han producido más señales. Ningún fuego del cielo. Ninguna voz en las nubes. Pero la gente habla de paz, de curación, de que algo ha cambiado en el alma de la nación. Los peregrinos no acuden con frenesí, sino con reverencia. El clero predica en voz baja. La prensa, por una vez, informa sin burlas: ¿Qué significa este milagro?" #deepl:3589438214
 pius.121.g: "Una bendición para el pueblo llano." #deepl:560950828
 pius.121.h: "Una señal divina para nuestro clero." #deepl:2114621818
 pius.121.h_tt: "Esta medida puede tener consecuencias desconocidas y graves." #deepl:1123613034
 pius.121.i: "Una indicación de la legitimidad de nuestro gobierno." #deepl:1976662076
 pius.121.t: "¿Qué quiere decir?" #deepl:1525290236
 pius.122.d: "El lugar de la aparición mariana se ha convertido en un lugar de peregrinación plenamente reconocido, que atrae cada vez a más fieles de cerca y de lejos." #deepl:3557311135
 pius.122.f: "Donde antes sólo había pastos, ahora hay velas, rosas y los pasos silenciosos de miles de personas. Los campos se han desbrozado. Una modesta capilla se alza cerca del lugar donde los niños hablaban de una Señora vestida de luz. Cada día llegan peregrinos: campesinos con sus hijos, viudas vestidas de negro, soldados de permiso, madres que susurran oraciones por sus nonatos... La Iglesia ha reconocido el carácter sagrado del lugar. Se está construyendo un santuario. Los mercados florecen en sus márgenes, ofreciendo pan, medallas, rosarios, vino. Lo que antes era una historia de la que se dudaba en los salones es ahora una presencia que se siente en los huesos de la nación: ¿Es el renacimiento de la fe o la semilla de algo más grande que está por llegar?" #deepl:307938956
 pius.122.g: "Totus tuus." #deepl:314650754
 pius.122.t: "El Santuario de [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName]" #deepl:3872076082
 pius_action_against_marian_procession_modifier: "Acción contra la aparición mariana" #deepl:2492209401
