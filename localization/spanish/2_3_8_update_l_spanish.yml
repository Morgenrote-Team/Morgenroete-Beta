 MR_HIRE_COACH_BUTTON_TT: "#T Contratar a un seleccionador nacional#!\nDespués de la fundación de la FIFA y de los primeros partidos internacionales, se puede contratar a un seleccionador nacional. Los seleccionadores nacionales contribuyen con sus conocimientos a mejorar los resultados de los partidos. Si un seleccionador no está a la altura de las expectativas, puede ser sustituido al cabo de tres años como mínimo.\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:3011015130
