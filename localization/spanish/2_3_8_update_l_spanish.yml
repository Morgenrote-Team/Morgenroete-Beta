 dubois.2171.i: "Basilosaurus." #deepl:2592886142
 dubois.2171.j: "Megalodón." #deepl:1809322411
 dubois.2173.f: "El Plesiosaurus es un orden de reptiles marinos. Sus fósiles se encuentran en todo el mundo. Según la especie, los animales medían entre 1,5 y 15 metros de largo. Según la especie, probablemente se alimentaban de diferentes animales. Desde caracoles y mejillones hasta peces y otras presas.\nSus mandíbulas en forma de U y dientes afilados, parecidos a una trampa para peces, les proporcionaban una herramienta útil." #deepl:1725138010
 dubois.2173.t: "Plesiosaurus" #deepl:3684543079
 dubois.2174.f: "El Basilosaurus no es un dinosaurio, sino una forma prehistórica de ballena. Su largo cuerpo recuerda al de una larga serpiente, pero con una longitud de hasta 20 metros, es similar en longitud al cachalote." #deepl:4279559397
 dubois.2174.t: "Basilosaurus" #deepl:3895138572
 dubois.2175.f: "El gigantesco tiburón Megalodon es probablemente el mayor tiburón que haya existido jamás. Sin embargo, estimar su longitud es difícil, ya que actualmente sólo se han encontrado dientes y vértebras. Nuestros paleontólogos estiman su longitud entre 9 y 30 metros. En cualquier caso, el esqueleto de tiburón es impresionante y una de las joyas de la corona de nuestra colección." #deepl:1066794911
 dubois.2175.t: "Megalodón" #deepl:439976392
