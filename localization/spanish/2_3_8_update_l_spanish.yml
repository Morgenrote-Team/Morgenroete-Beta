 khaldun.101.d: "Hace siglos, Al-Qarawiyyin era un centro de ciencia y aprendizaje. Ahora ha vuelto a ocupar su lugar como una de las principales universidades del mundo." #deepl:2097299752
 khaldun.101.f: "\"Al-Qarawiyyin ha sido una universidad durante más tiempo que todas las universidades de Europa. Ha albergado muchos libros, pero lamentablemente ha empezado a declinar. Hoy es el día en que esta universidad vuelve a ocupar el lugar que le corresponde"." #deepl:2075544153
 khaldun.101.g: "Al-Qarawiyyin será un faro del aprendizaje." #deepl:1850004794
