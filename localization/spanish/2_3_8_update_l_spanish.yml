 pius_approved_marian_apparition_modifier: "Aparición mariana aprobada" #deepl:495687692
 pius_blood_at_holy_ground_modifier: "Sangre en Tierra Santa" #deepl:1993481555
 pius_denied_great_marian_apparition_modifier: "Negada la Gran Aparición Mariana" #deepl:3761440197
 pius_denied_marian_apparition_modifier: "Denegación de aparición mariana" #deepl:2614316853
 pius_marian_holy_ground_modifier: "Sitio de peregrinación mariana" #deepl:3178342376
 pius_marian_sign_to_clergy_modifier: "Signo mariano para el clero" #deepl:1776090933
 pius_marian_sign_to_government_modifier: "Señal de Marian al Gobierno" #deepl:1971367147
 pius_negotiations_with_marian_priest_modifier: "Negociaciones con el sacerdote mariano" #deepl:1759971704
 pius_the_wrath_of_mary_modifier: "La ira de María" #deepl:432524335
 pius_undecided_politics_on_marian_apparition_modifier: "Política indecisa sobre la aparición mariana" #deepl:2387809745
 pius_wounded_memory_modifier: "Memoria herida" #deepl:1461557271
