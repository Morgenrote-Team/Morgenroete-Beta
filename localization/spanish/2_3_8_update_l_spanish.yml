 concept_verrier_venus_transit: "Tránsito de Venus" #deepl:3328636769
 concept_verrier_venus_transit_desc: "El tránsito de Venus es un fenómeno poco frecuente en el que la Luna pasa entre la Tierra y Venus. Sin embargo, se produjo dos veces en el siglo XIX: en 1874 y en 1882. Dado que las observaciones del tránsito de Venus permiten sacar conclusiones sobre el tamaño del sistema solar y determinar con mayor precisión el tamaño de la unidad astronómica (UA), fueron acontecimientos científicos de gran importancia. Los países situados en la [concept_verrier_venus_transit_zone] pueden observar el acontecimiento desde allí; los demás países deben enviar expediciones. El éxito de la observación depende de la experiencia del [concept_verrier_astronomer], de la disponibilidad de un [concept_gaudi_engineer], y de un poco de suerte: a veces la meteorología puede impedir una buena imagen. Cuanto mejor sea la observación, mayor será la bonificación." #deepl:1890935103
 concept_verrier_venus_transit_zone: "Zona de tránsito de Venus" #deepl:535627695
 concept_verrier_venus_transit_zone_desc: "La Zona de Tránsito de Venus se refiere a la parte de la Tierra desde la que se puede observar un tránsito completo (no sólo parcial) de Venus. En 1874, esto fue especialmente cierto para la región de Asia Oriental-Pacífico, y en 1882 para casi todo el continente americano. A continuación se ofrece un desglose detallado de las regiones estratégicas.\n\n#V Tránsito de Venus 1874:#!\nIndonesia, Indochina, Oceanía, Sur de China, Norte de China, Manchuria, Japón, India Central, Madrás, Bengala, Himalaya; también, el Estado del Territorio del Océano Índico.\n\n#V Tránsito de Venus 1882:#!\nBrasil, La Plata, Andes, Gran Columbia, México, América Central, Caribe, El Medio Oeste, Dixie, Nueva Inglaterra; también, los Estados de Ontario y Quebec." #deepl:1055797749
 concept_vikelas_coach: "Entrenador" #deepl:3572285288
 concept_vikelas_coach_desc: "Los entrenadores son los preparadores nacionales de un país en un deporte nacional específico. Entre los deportes nacionales figuran [concept_vikelas_football], béisbol, baloncesto y críquet. Los entrenadores proporcionan bonificaciones al equipo respectivo en las competiciones, ya sea en Campeonatos Mundiales Internacionales o en partidos internacionales. Estos últimos se juegan en secreto a intervalos regulares y aumentan el valor de experiencia del entrenador tras la victoria. Los puntos de experiencia altos y los rasgos positivos de [Concept('concept_character_trait','$concept_character_traits$')] aumentan las posibilidades de ganar un Campeonato del Mundo. Los rasgos positivos son aquellos que motivan especialmente a los jugadores -como ambicioso o carismático-, mientras que los rasgos desmotivadores reducen las posibilidades de ganar un partido. Estos incluyen rasgos como despiadado o cruel.\n#R NOTA: Por el momento sólo el fútbol está integrado.#!" #deepl:183600896
 concept_vikelas_coaches: "Entrenadores" #deepl:3998480532
 concept_vikelas_football: "Fútbol" #deepl:3334413449
 concept_vikelas_football_desc: "El fútbol es un posible deporte nacional. Los primeros clubes de fútbol pueden establecerse en Europa y Sudamérica; para ello será necesario un sistema jurídico relativamente liberal, una pequeña burguesía fuerte o un nivel de vida medio considerable. Después, podrían jugarse partidos de fútbol ocasionales. Con la creación de la FIFA, también se hacen posibles los partidos internacionales y la Copa del Mundo. Los ocho mejores equipos se clasifican automáticamente para el Mundial. Los equipos se calculan según el Valor de Equipo Nacional de Fútbol (VNF), que se obtiene a partir de los parámetros de nivel de vida (aptitud de la población), fuerza de la pequeña burguesía (sistema de clubes), alfabetización (táctica) y tradición (deporte nacional: ¿sí o no?). En los partidos, no sólo se tiene en cuenta el NFTV, sino también los rasgos de carácter y la experiencia de los [concept_vikelas_coach]." #deepl:3000477120
 country_artists_decorative_can_promote_architect_boolean_desc: "Si tienes al menos un [GetBuildingType('building_arts_academy').GetName] con el [concept_pm_artists_academy_school] puedes promocionar un [concept_gaudi_architect] en la Visión General de Artistas." #deepl:738833409
