 je_verrier_venus_transit_1874_reason: "Se acerca un acontecimiento celeste poco frecuente. El planeta Venus pasará directamente entre la Tierra y el Sol, proyectando su diminuta sombra sobre el disco solar. Observatorios de todo el mundo se preparan para este fugaz fenómeno, que podría ayudar a definir la escala misma de nuestro sistema solar." #deepl:3195507086
