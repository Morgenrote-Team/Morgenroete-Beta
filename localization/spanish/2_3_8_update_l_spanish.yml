 dubois_poor_basilosaurus_paleontologist_loc: "\nEl #o Basilosaurus#! reconstruido por el profesor [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] tiene una fisiología muy extraña. Se parece más a una pelota que a otra cosa, lo que parece bastante erróneo." #deepl:1206625829
 dubois_poor_megalodon_paleontologist_loc: "\nEl #o Megalodon#! reconstruido por el profesor [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] parece estar un poco... fuera de lugar. La enorme cabeza está montada sobre un cuello muy delgado y aparentemente el tiburón tenía extrañas púas cubriendo todo su cuerpo." #deepl:3797074524
