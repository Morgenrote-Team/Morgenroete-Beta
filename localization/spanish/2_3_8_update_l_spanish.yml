 theme_mr_paleontology: "Morgenröte: Paleontología (Tierra)" #deepl:1069050187
 theme_mr_paleontology_desc: "Una interfaz de usuario inspirada en la paleontología, los fósiles y los huesos de dinosaurio." #deepl:415348285
 verrier.308.d: "Los astrónomos han predicho un Tránsito de Venus en la región de Australia-Indonesia-Pacífico en #ORANGE 1874#!. La comunidad científica de [ROOT.GetCountry.GetNameNoFlag] exige observar este acontecimiento astronómico único en la vida." #deepl:1738426681
 verrier.308.f: "Un tránsito de Venus es un paso del planeta Venus por delante del Sol. La aparición se produce sólo cuatro veces en unos 243 años. Históricamente, la medición precisa de tales pasajes era de gran importancia para determinar la distancia entre la Tierra y el Sol (unidad astronómica) y dio lugar a numerosas expediciones y campañas de medición por parte de importantes institutos y científicos. El tránsito de Venus en 1874 fue relativamente desfavorable para las mediciones astronómicas. Permaneció invisible desde casi toda Europa, sólo se observaron tránsitos largos desde Asia y tránsitos cortos desde Australia, las islas del Pacífico Sur y el sur del océano Índico (especialmente el archipiélago de Kerguelen). No obstante, se enviaron unas 60 expediciones." #deepl:3786277450
 verrier.308.g: "No deberíamos perdernos esto." #deepl:2334937119
 verrier.308.t: "Tránsito de Venus en 1874" #deepl:3101017563
 verrier.309.d: "Los astrónomos han pronosticado otro Tránsito de Venus para las regiones de América del Sur, América Central y América del Nordeste en #ORANGE #! . La comunidad científica de [ROOT.GetCountry.GetNameNoFlag] exige observar este acontecimiento astronómico único en la vida." #deepl:3366532829
 verrier.309.f: "Un tránsito de Venus es un paso del planeta Venus por delante del Sol. La aparición se produce sólo cuatro veces en unos 243 años. Históricamente, la medición precisa de tales pasajes era de gran importancia para determinar la distancia entre la Tierra y el Sol (unidad astronómica) y dio lugar a numerosas expediciones y campañas de medición por parte de importantes institutos y científicos. El tránsito de Venus de 1882 tuvo algunas ventajas sobre el de 1874, ya que fue visible en algunas regiones más accesibles. Así, el tránsito fue visible en todo el continente americano, excepto en el norte y noreste de Norteamérica." #deepl:1503344549
 verrier.309.t: "Tránsito de Venus en 1882" #deepl:2995649523
 verrier.311.d: "Se acerca un acontecimiento astronómico poco frecuente: el planeta Venus cruzará la cara del Sol. En todo el mundo, observatorios y gobiernos comienzan los preparativos." #deepl:4200477530
 verrier.311.f: "La fecha se ha calculado al segundo. Se embalan los telescopios. Los relojes se sincronizan. El planeta Venus cruzará la cara del Sol. Los astrónomos creen que el tránsito permitirá medir con precisión la unidad astronómica, la escala fundamental del sistema solar. Pero el éxito del esfuerzo depende enteramente de la visibilidad: del lugar, del tiempo y de la coordinación." #deepl:2621945333
 verrier.311.g: "Observamos el tránsito desde casa." #deepl:2383387639
 verrier.311.h: "Enviamos una expedición a uno de nuestros protectorados." #deepl:1098022190
 verrier.311.i: "Enviamos una expedición a una tierra lejana." #deepl:381412623
 verrier.311.j: "Deberíamos volver a pensarlo." #deepl:1178423846
 verrier.311.t: "Preparación del tránsito de Venus" #deepl:967668025
 verrier.319.d: "Una expedición de [SCOPE.sCountry('verrier_venus_transit_leader').GetName] ha llegado a nuestro territorio para observar el raro fenómeno astronómico del tránsito de Venus." #deepl:853589
 verrier.319.f: "Desembarcaron con cajas de lentes, relojes y cartas. Sus portavoces se reúnen con los responsables universitarios, ofreciéndoles correspondencia amistosa e información técnica. Los asistentes del observatorio se muestran curiosos, los periódicos neutrales pero alerta. Varios departamentos debaten las implicaciones: cooperación científica, sí, pero también intercambio de datos, soberanía logística y visibilidad en la escena mundial." #deepl:209223472
 verrier.319.g: "Que la ciencia sea nuestro lenguaje común." #deepl:183308092
 verrier.319.t: "Ojos extranjeros al cielo" #deepl:4019861958
 verrier.321.d: "Una violenta tormenta azotó el buque de expedición durante la travesía. En medio de olas rompientes y aparejos caóticos, varias cajas fueron arrancadas de la cubierta y se perdieron en el mar, incluidos delicados instrumentos de tránsito." #deepl:2127492192
 verrier.321.f: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName] se aferraron a la barandilla mientras el cielo se hacía añicos. El mar se había levantado como un enemigo, arrojando cuerdas y barriles por la cubierta. Las cajas -dos de ellas- se deslizaron en un arco espantoso antes de desvanecerse en la negrura.\NMás tarde, cuando la tormenta había pasado y sólo quedaba silencio, se contaron los daños. El heliómetro principal. Una lente doble de Königsberg. El Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] estaba entre la tripulación empapada y la madera rota, mirando el vacío donde había estado el equipo. Había copias de seguridad. Y el tiempo, como Venus, no espera a nadie." #deepl:2744264311
 verrier.321.g: "Continúa. Todavía tenemos suficiente para continuar." #deepl:1985224258
 verrier.321.t: "Tempestad sobre el Tránsito" #deepl:2256455346
 verrier.322.d: "Durante la calibración nocturna del campo estelar, el astrónomo de la expedición observó movimientos irregulares y puntos fijos donde no debería haberlos. La comparación posterior con los mapas estelares disponibles lo confirmó: el equipo podría haber identificado nuevos cuerpos celestes desconocidos." #deepl:2064965258
 verrier.322.f: "El barco navegaba a la deriva bajo un cielo aterciopelado. Las nubes se habían disipado horas antes, dejando tras de sí una claridad tan pura que parecía antinatural. El Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] volvió a inclinarse hacia el ocular. Allí, entre Altair y el borde de la rejilla del sextante, había movimiento. Demasiado lento para ser un cometa. Noche tras noche, [ROOT.Var('verrier_astronomer_var').GetCharacter.GetSheHe] volvía a la misma zona del cielo, dibujando, calculando, comparando. Finalmente, las notas de [ROOT.Var('verrier_astronomer_var').GetCharacter.GetHerHis] lo confirmaron: un objeto planetario menor. Posiblemente dos. Sin catalogar. Venus esperaría. Pero las estrellas ya habían ofrecido algo más." #deepl:1791725592
 verrier.322.g: "Que se sepa: los cielos aún guardan secretos." #deepl:1342826733
 verrier.322.t: "Luces inesperadas" #deepl:1561684464
 verrier.323.d: "Durante una pausa en el viaje, el equipo de la expedición se aventuró tierra adentro para estudiar posibles puntos elevados para la observación astronómica. Lo que encontraron en su lugar fue un bosquecillo de plantas desconocidas, ninguna de las cuales aparece en los registros botánicos disponibles." #deepl:3286240010
 verrier.323.f: "Comenzó con un aroma. Sutil, cítrico, que surgía de los helechos de la linde del bosque. El Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] siguió el aroma a través de la densa maleza y encontró un claro donde la luz se acumulaba como el agua. Musgo rojo cubría piedras de color obsidiana. En lo alto, racimos de enredaderas con forma de estrellas colgantes se mecían con la brisa. Uno de los asistentes más jóvenes susurró: "Parece como si el cielo hubiera caído en la tierra". Pero aquí, con el aire quieto y la luz filtrada, encontraron otro tipo de maravilla." #deepl:808904157
 verrier.323.g: "Recoger muestras y conservarlas para su estudio." #deepl:1767661174
 verrier.323.t: "Un jardín entre las estrellas" #deepl:2845961206
 verrier.324.d: "Mientras buscaban un lugar de observación elevado, la expedición tropezó con un yacimiento de inmenso interés geológico. La piedra que lo rodea presenta patrones e inclusiones raramente vistos antes." #deepl:539957699
 verrier.324.f: "El Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] recorrió con la mano [ROOT.Var('verrier_astronomer_var').GetCharacter.GetHerHis] la superficie estratificada del afloramiento. Brillaba tenuemente a la luz de la mañana, fracturada con vetas de brillo metálico. Remolinos de un verde intenso se enroscaban alrededor de núcleos de cristal anaranjado, formando un patrón que parecía casi deliberado. Un geólogo del equipo sugirió un origen volcánico. Los instrumentos que trajeron se construyeron para observar el cielo. Pero aquí, en la roca bajo sus botas, había un fragmento de la memoria profunda de la Tierra." #deepl:908721635
 verrier.324.g: "Este hallazgo pertenece a la propia historia de la Tierra." #deepl:2450655201
 verrier.324.t: "Piedra más allá del tiempo" #deepl:2335051515
 verrier.325.d: "La expedición ha llegado al puerto de entrada, pero las autoridades aduaneras se niegan a autorizarla de inmediato. Varias cajas de material científico han sido retenidas para su inspección, y los funcionarios solicitan documentación adicional que nunca antes se había exigido." #deepl:2525277400
 verrier.325.f: "El Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] estaba de pie junto al manifiesto de carga, con los dientes apretados. Las lentes de mercurio, los relojes de precisión, la carcasa de latón pulido... permanecían inertes en un almacén tras una verja cerrada, a la espera de tinta y sellos. El funcionario de aduanas fue educado, pero firme: "Científicos o no, todos los instrumentos extranjeros deben ser declarados, inspeccionados y gravados a menos que estén exentos por tratado". Y Venus no esperaría a la burocracia." #deepl:34765689
 verrier.325.g: "Pague la tasa y agilice el despacho de aduana." #deepl:240478226
 verrier.325.t: "Barreras bajo el cielo" #deepl:2346862710
 verrier.340.d: "Tras semanas de preparación, el puesto de observación del tránsito de Venus está terminado. Los instrumentos están calibrados. Las cartas están verificadas. La única incógnita es el cielo." #deepl:1138273071
 verrier.340.f: "La cúpula se alzaba como un faro de latón y propósito silencioso. Construida con piedra en suelo patrio o con lona y remaches en un campo extranjero, ahora albergaba la quietud sin aliento de la expectación.  En su interior, el heliómetro brillaba bajo la luz de las lámparas. Los engranajes giraban con un susurro. Los temporizadores chasquean a la espera. Fuera, los asistentes barrían el polvo de las lentes. Incluso el aire parecía vacilar. El Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] se detuvo ante la puerta y tocó el umbral. Durante meses, todo había avanzado hacia ese momento. Ahora ya no había nada que construir, sólo esperar. Por encima de ellos, en algún lugar del cielo invisible, Venus seguía su camino." #deepl:2967275520
 verrier.340.g: "La precisión comienza con las manos tranquilas." #deepl:2872475059
 verrier.340.t: "Observatorio preparado para el tránsito de Venus" #deepl:966063237
 verrier.341.d: "El Dr. [ROOT.Var('gaudi_engineer_var').GetCharacter.GetLastName] ha propuesto una alteración menor pero significativa del estabilizador interno del telescopio principal. La modificación podría reducir las vibraciones internas y aumentar la nitidez óptica en el momento del contacto." #deepl:491784908
 verrier.341.f: "No ocurrió en la cúpula, sino en la tienda-taller situada detrás. El Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] estaba estudiando los gráficos cuando se acercó el Dr. [ROOT.Var('gaudi_engineer_var').GetCharacter.GetLastName] con un bloc de notas manchado de grasa. Una tensión amortiguadora recalculada. Los demás escucharon con respetuoso escepticismo, hasta que las pruebas lo demostraron: la imagen era más estable en fracciones de grado. Lo suficiente como para cambiar la línea que separa el desenfoque de la claridad." #deepl:2995793810
 verrier.341.g: "Un pequeño cambio con gran precisión." #deepl:1641676745
 verrier.341.t: "El ajuste silencioso" #deepl:3486983252
 verrier.342.d: "Un reciente avance en la teoría electromagnética ha permitido aplicar un nuevo método de filtrado óptico al protocolo de observación del telescopio. Ahora es posible tener más en cuenta las interferencias provocadas por la dispersión de la luz atmosférica, lo que permite obtener datos visuales más nítidos." #deepl:2503805121
 verrier.342.f: "La idea no surgió de la cúpula ni del banco del fabricante de lentes, sino de una página. Se trataba de un perfeccionamiento de las ecuaciones ondulatorias: el comportamiento de la luz no como partícula o rayo, sino como campo oscilante. Con él, se podía predecir un nuevo modelo de interferencia y aplicar una corrección. Se recortaron los filtros. Se ajustaron los tiempos de exposición. Cuando el Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] miró a través de la lente de prueba aquella noche, las estrellas ya no se movían. Se quedaron fijas, precisas, frías, reales. El cielo había dejado de temblar." #deepl:914121255
 verrier.342.g: "Las matemáticas agudizan la vista." #deepl:2639991371
 verrier.342.t: "La ecuación de la claridad" #deepl:1039194191
 verrier.351.d: "A través de continentes y océanos, de Yokohama a Reunión, de Kerguelen a Pekín, los astrónomos han observado cómo el planeta Venus cruzaba la cara del Sol. El tránsito de 1874 se ha completado - y muchos equipos informan del éxito." #deepl:3119534429
 verrier.351.f: "Llegaron en barcos de vapor, a lomos de camello, por ferrocarril y a pie. Ingenieros, botánicos, cartógrafos. Construyeron observatorios en selvas y desiertos. Y durante seis horas, el 9 de diciembre de 1874, observaron cómo un punto negro se deslizaba por el disco solar. Venus entraba como un susurro y salía como un secreto. Las mediciones no eran perfectas, pero suficientes. La triangulación podía comenzar. Por primera vez, la humanidad podría conocer la verdadera escala de su sistema solar, no en mitos o metáforas, sino en números trazados por sombras. El Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] cerró el cuaderno [ROOT.Var('verrier_astronomer_var').GetCharacter.GetHerHis] y exhaló: Ya estaba hecho." #deepl:1827747392
 verrier.351.g: "Es precioso." #deepl:2882436754
 verrier.351.t: "El tránsito de 1874" #deepl:2395808814
 verrier.352.d: "El 6 de diciembre de 1882, el planeta Venus pasó una vez más ante el Sol. Por última vez en un siglo, observadores de todo el mundo fijaron sus instrumentos en el cielo y captaron el disco negro de Venus en vuelo." #deepl:3903856343
 verrier.352.f: "Esta vez, los barcos salieron antes. Los observatorios eran más robustos. Los relojes, más precisos. Las lecciones aprendidas en 1874 guiaron cada mano, cada sombra, cada cálculo. De Nueva Jersey a la Patagonia, de México a Australia, el mundo se detuvo para ver un punto del Sol. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] ajustó el filtro final. El disco apareció, deslizándose lentamente sobre el blanco resplandeciente. No hubo vítores, sólo el susurro de los bolígrafos, el chasquido de las persianas, el silencioso aliento del triunfo. Pasarían otros 121 años antes de que Venus regresara. Pero aquí, en este momento, se había medido el tiempo." #deepl:907305697
 verrier.352.g: "Nunca veremos el siguiente." #deepl:2603880366
 verrier.352.t: "El tránsito de 1882" #deepl:2224364038
 verrier.353.d: "A medida que se acerca el momento tan esperado, las condiciones meteorológicas empiezan a deteriorarse. Aparecen nubes, no tan densas como para ocultarlo todo, pero sí lo suficiente como para distorsionar la claridad y la sincronización." #deepl:1325753029
 verrier.353.f: "El cielo no se había cerrado del todo, pero ya no obedecía. Capas de nubes a la deriva se extendían sobre el sol como una gasa. La luz se atenuaba y se encendía en pulsos irregulares. Cada lente luchaba por mantener el equilibrio, cada asistente por respirar.\n\nEl Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] mantuvo [ROOT.Var('verrier_astronomer_var').GetCharacter.GetHerHis] ojo fijo a través del filtro. Apareció la silueta de Venus, tenue, refractada, bailando entre el vapor y el cálculo. No era una observación de manual. Pero eran datos. Datos ganados a pulso bajo un cielo caprichoso." #deepl:1908038831
 verrier.353.g: "Si el cielo nos da pedazos, debemos coserlos juntos." #deepl:1646978536
 verrier.353.t: "A través de los velos de luz" #deepl:674640397
 verrier.354.d: "Durante el tránsito de Venus, un equipo de observadores captó no sólo datos precisos, sino también imágenes. Decenas de placas fotográficas fueron expuestas en secuencia y posteriormente montadas en movimiento. Por primera vez en la historia, un tránsito planetario se ha grabado en forma de película." #deepl:2258153461
 verrier.354.f: "Parpadea. Tiembla. Pero se mueve. En una serie de placas tratadas, Venus entra por el borde, un punto negro perfecto que patina por el disco solar. No sólo un cálculo, no un esbozo: movimiento. Capturado en el tiempo. El Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] permaneció en el cuarto oscuro, con la linterna en alto, observando cómo la breve secuencia se repetía una y otra vez. Seis horas de mediciones condensadas en segundos de asombro. Los astrónomos aplaudieron. Sabían que habían hecho algo nuevo. Habían hecho que el cielo se moviera." #deepl:1856959975
 verrier.354.g: "Analizar los fotogramas para mejorar los modelos de movimiento planetario." #deepl:3348594448
 verrier.354.t: "Una sombra en movimiento" #deepl:969441096
 verrier.355.d: "Inspirada por la emoción mundial que rodeó el tránsito de Venus en 1882, una [ROOT.Var('elgar_composer_var').GetCharacter.GetFullName] ha escrito una nueva pieza ceremonial. Estrenada ante un amplio público, la marcha capta tanto la majestuosidad del acontecimiento como el ritmo de un nuevo siglo científico." #deepl:1566390789
 verrier.355.f: "Un año después del tránsito de Venus de 1882, John Philip Sousa recibió el encargo de componer una procesión para la inauguración de una estatua de bronce del físico estadounidense Joseph Henry, fallecido en 1878. Sousa, masón, estaba fascinado por lo que el grupo consideraba cualidades místicas de fenómenos naturales. La pieza no tuvo éxito en vida de Sousa. No se tocó durante muchos años, después de que las copias manuscritas de la música de Sousa se destruyeran en una inundación." #deepl:3349639062
 verrier.355.g: "Hay música que se escribe para la historia, no para las multitudes." #deepl:1666827653
 verrier.355.t: "La marcha de Venus" #deepl:1281729794
 verrier_add_x_venus_success_0_tt: "No gana #V Observación del Tránsito de Venus Éxito#!." #deepl:2753469077
 verrier_add_x_venus_success_minus_x_tt: "Perder [SCOPE.GetValue('verrier_venus_success_amount')|0+] #V  Éxito de la observación del tránsito de Venus#!." #deepl:867568724
 verrier_add_x_venus_success_plus_x_tt: "Ganancia [SCOPE.GetValue('verrier_venus_success_amount')|0+] #V  Éxito de la observación del tránsito de Venus#!." #deepl:667317191
 verrier_foreign_venus_expedition_modifier: "Expedición extranjera para el tránsito de Venus" #deepl:253236392
 verrier_venus_transit_diplomacy_modifier: "Negociaciones diplomáticas para el tránsito de Venus" #deepl:1903396933
 verrier_venus_transit_preparation_modifier: "Preparativos para el tránsito de Venus" #deepl:3653758437
 vikelas.21.d: "En un gimnasio de [SCOPE.sState('vikelas_basketball_state').GetName] se ha inventado un nuevo juego que algún día resonará en pabellones y estadios de todo el mundo." #deepl:3471187932
 vikelas.21.f: "No patear. Nada de correr con el balón. Y dos cestas de melocotones clavadas en una galería.'\nEn [TimeKeeper.GetCurrentDate.Format('y')], en una escuela de [SCOPE.sState('vikelas_basketball_state').GetFarmHubName], el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] se enfrentaba a un problema: cómo mantener [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] activos a los inquietos alumnos en el interior durante el invierno. [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis|U] solución era sencilla - y extraña. Un balón de fútbol, dos cestas de melocotón elevadas y trece reglas.\nA los chicos les pareció raro al principio. Nada de contacto. Nada de regates. Sólo pases y lanzamientos con cuidado. Pero algo les gustaba. El juego se extendió a otras escuelas y luego a otras ciudades. En menos de una década, los gimnasios de Nueva York a Tokio resonaban al ritmo de pelotas que rebotaban y gritos de "¡Canasta!"\nLo que empezó como un pasatiempo para climas fríos puede convertirse en algo más grande. Es un deporte rápido, de equipo, adaptado a la vida moderna y, sobre todo, nacido en [ROOT.GetCountry.GetAdjectiveNoFormatting]." #deepl:3707830614
 vikelas.21.g: "Introdúzcalo en escuelas y gimnasios." #deepl:2248999233
 vikelas.21.t: "El juego de la cesta de melocotones" #deepl:2623215155
 vikelas.401.d: "En la actualidad, la Asociación Internacional de Fútbol se fundó en [GetGlobalVariable('vikelas_fifa_seat_global_var').GetStateRegion.GetCityHubName]. Su nombre completo es Fédération Internationale de Football Association (FIFA)." #deepl:3487975302
 vikelas.401.f: "El 21 de mayo de 1904, los delegados de siete naciones -Bélgica, Dinamarca, Francia, Países Bajos, España, Suecia y Suiza- firmaron una carta. El objetivo: estandarizar las reglas del fútbol, organizar partidos internacionales y elevar el juego a un nivel mundial. Así nació la Fédération Internationale de Football Association - FIFA. En sus primeras décadas, la FIFA era modesta: una presidencia a tiempo parcial, jugadores aficionados y disputas regionales. Pero bajo la superficie, crecía un movimiento global. Inglaterra dudó en unirse, recelosa de la injerencia extranjera. Los sudamericanos empezaron a formar sus propias confederaciones. En 1924 y 1928, los torneos olímpicos revelaron el verdadero alcance del fútbol: multitudes de 60.000 personas en París, animando no a ejércitos, sino a equipos." #deepl:2154770056
 vikelas.401.g: "Únete a la FIFA y apoya la competición internacional." #deepl:1192623767
 vikelas.401.t: "Federación Internacional de Fútbol Asociación" #deepl:2948752940
 vikelas.411.d: "La FIFA ha decidido que la Copa del Mundo de este año se celebre en [SCOPE.sCountry('vikelas_fifa_host_scope').GetName]. Tras la ronda preliminar, la lista de favoritos se reduce a ocho equipos." #deepl:1721956240
 vikelas.411.f: "#V Las siguientes selecciones nacionales se han clasificado para cuartos de final#!\n[SCOPE.sCountry('vikelas_first_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_second_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_third_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_fourth_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_fifth_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_sixth_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_seventh_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_eighth_qualified_team_scope').GetName]" #deepl:1470693747
 vikelas.411.g: "Que prevalezca el mejor equipo." #deepl:900366891
 vikelas.411.t: "Copa del Mundo de Fútbol [TimeKeeper.GetCurrentDate.Format('y')]" #deepl:3683642621
 vikelas.412.d: "Nuestro equipo ha triunfado en la escena mundial, derrotando a las mejores escuadras de todos los continentes. Las celebraciones estallan en todo el país." #deepl:1604872733
 vikelas.412.f: "En un acalorado partido contra [SCOPE.sCountry('vikelas_second_winner_team_scope').GetName], nuestra selección ha demostrado su valía en la final de la Copa del Mundo en [SCOPE.sCountry('vikelas_fifa_host_scope').GetName]. Nuestra selección ha levantado el trofeo dorado. El pitido final resonó en radios, cafés, cuarteles. Desde los mineros del norte hasta los comerciantes del puerto, el pueblo rugió al unísono. El capitán llora en el podio. Una nueva generación mira y sueña." #deepl:1159882054
 vikelas.412.g: "Somos los campeones." #deepl:2663168066
 vikelas.412.t: "Campeones del mundo" #deepl:3853223886
 vikelas.413.d: "Nuestro equipo de fútbol llegó a la final y se quedó a las puertas de la gloria. En todo el país, el orgullo y la angustia se mezclan a partes iguales." #deepl:80141764
 vikelas.413.f: "Por desgracia, lo mejor de nuestro equipo no fue suficiente. En un partido angustioso contra [SCOPE.sCountry('vikelas_first_winner_team_scope').GetName], nuestros hombres se quedaron cortos. Durante semanas, llevaron las esperanzas de una nación. En campos embarrados y con un calor cegador, corrieron, lucharon y creyeron. Partido a partido, se convirtieron en leyendas. Levantaron la cabeza mientras sonaba el otro himno. No hubo lágrimas, sólo silencio, y luego, un aplauso lento y creciente." #deepl:3695564906
 vikelas.413.g: "¡Esto nos lo robaron!" #deepl:3624655051
 vikelas.413.t: "Gloria de plata en [SCOPE.sCountry('vikelas_fifa_host_scope').GetName]" #deepl:3043927783
 vikelas.414.d: "Nuestra selección nacional fue eliminada prematuramente de la Copa Mundial de la FIFA en [SCOPE.sCountry('vikelas_fifa_host_scope').GetName]. [SCOPE.sCountry('vikelas_first_winner_team_scope').GetName] derrotó a [SCOPE.sCountry('vikelas_second_winner_team_scope').GetName] en la final." #deepl:317995881
 vikelas.414.f: "Había habido esperanza, esperanza real y tangible. Victorias vitoreadas en los patios de las fábricas, comentarios radiofónicos susurrados en las iglesias, niños recreando goles en los callejones. El equipo representaba algo más que el fútbol: la ambición, el orgullo, la creencia de que podíamos superarnos a nosotros mismos. Pero el último partido lo cambió todo. Un único gol encajado. Una mano no vista. Una oportunidad perdida. Ahora el sueño ha terminado, y el mundo sigue adelante." #deepl:640236906
 vikelas.414.g: "Creíamos. Con eso bastaba." #deepl:4069550601
 vikelas.414.t: "El sueño acaba pronto" #deepl:1366412702
 vikelas.490.d: "[ROOT.Var('vikelas_coach_var').GetCharacter.GetFullName] se hizo un nombre entrenando y formando a toda una generación de jugadores. [ROOT.Var('vikelas_coach_var').GetCharacter.GetSheHe] es ahora lo bastante famoso como para ser considerado entrenador senior." #deepl:3173542618
 vikelas.490.f: ""
 vikelas.490.g: "Un premio por ser capaz de gritar descaradamente en el campo." #deepl:1195265680
 vikelas.490.t: "[ROOT.Var('vikelas_coach_var').GetCharacter.GetFullName] ¡es ahora Entrenador Senior!" #deepl:454610152
 vikelas.495.d: "Un nuevo [concept_vikelas_coach] ha introducido [SCOPE.sCharacter('vikelas_new_coach_scope').GetHerselfHimself]. [SCOPE.sCharacter('vikelas_new_coach_scope').GetHerHis|U] nombre es [SCOPE.sCharacter('vikelas_new_coach_scope').GetFullName]." #deepl:1753591119
 vikelas.495.f: ""
 vikelas.495.g: "[SCOPE.sCharacter('vikelas_new_coach_scope').GetSheHe|U] llevará a nuestros chicos a la victoria." #deepl:1930939286
 vikelas.495.t: "Un nuevo entrenador" #deepl:2806014865
 vikelas.601.d: "Un nuevo invento ha aparecido en los bulevares: un artilugio de dos ruedas propulsado por pedales fijados directamente a la rueda delantera. Se llama "velocípedo"." #deepl:497189807
 vikelas.601.f: "En los parques y en las anchas calles de la capital, las cabezas se vuelven. Caballeros con sombrero y chaleco se encaraman a extraños armazones de hierro, pedalean furiosamente, tambaleándose entre la multitud sobresaltada. Algunos se caen. Otros vuelan. Los niños ríen. Los viejos estadistas levantan las cejas. Los periódicos lo llaman le vélocipède, mitad juguete, mitad promesa. Inventado por un fabricante de carruajes, este "sacudidor de huesos" es tan pesado como revolucionario. Sobre adoquines, hace temblar la columna vertebral. Pero en paseos suaves, se mueve con una gracia sorprendente. Se rumorea que no es una simple novedad, sino la semilla de un nuevo tipo de movimiento." #deepl:2987098471
 vikelas.601.g: "¡Una moda divertida!" #deepl:3063453559
 vikelas.601.t: "Pedales en el asfalto" #deepl:583302045
 vikelas.602.d: "Ha surgido un nuevo diseño de bicicleta, con ruedas del mismo tamaño, un eje trasero accionado por cadena y un equilibrio mejorado. A diferencia de las precarias bicicletas de ruedas altas, esta "bicicleta de seguridad" es estable, asequible y se está convirtiendo rápidamente en una sensación. ¿Su inventor? [SCOPE.sCharacter('vikelas_bicycle_inventor_scope').GetFullName] ¡!" #deepl:1082254426
 vikelas.602.f: "Los viejos velocípedos hacían temblar huesos y nervios por igual. Los altísimos velocípedos ofrecían velocidad, pero a un precio que pocos estaban dispuestos a pagar: un movimiento en falso y el ciclista salía volando. Ahora, un nuevo tipo de bicicleta sale de los talleres de nuestra capital: compacta, elegante y segura. Con una transmisión por cadena a la rueda trasera y ruedas neumáticas, hasta las señoras y los obreros empiezan a montar. Las calles, antes gobernadas por carruajes, resuenan ahora con el suave zumbido de la goma sobre la piedra. Tanto en los cafés como en las fábricas, el veredicto es el mismo: esto no es un juguete. Es la libertad, rápida, silenciosa y de repente al alcance de la mano." #deepl:2048166631
 vikelas.602.g: "Que todos los ciudadanos entren en la era moderna." #deepl:158167297
 vikelas.602.t: "La bicicleta del futuro" #deepl:3168239488
 vikelas.611.d: "Ha llegado el día. Motociclistas de todo el país se reúnen en la línea de salida, ansiosos por poner a prueba al hombre y a la máquina en la carretera. El aire cruje de expectación." #deepl:3817467534
 vikelas.611.f: "El sol se eleva sobre el bulevar, ya abarrotado de espectadores. Las pancartas ondean. El olor a grasa y polvo flota en el aire matinal. Decenas de ciclistas montan en sus bicicletas, algunas máquinas relucientes recién salidas de fábrica, otras remendadas en talleres de callejones. Suena un disparo. Y las ruedas empiezan a girar. Atraviesan las puertas de la ciudad y se adentran en el campo. Los granjeros se detienen en sus campos. Los niños corren junto a la carretera. Los sacerdotes los bendicen. Los cínicos se burlan. Y, sin embargo, a medida que el polvo se escurre tras ellos, una extraña sensación surge entre la multitud: esto parece el comienzo de algo más grande." #deepl:872369825
 vikelas.611.g: "Que cada ciudad oiga el zumbido del progreso." #deepl:4082081516
 vikelas.611.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]" #deepl:804172156
 vikelas.621.d: "El vencedor de la carrera ciclista nacional ha conseguido algo más que la línea de meta: ha cautivado la imaginación de la nación. Ahora, todas las miradas se centran en lo que representa." #deepl:2904065614
 vikelas.621.f: "Los periódicos le llaman "El Jinete de Hierro". Nacido en el seno de una familia de tejedores, huérfano a los doce años y trabajador en una fábrica a los dieciséis. Su victoria sobre una maltrecha bicicleta de seguridad - remendada, raspada y engrasada con esmero - no fue un mero triunfo deportivo. Fue una parábola. Las multitudes corean su nombre. Los pintores lo dibujan. Los niños imitan su postura. Pero más que eso, los ideólogos toman nota. Algunos le llaman el rostro de la fuerza del trabajo. Otros dicen que demuestra la vitalidad de la nación. La prensa discute si es un trabajador, un patriota o algo completamente nuevo. Sonríe, asiente y cabalga." #deepl:2953543537
 vikelas.621.g: "Conviértelo en un héroe de la clase trabajadora." #deepl:2363628364
 vikelas.621.h: "Celébrenlo como un icono nacional." #deepl:255033591
 vikelas.621.i: "Enmarcarlo como símbolo del progreso y del hombre moderno." #deepl:3398545154
 vikelas.621.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]" #deepl:804172156
 vikelas.622.d: "Se ha producido un trágico accidente durante la carrera nacional de ciclismo. Un ciclista ha muerto y varios han resultado heridos. Los vítores han cesado." #deepl:644341100
 vikelas.622.f: "Una rueda se metió en un surco. Un grito, un choque y luego gritos. Los espectadores se precipitaron hacia delante mientras las bicicletas caían como fichas de dominó. La sangre se mezcló con el polvo. Los cascos se partieron. Los huesos se rompen. Un joven de diecisiete años, aprendiz en una fábrica, murió en el impacto. Los periódicos están divididos. Algunos lo califican de precio necesario del progreso, otros denuncian la imprudencia del deporte público." #deepl:1135060049
 vikelas.622.g: "Honrar a los caídos." #deepl:3728569964
 vikelas.622.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]" #deepl:804172156
 vikelas.623.d: "Una etapa concreta de la carrera ha cautivado los corazones del público. Los espectadores hablan de ella no sólo como una competición, sino como una leyenda." #deepl:438486236
 vikelas.623.f: "Los jinetes desaparecieron en las colinas al amanecer. Lo que siguió ya no fue una carrera, sino una prueba de espíritu. Una docena se quedó atrás. Tres se desplomaron. Uno se estrelló en una curva cerrada y se levantó sangrando, pidiendo ayuda. Pero uno se adelantó a través de la niebla hacia los corazones de miles de personas. La nación entera no habla de otra cosa." #deepl:130901318
 vikelas.623.g: "Que el camino recuerde su esfuerzo durante generaciones." #deepl:3983380699
 vikelas.623.h: "Encargue un cuadro del momento." #deepl:1275386135
 vikelas.623.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]" #deepl:804172156
 vikelas.624.d: "Las acusaciones han estallado tras la última etapa de la carrera. Un corredor ha sido sorprendido haciendo trampas, aunque algunos afirman que sólo estaba haciendo lo que todo el mundo hace, pero con menos discreción." #deepl:3963790231
 vikelas.624.f: "Dicen que cambió las bicicletas detrás del granero. Otros dicen que fue remolcado colina arriba por un cable oculto'. Los hechos son confusos. Lo que está claro es esto: el ciclista era demasiado rápido. Espectacularmente rápido. Demasiado fresco después de una subida brutal. Sus rivales se enfurecen. Los espectadores jadean. La prensa huele sangre. Una fotografía muestra a un segundo hombre con la misma ropa. Otro testigo afirma haber visto al corredor empujado por un coche durante la etapa nocturna. El acusado lo niega todo, lo llama envidia y política." #deepl:2810733320
 vikelas.624.g: "Descalificar al piloto y desenmascarar el fraude." #deepl:2198835421
 vikelas.624.h: "Cúbrelo por el bien del deporte." #deepl:3797817672
 vikelas.624.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]" #deepl:804172156
 vikelas.625.d: "Una feroz rivalidad se ha apoderado de la temporada de carreras de este año. Dos corredores, iguales en fuerza pero opuestos en estilo, han dividido a la nación en dos bandos." #deepl:2483368762
 vikelas.625.f: "Uno es el fuego: temerario, audaz, adorado por los jóvenes. El otro es el hielo: tranquilo, calculador, casi matemático. Guarda sus fuerzas, gana por segundos y sólo habla cuando es necesario. Sus nombres se gritan a los cuatro vientos. Las ciudades toman partido. Los carteles se imprimen en rojo o azul. Los sastres venden gorras con sus colores. Los niños imitan sus posturas en bicicletas de madera. Hablan de carácter, de filosofía, de lo que la gente quiere ser. Y ninguno de los ciclistas cede un ápice." #deepl:1380551122
 vikelas.625.g: "Ello redundará en beneficio de la cultura periodística." #deepl:3508242265
 vikelas.625.h: "Utilizar la rivalidad en beneficio político." #deepl:442554493
 vikelas.625.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]" #deepl:804172156
 vikelas.626.d: "Una feroz rivalidad se ha apoderado de la temporada de carreras de este año. Dos ciclistas, iguales en fuerza pero opuestos en estilo, han dividido a la nación en dos bandos." #deepl:2483368762
 vikelas.626.f: "Lo encontraron en una herrería del pueblo, martillo en mano, la cara ennegrecida por el hollín, solo". Una curva mal calculada, un crujido de grava y la horquilla delantera se partió. Su bicicleta se dobló como un pájaro herido. La mayoría se habría detenido. Cojeó cuesta abajo, arrastrando el cuadro durante kilómetros. En un pueblo remoto, encontró una herrería. No había mecánicos. Ningún coche de equipo. Sólo fuelles, yunques y sus propias manos. Durante horas trabajó con las mangas arremangadas y la mandíbula apretada, reconstruyendo la horquilla delantera de memoria y al tacto. Ocho horas por detrás de los líderes, volvió a montar. Sin posibilidades de victoria. Pero a lo largo de la ruta, la multitud se levantó para vitorear, no al ganador, sino al que se negaba a detenerse." #deepl:896070649
 vikelas.626.g: "Una historia inspiradora." #deepl:3324986220
 vikelas.626.h: "Permitir reparaciones de emergencia." #deepl:385201552
 vikelas.626.i: "¡Honradle!" #deepl:581594471
 vikelas.626.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]" #deepl:804172156
