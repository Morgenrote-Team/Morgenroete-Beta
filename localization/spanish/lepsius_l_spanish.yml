 je_lepsius_discovery_mycenae: "Investigaciones en Micenas"
 je_lepsius_discovery_mycenae_reason: "Tenemos todos los motivos para creer que la antigua ciudad de Micenas aún guarda un secreto. La búsqueda podría llevarnos años. Quien logre realizar este descubrimiento debería tener un lugar para ello en la historia."
 je_lepsius_disovery_mycenae_success: "Si conseguimos encontrar diez pistas en Argólida, habremos reunido material suficiente para redescubrir un lugar perdido de gran importancia histórica."
