 je_lepsius_excavation_harappa: "Excavaciones de Harappa"
 je_lepsius_excavation_harappa_reason: "#T Las ruinas de Palmira en Siria son un lugar fascinante para los arqueólogos. #!\n$mr_divider_for_je$\nEach mes irás ganando progreso dependiendo de muchos factores diferentes. En ciertos puntos de la excavación, recibirás un evento que te otorgará [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')], experiencia y cambiará el rasgo de estado, lo que se traduce en más [concept_curtiss_tourism] ingresos.\n$mr_divider_for_je$\n$lepsius_excavation_progress_loc$"
 je_lepsius_excavation_harappa_0_loc: "Las ruinas todavía se encuentran en gran parte en el mismo estado en el que estuvieron durante siglos."
 je_lepsius_excavation_harappa_1_loc: "La reciente excavación y restauración parcial del Templo de Bel ha atraído a más personas que desean visitar el antiguo sitio."
 je_lepsius_excavation_harappa_2_loc: "Nuestros arqueólogos han excavado y restaurado varios templos como el Templo de Bel, el Valle de las Tumbas con sus Tumbas de la Torre y muchos otros lugares. Esto hace que cada vez haya más visitantes."
 lepsius.5020.t: "El sitio de Harappa"
 lepsius.5020.d: "Todavía no sabemos mucho sobre el sitio de Harappa, pero nuestros arqueólogos están ansiosos por descubrir los misterios de la antigua ciudad."
 lepsius.5020.f: "Hasta el momento se desconoce cuánto daño ha sufrido el lugar durante todo este tiempo, pero nuestros equipos arqueológicos ya se están preparando para excavar el lugar y están sondeando varios lugares para ver dónde sería más prometedor excavar."
 lepsius.5020.g: "Un sitio de gran importancia para la India"
 lepsius.5021.t: "Una ciudad en forma de cuadrícula"
 lepsius.5021.d: "La excavación ha sacado a la luz una ciudad construida en cuadrícula. La ciudad debió ser enorme y todavía no sabemos cuántas personas pudieron haber vivido aquí en el pasado."
 lepsius.5021.f: "\"Es fascinante que, además de Mesopotamia y Egipto, existiera otro lugar donde se originó la civilización. Nunca hubiera pensado que, de todos los lugares posibles, la India pudiera albergar una de las ciudades de la Edad del Bronce más grandes del mundo\". - Uno de sus arqueólogos"
 lepsius.5021.g: "Una nueva cuna de civilización"
 lepsius.5022.t: "Los muros de Harappa"
 lepsius.5022.d: "Nuestros arqueólogos han excavado un lugar que ahora llaman la Ciudadela. Aún no está claro por qué los habitantes de Harappa necesitaban un lugar fortificado en su ciudad."
 lepsius.5022.f: "\"¡Estoy absolutamente seguro de que temían la invasión de los Marinos!\"\n\"¡Los Marinos estaban en el Mediterráneo, no aquí! ¡Creo que tenían que proteger su comida de esos molestos campesinos!\"\n\"Lo dudo mucho. ¡Deben haber erigido un templo fortificado para sus dioses!\""
 lepsius.5022.g: "¡Esto es fascinante!"
 lepsius.5023.t: "Sistema de drenaje de Harappa"
 lepsius.5023.d: "Nuestra excavación ha sacado a la luz un complejo sistema de drenaje y eliminación de residuos. Incluso parece que hay algunos sanitarios que estaban conectados a esos desagües."
 lepsius.5023.f: "\"Ni siquiera tengo un baño tan moderno como el de los habitantes de Harappa. ¡Debían ser extremadamente avanzados!\""
 lepsius.5023.g: "Y pensar que hasta el día de hoy seguimos luchando con las aguas residuales..."
 je_lepsius_petra: "Petra - El legado de los nabateos"
 je_lepsius_petra_reason: "En torno al año 1800, sólo unos pocos investigadores conocían la existencia de una ciudad legendaria excavada en la roca en Oriente Próximo. Petra no fue redescubierta hasta 1812 por el aventurero árabe suizo Johann Ludwig Burckhardt. Aunque muchos viajeros han visitado posteriormente el lugar, todavía no se ha realizado un estudio arqueológico detallado de Petra."
 lepsius.77.t: "El legado de los nabateos"
 lepsius.77.d: "El doctor [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] realizó la primera investigación arqueológica seria de la ciudad de Petra y recuperó reliquias del pasado. ¡Un acto científico inspirador!"
 lepsius.77.f: "Petra, un yacimiento arqueológico en la actual Jordania, fue en la antigüedad la capital del Imperio nabateo. Por sus monumentales templos funerarios, cuyas fachadas fueron talladas directamente en la roca, se considera un monumento cultural único. La historia de la ciudad está estrechamente ligada a la del Imperio nabateo, el primer imperio árabe de la historia. Sin embargo, aparte de una serie de inscripciones, los nabateos apenas dejaron testimonio escrito de su propia existencia. Por ello, su historia y la de Petra solo se pueden entender de forma fragmentaria e indirecta a través de fuentes bíblicas, griegas y romanas. El edificio más famoso de Petra es Khazne al-Firaun, de casi 40 metros de alto y 25 de ancho, construido en estilo helenístico. El \"Tesoro del Faraón\", como lo llamaban los beduinos, era en realidad una de las numerosas tumbas de roca. Es posible que se haya construido para el rey nabateo Aretas IV, que reinó en el siglo I a. C. Otros investigadores, sin embargo, sólo datan el Khazne en el siglo II d.C., en la época del emperador Adriano."
 lepsius.77.g: "Este es un lugar donde también se podrían esconder artefactos ocultistas cristianos."
