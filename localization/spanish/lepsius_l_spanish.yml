 je_lepsius_cleopatras_needle: "Cleopatra's Needle"
 je_lepsius_cleopatras_needle_reason: "For centuries, the two obelisks in Alexandria, known as 'Cleopatra's Needles', have attracted international interest. One of them has already been gifted to the United Kingdom, though London has so far failed to recover this obelisk. Perhaps we could follow this example and ask the Egyptian authorities if we might have the other 'Needle'? To achieve this, of course, we would have to become a leading nation in Egyptology."
 je_lepsius_cleopatras_needle_fail: "Any country has the right to transport Cleopatra's Needle."
 je_lepsius_cleopatras_needle_transport: "Cleopatra's Needle - Transport"
 je_lepsius_cleopatras_needle_transport_reason: "Transporting an obelisk is a far more difficult undertaking than one might think. No wonder the French only kept one, which stands in the Place de la Concorde - the second obelisk promised to them still stands in Luxor."
 je_lepsius_cleopatras_needle_transport_success: "Once the Obelisk reaches the capital, an archaeologist must restore and prepare it, and an engineer must assist in its erection.\n\n#R Important:#! The archaeologist's work on the restoration and the engineer's work on the reconstruction will not begin until the obelisk has arrived."
 je_lepsius_ishtar_gate: "Ishtar Gate"
 je_lepsius_ishtar_gate_reason: "As early as 1815, Claudius Rich produced a topographical survey of the ruins of Babylon. Even then, he assumed that a large mound might be a palace or even the Tower of Babel. How much of this palace complex remains, and whether anything can be recovered from it, is as yet unknown - but modern investigations could shed light on the nature of the mound. Of course, we should also ensure that we have permission to take the material home with us."
 je_lepsius_ishtar_gate_fail: "Any country has discovered the Ishtar Gate."
 je_lepsius_ishtar_gate_transport: "Ishtar Gate - Transport"
 je_lepsius_ishtar_gate_transport_reason: "After an expedition to Babylonia recovered remains of the legendary Ishtar Gate, we extended our excavation license to have the Babylonian bricks shipped to our museum."
 je_lepsius_ishtar_gate_transport_success: "A total of 200,000 bricks are needed to restore the gate to its former glory. About 20,000 bricks are expected to reach us annually - should there be no problems. New shipments will only arrive as long as we continue to carry out excavations in Babylonia.\n\n#R Important:#! The archaeologist's work on the restoration and the engineer's work on the reconstruction will not begin until at least 100,000 bricks have arrived."
 je_lepsius_piedras_negras: "Piedas Negras Stele"
 je_lepsius_piedras_negras_reason: "Piedas Negras is an important Mayan city in Guatemala, inhabited since the 7th century BC. It was an independent city-state that experienced a cultural golden age, particularly from the 7th to the 9th centuries, and boasts numerous monumental stelae. Perhaps we can acquire a particularly unique piece for our museum?"
 je_lepsius_piedras_negras_fail: "Any country transports the Piedas Negras Stele to their museum."
 je_lepsius_piedras_negras_transport: "Piedras Negras Stele - Transport"
 je_lepsius_piedras_negras_transport_reason: "In the 1930s, the University of Pennsylvania Museum led extensive expeditions to transport several multi-ton stelae from the dense Guatemalan jungle under extreme conditions. Since there were no roads, the massive monoliths had to be painstakingly maneuvered on wooden sleds and rafts across the treacherous Usumacinta River."
 je_lepsius_piedras_negras_transport_success: "Once the Piedras Negras Stele reaches the capital, an archaeologist must restore and prepare it, and an engineer must assist in its erection.\n\n#R Important:#! The archaeologist's work on the restoration and the engineer's work on the reconstruction will not begin until the obelisk has arrived."
 je_lepsius_axum_obelisk_transport: "Axum Obelisk - Transport"
 je_lepsius_axum_obelisk_transport_reason: "Historically speaking, the transport of the obelisk from Axum to Rome and its re-erection in 1937 was a major undertaking. It was secured and erected there using metal rods that were placed inside the stele."
 je_lepsius_axum_obelisk_transport_success: "Once the Obelisk reaches the capital, an archaeologist must restore and prepare it, and an engineer must assist in its erection.\n\n#R Important:#! The archaeologist's work on the restoration and the engineer's work on the reconstruction will not begin until the obelisk has arrived."
