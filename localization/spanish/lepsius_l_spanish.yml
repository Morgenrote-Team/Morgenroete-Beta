 lepsius.5000.t: "Las ruinas de Palmira"
 lepsius.5000.d: "Nuestro país alberga las ruinas de la antigua ciudad de Palmira. Nuestros arqueólogos están ansiosos por comenzar a excavar el sitio y aprender todo lo que puedan de él."
 lepsius.5000.f: "Palmira es una antigua ciudad siria que existió durante siglos. La ciudad era conocida por sus comerciantes. Los ricos comerciantes construyeron muchos monumentos que sobrevivieron al tiempo. Como resultado, muchos de los edificios antiguos sufrieron alteraciones, una situación difícil para los arqueólogos. La ciudad es famosa no solo por sus comerciantes, sino también por Zenobia, reina del efímero Imperio de Palmira. Ella tomó el control del este del Imperio Romano durante algún tiempo hasta que el emperador Aureliano reconquistó el este y destruyó la ciudad de Palmira."
 lepsius.5000.g: "¡Me pregunto qué encontraremos!"
 lepsius.5001.t: "Templo de Bel restaurado"
 lepsius.5001.d: "Nuestros arqueólogos han trabajado incansablemente para restaurar el Templo de Bel. Fue necesario eliminar añadidos y modificaciones del periodo musulmán de la ciudad y liberar partes enterradas del edificio."
 lepsius.5001.f: "El Tell o colina sobre la que se construyó el templo ya era utilizado por los humanos desde el año 3000 a.C., como reveló nuestro análisis estratigráfico. El templo que reconstruimos en la medida de lo posible es un templo romano, que data de finales del siglo I y la primera mitad del siglo II d.C.\nMás tarde, el templo se convirtió en una iglesia cristiana y, una vez que los árabes conquistaron la región, se convirtió en una mezquita.\n\n#V Hoy:#! Lamentablemente, el Templo de Bel fue destruido por ISIS en 2015. Sin embargo, existen planes para reconstruir el templo con las partes que aún existen."
 lepsius.5001.g: "¡Me pregunto qué encontraremos!"
 lepsius.5002.t: "Se excava el Valle de las Tumbas"
 lepsius.5002.d: "Al oeste de Palmira hay numerosas tumbas que albergan impresionantes torres funerarias que nuestros arqueólogos han excavado y restaurado parcialmente."
 lepsius.5002.f: "La Necrópolis llamada Valle de las Tumbas alberga muchas tumbas-torre. La más antigua data del año 9 a.C. y se llama Torre de Atenáton. Otra torre, la Torre de Elahbel, fue construida durante el reinado del emperador Trajano por el aristócrata palmireño Marco Ulpio Elahbelus. Elahbelus parece haberse convertido en ciudadano romano cuando el emperador Trajano estaba en el poder, ya que comparten su primer y segundo nombre.\nOtro hallazgo interesante son fragmentos de seda que probablemente fueron traídos de China.\n\n#V Hoy:#! Muchas de las Tumbas fueron destruidas cuando ISIS controlaba Palmira. Entre ellas estaban la Torre de Elahbel y la Torre de Jámblico."
 lepsius.5002.g: "¡Impresionante!"
 lepsius.5003.t: "Palmira - Ciudad de palmeras"
 lepsius.5003.d: "Nuestros arqueólogos han pasado muchos años desenterrando los restos de Palmira y reconstruyendo lo que ha sido posible. Ahora, la ciudad, que en su día fue rica, es un lugar que merece la pena visitar de nuevo."
 lepsius.5003.f: "Las ruinas de Palmira vuelven a atraer a los visitantes. Muchos quieren ver las ruinas de la otrora gran ciudad que incluso se enfrentó a Roma pero perdió. Las majestuosas Torres de la Tumba, la Gran Columnata, el Templo de Bel y el Templo de Baalshamin muestran la antigua gran riqueza de la ciudad. ¡Debe haber sido una vista fantástica cuando la Ciudad de las Palmeras estaba en su apogeo!"
 lepsius.5003.g: "¡Un lugar maravilloso para visitar!"
