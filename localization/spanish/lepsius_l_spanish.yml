 lepsius_specialization_egypt_button: "egiptología"
 lepsius_specialization_egypt_button_desc: "La egiptología explora todas las áreas de la civilización egipcia antigua (vida cotidiana, lengua y literatura, historia, religión, cultura y arte, economía, derecho, ética y vida intelectual) desde la prehistoria del quinto milenio antes de Cristo. BC (por ejemplo, las culturas Negade y Badari) hasta el final del dominio romano en el siglo IV d.C."
 lepsius_specialization_mesopotamia_button: "asiriología"
 lepsius_specialization_mesopotamia_button_desc: "La asiriología, también conocida como estudios cuneiformes o estudios del Antiguo Cercano Oriente, es el estudio arqueológico, antropológico, histórico y lingüístico de las culturas que utilizaron la escritura cuneiforme. El campo cubre la Mesopotamia predinástica, Sumeria, las primeras ciudades-estado sumerio-acadias, el Imperio acadio, Ebla, los estados de habla acadia y aramea imperial de Asiria, Babilonia y la dinastía Sealand, las dinastías extranjeras inmigrantes del sur de Mesopotamia, incluida la gutianos, amorreos, casitas, arameos, suteos y caldeos."
 lepsius_specialization_aegean_button: "Arqueología del Egeo"
 lepsius_specialization_aegean_button_desc: "Civilización del Egeo es un término general para las civilizaciones de la Edad del Bronce de Grecia alrededor del Mar Egeo. Hay tres regiones geográficas distintas pero que se comunican e interactúan bajo este término: Creta, las Cícladas y la Grecia continental. Creta está asociada con la civilización minoica de la Edad del Bronce Antiguo. La civilización cicládica converge con el continente durante el período heládico temprano y con Creta en el período minoico medio. Desde C. 1450 aC (Heládica tardía, Minoica tardía), la civilización micénica griega se extiende a Creta, probablemente mediante conquista militar."
 lepsius_specialization_precolumbian_button: "Arqueología Precolombina"
 lepsius_specialization_precolumbian_button_desc: "En la historia de las Américas, la era precolombina abarca desde el poblamiento original de las Américas en el Paleolítico superior hasta la colonización europea, que comenzó con el viaje de Cristóbal Colón en 1492. Por lo general, la era cubre la historia de las culturas indígenas hasta su influencia significativa. por los europeos. Esto puede haber ocurrido décadas o incluso siglos después de Colón para ciertas culturas."
 lepsius_alexander_search_clue_button: "Encuentra más pistas"
 lepsius_alexander_search_clue_button_desc: "Podemos emprender una expedición arqueológica especial para encontrar otra pista sobre la Tumba de Alejandro Magno."
 lepsius_ark_search_clue_button: "Encuentra más pistas"
 lepsius_ark_search_clue_button_desc: "Podremos emprender una expedición arqueológica especial para encontrar otra pista sobre el Arca de la Alianza."
 lepsius_atlantis_search_clue_button: "Encuentra más pistas"
 lepsius_atlantis_search_clue_button_desc: "Podemos emprender una expedición arqueológica especial para encontrar otra pista sobre la Atlántida."
 lepsius_eldorado_search_clue_button: "Encuentra más pistas"
 lepsius_eldorado_search_clue_button_desc: "Podemos emprender una expedición arqueológica especial para encontrar otra pista de El Dorado."
 lepsius_legendary_expedition_modifier: "Expedición Arqueológica Legendaria"
 lepsius_alexander_intensive_study_button: "Siwa"
 lepsius_alexander_intensive_study_button_desc: "El Oasis de Siwa es considerado uno de los lugares clave en la vida de Alejandro. Algunos incluso afirman que fue enterrado aquí y no en Alejandría, debido a su fuerte asociación con el dios egipcio Amón, cuyo oráculo se encontraba aquí. Debido a nuestro excelente conocimiento en el campo de la egiptología, aquí podemos encontrar fácilmente una pista adicional. Nuestro arqueólogo viajará de forma privada y encubierta, sin los problemas de una expedición."
 lepsius_ark_intensive_study_button: "Jerusalén"
 lepsius_ark_intensive_study_button_desc: "Se cree que el Monte del Templo de Jerusalén fue el último lugar donde se guardó el Arca de la Alianza antes de que desapareciera. Es muy probable que todavía haya pistas importantes debajo del Monte del Templo sobre lo que realmente pudo haber sucedido en el caos de la conquista babilónica. Debido a nuestro excelente conocimiento en el campo de la asiriología, aquí podemos encontrar fácilmente una pista adicional. Nuestro arqueólogo viajará de forma privada y encubierta, sin los problemas de una expedición."
 lepsius_atlantis_intensive_study_button: "Santorini"
 lepsius_atlantis_intensive_study_button_desc: "Santorini (Thera) es famosa por su enorme erupción volcánica, que afectó gravemente a una ciudad minoica de la isla y posiblemente a toda la civilización minoica. La tesis de que la erupción del volcán fue el origen de la historia de Platón sobre el hundimiento de la Atlántida es una de las muchas hipótesis de localización sobre la Atlántida. Gracias a nuestro excelente conocimiento en el campo de la arqueología del Egeo, aquí podemos encontrar fácilmente una pista adicional. Nuestro arqueólogo viajará de forma privada y encubierta, sin los problemas de una expedición."
 lepsius_eldorado_intensive_study_button: "Bogotá"
 lepsius_eldorado_intensive_study_button_desc: "Bogotá es considerada la antigua capital de los muisca, una civilización asociada con el mito del oro de El Dorado. Cada nuevo gobernante muisca hacía un sacrificio al dios sol cuando asumía el cargo, cubriendo su cuerpo desnudo con una pasta hecha de polvo de oro. Debido a nuestro destacado conocimiento en el campo de la Arqueología Precolombina, aquí podemos encontrar fácilmente una pista adicional. Nuestro arqueólogo viajará de forma privada y encubierta, sin los problemas de una expedición."
 lepsius_2_sub_archaeological_team_tt: "Pierde #R 2#! Equipos de excavación."
 lepsius_egypt_specialist: "Especialización: Egiptología"
 lepsius_egypt_specialist_desc: "Este arqueólogo es un experto en el campo del Antiguo Egipto y por tanto encuentra artefactos y pistas con mayor facilidad."
 lepsius_mesopotamia_specialist: "Especialización: Asiriología"
 lepsius_mesopotamia_specialist_desc: "Este arqueólogo es un experto en el campo de la Antigua Mesopotamia y por tanto encuentra artefactos y pistas con mayor facilidad."
 lepsius_aegean_specialist: "Especialización: Arqueología del Egeo"
 lepsius_aegean_specialist_desc: "Este arqueólogo es un experto en las civilizaciones micénica y minoica y, por tanto, encuentra artefactos y pistas más fácilmente."
 lepsius_precolumbian_specialist: "Especialización: Arqueología Precolombina"
 lepsius_precolumbian_specialist_desc: "Este arqueólogo es un experto en civilizaciones precolombinas y por tanto encuentra artefactos y pistas con mayor facilidad."
 lepsius_state_trait_alexander: "Huellas de Alejandro"
 lepsius_state_trait_ark: "Huellas del Arca"
 lepsius_state_trait_atlantis: "Rastros de la Atlántida"
 lepsius_state_trait_eldorado: "Huellas de El Dorado"
 lepsius.1001.t: "La llamada de Alejandro"
 lepsius.1001.d: "La inauguración de una excelente colección de artefactos egipcios, líder en el mundo, trae a la memoria un recuerdo que algunos científicos del Museo Arqueológico habían suprimido hace mucho tiempo..."
 lepsius.1001.f: "El recuerdo del templo macedonio en la arena se despierta cuando [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetFullName] mira la exposición. Porque hay otras piezas del periodo ptolomaico, algunas incluso de la época de la conquista griega. Piezas del rompecabezas que antes eran imposibles de interpretar, de repente cobran sentido. Un indicio de que podría haber más latentes en el desierto egipcio. Algo tan grande y masivo que todo el Sahara no alcanza para enterrarlo. El lugar de descanso final de Alejandro Magno sigue siendo un misterio hasta el día de hoy. Pero los numerosos hallazgos, la gran cantidad de conocimientos y la brillante experiencia arqueológica del Dr. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] son una mezcla históricamente única. El arqueólogo está seguro: Alejandro era un hombre que pertenecía a los vivos, no a los muertos. Y quien alguna vez encontrara sus lugares de descanso eterno, alcanzaría la fama eterna."
 lepsius.1001.g: "El sueño de todo arqueólogo..."
 lepsius.1002.t: "El arca"
 lepsius.1002.d: "La inauguración de una excelente colección de artefactos mesopotámicos, líder en el mundo, trae a la memoria un recuerdo que algunos científicos del Museo Arqueológico habían suprimido hace mucho tiempo..."
 lepsius.1002.f: "Los querubines decoraron el Arca de la Alianza. Criaturas híbridas tal como ocurren en Mesopotamia. Abraham, el progenitor de Israel y de las tres religiones del mundo, vino de Ur. El relato de la creación muestra paralelos con los mitos babilónicos. Babilonia es al mismo tiempo un lugar de destino para Israel: fueron los gobernantes de Mesopotamia quienes destruyeron los primeros estados judíos, redujeron el Templo a cenizas y deportaron a la población. Desde aquel día, el Arca de la Alianza, en la que se dice que Moisés colocó los Diez Mandamientos, también ha desaparecido sin dejar rastro. Es uno de los artefactos perdidos más importantes de la historia mundial. Con la vista puesta en la colección perfecta, [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetFullName] ha encontrado pistas que muestran que es posible que el Arca de la Alianza no se haya perdido para siempre y que haya estado esperando ser recuperada durante 2.500 años."
 lepsius.1003.t: "El mito más grande de todos."
 lepsius.1003.d: "La inauguración de una excelente colección de artefactos del Egeo, líder en el mundo, trae a la memoria un recuerdo que algunos científicos del Museo Arqueológico habían suprimido hace mucho tiempo..."
 lepsius.1003.f: "[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetFullName] miró el oricalco entre [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] dedos. Una pequeña bola brillante. Un material al que no se le permitía existir. Había caído en manos de [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] después de que el Museo Arqueológico inaugurara su magnífica exposición. Una exposición en la que también otras piezas de la región minoica-egea consolidaron la opinión de que ésta se encontraba en el umbral entre la ciencia y el mito. ¿Se le permitió soñar a un arqueólogo? Nadie creyó a Schliemann cuando buscó Troya. La Torre de Babel también había sido descartada como una mera metáfora. Pero ¿qué pasa con el mito más grande de todos los tiempos? Un mito tan grande que incluso el mundo antiguo ya no parecía saber qué era narrativa o qué era historia.\nDr. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] mira la bolita brillante en la que se refleja la cara de [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis]. El destino de toda una civilización perdida mira hacia atrás."
 lepsius.1004.t: "La maldición del oro"
 lepsius.1004.d: "La inauguración de una excelente colección de artefactos precolombinos, líder en el mundo, trae a la memoria un recuerdo que algunos científicos del Museo Arqueológico habían suprimido hace mucho tiempo..."
 lepsius.1004.f: "Desde la llegada de los europeos a América circulan rumores. Rumores mortales. Innumerables hombres perecieron porque su codicia por el oro los llevó: a los brazos de tribus en guerra, a pantanos infestados de malaria y a tormentas en el mar. Ponce de Léon buscaba la fuente de la juventud. Vázquez de Coronado buscó las Siete Ciudades de Oro. Hernando de Soto recorrió gran parte de América del Norte en busca de riquezas desconocidas. La esperanza de llegar a ser famoso y rico como Cortés y Pizarro era demasiado seductora, aunque engañosa. Pero ahora que [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetFullName] se inspira en el supuesto ídolo inca y lo compara con otros artefactos de la rica exposición precolombina, [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerselfHimself] teme que [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] pueda sucumbir a la misma fiebre del oro. Al final, ¿debería ser la ciencia la que condujo a [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim] al camino hacia El Dorado?"
 je_lepsius_archaeology_start_in_egypt: "El nacimiento de la egiptología"
 je_lepsius_archaeology_start_in_egypt_reason: "Todavía quedan muchos tesoros por descubrir en los desiertos de Egipto. ¿Alguno de nuestros arqueólogos marcará el comienzo de una nueva era de la egiptología y hará posible la llegada a Egipto?"
 lepsius.22.t: "El nacimiento de la egiptología"
 lepsius.22.d_egyptology: "Después de una expedición a Egipto, el Dr. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] presentó la investigación [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis]. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] no sólo pudo encontrar varios sitios nuevos gracias al desciframiento de los jeroglíficos, sino que los hallazgos de [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] también despertaron un nuevo interés en la región."
 lepsius.22.f_egyptology: "#b Contexto histórico:#! Después de la muerte de François Champollion, la investigación sobre los jeroglíficos se detuvo. En 1837, el joven filólogo alemán Karl Richard Lepsius escribió una carta a Ippolito Rosellini, un compañero cercano de Champollion y coresponsable de la expedición franco-toscana a Egipto de 1829. Lepsius sistematizó y presentó los conocimientos acumulados por Champollion y contribuyó decisivamente a elevar la egiptología. a una ciencia seria. Por otro lado, convenció a las élites políticas de Europa de futuras expediciones a Egipto."
 notification_lepsius_birth_of_egyptology_notification_name: "El nacimiento de la egiptología"
 notification_lepsius_birth_of_egyptology_notification_desc: "Un arqueólogo de [GetGlobalVariable('lepsius_egyptology_invented_country_global_var').GetCountry.GetName] ha emprendido una expedición a Egipto, marcando el comienzo de una nueva era de la egiptología. ¡Deberíamos enviar también un arqueólogo a Egipto, como todas las grandes naciones!"
 je_lepsius_yucatan_expedition: "Expedición a Yucatán"
 je_lepsius_yucatan_expedition_reason: "Hay rumores de ruinas antiguas en las selvas de Yucatán. Se dice que a un valiente explorador le esperan fantásticos tesoros. ¿Quizás un arqueólogo pueda encontrarnos los tesoros mayas? Esto nos permitiría a nosotros y a otras naciones embarcarnos en [Concept('concept_lepsius_expedition','$concept_lepsius_expeditions$')] hacia Yucatán."
 lepsius.23.t: "[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] Expedición"
 lepsius.23.d: "El equipo del Dr. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] y [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] pasó meses en las selvas de Yucatán. Ahora han regresado con tesoros, información y varios dibujos de las ruinas que encontraron. Esto iniciará una nueva era de la arqueología en Centroamérica."
 lepsius.23.f: "#b Contexto histórico:#! ¿Era el Nuevo Mundo solo hogar de salvajes y bárbaros antes de que los europeos llegaran al continente? Los exploradores John Lloyd Stephens y Frederick Catherwood sacudieron profundamente esta visión del mundo. Durante varios años, el estadounidense y el británico recorrieron la selva de la península de Yucatán y, según sus propias declaraciones, visitaron 44 lugares diferentes de una cultura mesoamericana desaparecida. Los lugareños han estado contando historias de ciudades olvidadas en la jungla y templos escondidos en la jungla durante mucho tiempo; pero los informes de Stephens, y especialmente las impresionantes litografías de Catherwood, abren un mundo hasta ahora completamente desconocido. Las imágenes de templos, estatuas y estelas no sólo inspiran las fantasías de los románticos. Una ola de interés por la civilización desconocida se está extendiendo por Estados Unidos y Europa, y va desde la curiosidad hasta la glorificación y el genuino interés científico."
 notification_lepsius_yucatan_expedition_notification_name: "Expedición Yucatán"
 notification_lepsius_yucatan_expedition_notification_desc: "Un arqueólogo de [GetGlobalVariable('lepsius_yucatan_expedition_country_global_var').GetCountry.GetName] regresa de un viaje de aventuras por la península de Yucatán y habla de ruinas legendarias en la jungla. Los científicos han expresado interés en explorar más de cerca la cultura maya."
 lepsius.1011.t: "[SCOPE.sState('lepsius_location_state').GetNameNoFormatting]"
 lepsius.1011.d_alexander: "Comienza otro capítulo en la búsqueda de la tumba del hombre más poderoso de la antigüedad. La información hasta ahora sugiere que puede haber una pista en [SCOPE.sState('lepsius_location_state').GetName] que podría ayudar a localizar el Mausoleo de Alejandro. Los equipos de excavación y el Dr. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] están listos."
 lepsius.1011.d_ark: "Un viento cálido del desierto toca al equipo de expedición y al Dr. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] mientras alcanzan el objetivo de su búsqueda con [SCOPE.sState('lepsius_location_state').GetName]. El secreto del Arca de la Alianza será desvelado una vez más aquí."
 lepsius.1011.d_atlantis: "¿Era [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] un tonto? ¿Uno de miles en miles de años? ¿Cuántos habían creído la historia de Platón y nunca regresaron o estaban llenos de vergüenza y dolor? El Dr. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] lo sabe: En este viaje sólo hubo éxito. Cualquier otra cosa significaba el fin de la carrera de [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis]."
 lepsius.1011.d_eldorado: "Los expedicionarios se quejan del clima tropical. El Dr. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] se refresca con un ventilador. El sendero conduce a una zona remota. Algunos porteadores rumorean que pueden perderse tanto como tantas tropas de los conquistadores españoles en su búsqueda de oro..."
 lepsius.1011.f: "'Pregúntate, ¿por qué buscas la Copa de Cristo? ¿Es para su gloria o para la tuya?"
 lepsius.1011.g: "Excavar más hondo."
 lepsius.1012.t: "Regreso exitoso"
 lepsius.1012.d_alexander: "El calor insoportable desaparece por un momento. El Dr. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] mira las notas de [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis]. Nuevas conexiones arrojan nueva luz sobre la búsqueda del mausoleo de Alejandro Magno. Un pensamiento pasa por mi mente. No pasaría mucho tiempo antes de que [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] encontrara la historia... y hiciera historia."
 lepsius.1012.d_ark: "La búsqueda del Arca de la Alianza fue más que la búsqueda de un artefacto arqueológico. Era la búsqueda de un objeto de culto perdido que prometía contacto con Dios. El Dr. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] había experimentado esto una y otra vez en este viaje. Pero ¿cuántas peregrinaciones arqueológicas tuvo que soportar [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] antes de que se produjera este contacto?"
 lepsius.1012.d_atlantis: "El mito de la Atlántida sigue vivo. El Dr. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] sabe que el viaje aún no ha llegado a su fin. Mientras [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] mira hacia el mar en el puerto y ve los pájaros dando vueltas, [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] filosofa sobre cuántos desafíos aún deben superar antes de que finalmente lleguen a su destino."
 lepsius.1012.d_eldorado: "Para sorpresa del resto del equipo de expedición, los científicos regresan vivos y enteros. Por un momento parece olvidado que el Dr. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] los envió en una misión suicida. La finalización exitosa de esta etapa camino a El Dorado da la razón a [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim]."
 lepsius.1012.f: "'La búsqueda del Grial es la búsqueda de lo divino en todos nosotros. Pero si quieres datos, no tengo ninguno para darte. A mi edad, estoy dispuesto a tomar algunas cosas por fe.'"
 lepsius.1012.g: "Otro fragmento de un gran mosaico."
 lepsius.1013.t_alexander: "Siwa"
 lepsius.1013.d_alexander: "Disfrazado de beduino, el Dr. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] pudo por sí solo encontrar acceso al destruido Oráculo de Amón. Durante la investigación, [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] encontró papiros conservados del comienzo del reinado de los Ptolomeos en un área previamente inaccesible, que proporcionan información sobre el culto a Alejandro."
 lepsius.1013.t_ark: "Jerusalén"
 lepsius.1013.d_ark: "¿En qué otro lugar que en la Ciudad Santa podría encontrarse con mayor certeza una pista que indicara el destino del Arca de la Alianza? Con una mezcla de soborno y violación de la ley, el Dr. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] logró buscar en el sistema de túneles ocultos debajo de la Cúpula de la Roca y encontrar una pista crucial sobre el paradero del precioso artefacto."
 lepsius.1013.t_atlantis: "Santorini"
 lepsius.1013.d_atlantis: "Todavía se pueden ver rastros minoicos en Santorini bajo los escombros de la enorme erupción de hace miles de años. El Dr. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] ha examinado un antiguo palacio que fue víctima del catastrófico desastre; [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] descubrió y restauró toda una serie de frescos enterrados. Uno de ellos muestra un mapa que, sorprendentemente, muestra con precisión las características del Mediterráneo y la costa occidental atlántica."
 lepsius.1013.t_eldorado: "Bogotá"
 lepsius.1013.d_eldorado: "El Dr. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] ha explorado los alrededores de Bogotá, donde una vez vivió el misterioso pueblo Musica. Los consejos de los lugareños llevaron a [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim] a un lugar previamente desconocido, donde numerosos artefactos muiscas brindan más información sobre el ritual del \"Hombre Dorado\"."
 lepsius.1013.f: "Los países que se centran en una rama arqueológica específica coherente con el objetivo de una expedición legendaria tienen ventajas de gran alcance en su búsqueda de una sensación arqueológica. Esto no se aplica sólo a la obtención de una pista adicional que acelere su búsqueda."
 lepsius.1013.g: "Otro fragmento de un gran mosaico."
 lepsius_discovery_vilcabamba_modifier: "El descubrimiento de Vilcabamba"
 lepsius_peru_inspection_modifier: "Nuestro arqueólogo visita a nuestro equipo de excavación en Perú para establecer un nuevo sitio de excavación."
 lepsius_add_1_vilcabamba_clue_tt: "Obtenga #G 1#! nueva pista sobre un importante descubrimiento arqueológico en Perú."
 lepsius_add_2_vilcabamba_clue_tt: "Obtenga #G 2#! nueva pista sobre un importante descubrimiento arqueológico en Perú."
 lepsius_add_3_vilcabamba_clue_tt: "Obtenga #G 3#! nueva pista sobre un importante descubrimiento arqueológico en Perú."
 je_lepsius_discovery_vilcabamba: "Investigaciones en Perú"
 je_lepsius_discovery_vilcabamba_reason: "Tenemos todos los motivos para creer que no todos los misterios incas se han resuelto todavía. La búsqueda podría llevarnos años. Quien logre hacer este descubrimiento debería tener un lugar para ello en la historia."
 je_lepsius_discovery_vilcabamba_goal: ""
 je_lepsius_disovery_vilcabamba_success: "Si logramos encontrar diez pistas en Perú, habremos reunido material suficiente para redescubrir un lugar perdido de gran importancia histórica."
 je_lepsius_disovery_vilcabamba_fail: "Nuestros esfuerzos serán en vano si otra nación encuentra diez pistas en Perú antes que nosotros."
 lepsius.801.n: "Perú"
 lepsius.811.t_per: "Tumba de un conquistador"
 lepsius.811.f_per: "Con gran interés, los arqueólogos descubrieron una puerta cerrada que supuestamente proporcionaba acceso al lugar de enterramiento perdido de un príncipe inca, tal vez incluso un gobernante. Desafortunadamente, el equipo tuvo que descubrir que no se trataba de la tumba de un inca de alto rango, sino de un conquistador español. Sin embargo, el Dr. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] ha determinado que al menos el interior y algunos artefactos datan del período Inca, por lo que se pueden sacar al menos algunas conclusiones."
 lepsius.812.t_per: "mina inca"
 lepsius.812.f_per: "En lo más profundo de los Andes, el Dr. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] encontró un camino perdido que lo llevó a un pozo. Al principio pareció no tener importancia hasta que el equipo retiró cuidadosamente los escombros. Al final resultó que, el pozo era la entrada a un complejo sistema de cuevas creado artificialmente. Investigaciones posteriores descubrieron herramientas mineras, objetos cotidianos y paredes pintadas. ¿Fue ésta una de las grandes minas de oro y plata de las que los incas elaboraban sus objetos artísticos?"
 lepsius.813.t_per: "templo del sol"
 lepsius.813.f_per: "Un golpe de suerte para la arqueología: el Dr. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] informa que ha encontrado un complejo de templos hasta entonces completamente desconocido en las montañas del Perú. Al parecer es un lugar de culto al dios sol Inti. Los científicos no sólo encontraron numerosos artefactos en el lugar, sino también pinturas y túnicas del templo. Este descubrimiento es una sensación menor en la arqueología precolombina."
 lepsius.971.t: "Descubrimiento de Vilcabamba"
 lepsius.971.d: "Es un día sensacional para la ciencia internacional. Hemos hecho un gran descubrimiento: ¡La Ciudad Perdida de Vilcabamba fue descubierta hoy por [ROOT.GetCountry.GetAdjectiveNoFlag] arqueólogos!"
 lepsius.971.f: "Vilcabamba fue la capital del Estado neoinca de 1539 a 1572. El Estado neoinca fue el último refugio del Imperio Inca hasta que cayó en manos de los españoles y sus aliados indígenas en 1572, lo que marcó el fin de la resistencia inca al dominio español. . Posteriormente, Vilcabamba fue abandonada y olvidada su ubicación. En 1911, el explorador Hiram Bingham identificó erróneamente las ruinas abandonadas de Machu Picchu como Vilcabamba, pero también visitó una ruina llamada Espíritu Pampa por los peruanos locales. En 1964, Gene Savoy identificó a Espíritu Pampa como la legendaria Vilcabamba, designación ampliamente aceptada por arqueólogos e historiadores."
 lepsius.971.g: "Lo que ni siquiera los conquistadores pudieron hacer, lo hicimos nosotros."
 lepsius.972.d: "[SCOPE.sCountry('lepsius_vilcabamba_discoverer').GetName] ha hecho un gran descubrimiento: ¡Hoy fue descubierta la Ciudad Perdida de Vilcabamba!"
 lepsius.972.f: ""
 lepsius.972.g: "Es una pena que no se hayan perdido."
 je_lepsius_nazca: "Las extrañas líneas de Nazca"
 je_lepsius_nazca_reason: "Las extrañas líneas en el paisaje cerca de la ciudad de Nazca han planteado interrogantes desde la conquista española. Algunos los consideran restos de una red de carreteras o barrancos de agua. Un arqueólogo podría obtener una visión general adecuada, con la ayuda de un piloto."
 lepsius.76.t: "El Misterio de Nazca desde el Cielo"
 lepsius.76.d: "[GetPlayer.MakeScope.Var('curtiss_pilot_var').GetCharacter.GetLastName] took Dr. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] on a flight. Now the scientist can see much more clearly what the lines on the ground mean. When viewed from a suitable height, the lines turn out to be something more complex. There are dozens of scratched images of animals and figures from pre-Columbian times. An incredible archaeological discovery!"
 lepsius.76.f: "Las Líneas de Nazca son más de 1.500 enormes imágenes dibujadas (geoglifos) en el desierto cerca de Nazca y Palpa en Perú que sólo pueden verse y reconocerse desde el aire y desde las colinas circundantes. Las líneas, el desierto y la cultura llevan el nombre de la ciudad de Nazca, que no está lejos de la llanura. Se considera que las culturas Paracas y Nazca son las originarias de las líneas. En una superficie de 500 km², la llanura de Nazca muestra líneas rectas, triángulos y superficies trapezoidales de hasta 20 km de largo, así como figuras de tamaños que van desde diez hasta varios cientos de metros, por ejemplo imágenes de personas, monos, pájaros y ballenas. Las líneas que forman las figuras suelen tener sólo unos pocos centímetros de profundidad. Debido a su enorme tamaño, sólo pueden verse desde grandes distancias, desde las colinas circundantes o desde los aviones. En este sentido, las Líneas de Nazca no se descubrieron hasta los años 20 o, a más tardar, los años 30, cuando los aviones sobrevolaban regularmente el desierto de Nazca. En 1926, las Líneas de Nazca fueron descritas científicamente por primera vez."
 lepsius.76.g: "Pero ¿cuál podría ser el verdadero significado de estas imágenes?"
