 notification_lepsius_rosellini_notification_name: "La carta de Lepsio a Rosellini"
 notification_lepsius_rosellini_notification_desc: "El filólogo alemán Karl Richard Lepsius presentó su forma mejorada de traducción jeroglífica en una carta al egiptólogo italiano Ippolito Rosellini. Se alzan voces para emprender una expedición a Egipto."
 notification_lepsius_stephens_catherwood_expedition_notification_name: "Expedición de Stephens y Catherwood"
 notification_lepsius_stephens_catherwood_expedition_notification_desc: "El explorador estadounidense John Lloyd Stephens y el artista británico Frederick Catherwood han regresado de un viaje de aventuras por la península de Yucatán y hablan de ruinas legendarias en la jungla. Los científicos han expresado interés en explorar más de cerca la cultura maya."
 notification_lepsius_decipherment_akkadian_notification_name: "Desciframiento de la lengua acadia"
 notification_lepsius_decipherment_akkadian_notification_desc: "Todos los periódicos del país informan sobre un avance de investigadores de renombre dirigidos por un arqueólogo experimentado: las antiguas lenguas de Mesopotamia ya no son un secreto. Nada se interpone en el camino de una exploración seria de Babilonia y Asiria."
 notification_lepsius_support_schliemann_notification_name: "¡Schliemann descubre Troya!"
 notification_lepsius_support_schliemann_notification_desc: "El empresario alemán Heinrich Schliemann descubrió Troya, considerada durante mucho tiempo un cuento de hadas. Los arqueólogos de todo el mundo tienen una nueva pasión por la antigua Grecia, aunque se encuentre en una antigüedad mítica."
 notification_lepsius_machu_picchu_notification_name: "Machu Picchu"
 notification_lepsius_machu_picchu_notification_desc: "Una expedición arqueológica ha descubierto la ciudad inca perdida de Machu Picchu en lo profundo de los Andes. Los investigadores alientan un estudio más intensivo de la región."
 notification_lepsius_excavation_artifacts_notification_name: "Nuevos artefactos de excavación."
 notification_lepsius_excavation_artifacts_notification_desc: "Esta mañana nuestro Museo Arqueológico recibió un envío de nuevos artefactos de nuestros sitios de excavación."
 lepsius_hide_archaeological_decisions: "Ocultar decisiones arqueológicas"
 lepsius_hide_archaeological_decisions_desc: "Oculte todas las decisiones arqueológicas para tener una mejor visión general."
 lepsius_show_archaeological_decisions: "Mostrar decisiones arqueológicas"
 lepsius_show_archaeological_decisions_desc: "Mostrar todas las decisiones arqueológicas."
 lepsius_cancel_excavation_decision: "Recuerde uno de nuestros equipos de excavación."
 lepsius_cancel_excavation_decision_desc: "En algunas situaciones puede resultar útil llamar a un equipo de excavación. Nuestros artefactos y colecciones adquiridos permanecerán, pero nuestra excavación permanente terminará."
 lepsius_gather_first_excavation_team_decision: "Reúne un nuevo equipo arqueológico"
 lepsius_gather_first_excavation_team_decision_desc: "Podemos formar un equipo adicional de arqueólogos. Esto significa que son posibles varias excavaciones al mismo tiempo."
 lepsius_gather_second_excavation_team_decision: "Reúne un nuevo equipo arqueológico"
 lepsius_gather_second_excavation_team_decision_desc: "Podemos formar un equipo adicional de arqueólogos. Esto significa que son posibles varias excavaciones al mismo tiempo."
 lepsius_gather_third_excavation_team_decision: "Haga que un arqueólogo reúna un nuevo equipo"
 lepsius_gather_third_excavation_team_decision_desc: "Podemos formar un equipo adicional de arqueólogos. Esto significa que son posibles varias excavaciones al mismo tiempo."
 lepsius_upper_egypt_expedition_decision: "El Valle de los Reyes"
 lepsius_upper_egypt_expedition_decision_desc: "Con la antigua capital Tebas y el Valle de los Reyes, el Alto Egipto se considera la Meca de la egiptología. Deberíamos obtener una licencia de excavación para la zona y buscar tesoros egipcios."
 lepsius_lower_egypt_expedition_decision: "Las pirámides"
 lepsius_lower_egypt_expedition_decision_desc: "Desde el principio de los tiempos, las pirámides de Egipto han fascinado a la humanidad. Se dice que otras tumbas, templos e incluso ciudades desaparecidas en las arenas del Bajo Egipto esperan ser redescubiertas."
 lepsius_babylonia_expedition_decision: "La cuna de la civilización"
 lepsius_babylonia_expedition_decision_desc: "Babilonia, la parte sur de Mesopotamia, debe su nombre a la otrora poderosa ciudad de Babilonia. La región se considera la \"cuna de la civilización\", donde se descubren una y otra vez preciosos artefactos arqueológicos. Definitivamente pertenecen a un museo."
 lepsius_assyria_expedition_decision: "Los jardines de Asiria"
 lepsius_assyria_expedition_decision_desc: "Asiria se refiere a la parte norte de Mesopotamia con las dos ciudades importantes de Assur y Nínive. Los escasos conocimientos sobre el país todavía se remontan a la Biblia como fuente, pero ¿tal vez exista evidencia histórica que sea más confiable?"
 lepsius_argolis_expedition_decision: "La ciudad de Agamenón"
 lepsius_argolis_expedition_decision_desc: "Después del descubrimiento de Troya, incluso los científicos escépticos se dan cuenta de que los mitos de los antiguos griegos son más que simples cuentos de hadas. Se dice que en Argólida aún hoy se encuentran restos de ciudades de la Edad del Bronce, la más conocida de las cuales es Micenas. Deberíamos convencernos de ello."
 lepsius_crete_expedition_decision: "El cuento del minotauro"
 lepsius_crete_expedition_decision_desc: "Se dice que el legendario rey Minos gobernó alguna vez Creta. Al igual que en Troya y Micenas, también parece haber algo en esta historia: cada vez se encuentran más artefactos de la legendaria cultura minoica en la isla. Nuestra nación también debería proteger algunos de ellos."
 lepsius_yucatan_expedition_decision: "Ciudades perdidas de los mayas"
 lepsius_yucatan_expedition_decision_desc: "Aumentaron los informes sobre ciudades desconocidas y enormes en medio de la selva. Deberíamos investigar más y enviar una expedición arqueológica a Yucatán."
 lepsius_peru_expedition_decision: "El legado oculto de los incas"
 lepsius_peru_expedition_decision_desc: "Los pilotos informan sobre extrañas fortalezas y estructuras amuralladas en los Andes que vieron en sus vuelos sobre Perú. ¿Quizás los españoles no destruyeron por completo la cultura de los incas? Algunos pueblos de resistencia indígena no han sido encontrados hasta el día de hoy."
 lepsius_found_archaeological_museum_decision: "Encontró un museo arqueológico"
 lepsius_found_archaeological_museum_decision_desc: "Cada nación que se precie tiene en su capital un museo único donde exponer todos los bienes culturales adquiridos a través de aventuras audaces o expediciones científicas de la más alta calidad. La cantidad de artefactos y la cantidad de colecciones diferentes no solo agregan valor al prestigio en el mundo, sino que también tienen valor educativo."
 lepsius_visit_archaeological_museum_decision: "Visita el Museo Arqueológico"
 lepsius_visit_archaeological_museum_decision_desc: "Vea las estadísticas de los artefactos adquiridos y reorganícelos en exhibiciones prestigiosas."
 lepsius_appoint_lead_scientist_decision: "Designe un científico principal"
 lepsius_appoint_lead_scientist_decision_desc: "Nombra un nuevo científico principal para el Museo Arqueológico. El personaje ocupará este cargo durante unos 15 a 20 años. El nombramiento le salvará de desaparecer de la escena política durante este período."
 lepsius_found_archaeological_society_decision: "Fundó una sociedad arqueológica"
 lepsius_found_archaeological_society_decision_desc: "En nuestro país no sólo crece constantemente el interés por la arqueología. Después de muchos años de expediciones, excavaciones y descubrimientos de artefactos, nuestro país ha acumulado una experiencia arqueológica asombrosa. Un arqueólogo destacado podría crear una Sociedad Arqueológica para reunir las fuerzas científicas e intelectuales y dar un nuevo impulso. Esto no sólo mejoraría nuestra producción científica, sino que también mejoraría la experiencia de las generaciones posteriores de arqueólogos."
 lepsius_inspect_excavation_decision: "Organizar una inspección arqueológica en profundidad."
 lepsius_inspect_excavation_decision_desc: "Podemos enviar un arqueólogo experimentado a un área donde estemos excavando para intensificar nuestros esfuerzos allí. Nuestro arqueólogo abrirá en aproximadamente un año un nuevo sitio de excavación y llevará a cabo una investigación intensiva, durante la cual podemos encontrar más indicios de importantes descubrimientos arqueológicos hasta ahora desconocidos. El éxito depende en gran medida de la experiencia de nuestro arqueólogo. El establecimiento de una Sociedad Arqueológica también aumenta nuestras posibilidades."
 lepsius.2.t: "Lettre à M. le Professeur Rosellini"
 lepsius.2.d: "El filólogo alemán [SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName] presentó su forma mejorada de traducción jeroglífica en una carta al egiptólogo italiano Ippolito Rosellini. Se alzan voces para emprender una expedición a Egipto."
 lepsius.2.f: "Tras la muerte de François Champollion, la investigación sobre los jeroglíficos se detuvo. En 1837, el joven filólogo alemán [SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName] escribió una carta a Ippolito Rosellini, un compañero cercano de Champollion y coresponsable de la expedición franco-toscana egipcia de 1829. Lepsius sistematizó y presentó los conocimientos acumulados por Champollion y contribuyó decisivamente a elevar la egiptología al nivel superior. una ciencia seria. Por otro lado, convenció a las élites políticas de Europa de futuras expediciones a Egipto."
 lepsius.2.a: "¡Exploraremos las maravillas de Egipto!"
 lepsius.3.t: "Stephens y Catherwood"
 lepsius.3.d: "El explorador estadounidense John Lloyd Stephens y el artista británico Frederick Catherwood han regresado de un viaje de aventuras por la península de Yucatán y hablan de ruinas legendarias en la jungla. Los científicos han expresado interés en explorar más de cerca la cultura maya."
 lepsius.3.f: "¿El Nuevo Mundo era sólo hogar de salvajes y bárbaros antes de que los europeos llegaran al continente? Los exploradores John Lloyd Stephens y Frederick Catherwood sacudieron profundamente esta visión del mundo. Durante varios años, el estadounidense y el británico recorrieron la selva de la península de Yucatán y, según sus propias declaraciones, visitaron 44 lugares diferentes de una extinta cultura mesoamericana. Los lugareños han estado contando historias de ciudades olvidadas en la jungla y templos escondidos en la jungla durante mucho tiempo; pero los informes de Stephens, y especialmente las impresionantes litografías de Catherwood, abren un mundo hasta ahora completamente desconocido. Las imágenes de templos, estatuas y estelas no sólo inspiran las fantasías de los románticos. Una ola de interés por la civilización desconocida se está extendiendo por Estados Unidos y Europa, y va desde la curiosidad hasta la glorificación y el genuino interés científico."
 lepsius.3.a: "Deberíamos abastecernos de finas chaquetas de cuero."
 lepsius.4.t: "Desciframiento de la lengua acadia"
 lepsius.4.d: "Todos los periódicos del país informan sobre un avance de investigadores de renombre dirigidos por un arqueólogo experimentado: las antiguas lenguas de Mesopotamia ya no son un secreto. Nada se interpone en el camino de una exploración seria de Babilonia y Asiria."
 lepsius.4.f: "Ya bajo el matemático alemán Carsten Niebuhr, las tablillas cuneiformes habían despertado el interés de los eruditos en el siglo XVIII y se hicieron esfuerzos para decodificarlas y traducir los idiomas. Georg Friedrich Grotefend, Anquetil-Duperron y Antoine Isaac Silvestre de Sacy desempeñaron un papel decisivo en el desciframiento de las escrituras cuneiformes persas antiguas; sus estudios fueron confirmados con el desciframiento de los jeroglíficos y del cuatrilingüe 'Varón Calyus'. Tras el descubrimiento de la monumental inscripción de Behistun, que contenía lenguas más antiguas de Mesopotamia además del ahora conocido persa, era sólo cuestión de tiempo que el elamita, el babilónico y el acadio volvieran a ser comprensibles después de siglos. Después de invitar a varios asiriólogos que afirman comprender estas lenguas antiguas, una de nuestras academias los puso a prueba: debían traducir de forma independiente la misma inscripción. Sorprendentemente, las traducciones de todos los eruditos coincidieron. Ahora puede comenzar una exploración seria de las culturas más antiguas de la humanidad en Mesopotamia."
 lepsius.4.a: "Somos los herederos de Champollion."
 lepsius.5.t: "¡Schliemann descubre Troya!"
 lepsius.5.d: "El empresario alemán Heinrich Schliemann descubrió Troya, considerada durante mucho tiempo un cuento de hadas. Los arqueólogos de todo el mundo tienen una nueva pasión por la antigua Grecia, aunque se encuentre en una antigüedad mítica."
 lepsius.5.f: "¿Dónde termina la ciencia, dónde comienza el mito? El presente ha hecho todo lo posible para separar religión y conocimiento. Hemos desterrado leyendas y sagas que hace décadas se creían realidad al reino de los cuentos de hadas. Pero entonces irrumpe en el mundo, primero en los periódicos y luego en las academias: ¡Troya ha sido descubierta! La legendaria ciudad de Príamo, sobre la que cantó Homero en su Ilíada, la historia que todo ciudadano educado de Occidente conoce, es más que un simple mito. El comerciante alemán Heinrich Schliemann no se dejó impresionar por el desencanto del mundo e incluso afirma haber encontrado un tesoro valioso: el tesoro de Príamo. El mundo arqueológico quedó conmocionado y fascinado por este evento. ¿Son quizás ciertas otras historias del pasado lejano después de todo? ¿Hay más ciudades hundidas en las costas del Egeo por redescubrir?"
 lepsius.5.a: "Menin aeide, thea, Peleiadeo Achileos ..."
 lepsius.6.t: "Machu Picchu"
 lepsius.6.d: "Una expedición arqueológica ha descubierto la ciudad inca perdida de Machu Picchu en lo profundo de los Andes. Los investigadores alientan un estudio más intensivo de la región."
 lepsius.6.f: "Hay ciertas narrativas que dominan nuestro presente. Todo ha sido conquistado, todo ha sido descubierto y todo está dicho. No hay un pedazo de tierra que no tenga ya una bandera colonial, ningún pueblo que no esté conectado al ferrocarril y ninguna tecnología innovadora que ya conozcamos. Y, sin embargo, hay momentos en los que el nihilismo de la élite se resquebraja. La carrera hacia los polos, la conquista de los cielos y la preocupación por los últimos misterios de la humanidad demuestran que la historia no ha terminado. El descubrimiento de la ciudad de Machu Picchu es sólo un fragmento que muestra lo poco que sabemos sobre el mundo que creemos comprender y controlar. Quizás haya algo en los relatos sobre ciudades incas desconocidas, que se ha interpretado como engañosos para los españoles. Vilcabamba, la última capital de los Incas libres, no ha sido encontrada hasta el día de hoy..."
 lepsius.6.a: "¡Es hora de agarrar mi sombrero de fieltro!"
 lepsius.10.t: "Inauguración del Museo"
 lepsius.10.d: "El Museo Arqueológico fue inaugurado hoy con un acto solemne."
 lepsius.10.f: ""
 lepsius.10.g: "¡No puedo esperar para visitar el museo!"
 lepsius.10.h: "¡Champán! ¡Champán!"
 lepsius.11.t: "Visitando el Museo"
 lepsius.11.d: "Bienvenidos al Museo Arqueológico."
 lepsius.11.f: "La colección de nuestro museo incluye actualmente un #T total de #G [ROOT.Var('lepsius_total_artifacts').GetValue]#! artefactos.#! \n\nLos artefactos se dividen en las siguientes colecciones: \n\n#T Colección egipcia:#! \n#G [ROOT.Var('lepsius_egyptian_artifact_minor').GetValue]§ _3 @lepsius_egypt_minor! artefactos menores y #G #G1#! @lepsius_egypt_major! artefactos importantes. \n\n#T Colección mesopotámica:#!\n#G #G5#! @lepsius_mesopotamia_minor! artefactos menores y #G #G8#! @lepsius_mesopotamia_major! artefactos importantes. \n\n#T Colección Egeo:#!\n#G [ROOT.Var('lepsius_total_artifacts').GetValue]2#! @lepsius_aegean_minor! artefactos menores y #G [ROOT.Var('lepsius_total_artifacts').GetValue]5#! @lepsius_aegean_major! artefactos importantes. \n\n#T Colección Precolombina:#!\n#G [ROOT.Var('lepsius_total_artifacts').GetValue]9#! @lepsius_precolumbian_minor! artefactos menores y #G #!2#! @lepsius_precolumbian_major! artefactos principales.\n\n#T Equipos Arqueológicos:#!\nTenemos #G #!7#! equipos disponibles de un total de #G #!0#!."
 lepsius.11.g: "Esto ha sido bastante educativo. ¡Hasta la proxima vez!"
 lepsius.11.h: "Visita la colección egipcia"
 lepsius.11.i: "Visita la colección mesopotámica"
 lepsius.11.j: "Visita la colección del Egeo"
 lepsius.11.k: "Visita la Colección Precolombina"
 lepsius.11.l: "Visite al científico principal"
 lepsius.11.m: "Visita los artefactos principales"
 lepsius.11.n: "Visita la Colección de Culturas del Mundo"
 lepsius.11.o: "¡Muéstrame los países con más artefactos!"
 lepsius.12.t: "Colección egipcia"
 lepsius.12.d: "Esta sección incluye artefactos del Alto y Bajo Egipto."
 lepsius.12.g: "Organizar una pequeña exposición."
 lepsius.12.h: "Organizar una exposición de tamaño mediano."
 lepsius.12.i: "Organizar una gran exposición."
 lepsius.12.j: "Organizar una excelente exposición."
 lepsius.12.k: "De regreso al salón principal."
 lepsius.12.l: "Sal del museo."
 lepsius.13.t: "Colección mesopotámica"
 lepsius.13.d: "Esta sección incluye artefactos de Babilonia y Asiria."
 lepsius.14.t: "Colección del Egeo"
 lepsius.14.d: "Esta sección incluye artefactos de Argolis y Creta."
 lepsius.15.t: "Colección Precolombina"
 lepsius.15.d: "Esta sección incluye artefactos de Yucatán y Perú."
 lepsius.16.t: "[SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName]"
 lepsius.16.d: "Esta es la oficina del arqueólogo más destacado de nuestra nación, el profesor [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName]."
 lepsius.16.f: "[SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName] tiene una experiencia arqueológica total de #G [ROOT.Var('lepsius_archaeologist_var').GetVariable('lepsius_archaeologist_experience_var').GetValue]#!\n\n Número total de expediciones financiadas por nuestra nación: #G [ROOT.Var('lepsius_total_expeditions').GetValue]#!\n\n Número total de descubrimientos importantes que nuestra nación ha realizado: #G [ROOT.Var('lepsius_total_discoveries').GetValue]#!"
 lepsius.16.g: "Organizar un importante congreso arqueológico"
 lepsius.17.t: "Artefactos principales"
 lepsius.17.d: "Esta es una descripción general de todos los artefactos principales del museo."
 lepsius.17.egypt: "\n#T Egipto:#!\n"
 lepsius.17.sarcophagus: "Encontramos el #E Sarcófago del Faraón Desconocido#! en una tumba perdida en el Valle de los Reyes.\n"
 lepsius.17.nefertiti: "El #E Busto de Nefertiti#! fue la recompensa de minuciosas excavaciones y disputas diplomáticas.\n"
 lepsius.17.tut: "#E La máscara mortuoria de Tutankamón#! es la joya de la corona de la legendaria tumba en el Valle de los Reyes.\n"
 lepsius.17.narmer: "La #E Paleta de Narmer#! es uno de los hallazgos escritos más antiguos de la humanidad y algunos lo consideran el documento fundacional de Egipto.\n"
 lepsius.17.mesopotamia: "\n#T Mesopotamia:#!\n"
 lepsius.17.lamassu: "Recibimos #E Lamassu#! del rey Sargón de Asiria de manera aventurera.\n"
 lepsius.17.meskalamdug: "Encontramos el #E Casco de Meskalamdug#! después de una intensa excavación en Babilonia.\n"
 lepsius.17.sargon: "Encontramos la #E Máscara de Sargón#! durante una excavación exhaustiva de la antigua capital asiria de Nínive.\n"
 lepsius.17.gilgamesh: "Después de una búsqueda constante de nuevas piezas e investigaciones de vanguardia, hemos logrado reconstruir partes de la #E Epopeya de Gilgamesh#!.\n"
 lepsius.17.greece: "\n#T Grecia:#!\n"
 lepsius.17.agamemnon: "La #E Máscara de Agamenón#! fue el hallazgo principal de nuestro gran descubrimiento en Micenas.\n"
 lepsius.17.priam: "Recibimos #E El tesoro de Príamo#! como regalo de Heinrich Schliemann.\n"
 lepsius.17.snake: "Pudimos traer a nuestro museo la llamada #E Diosa Serpiente#! de Creta, uno de los artefactos más importantes de la cultura minoica, de una manera poco ortodoxa.\n"
 lepsius.17.diskos: "Después de un intenso trabajo de excavación, desenterramos el #E Discos de Festos#!.\n"
 lepsius.17.southamerica: "\n#T Sudamérica:#!\n"
 lepsius.17.kukulkan: "La #E Gema de Kukulkán#! fue obtenida por uno de nuestros arqueólogos en un viaje fantástico y peligroso.\n"
 lepsius.17.pakal: "Nuestros arqueólogos consiguieron el #E Tesoro funerario de Pakal#! después de años de excavación en Palenque.\n"
 lepsius.17.other: "\n#T Otro:#!\n"
 lepsius.17.abraham: "El #E Bastón de Abraham#! fue encontrado por uno de nuestros arqueólogos en un viaje espiritual.\n"
 lepsius.17.arne: "En una fantástica aventura, nuestros valientes arqueólogos encontraron el #E Manuscrito de Arne Saknussemm#! como prueba de que viajó al centro de la tierra en el siglo XVI.\n"
 lepsius.17.skull: "Adquirimos una #E Calavera de cristal#! muy misteriosa de un anticuario de confianza.\n"
 lepsius.17.hoa: "La misteriosa estatua de #E Moai Hoa Hakananai'a#! fue encontrada por un aventurero en la Isla de Pascua.\n"
 lepsius.17.summer: "Durante el incendio de la Residencia Imperial China, hemos recuperado una cantidad significativa de valioso #E Botín del Palacio de Verano#!."
 lepsius.18.t: "Colección de culturas del mundo"
 lepsius.18.d: "Esta sección incluye artefactos de diferentes culturas del mundo."
 lepsius.18.f: "Esta colección es una colección antropológica y arqueológica de diferentes culturas, algunas de las cuales aún existen. #G 10#! artefactos son suficientes para albergar una exposición. No hay colecciones más grandes, pero las colecciones individuales son más valiosas. Actualmente esta colección consta de las siguientes secciones: \n\n #G [ROOT.Var('lepsius_oceanic_artifact_minor').GetValue]#! @lepsius_oceanian_minor! artefactos menores de Oceanía \n #G [ROOT.Var('lepsius_oceanic_artifact_major').GetValue]#! @lepsius_oceanian_major! principales artefactos de Oceanía \n\n #G [ROOT.Var('lepsius_fareastern_artifact_minor').GetValue]#! @lepsius_east_asian_minor! artefactos menores del Lejano Oriente \n #G #!2#! @lepsius_east_asian_major! principales artefactos del Lejano Oriente \n"
 lepsius.18.g: "Organizar una exposición del Lejano Oriente."
 lepsius.18.h: "Organizar una exposición oceánica."
 lepsius.22.d: "The assembled elite of our capital is on its feet: the Archaeological Museum comes up with a new exhibition."
 lepsius.22.f: "People from the upper and middle class crowd in front of the entrance of the museum in the morning. The new exhibition begins with a lecture by a leading archaeologist who will give a first-hand account of the latest expedition and the excavations at the site. Afterwards, art lovers and onlookers can take a look at the exhibits themselves. The press is on site preparing their articles. A big day for [ROOT.GetCountry.GetNameNoFlag], nationally and internationally; the great powers look on with envy at our prestigious collection."
 lepsius.22.g: "I hope I get another ticket."
 lepsius.24.t: "New Aegean Exhibition"
 lepsius.25.t: "New Pre-Columbian Exhibition"
 lepsius.26.t: "Archaeological Congress ends"
 lepsius.26.d: "The congress organized by our Archaeological Society is drawing to a close today. Professor [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] has expanded his knowledge in the process."
 lepsius.26.f: "Several weeks of meetings, readings, conferences and cozy get-togethers are coming to an end. National and international archaeologists close to the society exchanged discoveries, expeditions and theories. The event was a complete success - and broadened the horizons of everyone involved."
 lepsius.26.g: "Always these arguments about who has the finest leather jackets..."
 lepsius.27.t: "New World Cultures Exhibition"
 lepsius.30.t: "Nuevo científico principal"
 lepsius.30.d: "El Museo Arqueológico ha nombrado un nuevo científico principal. Es [SCOPE.sCharacter('lepsius_museum_lead_scientist').GetPrimaryRoleTitle] [SCOPE.sCharacter('lepsius_museum_lead_scientist').GetFullName]."
 lepsius.30.f: ""
 lepsius.30.g: "¡Felicidades!"
 lepsius.31.t: "El científico principal se convierte en director del museo"
 lepsius.31.d: "[SCOPE.sCharacter('lepsius_museum_lead_scientist').GetPrimaryRoleTitle] [SCOPE.sCharacter('lepsius_museum_lead_scientist').GetFullName] tuvo el honor de ser nombrado nuevo director del museo. Por tanto, se retirará del servicio activo."
 lepsius.31.f: "Desde hace años [SCOPE.sCharacter('lepsius_museum_lead_scientist').GetFullName] dedica su vida a la ciencia y la cultura y hace tiempo que se cansó de la política. Para muchos, la decisión de concentrarse únicamente en las operaciones del museo no fue una sorpresa. Ya no estará disponible políticamente ni para expediciones. Hay ascensos que son lamentables."
 lepsius.31.g: "Despedida..."
 lepsius.80.t: "¡Una nueva era de la arqueología!"
 lepsius.80.d_egypt: "El Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] utilizó nuevos métodos arqueológicos para descubrir muchos detalles de una antigua aldea egipcia. El uso de la estratigrafía y el sistema de las tres edades, así como la documentación de los hallazgos de [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis], marca una nueva era en la arqueología."
 lepsius.80.d_mesopotamia: "El Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] utilizó nuevos métodos arqueológicos para descubrir muchos detalles de una antigua aldea mesopotámica. El uso de la estratigrafía y el sistema de las tres edades, así como la documentación de los hallazgos de [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis], marca una nueva era en la arqueología."
 lepsius.80.d_aegean: "El Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] utilizó nuevos métodos arqueológicos para descubrir muchos detalles de una antigua aldea del Egeo. El uso de la estratigrafía y el sistema de las tres edades, así como la documentación de los hallazgos de [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis], marca una nueva era en la arqueología."
 lepsius.80.d_precolumbian: "El Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] utilizó nuevos métodos arqueológicos para descubrir muchos detalles de una antigua aldea precolombina. El uso de la estratigrafía y el sistema de las tres edades, así como la documentación de los hallazgos de [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis], marca una nueva era en la arqueología."
 lepsius.80.f: "\"Las capas del suelo en las que encontramos los artefactos de este pueblo nos dicen mucho sobre ello. Una capa, por ejemplo, contiene mucho carbón y marca el final de los hallazgos de este período. Esto probablemente significa que un incendio destruyó \"El pueblo estaba abandonado. Además no hay objetos metálicos, lo que significa que debe ser un pueblo de la edad de piedra. Los restos humanos que encontramos también fueron fascinantes, ya que estaban desnutridos y tenían dientes desgastados\"."
 lepsius.80.g: "¡Tan civilizado!"
 lepsius.100.t: "Preparando la Expedición Arqueológica [ROOT.GetCountry.GetAdjectiveNoFlag]"
 lepsius.100.d: "Los preparativos para la expedición arqueológica están en marcha. Sin embargo, todavía no está claro durante cuánto tiempo se financiará el viaje."
 lepsius.100.f: "No sólo la financiación como tal, sino también la duración de la expedición pronto se convertirían en una cuestión política, después de que [ROOT.GetCountry.GetName] hubiera decidido ceder a los deseos de sus académicos y enviar la tan esperada expedición. El solo viaje de ida y vuelta tomaría un tiempo precioso, mientras que los cascarrabias del Gabinete insistían en enviar sólo a unos pocos negociadores para adquirir algunos artefactos del anticuario."
 lepsius.100.g: "No hagas las cosas a medias: será un largo viaje."
 lepsius.100.h: "Un viaje de media longitud es un buen compromiso."
 lepsius.100.i: "Un viaje corto es suficiente."
 lepsius.110.t: "Controversia sobre el liderazgo"
 lepsius.110.d: "Los intelectuales se ven favoritos para tener a uno de sus representantes al frente de la expedición arqueológica. Pero hay numerosas voces disidentes."
 lepsius.110.f: "Las élites del país están divididas. El apoyo estatal a la expedición ha hecho aparecer en escena críticos y envidiosos. La intelectualidad del país ve en la empresa su soberanía. Tanto la oposición como las fuerzas gubernamentales exigen que se les asigne un puesto de observadores. Es innegable que un representante de la intelectualidad sería el mejor calificado para la tarea, pero hay otras posibilidades..."
 lepsius.110.g: "La intelectualidad es la más cualificada."
 lepsius.110.h: "Un representante del gobierno acompañará la expedición."
 lepsius.110.i: "Un político de la oposición es adecuado para esto."
 lepsius.110.j: "Alguien con experiencia arqueológica debería hacer el trabajo."
 lepsius.110.k: "Este honor pertenece únicamente al heredero al trono."
 lepsius.120.t: "Agregado militar"
 lepsius.120.d: "Se recomienda encarecidamente contratar un agregado militar para la expedición arqueológica."
 lepsius.120.f: "Los militares han sugerido tres posibles candidatos para servir como agregados militares de la expedición. La decisión fue comunicada hoy por el Departamento de Guerra. La selección aún no se ha confirmado."
 lepsius.120.g: "[SCOPE.sCharacter('lepsius_military_attache_1').GetFullName]."
 lepsius.120.h: "[SCOPE.sCharacter('lepsius_military_attache_2').GetFullName]."
 lepsius.120.i: "[SCOPE.sCharacter('lepsius_military_attache_3').GetFullName]."
 lepsius.130.t: "Artistas se unen a la expedición"
 lepsius.130.d: "Un grupo de artistas de nuestra Academia han manifestado su interés en participar en la próxima Expedición Arqueológica."
 lepsius.130.f: "En la academia de arte se ha corrido la voz de que pronto una expedición buscará ciudades perdidas y tesoros artísticos desconocidos. Los dibujantes y pintores ya se inspiraron en la atmósfera, los colores y las escenas de la expedición de Napoleón a Egipto. Hay suficientes solicitantes que quieren realizar dibujos y bocetos de sitios arqueológicos para nosotros. No hace falta decir que tal ampliación de la expedición conlleva costes adicionales, pero sin duda merece la pena."
 lepsius.130.a: "Están cordialmente invitados."
 lepsius.130.b: "Gracias pero no gracias."
 lepsius.140.t: "Arqueólogo recluta eruditos experimentados"
 lepsius.140.f: "Nos unen intereses comunes: nuestro líder tiene conexiones con otros estudiosos versados ​​en arqueología, historia y antropología. Semejante ampliación del número de expedicionarios sin duda tendría un efecto positivo en los resultados de la empresa. Sin embargo, este no es un servicio amigable: el Estado tiene que pagar la manutención, el alojamiento y el salario. Algunos podrían llamar nepotismo a este aprovisionamiento por parte de los \"amigos\" del líder de la expedición, pero él nos ha asegurado que la lógica detrás de la expansión es puramente científica."
 lepsius.140.a: "Un enriquecimiento para el equipo."
 lepsius.140.b: "¡No pagamos a las camarillas de nuestros arqueólogos!"
 lepsius.150.t: "Científicos naturales se unen a la expedición"
 lepsius.150.d: "Los científicos quieren realizar experimentos en la próxima expedición."
 lepsius.150.f: "Las universidades de nuestro país no han quedado ajenas a los acontecimientos actuales. A algunos científicos les gustaría acompañar la expedición para estudiar las condiciones geográficas, comparar cálculos astronómicos o realizar experimentos meteorológicos. Otros creen que las muestras de rocas y madera pueden mejorar los resultados científicos de la expedición. Muchos de los científicos seleccionados dejan claro que llevan mucho tiempo esperando el momento de viajar a los tan esperados países extranjeros: sólo esperan una excusa para viajar como pasajeros libres. ¡Y también tienen deseos caros!"
 lepsius.150.a: "A magnificent idea!"
 lepsius.150.b: "No podemos atender a todas las barbas peludas..."
 lepsius.200.t: "La expedición llega al lugar de salida."
 lepsius.200.d: "La expedición ha llegado a su punto de partida. Es hora de hacer algunos preparativos finales antes de la salida."
 lepsius.200.f_ex_upe: "'¡Lúxor, Lúxor!' El grito recorre las filas mientras el Templo de Karnak se asoma en el horizonte. El barco amenaza con volcarse en el Nilo mientras los miembros de la expedición se amontonan en la barandilla, contemplando la silueta de la ciudad conocida en el antiguo Egipto como Tebas. Ruinas de estructuras milenarias se alinean a orillas del Nilo, se alzan obeliscos entre casas y tiendas en ruinas. En la otra orilla del Nilo, sin embargo, se alzan las cadenas montañosas de color marrón arenoso donde se esconde el legendario Valle de los Reyes, y donde se dice que aún se encuentran tumbas desconocidas de los faraones. Pero antes de que podamos llegar a eso, todavía tenemos algunas cosas que resolver en Luxor..."
 lepsius.200.f_ex_loe: "La \"Madre del Mundo\" se encuentra sobre las aguas del Nilo, brillando al sol. Los minaretes y las cúpulas adornan el panorama y hablan del poder y la importancia de esta ciudad, que una vez y ahora ayudó a determinar el destino de Medio Oriente. Bazares y alfombras coloridos caracterizan las calles, así como la fina ornamentación de la arquitectura fatimí. Pero la vista va más allá, mucho más allá, donde las cimas de las pirámides presagian una época pasada, que es el verdadero objetivo de nuestro viaje. Pero antes de eso, debemos tomar algunas precauciones en El Cairo."
 lepsius.200.f_ex_bab: "Bagdad, la ciudad más grande de Mesopotamia, está llena de actividad. Como El Cairo, es un centro del mundo árabe; Al igual que El Cairo, era la sede del poder y el prestigio. Pero a diferencia de El Cairo, donde las distantes pirámides de Giza presagian un mundo aún más antiguo, hay poco en Bagdad que evoque los imperios de Babilonia y Acad. Incluso las supuestas antigüedades que un miembro de la expedición, un tanto descuidado, compró a un comerciante turbio han resultado ser falsificaciones. Si bien los edificios de piedra de los egipcios y los mayas aún son testigos de las civilizaciones perdidas, aquí casi no hay nada comparable. Probablemente tendremos que empezar de cero."
 lepsius.200.f_ex_ass: "¿Qué más se puede encontrar en Asiria después de que Layard excavó en Nimrud? Bastante, según un comerciante de Mosul. Hace apenas un mes, la cabeza de un lamassu emergió de la arena. Y el bazar siempre ofrece buenas piezas, nos cuenta. El hecho de que toda una serie de piezas no hayan podido salvarse también tiene que ver con los clanes kurdos de la zona, que no permiten que todo el mundo cace furtivamente en sus zonas, independientemente de la licencia de excavación. Llevaremos la advertencia con nosotros y conseguiremos lo esencial antes de comenzar el viaje."
 lepsius.200.f_ex_arg: "¡Ah, la buena Atenas! No tiene la edad suficiente para lo que busca nuestro equipo de expedición, pero sí lo suficientemente buena para pasar días extra en Ática. Grecia no tiene muchas ciudades grandes, por lo que nuestro equipo de expedición no tiene más remedio que hacer allí los preparativos más necesarios antes de partir hacia el campo. Nuestra guía de arqueología nos presiona mucho, ya que algunos estudiosos dedican demasiado tiempo a distracciones, ya sea el mármol clásico o el vino griego. El cálido sol, la sombra de los olivos y el idilio acadio invitan a quedarse y relajarse; algunos parecen haber olvidado ya por qué estamos realmente aquí."
 lepsius.200.f_ex_cre: "Una ligera brisa sopla desde el mar Egeo cuando nuestra expedición llega al puerto de Heraklion. Saludan los antiguos bastiones venecianos, que recuerdan los tiempos en que Candia era un centro comercial en la Edad Media. Después de descargar la carga con el graznido de las gaviotas y los participantes desembarcan, a la amistosa recepción le sigue la amarga realidad. Mientras que algunos participantes se quejan de la cocina local y exigen mejores alojamientos, el arqueólogo principal muestra poca simpatía por peticiones menos intelectuales. Porque Heraklion es para él sólo una estación de paso: en el interior de la isla aguardan los tesoros de los minoicos."
 lepsius.200.f_ex_yuc: "En Mérida, nuestro equipo de excavación está haciendo los últimos preparativos antes de la gran partida. Las huellas de la conquista y colonización española caracterizan a la ciudad, que a pesar de su tamaño manejable demuestra que alguna vez fue, junto con Campeche, el lugar desde donde los españoles ejercieron el control de la península. Se dice que a menos de 100 millas de distancia se encuentran algunos sitios mayas que la selva ha recuperado durante los últimos siglos. Nuestros expedicionarios no se librarán de excavar más profundamente en la maleza si quieren descubrir nuevos templos o incluso ciudades..."
 lepsius.200.f_ex_per: "Los Andes se elevan como reyes sobre las cabezas de sus súbditos; sus picos nos miran majestuosamente, como para poner a prueba nuestra valía para entrar en sus valles. El viaje al Cuzco fue arduo, pero los avances tecnológicos hacen que las expediciones ya no se conviertan en viajes aventureros y llenos de imprevisibilidad. En las calles de la antigua capital de los Incas, el dominio histórico español se combina con el encanto de la arquitectura andina. En el medio, los muros ciclópeos sin fisuras aún son testigos de la arquitectura de los antiguos gobernantes. Las ruinas de la fortaleza inca de Sacsayhuamán, a solo un paso del centro, son una muestra de lo que los miembros de la expedición buscarán en este viaje."
 lepsius.200.g: "Ah, Egipto."
 lepsius.200.h: "Ah, Mesopotamia."
 lepsius.200.i: "Ah, Grecia."
 lepsius.200.j: "Ah, mosquitos y enfermedades mortales."
 lepsius.200.k: "Ah, Perú."
 lepsius.210.t: "Los intérpretes y el guía misterioso"
 lepsius.210.d: "Entre los expedicionarios no se ponen de acuerdo sobre si gastar el dinero restante en unos cuantos intérpretes cualificados o en un guía misterioso."
 lepsius.210.f: "No es una cuestión de cantidad o calidad, aunque algunos miembros de nuestra expedición lo expresen así. Los intérpretes no sólo tienen la ventaja de que hablan el idioma, sino también de que la gente local confía en ellos más rápidamente. La posibilidad de obtener información sobre artefactos es considerablemente mayor. Por otro lado, el misterioso guía podría llevarnos a lugares especiales que de otro modo no encontraríamos o encontraríamos con gran dificultad: lugares con artefactos especiales y desafíos desconocidos."
 lepsius.210.a: "Podríamos utilizar algunos intérpretes."
 lepsius.210.b: "Necesitamos un guía que conozca los secretos de la zona."
 lepsius.220.t: "Arqueólogo compra artefactos"
 lepsius.220.d: "Nuestro líder de expedición encontró y adquirió algunos artefactos valiosos en el mercado local."
 lepsius.220.f: "Ladrones de tumbas, cazadores de tesoros y aventureros deambularon por los sitios de excavación del mundo mucho antes de que el primer arqueólogo pusiera un pie en la tierra. Ésta es una amarga verdad. En muchos casos, los objetos se pierden sin dejar rastro, acaban en colecciones privadas o, si están hechos de metales preciosos, incluso se funden. Pero incluso los hallazgos que pueden recuperarse tienen el defecto de que es posible que nunca se aclare su origen. Los arqueólogos experimentados tienen talento no sólo para excavar artefactos, sino también para encontrarlos en el comercio y reconstruir su procedencia."
 lepsius.220.g: "Qué linda sorpresa."
 lepsius.230.t: "Escribir un diario"
 lepsius.230.d: "Inspirado por el entorno exótico y las impresiones diarias, nuestro líder de expedición ha comenzado a llevar un diario."
 lepsius.230.f: "Cada país y lugar tiene sus propios colores y olores. El misticismo de Oriente, la magia de Grecia y las leyendas de los mayas e incas cautivaron a la gente. Otros se inspiraron en la vida cotidiana desconocida, los idiomas incomprensibles o la extrañeza del mundo en el que se veía arrojado un aventurero. A veces bastaba con escribir para procesar el impacto de las impresiones y registrarlas."
 lepsius.230.g: "Espíritu romántico incorregible."
 lepsius.240.t: "Escribir un tratado"
 lepsius.240.d: "Nuestro líder de expedición ha decidido escribir un artículo científico sobre el curso de la expedición."
 lepsius.240.f: "Puede parecer sorprendente, pero no todo el mundo tiene tiempo para llevar sus propios registros junto con su trabajo real. Algunos temas no encuentran cabida en los informes oficiales, quizás porque se desvían demasiado del tema real o porque la tesis aún no está lo suficientemente madura. Sea como fuere: nuestro líder de expedición aparentemente ha encontrado un tema en el que le gustaría trabajar además del informe oficial y publicarlo más tarde."
 lepsius.240.g: "Esperemos que de ello salga algo útil."
 lepsius.250.t: "Pelea de taberna"
 lepsius.250.d: "Las malas cualidades del líder de nuestra expedición han provocado un incidente diplomático."
 lepsius.250.g: "Vergonzoso..."
 lepsius.260.t: "Apreciación"
 lepsius.260.d: "Las buenas cualidades de nuestro líder de expedición han llevado al amplio reconocimiento de nuestra empresa arqueológica."
 lepsius.260.g: "Maravilloso"
 lepsius.270.t: "Helado y limonada"
 lepsius.270.g: "Tienes que viajar con estilo."
 lepsius.280.t: "Una audiencia"
 lepsius.280.f: "El gobernador local se enteró de la expedición y convocó al líder de la misión arqueológica. Estaba interesado en los goles y sentía mucha curiosidad por el invitado. En la conversación que siguió, nuestro líder no sólo logró entretener bien al anfitrión, sino que también lo impresionó tanto con sus habilidades que el gobernador se ofreció a ayudarlo. Al final resultó que, poseía un valioso artefacto que regaló a nuestra expedición como un gesto amable."
 lepsius.280.g: "¡Un regalo maravilloso!"
 lepsius.290.t: "Agregado contrata guardias"
 lepsius.290.d: "El agregado militar de nuestra expedición arqueológica ha contratado algunos mercenarios para garantizar la seguridad de nuestro viaje."
 lepsius.290.f: "Al parecer, el Departamento de Guerra tuvo suerte al seleccionar a nuestro agregado militar. Sus habilidades le han valido la aprobación de un oficial militar local y le ha hablado de enviar un grupo de guardias para proteger nuestra expedición. A cambio, visitó un contingente de tropas del país anfitrión y compartió su experiencia."
 lepsius.290.g: "Los militares eligieron al hombre adecuado."
 lepsius.300.t: "¡Comienza la Expedición Arqueológica!"
 lepsius.300.d: "Las cosas están empaquetadas, se han reclutado los últimos ayudantes, el plan de expedición está en marcha: el viaje puede comenzar."
 lepsius.300.f: ""
 lepsius.300.g: "¡Aquí vamos!"
 lepsius.310.t: "Finaliza expedición arqueológica"
 lepsius.310.d: "La expedición arqueológica ha terminado. ¡Es hora de contar el rendimiento!"
 lepsius.310.f: "Ha sido un viaje arduo con muchas dificultades y obstáculos, pero nuestra nación no sólo ha aumentado su conocimiento del pasado durante la expedición, sino que también ha adquirido artefactos preciados para el museo. Algunos ayudantes ya se han despedido, algunos miembros de la excavación anhelan volver a casa. Mientras tanto, el líder de la expedición cuenta las piezas más pequeñas adquiridas que conforman el éxito de la expedición. La catalogación seca sigue la aventura romántica."
 lepsius.310.g: "¡Salud por la ciencia! Ahora trae a nuestros muchachos de regreso."
 lepsius.310.h: "Esto es sólo el comienzo: iniciar una excavación arqueológica a largo plazo."
 lepsius.311.t: "Arqueólogo publica diario"
 lepsius.311.f: ""
 lepsius.311.g: "Una inspiración para todos nosotros."
 lepsius.312.t: "Arqueólogo publica artículo científico"
 lepsius.312.f: ""
 lepsius.312.g: "Deberíamos conseguir una copia para la biblioteca nacional."
 lepsius.313.t: "El líder de la expedición regresa a casa"
 lepsius.313.d: "[SCOPE.sCharacter('lepsius_relaxing_archaeologist').GetFullName] has returned after an archaeological expedition. The experiences on the trip left a deep impression. Nevertheless, the laborious evaluation of the artifacts found now awaits - even the less significant pieces, such as shards, scraps of fabric, and pieces of wood."
 lepsius.313.f: "The actual archaeological work, the dry cataloging of all the objects, their classification, and conclusions about the past within musty university walls, is less appealing and adventurous than the archaeologist's life suggests. #V It will typically take three years.#! Should the nation nevertheless need its archaeologist—perhaps for a local excavation—it might be better to relieve the scientist of [SCOPE.sCharacter('lepsius_relaxing_archaeologist').GetHerHis] duties immediately. Doctor [SCOPE.sCharacter('lepsius_relaxing_archaeologist').GetLastName] might even be grateful for it."
 lepsius.313.g: "Let's catalog!"
 lepsius.401.t_bedouin: "Incursión beduina"
 lepsius.401.t_kurdish: "Incursión kurda"
 lepsius.401.d: "Nuestra expedición arqueológica ha sido atacada por tribus locales."
 lepsius.401.f_bedouin: "No todas las zonas del desierto están bajo el control total del gobierno. Algunas tribus beduinas resisten con éxito la modernización del Estado y el cambio social. Los clanes todavía viven como lo hacían sus antepasados ​​hace siglos. Los asaltos a caravanas y a los viajeros descuidados forman parte de la rutina diaria. Un ataque beduino también afectó nuestra expedición: robaron objetos de valor y equipo arqueológico y secuestraron camellos. El líder de la expedición nos pide que hablemos con el gobierno para que no vuelvan a ocurrir incidentes que pongan en peligro la expedición. Por supuesto, esto será visto como una injerencia en los asuntos internos..."
 lepsius.401.f_kurdish: "Las montañas Zagros, que limitan con Mesopotamia al norte y al este, han sido históricamente el hogar de tribus kurdas que están sólo ligeramente bajo el control del gobierno local. Muchos de ellos actúan por su cuenta, reconociendo sólo a su tribu como autoridad. Una y otra vez realizan redadas. Esta vez también un ataque kurdo afectó a nuestra expedición: robaron objetos de valor y equipo arqueológico y secuestraron camellos. El líder de la expedición nos pide que hablemos con el gobierno para que no vuelvan a ocurrir incidentes que pongan en peligro la expedición. Por supuesto, esto será visto como una injerencia en los asuntos internos..."
 lepsius.401.g: "Presentar una queja formal al gobierno."
 lepsius.401.h: "Nos arreglamos nosotros mismos."
 lepsius.401.i: "¡Castigarlos!"
 lepsius.401.j: "¡Guardias!"
 lepsius.402.t_desert: "Tormenta del Desierto"
 lepsius.402.t_tropical: "Tormenta tropical"
 lepsius.402.d: "¡Nuestra expedición arqueológica se enfrenta a una tormenta devastadora!"
 lepsius.402.f_desert: "Al principio era sólo una ligera brisa que arrojaba arena a los ojos de nuestro equipo de expedición. Pero entonces el viento se hizo tan fuerte que arrasó a hombres y bestias de carga. Incluso después de varias horas, la tormenta del desierto no perdió nada de su violencia. Cuando nuestros arqueólogos preguntaron a un local sobre el fenómeno, dijo que este tipo de tormentas son normales para la época del año. ¡Estas tormentas del desierto podrían poner en peligro toda nuestra expedición!"
 lepsius.402.f_tropical: "Ningún trueno ni relámpago precedió a las repentinas lluvias que azotaron a nuestros equipos de expedición una tarde. Al principio buscaron refugio, pero al cabo de unas horas se dieron cuenta de que esta tormenta tropical era muy diferente a las precipitaciones habituales en esta región. ¡Uno de nuestros porteadores incluso sugirió que podría ser un huracán en toda regla!"
 lepsius.402.g: "Esta suave brisa no nos detendrá."
 lepsius.402.h: "La situación es demasiado peligrosa y la expedición tendrá que esperar."
 lepsius.403.t: "Niebla en los Andes"
 lepsius.403.d: "Después de que el agregado militar volvió a poner a nuestra expedición en una situación peligrosa, los demás participantes exigen consecuencias."
 lepsius.403.f: "La tripulación de nuestra expedición a los Andes se queja del agregado militar. En varias ocasiones ha llevado al grupo en la dirección equivocada en busca de un antiguo sitio inca. Recientemente, incluso sucedió que en su ambición de alcanzar la meta lo más rápido posible no contaba con la niebla en las montañas. La expedición perdió un tiempo importante a causa de esto. Algunos hombres están presionando para nombrar un nuevo líder."
 lepsius.403.g: "Debería ser relevado de sus funciones."
 lepsius.403.h: "Hizo un buen trabajo."
 lepsius.404.t_aegean: "Puente Roto"
 lepsius.404.t_peru: "Puente colgante roto"
 lepsius.404.d: "Un puente destruido impide que nuestra expedición avance."
 lepsius.404.f_aegean: "Grecia y Creta son conocidas por sus paisajes accidentados. Cuando nuestra expedición llega a un desfiladero, resulta que el muelle de un puente ha sido arrastrado por un deslizamiento de tierra reciente. Nos enfrentamos a la decisión de reparar el puente y apuntar a nuestro objetivo original o ir a otro lugar. La última opción es más rápida y menos costosa, pero probablemente tenga menos éxito arqueológico."
 lepsius.404.f_peru: "Después de un arduo ascenso por pasos andinos y estrechos caminos de montaña, nuestra expedición arqueológica se enfrenta a un problema inesperado. Un puente colgante que, según los lugareños, conduce a un templo envuelto en una leyenda, ha quedado completamente destruido. Algunos miembros de la expedición instan a abandonar la búsqueda y dirigirse a un sitio arqueológico más fácil, pero los lugareños instan a que valdría la pena el esfuerzo. Sin embargo, si queremos reconstruir el puente, nos costaría tiempo y dinero."
 lepsius.404.g: "Reconstruir el puente."
 lepsius.404.h: "Encontrar otra forma."
 lepsius.405.t_mesopotamia: "Malos caminos en Mesopotamia"
 lepsius.405.t_yucatan: "Malos caminos en Yucatán"
 lepsius.405.d: "El mal estado de las carreteras presenta a nuestra expedición desafíos hasta ahora inimaginables."
 lepsius.405.f_mesopotamia: "Desafortunadamente, no todas las carreteras tienen la calidad que uno debería esperar. En particular, las carreteras secundarias y los caminos que salen de las principales rutas comerciales están en condiciones notablemente malas. Pero los destinos potenciales de nuestro viaje están lejos de los centros de la civilización. El viaje es difícil y algunos expedicionarios ya se quejan de que deberíamos haber tomado una ruta diferente."
 lepsius.405.f_yucatan: "Las selvas de Yucatán todavía no están desarrolladas incluso en estos tiempos modernos. Esto los convierte en destinos arqueológicos valiosos, ya que muchas ruinas no han sido examinadas de cerca por los humanos durante siglos. Por otro lado, el viaje está lleno de dificultades. A excepción de algunos senderos forestales muy transitados, casi no hay carreteras. Los expedicionarios ya se quejan de la decisión de tomar esta ruta."
 lepsius.405.g: "Prueba otro camino."
 lepsius.405.h: "Invierte en nuevos hombres y bestias de carga para que el viaje sea más agradable."
 lepsius.405.i: "Seguimos en este camino."
 lepsius.406.t: "¡Naufragio de expedición!"
 lepsius.406.d: "Nuestro agregado militar es responsable de un acontecimiento sumamente desafortunado."
 lepsius.406.f: "Uno de nuestros barcos de expedición naufragó en el mar Egeo. Afortunadamente nadie resultó herido, pero gran parte de nuestro equipo arqueológico se hundió en alta mar. La mayoría de nuestro equipo de expedición culpa a nuestro capitán por pasar por alto un banco de arena. Sin embargo, se defendió diciendo que quería terminar el viaje rápidamente y que el arrecife no figuraba en ningún mapa. Hay un consenso cada vez mayor entre los hombres de que con el líder actual, nuestras posibilidades de éxito están disminuyendo."
 lepsius.406.g: "El es responsable."
 lepsius.406.h: "Compre equipo nuevo y hagamos como si no pasara nada."
 lepsius.407.t: "El Oasis"
 lepsius.407.d: "Durante su viaje, nuestros arqueólogos descubrieron un oasis hasta entonces desconocido y renovaron sus reservas de agua."
 lepsius.407.f: "En realidad, los miembros de la expedición esperaban soportar unos días de dificultades: se suponía que una antigua ruina egipcia que querían explorar se encontraba en algún lugar del desierto a dos o tres días de marcha. Sin embargo, para su gran sorpresa, descubrieron que había un oasis en el camino: les esperaban palmeras con dátiles gordos e higueras con frutos dulces. Se repusieron los suministros de agua y algunos participantes aprovecharon la oportunidad para bañarse bajo el sol egipcio."
 lepsius.407.g: "Noticias refrescantes."
 lepsius.408.t: "amuleto nazar"
 lepsius.408.d: "Algunos de los porteadores contratados creen que nuestro líder arqueológico está siendo perseguido por el \"mal de ojo\". Lo instan a comprar un amuleto."
 lepsius.408.g: "Compra el amuleto."
 lepsius.408.h: "¡Esta superstición contradice toda convicción científica!"
 lepsius.409.t: "Pescadores amigables"
 lepsius.409.d: "Unos amigos pescadores, de paso por la costa, se han ofrecido a llevar el equipo de nuestra expedición durante algunas millas."
 lepsius.409.g: "Muy útil."
 lepsius.410.t_yucatan: "Mascota del loro"
 lepsius.410.t_peru: "Cóndor amenazante"
 lepsius.410.d_yucatan: "Desde que nos sumergimos en la selva de Yucatán, un pequeño y colorido loro nos acompaña."
 lepsius.410.d_peru: "Desde que subimos a los Andes, la sombra de un poderoso cóndor se cierne sobre nosotros todos los días."
 lepsius.410.f_yucatan: "Los bosques de Yucatán están llenos de peligros: jaguares, serpientes e insectos venenosos acechan entre los arbustos. Al mismo tiempo, los expedicionarios quedan fascinados por la flora y la fauna, en particular por un pequeño y colorido loro que vuela sobre sombreros y cascos y no se aparta de los viajeros. El pájaro parece extremadamente inteligente y ahora incluso se le puede alimentar con regularidad. El líder de la expedición ha declarado que el loro es la mascota de la empresa y tiene intención de llevárselo a casa una vez finalizado el viaje."
 lepsius.410.f_peru: "El cóndor es el rey de los Andes. Los enormes pájaros dominan el aire, su sombra se hincha hasta alcanzar tamaños inimaginables. Desde el comienzo de la expedición, se cierne sobre las alpacas y los porteadores de forma francamente amenazadora. Los lugareños no confían en el animal. Como buitre, se sabe que circula sobre cadáveres en lugar de sobre vivos. La sensación de malestar se extiende entre algunos participantes."
 lepsius.410.g: "Un buen augurio."
 lepsius.410.h: "Debería convertirse en un loro mascota."
 lepsius.410.i: "Un mal augurio."
 lepsius.410.j: "Él será nuestro."
 lepsius.411.t: "Animales de carga exhaustos"
 lepsius.411.d: "Parece que trabajamos demasiado con nuestros animales de carga."
 lepsius.411.f: "Desde hace días reclamamos nuestras bestias de carga. Algunos incluso dicen: demasiado tiempo. Ahora se notan los signos de fatiga. Algunos animales incluso se niegan a viajar más lejos y sólo pueden ser movidos a golpes. Esta mañana nuestro primer animal se desplomó."
 lepsius.411.g: "Pueden descansar cuando estén muertos."
 lepsius.411.h: "¡Déjalos descansar!"
 lepsius.412.t: "¡Expedición arqueológica perdida!"
 lepsius.412.d: "Hace dos meses que se pierde todo contacto con nuestra expedición arqueológica."
 lepsius.412.f: "A veces simplemente tienes mala suerte. Algunos lugareños supersticiosos incluso afirman que toda nuestra empresa está desventurada. De cualquier manera: el contacto con nuestra expedición arqueológica se ha perdido por completo. El último mensaje ha tardado en llegar. Estamos seguros de que los arqueólogos retrocederán pronto, pero tal como están las cosas, todo el personal parece haber perdido el rumbo."
 lepsius.412.g: "¡Maldiciones!"
 lepsius.413.t: "Enfermedades exóticas"
 lepsius.413.d: "Algunos participantes de nuestra expedición arqueológica están gravemente enfermos."
 lepsius.413.f: "Las enfermedades siempre han dificultado los viajes largos. Ya sea en los trópicos, desiertos, pantanos o altas montañas: los miembros de nuestra expedición no están acostumbrados a las condiciones y patógenos desconocidos acechan por todas partes. La malaria, en particular, vuelve a cobrar constantemente víctimas. Durante el viaje, algunos hombres enferman tan gravemente que simplemente ya no pueden trabajar."
 lepsius.413.g: "Los esperamos y los curamos."
 lepsius.413.h: "Déjalos atrás."
 lepsius.414.t: "Corrupción"
 lepsius.414.d: "Nuestra expedición está siendo acosada por funcionarios locales y se le impide avanzar."
 lepsius.414.f: "Desde que comenzó nuestra expedición, sus participantes se han enfrentado a todo tipo de acoso. Los pequeños y medianos funcionarios nos complican la vida con sellos y tasas especiales. Uno incluso cuestionó nuestra visa y quiso multarnos. La situación es extremadamente confusa. Al parecer, en este país no se puede salir adelante sin buenos contactos o lazos familiares."
 lepsius.414.g: "¡Ladrones!"
 lepsius.414.h: "¡Ladrones!"
 lepsius.414.i: "¡Políticos!"
 lepsius.415.t: "La inundación"
 lepsius.415.d: "Mientras una inundación devasta el país, nuestro líder de expedición ve a una mujer siendo arrastrada por las aguas."
 lepsius.415.f: "Las constantes lluvias de los últimos días han provocado que el agua se desborde; Clima excepcional, pero nada para lo que nuestros miembros de la expedición no estuvieran preparados. Mientras el río se ha convertido en un torrente, nuestros hombres continúan el viaje, hasta el momento en que suena un grito desde la orilla. Por un momento, nuestro líder de expedición puede ver cómo se lleva un bulto de colores. Ahora es importante reaccionar rápidamente, aunque esto pueda significar un retraso decisivo en el viaje."
 lepsius.415.g: "¡Rescatala!"
 lepsius.415.h: "¡La expedición no puede esperar!"
 lepsius.416.t: "Buen tiempo"
 lepsius.416.d: "La expedición arqueológica avanza sorprendentemente bien."
 lepsius.416.f: "Nuestro equipo de expedición está haciendo buenos progresos. A veces, no tener noticias es la mejor noticia y, en este caso, nuestros arqueólogos confían en encontrar un sitio con problemas entre buenos y muy buenos. Por lo demás, no hay nada que merezca la pena mencionar, ¡excepto el buen tiempo!"
 lepsius.416.g: "Qué satisfactorio."
 lepsius.417.t: "Locales hospitalarios"
 lepsius.417.d: "Los lugareños recibieron nuestra expedición de manera amigable, pero tal vez podríamos sacarle aún más provecho..."
 lepsius.417.f: "Nuestra expedición se detuvo en un pequeño pueblo. Los residentes son muy hospitalarios y han ofrecido al equipo un buen lugar de descanso y han proporcionado comida a los animales. Hablando con los lugareños, se sugirió que podrían saber más sobre el área, incluidos los legados antiguos..."
 lepsius.417.g: "Tenemos que averiguarlo todo."
 lepsius.417.h: "Está bien tal como está."
 lepsius.418.t: "Guía local"
 lepsius.418.d: "Un guía local ofreció sus servicios a nuestra expedición."
 lepsius.418.f: "A veces sólo hay que tener suerte. Nuestra expedición cuenta con un guía local que tiene un excelente conocimiento de la zona y sabe más sobre los lugares de interés de la región."
 lepsius.418.g: "¡Perfecto!"
 lepsius.419.t: "Atajo"
 lepsius.419.d: "El agregado militar de la expedición ha encontrado un atajo hacia una ruina, pero exige algo a cambio."
 lepsius.419.f: "Nuestro agregado militar informa de un atajo. Cuando hicimos una pausa ayer por la tarde, la utilizó para explorar la zona y afirma haber encontrado una carretera antigua que no está en ningún mapa. Si eso es cierto, podría ayudar aún más a nuestra expedición, pero también significaría recompensarlo bien..."
 lepsius.419.g: "¡Recompénsalo y síguelo!"
 lepsius.419.h: "No le hagamos más importante de lo que es."
 lepsius.420.t: "Hombres motivados"
 lepsius.420.d: "Nuestra expedición tuvo la suerte de contar con hombres particularmente motivados. Esto mejora significativamente nuestras posibilidades de éxito."
 lepsius.420.f: "Desde lejos se escuchan silbidos y cánticos. La expedición arqueológica avanza sorprendentemente bien. El equipo está muy motivado y confiado en el éxito. Los hombres están más relajados ante los obstáculos y los problemas. No sabemos qué causó esto, tal vez tuvimos suerte al elegir a nuestra gente. En cualquier caso, esto aumenta enormemente nuestras posibilidades de éxito."
 lepsius.420.g: "Carpe Diem."
 lepsius.421.t: "El escarabajo"
 lepsius.421.f: "Desafortunadamente, durante una excavación más pequeña cerca de una mastaba, nuestro equipo de excavación no encontró nada, a excepción de un pequeño escarabajo azul lapislázuli. El escarabajo era considerado un amuleto de buena suerte en el antiguo Egipto. El comportamiento del escarabajo de hacer rodar bolas de estiércol frente a él se relaciona con Re y su viaje por el cielo en la barcaza solar. Nuestro líder de expedición preguntó si podríamos hacer una pequeña excepción y quedarnos con la pieza esencialmente secundaria como recuerdo."
 lepsius.421.g: "Puede quedarse con el artefacto."
 lepsius.421.h: "Todos los objetos encontrados deben entregarse a un museo, ¡sin excepción!"
 lepsius.422.t: "Templo en la arena"
 lepsius.422.d: "Nuestros arqueólogos encontraron lo que parece un templo macedonio."
 lepsius.422.f: "Al principio nuestros hombres pensaron que se trataba de una duna, pero un pequeño pináculo de piedra caliza labrada les dijo a nuestros arqueólogos que la inusual montaña de arena en el desierto egipcio guardaba un secreto. A los pocos días la expedición descubrió un templo. Para algunos, el resultado fue decepcionante porque no se parecía a una estructura del antiguo Egipto, sino que resultó ser una estructura de la época de Alejandro Magno. Sin embargo, los expertos afirman que el templo era un testimonio de las actividades del general griego en Egipto, cuya tumba no ha sido encontrada hasta el día de hoy."
 lepsius.422.g: "Tras los pasos de Alejandro Magno..."
 lepsius.422.h: "Todos los cuentos de viejas."
 lepsius.423.t: "Un león alado"
 lepsius.423.d: "Nuestros arqueólogos han desenterrado en Mesopotamia una estatuilla que parece un querubín."
 lepsius.423.f: "Las criaturas híbridas de humanos y animales están muy extendidas en Oriente. Nuestra expedición tuvo la suerte de conseguir una estatuilla excepcionalmente hermosa y bien conservada mientras buscaba un sitio de excavación; ya está de camino a nuestro museo. También es reveladora una inscripción cuneiforme que identifica al ser como guardia del templo. Nuestros arqueólogos han teorizado que estos guardianes del templo representan una conexión con los querubines israelitas mencionados en la Biblia. Dos de ellos también protegieron el Arca de la Alianza que se encontraba en el Templo de Jerusalén."
 lepsius.423.g: "¿Estamos hablando del Arca perdida?"
 lepsius.423.h: "San Marcos, ¿eres tú?"
 lepsius.423.i: "Todos los cuentos de viejas."
 lepsius.424.t: "depósito cuneiforme"
 lepsius.424.d: "Nuestros arqueólogos han descubierto numerosos artefactos mesopotámicos."
 lepsius.424.f: "Cuando nuestros arqueólogos examinaron una antigua muralla en las afueras de una pequeña ciudad, en realidad no esperaban encontrar mucho. Sólo cuando palparon la piedra se dieron cuenta de que había cavidades en la estructura. Después de una investigación detallada, rompieron la pared en un punto determinado; resultó que ¡había tablillas cuneiformes incorporadas en la pared! El depósito está sorprendentemente bien conservado y proporciona información sobre la antigua Mesopotamia."
 lepsius.424.g: "¡Un descubrimiento increíble!"
 lepsius.425.t: "¿Oricalco?"
 lepsius.425.d: "Nuestros arqueólogos han encontrado un artefacto elaborado con un material extraño y desconocido."
 lepsius.425.f: "Durante una de nuestras expediciones griegas, nuestros arqueólogos hicieron un descubrimiento curioso. Una pequeña bala llegó por la mañana a la dirección del museo. El director no entendió al principio por qué sus hombres le devolvieron la canica; en circunstancias normales fue sólo un hallazgo trivial. Pero la esfera de color ámbar está hecha de un material desconocido que nunca hemos encontrado en ningún otro lugar. Hasta ahora, los expertos no saben qué hacer con el artefacto, y algunos creen que es falso. Otros afirman que esto es una indicación de que nuestro conocimiento del mundo del Egeo es totalmente inadecuado."
 lepsius.425.g: "¿No mencionó Platón algo así en su diálogo Critias...?"
 lepsius.425.h: "Todos los cuentos de viejas."
 lepsius.426.t: "tesoro de cerámica"
 lepsius.426.d: "Nuestros arqueólogos han descubierto numerosos artefactos del Egeo."
 lepsius.426.f: "Lo que para los antiguos era basura, para un arqueólogo es un tesoro. Este lema se ha hecho realidad recientemente, cuando nuestra expedición se detuvo en una ruina más pequeña en busca de un lugar de excavación y, al examinarla más de cerca, encontró un pozo con un depósito de cerámica. Muchos de los fragmentos todavía necesitan ser reparados, pero los numerosos hallazgos enriquecerán sin duda la colección de nuestro museo."
 lepsius.426.g: "¡Y todo nos pertenece!"
 lepsius.427.t: "maya jade"
 lepsius.427.d: "Nuestros arqueólogos han encontrado valiosos artefactos mayas hechos de jade."
 lepsius.427.f: "El jade fue un material muy utilizado por los mayas en los campos del arte y la religión. La élite se adornaba con jade y el dios del sol también estaba representado con joyas de jade. Sin embargo, los pueblos de Centroamérica también fabricaban herramientas con jade porque era uno de los materiales más duros que se conocían en el Nuevo Mundo. Nuestros arqueólogos tuvieron la suerte de encontrar algunos de estos artefactos de jade durante su última excavación."
 lepsius.427.g: "Eso quedaría bien en nuestra colección."
 lepsius.428.t: "Ídolo Inca"
 lepsius.428.d: "Nuestros arqueólogos han desenterrado un misterioso ídolo inca dorado."
 lepsius.428.f: "Una estatuilla dorada del dios inca Inti llegó esta mañana al museo mediante entrega urgente. Nuestros arqueólogos no dicen cómo ni dónde lo obtuvieron. Una mueca, horrible y hermosa al mismo tiempo, mira al observador. Algunos expertos ya han expresado dudas sobre si la pieza es de origen inca. El diseño indica una cultura desconocida. Además, casi todo el oro de los incas fue robado del Perú. Es quizás el artículo más singular de nuestra colección precolombina hasta la fecha. El director del museo ya susurra a puerta cerrada que algunas leyendas podrían ser ciertas."
 lepsius.428.g: "El Dorado, ¿alguien?"
 lepsius.428.h: "Todos los cuentos de viejas."
 lepsius.429.t: "La calavera de cristal"
 lepsius.429.d: "Nuestros arqueólogos encontraron... algo."
 lepsius.429.f: "Nuestro excavador jura que un comerciante de confianza le mostró recientemente una pieza extraordinariamente interesante y siniestra. Es un cráneo humano, hecho íntegramente de cuarzo mesoamericano. La superficie está sorprendentemente bien pulida y el trabajo supera todo lo que hayamos conocido sobre las culturas del continente sudamericano. Pero las dudas son grandes. Incluso nuestro arqueólogo jefe no está 100% seguro de qué hacer con el artefacto."
 lepsius.429.g: "Lo sumamos a la colección."
 lepsius.429.h: "Definitivamente una falsificación."
 lepsius.430.t: "Calavera de cristal falsa"
 lepsius.430.d: "El supuesto artefacto que nos vendieron hace años como una sensación es en realidad falso."
 lepsius.430.f: "¿Cómo pudo pasar eso? ¿Fuimos demasiado descuidados? ¿Demasiado egoístas porque corremos de sensación en sensación y sólo creemos lo que queremos creer? La legendaria calavera de cristal que nuestro museo adquirió como atracción hace años es una falsificación barata. ¡Pasarán años antes de que se restablezca nuestra posición en el mundo arqueológico!"
 lepsius.430.g: "¡Una vergüenza nacional para nuestra arqueología!"
 lepsius.431.t: "Local sabe arruinar"
 lepsius.431.d: "Un local servicial pudo ayudarnos a encontrar artefactos."
 lepsius.431.f: "Cuando nuestra expedición hace una parada en un pequeño pueblo de nuestra ruta, nos encontramos con un anciano granjero que ha oído hablar de nuestro destino. A cambio de un poco de pan, sal y agua, es sumamente complaciente. \"Los otros aldeanos ya me han dicho lo que estás buscando\", explica. Nos lleva medio día de viaje por territorio desconocido. Nuestros arqueólogos se sorprenden cuando nos lleva directamente a unas ruinas antiguas. Pudimos encontrar algunos artefactos para nuestro museo."
 lepsius.431.g: "¡Este debe ser nuestro día de suerte!"
 lepsius.432.t: "Artefacto de comercio local"
 lepsius.432.d: "Un local quiere vendernos un artefacto."
 lepsius.432.f: "Nuestra expedición se detiene en una ciudad más grande. Cuando los porteadores compraron alimento para las bestias de carga, un comerciante habló. Al parecer, la noticia sobre nuestro viaje también se ha difundido ampliamente entre los lugareños. Por un buen precio, está dispuesto a vender una valiosa obra de arte que le regaló un ladrón de tumbas. El origen del artefacto no está claro, pero la oferta es atractiva, aunque tenga un precio."
 lepsius.432.g: "Pertenece a un museo."
 lepsius.432.h: "No estamos interesados ​​en acuerdos tan turbios."
 lepsius.433.t: "¿Auténtico o falso?"
 lepsius.433.d: "Un anticuario de dudosa reputación quiere vendernos un artefacto."
 lepsius.433.f: "No todos los comerciantes de artefactos arqueológicos supuestamente valiosos son dignos de confianza. Esto se aplica, por ejemplo, a un comerciante que, con un exceso de entusiasmo, quiere vendernos un tesoro artístico. La invasión y su mecanismo de precios flexible, que supuestamente nos promete un \"precio amigable\", han generado dudas entre nuestros jefes de expedición sobre si se trata realmente de una oferta segura. Por eso preguntaron al museo si debían aceptar el objeto de las dudosas manos del comerciante."
 lepsius.433.g: "Tenemos que correr el riesgo."
 lepsius.433.h: "No confíes en él."
 lepsius.434.t: "Ladrones de tumbas capturados"
 lepsius.434.d: "Nuestra expedición capturó a un grupo de ladrones de tumbas y su botín, pero no sabemos qué hacer con ellos."
 lepsius.434.f: "Nuestros arqueólogos creyeron haber encontrado ya un buen lugar de excavación, hasta que se dieron cuenta de que el lugar había sido saqueado durante siglos. Mientras volvían a empacar sus cosas, un par de guardas de fogatas pudieron detener a varios personajes sospechosos que intentaban sacar de contrabando un artefacto del sitio abandonado. En realidad, deberíamos entregar a los hombres a las autoridades y devolver la obra de arte robada. Sin embargo, algunas personas piensan que deberíamos reclamar el artefacto para nosotros y comprar el silencio de los ladrones de tumbas."
 lepsius.434.g: "El artefacto debería ser nuestro."
 lepsius.434.h: "Presente una denuncia y devuelva el artefacto a las autoridades locales."
 lepsius.435.t: "Subasta"
 lepsius.435.d: "La presión política nos lleva a considerar la venta de un artefacto encontrado recientemente."
 lepsius.435.f: "Algunos miembros del gobierno temen que nuestras empresas arqueológicas en el extranjero no sean más que un desperdicio de dinero, sacrificando la producción económica de nuestra nación por las torres de marfil de élite de un pequeño grupo de científicos. No sólo quieren resultados científicos, sino también pruebas monetarias de que estas expediciones tienen sentido. Por ello, un grupo de políticos exige que se venda un artefacto recientemente encontrado para cubrir los gastos ocasionados por nuestras aventuras arqueológicas."
 lepsius.435.g: "Véndelo en una subasta."
 lepsius.435.h: "¡Pero pertenece a un museo!"
 lepsius.436.t: "Cámara oculta"
 lepsius.436.d: "Nuestros arqueólogos encontraron una tumba, aparentemente saqueada por asaltantes. Pero cuando hicieron más investigaciones, encontraron una cámara detrás de una pared falsa."
 lepsius.436.f: "La última parada empezó con una decepción. Nuestro jefe de expedición esperaba mucho de este lugar histórico: se trataba de la tumba de un alto funcionario de la nobleza, quizás también con una función sagrada. En cualquier caso, la información de algunos agricultores sugirió que así era. La decepción en el lugar es aún mayor: la tumba está vacía, las paredes desnudas y ni siquiera hay ningún signo de importancia histórica. A primera vista, parecía simplemente una cueva lisa. Sin embargo, esto cambió abruptamente cuando el asistente de investigación descubrió accidentalmente el contorno del marco de una puerta mientras se apoyaba contra la supuesta pared. Se necesitaron dos horas para descubrir escombros, contraventanas y rocas, y revelar el acceso a una cámara previamente oculta."
 lepsius.436.g: "¡Mi tesoro!"
 lepsius.437.t: "Campamento abandonado"
 lepsius.437.d: "Encontramos el campamento abandonado de un equipo de excavación extranjero. Después de que conseguimos dos artefactos allí, el embajador del país reclama las piezas para sí."
 lepsius.437.f: "Cuando nuestros hombres llegaron al campo de excavación, estaban examinando los restos de una expedición que había estado explorando un templo cercano apenas unos meses antes. Al final resultó que, los trabajadores de la excavación limpiaron el área demasiado rápido: en una caja se encontraron dos artefactos que no habían sido recogidos. Nuestros arqueólogos consiguieron el hallazgo, pero pronto fueron visitados por el embajador del país, quien reclamó los artefactos encontrados por su país. El caso ha desatado un incidente diplomático con una gran potencia."
 lepsius.437.g: "Lo encontramos, es nuestro."
 lepsius.437.h: "Compartamos los artefactos."
 lepsius.437.i: "En lugar de eso, compartimos nuestro conocimiento."
 lepsius.437.j: "Ellos son los legítimos dueños."
 lepsius.438.t: "El eremita"
 lepsius.438.d: "Desafortunadamente, un ermitaño que tiene un artefacto a su disposición sólo está ligeramente dispuesto a cooperar."
 lepsius.438.f: "Hemos escuchado noticias de un ermitaño excéntrico del que se dice que posee un artefacto. Tiene un impresionante conocimiento del pasado y una amplia memoria. En muchos aspectos, incluso los eruditos de nuestra expedición están asombrados por sus conocimientos. Al viejo gruñón le gustaría contarnos más, pero no hay manera de que abandone el artefacto. Al parecer tenemos que usar la fuerza."
 lepsius.438.g: "¡Quiero este artefacto y lo quiero ahora!"
 lepsius.438.h: "Sólo escúchalo."
 lepsius.439.t: "¿Dinamita?"
 lepsius.439.d: "A veces, los desafíos especiales requieren medidas especiales."
 lepsius.439.f: "Durante una excavación, nuestro guía llega a la conclusión de que detrás de un muro puede haber un pasaje escondido; al menos afirma haber visto una cavidad detrás de la pared. Las medidas drásticas estaban a la orden del día en los primeros días de la arqueología, y esto incluía el uso de explosivos para promover sus objetivos científicos más elevados. Por supuesto, no podremos salirnos con la nuestra si el supuesto hueco es un engaño y ponemos en peligro el lugar de excavación previamente asegurado."
 lepsius.439.g: "¡KA-BOOM!"
 lepsius.439.h: "Bárbaro sólo de pensarlo."
 lepsius.440.t: "una pieza rota"
 lepsius.440.d: "Encontramos un artefacto roto. La pieza que falta está en posesión de un poder insignificante."
 lepsius.440.f: "Durante una excavación, los arqueólogos han encontrado un valioso tesoro artístico, al menos una parte. La otra pieza resulta estar en manos de una potencia menor que la compró a un anticuario hace unos años. Podríamos utilizar nuestro servicio diplomático para conseguir la pieza que falta y ensamblar el artefacto, pero el embajador ya dejó claro que hacerlo sería un compromiso político."
 lepsius.440.g: "Les rogamos amablemente que lo hagan."
 lepsius.440.h: "Después de todo, el asunto no es tan importante."
 lepsius.441.t: "Un obelisco olvidado"
 lepsius.441.d: "Un obelisco inacabado brinda a nuestros científicos información sobre las prácticas de construcción antiguas."
 lepsius.441.f: "En una cantera del antiguo Egipto, nuestros arqueólogos han encontrado lo que parece un obelisco inacabado. Al parecer, el trabajo en el enorme monolito nunca se completó. Aunque no tiene jeroglíficos y no puede ser transportado debido a sus dimensiones, nuestros científicos han obtenido nuevos conocimientos sobre cómo los antiguos egipcios construyeron y erigieron estas estructuras."
 lepsius.441.g: "Muy interesante."
 lepsius.442.t: "animales momificados"
 lepsius.442.d: "El manejo de animales momificados recientemente descubiertos ha generado polémica entre los arqueólogos."
 lepsius.442.f: "Hace unos días, los arqueólogos encontraron una cámara funeraria con un hallazgo especial: además del noble enterrado allí, también se encontraron sarcófagos más pequeños con animales. A juzgar por su apariencia, son un gato, un perro y un mono. Después de un hallazgo, surgió una discusión entre los científicos: los animales momificados podrían arrojar luz sobre su cría y la vida de los animales domésticos en el antiguo Egipto, pero al mismo tiempo significarían la destrucción de estos raros artefactos."
 lepsius.442.g: "Requieren una investigación exhaustiva."
 lepsius.442.h: "¡No los toques, son piezas importantes del museo!"
 lepsius.443.t: "Pelea por un cocodrilo"
 lepsius.443.d: "Una extraña discusión sobre un cocodrilo muerto divide a nuestros científicos y al agregado militar."
 lepsius.443.f: "La fauna del Nilo inspiró a nuestros científicos a intensificar sus estudios biológicos. Prestan especial atención al cocodrilo del Nilo, al que los académicos encuentran con miedo, asco y fascinación. A petición de nuestros científicos, nuestro agregado militar mató a un cocodrilo. Ahora, sin embargo, se niega a entregar el animal: prefiere que lo disequen y lo cuelguen sobre la chimenea."
 lepsius.443.g: "Deberá entregar el cocodrilo a los investigadores."
 lepsius.443.h: "¡Viva el taxidermismo!"
 lepsius.443.i: "De hecho, ese es un lindo cocodrilo..."
 lepsius.444.t: "Maldición del faraón"
 lepsius.444.d: "Después de algunos incidentes misteriosos, no sólo los ayudantes locales, sino también algunos científicos creen que nuestra aventura en Egipto está maldita."
 lepsius.444.f: "Todo comenzó después de que nuestro líder de expedición abriera una tumba egipcia: en el sarcófago había una momia de aspecto espantoso, que se descompuso en pocos minutos ante los ojos de los participantes. Pocos días después, una misteriosa enfermedad afectó a casi todos los participantes. Murió un asistente de investigación que estuvo presente en la inauguración de la momia. Un día después, una tormenta de arena hizo imposible trabajar durante una semana. Esta mañana los suministros de agua resultaron contaminados y no potables; Brilla en un color amarillo cobrizo. Cada vez más involucrados están convencidos de que deben pagar por la profanación de su tumba: ¡la maldición del faraón desconocido está sobre ellos!"
 lepsius.444.g: "¿Qué es esto? ¡¿Cometa avistado?!"
 lepsius.445.t: "Fragmento de la epopeya de Gilgamesh"
 lepsius.445.d: "Los científicos han encontrado un fragmento de la famosa Epopeya de Gilgamesh. Se considera la pieza más antigua de la literatura humana."
 lepsius.445.f: "La epopeya de Gilgamesh es el contenido de un grupo de obras literarias que provienen principalmente del área babilónica y contiene uno de los sellos escritos más antiguos que se conservan. La Epopeya de Gilgamesh en sus distintas versiones es la obra más conocida de la literatura acadia y sumeria. La epopeya cuenta la historia de Gilgamesh, un rey de Uruk, sus hazañas y aventuras, su amistad con Enkidu, su muerte y la búsqueda de la inmortalidad de Gilgamesh. #T @lepsius_gilgamesh_fragment! Se necesitan cinco piezas de la epopeya para reconstruir una versión básica.#!"
 lepsius.445.g: "Debemos encontrar más piezas."
 lepsius.445.h: "¡Esta es la última pieza!"
 lepsius.445.i: "Siempre serán bienvenidas más piezas."
 lepsius.446.t: "Fresco minoico"
 lepsius.446.d: "Durante las investigaciones en Creta, nuestro equipo de excavación encontró restos de la cultura minoica."
 lepsius.446.f: "Un hermoso fresco ha llamado la atención de nuestros arqueólogos. Fragmentos de pescadores, bailarines y jugadores de pelota dan una impresión de la vida cotidiana de la antigua civilización minoica. La pared que el equipo de expedición descubrió en Creta incluso muestra rastros de pintura, ¡después de 4.000 años! Es seguro que a este fabuloso descubrimiento seguirán más hallazgos."
 lepsius.446.g: "Una cultura perdida cobra vida ante nuestros ojos."
 lepsius.447.t: "Murallas ciclópeas"
 lepsius.447.d: "Mientras investigaba en Argólida, nuestro equipo de excavación descubrió restos de la cultura micénica."
 lepsius.447.f: "Después de varios contratiempos, los arqueólogos en Grecia encontraron lo que los lugareños primero llamaron una terraza para olivos, pero que en realidad era solo la parte superior de un muro ciclópeo. Los expedicionarios no han encontrado mucho hasta ahora, pero al menos es un comienzo."
 lepsius.447.g: "¿Cómo construyeron tan perfectamente en aquel entonces?"
 lepsius.448.t: "Estela maya"
 lepsius.448.d: "El equipo Arqueológico en Yucatán ha avanzado en el desciframiento de los jeroglíficos mayas."
 lepsius.448.f: "En lo profundo de la selva de Yucatán, los miembros de nuestra expedición encontraron una inscripción de la época maya. Los científicos los datan aproximadamente en el siglo VI a.C. El descubrimiento ha aumentado enormemente nuestro conocimiento sobre la cultura perdida, pero algunos jeroglíficos siguen siendo un misterio para nuestros arqueólogos. Sin embargo, los involucrados nos dan esperanzas de que descifrar la escritura maya sea sólo cuestión de tiempo."
 lepsius.448.g: "Debemos descifrarlo."
 lepsius.449.t: "Cueva Maya"
 lepsius.449.d: "El equipo de expedición ha encontrado rastros de la cultura maya, pero tiene poco que mostrar."
 lepsius.449.f: "Los mayas alguna vez usaron cuevas para celebrar sus rituales en su interior. Cuál era el contenido exacto no se ha aclarado hasta el día de hoy. Quizás nuestros arqueólogos puedan informar más sobre esto en el futuro. Encontraron la entrada a una cueva maya en el norte de Guatemala. Sin embargo, hasta ahora los resultados han sido bastante magros."
 lepsius.449.g: "¿Por qué te pagan realmente?"
 lepsius.450.t: "momias andinas"
 lepsius.450.d: "En la cima de una montaña, nuestros científicos han descubierto los cadáveres de niños incas que fueron víctimas de un ritual: el frío los conservó durante siglos."
 lepsius.450.f: "Capacocha era un importante rito de sacrificio entre los incas que normalmente implicaba el sacrificio de niños. Se seleccionaban niños de ambos sexos de todo el imperio Inca para sacrificarlos en ceremonias capacocha, que se realizaban en importantes santuarios distribuidos por todo el imperio. La razón fundamental de este tipo de rito de sacrificio se ha entendido típicamente como el intento de los incas de garantizar que los mejores de la humanidad fueran enviados a unirse a sus deidades. A los niños elegidos para el sacrificio en una ceremonia de capacocha generalmente se les daba alcohol y hojas de coca y se los depositaba en el lugar de la ceremonia. Los incas prestaron especial atención a varios sitios ceremoniales wak'a en elevaciones muy altas. En varios casos, típicamente en las montañas más importantes, estos sitios contienen restos momificados de niños sacrificados en ceremonias capacocha."
 lepsius.450.g: "Desagradable, pero valioso."
 lepsius.451.t: "Una estatua"
 lepsius.451.d: "Los arqueólogos han encontrado en su viaje una estatua extraordinaria. Desafortunadamente, debido a su tamaño, no se pueden transportar."
 lepsius.451.f: "De camino al siguiente lugar de excavación, nuestra expedición se topó con una estatua colosal en una zona accidentada y hasta entonces poco explorada. Era desconocido incluso para muchos ayudantes y porteadores locales; y fascinó a los compañeros científicos desde el primer momento. Nuestro líder de expedición sugirió inmediatamente que la estatua fuera transportada, pero su tamaño y su anclaje en el suelo dificultan este proyecto. Por lo tanto, la mayoría de los participantes consideraron que lo mejor era rastrear todas las inscripciones de la estatua y hacer un dibujo preciso del monumento. Sin embargo, hay algunas voces dispersas y nefastas que dicen que este excelente hallazgo debería ser cortado y enviado a nuestra capital..."
 lepsius.451.g: "Deberán hacer un dibujo preciso y copiar meticulosamente lo escrito."
 lepsius.451.h: "Corta la estatua en pedazos y envíalos a casa."
 lepsius.452.t: "una transcripción"
 lepsius.452.d: "Nuestro líder de expedición ha adquirido un registro antiguo que muestra material que ha sido destruido hace mucho tiempo."
 lepsius.452.g: "Mejor que nada."
 lepsius.453.t: "Artistas plasman el paisaje en papel"
 lepsius.453.d: "Los artistas que llevamos a la expedición arqueológica registran el paisaje con tal claridad que los registros serán útiles para los científicos en las próximas décadas."
 lepsius.453.f: "A lo largo de la historia, las expediciones arqueológicas no sólo han acompañado a los estudiosos clásicos, sino a menudo a una variedad de diferentes personalidades científicas, como geógrafos, biólogos, matemáticos, astrónomos o artistas, que registraron el entorno con lápiz y papel. Todos los involucrados trajeron consigo importantes conocimientos para poder ofrecer a los académicos no participantes en casa la descripción más precisa posible del respectivo sitio arqueológico. Es precisamente este enfoque interdisciplinario el que ha convertido las expediciones desde la invasión de Egipto por Napoleón en una empresa multifacética, en la que se han logrado hitos científicos en varios campos al mismo tiempo."
 lepsius.453.g: "Me alegro de haberlos contratado."
 lepsius.454.t: "Los científicos realizan investigaciones."
 lepsius.454.d: "Nuestros científicos han realizado varios experimentos in situ, no sólo haciendo comparaciones, sino también brindando consejos útiles a nuestros arqueólogos."
 lepsius.454.f: "A lo largo de la historia, las expediciones arqueológicas no sólo han acompañado a los estudiosos clásicos, sino a menudo a una variedad de diferentes personalidades científicas, como geógrafos, biólogos, matemáticos, astrónomos o artistas, que registraron el entorno con lápiz y papel. Todos los involucrados trajeron consigo importantes conocimientos para poder ofrecer a los académicos no participantes en casa la descripción más precisa posible del respectivo sitio arqueológico. Es precisamente este enfoque interdisciplinario el que ha convertido las expediciones desde la invasión de Egipto por Napoleón en una empresa multifacética, en la que se han logrado hitos científicos en varios campos al mismo tiempo."
 lepsius.455.t: "Expedición rival"
 lepsius.455.d: "A unos pocos kilómetros de distancia, el equipo del líder de nuestra expedición se encuentra con un escuadrón de hombres demacrados. Son los miserables restos de una expedición extranjera."
 lepsius.455.f: "Nuestros arqueólogos no son los únicos que se aventuran en territorios inexplorados. Una pequeña expedición privada de un excéntrico erudito cruza nuestra empresa estatal. A diferencia de nuestro propio equipo, los hombres de la empresa competidora están mal equipados. Puedes ver la carencia y la privación en ellos. El capellán de nuestra expedición les propone ayudarles, lo que también podría interpretarse como un gesto benévolo en su país de origen. Otros miembros de la expedición, en cambio, ven la oportunidad de intercambiar conocimientos con académicos extranjeros. El agregado militar, por su parte, ve la oportunidad de ofrecer ayuda a cambio de recibir un valioso artefacto del fondo de la expedición."
 lepsius.455.g: "Ayudarles a."
 lepsius.455.h: "Les ayudamos a cambio de sus conocimientos."
 lepsius.455.i: "Comida y ayuda sólo si nos dejan su tesoro."
 lepsius.461.t: "La esfinge susurrante"
 lepsius.461.d: "Su más que cuestionable estilo de vida contribuye a que nuestro líder de expedición [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] sufra alucinaciones memorables."
 lepsius.462.d: "Su más que cuestionable estilo de vida contribuye a que nuestro agregado militar [SCOPE.sCharacter('lepsius_military_attache').GetFullName] sufra alucinaciones memorables."
 lepsius.461.g: "Este hombre realmente necesita repensar su estilo de vida."
 lepsius.463.t: "Bastet, la diosa gato"
 lepsius.463.d: "En su viaje, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] descubrió su debilidad por los gatos gracias a sus estudios."
 lepsius.463.f: "Entre las diversas deidades con formas animales, el antiguo Egipto también conocía a la diosa gato Bastet. Los gatos alguna vez fueron muy venerados por los egipcios porque mantenían a los bichos como los ratones, pero también a las serpientes, fuera de los graneros. En el curso de su fascinación por Egipto, nuestro líder de expedición comenzó a interesarse mucho por esta diosa y comenzó a tomar bajo su protección a un gato propio. El compañero animal también ha hecho que su carácter duro se haya debilitado un poco."
 lepsius.463.g: "Hay gente de gatos y gente de perros."
 lepsius.464.t: "Cazando con un Saluki"
 lepsius.464.d: "Nuestro agregado militar [SCOPE.sCharacter('lepsius_military_attache').GetFullName] adquirió un perro de caza nativo mientras viajaba por Mesopotamia."
 lepsius.464.f: "Los perros no suelen tener buena reputación en Oriente Medio. Una excepción son los galgos como el Saluki. Los beduinos lo consideran un noble compañero que también hace un excelente trabajo cazando conejos o gacelas. Nuestro agregado militar recibió un perro tan excelente como regalo de un lugareño y desde hace algunas semanas se ha creado un vínculo profundo entre humanos y animales."
 lepsius.464.g: "Hay gente de perros y gente de gatos."
 lepsius.465.t: "Un comportamiento de superioridad problemático"
 lepsius.465.d: "El carácter arrogante de [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] ha provocado resentimiento en nuestro país de expedición."
 lepsius.465.g: "¿Por qué deberíamos molestarnos? Después de todo, ¡son bárbaros!"
 lepsius.465.h: "Deberíamos arreglar este paso en falso diplomático a toda costa."
 lepsius.466.t: "El cartógrafo"
 lepsius.466.d: "Durante la expedición arqueológica, el agregado militar desarrolló un gran interés por la cartografía y creó su propio material cartográfico. Parece que tiene talento para la agrimensura."
 lepsius.466.f: "Desde el inicio de la expedición, el agregado militar llevó un estricto registro de los movimientos y avances de las tropas, elaborando sus propios mapas. Durante una sesión informativa resultó que ya tiene una colección impresionante. Un asistente científico lo acompañó repetidamente en la última semana y lo ayudó un poco bajo los brazos a ampliar sus hallazgos cartográficos; ahora también puede pasar con los instrumentos de medición. El asistente científico sugiere capacitarlo para que se convierta en un topógrafo profesional."
 lepsius.466.g: "¡Tiene una gran carrera por delante!"
 lepsius.466.h: "Sus mapas son buenos, pero debería concentrarse en asuntos militares."
 lepsius.467.t: "Una reliquia olvidada"
 lepsius.467.d: "El líder de nuestra expedición arqueológica ha establecido contacto con una pequeña minoría cristiana en Oriente. Tiene cosas increíbles que decir al respecto."
 lepsius.467.h: "Debería estudiar la reliquia."
 lepsius.468.t: "Agregado atrapado robando artefactos"
 lepsius.468.d: "Esta mañana uno de nuestros excavadores encontró dos artefactos en la tienda de nuestro agregado militar que se pensaba que habían estado perdidos durante algunas semanas. Obviamente quería quedárselos para él."
 lepsius.468.f: "Todo el mundo conoce la historia de nuestro agregado, pero los demás miembros de la expedición esperaban que [SCOPE.sCharacter('lepsius_military_attache').GetFullName] no volviera a caer en viejos patrones. Pero obviamente estaban equivocados: una vez bandido, siempre bandido. Porque después de que un excavador encontró por casualidad dos objetos de la última excavación, de los que el agregado no informó, la única conclusión que se puede sacar es que quería quedárselos o venderlos. El jefe de la expedición aún no le ha confrontado directamente con las acusaciones, pero considera más sensato llegar a un acuerdo sobre cómo proceder antes de que se saquen consecuencias de este caso."
 lepsius.468.g: "Guarda silencio sobre el asunto."
 lepsius.468.h: "Maneje el asunto con cuidado, pero insista en que devuelva los artefactos."
 lepsius.468.i: "¡Exponlo públicamente y disciplínalo!"
 lepsius.471.t_karnak: "karnak"
 lepsius.471.t_memphis: "Menfis"
 lepsius.471.t_uruk: "uruk"
 lepsius.471.t_niniveh: "Nínive"
 lepsius.471.t_tiryns: "Tirinto"
 lepsius.471.t_phaistos: "Festos"
 lepsius.471.t_itza: "Chichén Itzá"
 lepsius.471.t_olla: "Ollantaytombo"
 lepsius.471.d: "[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] quiere hacer un viaje a un sitio famoso. Aunque el sitio tiene una gran importancia arqueológica, esto obstaculizaría enormemente nuestra expedición."
 lepsius.471.f_karnak: "El templo de Karnak, al norte de Luxor, se considera uno de los complejos de templos más grandes del mundo antiguo. Después de la elevación de Amón-Re de Tebas a la posición de dios local y más tarde dios imperial, los gobernantes del temprano Reino Medio comenzaron a construir un templo que se amplió a lo largo de miles de años hasta formar el actual complejo de templos, donde se celebra el sacerdocio. de Amón realizaba el servicio diario en el templo. Se dice que 30 faraones construyeron sobre él."
 lepsius.471.f_memphis: "Manetón informa que, según la leyenda, Menfis fue fundada por el rey Menes en el año 3000 a.C. Fue la capital de Egipto durante el Reino Antiguo y siguió siendo una ciudad importante en la historia de Egipto. Menfis estaba bajo la protección del dios Ptah, el santo patrón de los artesanos, cuyo templo Hut-Ka-Ptah estaba ubicado en el centro de la ciudad. El ascenso y la caída de Memphis están intrínsecamente ligados a la historia de todo el país."
 lepsius.471.f_uruk: "Uruk es el lugar de la primera escritura. Ya era a finales del IV milenio antes de Cristo. uno de los principales centros políticos del período sumerio temprano. En la antigüedad, la ciudad mesopotámica estaba justo al lado del río. En los mitos y la literatura, Uruk era famosa por ser la ciudad capital de Gilgamesh, héroe de la Epopeya de Gilgamesh. Los eruditos identifican a Uruk como la Erec bíblica (Génesis 10:10), la segunda ciudad fundada por Nimrod en Sinar."
 lepsius.471.f_niniveh: "Nínive está situada en la orilla oriental del río Tigris y fue la capital y ciudad más grande del Imperio neoasirio, así como la ciudad más grande del mundo durante varias décadas. Durante el Imperio neoasirio, particularmente desde la época de Ashurnasirpal II en adelante, hubo una expansión arquitectónica considerable. Algunas de las puertas principales estaban flanqueadas por colosales figuras de puertas de piedra de lamassu que pesaban hasta 30.000 kilogramos (30 t)."
 lepsius.471.f_tiryns: "Tirinto alcanzó su apogeo de importancia entre 1400 y 1200 a. C., cuando se convirtió en uno de los centros más importantes del mundo micénico, y en particular en Argólida. Sus características más notables fueron su palacio, sus túneles ciclópeos y especialmente sus murallas, que dieron a la ciudad su epíteto homérico de \"poderosa Tirinto amurallada\". Tirinto se asoció con los mitos que rodean a Heracles, ya que la ciudad fue la residencia del héroe durante sus labores, y algunas fuentes la citan como su lugar de nacimiento."
 lepsius.471.f_phaistos: "Según la leyenda, la ciudad de Festos fue fundada por el rey Minos y recibió el nombre de un hijo o nieto de Heracles (Heros Festos), que fue asesinado por Idomeneo, nieto de Minos y más tarde rey de Creta. Se dice que el primer gobernante de Festos fue Radamantis, el hermano de Minos. La ciudad tiene el segundo complejo palaciego más grande de Creta después de Knossos."
 lepsius.471.f_itza: "Chichén Itzá es una de las ruinas más importantes de la península de Yucatán en México. Se ubica a unos 120 kilómetros al este de Mérida en el estado de Yucatán. Sus ruinas datan del período maya tardío. Con una superficie de 1,547 hectáreas, Chichén Itzá es uno de los sitios más extensos de Yucatán. El centro está ocupado por numerosos edificios monumentales representativos de carácter religioso y político, de los que sobresale una gran pirámide escalonada, que se conserva en gran parte."
 lepsius.471.f_olla: "Durante el Imperio Inca, Ollantaytambo fue propiedad real del emperador Pachacuti, quien conquistó la región y construyó la ciudad y un centro ceremonial. En el momento de la conquista española del Perú, sirvió como bastión de Manco Inca Yupanqui, líder de la resistencia inca. Ollantaytambo es el único ejemplo que queda del urbanismo inca. Los edificios y terrazas incas así como las estrechas calles de la ciudad aún se encuentran en su estado original. Las calles rectas y estrechas forman 15 manzanas cuadradas (canchas), cada una con una entrada al patio central rodeado de casas."
 lepsius.471.j: "Por supuesto que no: ¡la expedición tiene prioridad!"
 lepsius.472.t: "¿Un mundo perdido?"
 lepsius.472.d: "Después de que nuestra expedición no hubiera informado durante mucho tiempo, informa de grandes pérdidas de hombres, animales de carga y herramientas. La excusa dada por el líder de la expedición para esto es de lo más sorprendente."
 lepsius.501.t: "Tumba de un faraón desconocido"
 lepsius.501.d: "Nuestro líder de expedición [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] se enteró de una tumba perdida en el Valle de los Reyes. Al parecer pertenece a un faraón hasta entonces desconocido. Los lugareños afirman haber encontrado la entrada."
 lepsius.501.f: "Hace más de 3.000 años, los faraones de Egipto fueron enterrados en el legendario Valle de los Reyes. Muchas de estas tumbas ya eran conocidas en la antigüedad y se consideraban atracciones turísticas; los grafitis romanos y griegos lo atestiguan. Los cristianos coptos incluso convirtieron algunas tumbas abiertas en capillas. Durante siglos, los ladrones de tumbas de lugares cercanos han robado obras de arte de tumbas y templos y las han vendido en el mercado. Por esta razón, de muchas tumbas no quedan más que cavidades. Y, sin embargo, una y otra vez gente de cerca y de lejos se topó con tumbas que desde entonces habían sido olvidadas y que contenían objetos encontrados, fotografías o cámaras sin abrir. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] recibió recientemente una notificación de una tumba que puede estar en buenas condiciones."
 lepsius.501.g: "No tenemos tiempo para esto."
 lepsius.502.t: "Arena, mucha arena"
 lepsius.502.d: "Cuando los arqueólogos llegan al lugar, descubren que efectivamente hay evidencia de la tumba de un rey, pero el sitio está completamente enterrado bajo arena."
 lepsius.502.f: "Nadie pensó que la excavación sería fácil. Pero cuando un local guía a los arqueólogos hacia donde se dice que está la tumba, lo primero que enfrentan los miembros de la expedición es una pared rocosa vertical a la que se aferra una duna de arena y barro. No hay rastro de tumba por ninguna parte. Cuando se le pregunta, el local explica que nunca había visto la entrada a la tumba; pero su abuelo todavía lo sabía y su padre al menos vio un indicio de ello cuando era niño. Debido a las precipitaciones, el Valle de los Reyes es propenso a cambios de lodo; y el viento y la arena egipcia son famosos por esconder sitios centenarios. Aunque algunos de los asistentes expresan dudas de que la tumba exista, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] sigue decidido a buscar la tumba perdida. Sin embargo, hará falta financiación adicional para retirar las masas de arena que se han ido acumulando a lo largo de los años."
 lepsius.502.g: "¡Necesitamos más herramientas!"
 lepsius.503.t: "La roca"
 lepsius.503.d: "Después de usar persistentemente todas las palas a la venta en un radio de 10 millas, el equipo excavó la entrada, solo para encontrarse frente a una enorme roca que bloqueaba la entrada."
 lepsius.503.f: "Los días de arduo trabajo de palear arena y barro deberían tener su recompensa, al menos eso es lo que esperaban los miembros de la expedición. Cuando se descubrió el dintel de la puerta del complejo de la tumba, el estado de ánimo deprimido de los hombres exhaustos se convirtió en euforia. En apenas unas horas el resto de la entrada quedó al descubierto. Pero tan pronto como avanzaste, descubriste la razón por la cual esta tumba se había salvado del saqueo: una enorme roca, probablemente desprendida de la pared rocosa hace décadas, si no siglos, bloqueaba la entrada. Ni siquiera un niño pequeño podía pasar a su lado, ya que los escombros y el barro solidificado llenaban el resto del corredor como mortero. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] se enfrentó a una decisión importante: ¿cómo se debía tratar de eliminar el obstáculo de la entrada de la tumba?"
 lepsius.503.g: "Utilizamos métodos sofisticados."
 lepsius.503.h: "Utilizamos mecánicas sofisticadas."
 lepsius.503.i: "Utilizamos nitroglicerina sofisticada."
 lepsius.503.j: "Utilizamos pura fuerza muscular."
 lepsius.504.t: "Tumba destruida por nitroglicerina"
 lepsius.504.d: "Desgraciadamente, el uso de explosivos trajo más problemas que beneficios: ¡la explosión no sólo destruyó la roca, sino todo el complejo de la tumba!"
 lepsius.504.f: "Organizar explosivos, aunque no fue una tarea fácil, se resolvió en unos días cuando el equipo pudo comprar reservas a un geólogo a buen precio. Ninguno de los miembros de la expedición se habría calificado de experto en demoliciones, pero [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] opinaba que el manejo de nitroglicerina, altamente peligrosa, no representaba un desafío particularmente grande. Tal vez hubiera sido mejor consultar previamente a un experto, porque nuestra gente debió haber calculado mal la cantidad necesaria: ¡en lugar de simplemente volar la roca, la expedición arqueológica voló toda la pared de la roca! Sólo por milagro los expedicionarios pudieron salvarse antes de que una cascada de rocas cayera de la montaña más cercana y redujera toda la zona a escombros. Lo que sea que estuviera detrás de la entrada: ahora debe haber sido destruido irremediablemente..."
 lepsius.504.g: "¿Quizás eso fue excesivo?"
 lepsius.505.t_archaeology: "Galería de pinturas"
 lepsius.505.t_engine: "Una galería destruida"
 lepsius.505.t_muscular: "Galería de pinturas"
 lepsius.505.d_archaeology: "Después de una investigación arqueológica detallada y la posterior remoción cuidadosa de la roca utilizando los últimos métodos, nuestros arqueólogos ingresan a la galería bien conservada de la tumba del faraón."
 lepsius.505.d_engine: "Utilizando una máquina, el equipo puede retirar la roca, con efectos secundarios negativos."
 lepsius.505.d_muscular: "Después de contratar a un poderoso italiano, pudimos retirar la roca y entrar en el yacimiento arqueológico bien conservado."
 lepsius.505.f_archaeology: "Como en una operación complicada, los arqueólogos se acercaron a la roca. Hicieron la autopsia de la roca, comprobaron el material, recogieron con palas y picos. Después de una investigación detallada, decidieron quitar el bulto en pequeñas capas mediante un proceso complicado y largo, de tal manera que los jeroglíficos de la entrada no sufrieran daños. Fue un proceso laborioso, pero definitivamente valió la pena. Armados con lámparas de aceite en mano, avanzaron a tientas por el primer pasillo y contemplaron la belleza del Antiguo Egipto: en las paredes parpadeaban pinturas en excelente estado de los campesinos en el campo, la corte del faraón y los dioses del juicio. Aunque los arqueólogos no pudieron encontrar ningún artefacto (seguramente se pudieron encontrar rastros de saqueo), el prometedor conjunto por sí solo invitaba a una exploración exhaustiva de la tumba."
 lepsius.505.f_engine: "La última tecnología debería ayudar en nuestra excavación en la Tumba del Faraón Desconocido: con una máquina que debería extraer la roca del pozo de entrada mediante una lechada. Al principio la roca no se movió ni se movió, por lo que nuestros científicos pusieron el motor a máxima potencia. Un error fatídico: porque aunque la piedra se soltó brevemente de su soporte y fue arrastrada cuesta arriba, pronto se soltó del cinturón y rodó con toda su fuerza hacia la tumba, ¡y causó allí una destrucción fatal! [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] y sus asistentes rápidamente se apresuraron hacia el pasaje descubierto, pero se sorprendieron al descubrir que la roca no solo había demolido por completo lo que una vez fue una galería bellamente pintada, sino que también había dañado gravemente una pared importante que se usaba para la estática de todo el sistema. ..."
 lepsius.505.f_muscular: "De vuelta en Luxor, los miembros de nuestra expedición encontraron una figura impresionante. Era un hombre de Padua que había venido originalmente a Egipto para mostrarle al Pasha un dispositivo hidráulico para ayudar con la inundación del Nilo. Sin embargo, el negocio fracasó. El gigante, de unos dos metros de altura y dotado de músculos de toro, afirmó haber trabajado anteriormente en el circo como 'Hércules de la Patagonia'. Según un testimonio confiable de su criado inglés, podía levantar a seis hombres a la vez. Fueron estas habilidades especiales las que nos convencieron de contratarlo para desbloquear el acceso. Apenas llegado al lugar, hizo rodar la piedra en una acción admirable. Armados con lámparas de aceite en la mano, nuestros arqueólogos corrieron al pasillo y contemplaron la belleza del Antiguo Egipto: en las paredes parpadeaban pinturas en excelente estado de los campesinos en el campo, la corte del faraón y los dioses del juicio. El prometedor conjunto invitaba por sí solo a una exploración exhaustiva de la tumba."
 lepsius.505.g: "¡El esplendor del Antiguo Egipto!"
 lepsius.505.h: "Ups."
 lepsius.506.t_archaeology: "Un buen sarcófago"
 lepsius.506.t_engine: "Un sarcófago en peligro de extinción"
 lepsius.506.t_muscular: "Un sarcófago roto"
 lepsius.506.d_archaeology: "Nuestros arqueólogos entran en la Cámara del Rey con asombro y asombro, y consiguen un maravilloso sarcófago y una momia de la dinastía XX."
 lepsius.506.d_engine: "Los daños causados ​​por la máquina son claramente visibles en la cámara funeraria: los arqueólogos apenas tienen tiempo para hacer balance y se apresuran a sacar el sarcófago lo más rápido posible."
 lepsius.506.d_muscular: "Nuestros arqueólogos logran entrar en la cámara funeraria intacta y bellamente decorada del faraón desconocido, pero entonces ocurre un percance imprevisto."
 lepsius.506.f_archaeology: "Fue una experiencia verdaderamente histórica cuando nuestros arqueólogos, liderados por [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName], entraron en la cámara funeraria real. Además de algunos frascos con ofrendas sacrificiales y un perro momificado, les esperaba una sorpresa especial: ¡de hecho, el sarcófago junto con la momia del Faraón Desconocido aún descansan en el lugar donde fue enterrado hace más de 3.000 años! Los científicos palparon atentamente el sorprendente hallazgo, sacudieron el polvo y reconocieron un ataúd de madera en buen estado de conservación después de quitarle la tapa, que había sido dañado por los ladrones de tumbas. ¡Nuestro museo se ha enriquecido con un testimonio único de la cultura egipcia!"
 lepsius.506.g: "La arqueología salvó el día."
 lepsius.506.h: "¡Muévelo rápido!"
 lepsius.506.i: "Ups."
 lepsius.511.t: "Una cuestión de honor"
 lepsius.511.d: "Según algunos agricultores, hace unos días una expedición extranjera izó la bandera de su país en la pirámide de Keops. Los Patriots de nuestro equipo se sienten desafiados y quieren hacer lo mismo."
 lepsius.511.f: "La expedición se encontraba cerca de El Cairo cuando la noticia sorprendió a todos los participantes: ¡al parecer la semana pasada alguien había plantado la bandera de su propio país en la cima de la pirámide de Giza! De hecho, tales alardes están prohibidos en el campo de la ciencia, y aún se desconoce si el Pachá estuvo de acuerdo con tal gesto triunfal. Sólo una cosa está clara: durante toda la expedición hubo un ferviente sentimiento de hacer lo mismo, aunque sólo fuera para no dejar que la propia patria pareciera deshonrosa."
 lepsius.511.g: "No tenemos tiempo para esto."
 lepsius.511.h: "Lo haremos - ¡por [ROOT.GetCountry.GetName]!"
 lepsius.512.t: "Amanecer"
 lepsius.512.d: "¡La expedición sale temprano en la mañana para escalar la Gran Pirámide de Giza!"
 lepsius.512.f_wine: "Los participantes en la ascensión a la pirámide ya se levantan a las 5 de la mañana; ayer prepararon una bandera de cinco metros de altura, hicieron rodar la enorme pancarta más allá de la gran Esfinge hasta la Pirámide de Keops. Un pavo frío está listo para el desayuno, algunos todavía están agotados por el trabajo de ayer en la bandera. Una parte de la expedición se aloja en una tienda de campaña montada a los pies de la Esfinge, el resto se dirige a la pirámide. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] promete que habrá una botella de vino especialmente guardada para celebrar en la cima de la pirámide."
 lepsius.512.f_no_wine: "Los participantes en la ascensión a la pirámide ya se levantan a las 5 de la mañana; ayer prepararon una bandera de cinco metros de altura, hicieron rodar la enorme pancarta más allá de la gran Esfinge hasta la Pirámide de Keops. Un pavo frío está listo para el desayuno, algunos todavía están agotados por el trabajo de ayer en la bandera. Una parte de la expedición se aloja en una tienda de campaña montada a los pies de la Esfinge, el resto se dirige a la pirámide. Sólo cuando el grupo se acerca a la Gran Pirámide el agregado militar se da cuenta de que [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] se ha olvidado de lo más importante de esta mañana: ¡el vino para brindar!"
 lepsius.512.g: "Ojalá traiga el mejor vino..."
 lepsius.512.h: "¿Se olvidó del vino?"
 lepsius.513.t: "El ascenso"
 lepsius.513.d: "El líder arqueológico y el agregado militar se encuentran en la base de la gran pirámide. Hay desacuerdo sobre quién debería liderar esta atrevida empresa."
 lepsius.513.f: "Nuestro equipo llega a la base de la Gran Pirámide del Faraón Keops. Surge la pregunta de cuántos pasos se necesitan para llegar al cielo, y [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] puede responder con precisión que son 203. Hay tantas capas de piedra que conquistar. Mientras tanto, surge la pregunta de quién debería liderar el ascenso. [SCOPE.sCharacter('lepsius_military_attache').GetFullName] ya ha afirmado que es tan apto como alpinista..."
 lepsius.513.g: "[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] debería llevarnos más lejos."
 lepsius.513.h: "[SCOPE.sCharacter('lepsius_military_attache').GetFullName] debería llevarnos más lejos."
 lepsius.514.t: "La entrada original"
 lepsius.514.d: "Nuestro equipo ha subido un nivel inferior de la pirámide. Ahora se encuentran en el escalón decimoséptimo, muy cerca de la entrada original a la cámara funeraria."
 lepsius.514.f: "Se ha dado la primera etapa. Nuestra expedición todavía está muy cerca del fondo pero se ha tomado un descanso. A nuestro líder de expedición le gustaría explorar más de cerca la entrada histórica a la pirámide de Keops y descender al interior con algunos ayudantes de excavación. Algunos expedicionarios toman un descanso para almorzar. Todo el mundo sabe que la subida será más peligrosa a partir de ahora."
 lepsius.514.i: "Este lugar es lo suficientemente bueno para nuestra bandera."
 lepsius.515.t: "100 pasos"
 lepsius.515.d: "Nuestro equipo ha subido el centésimo escalón de la pirámide. La compañía se encuentra ahora casi en la mitad del ascenso."
 lepsius.515.f: "Cien pasos no parece mucho, pero con un grupo grande, equipaje y espacio limitado el desafío es bien diferente. Nuestra pancarta todavía está enrollada y portada por cinco hombres. Algunos miembros de la Expeiditon ya anuncian que la perspectiva en este momento es bastante alta. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName], por su parte, mira con preocupación hacia la cima, porque la fase más arriesgada del ascenso es inminente."
 lepsius.516.t: "La caída"
 lepsius.516.d: "Durante la última etapa de la pirámide, nuestro líder y su gente aparentemente se excedieron: ¡ocurrió un incidente devastador!"
 lepsius.516.f: "Tal vez fue un error humano, tal vez un plan no funcionó, pero tal vez el destino nos castigó por nuestra arrogancia. Sin embargo, al subir a las pirámides, un ayudante resbaló en un escalón de la pirámide y arrastró consigo a los demás miembros de la expedición y sus cargas al abismo. Nuestro jefe de expedición y nuestro agregado militar pudieron evitar lo peor, pero resultaron gravemente heridos. Algunos porteadores se salieron con la suya con el reabastecimiento, otros se quejan de huesos rotos. Tuvimos que cancelar la ambiciosa empresa de izar nuestra bandera en la Gran Pirámide."
 lepsius.516.g: "Una pena para todos nosotros."
 lepsius.517.t: "En la cima de la gran pirámide"
 lepsius.517.d: "Un día verdaderamente extraordinario para el equipo de expedición y para nuestro país: ¡la bandera [ROOT.GetCountry.GetAdjectiveNoFlag] ondea sobre la Gran Pirámide de Giza!"
 lepsius.517.f: "Un gran momento para la arqueología, un gran momento para [ROOT.GetCountry.GetName]. Nuestra expedición subió a la cima de la pirámide de Keops y celebró el logro con una pequeña celebración. Los nombres de Champollion, Lepsius y Rosellini resonaron al unísono con un cordial '¡hip-hip-hurra!' y finalmente los patriotas izaron la bandera. ¡A la luz del sol poniente, nuestra bandera brilla ahora en todo el valle del Nilo!"
 lepsius.517.g: "¡Levanten la bandera de [ROOT.GetCountry.GetName] y saludos!"
 lepsius.517.h: "¡Levanten la bandera de [ROOT.GetCountry.GetName]!"
 lepsius.521.t: "La puerta de Ishtar"
 lepsius.521.d: "Durante sus excavaciones en Babilonia, los arqueólogos descubrieron los restos colosales de la legendaria Puerta de Ishtar. La histórica puerta de la ciudad se encuentra en muy buenas condiciones."
 lepsius.521.f: "Durante las excavaciones en el lugar de la antigua capital babilónica, los excavadores encontraron por primera vez ladrillos vidriados, que sugerían un edificio prestigioso y representativo. Cuanto más excavaban los arqueólogos en el lugar, más hallazgos hacían. Finalmente, incluso pudieron distinguir las murallas y las torres de la puerta de la ciudad, excelentemente conservada, sobre la que se pavoneaban leones, toros y criaturas míticas. El líder de la expedición [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] presentó a nuestro gobierno un plan audaz: desmantelar toda la puerta y reconstruirla fiel al original en la capital. Una empresa costosa, con muchos imponderables y, al mismo tiempo, tan atractiva que destacados intelectuales y la dirección del museo se han sumado a la idea."
 lepsius.521.g: "Solo toma algunas partes. Debería quedarse donde está."
 lepsius.521.h: "Debe transportarse a [SCOPE.sState('capital_scope').GetCityHubName] y reconstruirse."
 lepsius.522.t: "Transporte de ladrillos desde Mesopotamia"
 lepsius.522.d: "Un lote de ladrillos de tamaño completo para la reconstrucción de ladrillos ha llegado hoy al museo a las [SCOPE.sState('capital_scope').GetCityHubName]."
 lepsius.522.f: ""
 lepsius.522.g: "Me encanta el olor a ladrillos mesopotámicos por la mañana."
 lepsius.523.t: "Ladrillos de Ishtar en manos extranjeras"
 lepsius.523.d: "No somos los únicos que hemos estado excavando en Babilonia durante las últimas décadas. Resulta que una nación extranjera también posee algunos envíos de ladrillos necesarios para reconstruir la Puerta de Ishta. Nos vemos obligados a preguntar con humildad."
 lepsius.523.f: ""
 lepsius.523.g: "Probablemente nos humillaremos."
 lepsius.523.h: "¿Por unos ladrillos sin valor? ¡Nunca!"
 lepsius.524.t: "¡El enemigo bloquea nuestro transporte de ladrillos!"
 lepsius.524.d: "El tan esperado envío de ladrillos mesopotámicos para reconstruir la Puerta de Ishtar en nuestro museo no ha llegado después de meses. Recibimos noticias de que el transporte fue bloqueado durante la guerra."
 lepsius.524.f: ""
 lepsius.524.g: "¡Eso es sabotaje!"
 lepsius.525.t: "una tarifa especial"
 lepsius.525.d: "Al parecer, el país de excavación de donde provienen los ladrillos para la Puerta de Ishtar está tratando de sacar provecho de nuestra empresa. Cuando se exportaban los ladrillos, ¡se cobraba una \"tarifa especial\" por los ladrillos!"
 lepsius.525.f: ""
 lepsius.525.g: "Pagaremos cada pedazo de piedra..."
 lepsius.526.t: "Pequeño Transporte de ladrillos desde Mesopotamia"
 lepsius.526.d: "Circunstancias desconocidas han provocado que esta vez nuestro barco esté lleno solo hasta la mitad con los ladrillos de la Puerta de Ishtar."
 lepsius.526.f: ""
 lepsius.526.g: "¿Qué tiene de difícil enviar unos cuantos ladrillos?"
 lepsius.527.t: "Un cargamento de ladrillos llega al puerto"
 lepsius.527.d: "Hoy ha llegado al museo una cantidad inusualmente grande de ladrillos necesarios para reconstruir la Puerta de Ishtar. Al parecer, la carga en Mesopotamia avanza mejor de lo esperado."
 lepsius.527.f: ""
 lepsius.527.g: "¡Ah, más ladrillos!"
 lepsius.528.t: "Ladrillos malos"
 lepsius.528.d: "Desafortunadamente, cuando miramos los ladrillos que habían llegado a [SCOPE.sState('capital_scope').GetCityHubName], nuestros curadores descubrieron que algunas de las cajas estaban completamente inutilizables. Para bien o para mal, tenemos que prescindir de ellos."
 lepsius.528.f: ""
 lepsius.528.g: "Mis valiosos ladrillos, ¡no!"
 lepsius.529.t: "Postración diplomática"
 lepsius.529.d: "Una nación extranjera se humilló ante el público mundial sólo para suplicarnos por algunos artefactos arqueológicos sin valor que un anticuario nos vendió hace unos años. Por supuesto, aceptamos con gusto el gesto y nos liberamos de esta basura."
 lepsius.529.f: ""
 lepsius.529.g: "¡Formidable!"
 lepsius.530.t: "¡Puerta de Ishtar reconstruida!"
 lepsius.530.d: "Después de años de trabajo y de un minucioso montaje de decenas de miles de fragmentos babilónicos, la legendaria Puerta de Ischtar brilla con un nuevo esplendor, concretamente en su tamaño original en nuestro museo."
 lepsius.530.f: "La Puerta de Ishtar era la octava puerta al interior de la ciudad de Babilonia. Fue construido alrededor del año 575 a. C. por orden del rey Nabucodonosor II en el lado norte de la ciudad. Formaba parte de un gran camino procesional amurallado que conducía a la ciudad. Las paredes estaban terminadas con ladrillos vidriados en su mayoría en azul, con animales y deidades en bajo relieve a intervalos, estos también hechos de ladrillos moldeados y coloreados de diferentes maneras. El frente de la puerta tiene un diseño en bajo relieve con un patrón repetido de imágenes de dos de los dioses principales del panteón babilónico. Marduk, la deidad nacional y dios principal, con su sirviente dragón Mušḫuššu. Se representa como un dragón con cabeza y cola en forma de serpiente, un cuerpo escamoso de león y poderosas garras en las patas traseras. Marduk era visto como el campeón divino del bien contra el mal, y los encantamientos de los babilonios a menudo buscaban su protección. El segundo dios que se muestra en los relieves de la Puerta de Ishtar es Adad (también conocido como Ishkur), cuyo animal sagrado eran los uros, un ancestro del ganado ahora extinto. Adad tenía poder sobre las tormentas destructivas y la lluvia beneficiosa. El diseño de la Puerta de Ishtar también incluye bordes lineales y patrones de rosetas, a menudo vistos como símbolos de fertilidad. Los ladrillos de la puerta de Ishtar estaban hechos de arcilla de textura fina prensada en formas de madera. Cada uno de los relieves de animales también se hizo a partir de ladrillos formados presionando arcilla en moldes reutilizables."
 lepsius.530.g: "Magnificent!"
 lepsius.531.t: "La leyenda del Lamassu"
 lepsius.531.d: "Nuestros arqueólogos han oído la historia de un lamassu extraordinariamente magnífico que se dice que se perdió hace mucho tiempo y se encuentra en algún lugar de la región kurda."
 lepsius.531.f: "Fue una tarde cuando nuestro equipo instaló las tiendas de campaña, encendió la fogata y preparó el cordero para terminar el día. En los ardientes tonos negros, azules y rojos del amanecer, un viejo pastor llegó al campamento pidiendo provisiones. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] cumplió y le contaron una historia asombrosa. Se dice que hace unos 30 años otra expedición arqueológica buscó tesoros y obras de arte extraordinarias en esta zona para impresionar a la dirección del museo local y regresar a casa con fama y gloria. Lo más destacado de la excavación fue un enorme lamassu, que los lugareños aún hoy conocen por su tamaño monumental y su buen estado de conservación. Pero ocurrió un accidente durante el transporte. Mientras decenas de hombres movían la estatua gigante del híbrido mesopotámico, los líderes de la expedición se pelearon con la tribu kurda local. Aparentemente querían estafar a los ayudantes kurdos reclutados con sus salarios. Entonces la tribu tendió una emboscada a los miembros de la expedición y tomó lo que creía que era suyo. El lamassu, sin embargo, permaneció donde estaba y todavía espera ser recuperado en la región kurda. El pastor se ha ofrecido a decirnos la ubicación del legendario Lamassu a cambio de nuestra ayuda."
 lepsius.531.g: "Es demasiado peligroso ponerse en peligro innecesario a causa de esos cuentos de hadas."
 lepsius.531.h: "¡Debemos recuperar este lamassu a toda costa!"
 lepsius.532.t: "Buscando al Lamassu"
 lepsius.532.d: "Nuestra expedición ha emprendido el peligroso viaje hacia la región kurda. Algunos abogan por la separación debido a las mayores posibilidades de éxito."
 lepsius.532.g: "No deberíamos dividirnos."
 lepsius.532.h: "Deberíamos dividir la expedición."
 lepsius.533.t: "Regalos"
 lepsius.533.d: "Nuestra expedición se ha reunido con los líderes del clan para obtener permiso para cruzar la zona pacíficamente y recuperar el lamassu."
 lepsius.533.f: "No dividir la expedición resultó ser una ventaja inesperada: la lentitud del tren de equipaje hizo que los líderes del clan kurdo local nos encontraran más rápido de lo que esperábamos. Pronto el líder de la expedición y el agregado militar fueron llevados ante los patriarcas, quienes son considerados los verdaderos gobernantes de esta zona. Se encontraron con una desconfianza incómoda. Al parecer, todavía les acompañan los desagradables recuerdos de la última expedición arqueológica. También existe la expectativa de que nosotros, como invitados, traigamos regalos. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] había tomado medidas para esta eventualidad, pero aparentemente los materiales adquiridos simplemente no son suficientes para que muchos de los líderes los convenzan de nuestras intenciones."
 lepsius.533.g: "Ofrecemos telas finas."
 lepsius.533.h: "Recuérdeles su honor y hospitalidad."
 lepsius.533.i: "Muéstrales un gesto de sumisión."
 lepsius.534.t: "Insultado"
 lepsius.534.d: "El intento de ganarse a los patriarcas kurdos fue un completo fracaso; en cambio, los pusimos en nuestra contra. ¡Una escalada de la situación amenaza a toda nuestra expedición!"
 lepsius.534.g: "¡Guardias!"
 lepsius.534.h: "¡Defender!"
 lepsius.534.i: "¡Huir!"
 lepsius.535.t: "Miembros de la expedición secuestrados por los kurdos"
 lepsius.535.d: "Después de una búsqueda infructuosa por parte de la expedición reducida, se horrorizan al descubrir a su regreso que algunos miembros del equipo que se quedaron fueron víctimas de un ataque kurdo."
 lepsius.535.f: "La estrategia de dividir la expedición resultó más tarde ser un error devastador. Al parecer, una tribu kurda estaba esperando a su presa y aprovechó la oportunidad cuando la parte armada bajo el mando del agregado militar se separó del resto del convoy. Como la mayoría de los materiales que se llevaron eran de poco valor para los saqueadores, secuestraron abruptamente a una buena docena de ayudantes como rehenes, aparentemente convencidos de que podían obtener un rescate por ellos. Sin embargo, el equipo de expedición decidió no aceptar tal oferta: podría sentar precedentes para el futuro. Mientras [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] insiste en negociar con los líderes kurdos, [SCOPE.sCharacter('lepsius_military_attache').GetFullName] insiste en atacar el campo kurdo y dar una lección a los saqueadores."
 lepsius.535.g: "Intenta negociar."
 lepsius.535.h: "¡Atácalos!"
 lepsius.536.t: "¡La negociación fracasó!"
 lepsius.538.t: "La noche de los dolores"
 lepsius.538.d: "La búsqueda del lamassu fracasó."
 lepsius.538.f: "El equipo de expedición abandona la región kurda con las manos vacías. Como perros pateados, se abren paso por las colinas de noche para retomar la antigua ruta. La pérdida de personas y material deprime a todos los expedicionarios. La cuestión del significado de todo el viaje deja tras de sí melancolía y abatimiento."
 lepsius.538.g: "Volveremos..."
 lepsius.539.t: "Una muerte noble"
 lepsius.539.d: "¡[SCOPE.sCharacter('lepsius_military_attache').GetFullName], nuestro agregado militar, cayó en batalla con los kurdos!"
 lepsius.539.f: "Fue una batalla encarnizada, pero nuestras tropas poco entrenadas apenas pudieron hacer nada contra los valientes y probados combatientes kurdos. El agregado ordenó la retirada y se quedó atrás con sus propios hombres para cubrir nuestra retaguardia. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] solo pudo echar un último vistazo hacia atrás y ver como caía al suelo derrotado. Le dio al equipo un tiempo valioso para ponerse a salvo, mientras que para él la ayuda llegó demasiado tarde."
 lepsius.539.g: "Dio su vida por la nuestra."
 lepsius.540.t: "El Lamassu"
 lepsius.540.d: "[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] pudo convencer a los kurdos de nuestras preocupaciones. El camino para recuperar el Lamassu está claro."
 lepsius.540.d_victory: "¡Obtuvimos una victoria militar sobre la tribu nativa kurda y despejamos el camino hacia el legendario Lamassu!"
 lepsius.540.f: "No fue fácil convencer a los kurdos de nuestras buenas intenciones, pero las útiles cualidades de nuestro líder de expedición hicieron que esta empresa aparentemente imposible fuera un éxito. Después de sólo unos días de búsqueda, encontramos el lamassu descrito cerca de un acantilado. ¡Una aparición majestuosa que se irradia por todo el valle! Nuestros arqueólogos se alegraron al comprobar que el coloso prácticamente no ha sufrido daños. Ya está claro que será la exposición principal de nuestra colección mesopotámica."
 lepsius.540.f_victory: "Después de una dura y encarnizada batalla, nuestro heroico agregado [SCOPE.sCharacter('lepsius_military_attache').GetFullName], gracias a sus superiores habilidades (y un poco de ayuda de sus soldados), logró poner en fuga al enemigo. Impresionados por esta lección, los kurdos ya no se atrevieron a obstaculizar la recuperación del lamassu. Después de sólo unos días de búsqueda, encontramos el lamassu descrito cerca de un acantilado. ¡Una aparición majestuosa que se irradia por todo el valle! Nuestros arqueólogos se alegraron al comprobar que el coloso prácticamente no ha sufrido daños. Ya está claro que será la exposición principal de nuestra colección mesopotámica."
 lepsius.540.g: "¡Es maravilloso!"
 lepsius.551.t: "El accidente arqueológico"
 lepsius.551.d: "Hubo un terrible accidente en una excavación: ¡nuestro líder de expedición ha desaparecido!"
 lepsius.551.g: "¿Lo que le sucedió?"
 lepsius.552.t: "El laberinto"
 lepsius.552.g: "Espero que no nos encontremos con ninguna criatura mítica parecida a un toro..."
 lepsius.553.t: "El Laberinto - una vez más"
 lepsius.553.g: "¡Es un tremendo deja vu!"
 lepsius.554.t: "Salón de los Delfines"
 lepsius.554.g: "Ve a la izquierda."
 lepsius.554.h: "Ve a la derecha."
 lepsius.554.i: "Sube las escaleras."
 lepsius.554.j: "Bajar la escalera."
 lepsius.555.t: "salón del sol"
 lepsius.555.d: "El final de un pasillo se bifurca en tres carriles. En la pared se pueden encontrar restos de un fresco."
 lepsius.555.f: "En el fresco, el color azul brilla hacia el arqueólogo. El cielo ocupa toda la pared. Eos, la diosa del amanecer, se encuentra en el este y domina la escena. Frente a ella, al oeste, se encuentra su marido Astraios, a quien sólo se reconoce como silueta por la noche. En el medio brilla el sol al mediodía."
 lepsius.555.g: "Tome el pasillo de la izquierda."
 lepsius.555.h: "Tome el pasillo derecho."
 lepsius.555.i: "Tome el pasillo del medio."
 lepsius.556.t: "Salón de las Mujeres"
 lepsius.556.d: "El Perdido llega a una habitación al final de la cual hay cuatro puertas abiertas. Frente a él se encuentran pequeñas esculturas de cuatro mujeres."
 lepsius.556.f: "Las cuatro esculturas muestran mujeres de diferentes edades y sexos. El investigador no puede determinar si son diosas o mortales. Sus formas son primitivas y limitadas a lo esencial. Su color se ha desvanecido hace mucho tiempo; lo que los diferencia son los objetos que tienen en las manos. La primera sostiene un ovillo de lana en la mano, del que arranca un hilo. La segunda sostiene un espejo y se mira a sí misma. El tercero sostiene una serpiente. El último lleva un arco."
 lepsius.556.g: "Puerta I."
 lepsius.556.h: "Puerta II."
 lepsius.556.i: "Puerta III."
 lepsius.556.j: "Puerta IV."
 lepsius.557.t: "Salón de las Islas"
 lepsius.557.g: "Rodas."
 lepsius.557.h: "Délos."
 lepsius.557.i: "Eubea."
 lepsius.557.j: "Naxos."
 lepsius.558.t: "La ira del minotauro"
 lepsius.558.g: "¿Qué acaba de pasar ahí abajo?"
 lepsius.559.t: "La muerte de [SCOPE.sCharacter('lepsius_minotaur_victim').GetFullName]"
 lepsius.559.d: "El ex líder de la expedición [SCOPE.sCharacter('lepsius_minotaur_victim').GetFullName] fue encontrado muerto en su apartamento en circunstancias misteriosas."
 lepsius.559.g: "¿Pero fue realmente un suicidio?"
 lepsius.560.t: "¡Escapado del laberinto!"
 lepsius.560.d: "Después de escapar finalmente del laberinto, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] puede contarles a sus colegas sobre el increíble descubrimiento."
 lepsius.560.g: "¿Podría haber sido éste… el legendario laberinto de Daidalos?"
 lepsius.561.t: "La pirámide misteriosa"
 lepsius.561.d: "Our archaeological expedition has identified a hitherto unrecorded pyramid, half-swallowed by the Yucatec selva. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] has encountered lore of this place before and resolves to attempt an entry ..."
 lepsius.561.g: "Tengo un mal presentimiento sobre esto."
 lepsius.561.h: "Interesante. Vas primero."
 lepsius.562.t: "The Glyph-Riddle"
 lepsius.562.d: "At the end of a long corbelled passage stands a dressed-stone panel bearing a riddle. Four recessed cartouches, each carved with the visage of a great Maya god, can be depressed; the masonry fairly reeks of a mechanical contrivance. Beneath runs a distich: “I rise in the east in fiery glory; at zenith I blaze like jade; at dusk I descend the road beneath the earth. I keep the count of days and seat the lords.” One cartouche must be pressed."
 lepsius.562.g: "K'inich Ajaw (Sun Lord)."
 lepsius.562.h: "Chaac (Rain/Thunder)."
 lepsius.562.i: "Itzamnaaj (Creator/Sky)."
 lepsius.562.j: "Kukulkan (Feathered Serpent)."
 lepsius.563.t: "El ídolo"
 lepsius.563.d_right: "Our archaeologist attains the goal of the venture; the mechanism yields and a sanctum opens."
 lepsius.563.d_wrong: "Our archaeologist gains the inner chamber; yet the facility of access offends reason—surely the device has not had its last word."
 lepsius.563.g: "Suavemente... con cuidado... hazlo..."
 lepsius.563.h: "I know this scene—it never works out. Grab the damn artifact and RUN!"
 lepsius.564.t: "¡Es una trampa!"
 lepsius.564.g: "¡CORRER!"
 lepsius.564.h: "I knew it—blast!"
 lepsius.565.t_right: "Saliendo de la pirámide"
 lepsius.565.t_wrong: "Un rival arqueológico"
 lepsius.565.d_right: "Against expectation, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] survives the contrivances within the pyramid and succeeds in securing the idol!"
 lepsius.565.g: "¡Charlie, enciende el motor!"
 lepsius.565.h: "No soporto a ese tipo."
 lepsius.566.t: "Una oferta arqueológica"
 lepsius.566.d: "Un arqueólogo privado nos ofrece un excelente bien que previamente arrebató a un rival extranjero."
 lepsius.566.f: "A private expedition has reported a Mayan pyramid deep in the selva of Yucatán. Its leader—alas, a compatriot—claims to have procured a sacred idol which, by a curious turn, had just been wrested from the grasp of a fedora‑wearing [PREV.GetCountry.GetAdjectiveNoFlag] archaeologist. The latter, so the tale goes, perished shortly thereafter in a violent skirmish with Hovitos tibesmen. However shaded the circumstances, the piece would be a singular attraction for our museum’s Pre‑Columbian collection—provided we meet the asking price."
 lepsius.566.g: "This artifact will look splendid in our collection!"
 lepsius.566.h: "We do not buy artifacts from ruthless grave robbers."
 lepsius.581.t: "Regreso al mundo perdido"
 lepsius.581.g: "Debería restaurar su honor."
 lepsius.581.i: "Nuestros intereses nacionales prevalecen sobre los egos magullados de individuos pésimos."
 lepsius.582.t: "El explorador ignorado regresa triunfante"
 lepsius.582.d: "Para sorpresa de todo el mundo científico, [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] ha regresado de Yucatán y tiene pruebas de sus extrañas afirmaciones."
 lepsius.582.g: "¿Él estaba en lo correcto?"
 lepsius.583.t: "Desaparece explorador ignorado en Yucatán"
 lepsius.584.t: "Entrando al mundo perdido"
 lepsius.584.d: "Después de semanas, la expedición ha llegado a un valle completamente desconocido. ¡Parece que [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] tiene razón con sus fantásticas afirmaciones!"
 lepsius.584.g: "¡Increíble!"
 lepsius.585.t: "Fotografiar dinosaurios"
 lepsius.585.d: "Las nuevas posibilidades técnicas permiten capturar con cámara la flora y fauna únicas del Mundo Perdido."
 lepsius.585.f: "Es como mirar a través de una ventana un mundo de hace millones de años: los pterosaurios gobiernan los cielos, los brontosaurios gigantes sacuden la tierra y las peligrosas aves rapaces cazan presas desprevenidas. Las plantas aquí también son completamente diferentes a las de otras partes de Yucatán. Un compañero científico aprovechó el momento y tomó toda una serie de fotografías con su cámara, que sirven como evidencia para el hogar. Los científicos allí podrían reconstruir aún mejor la historia temprana de la Tierra."
 lepsius.585.g: "¡Por favor, haz 'ROAR'!"
 lepsius.586.t: "presencia maya"
 lepsius.586.d: "Después de una exploración exhaustiva del valle, al líder de la expedición se le ocurrió un plan arriesgado."
 lepsius.586.g: "¡Una oportunidad única!"
 lepsius.586.h: "Llevemos solo las pruebas más necesarias."
 lepsius.587.t: "La expedición termina en un terrible desastre"
 lepsius.587.d: "La expedición ha tomado el peor rumbo posible tras el ataque de una rapaz."
 lepsius.588.t: "La joya de Kukulkán"
 lepsius.588.d: "¡Contra todo pronóstico, nuestro líder de expedición logró hacerse con la legendaria Gema de Kukulkán!"
 lepsius.589.t: "Los héroes regresan del mundo perdido"
 lepsius.589.f: "¡Que dia! Después de un viaje peligroso y aventurero al fin del mundo, nuestra expedición pudo compartir sus extraordinarios hallazgos para demostrar al público que [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] no es un loco, sino un científico de renombre, ¡y un verdadero héroe! La prensa y la población revisaron detalladamente su actitud y también reconocieron el apoyo del gobierno como una decisión acertada. Sin embargo, el líder de la expedición se ha comprometido a mantener en secreto la verdadera ubicación del valle para conservar la flora y la fauna del lugar y reducir el riesgo de cazadores furtivos."
 lepsius.701.t: "Los extranjeros quieren robar nuestra herencia."
 lepsius.701.d: "[SCOPE.sCountry('lepsius_smuggler_country').GetAdjectiveNoFlag] Los arqueólogos fueron sorprendidos hoy tratando de sacar ilegalmente un artefacto importante fuera del país. ¿Cómo deberíamos reaccionar?"
 lepsius.701.f: "Los extranjeros de [SCOPE.sCountry('lepsius_smuggler_country').GetName] a quienes hemos concedido licencias de excavación fueron sorprendidos hoy intentando sacar del país un objeto extremadamente valioso. Según la legislación vigente, los arqueólogos extranjeros están obligados a entregar la mitad de los objetos encontrados al país de excavación. Al parecer intentaron pasar el hallazgo a casa de contrabando sin que pudiéramos inspeccionarlo."
 lepsius.701.g: "¡Protesta!"
 lepsius.701.h: "¿Qué haremos con este viejo galimatías?"
 lepsius.702.t: "Incidente diplomático"
 lepsius.702.d: "Desafortunadamente, las autoridades de [SCOPE.sCountry('lepsius_protest_country').GetName] se han dado cuenta de nuestro intento de traer el valioso artefacto a nuestro país. ¿Cómo deberíamos reaccionar?"
 lepsius.702.f: "Desde finales del siglo XIX, la forma más común de licencia de excavación arqueológica se basaba en el intercambio de hallazgos: el excavador entregaba la mitad de los artefactos encontrados al país en el que realizaba la excavación. Las autoridades inspeccionaron los objetos encontrados y tuvieron especial cuidado en que las piezas más valiosas no fueran sacadas del país. Sin embargo, una y otra vez sucedió que algunos países insistieron en no entregar una pieza que había sido excavada; en otros casos, las partes acordaron en un acuerdo cómo proceder."
 lepsius.702.g: "Quien lo encuentre se lo quedará."
 lepsius.702.h: "Seguramente encontraremos un acuerdo amistoso."
 lepsius.702.i: "Done el artefacto como muestra de nuestra filantropía."
 lepsius.703.t: "¡Los extranjeros se ríen de nosotros!"
 lepsius.703.d: "Los bárbaros de [SCOPE.sCountry('lepsius_smuggler_country').GetName] se burlaron de nuestras afirmaciones. Ni se les hubiera ocurrido dejarnos participar en el hallazgo y han llevado el artefacto de contrabando a su tierra natal."
 lepsius.703.f: "La época victoriana tiene innumerables historias de artefactos sacados ilegalmente del país, particularmente por potencias europeas. En algunos casos, los museos todavía tienen reclamaciones de reembolso hasta el día de hoy."
 lepsius.703.g: "¡Esta arrogancia es increíble!"
 lepsius.704.t: "Concesiones otorgadas"
 lepsius.704.d: "[SCOPE.sCountry('lepsius_smuggler_country').GetName] nos acomodó y aceptó nuestras reclamaciones como justificadas. Diplomática y financieramente quieren hacernos concesiones. También nos ofrecen otros hallazgos para animarnos a entregar el precioso tesoro."
 lepsius.704.f: "En muchos casos de sospecha de robo o robo de tumbas, las potencias europeas se adaptaron a los países excavadores. Después de las excavaciones en Troya, por ejemplo, Schliemann tuvo que presentarse en la Sublime Puerta porque había contrabandeado artefactos al extranjero. Schliemann no sólo entregó algunos hallazgos, sino que también pagó cinco veces más de lo exigido. Ciertamente, tal procedimiento no era la forma más encantadora de negociar a nivel internacional, pero siempre era mejor que engañar por completo al país de excavación y, a menudo, los países demandantes lo aceptaban como un acuerdo amistoso."
 lepsius.704.g: "Me alegra que se hayan dado cuenta de que estaban equivocados."
 lepsius.706.t: "¡Llegó el artefacto mayor!"
 lepsius.706.d: "Con un ligero retraso, el valioso artefacto finalmente llegó hoy al museo. ¡El director ya ha elegido un lugar muy especial para ello!"
 lepsius.706.f: "Los artefactos importantes son el orgullo de cada exposición y museo. ¡Feliz un país que puede considerar tales joyas como propias!"
 lepsius.711.t: "Máscara de Tutankamón"
 lepsius.711.d: "Tras descubrir la tumba perdida de Tutankamón, nuestros arqueólogos pudieron recuperar un artefacto muy especial: ¡la máscara del faraón!"
 lepsius.711.f: "La máscara de Tutankamón es una máscara de oro del antiguo faraón egipcio Tutankamón de la dinastía XVIII. La máscara mortuoria es una de las obras de arte más conocidas del mundo y un símbolo destacado del antiguo Egipto. Con la imagen de Osiris, dios egipcio del más allá, mide 54 centímetros de alto, pesa más de 10 kilogramos o 321,5 onzas troy y está decorado con piedras semipreciosas. Un antiguo hechizo del Libro de los Muertos está inscrito en jeroglíficos en los hombros de la máscara. El rostro representa la imagen estándar del faraón, y los excavadores encontraron la misma imagen en otras partes de la tumba, en particular en las estatuas de los guardianes. Según el egiptólogo Nicholas Reeves, la máscara \"no es sólo la imagen por excelencia de la tumba de Tutankamón, sino quizás el objeto más conocido del propio antiguo Egipto\"."
 lepsius.711.g: "Será la mejor exposición de nuestra colección."
 lepsius.711.h: "Deberíamos intentar sacar el artefacto del país de forma segura..."
 lepsius.712.t: "Busto de Nefertiti"
 lepsius.712.d: "Durante nuestras excavaciones en Egipto, nuestros arqueólogos encontraron un artefacto verdaderamente excepcional: ¡el busto de Nefertiti!"
 lepsius.712.f: "El busto de Nefertiti es un busto de piedra caliza recubierto de estuco pintado de Nefertiti, la gran esposa real del faraón egipcio Akenatón. Es una de las obras más copiadas del antiguo Egipto. Nefertiti se ha convertido en una de las mujeres más famosas del mundo antiguo y en un icono de la belleza femenina. Poco se sabe sobre Nefertiti. Las teorías sugieren que podría haber sido miembro de la realeza egipcia por nacimiento, una princesa extranjera o la hija de un alto funcionario del gobierno llamado Ay, que se convirtió en faraón después de Tutankamón. Pudo haber sido corregente de Egipto con Akenatón, quien gobernó desde 1352 a. C. hasta 1336 a. C. El busto no tiene inscripciones, pero se puede identificar con seguridad como Nefertiti por la característica corona que lleva en otras representaciones que se conservan."
 lepsius.713.t: "Paleta de Narmer"
 lepsius.713.d: "Nuestros arqueólogos han desenterrado durante sus excavaciones un artefacto extraordinario: ¡la Paleta de Narmer!"
 lepsius.713.f: "La Paleta de Narmer, también conocida como Paleta de la Gran Hierakonpolis o Paleta de Narmer, es un importante hallazgo arqueológico egipcio, que data aproximadamente del siglo 31 a.C., perteneciente, al menos nominalmente, a la categoría de paletas cosméticas. Contiene algunas de las inscripciones jeroglíficas más antiguas jamás encontradas. Algunos creen que la tablilla representa la unificación del Alto y el Bajo Egipto bajo el rey Narmer. Junto con la cabeza de maza de escorpión y la cabeza de maza de Narmer, que también se encuentran juntas en el depósito principal de Nekhen, la paleta de Narmer proporciona una de las representaciones más antiguas conocidas de un rey egipcio. La Paleta muestra muchas de las convenciones clásicas del arte del Antiguo Egipto, que ya deben haber sido formalizadas en el momento de la creación de la Paleta. El egiptólogo Bob Brier se ha referido a la Paleta de Narmer como \"el primer documento histórico del mundo\"."
 lepsius.722.t: "Máscara de Sargón"
 lepsius.722.d: "Durante las excavaciones en Nínive durante el descubrimiento de los Jardines Colgantes, nuestros arqueólogos encontraron un artefacto notable: ¡la Máscara de Sargón!"
 lepsius.722.f: "La cabeza de bronce de un rey, que lleva el casco-peluca de los antiguos gobernantes sumerios, es probablemente el propio Sargón. Aunque carece de ojos con incrustaciones y está ligeramente dañada en otras partes, esta cabeza se considera, con razón, una de las grandes obras maestras del arte antiguo. La cabeza es un busto de bronce de tamaño natural encontrado en Nínive. Los intrincados rizos y patrones de la barba y el complejo peinado sugieren realeza, poder y riqueza de un hombre ideal en la sociedad. Aparte de sus rasgos estéticos, esta pieza es espectacular porque es la primera escultura hueca que se conoce que utiliza el proceso de fundición a la cera perdida. Hay daños deliberados en el lado izquierdo de la cara y el ojo, lo que indica que el busto fue cortado intencionalmente en un período posterior para demostrar iconoclasia política."
 lepsius.723.t: "Casco de Meskalamdug"
 lepsius.723.d: "Durante nuestras excavaciones en Babilonia, nuestros arqueólogos encontraron un hallazgo especial: ¡el casco de Meskalamdug!"
 lepsius.723.f: "El Casco de Meskalamdug es uno de los hallazgos más famosos de las tumbas reales de Ur. Meskalamdug fue uno de los primeros gobernantes sumerios de la Primera Dinastía de Ur en el siglo 26 a.C. El casco estaba repujado en lámina de oro y, por lo tanto, no era adecuado como ropa protectora para la guerra. Es posible que se haya utilizado más en el área ceremonial/de culto. Aparte de las orejas trabajadas a los lados, la obra en su conjunto se parece más a una peluca, ya que sus finos grabados imitan un peinado ondulado. En el lateral, en cambio, hay rizos que se separan del peinado ondulado mediante una trenza alrededor de la cabeza. La trenza se anuda formando un botón al final de la cabeza. El casco tiene una serie de pequeños agujeros en el borde, a los que probablemente se le colocó un forro."
 lepsius.731.t: "Máscara de Agamenón"
 lepsius.731.d: "Después de descubrir los tesoros de Micenas, un artefacto en particular nos llamó la atención: ¡una máscara mortuoria dorada, la llamada Máscara de Agamenón!"
 lepsius.731.f: "La 'Máscara de Agamenón' es el nombre que recibe una máscara funeraria de oro descubierta en el antiguo sitio griego de Micenas. El arqueólogo alemán Heinrich Schliemann, que descubrió el artefacto en 1876, creía haber encontrado el cuerpo del rey micénico Agamenón, líder de los aqueos en la epopeya de la guerra de Troya de Homero, La Ilíada, pero la investigación arqueológica moderna sugiere que la máscara data de alrededor del 1600 a. C., anterior al período de la legendaria Guerra de Troya entre 300 y 400 años. La máscara está hecha de una fuerte lámina de oro de color amarillo rojizo y tiene una altura de unos 26 cm y una anchura de 26,5 cm. En la chapa está grabado el rostro de un hombre con barba, bigote y cejas. Hay un agujero al lado de cada lóbulo de la oreja, que probablemente se usó para sujetarlo. Cathy Gere ha descrito la máscara como la \"Mona Lisa de la prehistoria\"."
 lepsius.732.t: "Disco de Festos"
 lepsius.732.d: "Las excavaciones en Creta han desenterrado un artefacto idiosincrásico y misterioso: ¡el Disco de Festos!"
 lepsius.732.f: "El Disco de Festos es un disco de arcilla cocida del palacio minoico de Festos en la isla de Creta, que posiblemente data de la Edad del Bronce minoica media o tardía (segundo milenio a. C.). El disco tiene unos 15 cm de diámetro y está cubierto por ambos lados con una espiral de símbolos estampados. Su finalidad y su lugar original de fabricación siguen siendo objeto de controversia. El disco fue descubierto en 1908 por el arqueólogo italiano Luigi Pernier en el palacio minoico de Festos, y presenta 241 fichas, que comprenden 45 signos distintos, que aparentemente se hicieron presionando \"sellos\" jeroglíficos en un disco de arcilla blanda, en un secuencia en el sentido de las agujas del reloj en espiral hacia el centro del disco. El Disco de Festos capturó la imaginación de arqueólogos aficionados y profesionales, y se han realizado muchos intentos para descifrar el código detrás de los signos del disco."
 lepsius.733.t: "Diosa Serpiente"
 lepsius.733.d: "Durante las excavaciones en Creta cayó en nuestras manos un artefacto minoico de particular importancia artística e histórica: ¡la Diosa Serpiente!"
 lepsius.733.f: "En 1903 se excavaron dos estatuillas de la diosa serpiente minoica en el palacio minoico de Knossos, en la isla griega de Creta. Las estatuillas de Knossos, ambas significativamente incompletas, datan cerca del final del período neopalacial de la civilización minoica, alrededor del 1600 a. C. Fue Evans quien llamó a la más grande de su par de figurillas \"Diosa Serpiente\", y a la más pequeña, \"Sacerdotisa Serpiente\"; Desde entonces, se ha debatido si Evans tenía razón, o si ambas figuras representan sacerdotisas, o ambas representan la misma deidad o deidades distintas. La combinación de ropas elaboradas que dejan los pechos completamente desnudos y \"disputas de serpientes\" atrajo una publicidad considerable, por no hablar de varias falsificaciones, y la figura más pequeña en particular sigue siendo un icono popular del arte y la religión minoicos, al que ahora también se hace referencia generalmente como como una 'Diosa Serpiente'."
 lepsius.771.t: "Tesoro funerario de Pakal"
 lepsius.771.d: "Después de descubrir la tumba del rey Pakal, pudimos recuperar algunos artefactos especiales: ¡los tesoros del entierro de Pakal!"
 lepsius.771.f: "Es de destacar que los mayas, que no tenían herramientas de metal, crearon muchos objetos a partir de un material muy grueso y denso, el jade (jadeíta), en particular todo tipo de elementos de vestimenta (reales), como placas de cinturón - o hachas - carretes para las orejas, colgantes y también máscaras. Los celtas (es decir, adornos planos en forma de celta) a veces tenían grabados una representación del rey en forma de estela (por ejemplo, la 'placa de Leyden' del Clásico Temprano). El ejemplo más conocido de máscara es probablemente la máscara mortuoria del rey Pakal de Palenque, cubierta con placas de mármol de forma irregular y con ojos hechos de nácar y obsidiana. Pacal el Grande fue uno de los líderes de la ciudad-estado maya de Palenque en el período Clásico Tardío de la cronología mesoamericana precolombina. Accedió al trono en julio de 615 y gobernó hasta su muerte. Reinó 68 años."
 lepsius.772.t: "Belt Plaque"
 lepsius.772.d: "A Pre-Columbian artifact of particular artistic and historical importance fell into our hands during excavations in Yucatan: the Belt Plaque!"
 lepsius.772.f: "The Leyden Plaque is a significant Maya artifact carved from pale green jadeite, serving as a belt pendant. Discovered in 1864 near Puerto Barrios, Guatemala, it is renowned as one of the oldest dated objects from the Maya civilization. The plaque features delicate incised drawings on both sides. The obverse depicts a Maya lord—often identified as Siyaj Chan K'awiil I of Tikal—standing in profile and trampling a bound captive. The reverse bears a Long Count date (8.14.3.1.12), corresponding to September 320 CE, marking the ruler's accession. As a primary source for Early Classic Maya history, it provides vital insights into early royal iconography and epigraphy. Named after the city where it is curated, the plaque is currently held by the National Museum of Ethnology in Leiden, Netherlands."
 lepsius.721.t: "La epopeya de Gilgamesh"
 lepsius.721.d: "Nuestros asiriólogos han logrado reconstruir los rasgos básicos de la Epopeya de Gilgamesh basándose en las tablillas cuneiformes encontradas."
 lepsius.721.f: "Gilgamish se levantó interpretando sueños,\n dirigiéndose a su madre.\n '¡Madre mía! durante mi noche\n yo, habiendo llegado a tener lujuria, vagaba\n en medio de augurios.\n Y salieron estrellas en los cielos,\n Como un... del cielo cayó sobre mí.\n Yo parí él, pero era demasiado pesado para mí.\n Llevaba una red, pero yo no podía soportarla.\n Convoqué a la tierra para que se reuniera con él,\n para que los héroes besaran sus pies.\n Se puso de pie ante él. yo\n y ellos se pusieron frente a mí\n. Lo levanté y lo llevé hacia ti.'"
 lepsius.721.g: "La epopeya más antigua de la historia de la humanidad..."
 lepsius.741.t: "El tesoro de Príamo"
 lepsius.741.d: "Después del descubrimiento de Troya, Heinrich Schliemann busca un museo adecuado al que donar el tesoro de Príamo."
 lepsius.741.f: "Aunque Schliemann sacudió a los expertos con sus excavaciones y gozó de popularidad en toda Europa, encontró resistencia por parte de los expertos, especialmente debido a sus métodos de investigación. Aún quedaban varias advertencias. Por ejemplo, historiadores y arqueólogos dudaban de que el llamado Tesoro de Príamo pudiera realmente provenir de una capa que correspondiera a la Troya homérica. Además, cuando Schliemann decidió donar sus hallazgos a un museo, no obtuvo la respuesta que esperaba; Los viejos clientes se mostraron desdeñosos. Museos famosos como el Hermitage o el Louvre también se negaron. El descubridor expuso temporalmente el tesoro en Londres hasta que en 1881 decidió legar el hallazgo \"al pueblo alemán para su posesión perpetua y su custodia en la capital del Reich\"."
 lepsius.741.g: "... ¡y conozco el lugar perfecto para este tesoro!"
 lepsius.743.t: "Schliemann dona el tesoro de Príamo"
 lepsius.743.d: "¡Después de muchas deliberaciones, [SCOPE.sCharacter('lepsius_new_archaeologist_scope').GetFullName] decidió confiar el tesoro de Príamo a nuestro museo!"
 lepsius.743.g: "Le montaremos una sala y le pondremos el nombre de Schliemann."
 lepsius.743.h: "¡[SCOPE.sCharacter('lepsius_new_archaeologist_scope').GetLastName] es el verdadero tesoro!"
 lepsius.744.t: "Schliemann dona el tesoro de Príamo a un museo"
 lepsius.744.d: "Desgraciadamente hoy hemos recibido la noticia de que Heinrich Schliemann ha legado el tesoro de Príamo a un museo. Lamentablemente no es nuestro."
 lepsius.744.g: "¿Cómo pudo traicionarnos así?"
 lepsius.801.t: "Sitio de excavación"
 lepsius.801.d: "¿A qué sitio de excavación deberíamos enviar a nuestro arqueólogo?"
 lepsius.801.f: "Cuando el Sr. Coffeecake se dio cuenta de que el mapa del tesoro, de aspecto impresionantemente realista, en realidad procedía de una máquina de chicles, tuvo que cambiar sus planes de viaje arqueológico de una manera nunca antes vista."
 lepsius.801.g: "Alto Egipto."
 lepsius.801.h: "Bajo Egipto."
 lepsius.801.i: "Babilonia."
 lepsius.801.j: "Asiria."
 lepsius.801.k: "Argólida."
 lepsius.801.l: "Yucatán."
 lepsius.801.m: "No importa."
 lepsius.802.t: "Arqueólogo"
 lepsius.802.d: "¿A qué arqueólogo deberíamos enviar para establecer un nuevo sitio de excavación?"
 lepsius.802.f: "La mayoría de los países tienen un solo arqueólogo, que a menudo también ocupa el puesto de científico principal; sin embargo, si una nación, por cualquier motivo, tuviera arqueólogos más experimentados, existe la opción de seleccionar una segunda persona aquí."
 lepsius.802.g: "[SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName]"
 lepsius.802.h: "[SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName]"
 lepsius.803.t: "Partida"
 lepsius.803.g: "¡Buena suerte!"
 lepsius.811.t_vok: "Tumba de un noble"
 lepsius.811.t_pyr: "Santuario de Bastet"
 lepsius.811.t_bab: "Tumba sumeria"
 lepsius.811.t_ass: "Santuario asirio"
 lepsius.811.t_arg: "Santuario micénico"
 lepsius.811.t_yuc: "Casa de almacenamiento"
 lepsius.811.d: "Nuestro arqueólogo preparó un sitio de excavación mediocre."
 lepsius.811.f_pyr: "[SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] ha encontrado las ruinas de un antiguo complejo de templos egipcios en una zona pantanosa del delta del Nilo en el Bajo Egipto: eso es lo que parecía al principio. Desafortunadamente, resultó ser un hallazgo mucho más pequeño: el supuesto templo era más bien un santuario dedicado a la diosa gata Bastet. Sin embargo, nuestros investigadores han comenzado la excavación; después de todo, hay que empezar por algún lado."
 lepsius.811.f_bab: "Los sumerios son quizás la civilización más antigua del mundo. [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] en Babilonia descubrió accidentalmente una tumba de un pueblo antiguo que se dice que inventó la rueda y la escritura. Desafortunadamente, al poco tiempo resultó que la mayoría de los artefactos habían sido robados o destruidos. Los arqueólogos han comenzado a trabajar."
 lepsius.811.f_arg: ""
 lepsius.811.f_yuc: "Desafortunadamente, nuestro equipo de excavación en Yucatán ha tenido poco éxito en su búsqueda de restos de la cultura maya. En un valle lateral, los arqueólogos encontraron un antiguo almacén que antes sólo ofrecía cerámica rota. [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] confirmó en un telegrama que en el futuro se esperan más cosas."
 lepsius.811.g: "Un lugar mediocre, pero es nuestro..."
 lepsius.812.t_vok: "Tumba de un príncipe"
 lepsius.812.t_pyr: "Templo de Ra"
 lepsius.812.t_bab: "Zigurat de la Luna"
 lepsius.812.t_ass: "Fortaleza asiria"
 lepsius.812.t_arg: "Tumba de cámara"
 lepsius.812.t_yuc: "Observatorio Maya"
 lepsius.812.d: "Nuestro arqueólogo preparó un buen sitio de excavación."
 lepsius.812.f_vok: "¡Buenas noticias desde Egipto! Después de muchas dificultades, [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] descubrió una tumba hasta entonces desconocida. Según las primeras informaciones, se trata del lugar de descanso final de un antiguo príncipe egipcio. Si bien faltan algunos artefactos que pueden haber sido robados y vendidos por los lugareños en el pasado, es un buen punto de partida para futuras excavaciones arqueológicas."
 lepsius.812.f_pyr: "Bajo un claro cielo egipcio, el último resto de electrones parpadea en lo alto de un obelisco en el horizonte, ¡y marca la entrada a un templo del dios sol Ra! [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] inmediatamente aseguró el sitio y comenzó la excavación."
 lepsius.812.f_ass: "Hasta el día de hoy, la Biblia ha presentado la imagen de los asirios de una manera bastante negativa entre judíos y cristianos. Conocidos como un pueblo guerrero que acosó repetidamente a los israelitas y finalmente destruyó el reino del norte, pasaron a la historia como una potencia militar importante. Si bien no toda esta propaganda negativa es cierta, el descubrimiento de una fortaleza asiria ha demostrado que los antiguos gobernantes del Medio Oriente tenían una cultura militar impresionante."
 lepsius.812.f_arg: "[SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] encontró recientemente una tumba de cámara micénica. Esta forma de arquitectura mortuoria se utilizó en la Edad del Bronce Final en las zonas bajo la influencia cultural del Egeo. Las tumbas están excavadas en la roca y tienen una estructura tripartita (cámara, stomion y dromos), a menudo con nichos adicionales y cámaras laterales en las que se realizaban entierros primarios o secundarios. El director de nuestro museo ha puesto fría una botella de champán."
 lepsius.812.f_yuc: "Los mayas tenían un gran interés por la astronomía. Aparentemente, tenían un conocimiento distintivo de los fenómenos celestes que era superior al de los antiguos griegos en muchos aspectos. [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] ha descubierto un edificio en la jungla que tiene una escalera de caracol con forma de serpiente en su parte superior. Nuestros investigadores están entusiasmados de ver qué conocimientos y artefactos contiene este descubrimiento."
 lepsius.812.g: "Un buen lugar para una excavación."
 lepsius.813.t_vok: "Tumba de una reina"
 lepsius.813.t_pyr: "Pirámide inexplorada"
 lepsius.813.t_bab: "Puerta y murallas de Babilonia"
 lepsius.813.t_ass: "Palacio asirio"
 lepsius.813.t_arg: "Ciudadela de Micenas"
 lepsius.813.t_yuc: "Pirámide Maya"
 lepsius.813.d: "Nuestro arqueólogo preparó un excelente sitio de excavación."
 lepsius.813.f_pyr: "Cuando hoy llegó el último telegrama de [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName], nuestros investigadores al principio no quisieron creerlo: aparentemente nuestros arqueólogos han redescubierto una pirámide hasta entonces desconocida en el desierto egipcio. Aunque los lugareños ya han hablado del objeto, que está completamente cubierto de arena, no han encontrado una entrada. ¡Nuestra nación puede considerar propios numerosos hallazgos del Reino Antiguo!"
 lepsius.813.f_arg: "¿Realmente construyeron las ciudades antiguas los semidioses o los cíclopes? Una formidable ciudadela micénica se eleva sobre las colinas griegas mientras nuestro equipo de expedición informa éxito tras éxito una semana después del descubrimiento. No sólo la arquitectura es impresionante, sino que también los hallazgos de arcilla y oro prometen nuevos descubrimientos en el futuro. [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] llegó a decir que se había encontrado el Anillo de Menelao."
 lepsius.813.f_yuc: "Cuando después de unas horas la lluvia amainó y de la lluvia sólo quedaba una suave capa de niebla que envolvía las copas de los árboles de la jungla, la expedición vio una imagen magnífica. Por encima de las copas de los árboles, innumerables escalones cubiertos de maleza y lianas se elevaban hacia el cielo: una imponente pirámide escalonada ocupaba el panorama, en medio de la selva, poblada de pájaros y tapires. [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] inmediatamente consiguió algunos de los primeros hallazgos y los envió al museo por entrega urgente."
 lepsius.813.g: "¡Este lugar es perfecto!"
 lepsius.190.t: "Equipo arqueológico llamado de nuevo"
 lepsius.190.d: "¿De qué sitio arqueológico deberíamos retirar a nuestro equipo?"
 lepsius.190.f: "Alguien debe haber difamado a Henry J., porque una mañana, sin que él tuviera la culpa, lo sacaron de su sitio de excavación."
 lepsius.190.g: "Alto Egipto"
 lepsius.190.h: "Bajo Egipto"
 lepsius.190.i: "Babilonia"
 lepsius.190.j: "Asiria"
 lepsius.190.k: "Argólida"
 lepsius.190.l: "Creta"
 lepsius.190.m: "Yucatán"
 lepsius.190.n: "Perú"
 lepsius.190.o: "Sigue adelante."
 lepsius.901.t: "Tumba de Tutankamón"
 lepsius.901.d: "Es un día sensacional para la ciencia internacional. Hemos hecho un gran descubrimiento: ¡la tumba de Tutankamón ha sido descubierta hoy por [ROOT.GetCountry.GetAdjectiveNoFlag] arqueólogos!"
 lepsius.901.f: "Lentamente, desesperadamente lentamente, nos pareció mientras observábamos, los restos de escombros del pasillo que obstaculizaban la parte inferior de la puerta fueron removidos, hasta que por fin tuvimos toda la puerta despejada ante nosotros. Había llegado el momento decisivo. Con manos temblorosas hice una pequeña brecha en la esquina superior izquierda. La oscuridad y el espacio en blanco, hasta donde alcanzaba una varilla de prueba de hierro, mostraban que todo lo que había más allá estaba vacío y no lleno como el pasaje que acabábamos de despejar. Se realizaron pruebas con velas como precaución contra posibles gases contaminantes y luego, ensanchando un poco el agujero, introduje la vela y miré dentro. Al principio no pude ver nada, el aire caliente que se escapaba de la cámara hacía que la llama de la vela parpadeara. pero pronto, cuando mis ojos se acostumbraron a la luz, los detalles de la habitación interior emergieron lentamente de la niebla, animales extraños, estatuas y oro: por todas partes el brillo del oro. Por un momento (una eternidad que debió parecerles a los demás presentes) me quedé mudo de asombro, y cuando mi colega, incapaz de soportar más el suspenso, preguntó con ansiedad: \"¿Puedes ver algo?\" Fue todo lo que pude hacer para pronunciar las palabras: \"Sí, cosas maravillosas\"."
 lepsius.901.g: "Cosas maravillosas, por cierto."
 lepsius.902.d: "[SCOPE.sCountry('lepsius_tut_discoverer').GetName] ha hecho un gran descubrimiento: ¡hoy se ha descubierto la tumba de Tutankamón!"
 lepsius.902.f: ""
 lepsius.902.g: "Ojalá les alcance la maldición del faraón."
 lepsius.911.t: "Barco de Keops"
 lepsius.911.d: "Es un día sensacional para la ciencia internacional. Hemos hecho un gran descubrimiento: ¡el barco de Keops fue descubierto hoy por [ROOT.GetCountry.GetAdjectiveNoFlag] arqueólogos!"
 lepsius.911.f: "Respiró profundamente, cerró los ojos para acostumbrarlos a la oscuridad de la excavación y luego los abrió lentamente. Con mano firme comenzó a cortar de nuevo. Trabajó rápidamente mientras la carcasa cedía y se desmoronaba. Hizo el agujero lo suficientemente profundo como para girar su cuerpo hacia abajo en una posición diferente y trabajó a sólo unos centímetros de su cabeza. Siguió cortando y cortando. El tiempo no significaba nada. No era consciente de estar cansado ni de estar acostado en posición perpendicular. Él sondeó. Él cortó. De repente y milagrosamente sus manos desaparecieron en la nada. Yacía como en trance. Cerró los ojos. Un olor casi imperceptible se deslizó por sus fosas nasales. No podía definir qué era. Fue casi dulce. No podría ser incienso. ¿O era? ¿Fue tal vez el olor mismo de la historia? Entonces lo supo. ¡Era madera de cedro! Sus ojos todavía estaban sin abrir. Respiró hondo y determinó que efectivamente era madera de cedro. Sintió una sensación de plenitud como nunca antes había sentido. La felicidad lo invadió. Sus ojos todavía estaban cerrados. Susurró una oración de gracias a Dios. Su mente inquisitiva empezó a funcionar de nuevo. Si efectivamente olió madera de cedro de un Barco Solar debajo, no significaba que la hormiga blanca no hubiera estado ocupada. Quizás la madera preciosa había sido devorada por hordas de hormigas blancas. '¡Es el barco!', gritó. '¡Es el barco!'"
 lepsius.911.g: "¿Todavía puede navegar en el agua después de más de 4.000 años?"
 lepsius.912.d: "[SCOPE.sCountry('lepsius_ship_discoverer').GetName] ha hecho un gran descubrimiento: ¡la tumba del barco de Keops fue descubierta hoy!"
 lepsius.912.f: ""
 lepsius.912.g: "Sin duda una parte importante de su nueva flota."
 lepsius.921.t: "Torre de Babilonia"
 lepsius.921.d: "Es un día sensacional para la ciencia internacional. Hemos hecho un gran descubrimiento: ¡la Torre de Babel ha sido descubierta hoy por [ROOT.GetCountry.GetAdjectiveNoFlag] arqueólogos!"
 lepsius.921.f: "Más allá de esta cresta se extiende una llanura bastante considerable y notablemente uniforme hacia la colina de Amran Ibn Ali, a través de la cual discurre en diagonal la carretera de nuestro pueblo de Kweiresh a Hilleh. Se llama 'Sachn', literalmente: la sartén, pero en el lenguaje actual significa el espacio libre rodeado de soportales que rodea las grandes mezquitas de peregrinación, como la de Karbala o la de Nedschef. Pero nuestro 'Sachn' no es otra cosa que el aspecto actual del antiguo recinto sagrado, en el que se alzaba el Zikurrat Etemenanki, la 'piedra fundamental del cielo y de la tierra', la torre de Babilonia, rodeada por un muro circular al que todo tipo de edificaciones relacionadas con el culto. No conocemos la altura total de la torre. Pero Nabupolasar, al igual que Nabucodonosor, pone especial énfasis en ellos en su inscripción cilíndrica de Etemenanki. El primero dice: 'En ese momento Marduk me ordenó... que la torre de Babilonia, que había sido debilitada y derribada en los días anteriores a mí, pusiera sus cimientos firmemente en el pecho del inframundo, mientras su cima aspiraba al cielo. .'"
 lepsius.921.g: "Entonces, después de todo, la Biblia no estaba equivocada."
 lepsius.922.d: "[SCOPE.sCountry('lepsius_babylon_discoverer').GetName] ha hecho un gran descubrimiento: ¡hoy ha sido descubierta la Torre de Babel!"
 lepsius.922.f: ""
 lepsius.922.g: "Sólo se puede desear que luego queden tan confundidos como los constructores de la torre."
 lepsius.931.t: "Jardines de Senaquerib"
 lepsius.931.d: "Es un día sensacional para la ciencia internacional. Hemos hecho un gran descubrimiento: ¡los Jardines Colgantes fueron descubiertos hoy por [ROOT.GetCountry.GetAdjectiveNoFlag] arqueólogos!"
 lepsius.931.f: "¿Estaban realmente los Jardines Colgantes en Babilonia? Según el último descubrimiento, se ha demostrado que esta afirmación es falsa. De hecho, al comparar fuentes históricas, nuestros arqueólogos más hábiles han descubierto que muy pocas fuentes sitúan los jardines legendarios en Babilonia. Además, fueron los asirios, no los babilonios, quienes eran conocidos por sus sofisticadas técnicas de jardinería. Los relieves dan testimonio de extensos jardines en varias plantas. Un equipo arqueológico aprovechó la oportunidad para realizar excavaciones de prueba en el gran palacio del rey asirio Senaquerib, en una zona que se creía poco explorada. El hallazgo es claro: la maravilla perdida del mundo estaba claramente en Nínive. Por tanto, nuestros arqueólogos se benefician no sólo del descubrimiento, sino también del esclarecimiento de un misterio que dura dos milenios y medio."
 lepsius.931.g: "Entonces, ¿eso significa que en realidad eran los Jardines Colgantes de Nínive?"
 lepsius.932.d: "[SCOPE.sCountry('lepsius_semiramis_discoverer').GetName] ha hecho un gran descubrimiento: ¡los Jardines Colgantes han sido descubiertos hoy!"
 lepsius.932.f: ""
 lepsius.932.g: "Es casi seguro que aquí hay una confusión."
 lepsius.941.t: "Tesoros de Micenas"
 lepsius.941.d: "Es un día sensacional para la ciencia internacional. Hemos hecho un gran descubrimiento: ¡los tesoros de Micenas han sido descubiertos hoy por [ROOT.GetCountry.GetAdjectiveNoFlag] arqueólogos!"
 lepsius.941.f: "Con diferencia, la excavación más importante y valiosa fue la que se llevó a cabo justo detrás de la Puerta de los Leones. Durante sus excavaciones de prueba en 1874, Schliemann ya había comprobado que la roca en el punto más bajo del castillo estaba cubierta de escombros en su mayor parte. Según palabras de Pausanias, consideró probable que las tumbas de la familia gobernante se encontraran dentro de los muros del castillo y tuvo que recordar las palabras cuando, poco después del inicio de las obras, se encontraron tres lápidas con relieves antiguos a una profundidad de 3 a 5 metros. Cuando se quitaron las piedras, dice Schliemann, resultó que no estaban en el suelo, como se suponía anteriormente, sino en la tierra que llenaba los pozos que se habían excavado verticalmente en la roca para hacer las tumbas. Cavaron cinco de estos pozos y, después de retirar a cierta profundidad las capas de piedra que habían servido como altares después del entierro de los muertos, el hacha golpeó el suelo a unos 6 metros de profundidad. En el fondo yacían quince cadáveres repartidos en cinco tumbas, adornados con ricas, podría decir fabulosas, joyas de oro. Sobre los rostros de los hombres se extendían máscaras doradas que imitaban los rasgos del difunto, placas de oro ricamente decoradas con espirales cubrían sus pechos, las túnicas de las mujeres estaban cargadas de oro."
 lepsius.941.g: "Agamenón, ¿eres tú?"
 lepsius.942.d: "[SCOPE.sCountry('lepsius_mycenae_discoverer').GetName] ha hecho un gran descubrimiento: ¡hoy se han descubierto los Tesoros de Micenas!"
 lepsius.942.f: ""
 lepsius.942.g: "En caso de duda, estos mismos estafadores han escondido allí estos \"tesoros\"."
 lepsius.961.t: "Legado de Pakal"
 lepsius.961.d: "Es un día sensacional para la ciencia internacional. Hemos hecho un gran descubrimiento: ¡la tumba y los tesoros funerarios de Pakal fueron descubiertos hoy por [ROOT.GetCountry.GetAdjectiveNoFlag] arqueólogos!"
 lepsius.961.f: "Mi primera impresión fue un mosaico de verde, rojo y blanco. Luego se resolvió en detalles: adornos de jade verde, dientes y huesos pintados de rojo y fragmentos de una máscara. Estaba contemplando el rostro moribundo de aquel para quien se había construido toda esta estupenda obra: la cripta, la escultura, la escalera, la gran pirámide con su templo coronado: ¡los restos mortales de uno de los hombres más grandes de Palenque! ¡Este era un sarcófago, el primero encontrado en una pirámide maya!"
 lepsius.961.g: "¡La tumba de Tutankamón en América del Sur!"
 lepsius.962.d: "[SCOPE.sCountry('lepsius_pakal_discoverer').GetName] ha hecho un gran descubrimiento: ¡la tumba y los tesoros funerarios de Pakal fueron descubiertos hoy!"
 lepsius.962.f: ""
 lepsius.962.g: "La máscara era bastante espantosa de todos modos."
 lepsius_local_excavation_modifier: "Excavación Local"
 lepsius_local_excavation_state_modifier: "Excavación Local"
 lepsius_local_excavation_cost_modifier: "Costo de excavación local"
 lepsius.1101.t: "Congreso Arqueológico: El Éxodo"
 lepsius.1101.d: "Nuestra nación ha hecho todos los preparativos pertinentes para la celebración del próximo Congreso Arqueológico. La atención se centrará en el papel de la Biblia en la arqueología y la investigación de la antigüedad. Se enviarán invitaciones a los principales arqueólogos del mundo. El profesor [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] presidirá la sesión."
 lepsius.1101.f: "Ya en la época romana, la falta de fuentes sobre el antiguo Egipto significó que los escritos históricos se basaran en fuentes secundarias como Heródoto. El desarrollo continuó en la Edad Media. La Biblia ofreció pistas y fue considerada durante mucho tiempo una fuente acreditada para la historia de Oriente Próximo, también porque simplemente no existían otras tradiciones. Con el desciframiento de los jeroglíficos y el comienzo de la egiptología moderna, tanto los defensores como los críticos de la Biblia intentaron presentar evidencia de que los relatos bíblicos eran falsos o correctos. Con el comienzo de la exploración de la antigua Babilonia, esta tendencia aumentó aún más. Un ejemplo de la disputa sobre la historicidad de las historias bíblicas fue el Éxodo -la salida del pueblo de Israel de Egipto- del que no había evidencia en fuentes egipcias."
 lepsius.1101.g: "El mundo arqueológico debería ser nuestro invitado."
 lepsius.1102.d: "[SCOPE.sCountry('lepsius_congress_host_country').GetName] ha invitado a un congreso de arqueología. El tema será la historicidad de la Biblia usando el ejemplo del Éxodo. Nuestro profesor arqueólogo [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] ha recibido una cálida invitación."
 lepsius.1102.g: "Siempre estas discusiones sobre quién tiene las mejores chaquetas de cuero..."
 lepsius.1103.t_laughed: "El ridículo de la sociedad arqueológica"
 lepsius.1103.t_respected: "Una apariencia segura"
 lepsius.1103.t_lauded: "Admiración y felicitaciones."
 lepsius.1103.d_laughed: "La aparición del Prof. [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] fue recibida con diversión. [ROOT.GetCountry.GetNameNoFlag] no tiene exactamente reputación de haber logrado algo sobresaliente en el campo de la egiptología. Claramente hubo bromas a puerta cerrada."
 lepsius.1103.d_respected: "Antes del inicio del Congreso Arqueológico, nuestro arqueólogo fue recibido calurosamente y se intercambiaron las costumbres habituales. [ROOT.GetCountry.GetNameNoFlag] tiene una reconocida reputación en el mundo de la investigación."
 lepsius.1103.d_lauded: "La llegada del Profesor [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] fue recibida con gran alegría. Se le considera uno de los invitados más esperados. Rápidamente se formó una multitud a su alrededor, ya que [ROOT.GetCountry.GetNameNoFlag] es considerado un pionero en el campo de la egiptología."
 lepsius.1103.f_laughed: "'¿Por qué los arqueólogos [ROOT.GetCountry.GetAdjectiveNoFlag] no consiguen chicas?\n\n¡Porque tienen las peores técnicas de datación!'"
 lepsius.1103.f_respected: "A su llegada, el profesor [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] tuvo algunas conversaciones agradables con colegas sobre ruinas en su mayoría aburridas que un no científico habría descartado como formaciones rocosas aún más aburridas."
 lepsius.1103.f_lauded: "El profesor [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] parecía casi abrumado por el ataque. Muchos colegas quisieron hablar con él y quisieron beneficiarse de sus expediciones y de sus experiencias. Algunos incluso le instaron a dar una conferencia privada."
 lepsius.1103.g: "¡Que embarazoso!"
 lepsius.1103.h: "Finalmente entre personas de ideas afines."
 lepsius.1103.i: "¡Somos una nación arqueológica líder!"
 lepsius.1104.t: "El Éxodo: ¿mérito histórico o invención?"
 lepsius.1104.d: "La conferencia temática se convirtió rápidamente en una cuestión de principios. Al principio la gente sólo quería discutir el éxodo bíblico y las fuentes egipcias, pero rápidamente se convirtió en un debate sobre el valor de la Biblia en la historia y la arqueología. Hoy en día, dos campos académicos se oponen irreconciliablemente."
 lepsius.1104.f: "En realidad, [SCOPE.sCharacter('lepsius_bible_defender_scope').GetFullName] había querido dar una conferencia sobre la cultura de la memoria del pueblo israelí y el estado del éxodo cuando [SCOPE.sCharacter('lepsius_bible_attacker_scope').GetFullName] formuló la provocativa y justificada pregunta de si tal declaración no era sólo una pérdida de tiempo, porque en última instancia habría Queda por aclarar si la Biblia podría considerarse como fuente, ya que no existía ninguna tradición arqueológica que hable de la historicidad del Éxodo. Tampoco había ninguna tradición en los textos que ahora se han traducido. Por lo tanto, en principio, deberían preguntarse si los cinco libros de Moisés son en realidad historias inventadas y, por lo tanto, inútiles. \"La arqueología trata de hechos, no de verdad\", concluyó. [SCOPE.sCharacter('lepsius_bible_defender_scope').GetFullName] respondió a estas acusaciones diciendo que no debería entenderse los textos bíblicos como informes de testigos presenciales, sino más bien como una fuente secundaria sobre acontecimientos que formaban una pieza del rompecabezas de la antigua cultura de la memoria. 'Rechazar la Biblia por completo es tan absurdo como aceptar cada palabra de ella como un hecho histórico. Se trata más bien de hacer las preguntas correctas', afirmó."
 lepsius.1104.g: "La Biblia tiene cierto valor histórico como fuente secundaria."
 lepsius.1104.h: "La Biblia no tiene ningún valor histórico en absoluto."
 lepsius.1105.t: "Arqueólogos entre ellos"
 lepsius.1105.d: "Además del actual Congreso Arqueológico, nuestro arqueólogo se hizo amigo de un colega extranjero e intercambió ideas."
 lepsius.1105.f: "El congreso duraba varios días y al principio el profesor [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] sólo tuvo tiempo de hablar con un colega hasta entonces desconocido durante los descansos. La reunión fue seguida de una comida juntos, y cuanto más hablaban los científicos entre sí, más aprendían unos de otros y unos de otros. Resulta que [SCOPE.sCharacter('lepsius_foreign_archaeologist_scope').GetFullName] es una persona con una gran experiencia."
 lepsius.1105.g: "¡Otro amigo de la arqueología!"
 lepsius.1106.t: "El artefacto de un negociador"
 lepsius.1106.d: "El negociador de un propietario de antigüedades asistió al Congreso Arqueológico de [SCOPE.sCountry('lepsius_congress_host_country').GetName]. Intenta vender un artefacto a un museo interesado en nombre de un aristócrata secreto. Hasta el momento no ha encontrado ningún cliente."
 lepsius.1106.f: "El Prof. [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] pudo convencerse de la autenticidad del artefacto. Sin embargo, dado el elevado precio, duda en comprar y espera un compromiso del capital antes de tomar cualquier medida."
 lepsius.1106.g: "Caro pero valioso."
 lepsius.1106.h: "No es lo suficientemente valioso."
 lepsius.1107.t: "Charla amistosa"
 lepsius.1107.d: "Al margen del Congreso Arqueológico de [SCOPE.sCountry('lepsius_congress_host_country').GetName], nuestro arqueólogo presentó [ROOT.GetCountry.GetNameNoFlag] de forma muy positiva en una conversación con varios colegas."
 lepsius.1107.f: "Se desconoce qué dijo exactamente el profesor [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName], pero aparentemente tocó la fibra sensible de los otros arqueólogos. Seguramente difundirán esta impresión positiva en su país de origen."
 lepsius.1107.g: "Mejoremos nuestras relaciones."
 lepsius.1107.h: "Mejoremos nuestra reputación."
 lepsius.1108.t: "Un asistente"
 lepsius.1108.d: "Un joven aspirante que quería entrar al Congreso Arqueológico pero los guardias de la puerta se lo impidieron, llama la atención del profesor [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName]."
 lepsius.1108.f: "Por supuesto, al estudiante se le impidió entrar al salón con la selecta compañía de arqueólogos internacionales, pero la perseverancia impresionó tanto a [SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName] que quiso conocer mejor al joven. Al final resultó que, había acumulado una gran cantidad de conocimientos para su época, tanto en lenguas antiguas como en geografía. Al cabo de unas horas, el profesor decidió nombrarlo su asistente después del congreso con la esperanza de poder enriquecer pronto el mundo académico."
 lepsius.1108.g: "Esperamos una carrera académica."
 lepsius.1109.t_merit: "El Éxodo: Más que una Historia"
 lepsius.1109.t_invention: "El éxodo: ficción, no realidad"
 lepsius.1109.d_merit: "Después de muchas reuniones, debates y discusiones, el Congreso Arqueológico llegó a su fin y se redactó una declaración final. En consecuencia, la Biblia no es una fuente histórica primaria, pero todavía tiene valor histórico en algunos aspectos, incluso si esto no es directamente aplicable a Egipto y Babilonia."
 lepsius.1109.d_invention: "Después de muchas reuniones, debates y discusiones, el Congreso Arqueológico llegó a su fin y se redactó una declaración final. En consecuencia, la Biblia no tiene valor para la arqueología o la historia. Más bien, se trata en gran medida de una serie de invenciones que constituyen más un obstáculo que una ayuda para el estudio de la antigüedad."
 lepsius.1109.f_merit: "Un grupo más pequeño de arqueólogos vio la declaración como un compromiso, pero otros la reconocieron como un enfoque más matizado del pasado que iba más allá de las posiciones absolutas. A pesar de una referencia directa al Éxodo, algunos arqueólogos destacaron un pasaje recientemente descubierto del faraón Merenptah que menciona la devastación para el pueblo de Israel. Otro grupo señaló que, según el portal Bubastis traducido por Champollion, el faraón Shishak efectivamente saqueó Jerusalén. Todos estos son indicios de que es menos importante utilizar el libro literalmente, sino verlo como una pieza del rompecabezas en la investigación de la historia más antigua. Las interpretaciones erróneas son inevitables, pero esto se aplica a todas las áreas de la ciencia."
 lepsius.1109.f_invention: "Al final, el grupo de escépticos logró imponerse con su máxima exigencia. A partir de ahora, las historias bíblicas no deberían tener más valor que, por ejemplo, las leyendas sobre los 7 reyes de Roma o las historias míticas griegas: la posición prominente de la Biblia había llegado a su fin, al menos en el mundo occidental. en esta área. Las desesperadas referencias a coincidencias entre hallazgos arqueológicos y pasajes bíblicos fueron reconocidas como lo que eran: coincidencias. Por tanto, la cuestión de qué hacer con la Biblia era simplemente tarea de la literatura. Algunos arqueólogos también mencionaron la posibilidad de que las historias bíblicas fueran, como máximo, copiadas de historias egipcias o mitos babilónicos. Se trataría únicamente de la necesaria investigación de la dependencia. De lo contrario, el caso estaba cerrado para la arqueología y la historia: la Biblia era en gran medida una colección de historias inventadas sin valor para la ciencia."
 lepsius.1109.g: "Hay que clasificar e interpretar los textos correctamente."
 lepsius.1109.h: "La Biblia es un libro de cuentos inútil."
 lepsius.1109.i: "Esto ya lo sabíamos de antemano."
 lepsius.1111.t: "Congreso Arqueológico: El ascenso de la civilización"
 lepsius.1111.d: "Nuestra nación ha hecho todos los preparativos pertinentes para la celebración del próximo Congreso Arqueológico. La atención se centrará en la cuestión de dónde surgió por primera vez la civilización. Según las últimas informaciones, probablemente se trate de Babilonia. Esto plantea aún más la cuestión de hasta qué punto la cultura babilónica influyó en otras culturas. Se enviarán invitaciones a los principales arqueólogos del mundo. El profesor [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] presidirá la sesión."
 lepsius.1111.f: "El conocimiento de que existió una civilización babilónica nunca se perdió por completo; ya en la época de los griegos había información sobre babilonios y asirios. Sin embargo, la decodificación del acadio reveló que había culturas significativamente más antiguas, como la de los sumerios, cuya historia eclipsó incluso a la de los egipcios en términos de edad. Toda una serie de inventos propios de la civilización moldearon la vida cotidiana de estos pueblos antiguos, y muchos filólogos y arqueólogos pronto sospecharon que Babilonia era la verdadera cuna de la civilización. La fascinación por la antigua Mesopotamia pronto llevó al hecho de que todas las áreas de la civilización se remontaban a Babilonia: no sólo la Biblia, sino también las culturas del Levante y Persia, incluso la egipcia, eran meros \"receptores culturales\" o \"transmisores culturales\". ' de la cultura babilónica original. Esta estrechez científica pronto adquirió un nombre burlón que sus seguidores utilizaron para sí mismos: panbabilonismo."
 lepsius.1111.g: "El mundo arqueológico debería ser nuestro invitado."
 lepsius.1112.d: "[SCOPE.sCountry('lepsius_congress_host_country').GetName] ha invitado a un congreso de arqueología. La atención se centrará en la cuestión de dónde surgió por primera vez la civilización. Según las últimas informaciones, probablemente se trate de Babilonia. Esto plantea aún más la cuestión de hasta qué punto la cultura babilónica influyó en otras culturas. Nuestro profesor arqueólogo [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] ha recibido una cálida invitación."
 lepsius.1112.g: "Siempre estas discusiones sobre quién tiene las mejores chaquetas de cuero..."
 lepsius.1113.d_laughed: "La aparición del Prof. [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] fue recibida con diversión. [ROOT.GetCountry.GetNameNoFlag] no tiene exactamente reputación de haber logrado algo sobresaliente en el campo de la asiriología. Claramente hubo bromas a puerta cerrada."
 lepsius.1113.d_respected: "Antes del inicio del Congreso Arqueológico, nuestro arqueólogo fue recibido calurosamente y se intercambiaron las costumbres habituales. [ROOT.GetCountry.GetNameNoFlag] tiene una reconocida reputación en el mundo de la investigación."
 lepsius.1113.d_lauded: "La llegada del Profesor [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] fue recibida con gran alegría. Se le considera uno de los invitados más esperados. Rápidamente se formó una multitud a su alrededor, ya que [ROOT.GetCountry.GetNameNoFlag] es considerado un pionero en el campo de la asiriología."
 lepsius.1114.t: "Babilonia: ¿la cuna de la civilización?"
 lepsius.1114.d: "Durante el transcurso del congreso, la cuestión del origen de la civilización se convirtió cada vez más en la cuestión de si Babilonia influyó y en qué medida en todas las culturas de Oriente Medio y el Mediterráneo oriental. ¡Algunos suponen que casi todas las ideas que luego desempeñaron un papel fueron concebidas en la antigua Babilonia!"
 lepsius.1114.f: "El profesor [SCOPE.sCharacter('lepsius_babylon_defender_scope').GetLastName] comenzó con una contribución muy interesante sobre los logros culturales y el alto nivel de conocimiento babilónico hace más de 4.000 años: 'El mundo cultural sumerio-babilónico presupone una teoría mundial según la cual todas las organizaciones estatales y sociales estaban reguladas. Todas las ciencias y todas las artes se remontan a una sabiduría primordial revelada por el cielo, según la cual se gestiona y protege la propiedad. El panbabilonismo pretende proporcionar pruebas de que esta cosmovisión astral dejó su huella en todas las culturas y religiones del mundo.' Pero esta opinión provocó una fuerte oposición de numerosos académicos, cuyo portavoz pronto surgió como [SCOPE.sCharacter('lepsius_babylon_attacker_scope').GetFullName]. Rechazó la idea de que todos los mitos derivaran de los babilonios. 'Lo que [SCOPE.sCharacter('lepsius_babylon_defender_scope').GetLastName] dijo fueron más construcciones que hechos. La idea de que no podría haber desarrollos paralelos es descabellada: los jeroglíficos egipcios, por ejemplo, no se inspiraron en la escritura cuneiforme.' Y aunque los panbabilonistas intentaron crear una prioridad que relegara a Mesopotamia al centro y a todas las demás mitologías a la periferia, pasaron por alto por completo el hecho de que las culturas pueden vivir en un espectro común."
 lepsius.1114.g: "Babilonia es la cuna de la civilización."
 lepsius.1114.h: "La civilización surgió en varios lugares."
 lepsius.1119.t_panbabylonism: "El ascenso de la civilización: el panbabilonismo triunfa"
 lepsius.1119.t_antipanbabylonism: "El ascenso de la civilización: el panbabilonismo refutado"
 lepsius.1119.d_panbabylonism: "Después de un apasionado debate que resultó en desavenencias entre numerosos académicos, el congreso pudo acordar una declaración final. En consecuencia, Mesopotamia no es sólo la cuna de la civilización, sino también el punto de partida de todas las ideas mitológicas de Oriente Medio."
 lepsius.1119.d_antipanbabylonism: "Las batallas terminaron y después de algunas acaloradas discusiones verbales, los eruditos pudieron recomponerse y firmar una declaración final que selló la derrota final del campo panbabilónico. Es cierto que Mesopotamia fue reconocida como una de las cunas de civilización más importantes; Pero no el único. El intento de rastrear todas las mitologías hasta los babilonios fue cortado de raíz."
 lepsius.1119.f_panbabylonism: "La declaración final confirmó todas las teorías expuestas por los seguidores panbabilónicos: la dependencia de la mitología y la literatura de Oriente de la cultura babilónica era evidente. Tanto la Biblia como los mitos egipcios dependen obviamente de ideas babilónicas bien conocidas, como las que se encuentran en la Epopeya de Gilgamesh. En última instancia, todo el desarrollo de Oriente Medio estuvo fuertemente influenciado culturalmente por la astronomía y la astrología de esta cultura original, cuyas ideas eran a veces más obvias y a veces menos obvias."
 lepsius.1119.f_antipanbabylonism: "Los partidarios del panbabilonismo recientemente se encontraron en minoría. Los académicos reconocieron que muchos de los logros de las culturas mesopotámicas formaban parte del núcleo de la subestructura intelectual de Oriente Medio. Sin embargo, en la declaración final los científicos rechazaron la pretensión de absoluto, incluso la pretensión de una \"cultura original\". La investigación astronómica, que se consideraba el punto de partida del pensamiento babilónico, quedó expuesta como un desarrollo posterior que se había situado erróneamente en el principio. Los académicos tampoco pudieron reconocer una prioridad de la tradición babilónica: más bien, resultó que las diversas historias \"babilónicas\" eran de hecho una herencia común de tradiciones en la región que los babilonios en realidad escribieron primero. Particularmente amarga resulta una frase que declara sumariamente el panbabilonismo como pseudociencia: \"Esta sabiduría mística no tiene más significado científico que la 'revelación original' de todas las dimensiones del mundo en la gran pirámide, que lamentablemente todavía encuentra adeptos\"."
 lepsius.1119.g: "Todo empezó en Mesopotamia."
 lepsius.1119.h: "No existe un solo origen."
 lepsius.1121.t: "Congreso Arqueológico: El Estado de Troya"
 lepsius.1121.d: "Nuestra nación ha hecho todos los preparativos pertinentes para la celebración del próximo Congreso Arqueológico. La conferencia tiene como objetivo resolver finalmente la cuestión de Troya. A pesar de las espectaculares excavaciones de Heinrich Schliemann, está totalmente justificada la pregunta de qué encontró realmente Heinrich Schliemann, si realmente era Troya y si Troya existió siquiera en esta forma. Se enviarán invitaciones a los principales arqueólogos del mundo. El profesor [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] presidirá la sesión."
 lepsius.1121.f: "Después de que Schliemann anunciara el descubrimiento de Troya, las mentes más escépticas tardaron algún tiempo en superar su estado de shock. Inspecciones posteriores revelaron no sólo que Schliemann había excavado en la capa equivocada, sino también que el supuesto \"Tesoro de Príamo\" que encontró era mucho más antiguo que la Troya homérica. Pronto se difundió el rumor de que Schliemann podría haberse equivocado de ciudad. Otros insistieron en que no se podía desenterrar nada que no existiera. Otros defendieron el descubrimiento de Schliemann y consideraron que se había aportado la prueba, ya que Schliemann se había basado en descripciones antiguas. Los hallazgos romanos también demostraron que los griegos y los romanos también consideraban este lugar como el lugar de la guerra de Troya. El descubrimiento de Troya no puso fin a la disputa académica, sino que sólo marcó una nueva fase."
 lepsius.1121.g: "El mundo arqueológico debería ser nuestro invitado."
 lepsius.1122.d: "[SCOPE.sCountry('lepsius_congress_host_country').GetName] ha invitado a un congreso de arqueología. La conferencia tiene como objetivo resolver finalmente la cuestión de Troya. A pesar de las espectaculares excavaciones de Heinrich Schliemann, está totalmente justificada la pregunta de qué encontró realmente Heinrich Schliemann, si realmente era Troya y si Troya existió siquiera en esta forma. Nuestro profesor arqueólogo [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] ha recibido una cálida invitación."
 lepsius.1122.g: "Siempre estas discusiones sobre quién tiene las mejores chaquetas de cuero..."
 lepsius.1123.d_laughed: "La aparición del Prof. [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] fue recibida con diversión. [ROOT.GetCountry.GetNameNoFlag] no tiene exactamente la reputación de haber logrado algo sobresaliente en el campo de la Arqueología del Egeo. Claramente hubo bromas a puerta cerrada."
 lepsius.1123.d_respected: "Antes del inicio del Congreso Arqueológico, nuestro arqueólogo fue recibido calurosamente y se intercambiaron las costumbres habituales. [ROOT.GetCountry.GetNameNoFlag] tiene una reconocida reputación en el mundo de la investigación."
 lepsius.1123.d_lauded: "La llegada del Profesor [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] fue recibida con gran alegría. Se le considera uno de los invitados más esperados. Rápidamente se formó una multitud a su alrededor, ya que [ROOT.GetCountry.GetNameNoFlag] es considerado un pionero en el campo de la arqueología del Egeo."
 lepsius.1124.t: "Troya: ¿Solo un mito?"
 lepsius.1124.d: "El debate sobre el estatus de Troya es aún más controvertido de lo esperado. Han surgido no sólo dos, sino tres bandos. El primer grupo está formado por apasionados partidarios de Schliemann que están completamente convencidos de que todas las tesis que él plantea son correctas. A esto se opone un bando contrario irreconciliable que sólo ve muy escasas pruebas de que la Troya homérica tenga algo que ver con el lugar de excavación de Schliemann. Un tercer grupo cree que Schliemann cometió graves errores, pero que en realidad ésta era la ciudad que buscaba."
 lepsius.1124.f: "'Si Schliemann no encontró Troya, ¿qué encontró? Encuentra un lugar que coincide con las descripciones de la Ilíada y de los autores antiguos. Encuentra una estructura que se adapta a esta época. Y nos encontramos con una estructura que parece haber sido destruida por los enemigos. ¿Cuánta evidencia más se necesita? El Prof. [SCOPE.sCharacter('lepsius_troy_defender_scope').GetLastName] comenzó su conferencia, pero luego fue interrumpido por muchas preguntas de su colega [SCOPE.sCharacter('lepsius_troy_attacker_scope').GetLastName]. Por ejemplo, los antiguos griegos ya no sabían dónde estaba situada Troya en el período clásico y ya habían identificado erróneamente este lugar con Troya. Que se desconoce el nombre de la ciudad y no hay pistas de cómo se relacionaba con el mundo griego. Y que nunca ha habido fuentes históricas confiables sobre una guerra de Troya que se parezcan de alguna manera a las descripciones de Homero. Luego intervino el Sr. [SCOPE.sCharacter('lepsius_troy_mediator_scope').GetLastName]: \"Estimados colegas, Schliemann ciertamente ha cometido errores, pero ¿queremos perder de vista el panorama general?\""
 lepsius.1124.g: "Schliemann encontró Troya."
 lepsius.1124.h: "Schliemann sí encontró 'Troya', pero la cuestión es más complicada."
 lepsius.1124.i: "No hay evidencia real de que esto sea realmente Troya."
 lepsius.1129.t_homeric: "Troya: historia, no mito"
 lepsius.1129.t_historical: "Troya: historia y mito"
 lepsius.1129.t_myth: "Troya: mito, no historia"
 lepsius.1129.t_disputed: "Troya: un misterio sin resolver"
 lepsius.1129.d_homeric: "Después de intensos debates y muchas conferencias, el bando de los partidarios de Schliemann, que reconocieron al Ilión homérico en la colina de Hisarlik, logró prevalecer. No sólo la historicidad de Troya, sino también la Guerra de Troya y otros elementos de las epopeyas homéricas se reconocen como realidad histórica."
 lepsius.1129.d_historical: "Los arqueólogos reunidos en el congreso de [SCOPE.sCountry('lepsius_congress_host_country').GetName] llegaron a la conclusión de que al menos partes de la tradición homérica contienen una pizca de verdad. Aunque Schliemann se equivocó en la excavación, hay algunas pruebas que sugieren que Hisarlik corresponde al lugar que generalmente se reconoce como Troya en la literatura y la historiografía; el resto es cuestión de aclarar detalles."
 lepsius.1129.d_myth: "El Congreso llegó a la conclusión de que el debate sobre Troya, después de siglos, ha llegado a su fin: el supuesto descubrimiento de Troya ha reforzado a los críticos, que sospechan aún más fuertemente que las epopeyas homéricas son pura ficción. Lo que sea que Schliemann desenterró, no puede ser Troya porque nunca existió."
 lepsius.1129.d_disputed: "La guerra de trincheras entre académicos ha provocado recientemente una gran desilusión y apatía. No se vislumbra ninguna solución para la cuestión de Troya: ni siquiera pudieron ponerse de acuerdo sobre una declaración final conjunta. Algunos representantes se marcharon temprano, otros perdieron su tiempo con más discusiones inútiles."
 lepsius.1129.f_homeric: "Los partidarios de Schliemann celebran hoy un gran triunfo: enviaron con entusiasmo un telegrama al descubridor de Troya diciéndole que todas sus tesis serían confirmadas e incluso sería nombrado miembro honorario de la sociedad. Definitivamente excavó Troya y así proporcionó evidencia de que la Guerra de Troya de las epopeyas homéricas no fue una invención, ni un vago recuerdo, sino un evento histórico. Ahora es aún más importante buscar en la región del Egeo más artefactos que puedan proporcionar aún más información sobre la época que alguna vez estuvo disfrazada de \"mítica\". El entusiasmo de los investigadores debería garantizar que pronto se llevarán a cabo excavaciones más intensas para respaldar las tesis de Schliemann: ¿quizás pronto se encuentre la casa de Odiseo, la tumba de Aquiles o la bañera en la que mataron a Agamenón? Es sorprendente que Schliemann aún no haya respondido al telegrama..."
 lepsius.1129.f_historical: "Después de largas discusiones y mucha persuasión, fue posible lograr un compromiso entre la mayoría de los miembros del Congreso. La gran mayoría de la asamblea arqueológica internacional opina que Schliemann cometió graves errores al excavar Troya; entre otras cosas, está claro que buscó en el nivel equivocado de las excavaciones. Sin embargo, esto simplemente significa que Schliemann encontró la Troya \"equivocada\" en el lugar \"correcto\". Otra capa puede contener en realidad la ciudad que se remonta a la época de la Guerra de Troya. Los arqueólogos finalmente no pudieron determinar si se trataba de un acontecimiento histórico real; El caso es que la colina en la que se encuentra Troya fue víctima de incendios y guerras varias veces. En cuanto a la identidad de la ciudad, se confirma la tesis de una influencia hitita. Los científicos han anunciado que aprovecharán estos resultados como una oportunidad para realizar investigaciones más intensivas y seguirán discutiendo intensamente la cuestión de Troya."
 lepsius.1129.f_myth: "Después de serias discusiones, los arqueólogos e historiadores, algunos con muchas quejas en el estómago, lograron decidirse a firmar una declaración conjunta. Por lo tanto, ven las epopeyas homéricas sólo como productos literarios que posiblemente se refieren a acontecimientos más antiguos, pero que son difíciles de reconstruir para la arqueología moderna. Más bien, podría ser que la guerra de Troya se considere una \"guerra como tal\" en la que se reflejó la experiencia humana en general. Por lo tanto, Troya podría tener tanto contenido histórico como la Atlántida: una especie de utopía, un lugar literario donde se luchan ideas. En principio, el congreso declaró que la investigación de Troya era una actividad \"al margen de la pseudociencia\" que carecía de sentido y propósito. La arqueología debería avanzar hacia campos más valiosos."
 lepsius.1129.f_disputed: "'¡Bueno, al menos la comida era buena!'"
 lepsius.1129.g: "¡Así que Schliemann realmente encontró Troya!"
 lepsius.1129.h: "Schliemann desenterró la Troya equivocada, pero la ubicación es correcta."
 lepsius.1129.i: "Lo más probable es que Troya sea pura literatura."
 lepsius.1129.j: "¡Todo este congreso fue una completa pérdida de tiempo!"
 lepsius.1201.t: "Sitio de excavación local en [SCOPE.sState('lepsius_excavation_site').GetName]"
 lepsius.1201.d: "[SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName] ha identificado un nuevo sitio de excavación en [SCOPE.sState('lepsius_excavation_site').GetName]. Él y su equipo comenzaron a trabajar inmediatamente. Sin embargo, aún no está claro durante cuánto tiempo se financiará la excavación."
 lepsius.1201.f: "Se puede autorizar una excavación por 5, 7 o 10 años. A diferencia de una excavación que se realiza en el extranjero, ésta no puede cancelarse en ningún momento. El arqueólogo jefe permanecerá en el lugar de la excavación durante 6, 12 o 18 meses, según el plazo, hasta su regreso. No está disponible durante este tiempo."
 lepsius.1201.g: "10 años."
 lepsius.1201.h: "7 años."
 lepsius.1201.i: "5 años."
 lepsius.1202.t: "Prof. [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] regresa del sitio de excavación"
 lepsius.1202.d: "[SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName] ha estado ayudando a montar el sitio de excavación arqueológica en [SCOPE.sState('lepsius_excavation_site').GetName] durante los últimos meses y ha realizado algunos descubrimientos iniciales. Regresa a su universidad para una evaluación, mientras el equipo continúa la excavación de forma independiente durante los próximos años hasta que se agote la financiación."
 lepsius.1202.f: "'En pocos tipos de trabajo los resultados dependen tan directamente de la personalidad del trabajador como en la excavación. El viejo dicho de que un hombre encuentra lo que busca en un tema, es demasiado cierto; o si no tiene suficiente conocimiento para asegurarse de encontrar lo que busca, al menos es tristemente cierto que no encuentra nada que no busque.' -Flinders Petrie"
 lepsius.1202.g: "Bienvenido de nuevo."
 lepsius.1203.t: "Excavación local completada"
 lepsius.1203.d: "El equipo de excavación completó la excavación local y guardó algunos hallazgos finales. Ahora vuelve a estar disponible para otras excavaciones o expediciones."
 lepsius.1203.f: "'Dunkel sind des Schicksals Wege,\nungewiß der Zukunft Stern,\neh ich mich zu Bette lege,\ntrink ich einen Kognak gern.' -Robert Koldewey"
 lepsius.1203.g: "Deberíamos hacer otra excavación pronto."
 lepsius.2000.t: "[SCOPE.sCharacter('lepsius_new_archaeologist_scope').GetLastName] inventa el sistema de las tres edades"
 lepsius.2000.d: "El director del Museo Nacional de Dinamarca, [SCOPE.sCharacter('lepsius_new_archaeologist_scope').GetFullName], ha inventado un sistema para clasificar los hallazgos arqueológicos en los tres períodos #b Edad de Piedra#!, #b Edad de Bronce#! y #b Edad de Hierro#!. ¡Esto es revolucionario para la Arqueología!"
 lepsius.2000.f: "\"Verás, algunos artefactos siempre aparecen juntos y algunos materiales nunca aparecen en la misma excavación. La plata, por ejemplo, sólo se encuentra donde también se encuentran herramientas y armas de hierro. Por otro lado, el oro se puede encontrar tanto con hierro como con bronce. herramientas.\nEs fascinante también que algunos materiales sólo aparecen en ciertas formas de tumbas. Las herramientas de piedra sólo se pueden encontrar con cadáveres no incinerados y tumbas de cámara de piedra. El hierro se encuentra en tumbas de cámara en túmulos.\nTodo esto nos permite Fechamos nuestros hallazgos de manera mucho más precisa. Primero hubo herramientas de piedra, luego herramientas de bronce y sólo después herramientas de hierro.\""
 lepsius.2000.g: "¡Una mente tan grandiosa necesita trabajar para nosotros!"
 lepsius.2000.h: "Puede quedarse en su museo..."
