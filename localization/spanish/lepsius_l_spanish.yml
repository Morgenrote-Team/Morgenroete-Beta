 notification_lepsius_ishtar_normal_transport_notification_name: "Transport of Ishtar Gate Bricks"
 notification_lepsius_ishtar_normal_transport_notification_desc: "A full-size batch of bricks from Mesopotamia has reached the Archaeological Museum today. We gain #G 20.000#! #V Ishtar Gate Bricks#!."
 notification_lepsius_ishtar_normal_transport_notification_tooltip: "#header $notification_lepsius_ishtar_normal_transport_notification _name$#!\n$TOOLTIP_DELIMITER$\n$notification_lepsius_ishtar_normal_transport_notification _desc$"
 notification_lepsius_ishtar_double_transport_notification_name: "Large Transport of Ishtar Gate Bricks"
 notification_lepsius_ishtar_double_transport_notification_desc: "An unusually large number of bricks needed to rebuild the Ishtar Gate have reached the museum today. Apparently the loading in Mesopotamia is progressing better than expected. We gain #G 40.000#! #V Ishtar Gate Bricks#!."
 notification_lepsius_ishtar_double_transport_notification_tooltip: "#header $notification_lepsius_ishtar_double_transport_notification _name$#!\n$TOOLTIP_DELIMITER$\n$notification_lepsius_ishtar_double_transport_notification _desc$"
 notification_lepsius_ishtar_half_transport_notification_name: "Small Transport of Ishtar Gate Bricks"
 notification_lepsius_ishtar_half_transport_notification_desc: "Unknown circumstances have resulted in our ship being only half filled with the bricks of the Ishtar Gate this time. We gain #G 10.000#! #V Ishtar Gate Bricks#!."
 notification_lepsius_ishtar_half_transport_notification_tooltip: "#header $notification_lepsius_ishtar_half_transport_notification _name$#!\n$TOOLTIP_DELIMITER$\n$notification_lepsius_ishtar_half_transport_notification _desc$"
 notification_lepsius_ishtar_bad_transport_notification_name: "Bad Ishtar Gate Bricks"
 notification_lepsius_ishtar_bad_transport_notification_desc: "Unfortunately, when our curators found examined the last bricks from Mesopotamia, they concluded that some of the fragments were completely unusable. We gain #G 5.000#! #V Ishtar Gate Bricks#!."
