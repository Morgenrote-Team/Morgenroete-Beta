 lepsius.1601.t: "Donación de [SCOPE.sCharacter('lepsius_donator_scope').GetLastName]"
 lepsius.1601.d: "[SCOPE.sCharacter('lepsius_donator_scope').GetFullName] es considerado un coleccionista de raras rarezas egipcias. Sus intereses egiptológicos le han llevado a poseer ahora una notable colección. Se ha ofrecido generosamente a donar sus exquisitos artefactos al Museo Arqueológico."
 lepsius.1602.d: "Es un hecho bien conocido que [SCOPE.sCharacter('lepsius_donator_scope').GetFullName] tiene probablemente la colección privada más impresionante de artefactos mesopotámicos. Ha indicado al gobierno que esta colección podría pasar a manos del Estado, aunque algunos observadores críticos advierten que podría exigir algo a cambio."
 lepsius.1603.d: "Puede que [SCOPE.sCharacter('lepsius_donator_scope').GetFullName] no sea considerado el más amante del arte, pero quiso la suerte que descubriera en su propiedad unos tesoros arqueológicos de gran valor que guarda bajo llave desde hace unos años. Como no puede hacer mucho con ellos, ha ofrecido al gobierno donarlos al Museo Arqueológico."
 lepsius.1604.d: "[SCOPE.sCharacter('lepsius_donator_scope').GetFullName] ha realizado varios viajes por Sudamérica en los últimos años, donde ha coleccionado importantes reliquias de las culturas mesoamericana y andina a modo de souvenir. Ahora ha anunciado que quiere donar estos artefactos al museo."
 lepsius.1605.d: "[SCOPE.sCharacter('lepsius_donator_scope').GetFullName] quedó impresionado por las antiguas culturas del Egeo. Ha estado coleccionando artefactos de Creta durante algunos años e incluso trajo un fresco minoico completo a su villa. Sin embargo, conociendo sus obligaciones sociales, decidió donar sus tesoros al pueblo [ROOT.GetCountry.GetAdjectiveNoFlag]."
 lepsius.1601.f: "Numerosas colecciones arqueológicas se remontan a los príncipes del Renacimiento, que coleccionaban objetos de arte antiguos y los compraban a través de comerciantes. En 1824, el rey Carlos Félix adquirió el material de la colección Drovetti (5.268 piezas, entre ellas 100 estatuas, 170 papiros, estelas, momias y otros objetos) que el cónsul general francés, Bernardino Drovetti, había construido durante su estancia en Egipto. Posteriormente se convirtió en la base del Museo Egipcio de Turín. Los empresarios ricos y las élites influyentes también tenían interés en coleccionar símbolos de estatus, que a menudo donaban al público en sus testamentos. A menudo ocurría que las personas no sólo querían mejorar su propia reputación a través de tales donaciones, sino que también esperaban una mejor posición en la sociedad."
 lepsius.1601.g: "¡Una maravillosa donación para nuestro museo!"
 lepsius.1601.h: "Este adulador sólo está tratando de aprovecharse."
 lepsius.1606.t: "Egiptomanía"
 lepsius.1606.d: "Se ha unido un grupo de personas apasionadas por Egipto. El grupo está liderado por [SCOPE.sCharacter('lepsius_esoteric_leader').GetFullName]. Puede que algunos no compartan la admiración casi fanática por el antiguo Egipto, pero la apariencia puede tener ventajas."
 lepsius.1606.f: "Aunque el siglo XIX se considera progresista en muchos aspectos y dominado por el espíritu científico, fue precisamente durante esta época cuando se generalizaron varias formas de fenómenos ocultos y pseudocientíficos. El más conocido de ellos es el espiritismo, que pretendía demostrar la existencia de los espíritus. La investigación arqueológica no sólo inspiró muchas teorías equivocadas, sino también movimientos pseudocientíficos y esotéricos como el panbabilonismo, el mayismo y la creencia en la Atlántida. Aunque tales fenómenos a menudo podían tener un efecto corrosivo sobre la ciencia, ciertos fenómenos gozaron de cierta moda y popularizaron las investigaciones científicas que podían tener efectos secundarios bastante fructíferos."
 lepsius.1606.g: "Que se entreguen a su pequeño culto."
 lepsius.1606.h: "Prohibir esta patraña."
 lepsius.1607.t: "mayismo"
 lepsius.1607.d: "Algunas élites de nuestro país han caído en la extraña idea errónea de que el mundo sigue un calendario antiguo que se remonta a los mayas. Además, este pueblo habría poseído conocimientos que guardan los secretos del universo. Uno podría reírse de estas ideas absurdas si el influyente grupo no estuviera dirigido por [SCOPE.sCharacter('lepsius_esoteric_leader').GetFullName]."
 lepsius.1608.t: "Panbabilonismo"
 lepsius.1608.d: "Un grupo de personas ha causado revuelo en la sociedad y la ciencia al insistir en que todo conocimiento proviene de Babilonia; Incluso las religiones judía y cristiana son una mera imitación. [SCOPE.sCharacter('lepsius_esoteric_leader').GetFullName] también participa en este 'Club de panbabilonistas' que intentan difundir sus ideas."
 lepsius.1608.g: "¡Esto es pseudociencia!"
 lepsius.1608.h: "Excelente."
 lepsius.1609.t: "Atlantismo"
 lepsius.1609.d: "[SCOPE.sCharacter('lepsius_esoteric_leader').GetFullName] lidera un grupo esotérico-pseudocientífico que afirma que la Atlántida no es un mito, sino una ciudad histórica que contaba con tecnología avanzada en la Edad del Hielo. Además, todas las culturas descendieron de la Atlántida. Quiere entrar en contacto con los espíritus de la Atlántida en sesiones espiritistas semanales."
 lepsius.1609.h: "¿Quién puede decir si es verdad o sólo una leyenda?"
 lepsius.1609.i: "Hay pruebas sólidas de la Atlántida."
 lepsius.1610.t: "Inversión Arqueológica"
 lepsius.1610.d: "El director del Museo Arqueológico se ha ofrecido a apoyar la formación de nuevos especialistas. Sin embargo, esto implicaría costos adicionales."
 lepsius.1610.f: "El Instituto ha sabido que el gobierno tiene actualmente un interés particular en promover la arqueología en nuestro país. Un apoyo financiero adicional podría ayudar a contratar asistentes nuevos y prometedores.'"
 lepsius.1610.g: "Dar al museo una inyección financiera adicional."
 lepsius.1610.h: "Eso no vale la pena."
 lepsius.1611.t: "Entradas al museo"
 lepsius.1611.d: "Para cubrir el aumento de los costes, el museo se ve obligado a aumentar el precio de las entradas. El Estado podría apoderarse de los beneficios adicionales. Sin embargo, esto podría perjudicar ligeramente nuestra reputación."
 lepsius.1611.f: "'¡No hay boleto!'"
 lepsius.1611.g: "Aumentar los precios de las entradas."
 lepsius.1611.h: "Bajar los precios de las entradas."
 lepsius.1611.i: "¿Entradas? ¡El museo debería tener entrada gratuita!"
 lepsius.1612.t: "El legado del director [SCOPE.sCharacter('lepsius_director_scope').GetLastName]"
 lepsius.1612.d: "El director del museo [SCOPE.sCharacter('lepsius_director_scope').GetLastName], recientemente fallecido, era un hombre respetable. Gozaba de una excelente reputación científica. Pero un descubrimiento reciente podría empañar su legado."
 lepsius.1612.f: "Una investigación ha demostrado que [SCOPE.sCharacter('lepsius_director_scope').GetFullName] recibió repetidamente donaciones privadas de personas anónimas durante su mandato. Sin embargo, nunca entregó estos artefactos al museo, sino que los guardó para él. Aunque se trata de unas pocas piezas individuales, no son menos valiosas. Toda la Intelligentzia está amenazada por un verdadero escándalo."
 lepsius.1612.g: "¡La verdad debe salir a la luz!"
 lepsius.1612.h: "[SCOPE.sCharacter('lepsius_director_scope').GetFullName] era un hombre honorable."
 je_lepsius_pompeii: "Excavaciones modernas en Pompeya"
 je_lepsius_pompeii_reason: "La antigua ciudad romana de Pompeya, que quedó sepultada por una erupción del Monte Vesubio en el año 79 d.C., ha sido excavada desde el siglo XVIII. Sin embargo, en muchos sentidos, este tipo de exploración puede describirse en gran medida como saqueo, destrucción de material científico para adquirir tesoros artísticos o destrucción de material valioso por pura ignorancia. Los nuevos métodos arqueológicos podrían mejorar significativamente la investigación de Pompeya."
 je_lepsius_teotihuacan: "teotihuacan"
 je_lepsius_teotihuacan_reason: "Teotihuacán ya era considerado por los aztecas un lugar misterioso que había surgido mucho antes de su dominio; para ellos, esta ciudad en ruinas tenía que ser el lugar de nacimiento de los dioses. De hecho, mucha evidencia sugiere que Teotihuacán fue una ciudad antigua que influyó en gran parte de Centroamérica siglos antes del Imperio Azteca y es uno de los sitios precolombinos más grandes de América. Por lo tanto, el gobierno mexicano tiene más que razones científicas para investigar este lugar con más detalle. Teotihuacán puede verse como un símbolo de una larga e ininterrumpida cultura en México y, por tanto, como un precursor de nuestra nación. La reconstrucción de la Pirámide del Sol de Teotihuacán, parcialmente destruida, antes del centenario de la independencia tiene como objetivo subrayar este simbolismo y celebrar la unidad y la historia nacionales."
 je_lepsius_harappa: "La civilización del valle del Indo"
 je_lepsius_harappa_reason: "Aunque el sitio de las ruinas de Harappa se conoce desde hace algún tiempo y fue descrito por primera vez por Charles Masson en 1844 en su libro 'Narrativa de varios viajes en Baluchistán, Afganistán y el Panjab' como 'una fortificación en ruinas construida con ladrillos', su importancia es todavía no está del todo aclarado. ¿Quizás también en la India existan tesoros arqueológicos hasta ahora completamente desconocidos?"
 je_lepsius_first_emperor: "La tumba del primer emperador"
 je_lepsius_first_emperor_reason: "China es una nación joven en el campo de la arqueología. Nuestros investigadores necesitan salir al mundo y adquirir experiencia para profundizar sus conocimientos. Sólo cuando tengamos suficiente éxito y nuestros arqueólogos estén lo suficientemente capacitados podremos intentar la mayor aventura arqueológica: examinar la tumba del Primer Emperador, una tarea que nadie se ha atrevido todavía a emprender."
 lepsius.7.t: "La excavación de Pompeya"
 lepsius.7.d: "En Pompeya se probarán nuevos métodos científicos bajo la dirección del Prof. [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName]. Este es un punto de inflexión en la historia de las excavaciones de Pompeya. Sin embargo, aún queda por decidir el enfoque de la investigación."
 lepsius.7.f: "Las excavaciones de Giuseppe Fiorelli abrieron un nuevo capítulo en el estudio y excavación de Pompeya. Durante las primeras excavaciones del sitio, se encontraron huecos ocasionales en la capa de ceniza que contenían restos humanos. Fiorelli se dio cuenta de que se trataba de espacios dejados por los cuerpos en descomposición y ideó la técnica de inyectarles yeso para recrear las formas de las víctimas del Vesubio. Esta técnica todavía se utiliza hoy en día, y ahora se utiliza una resina transparente en lugar de yeso porque es más duradera y no destruye los huesos, lo que permite análisis más detallados. Fiorelli también presentó documentación científica. Dividió la ciudad en las nueve zonas y bloques actuales y numeró las entradas de las casas individuales. Fiorelli también publicó el primer periódico con informes de excavaciones. Bajo sus sucesores, toda la sección oeste de la ciudad quedó expuesta."
 lepsius.7.g: "Estamos interesados ​​principalmente en los artefactos."
 lepsius.7.h: "Necesitamos saber más sobre el pasado."
 lepsius.7.i: "Queremos formar una nueva generación de científicos."
 lepsius.8.t: "La Pirámide del Sol de Teotihuacán"
 lepsius.8.d: "[SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName] mira el panorama de Teotihuacán desde el punto más alto de la pirámide reconstruida: este prestigioso proyecto ha superado un obstáculo importante, pero aún no está claro qué beneficio concreto obtendrá el país de las excavaciones."
 lepsius.8.f: "Teotihuacán, en el Altiplano Central de México, es una de las metrópolis en ruinas prehistóricas más importantes de América, mejor conocida por sus templos escalonados, como la Gran Pirámide del Sol. La zona de Teotihuacán estuvo habitada permanentemente desde el siglo VI a.C. Entre el 100 y el 650 d.C., la ciudad fue el centro cultural, económico y militar dominante de Mesoamérica. En el apogeo de su desarrollo pudo haber llegado a tener hasta 200.000 habitantes. En su época, era, con diferencia, la ciudad más grande del continente americano y una de las más grandes del mundo. Desde aproximadamente el año 650 su importancia disminuyó hasta que alrededor del año 750 fue abandonado en gran medida por razones que no se comprenden del todo. Sus influencias culturales continuaron dando forma al centro de México hasta la conquista española de México."
 lepsius.9.t: "Una civilización desconocida"
 lepsius.9.d: "[SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName] está completamente asombrado. Parece que ha encontrado vestigios de una cultura hasta entonces completamente desconocida que se asentó en el valle del Indo hace miles de años y que, por tanto, sería cuna de civilizaciones como Egipto o Babilonia. Quedan pendientes décadas de investigación, pero ¿cuáles son las prioridades?"
 lepsius.9.f: "La civilización del Indo de la Edad del Bronce, también conocida como civilización del Indo o cultura Harappa, fue una de las primeras civilizaciones urbanas. Existió aproximadamente entre el 2800 a. C. y el 1800 a. C. a lo largo del Indo en el noroeste del subcontinente indio. La civilización del Indo se extendió por casi todo lo que hoy es Pakistán, así como por partes de India y Afganistán. En 1912, J. Fleet encontró focas con caracteres desconocidos en la entonces India británica, lo que despertó el interés del público científico en Europa. Luego se llevaron a cabo excavaciones en Harappa y Mohenjo-Daro en 1921/22 bajo la dirección de John Marshall, entonces director del Servicio de Antigüedades Británico. La similitud de las dos ciudades excavadas rápidamente dejó claro que aquí se había descubierto una cultura avanzada hasta ahora desconocida."
 lepsius.70.t: "Un ejército de terracota"
 lepsius.70.d: "[SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName] hizo un descubrimiento sorprendente cuando examinó el área alrededor del mausoleo del primer emperador Qin: un ejército hecho enteramente de terracota que defiende al emperador muerto hasta el día de hoy."
 lepsius.70.f: "'En el noveno mes, el Primer Emperador fue enterrado en el Monte Li. Los trabajos de excavación y preparación en el Monte Li comenzaron cuando el Primer Emperador subió al trono por primera vez. Más tarde, después de unificar su imperio, fueron enviados allí 700.000 hombres de todo su imperio. Excavaron tres capas de agua subterránea y vertieron bronce para el ataúd exterior. Se construyeron palacios y torres escénicas para cien funcionarios, y la tumba se llenó de artefactos raros y tesoros maravillosos. A los artesanos se les ordenó fabricar ballestas y flechas preparadas para disparar a cualquiera que entrara en la tumba. Se utilizó mercurio para simular los cien ríos, el Yangtze, el río Amarillo y el gran mar, y se puso a fluir mecánicamente. Arriba estaban las representaciones de las constelaciones celestiales, abajo, las características de la tierra. Las velas estaban hechas de grasa de \"hombre-pez\", que está calculada para arder y no apagarse durante mucho tiempo. -Sima Qian"
 lepsius.70.g: "La antigua grandeza de China es asombrosa."
 lepsius.61.t: "La excavación en [SCOPE.sState('lepsius_excavation_state').GetName]"
 lepsius.61.d: "Durante la ocupación de [SCOPE.sState('lepsius_excavation_state').GetName] cayeron en nuestras manos equipos y artefactos arqueológicos. Los arqueólogos insisten en no interrumpir el trabajo científico y en proteger el lugar de la excavación. Algunos oficiales, sin embargo, insisten en que debemos ayudarnos nosotros mismos con el botín."
 lepsius.61.f: "Desgraciadamente, no es infrecuente el saqueo de importantes yacimientos de excavación. Los ejércitos que se acercaban no siempre estuvieron a la altura de su reputación de preservar y proteger los tesoros artísticos. En algunos casos, fue sólo la exposición a la perspectiva de regresar con un botín adicional lo que despertó los deseos de hombres ambiciosos: ¿por qué lo que era cierto en la época de Sila debería ser diferente hoy?"
 lepsius.61.g: "¡Saquea el sitio de excavación!"
 lepsius.61.h: "Proteger el sitio de excavación."
 lepsius.62.t: "¡Sitio de excavación saqueado!"
 lepsius.62.d: "La guerra en uno de nuestros países de excavación ha dejado su huella: tropas enemigas han ocupado la región en la que se está investigando un sitio arqueológico y han confiscado sumariamente los artefactos que nuestro equipo encontró allí, dejando tras de sí un rastro de destrucción."
 lepsius.62.f: "Los sitios de excavación arqueológica pueden convertirse en víctimas de la guerra y la destrucción; esto también afecta a los equipos arqueológicos neutrales que no forman parte como tercero de una nación beligerante. Las naciones rapaces pueden entonces hacer uso de los artefactos que aún no han sido devueltos a sus respectivos países de origen. No se preocupe: el equipo de excavación permanece en el lugar y la excavación no se pierde. Sin embargo, pasarán tres años hasta que los arqueólogos hayan reparado los daños hasta tal punto que sea posible volver a realizar operaciones normales. Durante este tiempo, ningún artefacto anual de este sitio arqueológico llegará a nuestros museos."
 lepsius.62.g: "¡Estos bárbaros!"
 lepsius_excavation_sacked_state_modifier: "Sitio Arqueológico Saqueado"
 lepsius_excavation_protected_state_modifier: "Sitio Arqueológico Protegido"
 lepsius_4_excavation_team_needed_tt: "Contar con al menos #G 4#! Equipos de excavación."
 lepsius.2101.t: "Restos de una batalla romana"
 lepsius.2101.f: "\"¡Señor, encontré otro clavo!\"\n\ \"¡Fabuloso! ¡Esto refuerza la teoría de que este lugar fue el escenario de una antigua batalla! ¡Espero que pronto encontremos algunos huesos también!\""
 lepsius.2101.g: "¡No es un descubrimiento prestigioso, pero sí importante!"
 lepsius.2102.t: "Villa Rústica descubierta"
 lepsius.2102.f: "\"Una Villa Rústica no era sólo un importante productor de productos agrícolas, alimentos y bebidas. Además permitía a los viajeros descansar en sus viajes y contribuía decisivamente al abastecimiento de las legiones. Esos restos nos permiten sacar conclusiones sobre la producción de alimentos y la vida de los romanos. y la agricultura en el Imperium Romanum.\""
 lepsius.2102.g: "¡Esto nos dirá mucho sobre la vida de los romanos rurales!"
 lepsius.2103.t: "Se descubren tablillas romanas antiguas"
 lepsius.2103.f: "Claudia Severa a su saludo Lepidina.\nEl 11 de septiembre hermana, por el día de la celebración de mi cumpleaños, te hago una cordial invitación para que vengas a nosotros, para hacerme más agradable el día con tu llegada. , si estás presente. Saluda de mi parte a tu Cerialis. Mi Elio y mi pequeño hijo le envían sus saludos.\nTe espero, hermana. Adiós, hermana, mi alma más querida, mientras espero prosperar, y saludos.\nA Sulpicia Lepidina, esposa de Cerialis, de Cl. Severa."
 lepsius.2103.g: "¡No todos los tesoros están hechos de plata y oro!"
 lepsius.2104.t: "Tesoro de monedas romanas descubierto"
 lepsius.2104.d: "Los tesoros de monedas romanas son un hallazgo poco común. No obstante, se encontró uno en [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]. El Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] pudo recuperar el tesoro que probablemente estuvo escondido durante una época de crisis para el Imperium Romanum."
 lepsius.2104.f: "\"Me pregunto si en el futuro los arqueólogos encontrarán algún día monedas dejadas por nosotros y se preguntarán cómo terminaron allí\"."
 lepsius.2104.g: "¡Mi precioso!"
 lepsius.2111.t: "Sarcófago persa antiguo"
 lepsius.2111.f: "\"Cuidado, cuidado. No podemos permitir que este hallazgo se dañe. ¡Por favor, absténgase de usar una palanca sobre él!\""
 lepsius.2111.g: "¡Qué hallazgo tan sorprendente!"
 lepsius.2112.t: "Tesoro en Palacio Persa"
 lepsius.2112.d: "La pista de un granjero ha llevado a [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullName] a un palacio persa perdido del período aqueménida. Durante la excavación posterior hubo una sorpresa."
 lepsius.2112.f: "Mesopotamia fue una de las provincias centrales del antiguo Imperio Persa. Durante la conquista, los aquemínidas trajeron a su tierra numerosas obras de arte, así como tablillas cuneiformes. Sin embargo, fue sorprendente para el equipo arqueológico descubrir un archivo completo de tablillas mesopotámicas en una sección del palacio que encontraron."
 lepsius.2112.g: "¡Colecciónalos todos!"
 lepsius.2113.t: "Estatua egipcia en tumba persa"
 lepsius.2113.d: "Una pequeña excavación en la tumba de un noble persa ha descubierto una pequeña figura del dios egipcio Thoth."
 lepsius.2113.f: "Los persas gobernaron Egipto durante más de un siglo. Pero incluso antes y después hubo un intercambio cultural entre las dos civilizaciones, aunque la guerra fuera común entre ambos imperios."
 lepsius.2113.g: "¿Cómo llegó el artefacto aquí?"
 lepsius.2114.t: "Inscripción monumental"
 lepsius.2114.d: "Un deslizamiento de tierra ha descubierto una inscripción rocosa monumental en una montaña que antes se creía perdida. El Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] se dispuso directamente a evaluar el antiguo informe."
 lepsius.2114.f: "Las inscripciones o relieves rupestres persas tienen un lugar permanente en el arte del imperio caído. La más famosa es la inscripción de Behistun, que es una inscripción real aqueménida multilingüe y un gran relieve rocoso en un acantilado en el monte Behistun en la provincia de Kermanshah en Irán, establecida por Darío el Grande. Fue importante para el desciframiento de la escritura cuneiforme, ya que es la inscripción cuneiforme trilingüe más larga conocida, escrita en persa antiguo, elamita y babilónico (una variedad del acadio)."
 lepsius.2114.g: "¡Una importante fuente primaria sobre la historia persa!"
 lepsius_state_trait_tikal: "Tikal - City in the Jungle\n#G +1#! @lepsius_local_minor! Local Artifact from Archaeological Projects"
 je_lepsius_tikal: "Tikal - Ciudad en la Selva"
 je_lepsius_tikal_reason: "La expedición de Stephens y Catherwood generó gran interés, particularmente después de que un libro incluyera numerosas ilustraciones de ciudades mayas perdidas. Pero los dos aventureros no habían encontrado todos los lugares. Numerosos sitios desconocidos aún esperaban ser redescubiertos. Uno de ellos fue el legendario Tikal."
 lepsius.71.t: "Tikal - Ciudad en la Selva"
 lepsius.71.d: "Después de una laboriosa búsqueda en las profundidades de las selvas de Guatemala, una expedición dirigida por el Prof. [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] ha encontrado la legendaria ciudad maya de Tikal. Un acontecimiento histórico para nuestra nación, pero ¿qué conclusión deberíamos sacar de él?"
 lepsius.71.f: "Tikal es una antigua ciudad maya en las selvas tropicales de Petén, en el norte de Guatemala, con notables templos escalonados. Fue una de las ciudades más importantes del período Clásico Maya (siglos III al IX) y es una de las ciudades mayas mejor investigadas. Los primeros vestigios de asentamiento se remontan a principios del primer milenio antes de Cristo. En el siglo II, el verdadero desarrollo urbano comenzó con la construcción de templos, estelas y complejos palacio-templo. Un primer punto culminante se alcanzó en el siglo V, cuando una poderosa dinastía gobernante sometió un pequeño estado tras otro en el vecindario y los convirtió en reinos vasallos, lo que resultó en un conflicto a largo plazo con el poderoso estado vecino de Calakmul. Tikal experimentó un segundo apogeo en el siglo VIII después de que Calakmul fuera derrotado como rival. A principios del siglo IX, el poder de Tikal decayó y cesó la construcción. A más tardar en el siglo X, la ciudad estaba completamente desierta."
 LEPSIUS_NO_MORE_EXPEDITIONS_FOR_YEARS_TT: "Usted #n no#! podrá realizar ningún [Concept('concept_lepsius_expedition','$concept_lepsius_expeditions$')] durante #n de 3 a 5 años#!, ya que su [concept_lepsius_archaeologist] estará ocupado catalogando los hallazgos."
 LEPSIUS_SUB_TEAM_WITH_EXPLANATION_TT: "Pierde #R 1#! [Concept('concept_lepsius_archaeological_team','$concept_lepsius_excavation_team$')]. Puedes recuperarlo #p#! después de [concept_lepsius_expedition] o dejarlo allí durante [concept_lepsius_excavation] si investigaste #V Tecnología de arqueología temprana#!."
 lepsius_long_expedition_tt: "Una [concept_lepsius_expedition] larga tardará aproximadamente #V 1 año#!. Después de la expedición, [concept_lepsius_archaeologist] tendrá que catalogar los hallazgos y usted #p no#! podrá realizar otra expedición durante #n 5 años#!."
 lepsius_medium_expedition_tt: "Un medio [concept_lepsius_expedition] tardará aproximadamente #V 10 meses#!. Después de la expedición, el [concept_lepsius_archaeologist] tendrá que catalogar los hallazgos y usted #p no#! podrá realizar otra expedición durante #n 4 años#!."
 lepsius_short_expedition_tt: "Una [concept_lepsius_expedition] corta tardará aproximadamente #V 8 meses#!. Después de la expedición, [concept_lepsius_archaeologist] tendrá que catalogar los hallazgos y usted #p no#! podrá realizar otra expedición durante #n 3 años#!."
 lepsius_leave_team_for_excavation_tt: "Dejarás que tu [Concept('concept_lepsius_archaeological_team','$concept_lepsius_excavation_team$')] configure un [concept_lepsius_excavation] que normalmente producirá #V 1#! [concept_lepsius_artifact] #V anualmente#!."
 lepsius.2101.d: "Cuando un ciudadano encontró una daga de hierro en [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName], [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullName] reunió un equipo y comenzó una excavación. Encontraron diversos restos de una antigua batalla romana, que van desde partes de un escudo hasta clavos y algunas monedas. Las monedas permitieron a los arqueólogos fechar la batalla con bastante precisión."
 lepsius.2102.d: "Un agricultor encontró restos antiguos en uno de sus campos. Afortunadamente se puso en contacto con la Universidad y el Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] pudo descubrir una antigua Villa Rústica en [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]. La variedad de hallazgos arqueológicos permite sacar conclusiones sobre la vida de la población romana en el campo."
 lepsius.2103.d: "Los arqueólogos celebran el descubrimiento de varias tablillas romanas hechas de madera fina en [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]. Aunque el Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] sólo pudo encontrar el significado de unas pocas tablillas con los métodos actuales, también esas pocas tablillas abren una ventana a la vida romana."
 lepsius.2111.d: "En [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] se realizó un hallazgo extraordinario del antiguo Imperio Persa. Un granjero encontró un viejo sarcófago de bronce y se puso en contacto con el Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]. Gracias a [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] eypertise, el Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] pudo abrir el sarcófago y descubrió un esqueleto cubierto de lujosas joyas. Las joyas sugieren que se trataba de un dignatario aqueménida."
 je_lepsius_dreamtime: "El tiempo de los sueños"
 je_lepsius_dreamtime_reason: "El etnólogo británico Walter Baldwin Spencer y su colega australiano Francis James Gillen tradujeron la palabra alcheringa del idioma de Australia Central Arrernte como soñar. Para los aborígenes, el tiempo de los sueños trata sobre el orden espiritual, natural y moral del cosmos. En este contexto, soñar significa la capacidad colectiva de comprender y utilizar correctamente el mundo y sus conexiones, reflexionar sobre el mundo mítico en el marco de un acto de culto y tener fuerza vital. Varios lugares de culto relacionados con este tiempo del sueño, otros mitos aborígenes y restos arqueológicos y antropológicos se encuentran repartidos por toda Australia. Es hora de examinar a fondo el pasado del último continente."
 lepsius_2_excavation_team_needed_tt: "Contar con al menos #G 2#! Equipos de excavación."
 lepsius.72.t: "Hora de soñar"
 lepsius.72.d: "During their journey throughout Australia, the Professors [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] and [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName] have carried out valuable scientific research that sheds light on the continent's previously unexplored past."
 lepsius.72.f: "A su regreso, los científicos sorprendieron a la Sociedad Académica con toda una serie de hallazgos impresionantes. Hicieron dibujos y bocetos de pinturas rupestres, trajeron huesos de miles de años de antigüedad, recuperaron artefactos de la historia antigua y reciente y registraron los mitos y las historias de los aborígenes. Ninguno de los compañeros hubiera esperado un botín tan rico."
 lepsius.72.g: "¡Ah, incluso hay un didgeridoo!"
 je_lepsius_gwanggaeto: "La estela de Gwanggaeto"
 je_lepsius_gwanggaeto_reason: "La Estela de Gwanggaeto es una piedra en memoria de Gwanggaeto, que fue rey de Goguryeo desde el año 391 hasta su muerte. La estela se encuentra en China, cerca de la frontera con Corea del Norte. La inscripción tallada en la estela es la fuente más antigua y detallada que se conserva sobre la historia del Reino de Goguryeo. Cuando el Reino de Goguryeo y su sucesor Balhae cayeron en 668, la región alrededor de Guonei y Wandu perdió importancia. Después de la conquista manchú del Imperio chino en 1644, los emperadores de la nueva dinastía Qing declararon zona restringida una amplia zona al norte del río Yalu. No fue hasta la segunda mitad del siglo XIX que la zona volvió a abrirse al asentamiento. Alrededor de 1876, un funcionario chino redescubrió la estela, que estaba completamente cubierta de maleza y parcialmente hundida en el suelo."
 lepsius_gwanggaeto_modifier: "Legado de Goguryeo"
 lepsius.73.t: "Estela de Gwanggaeto"
 lepsius.73.d: "El descubrimiento accidental de una gran estela de la época del imperio perdido de Goguryeo no sólo permite vislumbrar un pasado previamente desconocido, sino que también plantea acertijos, acertijos que contienen explosivos políticos."
 lepsius.74.t: "Goguryeo: un imperio coreano"
 lepsius.74.d: "Después del descubrimiento de una estela dedicada al rey Gwanggaeto, China ha afirmado audazmente que esto era evidencia de que Goguryeo no era un estado coreano, sino un estado chino, o al menos un estado dependiente de China. Japón, sin embargo, afirma que esto demuestra el dominio japonés en el sur de Corea."
 lepsius.75.t: "La invasión de Wa"
 lepsius.75.d: "El recientemente descubierto Gwanggaeto Stelo proporciona evidencia de una exitosa invasión japonesa de Corea del Sur y la subyugación de los estados allí."
 lepsius.73.f: "The stele discovered by [SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName] is a massive monument, possibly even the largest stele in existence in the world. Although it is a unique source for constructing the history of the Goguryeo state in northern Korea and southern Manchuria, difficult-to-read parts, as well as the dispute over the identity of the Goguryeo Kingdom, have political consequences that cannot be dismissed, especially in one Time when nationalism also awakened in the Far Eastern states. The Goguryeo Kingdom shares deep historical and cultural ties with modern Korean ethnic groups, but China is not unreasonably concerned that the multi-ethnic part of southern Manchuria, which was a center of Goguryeo, could be claimed by irredentist Korean nationalists. On the other hand, a passage about a possible invasion by Japan (Wa) has given rise to speculation about Japanese rule in South Korea, while the Korean interpretation argues for an invasion of Japan by Korean states."
 lepsius.73.g: "Un pasado instructivo que vale la pena descifrar."
 lepsius.73.h: "Goguryeo era un importante estado chino."
 lepsius.73.i: "Esto pone de relieve que Manchuria del Sur era originariamente tierra coreana."
 lepsius.73.j: "Una pista de la influencia japonesa en Corea."
 lepsius.2131.t: "Fragmentos de cráneo encontrados en un asentamiento azteca"
 lepsius.2131.d: "En [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] se hizo un descubrimiento espantoso. Varios fragmentos de cráneo llevaron al Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] a creer que allí se encontraba un Tzompantli, un estante para cráneos."
 lepsius.2131.f: "Los aztecas tendían a sacrificar a los cautivos de las Guerras de las Flores. A menudo, los cráneos de esos sacrificios humanos se recolectaban en un Tzompantli o estante de cráneos. A menudo, los cráneos simplemente se apilaban unos sobre otros para crear una especie de pared de cráneos. Algunos templos incluso tienen paredes de piedra en las que los canteros tallaron calaveras como decoración."
 lepsius.2131.g: "¡Que cruel!"
 lepsius.2132.t: "Inscripción azteca salvada por un erudito local"
 lepsius.2132.d: "Cuando se reemplazó un pavimento en [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName], nadie pensó que las piedras del pavimento revelarían un descubrimiento arqueológico, pero un erudito local encontró varias inscripciones aztecas en las piedras. El profesor [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] fue llamado al lugar y pudo guardar las inscripciones."
 lepsius.2132.f: "El hallazgo representa una especie de batalla librada por los mexicas. Aún no estamos seguros de qué significa todo el náhuatl, pero hay muchos topónimos. Así al menos podremos averiguar qué lugares se mencionan."
 lepsius.2132.g: "Gracias a Dios pudo encontrarlo antes de que terminara como pavimento."
 lepsius.2133.t: "Ruinas aztecas descubiertas"
 lepsius.2133.d: "Se descubrieron antiguas ruinas aztecas en [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]. El profesor [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] inició inmediatamente las excavaciones. Lamentablemente no había mucho que encontrar excepto los propios edificios."
 lepsius.2133.f: "\"Aunque las ruinas ya fueron saqueadas, permiten conocer la vida de los mexicas antes de la llegada de los europeos. ¡Esto sigue siendo un hallazgo importante para nosotros!\""
 lepsius.2133.g: "Interesante."
 lepsius.2134.t: "Espejo de obsidiana descubierto"
 lepsius.2134.d: "En [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] se descubrió una obra maestra de la artesanía azteca. El Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] pudo recuperar un espejo de obsidiana perfecto utilizado por los aztecas en sus rituales religiosos."
 lepsius.2134.f: "\"Se creía que los espejos de obsidiana eran un medio para comunicarse con el inframundo. Incluso se representó a un dios, Tezcatlipoca, con un espejo en lugar de un pie. ¡Este es un gran hallazgo arqueológico!\""
 lepsius.2134.g: "¡Increíble!"
 lepsius.2141.t: "Descubierto un naufragio cartaginés"
 lepsius.2141.d: "Los buceadores de perlas descubrieron en [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] un antiguo naufragio cartaginés. El Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] decidió que el barco permanecería en el mar por el momento, pero gracias a los buzos se pudo analizar y registrar la carga, lo que permitió obtener nuevos conocimientos sobre las rutas comerciales cartaginesas."
 lepsius.2141.f: "\"Hay mucha tela morada, que probablemente estaba destinada a la nobleza de varios países\"."
 lepsius.2141.g: "¡Los mayores comerciantes del Mediterráneo!"
 lepsius.2142.t: "Buque de guerra púnico varado"
 lepsius.2142.d: "Quién hubiera pensado que los cartagineses, los dueños del mar, quedaron varados. Bueno, aparentemente sucedió en [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]. El Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] pudo recuperar muchos hallazgos del otrora poderoso barco de guerra. Sin embargo, la madera ya estaba prácticamente descompuesta."
 lepsius.2142.f: "\"¿Es esto un Bireme, un Trireme, un Quinquireme o un reme aún más?\""
 lepsius.2142.g: "¡Un barco que alguna vez fue magnífico!"
 lepsius.2143.t: "Puerto púnico descubierto"
 lepsius.2143.d: "En [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] se descubrió un antiguo puerto de Cartago. El profesor [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] ordenó una investigación exhaustiva del lugar. Lamentablemente sólo se pudieron recuperar piezas, ya que un rico industrial quería construir allí inmediatamente una nueva fábrica."
 lepsius.2143.f: "\"Al menos pudimos encontrar algunas ánforas. Seguramente nos dirán mucho sobre el antiguo comercio mediterráneo.\""
 lepsius.2143.g: "¡Todo un puerto desconocido! ¡Qué descubrimiento!"
 lepsius.2144.t: "Descubren monedas de la antigua Cartago"
 lepsius.2144.d: "Un granjero desenterró un tesoro de monedas antiguas en [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]. Lamentablemente, ni siquiera una investigación exhaustiva realizada por el Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] proporcionó más artefactos púnicos. Es un misterio cómo terminaron las monedas en este campo."
 lepsius.2144.f: "\"Esta moneda representa a Asdrúbal, hermano de Aníbal. Obviamente debe ser una moneda relativamente nueva\"."
 lepsius.2144.g: "¡Soy rico ahora!"
 lepsius.2151.t: "Caldero celta descubierto"
 lepsius.2151.d: "Los celtas usaban calderos por muchas razones. Ahora uno de esos enormes calderos fue encontrado en [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]. El profesor [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] logró incorporar esta enorme pieza de metal a nuestra colección."
 lepsius.2151.f: "\"Existe una leyenda que cuenta que un gran guerrero cayó en un caldero lleno de una poción mágica que otorga a todos los que beben de ella una fuerza inhumana. Al parecer, ese guerrero era tan fuerte que podía levantar rocas enormes. También le encantaba luchar contra los romanos.\""
 lepsius.2151.g: "¡Espero que nadie haya caído todavía en el Caldero Mágico!"
 lepsius.2152.t: "Cubierta de escudo de bronce celta encontrada"
 lepsius.2152.d: "En el lecho fangoso de un río en [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] se encontró una placa de bronce. Cuando llegó el Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName], [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] pudo determinar que la placa de metal alguna vez fue parte de un escudo celta."
 lepsius.2152.f: "\"Algunas historias dicen que los jefes celtas eran llevados en escudos, pero eso es sin duda una historia de niños. Sin embargo, Tácito nos cuenta acerca de los jefes que fueron levantados sobre un escudo cuando fueron declarados nuevos jefes. Esta podría ser la fuente histórica por esas historias.\""
 lepsius.2152.g: "¡Un escudo digno de un gran jefe!"
 lepsius.2153.t: "Casco celta de bronce recuperado"
 lepsius.2153.d: "Se encontró un casco de bronce con cuernos en [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]. El profesor [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] determinó rápidamente que en realidad no se trataba de un casco usado en la batalla, sino de un objeto de culto celta."
 lepsius.2153.f: "\"Es posible que hayas visto representaciones de celtas con cascos con alas o cuernos, pero esas representaciones están equivocadas. En una batalla, un casco así habría sido un obstáculo. Tales cascos existían, pero a menudo eran solo objetos de culto que se referían a ciertos dioses celtas.\ \""
 lepsius.2153.g: "What a magnifcient helmet!"
 lepsius.2154.t: "Descubierto el antiguo menhir"
 lepsius.2154.d: "En una de las caminatas de [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] por el campo, el Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] encontró una piedra extraña en [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]. Resultó que se trata de un menhir celta que una vez erigió la tribu celta local. Ahora el Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] está estudiando el Menhir a fondo."
 lepsius.2154.f: "\"No sabemos por qué los celtas erigieron menhires, ya que no dejaron testimonios escritos. Pero bien podría ser una especie de lugar de culto. Algunos lugareños tienen su propia historia sobre un famoso guerrero y su poderoso perro. Este Obelix aparentemente hizo perfectamente Formó menhires y los erigió sin ninguna ayuda. Sin embargo, esa es sólo una historia tonta."
 lepsius.2154.g: "¿Fue esto obra de Obelix?"
 lepsius.2161.t: "Fresco del Egeo encontrado"
 lepsius.2161.d: "A local excavation of an Aegean ruin unearthed a magnificent fresco in [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]. Professor [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] ordered drawings of the find to be produced as the fresco is connected to the ruins."
 lepsius.2161.f: "\"¡Esos patrones son increíbles! ¡Ojalá pudiéramos crear tanta belleza en la era actual!\""
 lepsius.2161.g: "¡Esto es arte!"
 lepsius.2162.t: "Ruinas del Egeo descubiertas"
 lepsius.2162.d: "Durante las obras de construcción en [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] se descubrieron unas antiguas ruinas del mar Egeo. El Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] comenzó con una investigación exhaustiva del sitio. Lamentablemente no quedan muchos hallazgos, pero las ruinas pueden ayudar a comprender la vida de las personas que alguna vez vivieron aquí."
 lepsius.2162.f: "\"Esos arcos están aquí desde hace milenios. Me pregunto si nuestros edificios sobrevivirán tanto tiempo...\""
 lepsius.2162.g: "Esto nos dirá mucho sobre la vida en el antiguo Egeo."
 lepsius.2163.t: "Joyas del Egeo desenterradas"
 lepsius.2163.d: "En un golpe de buena suerte, un granjero tropezó con un hallazgo fascinante en [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]. Cuando llegó el profesor [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName], [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] sólo pudo maravillarse con las fascinantes joyas del Egeo."
 lepsius.2163.f: "\"Qué joyas tan bonitas. ¡Ojalá pudiéramos crear piezas de joyería similares hoy!\""
 lepsius.2163.g: "¡Maravillosa artesanía!"
 lepsius.2164.t: "Copa de Oro de Origen Egeo"
 lepsius.2164.d: "El Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] pudo descubrir una copa de oro en uno de nuestros sitios de excavación locales. Nadie hubiera esperado un hallazgo tan maravilloso, pero aparentemente, [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]. todavía ofrece muchas oportunidades para grandes hallazgos."
 lepsius.2164.f: "\"La copa representa una escena con un hombre y varios toros. Los toros son bastante dinámicos y se encuentran en diferentes posturas.\""
 lepsius.2164.g: "¡Me gustaría una taza como esta!"
 lepsius.2171.t: "Pinturas murales egipcias"
 lepsius.2171.d: "El profesor [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] encontró pinturas murales del antiguo Egipto en uno de los viajes de [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] a [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]. Las pinturas murales representan escenas del antiguo Egipto."
 lepsius.2171.f: "\"Lo fascinante es que las paredes todavía tienen pinturas, mientras que en Grecia todo es blanco. Pero aparentemente los egipcios eran mucho más aficionados a los colores o el desierto conservaba mejor los colores intactos\"."
 lepsius.2171.g: "¡Fotos maravillosas!"
 lepsius.2172.t: "Desenterrado un antiguo templo egipcio"
 lepsius.2172.d: "¿Quién hubiera pensado que todavía quedan templos desconocidos en [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]? Aparentemente sí los hay y el profesor [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] encontró uno debajo de la arena. Es un gran hallazgo, aunque todo lo de valor desapareció hace mucho tiempo."
 lepsius.2172.f: "\ \"¡Mira este templo! ¿Te imaginas las ceremonias religiosas que tienen lugar aquí? ¿No es asombroso? \""
 lepsius.2172.g: "¡Hay mucho que aprender aquí!"
 lepsius.2173.t: "Estatua egipcia recuperada"
 lepsius.2173.d: "Aunque la estatua está rota, sigue siendo una gran obra de un cantero egipcio desconocido. La estatua encontrada en [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] probablemente solía representar un halcón antes de romperse. Al menos eso es lo que cree el Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]."
 lepsius.2173.f: "\"¡Puede que no parezca mucho, pero esta estatua nos dirá mucho sobre cómo los egipcios elaboraban tales estatuas!\""
 lepsius.2173.g: "¡Esas son obras fantásticas de canteros!"
 lepsius.2174.t: "Momia egipcia descubierta"
 lepsius.2174.d: "Las momias son probablemente uno de los hallazgos más comunes en Egipto. Este se encontró en [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]. El profesor [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] empezó a examinarlo con mucho cuidado, pero algunas personas tienen... otras ideas."
 lepsius.2174.f: "\"Imagínense si pudiéramos usar estas momias para descubrir qué comían los habitantes del antiguo Egipto, qué bebían y qué tan saludables eran. ¡Eso sería fantástico!\""
 lepsius.2174.g: "La muerte es solo el principio."
 lepsius.2174.h: "¡Escuché que a algunas personas les gusta comer momias! ¡Vendámoslo!"
 lepsius.2181.t: "Se descubre el lugar de la batalla helénica"
 lepsius.2181.d: "Las Guerras de los Diadochi arrasaron muchas zonas del mundo. En [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName], por ejemplo, parece haber habido una batalla limitada. Aún está por determinar si fue parte de la Guerra Diadochi: el profesor [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] encontró varias armas y partes de armaduras."
 lepsius.2181.f: "\"Debe haber habido una pequeña batalla aquí. No tan grande como otras pero aún así importante. ¡Estoy seguro de que descubriremos más sobre este sitio!\""
 lepsius.2181.g: "Que lastima que fueron esas guerras..."
 lepsius.2182.t: "Monedas helénicas encontradas"
 lepsius.2182.d: "Los antiguos helenos dejaron sus huellas en lugares lejanos del mundo, desde el Mediterráneo hasta la India. A menudo se pueden encontrar monedas, como sucedió en [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]. Gracias a las monedas, el Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] podrá determinar la presencia griega en la región."
 lepsius.2182.f: "\ \"¡Supongo que ahora soy rico! \""
 lepsius.2182.g: "¡Fascinante!"
 lepsius.2183.t: "Ruinas helénicas excavadas"
 lepsius.2183.d: "[SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] es el sitio más nuevo que ofrece una ruina helénica. Las ciudades helénicas se pueden encontrar desde España hasta la India. El profesor [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] cree que esta ciudad específica nos dirá más sobre los asentamientos de Greel."
 lepsius.2183.f: "\"¿Te imaginas una cultura que abarque una distancia tan grande? ¡Es realmente increíble!\""
 lepsius.2183.g: "Las ciudades griegas están por todas partes, ¿no?"
 lepsius.2184.t: "Representación de un dios griego"
 lepsius.2184.d: "Los dioses griegos y su religión viajaron a tierras lejanas. En [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] se descubrió recientemente una representación de un dios griego. El Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] determinó que debía ser Dioniso, el dios griego del vino."
 lepsius.2184.f: "\"La historia griega cuenta que apenas nació Dioniso, Zeus le cosió el muslo y lo llevó a Nisa, en Etiopía, más allá de Egipto; y en cuanto a Pan, los griegos no saben qué fue de él. Después de su nacimiento, por lo tanto, es claro para mí que los griegos aprendieron los nombres de estos dos dioses más tarde que los nombres de todos los demás, y remontan el nacimiento de ambos al momento en que adquirieron el conocimiento.\"\n- Heródoto"
 lepsius.2184.g: "¡Bebamos un poco de vino por ese descubrimiento!"
 lepsius.2500.t: "Nuevo Mapa Arqueológico de [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]"
 lepsius.2500.d: "El profesor [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] ha trabajado duro para registrar en un mapa todos los hallazgos arqueológicos de los últimos años en [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]. Este mapa permite sacar conclusiones sobre dónde son posibles más hallazgos."
 lepsius.2500.f: "\"¡Aquí encontramos unos clavos y allá encontramos los huesos de una oveja! ¿No es increíble?!\""
 lepsius.2500.g: "¡Esto abrirá las puertas a nuevos hallazgos!"
 lepsius.2501.t: "Un catálogo arqueológico ilustrado de [GetPlayer.GetName]"
 lepsius.2501.d: "El profesor [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] no sólo es un arqueólogo formidable sino también un artista asombroso. Gracias a esta habilidad pudo publicar un Catálogo Arqueológico Ilustrado de [GetPlayer.GetNameNoFormatting] que muchos profanos consideran una entrada sorprendente a la Arqueología."
 lepsius.2501.f: "\ \"¡Mira esas ilustraciones! ¡Parece que estamos en un museo y podemos ver los objetos justo frente a nosotros! ¡Increíble! \""
 lepsius.2501.g: "¡Un libro maravilloso!"
 lepsius.2502.t: "Nuevo Catálogo de todos los hallazgos Arqueológicos de [GetPlayer.GetName]"
 lepsius.2502.d: "Con su nuevo catálogo de todos los hallazgos arqueológicos en [GetPlayer.GetNameNoFormatting], el Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] ha hecho un trabajo diligente que casi nadie hubiera creído posible. Gracias a su extraordinario trabajo, ahora disponemos de un catálogo preciso de todos los hallazgos realizados hasta la fecha en 7 volúmenes."
 lepsius.2502.f: "\"Número 7342: Un trozo de piedra, probablemente neolítica, llamado Rocky.\""
 lepsius.2502.g: "¡Esto será útil en el futuro!"
 lepsius.2503.t: "El profesor [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] detiene el contrabando de artefactos"
 lepsius.2503.d: "Después de meses de trabajo, el Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] logró arrestar una red de contrabando que contrabandeaba artefactos a través de nuestro país. Los artefactos fueron confiscados y ahora están guardados de forma segura en nuestra colección."
 lepsius.2503.f: "\"¡Destruisteis valiosos conocimientos arqueológicos, sinvergüenzas!\""
 lepsius.2503.g: "¡Esto pertenece a un museo!"
 lepsius.2600.t: "La estrella perdida"
 lepsius.2600.d: "El Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] siempre estuvo confundido por las representaciones antiguas de las estrellas, ya que parecían no reflejar las estrellas que vemos hoy. Gracias a la ayuda del Profesor [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] finalmente pudo descubrir qué estaba mal. Juntos descubrieron una nueva estrella en el cielo nocturno."
 lepsius.2600.f: "\"¡Ahí está! ¡Ahí está, como me dijeron los antiguos egipcios! ¡Finalmente encontramos la estrella perdida!\""
 lepsius.2600.g: "¡Un tremendo descubrimiento científico!"
 lepsius.2601.t: "Estimación de fechas de eventos históricos utilizando el conocimiento astronómico de los eclipses solares"
 lepsius.2601.d: "En un esfuerzo conjunto, el Profesor [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] y el Profesor [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] pudieron utilizar el conocimiento astronómico moderno sobre los eclipses solares para fechar eventos históricos específicos en fuentes primarias."
 lepsius.2601.f: "\"¡Obviamente Tales de Milet estaba hablando del eclipse solar del 28 de mayo de 585 d.C. y no de ningún otro eclipse solar!\""
 lepsius.2601.g: "Este es un gran paso para la arqueología."
 lepsius.2602.t: "Panorama general del conocimiento astronómico de las culturas pasadas"
 lepsius.2602.d: "El Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] y el Profesor [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] publicaron un nuevo libro que ofrece una descripción general del conocimiento astronómico de las civilizaciones antiguas."
 lepsius.2602.f: "\"Sí, sabían que la Tierra no era el centro de nada. No, ni siquiera entonces eran tan estúpidos como para creer que la Tierra es plana. Sí, estoy absolutamente seguro de eso\"."
 lepsius.2602.g: "¡Una lectura interesante!"
 lepsius.2603.t: "La locomotora de vapor del héroe reconstruida"
 lepsius.2603.d: "Cuando el Profesor [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] habló con el Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] sobre la antigua máquina de vapor de Hero, este último inmediatamente se encendió para hacer una reconstrucción. Juntos construyeron una pequeña reconstrucción del Aeolipile."
 lepsius.2603.f: "\"Como puedes ver, al Aeolipile le falta un medio para transmitir energía. Por lo tanto, es más un juguete que una máquina real. Lamentablemente, nunca se desarrolló más.\""
 lepsius.2603.g: "¿Cómo no se industrializaron?"
 lepsius_illustrated_archaeological_catalog_modifier: "Escribió un catálogo ilustrado de arqueología"
 lepsius.12.f: "¡Actualmente la Colección Egipcia tiene #p [ROOT.Var('lepsius_egyptian_artifact_minor').GetValue]#! @lepsius_egypt_minor! artefactos menores y #p [ROOT.Var('lepsius_egyptian_artifact_major').GetValue]#! @lepsius_egypt_major! artefactos importantes. \n\n La colección egipcia posiblemente se pueda #T reorganizar#! y así iniciar una nueva exposición. Sin embargo, esto requiere una cierta cantidad de artefactos. \n\n ¡Una exposición pequeña de #T#! requiere #p 10#! @lepsius_egypt_minor! artefactos, una exposición mediana #T#! requiere #p 25#! @lepsius_egypt_minor! artefactos, una #T exposición grande#! requiere #p 50#! @lepsius_egypt_minor!, y una #T exposición excelente#! requiere #p 100#! @lepsius_egypt_minor!. ¡Además, la excelente exposición #T#! requiere #p 1#! @lepsius_egypt_major! artefacto importante. \n\n La reorganización de la colección y los preparativos para una nueva exposición durarán alrededor de medio año. Las bonificaciones de una exposición son permanentes hasta que se reorganice nuevamente."
 lepsius.13.f: "Actualmente la Colección Mesopotamia tiene #p [ROOT.Var('lepsius_mesopotamian_artifact_minor').GetValue]#! @lepsius_mesopotamia_minor! artefactos menores y #p [ROOT.Var('lepsius_mesopotamian_artifact_major').GetValue]#! @lepsius_mesopotamia_major! artefactos importantes. \n\n La colección mesopotámica posiblemente se pueda #T reorganizar#! y así iniciar una nueva exposición. Sin embargo, esto requiere una cierta cantidad de artefactos. \n\n ¡Una exposición pequeña de #T#! requiere #p 10#! @lepsius_mesopotamia_minor! artefactos, una exposición mediana #T#! requiere #p 25#! @lepsius_mesopotamia_minor! artefactos, una #T exposición grande#! requiere #p 50#! @lepsius_mesopotamia_minor!, y una #T exposición excelente#! requiere #p 100#! @lepsius_mesopotamia_minor!. ¡Además, la #T excelente exposición#! requiere #p 1#! @lepsius_mesopotamia_major! artefacto importante. \n\n La reorganización de la colección y los preparativos para una nueva exposición durarán alrededor de medio año. Las bonificaciones de una exposición son permanentes hasta que se reorganice nuevamente."
 lepsius.14.f: "¡Actualmente la Colección Aegean tiene #p [ROOT.Var('lepsius_aegean_artifact_minor').GetValue]#! @lepsius_aegean_minor! artefactos menores y #p [ROOT.Var('lepsius_aegean_artifact_major').GetValue]#! @lepsius_aegean_major! artefactos importantes. \n\n La colección del Egeo posiblemente se pueda #T reorganizar#! y así iniciar una nueva exposición. Sin embargo, esto requiere una cierta cantidad de artefactos. \n\n ¡Una exposición pequeña de #T#! requiere #p 10#! @lepsius_aegean_minor! artefactos, una exposición mediana #T#! requiere #p 25#! @lepsius_aegean_minor. artefactos, una #T exposición grande#! requiere #p 50#! @lepsius_aegean_minor!, y una #T exposición excelente#! requiere #p 100#! @lepsius_aegean_minor!. ¡Además, la #T excelente exposición#! requiere #p 1#! @lepsius_aegean_major! artefacto importante. \n\n La reorganización de la colección y los preparativos para una nueva exposición durarán alrededor de medio año. Las bonificaciones de una exposición son permanentes hasta que se reorganice nuevamente."
 lepsius.15.f: "Actualmente la Colección Precolombina tiene #p [ROOT.Var('lepsius_precolumbian_artifact_minor').GetValue]#! @lepsius_precolumbian_minor! artefactos menores y #p [ROOT.Var('lepsius_precolumbian_artifact_major').GetValue]#! @lepsius_precolumbian_major! artefactos importantes. \n\n La colección precolombina posiblemente pueda ser #T reorganizada#! y así iniciar una nueva exposición. Sin embargo, esto requiere una cierta cantidad de artefactos. \n\n ¡Una exposición pequeña de #T#! requiere #p 10#! @lepsius_precolumbian_minor! artefactos, una exposición mediana #T#! requiere #p 25#! @lepsius_precolumbian_minor! artefactos, una #T exposición grande#! requiere #p 50#! @lepsius_precolumbian_minor!, y una #T exposición excelente#! requiere #p 100#! @lepsius_precolumbian_minor!. ¡Además, la #T excelente exposición#! requiere #p 1#! @lepsius_precolumbian_major! artefacto importante. \n\n La reorganización de la colección y los preparativos para una nueva exposición durarán alrededor de medio año. Las bonificaciones de una exposición son permanentes hasta que se reorganice nuevamente."
 lepsius.99.t: "Traslado del Museo Arqueológico"
 lepsius.99.d: "Por alguna razón tenemos un [GetBuildingType('building_lepsius_archaeological_museum').GetName] pero no está ubicado en nuestra maravillosa Capital. ¡Obviamente tenemos que trasladarlo a la Capital!"
 lepsius.99.f: "\"Por favor, ten cuidado con los jarrones, ¡son muy frágiles! ¡No! ¡No puedes simplemente tirarlos en una caja así, necesitan algún tipo de relleno! ¡Realmente no creo que sea una gran idea!\""
 lepsius.99.g: "¡Ahora puedo ir allí todos los días!"
 lepsius.140.d: "Nuestro arqueólogo ha utilizado conexiones [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] para reclutar personal altamente calificado para la expedición."
 lepsius.250.f: "Todo comenzó con una discusión, seguida de maldiciones, amenazas y finalmente puñetazos. El incidente acabó en una auténtica pelea de taberna. Justo en el medio: nuestro líder de expedición. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] el temperamento nos ha costado mucha reputación. Un informe del paso en falso llegó a un alto dignatario esta mañana. Hemos evitado un incidente diplomático importante, pero la mala impresión persistirá durante mucho tiempo."
 lepsius.260.f: "¡Buenas noticias! Al final resultó que, nuestro líder de expedición demostró ser un [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetCustom('academics_gentleman_or_gentlewoman_type')] impecable durante el viaje [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis]. El comportamiento carismático y discreto de [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis|U] se equipara con el comportamiento típico de [ROOT.GetCountry.GetAdjectiveNoFlag]. La reputación de nuestra nación allí ha aumentado significativamente."
 lepsius.270.d: "El líder de nuestra expedición destaca sobre todo porque [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] se sienta todos los días en la cafetería a beber refrescos y comer helado."
 lepsius.270.f: "Hay líderes ambiciosos que no hacen más que trabajar todo el día. Quieren lograr grandes cosas o acumular riqueza. Algunos quieren ser famosos por sus hazañas. Otros se obsesionan con cada detalle. No así nuestro director arqueológico. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] tiene el hábito de combatir el calor todos los días consumiendo refrescos y tragando helado. Se podría llamar a eso pereza. Para otros, es un signo de elegancia humana, buen gusto y de tener las prioridades correctas en la vida."
 lepsius.280.d: "Las habilidades diplomáticas de nuestro líder de expedición han dado como resultado que [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim] sea invitado y recompensado por el gobernador local."
 lepsius.311.d: "El líder de la última expedición arqueológica al extranjero ha decidido publicar el diario que [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] escribió durante el viaje."
 lepsius.312.d: "[SCOPE.sCharacter('lepsius_scientific_writer').GetFullName] ha decidido publicar el artículo científico que [SCOPE.sCharacter('lepsius_scientific_writer').GetSheHe] escribió durante el viaje."
 lepsius.408.f: "Un nazar es un amuleto destinado a proteger contra el mal de ojo. Esta superstición existe en gran parte de Oriente, pero también en partes del Mediterráneo. Por supuesto, sería absurdo pensar que una mente científicamente entrenada pudiera protegerse con un talismán para evitar que las fuerzas del mal causaran estragos en la expedición. La situación es diferente con los ayudantes y porteadores locales. Piden al líder que consiga uno de los amuletos, convencidos de que, de lo contrario, [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] afrontará una gran desgracia. Cualesquiera que sean las habilidades de Nazar, si no afecta a la expedición, al menos afectará la moral de nuestros secuaces."
 lepsius.409.f: "A medida que nuestra expedición avanzaba a lo largo de la costa, pronto encontraron una amplia bahía cuyos promontorios extremos casi se tocaban. En lugar de tomar el camino más largo, unos pescadores griegos se ofrecieron a llevarnos a través de la bahía. El líder de la expedición aceptó rápidamente la oferta. En conversación con los pescadores, [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] también pudo obtener información importante sobre una ruina no muy lejana, que probablemente data de la época preclásica."
 lepsius.421.d: "Nuestro arqueólogo ha encontrado un pequeño escarabajo egipcio de lapislázuli que a [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] le gustaría conservar."
 lepsius.452.f: "En el pasado, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] había escuchado repetidamente que debía haber registros históricos de sitios arqueológicos destruidos hace mucho tiempo en el área. Hace unos días, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] recibió un consejo útil: un comerciante poseía un manuscrito del siglo XVI que contenía una copia de unos registros perdidos hace mucho tiempo. Los originales probablemente se hayan perdido para siempre, pero al menos existe la posibilidad de reconstrucción."
 lepsius.461.f: "Sentí una sensación extraña y aplastante. Mitad de la noche. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] se puso de pie, creyendo en el viento que golpeaba la tienda montada en la arena del desierto; pero era más que viento. Fue un susurro extraño. Un murmullo que fue subiendo a tonos disonantes hasta convertirse en un canto melódico. Como un canto de sirena, engañó y nubló los sentidos. Al menos, eso fue lo que afirmó [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetLastName] cuando, después de horas de búsqueda, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] fue encontrado en las garras de la Gran Esfinge de Giza, cavando como un loco, convencido de que debajo de la Esfinge había una cámara secreta desde donde se extraería el conocimiento. encontrado estado escondido durante miles de años. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetHerHis] la situación apenas ha mejorado desde entonces. Este lugar tiene una influencia realmente mala en [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetHerHim]."
 lepsius.462.f: "Sentí una sensación extraña y aplastante. Mitad de la noche. [SCOPE.sCharacter('lepsius_military_attache').GetFullName] se puso de pie, creyendo en el viento que golpeaba la tienda montada en la arena del desierto; pero era más que viento. Fue un susurro extraño. Un murmullo que fue subiendo a tonos disonantes hasta convertirse en un canto melódico. Como un canto de sirena, engañó y nubló los sentidos. Al menos, eso fue lo que afirmó [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetLastName] cuando, después de horas de búsqueda, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] fue encontrado en las garras de la Gran Esfinge de Giza, cavando como un loco, convencido de que debajo de la Esfinge había una cámara secreta desde donde se extraería el conocimiento. encontrado estado escondido durante miles de años. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetHerHis] la situación apenas ha mejorado desde entonces. Este lugar tiene una influencia realmente mala en [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetHerHim]."
 lepsius.465.f: "Nuestro líder de expedición no duda en decir de dónde es, qué idioma habla [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe], qué comida prefiere [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] y qué cultura [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] considera superior. Los insultos contra los lugareños aumentan día a día, ya sea contra el personal contratado o contra personas al azar. Al viajar por diferentes pueblos, [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] ha desarrollado la actitud de tratar a los alcaldes como [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] subordinados. Ni siquiera el gesto más hospitalario es suficiente para [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim]. Ya ha habido varias quejas de distintos sectores de la administración local sobre el comportamiento arrogante y difamatorio de [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName], y nuestra expedición degenera cada vez más en una campaña de publicidad negativa para nuestro país."
 lepsius.467.f: "No queda mucho del antiguo Medio Oriente cristiano y, sin embargo, existen comunidades cristianas dispersas de coptos, maronitas, caldeos y armenios que han sobrevivido durante siglos. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName], que en realidad no tenía intenciones religiosas cuando [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] comenzó el viaje, anoche hizo que un sacerdote local condujera a [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim] a una iglesia olvidada hace mucho tiempo. Interesante desde el punto de vista arqueológico e histórico, el clérigo descubrió más tarde un relicario que contenía una reliquia de un padre de la iglesia que se creía perdida. Como ya era tarde y el campamento estaba lejos, el líder de la expedición permaneció allí una noche y una mañana. Un sueño que no ha dejado descansar a [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim] desde entonces y del que [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] casi nunca habla, significa que [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] quiere cambiar la vida de [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] en determinados ámbitos. El sacerdote se ha ofrecido a darle a [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim] parte de la reliquia olvidada para fortalecer a [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim] en su recién encontrada fe."
 lepsius.467.g: "¿[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] tuvo una visión beatífica?"
 lepsius.471.g: "[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe|U] debería tomarse su tiempo y averiguar todo lo posible sobre el lugar."
 lepsius.471.h: "A [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe|U] se le permite quedarse allí más tiempo, si [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] trae algunos artefactos con él."
 lepsius.471.i: "[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe|U] puede visitar el lugar, pero sólo durante el tiempo que sea necesario."
 lepsius.472.f: "[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] tiene una explicación increíble para la enorme pérdida de personas y materiales. Es indignante y vergonzoso, especialmente para la mente de una persona razonablemente ilustrada. El líder de la expedición afirma que los hombres [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] y [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetHerHis] estuvieron perdidos durante una semana antes de tropezarse con un valle desconocido rodeado de altas montañas en el impenetrable bosque de Yucatán. Con la esperanza de encontrar un sitio maya previamente desconocido, idearon un plan para explorar el valle, lo que resultó ser un gran error. Porque el valle alberga monstruos terribles, poderosos lagartos. De hecho, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] nos explicó que los dinosaurios extintos han vivido en este \"mundo perdido\" durante millones de años, habiendo sobrevivido porque estaban aislados. Las bestias aterrorizaron al equipo de expedición y atacaron sin piedad a varios porteadores e investigadores. En la carrera, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] habría tenido que renunciar a gran parte del equipo. Ahora [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] nos ruega que volvamos a equipar a toda la expedición. No sabemos por qué [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] piensa que [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] puede impresionarnos con esta historia de cuento de hadas; más bien, surgen dudas sobre si [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] sigue siendo el hombre adecuado para dirigir esta empresa."
 lepsius.472.g: "¿[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] está diciendo que los dinosaurios se comieron nuestra expedición?"
 lepsius.501.h: "Dejemos que [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim] investigue más a fondo."
 lepsius.506.f_engine: "Desafortunadamente, los miembros de nuestra expedición apenas tuvieron tiempo de explorar con más detalle la tumba del faraón desconocido. Las rocas se desprendieron del techo y la arena se escurrió por las grietas superiores mientras nuestros arqueólogos se abrían paso a través de la cámara funeraria. Al parecer el entorno consistía en una roca mucho más porosa de lo que se suponía; y la roca desprendida había terminado la construcción. Con rápido ingenio, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] mantuvo el rumbo a pesar del riesgo y luchó por [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] hasta el sarcófago para que todos los hombres disponibles lo sacaran. Una pieza magnífica y única que probablemente nos consolará por la pérdida de los hallazgos restantes; después de todo, toda la tumba real amenaza con derrumbarse en cuestión de minutos..."
 lepsius.506.f_muscular: "Fue una experiencia verdaderamente histórica cuando [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName], entró en la cámara funeraria real. Una sorpresa especial nos esperaba [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim]: ¡el sarcófago y la momia del faraón desconocido aún descansan en el lugar donde fue enterrado hace más de 3.000 años! Una vez más, el incomparablemente fuerte Padua nos ayudó y sacó el sarcófago de madera y la momia del recinto de granito. Pero por más felices que estuvieran nuestros arqueólogos al principio, su infelicidad posterior fue mayor. Durante la pausa del almuerzo, mientras el equipo compartía el pan en la galería decorada, se escuchó un terrible crujido y crujido en la cámara funeraria. Para horror de los ayudantes de la excavación y de nuestro líder de expedición, el gigante musculoso también se había permitido un descanso y accidentalmente se sentó en el sarcófago. Sólo quedan restos de la momia del rey y del ataúd de madera..."
 lepsius.532.f: "El agregado militar ha advertido repetidamente contra la entrada en territorio kurdo. Las expediciones pasadas a esta zona no han tenido buenas experiencias con los lugareños. Los kurdos son considerados libres, honorables, pero también orgullosos. Invadir su territorio podría enfadarlos. Por ello, [SCOPE.sCharacter('lepsius_military_attache').GetFullName] ha insistido en armar a varios hombres para poder combatir más eficazmente incidentes desagradables. Mientras que el agregado espera lo peor, a [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] le gustaría encontrar lo antes posible a la tribu kurda para negociar con ellos y llegar a un acuerdo amistoso para poder poner rápidamente a los Lamassu en sus propias manos. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] propone dividir las tropas: los hombres desarmados, los porteadores no entrenados y la mayoría de las provisiones y el equipo deben quedarse atrás mientras [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] sigue adelante con el agregado militar para crear una fuerza más flexible que pueda buscar eficientemente al lamassu. El agregado, por su parte, expresó su preocupación de que el resto de la expedición quedaría completamente indefensa en caso de un ataque kurdo."
 lepsius.534.f: "Demasiado tarde, el líder de la expedición se dio cuenta de que su último intento de ganarse el favor de las tribus nativas produjo lo contrario de lo que [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] había pretendido. Un grito recorrió la tienda e instintivamente algunos de los subordinados ya estaban poniendo sus manos sobre sus armas. A partir de entonces reinaba la tensión en el aire y el agregado militar vio confirmada su preocupación de que este conflicto no podría resolverse con diplomacia, sino sólo con violencia. Tiene poco tiempo para alinear a los hombres que ha traído consigo. Algunos asistentes de investigación ya insisten en hacer las maletas y ganar la mayor distancia posible."
 lepsius.551.f: "[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] había trabajado hasta tarde ese día. El sol griego caía sobre su cabeza, el viento de las montañas y del mar permanecía ausente. La aburrida y tediosa catalogación de aburridos objetos arqueológicos se prolongó durante días. Los hallazgos a menudo consistían en escasos fragmentos de vidrio roto y huesos de pollo, que el director arqueológico atribuyó menos a la cultura alimentaria minoica y más a las costumbres proletarias a la hora de comer de los ayudantes de la excavación. En un estado de cansancio y resignación, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] paseaba por los extensos terrenos de un complejo palaciego poco explorado. La última vez que se avistó [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetLastName] fue cerca de una estructura clasificada como de finales de la Edad del Bronce o principios del Arcaico. Un estrépito resonó en las colinas de Creta, ahogando a las cigarras y asustando a las palomas mientras el arqueólogo atravesaba el suelo y, a pesar de dos días de búsqueda, no pudo ser encontrado."
 lepsius.552.d: "Cuando [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] recupera la conciencia, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] se encuentra en un edificio subterráneo desconocido."
 lepsius.552.f: "Fue quizás la experiencia más extraña en la vida del líder arqueológico. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe|U] había pensado que [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] se había caído por una madriguera de conejo de un metro de largo; el pozo había sido tan estrecho, acompañado al mismo tiempo de arena y barro, que lo habían presionado hacia abajo como arenas movedizas en longitudes insoportables. Imposible que alguien pudiera haberlo seguido; e imposible ver nada ya que la luz del sol no lo seguía por el pozo. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe|U] había sentido placas bajo sus palmas tras el impacto y no había creído que [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] había aterrizado en un sistema de cuevas natural. A la luz del encendedor, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] reconoce las paredes suavemente labradas, en las que hay restos de pintura adheridos. Frescos de una cultura perdida, que [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] inicialmente quiere atribuir a los minoicos, pero pronto ya no sabe de qué siglo proceden. Aparentemente hay transiciones suaves entre las influencias minoicas y micénicas. Mirando a su alrededor, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] se encuentra en una sala no muy diferente a un Megaron. El arqueólogo siente lentamente el camino hacia adelante, escuchando sus propios pasos resonando en el espacio hueco. Siguen pasillos sin adornos, sin objetos, sin detalles distinguibles; bifurcaciones en el camino; cámaras; y callejones sin salida. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] se da cuenta de que [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] ha terminado en un antiguo laberinto del que [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] no tiene visión general. Cuanto más cree [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] que lo está investigando, más grande y desconocido se vuelve..."
 lepsius.553.d: "Después de un tiempo de prueba y error, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] se da cuenta de que [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] ha llegado al punto de partida del laberinto..."
 lepsius.553.f: "Piernas pesadas, cabeza nublada. ¿Podría ser que [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] hubiera estado aquí antes? El lugar en las placas donde aterrizó [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] cuando llegó [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] es inconfundible. Y con creciente horror surge la pregunta: ¿cuánto tiempo estuvo [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] aquí? ¿Cuántas horas habían pasado? ¿Quizás días? ¿Y [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] lo descubriría antes de que el hambre y la sed lo atormentaran hasta la muerte...?"
 lepsius.554.d: "En el laberinto, el desaparecido se encuentra con un mosaico. La cuestión es si [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] elige uno de los dos pasillos o las escaleras."
 lepsius.554.f: "Tras pasillos y escaleras sin distinción, el líder de la expedición llega a una sala más grande. A izquierda y derecha se abre un pasillo y una escalera sube y baja. Llama la atención un mosaico en el suelo. Una escena marina confirma la tesis de que las murallas pueden proceder de la época minoica, mientras que las raras joyas dan testimonio de influencias micénicas. Los dioses representados son predecesores del panteón griego clásico. Rodeado de delfines, el padre de los dioses Zeus extiende su brazo en el aire con un rayo. Deméter y Perséfone señalan hacia el oeste, con mazorcas de maíz en la mano; Artemisa está acompañada por dos leones que miran hacia el este. Finalmente Poseidón, padre de los dioses micénicos: con un tridente [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] hace temblar la tierra debajo de él."
 lepsius.557.d: "En un pasillo, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] vuelve a encontrarse con un acertijo."
 lepsius.557.f: "Cuatro pases. Cuatro cuadros. Sobre cada pasaje, el prisionero del laberinto puede ver contornos grabados en piedra. Pasa algún tiempo antes de que [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] se dé cuenta de que estas son costas de islas. Basándose en sus experiencias en Creta, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] puede asignarlos aproximadamente. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe|U] asigna el primer paso a la isla de Rodas; el segundo de la isla de Delos; el tercero de la isla de Euobea; el cuarto de la isla de Naxos. Desafortunadamente, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] no puede encontrar más pistas."
 lepsius.558.d: "Después de varios días, nuestro equipo de excavación encontró al arqueólogo desaparecido cerca de un acantilado. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe|U] estaba completamente agotado y desde entonces ha estado mentalmente confundido."
 lepsius.558.f: "Sigue siendo un misterio dónde estuvo el líder de la expedición durante las últimas 72 horas. Fue encontrado a pocos kilómetros del lugar de la excavación, en condiciones lamentables, como si hubiera sido mutilado por un animal salvaje. Aunque [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] recuperó el conocimiento, el médico de la expedición cree que [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] debe haber recibido un fuerte golpe en la cabeza. Al menos su centro lingüístico parece perturbado. Una y otra vez [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] cae en un estilo casi delirante cuando [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] tiene que contar lo que pasó. Dejamos el área porque nos preocupa que [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] pueda emprender una misión nuevamente para demostrar que no está loco."
 lepsius.559.f: "Ayer por la tarde la policía examinó el cuerpo del ex líder de la expedición. [SCOPE.sCharacter('lepsius_minotaur_victim').GetFullName] se hizo conocido por el público principalmente debido a una enfermedad mental después de que [SCOPE.sCharacter('lepsius_minotaur_victim').GetSheHe] desapareciera en circunstancias misteriosas durante una excavación en Creta y fuera encontrado nuevamente días después en circunstancias igualmente misteriosas. [SCOPE.sCharacter('lepsius_minotaur_victim').GetSheHe|U] simplemente no ha sido la misma persona desde entonces. Cada vez más [SCOPE.sCharacter('lepsius_minotaur_victim').GetSheHe] temía estar solo, pensaba [SCOPE.sCharacter('lepsius_minotaur_victim').GetSheHe] veía monstruos en las sombras. Al final [SCOPE.sCharacter('lepsius_minotaur_victim').GetSheHe] solo dormía cuando la luz estaba encendida porque las pesadillas mantenían a [SCOPE.sCharacter('lepsius_minotaur_victim').GetHerHim] despierto toda la noche. En los últimos días de su vida, [SCOPE.sCharacter('lepsius_minotaur_victim').GetHerHis] no sólo se había vuelto muy dependiente de la medicación y se había deteriorado visiblemente tanto física como mentalmente, sino que [SCOPE.sCharacter('lepsius_minotaur_victim').GetSheHe] también había sido objeto de burla por parte de sus colegas académicos debido a sus abstrusas afirmaciones sobre su investigación en Creta. Despreciado por el mundo científico, ridiculizado en los periódicos y reducido visualmente a una caricatura de lo que era antes, los investigadores coinciden en que [SCOPE.sCharacter('lepsius_minotaur_victim').GetSheHe] se quitó la vida."
 lepsius.560.f: "Al principio [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetFullName] se sorprendió de lo lejos que estaba del antiguo sitio de excavación [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] finalmente volvió a ver el sol. Pasaron varias horas antes de que [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] se reincorporara al resto de la misión de excavación, para alivio de sus colegas. Allí, para sorpresa de los presentes, [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] pudo informar sobre su hallazgo, un descubrimiento verdaderamente magnífico que tal vez podría cambiar la forma en que hemos interpretado los mitos de los antiguos griegos. Hoy no es sólo un día de gloria personal, sino un gran día para toda la nación. Lo que fue la solución de misterios banales para algunos, será una revolución en la arqueología para el resto del mundo..."
 lepsius.561.f: "Haze hangs over the Yucatec hills as the column pushes through the selva. Jaguars cry in the distance; the air hums with mosquitoes, and fever fells more than one of our helpers. What remains is a party of three and a few porters. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] signals a halt. Stelae and carved stones stud the ground; half-buried steps, slick with moss, climb a broken terrace. The outline of a Maya pyramid emerges. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe|U] cocks an ear as a porter raises his hand and calls: 'Patrón—an opening!'"
 lepsius.562.f: "Insisting on entering alone, the expedition leader passes the bleached bones of an earlier intruder and confronts a panel crowded with glyphs. Four recessed cartouches—visages of great gods—can be pressed like keys. Beneath them runs the distich: the one who rises in the east, blazes at zenith, descends at dusk, and keeps the count of days. The device is plainly a test; one mistake could be [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetHerHis] undoing."
 lepsius.563.f: "Footfalls echo in a narrow passage. By torch‑light the walls glimmer with engravings; roots of giant trees bite through a fallen lintel. Beyond, a chamber opens—a low altar at its heart, an idol glinting faintly in the gloom. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe|U] weighs a satchel of sand in [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetHerHis] left hand, judges the idol’s mass with the right, and steadies [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetHerHis] breath. One clean exchange—then out."
 lepsius.564.d: "It may be that [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] read the riddle amiss—or merely that the builders trusted no one. A thunder rolls; a stone sphere tears free and barrels down the corridor toward [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetHerHim]."
 lepsius.564.f: "The switch is made; the bag rests upon the altar. For a heartbeat nothing moves. Then a dull tremor builds, dust sifts from the ceiling, and a roar answers from above—it is a gigantic rolling boulder!"
 lepsius.565.d_wrong: "When [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] stumbles into the light, a worse surprise awaits: the camp has been overrun, and armed men demand the idol—or [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetHerHis] life."
 lepsius.565.f_right: "It was an affair of wit, not muscle. Choosing K'inich Ajaw, the Sun Lord who 'keeps the count of days,' spared [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetHerHim] the device’s malice. Slipping through the contrivances unscathed, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] secures the idol and hastens out; word reaches [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetHerHim] that a rival party is on the way, and so the team quits the site at once."
 lepsius.565.f_wrong_right: "As [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] flees the passage, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] catches a root and swings clear while the stone hurtles past and bursts into the jungle. Outside lie scattered spears and fallen men—the wreckage of an ambush undone by the same trap. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe|U] cannot prove it, but the scene bears the touch of a foreign rival who meant to let us spring the hazards for him. No matter—time to move on."
 lepsius.565.f_wrong: "With a final leap [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] gains the threshold—only to be ringed by bowmen. A suave voice with a soft [SCOPE.sCountry('lepsius_archaeological_rival').GetAdjectiveNoFlag] accent drifts from the trees as a man in pale linen steps forward: 'A pleasure at last. But this piece belongs in better hands.' Outnumbered and with the porters slain, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe|U] yields the idol. 'Too bad the Hovitos do not know you as I do,' [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] mutters—and seizes a chance to escape, empty‑handed."
 lepsius.581.d: "[SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] se ha presentado con una preocupación personal: [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] quiere demostrar que el \"Mundo Perdido\" realmente existe y así restaurar su honor. [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe|U] está recaudando dinero para una expedición privada."
 lepsius.581.f: "Han pasado varios años desde que gran parte de la expedición a Yucatán desapareció misteriosamente. Desde entonces, [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] se ha convertido en el hazmerreír de la academia. Las caricaturas en los periódicos retratan a [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHim] como loco con [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHis] 'historias de dinosaurios'. El trauma ha dejado profundas cicatrices: [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] está obsesionado con demostrarle al mundo que el supuesto valle es real. Se dice que [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe|U] ha gastado [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHis] toda la herencia para organizar una expedición con [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHis] gastos propios. Por supuesto, [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] también pidió apoyo al Estado para el viaje completamente loco de [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHis]. Nuestros expertos desaconsejan esta misión suicida: todo el mundo sabe cómo fue la última expedición a Yucatán. Por eso hay voces que quieren prohibir por completo una expedición de este tipo. Sin embargo, esto sólo podría agravar el estado mental de [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHis]. Otros piensan que debería dejarse ir a [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe], pero sin más interferencia oficial; después de todo, nadie quiere verse asociado con el viaje de un hombre aparentemente con trastornos mentales. Sólo una minoría piensa siquiera en abrir la cartera ante esta locura. Argumentan que tenemos una supuesta responsabilidad por la condición [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHis]..."
 lepsius.581.h: "Mayo [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] cazar [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHis] dinosaurios."
 lepsius.582.f: "Meses después de que [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] desapareciera en los bosques de Yucatán, el exhausto aventurero reapareció en la capital provincial de Mérida. Nuevamente [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] había perdido muchos ayudantes y el resto del grupo [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHis] estaba en un estado lamentable. Sin embargo, junto con varios testigos, [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] tenía una prueba convincente: gracias a fotografías modernas, verificadas como auténticas por varios estudiosos, [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] tiene derechos inmejorables para [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHis] historias locas. Y de hecho: ¡en las ilustraciones se pueden ver claramente pterosaurios y brontosaurios herbívoros! La gente celebra a [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] como un ídolo, el mundo profesional está conmocionado y nuestro gobierno es visto como un grupo testarudo de ignorantes que le han negado a un héroe nacional la fama que [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] merece."
 lepsius.583.d: "No hemos sabido nada de [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] desde hace meses. Al parecer [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] está perdido en las desconocidas profundidades del bosque de Yucatán."
 lepsius.583.f: "Quizás algún día se puedan hacer obras trágicas sobre el asunto. [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName], que poco antes de la vida de [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHis] estaba casi loco, aparentemente buscó hasta el final rastros del supuesto valle de los dinosaurios. Las enfermedades y las tribus mayas hostiles mataron a [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHis] expedición. Uno de los pocos supervivientes informa que [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] afirmó por última vez haber redescubierto las laderas de la meseta en la que se encuentra el valle. Pero el último de los hombres se habría amotinado y regresado a casa. Nadie sabe qué fue de [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHim]. Sin embargo, tenemos razones para creer que solo y demacrado, [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] tenía pocas posibilidades de sobrevivir a lo que finalmente mató a [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHim]."
 lepsius.583.g: "[SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe|U] realmente no era un mal tipo. Un mal explorador sí, pero no un mal tipo."
 lepsius.584.f: "En realidad, todos esperaban que este viaje no fuera largo: ya sea porque las circunstancias condenaban a muerte a los hombres o porque estallaría un motín. El descubrimiento de una mañana fue aún más sorprendente. [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] llevaba días guiando a la tropa a través de los bosques impenetrables de Yucatán como un buscador maníaco. Parecía como si reconociera cada árbol y cada piedra. Los demás miembros de la expedición habían tomado esto como una locura o como parte de un elaborado plan para engañarlos y darles falsas esperanzas. Pero ahora, en las laderas de una vasta meseta, en cuyo hueco se encuentra el legendario valle del que he estado hablando durante años, algunos están revisando sus puntos de vista. El grito de un pterodáctilo resuena en el aire y atraviesa los oídos de los participantes tan profundamente que todas las dudas se disipan."
 lepsius.586.f: "En realidad, [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] debería estar satisfecho: [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] tenía razón con todas las afirmaciones de [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHis]. El equipo ya ha recopilado toda una serie de pruebas que deberían causar sensación en casa. Pero al explorar más de cerca el Mundo Perdido, resulta cada vez más que [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] no fue la primera persona en este valle. De hecho, parece haber habido una importante presencia maya en esta zona hace unos 1.500 años. Al parecer, los habitantes de una ciudad maya hasta ahora desconocida acudían a este valle a intervalos regulares. [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] especula que la tradición del sacrificio humano podría tener su origen aquí. Sea como fuere, hay pruebas contundentes de que el valle cumplía una función religiosa. Un colaborador desenterró recientemente artefactos mayas, lo que sugiere que su descubrimiento podría causar una sensación aún mayor que la de unos pocos lagartos gigantes dispersos. El problema: ¡el presunto sitio maya se encuentra en medio de una zona habitada por aves rapaces! Por lo tanto, la mayoría de los miembros de la expedición insisten en regresar a casa inmediatamente en lugar de dejar que una misión suicida siga a la siguiente."
 lepsius.587.f: "Sólo un superviviente. No queda nada más de la expedición. Es un joven asistente de investigación en la universidad. Está traumatizado y en malas condiciones físicas. Así lo informa un telegrama desde Yucatán. No se le podía sacar mucho. Aparentemente, nuestro líder de expedición cometió un trágico y crucial error al intentar inspeccionar un sitio maya en el Mundo Perdido. Un error que casi todos los miembros de la expedición pagaron con la vida. El incidente causó tal conmoción que todos los viajes a Yucatán que no fueran estrictamente arqueológicos fueron prohibidos indefinidamente."
 lepsius.587.g: "[SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe|U] eligió... mal."
 lepsius.588.f: "Los mayas conocían a Kukulkán como la serpiente emplumada, una deidad adorada por los aztecas con el nombre de Quetzalcóatl. ¿Fue una coincidencia que los mayas conocieran este valle? ¿Hubo alguna conexión entre el Mundo Perdido y el culto a Kukulkán? [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] no puede decidir esto todavía. Lo que sí descubrió, sin embargo, fue que entre los nidos de aves rapaces se encontraba un santuario largamente olvidado que representaba a la serpiente emplumada que en este país llaman Kukulkán. Una misteriosa gema engastada en un amuleto llamó la atención. Es de una belleza tan asombrosa que el líder de la expedición la apodó la \"Gema de Kulkulkan\": la deidad poseía una joya con la que podía controlar el viento. Probablemente sea uno de los mayores hallazgos arqueológicos de Centro y Sudamérica."
 lepsius.588.g: "[SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe|U] eligió sabiamente."
 lepsius.589.d: "Nuestra expedición del Mundo Perdido liderada por [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] ha regresado. [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe|U] y su equipo son celebrados como héroes por la gente."
 lepsius.589.g: "¡Gloria a [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHim]!"
 lepsius.803.d: "[SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] ha completado sus preparativos de viaje. [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetSheHe|U] partirá hoy para avanzar en el conocimiento en un sitio de excavación ya establecido."
 lepsius.803.f: "Se espera que la ausencia de nuestro arqueólogo sea de alrededor de un año pero puede variar según la situación. Al final de la actividad [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetHerHis] [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetSheHe] se abrirá un nuevo sitio de excavación, cuya calidad puede variar. [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetSheHe] también encontrará referencias a sitios arqueológicos previamente desconocidos."
 lepsius.811.f_vok: "[SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] informa que [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetSheHe] ha descubierto una pequeña tumba en el Valle de los Reyes. Al parecer, los saqueadores de tumbas ya han robado una gran cantidad de objetos, y los graffitis muestran que esto también era conocido en la Antigüedad tardía. Los líderes de la expedición decidieron realizar una excavación allí con la esperanza de poder informar de más hallazgos más adelante."
 lepsius.811.f_ass: "La excavación en Asiria tuvo dificultades desde el principio. Después de unos días, [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] todavía no podía encontrar un buen sitio de excavación, por lo que [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetSheHe] se contentó con el siguiente mejor sitio. Hasta ahora sólo han descubierto los cimientos de un santuario que alguna vez pudo haber sido parte de un complejo más grande."
 lepsius.812.f_bab: "Los tiempos no han devorado a todos los testigos de la grandeza babilónica en Mesopotamia. Después de que [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] refrescara el suministro de agua de [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetHerHis], los lugareños contaron a [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetHerHim] sobre una extraña ruina que los devotos musulmanes de la región evitan debido a sus orígenes paganos. Al final resultó que, es el resto de un zigurat. El complejo está sorprendentemente bien conservado y, según los últimos informes, nuestros arqueólogos incluso han desenterrado los primeros hallazgos."
 lepsius.813.f_vok: "Esta mañana ha llegado un telegrama sensacional. [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] informa que [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetSheHe] ha descubierto la tumba de una reina. La identidad de la consorte muerta no está del todo clara, pero según los informes iniciales la cámara funeraria está sorprendentemente intacta. Las pinturas murales y los valiosos artefactos brindan una valiosa visión del Antiguo Egipto que no se conocía desde hace mucho tiempo."
 lepsius.813.f_bab: "Las leyendas sobre las puertas y murallas de la ciudad de Babilonia han sobrevivido durante miles de años. Pero siempre es otra cosa cuando están delante de ti. Al principio, [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] no podía creerlo mientras [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetSheHe] caminaba pared tras pared y descubría las enormes dimensiones de una ciudad perdida. Este descubrimiento nos mantendrá ocupados durante los próximos años."
 lepsius.813.f_ass: "Además de ser una gran potencia militar, los asirios también eran famosos por sus jardines. Algunos incluso afirman que los famosos Jardines de Babilonia en realidad estaban ubicados en la capital asiria de Nínive. Durante la excavación de un complejo palaciego y de las terrazas adyacentes, [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] pudo ver por [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetHerselfHimself] el esplendor de la cultura asiria. La dirección del museo se alegra."
 lepsius.2191.t: "Descubierto complejo balneario inca"
 lepsius.2191.d: "El Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] descubrió un hallazgo espectacular en [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]. El sitio ha revelado un complejo de baños del Imperio Inca. Las primeras hipótesis apuntan a que el complejo se utilizaba para ceremonias rituales."
 lepsius.2191.f: "\"¿No es irónico que hayamos desenterrado un baño y que ahora podamos bañarnos nosotros mismos?\""
 lepsius.2191.g: "¡Un baño estaría genial ahora mismo!"
 lepsius.2192.t: "Descubierto cráneo inca con un agujero"
 lepsius.2192.d: "Se creó un Fondo extraño en [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]. Durante la excavación de un sitio inca, el profesor [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] encontró una gran cantidad de huesos. Un cráneo en particular llamó la atención. El cráneo tenía un agujero que parecía haber sido hecho a propósito. Al parecer, el fallecido sobrevivió al juicio, ya que el agujero se había vuelto a cerrar parcialmente."
 lepsius.2192.f: "\ \"¡Estoy seguro de que debe haber sido un sacrificio humano! ¿Qué piensas? \""
 lepsius.2192.g: "¡Extraterrestres!"
 lepsius_recent_excavation_inspection_modifier: "Recent Archaeological Inspection"
 lepsius.2193.t: "Momias incas de montaña"
 lepsius.2193.d: "Durante una expedición con [SCOPE.sCharacter('lepsius_mountaineer_character_scope').GetFullName] en [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName], el Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] hizo un descubrimiento espeluznante. En una montaña encontraron los restos de una joven momificada. Al parecer, se trataba de una \"qhapaq hucha\" de los incas, un sacrificio infantil. Aunque se trata de un triste hallazgo, podría aportar nuevos conocimientos sobre los incas."
 lepsius.2193.f: "\"Hacía un frío glacial, el viento nos desgarraba la ropa y apenas podíamos ver nada. Cuando nos fijamos en el cuerpo, primero pensamos que se trataba de un montañero que había muerto en circunstancias similares a las que teníamos que soportar ahora. Pero pronto nos dimos cuenta de que no era un montañero, sino una joven.\""
 lepsius.2193.g: "Esto es muy triste."
 lepsius.2194.t: "Ruinas incas"
 lepsius.2194.d: "El Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] hizo un descubrimiento en una región lejana de [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]. Encontró varias ruinas de la época del Imperio Inca. La mayoría de las ruinas están chamuscadas y se encontró algo de equipamiento europeo, lo que llevó a pensar que este asentamiento fue destruido por los españoles. Probablemente también saquearon el asentamiento, ya que no se hicieron otros hallazgos. Al parecer, se llevaron todo lo que tenía valor."
 lepsius.2194.f: "\"Hace mucho tiempo, esas ruinas debieron de ser viviendas bien construidas. Parecen capaces de resistir incluso terremotos. Sólo que... Los invasores españoles parecen ser más fuertes que los terremotos aparentemente.\""
 lepsius.2194.g: "¿No hay oro? ¿Por qué molestarse?"
