 je_lepsius_labyrinth: "El laberinto"
 je_lepsius_labyrinth_reason: "El líder de nuestra expedición a Creta se perdió en un antiguo complejo subterráneo que no figura en ningún documento de excavación. Si lo descubre, le aguardan la gloria y el honor; Si no lo hace, podría morir miserablemente aquí."
 je_lepsius_labyrinth_fail: "Si nuestro líder de expedición se pierde con demasiada frecuencia, existe el riesgo de que le pase algo muy, muy malo..."
 je_lepsius_labyrinth_success: "Sólo si el líder de la expedición descubre la respuesta correcta en cada punto podrá salir del laberinto con seguridad."
 je_ishtar_gate: "Reconstrucción de la Puerta de Ishtar"
 je_ishtar_gate_reason: "Después de que una expedición a Babilonia recuperara los restos de la legendaria Puerta de Ishtar, ampliamos nuestra licencia de excavación para enviar los ladrillos babilónicos a nuestro museo."
 je_ishtar_gate_success: "Se necesitan un total de 200.000 ladrillos para devolverle a la puerta su antiguo esplendor. Se espera que cada año nos lleguen unos 20.000 ladrillos, si no hay problemas."
 je_ishtar_gate_goal: ""
 je_lepsius_priams_treasure: "El tesoro de Príamo"
 je_lepsius_priams_treasure_reason: "Heinrich Schliemann busca un lugar adecuado para el legendario tesoro de Príamo, que afirma haber encontrado en Troya. Si bien los estudiosos serios dudan de que estas hazañas realmente encajen en la época temporal que sugiere Schliemann, esto es secundario. Se trata, al fin y al cabo, de una oportunidad única de tomar posesión de uno de los mayores tesoros arqueológicos del siglo. Nuestro museo sería el lugar perfecto para eso."
 je_lepsius_priams_treasure_fail: "Si un competidor es más rápido que nosotros para cumplir los deseos de Schliemann, perdemos la oportunidad única de conseguir el tesoro de Priam."
 je_lepsius_the_labyrinth: "El laberinto"
 je_lepsius_the_labyrinth_reason: "Atrapado en un extraño y antiguo laberinto, nuestro arqueólogo debe encontrar la salida. ¡Si comete demasiados errores, corre el riesgo de perderse allí para siempre!"
 je_lepsius_the_labyrinth_goal: "Escapa del laberinto sin perderte demasiado."
 je_lepsius_discovery_tut: "Investigación en el Valle de los Reyes"
 je_lepsius_discovery_tut_reason: "Tenemos todas las razones para creer que el Valle de los Reyes puede contener un sitio escondido de gran valor histórico. La búsqueda podría llevarnos años. Quien logre realizar este descubrimiento debería tener un lugar para ello en la historia."
 je_lepsius_disovery_tut_success: "Si logramos encontrar diez pistas en el Alto Egipto, habremos reunido material suficiente para redescubrir un lugar perdido de gran importancia histórica."
 je_lepsius_disovery_tut_fail: "Nuestros esfuerzos serán en vano si otra nación encuentra diez pistas en el Alto Egipto antes que nosotros."
 je_lepsius_discovery_ship: "Investigaciones cerca de las Pirámides"
 je_lepsius_discovery_ship_reason: "Tenemos todas las razones para creer que las Pirámides pueden esconder algo de gran valor histórico. La búsqueda podría llevarnos años. Quien logre realizar este descubrimiento debería tener un lugar para ello en la historia."
 je_lepsius_disovery_ship_success: "Si conseguimos encontrar diez pistas en el Bajo Egipto, habremos reunido material suficiente para redescubrir un lugar perdido de gran importancia histórica."
 je_lepsius_disovery_ship_fail: "Nuestros esfuerzos serán en vano si otra nación encuentra diez pistas en el Bajo Egipto antes que nosotros."
