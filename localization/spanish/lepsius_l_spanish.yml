 lepsius.17.manco: "La #E Mascapaicha de Huayna Capac#! es el artefacto más destacado del Imperio Inca.\n"
 lepsius_mascapaicha_knowledge_modifier: "Conocimiento de los mayores"
 je_lepsius_mascapaicha: "Decodificando el Quipu"
 je_lepsius_mascapaicha_reason: "Hasta ahora, la investigación de Quipu ha planteado más preguntas de las que ha respondido. Una cosa es cierta: se trata de una denominación de lugares que se pueden asignar a una secuencia, con números que representan diferentes tribus, cuya secuencia a su vez indica una especie de ruta. En resumen: el Quipu es una especie de mapa del tesoro. Sólo un arqueólogo experimentado puede descifrar completamente este misterio. Aún no está claro qué escondieron los incas con tanto cuidado; Para recuperarlo, deberíamos formar un pequeño equipo especial que no esté formado por un equipo de expedición ordinario: además del arqueólogo y el agregado, también necesitamos un piloto que nos llevará directamente a los Andes."
 je_lepsius_mascapaicha_success: "Ha decodificado el Quipu."
 lepsius_decode_quipu_button: "Decodificar el Quipu"
 lepsius_decode_quipu_button_desc: "Para decodificar con éxito el Quipu se requiere un arqueólogo famoso o experimentado y un departamento capacitado en artefactos mesoamericanos."
 lepsius_decode_quipu_tt: "El Quipu será decodificado después de un tiempo."
 lepsius_decode_quipu_done_tt: "Decodifica el Quipu."
 lepsius.474.t: "El Quipu Misterioso"
 lepsius.474.d: "El guía peruano llevó al equipo de expedición a un lugar secreto que ni siquiera muchos lugareños conocen. Encuentran un objeto extraño en el edificio de un templo abandonado al que no se ha accedido durante al menos cuatrocientos años."
 lepsius.474.f: "[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] inmediatamente siente que algo es único en este lugar. Este templo parece haber sido abandonado antes de la conquista española. No fue la invasión, sino el olvido lo que provocó la caída del edificio. A primera vista, resulta decepcionante encontrar pocos restos que proporcionen información sobre la vida de los incas antes de la llegada de Francisco Pizarro. El equipo está contento con los ejercicios arqueológicos obligatorios cuando un asistente encuentra un objeto siniestro en un bloque parecido a un altar. Se trata de un Quipu, el haz de nudos con el que los incas comunicaban números, estadísticas y datos. Sin embargo, es tan complejo que resulta difícil descifrar in situ."
 lepsius.474.g: "Debería examinarse más de cerca en casa."
 lepsius.571.t: "Secreto del Quipu"
 lepsius.571.d: "Incluso los académicos en casa están teniendo dificultades para descifrar el quipu que trajo la última expedición al Perú. Los científicos ahora coinciden en que es más que un simple registro de números."
 lepsius.571.f: "Después de un examen más detenido y comparaciones con sistemas de nudos conocidos anteriormente, científicos de varias universidades y empleados del Museo Arqueológico llegaron a la conclusión de que los nudos demuestran un sistema ya conocido. A primera vista, esto no tenía mucho sentido, suponiendo que se tratara puramente de una lista de impuestos o de un censo. En realidad es una colección de lugares. Los nombres se conocían a partir de otros registros quipu, pero se refieren menos a nombres de lugares que a los puntos de asentamiento de ciertos clanes. La teoría más extendida es que es similar a una instrucción de direcciones. No está claro adónde conduce."
 lepsius.571.g: "Este paquete de nudos... ¿es un mapa?"
 lepsius.572.t: "Búsqueda de la Mascapaicha"
 lepsius.572.d: "[SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName] no solo cree que [SCOPE.sCharacter('lepsius_archaeologist_scope').GetSheHe] ha descubierto la ubicación a la que conduce el mapa cifrado: [SCOPE.sCharacter('lepsius_archaeologist_scope').GetSheHe] también tiene una teoría sobre a qué podría conducir. Junto con [SCOPE.sCharacter('lepsius_pilot_scope').GetFullName] y [SCOPE.sCharacter('lepsius_archaeologist_attache').GetFullName], [SCOPE.sCharacter('lepsius_archaeologist_scope').GetSheHe] emprende una misión especial a las alturas más altas de los Andes."
 lepsius.572.f: "Fue difícil sacarle el secreto al Quipu. Se confirmó que las notas eran de carácter geográfico, destinadas a conducir a un lugar; un lugar tan remoto que era casi imposible llegar. [SCOPE.sCharacter('lepsius_pilot_scope').GetLastName] había señalado que no debían hacerse demasiadas esperanzas de encontrar una pista de aterrizaje lo suficientemente grande como para permitir que un avión aterrizara en esta zona inhóspita. Sin embargo, los registros militares mostraron una meseta conveniente para este propósito que estaba cerca del lugar del objetivo. De eso fue sólo una caminata de 10 millas. En el vuelo a Perú, el Prof. [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] les abrió la teoría [SCOPE.sCharacter('lepsius_archaeologist_scope').GetHerHis] sobre lo que podría haber allí. El hecho de que el edificio en el que se encontraba el Quipu sugiere que probablemente fue construido en la época del emperador Huayna Cápac, antes de que el Imperio Inca se hundiera en la guerra civil entre Huáscar y Atahualpa. En el lugar, especuló, podría haber algo de la época anterior al colapso del imperio y su posterior caída. Algo que representaba la unidad imperial y la grandeza de los incas y era tan precioso que se le había ocultado a Atahualpa porque muchos lo consideraban un gobernante ilegítimo que había dado un golpe de estado contra su hermano Huáscar. Un objeto que representaba como ningún otro el poder del Sapa Inca y que se daba por perdido: la corona de Huayna Capac. La Mascapaicha."
 lepsius.572.g: "Sería una sensación arqueológica."
 lepsius.573.d: "[SCOPE.sCharacter('lepsius_pilot_scope').GetFullName] encuentra un lugar de aterrizaje adecuado cerca del destino. Sin embargo, en su camino hacia la supuesta ubicación de Mascapaicha, el trío pronto se encuentra con un descubrimiento espectacular."
 lepsius.573.f: "Con el quipu en la mano de [SCOPE.sCharacter('lepsius_archaeologist_scope').GetHerHis] como una ruta de radiestesia, [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] condujo al pequeño grupo a la ladera de una montaña. Allí se colocaron escalones como cuñas a alturas vertiginosas. El trío sube los primeros metros y luego encuentra un camino cubierto de maleza. Una breve inspección por parte del arqueólogo no deja lugar a dudas. Los cuboides colocados con precisión son claramente de la época de los Incas. Siguen el Camino Inca hacia un valle dominado por la niebla, que no era visible desde el avión. Caminan kilómetro tras kilómetro. De repente [SCOPE.sCharacter('lepsius_pilot_scope').GetLastName] descubre algo. A pesar de la niebla, se destaca un destello entre la bruma. Es oro. Oro puro. ¡Oro enorme! Un ídolo gigantesco, alto como un edificio de tres pisos, se destaca entre la niebla. [SCOPE.sCharacter('lepsius_pilot_scope').GetLastName] abandona el camino y se acerca. [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] quiere volver a llamar a [SCOPE.sCharacter('lepsius_archaeologist_scope').GetHerHim] diciéndole que esto podría ser una trampa. La distracción podría ser peligrosa. [SCOPE.sCharacter('lepsius_attache_scope').GetLastName], sin embargo, sigue indeciso."
 lepsius.573.g: "Un poco de oro no vendrá mal."
 lepsius.573.h: "Sólo el hombre humilde encontrará la Mascapaicha."
 lepsius.574.d: "El trío continuó su camino. Pero de repente [SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName] encuentra algo que le detiene. [SCOPE.sCharacter('lepsius_pilot_scope').GetFullName] y [SCOPE.sCharacter('lepsius_attache_scope').GetFullName] ya han caminado varios metros cuando notan que el profesor no está."
 lepsius.574.f: "Era una inscripción. ¿Una inscripción? ¿Fuentes epigráficas en los Andes? ¿En una sociedad cuyo sistema nodal no tenía ninguna función correspondiente al alfabeto? ¡Solo eso fue un descubrimiento increíble! Los mayas se basaban en jeroglíficos, los aztecas basaban sus códices en pictogramas. Pero esa era una fuente con acentos parecidos a letras. ¿Podría haber sucedido esto? Y lo que sorprendió aún más a [SCOPE.sCharacter('lepsius_archaoelogist_scope').GetLastName]:\n[SCOPE.sCharacter('lepsius_archaeologist_scope').GetSheHe] podía leerlos.\nSin conocimientos previos. Sin estudiar. Sin entender ni remotamente cómo pudo haber sucedido esto. Fue como si [SCOPE.sCharacter('lepsius_archaeologist_scope').GetSheHe] sumergiera un dedo en la escritura tallada y absorbiera su contenido. [SCOPE.sCharacter('lepsius_archaeologist_scope').GetSheHe] no los leyó. La Escritura habló a [SCOPE.sCharacter('lepsius_archaeologist_scope').GetHerHim]. Y cuanto más tiempo sumergía [SCOPE.sCharacter('lepsius_archaeologist_scope').GetSheHe] en [SCOPE.sCharacter('lepsius_archaeologist_scope').GetHerselfHimself], más abrumador era lo que [SCOPE.sCharacter('lepsius_archaeologist_scope').GetSheHe] aprendía. Porque el conocimiento se almacenó aquí. Conocimientos centenarios y milenarios de todas las culturas de América del Sur y Central. Totalmente absorto en este glorioso descubrimiento, [SCOPE.sCharacter('lepsius_archaeologist_scope').GetSheHe] no se da cuenta de cómo el agregado sacude a [SCOPE.sCharacter('lepsius_archaeologist_scope').GetHerHim], intenta arrastrar a [SCOPE.sCharacter('lepsius_archaeologist_scope').GetHerHim] y el piloto se queda indeciso, contemplando la absurda escena que se desarrolla ante [SCOPE.sCharacter('lepsius_archaeologist_scope').GetSheHe]1."
 lepsius.574.g: "El conocimiento no es pecado."
 lepsius.575.d: "El grupo llega a un edificio que no se parece mucho al templo donde una vez se encontró el misterioso Quipu. Entran al edificio, liderados por [SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName], quien mira a su alrededor investigativamente. La horrible imagen de un demonio ocupa la pared frente a ellos."
 lepsius.575.f: "La eterna niebla que plagaba el valle desconocido también nublaba el templo. Cubría paredes y estatuas como un fino vestido. [SCOPE.sCharacter('lepsius_pilot_scope').GetLastName] encendió un cigarrillo y añadió una nota de nicotina a la niebla. [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] buscó pistas en el área. Pero [SCOPE.sCharacter('lepsius_attache_scope').GetLastName] no notó nada. [SCOPE.sCharacter('lepsius_attache_scope').GetSheHe] se paró cara a cara con la imagen del demonio como si estuviera hipnotizado. [SCOPE.sCharacter('lepsius_attache_scope').GetHerHis] ojos miraron la mueca de la criatura primitiva. El viento susurró en [SCOPE.sCharacter('lepsius_attache_scope').GetHerHis] oídos. Viento que se convirtió en palabras. Palabras que susurraron a [SCOPE.sCharacter('lepsius_attache_scope').GetHerHim] que se arrodillara. Era un terreno sagrado en el que se encontraba [SCOPE.sCharacter('lepsius_attache_scope').GetSheHe]. La tierra de un dios ante quien [SCOPE.sCharacter('lepsius_attache_scope').GetSheHe] debía inclinarse. Un Dios que era amo del mundo. Quien elevó a los mendigos a reyes y les confió los reinos del mundo. Un Dios que hizo caer ante [SCOPE.sCharacter('lepsius_attache_scope').GetHerHim] a todos los gobernantes del mundo, ya sean príncipes o elegidos. 'Os daré todo el poder y la gloria de estos reinos; porque son míos y se los doy a quien quiero. Si te postras ante mí y me adoras, todo será tuyo.'\nEl humo del cigarrillo se arremolinaba alrededor de [SCOPE.sCharacter('lepsius_attache_scope').GetLastName]. El piloto habló con palabras confusas y trató de hacer entrar en razón a [SCOPE.sCharacter('lepsius_attache_scope').GetHerHim]. El arqueólogo está ahí sólo como un espectador."
 lepsius.575.g: "Tienes que gobernar si quieres la Mascapaicha."
 lepsius.576.t: "La Mascapaicha"
 lepsius.576.d: "Por primera vez desde que llegaron al valle, la niebla se disipó. En una cámara oculta que descubrió el Prof. [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName], no hay nada más que un pedestal. Una sombra se eleva sobre él. Es la sombra de un imperio caído. La sombra del conocimiento desaparecido. La sombra del oro perdido. Es la sombra de la Mascapaicha, la corona del Sapa Inca."
 lepsius.576.f: "La Mascaipacha era el símbolo imperial, usado únicamente por el Sapa Inca como Rey del Cusco y Emperador del Tawantinsuyu. Era una corona hecha de capas de trenzas multicolores, de la que colgaba el latu, una franja de la más fina lana roja, con borlas rojas fijadas a tubos dorados. Estaba decorado con hilos de oro y un penacho con dos o tres plumas erguidas del caracara de montaña, ave sagrada llamada corequenque, era la expresión física del poder político supremo en el Imperio Inca. En algunas ceremonias el Sapa Inca llevaba la Mascaipacha en la mano, mientras portaba un tocado de guerra (un casco decorado con plumas)."
 lepsius.576.g: "¡Esta debe ser la corona de Huayna Capac!"
 lepsius.577.t: "Muerte en los Andes"
 lepsius.577.d: "Nunca más se volvió a ver la misión especial en los Andes. No hay señales de vida. Sin rastros. Parece que la búsqueda del Mascapaicha por parte de la expedición fue fatal."
 lepsius.577.f: "Cuando los científicos y agentes del servicio secreto se enteran del avance de la expedición en los Andes, no pueden obtener ninguna pista. Sólo queda el avión de la tripulación desaparecida como única prueba de que debió haber ocurrido. Los lugareños dicen que el lugar de aterrizaje estaría muy cerca de un valle maldito. Maldito porque la gente que entra allí desaparece. Allí caerían bajo las tentaciones de los demonios y morirían miserablemente. Los científicos han postulado que las esporas de plantas desconocidas, los vapores de azufre u otros gases pueden ser responsables de la neblina similar a la niebla que podría provocar alucinaciones."
 lepsius.577.g: "¿Se han convertido en víctimas de sus propias ilusiones?"
 lepsius_specialization_egypt_tech: "egiptología"
 lepsius_specialization_egypt_tech_desc: "El enfoque en el Antiguo Egipto lleva a nuestros arqueólogos a tener el rasgo de Arqueología Egipcia desde el principio. Además, por cada excavación en Egipto recibimos un artefacto más cada año."
 lepsius_specialization_mesopotamia_tech: "asiriología"
 lepsius_specialization_mesopotamia_tech_desc: "El enfoque en Mesopotamia lleva a nuestros arqueólogos a tener el rasgo de Arqueología Mesopotamia desde el principio. Además, por cada excavación en Mesopotamia recibimos un artefacto más cada año."
 lepsius_specialization_aegean_tech: "Arqueología del Egeo"
 lepsius_specialization_aegean_tech_desc: "El enfoque en las Civilizaciones del Egeo lleva a nuestros arqueólogos a tener el rasgo de Arqueología del Egeo desde el principio. Además, por cada excavación en Grecia o Creta recibimos un artefacto más cada año."
 lepsius_specialization_precolumbian_tech: "Arqueología Precolombina"
 lepsius_specialization_precolumbian_tech_desc: "El enfoque en las Culturas Precolombinas lleva a nuestros arqueólogos a tener el rasgo de Arqueología Precolombina desde un inicio. Además, por cada excavación en Centro o Sudamérica recibimos un artefacto más cada año."
