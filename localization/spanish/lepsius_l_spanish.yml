 je_lepsius_archaoelogical_society: "Fundó una sociedad arqueológica"
 je_lepsius_archaoelogical_society_reason: "En nuestro país no sólo crece constantemente el interés por la arqueología. Después de muchos años de expediciones, excavaciones y descubrimientos de artefactos, nuestro país ha acumulado una experiencia arqueológica asombrosa. Un arqueólogo destacado podría crear una Sociedad Arqueológica para reunir las fuerzas científicas e intelectuales y dar un nuevo impulso. Esto no sólo mejoraría nuestra producción científica, sino que también mejoraría la experiencia de las generaciones posteriores de arqueólogos."
