 je_lepsius_specialization: "Especialización Arqueológica"
 je_lepsius_specialization_reason: "Una nación puede elegir un foco arqueológico una vez. Dependiendo de la subcategoría arqueológica, recibe un artefacto más (egipcio, mesopotámico, egeo, precolombino) por año por cada excavación. Los nuevos arqueólogos reciben el rasgo de especialización correspondiente y encuentran 5 artefactos más al final de la expedición."
 je_lepsius_specialization_success: "[GetPlayer.GetName] ha seleccionado una especialización arqueológica."
 lepsius_archaeological_expedition_specialization_tt: "Gracias a la especialización de nuestro arqueólogo, recibimos #G 5#! [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] adicional."
 lepsius_add_1_specialization_clue_tt: "Gracias a la especialización de nuestro arqueólogo, recibimos #G 1#! pista adicional."
 je_lepsius_alexander: "La tumba de Alejandro"
 je_lepsius_alexander_reason: "Alejandro Magno fue uno de los generales más importantes de todos los tiempos y fundó un imperio mundial del que surgieron los imperios helenísticos. Venerada y temida a la vez, su tumba se convirtió en un lugar de peregrinación en el mundo antiguo. Pero a más tardar a partir del siglo V d.C. se desconocía el lugar exacto de la tumba. La mayoría de las fuentes hablan de Alejandría como el último lugar de enterramiento, pero incluso esto no está completamente exento de controversia. Nuestro objetivo principal es llevar a cabo una excavación, ya sea con licencia o por la fuerza, en sitios donde se han encontrado rastros de Alejandro. Siguiendo pistas, podremos localizar la tumba con mayor precisión. Para ello, sin embargo, tendremos que desplazarnos de un lugar de excavación a otro como en una búsqueda del tesoro."
 je_lepsius_alexander_success: "Si encontramos suficientes #V Pistas misteriosas#! sobre la tumba de Alejandro, podremos localizarla."
 je_lepsius_alexander_goal: ""
 je_lepsius_ark: "El Arca de la Alianza"
 je_lepsius_ark_reason: "El Arca de la Alianza es de altísimo valor religioso y arqueológico. El pueblo de Israel lo consideraba el centro de su santuario, el Templo de Jerusalén. Desde los tiempos de Moisés, como guardián de los Diez Mandamientos, ha sido un compañero en la reconquista de Tierra Santa. El Arca era la garante de la presencia de Dios en medio del pueblo. Se considera perdida desde la conquista de Jerusalén por Nabucodonosor II (587/586 a. C.). Nuestro objetivo principal es realizar una excavación, ya sea con licencia o por la fuerza, en los sitios donde se han encontrado rastros del Arca. Siguiendo pistas, podemos localizar la verdadera ubicación con mayor precisión. Para ello, sin embargo, tendremos que desplazarnos de un lugar de excavación a otro como en una búsqueda del tesoro."
 je_lepsius_ark_success: "Si encontramos suficientes #V Pistas misteriosas#! sobre el Arca, podremos localizarla."
 je_lepsius_ark_goal: ""
 je_lepsius_atlantis: "El destino de la Atlántida"
 je_lepsius_atlantis_reason: "La Atlántida es uno de los mayores mitos humanos de la historia mundial. La caída de la legendaria ciudad se ha convertido en un símbolo: representa la pérdida de un paraíso, la profecía de un gran país de Occidente y la caída de una civilización altamente desarrollada. Por primera vez, Platón menciona la supuestamente poderosa potencia marítima que dominó gran parte del Mediterráneo hasta que un desastre natural selló su destino. La posible existencia de la Atlántida ya se hablaba en la antigüedad. Mientras autores como Plinio el Viejo negaban la existencia del reino insular en cuestión, otros, como Crántor, Poseidonio y Estrabón, consideraban concebible su existencia. Nuestro objetivo principal es realizar una excavación, ya sea con licencia o por la fuerza, en sitios donde se han encontrado rastros de la Atlántida. Siguiendo pistas podremos localizar con mayor precisión la posición de la ciudad. Para ello, sin embargo, tendremos que desplazarnos de un lugar de excavación a otro como en una búsqueda del tesoro."
 je_lepsius_atlantis_success: "Si encontramos suficientes #V Pistas Misteriosas#! sobre la Atlántida, podremos identificarla."
 je_lepsius_atlantis_goal: ""
 je_lepsius_eldorado: "La búsqueda de El Dorado"
 je_lepsius_eldorado_reason: "¿Estaban los conquistadores siguiendo meros cuentos de hadas y cuentos fantásticos? Sin las historias de los legendarios pueblos del oro, Balboa no habría encontrado el Pacífico, Hernando de Soto no habría vagado por lo que hoy es Estados Unidos. El descubrimiento del Nuevo Mundo habría sido diferente. El caso Cortés y el caso Pizarro confirmaron las leyendas. Quizás haya algo de cierto en el hecho de que todavía exista una importante ciudad por descubrir en el continente americano: los datos arqueológicos hablan por sí solos. Nuestro objetivo principal es realizar excavaciones, ya sea con licencia o por la fuerza, en sitios donde se han encontrado rastros de El Dorado. Siguiendo pistas podremos localizar la ciudad con mayor precisión. Para ello, sin embargo, tendremos que desplazarnos de un lugar de excavación a otro como en una búsqueda del tesoro."
 je_lepsius_eldorado_success: "Si encontramos suficientes #V Pistas misteriosas#! sobre El Dorado, podremos localizarlo."
 je_lepsius_eldorado_goal: ""
