 lepsius_expedition_general_information_loc: "\n$mr_divider_for_je$\nTu [concept_lepsius_expedition] recibirá un evento cada mes, lo que sumará progreso a tu expedición. Una vez que el progreso alcance el límite, tu expedición finalizará.\n$mr_divider_for_je$\nEl valor de Éxito te indica qué tan exitosa es tu expedición. Cuanto más éxito obtengas, más [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] recibirás al final de la expedición. Obtendrás una cantidad máxima de artefactos si tu éxito llega a #V. 15#!.\nMany factores pueden influir en tu éxito, desde eventos hasta tu preparación. Por ejemplo, 10 niveles de Universidades con un [concept_pm_academics_university_humanities] te otorgarán 1 punto de éxito al comienzo de una expedición. Ten en cuenta que puedes obtener un máximo de 4 puntos de las especializaciones de la Universidad."
