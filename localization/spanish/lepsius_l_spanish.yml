 je_lepsius_discovery_pakal: "Investigaciones en Yucatán"
 je_lepsius_discovery_pakal_reason: "Tenemos todas las razones para creer que no todos los misterios mayas se han resuelto todavía. La búsqueda podría llevarnos años. Quien logre realizar este descubrimiento debería tener un lugar para ello en la historia."
