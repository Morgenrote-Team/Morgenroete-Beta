 klimt.11.t: "Disolución de una galería"
 klimt.11.d: "El gobierno ya no puede garantizar una galería nacional en [SCOPE.sState('klimt_gallery_state').GetName]. Se decidió disolverlo y transferir las exhibiciones más importantes a nuestra capital."
 klimt.11.f: "Si existe una galería nacional fuera de la capital, automáticamente se disolverá y exhibirá en su propia galería nacional. Si todavía no hay una galería nacional, se construirá una nueva."
 klimt.11.g: "Esta exquisita colección de pinturas enriquecerá nuestra galería nacional."
 klimt.11.h: "Tome la colección como base para construir una nueva galería nacional."
 alert_klimt_painter_trip_possible_alert_hint: "Tienes un [concept_klimt_painter] que podría estudiar un nuevo estilo de arte en un [concept_artists_center_of_arts]. Presione el botón en la pestaña Artista en la ventana #V MorGenröte#! para enviarlos."
