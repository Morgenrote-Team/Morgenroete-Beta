 klimt_great_painting_modifier: "Gran retrato"
 klimt_excellent_taste_modifier: "Gran sabor"
 klimt_disgusting_painting_modifier: "Retrato asqueroso"
 klimt_disgusting_taste_modifier: "Sabor asqueroso"
 klimt_art_censorship_modifier: "Censura de pintura"
 je_klimt_rossetti: "Hermandad prerrafaelita"
 je_klimt_rossetti_reason: "Los prerrafaelitas son un grupo de artistas que ven una ruptura cultural en el arte renacentista de Raphael y Michelangelo. Prefieren la pintura italiana del Trecento y Quattrocento. Se vieron a sí mismos como un movimiento de reforma. Su rivalidad era menos con los artistas renacentistas reales que con los neoclásicos que se modelaban sobre ellos. Particularmente tomaron temas medievales. Uno de sus representantes más famosos fue Dante Gabriele Rossetti."
 je_klimt_fattori: "Macchiaioli"
 je_klimt_fattori_reason: "Los Macchiaioli eran un grupo artístico italiano único que anticipaba innovaciones en el impresionismo, pero permaneció en gran medida desapercibido en su tiempo. El término MacChiaioli se deriva de la palabra italiana Macchia, que significa que Spot (un segundo significado es Scrub, Maquis). Su representante más importante fue Giovanni Fattori."
 je_klimt_barbizon: "La escuela Barbizon"
 je_klimt_barbizon_reason: "La escuela Barbizon fue formada por un grupo de pintores de paisajes franceses hacia el final del primer tercio del siglo XIX. Los artistas se quedaron en el pueblo de Barbizon, cerca del bosque de Fontainebleau. La colonia del pintor, que fue fundada por Théodore Rousseau y existió hasta alrededor de 1870, tuvo una influencia significativa en la pintura de paisajes en toda Europa, especialmente el impresionismo."
 klimt.501.t: "Los prerrafaelitas"
 klimt.501.d: "With the Pre-Raphaelites, a brotherhood was established that opposed classicism and realism, but at the same time saw itself as a reform movement. Their support could bring new talent to light, but that would contradict the style of our current painter, [ROOT.Var('klimt_painter_var').GetCharacter.GetFullName]."
 klimt.501.f: "\"He estado aquí antes, \ nbut cuando o cómo no puedo decir: \ ni conocer la hierba más allá de la puerta, el olor dulce y agudo, el sonido de suspiro, las luces alrededor de la orilla\". -Dante Gabriele Rossetti"
 klimt.501.g: "Promueva la hermandad prerrafaelita."
 klimt.501.h: "[ROOT.Var('klimt_painter_var').GetCharacter.GetLastName] is way better"
 klimt.502.t: "Los macchiaioli"
 klimt.502.d: "El grupo de artistas Macchiaioli fue fundado hoy en Florencia. Aunque su influencia es pequeña, el grupo inspira a algunos artistas jóvenes a buscar nuevos caminos en el arte."
 klimt.502.f: "'La mancha (MacChia) es la solidez de los cuerpos frente a la luz' -Giovanni Fattori"
 klimt.502.g: "¿Entonces fueron Avantgarde antes de la Avantgarde?"
 klimt.503.t: "Escuela de Barbizon"
 klimt.503.d: "Con el establecimiento de un círculo de pintores cerca de Fontainebleau bajo la dirección de Théodore Rousseau, la pintura de paisajes experimentó nuevos impulsos en toda la escena artística."
 klimt.503.f: "'Si mi pintura representa fielmente y sin refinamiento excesivo el carácter simple y verdadero del lugar que ha frecuentado, si tengo éxito ... al dar su propia vida a ese mundo de vegetación, entonces escuchará los árboles que gimieron bajo el viento invernal, las aves que llaman a sus jóvenes y gritan después de su dispersión; Sentirás que el viejo castillo temblaba; Te dirá que, como la esposa que amabas, también ... desaparecerá y renacerá en múltiples formas ... uno no copia con precisión matemática lo que uno ve, pero uno siente e interpreta un mundo real, todas cuyas muertes te mantienen rápidamente atado '. -Téodore Rousseau"
 klimt.503.g: "¡Bien paisajes!"
 klimt.601.t: "La muerte de [SCOPE.sCharacter('klimt_painter_scope').GetLastName]"
 klimt.601.d: "[SCOPE.sCharacter('klimt_painter_scope').GetFullName], un pintor a nivel nacional e internacional de gran prestigio y una de las personalidades artísticas sobresalientes de nuestro país, murió hoy. Deja un espacio que difícilmente puede llenarse."
 klimt.601.f: "El 26 de junio de 1835, Caspar David Friedrich sufrió un derrame cerebral con síntomas de parálisis. Tomó una cura en Teplitz, que solo podía permitirse vendiendo algunas fotos sobre el poeta Zhukovsky a la corte del zar ruso. Después del tratamiento, Friedrich comenzó a pintar nuevamente, lo que le causó dificultades. Sin embargo, la playa de pintura al óleo de Moonlight se creó en 1835/36. Hasta 1839, principalmente produjo dibujos y acuarelas sepia, menos paisajes y más alegorías de muerte. Friedrich envió algunos dibujos sepia a las exposiciones de arte de Dresde en 1836 y 1838. En el último año de mi vida, el trabajo se detuvo. Friedrich murió a la edad de 65 años el 7 de mayo de 1840 en Dresde y fue enterrado en el cementerio de Trinity."
 klimt.601.g: "But who is painting [ROOT.Var('klimt_painter_var').GetCharacter.GetHerHis] death portrait now?"
 klimt.602.f: "A medida que Turner crecía, se volvió más excéntrico. Tenía pocos amigos cercanos, excepto su padre, que vivió con él durante 30 años y trabajó como su asistente de estudio. La muerte de su padre en 1829 tuvo un profundo efecto en él, y luego estuvo sujeto a episodios de depresión. Turner murió de cólera en la casa de Sophia Caroline Booth, en Cheyne Walk en Chelsea, el 19 de diciembre de 1851. Está enterrado en la Catedral de San Pablo, donde se encuentra cerca del pintor Sir Joshua Reynolds. Aparentemente, sus últimas palabras fueron \"El Sol (¿o Hijo?) Es Dios\", aunque esto puede ser apócrifa."
 klimt.603.f: "El 6 de febrero de 1848, la familia Cole asistió a un servicio matutino en la Iglesia Episcopal de Saint Luke en Catskill. Después del almuerzo, Cole se quejó de lassitudes y a medianoche su condición empeoró y el médico fue convocado. Siguió un ataque de pleuresia y congestión de sus pulmones. Thomas Cole murió en la casa principal de Cedar Grove a las 8 pm del viernes 11 de febrero de 1848."
 klimt.604.f: "El invierno de 1862/63 fue extremadamente duro para Delacroix; Sufría una mala infección de garganta que parecía empeorar en el transcurso de la temporada. En un viaje a Champrosay, conoció a un amigo en el tren y se agotó después de tener una conversación. El 1 de junio regresó a París para ver a su médico. Dos semanas después, el 16 de junio, estaba mejorando y regresó a su casa en el país. Pero para el 15 de julio estaba lo suficientemente enfermo como para ver nuevamente a su médico, quien dijo que no podía hacer nada más por él. Para entonces, la única comida que podía comer era fruta. Delacroix se dio cuenta de la seriedad de su condición y escribió su testamento, dejando un regalo para cada uno de sus amigos. Para su ama de llaves de confianza, Jenny Le Guillou, dejó suficiente dinero para que ella viviera mientras ordenaba que se vendiera todo en su estudio. También insertó una cláusula que prohíbe cualquier representación de sus características, 'ya sea por una máscara de muerte o por dibujo o por fotografía. Lo prohíbe, expresamente. El 13 de agosto, Delacroix murió."
 klimt.605.f: "En los últimos años de su vida, la vista de Eckersberg comenzó a fallar. Esto finalmente lo llevó a tener que dejar de pintar por completo. Murió en Copenhague de Cólera el 22 de julio de 1853 durante la gran epidemia. Está enterrado en el cementerio Asistente de Copenhague."
 klimt.901.t: "[GetPlayer.GetNameNoFlag] Firmamento"
 klimt.901.d: "[GetPlayer.GetNameNoFlag] is a leading nation in the field of astronomy. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]'s outstanding discoveries inspired [ROOT.Var('klimt_painter_var').GetCharacter.GetLastName] to create a painting depicting the night sky and the cosmos."
 klimt.901.f: "Los hitos de una nación también tienen un impacto en los pintores del país. Eventos culturales extraordinarios, avances tecnológicos y descubrimientos científicos pueden inspirar a los artistas a capturarlos en lienzo para la eternidad."
 klimt.901.g: "¡Hermoso!"
 klimt.902.t: "Tesoros del Pacífico"
 klimt.902.d: "The return of an expedition from the Pacific has left its mark: exotic goods, fascinating art treasures, new oceanographic knowledge and wild animals have reached [GetPlayer.GetNameNoFlag]. [ROOT.Var('klimt_painter_var').GetCharacter.GetLastName] was inspired by this to create a painting that showcases our nation's will to discover and explore."
 klimt.903.t: "Arte oriental"
 klimt.903.d: "The increasing number of expeditions to the Middle East have awakened a euphoria in society for an art movement that can be described as 'Orientalism'. [ROOT.Var('klimt_painter_var').GetCharacter.GetLastName] was also captured by the fascination of the Orient and painted a fantasy painting from 1001 Nights."
 klimt.904.t: "El impulso de una nueva era"
 klimt.904.d: "[GetPlayer.GetNameNoFlag] is at the forefront of conquering the skies. New machines, whether airplanes or zeppelins, populate the sky. New records are broken every day and our pilots are considered national heroes. [ROOT.Var('klimt_painter_var').GetCharacter.GetLastName] has cast the spirit of this new era in color and celebrates the triumph of technology, will and heroism."
 klimt.905.t: "Retrato con tigre y león"
 klimt.905.d: "During his last visit to the zoo, [ROOT.Var('klimt_painter_var').GetCharacter.GetLastName] was able to experience first hand the exotic animals that [GetPlayer.GetNameNoFlag] had already brought to the capital from all over the world. As a qualified zoologist, Prof. [ROOT.Var('dubois_naturalist_var').GetCharacter.GetLastName] gave [ROOT.Var('klimt_painter_var').GetCharacter.GetHerHim|U] a tour and told him some interesting facts about the animals. At the end of his stay, [ROOT.Var('klimt_painter_var').GetCharacter.GetSheHe|U] created an extraordinary self-portrait."
 klimt.906.t: "Bocetos de dinosaurios"
 klimt.906.d: "Inspired by the successes of Prof. [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName], [ROOT.Var('klimt_painter_var').GetCharacter.GetLastName] tried to breathe life back into the extinct reptiles in a picture."
 klimt.907.t: "Secretos de la jungla"
 klimt.907.d: "The archaeological discoveries in Yucatan and the adventurous circumstances in which researchers like Prof. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] repeatedly discovered new Mayan sites led [ROOT.Var('klimt_painter_var').GetCharacter.GetLastName] to immortalize our expeditions in pictures."
 klimt.908.t: "Portrait of [ROOT.Var('elgar_composer_var').GetCharacter.GetFullName]"
 klimt.908.d: "The tireless work and the constantly new highlights in Maestro [ROOT.Var('elgar_composer_var').GetCharacter.GetLastName]'s work have inspired [ROOT.Var('klimt_painter_var').GetCharacter.GetLastName] to create a portrait of the composer. Not only his unparalleled music, but also this painting will increase his fame."
 klimt.911.t: "¿Un retrato del [SCOPE.sCharacter('klimt_ruler_scope').GetPrimaryRoleTitle]?"
 klimt.911.d: "A portrait of [SCOPE.sCharacter('klimt_ruler_scope').GetFullName] is still missing from the official gallery of [GetPlayer.GetNameNoFlag]'s heads of state. [ROOT.Var('klimt_painter_var').GetCharacter.GetFullName] is considered an obvious candidate to properly showcase the ruler."
 klimt.911.f: "Cada término existe la posibilidad de que se le pida a un pintor que pinte un retrato del jefe de gobierno o jefe de estado. Si esto tiene éxito depende de la reputación del artista en cuestión."
 klimt.911.g: "Crear un retrato."
 klimt.911.h: "Y si sale mal, ¿quién lo pagará?"
 klimt.912.t: "A ... retrato notable"
 klimt.912.d: "[ROOT.Var('klimt_painter_var').GetCharacter.GetFullName] publicly unveiled [ROOT.Var('klimt_painter_var').GetCharacter.GetHerHis] portrait of the [SCOPE.sCharacter('klimt_ruler_scope').GetPrimaryRoleTitle] today. While fellow artists emphasize the 'audacity' and 'innovation', parts of the government are horrified by it."
 klimt.912.f: "'¡Eso es asqueroso!' '\ N'it se llama kubismo, señor'."
 klimt.912.g: "El arte es arte."
 klimt.912.h: "¡Destruye esa pintura!"
 klimt.913.t: "Un gran retrato"
 klimt.913.d: "[ROOT.Var('klimt_painter_var').GetCharacter.GetFullName] has outdone [ROOT.Var('klimt_painter_var').GetCharacter.GetHerselfHimself] with [ROOT.Var('klimt_painter_var').GetCharacter.GetHerHis] painting of the [SCOPE.sCharacter('klimt_ruler_scope').GetPrimaryRoleTitle]. The painting immediately aroused enthusiasm and is considered one of [ROOT.Var('klimt_painter_var').GetCharacter.GetHerHis] best works."
 klimt.913.f: "'Seis pies y medio de altura, músculos como Hércules, un aspecto fuerte como Napoleón, una cara como Afrodita, sí, es cierto, ¡soy yo! Ducha al artista con dinero."
