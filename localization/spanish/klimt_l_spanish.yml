 je_klimt_painter_trip: "Viaje educativo"
 je_klimt_painter_trip_reason: "En un [concept_klimt_painter_trip], un pintor puede aprender un estilo de arte previamente desconocido y, por lo tanto, mejorar el [concept_klimt_painting_tradition] anual. También pueden adquirir otros rasgos positivos y negativos durante su estadía en un [concept_artists_center_of_arts] extranjero."
 je_klimt_painter_trip_goal: "Por lo general, un pintor completa sus estudios en #G 12 meses#!. Los eventos pueden alargar o acortar esta vez."
 je_klimt_secession: "La secesión de Art Nouveau"
 je_klimt_secession_reason: "El nuevo movimiento de arte de Art Nouveau ha atraído a numerosos artistas. Bajo ciertas condiciones, esto puede dar lugar a un movimiento artístico establecido que disfruta de un renombre internacional y le da a la pintura y a la arquitectura un nuevo impulso. Históricamente, una de las asociaciones más importantes de este tipo fue la secesión de Viena. La secesión de Viena, más precisamente la asociación de artistas austriacos, es una asociación de artistas en Viena del período Fin de Siècle. Derivada de esto, la variante vienesa de Art Nouveau también se conoce como estilo de secesión o art nouveau vienés."
 je_klimt_secession_fail: "Otra nación desbloqueó la secesión ante nosotros."
