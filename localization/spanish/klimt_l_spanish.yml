 klimt.403.d: "[GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName] ha regresado del viaje de estudio [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetHerHis] y ha traído con [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetHerHim] nuevas experiencias, nuevos conocimientos y nueva inspiración. [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetSheHe|U] también ha mejorado un poco la reputación de [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetHerHis] en el mundo del arte."
 klimt.425.d: "Desde [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetHerHis] llegó a [SCOPE.sState('klimt_center_of_art_scope').GetCityHubName], [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName] ha tenido cientos y miles de impresiones. Ha pasado mucho tiempo desde que una idea siguió a la siguiente. [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetLastName] puede sentir literalmente cómo este lugar vigoriza [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetHerHim]."
