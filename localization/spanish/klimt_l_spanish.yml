 klimt_recently_hired_independent_painter_modifier: "Pintor independiente recientemente contratado"
 klimt.2.f: "A la edad de alrededor de 40 años, un [concept_klimt_painter] considerará que sus estudios están completos y finalmente se conformará con su estilo de pintura preferido. La regla general es que este estilo se basa en el género más moderno, siendo Art Nouveau la más moderna y clasicismo como la forma de arte más arcaica. Los pintores con un estilo de pintura especializado crearán obras maestras en este estilo de arte bajo ciertas condiciones. También puede iniciar una colección de arte en una galería que se adapte a su gusto. Un pintor especializado considera que su entrenamiento de pintura está completo y ya no realizará viajes educativos."
 klimt.2.g: "El estilo de pintura ahora es maduro."
 klimt.10.t: "Galería inaugurada"
 klimt.10.d: "El recién nombrado director abrió la nueva galería de arte con una ceremonia de celebración. Uno de los invitados de honor fue [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName], que asistió a la Ley con satisfacción."
 klimt.10.f: "La construcción de una galería nacional abre una variedad de posibilidades. Los pintores especializados crearán automáticamente una colección de arte adaptada a sus gustos. En consecuencia, los artistas que han abandonado el estilo romántico crearán una colección de pinturas románticas. Tal colección de arte se puede mejorar aún más con una obra maestra para que sea una excelente colección. Las obras maestras pueden ser pintadas al azar con el tiempo por artistas en este movimiento de arte o adquiridas desde el extranjero."
 klimt.10.g: "¡Finalmente ya no tenemos que almacenar estas cosas en el ático!"
 klimt.20.t: "Galería nacional"
 klimt.20.d: "Las obras maestras definitorias de una era se muestran en la galería de arte. Actualmente poseemos las siguientes pinturas únicas:"
 klimt.20.none: "Actualmente no tenemos obras maestras en la Galería Nacional."
