 klimt.20.g: "Que tenga un lindo día."
 klimt.30.t: "Un soplo de aire fresco para el arte"
 klimt.30.d: "[SCOPE.sState('klimt_secession_state').GetCityHubName] se ha convertido en el centro de un movimiento de arte destacado internacional profundamente relacionado con Art Nouveau. El círculo artístico se describe a sí mismo como la 'secesión [SCOPE.sState('klimt_secession_state').GetCityHubName]'."
 klimt.30.f: "La secesión de Viena es un movimiento de arte, estrechamente relacionado con Art Nouveau, que fue formado en 1897 por un grupo de pintores austriacos, artistas gráficos, escultores y arquitectos, incluidos Josef Hoffman, Koloman Moser, Otto Wagner y Gustav Klimt. Renunciaron a la Asociación de Artistas austriacos en protesta contra su apoyo a estilos artísticos más tradicionales. Su trabajo arquitectónico más influyente fue el edificio de secesión diseñado por Joseph Maria Olbrich como un lugar para las exposiciones del grupo. Su revista oficial se llamaba ver Sacrum (Sacred Spring, en latín), que publicó obras de arte gráfico altamente estilizadas e influyentes. En 1905, el grupo en sí se separó, cuando algunos de los miembros más destacados, incluidos Klimt, Wagner y Hoffmann, renunciaron en una disputa sobre las prioridades, pero continuó funcionando, y aún funciona hoy, desde su sede en el edificio de la secesión. En su forma actual, la Galería de Exposiciones de Secesión es dirigida y administrada independientemente por artistas."
 klimt.30.g: "¡Este beso para todo el mundo!"
 klimt.30.h: "¿Klimt? ¿Te refieres a Gustav Klimt?"
 klimt.30_tt: "Desencadena el evento #white #b la primera secesión#!#!"
 klimt.40.t: "Vernissage"
 klimt.40.d: "La exposición en [SCOPE.sState('klimt_vernissage_state').GetCityHubName] se dedicó completamente a las obras de [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName]. El evento se considera uno de los aspectos más destacados culturales del año y le ha ganado la aclamación crítica. Para nuestro país, es confirmación de que somos una nación cultural líder."
 klimt.40.f: "'¿Qué estoy a los ojos de la mayoría de las personas, una no entidad, una persona excéntrica o una persona desagradable, alguien que no tiene posición en la sociedad y nunca lo tendrá; En resumen, el más bajo del bajo. Muy bien, entonces, incluso si eso fuera absolutamente cierto, entonces algún día me gustaría mostrar por mi trabajo lo que tan excéntrico, tal nadie, tiene en su corazón. \ N. Veo pinturas o dibujos en las cabañas más pobres, en las esquinas más sucias. Y mi mente está conducida hacia estas cosas con un impulso irresistible. -Vincent van gogh"
 klimt.40.g: "¿Cómo estuvo el buffet?"
 klimt.101.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_classicism')]"
 klimt.101.d: "En su Vernissage, el Maestro [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName] presentó [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetHerHis] la última pintura al público: '[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_classicism')]' es un trabajo típico de clasicismo y ya se considera significativo en este género."
 klimt.101.f: "El nuevo trabajo de [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetLastName] llamó inmediatamente la atención de los expertos en arte. En particular, a los académicos de mentalidad más conservadora les gustaban las formas estéticas y el equilibrio de línea y color. La integridad moral y la sublimidad de la obra de arte se enfatizaron particularmente. La imagen ya se considera un excelente patrimonio cultural de nuestra nación y debería ser el adorno de cualquier galería."
 klimt.101.g: "Esto pertenece a una ... Galería!"
 klimt.102.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_romanticism')]"
 klimt.102.d: "El pintor nacional [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName] presentó [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetHerHis] trabaja al público con algunos invitados. La sensualidad y el poder de los colores causan una impresión en la audiencia. La pintura ya se considera una obra clave de romanticismo."
 klimt.102.f: "'[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_romanticism')]' ya tuvo un fuerte impacto en algunos visitantes la primera noche. El espíritu detrás de la obra maestra es claramente notable. Los críticos se quejaron de que los contornos estaban borrosos en algunos lugares, otros vieron la fuerza del tema en esta falta de claridad combinada con la riqueza del color. Con esta pintura, [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetLastName] ciertamente ha asegurado una entrada en los libros de la historia del arte."
 klimt.103.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_realism')]"
 klimt.103.d: "En una soirée, [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName] aprovechó la oportunidad de mostrar una nueva pintura que claramente puede asignarse al realismo. Algunos expertos en arte que asistieron elogiaron el trabajo."
 klimt.103.f: "Algunos invitados presentes habían temido una sorpresa más provocativa, pero '[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_realism')]' resultó ser una representación muy sobria. A primera vista, algunos invitados lo confundieron como una pintura de género. Pero cuanto más tiempo consideren los presentes la representación de una escena cotidiana, más clara es la idea sutil e inflamatoria detrás de ella y los problemas sociales a los que aludía el autor se hizo eventos. [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetLastName] puede haber alienado a algunos miembros de la sociedad nocturna con el enfoque socialmente crítico, pero la opinión abrumadora es que tal tesoro de arte pertenece a una exposición digna a nivel nacional."
 klimt.104.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_impressionism')]"
 klimt.104.d: "En una gran exposición de arte de representantes de alto rango de la National Painting Society, [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName] presentó una obra que, aunque ganó una atención considerable, también atrajo el ridículo de algunos críticos. Sin embargo, una oferta de alto precio de un comerciante de arte extranjero de repente la ha hecho muy popular."
 klimt.104.f: "Las opiniones se dividieron cuando se presentó '[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_impressionism')]'. Algunos encontraron el idilio casi ingenuo y sin aspiraciones políticas o sociales, otros criticaron la falta de forma y líneas. Alguien se burló de que el paisaje disolvente probablemente se debió al cerebro disolvente del autor. Los proponentes no pudieron prevalecer hasta que un comerciante de arte de [SCOPE.sCountry('klimt_art_dealer_country').GetName] enfatizara particularmente la calidad y el espíritu innovador de la obra maestra. Inmediatamente estaba preparado para pagar un precio abrumador por la pintura y llevarlo de regreso a su país. Después de este episodio, el interés en la imagen creció más, que inmediatamente se declaró un patrimonio cultural nacional. [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetLastName] puede estar más que feliz por eso."
 klimt.105.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_expressionism')]"
 klimt.105.d: "La última imagen de [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName] ha despertado horror, odio, ira y asco entre el público y los críticos. En otras palabras: ¡fue un éxito sensacional!"
 klimt.105.f: "'¿Qué significa eso incluso:' [SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_expressionism')] '? ¿Cuál es el punto? ¿Cuáles son estos colores de un libro para colorear de jardín de infantes? Estas figuras crudas? Estas escenas delirantes? ¿Llamas a ese arte? ¡¿ARTE?! ¡CHARLATAN! ¡Si escupe la imagen, sería más arte de lo que es ahora! '\ N \ nand ese fue uno de los comentarios más positivos en la presentación. [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetLastName] ha causado un escándalo histórico que solo aumenta la importancia de la imagen."
 klimt.106.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_art_nouveau')]"
 klimt.106.d: "After the publication of [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetHerHis] new work '[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_art_nouveau')]'', [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName] is considered one of the most important artists on the international scene. It thrilled traditionalists and avant-garde alike."
 klimt.106.f: "'¿Qué es, Art Nouveau? El arte nunca puede ser nuevo. -Alphonse Mucha"
 klimt.110.t: "Un orden discreto"
 klimt.110.d: "Un concesionario de arte y antigüedades experimentado ha ofrecido adquirir una obra maestra rara en el extranjero. Se requiere una discreción extrema en este asunto: el concesionario también compra de rivales e incluso oponentes de guerra. [SCOPE.sCharacter('klimt_art_dealer').GetFullName] ha asegurado que cumplirá su orden en silencio, asumiendo un buen salario y algunas pinturas a cambio."
 klimt.110.f: "Para comprar una pintura extranjera, un comerciante de arte en el extranjero debe hacer una oferta adecuada. Esto incluye no solo dinero, sino también algunas pinturas a cambio, lo que dañará nuestro [concept_klimt_painting_tradition]. Un concesionario de arte solo puede comprar obras maestras en países que tienen más de una pintura del mismo estilo: no venderán una pieza única. Del mismo modo, una nación no puede comprar más de una obra maestra de un estilo en el extranjero. El acuerdo tardará unos seis meses en completarse y que la pintura llegue a nuestra Galería Nacional."
 klimt.110.g: "Obtenga una obra maestra del clasicismo."
 klimt.110.h: "Obtener una obra maestra del romanticismo."
 klimt.110.i: "Obtener una obra maestra del realismo."
 klimt.110.j: "Obtener una obra maestra de impresionismo."
 klimt.110.k: "Obtener una obra maestra de expresionismo."
 klimt.110.l: "Obtenga una obra maestra de Art Nouveau."
 klimt.111.t: "Una obra maestra del clasicismo"
 klimt.111.d: "'[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_classicism')]' llegó hoy como una nueva obra maestra en la Galería Nacional. El gobierno estaba muy contento con la pieza. El comerciante de arte ve su trabajo como se hace."
 klimt.111.f: "Las grandes expectativas no estaban decepcionadas. '[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_classicism')]' cumple con los requisitos exactamente y debería ser una excelente adición a la colección de imágenes de [GetPlayer.GetNameNoFlag]. La prensa comercial también está de acuerdo en que esta compra valió la pena cada centavo gastado. Se planea una exposición para el próximo mes que se centrará en este pináculo del clasicismo."
 klimt.111.g: "¡Otro tesoro de arte para nuestra colección!"
 klimt.112.t: "Una obra maestra del romanticismo"
 klimt.112.d: "Algunos espectadores se reunieron hoy en la Galería Nacional. Los representantes de la prensa local y nacional también han asado el lugar desde las primeras horas de la mañana. La palabra ya se ha vuelto en torno a que '[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_romanticism')]', una obra maestra romántica, está a punto de llegar a la colección de imágenes."
 klimt.112.f: "Ya ha habido algunos rumores sobre '[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_romanticism')]'. Debe ser una pintura colorida que estimula los sentidos. No se sabe más información sobre el tema. Se dice que el comerciante de arte desconocido, que podría proporcionar más información, se fue al extranjero con una gran parte de dinero e hizo planes para su jubilación. Ya no estaba disponible para entrevistas."
 klimt.113.t: "Una obra maestra del realismo"
 klimt.113.d: "La nueva obra maestra '[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_realism')]' se presentó al público en una ceremonia hoy como parte de una exposición especial. La pieza pertenece al género del realismo y se considera una de las pinturas clave de esta era del arte. La multitud era correspondientemente grande. Los boletos para el evento se agotaron por completo semanas antes."
 klimt.113.f: "'Es un gran honor y un placer para mí, como director de la Galería Nacional, poder presentarle hoy la nueva obra maestra que enriquecerá nuestra colección de imágenes de hoy. Como saben, hemos estado trabajando durante mucho tiempo para poder llamar a un trabajo clave de realismo nuestro. '[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_realism')]' es exactamente eso. No necesito decir mucho sobre el pintor, todos lo conocen. Con su sobria representación y relevancia cotidiana, los críticos lo malinterpretaron inicialmente como pintura de género o sin espíritu. Pero en realidad su contenido es profundo. Tenga en cuenta los detalles en la coloración que dan la impresión de que ... '"
 klimt.114.t: "Una obra maestra de impresionismo"
 klimt.114.d: "El comerciante de arte cumplió su misión hoy y entregó '[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_impressionism')]' a los responsables de la Galería Nacional por una considerable recompensa. El proceso fue sin problemas. El director también comentó positivamente sobre la compra, pero se quejó de que los colores estaban un poco borrosos."
 klimt.114.f: "'Estoy muy deprimido y profundamente disgustado de pintura. Realmente es una tortura continua. -Claude Monet"
 klimt.115.t: "Una obra maestra del expresionismo"
 klimt.115.d: "'[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_expressionism')]', la obra maestra del extranjero adquirida por un comerciante de arte de confianza, finalmente ha llegado a [GetPlayer.GetNameNoFlag]. Sin embargo, uno no puede hablar de aprobación indivisa. El comerciante de arte también se fue después de pagar y no se puede encontrar."
 klimt.115.f: "Después de que llegó '[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_expressionism')]', algunos conocedores de arte expresaron sorpresa, si no críticas. La composición inusual dio la impresión de que difícilmente podría ser el trabajo de un artista de renombre. El nombre inusual, que tenía poco que ver con el daubing, también despertó sospechas sobre si tal vez se habían encontrado con un charlatán que había tenido una broma. El hecho de que se encontró un autógrafo auténtico en la imagen empeoró las cosas en lugar de mejorar. Prepárate para reacciones fuertes de la audiencia."
 klimt.116.t: "Una obra maestra de Art Nouveau"
 klimt.116.d: "El director de la Galería Nacional se sintió aliviado al descubrir hoy que la obra maestra había llegado del extranjero. [SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_art_nouveau')] es puro dulces oculares."
 klimt.116.f: "Cuando [SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_art_nouveau')] finalmente fue sacado de la caja, inmediatamente capturó los corazones de los presentes como un nuevo cachorro de tigre en un zoológico. O un nuevo artefacto importante en un museo. O un planeta recién encontrado en un observatorio. O la nueva obra maestra musical de un compositor. O un esqueleto reensamblado de un paleontólogo. O los restos encontrados de un antepasado humano. O ..."
 klimt.116.g: "¿O una victoria en el Trofeo Schneider?"
 klimt.301.t: "El premio [SCOPE.sState('klimt_art_capital').GetCityHubName]"
 klimt.301.d: "La élite de nuestro país amante del arte está presionando por un premio de artista para las mejores pinturas."
 klimt.301.f: "Las naciones que tienen una galería de ocasiones organizan concursos de arte. Los cinco pintores más hábiles reciben un premio que tiene un fuerte impacto en su reputación. Por lo general, se otorga un premio de arte cada cinco años. No se invitan a grandes pintores, ya han recibido su recompensa."
 klimt.301.g: "Deberíamos organizar una competencia de arte."
 klimt.301.h: "¡Qué desperdicio de dinero!"
 klimt.302.t: "El premio [SCOPE.sState('klimt_art_capital').GetCityHubName]"
 klimt.302.d: "El jurado ha llegado a una conclusión y ha seleccionado las mejores pinturas. La lista de cinco ganadores ya está haciendo las rondas."
 klimt.302.f: "1. [SCOPE.sCharacter('klimt_character_first_winner_scope').GetFullName] de [GetGlobalVariable('klimt_prize_winner_1_global_var').GetCountry.GetName] \ n2.   [SCOPE.sCharacter('klimt_character_second_winner_scope').GetFullName] de [GetGlobalVariable('klimt_prize_winner_2_global_var').GetCountry.GetName] \ n3.   [SCOPE.sCharacter('klimt_character_third_winner_scope').GetFullName] de [GetGlobalVariable('klimt_prize_winner_3_global_var').GetCountry.GetName] \ n4.   [SCOPE.sCharacter('klimt_character_fourth_winner_scope').GetFullName] de [GetGlobalVariable('klimt_prize_winner_4_global_var').GetCountry.GetName] \ n5.   [SCOPE.sCharacter('klimt_character_fifth_winner_scope').GetFullName] de [GetGlobalVariable('klimt_prize_winner_5_global_var').GetCountry.GetName]"
 klimt.302.g: "Premio a los ganadores."
 klimt.401.t: "Destino de viaje del pintor"
 klimt.401.d: "[GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName] ya ha empacado [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetHerHis] cosas. ¿Qué escuela de arte debería estudiar [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetSheHe]?"
 klimt.401.f: "Un [concept_klimt_painter] que continúa su educación en un viaje de arte no generará [concept_klimt_painting_tradition] en su ausencia. [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetSheHe] solo puede estudiar estilos de arte que anteriormente se desconocen para él. Por lo general, tal viaje dura un año, pero puede haber obstáculos u oportunidades que extienden la estadía."
 klimt.401.g: "Clasicismo."
 klimt.401.h: "Romanticismo."
 klimt.401.i: "Realismo."
 klimt.401.j: "Impresionismo."
 klimt.401.k: "Expresionismo."
 klimt.401.l: "Art nouveau."
 klimt.401.m: "No importa."
 klimt.402.t: "Llegada a [SCOPE.sState('klimt_center_of_art_scope').GetCityHubName]"
 klimt.402.d: "Good news! [ROOT.Var('klimt_painter_var').GetCharacter.GetFullName] has arrived in [SCOPE.sState('klimt_center_of_art_scope').GetCityHubName]. [ROOT.Var('klimt_painter_var').GetCharacter.GetSheHe|U] is still looking for a free room and will start [ROOT.Var('klimt_painter_var').GetCharacter.GetHerHis] studies soon."
 klimt.402.f: ""
 klimt.402.g: "Ah ... [SCOPE.sState('klimt_center_of_art_scope').GetCityHubName]"
 klimt.403.t: "[ROOT.Var('klimt_painter_var').GetCharacter.GetLastName] returns from Painter Trip"
 klimt.403.f: "\"El arte es solo el arte donde es un fin en sí mismo, donde es absolutamente libre, se deja en sí mismo, donde no conoce leyes más altas que las suyas, las leyes de la verdad y la belleza\". -Ludwig feuerbach"
 klimt.403.g: "¿Y todo el viaje no fue solo por diversión?"
 klimt.411.t: "Compañeros pintores entre ellos"
 klimt.411.d: "[ROOT.Var('klimt_painter_var').GetCharacter.GetFullName] met a fellow painter from [SCOPE.sCharacter('klimt_fellow_painter').GetHomeCountry.GetName] on his study trip. The two recognize each other as equal colleagues. [SCOPE.sCharacter('klimt_fellow_painter').GetFullName] seems to be a gifted spirit and sociable."
 klimt.411.f: "Si por casualidad varias naciones han enviado a un pintor en un viaje de estudio al mismo tiempo, entonces existe la posibilidad de que se encuentren y que haya efectos sinérgicos positivos. Las rivalidades y las enemistades pueden desaparecer rápidamente en aras del entusiasmo compartido por el arte."
 klimt.411.g: "Deben intercambiar su conocimiento artístico."
 klimt.411.h: "Ciertamente pueden aprender de las técnicas del otro."
 klimt.411.i: "El conocido será útil en el mundo del arte para apoyarse mutuamente."
 klimt.421.t: "En los pasos de los gigantes"
 klimt.421.d: "Our painter wrote from [ROOT.Var('klimt_painter_var').GetCharacter.GetHerHis] place of study that [ROOT.Var('klimt_painter_var').GetCharacter.GetSheHe] already foresees [ROOT.Var('klimt_painter_var').GetCharacter.GetHerHis] future in glorious visions. What [ROOT.Var('klimt_painter_var').GetCharacter.GetSheHe] needs, however, is more time and more money."
 klimt.421.f: "In Rome, [ROOT.Var('klimt_painter_var').GetCharacter.GetFullName] is confronted with some of the most important painters in art history as well as with the remains of Roman architecture. Time and time again, travelers to Rome have developed a special relationship with this city and its history. The desire to follow in the footsteps of the classics has moved many an artist. [ROOT.Var('klimt_painter_var').GetCharacter.GetLastName]'s ambition grows to one day become an artist just as great as one of [ROOT.Var('klimt_painter_var').GetCharacter.GetHerHis] idols. This may border on megalomania, but above all it will take time, patience - and further studies, as [ROOT.Var('klimt_painter_var').GetCharacter.GetSheHe] said in a letter."
 klimt.421.g: "[ROOT.Var('klimt_painter_var').GetCharacter.GetLastName] should take [ROOT.Var('klimt_painter_var').GetCharacter.GetHerHis] time and emulate Michelangelo and Raphael."
 klimt.421.h: "[ROOT.Var('klimt_painter_var').GetCharacter.GetLastName] should paint, not daydream!"
 klimt.422.t: "Espíritu de los románticos"
 klimt.422.d: "[ROOT.Var('klimt_painter_var').GetCharacter.GetFullName] hasn't written back from Bamberg for days. Apparently [ROOT.Var('klimt_painter_var').GetCharacter.GetSheHe] indulges in daydreaming."
 klimt.422.f: "Bamberg no es solo un lugar pintoresco con numerosas casas medio maderadas y un rico patrimonio barroco que te invita a demorarse románticamente. Hay algo en esta ciudad que lo hizo increíblemente atractivo para los románticos. Ludwig Tieck y Heinrich Wackenroder eran románticos importantes que en realidad vinieron de Berlín, pero a quien Franconian dejó su huella. Ellos también estaban menos interesados ​​en sus estudios y más interesados ​​en el país, su gente y la rica herencia de las ciudades de la zona. E. T. A. Hoffmann, otro romántico de Prusia, experimentó su avance literario durante su estadía de cinco años en Bamberg. Cuál fue su viaje a Italia para Goethe, esta parte de Alemania fue para jóvenes románticos. En el paisaje cultural no solo encontraron una conexión con la Edad Media alemana idealizada, sino también con las pinturas de Albrecht Dürer en Nuremberg y con el catolicismo, cuya espiritualidad atrajo más a los románticos que al protestantismo secularizado."
 klimt.422.g: "La vida de un buen para nada ..."
 klimt.423.t: "Conversión"
 klimt.423.d: "Actually, [ROOT.Var('klimt_painter_var').GetCharacter.GetFullName] hasn't had much of a relationship with faith so far. However, the strong Catholicism he was confronted with, both in art and in everyday life, triggered something in [ROOT.Var('klimt_painter_var').GetCharacter.GetHerHim]. More and more [ROOT.Var('klimt_painter_var').GetCharacter.GetSheHe] feels a connection that [ROOT.Var('klimt_painter_var').GetCharacter.GetSheHe] would never have thought possible until then. Inspired by this, [ROOT.Var('klimt_painter_var').GetCharacter.GetSheHe] painted [ROOT.Var('klimt_painter_var').GetCharacter.GetHerHis] first religious picture."
 klimt.423.f: "'Ver Bamberg y convertirse en católico' fue un lema entre los románticos alemanes. De hecho, el romanticismo alemán fue una de las pocas épocas influenciadas más por los pensadores católicos que protestantes, incluidos muchos conversos. De manera similar, Roma también trajo aficionados al redil de la iglesia. Esto puede ser sorprendente en una era materialista en la que el progreso y la ciencia desempeñaron un papel de liderazgo en la sociedad, pero fue precisamente la necesidad de una contratinga que finalmente llevó a un hedonista al monasterio."
 klimt.423.g: "Espero que esta no sea una foto cursi de la Madonna."
 klimt.423.tt: "[ROOT.Var('klimt_painter_var').GetCharacter.GetFullName] loses all negative addictive traits and converts to #YELLOW Catholicism#! if [ROOT.Var('klimt_painter_var').GetCharacter.GetSheHe] is not yet a Catholic."
 klimt.424.t: "Atención al detalle"
 klimt.424.d: "[ROOT.Var('klimt_painter_var').GetCharacter.GetFullName] found in [SCOPE.sState('klimt_center_of_art_scope').GetCityHubName] a master of realism who would help him improve [ROOT.Var('klimt_painter_var').GetCharacter.GetHerHis] painting technique. However, this will take months - and the fee is hefty."
 klimt.424.f: "\"La pintura es un arte esencialmente concreto y solo puede consistir en la representación de cosas reales y existentes\". -Gustave Coubert"
 klimt.424.g: "Esto puede llevar algo de tiempo, pero vale la pena."
 klimt.424.h: "[ROOT.Var('klimt_painter_var').GetCharacter.GetLastName] should rather concentrate on gaining recognition from the master."
 klimt.425.t: "Inspiración sin límites"
 klimt.425.f: "\"Desde la aparición del impresionismo, los salones oficiales, que solían ser marrones, se han vuelto azul, verde y rojo ... pero menta o chocolate, todavía son confecciones\". -Claude Monet"
 klimt.425.g: "Estas nuevas ideas lo inspirarán a crear numerosas pinturas."
 klimt.425.h: "Estas nuevas ideas deberían inspirar nuestra cultura en casa."
 klimt.426.t: "La vida de un artista"
 klimt.426.d: "The sophisticated life in [SCOPE.sState('klimt_center_of_art_scope').GetCityHubName] has also left its mark on [ROOT.Var('klimt_painter_var').GetCharacter.GetFullName]. [ROOT.Var('klimt_painter_var').GetCharacter.GetSheHe|U] often hangs out in bars and pubs - and uses stimulants to increase [ROOT.Var('klimt_painter_var').GetCharacter.GetHerHis] creative power. Without one or two intoxications, [ROOT.Var('klimt_painter_var').GetCharacter.GetSheHe] would hardly be able to complete [ROOT.Var('klimt_painter_var').GetCharacter.GetHerHis] workload in such a short time."
 klimt.426.f: "\"Después del primer vaso, ves las cosas como lo desean. -Socar Wilde"
 klimt.426.g: "If that inspires [ROOT.Var('klimt_painter_var').GetCharacter.GetHerHis] art - where is the problem?"
 klimt.426.h: "Entonces solo lleva más tiempo."
 klimt.427.t: "Vice de un artista"
 klimt.427.d: "We are receiving worrying reports from [SCOPE.sState('klimt_center_of_art_scope').GetCityHubName]. [ROOT.Var('klimt_painter_var').GetCharacter.GetFullName]'s addictions reach frightening proportions. Apparently [ROOT.Var('klimt_painter_var').GetCharacter.GetSheHe] uses his absence to indulge in vices and debauchery, which put a significant strain on [ROOT.Var('klimt_painter_var').GetCharacter.GetHerHis] health."
 klimt.427.f: "Camille Pissarro, Henri de Toulouse -Lautrec, Paul Gauguin, Oscar Wilde y Charles Baudelaire, todos fueron víctimas de la intoxicación. Lo mismo se aplica a Vincent Van Gogh. Gabriele D'Annunzio, por otro lado, estaba buscando aventuras eróticas. Jean Cocteau descubrió el opio por sí mismo y escribió un diario sobre su uso y efectos. El hecho de que en muchos casos estas adicciones y vicios condujeron a la autodestrucción y la muerte prematura es uno de los trágicos episodios de la vida de los artistas."
 klimt.427.g: "Cada artista tiene un vicio."
 klimt.427.h: "¡Tenemos que intervenir!"
 klimt.427.tt: "The educational trip is cancelled. [ROOT.Var('klimt_painter_var').GetCharacter.GetFullName] is taken into custody by our agents in [SCOPE.sState('klimt_center_of_art_scope').GetCityHubName] and brought back to [GetPlayer.GetName]. He will be put into rehab there for the next six months."
 klimt.428.t: "[ROOT.Var('klimt_painter_var').GetCharacter.GetLastName] is available again"
 klimt.428.d: "After a break of several months, our painter has returned to [ROOT.Var('klimt_painter_var').GetCharacter.GetHerHis] usual day-to-day business. [ROOT.Var('klimt_painter_var').GetCharacter.GetFullName] didn't give up [ROOT.Var('klimt_painter_var').GetCharacter.GetHerHis] lifestyle, but at least something worse could be prevented."
 klimt.428.f: "¿Un secuestro? No, no, monsieur, esa fue una intervención. Un secuestro le ocurriría a su sufrimiento, una intervención solo se inicia para su bien ... ¿Qué quiere decir, no sabemos qué es lo mejor para usted? '"
 klimt.428.g: "Ojalá las cosas vuelvan a la normalidad ahora."
 klimt.431.t: "Veduta"
 klimt.431.d: "Inspired by the beauty of [ROOT.Var('klimt_painter_var').GetCharacter.GetHerHis] host city [SCOPE.sState('klimt_center_of_art_scope').GetCityHubName] our painter began painting a masterful veduta picture on an educational trip. However, that could extend [ROOT.Var('klimt_painter_var').GetCharacter.GetHerHis] stay a bit."
 klimt.431.f: "Un Veduta es una pintura altamente detallada, generalmente a gran escala o, con mayor frecuencia, impresa de un paisaje urbano o alguna otra vista. Los pintores de Vedute se conocen como Vedutisti. A finales del siglo XIX, las \"impresiones\" más personales de los paisajes urbanos reemplazaron el deseo de precisión topográfica, que fue satisfecha con panoramas pintados y luego fotografiados. Los pintores de Veduta más importantes de esta época incluyen David Roberts y Eduard Gaertner."
 klimt.431.g: "Una idea espléndida."
 klimt.431.h: "Concéntrese en estudiar."
 klimt.432.t: "Círculo de pintura"
 klimt.432.d: "[ROOT.Var('klimt_painter_var').GetCharacter.GetFullName] has been welcomed into [SCOPE.sState('klimt_center_of_art_scope').GetCityHubName]'s local artist group as one of their own."
 klimt.432.f: "'Debo estar solo y saber que estoy solo para contemplar y sentir la naturaleza en su totalidad; Tengo que rendirme a lo que me rodea, tengo que fusionarme con mis nubes y rocas para ser lo que soy. La soledad es indispensable para mi diálogo con la naturaleza. -Caspar David Friedrich"
 klimt.432.g: "Necesitamos el reconocimiento del mundo de la pintura."
 klimt.433.t: "Comprensión rápida"
 klimt.433.d: "On [ROOT.Var('klimt_painter_var').GetCharacter.GetHerHis] educational journey in [SCOPE.sState('klimt_center_of_art_scope').GetCityHubName], our artist is making faster progress than expected. Maybe [ROOT.Var('klimt_painter_var').GetCharacter.GetSheHe] can return sooner."
 klimt.433.f: "'El talento hace lo que quiera hacer. Genius solo hace lo que puede. -Eugène delacroix"
 klimt.433.g: "Puedes ver talento a primera vista."
 klimt.434.t: "Comerciante de arte"
 klimt.434.d: "During [ROOT.Var('klimt_painter_var').GetCharacter.GetHerHis] educational stay, [ROOT.Var('klimt_painter_var').GetCharacter.GetFullName] found a renowned art dealer who might sell a few pieces."
 klimt.434.f: "'Soy un empresario absolutamente serio. Las calumnias de mis competidores que venden falsificaciones solo se deben a la envidia. ¿Puedo entusiasmarte ahora con esta pintura? Un verdadero Leonardo da Vinci: La dama con el Six de Degu. ¡Una rareza! ¡Una oferta como esta nunca volverá!"
 klimt.434.g: "Compra algunas pinturas."
 klimt.434.h: "No necesitamos bienes extranjeros de segunda clase."
 klimt.435.t: "La última moda"
 klimt.435.d: "On [ROOT.Var('klimt_painter_var').GetCharacter.GetHerHis] educational journey, our artist learned about new fashions, new architectural styles and new pastimes that were previously unknown to [ROOT.Var('klimt_painter_var').GetCharacter.GetHerHis]."
 klimt.435.f: "'Los hombres que vinieron de Inglaterra sabían cómo decirles a sus asombrosos amigos que las personas en todo el canal, por sensato que fueran, todavía les gustaba mucho los placeres infantiles. Así que los jóvenes se entretienen pateando una pelota de cuero en un prado, otros golpean la pelota sobre una red con una especie de alfombra, y esta locura atrae a los espectadores en cada multitud. Entre ellos hay personas en el cargo y la dignidad, que a veces incluso no se desaniman por involucrarse '."
 klimt.435.g: "El aliento fresco de la nueva cultura."
 klimt.435.h: "Pero, ¿es realmente correcto seguir al espíritu?"
 alert_klimt_painter_trip_possible_alert_name: "Su [concept_klimt_painter] podría estudiar un nuevo estilo de arte"
