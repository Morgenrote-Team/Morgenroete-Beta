l_spanish:
 klimt_painter: "Pintor"
 klimt_painter_desc: "Este personaje es un artista cuyo enfoque principal son las pinturas. ¿Quizás algún día sus pinturas serán conocidas en todo el mundo?"
 klimt_great_painter: "Gran pintor"
 klimt_great_painter_desc: "Este personaje es uno de los mejores pintores del mundo. Sus pinturas cuelgan en todas las importantes galerías de arte y coleccionistas que les pagan una fortuna."
 klimt_spitzweg_not_funny_modifier: "Sospechoso Spitzweg"
 klimt.1300.t: "Carl Spitzweg, el pobre poeta"
 klimt.1300.d: "El pobre poeta (alemán: poeta Der Arme) es la pintura más conocida y más popular del pintor alemán Carl Spitzweg. Fue ejecutado en 1839 y tenía tres versiones. Se considera una obra maestra temprana."
 klimt.1300.f: "Carl Spitzweg era un pintor y poeta romántico alemán. Se lo considera uno de los artistas más importantes de la era de Biedermeier. Su padre, un comerciante rico, había entrenado a Carl como farmacéutico. Obtuvo su calificación de la Universidad de Munich, pero mientras se recuperaba de una enfermedad, también se hizo pintar. Spitzweg era autodidacta como artista y comenzó copiando las obras de los maestros flamencos. Contribuyó su primer trabajo a las revistas satíricas. Al recibir una herencia en 1833, pudo dedicarse a la pintura. Sus posteriores pinturas y dibujos a menudo eran obras de género humorístico. Muchas de sus pinturas representan excéntricas bien caracterizadas."
 klimt.1300.g: "¡AHAHAH, un pintor divertido!"
 klimt.1300.h: "¡Esperar! Sátira contra quién?"
