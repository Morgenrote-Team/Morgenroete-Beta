 academics_promote_astronomer_button: "Promover astrónomo" #NT!
 academics_promote_astronomer_button_desc: "[Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')] Encuentre nuevos objetos astronómicos, descubra estrellas y planetas o puede participar en congresos astronómicos." #NT!
 academics_promote_engineer_button: "Promocionar ingeniero" #NT!
 academics_promote_engineer_button_desc: "[Concept('concept_gaudi_engineer','$concept_gaudi_engineers$')] son técnicos versátiles en el ejército y en la construcción. También aceleran la construcción de monumentos en el doble de." #NT!
 academics_promote_naturalist_button: "Promover el naturalista" #NT!
 academics_promote_naturalist_button_desc: "[Concept('concept_dubois_naturalist','$concept_dubois_naturalists$')] puede capturar animales en el hogar o en el extranjero, encontrar especímenes o liderar expediciones botánicas." #NT!
 academics_promote_paleontologist_button: "Promover paleontólogo" #NT!
 academics_promote_paleontologist_button_desc: "[Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')] puede examinar las formaciones geológicas para fósiles y huesos de dinosaurios o encontrarlos en expediciones." #NT!
 academics_promote_archaeologist_button: "Promover arqueólogo" #NT!
 academics_promote_archaeologist_button_desc: "[Concept('concept_lepsius_archaeologist','$concept_lepsius_archaeologist$')] puede encontrar artefactos, hacer descubrimientos importantes y asistir a conferencias arqueológicas." #NT!
 academics_promote_anthropologist_button: "Promover antropólogo" #NT!
 academics_promote_anthropologist_button_desc: "[Concept('concept_lepsius_anthropologist','$concept_lepsius_anthropologists$')] Estudie los orígenes de los humanos, desde el comienzo de la evolución humana hasta la Edad de Piedra." #NT!
  
 je_academics_academy: "Carreras académicas" #NT!
 je_academics_academy_reason: "[SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_promotion_custom_loc')] \ n \ n \ n \ se dependen de la cultura científica en nuestro país, tarda más tiempo o más corto en que un investigador abandone la universidad y esté disponible para nosotros. Ejemplos de académicos son: [Concept('concept_gaudi_engineer','$concept_gaudi_engineers$')], [Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')], [Concept('concept_dubois_naturalist','$concept_dubois_naturalists$')], [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')], [Concept('concept_lepsius_archaeologist','$concept_lepsius_archaeologists$')] y [Concept('concept_lepsius_anthropologist','$concept_lepsius_anthropologists$')]. Es puramente coincidente qué académico está disponible al final, a menos que nos especialicemos en una universidad en un área en particular. El científico vendrá de esta área. El tiempo que lleva graduarse depende de factores como la tasa de alfabetización, las inversiones en operaciones académicas y la expansión de las instituciones. Un enfoque seleccionado también aumenta la velocidad. Esos factores contribuyen a su ganancia [concept_academics_progress]. Si un académico proviene de un campo que ya está ocupado por otro, puede optar por mantener su académico o reemplazarlos." #NT!
 je_academics_academy_goal_tt: "Un académico puede tardar de 3 a 30 años en estar disponible." #NT!
 je_academics_academy_success: "Aparecerá un nuevo científico." #NT!
  
 je_academics_academy_promote_engineer_loc: "Actualmente está promocionando un [concept_gaudi_engineer]." #NT!
 je_academics_academy_promote_astronomer_loc: "Actualmente está promocionando un [concept_verrier_astronomer]." #NT!
 je_academics_academy_promote_naturalist_loc: "Actualmente está promocionando un [concept_dubois_naturalist]." #NT!
 je_academics_academy_promote_paleontologist_loc: "Actualmente está promocionando un [concept_dubois_paleontologist]." #NT!
 je_academics_academy_promote_archaeologist_loc: "Actualmente está promocionando un [concept_lepsius_archaeologist]." #NT!
 je_academics_academy_promote_anthropologist_loc: "Actualmente está promocionando un [concept_lepsius_anthropologist]." #NT!
 je_academics_academy_no_promote_loc: "Usted está #n no#! actualmente promocionando cualquier académico" #NT!
  
 je_academics_tech_school: "Enfoque académico" #NT!
 je_academics_tech_school_reason: "Bajo ciertas condiciones, una nación puede cambiar su enfoque de investigación si especializa sus universidades en un cierto campo o las mezcla. Una especialización (llamada 'escuela tecnológica') tiene una ventaja sobre la orientación académica tradicional, pero lleva a que se prefieran al menos un campo de investigación a otro. Para cambiar hacia una escuela tecnológica, un grupo de interés específico debe estar en el poder, y en ciertos casos se deben cumplir los requisitos adicionales: el poder marino sin barcos es tan imposible como el capitalismo de magnate sin fábricas. Algunos países comienzan con una escuela de tecnología elegida al comienzo del juego." #NT!
  
 academics_change_to_avantgarde_school_button: "Avantgarde Intelligentsia" #NT!
 academics_change_to_avantgarde_school_button_desc: "Una camarilla de académicos con claras ideas culturales, sociológicas y antropológicas determina la vida científica científica. Por el contrario, los campos prácticos son de menor importancia. \ N#R nota#!: aumenta la apariencia de académicos por un punto por mes." #NT!
 academics_change_to_practical_school_button: "Academia práctica" #NT!
 academics_change_to_practical_school_button_desc: "Los científicos de nuestro país intentan incansablemente hacer descubrimientos de todas las áreas adecuadas para el uso práctico diario. Esto es para servir al progreso general y la paz de la humanidad. \ N#R nota#!: aumenta la apariencia de académicos por un punto por mes." #NT!
 academics_change_to_military_school_button: "Complejo militar-industrial" #NT!
 academics_change_to_military_school_button_desc: "La cooperación entre industriales privados y los militares ha llevado al desarrollo de una red de conexiones, lazos personales y conocidos personales, con solo un ligero indicio de corrupción, que se puede describir mejor como un complejo militar-industrial." #NT!
 academics_change_to_business_school_button: "Escuelas de negocios y capitalismo de magnate" #NT!
 academics_change_to_business_school_button_desc: "El individuo independiente combinado con un momento próspero de progreso ha llevado a una mentalidad en la que las escuelas comerciales, las empresas medianas y las grandes corporaciones tienen una influencia decisiva en la ciencia del país. Viceversa, las universidades trabajan para aumentar la prosperidad adquirida de la nación a través de nuevas tecnologías e impulsar ideas sociales a través del progreso." #NT!
 academics_change_to_seapower_school_button: "Power y marina mercante marina" #NT!
 academics_change_to_seapower_school_button_desc: "La Armada y el comercio internacional juegan un papel inmenso para nuestro país. Aumentar la prosperidad a través de la producción avanzada y el comercio global en nuestros productos es tan importante como defender lo que ya se ha ganado." #NT!
 academics_change_to_useful_school_button: "Torre de marfil útil" #NT!
 academics_change_to_useful_school_button_desc: "La academia se ve en nuestro país como un refugio para las mentes excéntricas que cuentan escarabajos, jarrones polacos y incursionados en bolas extrañas. Sin embargo, no se puede negar que el aislamiento de la Torre de Marfil de la sociedad también tiene sus ventajas. Sin perturbarse, muchos profesores trabajan mejor. \ N#R nota#!: aumenta la apariencia de académicos por un punto por mes." #NT!
  
