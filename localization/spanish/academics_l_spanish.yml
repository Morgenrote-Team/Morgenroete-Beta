 setting_academics_missions_rule_desc: "Cada diez años obtendrá una misión para su academia. Esas misiones podrían estar construyendo un edificio académico o encontrar una cierta cantidad de especímenes, por ejemplo. Estas misiones le otorgarán una pequeña recompensa." #NT!
