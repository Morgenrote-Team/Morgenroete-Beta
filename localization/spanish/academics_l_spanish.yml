 academics.117.t: "[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullName] ahora es un famoso arqueólogo" #NT!
 academics.117.d: "Después de mucho tiempo estudiar y descubrir los artefactos de las civilizaciones perdidas, ¡nuestro [concept_lepsius_archaeologist] Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] ahora es famoso en el mundo de la arqueología!" #NT!
 academics.117.f: ""
 academics.117.g: "¡Necesita un Fedora ahora!" #NT!
  
 academics.118.t: "[ROOT.Var('lepsius_anthropologist_var').GetCharacter.GetFullName] ahora es un antropólogo experimentado" #NT!
 academics.118.d: "Después de años de trabajo y estudio, nuestro [concept_lepsius_anthropologist] Dr. [ROOT.Var('lepsius_anthropologist_var').GetCharacter.GetLastName] ahora tiene experiencia." #NT!
 academics.118.f: ""
 academics.118.g: "¡Evolucionó!" #NT!
  
 academics.119.t: "[ROOT.Var('lepsius_anthropologist_var').GetCharacter.GetFullName] es ahora un famoso antropólogo" #NT!
 academics.119.d: "¡Después de mucho tiempo estudiar y descubrir los artefactos de los hombres primarios, nuestro [concept_lepsius_anthropologist] Dr. [ROOT.Var('lepsius_anthropologist_var').GetCharacter.GetLastName] ahora es famoso en el mundo de la antropología!" #NT!
 academics.119.f: ""
 academics.119.g: "¡Un nuevo tipo de hombre!" #NT!
  
 academics.108.t: "[ROOT.Var('dubois_geologist_var').GetCharacter.GetFullName] ahora es un geólogo experimentado" #NT!
 academics.108.d: "Después de años de excavación y aprendizaje, nuestro [concept_agassiz_geologist] Dr. [ROOT.Var('dubois_geologist_var').GetCharacter.GetLastName] ahora está experimentado." #NT!
 academics.108.f: ""
 academics.108.g: "¡Lo cavo!" #NT!
  
 academics.109.t: "[ROOT.Var('dubois_geologist_var').GetCharacter.GetFullName] es ahora un famoso geólogo" #NT!
 academics.109.d: "¡Después de pasar más tiempo con rocas que con la gente, nuestro [concept_agassiz_geologist] Dr. [ROOT.Var('dubois_geologist_var').GetCharacter.GetLastName] ahora es famoso en el mundo de la geología!" #NT!
 academics.109.f: ""
 academics.109.g: "¡Una verdadera estrella de rock!" #NT!
  
 academics.140.t: "Nuestro ingeniero, [ROOT.Var('gaudi_engineer_var').GetCharacter.GetFullName], ahora es un ingeniero civil" #NT!
 academics.140.d: "Años de trabajo en ingeniería civil dieron sus frutos. Después de construir muchos puentes y túneles, el Dr. [ROOT.Var('gaudi_engineer_var').GetCharacter.GetLastName] ahora se considera un verdadero [concept_gaudi_civil_engineer]. ¡Esto seguramente aumentará sus proyectos!" #NT!
 academics.140.f: ""
 academics.140.g: "¡El ingeniero de nuestro futuro!" #NT!
  
 academics.141.t: "Nuestro ingeniero, [ROOT.Var('gaudi_engineer_var').GetCharacter.GetFullName], ahora es un ingeniero mecánico" #NT!
 academics.141.d: "Años de trabajo con máquinas valieron la pena. Los muchos inventos y nuevas máquinas, que el Dr. [ROOT.Var('gaudi_engineer_var').GetCharacter.GetLastName] creó finalmente ha permitido que se convierta en verdad [concept_gaudi_mechanical_engineer]. ¡Esperamos más proyectos sorprendentes!" #NT!
 academics.141.f: ""
 academics.141.g: "¡Un verdadero motor de progreso!" #NT!
  
 academics.142.t: "Nuestro ingeniero, [ROOT.Var('gaudi_engineer_var').GetCharacter.GetFullName], ahora es ingeniero militar" #NT!
 academics.142.d: "Años de trabajo para el ejército valió la pena. Después de construir fortalezas, construir nuevas armas y equipar a nuestros soldados durante años, el Dr. [ROOT.Var('gaudi_engineer_var').GetCharacter.GetLastName] ahora se considera un [concept_gaudi_military_engineer] apropiado. ¡Ojalá continúe sirviendo a nuestra nación!" #NT!
 academics.142.f: ""
 academics.142.g: "Ingeniería de la base de nuestro ejército!" #NT!
  
 academics.143.t: "Nuestro ingeniero, [ROOT.Var('gaudi_engineer_var').GetCharacter.GetFullName], ahora es un ingeniero eléctrico" #NT!
 academics.143.d: "Aprovechar el poder de la electricidad siempre fue un sueño del Dr. [ROOT.Var('gaudi_engineer_var').GetCharacter.GetLastName]. Después de muchos avances en esa área, [ROOT.Var('gaudi_engineer_var').GetCharacter.GetSheHe] ahora se considera un [concept_gaudi_electrical_engineer]." #NT!
 academics.143.f: ""
 academics.143.g: "¡Una chispa de conocimiento!" #NT!
  
 academics.144.t: "Nuestro ingeniero, [ROOT.Var('gaudi_engineer_var').GetCharacter.GetFullName], ahora es ingeniero aeronáutico" #NT!
 academics.144.d: "Durante mucho tiempo, los humanos soñaron con volar. Ahora que ha comenzado el vuelo, el Dr. [ROOT.Var('gaudi_engineer_var').GetCharacter.GetLastName] estaba a la vanguardia de la ingeniería aeronáutica. Después de muchos avances en esa área, [ROOT.Var('gaudi_engineer_var').GetCharacter.GetSheHe] ahora se considera un [concept_gaudi_aeronautical_engineer]." #NT!
 academics.144.f: ""
 academics.144.g: "A los cielos!" #NT!
  
