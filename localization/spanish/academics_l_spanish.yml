 setting_academics_no_missions_rule_desc: "No recibirás misiones académicas." #NT!
  
 rule_academics_focus_rule: "#tooltip:[GetRawTextTooltipTag('mr_morgenroete_tt')] @mr_morgenroete_icon! #! regla de enfoque académico" #NT!
 setting_academics_historical_focus_rule: "Enfoque histórico" #NT!
 setting_academics_historical_focus_rule_desc: "Algunos países comienzan con su escuela de tecnología histórica. Por ejemplo, Prusia comienza con el complejo militar-industrial, Francia con Avantgarde Intelligentsia." #NT!
 setting_academics_no_focus_rule: "Sin enfoque" #NT!
 setting_academics_no_focus_rule_desc: "Todos los países comienzan sin la escuela tecnológica." #NT!
  
