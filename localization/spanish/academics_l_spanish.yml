 academics.111.d: "¡Después de años de trabajo y estudio, nuestro [concept_dubois_naturalist] Dr. [ROOT.Var('dubois_naturalist_var').GetCharacter.GetLastName] ahora es famoso por el trabajo [ROOT.Var('dubois_naturalist_var').GetCharacter.GetHerHis] como naturalista!" #NT!
