 academics.113.t: "[ROOT.Var('dubois_paleontologist_var').GetCharacter.GetFullName] es ahora un famoso paleontólogo" #NT!
 academics.113.d: "Después de mucho tiempo estudiar y descubrir fósiles y huesos de dinosaurios, ¡nuestro [concept_dubois_paleontologist] Dr. [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] ahora es famoso en el mundo de la paleontología!" #NT!
 academics.113.f: ""
 academics.113.g: "¿Su fama durará tanto como los huesos del dinosaurio?" #NT!
  
