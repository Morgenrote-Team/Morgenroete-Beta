 country_academics_decorative_mathematical_experience_boost_boolean_desc: "El porcentaje de edificios [GetBuildingType('building_university').GetName] con el [concept_pm_academics_university_mathematics] eleva el inicio [concept_academics_experience] de su [concept_gaudi_engineer], [concept_verrier_astronomer] y [concept_mendelejew_chemist]." #NT!
  
