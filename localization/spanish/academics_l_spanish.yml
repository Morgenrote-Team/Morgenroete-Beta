 je_academics_first_railway: "Enfoque en la industria: construir el primer ferrocarril de [SCOPE.GetRootScope.GetCountry.GetName]" #NT!
 je_academics_first_railway_reason: "Ahora que la invención del ferrocarril se ha extendido a [SCOPE.GetRootScope.GetCountry.GetName], muchos de nuestros industriales quieren que construamos dicho dispositivo para facilitar el transporte de bienes. Esto nos ayudaría a convertirnos en una potencia industrial." #NT!
  
 academics.2400.t: "¡Necesitamos ferrocarriles!" #NT!
 academics.2400.d: "Los ferrocarriles permiten que los productos se transporten más fácilmente. Por lo tanto, los capitanes de la industria de [SCOPE.GetRootScope.GetCountry.GetName] exigen la construcción de un ferrocarril en nuestro país en los próximos 5 años." #NT!
 academics.2400.f: ""Todavía estamos transportando nuestros productos en Dirroads y Rivers. Esta situación es inaceptable. Si tuviéramos una mejor manera de transportar bienes y volver a criar nuestras ganancias se dispararían y podríamos construir más fábricas que resultarían en mejores condiciones de vida para todos. ¡Construya un ferrocarril ahora!"" #NT!
 academics.2400.g: "¿Podemos construirlo?" #NT!
  
 academics_industrialists_happy_modifier: "Atractuados" #NT!
 academics_industrialists_discontent_modifier: "Descontento industrialista" #NT!
 academics_first_railway_modifier: "Primer ferrocarril" #NT!
  
 academics.2401.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_railway_line_title_custom_loc')]" #NT!
 academics_spanisch_broetli_title_loc: "Spanisch-brötli-bahn" #NT!
 academics_ferrovia_torino_genova_title_loc: "Ferrovia Torino-Genova" #NT!
 academics_generic_title_loc: "La primera línea ferroviaria de [SCOPE.GetRootScope.GetCountry.GetName]" #NT!
  
 academics.2401.d: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_railway_line_desc_custom_loc')]" #NT!
 academics_spanisch_broetli_desc_loc: "Suiza estableció su primera conexión de tren desde la ciudad de Zürich a la ciudad de Baden. Esperemos que esta ruta ferroviaria facilite el transporte de bienes, personas y correo e impulse las industrias en Baden y Zürich. Al menos permite que la rica nobleza de Zürich envíe a sus sirvientes a Baden por la mañana, obtenga un spanisch brötli fresco, un famoso rollo de pan dulce que fue hecho por un famoso panadero en Baden. Los industriales están bastante contentos con esta nueva línea ferroviaria." #NT!
 academics_ferrovia_torino_desc_title_loc: "El Ferrovia Torino-Genova se abrió oficialmente en presencia de [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullNameNoFormatting]. La línea de tren de Torino a Genova es una obra maestra de la ingeniería italiana. La línea de doble vía tiene 169 kilómetros de largo, tiene más de 30 puentes y, con el túnel Giovi de 3259 metros de largo, tiene el túnel más largo del mundo. Obviamente, nuestros capatins de la industria están encantados con esta primera línea ferroviaria." #NT!
 academics_generic_desc_loc: "La construcción de nuestra primera línea de ferrocarril no fue fácil ni barata. Pero gracias a Superior [SCOPE.GetRootScope.GetCountry.GetAdjectiveNoFormatting] Ingeniería, se terminó en un tiempo récord. El industrial está muy contento ya que esta línea les proporciona una forma rápida de mover sus productos y repensas." #NT!
  
 academics.2401.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_railway_line_flavor_custom_loc')]" #NT!
 academics_spanisch_broetli_flavor_loc: "El olor bucal de un spanisch brötli se eleva a la nariz. El delicioso pastel fue entregado con el primer tren de Suiza, conectando a Zürich con la ciudad de Baden. \ N \ n#b históricamente#! El ferrocarril de Zürich a Baden se terminó en 1847, poco antes de la guerra civil suiza, el \ "Sonderbundskrieg \" ocurrió. Hubo 4 locomotoras que permitieron cuatro conexiones por día. Pudieron viajar los 23 kilómetros en unos 45 minutos. El Schweizerische Nordbahn, como se nombró oficialmente, tuvo poco éxito económico y pronto los planes de expansión para Aarau fueron raspados y uno de los servicios diarios se eliminó." #NT!
 academics_ferrovia_torino_genova_flavor_loc: "El arzobispo de Genova bautizó la primera locomotora. Entonces el gigante comenzó a rodarse. Fue el primer tren que viajaría desde Genova hasta Torino. \ N \ n#b Históricamente, #! La línea fue la primera línea ferroviaria en Sardinia-Piedmont. Fue comisionado por el rey Carlo Alberto I el 18 de julio de 1844. Incluso antes de que finalizara la línea, las primeras partes de la línea se abrieron sucesivamente en una sola pista. El 6 de diciembre de 1853, la línea se abrió oficialmente. La línea ferroviaria se convirtió rápidamente en la línea más utilizada en Italia. Especialmente porque permitió el transporte de bienes desde el puerto de Genova. En 1889, se construyó una línea alternativa sobre el pase Giovi, con gradientes más bajos que la línea antigua. Atrapó a un tren de espera y un total de 13 personas fueron asesinados. Como resultado, la línea fue electrificada." #NT!
 academics_generic_flavor_loc: ""¡Ya era hora de que obtuviéramos nuestra propia línea de ferrocarril! ¡Estamos muy por detrás de nuestra competencia! ¡Ahora finalmente podemos transportar todos nuestros productos de una manera decente!"" #NT!
  
 academics.2401.g: "¡Sí, podemos!" #NT!
  
 academics.2402.t: "No logramos construir nuestra primera línea de ferrocarril" #NT!
 academics.2402.d: "Han pasado 5 años desde que los industriales nos pidieron que construimos la primera línea ferroviaria en nuestro país. No pudimos terminar la línea a tiempo. Seguramente esto afectará la visión de los industriales de nuestro gobierno." #NT!
 academics.2402.f: ""Ni siquiera puedes construir una línea de ferrocarril. Tus gobernadores son un fracaso absoluto. ¡Qué vergüenza!"" #NT!
 academics.2402.g: "No, no pudimos" #NT!
  
