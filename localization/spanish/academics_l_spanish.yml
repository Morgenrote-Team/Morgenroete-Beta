 country_academics_decorative_humanities_project_add_desc: "La cantidad de progreso que obtiene de los niveles de [GetBuildingType('building_university').GetName] con el [concept_pm_academics_university_humanities] para proyectos antropológicos de humanidades. Esos proyectos incluyen:" #NT!
  
 country_academics_decorative_excavation_add: "Progreso para algunas excavaciones arqueológicas" #NT!
 country_academics_decorative_excavation_add_desc: "La cantidad de progreso que obtiene de los niveles de [GetBuildingType('building_university').GetName] con el [concept_pm_academics_university_humanities] para algunas excavaciones arqueológicas." #NT!
  
 country_academics_decorative_natural_history_project_add: "Progreso para proyectos de historia natural" #NT!
 country_academics_decorative_natural_history_project_add_desc: "La cantidad de progreso que obtiene de los niveles de [GetBuildingType('building_university').GetName] con el [concept_pm_academics_university_natural_history] para proyectos de historia natural. Esos proyectos incluyen: expedición paleontológica, proyectos de mejora del naturalista, documentos de animales nativos y proyectos de mejora del geólogo." #NT!
  
 country_academics_decorative_animal_breeding_progress_add: "Progreso para la reproducción de animales" #NT!
 country_academics_decorative_animal_breeding_progress_add_desc: "La cantidad de progreso que obtiene de los niveles de [GetBuildingType('building_university').GetName] con el [concept_pm_academics_university_natural_history] para la reproducción [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')]." #NT!
  
 country_academics_decorative_mathematical_project_add: "Progreso para proyectos matemáticos-técnicos" #NT!
 country_academics_decorative_mathematical_project_add_desc: "La cantidad de progreso que obtiene de los niveles de [GetBuildingType('building_university').GetName] con el [concept_pm_academics_university_mathematics] para proyectos matemáticos-técnicos. Esos proyectos incluyen: proyectos [concept_gaudi_engineering], proyectos de mejora de [concept_mendelejew_chemist] y la teorización, el descubrimiento y el aislamiento de [Concept('concept_mendelejew_element','$concept_mendelejew_elements$')]." #NT!
  
