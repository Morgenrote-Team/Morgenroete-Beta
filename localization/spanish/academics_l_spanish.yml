 academics.51.t: "Un nuevo ingeniero" #NT!
 academics.51.d_civil_engineer: "El médico [SCOPE.sCharacter('gaudi_new_engineer_scope').GetLastName] es un talento prometedor de la comunidad científica. Calificó como un [concept_gaudi_engineer], especializado en [Concept('concept_gaudi_civil_engineer','$concept_gaudi_civil_engineering$')]." #NT!
