 academics.1.d: "Después de pasar décadas de [SCOPE.sCharacter('academics_retired_person_scope').GetHerHis] de diseño de vida y construcción de puentes, maquinaria y edificios, [SCOPE.sCharacter('academics_retired_person_scope').GetFullName] ahora se retira. [SCOPE.sCharacter('academics_retired_person_scope').GetSheHe|U] ya no estará activo como nuestro [concept_gaudi_engineer]." #NT!
 academics.1.g: "[SCOPE.sCharacter('academics_retired_person_scope').GetSheHe|U] ganado [SCOPE.sCharacter('academics_retired_person_scope').GetHerHis] jubilación!" #NT!
 academics.2.d: "Después de pasar décadas de la vida de [SCOPE.sCharacter('academics_retired_person_scope').GetHerHis] descubriendo nuevas estrellas, nebulosas y otros fenómenos astronómicos, [SCOPE.sCharacter('academics_retired_person_scope').GetFullName] ha decidido retirarse. [SCOPE.sCharacter('academics_retired_person_scope').GetSheHe|U] ya no funcionará como nuestro [concept_verrier_astronomer]." #NT!
 academics.2.f: "[GetPlayer.MakeScope.Var('verrier_astronomer_var').GetCharacter.GetCustom('verrier_astronomer_achievements_switch_to_character_scope_type')]"
 academics.6.d: "Después de pasar décadas de la vida [SCOPE.sCharacter('academics_retired_person_scope').GetHerHis] descubriendo una nueva [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')], plantas y otras formas de vida, [SCOPE.sCharacter('academics_retired_person_scope').GetFullName] ha decidido retirarse. [SCOPE.sCharacter('academics_retired_person_scope').GetSheHe|U] ya no funcionará como nuestro [concept_dubois_naturalist]." #NT!
 academics.7.d: "Después de pasar décadas de vida de [SCOPE.sCharacter('academics_retired_person_scope').GetHerHis] descubriendo nuevos fósiles, reconstruyendo dinosaurios y otras especies extintas, [SCOPE.sCharacter('academics_retired_person_scope').GetFullName] ha decidido retirarse. [SCOPE.sCharacter('academics_retired_person_scope').GetSheHe|U] ya no funcionará como nuestro [concept_dubois_paleontologist]." #NT!
 academics.9.d: "Después de pasar décadas de vida [SCOPE.sCharacter('academics_retired_person_scope').GetHerHis] descubriendo las reliquias de las civilizaciones antiguas, [SCOPE.sCharacter('academics_retired_person_scope').GetFullName] ha decidido retirarse. [SCOPE.sCharacter('academics_retired_person_scope').GetSheHe|U] ya no funcionará como nuestro [concept_lepsius_archaeologist]." #NT!
 academics.10.d: "Después de pasar décadas de vida [SCOPE.sCharacter('academics_retired_person_scope').GetHerHis] descubriendo las reliquias de los humanos prehistóricos, [SCOPE.sCharacter('academics_retired_person_scope').GetFullName] ha decidido retirarse. [SCOPE.sCharacter('academics_retired_person_scope').GetSheHe|U] ya no funcionará como nuestro [concept_lepsius_anthropologist]." #NT!
  
