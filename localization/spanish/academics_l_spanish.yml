 je_goettinger_seven_monument: "Goettinger Seven Monument" #NT!
 je_goettinger_seven_monument_reason: "Una nación alemana unida podría honrar el recuerdo de Göttingen Seven, siempre que el poder unificador principal ya les haya defendido históricamente. ¡Un monumento inspiraría a generaciones de académicos! Por supuesto, esto supone que el gobierno alemán comparte las ideas liberales de los profesores legendarios." #NT!
  
 academics.3101.t: "La constitución de Hanover" #NT!
 academics.3101.d: "Como uno de sus primeros actos oficiales, el rey anunció que aboliría la Constitución, el llamado Staatsgrundgesetz ('Ley Básica del Estado'). Ernest Augustus ha enfatizado que no se siente atado a ello." #NT!
 academics.3101.f: "Hanover había recibido su primera constitución, otorgada por el Regente del Príncipe, en 1819; Esto hizo poco más que denotar el cambio de Hanover de un electorado a un reino, garantizado por el Congreso de Viena. El duque de Cambridge, como virrey del rey William en Hanover, recomendó una reorganización exhaustiva del gobierno de Hanover. William IV había dado su consentimiento a una nueva constitución en 1833; El consentimiento del duque de Cumberland no fue preguntado ni recibido, y había protestado formalmente contra la adopción de la Constitución sin su consentimiento. Inmediatamente después de su llegada a Hannover, el rey disolvió el Parlamento Hanoveriano, que había sido convocado bajo la disputada constitución. Proclamó la suspensión de la Constitución, debido a que no se había preguntado su consentimiento y que no satisfizo las necesidades del reino." #NT!
 academics.3101.g: "Suspender la constitución." #NT!
 academics.3101.h: "El rey no está por encima de la ley." #NT!
 academics.3102.t: "El Göttingen siete" #NT!
 academics.3102.d: "El historiador y político Friedrich Christoph Dahlmann impugnó los planes de Ernest de cambiar la constitución a su gusto, ya que el propio Dahlmann había contribuido a los marcos de la Constitución. Otros seis profesores famosos de la Universidad de Göttingen se unieron a la protesta y defendieron la constitución de 1833. Pronto los hombres eran conocidos como el 'Göttingen Seven', y eran una molestia para el rey." #NT!
 academics.3102.f: "El documento de Dahlmann se encontró con una influencia explosiva: los estudiantes de la universidad produjeron muchos cientos o incluso miles de copias y las difundieron en Alemania. Los otros seis manifestantes fueron los hermanos alemanistas Wilhelm y Jacob Grimm (famosos escritores y cuentos de cuento de hadas y cuentos populares, conocidos juntos como los hermanos Grimm), el jurista Wilhelm Eduard Albrecht, el historiador Georg Gottfried Gervinus, el físico Wilhelm Eduard Weber y el ologiano y el orientalista Heinrichich. El impacto de la protesta obligó al rey a tomar medidas, y los siete profesores desafiantes fueron interrogados ante el tribunal universitario." #NT!
 academics.3102.g: "¡Deben ser retirados de sus posiciones y ser desterrados!" #NT!
 academics.3102.h: "Cedir a sus demandas antes de que la situación se intensifique." #NT!
 academics.3103.d: "Después de la adhesión de la reina Victoria al trono en el Reino Unido, hubo cierta tristeza por la pérdida de la unión personal con Hanover que había durado más de 120 años. Pero después de los últimos eventos en Alemania, puede decir con confianza: es bueno que vayamos por caminos separados." #NT!
 academics.3103.f: "Solo unos meses después de la adhesión del nuevo rey al trono, Hanover disolvió la constitución que había sido emitida bajo el dominio británico. El nuevo rey Ernest Augustus ahora enfrenta toda una oposición de los académicos. La gente ya está hablando de esta disputa en toda Alemania. Verdaderamente, tan pronto como un país deja la beneficiosa esfera británica de influencia, cae en la barbarie." #NT!
 academics.3103.g: "Es tan bueno ser británico." #NT!
 academics.3104.d: "Los estados de la confederación alemana están sacudidos por el conflicto entre el rey de Hanover y siete profesores recalcitrantes: después de que el rey Ernest Augustus abolió la constitución, el 'Göttingen siete' se rebeló contra él. Perdieron sus posiciones, pero han ganado mucha simpatía en el campo liberal alemán." #NT!
 academics.3104.f: "El historiador y político Friedrich Christoph Dahlmann impugnó los planes de Ernest de cambiar la constitución a su gusto, ya que el propio Dahlmann había contribuido a los marcos de la Constitución. Six other famous professors from the University of Göttingen joined the protest and defended the constitution of 1833. The other six protesters were the Germanist brothers Wilhelm and Jacob Grimm (famed fairy tale and folk tale writers and storytellers, known together as the Brothers Grimm), jurist Wilhelm Eduard Albrecht, historian Georg Gottfried Gervinus, physicist Wilhelm Eduard Weber, y el teólogo y orientalista Heinrich Georg August Ewald. Los efectos directos de la protesta eran limitados, pero la sensación pública y el interés de los medios eran altos en Alemania y en gran parte de Europa, y los siete eran populares entre el público en general." #NT!
 academics.3104.g: "Con el debido respeto, el rey ha ido demasiado lejos." #NT!
 academics.3104.h: "Esta chusma académica ha recibido su solo castigo." #NT!
 academics.3105.t: "Un debate acalorado sobre Hannover" #NT!
 academics.3105.d: "El conflicto con el 'Göttinger Seven' no pasó desapercibido en los otros estados de la Confederación Alemana. Incluso en Gran Bretaña, la gente está irritada de que el rey ha derogado la constitución." #NT!
 academics.3105.f: "[SCOPE.sCountry('academics_anti_hanover_country').GetName] es uno de los numerosos estados alemanes que han criticado las acciones de Ernest Augustus. Pero todavía hay países, especialmente aquellos con gobierno autoritario, que han mostrado comprensión hacia el proceso. Estos incluyen [SCOPE.sCountry('academics_pro_hanover_country').GetName]." #NT!
 academics.3105.g: "¡Eso no es asunto suyo!" #NT!
 academics.3106.t: "Propaganda de estudiantes" #NT!
 academics.3106.d: "A pesar de todos los esfuerzos del Estado para evitar la propagación de la propaganda a favor de los círculos de estudiantes liberales 'Göttingen Seven', lograron distribuir folletos a gran escala en grandes ciudades." #NT!
 academics.3106.f: "¡Recuerda a nuestros héroes! ¡Recuerda el Göttingen Seven! ¡Alabado sus virtudes! Cuando el profesor Dahlmann publicó sus documentos contra el rey de Hanover, recibió el apoyo popular de estudiantes y liberales alemanes. Tuvo una influencia explosiva en los estados de la confederación alemana. Los estudiantes de la Universidad de Göttingen produjeron muchos cientos, o incluso miles, de copias y las diseminaron en Alemania." #NT!
 academics.3106.g: "¡Este paquete de estudiante desgarbado!" #NT!
 academics.3107.t: "Jacob Grimm en [ROOT.GetCountry.GetNameNoFlag]" #NT!
 academics.3107.d: "Después de ser desterrado de Hanover, el famoso erudito y abogado alemán Jacob Grimm está buscando un nuevo hogar. Nuestras simpatías por el 'Göttinger Seven' se han extendido a él, por lo que espera un nuevo trabajo." #NT!
 academics.3107.f: "Jacob Ludwig Karl Grimm era un autor, lingüista, filólogo, jurista y folklorista alemán alemán. Formuló la Ley de Lingüística de Grimm, y fue coautor de Deutsches Wörterbuch, autor de Deutsche Mythologie y editor de los cuentos de hadas de Grimms. Era el hermano mayor de Wilhelm Grimm; Juntos, fueron el dúo literario conocido como los hermanos Grimm." #NT!
 academics.3107.g: "Déle la bienvenida." #NT!
 academics.3107.h: "No necesitamos otro académico de mal humor." #NT!
 academics.3108.t: "Wilhelm Eduard Weber en [ROOT.GetCountry.GetNameNoFlag]" #NT!
 academics.3108.d: "Después de ser desterrado de Hanover, el famoso físico Wilhelm Eduard Weber está buscando un nuevo hogar. Nuestras simpatías por el 'Göttinger Seven' se han extendido a él, por lo que espera un nuevo trabajo." #NT!
 academics.3108.f: "Wilhelm Eduard Weber era un físico alemán y, junto con Carl Friedrich Gauss, inventor del primer telégrafo electromagnético." #NT!
 academics.3111.t: "Der Grimm" #NT!
 academics.3111.d: "Los hermanos Jacob y Wilhelm Grimm han presentado el primer volumen de un diccionario alemán que está destinado a cubrir todo el vocabulario alemán. Una tarea gigantesca, pero una que acerca a la nación cultural alemana aún más cerca." #NT!
 academics.3111.f: "Das Deutsche Wörterbuch (el diccionario alemán) es uno de los diccionarios más importantes del idioma alemán. Es para alemán lo que el Diccionario de Inglés Oxford es para inglés, que contiene información histórica detallada sobre el origen y el uso con el tiempo de las palabras alemanas, con ejemplos tomados de documentos reales. En alemán, el diccionario también se conoce como 'der Grimm'. Fue iniciado por los hermanos Grimm en 1838. Inicialmente esperaban que el proyecto tomara diez años y produjera 6 o 7 volúmenes. De hecho, el primer volumen no se publicó hasta 1854. Wilhelm Grimm murió en 1859, y Jacob en 1863, mientras trabajaba en la entrada de 'Frucht' (Fruit). Después de su muerte, varias instituciones participaron en el trabajo, incluida la Academia de Ciencias de Prusia y la Academia de Berlín, con un centro en Göttingen también involucrado. Finalmente completado en 1961, el diccionario contendrá 32 volúmenes e incluirá aproximadamente 350,000 entradas principales. El 'Grimm' no fue solo un trabajo científico, sino también nacional." #NT!
 academics.3111.g: "¡Esto debería publicarse en cada estado alemán!" #NT!
 academics.3112.g: "Esperaba que hicieran un nuevo libro de cuento de hadas en lugar de esto ..." #NT!
 academics.3113.t: "Primer germanista en Frankfurt" #NT!
 academics.3113.d: "Varios intelectuales alemanes han invitado a personas de ideas afines a una conferencia en Frankfurt, el 'Día de los Alemanistas'. Si bien muchos quieren ver esta reunión como un evento cultural, el mensaje político es igual de claro." #NT!
 academics.3113.f: "Los 'días germanistas' eran, al contrario de lo que su nombre sugiere, no un evento solo para alemanistas. Eran una iniciativa de los científicos de la universidad alemana como parte del desarrollo de un sentimiento nacional alemán. A diferencia de hoy, el término estudios alemanes tenía un significado más amplio en el Vormärz: vinculaba historiadores, abogados y lingüistas y eruditos literarios que trataban la historia alemana, la ley alemana y el idioma alemán. En el primer día de los germanistas, iniciado en Frankfurt en 1846 por el abogado de Tübingen August Ludwig Reyscher, Friedrich Christoph Dahlmann, Georg Waitz y Johann Gustav Droysen habló sobre la indivisibilidad de Schleswig-Holstein. Jacob Grimm habló sobre el "valor de las ciencias imprecisas", su hermano Wilhelm habló sobre el diccionario alemán. Las conferencias se llevaron a cabo en el Römer en Frankfurt. Un segundo día de germanistas siguió en Lübeck en 1847. El tercer día de germanistas, que se suponía que tendrá lugar en Nuremberg en 1848, no tuvo lugar debido a la revolución de marzo." #NT!
 academics.3113.g: "Alemania es una nación cultural." #NT!
 academics.3113.h: "Sus ideales liberales sirven como guía para nosotros." #NT!
 academics.3115.t: "Controversia de arrodillado" #NT!
 academics.3115.d: "Con las anexiones de las tierras circundantes en la era napoleónica, Bavaria ganó grandes territorios que eran protestantes. En este tiempo, el rey promovió una política más tolerante hacia sus súbditos. Un ejemplo fue el edicto, que los soldados protestantes no tuvieron que rodar frente a una masa o procesión católica. Sin embargo, el ministro Karl von Abel ha propuesto cambiar esto." #NT!
 academics.3115.f: "La llamada disputa genuflect tuvo lugar en el reino de Baviera en la primera mitad del siglo XIX. Comenzó con un decreto del ministro bávaro Karl von Abel, que también requería que los soldados protestantes sean genuterrados ante el Santísimo Sacramento durante los servicios militares. El edicto se hizo conocido como el 'Decreto de arrodilla'. Esto condujo a un argumento acalorado en la Cámara de Diputados que duraron varios años." #NT!
 academics.3115.g: "¡Somos un país católico y la gente se arrodilla aquí!" #NT!
 academics.3115.h: "Pero, ¿qué pasa con nuestros compatriotas protestantes?" #NT!
  
