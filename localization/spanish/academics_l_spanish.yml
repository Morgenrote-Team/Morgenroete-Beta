 academics.1000.t: "Dr. [ROOT.Var('gaudi_engineer_var').GetCharacter.GetLastName] solicita fondos" #NT!
 academics.1000.d: "Nuestro [concept_gaudi_engineer], Dr. [ROOT.Var('gaudi_engineer_var').GetCharacter.GetFullName], no está contento con la financiación del departamento [ROOT.Var('gaudi_engineer_var').GetCharacter.GetHerHis]. [ROOT.Var('gaudi_engineer_var').GetCharacter.GetSheHe] solicita sustancialmente más fondos para la investigación [ROOT.Var('gaudi_engineer_var').GetCharacter.GetHerHis]." #NT!
 academics.1000.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_receiver_of_funding_custom_loc')] I, por otro lado, ¡estoy involucrado en una investigación real! Investigación con un beneficio científico ... ¡el departamento de NMY debería recibir más fondos! ¡Actualmente estoy involucrado en un proyecto que cambiará nuestro mundo! \ N[SCOPE.GetRootScope.GetCountry.GetCustom('academics_engineer_focus_custom_loc')] \ n \ nbut para lograrlo, ¡necesitamos fondos adicionales!" #NT!
 academics.1000.g: "¡Fundir su investigación!" #NT!
 academics.1000.h: "¿A quién le importa algunos ingenieros?" #NT!
 academics_additional_funding_engineer_modifier: "Financiación adicional para ingenieros" #NT!
 academics_no_funding_engineer_modifier: "No hay fondos para ingenieros" #NT!
  
 dubois_humanities_receive_promotion_loc: "¡Los Raiders y Necrofiles de la tumba no contribuyen en nada a nuestra sociedad!" #NT!
 dubois_natural_history_receive_promotion_loc: "¿Por qué los coleccionistas de mariposas y los constructores de monstruos obtienen todos los fondos y tenemos que raspar con las sobras?" #NT!
 dubois_mathematics_receive_promotion_loc: "Es absolutamente idiota que los Tinkerers locos y los Stargazers tengan todos sus deseos leídos de sus labios, ¡mientras que tenemos que soportar las migajas!" #NT!
  
 academics_engineer_focus_atmospheric_engine_loc: "Estamos tratando de aprovechar el poder del vapor para reemplazar a los trabajadores con maquinaria. ¡Esto haría que sea más barato extraer para los recursos o producir cosas!" #NT!
 academics_engineer_focus_computer_loc: "Estamos tratando de construir una máquina que pueda realizar todo tipo de cálculos. Esto haría que las computadoras humanas sean innecesarias. ¡Podríamos calcular todo con la mayor precisión y con cualquier error!" #NT!
 academics_engineer_focus_washing_machine_loc: "Nuestro objetivo es crear una máquina que pueda lavar la ropa sin la necesidad de trabajar. ¡Revolucionaría a nuestra sociedad ya que no tendríamos que perder nuestro tiempo para lavar nuestra ropa sucia!" #NT!
 academics_engineer_focus_lighter_loc: "¿Te imaginas lo útil que sería un pequeño encendedor de bolsillo? ¿Uno que crea una gran llama y puede encender velas o cigarrillos? ¡Esta es una fortuna esperando ser levantada!" #NT!
 academics_engineer_focus_rocket_loc: "Queremos crear un cohete que sea capaz de llegar al espacio. Solo imagine las aplicaciones militares de tal cohete. ¡Podrías golpear a tus enemigos y no pudieron hacer nada en contra!" #NT!
 academics_engineer_focus_telephone_loc: "¡Imagine un dispositivo que podría usar para hablar con alguien a través de grandes distancias! ¡En eso estamos trabajando en nuestro laboratorio en este momento!" #NT!
 academics_engineer_focus_combustion_engine_loc: "Los trenes son geniales, pero son enormes y necesitan rieles. ¿Qué pasaría si pudiéramos construir un motor pequeño que pueda impulsar un vehículo pequeño? Todos podían viajar por todas partes. Hay muchas aplicaciones útiles de dicho motor. ¡Y eso es exactamente en qué está trabajando mi equipo ahora mismo!" #NT!
 academics_engineer_focus_basic_research_alloys_loc: "Estamos realizando investigaciones básicas para encontrar tantas aleaciones útiles como sea posible. ¡Si encontramos las aleaciones correctas que pueden conducir a mejores construcciones, máquinas y dispositivos más eficientes que se consideran imposibles en este momento!" #NT!
 academics_engineer_focus_basic_research_factory_machinery_loc: "Mi equipo está trabajando para mejorar las máquinas utilizadas en las fábricas. ¡Eso podría conducir a un impulso masivo en nuestra producción y en el mundo de nuestra nación!" #NT!
 academics_engineer_focus_basic_research_housing_loc: "Estamos investigando la forma más eficiente de construir casas para crear espacio vital a bajo precio. Esto podría ayudar a la población a pagar mejores condiciones de vida y aumentaría nuestro sector de la construcción." #NT!
 academics_engineer_focus_basic_research_urban_planing_loc: "Nuestras ciudades no son lo suficientemente eficientes. ¡Por lo tanto, debemos averiguar cómo hacer que las ciudades sean más eficientes para elevar el nivel de vida de nuestra gente!" #NT!
  
 academics.1001.t: "Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] solicita fondos" #NT!
 academics.1001.d: "Nuestro [concept_verrier_astronomer], [ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName], solicita sustancialmente más fondos para el observatorio [ROOT.Var('verrier_astronomer_var').GetCharacter.GetHerHis]. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetSheHe] argumenta que sin la fundación adicional, el equipo [ROOT.Var('verrier_astronomer_var').GetCharacter.GetHerHis] no podrá descubrir nuevos [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]." #NT!
 academics.1001.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_receiver_of_funding_custom_loc')] Nuestro trabajo es importante para desentrañar los misterios del espacio y el tiempo. ¡Podríamos encontrar tantas cosas geniales si tuviéramos suficiente dinero! ¡Necesitamos un telescopio moderno que nos permita adelantarnos a todos los demás países! ¡Se trata del prestigio nacional!" #NT!
 academics.1001.g: "¡Fondo de su nuevo telescopio!" #NT!
 academics.1001.h: "¿Qué otra cosa? ¿Ya no descubrirán ninguna estrella?" #NT!
 academics_additional_funding_astronomer_modifier: "Financiación adicional para astrónomos" #NT!
 academics_no_funding_astronomer_modifier: "Sin fondos para astrónomos" #NT!
  
 academics.1002.t: "Dr. [ROOT.Var('dubois_naturalist_var').GetCharacter.GetLastName] solicita fondos" #NT!
 academics.1002.d: "Nuestro [concept_dubois_naturalist], [ROOT.Var('dubois_naturalist_var').GetCharacter.GetFullName], quiere llevar a cabo una expedición de investigación a una parte salvaje del mundo, llena de plantas y animales desconocidos. En tal región, [ROOT.Var('dubois_naturalist_var').GetCharacter.GetLastName] espera descubrir muchos [concept_dubois_specimen] nuevos." #NT!
 academics.1002.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_receiver_of_funding_custom_loc')] I Por otro lado, trate de encontrar todas las especies del mundo! Esto podría ser muy importante en el futuro, como nunca se sabe, cómo lo ayudarán nuevas especies. E solo imaginar, ¡incluso podría nombrar un nuevo animal o planta después de ti! ¿No sería genial? \ Ni solo necesitará suficientes fondos para llevar a cabo esta expedición." #NT!
 academics.1002.g: "¡Fondo de su expedición!" #NT!
 academics.1002.h: "Ya tenemos suficientes especies en casa." #NT!
 academics_additional_funding_naturalist_modifier: "Financiación adicional para naturalista" #NT!
 academics_no_funding_naturalist_modifier: "No hay fondos para el naturalista" #NT!
  
 academics.1003.t: "Dr. [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] solicita fondos" #NT!
 academics.1003.d: "Nuestro [concept_dubois_paleontologist], [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetFullName], necesita urgentemente fondos para su museo de dinosaurios. Esto permitiría a [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetHerHim] exhibir más [Concept('concept_dubois_dinosaur_skeleton','$concept_dubois_dinosaur_skeletons$')] y [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] y, por lo tanto, contribuiría a la gloria de nuestra nación." #NT!
 academics.1003.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_receiver_of_funding_custom_loc')] \ nall mientras tengo un museo prestigioso que apenas puedo pagar. ¡Estos dinosaurios son la mayor maravilla del mundo y solo están reuniendo polvo! ¡Sería una colección fantástica que traería a miles de visitantes a nuestra nación!" #NT!
 academics.1003.g: "¡Fondo del museo!" #NT!
 academics.1003.h: "Siguiente [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetSheHe] quiere fondos para un Parque Jurassic o algo así. ¡No, gracias!" #NT!
 academics_additional_funding_paleontologist_modifier: "Financiación adicional para paleontólogo" #NT!
 academics_no_funding_paleontologist_modifier: "No hay fondos para el paleontólogo" #NT!
  
 academics.1004.t: "Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] solicita fondos" #NT!
 academics.1004.d: "Nuestro [concept_lepsius_archaeologist], [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullName], necesita urgentemente fondos para organizar más expediciones y excavaciones. Solo de esta manera, nuestra nación puede mantenerse al día con los otros poderes." #NT!
 academics.1004.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_receiver_of_funding_custom_loc')] \ nall Otros países envían nuevas expediciones en todo el mundo todos los días y saquean los tesoros arqueológicos, mientras que nuestro museo permanece vacío. Esto es inaceptable! \ Nmy Los equipos necesitan urgentemente fondos para mantenerse al día. ¿Qué pasa si perdemos la tumba de una rey solo porque no teníamos suficiente dinero? ¡Imagínese, nuestros rivales celebrados por todo el mundo y nosotros sin éxito!" #NT!
 academics.1004.g: "¡Dales más fondos!" #NT!
 academics.1004.h: "[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] solo quiere fondos para [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] lujoso estilo de vida!" #NT!
 academics_additional_funding_archaeologist_modifier: "Financiación adicional para arqueólogo" #NT!
 academics_no_funding_archaeologist_modifier: "No hay fondos para arqueólogo" #NT!
  
 academics.1005.t: "Dr. [ROOT.Var('lepsius_anthropologist_var').GetCharacter.GetLastName] solicita fondos" #NT!
 academics.1005.d: "Nuestro [concept_lepsius_anthropologist], [ROOT.Var('lepsius_anthropologist_var').GetCharacter.GetFullName], necesita urgentemente fondos para organizar más expediciones y excavaciones. Solo de esta manera, nuestra nación puede mantenerse al día con los otros poderes." #NT!
 academics.1005.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_receiver_of_funding_custom_loc')] \ nall Otros países se centran en encontrar el eslabón perdido más antiguo en nuestra evolución, mientras que tenemos algunos huesos de la Edad Media ... ¡esto es inaceptable! Solo imagine los huesos del primer humano que se encuentra en nuestro país y luego es destruido por algunos trabajadores a los que no les importa en absoluto. Si no obtenemos fondos, ¡no tenemos la oportunidad de encontrar esos esqueletos! ¿Qué pasa si nuestros rivales encuentran el primer humano y demuestran que su país alberga el origen de la humanidad?" #NT!
 academics.1005.g: "¡Dales más fondos!" #NT!
 academics.1005.h: "[ROOT.Var('lepsius_anthropologist_var').GetCharacter.GetSheHe] para forjar un cráneo y hacerse famoso!" #NT!
 academics_additional_funding_anthropologist_modifier: "Financiación adicional para antropólogo" #NT!
 academics_no_funding_anthropologist_modifier: "No hay fondos para antropólogo" #NT!
  
 academics.2001.t: "El [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] nos pide que nos concentremos en inspeccionar los cielos" #NT!
 academics.2001.d: "Nuestra nación aún no tiene mucha investigación astronómica y ni siquiera tenemos una cabeza [concept_verrier_astronomer]. Por lo tanto, el [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] quiere que creemos una nueva tabla estelar y designemos un astrónomo jefe." #NT!
 academics.2001.f: "El [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] le pide que aumente su compromiso con la astronomía. Tal enfoque nos permitiría obtener nuevos conocimientos sobre el cielo y el universo. Por lo tanto, le pedimos, en primer lugar, crear una nueva tabla estrella actualizada y, en segundo lugar, reclutar a un astrónomo jefe. \ N \ nsigned, el consejo del [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #NT!
 academics.2001.g: "¡Ad Astra!" #NT!
 academics.2001.h: "Estrellas? ¡Tenemos mejores cosas que hacer!" #NT!
 academics_unhappy_intelligentsia: "La sociedad científica es infeliz" #NT!
 academics.2001_goal_tt: "Tendrá que descubrir #p 75#! [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] y obtener un [concept_verrier_astronomer] en #n 10#! años." #NT!
 academics.2001_reward_tt: "Como recompensa, su astrónomo obtendrá #p 15 experiencia#!, Además, la inteligencia obtendrá #p 5 aprobación#! y el costo de la tecnología de producción se reducirá en #p 5%#! durante 3 años." #NT!
  
 je_academics_find_more_stars: "Centrarse en la astronomía: la tabla de estrellas" #NT!
 je_academics_find_more_stars_reason: "El [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] quiere que encontremos [JournalEntry.GetGoalAddValue] nuevo [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] para crear una nueva tabla estrella y designar un nuevo jefe [concept_verrier_astronomer]. \ N \ nso lejos hemos encontrado [JournalEntry.GetGoalProgressValue] #b objetos astronómicos#!." #NT!
 je_academics_find_more_stars_success: "Encontrar #p 75#! Nuevo #b Objetos astronómicos#!" #NT!
 je_academics_find_more_stars_event_tt: "Nuestro nuevo [concept_verrier_astronomer] presentará la nueva lista de estrellas" #NT!
 je_academics_find_more_stars_goal: ""
  
 academics.2002.t: "El Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] presenta una nueva tabla de estrellas" #NT!
 academics.2002.d: "Pudimos crear una nueva tabla estelar y encontramos un nuevo jefe [concept_verrier_astronomer]. ¡El [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] estará complacido!" #NT!
 academics.2002.f: "\ "¡Este nuevo gráfico estelar es muy preciso! Lo compro con las de otras naciones y la nuestra es obviamente suprema. Además, encontramos muchas estrellas nuevas de las cuales algunas son bastante fascinantes! Esta, por ejemplo, tiene más luz roja de lo que generalmente ..."" #NT!
 academics.2002.g: "¡Viva!" #NT!
 academics_scientific_society_happy: "La sociedad científica es feliz" #NT!
  
 academics.2003.t: "¡Nuestro enfoque en la astronomía falló!" #NT!
 academics.2003.d: "No pudimos centrarnos lo suficiente en la astronomía para alcanzar los objetivos que nos dieron el [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]. ¡No estarán complacidos!" #NT!
 academics.2003.f: "\ "Parece que la guerra, la economía y incluso el vino y el alcohol son más importantes para nuestros líderes que la ciencia. Estamos decepcionados. ¡Esperamos que el enfoque de nuestra gran nación regrese a la ciencia pronto! \"" #NT!
 academics.2003.g: "¡Qué pitty!" #NT!
  
 academics.2004.t: "El [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] solicita una nueva tabla de estrellas de nuestro [concept_verrier_astronomer]" #NT!
 academics.2004.d: "Según el [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')], nuestra nación necesita centrarse en encuestar el cielo. Solicitaron que el Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] encuentre nuevas estrellas y otras [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] y produzca una nueva tabla de estrellas." #NT!
  
 academics.2004_goal_tt: "Tendrá que descubrir #p 100#! [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] en #n 10#! años." #NT!
 academics.2004_reward_tt: "Como recompensa, su astrónomo obtendrá #p 25 Experience#!, Además, la inteligencia obtendrá #p 5 aprobación#! y el costo de la tecnología de producción se reducirá en #p 5%#! durante 3 años." #NT!
  
 je_academics_create_star_chart: "Enfoque en la astronomía: la lista de estrellas de nuestro astrónomo" #NT!
 je_academics_create_star_chart_reason: "El [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] quiere que nuestro [concept_verrier_astronomer] encuentre [JournalEntry.GetGoalAddValue] nuevo [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] para crear un nuevo gráfico de estrellas. \ N \ nso lejos hemos encontrado [JournalEntry.GetGoalProgressValue] #b objetos astronómicos#!." #NT!
 je_academics_create_star_chart_success: "Encontrar #p 100#! Nuevo #b Objetos astronómicos#!" #NT!
 je_academics_create_star_chart_event_tt: "Nuestro [concept_verrier_astronomer] presentará el nuevo gráfico de estrellas." #NT!
 je_academics_create_star_chart_event_without_astronomer_tt: "Se publicará nuestro nuevo cuadro Star." #NT!
 je_academics_create_star_chart_failed_event_tt: "Nuestro [concept_verrier_astronomer] no puede proporcionar la nueva tabla de estrellas." #NT!
 je_academics_create_star_chart_failed_event_without_astronomer_tt: "Después de perder [concept_verrier_astronomer] no podemos proporcionar una tabla de estrellas." #NT!
 je_academics_create_star_chart_goal: ""
  
 academics.2005.t: "El Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] presenta una nueva tabla de estrellas" #NT!
 academics.2005.f: "El Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] estaba rodeado por sus colegas cuando lo tostaron entre sí." #NT!
  
 academics.2006.t: "Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] falló!" #NT!
 academics.2006.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName] no pudo crear una nueva tabla de estrellas. No pudo encontrar suficientes estrellas y otras [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] para que valga la pena. El resto del [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] está extremadamente decepcionado con su fracaso." #NT!
 academics.2006.f: "Estimado [ROOT.Var('verrier_astronomer_var').GetCharacter.GetFirstName], \ n \ n no hemos podido que no pudiera enviar una nueva tabla de estrellas, que una vez más muestra que prefiere, otras actividades, sobre ciencia. Lamentablemente, esto se reflejará mal en nuestra sociedad. ¡Esperamos mejor en el futuro! \ N \ nthe [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #NT!
 academics.2006.g: "¡Qué pitty!" #NT!
  
 academics.2007.t: "Una nueva tabla de estrellas" #NT!
 academics.2007.d: "Lamentablemente, en ausencia de nuestro antiguo [concept_verrier_astronomer], la nueva tabla de estrellas se presentó en el [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]. Los académicos parecen estar bastante contentos con el nuevo gráfico." #NT!
 academics.2007.f: "\ "¡Gracias a este nuevo cuadro de estrellas, podremos estudiar el cielo aún mejor! Esperemos que encontremos muchas ideas nuevas sobre cómo se mueven esos cuerpos!" #NT!
  
 academics.2008.t: "Sin astrónomo, sin gráfico de estrellas" #NT!
 academics.2008.d: "La pérdida de nuestro [concept_verrier_astronomer] condujo a menos descubrimientos de estrellas y otras [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')], entonces esperábamos. Por lo tanto, no pudimos encontrar lo suficiente para crear una nueva tabla de estrellas. El [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] no está satisfecho con este resultado." #NT!
 academics.2008.f: "\ "No solo nuestro gobierno perdió a su brillante astrónomo principal, tampoco pudieron apoyar suficientemente a nuestros astrónomos en su trabajo. Resultando en muchas menos observaciones. Esto significa que recurriremos en nuestra investigación astronómica. ¡Es verdaderamente horrible! \"" #NT!
  
 academics.2009.t: "Necesitamos encontrar más estrellas que [SCOPE.sCountry('rival_scope').GetName]" #NT!
 academics.2009.d: "Los miembros del [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] no están contentos de que [SCOPE.sCountry('rival_scope').GetName] descubriera más [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] que nuestra nación. Nos piden que encontremos más objetos astronómicos #b#! en total que [SCOPE.sCountry('rival_scope').GetName] en 10 años." #NT!
 academics.2009.f: "Es una pena que una nación tan insignificante como [SCOPE.sCountry('rival_scope').GetName] haya encontrado más objetos astronómicos que nosotros. Debemos superar a estos astrónomos aficionados incivilizados lo antes posible y encontrar objetos más astronómicos en general que ellos. \ N \ nsigned, los miembros del [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #NT!
 academics.2009_goal_tt: "Tendrá que descubrir más [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] que su rival, [SCOPE.sCountry('rival_scope').GetName], en #n 10#! años. Tienen [GetPlayer.MakeScope.Var('je_rival_nation_var').GetVariable('verrier_astronomical_objects').GetValue|0+], tenemos [GetPlayer.MakeScope.Var('verrier_astronomical_objects').GetValue|0+]." #NT!
 academics.2009_reward_tt: "Como recompensa, la inteligencia obtendrá #p 5 aprobación#! y obtendrá #p 10%#! más prestigio durante 4 años." #NT!
 academics.2009.g: "¡Vamos a vencerlos!" #NT!
 academics.2009.h: "Esta no es una carrera espacial ..." #NT!
  
 academics_no_competition_with_rival: "Perdió la carrera por las estrellas" #NT!
 academics_competition_with_rival_won: "Ganó la carrera por las estrellas" #NT!
  
 je_academics_rivalry_for_stars: "Enfoque en la astronomía: la carrera estrella" #NT!
 je_academics_rivalry_for_stars_reason: "El [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] quiere que encontremos más [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] que nuestro rival [SCOPE.sCountry('target').GetName]. \ N \ nour #b objetos astronómicos#!: [ROOT.Var('verrier_astronomical_objects').GetValue|0+] \ n[SCOPE.sCountry('target').GetName] #b Objetos astronómicos#!: [ROOT.Var('je_rival_nation_var').GetVariable('verrier_astronomical_objects').GetValue|0+]" #NT!
 je_academics_rivalry_for_stars_success: "Usted ([GetPlayer.MakeScope.Var('verrier_astronomical_objects').GetValue|0+]) tiene más [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] que [SCOPE.sCountry('target').GetName] ([GetPlayer.MakeScope.Var('je_rival_nation_var').GetVariable('verrier_astronomical_objects').GetValue|0+])." #NT!
  
 academics.2010.t: "Ganamos la carrera por las estrellas" #NT!
 academics.2010.d_rival: "Descubrimos más objetos astronómicos que [ROOT.Var('je_rival_nation_var').GetCountry.GetName]. ¡El [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] y nuestra población están entusiasmados con esta victoria de nuestra nación!" #NT!
 academics.2010.d_rival_gone: "Nuestro rival en la carrera por las estrellas se ha ido. ¡El [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] y nuestra población están entusiasmados con esta victoria de nuestra nación!" #NT!
 academics.2010.f: "Nosotros, los miembros del [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] estamos muy contentos con nuestra victoria científica sobre nuestro rival. Sus científicos han demostrado estar atrapados en la Edad de Piedra e incapaces de descubrir objetos más astronómicos. ¡Este es un gran día para nuestra nación! \ N \ nsigned, los miembros del [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #NT!
  
 academics.2011.t: "Perdimos la carrera por las estrellas" #NT!
 academics.2011.d: "No pudimos encontrar más [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] que [ROOT.Var('je_rival_nation_var').GetCountry.GetName]. Los miembros del [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] están completamente decepcionados." #NT!
 academics.2011.f: "Este fracaso de nuestra academia una vez más demuestra que el enfoque de nuestra nación no está en los avances científicos y científicos. Por lo tanto, proponemos cesar las hostilidades y esos planes de conquista mundial a favor de la ciencia. \ N \ nthe [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #NT!
  
 academics.2012.t: "El [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] exige un [concept_verrier_observatory]" #NT!
 academics.2012.d: "Los miembros de nuestra [concept_academics_scientific_society] demandan que construamos un [concept_verrier_observatory] moderno en 10 años o menos. Esto nos permitiría llevar a cabo [concept_verrier_astronomy] y encontrar [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]." #NT!
 academics.2012.f: "Como cada gran nación hoy en día posee un observatorio, nosotros, los miembros del [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] exigimos la construcción de un observatorio. Sin un observatorio, nunca estaremos a la vanguardia de la ciencia. Por lo tanto, un observatorio es claramente una necesidad. \ N \ nsigned, el consejo del [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #NT!
 academics.2012.g: "¡Necesito nuestros mejores arquitectos e ingenieros en este momento!" #NT!
 academics.2012.h: "¿Quién necesita un observatorio de todos modos?" #NT!
 academics.2012_goal_tt: "Tendrá que construir un [concept_verrier_observatory] en #n 10#! años." #NT!
 academics.2012_reward_tt: "Como recompensa, la inteligencia obtendrá la aprobación #p 5#! y el costo de la tecnología de producción se reducirá mediante #p 5%#! durante 5 años, también obtendrá #p 5%#! leales entre los académicos." #NT!
  
 je_academics_build_observatory: "Enfoque en la astronomía: construir un observatorio" #NT!
 je_academics_build_observatory_reason: "El [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] quiere que construamos un [concept_verrier_observatory]. Para construir un observatorio, necesitamos tener al menos una universidad e investigar la astronomía moderna #b #! o tener un [concept_verrier_astronomer]." #NT!
  
 academics.2013.t: "El nuevo observatorio comienza la observación" #NT!
 academics.2013.d: "Un nuevo [concept_verrier_observatory] abrió sus puertas y comenzó a observar el cielo. Los miembros del [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] están complacidos ... por ahora." #NT!
 academics.2013.f: "Después de construir un observatorio, nuestra nación ahora finalmente puede explorar el cielo nocturno. Felicidades. Ahora, en realidad, se consideramos un país científicamente avanzado. \ N \ nsigned, los miembros del [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #NT!
 academics.2013.g: "¡Descubriremos los misterios del cielo nocturno!" #NT!
  
 academics.2014.t: "Un fracaso astronómico" #NT!
 academics.2014.d: "No pudimos construir un [concept_verrier_observatory]. ¡Los miembros del [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] están profundamente decepcionados!" #NT!
 academics.2014.f: "¡Construir un observatorio debe ser algo extremadamente difícil ya que nuestra nación no pudo hacerlo en 10 años! En este tiempo podríamos haber encontrado un nuevo planeta cientos de estrellas o calculado el movimiento de muchos cometas. Pero sin un telescopio adecuado, eso no es posible. Una pantalla vergonzosa. \ N \ nthe [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #NT!
 academics.2014.g: "¡Fue culpa del cometa!" #NT!
  
 academics.2015.t: "El [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] quiere que encontremos el planeta x" #NT!
 academics.2015.d: "Los miembros de nuestro [concept_academics_scientific_society] están convencidos de que descubrir el Planeta X será el mayor éxito científico en este siglo. Nos piden que nos concentremos en encontrar el misterioso planeta antes que nadie más." #NT!
 academics.2015.f: "Escuchamos que otras naciones están ansiosas por encontrar el planeta X. ¡Pero este avance nos pertenece solo! ¡Tenemos que vencer a todos los demás en esta tarea colosal! \ N \ nsigned, el consejo del [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #NT!
 academics.2015.g: "¡Concéntrese todos nuestros reproductos en encontrar ese planeta!" #NT!
 academics.2015.h: "Planeta x? Más como el planeta y ..." #NT!
 academics.2015_goal_tt: "Tendrá que encontrar #b planeta x#! antes que nadie más. Para tener la oportunidad de descubrirlo, necesitaremos un [concept_verrier_astronomer] y #p 1500#! descubierto [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]." #NT!
 academics.2015_reward_tt: "Como recompensa, la inteligencia obtendrá #p 5 aprobación#! y el costo de la tecnología de producción se reducirá por #p 5%#! durante 10 años, también obtendrá #p 10%#! leales entre los académicos y su [concept_verrier_astronomer] ganará #p 50#! [concept_academics_experience]." #NT!
  
 je_academics_find_planet_x: "Centrarse en la astronomía: Find Planet X" #NT!
 je_academics_find_planet_x_reason: "El [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] quiere que encontremos el misterioso planeta #o x#!. que tenga la oportunidad de descubrirlo, necesitaremos un [concept_verrier_astronomer] y #p 1500#! descubierto [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]." #NT!
 je_academics_find_planet_x_complete_tt: "Descubra #o planeta x#! ante nadie más." #NT!
 je_academics_find_planet_x_fail_tt: "Alguien más descubrió #o planeta x#! ante usted." #NT!
  
 academics.2016.t: "Encontramos el planeta x" #NT!
 academics.2016.d: "¡Somos los primeros en encontrar el planeta X! Con suerte, esto complacerá el [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]." #NT!
 academics.2016.f: "La carta fue garabateada con fórmulas y diagramas extraños. Hubo manchas que parecían que alguien derramó un poco de líquido sobre la carta y, si tuviera que adivinar, podría jurar que también había descansos de caviar en el papel. No podías dejar de preguntarte qué pasó aquí." #NT!
 academics.2016.g: "¡Este es el descubrimiento astronómico más importante del siglo!" #NT!
  
 academics.2017.t: "Llegamos tarde para encontrar el planeta x" #NT!
 academics.2017.d: "Otra nación descubrió el Planeta X antes que nosotros. ¡Los miembros del [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] están aplastados por esta derrota!" #NT!
 academics.2017.f: "Inaceptable. \ N \ nthe [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]." #NT!
 academics.2017.g: "¡Ese no es un planeta real de todos modos!" #NT!
  
