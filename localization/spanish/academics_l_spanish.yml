 academics.2110.t: "El director del museo quiere un artefacto importante" #NT!
 academics.2110.d: "El director del Museo Arqueológico escribió hoy una carta abierta al gobierno en nombre del [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]." #NT!
 academics.2110.f: "Es muy arrepentido de que tengo que decir que, a pesar del rico fondo de artefactos, nuestro museo todavía carece de una gran atracción que podría llamarse una obra maestra de la colección. Desafortunadamente, el gobierno hasta ahora no ha podido centrarse en la calidad como un estándar arqueológico para los objetos en lugar de la cantidad. Por lo tanto, recomiendo que esta queja se rectifique en los próximos años, o en nuestra nación, en el mejor de los casos, se clasificará como contadores de frijoles en el mundo científico." #NT!
 academics.2110.g: "Un esfuerzo prestigioso." #NT!
 academics.2110.h: "No vale la pena." #NT!
 academics.2110_goal_tt: "Tendrá que recolectar #p 1#! [concept_lepsius_major_artifact] en #n 15#! años." #NT!
 academics.2111.t: "Esplendor del museo" #NT!
 academics.2111.d: "El [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] expresó su gratitud en su carta hoy." #NT!
 academics.2111.f: "Felicitaciones por la decisión de hacer de la arqueología la prioridad nacional del país. El espécimen excepcional recientemente adquirido se exhibirá en una exposición especial en las próximas semanas. El mundo nos envidia! \ N \ nsigned, el director del Museo Arqueológico" #NT!
 academics.2111.g: "Maravilloso." #NT!
 academics.2112.t: "Un lugar polvoriento" #NT!
 academics.2112.d: "En una carta abierta hoy en nombre del [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')], el Director del Museo Arqueológico expresó su arrepentimiento de que la arqueología no se escuche en nuestra nación." #NT!
 academics.2112.f: "Nunca fue tan arruinado por tan pocos en tan poco tiempo. \ N \ nsigned, el director del Museo Arqueológico" #NT!
 academics.2112.g: "¿Y?" #NT!
  
 je_academics_major_artifact: "Enfoque en la arqueología: artefacto principal" #NT!
 je_academics_major_artifact_reason: "El [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] quiere que encontremos al menos #p 1#! [concept_lepsius_major_artifact]. Los principales artefactos se pueden obtener a través de descubrimientos principales, a través de excavaciones permanentes o en cadenas de eventos aleatorios durante las expediciones." #NT!
 je_academics_major_artifact_success: "Tener #p 1#! [concept_lepsius_major_artifact]." #NT!
  
 academics.2113.t: "El director del museo exige excelencia arqueológica" #NT!
 academics.2113.d: "El director del Museo Arqueológico ha señalado que falta poco para hacer que la exposición sea casi perfecta." #NT!
 academics.2113.f: "Soy un hombre humilde. Como saben, mis afirmaciones no son particularmente extravagantes. Nunca le he pedido a este gobierno un favor elegante. Siempre me contenía, ya que corresponde al curador de una institución tan espléndida. Además: falta una última pequeña guinda del pastel para elevar nuestra hermosa colección a la clase mundial. Todo lo que se necesita es una excelente exposición. No más. Obtener 100 artefactos de una región y un artefacto importante, con suerte no será difícil, ¿verdad?" #NT!
 academics.2113.g: "Un desafío bienvenido." #NT!
 academics.2113.h: "Eso es demasiado arriesgado." #NT!
 academics.2112_goal_tt: "Tendrá que organizar una excelente exhbición en #n 20#! años." #NT!
 academics.2114.t: "Arqueología en su pico" #NT!
 academics.2114.d: "Una carta ablandada y apenas legible nos llegó hoy desde el Museo Arqueológico." #NT!
 academics.2114.f: "Solo el remitente aún podría ser descifrado. La firma claramente pertenecía al director del museo. El Secretario sospecha de lágrimas de alegría mientras escribe la carta." #NT!
 academics.2114.g: "Él está feliz y nosotros también." #NT!
 academics.2115.t: "Retroceso para la arcaoelogía" #NT!
 academics.2115.d: "Una carta ablandada y apenas legible nos llegó hoy desde el Museo Arqueológico." #NT!
 academics.2115.f: "Solo el remitente aún podría ser descifrado. La firma claramente pertenecía al director del museo. El Secretario asume que las lágrimas llegaron a sus ojos cuando lo escribió. Nuestro fracaso en la última misión arqueológica debe haberlo arrojado a una depresión profunda." #NT!
 academics.2115.g: "Él está triste y nosotros también." #NT!
  
 je_academics_excellent_collection: "Enfoque en la arqueología: excelente colección" #NT!
 je_academics_excellent_collection_reason: "El [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] quiere que creemos una excelente exposición. Necesitamos #G 100#! [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] y #p 1#! [Concept('concept_lepsius_major_artifact')] de una región arqueológica para hacerlo." #NT!
  
 academics.2116.t: "Necesitamos encontrar más artefactos que [SCOPE.sCountry('rival_scope').GetName]" #NT!
 academics.2116.d: "Los Membrats del [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] no están contentos de que [SCOPE.sCountry('rival_scope').GetName] reuniera más [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] que nuestra nación. Nos piden que encontremos más artefactos #b#! en total que [SCOPE.sCountry('rival_scope').GetName] en 10 años." #NT!
 academics.2116.f: "Es una pena que una nación tan insignificante como [SCOPE.sCountry('rival_scope').GetName] tenga una colección más grande de artefactos que nosotros. ¡Debemos adelantar a estos asaltantes de tumbas que solo están cavando por el tesoro y ni siquiera llevan a cabo una arqueología real! ¿Cuánto conocimiento se ha perdido debido a estos bárbaros? \ N \ nsigned, los miembros del [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #NT!
 academics.2116_goal_tt: "Tendrá que reunir más [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] que su rival, [SCOPE.sCountry('rival_scope').GetName], en #n 10#! años. Tienen [GetPlayer.MakeScope.Var('je_artifacts_rival_nation_var').GetVariable('lepsius_total_artifacts').GetValue|0+], tenemos [GetPlayer.MakeScope.Var('lepsius_total_artifacts').GetValue|0+]." #NT!
 academics.2116_reward_tt: "Como recompensa, la inteligencia obtendrá #p 5 aprobación#! y obtendrá #p 10%#! más prestigio durante 4 años." #NT!
 academics.2116.g: "¡Soy arqueólogo y estoy cavando un agujero!" #NT!
 academics.2116.h: "¡La arqueología no es una búsqueda del tesoro!" #NT!
  
 academics_no_competition_with_rival_total_artifacts: "Perdió la búsqueda del tesoro" #NT!
 academics_competition_with_rival_won_total_artifacts: "Ganó la búsqueda del tesoro" #NT!
  
 je_academics_rivalry_for_artifacts: "Centrarse en la arqueología: la búsqueda del tesoro" #NT!
 je_academics_rivalry_for_artifacts_reason: "El [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] quiere que encontremos más [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] que nuestro rival [SCOPE.sCountry('target').GetName]. \ N \ nour #b Total Artifacts#!: [ROOT.Var('lepsius_total_artifacts').GetValue|0+] \ n[SCOPE.sCountry('target').GetName] #b Total Artifacts#!: [ROOT.Var('je_artifacts_rival_nation_var').GetVariable('lepsius_total_artifacts').GetValue|0+]" #NT!
 je_academics_rivalry_for_artifacts_success: "Usted ([GetPlayer.MakeScope.Var('lepsius_total_artifacts').GetValue|0+]) tiene más [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] que [SCOPE.sCountry('target').GetName] ([GetPlayer.MakeScope.Var('je_artifacts_rival_nation_var').GetVariable('lepsius_total_artifacts').GetValue|0+])." #NT!
  
 academics.2117.t: "Colección de artefactos maravillosos" #NT!
 academics.2117.d_rival: "Hemos reunido una colección más grande de artefactos que nuestro rival [ROOT.Var('je_artifacts_rival_nation_var').GetCountry.GetName]. ¡El [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] y nuestra población están entusiasmados con esta victoria de nuestra nación!" #NT!
 academics.2117.d_rival_gone: "Nuestro rival arqueológico se ha ido. ¡El [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] y nuestra población están entusiasmados con esta victoria de nuestra nación!" #NT!
 academics.2117.f: "Debería ser obvio que nuestra nación debe tener una mejor colección arqueológica que esos bárbaros. El [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] está contento con esta colección. Aunque hay más artefactos que deben salvarse de tales salvajes. \ N \ nsigned, los miembros del [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #NT!
 academics.2117.g: "¡Tantos artefactos guardados!" #NT!
  
 academics.2118.t: "No logramos expandir nuestra colección arqueológica" #NT!
 academics.2118.d: "No pudimos expandir nuestra colección arqueológica más allá de nuestros rivales en [ROOT.Var('je_artifacts_rival_nation_var').GetCountry.GetName]. Los miembros del [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] están completamente decepcionados." #NT!
 academics.2118.f: "Las manos sucias de esos salvajes son el suelo, la misma historia de la humanidad. ¿Cómo podrías dejar que todos esos artefactos se sientan saqueados por esos asaltantes de tumbas? Se habrá perdido tanto conocimiento porque prefieren tesoros en lugar de preservar nuestra historia. Asqueroso! \ N \ nthe [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #NT!
 academics.2118.g: "No necesitamos esos artefactos polvorientos." #NT!
  
 academics.2200.t: "Necesitamos encontrar más espécimen que [SCOPE.sCountry('rival_scope').GetName]" #NT!
 academics.2200.d: "Los Membrats del [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] no están contentos de que [SCOPE.sCountry('rival_scope').GetName] reuniera más [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] que nuestra nación. Nos piden que encontremos más especímenes #b#! en total que [SCOPE.sCountry('rival_scope').GetName] en 10 años." #NT!
 academics.2200.f: "Nuestras colecciones de muestras no son nada en comparación con las de [SCOPE.sCountry('rival_scope').GetName]. ¡Tienen todo lo que estamos anhelando! Incluso escuché que tienen una flor gigantesca que huele a cadáveres podridos. Todo nuestro orgullo es una mariposa naranja. ¡Necesitamos encontrar nuevos especímenes, especímenes que nadie encontró ante nosotros! ¡De lo contrario podrían caer en manos de estos carniceros de animales! \ N \ nsigned, los miembros del [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #NT!
 academics.2200_goal_tt: "Tendrá que reunir más [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] que su rival, [SCOPE.sCountry('rival_scope').GetName], en #n 10#! años. Tienen [GetPlayer.MakeScope.Var('je_specimen_rival_nation_var').GetVariable('dubois_specimen').GetValue|0+], tenemos [GetPlayer.MakeScope.Var('dubois_specimen').GetValue|0+]." #NT!
 academics.2200_reward_tt: "Como recompensa, la inteligencia obtendrá #p 5 aprobación#! y obtendrá #p 10%#! más prestigio durante 4 años." #NT!
 academics.2200.g: "¡Necesitamos enviar a nuestro naturalista inmediatamente!" #NT!
 academics.2200.h: "¡Qué pérdida de tiempo!" #NT!
  
 academics_no_competition_with_rival_specimen: "Perdió la ejecución de espécimen" #NT!
 academics_competition_with_rival_won_specimen: "Ganó la carrera por el espécimen" #NT!
  
 je_academics_rivalry_for_specimen: "Centrarse en el naturalismo: la carrera por los especímenes" #NT!
 je_academics_rivalry_for_specimen_reason: "El [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] quiere que encontremos más [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] que nuestro rival [SCOPE.sCountry('target').GetName]. \ N \ nour #b muestras totales#!: [ROOT.Var('dubois_specimen').GetValue|0+] \ n[SCOPE.sCountry('target').GetName] #b muestras totales#!: [ROOT.Var('je_specimen_rival_nation_var').GetVariable('dubois_specimen').GetValue|0+]" #NT!
 je_academics_rivalry_for_specimen_success: "Usted ([GetPlayer.MakeScope.Var('dubois_specimen').GetValue|0+]) tiene más [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] que [SCOPE.sCountry('target').GetName] ([GetPlayer.MakeScope.Var('je_specimen_rival_nation_var').GetVariable('dubois_specimen').GetValue|0+])." #NT!
  
 academics.2201.t: "Colección de espécimen asombrosa" #NT!
 academics.2201.d_rival: "Hemos reunido una colección más grande de [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] que nuestro rival [ROOT.Var('je_specimen_rival_nation_var').GetCountry.GetName]. ¡El [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] y nuestra población están entusiasmados con esta victoria de nuestra nación!" #NT!
 academics.2201.d_rival_gone: "Nuestro rival en nuestra búsqueda de una gran colección biológica se ha ido. ¡El [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] y nuestra población están entusiasmados con esta victoria de nuestra nación!" #NT!
 academics.2201.f: "Finalmente tenemos una colección de muestras #b#! digna de nuestra gran nación. Es hora de que podamos exhibir los seres vivos más fascinantes de este planeta. El [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] está satisfecho con nuestra colección por el momento. Obviamente, tendremos que seguir cultivando nuestra colección para evitar que otras naciones matan a estos pobres animales y plantas." #NT!
 academics.2201.g: "¡Una colección digna!" #NT!
  
 academics.2202.t: "No logramos reunir más espécimen que [ROOT.Var('je_specimen_rival_nation_var').GetCountry.GetName]" #NT!
 academics.2202.d: "No pudimos expandir nuestra colección de muestras más allá de nuestros rivales en [ROOT.Var('je_specimen_rival_nation_var').GetCountry.GetName]. Los miembros del [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] están absolutamente aplastados." #NT!
 academics.2202.f: "Ahora también encontraron el animal más fascinante del mundo. Un lagarto volador. Lo nombraron después del Presidente de la Academia de Ciencias. Fallaste. \ N \ nthe [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #NT!
 academics.2202.g: "¡Nunca me recuperaré de esto científicamente!" #NT!
  
 academics.2203.t: "El [ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName] quiere [SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] para nuestro zoológico" #NT!
 academics.2203.d: "El [ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName] solicitó a nuestro gobierno que adquiriera [SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] para nuestro [concept_dubois_zoo] en 10 años." #NT!
 academics.2203.f: "Hay un [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animal$')] que falta nuestro zoológico. Necesitamos que nuestro gobierno encuentre [SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] y lo traiga a nuestro zoológico. No podemos permitir que nuestro zoológico no tenga este animal maravilloso después de todo. \ N \ nsigned, los representantes del [ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName]" #NT!
 academics.2203_goal_tt: "Tendrá que adquirir un [GetPlayer.MakeScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] para nuestro [concept_dubois_zoo] en 10 años." #NT!
 academics.2203_reward_tt: "Como recompensa, [GetPlayer.MakeScope.Var('academics_mission_interest_group_var').GetInterestGroup.GetName] obtendrá la aprobación #p 5#! de su gobierno y #p 5%#! más atracción pop y su país obtendrá #p 5%#! más prestigio durante 5 años." #NT!
 academics.2203.g: "¡Tengo que atraparlos a todos!" #NT!
 academics.2203.h: "Estoy liderando una gran nación. ¡No tengo tratos con un zoológico!" #NT!
  
 je_academics_get_exotic_animal: "Centrarse en el naturalismo: adquirir [GetPlayer.MakeScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] para nuestro zoológico" #NT!
 je_academics_get_exotic_animal_reason: "El [ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName] quiere que adquiramos [SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] para nuestro [concept_dubois_zoo]. \ N. Hay varias formas de adquirir tal [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animal$')]." #NT!
  
 academics.2204.t: "Un nuevo hogar para [SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')]" #NT!
 academics.2204.d: "Hemos logrado adquirir [SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] para nuestro [concept_dubois_zoo]. Esto seguramente hará feliz el [ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName]." #NT!
 academics.2204.f: "Su gobierno adquirió con éxito [SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] para nuestro glorioso país. Esto muestra que nuestro país es lo suficientemente poderoso como para gastar sus resonaciones en la diversión de nuestra población. Gracias! \ N \ nsigned, los representantes del [ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName]" #NT!
 academics.2204.g: "¡Un animal maravilloso!" #NT!
  
 academics.2205.t: "No hay animal nuevo en nuestro zoológico" #NT!
 academics.2205.d: "No pudimos adquirir [SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] para nuestro zoológico. El [ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName] no se divertirá." #NT!
 academics.2205.f: "Ni siquiera puedes adquirir un animal para nuestro zoológico. ¿Cómo debemos confiar en usted para guiar a este país? \ N \ nsigned, los representantes del [ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName]" #NT!
 academics.2205.g: "¡No tenemos tiempo para algunos animales al azar!" #NT!
  
 academics_exotic_animal_acquired_ig_modifier: "Animal exótico adquirido" #NT!
 academics_exotic_animal_not_acquired_ig_modifier: "Animal exótico no adquirido" #NT!
 academics_exotic_animal_acquired_country_modifier: "Animal exótico adquirido" #NT!
  
 academics.2206.t: "None" #NT!
 academics.2206.d: "Los éxitos científicos anteriores en el campo de la investigación natural pueden describirse como escasos. Por lo tanto, algunos representantes científicos influyentes han recurrido al gobierno con una petición." #NT!
 academics.2206.f: "Para fortalecer la investigación biológica en la investigación general y zoológica en particular, es esencial un zoológico con una colección de animales raros. Tal instalación también mejoraría en gran medida el bienestar de la población. Por lo tanto, el [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] sugiere que todos los medios deben usarse para establecer un zoológico nacional y también ayudarían en la capacitación de un zoólogo enérgico. \ N \ nsigned, el consejo del [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #NT!
 academics.2206.g: "Ciertamente se pueden encontrar algunos animales." #NT!
 academics.2206.h: "¿Estas personas no tienen a nadie más para molestar?" #NT!
 academics.2207.t: "El nuevo zoológico" #NT!
 academics.2207.d: "Algunos representantes de la sociedad científica asistieron personalmente a la inauguración del nuevo zoológico." #NT!
 academics.2207.f: "Excelente, realmente excelente el nuevo zoológico. Los miembros han tenido un día maravilloso y están particularmente contentos con la comida gratuita para mascotas. Esperamos que esto solo sea un comienzo, y que el zoológico que acaba de abrir pronto se expandirá y llena de criaturas más preciosas, exóticas y maravillosas." #NT!
 academics.2207.g: "¡Déjame algunos maní!" #NT!
 academics.2208.t: "No zoológico" #NT!
 academics.2208.d: "El [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] escribió una carta amarga hoy quejándose de que el deseo de un nuevo zoológico no se ha cumplido." #NT!
 academics.2208.f: "Para nuestro gran arrepentimiento, hemos descubierto que el gobierno actual parece estar compuesto por enemigos directos de la ciencia, de biología en general y de zoología en particular, o al menos un grupo de enemigos de animales inhumanos. Quizás en un entorno de este tipo, los magníficos animales se desperdiciarían en vano. \ N \ nsigned, el consejo del [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #NT!
 academics.2208.g: "Si eres terco, ciertamente no obtendrás ningún deseo cumplido." #NT!
  
 academics.2206_goal_tt: "Tendrá que recolectar #p 5#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] y construir un [concept_dubois_zoo] en #n 5#! años." #NT!
 academics.2206_reward_tt: "Como recompensa, nuestro naturalista obtendrá #p 50 experiencia#! Si aún no tenemos un naturalista, obtendremos uno." #NT!
  
 academics.2209.t: "Ampliación del zoológico" #NT!
 academics.2209.d: "Una carta abierta del [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] lamenta el hecho de que el zoológico nacional ofrece poca variedad." #NT!
 academics.2209.f: "Aunque nuestra ciudad capital ahora tiene una instalación de zoológico que ofrece científicos para que los científicos estudien animales y para el público que paga, esta instalación apenas ha alcanzado el estándar digno del tamaño de la ciudad y nuestra importancia nacional. Para aumentar el prestigio, entretener a la población y avanzar en la ciencia, por lo tanto, recomendamos expandir el zoológico actual a al menos uno de tamaño mediano. \ N \ nsigned, el consejo del [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #NT!
 academics.2209.g: "¡Trae más animales!" #NT!
 academics.2209.h: "Tenemos mejores cosas que hacer." #NT!
 academics.2210.t: "Un zoológico aún más grande" #NT!
 academics.2210.d: "Una carta abierta del [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] lamenta el hecho de que el zoológico nacional ofrece poca variedad." #NT!
 academics.2210.f: "Aunque hemos permitido que nuestro zoológico crezca en un tamaño respetable en el pasado, aún no disfruta de la importancia internacional que podría y debería tener para impresionar a otras naciones con nuestra pasión zoológica. Necesitamos más y más animales exóticos. No solo la ciencia está en juego aquí, sino también nuestro prestigio. Asesoramos encarecidamente la actualización de nuestro zoológico a un gran zoológico. \ N \ nsigned, el consejo del [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #NT!
 academics.2211.t: "Un próspero jardín zoológico" #NT!
 academics.2211.d: "El jardín zoológico ampliado es una de las principales atracciones de la capital y es muy popular entre los académicos y los ciudadanos comunes por igual. La Sociedad Científica se complace en notar que su deseo ha sido otorgado." #NT!
 academics.2211.f: "¡Bien hecho! El nuevo zoológico es más espacioso y cumple con el requisito de representar un espectro más amplio del mundo animal del mundo. Espero que también hayas pensado en un ornitorrinco. Nos gustaría hacerse cargo de un patrocinio para ello. ¿Se llama Perry? \ N \ nsigned, el consejo del [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #NT!
 academics.2211.g: "¡Los animales del mundo en nuestro hogar!" #NT!
 academics.2212.t: "Decepción zoológica" #NT!
 academics.2212.d: "La sociedad científica se pregunta si preguntar al gobierno todavía vale la pena cuando sus preocupaciones se pisotean de tal manera como la pequeña solicitud de algunos animales zoológicos." #NT!
 academics.2212.f: "Estamos muy, muy decepcionados. \ N \ nsigned, el consejo del [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #NT!
 academics.2212.g: "Deberían investigar en lugar de divertirse en el zoológico." #NT!
  
 academics.2209_goal_tt: "Tendrá que ampliar su [concept_dubois_zoo] a #p tamaño 3#! (zoológico de tamaño mediano) en #n 10#! años." #NT!
 academics.2210_goal_tt: "Tendrá que ampliar su [concept_dubois_zoo] a #p tamaño 4#! (zoológico grande) en #n 10#! años." #NT!
 academics.2209_reward_tt: "Como recompensa, nuestro naturalista obtendrá #p 50 experiencia#! Si aún no tenemos un naturalista, obtendremos uno." #NT!
  
 je_academics_found_zoo: "Centrarse en el naturalismo: encontré un zoológico" #NT!
 je_academics_found_zoo_reason: "None" #NT!
 je_academics_medium_zoo: "None" #NT!
 je_academics_medium_zoo_reason: "El [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] ha solicitado una extensión del [concept_dubois_zoo] Tenemos un total de diez años para actualizar nuestro zoológico a un #p zoo#!. de tamaño mediano esto reclaza más [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')], que puede ser atrapado por un [concept_dubois_naturalist] en una expedición zoológica local o una Heia Safari. Los animales también se pueden comprar en otros países." #NT!
 je_academics_large_zoo: "Centrarse en el naturalismo: ampliar el zoológico" #NT!
 je_academics_large_zoo_reason: "El [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] ha solicitado una extensión del [concept_dubois_zoo] Tenemos un total de diez años para actualizar nuestro zoológico a un #p grande zoo#!. Esto reclaza más [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')], que puede ser atrapado por un [concept_dubois_naturalist] en una expedición zoológica local o una Heia Safari. Los animales también se pueden comprar en otros países." #NT!
  
 academics.2300.t: "Necesitamos encontrar más fósiles que [SCOPE.sCountry('rival_scope').GetName]" #NT!
 academics.2300.d: "Nos falta suficiente [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] para una colección más grande que [SCOPE.sCountry('rival_scope').GetName]. Por lo tanto, el [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] quiere que encontremos más fósiles #b#! en total que [SCOPE.sCountry('rival_scope').GetName]. Seguramente lo apreciarían mucho si pudiéramos vencer a este rival." #NT!
 academics.2300.f: "Si bien nuestros rivales en [SCOPE.sCountry('rival_scope').GetName] tienen varios fósiles de diferentes edades y lugares del mundo, los nuestros son bastante limitados tanto en el marco de tiempo como en el marco geográfico. Esta es una gran vergüenza e inaccesible para una nación tan grande como la nuestra. \ NVE necesita expandir nuestra colección fósil de inmediato! \ N \ nsigned, los miembros del [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #NT!
 academics.2300_goal_tt: "Tendrá que reunir más [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] que su rival, [SCOPE.sCountry('rival_scope').GetName], en #n 10#! años. Tienen [GetPlayer.MakeScope.Var('je_fossil_rival_nation_var').GetVariable('dubois_fossil').GetValue|0+], tenemos [GetPlayer.MakeScope.Var('dubois_fossil').GetValue|0+]." #NT!
 academics.2300_reward_tt: "Como recompensa, la inteligencia obtendrá #p 5 aprobación#! y obtendrá #p 10%#! más prestigio durante 4 años." #NT!
 academics.2300.g: "¡Ah, una disputa fósil!" #NT!
 academics.2300.h: "No necesitamos ninguna roca polvorienta ..." #NT!
  
 academics_no_competition_with_rival_fossils: "Perdió la disputa fósil" #NT!
 academics_competition_with_rival_won_fossils: "Ganó la disputa fósil" #NT!
  
 je_academics_rivalry_for_fossils: "Centrarse en la paleontología: la disputa fósil" #NT!
 je_academics_rivalry_for_fossils_reason: "El [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] quiere que recolectemos más [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] que nuestro rival [SCOPE.sCountry('target').GetName]. \ N \ nour #b fósiles totales#!: [ROOT.Var('dubois_fossil').GetValue|0+] \ n[SCOPE.sCountry('target').GetName] #b fósiles totales#!: [ROOT.Var('je_fossil_rival_nation_var').GetVariable('dubois_fossil').GetValue|0+]" #NT!
 je_academics_rivalry_for_fossils_success: "Usted ([GetPlayer.MakeScope.Var('dubois_fossil').GetValue|0+]) tiene más [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] que [SCOPE.sCountry('target').GetName] ([GetPlayer.MakeScope.Var('je_fossil_rival_nation_var').GetVariable('dubois_fossil').GetValue|0+])." #NT!
  
 academics.2301.t: "Fantástica colección fósil" #NT!
 academics.2301.d_rival: "Hemos reunido una colección más grande de [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] que nuestro rival [ROOT.Var('je_fossil_rival_nation_var').GetCountry.GetName]. ¡El [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] y nuestra población están entusiasmados con esta victoria de nuestra nación!" #NT!
 academics.2301.d_rival_gone: "Nuestro rival en nuestra búsqueda de una gran colección fósil se ha ido. ¡El [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] y nuestra población están entusiasmados con esta victoria de nuestra nación!" #NT!
 academics.2301.f: "Desde el principio estaba claro que necesitábamos una colección fósil más grande que nuestro rival. Ahora que recolectamos tantos fósiles del Cámbrico hasta el Cuaternario y de América a las Islas del Pacífico, ¡tenemos una colección digna! Obviamente, este debería haber sido el caso hace años, y deberíamos exigir esta colección aún más. Por el momento, la situación es \ "lo suficientemente buena \", como dicen los campesinos. \ N \ nsigned, los miembros del [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #NT!
 academics.2301.g: "¡Esto pone fin a esta disputa!" #NT!
  
 academics.2302.t: "No logramos reunir más fósiles que [ROOT.Var('je_fossil_rival_nation_var').GetCountry.GetName]" #NT!
 academics.2302.d: "No pudimos expandir nuestra colección fósil más allá de nuestros rivales en [ROOT.Var('je_fossil_rival_nation_var').GetCountry.GetName]. Los miembros del [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] no se divierten." #NT!
 academics.2302.f: "Su colección abarca eones, tienen todo y tenemos algunas rocas polvorientas con fósiles muy visibles ... es horrible. ¡Este es un momento vergonzoso para nuestra nación! Asqueroso. \ N \ nthe [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #NT!
 academics.2302.g: "De todos modos no necesito viejas rocas ..." #NT!
  
