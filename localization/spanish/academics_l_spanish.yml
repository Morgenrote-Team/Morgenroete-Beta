  ###################ARCHAEOLOGICAL MISSIONS################## 
  
 academics.2101.t: "El [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] exige un museo" #NT!
 academics.2101.d: "Como una de las naciones más poderosas del mundo, hasta ahora nos ha faltado ningún prestigio arqueológico. Por lo tanto, el [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] nos pide que construyamos un museo arqueológico." #NT!
 academics.2101.f: "El [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] le pide que aumente su compromiso con la arqueología. Explorar el pasado, descubrir culturas olvidadas y recuperar artefactos valiosos es de suma importancia para la ciencia, así como el prestigio nacional. Por lo tanto, le pedimos que haya encontrado un museo arqueológico para aumentar, impartir y preservar el conocimiento y las excelentes obras de arte de culturas pasadas." #NT!
 academics.2101.g: "¡Iremos a la búsqueda del tesoro!" #NT!
 academics.2101.h: "No hay necesidad de un museo polvoriento." #NT!
 academics.2101_goal_tt: "Tendrá que recolectar #p 5#! [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] y construir un museo arqueológico en #n 10#! años." #NT!
 academics.2102.t: "Inauguración del museo arqueológico" #NT!
 academics.2102.d: "Los representantes del [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] parecían estar muy satisfechos en la apertura del Museo Arqueológico hoy." #NT!
 academics.2102.f: "El [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] está encantado de saber que el nuevo museo se ha abierto al público y que numerosos ciudadanos ahora pueden disfrutar de los artefactos encontrados. También son de gran valor científico. Sin embargo, dado que esto solo puede ser un comienzo, ya hemos organizado con el director del museo que debe recordar la futura adquisición de artefactos. Él es, por supuesto, también miembro de nuestra sociedad. \ N \ nsigned, el consejo del [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #NT!
 academics.2102.g: "Ahora necesitamos algo más que pertenezca allí ..." #NT!
 academics.2103.t: "Una vergüenza arqueológica" #NT!
 academics.2103.d: "Para consternación del [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')], se observó hoy que a pesar de la promesa de promover la arqueología del país, no se ha hecho ningún esfuerzo en esta dirección." #NT!
 academics.2103.f: "Nosotros, los miembros del [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')], estamos profundamente decepcionados por la ignorancia del gobierno. ¿Un pequeño museo realmente pregunta? \ N \ nsigned, los miembros del [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #NT!
 academics.2103.g: "¿Quién necesita ese museo polvoriento de todos modos?" #NT!
  
 academics.2104.t: "El director del museo sugiere una exposición egipcia" #NT!
 academics.2105.t: "El director del museo sugiere una exposición mesopotámica" #NT!
 academics.2106.t: "El director del museo sugiere una exposición Egeo" #NT!
 academics.2107.t: "El director del museo sugiere una exhbición precolombina" #NT!
 academics.2104.d: "El director del Museo Arqueológico ha advertido que nuestro museo podría quedarse atrás en comparación internacional si no reunimos urgentemente artefactos faltantes en una exposición." #NT!
 academics.2104.f: "Como miembro orgulloso del [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')], lamento la negligencia de nuestro hermoso museo. El mundo entero recopila artefactos egipcios, recientemente escuché sobre la estatua de Bastet felino del extranjero. ¡La última locura absoluta, te lo digo! Se supone que también es rosa, escuché. Y ni siquiera tenemos suficientes escarabajos para organizar una exposición adecuada. Si no recolectamos al menos suficientes artefactos para una exposición de tamaño mediano pronto, soy pesimista sobre el futuro de la arqueología en nuestro país." #NT!
 academics.2105.f: "Como miembro ardiente del [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')], lamento la negligencia de nuestro respetado museo. Los artefactos mesopotámicos están de moda en estos días, y las grandes naciones no pueden tener suficiente de ellas. Por supuesto, creo que el tamaño de un Lamassu no determina su valor, sino lo que haces con él. Sin embargo, ni siquiera tenemos suficientes tabletas cuneiformes para organizar una exposición adecuada. Si no recolectamos al menos suficientes artefactos para una exposición de tamaño mediano pronto, soy pesimista sobre el futuro de la arqueología en nuestro país." #NT!
 academics.2106.f: "Como miembro importante del [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')], lamento la negligencia de nuestro orgulloso museo. Los artefactos del Egeo se venden como Hotcakes, esa es la experiencia de los últimos años. Las epopeyas homéricas se han convertido en una cultura popular desde que Troya fue redescubierta, y cada riqueza de Nouveau ahora tiene una estatua antigua en su jardín. ¿Y nosotros? ¡Ni siquiera tenemos algunos artículos viles de tumbas micénicas para mostrar! Si no recolectamos al menos suficientes artefactos para una exposición de tamaño mediano pronto, soy pesimista sobre el futuro de la arqueología en nuestro país." #NT!
 academics.2107.f: "Como hermoso miembro del [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')], lamento la negligencia de nuestro importante museo. El mayismo ya no conoce ninguna fronteras. Los miembros esotéricos de nuestra sociedad gastan mucho dinero para obtener las piezas más exóticas de América Central y del Sur. El robo grave y la destrucción de valiosos activos históricos están en pleno apogeo. ¡Escuché que un líder de la expedición incluso quería mover las pirámides de Tikal! Nosotros, por otro lado, ni siquiera tenemos algunas máscaras de piedra ocultas para asustar a los niños en el museo. Si no recolectamos al menos suficientes artefactos para una exposición de tamaño mediano pronto, soy pesimista sobre el futuro de la arqueología en nuestro país." #NT!
 academics.2104.g: "Fortuna y gloria!" #NT!
 academics.2104.h: "Tenemos mejores cosas que hacer que la búsqueda del tesoro." #NT!
 academics.2108.t: "Una nueva colección arqueológica" #NT!
 academics.2108.d: "El director del museo ha expresado su deleite de que sus preocupaciones sobre los nuevos artefactos se han escuchado y ha informado a sus amigos en el [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] que el museo pronto organizará una nueva exposición." #NT!
 academics.2108.f: "La firma agradece al gobierno por ayudar a aumentar la reputación científica de la nación. Los numerosos nuevos artefactos son una expresión del arte de la investigación del arte y la incansable de los mejores hombres y mujeres de este país." #NT!
 academics.2108.g: "¡Éxito!" #NT!
 academics.2109.t: "Decepción arqueológica" #NT!
 academics.2109.d: "Golpeado, consternado y conmocionado por la negación de sus preocupaciones urgentes, el director del museo se retiró a su oficina, llorando, cerrado y negado a hablar con cualquiera." #NT!
 academics.2109.f: "Bien hecho, bien hecho. La última vez que el director del museo estuvo en este estado, casi se arrojó por la ventana. Es realmente insensible la forma en que algunos funcionarios del gobierno están actuando. Solo quería algunos artefactos. Algunos pequeños artefactos sucios. ¡No tiene nada en el mundo sino algunas estatuillas polvorientas y jarrones rotos! Espero que estés feliz ahora. El pobre hombre está devastado. \ N \ nsigned, los miembros del [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] "" #NT!
 academics.2109.g: "Falla ..." #NT!
 academics.2104_goal_tt: "Tendrá que recolectar #p 25#! egipcio [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] en #n 15#! años." #NT!
 academics.2105_goal_tt: "Tendrá que recolectar #p 25#! mesopotámico [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] en #n 15#! años." #NT!
 academics.2106_goal_tt: "Tendrá que recolectar #p 25#! Aegean [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] en #n 15#! años." #NT!
 academics.2107_goal_tt: "Tendrá que recolectar #p 25#! precolombiano [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] en #n 15#! años." #NT!
  
 je_academics_found_archaeological_museum: "Enfoque en la arqueología: encontró un museo" #NT!
 je_academics_found_archaeological_museum_reason: "El [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] quiere que construamos un museo arqueológico para mejorar el conocimiento, pero también el nivel de vida de nuestros intelectuales. La construcción de un museo requiere #p 5#! [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')], que debe ser encontrado por un [concept_lepsius_archaeologist] en un [concept_lepsius_expedition], si no tenemos la escandalosa suerte de adquirirlos a través de un regalo aleatorio o una excavación local. No tendría mucho sentido sin un museo real. \ n \ nin Fact, sería bastante vergonzoso." #NT!
  
 je_academics_egyptian_artifacts: "Enfoque en la arqueología: artefactos egipcios" #NT!
