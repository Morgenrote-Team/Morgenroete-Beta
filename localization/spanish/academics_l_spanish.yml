 academics.2104_reward_tt: "Como recompensa, obtendremos #p 5% prestigio#! durante 5 años, además el [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName] obtendrá la aprobación #p 5 #p 5% #! durante 3 años. Nuestro arqueólogo obtendrá #p 15 experiencia#!." #NT!
 academics.2110_reward_tt: "Como recompensa, obtendremos #p 5% prestigio#! durante 5 años, además el [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName] obtendrá la aprobación #p 5 y el costo de la tecnología de producción se reducirá en #p 5% #!. Nuestro arqueólogo obtendrá #p 25 Experience#!." #NT!
 academics.2112_reward_tt: "Como recompensa, obtendremos #p 10% prestigio#! durante 5 años, además el [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName] obtendrá la aprobación #p 5 #p 5% #!. Nuestra gente también disfrutará #p 1 estándar de vida#! más. Nuestro arqueólogo obtendrá #p 50 experiencia#!" #NT!
 academics.2309.t: "La ambición de [SCOPE.sCharacter('dubois_paleontologist_scope').GetFullName]" #NT!
 academics.2309.d: "El profesor [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] se considera una referencia nacional en el campo paleontológico. La Sociedad Científica desea hacer de [SCOPE.sCharacter('dubois_paleontologist_scope').GetHerHim] una personalidad solicitada internacionalmente para usar [SCOPE.sCharacter('dubois_paleontologist_scope').GetHerHim] como figura de figura académica." #NT!
 academics.2309.f: "Hemos llegado a la firma conclusión de que nuestro colega, el Prof. [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastNameNoFormatting], sería ideal para representar a nuestra nación como una ubicación científica. [SCOPE.sCharacter('dubois_paleontologist_scope').GetSheHe] debe recibir todos los soportes posibles para aumentar la reputación [SCOPE.sCharacter('dubois_paleontologist_scope').GetHerHim]. Esto motivaría a los jóvenes en particular a seguir una carrera científica ellos mismos." #NT!
 academics.2309.g: "[SCOPE.sCharacter('dubois_paleontologist_scope').GetSheHe] se hará famoso." #NT!
 academics.2309.h: "[SCOPE.sCharacter('dubois_paleontologist_scope').GetSheHe] no debería convertirse en megalómano." #NT!
 academics.2310.t: "Gloria paleontológica" #NT!
 academics.2310.d: "Con [SCOPE.sCharacter('dubois_paleontologist_scope').GetHerHis] ascender a la fama como paleontólogo, [SCOPE.sCharacter('dubois_paleontologist_scope').GetFullName] es ahora el figura científica que la sociedad científica quería." #NT!
 academics.2310.f: "Ahora estamos recibiendo muchos estudiantes nuevos inspirados en la grandeza y la fama del profesor [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastNameNoFormatting]. [SCOPE.sCharacter('dubois_paleontologist_scope').GetSheHe] no solo vitalizó el sujeto [SCOPE.sCharacter('dubois_paleontologist_scope').GetHerHis], sino que también despertó fundamentalmente una fascinación por las ciencias. Ser científico no es más que una carrera extraña con pocas perspectivas, sino un trabajo emocionante que promete fama y aventura. \ N \ nsigned, los miembros del [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #NT!
  
