 ademics_no_dinosaur_modifier: "Sin dinosaurio" #NT!
 academics.2303_goal_tt: "Construcción #G 1#! [concept_dubois_dinosaur_skeleton]" #NT!
 academics.2303_reward_tt: "Como recompensa, la inteligencia obtendrá #p 5 aprobación#! y obtendrá #p 5%#! más prestigio durante 4 años. También obtendremos una inversión en tecnología media." #NT!
  
 je_academics_giant_of_the_past: "Enfoque paleontológico: gigante del pasado" #NT!
 je_academics_giant_of_the_past_reason: "El [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] ha pedido recolectar [concept_dubois_dinosaur_bone,'$concept_dubois_dinosaur_bones$] y reconstruir un [concept_dubois_dinosaur_skeleton]. En qué condición se encuentra en la que se encuentra, lo principal es que tenemos una pieza opulenta en nuestra colección. Los huesos de dinosaurio se encuentran en excelentes formaciones. Si no tenemos uno en nuestro territorio, un [concept_dubois_paleontological_licence] sería ventajoso para que nuestro paleontólogo pueda buscar en el extranjero." #NT!
  
 academics.2303.t: "Gigante del pasado" #NT!
 academics.2303.d: "Algunos científicos principales han lamentado que a pesar de nuestros avances paleontológicos, aún no hemos mostrado un esqueleto de dinosaurio completo. Nuestra sociedad científica también ha lamentado profundamente esta desafortunada situación en una carta y le gustaría ver esta situación remediada." #NT!
 academics.2303.f: "Queremos un dinosaurio, y lo queremos ahora! \ N \ nsigned, los miembros del [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #NT!
 academics.2303.g: "¡Una excelente iniciativa!" #NT!
 academics.2303.h: "Este no es un parque de diversiones para los niños pequeños, sino un instituto científico." #NT!
 academics.2304.t: "El terrible lagarto" #NT!
 academics.2304.d: "El nuevo dinosaurio es la pieza más espectacular de la colección paleontológica. Todos los días nuevos visitantes acuden a la exposición para ver el esqueleto." #NT!
 academics.2304.f: "¿Podemos tener otro? \ N \ nsigned, los miembros del [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #NT!
 academics.2304.g: "Nuestro propio dinosaurio!" #NT!
 academics.2305.t: "Sin lagarto" #NT!
 academics.2305.d: "La plataforma reservada para el esqueleto de dinosaurio planificado permanece vacía. La sociedad científica reaccionó a esto con gran irritación." #NT!
 academics.2305.f: "¿Necesitamos ser aún más claros? \ N \ nsigned, los miembros del [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #NT!
 academics.2305.g: "¡Encuentra otro juguete!" #NT!
  
 academics.2306_goal_tt: "Encontrar #G 3#! #O fósiles especiales#!" #NT!
 academics.2306_reward_tt: "Como recompensa, nuestro [concept_dubois_paleontologist] obtendrá #p 50 experiencia#! si aún no tenemos un [concept_dubois_paleontologist], obtendremos uno. También obtendremos una gran inversión tecnológica." #NT!
  
 je_academics_special_fossils: "Enfoque paleontológico: fósiles especiales" #NT!
 je_academics_special_fossils_reason: "Los fósiles especiales son fósiles únicos que se tratan por separado debido a su estado excepcional. Estos incluyen formas de transición como Archaeopteryx o Ichthyostega, pero también grandes especies de mamíferos extintos, como el Megatherium gigante de la pereza o el Ichthyosaurus similar a los delfines. Pero los fósiles más pequeños que se utilizan para definir una era, los más conocidos son los amonitas y los trilobites, también pertenecen a esta categoría. En total, hay una docena de fósiles especiales que se pueden encontrar no solo en formaciones sino también en expediciones científicas." #NT!
 je_academics_special_fossils_success: "Encontrar #G 3#! #O fósiles especiales#!" #NT!
  
 academics.2306.t: "Fósiles extraordinarios" #NT!
 academics.2306.d: "La Sociedad Científica tiene una solicitud extraordinaria de nosotros con respecto a fósiles extraordinarios." #NT!
 academics.2306.f: "La historia de la ascendencia animal es un secreto de la naturaleza que nuestros investigadores revelan un poco más cada día. Las formas que juegan un papel especial que se encuentran en los umbrales entre las especies, los llamados 'enlaces faltantes'. Al mismo tiempo, hay criaturas extraordinarias en nuestro planeta que no tienen que ser dinosaurios para impresionar: mamíferos extintos como tigres dientes de sable o perezosos gigantes. Si recolectamos al menos 3 fósiles especiales, podríamos fortalecer aún más la reputación de nuestro instituto en el mundo. \ N \ nsigned, los miembros del [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #NT!
 academics.2306.g: "Fossisls especiales para una colección especial." #NT!
 academics.2306.h: "¿No podemos enfocar nuestras capacidades científicas en algo más significativo?" #NT!
 academics.2307.t: "Colección fósil asombrosa" #NT!
 academics.2307.d: "No hay duda de que el Instituto Nacional Paleontológico tiene una de las colecciones internacionales más importantes. Apenas hay lugar comparable con piezas tan extraordinarias." #NT!
 academics.2307.f: "Los fósiles especiales no siempre son tan impresionantes como uno podría pensar primero, pero tienen un gran valor científico. Por lo tanto, la Sociedad Científica envió una carta de agradecimiento. Habrá una exposición especial en los próximos días." #NT!
 academics.2307.g: "Magnífico." #NT!
 academics.2308.t: "Decepción especial" #NT!
 academics.2308.d: "La Sociedad Científica ha expresado su consternación por el último fracaso paleontológico." #NT!
 academics.2308.f: "Es una tragedia nacional que las preocupaciones de historia natural del país se ignoran por completo. La investigación paleontológica se descarta como sin sentido sobre las aves y la lagartijas muertas, los pagos de apoyo por expediciones especiales rara vez se realizan e incluso se ignoran los deseos más pequeños. J'Accuse! \ N \ nsigned, los miembros del [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #NT!
 academics.2308.g: "Oh querido." #NT!
  
 ademics_no_paleontological_hero_modifier: "Ningún héroe de paleontología" #NT!
  
 academics.2309_goal_tt: "Tener un #o famosa#! [concept_dubois_paleontologist]" #NT!
 academics.2309_reward_tt: "Como recompensa, ganaremos #p 120#! [concept_academics_progress]." #NT!
  
 je_academics_famous_paleontologist: "Enfoque paleontológico: paleontólogo famoso" #NT!
 je_academics_famous_paleontologist_reason: "El aumento de un [concept_dubois_paleontologist] está acompañado por la mejora de su experiencia. Como todos los académicos, un paleontólogo recibe 5 puntos de experiencia anualmente. Obtiene experiencia adicional en una exitosa investigación paleontológica de formaciones. Además, se puede usar un paleontólogo en expediciones de montañismo y expediciones del Pacífico. Construir con éxito y reensamblar esqueletos de dinosaurios también ayuda a mejorar la experiencia de un paleontólogo." #NT!
  
 academics.2310.g: "Una inspiración para los jóvenes." #NT!
 academics.2311.t: "Ningún héroe de paleontología" #NT!
 academics.2311.d: "Por alguna razón, no hemos podido promover a un paleontólogo y dejar que alcance la fama mundial." #NT!
 academics.2311.f: "Desafortunadamente, el fracaso ha significado que las disciplinas científicas continúen siendo descartadas como sujetos de orquídeas y el entusiasmo por el estudio académico y la entrada en el servicio de investigación activa es limitado. Los miembros del [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] sienten la insatisfacción en las conversaciones. La élite intelectual culpa al gobierno por esta situación." #NT!
 academics.2311.g: "Decepcionante." #NT!
  
 academics_splendid_dinosaur_collection_modifier: "Colección de dinosaurios espléndidos" #NT!
  
 academics.2312_goal_tt: "Tener una calificación de dinosaurio #o#! de al menos #G 5 #!" #NT!
 academics.2312_reward_tt: "Como recompensa, la inteligencia obtendrá #p 5 aprobación#!. Además, obtendrá #p 10%#! más prestigio y el costo para la tecnología de la sociedad se reducirá con #p 5%#! durante 10 años." #NT!
  
 je_academics_dinosaur_rating: "Enfoque paleontológico: calificación de dinosaurios" #NT!
 je_academics_dinosaur_rating_reason: "Para mejorar la calificación de dinosaurios #O#!, no solo se necesitan nuevos esqueletos de dinosaurios, sino también una reconstrucción perfecta de ellos. Esto puede llevar años. Por lo tanto, el [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] ha decidido no establecer un límite de tiempo." #NT!
 je_academics_dinosaur_rating_success: "Tener una calificación de dinosaurio #o#! de al menos #G 5 #!" #NT!
  
 academics.2312.t: "El esplendor de la paleontología" #NT!
 academics.2312.d: "La rama paleontológica de nuestra investigación científica ya tiene una buena reputación. Ahora es el momento de darlo a conocer en todo el mundo mejorando significativamente nuestra exposición de dinosaurios." #NT!
 academics.2312.f: "Es posible que nos gustaría mostrar un dinosaurio diferente en nuestra exposición. Un mayor número de esqueletos no solo beneficiaría a la investigación científica, sino también a nuestra reputación nacional. El mundo entero está cavando para huesos de dinosaurios y está fascinado por la prehistoria previamente desconocida. No debería ser solo sobre la cantidad, sino también de la calidad. Deberíamos apuntar a ser el favorito en la reconstrucción del esqueleto de dinosaurio. \ N \ nsigned, los miembros del [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #NT!
 academics.2312.g: "¡Esta será una empresa colosal!" #NT!
 academics.2312.h: "No esta tontería paleontológica otra vez." #NT!
 academics.2313.t: "Una colección espléndida" #NT!
 academics.2313.d: "La Sociedad Científica se enorgulleció de anunciar hoy una exposición especial de esqueletos de dinosaurios." #NT!
 academics.2313.f: "Estamos profundamente en deuda con el gobierno por finalmente tener una colección de dinosaurios que subraya el alto nivel de investigación paleontológica en nuestra nación. Apenas hay colecciones más exquisitas que esta. Tomó mucho trabajo y esfuerzo, así como una sed de investigación y persistencia. La sociedad puede ver este trabajo con orgullo, mientras que en el extranjero lo mira con envidia. Caballero: ¡Este es un gran día para la ciencia en general y la paleontología en particular! \ N \ nsigned, los miembros del [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #NT!
 academics.2313.g: "¡Maravilloso!" #NT!
  
  ### 2.0.2 ### 
  
