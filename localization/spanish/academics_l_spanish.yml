 academics.1010.t: "Estudiar mujeres?" #NT!
 academics.1010.d: "Algunas mujeres solicitaron estudiar en una de nuestras universidades. Ahora la pregunta surgió si es legal para ellos estudiar y cuál es la postura oficial de nuestros gobiernos en estudiar a las mujeres." #NT!
 academics.1010.f: "\ "¡Los cerebros de las mujeres no están hechos para pensamientos lógicos sino para emociones." #NT!
 academics.1010.g: "¡Déjalos estudiar!" #NT!
 academics.1010.h: "Espera, ¿no pudieron estudiar hasta ahora?" #NT!
 academics.1010.i: "¡Las mujeres pertenecen al hogar!" #NT!
  
 academics.1011.t: "Una brillante científica" #NT!
 academics.1011.d: "[SCOPE.sCharacter('academics_female_scientist').GetFullName] se graduó en la parte superior de su clase en una de nuestras universidades. En un campo dominado por hombres, pudo terminar sus estudios en tiempo récord y está ansiosa por comenzar a trabajar en su campo. Ella es una brillante ..." #NT!
 academics.1011.f: "¡Mi sincero felicitaciones para ti por tu increíble título! ¡Quién hubiera pensado que eso es posible para una mujer!" #NT!
 academics.1011.g: "...Ingeniero" #NT!
 academics.1011.h: "...Astrónomo" #NT!
 academics.1011.i: "...Naturalista" #NT!
 academics.1011.j: "...Paleontólogo" #NT!
 academics.1011.k: "...Arqueólogo" #NT!
 academics.1011.l: "...Antropólogo" #NT!
 academics.1011.m: "No la necesitamos." #NT!
  
