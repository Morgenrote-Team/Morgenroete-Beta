 MR_PROMOTING_ENGINEER_TT: "#T Promocione el ingeniero#!\n#p Actualmente está promoviendo al ingeniero .#!\n[Concept('concept_gaudi_engineer','$concept_gaudi_engineers$')] son técnicos versátiles en el ejército y en la construcción. También aceleran la construcción de monumentos en el doble de." #NT!
 MR_PROMOTING_ASTRONOMER_TT: "#T promover astrónomo#!\n#p Actualmente está promoviendo el astrónomo." #NT!
 MR_PROMOTING_NATURALIST_TT: "#T Promueve naturalist#!\n#p Actualmente está promoviendo el naturalista." #NT!
 MR_PROMOTING_PALEONTOLOGIST_TT: "#T promover paleontólogo#!\n#p Actualmente está promoviendo el paleontólogo." #NT!
 MR_PROMOTING_ARCHAEOLOGIST_TT: "#T promover arqueólogo#!\n#p Actualmente está promoviendo al arqueólogo." #NT!
 MR_PROMOTING_ANTHROPOLOGIST_TT: "#T promover antropólogo#!\n#p Actualmente está promoviendo el antropólogo." #NT!
 MR_ACADEMICS_INVESTMENT_ACTIVE_TT: "#T Inversión académica#!\n#p está invirtiendo en la academia. La financiación está programada durante 10 años." #NT!
 MR_PROMOTING_COMPOSER_TT: "#T Promocione composer#!\n#p Actualmente está promocionando el compositor.#!\n[Concept('concept_elgar_composer','$concept_elgar_composers$')] son necesarios para crear una cultura musical próspera. Ayudarán a un país a crear más [concept_elgar_musical_tradition]." #NT!
 MR_PROMOTING_WRITER_TT: "#T Promocione escritor#!\n#p Actualmente está promocionando al escritor.#!\n[Concept('concept_manzoni_writer','$concept_manzoni_writers$')] son maestros de narración de cuentos y trabajan en libros y otras literatura. Con su trabajo fortalecen a los países [concept_manzoni_literary_tradition]." #NT!
 MR_PROMOTING_PAINTER_TT: "#T Promocione pintor#!\n#p Actualmente está promoviendo el pintor. A través de sus obras maestras, fortalecen el [concept_klimt_painting_tradition] de un país." #NT!
  
 MR_AVANTGARDE_INTELLIGENTSIA_ACTIVE_TT: "#T Avantgarde Intelligentsia#!\n#p Avantgarde Intelligents es actualmente su enfoque científico activo .#!\nA La camarilla de académicos con ideas claras culturales, sociológicas y antropológicas determina la vida científica científica cotidiana. En contraste, los campos prácticos son de menor importancia. \ N#R nota#!: aumenta la apariencia de académicos por un punto por mes." #NT!
 MR_PRACTICAL_ACADEMIA_ACTIVE_TT: "#T Academia práctica#!\n#p Academia práctica es actualmente su enfoque científico activo. Esto es para servir al progreso general y la paz de la humanidad. \ N#p nota#!: aumenta la aparición de académicos por un punto por mes." #NT!
 MR_MILITARY_INDUSTRIAL_COMPLEX_ACTIVE_TT: "#T Complejo militar-industrial#!\n#p El complejo militar-industrial es actualmente su enfoque científico activo .#!\nCooperation entre industriales privados y los militares han llevado al desarrollo de una red de conexiones, lazos personales y conocidos personales, con un poco de corrupción, que puede describirse mejor como un complejo militar-industrial." #NT!
 MR_BUSINESS_AND_TYCOON_ACTIVE_TT: "#T Escuelas de negocios y magnate de simulacro de escuelas de negocios y el capitalismo de magnate es actualmente su enfoque científico activo .#!\nThe El individuo independiente combinado con un momento próspero de progreso ha llevado a una mentalidad en la que las escuelas comerciales, las empresas medianas y las grandes corporaciones tienen una influencia decisiva en la ciencia del país. Viceversa, las universidades trabajan para aumentar la prosperidad adquirida de la nación a través de nuevas tecnologías e impulsar ideas sociales a través del progreso." #NT!
 MR_SEA_POWER_AND_MERCHANT_ACTIVE_TT: "#T Sea Power & Merchant Marine#!\n#p Sea Power & Merchant Marine es actualmente su enfoque científico activo. Aumentar la prosperidad a través de la producción avanzada y el comercio global en nuestros productos es tan importante como defender lo que ya se ha ganado." #NT!
 MR_IVORY_TOWER_ACTIVE_TT: "#T Torre de marfil útil Útil#!\n#p La torre de marfil útil es actualmente su enfoque científico activo. Sin embargo, no se puede negar que el aislamiento de la Torre de Marfil de la sociedad también tiene sus ventajas. Sin perturbarse, muchos profesores trabajan mejor. \ N#p nota#!: aumenta la aparición de académicos por un punto por mes." #NT!
  
 MR_ON_PACIFIC_EXPEDITION_TT: "#T Pacific Expedition#!\n#p actualmente hay una expedición en curso del Pacífico. Los académicos de múltiples disciplinas científicas están interesados ​​en una misión de investigación para realizar estudios naturalistas, paleontológicos, astronómicos y oceanográficos. Nuevamente, para las grandes potencias podría ser un asunto prestigioso mostrar su influencia al final del mundo." #NT!
 MR_ON_NORTHWEST_EXPEDITION_TT: "#T El pasaje del noroeste#!\n#p actualmente hay una expedición en curso para encontrar el pasaje del noroeste. Un viejo sueño no se cumplió: el descubrimiento del pasaje del noroeste entre Canadá y el Océano Ártico. ¿Pero quién se atrevería a una expedición tan peligrosa?" #NT!
 MR_ON_ARCTICA_EXPEDITION_TT: "#T Zeppelin Expedition#!\n#p actualmente hay una expedición de Zeppelin en curso. Se fundó principalmente en la iniciativa del aeronáutico y luego al Secretario General de la Sociedad, Walther Bruns. El presidente fundador en 1924 fue Fridtjof Nansen. Después de varios años de trabajo preparatorio, la compañía tuvo éxito en 1931 al usar una aeronave para una expedición polar puramente científica por primera vez. A través del vuelo ártico del LZ 127 Graf Zeppelin, el conocimiento de la geografía de las regiones polares voladas se expandió significativamente. Ya en 1926, Umberto Nobile voló sobre el Polo Norte con su aeronave 'Norge' y luego emprendió una expedición con la 'Italia'." #NT!
 MR_ON_TRANSATLANTIC_CABLE_EXPEDITION_TT: "#T El cable transatlántico#!\n#p actualmente hay una expedición en curso para establecer un cable transatlántico .#!\nTelegraphy habilita el intercambio de información a una velocidad previamente desconocida. Al establecer una estación de telegrafía en ambos lados del Atlántico, existe la posibilidad de establecer un cable de telegrafía submarina para acercar a Europa y América. Sin embargo, esto requiere equipos adecuados y un sector de noticias desarrollado que invertiría significativamente para explotar una aventura tan costosa de manera lucrativa." #NT!
  
 MR_IS_CIVIL_ENGINEER_TT: "#T [concept_gaudi_civil_engineer]#!\nYour [concept_gaudi_engineer] se está centrando en [Concept('concept_gaudi_civil_engineer','$concept_gaudi_civil_engineering$')]." #NT!
 MR_IS_MECHANICAL_ENGINEER_TT: "#T [concept_gaudi_mechanical_engineer]#!\nYour [concept_gaudi_engineer] se está centrando en [Concept('concept_gaudi_mechanical_engineer','$concept_gaudi_mechanical_engineering$')]." #NT!
 MR_IS_MILITARY_ENGINEER_TT: "#T [concept_gaudi_military_engineer]#!\nYour [concept_gaudi_engineer] se está centrando en [Concept('concept_gaudi_military_engineer','$concept_gaudi_military_engineering$')]." #NT!
 MR_IS_ELECTRICAL_ENGINEER_TT: "#T [concept_gaudi_electrical_engineer]#!\nYour [concept_gaudi_engineer] se está centrando en [Concept('concept_gaudi_electrical_engineer','$concept_gaudi_electrical_engineering$')]." #NT!
 MR_IS_AERONAUTICAL_ENGINEER_TT: "#T [concept_gaudi_aeronautical_engineer]#!\nYour [concept_gaudi_engineer] se está centrando en [Concept('concept_gaudi_aeronautical_engineer','$concept_gaudi_aeronautical_engineering$')]." #NT!
  
 MR_SAFARI_ACTIVE_TT: "#T HEIA Safari#!\n#p Su naturalista está actualmente en un safari.#!\nOn un safari africano, a través de un seguimiento y captura constantes, se puede capturar un gran juego y luego transportarse a un [concept_dubois_zoo]. Solo es posible atrapar un animal por safari. Dependiendo de la especie animal, difiere si necesita trampas o si tiene que permanecer en su rastro. Como regla general, los animales grandes y lentos necesitan más trampas, mientras que los animales rápidos requieren más seguimiento." #NT!
 MR_ZOOLOGICAL_EXPEDITION_ACTIVE_TT: "#T Captura de animales locales#!\n#p Su naturalista está actualmente atrapando animales locales. #!\nOur La nación tiene hábitats animales con especies fascinantes que podrían mostrarse en un [concept_dubois_zoo]. Un [concept_dubois_naturalist] es viajar por todo el país durante un año para recolectar [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] para un zoológico." #NT!
  
 MR_CHEMIST_IMPROVE_FERTILIZER_BUTTON: "Mejorar el fertilizante" #NT!
