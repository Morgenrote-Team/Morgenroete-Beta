 MR_AERONAUTICAL_ENGINEER_SPEED_AIRPLANE_BUTTON_TT: "#T aviones de alta velocidad#!\nOur El ingeniero aeronáutico puede construir un avión de alta velocidad para romper el registro existente. Para construir el avión más rápido del mundo, no solo necesita un ingeniero sino también un piloto para volar el avión. El éxito depende de la experiencia del ingeniero y el piloto, así como las tecnologías avanzadas."
