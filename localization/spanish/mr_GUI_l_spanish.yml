 MR_ACADEMICS_PROMOTE_UNIVERSITY_INVESTMENT_TT: "#T Inversión académica#!\nA La inversión del gobierno general en nuestras universidades aumentará #O progreso académico#! por #G +1#! por mes. La financiación está programada durante 10 años. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
