 MR_MINERAL_CABINET_BUTTON: "Gabinete mineral encontrado"
 MR_MINERAL_CABINET_BUTTON_TT: "#T Gabinete mineral encontrado#!\nA El gabinete mineral en su zoológico lo hará aún más prestigioso. Podemos mostrar todos los minerales allí recopilados por nuestro [concept_agassiz_geologist]. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
