 MR_EXAMINE_CAVE_BUTTON_BUTTON_TT: "#T Examine cave#!\nWith La ayuda de un [concept_lepsius_anthropologist], se puede explorar el [Concept('concept_lepsius_cave','$concept_lepsius_caves$')] conocido anteriormente en el territorio nacional. [Concept('concept_lepsius_human_fossil','$concept_lepsius_human_bones$')] y se pueden recuperar artefactos prehistóricos. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
