 MR_ORIGIN_CONGRESS_BUTTON: "Congreso sobre origen humano" #NT!
 MR_ORIGIN_CONGRESS_BUTTON_TT: "#T Congreso sobre el origen de los humanos modernos#!\nWith El descubrimiento de los huesos humanos prehistóricos, también surgió la cuestión del origen original del hombre. Mientras Darwin asumió un origen africano, otros postularon varios desarrollos paralelos. Desde el cambio de siglo en adelante, la opinión dominante era que los humanos modernos se desarrollaron en Asia. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
  
