 MR_GEOLOGIST_UNDERWATER_MOUNTAINS_BUTTON_TT: "#T Explore las montañas del Atlántico#!\nAfter Se encontró evidencia de elevaciones submarinas durante la colocación del cable transatlántico, los principales geólogos se preguntan cuál podría ser la causa. El equipo de medición moderno y un geólogo experimentado podrían desentrañar el misterio. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
