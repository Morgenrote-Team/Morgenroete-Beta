 MR_ASTEROID_CONGRESS_BUTTON: "Congreso sobre asteroides"
 MR_ASTEROID_CONGRESS_BUTTON_TT: "#T Congreso sobre Asteroids#!\nSince El descubrimiento de Ceres en 1801, los astrónomos han encontrado más y más cuerpos celestes, por lo que el número de planetas en el sistema solar ha seguido aumentando. El descubrimiento de Neptuno planteó la cuestión de si una nueva categoría podría tener más sentido para los numerosos objetos más pequeños que se encuentran particularmente entre Marte y Júpiter. En particular, la invención de nuevos símbolos astronómicos y sus astrónomos de tamaño relativamente pequeño llevaron a los astrónomos a suponer que eran más probables 'estrellas pequeñas' o 'planetas pequeños'. Por supuesto, esta categorización significaría que algunos de los objetos previamente considerados planetas perdieron su estado y se degradarían a meras rocas. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ASTEROID_CONGRESS_NEPTUNE_TT: "#default_text #V neptuno#! ha sido descubierto.#!"
 MR_ASTEROID_CONGRESS_OBSERVATORY_BUILDING_TRIGGER_TT: "#default_text [GetPlayer.GetName] tiene un [GetBuildingType('building_verrier_observatory').GetName].#!"
 MR_ASTEROID_CONGRESS_ASTRONOMER_TRIGGER_TT: "#default_text tiene un [concept_verrier_astronomer].#!"
 MR_ASTEROID_CONGRESS_OBJECTS_TRIGGER_TT: "#default_text ¡Un total de al menos #BLUE 1500#! @verrier_astronomicalObject! [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] fueron descubiertos en todo el mundo (actualmente [GetGlobalVariable('verrier_total_astronomical_objects').GetValue|+0] @verrier_astronomicalObject! Fueron encontrados) .#!"
 MR_CARTE_DE_CIEL_CONGRESS_BUTTON: "Carta du ciel"
 MR_CARTE_DE_CIEL_CONGRESS_BUTTON_TT: "#T Congreso sobre la carta du ciel#!\nA Vast y sin precedentes Proyectos Internacionales de Mapeo Estelar fue iniciado en 1887 por el director del Observatorio de París, Amédée Mouchez, quien se dio cuenta del potencial del nuevo proceso fotográfico de placa seca para revolucionar el proceso de hacer mapas de las estrellas. Como resultado del Congreso Atrográfico de más de 50 astrónomos celebrados en París en abril de 1887, 20 observatorios de todo el mundo acordaron participar en el proyecto. Podemos organizar un Congreso de este tipo para compartir el conocimiento astronómico de la comunidad internacional. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ASTRONOMY_CONGRESS_5_YEARS_TRIGGER_TT: "#default_text allí #V no ha sido un congreso astronómico#! en el #V Últimos 5 años#! (el último anfitrión no tiene el \ \"alojado un modificador del Congreso astronómico \") .#!"
 MR_CARTE_DE_CIEL_CONGRESS_OBJECTS_TRIGGER_TT: "#default_text ¡Un total de al menos #BLUE 7000#! @verrier_astronomicalObject! [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] fueron descubiertos en todo el mundo (actualmente [GetGlobalVariable('verrier_total_astronomical_objects').GetValue|+0] @verrier_astronomicalObject! Fueron encontrados) .#!"
 MR_CARTE_DE_CIEL_CONGRESS_UNIVERSITY_BUILDING_TRIGGER_TT: "#default_text [GetPlayer.GetName] tiene un [GetBuildingType('building_university').GetName] de #V nivel 10 o superior#!.#!"
 MR_GREAT_DEBATE_CONGRESS_BUTTON: "Gran debate"
 MR_GREAT_DEBATE_CONGRESS_BUTTON_TT: "#T El gran debate#!\nThe Shapley-Curtis debate, también conocido como el gran debate, agrupó las discusiones de principios del siglo XX que eventualmente condujeron a una nueva comprensión de la naturaleza de las galaxias y el tamaño del universo. Giró en torno al tamaño de la Vía Láctea y si las galaxias conocidas como nebulosas espirales son objetos pequeños en la Vía Láctea o mucho más distantes y separadas de la Vía Láctea. Ese día, los dos científicos presentaron documentos técnicos independientes sobre la escala de tamaño del universo, seguido de una discusión pública en la noche. Podemos celebrar ese Congreso para discutir los mejores misterios del universo. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
