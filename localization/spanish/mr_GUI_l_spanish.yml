 MR_PHYSICIAN_DESCRIBE_DISEASE_ACTIVE_TT: "#T Descripción de la enfermedad#!\n#p Su $concept_panum_physician$ actualmente está trabajando en una primera descripción de una enfermedad .#!\nA El médico puede describir una enfermedad previamente no descrita con más detalle científico si está furioso como una epidemia en el territorio nacional. Este es un paso preliminar importante para desarrollar un método de tratamiento posterior." #NT!
