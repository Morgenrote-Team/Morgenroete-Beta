 MR_AUTORACING_FOUND_AUTOMOBILE_CLUB_BUTTON: "Club de automóviles encontrados" #NT!
 MR_AUTORACING_FOUND_AUTOMOBILE_CLUB_BUTTON_TT: "#T FOUNTO Automobile Club#!\nEstablishing Un club de automóviles es el primer paso en la construcción de otras instalaciones que son esenciales para los deportes de motor. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
