 MR_JOIN_RED_CROSS_BUTTON_TT: "#T Únase a la nación [concept_panum_red_cross]#!\nOur puede unirse a la Cruz Roja Internacional y mejorar su reputación a través de acuerdos internacionales, a expensas de la guerra despiadada. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
  
 MR_IOC_PRESIDENT_BUTTON: "Convertirse en presidente del COI" #NT!
 MR_IOC_PRESIDENT_BUTTON_TT: "#T Conviértase en presidente de la COI#!\nWithout Un presidente activo del COI, podemos tomar este puesto. Eso supone que controlamos la sede del Comité Olímpico. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_IOC_CONTROLS_HQ_TRIGGER_TT: "#default_text [GetPlayer.GetName] controla el [GetBuildingType('building_vikelas_ioc').GetName]#!.#!" #NT!
  
 MR_SIGN_FIRST_CONVENTION_BUTTON: "Firmar la primera convención" #NT!
 MR_SIGN_FIRST_CONVENTION_BUTTON_TT: "#T Firme la primera convención#!\nThe Primera Convención de Ginebra, oficialmente la Convención para la mejora de la condición de los heridos en los ejércitos en el campo define la base sobre la cual descansan las reglas de derecho internacional para la protección de las víctimas de conflictos armados. Una de sus regulaciones más importantes es la inmunidad de la captura y destrucción de todos los establecimientos para el tratamiento de soldados heridos y enfermos y la recepción y tratamiento imparciales de todos los combatientes. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_SIGN_SECOND_CONVENTION_BUTTON: "Firmar la segunda convención" #NT!
 MR_SIGN_SECOND_CONVENTION_BUTTON_TT: "#T Firmar la segunda convención#!\nThe Las convenciones de La Haya de 1899 y 1907 son una serie de tratados y declaraciones internacionales negociadas en dos conferencias internacionales de paz en La Haya en los Países Bajos. Ambas conferencias incluyeron negociaciones sobre el desarme, las leyes de la guerra y los crímenes de guerra. La conferencia de 1907 tuvo un mayor enfoque en la guerra naval. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_SIGN_THIRD_CONVENTION_BUTTON: "Firmar la tercera convención" #NT!
 MR_SIGN_THIRD_CONVENTION_BUTTON_TT: "#T Firma el tercer protocolo #!\nThe para la prohibición del uso en la guerra de gases asfixiadores, venenosos u otros, y de métodos bacteriológicos de guerra, generalmente llamado protocolo de Ginebra, es un tratado que prohíbe el uso de armas químicas y biológicas en conflictos armados internacionales. Fue firmado en Ginebra el 17 de junio de 1925. \ n \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_LEAVE_RED_CROSS_BUTTON: "Deja la Cruz Roja" #NT!
 MR_LEAVE_RED_CROSS_BUTTON_TT: "#T deja la Cruz Roja#!\nHomo Homini Lupus. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
  
 MR_PHYSICIAN_INTRODUCE_MEDICAL_TECHNIQUES_LEVEL_BUTTON_TT: "#T Introducir técnicas médicas#!\nDirects El médico para introducir equipos, métodos y nuevos tratamientos modernos a propiedades médicas en todo el país. A veces un médico puede desarrollar nuevos inventos espectaculares. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
