 MR_SPECIMEN_COLLECTION_BUTTON: "Colección de muestras encontradas"
 MR_SPECIMEN_COLLECTION_BUTTON_TT: "#T COLECCIÓN DE MECHOS ENCONTRADOS #!\nOrdering Todos nuestros insectos exóticos, mariposas y otros [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] mostrarían al mundo cuán avanzada científicamente está nuestra nación. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
