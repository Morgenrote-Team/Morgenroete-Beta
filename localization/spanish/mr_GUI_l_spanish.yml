 MR_AERONAUTICAL_ENGINEER_AIRPORT_BUTTON_TT: "#T modernización de aeropuertos#!\nLet su [concept_gaudi_engineer] enfoque en modernizar su [GetBuildingType('building_airport').GetName]. Los aeropuertos obtendrán modificadores que aumentan [concept_throughput] y [concept_good_production] y bajan [concept_input_mult]. Esto agregará los gastos #n#! a su país. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
