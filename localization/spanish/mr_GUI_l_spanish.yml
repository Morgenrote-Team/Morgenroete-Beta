 MR_CHEMIST_CONGRESS_BUTTON_TT: "#T Chemist Congress#!\nThe Karlsruhe Congress fue el primer Simposio Internacional sobre Química Moderna. Tuvo lugar del 3 al 5 de septiembre de 1860 por iniciativa de Friedrich August Kekulé von Stradonitz, Charles Adolphe Wurtz y Karl Weltzien en el Ständehaus en Karlsruhe. Los temas incluyeron la nomenclatura de los compuestos químicos y su representación fórmula, así como la cuestión de los pesos atómicos y moleculares de los compuestos químicos. Fue la primera conferencia internacional de química en el mundo. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
