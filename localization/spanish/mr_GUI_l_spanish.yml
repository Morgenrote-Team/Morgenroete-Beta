 MR_PHYSICIAN_CAN_DESCRIBE_LOCAL_DISEASE_TRIGGER_TT: "#default_text [GetPlayer.GetName] sufre una enfermedad epidémica que aún no se ha descrito completamente." #NT!
 MR_PHYSICIAN_DESCRIBE_DISEASE_FOREIGN_BUTTON_TT: "#T Expedición de observación médica#!\nA El médico puede llevar a cabo una expedición a una tierra lejana donde una epidemia está enriqueciendo y describir la enfermedad allí. Este proceso lleva más tiempo que un diagnóstico en su propio país. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_PHYSICIAN_DESCRIBE_DISEASE_FOREIGN_ACTIVE_TT: "#T Expedición de observación médica#!\n#p Su $concept_panum_physician$ se encuentra actualmente en una expedición de observación médica. Este proceso lleva más tiempo que un diagnóstico en su propio país." #NT!
 MR_PHYSICIAN_CAN_DESCRIBE_FOREIGN_DISEASE_TRIGGER_TT: "#default_text [GetPlayer.GetName] tiene interés en un país que sufre de una enfermedad epidémica que aún no se ha descrito completamente." #NT!
 MR_PHYSICIAN_FIND_TREATMENT_BUTTON_TT: "#T tratamiento de enfermedad#!\nA El médico puede encontrar un tratamiento para una enfermedad que se desata como una epidemia en el territorio nacional. Aunque el tratamiento no prevenirá la enfermedad, limitará significativamente su efecto. Para ciertas enfermedades, se requiere investigación sobre una tecnología específica antes de encontrar un método de tratamiento." #NT!
 MR_PHYSICIAN_FIND_TREATMENT_ACTIVE_TT: "#T TRATAMIENTO DE ENFERMEDAD#!\n#p Su $concept_panum_physician$ está buscando en un tratamiento para una enfermedad. #!\nA El médico puede encontrar un tratamiento para una enfermedad que se desencadena como una epidemia en el territorio nacional. Aunque el tratamiento no prevenirá la enfermedad, limitará significativamente su efecto. Para ciertas enfermedades, se requiere investigación sobre una tecnología específica antes de encontrar un método de tratamiento." #NT!
 MR_PHYSICIAN_CAN_FIND_LOCAL_TREATMENT_TRIGGER_TT: "#default_text [GetPlayer.GetName] sufre una epidemia que se ha descrito, pero para el cual todavía no hay tratamiento y también tiene la tecnología correspondiente." #NT!
 MR_PHYSICIAN_FIND_TREATMENT_FOREIGN_BUTTON_TT: "#T Expedición de investigación médica#!\nA El médico puede llevar a cabo una expedición a una tierra distante donde una epidemia se está desenterrando y estudiar la enfermedad allí para encontrar un tratamiento. Este proceso lleva más tiempo que en su propio país. Para ciertas enfermedades, se requiere investigación sobre una tecnología específica antes de encontrar un método de tratamiento." #NT!
 MR_PHYSICIAN_FIND_TREATMENT_FOREIGN_ACTIVE_TT: "#T Expedition de investigación médica#!\n#p Su $concept_panum_physician$ está buscando un tratamiento para una enfermedad.#!\nA El médico puede llevar a cabo una expedición a una tierra distante donde una epidemia se desata y estudia la enfermedad allí para encontrar un tratamiento. Este proceso lleva más tiempo que en su propio país. Para ciertas enfermedades, se requiere investigación sobre una tecnología específica antes de encontrar un método de tratamiento." #NT!
