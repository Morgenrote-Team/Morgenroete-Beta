 MR_SPECIMEN_GARDEN_BUTTON: "Jardín botánico encontrado"
 MR_SPECIMEN_GARDEN_BUTTON_TT: "#T encontrado jardín botánico#!\nA jardín botánico en su zoológico lo hará aún más prestigioso. Podemos plantar todas las plantas exóticas recolectadas por nuestro [concept_dubois_naturalist]. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
