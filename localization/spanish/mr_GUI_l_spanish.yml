 MR_ACADEMICS_PROMOTE_UNIVERSITY_INVESTMENT_TT: "#T Inversión académica#!\nA La inversión del gobierno general en nuestras universidades aumentará #O progreso académico#! por #G +1#! por mes. La financiación está programada durante 10 años. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ACADEMICS_PROMOTE_UNIVERSITY_INVESTMENT_TRIGGER_TT: "[GetPlayer.GetAdjective] ya no está invirtiendo en la academia."
 MR_ACADEMICS_AVANTGARDE_TT: "#T Avantgarde Intelligentsia#!\nA Clique de académicos con ideas claras culturales, sociológicas y antropológicas determina la vida científica científica. Por el contrario, los campos prácticos son de menor importancia. \ N#R nota#!: aumenta la apariencia de académicos por un punto por mes. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ACADEMICS_NO_AVANTAGRDE_OR_CONFUSION_TT: "#default_text [GetPlayer.GetName] no tiene el #b Avantgarde Intelligentsia#! Focus todavía y no cambió recientemente su enfoque."
 MR_ACADEMICS_AVANTGARDE_BUILDING_REQUIREMENT_TT: "#default_text al menos #p 50%#! de las universidades [GetPlayer.GetAdjective] tienen el [concept_pm_academics_university_humanities].#!"
 MR_ACADEMICS_PRACTICAL_TT: "#T Academia práctica#!\nThe científicos en nuestro país intentan incansablemente hacer descubrimientos de todas las áreas adecuadas para el uso práctico diario. Esto es para servir al progreso general y la paz de la humanidad. \ N#R nota#!: aumenta la apariencia de académicos por un punto por mes. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ACADEMICS_NO_PRACTICAL_OR_CONFUSION_TT: "#S [GetPlayer.GetName] no tiene el enfoque de Academia práctica #b#! y no cambió recientemente su enfoque."
 MR_ACADEMICS_PRACTICAL_BUILDING_REQUIREMENT_TT: "#default_text al menos #p 50%#! de las universidades [GetPlayer.GetAdjective] tienen el [concept_pm_academics_university_natural_history].#!"
 MR_ACADEMICS_MILITARY_TT: "#T complejo militar-industrial#!\nCooperation entre industriales privados y los militares han llevado al desarrollo de una red de conexiones, lazos personales y conocidos, con solo un toque de corrupción, que puede describirse mejor como un complejo militar-industrial. \ N \ n \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ACADEMICS_NO_MILITARY_OR_CONFUSION_TT: "#default_text [GetPlayer.GetName] no tiene el complejo militar-industrial #b todavía y no cambió recientemente su enfoque."
 MR_ACADEMICS_MILITARY_BUILDING_REQUIREMENT_TT: "#default_text al menos #p 50%#! de las universidades [GetPlayer.GetAdjective] tienen el [concept_pm_academics_university_mathematics].#!"
 MR_ACADEMICS_MILITARY_BUILDING_REQUIREMENT_2_TT: "#default_text [GetPlayer.GetName] has at least one [GetBuildingType('building_automotive_industry').GetName], [GetBuildingType('building_arms_industry').GetName], [GetBuildingType('building_munition_plant').GetName] or [GetBuildingType('building_artillery_foundry').GetName] of level #p 5#! or higher.#!"
 MR_ACADEMICS_MILITARY_ARMY_SIZE_REQUIREMENT_TT: "#default_text El ejército [GetPlayer.GetAdjective] es al menos de tamaño #b 50#! o superior.#!"
 MR_ACADEMICS_BUSINESS_TT: "#T Escuelas de negocios y magnate de magnate#!\nThe El individuo independiente combinado con un momento próspero de progreso ha llevado a una mentalidad en la que las escuelas comerciales, las empresas medianas y las grandes corporaciones tienen una influencia decisiva en la ciencia del país. Viceversa, las universidades trabajan para aumentar la prosperidad adquirida de la nación a través de nuevas tecnologías e impulsar las ideas sociales a través del progreso. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ACADEMICS_NO_BUSINESS_OR_CONFUSION_TT: "#default_text [GetPlayer.GetName] no tiene las escuelas de negocios #b & Tycoon Capitalism#! Focus y no cambió recientemente su enfoque."
 MR_ACADEMICS_BUSINESS_BUILDING_REQUIREMENT_TT: "#default_text al menos #p 35%#! de las universidades [GetPlayer.GetAdjective] tienen el [concept_pm_academics_university_mathematics].#!"
 MR_ACADEMICS_BUSINESS_BUILDING_REQUIREMENT_2_TT: "#default_text al menos #p 35%#! de las universidades [GetPlayer.GetAdjective] tienen el [concept_pm_academics_university_humanities].#!"
 MR_ACADEMICS_BUSINESS_BUILDING_REQUIREMENT_3_TT: "#default_text [GetPlayer.GetName] has either [GetBuildingType('building_textile_mill').GetName] or [GetBuildingType('building_furniture_manufactory').GetName] of at least level #p 15#! or either [GetBuildingType('building_tooling_workshop').GetName] or [GetBuildingType('building_steel_mill').GetName] of at least level #p 10#! or either [GetBuildingType('building_motor_industry').GetName] or [GetBuildingType('building_electrics_industry').GetName] of at least level #p 5#!.#!"
 MR_ACADEMICS_SEAPOWER_TT: "#T Sea Power & Merchant Marine#!\nThe La marina y el comercio internacional juegan un papel inmenso para nuestro país. Aumentar la prosperidad a través de la producción avanzada y el comercio global de nuestros productos es tan importante como defender lo que ya se ha ganado. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ACADEMICS_NO_SEAPOWER_OR_CONFUSION_TT: "#default_text [GetPlayer.GetName] no tiene el enfoque #b de potencia marina y marina marina#! y no cambió recientemente su enfoque."
 MR_ACADEMICS_SEAPOWER_BUILDING_REQUIREMENT_TT: "#default_text al menos #p 35%#! de las universidades [GetPlayer.GetAdjective] tienen el [concept_pm_academics_university_mathematics].#!"
 MR_ACADEMICS_SEAPOWER_BUILDING_REQUIREMENT_2_TT: "#default_text al menos #p 35%#! de las universidades [GetPlayer.GetAdjective] tienen el [concept_pm_academics_university_natural_history].#!"
 MR_ACADEMICS_SEAPOWER_NAVY_SIZE_REQUIREMENT_TT: "#default_text La marina [GetPlayer.GetAdjective] es al menos de tamaño #b 50#! o superior.#!"
 MR_ACADEMICS_USEFUL_TT: "#T La academia útil de marfil de marfil. Sin embargo, no se puede negar que el aislamiento de la Torre de Marfil de la sociedad también tiene sus ventajas. Sin perturbarse, muchos profesores trabajan mejor. \ N#R nota#!: aumenta la apariencia de académicos por un punto por mes. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ACADEMICS_NO_USEFUL_OR_CONFUSION_TT: "#default_text [GetPlayer.GetName] no tiene el enfoque #b de #b Ivory Tower#! y no cambió recientemente su enfoque.#!"
 MR_ACADEMICS_USEFUL_BUILDING_REQUIREMENT_TT: "#default_text al menos #p 35%#! de las universidades [GetPlayer.GetAdjective] tienen el [concept_pm_academics_university_humanities].#!"
 MR_ACADEMICS_USEFUL_BUILDING_REQUIREMENT_2_TT: "#default_text al menos #p 35%#! de las universidades [GetPlayer.GetAdjective] tienen el [concept_pm_academics_university_natural_history].#!"
 MR_ACADEMICS_USEFUL_BUILDING_REQUIREMENT_3_TT: "#default_text [GetPlayer.GetName] tiene un [GetBuildingType('building_lepsius_archaeological_museum').GetName], un [GetBuildingType('building_verrier_observatory').GetName] o un [GetBuildingType('building_dubois_zoo').GetName].#!"
 MR_MOUNTAIN_EXPEDITION_TT: "#T Expedition de montaña#!\nWith El ascenso de Mont Blanc en 1786, comenzó una nueva era de conquistar los picos más altos de la Tierra; Una tendencia que solo aumentó durante los siglos XIX y XX. Si tengamos una cordillera en uno de nuestros territorios que aún no se ha escalado, podríamos delegar la conquistación a un general capaz con las habilidades apropiadas. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAIN_UNCONQUERED_SUMMIT_TRIGGER_TT: "#default_text [GetPlayer.GetName] posee al menos una #V sin control Summit#! o tiene una licencia de montañismo #V#! con una nación que posee una.#!"
 MR_MOUNTAIN_RECENT_EXPEDITION_TRIGGER_TT: "#default_text [GetPlayer.GetName] no llegó recientemente a una nueva montaña o falló una expedición de montaña."
 MR_ZEPPELIN_EXPEDITION_TT: "#T Zeppelin Expedition#!\nThe Aeroártico, la 'Sociedad Internacional de Estudios para la Exploración del Ártico por aeronave' era una asociación científica no gubernamental que se había establecido el objetivo de usar aeronaves en la investigación polar. Se fundó principalmente en la iniciativa del aeronáutico y luego al Secretario General de la Sociedad, Walther Bruns. El presidente fundador en 1924 fue Fridtjof Nansen. Después de varios años de trabajo preparatorio, la compañía tuvo éxito en 1931 al usar una aeronave para una expedición polar puramente científica por primera vez. A través del vuelo ártico del LZ 127 Graf Zeppelin, el conocimiento de la geografía de las regiones polares voladas se expandió significativamente. Ya en 1926, Umberto Nobile voló sobre el Polo Norte con su aeronave 'Norge' y luego emprendió una expedición con la 'Italia'. \ N \ n [ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ZEPPELIN_OBSERVATORY_TRIGGER_TT: "#default_text [GetPlayer.GetName] tiene un [GetBuildingType('building_verrier_observatory').GetName] con el método de producción de la estación meteorológica #V §#!.#!"
 MR_ZEPPELIN_ACCESS_TRIGGER_TT: "#default_text [GetPlayer.GetName] posee o tiene accesos con un [concept_curtiss_airspace_convention] a uno de estos estados: #V Greenland#!, #V Northern Norway#!, #V Alaska#!, #V Nunavut [GetPlayer.GetName]0 o #V nenetsia[GetPlayer.GetName]0.[GetPlayer.GetName]0"
 MR_ZEPPELIN_RECENT_EXPEDITION_TRIGGER_TT: "#default_text [GetPlayer.GetName] no es #V en una expedición zeppelin#! o #V recientemente tuvo un one#!.#!"
 MR_PACIFIC_EXPEDITION_TT: "#T Pacific Expedition#!\nAlong Con los polos, el Océano Pacífico es una de las últimas áreas de la Tierra que aún posee secretos. Los académicos de múltiples disciplinas científicas están interesados ​​en una misión de investigación para realizar estudios naturalistas, paleontológicos, astronómicos y oceanográficos. Nuevamente, para los grandes poderes podría ser un asunto prestigioso mostrar su influencia al final del mundo. \ N \ n [ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PACIFIC_RANK_TRIGGER_TT: "#default_text [GetPlayer.GetName] es un #V principal potencia#! o un #V gran potencia#!.#!"
