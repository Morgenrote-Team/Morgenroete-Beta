 MR_MILITARY_ENGINEER_ADVANCED_WEAPONS_BUTTON_TT: "#T Desarrollar rifles avanzados#!\nLet su [concept_gaudi_engineer] enfoque en desarrollar rifles avanzados. Esto le permitirá usar un nuevo [concept_mobilization_option] o elevar su nivel. Este proyecto agregará #n gastos#! a su país. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
  
