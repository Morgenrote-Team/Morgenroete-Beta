 MR_BAN_ANIMAL_EXPORT_BUTTON: "Prohibir la exportación de animales"
 MR_BAN_ANIMAL_EXPORT_BUTTON_TT: "#T Ban Animal Export#!\nWith Una prohibición de las exportaciones de animales, estamos dejando en claro en principio que no estamos preparados para vender ninguno de nuestros animales en el extranjero. Otras naciones se abstendrán de consultas. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
