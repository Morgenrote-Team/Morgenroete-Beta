 MR_CIVIL_ENGINEER_INFRASTRUCTURE_BUTTON: "Proyecto de infraestructura" #NT!
 MR_CIVIL_ENGINEER_INFRASTRUCTURE_BUTTON_TT: "#T Proyecto de infraestructura#!\nLet Su [concept_gaudi_engineer] se enfoca en expandir la infraestructura en [GetPlayer.GetName]. Hay diferentes proyectos que agregan [Concept('concept_modifier','$concept_modifiers$')] que agregan [concept_infrastructure] a sus estados. Each time the state with the least infrastructure will gain the modifier. Este proyecto agregará #n gastos#! a su país. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
