 MR_PADDOCK_FIRE_RACER_BUTTON: "Corredor de bomberos" #NT!
 MR_PADDOCK_FIRE_RACER_BUTTON_TT: "#T Fire Racer#!\nUnlike Los pilotos de los viejos caballeros, los pilotos del equipo de carrera no son insustituibles. Después de que se ha contratado un nuevo piloto de carreras, este puesto no se puede ocupar durante dos años. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
  
