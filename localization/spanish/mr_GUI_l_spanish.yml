 #Avantgarde Intelligentsia 
 MR_ACADEMICS_AVANTGARDE_TT: "#T Avantgarde Intelligentsia#!\nA Clique de académicos con ideas claras culturales, sociológicas y antropológicas determina la vida científica científica. Por el contrario, los campos prácticos son de menor importancia. \ N#R nota#!: aumenta la apariencia de académicos por un punto por mes. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_ACADEMICS_NO_AVANTAGRDE_OR_CONFUSION_TT: "#default_text [GetPlayer.GetName] no tiene el #b Avantgarde Intelligentsia#! Focus todavía y no cambió recientemente su enfoque." #NT!
 MR_ACADEMICS_AVANTGARDE_BUILDING_REQUIREMENT_TT: "#default_text al menos #p 50%#! de las universidades [GetPlayer.GetAdjective] tienen el [concept_pm_academics_university_humanities].#!" #NT!
 #Practical Academia 
 MR_ACADEMICS_PRACTICAL_TT: "#T Academia práctica#!\nThe científicos en nuestro país intentan incansablemente hacer descubrimientos de todas las áreas adecuadas para el uso práctico diario. Esto es para servir al progreso general y la paz de la humanidad. \ N#R nota#!: aumenta la apariencia de académicos por un punto por mes. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_ACADEMICS_NO_PRACTICAL_OR_CONFUSION_TT: "#S [GetPlayer.GetName] no tiene el enfoque de Academia práctica #b#! y no cambió recientemente su enfoque." #NT!
 MR_ACADEMICS_PRACTICAL_BUILDING_REQUIREMENT_TT: "#default_text al menos #p 50%#! de las universidades [GetPlayer.GetAdjective] tienen el [concept_pm_academics_university_natural_history].#!" #NT!
 #Military-Industrial Complex 
 MR_ACADEMICS_MILITARY_TT: "#T complejo militar-industrial#!\nCooperation entre industriales privados y los militares han llevado al desarrollo de una red de conexiones, lazos personales y conocidos, con solo un toque de corrupción, que puede describirse mejor como un complejo militar-industrial. \ N \ n \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_ACADEMICS_NO_MILITARY_OR_CONFUSION_TT: "#default_text [GetPlayer.GetName] no tiene el complejo militar-industrial #b todavía y no cambió recientemente su enfoque." #NT!
 MR_ACADEMICS_MILITARY_BUILDING_REQUIREMENT_TT: "#default_text al menos #p 50%#! de las universidades [GetPlayer.GetAdjective] tienen el [concept_pm_academics_university_mathematics].#!" #NT!
 MR_ACADEMICS_MILITARY_BUILDING_REQUIREMENT_2_TT: "#default_text [GetPlayer.GetName] tiene al menos un [GetBuildingType('building_war_machine_industry').GetName], [GetBuildingType('building_arms_industry').GetName], [GetBuildingType('building_munition_plants').GetName] o [GetBuildingType('building_artillery_foundries').GetName] del nivel #p 5#! o superior.#!" #NT!
 MR_ACADEMICS_MILITARY_ARMY_SIZE_REQUIREMENT_TT: "#default_text El ejército [GetPlayer.GetAdjective] es al menos de tamaño #b 50#! o superior.#!" #NT!
 #Business Schools & Tycoon Capitalism 
 MR_ACADEMICS_BUSINESS_TT: "#T Escuelas de negocios y magnate de magnate#!\nThe El individuo independiente combinado con un momento próspero de progreso ha llevado a una mentalidad en la que las escuelas comerciales, las empresas medianas y las grandes corporaciones tienen una influencia decisiva en la ciencia del país. Viceversa, las universidades trabajan para aumentar la prosperidad adquirida de la nación a través de nuevas tecnologías e impulsar las ideas sociales a través del progreso. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_ACADEMICS_NO_BUSINESS_OR_CONFUSION_TT: "#default_text [GetPlayer.GetName] no tiene las escuelas de negocios #b & Tycoon Capitalism#! Focus y no cambió recientemente su enfoque." #NT!
 MR_ACADEMICS_BUSINESS_BUILDING_REQUIREMENT_TT: "#default_text al menos #p 35%#! de las universidades [GetPlayer.GetAdjective] tienen el [concept_pm_academics_university_mathematics].#!" #NT!
 MR_ACADEMICS_BUSINESS_BUILDING_REQUIREMENT_2_TT: "#default_text al menos #p 35%#! de las universidades [GetPlayer.GetAdjective] tienen el [concept_pm_academics_university_humanities].#!" #NT!
 MR_ACADEMICS_BUSINESS_BUILDING_REQUIREMENT_3_TT: "#default_text [GetPlayer.GetName] tiene [GetBuildingType('building_textile_mills').GetName] o [GetBuildingType('building_furniture_manufacturies').GetName] del nivel al menos #p 15#! o [GetBuildingType('building_tooling_workshops').GetName] o [GetBuildingType('building_steel_mills').GetName] del nivel #p 10#! o [GetPlayer.GetName]0 o [GetPlayer.GetName]1 al menos #p 5#!.#! o" #NT!
 #Sea Power & Merchant Marine 
 MR_ACADEMICS_SEAPOWER_TT: "#T Sea Power & Merchant Marine#!\nThe La marina y el comercio internacional juegan un papel inmenso para nuestro país. Aumentar la prosperidad a través de la producción avanzada y el comercio global de nuestros productos es tan importante como defender lo que ya se ha ganado. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_ACADEMICS_NO_SEAPOWER_OR_CONFUSION_TT: "#default_text [GetPlayer.GetName] no tiene el enfoque #b de potencia marina y marina marina#! y no cambió recientemente su enfoque." #NT!
 MR_ACADEMICS_SEAPOWER_BUILDING_REQUIREMENT_TT: "#default_text al menos #p 35%#! de las universidades [GetPlayer.GetAdjective] tienen el [concept_pm_academics_university_mathematics].#!" #NT!
