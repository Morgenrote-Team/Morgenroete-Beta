 MR_ACADEMICS_SEAPOWER_NAVY_SIZE_REQUIREMENT_TT: "#default_text La marina [GetPlayer.GetAdjective] es al menos de tamaño #b 50#! o superior.#!" #NT!
 #Useful Ivory Tower 
 MR_ACADEMICS_USEFUL_TT: "#T La academia útil de marfil de marfil. Sin embargo, no se puede negar que el aislamiento de la Torre de Marfil de la sociedad también tiene sus ventajas. Sin perturbarse, muchos profesores trabajan mejor. \ N#R nota#!: aumenta la apariencia de académicos por un punto por mes. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_ACADEMICS_NO_USEFUL_OR_CONFUSION_TT: "#default_text [GetPlayer.GetName] no tiene el enfoque #b de #b Ivory Tower#! y no cambió recientemente su enfoque.#!" #NT!
 MR_ACADEMICS_USEFUL_BUILDING_REQUIREMENT_TT: "#default_text al menos #p 35%#! de las universidades [GetPlayer.GetAdjective] tienen el [concept_pm_academics_university_humanities].#!" #NT!
 MR_ACADEMICS_USEFUL_BUILDING_REQUIREMENT_2_TT: "#default_text al menos #p 35%#! de las universidades [GetPlayer.GetAdjective] tienen el [concept_pm_academics_university_natural_history].#!" #NT!
 MR_ACADEMICS_USEFUL_BUILDING_REQUIREMENT_3_TT: "#default_text [GetPlayer.GetName] tiene un [GetBuildingType('building_lepsius_archaeological_museum').GetName], un [GetBuildingType('building_verrier_observatory').GetName] o un [GetBuildingType('building_dubois_zoo').GetName].#!" #NT!
  
 #Mountain Expedition 
 MR_MOUNTAIN_EXPEDITION_TT: "#T Expedition de montaña#!\nWith El ascenso de Mont Blanc en 1786, comenzó una nueva era de conquistar los picos más altos de la Tierra; Una tendencia que solo aumentó durante los siglos XIX y XX. Si tengamos una cordillera en uno de nuestros territorios que aún no se ha escalado, podríamos delegar la conquistación a un general capaz con las habilidades apropiadas. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_MOUNTAIN_UNCONQUERED_SUMMIT_TRIGGER_TT: "#default_text [GetPlayer.GetName] posee al menos una #V sin control Summit#! o tiene una licencia de montañismo #V#! con una nación que posee una.#!" #NT!
 MR_MOUNTAIN_GENERAL_TRIGGER_TT: "#default_text [GetPlayer.GetName] tiene un [concept_general] con uno de estos rasgos: #V Mountaineer#!, #V Explorer#!, #V Montain Commander#! o #V Surveyor#!.#!" #NT!
 MR_MOUNTAIN_RECENT_EXPEDITION_TRIGGER_TT: "#default_text [GetPlayer.GetName] no llegó recientemente a una nueva montaña o falló una expedición de montaña." #NT!
  
 #Zeppelin Expedition 
 MR_ZEPPELIN_EXPEDITION_TT: "#T Zeppelin Expedition#!\nThe Aeroártico, la 'Sociedad Internacional de Estudios para la Exploración del Ártico por aeronave' era una asociación científica no gubernamental que se había establecido el objetivo de usar aeronaves en la investigación polar. Se fundó principalmente en la iniciativa del aeronáutico y luego al Secretario General de la Sociedad, Walther Bruns. El presidente fundador en 1924 fue Fridtjof Nansen. Después de varios años de trabajo preparatorio, la compañía tuvo éxito en 1931 al usar una aeronave para una expedición polar puramente científica por primera vez. A través del vuelo ártico del LZ 127 Graf Zeppelin, el conocimiento de la geografía de las regiones polares voladas se expandió significativamente. Ya en 1926, Umberto Nobile voló sobre el Polo Norte con su aeronave 'Norge' y luego emprendió una expedición con la 'Italia'. \ N \ n [ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_ZEPPELIN_OBSERVATORY_TRIGGER_TT: "#default_text [GetPlayer.GetName] tiene un [GetBuildingType('building_verrier_observatory').GetName] con el método de producción de la estación meteorológica #V §#!.#!" #NT!
 MR_ZEPPELIN_ACCESS_TRIGGER_TT: "#default_text [GetPlayer.GetName] posee o tiene accesos con un [concept_curtiss_airspace_convention] a uno de estos estados: #V Greenland#!, #V Northern Norway#!, #V Alaska#!, #V Nunavut [GetPlayer.GetName]0 o #V nenetsia[GetPlayer.GetName]0.[GetPlayer.GetName]0" #NT!
 MR_ZEPPELIN_RECENT_EXPEDITION_TRIGGER_TT: "#default_text [GetPlayer.GetName] no es #V en una expedición zeppelin#! o #V recientemente tuvo un one#!.#!" #NT!
  
 #Pacific Expedition 
 MR_PACIFIC_EXPEDITION_TT: "#T Pacific Expedition#!\nAlong Con los polos, el Océano Pacífico es una de las últimas áreas de la Tierra que aún posee secretos. Los académicos de múltiples disciplinas científicas están interesados ​​en una misión de investigación para realizar estudios naturalistas, paleontológicos, astronómicos y oceanográficos. Nuevamente, para los grandes poderes podría ser un asunto prestigioso mostrar su influencia al final del mundo. \ N \ n [ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_PACIFIC_RANK_TRIGGER_TT: "#default_text [GetPlayer.GetName] es un #V principal potencia#! o un #V gran potencia#!.#!" #NT!
 MR_PACIFIC_PORT_BUILDING_TRIGGER_TT: "#default_text [GetPlayer.GetName] tiene un [GetBuildingType('building_port').GetName].#!" #NT!
 MR_PACIFIC_UNIVERSITY_BUILDING_TRIGGER_TT: "#default_text [GetPlayer.GetName] tiene un [GetBuildingType('building_university').GetName].#!" #NT!
 MR_PACIFIC_15_FLOTILLAS_TRIGGER_TT: "#default_text [GetPlayer.GetName] tiene #V 15 o más Flottilas#!.#!" #NT!
 MR_PACIFIC_ADMIRAL_AVAILABLE_TRIGGER_TT: "#default_text [GetPlayer.GetName] tiene un #V admiral#! que #V no es ocupado #!.#!" #NT!
 MR_PACIFIC_RECENT_EXPEDITION_TRIGGER_TT: "#default_text [GetPlayer.GetName] no es #V en una expedición del Pacífico#! o #V recientemente tuvo un one#!.#!" #NT!
  
