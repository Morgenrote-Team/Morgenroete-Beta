 MR_CHEMIST_CONGRESS_BUTTON_TT: "#T Chemist Congress#!\nThe Karlsruhe Congress fue el primer Simposio Internacional sobre Química Moderna. Tuvo lugar del 3 al 5 de septiembre de 1860 por iniciativa de Friedrich August Kekulé von Stradonitz, Charles Adolphe Wurtz y Karl Weltzien en el Ständehaus en Karlsruhe. Los temas incluyeron la nomenclatura de los compuestos químicos y su representación fórmula, así como la cuestión de los pesos atómicos y moleculares de los compuestos químicos. Fue la primera conferencia internacional de química en el mundo. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 dubois_naturalist_achievements_loc: "#V Los logros de su naturalist#!\n[GetPlayer.MakeScope.Var('dubois_naturalist_var').GetCharacter.GetFullName] es un naturalista consumado que recolectó [GetPlayer.MakeScope.Var('dubois_naturalist_var').GetVariable('dubois_naturalist_total_specimens_var').GetValue|0*V] [Concept('concept_dubois_specimen','$concept_dubois_specimens$')].[GetPlayer.MakeScope.Var('dubois_naturalist_var').GetCharacter.GetCustom('dubois_invented_evolution_theory_type')][GetPlayer.MakeScope.Var('dubois_naturalist_var').GetCharacter.GetCustom('dubois_attended_hippocampus_congress_type')][GetPlayer.MakeScope.Var('dubois_naturalist_var').GetCharacter.GetCustom('dubois_naturalist_showed_evolution_in_peppered_moths_type')][GetPlayer.MakeScope.Var('dubois_naturalist_var').GetCharacter.GetCustom('dubois_naturalist_finished_pacific_expedition_type')][GetPlayer.MakeScope.Var('dubois_naturalist_var').GetCharacter.GetCustom('dubois_wallace_line_discovered_type')][GetPlayer.MakeScope.Var('dubois_naturalist_var').GetCharacter.GetCustom('dubois_naturalist_inagurated_zoo_type')]#!\n[GetPlayer.MakeScope.Var('dubois_naturalist_var').GetCharacter.GetFullName]0#!\n[GetPlayer.MakeScope.Var('dubois_naturalist_var').GetCharacter.GetFullName]1#!\n[GetPlayer.MakeScope.Var('dubois_naturalist_var').GetCharacter.GetFullName]2#!\n[GetPlayer.MakeScope.Var('dubois_naturalist_var').GetCharacter.GetFullName]3#!\n[GetPlayer.MakeScope.Var('dubois_naturalist_var').GetCharacter.GetFullName]4#!\n[GetPlayer.MakeScope.Var('dubois_naturalist_var').GetCharacter.GetFullName]5#!\n[GetPlayer.MakeScope.Var('dubois_naturalist_var').GetCharacter.GetFullName]6#!\n[GetPlayer.MakeScope.Var('dubois_naturalist_var').GetCharacter.GetFullName]7_17" #NT!
  
