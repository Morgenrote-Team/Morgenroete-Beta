 MR_ORIGIN_CONGRESS_SPECIAL_HUMAN_FOSSIL_TT: "#default_text [GetPlayer.GetName] tiene al menos #V 3#! @lepsius_human_fossil! [Concept('concept_lepsius_human_fossil','$concept_lepsius_human_fossils$')] de una de estas especies: #V Homo neanderthalensis, Homo erectus, Australopithecus o Paranthropus#!.#!" #NT!
 MR_ORIGIN_CONGRESS_GLOBAL_HUMAN_FOSSIL_TT: "#default_text al menos #V 50#! @lepsius_human_fossil! [Concept('concept_lepsius_human_fossil','$concept_lepsius_human_fossils$')] se encontraron en todo el mundo (actualmente [GetGlobalVariable('dubois_global_human_fossil').GetValue|+0] @lepsius_human_fossil! Fueron encontrados) .#!" #NT!
  
