 MR_AERONAUTICAL_ENGINEER_GIANT_AIRPLANE_BUTTON_TT: "#T avión gigante#!\nThe Sky es el último límite. Lo que una vez fue la edad del descubrimiento en el período moderno temprano es ahora la conquista de los cielos. Pero en comparación con los galeones de los españoles, los vasos celestiales de hoy son meras cáscaras de nuez. Los gigantes oceánicos navegan hoy los mares, pero hasta ahora los cielos solo han estado dominados por máquinas pequeñas. El sueño de construir un avión gigantesco que pueda transportar no docenas, pero cientos de personas parece utópica. Pero una próspera industria de aviones y una poderosa aerolínea encabezada por el hombre correcto podrían voltear el mundo al revés ... \ n \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
