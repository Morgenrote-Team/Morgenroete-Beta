 #Naturalist Buttons 
 MR_SAFARI_EXPEDITION_BUTTON_TT: "#T HEIA Safari#!\nOn Un safari africano, a través de un seguimiento y captura constantes, se puede capturar un gran juego y luego transportarse a un [concept_dubois_zoo]. Solo es posible atrapar un animal por safari. Dependiendo de la especie animal, difiere si necesita trampas o si tiene que permanecer en su rastro. Como regla general, los animales grandes y lentos necesitan más trampas, mientras que los animales rápidos requieren más seguimiento. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_SAFARI_EXPEDITION_NATURALIST_TRIGGER_TT: "#default_text [GetPlayer.GetName] tiene un [concept_dubois_naturalist] que es #V no ocupado#!.#!" #NT!
 MR_SAFARI_EXPEDITION_HAS_SMALL_OR_BIGGER_ZOO_TRIGGER_TT: "#default_text tiene un [concept_dubois_zoo] que es al menos #V pequeño tamaño#!.#!" #NT!
 MR_SAFARI_EXPEDITION_HABITAT_TRIGGER_TT: "#default_text [GetPlayer.GetName] #V posee al menos un hábitat animal africano#! con un gran juego o hay un hábitat en un estado #V propiedad de una nación descentralizada#!.#!" #NT!
 MR_SAFARI_EXPEDITION_RECENT_TRIGGER_TT: "#default_text [GetPlayer.GetName] no es #V en un safari#! o #V recientemente tuvo un one#!.#!" #NT!
 MR_ZOOLOGICAL_EXPEDITION_BUTTON_TT: "#T Captura de animales locales#!\nOur La nación tiene hábitats animales con especies fascinantes que podrían mostrarse en un [concept_dubois_zoo]. Un [concept_dubois_naturalist] es viajar por todo el país durante un año para recolectar [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] para un zoológico. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_ZOOLOGICAL_EXPEDITION_LOCAL_ANIMALS_TRIGGER_TT: "#default_text [GetPlayer.GetName] posee al menos un hábitat animal que alberga un [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] que no vive en nuestro [concept_dubois_zoo].#!" #NT!
 MR_ZOOLOGICAL_EXPEDITION_CURRENT_EXPEDITION_TRIGGER_TT: "#default_text [GetPlayer.GetName] no es #V actualmente atrapando animales locales#!.#!" #NT!
 MR_BOTANICAL_EXPEDITION_BUTTON_TT: "#T Expedición botánica#!\nBotanical Expediciones (a veces llamadas 'caza de plantas') son viajes científicos diseñados para explorar la flora de una región en particular. Un [concept_dubois_naturalist] sería responsable de la identificación, descripción y colección de especímenes. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_SAFARI_EXPEDITION_BANNED_TRIGGER_TT: "#default_text Las expediciones botánicas han sido prohibidas por #V razones políticas#!.#!" #NT!
 MR_SAFARI_EXPEDITION_ACCESS_RAINFOREST_TRIGGER_TT: "#default_text [GetPlayer.GetName] #V posee una selva tropical#! en al menos un estado. Las selvas tropicales tienen los siguientes modificadores de estado: #V Amazon Forest#!, #V Congo Forest#!, #V Borneo Forest#! y #V Indochinese Forest#!.#!" #NT!
 MR_BOTANICAL_EXPEDITION_RECALL_BUTTON_TT: "#T Recuerde el naturalista de la expedición botánica#!\nOrders El [concept_dubois_naturalist] de su investigación botánica para usarlo para otros fines, como capturar animales. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_BOTANICAL_EXPEDITION_RECALL_TRIGGER_TT: "#default_text Su [concept_dubois_naturalist] no es #V ni viajes ni enfermo#!.#!" #NT!
 MR_BOTANICAL_EXPEDITION_RECALL_NATURALIST_EFFECT_TT: "Su [concept_dubois_naturalist] ya no está ocupado." #NT!
 MR_HIPPOCAMPUS_CONGRESS_BUTTON: "Congreso del hipocampo" #NT!
 MR_HIPPOCAMPUS_CONGRESS_BUTTON_TT: "#T Hippocampus Congress#!\nHow único es el hombre? ¿Cuánto de un animal es él? Los antiguos griegos ya habían notado una cercanía entre humanos y simios. El hecho de que Carl Linneaus clasificara simios y humanos como primates, el rango "más alto" entre los animales, muestra que el campo una vez no fue tan controvertido. Sin embargo, con la formulación de la teoría de la evolución y el presunto descenso de los humanos de un pariente similar a un simio, han surgido conflictos que ahora deben resolverse. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_NATURALIST_TRIGGER_TT: "#default_text [GetPlayer.GetName] tiene un [concept_dubois_naturalist]#!" #NT!
 MR_HIPPOCAMPUS_CONGRESS_5_NATURALISTS_TRIGGER_TT: "#default_text al menos #V 5 países#! tienen un [concept_dubois_naturalist].#!" #NT!
 MR_HIPPOCAMPUS_CONGRESS_SPECIMEN_TRIGGER_TT: "#default_text [GetPlayer.GetName] tiene #V 20000 o más#! [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] (actualmente [GetPlayer.MakeScope.Var('dubois_specimen').GetValue|0+]) .#!" #NT!
 MR_HIPPOCAMPUS_CONGRESS_GLOBAL_SPECIMEN_TRIGGER_TT: "#default_text #V 100000 o más#! [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] se han recopilado en todo el mundo (actualmente [GetGlobalVariable('dubois_global_specimen').GetValue|0+]) .#!" #NT!
 MR_EXTEND_ZOO_SMALL_BUTTON: "Extender el [concept_dubois_zoo] (pequeño)" #NT!
 MR_EXTEND_ZOO_SMALL_BUTTON_TT: "#T extender el zoológico a un tamaño pequeño#!\n[Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] son la felicidad de todos: las personas se dispersan en el zoológico, los científicos pueden continuar sus estudios zoológicos y se otorga prestigio internacional a aquellos que pueden mostrar el mayor número posible de fauna extranjera. Con cada expansión, el prestigio de una nación aumenta. Algunas etapas de expansión requieren no solo recolectar muchos animales, sino también de diferentes partes del mundo. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_EXTEND_ZOO_SMALL_10_TOTAL_ANIMALS_TRIGGER_TT: "#default_text [GetPlayer.GetName] tiene #V 10 Total#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')]. Actualmente tiene [GetPlayer.MakeScope.Var('dubois_zoo_animal_total').GetValue|0+].#!" #NT!
 MR_EXTEND_ZOO_SMALL_2_SPECIAL_ANIMALS_TRIGGER_TT: "#default_text [GetPlayer.GetName] tiene #V 2 African#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] (actualmente [GetPlayer.MakeScope.Var('dubois_zoo_animal_africa').GetValue|0+]), #V 2 Asian#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] (actualmente [GetPlayer.MakeScope.Var('dubois_zoo_animal_asia').GetValue|0+]) o #V 2 Oceanic#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] (actualmente [GetPlayer.GetName]3)." #NT!
 MR_EXTEND_ZOO_SMALL_CURRENT_EXPANSION_TRIGGER_TT: "#default_text [GetPlayer.GetName] es #V que actualmente no está expandiendo#! el [concept_dubois_zoo].#!" #NT!
 MR_EXTEND_ZOO_MEDIUM_BUTTON: "Extender el [concept_dubois_zoo] (medio)" #NT!
 MR_EXTEND_ZOO_MEDIUM_BUTTON_TT: "#T extender el zoológico a tamaño mediano#!\n[Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] son la felicidad de todos: las personas se dispersan en el zoológico, los científicos pueden continuar sus estudios zoológicos y se otorga prestigio internacional a aquellos que pueden mostrar el mayor número posible de fauna extranjera. Con cada expansión, el prestigio de una nación aumenta. Algunas etapas de expansión requieren no solo recolectar muchos animales, sino también de diferentes partes del mundo. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_EXTEND_ZOO_SMALL_20_TOTAL_ANIMALS_TRIGGER_TT: "#default_text [GetPlayer.GetName] tiene #V 20 Total#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')]. Actualmente tiene [GetPlayer.MakeScope.Var('dubois_zoo_animal_total').GetValue|0+].#!" #NT!
 MR_EXTEND_ZOO_SMALL_5_SPECIAL_ANIMALS_TRIGGER_TT: "#default_text [GetPlayer.GetName] tiene #V 5 African#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] (actualmente [GetPlayer.MakeScope.Var('dubois_zoo_animal_africa').GetValue|0+]), #V 5 asiático#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] (actualmente [GetPlayer.MakeScope.Var('dubois_zoo_animal_asia').GetValue|0+]), #V 5 oceanic#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] (actualmente [GetPlayer.GetName]3) o #V 5 American #! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] (actualmente [GetPlayer.GetName]7) .#!)" #NT!
 MR_EXTEND_ZOO_LARGE_BUTTON: "Extender el [concept_dubois_zoo] (grande)" #NT!
 MR_EXTEND_ZOO_LARGE_BUTTON_TT: "#T extender el zoológico a grandes tamaño#!\n[Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] son la felicidad de todos: las personas se dispersan en el zoológico, los científicos pueden continuar sus estudios zoológicos y se otorga prestigio internacional a aquellos que pueden mostrar el mayor número posible de fauna extranjera. Con cada expansión, el prestigio de una nación aumenta. Algunas etapas de expansión requieren no solo recolectar muchos animales, sino también de diferentes partes del mundo. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_EXTEND_ZOO_SMALL_30_TOTAL_ANIMALS_TRIGGER_TT: "#default_text [GetPlayer.GetName] tiene #V 30 total#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')]. Actualmente tiene [GetPlayer.MakeScope.Var('dubois_zoo_animal_total').GetValue|0+].#!" #NT!
 MR_EXTEND_ZOO_FAMOUS_BUTTON: "Extender el [concept_dubois_zoo] (famoso)" #NT!
 MR_EXTEND_ZOO_FAMOUS_BUTTON_TT: "#T extender el zoológico a un tamaño famoso#!\n[Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] son la felicidad de todos: las personas se dispersan en el zoológico, los científicos pueden continuar sus estudios zoológicos y se otorga prestigio internacional a aquellos que pueden mostrar el mayor número posible de fauna extranjera. Con cada expansión, el prestigio de una nación aumenta. Algunas etapas de expansión requieren no solo recolectar muchos animales, sino también de diferentes partes del mundo. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_EXTEND_ZOO_SMALL_40_TOTAL_ANIMALS_TRIGGER_TT: "#default_text [GetPlayer.GetName] tiene #V 40 Total#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')]. Actualmente tiene [GetPlayer.MakeScope.Var('dubois_zoo_animal_total').GetValue|0+]#!" #NT!
 MR_SPECIMEN_GARDEN_BUTTON: "Jardín botánico encontrado" #NT!
 MR_SPECIMEN_GARDEN_BUTTON_TT: "#T encontrado jardín botánico#!\nA jardín botánico en su zoológico lo hará aún más prestigioso. Podemos plantar todas las plantas exóticas recolectadas por nuestro [concept_dubois_naturalist]. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_SPECIMEN_GARDEN_SPECIMEN_TRIGGER_TT: "#default_text [GetPlayer.GetName] tiene #V 50000 o más#! [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] (actualmente [GetPlayer.MakeScope.Var('dubois_specimen').GetValue|0+]) .#!" #NT!
 MR_SPECIMEN_GARDEN_NO_BOTANICAL_GARDEN_TRIGGER_TT: "#default_text [GetPlayer.GetName] no tiene un jardín botánico #V #! todavía.#!" #NT!
 MR_SPECIMEN_GARDEN_EFFECT_TT: "Su [GetBuildingType('building_dubois_zoo').GetName] obtendrá un jardín botánico #V#! que le brinda 50 prestigio y impulso de menor nivel de vida." #NT!
 MR_SPECIMEN_COLLECTION_BUTTON: "Colección de muestras encontradas" #NT!
 MR_SPECIMEN_COLLECTION_BUTTON_TT: "#T COLECCIÓN DE MECHOS ENCONTRADOS #!\nOrdering Todos nuestros insectos exóticos, mariposas y otros [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] mostrarían al mundo cuán avanzada científicamente está nuestra nación. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_SPECIMEN_GARDEN_NO_SPECIMEN_COLLECTION_TRIGGER_TT: "#default_text [GetPlayer.GetName] no tiene una colección de muestras #V #! todavía.#!" #NT!
 MR_SPECIMEN_COLLECTION_EFFECT_TT: "Su [GetBuildingType('building_dubois_zoo').GetName] obtendrá una colección de muestras #V#! que le brinda 50 impulsos de investigación de prestigio y menores." #NT!
 MR_BAN_ANIMAL_EXPORT_BUTTON: "Prohibir la exportación de animales" #NT!
 MR_BAN_ANIMAL_EXPORT_BUTTON_TT: "#T Ban Animal Export#!\nWith Una prohibición de las exportaciones de animales, estamos dejando en claro en principio que no estamos preparados para vender ninguno de nuestros animales en el extranjero. Otras naciones se abstendrán de consultas. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_ALLOW_ANIMAL_EXPORT_BUTTON: "Permitir la exportación de animales" #NT!
