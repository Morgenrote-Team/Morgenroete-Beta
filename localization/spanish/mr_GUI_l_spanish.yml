 MR_REMOUNT_SKELETON_BUTTON: "Volver a montar esqueleto de dinosaurio" #NT!
 MR_REMOUNT_SKELETON_BUTTON_TT: "#T RETREUNT DINOSAUR SKELELE#!\nIf Tiene cualquier imperfecto [Concept('concept_dubois_dinosaur_skeleton','$concept_dubois_dinosaur_skeletons$')] Puede dejar que su [concept_dubois_paleontologist] intente volver a montarlo. Si su paleontólogo tiene suficiente experiencia, el esqueleto de la rentabilidad podría ser de mejor calidad. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
