 MR_SYSTEMIZE_FOSSILS_BUTTON_TRIGGER: "#T Sistema de fósiles#!\nPaleontologists que no están en el camino pueden practicar un trabajo más teórico e intentar sistematizar fósiles, reconstruir los árboles familiares de los animales o rastrear el desarrollo de las plantas a lo largo de la historia de la Tierra. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
