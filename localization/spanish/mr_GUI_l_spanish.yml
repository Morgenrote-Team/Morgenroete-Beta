 MR_HIPPOCAMPUS_CONGRESS_GLOBAL_SPECIMEN_TRIGGER_TT: "#default_text #V 100000 o más#! [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] se han recopilado en todo el mundo (actualmente [GetGlobalVariable('dubois_global_specimen').GetValue|0+]) .#!"
 MR_EXTEND_ZOO_SMALL_BUTTON: "Extender el [concept_dubois_zoo] (pequeño)"
 MR_EXTEND_ZOO_SMALL_BUTTON_TT: "#T extender el zoológico a un tamaño pequeño#!\n[Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] son la felicidad de todos: las personas se dispersan en el zoológico, los científicos pueden continuar sus estudios zoológicos y se otorga prestigio internacional a aquellos que pueden mostrar el mayor número posible de fauna extranjera. Con cada expansión, el prestigio de una nación aumenta. Algunas etapas de expansión requieren no solo recolectar muchos animales, sino también de diferentes partes del mundo. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
