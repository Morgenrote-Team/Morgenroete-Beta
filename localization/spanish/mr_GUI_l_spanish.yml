 MR_IOC_FOUNDATION_BUTTON_TT: "#T descubrió que el comité olímpico internacional#!\nThe Comité Olímpico Internacional (COI) es una organización no gubernamental en forma legal de una asociación. El propósito del comité es organizar y supervisar los Juegos Olímpicos modernos. El país fundador tiene un asiento permanente en el tablero que decide en los lugares para los Juegos Olímpicos. Poco después de fundarse el COI, se puede organizar el primero de los Juegos Olímpicos, que a partir de entonces tendrán lugar cada cuatro años. Bajo ciertas condiciones, otros países pueden unirse al COI como miembros regulares, pero el número de asientos en el tablero es limitado. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_IOC_FOUNDATION_HAS_ACADEMIC_TRIGGER_TT: "#default_text [GetPlayer.GetName] tiene al menos uno [concept_academics_academic].#!" #NT!
 MR_IOC_FOUNDATION_PEACE_TRIGGER_TT: "#default_text [GetPlayer.GetName] está en paz.#!" #NT!
 MR_IOC_MEMBER_BUTTON: "Únete al COI" #NT!
 MR_IOC_MEMBER_BUTTON_TT: "#T Conviértase en miembro del IOC#!\nJoin El Comité Olímpico Internacional para competir en los Juegos Olímpicos Quadrienal. Los miembros del COI también tienen la oportunidad de mantener los juegos en su propio país. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_IOC_MEMBER_INFAMY_TRIGGER_TT: "#default_text [GetPlayer.GetName] La infamia es menor que #n 50#!.#!" #NT!
 MR_IOC_MEMBER_NOT_UNRECOGNIZED_TRIGGER_TT: "#default_text [GetPlayer.GetName] es #V no se reconoce#!.#!" #NT!
 MR_IOC_MEMBER_NOT_HOSTING_TRIGGER_TT: "#default_text [GetPlayer.GetName] es #V no el host olímpico actual#!.#!" #NT!
 MR_IOC_BRIBE_BUTTON: "Sobornar el COI" #NT!
 MR_IOC_BRIBE_BUTTON_TT: "#T soborna el IOC#!\nWith una generosa 'donación' a la junta directiva del COI, podemos asegurar la buena voluntad de los miembros y ser colocados como el cuarto candidato en la distribución de los próximos Juegos Olímpicos. Sin embargo, no hay garantía de que seamos seleccionados después. Los otros miembros del COI también podrían malinterpretar nuestra generosidad. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_IOC_BRIBE_NOT_BRIBING_ALREADY_TRIGGER_TT: "#default_text [GetPlayer.GetName] es #V que aún no soborna el ioc#!.#!" #NT!
 MR_OLYMPIC_FLAME_BUTTON: "La llama olímpica" #NT!
 MR_OLYMPIC_FLAME_BUTTON_TT: "#T La Llama Olímpica#!\nThe Olympic Flame, basada en el fuego del hogar siempre quemado de la diosa griega Hestia, se introdujo por primera vez en los Juegos Olímpicos de 1928 en Amsterdam. La tradición del relevo de la antorcha olímpica asociada se introdujo en los Juegos de Verano en Berlín en 1936. Contrariamente a la creencia popular, la idea no provenía de los nacionalsociales, sino del arqueólogo alemán judío Alfred Schiff. La introducción de esta tradición no solo les daría a los Juegos Olímpicos un nuevo símbolo de identificación, sino que también reuniría a la población cada año y actuaría como un símbolo estimulante para distraer de otras quejas. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_IOC_OLYMPIC_FLAME_IS_HOST_TRIGGER_TT: "#default_text [GetPlayer.GetName] se está preparando para alojar los próximos juegos olímpicos#!.#!" #NT!
  
 MR_OLYMPICS_AND_SPORTS_INFORMATION: "#T el IOC#!\nPresident: [GetPlayer.GetCustom('vikelas_ioc_president_type')] \ nmembers: [GetGlobalVariable('vikelas_olympic_participants_global_var').GetValue|V0] \ nheld Juegos olímpicos: [GetGlobalVariable('vikelas_olympic_games_number_global_var').GetValue|V0] \ n \ n#T deportes en [GetPlayer.GetFlagTextIcon]#!\nOlympic medallas de oro: [GetPlayer.MakeScope.Var('vikelas_gold_medals_var').GetValue|V0] @vikelas_gold_medals! [GetPlayer.GetCustom('vikelas_has_football_league_type')]#!\nPresident:0" #NT!
