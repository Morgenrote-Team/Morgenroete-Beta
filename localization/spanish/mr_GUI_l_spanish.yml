 MR_SAFARI_EXPEDITION_BUTTON_TT: "#T HEIA Safari#!\nOn Un safari africano, a través de un seguimiento y captura constantes, se puede capturar un gran juego y luego transportarse a un [concept_dubois_zoo]. Solo es posible atrapar un animal por safari. Dependiendo de la especie animal, difiere si necesita trampas o si tiene que permanecer en su rastro. Como regla general, los animales grandes y lentos necesitan más trampas, mientras que los animales rápidos requieren más seguimiento. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_SAFARI_EXPEDITION_NATURALIST_TRIGGER_TT: "#default_text [GetPlayer.GetName] tiene un [concept_dubois_naturalist] que es #V no ocupado#!.#!"
 MR_SAFARI_EXPEDITION_HAS_SMALL_OR_BIGGER_ZOO_TRIGGER_TT: "#default_text tiene un [concept_dubois_zoo] que es al menos #V pequeño tamaño#!.#!"
 MR_SAFARI_EXPEDITION_HABITAT_TRIGGER_TT: "#default_text [GetPlayer.GetName] #V posee al menos un hábitat animal africano#! con un gran juego o hay un hábitat en un estado #V propiedad de una nación descentralizada#!.#!"
 MR_SAFARI_EXPEDITION_RECENT_TRIGGER_TT: "#default_text [GetPlayer.GetName] no es #V en un safari#! o #V recientemente tuvo un one#!.#!"
 MR_ZOOLOGICAL_EXPEDITION_BUTTON_TT: "#T Captura de animales locales#!\nOur La nación tiene hábitats animales con especies fascinantes que podrían mostrarse en un [concept_dubois_zoo]. Un [concept_dubois_naturalist] es viajar por todo el país durante un año para recolectar [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] para un zoológico. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ZOOLOGICAL_EXPEDITION_LOCAL_ANIMALS_TRIGGER_TT: "#default_text [GetPlayer.GetName] posee al menos un hábitat animal que alberga un [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] que no vive en nuestro [concept_dubois_zoo].#!"
 MR_ZOOLOGICAL_EXPEDITION_CURRENT_EXPEDITION_TRIGGER_TT: "#default_text [GetPlayer.GetName] no es #V actualmente atrapando animales locales#!.#!"
 MR_BOTANICAL_EXPEDITION_BUTTON_TT: "#T Expedición botánica#!\nBotanical Expediciones (a veces llamadas 'caza de plantas') son viajes científicos diseñados para explorar la flora de una región en particular. Un [concept_dubois_naturalist] sería responsable de la identificación, descripción y colección de especímenes. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_SAFARI_EXPEDITION_BANNED_TRIGGER_TT: "#default_text Las expediciones botánicas han sido prohibidas por #V razones políticas#!.#!"
 MR_SAFARI_EXPEDITION_ACCESS_RAINFOREST_TRIGGER_TT: "#default_text [GetPlayer.GetName] #V posee una selva tropical#! en al menos un estado. Las selvas tropicales tienen los siguientes modificadores de estado: #V Amazon Forest#!, #V Congo Forest#!, #V Borneo Forest#! y #V Indochinese Forest#!.#!"
 MR_BOTANICAL_EXPEDITION_RECALL_BUTTON_TT: "#T Recuerde el naturalista de la expedición botánica#!\nOrders El [concept_dubois_naturalist] de su investigación botánica para usarlo para otros fines, como capturar animales. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BOTANICAL_EXPEDITION_RECALL_TRIGGER_TT: "#default_text Su [concept_dubois_naturalist] no es #V ni viajes ni enfermo#!.#!"
 MR_BOTANICAL_EXPEDITION_RECALL_NATURALIST_EFFECT_TT: "Su [concept_dubois_naturalist] ya no está ocupado."
 MR_HIPPOCAMPUS_CONGRESS_BUTTON: "Congreso del hipocampo"
 MR_HIPPOCAMPUS_CONGRESS_BUTTON_TT: "#T Hippocampus Congress#!\nHow único es el hombre? ¿Cuánto de un animal es él? Los antiguos griegos ya habían notado una cercanía entre humanos y simios. El hecho de que Carl Linneaus clasificara simios y humanos como primates, el rango \"más alto\" entre los animales, muestra que el campo una vez no fue tan controvertido. Sin embargo, con la formulación de la teoría de la evolución y el presunto descenso de los humanos de un pariente similar a un simio, han surgido conflictos que ahora deben resolverse. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
