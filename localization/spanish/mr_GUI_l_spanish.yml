 MR_GERMAN_MUSIC_ASSOCIATION_BUTTON: "Encontró la Asociación General de Música Alemana"
 MR_GERMAN_MUSIC_ASSOCIATION_BUTTON_TT: "#T encontró que la Asociación General de Música Alemana#!\nThe Allgemeiner Deutscher Musikverein (ADMV, 'Asociación General de Música Alemana') fue una asociación musical alemana fundada en 1861 por Franz Liszt y Franz Brendel, para encarnar los ideales musicales de la nueva Escuela de Música alemana. El ADMV dirigió tanto al rendimiento musical como al apoyo práctico. Como parte de los objetivos artísticos de la ADMV, se organizaría Tonkünstler-Inversammlungen anual en diferentes lugares, con actuaciones de importantes, raramente escuchadas y especialmente nuevas obras musicales de todo tipo. Sin embargo, las obras más antiguas que rara vez se escucharon o no se escucharon en absoluto, pero de interés debido a su importancia, también debían realizarse."
 MR_CIVIL_ENGINEER_RAILWAY_BUTTON_TT: "#T Railroad Project#!\nLet your [concept_tesla_engineer] focus on improving the [GetBuildingType('building_railway').GetName] in [GetPlayer.GetName]. You will be able to prioritize states and the railways in those states will get the $tesla_modernized_railway_lines_building_modifier_with_tooltip$ [concept_modifier] which improves the [concept_throughput] of the building.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
