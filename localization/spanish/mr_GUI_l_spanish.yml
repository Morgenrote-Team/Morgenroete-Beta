 MR_CIVIL_ENGINEER_CONSTRUCTION_BUTTON: "Proyecto de construcción" #NT!
 MR_CIVIL_ENGINEER_CONSTRUCTION_BUTTON_TT: "#T Proyecto de construcción#!\nLet Su [concept_gaudi_engineer] Centrarse en modernizar el [GetBuildingType('building_construction_sector').GetName] de [GetPlayer.GetName]. Esto agregará pequeñas bonificaciones en [concept_throughput], [concept_good_production] y [concept_input_mult] a su edificio. Este proyecto agregará los gastos #n#! a su país. \ N \ n#!\nLet0" #NT!
