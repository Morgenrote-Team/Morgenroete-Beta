 MR_IMPRESSIONISM_BUTTON: "Impresionismo" #NT!
 MR_IMPRESSIONISM_BUTTON_TT: "#T Elija Impressionism#!\n[concept_elgar_impressionism] es un estilo en la historia del arte que se caracteriza por la descripción atmosférica de instantáneas fugaces de una escena. Salió de un movimiento dentro de la pintura en Francia en la segunda mitad del siglo XIX. El término impresionismo también se ha aplicado a ciertos estilos de música, literatura, cine y fotografía. Mientras que muchos naturalistas como Heinrich Hart rechazaron la música como un medio para expresar un "accionismo de búsqueda de la verdad", los impresionistas a menudo consideraban el "sueño sin objetos" a los acordes coloridos finamente graduados como un placer." #NT!
 MR_POWERFUL_LANDOWNERS_TRIGGER_TT: "#default_text Los [GetPlayer.GetAdjective] [GetInterestGroupVariant('ig_landowners',GetPlayer).GetName] son [concept_powerful].#!" #NT!
 MR_NOT_POWERFUL_INTELLIGENTSIA_TRIGGER_TT: "#default_text El [GetPlayer.GetAdjective] [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName] no es [concept_powerful].#!" #NT!
 MR_HAPPY_INTELLIGENTSIA_TRIGGER_TT: "#default_text El [GetPlayer.GetAdjective] [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName] tiene un [concept_approval] de #V 5 o superior#!.#!" #NT!
 MR_EXPRESSIONISM_BUTTON: "Expresionismo" #NT!
 MR_EXPRESSIONISM_BUTTON_TT: "#T Elija Expressionism#!\n[concept_elgar_expressionism] es un estilo en el arte. Sus inicios y precursores se pueden encontrar a fines del siglo XIX. Al igual que el impresionismo, el simbolismo y el fauvismo, el expresionismo es un movimiento contra las tendencias del naturalismo. En el expresionismo, el nivel expresivo supera el nivel estético, apelativo y de hecho. El artista quiere representar su experiencia para el espectador. En contraste con el impresionismo musical, que representa la percepción de la apariencia externa de las cosas, los movimientos artísticos expresionistas formulan las emociones del alma humana. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_POWERFUL_INTELLIGENTSIA_OR_TRADE_UNIONS_TRIGGER_TT: "#default_text, ya sea [GetPlayer.GetAdjective] [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName] o [GetInterestGroupVariant('ig_trade_unions',GetPlayer).GetName] son [concept_powerful].#!" #NT!
 MR_NOT_POWERFUL_LANDOWNERS_TRIGGER_TT: "#default_text El [GetPlayer.GetAdjective] [GetInterestGroupVariant('ig_landowners',GetPlayer).GetName] no son [concept_powerful].#!" #NT!
 MR_HAPPY_INTELLIGENTSIA_OR_TRADE_UNIONS_TRIGGER_TT: "#default_text, ya sea [GetPlayer.GetAdjective] [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName] o [GetInterestGroupVariant('ig_trade_unions',GetPlayer).GetName] tiene un [concept_approval] de #V 5 o superior#!.#!" #NT!
 MR_ART_NOUVEAU_BUTTON: "Art nouveau" #NT!
 MR_ART_NOUVEAU_BUTTON_TT: "#T Elija Art Nouveau#!\n[concept_elgar_art_nouveau], principalmente en relación con Italia también Stile Liberty, es una época histórica de arte a principios del siglo XIX al siglo XX. Las corrientes que se pueden asignar a Art Nouveau son el estilo de reforma (después del movimiento de reforma), el estilo de secesión (después de la secesión de Viena), el modernismo en Cataluña, al estilo de Suiza Sapin y en el estilo de Tiffany de EE. UU. Además de la expresión Art Nouveau, que es dominante en francés, inglés e italiano, el estilo moderno también se usa en inglés y stileale en italiano. En términos de tiempo, Art Nouveau pertenece al fin de siècle. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
