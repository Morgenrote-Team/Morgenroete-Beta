 MR_RED_CROSS_BUTTON: "Encontró el [concept_panum_red_cross]" #NT!
 MR_RED_CROSS_BUTTON_TT: "#T encontró que la Cruz Roja Internacional [concept_panum_red_cross]#!\nThe es ​​una de las primeras instituciones supranacionales. El establecimiento de esta organización fue un paso importante hacia el derecho internacional. Fue fundado para proteger la vida y la salud humana, para garantizar el respeto de todos los seres humanos y para prevenir y aliviar el sufrimiento humano. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
