 MR_EXTEND_ZOO_FAMOUS_BUTTON: "Extender el [concept_dubois_zoo] (famoso)"
 MR_EXTEND_ZOO_FAMOUS_BUTTON_TT: "#T extender el zoológico a un tamaño famoso#!\n[Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] son la felicidad de todos: las personas se dispersan en el zoológico, los científicos pueden continuar sus estudios zoológicos y se otorga prestigio internacional a aquellos que pueden mostrar el mayor número posible de fauna extranjera. Con cada expansión, el prestigio de una nación aumenta. Algunas etapas de expansión requieren no solo recolectar muchos animales, sino también de diferentes partes del mundo. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
