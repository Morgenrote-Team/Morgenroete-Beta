 MR_AUTORACING_LONG_DISTANCE_BUTTON: "Carrera de resistencia" #NT!
 MR_AUTORACING_LONG_DISTANCE_BUTTON_TT: "#T Organizar una carrera de resistencia#!\nEndurance, a menudo de ciudad a ciudad, fue la norma en los primeros días de las carreras de automóviles y continuó hasta mediados del siglo XX. En Italia, las razas como Targa Florio o Mille Miglia son los ejemplos más conocidos. Pusieron al hombre y a la máquina a una prueba especial y durante mucho tiempo se consideraron las verdaderas carreras nacionales de automóviles. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
  
 MR_AUTORACING_FOUND_GRAND_PRIX_BUTTON: "Encontrado Gran Premio" #NT!
 MR_AUTORACING_FOUND_GRAND_PRIX_BUTTON_TT: "#T encontró Grand Prix Racing#!\nIn 1906, el primer Gran Premio oficial en la historia automotriz se organizó con la carrera para el Gran Premio de L'Acf. Independientemente del país de origen, se aprobaron hasta tres autos de carreras por fabricante de automóviles, como lo solicitó originalmente los representantes de la industria francesa. De acuerdo con su estado como la más importante de todas las competiciones, la carrera se celebró a una distancia de más de 1200 km y en dos días consecutivos. En 1925, a instigación del Automobile Club de Italia, finalmente se anunció la introducción de un campeonato mundial oficial. Las tres carreras oficiales del Gran Premio de la temporada (Francia, Italia y Bélgica) fueron designadas como carreras, así como Indianapolis como el evento de carreras estadounidense más importante. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_AUTORACING_FOUND_GRAND_PRIX_BUTTON_TRIGGER_TT: "#default_text #V al menos otros 5 países#! tienen un club de automóvil #V#! e investigado [GetTechnology('organized_sports').GetName].#!" #NT!
  
 MR_AUTORACING_RACE_TRACK_BUTTON: "Construir una pista de carreras" #NT!
 MR_AUTORACING_RACE_TRACK_BUTTON_TT: "#T construir una pista de carreras#!\nWith Las carreras de Grand Prix, la pista de carreras fija se está convirtiendo cada vez más en la norma para las carreras de autos. Una pista de carreras dedicada no solo centralizaría los eventos de carreras internacionales en un lugar, sino que como pista de prueba también le daría a nuestros pilotos de carreras un bono de experiencia cada año. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
