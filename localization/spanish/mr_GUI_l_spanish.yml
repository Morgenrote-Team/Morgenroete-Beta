 MR_PROMOTE_ENGINEER_TT: "#T Promote Engineer#!\n[Concept('concept_tesla_engineer','$concept_tesla_engineers$')] are versatile technicians in the military and in construction. They also speed up the construction of monuments by twice as much.\n\n#n Note:#! You can only have one Engineer at a time.[GetPlayer.GetCustom('mr_promote_has_engineer_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTE_ASTRONOMER_TT: "#T promover astrónomo#!\n[Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')] Encuentre nuevos objetos astronómicos, descubra estrellas y planetas o puede participar en congresos astronómicos. \ N \ n#n Nota: #! Solo puede tener un astrónomo a la vez."
 MR_PROMOTE_CHEMIST_TT: "#T promover Chemist#!\n[Concept('concept_mendelejew_chemist','$concept_mendelejew_chemists$')] son científicos que se centran en el descubrimiento de nuevos elementos y en mejorar su industria química. \ N \ n#n Nota: #! Solo puede tener un químico a la vez."
 MR_PROMOTE_GEOLOGIST_TT: "#T promover geologist#!\n[Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')] Minerales de estudio, volcanes y otras formaciones geológicas. \ N \ n#n Nota: #! Solo puede tener un geólogo a la vez.[GetPlayer.GetCustom('mr_promote_has_geologist_type')] \ n \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTE_NATURALIST_TT: "#T promover naturalist#!\n[Concept('concept_dubois_naturalist','$concept_dubois_naturalists$')] puede capturar animales en el hogar o en el extranjero, encontrar especímenes o liderar expediciones botánicas. \ N \ n \ n#n Nota: #! Solo puede tener un naturalista a la vez."
 MR_PROMOTE_PALEONTOLOGIST_TT: "#T promover paleontólogo#!\n[Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')] puede examinar las formaciones geológicas para fósiles y huesos de dinosaurio o encontrarlos en expediciones. \ N \ n#n Nota: #! Solo puede tener un paleontólogo a la vez."
 MR_PROMOTE_ARCHAEOLOGIST_TT: "#T promover arqueólogo#!\n[Concept('concept_lepsius_archaeologist','$concept_lepsius_archaeologists$')] puede encontrar artefactos, hacer descubrimientos importantes y asistir a conferencias arqueológicas. \ N \ n#n Nota: #! Solo puede tener un arqueólogo a la vez."
 MR_PROMOTE_ANTHROPOLOGIST_TT: "#T promover antropólogo#!\n[Concept('concept_lepsius_anthropologist','$concept_lepsius_anthropologists$')] Estudia los orígenes de los humanos, desde el comienzo de la evolución humana hasta la edad de piedra. \ N \ n#n Nota: #! Solo puede tener un antropólogo a la vez."
 MR_PROMOTE_COMPOSER_TT: "#T promover composer#!\n[Concept('concept_elgar_composer','$concept_elgar_composers$')] son necesarios para crear una cultura musical próspera. Ayudarán a un país a crear más [concept_elgar_musical_tradition]. \ N \ n#n Nota: #! Solo puede tener un compositor a la vez."
 MR_PROMOTE_WRITER_TT: "#T Promocione escritor#!\n[Concept('concept_manzoni_writer','$concept_manzoni_writers$')] son maestros de narración de cuentos y trabajan en libros y otras literatura. Con su trabajo, fortalecen a los países [concept_manzoni_literary_tradition]. \ N \ n#n Nota: #! Solo puede tener un escritor nacional y 3 escritores locales a la vez. [GetPlayer.GetCustom('mr_promote_has_writers_type')] \ n \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTE_PAINTER_TT: "#T Promover impresiones de captura de pintor#!\n[Concept('concept_klimt_painter','$concept_klimt_painters$')] de captura, paisajes y las maravillas del mundo en lienzo. A través de sus obras maestras, fortalecen el [concept_klimt_painting_tradition] de un país. \ N \ n#n nota: #! solo puede tener un pintor a la vez."
