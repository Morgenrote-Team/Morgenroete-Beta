 MR_GEOLOGIST_AGE_EARTH_BUTTON_TT: "#T Calcule la edad de la Tierra#!\nA El geólogo puede calcular la edad de la Tierra una vez en su vida y presentar su teoría a todos los demás geólogos. Si están de acuerdo, su determinación del tiempo de la Tierra será la decisiva. Si es rechazado, puede intentarlo nuevamente después de un período de depresión. Para presentar una nueva teoría, la puntuación geológica nacional debe ser más alta que la puntuación utilizada para determinar la última edad de la Tierra. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GEOLOGIST_AGE_EARTH_ACTIVE_TT: "#T Calcule la edad de la tierra#!\n#p Su geólogo está calculando la edad de la Tierra."
 MR_GEOLOGIST_CAN_CALCULATE_TRIGGER_TT: "#default_text [GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetFullName] aún no ha presentado una determinación internacionalmente autorizada de la edad de la Tierra."
 MR_GEOLOGIST_CALCULATE_AGE_TRIGGER_TT: "#default_text La puntuación geológica nacional es más alta que la puntuación utilizada para determinar la última edad de la Tierra."
 MR_GEOLOGIST_NO_AGE_DEBATE_TRIGGER_TT: "#default_text actualmente no hay ningún debate sobre la edad de la tierra."
 MR_GEOLOGIST_NOT_DEMOTIVATED_TRIGGER_TT: "#default_text [GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetFullName] no está desmotivado.#!"
 MR_GEOLOGIST_OIL_STOP_BUTTON_TT: "#T Deje de prospección de aceite#!\nYour [concept_agassiz_geologist] actualmente está buscando nuevos pozos de petróleo cerca de plataformas petroleras ya establecidas y, por lo tanto, aumenta la producción. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 mr_geologist_oil_stop_button_effect_tt: "Su [concept_agassiz_geologist] dejará de prospectar petróleo."
 MR_GEOLOGIST_GEOLOGICAL_RESEARCH_BUTTON_TT: "#T Geological Research#!\nA El geólogo puede viajar por el país durante 5 años para expandir su conocimiento. De esta manera, también puede encontrar formaciones geológicas, cuevas o (más tarde) incluso uranio. Los geólogos que tienen el rasgo mineralogista duplican el número de minerales adquiridos anualmente. Al final de su búsqueda, los geólogos obtienen minerales adicionales, experiencia y el rasgo de mineralogista si aún no lo tienen. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 mr_geologist_geological_research_stop_effect_tt: "Su [concept_agassiz_geologist] detendrá su investigación geológica."
 MR_GEOLOGIST_UNDERWATER_MOUNTAINS_ACTIVE_TT: "#T Explorando las montañas del Atlántico#!\n#p Su [concept_agassiz_geologist] actualmente está explorando las montañas del Atlántico."
 MR_GEOLOGIST_TECTONICS_CONGRESS_BUTTON: "Congreso sobre Drift Continental"
 MR_GEOLOGIST_TECTONICS_CONGRESS_BUTTON_TT: "#T Congreso sobre la deriva continental#!\nFor Siglos La creencia era inquebrantable de que los continentes fueran fijos e inmóviles. Un eminente geólogo con considerable conocimiento geológico podría colapsar este mantra. Si lo administrará es bastante cuestionable. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GEOLOGIST_CONGRESS_KNOWLEDGE_TRIGGER_TT: "#default_text [GetPlayer.GetName] tiene #V 50 o más#! @AGassiz_Geological_Knowledge! [concept_agassiz_geological_knowledge] (actualmente [GetPlayer.MakeScope.Var('agassiz_geological_knowledge_var').GetValue|0+]) .#!"
 MR_ASTRONOMER_ACTIVE_TRIGGER_TT: "#default_text [GetPlayer.GetName] tiene un [concept_verrier_astronomer] que #V no es ocupado#!.#!"
 MR_ASTRONOMER_MOON_MAP_BUTTON_TT: "#T Maps the Moon#!\nWith La ayuda de la cámara y los telescopios modernos, es posible mapear todo el compañero de la Tierra en calidad sin precedentes. Un mapa de luna sería un hito en la astronomía. Sin embargo, un astrónomo encontrará menos objetos astronómicos si persigue estudios selenográficos. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ASTRONOMER_MOON_MAP_ACTIVE_TT: "Mapee la luna \ n#p Su [concept_verrier_astronomer] actualmente está mapeando la luna tomando [Concept('concept_verrier_moon_photo','$concept_verrier_moon_photos$')].#!"
