 MR_CRETACEOUS_SCENERY_BUTTON_TT: "#T Construya un paisaje cretáceo#!\nAs pronto, ya que el conocimiento geológico global alcanza un cierto nivel, los paleontólogos pueden establecer una habitación con paisajes prehistóricos en las universidades. Solo un paisaje es posible por universidad. En este caso, deje que su paleontólogo construya un paisaje del período Cretácico. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
