 MR_EXTINCTION_CONGRESS_5_COUNTRIES_DINOSAUR_SKELETON_TRIGGER_TT: "#default_text al menos #V 5 países#! tienen al menos #p 1#! @dubois_dinosaur_skeleton! [concept_dubois_dinosaur_skeleton].#!"
