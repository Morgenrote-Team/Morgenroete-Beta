 MR_AERONAUTICAL_ENGINEER_GIANT_ZEPPELIN_BUTTON_TT: "#T El viaje gigante Zeppelin#!\nAirship ha alcanzado su pico. Nuestra nación es considerada como el lugar de nacimiento de los Zeppelins más grandes y tristes del mundo. Es hora de sorprender al mundo entero con una aeronave gigantesca y viajar por el mundo. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_AERONAUTICAL_ENGINEER_AIRLINE_LEVEL_4_TRIGGER_TT: "#default_text [GetPlayer.GetName] tiene un [concept_curtiss_airline] de nivel #V 4 o superior#!.#!"
 MR_AERONAUTICAL_ENGINEER_ZEPPELIN_FOCUS_TRIGGER_TT: "#default_text [GetPlayer.GetName] tiene el #V \ \"$curtiss_zeppelin_focus_modifier$ \" #! [concept_modifier].#!"
 MR_AERONAUTICAL_ENGINEER_GIANT_AIRPLANE_BUTTON: "Avión gigante"
 MR_AERONAUTICAL_ENGINEER_GIANT_AIRPLANE_BUTTON_TT: "#T avión gigante#!\nThe Sky es el último límite. Lo que una vez fue la edad del descubrimiento en el período moderno temprano es ahora la conquista de los cielos. Pero en comparación con los galeones de los españoles, los vasos celestiales de hoy son meras cáscaras de nuez. Los gigantes oceánicos navegan hoy los mares, pero hasta ahora los cielos solo han estado dominados por máquinas pequeñas. El sueño de construir un avión gigantesco que pueda transportar no docenas, pero cientos de personas parece utópica. Pero una próspera industria de aviones y una poderosa aerolínea encabezada por el hombre correcto podrían voltear el mundo al revés ... \ n \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
