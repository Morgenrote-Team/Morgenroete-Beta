 MR_PALEONTOLOGICAL_EXPEDITION_BUTTON_TT: "#T Expedición paleontológica#!\nSend su [concept_dubois_paleontologist] en un [concept_dubois_paleontological_expedition]. Una expedición lleva 1 año y da como resultado una cantidad de [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] y [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')]. \ N \ nat el final de una expedición Puede dejar un [concept_dubois_paleontological_team] para configurar un [concept_dubois_paleontological_excavation]. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
