 vikelas_custom_racer_loc: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] es un [concept_vikelas_racer] con una experiencia de [GetPlayer.MakeScope.Var('vikelas_racer_var').GetVariable('vikelas_racer_experience').GetValue|+0] / 150. Alcanzar una experiencia de 150 elevará su rasgo de habilidad a #V Racer famosa#!." #NT!
