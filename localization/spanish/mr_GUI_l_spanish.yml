 MR_CHEMIST_CONGRESS_BUTTON: "Congreso químico" #NT!
  
 MR_CHEMIST_TRIGGER_TT: "#default_text tiene un [concept_mendelejew_chemist].#!" #NT!
 MR_CHEMIST_CONGRESS_5_CHEMISTS_TRIGGER_TT: "#default_text al menos #V 5 países#! tienen un [concept_mendelejew_chemist].#!" #NT!
 MR_CHEMIST_CONGRESS_ELEMENTS_TRIGGER_TT: "#default_text Se verificaron un total de al menos #V 60#! [Concept('concept_mendelejew_element','$concept_mendelejew_elements$')] en todo el mundo [GetGlobalVariable('mendelejew_isolated_elements_global_number_var').GetValue|+0]) .#!" #NT!
  
 MR_MOUNT_SKELETON_ACTIVE_TT: "#T Construya el esqueleto de dinosaurio#!\n#p Su paleontólogo está construyendo un esqueleto de dinosaurio." #NT!
 MR_REMOUNT_SKELETON_ACTIVE_TT: "#T RETREUNT DINOSAURAURAURAURATRO #!\n#p Su paleontólogo actualmente está volviendo a montar un esqueleto de dinosaurio. Si su paleontólogo tiene suficiente experiencia, el esqueleto de la rentabilidad podría ser de mejor calidad." #NT!
  
 MR_UPPER_EGYPT_EXPEDITION_ACTIVE_TT: "#T Expedición al valle de los reyes#!\n#p Su arqueólogo se encuentra actualmente en una expedición al valle del rey.#!\nWith Las viejas tebimas de la capital y el valle de los reyes, el Alto Egipto, se considera la Meca de la Egiptología. Deberíamos adquirir una licencia de excavación para el área y buscar tesoros egipcios." #NT!
 MR_LOWER_EGYPT_EXPEDITION_ACTIVE_TT: "#T Expedición a las pirámides#!\n#p Su arqueólogo se encuentra actualmente en una expedición a las pirámides. Se dice que otras tumbas, templos e incluso ciudades que han desaparecido en las arenas del Bajo Egipto están esperando ser redescubridas." #NT!
 MR_BABYLONIA_EXPEDITION_ACTIVE_TT: "#T Expedición a Babilonia#!\n#p Su arqueólogo se encuentra actualmente en una expedición a Babilonia. La región se considera la 'cuna de la civilización' donde se descubren artefactos arqueológicos preciosos una y otra vez. Definitivamente pertenecen a un museo." #NT!
 MR_ASSYRIA_EXPEDITION_ACTIVE_TT: "#T Expedición a Asiria#!\n#p Su arqueólogo se encuentra actualmente en una expedición a Asiria. El escaso conocimiento sobre el país aún se remonta a la Biblia como fuente, pero ¿tal vez hay evidencia histórica que es más confiable?" #NT!
 MR_ARGOLIS_EXPEDITION_ACTIVE_TT: "#T Expedición a Argolis#!\n#p Su arqueólogo se encuentra actualmente en una expedición a Argolis.#!\nAfter El descubrimiento de Troy, incluso los científicos escépticos se dan cuenta de que los mitos de los antiguos griegos son más que solo cuentos de hadas. Se dice que los restos de las ciudades de la Edad de Bronce se encuentran en Argolis hasta el día de hoy, la más conocida de las cuales es las micenas. Deberíamos convencernos de eso." #NT!
 MR_CRETE_EXPEDITION_ACTIVE_TT: "#T Expedición a Crete#!\n#p Su arqueólogo se encuentra actualmente en una expedición a Creta. Similar a Troy y Micenas, también parece haber algo para esta historia: los artefactos de la legendaria cultura minoica se encuentran cada vez más en la isla. Nuestra nación también debe asegurar algunos de ellos." #NT!
 MR_YUCATAN_EXPEDITION_ACTIVE_TT: "#T Expedición a Yucatán#!\n#p Su arqueólogo se encuentra actualmente en una expedición a Yucatán.#!\nReports de ciudades desconocidas y enormes en el medio de la jungla aumentó. Deberíamos investigar más a fondo y enviar una expedición arqueológica a Yucatán." #NT!
 MR_PERU_EXPEDITION_ACTIVE_TT: "#T Expedición a Peru#!\n#p Su arqueólogo se encuentra actualmente en una expedición a Perú. ¿Quizás los españoles no destruyeron completamente la cultura de los incas? Algunas ciudades de resistencia indígena no se han encontrado hasta el día de hoy." #NT!
  
 MR_FOSSIL_IDENTIFICATION_ACTIVE_TT: "#T Identificar fósiles#!\n#p Su antropólogo está identificando fósiles actualmente. Si se las arregla para asignar tres huesos a la misma especie, puede sistematizar con éxito esta especie. El tiempo que lleva identificar correctamente un hueso depende de la experiencia del antropólogo." #NT!
  
 MR_CONDUCTING_ACTIVE_TT: "#p Su compositor está llevando a cabo una temporada en la ópera.#!\n[Localize('concept_elgar_conducting_desc')]" #NT!
 MR_MUSIC_TOUR_ACTIVE_TT: "#p Su compositor se encuentra actualmente en una gira musical.#!\n[Localize('concept_elgar_musical_tour_desc')]" #NT!
  
 MR_NEWSPAPER_NOVEL_ACTIVE_TT: "#T Novela de periódico#!\n#p Su escritor actualmente está escribiendo una novela de periódico. Muchos escritores conocidos de la época, como Tolstoi, Dostoyevsky, Flaubert y Dumas, publicaron por primera vez sus novelas como novelas en serie en periódicos antes de que se publicaran como libros." #NT!
 MR_READNG_TOUR_ACTIVE_TT: "#T Reading Tour#!\n#p Su escritor está actualmente en una gira de lectura. Esto no solo promoverá relaciones mutuas, sino también su reputación." #NT!
  
 MR_PAINTER_TRIP_ACTIVE_TT: "#T Educational Journey#!\n#p Su pintor se encuentra actualmente en un viaje educativo. También pueden adquirir otros rasgos positivos y negativos durante su estadía en un [concept_artists_center_of_arts] extranjero." #NT!
  
 MR_MOUNTAIN_EXPEDITION_ACTIVE_TT: "#T Expedition de Mountain#!\n#p actualmente hay una expedición de montaña en curso. Una tendencia que solo aumentó durante los siglos XIX y XX. Si tengamos una cordillera en uno de nuestros territorios que aún no se ha escalado, podríamos delegar la conquista a un general capaz con las habilidades apropiadas." #NT!
  
 MR_AIR_COMBAT_MISSION_ACTIVE_TT: "#T Air Combat Mission#!\n#p Su piloto se encuentra actualmente en una misión de combate aéreo." #NT!
 MR_AIRCRAFT_PARADE_ACTIVE_TT: "#T Desfile de aeronaves#!\n#p Su piloto actualmente participa en un desfile de aeronaves." #NT!
  
