 MR_WORLDCUP_BUTTON: "Copa del Mundo de fútbol" #NT!
 MR_WORLDCUP_BUTTON_TT: "#T Organice la Copa Mundial de Fútbol Mundial Índice es una competencia de fútbol para los equipos nacionales. Los equipos pueden calificar para las finales de la Copa Mundial cada cuatro años. En un torneo de cuatro semanas, el mejor equipo nacional estará determinado como campeón mundial. La Asociación Mundial de Fútbol Fédération Internationale de Football Association (FIFA) organiza y comercializa el torneo. La primera Copa Mundial tuvo lugar en Uruguay en 1930 y fue ganado por el equipo anfitrión. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_FOOTBALL_WORLDCUP_FOOTBALL_ASSOCIATION_TRIGGER_TT: "#default_text Hay al menos #G 16#! países con una asociación de fútbol.#!" #NT!
  
