 MR_ASTRONOMER_DISCOVER_SATELLITES_BUTTON_TT: "#T Descubra nuevos satélites#!\nMany Los planetas en el sistema solar aún no han descubierto el natural [Concept('concept_verrier_satellite','$concept_verrier_satellites$')] similar a la luna de la Tierra. Dependiendo del nivel de tecnología, los métodos de producción en nuestro observatorio y las habilidades del astrónomo, puede surgir la posibilidad de encontrar un compañero planetario previamente completamente desconocido. Sin embargo, un astrónomo encontrará menos objetos astronómicos si busca nuevos satélites. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
