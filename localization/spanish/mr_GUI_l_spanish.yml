 MR_BEETHOVEN_MONUMENT_BUTTON: "Construye el Monumento Beethoven"
 MR_BEETHOVEN_MONUMENT_BUTTON_TT: "#T Build the Beethoven Monument#!\nThere No hay duda de que Ludwig Van Beethoven fue el mejor compositor de todos los tiempos y que toda la música romántica es una consecuencia de su trabajo. Cada artista contemporáneo le debe un tributo. Es aún más sorprendente que todavía sea muy poco apreciado. Sin embargo, después de una apelación de Robert Schumann, varias asociaciones, ciudades, príncipes y gobiernos recolectaron dinero para erigir un monumento en su lugar de nacimiento Bonn. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
