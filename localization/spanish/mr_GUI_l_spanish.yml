 MR_CIVIL_ENGINEER_CONSTRUCTION_BUTTON_TT: "#T Construction Project#!\nLet your [concept_tesla_engineer] focus on modernizing the [GetBuildingType('building_construction_sector').GetName] of [GetPlayer.GetName].\n\nThis will add three modifiers to your building over time: $gaudi_new_construction_methods_modifier_with_tooltip$, $gaudi_faster_construction_methods_modifier_with_tooltip$ and $gaudi_efficient_construction_methods_modifier_with_tooltip$.\n\nThis project will add #n expenses#! to your country.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_CIVIL_ENGINEER_CONSTRUCTION_TRIGGER_TT: "#default_text al menos un [GetBuildingType('building_construction_sector').GetName] del nivel 1 o superior no tiene los tres [Concept('concept_modifier','$concept_modifiers$')].#!"
 MR_MECHANICAL_ENGINEER_RESEARCH_BUTTON: "Investigación mecánica"
 MR_MECHANICAL_ENGINEER_LOCOMOTIVES_BUTTON: "Nuevas locomotoras"
 MR_MECHANICAL_ENGINEER_LOCOMOTIVES_BUTTON_TT: "#T Develop new Locomotives#!\nLet your [concept_tesla_engineer] focus on constructing new locomotives that will give a bonus to your [GetBuildingType('building_railway').GetName] buildings. This will add #n expenses#! to your country.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MECHANICAL_ENGINEER_LOCOMOTIVES_TRIGGER_TT: "#default_text al menos un [GetBuildingType('building_railway').GetName] del nivel 1 o superior no tiene las cinco locomotores [Concept('concept_modifier','$concept_modifiers$')].#!"
 MR_MECHANICAL_ENGINEER_INDUSTRIES_BUTTON: "None"
 MR_MECHANICAL_ENGINEER_INDUSTRIES_BUTTON_TT: "#T Modernizing Industries#!\nLet your [concept_tesla_engineer] focus on modernizing the production methods of a building. This will add small bonuses on [concept_throughput], [concept_good_production] and [concept_input_mult] to your building. This project will add #n expenses#! to your country.\n\nModifiers that the building will gain:\n$gaudi_building_throughput_add_modifier_with_tooltip$\n$gaudi_building_production_mult_modifier_with_tooltip$\n$gaudi_building_goods_input_mult_modifier_with_tooltip$\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MECHANICAL_ENGINEER_INDUSTRIES_TRIGGER_TT: "#default_text Al menos un edificio industrial de Nivel 1 o superior no tiene los tres [Concept('concept_modifier','$concept_modifiers$')].#!"
 MR_MILITARY_ENGINEER_RESEARCH_BUTTON: "None"
 MR_MILITARY_ENGINEER_NAVAL_RESEARCH_BUTTON: "None"
 MR_MILITARY_ENGINEER_ADVANCED_WEAPONS_BUTTON: "None"
 MR_MILITARY_ENGINEER_ADVANCED_WEAPONS_BUTTON_TT: "#T Develop Advanced Rifles#!\nLet your [concept_tesla_engineer] focus on developing advanced rifles. This will allow you to use a new [concept_mobilization_option] or raise its tier. This project will add #n expenses#! to your country.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MILITARY_ENGINEER_ADVANCED_TANKS_BUTTON: "Tanques avanzados"
 MR_MILITARY_ENGINEER_ADVANCED_TANKS_BUTTON_TT: "#T Develop Advanced Tanks#!\nLet your [concept_tesla_engineer] focus on developing advanced tanks. This will allow you to use a new [concept_mobilization_option] or raise its tier. This project will add #n expenses#! to your country.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MILITARY_ENGINEER_ADVANCED_DEFENCE_BUTTON: "Fieldworks avanzado"
 MR_MILITARY_ENGINEER_ADVANCED_DEFENCE_BUTTON_TT: "#T Develop Advanced Fieldworks#!\nLet your [concept_tesla_engineer] focus on developing advanced fieldwork techniques. This will allow you to use a new [concept_mobilization_option] or raise its tier. This project will add #n expenses#! to your country.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ELECTRICAL_ENGINEER_RESEARCH_BUTTON: "Investigación eléctrica"
 MR_ELECTRICAL_ENGINEER_MAGNETIC_RESEARCH_STATION_BUTTON: "Únase a la asociación geomagnética"
 MR_ELECTRICAL_ENGINEER_MAGNETIC_RESEARCH_STATION_BUTTON_TT: "#T Únase a la Asociación Geomagnética#!\nJoining La asociación magnética en Göttingen es un requisito obligatorio para comenzar nuestra investigación en el campo del magnetismo de la Tierra y establecer un observatorio geomagnético. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ELECTRICAL_ENGINEER_TELEGRAPH_BUTTON: "Red telegráfica"
 MR_ELECTRICAL_ENGINEER_TELEGRAPH_BUTTON_TT: "#T Establecer una red telegráfica#!\nTelegraphy revoluciona las comunicaciones de un país, mejorando los servicios e infraestructura en regiones donde existe una red telegráfica. El cableado de una nación se vuelve más difícil cuanto más grande es el país. Los postes de telégrafo solo se pueden construir en un estado cuyo estado vecino también tiene un polo de telégrafo. Para el telegráfico en el extranjero, se necesitan tanto el telégrafo eléctrico como el electromagnetismo para colocar cables submarinos. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ELECTRICAL_ENGINEER_TELEGRAPH_RAILWAY_CAPITAL_TRIGGER_TT: "#default_text [GetPlayer.GetName] tiene un [GetBuildingType('building_railway').GetName] en el capital.#!"
 MR_ELECTRICAL_ENGINEER_TELEGRAPH_RAILWAY_65_PERCENT_TRIGGER_TT: "#default_text [GetPlayer.GetName] tiene un [GetBuildingType('building_railway').GetName] en #p 65%#! de todos los estados."
 MR_ELECTRICAL_ENGINEER_RADIO_BUTTON: "Red de radio"
 MR_ELECTRICAL_ENGINEER_RADIO_BUTTON_TT: "#T construir una red de radio#!\nThe ¡Hora de cables molestos enredados ha terminado! Con la invención de la tecnología de radio, ahora se pueden enviar mensajes a través de la antena. Esto no solo hace posible intercambiar noticias, sino también establecer programas de radio. Antes de eso, por supuesto, se debe configurar una red nacional de estaciones de radio. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ELECTRICAL_ENGINEER_MAGNETIC_RESSOURCE_1_BUTTON: "Buscar depósito de hierro"
 MR_ELECTRICAL_ENGINEER_MAGNETIC_RESSOURCE_1_BUTTON_TT: "#T Buscar un depósito de hierro#!\nGeophysics y el geomagnetismo tienen muchos usos prácticos. La minería en particular se benefició al descubrir posibles depósitos. Las grandes empresas utilizaron conocimiento geofísico para ubicar depósitos previamente desconocidos de hierro, plomo y aceite. Junto con las tecnologías correctas y el mapeo del campo magnético de la Tierra, debería ser fácil hacer el uso productivo del conocimiento teórico actual. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ELECTRICAL_ENGINEER_OBSERVATORY_WITH_MAGNETIC_OBSERVATORY_TRIGGER_TT: "#default_text [GetPlayer.GetName] tiene un [GetBuildingType('building_verrier_observatory').GetName] con el observatorio geomagnético #V#! [concept_production_method].#!"
 MR_ELECTRICAL_ENGINEER_MAGNETIC_RESSOURCE_2_BUTTON: "Buscar depósito de plomo"
 MR_ELECTRICAL_ENGINEER_MAGNETIC_RESSOURCE_2_BUTTON_TT: "#T Buscar un depósito de plomo#!\nGeophysics y el geomagnetismo tienen muchos usos prácticos. La minería en particular se benefició al descubrir posibles depósitos. Las grandes empresas utilizaron conocimiento geofísico para ubicar depósitos previamente desconocidos de hierro, plomo y aceite. Junto con las tecnologías correctas y el mapeo del campo magnético de la Tierra, debería ser fácil hacer el uso productivo del conocimiento teórico actual. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ELECTRICAL_ENGINEER_MAGNETIC_RESSOURCE_3_BUTTON: "Buscar depósito de aceite"
 MR_ELECTRICAL_ENGINEER_MAGNETIC_RESSOURCE_3_BUTTON_TT: "#T Buscar un depósito de aceite#!\nGeophysics y el geomagnetismo tienen muchos usos prácticos. La minería en particular se benefició al descubrir posibles depósitos. Las grandes empresas utilizaron conocimiento geofísico para ubicar depósitos previamente desconocidos de hierro, plomo y aceite. Junto con las tecnologías correctas y el mapeo del campo magnético de la Tierra, debería ser fácil hacer el uso productivo del conocimiento teórico actual. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_AERONAUTICAL_ENGINEER_RESEARCH_BUTTON: "Investigación aeronáutica"
 MR_AERONAUTICAL_ENGINEER_AIRPORT_BUTTON: "Modernización de aeropuertos"
 MR_AERONAUTICAL_ENGINEER_AIRPORT_BUTTON_TT: "#T Modernizing Airports#!\nLet your [concept_tesla_engineer] focus on modernizing your [GetBuildingType('building_airport').GetName]. The Airports will get modifiers that increase [concept_throughput] and [concept_good_production] and lower [concept_input_mult]. This will add #n expenses#! to your country.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
