 MR_PROMOTING_ENGINEER_TT: "#T Promote Engineer#!\n#p You are currently promoting the Engineer.#!\n[Concept('concept_tesla_engineer','$concept_tesla_engineers$')] are versatile technicians in the military and in construction. They also speed up the construction of monuments by twice as much."
 MR_PROMOTING_ASTRONOMER_TT: "#T promover astrónomo#!\n#p Actualmente está promoviendo el astrónomo."
 MR_PROMOTING_NATURALIST_TT: "#T Promueve naturalist#!\n#p Actualmente está promoviendo el naturalista."
 MR_PROMOTING_PALEONTOLOGIST_TT: "#T promover paleontólogo#!\n#p Actualmente está promoviendo el paleontólogo."
 MR_PROMOTING_ARCHAEOLOGIST_TT: "#T promover arqueólogo#!\n#p Actualmente está promoviendo al arqueólogo."
 MR_PROMOTING_ANTHROPOLOGIST_TT: "#T promover antropólogo#!\n#p Actualmente está promoviendo el antropólogo."
 MR_ACADEMICS_INVESTMENT_ACTIVE_TT: "#T Inversión académica#!\n#p está invirtiendo en la academia. La financiación está programada durante 10 años."
 MR_PROMOTING_COMPOSER_TT: "#T Promocione composer#!\n#p Actualmente está promocionando el compositor.#!\n[Concept('concept_elgar_composer','$concept_elgar_composers$')] son necesarios para crear una cultura musical próspera. Ayudarán a un país a crear más [concept_elgar_musical_tradition]."
 MR_PROMOTING_WRITER_TT: "#T Promocione escritor#!\n#p Actualmente está promocionando al escritor.#!\n[Concept('concept_manzoni_writer','$concept_manzoni_writers$')] son maestros de narración de cuentos y trabajan en libros y otras literatura. Con su trabajo fortalecen a los países [concept_manzoni_literary_tradition]."
 MR_PROMOTING_PAINTER_TT: "#T Promocione pintor#!\n#p Actualmente está promoviendo el pintor. A través de sus obras maestras, fortalecen el [concept_klimt_painting_tradition] de un país."
 MR_AVANTGARDE_INTELLIGENTSIA_ACTIVE_TT: "#T Avantgarde Intelligentsia#!\n#p Avantgarde Intelligents es actualmente su enfoque científico activo .#!\nA La camarilla de académicos con ideas claras culturales, sociológicas y antropológicas determina la vida científica científica cotidiana. En contraste, los campos prácticos son de menor importancia. \ N#R nota#!: aumenta la apariencia de académicos por un punto por mes."
 MR_PRACTICAL_ACADEMIA_ACTIVE_TT: "#T Academia práctica#!\n#p Academia práctica es actualmente su enfoque científico activo. Esto es para servir al progreso general y la paz de la humanidad. \ N#p nota#!: aumenta la aparición de académicos por un punto por mes."
 MR_MILITARY_INDUSTRIAL_COMPLEX_ACTIVE_TT: "#T Complejo militar-industrial#!\n#p El complejo militar-industrial es actualmente su enfoque científico activo .#!\nCooperation entre industriales privados y los militares han llevado al desarrollo de una red de conexiones, lazos personales y conocidos personales, con un poco de corrupción, que puede describirse mejor como un complejo militar-industrial."
 MR_BUSINESS_AND_TYCOON_ACTIVE_TT: "#T Escuelas de negocios y magnate de simulacro de escuelas de negocios y el capitalismo de magnate es actualmente su enfoque científico activo .#!\nThe El individuo independiente combinado con un momento próspero de progreso ha llevado a una mentalidad en la que las escuelas comerciales, las empresas medianas y las grandes corporaciones tienen una influencia decisiva en la ciencia del país. Viceversa, las universidades trabajan para aumentar la prosperidad adquirida de la nación a través de nuevas tecnologías e impulsar ideas sociales a través del progreso."
 MR_SEA_POWER_AND_MERCHANT_ACTIVE_TT: "#T Sea Power & Merchant Marine#!\n#p Sea Power & Merchant Marine es actualmente su enfoque científico activo. Aumentar la prosperidad a través de la producción avanzada y el comercio global en nuestros productos es tan importante como defender lo que ya se ha ganado."
 MR_IVORY_TOWER_ACTIVE_TT: "#T Torre de marfil útil Útil#!\n#p La torre de marfil útil es actualmente su enfoque científico activo. Sin embargo, no se puede negar que el aislamiento de la Torre de Marfil de la sociedad también tiene sus ventajas. Sin perturbarse, muchos profesores trabajan mejor. \ N#p nota#!: aumenta la aparición de académicos por un punto por mes."
 MR_ON_PACIFIC_EXPEDITION_TT: "#T Pacific Expedition#!\n#p actualmente hay una expedición en curso del Pacífico. Los académicos de múltiples disciplinas científicas están interesados ​​en una misión de investigación para realizar estudios naturalistas, paleontológicos, astronómicos y oceanográficos. Nuevamente, para las grandes potencias podría ser un asunto prestigioso mostrar su influencia al final del mundo."
 MR_ON_NORTHWEST_EXPEDITION_TT: "#T El pasaje del noroeste#!\n#p actualmente hay una expedición en curso para encontrar el pasaje del noroeste. Un viejo sueño no se cumplió: el descubrimiento del pasaje del noroeste entre Canadá y el Océano Ártico. ¿Pero quién se atrevería a una expedición tan peligrosa?"
 MR_ON_ARCTICA_EXPEDITION_TT: "#T Zeppelin Expedition#!\n#p actualmente hay una expedición de Zeppelin en curso. Se fundó principalmente en la iniciativa del aeronáutico y luego al Secretario General de la Sociedad, Walther Bruns. El presidente fundador en 1924 fue Fridtjof Nansen. Después de varios años de trabajo preparatorio, la compañía tuvo éxito en 1931 al usar una aeronave para una expedición polar puramente científica por primera vez. A través del vuelo ártico del LZ 127 Graf Zeppelin, el conocimiento de la geografía de las regiones polares voladas se expandió significativamente. Ya en 1926, Umberto Nobile voló sobre el Polo Norte con su aeronave 'Norge' y luego emprendió una expedición con la 'Italia'."
 MR_IS_CIVIL_ENGINEER_TT: "#T [concept_tesla_civil_engineer]#!\nYour [concept_tesla_engineer] is focusing on [Concept('concept_tesla_civil_engineer','$concept_tesla_civil_engineering$')]."
 MR_IS_MECHANICAL_ENGINEER_TT: "#T [concept_tesla_mechanical_engineer]#!\nYour [concept_tesla_engineer] is focusing on [Concept('concept_tesla_mechanical_engineer','$concept_tesla_mechanical_engineering$')]."
 MR_IS_MILITARY_ENGINEER_TT: "#T [concept_tesla_military_engineer]#!\nYour [concept_tesla_engineer] is focusing on [Concept('concept_tesla_military_engineer','$concept_tesla_military_engineering$')]."
 MR_IS_ELECTRICAL_ENGINEER_TT: "#T [concept_tesla_electrical_engineer]#!\nYour [concept_tesla_engineer] is focusing on [Concept('concept_tesla_electrical_engineer','$concept_tesla_electrical_engineering$')]."
 MR_IS_AERONAUTICAL_ENGINEER_TT: "#T [concept_tesla_aeronautical_engineer]#!\nYour [concept_tesla_engineer] is focusing on [Concept('concept_tesla_aeronautical_engineer','$concept_tesla_aeronautical_engineering$')]."
 MR_SAFARI_ACTIVE_TT: "#T HEIA Safari#!\n#p Su naturalista está actualmente en un safari.#!\nOn un safari africano, a través de un seguimiento y captura constantes, se puede capturar un gran juego y luego transportarse a un [concept_dubois_zoo]. Solo es posible atrapar un animal por safari. Dependiendo de la especie animal, difiere si necesita trampas o si tiene que permanecer en su rastro. Como regla general, los animales grandes y lentos necesitan más trampas, mientras que los animales rápidos requieren más seguimiento."
 MR_ZOOLOGICAL_EXPEDITION_ACTIVE_TT: "#T Captura de animales locales#!\n#p Su naturalista está actualmente atrapando animales locales. #!\nOur La nación tiene hábitats animales con especies fascinantes que podrían mostrarse en un [concept_dubois_zoo]. Un [concept_dubois_naturalist] es viajar por todo el país durante un año para recolectar [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] para un zoológico."
