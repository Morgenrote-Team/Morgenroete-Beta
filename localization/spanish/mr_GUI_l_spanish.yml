 MR_AUTORACING_FOUND_AIACR_BUTTON_TT: "#T La asociación de automóviles#!\nRacing se está convirtiendo cada vez más en un deporte internacional en el que los conductores compiten con diferentes marcas de automóviles de diferentes países. Muchas naciones han comenzado a celebrar sus propias carreras sin ningún acuerdo. Para coordinar mejor las reglas y términos, es necesario el establecimiento de un organismo internacional: una asociación internacional de automóviles. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
