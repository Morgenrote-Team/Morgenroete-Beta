 MR_NEWSPAPER_NOVEL_BUTTON_TT: "#T Escriba una novela de periódico#!\nIn El siglo XIX, la novela de los periódicos garantizó a muchos autores un ingreso seguro y una fama nacional. Muchos escritores conocidos de la época, como Tolstoy, Dostoyevsky, Flaubert y Dumas, publicaron por primera vez sus novelas como novelas en serie en periódicos antes de que se publicaran como libros. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
