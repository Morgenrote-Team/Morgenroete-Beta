 MR_BREEDING_ANIMALS_TRIGGER: "#default_text puede reproducirse [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] si tiene un estado con un [concept_dubois_nature_reserve] que no tiene el animal específico de la misma región que la #V Naturaleza de la naturaleza#! todavía y si tiene ese animal en su [concept_dubois_zoo]. \ Ni tiene una reserva de naturaleza #b #! en un estado europeo por ejemplo y quiere que la cría de #b alpino iBex#! en él solo puede hacer eso si solo puede hacer el estado, el estado no tiene una cría de IBEx. [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')]0 todavía y si tiene #b alpine ibexes#! en su #b zoo#!.#!"
