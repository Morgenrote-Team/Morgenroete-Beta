 MR_HOLD_SCHNEIDER_TROPHY_RACE_BUTTON_TT: "#T anfitrión de la próxima carrera de trofeos Schneider#!\nAs El ganador de la última carrera, tenemos el honor de organizar la carrera al año siguiente. Si ganamos tres carreras seguidas, podemos mantener el legendario Trofeo Schneider para siempre. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
