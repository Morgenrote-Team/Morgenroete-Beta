 MR_PAINTER_TRIP_BUTTON: "Viaje educativo"
 MR_PAINTER_TRIP_BUTTON_TT: "#T Viaje educativo#!\nOn a [concept_klimt_painter_trip], un artista puede aprender un estilo de arte previamente desconocido y, por lo tanto, mejorar el [concept_klimt_painting_tradition] anual. También pueden adquirir otros rasgos positivos y negativos durante su estadía en un extranjero [concept_artists_center_of_arts]. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ACQUIRE_MASTERWORK_BUTTON: "Adquirir una obra maestra"
 MR_ACQUIRE_MASTERWORK_BUTTON_TT: "#T adquirir una obra maestra#!\nWe puede comprar una obra maestra de un estilo en el extranjero que aún no poseemos. Sin embargo, esto supone que otra nación tiene al menos más de una obra maestra de este estilo. Además, necesitamos una galería nacional para colgar la pintura. Además de los costos de adquisición, también tenemos que intercambiar algunas de nuestras pinturas, lo que nos cuesta #R 100#! [concept_klimt_painting_tradition]. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_VERNISSAGE_BUTTON: "Vernissage"
 MR_VERNISSAGE_BUTTON_TT: "#T vernissage#!\nAt un vernissage, un [concept_klimt_painter] puede exhibir algunas de sus imágenes y, a cambio, adquirir reputación y [concept_klimt_painting_tradition]. Un vernissage solo es posible una vez en la vida de un pintor. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
