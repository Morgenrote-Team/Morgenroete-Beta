 MR_RECRUIT_PHYSICIAN_BUTTON: "Recluta médico"
 MR_RECRUIT_PHYSICIAN_BUTTON_TT: "#T Reclutar médico#!\nOwning Un gran hospital general brinda una oportunidad única para reclutar inmediatamente a los médicos del servicio de práctica. Además, se puede seleccionar un médico en función de su especialidad. Esto permite una investigación médica significativamente más específica. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
