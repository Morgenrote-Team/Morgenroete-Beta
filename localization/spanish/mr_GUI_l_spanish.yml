 MR_UPPER_EGYPT_EXPEDITION_TT: "#T Envíe una expedición al valle de los reyes#!\nWith Las viejas tebas de la capital y el valle de los reyes, el Alto Egipto, se considera la meca de la egiptología. Deberíamos adquirir una licencia de excavación para el área y buscar tesoros egipcios. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_EGYPT_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text #V Lepsius escribió una carta a Rosellini#! que comenzó la arqueología en Egipto .#!" #NT!
 MR_UPPER_EGYPT_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text [GetPlayer.GetName] #V no está financiado actualmente#! un [concept_lepsius_expedition] al Alto Egipto.#!" #NT!
 MR_UPPER_EGYPT_EXPEDITION_ACCESS_TRIGGER_TT: "#default_text [GetPlayer.GetName] O #V posee el estado de la altura de Egipto#! o tiene un [concept_lepsius_excavation_licence] con su propietario." #NT!
  
 MR_LOWER_EGYPT_EXPEDITION_TT: "#T Enviar una expedición a las pirámides#!\nSince El comienzo del tiempo, las pirámides egipcias han fascinado a la humanidad. Se dice que otras tumbas, templos e incluso ciudades que han desaparecido en las arenas del Bajo Egipto están esperando ser redescubridas." #NT!
 MR_LOWER_EGYPT_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text [GetPlayer.GetName] #V no está financiado actualmente#! un [concept_lepsius_expedition] para bajar Egipto .#!" #NT!
 MR_LOWER_EGYPT_EXPEDITION_ACCESS_TRIGGER_TT: "#default_text [GetPlayer.GetName] O #V posee el estado del bajo Egipto#! o tiene un [concept_lepsius_excavation_licence] con su propietario." #NT!
  
 MR_BABYLONIA_EXPEDITION_TT: "#T Enviar una expedición a la cuna de la civilización#!\nBabylonia, La parte sur de Mesopotamia, debe su nombre a la ciudad una vez poderosa de Babilonia. La región se considera la 'cuna de la civilización' donde se descubren artefactos arqueológicos preciosos una y otra vez. Definitivamente pertenecen a un museo. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_MESOPOTAMIA_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text #V El idioma akkadian ha sido descifrado#!, permitiendo arqueología en mesopotamia.#!" #NT!
 MR_BABYLONIA_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text [GetPlayer.GetName] #V no está financiado actualmente#! un [concept_lepsius_expedition] a Babylonia.#!" #NT!
 MR_BABYLONIA_EXPEDITION_ACCESS_TRIGGER_TT: "#default_text [GetPlayer.GetName] O #V posee el estado de Baghdad#! o tiene un [concept_lepsius_excavation_licence] con su propietario." #NT!
  
 MR_ASSYRIA_EXPEDITION_TT: "#T Enviar una expedición a los jardines de Asiria#!\nAssyria se refiere a la parte norte de Mesopotamia con las dos ciudades importantes de Assur y Nínive. El escaso conocimiento sobre el país aún se remonta a la Biblia como fuente, pero tal vez hay evidencia histórica que es más confiable? \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_ASSYRIA_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text [GetPlayer.GetName] #V no está financiado actualmente#! an [concept_lepsius_expedition] a asiria.#!" #NT!
 MR_ASSYRIA_EXPEDITION_ACCESS_TRIGGER_TT: "#default_text [GetPlayer.GetName] O #V posee el estado de Mossul#! o tiene un [concept_lepsius_excavation_licence] con su propietario." #NT!
  
 MR_ARGOLIS_EXPEDITION_TT: "#T Enviar una expedición a la ciudad de Agamenón#!\nAfter El descubrimiento de Troya, incluso los científicos escépticos se dan cuenta de que los mitos de los antiguos griegos son más que solo cuentos de hadas. Se dice que los restos de las ciudades de la Edad de Bronce se encuentran en Argolis hasta el día de hoy, la más conocida de las cuales es las micenas. Deberíamos convencernos de eso. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_GREECE_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text #V Schliemann descubrió troy#!, permitiendo arqueología en Grecia.#!" #NT!
 MR_ARGOLIS_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text [GetPlayer.GetName] #V no está financiado actualmente#! un [concept_lepsius_expedition] a Argolis.#!" #NT!
 MR_ARGOLIS_EXPEDITION_ACCESS_TRIGGER_TT: "#default_text [GetPlayer.GetName] O #V posee el estado de Peloponese#! o tiene un [concept_lepsius_excavation_licence] con su propietario.#!" #NT!
  
 MR_CRETE_EXPEDITION_TT: "#T Envíe una expedición a los palacios de Crete#!\nThe Se dice que el legendario rey Minos haya gobernado una vez sobre Creta. Similar a Troy y Micenas, también parece haber algo para esta historia: los artefactos de la legendaria cultura minoica se encuentran cada vez más en la isla. Nuestra nación también debe asegurar algunos de ellos. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_CRETE_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text [GetPlayer.GetName] #V no está financiado actualmente#! un [concept_lepsius_expedition] a Crete.#!" #NT!
 MR_CRETE_EXPEDITION_ACCESS_TRIGGER_TT: "#default_text [GetPlayer.GetName] O #V posee el estado de crete#! o tiene un [concept_lepsius_excavation_licence] con su propietario." #NT!
  
 MR_YUCATAN_EXPEDITION_TT: "#T Enviar una expedición a las ciudades perdidas de la Maya#!\nReports de las ciudades desconocidas y enormes en el medio de la jungla aumentó. Deberíamos investigar más y enviar una expedición arqueológica a Yucatán. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_YUCATAN_EXPEDITION_DISCOVERED_TRIGGER_TT: "#default_text #V Stephens & Catherwood emprendió una expedición#!, que permite la arqueología en Yucatán.#!" #NT!
 MR_YUCATAN_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text [GetPlayer.GetName] #V no está financiado actualmente#! un [concept_lepsius_expedition] a Yucatán.#!" #NT!
 MR_YUCATAN_EXPEDITION_ACCESS_TRIGGER_TT: "#default_text [GetPlayer.GetName] O #V posee el estado de yucatán#! o tiene un [concept_lepsius_excavation_licence] con su propietario." #NT!
  
 MR_PERU_EXPEDITION_TT: "#T Envíe una expedición para buscar el legado oculto del Incas#!\nPilots informa fortalezas extrañas y estructuras amuralladas en los Andes que vieron en sus vuelos sobre Perú. ¿Quizás los españoles no destruyeron completamente la cultura de los incas? No se han encontrado algunas ciudades de resistencia indígena hasta el día de hoy. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_PERU_EXPEDITION_DISCOVERED_TRIGGER_TT: "#default_text #V Bingham descubrió Machu Picchu#!, permitiendo arqueología en Perú .#!" #NT!
 MR_PERU_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text [GetPlayer.GetName] #V no está financiado actualmente#! un [concept_lepsius_expedition] a Perú.#!" #NT!
 MR_PERU_EXPEDITION_ACCESS_TRIGGER_TT: "#default_text [GetPlayer.GetName] O #V posee el estado de $STATE_ICA$#! o tiene un [concept_lepsius_excavation_licence] con su propietario." #NT!
  
 MR_EXODUS_CONGRESS_BUTTON: "Congreso sobre el éxodo" #NT!
 MR_EXODUS_CONGRESS_BUTTON_TT: "#T Congreso sobre el éxodus#!\nWith La mayor investigación sobre Egipto y el Levante, la cuestión de la historicidad de los eventos bíblicos surge nuevamente. En particular, la no mención del éxodo, es decir, la partida de los hebreos de Egipto, ha planteado la cuestión de si los cinco libros de Moisés no son solo simples inventos. Los científicos radicales incluso exigen que todas las historias bíblicas se ignoren por completo. Otro grupo argumenta que las historias de la Biblia no se pueden tomar literalmente, pero tienen valor científico. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_EXODUS_CONGRESS_EGYPTIAN_ARTIFACTS_TT: "#default_text [GetPlayer.GetName] necesita al menos #V 25#! @lepsius_egypt_minor! Egipcio [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] (actualmente [GetPlayer.MakeScope.Var('lepsius_egyptian_artifact_minor').GetValue|0+]) .#!" #NT!
 MR_EXODUS_CONGRESS_GLOBAL_ARTIFACTS_TT: "#default_text al menos #V 150#! @lepsius_egypt_minor! [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] se encontraron en todo el mundo (actualmente [GetGlobalVariable('lepsius_global_artifacts').GetValue|+0] @lepsius_egypt_minor!" #NT!
  
 MR_CIVILIZATION_CONGRESS_BUTTON: "Congreso sobre civilización" #NT!
 MR_CIVILIZATION_CONGRESS_BUTTON_TT: "#T Congreso sobre el surgimiento de la civilización#!\nFor Se creía, no solo en Europa sino también en otros países del Mediterráneo y Oriente Medio, que Egipto era la civilización más antigua. Pero con el aumento diario de los hallazgos de Asiria y Babilonia, esta teoría ha sido claramente sacudida. Más bien, resulta que la escritura aparentemente se inventó en Mesopotamia, al igual que muchos otros logros que acompañaron el comienzo de la civilización. ¿Es quizás el caso que cada civilización surgió en última instancia de Babilonia, y cada forma de religión deriva de los mitos babilónicos? ¿Es la épica de Gilgamesh quizás la inspiración para todo tipo de literatura, desde la Biblia hasta las epopeyas homéricas? \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_CIVILIZATION_CONGRESS_MESOPOTAMIAN_ARTIFACTS_TT: "#default_text [GetPlayer.GetName] necesita al menos #V 25#! @lepsius_mesopotamia_minor! Mesopotámico [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] (actualmente [GetPlayer.MakeScope.Var('lepsius_mesopotamian_artifact_minor').GetValue|0+]) .#!" #NT!
 MR_CIVILIZATION_CONGRESS_GLOBAL_ARTIFACTS_TT: "#default_text al menos #V 300#! @lepsius_mesopotamia_minor! [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] se encontraron en todo el mundo (actualmente [GetGlobalVariable('lepsius_global_artifacts').GetValue|+0] @lepsius_mesopotamia_minor! Fueron encontrados) .#!" #NT!
  
 MR_TROY_CONGRESS_BUTTON: "Congreso sobre Troy" #NT!
 MR_TROY_CONGRESS_BUTTON_TT: "#T Congreso sobre Troy#!\nSchliemann encontrado Troy. Al menos eso es lo que afirma. Aunque las voces críticas que consideraron a Troy como un mero invento han disminuido, una serie completa de preguntas sigue sin respuesta. ¿El Troy es encontrado por Schliemann el Troy homérico? ¿Y qué fue Troy de todos modos? Varios académicos siguen siendo escépticos. Y los nuevos descubrimientos de Anatolia podrían arrojar una luz completamente nueva sobre los descubrimientos. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_TROY_CONGRESS_AEGEAN_ARTIFACTS_TT: "#default_text [GetPlayer.GetName] necesita al menos #V 25#! @lepsius_aegean_minor! Aegean [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] (actualmente [GetPlayer.MakeScope.Var('lepsius_aegean_artifact_minor').GetValue|0+]) .#!" #NT!
 MR_TROY_CONGRESS_GLOBAL_ARTIFACTS_TT: "#default_text al menos #V 300#! @lepsius_aegean_minor! [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] se encontraron en todo el mundo (actualmente [GetGlobalVariable('lepsius_global_artifacts').GetValue|+0] @lepsius_aegean_minor! Fueron encontrados) .#!" #NT!
  
 MR_INSPECT_EXCAVATION_BUTTON: "Inspeccionar la excavación" #NT!
 MR_INSPECT_EXCAVATION_BUTTON_TT: "#T inspeccionar la excavación#!\nWe puede enviar a un arqueólogo experimentado a un área donde estamos excavando para intensificar nuestros esfuerzos allí. Nuestro arqueólogo abrirá un nuevo sitio de excavación en aproximadamente un año y realizará investigaciones intensivas, durante la cual podemos encontrar más indicaciones de descubrimientos arqueológicos anteriores previamente desconocidos. El éxito depende en gran medida de la experiencia de nuestro arqueólogo. El establecimiento de una sociedad arqueológica también aumenta nuestras posibilidades. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_INSPECT_EXCAVATION_TRIGGER_TT: "#default_text [GetPlayer.GetName] tiene #V al menos un [concept_lepsius_excavation]#! continuo en un área donde no se ha realizado un gran descubrimiento arqueológico." #NT!
 MR_INSPECT_EXCAVATION_ARTIFACT_FOR_DISCOVERY_TRIGGER_TT: "#default_text [GetPlayer.GetName] debe tener #V estudiado al menos 30 [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')]#! en una región específica antes de buscar pistas allí.#!" #NT!
  
 MR_CANCEL_EXCAVATION_BUTTON: "Cancelar excavación" #NT!
 MR_CANCEL_EXCAVATION_BUTTON_TT: "#T Cancelar excavación#!\nIn Algunas situaciones puede ser útil recordar un equipo de excavación. Nuestros artefactos y colecciones adquiridos permanecerán, pero nuestra excavación permanente terminará. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_ARCHAEOLOGY_ON_ARCHAEOLOGICAL_EXCAVATION_TRIGGER_TT: "#default_text [GetPlayer.GetName] tiene al menos #V 1#! [Concept('concept_lepsius_archaeological_team','$concept_lepsius_excavation_team$')] haciendo un [concept_lepsius_excavation].#!" #NT!
  
 MR_LOCAL_EXCAVATION_BUTTON: "Excavación local" #NT!
 MR_LOCAL_EXCAVATION_BUTTON_TT: "#T Excavación local#!\nArchaeological Los tesoros no solo esperan ser descubiertos lejos. Aunque las excavaciones locales se consideran menos prestigiosas que la búsqueda de los artefactos famosos, sí proporciona una idea de la era principalmente prehistórica de nuestra región de origen. A diferencia de las excavaciones después de una expedición, las excavaciones locales no se pueden completar hasta que se agoten la financiación. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
  
  
