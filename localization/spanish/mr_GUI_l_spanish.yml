 MR_GEOLOGIST_ORE_VEIN_BUTTON_TT: "#T Prospect Ore#!\nA [concept_agassiz_geologist] can search for new raw material deposits near already established mines and thus increase the production of the ore.\n\nThe building would gain the $agassiz_building_production_mult_modifier_with_tooltip$ [concept_modifier]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GEOLOGIST_ORE_VEIN_STOP_BUTTON_TT: "#T Deje de prospecto Ore#!\nA Su [concept_agassiz_geologist] actualmente está buscando nuevos depósitos de materia prima cerca de minas ya establecidas y, por lo tanto, aumenta la producción del mineral. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GEOLOGIST_OIL_BUTTON_TT: "#T Prospect Oil#!\nA [concept_agassiz_geologist] can search for new oil wells near already established oil rigs and thus increase production.\n\nThe building would gain the $agassiz_building_production_2_mult_modifier_with_tooltip$ [Concept('concept_modifier','$concept_modifiers$')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 VISIT_OBSERVATORY_BUTTON: "Visita el planetario"
 VISIT_OBSERVATORY_BUTTON_TT: "#T Visit the Planetarium#!\nThe Planetarium offers you an overview of the astronomical knowledge of your country, other countries and the scientific community."
 MR_SELL_MINERALS_FOR_RARE_MINERAL_BUTTON_TT: "#T Vender minerales para minerales raros#!\nA [concept_agassiz_geologist] puede comprar [Concept('concept_agassiz_rare_mineral','$concept_agassiz_rare_minerals$')] de colegas, coleccionistas y otros entusiastas geológicos. Para esto tiene que cambiar una cantidad considerable de minerales comunes. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GEOLOGIST_PALEONTOLOGIST_SYMPOSIUM_BUTTON: "Simposio interdisciplinario"
 MR_GEOLOGIST_PALEONTOLOGIST_SYMPOSIUM_BUTTON_TT: "#T Simposio geológico-paleontológico#!\nThe Las intersecciones entre geología y paleontología son grandes. Deberíamos reunir las luminarias en el campo y usar las sinergias que surgen de este intercambio para crear nuevas teorías científicas sobre la historia de la Tierra. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTING_GEOLOGIST_TT: "#T Promocione geólogo#!\n#p Actualmente está promoviendo al geólogo."
