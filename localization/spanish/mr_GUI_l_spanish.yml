 MR_EXTINCTION_CONGRESS_BUTTON: "Congreso de extinción" #NT!
 MR_EXTINCTION_CONGRESS_BUTTON_TT: "#T Extinción Congress#!\nOne de los misterios más desconcertantes en la historia natural sigue siendo la desaparición de los dinosaurios. El padre de la paleontología, Georges Cuvier, descubrió que había habido una extinción masiva al final del período Cretácico en el que los dinosaurios también se extinguieron. Pero, ¿cómo podrían los terribles lagartos, que dominaron la Tierra durante millones de años, de repente volverse obsoletos? \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
  
