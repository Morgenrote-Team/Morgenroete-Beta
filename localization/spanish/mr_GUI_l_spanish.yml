 MR_ELECTRICAL_ENGINEER_MAGNETIC_RESEARCH_STATION_BUTTON: "Únase a la asociación geomagnética" #NT!
 MR_ELECTRICAL_ENGINEER_MAGNETIC_RESEARCH_STATION_BUTTON_TT: "#T Únase a la Asociación Geomagnética#!\nJoining La asociación magnética en Göttingen es un requisito obligatorio para comenzar nuestra investigación en el campo del magnetismo de la Tierra y establecer un observatorio geomagnético. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
  
 MR_ELECTRICAL_ENGINEER_TELEGRAPH_BUTTON: "Red telegráfica" #NT!
 MR_ELECTRICAL_ENGINEER_TELEGRAPH_BUTTON_TT: "#T Establecer una red telegráfica#!\nTelegraphy revoluciona las comunicaciones de un país, mejorando los servicios e infraestructura en regiones donde existe una red telegráfica. El cableado de una nación se vuelve más difícil cuanto más grande es el país. Los postes de telégrafo solo se pueden construir en un estado cuyo estado vecino también tiene un polo de telégrafo. Para el telegráfico en el extranjero, se necesitan tanto el telégrafo eléctrico como el electromagnetismo para colocar cables submarinos. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_ELECTRICAL_ENGINEER_TELEGRAPH_RAILWAY_CAPITAL_TRIGGER_TT: "#default_text [GetPlayer.GetName] tiene un [GetBuildingType('building_railway').GetName] en el capital.#!" #NT!
 MR_ELECTRICAL_ENGINEER_TELEGRAPH_RAILWAY_65_PERCENT_TRIGGER_TT: "#default_text [GetPlayer.GetName] tiene un [GetBuildingType('building_railway').GetName] en #p 65%#! de todos los estados." #NT!
  
 MR_ELECTRICAL_ENGINEER_RADIO_BUTTON: "Red de radio" #NT!
 MR_ELECTRICAL_ENGINEER_RADIO_BUTTON_TT: "#T construir una red de radio#!\nThe ¡Hora de cables molestos enredados ha terminado! Con la invención de la tecnología de radio, ahora se pueden enviar mensajes a través de la antena. Esto no solo hace posible intercambiar noticias, sino también establecer programas de radio. Antes de eso, por supuesto, se debe configurar una red nacional de estaciones de radio. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
  
 MR_ELECTRICAL_ENGINEER_MAGNETIC_RESSOURCE_1_BUTTON: "Buscar depósito de hierro" #NT!
 MR_ELECTRICAL_ENGINEER_MAGNETIC_RESSOURCE_1_BUTTON_TT: "#T Buscar un depósito de hierro#!\nGeophysics y el geomagnetismo tienen muchos usos prácticos. La minería en particular se benefició al descubrir posibles depósitos. Las grandes empresas utilizaron conocimiento geofísico para ubicar depósitos previamente desconocidos de hierro, plomo y aceite. Junto con las tecnologías correctas y el mapeo del campo magnético de la Tierra, debería ser fácil hacer el uso productivo del conocimiento teórico actual. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_ELECTRICAL_ENGINEER_OBSERVATORY_WITH_MAGNETIC_OBSERVATORY_TRIGGER_TT: "#default_text [GetPlayer.GetName] tiene un [GetBuildingType('building_verrier_observatory').GetName] con el observatorio geomagnético #V#! [concept_production_method].#!" #NT!
  
 MR_ELECTRICAL_ENGINEER_MAGNETIC_RESSOURCE_2_BUTTON: "Buscar depósito de plomo" #NT!
 MR_ELECTRICAL_ENGINEER_MAGNETIC_RESSOURCE_2_BUTTON_TT: "#T Buscar un depósito de plomo#!\nGeophysics y el geomagnetismo tienen muchos usos prácticos. La minería en particular se benefició al descubrir posibles depósitos. Las grandes empresas utilizaron conocimiento geofísico para ubicar depósitos previamente desconocidos de hierro, plomo y aceite. Junto con las tecnologías correctas y el mapeo del campo magnético de la Tierra, debería ser fácil hacer el uso productivo del conocimiento teórico actual. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
  
 MR_ELECTRICAL_ENGINEER_MAGNETIC_RESSOURCE_3_BUTTON: "Buscar depósito de aceite" #NT!
 MR_ELECTRICAL_ENGINEER_MAGNETIC_RESSOURCE_3_BUTTON_TT: "#T Buscar un depósito de aceite#!\nGeophysics y el geomagnetismo tienen muchos usos prácticos. La minería en particular se benefició al descubrir posibles depósitos. Las grandes empresas utilizaron conocimiento geofísico para ubicar depósitos previamente desconocidos de hierro, plomo y aceite. Junto con las tecnologías correctas y el mapeo del campo magnético de la Tierra, debería ser fácil hacer el uso productivo del conocimiento teórico actual. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
  
