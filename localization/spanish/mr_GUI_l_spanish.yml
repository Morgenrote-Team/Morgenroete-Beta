 MR_MEDICAL_CONGRESS_BUTTON_TT: "#T anfitrión del Congreso médico#!\nWith La revolución en la investigación médica y la propagación simultánea de epidemias peligrosas, la necesidad de compartir descubrimientos en los congresos internacionales para el beneficio de la humanidad creció. Con un poco de suerte, se puede intercambiar conocimiento sobre descripciones de enfermedades, patógenos, tratamientos de enfermedades y vacunas. Los médicos dominan el evento, pero los microbiólogos también están presentes."
