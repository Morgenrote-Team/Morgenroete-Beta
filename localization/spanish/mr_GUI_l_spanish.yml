 MR_MOZART_MONUMENT_BUTTON: "Construye el monumento de Mozart"
 MR_MOZART_MONUMENT_BUTTON_TT: "#T Construya el monumento de Mozart#!\nWolfgang Amadeus Mozart es uno de los compositores más importantes de todos los tiempos, pero algunos aún le niegan este reconocimiento. Más recientemente, toda una generación de compositores lo ha redescubierto como punto de partida para la música contemporánea. La erección de un monumento de Mozart en su lugar de nacimiento Salzburgo inspirará a las generaciones futuras a querer seguir sus pasos. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
