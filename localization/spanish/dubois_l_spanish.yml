 dubois.3000.t: "¿Está perdiendo el Dr. [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] la mente [SCOPE.sCharacter('dubois_naturalist_scope').GetHerHis]?"
 dubois.3000.d: "Su [concept_dubois_naturalist], [SCOPE.sCharacter('dubois_naturalist_scope').GetFullName], parece olvidar más y más cosas. ¿Quizás es hora de que [SCOPE.sCharacter('dubois_naturalist_scope').GetHerHim] renuncie como naturalista?"
 dubois.3000.f: "Espera un segundo ... ¿Dónde puse mi té? Oh, ¿está aquí? ¿O fue esa la planta posionosa? ¿Y por qué hay una gran araña sentada en la esquina de la habitación?"
 dubois.3000.g: "No creo que [SCOPE.sCharacter('dubois_naturalist_scope').GetSheHe] debería seguir trabajando."
 dubois.3000.h: "¡Pff, eso es totalmente normal!"
 dubois.3010.t: "Muestras perdidas"
 dubois.3010.d: "El Dr. [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] de repente no puede encontrar algunas muestras en la colección [SCOPE.sCharacter('dubois_naturalist_scope').GetHerHis]. [SCOPE.sCharacter('dubois_naturalist_scope').GetSheHe] dijo que simplemente ... desaparecieron."
 dubois.3010.f: "I am absolutely sure that I just put them here on those pins. But now they are gone. Those were magnificent insects! Maybe I just put them somewhere else?"
 dubois.3010.g: "¿Cómo desaparecieron? Pensé que estaban muertos ..."
 dubois.3011.t: "Naturalist vende partes de la colección"
 dubois.3011.d: "Aparentemente, el profesor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] había acumulado enormes deudas. Parece que la única solución [SCOPE.sCharacter('dubois_naturalist_scope').GetSheHe] vio fue vender partes de nuestra colección."
 dubois.3011.f: "\ \"¡No, por favor no le hagas nada a mi pequeña esperanza. ¡No hizo nada malo! ¡Haré todo para obtener el dinero! ¡Por favor, simplemente no la lastimes. ¡Es solo una pequeña araña inocente! \""
 dubois.3011.g: "[SCOPE.sCharacter('dubois_naturalist_scope').GetSheHe|U] hizo qué?"
