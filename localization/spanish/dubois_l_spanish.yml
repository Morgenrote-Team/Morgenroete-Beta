 je_prehistoric_scenery_reason: "El Dr. [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName] actualmente está construyendo una habitación en una universidad en la que las plantas y los animales realistas de otra época proporcionan una impresión del pasado de la Tierra."
