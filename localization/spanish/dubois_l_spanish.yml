 dubois.31.l: "Gorila" #NT!
 dubois.32.t.gorilla_1: "Un gorila fuerte" #NT!
 dubois.32.t.gorilla_2: "Segundo avistamiento de un gorila" #NT!
 dubois.32.t.gorilla_3: "Otro gorila" #NT!
 dubois.32.f.gorilla.1: "En los bosques de las tierras altas con frote de niebla, un ritmo de pecho profundo y resonante reverbera a través de la densa maleza, un sonido que envía un escalofrío por la columna vertebral de cada criatura viviente al oído. Allí, entre los antiguos árboles, el gorila de espalda plateada da a conocer su presencia. Implente y formidable, es tanto un protector como un gobernante de su tropa. El profesor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] observa asombrado cómo el gran simio afirma su dominio, llevando a su familia con una gracia que desmiente su inmenso poder. El naturalista, dividido entre admiración y deber, prepara su equipo, sabiendo que capturar a esta majestuosa criatura para el zoológico puede ser la tarea más desalentadora hasta ahora." #NT!
 dubois.32.f.gorilla.2: "Cuando el sol comienza a ponerse detrás del horizonte montañoso, la jungla cobra vida con los sonidos de la naturaleza. A través del dosel denso, emerge una familia de gorilas, sus movimientos deliberados e imbuidos de un propósito. El más joven entre ellos se aferra a la espalda de su madre, mientras que el imponente plateado lleva por la parte trasera, sus ojos vigilantes escanean para cualquier signo de peligro. El profesor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] contiene el aliento, sus binoculares entrenados en este raro y fugaz vislumbrar la vida de estas nobles criaturas. La idea de separar a una familia así pesa mucho en su mente, pero la presión de los clientes del zoológico lo deja con poca opción: debe proceder, incluso si significa interrumpir la armonía de la jungla." #NT!
 dubois.32.f.gorilla.3: "En lo profundo del corazón de la selva tropical, donde el aire está grueso con el aroma de la tierra y las llamadas de criaturas invisibles, los gorilas hacen su hogar. El imponente Silverback, con su pelaje de plata y su sabio, sabiendo los ojos, es el líder indiscutible de su tropa. Sus enormes manos acurren suavemente a un joven gorila, una rara muestra de ternura de un ser tan poderoso. El profesor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] observa este momento íntimo desde la distancia, en conflicto por el dilema ético delante de él. Los clientes del zoológico esperan resultados, pero mientras observa los intrincados lazos sociales entre estos animales notables, comienza a cuestionar si alguna jaula podría realmente mantener el espíritu de la naturaleza." #NT!
 dubois.33.d.gorilla: "En busca del #O gorila#!,, nuestro equipo de Safari encontró una flora increíble. El profesor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] se inclina a tomar un descanso." #NT!
 dubois.34.d.gorilla: "El safari, que tenía como objetivo capturar el # o gorila#!, debe ser interrumpido. ¡Falta el profesor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName]!" #NT!
 je_dubois_safari_gorilla: "África Safari: gorila" #NT!
 je_dubois_safari_gorilla_reason: "En un safari africano, a través de un seguimiento y captura constantes, se puede capturar un gran juego y luego transportarse a un [concept_dubois_zoo]. Solo es posible atrapar un animal por safari. Dependiendo de la especie animal, difiere si necesita trampas o si tiene que permanecer en su rastro. Como regla general, los animales grandes y lentos necesitan más trampas, mientras que los animales rápidos requieren más seguimiento. El safari dura 300 días. Si no se atrapa el animal para entonces, el equipo de Safari dejará el país nuevamente, sin éxito. Los animales n. Los animales tímidos toman vuelo. Un [concept_dubois_naturalist] que tiene el rasgo zoólogo puede resolver tales situaciones sin desventaja. Nuevas tecnologías como la ametralladora #ORANGE#! o #ORANGE Engine de combustión#! facilitan el seguimiento y la captura de animales." #NT!
  
  ### 2.3.0 ### 
  
 dubois.228.d: "¿Quién hubiera esperado que un águila majestuosa proveniera de Nueva Zelanda de todos los lugares? El Prof. [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] encontró varios huesos de un gigantesco águila que tenía una envergadura masiva de 2.6 metros (8 pies 6 pulgadas). El profesor [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] supone que este pájaro podría haber inspirado la leyenda de Pouākai, un mito de los maoríes." #NT!
  
