 je_dubois_native_animal: "Documentación de un animal nativo"
 je_dubois_native_animal_reason: "El Prof. [ROOT.Var('dubois_naturalist_var').GetCharacter.GetLastName] estudia un animal doméstico en su hábitat natural. La experiencia, las habilidades y los rasgos de carácter, así como la universidad con un enfoque en la historia natural, influyen en cuánto tiempo lleva este proceso. El animal [ROOT.Var('dubois_naturalist_var').GetCharacter.GetSheHe] estudios es el #ORANGE [SCOPE.GetRootScope.GetCountry.GetCustom('dubois_animal_documentation_name')]#!."
 je_dubois_native_animal_goal: "#E progreso naturalista#! llega #GREEN [JournalEntry.GetTotalGoalValue|V0]#! puntos."
 je_naturalist_dies_tt: "Prof. [ROOT.Var('dubois_naturalist_var').GetCharacter.GetLastName] muere"
 dubois.442.t: "Conocimiento geológico"
 dubois.442.d: "Durante su estadía en las montañas, el [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] examinó la montaña en detalle, la mapeó e hizo interpretaciones científicas. Para sorpresa de todo el equipo de montañismo, los sorprendió a la mañana siguiente con un mapa de socorro que muestra las trampas y las subidas más suaves de la montaña."
 dubois.442.f: "'¿Por qué hice eso? Oh, estaba un poco aburrido y también había catalogado mis minerales. ¡No es nada especial! Ni siquiera lo coloreé ... '"
 dubois.442.g: "Gracias a Dios tenemos al Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]"
 dubois.443.t: "Un buen mineral"
 dubois.443.d: "El grupo de montañismo ya se estaba quejando de la naturaleza dilly-dalting del geólogo, quien como científico era más una carga que una ayuda; Pero resulta que el Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] descubrió un material raro mientras subía el pico."
 dubois.443.g: "Qué pequeña sorpresa tan encantadora."
