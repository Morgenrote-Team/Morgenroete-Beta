 dubois.271.t_cretaceous: "Paisaje prehistórico: cretáceo" #NT!
 dubois.271.t_jurassic: "Paisaje prehistórico: jurásico" #NT!
 dubois.271.t_triassic: "Paisaje prehistórico: Triásico" #NT!
 dubois.271.d: "El Dr. [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName] invitó hoy a un grupo de colegas a visitar el nuevo paisaje prehistórico. Los académicos elogiaron [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetHerHis] sentido de detalle." #NT!
 dubois.271.f_cretaceous: "El clima en el Cretácico era generalmente cálido y equilibrado. Permitió a algunos dinosaurios llegar a las altas latitudes del sur y norte, al menos durante los meses de verano. Los postes estaban libres de hielo y el nivel del mar era correspondientemente muy alto, alcanzando su valor máximo en el Turoniano inferior. Fue solo al final del Cretácico en el Maastrichtiano que se produjo un enfriamiento y una regresión marcada. Como en el período Jurásico anterior, la macrofauna terrestre y la megafauna estaban dominados por los dinosaurios. En el Cretácico inferior, las plantas de musgo de club, helechos, helechos de árboles, ginkgoales, bennettital y coníferas fueron las plantas predominantes. En el Cretácico Superior, muchos árboles caducifolios como Maple, Oak y Walnut compitieron con coníferas como Sequoia y Geinitzia. Los pastos se extienden por el continente y cambian en gran medida el comportamiento de la erosión." #NT!
 dubois.271.f_jurassic: "El período Jurásico inferior puede haber terminado con erupciones masivas en una gran provincia magmática en Gondwana. Esto condujo al calentamiento global, junto con una extinción masiva de segundo orden. Las coníferas adaptadas a la sequía pequeñas se convirtieron en una parte importante de la flora y los saurópodos modernos desarrollados entre los dinosaurios. El período Jurásico, especialmente el período Jurásico tardío (Jurásico Superior), vio el primer apogeo de los dinosaurios, con grandes terópodos como Allosaurus y sauropods gigantes como Diplosdocus y Giraffatitan. La flora estaba dominada por las gimnospermas (incluidas las plantas de coníferas como Sequoias y Pines, pero también Ginkgo Trees and Cycads). El Jurásico también se conoce como la era de las cícadas porque eran muy comunes. Helechos y colas de caballo formaron el sotobosque de los bosques." #NT!
 dubois.271.f_triassic: "Durante el Triásico, un clima cálido prevaleció casi continuamente, aunque esto estaba sujeto a fuertes fluctuaciones al comienzo del período. El clima también parece haber estado bastante seco en todo el mundo: la razón era la forma del Pangea supercontinente y un efecto monzónico resultante. Probablemente había extensos desiertos tierra adentro. El giro del Pérmico al Triásico se asocia con un cambio faunal pronunciado. Esto es tan drástico que, debido al registro fósil significativamente cambiado, el giro del Pérmico al Triásico no es solo el límite entre dos períodos, sino también entre dos épocas de la historia de la Tierra, el Paleozoico y el Mesozoico. Como resultado, numerosos grupos de invertebrados marinos desaparecen de manera total o permanente del registro fósil. La fauna de vertebrados terrestres también está experimentando cambios significativos. El cambio en el mundo de las plantas de helechos a gimnospermas que ya habían tenido lugar en el Pérmico continuó en el Triásico." #NT!
 dubois.271.g: "¡Hermoso!" #NT!
 dubois.272.t: "Materiales" #NT!
 dubois.272.d: "[GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetFullName] muestra un perfeccionismo notable al completar su paisaje prehistórico. Es por eso que [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetSheHe] ya ha usado todo su presupuesto." #NT!
 dubois.272.f: "¿Fue el huevo de dinosaurio especialmente ordenado para la exposición? ¿Las semillas exquisitas? ¿O la punta de 300 libras que el portero recibió por la tierra natural? Por cualquier razón, el Dr. [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName] apenas puede explicar, el dinero simplemente fluye a través de sus manos." #NT!
 dubois.272.g: "¿Más dinero para algunas plantas y lagartos artificiales? ¡Olvídalo!" #NT!
 dubois.272.h: "¡Queremos un hermoso diorama, no ahorre gastos!" #NT!
 dubois.273.t: "¿Un trabajo ridículo?" #NT!
 dubois.273.d: "Algunos 'colegas' académicos se burlan del Dr. [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName] debido a la obsesión [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetHerHis] con el paisaje prehistórico no solo detrás de [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetHerHis], sino ahora bastante directamente. Algunos investigadores consideran que la actividad [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetHerHis] es un pasatiempo absurdo y el proyecto es un asunto fundamentalmente ridículo." #NT!
 dubois.273.f: ""La rareza extrema de las formas de transición en el registro fósil persiste como el secreto comercial de la paleontología". -Søren Kierkegaard" #NT!
 dubois.273.g: "¡La paleontología es una ciencia seria!" #NT!
 dubois.273.h: "Es cierto que nuestro paleontólogo es un poco peculiar." #NT!
 dubois.273.i: "Compre a esos académicos desagradables algunas botellas de jerez para que dejen al médico solo." #NT!
 dubois.274.t: "Interés estudiantil" #NT!
 dubois.274.d: "Desde hace algunas semanas, los estudiantes de la universidad han estado observando con creciente interés donde el Dr. [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName] está construyendo un paisaje prehistórico. Lo que algunos consideran una empresa peculiar, otros ven como inspiración; de repente, el pasado lejano se vuelve tangible." #NT!
 dubois.274.f: "Dinosaur Court en Crystal Palace Park en el sur de Londres es un parque temático geológico y paleontológico. Es conocido por las esculturas animales, que fueron creadas por Benjamin Waterhouse Hawkins a mediados del siglo XIX como las primeras representaciones figurativas de tamaño real del mundo de animales extintos. El parque tenía la intención de servir tanto a la diversión como a la educación de sus visitantes victorianos. En las islas del lago en la parte del complejo diseñado como un jardín de paisajes ingleses, se diseñó un parque temático que reflejaba la historia geológica de Gran Bretaña. Según un concepto basado en el geólogo David Thomas Ansted, cada una de las tres islas fue asignada a una era del Phanerozoico y fue diseñado con los sedimentos que se originaron en ese período. Hawkins fue asesorado por el paleontólogo Richard Owen. Aunque los animales prehistóricos ya no correspondían al estado de investigación en el mismo siglo, despertaron un gran interés y proporcionaron grandes partes de la población con un nivel básico de conocimiento paeontológico." #NT!
 dubois.274.g: "¡Una nueva generación de académicos!" #NT!
 dubois.274.h: "Deben ayudar al médico." #NT!
  
 je_dubois_safari_hippopotamus: "África Safari: hipopótamo" #NT!
 je_dubois_safari_hippopotamus_reason: "En un safari africano, a través de un seguimiento y captura constantes, se puede capturar un gran juego y luego transportarse a un [concept_dubois_zoo]. Solo es posible atrapar un animal por safari. Dependiendo de la especie animal, difiere si necesita trampas o si tiene que permanecer en su rastro. Como regla general, los animales grandes y lentos necesitan más trampas, mientras que los animales rápidos requieren más seguimiento. El safari dura 300 días. Si no se atrapa el animal para entonces, el equipo de Safari dejará el país nuevamente, sin éxito. Los animales n. Los animales tímidos toman vuelo. Un [concept_dubois_naturalist] que tiene el rasgo zoólogo puede resolver tales situaciones sin desventaja. Nuevas tecnologías como la ametralladora #ORANGE#! o #ORANGE Engine de combustión#! facilitan el seguimiento y la captura de animales." #NT!
