 dubois.118.d: "Nuestro zoológico está enriquecido por un nuevo animal exótico: hoy el tan esperado #O Capybara#! se trasladó a su nuevo recinto."
 dubois.118.f: "El Capybara, el roedor más grande del mundo, es nativo de América del Sur. Con sus pies web y su estilo de vida semiacuático, prospera en humedales y a lo largo de las orillas del río. Los capibaras son animales altamente sociales, que a menudo viven en grupos de 10 a 20 individuos. Se alimentan principalmente de hierbas y plantas acuáticas y son conocidos por su naturaleza suave y dócil. A pesar de su tamaño, son excelentes nadadores y pueden permanecer sumergidos para evitar depredadores."
 dubois.118.g: "¡Es un gran conejillo de indias!"
 visit_capybara_tt: "Visitará el recinto del #o Capybara#!"
