 dubois.39.d: "Después de semanas de intentos fallidos y un esfuerzo interminable, el tan esperado animal finalmente fue atrapado. El profesor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] está encantado. Los héroes regresan a casa con el animal que han ganado. ¡Ciertamente será más feliz en el agradable zoológico nacional de [ROOT.GetCountry.GetNameNoFlag] que en esta naturaleza incómoda!" #NT!
