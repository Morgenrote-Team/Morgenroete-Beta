 notification_dubois_java_man_notification_name: "[INITIATOR_COUNTRY.GetName] descubre el hombre de Java" #NT!
 notification_dubois_java_man_notification_desc: "Un [concept_dubois_paleontologist] de [INITIATOR_COUNTRY.GetName] ha descubierto un esqueleto importante en Java que podría responder preguntas sobre la evolución humana." #NT!
 notification_dubois_botanical_report_notification_name: "Informe botánico anual" #NT!
 notification_dubois_botanical_report_notification_desc: "Nuestro [Concept('concept_dubois_naturalist','$concept_dubois_naturalists$')] ha encontrado [GetPlayer.MakeScope.Var('dubois_specimen_notification_var').GetValue|0+=] nuevo espécimen este año." #NT!
  
 dubois.1.t: "Inauguración del zoológico" #NT!
 dubois.1.d: "En el día inaugural del nuevo [concept_dubois_zoo], los visitantes acuden en masa para ver a los animales. Pronto hubo un deseo de construir aún más recintos y establecer animales." #NT!
 dubois.1.f: "'Hace dos noches vi a los Tigres SUP en Exeter Change. Excepto el león de Veli Pacha en Morea, quien siguió al arquero árabe como un perro, el cariño de la hyaena por su arquero más me divirtió. ¡Tal conversación! - Había un 'hipopótamo', como Lord Liverpool en la cara; Y el 'Sloth ursine' tiene la voz y la forma de mi valet, pero el tigre habló demasiado. El elefante tomó y me dio mi dinero nuevamente, me quitó el sombrero, abrió una puerta. Trunked un látigo y se comportó tan bien, que desearía que él fuera mi mayordomo. El animal más guapo de la tierra es uno de los Panthers; Pero los pobres antílopes estaban muertos. Debería odiar ver uno aquí: la vista del camello me hizo pino nuevamente para Asia Menor. -Lord Byron" #NT!
 dubois.1.g: "Visite el nuevo zoológico." #NT!
 dubois.2.t: "Sobre el origen de las especies" #NT!
 dubois.2.d: "Con la publicación de su libro, el profesor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] ha hecho una contribución científica innovadora: tiene como objetivo explicar nada menos que el origen de las especies." #NT!
 dubois.2.f: "'Owing to this struggle for life, any variation, however slight and from whatever cause proceeding, if it be in any degree profitable to an individual of any species, in its infinitely complex relations to other organic beings and to external nature, will tend to the preservation of that individual, and will generally be inherited by its offspring ... I have called this principle, by which each slight variation, if useful, is preserved, by the term of Natural Selection, in order to mark its relation al poder de selección del hombre. -Carles Darwin" #NT!
 dubois.2.g: "Esta teoría revolucionará la ciencia." #NT!
 dubois.2.h: "Una vez más, la ciencia ha refutado las supersticiones religiosas." #NT!
 dubois.3.t: "Regreso del beagle" #NT!
 dubois.3.d: "El HMS Beagle ha regresado a Inglaterra después de un viaje de investigación de varios años. Ella ha traído un rico fondo de especímenes, huesos, dibujos y otros resultados científicos. [concept_dubois_naturalist] [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] también estaba a bordo." #NT!
 dubois.3.f: "'Cuando estaba a bordo del HMS Beagle, como naturalista, me sorprendió mucho los hechos en la distribución de los habitantes de América del Sur, y en las relaciones geológicas del presente a los habitantes pasados ​​de ese continente. Estos hechos me parecieron arrojar algo de luz sobre el origen de las especies, ese misterio de los misterios, como ha sido llamado por uno de nuestros mejores filósofos. - Charles Darwin" #NT!
 dubois.3.g: "Un viaje asombroso: ¿qué tipo de consecuencias tendrá?" #NT!
 dubois.4.t: "Kosmos" #NT!
 dubois.4.d: "Kosmos (generalmente conocido en inglés como 'Cosmos') fue un tratado influyente sobre ciencia y naturaleza escrita por el científico y explorador alemán Alexander Von Humboldt. Kosmos comenzó como una serie de conferencias entregada por Humboldt en la Universidad de Berlín, y se publicó en cinco volúmenes entre 1845 y 1862 (el quinto fue póstumo e incompleto)." #NT!
 dubois.4.f: "'A última hora de la noche de una vida ocupada, estoy entregando al público alemán una obra cuya vaga imagen se ha desplazado ante mi alma durante casi medio siglo. En muchos estados de ánimo, consideré que este trabajo no era trabajo: y cuando lo había renunciado, volví a él nuevamente, tal vez descuidadamente. Lo dedico a mis contemporáneos con la timidez de que una justa desconfianza de la medida de mis poderes debe inspirar en mí. Trato de olvidar que los escritos tan esperados generalmente disfrutan de menos indulgencia '. -Alexander von Humboldt" #NT!
 dubois.4.g: "Este trabajo servirá a la ciencia contemporánea." #NT!
 dubois.4.h: "Este trabajo inspirará a las generaciones futuras." #NT!
 dubois.5.t: "Herencia de Mendel" #NT!
 dubois.5.d: "El redescubrimiento del trabajo del abad Gregor Mendel provocó un gran avance en el campo de la genética. Sus tesis ya conocidas como 'reglas de Mendel'." #NT!
 dubois.5.f: "'La experiencia de la fertilización artificial, como se efectúa con plantas ornamentales para obtener nuevas variaciones en el color, ha llevado a los experimentos que aquí se discutirán aquí. La sorprendente regularidad con la que las mismas formas híbridas siempre reaparecían cada vez que la fertilización tenía lugar entre las mismas especies inducidas más experimentos que se realizarán, cuyo objeto era seguir los desarrollos de los híbridos en su progenie. -Gregor Mendel" #NT!
 dubois.5.g: "El nacimiento de la genética moderna." #NT!
 dubois.6.t: "El hombre de Java" #NT!
 dubois.6.d: "El médico holandés y anatomista [SCOPE.sCharacter('dubois_new_paleontologist_scope').GetFullName] causó una sensación científica en su búsqueda específica de los antepasados ​​del hombre. Descubrió el esqueleto de un hombre prehistórico que vivió hace un millón de años." #NT!
 dubois.6.f: "Los fósiles descubiertos por primera vez por [SCOPE.sCharacter('dubois_new_paleontologist_scope').GetFullName] en 1891 a orillas del río Solo cerca de Trinil en Java Oriental se llaman Java Man. Según el conocimiento actual, se dice que tienen alrededor de un millón de años. Fueron los primeros fósiles de homínidos que se descubrieron fuera de Europa y, después de los neandertales, la segunda evidencia de parientes fósiles de humanos anatómicamente modernos (Homo sapiens). Los hallazgos de Java se conocieron por primera vez como Anthropopithecus y luego como Pithecanthropus erectus. Hoy son asignados a la especie Homo erectus por la mayoría de los paleoantropólogos, por lo que su origen es ocasionalmente, como lo sugiere Franz Weidenreich en 1940, enfatizado por la adición de un epíteto de la subespecie: Homo erectus javanensis. Más de 50 años después del hallazgo de Dubois, Ralph von Koenigswald recordó que "ningún otro descubrimiento paleontológico ha creado tal sensación y ha llevado a una variedad de opiniones científicas conflictivas"." #NT!
 dubois.6.g: "¡Necesitamos a este hombre como nuestro paleontólogo principal!" #NT!
  
 dubois.11.t: "Un nuevo [concept_dubois_zoo_animal]" #NT!
 dubois.11.d: "[SCOPE.sCountry('dubois_animal_country').GetName] ha acordado amablemente vendernos un animal raro para nuestro [concept_dubois_zoo]." #NT!
 dubois.11.f: "Solo se puede comprar un animal para un zoológico a la vez. Después de la compra, el animal tardará aproximadamente un mes en llegar al zoológico. Solo después de la introducción adecuada al zoológico se puede seleccionar un nuevo animal a través de la acción diplomática. ¿Qué animal zoológico debería ser?" #NT!
