 smuggle_zoo_animal_desc: "Las circunstancias convincentes, como las relaciones hostiles, pueden hacer que sea necesario que un animal [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animal$')] se transfiera con urgencia a nuestro zoológico utilizando 'medidas especiales'."
