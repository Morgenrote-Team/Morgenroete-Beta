 dubois_theory_of_evolution_tech: "Teoría de la evolución" #NT!
 dubois_theory_of_evolution_tech_desc: "La ruptura crucial del concepto de tipos tipológicos constantes en biología vino con la teoría de la evolución a través de la selección natural. Darwin señaló que el crecimiento de la población conduciría a una "lucha por la existencia" en la que las variaciones favorables prevalecieron a medida que otros perecieron. Esto podría explicar la diversidad de plantas y animales de una ascendencia común. Algunos fueron perturbados por esto, ya que implicaba que los humanos no tenían un lugar especial en el universo." #NT!
 dubois_paleontology_tech: "Paleontología" #NT!
 dubois_paleontology_tech_desc: "Un interés en la historia de la Tierra y los animales extintos se remonta a la antigüedad y alcanzó un primer pico con los estudios de Georges Cuvier alrededor de 1800. Pero la publicación del "origen de las especies" fue un evento de agua en todas las ciencias de la vida, especialmente la paleontología. El debate científico que comenzó inmediatamente después de la publicación de 'Origen' condujo a un esfuerzo concertado para buscar fósiles de transición y otra evidencia de evolución en el registro fósil." #NT!
 dubois_genetics_tech: "Genética" #NT!
 dubois_genetics_tech_desc: "La genética moderna comenzó con el trabajo del fraile agustino Gregor Johann Mendel. El redescubrimiento de 1900 del trabajo de Mendel condujo a rápidos avances en genética. Para 1915, los principios básicos de la genética mendeliana se habían estudiado en una amplia variedad de organismos, especialmente la mosca de la fruta Drosophila melanogaster. Junto con el trabajo experimental, los matemáticos desarrollaron el marco estadístico de la genética de la población, aportando explicaciones genéticas al estudio de la evolución." #NT!
  
