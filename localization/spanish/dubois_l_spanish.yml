  ### 2.2.3 ### 
  
 dubois.261.t: "Sistementalización completa" #NT!
 dubois.261.d: "Durante años de trabajo, el Dr. [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName] ha publicado teorías [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetHerHis] sobre relaciones en el mundo prehistórico de animales y plantas. La publicación ya ha sido reconocida por una base por sus nuevas ideas sobre el árbol genealógico de los seres vivos." #NT!
 dubois.261.f: "'Recolectaré plantas y fósiles, y con los mejores instrumentos hará observaciones astronómicas. Sin embargo, este no es el propósito principal de mi viaje. Me esforzaré por descubrir cómo las fuerzas de la naturaleza actúan entre sí, y de qué manera el entorno geográfico ejerce su influencia en los animales y las plantas. En resumen, debo averiguar sobre la armonía en la naturaleza. -Alexander von Humboldt" #NT!
 dubois.261.g: "Es realmente ... muy interesante." #NT!
 dubois.262.t: "Árbol genealógico de un animal" #NT!
 dubois.262.d: "Después de que el Dr. [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName] haya comparado informes locales e internacionales sobre los fósiles de una determinada especie animal, [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetSheHe] cuestiona fundamentalmente los hechos previamente creidos sobre la evolución de esta especie." #NT!
 dubois.262.f: "'Absorbido en la investigación especial, no presté atención al edificio que mientras mientras tanto se estaba construyendo inconscientemente. Sin embargo, después de haber completado la comparación de las especies fósiles en París, quería, en aras de una fácil revisión de la misma, hacer una lista de acuerdo con su sucesión en formaciones geológicas, con el fin de determinar las características más exactamente y llevarlas a su enumeración en alivio más audaz. Lo que fue mi alegría y sorpresa descubrir que la enumeración más simple de los peces fósiles de acuerdo con su sucesión geológica también fue una declaración completa de las relaciones naturales de las familias entre ellos; Por lo tanto, uno podría leer el desarrollo genético de toda la clase en la historia de la creación, la representación de los géneros y las especies en las diversas familias que están allí determinadas; En una palabra, que la sucesión genética de los peces corresponde perfectamente con su clasificación zoológica, y con esa clasificación propuesta por mí. -Louis agassiz" #NT!
 dubois.262.g: "¿Tenemos este animal en el zoológico?" #NT!
 dubois.263.t: "Una pequeña adquisición" #NT!
 dubois.263.d: "Durante sus estudios, el Dr. [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName] entró en contacto con otro paleontólogo. A través de los canales de negociación, [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetSheHe] pudo adquirir un fósil que respalde su última tesis, a veces a expensas de la universidad." #NT!
 dubois.263.f: "'En la voz de la anatomía comparativa, cada hueso y el fragmento de un hueso, reanudaron su lugar. No puedo encontrar palabras para expresar el placer que tengo al ver, como descubrí un personaje, cómo todas las consecuencias, que predije a partir de él, se confirmaron sucesivamente; Los pies fueron encontrados de acuerdo con los personajes anunciados por los dientes; los dientes en armonía con los indicados de antemano por los pies; Los huesos de las piernas y los muslos, y cada parte de conexión de las extremidades, se encontraron unidos con precisión como los había arreglado, antes de que mis conjeturas fueran verificadas por el descubrimiento de las partes enteras: en resumen, cada especie era, como era, reconstruida de uno de sus elementos componentes. -William Buckland" #NT!
 dubois.263.g: "¿Vale la pena?" #NT!
 dubois.264.t: "Sugerencias geológicas" #NT!
 dubois.264.d: "En una conversación con [GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetFullName] sobre las ubicaciones de los fósiles en las capas de rocas, [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetFullName] obtuvo nuevas ideas importantes sobre la determinación cronológica." #NT!
 dubois.264.f: ""¿Por qué nadie ha visto que los fósiles solo dieron a luz a una teoría sobre la formación de la tierra, que sin ellos, nadie hubiera soñado nunca que hubiera épocas sucesivas en la formación del mundo". -Georges cuvier" #NT!
 dubois.264.g: "¡Ah, las sinergias de la geología y la paleontología!" #NT!
 dubois.265.t: "Una conferencia impresionante" #NT!
 dubois.265.d: "El Dr. [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName] dio una muy aclamada serie de conferencias en su universidad este semestre que se consideran inspiradores para la paleontología. Muchos estudiantes nuevos se han inscrito en el tema." #NT!
 dubois.265.f: "'Como uno penetra de costura a costura, de Stratum a Stratum y descubre, bajo las canteras de Montmartre o en los esquistos de los Urales, aquellos animales cuyos restos fosilizados pertenecen a las civilizaciones antediluvias, la mente está asustada para atrapar una visión de las miliarias de años y los millones de personas que son la memoria de la superficie y una tradición indestructible que tienen la tradición de la tradición y una tradición de la superficie y cuyas urbanías Nuestro globo forma los dos pies de tierra que nos proporcionan pan y flores. -Honoré de Balzac" #NT!
 dubois.265.g: "¡Un profesor popular!" #NT!
  
