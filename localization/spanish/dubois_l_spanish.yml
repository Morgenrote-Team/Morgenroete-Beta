 dubois.2051.m: "Visite la sección del esqueleto general."
 dubois.2171.t: "Sección de esqueleto general"
 dubois.2171.d: "¿Qué esqueleto visitar?"
 dubois.2171.f: "Se pueden encontrar algunos esqueletos en todo el mundo. La mayoría de ellos eran dinosaurios marinos u otras criaturas de los mares."
 dubois.2171.g: "Mosasaurus."
 dubois.2172.t: "Mosasaurio"
 dubois.2172.f: "Mosasaurus, de hecho, no es un dinosaurio sino un reptil marino. Vivían en los océanos del Cretácico. Hay muchas especies diferentes de Mosasaurus que se adaptan a varias regiones. Muchos de ellos eran depredadores de ápice y peces cazados, tiburones y otros dinosaurios y reptiles marinos."
 dubois.2172.h: "Regresar a la colección general"
