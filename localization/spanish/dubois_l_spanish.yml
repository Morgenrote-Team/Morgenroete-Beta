 dubois.10.d: "El gobierno no tiene interés en continuar manteniendo el zoológico en [SCOPE.sState('dubois_zoo_state').GetName]. Debe disolverse y los animales vendidos." #NT!
 dubois.10.f: "Un país solo puede mantener un solo zoológico en la capital. La cantidad de dinero y especímenes que recibe un país a cambio depende del tamaño del zoológico." #NT!
 dubois.10.g: "Pero ... ¡pero todos los animales maravillosos!" #NT!
  
