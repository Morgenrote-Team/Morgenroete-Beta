 ito_naturalist: "Naturalist"
 ito_naturalist_desc: "A learned student of the natural world, tasked with the collection of specimens and the live capture of exotic fauna."
 ito_naturalist_experienced: "Seasoned Naturalist"
 ito_naturalist_experienced_desc: "This naturalist has earned distinction through diligent fieldwork and valuable contributions to the cataloguing of nature’s diversity."
 ito_naturalist_famous: "Renowned Naturalist"
 ito_naturalist_famous_desc: "Celebrated for their groundbreaking expeditions and contributions to natural philosophy, this figure stands among the most esteemed scholars of the age."
 ito_botanist: "Botanist"
 ito_botanist_desc: "From jungles to deserts, from tree to moss, this character devoted their time to researching plants around the world."
 ito_entomologist: "Entomologist"
 ito_entomologist_desc: "Why would anyone ever want to research bugs? Well this character does and has become a specialist."
 ito_marine_biologist: "Marine Biologist"
 ito_marine_biologist_desc: "Ah, the sea! Wouldn't it be great to spend once life there? Just maybe not as a sailor. This character can spend their life researching all the life forms in the sea. What a wonderful life!"
 ito_zoologist: "Zoologist"
 ito_zoologist_desc: "Animals are exciting! They are fascinating! And this character wants to know them all!"
