 dubois.1030.t: "Recinto de gato de Pallas"
 dubois.1030.d: "El recinto de gato de Pallas era un terreno rocoso salpicado de grietas y pequeñas cuevas. A primera vista, el felino espeso y esponjoso parecía casi invisible, mezclando perfectamente con sus alrededores. Luego, viste uno: sus ojos redondos y anchos asomándose con cautela desde detrás de una roca, observando silenciosamente todo lo que lo rodea."
 dubois.1030.f1: "En el recinto rocoso del zoológico, el gato de Pallas mira detrás de una roca, sus ojos anchos y redondos escaneando los alrededores. Con su grueso pelaje plateado hinchado contra el frío, parece una pequeña y salvaje bola de pelusa. A diferencia de muchos otros gatos salvajes, el gato de Pallas tiene una construcción fornida y piernas cortas, perfectamente adaptadas a las regiones frías y de gran altitud de Asia Central donde vive."
 dubois.1030.f2: "A medida que el gato de Pallas emerge de su escondite entre las rocas, su cara plana y sus grandes y expresivos ojos le dan una apariencia casi cómica. Los visitantes a menudo se sorprenden por su pequeño tamaño y pelaje esponjoso, lo que lo ayudan a mezclarse con su entorno nevado. Solitario por naturaleza, el gato de Pallas rara vez se ve en la naturaleza, prefiriendo permanecer oculto en grietas de roca y madrigueras durante el día y emergiendo al amanecer o al anochecer para cazar."
 dubois.1030.f3: "En medio del ambiente de estepa simulado y simulado de su recinto, el gato de Pallas se mueve con una precisión tranquila, su cola gruesa que se arrastra por detrás como un penacho. Conocido por su comportamiento esquivo, este pequeño gato salvaje prefiere la soledad y se basa en su pelaje de camuflamiento para evitar la detección de depredadores y presas. Con una dieta que consiste principalmente en pequeños mamíferos, el gato de Pallas es un cazador hábil, que usa su aguda vista para detectar el movimiento en el terreno abierto."
