 dubois.1061.t: "Los recintos sudamericanos" #NT!
 dubois.1061.d: "El recinto sudamericano ofreció varios hábitats muy diversos. Desde selvas tropicales hasta áreas más secas, enormes rocas y la pampa." #NT!
