 dubois.1042.t: "Recinto de lince ibérico" #NT!
 dubois.1042.d: "Encontrar el #o Iberian Lynx#! en su recinto no fue una tarea fácil. Tenía muchos lugares para esconderse en el recinto bosque." #NT!
 dubois.1042.f1: "Dentro del recinto rústico del zoológico, una criatura cautivadora conocida como los ritmo de lince ibérico con un equilibrio real, sus orejas con mechones y su intensa mirada capturan la atención de los visitantes. Intrigado por su rareza y su encanto exótico, te acercas a un zoólogo conocedor, ansioso por aprender más sobre este notable felino. \ N \ n \ "El lince ibérico es una especie extremadamente rara y cautivadora", comienza el zoólogo. \ "Proveniente de la península ibérica en el suroeste de Europa, es un majestuoso gato salvaje de gran intriga. Lamentablemente, el lince ibérico enfrenta numerosos desafíos en la naturaleza debido a la pérdida de hábitat y la disminución de su presa principal, el conejo europeo." #NT!
 dubois.1042.f2: "En el encabezado del zoológico ajardinado del encantador, una materna lince ibérica guía a sus cachorros inquisitivos a través de su hábitat natural simulado, enseñándoles el arte de la caza. Sus impresionantes ojos ámbar y piel elegante evocan una sensación de asombro y asombro. Intrigado por su dinámica familiar única, buscas un cuidadoso chookeeper, con la esperanza de descubrir más sobre las vidas de estos felinos enigmáticos. \ "La madre desempeña un papel instrumental en la crianza y la guía de sus jóvenes. Después de un período de gestación de aproximadamente dos meses, da a luz a una camada de generalmente dos o tres cachorros. Ella imparte habilidades de caza vitales, inculcando en ellos las técnicas necesarias para acechar y atacar a su presa. Es una vista notable para presenciar los vínculos entre la madre y los cachorros en esta época de exploración y descubrimiento"." #NT!
 dubois.1042.f3: "Dentro del entorno idílico de la carcasa de los lince, un lince ibérico masculino emite una serie de llamadas distintivas, sus gruñidos guturales y sus sonidos parloteantes cautivando la atención de curiosos espectadores. Intrigado por sus vocalizaciones, te acercas a un chopero experto, con la esperanza de comprender la importancia de estos sonidos. \ N \ n \ "El lince ibérico se comunica con una variedad de vocalizaciones que son parte integral de su dinámica social, \" El Zookeeper comparte. \ "Los machos utilizan gruñidos profundos y llamadas parloteantes para afirmar su dominio y establecer límites territoriales, proporcionando una exhibición fascinante de su fuerza y ​​destreza. Estas señales vocales juegan un papel vital en las interacciones y los rituales de cortejo dentro de la población de lince. Es un glimpse en el mundo intrigante de estas notables parcelas durante esta época de la exploración natural"." #NT!
 dubois.1042.k: "Regresar a los recintos europeos" #NT!
 zoo_european_enclosures_tt: "Volverás a los recintos europeos del zoológico." #NT!
  
 dubois.1043.t: "Recinto de lobo euroasiático" #NT!
 dubois.1043.d: "El #o lobos euroasiáticos#! tenía un recinto bastante grande con múltiples rocas, así como árboles y arbustos. A menudo, los lobos estaban justo en frente de los visitantes, pero a veces estaban bien ocultos." #NT!
 dubois.1043.f1: "En el gran recinto de lobo, una criatura formidable conocida como el lobo deambula con una gracia salvaje, su mirada penetrante y su elegante piel cautivando la imaginación de los visitantes. Intrigado por su naturaleza indebida, te acercas a un zoólogo bien informado, ansioso por aprender más sobre este depredador icónico. \ "Encontrado en diversos hábitats en todo el mundo, estos majestuosos canidos se han adaptado notablemente a varios ecosistemas. Con sus dientes afilados, músculos poderosos y sentidos agudos, los lobos son cazadores magistrales, capaces de derribar presas mucho más grandes que ellos mismos"." #NT!
 dubois.1043.f2: "En el cautivador zoológico, un paquete de lobos se mueve como uno, sus movimientos coordinados y sus aullidos armoniosos resonan en el aire. La vista evoca una sensación de asombro y respeto por la belleza indebida de la naturaleza. Intrigado por su dinámica social, buscas un choque de zoológico bien informado, con la esperanza de descubrir más sobre la fascinante vida de los lobos. \ "Dentro de un paquete, cada miembro tiene un papel específico, desde el par alfa dominante hasta los miembros subordinados. Se comunican a través de una variedad de vocalizaciones, incluidos aullidos, ladridos y gruñidos, que sirven para coordinar los esfuerzos de caza, marcar territorio y reforzar los lazos sociales"." #NT!
 dubois.1043.f3: "En medio del pintoresco zoológico, un lobo solitario camina inquieto en su recinto, su mirada penetrante que refleja la soledad y la fuerza. Intrigado por su naturaleza enigmática, se acerca a un choque de zoológico bien informado, con la esperanza de comprender la importancia de su comportamiento. \ N \ n \ "La naturaleza solitaria de algunos lobos es un aspecto intrigante de su comportamiento, \" el Zoolkeeper comparte. \ "En ciertas circunstancias, un lobo puede optar por deambular y cazar solo, generalmente en busca de nuevos territorio o cuando han alcanzado la era de la dispersión. Esta existencia solitaria les permite cubrir grandes distancias y explorar nuevos entornos." #NT!
 dubois.1043.f4: "Una escena extraña se presentó hoy al visitante del zoológico. Sergei Prokofiev, el famoso compositor, fue al recinto para distraerse. Durante mucho tiempo se detuvo cuando vio un lobo. Ambos se miraron el uno al otro; Prokofiev observó al animal con un aspecto fijo, casi asombrado. El lobo miró hacia atrás, no menos sorprendido. Uno solo podría adivinar lo que estaba sucediendo dentro del maestro, pero los presentes están convencidos de que se inspiró en el momento." #NT!
  
 dubois.1044.t: "Recinto del tejón eurasiático" #NT!
 dubois.1044.d: "El recinto que estaba lleno de pequeñas colinas, arbustos y algunos árboles era un paraíso para el #o Eurasian Badger#!., especialmente los arbustos de bayas y algunas frutas salvajes fueron bienvenidas al plan de alimentos Badgers." #NT!
 dubois.1044.f1: "Dentro del sereno recinto del zoológico del zoológico, una criatura resistente conocida como el tejón europeo realiza sus actividades nocturnas, su cuerpo robusto y sus marcas faciales en blanco y negro distintivos que agregan un toque de encanto a su presencia. Intrigado por su naturaleza evasiva, te acercas a un cuidadoso chookeeper, ansioso por aprender más sobre este enigmático mustelid. \ N \ n \ "El tejón europeo es un habitante fascinante del bosque, \" Comienza el zoológico. \ "Dotado de una construcción resistente y poderosas garras, es experto en excavar sistemas de madriguera intrincados conocidos como Setts. Estas redes subterráneas proporcionan refugio, protección y un refugio seguro por las interacciones sociales entre los tejones. También son conocidos por su comportamiento distintivo de construir letrinas fuera de sus setts, ayudando a marcar el territorio y la comunicación"." #NT!
 dubois.1044.f2: "En los tranquilos confines del zoológico, un grupo de tejones europeos emerge de su morada subterránea, su piel elegante y sus cuerpos fuertes y bajos que se mezclan con los tonos terrosos de su hábitat natural. Intrigado por su dinámica social, buscas a un naturalista bien informado, con la esperanza de descubrir más sobre las vidas fascinantes de estos mamíferos nocturnos. \ "Estos clanes generalmente están compuestos por individuos relacionados, y exhiben comportamientos cooperativos, como el aseo comunitario y las tareas compartidas para elevar a los jóvenes." #NT!
 dubois.1044.f3: "En medio del tono moteado del recinto del bosque, un tejón europeo raya a través de la maleza, su agudo sentido del olfato que lo guía en busca de lombrices de tierra y otras pequeñas presas. Intrigado por sus hábitos de alimentación, te acercas a un contexto del zoológico experto, con la esperanza de comprender el papel ecológico de estas criaturas. \ "Su dieta omnívora, que incluye lombrices de tierra, insectos, mamíferos pequeños, frutas y raíces, ayuda a regular las poblaciones de varias especies y contribuye al ciclo de nutrientes. Sus actividades de madriguera también airen el suelo, facilitando el crecimiento de las plantas y la mejora de la fertilidad del suelo. A medida que los ingenieros de los ecosistemas, los malos, los malos tienen un impacto positivo en la salud general y la biodiversidad de su entorno." #NT!
  
 dubois.1045.t: "Recinto de robo" #NT!
 dubois.1045.d: "Un recinto diverso era ideal para el #o stoat#!. en él había pequeños parches de hierba, arbustos y algunos árboles. Algunos árboles más antiguos ya estaban muertos, pero proporcionaron un gran escondite para el animal pequeño." #NT!
 dubois.1045.f1: "Dentro del recinto dinámico del zoológico, una criatura animada y ágil conocida como los dardos y los tejidos con una notable velocidad y gracia, su cuerpo elegante y sus piernas cortas que le permiten navegar incluso los espacios más intrincados. Intrigado por su naturaleza energética, te acercas a un choque de zoológico bien informado, ansioso por aprender más sobre este cautivador Mustelid. \ N \ n \ "El Stoat, también conocido como la comadreja de cola corta, es un depredador pequeño pero formidable, \" El Zookeeper comienza. \ "Con sus cuerpos delgados, sentidos agudos y reflejos de rayo, los armadores son cazadores altamente calificados. Poseen una habilidad notable para cambiar el color de su pelaje, pasando de marrón en verano a una bata blanca pura durante los meses de invierno, lo que les permite mezclar sin costura en su entorno." #NT!
 dubois.1045.f2: "En el cautivador recinto de Stoat del zoológico, un par de stotes juguetones se involucran en un emocionante juego de persecución, sus movimientos rápidos y travesuras traviesas que capturan la atención de los visitantes. Intrigado por su comportamiento lúdico, buscas un choque de zoológico bien informado, con la esperanza de descubrir más sobre las vidas cautivadoras de los stoats. \ "Son criaturas altamente activas y curiosas, a menudo participan en comportamientos lúdicos como perseguir, saltar y luchar. Estas actividades ayudan a agudizar sus habilidades de agilidad y caza. Las armadas también son escaladores y nadadores hábiles, mostrando su versatilidad mientras exploran sus alrededores"." #NT!
 dubois.1045.f3: "En medio del hábitat naturalista del recinto de Stoat, un Stoat se lanza y sale de las madrigueras, su cuerpo delgado girando y girando con una flexibilidad impresionante. Intrigado por su agilidad, se acerca a un choque de zoológico bien informado, con la esperanza de comprender la importancia de su comportamiento. \ "Con sus cuerpos largos y sinuosos y sus fuertes patas traseras, pueden maniobrar a través de túneles estrechos y espacios ajustados con notable facilidad. Esta adaptabilidad les permite perseguir a su presa, que a menudo incluye pequeños mamíferos y aves. Las armadas son criaturas verdaderamente fascinantes para observar, mostrar su gracia natural y su proa." #NT!
  
 dubois.1046.t: "Gabinete de nutrias eurasiáticas" #NT!
 dubois.1046.d: "El centro del recinto #o euroasiático utter#! estaba dominado por un gran lago. Proporcionó suficiente espacio para la actividad favorita de la nutria de natación. El lago estaba rodeado de rocas y pequeños parches de hierba." #NT!
 dubois.1046.f1: "En el pintoresco recinto acuático del zoológico, una criatura elegante y juguetona conocida como la nutria euroasiática se desliza a través de las aguas cristalinas, su cuerpo ágil y los pies web que lo impulsan con una gracia sin esfuerzo. Intrigado por su destreza acuática, te acercas a un cuidadoso cero con el choque, ansioso por aprender más sobre este mamífero cautivador. \ "Con sus cuerpos simplificados, pies webbed y pieles densas, las nutrias son perfectamente adecuadas para un estilo de vida acuático. Pasan una parte significativa de su tiempo en el agua, buceo, natación y caza de peces, anfibios y crustáceos. Su naturaleza juguetona y sus movimientos ágiles les convierten en observar." #NT!
 dubois.1046.f2: "En el tranquilo hábitat del zoológico del río, una familia de nutrias euroasiáticas se divierten juguetonamente a lo largo del borde del agua, sus movimientos sincronizados y chirridos alegres que resonan en el aire. Intrigado por sus interacciones sociales, buscas un sabor sabroso, con la esperanza de descubrir más sobre las fascinantes vidas de estos mamíferos sociables. \ "Estas unidades familiares generalmente consisten en una pareja reproductora y sus descendientes. Se involucran en comportamientos cooperativos como el aseo, el juego e incluso la caza juntos. Los fuertes vínculos familiares entre las nutrias contribuyen a su bienestar y éxito general en su hábitat acuático." #NT!
 dubois.1046.f3: "En medio de la exuberante vegetación y las corrientes serpenteantes del recinto de la nutria, una nutria euroasiática demuestra su notable destreza manipulando un pequeño guijarro con sus patas, un comportamiento conocido como "malabarismo". Intrigado por sus habilidades cognitivas, se acerca a un choque de Zookeper experto, con la esperanza de comprender la importancia de este comportamiento lúdico. \ "El malabarismo de guijarros es un comportamiento común entre las nutrias, especialmente cuando son jóvenes. No solo sirve como una forma de juego, sino que también les ayuda a desarrollar su coordinación y destreza. Las nutrias son conocidas por su inteligente resolución de problemas y su capacidad para usar herramientas, como rocas, para abrir conchas o crujir prey." #NT!
  
 dubois.1047.t: "Recinto de ibex alpino" #NT!
 dubois.1047.d: "El recinto del IBEX alpino estaba dominado por rocas naturales y artificiales que ofrecían una gran oportunidad de escalada para el IBEX." #NT!
 dubois.1047.f1: "Dentro del recinto del zoológico de temática alpina, un grupo de criaturas resistentes y seguras conocidas como alpino Ibex navegan por el terreno rocoso con precisión, sus impresionantes cuernos y apariencia adaptativa capturando la atención de los visitantes. Intrigado por su capacidad para prosperar en entornos desafiantes, se acerca a un choque de cañas bien informado, ansioso por aprender más sobre estos notables habitantes de montaña. "Estos animales seguros son perfectamente adecuados para la vida en las altas cadenas montañosas. Sus cuernos curvos no solo son sorprendentes, sino que también tienen diversos propósitos, desde la defensa contra los depredadores hasta establecer el dominio dentro de sus grupos sociales. A pesar de las duras condiciones de su hábitat, alpino Ibex ha desarrollado estrategias únicas para encontrar comida y navegar el terreno rocoso"." #NT!
 dubois.1047.f2: "En el hábitat alpino del zoológico, un ibex alpino masculino se involucra en una exhibición enérgica de la cabeza con un compañero macho, sus impresionantes cuernos se enfrentan con un impacto rotundo. La vista de su comportamiento cautiva la atención de los visitantes. Intrigado por sus interacciones, buscas un choque de zoológico bien informado, con la esperanza de descubrir más sobre los comportamientos sociales de estos majestuosos habitantes de montaña. "Durante la temporada de reproducción, los hombres compiten por el acceso a las hembras al participar en estas batallas de cabeza a cabeza. El choque de cuernos determina el dominio y el acceso a los parejas. Estas interacciones son una espectacular muestra de fuerza y ​​jerarquía social dentro del grupo. Si bien estas pantallas pueden parecer agresivas, juegan un papel vital en el mantenimiento del equilibrio y el éxito reproductivo"." #NT!
 dubois.1047.f3: "En medio del paisaje rocoso del recinto de IBEX, un grupo de ibex alpino se acurrucan juntos, su grueso pelaje los protege del resfriado del entorno alpino. Intrigado por su comportamiento acurrucado, se acerca a un choque de zoológico bien informado, con la esperanza de comprender la importancia de sus acciones. "En las condiciones frías y desafiantes de las montañas, el acurrucado proporciona calidez y protección. Al acurrucarse juntos, IBEX puede conservar el calor corporal y protegerse entre sí de los elementos. Este comportamiento también refuerza los lazos sociales dentro del grupo, contribuyendo a su dinámica cooperativa y la capacidad de sobrevivir en su hábito exigente"." #NT!
  
 dubois.1048.t: "Recinto sabio" #NT!
 dubois.1048.d: "El recinto sabio era un gran prado con un pequeño estanque en el centro. Los sabios parecían bastante felices allí." #NT!
 dubois.1048.f1: "Dentro del expansivo hábitat de pastizales del zoológico, una criatura poderosa y majestuosa conocida como el sabio pasta pacíficamente, su tamaño masivo y su apariencia robusta capturan la atención de los visitantes. Intrigado por su presencia, te acercas a un sabor conocedor del zoológico, ansioso por aprender más sobre este impresionante bisonte europeo. \ N \ n "El sabio, también conocido como el bisonte europeo, es un símbolo de fuerza y ​​supervivencia", comienza el zoológico. "Estos magníficos animales alguna vez estuvieron al borde de la extinción, pero se han recuperado notable debido a los esfuerzos de conservación. Los sabios son los animales terrestres más pesados ​​de Europa, con los machos que pesan hasta una tonelada. Desempeñan un papel vital en el mantenimiento del equilibrio de los ecosistemas de pastizales, dando forma a la vegetación a través de sus hábitos de pastoreo"." #NT!
 dubois.1048.f2: "En el entorno de pastizales serenos del zoológico, un grupo de sabios se mueve juntos con sincronización armoniosa, sus movimientos coordinados e interacciones sociales cautivando la atención de los visitantes. Intrigado por su comportamiento, buscas un cuidadoso choque en el zoológico, con la esperanza de descubrir más sobre la vida de estos herbívoros carismáticos. "Se involucran en comportamientos cooperativos, como prepararse y vigilarse unos a otros. Estos herbívoros se alimentan principalmente de hierbas, arbustos y otras vegetaciones, utilizando sus poderosos cuernos y cabezas masivas para limpiar la nieve y alcanzar sus fuentes de alimentos preferidos durante el invierno. La dinámica social y los hábitos de pastoreo de los sabios contribuyen a la salud de su ecosistema"." #NT!
 dubois.1048.f3: "En medio de la extensión cubierta de hierba del hábitat sabio, un hombre dominante levanta su impresionante conjunto de cuernos curvos y deja escapar un bramido profundo y resonante, una exhibición de su autoridad y presencia. Intrigado por sus vocalizaciones, te acercas a un chopero experto, con la esperanza de comprender la importancia de estos sonidos. "Los machos usan sus llamadas a broma para establecer el dominio y mantener su territorio. Estos intercambios vocales también juegan un papel en la comunicación con otros miembros del grupo, ayudando a coordinar los movimientos y los comportamientos. La resonancia de un sabio es un testimonio de su poderosa presencia en su hábitat natural"." #NT!
  
 dubois.1051.t: "Los recintos norteamericanos" #NT!
 dubois.1051.d: "Aunque podría pensar en los densos bosques de Canadá, si escucha América del Norte, hay muchos biomas diferentes en el continente. El recinto estadounidense muestra algunas de estas áreas. Desde bosques y estepas densos hasta partes más tropicales." #NT!
