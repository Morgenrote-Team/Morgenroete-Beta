 dubois.35.t: "¡El animal escapa!"
 dubois.35.d: "Cuando el equipo de Safari intenta seguir al animal, de repente se escapa: ¡los asistentes del profesor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] están en peligro de ser sacudidos!"
 dubois.35.f: "\"Todavía estamos muy lejos de haber reconocido la vida de los animales, y todavía estamos estudiando animales con la intención de conocernos a nosotros mismos\". -Alfred Edmund brehm"
 dubois.35.g: "No hay nada que podamos hacer ..."
 dubois.36.t: "Animal attacks!"
 dubois.36.d: "Cuando el equipo de Safari quería establecer las trampas, sorprendieron al animal, ¡lo que luego atacó!"
 dubois.36.f: "'Está mal decir que el elefante es un animal irritable. Su naturaleza es leve y tranquila. Vive en amistad y paz con cada criatura. -Alfred Edmund brehm"
 dubois.36.g: "¡Huye, tontos!"
 dubois.36.h: "¡Entre las trampas de todos modos!"
 dubois.36.i: "Nuestro naturalista tiene todo bajo control."
 dubois.37.t: "Accidente de safari"
 dubois.37.d: "Descuentamente, el equipo de Safari se metió con el animal equivocado. Rompió todas las trampas, los asistentes heridos y luego se escapó. Semanas de trabajo fueron destruidas en cuestión de horas. El profesor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] tuvo que cancelar el safari debido a esto."
 dubois.37.f: "\"Si alguna vez he visto magia, ha sido en África\". -Nern Hemingway"
 dubois.37.g: "¡Horrible!"
 dubois.36.success_tt: "El equipo de Safari todavía establece con éxito sus trampas."
 dubois.36.fail_tt: "Un accidente grave lleva a que el safari se cancele prematuramente."
 dubois_safari_zoologist_tt: "Esto es posible porque nuestro naturalista tiene el rasgo zoólogo."
 dubois.38.t: "Extras de safari"
 dubois.38.d: "El progreso tecnológico también está revolucionando el safari, ya sea en forma de nuevas armas o vehículos."
 dubois.38.f: "\"Nunca supe de una mañana en África cuando desperté que no era feliz\". -Nern Hemingway"
 dubois.38.machine_guns_tt: "Con la invención de la ametralladora, nuestro equipo es muy superior a las amenazas humanas y animales."
 dubois.38.combustion_engine_tt: "Con la invención del motor de combustión, podemos ponernos al día con cualquier animal."
 dubois.38.g: "Esto da 'Heia Safari!' un significado completamente nuevo."
 dubois.40.d: "Al final de una búsqueda fallida que no trajo más que dificultades, el profesor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] se da por vencido y regresa a [ROOT.GetCountry.GetNameNoFlag] con su equipo."
