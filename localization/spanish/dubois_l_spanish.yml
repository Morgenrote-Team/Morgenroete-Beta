 dubois.52.t: "Forestación de alta calidad" #NT!
 dubois.52.d: "El Dr. [ROOT.Var('dubois_naturalist_var').GetCharacter.GetLastName] ha alcanzado el objetivo [ROOT.Var('dubois_naturalist_var').GetCharacter.GetHerHis]. A través de una selección cuidadosa de plántulas particularmente resistentes, medidas para el control de plagas naturales y el estudio de varios animales y plantas en la simbiosis, [ROOT.Var('dubois_naturalist_var').GetCharacter.GetSheHe] ha fortalecido de manera sostenible la industria forestal de nuestro país. Es probable que estas medidas ecológicas también traigan beneficios económicos." #NT!
 dubois.52.f: "Lo siento, ¿qué? ¿Quieres cortar los árboles? Fui a todos los problemas para criarlos, nutrirlos y cuidarlos, y ahora estos monstruos capitalistas quieren matar a mis queridos. ¡Dios mío, qué he hecho!" #NT!
 dubois.52.g: "¡Más madera para todos!" #NT!
 dubois.53.t: "Árboles de caucho de alta calidad" #NT!
 dubois.53.d: "El Dr. [ROOT.Var('dubois_naturalist_var').GetCharacter.GetLastName] ha alcanzado el objetivo [ROOT.Var('dubois_naturalist_var').GetCharacter.GetHerHis]. A través de una selección cuidadosa de plántulas particularmente resistentes, medidas para el control de plagas naturales y el estudio de varios animales y plantas en la simbiosis, [ROOT.Var('dubois_naturalist_var').GetCharacter.GetSheHe] ha fortalecido de manera sostenible la industria forestal de nuestro país. Es probable que estas medidas ecológicas también traigan beneficios económicos." #NT!
 dubois.53.f: "'¿Por qué todos están interesados ​​en el caucho completamente inútil? Solo hice eso porque estoy interesado en el mosquito del pantano neohesperialista. Este animal pequeño y fácil de fatal solo se reproduce en este clima." #NT!
 dubois.53.g: "¡Más goma para todos!" #NT!
  
 dubois_naturalist_forestry_improvement_loc: "\ nProfesor [GetPlayer.MakeScope.Var('dubois_naturalist_var').GetCharacter.GetLastNameNoFormatting] es bien conocido por el trabajo [GetPlayer.MakeScope.Var('dubois_naturalist_var').GetCharacter.GetHerHis] en bosques y cómo mejorar la silvicultura." #NT!
 dubois_naturalist_rubber_improvement_loc: "\ n[GetPlayer.MakeScope.Var('dubois_naturalist_var').GetCharacter.GetHerHis|U] Trabajar en plantaciones de caucho y experimentos con las mejores condiciones de crecimiento permitió a nuestro país mejorar la producción de caucho masivamente." #NT!
  
 dubois.22.t: "Prof. [ROOT.Var('dubois_naturalist_var').GetCharacter.GetLastName] documentos [SCOPE.GetRootScope.GetCountry.GetCustom('dubois_animal_documentation_name')]" #NT!
 dubois.22.d: "Después de meses de observar al animal en su hábitat nativo, [ROOT.Var('dubois_naturalist_var').GetCharacter.GetFullName] ha completado sus observaciones. Su tratado, #YELLOW '[SCOPE.GetRootScope.GetCountry.GetCustom('dubois_animal_documentation_title')]'#!, ya está disponible. [SCOPE.GetRootScope.GetCountry.GetCustom('dubois_animal_documentation_topic')]" #NT!
 dubois.22.g: "Reserve una copia para la Biblioteca Nacional." #NT!
 dubois_document_new_animal_tt: "Prof. [ROOT.Var('dubois_naturalist_var').GetCharacter.GetLastName] documenta el #ORANGE [SCOPE.GetRootScope.GetCountry.GetCustom('dubois_animal_documentation_name')]#!" #NT!
  
 je_dubois_native_animal: "Documentación de un animal nativo" #NT!
 je_dubois_native_animal_reason: "El Prof. [ROOT.Var('dubois_naturalist_var').GetCharacter.GetLastName] estudia un animal doméstico en su hábitat natural. La experiencia, las habilidades y los rasgos de carácter, así como la universidad con un enfoque en la historia natural, influyen en cuánto tiempo lleva este proceso. El animal [ROOT.Var('dubois_naturalist_var').GetCharacter.GetSheHe] estudios es el #ORANGE [SCOPE.GetRootScope.GetCountry.GetCustom('dubois_animal_documentation_name')]#!." #NT!
