 dubois.251.t: "Huesos humanos desconocidos" #NT!
 dubois.251.d: "Durante su investigación paleontológica, [SCOPE.sCharacter('dubois_paleontologist_scope').GetFullName] encontró huesos humanos de tiempos prehistóricos. Probablemente son decenas de miles de años. Envió los huesos de manera segura para que un profesional pudiera cuidarlos." #NT!
 dubois.251.f: "Al asombro del paleontólogo, [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetSheHe] encontró los restos de un esqueleto humano en una capa superior de roca. Sin embargo, [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetSheHe] no pudo reconstruir las conexiones. [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] tiene conocimiento paleo-antropológico rudimentario, pero no quiere dar una opinión, ya que esto puede influir en el resultado científico." #NT!
  
 dubois_add_fossil_java_tt: "Gane #G 1#! @dubois_human_fossil! #O Fossil humano especial#!: Java Man." #NT!
 dubois_add_fossil_neanderthaler_tt: "Gane #G 1#! @dubois_human_fossil! #O Fossil humano especial#!: Neanderthaler." #NT!
 dubois_add_fossil_taung_tt: "Gane #G 1#! @dubois_human_fossil! #O Fossil humano especial#!: Taung Child." #NT!
 dubois_add_fossil_peking_tt: "Gane #G 1#! @dubois_human_fossil! #O Fossil humano especial#!: Peking Man." #NT!
 dubois_add_fossil_cromagnon_tt: "Gane #G 1#! @dubois_human_fossil! #O Fossil humano especial#!: Cro-Magnon Man." #NT!
 dubois_add_fossil_piltdown_tt: "Gane #G 1#! @dubois_human_fossil! #O Fossil humano especial#!: Piltdown Man." #NT!
  
 dubois.901.t: "Congreso naturalista: el lugar del hombre en la naturaleza" #NT!
 dubois.901.d: "Se han completado los preparativos para lo que posiblemente sea el congreso científico más importante de los años pasados ​​y futuros. Será aproximadamente nada menos que la clasificación taxonómica de los humanos, uno de los temas más acalorados de todos después de la creación de la teoría de la evolución de [SCOPE.sCharacter('dubois_darwin_scope').GetFullName]. Las invitaciones se enviarán a todos los naturalistas del mundo. El profesor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] presidirá la sesión." #NT!
 dubois.901.f: "En el transcurso del siglo XIX, la disputa sobre la clasificación taxonómica de los humanos llegó a una cabeza en relación con la formulación de la teoría de la evolución. Aunque durante mucho tiempo se sabía que los humanos eran similares a los grandes simios, y Carl Linnaeus ya los había colocado en el orden de los primates, había varias reservas. Para enfatizar la singularidad de los humanos, Johann Friedrich Blumenbach lo distinguió de todos los demás primates como "de dos manos" (bimana) de "cuatro manos" (Quadrumana). Esta clasificación, aunque bastante reciente, ganó popularidad en los círculos académicos, como el influyente paleontólogo británico Richard Owen. Para los partidarios de la teoría de la evolución, esta era una situación insostenible y para los anatomistas un horror, significaba que, según este orden, un gorila estaba más cerca de un babuino de estepa que un ser humano." #NT!
 dubois.901.g: "El mundo de la ciencia debería ser nuestro invitado." #NT!
 dubois.902.d: "[SCOPE.sCountry('dubois_congress_host_country').GetName] ha invitado a un Congreso Internacional de Ciencias. El tema será la clasificación taxonómica de los humanos a la luz de la teoría de la evolución. El profesor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] ha recibido una cálida invitación." #NT!
 dubois.902.g: "No nos perderemos este evento." #NT!
 dubois.904.t: "El lugar del hombre en la naturaleza: ¿único o simplemente otro simio?" #NT!
 dubois.904.d: "Después de solo dos conferencias, quedó claro cuán competitivo es esencialmente un proceso administrativo en zoología. Incluso las amistades académicas se dividen sobre la cuestión de cómo las personas deben clasificarse. Aparentemente, ya no es la cuestión científica como tal que ha ganado la ventaja, sino las implicaciones asociadas." #NT!
 dubois.904.f: "Después de que los elementos morfológicos se llevaron por primera vez al campo, el debate llegó a una cabeza en un aspecto particular de la anatomía: el cerebro. [SCOPE.sCharacter('dubois_hippocampus_defender_scope').GetFullName] presentó varios documentos sobre las diferencias anatómicas entre simios y humanos, enfatizando la imposibilidad de que los simios se transmutan en hombres. Afirmó que los humanos no eran simplemente un orden biológico distinto de primates, sino una subclase separada de mamíferas, distinta de todos los demás primates y mamíferos en general. El Prof. [SCOPE.sCharacter('dubois_hippocampus_defender_scope').GetLastName] basó esta clasificación en tres características, la más importante es su afirmación de que solo el cerebro humano tiene un hipocampo menor. Esto fue contrarrestado por [SCOPE.sCharacter('dubois_hippocampus_attacker_scope').GetFullName], quien insistió en que estas características supuestamente únicas se podían encontrar en grandes simios. Cuando se le preguntó si podría vivir con la idea de ser solo un mono modificado, el Prof. [SCOPE.sCharacter('dubois_hippocampus_attacker_scope').GetLastName] respondió: "Es tan respetable ser modificado mono como suciedad modificada"." #NT!
 dubois.904.g: "El hombre es único en el reino animal." #NT!
 dubois.904.h: "Los humanos están más estrechamente relacionados con los simios de lo que se pensaba anteriormente." #NT!
 dubois.905.t: "Discurso respetado" #NT!
 dubois.905.d: "[SCOPE.sCharacter('dubois_naturalist_scope').GetFullName] dio una conferencia al personal científico reunido en [SCOPE.sCountry('dubois_congress_host_country').GetName] que inspiró a la audiencia y a los jóvenes académicos por igual." #NT!
 dubois.905.f: "'Dice Owen, puedes ver el cerebro de Chimpanzee \ nis siempre extremadamente pequeño, \ ntwith el \ nof de la extremidad shorn, \ nand no' Hippocampus 'en absoluto. Pocos. \ Ndetrimental para su reputación." #NT!
 dubois.905.g: "El profesor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] causa una impresión considerable." #NT!
 dubois.906.t: "Valiosa contribución al debate" #NT!
 dubois.906.d: "Una brillante conferencia científica del profesor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] amplió los horizontes del mundo académico en el Congreso de Ciencias en [SCOPE.sCountry('dubois_congress_host_country').GetName]. Probablemente tendrá un efecto duradero." #NT!
 dubois.906.f: "'Tenía teorías muy extrañas sobre muchas cosas. Incluso se había levantado una vez en la Asociación Británica, y declaró que los simios tenían estudiantes de hipopótamo en sus cerebros tal como lo han hecho los hombres. Lo cual fue algo impactante de decir; porque, si fuera así, ¿qué sería de la fe, la esperanza y la caridad de los millones inmortales? Puede pensar que existen otras diferencias más importantes entre usted y un mono, como poder hablar, y hacer máquinas, y saber lo correcto de lo incorrecto, y decir sus oraciones y otros pequeños asuntos de ese tipo; Pero esa es la fantasía de un niño, querida. No se debe depender nada de la gran prueba del hipopótamo. Si tienes un hipopótamo mayor en tu cerebro, no eres mono, aunque tenías cuatro manos, no tenías pies y más apish que los simios de todas las aperies ". -Carles Kingsley" #NT!
 dubois.907.t: "La pregunta del hipopótamo" #NT!
 dubois.907.d: "El debate sobre el papel de los humanos en el reino animal ya ha recibido una atención pública generalizada, de una manera que no es exactamente halagador. El escritor [SCOPE.sCharacter('dubois_hippopotamus_writer').GetLastName] ya se burla de la disputa académica en una obra." #NT!
 dubois.907.f: "'Estábamos muy encantados, y puedo decir, bastante interesado, descubrir que teníamos todos los hipopotamos en nuestros cerebros. Ciertamente, nunca sentí uno en el mío; Pero tal vez está muerto, por lo que no se agitó, y luego, por supuesto, no cuenta, ya sabes. Todos tienen cerebros en la cabeza, a menos que sea un esqueleto; Y se endureció las cosas de su cola como un mono, que sé, porque lo vi con mis propios ojos. Fue el profesor Huxley dijo que estaba en su cola, no el del Sr. Huxley, por supuesto, sino los simios: solo los simios no tienen colas, así que no veo eso. Y luego el otro caballero que se levantó por última vez, Sr. Flower, ya sabes, dijo que estaba por todo el mono, en todas partes. ¡En todos los hipocampos, de cabeza a pie, pobre bestia, como un perro en todo las garrapatas! Me pregunto por qué no se frotan Bluestone en la parte posterior de su cuello, como se le hace a un puntero. Bueno, entonces. ¿Dónde estaba yo? ¡Oh! Y el profesor Owen dijo que no estaba en simios en absoluto: sino solo en el orden Bimana, ese somos tú y yo. Bueno, él lo sabe mejor. Y todos también saben mejor, porque son monstruosos compañeros inteligentes. Entonces, uno debe tener razón, y todo lo demás está mal, o de lo contrario, uno de ellos está mal, y todo lo demás, ¿ves eso? Me pregunto por qué no dan cuenta al respecto. -Carles Kingsley" #NT!
 dubois.907.g: "Eso es gracioso." #NT!
 dubois.908.t: "Intercambio intelectual o material" #NT!
 dubois.908.d: "Nuestro naturalista ganó algo de tiempo libre al margen del Congreso y ahora está pensando en cómo debería usarlo mejor." #NT!
 dubois.908.f: "[SCOPE.sCharacter('dubois_naturalist_scope').GetFullName] conoció a algunos colegas interesantes en el Congreso de Ciencias que desean intercambiar ideas sobre algunos temas científicos. Un intercambio de experiencias sería extremadamente fructífero. Por otro lado, el profesor también podría usar su tiempo para intercambiar algunas colecciones de escarabajos y plantas con otros colegas ..." #NT!
 dubois.908.g: "Intercambiar ideas con colegas." #NT!
 dubois.908.h: "Intercambie el espécimen con colegas." #NT!
 dubois.909.t_unique: "El hombre es único" #NT!
 dubois.909.t_primate: "El hombre y los simios están relacionados" #NT!
 dubois.909.d_unique: "Los naturalistas han establecido sus largos debates. Los humanos tienen una posición especial en el reino animal: esto es lo que los académicos declararon en una declaración final, que el presidente del Congreso leyó ceremoniosamente hoy." #NT!
 dubois.909.d_primate: "Algunos profesores abandonaron enojado el pasillo cuando concluyó el Congreso y se leyó la declaración final. Los humanos, encontrados los académicos, están más estrechamente relacionados con los monos de lo que se creía anteriormente." #NT!
 dubois.909.f_unique: "'En el hombre, el cerebro presenta un paso ascensivo en el desarrollo, más alto y más fuertemente marcado que el que la subclase anterior se distinguió de la que está debajo de él. Los hemisferios cerebrales no solo se superponen los lóbulos olfativos y el cerebelo, sino que se extienden antes del uno, y más atrás que el otro. Su desarrollo posterior es tan marcado que los anatomistas han asignado a esa parte el carácter de un tercer lóbulo; Es peculiar del género Homo, y igualmente peculiar es el "cuerno posterior del ventrículo lateral" y el "hipocampo menor", que caracteriza el lóbulo posterior de cada hemisferio. La materia gris superficial del cerebro, a través del número y la profundidad de las convoluciones, alcanza su máximo extensión en el hombre. Los poderes mentales peculiares se asocian con esta forma más alta de cerebro, y sus consecuencias ilustran maravillosamente el valor del carácter cerebral; De acuerdo con mi estimación, me llevan a considerar el género Homo, como no solo un representante de un orden distinto, sino de una subclase distinta de la mamíferas, para la cual propongo un nombre de 'Archencephala'." #NT!
 dubois.909.f_primate: "'Es bastante seguro que el mono que más casi se acerca al hombre es el chimpancé o el gorila. En las proporciones generales del cuerpo y las extremidades hay una notable diferencia entre el gorila y el hombre en cualquier proporción que el gorila difiera del hombre, los otros simios se apartan aún más del gorila y eso, en consecuencia, tales diferencias de proporción pueden no tener valor ordinal. En la importante cuestión de la capacidad craneal, los hombres difieren más ampliamente entre sí que de los simios; Mientras que los simios más bajos difieren tanto, en proporción, de los más altos, como lo hace este último del hombre. Por lo tanto, es obvio que, en gran medida como la dentición del simio más alto difiere del hombre, difiere mucho más ampliamente de la de los simios más bajos y más bajos. Por lo tanto, cualquier sistema de órganos se estudie, la comparación de sus modificaciones en la serie APE conduce a un mismo resultado: que las diferencias estructurales que separan al hombre del gorila y el chimpancé no son tan grandes como las que separan el gorila de los simios inferiores ". -Thomas Henry Huxley" #NT!
 dubois.909.g: "El hombre es la corona de la creación." #NT!
 dubois.909.h: "¿Somos solo simios sin pelo?" #NT!
  
 dubois.911.t: "Congreso antropológico: origen de los humanos modernos" #NT!
 dubois.911.d: "Nuestro país será el anfitrión del Congreso más importante en la historia de la antropología. Una de las grandes preguntas de la humanidad, a saber, la de su origen, debe aclararse. Los antropólogos de todo el mundo discutirán si esto sucedió en Europa, Asia o África. [SCOPE.sCharacter('lepsius_anthropologist_scope').GetFullName] liderará el debate." #NT!
 dubois.911.f: "¿De dónde viene el hombre? La historia bíblica sobre la expulsión del paraíso ya contiene el núcleo de esta pregunta: obviamente no proviene de la región en la que vive hoy. En consecuencia, durante mucho tiempo en Europa, se pensaba que los huesos humanos antiguos eran los restos de aquellas personas que perecían en la gran inundación, al igual que los dinosaurios se pensaba que eran animales que no tenían lugar en el arca. Con la postulación de la teoría de la edad de hielo y los posteriores estudios geológicos y paleontológicos, que mostraron que la Tierra era significativamente mayor de lo esperado, aumentó el interés en los 'cavernos'. A finales de la teoría de la evolución y el descubrimiento de los huesos prehistóricos que tenían más de unos pocos miles de años, la cuestión del lugar de origen de los humanos modernos se volvió más virulenta." #NT!
 dubois.911.g: "¿Dónde está la cuna de la humanidad?" #NT!
 dubois.912.d: "[SCOPE.sCountry('dubois_congress_host_country').GetName] ha invitado a un Congreso Internacional de Ciencias. El tema será el origen de los humanos modernos. El profesor [SCOPE.sCharacter('lepsius_anthropologist_scope').GetLastName] ha recibido una cálida invitación." #NT!
 dubois.914.t: "¿Subieron los humanos modernos en Europa, Asia o África?" #NT!
 dubois.914.d: "El mundo académico se ha dividido en tres campamentos. La cuestión de la cuna de la humanidad no solo está vinculada a un cierto orgullo nacional, sino también a tesis de evolución humana." #NT!
 dubois.914.f: "En un debate estimulante, los respectivos defensores de los tres campos intercambiaron sus argumentos. [SCOPE.sCharacter('dubois_europe_defender_scope').GetLastName] trajo a Europa al campo porque los hallazgos hasta ahora mostraron el mayor volumen cerebral en fósiles europeos. Dado que el cerebro más grande precedió a caminar en posición vertical, esto es inevitable. [SCOPE.sCharacter('dubois_asia_defender_scope').GetLastName] dudaba de esta teoría. Los fósiles de representantes en posición vertical y humano ya se han encontrado en Asia; por lo tanto, el cerebro solo se desarrolló después de caminar en posición vertical. [SCOPE.sCharacter('dubois_africa_defender_scope').GetLastName], por otro lado, señaló que las especies APE conocidas que están más cerca de los humanos provienen de África, no de Asia. Como el inventor de la teoría de la evolución lo había basado, el origen de la humanidad tuvo que ser encontrado allí." #NT!
 dubois.914.g: "Los humanos modernos se desarrollaron en Europa." #NT!
 dubois.914.h: "Todo apunta a un origen asiático." #NT!
 dubois.914.i: "La cuna de la humanidad se encuentra en África." #NT!
 dubois.915.t: "Discurso respetado" #NT!
 dubois.915.d: "[SCOPE.sCharacter('lepsius_anthropologist_scope').GetFullName] dio una conferencia al personal científico reunido en [SCOPE.sCountry('dubois_congress_host_country').GetName] que inspiró a la audiencia y a los jóvenes académicos por igual." #NT!
 dubois.915.f: "'La tierra es la cuna de la humanidad, pero la humanidad no puede quedarse en la cuna para siempre.' \ N -konstantin Tsiolkovsky." #NT!
 dubois.915.g: "El profesor [SCOPE.sCharacter('lepsius_anthropologist_scope').GetLastName] causa una impresión considerable." #NT!
 dubois.916.t: "Valiosa contribución al debate" #NT!
 dubois.916.d: "Una brillante conferencia científica del profesor [SCOPE.sCharacter('lepsius_anthropologist_scope').GetFullName] amplió los horizontes del mundo académico en el Congreso de Ciencias en [SCOPE.sCountry('dubois_congress_host_country').GetName]. Probablemente tendrá un efecto duradero." #NT!
 dubois.916.f: "'Tenía teorías muy extrañas sobre muchas cosas. Incluso se había levantado una vez en la Asociación Británica, y declaró que los simios tenían estudiantes de hipopótamo en sus cerebros tal como lo han hecho los hombres. Lo cual fue algo impactante de decir; porque, si fuera así, ¿qué sería de la fe, la esperanza y la caridad de los millones inmortales? Puede pensar que existen otras diferencias más importantes entre usted y un mono, como poder hablar, y hacer máquinas, y saber lo correcto de lo incorrecto, y decir sus oraciones y otros pequeños asuntos de ese tipo; Pero esa es la fantasía de un niño, querida. No se debe depender nada de la gran prueba del hipopótamo. Si tienes un hipopótamo mayor en tu cerebro, no eres mono, aunque tenías cuatro manos, no tenías pies y más apish que los simios de todas las aperies ". -Carles Kingsley" #NT!
 dubois.917.t: "Misterioso cráneo" #NT!
 dubois.917.d: "Un antropólogo aficionado apareció en la conferencia con un fósil desconocido. Le gustaría venderlo a la sociedad científica, pero a un precio horrible. Muchos antropólogos rechazan el enfoque de 'cerdo en un poke'." #NT!
 dubois.917.f: ""
 dubois.917.g: "Cada hueso es valioso para nuestra colección." #NT!
 dubois.917.h: "... Pero este hueso obviamente no tiene valor." #NT!
 dubois.919.t_europe: "Los humanos modernos provienen de Europa" #NT!
 dubois.919.t_asia: "Los humanos modernos provienen de Asia" #NT!
 dubois.919.t_africa: "Los humanos modernos provienen de África" #NT!
 dubois.919.d_europe: "La ciencia internacional ha acordado un origen europeo de la humanidad moderna. Los académicos no europeos han denunciado esta decisión como suprematismo." #NT!
 dubois.919.d_asia: "El Congreso Antropológico Internacional acordó recientemente el compromiso de que los humanos deben provenir de Asia. La mayoría de los miembros de la Asamblea estuvieron de acuerdo con esta opinión." #NT!
 dubois.919.d_africa: "Después de un debate final muy controvertido, los científicos pudieron estar de acuerdo con una estrecha mayoría en que el origen de la humanidad debería ubicarse en África." #NT!
 dubois.919.f_europe: "Históricamente, la cuestión del lugar real de origen de la humanidad no se resolvió a principios del siglo XX. Mientras que un grupo pequeño, en parte engañado por el descubrimiento del llamado hombre Piltdown, sospechaba que el origen del hombre moderno en Europa menos por razones científicas que ideológicas, la teoría de Asia había recibido el mayor apoyo. Los descubrimientos sobre Java y la recuperación del hombre de Peking jugaron un papel importante en esto. Fue solo desde mediados del siglo XX que cada vez más hallazgos africanos comenzaron a erosionar esta opinión." #NT!
 dubois.919.f_asia: "Históricamente, la cuestión del lugar real de origen de la humanidad no se resolvió a principios del siglo XX. Mientras que un grupo pequeño, en parte engañado por el descubrimiento del llamado hombre de Piltdown, sospechaba que el origen del hombre moderno en Europa menos por razones científicas que ideológicas, la teoría de Asia había recibido el mayor apoyo. Los descubrimientos sobre Java y la recuperación del hombre de Peking jugaron un papel importante en esto. Fue solo desde mediados del siglo XX que cada vez más hallazgos africanos comenzaron a erosionar esta opinión." #NT!
 dubois.919.f_africa: "Históricamente, la cuestión del lugar real de origen de la humanidad no se resolvió a principios del siglo XX. Mientras que un grupo pequeño, en parte engañado por el descubrimiento del llamado hombre Piltdown, sospechaba que el origen del hombre moderno en Europa menos por razones científicas que ideológicas, la teoría de Asia había recibido el mayor apoyo. Los descubrimientos sobre Java y la recuperación del hombre de Peking jugaron un papel importante en esto. Fue solo desde mediados del siglo XX que cada vez más hallazgos africanos comenzaron a erosionar esta opinión." #NT!
 dubois.919.g: "Como se esperaba, la humanidad evolucionó en Europa." #NT!
 dubois.919.h: "Todas las evidencias sugieren que la humanidad evolucionó en Asia." #NT!
 dubois.919.i: "'Fuera de África' es una tesis aprobada ahora." #NT!
  
  
 dubois.921.t: "Congreso paleontológico: extinción de los dinosaurios" #NT!
 dubois.921.d: "Nuestra nación tiene el honor de preparar uno de los congresos más importantes en paleontología. Los científicos de todo el mundo acudirán en masa a [SCOPE.sCountry('dubois_congress_host_country').GetName] para responder la pregunta de por qué los dinosaurios se extinguieron. [SCOPE.sCharacter('dubois_paleontologist_scope').GetFullName] ya ha elegido su casco de médula favorito para usar durante su discurso de apertura." #NT!
 dubois.921.f: "La cuestión de lo que condujo a la extinción de los dinosaurios ha afectado a la humanidad desde el día que se encontró y clasificó el primer hueso de dinosaurio como parte de una especie desconocida. Antes del siglo XIX, las personas se contentaron con despedir a los dinosaurios como los animales que no llegaron al arca de Noé en la inundación. A medida que se desarrollaron nuevos métodos geológicos y paleontológicos, la imagen se volvió más matizada. La idea de la inundación aún vivía con Georges Cuvier, aunque en la dirección opuesta: creía que el nivel del mar se había hundido y que los lagartos que había ubicado en los humedales había perdido su hábitat. Fue solo una de las numerosas teorías que surgirían durante el próximo siglo y medio: respuestas insatisfactorias." #NT!
 dubois.921.g: "¿Alguna vez se responderá esta pregunta?" #NT!
 dubois.922.d: "[SCOPE.sCountry('dubois_congress_host_country').GetName] ha invitado a un Congreso Internacional de Ciencias. El tema será la causa de la extinción de los dinosaurios. El profesor [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] ha recibido una cálida invitación." #NT!
 dubois.922.f: "Este será el evento de la década." #NT!
 dubois.923.t: "Teoría revolucionaria de [SCOPE.sCharacter('verrier_astronomer_scope').GetLastName]" #NT!
 dubois.923.d: "Poco antes del comienzo del Congreso, el astrónomo más reconocido de nuestra nación, [SCOPE.sCharacter('verrier_astronomer_scope').GetFullName], anunció que tenía su propia idea de lo que podría haber llevado a la extinción de los dinosaurios: ¡un impacto asteroide! Pide que esta tesis se extienda entre los paleontólogos." #NT!
 dubois.923.f: "Aunque el profesor [SCOPE.sCharacter('verrier_astronomer_scope').GetLastName] no era un paleontólogo, estaba familiarizado con los fenómenos cósmicos, y sabía sobre su poder destructivo. El siglo XIX había visto algunos grandes cometas increíbles en el cielo, pero al mismo tiempo, en el caso de Tunguska, había experimentado lo que las piezas de roca extraterrestres podían hacer. El astrónomo no solo hizo cálculos teóricos, sino que también tenía muestras recolectadas que contenían materiales inusuales en ciertas capas de rocas, incluidas las del final del período cretáceo. En una comunicación constante con el profesor [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName], los dos científicos famosos intercambiaron sus puntos de vista y, con la ayuda del conocimiento físico más moderno, llegaron a la conclusión de que un impacto de los asteroides fue la causa más lógica del fin de la era de los dinosaurios, no tanto por el impacto, sino por las consecuencias ecológicas y climáticas." #NT!
 dubois.923.g: "Esta es una idea fascinante." #NT!
 dubois.923.h: "Esto es completamente absurdo." #NT!
 dubois.924.t: "¿Por qué los dinosaurios desaparecieron?" #NT!
 dubois.924.d: "Los paleontólogos se han unido, y las opiniones difieren en la cuestión de la extinción masiva al final del período Cretácico. No hay dos o tres campamentos, sino una mezcolanza de tesis que a menudo difieren solo ligeramente en términos de probabilidad y locura." #NT!
 dubois.924.f: "Desde el descubrimiento de los dinosaurios, los intentos más fantásticos de explicar por qué los dinosaurios desaparecieron de la tierra han estado circulando. Aquí hay solo una selección." #NT!
 dubois.924.a: "La razón fue un impacto de asteroide." #NT!
 dubois.924.g: "El nivel del mar cayó y destruyó hábitats." #NT!
 dubois.924.h: "El contenido de oxígeno de la atmósfera de la Tierra aumentó a niveles más adecuados para aves y mamíferos." #NT!
 dubois.924.i: "Los rasgos desadaptativos condujeron a un callejón sin salida evolutivo." #NT!
 dubois.924.j: "La disminución de la actividad sexual conduce a la extinción." #NT!
 dubois.924.k: "Gigantismo patológico!" #NT!
 dubois.924.l: "Competencia con mamíferos que se comieron sus huevos." #NT!
 dubois.924.m: "Cambio climático." #NT!
 dubois.924.n: "Erupciones volcánicas." #NT!
 dubois.924.o: "Bombardeo de radiación cósmica o ultravioleta." #NT!
 dubois.924.p: "El tamaño del cerebro de los dinosaurios disminuyó en el transcurso del mesozoico hasta que, en efecto, se volvieron demasiado estúpidos para vivir." #NT!
 dubois.929.t: "El Congreso Paleontológico termina" #NT!
 dubois.929.d_asteroid: "En una declaración final, el Congreso Paleontológico anunció que había tomado una decisión: la tesis de que un impacto de asteroides selló solo el final de los dinosaurios parece ser una idea convincente." #NT!
 dubois.929.d_climate: "Con un suspiro consternado, el profesor del país anfitrión comenzó una conferencia hoy que señaló con consternación la extinción de los dinosaurios debido al cambio climático." #NT!
 dubois.929.d_sex: "Un poco tímido y con una gran cantidad de limpieza de garganta, el presidente del Congreso Paleontológico explica que la falta de reproducción sexual era la razón de la desaparición de los dinosaurios. La interjección del profesor Tottenham de que siempre había pensado que su esposa era un Brontosaurus fue reprendido en las actas." #NT!
 dubois.929.d_mammals: "Después de días de discusión, los paleontólogos han llegado a la conclusión de que la competencia con los mamíferos anunció el final de los dinosaurios. Sospechan que los roedores habrían preferido comer huevos de dinosaurios." #NT!
 dubois.929.d_fat: "Hoy, en un tono de convicción, el presidente del Congreso Paleontológico leyó con toda gravedad un documento que apoyaba la creencia de que los dinosaurios simplemente se habían vuelto demasiado grandes y demasiado goros, lo que llevó a su inevitable extinción. El comentario del profesor Tottenham de que esto significaba que el asiento del presidente pronto quedaría vacante resultó en una reprimenda pública." #NT!
 dubois.929.d_stupid: "La declaración final leída hoy por el Congreso Paleontológico explica en detalle que los cerebros de los dinosaurios se volvieron cada vez más pequeños en el transcurso de millones de años hasta que, al final, fueron simplemente demasiado estúpidos para sobrevivir. La declaración del profesor Tottenham de que esto también habría sido deseable para algunos colegas científicos antes de que el Congreso no fuera incluido en las actas." #NT!
 dubois.929.f: "Esto es lo que algunos científicos importantes de los siglos XIX y principios del XX realmente creían." #NT!
 dubois.929.g: "Un impacto de asteroides fue responsable." #NT!
 dubois.929.h: "Una teoría incómoda, pero la única aceptó." #NT!
  
