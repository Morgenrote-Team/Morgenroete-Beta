 dubois_naturalist_famous: "Naturalista famosa" #NT!
 dubois_naturalist_famous_desc: "Debido a sus contribuciones pioneras a las ciencias naturales, este naturalista se considera el representante más destacado de su campo en todo el mundo." #NT!
  
