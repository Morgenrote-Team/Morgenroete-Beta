 dubois.35.t: "¡El animal escapa!" #NT!
 dubois.35.d: "Cuando el equipo de Safari intenta seguir al animal, de repente se escapa: ¡los asistentes del profesor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] están en peligro de ser sacudidos!" #NT!
 dubois.35.f: ""Todavía estamos muy lejos de haber reconocido la vida de los animales, y todavía estamos estudiando animales con la intención de conocernos a nosotros mismos". -Alfred Edmund brehm" #NT!
 dubois.35.g: "No hay nada que podamos hacer ..." #NT!
  
 dubois.36.t: "Animal attcks!" #NT!
 dubois.36.d: "Cuando el equipo de Safari quería establecer las trampas, sorprendieron al animal, ¡lo que luego atacó!" #NT!
 dubois.36.f: "'Está mal decir que el elefante es un animal irritable. Su naturaleza es leve y tranquila. Vive en amistad y paz con cada criatura. -Alfred Edmund brehm" #NT!
 dubois.36.g: "¡Huye, tontos!" #NT!
 dubois.36.h: "¡Entre las trampas de todos modos!" #NT!
 dubois.36.i: "Nuestro naturalista tiene todo bajo control." #NT!
  
 dubois.37.t: "Accidente de safari" #NT!
 dubois.37.d: "Descuentamente, el equipo de Safari se metió con el animal equivocado. Rompió todas las trampas, los asistentes heridos y luego se escapó. Semanas de trabajo fueron destruidas en cuestión de horas. El profesor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] tuvo que cancelar el safari debido a esto." #NT!
 dubois.37.f: ""Si alguna vez he visto magia, ha sido en África". -Nern Hemingway" #NT!
 dubois.37.g: "¡Horrible!" #NT!
  
 dubois.36.success_tt: "El equipo de Safari todavía establece con éxito sus trampas." #NT!
 dubois.36.fail_tt: "Un accidente grave lleva a que el safari se cancele prematuramente." #NT!
 dubois_safari_zoologist_tt: "Esto es posible porque nuestro naturalista tiene el rasgo zoólogo." #NT!
  
 dubois.38.t: "Extras de safari" #NT!
 dubois.38.d: "El progreso tecnológico también está revolucionando el safari, ya sea en forma de nuevas armas o vehículos." #NT!
 dubois.38.f: ""Nunca supe de una mañana en África cuando desperté que no era feliz". -Nern Hemingway" #NT!
 dubois.38.machine_guns_tt: "Con la invención de la ametralladora, nuestro equipo es muy superior a las amenazas humanas y animales." #NT!
 dubois.38.combustion_engine_tt: "Con la invención del motor de combustión, podemos ponernos al día con cualquier animal." #NT!
 dubois.38.g: "Esto da 'Heia Safari!' un significado completamente nuevo." #NT!
  
 dubois.40.d: "Al final de una búsqueda fallida que no trajo más que dificultades, el profesor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] se da por vencido y regresa a [ROOT.GetCountry.GetNameNoFlag] con su equipo." #NT!
  
