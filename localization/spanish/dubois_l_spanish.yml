 dubois.139.d: "Nuestro zoológico está enriquecido por un nuevo animal exótico: hoy el tan esperado #O Gorilla#! se trasladó a su nuevo recinto."
 dubois.139.f: "El gorila, nativo de los bosques de África Central, es el más grande de los grandes simios. Con su poderosa construcción y su mirada inteligente, vive en grupos sociales liderados por un hombre dominante conocido como Silverback. Los gorilas son principalmente herbívoros, se alimentan de hojas, tallos y frutas. A pesar de su tamaño y fuerza, generalmente son gentiles y tímidos, pasan la mayor parte de su tiempo alimentando y descansando en su hábitat forestal."
 dubois.139.g: "¡Son enormes!"
