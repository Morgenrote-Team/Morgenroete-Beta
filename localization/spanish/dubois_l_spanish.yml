 dubois.231.t: "Rival destruyó digsite"
 dubois.231.d: "El Dr. [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName] estaba en el camino de un depósito prometedor. Sin embargo, cuando llegó allí, descubrió que un rival ya había desenterrado muchos huesos y luego explotó el sitio."
 dubois.231.f: "Si no puedo tener esos huesos, ¡nadie más lo hará!"
 dubois.231.g: "¿Por qué harían eso?"
 dubois.232.t: "Los lugareños comparten información"
 dubois.232.d: "Los habitantes de un pequeño pueblo habían encontrado varios fósiles cerca. Felizmente los compartieron con el Dr. [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName]. ¡Eso llevará [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetHerHim] un paso más cerca de descubrir una nueva digsite!"
 dubois.232.f: "Así que mi Gran Gran Padre una vez encontró una bocina de unicornio. Sé que piensa en lo que piensa, ¡pero creo que fue el hueso de un dinosaurio! Lamentablemente lo vendió. Pero me dijo dónde lo encontró en primer lugar. Estaba en el lecho del río. ¡Estoy seguro de que encontrarás algunos huesos cerca del río!"
 dubois.232.g: "¡Gracias!"
 dubois.233.t: "Paleontólogo local comparte la investigación"
 dubois.233.d: "Aparentemente, un residente de un pequeño pueblo es un paleontólogo de pasatiempo. Como [SCOPE.sCharacter('dubois_paleontologist_scope').GetFullName] es demasiado viejo para excavar los posibles sitios, compartió todo su conocimiento con el Dr. [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName]."
 dubois.233.f: "Empecé a recolectar fósiles cuando era niño y nunca me detuve. Pero ahora soy demasiado viejo para rodear y cavarme. Así que espero poder al menos ayudarte a encontrar algunos huesos y fósiles de dinosaurios. Y si encuentras algunos, ¡por favor déjame verlos!"
 dubois.233.g: "¡Esta es una colección increíble!"
 dubois.234.t: "El deslizamiento de lodo entierre un sitio prometedor"
 dubois.234.d: "Solo un día después de que el equipo Dr. [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName] y [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetHerHis] descubriera un sitio prometedor, fue enterrado por un deslizamiento de tierra masivo. Tomaría meses o incluso años descubrir lo que esté oculto bajo toda la tierra."
 dubois.234.f: "Primero, hacía demasiado calor para cavar, luego estaba demasiado húmedo para cavar y ahora es para cavar? ¡Quizás no te guste cavar!"
 dubois.234.g: "¡Maldita sea, clima!"
 dubois.235.t: "Un nuevo líder"
 dubois.235.d: "El arduo trabajo del Dr. [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName] parece finalmente dar sus frutos. Después de recopilar informes de las rocas y formaciones, [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetSheHe] tiene varios sitios prometedores ubicados. Esperemos que [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetSheHe] encuentre huesos de dinosaurio en uno de estos lugares."
 dubois.235.f: "Verá, estos sedimentos a menudo contienen huesos de dinosaurio. Vienen a la superficie en estos lugares, ¡así que seguramente encontraremos huesos en uno de estos lugares! Con suerte. Tal vez."
 dubois.235.g: "¡Buen trabajo!"
