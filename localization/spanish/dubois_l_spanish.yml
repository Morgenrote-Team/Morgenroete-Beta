 dubois_extend_zoo_small_decision: "Extender el [concept_dubois_zoo] (pequeño)"
 dubois_extend_zoo_small_decision_desc: "[Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] son la felicidad de todos: las personas se dispersan en el zoológico, los científicos pueden continuar sus estudios zoológicos y se otorga prestigio internacional a aquellos que pueden mostrar el mayor número posible de fauna extranjera. Con cada expansión, el prestigio de una nación aumenta. Algunas etapas de expansión requieren no solo recolectar muchos animales, sino también de diferentes partes del mundo."
 dubois_extend_zoo_medium_decision: "Extender el [concept_dubois_zoo] (medio)"
