 dubois.12.t: "Los contrabandistas alcanzan el hábitat animal" #NT!
 dubois.12.d: "El profesor [ROOT.Var('dubois_naturalist_var').GetCharacter.GetLastName] ha logrado penetrar en un hábitat animal en [SCOPE.sCountry('dubois_animal_country').GetName]. ¿Qué animal debería ... pedir prestado con fines científicos?" #NT!
 dubois.12.f: ""¿Cómo puede ser un crimen cazar o atrapar a un animal? Difícilmente puede ser su propio propietario", explicó el profesor cuando uno de los compañeros le preguntó a su regreso si sus acciones no estaban al menos al borde del movimiento de ilegalidad." #NT!
 dubois.13.t: "¡Los contrabandistas atrapados!" #NT!
 dubois.13.d: "Malas noticias: el pequeño grupo de contrabandistas que enviamos a [SCOPE.sCountry('dubois_animal_country').GetName] quedó atrapado en el acto. No debería sorprender que el asunto haya causado un escándalo internacional: ¡estamos siendo acusados ​​públicamente de ser cazadores furtivos!" #NT!
 dubois.13.f: "Según un informe de periódico, nuestros hombres fueron atrapados por algunos funcionarios forestales que luego informaron a las fuerzas de seguridad. Nuestro embajador fue convocado por el ministro de Relaciones Exteriores. Nuestra única suerte es que el profesor [ROOT.Var('dubois_naturalist_var').GetCharacter.GetLastName] pudo salir del asunto a tiempo. Es difícil imaginar qué habría significado el incidente para su reputación." #NT!
 dubois.13.g: "Las cosas fueron de manera diferente a lo planeado." #NT!
  
 dubois.21.t: "Prof. [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] regresa con animales" #NT!
 dubois.21.d: "El profesor [SCOPE.sCharacter('dubois_naturalist_scope').GetFullName] ha regresado después de un año de búsqueda de animales extraordinarios. Con la ayuda de algunos cazadores y cazadores, logró capturar nuevos [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')]." #NT!
 dubois.21.f: "Número de animales atrapados: #G [ROOT.Var('dubois_catch_animal_total').GetValue]#!" #NT!
 dubois.21.g: "¡Magnífico!" #NT!
  
 dubois.31.t: "Safari comienza" #NT!
 dubois.31.d: "El equipo de Safari dirigido por [SCOPE.sCharacter('dubois_naturalist_scope').GetFullName] ha llegado a África. Sin embargo, aún no está claro qué animal será capturado para el Nacional [concept_dubois_zoo]." #NT!
 dubois.31.f: "No todos los animales pueden ser atrapados de la misma manera que otra. En este punto, solo unos pocos consejos difíciles: un elefante necesita significativamente más trampas que una jirafa. Un león, por otro lado, cambia su ubicación con más frecuencia que un hipopótamo." #NT!
 dubois.31.g: "Hipopótamo." #NT!
 dubois.31.h: "León." #NT!
 dubois.31.i: "Elefante." #NT!
 dubois.31.j: "Jirafa." #NT!
 dubois.31.k: "Cebra." #NT!
 dubois.32.t.hippopotamus_1: "Un enorme hipopótamo" #NT!
 dubois.32.t.hippopotamus_2: "Segundo avistamiento de un hipopótamo" #NT!
 dubois.32.t.hippopotamus_3: "Otro hipopótamo" #NT!
 dubois.32.t.lion_1: "Un león majestuoso" #NT!
 dubois.32.t.lion_2: "Segundo avistamiento de un león" #NT!
 dubois.32.t.lion_3: "Otro león" #NT!
 dubois.32.t.elephant_1: "Un gran elefante" #NT!
 dubois.32.t.elephant_2: "Segundo avistamiento de un elefante" #NT!
 dubois.32.t.elephant_3: "Otro elefante" #NT!
 dubois.32.t.giraffe_1: "Una elegante jirafa" #NT!
 dubois.32.t.giraffe_2: "Segundo avistamiento de una jirafa" #NT!
 dubois.32.t.giraffe_3: "Otra jirafa" #NT!
 dubois.32.t.zebra_1: "Una cebra rápida" #NT!
 dubois.32.t.zebra_2: "Segundo avistamiento de una cebra" #NT!
 dubois.32.t.zebra_3: "Otra cebra" #NT!
 dubois.32.d: "El profesor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] ha localizado el animal que está buscando. Ahora es importante llevar al animal a una situación con un enfoque cuidadoso para que podamos atraparlo." #NT!
 dubois.32.f.hippopotamus.1: "Un local dice que vio una manada de hipopótamos bañándose en el río más cercano hace días. Los habitantes de la aldea no se acercan a estos; Tienden hacia una gran agresión, incluso el gran juego no se atreve a acercarse a ellos. Su rugido podría ser escuchado desde una gran distancia. "Puedes escucharlos cerca del pueblo, especialmente por la noche cuando los animales son particularmente activos y migran a sus pastos", dice el local. Se dice que una madre Hippo mató recientemente a un cocodrilo para defender a un cachorro; El profesor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] pudo ver esto por sí mismo cuando examinó el cadáver del desafortunado reptil." #NT!
 dubois.32.f.hippopotamus.2: "A medida que la niebla de la mañana se levanta, la silueta de una criatura colosal emerge de las profundidades turbias del río. Los cuentos de los esquivos gigantes del río se han extendido entre los lugareños, hablando de su fuerza inigualable y su temible naturaleza. Los hipopótamos, con sus enormes mandíbulas y colmillos de marfil, tienen respeto e inculcan terror en los corazones de todos los que cruzan su camino. Solo un atrevido [concept_dubois_naturalist] como el profesor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] podría esperar capturar una bestia tan formidable, ya que se dice que incluso el rey de la jungla pisa ligeramente en su dominio." #NT!
 dubois.32.f.hippopotamus.3: "Los rumores de un legendario hipopótamo han cautivado la imaginación de los exploradores, y sus cuentas resuenan a través de la densa maleza de la sabana africana. Este gigante, conocido como \ "el gigante de marfil, \" posee placas de armadura de marfil que brillan a la luz del sol, lo que lo hace casi invulnerable a los dientes y garras de otros depredadores. Las tribus locales veneran a la criatura, atribuyendo poderes míticos a su presencia. Para contemplar esta majestuosa bestia, el profesor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] debe navegar en pantanos traicioneros y superar los peligros de la naturaleza, armado solo con su conocimiento y la esperanza de capturar una leyenda viva para que el mundo se maravillara de asombro." #NT!
 dubois.32.f.lion.1: "A través de la vasta extensión de las llanuras africanas indomables, un majestuoso depredador reina suprema. El león, con su melena dorada y su mirada penetrante, se erige como la encarnación del poder y la autoridad real. Su poderoso rugido resuena en el aire, enviando escalofríos por las espinas de presas y depredadores por igual. Los lugareños hablan de una leona, conocida como \ "La reina de la sabana, \" que ha defendido solo su orgullo contra los clanes rivales e incluso defendió las feroces hienas. Para capturar la esencia de tal magnificencia, el profesor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] debe aventurarse en el corazón de la sabana, donde el peligro acecha en cada sombra y presenciar la destreza cruda del monarca real de la naturaleza." #NT!
 dubois.32.f.lion.2: "En lo profundo del desierto africano, un monarca felino ordena su dominio con una autoridad inquebrantable. El león, conocido como \ "el soberano dorado, \" posee una melena que brilla como los rayos del sol, lo que lo convierte en un símbolo inconfundible de poder y dominio. Los cuentos de su increíble fuerza y ​​sigilo han viajado por todas partes, cautivando las mentes de los aventureros y los naturalistas por igual. Los lugareños susurran de un avistamiento raro, un choque de titanes entre el soberano dorado y un formidable Cape Buffalo. Para presenciar este encuentro épico, el profesor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] debe pisar con cuidado a través de la sabana, navegando por un reino donde solo el valiente se atreve a aventurarse." #NT!
 dubois.32.f.lion.3: "En el corazón del desierto africano, donde el calor sofocante es atenuado por la impresionante belleza de la sabana, deambula por todos los temeros y venerados por todos. El león, con su construcción musculosa y gracia depredadora, encarna la esencia de la majestad indomable. Su rugido atronador resuena en las llanuras, un llamado resonante a todas las criaturas que el rey de las bestias está cerca. Las leyendas cuentan un orgullo de leon dirigido por un patriarca indomable, cuya presencia exige el respeto incluso de los depredadores más formidables. Para observar a este majestuoso gobernante en su hábitat natural, el profesor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] debe superar los desafíos de la naturaleza, sumergiéndose en un mundo donde el equilibrio entre la vida y la muerte cuelga por un hilo delicado." #NT!
 dubois.32.f.elephant.1: "Una manada de elefantes pisa el polvo en el aire. Una caravana, dirigida por una matriarca, se mueve por el campo. Hudnerte, a veces miles de kilómetros a veces cubren tales grupos. Los animales jóvenes permanecen al cuidado de sus madres. Luego, el grupo se detiene en un pequeño bosque, estirando sus troncos en árboles. El profesor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] observa los eventos a través de binoculares y estudia el comportamiento social. Básicamente, se ha cansado de la idea de arrebatar a uno de los animales del rebaño, pero los clientes del zoológico le recuerdan que su viaje y comida no fueron proporcionados sin cargo por el estado, hay un trabajo por hacer." #NT!
 dubois.32.f.elephant.2: "Los gentiles gigantes de la sabana, elefantes, deambulan los vastos paisajes en busca de alimento y agua. Su inmenso tamaño ordena respeto, sin embargo, sus interacciones tiernas dentro del rebaño revelan una profunda sensación de lazos familiares. Dirigidos por una matriarca sabia, los elefantes atraviesan grandes distancias, sus pasos sincronizados que resonan a través de los pastizales. El profesor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName], con un corazón pesado, les mira, dividido entre la admiración por su gracia y la tarea que se avecina. Para capturar un elefante para el zoológico, debe reconciliar su deber con el entendimiento de que interrumpir el intrincado tapiz de su tejido social tiene un costo profundo." #NT!
 dubois.32.f.elephant.3: "A la sombra de los imponentes árboles de Baobab, una congregación de elefantes, adornada con magníficos colmillos, se reúne con un tranquilo abrevadero. Los agudos ojos de la matriarca escanean los alrededores, asegurando la seguridad de su precioso pariente. La sinfonía armoniosa de sus trompetas llena el aire, un testimonio de su sabiduría colectiva y experiencias compartidas. El profesor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName], conflicto por el encanto de capturar a uno de estos seres sintientes y el pesado peso de responsabilidad, lucha con las implicaciones morales de su búsqueda. Mientras observa su compleja dinámica social, lidia con la profunda pregunta de si la búsqueda del conocimiento justifica la interrupción de una existencia armoniosa." #NT!
 dubois.32.f.giraffe.1: "Durante días, el grupo Safari del profesor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] había estado buscando el mero signo de una jirafa, pero no había encontrado nada hasta el final. Pero una mañana, el cuello de los elegantes animales se extiende en el aire contra el sol creciente de la mañana y forman sombras contra la bola de fuego rojiza. El equipo de Safari se establece de inmediato para no perderse esta oportunidad." #NT!
 dubois.32.f.giraffe.2: "A través de los tonos dorados del amanecer africano, se desarrolla una visión maravillosa. Alto y elegante, las jirafas emergen del denso follaje, sus cuellos alargados que alcanzan hacia los cielos. Al igual que los seres etéreos, lanzaron sombras alargadas contra el cielo ardiente, sus puntos se mezclan sin problemas con la luz moteada. El profesor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName], su corazón lleno de asombro, lucha para armar su equipo, decidido a no dejar que este momento fugaz se escape. Con cada paso cuidadoso, se aventura más cerca de las jirafas, ansiosos por desentrañar los misterios ocultos dentro de su extraordinaria anatomía y observar la poesía de sus movimientos." #NT!
 dubois.32.f.giraffe.3: "En las vastas llanuras africanas, se desarrolla una visión de elegancia mientras las jirafas navegan con gracia del paisaje verde. Sus delgadas piernas los llevan con una gracia ballet, mientras que sus cuellos largos se extienden por encima de los árboles, como si alcanzaran los cielos mismos. El profesor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] y su equipo de Safari, sus corazones golpeando con anticipación, presenciar este fascinante espectáculo. Con un buen ojo para los detalles, el profesor estudia los patrones intrincados de sus manchas y se maravilla de su capacidad para prosperar en su hábitat único. Para capturar la esencia de estas magníficas criaturas, debe navegar el delicado equilibrio entre la observación y la intrusión, preservando la magia que hace que las jirafas sean el epítome de la gracia en la naturaleza." #NT!
 dubois.32.f.zebra.1: "Unas semanas después de llegar a África, el profesor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] Safari se encontró con los lugareños sobre la próxima manada de cebras que deambulan por la región. No lleva mucho tiempo antes de que encuentren a los animales con las rayas características en el sol de la noche entre el polvo de la sabana, los arbustos y los árboles retorcidos. Los animales elegantes ni siquiera parecen notarlos. El profesor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] primero quiere tomarse el tiempo para estudiar el comportamiento y el estilo de vida del rebaño cebra, pero al igual que muchos otros investigadores, está interesado en descubrir los antecedentes evolutivos del famoso patrón de cebra. Desafortunadamente, es interrumpido por un miembro del equipo de Safari, que señala que si esperan demasiado, el rebaño puede seguir adelante nuevamente." #NT!
 dubois.32.f.zebra.2: "Tal vez seguir a Zebras no fue la mejor decisión. Estos animales podrían moverse hasta 500 kilómetros de un lugar a otro y así cambiar el centro del rebaño a grandes latitudes geográficas. Sin embargo, había una peculiaridad que los hacía predecibles: generalmente no permanecían a más de 12 kilómetros de una fuente de agua. El safari del profesor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] toma este detalle como una oportunidad para esperar en el siguiente pozo de riego posible. ¡Con éxito! Pronto la manada aparece nuevamente, dando la oportunidad de finalmente atrapar a uno de los animales para el zoológico." #NT!
 dubois.32.f.zebra.3: "Después de varias semanas de buscar cebras, el profesor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] ve el cadáver de un animal destrozado en la distancia. Aparentemente fue víctima de un ataque de león. Dado que los Leones se mudaron recientemente, el equipo de Safari está motivado para continuar la búsqueda más intensamente. Pronto resortes fuertes y llamadas mixtas del sonido del burro y los ruidos de caballos. Las colas de cebra azotan el aire sobre la hierba de Savannah. Los participantes de Safari miran una manada de pastoreo desde una colina." #NT!
 dubois.32.g: "El equipo debe establecer trampas." #NT!
 dubois.32.h: "El equipo debe acercarse al animal." #NT!
 dubois.33.t: "Flores raras" #NT!
 dubois.33.d.hippopotamus: "En busca del #O hipopotamus#!,, nuestro equipo de Safari encontró una flora increíble. El profesor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] se inclina a tomar un descanso." #NT!
 dubois.33.d.lion: "En busca del #O Lion#!,, nuestro equipo de Safari encontró una flora increíble. El profesor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] se inclina a tomar un descanso." #NT!
 dubois.33.d.elephant: "En busca del #O Elephant#!,, nuestro equipo de Safari encontró una Flora increíble. El profesor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] se inclina a tomar un descanso." #NT!
 dubois.33.d.giraffe: "En busca de la #O Giraffe#!,, nuestro equipo de Safari encontró una Flora increíble. El profesor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] se inclina a tomar un descanso." #NT!
 dubois.33.d.zebra: "En busca del #O Zebra#!,, nuestro equipo de Safari encontró una Flora increíble. El profesor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] se inclina a tomar un descanso." #NT!
 dubois.33.f: "El Safari fue interrumpido por una parada inusual cuando el Prof. [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] ordenó a los hombres reunidos que se detuvieran. Un olor inusual había alcanzado su nariz. Un prado de flores de colores brillantes yacía ante sus ojos. Una sola muestra fue suficiente para establecer que eran plantas bastante decentes de calidad desconocida que tal vez podrían usarse como medicina o para aliviar los síntomas. El naturalista ahora se encontró en un dilema: porque estas plantas exóticas africanas eran de valor indescriptible para la investigación." #NT!
 dubois.33.g: "Debemos tener estas flores a toda costa." #NT!
 dubois.33.h: "No tenemos tiempo para elegir flores. ¡El animal está esperando!" #NT!
 dubois.34.t: "Insectos desconocidos" #NT!
 dubois.34.d.hippopotamus: "El safari, que tenía como objetivo capturar el # O Hippopotamus#!, debe ser interrumpido. ¡Falta el profesor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName]!" #NT!
 dubois.34.d.lion: "El safari, que tenía como objetivo capturar el # o lion#!, debe ser interrumpido. ¡Falta el profesor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName]!" #NT!
 dubois.34.d.elephant: "El safari, que tenía como objetivo capturar el # O Elephant#!, debe ser interrumpido. ¡Falta el profesor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName]!" #NT!
 dubois.34.d.giraffe: "El safari, que tenía como objetivo capturar la # o giraffe#!, debe ser interrumpido. ¡Falta el profesor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName]!" #NT!
 dubois.34.d.zebra: "El safari, que tenía como objetivo capturar el # O Zebra#!, debe ser interrumpido. ¡Falta el profesor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName]!" #NT!
 dubois.34.f: "Poco después de detenerse para almorzar, los otros participantes en el safari notaron que su líder había desaparecido repentinamente. Después de una breve búsqueda, encontraron al profesor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] en un montón de tierra brillante que se parecía a un montículo de termitas abandonado. Los colores de los escarabajos verdes, azules y rojos de diferentes tamaños brillaban sobre él. El naturalista estaba a punto de dejar escapar a los gritos de alegría, tan encantado estaba en su descubrimiento." #NT!
 dubois.34.g: "Recoja muestras de estos insectos desconocidos." #NT!
 dubois.34.h: "¿Y arriesgarnos al animal que nos escape? ¡Ve ahora!" #NT!
 dubois.39.t: "¡Catch exitosa!" #NT!
 dubois.39.f: ""Todo en África muerde, pero el error Safari es peor de todo". -Nern Hemingway" #NT!
 dubois.39.g: "¡Excelente!" #NT!
 dubois.40.t: "Safari termina" #NT!
 dubois.40.d.success: "Después de un exitoso safari, los héroes regresan a casa con el animal que han ganado. ¡Ciertamente será más feliz en el agradable zoológico nacional de [ROOT.GetCountry.GetNameNoFlag] que en esta naturaleza incómoda!" #NT!
 dubois.40.d.fail: "Al final de una búsqueda fallida que no trajo más que dificultades, el profesor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] se da por vencido y regresa a [ROOT.GetCountry.GetNameNoFlag] con su equipo." #NT!
 dubois.40.f: "'Todo lo que quería hacer era volver a África. Todavía no lo habíamos dejado, pero cuando me despertaba en la noche, me mentía, escuchando, nostalgia por eso ya. Ahora, mirando por el túnel de los árboles sobre el barranco en el cielo con nubes blancas que se mueven al viento, me encantó el país para que estuviera feliz, ya que estás después de haber estado con una mujer que realmente amas, cuando, vacío, sientes que está bien de nuevo y está allí y nunca puedes tenerlo todo y, sin embargo, lo que ahora, ahora puedes tenerlo, ya que ahora puedes hacerlo. siempre; Hacer que el tiempo se quede quieto, a veces tan quieto que luego esperas para escucharlo moverse, y es lento para comenzar '. -Nern Hemingway" #NT!
 dubois.40.g: "Hakuna matata." #NT!
  
 dubois.41.t: "Plantas exóticas" #NT!
 dubois.41.d: "La expedición encontró una variedad de plantas exóticas, pero no se desconoce cuán seguro es este lugar." #NT!
 dubois.41.f: "Los miembros de la expedición fueron hipnotizados. Tenían ríos, montañas y bosques conquistados, conquistaban cascadas. Pero las grandiosas plantas con sus majestuosas flores las abrumaron. [SCOPE.sCharacter('expedition_leader').GetFullName] en realidad dijo que no estarían aquí por mucho tiempo, pero luego permitió que un asistente de investigación recolectara algunas muestras. Por un lado, él tampoco podía negar el valor científico de este descubrimiento. Por otro lado: estaban estos ruidos extraños en la jungla que no podía decir si eran de personas, animales o demonios ..." #NT!
 dubois.41.g: "Recoge algunas muestras de plantas." #NT!
 dubois.41.h: "Recoge tantas plantas como sea posible." #NT!
 dubois.42.t: "Mariposas" #NT!
 dubois.42.d: "Para su propia sorpresa, la expedición llegó a un claro en la jungla africana donde decenas de miles de mariposas coloridas se divierten." #NT!
 dubois.42.f: ""Pero estas son flores que vuelan y todas cantan". -Robert Frost" #NT!
 dubois.42.g: "Nuestros naturalistas en casa serán felices." #NT!
 dubois.43.t: "Pez fluvial" #NT!
 dubois.43.d: "Al cruzar un río, algunos de los compañeros de la expedición notaron que los peces desconocidos [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] nadaron en el agua. [SCOPE.sCharacter('expedition_leader').GetFullName], sin embargo, tiene muy ideas sobre qué hacer con ellos." #NT!
 dubois.43.f: "Eran peces coloridos y brillantes. Hermoso pez para mirar. Pez desconocido. Pez misterioso. Y: sabroso pez. Lo que fue un descubrimiento significativo para el científico fue la bienvenida comida para el líder de la expedición para mejorar el éxito del viaje." #NT!
 dubois.43.g: "Recoge el pez." #NT!
 dubois.43.h: "Come el pescado." #NT!
 dubois.44.t: "Muestras perdidas" #NT!
 dubois.44.d: "La expedición había recolectado algunas muestras de gran valor científico de insectos y plantas desconocidas hace unos días. Sin embargo, después de una inspección hoy, resultó que se han perdido." #NT!
 dubois.44.f: "Era alrededor del mediodía cuando un grito de pánico sacudió la expedición. Al principio, [SCOPE.sCharacter('expedition_leader').GetFullName] temía la invasión de nativos hostiles. Pero en realidad era un asistente de investigación que había notado que faltaban las muestras recolectadas. Inmediatamente insistió en regresar y buscar la colección científica. Los porteros lo ignoraron y el líder lo contradecía: era demasiado peligroso para eso, y uno había perdido suficiente tiempo recogiendo flores. El asistente de investigación luego amenazó con denunciar esta ignorancia cuando regresó y contar a algunos amigos muy importantes en ciencia y política." #NT!
 dubois.44.g: "La expedición debe retroceder y recuperar las muestras." #NT!
 dubois.44.h: "Deja atrás esta basura inútil." #NT!
 dubois.45.t: "Una colección valiosa" #NT!
 dubois.45.d: "Un naturalista, que dejó su expedición hace años y vive solo en el desierto africano con fines de investigación, ha construido una impresionante colección de flora y fauna raras durante los años de soledad." #NT!
 dubois.45.f: "El hombre era una vista extraña. Los años de soledad se mostraron en el gris de sus ojos y la longitud de su cabello. Cuán maníacamente había recolectado y catalogado cada error, mariposa, larva que había encontrado desde que se separó de su equipo. Había conservado hojas de plantas tropicales. Las láminas sueltas de papel y los cuadernos garabateados revoloteaban alrededor de su trastero. [SCOPE.sCharacter('expedition_leader').GetFullName] rápidamente se dio cuenta de que el naturalista que vivía como ermitaño no se había vuelto loco. Por el contrario, estaba buscando una manera de regresar a la civilización y publicar sus resultados, pero tenía miedo de regresar porque estaba excesivo. Esta situación abrió posibilidades. En ambos lados." #NT!
 dubois.45.g: "Queremos adquirir la colección." #NT!
 dubois.45.h: "Estamos más interesados ​​en su conocimiento." #NT!
  
 dubois.72.t: "Formación geológica descubierta" #NT!
 dubois.72.d: "En [SCOPE.sState('dubois_formation_state').GetName], [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')] ha descubierto formaciones rocosas de millones de años. Sospechan que todavía hay fósiles desconocidos que se encuentran allí." #NT!
 dubois.72.f: "Las formaciones con estratos de roca antiguos son un paraíso para los paleontólogos. Todas las formaciones rocosas contienen fósiles más pequeños que se pueden encontrar allí. Las grandes formaciones pueden incluso contener los esqueletos de los dinosaurios masivos. Su paleontológico tiene lugar en varias etapas. Se necesita un paleontólogo para recuperar fósiles de las formaciones. Estudiarán formaciones por su cuenta y encontrarán fósiles anualmente." #NT!
 dubois.72.g: "Deberíamos echar un vistazo más de cerca." #NT!
 dubois.73.t: "Gran formación geológica descubierta" #NT!
 dubois.73.d: "En [SCOPE.sState('dubois_formation_state').GetName], los paleontólogos han descubierto formaciones rocosas de millones de años. Es probable que numerosos fósiles estén dormidos en esta formación masiva, probablemente incluso esqueletos bien conservados con los que solo podíamos soñar hasta ahora." #NT!
  
 dubois.101.t: "Oso polar" #NT!
 dubois.101.d: "Nuestro zoológico está enriquecido por un animal nuevo y fascinante: hoy el tan esperado #O Polar Bear#! se trasladó a su nuevo recinto." #NT!
 dubois.101.f: "El oso polar (Ursus maritimus) es una especie hipercarnívora de oso. Su rango nativo se encuentra en gran medida dentro del Círculo Ártico, que abarca el Océano Ártico y sus mares y masas de tierra circundantes, que incluyen las regiones más septentrionales de América del Norte y Eurasia. Los osos polares cazan su comida preferida de focas desde el borde del hielo marino, a menudo viviendo de las reservas de grasa cuando no hay hielo marino presente. Debido a su dependencia del hielo marino, los osos polares se clasifican como mamíferos marinos. A diferencia de los osos marrones, los osos polares no son territoriales. Aunque estereotipados como voraciosamente agresivos, normalmente son cautelosos en confrontaciones y, a menudo, eligen escapar en lugar de pelear." #NT!
 dubois.101.g: "Fresco." #NT!
 dubois.102.t: "Oso pardo" #NT!
 dubois.102.d: "Nuestro zoológico está enriquecido por un animal nuevo y fascinante: hoy el tan esperado #O Grizzly Bear#! se mudó a su nuevo recinto." #NT!
 dubois.102.f: "El oso pardo (Ursus Arctos horribilis), también conocido como el oso marrón norteamericano o simplemente en el parzisio, es una población o subespecie del oso marrón que habita en América del Norte. Meriwether Lewis y William Clark lo describieron por primera vez como Grisley, que podría interpretarse como "grizzly" (es decir, "pardo", es decir, con cabello con punta gris) o "espeluznante" ("inspirador del miedo", ahora generalmente "gruesme"). Los osos grizzly son algunas de las subespecies más grandes de oso marrón, solo que son golpeados por los osos marrones Kamchatka y los osos Kodiak. Los osos grizzly varían en tamaño según el tiempo y las poblaciones. La gama original de osos grizzly incluye grandes partes de América Occidental y Centro de América del Norte. Desciende de una población euroasiática de osos marrones que migraron a través del estrecho de Bering temporalmente seco." #NT!
 dubois.102.g: "Espantoso." #NT!
 dubois.103.t: "Águila calva" #NT!
 dubois.103.d: "Nuestro zoológico está enriquecido por un animal nuevo y fascinante: hoy el tan esperado #O Bald Eagle#! se trasladó a su nuevo recinto." #NT!
 dubois.103.f: "El águila calva (Haliaeetus leucocephalus) es un pájaro de presa que se encuentra en América del Norte. Su rango incluye la mayor parte de Canadá y Alaska, todos los Estados Unidos contiguos y el norte de México. Se encuentra cerca de grandes cuerpos de aguas abiertas con un abundante suministro de alimentos y árboles antiguos para anidar. El águila calva es un alimentador oportunista que subsiste principalmente en peces, que se abre y se arrebata del agua con sus garras. Las águilas calvas no son realmente calvas; El nombre deriva de un significado más antiguo de la palabra, 'encabezado blanco'. El águila calva es el ave nacional de los Estados Unidos de América y aparece en su sello." #NT!
 dubois.103.g: "Patriótico." #NT!
 dubois.104.t: "Bisonte americano" #NT!
 dubois.104.d: "Nuestro zoológico está enriquecido por un animal nuevo y fascinante: hoy el tan esperado #O American Bison#! se trasladó a su nuevo recinto." #NT!
 dubois.104.f: "El bisonte americano (Bison Bison), también llamado americano búfalo o simplemente búfalo, es una especie de bisonte nativo de América del Norte. Es una de las dos especies existentes de bisonte, junto con el bisonte europeo. Buffalo fue aplicado al bisonte estadounidense por Samuel de Champlain mientras la palabra francesa se aferra en 1616, después de ver pieles y un dibujo. Estos fueron mostrados por miembros de la Primera Nación Nipissing. La palabra bisonte se aplicó en la década de 1690. Un bisonte tiene un abrigo de invierno peludo, largo y oscuro marrón y un abrigo de verano de marrón más claro y más claro. El bisonte masculino es significativamente más grande y más pesado que las hembras. Una vez deambulando en vastas rebaños, la especie casi se extinguió por una combinación de caza y matanza comerciales en el siglo XIX e introducción de enfermedades bovinas del ganado doméstico." #NT!
 dubois.104.g: "Lanudo." #NT!
 dubois.105.t: "Pantera de Florida" #NT!
 dubois.105.d: "Nuestro zoológico está enriquecido por un animal nuevo y fascinante: hoy el tan esperado #O Florida Panther#! se trasladó a su nuevo recinto." #NT!
 dubois.105.f: "La Pantera de Florida es un puma norteamericano conocido bajo varios nombres comunes, incluidos Florida Cougar y Florida Puma. Vive en Pinelands, hamacas de madera tropical y bosques mixtos de pantanos de agua dulce. Las panteras de Florida se ven al nacer y generalmente tienen ojos azules. A medida que la pantera crece, las manchas se desvanecen y la capa se vuelve completamente bronceada, mientras que los ojos generalmente se adquieren un tono amarillo. El bajo vientre de la pantera es un blanco cremoso, y tiene puntas negras en la cola y las orejas. Las panteras de Florida carecen de la capacidad de rugir y, en su lugar, hacer sonidos distintos que incluyen silbatos, chirridos, gruñidos, silbidos y ronronear." #NT!
 dubois.105.g: "¿No es más un puma?" #NT!
 dubois.106.t: "Caimán" #NT!
 dubois.106.d: "Nuestro zoológico está enriquecido por un animal nuevo y fascinante: hoy el tan esperado #O Alligator#! se trasladó a su nuevo recinto." #NT!
 dubois.106.f: "Los caimanes estadounidenses son depredadores de ápice y consumen peces, anfibios, reptiles, aves y mamíferos. Las crías se alimentan principalmente de invertebrados. Desempeñan un papel importante como ingenieros de ecosistemas en los ecosistemas de humedales a través de la creación de agujeros de cocodrilo, que proporcionan hábitats húmedos y secos para otros organismos. Durante todo el año, los caimanes estadounidenses gritan para declarar territorio y localizar compañeros adecuados. Durante los siglos XIX y XX, se reportaron machos más grandes que alcanzaron 5 a 6 m. El tamaño individual más grande reportado fue un hombre asesinado en 1890 en Marsh Island, Louisiana, y, según los informes, se midió a 5,84 m de longitud, pero no había una muestra de cupón disponible, ya que el cocodrilo estadounidense se dejó en un banco fangoso después de haber sido medido debido a que había sido demasiado masivo para reubicarse." #NT!
 dubois.106.g: "Dientes." #NT!
 dubois.107.t: "Ajolote" #NT!
 dubois.107.d: "Nuestro zoológico está enriquecido por un animal nuevo y fascinante: hoy el tan esperado #O axolotl#! se mudó a su nuevo recinto." #NT!
 dubois.107.f: "El Axolotl es un anfibio acuático de cola mexicana de la familia de triples de dientes transversales, que ocurre naturalmente solo como larvas permanentes. Los axolotls alcanzan la madurez sexual sin cambiar su forma larval externa y sin someterse a una metamorfosis que de otra manera es común en los anfibios. In August 1804, Alexander von Humboldt was the first to bring axolotls to Europe, which - preserved in alcohol - served as an exotic curiosity in the Paris Museum of Natural History. Los axolotls tienen la capacidad de restaurar las extremidades, los órganos e incluso las partes del cerebro y el corazón. Los regenerados generalmente no están paralizados, sino completos y funcionales. La capacidad de regenerarse hace que la especie sea un objeto de investigación que valga la pena." #NT!
 dubois.107.g: "¿Qué es esta ... criatura extraña?" #NT!
  
 dubois.111.t: "Perezoso de garganta marrón" #NT!
 dubois.111.d: "Nuestro zoológico está enriquecido por un nuevo y maravilloso animal: hoy el tan esperado #O Sloth de garganta marrón §#! se trasladó a su nuevo recinto." #NT!
 dubois.111.f: "El perezoso de garganta marrón (Bradypus variegatus) es una especie de perezoso de tres dedos que se encuentra en el ámbito neotropical de América Central y del Sur. Los perezosos de garganta marrón duermen de 15 a 18 horas todos los días y están activos solo por breves períodos de tiempo, que pueden ser durante el día o la noche. Aunque pueden caminar por el suelo, e incluso nadar, pasan la mayor parte de sus vidas en las altas ramas de los árboles, descendiendo una vez cada ocho días más o menos para defecar en el suelo. No viajan lejos, con rangos domésticos de solo alrededor de 0.5 a 9 ha (1.2 a 22.2 acres), dependiendo del entorno local. Dentro de un rango típico de 5 hectáreas (12 acres), un perezoso de garganta marrón visitará alrededor de 40 árboles y puede especializarse en una especie en particular, incluso pasar hasta el 20% de su tiempo en un solo árbol específico." #NT!
 dubois.111.g: "Esta es la criatura más noble que haya entrado en este zoológico." #NT!
 dubois.112.t: "Jaguar" #NT!
 dubois.112.d: "Nuestro zoológico está enriquecido por un nuevo y maravilloso animal: hoy el tan esperado #O jaguar#! se mudó a su nuevo recinto." #NT!
 dubois.112.f: "El Jaguar (Panthera Onca) es el único miembro vivo del género Panthera nativo de las Américas. With a body length of up to 1.85 m (6 ft 1 in) and a weight of up to 158 kg (348 lb), it is the largest cat species in the Americas and the third largest in the world. Its distinctively marked coat features pale yellow to tan colored fur covered by spots that transition to rosettes on the sides, although a melanistic black coat appears in some individuals. The jaguar's powerful bite allows it to pierce the carapaces of turtles and tortoises, and to employ an unusual killing method: it bites directly through the skull of mammalian prey between the ears to deliver a fatal blow to the brain. La palabra 'jaguar' posiblemente se deriva de la palabra tupi-Guarani yaguara que significa 'bestia salvaje que supera a su presa a un límite'." #NT!
 dubois.112.g: "Asombrado inspirador." #NT!
 dubois.113.t: "Oso hormíle gigante" #NT!
 dubois.113.d: "Nuestro zoológico está enriquecido por un nuevo y maravilloso animal: hoy el tan esperado #O Giant Anteater#! se trasladó a su nuevo recinto." #NT!
 dubois.113.f: "El oso haz gigante (Myrmecophaga tridactyla) es un mamífero insectívoro nativo de América Central y del Sur. Es una de las cuatro especies vivas de anteateros, de las cuales es el miembro más grande. Se alimenta principalmente de hormigas y termitas, usando sus garras delanteras para desenterrarlas y su lengua larga y pegajosa para recogerlas. Aunque los Anteatrales Gigantes viven en rangos de hogar superpuestos, son en su mayoría solitarios, excepto durante las relaciones con la madera, interacciones agresivas entre los hombres y al aparearse. El oso hormiguero gigante es la especie más terrestre de la especie de oso hormiguero. Sus antepasados ​​pueden haber sido originalmente adaptados a la vida arbórea." #NT!
 dubois.113.g: "Elegante." #NT!
 dubois.114.t: "Armadillo de nueve bandas" #NT!
 dubois.114.d: "Nuestro zoológico está enriquecido por un nuevo y maravilloso animal: hoy el tan esperado #O Armadillo#! se trasladó a su nuevo recinto." #NT!
 dubois.114.f: "El armadillo de nueve bandas (Dasypus Novemcinctus) es un mamífero que se encuentra en North, Central y Sudamérica, lo que lo convierte en el más extendido de los Armadillos. Sus antepasados ​​se originaron en América del Sur, y permanecieron allí hasta que la formación del istmo de Panamá les permitió ingresar a América del Norte como parte del gran intercambio estadounidense. El armadillo de nueve bandas es un animal solitario, principalmente nocturno, que se encuentra en muchos tipos de hábitats, desde bosques tropicales maduros y secundarios hasta pastizales y matorrales secos. La carcasa externa está compuesta de escutas dérmicas osificadas cubiertas por escamas epidérmicas queratinizadas no superpuestas, que están conectadas por bandas flexibles de piel. Esta armadura cubre la parte posterior, los lados, la cabeza, la cola y las superficies externas de las piernas." #NT!
 dubois.114.g: "Bien armado." #NT!
 dubois.115.t: "Cóndor andino" #NT!
 dubois.115.d: "Nuestro zoológico está enriquecido por un animal nuevo y maravilloso: hoy el tan esperado #O andean condor#! se trasladó a su nuevo recinto." #NT!
 dubois.115.f: "El cóndor andino (Vultur Gryphus) es un buitre catartido gigante de América del Sur y es el único miembro del género Vultur. Encontrados en las montañas de los Andes y las costas del Pacífico adyacentes del oeste de América del Sur, el cóndor andino es el ave voladora más grande del mundo mediante medición combinada de peso y envergadura. Es un buitre negro grande con una rufa de plumas blancas que rodean la base del cuello y, especialmente en los machos machos, grandes parches blancos en las alas. La cabeza y el cuello son casi sin plumas, y son un color rojo opaco, que puede enjuagar y, por lo tanto, cambiar el color en respuesta al estado emocional del pájaro. The Andean condor is a national symbol of Bolivia, Chile, Colombia, Ecuador, and Peru and plays an important role in the folklore and mythology of the Andean regions." #NT!
 dubois.115.g: "Celestial." #NT!
 dubois.116.t: "Manatee de las Indias Occidentales" #NT!
 dubois.116.d: "Nuestro zoológico está enriquecido por un nuevo y maravilloso animal: hoy, el tan esperado #O West Indian Manatee#! se mudó a su nuevo recinto." #NT!
 dubois.116.f: "El Manatee de las Indias Occidentales es un gran mamífero acuático nativo de las áreas costeras cálidas del Caribe. Viviendo solo o en rebaños, se alimenta de plantas submarinas y usa sus bigotes para navegar. Dado que los manatíes son mamíferos, respiran aire, tienen sangre tibia y producen leche. El Manatee de las Indias Occidentales tiene un hocico prensil, como su pariente el elefante, por agarrar la vegetación y llevarla a la boca. Debido a que los manatíes evolucionaron en hábitats sin depredadores naturales, carecen de comportamiento de evitación de depredadores. El gran tamaño y las bajas tasas metabólicas de los manatíes prestan su capacidad para inmersiones largas y profundas, así como su relativa falta de velocidad." #NT!
 dubois.116.g: "Delicado." #NT!
 dubois.117.t: "Mono" #NT!
 dubois.117.d: "Nuestro zoológico está enriquecido por un nuevo y maravilloso animal: hoy el tan esperado #O Squirrel Monkey#! se trasladó a su nuevo recinto." #NT!
 dubois.117.f: "None" #NT!
 dubois.117.g: "Encantador." #NT!
  
 dubois.121.t: "Lince ibérico" #NT!
 dubois.121.d: "Nuestro zoológico está enriquecido por un nuevo y fino animal: hoy el tan esperado #O Iberian Lynx#! se trasladó a su nuevo recinto." #NT!
 dubois.121.f: "El lince ibérico (Lynx Pardinus) es una especie de gato salvaje endémica de la península ibérica en el suroeste de Europa. El Lynx ibérico tiene una piel manchada de color amarillento corto a color tácteo. Las manchas varían en forma y tamaño de una pequeña redonda a alargada. Están dispuestos en líneas y disminuyen en tamaño desde la espalda hacia los lados. En los extremos de las pequeñas orejas triangulares hay pelos de cepillo que tienen tres centímetros de largo. Al igual que con el Lynx Eurasia, son importantes para la capacidad auditiva de estos lince. En el caso del Lynx ibérico, los experimentos han demostrado que la pérdida del pincel reduce la capacidad de escuchar y ubicar. El lince ibérico es mucho más pequeño que el Lynx eurasiático, que está más extendido en el norte. Con un peso corporal de entre 9 y 15 kilogramos, pesan menos de dos tercios de un lince euroasiático." #NT!
 dubois.121.g: "Bien." #NT!
 dubois.122.t: "Lobo euroasiático" #NT!
 dubois.122.d: "Nuestro zoológico está enriquecido por un nuevo y buen animal: hoy el tan esperado #O Eurasian Wolf#! se mudó a su nuevo recinto." #NT!
 dubois.122.f: "El lobo eurasiático (Canis lupus lupus), también conocido como el lobo común, es una subespecie de lobo gris nativo de Europa y Asia. El pelaje de los lobos euroasiáticos es de color gris amarillento, gris o gris oscuro. La parte inferior del hocico y la garganta son más ligeras, la parte posterior de las orejas parecen ligeramente rojizas. En la mayoría de los casos, el colorante posterior muestra un parche de silla de montar oscuro a negro. La punta de la cola y la parte delantera de las patas delanteras también son a menudo de color más oscuro. El aullido del lobo euroasiático es mucho más prolongado y melodioso que el de la subespecie de lobo gris norteamericano, cuyos aullidos son más fuertes y tienen un énfasis más fuerte en la primera sílaba." #NT!
 dubois.122.g: "Peligroso." #NT!
 dubois.123.t: "Badger eurasiático" #NT!
 dubois.123.d: "Nuestro zoológico está enriquecido por un nuevo y fino animal: hoy el tan esperado #O Eurasian Badger#! se mudó a su nuevo recinto." #NT!
 dubois.123.f: "El tejón europeo (Meles Meles), también conocido como el tejón euroasiático, es una especie de tejón en la familia Mustelidae nativa de casi toda Europa. El tejón europeo es un animal poderosamente construido, negro, blanco, marrón y gris con una cabeza pequeña, un cuerpo robusto, pequeños ojos negros y una cola corta. Su peso varía, siendo 7-13 kg (15-29 lb) en primavera, pero construyendo hasta 15-17 kg (33-37 lb) en otoño antes del período de sueño invernal. Es nocturno y es un animal social y excavador que duerme durante el día en uno de varios establos en su rango territorial. Las guaridas que construyen (llamadas Setts) son las más complejas y se transmiten de generación en generación." #NT!
 dubois.123.g: "Interesante." #NT!
 dubois.124.t: "Armiño" #NT!
 dubois.124.d: "Nuestro zoológico está enriquecido por un nuevo y fino animal: hoy el tan esperado #O Stoat#! se mudó a su nuevo recinto." #NT!
 dubois.124.f: "El Stoat (Mustela erminea), también conocido como el armino euroasiático, el armado beringiano y el armino, es un nativo de Eurasia y las porciones del norte de América del Norte. El nombre armado se usa para especies en el género Mustela, especialmente el Stoat, en su abrigo de invierno blanco puro o el pelaje de los mismos. El Stoat es similar a la menor comadreja en proporciones generales, forma de postura y movimiento, aunque la cola es relativamente más larga, siempre excede un tercio de la longitud del cuerpo, aunque es más corto que la de la comadreja de cola larga. Al igual que con la menor comadreja, los roedores como ratones predominan en la dieta del Stoat. Sin embargo, a diferencia de la menor comadreja, que se alimenta casi exclusivamente de tope pequeño, el Stoat se presenta regularmente en especies de roedores y lagomorfos más grandes, y eliminará a los individuos mucho más grandes que sí mismos." #NT!
 dubois.124.g: "El verdadero animal de monarcas y perros." #NT!
 dubois.125.t: "Nutria euroasiática" #NT!
 dubois.125.d: "Nuestro zoológico está enriquecido por un nuevo y fino animal: hoy el tan esperado #O Eurasia Otter#! se trasladó a su nuevo recinto." #NT!
 dubois.125.f: "La nutria eurasiática (Lutra Lutra) es un mamífero semiaquático nativo de Eurasia. La nutria eurasiática tiene una dieta principalmente de pescado, y es fuertemente territorial. Al igual que con varias otras especies de Mustelid, las nutrias son capaces de dominar y matar presas significativamente más grandes que ellos mismas, y se sabe que cazan grandes cervezas acuáticas como gansos de Greylag adultos en ocasiones. Debido a la estructura inusual de su cabello, el pelaje de la nutria ofrece un aislamiento particularmente efectivo contra el frío y húmedo: como una cremallera, el cabello está entrelazado con cuñas y ranuras entrelazadas microscópicamente pequeñas. Se crea una trenza de piel extraordinariamente densa, que atrapa burbujas de aire aislantes, pero al mismo tiempo repele el agua. Esto mantiene la piel de la nutria seca y su cuerpo caliente." #NT!
 dubois.125.g: "Fascinante." #NT!
 dubois.126.t: "Ibex alpino" #NT!
 dubois.126.d: "Nuestro zoológico está enriquecido por un animal nuevo y maravilloso: hoy el tan esperado #O Alpine Ibex#! se mudó a su nuevo recinto." #NT!
 dubois.126.f: "El alpino Ibex es una especie de cabra salvaje que vive en las montañas de los Alpes europeos. Es una especie sexualmente dimórfica: los machos son más grandes y llevan cuernos más largos y curvos que las hembras. El color de su capa es típicamente gris parduzco. Alpine Ibex tiende a vivir en terreno empinado y áspero cerca de la línea de nieve. También son sociales, aunque los hombres y mujeres adultos se segregan durante la mayor parte del año, se unen solo para aparearse. Alpine Ibex es estrictamente herbívoro, con más de la mitad de su dieta que consiste en pastos, y el resto es una mezcla de musgos, flores, hojas y ramitas. El Ibex alpino históricamente varió a través de Francia, Italia, Suiza, Liechtenstein, Baviera, Austria y Eslovenia. A partir de principios del siglo XVI y con las armas de fuego se volvió común, la población general disminuyó debido a la sobreexplotación y la caza furtiva." #NT!
 dubois.126.g: "Tenaz." #NT!
 dubois.127.t: "Sabio" #NT!
 dubois.127.d: "Nuestro zoológico está enriquecido por un nuevo y maravilloso animal: hoy el tan esperado #O Wisent#! se mudó a su nuevo recinto." #NT!
 dubois.127.f: "El bisonte sabio o europeo es una especie europea de ganado. Se encontraron sabios en los bosques primitivos de Europa occidental, central y sudoriental hasta la Edad Media. Su hábitat es un bosque caducifolio, coníferos y mixtos templados. Los sabios son animales de rebaño, pero de acuerdo con su hábitat solo se encuentran en pequeños grupos. Desde la extinción de los Aurochs, el bisonte ha sido el mamífero terrestre más pesado de Europa y también el último representante de las especies bovinas salvajes en el continente europeo. En la prehistoria e historia temprana, su área de distribución se extendía desde el norte de la península ibérica en Europa Central y el sur de la Península Escandinava hasta los Estados Bálticos; Desde la Bahía de Riga, el límite de distribución corrió hacia el sureste hasta el Mar Negro y el Cáucaso. En la década de 1920, el sabio fue amenazado con extinción; El último sabio de vida libre (un sabio de montaña) fue filmado en 1927 en el Cáucaso. Todos los sabios vivos hoy descienden de doce sabios mantenidos en zoológicos y recintos de animales." #NT!
 dubois.127.g: "Extraño." #NT!
  
 dubois.131.t: "Hipopótamo" #NT!
 dubois.131.d: "Nuestro zoológico está enriquecido por un nuevo animal exótico: hoy el tan esperado #O Hippopotamus#! se trasladó a su nuevo recinto." #NT!
 dubois.131.f: "El hipopótamo (Hippopotamus anphibius) es un gran mamífero semiaquático nativo de África subsahariana. Su nombre proviene del antiguo griego para 'River Horse'. Después de los elefantes y los rinocerontes, el hipopótamo es el siguiente mamífero terrestre más grande. También es la tierra existente más grande Artiodactyl. Los hipopótamos habitan ríos, lagos y pantanos de mangle. Los toros territoriales presiden cada uno sobre un tramo de agua y un grupo de cinco a treinta vacas y terneros. Durante el día, los hipopótamos permanecen fríos al quedarse en agua o barro, emergiendo al anochecer para pastar sobre pastos. Mientras que los hipopótamos descansan entre sí en el agua, el pastoreo es una actividad solitaria y los hipopótamos generalmente no muestran un comportamiento territorial en la tierra. Los hipopótamos se encuentran entre los animales más peligrosos del mundo debido a su naturaleza agresiva e impredecible." #NT!
 dubois.131.g: "Enorme." #NT!
 dubois.132.t: "León" #NT!
 dubois.132.d: "Nuestro zoológico está enriquecido por un nuevo animal exótico: hoy el tan esperado #O Lion#! se mudó a su nuevo recinto." #NT!
 dubois.132.f: "El león (Panthera Leo) es un gran gato del género Panthera nativo de África e India. Tiene un cuerpo musculoso y de pecho ancho; Cabeza corta y redondeada; orejas redondas; y un mechón peludo al final de su cola. Es sexualmente dimórfico; Los leones machos adultos son más grandes que las hembras y tienen una melena prominente. Es una especie social, formando grupos llamados orgullo. El león habita en praderas, sabanas y matorrales. Por lo general, es más diurno que otros gatos salvajes, pero cuando se persigue, se adapta a estar activo por la noche y en el crepúsculo. Uno de los símbolos animales más ampliamente reconocidos en la cultura humana, el león ha sido ampliamente representado en esculturas y pinturas, en banderas nacionales y en películas y literatura contemporánea." #NT!
 dubois.132.g: "Majestuoso." #NT!
 dubois.133.t: "Elefante" #NT!
 dubois.133.d: "Nuestro zoológico está enriquecido por un nuevo animal exótico: hoy el tan esperado #O Elephant#! se trasladó a su nuevo recinto." #NT!
 dubois.133.f: "El elefante de arbusto africano (Loxodonta africana) es una de las dos especies de elefantes africanas existentes y una de las tres especies de elefantes existentes. Es el animal terrestre vivo más grande, con toros que alcanzan una altura de hombro de hasta 3.96 m (13 pies 0 pulgadas) y una masa corporal de hasta 10.4 t (11.5 toneladas cortas). Es un mamífero social, que viaja en rebaños compuestos de vacas y sus descendientes. El elefante de arbustos africano tiene piel gris con pelos escasos. Sus orejas grandes cubren todo el hombro y ayudan a reducir el calor del cuerpo; Ajustarlos crea corrientes de aire y expone grandes vasos sanguíneos en los lados internos para aumentar la pérdida de calor durante el clima cálido. Los elefantes de África Bush usan sus baúles para la comunicación táctil. Al saludar, un individuo de rango más bajo insertará la punta de su tronco en la boca de su superior. Los elefantes también estirarán su tronco hacia un individuo que se acerca a la que tienen la intención de saludar." #NT!
 dubois.133.g: "Excelente." #NT!
 dubois.134.t: "Jirafa" #NT!
 dubois.134.d: "Nuestro zoológico está enriquecido por un nuevo animal exótico: hoy el tan esperado #O Giraffe#! se mudó a su nuevo recinto." #NT!
 dubois.134.f: "La jirafa es un gran mamífero africano que pertenece al género Giraffa. Es el animal terrestre vivo más alto y el rumiante más grande de la tierra. Las principales características distintivas de la jirafa son su cuello y piernas extremadamente largos, sus osiconas con forma de cuerno y sus patrones de pelaje manchado. Las jirafas generalmente habitan sabana y bosques. Su fuente de alimento son hojas, frutas y flores de plantas leñosas, principalmente especies de Acacia, que navegan a alturas que la mayoría de los otros herbívoros no pueden alcanzar. Las jirafas generalmente se encuentran en grupos que varían en tamaño y composición de acuerdo con factores ecológicos, antropogénicos, temporales y sociales. Con su construcción larguirucho y abrigo manchado, la jirafa ha sido una fuente de fascinación a lo largo de la historia humana, y su imagen está muy extendida en la cultura." #NT!
 dubois.134.g: "Elegante" #NT!
 dubois.135.t: "Pingüino africano" #NT!
 dubois.135.d: "Nuestro zoológico está enriquecido por un nuevo animal exótico: hoy el tan esperado #O Penguin#! se trasladó a su nuevo recinto." #NT!
 dubois.135.f: "El pingüino africano (Spheniscus demersus) es una especie de pingüino confinada a las aguas del sur de África. Como todos los pingüinos existentes, es no volador, con un cuerpo y alas aerodinámico rígidos y aplanados en aletas para un hábitat marino. La especie tiene parches de piel rosa distintivos sobre los ojos y una máscara facial negra. Las partes superiores del cuerpo son negras y se delinean bruscamente de las partes inferiores blancas, que se ven y marcan con una banda negra. El pingüino africano es un buzo de búsqueda y se alimenta principalmente de peces y calamares y es la única especie de pingüino que se reproduce en África. Los pingüinos africanos son una especie comúnmente vista en zoológicos en todo el mundo. Debido a que no requieren temperaturas particularmente bajas, a menudo se mantienen en recintos externos." #NT!
 dubois.135.g: "Al menos tenemos un pingüino." #NT!
 dubois.136.t: "Rato topo desnudo" #NT!
 dubois.136.d: "Nuestro zoológico está enriquecido por un nuevo animal exótico: hoy el tan esperado #O desnudo rat#! se trasladó a su nuevo recinto." #NT!
 dubois.136.f: "La rata de lunar desnuda exhibe un conjunto muy inusual de rasgos fisiológicos y de comportamiento que le permiten prosperar en un entorno subterráneo duro; En particular, es la única forma termoconformadora de mamíferos con una forma de regulación de la temperatura corporal casi completamente ectotérmica (de sangre fría), así como exhibiendo una compleja estructura social dividida entre las castas reproductivas y no reproductivas, lo que lo convierte en la clasificación de la socialidad de Damaraland estrechamente relacionado con los ejemplos únicos ampliamente reconocidos (la clasificación más alta de la socialidad) en los mamms. El rato molde desnudo carece de sensibilidad al dolor en su piel y tiene tasas metabólicas y respiratorias muy bajas. También es notable por su longevidad y su resistencia al cáncer y la privación de oxígeno." #NT!
 dubois.136.g: "Lindo." #NT!
 dubois.137.t: "Cebra" #NT!
 dubois.137.d: "Nuestro zoológico está enriquecido por un nuevo animal exótico: hoy el tan esperado #O Zebra#! se trasladó a su nuevo recinto." #NT!
 dubois.137.f: "Las cebras son un subgénero del género de caballos, que consta de tres especies. Todos los representantes de las cebras se encuentran exclusivamente en África, donde en su mayoría habitan paisajes abiertos. Hay varios intentos de explicar el desarrollo evolutivo de las rayas; También es concebible una combinación de varios efectos ventajosos. Por un lado, Charles Darwin y Alfred Russel Wallace, entre otros, sospecharon que podían actuar como camuflaje en hierba alta o en aire caliente y brillante. Debido a que las cebras viven en los rebaños, esto podría dificultar que los depredadores destacen presas. Según otra hipótesis probada experimentalmente, las rayas se formaron para camuflar contra moscas tsetse y moscas de caballos. Otros científicos sospechan que las tiras se utilizan para la termorregulación." #NT!
 dubois.137.g: "Caballuno." #NT!
  
 dubois.141.t: "Panda gigante" #NT!
 dubois.141.d: "Nuestro zoológico está enriquecido por un nuevo animal espectacular: hoy el tan esperado #O gigante panda#! se mudó a su nuevo recinto." #NT!
 dubois.141.f: "El panda gigante (Ailuropoda melanoleuca) es una especie de oso caracterizada por su abrigo en blanco y negro y su cuerpo rotundo. El nombre 'panda gigante' a veces se usa para distinguirlo del panda rojo, un musteloide vecino. Aunque pertenece a la Orden Carnivora, el panda gigante es un folivore, con brotes y hojas de bambú que representan más del 99% de su dieta. Los pandas gigantes son generalmente solitarios. Cada adulto tiene un territorio definido y una hembra no es tolerante con otras mujeres en su rango. Los encuentros sociales ocurren principalmente durante la breve temporada de reproducción en la que los pandas se reúnen entre sí. La baja calidad de nutrición del bambú significa que los pandas necesitan comer con más frecuencia, y debido a su falta de depredadores importantes, pueden estar activos en cualquier momento del día." #NT!
 dubois.141.g: "Fantástico." #NT!
 dubois.142.t: "Orangután" #NT!
 dubois.142.d: "Nuestro zoológico está enriquecido por un nuevo y espectacular animal: hoy el tan esperado #O orangutan#! se trasladó a su nuevo recinto." #NT!
 dubois.142.f: "Los orangutanes son grandes simios nativos de las selvas tropicales de Indonesia y Malasia. Los orangutanes más arbóreos de los grandes simios pasan la mayor parte de su tiempo en los árboles. Tienen brazos proporcionalmente largos y piernas cortas, y tienen cabello marrón rojizo que cubre sus cuerpos. Los machos adultos dominantes desarrollan almohadillas o bridas de mejillas distintivas y hacen largas llamadas que atraen a las hembras e intimidan a rivales; Los machos subordinados más jóvenes no se parecen más a las hembras adultas. Son los más solitarios de los grandes simios: los lazos sociales ocurren principalmente entre las madres y sus descendientes dependientes. Los orangutanes se encuentran entre los primates más inteligentes. Utilizan una variedad de herramientas sofisticadas y construyen nidos de sueño elaborados cada noche desde ramas y follaje." #NT!
 dubois.142.g: "Con sus habilidades, podría ser un buen bibliotecario." #NT!
 dubois.143.t: "Tigre de Bengala" #NT!
 dubois.143.d: "Nuestro zoológico está enriquecido por un nuevo y espectacular animal: hoy el tan esperado #O Bengal Tiger#! se mudó a su nuevo recinto." #NT!
 dubois.143.f: "El tigre de Bengala es una población de la subespecie Panthera Tigris Tigris y la subespecie nominada de tigre. Se ubica entre los gatos salvajes más grandes vivos hoy. El abrigo del tigre de Bengala es amarillo a naranja claro, con rayas que van desde marrón oscuro hasta negro; El vientre y las partes interiores de las extremidades son blancas, y la cola es naranja con anillos negros. La unidad social básica del tigre está compuesta por una mujer y su descendencia. Los animales adultos se congregan solo temporalmente cuando las condiciones especiales lo permiten, como abundantes suministros de alimentos. De lo contrario, llevan vidas solitarias, cazando individualmente para los animales de bosque y pastizales sobre los que se aprovechan. En la mayoría de los casos, los tigres se acercan a su víctima desde un lado o atrás de la distancia lo más cerca posible y agarran la garganta de la presa para matarla." #NT!
 dubois.143.g: "Noble." #NT!
 dubois.144.t: "Tapir malayo" #NT!
 dubois.144.d: "Nuestro zoológico está enriquecido por un nuevo y espectacular animal: hoy el tan esperado #O Malayan Tapir#! se mudó a su nuevo recinto." #NT!
 dubois.144.f: "El tapir malayo (tapirus indicus) es la única especie de tapir viva fuera de las Américas. Se identifica fácilmente por sus marcas, sobre todo el parche de color claro que se extiende desde sus hombros hasta sus cuartos traseros. Está cubierto de cabello negro, a excepción de las puntas de sus orejas, que, como con otros tapires, están bordeados de blanco. El patrón es para camuflaje; La coloración interrumpida rompe su esquema y hace que sea más difícil de reconocer; Otros animales pueden confundirlo con una roca grande, en lugar de presa, cuando se acuesta a dormir. Los tapires malaya tienen una vista muy pobre, en lugar de depender de excelentes sentidos de olfato y oído." #NT!
 dubois.144.g: "Exótico." #NT!
 dubois.145.t: "Komodo dragón" #NT!
 dubois.145.d: "Nuestro zoológico está enriquecido por un nuevo y espectacular animal: hoy el tan esperado #O komodo dragon#! se mudó a su nuevo recinto." #NT!
 dubois.145.f: "El dragón de Komodo (Varanus komodoensis) es miembro de la familia Monitor Lizard Varanidae que es endémica de las islas indonesias de Komodo, Rinca, Flores y Gili Motang. Es la especie existente más grande de lagarto, que crece a una longitud máxima de 3 m (9.8 pies) y pesa hasta 70 kg (150 lb). Como resultado de su tamaño, los dragones de Komodo son depredadores de ápice y dominan los ecosistemas en los que viven. Los dragones de Komodo cazan y emboscan presas, incluidos invertebrados, pájaros y mamíferos. El comportamiento grupal de Komodo Dragons en la caza es excepcional en el mundo de los reptiles. Su dieta consiste principalmente en Javan Rusa (Rusa timorensis), aunque también comen cantidades considerables de carroña. Fueron grabados por primera vez por científicos occidentales en 1910. Su gran tamaño y su temible reputación los convierten en exhibiciones populares de zoológicas." #NT!
 dubois.145.g: "Terrible." #NT!
 dubois.146.t: "Onza" #NT!
 dubois.146.d: "Nuestro zoológico está enriquecido por un nuevo y espectacular animal: hoy el tan esperado #O Snow Leopard#! se mudó a su nuevo recinto." #NT!
 dubois.146.f: "El leopardo de la nieve, comúnmente conocido como la onza, es nativo de las cadenas montañosas del centro y sur de Asia. El Snow Leopard muestra varias adaptaciones para vivir en entornos fríos y montañosos. Sus pequeñas orejas redondeadas ayudan a minimizar la pérdida de calor. Es solitario y mayormente activo al amanecer hasta la madrugada, y nuevamente en las tardes y las noches tempranas. Los leopardos de las nieves no pueden rugir a pesar de su hueso hioides parcialmente osificado, ya que sus pliegues vocales cortos de 9 mm (0.35 pulgadas) proporcionan poca resistencia al flujo de aire. Las vocalizaciones del leopardo de la nieve incluyen maullidos, gruñidos, prustanos y gemidos. Pueden ronronear al exhalar. El leopardo de la nieve se usa ampliamente en la heráldica y como un emblema en Asia Central. Durante mucho tiempo han sido utilizados como símbolo político, las barras AQ ('Leopardo blanco'), por tártaros, kazajos y bulgars." #NT!
 dubois.146.g: "Sublime." #NT!
 dubois.147.t: "Guepardo asiático" #NT!
 dubois.147.d: "Nuestro zoológico está enriquecido por un nuevo y espectacular animal: hoy el tan esperado #O Cheetah#! se mudó a su nuevo recinto." #NT!
 dubois.147.f: "El guepardo es el animal terrestre más rápido del mundo. En un corto período de tiempo durante una persecución, un guepardo puede producir 60 veces más calor que en reposo, con gran parte del calor producido a partir de la glucólisis, almacenado para aumentar la temperatura corporal. El guepardo asiático una vez varió desde el norte de África subsahariana en Asia Central hasta la India. Durante el transcurso del siglo XIX, el rango de la guepardo asiática continuó disminuyendo antes de que se extinguiera en casi todas las regiones, excepto una pequeña región en Irán. Ya en la Primera Guerra Mundial, los príncipes indios tenían guepardos importados de África, ya que la especie local estaba casi extinta." #NT!
 dubois.147.g: "Rápido." #NT!
 dubois.148.t: "Panda roja" #NT!
 dubois.148.d: "Nuestro zoológico está enriquecido por un nuevo y espectacular animal: hoy el tan esperado #O panda rojo #! se mudó a su nuevo recinto." #NT!
 dubois.148.f: "Los pandas rojos son un género de mamíferos nativos del Himalaya oriental y el suroeste de China y se alimentan principalmente de bambú. Contrariamente a los supuestos actuales en esta dirección, el género no está estrechamente relacionado con el panda gigante. En forma se ven similares a un mapache, pero son más delgados. Su pelaje es largo y suave, marrón rojizo a cobre en rojo en la parte superior, a veces con un tinte amarillento y negro brillante en la parte inferior. La cara se puede colorear individualmente: es principalmente marrón rojizo con rayas de lágrimas blancas, el hocico es corto y la nariz está desnuda y tono negro. Los pequeños pandas son escaladores muy hábiles y acrobáticos. Mientras van en busca de comida por la noche y por la noche, durante el día generalmente duermen estirados en las horquillas de los árboles, en las cavidades de los árboles se acurrucan y ponen las colas frente a sus caras para protegerlos. Son muy sensibles al calor; Las temperaturas superiores a 25 ° C pueden ser muy difíciles para ellas." #NT!
 dubois.148.g: "Este fue difícil de encontrar." #NT!
  
 dubois.151.t: "Tortuga marina verde" #NT!
 dubois.151.d: "Nuestro zoológico está enriquecido por un animal nuevo y excepcional: hoy la tan esperada tortuga marina #O marina verde#! se mudó a su nuevo recinto." #NT!
 dubois.151.f: "La tortuga marina verde (Chelonia mydas) es una especie de gran tortuga marina de la familia Cheloniidae. El cuerpo dorsoventralmente aplanado de C. mydas está cubierto por un gran caparazón en forma de lágrima; Tiene un par de aletas grandes en forma de paleta. Por lo general, tiene un color ligero, aunque en las poblaciones del Pacífico oriental, las partes del caparazón pueden ser casi negras. Los adultos generalmente habitan lagunas poco profundas, alimentándose principalmente de varias especies de pastos marinos. Al igual que otras tortugas marinas, las tortugas marinas verdes migran largas distancias entre los terrenos de alimentación y las playas de eclosión. Muchas islas en todo el mundo son conocidas como Turtle Island debido a las tortugas marinas verdes que anidan en sus playas. Las tortugas marinas verdes pueden vivir hasta 90 años en la naturaleza." #NT!
 dubois.151.g: "Canoso." #NT!
 dubois.152.t: "Manta" #NT!
 dubois.152.d: "Nuestro zoológico está enriquecido por un animal nuevo y excepcional: hoy el tan esperado #O Manta Ray#! se trasladó a su nuevo recinto." #NT!
 dubois.152.f: "La manta oceánica gigante (Mobula Birostris) es una especie de rayo en la familia Mobulidae y el tipo de rayo más grande del mundo. Es circunglobal y se encuentra típicamente en aguas tropicales y subtropicales, pero también se puede encontrar en aguas templadas. El rayo de manteca oceánica gigante puede crecer hasta 9 m (30 pies) en longitud máxima y a un tamaño de disco de 7 m (23 pies) con un peso de aproximadamente 3,000 kg (6,600 lb) pero el tamaño promedio comúnmente observado es de 4.5 m (15 pies). La piel es suave con una dispersión de tubérculos cónicos y en forma de cresta. La coloración de la superficie dorsal (superior) es negro, marrón oscuro o azul acérrimo, a veces con algunas manchas pálidas y generalmente con un borde pálido. Debido a su gran tamaño y velocidad en caso de peligro, la manta oceánica tiene muy pocos depredadores naturales que podrían ser fatales." #NT!
 dubois.152.g: "Gigantesco." #NT!
 dubois.153.t: "Canguro rojo" #NT!
 dubois.153.d: "Nuestro zoológico está enriquecido por un animal nuevo y excepcional: hoy el tan esperado #O Red Kangaroo#! se trasladó a su nuevo recinto." #NT!
 dubois.153.f: "El canguro rojo (Osfranter Rufus) es el más grande de todos los canguros, el mamífero terrestre más grande de Australia y el marsupial existente más grande. Esta especie es un canguro muy grande con orejas largas y puntiagudas y un hocico de forma cuadrada. Son sexualmente dimórficos ya que los machos tienen pelaje corto, rojo marrón, que se desvanece a un palo pálido debajo y en las extremidades. Los machos crecen hasta una longitud de cabeza y cuerpo de 1.3-1.6 m (4 pies 3 a 5 pies 3 pulgadas) con una cola que agrega 1.2 m (3 pies 11 pulgadas) a la longitud total y los australianos se refieren como 'grandes rojos'. Las piernas del canguro rojo funcionan muy como una banda de goma, con el tendón de Aquiles estirando a medida que el animal baja, luego libera su energía para impulsar el animal hacia adelante y hacia adelante, permitiendo la locomoción de rebotes característica. Pueden alcanzar velocidades de alrededor de 60 km/h (37 mph)." #NT!
 dubois.153.g: "Impresionante." #NT!
 dubois.154.t: "Coala" #NT!
 dubois.154.d: "Nuestro zoológico está enriquecido por un animal nuevo y excepcional: hoy el tan esperado #O koala#! se mudó a su nuevo recinto." #NT!
 dubois.154.f: "El koala (Phascolarctos cinereus) es un marsupial herbívoro arbóreo nativo de Australia. Es fácilmente reconocible por su cuerpo robusto y raro y cabeza grande con orejas redondas y esponjosas y nariz grande en forma de cuchara. El color de piel varía de gris plateado a marrón de chocolate. Los koalas generalmente habitan bosques de eucalipto abierto, ya que las hojas de estos árboles constituyen la mayor parte de su dieta. Esta dieta de eucalipto tiene un bajo contenido nutricional y calórico y contiene toxinas que disuaden a la mayoría de los otros mamíferos a alimentarse de ella. Los koalas son en gran medida sedentarios y duermen hasta veinte horas al día. Son animales asociales, y la unión existe solo entre madres y descendientes dependientes. Debido a su apariencia distintiva, los koala junto con los canguros son reconocidos en todo el mundo como símbolos de Australia." #NT!
 dubois.154.g: "Lindo." #NT!
 dubois.155.t: "Ornitorrinco" #NT!
 dubois.155.d: "Nuestro zoológico está enriquecido por un animal nuevo y excepcional: hoy el tan esperado #O platypus#! se mudó a su nuevo recinto." #NT!
 dubois.155.f: "El platito (Ornithorhynchus anatinus) es una de las cinco especies existentes de monotremas, mamíferos que ponen huevos en lugar de dar a luz para vivir jóvenes. Al igual que otros monotremas, detecta presas a través de la electrolocalización. Es una de las pocas especies de mamíferos venenosos, ya que el ornitorrinco macho tiene un espolón en el pie trasero que ofrece un veneno, capaz de causar dolor severo a los humanos. La apariencia inusual de estos mamíferos con patas de huevo, con pico de pato, con patas de ramas, desconcertadas a los naturalistas europeos cuando lo encontraron por primera vez. En 1799, los primeros científicos en examinar un cuerpo de ornitorrinco preservado lo juzgaron como falso, hecho de varios animales cosidos juntos. Las características únicas del ornitorio lo convierten en un tema importante en el estudio de la biología evolutiva y un símbolo reconocible e icónico de Australia." #NT!
 dubois.155.g: "Paradoja." #NT!
 dubois.156.t: "Casuario" #NT!
 dubois.156.d: "Nuestro zoológico está enriquecido por un animal nuevo y excepcional: hoy el tan esperado #O cassowary#! se mudó a su nuevo recinto." #NT!
 dubois.156.f: "Cassowaries son aves sin volantes sin una quilla en sus huesos de esternón. Tres especies de cassowary están existentes. El más común, el Southern Cassowary, es el tercer pájaro vivo más alto y segundo más alto, más pequeño que el avestruz y la emú. Alrededor del 90% de la dieta de casco consiste principalmente en fruta, aunque todas las especies son omnívoros oportunistas. Por lo general, todas las casas de casas son pájaros tímidos que se encuentran en el bosque profundo. Son expertos en desaparecer mucho antes de que un humano sepa que estaban allí, pero si se provocan, son capaces de infligir lesiones graves, incluso fatales, tanto a los perros como a las personas. El casco a menudo ha sido etiquetado como "el pájaro más peligroso del mundo"." #NT!
 dubois.156.g: "¿Para qué sirve esta casque?" #NT!
 dubois.157.t: "León marino de Nueva Zelanda" #NT!
 dubois.157.d: "Nuestro zoológico está enriquecido por un animal nuevo y excepcional: hoy el tan esperado #O New Zealand Sea Lion#! se mudó a su nuevo recinto." #NT!
 dubois.157.f: "El león marino de Nueva Zelanda es un sello grande de orejas nativas de la zona subpolar. Los toros son de color negro-marrón y alcanzan alturas de 2.45 metros; Una melena de hombro los hace parecer masivos. Las vacas son más delicadas: son de color marrón claro y, como máximo, de 2 metros de largo. Las colonias se encuentran en el sur de Nueva Zelanda en las islas subantárticas: las Islas Auckland, las Islas Snares y la Isla Campbell. El 95 por ciento de las acciones mundiales se encuentran en tres colonias en las Islas Auckland. En el siglo XIX, muchos leones marinos fueron asesinados por selladores. Los leones marinos de las Islas Auckland fueron eliminados por completo en solo veinte años después de que se descubrieron las islas en 1806. Hoy, las Islas Auckland son un santuario de focas desierto donde las poblaciones se han recuperado en gran medida." #NT!
 dubois.157.g: "Robusto." #NT!
  
 dubois.200.t: "Apertura del Museo de Historia Natural" #NT!
 dubois.200.d: "El profesor [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] abrió hoy el Museo de Historia Natural, mostrando el desarrollo de seres y evolución vivos." #NT!
 dubois.200.f: "Cuando el Prof. [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] anunció con orgullo la apertura del primer Museo de Historia Natural de nuestra nación, algunos ya habían olvidado el esfuerzo que había hecho para impulsar este proyecto. El Museo Nacional, que anteriormente había albergado la historia natural, había resistido este movimiento junto con su liderazgo. Para muchos, la historia natural era simplemente un departamento subordinado. Fue gracias al Prof. [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] que usó sus contactos en el gobierno y siguió su idea sin compromiso. Especialmente la investigación paleontológica se beneficiará de esto en el futuro, y los visitantes ya han expresado su gran interés en criaturas extintas, así como hacer preguntas sobre el origen del hombre. La paleontología, anteriormente una ciencia puramente auxiliar o una ocupación temporal de geólogos, ahora se ha convertido en una ciencia establecida con sus propias instituciones y una reputación que la pone a la par con otras ciencias naturales." #NT!
 dubois.200.g: "¡Suena como un gran lugar para visitar!" #NT!
 dubois_natural_history_museum_modifier: "Museo de Historia Natural" #NT!
  
 dubois.201.t: "Destino de expedición paleontológica" #NT!
 dubois.201.f: "Se puede enviar a un [concept_dubois_paleontologist] a formaciones donde anualmente desenterra fósiles hasta que se recuerde desde su posición. Las excelentes formaciones también pueden contener huesos de dinosaurio. Estos varían de continente a continente. La forma más fácil de obtener acceso a una formación es controlar el estado asociado. Sin embargo, el acceso también se puede obtener pacíficamente a través de licencias paleontológicas." #NT!
 dubois.201.g: "No importa." #NT!
  
 dubois.202.t: "Diente de tiburón" #NT!
 dubois.202.d: "Después de examinar una formación rocosa, un equipo paleontológico reunió una colección de dientes de tiburón fósil." #NT!
 dubois.202.f: "Además de las vértebras, los dientes de tiburones fósiles suelen ser los únicos fósiles sobrevivientes de tiburones extintos. Dado que los tiburones producen una gran cantidad de dientes debido a sus dientes de revólver, estos se encuentran entre los fósiles encontrados con mayor frecuencia. Ya en 1616, Fabio Colonna pudo mostrar en su tratado de Glossopetris disertatio que las supuestas lenguas víboras son de hecho dientes de tiburón. Squalicorax pristodontus tenía dientes planos y triangulares, hasta un máximo de tres centímetros de largo. Los bordes de corte fueron finamente serrados como hoy en el tiburón tigre. En el período Cretácico, el género Squalicorax se distribuyó en todo el mundo. Se han encontrado dientes fosilizados en los sedimentos mesozoicos en las Américas, África, Japón, Australia, India, Rusia, Medio Oriente y Europa." #NT!
 dubois.202.g: "¿Todavía están afilados?" #NT!
 dubois.203.t: "Huellas de dinosaurios?" #NT!
 dubois.203.d: "[SCOPE.sCharacter('pb_leader').GetFullName] dudas un hallazgo reciente del profesor [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName]." #NT!
 dubois.203.f: "Cuando el Prof. [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] anunció un nuevo descubrimiento en una formación rocosa, el líder de la pequeña burguesía también llegó a ver la sensación paleontológica por sí mismo. Sin embargo, mostró poca comprensión de las presuntas huellas de dinosaurios. De hecho, [SCOPE.sCharacter('pb_leader').GetFullName] explicó que no podía ver nada especial en las extrañas hendiduras. El filistinismo del líder político provocó un argumento en toda regla con el profesor, quien exigió una disculpa en el acto. Las disputas pronto se convirtieron en un conflicto entre los partidarios de [SCOPE.sCharacter('pb_leader').GetLastName] y los académicos en torno al Prof. [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName]." #NT!
 dubois.203.g: "Estas son huellas de dinosaurios." #NT!
 dubois.203.h: "Estas hendiduras pueden ser cualquier cosa." #NT!
 dubois.204.t: "Paleosinopa" #NT!
 dubois.204.d: "Recientemente, los científicos descubrieron el esqueleto de un mamífero temprano. Este es un ejemplo particularmente bien conservado." #NT!
 dubois.204.f: "Palaeosinopa es un género de mamíferos en la familia Pantolestidae, ahora extinto. Los animales se parecían a los insectívoros de hoy y vivían desde el paleoceno superior hasta el Eoceno inferior de 59 a 48 millones de años. La evidencia se conoce principalmente de América del Norte, más raramente de Europa. Los hallazgos importantes, incluidos algunos esqueletos completos, provienen del noroeste de los Estados Unidos. El miembro fósil de Butte de la Formación Green River con una edad de aproximadamente 52 millones de años y la formación estratigráficamente algo más antigua de Willwood son particularmente sobresalientes. Los representantes de Palaeosinopa se caracterizaron por un físico robusto y una cola larga. Las patas delanteras más cortas en comparación con las patas traseras más largas parecían bastante primitivas. Debido al físico, se reconstruye una forma de vida semiacuática para los animales, la estructura de los dientes a su vez habla de alimentos predominantemente animales. Como resultado, la paleosinopa parece haber habitado un hábitat similar al de las nutrias de hoy." #NT!
 dubois.204.g: "Fantástico." #NT!
 dubois.204.h: "¡Un regalo perfecto para un amigo!" #NT!
 dubois.205.t: "Huesos en el minas" #NT!
 dubois.205.d: "Los mineros han encontrado huesos de una especie prehistórica en un eje en [SCOPE.sState('dubois_excavation_state').GetName]. El Prof. [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] ha acordado examinar el sitio más de cerca." #NT!
 dubois.205.f: "No todos estaban tan entusiasmados con el hallazgo de hueso en la mina como el paleontólogo que había sido convocado. La gestión de la mina estaba preocupada de que una excavación paleontológica pudiera interferir con el trabajo. Y de hecho, después de una breve inspección de los hallazgos, el Prof. [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] debería determinar que el trabajo en el eje debería posponerse a favor de una excavación científica profesional. Los industriales ya han protestado. El hallazgo fósil se convierte así en un problema político. Porque la intelectualidad ahora también está muy interesada e insiste en excavar los fósiles. Las voces medianas están considerando evitar una excavación y simplemente mantener registros, lo que no afectaría el trabajo minero y podría ser un buen compromiso político, pero significaría que no podríamos salvar a los fósiles nosotros mismos." #NT!
 dubois.205.g: "Debemos tener estos fósiles a toda costa." #NT!
 dubois.205.h: "Nuestro científico puede examinar el lugar pero no debe excavar la mina." #NT!
 dubois.205.i: "No molestes a estos caballeros." #NT!
 dubois.206.t: "Composita" #NT!
 dubois.206.d: "Este año, [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')] bajo el liderazgo del Prof. [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] en el sitio de excavación en [SCOPE.sState('dubois_excavation_state').GetName] ha descubierto algunos especímenes particularmente hermosos de la composita." #NT!
 dubois.206.f: "Composita es un género extinto de braquiópodos que vivía desde el difunto Devónico hasta el difunto Pérmico. Composita tenía una distribución global cosmopolita, después de haber vivido en todos los continentes, excepto en la Antártida.composita, tenía una carcasa suave con un pliegue y surco más o menos distintos y una abertura redonda para el pedículo en la válvula del pedículo. Composita se incluye en la familia Athyrididae (Orden Athyridida) y se coloca en la subfamilia Spirigigigerellinae. Solo los filisteos reconocerían un mero caparazón en este fósil tradicional." #NT!
 dubois.206.g: "Eso es tan ... emocionante." #NT!
 dubois.207.t: "Trilobita" #NT!
 dubois.207.d: "El Prof. [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] ha entregado un excelente espécimen de trilobita a la colección paleontológica hoy. Tiene alrededor de 400 millones de años y de gran valor científico. Al menos lo dice." #NT!
 dubois.207.f: "Los trilobites son una clase extinta de artrópodos marinos. Existieron durante casi todo el lapso del Paleozoico, desde la segunda serie del Cámbrico (a partir de hace 521 millones de años) hasta el evento de extinción masiva al final del Pérmico, hace unos 251 millones de años. Grandes cantidades de sus exoesqueletos, reforzados con calcita (carbonato de calcio), se han preservado como fósiles, lo que permite reconstruir la evolución y la variedad de formas de las numerosas especies. Esto, combinado con su persistencia estratigráfica y su amplio rango geográfico, hace que los trilobites importen fósiles de índice para el paleozoico, particularmente el Cámbrico. La clase extinta de trilobita consta de nueve órdenes reconocidas, más de 150 familias, más de 5000 géneros y más de 15,000 especies descritas." #NT!
 dubois.207.g: "Gracias profesor." #NT!
 dubois.208.t: "Amonitas" #NT!
 dubois.208.d: "Los amonitas encontrados en [SCOPE.sState('dubois_excavation_state').GetName] son otro conjunto notable de fósiles, enriqueciendo la colección paleontológica de nuestra nación." #NT!
 dubois.208.f: "Las amonitas (Ammonoidea) son un subgrupo extinto de cefalópodos. Este taxón era muy diverso con más de 1500 géneros conocidos. El número de especies puede haber sido de alrededor de 30,000 a 40,000. El tamaño de la concha de los animales adultos generalmente está en el rango de 1 a 30 cm. Desde su primera aparición en el Bajo Devónico hasta su extinción al final del Cretácico (límite de Paleogene Cretáceo), los amonitas representan una gran cantidad de fósiles índice durante un período de aproximadamente 350 millones de años; En parte, la delimitación cronológica de los sedimentos marinos se lleva a cabo exclusivamente sobre la base de los amonitas. Por lo tanto, son de gran importancia para la geología y la paleontología. El taxón de Amonoidea fue mencionado por primera vez en 1884 por Karl Alfred von Zittel en su manual sobre paleontología. El nombre proviene de la antigüedad, Plinio el anciano se refirió a los fósiles como 'Ammonis cornua' (cuernos de Ammon)." #NT!
 dubois.208.g: "Déjame uno." #NT!
 dubois.209.t: "Flora fosilizada" #NT!
 dubois.209.d: "[Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')] han encontrado una flora fosilizada de millones de años en una cantera." #NT!
 dubois.209.f: "En el carbonífero (hace unos 360-300 millones de años), los helechos (en formas más grandes que hoy, generalmente llamadas helechos de árboles) junto con plantas de cola de caballo y licopodos formaron enormes bosques y crearon la base para la mayoría de los depósitos de carbón de hoy. Los hallazgos fósiles más antiguos son del Bajo Devónico (hace unos 400 millones de años). Por lo tanto, los helechos son probablemente más antiguos que las plantas de semillas, que aparecieron por primera vez en el Devónico superior." #NT!
 dubois.209.g: "La piedra angular de la revolución industrial." #NT!
 dubois.210.t: "Huevos de dinosaurio" #NT!
 dubois.210.d: "Algunos objetos redondos, primero se cree que son meras piedras, han resultado ser huevos en un examen más detallado. Los científicos aún no están seguros de a quién pertenecían exactamente, pero sin duda los asignan a una especie de dinosaurio." #NT!
 dubois.210.f: "En 1859, los primeros fósiles de huevo de dinosaurios documentados científicamente fueron descubiertos en el sur de Francia por un sacerdote católico y naturalista aficionado llamado Padre Jean-Jacques Pouech; Pensó, sin embargo, que fueron colocadas por pájaros gigantes. Los primeros fósiles de huevos de dinosaurios reconocidos científicamente fueron descubiertos por casualidad en 1923 por un equipo de Museo Americano de Historia Natural mientras buscaban evidencia de humanos tempranos en Mongolia. Estos huevos se atribuyeron erróneamente a las protoceratopas de herbívoros localmente abundantes, pero ahora se sabe que son huevos oviraptores. Los descubrimientos de huevos continuaron montando en todo el mundo, lo que llevó al desarrollo de múltiples esquemas de clasificación competidores." #NT!
 dubois.210.g: "Manejarlo con cuidado." #NT!
  
 dubois.211.t: "Excavación de dinosaurios" #NT!
 dubois.211.d: "Mientras investiga una gran formación, el Prof. [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] se ha encontrado con un hallazgo sensacional: ¡un hueso de dinosaurio! El [concept_dubois_paleontologist] organizó inmediatamente una excavación a gran escala para comenzar con la esperanza de encontrar más piezas." #NT!
 dubois.211.f: "'La combinación de tales personajes, algunos, como los sacros, completamente peculiares entre los reptiles, otros tomaron prestados, como se trata, de grupos ahora distintos entre sí, y todas las criaturas manifestadas por criaturas superan en tamaño el tamaño más grande de los reptiles existentes, lo que se presume, se considerará suficiente para establecer una tribu distinta de la tribu distinta de los reptiles saurianos, por lo que me presumirá. -Richard Owen" #NT!
 dubois.211.g: "¡Consigue tus palas!" #NT!
 dubois.213.t: "Fragmentos fósiles" #NT!
 dubois.213.d: "En el sitio de excavación de dinosaurios, los científicos han asegurado hallazgos fósiles más pequeños." #NT!
 dubois.213.f: ""Puede que no sea lo que estamos buscando, pero un centavo salvado es un centavo ganado". -[SCOPE.sCharacter('dubois_paleontologist_scope').GetFullName]" #NT!
 dubois.213.g: "¡Recoge los fósiles!" #NT!
 dubois.214.t: "Hueso de dinosaurio" #NT!
 dubois.214.d: "El equipo científico del Prof. [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] ha hecho un nuevo descubrimiento en el sitio de excavación de dinosaurios." #NT!
 dubois.214.f: "'Al ver un solo hueso, de una sola pieza de hueso, reconozco y reconstruyo la porción del todo del que se habría tomado. Todo el ser al que pertenecía este fragmento aparece en el ojo de mi mente. -Georges cuvier" #NT!
 dubois.214.g: "Otro hueso para la colección." #NT!
 dubois.215.t: "Cráneo de dinosaurio" #NT!
 dubois.215.d: "Las excavaciones en el pozo de dinosaurio han desenterrado una magnífica cabeza esquelética." #NT!
 dubois.215.f: "'La cabeza era tan larga o más larga que la de un oso pardo completamente cultivado, y las mandíbulas eran más profundas en proporción a su longitud. El hocico era más corto y profundo que el de un dog de toros. Todos los dientes eran colmillos cilíndricos afilados, lisos y brillantes, y de tamaño irregular. A cierta distancia en cada mandíbula proyectaban tres pulgadas sobre la goma, y ​​se hundieron una pulgada en el margen de la mandíbula, siendo así tanto como los colmillos de un tigre, pero más delgado. Dos de estos colmillos se cruzaban a cada lado del centro del frente. Además de los peces más pequeños, los reptiles sin duda proporcionaron las demandas de su apetito. -Encasador" #NT!
 dubois.215.g: "¡Ojalá sea un triceratops!" #NT!
 dubois.216.t: "Esqueleto de dinosaurio" #NT!
 dubois.216.d: "Después de un trabajo minucioso, el Prof. [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] logró descubrir un impresionante esqueleto de dinosaurio, algunos huesos de los cuales están particularmente bien conservados." #NT!
 dubois.216.f: "'El esqueleto en sí estaba organizado en el Museo de la Academia de Ciencias de Filadelfia, según esta restauración, y cuando el Profesor Cope me lo mostró y le expliqué sus peculiaridades, noté que las articulaciones de las vértebras fueron revertidas y le sugirieron suavemente que tenía todo lo que está mal, por vía intensiva.  Su indignación fue excelente, y afirmó en un lenguaje fuerte que había estudiado el animal durante muchos meses y al menos debería saber un extremo del otro ''. -Othniel Charles Marsh" #NT!
 dubois.216.g: "Fascinante." #NT!
 dubois.220.t: "Excavación terminada" #NT!
 dubois.220.d: "El [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')] ha terminado su excavación en el sitio de los dinosaurios. Una importante investigación científica llega a su fin." #NT!
 dubois.220.f: "'El cazador de fósiles debe ser un entusiasta científico. Debe estar dispuesto a soportar todo tipo de dificultades, sufrir frío a principios de la primavera y a fines de otoño y principios de invierno, sufrir un calor intenso y el resplandor del sol en los meses de verano, y debe estar preparado para beber agua álcali, y en algunas regiones para combatir el ataque del mosquito y otras muelas. Debe ser una especie de ingeniero para poder manejar grandes masas de piedra y transportarlas sobre desechos de desierto sin carretera al punto de envío más cercano; Debe tener un toque delicado y hábil para preservar los menos fragmentos de hueso cuando se fractura; Debe estar contento con una vida muy simple, porque la profesión rara vez es, si es que alguna vez, remunerativa, y casi invariablemente está mal pagado; Debe encontrar su principal recompensa y estímulo en el sentido del descubrimiento y en la envío de especímenes a los museos que nunca ha visto en beneficio de un público que tiene poco conocimiento o apreciación de los sacrificios que el cazador de fósiles ha hecho '. -Henry Fairfield Osborn" #NT!
 dubois.220.g: "Espero un nuevo esqueleto de dinosaurio para nuestra colección, al menos." #NT!
  
 dubois.221.t: "Eusthenopteron" #NT!
 dubois.221.d: "El Prof. [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] ha descubierto una forma rara de peces prehistóricos que podría representar un primer paso en la transición de animales acuáticos a terrestres." #NT!
 dubois.221.f: "Eustthenopteron es un género extinto de peces de altura sospechosos (sarcopterygii) del Alto Devónico de América del Norte y Europa. Se considera un excelente ejemplo de representantes originales del tetrapodomorpha. Dado que Eustthenopteron poseía un órgano de la luz de los pulmones y un poderoso esqueleto de aletas además de las branquias, podría haber sido posible moverse brevemente fuera del agua. En el esqueleto de las aletas frontales, los huesos de tres extremidades de los vertebrados terrestres, el húmero, el cúbito y el radio, ya pueden diferenciarse. Las dos aletas dorsales puntiagudas se establecieron muy atrás, las aletas pélvicas y la aleta anal frente a ellos." #NT!
 dubois.221.g: "Asombroso." #NT!
 dubois.222.t: "Arqueoptérix" #NT!
 dubois.222.d: "Durante una excavación en las montañas de piedra caliza bávara cerca de Solnhofen, el Prof. [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] hizo un descubrimiento sorprendente que equivalía a una sensación científica: ¿descubrió el vínculo faltante entre reptiles y aves?" #NT!
 dubois.222.f: ""
 dubois.223.t: "Megatherium" #NT!
 dubois.223.d: "Durante una investigación paleontológica, el equipo del Prof. [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] recuperó huesos que pertenecían a un perezoso gigante." #NT!
 dubois.223.f: ""
 dubois.224.t: "Ictiosauro" #NT!
 dubois.224.d: "La cabeza de las excavaciones paleontológicas informa que ha descubierto un dinosaurio que se asemeja a medio pez, medio delfín." #NT!
 dubois.224.f: ""
 dubois.225.t: "Smilodon" #NT!
 dubois.225.d: "El Departamento de Historia Natural puede señalar con orgullo un hallazgo: nuestro paleontólogo aparentemente ha encontrado el esqueleto de un tigre con dientes de sable." #NT!
 dubois.225.f: ""
 dubois.226.t: "Pterodactilo" #NT!
 dubois.226.d: "Los huesos descubiertos de un pequeño pterosaurio deleitan el mundo científico. Ya han sido enviados a la colección paleontológica." #NT!
 dubois.226.f: ""
 dubois.227.t: "Ichthyostega" #NT!
 dubois.227.d: "Cuando el Zeppelin aterrizó, la expedición en el hielo eterno encontró un fósil extraordinario que podría revolucionar la paleontología. Se envió rápidamente al paleontólogo principal del país, el Prof. [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName]. ¡Supuestamente es el vínculo faltante entre peces y animales terrestres!" #NT!
 dubois.227.f: ""
  
 dubois.301.t: "Destino de la expedición botánica" #NT!
 dubois.301.d: "Nuestro naturalista, Prof. [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName], ha realizado los preparativos finales para la partida. ¿A qué área debe viajar?" #NT!
 dubois.301.f: "Se puede enviar a un [concept_dubois_naturalist] a las selvas tropicales donde anualmente busca un nuevo espécimen hasta que se recuerde desde su posición. Los estados con selvas tropicales están indicados por un modificador estatal en Amazonia, Congo, Borneo e Indochina. La forma más fácil de obtener acceso a una selva tropical es controlar el estado asociado. Sin embargo, el acceso también se puede obtener pacíficamente a través de licencias botánicas." #NT!
 dubois.301.g: "A la Amazonia." #NT!
 dubois.301.h: "Al Congo." #NT!
 dubois.301.i: "A Borneo." #NT!
 dubois.301.j: "A Indochina." #NT!
  
 dubois.302.t: "Victoria amazonica" #NT!
 dubois.302.d: "En su expedición botánica, el Prof. [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] encontró un lirio de agua grandioso que es insuperable." #NT!
 dubois.302.f: "Victoria amazonica, también conocida como Amazon Giant Water Lily, es una especie de planta del género de lirios de agua gigantes (Victoria) dentro de la familia de la familia de lirios de agua (Nymphaeaceae). Es nativo de las aguas poco profundas, como Oxbows y Bayous, de la cuenca del Amazonas. Lleva el nombre de la reina británica Victoria. El pecíolo sumergido tiene 7 a 8 metros de largo. Las hojas flotantes tienen un borde de aproximadamente 6 cm de altura, que tiene dos incisiones opuestas. Estas incisiones aseguran que el borde de la lámina no se rasgue durante el movimiento pesado y que el exceso de agua pueda drenarse fácilmente después de fuertes lluvias. En la naturaleza, cada hoja alcanza un diámetro de hasta 3 metros, mientras que las plantas mantenidas en jardines botánicos generalmente no exceden un diámetro de la hoja de 2 metros." #NT!
 dubois.302.g: "Este espécimen funcionará bien en nuestra exposición." #NT!
 dubois.302.h: "El espécimen debe ser catalogado y estudiado científicamente." #NT!
 dubois.303.t: "Atlas atlas" #NT!
 dubois.303.d: "Aunque en una expedición que solo se ha propuesto buscar plantas, el Prof. [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] no puede ocultar sus inclinaciones entomológicas cuando se encuentra con una colonia de espectaculares polillas de Atlas en la selva tropical." #NT!
 dubois.303.f: "La polilla Atlas (Attacus Atlas) es una mariposa (polilla) de la familia de polillas de pavo real (Saturniidae). Es una de las mariposas más grandes del mundo y lleva el nombre del Titan Atlas de la mitología griega. Las hembras crecen más grandes que los machos. La seda Fagara está hecha de los capullos de la polilla del Atlas. Es de color marrón claro y mucho más robusto que la seda ordinaria." #NT!
 dubois.304.t: "Amorphophallus titanum" #NT!
 dubois.304.d: "En Indonesia, el Prof. [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] descubrió un gigantesco titán Arum, probablemente la flor más grande del mundo. El naturalista está encantado, el resto de la expedición se queja del terrible olor." #NT!
 dubois.304.f: "El género Amorphophallus se distribuye con alrededor de 200 especies en las selvas tropicales del Viejo Mundo desde Nueva Guinea hasta África occidental. A. Titanum produce la mayor inflorescencia no ramificada en el reino vegetal. La flor, que tiene más de tres metros de altura, huele a carroña, produce calor (hasta 37 ° C) y, por lo tanto, atrae escarabajos, que se encargan de la polinización. Los espectaculares eventos de floración de Titan Arum son una gran atracción en los jardines botánicos en todo el mundo." #NT!
 dubois.305.t: "Goliat" #NT!
 dubois.305.d: "El descubrimiento de un escarabajo de Goliat saca brevemente el Prof. [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] de su investigación botánica." #NT!
 dubois.305.f: "Los escarabajos de Goliat (Goliathus) representan un género de escarabajos de la subfamilia de las rosas (Cetoniinae). Los escarabajos de Goliat se encuentran entre los insectos más grandes de la Tierra, si se miden en términos de tamaño, volumen y peso. Con un peso larvario de hasta 110 gramos, el escarabajo Goliat es el insecto más pesado de todos. Los errores muertos son muy populares entre los coleccionistas y obtienen altos precios en el mercado." #NT!
 dubois.306.t: "Nuevas especies de orquídeas" #NT!
 dubois.306.d: "La expedición botánica ha descubierto y catalogado varias especies de orquídeas nuevas en la selva tropical." #NT!
 dubois.306.f: "Ninguna otra familia de plantas tiene un espectro de formas y colores de flores como la familia de orquídeas. El tamaño de las flores varía de unos pocos milímetros a 20 centímetros y más por flor. El espectro de color varía de tonos blancos y blancos suaves a verdes y azules hasta tonos rojos y amarillos fuertes. Muchas de las flores de orquídeas son multicolores. Después de la familia Daisy, las orquídeas son la segunda familia más grande de plantas con flores. Alrededor de 1000 géneros con 15,000 a 30,000 especies son reconocidos por botánicos." #NT!
 dubois.306.g: "Más especímenes nunca duelen." #NT!
 dubois.307.t: "Plantas medicinales" #NT!
 dubois.307.d: "La expedición de investigación en la selva tropical ha encontrado algunas hierbas increíbles que pueden tener usos medicinales." #NT!
 dubois.307.f: "Numerosas sustancias medicinales tienen antecedentes herbales, más de la mitad para ser precisos. El ejemplo más conocido es la aspirina y su ingrediente activo de ácido acetilsalicílico, que se ha extraído de la corteza de los sauces durante siglos. Esto contiene el ingrediente activo de salicina, que se convierte en ácido salicílico en el cuerpo y desarrolla su efecto de alivio y reducción de fiebre allí. En el siglo XIX, la aspirina de hoy se desarrolló con éxito a partir de ácido salicílico." #NT!
 dubois.307.g: "Estudie las plantas." #NT!
 dubois.307.h: "Recoge las plantas." #NT!
 dubois.308.t: "Hermosas flores desconocidas" #NT!
 dubois.308.d: "Mientras exploraba una parte desconocida de la selva tropical, la expedición botánica se encontró con numerosas flores desconocidas." #NT!
 dubois.308.f: "A pesar de su belleza, sin embargo, el líder de la expedición [SCOPE.sCharacter('dubois_naturalist_scope').GetFullName] duda antes de elegirlos. Los lugareños consideran las plantas malditas; Una indicación de que pueden ser venenosas. La idea es que los ayudantes deben elegir las plantas en masa, sin considerar las consecuencias futuras para su salud. Ciertamente, también sería posible que el Prof. [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] investigue y recolecte las plantas primero, pero esto también podría tener consecuencias desconocidas." #NT!
 dubois.308.g: "El equipo de expedición debe recolectar estas flores." #NT!
 dubois.308.h: "El líder de la expedición debe recolectar estas flores." #NT!
 dubois.308.i: "No toques estas flores." #NT!
 dubois.309.t: "Preguntas de oposición Expedición botánica" #NT!
 dubois.309.d: "[SCOPE.sCharacter('dubois_sceptical_leader').GetLastName] considera que la expedición botánica es un desperdicio inútil de dinero de impuestos que estaría mejor en otro lugar. También grita a una nube." #NT!
 dubois.309.f: "'Una expedición aquí, una expedición allí. Expediciones de Zeppelin, expediciones del Pacífico, expediciones arqueológicas, expediciones paleontológicas, expediciones zoológicas. ¡Nada más que hinchazón inútil!" #NT!
 dubois.309.g: "El Prof. [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] está programado para devolver de inmediato." #NT!
 dubois.309.h: "No haremos de la ciencia un problema político." #NT!
 dubois.310.t: "[SCOPE.sCharacter('dubois_naturalist_scope').GetFullName] cae enfermo!" #NT!
 dubois.310.d: "El Prof. [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] se envenenó mientras hacía su trabajo botánico en la selva tropical. La enfermedad grave lo obliga a interrumpir su trabajo." #NT!
 dubois.310.f: "Mientras nuestro naturalista esté enfermo, está atrapado en la expedición botánica y no puede ser recordado. No enviará ningún especímenes nuevos mientras esté enfermo." #NT!
 dubois.310.g: "Preocupante." #NT!
 dubois.311.t: "Semillas exóticas" #NT!
 dubois.311.d: "Durante la expedición botánica, el Prof. [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] encontró algunas semillas especiales que son de gran interés científico y agrícola." #NT!
 dubois.311.f: "El intercambio de cultivos entre diferentes partes del mundo ya era normal en el período moderno temprano. Por ejemplo, el bastón de azúcar de la región mediterránea se cultivó ampliamente en América del Sur. Por el contrario, el británico Henry Wickham contrabandeó semillas de caucho desde Brasil a Asia en 1876." #NT!
 dubois.311.g: "Las semillas funcionarán bien en la colección científica." #NT!
 dubois.311.h: "Las nuevas semillas deben usarse en la agricultura." #NT!
  
 dubois.411.t: "Los escaladores buscan" #NT!
 dubois.411.d: "Algunos escaladores experimentados y hombres valientes ya han sido reclutados para participar en el atrevido intento de la cumbre. La pregunta sigue siendo a qué líder confiamos a esta empresa." #NT!
 dubois.411.f: "La selección del líder de la expedición es de importancia crucial para la milla y el dolor del viaje de montaña. En las montañas bajas, sus habilidades no tienen una demanda particularmente, sino de una altitud de 3.000 metros a más tardar, muchos dependen de las habilidades y características del líder. Los escaladores, exploradores y comandantes con experiencia en montaña son tan útiles como el coraje, la persistencia y la meticulidad. La mala salud y la vejez, a su vez, tienen el efecto contrario." #NT!
 dubois.411.g: "[SCOPE.sCharacter('dubois_mountain_expedition_leader_1').GetFullName]." #NT!
 dubois.411.h: "[SCOPE.sCharacter('dubois_mountain_expedition_leader_2').GetFullName]." #NT!
 dubois.411.i: "[SCOPE.sCharacter('dubois_mountain_expedition_leader_3').GetFullName]." #NT!
 dubois.412.t: "La cumbre como objetivo" #NT!
 dubois.412.d: "El equipo de la ascenso a la cumbre se ha reunido. Pero ahora surge la pregunta: ¿Qué montaña debe subir la compañía bajo [SCOPE.sCharacter('dubois_mountain_expedition_leader').GetFullName]? Hay varios estados entre los que podemos elegir." #NT!
 dubois.412.f: "Hay hasta tres posibles cadenas montañosas para elegir. Sus alturas y dificultades difieren. Las montañas de menos de 3.000 metros, como las tierras altas escocesas y las montañas de los Apalaches, se consideran montañas fáciles que se pueden conquistar en unos pocos pasos y sin peligros importantes. Los Alpes, los Pirineos y las Montañas Rocosas, por otro lado, son más difíciles de dominar y tomar más tiempo. Las montañas de más de 5,000 metros se consideran desafíos, y el Himalaya normalmente no será manejable en esta edad." #NT!
 dubois.412.g: "[SCOPE.sState('dubois_summit_1').GetName]." #NT!
 dubois.412.h: "[SCOPE.sState('dubois_summit_2').GetName]." #NT!
 dubois.412.i: "[SCOPE.sState('dubois_summit_3').GetName]." #NT!
 dubois.413.t: "Compañero científico" #NT!
 dubois.413.d: "Escalar un pico previamente desconocido también tiene su atractivo para la ciencia. Los geólogos, los naturalistas y los paleontólogos son compañeros científicos potenciales." #NT!
 dubois.413.f: "Los geólogos en particular pueden reunir numerosos hallazgos nuevos para la ciencia en las expediciones de montaña. Los naturalistas estudian flora y fauna y recolectan especímenes; Los paleontólogos pueden recolectar fósiles, pero el rendimiento sigue siendo bastante pequeño." #NT!
 dubois.413.g: "No se requiere un científico." #NT!
 dubois.413.h: "Un geólogo como [SCOPE.sCharacter('dubois_geologist_scope').GetFullName] sería la mejor opción." #NT!
 dubois.413.i: "Nuestro naturalista [SCOPE.sCharacter('dubois_naturalist_scope').GetFullName] será útil." #NT!
 dubois.413.j: "Llame a nuestro paleontólogo, [SCOPE.sCharacter('dubois_paleontologist_scope').GetFullName]." #NT!
 dubois.414.t: "¡En la montaña!" #NT!
 dubois.414.d: "Los escaladores, dirigidos por [SCOPE.sCharacter('dubois_mountain_expedition_leader').GetFullName], han llegado a la cordillera en [SCOPE.sState('dubois_summit_location').GetName] y están comenzando a prepararse para el ascenso." #NT!
 dubois.414.f: "'¿Por qué querías escalar el Monte Everest?' Se hizo esta pregunta a George Leigh Mallory, quien estaba con ambas expediciones hacia la cumbre de la montaña más alta del mundo, en 1921 y 1922, y que ahora está en Nueva York. Planea volver a 1924, y dio como la razón para persistir en estos repetidos intentos de llegar a la cima: "Porque está allí"." #NT!
 dubois.414.g: "Las montañas están llamando y debo ir." #NT!
  
 dubois.420.t: "La cumbre" #NT!
 dubois.420.d: "Después de un arduo ascenso, el grupo de montañeros finalmente llega a la cumbre. [SCOPE.sCharacter('dubois_mountain_expedition_leader').GetFullName] es el primer hombre en asaltar este lugar en la Tierra para [ROOT.GetCountry.GetNameNoFormatting]. Ahora no queda nada más que saborear este momento de triunfo." #NT!
 dubois.420.f: "La primera pregunta que hará y que debo intentar responder es esta, "¿De qué sirve el uso de la escalada?" Y mi respuesta debe ser de inmediato: 'No sirve de nada'. No existe la más mínima perspectiva de ninguna ganancia. Pero de lo contrario, no saldrá nada de eso. No traeremos un solo poco de oro o plata, no una joya, ni ningún carbón o hierro. No encontraremos un solo pie de tierra que se pueda plantar con cultivos para criar alimentos. It's no use.\n\nSo, if you cannot understand that there is something in man which responds to the challenge of this mountain and goes out to meet it, that the struggle is the struggle of life itself upward and forever upward, then you won't see why we go. Lo que obtenemos de esta aventura es solo pura alegría. La alegría es, después de todo, el fin de la vida. No vivimos para comer y ganar dinero. Comemos y ganamos dinero para poder disfrutar de la vida. Para eso significa la vida y para lo que es la vida.'- George Leigh Mallory" #NT!
 dubois.420.g: "¡Disfrutemos del amanecer!" #NT!
 dubois.421.t: "¡Desastre de montañismo!" #NT!
 dubois.421.d: "Mientras subía las montañas en [SCOPE.sState('dubois_summit_location').GetName], [SCOPE.sCharacter('dubois_mountain_expedition_leader').GetFullName] cometió un terrible error, que terminó la expedición en una catástrofe: varias personas murieron, las provisiones y el equipo se cayeron con ellos. ¡Toda la nación está en estado de shock!" #NT!
 dubois.421.f: "'Todas las noches, entiendes, veo a mis camaradas de Matterhorn deslizándose sobre sus espaldas, sus brazos extendidos, uno tras otro, en perfecto estado a igual distancias: la guía, primero, luego Hadow, luego Hudson y, por último, Douglas. Sí, siempre los veré ...'- Edward Whymper" #NT!
 dubois.421.g: "¡Una tragedia!" #NT!
 dubois.422.t: "Subida abortada" #NT!
 dubois.422.d: "El intento de alcanzar el pico más alto en [SCOPE.sState('dubois_summit_location').GetName] ha fallado por el momento. [SCOPE.sCharacter('dubois_mountain_expedition_leader').GetFullName] se ve obligado a abandonar la empresa y regresar." #NT!
 dubois.422.f: "Puede haber múltiples razones por las cuales un escalador abandona el ascenso. A veces, un cambio en el clima es suficiente; A veces, un supuesto acceso a la cumbre resulta ser demasiado traicionero. Un ascenso a menudo tarda demasiado y supera una ventana de tiempo porque ciertos momentos del día y cambios hacen que el ascenso sea difícil o imposible. Y a veces simplemente eliges el camino equivocado." #NT!
 dubois.422.g: "Decepcionante." #NT!
 dubois.423.t: "Tropas de montaña" #NT!
 dubois.423.d: "Debido a su impresionante experiencia en la conquista de montaña y la defensa de la montaña, [SCOPE.sCharacter('dubois_mountain_veteran').GetFullName] decidió usar sus habilidades superiores para crear una unidad de élite de tropas de montaña." #NT!
 dubois.423.f: "El Gebirgsjäger, los Alpini o los Chasseurs Alpins son solo algunos ejemplos de tropas de élite de algunos países que se han especializado en la guerra en las alturas. Establecido en 1872, los Alpini son la infantería de montaña activa más antigua del mundo. Su misión original era proteger la frontera de Italia con Francia y Austria-Hungría." #NT!
 dubois.423.g: "Llevarán su legado al futuro." #NT!
 dubois.424.t: "Una sinfonía de montaña" #NT!
 dubois.424.d: "Inspirado por el reciente éxito de nuestra compañía de montañismo, nuestro compositor ha anunciado que quiere escribir un gran trabajo musical sobre las montañas y la lucha del hombre contra la naturaleza. El mundo de la música ya está de acuerdo en que este será un trabajo importante." #NT!
 dubois.424.f: "Una sinfonía alpina op. 64 es un poema sinfónico del compositor Richard Strauss, que se realizó por primera vez en 1915. El trabajo se basa en el concepto del compositor de usar medios musicales para representar el ascenso de un pico alpino y el regreso al valle en un día. La idea del programa se remonta a una experiencia desde la infancia de Strauss. En el verano de 1879 perdió el equilibrio en el Heimgarten en los Alpes bávaros y fue atrapado en una tormenta eléctrica. Al día siguiente presentó este evento en el piano. De este recuerdo desarrolló el concepto. Era la intención del compositor declarada permitir al oyente experimentar las etapas de una caminata de montaña como una pintura de sonido de una manera inmediatamente sensual. Según muchos críticos de música, el trabajo logra este objetivo de una manera impresionante." #NT!
 dubois.424.g: "Esperemos que no haya ningún Alpenhorns en él." #NT!
  
 dubois.430.t: "Una subida fácil" #NT!
 dubois.430.d: "El equipo de montañismo está avanzando fácilmente en el nivel inferior de la cordillera en [SCOPE.sState('dubois_summit_location').GetName]. No hay ocurrencias notables." #NT!
 dubois.430.f: "'Tiene suerte de quién, en la marea completa de la vida, ha experimentado una medida del entorno activo que más desea. En estos días de agitación y cambio violento, cuando los valores básicos de hoy son los vanos y destrozados sueños de mañana, hay mucho que decir sobre una filosofía que tiene como objetivo vivir una vida plena mientras la oportunidad ofrece. Hay pocos tesoros de un valor más duradero que la experiencia de una forma de vida que en sí misma es totalmente satisfactoria. Tales, después de todo, son las únicas posesiones de las cuales ningún destino, ninguna catástrofe cósmica puede privarnos; Nada puede alterar el hecho de que por un momento en la eternidad realmente hemos vivido '. -RACTON" #NT!
 dubois.430.g: "¡Adelante!" #NT!
 dubois.431.t: "Una pendiente" #NT!
 dubois.431.d: "[SCOPE.sCharacter('dubois_mountain_expedition_leader').GetFullName] ha visto una pequeña pendiente en las montañas, pero esto no debería plantear un problema importante para los escaladores." #NT!
 dubois.431.f: "Cuanto más alto suba un equipo de montañismo, mayores serán los desafíos. Una pendiente puede ser un obstáculo inicial, pero no debe ser un problema para una expedición moderadamente bien equipada." #NT!
 dubois.431.g: "El equipo dominará esto." #NT!
 dubois.431.h: "Esto es demasiado arriesgado." #NT!
 dubois.432.t: "Pared empinada" #NT!
 dubois.432.d: "Un acantilado presenta un gran obstáculo para los escaladores en su caminata a la cumbre, pero [SCOPE.sCharacter('dubois_mountain_expedition_leader').GetFullName] confía en que dominará esta tarea." #NT!
 dubois.432.f: "Desde montañas con una altitud de 2,000 metros, el grupo de montañismo puede encontrar acantilados. Para las montañas bajas son el último obstáculo antes de la cumbre, pero en muchos casos es más un programa de calentamiento. A partir de aquí, una caminata de montaña normal difiere de una verdadera subida de montaña." #NT!
 dubois.433.t: "¡Avalancha!" #NT!
 dubois.433.d: "Una avalancha peligrosa se ha soltado en las alturas de [SCOPE.sState('dubois_summit_location').GetName], amenazando el esfuerzo de montañismo. Con los escombros que ahora amenazan la ruta directa, encontrar una ruta alternativa podría ser más segura, pero costará un tiempo valioso. Algunos escaladores sugieren esperar, lo que incluye la posibilidad de que el sendero pueda ser más bloqueado." #NT!
 dubois.433.f: "Las avalanchas ocurren desde alturas cubiertas de nieve y han sido un peligro para todos los que vivieron en las montañas desde tiempos inmemoriales, no solo los sumadores. Su naturaleza traicionera ya ha llevado a muchos a sus muertes. A partir de ahora, el trigo se separa de la paja." #NT!
 dubois.433.g: "Eso no puede sacudir a un escalador." #NT!
 dubois.433.h: "Busque una ruta alternativa." #NT!
 dubois.434.t: "Abismo" #NT!
 dubois.434.d: "Una garganta peligrosa se abre frente a [SCOPE.sCharacter('dubois_mountain_expedition_leader').GetFullName] cuando ha llegado a la última formación rocosa. El obstáculo aparentemente insuperable plantea un desafío para los alpinistas." #NT!
 dubois.434.f: "'El alpinismo es el arte de escalar montañas confrontar los mayores peligros con la mayor prudencia. El arte se usa aquí para significar el logro del conocimiento en acción. No siempre puedes quedarte en las cumbres. Tienes que volver a bajar. Entonces, ¿cuál es el punto? Solo esto: lo que está arriba sabe lo que está a continuación, lo que está a continuación no sabe lo que está arriba. Uno sube, uno ve. Uno desciende, ya no ve, pero uno ha visto. Mientras sube, tome nota de todas las dificultades a lo largo de su camino. Durante el descenso, ya no los verá, pero sabrá que están allí si ha observado con cuidado. -René daumal" #NT!
 dubois.435.t: "Cambio meteorológico" #NT!
 dubois.435.d: "Un cambio en el clima en las montañas de [SCOPE.sState('dubois_summit_location').GetName] presenta a los montañeros un problema potencialmente mortal. Todavía hay una ventana de oportunidad para alcanzar una ubicación más protegida a altitudes más altas, pero es una empresa peligrosa. Los montañeros encontrarían un refugio seguro en el campamento base, pero eso arruinaría el progreso de los últimos días, si no semanas." #NT!
 dubois.435.f: "Los cambios climáticos en las montañas pueden ser uno de los eventos más amenazantes que pueden ocurrir en un recorrido de montaña. Esto se aplica a la lluvia, las tormentas y la nieve. Particularmente en las altitudes más altas, una nevada repentina puede significar que un intento de cumbre debe ser abortado porque los elementos impredecibles pueden terminar en una tragedia." #NT!
 dubois.435.h: "¡De vuelta al último campamento!" #NT!
 dubois.436.t: "Paso de muerte" #NT!
 dubois.436.d: "Poco antes de la cumbre, [SCOPE.sCharacter('dubois_mountain_expedition_leader').GetFullName] se enfrenta a un último desafío final: un acantilado que se eleva casi verticalmente frente a él decide la victoria o la derrota. Los escaladores ya rumoran que esta es una trampa de muerte; o un paso de muerte." #NT!
 dubois.436.f: "'Después de una hora constante, llegamos al pie del problema de aspecto más formidable en la cresta, un paso de roca de unos cuarenta pies de altura. Nos dimos cuenta de que a esta altitud podría deletrear la diferencia entre el éxito y el fracaso. La roca en sí, suave y casi sin retraso, podría haber sido un problema interesante del domingo por la tarde para un grupo de escaladores de rocas expertos en el Distrito de los Lagos, pero aquí fue una barrera más allá de nuestra débil fuerza para superar. No pude ver la forma de girarlo en el empinado Bluff de roca en el oeste, pero afortunadamente se quedó otra posibilidad de abordarlo. En su lado este había otra gran cornisa, y corriendo los cuarenta pies completos del escalón había una grieta estrecha entre la cornisa y la roca. Dejando a Tenzing para asegurarme lo mejor que pudo, me metí en esta grieta, luego pateando hacia atrás con mis crampones, hundí sus picos profundamente en la nieve congelada detrás de mí y me sacé del suelo. Aprovechando cada arenque de roca y toda la fuerza de rodilla, hombro y brazos que pude reunir, literalmente me arrastré hacia atrás hacia atrás, con una oración ferviente de que la cornisa permaneciera unida a la roca. -Edmund Hillary" #NT!
 dubois.437.t: "Falta de oxígeno" #NT!
 dubois.437.d: "[SCOPE.sState('dubois_summit_location').GetName] Las alturas inusuales empujan a los montañeros a sus límites. La falta de oxígeno amenaza el ascenso a la cumbre." #NT!
 dubois.437.f: "En las altas montañas, la presión atmosférica es menor y esto significa que hay menos oxígeno disponible para respirar. Esta es la causa subyacente de la enfermedad de la altitud. Todos necesitan aclimatarse, incluso a montañistas excepcionales que han sido a gran altitud antes. En términos generales, los alpinistas comienzan a usar oxígeno embotellado cuando suben por encima de 7,000 m. Los montañeros excepcionales han subido picos de 8000 metros (incluido el Everest) sin oxígeno, casi siempre con un programa de aclimatación cuidadosamente planificado." #NT!
 dubois.437.g: "Bien que tengamos nuestras botellas de oxígeno con nosotros." #NT!
 dubois.437.h: "Cancele la expedición antes de que suceda peor." #NT!
 dubois.438.t: "Lesiones graves" #NT!
 dubois.438.d: "Un grupo de rezagados cayó mientras subía la última cara de roca y sufrió heridas graves. [SCOPE.sCharacter('dubois_mountain_expedition_leader').GetFullName] debe decidir cómo proceder." #NT!
 dubois.438.f: "Los montañeros enfrentan una variedad de peligros. When climbing mountains, there are two types of hazards, objective (mountain-based) and subjective (human-based). Subjective hazards relate to a climber's poor judgement, poor planning, lack of skills, faulty analysis and conclusions, or inadequate conditioning. From 1947 to 2018 in the United States 2,799 people were reported to be involved in mountaineering accidents and 43% of these accidents resulted in death." #NT!
 dubois.438.g: "Bien que tengamos equipos médicos modernos." #NT!
 dubois.438.h: "Esperamos hasta que se recuperen." #NT!
 dubois.439.t: "Equipo de cuerda" #NT!
 dubois.439.d: "Para asegurar un ascenso, los escaladores deben formar un grupo de cuerda. La pendiente parece todo menos segura. El esfuerzo requiere una planificación cuidadosa." #NT!
 dubois.439.f: "El término equipo de cuerda originalmente proviene de los deportes de montaña, especialmente la escalada, y se refiere a un grupo de personas conectadas por una montaña o una cuerda de escalada y, por lo tanto, asegura contra la caída. Al usar una cuerda de seguridad compartida, un equipo de cuerda ofrece a sus miembros protección mutua contra caídas. Al mismo tiempo, un equipo de cuerda también forma una comunidad de peligro, porque en condiciones desfavorables, una caída de un solo miembro puede llevar a que todo el equipo de cuerda caiga." #NT!
 dubois.439.g: "Bien que tengamos una organización moderna." #NT!
 dubois.440.t: "Ciencia de la montaña" #NT!
 dubois.440.d: "Las alturas desconocidas de [SCOPE.sState('dubois_summit_location').GetName] ofrecen [SCOPE.sCharacter('dubois_mountain_scientist').GetFullName] una amplia gama de nuevas ideas, que recolecta y escribe durante la gira de montaña." #NT!
 dubois.440.f: "Los científicos a menudo habían estudiado la flora y la fauna inusuales del área en las primeras etapas de las expediciones de montaña. Las investigaciones geológicas fueron de particular interés, no solo por razones científicas generales, sino también a menudo para simplificar futuras subidas." #NT!
 dubois.440.g: "¡Para la ciencia!" #NT!
 dubois.441.t: "Un animal perdido" #NT!
 dubois.441.d: "En el nivel inferior del Himalaya, nuestro naturalista [SCOPE.sCharacter('dubois_mountain_scientist').GetFullName] ha hecho un descubrimiento extraño: un solo animal abandonado deambula allí, afectado por el hambre y el frío." #NT!
 dubois.441.f: "Era una vista extraña para el profesor [SCOPE.sCharacter('dubois_mountain_scientist').GetLastName] encontrar una criatura tan pequeña y tierna, que de otro modo se dijo que vivía en los bosques de bambú de Nepal, en este desierto. Conocía ilustraciones de libros y sabía que los lugareños vivían en los bosques más cercanos; Pero, ¿cómo podría llegar un solo animal aquí? Sobre esta distancia? Sin comida? Siguió siendo un misterio. ¿El pequeño panda rojo también había atrapado el insecto de montañismo? ¿O había huido de los depredadores? Sea lo que sea, el naturalista se encarga de los animales agotados y los refuerza a la salud. Una vista que al [SCOPE.sCharacter('dubois_mountain_expedition_leader').GetFullName] no le gusta: ve la subida de montaña amenazada por tal sentimentalismo zoológico. Se acuerda que el asistente de investigación traerá el panda rojo al campamento base, y a partir de ahí prepararlo para su viaje al zoológico local." #NT!
 dubois.441.g: "¿Es este el legendario animal 43?" #NT!
  
