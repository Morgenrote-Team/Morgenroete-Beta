 dubois.1032.t: "Recinto de tortuga marina" #NT!
 dubois.1032.d: "El recinto #o marino#! consiste principalmente en el agua, encarcelado por algunas pequeñas playas de arena. La mayoría de las personas se reunieron alrededor de un pequeño agujero, que permitió mirar las tortugas en el agua." #NT!
 dubois.1032.f1: "En el vibrante mundo submarino del recinto marino oceánico, una magnífica tortuga marina se desliza con gracia a través de las aguas cerúleas, su elegante caparazón brillando a la luz del sol. Intrigado por su presencia serena, te acercas a un biólogo marino bien informado, ansioso por aprender más sobre este fascinante reptiles marinos. \ "Se encuentran en aguas tropicales y subtropicales a través del Océano Pacífico. Su caparazón de color oliva, o concha superior, y sus poderosas aletas les permiten navegar por las corrientes y emprender migraciones largas, regresando a playas específicas para poner sus huevos. \"" #NT!
 dubois.1032.f2: "En el bullicioso arrecife de coral del recinto de paisajes marinos oceánicos, una tortuga marina madre se desliza con gracia a través del vibrante ecosistema marino, acompañado de un rastro de crías. Intrigado por su viaje, buscas un conocedor de zoológico, con la esperanza de descubrir más sobre el notable ciclo de vida de la tortuga marina oceánica. \ "Después de aparearse en el océano, las hembras se aventuran a tierra para colocar sus huevos en playas arenosas. Cava un nido en la arena y deposita cuidadosamente sus huevos antes de cubrirlos con arena." #NT!
 dubois.1032.f3: "En el expansivo santuario marino del recinto de los mares oceánicos, una suave tortuga marina disfruta de un vibrante arrecife de coral, su naturaleza paciente cautivando a los espectadores. Intrigado por su papel en el ecosistema, se acerca a un biólogo marino bien informado, con la esperanza de obtener información sobre la importancia de la tortuga marina oceánica. \ "Como herbívoros, pasan de hierba marina y algas, ayudando a mantener estos hábitats en equilibrio. Además, contribuyen al ciclo de nutrientes al consumir presas como la medusa, mantener la estabilidad ecológica. Su presencia es crucial para la salud general y la biodiversidad del entorno oceánico." #NT!
