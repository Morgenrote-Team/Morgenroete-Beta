  ### 2.1.3 ### 
  
 dubois.3000.t: "¿Está perdiendo el Dr. [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] la mente [SCOPE.sCharacter('dubois_naturalist_scope').GetHerHis]?" #NT!
 dubois.3000.d: "Su [concept_dubois_naturalist], [SCOPE.sCharacter('dubois_naturalist_scope').GetFullName], parece olvidar más y más cosas. ¿Quizás es hora de que [SCOPE.sCharacter('dubois_naturalist_scope').GetHerHim] renuncie como naturalista?" #NT!
 dubois.3000.f: "Espera un segundo ... ¿Dónde puse mi té? Oh, ¿está aquí? ¿O fue esa la planta posionosa? ¿Y por qué hay una gran araña sentada en la esquina de la habitación?" #NT!
 dubois.3000.g: "No creo que [SCOPE.sCharacter('dubois_naturalist_scope').GetSheHe] debería seguir trabajando." #NT!
 dubois.3000.h: "¡Pff, eso es totalmente normal!" #NT!
  
 dubois.3010.t: "Muestras perdidas" #NT!
 dubois.3010.d: "El Dr. [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] de repente no puede encontrar algunas muestras en la colección [SCOPE.sCharacter('dubois_naturalist_scope').GetHerHis]. [SCOPE.sCharacter('dubois_naturalist_scope').GetSheHe] dijo que simplemente ... desaparecieron." #NT!
 dubois.3010.f: "Estoy absolutamente seguro de que los pongo aquí en esos alfileres. Pero ahora se han ido. ¡Esos fueron insectos magníficos! ¿Quizás los pongo en otro lugar?" #NT!
 dubois.3010.g: "¿Cómo desaparecieron? Pensé que estaban muertos ..." #NT!
  
 dubois.3011.t: "Naturalist vende partes de la colección" #NT!
 dubois.3011.d: "Aparentemente, el profesor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] había acumulado enormes deudas. Parece que la única solución [SCOPE.sCharacter('dubois_naturalist_scope').GetSheHe] vio fue vender partes de nuestra colección." #NT!
 dubois.3011.f: "\ "¡No, por favor no le hagas nada a mi pequeña esperanza. ¡No hizo nada malo! ¡Haré todo para obtener el dinero! ¡Por favor, simplemente no la lastimes. ¡Es solo una pequeña araña inocente! \"" #NT!
 dubois.3011.g: "[SCOPE.sCharacter('dubois_naturalist_scope').GetSheHe|U] hizo qué?" #NT!
  
 dubois_botanist: "Botánico" #NT!
 dubois_botanist_desc: "Desde las selvas hasta los desiertos, desde el árbol hasta el musgo, este personaje dedicó su tiempo a investigar plantas en todo el mundo." #NT!
 dubois_entomologist: "Entomólogo" #NT!
 dubois_entomologist_desc: "¿Por qué alguien querría investigar errores? Bueno, este personaje se ha convertido en un especialista." #NT!
 dubois_marine_biologist: "Biólogo marino" #NT!
 dubois_marine_biologist_desc: "¡Ah, el mar! ¿No sería genial pasar una vez la vida allí? Quizás no como marinero. Este personaje puede pasar su vida investigando todas las formas de vida en el mar. ¡Qué vida tan maravillosa!" #NT!
 dubois_zoologist: "Zoólogo" #NT!
 dubois_zoologist_desc: "¡Los animales son emocionantes! ¡Son fascinantes! ¡Y este personaje quiere conocerlos a todos!" #NT!
  
