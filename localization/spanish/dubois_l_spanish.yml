 dubois.52.t: "Forestación de alta calidad"
 dubois.52.d: "Dr. [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] has achieved [SCOPE.sCharacter('dubois_naturalist_scope').GetHerHis] goal. Through careful selection of particularly resistant seedlings, measures for natural pest control and the study of several animals and plants in symbiosis, [SCOPE.sCharacter('dubois_naturalist_scope').GetSheHe] has sustainably strengthened our country's forestry industry.\n\nTotal improved buildings: [GetPlayer.MakeScope.Var('mr_num_improved_forestry_buildings_var').GetValue|V0]\n$concept_dubois_specimens$ from Project: [GetPlayer.MakeScope.ScriptValue('ito_specimens_from_forestry_project_for_event_value')|+0] @dubois_specimen!"
 dubois.52.f: "Lo siento, ¿qué? ¿Quieres cortar los árboles? Fui a todos los problemas para criarlos, nutrirlos y cuidarlos, y ahora estos monstruos capitalistas quieren matar a mis queridos. ¡Dios mío, qué he hecho!"
 dubois.52.g: "¡Más madera para todos!"
 dubois.53.t: "Árboles de caucho de alta calidad"
 dubois.53.d: "Dr. [ROOT.Var('dubois_naturalist_var').GetCharacter.GetLastName] has achieved [ROOT.Var('dubois_naturalist_var').GetCharacter.GetHerHis] goal. Through careful selection of particularly resistant seedlings, measures for natural pest control and the study of several animals and plants in symbiosis, [ROOT.Var('dubois_naturalist_var').GetCharacter.GetSheHe] has sustainably strengthened our country's rubber industry.\n\nTotal improved buildings: [GetPlayer.MakeScope.Var('mr_num_improved_runner_buildings_var').GetValue|V0]"
 dubois.53.f: "'¿Por qué todos están interesados ​​en el caucho completamente inútil? Solo hice eso porque estoy interesado en el mosquito del pantano neohesperialista. Este animal pequeño y fácil de fatal solo se reproduce en este clima."
 dubois.53.g: "¡Más goma para todos!"
 dubois.22.t: "Prof. [ROOT.Var('dubois_naturalist_var').GetCharacter.GetLastName] documentos [SCOPE.GetRootScope.GetCountry.GetCustom('dubois_animal_documentation_name')]"
 dubois.22.d: "Después de meses de observar al animal en su hábitat nativo, [ROOT.Var('dubois_naturalist_var').GetCharacter.GetFullName] ha completado sus observaciones. Su tratado, #YELLOW '[SCOPE.GetRootScope.GetCountry.GetCustom('dubois_animal_documentation_title')]'#!, ya está disponible. [SCOPE.GetRootScope.GetCountry.GetCustom('dubois_animal_documentation_topic')]"
 dubois.22.g: "Reserve una copia para la Biblioteca Nacional."
