 dubois_invented_evolution_theory_loc: "\ Ninguno de [GetPlayer.MakeScope.Var('dubois_naturalist_var').GetCharacter.GetHerHis] Los mayores logros fueron el libro "#o sobre el origen de las especies#!", que describió la teoría de la evolución por primera vez." #NT!
 dubois_attended_hippocampus_congress_loc: "\ ndr. [GetPlayer.MakeScope.Var('dubois_naturalist_var').GetCharacter.GetLastNameNoFormatting] participó en el debate que determinaba si el humano era único o simplemente un animal como todos los demás." #NT!
 dubois_naturalist_showed_evolution_in_peppered_moths_loc: "\ nProfesor [GetPlayer.MakeScope.Var('dubois_naturalist_var').GetCharacter.GetLastNameNoFormatting] mostró que la polilla pimienta #o evoluciona#! para adaptarse a su entorno cambiante. Una prueba de la teoría de la evolución." #NT!
 dubois_naturalist_finished_pacific_expedition_loc: "\ non an #o expedición al océano Pacífico#!, Dr. [GetPlayer.MakeScope.Var('dubois_naturalist_var').GetCharacter.GetLastNameNoFormatting] exploró ampliamente la flora y la fauna de este país de las maravillas. [GetPlayer.MakeScope.Var('dubois_naturalist_var').GetCharacter.GetSheHe] descubrió muchas especies nuevas." #NT!
 dubois_wallace_line_discovered_loc: "\ n While Viajando en el Pacífico [GetPlayer.MakeScope.Var('dubois_naturalist_var').GetCharacter.GetLastName] notó una separación clara #o entre la flora y fauna de asiática y australiana. Este hallazgo respalda la teoría de la evolución y sugiere una separación masiva de las islas en el pasado." #NT!
 dubois_naturalist_inaugurated_zoo_loc: "\ n[GetPlayer.MakeScope.Var('dubois_naturalist_var').GetCharacter.GetLastNameNoFormatting] fue instrumental en la apertura #o del zoo#!. un lugar donde los animales de lugares lejanos se pueden ver de cerca." #NT!
 dubois_naturalist_total_zoo_animals_loc: "\ nuduring [GetPlayer.MakeScope.Var('dubois_naturalist_var').GetCharacter.GetHerHis] tenencia Como naturalista, un total de [GetPlayer.MakeScope.Var('dubois_naturalist_var').GetVariable('dubois_naturalist_total_zoo_animals_var').GetValue|0+] [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] fueron capturados y llevados a [GetPlayer.MakeScope.GetCountry.GetName]." #NT!
 dubois_naturalist_found_victoria_amazonica_loc: "\ No una expedición botánica a la selva amazónica, el profesor [GetPlayer.MakeScope.Var('dubois_naturalist_var').GetCharacter.GetLastNameNoFormatting] encontró un #o gigante de Waterlily#!. una planta única que puede cultivar hojas con un diámetro de hasta 3 metros." #NT!
 dubois_naturalist_found_attacus_atlas_loc: "\ ndr. [GetPlayer.MakeScope.Var('dubois_naturalist_var').GetCharacter.GetLastNameNoFormatting] encontró una #o Titanic Moth#! durante una expedición botámica en Indochina. Es una de las mariposas más grandes del mundo y produce una seda muy robusta." #NT!
 dubois_naturalist_found_amorphophallus_titanum_loc: "\ n While explorando a Borneo durante una expedición botánica, el profesor [GetPlayer.MakeScope.Var('dubois_naturalist_var').GetCharacter.GetLastNameNoFormatting] encontró una flor enorme #o enorme#! que crece hasta 3 metros de altura. Un verdadero milagro botánico." #NT!
 dubois_naturalist_found_goliathus_loc: "\ nthe Congo Rainfrests alberga muchas maravillas. Uno de ellos fue descubierto por el Dr. [GetPlayer.MakeScope.Var('dubois_naturalist_var').GetCharacter.GetLastNameNoFormatting] en una expedición botánica. El #o Goliat Beetle#! es ​​uno de los insectos más grandes del mundo y aparentemente bastante raro." #NT!
  
 dubois_nature_reserve_survey_decision: "Encuesta de reserva natural" #NT!
 dubois_nature_reserve_survey_decision_desc: "Realice una encuesta para encontrar un lugar para una reserva natural. Dicha encuesta puede tomar #n Serveral meses#!." #NT!
  
 dubois.1210.t: "El hábitat en [ROOT.GetState.GetName] está en peligro de extinción" #NT!
 dubois.1210.d: "La comprensión cada vez mayor de la civilización choca con el [Concept('concept_dubois_habitat','$concept_dubois_animal_habitat$')] en [ROOT.GetState.GetName]. Si no protegemos nuestra vida silvestre local al construir un [concept_dubois_nature_reserve], los animales se extinguirán en aproximadamente 10 años." #NT!
 dubois.1210.f: "Máquinas voraces que comen en el suelo. ciudades extensas que devoran más y más tierras. Entrena líneas que cortan las extensiones florecientes. Todos los días los animales pierden más de su reino. Paso a paso, los humanos lo están invadiendo." #NT!
 dubois.1210.g: "¡Tenemos que proteger a esos animales!" #NT!
 dubois.1210.h: "¡Programas por encima de todo lo demás!" #NT!
 dubois_endangered_habitat_tt: "Cuando un [concept_dubois_habitat] se pone en peligro, se eliminará después de 10 años. Puede evitar esto construyendo un [concept_dubois_nature_reserve] en el estado. De esa manera, protegerá el [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] de la extinción." #NT!
 dubois_habitat_endangered_modifier: "Hábitat en peligro de extinción" #NT!
 dubois_habitat_endangered_timer_modifier: "Tiempo hasta que se pierda el hábitat" #NT!
 dubois_habitat_protection_path_modifier: "Voluntad de proteger el hábitat" #NT!
 dubois_habitat_destruction_path_modifier: "Progreso por encima de todo lo demás" #NT!
  
 dubois.1211.t: "El hábitat en [ROOT.GetState.GetName] se destruye" #NT!
 dubois.1211.d: "Como no pudimos proteger el [Concept('concept_dubois_habitat','$concept_dubois_animal_habitat$')] en [ROOT.GetState.GetName] estableciendo un [concept_dubois_nature_reserve], el hábitat ha sido destruido." #NT!
 dubois.1211.f: "Desafortunadamente, el establecimiento de la compañía minera llegó al precio de destruir el hábitat de uno de los animales de nuestro país. ¿Pero a quién le importa eso? ¡Las ganancias nos están esperando!" #NT!
 dubois.1211.g: "Oh, no. De todos modos." #NT!
  
 dubois_breeding_animal_trigger_tt: "Puede reproducirse [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] si tiene un estado con un [concept_dubois_nature_reserve] que no tiene el animal específico de la misma región que th #Nature Reserve#! todavía y si tiene ese animal en su [concept_dubois_zoo]. \ N \ ni si tiene un #b Nature Reserve#! en un estado europeo por ejemplo y quiere criar el #b alpino IBex#! en él, solo puede hacerlo, si el estado no tiene un estado, y desea criar el #b alpino IBex#! en él, usted solo puede hacer que el estado no tenga un estado §999. Si tiene #b alpino ibexes#! en su #b zoo#!." #NT!
  
