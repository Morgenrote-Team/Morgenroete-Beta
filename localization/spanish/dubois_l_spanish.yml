 dubois.1022.t: "Recinto de panda" #NT!
 dubois.1022.d: "El recinto #o panda#! es el hogar de los suaves osos. Una pagoda ofreció algo de sombra y algunos parches de bambú ofrecieron un parecido con el hogar de los pandas" #NT!
 dubois.1022.f1: "En el tranquilo recinto de panda del zoológico, una madre panda acuna a su pequeño cachorro, su vínculo evidente en cada interacción tierna. Su suave pelaje blanco y negro se suma a su encanto innegable. Intrigado por su comportamiento nutritivo, buscas un choque de zoológico conocedor, ansioso por aprender más sobre estas criaturas cautivadoras. "Las hembras son solo fértiles para una ventana corta cada año, lo que hace que la reproducción exitosa sea un desafío. Además, los cachorros de panda se encuentran entre los más pequeños y vulnerables al nacer, que pesa hasta 200 gramms. La madre brinda atención devota, asegurando la supervivencia del cachorro y la enseñanza de habilidades esenciales hasta que esté listo para explorar el mundo por sí solo. \"." #NT!
 dubois.1022.f2: "En medio de la exuberante vegetación del hábitat de panda en el zoológico, un par de pandas gigantes se involucran en lucha juguetona, rodando y caídas en su patio de juegos de bambú. Sus payasadas alegres evocan sonrisas de los espectadores. Ansioso por comprender su comportamiento, te acercas a un Zookeeper cercano, con la esperanza de desentrañar los secretos de la alegría de Panda. \ N \ n \ "El juego es un aspecto esencial de la vida de un panda", comparte el zoológico. "Sirve a múltiples propósitos, incluido el ejercicio físico, perfeccionando su coordinación y agilidad, y fomentando los lazos sociales. Los jóvenes pandas participan en interacciones lúdicas para aprender habilidades vitales y establecer jerarquías sociales. Incluso los pandas adultos se dedican a los ataques de juego, recordándonos la alegría inherente que encuentran en sus vidas diarias"." #NT!
 dubois.1022.f3: "En el sereno bosque de bambú del zoológico, los entrañables pandas gigantes cautivan a los visitantes con su pelaje blanco y negro y su apariencia de Roly-Poly. Con movimientos suaves, comen las sesiones de bambú, su comida favorita. La curiosidad despertó, te acercas a un zoológico cercano, ansioso por descubrir más sobre estos animales icónicos. \ N \ n \ "El panda gigante es un símbolo encantador de conservación y resistencia", comienza el zoológico. "Un hecho fascinante sobre los pandas es su dieta especializada. Son predominantemente herbívoros, y el bambú que constituye más del 99% de su dieta. Su sistema digestivo se ha adaptado para manejar las resistentes fibras de bambú, lo que les permite extraer nutrientes de esta fuente de alimentos abundante." #NT!
 dubois.1022.k: "Volver a los recintos asiáticos" #NT!
 zoo_asian_enclosures_tt: "Volverás a los recintos asiáticos del zoológico." #NT!
  
 dubois.1023.t: "Recinto de orangután" #NT!
 dubois.1023.d: "En el idioma malayo #o orangutan#! significa persona forestal. La gente de Java incluso dice que los orangutanes podrían hablar, pero no lo hacen porque entonces tendrían que trabajar para los humanos en ese momento. En su recinto, los orangutanes no tienen que trabajar ya que los zoológicos les proporcionan todo lo que necesitan." #NT!
 dubois.1023.f1: "En el exuberante y frondoso recinto del zoológico, los majestuosos orangutanes se balancean sin esfuerzo a través de las copas de los árboles, sus largos y elegantes brazos que alcanzan las ramas. Su pelaje marrón rojizo se destaca contra el vibrante telón de fondo verde. La curiosidad despertó, te acercas a un chopero experto, ansioso por aprender más sobre estas fascinantes criaturas. "Son nativos de las selvas tropicales de Borneo y Sumatra, donde pasan la mayor parte de sus vidas en los árboles. Sus brazos fuertes y sus manos flexibles, equipadas con pulgares opuestos, les permiten moverse con agilidad y precisión excepcionales entre las ramas"." #NT!
 dubois.1023.f2: "En el pacífico hábitat orangután del zoológico, una madre orangután acuna tiernamente a su bebé, su vínculo evidente en cada toque suave. Sus ojos inteligentes reflejan una conexión profunda. Intrigado por su comportamiento nutritivo, se acerca a un choquecoperio experto, ansioso por descubrir más sobre estos primates cautivadores. "El vínculo entre una madre orangután y su descendencia es increíblemente fuerte. La madre brinda atención y orientación constantes, enseñando a los jóvenes habilidades vitales de orangután para la supervivencia, como la construcción de nidos y la búsqueda de alimento. Este período de crianza puede durar varios años, asegurando que el joven orangután esté bien preparado para una vida independiente"." #NT!
 dubois.1023.f3: "En medio de la tranquilidad del recinto de orangután en el zoológico, un orangután masculino se sienta sobre una percha alta, emitiendo una serie de llamadas profundas y resonantes que resuenan en los alrededores. Intrigado por sus vocalizaciones, buscas un choque de zoológico bien informado, con la esperanza de comprender la importancia de estos sonidos. \ N \ n \ "Los orangutanes poseen un repertorio diverso de vocalizaciones", comparte el zoológico. "Su rango vocal incluye varias llamadas, gruñidos y largas llamadas, que tienen diferentes propósitos. Los hombres a menudo usan vocalizaciones para establecer su dominio y comunicar su presencia a otros orangutanes. Las largas llamadas, en particular, son impresionantes, reverberantes en el bosque para atraer a los compañeros o comunicar límites territoriales." #NT!
  
 dubois.1024.t: "Recinto de tigre" #NT!
 dubois.1024.d: "No parecía haber nada en el vasto recinto frente a ti. No hay rastros de ningún animal. Entonces, de repente, lo viste: un enorme #o tiger#! caminó casualmente justo a tu lado." #NT!
 dubois.1024.f1: "En el exuberante hábitat del tigre del zoológico, el majestuoso tigre asiático merodean con gracia, sus sorprendentes espectadores fascinantes rayas naranjas y negras. Con cada paso, exuda un aura poderosa. Intrigado por su presencia, te acercas a un chopero experto, ansioso por aprender más sobre estos grandes gatos icónicos. \ N \ n \ "El tigre asiático, también conocido como el tigre de Bengala, es un verdadero símbolo de fuerza y ​​belleza", comienza el zoológico. "Son nativos del subcontinente indio y el sudeste asiático, donde habitan una variedad de hábitats, desde bosques densos hasta pastizales. Su abrigo vibrante, adornado con patrones únicos de rayas, proporciona camuflaje y les ayuda a mezclarse sin problemas en su entorno. \ "Los tigres asiáticos son animales solitarios, que generalmente establecen grandes territorios para deambular y cazan. Son depredadores de Apex, conocidos por su sigilo y agilidad. Con músculos poderosos y garras retráctiles agudas, son cazadores altamente calificados, capaces de derribar grandes presas como ciervos y jabalíes salvajes"." #NT!
 dubois.1024.f2: "En el tranquilo recinto del tigre del zoológico, una madre tigre cuida a sus juguetones cachorros, sus inocentes travesuras traen alegría a los espectadores. Los ojos ámbar de la madre reflejan afecto y vigilancia. Intrigado por su dinámica familiar, buscas un contexto de zoológico con conocimientos, con la esperanza de obtener una idea de la vida de los tigres asiáticos. "Después de un período de gestación de aproximadamente tres a cuatro meses, la madre da a luz a una camada de cachorros. Proporciona atención inquebrantable, cuidándolos y enseñándoles habilidades esenciales de caza y supervivencia. A medida que los cachorros crecen, los introduce gradualmente en el mundo más allá de la guarida, preparándolos para la independencia. \"." #NT!
 dubois.1024.f3: "En medio del exuberante follaje del hábitat del tigre en el zoológico, un tigre asiático masculino emite un rugido profundo y resonante que resuena en los alrededores. El poderoso sonido reverbera, capturando la atención de los visitantes. Ansioso por comprender su significado, se acerca a un choque de zoológico bien informado, con la esperanza de aprender más sobre las vocalizaciones de tigres. "Su repertorio de sonidos incluye rugidos, gruñidos y chufas, cada uno de los cuales sirve diferentes propósitos. Los rugidos profundos a menudo se usan como exhibiciones territoriales, afirmando el dominio y marcando su presencia." #NT!
  
 dubois.1025.t: "Recinto de tapir malaya" #NT!
 dubois.1025.d: "El recinto del #o tapir#! se modeló después de su entorno natural. Muchas plantas verdes dificultaban detectar a los animales en absoluto." #NT!
 dubois.1025.f1: "En la exuberante exhibición de la selva tropical del zoológico, una criatura de aspecto curioso llamado Tapir malaya deambula pacíficamente, su distintiva bata blanca y blanca que se destaca entre los alrededores verdes. Intrigado por su apariencia única, te acercas a un cuidadoso con cañón, ansioso por aprender más sobre este animal intrigante. \ N \ n \ "El tapir malayo es una criatura verdaderamente fascinante, \" el zoológico comienza. \ "Son nativos de los densos bosques del sudeste asiático, donde pasan gran parte de su tiempo cerca de las fuentes de agua. Una de sus características más notables es su coloración inusual. Las marcas en blanco y negro sirven como una forma de camuflaje, lo que les permite combinar con las sombras y la luz moteada del bosque. \ "Los tapires malayos son principalmente criaturas nocturnas, pasando sus noches alimentando la comida. Tienen un hábito de alimentación único llamado navegación, donde usan sus hocicos largos y flexibles para arrancar hojas y ramitas de árboles y arbustos. También son excelentes nadadores, a menudo toman el agua para escapar de los depredadores o para enfriarse en clima caliente." #NT!
 dubois.1025.f2: "En el pacífico hábitat de tapir del zoológico, un tapir madre se mueve con gracia con su pantorrilla, guiándolo con suaves empujones. El abrigo marrón de la pantorrilla se combina con sus alrededores, proporcionando camuflaje. Intrigado por sus interacciones, buscas un choque de zoológico bien informado, con la esperanza de aprender más sobre la dinámica familiar de los tapires malaya. "Después de un período de gestación de alrededor de trece meses, la madre da a luz a un solo ternero. El abrigo de la pantorrilla se asemeja al de un adulto, con un patrón único de manchas y rayas. La madre está dedicada, protegiendo y fomentando a sus crías, enseñándole habilidades vitales como encontrar alimentos y navegar por el bosque." #NT!
 dubois.1025.f3: "En medio del tranquilo tapir de tapir en el zoológico, un tapir malayo emite una serie de silbidos agudos y bajos ruidosos, creando una sinfonía de sonidos. Intrigado por sus vocalizaciones, te acercas a un chopero experto, con la esperanza de comprender su importancia. \ N \ n \ "Tapirs se comunica a través de una variedad de vocalizaciones", comparte el zoológico. "Los silbatos y los retumbos a menudo se usan para diferentes propósitos. Los silbatos agudos pueden servir como una llamada de contacto entre las personas, permitiéndoles ubicarse entre sí en el bosque denso. Los bajos retumbos pueden usarse como una forma de comunicación durante el cortejo o establecer dominio." #NT!
  
 dubois.1026.t: "Recinto de dragón de komodo" #NT!
 dubois.1026.d: "Múltiples dragones #o komodo#! eran visibles en su recinto, algunos estaban acostados en rocas, otras caminaban en la exhibición de Savannah." #NT!
 dubois.1026.f1: "En el escarpado recinto de dragón de Komodo del zoológico, un depredador formidable merodea con una marcha deliberada, su piel escamosa que se mezcla con los tonos terrosos de sus alrededores. Intrigado por su presencia dominante, te acercas a un chopero experto, ansioso por aprender más sobre este reptil impresionante. \ "Nativo de las islas indonesias, es el lagarto vivo más grande de la tierra. Su cuerpo musculoso, su cuerpo agudo y dientes serrados lo convierten en un cazador temible. Usando el sigilo y la paciencia, se encuentra en la espera, emboscada presa que deambula demasiado cerca. Su sentido del olfato es lo que le permite detectar a millas de distancia, por lo que es un carroza eficiente como bien"." #NT!
 dubois.1026.f2: "En el reino de la exhibición de Dragón de Komodo, un magnífico reptilé en la luz solar moteada, su formidable presencia evidente en cada movimiento elegante. Intrigado por su antiguo linaje, buscas un chopero experto, con la esperanza de descubrir más sobre las características fascinantes de esta criatura icónica. \ N \ n \ "El dragón de Komodo es una reliquia viva, un testimonio de su éxito evolutivo", explica el Zookeeper. \ "Sus orígenes se pueden rastrear millones de años, por lo que es una especie verdaderamente notable. Conocida por su capacidad para prosperar en ambientes hostiles, se ha adaptado a una variedad de hábitats, desde pastizales secos hasta bosques tropicales. Sus poderosas mandíbulas, cargadas de bacterias mortales, permiten que derribe prey más grande que en sí mismo, como los cervos o búfalo acuático." #NT!
 dubois.1026.f3: "En medio del terreno accidentado del recinto del dragón de Komodo, un dragón masculino emite un silbido profundo y resonante, advirtiendo a los intrusos de su presencia. Intrigado por sus vocalizaciones, te acercas a un chopero experto, con la esperanza de comprender su importancia en el mundo de estos enigmáticos reptiles. \ "Aparte del silbido, que sirve como una advertencia territorial, también se involucran en exhibiciones de combate ritualizadas para establecer el dominio y los derechos de reproducción. Estas exhibiciones implican hincharse de sus gargantas, inflar sus cuerpos e avanzar en la cabeza. Estos comportamientos fascinantes juegan un papel crucial para mantener el orden social entre estas criaturas solitarias." #NT!
  
 dubois.1027.t: "Recinto de leopardo de nieve" #NT!
 dubois.1027.d: "El terreno resistente, lleno de rocas y piedras era el hogar perfecto del leopardo de las nieves." #NT!
 dubois.1027.f1: "Dentro del cautivador recinto del zoológico, una criatura rara y esquiva conocida como el leopardo de las nieves, con gracia, su grueso pelaje y su majestuosa presencia cautivan la atención de los visitantes. Intrigado por su naturaleza enigmática, te acercas a un cuidadoso chookeeper, ansioso por aprender más sobre este gran gato evasivo. "Con su pelaje bellamente estampado y su larga cola, se adapta perfectamente a su hábitat frío y resistente. Estos grandes gatos son conocidos por sus técnicas de caza sigilosas, dependiendo de sus poderosas piernas y sus agudos sentidos para acechar y emboscadas presas." #NT!
 dubois.1027.f2: "En el sereno hábitat de montaña del zoológico, un leopardo de nieve se posa sobre un afloramiento rocoso, su mirada penetrante escaneando los alrededores con enfoque e intensidad. La vista de su postura vigilante cautiva la atención de los visitantes. Intrigado por su comportamiento de caza, buscas un chopero con sabores expertos, con la esperanza de descubrir más sobre la vida de este notable depredador. "Están adaptados para prosperar en ambientes a gran altitud, donde se aprovechan de una variedad de animales como ovejas azules, IBEX y mármeros. Su pelaje manchado proporciona un excelente camuflaje en sus alrededores nevados, lo que les permite acercarse a la presa no detectada." #NT!
 dubois.1027.f3: "En medio del terreno rocoso del hábitat del leopardo de la nieve, un leopardo de nieve femenina emite una llamada suave y melódica que transporta el aire, una muestra de su presencia y posibles intenciones de apareamiento. Intrigado por sus vocalizaciones, te acercas a un experto en zoológico, con la esperanza de comprender la importancia de estos sonidos. "Durante la temporada de apareamiento, las mujeres emiten llamadas para atraer a los posibles compañeros. Los leopardos de las nieve masculinos responden con sus propias llamadas, ayudando a establecer su presencia e intenciones. Estos intercambios vocales son cruciales para mantener la población y la diversidad genética de estos esquivos gatos"." #NT!
  
 dubois.1028.t: "Recinto de guepardo asiático" #NT!
 dubois.1028.d: "El recinto de los guepardos asiáticos trató de imitar su hogar en el Medio Oriente. Fue establecido como un desierto persa y ofreció un entorno naturalista." #NT!
 dubois.1028.f1: "Dentro del cautivador recinto del zoológico temático del desierto, una criatura elegante y ágil conocida como los merodeos asiáticos con gracia sin esfuerzo, su pelaje dorado y su apariencia sorprendente capturando la atención de los visitantes. Intrigado por su presencia única, te acercas a un chopero con conocedores, ansiosos por aprender más sobre este gran gato en peligro crítico. "Con su esbelta construcción y piernas poderosas, está perfectamente adaptada para persecuciones de alta velocidad. Estos grandes gatos pueden alcanzar velocidades de hasta 60 millas por hora en ráfagas cortas, lo que los convierte en los animales terrestres más rápidos. Desafortunadamente, la gueparh asiática está en el borde de la extinción, con solo un retiro en el que los esfuerzos de conservación salvajes son cruciales para salvar esta magnífica especie". "." #NT!
 dubois.1028.f2: "En el paisaje árido del hábitat de guepardo, un guepardo asiático se involucra en un tallo elegante y calculado, su intenso enfoque en un objetivo lejano cautivando la atención de los visitantes. Intrigado por su comportamiento de caza, buscas un sabor de zoológico bien informado, con la esperanza de descubrir más sobre la vida de este notable depredador. "Confían en su velocidad y agilidad excepcionales para perseguir y capturar a sus presas. Sus únicas 'marcas de lágrimas' negras debajo de sus ojos sirven como un bloqueador solar natural, reduciendo el resplandor y mejorando su enfoque durante la caza diurna. Estos guepardos se aprovechan principalmente de las gacelas y otros pequeños ungulados, utilizando sus increíbles explosiones de velocidad para acercarse a su objetivo antes de su objetivo"." #NT!
 dubois.1028.f3: "En medio del terreno rocoso del recinto de guepardo, un guepardo asiático masculino emite una serie de llamadas bajas y retumbantes que hacen eco por el aire, una exhibición de su presencia y territorio potencial. Intrigado por sus vocalizaciones, te acercas a un experto en zoológico, con la esperanza de comprender la importancia de estos sonidos \ n \ n "Las vocalizaciones del guepardo asiático juegan un papel crucial en su comunicación", comparte el zoológico. "Los guepardos masculinos usan sus llamados para establecer su territorio y atraer a los compañeros potenciales. Estos intercambios vocales también ayudan a reducir los conflictos y las confrontaciones entre los hombres. Dada la población críticamente baja de los guepardos asiáticos, comprender sus comportamientos vocales es vital para los esfuerzos de conservación y su supervivencia"." #NT!
  
