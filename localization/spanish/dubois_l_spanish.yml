 dubois.128.t: "Alce"
 dubois.128.d: "Nuestro zoológico está enriquecido por un nuevo animal exótico: hoy el tan esperado #O Elk#! se trasladó a su nuevo recinto."
 dubois.128.f: "El alce europeo, también conocido como Moose en América del Norte, es el miembro más grande de la familia Deer. Nativo de los bosques de Europa y Asia, estos gigantes solitarios son conocidos por sus astas masivas, que los machos arrojan y vuelven a crecer anualmente. Los alces son navegadores, se alimentan de hojas, corteza y plantas acuáticas. A pesar de su tamaño, son ágiles y bien adaptados a sus hábitats fríos y boscosos."
 dubois.128.g: "¡Majestuoso!"
