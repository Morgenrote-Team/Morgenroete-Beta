 dubois.11.armadillo: "El armadillo de nueve bandas."
 dubois.11.condor: "El cóndor andino."
 dubois.11.manatee: "El manatí de la India Occidental."
 dubois.11.monkey: "El mono ardilla."
 dubois.11.lynx: "El lince ibérico."
 dubois.11.wolf: "El lobo euroasiático."
 dubois.11.badger: "El tejón euroasiático."
 dubois.11.stoat: "The Eurasian Stoat."
 dubois.11.otter: "La nutria euroasiática."
 dubois.11.ibex: "El alpino Ibex."
 dubois.11.wisent: "The European Bison (Wisent)."
 dubois.11.hippopotamus: "El hipopótamo."
 dubois.11.lion: "The African Lion."
 dubois.11.elephant: "The African Bush Elephant."
 dubois.11.giraffe: "La jirafa."
 dubois.11.penguin: "El pingüino africano."
 dubois.11.mole: "El rato topo desnudo."
 dubois.11.zebra: "The Plains Zebra"
 dubois.11.panda: "El panda gigante."
 dubois.11.orangutan: "The Bornean Orangutan."
 dubois.11.tiger: "El tigre de Bengala."
 dubois.11.tapir: "El tapir malayo."
 dubois.11.dragon: "El dragón de Komodo."
 dubois.11.leopard: "El leopardo de la nieve."
 dubois.11.cheetah: "El guepardo asiático"
 dubois.11.turtle: "La tortuga marina verde."
 dubois.11.manta: "The Giant Oceanic Manta Ray."
 dubois.11.kangaroo: "El canguro rojo."
 dubois.11.koala: "El koala."
 dubois.11.platypus: "El ornitorrinco."
 dubois.11.cassowary: "The Southern Cassowary."
 dubois.11.sealion: "El león marino de Nueva Zelanda"
 dubois.11.no: "One mustn’t overcrowd the enclosures, after all."
 dubois.12.t: "Smugglers Reach the Animal Habitat"
 dubois.12.d: "Professor [ROOT.Var('dubois_naturalist_var').GetCharacter.GetLastName] has successfully gained covert access to a remote animal habitat in [SCOPE.sCountry('dubois_animal_country').GetName]. Now arises the delicate question: which specimen shall be 'acquired' in the name of scientific advancement?"
 dubois.12.f: "'How can it be unlawful to capture a creature of the wild? Surely, it is not the possessor of legal title,' mused the Professor upon his return, when a fellow expedition member delicately inquired whether their actions had strayed beyond the bounds of legality."
 dubois.13.t: "Smugglers Apprehended!"
 dubois.13.d: "Unfortunate news reaches us from [SCOPE.sCountry('dubois_animal_country').GetName]: the small party of smugglers dispatched to obtain a zoological specimen was intercepted. The ensuing incident has ignited a diplomatic scandal—our nation now stands publicly accused of engaging in poaching."
 dubois.13.f: "Reports suggest that the group was first discovered by local foresters, who quickly alerted the authorities. Our ambassador has since been summoned to face formal protestations. By great fortune, Professor [ROOT.Var('dubois_naturalist_var').GetCharacter.GetLastName] managed to depart the country prior to the arrests, thus preserving their scientific reputation from irreparable harm."
 dubois.13.g: "This did not unfold as intended."
 dubois.21.t: "Prof. [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] Returns with Rare Specimens"
 dubois.21.d: "After a year-long expedition into the wilds, Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetFullName] has triumphantly returned. Assisted by local guides, hunters, and trappers, the expedition succeeded in acquiring several remarkable [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] for scientific study and public exhibition."
 dubois.21.f: "Number of animals secured: #G [ROOT.Var('dubois_catch_animal_total').GetValue]#!"
 dubois.21.g: "A splendid triumph for science and the nation!"
 dubois.31.t: "The Safari Commences"
 dubois.31.d: "The expedition, led by the esteemed Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetFullName], has arrived on the African continent. Their objective: to secure a remarkable specimen for the National [concept_dubois_zoo]. Which beast shall they pursue?"
 dubois.31.f: "Not all creatures yield to capture in the same fashion. Some general advice: the elephant demands an abundance of traps, whereas a giraffe is more readily ensnared. Lions are restless, changing ground more frequently than the ponderous hippopotamus."
 dubois.31.g: "Pursue the Hippopotamus."
 dubois.31.h: "Pursue the African Lion."
 dubois.31.i: "Pursue the African Bush Elephant."
 dubois.31.j: "Pursue the Giraffe."
 dubois.31.k: "Pursue the Plains Zebra."
 dubois.32.t.hippopotamus_1: "An Enormous Hippopotamus"
 dubois.32.t.hippopotamus_2: "A Second Sighting of a Hippopotamus"
 dubois.32.t.hippopotamus_3: "Otro hipopótamo"
 dubois.32.t.lion_1: "A Majestic Lion"
 dubois.32.t.lion_2: "A Second Sighting of a Lion"
 dubois.32.t.lion_3: "Otro león"
 dubois.32.t.elephant_1: "A Towering Elephant"
 dubois.32.t.elephant_2: "A Second Sighting of an Elephant"
 dubois.32.t.elephant_3: "Otro elefante"
 dubois.32.t.giraffe_1: "An Elegant Giraffe"
 dubois.32.t.giraffe_2: "A Second Sighting of a Giraffe"
 dubois.32.t.giraffe_3: "Otra jirafa"
 dubois.32.t.zebra_1: "A Fast Zebra"
 dubois.32.t.zebra_2: "A Second Sighting of a Zebra"
 dubois.32.t.zebra_3: "Otra cebra"
 dubois.32.d: "Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] has tracked the creature in question. Now, with patience and skill, the team must maneuver it into a position suitable for capture."
 dubois.32.f.hippopotamus.1: "In the shadow of the great river, villagers speak in hushed tones of the beasts that stir the waters at dusk. A local hunter recounts a recent night when a mother hippopotamus crushed a crocodile beneath her weight to defend her calf—a scene Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] confirmed by examining the reptile's shattered remains. Their low bellows can be heard deep into the night, a reminder that the hippos are not merely residents here—they are sovereigns."
 dubois.32.f.hippopotamus.2: "As the sun cut through the morning mist, the team spotted a titanic form rising from the river—thick-skinned and steaming in the early light. The villagers call them ‘ghost bulls,’ for they vanish beneath the water without a trace and strike with terrible force. Their tusks gleam like polished ivory, their temperaments quick to wrath. Even the lions give these brutes a wide berth. But Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName], with nerves of iron and notebook in hand, steps forward undeterred."
 dubois.32.f.hippopotamus.3: "Across campfires and caravan routes, stories echo of a solitary beast—‘The Ivory Behemoth’—said to possess plates of bone as pale and strong as shielded stone. Some say it is immortal, others that its breath summons storms. Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] believes it to be a specimen of rare size and age, its reverence among the local peoples suggesting mythic stature. If captured, it would crown any zoological collection on earth."
 dubois.32.f.lion.1: "Across the golden reaches of the savannah, a shadow moves with imperial grace. The lion, bearing a mane like windblown flame, does not merely dwell here—it rules. Local trackers speak in awe of 'The Queen of the Savannah,' a lioness of such strength that she held off an entire hyena pack to shield her cubs. Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName], though seasoned, finds their trail daunting. The land itself seems to bow before her path."
 dubois.32.f.lion.2: "A hushed tension grips the camp: prints—massive, deliberate—lead to a thicket veiled in dust and sun. 'The Golden Sovereign,' the locals whisper, is near. Said to have fought a bull Cape buffalo and emerged bloodied but unbroken, this lion's mane is likened to the very sun in its fury. Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] knows this is no ordinary predator. It is a monarch whose domain is measured in silence and fear, and whose gaze sends grown hunters fleeing."
 dubois.32.f.lion.3: "Amid the cicadas’ cry and the wind-swept grass, something stirs. The lion’s roar—deep, guttural, and echoing—rolls over the plains like distant thunder. Legend speaks of a patriarch whose mere presence quells rivals and halts elephants in their path. It is into this ancient drama of predator and prey that Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] now steps, a solitary scholar in pursuit of nature’s most storied sovereign."
 dubois.32.f.elephant.1: "The sun beats down upon the shimmering savannah as a distant rumble draws nearer. It is not thunder—but the solemn procession of elephants. A matriarch leads her kin across the dust-strewn plain, pausing only beneath an acacia grove where their trunks rise like periscopes toward the canopy. Through his field-glass, Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] watches in silence, struck not by their size alone, but by the gentle rhythm of their companionship. Yet behind him, whispers from impatient benefactors echo: the nation did not fund this journey for sentiment."
 dubois.32.f.elephant.2: "The herd moves with a grace unexpected for beasts so vast, each step deliberate, each glance between them rife with meaning. Led by a seasoned matriarch whose eyes have seen many migrations, they march in solemn unity. At dusk, by a shallow watering hole, their trumpets ring out—a sound somewhere between music and mourning. Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName], notebook idle in hand, feels the stirrings of doubt. Is it science, or spectacle, that compels this pursuit?"
 dubois.32.f.elephant.3: "Beneath the vast and ancient baobabs, time seems suspended. There, Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] beholds a vision both noble and mournful: a group of elephants, their ears fanned and tusks gleaming like polished ivory, stands at ease. They do not threaten, nor flee—they simply are. And yet, to pluck one from this communion, to cage the sovereign of such plains, would echo through the herd like a wound. The professor knows the names of bones and species, but this—this is something else entirely."
 dubois.32.f.giraffe.1: "For days, the team wandered under the unrelenting sun, finding no trace of their quarry. But one morning, as dawn broke over the horizon, silhouettes emerged—tall and still as statues. Against the ruddy fire of the morning sky, the necks of several giraffes reached above the acacias, forming a living skyline. Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] gave the signal. The hunt—for knowledge—was on."
 dubois.32.f.giraffe.2: "As sunlight filtered through the trees like scattered gold, the giraffes stepped into view. Towering, serene, and patterned like abstract mosaics, they moved as if to music only they could hear. Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName], captivated, advanced slowly with notebook and scope in hand. The elegance of the creatures was unmatched—their every step a study in poise. The naturalist knew this was more than zoological opportunity; it was a glimpse of the sublime."
 dubois.32.f.giraffe.3: "Far from the nearest settlement, deep within an untouched corner of the savannah, the team found a solitary giraffe, unlike any described before. Its coat bore strange markings—almost star-shaped—and its movements were unusually swift. Local guides whispered of an omen, a sacred beast seldom seen by human eyes. Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName], equal parts skeptic and scholar, prepared for careful observation. Could this truly be a distinct subspecies—or merely the tricks of light and legend?"
 dubois.32.f.zebra.1: "The plains were quiet when the sun dipped low, until streaks of black and white appeared between thorny shrubs and weathered trees. A zebra herd, calm and unsuspecting, grazed just beyond reach. Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] watched in silence, fascinated by their stripes—evolution's riddle rendered in living contrast. The desire to study them deeper warred with the necessity of haste: wait too long, and the moment may pass forever."
 dubois.32.f.zebra.2: "Weeks passed in fruitless pursuit, until the team recalled a vital clue from native trackers: zebras seldom venture far from water. They set up camp near the next reliable watering hole, and sure enough, just as dusk settled, the familiar snorts and tail-whips of a striped herd heralded their arrival. At last, a second chance—and perhaps, with luck and caution, a live capture."
 dubois.32.f.zebra.3: "The savannah bore silent witness to violence: the mutilated carcass of a zebra, fresh from a lion's ambush, lay ahead. Its death, though grim, offered signs—tracks, sounds, movement. Spurred by urgency, the team pressed on. Cresting a low ridge, they beheld a scene of wild harmony: a zebra herd in motion, their cries a strange fusion of horse and donkey, their stripes dancing with the wind. For Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName], the sight mingled tragedy with triumph."
 dubois.32.g: "Instruct the team to set traps."
 dubois.32.h: "Have the team begin tracking the animal."
 dubois.33.t: "A Meadow of Rare Blooms"
 dubois.33.d.hippopotamus: "While tracking the elusive #O Hippopotamus#!, the safari encountered a field of remarkable flora. Bright blooms of unknown origin caught the professor’s attention. [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] now ponders a detour from the hunt, his scientific curiosity piqued."
 dubois.33.d.lion: "While trailing the #O Lion#!, the team stumbled across a grove blooming with rare and vibrant flora. Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] debates delaying the pursuit—these plants may hold secrets as grand as any beast."
 dubois.33.d.elephant: "While searching for the #O Elephant#!, the team stumbled across a rare and vibrant bloom. Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] seems tempted to tarry and collect these curious plants."
 dubois.33.d.giraffe: "In search of the #O Giraffe#!, the safari team stumbled upon a region rich with floral diversity. Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] proposed a brief halt to gather samples."
 dubois.33.d.zebra: "While tracking the #O Zebra#!, the safari group stumbled upon a curious grove filled with unknown flora. Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] considered pausing to collect samples."
 dubois.33.f: "The safari came to a halt when Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName], upon detecting an unusual fragrance, ordered the column to stop. Before them lay a clearing adorned with brilliant, unfamiliar flowers. Even a cursory examination revealed potential medicinal properties. The professor now faced a dilemma—divert attention to collect these precious botanical specimens, or press on in pursuit of the animal."
 dubois.33.g: "Collect the flowers—this find is too valuable to ignore."
 dubois.33.h: "Time is short. The quarry must remain our priority."
 dubois.34.t: "A Swarm of Discovery"
 dubois.34.d.hippopotamus: "As the team ventured deeper into the wetland in pursuit of the #O Hippopotamus#!, they suddenly realized Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] was missing. His footprints lead toward a collapsed termite mound glistening with beetles—evidence he may have been lured away by yet another curiosity of the natural world."
 dubois.34.d.lion: "The safari tracking the #O Lion#! has met with unexpected chaos. Somewhere in the brush, Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] vanished—drawn off, perhaps, by something no less fierce or fascinating than the lion itself."
 dubois.34.d.elephant: "The safari for the #O Elephant#! has been abruptly halted. Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] has vanished into the brush—perhaps in search of the great beast, or perhaps chasing some deeper question only he can answer."
 dubois.34.d.giraffe: "The safari in pursuit of the #O Giraffe#! has been interrupted—Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] has vanished into the foliage without a word. Worry begins to mount."
 dubois.34.d.zebra: "The safari, meant to secure the #O Zebra#!, has been disrupted—Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] is nowhere to be found."
 dubois.34.f: "Following a brief rest, the safari team noticed the sudden absence of their leader. Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] was soon found perched atop a desiccated termite mound, enthralled by a writhing mass of beetles—iridescent blues, vivid reds, shimmering greens. With childlike enthusiasm, the professor catalogued what appeared to be several undocumented insect species."
 dubois.34.g: "Gather insect specimens for scientific study."
 dubois.34.h: "This is no time for beetles—onward with the hunt!"
 dubois.39.t: "A Successful Hunt"
 dubois.39.f: "'Everything in Africa bites, but the safari bug is worst of all.' – Ernest Hemingway"
 dubois.39.g: "A triumph for science!"
 dubois.40.t: "Safari Concludes"
 dubois.40.d.success: "With the target secured and the expedition complete, Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] returns home in triumph. The new addition to the National Zoo of [ROOT.GetCountry.GetNameNoFlag] will undoubtedly inspire public awe and academic interest alike."
 dubois.40.d.fail: "After months of hardship and empty trails, Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] returns to [ROOT.GetCountry.GetNameNoFlag] without a catch. The expedition has ended, its promise unfulfilled."
 dubois.40.f: "'All I wanted to do was get back to Africa. We had not left it, yet, but when I would wake in the night I would lie, listening, homesick for it already...' – Ernest Hemingway"
 dubois.40.g: "Onward to the next expedition."
 dubois.41.t: "Exotic Plants"
 dubois.41.d: "The expedition encountered a wondrous array of exotic plants, though the safety of this verdant place remains uncertain."
 dubois.41.f: "The expedition members had traversed rivers, scaled ridges, and pushed through dense forest undergrowth. Yet nothing prepared them for the majesty of these enormous, flowering plants—broad-leaved giants, blooming with improbable colours. [SCOPE.sCharacter('expedition_leader').GetFullName] initially declared they would not linger, but then permitted a research assistant to collect several samples. The scientific merit was too compelling to ignore. Still, the jungle echoed with strange sounds—neither bird nor beast, perhaps not even man—that gave the leader pause."
 dubois.41.g: "Recoge algunas muestras de plantas."
 dubois.41.h: "Gather as many specimens as possible."
 dubois.42.t: "Mariposas"
 dubois.42.d: "To their surprise, the expedition entered a sun-drenched clearing where tens of thousands of butterflies danced in the air."
 dubois.42.f: "'These are flowers that fly and all but sing.' – Robert Frost"
 dubois.42.g: "Our naturalists at home shall be delighted."
 dubois.43.t: "River Fish"
 dubois.43.d: "While fording a river, several expedition members noticed unknown fish [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] swimming in the shallows. [SCOPE.sCharacter('expedition_leader').GetFullName], however, had their own ideas."
 dubois.43.f: "Shimmering, jewel-toned creatures swam just below the surface—beautiful, mysterious, and wholly unfamiliar. For the scientific team, they were a marvel to be catalogued. For the expedition leader, they were a much-needed addition to the cookpot. The argument that followed was brief, and the fire was already burning."
 dubois.43.g: "Preserve and study the fish."
 dubois.43.h: "Cook and eat the fish."
 dubois.44.t: "Samples Lost"
 dubois.44.d: "Several days ago, the expedition collected samples of great scientific interest—now, to everyone’s dismay, they have vanished."
 dubois.44.f: "A sudden cry of alarm rang out at midday. [SCOPE.sCharacter('expedition_leader').GetFullName] feared an ambush—hostile locals or wild beasts—but it was only a research assistant, frantic and pale. The crates of insects, leaves, and preserved specimens had disappeared. The assistant demanded the expedition turn back, but the porters refused and the leader dismissed the notion: too dangerous, and too much time already wasted collecting weeds. The assistant threatened to report this dereliction to certain well-placed friends in science and politics."
 dubois.44.g: "Retrace your steps and recover the collection."
 dubois.44.h: "Leave the 'junk' behind and press on."
 dubois.45.t: "A Valuable Collection"
 dubois.45.d: "In a remote clearing, the expedition discovered a solitary naturalist who had abandoned civilization years ago, and assembled a remarkable collection of rare specimens."
 dubois.45.f: "He was a gaunt figure, hair unkempt and eyes sunken from solitude. Yet his shelter overflowed with meticulously preserved beetles, butterflies, seeds, and annotated sketches. [SCOPE.sCharacter('expedition_leader').GetFullName] quickly saw that the man was not mad, but brilliant—and afraid. Fearful of creditors and reputation alike, the hermit hesitated to return home. Yet his collection held untold value, both scientific and otherwise. There were opportunities here, and not only botanical ones."
 dubois.45.g: "Purchase the collection for our institution."
 dubois.45.h: "We are more interested in what he knows."
 dubois.72.t: "Formación geológica descubierta"
 dubois.72.d: "En [SCOPE.sState('dubois_formation_state').GetName], [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')] ha descubierto formaciones rocosas de millones de años. Sospechan que todavía hay fósiles desconocidos que se encuentran allí."
 dubois.72.f: "Las formaciones con estratos de roca antiguos son un paraíso para los paleontólogos. Todas las formaciones rocosas contienen fósiles más pequeños que se pueden encontrar allí. Las grandes formaciones pueden incluso contener los esqueletos de los dinosaurios masivos. Su paleontológico tiene lugar en varias etapas. Se necesita un paleontólogo para recuperar fósiles de las formaciones. Estudiarán formaciones por su cuenta y encontrarán fósiles anualmente."
 dubois.72.g: "Deberíamos echar un vistazo más de cerca."
 dubois.73.t: "Gran formación geológica descubierta"
 dubois.73.d: "En [SCOPE.sState('dubois_formation_state').GetName], los paleontólogos han descubierto formaciones rocosas de millones de años. Es probable que numerosos fósiles estén dormidos en esta formación masiva, probablemente incluso esqueletos bien conservados con los que solo podíamos soñar hasta ahora."
 dubois.101.t: "The Polar Bear Arrives"
 dubois.101.d: "A new marvel has taken residence in our zoological gardens: the long-awaited #O Polar Bear#! has been safely introduced to its enclosure."
 dubois.101.f: "The Polar Bear (*Ursus maritimus*) is a mighty predator of the icy North, adapted to life upon the drifting sea ice of the Arctic. It hunts seals in the frigid waters and traverses immense distances in search of sustenance. Though formidable in strength, the animal is less territorial than its cousins, and often retreats rather than fight. A living contradiction—both feared and threatened—it represents the harsh beauty of the world's coldest reaches."
 dubois.101.g: "A majestic addition."
 dubois.102.t: "The Grizzly Bear Arrives"
 dubois.102.d: "The zoological gardens are abuzz with excitement: the feared and revered #O Grizzly Bear#! now walks among our collection."
 dubois.102.f: "The Grizzly Bear (*Ursus arctos horribilis*), sometimes known as the North American brown bear, is a creature of immense power and legendary ferocity. The name itself conjures dual meanings—grizzled in coat and grisly in strength. Once ranging freely across the American continent, this formidable animal now stands as a testament to nature’s might and mankind’s destructive past. It is no mere curiosity; it is a reminder."
 dubois.102.g: "A formidable presence."
 dubois.103.t: "The Bald Eagle Arrives"
 dubois.103.d: "Today we unveil a national emblem and natural marvel: the #O Bald Eagle#! now graces our aviary."
 dubois.103.f: "The Bald Eagle (*Haliaeetus leucocephalus*) is a bird of prey indigenous to North America, most commonly seen near rivers, lakes, and coastal waters. Its noble silhouette and piercing cry have become symbols of liberty and strength. Despite its name, it is not bald, but sports a white-feathered head that contrasts its dark body. Opportunistic and resourceful, it is revered not only as a predator but as a cultural icon of the American republic."
 dubois.103.g: "A noble raptor."
 dubois.104.t: "The American Bison Arrives"
 dubois.104.d: "Our collection grows ever more impressive: the iconic #O American Bison#! now roams within our carefully prepared prairie enclosure."
 dubois.104.f: "The American Bison (*Bison bison*), sometimes called the buffalo, once thundered in vast herds across the plains of North America. These shaggy giants were nearly driven to extinction by unregulated slaughter and the encroachment of settlement. Their return to protected captivity stands as a monument to both past recklessness and present responsibility. It is a creature of ancient strength, a living symbol of resilience on a continent reshaped."
 dubois.104.g: "A shaggy titan."
 dubois.105.t: "The Florida Panther Arrives"
 dubois.105.d: "Today the #O Florida Panther#! enters our zoological gardens, offering visitors a rare glimpse of this elusive feline."
 dubois.105.f: "The Florida Panther (*Puma concolor coryi*) is a reclusive subspecies of North American Cougar that haunts the swampy forests and subtropical thickets of the southeastern United States. Pale in coat, with dark-tipped tail and ears, this agile predator is more often heard than seen. Its quiet sounds—chirps, growls, and hisses—contrast its silent steps. Long persecuted and now protected, it remains one of the rarest large mammals in North America."
 dubois.105.g: "A ghost of the glades."
 dubois.106.t: "The American Alligator Arrives"
 dubois.106.d: "A fearsome relic of a bygone era now makes its home with us: the #O American Alligator#! has arrived."
 dubois.106.f: "The American Alligator (*Alligator mississippiensis*) is a formidable reptile and master of the wetlands. Apex predator and ecosystem engineer alike, it shapes its environment by digging watering holes and regulating prey populations. Its deep bellows reverberate across the swamps in both courtship and dominance. Despite its fearsome appearance, this ancient creature is vital to the health of its habitat, and now to the education of our public."
 dubois.106.g: "Tooth and terror."
 dubois.107.t: "The Axolotl Arrives"
 dubois.107.d: "An enigmatic marvel of the aquatic world enters our care: the #O Axolotl#! is now on display."
 dubois.107.f: "The Axolotl (*Ambystoma mexicanum*) is a permanently aquatic salamander native to the ancient lakes of Mexico. Uniquely, it retains its juvenile features throughout its life, reaching adulthood without undergoing metamorphosis. Its astonishing ability to regenerate lost limbs and even parts of its heart or brain has fascinated scientists for generations. Long studied since von Humboldt’s time, it remains a symbol of biological mystery and adaptability."
 dubois.107.g: "A living wonder."
 dubois.111.t: "The Brown-throated Sloth Arrives"
 dubois.111.d: "A peculiar treasure from the treetops now calls our gardens home: the #O Brown-throated Sloth#! has been gently introduced into its enclosure."
 dubois.111.f: "The Brown-throated Sloth (*Bradypus variegatus*) is a slow-moving arboreal mammal found throughout the Neotropics of Central and South America. Preferring the forest canopy, it spends the majority of its life suspended upside down, descending to the forest floor only once every eight days to defecate. This sloth maintains a remarkably small home range, often specializing in one or two favored tree species. Despite its torpor, it is a master of camouflage and an emblem of evolutionary patience."
 dubois.111.g: "The slowest philosopher."
 dubois.112.t: "The Jaguar Arrives"
 dubois.112.d: "With silent steps and burning eyes, the #O Jaguar#! now prowls beneath the shadows of our zoo’s leafy enclosures."
 dubois.112.f: "The Jaguar (*Panthera onca*) is the apex predator of the tropical Americas and the third-largest feline species globally. Noted for its muscular build, striking rosette-patterned coat, and exceptionally powerful bite, the Jaguar is capable of piercing the skulls of prey with a single blow. Its name derives from the Tupi-Guarani word *yaguara*, meaning 'he who kills with one leap.' Elusive and solitary, this cat is a master of stealth and surprise in dense rainforest habitats."
 dubois.112.g: "Stealth incarnate."
 dubois.113.t: "The Giant Anteater Arrives"
 dubois.113.d: "An eccentric insectivore now roams among us: the #O Giant Anteater#! has taken its first steps in its new home."
 dubois.113.f: "The Giant Anteater (*Myrmecophaga tridactyla*) is the largest of the anteater species and is native to Central and South American grasslands and forests. This solitary mammal is distinguished by its elongated snout and tongue—capable of extending up to 60 cm—and formidable claws, which it uses to tear open termite mounds and anthills. Though awkward in gait, it is uniquely adapted for its specialized diet and lifestyle. Despite its placid appearance, it can defend itself fiercely when threatened."
 dubois.113.g: "An aristocrat among insectivores."
 dubois.114.t: "The Nine-banded Armadillo Arrives"
 dubois.114.d: "A creature clad in living armor now scurries into our exhibit: the #O Nine-banded Armadillo#! has arrived."
 dubois.114.f: "The Nine-banded Armadillo (*Dasypus novemcinctus*) is the most widespread armadillo species in the Americas. Recognizable by its segmented, bony shell and shy disposition, it is an accomplished digger and insectivore. A notable participant in the Great American Biotic Interchange, it has expanded its range significantly northward in recent decades. Its peculiar method of locomotion includes the ability to float or walk along river bottoms, making it a marvel of biological resilience and adaptability."
 dubois.114.g: "Encased in curiosity."
 dubois.115.t: "The Andean Condor Arrives"
 dubois.115.d: "High above the crags and peaks it once soared, the #O Andean Condor#! now casts its mighty wings over our aviary."
 dubois.115.f: "The Andean Condor (*Vultur gryphus*) is among the largest flying birds in the world by wingspan and weight, native to the Andes mountains and Pacific coasts of South America. This carrion-feeder plays a crucial ecological role in its mountain habitats. Its featherless head and neck change color with emotion or temperature, and its vast wings enable gliding for hours without a single flap. Revered in Andean mythology and heralded as a symbol of liberty, it is both majestic and endangered."
 dubois.115.g: "Monarch of the updrafts."
 dubois.116.t: "The West Indian Manatee Arrives"
 dubois.116.d: "A gentle swimmer from the Caribbean shallows has surfaced in our care: the #O West Indian Manatee#! is now with us."
 dubois.116.f: "The West Indian Manatee (*Trichechus manatus*) is a slow-moving aquatic herbivore found in the warm coastal waters of the Caribbean, Gulf of Mexico, and southeastern United States. Sometimes called 'sea cows,' manatees graze on submerged vegetation and are known for their docile temperament. Despite their size, they are agile swimmers, propelled by powerful, paddle-shaped tails. Lacking natural predators, they have suffered greatly from human encroachment, boat strikes, and habitat loss."
 dubois.116.g: "A floating philosopher."
 dubois.117.t: "The Squirrel Monkey Arrives"
 dubois.117.d: "Small in stature but vast in charisma, the #O Squirrel Monkey#! has joined our menagerie."
 dubois.117.f: "Squirrel Monkeys (*genus Saimiri*) are highly social primates of the tropical forests of Central and South America. Weighing under a kilogram, they are agile climbers, swift leapers, and endlessly curious creatures. Living in large troops led by dominant females, their lives are filled with complex communication—chirps, cackles, and whistles that reflect their intricate social bonds. Their expressive faces and boundless energy make them both a research subject and a crowd favorite."
 dubois.117.g: "Tiny acrobats with mighty charm."
 dubois.121.t: "The Iberian Lynx Arrives"
 dubois.121.d: "A new and elusive inhabitant has joined our menagerie: the rare and graceful #O Iberian Lynx#! now occupies its enclosure."
 dubois.121.f: "The Iberian Lynx (*Lynx pardinus*) is a critically endangered feline native solely to the Iberian Peninsula. Distinguished by its spotted tawny coat, black ear tufts, and short bobtail, it is notably smaller than its Eurasian cousin. Its hearing is finely attuned, aided by prominent brush hairs on the ears—experiments have shown that the removal of these tufts impairs directional perception. Solitary and territorial, the Iberian lynx once ranged widely across Spain and Portugal but now clings to survival through rigorous conservation."
 dubois.121.g: "A rare jewel of the Peninsula."
 dubois.122.t: "The Eurasian Wolf Arrives"
 dubois.122.d: "With quiet tread and watchful eyes, the #O Eurasian Wolf#! now inhabits our zoological gardens."
 dubois.122.f: "The Eurasian Wolf (*Canis lupus lupus*) is the most widespread subspecies of grey wolf, inhabiting vast tracts of Europe and Asia. With fur ranging from grey to russet and a distinctive black saddle across its back, it is a cunning and social predator. Its howl is longer and more melodic than its American cousins—an eerie song of the old world. These wolves have endured centuries of persecution and folklore, yet continue to survive in remote forests and steppes."
 dubois.122.g: "A spectral sentinel."
 dubois.123.t: "The Eurasian Badger Arrives"
 dubois.123.d: "Today a tenacious digger joins our collection: the #O Eurasian Badger#! has been successfully housed."
 dubois.123.f: "The Eurasian Badger (*Meles meles*) is a stocky, nocturnal mustelid found across much of Europe. Recognizable by its black-and-white facial stripes, it dwells in large, complex burrow systems called setts, often shared with kin. These social carnivores forage for earthworms, insects, and tubers, and build extensive underground homes passed down through generations. Their seasonal weight fluctuations reflect the rigors of hibernation and climate."
 dubois.123.g: "A stalwart subterraneanist."
 dubois.124.t: "The Eurasian Stoat Arrives"
 dubois.124.d: "Our mammalian collection expands once again: the lithe and lethal #O Eurasian Stoat#! now graces our zoo."
 dubois.124.f: "The Eurasian Stoat (*Mustela erminea*), also known as the ermine in its white winter phase, is a small carnivorous mustelid native to Eurasia and North America. With its long body, short limbs, and black-tipped tail, it is adapted for rapid pursuit of rodents, its primary prey. Remarkably, it will attack animals several times its size. Its prized white winter coat has adorned royal robes for centuries, making this otherwise secretive creature an enduring symbol of nobility."
 dubois.124.g: "A killer cloaked in ermine."
 dubois.125.t: "The Eurasian Otter Arrives"
 dubois.125.d: "The waters of our zoological gardens now play host to a sleek new inhabitant: the #O Eurasian Otter#! has arrived."
 dubois.125.f: "The Eurasian Otter (*Lutra lutra*) is a semiaquatic predator that ranges across Europe and much of Asia. Feeding chiefly on fish, it patrols rivers and lakes with remarkable agility. Its fur is among the densest in the animal kingdom, structured with interlocking hairs that trap insulating air and repel water. This allows it to remain dry and warm even in icy conditions. Shy yet curious, the otter is a sign of healthy freshwater ecosystems and a triumph of conservation across its range."
 dubois.125.g: "The spirit of the stream."
 dubois.126.t: "The Alpine Ibex Arrives"
 dubois.126.d: "Scaling the heights of our alpine exhibit, the #O Alpine Ibex#! now stands proudly upon the rocks."
 dubois.126.f: "The Alpine Ibex (*Capra ibex*) is a wild goat species of the European Alps, famed for its dramatic horns and surefooted grace. Males possess great curved horns used in ritual combat during the mating season. These animals are uniquely suited to vertical terrain, feeding on sparse alpine vegetation and enduring steep, rocky climates. Once hunted nearly to extinction, the species was reintroduced to the mountains by royal decree and conservation effort."
 dubois.126.g: "A monarch of the mountains."
 dubois.127.t: "The European Bison (Wisent) Arrives"
 dubois.127.d: "Europe’s ancient beast has returned: the #O European Bison (Wisent)#! now paces within its verdant paddock."
 dubois.127.f: "The Wisent (*Bison bonasus*), or European Bison, is the heaviest surviving land mammal of Europe. Once roaming from Spain to the Urals, it was driven to extinction in the wild by the early 20th century. All living individuals descend from a mere dozen captive specimens preserved in zoos. Compared to its American cousin, the wisent is taller and leaner, adapted to life in mixed and deciduous forests. It is a living emblem of survival against the odds."
 dubois.127.g: "A relic reborn."
 dubois.131.t: "The Hippopotamus Arrives"
 dubois.131.d: "Our zoological gardens now boast a mighty addition: the ponderous #O Hippopotamus#! has been installed in its aquatic enclosure."
 dubois.131.f: "The Hippopotamus (*Hippopotamus amphibius*) is a semi-aquatic artiodactyl of sub-Saharan Africa, and the third-largest terrestrial mammal after the elephant and rhinoceros. Its name, derived from the Greek 'river horse,' belies a disposition far more volatile than equine. During daylight hours it remains submerged in rivers or swamps, surfacing periodically to breathe, while grazing alone by night. Though herbivorous, the hippopotamus is among the most dangerous of African fauna, capable of astonishing speed and aggression when provoked."
 dubois.131.g: "A leviathan of the shallows."
 dubois.132.t: "The African Lion Arrives"
 dubois.132.d: "A creature of regal bearing and ancient repute has entered our care: the #O African Lion#! now prowls its domain within our gardens."
 dubois.132.f: "The Lion (*Panthera leo*) is a powerful felid native to the grasslands and savannahs of Africa and parts of India. Unlike most cats, lions are social animals, living in complex family units called prides. The male's resplendent mane serves both as ornament and protection. Historically venerated in heraldry, sculpture, and verse, the lion endures as a potent symbol of sovereignty, courage, and dominion. Yet behind the myth lies a formidable predator whose cooperation in the hunt belies its raw individual strength."
 dubois.132.g: "The sovereign beast."
 dubois.133.t: "The African Bush Elephant Arrives"
 dubois.133.d: "The largest land animal on Earth has arrived: today we welcome the #O African Bush Elephant#! into its specially prepared habitat."
 dubois.133.f: "The African Bush Elephant (*Loxodonta africana*) is a colossal herbivore renowned for its intelligence, memory, and matriarchal society. Its immense ears function as thermoregulators, while its trunk—an extraordinary fusion of nose and upper lip—serves tactile, olfactory, and manipulative purposes. Elephants are known to mourn their dead and engage in complex social behaviors. Once rulers of vast plains, they are now symbols of both grandeur and fragility in a changing world."
 dubois.133.g: "A paragon of memory and might."
 dubois.134.t: "The Giraffe Arrives"
 dubois.134.d: "Towering above all others, the #O Giraffe#! has now taken its place within our zoological gardens."
 dubois.134.f: "The Giraffe (*Giraffa camelopardalis*) is the tallest living terrestrial animal, easily distinguished by its elongated neck and patchwork coat. Native to African savannahs and woodlands, it browses on acacia leaves at heights unreachable by other herbivores. Despite its gangly appearance, the giraffe moves with surprising grace and speed. The animal has long fascinated mankind—an enduring emblem of elegance and otherworldly design."
 dubois.134.g: "A neck above the rest."
 dubois.135.t: "The African Penguin Arrives"
 dubois.135.d: "An unexpected guest from southern seas waddles into our collection: the #O African Penguin#! is now on display."
 dubois.135.f: "The African Penguin (*Spheniscus demersus*) is the only penguin species to breed on the African continent. Distinguished by its black facial mask and pink ocular patches, it is a pursuit-diver that feeds on fish and squid. Adapted to temperate climates, it thrives in coastal environments without the need for frigid conditions. Its comical gait belies a bird of remarkable agility and endurance at sea—an enduring favorite among visitors and naturalists alike."
 dubois.135.g: "A seabird in formal attire."
 dubois.136.t: "The Naked Mole-Rat Arrives"
 dubois.136.d: "A singular curiosity of nature now burrows beneath our gaze: the #O Naked Mole-Rat#! has arrived."
 dubois.136.f: "The Naked Mole-Rat (*Heterocephalus glaber*) is an extraordinary rodent adapted to subterranean life beneath East African soils. Nearly hairless and cold-blooded, it is the only mammalian thermoconformer and one of the few eusocial mammals, with colonies governed by a breeding queen and her consorts. Notably resistant to cancer and capable of enduring near-anoxic conditions, this humble creature has become an object of intense scientific inquiry, particularly in the realms of longevity and cellular repair."
 dubois.136.g: "A marvel of biology, if not beauty."
 dubois.137.t: "The Plains Zebra Arrives"
 dubois.137.d: "The striped denizen of Africa’s open plains has joined our assemblage: behold the #O Plains Zebra#! in its new home."
 dubois.137.f: "The Zebra (*Equus quagga*) is a genus of wild equids native exclusively to Africa. Best known for their black-and-white striping, zebras inhabit savannahs, grasslands, and even mountainous regions. The evolutionary purpose of their unique pelage remains debated—ranging from camouflage and predator confusion to thermoregulation and deterrence of biting insects. Herding animals with keen eyesight and sharp hooves, zebras are both graceful and highly vigilant."
 dubois.137.g: "Order in stripes."
 dubois.141.t: "The Giant Panda Arrives"
 dubois.141.d: "A singular emblem of the East now graces our gardens: the #O Giant Panda#! has taken up residence in its specially constructed enclosure."
 dubois.141.f: "The Giant Panda (*Ailuropoda melanoleuca*) is a bear native to the temperate mountain forests of central China. Distinguished by its bold black-and-white pelage and ponderous gait, it is unique among ursids for its primarily herbivorous diet—subsisting almost exclusively on bamboo. Though a member of the order Carnivora, its digestive system remains poorly adapted to its chosen fare, necessitating continual feeding. Solitary by nature, the panda roams over a defined territory and seldom interacts with others outside the brief mating season. Once a near-mythical creature to Western naturalists, it remains a living icon of conservation."
 dubois.141.g: "The ambassador of China."
 dubois.142.t: "The Bornean Orangutan Arrives"
 dubois.142.d: "Today we welcome a creature of profound intellect and arboreal grace: the #O Bornean Orangutan#! has settled into its treetop haven."
 dubois.142.f: "The Bornean Orangutan (*Pongo pygmaeus*) is a great ape native to the rainforests of Borneo and Sumatra. Renowned for its elongated arms and russet fur, it is the most arboreal of the apes, constructing nightly nests from branches high in the canopy. Males develop large facial flanges and emit resonant long calls to assert their presence. A solitary and contemplative species, social bonds are typically limited to maternal care. Orangutans demonstrate exceptional problem-solving ability, tool use, and memory, and are considered among the most intelligent of non-human animals."
 dubois.142.g: "A scholar of the branches."
 dubois.143.t: "The Bengal Tiger Arrives"
 dubois.143.d: "A monarch of forest and grassland has arrived at last: the #O Bengal Tiger#! now reigns within its stately enclosure."
 dubois.143.f: "The Bengal Tiger (*Panthera tigris tigris*) is a formidable predator native to the Indian subcontinent. With a vibrant coat marked by bold black stripes, it is among the largest and most striking of the world's felines. Preferring solitary existence, the tiger hunts by stealth and power, often ambushing prey with fatal precision. Its domain includes forest, swamp, and grassland, wherever large ungulates may be found. The tiger has long captured the imagination of poets, princes, and hunters alike—an enduring symbol of majesty and ferocity."
 dubois.143.g: "A true king uncrowned."
 dubois.144.t: "The Malayan Tapir Arrives"
 dubois.144.d: "With singular form and curious habits, the #O Malayan Tapir#! now dwells among our collection of exotic beasts."
 dubois.144.f: "The Malayan Tapir (*Tapirus indicus*) is the largest and most distinctive of the tapirs, and the only member of its genus found outside the Americas. Its coloration—a stark contrast of black and white—serves as disruptive camouflage in the dappled light of Southeast Asia’s tropical forests. Possessing poor eyesight but acute hearing and smell, it is a secretive nocturnal browser. Though its peculiar appearance once confounded early zoologists, it is now appreciated as a relic of an ancient lineage."
 dubois.144.g: "Nature's illusionist."
 dubois.145.t: "The Komodo Dragon Arrives"
 dubois.145.d: "A saurian terror from remote isles now stalks our grounds: the #O Komodo Dragon#! has been safely secured in its habitat."
 dubois.145.f: "The Komodo Dragon (*Varanus komodoensis*) is the world’s largest living lizard, endemic to several Indonesian islands. This apex predator can reach lengths of up to three metres and possesses a powerful tail, serrated teeth, and venomous glands that subdue prey. A skilled ambush hunter, it consumes carrion as readily as it overpowers living quarry. Its fearsome reputation and late discovery by Western science in 1910 lent it an aura of myth. Today it remains a powerful symbol of primordial strength."
 dubois.145.g: "An echo from the age of reptiles."
 dubois.146.t: "The Snow Leopard Arrives"
 dubois.146.d: "Descending from the roof of the world, the elusive #O Snow Leopard#! has joined our collection."
 dubois.146.f: "The Snow Leopard (*Panthera uncia*), known also as the ounce, inhabits the frigid highlands of Central and South Asia. Cloaked in a smoky pelt and blessed with thick fur, powerful limbs, and a long balancing tail, it is exquisitely adapted to mountainous terrain. Silent and seldom seen, it haunts alpine passes in search of wild sheep and goats. Unlike other big cats, it cannot roar, but communicates through a repertoire of hisses, growls, and plaintive mews. Long revered in Central Asian folklore, the snow leopard remains a spectral presence in both nature and culture."
 dubois.146.g: "The ghost of the mountains."
 dubois.147.t: "The Asiatic Cheetah Arrives"
 dubois.147.d: "Fleet as the desert wind, the rare #O Asiatic Cheetah#! has arrived to astound and enlighten our visitors."
 dubois.147.f: "The Asiatic Cheetah (*Acinonyx jubatus venaticus*) is a critically endangered subspecies of cheetah formerly widespread across the Middle East and into India. Distinguished by its lighter coat and slighter build, it remains the fastest land mammal on Earth—capable of explosive sprints that generate enormous internal heat. Its historical association with Indian nobility, who trained them for hunting, has rendered it both a symbol of grace and decline. Now reduced to a tenuous population in Iran, the Asiatic cheetah is a living monument to vanished ranges."
 dubois.147.g: "Vanishing speed."
 dubois.148.t: "The Red Panda Arrives"
 dubois.148.d: "A rare and retiring creature from the misty Himalayas has emerged: the #O Red Panda#! now graces our trees."
 dubois.148.f: "The Red Panda (*Ailurus fulgens*) is a tree-dwelling mammal native to the temperate forests of the eastern Himalayas and southwestern China. Though it shares its name with the giant panda, it belongs to its own distinct family. Noted for its russet fur, ringed tail, and endearing face, the red panda is a nocturnal and crepuscular feeder, subsisting mainly on bamboo. Sensitive to heat and solitary by nature, it spends its days sleeping aloft, curled with tail wrapped protectively over nose. A rare jewel of the canopy, it is treasured yet imperiled."
 dubois.148.g: "Elusive and exquisite."
 dubois.151.t: "The Green Sea Turtle Arrives"
 dubois.151.d: "A venerable voyager of the oceans has found safe harbour: the #O Green Sea Turtle#! now resides in our aquatic pavilion."
 dubois.151.f: "The Green Sea Turtle (*Chelonia mydas*) is a large marine reptile known for its extensive migratory journeys between feeding grounds and nesting beaches. Its streamlined shell, shaped like a teardrop, and broad, flipper-like limbs render it an adept swimmer. Though typically olive to black in hue, colouration varies by region. Adult turtles feed almost exclusively on seagrass, shaping entire underwater meadows through grazing. Long-lived, patient, and enigmatic, the green turtle has been a mariner’s companion and symbol of endurance for centuries."
 dubois.151.g: "Ancient and abiding."
 dubois.152.t: "The Giant Oceanic Manta Ray Arrives"
 dubois.152.d: "A vast, silent leviathan has taken wing beneath the water: the #O Giant Oceanic Manta Ray#! glides now in our great saltwater tank."
 dubois.152.f: "The Giant Oceanic Manta Ray (*Mobula birostris*) is the largest of the rays, with wingspans reaching up to 7 metres or more. Inhabiting tropical and subtropical seas, these gentle filter-feeders soar through the ocean with a grace belying their bulk. Possessing few natural predators, their only real threats are humans. Their skin is smooth and marked with distinctive patterns, making each individual uniquely identifiable. Widely regarded as one of the ocean’s most majestic creatures, the manta ray has long evoked awe in mariners and naturalists alike."
 dubois.152.g: "A phantom with wings."
 dubois.153.t: "The Red Kangaroo Arrives"
 dubois.153.d: "From the sun-scorched plains of Australia bounds our newest guest: the #O Red Kangaroo#! has made its first leap into captivity."
 dubois.153.f: "The Red Kangaroo (*Osphranter rufus*) is the largest living marsupial and a potent symbol of the Australian outback. Males, known as 'Big Reds', are particularly imposing, capable of reaching over 2.4 metres in total length when standing. Their powerful hind legs and elastic tendons allow them to traverse great distances at speeds up to 60 km/h. A true marvel of evolutionary design, the red kangaroo is uniquely adapted to its harsh and arid homeland, combining grace, endurance, and raw athleticism."
 dubois.153.g: "Sprung from a continent of extremes."
 dubois.154.t: "The Koala Arrives"
 dubois.154.d: "Clinging to its perch with drowsy tenacity, the #O Koala#! now slumbers contentedly in our eucalyptus grove."
 dubois.154.f: "The Koala (*Phascolarctos cinereus*) is a marsupial of singular character, known for its sedentary lifestyle and dependence on eucalyptus leaves. With a stout body, prominent ears, and a spoon-shaped nose, it is instantly recognizable and widely beloved. Despite its cuddly appearance, the koala is highly selective in diet and territorial in nature. Spending up to 20 hours a day asleep to conserve energy, it is more contemplative than it is social—an arboreal recluse well suited to its nutrient-poor food source."
 dubois.154.g: "Sleeping beauty of the bush."
 dubois.155.t: "The Platypus Arrives"
 dubois.155.d: "The naturalist’s riddle and schoolboy’s curiosity alike: today the #O Platypus#! makes its public debut."
 dubois.155.f: "The Platypus (*Ornithorhynchus anatinus*) is a monotreme native to eastern Australia and Tasmania. An egg-laying mammal with a duck-like bill, webbed feet, and a beaver-like tail, it confounded 18th-century European scientists who first suspected forgery. Males possess venomous spurs on their hind legs, and all platypuses possess electroreceptors in their bills—used to detect prey in murky waters. Their evolutionary lineage diverges so greatly from other mammals that they have remained an enduring subject of fascination, straddling the line between the familiar and the implausible."
 dubois.155.g: "Proof that nature does not fear contradiction."
 dubois.156.t: "The Southern Cassowary Arrives"
 dubois.156.d: "From the rainforest shadows steps an enigmatic bird of no small reputation: the #O Southern Cassowary#! now patrols its forested paddock."
 dubois.156.f: "The Southern Cassowary (*Casuarius casuarius*) is a flightless bird of great stature and formidable temperament, found in the tropical forests of northern Australia and New Guinea. Distinguished by its tall casque, vivid blue skin, and dagger-like claws, the cassowary is a frugivore by diet but not by disposition. Though shy in the wild, if provoked it may become dangerously aggressive. The function of the casque remains debated—ranging from sexual display to acoustic resonance or protective headgear in dense brush. It is both relic and riddle of a bygone avian world."
 dubois.156.g: "Best observed with deference."
 dubois.157.t: "The New Zealand Sea Lion Arrives"
 dubois.157.d: "A stalwart of sub-Antarctic shores has joined our marine exhibit: the #O New Zealand Sea Lion#! now rests upon the rocks."
 dubois.157.f: "The New Zealand Sea Lion (*Phocarctos hookeri*) is among the rarest and most localized pinnipeds in the world. Males—imposing and dark-maned—may reach up to 2.45 metres in length, while the smaller females are tawny and more refined. Nearly driven to extinction by 19th-century sealing, their colonies are now recovering under protection, particularly in the remote Auckland Islands. A social, coastal species, the sea lion’s powerful build, expressive faces, and familial bonds have made it a subject of enduring charm and scientific interest."
 dubois.157.g: "Once hunted, now hallowed."
 dubois.200.t: "Inauguration of the Natural History Museum"
 dubois.200.d: "Professor [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] has formally inaugurated the Natural History Museum, dedicated to the advancement of natural philosophy and the study of evolution."
 dubois.200.f: "When Prof. [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] announced the opening of our nation's first Natural History Museum, few recalled the considerable exertions required to bring this institution to fruition. The National Museum, previously the custodian of natural history, had resisted the separation, deeming natural history a subordinate pursuit. Through the perseverance and influence of Prof. [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName], the project prevailed. The new museum promises to elevate paleontological inquiry, and the public has already shown keen interest in the mysteries of extinct species and the origins of mankind. Once regarded as a mere adjunct to geology, paleontology now stands as a discipline of repute, its own institutions placing it among the foremost sciences of the age."
 dubois.200.g: "A most edifying establishment!"
 dubois_natural_history_museum_modifier: "Museo de Historia Natural"
 dubois.201.t: "Destino de expedición paleontológica"
 dubois.201.f: "A [concept_dubois_paleontologist] may be dispatched to geological formations, where annual excavations yield fossils. Great Formations may also contain dinosaur bones, varying by continent. The most direct means of access is through sovereign control of the territory, though scientific licenses may be obtained by diplomatic arrangement."
 dubois.201.g: "Perhaps another time."
 dubois.202.t: "Fossil Shark Teeth"
 dubois.202.d: "A paleontological survey has produced a collection of fossilized shark teeth, relics of ancient seas."
 dubois.202.f: "Fossilized shark teeth, often the sole vestiges of these vanished creatures, are among the most abundant of all fossils due to the continual replacement of teeth in living sharks. As early as 1616, Fabio Colonna demonstrated in his treatise De Glossopetris Dissertatio that so-called 'viper tongues' were in fact shark teeth. The genus Squalicorax pristodontus, with its flat, serrated teeth, flourished in the Cretaceous and was distributed globally. Such teeth have been recovered from Mesozoic strata across the Americas, Africa, Asia, and Europe, bearing silent witness to the antiquity and ubiquity of these formidable predators."
 dubois.202.g: "A fine addition to the collection."
 dubois.203.t: "Huellas de dinosaurios?"
 dubois.203.d: "[SCOPE.sCharacter('pb_leader').GetFullName] expresses skepticism regarding a recent discovery by Professor [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName]."
 dubois.203.f: "Upon the announcement of a new find in a geological formation, the leader of the petty bourgeoisie attended to inspect the purported dinosaur footprints. Displaying little appreciation for the evidence, [SCOPE.sCharacter('pb_leader').GetFullName] dismissed the impressions as unremarkable. This philistine attitude provoked a spirited dispute with the professor, who demanded an immediate apology. The quarrel soon escalated, dividing supporters of [SCOPE.sCharacter('pb_leader').GetLastName] and the academic circle of Prof. [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName]."
 dubois.203.g: "These are unmistakably dinosaur tracks."
 dubois.203.h: "The evidence remains inconclusive."
 dubois.204.t: "Paleosinopa"
 dubois.204.d: "A team of scientists has uncovered the skeleton of an early mammal, preserved in remarkable condition."
 dubois.204.f: "Palaeosinopa, a genus of the now-extinct Pantolestidae, flourished from the Upper Paleocene to the Lower Eocene, approximately 59 to 48 million years ago. Fossil evidence, chiefly from North America and occasionally Europe, reveals a robust physique and elongated tail, with shorter forelimbs and longer hindlimbs. Such morphology suggests a semi-aquatic existence, akin to modern otters, while dental structure indicates a diet of animal matter. The fossil beds of the Green River and Willwood Formations are especially rich in specimens, offering valuable insight into the evolutionary history of early mammals."
 dubois.204.g: "A most instructive specimen."
 dubois.204.h: "A suitable token for a colleague."
 dubois.205.t: "Bones Discovered in the Mineshaft"
 dubois.205.d: "Miners in [SCOPE.sState('dubois_excavation_state').GetName] have unearthed bones of a prehistoric species. Prof. [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] has been summoned to investigate."
 dubois.205.f: "The discovery of bones within the mine elicited mixed reactions. While the paleontologist was eager to commence a scientific excavation, mine management feared disruption of operations. Prof. [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] determined that proper excavation would necessitate a temporary halt to mining, prompting protest from industrialists. The find thus became a matter of public interest, with the intelligentsia advocating for scientific investigation. Some propose a compromise—mere documentation without excavation—to avoid impeding industry, though this would preclude direct recovery of the fossils."
 dubois.205.g: "The fossils must be secured for science."
 dubois.205.h: "Permit only a cursory examination."
 dubois.205.i: "Let the miners proceed undisturbed."
 dubois.206.t: "Composita"
 dubois.206.d: "This year, [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')] under Prof. [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] have recovered fine specimens of Composita at the excavation site in [SCOPE.sState('dubois_excavation_state').GetName]."
 dubois.206.f: "Composita, an extinct genus of brachiopods, ranged from the Late Devonian to the Late Permian and exhibited cosmopolitan distribution. Its smooth shell, distinct fold and sulcus, and round pedicle opening are characteristic features. Composita belongs to the family Athyrididae, subfamily Spirigerellinae. These fossils, found on every continent except Antarctica, are esteemed by naturalists for their antiquity and instructive value, far surpassing the mere curiosity of a shell."
 dubois.206.g: "A worthy addition to our cabinet."
 dubois.207.t: "Trilobita"
 dubois.207.d: "Prof. [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] has contributed an exemplary trilobite specimen to the paleontological collection. Estimated at 400 million years old, it is of considerable scientific merit."
 dubois.207.f: "Trilobites, an extinct class of marine arthropods, persisted throughout the Paleozoic era, from the Cambrian to the Permian. Their calcite-reinforced exoskeletons are frequently preserved, enabling reconstruction of their evolutionary diversity. With nine orders, over 150 families, 5000 genera, and more than 15,000 described species, trilobites serve as important index fossils for the Paleozoic and are indispensable to geological and paleontological study."
 dubois.207.g: "Our gratitude to the professor."
 dubois.208.t: "Amonitas"
 dubois.208.d: "Ammonites discovered in [SCOPE.sState('dubois_excavation_state').GetName] further enrich our nation's paleontological holdings."
 dubois.208.f: "Ammonites (Ammonoidea), an extinct order of cephalopods, were extraordinarily diverse, with over 1500 genera and perhaps 30,000 to 40,000 species. Their shells, typically 1 to 30 cm in diameter, are found in marine sediments from the Devonian to the Cretaceous-Paleogene boundary. Ammonites are invaluable index fossils, aiding in the chronological classification of strata. The name 'Ammonis cornua' (Ammon's horns) dates to antiquity, and their study remains central to Victorian geology and paleontology."
 dubois.208.g: "Reserve one for the museum."
 dubois.209.t: "Flora fosilizada"
 dubois.209.d: "[Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')] have recovered fossilized plants of great antiquity from a quarry."
 dubois.209.f: "During the Carboniferous period (circa 360–300 million years ago), vast forests of ferns, horsetails, and lycopods formed the foundation of modern coal deposits. The earliest fossil ferns date to the Lower Devonian (about 400 million years ago), predating the appearance of seed plants. These ancient floras are of immense interest to natural philosophers, illuminating the origins of terrestrial vegetation and the geological processes that shaped the Industrial Age."
 dubois.209.g: "The roots of industry and progress."
 dubois.210.t: "Huevos de dinosaurio"
 dubois.210.d: "Objects once thought to be stones have, upon closer inspection, proven to be fossilized eggs—almost certainly of a dinosaur species."
 dubois.210.f: "The first scientifically documented dinosaur egg fossils were discovered in 1859 in southern France, though initially attributed to giant birds. In 1923, an American Museum of Natural History expedition in Mongolia uncovered eggs now known to belong to Oviraptor, not Protoceratops as first believed. The proliferation of such finds has led to competing classification schemes, and the study of dinosaur eggs remains a subject of lively Victorian debate."
 dubois.210.g: "Let us handle these with utmost care."
 dubois.211.t: "Excavación de dinosaurios"
 dubois.211.d: "While exploring a Great Formation, Prof. [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] has made a remarkable discovery: a dinosaur bone! The [concept_dubois_paleontologist] immediately organized a full-scale dig, hoping to uncover more remains."
 dubois.211.f: "'The combination of such features—some unique among reptiles, others borrowed from groups now distinct—manifested by creatures far surpassing in size the largest living reptiles, will, it is presumed, be deemed sufficient ground for establishing a distinct tribe or sub-order of Saurian Reptiles, for which I would propose the name of Dinosauria.' —Richard Owen"
 dubois.211.g: "Let the excavation begin!"
 dubois.213.t: "Fragmentos fósiles"
 dubois.213.d: "At the dinosaur dig site, scientists have recovered smaller fossil pieces."
 dubois.213.f: "'It may not be the prize we sought, but every fragment adds to our understanding.' —[SCOPE.sCharacter('dubois_paleontologist_scope').GetFullName]"
 dubois.213.g: "Gather the fossils!"
 dubois.214.t: "Hueso de dinosaurio"
 dubois.214.d: "Prof. [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName]'s team has uncovered a new dinosaur bone at the excavation site."
 dubois.214.f: "'At the sight of a single bone, of a single piece of bone, I recognize and reconstruct the portion of the whole from which it would have been taken. The whole being to which this fragment belonged appears in my mind's eye.' —Georges Cuvier"
 dubois.214.g: "Add it to the collection."
 dubois.215.t: "Cráneo de dinosaurio"
 dubois.215.d: "Excavations have revealed a magnificent dinosaur skull."
 dubois.215.f: "'The head was as long or longer than that of a fully grown grizzly bear, and the jaws were deeper in proportion to their length. The muzzle was shorter and deeper than that of a bull-dog. The teeth were all sharp cylindric fangs, smooth and glistening, and of irregular size. At certain distance in each jaw they projected three inches above the gum, and were sunk one inch into the jaw margin, being thus as long as the fangs of a tiger, but more slender. Two such fangs crossed each other on each side of the middle of the front. Besides the smaller fishes, the reptiles no doubt supplied the demands of his appetite.' —Edward Drinker Cope"
 dubois.215.g: "A spectacular find!"
 dubois.216.t: "Esqueleto de dinosaurio"
 dubois.216.d: "After months of careful work, Prof. [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] has uncovered an impressive dinosaur skeleton, with several bones in excellent condition."
 dubois.216.f: "'The skeleton itself was arranged in the Museum of the Philadelphia Academy of Sciences, according to this restoration, and when Professor Cope showed it to me and explained its peculiarities, I noticed that the articulations of the vertebrae were reversed and suggested to him gently that he had the whole thing wrong end foremost. His indignation was great, and he asserted in strong language that he had studied the animal for many months and ought to at least know one end from the other.' —Othniel Charles Marsh"
 dubois.216.g: "Fascinante."
 dubois.220.t: "Excavación terminada"
 dubois.220.d: "El [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')] ha terminado su excavación en el sitio de los dinosaurios. Una importante investigación científica llega a su fin."
 dubois.220.f: "'El cazador de fósiles debe ser un entusiasta científico. Debe estar dispuesto a soportar todo tipo de dificultades, sufrir frío a principios de la primavera y a fines de otoño y principios de invierno, sufrir un calor intenso y el resplandor del sol en los meses de verano, y debe estar preparado para beber agua álcali, y en algunas regiones para combatir el ataque del mosquito y otras muelas. Debe ser una especie de ingeniero para poder manejar grandes masas de piedra y transportarlas sobre desechos de desierto sin carretera al punto de envío más cercano; Debe tener un toque delicado y hábil para preservar los menos fragmentos de hueso cuando se fractura; Debe estar contento con una vida muy simple, porque la profesión rara vez es, si es que alguna vez, remunerativa, y casi invariablemente está mal pagado; Debe encontrar su principal recompensa y estímulo en el sentido del descubrimiento y en la envío de especímenes a los museos que nunca ha visto en beneficio de un público que tiene poco conocimiento o apreciación de los sacrificios que el cazador de fósiles ha hecho '. -Henry Fairfield Osborn"
 dubois.220.g: "Espero un nuevo esqueleto de dinosaurio para nuestra colección, al menos."
 dubois.221.t: "Eusthenopteron"
 dubois.221.d: "Prof. [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] has discovered a rare, prehistoric fish that may represent a crucial step in the transition from aquatic to terrestrial life."
 dubois.221.f: "Eusthenopteron is an extinct genus of lobe-finned fish (Sarcopterygii) from the Upper Devonian of North America and Europe. It is considered a classic example of early Tetrapodomorpha. Eusthenopteron possessed both gills and a primitive lung-swim bladder, as well as a robust fin skeleton. Remarkably, its front fins already show the three limb bones found in land vertebrates: humerus, ulna, and radius. These adaptations suggest it could briefly move outside water. Its two dorsal fins were set far back, with pelvic and anal fins opposite."
 dubois.221.g: "A remarkable evolutionary link."
 dubois.222.t: "Arqueoptérix"
 dubois.222.d: "During an excavation in the Bavarian limestone near Solnhofen, Prof. [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] made a discovery that stunned the scientific world: a fossil that may bridge the gap between reptiles and birds."
 dubois.222.f: "Archaeopteryx is one of the most famous transitional fossils, dating to the Late Jurassic. With feathered wings, teeth, and a long bony tail, it combines avian and reptilian traits. Its discovery provided compelling evidence for Darwin’s theory of evolution, suggesting birds evolved from small theropod dinosaurs."
 dubois.223.t: "Megatherium"
 dubois.223.d: "During a paleontological investigation, Prof. [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName]'s team recovered bones belonging to a giant ground sloth."
 dubois.223.f: "Megatherium was a genus of giant ground sloths that roamed South America until about 10,000 years ago. Reaching the size of elephants, these slow-moving herbivores shaped their environment by uprooting trees and digging for roots. Their extinction is linked to climate change and human activity."
 dubois.224.t: "Ictiosauro"
 dubois.224.d: "The head of the paleontological excavations reports the discovery of a prehistoric reptile that resembles both a fish and a dolphin."
 dubois.224.f: "Ichthyosaurus was a marine reptile from the Jurassic period, adapted for life in the open ocean. Its streamlined body, long snout, and large eyes made it an efficient predator. Unlike most reptiles, it gave birth to live young and is a striking example of convergent evolution with modern dolphins."
 dubois.225.t: "Smilodon"
 dubois.225.d: "The natural history department proudly announces a new find: our paleontologist has uncovered the skeleton of a saber-toothed cat."
 dubois.225.f: "Smilodon, often called the saber-toothed tiger, was a formidable predator of the Americas during the Pleistocene. Its elongated canine teeth and powerful build made it a top carnivore. Fossils from tar pits reveal social behavior and dramatic encounters with other Ice Age megafauna."
 dubois.226.t: "Pterodactilo"
 dubois.226.d: "The bones of a small pterosaur have delighted the scientific community and have already been sent to the Paleontological Collection."
 dubois.226.f: "Pterodactylus was among the earliest pterosaurs, flying reptiles of the Late Jurassic. With a wingspan of up to 1.5 meters, it soared over coastal lagoons, hunting fish and small animals. Its discovery helped establish the diversity of prehistoric life and the evolution of flight."
 dubois.227.t: "Ichthyostega"
 dubois.227.d: "Cuando el Zeppelin aterrizó, la expedición en el hielo eterno encontró un fósil extraordinario que podría revolucionar la paleontología. Se envió rápidamente al paleontólogo principal del país, el Prof. [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName]. ¡Supuestamente es el vínculo faltante entre peces y animales terrestres!"
 dubois.227.f: "Ichthyostega is one of the earliest known tetrapods from the Late Devonian. Its robust limbs and lungs mark a key stage in the evolution from aquatic to terrestrial life. The fossil shows a blend of fish and amphibian features, illuminating the origins of vertebrate life on land."
 dubois.301.t: "Destino de la expedición botánica"
 dubois.301.d: "Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] stands ready to embark on a botanical journey. Which Kind of plants should be the focus of this expedition?"
 dubois.301.f: "\"I wonder if I can find any giant plants for my botanical collection? If only I wouldn't have to search for useful stuff...\""
 dubois.302.t: "Victoria amazonica"
 dubois.302.d: "During his botanical expedition, Prof. [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] encountered a remarkable water lily, unrivaled in grandeur."
 dubois.302.f: "Victoria amazonica, the Amazon giant water lily, belongs to the genus Victoria in the water lily family (Nymphaeaceae). Native to the slow-moving waters of the Amazon basin, it was named in honor of Queen Victoria. Its submerged petiole can reach up to 8 meters, and the floating leaves—rimmed and deeply incised—grow up to 3 meters in diameter in the wild. These incisions prevent tearing and allow excess water to drain after heavy rain. In botanical gardens, leaves typically reach 2 meters across."
 dubois.302.g: "This specimen will be a highlight of our exhibition."
 dubois.302.h: "Catalog and study the specimen for scientific research."
 dubois.303.t: "Atlas atlas"
 dubois.303.d: "Though the expedition focused on plants, Prof. [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] was captivated by a colony of spectacular atlas moths in the rainforest."
 dubois.303.f: "The atlas moth (Attacus atlas) is one of the largest moths in the world, named after the Titan Atlas of Greek mythology. Females are larger than males. The cocoons yield Fagara silk, which is light brown and notably more robust than ordinary silk."
 dubois.304.t: "Amorphophallus titanum"
 dubois.304.d: "In Indonesia, Prof. [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] discovered a colossal Titan Arum, likely the largest flower in the world. The naturalist is thrilled, though the rest of the team complains about its pungent odor."
 dubois.304.f: "The genus Amorphophallus includes around 200 species found from New Guinea to West Africa. A. titanum produces the largest unbranched inflorescence known, reaching over three meters in height. The flower emits a carrion-like scent and generates heat to attract beetles for pollination. Its rare blooms are major attractions in botanical gardens."
 dubois.305.t: "Goliat"
 dubois.305.d: "The discovery of a goliath beetle briefly distracts Prof. [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] from botanical pursuits."
 dubois.305.f: "Goliath beetles (Goliathus) are among the largest and heaviest insects on Earth, belonging to the rose chafer subfamily (Cetoniinae). Larvae can weigh up to 110 grams. Dead specimens are prized by collectors and command high prices."
 dubois.306.t: "A Trove of Orchids"
 dubois.306.d: "The Botanical Expedition has uncovered a dazzling array of orchid species, many previously unknown to science, deep within the rainforest."
 dubois.306.f: "Orchids are famed for their extraordinary diversity—no other plant family boasts such a range of shapes, sizes, and colors. Their blooms can be as small as a pinhead or as large as a dinner plate, and their palette spans delicate whites and greens to vivid reds, blues, and yellows, often in striking combinations. With over a thousand genera and tens of thousands of species, orchids are second only to daisies among flowering plants. Each new discovery enriches our understanding of nature’s ingenuity."
 dubois.306.g: "A splendid addition to our collection."
 dubois.307.t: "Medicinal Plants"
 dubois.307.d: "The expedition has found several remarkable herbs, each with promising medicinal properties."
 dubois.307.f: "Plants have long been the foundation of medicine—over half of all known remedies are derived from botanical sources. Willow bark, for example, contains salicin, the precursor to modern aspirin, and has soothed pain and fever for centuries. Rainforest in particular have a rich flora which may yield new cures, waiting to be studied and understood."
 dubois.307.g: "Analyze the plants for scientific study."
 dubois.307.h: "Gather the herbs for future use."
 dubois.308.t: "Enigmatic Blooms"
 dubois.308.d: "Venturing into an uncharted corner of the rainforest, the expedition encountered a profusion of unfamiliar and striking flowers."
 dubois.308.f: "Their beauty is undeniable, yet local guides warn that these blossoms may be dangerous—perhaps even poisonous. The team faces a dilemma: collect the flowers in quantity, risking unforeseen consequences, or proceed with caution and study them first. Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] must decide how best to balance curiosity and caution."
 dubois.308.g: "Instruct the crew to collect the flowers."
 dubois.308.h: "Let the expedition leader collect and study the blooms."
 dubois.308.i: "Leave these mysterious flowers untouched."
 dubois.309.t: "Opposition Criticizes Botanical Expedition"
 dubois.309.d: "[SCOPE.sCharacter('dubois_sceptical_leader').GetLastName] denounces the botanical expedition as an extravagant use of public funds, arguing that resources should be allocated elsewhere. His protest is as loud as it is persistent."
 dubois.309.f: "'Another expedition? First the zeppelins, then the Pacific, now botanists traipsing through jungles. Archaeologists, paleontologists, zoologists—when will it end? This is nothing but bureaucratic excess!'"
 dubois.309.g: "Recall Prof. [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] at once."
 dubois.309.h: "Scientific inquiry must remain above politics."
 dubois.310.t: "[SCOPE.sCharacter('dubois_naturalist_scope').GetFullName] Falls Ill"
 dubois.310.d: "Prof. [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] has suffered poisoning while collecting botanical samples in the rainforest. The severity of the illness forces an abrupt halt to the expedition."
 dubois.310.f: "While the naturalist is indisposed, the botanical expedition is suspended. No new specimens will be sent until recovery."
 dubois.310.g: "A troubling development."
 dubois.311.t: "Discovery of Exotic Seeds"
 dubois.311.d: "During the botanical expedition, Prof. [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] uncovered rare seeds with significant scientific and agricultural potential."
 dubois.311.f: "The global exchange of crops has shaped agriculture for centuries. Sugar cane, once Mediterranean, flourished in South America; in 1876, Henry Wickham famously smuggled rubber seeds from Brazil to Asia, transforming economies and landscapes."
 dubois.311.g: "Add the seeds to our scientific collection."
 dubois.311.h: "Introduce the new seeds to local agriculture."
 dubois.1000.t: "Le Carnaval des animaux"
 dubois.1000.d: "During a visit to the Zoological Gardens, a composer found inspiration among the lion, elephant, kangaroo, and turtles, leading to a whimsical musical suite titled 'Carnival of the Animals.'"
 dubois.1000.f: "'Carnival of the Animals' (Grande fantaisie zoologique) was composed by Camille Saint-Saëns in 1886 while staying in a small Austrian village. Drawing on earlier sketches from teaching days in Paris, Saint-Saëns crafted this playful chamber work at the urging of students, who enjoyed musical parodies. Concerned for reputation, the composer withheld the piece from publication during their lifetime, as it humorously mimicked animal sounds and gently satirized fellow composers. Only after Saint-Saëns' death did the work reach the public, thanks to publisher Jacques Durand."
 dubois.1000.g: "A zoological masterpiece in music?"
 dubois.1001.t: "Zoological Gardens Entrance"
