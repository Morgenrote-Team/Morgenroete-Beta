 dubois.11.gila: "El monstruo de Gila"
 dubois.1041.gila: "Visite el #o Gila Monster#!"
 dubois.1302.gila: "Monstruos Gila"
 dubois.108.t: "Monstruo de Gila"
 dubois.108.d: "Nuestro zoológico está enriquecido por un nuevo animal exótico: hoy el tan esperado #O Gila Monster#! se trasladó a su nuevo recinto."
 dubois.108.f: "El monstruo de Gila es un lagarto venenoso nativo del suroeste de los Estados Unidos y el noroeste de México. Reconocible por sus distintivas marcas negras y naranjas, es uno de los pocos lagartos venenosos del mundo. Los monstruos de Gila son lentos y principalmente nocturnos, alimentándose de pequeños mamíferos, pájaros y huevos. Almacenan grasa en sus colas, lo que les permite sobrevivir largos períodos sin comida."
 dubois.108.g: "No se ve tan peligroso ..."
