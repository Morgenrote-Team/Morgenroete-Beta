 dubois.158.d: "Nuestro zoológico está enriquecido por un nuevo animal exótico: hoy el tan esperado #O Thylacine#! se trasladó a su nuevo recinto."
 dubois.158.f: "La tilacina, también conocida como el tigre de Tasmania, era un marsupial carnívoro nativo de Tasmania y Australia. Tenía una espalda a rayas distintiva y era principalmente nocturna. Las tilacinas eran cazadores solitarios, confiando en el sigilo para atrapar presas, como pequeños mamíferos y pájaros. Desafortunadamente, debido a la caza y la pérdida de hábitat, la tilacina ahora se considera extinta."
