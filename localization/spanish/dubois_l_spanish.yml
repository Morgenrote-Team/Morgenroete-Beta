 je_naturalist_dies_tt: "Prof. [ROOT.Var('dubois_naturalist_var').GetCharacter.GetLastName] muere" #NT!
  
 dubois.442.t: "Conocimiento geológico" #NT!
 dubois.442.d: "Durante su estadía en las montañas, el [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] examinó la montaña en detalle, la mapeó e hizo interpretaciones científicas. Para sorpresa de todo el equipo de montañismo, los sorprendió a la mañana siguiente con un mapa de socorro que muestra las trampas y las subidas más suaves de la montaña." #NT!
 dubois.442.f: "'¿Por qué hice eso? Oh, estaba un poco aburrido y también había catalogado mis minerales. ¡No es nada especial! Ni siquiera lo coloreé ... '" #NT!
 dubois.442.g: "Gracias a Dios tenemos al Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]" #NT!
 dubois.443.t: "Un buen mineral" #NT!
 dubois.443.d: "El grupo de montañismo ya se estaba quejando de la naturaleza dilly-dalting del geólogo, quien como científico era más una carga que una ayuda; Pero resulta que el Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] descubrió un material raro mientras subía el pico." #NT!
 dubois.443.g: "Qué pequeña sorpresa tan encantadora." #NT!
  
