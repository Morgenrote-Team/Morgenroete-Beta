 dubois.1211.t: "El hábitat en [ROOT.GetState.GetName] se destruye"
 dubois.1211.d: "Como no pudimos proteger el [Concept('concept_dubois_habitat','$concept_dubois_animal_habitat$')] en [ROOT.GetState.GetName] estableciendo un [concept_dubois_nature_reserve], el hábitat ha sido destruido."
 dubois.1211.f: "Desafortunadamente, el establecimiento de la compañía minera llegó al precio de destruir el hábitat de uno de los animales de nuestro país. ¿Pero a quién le importa eso? ¡Las ganancias nos están esperando!"
 dubois.1211.g: "Oh, no. De todos modos."
