 dubois_catch_local_animal_decision: "Atrapar animales locales" #NT!
 dubois_catch_local_animal_decision_desc: "Nuestra nación tiene hábitats animales con especies fascinantes que podrían mostrarse en un [concept_dubois_zoo]. Un experto en animales debe viajar por todo el país durante un año para recolectar [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] para un zoológico." #NT!
  
 dubois_visit_zoo_decision: "Visita el zoológico" #NT!
 dubois_visit_zoo_decision_desc: "Abre el evento del zoológico donde puede visitar su zoológico y ver todos los animales que recogió." #NT!
 dubois_ban_animal_export_decision: "Prohibir la exportación de animales" #NT!
 dubois_ban_animal_export_decision_desc: "Con la prohibición de las exportaciones de animales, estamos dejando en claro en principio que no estamos preparados para vender ninguno de nuestros animales en el extranjero. Otras naciones se abstendrán de consultas." #NT!
 dubois_allow_animal_export_decision: "Permitir exportaciones de animales" #NT!
 dubois_allow_animal_export_decision_desc: "Con un permiso de exportación para animales, podemos obtener un buen ingreso adicional." #NT!
 dubois_collect_specimen_decision: "Recoger [concept_dubois_specimen]" #NT!
 dubois_collect_specimen_decision_desc: "Una colección de diversos [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] de origen zoológico y botánico no solo beneficiaría a nuestros investigadores en el hogar, sino que también representaría una exhibición de la mente y los descubrimientos inquietantes de nuestra nación." #NT!
  
 dubois_safari_decision: "Africa Safari" #NT!
 dubois_safari_decision_desc: "En un safari africano, a través de un seguimiento y captura constantes, se puede capturar un gran juego y luego transportarse a un [concept_dubois_zoo]. Solo es posible atrapar un animal por safari. Dependiendo de la especie animal, difiere si necesita trampas o si tiene que permanecer en su rastro. Como regla general, los animales grandes y lentos necesitan más trampas, mientras que los animales rápidos requieren más seguimiento." #NT!
  
 je_dubois_safari: "Africa Safari" #NT!
 je_dubois_safari_reason: "En un safari africano, a través de un seguimiento y captura constantes, se puede capturar un gran juego y luego transportarse a un [concept_dubois_zoo]. Solo es posible atrapar un animal por safari. Dependiendo de la especie animal, difiere si necesita trampas o si tiene que permanecer en su rastro. Como regla general, los animales grandes y lentos necesitan más trampas, mientras que los animales rápidos requieren más seguimiento." #NT!
 je_dubois_safari_goal: "El Safari de África dura medio año. Si no se atrapa el animal para entonces, el equipo de Safari dejará el país nuevamente, sin éxito." #NT!
 je_dubois_safari_fail: "El Safari de África dura medio año. Si no se atrapa el animal para entonces, el equipo de Safari dejará el país nuevamente, sin éxito." #NT!
  
 je_dubois_dinosaur_excavation: "Excavación de dinosaurios" #NT!
 je_dubois_dinosaur_excavation_reason: "Después de encontrar un hueso de dinosaurio, el profesor [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] ha comenzado una excavación a gran escala. Durante la investigación de un año, es posible, dependiendo de la experiencia, que nuestro [concept_dubois_paleontologist] encuentre uno o tres huesos de dinosaurio más. Al final de la excavación, otro hallazgo de hueso de dinosaurio es posible, por lo que aún no hemos encontrado todos los huesos posibles para un esqueleto de dinosaurio. Se necesitan 5 huesos para construir un esqueleto en la colección paleontológica." #NT!
 je_dubois_dinosaur_excavation_goal: "Después de doce meses, nuestro [concept_dubois_paleontologist] resumirá los resultados." #NT!
  
 je_dubois_mountain_expedition: "Intento de un primer ascenso" #NT!
 je_dubois_mountain_expedition_reason: "Un equipo de montañismo dirigido por [SCOPE.sCharacter('dubois_mountain_expedition_leader').GetFullName] actualmente está intentando escalar una montaña previamente sin climada en [SCOPE.sState('dubois_summit_location').GetName]. La longitud de la expedición y su éxito dependen de la altitud de las montañas y la experiencia del líder." #NT!
 je_dubois_mountain_expedition_goal: "La montaña se sube cuando tenemos suficiente progreso de escalada #O #! y no ocurre un desastre hasta entonces." #NT!
 je_dubois_mountain_expedition_invalid: "La expedición se cancelará si el estado en el que la expedición se lleva a cabo cambia de manos por cualquier motivo." #NT!
  
 dubois_specimen_tt: "¡Ten al menos #G 50,000#! @dubois_specimen! #O biológico [Concept('concept_dubois_specimen','$concept_dubois_specimens$')]#!" #NT!
  
