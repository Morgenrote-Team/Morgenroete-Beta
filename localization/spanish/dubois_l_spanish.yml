 dubois.138.f: "El suricat es una pequeña mangosta que vive en África. Los suricates son extremadamente sociales y viven juntos en paquetes que consisten en hasta 30 animales. Por lo general, viven en madrigueras o cuevas donde pueden esconderse de los depredadores. Por lo general, al menos un su mejor está ocupado para buscar peligro y advertir al paquete. El trabajo de Lookout alterna entre los animales." #NT!
