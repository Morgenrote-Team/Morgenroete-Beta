 dubois.1000.t: "Le Carnaval des animaux" #NT!
 dubois.1000.d: "Durante su reciente visita al zoológico, nuestro compositor fue inspirado en particular por el león, el elefante, el canguro y las tortugas para una pequeña obra humorística, que bautizó 'Carnaval de los animales'." #NT!
 dubois.1000.f: "El 'Carnaval de los Animales', subtitulado Grande Fantaisie Zoologique, fue compuesto por Camille Saint-Saëns en enero de 1886 en un pequeño pueblo austriaco. Aquí, en solo unos días, procesó bocetos tempranos para el Carnaval, que datan de un momento en que trabajaba como maestro en una escuela de música privada en París, encargada por Aristide Dietsch (1861/1865). Cuando las parodias musicales estaban en el plan de estudios allí, Saint-Saëns fue persuadido por sus alumnos para que se den cuenta de una de sus muchas ideas para una pieza musical humorística. Sin embargo, preocupado por su reputación, Saint-Saëns decidió no publicar el trabajo para la orquesta de cámara. Porque aparte del hecho de que el compositor imitó a los animales a través de los instrumentos en las piezas, había parodiado a varios de sus colegas profesionales. Aunque los compositores estaban muertos para entonces, Saint-Saëns no quería molestar a sus admiradores. El trabajo solo fue publicado póstumamente por su editor Jacques Durand." #NT!
