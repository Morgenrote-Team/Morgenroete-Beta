 dubois.1052.t: "Recinto del oso polar"
 dubois.1052.d: "El recinto del #o Polar Bear#! es probablemente el recinto menos naturalista en cada zoológico. No porque el zoosdon no lo intente, sino más aún porque las regiones en las que los zoológicos son solo atrayendo a los visitantes si no están en el Polo Norte. Sin embargo, el recinto rocoso era un buen lugar para los osos polares."
 dubois.1052.f1: "En el amplio recinto del zoológico con temas árticos, una magnífica criatura conocida como el oso polar deambula por su hábitat rocoso, su grueso pelaje blanco y su poderosa estatura que llama la atención. Intrigado por su majestuosa presencia, se acerca a un chopero experto, ansioso por aprender más sobre este icónico depredador Ártico. \ \"Con su denso pelaje, capa de gruesa y patas web, los osos polares están equipados de manera única para sobrevivir en temperaturas heladas. Son excelentes nadadores, capaces de atravesar grandes distancias en busca de alimentos, lo que incluye principalmente sellos. \"."
 dubois.1052.f2: "En el cautivador paisaje polar del zoológico, una madre oso polar cuidadosamente atiende a sus cachorros, su pelaje blanco esponjoso y travesuras juguetones que cautivan a los visitantes de todas las edades. Intrigado por su vínculo maternal, buscas un cuidadoso cero con el sabor, con la esperanza de descubrir más sobre las vidas de estos gigantes del Ártico. \ \"Después de un período de gestación de aproximadamente ocho meses, la hembra da a luz a uno a tres cachorros en una guarida construida en un disco de nieve. Los cachorros confían en la calidez y la nutrición de su madre para la supervivencia, amamantando en su rica leche hasta que estén listos para aventurarse en el mundo helado. El Polar Bear le enseña a sus habilidades esenciales de los Cachorros, como cazar y navegar y navegar por el hielo marino."
 dubois.1052.f3: "En medio del hábitat con temática del Ártico, un oso polar se reclina en un montículo nevado, su majestuosa presencia que emana poder y serenidad. Intrigado por su comportamiento, se acerca a un choque de zoológico bien informado, con la esperanza de comprender la importancia de sus acciones. \ N \ n \ \"Los osos polares son conocidos por su capacidad para conservar energía y mostrar un comportamiento llamado 'hibernación para caminar', comparte el Zookeeper. \ \"Durante los meses de verano, cuando la comida es escasa, ingresan a un estado de actividad disminuida, dependiendo de sus reservas de grasa para sostenerlas. Esta adaptación les ayuda a sobrevivir los períodos delgados hasta que el hielo marino regrese, ofreciendo acceso a su fuente primaria de alimentos, sellos. Al comprender estos comportamientos, podemos proporcionar el cuidado y enriquecimiento apropiados para los osos polares en nuestro zoológico\"."
 dubois.1052.k: "Regreso a los recintos norteamericanos"
 zoo_north_american_enclosures_tt: "Volverás a los recintos norteamericanos del zoológico."
 dubois.1053.t: "Recinto de oso pardo"
 dubois.1053.d: "Un área de madera rugosa cubrió la mayor parte del recinto #o grizzly bear#!. Proporcionó todo lo que necesitan los grizzlies, desde escondites hasta un pequeño estanque para enfriar."
 dubois.1053.f1: "Dentro del recinto del zoológico con temática silvestres accidentales del zoológico, una criatura poderosa e impresionante conocida como el oso pardo deambula con una presencia dominante, su pelaje grueso y su marco descomunal capturan la atención de los visitantes. Intrigado por su naturaleza formidable, te acercas a un cuidadoso zoológico de Zlooke, ansioso por aprender más sobre este icónico oso norteamericano. \ N \ n \ \"El oso pardo, también conocido como el oso marrón norteamericano, es un símbolo de fuerza y ​​desierto, \ \ \ El zoológico comienza. \ \"Estos majestuosos osos están bien adaptados a sus hábitats, con sus cuerpos musculares, garras afiladas y un gran sentido del olfato. Son omnívoros, la búsqueda de una variedad de alimentos, incluidos bayas, peces, mamíferos pequeños e incluso plantas."
 dubois.1053.f2: "En el expansivo hábitat del zoológico del oso pardo, una madre oso pardo guía a sus campos juguetones a través del terreno rocoso, sus abrigos esponjosos y las travesuras juguetones que provocan sonrisas de los espectadores. Intrigado por su dinámica familiar, buscas un choque de zoológico bien informado, con la esperanza de descubrir más sobre las vidas de estos magníficos osos. \ N \ n \ \"Los osos pardos son conocidos por sus fuertes instintos maternos y los vínculos familiares muy unidos, \" El zoológico explica. \ \"Después de un período de hibernación, la madre emerge con sus cachorros, enseñándoles habilidades de supervivencia vitales como pesca, alimentación e identificación de posibles amenazas. Asegura su bienestar e imparte su sabiduría, preparándolas para una vida independiente en la naturaleza. Testificar las interacciones entre la madre y los cachorros es un testimonio del lado de la criaturas de estas potentes criaturas."
 dubois.1053.f3: "En medio del escenario accidentado del recinto de oso pardo, un enorme oso pardo macho lumbers a través del terreno, sus poderosos zancadas y huffs ocasionales que afirman su dominio y territorialidad. Intrigado por su comportamiento, te acercas a un chopero experto, con la esperanza de comprender la importancia de estas pantallas. \ \"Los hombres establecen sus territorios, que los marquen con aroma y vocalizaciones, como un medio para afirmar el dominio y atraer a los posibles compañeros. Se involucran en diversas pantallas, como pararse en sus patas traseras y frotar sus cuerpos contra los árboles, dejar marcas de aroma y comunicar su presencia. Estos comportamientos son integrales a la dinámica social y la crianza del éxito de estos magníficos osos."
 dubois.1053.f4: "¡Los tabloides se están volviendo locos! Uno de nuestros famosos osos pardos había escapado del zoológico, pero mientras los funcionarios aún corrían la alarma, el oso se topó con un hombre fuerte griego en un parque cercano. El hombre fuerte, que solo pasaba el tiempo en un paseo en carruaje con una joven local, actuó rápidamente, luchó a la bestia y golpeó al oso inconsciente. Cuando la policía llegó a la escena, no podían creer que sus ojos, tal era la hazaña. La prensa local rápidamente nombró al hombre fuerte 'The New Hercules' y celebró su valentía. A pesar de que nadie pudo comprender las palabras del hombre fuerte debido a su fuerte acento, se convirtió en un favorito entre los jóvenes inmigrantes y locales por igual. Sin embargo, esto condujo a una serie de accidentes desafortunados, cuando las parejas buscaban deliberadamente el desierto para que los jóvenes pudieran probar su temple para sus damas. \ Nour Grizzly estaba ileso y devuelto al zoológico."
 dubois.1054.t: "Aviario de águila calva"
 dubois.1054.d: "Un aviario rocoso y resistente fue el hogar del #o calvo Eagle#!. gracias a una red sobre el recinto, no era posible que el animal escapara."
 dubois.1054.f1: "Presentada majestuosamente en una rama alta dentro del amplio aviario del zoológico, un magnífico águila calva encuesta sus alrededores con ojos penetrantes, su sorprendente cabeza blanca y su envergadura oscura y poderosa cautivando la admiración de los visitantes. Intrigado por su presencia real, te acercas a un cuidadoso zoológico, ansioso por aprender más sobre este icónico pájaro de presa. \ N \ n \ \"El águila calva es un símbolo venerado de fuerza y ​​libertad\", comienza el zoológico. \ \"Con su impresionante envergadura y garras afiladas, estos aves de aves rapaces son cazadores formidables. Principalmente se alimentan de peces, utilizando su aguda vista para detectar su presa de grandes alturas. La historia de éxito de la conservación del águila calva muestra la importancia de preservar hábitats y proteger a estas aves majestuosas para generaciones futuras\"."
 dubois.1054.f2: "Dentro del aviario naturalista del zoológico, un par de águilas calvas se elevan sin esfuerzo a través del cielo, su vuelo sincronizado y su melodioso llamadas que hacen eco en el aire. Intrigado por su destreza aérea, buscas un contexto de Zlookeeper, con la esperanza de descubrir más sobre la vida de estas aves icónicas. \ \"Durante las exhibiciones de cortejo, el hombre y la mujer participan en una danza aérea impresionante, alza y buceando juntas. Estas exhibiciones no solo fortalecen su vínculo de pareja sino que también sirven como un espectáculo visual. Ser testigo de la gracia y la agilidad de estas aves en vuelo es realmente impresionante."
 dubois.1054.f3: "En medio del pintoresco telón de fondo del hábitat del águila, un águila calva se posa en una rama alta, emitiendo su llamada distintiva que resuena con el espíritu del desierto. Intrigado por sus vocalizaciones, te acercas a un chopero experto, con la esperanza de comprender la importancia de estos sonidos. \ N \ n \ \"Las águilas calvas utilizan vocalizaciones como una forma de comunicación\", comparte el zoológico. \ \"Sus icónicas llamadas agudas, a menudo asociadas con su presencia en la naturaleza, sirven múltiples propósitos. Estas vocalizaciones ayudan a establecer territorio, comunicarse con su pareja y defender su nido. El repertorio vocal del águila calva es un testimonio de su adaptabilidad y su capacidad para prosperar en diversos hábitats."
 dubois.1055.t: "Recinto de Pantera de Florida"
 dubois.1055.d: "El reino del #o Florida Panther#! estaba dominado por plantas subtropicales y un pequeño río. Algunos árboles ofrecían la posibilidad de escalar."
 dubois.1055.f1: "Dentro del exuberante y subtropical recinto del zoológico, un depredador poderoso y ágil conocido como la Pantera de Florida con una gracia silenciosa, su construcción musculosa y su penetrante ojos verdes cautivando la mirada de los espectadores. Intrigado por su estado único, te acercas a un choque de zoológico bien informado, ansioso por aprender más sobre este gran gato cautivador. \ N \ n \ \"La Pantera de Florida es una subespecie notable del Cougar\", comienza el zoológico. \"Endémico de los ricos y diversos hábitats de los humedales y bosques de Florida, estas panteras se han adaptado a prosperar en este entorno distinto. Con sus agudos sentidos, las fuertes mandíbulas y la agilidad increíble, están bien equipados para cazar y sobrevivir en sus hábitats naturales. La Pantera de Florida sirve como un testimonio de la notable diversidad de vida silvestre encontrada en esta región\"."
 dubois.1055.f2: "En medio de la vegetación nativa del hábitat de la pantera, una pantera masculina de Florida emite una llamada baja y reverberante que resuena en el aire, una exhibición de su presencia y territorialidad. Intrigado por sus vocalizaciones, se acerca a un experto en zoológico, con la esperanza de comprender la importancia de estos sonidos. \ \"Los hombres utilizan llamadas, incluidos gruñidos, silbidos y gritos, para establecer su dominio y defender sus territorios. Estas vocalizaciones ayudan a evitar posibles rivales y comunicarse con las mujeres cercanas. Al escuchar su repertorio vocal, los investigadores y los conservacionistas obtienen valiosas medios de comunicación sobre los comportamientos y la dinámica de la población de la Florida Panther."
 dubois.1055.f3: "En medio de la vegetación nativa del hábitat de la pantera, una pantera masculina de Florida emite una llamada baja y reverberante que resuena en el aire, una exhibición de su presencia y territorialidad. Intrigado por sus vocalizaciones, se acerca a un experto en zoológico, con la esperanza de comprender la importancia de estos sonidos. \ \"Los hombres utilizan llamadas, incluidos gruñidos, silbidos y gritos, para establecer su dominio y defender sus territorios. Estas vocalizaciones ayudan a evitar posibles rivales y comunicarse con las mujeres cercanas. Al escuchar su repertorio vocal, los investigadores y los conservacionistas obtienen valiosas medios de comunicación sobre los comportamientos y la dinámica de la población de la Florida Panther."
 dubois.1055.f4: "Inspirado por el destino de la Pantera cautiva, [SCOPE.sCharacter('manzoni_literary_scope').GetFullName] escribió un poema: \ n \ n'his Gaze ha, desde el paso de las barras, tan cansados ​​que no puede sostener. Middle, \ nin que se paralizó una voluntad fuerte. Una imagen entra \ nmoving a través del silencio rígido del cuerpo en el corazón deja de ser."
 dubois.1056.t: "Recinto de bisonte americano"
 dubois.1056.d: "El #o American Bisons#! vivía en un enorme recinto. El recinto trató de ofrecer el mismo paisaje que el Medio Oeste americano. La mayor parte del recinto estaba cubierto por pastos de pradera en los que los bisones podían pastar."
 dubois.1056.f1: "Dentro del amplio recinto del zoológico temático de la pradera, una criatura poderosa y majestuosa conocida como el bisonte estadounidense deambula con una presencia dominante, su enorme marco y su impresionantes cuernos cautivando la atención de los visitantes. Intrigado por su importancia histórica, te acercas a un cuidadoso zoológico, ansioso por aprender más sobre este símbolo icónico del oeste americano. \ \"Estos magníficos herbívoros deambulan por las vastas pastizales en rebaños masivos, dan forma al paisaje y sostienen muchas otras especies. Bison poseen una fuerza y ​​resistencia increíbles, capaz de resistir las duras condiciones climáticas y atravesar grandes distancias en busca de alimentos y agua\"."
 dubois.1056.f2: "En el tranquilo hábitat de bisonte del zoológico, una manada de bisonte americano pasta pacíficamente, sus cuerpos masivos que se mueven al unísono a través de la extensión cubierta de hierba. El sonido de sus cascos golpeando el suelo resuena en el aire, creando una armonía rítmica. Intrigado por su dinámica social, buscas un cuidador del zoológico bien informado, con la esperanza de descubrir más sobre la vida de estos herbívoros icónicos. \ \"Dentro de un rebaño, hay una estructura jerárquica dirigida por machos dominantes conocidos como toros. Estas criaturas majestuosas se involucran en aseo mutuo, se comunican a través de diversas vocalizaciones y exhiben comportamientos fascinantes durante la temporada de reproducción. Observar las interacciones dentro de un rebaño de bisones ofrece una visión de su compleja dinámica social\"."
 dubois.1056.f3: "En medio del paisaje de la pradera enrollable del hábitat de bisonte, un toro masivo se mide, su pelaje peludo y su formidable presencia cautivando la admiración de los visitantes. Intrigado por su comportamiento, te acercas a un choque de zoológico bien informado, con la esperanza de comprender la importancia de sus acciones. \ N \ n \ \"La muestra de dominio y fuerza por parte de un bisonte de toro es una vista cautivadora, \", comparte el zoológico. \ \"Durante la temporada de reproducción, los machos participan en pantallas notables para establecer su estado y competir por las oportunidades de apareamiento. Esto puede incluir empeñar el suelo, revolcar el polvo y bloquear cuernos con rivales en impresionantes batallas de fuerza. Estas exhibiciones son integrales para mantener la estructura social del rebaño y garantizar la supervivencia de su especie."
 dubois.1057.t: "Recinto de cocodrilo"
 dubois.1057.d: "El recinto de cocodrilo era un gran pantano que parecía haber sido sencillo de Florida."
 dubois.1057.f1: "Dentro del cautivador hábitat del humedal del zoológico, una criatura prehistórica y formidable conocida como el cocodrilo acecha justo debajo de la superficie del agua, su escondite escamosa y sus ojos atentos capturando la atención de los visitantes. Intrigado por su antigua apariencia, te acercas a un experto en zoológico, ansioso por aprender más sobre este reptil icónico. \ N \ n \"Los caimanes son reliquias vivas de una época pasada\", comienza el zoológico. \"Estos antiguos reptiles se han mantenido relativamente sin cambios durante millones de años. Son conocidos por sus poderosas mandíbulas y una fuerte mordedura, lo que les ayuda a atrapar y consumir una variedad de presas. Los caimanes juegan un papel esencial en sus ecosistemas al controlar las poblaciones de animales más pequeños y mantener el equilibrio de los hábitats de los humedales\"."
 dubois.1057.f2: "En el tranquilo entorno acuático del zoológico, un cocodrilo se basa en un banco bañado por el sol, su cuerpo blindado y su impresionante tamaño que evoca una sensación de asombro. La vista de su comportamiento de alza cautiva la atención de los visitantes. Intrigado por sus hábitos de sol, buscas un cuidadoso chookeeper, con la esperanza de descubrir más sobre los comportamientos de este antiguo reptil. \"El sol es un comportamiento crucial para ellos. Al disfrutar del sol, los caimanes pueden elevar su temperatura corporal, lo que a su vez mejora su metabolismo y niveles de energía. Este comportamiento es especialmente importante en los meses más fríos cuando su temperatura corporal cae debido al medio ambiente\"."
 dubois.1057.f3: "En medio del exuberante entorno del hábitat de cocodrilo, un gran cocodrilo masculino emite un gruñido profundo y retumbante que reverbera a través del agua, una exhibición de su dominio y territorio. Intrigado por sus vocalizaciones, te acercas a un chopero experto, con la esperanza de comprender la importancia de estos sonidos. \ N \ n \"Vocalizaciones de cocodrilo son un aspecto crucial de su comunicación\", comparte el zoológico. \"Durante la temporada de reproducción, los machos usan sus distintivas llamadas a gritos para establecer el dominio y atraer a las hembras. Estos intercambios vocales ayudan a prevenir confrontaciones entre los hombres competidores. Los caimanes también usan una variedad de otros sonidos, como hises y gruñidos, para comunicarse entre sí y afirmar su presencia en sus hábitats humanales\"."
 dubois.1058.t: "Recinto de axolotl"
 dubois.1058.d: "El recinto de Axolotl era menos un recinto y más un pequeño estanque en una roca. Como los axolotls eran bastante pequeños, los visitantes pudieron acercarse mucho y casi tocar a los pequeños animales."
 dubois.1058.f1: "Dentro del cautivador hábitat acuático del zoológico, una criatura fascinante y de otro mundo conocida como Axolotl se desliza a través del agua, sus branquias externas con volantes y su apariencia única capturan la atención de los visitantes. Intrigado por sus distintas características, se acerca a un chopero experto, ansioso por aprender más sobre este extraordinario anfibio. \ N \ n \"El axolotl es una verdadera maravilla de las habilidades regenerativas y la adaptación\", comienza el zoológico. \"A diferencia de la mayoría de los anfibios, los axolotls conservan sus características juveniles a lo largo de su vida, un fenómeno conocido como Neoteny. Son reconocidos por sus notables poderes regenerativos, capaces de volver a lanzar miembros perdidos e incluso partes de su médula espinal. Estas habilidades han capturado la atención de los científicos e investigadores, proporcionando perspectivas valiosas en la recuperación de los tejidos\"."
 dubois.1058.f2: "En el tranquilo entorno acuático del zoológico, un axolotl descansa sobre una roca sumergida, sus branquias plumosas se mueven suavemente mientras respira bajo el agua. La vista de sus adaptaciones respiratorias únicas cautiva la atención de los visitantes. Intrigado por su comportamiento de respiración, buscas un cuidadoso chookeeper, con la esperanza de descubrir más sobre la vida de este notable anfibio. \ N \ n \"Los axolotls tienen características respiratorias únicas que los distinguen de otros anfibios\", explica el Zookeeper. \"Si bien la mayoría de los anfibios se someten a metamorfosis y desarrollan pulmones para respirar en la tierra, los axolotls permanecen acuáticos y confían en sus branquias externas para extraer oxígeno del agua. Sus branquias son altamente eficientes, lo que les permite respirar bajo el agua a lo largo de sus vidas. Esta adaptación es un testimonio de su especialización para la vida en los entornos acuáticos\"."
 dubois.1058.f3: "En medio de las plantas acuáticas del recinto de axolotl, un grupo de axolotls juveniles interactúa juguetonamente, sus movimientos delicados y su comportamiento inquisitivo que revelan sus encantadoras personalidades. Intrigado por sus interacciones, se acerca a un choque de zoológico bien informado, con la esperanza de comprender la importancia de sus comportamientos. \"Son criaturas relativamente pacíficas, a menudo coexisten pacíficamente con sus compañeros de tanque. Estos anfibios tienen un gran sentido del tacto y pueden detectar vibraciones en el agua. Los axolotls usan estos sentidos para explorar su entorno, localizar alimentos e interactuar entre sí. Sus comportamientos e interacciones juguetones se suman a su atractivo y chaleo\"."
