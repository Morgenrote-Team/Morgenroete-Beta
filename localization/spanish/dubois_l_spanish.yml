 dubois.1069.t: "Recinto de capibara" #NT!
 dubois.1069.d: "El recinto de Capybara presentaba una exuberante área cubierta de hierba que rodea un estanque grande. De inmediato, notaste varios de estos roedores grandes y gentiles que descansaban por el borde del agua, mientras que otros vadearon tranquilamente a través del agua poco profunda. Su comportamiento relajado y su comportamiento grupal muy unido llamaron inmediatamente la atención de los visitantes." #NT!
 dubois.1069.f1: "En el recinto de Capybara con el sol, un pequeño grupo de estos grandes roedores se relaja junto al borde del agua, algunos perezosamente masticando hierba mientras que otros se salen a la sombra. Su comportamiento social tranquilo llama inmediatamente la atención de los visitantes. Curioso sobre su estilo de vida, te acercas a un zoológico para más información. \ "Viven en grupos, a veces tan grandes como 20 o más, y rara vez se ven solos. Sus fuertes lazos sociales son clave para su supervivencia, ofreciendo protección contra los depredadores y ayudándoles a mantener su estructura familiar unida y unida. Se comunican con una variedad de sonidos, incluidos los ronrones y silbatos, para mantenerse conectados entre sí." #NT!
 dubois.1069.f2: "En el bullicioso hábitat de Capybara, un capybara particularmente aventurero entra en el estanque, sumergiéndose hasta la nariz, mientras que los demás hacen lo mismo, salpicando juguetonamente en el agua. La vista de estos grandes roedores que disfrutan de su natación cautiva a los espectadores. Intrigado por este comportamiento, le pides a un zoológico más detalles. \ "Pasan mucho tiempo en el agua, lo que les ayuda a regular la temperatura de su cuerpo y escapar de los depredadores. Incluso pueden dormir en el agua con solo la nariz por encima de la superficie. Esta afinidad por el agua es una parte vital de su comportamiento natural, y es donde se sienten más en casa. \"" #NT!
 dubois.1069.f3: "Mientras observa al grupo Capybara en su recinto, una repentina oleada de movimiento le llama la atención. Uno de los Capybaras más jóvenes ha encontrado un parche de hierba particularmente sabroso y come con entusiasmo, lo que provoca que los demás se reúnan y se unan. La alimentación comunitaria es conmovedora de presenciar, y usted decide aprender más al hablar con un Zookeeper. \ "Su dieta consiste principalmente en hierbas y plantas acuáticas, que comparten voluntariamente entre sí. Tienen un sistema digestivo único que les permite extraer los máximos nutrientes de su dieta fibrosa, a menudo vuelve a digerir sus alimentos para garantizar que obtengan toda la nutrición." #NT!
  
