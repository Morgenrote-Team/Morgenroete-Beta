 dubois.1039.t: "Recinto de tilacina"
 dubois.1039.d: "En el sombrío recinto del zoológico, la esquiva tilacina merodean con gracia a lo largo del perímetro, su espalda rayada y su marco delgado le dan una apariencia casi mítica. Los visitantes, fascinados por su presencia de otro mundo, se reúnen para observar a esta rara criatura. Curioso sobre sus orígenes, te acercas a un zoológico para obtener más información."
 dubois.1039.f1: "\ \"La tilacina, o tigre de Tasmania, es un ejemplo fascinante de evolución convergente\", explica el zoológico. \ \"Aunque parece un canino con su cuerpo en forma de perro y su abrigo rayado, en realidad es un marsupial, más estrechamente relacionado con los canguros y los koalas. Nativo de Tasmania y Australia continental, la tilacina fue una vez el depredador de su entorno."
 dubois.1039.f2: "\ \"Las tilacinas eran principalmente cazadores nocturnos, \", comparte el zoológico. \ \"Confiaron en su agudo sentido de la vista y el oído para localizar a las presas, a menudo cazando solas o en parejas. A diferencia de muchos otros depredadores, las tilacinas eran relativamente silenciosas, utilizando sigilo y paciencia para acercarse a su cantera. Su dieta consistía principalmente en animales pequeños a medianos, incluidas las paredes, las aves y los roedores y los roedores\"."
 dubois.1039.f3: "\ \"Las vocalizaciones de la tilacina fueron raras pero memorables\", explica el Zookeeper. \ \"Producirían una serie de YIP, gruñidos y aullidos, especialmente durante la temporada de reproducción o cuando se sentirían amenazados. Estas llamadas se usaron para comunicarse con otras tilacinas a largas distancias, particularmente en los bosques densos de Tasmania de Tasmania. Aunque su rango vocal no era tan variado como otros predicadores, las llamadas de la tilacina fueron una parte esencial de su comportamiento de comportamiento de su comportamiento, agregando a sustique\"."
