 dubois.1062.t: "Recinto de perezoso de garganta marrón" #NT!
 dubois.1062.d: "El exuberante verde del sloth#! de garganta marrón #o era ideal para el animal lento. Había muchos árboles con los que podían aguantar." #NT!
 dubois.1062.f1: "Dentro del exuberante recinto del zoológico lleno de follaje, una criatura lenta y entrañable conocida como la pereza de garganta marrón se aferra sin esfuerzo a una rama, sus movimientos lánguidos y su naturaleza gentil cautivan la atención de los visitantes. Intrigado por sus adaptaciones únicas, te acercas a un chopero experto, ansioso por aprender más sobre este fascinante mamífero arbóreo. \ N \ n \ "La pereza de garganta marrón es un maestro de la vida de ritmo lento", comienza el zoológico. \ "Estas criaturas notables han evolucionado para prosperar en las copas de las árboles tropicales centrales y sudamericanas. Con sus largas y curvas garras y los músculos especialmente adaptados, los perezosos son perfectamente adecuados para una vida que se pasó colgando hacia arriba. Sus movimientos tranquilos y su metabolismo lento ayudan a conservar la energía y les permiten que sobreviven una dieta que consisten principalmente en las hojas de las hojas"." #NT!
 dubois.1062.f2: "En el tranquilo hábitat arbóreo del zoológico, un perezoso de garganta marrón se abre paso a través del dosel de los árboles, su pelaje peludo y su expresión de ojos abiertos que evocan una sensación de tranquilidad. Intrigado por su estilo de vida, buscas un chopero experto, con la esperanza de descubrir más sobre los comportamientos intrigantes de estos fascinantes mamíferos. \ N \ n \ "Los perezosos de garganta marrón son conocidos por sus adaptaciones únicas y comportamientos fascinantes", explica el Zookeeper. \ "Pasan la mayoría de sus vidas en los árboles, a menudo inmóviles y mezclando con su entorno. Los perezosos tienen un sistema digestivo especializado para procesar las hojas duras y fibrosas que consumen, lo que puede tardar días en digerir." #NT!
 dubois.1062.f3: "En medio de la exuberante vegetación del hábitat de la pereza, un perezoso de garganta marrón cuelga hacia arriba de una rama, aparentemente impasible de la bulliciosa actividad del zoológico. Intrigado por su naturaleza aparentemente relajada, te acercas a un choque de zoológico bien informado, con la esperanza de comprender la importancia de su estilo de vida de ritmo lento. \ "Sus movimientos pausados ​​no solo conservan energía, sino que también les ofrecen un nivel de protección contra los depredadores. Al pasar la mayor parte de su tiempo colgando boca abajo, minimizan su visibilidad y confían en su pelaje especializado para combinarse con el follaje circundante. Es una adaptación cautivadora que muestra las estrategias únicas que emplean los listones para sobrevivir en su hábito arbóreo." #NT!
 dubois.1062.k: "Regreso a los recintos sudamericanos" #NT!
 zoo_south_american_enclosures_tt: "Volverás a los recintos sudamericanos del zoológico." #NT!
  
 dubois.1063.t: "Recinto de jaguar" #NT!
 dubois.1063.d: "El recinto similar a la jungla era el reino del #o jaguar#!. lleno de arbustos verdes, árboles y vegetaciones. Era el lugar perfecto para que el Jaguar se escondiera." #NT!
 dubois.1063.f1: "Dentro del inmersivo recinto del zoológico con temática de la jungla, una criatura poderosa y esquiva conocida como Jaguar merodea con un sentido de propósito, su cuerpo elegante y musculoso se mezcla sin problemas con el exuberante entorno. Intrigado por su reputación como un depredador hábil, te acercas a un cañón con conocimiento, ansioso por aprender más sobre este gran gato icónico. \ N \ n \ "El jaguar, con sus patrones de roseta distintos y la poderosa construcción, es un maestro de la selva tropical, \" El zoológico comienza. \ "Equipado con fuertes mandíbulas y garras afiladas, es un depredador de Apex, capaz de derribar una variedad de presas, incluidos grandes mamíferos, reptiles y peces. Los jaguars son conocidos por sus técnicas de caza sigilosas, a menudo emboscadas con sus víctimas de víctimas con las víctimas rápidas." #NT!
 dubois.1063.f2: "En el cautivador hábitat del jaguar del zoológico, un jaguar elegante y ágil sube con gracia por un árbol, mostrando sus notables habilidades arbóreas. Sus extremidades musculosas y su gran vista cautivan la atención de los visitantes. Intrigado por su destreza en la escalada, buscas un chopero experto, con la esperanza de descubrir más sobre la vida de este enigmático felino. \ "Tienen poderosas extremidades y garras retráctiles que les permiten navegar por los árboles con precisión. Los jaguares a menudo usan ramas de árboles como puntos de vista para encuestar sus alrededores o descansar después de una caza exitosa. Su capacidad para escalar y atravesar el dosel del bosque es un testimonio de su versatilidad como predicadores calificados." #NT!
 dubois.1063.f3: "En medio de la exuberante vegetación del recinto de Jaguar, un poderoso jaguar masculino emite un rugido bajo y resonante que reverbera por el aire, una muestra de su fuerza y ​​territorialidad. Intrigado por sus vocalizaciones, te acercas a un chopero experto, con la esperanza de comprender la importancia de estos sonidos. \ N \ n \ "Las vocalizaciones de los jaguares sirven múltiples propósitos, \" comparte el zoológico. \ "Sus profundos rugidos son una forma de establecer su presencia y defender su territorio. Estas vocalizaciones también juegan un papel en la comunicación con compañeros potenciales, especialmente durante la temporada de reproducción. Los jaguars poseen una amplia gama de vocalizaciones, incluidos los gruñidos, los gruñidos y los sonidos de los alisadores. Al escuchar estas vocalizaciones únicas, los investigadores obtienen valiosas perspicaces en el comportamiento y las dinámicas sociales de estas majestuosas." #NT!
  
 dubois.1064.t: "Gigante gigante de la correa" #NT!
 dubois.1064.d: "El recinto del #o gigante Anteater#! estaba dominado por enormes colinas de hormigas rojas que se sobresalían en el recinto cubierto de hierba. Allí, el oso hormiguero gigante podría deleitarse fácilmente por los pequeños insectos." #NT!
 dubois.1064.f1: "Dentro del hábitat inmersivo del zoológico, una criatura única y fascinante conocida como el oso hormiguero gigante deambula con su hocico alargado y cola arbustiva, cautivando la atención de los visitantes. Intrigado por sus adaptaciones especializadas, te acercas a un choque de zoológico bien informado, ansioso por aprender más sobre este intrigante mamífero que come insectos. \ "Con su hocico largo, lengua pegajosa y garras afiladas, está perfectamente equipado para su dieta especializada. Los antecedentes consumen miles de hormigas y termitas cada día usando su lengua notable, que pueden extenderse hasta dos pies. Su fuerte sentido del olfato les ayuda" #NT!
 dubois.1064.f2: "En el cautivador recinto de adosater del zoológico, un oso hormiguero gigante serpentea a través del hábitat, su distintiva capa en blanco y negro se mezcla con la luz solar moteada que se filtra a través de los árboles. Intrigado por su apariencia única, buscas un chopero experto, con la esperanza de descubrir más sobre el estilo de vida fascinante de este mamífero carismático. \ "Son principalmente animales solitarios, pasando su tiempo alimentando los insectos y descansando en huecos o madrigueras de los árboles. Estos antecedentes tienen un metabolismo lento y baja temperatura corporal, lo que les permite conservar energía. También son excelentes nadadores y pueden cruzarse cuerpos de agua con facilidad usando sus cuerpos boyantes y los largos respuestas actuando como bañeros"." #NT!
 dubois.1064.f3: "En medio del entorno frondoso del hábitat de la oso hormiguero, un oso hormiguero gigante utiliza sus formidables garras para abrir un montículo de termitas, su lengua entrando y saliendo para capturar los pequeños insectos. Intrigado por sus técnicas de alimentación, se acerca a un choque de Zookeper, con la esperanza de comprender la importancia de su comportamiento. \ "Tienen una técnica de alimentación especializada, que implica el uso de sus garras afiladas para romper los montículos de hormigas y termitas abiertas. La lengua del oso hormiguero puede entrar y salir hasta 160 veces por minuto, recogiendo los insectos con notable precisión. Este comportamiento de alimentación ayuda a regular las poblaciones de insectos y desempeña un papel vital en el ecosistema"." #NT!
  
 dubois.1065.t: "Recinto de armadillo de nueve bandas" #NT!
 dubois.1065.d: "#o Armadillos de nueve bandas#! prosperan en varios hábitats desde áreas cálidas y húmedas hasta matorrales, praderas y selvas tropicales. Para el zoológico se eligió una mezcla de estos hábitats." #NT!
 dubois.1065.f1: "Dentro del fascinante recinto del zoológico, una criatura curiosa y blindada conocida como Armadillo de nueve bandas se apresura, su caparazón segmentado y su hocico distintivo que cautivan la atención de los visitantes. Intrigado por sus adaptaciones únicas, te acercas a un experto en zoológico, ansioso por aprender más sobre este mamífero intrigante. \ N \ n \ "El armadillo de nueve bandas es un maestro de defensa y adaptación, \" el zoológico comienza. \ "Su notable caparazón similar a una armadura, compuesta por placas óseas, proporciona protección contra los depredadores. Cuando están amenazados, tienen la capacidad de acurrucarse en una pelota, exponer su caparazón blindado y dejar poco vulnerables a las posibles amenazas. Sus fuertes garras son perfectas para cavar y buscar su dieta preferida de insectos, como Ants and Termites. \"." #NT!
 dubois.1065.f2: "En el cautivador hábitat del armadillo del zoológico, un armadillo de nueve bandas usa su agudo sentido del olfato para oler insectos enterrados, su hocico único que investiga el suelo en busca de una comida. Intrigado por su comportamiento de alimentación, buscas un chopero experto, con la esperanza de descubrir más sobre el estilo de vida fascinante de este mamífero blindado. \ "Confían en gran medida de su sentido del olfato para localizar insectos en el suelo. Con sus afiladas garras y poderosas piernas delanteras, los armadillos cavan en el suelo con facilidad, exponiendo a su presa. Tienen una lengua especializada que puede sondear profundamente en túneles de hormigas y termitas, permitiéndoles extraer sus snacks favoritos con precisión. \"" #NT!
 dubois.1065.f3: "En medio del sustrato arenoso del hábitat del armadillo, un armador armadillo de nueve bandas, dejando atrás un rastro de agujeros poco profundos mientras busca su próxima comida. Intrigado por su comportamiento de excavación, se acerca a un choque de zoológico bien informado, con la esperanza de comprender la importancia de sus acciones. \ N \ n \ "La excavación es un comportamiento esencial para el armadillo de nueve bandas, \" comparte el zoológico. \ "Excavan madrigueras poco profundas, conocidas como 'agujeros de pernos', donde se refugian de temperaturas extremas y amenazas potenciales. Estas madrigueras también proporcionan un lugar seguro para que los armadillos descansen y dan a luz a sus crías. La capacidad de Armadillo para cavar y crear estas madrigueras muestra su adaptabilidad a diversos entornos." #NT!
  
 dubois.1066.t: "Aviario de Condor andino" #NT!
 dubois.1066.d: "Para simular los Andes, el aviario del #o andean condor#! estaba lleno de rocas. Fue construido sobre una pendiente y también presentó un acantilado." #NT!
 dubois.1066.f1: "Dentro del amplio aviario del zoológico, una criatura majestuosa e impresionante conocida como el cóndor andino se eleva con alas extendidas, su inmenso tamaño y apariencia sorprendente cautivando la atención de los visitantes. Intrigado por su grandeza, te acercas a un chopero experto, ansioso por aprender más sobre este ave icónica de los Andes. \ N \ n \ "El cóndor andino es un símbolo de poder y libertad", comienza el zoológico. \ "Con su impresionante envergadura, que alcanza hasta tres metros, es una de las aves voladoras más grandes del mundo. Estas magníficas aves son conocidas por su elegante vuelo y su capacidad para elevarse sin esfuerzo a través de las regiones montañosas de los Andes. Tienen una capacidad única para montar ucletas térmicas, lo que les permite viajar a las vastas distancias en la búsqueda de alimentos. \"." #NT!
 dubois.1066.f2: "En el cautivador aviario del zoológico, un cóndor andino se posa sobre una repisa rocosa, sus plumas brillan a la luz del sol mientras observa los alrededores con una vista aguda. Intrigado por su impresionante visión, buscas un choque de zoológico bien informado, con la esperanza de descubrir más sobre las habilidades notables de este majestuoso pájaro. \ N \ n \ "Anders Condors posee una vista increíble, \", explica el zoológico. \ "Su visión aguda les permite detectar posibles fuentes de alimentos desde grandes alturas, como la carroña o los cadáveres de animales. Desempeñan un papel ecológico importante como la tripulación de limpieza de la naturaleza, lo que ayuda a prevenir la propagación de la enfermedad al consumir carroña. Su capacidad para localizar a las grandes distancias es un testimonio de su increíble agudeza visual visual." #NT!
 dubois.1066.f3: "En medio del pintoresco telón de fondo del recinto del cóndor, un magnífico cóndor andino masculino muestra su impresionante plumaje, extendiendo sus alas y emitiendo una llamada profunda y resonante que reverbera por el aire. Intrigado por su comportamiento, se acerca a un choque de zoológico bien informado, con la esperanza de comprender la importancia de sus pantallas. \ "Se utilizan para los rituales de comunicación y cortejo. Los cóndores masculinos se involucran en pantallas elaboradas para atraer a las hembras, que incluyen difundir sus alas, hinchar sus plumas y emitir vocalizaciones profundas. Estas pantallas muestran su fuerza, vitalidad y idoneidad como una pareja potencial. Testigo de estas exhibiciones es una experiencia notable y un testimonio de los rituales de estos magníficos birds"." #NT!
  
 dubois.1067.t: "Recinto de manatí de las Indias Occidentales" #NT!
 dubois.1067.d: "Los Manatees de las Indias Occidentales tenían una gran piscina donde podían nadar y algunos bancos de arena para acostarse." #NT!
 dubois.1067.f1: "Dentro del sereno hábitat acuático del zoológico, una criatura suave y majestuosa conocida como el manatí de la India Occidental se desliza a través del agua, su gran cuerpo y su comportamiento tranquilo capturan la atención de los visitantes. Intrigado por su presencia pacífica, te acercas a un chopero experto, ansioso por aprender más sobre este icónico mamífero marino. "Estos gentiles gigantes se encuentran en aguas costeras cálidas y ríos de movimiento lento. A pesar de su tamaño masivo, son herbívoros, alimentándose principalmente de plantas acuáticas. Su lento metabolismo y los hábitats de aguas cálidas les ayudan a conservar energía. Desafortunadamente, los manatíes están amenazados por la pérdida de hábitat y las colisiones de los botes. Los esfuerzos de conservación son vitales para proteger a estas suaves criaturas"." #NT!
 dubois.1067.f2: "En las tranquilas aguas del recinto del manatí, un manatí de las Indias Occidentales flota cerca de la superficie del agua, sus aletas rompen suavemente la superficie del agua con cada movimiento. La vista de su comportamiento boyante cautiva la atención de los visitantes. Intrigado por sus hábitos de natación, buscas un choque de zoológico bien informado, con la esperanza de descubrir más sobre la vida de este notable mamífero marino. \ N \ n "Los manatíes tienen una flotabilidad única que ayuda en su movimiento, explica el zoológico. "Sus cuerpos grandes y gruesos y los pulmones llenos de aire contribuyen a su flotabilidad natural, lo que les permite flotar cerca de la superficie del agua. Esta flotabilidad les ayuda a conservar energía y deslizarse sin esfuerzo a través de su hábitat acuático. Sus movimientos lentos y deliberados son un testimonio de su adaptación a su entorno acuático"." #NT!
 dubois.1067.f3: "En medio de las aguas pacíficas del hábitat del manatí, un Manatee de las Indias Occidentales emite una serie de llamadas suaves y melódicas que resuenan a través del aire, una muestra de su presencia y comunicación potencial. Intrigado por sus vocalizaciones, te acercas a un chopero experto, con la esperanza de comprender la importancia de estos sonidos. \ N \ n "Los manatíes son conocidos por sus vocalizaciones únicas", comparte el zoológico. "Estas gentiles criaturas se comunican entre sí a través de una variedad de sonidos, incluidos los chirridos, los silbatos y los clics. Estos intercambios vocales juegan un papel en el mantenimiento de los lazos sociales, ubicándose mutuamente en su entorno submarino e indican las intenciones de apareamiento." #NT!
  
 dubois.1068.t: "Recinto de mono de ardilla" #NT!
 dubois.1068.d: "El recinto de mono Squirrel estaba lleno de árboles y otras cosas para subir y jugar. Era el lugar perfecto para los monos." #NT!
 dubois.1068.f1: "Dentro del vibrante recinto del zoológico con temática de la selva tropical, un grupo de criaturas energéticas y sociales conocidas como monos ardillas se balancean a través de los árboles con agilidad, sus movimientos rápidos y travesuras juguetones que capturan la atención de los visitantes. Intrigado por su comportamiento animado, te acercas a un contexto del zoológico, ansioso por aprender más sobre estos primates cautivadores. \ N \ n "Los monos ardilla son una verdadera delicia para observar", comienza el zoológico. "Estos pequeños primates son conocidos por su energía ilimitada y grupos sociales unidos. Tienen características distintivas como sus máscaras blancas y colas tupidas. Los monos ardientes se comunican a través de una variedad de vocalizaciones, desde llamadas de alarma agudas hasta ronronear. Sus comportamientos cooperativos y las interacciones sociales dinámicas los convierten en una especie fascinante para estudiar"." #NT!
 dubois.1068.f2: "En el bullicioso ambiente de la selva tropical del hábitat del mono, un mono ardilla prepara meticulosamente a su compañero, su interacción estrecha y sus movimientos suaves que revelan la fuerza de sus lazos sociales. La vista de su comportamiento de aseo cautiva la atención de los visitantes. Intrigado por sus interacciones, buscas un choque de zoológico bien informado, con la esperanza de descubrir más sobre las vidas de estos primates carismáticos. \ N \ n "La preparación es un aspecto vital de las interacciones sociales de mono de ardilla", explica el zoológico. "Sirve múltiples propósitos, desde mantener la higiene y eliminar los parásitos hasta el fortalecimiento de los lazos sociales dentro del grupo. Los monos ardillas se dedican a la preparación mutua, donde se preparan el pelaje del otro e incluso limpian las caras de los demás. Estas sesiones de preparación refuerzan las conexiones sociales y contribuyen a la cohesión del grupo"." #NT!
 dubois.1068.f3: "En medio del exuberante follaje del recinto de mono, un mono juguetón juguetón emite una serie de llamadas agudas que hacen eco por el aire, una exhibición de su presencia y comunicación. Intrigado por sus vocalizaciones, te acercas a un choque de zoológico bien informado, con la esperanza de comprender la importancia de estos sonidos. "Sus vocalizaciones van desde fuertes llamadas de alarma hasta sonidos más suaves." #NT!
  
