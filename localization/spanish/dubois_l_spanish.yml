 dubois.228.t: "Haast Eagle"
 dubois.228.f: "\ \"Primero encontramos una gran garra y asumimos que era parte de un dinosaurio, pero luego encontramos más huesos y se hizo cada vez más evidente que era un águila. Afortunadamente, este águila se extinga hoy, ya que probablemente podría haber matado a los humanos\"."
 dubois.228.g: "¡Eso da miedo!"
