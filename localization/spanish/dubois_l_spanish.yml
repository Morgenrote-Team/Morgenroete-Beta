 dubois_nature_protection_tech_desc: "La protección de la naturaleza comenzó con la necesidad de proteger los bosques. Más tarde, las especies animales en peligro de extinción y las áreas enteras de tierra también fueron protegidas. En los siglos XIX y XX, hubo varios proyectos exitosos de conservación de la naturaleza, como la reintroducción del IBEX alpino en los Alpes suizos." #NT!
  
