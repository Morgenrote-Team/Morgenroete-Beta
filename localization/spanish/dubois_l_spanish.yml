 dubois.1041.t: "Los recintos europeos" #NT!
 dubois.1041.d: "El recinto europeo está dominado por una gran área forestal, pero también había otros recintos. Algunos visitantes estaban comiendo y bebiendo algo en un restaurante ubicado en una casa tradicional europea a medias de madera." #NT!
