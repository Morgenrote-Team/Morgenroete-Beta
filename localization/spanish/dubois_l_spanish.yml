 zoo_australian_enclosures_tt: "Volverás a los recintos de Australia y Oceaniano del zoológico." #NT!
  
 dubois.1033.t: "Recinto de rayos de manta" #NT!
 dubois.1033.d: "Un enorme acuario albergaba varios rayos de manta #o#!. La mayor atracción era un túnel con ventanas de las cuales podía ver las mantas majestuosas deslizándose a través del agua." #NT!
 dubois.1033.f1: "En el reino oceánico expansivo, un majestuoso rayo se desliza sin esfuerzo a través de las aguas azules, sus ondulantes alas onduladas. Intrigado por su suave presencia, te acercas a un biólogo marino bien informado, ansioso por aprender más sobre esta cautivadora criatura marina. \ N \ n \ "La manta es un magnífico habitante de los mares, \" comienza el biólogo marino. \ "Con sus cuerpos distintivos en forma de diamante y las aletas pectorales con forma de ala, se adaptan perfectamente a la vida en el océano abierto. Estos gigantes gentiles pueden crecer a tamaños impresionantes, con algunas personas con envergaduras de más de 6 metros, lo que los convierte en uno de los rayos más grandes del mundo." #NT!
 dubois.1033.f2: "En el vibrante arrecife de coral del recinto del hábitat oceánico, un rayo de manta se desliza con gracia a través del ecosistema vibrante, sus movimientos elegantes cautivadores de espectadores. Intrigado por su papel en la comunidad de arrecifes, buscas a un conocedor de zoológico, con la esperanza de descubrir más sobre la importancia de la manta. \ "Como alimentadores de filtros, consumen grandes cantidades de plancton, ayudando a regular las poblaciones de estos pequeños organismos. Al hacerlo, contribuyen a la salud y el equilibrio general del arrecife, lo que respalda la diversa variedad de especies que dependen de estos delicados ecosistemas para la supervivencia"." #NT!
 dubois.1033.f3: "En la vasta extensión del santuario oceánico, un grupo de rayos de manteca nadan con gracia en patrones sincronizados, realizando un ballet submarino fascinante. Intrigado por su comportamiento social, se acerca a un biólogo marino bien informado, con la esperanza de obtener información sobre las fascinantes vidas de las mantas rayas. \ "Se sabe que exhiben comportamientos sociales complejos, a menudo forman grupos y participan en intrincadas exhibiciones de cortejo. También exhiben una fidelidad de sitio sólida, volviendo a sitios específicos de alimentación y limpieza año tras año. Estas interacciones sociales juegan un papel importante en sus vidas y contribuyen a la dinámica general de su población"." #NT!
  
 dubois.1034.t: "Recinto koala" #NT!
 dubois.1034.d: "El recinto #o koala#! estaba dominado por un gran bosque de eucalipto en el que podría detectar algunos de los animales grises." #NT!
 dubois.1034.f1: "Dentro del encantador recinto del zoológico, un somnoliento koala descansa sobre una rama de eucalipto, su esponjosa piel gris se mezcla con la paleta de colores tenue de los alrededores. Intrigado por su pintoresca presencia, te acercas a un sabroso zoológico, ansioso por aprender más sobre este entrañable marsupial. \ N \ n \ "El koala, un encantador nativo australiano, ha capturado los corazones de muchos con su apariencia encantadora, \" El zokekeeper comienza. \ "Estas criaturas arbóreas están perfectamente adaptadas a su hábitat de árbol de eucalipto. Con sus fuertes extremidades, garras afiladas y dígitos opuestos, navegan expertamente las ramas y pasan la mayor parte de su tiempo descansando y festionando en hojas de eucalipto." #NT!
 dubois.1034.f2: "En el recinto de Koala, una madre Koala abraza a su pequeño Joey, su suave vínculo que recuerda a una escena de una era pasada. Intrigado por su relación nutritiva, buscas un cuidadoso chookeeper, con la esperanza de descubrir más sobre el cuidado maternal único del koala. \ N \ n \ "Los koalas son reconocidos por sus excepcionales instintos maternos, \" El Zookeeper explica. \ "Después de un período de gestación de aproximadamente un mes, la madre da a luz a un pequeño y subdesarrollado Joey. El Joey luego se arrastra en la bolsa de la madre, donde continúa creciendo y desarrollándose durante varios meses. La bolsa proporciona calidez, protección y un suministro de leche listo para el creciente Joey"." #NT!
 dubois.1034.f3: "En medio del recinto, un grupo de koalas emite una sinfonía de fuelles bajos y gruñidos suaves, llenando el aire con un ambiente encantador. Intrigado por sus vocalizaciones, te acercas a un chopero experto, con la esperanza de comprender la importancia de estos sonidos. \ N \ n \ "Los koalas no son animales particularmente vocales, pero tienen su propia forma única de comunicarse", comparte el zoológico. \ "Los fuelles bajos, a menudo emitidos por los hombres, sirven como llamadas territoriales, proclamando su presencia a otros koalas. Además, se pueden escuchar gruñidos y resburos suaves durante la temporada de apareamiento o cuando las personas buscan interacción social. Estas vocalizaciones se suman al carlamatorio nostálgico de observar estas amadas criaturas"." #NT!
  
 dubois.1035.t: "Recinto de canguro" #NT!
 dubois.1035.d: "Un recinto como la estepa albergaba el #o canguros#!. estaba dominado por largos gras y algunas rocas rojas." #NT!
 dubois.1035.f1: "En el espacioso recinto del zoológico, un grupo de canguros salta con gracia a través del paisaje, sus poderosas patas traseras las impulsan sin esfuerzo. Sus siluetas distintivas contra el contexto natural evocan una sensación de asombro. Intrigado por su locomoción única, te acercas a un cuidadoso zoológico, ansioso por aprender más sobre estos cautivadores Marsupiales. \ "Con sus poderosas patas traseras y colas largas, los canguros han evolucionado para ser jumeros notables. Esta adaptación extraordinaria les permite cubrir grandes distancias con facilidad, alcanzando velocidades de hasta 40 millas por hora. Es una vista para contemplar, especialmente durante sus exhibiciones juguetones." #NT!
 dubois.1035.f2: "En el pacífico hábitat del canguro del zoológico, un canguro de la madre cunla tiernamente a su Joey en su bolsa, su vínculo evidente en cada movimiento suave. Su pelaje suave y su pastoreo suave evocan un ambiente sereno. Intrigado por su comportamiento nutritivo, buscas un choque de zoológico bien informado, con la esperanza de descubrir más sobre el cuidado maternal único de los canguros. \ "Después de un período de gestación relativamente corto, nace el pequeño y subdesarrollado Joey. Se arrastra instintivamente a la bolsa de la madre, donde continúa creciendo y desarrollando, recibiendo alimento y protección. La bolsa proporciona un entorno cálido y seguro para el Joey, lo que permite crecer a su propio ritmo." #NT!
 dubois.1035.f3: "En medio de la tranquila gabinete de canguro en el zoológico, un canguro masculino emite una serie de gruñidos y clics profundos, comunicando su dominio con otros machos. Intrigado por sus vocalizaciones, te acercas a un chopero experto, con la esperanza de comprender el significado de estos sonidos. \ "Los hombres a menudo emiten profundos gruñidos y clics como una forma de comunicación, afirmando su dominio y estableciendo territorio. Estas vocalizaciones sirven como una advertencia a otros hombres, lo que indica que deberían mantener su distancia. Es una exhibición fascinante de dinámicas sociales dentro del grupo de cangaro." #NT!
  
 dubois.1036.t: "Recinto de ornitorio" #NT!
 dubois.1036.d: "El recinto #o PLATYPUS#! estaba dominado por un gran estanque de agua clara y fresca. En él, los platipios pasaron la mayor parte de su tiempo." #NT!
 dubois.1036.f1: "En el tranquilo hábitat del río del zoológico, una criatura curiosa conocida como el ornitorrinco se desliza con gracia a través del agua, su cuerpo elegante y los pies web que lo impulsan con facilidad. Su apariencia única cautiva a los espectadores. Intrigado por su extraordinaria naturaleza, te acercas a un chopero experto, ansioso por aprender más sobre este notable monotrema. \ N \ n \ "El ornitorrinco es una criatura verdaderamente fascinante y enigmática, \" Comienza el zoológico. \ "Encontrado en los hábitats de agua dulce de Australia, posee una combinación de características que parecen casi paradójicas. Con su factura similar a un pato, cola similar a un castor y pies web, es un testimonio de las maravillas de la evolución. El ornitorrinco es uno de los pocos mamíferos que pone huevos, lo que lo convierte en un ejemplo extraordinario de la diversidad de la naturaleza." #NT!
 dubois.1036.f2: "En la serena recinto del zoológico del zoológico, un ornitro madre acuna tiernamente a su joven en una madriguera cuidadosamente construida, sus cuerpos peludos se unieron en una exhibición de calidez y protección. Intrigado por sus hábitos reproductivos únicos, buscas un choque de zoológico bien informado, con la esperanza de descubrir más sobre el fascinante ciclo de vida del ornitorrinco. "Después del apareamiento, el ornitorrinco femenino se retira a su madriguera, que recauda con hojas y pastos para el aislamiento. Allí, pone de uno a tres huevos coriacos y los incuba durante unos diez días. La plantilla madre luego cuesta a sus jóvenes con leche, que secreta de las glas de mamá especializadas. El placugio es un verdadero marvón de la naturaleza de la naturaleza"." #NT!
 dubois.1036.f3: "En medio de la exuberante vegetación del hábitat del ornitorio, un ornitorrinco masculino emite una serie de gruñidos y clics bajos, una visualización vocal de su presencia y territorialidad. Intrigado por sus vocalizaciones, te acercas a un experto en zoológico, con la esperanza de comprender la importancia de estos sonidos. \ N \ n \ "Platypi se comunica a través de una variedad de vocalizaciones, \" comparte el zoológico. \ "Los machos a menudo emiten bajos gruñidos y clics como llamadas territoriales, señalando su presencia y estableciendo su dominio. Estas vocalizaciones pueden servir como advertencias a otros hombres para mantenerse alejados o como invitaciones a los compañeros potenciales." #NT!
 dubois.1036.f4: "#o PLANTYPUS Perry desapareció del zoológico! #!\nMystery golpeó al zoológico como uno de sus platypi - Perry - ya no puede ubicarse. O huyó de su recinto o es muy bueno para esconderse. Los dos zoológicos, Phineas Flynn y Ferb Fletcher, están seguros de que el pequeño animal regresará en breve. \ "Perry a menudo se esconde en un lugar que nadie lo esperaría. Pero, por lo general, se puede ver nuevamente más tarde el mismo día. Por alguna razón, uno de sus experimentos causó una gran explosión casi tomando la vida del Dr. Doofenschmirtz. Si no fuera por un héroe desconocido, su vida seguramente habría terminado." #NT!
 dubois.1032.g: "¿Un ornitorrinco? ¡Perry el ornitorrinco!" #NT!
 dubois_unknown_hero_modifier: "Héroe desconocido" #NT!
  
 dubois.1037.t: "Recinto de cassowary" #NT!
 dubois.1037.d: "El recinto de Cassowary albergaba un ambiente en forma de jungla para el colorido pájaro. Este es el hogar del jardinero de la selva tropical." #NT!
 dubois.1037.f1: "Dentro del cautivador recinto del zoológico con temática de la selva tropical, una criatura única y enigmática conocida como Cassowary deambula con una poderosa presencia, su sorprendente plumaje azul y negro y un casque de casco distintivo que cautivan la atención de los visitantes. Intrigado por su naturaleza misteriosa, te acercas a un sabor sabroso, ansioso por aprender más sobre este notable pájaro. "Estas grandes aves no voladoras juegan un papel crucial en el mantenimiento del equilibrio del ecosistema. Se conocen como" jardineros de la selva tropical ", ya que su dieta incluye una variedad de frutas y plantas. Al consumir estas frutas y distribuir las semillas a través de sus gotas, los cascos que contribuyen a la regeneración y la sostenibilidad de la lluvia"." #NT!
 dubois.1037.f2: "En el exuberante y verde hábitat del zoológico, un casco se mueve con gracia a través de la maleza, sus poderosas piernas y su apariencia sorprendente evocan una sensación de asombro. Intrigado por sus adaptaciones únicas, buscas un sabor de zoológico bien informado, con la esperanza de descubrir más sobre las características intrigantes de este esquivo pájaro. \ N \ n "Los casswaries son conocidos por sus características y comportamientos distintivos", explica el Zookeeper. "Se cree que su casque, una estructura en forma de casco en la cabeza, juega un papel en la amplificación del sonido y posiblemente en la atracción de compañeros. También tienen garras agudas y dagas en sus pies que pueden usarse para la defensa o para desenterrar alimentos. Estas adaptaciones son un testimonio de su evolución dentro del entorno de la lluvia"." #NT!
 dubois.1037.f3: "En medio del denso follaje del hábitat de cassowary, un casco de cassillo femenino protege su embrague de huevos verdes vibrantes, su mirada atenta revelando a una madre dedicada. Intrigado por su comportamiento de anidación, te acercas a un sabroso zoológico, con la esperanza de comprender la importancia de esta exhibición. "Las hembras asumen la responsabilidad de incubar los huevos y criar a los polluelos, mientras que los machos juegan un papel menos activo. La dedicación de la madre para proteger su embrague y criar a sus jóvenes demuestra la compleja dinámica social de estas aves y su contribución vital al ecosistema de la selva tropical"." #NT!
  
 dubois.1038.t: "Recinto de foca de Nueva Zelanda" #NT!
 dubois.1038.d: "El recinto de foca estaba dominado por un gran lago que tenía varias rocas. Sin embargo, si solo había una manera de ver el sellado debajo del agua ..." #NT!
 dubois.1038.f1: "Dentro de la exhibición de temas costeros del zoológico, una criatura carismática y amante del marina conocida como el león marino de Nueva Zelanda se basa en el sol, su cuerpo elegante y su expresión entrañable capturan la atención de los visitantes. Intrigado por su presencia única, te acercas a un sabor sabroso en el zoológico, ansioso por aprender más sobre este cautivador mamífero marino. "Endémico a Nueva Zelanda, estos leones marinos son conocidos por su naturaleza juguetona y su fuerte vínculo con el entorno marino. Son nadadores y buzos calificados, capaces de cubrir largas distancias en busca de alimentos"." #NT!
 dubois.1038.f2: "En el tranquilo hábitat del mar del zoológico, un león marino de Nueva Zelanda se desliza con gracia a través del agua, sus poderosas aletas lo impulsan con facilidad. La vista de su destreza acuática cautiva la atención de los visitantes. Intrigado por sus habilidades de natación, buscas un choque de zoológico bien informado, con la esperanza de descubrir más sobre la vida de estos mamíferos marinos. "Han simplificado cuerpos y aletas fuertes que les permiten navegar por las corrientes oceánicas y buscan su dieta preferida de pescado, calamares y otras criaturas marinas. Sus grandes ojos proporcionan una excelente visión submarina, lo que les permite detectar presas incluso en aguas turbias. Mirarlos nadar es un testimonio de su adaptación a su entorno marino"." #NT!
 dubois.1038.f3: "En medio de la costa rocosa del hábitat del león del mar, un león marino macho de Nueva Zelanda emite un rugido profundo y resonante que transporta las olas, una muestra de su presencia y territorialidad. Intrigado por sus vocalizaciones, se acerca a un experto en zoológico, con la esperanza de comprender la importancia de estos sonidos. \ N \ n "Las vocalizaciones son parte integral de la dinámica social de los leones marinos de Nueva Zelanda", comparte el zoológico. "Los machos usan sus rugidos distintivos para establecer el dominio y defender su territorio durante la temporada de reproducción. Estas vocalizaciones también juegan un papel en atraer a las hembras para el apareamiento. La variedad de sonidos y exhibiciones en las que se involucran estos leones marinos es un testimonio de su compleja comunicación y estructura social"." #NT!
  
