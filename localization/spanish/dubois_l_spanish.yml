 dubois.1210.t: "El hábitat en [ROOT.GetState.GetName] está en peligro de extinción"
 dubois.1210.d: "La comprensión cada vez mayor de la civilización choca con el [Concept('concept_dubois_habitat','$concept_dubois_animal_habitat$')] en [ROOT.GetState.GetName]. Si no protegemos nuestra vida silvestre local al construir un [concept_dubois_nature_reserve], los animales se extinguirán en aproximadamente 10 años."
 dubois.1210.f: "Máquinas voraces que comen en el suelo. ciudades extensas que devoran más y más tierras. Entrena líneas que cortan las extensiones florecientes. Todos los días los animales pierden más de su reino. Paso a paso, los humanos lo están invadiendo."
 dubois.1210.g: "¡Tenemos que proteger a esos animales!"
 dubois.1210.h: "¡Programas por encima de todo lo demás!"
 dubois_endangered_habitat_tt: "Cuando un [concept_dubois_habitat] se pone en peligro, se eliminará después de 10 años. Puede evitar esto construyendo un [concept_dubois_nature_reserve] en el estado. De esa manera, protegerá el [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] de la extinción."
