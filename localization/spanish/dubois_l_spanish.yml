 dubois.1059.t: "Gila Monster Recinto"
 dubois.1059.d: "El recinto del monstruo de Gila era un paisaje escarpado de terreno arenoso y grietas rocosas. A primera vista, las vibrantes escamas negras y naranjas del lagarto se mezclaban sin problemas con sus alrededores. Luego, lo viste, emergiendo de una madriguera sombreada, su piel gruesa y con forma de cuentas brillando en la luz a medida que se movía con cautela a través de su hábitat."
 dubois.1059.f1: "En el recinto del zoológico horneado al sol, un monstruo de Gila solitario lentamente se abre paso a través del terreno rocoso, sus distintivas escamas negras y naranjas atrapan la luz del sol. El movimiento deliberado, casi pesado de este lagarto venenoso atrae la atención de curiosos espectadores. Intrigado por su apariencia y comportamiento únicos, te acercas a un zoológico para más información. \ \"Se mueve lentamente, conservando energía en el duro entorno del desierto. A diferencia de muchos otros depredadores, no depende de la velocidad, sino en su potente veneno, que utiliza para someter presas como pequeños mamíferos y aves. Su coloración brillante sirve como una advertencia para posibles depredadores, lo que no es un objetivo fácil. \"."
 dubois.1059.f2: "En el recinto rocoso, el monstruo de Gila está parcialmente oculto debajo de una gran roca, su lengua bifurcada se mueve para probar el aire. La vista de esta criatura de aspecto prehistórico, con su piel beady y poderosas mandíbulas, fascina a los visitantes. Curioso sobre sus hábitos de alimentación, busca un zoológico para más información. \ \"Usan sus fuertes mandíbulas para aplastar los huevos de pájaros y reptiles, uno de sus alimentos favoritos. Después de una comida, pueden almacenar grasa en sus colas, lo que los sostiene durante largos períodos sin comida. Esta adaptación es crucial para sobrevivir en el desierto árido donde la comida puede ser escaso\"."
 dubois.1059.f3: "Mientras observa el monstruo Gila en su hábitat del desierto, nota que se sube cuidadosamente sobre rocas e inspeccionando las grietas. El ritmo deliberado de sus movimientos y la forma en que explora metódicamente su entorno despierta su interés. Queriendo aprender más sobre este comportamiento intrigante, te acercas a un zokeeper. \ \"Pasan la mayor parte del día escondidos en madrigueras o debajo de rocas para evitar el calor extremo. Cuando emergen, son meticulosos en sus movimientos, utilizando su agudo sentido del olfato para localizar presas o encontrar un lugar seguro para descansar. Su estilo de vida solitario y secreto los ha ayudado a prosperar en algunos de los entornos más estrictos\"."
