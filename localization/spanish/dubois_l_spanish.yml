 dubois.7.t: "¡La polilla salpicada evoluciona!"
 dubois.7.d: "El Dr. [ROOT.Var('dubois_naturalist_var').GetCharacter.GetLastName] notó que la apariencia de la polilla pimienta cambió en los últimos años, lo cual es evidencia clara de la teoría de la evolución."
 dubois.7.f: "\ \"A medida que los abedules en los que las vidas de la polilla salpicada se vuelven cada vez más oscuras debido a la contaminación, podemos ver, que el número de polillas oscuras claramente levantadas. A medida que los depredadores se comen más polillas blancas porque son mucho más visibles, las polillas oscuras comienzan a asumir. Históricamente#!, El cambio evolutivo en el color de la polilla salpicada se observó ya en 1848 en Manchester. No fue sino hasta 1896 que J. W. Tutt demostró que era un caso de selección natural."
 dubois.7.g: "¡Evidencia clara de evolución!"
