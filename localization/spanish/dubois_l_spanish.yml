 dubois.1049.t: "Recinto de alce"
 dubois.1049.d: "En el recinto boscoso del zoológico, un alce europeo majestuoso se mantiene alto, sus astas masivas que se extienden hacia el cielo."
 dubois.1049.f1: "El comportamiento tranquilo de los alces y el tamaño imponente llaman la atención de los visitantes, que se maravillan de la gran escala de este gentil gigante. Curioso acerca de sus impresionantes astas, se acerca a un zoológico para más información. \ N \ \"Elces europeos, o alces como se les conoce en América del Norte, son los miembros más grandes de la familia de los ciervos\", explica el zoológico. \ \"Sus astas pueden abarcar hasta seis pies de ancho y se usan principalmente durante la temporada de celo, cuando los machos compiten por los compañeros. Estas astas se desprenden y regresan cada año, con el nuevo conjunto cada vez más grande y más intrincado a medida que las medidas de alce\"."
 dubois.1049.f2: "En la esquina sombreada del hábitat de alces, un gran alce europeo masculino reduce su cabeza masiva para pastar sobre tiernos brotes y hojas. El movimiento tranquilo y rítmico de sus mandíbulas mientras mastica es casi hipnótico, atrayendo a una multitud de espectadores. Intrigado por los hábitos de alimentación de los alces, buscas un zoológico para aprender más. \ N \ \"Elk son navegadores, \", explica el zoológico. \ \"A diferencia de los pastores, que comen principalmente hierba, los alces prefieren alimentarse de una variedad de vegetación, incluidas las hojas, la corteza y las plantas acuáticas. Tienen un gran sentido del olfato, lo que les ayuda a localizar las plantas más nutritivas en su entorno. En la naturaleza, pueden consumir hasta 70 libras de alimentos en un día, lo que es necesario para mantener sus grandes cuerpos."
 dubois.1049.f3: "En medio de los árboles de susurro del recinto, un alce europeo de repente deja escapar un broma profunda y resonante, su llamada resonando por el aire. El sonido llama la atención de todos los cercanos, que se detienen para escuchar este grito primario. Curioso sobre la importancia de esta vocalización, te acercas a un zoológico para los conocimientos. \"During the breeding season, male elk use these loud vocalizations to establish dominance and attract females. The call can be heard over long distances and is often accompanied by displays of antlers and aggressive posturing. It's a powerful reminder of the elk's role as a dominant force in its natural habitat.\""
