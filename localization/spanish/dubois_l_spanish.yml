 dubois.2011.d_asia: "El Prof. [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] es el [concept_dubois_paleontologist] líder de nuestro país. [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetSheHe] actualmente está realizando encuestas en una formación de rocas en #YELLOW Asia#!."
 dubois.2011.d_australia: "El Prof. [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] es el [concept_dubois_paleontologist] líder de nuestro país. [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetSheHe] actualmente está realizando encuestas en una formación rocosa en #YELLOW Australia#!."
 dubois.2011.d_to_location: "El Prof. [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] es el [concept_dubois_paleontologist] líder de nuestro país. [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetSheHe] actualmente viaja a una formación rocosa para examinarla más de cerca."
 dubois.2011.d_from_location: "El Prof. [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] es el [concept_dubois_paleontologist] líder de nuestro país. [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetSheHe] actualmente regresa de una caza fósil."
 dubois.2011.d_default: "El Prof. [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] es el [concept_dubois_paleontologist] líder de nuestro país. [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetSheHe] actualmente no tiene asignación."
 dubois.2011.d_other: "El Prof. [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] es el [concept_dubois_paleontologist] líder de nuestro país. [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetSheHe] está ocupado en otro lugar en este momento."
 dubois.2011.f: "[ROOT.Var('dubois_paleontologist_var').GetCharacter.GetFullName] tiene una paleontológica total [concept_academics_experience] de #G [ROOT.Var('dubois_paleontologist_var').GetVariable('dubois_paleontologist_experience_var').GetValue]#!\n\nPalaeontologists puede encontrar nuevos fósiles en formaciones cada año. Las excelentes formaciones también tienen la oportunidad de descubrir huesos de dinosaurios raros que pueden usarse para reconstruir esqueletos. Para hacer esto, el [concept_dubois_paleontologist] debe asignarse a una formación. Si ninguna formación está dentro de las fronteras de uno, un acuerdo de licencia paleontológica también se puede negociar con un país que tiene una gran formación. Sin asignación a una formación, el paleontólogo permanece inactivo. Sin embargo, durante este tiempo, [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetSheHe] se puede usar para expediciones, reconstrucción ósea de dinosaurio, construcción de esqueletos o remontación esquelética."
 dubois.2011.g: "Investigar formaciones en América del Norte."
 dubois.2011.h: "Investigar formaciones en América del Sur."
 dubois.2011.i: "Investigar formaciones en Europa."
 dubois.2011.j: "Investigar formaciones en África."
 dubois.2011.k: "Investigar formaciones en Asia."
 dubois.2011.l: "Investigar formaciones en Australia."
 dubois.2021.t: "Fósiles especiales"
 dubois.2021.d: "Esta colección alberga algunos de los fósiles más extraordinarios que se encuentran hasta la fecha."
 dubois.2021_amber: "#T Amber#!\nThe Resina ha preservado un insecto que tiene millones de años. \ N \ n"
 dubois.2021_ammonite: "#T amonita#!\nTens de miles de especies de amonitas moldeó los mares durante 350 millones de años. \ N \ n"
 dubois.2021_archaeopteryx: "#T ArchaeopteryX#!\nThis 'Pájaro primitivo' es considerado por algunos investigadores como un posible vínculo entre reptiles y aves. \ N \ n"
 dubois.2021_composita: "#T composita#!\nComposita eran una especie generalizada que vivía desde el difunto Devónico hasta el Pérmico tardío. \ N \ n"
 dubois.2021_eusthenopteron: "#T eusthenopteron#!\nThis Los peces pueden haber sobrevivido en una cuenca fluvial seca y se cree que es un paso importante hacia los anfibios. \ N \ n"
 dubois.2021_ichthyosaurus: "#T IchThyosaur#!\nThis Reptile no solo se parecía cercano a un delfín, sino que también era vivipríaco. \ N \ n"
 dubois.2021_ichthyostega: "#T Ichthyostega#!\nA Posible enlace faltante entre peces y tetrapods. \ N \ n"
 dubois.2021_megatherium: "#T Megatherium#!\nA Sloth de tierra gigante. Desafortunadamente una especie extinta también. \ N \ n"
 dubois.2021_pterodactylus: "#T pTerodactylus#!\nA Pequeño pterodactil de cola corta que probablemente vivía en costas. \ N \ n"
 dubois.2021_smilodon: "#T Smilodon#!\nOne de los depredadores de dientes de sable más conocidos. \ N \ n"
 dubois.2021_trilobite: "#T trilobite#!\nThe numerosos sucesos y estratificación de estos artrópodos los convierten en fósiles de índice importantes para el paleozoico."
 dubois.2041.t: "Huesos de dinosaurio"
 dubois.2041.d: "Aquí los huesos de los dinosaurios se pueden reconstruir a partir de fósiles y los huesos de dinosaurio se pueden construir en esqueletos de dinosaurio."
 dubois.2041.f: "De cinco huesos de dinosaurio de una región continental, un [concept_dubois_paleontologist] puede reconstruir un dinosaurio completo. Un paleontólogo experimentado también puede intentar reconstruir un hueso de dinosaurio de 20 fragmentos fósiles. Un hueso de dinosaurio solo se puede reconstruir si al menos un hueso de dinosaurio está disponible para orientación. Para realizar cualquiera de las acciones, el paleontólogo no debe estar agotado ni ocupado. Su éxito depende en gran medida de la experiencia paleontológica. \ N \ n#G [ROOT.Var('dubois_north_american_dinosaur_bone').GetValue]#! Dinosaurio de América del Norte Bones \ n#G [ROOT.Var('dubois_south_american_dinosaur_bone').GetValue]#! Bonos de dinosaurio de América del Sur \ N#G [ROOT.Var('dubois_european_dinosaur_bone').GetValue]#! Dinosaurio europeo Bones \ n#G #G1#! Bonos de dinosaurio africanos \ n#G #G4_3 ASIAN DINOSAU BONES #G7#! huesos de dinosaurio australiano"
 dubois.2041.g: "Reconstruya un hueso de dinosaurio a partir de fósiles."
 dubois.2042.t: "Hueso de dinosaurio reconstruido"
 dubois.2042.d: "El profesor [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] tuvo un éxito completo: con la ayuda de su conocimiento científico, pudo reconstruir un hueso de dinosaurio a partir de fragmentos fósiles."
 dubois.2042.f: "Fue un juego de rompecabezas estimulante, pero que no planteó un problema para nuestras habilidades superlativas de [concept_dubois_paleontologist]. Después de unos meses de estudio y una combinatoria sofisticada, logró reconstruir piezas de hueso de restos fósiles del tamaño de un fósforo y, por lo tanto, las partes clave de una especie de dinosaurio a partir de las cuales solo se conocían los huesos sueltos."
 dubois.2042.g: "¡Espléndido!"
 dubois.2043.t: "Profesor perplejo"
 dubois.2043.d: "A pesar de los meses de pruebas, el profesor [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] no pudo producir ningún resultado en lo que respecta a los materiales utilizados. ¡Lástima que los fósiles!"
 dubois.2043.f: "¿Dónde perteneció esta parte de nuevo? ¿Y esto? Pero si esta pieza pertenecía a esta, entonces la otra ya no podía encajar. Finalmente, el [concept_dubois_paleontologist] no pudo soportarlo más. Había estado golpeando su cabeza toda la noche, pero no pudo y no logró obtener un conocimiento útil de los objetos que se encuentran tan lejos como el que debe haber sido el esqueleto del dinosaurio una vez."
 dubois.2043.g: "¡El profesor desperdició nuestros fósiles!"
 dubois.2044.t: "Esqueleto perfectamente ensamblado"
 dubois.2044.d: "Nuestro [concept_dubois_paleontologist] hizo un trabajo increíble al armar el esqueleto, agregando una pieza significativa a la colección de historia natural."
 dubois.2044.f: "Los aplausos atronadores llenaron la exposición cuando el profesor presentó al esqueleto de dinosaurio recién reunido al público. Al hacerlo, resolvió algunos problemas que habían ocupado expertos durante años y mostró un enfoque completamente nuevo para interpretar los huesos del dinosaurio. Los paleontólogos internacionales presentes buscaron hablar con el profesor y quieren construir hallazgos similares en sus colecciones de una manera muy similar. Algunos incluso fueron tan lejos como para llamar a [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetFullName] un genio de rompecabezas, después de haber logrado hacer lo que otros habían tardado en décadas en hacer de inmediato."
 dubois.2044.g: "Excelente trabajo, Prof. [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName]."
 dubois.2045.t: "Esqueleto ensamblado imperfectamente"
 dubois.2045.d: "El profesor [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] hizo todo lo posible, pero desafortunadamente el esqueleto de dinosaurio ensamblado tiene algunos errores."
 dubois.2045.f: "Cuando se presentó el nuevo esqueleto de dinosaurio en la colección de historia natural, hubo aplausos educados pero más bien restringidos. Aunque el paleontólogo principal del país lo había intentado todo, los colegas profesionales pudieron descubrir algunos defectos el día de la presentación que nubló el rendimiento. Sin embargo, el esqueleto cumple con los requisitos, al menos en términos amplios, y debe enriquecer la exposición, incluso si será necesario un retoque en los próximos años."
 dubois.2045.g: "Funciona, ¿no?"
 dubois.2046.t: "Esqueleto mal ensamblado"
 dubois.2046.d: "El esqueleto reunido por [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetFullName] izquierda expertos ... asombrado. Aunque no en la forma en que la sociedad paleontológica esperaba."
 dubois.2046.f: "Fue un día memorable, superado solo por la naturaleza extraña del evento. El Prof. [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] presentó el nuevo esqueleto de dinosaurio bajo una lona con gestos dramáticos y aplausos atronadores esperados. Pero en cambio: silencio. Los susurros siguieron. Entonces: diversión. Los investigadores involucrados sonrieron, otros se unieron, hasta que finalmente un colega, medio riendo, medio incrédulo, apuntó a la quimera empedrada y gritó: \"¿Es un dinosaurio de tres cabezas?\""
 dubois.2046.g: "¡Esto debe ser una broma!"
 dubois.2051.t: "Esqueletos de dinosaurio"
 dubois.2051.d: "Los esqueletos de dinosaurio son el orgullo de cualquier colección de historia natural. Los esqueletos perfectamente ensamblados tienen un efecto positivo en nuestra clasificación de dinosaurios."
 dubois.2051.f: "Nuestra colección de dinosaurios consiste en los siguientes esqueletos: \ n \ n"
 dubois.2051.ankylosaurus: "Anquilosaurio"
 dubois.2051.diplodocus: "Diplodocus"
 dubois.2051.triceratops: "Triceratops"
 dubois.2051.tyrannosaurus: "Tyrannosaurus rex"
 dubois.2051.stegosaurus: "Estegosaurio"
 dubois.2051.antarctosaurus: "Antarctosaurio"
 dubois.2051.argyrosaurus: "Argyrosaurus"
 dubois.2051.iguanodon: "Iguanodón"
 dubois.2051.plateosaurus: "Plateosaurio"
 dubois.2051.giraffatitan: "Jirafatitán"
 dubois.2051.spinosaurus: "Espinosaurio"
 dubois.2051.psittacosaurus: "Psitacosaurio"
 dubois.2051.velociraptor: "Velociraptor"
 dubois.2051.muttaburrasaurus: "Muttaburrasaurio"
 dubois.2051.rhoetosaurus: "Rhoetosaurio"
 dubois.2051.g: "Visite los esqueletos norteamericanos."
 dubois.2051.h: "Visite los esqueletos sudamericanos."
 dubois.2051.i: "Visite los esqueletos europeos."
 dubois.2051.j: "Visite los esqueletos de África."
 dubois.2051.k: "Visita los esqueletos asiáticos."
 dubois.2051.l: "Visite los esqueletos australianos."
 dubois.2101.t: "Un esqueleto mejorado"
 dubois.2101.d: "Los esfuerzos de nuestro [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')] han dado fruto: el esqueleto previamente defectuoso ha mejorado significativamente."
 dubois.2101.f: "Tomó un tiempo pensar en el animal prehistórico, su locomoción, su entorno ecológico y muchas otras circunstancias antes de que el profesor [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] tuviera la idea crucial de poner algunos huesos en su lugar correcto. El esqueleto completo se actualizó significativamente."
 dubois.2101.g: "¡Se ve mucho mejor!"
 dubois.2102.t: "Un esqueleto inalterado"
 dubois.2102.d: "A pesar de los numerosos intentos de mejorar el esqueleto, nuestro [concept_dubois_paleontologist] no tuvo éxito."
 dubois.2102.f: "El profesor [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] mantuvo una gran atención en el tratamiento del esqueleto. En un esfuerzo por no destruir demasiado y para proceder con cautela, permaneció tan cuidadoso que no cambió casi nada."
 dubois.2102.g: "Inalterado? ¿Qué es este [concept_dubois_paleontologist] realmente pagado?"
 dubois.2103.t: "Un esqueleto deteriorado"
 dubois.2103.d: "Tal vez hubiera sido mejor no hacer que [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetFullName] trabaje en un esqueleto de dinosaurio."
 dubois.2103.f: "Fue extremadamente sorprendente para todos los involucrados cuando el profesor [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] presentó la 'versión revisada' del esqueleto. No menos importante porque una cadera ahora descansaba sobre uno de los hombros y una segunda cola formidable complementa al animal en la frente."
 dubois.2103.g: "¡Ese tonto lo empeoró!"
 dubois.2111.t: "Sección de dinosaurios de América del Norte"
 dubois.2111.d: "¿Qué esqueleto de dinosaurio visitar?"
 dubois.2111.f: "Los dinosaurios norteamericanos se encuentran entre los más conocidos de su tipo. Se encontraron numerosas especies de dinosaurios en la Formación Morrison a fines del siglo XIX. Los especímenes conocidos son Anquilosaurus, Diplodocus, Triceratops y Tyrannosaurus Rex."
 dubois.2111.g: "Anquilosaurio."
 dubois.2111.h: "Diplodocus."
 dubois.2111.i: "Triceratops."
 dubois.2111.j: "Tyrannosaurus Rex."
 dubois.2111.k: "Estegosaurio."
 dubois.2112.t: "Anquilosaurio"
 dubois.2112.f: "Anquilosaurus es un género notable de dinosaurio blindado que prosperó durante el período del Cretácico Tardío, hace aproximadamente 68 a 66 millones de años. Perteneciente al grupo de dinosaurios herbívoros conocidos como anquilosauridos, esta criatura prehistórica se celebra por sus adaptaciones defensivas distintivas e impresionantes. Su característica más emblemática fue el club de cola, formado por una densa perilla de hueso en la punta de su cola, que probablemente sirvió como un elemento disuasorio contra los atacantes y una herramienta para el combate intraespecífico. Con una longitud de alrededor de 20 a 30 pies, Anquilosaurus era un herbivoro cuadrúpedo, utilizando su vejiga ancha para cultivar. Su cabeza relativamente pequeña, en comparación con su cuerpo sustancial, indica hábitos de alimentación selectivos en plantas y arbustos bajos."
 dubois.2113.t: "Diplodocus"
 dubois.2113.f: "Diplodocus representa un género emblemático de dinosaurios colosales de cuello largo que floreció durante el período Jurásico Tardío, hace aproximadamente 154 a 152 millones de años. Clasificado como un saurópodo, Diplodocus es reconocido por su notable cuello alargado y un inmenso tamaño, personificando la grandeza de la vida prehistórica. Su impresionante longitud de hasta 90 pies lo convirtió en uno de los animales terrestres más largos en haber existido, mientras que su esqueleto relativamente ligero y su postura cuadrúpedal facilitaron un movimiento eficiente. La evidencia fósil sugiere que estos dinosaurios probablemente habitaron entornos exuberantes a lo largo de las riberas de los ríos, donde la amplia vida vegetal estaba fácilmente disponible."
 dubois.2114.t: "Triceratops"
 dubois.2114.f: "Triceratops se erige como un género icónico de dinosaurios con cuernos que prosperó durante el período del Cretácico Tardío, hace aproximadamente 68 a 66 millones de años. Clasificado como una ceratopsid, Triceratops se celebra por su apariencia distintiva, marcada por una impresionante variedad de cuernos faciales y un adorno óseo en la parte posterior de su cabeza. Su volante, adornado con fenestrae e patrones intrincados, probablemente jugó papeles en el reconocimiento de especies, la termorregulación y las posibles exhibiciones de combate. Su pico robusto le permitió recortar eficientemente la vegetación, y sus poderosas mandíbulas podrían moler el material vegetal duro. La evidencia fosilizada de los huesos de Triceratops sugiere que puede haber participado en comportamientos sociales e interacciones jerárquicas dentro de los rebaños."
 dubois.2115.t: "Tyrannosaurus rex"
 dubois.2115.f: "Tyrannosaurus Rex, comúnmente conocido como T. Rex, es un dinosaurio depredador icónico y colosal que deambulaba por la tierra durante el período del Cretácico Tardío, hace aproximadamente 68 a 66 millones de años. Perteneciente al grupo de Dinosaurios Terópodos, T. Rex se paró en la cima de la cadena alimentaria prehistórica como uno de los depredadores terrestres más grandes que jamás haya existido. Su imponente cráneo, equipado con dientes serrados del tamaño de un plátano, sugiere una dieta carnívora que comprende principalmente otros dinosaurios. Sus poderosas extremidades traseras estaban adaptadas para el movimiento rápido, mientras que sus brazos desproporcionadamente pequeños, que recuerdan a las estructuras vestigiales, continúan cautivando la investigación científica. El debate sobre sus comportamientos de caza, ya sea como depredador activo o carroñero, sigue siendo sujeto de investigación y especulación en curso."
 dubois.2116.t: "Estegosaurio"
 dubois.2116.f: "Stegosaurus es un género icónico de dinosaurios herbívoros que prosperó durante el período Jurásico Tardío, hace aproximadamente 155 a 150 millones de años. Clasificado como un historieto, Stegosaurus se celebra por su apariencia distintiva y sorprendente. El propósito de sus placas, ya sea para la regulación de la temperatura, la visualización o la defensa, sigue siendo sujeto de debate científico. Con una longitud de hasta 30 pies y una cabeza relativamente pequeña equipada con un pico y dientes de mejilla para procesar material vegetal, Stegosaurus era un herbívelo especializado. Es probable que navegara en vegetación baja en su entorno jurásico. Los fósiles de Stegosaurus se han descubierto principalmente en el oeste de América del Norte, incluidos Colorado y Utah, que ofrecen valiosas ideas sobre la anatomía, el comportamiento y la historia evolutiva de los dinosaurios tiroforanos. El distintivo de Stegosaurus lo ha convertido en una figura popular y duradera en paleontología y cultura popular."
 dubois.2112.h: "Regreso a la sección de América del Norte."
 dubois.2121.t: "Sección de dinosaurios sudamericanos"
 dubois.2121.d: "¿Qué esqueleto de dinosaurio visitar?"
 dubois.2121.f: "A finales del siglo XIX, los huesos de los dinosaurios se encontraron cada vez más en los macizos patagónicos de América del Sur. Los primeros representantes incluyen Antarctosaurus y Argyrosaurus."
 dubois.2121.g: "Antarctosaurus."
 dubois.2121.h: "Argyrosaurus."
 dubois.2122.t: "Antarctosaurio"
 dubois.2122.f: "Antarctosaurus representa un género notable de dinosaurios de saurópodos que habitaban el antiguo continente de Gondwana durante el período del Cretácico Tardío, hace aproximadamente 70 a 65 millones de años. Clasificado dentro de los titanosaurios, el antarctosaurio ejemplifica la diversidad de formas de saurópodos que una vez deambulaban la tierra. Su cuello y cola alargados, junto con la cabeza relativamente pequeña, indican la adaptación para alimentarse de vegetación en lo alto del suelo. Este titanosaurio se destaca por su sólida estructura de las extremidades, que probablemente respalda su peso y facilitó su movimiento. Se han descubierto principalmente en los continentes del sur de América del Sur y la Antártica, donde han proporcionado ideas valiosas sobre la evolución y distribución de los sauropodos durante los cretacos tardíos. Estos hallazgos contribuyen a nuestra comprensión de los ecosistemas únicos que existieron en Gondwana durante este período."
 dubois.2123.t: "Argyrosaurus"
 dubois.2123.f: "Argyrosaurus es un género significativo de dinosaurios de saurópodos que deambulan los antiguos paisajes de América del Sur durante el período del Cretácico Tardío, hace aproximadamente 90 a 70 millones de años. Perteneciente al subgrupo de saurópodos conocido como titanosaurios, Argyrosaurus ofrece información sobre la diversa fauna prehistórica de la región. \ Al momento de que ciertos aspectos de su biología y comportamiento sigan siendo especulativos, Argyrosaurus sigue siendo un tema convincente del estudio paleontológico, arrojando luz sobre la grandeza y la complejidad del pasado prehistórico de la Tierra en el pasado del Hemisterio Sur."
 dubois.2122.h: "Regreso a la sección de América del Sur."
 dubois.2131.t: "Sección de dinosaurios europeos"
 dubois.2131.d: "¿Qué esqueleto de dinosaurio visitar?"
 dubois.2131.f: "Desde principios del siglo XIX, los nuevos fósiles de dinosaurios han sido desenterrados en los macizos europeos, sobre todo como resultado del aumento de la minería. Entre otros, se conocen Iguanodon y Plateosaurus."
 dubois.2131.g: "Iguanodon."
 dubois.2131.h: "Plateosaurus."
 dubois.2132.t: "Iguanodón"
 dubois.2132.f: "Iguanodon se erige como un género notable de dinosaurios herbívoros que prosperaron durante el período del Cretácico temprano, hace aproximadamente 140 a 120 millones de años. Clasificado como un Iguanodontid, Iguanodon desempeñó un papel fundamental en la configuración de nuestra comprensión de la anatomía y el comportamiento de los dinosaurios. Ahora se cree que su pico de pulgar, una vez que se cree que era un cuerno, se utilizó para la defensa contra los depredadores o para manipular la vegetación. Con una longitud de hasta 33 pies, era un herbívoro prominente de su tiempo, influyendo en los ecosistemas que habitaba. Los fósiles de Iguanodon se descubrieron por primera vez en Europa, especialmente en Bélgica e Inglaterra, y su estudio jugó un papel crucial en el desarrollo del campo de la paleontología."
 dubois.2133.t: "Plateosaurio"
 dubois.2133.f: "Plateosaurus es un género significativo de dinosaurios herbívoros que floreció durante el período triásico tardío, hace aproximadamente 214 a 204 millones de años. Clasificado como un prosaurópodo, Plateosaurus ofrece ideas cruciales sobre la evolución temprana de los dinosaurios y sus adaptaciones a diferentes entornos. Sus robustas extremidades y adaptaciones de peso le permitieron buscar eficientemente la vegetación y navegar por su hábitat. Sus anchos dientes en forma de hoja facilitaron el consumo de material vegetal."
 dubois.2132.h: "Regresar a la sección europea."
 dubois.2141.t: "Sección de dinosaurios africanos"
 dubois.2141.d: "¿Qué esqueleto de dinosaurio visitar?"
 dubois.2141.f: "No fue hasta principios del siglo XX que la paleontología en África experimentó un auge significativo, con Tanzania y Sudáfrica siendo particularmente notables, pero también Egipto. Los descubrimientos importantes fueron el girafatitano y el espinosaurio."
 dubois.2141.g: "Girafatitan."
 dubois.2141.h: "Spinosaurus."
 dubois.2142.t: "Jirafatitán"
 dubois.2142.f: "Giraffatitan, anteriormente conocido como Brachiosaurus, es un género notable de dinosaurios colosales de cuello largo que prosperó durante el período Jurásico tardío, hace aproximadamente 154 a 150 millones de años. Clasificado como un saurópodo, Giraffatitan se reconoce por su tamaño excepcional y adaptaciones únicas. Con una altura de hasta 39 pies y una longitud superior a 80 pies, se paró como uno de los animales terrestres más altos y más largos que hayan existido. Su gran masa corporal fue soportada por huesos de extremidades robustas y un cofre masivo en forma de cañón. La evidencia fósil de Giraffatitan se ha descubierto principalmente en África, particularmente en Tanzania y Zimbabwe actuales."
 dubois.2143.t: "Espinosaurio"
 dubois.2143.f: "Spinosaurus es un género notable de dinosaurios carnívoros que habitaron el norte de África durante el período Cretácico, hace aproximadamente 112 a 93 millones de años. Clasificado como un terópodo, Spinosaurus se celebra por sus características distintivas y adaptaciones únicas. Su vela puede haber desempeñado un papel en la termorregulación o el reconocimiento de especies. Sus robustas extremidades y cráneo alargado sugieren adaptaciones para capturar y consumir presas acuáticas, destacando su nicho ecológico. Los restos fósiles de Spinosaurus se descubrieron por primera vez en Egipto y luego en Marruecos."
 dubois.2142.h: "Volver a la sección africana."
 dubois.2151.t: "Sección de dinosaurios asiáticos"
 dubois.2151.d: "¿Qué esqueleto de dinosaurio visitar?"
 dubois.2151.f: "Una primera expedición en los Estados Unidos a Mongolia en el primer tercio del siglo XX debería conducir al descubrimiento de nuevos tipos de dinosaurios en Asia. Psittacosaurus y Velociraptor se encuentran entre las especies más conocidas."
 dubois.2151.g: "Psittacosaurus."
 dubois.2151.h: "Velociraptor."
 dubois.2152.t: "Psitacosaurio"
 dubois.2152.f: "Psittacosaurus es un género notable de pequeños dinosaurios herbívoros que habitaron Asia durante el período del Cretácico Temprano, hace aproximadamente 126 a 101 millones de años. Clasificado como un ceratopsiano, Psittacosaurus se destaca por sus características y contribuciones intrigantes a nuestra comprensión de la evolución de los dinosaurios. Se cree que estas perillas de pluma tienen estructuras similares a cerdas, posiblemente para exhibición o termorregulación. \ N con una longitud que varía de aproximadamente 3 a 6.5 pies, Psittacosaurus habitó una variedad de entornos, incluidos bosques y llanuras. Su pico y dientes especializados sugieren adaptaciones para procesar una amplia gama de material vegetal. Los restos fósiles de Psittacosaurus se han descubierto principalmente en China y Mongolia."
 dubois.2153.t: "Velociraptor"
 dubois.2153.f: "Velociraptor es un género reconocido de dinosaurios carnívoros pequeños a medianos que deambulan por partes de Asia durante el período Cretácico Tardío, alrededor de 75 a 71 millones de años. Clasificado como un terópodo dromaeosaurid, Velociraptor se celebra por sus notables adaptaciones y su papel en la configuración de la percepción pública de los dinosaurios. Poseía un cuerpo elegante, una cola larga y una garra distintiva en forma de hoz en cada pie, que probablemente usaba para cortar a su presa. Sus agudos sentidos, dientes afilados y comportamientos de caza de paquetes, como se infiere de la evidencia y el estudio fósiles, contribuyeron a su reputación como un depredador formidable."
 dubois.2152.h: "Volver a la sección Asiática."
 dubois.2161.t: "Sección de dinosaurios australianos"
 dubois.2161.d: "¿Qué esqueleto de dinosaurio visitar?"
 dubois.2161.f: "En 1926, los huesos de dinosaurio se descubrieron en Australia por primera vez, que fue el comienzo de una investigación más intensiva. Más tarde, el Muttaburrasaurus ganaría notoriedad."
 dubois.2161.g: "Muttaburrasaurus."
 dubois.2161.h: "Rhoetosaurus."
 dubois.2162.t: "Muttaburrasaurio"
 dubois.2162.f: "Muttaburrasaurus es un género notable de dinosaurios de ornitópodos que habitaron Australia durante el período del Cretácico temprano, hace aproximadamente 112 a 99 millones de años. Clasificada como un iguodoncio, Muttaburrasaurus ofrece ideas valiosas sobre la fauna prehistórica de esta región. \ Ndistinguido por su cresta distintiva, hueca y redondeada en su hocico, Muttaburrasaurus poseía un cuerpo de tamaño moderado, alcanzando longitudes de aproximadamente 20 pies. Sus poderosas mandíbulas estaban equipadas con baterías de dientes adecuadas para moler material vegetal, lo que sugiere una dieta herbívora. La presencia de la cresta craneal, que podría haber servido como una cámara resonante para la vocalización o como una estructura de exhibición, aparece muttaburrasaurus aparte de otros ornitopods. Sus extremidades robustas y su tamaño relativamente grande sugieren adaptaciones para una locomoción y herbivory eficientes."
 dubois.2163.t: "Rhoetosaurio"
 dubois.2163.f: "Rhoetosaurus es un género notable de dinosaurios saurópodos que habitaron Australia durante el período Jurásico Medio, hace aproximadamente 165 millones de años. Clasificado dentro del grupo Sauropodomorfo, Rhoetosaurus proporciona una visión crucial de la antigua historia de los dinosaurios australianos. Aunque relativamente más pequeño en comparación con algunos de sus parientes de saurópodos, Rhoetosaurus todavía midió alrededor de 50 pies de largo, lo que lo convierte en uno de los animales más grandes de su tiempo en Australia. Los fósiles de Rhoetosaurus se descubrieron por primera vez en Queensland, Australia, y representan algunas de las primeras pruebas de los dinosauros sauropod en esta región. Sus características anatómicas, como su cuello largo y su cola relativamente alargada, reflejan adaptaciones para el herbivory y la explotación de una variedad de recursos vegetales."
 dubois.2162.h: "Regreso a la sección australiana."
 dubois.2112.d_perfect_dinosaur: "Este esqueleto de dinosaurio se considera perfectamente ensamblado. No es necesario cambiar y ofrece una calificación máxima de dinosaurios."
 dubois.2112.d_imperfect_dinosaur: "Este esqueleto de dinosaurio se considera imperfecto ensamblado. Solo da la mitad de la posible calificación de dinosaurios. Puede ser reensamblado por un [concept_dubois_paleontologist] siempre que no esté ocupado ni agotado."
 dubois.2112.d_poor_dinosaur: "Este esqueleto de dinosaurio se considera mal ensamblado. Duele nuestra calificación de dinosaurios enormemente. Puede ser reensamblado por un [concept_dubois_paleontologist] siempre que no esté ocupado ni agotado."
 dubois.2112.g: "Vuelva a armar este esqueleto de dinosaurio."
