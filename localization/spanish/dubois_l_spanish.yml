 dubois.2001.t: "Colección paleontológica" #NT!
 dubois.2001.d: "Bienvenido a la colección paleontológica." #NT!
 dubois.2001.f_paleontologist: "Nuestra colección es gestionada actualmente por nuestro [concept_dubois_paleontologist] [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetFullName]. Aparece: \ n \ n#G [ROOT.Var('dubois_fossil').GetValue]#! @dubois_fossil! Fósiles \ n \ n#G [ROOT.Var('dubois_special_fossil').GetValue]#! @dubois_special_fossil! Fósiles especiales. \ N \ n#G [ROOT.Var('dubois_human_fossil').GetValue]#! @dubois_human_fossil! Fósiles humanos \ n \ n#G [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetFullName]2#! @dubois_dinosaur_bone! Dinosaur Bones \ n \ n#G [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetFullName]5#! @dubois_dinosaur_skeleton! Los esqueletos de dinosaurio \ n \ nour [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetFullName]7 calificación de dinosaurio#! como calificación para todos nuestros esqueletos de dinosaurios en exhibición es [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetFullName]9." #NT!
 dubois.2001.f_no_paleontologist: "¡Nuestra colección es gestionada actualmente por #R Nadie#!. presenta: \ n \ n#G [ROOT.Var('dubois_fossil').GetValue]#! @dubois_fossil! Fósiles \ n \ n#G [ROOT.Var('dubois_special_fossil').GetValue]#! @dubois_special_fossil! Fósiles especiales. \ N \ n#G [ROOT.Var('dubois_human_fossil').GetValue]#! @dubois_human_fossil! Fósiles humanos \ n \ n#G #!.2#! @dubois_dinosaur_bone! Dinosaur Bones \ n \ n#G #!.5#! @dubois_dinosaur_skeleton! Los esqueletos de dinosaurio \ n \ nour #!.7 calificación de dinosaurio#! como calificación para todos nuestros esqueletos de dinosaurios en exhibición es #!.9." #NT!
