 dubois.149.d: "Nuestro zoológico está enriquecido por un nuevo animal exótico: hoy el tan esperado #O Pallas's Cat#! se trasladó a su nuevo recinto." #NT!
 dubois.149.f: "El gato de Pallas es un pequeño felino salvaje que vive en los pastizales y las regiones montañosas de Asia Central. Conocido por su denso y esponjoso pelaje y su construcción fornida, está bien adaptada a entornos fríos. Los gatos de Pallas son solitarios y esquivos, a menudo se esconden en grietas de rocas o madrigueras para evitar depredadores. Principalmente cazan pequeños mamíferos como roedores y pájaros, usando su aguda vista y sigilo." #NT!
 dubois.149.g: "¡Hermoso!" #NT!
