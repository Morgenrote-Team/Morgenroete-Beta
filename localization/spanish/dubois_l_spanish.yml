 dubois.1012.t: "Recinto de hipopótamo" #NT!
 dubois.1012.d: "El recinto #o hipopotamus#! alberga un montón de estas enormes criaturas. Afortunadamente, se separan de los visitantes por un gran foso." #NT!
 dubois.1012.f1: "Los hipopotami estaban flotando en el agua en su recinto. No estaba pasando mucho. Te preguntaste si alguna vez hicieron algo cuando un zoológico apareció a tu lado." #NT!
 dubois.1012.f2: "De repente, un hipopótamo salió del agua. No has visto eso antes, a pesar de que estabas viendo el recinto durante varios minutos. Debe haber estado en el agua durante bastante tiempo. La persona \ n \ na junto a usted comenzó a hablar: \ "¿no es fascinante? Esos hipopótamos pueden permanecer bajo el agua durante cinco minutos. Cuando se sumergen, sus fosas nasales y las orejas están cerradas, por lo que no pueden entrar agua. \"" #NT!
 dubois.1012.f3: "Uno de los hipopotami abrió su enorme boca y mostró sus dientes largos y curvos. Luego comenzó a gruñir y salpicar. Los hipopótamos masculinos también usan sus heces para marcar puntos específicos en su territorio. Algunos incluso miran a otros hipopótamos masculinos como una forma de dominio." #NT!
 dubois.1012.k: "Regreso a los recintos africanos" #NT!
 zoo_african_enclosures_tt: "Volverás a los recintos africanos del zoológico." #NT!
  
 dubois.1013.t: "Recinto de león" #NT!
 dubois.1013.d: "Se puede encontrar un paquete de #o Lions#! en el recinto de león. El recinto cuenta con un árbol para la sombra y un pequeño estanque para beber." #NT!
 dubois.1013.f1: "Los magníficos leones estaban en medio de su orgullo. La melena del león macho era grande y bastante oscuro. De repente, el león bostezó y mostró sus dientes. Cuanto mayor es el león, más oscura se vuelve su melena. La melena probablemente tiene dos propósitos principales: atraer a las hembras y pretender la garganta y el cuello del león durante las peleas. El grosor de la melena depende de las temperaturas en el hábitat del león. En regiones más frías, los Manes son mucho más pesados ​​para los leones que viven en zoológicos en Europa y América del Norte." #NT!
 dubois.1013.f2: "Al principio solo era un león rugiendo, pero luego los otros se unieron. Con cada león, el rugido se volvió cada vez más fuerte. Luego, de repente, se detuvieron a la vez. La mayoría de las hembras permanecen en el mismo orgullo toda su vida, mientras que los machos generalmente se unen a otros orgullo o coaliciones de otros leones masculinos. En el orgullo, las hembras suelen ser los cazadores que tienen una manera más alta de atrapar presas. Los machos tienen aproximadamente un 10% de posibilidades de atrapar a sus presas. Pero cuando atrapan un animal grande, los leones pueden comer hasta 40 kg de carne." #NT!
 dubois.1013.f3: "En los confines de un zoológico, el poderoso león se lleva hacia adelante y hacia atrás dentro de su recinto. Su cuerpo musculoso exuda poder y gracia mientras examina sus alrededores. Los movimientos inquietos del león llaman su atención, lo que lo lleva a reflexionar sobre los secretos detrás de su comportamiento. Mientras reflexiona, se acerca un contexto del zoológico, listo para compartir ideas sobre estas magníficas criaturas. \ N \ n \ "Es fascinante observar a los leones en su recinto, \" comienza el zoológico. \ "Durante el día, a menudo se involucran en un ritmo repetitivo, un comportamiento que se puede ver tanto en los leones cautivos como en sus homólogos salvajes. Se cree que este ritmo es el resultado de su instinto natural de patrullar y marcar su territorio, incluso en ausencia de vastos pastizales o paisajes expansivos." #NT!
 dubois.1013.f4: "En el zoológico, [SCOPE.sCharacter('dubois_prinz_eugen').GetFullName] es conocido por verificar el viejo león en el recinto todos los días. El veterano siente una profunda conexión con el animal. Ambos parecen testigos de Times Pass of Glory and Honor. Los visitantes del zoológico dicen que hay un vínculo entre este animal específico y el hombre. Alrededor de las tres de la mañana, dejó escapar un rugido que el portero de los animales salió corriendo al recinto para ver. Al mismo tiempo, escuchó el anillo de la muerte en la capilla y, por lo tanto, supo que su maestro, el gran general [SCOPE.sCharacter('dubois_prinz_eugen').GetLastName], había muerto a esa misma hora. Son las cosas que toca incluso los corazones más duros de los soldados." #NT!
  
 dubois.1014.t: "Recinto de elefante" #NT!
 dubois.1014.d: "En un vasto recinto, los elefantes están deambulando. Son una de las mayores atracciones del zoológico y siempre hay gente mirándolas." #NT!
 dubois.1014.f1: "Estuviste observando a los elefantes durante bastante tiempo. Uno de ellos te acerque. Era una enorme elefante femenina con colmillos largos. A veces parecía tomar la delantera y los otros elefantes parecían respetarla mucho. \ N \ n \ "Veo que encontraste la matriarca de los elefantes! Dentro del rebaño, a menudo encontrarás una matriarca, una mujer sabia y experimentada que lidera y protege al grupo. En su familia, los elefantes tienen fuertes lazos sociales. Incluso lloran la pérdida de uno de su grupo. ¡Afortunadamente no tuvimos una muerte de elefante en años! \ "" #NT!
 dubois.1014.f2: "One of the Elephants was trumpeting. It sounded great! You would probably even have heard it from hundreds of meters away.\n\nIt reminded you of a text you once read about elephants: "One of the Elephants was trumpeting. It sounded great! You would probably even have heard it from hundreds of meters away.\n\nIt reminded you of a text you once read about elephants: "Uno de los elefantes estaba trompetando. ¡Sonaba genial! Probablemente incluso lo habría escuchado a cientos de metros de distancia. \ N \ nit le recordó un texto que una vez leía sobre elefantes: "Uno de los elefantes estaba trompetando. ¡Sonaba genial! Probablemente incluso lo habrían escuchado de cientos de metros de distancia. A través de una variedad de vocalizaciones, como trompetas, retumbos y rugidos, transmiten información a otros miembros de su rebaño, ya sea una advertencia de peligro o una llamada para reagruparse "." #NT!
 dubois.1014.f3: "Uno de los elefantes se acercó a ti. Su tronco se acercó lentamente a ti. ¿No fue ese el elefante que alimentó con algo de comida hace un año? No, eso no podría ser. ¡Te habría olvidado! Sin embargo, le diste al elefante un fruto que trajiste para ti. \ N \ n \ "Creo que ella te recuerda. Fuentes e incluso individuos que han encontrado." #NT!
  
 dubois.1015.t: "Recinto de jirafa" #NT!
 dubois.1015.d: "Las jirafas eran visibles desde muy lejos. Sus cabezas llegaron a lo alto del suelo para obtener algunas hojas frescas de los árboles." #NT!
 dubois.1015.f1: "La lengua azul de la jirafa se acurrucaba alrededor de las ramas verdes en la mano. En el proceso, la lengua se deslizó sobre su mano. Era áspero y muy largo. \ N \ nyuabes algo que una vez leíste en un libro: la lengua de la jirafa estaba perfectamente adaptada a su entorno. Fue diseñado para pastar las hojas de acacia de la rama sin ser lastimado por las espinas. Para comer los 30 kilogramos de hojas por día, la jirafa tiene que arrancar las hojas de los árboles por hasta 12 horas. Al mismo tiempo, las hojas también cubren una gran parte de las necesidades de agua de la jirafa." #NT!
 dubois.1015.f2: "Dos de las jirafas se pararon una al lado de la otra cuando de repente comenzaron a golpear los lados con la cabeza. Su largo cuello les permitió arrojar la cabeza y apuntar a su oponente. ¿Qué podría causar un comportamiento tan salvaje? \ N \ n \ "¡No tengas miedo! Este es un comportamiento natural. ¡Guente de combate para establecer el dominio o obtener derechos de apareamiento." #NT!
 dubois.1015.f3: "Escuchaste a un zoológico hablar sobre las jirafas con un grupo de personas: \ "Las jirafas tienen un patrón de pelaje distintivo que se asemeja a un mosaico de parches irregulares. Estos patrones, que varían entre las personas, ayudan a las jirafas a camuflarse a sí mismas dentro de sus alrededores, proporcionándoles una protección de la protección contra los depredadores. Aparte de que las rayas más dañinas tienen el costo de la oscuridad. La sabana. \ "" #NT!
  
 dubois.1016.t: "Recinto de pingüino africano" #NT!
 dubois.1016.d: "Algunos pingüinos nadaban en el agua, otros estaban de pie juntos, uno estaba moviendo con sus alas." #NT!
 dubois.1016.f1: "En la bulliciosa exhibición de pingüinos del zoológico, una colonia animada de pingüinos africanos se mueve y frolics en el agua. Su elegante plumaje en blanco y negro brilla bajo la luz del sol, llamando la atención de los visitantes. Mesmerizado por sus payasadas juguetonas, te acercas a un Zookeeper cercano, ansioso por aprender más sobre estas criaturas carismáticas. \ N \ n \ "El pingüino africano, también conocido como el pingüino de Jackass debido a su llamada de fronología similar a un burro, es una especie notable", comienza el Zookeeper. "Estos pingüinos son endémicos de las costas del sur de África, específicamente que se encuentran en las aguas que rodean Namibia y Sudáfrica. A diferencia de sus contrapartes en la Antártida, los pingüinos africanos prosperan en un clima más cálido, lo que los hace bien adecuados para las regiones costeras que llaman hogar"." #NT!
 dubois.1016.f2: "Ves mientras un pingüino lucha con una roca. Partes de la roca vuelan, por lo que debe ser roca suave. Observas con interés mientras el pingüino continúa cavando. Los pingüinos africanos cavan una cueva de anidación en depósitos de guano. Este guano proviene de los excrementos de cientos de generaciones de aves. En Sudáfrica hay grandes depósitos de guano donde los pingüinos anidan. De este modo, los socios se turnan en la cría." #NT!
 dubois.1016.f3: "A medida que te maravillas de las salpicaduras juguetonas de los Penguins en el agua, un zoológico comparte un detalle fascinante: \ "Una característica única de los pingüinos africanos es su capacidad de natación excepcional. Son ágiles y simplificados bajo el agua, dependiendo de sus aletas para que sean a través del océano en busca de peces pequeños y calamares, que componen la mayoría de su dieta. Su forma impermeable y se propina a sí mismos a través del océano de la búsqueda de peces pequeños y calamares, que componen la mayoría de su dieta. aislamiento, permitiéndoles resistir las temperaturas frías del océano." #NT!
  
 dubois.1017.t: "Recinto de rata topo desnudo" #NT!
 dubois.1017.d: "Como un animal que era principalmente bajo tierra, el recinto de la rata de mole desnuda era principalmente un montón de tierra. Pero a través del uso itelligente del vidrio, era posible mirar a los pequeños animales en sus viviendas." #NT!
 dubois.1017.f1: "Dentro del fascinante hábitat subterráneo del zoológico, una criatura única y trabajadora conocida como la rata de lunar desnuda a través de sus intrincados túneles, su apariencia sin pelo y arrugada capturando la atención de los visitantes. Intrigado por su estilo de vida subterráneo, te acercas a un experto en zoológico, ansioso por aprender más sobre este mamífero intrigante. "Estos roedores notables son altamente especializados para la vida en entornos subterráneos oscuros. Su falta de pelaje es una ventaja, ya que evita que la suciedad y los desechos se adhieran a su piel a medida que cavan. Con sus dientes afilados y las poderosas mandíbulas, los rats moles desnudos son cavadores expertos, creando sistemas de túneles elaborados que proporcionan protección, almacenamiento de alimentos y estructuras sociales"." #NT!
 dubois.1017.f2: "En las cautivadoras madrigueras subterráneas del zoológico, una colonia de rats de lunares desnudos funciona armoniosamente, cada individuo contribuye a las tareas de excavación, alimentación y cuidado de los jóvenes. La vista de sus actividades comunales cautiva la atención de los visitantes. Intrigado por su dinámica social, buscas un choque de zoológico bien informado, con la esperanza de descubrir más sobre la vida de estos roedores fascinantes. "Viven en colonias con una estructura social compleja, similar a la de las abejas o las hormigas. Dentro de una colonia, hay una sola hembra reproductora, conocida como la Reina, que es responsable de dar a luz a la mayoría de los jóvenes. El resto de la colonia está compuesta por individuos no reproductores, conocidos como trabajadores, que contribuyen a tareas como túneles, forzando y cargando a los jóvenes". "." #NT!
 dubois.1017.f3: "En medio de los intrincados túneles del hábitat de rata de lunar, un grupo de rats de lunares desnudos se acurrucan juntos, sus cuerpos arrugados entrelazados mientras comparten calor y participan en el preparación social. Intrigado por su comportamiento comunitario, se acerca a un choque de zoológico bien informado, con la esperanza de comprender la importancia de sus interacciones. "Su comportamiento acurrucado tiene múltiples propósitos, incluido el mantenimiento de la temperatura corporal y el fomento de los lazos sociales. Se sabe que estos roedores se involucran en la preparación social, lo que no solo ayuda con la higiene, sino que también refuerza las conexiones sociales dentro de la colonia. Sus complejas interacciones sociales son un testimonio de la naturaleza cooperativa e interconectada de las colonias de rat rat"." #NT!
  
 dubois.1018.t: "Recinto de cebra" #NT!
 dubois.1018.d: "La eclosión de la cebra era bastante plana, llena de hierba y tenía algunos árboles solitarios que ofrecían sombra. Se parecía un poco a África." #NT!
 dubois.1018.f1: "Dentro del vibrante recinto del zoológico temático de Savannah, un grupo de criaturas cautivadoras y rayadas conocidas como cebras pasean pacíficamente, sus patrones en blanco y negro que crean una exhibición visual fascinante en el contexto de las pastizales. Intrigado por su sorprendente apariencia, te acercas a un cebo en el zoológico experto, ansioso por aprender más sobre estos icónicos animales africanos. \ N \ n "Las cebras no solo son conocidas por sus rayas blancas y negras únicas, sino también por sus comportamientos fascinantes y dinámica social", comienza el zoológico. "Estas rayas sirven como una forma de camuflaje, ayudándoles a mezclarse con los pastizales y depredadores confusos. Las cebras son animales muy sociales, a menudo en grupos familiares conocidos como harén. Sus comportamientos cooperativos, como el preparación y la vigilancia, contribuyen a la seguridad y el bienestar del grupo"." #NT!
 dubois.1018.f2: "En el sereno hábitat del zoológico de Savannah, una cebra masculina afirma su dominio al participar en una exhibición enérgica de patas y posturas, su melena y cola se balancean con cada movimiento. La vista de su comportamiento cautiva la atención de los visitantes. Intrigado por sus acciones, buscas un chopero experto, con la esperanza de descubrir más sobre los comportamientos sociales de estos carismáticos animales africanos. "Las cebras masculinas establecen su jerarquía dentro de un grupo a través de diversos comportamientos, como vocalizaciones, posturas e interacciones físicas. También tienen formas únicas de comunicarse entre sí, incluidos los sonidos de violación y las rejillas agudas." #NT!
 dubois.1018.f3: "En medio del extenso paisaje de Savannah del hábitat cebra, un joven potro y corre alrededor de su madre, su comportamiento juguetón capturando la esencia de la exuberancia juvenil. Intrigado por la interacción, te acercas a un chopero experto, con la esperanza de comprender la importancia del comportamiento del potro. "Los potros son conocidos por su alegría, que tiene importantes fines de desarrollo. El juego les permite practicar habilidades físicas, desarrollar lazos sociales y aprender de sus interacciones con los adultos en el grupo. A través de estos comportamientos lúdicos, los potros ganan gradualmente las habilidades que necesitan para prosperar en la naturaleza"." #NT!
  
