  ### 2.1.2d ### 
  
 dubois.228.t: "Haast Eagle" #NT!
 dubois.228.f: "\ "Primero encontramos una gran garra y asumimos que era parte de un dinosaurio, pero luego encontramos más huesos y se hizo cada vez más evidente que era un águila. Afortunadamente, este águila se extinga hoy, ya que probablemente podría haber matado a los humanos"." #NT!
 dubois.228.g: "¡Eso da miedo!" #NT!
 dubois_add_fossil_haast_eagle_tt: "Gane #G 1#! @dubois_special_fossil! #O Fosil#! especial: Haast Eagle." #NT!
  
