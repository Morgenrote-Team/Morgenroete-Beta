 dubois.1031.t: "The Australasian Natural History Galleries"
 dubois.1031.d: "A didactic promenade arranged in the manner of an ethnographic and natural history display: modest pavilions suggestive of the Antipodes, carved ornaments from Oceania, and ochre‑hued rocks recalling the interior of Australia. Here the characteristic fauna of Australasia are presented to the studious public with an eye to instruction and decorum."
