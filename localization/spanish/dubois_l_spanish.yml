 dubois.1101.d: "Más visitantes de los que generalmente están en el zoológico los últimos días, ya que [SCOPE.GetRootScope.GetCountry.GetCustom('dubois_zoo_baby_type')] nacieron en el zoológico. Ahora podemos nombrar a uno de los pequeños animales." #NT!
