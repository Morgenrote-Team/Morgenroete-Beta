 dubois.1019.t: "Recinto de suricé" #NT!
 dubois.1019.d: "La eclosidad de sumarina estaba dominada por rocas con cuevas en ellas. Inmediatamente notó que muchos de los pequeños animales estaban corriendo." #NT!
 dubois.1019.f1: "\ "Los suricates son notables por su estructura social altamente organizada", explica el zoológico. \ "Cada miembro del grupo, conocido como 'mafia' o 'pandilla', se turna para actuar como centinela, vigilando a los depredadores, mientras que otros forjan o descansan. Su comunicación es nítida y clara; diferentes llamadas indican niveles de amenaza. Esta vigilancia constante y cooperación son clave para su supervivencia en la naturaleza." #NT!
 dubois.1019.f2: "\ "Los suricates son excavadores expertos", comparte el Zookeeper. \ "Pueden cavar varios pies de profundidad en solo minutos, lo cual es esencial para encontrar alimentos como insectos, pequeños reptiles y raíces. Este comportamiento de excavación también juega un papel crucial en la creación de sus intrincados sistemas de madrigueras, donde viven en grupos y crían a sus jóvenes. Estas redes subterráneas proporcionan protección contra los depredadores y el clima extremo"." #NT!
 dubois.1019.f3: "\ "Los suricates tienen una amplia gama de vocalizaciones", explica el Zookeeper. \ "Sus sonidos incluyen todo, desde llamadas de alarma hasta coordinar sus movimientos, hasta llamadas más suaves utilizadas para mantener el contacto dentro del grupo. Cuando un miembro encuentra alimentos, a menudo llama a compartir el descubrimiento con otros, enfatizando la naturaleza comunitaria de su sociedad. Estas comunicaciones vocales son integrales para su supervivencia, ayudándoles a mantenerse conectados y coordinados"." #NT!
  
