  ### 2.3.6a ### 
  
 dubois.443.f: "Los hombres habían estado esperando una hora para el académico, que se habían detenido en algún lugar en una pendiente y de repente sacaron herramientas [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis]. Al principio sacudiendo la cabeza, habían decidido combinar lo desagradable con lo útil y habían llevado la comida hacia adelante para no perder el tiempo innecesariamente. Sin embargo, el Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] no tenía intención de comer o venir. Cuando el líder amenazó con continuar la expedición sin el geólogo, [ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe] repentinamente se unió al grupo, con una piedra brillante en la mano [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis], cuya belleza impresionó a todos los colegas [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis]." #NT!
  
