 dubois_paleontological_research_modifier_desc: "The land is alive with the thrill of discovery. Each fossil unearthed is a window into a vanished world, and every dig stirs the imagination of scientists and the public alike. The pursuit of ancient life has become a national fascination, fueling both scholarly ambition and popular wonder."
 dubois_paleontologist_travell_to_location_modifier_desc: "With notebooks in hand and dreams of prehistoric giants, our paleontologist sets out across rugged terrain, braving the elements in search of secrets locked in stone. The journey is as much about adventure as it is about science—a race against time to uncover the relics of Earth's distant past."
 dubois_paleontologist_travell_from_location_modifier_desc: "After months in the field, the paleontologist returns, weary but triumphant. Satchels bulge with fossils, sketches, and stories of discovery. Each find promises to rewrite the history books and inspire a new generation of"
 notification_dubois_paleontological_report_notification_tooltip: "A paleontological report has arrived from Professor Dubois' expedition, containing remarkable fossil findings."
 notification_dubois_java_man_notification_tooltip: "A new paleoanthropological report from Professor Dubois suggests the discovery of an ancient human ancestor, provisionally named the 'Java Man'."
 notification_dubois_animal_breeding_notification_tooltip: "One of our zoo specimens has successfully bred in captivity. This marks a breakthrough in our understanding of the species."
 ask_for_zoo_animal_proposal_third_party_accepted_name: "Request Accepted by Third Party"
 ask_for_zoo_animal_proposal_third_party_accepted_desc: "A third party has agreed to supply us with a zoo animal specimen. The expedition will proceed under their protection."
 ask_for_zoo_animal_proposal_third_party_declined_name: "Request Declined by Third Party"
 ask_for_zoo_animal_proposal_third_party_declined_desc: "The third party has declined to provide a zoo animal or allow collection. Diplomatic channels may have to be reconsidered."
