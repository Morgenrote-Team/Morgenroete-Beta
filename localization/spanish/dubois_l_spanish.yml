 dubois_lion_baby_birth_flavor: "Dos pequeños cachorros de león se arrastraban alrededor de su madre. Nací hace unas semanas, pero su madre los mantuvo en un escondite durante bastante tiempo. Ahora finalmente pudieron ver el mundo, jugar y hacer nada. ¡Eran adorables!" #NT!
 dubois_otter_baby_birth_flavor: "Era la primera vez que la pequeña nutria entraba al agua para nadar. Se veía bastante bien por ser la primera vez. Entonces el pequeño animal salió del agua y se tumbó en una roca cálida." #NT!
 dubois_jaguar_baby_birth_flavor: "El pequeño Jaguar, de solo 6 semanas, siguió a su madre. Parecía bastante torpe. Pero pronto se convertiría en un depredador peligroso." #NT!
 dubois_koala_baby_birth_flavor: "El pequeño koala se aferró a la espalda de su madre. Ya era bastante viejo, pero aún depende de la madre. De repente agarró una hoja de uno de los árboles y comenzó a mordisquearla." #NT!
 dubois_panda_baby_birth_flavor: "El pequeño panda se veía tan inocente. Rodó y parecía ser bastante torpe. Pero su madre lo mantuvo en su opinión. No le puede pasar nada a la pequeña cosa." #NT!
  
 dubois.1250.t: "Parque Nacional Yosemite?" #NT!
 dubois.1250.d: "Algunos conservacionistas influyentes quieren crear un parque nacional en el valle de Yosemite para proteger su paisaje único. El valle es un lugar único con impresionantes vistas. Las preguntas son ¿preferimos una reserva natural o queremos usar el valle para la agricultura, la tala y la minería?" #NT!
 dubois.1250.f: "\ "Pero ningún templo hecho con manos puede compararse con Yosemite. Cada roca en su muro parece brillar con la vida. \" \ N - John Muir" #NT!
 dubois.1250.g: "¡Esta es una gran idea!" #NT!
 dubois.1250.h: "En realidad, ¡este parece un gran lugar para la minería!" #NT!
  
 dubois.1251.t: "Los últimos sabios" #NT!
 dubois.1251.d: "El sabio, el bisonte europeo, está casi extinto. Solo quedan unos pocos animales en el bosque de Białowieża. Hasta 1830, el bosque estaba protegido, pero después del levantamiento de noviembre, casi todos los puestos de los forestales fueron abolidos. La visita de [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullNameNoFormatting] podría conducir a restablecer un [concept_dubois_nature_reserve] en el bosque." #NT!
 dubois.1251.f: "\ "Białowieża es el último bosque primitivo de Europa y alberga a los últimos sabios. ¡Es una maravilla natural! \" \ N \ ", ¡pero esos árboles podrían reducirse e impulsar nuestra economía!" #NT!
 dubois.1251.g: "¡Necesitamos proteger al sabio!" #NT!
 dubois.1251.h: "Este bosque es perfecto para la tala." #NT!
  
 dubois.1252.t: "¿Una reserva de caza real en Gran Paradiso?" #NT!
 dubois.1252.d: "¡La caza en Gran Paradiso es maravillosa! Especialmente porque es el último lugar donde vive el #b alpino ibex#!. Después de una caza allí, [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullNameNoFormatting] pensó sobre establecer un [Concept('concept_dubois_nature_reserve','$concept_dubois_royal_hunting_reserve$')] allí para proteger los últimos IBEX." #NT!
 dubois.1252.f: "\ "¡¿Cómo se atreven a estas personas comunes a matar mi IBEX? ¡Solo que se me permite cazarlos! Debemos proteger mi juego de estos salvajes! \" \ N \ n#b Históricamente, #! El Parque Nacional de Gran Paradiso fue fundado en 1922 cuando Vittorio Emanuele III donó las tierras de la Reserva de Caza Real para crear el primer parque nacional de Italia. La protección del IBEX alpino seguía siendo una de las tareas más importantes del parque. En 1922 había alrededor de 3000 ibexos en el parque. Ese número se desplomó durante el gobierno fascista y la Guerra Mundial 2, pero luego la población se recuperó y hay alrededor de 4000 ibexos en el Parque Nacional hoy." #NT!
 dubois.1252.g: "¡Encontré la reserva de caza real de inmediato!" #NT!
 dubois.1252.h: "Tal vez más tarde ..." #NT!
  
  
