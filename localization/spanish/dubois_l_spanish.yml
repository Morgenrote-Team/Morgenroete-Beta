 je_dubois_paleontological_expedition_reason: "El paleontólogo está llevando a cabo un [concept_dubois_paleontological_expedition]. \ N$mr_divider_for_je$ \ nfinishing La expedición llevará 12 meses. Una vez terminado, obtendrá [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] y [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] dependiendo del valor #V exitoso#! de la expedición. Además, los eventos aleatorios pueden sumar o restar el éxito. \ N \ ncurrent Cambio de éxito mensual estimado: #underline $mr_divider_for_je$0 $mr_divider_for_je$1 #!#! (máximo: 1) \ n$mr_divider_for_je$ \ nyou podrá configurar un $mr_divider_for_je$4 si tiene un $mr_divider_for_je$5 libre. Una excavación producirá pasivamente más fósiles y huesos. \ N$mr_divider_for_je$ \ ncurrent $mr_divider_for_je$7 #underline $mr_divider_for_je$9 rendimiento estimado#!#!#! de la expedición: \ n[Concept('concept_dubois_fossil','$concept_dubois_fossils$')]1" #NT!
 je_dubois_paleontological_expedition_yield_tt: "Obtiene más fósiles y huesos dependiendo de su #V éxito de éxito#!:\n0 - 3: $je_dubois_paleontological_expedition_yield_level_1_loc$ \ n4 - 7: $je_dubois_paleontological_expedition_yield_level_2_loc$ \ n8 - 11: $je_dubois_paleontological_expedition_yield_level_3_loc$ \ n12 - 14: #p 4#! @dubois_fossil!  [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] y #p 1#! @dubois_dinosaur_bone#! #!:\n01 \ n15: #p 5#! @dubois_fossil!  [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] y #p 2#! @dubois_dinosaur_bone#! #!:\n08 \ n" #NT!
  
