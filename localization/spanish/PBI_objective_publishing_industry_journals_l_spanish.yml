 pbi_je_objective_bestseller_reason: "'Como es bien sabido, la actividad especulativa ignora poco o nada sobre el valor espiritual de los bienes que se venden. Mientras los bienes se vendan bien y el negocio funcione bien, no importa si esto mejora o perjudica la salud pública. Por su propia naturaleza, la especulación es ciega e insensible y vende opio a los chinos y novelas a los franceses.'\nMiembro de la Cámara de Diputados francesa"
