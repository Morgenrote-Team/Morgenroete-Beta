l_spanish:
 dufour_celebrate_schwingfest_decision: "Crea el primer Eidgenössisches Schwing- und Älplerfest"
 dufour_celebrate_schwingfest_decision_desc: "Schwingen se ha convertido en una especie de deporte nacional suizo. ¡Convirtámoslo en un verdadero deporte nacional celebrando el Schwing- und Älplerfest!"
 dufour_schwingfest_modifier: "Eidgenössisches Schwing- und Älplerfest"
 dufour_schwingerkonig: "Schwingerkönig"
 dufour_schwingerkonig_desc: "Este personaje ganó el Eidgenössisches Schwingfest en Suiza. Las masas lo ven como un campeón."
 dufour.1000.t: "Los dos Appenzells no implementan el sufragio femenino"
 dufour.1000.d: "En Suiza se ha introducido el sufragio femenino. Desafortunadamente, algunos cantones son un poco lentos. En los cantones de Appenzell Rodas Interiores y Appenzell Rodas Exteriores, las mujeres pueden participar en las votaciones y elecciones federales, pero no en las de los municipios y del cantón. Primero sería necesaria una modificación de la Constitución cantonal, que debería aprobarse en el Landsgemeinde. El proceso podría durar varios años. ¿Deberíamos intervenir y obligar a los habitantes de Appenzell a introducir el sufragio femenino o esperar y esperar que lo introduzcan ellos mismos?"
 dufour.1000.f: "\"¡Seguro que nuestros hombres lo hacen bien!\"\n\n#b Históricamente#! el sufragio femenino en Suiza llevó mucho tiempo. No fue hasta 1971 que se introdujo en las votaciones y elecciones suizas. En algunos cantones se tardó aún más. Los dos Appenzells fueron los que tardaron más. Appenzell Ausserrhoden adoptó el sufragio femenino en 1989 en un Landsgemeinde. Por el contrario, Appenzell Rodas Interiores tuvo que ser obligado por el Tribunal Federal a introducir el sufragio femenino en 1990.\nSuiza es, por tanto, uno de los países que introdujo más tarde el sufragio femenino. Entre los países que introdujeron antes el sufragio femenino se encuentran Afganistán, Finlandia, Estados Unidos y muchos otros."
 dufour.1000.g: "Obligarlos a dejar votar a las mujeres."
 dufour.1000.h: "Seguramente pronto decidirán darle el voto a las mujeres."
 dufour_womens_suffrage_appenzell_effects_tt:0 "No se obliga a los dos cantones a introducir el sufragio femenino. Recibirás un evento si hay avances en el asunto o si tu decisión es necesaria."
 dufour.1001.t: "Derrota en la votación sobre el sufragio femenino en Appenzell"
 dufour.1001.d: "El gobierno de Appenzell Rodas Exteriores y Appenzell Rodas Interiores propuso una legislación para introducir el sufragio femenino a nivel cantonal. El proyecto de ley fue rechazado. Esto significa que las mujeres de Appenzell todavía no pueden votar. Podríamos obligar a los dos Appenzell a conceder a las mujeres sus derechos, pero eso seguramente pondría a la población local en nuestra contra."
 dufour.1001.f: "\"¡Levanten la mano si quieren introducir el sufragio femenino a nivel cantonal!\" Muchas manos se alzaron en el aire. ¿Pero fueron suficientes? \"¡Usted ha rechazado la introducción del sufragio femenino a nivel cantonal!\"\n\n#b Históricamente#! el sufragio femenino en Suiza llevó mucho tiempo. No fue hasta 1971 que se introdujo en las votaciones y elecciones suizas. En algunos cantones se tardó aún más. Los dos Appenzells fueron los que tardaron más. Appenzell Ausserrhoden adoptó el sufragio femenino en 1989 en un Landsgemeinde. Por el contrario, Appenzell Rodas Interiores tuvo que ser obligado por el Tribunal Federal a introducir el sufragio femenino en 1990.\nSuiza es, por tanto, uno de los países que introdujo más tarde el sufragio femenino. Entre los países que introdujeron antes el sufragio femenino se encuentran Afganistán, Finlandia, Estados Unidos y muchos otros."
 dufour.1001.g: "¡Ya he tenido suficiente! ¡Simplemente oblíguelos a introducir el sufragio femenino!"
 dufour.1001.h: "Esperemos un poco más."
 dufour.1002.t: "Appenzell introduce el sufragio femenino"
 dufour.1002.d: "Quien hubiera pensado eso? Ambos Appenzell introdujeron el sufragio femenino a mano alzada en sus asambleas regionales. Esto significa que ahora las mujeres pueden votar en todas partes de Suiza."
 dufour.1002.f: "\"¡Levanten la mano si quieren introducir el sufragio femenino a nivel cantonal!\" Muchas manos se alzaron en el aire. ¿Pero fueron suficientes? \"¡Habéis aprobado la introducción del sufragio femenino a nivel cantonal!\" ¡Estallaron vítores!\n\n#b Históricamente#! el sufragio femenino en Suiza llevó mucho tiempo. No fue hasta 1971 que se introdujo en las votaciones y elecciones suizas. En algunos cantones se tardó aún más. Los dos Appenzells fueron los que tardaron más. Appenzell Ausserrhoden adoptó el sufragio femenino en 1989 en un Landsgemeinde. Por el contrario, Appenzell Rodas Interiores tuvo que ser obligado por el Tribunal Federal a introducir el sufragio femenino en 1990.\nSuiza es, por tanto, uno de los países que introdujo más tarde el sufragio femenino. Entre los países que introdujeron antes el sufragio femenino se encuentran Afganistán, Finlandia, Estados Unidos y muchos otros."
 dufour.1002.g: "¡Les tomó más tiempo de lo que hubiera pensado!"
 dufour.1003.t: "Otro fracaso en la introducción del sufragio femenino en Appenzell"
 dufour.1003.d: "Ya era el segundo intento de algunos habitantes progresistas de Appenzell de introducir el sufragio femenino. Pero este intento tampoco tuvo éxito. Aún podemos forzar la introducción o esperar aún más y esperar que los habitantes de Appenzell introduzcan voluntariamente el sufragio femenino."
 dufour.1003.f: "\"¡Levanten la mano si quieren introducir el sufragio femenino a nivel cantonal!\" Muchas manos se alzaron en el aire. ¿Pero fueron suficientes? \"¡Usted ha rechazado la introducción del sufragio femenino a nivel cantonal!\"\n\n#b Históricamente#! el sufragio femenino en Suiza llevó mucho tiempo. No fue hasta 1971 que se introdujo en las votaciones y elecciones suizas. En algunos cantones se tardó aún más. Los dos Appenzells fueron los que tardaron más. Appenzell Ausserrhoden adoptó el sufragio femenino en 1989 en un Landsgemeinde. Por el contrario, Appenzell Rodas Interiores tuvo que ser obligado por el Tribunal Federal a introducir el sufragio femenino en 1990.\nSuiza es, por tanto, uno de los países que introdujo más tarde el sufragio femenino. Entre los países que introdujeron antes el sufragio femenino se encuentran Afganistán, Finlandia, Estados Unidos y muchos otros."
 dufour.1003.g: "Malditos paletos. ¡Tuvieron su oportunidad, ahora los estamos obligando!"
 dufour.1003.h: "No podemos simplemente socavar el proceso democrático."
 dufour.1004.t: "El Tribunal Federal obliga a Appenzell Rodas Interiores a introducir el sufragio femenino"
 dufour.1004.d: "Después de que Appenzell Rodas Exteriores aceptara el sufragio femenino en su último Landsgemeinde, el Tribunal Federal se pronunció en el caso de Appenzell Rodas Interiores. Appenzell Rodas Interiores debe introducir el sufragio femenino. La cuestión ha quedado así decidida de una vez por todas."
 dufour.1004.f: "\"El Tribunal Federal considera que Appenzell viola la Constitución de la Confederación Suiza. Las mujeres tienen los mismos derechos que los hombres. ¡Appenzell Rodas Interiores está obligada a introducir inmediatamente el sufragio femenino!\"\n\n#b Históricamente#! el sufragio femenino en Suiza Un largo tiempo. No fue hasta 1971 que se introdujo en las votaciones y elecciones suizas. En algunos cantones se tardó aún más. Los dos Appenzells fueron los que tardaron más. Appenzell Ausserrhoden adoptó el sufragio femenino en 1989 en un Landsgemeinde. Por el contrario, Appenzell Rodas Interiores tuvo que ser obligado por el Tribunal Federal a introducir el sufragio femenino en 1990.\nSuiza es, por tanto, uno de los países que introdujo más tarde el sufragio femenino. Entre los países que introdujeron antes el sufragio femenino se encuentran Afganistán, Finlandia, Estados Unidos y muchos otros."
 dufour.1004.g: "¡Finalmente!"
 dufour.2000.t: "Primer Eidgenössisches Schwing- und Älplerfest en Biel"
 dufour.2000.d: "Many Schwinger participated in the first Eidgenössisches Schwing- und Älplerfest. The event was held in the town of Biel and was planned by the Swiss Schwing clubs after the sport became more and more popular. After the immense success the participants and planners are looking forward to the next event in three years. And many Schwinger are eager to win the event and the first price - a strong bull."
 dufour.2000.f: "Two huge bodies are wrestling each other, neither one wants to fall. Both opponents go down under the cheers of the audience. Alfred Niklaus is on top. He is the first Schwingerkönig! But first he helps his opponent to get up and cleans his back from saw dust.\n\n#b Historically #! Schwingen - a form of wrestling with very strict rules - was a popular sport in Switzerland, although its origin can't be traced well. But the first local Schwingfest was held at the Unspunnenmatte in Interlaken. The first Eidgenössisches Schwing- und Älplerfest was held in 1895 in Biel and then regularly all two or three years. At the Schwing- und Älplerfest there are also the two other Swiss national sports Hornussen (a team sport featuring the hitting of a puck called \"Hornuss\") and Steinstossen (a form of stone put).\n\nThe Eidgenössisches Schwing- und Älplerfest is celebrated to this day. The most recent event occurred in Pratteln close to Basel in 2022 and the next event will be held in Mollis in 2025. The winner is awarded with a bull, the Schwingerkönig of 2022 - Joel Wicki - won the bull \"Magnus\" a Red Holstein."
 dufour.2000.g: "¡No puedo esperar al próximo evento!"
 dufour.2001.t: "¡[SCOPE.sCharacter('dufour_schwingerkonig_scope').GetLastName] [SCOPE.sCharacter('dufour_schwingerkonig_scope').GetFirstName] ganó el Eidgenössisches Schwingfest!"
 dufour.2001.d: "Después de una feroz lucha, [SCOPE.sCharacter('dufour_schwingerkonig_scope').GetLastName] [SCOPE.sCharacter('dufour_schwingerkonig_scope').GetFirstName] se alza como ganador del Eidgenössisches Schwingfest de este año."
 swiss_flavor_events.21.f1: "Dos cuerpos enormes luchan entre sí, ninguno quiere caer. Ambos oponentes caen bajo los aplausos del público. Un hombre está en la cima, ganó esta \"Pandilla\". Ayuda a su oponente a levantarse y le limpia la espalda del aserrín."
 swiss_flavor_events.21.f2: "\n\nCuriosamente, en Schwingen los nombres de los Schwinger se intercambian y comienzan con el apellido. Si Abraham Lincoln hubiera sido un Schwinger, se habría llamado Lincoln Abraham."
 swiss_flavor_events.21.f3: "\n\nIf an opponent has the same number of points as the Schwingerkönig he gets the title of \"Erstgekrönter\" which means first crowned."
 swiss_flavor_events.21.f4: "\n\nEl 15 por ciento de los mejores en un Eidgenössisches reciben una corona de flores. Generalmente se les llama \"Eidgenossen\"."
 swiss_flavor_events.21.f5: "\n\nOther participants get prizes too. They are put in a temple of gifts. Each gift was donated by someone or by some organization."
 swiss_flavor_events.21.f6: "\n\nTres Schwinger diferentes han sido Schwingerkönig tres veces hasta ahora. Hans Stucki ganó en 1900, 1902 y 1905. Rudolf Hunsperger ganó en 1966, 1969 y 1974. Jörg Abderhalden ganó en 1998, 2004 y 2007."
 swiss_flavor_events.21.f7: "\n\nHay otros Schwingfeste en Suiza. Dos de los más importantes son el \"Unspunnen-Schwinget\" cerca de Interlaken y el \"Kilchberger Schwinget\" en el cantón de Zúrich. Si un Schwinger gana estos dos y los Eidgenössisches, se llama \"Schwinger-Grand-Slam\"."
 swiss_flavor_events.21.f8: "\n\nEn Schwingen no sólo se obtienen puntos por ganar. Si dos oponentes están empatados pero pelean una pelea atractiva, reciben una recompensa de 0,25 puntos más que si fuera una pelea aburrida. Incluso si pierdes pero luchas con valentía y bien, obtienes 0,75 puntos más."
 swiss_flavor_events.21.f9: "\n\nLas Schwingfeste más prestigiosas son las \"Bergschwingfeste\", que se celebran en las montañas. Son fiestas folclóricas y también hay música tradicional. Las Bergschwingfeste más conocidas son la \"Stoos-Schwinget\", la \"Rigi Schwing- und Älplerfest\", la \"Brünigschwinget\", la \"Schwarzsee-Schwinget\", la \"Weissenstein-Schwinget\" y el \"Schwägalp-Schwinget\"."
 dufour.2001.g: "¡Felicidades!"
