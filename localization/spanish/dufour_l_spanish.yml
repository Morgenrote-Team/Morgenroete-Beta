 NEUCHATEL_ADJ: "Neuchatel"
 je_group_dufour_confoederatio_helvetica: "Morgenröte: Confoederatio Helvetica"
 je_dufour_carte_dufour: "Mapa topográfico de Suiza"
 je_dufour_carte_dufour_reason: "Desde 1822, la agrimensura es competencia de la Confederación Suiza y no de los cantones. El general Dufour recibió el encargo de realizar un estudio de Suiza según normas uniformes y de registrar los resultados del estudio en un mapa. Esto llevará mucho tiempo y costará un poco, pero ayudará a seguir desarrollando Suiza."
 je_dufour_carte_dufour_goal: "Se han completado los estudios y se ha publicado el mapa."
 dufour_creating_carte_dufour_modifier: "Creación de la Carta Dufour"
 dufour.900.t: "Publicación de la Carta Dufour"
 dufour.900.d: "Después de años de arduo trabajo, el mapa topográfico de Suiza finalmente está terminado y las 25 hojas están publicadas o lo estarán dentro de poco."
 dufour.900.f: "Por fin podéis ver la primera copia de la Carte Dufour. Las líneas finas muestran montañas, ciudades e incluso casas. ¡Nunca antes existió un mapa tan preciso de Suiza!\n\n#b Históricamente #! Dufour y su equipo trabajaron en el mapa desde 1832 hasta 1865. Las dos primeras hojas se publicaron en 1845 y la última de las 25 hojas se publicó en 1865. El mapa topográfico se imprimió mediante un proceso de impresión por grabado y mostró una escala de 1:100.000. Curiosamente, Dufour fue el primer general de la Suiza moderna y lideró el ejército suizo contra el Sonderbund en la guerra civil suiza (Sonderbundskrieg) en 1848.\n\n#b Hoy #! la Carte Dufour se encuentra en el Schweizer Landesmuseum de Zúrich. Pero en realidad puede encontrar el mapa en línea, tal como se publicó junto con muchos otros mapas nacionales de Suiza."
 dufour.900.g: "¡Deberíamos ponerle a una montaña el nombre de Dufour!"
 dufour_carte_dufour_modifier: "Carta Dufour"
 dufour_add_x_carte_dufour_progress_minus_x_tt: "Perder [SCOPE.GetValue('carte_dufour_progress_amount')|0+] #V Progreso del mapeo#!."
 dufour_add_x_carte_dufour_progress_minus_1_tt: "Perder [SCOPE.GetValue('carte_dufour_progress_amount')|0+] #V Progreso del mapeo#!."
 dufour_add_x_carte_dufour_progress_0_tt: "No hay ganancia #V Progreso del mapeo#!."
 dufour_add_x_carte_dufour_progress_plus_1_tt: "Ganancia [SCOPE.GetValue('carte_dufour_progress_amount')|0+] #V Progreso del mapeo#!."
 dufour_add_x_carte_dufour_progress_plus_x_tt: "Ganancia [SCOPE.GetValue('carte_dufour_progress_amount')|0+] #V Progreso del mapeo#!."
 dufour.901.t: "Locales perturbados por la encuesta"
 dufour.901.d: "Durante los trabajos de topografía en [SCOPE.sState('dufour_mapping_scope').GetName], nuestros topógrafos entraron en conflicto con los habitantes rurales de la región. Al parecer estaban perturbando un funeral con su trabajo."
 dufour.901.f: "\ \"¡Es mejor irse ahora! ¿No te has enterado? ¡No necesitamos tu mapa, siempre hemos encontrado nuestro propio camino a casa! \""
 dufour.901.g: "Mis condolencias."
 dufour.901.h: "¡Continuar!"
 dufour.902.t: "Topógrafo asesinado en las montañas"
 dufour.902.d: "Mientras inspeccionaban desde una de las altas montañas de [SCOPE.sState('dufour_mapping_scope').GetName], nuestros topógrafos fueron sorprendidos por una tormenta. Hubo una tormenta y una lluvia torrencial. Los topógrafos buscaron refugio en su tienda, pero un rayo mató a uno de ellos e hirió al otro."
 dufour.902.f: "\"El rayo me alcanzó en la pierna, pero después de unos días mejoró. Finalmente pude bajar y ponerme a salvo. ¡Fue una prueba terrible!\""
 dufour.902.g: "¡Dios mío!"
 dufour.903.t: "Los lugareños ayudan a los topógrafos"
 dufour.903.d: "Nuestros topógrafos casi se pierden en [SCOPE.sState('dufour_mapping_scope').GetName], pero algunos lugareños pudieron ayudarlos e incluso les ofrecieron un lugar para quedarse e información sobre los caminos más rápidos. ¡Esto seguramente ayudará a que el mapa se termine más rápido!"
 dufour.903.f: "\"Puedes trabajar más tarde. Primero tenemos que beber juntos. ¡Éste es nuestro mejor Kirsch!\""
 dufour.903.g: "¡Agradecemos la ayuda!"
 dufour.904.t: "¡Equipo perdido!"
 dufour.904.d: "Uno de nuestros topógrafos perdió su equipo mientras escalaba una montaña en [SCOPE.sState('dufour_mapping_scope').GetName]. O tenemos que proporcionar nuevos equipos o el progreso se ralentizará."
 dufour.904.f: "\"Simplemente se cayó... No podía sostenerlo... ¿Quién hubiera sabido que teníamos que arreglar el equipo en nuestras mochilas?\""
 dufour.904.g: "Tienen que lidiar con eso."
 dufour.904.h: "¡Consigue nuevos instrumentos!"
 dufour.905.t: "Blüemlisalp o Frau"
 dufour.905.d: "Los habitantes de [SCOPE.sState('dufour_mapping_scope').GetName] dan dos nombres a la misma montaña: Blüemlisalp y Frau. ¿Qué nombre deberíamos elegir?"
 dufour.905.f: "\"¿No podemos simplemente lanzar una moneda al aire?\""
 dufour.905.g: "¡Blüemlisalp!"
 dufour.905.h: "¡Señora!"
 dufour.906.t: "Surveyor acelera el trabajo en el mapa"
 dufour.906.d: "Gracias al apoyo de [SCOPE.sCharacter('surveyor_scope').GetFullName], un conocido topógrafo, el progreso para crear el mapa topográfico ha dado un gran salto."
 dufour.906.f: "\"Yes, this instrument is for measuring, not for staring at stars.\""
 dufour.906.g: "¡Buen trabajo!"
 dufour.907.t: "El matemático ayuda con los cálculos."
 dufour.907.d: "[SCOPE.sCharacter('mathematician_scope').GetFullName], que tiene educación en matemáticas, pudo ayudar a nuestro equipo a resolver varios cálculos. Esto ayudará a terminar el mapa más rápido."
 dufour.907.f: "\"Who would have known that mathematics are actually useful!\""
 dufour.907.g: "¡Qué bueno que tenemos matemáticos!"
 dufour.908.t: "El vuelo en globo inspira a los artistas"
 dufour.908.d: "Gracias a [SCOPE.sCharacter('balloonist_scope').GetFullName], un conocido aeronauta, algunos artistas y topógrafos pudieron ver el mundo desde arriba. Los artistas se inspiraron en la impresionante vista y tuvieron una idea más realista de cómo representar nuestro país en un mapa."
 dufour.908.f: "\ \"¡Oh Dios! ¡Espero que no choquemos! \""
 dufour.908.g: "¡Ver el mundo desde arriba es impresionante!"
 dufour.910.t: "Primeras hojas publicadas: Jura y Basilea"
 dufour.910.d: "Ya se han publicado las primeras hojas de nuestro nuevo mapa topográfico y se centran en la zona de Basilea y el Jura."
 dufour.910.f: "The Jura is a range of small mountains that stretches from Savoy all the way to Basel and some Foothills even to Lake Constance. It encompases parts of Vaud, Neuchâtel, Bern, both Basel, Solothurn and Aargau. many big cities are close to the Jura.\n Basel for example is one of the most important cities of Switzerland. Basel borders both the Alsace as well as Baden and is well connected thanks to the Rhine River.\nJust a few years ago the Canton of Basel was divided into the Cantons of Basel Stadt (City) and Basel Land (Countryside). Interestingly the countryside was more liberal during that time, while the city was ruled by Patricians. Basel is a quite international and has an old University that harbored great thinkers like Leonhard Euler and Daniel Bernoulli.\nGeneva on the other hand is a big city surrounded by France. during Napoléon's reign it was part of France and returned to Switzerland in 1815. Now the first private banks get founded and Geneva slowly becomes a hub of the financial sector. Additionally it was home to Voltaire and Jean-Jaques Rousseau, two of Switzerland's greatest philosophers."
 dufour.910.g: "¡Interesante!"
 dufour.910.h: "¡No quiero oír nada sobre Suiza!"
 dufour.910.no_more_information_tt: "#n ya no#! recibirá eventos que solo describan Suiza sin ningún efecto."
 dufour.911.t: "Nuevos pliegos publicados: Schaffhausen, Thurgau y St. Gallen"
 dufour.911.d: "Se publicaron más hojas. Esta vez la atención se centra en el norte y el este de Suiza, con los cantones de Schaffhausen, Turgovia y San Galo."
 dufour.911.f: "Schaffhausen lies in the Northeast of Switzerland and is mostly surrounded by Germany. The city itself is located right next to the Rhine and very close to the Rhinefalls at Neuhausen. Thanks to the energy of the river, Schaffhausen was able to industrialize quite early and thanks to the rural people it became a liberal Canton in 1831.\nThurgau was ruled by another Canton that changed every year until the French Revolution spread to Switzerland. It is a full Canton since 1815 and a center of textile industries and agriculture. The high amount of pear trees lead to the name \"Mostindien\" meaning Cider India which is a play on Ost (east) and Most (Cider). Thurgau is one of the liberal Cantons since 1831 and wants more centralization in Switzerland.\nSt. Gallen is a split Canton in regards to religion and was once the seat of monastery and a Prince Bishopric. It is a center of the textile industry and a liberal Canton. The Canton of St. Gallen surrounds both Appenzell Cantons and the remarkable Säntis mountain range, a part of the Alps."
 dufour.912.t: "Fichas nuevas publicadas: Los Grisones y los Alpes Réticos"
 dufour.912.d: "Se publicaron más hojas. Esta vez la atención se centra en el enorme cantón de los Grisones y los Alpes Réticos."
 dufour.912.f: "Grisons is not only the biggest Canton of Switzerland, it is also home to the Rumantsch speaking people, a minority in Switzerland and one group of the Alpine Romance language also found in South Tyrol and Friuli.\nGrisons is sparsely populated as it is dominated by the Alps. Particularly the Rhaetian Alps named after the ancient Rhaeti tribes. Grisons is mostly an agrarian Canton that profits from the transport of goods over the Alpine passes as well. The loss of some now Italian lands after the Napoleonic Wars was a catastrophe but Grisons still has some areas that have a majority of Italian speaking people making it a Canton with three language groups: German, Rumantsch and Italian\nPolitically Grisons is dominated by its municipalities that have a lot of power. But the liberal forces that want to centralize the Canton more gained ground lately."
 dufour.913.t: "Hojas nuevas publicadas: Suiza Central"
 dufour.913.d: "Se publicaron más hojas. Esta vez la atención se centra en los numerosos cantones de la Suiza Central."
 dufour.913.f: "La Suiza central es la cuna de la \"Eidgenossenschaft\", la Confederación Suiza. Primero, los cantones de Uri, Schwyz y Underwalden (hoy separados en Nied- y Obwalden) formaron una alianza flexible que luego se fue ampliando cada vez más.\nLa parte principal de la economía de los numerosos cantones pequeños de la Suiza central es el transporte de mercancías. principalmente en la ruta del San Gotardo. Aparte de eso, la agricultura, la tala y cierta producción textil eran importantes en la región.\nPolíticamente, la Suiza central estaba dominada por católicos conservadores. Mientras que el cantón de Lucerna era el más liberal de los cantones de la Suiza central gracias a la ciudad de Lucerna, los cantones más pequeños de Uri, Schwyz, Ob- y Nidwalden, Glaris y Zug eran aún más conservadores y estaban dominados por las clases altas locales. .\nSchwyz casi se dividió en dos cantones en la década de 1830, cuando las partes exteriores del cantón exigieron igualdad y participación política. Después de que el interior de Schwyz fuera ocupado por tropas del Tagsatzung (el \"gobierno\" de Suiza), el interior de Schwyz finalmente aceptó esos puntos y Schwyz permaneció como un cantón."
 dufour.914.t: "Fichas nuevas publicadas: Ticino"
 dufour.914.d: "Se publicaron más hojas. Esta vez la atención se centra en el cantón más meridional de Suiza, el Tesino."
 dufour.914.f: "Ticino es la única posesión de la Confederación Suiza que queda en Italia. Como conquista de los siglos XV y XVI, la zona estuvo dominada por los antiguos lugares (cantones) hasta la fundación de la República Helvética. Sin embargo, desde 1803 es un cantón de pleno derecho.\nLos sectores económicos dominantes en Ticino eran la agricultura y la tala. La producción de seda también era un negocio lucrativo. En el Tesino se podían cultivar productos agrícolas que no se producían en otros lugares de Suiza: castañas, tabaco, seda y diversas frutas.\nEn 1830, el Tesino fue uno de los primeros cantones en obtener una constitución liberal. Sin embargo, la situación política en el cantón es inestable ya que los liberales quieren centralizar el Estado mientras que los conservadores prefieren la autonomía regional."
 dufour.915.t: "Nuevos pliegos publicados: Berna y Friburgo"
 dufour.915.d: "Se publicaron más hojas. Esta vez se centró en Berna y Friburgo."
 dufour.915.f: "Both the Canton of Bern and the Canton of Fribourg have French and German speaking parts. While Bern is a huge Canton Fribourg is a lot smaller. Bern reaches from the Jura mountain range all the way to the Alps in the south. Fribourg is located west of Bern and hosts towns like Fribourg and Gruyère where a well known cheese comes from.\nThe Canton of Bern is mostly dominated by agriculture but watchmaking has slowly spread from neighboring Neuchâtel to the Bernese Jura. Hopefully industrialization will soon help develop the Canton.\nPolitically Bern was long dominated by the Patricians of the city itself but in the 1830s the liberals from the smaller towns in the Canton were able to draw up a new constitution that balanced the rights of the people of Berne and the rural population.\nFribourg is a Canton dominated by agriculture, especially grain production and cheese. The cheese from Gruyère is especially well known.\nPolitically, Fribourg was dominated by the conservative Patricians and the Clergy. Even when a new constitution was issued in 1831, the Canton remained conservative and in the elections the conservatives still gained the majority of the votes."
 dufour.916.t: "Fichas nuevas publicadas: Zürich y Aargau"
 dufour.916.d: "Se publicaron más hojas. Esta vez se centró en Zürich y Aargau."
 dufour.916.f: "Both Zürich and Aargau are located in the north of Switzerland mostly in the relatively flat Mittelland (central land). Both Cantons are rapidly industrializing and might become industrial powerhouses quite soon.\nZürich is one of the old Cantons and was dominated by the city itself for quite a long time. Zürich is a center of the mechanized textile industry as well as the machine industry. Many factories are located at rivers and get their energy from those rivers.\nPolitically Zürich was dominated by the Patricians of the City until 1830/31 when the people of the countryside forced a new constitution to be enacted. In the next elections, the liberals and radicals gained a majority and are now dominating the politics in Zürich.\nAargau was ruled by the other Cantons until the time of the Helvetic Republic. Now that it is a full Canton, Aargau is industrializing fast, especially with textile factories. The many rivers of Aargau allowed for factories to get their energy from the water and lead to many decentralized factories.\nAargau was basically a counterweight to the cantons of Zurich and Bern and nearly did not become a full Canton in 1814/15. Even after 1815 Aargau stayed quite liberal unlike other Cantons. In 1831, a new constitution gave the population even more rights. The government responded to the resistance of the Catholic population to the increased control of the church by the state by occupying rebellious regions."
 dufour.917.t: "Nuevos pliegos publicados: Vaud y Valais"
 dufour.917.d: "Se publicaron más hojas. Esta vez se centró en Vaud y Valais."
 dufour.917.f: "Valais is a big valley in the very south of Switzerland mostly separated from the rest of the country by the Alps. The Rhône river flows through the valley and then into the Lac Léman. The Northern coast of the Lake is part of Vaud, but the Canton extends from Geneva and the Alps to the Jura.\nVaud is still dominated by agriculture but the liberals started to implement changes to grow the industry since 1826. Time will tell if Vaud will remain an agricultural Canton or become a center of industry.\nThanks to diplomatic skill, the canton of Vaud was confirmed after Napoleon's defeat. In return, however, the canton had to accept a more conservative constitution. Thanks to the authoritarian leadership, the liberals gained ground and were able to push through a new constitution in 1830. In the meantime, the radicals were gaining ground and trying to promote democratization.\nValais is dominated by agriculture and its rural population. There is no significant industry and outside connections are limited.\nThe main political conflict in Valais was the one between the German speaking upper Valais and the French speaking lower Valais. Upper Valais has been the dominant part of the Canton even though the Lower Valais had a higher population. The question is whether the liberals and radicals of the lower valley are in a position to promote the democratization of Valais or whether the old forces can stabilize their rule."
 dufour.920.t: "Crecen las voces para traer el íbice de regreso a Suiza"
 dufour.920.d: "Robert Mader, el hotelero propietario del hotel \"Walhalla\" en San Galo, quiere traer el íbice alpino de vuelta a Suiza. Propone construir un parque de animales en St. Gallen donde prepararía un recinto para criar a los íbices y luego liberarlos en la naturaleza."
 dufour.920.f: "\"El Ibex es un símbolo nacional de Suiza. ¡Tenemos que recuperarlo!\""
 dufour.920.g: "¡Devolveremos el Ibex!"
 dufour.920.h: "¡Que perdida de tiempo!"
