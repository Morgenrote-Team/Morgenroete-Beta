l_spanish:
  
 mr_swe_nor_union_decision_1: "Nombramiento de un nuevo Gobernador General en Noruega" #NT!
 mr_swe_nor_union_decision_1_desc: "Actualmente, el cargo en Christiania está vacante. Deberíamos tomar una decisión sobre a quién nombrar como nuevo jefe del Gobierno noruego en ausencia del Rey." #NT!
  
 mr_swe_nor_union_decision_2: "Exigimos que nuestros ministros puedan participar en los debates parlamentarios" #NT!
 mr_swe_nor_union_decision_2_desc: "Actualmente, los ministros tienen prohibido intervenir en el Stortinget. Esto no puede continuar." #NT!
  
 mr_swe_nor_union_decision_3: "Exigimos que se eliminen todos los símbolos de la unión de nuestra bandera." #NT!
 mr_swe_nor_union_decision_3_desc: "Deberíamos utilizar una bandera noruega limpia, sin símbolos sindicales." #NT!
  
 mr_swe_nor_union_decision_4: "Exigir oficinas consulares noruegas" #NT!
 mr_swe_nor_union_decision_4_desc: "Con el aumento de los envíos noruegos, las oficinas consulares suecas no son suficientes. Necesitamos oficinas noruegas." #NT!
  
 mr_swe_nor_union_decision_5: "Exigir que el rey Carlos XV cumpla su promesa" #NT!
 mr_swe_nor_union_decision_5_desc: "Con la coronación de Carlos XV como rey de Suecia y rey ​​de Noruega, llega el momento de cumplir su promesa de abolir el cargo de Gobernador General." #NT!
  
 da_appoint_governor_general: "Nombrar Gobernador General" #NT!
 da_appoint_governor_general_desc: "Cambia el Gobernador General de un [concept_subject]. [concept_liberty_desire] puede cambiar dependiendo del candidato elegido." #NT!
 da_appoint_governor_general_action_name: "Nombrar Gobernador General" #NT!
 da_appoint_governor_general_action_notification_name: "[TARGET_COUNTRY.GetName] obtiene un nuevo Gobernador General" #NT!
 da_appoint_governor_general_action_notification_desc: "[INITIATOR_COUNTRY.GetName] ha reemplazado al Gobernador General de [TARGET_COUNTRY.GetName] por un nuevo designado." #NT!
 da_appoint_governor_general_action_notification_third_party_name: "[TARGET_COUNTRY.GetName] obtiene un nuevo Gobernador General" #NT!
 da_appoint_governor_general_action_notification_third_party_desc: "[INITIATOR_COUNTRY.GetName] ha reemplazado al Gobernador General de [TARGET_COUNTRY.GetName] por un nuevo designado." #NT!
  
 mr_swe_nor_union_event.1.t: "Nombramiento de un nuevo Gobernador General" #NT!
 mr_swe_nor_union_event.1.d: "El puesto de Gobernador General de Christiania está vacante. Tal vez deberíamos considerar la posibilidad de nombrar a alguien para ocuparlo." #NT!
 mr_swe_nor_union_event.1.f: "Según la Constitución noruega de 1814, un gobernador general de nacionalidad sueca o noruega podía ser designado para dirigir el gobierno noruego en ausencia del rey, que reside en Estocolmo. En Suecia, muchos creen que es esencial que un gobernador general, que actúe en nombre del rey sueco, sea de nacionalidad sueca. Cualquier otra cosa se considera potencialmente peligrosa para la seguridad nacional." #NT!
 mr_swe_nor_union_event.1.a: "Nombrar un Gobernador General de Suecia" #NT!
 mr_swe_nor_union_event.1.b: "Nombrar un Gobernador General de Noruega" #NT!
 mr_swe_nor_union_event.1.c: "Dejar el puesto vacante durante los próximos 5 años" #NT!
  
 mr_swe_nor_union_event.2.t: "Ministros noruegos" #NT!
 mr_swe_nor_union_event.2.d: "El Stortinget permite a los ministros noruegos participar en los debates parlamentarios." #NT!
 mr_swe_nor_union_event.2.f: "El parlamento noruego, el Stortinget, ha votado a favor de permitir que los ministros noruegos participen en los debates y negociaciones parlamentarias. Ahora esperan que el rey apruebe su decisión." #NT!
 mr_swe_nor_union_event.2.a: "Negarse a reconocer su decisión" #NT!
 mr_swe_nor_union_event.2.b: "Aprobar su decisión" #NT!
  
 mr_swe_nor_union_event.3.t: "La bandera noruega" #NT!
 mr_swe_nor_union_event.3.d: "Noruega exige el derecho a utilizar una bandera noruega limpia." #NT!
 mr_swe_nor_union_event.3.f: "El Stortinget, el parlamento noruego, ha votado a favor de adoptar una nueva bandera "limpia" sin los símbolos habituales de la unión sueco-noruega. ¿Debemos apoyar su decisión o negarles el derecho a utilizar la bandera que elijan?" #NT!
 mr_swe_nor_union_event.3.a: "Mantendrán su bandera actual" #NT!
 mr_swe_nor_union_event.3.b: "Déjenles usar la bandera que elijan" #NT!
  
 mr_swe_nor_union_event.4.t: "Oficinas consulares de Noruega" #NT!
 mr_swe_nor_union_event.4.d: "Noruega exige el derecho a abrir sus propias oficinas consulares en todo el mundo." #NT!
 mr_swe_nor_union_event.4.f: "Las oficinas consulares de la Unión han sido gestionadas por el Ministerio de Asuntos Exteriores en Estocolmo, pero como la industria naviera noruega ha aumentado en importancia, los noruegos argumentan que es necesaria una oficina consular noruega. En Suecia, la demanda noruega se considera como el primer paso hacia un servicio exterior noruego y una posible demanda futura de independencia noruega." #NT!
 mr_swe_nor_union_event.4.a: "No hay nada malo con nuestras oficinas." #NT!
 mr_swe_nor_union_event.4.b: "Cuantas más oficinas, mejor" #NT!
  
 mr_swe_nor_union_event.5.t: "La promesa de Carlos XV" #NT!
 mr_swe_nor_union_event.5.d: "Noruega exige que el nuevo rey, Carlos XV, cumpla su promesa de abolir el cargo de Gobernador General en Christiania." #NT!
 mr_swe_nor_union_event.5.f: "Una cosa es hacer promesas al pueblo de Noruega siendo el heredero, y otra muy distinta es ser el gobernante de dos países. ¿Se debería abolir el cargo como se prometió y que un primer ministro noruego sustituya al gobernador general en Christiania?" #NT!
 mr_swe_nor_union_event.5.a: "Necesitamos nuestra propia persona en Christiania" #NT!
 mr_swe_nor_union_event.5.b: "Una promesa debe cumplirse" #NT!
  
 mr_swe_nor_union_event.6.t: "La promesa del Príncipe Heredero" #NT!
 mr_swe_nor_union_event.6.d: "El heredero al trono, Karl Bernadotte, promete abolir el cargo de Gobernador General en Christiania tras su coronación" #NT!
 mr_swe_nor_union_event.6.f: "En un intento de ganarse el favor del pueblo noruego, el futuro rey se compromete solemnemente a eliminar el cargo de gobernador general de Christiania tras su coronación real. Como era de esperar, las reacciones de los terratenientes y las fuerzas armadas suecas ensombrecen la propuesta del joven heredero." #NT!
 mr_swe_nor_union_event.6.a: "Ojalá sepa lo que hace." #NT!
  
 mr_swe_nor_union_concessions_none: "Concesiones rechazadas a Noruega" #NT!
 mr_swe_nor_union_concessions_minor: "Pequeñas concesiones a Noruega" #NT!
 mr_swe_nor_union_concessions_major: "Concesiones importantes a Noruega" #NT!
  
 mr_swe_nor_clean_flag: "Noruega elimina todos los símbolos sindicales de su bandera" #NT!
