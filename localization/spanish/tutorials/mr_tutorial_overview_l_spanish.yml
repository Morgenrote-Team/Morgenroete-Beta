l_spanish:
 thriving_culture_lesson_start_tutorial_button_loc: "Iniciar tutorial"
 mr_tutorial_buttons: "Botones Morgenröte"
 mr_tutorial_buttons_desc: "La mayoría de las cosas en Morgenröte son accesibles en las ventanas de Morgenröte. Puede acceder a ellas haciendo clic en los botones de la barra lateral. Actualmente existen estas ventanas:\n\n- #V Ventana de la Ciencia#!: Aquí puede encontrar su [Concept('concept_academics_academic','$concept_academics_academics$')], sus actividades, su [concept_academics_progress] y Expediciones Científicas.\n\n- #V Ventana de Artes#!: Aquí puedes encontrar tu [Concept('concept_artists_artist','$concept_artists_artists$')], sus actividades, tu [concept_artistic_progress] y [Concept('concept_artists_art_style','$concept_artists_art_styles$')].\n\n- #V Ventana de Deportes#!: Aquí puedes encontrar varios deportes y personajes relacionados con el deporte así como la aeronáutica, sus actividades y Organizaciones Deportivas Internacionales."
 mr_tutorial_science_window_open: "Abrir la ventana de la ciencia"
 mr_tutorial_science_window_open_desc: "Ahora vamos a echar un vistazo más de cerca a la ventana de la ciencia. Abra la ventana de ciencia haciendo clic en el botón o pulsando la tecla \"M\" de su teclado."
 mr_tutorial_science_window_open_tt: "Abra la ventana de ciencia haciendo clic en el botón de ciencia o pulsando \"M\""
 mr_tutorial_science_tab: "La Ventana de la Ciencia"
 mr_tutorial_science_tab_desc: "The science window is the place where you can find information and actions for your scientific endeavours.\n\n\nIt is seperated in 4 tabs:\n\n- #V Overview#!: This tab contains [concept_academics_progress], #V General Scientific Expeditions#! and the #V Scientific Focus#!\n\n- #V Mathematical-Technical#!: This tab contains the [concept_tesla_engineer], [concept_mendelejew_chemist] and [concept_verrier_astronomer]\n\n- [concept_dubois_natural_history]: This tab contains the [concept_agassiz_geologist], [concept_dubois_paleontologist] and [concept_dubois_naturalist]\n\n- #V Humanities-Anthropological#!: This tab contains the [concept_panum_physician], [concept_lepsius_archaeologist] and [concept_lepsius_anthropologist]"
 mr_tutorial_science_tab_tt: "Se abre la ventana de la ciencia"
 mr_tutorial_science_overview_tab_open: "Abrir la pestaña Visión general"
 mr_tutorial_science_overview_tab_open_desc: "La pestaña Visión General le permite acceder a las [concept_academics_progress], #V Expediciones Científicas Generales#! y al #V Enfoque Científico#!\nEntre en la pestaña Visión General pulsando el botón de la pestaña."
 mr_tutorial_science_overview_tab_open_tt: "Acceda a la pestaña Resumen haciendo clic en el botón de la pestaña."
 mr_tutorial_science_overview_tab_promote_academics: "Fomento del mundo académico"
 mr_tutorial_science_overview_tab_promote_academics_desc: "El corazón de Morgenröte son los personajes. Pero, ¿cómo se consiguen esos personajes?\NPara conseguir un nuevo [concept_academics_academic] necesitas ganar suficiente [concept_academics_progress]. Puedes pasar el ratón por encima de la barra de progreso para ver qué factores influyen en la ganancia de progreso.\NPuedes promocionar a un Académico específico si tienes una Universidad con [concept_academics_university_specialization]. \NTambién puedes invertir dinero para ganar Progreso Académico más rápido.\NAlternativamente puedes conseguir Académicos con eventos o comprando uno con una acción diplomática si eres una nación que no pertenece a los países científicamente más avanzados."
 mr_tutorial_science_overview_tab_scientific_focus: "Enfoque científico"
 mr_tutorial_science_overview_tab_scientific_focus_desc: "A veces querrás centrarte en un tipo específico de investigación. Puedes utilizar los focos científicos si cumples sus requisitos. Básicamente, fomentarán la investigación de determinados grupos tecnológicos y reducirán la eficacia de otros."
 mr_tutorial_science_overview_tab_scientific_expedition: "Expediciones científicas"
 mr_tutorial_science_overview_tab_scientific_expedition_desc: "Las Expediciones Científicas son Expediciones que su país puede iniciar. Dependiendo del tipo de expedición esto puede conducir a grandes beneficios para su país. Actualmente existen estas expediciones: [concept_dubois_pacific_expedition] Expedición [concept_verrier_venus_transit] Expedición para encontrar el Paso del Noroeste Expedición Zeppelin Expedición para tender un Cable Transatlántico"
 mr_tutorial_science_natural_history_tab_open: "Abrir la pestaña Historia Natural"
 mr_tutorial_science_natural_history_tab_open_desc: "Veamos ahora una de las páginas [Concept('concept_academics_academic','$concept_academics_academics$')]. Abra la pestaña Historia Natural para continuar."
 mr_tutorial_science_natural_history_tab_open_tt: "Acceda a la pestaña Historia Natural pulsando el botón de la pestaña."
 mr_tutorial_science_natural_history_tab_character: "Académicos"
 mr_tutorial_science_natural_history_tab_character_desc: "El corazón de Morgenröte son sus personajes. En la pestaña de ciencia esos personajes son los [Concept('concept_academics_academic','$concept_academics_academics$')]. En la parte izquierda de cada nuevo rol de personaje puedes ver un retrato de tu Académico e información adicional sobre él."
 mr_tutorial_science_natural_history_tab_character_rating: "Calificación de los personajes"
 mr_tutorial_science_natural_history_tab_character_rating_desc: "La mayoría de los personajes tienen un pequeño icono junto a su nombre. Este icono indica su aptitud para su papel. ¡Puedes ver qué factores influyen en esta puntuación pasando el ratón por encima del icono.\nExplicación de los iconos:\n@mr_rating_fantastic!  ¡Perfecto@mr_rating_very_good!  ¡Muy bueno!  ¡Bueno@clasificación_mediocre!  ¡Mediocre!  ¡Malo@puntuación_muy_malo!  Muy mala"
 mr_tutorial_science_natural_history_tab_character_experience_bar: "Experiencia del personaje"
 mr_tutorial_science_natural_history_tab_character_experience_bar_desc: "Cada personaje tiene [concept_academics_experience] en su campo de experiencia. Cuanto mayor sea la Experiencia, mejor se desenvolverá el personaje en las distintas tareas.\nLa Experiencia se gana de forma pasiva cada año, así como de forma activa al completar tareas y tener éxito. [Concept('concept_academics_academic','$concept_academics_academics$')] ganan rasgos superiores si alcanzan 100 (experimentado) y 300 (famoso) de experiencia."
 mr_tutorial_science_natural_history_tab_character_achievements: "Logros de los personajes"
 mr_tutorial_science_natural_history_tab_character_achievements_desc: "[Concept('concept_academics_academic','$concept_academics_academics$')] a veces consiguen hazañas impresionantes. Siempre puedes comprobar lo que tu académico ha conseguido hasta ahora pasando el ratón por encima de este icono."
 mr_tutorial_science_natural_history_tab_currencies: "Discoveries and Values"
 mr_tutorial_science_natural_history_tab_currencies_desc: "La mayoría de los personajes de Morgenröte tienen valores asociados. Esos valores se muestran en el centro de cada académico. En Geología, verás cuántos minerales has encontrado o cuántos conocimientos geológicos tienes, por ejemplo."
 mr_tutorial_science_natural_history_visit_button: "Botón de visita"
 mr_tutorial_science_natural_history_visit_button_desc: "La mayoría de [Concept('concept_academics_academic','$concept_academics_academics$')] tienen botones especiales de visita que le informan más sobre este académico específico.\nEl [concept_dubois_naturalist] por ejemplo tiene un botón para visitar el Zoo donde puede encontrar más información sobre sus animales del Zoo."
 mr_tutorial_science_natural_history_ranking: "Clasificación"
 mr_tutorial_science_natural_history_ranking_desc: "Quizá le guste compararse con otros países. En ese caso, la clasificación puede resultarle interesante. Si pasa el ratón por encima de este icono, podrá ver varias listas que le permitirán comprobar lo bien que le va en un determinado aspecto de Morgenröte en comparación con otras naciones.\n\nEn [concept_agassiz_geologist], por ejemplo, podrá comparar su Puntuación Geológica, Conocimientos Geológicos, Conocimientos Oceánicos, Minerales y Minerales Raros."
 mr_tutorial_science_natural_history_project_buttons: "Botones de proyecto y otros botones"
 mr_tutorial_science_natural_history_project_buttons_desc: "Esta parte de la interfaz es una de las más importantes para ti. Te permite encargar proyectos a tu [Concept('concept_academics_academic','$concept_academics_academics$')] e iniciar otras interacciones importantes.\NUn [concept_agassiz_geologist] puede ir de expedición, mejorar tus industrias, recalcular la edad de la tierra y puedes fundar un gabinete de minerales o iniciar un congreso sobre la Deriva Continental."
 mr_tutorial_science_natural_history_view_switch_buttons: "Cambiar el diseño"
 mr_tutorial_science_natural_history_view_switch_buttons_desc: "Si prefieres un interfacre más denso, puedes cambiar su aspecto utilizando este botón. Para el juego en sí no importa qué variante utilices. Así que elige la variante que más te guste."
 mr_start_culture_tutorial_button_loc: "Tutorial de cultura"
 mr_tutorial_not_yet_implemented_tt: "Este tutorial aún no está listo."
 mr_tutorial_arts_window_open: "Abrir la ventana de las artes"
 mr_tutorial_arts_window_open_desc: "Ahora echaremos un vistazo más de cerca a la ventana de artes. Abra la ventana de artes haciendo clic en el botón o pulsando las teclas \"Ctrl + A\" de su teclado."
 mr_tutorial_arts_window_open_tt: "Abra la ventana de artes haciendo clic en el botón de ciencia o pulsando \"Ctrl + A\""
 mr_tutorial_arts_tab: "Ficha Arte"
 mr_tutorial_arts_tab_desc: "Las artes fueron una parte importante de los siglos XIX y XX. Grandes [Concept('concept_artists_artist','$concept_artists_artists$')] de esta época siguen siendo bien conocidos hoy en día.\n\nMorgenröte ofrece varios tipos de Artistas y sus piezas de arte.\n\nLa ventana de Artes en sí tiene dos pestañas. Una le muestra una visión general sobre las Artes en su país, en la otra puede encontrar sus artistas y reclutar artistas de países extranjeros."
 mr_tutorial_arts_tab_cultural_tradition: "Tradición cultural"
 mr_tutorial_arts_tab_cultural_tradition_desc: "La Tradición Cultural es un valor que representa los logros culturales de tu país.\nSe compone de [concept_elgar_musical_tradition], [concept_manzoni_literary_tradition] y [concept_klimt_painting_tradition].\nLa Tradición Cultural se calcula mediante esta fórmula:\nTradición Musical / 4 + Tradición Pictórica / 3 + Tradición Literaria / 2\nganarás adicionalmente [concept_prestige] de tu Tradición Artística. Por cada 5 puntos de Tradición Artística obtendrás 1 Prestigio adicional."
 mr_tutorial_arts_overview_tab_open_tt: "Abra la pestaña Panorama de las artes"
 mr_tutorial_arts_tab_artist_progress: "Progreso del artista"
 mr_tutorial_arts_tab_artist_progress_desc: "You can get new [Concept('concept_artists_artist','$concept_artists_artists$')] by different means: You can recruit them, gain them with events or by collecting enough [concept_artistic_progress].\n\nWhile events and recruitment is not possible for every nation, gaining artists by filling the Artistic Progress bar is possible once you own an $building_elgar_opera$ or an $building_art_academy$.\nYou can see a full list of factors influencing the monthly gain by hovering over the progress bar.\n\nAdditionally you can Patronize the Arts to gain more progress and promote certain artists if you have the necessary [concept_production_method] in your $building_art_academy$."
 mr_tutorial_arts_tab_center_of_arts: "Centro de las Artes"
 mr_tutorial_arts_tab_center_of_arts_desc: "[Concept('concept_artists_center_of_arts','$concept_artists_centers_of_arts$')] son los lugares donde nació un [concept_artists_art_style].\n Algunos Centros de Artes ya existen al comenzar el juego. Otros pueden ser desbloqueados por [Concept('concept_journal_entry','$concept_journal_entries$')] o pulsando uno de los botones que puedes ver aquí. Pasa el ratón por encima del Centro de Arte para ver cómo puedes conseguirlo. Obviamente, los Centros de Arte son útiles para ti y para tu país, ya que te dan acceso a bonificaciones."
 mr_tutorial_arts_tab_artists_tab_open: "Abrir la pestaña Artistas"
 mr_tutorial_arts_tab_artists_tab_open_desc: "Ahora echemos un vistazo más de cerca a [Concept('concept_artists_artist','$concept_artists_artists$')]. Abra la pestaña Artistas haciendo clic en el botón de la pestaña."
 mr_tutorial_arts_tab_artists_tab_open_open_tt: "Abrir la pestaña Artistas"
 mr_tutorial_arts_tab_artists: "Ficha Artistas"
 mr_tutorial_arts_tab_artists_desc: "Los [Concept('concept_artists_artist','$concept_artists_artists$')] se parecen bastante a los Académicos, pero funcionan de forma ligeramente diferente. Actualmente hay 3 Artistas: [concept_elgar_composer] [concept_manzoni_writer] [concept_klimt_painter]"
 mr_tutorial_arts_tab_artists_invite: "Invitar a artistas"
 mr_tutorial_arts_tab_artists_accquisation_desc: "Como ya hemos mencionado, [Concept('concept_artists_artist','$concept_artists_artists$')] no sólo puede adquirirse ganando suficientes [concept_artistic_progress] sino también simplemente invitándolos.\n\nCada tipo de Artista tiene diferentes requisitos. Puedes invitar a [Concept('concept_elgar_travelling_composer','$concept_elgar_travelling_composers$')] de todo el mundo, pero tienes que ser un país con suficientes $building_elgar_opera$s y lo suficientemente bueno [concept_elgar_musical_tradition]. \n[Concept('concept_klimt_independent_painter','$concept_klimt_independent_painters$')] sólo pueden ser invitados si tienen una cultura similar.\n[Concept('concept_manzoni_writer','$concept_manzoni_writers$')] por otro lado no pueden ser invitados en absoluto."
 mr_tutorial_arts_tab_artists_character: "Información general"
 mr_tutorial_arts_tab_artists_character_desc: "La parte más a la izquierda de la ventana muestra información básica sobre el artista. Aquí puede ver: El retrato, el nombre y la valoración, la página [concept_artists_experience]. [Concept('concept_character_trait','$concept_character_traits$')]"
 mr_tutorial_arts_tab_artists_currencies: "Valores artísticos importantes"
 mr_tutorial_arts_tab_artists_currencies_desc: "Esta parte de la interfaz le permite ver información general relativa a este aspecto específico del arte.\NPara el [concept_elgar_composer] muestra el [concept_elgar_musical_tradition], las Composiciones y Obras Maestras de su Compositor y una visión general de los cinco mejores Compositores del mundo por ejemplo.\NAdemás puede encontrar un Ranking al pasar el ratón por encima del pequeño icono en la esquina superior derecha."
 mr_tutorial_arts_tab_artists_actions: "Acciones de artistas"
 mr_tutorial_arts_tab_artists_actions_desc: "[Concept('concept_artists_artist','$concept_artists_artists$')] también tienen acciones. Aquí puedes ver en qué pueden trabajar tus Artistas o qué decisiones puedes tomar con tu nación. Puedes continuar con el Tutorial de Deportes desde aquí o continuar tu juego."
 mr_start_sports_tutorial_button_loc: "Tutorial de deportes"
 mr_tutorial_sports_window_open: "Abrir la ventana Deportes"
 mr_tutorial_sports_window_open_desc: "Ahora vamos a echar un vistazo más de cerca a la ventana de deportes. Abra la ventana de deportes haciendo clic en el botón o pulsando las teclas \"Ctrl + S\" de su teclado."
 mr_tutorial_sports_window_open_tt: "Abre la ventana de deportes haciendo clic en el botón de ciencia o pulsando \"Ctrl + S\""
 mr_tutorial_sports_window: "Escaparate deportivo"
 mr_tutorial_sports_window_desc: "La Ventana de Deportes te permite acceder a todos los diferentes deportes y personajes que son relevantes para los deportes.\nLa Ventana está separada en deportes normales y Aeronáutica.\nLos Deportes Normales incluyen:\n- [concept_vikelas_olympic_games]\n- [concept_douglas_mountaineering]\n- Deportes de Pelota\n- [concept_vikelas_car_racing]\nLa Aeronáutica incluye:\n- [concept_curtiss_balloonist]\n- [concept_curtiss_pilot]"
 mr_tutorial_sports_tab: "Ficha Deportes"
 mr_tutorial_sports_tab_desc: "La pestaña Deportes te ofrece una visión general de las actividades y personajes relacionados con el deporte. A diferencia de Académicos y Artistas, los personajes de la pestaña Deportes suelen ser generales o políticos."
 mr_tutorial_sports_tab_open_tt: "Abrir la pestaña Deportes"
 mr_tutorial_sports_tab_character_overview: "Personajes"
 mr_tutorial_sports_tab_character_overview_desc: "Esta parte de la IU te da una visión general de [concept_character]. Algunos Personajes como el [concept_vikelas_coach] y el Correcaminos son personajes que puedes conseguir y por lo tanto tienen [concept_academics_experience]. Otros como el Montañero no tienen Experiencia."
 mr_tutorial_sports_tab_currencies: "Valores e información"
 mr_tutorial_sports_tab_currencies_desc: "En el centro puedes ver información importante relativa a este deporte en concreto.\nEn [concept_vikelas_olympic_games], por ejemplo, aparece una descripción general del Presidente y la Junta Directiva de [concept_vikelas_ioc], cuántos miembros hay y cuántas medallas has conseguido hasta ahora."
 mr_tutorial_sports_tab_actions: "Acciones"
 mr_tutorial_sports_tab_actions_desc: "El lado derecho te permite tomar acciones específicas para ese deporte.\nEstas Acciones son básicamente decisiones que te permiten usar tu [Concept('concept_character', '$concept_characters$')] o establecer algo nuevo como [concept_vikelas_ioc]."
 mr_tutorial_sports_tab_aeronautics_tab_open: "Abrir la pestaña Aeronáutica"
 mr_tutorial_sports_tab_aeronautics_tab_open_desc: "Echemos ahora un vistazo a la pestaña Aeronáutica. Abra la pestaña haciendo clic en el botón."
 mr_tutorial_aeronautics_tab_open_tt: "Abrir la pestaña Aeronáutica"
 mr_tutorial_aeronautics_tab: "Ficha Aeronáutica"
 mr_tutorial_aeronautics_tab_desc: "La pestaña Aeronáutica es prácticamente igual que la pestaña Deportes. Puedes patrocinar y automatizar el [concept_curtiss_balloonist] y el [concept_curtiss_pilot] aparecerá en varias circunstancias. Por favor, utiliza la Vickypedia o los Conceptos que hemos añadido si quieres saber más sobre los personajes de Morgenröte."
 mr_tutorial_lesson_button_finish: "Tutorial de acabado"
