l_spanish:

 thriving_culture_lesson_start_tutorial_button_loc: "Iniciar tutorial" #deepl:1296206908

 mr_tutorial_buttons: "Botones Morgenröte" #deepl:3232304745
 mr_tutorial_buttons_desc: "La mayoría de las cosas en Morgenröte son accesibles en las ventanas de Morgenröte. Puede acceder a ellas haciendo clic en los botones de la barra lateral. Actualmente existen estas ventanas:\n\n- #V Ventana de la Ciencia#!: Aquí puede encontrar su [Concept('concept_academics_academic','$concept_academics_academics$')], sus actividades, su [concept_academics_progress] y Expediciones Científicas.\n\n- #V Ventana de Artes#!: Aquí puedes encontrar tu [Concept('concept_artists_artist','$concept_artists_artists$')], sus actividades, tu [concept_artistic_progress] y [Concept('concept_artists_art_style','$concept_artists_art_styles$')].\n\n- #V Ventana de Deportes#!: Aquí puedes encontrar varios deportes y personajes relacionados con el deporte así como la aeronáutica, sus actividades y Organizaciones Deportivas Internacionales." #deepl:3017682288

 mr_tutorial_science_window_open: "Abrir la ventana de la ciencia" #deepl:734722697
 mr_tutorial_science_window_open_desc: "Ahora vamos a echar un vistazo más de cerca a la ventana de la ciencia. Abra la ventana de ciencia haciendo clic en el botón o pulsando la tecla \"M\" de su teclado." #deepl:1849505402
 mr_tutorial_science_window_open_tt: "Abra la ventana de ciencia haciendo clic en el botón de ciencia o pulsando \"M\"" #deepl:1188172678

 mr_tutorial_science_tab: "La Ventana de la Ciencia" #deepl:1054166281
 mr_tutorial_science_tab_desc: "La ventana de ciencia es el lugar donde puede encontrar información y acciones para sus expediciones científicas.\n\nEstá separada en 4 pestañas:\n\n- #V Visión General#!: Esta pestaña contiene [concept_academics_progress], #V Expediciones Científicas Generales#! y el #V Enfoque Científico#!\n\n- #V Matemático-Técnico#!: Esta pestaña contiene el [concept_gaudi_engineer], [concept_mendelejew_chemist] y [concept_verrier_astronomer]\n\n- #V Humanidades-Antropológico#!: Esta pestaña contiene [concept_panum_physician], [concept_lepsius_archaeologist] y [concept_lepsius_anthropologist]\n\n- [concept_dubois_natural_history]: Esta pestaña contiene [concept_agassiz_geologist], [concept_dubois_paleontologist] y [concept_dubois_naturalist]\n\n- #V Humanidades-Antropológicas#!: Esta pestaña contiene [concept_panum_physician], [concept_lepsius_archaeologist] y [concept_lepsius_anthropologist]" #deepl:271317186
 mr_tutorial_science_tab_tt: "Se abre la ventana de la ciencia" #deepl:3571747254

 mr_tutorial_science_overview_tab_open: "Abrir la pestaña Visión general" #deepl:2171973784
 mr_tutorial_science_overview_tab_open_desc: "La pestaña Visión General le permite acceder a las [concept_academics_progress], #V Expediciones Científicas Generales#! y al #V Enfoque Científico#!\nEntre en la pestaña Visión General pulsando el botón de la pestaña." #deepl:3801100877
 mr_tutorial_science_overview_tab_open_tt: "Acceda a la pestaña Resumen haciendo clic en el botón de la pestaña." #deepl:583115154

 mr_tutorial_science_overview_tab_promote_academics: "Fomento del mundo académico" #deepl:3127848749
 mr_tutorial_science_overview_tab_promote_academics_desc: "El corazón de Morgenröte son los personajes. Pero, ¿cómo se consiguen esos personajes?\NPara conseguir un nuevo [concept_academics_academic] necesitas ganar suficiente [concept_academics_progress]. Puedes pasar el ratón por encima de la barra de progreso para ver qué factores influyen en la ganancia de progreso.\NPuedes promocionar a un Académico específico si tienes una Universidad con [concept_academics_university_specialization]. \NTambién puedes invertir dinero para ganar Progreso Académico más rápido.\NAlternativamente puedes conseguir Académicos con eventos o comprando uno con una acción diplomática si eres una nación que no pertenece a los países científicamente más avanzados." #deepl:3334402372

 mr_tutorial_science_overview_tab_scientific_focus: "Enfoque científico" #deepl:4254522642
 mr_tutorial_science_overview_tab_scientific_focus_desc: "A veces querrás centrarte en un tipo específico de investigación. Puedes utilizar los focos científicos si cumples sus requisitos. Básicamente, fomentarán la investigación de determinados grupos tecnológicos y reducirán la eficacia de otros." #deepl:2966516010

 mr_tutorial_science_overview_tab_scientific_expedition: "Expediciones científicas" #deepl:3527687538
 mr_tutorial_science_overview_tab_scientific_expedition_desc: "Las Expediciones Científicas son Expediciones que su país puede iniciar. Dependiendo del tipo de expedición esto puede conducir a grandes beneficios para su país. Actualmente existen estas expediciones: [concept_dubois_pacific_expedition] Expedición [concept_verrier_venus_transit] Expedición para encontrar el Paso del Noroeste Expedición Zeppelin Expedición para tender un Cable Transatlántico" #deepl:413711623

 mr_tutorial_science_natural_history_tab_open: "Abrir la pestaña Historia Natural" #deepl:1440158592
 mr_tutorial_science_natural_history_tab_open_desc: "Veamos ahora una de las páginas [Concept('concept_academics_academic','$concept_academics_academics$')]. Abra la pestaña Historia Natural para continuar." #deepl:3933847545
 mr_tutorial_science_natural_history_tab_open_tt: "Acceda a la pestaña Historia Natural pulsando el botón de la pestaña." #deepl:1038657530

 mr_tutorial_science_natural_history_tab_character: "Académicos" #deepl:1408513918
 mr_tutorial_science_natural_history_tab_character_desc: "El corazón de Morgenröte son sus personajes. En la pestaña de ciencia esos personajes son los [Concept('concept_academics_academic','$concept_academics_academics$')]. En la parte izquierda de cada nuevo rol de personaje puedes ver un retrato de tu Académico e información adicional sobre él." #deepl:1020069787

 mr_tutorial_science_natural_history_tab_character_rating: "Calificación de los personajes" #deepl:3205270775
 mr_tutorial_science_natural_history_tab_character_rating_desc: "La mayoría de los personajes tienen un pequeño icono junto a su nombre. Este icono indica su aptitud para su papel. ¡Puedes ver qué factores influyen en esta puntuación pasando el ratón por encima del icono.\nExplicación de los iconos:\n@mr_rating_fantastic!  ¡Perfecto@mr_rating_very_good!  ¡Muy bueno!  ¡Bueno@clasificación_mediocre!  ¡Mediocre!  ¡Malo@puntuación_muy_malo!  Muy mala" #deepl:2393422146

 mr_tutorial_science_natural_history_tab_character_experience_bar: "Experiencia del personaje" #deepl:356262571
 mr_tutorial_science_natural_history_tab_character_experience_bar_desc: "Cada personaje tiene [concept_academics_experience] en su campo de experiencia. Cuanto mayor sea la Experiencia, mejor se desenvolverá el personaje en las distintas tareas.\nLa Experiencia se gana de forma pasiva cada año, así como de forma activa al completar tareas y tener éxito. [Concept('concept_academics_academic','$concept_academics_academics$')] ganan rasgos superiores si alcanzan 100 (experimentado) y 300 (famoso) de experiencia." #deepl:4293324584

 mr_tutorial_science_natural_history_tab_character_achievements: "Logros de los personajes" #deepl:2935735490
 mr_tutorial_science_natural_history_tab_character_achievements_desc: "[Concept('concept_academics_academic','$concept_academics_academics$')] a veces consiguen hazañas impresionantes. Siempre puedes comprobar lo que tu académico ha conseguido hasta ahora pasando el ratón por encima de este icono." #deepl:1195783621

 mr_tutorial_science_natural_history_tab_currencies: "Discvoeries y valores" #deepl:1384869411
 mr_tutorial_science_natural_history_tab_currencies_desc: "La mayoría de los personajes de Morgenröte tienen valores asociados. Esos valores se muestran en el centro de cada académico. En Geología, verás cuántos minerales has encontrado o cuántos conocimientos geológicos tienes, por ejemplo." #deepl:4066533914

 mr_tutorial_science_natural_history_visit_button: "Botón de visita" #deepl:3858963492
 mr_tutorial_science_natural_history_visit_button_desc: "La mayoría de [Concept('concept_academics_academic','$concept_academics_academics$')] tienen botones especiales de visita que le informan más sobre este académico específico.\nEl [concept_dubois_naturalist] por ejemplo tiene un botón para visitar el Zoo donde puede encontrar más información sobre sus animales del Zoo." #deepl:1189517097

 mr_tutorial_science_natural_history_ranking: "Clasificación" #deepl:4181663012
 mr_tutorial_science_natural_history_ranking_desc: "Quizá le guste compararse con otros países. En ese caso, la clasificación puede resultarle interesante. Si pasa el ratón por encima de este icono, podrá ver varias listas que le permitirán comprobar lo bien que le va en un determinado aspecto de Morgenröte en comparación con otras naciones.\n\nEn [concept_agassiz_geologist], por ejemplo, podrá comparar su Puntuación Geológica, Conocimientos Geológicos, Conocimientos Oceánicos, Minerales y Minerales Raros." #deepl:394625426

 mr_tutorial_science_natural_history_project_buttons: "Botones de proyecto y otros botones" #deepl:430248338
 mr_tutorial_science_natural_history_project_buttons_desc: "Esta parte de la interfaz es una de las más importantes para ti. Te permite encargar proyectos a tu [Concept('concept_academics_academic','$concept_academics_academics$')] e iniciar otras interacciones importantes.\NUn [concept_agassiz_geologist] puede ir de expedición, mejorar tus industrias, recalcular la edad de la tierra y puedes fundar un gabinete de minerales o iniciar un congreso sobre la Deriva Continental." #deepl:2696053152

 mr_tutorial_science_natural_history_view_switch_buttons: "Cambiar el diseño" #deepl:1671308253
 mr_tutorial_science_natural_history_view_switch_buttons_desc: "Si prefieres un interfacre más denso, puedes cambiar su aspecto utilizando este botón. Para el juego en sí no importa qué variante utilices. Así que elige la variante que más te guste." #deepl:2800918764

 mr_start_culture_tutorial_button_loc: "Tutorial de cultura" #deepl:231585177
 mr_tutorial_not_yet_implemented_tt: "Este tutorial aún no está listo." #deepl:1971937521

 mr_tutorial_arts_window_open: "Abrir la ventana de las artes" #deepl:2590280325
 mr_tutorial_arts_window_open_desc: "Ahora echaremos un vistazo más de cerca a la ventana de artes. Abra la ventana de artes haciendo clic en el botón o pulsando las teclas \"Ctrl + A\" de su teclado." #deepl:53394483
 mr_tutorial_arts_window_open_tt: "Abra la ventana de artes haciendo clic en el botón de ciencia o pulsando \"Ctrl + A\"" #deepl:2950751548

 mr_tutorial_arts_tab: "Ficha Arte" #deepl:2793588649
 mr_tutorial_arts_tab_desc: "Las artes fueron una parte importante de los siglos XIX y XX. Grandes [Concept('concept_artists_artist','$concept_artists_artists$')] de esta época siguen siendo bien conocidos hoy en día.\n\nMorgenröte ofrece varios tipos de Artistas y sus piezas de arte.\n\nLa ventana de Artes en sí tiene dos pestañas. Una le muestra una visión general sobre las Artes en su país, en la otra puede encontrar sus artistas y reclutar artistas de países extranjeros." #deepl:543699742

 mr_tutorial_arts_tab_cultural_tradition: "Tradición cultural" #deepl:3268694731
 mr_tutorial_arts_tab_cultural_tradition_desc: "La Tradición Cultural es un valor que representa los logros culturales de tu país.\nSe compone de [concept_elgar_musical_tradition], [concept_manzoni_literary_tradition] y [concept_klimt_painting_tradition].\nLa Tradición Cultural se calcula mediante esta fórmula:\nTradición Musical / 4 + Tradición Pictórica / 3 + Tradición Literaria / 2\nganarás adicionalmente [concept_prestige] de tu Tradición Artística. Por cada 5 puntos de Tradición Artística obtendrás 1 Prestigio adicional." #deepl:3774927584
 mr_tutorial_arts_overview_tab_open_tt: "Abra la pestaña Panorama de las artes" #deepl:3810726030

 mr_tutorial_arts_tab_artist_progress: "Progreso del artista" #deepl:61174778
 mr_tutorial_arts_tab_artist_progress_desc: "Puedes conseguir nuevos [Concept('concept_artists_artist','$concept_artists_artists$')] de diferentes maneras: Puedes reclutarlos, conseguirlos con eventos o reuniendo suficientes [concept_artistic_progress]. Aunque los eventos y el reclutamiento no son posibles para todas las naciones, conseguir artistas llenando la barra de progreso artístico es posible una vez que posees un $building_elgar_opera$ o un $building_arts_academy$. Puedes ver una lista completa de los factores que influyen en la ganancia mensual pasando el ratón por encima de la barra de progreso. Además, puedes patrocinar las artes para ganar más progreso y promocionar a ciertos artistas si tienes el [concept_production_method] necesario en tu $building_arts_academy$." #deepl:1108726132

 mr_tutorial_arts_tab_center_of_arts: "Centro de las Artes" #deepl:4265095628
 mr_tutorial_arts_tab_center_of_arts_desc: "[Concept('concept_artists_center_of_arts','$concept_artists_centers_of_arts$')] son los lugares donde nació un [concept_artists_art_style].\n Algunos Centros de Artes ya existen al comenzar el juego. Otros pueden ser desbloqueados por [Concept('concept_journal_entry','$concept_journal_entries$')] o pulsando uno de los botones que puedes ver aquí. Pasa el ratón por encima del Centro de Arte para ver cómo puedes conseguirlo. Obviamente, los Centros de Arte son útiles para ti y para tu país, ya que te dan acceso a bonificaciones." #deepl:1287628103

 mr_tutorial_arts_tab_artists_tab_open: "Abrir la pestaña Artistas" #deepl:974477655
 mr_tutorial_arts_tab_artists_tab_open_desc: "Ahora echemos un vistazo más de cerca a [Concept('concept_artists_artist','$concept_artists_artists$')]. Abra la pestaña Artistas haciendo clic en el botón de la pestaña." #deepl:391030067
 mr_tutorial_arts_tab_artists_tab_open_open_tt: "Abrir la pestaña Artistas" #deepl:974477655

 mr_tutorial_arts_tab_artists: "Ficha Artistas" #deepl:1211285969
 mr_tutorial_arts_tab_artists_desc: "Los [Concept('concept_artists_artist','$concept_artists_artists$')] se parecen bastante a los Académicos, pero funcionan de forma ligeramente diferente. Actualmente hay 3 Artistas: [concept_elgar_composer] [concept_manzoni_writer] [concept_klimt_painter]" #deepl:124747602

 mr_tutorial_arts_tab_artists_invite: "Invitar a artistas" #deepl:1648609371
 mr_tutorial_arts_tab_artists_accquisation_desc: "Como ya hemos mencionado, [Concept('concept_artists_artist','$concept_artists_artists$')] no sólo puede adquirirse ganando suficientes [concept_artistic_progress] sino también simplemente invitándolos.\n\nCada tipo de Artista tiene diferentes requisitos. Puedes invitar a [Concept('concept_elgar_travelling_composer','$concept_elgar_travelling_composers$')] de todo el mundo, pero tienes que ser un país con suficientes $building_elgar_opera$s y lo suficientemente bueno [concept_elgar_musical_tradition]. \n[Concept('concept_klimt_independent_painter','$concept_klimt_independent_painters$')] sólo pueden ser invitados si tienen una cultura similar.\n[Concept('concept_manzoni_writer','$concept_manzoni_writers$')] por otro lado no pueden ser invitados en absoluto." #deepl:2127803597

 mr_tutorial_arts_tab_artists_character: "Información general" #deepl:995936974
 mr_tutorial_arts_tab_artists_character_desc: "La parte más a la izquierda de la ventana muestra información básica sobre el artista. Aquí puede ver: El retrato, el nombre y la valoración, la página [concept_artists_experience]. [Concept('concept_character_trait','$concept_character_traits$')]" #deepl:1445240346

 mr_tutorial_arts_tab_artists_currencies: "Valores artísticos importantes" #deepl:71895904
 mr_tutorial_arts_tab_artists_currencies_desc: "Esta parte de la interfaz le permite ver información general relativa a este aspecto específico del arte.\NPara el [concept_elgar_composer] muestra el [concept_elgar_musical_tradition], las Composiciones y Obras Maestras de su Compositor y una visión general de los cinco mejores Compositores del mundo por ejemplo.\NAdemás puede encontrar un Ranking al pasar el ratón por encima del pequeño icono en la esquina superior derecha." #deepl:1891899818

 mr_tutorial_arts_tab_artists_actions: "Acciones de artistas" #deepl:2320930103
 mr_tutorial_arts_tab_artists_actions_desc: "[Concept('concept_artists_artist','$concept_artists_artists$')] también tienen acciones. Aquí puedes ver en qué pueden trabajar tus Artistas o qué decisiones puedes tomar con tu nación. Puedes continuar con el Tutorial de Deportes desde aquí o continuar tu juego." #deepl:746856108
 mr_start_sports_tutorial_button_loc: "Tutorial de deportes" #deepl:826655861

 mr_tutorial_sports_window_open: "Abrir la ventana Deportes" #deepl:1830514457
 mr_tutorial_sports_window_open_desc: "Ahora vamos a echar un vistazo más de cerca a la ventana de deportes. Abra la ventana de deportes haciendo clic en el botón o pulsando las teclas \"Ctrl + S\" de su teclado." #deepl:243246943
 mr_tutorial_sports_window_open_tt: "Abre la ventana de deportes haciendo clic en el botón de ciencia o pulsando \"Ctrl + S\"" #deepl:1482293542

 mr_tutorial_sports_window: "Escaparate deportivo" #deepl:4243980162
 mr_tutorial_sports_window_desc: "La Ventana de Deportes te permite acceder a todos los diferentes deportes y personajes que son relevantes para los deportes.\nLa Ventana está separada en deportes normales y Aeronáutica.\nLos Deportes Normales incluyen:\n- [concept_vikelas_olympic_games]\n- [concept_douglas_mountaineering]\n- Deportes de Pelota\n- [concept_vikelas_car_racing]\nLa Aeronáutica incluye:\n- [concept_curtiss_balloonist]\n- [concept_curtiss_pilot]" #deepl:2523227399

 mr_tutorial_sports_tab: "Ficha Deportes" #deepl:2701935579
 mr_tutorial_sports_tab_desc: "La pestaña Deportes te ofrece una visión general de las actividades y personajes relacionados con el deporte. A diferencia de Académicos y Artistas, los personajes de la pestaña Deportes suelen ser generales o políticos." #deepl:1383542418
 mr_tutorial_sports_tab_open_tt: "Abrir la pestaña Deportes" #deepl:176871982

 mr_tutorial_sports_tab_character_overview: "Personajes" #deepl:96645084
 mr_tutorial_sports_tab_character_overview_desc: "Esta parte de la IU te da una visión general de [concept_character]. Algunos Personajes como el [concept_vikelas_coach] y el Correcaminos son personajes que puedes conseguir y por lo tanto tienen [concept_academics_experience]. Otros como el Montañero no tienen Experiencia." #deepl:1695633540

 mr_tutorial_sports_tab_currencies: "Valores e información" #deepl:2440189283
 mr_tutorial_sports_tab_currencies_desc: "En el centro puedes ver información importante relativa a este deporte en concreto.\nEn [concept_vikelas_olympic_games], por ejemplo, aparece una descripción general del Presidente y la Junta Directiva de [concept_vikelas_ioc], cuántos miembros hay y cuántas medallas has conseguido hasta ahora." #deepl:1125108675

 mr_tutorial_sports_tab_actions: "Acciones" #deepl:1951990429
 mr_tutorial_sports_tab_actions_desc: "El lado derecho te permite tomar acciones específicas para ese deporte.\nEstas Acciones son básicamente decisiones que te permiten usar tu [Concept('concept_character', '$concept_characters$')] o establecer algo nuevo como [concept_vikelas_ioc]." #deepl:2455654735

 mr_tutorial_sports_tab_aeronautics_tab_open: "Abrir la pestaña Aeronáutica" #deepl:2120346894
 mr_tutorial_sports_tab_aeronautics_tab_open_desc: "Echemos ahora un vistazo a la pestaña Aeronáutica. Abra la pestaña haciendo clic en el botón." #deepl:2671641916
 mr_tutorial_aeronautics_tab_open_tt: "Abrir la pestaña Aeronáutica" #deepl:2187560588

 mr_tutorial_aeronautics_tab: "Ficha Aeronáutica" #deepl:2661687945
 mr_tutorial_aeronautics_tab_desc: "La pestaña Aeronáutica es prácticamente igual que la pestaña Deportes. Puedes patrocinar y automatizar el [concept_curtiss_balloonist] y el [concept_curtiss_pilot] aparecerá en varias circunstancias. Por favor, utiliza la Vickypedia o los Conceptos que hemos añadido si quieres saber más sobre los personajes de Morgenröte." #deepl:851922845
 mr_tutorial_lesson_button_finish: "Tutorial de acabado" #deepl:895117430

