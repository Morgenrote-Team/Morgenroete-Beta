l_spanish:
 matsuura.101.t: "Un joven quiere viajar a Ezo"
 matsuura.101.d: "[SCOPE.sCharacter('character_1_scope').GetFullName] es un joven que desea viajar a Ezo, al Norte. Sin embargo, el Dominio de Matsumae ha restringido los viajes. ¿Debería permitírsele al joven aventurarse a las islas del norte?"
 matsuura.101.f: "\"¡Quiero viajar a todas partes! ¡Ezo, Morokoshi, Tenjiku! ¡Por favor, déjenme ver las maravillas del mundo!\""
 matsuura.101.g: "¡Allí podría estudiar el paisaje!"
 matsuura.101.h: "He oído que es poeta, ¿quizás sus viajes le sirvan de inspiración?"
 matsuura.101.i: "¿Quizás podría pintar cuadros de la región?"
 matsuura.101.j: "Nadie puede salir."
 matsuura_allowed_travels_modifier: "Viajes Permitidos a Ezo"
 matsuura.102.t: "Química Occidental"
 matsuura.102.d: "[SCOPE.sCharacter('character_1_scope').GetFullName] ha estudiado Rangaku, es decir, estudios Occidentales, durante años. Ahora está a punto de escribir un libro sobre algo llamado \"Química\". Quizás sería una buena idea apoyarlo."
 matsuura.102.f: "\"Verá, un hombre procedente de una tierra lejana llevó a cabo unos experimentos...\"\n\"¿Quieres saber qué son los experimentos? Si tienes una teoría...\"\n\"Oh, usted tampoco sabe lo que es una teoría...\""
 matsuura.102.g: "¿A qué se refiere con eso de la \"Química\"?"
 matsuura.102.h: "¡Qué ideas tan bárbaras!"
 matsuura_barbarian_ideas_modifier: "Ideas Bárbaras"
 matsuura_nintendo_modifier: "Cartas Hanafuda de Nintendo"
 matsuura.103.t: "Nintendo"
 matsuura.103.d: "En Kioto, Fusajirō Yamauchi fundó una fábrica de naipes dedicada exclusivamente a la producción de las populares cartas Hanafuda. En poco tiempo se convirtió en líder del mercado en todo Japón. El nombre de la empresa es Nintendo."
 matsuura.103.f: "'Simplemente siéntate y relájate, amigo mío\nLa clase de hoy no durará mucho\nY para hacerlo aún más interesante\nSe trata de esta canción un tanto friki\nEs el año 1889, antes de los reconocimientos y los premios\nNintendo comenzó su andadura fabricando naipes de hanafuda\n\nDurante un siglo, se desarrollaron y se dedicaron a averiguar qué es lo que se vende\nFabricación de aspiradoras, Ultra Hand, medidores del amor y hoteles del amor\nPero pronto se centraron en juegos como el Game & Watch y el Color TV\nEn 1981, lanzaron Donkey Kong, ¡y el resto ya es historia!\n\nEsta es la historia de Nintendo\nA lo largo de los años, desde el Hanafuda hasta Mario\nDirectamente desde Kioto, con un tal Miyamoto\nEsta es la historia de Nintendo'\n\n-Matthew Taranto"
 matsuura.103.g: "¿Hay algún juego que pueda ser más popular que las cartas de Hanafuda?"