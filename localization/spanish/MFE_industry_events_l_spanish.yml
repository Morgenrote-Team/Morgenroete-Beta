 mfe_industry_events.1.t:0 "Surge la empresa ferroviaria"
 mfe_industry_events.1.d:0 "Un político con conexiones, [SCOPE.sCharacter('rich_dude').GetFullName], quiere financiar una nueva empresa ferroviaria, pero [SCOPE.gsInterestGroup('ig_intelligentsia').GetName] no apoya la nueva propuesta."
 mfe_industry_events.1.f:0 "\"La fiebre del ferrocarril está arrasando el mundo entero, con muchas oportunidades para ganar dinero, pero tenemos que movernos y hacerlo rápido. ¿Qué dices?\""
 mfe_industry_events.1.a:0 "Permitir que [SCOPE.sCharacter('rich_dude').GetFullName] continúe con el negocio"
 mfe_industry_events.1.b:0 "Bloquear cualquier esfuerzo adicional"
 mfe_industry_events.1.c:0 "Subvencionar sus esfuerzos"
 mfe_industry_events.2.t:0 "Próspera compañía ferroviaria"
 mfe_industry_events.2.d:0 "Los nuevos ferrocarriles en [SCOPE.sState('railway_state').GetName] son un gran éxito entre los lugareños, quienes los acogieron con entusiasmo."
 mfe_industry_events.2.f:0 "\"Antes se necesitaban tres horas para viajar de [SCOPE.sState('railway_state').GetName] a [ROOT.GetCountry.GetCapital.GetName], pero estas nuevas rutas acortan el tiempo de viaje a la mitad.\""
 mfe_industry_events.2.a:0 "¡Esto es genial!"
 mfe_industry_events.3.t:0 "Compañía ferroviaria en problemas"
 mfe_industry_events.3.d:0 "Los cambios repentinos en el mercado de valores han ejercido presión sobre el [SCOPE.gsInterestGroup('ig_industrialists').GetName], agotando las fuentes de capital, y las empresas ferroviarias excesivamente extendidas en el [SCOPE.sState('railway_state').GetName] están quebrando."
 mfe_industry_events.3.f:0 "\"Por supuesto, la prensa se está divirtiendo con esto - todos los días hay artículos escritos por los miembros del [SCOPE.gsInterestGroup('ig_intelligentsia').GetName] alardeando de nuestra desesperación - hay que hacer algo.\""
 mfe_industry_events.3.a:0 "¡Subvencione los rieles!"
 mfe_industry_events.3.b:0 "Los [SCOPE.gsInterestGroup('ig_industrialists').GetName] eran los que querían un mercado libre..."
 subsidize_rail_state_tt:0 "Empezar a subvencionar los Ferrocarriles en [SCOPE.sState('railway_state').GetName]"