l_spanish:
 athletes.2.t: "Nuestro alpinista, [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullNameNoFormatting], se retira"
 athletes.2.d: "Luego de pasar décadas de su vida escalando picos, trazando rutas desconocidas y liderando expediciones por terreno peligroso, [SCOPE.sCharacter('athletes_retired_person_scope').GetFullName] ha decidido retirarse. [SCOPE.sCharacter('athletes_retired_person_scope').GetSheHe|U] ya no servirá como nuestro [concept_douglas_mountaineer]."
 athletes.2.f: ""
 athletes.2.g: "La cumbre nunca fue el final; solo la vista antes del descenso."
 athletes.12.t: "Nuestro Alpinista muere"
 athletes.12.d: "Luego de una vida pasada conquistando picos y guiando a otros por las escaladas más peligrosas, nuestro más venerado [concept_douglas_mountaineer] ha fallecido. ¿Quién guiará ahora el camino a las nubes?"
 athletes.12.f: ""
 athletes.12.g: "Su cuerda puede haberse ido, pero el camino permanece."
 athletes.52.t: "Un nuevo Alpinista"
 athletes.52.d: "[SCOPE.sCharacter('douglas_new_mountaineer_scope').GetFullName] es un talento prometedor que quizás algún día estará entre los mejores que jamás escalaron nuestros picos."
 athletes.52.f: ""
 athletes.52.g: "[SCOPE.sCharacter('douglas_new_mountaineer_scope').GetSheHe|U] escala con propósito."
 athletes.102.t: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] es ahora un Alpinista Veterano!"
 athletes.102.d: "Después de enfrentarse a glaciares, cruzar crestas y liderar expediciones a lo desconocido, nuestro [concept_douglas_mountaineer] [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] es lo suficientemente reconocido para ser llamado un Alpinista Veterano!"
 athletes.102.f: ""
 athletes.102.g: "¡Un Maestro de las Montañas!"