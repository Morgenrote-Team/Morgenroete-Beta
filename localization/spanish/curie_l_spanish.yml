 curie.11.t: "Uranium found!"
 curie.11.d: "Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] has found exceptionally rich deposits of uranium during sample collections in [SCOPE.sState('curie_uranium_state_scope').GetName]. Physicists and chemists recommend exploiting the deposit directly."
 curie.11.f: "Uranium (named after the planet Uranus) is a chemical element with the element symbol U and the atomic number 92. Uranium compounds were used throughout the 19th century to color glass and ceramics, vases and decorative pieces, but also everyday objects such as bowls or glasses. Glass manufacturers in Joachimsthal (Bohemia) used this technique as early as 1826. Uranium was used to color glass until the middle of the 20th century, only then was it replaced by other, less harmful coloring minerals. Uranium-containing ceramic glazes ranging from orange to bright red were used on everything from tableware to architectural accessories. This ceramic, called 'Fiestaware' in the USA because of the name of a manufacturer, is probably one of the most radioactive items that can still be found in many American households."
 curie.11.g: "Build a uranium mine right there!"
 curie.12.t: "Joachimsthal"
 curie.12.d: "To date, the uranium mine in Joachimsthal, Bohemia, has produced only small quantities. With the increased demand due to the potential use of uranium in manufacturing and science, there are now plans to significantly increase production."
 curie.12.g: "Joachimsthal will be the center of uranium production!"
