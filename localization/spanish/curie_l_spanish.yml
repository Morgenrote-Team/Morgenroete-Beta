 pmg_curie_nuclear_reactor: "Nuclear Reactor"
 pm_curie_nuclear_reactor: "Nuclear Reactor"
 curie_nuclear_reactor_tech: "Nuclear Reactor"
 curie_nuclear_reactor_tech_desc: "The path to controlled nuclear fission began in 1942 with Chicago Pile-1, the world's first artificial nuclear reactor, which demonstrated a self-sustaining chain reaction beneath the stands of a stadium. Building on this, the X-10 graphite reactor in Tennessee followed, serving as a pilot plant to test the large-scale production of plutonium and the handling of intense radiation. The highlight of this era was the B Reactor at Hanford, the world's first full-scale production reactor, which finally made the industrial application of nuclear power a reality."
 curie_the_bomb_tech: "The Bomb"
 curie_the_bomb_tech_desc: "'Now I am become Death, the destroyer of worlds.'"
 curie_nuclear_fission_tech: "Nuclear Fission"
 curie_nuclear_fission_tech_desc: "In the late 1930s, researchers succeeded for the first time in splitting heavy atomic nuclei by bombarding them with neutrons, thereby unlocking a previously unimagined source of energy within matter. This scientific breakthrough marked the transition from theoretical physics to the practical mastery of the forces that bind the universe together."
 curie_facility_can_construct_only_facility_tt: "We do not have a Nuclear Research Facility yet."
 curie_rocket_science_tech: "Rocket Science"
 curie_rocket_science_tech_desc: "At the turn of the 20th century, rocket science transitioned from science fiction to a rigorous theoretical framework, largely pioneered by the Russian visionary Konstantin Tsiolkovsky. In his seminal 1903 work, Tsiolkovsky derived the fundamental rocket equation, proving that space travel was mathematically possible through multi-stage rockets and liquid propellants. The Transylvanian-German physicist Hermann Oberth independently developed the principles of astronautics in the 1920s, providing the engineering blueprints that would later inspire the first generation of practical rocket engineers."
 curie_modern_rockets_tech: "Modern Rockets"
 curie_modern_rockets_tech_desc: "Robert Goddard transitioned rocket science into a practical era by launching the first liquid-fueled rockets and developing essential systems like gyroscopic stabilization. In Germany, research intensified through the Verein für Raumschiffahrt, where a young Wernher von Braun began refining the engineering required for large-scale propulsion. This period ultimately saw the technology shift from private experimentation to massive state-funded projects, culminating in the development of the first rockets capable of reaching the edge of space."
