 curie_differential_geometry_tech: "Differential Geometry"
 curie_differential_geometry_tech_desc: "Pioneered by Gauss in the 19th century, Differential Geometry uses complex math to describe how curves and surfaces behave in the real world. Originally developed to create more accurate maps and measure the Earth, it allowed scientists to calculate shapes and distances using formulas instead of just looking at them."