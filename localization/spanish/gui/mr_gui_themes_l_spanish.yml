l_spanish:
 theme_mr_paleontology: "Morgenröte: paleontología (tierra)"
 theme_mr_paleontology_desc: "Una interfaz de usuario inspirada en paleontología, fósiles y huesos de dinosaurios."
 mr_papermap_coprolite: "Paleontología: Coprolite"
 mr_papermap_coprolite_desc: "Parece que un paleontólogo está trabajando actualmente en la preparación de un coprolito. ¿Te preguntas qué es Coprolite? Es caca fosilizada. En este caso probablemente de un dinosaurio."
 mr_papermap_belemnite: "Paleontología: Belemnita"
 mr_papermap_belemnite_desc: "Un fósil belemnita encontrado por un paleontólogo. Estas criaturas recorrieron los mares entre 358 y 66 millones de años hace."
 mr_papermap_ammonite: "Paleontología: amonita"
 mr_papermap_ammonite_desc: "Uno de los fósiles más famosos. Esta amonita una vez vagó por el mar hace millones de años. Ahora es una buena decoración para tu mesa."
 mr_papermap_trilobite: "Paleontología: trilobita"
 mr_papermap_trilobite_desc: "Los trilobites se encontraban entre los primeros artrópodos y muy exitosos. Lamentablemente se extinguieron en el Pérmico. Afortunadamente, algunos fueron fosilizados y puedes mantenerlos en tu mesa como recuerdo."
 mr_papermap_battenberg_cake: "Culinario: pastel de Battenberg"
 mr_papermap_battenberg_cake_desc: "¿Tienes hambre? Tal vez deberías poner este delicioso pastel en tu mesa. Es un pastel de esponja cubierto de mazapán y lleva el nombre del Príncipe Louis de Battenberg."
 mr_papermap_old_fashioned: "Culinario: anticuado"
 mr_papermap_old_fashioned_desc: "¿Qué podría ser mejor que un buen anticuado al final de un largo día? ¡Seguramente tu barero te pondrá de humor feliz con este cóctel!"
 mr_papermap_cucumber_ice_cream: "Culinario: helado de pepino"
 mr_papermap_cucumber_ice_cream_desc: "El sol brilla desde el cielo, es un día caluroso y soleado. ¿Qué podría ser mejor que un helado de pepino maravillosamente refrescante?"
 mr_papermap_croissant_hot_chocolate: "Culinario: Croissant y Chocolate caliente"
 mr_papermap_croissant_hot_chocolate_desc: "Un croissant y un chocolate caliente por la mañana es la mejor manera de comenzar el día. No importa lo que te espera."