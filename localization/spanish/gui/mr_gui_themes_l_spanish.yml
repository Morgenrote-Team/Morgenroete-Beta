l_spanish:
 theme_mr_paleontology: "Morgenröte: Paleontología (Tierra)" #deepl:1069050187
 theme_mr_paleontology_desc: "Una interfaz de usuario inspirada en la paleontología, los fósiles y los huesos de dinosaurio." #deepl:415348285

 mr_papermap_coprolite: "Paleontología: Coprolita"
 mr_papermap_coprolite_desc: "Parece que un paleontólogo está trabajando actualmente en la preparación de un coprolito. ¿Te preguntas qué es la coprolita? Es caca fosilizada. En este caso probablemente de un dinosaurio."
 mr_papermap_belemnite: "Paleontología: Belemnite" #Please replace
 mr_papermap_belemnite_desc: "Un fósil de Belemnite encontrado por un paleontólogo. Estas criaturas vagaban por los mares hace entre 358 y 66 millones de años." #Please replace
 mr_papermap_ammonite: "Paleontología: Ammonite" #Please replace
 mr_papermap_ammonite_desc: "Uno de los fósiles más famosos. Este amonite vagó por el mar hace millones de años. Ahora es una bonita decoración para su mesa." #Please replace
 mr_papermap_trilobite: "Paleontología: Trilobite"
 mr_papermap_trilobite_desc: "Los trilobites fueron de los primeros artrópodos y tuvieron mucho éxito. Por desgracia, se extinguieron en el Pérmico. Por suerte, algunos quedaron fosilizados y puedes conservarlos en tu mesa como recuerdo."

 mr_papermap_battenberg_cake: "Culinaria: Tarta Battenberg"
 mr_papermap_battenberg_cake_desc: "¿Tienes hambre? Quizá deberías poner este delicioso pastel en tu mesa. Es un bizcocho cubierto de mazapán que lleva el nombre del príncipe Luis de Battenberg."
 mr_papermap_cucumber_ice_cream: "Culinaria: Helado de pepino"
 mr_papermap_cucumber_ice_cream_desc: "El sol brilla en el cielo, es un día soleado y caluroso. ¿Qué podría ser mejor que un maravilloso y refrescante helado de pepino?"
 mr_papermap_croissant_hot_chocolate: "Culinaria: Croissant y chocolate caliente"
 mr_papermap_croissant_hot_chocolate_desc: "Un cruasán y un chocolate caliente por la mañana es la mejor manera de empezar el día. No importa lo que te espere."
