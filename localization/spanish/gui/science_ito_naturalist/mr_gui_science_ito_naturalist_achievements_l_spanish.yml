l_spanish:
 MR_NATURALIST_ACHIEVEMENTS_TT: "[AddLocalizationIf( Scope.IsSet , 'ito_naturalist_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'ito_naturalist_no_naturalist_loc')]"
 ito_naturalist_achievements_loc: "$ito_naturalist_achievements_intro_loc$[Scope.GetCharacter.GetCustom('ito_naturalist_achievement_total_zoo_animals_type')][Scope.GetCharacter.GetCustom('ito_naturalist_achievement_total_wildlife_documentaries_type')][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_invented_evolution_theory_var').IsSet , Scope.Var('ito_naturalist_achievement_invented_evolution_theory_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_attended_hippocampus_congress_var').IsSet , Scope.Var('ito_naturalist_achievement_attended_hippocampus_congress_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_showed_evolution_in_peppered_moths_var').IsSet , Scope.Var('ito_naturalist_achievement_showed_evolution_in_peppered_moths_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_finished_pacific_expedition_var').IsSet , Scope.Var('ito_naturalist_achievement_finished_pacific_expedition_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_wallace_line_discovered_var').IsSet , Scope.Var('ito_naturalist_achievement_wallace_line_discovered_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_inaugurated_zoo_var').IsSet , Scope.Var('ito_naturalist_achievement_inaugurated_zoo_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_found_victoria_amazonica_var').IsSet , Scope.Var('ito_naturalist_achievement_found_victoria_amazonica_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_found_attacus_atlas_var').IsSet , Scope.Var('ito_naturalist_achievement_found_attacus_atlas_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_found_amorphophallus_titanum_var').IsSet , Scope.Var('ito_naturalist_achievement_found_amorphophallus_titanum_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_found_goliathus_var').IsSet , Scope.Var('ito_naturalist_achievement_found_goliathus_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_natualist_achievement_forestry_improvement_finished_var').IsSet , Scope.Var('ito_natualist_achievement_forestry_improvement_finished_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_rubber_improvement_finished_var').IsSet , Scope.Var('ito_naturalist_achievement_rubber_improvement_finished_var').GetFlagName)]"
 ito_naturalist_no_naturalist_loc: "Los Logros de #V de este [concept_dubois_naturalist]#! se mostrarán aquí, una vez que tenga uno."
 ito_naturalist_achievements_intro_loc: "#V Achievements of this Naturalist#!\n[Scope.GetCharacter.GetFullName] is an accomplished naturalist who collected [Scope.Var('dubois_naturalist_total_specimens_var').GetValue|0*V] [Concept('concept_dubois_specimen','$concept_dubois_specimens$')]."
 ito_naturalist_achievement_total_zoo_animals_loc: "\nDurante el ejercicio de [Scope.GetCharacter.GetHerHis] como naturalista, se capturaron y llevaron a [GetPlayer.MakeScope.GetCountry.GetName] un total de [Scope.GetVariable('ito_naturalist_total_zoo_animals_var').GetValue|0+] [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] ."
 ito_naturalist_achievement_total_wildlife_documentaries_loc: "\n[GetPlayer.MakeScope.Var('dubois_naturalist_var').GetCharacter.GetFullName] es bien conocido por documentar [GetPlayer.MakeScope.Var('dubois_naturalist_var').GetVariable('ito_character_num_animal_documentations_var').GetValue|0+] [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] en su hábitat natural."
 ito_naturalist_achievement_invented_evolution_theory_loc: "\nUno de los mayores logros de [Scope.GetCharacter.GetHerHis] fue el libro \"#V Sobre el origen de las especies#!\", que describía por primera vez la teoría de la evolución."
 ito_naturalist_achievement_attended_hippocampus_congress_loc: "\nEl Dr. [Scope.GetCharacter.GetLastNameNoFormatting] participó en el debate que determinó si el ser humano era único o sólo un animal como los demás."
 ito_naturalist_achievement_showed_evolution_in_peppered_moths_loc: "\nEl profesor [Scope.GetCharacter.GetLastNameNoFormatting] demostró que la polilla #V Peppered Moth evoluciona#! para adaptarse a su entorno cambiante. Una prueba para la Teoría de la Evolución."
 ito_naturalist_achievement_finished_pacific_expedition_loc: "\En una expedición de #V al Océano Pacífico#!, el Dr. [Scope.GetCharacter.GetLastNameNoFormatting] exploró exhaustivamente la flora y la fauna de este país de las maravillas. [Scope.GetCharacter.GetSheHe] descubrió muchas especies nuevas."
 ito_naturalist_achievement_wallace_line_discovered_loc: "|nMientras viajaba por el Pacífico [Scope.GetCharacter.GetLastNameNoFormatting] observó una #V clara separación entre la flora y la fauna asiáticas y australianas#!. Este hallazgo apoya la teoría de la evolución y sugiere una separación masiva de las islas en el pasado."
 ito_naturalist_achievement_inaugurated_zoo_loc: "\n[Scope.GetCharacter.GetLastNameNoFormatting] fue decisivo en la #V Inauguración del Zoo#!. Un lugar donde se pueden ver de cerca animales de lugares lejanos."
 ito_naturalist_achievement_found_victoria_amazonica_loc: "\nEn una expedición botánica a la selva amazónica, el profesor [Scope.GetCharacter.GetLastNameNoFormatting] encontró un #V Nenúfar Gigante#!. Una planta única que puede desarrollar hojas de hasta 3 metros de diámetro."
 ito_naturalist_achievement_found_attacus_atlas_loc: "\nEl Dr. [Scope.GetCharacter.GetLastNameNoFormatting] encontró una #V Titanic Moth#! durante una expedición botánica en Indochina. Es una de las mariposas más grandes del mundo y produce una seda muy robusta."
 ito_naturalist_achievement_found_amorphophallus_titanum_loc: "\nMientras exploraba Borneo durante una expedición botánica, el profesor [Scope.GetCharacter.GetLastNameNoFormatting] encontró una #V Enorme flor#! que crece hasta 3 metros de altura. Un verdadero milagro botánico."
 ito_naturalist_achievement_found_goliathus_loc: "\Las selvas del Congo albergan muchas maravillas. Una de ellas fue descubierta por el Dr. [Scope.GetCharacter.GetLastNameNoFormatting] en una expedición botánica. El #V escarabajo Goliat#! es uno de los insectos más grandes del mundo y, al parecer, bastante raro."
 ito_natualist_achievement_forestry_improvement_finished_loc: "[Scope.GetCharacter.GetHerHis] \El profesor [Scope.GetCharacter.GetLastNameNoFormatting] es conocido por su trabajo sobre los bosques y la mejora de la silvicultura."
 ito_naturalist_achievement_rubber_improvement_finished_loc: "\n[Scope.GetCharacter.GetHerHis|U] trabajo en las plantaciones de caucho y los experimentos con las mejores condiciones de cultivo permitieron a nuestro país mejorar masivamente la producción de caucho."