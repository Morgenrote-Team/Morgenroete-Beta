 MR_GEOLOGIST_ACHIEVEMENTS: "[AddLocalizationIf( Scope.IsSet , 'agassiz_geologist_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'agassiz_geologist_no_geologist_loc')]" #deepl:4065666483

 agassiz_geologist_achievements_loc: "$agassiz_geologist_achievements_intro_loc$[AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_invented_seismology_var').IsSet , Scope.Var('agassiz_geologist_achievement_invented_seismology_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_invented_plate_tectonics_var').IsSet , Scope.Var('agassiz_geologist_achievement_invented_plate_tectonics_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_attended_geologist_congress_var').IsSet , Scope.Var('agassiz_geologist_achievement_attended_geologist_congress_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_explored_volcano_var').IsSet , Scope.Var('agassiz_geologist_achievement_explored_volcano_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_discovered_helium_on_earth_var').IsSet , Scope.Var('agassiz_geologist_achievement_discovered_helium_on_earth_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_finished_pacific_expedition_var').IsSet , Scope.Var('agassiz_geologist_achievement_finished_pacific_expedition_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_returned_from_center_of_earth_var').IsSet , Scope.Var('agassiz_geologist_achievement_returned_from_center_of_earth_var').GetFlagName)]" #deepl:1006055885
 agassiz_geologist_no_geologist_loc: "Los Logros de #V de este [concept_agassiz_geologist]#! se mostrarán aquí, una vez que tenga uno." #deepl:2266901269
 agassiz_geologist_achievements_intro_loc: "#V Logros de este geólogo#!\nEl Dr. [Scope.GetCharacter.GetLastNameNoFormatting] es un geólogo consumado que ha recopilado [Scope.GetVariable('agassiz_geologist_minerals_var').GetValue|0V] [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')] y [Scope.GetVariable('agassiz_geologist_rare_minerals_var').GetValue|0V] [Concept('concept_agassiz_rare_mineral','$concept_agassiz_rare_minerals$')] . [Scope.GetCharacter.GetHerHis|U] investigación en Geología nos proporcionó [Scope.GetVariable('agassiz_geologist_geological_knowledge_var').GetValue|0V] [concept_agassiz_geological_knowledge] ." #deepl:2506244890

 agassiz_geologist_achievement_invented_seismology_loc: "\nLa invención de la sismología #V #! es uno de los mayores logros del Dr. [Scope.GetCharacter.GetLastNameNoFormatting]. Permite predecir terremotos y erupciones volcánicas." #deepl:4027906331
 agassiz_geologist_achievement_invented_plate_tectonics_loc: "\¿Es la #V invención de la Teoría de las Placas Tectónicas#! uno de los mayores logros del Dr. [Scope.GetCharacter.GetLastNameNoFormatting]? Como no todos los colegas de [Scope.GetCharacter.GetHerHis] aceptan la teoría, sólo el futuro dirá si se considerará como [Scope.GetCharacter.GetHerHis] descubrimiento más importante o si caerá en el olvido." #deepl:1012351458
 agassiz_geologist_achievement_attended_geologist_congress_loc: "\nEl Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  asistió al Congreso Geológico sobre Tectónica de Placas#!." #deepl:941722190
 agassiz_geologist_achievement_explored_volcano_loc: "\n#V Explorar un volcán#! es una empresa peligrosa, pero el Dr. [Scope.GetCharacter.GetLastNameNoFormatting] aprendió mucho de la expedición a uno de ellos." #deepl:3489984187
 agassiz_geologist_achievement_discovered_helium_on_earth_loc: "\nEl Dr. [Scope.GetCharacter.GetLastNameNoFormatting] fue la primera persona que #V descubrió el Helio en la Tierra#!, que sin duda será un recurso muy útil en el futuro." #deepl:1490724762
 agassiz_geologist_achievement_finished_pacific_expedition_loc: "\n[Scope.GetCharacter.GetFullNameNoFormatting] participó en una #V Expedición al Pacífico#!." #deepl:1964542330
 agassiz_geologist_achievement_returned_from_center_of_earth_loc: "\nAl parecer, el Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  llegó al Centro de la Tierra#! y volvió de allí. Pero, ¿es realmente cierta esta historia?" #deepl:3298936682
