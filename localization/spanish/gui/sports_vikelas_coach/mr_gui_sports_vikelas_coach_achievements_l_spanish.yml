l_spanish:
 MR_SPORTS_COACH_ACHIEVEMENTS_TT: "[AddLocalizationIf( Scope.IsSet , 'vikelas_coach_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'vikelas_coach_no_coach_achievements_loc')]"
 vikelas_coach_achievements_loc: "$vikelas_coach_achievements_intro_loc$[AddLocalizationIf( Scope.Var('vikelas_coach_world_championship_var').IsSet , Scope.Var('vikelas_coach_world_championship_var').GetFlagName)][AddLocalizationIf( Scope.Var('vikelas_coach_vice_world_championship_var').IsSet , Scope.Var('vikelas_coach_vice_world_championship_var').GetFlagName)]"
 vikelas_coach_no_coach_achievements_loc: "Los Logros de #V de este [concept_vikelas_coach]#! se mostrarán aquí, una vez que tenga uno."
 vikelas_coach_achievements_intro_loc: "#V Logros de esteCoach#!\n[Scope.GetCharacter.GetFullName] es un Coach de éxito."
 vikelas_coach_world_championship_loc: "\nEn [Scope.Var('vikelas_coach_world_championship_year_var').GetValue|0] [Scope.GetCharacter.GetLastNameNoFormatting] lideró al equipo [Scope.GetCharacter.GetHerHis] hasta #V ganar la Copa Mundial de Fútbol de la FIFA#!"
 vikelas_coach_vice_world_championship_loc: "\nEn [Scope.Var('vikelas_coach_vice_world_championship_year_var').GetValue|0] [Scope.GetCharacter.GetLastNameNoFormatting] lideró al equipo [Scope.GetCharacter.GetHerHis] hasta el #V segundo puesto en la Copa Mundial de Fútbol de la FIFA#!"