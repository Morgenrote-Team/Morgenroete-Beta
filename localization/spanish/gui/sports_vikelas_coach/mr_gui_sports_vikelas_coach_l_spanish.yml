 MR_FIFA_BOARD_TOOLTIP: "#header Junta Directiva de la FIFA #!\n Los siguientes países son miembros de la Junta Directiva de la FIFA:\n\n[GetGlobalVariable('vikelas_fifa_board_member_1_global_var').GetCountry.GetName|V]\n[GetGlobalVariable('vikelas_fifa_board_member_2_global_var').GetCountry.GetName|V]\n[GetGlobalVariable('vikelas_fifa_board_member_3_global_var').GetCountry.GetName|V]\n[GetGlobalVariable('vikelas_fifa_board_member_4_global_var').GetCountry.GetName|V]\n[GetGlobalVariable('vikelas_fifa_board_member_5_global_var').GetCountry.GetName|V]"
 MR_FIFA_PRESIDENT_TOOLTIP: "#header Presidente de la FIFA #!\n[GetGlobalVariable('vikelas_fifa_president_global_var').GetCountry.GetName] es el Presidente de la FIFA"
 MR_HIRE_COACH_BUTTON_TT: "#T Contratar un Entrenador Nacional #!\nLos entrenadores nacionales aportan sus habilidades para mejorar los resultados de los partidos. La formación de un entrenador nacional (cricket, béisbol, fútbol, ​​baloncesto) depende del deporte nacional. Si un entrenador no cumple con las expectativas, puede ser reemplazado después de al menos tres años.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )] "
 MR_ADAPT_NATIONAL_SPORT_BUTTON: "Adoptar un Deporte Nacional"
 MR_ADAPT_NATIONAL_SPORT_BUTTON_TT: "#T Adoptar un Deporte Nacional #!\nPodemos declarar como deporte nacional un deporte que se haya popularizado en nuestro país, fomentando así la creación de clubes y su difusión en otros países. Este es un requisito indispensable para la creación de una organización deportiva nacional.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_CHANGE_NATIONAL_SPORT_BUTTON: "Cambiar el Deporte Nacional"
 MR_CHANGE_NATIONAL_SPORT_BUTTON_TT: "#T Cambiar el Deporte Nacional #!\nCambiar el deporte nacional solo es posible si al menos otro deporte se ha vuelto popular. La comunidad deportiva establecida no estará contenta con esto.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 mr_sports_coach_national_sport: "Deporte Nacional"
 vikelas_national_sport_loc: "[Country.MakeScope.Var('vikelas_national_sport_var').GetFlagName]"
 vikelas_no_national_sport_loc: "Nada"
 MR_SCHOOL_SPORTS_STADIUM_TRIGGER_TT: "#default_text [GetPlayer.GetName] tiene activo almenos un #V Estadio de deportes[concept_production_method] en un [GetBuildingType('building_vikelas_sports').GetName] #!. #!"
 MR_INTERNATIONAL_SPORTS_EVENT_BUTTON: "Campeonato de la Mancomunidad"
 MR_INTERNATIONAL_SPORTS_EVENT_BUTTON_TT: "#T Campeonato de la Mancomunidad #!\n Como el líder de un bloque de poder o como señor supremo de varios vasallos, podemos organizar un campeonato internacional entre nuestros súbditos si tienen el mismo deporte nacional que nosotros.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_INTERNATIONAL_SPORTS_MEMBER_TRIGGER_TT: "#default_text #default_text [GetPlayer.GetName] tiene al menos #G 3 #! otros #V miembros del Bloque de Poder #! o #G 4 #! #V súbditos #! que tienen [Country.MakeScope.Var('vikelas_national_sport_var').GetFlagName] como deportes nacional. #!"
 MR_INTERNATIONAL_SPORTS_NO_FIFA_TRIGGER_TT: "#default_text [GetPlayer.GetName] no #R es #! un miembro de la FIFA. #!"
 MR_INTERNATIONAL_SPORTS_MODIFIER_TRIGGER_TT: "#default_text [GetPlayer.GetName] does #R not#! has the #V $vikelas_international_sports_event_modifier$#! or the #V $vikelas_recent_international_sports_event_modifier$#! [Concept('concept_modifier','$concept_modifiers$')].#!"
 MR_FIFA_MEMBER_TRIGGER_TT: "#default_text At least #BLUE 16#! countries are #V FIFA Members#!. Currently the FIFA has #G [GetGlobalVariable('vikelas_num_fifa_members_global_var').GetValue]#! members.#!"
 MR_JOIN_FIFA_BUTTON: "Unirse a la FIFA"
 MR_JOIN_FIFA_BUTTON_TT: "#T Unirse a la FIFA #!\nUnirse a la FIFA es un prerrequisito para participar de la Cpoa Mundial de Fútbol.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_LEAVE_FIFA_BUTTON: "Dejar la FIFA"
 MR_LEAVE_FIFA_BUTTON_TT: "#T Abandona la FIFA #!\nLa FIFA ha traicionado todos sus ideales y es una ONG corrupta y comercializada que es mejor dejar atrás.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_LEAVE_FIFA_TRIGGER_TT: "#default_text [GetPlayer.GetName] no es ni #R  ni #!#V  Presidente #!#R  ni #! #V Miembro de la Junta Directiva #! de la FIFA. #!"
 MR_SCHOOL_SPORTS_BUTTON: "Intorducir Deportes Escolares"
 MR_SCHOOL_SPORTS_BUTTON_TT: "#T Introducir Deportes Escolares en [GetPlayer.GetName] #!\nCon la introducción de deportes escolares podemos aumentar las posibilidades generales de que haya personalidades con características de atleta disponibles y mejorar las posibilidades en los Juegos Olímpicos.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_SCHOOL_SPORTS_PUBLIC_SCHOOLS_TRIGGER_TT: "#default_text [GetPlayer.GetName] tiene el [GetLawType('law_public_schools').GetName][concept_law]#!"
 MR_SCHOOL_SPORTS_IG_ATHLETE_LEADER_TRIGGER_TT: "#default_text [GetPlayer.GetName] has a character with the #V Athlete Trait#! as the leader of an #V [concept_interest_group] [concept_in_government]#!.#!"
 MR_SCHOOL_SPORTS_SPORTS_FACILITIES_TRIGGER_TT: "#default_text [GetPlayer.GetName] at least one active #V Sports Facility [concept_production_method] in a [GetBuildingType('building_government_administration').GetName]#!.#!"
 MR_WORLDCUP_BUTTON: "Mundial de Fútbol"
 MR_WORLDCUP_BUTTON_TT: "#T Organize the Football World Cup#!\nThe World Cup is a football competition for national teams. Teams can qualify for the finals of the World Cup every four years. In a four-week tournament, the best national team will be determined as world champions. The world football association Fédération Internationale de Football Association (FIFA) organizes and markets the tournament. The first World Cup took place in Uruguay in 1930 and was won by the host team.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_FOOTBALL_WORLDCUP_FOOTBALL_ASSOCIATION_TRIGGER_TT: "#default_text There are at least #G 10#! Countries with a Football Association.#!"
 MR_FIFA_BUTTON_TT: "#T Found the FIFA#!\nWith the number of inter-nation matches increasing as football spread, the need for a global governing body emerged. FIFA (French: Fédération Internationale de Football Association) is an international self-regulatory governing body of association football, futsal and beach soccer. It is one of the world's oldest and largest NGOs, being founded on 21 May 1904. The founding of FIFA allows for international matches between individual nations, whose coaches can improve through winning matches. This will eventually lead to the establishment of a World Cup.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_FIFA_TRIGGER_TT: "#default_text There are at least #G 6#! Countries with a Football Association.#!"
