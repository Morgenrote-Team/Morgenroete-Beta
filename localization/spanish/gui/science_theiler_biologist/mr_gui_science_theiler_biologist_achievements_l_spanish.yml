e_achievement_var').GetFlagName)][AddLocalizationIf( Scope.Var('theiler_smallpox_vaccine_achievement_var').IsSet , Scope.Var('theiler_smallpox_vaccine_achievement_var').GetFlagName)][AddLocalizationIf( Scope.Var('theiler_typhus_vaccine_achievement_var').IsSet , Scope.Var('theiler_typhus_vaccine_achievement_var').GetFlagName)][AddLocalizationIf( Scope.Var('theiler_yellow_fever_vaccine_achievement_var').IsSet , Scope.Var('theiler_yellow_fever_vaccine_achievement_var').GetFlagName)][AddLocalizationIf( Scope.Var('theiler_measles_vaccine_achievement_var').IsSet , Scope.Var('theiler_measles_vaccine_achievement_var').GetFlagName)][AddLocalizationIf( Scope.Var('theiler_scarlet_vaccine_achievement_var').IsSet , Scope.Var('theiler_scarlet_vaccine_achievement_var').GetFlagName)][AddLocalizationIf( Scope.Var('theiler_plague_vaccine_achievement_var').IsSet , Scope.Var('theiler_plague_vaccine_achievement_var').GetFlagName)][AddLocalizationIf( Scope.Var('theiler_diphteria_vaccine_achievement_var').IsSet , Scope.Var('theiler_diphteria_vaccine_achievement_var').GetFlagName)][AddLocalizationIf( Scope.Var('theiler_polio_vaccine_achievement_var').IsSet , Scope.Var('theiler_polio_vaccine_achievement_var').GetFlagName)][AddLocalizationIf( Scope.Var('theiler_pharmaceutical_strychnine_achievement_var').IsSet , Scope.Var('theiler_pharmaceutical_strychnine_achievement_var').GetFlagName)][AddLocalizationIf( Scope.Var('theiler_pharmaceutical_emetine_achievement_var').IsSet , Scope.Var('theiler_pharmaceutical_emetine_achievement_var').GetFlagName)][AddLocalizationIf( Scope.Var('theiler_pharmaceutical_atropine_achievement_var').IsSet , Scope.Var('theiler_pharmaceutical_atropine_achievement_var').GetFlagName)][AddLocalizationIf( Scope.Var('theiler_pharmaceutical_aloin_achievement_var').IsSet , Scope.Var('theiler_pharmaceutical_aloin_achievement_var').GetFlagName)][AddLocalizationIf( Scope.Var('theiler_pharmaceutical_digitoxin_achievement_var').IsSet , Scope.Var('theiler_pharmaceutical_digitoxin_a