 dubois_paleontologist_no_paleontologist_loc: "Los Logros de #V de este [concept_dubois_paleontologist]#! se mostrarán aquí, una vez que tenga uno." #deepl:2334446280
 dubois_paleontologist_achievements_intro_loc: "#V Logros de estePaleontólogo#!\n[Scope.GetCharacter.GetFullNameNoFormatting] es [Scope.GetCharacter.GetCustom('dubois_paleontologist_experience_level_type')] que recogió un total de [Scope.Var('dubois_paleontologist_total_fossils_var').GetValue|0+] [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] y [Scope.Var('dubois_dinosaur_bone_total_paleontologist_var').GetValue|0+] [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] ." #deepl:39291484

 dubois_paleontologist_achievement_opened_first_paleontological_museum_loc: "\n[Scope.GetCharacter.GetSheHe|U] fundó el #V primer Museo Paleontológico#! del mundo, en el que se exponían diversos fósiles." #deepl:2735413684
 dubois_paleontologist_achievement_attended_extinction_congress_loc: "El Dr. [Scope.GetCharacter.GetLastNameNoFormatting] participó en un congreso que intentaba determinar cómo se extinguieron los dinosaurios." #deepl:3929204720
 dubois_paleontologist_achievement_fossil_amber_loc: "\n[Scope.GetCharacter.GetSheHe|U] encontró una pieza única de #V Ámbar#! en la que estaba encerrado un pequeño mosquito. ¿Quizás haya incluso sangre de dinosaurio en ella?" #deepl:1354321492
 dubois_paleontologist_achievement_fossil_ammonite_loc: "\nEl profesor [Scope.GetCharacter.GetLastNameNoFormatting] encontró un #V Ammonite#!, que ayudará a la delimitación cronológica de los sedimentos marinos." #deepl:2717312690
 dubois_paleontologist_achievement_fossil_archaeopteryx_loc: "\Muchos consideran el descubrimiento del Dr. [Scope.GetCharacter.GetLastNameNoFormatting] como la primera ave. De hecho, el #V Archaeopteryx#! parece ser el eslabón perdido entre los dinosaurios y las aves." #deepl:3644254959
 dubois_paleontologist_achievement_fossil_composita_loc: "\n#V Las Compositas#! son conchas que vivieron hace millones de años en casi todos los continentes. El profesor [Scope.GetCharacter.GetLastNameNoFormatting] encontró una durante una de las excavaciones de [Scope.GetCharacter.GetHerHis]." #deepl:1938126946
 dubois_paleontologist_achievement_fossil_eusthenopteron_loc: "\Curiosamente, el #V Eusthenopteron#! que encontró [Scope.GetCharacter.GetSheHe] ya tiene un húmero, un cúbito y un radio distintos en su aleta anterior. Estos huesos están presentes en todos los vertebrados terrestres." #deepl:1906215431
 dubois_paleontologist_achievement_fossil_ichthyosaurus_loc: "\n#V Ichthyosaura#!, del que el Dr. [Scope.GetCharacter.GetLastNameNoFormatting] encontró uno, es un reptil muy singular. Se parece a los delfines y no pone huevos, sino que da a luz a las crías vivas, lo que es muy raro en los reptiles." #deepl:1058896905
 dubois_paleontologist_chievement_fossil_ichthyostega_loc: "\nCon el descubrimiento de #V Ichthyostega#!, el profesor [Scope.GetCharacter.GetLastNameNoFormatting] encontró uno de los primeros animales terrestres. Es el eslabón perdido entre los peces y los tetrapodomorfos con extremidades." #deepl:178680301
 dubois_paleontologist_achievement_fossil_megatherium_loc: "\Hoy en día, los perezosos son pequeños, pero los hubo enormes en el pasado, como demuestra uno de los descubrimientos del Dr. [Scope.GetCharacter.GetLastNameNoFormatting]. El #V Megatherium#! medía hasta 6 metros de largo." #deepl:2625011393
 dubois_paleontologist_achievement_fossil_pterodactylus_loc: "\n[Scope.GetCharacter.GetSheHe|U] descubrió un fósil de #V Pterodactylus#!, un dinosaurio alado que probablemente vivía cerca de lagos y ríos." #deepl:1358755979
 dubois_paleontologist_achievement_fossil_smilodon_loc: "\nEl #V Smilodon#! es un temible depredador que vivió hasta hace unos miles de años. El profesor [Scope.GetCharacter.GetLastNameNoFormatting] encontró un esqueleto muy bien conservado de uno." #deepl:209509221
 dubois_paleontologist_achievement_fossil_trilobite_loc: "\nUno de los descubrimientos menores de [Scope.GetCharacter.GetHerHis] son varios T#V Trilobites#!. Aunque no son espectaculares, son grandes fósiles índice." #deepl:623281739
 dubois_paleontologist_achievement_fossil_haast_eagle_loc: "\nEn Nueva Zelanda, el Dr. [Scope.GetCharacter.GetLastNameNoFormatting] hizo un descubrimiento fascinante cuando [Scope.GetCharacter.GetSheHe] encontró un Águila gigantesca que ahora se llama #V Águila Haast#!." #deepl:758643186
 dubois_paleontologist_achievement_perfect_ankylosaurus_loc: "\nEl profesor [Scope.GetCharacter.GetLastNameNoFormatting] reconstruyó un #V Ankylosaurus#! de forma perfecta. Otros paleontólogos se maravillan ante la reconstrucción." #deepl:2799229951
 dubois_paleontologist_achievement_imperfect_ankylosaurus_loc: "\El profesor [Scope.GetCharacter.GetLastNameNoFormatting] reconstruyó un #V Ankylosaurus#! pero de forma imperfecta." #deepl:3408874547
 dubois_paleontologist_achievement_poor_ankylosaurus_loc: "\nEl profesor [Scope.GetCharacter.GetLastNameNoFormatting] reconstruyó un #V Ankylosaurus#! pero fue un intento horrible y se ríen de él otros paleontólogos." #deepl:2085395454
 dubois_paleontologist_achievement_perfect_diplodocus_loc: "\n[Scope.GetCharacter.GetHerHis|U] reconstrucción de un #V Diplodocus#! es absolutamente perfecta y es la envidia de todos los museos paleontológicos." #deepl:3626804845
 dubois_paleontologist_achievement_imperfect_diplodocus_loc: "\n[Scope.GetCharacter.GetHerHis|U] reconstrucción de un #V Diplodocus#! es suficientemente buena." #deepl:412034719
 dubois_paleontologist_achievement_poor_diplodocus_loc: "[Scope.GetCharacter.GetHerHis|U] La reconstrucción de un #V Diplodocus#! es desastrosa y se considera una abominación." #deepl:3022704965
 dubois_paleontologist_achievement_perfect_triceratop_loc: "[Scope.GetCharacter.GetLastNameNoFormatting]\La perfección de la reconstrucción del Triceratops#! del Dr. #V es ampliamente conocida y ha dado prestigio a nuestra colección paleontológica." #deepl:2010941711
 dubois_paleontologist_achievement_imperfect_triceratop_loc: "\La mediocridad de la reconstrucción del Dr. [Scope.GetCharacter.GetLastNameNoFormatting]'s #V Triceratops#! es lo suficientemente buena para nuestro museo, pero nada excepcional." #deepl:996647347
 dubois_paleontologist_achievement_poor_triceratop_loc: "El terror del Dr. [Scope.GetCharacter.GetLastNameNoFormatting]'s #V Triceratops#! reconstrucción es una vergüenza para nuestra colección." #deepl:1193371056
 dubois_paleontologist_achievement_perfect_tyrannosaurus_loc: "\Un #V Tiranosaurio Rex#! es un espectáculo maravilloso. Especialmente el que el profesor [Scope.GetCharacter.GetLastNameNoFormatting] perfectamente montado." #deepl:2375174801
 dubois_paleontologist_achievement_imperfect_tyrannosaurus_loc: "\nUn #V Tiranosaurio Rex#! es un espectáculo maravilloso. Aunque no esté perfectamente ensamblado como el que reconstruyó el profesor [Scope.GetCharacter.GetLastNameNoFormatting]." #deepl:2816655238
 dubois_paleontologist_achievement_poor_tyrannosaurus_loc: "\Un #V Tiranosaurio Rex#! es un espectáculo maravilloso. Pero no el que montó el profesor [Scope.GetCharacter.GetLastNameNoFormatting]. Este es simplemente una monstruosidad absurda." #deepl:2924846018
 dubois_paleontologist_achievement_perfect_stegosaurus_loc: "\nEl poderoso esqueleto de #V Stegosaurus#! que [Scope.GetCharacter.GetSheHe] montó es una pieza perfecta para nuestra exposición de dinosaurios." #deepl:1011030116
 dubois_paleontologist_achievement_imperfect_stegosaurus_loc: "\nEl esqueleto de #V Stegosaurus#! que [Scope.GetCharacter.GetSheHe] montó es una buena pieza para nuestra exposición de dinosaurios." #deepl:3364926958
 dubois_paleontologist_achievement_poor_stegosaurus_loc: "\El horrible esqueleto de #V Stegosaurus#! que montó [Scope.GetCharacter.GetSheHe] es un desperdicio de espacio en nuestra exposición de dinosaurios." #deepl:1841850726
 dubois_paleontologist_achievement_perfect_antarctosaurus_loc: "\No todo el mundo puede montar un #V Antarctosaurus#! tan perfectamente como el Dr. [Scope.GetCharacter.GetLastNameNoFormatting]. Es una de las piezas más destacadas de nuestra colección." #deepl:4276626573
 dubois_paleontologist_achievement_imperfect_antarctosaurus_loc: "\nMontar un #V Antarctosaurus#! es una tarea difícil, pero el Dr. [Scope.GetCharacter.GetLastNameNoFormatting] lo hizo bastante bien." #deepl:4006286419
 dubois_paleontologist_achievement_poor_antarctosaurus_loc: "\No todo el mundo puede montar un #V Antarctosaurus#!. Pero no muchos lo montan tan horriblemente mal como el Dr. [Scope.GetCharacter.GetLastNameNoFormatting]. Es la vergüenza de nuestra colección." #deepl:3523325515
 dubois_paleontologist_achievement_perfect_argyrosaurus_loc: "\nEl maravilloso #V esqueleto de Argyrosaurus#! de nuestra colección es obra del profesor [Scope.GetCharacter.GetLastNameNoFormatting]. Un esqueleto verdaderamente maravilloso." #deepl:2395444631
 dubois_paleontologist_achievement_imperfect_argyrosaurus_loc: "\El esqueleto de #V Argyrosaurus#! de nuestra colección es obra del profesor [Scope.GetCharacter.GetLastNameNoFormatting]. Un esqueleto bastante bien hecho." #deepl:2170414433
 dubois_paleontologist_achievement_poor_argyrosaurus_loc: "\El monstruoso #V esqueleto de Argyrosaurus#! de nuestra colección es obra del profesor [Scope.GetCharacter.GetLastNameNoFormatting]. A obviamente el trabajo de un paleontólogo chapucero." #deepl:2917340443
 dubois_paleontologist_achievement_perfect_iguanodon_loc: "\n[Scope.GetCharacter.GetSheHe|U] ensambló a la perfección un esqueleto de #V Iguanodon#!." #deepl:3595520963
 dubois_paleontologist_achievement_imperfect_iguanodon_loc: "\n[Scope.GetCharacter.GetSheHe|U] montó un #V esqueleto de Iguanodon#!." #deepl:948446383
 dubois_paleontologist_achievement_poor_iguanodon_loc: "\n[Scope.GetCharacter.GetSheHe|U] montó un #V esqueleto de Iguanodon#! horriblemente mal." #deepl:60351557
 dubois_paleontologist_achievement_perfect_plateosaurus_loc: "\nEl Dr. [Scope.GetCharacter.GetLastNameNoFormatting] pudo reconstruir perfectamente el esqueleto de un #V Plateosaurus#!. Una granh exposición para nuestra colección." #deepl:3288975063
 dubois_paleontologist_achievement_imperfect_plateosaurus_loc: "\El Dr. [Scope.GetCharacter.GetLastNameNoFormatting] pudo reconstruir el esqueleto de un #V Plateosaurus#!." #deepl:3540574047
 dubois_paleontologist_achievement_poor_plateosaurus_loc: "\nEl Dr. [Scope.GetCharacter.GetLastNameNoFormatting] pudo reconstruir el esqueleto de un #V Plateosaurus#!. Pero se ve muy raro y deforme." #deepl:4210803243
 dubois_paleontologist_achievement_perfect_giraffatitan_loc: "\nReconstruir un #V Giraffatitan#! es un trabajo duro y requiere mucho espacio. Afortunadamente, el profesor [Scope.GetCharacter.GetLastNameNoFormatting] pudo aprovechar las dimensiones de nuestro museo para preparar un magnífico esqueleto del dinosaurio." #deepl:1815044749
 dubois_paleontologist_achievement_imperfect_giraffatitan_loc: "\nReconstruir un #V Giraffatitan#! es un trabajo duro y necesita mucho espacio. Por suerte, el profesor [Scope.GetCharacter.GetLastNameNoFormatting] pudo aprovechar las dimensiones de nuestro museo para preparar el esqueleto del dinosau." #deepl:3585680135
 dubois_paleontologist_achievement_poor_giraffatitan_loc: "\nReconstruir un #V Giraffatitan#! es un trabajo duro y necesita mucho espacio. Aunque [Scope.GetCharacter.GetSheHe] tiene todo el museo para trabajar, el profesor [Scope.GetCharacter.GetLastNameNoFormatting] sólo pudo crear una versión absurda del dinosaurio" #deepl:2737374971
 dubois_paleontologist_achievement_perfect_spinosaurus_loc: "\nEl aterrador #V esqueleto de Spinosaurus#! de nuestra colección fue montado por el Dr. [Scope.GetCharacter.GetLastNameNoFormatting] y es una obra de arte." #deepl:493475787
 dubois_paleontologist_achievement_imperfect_spinosaurus_loc: "\nEl aterrador #V esqueleto de Spinosaurus#! de nuestra colección fue montado por el Dr. [Scope.GetCharacter.GetLastNameNoFormatting]." #deepl:1960639131
 dubois_paleontologist_achievement_poor_spinosaurus_loc: "\nEl gracioso #V esqueleto de Spinosaurus#! de nuestra colección fue montado por el Dr. [Scope.GetCharacter.GetLastNameNoFormatting]. Está mal hecho y se parece más a un pollo que a un dinosaurio." #deepl:308117810
 dubois_paleontologist_achievement_perfect_psittacosaurus_loc: "\nCon su boca en forma de pico, el #V Psittacosaurus#! que montó el profesor [Scope.GetCharacter.GetLastNameNoFormatting], era un esqueleto extraordinario." #deepl:3089964090
 dubois_paleontologist_achievement_imperfect_psittacosaurus_loc: "\nCon su boca en forma de pico, el #V Psittacosaurus#! que montó el profesor [Scope.GetCharacter.GetLastNameNoFormatting], era un bonito esqueleto." #deepl:1049217798
 dubois_paleontologist_achievement_poor_psittacosaurus_loc: "\n¿Tenía realmente el #V Psittacosaurus#! un extraño pico en la espalda y una trompa en lugar de boca? Al menos el profesor [Scope.GetCharacter.GetLastNameNoFormatting] lo cree así, pero puede que sea el único." #deepl:4134331305
 dubois_paleontologist_achievement_perfect_velociraptor_loc: "\nEl terrorífico #V Velociraptor#! es una de las obras maestras del Dr. [Scope.GetCharacter.GetLastNameNoFormatting]. Está perfectamente ensamblado." #deepl:2793253329
 dubois_paleontologist_achievement_imperfect_velociraptor_loc: "\nEl terrorífico #V Velociraptor#! es un buen trabajo del Dr. [Scope.GetCharacter.GetLastNameNoFormatting]. [Scope.GetCharacter.GetSheHe] lo montó bastante bien." #deepl:4153443130
 dubois_paleontologist_achievement_poor_velociraptor_loc: "\El aterrador #V Velociraptor#! es una de las peores obras del Dr. [Scope.GetCharacter.GetLastNameNoFormatting]. En primer lugar, es demasiado pequeño, en segundo lugar, seguramente no tenía 10 garras como una corona ..." #deepl:3768344000
 dubois_paleontologist_achievement_perfect_muttaburrasaurus_loc: "\nEl #V Muttaburrasaurus#! que reconstruyó el profesor [Scope.GetCharacter.GetLastNameNoFormatting] era bastante impresionante y no sólo por su tamaño." #deepl:877060609
 dubois_paleontologist_achievement_imperfect_muttaburrasaurus_loc: "\nEl #V Muttaburrasaurus#! que reconstruyó el profesor [Scope.GetCharacter.GetLastNameNoFormatting] era bastante impresionante, sobre todo por su tamaño." #deepl:2230628960
 dubois_paleontologist_achievement_poor_muttaburrasaurus_loc: "\nEl #V Muttaburrasaurus#! que reconstruyó el profesor [Scope.GetCharacter.GetLastNameNoFormatting] era horrible. Por un lado, todos los demás paleontólogos observaron que la cabeza no está unida a la cola y que las rodillas se doblan hacia el otro lado." #deepl:1428907282
 dubois_paleontologist_achievement_perfect_rhoetosaurus_loc: "\nEl tamaño del #V Rhoetosaurus#! es impresionante. Pero sin la habilidad del Dr. [Scope.GetCharacter.GetLastNameNoFormatting] seguramente no habría sido tan impresionante." #deepl:2002445198
 dubois_paleontologist_achievement_imperfect_rhoetosaurus_loc: "\El tamaño de #V Rhoetosaurus#! es impresionante. Pero sin la habilidad del Dr. [Scope.GetCharacter.GetLastNameNoFormatting] habría sido definitivamente menos impresionante'." #deepl:2197585922
 dubois_paleontologist_achievement_poor_rhoetosaurus_loc: "\nPensar que la cola pertenece a la parte posterior de la #V Rhoetosaurus#! fue probablemente la idea más estúpida del Dr. [Scope.GetCharacter.GetLastNameNoFormatting]. Al menos hasta ahora..." #deepl:2580418601
 dubois_paleontologist_achievement_perfect_mosasaurus_loc: "\nEl #o Msasaurus#! que reconstruyó el profesor [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] es un gigantesco monstruo marino." #deepl:4291663506
 dubois_paleontologist_achievement_imperfect_mosasaurus_loc: "\nEl #o Mosasaurus#! que el profesor [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] reconstruyó un gran monstruo del mar." #deepl:2251013384
 dubois_paleontologist_achievement_poor_mosasaurus_loc: "\nEl #o Mosasaurus#! que reconstruyó el profesor [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] era horrible. Es bastante seguro que el Mosasaurus vivió en el Océano, pero de alguna manera el esqueleto terminó con piernas." #deepl:2727769146
 dubois_paleontologist_achievement_perfect_plesiosaurus_loc: "\nEl #o Plesiosaurus#! reconstruido por el profesor [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] es un enorme reptil marino." #deepl:1469085529
 dubois_paleontologist_achievement_imperfect_plesiosaurus_loc: "\nEl #o Plesiosaurus#! reconstruido por el profesor [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] es un reptil marino que vivió en la época de los dinosaurios." #deepl:1871243527
 dubois_paleontologist_achievement_poor_plesiosaurus_loc: "\nEl #o Plesiosaurus#! reconstruido por el profesor [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] es un poco raro. Tiene 4 extremidades en forma de serpiente y una cola muy corta." #deepl:1919744229
 dubois_paleontologist_achievement_perfect_basilosaurus_loc: "\nEl #o Basilosaurus#! reconstruido por el profesor [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] es una ballena prehistórica que vivió hace milenios." #deepl:142765907
 dubois_paleontologist_achievement_imperfect_basilosaurus_loc: "\nEl #o Basilosaurus#! reconstruido por el profesor [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] es una ballena prehistórica." #deepl:1354996810
 dubois_paleontologist_achievement_poor_basilosaurus_loc: "\nEl #o Basilosaurus#! reconstruido por el profesor [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] tiene una fisiología muy extraña. Se parece más a una pelota que a otra cosa, lo que parece bastante erróneo." #deepl:1206625829
 dubois_paleontologist_achievement_perfect_megalodon_loc: "\nEl #o Megalodon#! reconstruido por el profesor [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] es un tiburón gigantesco. Un esqueleto realmente impresionante." #deepl:1878769616
 dubois_paleontologist_achievement_imperfect_megalodon_loc: "\nEl #o Megalodon#! reconstruido por el profesor [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] es un tiburón gigantesco." #deepl:117332675
 dubois_paleontologist_achievement_poor_megalodon_loc: "\nEl #o Megalodon#! reconstruido por el profesor [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] parece estar un poco... fuera de lugar. La enorme cabeza está montada sobre un cuello muy delgado y aparentemente el tiburón tenía extrañas púas cubriendo todo su cuerpo." #deepl:3797074524
