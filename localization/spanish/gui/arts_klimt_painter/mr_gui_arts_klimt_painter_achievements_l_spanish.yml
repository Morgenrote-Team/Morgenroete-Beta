l_spanish:
 MR_PAINTER_ACHIEVEMENTS_TT: "[AddLocalizationIf( Scope.IsSet , 'klimt_painter_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'klimt_painter_achievements_no_painter_loc')]"
 klimt_painter_achievements_loc: "$klimt_painter_achievements_intro_loc$[AddLocalizationIf( Scope.Var('klimt_painter_achievement_vernissage_var').IsSet , Scope.Var('klimt_painter_achievement_vernissage_var').GetFlagName)][AddLocalizationIf( Scope.Var('klimt_painter_achievement_inaugurated_gallery_var').IsSet , Scope.Var('klimt_painter_achievement_inaugurated_gallery_var').GetFlagName)]"
 klimt_painter_achievements_no_painter_loc: "Los Logros de #V de este [concept_klimt_painter]#! se mostrarán aquí, una vez que tenga uno."
 klimt_painter_achievements_intro_loc: "#V Achievements of this Painter#!\n #indent_newline:3 • [Scope.GetCharacter.GetFullName] is a [Scope.GetCharacter.GetCustom('klimt_painter_achievement_experience_type')].#!\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] produced [Scope.Var('klimt_painter_num_paintings_var').GetValue|V0] Paintings of which [Scope.Var('klimt_painter_num_masterworks_var').GetValue|V0] are considered to be Masterworks.#!"
 klimt_painter_achievement_vernissage_loc: "\n #indent_newline:3 • [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetLastName] has exhibited his paintings in a great vernissage.#!"
 klimt_painter_achievement_inaugurated_gallery_loc: "[Scope.GetCharacter.GetSheHe|U] inaugurated a new Art Gallery with [Scope.GetCharacter.GetHerHis] wonderful paintings. Surely the Gallery will see many more great Painters in the future!#!"