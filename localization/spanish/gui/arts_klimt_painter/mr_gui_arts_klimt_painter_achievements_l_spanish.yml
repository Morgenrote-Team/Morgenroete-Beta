 MR_PAINTER_ACHIEVEMENTS_TT: "[AddLocalizationIf( Scope.IsSet , 'klimt_painter_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'klimt_painter_achievements_no_painter_loc')]" #deepl:3855145001

 klimt_painter_achievements_loc: "$klimt_painter_achievements_intro_loc$[AddLocalizationIf( Scope.Var('klimt_painter_achievement_vernissage_var').IsSet , Scope.Var('klimt_painter_achievement_vernissage_var').GetFlagName)][AddLocalizationIf( Scope.Var('klimt_painter_achievement_inaugurated_gallery_var').IsSet , Scope.Var('klimt_painter_achievement_inaugurated_gallery_var').GetFlagName)]" #deepl:1700300024
 klimt_painter_achievements_no_painter_loc: "Los Logros de #V de este [concept_klimt_painter]#! se mostrarán aquí, una vez que tenga uno." #deepl:723002393
 klimt_painter_achievements_intro_loc: "#V Logros de este Pintor#!\n[Scope.GetCharacter.GetFullName] es un [Scope.GetCharacter.GetCustom('klimt_painter_achievement_experience_type')].\n[Scope.GetCharacter.GetSheHe] produjo [Scope.Var('klimt_painter_num_paintings_var').GetValue|V0] Pinturas de las cuales [Scope.Var('klimt_painter_num_masterworks_var').GetValue|V0] son consideradas Obras Maestras." #deepl:764602233

 klimt_painter_achievement_vernissage_loc: "\n[GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetLastName] ha expuesto sus cuadros en un gran vernissage." #deepl:3061904926
