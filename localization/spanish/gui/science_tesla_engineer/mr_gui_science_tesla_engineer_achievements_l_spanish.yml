 tesla_engineer_achievements_no_engineer_loc: "Los Logros de #V de este [concept_gaudi_engineer]#! se mostrarán aquí, una vez que tenga uno." #deepl:2624550252
 tesla_engineer_achievements_intro_loc: "#V Logros de esteEngineer#!\n" #deepl:3891137056

 tesla_engineer_achievements_invented_steel_frame_loc: "\n[Scope.GetCharacter.GetLastNameNoFormatting] construyó el primer edificio #V utilizando estructuras de acero#!. Esta forma de construcción se extendió por todo el mundo como un reguero de pólvora." #deepl:3716706247
 tesla_engineer_achievements_invented_electric_telegraph_loc: "\n[Scope.GetCharacter.GetSheHe] was the first person to #V Send a Telegram#! using an alphabet [Scope.GetCharacter.GetSheHe] invented." #pleace replace
 tesla_engineer_achievements_invented_automobile_loc: "\En [Scope.Var('tesla_engineer_achievements_invented_automobile_year_var').GetValue] [Scope.GetCharacter.GetLastNameNoFormatting] inventó un automóvil con motor de combustión #V #! y lo condujo una larga distancia. Esto marcó el comienzo de la explosiva difusión del automóvil." #deepl:88145422
 tesla_engineer_achievements_finished_road_project_loc: "\n[Scope.GetCharacter.GetFullName] mejoradas #V Redes de carreteras#!. Gracias a los trabajos de modernización de las carreteras de [Scope.GetCharacter.GetHerHis], ahora se consideran las más modernas del mundo." #deepl:2097415548
 tesla_engineer_achievements_finished_bridge_project_loc: "\n[Scope.GetCharacter.GetSheHe] construyó muchos #V Nuevos puentes#! que permitieron mejorar las infraestructuras." #deepl:2671184667
 tesla_engineer_achievements_finished_tunnel_project_loc: "\nEl Dr. [Scope.GetCharacter.GetLastNameNoFormatting] estaba trabajando en la construcción de muchos #V Túneles#! que son pequeñas maravillas de la tecnología." #deepl:922154902
 tesla_engineer_achievements_finished_railway_project_loc: "\n[Scope.GetCharacter.GetSheHe] mejoró masivamente #V las líneas ferroviarias#! implantando nuevas tecnologías y otras mejoras." #deepl:721890021
 tesla_engineer_achievements_finished_construction_project_loc: "\nEl Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  mejoró los sectores de la construcción#! introduciendo equipos y técnicas de construcción modernos." #deepl:987346687
 tesla_engineer_achievements_finished_topographic_map_project_loc: "\n[Scope.GetCharacter.GetSheHe] creado un nuevo #V Mapa Topográfico#! que facilita futuros proyectos de construcción." #deepl:2317700588
 tesla_engineer_achievements_finished_locomotive_project_loc: "\n[Scope.GetCharacter.GetLastNameNoFormatting] #V  desarrollado nuevas Locomotoras#! que impulsarán los Ferrocarriles." #deepl:2246312284
 tesla_engineer_achievements_finished_production_methods_project_loc: "\n[Scope.GetCharacter.GetSheHe|U] ayudó a varias empresas a #V mejorar su Producción#!." #deepl:3837789510
 tesla_engineer_achievements_finished_rifles_project_loc: "\nEl Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  diseñó un nuevo Rifle#! que es uno de los más modernos del mundo." #deepl:373585695
 tesla_engineer_achievements_finished_tanks_project_loc: "\n[Scope.GetCharacter.GetSheHe] es un #V pionero del diseño y la construcción de tanques#! que modernizó nuestros tanques." #deepl:1266234006
 tesla_engineer_achievements_finished_fieldworks_project_loc: "\n[Scope.GetCharacter.GetLastNameNoFormatting] #V  revolucionó los trabajos de campo y las defensas#! que salvaron la vida de muchos soldados." #deepl:3300715553
 tesla_engineer_achievements_finished_geomagnetic_observartory_project_loc: "\nEl Dr. [Scope.GetCharacter.GetLastNameNoFormatting] ayudó a realizar investigaciones geomagnéticas construyendo #V un Observatorio Geomagnético#!." #deepl:2611684424
 tesla_engineer_achievements_finished_telegraphy_network_project_loc: "\n[Scope.GetCharacter.GetSheHe] construyó una red de telegrafía #V #! ." #deepl:3900781177
 tesla_engineer_achievements_finished_radio_networ_project_loc: "\nEl Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  construyó una red de radio#!." #deepl:494089721
 tesla_engineer_achievements_finished_airport_project_loc: "\n[Scope.GetCharacter.GetLastNameNoFormatting] #V  modernizó los Aeropuertos#!." #deepl:4174187253
 tesla_engineer_achievements_finished_warplane_project_loc: "\n[Scope.GetCharacter.GetSheHe] desarrollado #V Aviones modernos para el ejército#!." #deepl:3583316823
 tesla_engineer_achievements_bicycle_invented_loc: "En [Scope.Var('tesla_engineer_achievements_bicycle_invented_year_var').GetValue|0] [Scope.GetCharacter.GetLastNameNoFormatting] #V  inventamos la primera Bycycle#!. Una nueva forma de viajar utilizando sólo tu propia energía." #deepl:1060401141
