 MR_ENGINEER_ACHIEVEMENTS_TT: "[AddLocalizationIf( Scope.IsSet , 'tesla_engineer_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'tesla_engineer_achievements_no_engineer_loc')]"
 tesla_engineer_achievements_loc: "$tesla_engineer_achievements_intro_loc$[AddLocalizationIf( Scope.Var('tesla_engineer_achievements_invented_steel_frame_var').IsSet , Scope.Var('tesla_engineer_achievements_invented_steel_frame_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_invented_electric_telegraph_var').IsSet , Scope.Var('tesla_engineer_achievements_invented_electric_telegraph_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_iron_lung_inventor_var').IsSet , Scope.Var('panum_physician_achievement_iron_lung_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_road_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_road_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_irrigation_project_finished_engineer_var').IsSet , Scope.Var('tesla_irrigation_project_finished_engineer_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_bridge_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_bridge_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_tunnel_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_tunnel_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_railway_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_railway_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_construction_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_construction_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_topographic_map_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_topographic_map_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_locomotive_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_locomotive_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_production_methods_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_production_methods_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_mechanical_computer_project_finished_engineer_var').IsSet , Scope.Var('tesla_mechanical_computer_project_finished_engineer_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_rifles_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_rifles_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_tanks_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_tanks_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_fieldworks_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_fieldworks_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_geomagnetic_observartory_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_geomagnetic_observartory_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_telegraphy_network_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_telegraphy_network_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_radio_networ_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_radio_networ_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_airport_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_airport_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_warplane_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_warplane_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_bicycle_invented_var').IsSet , Scope.Var('tesla_engineer_achievements_bicycle_invented_var').GetFlagName)]"
 tesla_engineer_achievements_no_engineer_loc: "Los Logros de #V de este [concept_gaudi_engineer]#! se mostrarán aquí, una vez que tenga uno."
 tesla_engineer_achievements_intro_loc: "#V Achievements of this Engineer#!\n"
 tesla_engineer_achievements_invented_steel_frame_loc: "\n[Scope.GetCharacter.GetLastNameNoFormatting] construyó el primer edificio #V utilizando estructuras de acero#!. Esta forma de construcción se extendió por todo el mundo como un reguero de pólvora."
 tesla_engineer_achievements_invented_electric_telegraph_loc: "\n[Scope.GetCharacter.GetSheHe] was the first person to #V Send a Telegram#! using an alphabet [Scope.GetCharacter.GetSheHe] invented."
 tesla_engineer_achievements_invented_automobile_loc: "\En [Scope.Var('tesla_engineer_achievements_invented_automobile_year_var').GetValue] [Scope.GetCharacter.GetLastNameNoFormatting] inventó un automóvil con motor de combustión #V #! y lo condujo una larga distancia. Esto marcó el comienzo de la explosiva difusión del automóvil."
 tesla_engineer_achievements_finished_road_project_loc: "\n[Scope.GetCharacter.GetFullName] mejoradas #V Redes de carreteras#!. Gracias a los trabajos de modernización de las carreteras de [Scope.GetCharacter.GetHerHis], ahora se consideran las más modernas del mundo."
 tesla_engineer_achievements_finished_bridge_project_loc: "\n[Scope.GetCharacter.GetSheHe] construyó muchos #V Nuevos puentes#! que permitieron mejorar las infraestructuras."
 tesla_engineer_achievements_finished_tunnel_project_loc: "\nEl Dr. [Scope.GetCharacter.GetLastNameNoFormatting] estaba trabajando en la construcción de muchos #V Túneles#! que son pequeñas maravillas de la tecnología."
 tesla_engineer_achievements_finished_railway_project_loc: "\n[Scope.GetCharacter.GetSheHe] mejoró masivamente #V las líneas ferroviarias#! implantando nuevas tecnologías y otras mejoras."
 tesla_engineer_achievements_finished_construction_project_loc: "\nEl Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  mejoró los sectores de la construcción#! introduciendo equipos y técnicas de construcción modernos."
 tesla_engineer_achievements_finished_topographic_map_project_loc: "\n[Scope.GetCharacter.GetSheHe] creado un nuevo #V Mapa Topográfico#! que facilita futuros proyectos de construcción."
 tesla_engineer_achievements_finished_locomotive_project_loc: "\n[Scope.GetCharacter.GetLastNameNoFormatting] #V  desarrollado nuevas Locomotoras#! que impulsarán los Ferrocarriles."
 tesla_engineer_achievements_finished_production_methods_project_loc: "\n[Scope.GetCharacter.GetSheHe|U] ayudó a varias empresas a #V mejorar su Producción#!."
 tesla_engineer_achievements_finished_rifles_project_loc: "\nEl Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  diseñó un nuevo Rifle#! que es uno de los más modernos del mundo."
 tesla_engineer_achievements_finished_tanks_project_loc: "\n[Scope.GetCharacter.GetSheHe] es un #V pionero del diseño y la construcción de tanques#! que modernizó nuestros tanques."
 tesla_engineer_achievements_finished_fieldworks_project_loc: "\n[Scope.GetCharacter.GetLastNameNoFormatting] #V  revolucionó los trabajos de campo y las defensas#! que salvaron la vida de muchos soldados."
 tesla_engineer_achievements_finished_geomagnetic_observartory_project_loc: "\nEl Dr. [Scope.GetCharacter.GetLastNameNoFormatting] ayudó a realizar investigaciones geomagnéticas construyendo #V un Observatorio Geomagnético#!."
 tesla_engineer_achievements_finished_telegraphy_network_project_loc: "\n[Scope.GetCharacter.GetSheHe] construyó una red de telegrafía #V #! ."
 tesla_engineer_achievements_finished_radio_networ_project_loc: "\nEl Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  construyó una red de radio#!."
 tesla_engineer_achievements_finished_airport_project_loc: "\n[Scope.GetCharacter.GetLastNameNoFormatting] #V  modernizó los Aeropuertos#!."
 tesla_engineer_achievements_finished_warplane_project_loc: "\n[Scope.GetCharacter.GetSheHe] desarrollado #V Aviones modernos para el ejército#!."
 tesla_engineer_achievements_bicycle_invented_loc: "En [Scope.Var('tesla_engineer_achievements_bicycle_invented_year_var').GetValue|0] [Scope.GetCharacter.GetLastNameNoFormatting] #V  inventamos la primera Bycycle#!. Una nueva forma de viajar utilizando sólo tu propia energía."