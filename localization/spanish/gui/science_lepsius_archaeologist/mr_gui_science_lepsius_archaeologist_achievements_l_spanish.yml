chaeologist_achievement_tomb_first_emperor_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_discovered_tikal_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_discovered_tikal_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_explored_petra_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_explored_petra_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_found_sarcophagus_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_found_sarcophagus_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_found_tutankhamun_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_found_tutankhamun_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_found_ship_of_khufu_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_found_ship_of_khufu_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_found_tower_of_babylon_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_found_tower_of_babylon_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_found_gardens_of_sennacherib_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_found_gardens_of_sennacherib_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achivement_found_treasury_of_atreus_var').IsSet , Scope.Var('lepsius_archaeologist_achivement_found_treasury_of_atreus_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_found_tomb_of_pakal_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_found_tomb_of_pakal_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_raised_flag_on_pyramids_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_raised_flag_on_pyramids_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_reconstructed_ishtar_gate_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_reconstructed_ishtar_gate_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_found_lamassu_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_found_lamassu_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_escaped_labyrinth_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_escaped_labyrinth_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_survived_maya_pyramid_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_survived_maya_pyramid_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_found_vilcabamba_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_found_vilcabamba_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_discovered_nazca_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_discovered_nazca_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_lost_world_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_lost_world_var').GetFlagName)]"
 lepsius_archaeologist_no_archaeologist_loc: "Los Logros de #V de este [concept_lepsius_archaeologist]#! se mostrarán aquí, una vez que tenga uno."
 lepsius_archaeologist_achievements_intro_loc: "#V Logros de esteArqueólogo#!\n[Scope.GetCharacter.GetFullName] es [Scope.GetCharacter.GetCustom('lepsius_archaeologist_experience_level_type')] que recogió un total de [Scope.Var('lepsius_total_artifact_minor_archaeologist_var').GetValue|0+] [Concept('concept_lepsius_artifact','$concept_lepsius_minor_artifacts$')] ."
 lepsius_archaeologist_achievement_famous_level_archaeologist_overview_loc: "un famoso [concept_lepsius_archaeologist]"
 lepsius_archaeologist_achievement_experienced_level_archaeologist_overview_loc: "un experimentado [concept_lepsius_archaeologist]"
 lepsius_archaeologist_achievement_normal_level_archaeologist_overview_loc: "un experto [concept_lepsius_archaeologist]"
 lepsius_archaeologist_achievement_expert_for_egyptian_archaeology_loc: "\n[Scope.GetCharacter.GetSheHe|U] es experto en #V arqueología egipcia#!, de donde [Scope.GetCharacter.GetSheHe] recogió [Scope.Var('lepsius_egyptian_artifact_minor_archaeologist_var').GetValue|0V] artefactos menores."
 lepsius_archaeologist_achievement_expert_for_mesopotamian_archaeology_loc: "\n[Scope.GetCharacter.GetSheHe|U] es experto en #V Arqueología Mesopotámica#!, de donde [Scope.GetCharacter.GetSheHe] recogió [Scope.Var('lepsius_mesopotamian_artifact_minor_archaeologist_var').GetValue|0V] Artefactos Menores."
 lepsius_archaeologist_achievement_expert_for_aegean_archaeology_loc: "\n[Scope.GetCharacter.GetSheHe|U] es experto de #V Arqueología Egea#!, de donde [Scope.GetCharacter.GetSheHe] recogió [Scope.Var('lepsius_aegean_artifact_minor_archaeologist_var').GetValue|0V] Artefactos Menores."
 lepsius_archaeologist_achievement_expert_for_precolumbian_archaeology_loc: "\n[Scope.GetCharacter.GetSheHe|U] es experto de #V Arqueología precolombina#!, de donde [Scope.GetCharacter.GetSheHe] recogió [Scope.Var('lepsius_precolumbian_artifact_minor_archaeologist_var').GetValue|0V] Artefactos menores."
 lepsius_archaeologist_achievement_expert_for_fareastern_archaeology_loc: "\n[Scope.GetCharacter.GetSheHe|U] es un experto de #V Arqueología Fareastern#!, de donde [Scope.GetCharacter.GetSheHe] recogió [Scope.Var('lepsius_fareastern_artifact_minor_archaeologist_var').GetValue|0V] Artefactos Menores."
 lepsius_archaeologist_achievement_expert_for_oceanic_archaeology_loc: "\n[Scope.GetCharacter.GetSheHe|U] es experto de #V Arqueología Oceánica#!, de donde [Scope.GetCharacter.GetSheHe] recogió [Scope.Var('lepsius_oceanic_artifact_minor_archaeologist_var').GetValue|0V] Artefactos Menores."
 lepsius_archaeologist_achievement_not_expert_loc: ""
 lepsius_archaeologist_achievement_attended_exodus_congress_loc: "\n[Scope.GetCharacter.GetSheHe|U] asistió al #V Congreso Arqueológico sobre la Historicidad del Éxodo#!."
 lepsius_archaeologist_achievement_attended_civilization_congress_loc: "\n[Scope.GetCharacter.GetSheHe|U] asistió al #V Congreso Arqueológico sobre el Origen de la Civilización#!."
 lepsius_archaeologist_achievement_attended_troy_congress_loc: "\n[Scope.GetCharacter.GetSheHe|U] asistió al Congreso Arqueológico #V sobre la historicidad de Troya.#!"
 lepsius_archaeologist_achievement_invented_three_age_system_loc: "#V \Uno de los mayores logros de [Scope.GetCharacter.GetHerHis] es la invención del sistema de las tres edades#!, que permite a los arqueólogos clasificar los artefactos en los periodos de la Edad de Piedra, la Edad de Bronce y la Edad de Hierro."
 lepsius_archaeologist_achievement_invented_early_archaeology_loc: "\Al utilizar métodos estratigráficos y documentar ampliamente los hallazgos [Scope.GetCharacter.GetHerHis], [Scope.GetCharacter.GetLastNameNoFormatting] #V  revolucionó la arqueología#! y la transformó en una verdadera ciencia."
 lepsius_archaeologist_achievement_inaugurated_museum_loc: "#V \El Dr. [Scope.GetCharacter.GetLastNameNoFormatting] desempeñó un papel decisivo en la creación del Museo Arqueológico#!, donde [Scope.GetCharacter.GetSheHe] se exponen todos los artefactos de forma significativa."
 lepsius_archaeologist_achievement_new_methods_pompeii_loc: "\nEl profesor [Scope.GetCharacter.GetLastNameNoFormatting] desarrolló #V nuevos métodos para mantener intactos los hallazgos#! en Pompeya."
 lepsius_archaeologist_achievement_discovered_teotihuacan_loc: "\nEl Dr. [Scope.GetCharacter.GetLastNameNoFormatting] fue la figura central en la reconstrucción #V del Templo del Sol en Teotihuacán#!."
 lepsius_archaeologist_achievement_discovered_harappa_loc: "\El profesor [Scope.GetCharacter.GetLastNameNoFormatting] #V  descubrió la civilización del Valle del Indo#! en el yacimiento de Harappa."
 lepsius_archaeologist_achievement_tomb_first_emperor_loc: "\nEl Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  descubrió la Tumba del Primer Emperador Qin#! custodiada por un Ejército de Terracota."
 lepsius_archaeologist_achievement_discovered_tikal_loc: "\El profesor [Scope.GetCharacter.GetLastNameNoFormatting] #V  descubrió la ciudad maya de Tikal#! en la selva de Guatemala."
 lepsius_archaeologist_achievement_explored_petra_loc: "\nEl Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  exploró la ciudad de Petra#! en los abrasadores desiertos de Oriente Medio."
 lepsius_archaeologist_achievement_found_sarcophagus_intact_loc: "\El descubrimiento del #V Sarcófago de un faraón desconocido#! es uno de los mayores logros del Dr. [Scope.GetCharacter.GetLastNameNoFormatting]."
 lepsius_archaeologist_achievement_found_sarcophagus_broken_loc: "\nAunque el Dr. [Scope.GetCharacter.GetLastNameNoFormatting] descubrió la #V Tumba de un faraón desconocido#!, este descubrimiento se vio arruinado por la destrucción de la momia del faraón en un desafortunado accidente."
 lepsius_archaeologist_achievement_found_tutankhamun_loc: "\Un hito en la carrera de [Scope.GetCharacter.GetHerHis] fue el descubrimiento de la tumba intacta del #V faraón Tutankamón#!."
 lepsius_archaeologist_achievement_found_ship_of_khufu_loc: "\El descubrimiento de la #V Nave de Khufu#! inmortalizará para siempre el nombre del Dr. [Scope.GetCharacter.GetLastNameNoFormatting] en los libros de historia."
 lepsius_archaeologist_achievement_found_tower_of_babylon_loc: "\nDurante [Scope.GetCharacter.GetHerHis] tiempo en Mesopotamia, [Scope.GetCharacter.GetSheHe] encontró la #V Torre de Babilonia#! que es conocida entre los arqueólogos como Zikurrat Etemenanki. ¡Un hallazgo maravilloso!"
 lepsius_archaeologist_achievement_found_gardens_of_sennacherib_loc: "|nEl Dr. [Scope.GetCharacter.GetLastNameNoFormatting] es probablemente la única persona que puede presumir de haber redescubierto una de las siete maravillas del mundo. |U[Scope.GetCharacter.GetSheHe] encontró realmente los #V Jardines Colgantes#!."
 lepsius_archaeologist_achivement_found_treasury_of_atreus_loc: "\Seguro que para un arqueólogo todo es un tesoro, pero el descubrimiento del Dr. [Scope.GetCharacter.GetLastNameNoFormatting] es sin duda un verdadero tesoro. Los #V Tesoros de Micenas#! consistían en muchas cosas, la mayoría hechas de oro, como las Máscaras de Oro."
 lepsius_archaeologist_achievement_found_tomb_of_pakal_loc: "\nLa #V Tumba de Pakal#!, que el Dr. [Scope.GetCharacter.GetLastNameNoFormatting] descubrió, era muy impresionante. Tan impresionante como debería ser para el mayor rey de los mayas."
 lepsius_archaeologist_achievement_raised_flag_on_pyramids_loc: "|nMientras trabajaba en Egipto, [Scope.GetCharacter.GetSheHe] #V  izó una bandera en la Gran Pirámide de Gizah#!."
 lepsius_archaeologist_achievement_reconstructed_ishtar_gate_loc: "\nEl profesor [Scope.GetCharacter.GetLastNameNoFormatting] no sólo encontró la #V Puerta de Ishtar#! sino que la reconstruyó. Ahora vuelve a brillar en todo su esplendor."
 lepsius_archaeologist_achievement_found_lamassu_loc: "\En una gran aventura llena de peligros, [Scope.GetCharacter.GetSheHe] encontró al majestuoso #V Lamassu#!."
 lepsius_archaeologist_achievement_escaped_labyrinth_loc: "\nEl Dr. [Scope.GetCharacter.GetLastNameNoFormatting] escapó de un #V Laberinto Mítico#! lleno de peligros."
 lepsius_archaeologist_achievement_survived_maya_pyramid_loc: "\A veces la arqueología es peligrosa. El profesor [Scope.GetCharacter.GetLastNameNoFormatting] sobrevivió a su viaje a través de una misteriosa #V Pirámide Maya#! que era más aventura que arqueología."
 lepsius_archaeologist_achievement_found_vilcabamba_loc: "\nEl Dr. [Scope.GetCharacter.GetLastNameNoFormatting] ha #V redescubierto Vilacamba#!, el último refugio de los incas."
 lepsius_archaeologist_achievement_discovered_nazca_loc: "\n[Scope.GetCharacter.GetSheHe|U] #V  encontrado enormes dibujos en el desierto de Nazca#! que sólo son realmente visibles desde el cielo."
 lepsius_archaeologist_achievement_dinosaur_myth_loc: "\El Dr. [Scope.GetCharacter.GetLastNameNoFormatting] es ridiculizado por la comunidad científica. Afirma que los miembros de su expedición #V fueron devorados por dinosaurios#!. ¿Es esta afirmación ridícula o es la verdad?"
 lepsius_archaeologist_achievement_photo_evidence_independent_loc: "\nEl profesor [Scope.GetCharacter.GetLastNameNoFormatting] aportó pruebas fotográficas de #V Dinosaurios vivos#! aunque nadie creía [Scope.GetCharacter.GetHerHim]."
 lepsius_archaeologist_achievement_photo_support_loc: "\nCon el apoyo del gobierno, el profesor [Scope.GetCharacter.GetLastNameNoFormatting] pudo aportar pruebas fotográficas de #V Dinosaurios vivos#! a pesar de que antes fue ridiculizado."