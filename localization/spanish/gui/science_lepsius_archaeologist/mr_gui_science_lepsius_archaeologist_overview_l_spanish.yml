 MR_BAN_ARTIFACT_EXPORT_BUTTON: "Ban Artifact Export"
 MR_BAN_ARTIFACT_EXPORT_BUTTON_TT: "#T Ban Artifact Export#!\nBy imposing a ban on the export of artifacts, we are making it clear that we would prefer our archaeological treasures to remain in the ground rather than risk them being excavated and removed by foreigners. As a matter of principle, we will not issue any excavation licences.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ALLOW_ARTIFACT_EXPORT_BUTTON: "Allow Artifact Export"
 MR_ALLOW_ARTIFACT_EXPORT_BUTTON_TT: "#T Allow Artifact Export#!\nWith an export permit for artifacts, we can earn a nice extra income.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"