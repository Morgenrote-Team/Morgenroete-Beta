ar('panum_physician_achievement_endoscope_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_ophthalmoscope_inventor_var').IsSet , Scope.Var('panum_physician_achievement_ophthalmoscope_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_chemotherapy_inventor_var').IsSet , Scope.Var('panum_physician_achievement_chemotherapy_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_attended_medical_congress_var').IsSet , Scope.Var('panum_physician_achievement_attended_medical_congress_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_anthrax_disease_var').IsSet , Scope.Var('panum_physician_achievement_anthrax_disease_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_goiter_disease_var').IsSet , Scope.Var('panum_physician_achievement_goiter_disease_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_nephrolithiasis_disease_var').IsSet , Scope.Var('panum_physician_achievement_nephrolithiasis_disease_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_pellagra_disease_var').IsSet , Scope.Var('panum_physician_achievement_pellagra_disease_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_rickets_disease_var').IsSet , Scope.Var('panum_physician_achievement_rickets_disease_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_syphilis_disease_var').IsSet , Scope.Var('panum_physician_achievement_syphilis_disease_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_tetanus_disease_var').IsSet , Scope.Var('panum_physician_achievement_tetanus_disease_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_military_medicine_project_finished_var').IsSet , Scope.Var('panum_physician_achievement_military_medicine_project_finished_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_inaugurated_asylum_var').IsSet , Scope.Var('panum_physician_achievement_inaugurated_asylum_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_aspirin_inventor_var').IsSet , Scope.Var('mendelejew_chemist_achievement_aspirin_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_basketball_inventor_var').IsSet , Scope.Var('panum_physician_achievement_basketball_inventor_var').GetFlagName)]" #deepl:2197070343
 panum_physician_no_physician_loc: "Los Logros de #V de este [concept_panum_physician]#! se mostrarán aquí, una vez que tenga uno." #deepl:3202202811
 panum_physician_achievements_intro_loc: "#V Logros de esteMédico#!\n[Scope.GetCharacter.GetFullName] es un Médico de éxito." #deepl:2011576622

 panum_physician_achievement_successful_treatments_loc: "\nEl Dr. [Scope.GetCharacter.GetLastNameNoFormatting] tiene experiencia en el tratamiento de pacientes y ha #o tratado con éxito a [GetPlayer.MakeScope.Var('panum_physician_var').GetVariable('panum_physician_successful_treatments_var').GetValue] pacientes#!." #deepl:2185896488
 panum_physician_achievement_epidemiologist_loc: "\n[Scope.GetCharacter.GetSheHe|U] estudiado ampliamente las enfermedades y se ha convertido en un #o $panum_epidemiologist$ #! ." #deepl:1702393838
 panum_physician_achievement_surgeon_loc: "\n[Scope.GetCharacter.GetSheHe|U] realizó numerosas intervenciones quirúrgicas, por lo que se le considera un buen #o $panum_surgeon$ #! ." #deepl:3171499380
 panum_physician_achievement_psychiatrist_loc: "\nEl Dr. [Scope.GetCharacter.GetLastNameNoFormatting] ha estudiado ampliamente la mente humana y es un #o renombrado $panum_psychiatrist$#! ." #deepl:60079648
 panum_physician_achievement_military_physician_loc: "\Como #o $panum_military_physician$ #! [Scope.GetCharacter.GetSheHe] ha visto los horrores de la guerra y sabe cómo tratar a la gente en circunstancias horribles." #deepl:696092700
 panum_physician_achievement_germ_theory_inventor_loc: "\nEl Dr. [Scope.GetCharacter.GetLastNameNoFormatting] ha inventado la Teoría de los Gérmenes #o #! que ya ha salvado miles de vidas." #deepl:2770995117
 panum_physician_achievement_pneumothorax_inventor_loc: "\nUno de los mayores inventos de [Scope.GetCharacter.GetHerHim] es un #o Dispositivo para inducir un Neumotórax artificial#!. El resultado es un colapso pulmonar que puede ayudar a tratar la tuberculosis." #deepl:304953214
 panum_physician_achievement_thoracoplasty_inventor_loc: "\Gracias a sus habilidades quirúrgicas [Scope.GetCharacter.GetHerHis], el doctor [Scope.GetCharacter.GetLastNameNoFormatting] inventó un procedimiento #o que revolucionó la cirugía pulmonar denominada toracoplastia#! y permitió así mejorar el tratamiento de los enfermos de tuberculosis." #deepl:3014173894
 panum_physician_achievement_attended_medical_congress_loc: "\n[Scope.GetCharacter.GetSheHe] participó en al menos un Congreso Médico #o #! y compartió [Scope.GetCharacter.GetHerHis] ideas." #deepl:1479296090
 mendelejew_chemist_achievement_aspirin_inventor_loc: "\nEl Dr. [GetPlayer.MakeScope.Var('mendelejew_chemist_var').GetCharacter.GetLastNameNoFormatting] está considerado el inventor clave de #o Aspirina#! y no sólo ha proporcionado alivio del dolor a innumerables pacientes, sino que también ha revolucionado la industria farmacéutica." #deepl:2162525717
 panum_physician_achievement_xray_inventor_loc: "\nCon el descubrimiento de los rayos X #o #! , el Dr. [GetPlayer.MakeScope.Var('curie_physicist_var').GetCharacter.GetLastNameNoFormatting] está considerado uno de los principales físicos internacionales que revolucionaron la medicina y la física a partes iguales." #deepl:34275984
 panum_physician_achievement_bloodtypes_inventor_loc: "\nCon el descubrimiento de los diferentes #o Grupos sanguíneos, a saber, A, B, AB y 0#!, el Dr. [Scope.GetCharacter.GetLastNameNoFormatting] ha desempeñado un papel importante para que conozcamos mejor la sangre como tal y para que las transfusiones sanguíneas tengan más éxito." #deepl:3740473168
 panum_physician_achievement_ecg_inventor_loc: "\nEl #o ECG#!, inventado por el Dr. [Scope.GetCharacter.GetLastNameNoFormatting], permitió medir la actividad eléctrica del corazón y representa un hito en las operaciones hospitalarias." #deepl:2321856106
 panum_physician_achievement_transplantation_inventor_loc: "\Con el primer trasplante #o #! , el Dr. [Scope.GetCharacter.GetLastNameNoFormatting] se ganó un lugar en la historia de la medicina." #deepl:2933890993
 panum_physician_achievement_stereotactic_method_inventor_loc: "\A día de hoy, el método estereotáctico #o #! [Scope.GetCharacter.GetSheHe] inventado se considera pionero en la cirugía cerebral." #deepl:147308326
 panum_physician_achievement_cardiopulmonary_bypass_inventor_loc: "\nCon el desarrollo de la derivación cardiopulmonar #o #! , el Dr. [Scope.GetCharacter.GetLastNameNoFormatting] ha logrado una obra maestra de la medicina moderna." #deepl:3531788201
 panum_physician_achievement_endoscope_inventor_loc: "\n[Scope.GetCharacter.GetHerHis|U] invención del #o Endoscopio#!, con el que se pudo examinar por primera vez el interior humano, también es especialmente recordado." #deepl:2202274893
 panum_physician_achievement_ophthalmoscope_inventor_loc: "\nEl Dr. [Scope.GetCharacter.GetLastNameNoFormatting] inventó un aparato que facilita el examen de las enfermedades oculares y prestó así un inestimable servicio a la oftalmología: #o El Oftalmoscopio#!." #deepl:657308744
 panum_physician_achievement_chemotherapy_inventor_loc: "\nLa quimioterapia #o #! [Scope.GetCharacter.GetSheHe] desarrollada para tratar incluso las enfermedades más rebeldes con una variedad de medicamentos da incluso a los pacientes de cáncer la esperanza de que no todo es en vano." #deepl:1291980204
 panum_physician_achievement_iron_lung_inventor_loc: "\n[GetPlayer.MakeScope.Var('tesla_engineer_var').GetCharacter.GetHerHis|U] #o  La construcción del primer pulmón de hierro#! para sostener la vida de los enfermos de polio en situación crítica se considera uno de los logros de ingeniería más fascinantes de esta época." #deepl:2605796385
 panum_physician_achievement_military_medicine_project_finished_loc: "\nEl Dr. [Scope.GetCharacter.GetLastNameNoFormatting] ha #o inventado los últimos métodos en el campo de la medicina de campaña#!, convirtiendo a los servicios médicos militares en uno de los más reconocidos del mundo." #deepl:3753274088
 panum_physician_achievement_inaugurated_asylum_loc: "\nEl Dr. [Scope.GetCharacter.GetLastNameNoFormatting] desempeñó un papel crucial en la fundación del primer manicomio del país #o #! con el fin de prestar una ayuda integral y humana a los enfermos mentales." #deepl:2471346129
 panum_physician_achievement_anthrax_disease_loc: "\nEl Dr. [Scope.GetCharacter.GetLastNameNoFormatting] se ha #o especializado en el ántrax#! y ha desarrollado métodos eficaces de prevención y tratamiento del mismo." #deepl:2201385397
 panum_physician_achievement_goiter_disease_loc: "\nEl Dr. [Scope.GetCharacter.GetLastNameNoFormatting] se ha #o especializado en el bocio#! y ha desarrollado métodos eficaces de prevención y tratamiento del mismo." #deepl:693298154
 panum_physician_achievement_nephrolithiasis_disease_loc: "#o \nEl Dr. [Scope.GetCharacter.GetLastNameNoFormatting] se ha especializado en la Nefrolitiasis#! y ha desarrollado métodos eficaces de prevención y tratamiento de la misma." #deepl:3950905505
 panum_physician_achievement_pellagra_disease_loc: "\nEl Dr. [Scope.GetCharacter.GetLastNameNoFormatting] se ha #o especializado en la pelagra#! y ha desarrollado métodos eficaces de prevención y tratamiento de la misma." #deepl:1987809959
 panum_physician_achievement_rickets_disease_loc: "\nEl Dr. [Scope.GetCharacter.GetLastNameNoFormatting] se ha #o especializado en el raquitismo#! y ha desarrollado métodos eficaces de prevención y tratamiento del mismo." #deepl:660217329
 panum_physician_achievement_syphilis_disease_loc: "\nEl Dr. [Scope.GetCharacter.GetLastNameNoFormatting] se ha #o especializado en la sífilis#! y ha desarrollado métodos eficaces de prevención y tratamiento de la misma." #deepl:908555016
 panum_physician_achievement_tetanus_disease_loc: "\nEl Dr. [Scope.GetCharacter.GetLastNameNoFormatting] se ha #o especializado en el tétanos#! y ha desarrollado métodos eficaces de prevención y tratamiento del mismo." #deepl:1982558023
 panum_physician_achievement_basketball_inventor_loc: "\En [Scope.Var('panum_physician_achievement_basketball_inventor_year_var').GetValue|0] el Dr. [Scope.GetCharacter.GetLastNameNoFormatting] ha inventado #o un nuevo deporte de equipo llamado Baloncesto.#!" #deepl:207476415
