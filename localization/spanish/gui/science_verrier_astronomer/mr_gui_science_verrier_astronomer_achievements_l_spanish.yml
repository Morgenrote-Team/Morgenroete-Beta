 verrier_astronomer_achievements_no_astronomer_loc: "Los Logros de #V de este [concept_verrier_astronomer]#! se mostrarán aquí, una vez que tenga uno."
 verrier_astronomer_achievements_intro_loc: "#V Logros de esteAstrónomo#![Scope.GetCharacter.GetFullName] es un consumado astrónomo que descubrió [Scope.Var('verrier_astronomer_total_objects_var').GetValue|0V] [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] ."
 verrier_astronomer_achievement_measured_distance_cygni_loc: "\nAl medir la distancia #V de 61 Cygni a 11,4 años-luz#!, [Scope.GetCharacter.GetLastNameNoFormatting] consiguió demostrar de un plumazo que el universo era mucho mayor de lo que se pensaba."
 verrier_astronomer_achievement_helium_discovered_loc: "\nUno de los mayores logros de [Scope.GetCharacter.GetHerHis] es el #V Descubrimiento del elemento helio#! mientras estudiaba el espectro electromagnético del sol."
 verrier_astronomer_achievement_uranus_discoverer_loc: "\Nadie esperaba que se descubriera un nuevo planeta, pero el profesor [Scope.GetCharacter.GetLastNameNoFormatting] #V  descubrió el planeta Urano#!. Este descubrimiento condujo a la búsqueda de más planetas en nuestro sistema solar."
 verrier_astronomer_achievement_ceres_discoverer_loc: "\nMuchos astrónomos buscaron el planeta situado entre Marte y Júpiter. Pero el Dr. [Scope.GetCharacter.GetLastNameNoFormatting] fue quien #V encontró Ceres#!."
 verrier_astronomer_achievement_pallas_discoverer_loc: "\nEl Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  encontró el Planeta Pallas#! en la región comprendida entre Marte y Júpiter."
 verrier_astronomer_achievement_vesta_discoverer_loc: "\nEl Profesor [Scope.GetCharacter.GetLastNameNoFormatting] #V  encontró el Planeta Vesta#! en la región comprendida entre Marte y Júpiter."
 verrier_astronomer_achievement_juno_discoverer_loc: "\n[Scope.GetCharacter.GetSheHe|U] #V  encontró el Planeta Juno#! en la región entre Marte y Júpiter."
 verrier_astronomer_neptune_discoverer_loc: "#V \Una de las mayores hazañas de [Scope.GetCharacter.GetHerHis] fue el descubrimiento del planeta Neptuno#!. Este descubrimiento aseguró a [Scope.GetCharacter.GetHerHim] un lugar en los libros de historia para siempre."
 verrier_astronomer_achievement_pluto_discoverer_loc: "\nAunque se discutía si #V Plutón#! existía siquiera, el profesor [Scope.GetCharacter.GetLastNameNoFormatting] descubrió realmente #V #! el diminuto planeta. ¡Un gran logro astronómico!"
 verrier_astronomer_achievement_discovered_1843_comet_loc: "\nEn #V 1843#! [Scope.GetCharacter.GetSheHe] fue el primero en #V encontrar el Gran Cometa#! que por ello recibió el nombre de [Scope.GetCharacter.GetLastNameNoFormatting]."
 verrier_astronomer_achievement_discovered_1858_comet_loc: "\nCuando el #V Gran Cometa de 1858#! pasó junto a la Tierra, el Dr. [Scope.GetCharacter.GetLastNameNoFormatting] fue el primero en verlo. Como resultado, el cometa recibió el nombre de [Scope.GetCharacter.GetHerHim]."
 verrier_astronomer_achievement_discovered_1861_comet_loc: "\Al ser el primero en descubrir el #V Gran Cometa de 1861#! en la oscuridad del cielo nocturno, el profesor [Scope.GetCharacter.GetLastNameNoFormatting] se convirtió en el homónimo del objeto celeste."
 verrier_astronomer_achievement_discovered_1874_comet_loc: "\nCuando el #V Gran Cometa de 1874#! apareció por primera vez, fue el Dr. [Scope.GetCharacter.GetLastNameNoFormatting] quien se fijó en él primero. Ahora el cometa llevará el nombre de [Scope.GetCharacter.GetHerHis] para siempre."
 verrier_astronomer_achievement_discovered_1882_comet_loc: "\nEl año #V 1882#! fue espectacular desde el punto de vista astronómico. El profesor [Scope.GetCharacter.GetLastNameNoFormatting] descubrió un #V Gran Cometa#! en su sobrevuelo de la Tierra. Un espectáculo increíble."
 verrier_astronomer_achievement_finished_pacific_expedition_loc: "\nMientras realizaba una #V Expedición al Pacífico#!, el Dr. [Scope.GetCharacter.GetLastNameNoFormatting] encontró varios nuevos #V Objetos astronómicos#! en el hemisferio sur."
 verrier_astronomer_achievement_observed_venus_transit_loc: "\nEn el año de #V 1874#!, el Profesor [Scope.GetCharacter.GetLastNameNoFormatting] observó el #V Tránsito de Venus#! en el Océano Pacífico. Suele ser un acontecimiento que ocurre una vez en la vida."
 verrier_astronomer_achievement_observed_carrington_event_loc: "\nEl Dr. [Scope.GetCharacter.GetLastNameNoFormatting] observó la #V llamarada solar masiva#! en [Scope.GetVariable('verrier_astronomer_achievement_observed_carrington_event_var').GetValue]."
 verrier_astronomer_achievement_observed_corona_loc: "\Descubrió las cuentas de #V [Scope.GetCharacter.GetLastNameNoFormatting] #! , que llevan el nombre de [Scope.GetCharacter.GetHerHim]."
 verrier_astronomer_achievement_sun_photo_loc: "\nEl Dr. [Scope.GetCharacter.GetLastNameNoFormatting] es el autor de la #V primera foto de un eclipse solar.#!"
 verrier_astronomer_achievement_deimos_discoverer_loc: "\nEl Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  descubrió el satélite natural de Marte Deimos#!."
 verrier_astronomer_achievement_phobos_discoverer_loc: "\n[Scope.GetCharacter.GetSheHe|U] #V  descubrió el satélite natural de Marte Fobos#!."
