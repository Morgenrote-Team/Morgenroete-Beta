 verrier_astronomer_achievements_no_astronomer_loc: "Los Logros de #V de este [concept_verrier_astronomer]#! se mostrarán aquí, una vez que tenga uno."
 verrier_astronomer_achievements_intro_loc: "#V Achievements of this Astronomer#!\n #indent_newline:3 • [Scope.GetCharacter.GetFullName] is an accomplished astronomer who discovered [Scope.Var('verrier_astronomer_total_objects_var').GetValue|0V] [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')].#!"
 verrier_astronomer_achievement_measured_distance_cygni_loc: "\n #indent_newline:3 • By measuring the #V Distance from 61 Cygni at 11.4 light-years#!, [Scope.GetCharacter.GetLastNameNoFormatting] succeeded in showing in one swoop that the universe was much larger than previously thought.#!"
 verrier_astronomer_achievement_helium_discovered_loc: "\n #indent_newline:3 • One of [Scope.GetCharacter.GetHerHis] greatest achievements is the #V Discovery of the Element Helium#! while studying the electromagnetic spectrum of the sun.#!"
 verrier_astronomer_achievement_uranus_discoverer_loc: "\n #indent_newline:3 • No one expected a new planet to be discovered, but Professor [Scope.GetCharacter.GetLastNameNoFormatting] #V discovered the planet Uranus#!. This discovery lead to the search for more planets in our solar system.#!"
 verrier_astronomer_achievement_ceres_discoverer_loc: "\n #indent_newline:3 • Many astronomers searched for the planet between Mars and Jupiter. But Dr. [Scope.GetCharacter.GetLastNameNoFormatting] was the one who #V found Ceres#!.#!"
 verrier_astronomer_achievement_pallas_discoverer_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V found the Planet Pallas#! in the region between Mars and Jupiter.#!"
 verrier_astronomer_achievement_vesta_discoverer_loc: "\n #indent_newline:3 • Professor [Scope.GetCharacter.GetLastNameNoFormatting] #V found the Planet Vesta#! in the region between Mars and Jupiter.#!"
 verrier_astronomer_achievement_juno_discoverer_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] #V found the Planet Juno#! in the region between Mars and Jupiter.#!"
 verrier_astronomer_neptune_discoverer_loc: "\n #indent_newline:3 • One of [Scope.GetCharacter.GetHerHis] greatest deeds was the #V Discovery of the Planet Neptune#!. This discovery secured [Scope.GetCharacter.GetHerHim] a place in the history books forever.#!"
 verrier_astronomer_achievement_pluto_discoverer_loc: "\n #indent_newline:3 • Although it was disputed whether #V Pluto#! even existed, Professor [Scope.GetCharacter.GetLastNameNoFormatting] actually #V discovered#! the tiny planet. A great astronomical achievement!#!"
 verrier_astronomer_achievement_discovered_1843_comet_loc: "\n #indent_newline:3 • In #V 1843#! [Scope.GetCharacter.GetSheHe] was the first to #V find the Great Comet#! that was therefore named after [Scope.GetCharacter.GetLastNameNoFormatting].#!"
 verrier_astronomer_achievement_discovered_1858_comet_loc: "\n #indent_newline:3 • When the #V Great Comet of 1858#! passed by the Earth, Dr. [Scope.GetCharacter.GetLastNameNoFormatting] was the first to see the comet. As a result, the comet was named after [Scope.GetCharacter.GetHerHim].#!"
 verrier_astronomer_achievement_discovered_1861_comet_loc: "\n #indent_newline:3 • As the first to discover the #V Great Comet of 1861#! in the darkness of the night sky, Professor [Scope.GetCharacter.GetLastNameNoFormatting] became the namesake of the celestial object.#!"
 verrier_astronomer_achievement_discovered_1874_comet_loc: "\n #indent_newline:3 • When the #V Great Comet of 1874#! first appeared, it was Dr. [Scope.GetCharacter.GetLastNameNoFormatting] who noticed it first. Now the comet will bear [Scope.GetCharacter.GetHerHis] name for all time.#!"
 verrier_astronomer_achievement_discovered_1882_comet_loc: "\n #indent_newline:3 • The year #V 1882#! was spectacular from an astronomical point of view. Professor [Scope.GetCharacter.GetLastNameNoFormatting] discovered a #V Great Comet#! on its flyby of the Earth. An incredible spectacle.#!"
 verrier_astronomer_achievement_finished_pacific_expedition_loc: "\n #indent_newline:3 • While on a #V Pacific Expedition#!, Dr. [Scope.GetCharacter.GetLastNameNoFormatting] found various new #V Astronomical Objects#! in the southern hemisphere.#!"
 verrier_astronomer_achievement_observed_venus_transit_loc: "\n #indent_newline:3 • In the year of #V 1874#!, Professor [Scope.GetCharacter.GetLastNameNoFormatting] observed the #V Venus Transit#! in the Pacific Ocean. Usually a once in a lifetime event.#!"
 verrier_astronomer_achievement_observed_carrington_event_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] observed the #V Massive Solar Flare#! in [Scope.GetVariable('verrier_astronomer_achievement_observed_carrington_event_var').GetValue].#!"
 verrier_astronomer_achievement_observed_corona_loc: "\n #indent_newline:3 • Discovered the #V [Scope.GetCharacter.GetLastNameNoFormatting]'s Beads#!, which wer named after [Scope.GetCharacter.GetHerHim].#!"
 verrier_astronomer_achievement_sun_photo_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] is the Author of the #V first photo of a solar eclipse#!.#!"
 verrier_astronomer_achievement_deimos_discoverer_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V discovered Mars's natural satellite Deimos#!.#!"
 verrier_astronomer_achievement_phobos_discoverer_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] #V discovered Mars's natural satellite Phobos#!.#!"
 verrier_astronomer_achievement_amalthea_discoverer_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V discovered Jupiter's natural satellite Amalthea#!.#!"
 verrier_astronomer_achievement_himalia_discoverer_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] #V discovered Jupiter's natural satellite Himalia#!.#!"
 verrier_astronomer_achievement_elara_discoverer_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V discovered Jupiter's natural satellite Elara#!.#!"
 verrier_astronomer_achievement_pasiphae_discoverer_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] #V discovered Jupiter's natural satellite Pasiphae#!.#!"
 verrier_astronomer_achievement_sinope_discoverer_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V discovered Jupiter's natural satellite Sinope#!.#!"
 verrier_astronomer_achievement_lysithea_discoverer_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] #V discovered Jupiter's natural satellite Lysithea#!.#!"
 verrier_astronomer_achievement_carme_discoverer_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V discovered Jupiter's natural satellite Carme#!.#!"
 verrier_astronomer_achievement_enceladus_discoverer_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] #V discovered Saturn's natural satellite Enceladus#!.#!"
 verrier_astronomer_achievement_mimas_discoverer_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V discovered Saturn's natural satellite Mimas#!.#!"
 verrier_astronomer_achievement_hyperion_discoverer_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] #V discovered Saturn's natural satellite Hyperion#!.#!"
 verrier_astronomer_achievement_phoebe_discoverer_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V discovered Saturn's natural satellite Phoebe#!.#!"
 verrier_astronomer_achievement_titania_discoverer_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] #V discovered Uranus's natural satellite Titania#!.#!"
 verrier_astronomer_achievement_oberon_discoverer_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V discovered Uranus's natural satellite Oberon#!.#!"
 verrier_astronomer_achievement_ariel_discoverer_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] #V discovered Uranus's natural satellite Ariel#!.#!"
 verrier_astronomer_achievement_umbriel_discoverer_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V discovered Uranus's natural satellite Umbriel#!.#!"
 verrier_astronomer_achievement_miranda_discoverer_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] #V discovered Uranus's natural satellite Miranda#!.#!"
 verrier_astronomer_achievement_triton_discoverer_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V discovered Neptune's natural satellite Triton#!.#!"
 verrier_astronomer_achievement_nereid_discoverer_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] #V discovered Neptune's natural satellite Nereid#!.#!"
 verrier_astronomer_achievement_moon_fission_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] is considered the founder of the theory that the #V Moon was a part of the Earth#! and split off.#!"
 verrier_astronomer_achievement_moon_capture_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] is considered the founder of the theory that the #V Moon is a foreign body that was captured by the Earth#!.#!"
 verrier_astronomer_achievement_centaur_discoverer_loc: "\n #indent_newline:3 • While searching for Planet X, [Scope.GetCharacter.GetSheHe] #V found the first Centaur#!, a separate class of asteroids located between Jupiter and Neptune.#!"