l_spanish:
 MR_GORDON_BENNETT_CUP_BUTTON: "La Copa Gordon Bennett"
 MR_GORDON_BENNETT_CUP_BUTTON_TT: "#T La Copa Gordon Bennett #!\nLa Copa Gordon Bennett (o Coupe Aéronautique Gordon Bennett) es la carrera de globos aerostáticos más antigua del mundo. Conocida como la \"Cinta Azul\" de la aeronáutica, el evento fue patrocinado por James Gordon Bennett Jr., el millonario deportista y propietario del periódico New York Herald. Según los organizadores, el objetivo de la competición \"es sencillo: volar la mayor distancia posible desde el punto de lanzamiento\". La competición se celebró desde 1906 hasta 1938, con interrupciones entre 1914 y 1919 debido a la Primera Guerra Mundial y en 1931.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GORDON_BENNETT_PUBLISHER_BUILDING_TRIGGER_TT: "#default_text [GetPlayer.GetName] tiene un total de #V 10 o más [GetBuildingType('building_manzoni_publishing_industry').GetName] niveles de edificio #! #!"