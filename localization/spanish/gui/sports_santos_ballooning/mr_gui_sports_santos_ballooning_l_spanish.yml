l_spanish:
 MR_GORDON_BENNETT_CUP_BUTTON: "The Gordon Bennett Cup"
 MR_GORDON_BENNETT_CUP_BUTTON_TT: "#T The Gordon Bennett Cupe#!\nThe Gordon Bennett Cup (or Coupe Aéronautique Gordon Bennett) is the world's oldest gas balloon race. Referred to as the 'Blue Ribbon' of aeronautics, the event was sponsored by James Gordon Bennett Jr., the millionaire sportsman and owner of the New York Herald newspaper. According to the organizers, the aim of the contest 'is simple: to fly the furthest distance from the launch site.' The contest ran from 1906 to 1938, interrupted from 1914 to 1919 by World War I and in 1931.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GORDON_BENNETT_PUBLISHER_BUILDING_TRIGGER_TT: "#default_text [GetPlayer.GetName] has a total of #V 10 or more [GetBuildingType('building_manzoni_publishing_industry').GetName] building levels#!.#!"