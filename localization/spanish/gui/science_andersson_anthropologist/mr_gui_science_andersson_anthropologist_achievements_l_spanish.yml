 andersson_anthropologist_achievement_invented_anthropology_loc: "El Dr. [Scope.GetCharacter.GetLastNameNoFormatting] es el primer científico que registró huesos y esqueletos humanos de forma meticulosa y muy precisa. [Scope.GetCharacter.GetSheHe] es considerado el #V pionero de la Antropología#!." #deepl:3155653452
