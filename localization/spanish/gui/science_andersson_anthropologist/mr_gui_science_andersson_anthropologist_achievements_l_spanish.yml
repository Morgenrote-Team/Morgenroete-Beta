 andersson_anthropologist_achievement_completed_neanderthalensis_anthropologist_loc: "#V \El Dr. [Scope.GetCharacter.GetLastNameNoFormatting] fue el primero en situar al neandertal en la sistemática del hombre prehistórico#!." #deepl:523665278
 andersson_anthropologist_achievement_completed_erectus_anthropologist_loc: "\El mérito de [ROOT.Var('lepsius_anthropologist_var').GetCharacter.GetHerHis] fue que el hasta entonces desconocido #V Homo Erectus se convirtiera en una especie humana aceptable#!." #deepl:991432050
 andersson_anthropologist_achievement_completed_australopithecus_anthropologist_loc: "\nEl profesor [Scope.GetCharacter.GetLastNameNoFormatting] fue el primero que consiguió descifrar los primeros #V secretos del Australopithecus#! y sacar conclusiones sobre su modo de vida y apariencia." #deepl:994811918
 andersson_anthropologist_achievement_completed_paranthropus_anthropologist_loc: "\No son muchos los que han conseguido #V reconstruir un hombre prehistórico#! a partir de unos pocos huesos, lo que permite extraer conclusiones sobre su entorno vital. El Dr. [Scope.GetCharacter.GetLastNameNoFormatting] lo consiguió con el #V Paranthropus#!." #deepl:2683346481
