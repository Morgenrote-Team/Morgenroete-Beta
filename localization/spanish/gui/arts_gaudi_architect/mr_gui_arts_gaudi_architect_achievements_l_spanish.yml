l_spanish:
 MR_ARCHITECT_ACHIEVEMENTS_TT: "[AddLocalizationIf( Scope.IsSet , 'gaudi_architect_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'gaudi_architect_achievements_no_architect_loc')]"
 gaudi_architect_achievements_loc: "$gaudi_architect_achievements_intro_loc$[AddLocalizationIf( Scope.Var('gaudi_architecture_treatise_var').IsSet , Scope.Var('gaudi_architecture_treatise_var').GetFlagName)][AddLocalizationIf( Scope.Var('gaudi_architect_achievement_study_trip_var').IsSet , Scope.Var('gaudi_architect_achievement_study_trip_var').GetFlagName)][AddLocalizationIf( Scope.Var('gaudi_architect_achievement_urban_planning_var').IsSet , Scope.Var('gaudi_architect_achievement_urban_planning_var').GetFlagName)][AddLocalizationIf( Scope.Var('gaudi_architect_achievement_capital_expansion_var').IsSet , Scope.Var('gaudi_architect_achievement_capital_expansion_var').GetFlagName)][AddLocalizationIf( Scope.Var('gaudi_architect_achievement_art_deco_splendour_var').IsSet , Scope.Var('gaudi_architect_achievement_art_deco_splendour_var').GetFlagName)][AddLocalizationIf( Scope.Var('gaudi_architect_achievement_neoclassical_splendour_var').IsSet , Scope.Var('gaudi_architect_achievement_neoclassical_splendour_var').GetFlagName)][AddLocalizationIf( Scope.Var('gaudi_architect_achievement_bauhaus_splendour_var').IsSet , Scope.Var('gaudi_architect_achievement_bauhaus_splendour_var').GetFlagName)][AddLocalizationIf( Scope.Var('gaudi_architect_achievement_custom_monument_var').IsSet , Scope.Var('gaudi_architect_achievement_custom_monument_var').GetFlagName)]"
 gaudi_architect_achievements_no_architect_loc: "Los Logros de #V de este [concept_gaudi_architect]#! se mostrarán aquí, una vez que tenga uno."
 gaudi_architect_achievements_intro_loc: "#V Logros de este Arquitecto#!\n[Scope.GetCharacter.GetFullName] es un [Scope.GetCharacter.GetCustom('gaudi_architect_achievement_experience_type')]. [Scope.GetCharacter.GetSheHe|U] ha creado [Scope.Var('gaudi_character_num_blueprints_var').GetValue|V0] #V  Planos#! en [Scope.GetCharacter.GetHerHis] carrera arquitectónica hasta ahora."
 gaudi_architect_achievement_study_trip_loc: "\n[Scope.GetCharacter.GetLastNameNoFormatting] ha emprendido #V un viaje de estudios de arquitectura#!."
 gaudi_architect_achievement_urban_planning_loc: "\Con [Scope.GetCharacter.GetHerHis] #V  Urbanismo#! [Scope.GetCharacter.GetSheHe] ayudó a mejorar la vida en las ciudades."
 gaudi_architect_achievement_treatise_loc: "\n[Scope.GetCharacter.GetHerHis|U] #V  Tratado de arquitectura#! se considera una obra estándar."
 gaudi_architect_achievement_custom_monument_loc: "\n[Scope.GetCharacter.GetLastNameNoFormatting] es famoso por haber creado el plano de un #V Monumento Único#! - ¡una obra maestra de la arquitectura!"
 gaudi_architect_achievement_art_deco_splendour_loc: "\Uno de los logros más destacados de la carrera de [Scope.GetCharacter.GetHerHis] fue la completa transformación urbana de #V en estilo Art Déco#!."
 gaudi_architect_achievement_neoclassical_splendour_loc: "\Uno de los logros más destacados de la carrera de [Scope.GetCharacter.GetHerHis] fue la completa transformación urbana en estilo neoclásico de #V #! ."
 gaudi_architect_achievement_bauhaus_splendour_loc: "#V \Uno de los logros más destacados de la carrera de [Scope.GetCharacter.GetHerHis] fue la completa transformación urbana al estilo Bauhaus#!."
 gaudi_architect_achievement_capital_expansion_loc: "\n[Scope.GetCharacter.GetLastNameNoFormatting] trabajó incansablemente en el desarrollo de una capital."