 je_mr_archaeology: "Arqueología"
 je_mr_archaeology_reason: "El siglo XIX y principios del XX presenciaron un rápido desarrollo en el campo de la investigación de la antigüedad: desde la búsqueda de tesoros hasta la ciencia seria. La excavación de Troya por Heinrich Schliemann y el descubrimiento de la tumba de Tutankamón por Howard Carter son sólo dos de los momentos más famosos de esta época. Al mismo tiempo, muestran que no sólo la sed científica, sino también el prestigio nacional jugaron un papel importante en la recuperación de valiosos artefactos. Con el desciframiento (casi) completo de los jeroglíficos egipcios por Karl Richard Lepsius en 1837, esta nueva era iba a comenzar."
 mr_romantic_composer_button: "Contrata un nuevo [concept_elgar_composer] (Romanticismo)"
 mr_composer_button_desc: "A diferencia de los [Concept('concept_elgar_great_composer','$concept_elgar_great_composers$')], los [Concept('concept_elgar_composer','$concept_elgar_composers$')] ordinarios son responsables de las operaciones diarias. Pueden ser contratados como directores y dar a su país una bonificación pasiva de [concept_elgar_musical_tradition]. Se puede contratar a un compositor tres veces por juego, lo que requiere investigar una tecnología específica (romanticismo, irracionalismo, neoclasicismo/nueva objetividad/art déco). Un país sólo puede apoyar a un compositor común y corriente y se requiere una inversión de diez años en la cultura musical del país."
 mr_wagnerian_composer_button: "Contrata un nuevo [concept_elgar_composer] (Irracionalismo)"
 mr_modern_composer_button: "Contrata un nuevo [concept_elgar_composer] (Moderno)"
 mr_appoint_conductor_button: "Designar un director principal"
 mr_appoint_conductor_button_desc: "Los directores dirigen el negocio musical nacional, en particular el [Concept('concept_elgar_opera','$concept_elgar_opera_house$')] líder de un país. En la ópera se les puede encomendar una tarea específica durante tres años: dirigir, componer o realizar una gira. En este sentido son similares a los [Concept('concept_elgar_great_composer','$concept_elgar_great_composers$')], aunque sus ganancias para los [concept_elgar_musical_tradition] se mantienen dentro de límites manejables."
 mr_national_conservatory_button: "Fundó un Conservatorio Nacional"
 mr_national_conservatory_button_desc: "\"Con un Conservatorio, existe la posibilidad de que personajes con el rasgo de Compositor aparezcan con el tiempo sin tener que contratarlos. La posibilidad es muy pequeña, pero existe. La probabilidad se puede aumentar con una escuela de ballet en una de nuestras óperas. escuelas."
 mr_santa_cecilia_button: "Hacer de Santa Cecilia una Academia"
 mr_santa_cecilia_button_desc: "La Accademia di Santa Cecilia fue fundada por la bula papal 'Ratione congruit' de Sixto V en 1585 en forma de congregación. En 1838 la Congregación de Santa Cecilia fue nombrada oficialmente Academia y luego Academia Pontificia. Entre sus miembros en ese momento se encontraban Luigi Cherubini, Mercadante, Donizetti, Rossini, Paganini, Auber, Liszt, Mendelssohn, Berlioz, Gounod y Meyerbeer. Uno de sus miembros honorarios fue la reina Victoria. En la Italia unida se convirtió en un importante conservatorio."
 mr_leipzig_conservatory_button: "Fundó el Conservatorio de Leipzig"
 mr_leipzig_conservatory_button_desc: "La tradicional ciudad musical de Leipzig, donde ya trabajaba Johann Sebastian Bach, ofrecía a principios del siglo XIX las condiciones óptimas para la fundación de una fábrica de talentos musicales y académicos. Cuatro ciudadanos comprometidos de la ciudad, a saber, el abogado Heinrich Conrad Schleinitz (segundo director), el director del distrito de Leipzig, Johann Paul von Falkenstein, y el consejero de la corte real sajona, Johann Georg Keil, así como el maestro de capilla de la Gewandhaus, Felix Mendelssohn Bartholdy, pusieron en práctica las ideas anteriores. práctica."
 mr_petrograd_conservatory_button: "Fundó el Conservatorio de Petrogrado"
 mr_petrograd_conservatory_button_desc: "Por iniciativa de la Gran Duquesa Elena Pavlovna, Anton Rubinstein, Andrei Nikolayevich Markovich y otras personalidades de la sociedad y la vida musical, se fundó la Sociedad Rusa de Música, de cuyas clases de música se fundó el primer conservatorio de Rusia. Anton Rubinstein fue el primer director del conservatorio y profesor de piano. El primer graduado que completó aquí sus estudios de composición fue Peter Tchaikovsky. Nikolai Andreyevich Rimsky-Korsakov tuvo un papel particularmente influyente como profesor de composición e instrumentación y director de la clase de orquesta."
 mr_bayreuth_button: "Establecer el Festival Richard Wagner"
 mr_bayreuth_button_desc: "Richard Wagner sueña desde hace mucho tiempo con tener su propia sala de festivales, donde cada año se representen sus mejores obras. Un lugar así podría convertirse rápidamente en un lugar de peregrinación para todos los entusiastas de la música y sería un monumento vivo y duradero en su honor."
