 objective_thriving_culture_name_BAV: "Baviera"
 objective_thriving_culture_desc_BAV: "Desde el punto de vista cultural, Baviera siempre ha podido competir con los grandes estados alemanes. El siglo XIX fue una época de auge del arte y la arquitectura en Múnich. Además de Walhalla y Neuschwanstein, Baviera es también el lugar donde se encontró el Archaeopteryx, el hogar de la Secesión de Munich y el lugar de nacimiento de Spitzweg. Como potencia media alemana, ¿puede Baviera defenderse de sus grandes vecinos dependiendo menos del ejército y más de la ciencia y el arte?"
 objective_thriving_culture_name_MEX: "México"
 objective_thriving_culture_desc_MEX: "A primera vista, México podría no parecer la primera opción cuando se trata de hacer florecer una cultura. Pero su rica historia arqueológica es prometedora. En teoría, México podría incluso lograr un gran avance en el Paso del Noroeste. Si el país, sacudido por las crisis, encuentra la armonía, podrá coronar estéticamente su éxito con el Palacio de Bellas Artes."
 je_mr_morgenrote_introduction_reason: "[concept_morgenroete] es un mod que se centra en la ciencia, las artes y la cultura. Incluye muchas mecánicas nuevas y mucho contenido. Para obtener una descripción general del mod, intenta usar los conceptos yendo al menú y a Vickypedia o pasando el cursor sobre este [Concepto('concept_morgenroete','$concept_morgenroete_concept$')].\n\nPara acceder a la mayoría del contenido de Morgenröte, haga clic en el botón de esta entrada del diario o en el que está cerca de la barra lateral. El botón de esta entrada del diario siempre debería funcionar."
 je_objective_cradle_of_culture_tt: "Sé la primera nación en inventar #ORANGE Impresionismo#!, #ORANGE Expresionismo#! o #ORANGE Art Nouveau#!."
 mr_divider_for_je: "              @divider_start!@divider_mid!@divider_mid!@divider_mid!@divider_mid!@divider_mid!@divider_end!"
 objective_thriving_culture_name_SWE: "Suecia"
 objective_thriving_culture_desc_SWE: "En los últimos 100 años, Suecia ha emergido como una nación científica líder, haciendo contribuciones significativas a la ciencia, incluyendo un sistema para nombrar organismos, la escala de temperatura Celsius y un sistema de símbolos de elementos químicos. ¿Puede Suecia mantener su posición a la vanguardia de la ciencia, o es hora de redirigir la atención hacia las actividades culturales, fomentando a escritores y compositores?"
