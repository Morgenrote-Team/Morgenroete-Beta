 setting_mr_tech_normal_rule_desc: "Muchos Eventos de Morgenröte dan a tu país una pequeña bonificación de investigación para una tecnología. Con esta configuración, se utilizan los #V valores normales#!."
 setting_mr_tech_half_rule: "#n Media#! #V bonificación tecnológica#!"
 setting_mr_tech_half_rule_desc: "Muchos Eventos Morgenröte dan a tu país una pequeña bonificación de investigación para una tecnología. Con esta configuración, los valores son #n la mitad#!. Esto puede resultar en velocidades de investigación más lentas."
 setting_mr_tech_quarter_rule: "#n Prima#! #V bonificación tecnológica#!"
 setting_mr_tech_quarter_rule_desc: "Muchos Eventos Morgenröte dan a tu país una pequeña bonificación de investigación para una tecnología. Con esta configuración, los valores son #n una cuarta parte#!. Esto puede resultar en velocidades de investigación más lentas."
