 je_mr_scientific_conferences: "Congresos Científicos"
 je_mr_scientific_conferences_reason: "¿Cual es la edad de la Tierra? ¿De dónde viene el hombre? ¿Cuán creíble es la Biblia como fuente histórica? ¿Es el universo infinito? ¿Y qué son realmente las galaxias? A lo largo de cien años, no sólo la ciencia como tal, sino también la visión que la gente tiene del mundo ha cambiado significativamente. La teoría de la evolución ha sacudido la certeza del hombre tanto como la teoría de la relatividad. Las conferencias científicas tienen como objetivo aclarar algunas de las cuestiones fundamentales haciendo que científicos internacionales las discutan."
 mr_exodus_congress_egyptian_artifacts_tt: "¡Necesitamos al menos #G 25#! #O @lepsius_egypt_minor! Artefactos egipcios#!."
