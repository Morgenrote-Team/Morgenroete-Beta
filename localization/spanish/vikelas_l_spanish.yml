 notification_vikelas_autorace_grand_prix_first_place_notification_desc: "Nuestro [concept_vikelas_racer] obtuvo el primer puesto en una carrera de Gran Premio y ganó #G 40#! de experiencia. Nuestro [concept_vikelas_mechanic] ganó #G 20#! de experiencia. ¡Ganamos #G 50#! @vikelas_mechanical_innovation! [Concept('concept_vikelas_mechanic','$concept_vikelas_mechanical_innovation$')]." #NT!
 notification_vikelas_autorace_grand_prix_second_place_notification_name: "Carrera del Gran Premio: Segundo puesto" #NT!
 notification_vikelas_autorace_grand_prix_second_place_notification_desc: "Nuestro [concept_vikelas_racer] obtuvo el segundo puesto en una carrera de Gran Premio y ganó #G 30#! de experiencia. Nuestro [concept_vikelas_mechanic] ganó #G 15#! de experiencia. ¡Ganamos #G 40#! @vikelas_mechanical_innovation! [Concept('concept_vikelas_mechanic','$concept_vikelas_mechanical_innovation$')]." #NT!
 notification_vikelas_autorace_grand_prix_third_place_notification_name: "Carrera del Gran Premio: Tercer puesto" #NT!
 notification_vikelas_autorace_grand_prix_third_place_notification_desc: "Nuestro [concept_vikelas_racer] obtuvo el tercer puesto en una carrera de Gran Premio y ganó #G 20#! de experiencia. Nuestro [concept_vikelas_mechanic] ganó #G 10#! de experiencia. ¡Ganamos #G 30#! @vikelas_mechanical_innovation! [Concept('concept_vikelas_mechanic','$concept_vikelas_mechanical_innovation$')]." #NT!
 notification_vikelas_autorace_grand_prix_information_place_notification_name: "Carrera del Gran Premio: Información" #NT!
 notification_vikelas_autorace_grand_prix_information_place_notification_desc: "Nuestro [concept_vikelas_racer] no logró obtener uno de los tres primeros lugares, pero llegó sano y salvo y ganó #G 10#! de experiencia. Nuestro [concept_vikelas_mechanic] ganó #G 5#! de experiencia. ¡Ganamos #G 10#! @vikelas_mechanical_innovation! [Concept('concept_vikelas_mechanic','$concept_vikelas_mechanical_innovation$')]." #NT!
  
