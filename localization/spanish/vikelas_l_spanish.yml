 notification_vikelas_autorace_endurance_race_information_place_notification_desc: "Nuestro [concept_vikelas_racer] no pudo ganar, pero llegó sano y salvo y ganó #G 20#! de experiencia. Nuestro [concept_vikelas_mechanic] ganó #G 10#! de experiencia. ¡Ganamos #G 30#! @vikelas_mechanical_innovation! [Concept('concept_vikelas_mechanic','$concept_vikelas_mechanical_innovation$')]." #NT!
  
 vikelas_mechanic_boost_button: "Inversión mecánica" #NT!
 vikelas_mechanic_boost_button_desc: "Podemos realizar inversiones mecánicas adicionales para aumentar el progreso en la construcción de nuestro nuevo coche de carreras. Sin embargo, esto costará [Concept('concept_vikelas_mechanic','$concept_vikelas_mechanical_innovation$')] más." #NT!
 vikelas_mechanic_boost_modifier: "Inversión mecánica" #NT!
 vikelas_mechanic_improvement_cost_modifier: "Costo de mejora de un coche de carreras" #NT!
  
 je_vikelas_mechanic_engine: "Mejorar el motor del coche de carreras" #NT!
 je_vikelas_mechanic_engine_reason: "Nuestro mecánico [ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName] trabaja incansablemente en un nuevo motor que mejorará la fiabilidad y la velocidad del coche. La finalización depende principalmente de las características y la experiencia del mecánico." #NT!
 je_vikelas_mechanic_safety: "Mejorar la seguridad de los coches de carreras" #NT!
 je_vikelas_mechanic_safety_reason: "Nuestro mecánico [ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName] mejora la seguridad del vehículo. La finalización depende principalmente de las características y la experiencia del mecánico." #NT!
 je_vikelas_mechanic_body: "Mejorar la carrocería del coche de carreras" #NT!
 je_vikelas_mechanic_body_reason: "Nuestro mecánico [ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName] construye una nueva carrocería para el coche, haciéndolo más rápido y quizás incluso un poco más seguro. La terminación depende principalmente de las características y la experiencia del mecánico." #NT!
 vikelas_mechanic_progress_bar_at_full_tt: "La barra de mejora del coche de carreras ha llegado a #variable 100%#!" #NT!
  
 je_vikelas_endurance_race: "Carrera de resistencia" #NT!
 je_vikelas_endurance_race_reason: "En varios estados de nuestro país se está celebrando actualmente una carrera de resistencia en la que participan pilotos de todos los países amantes de las carreras. El país anfitrión tiene una ligera ventaja y recibe pruebas adicionales. A diferencia de los Grandes Premios, la fiabilidad es más importante que la velocidad, ya que los coches tienen que durar largas distancias. El riesgo de que se rompa un motor también es mayor que el de un accidente mortal." #NT!
 je_vikelas_endurance_race_success: "[GetPlayer.GetName] ha recopilado al menos #ORANGE 8 Progreso en carreras de resistencia#!." #NT!
 je_vikelas_endurance_race_goal: ""
  
 vikelas.501.t: "El Club del Automóvil [ROOT.GetCountry.GetAdjectiveNoFormatting]" #NT!
 vikelas.501.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] se considera un apasionado de los coches y para celebrar esta ocasión ha fundado un club automovilístico con personas afines. El objetivo es fortalecer la industria automovilística nacional y organizar eventos automovilísticos nacionales." #NT!
 vikelas.501.f: "El Automobile Club de France (ACF), fundado en 1895 como el primer club automovilístico del mundo, organizaba ya a mediados de la década de 1890 una carrera al año que constituía el momento culminante de la temporada. Se trataba de las denominadas carreras «de ciudad a ciudad» en carreteras públicas, en las que los participantes salían individualmente a intervalos. Uno de los detonantes de la fundación del ACF fue el descenso de Albert de Dion de la carrera París-Rouen en 1894. En los años siguientes se produjo un rápido desarrollo, con vehículos cada vez más potentes que aumentaban enormemente los peligros del automovilismo. Por ello, el ACF introdujo por primera vez en 1901 un reglamento que puede considerarse el primer reglamento de automovilismo del mundo. Una innovación fundamental fue la división en categorías que debían aplicarse a todos los eventos patrocinados por el ACF. La limitación de peso resultante debería ayudar en un principio a reducir la inmensa cantidad de defectos de los neumáticos debidos a la sobrecarga." #NT!
 vikelas.501.g: "¡Un deporte lleno de emociones!" #NT!
 vikelas.502.t: "Primera carrera del Gran Premio" #NT!
 vikelas.502.d: "El automovilismo da un giro revolucionario: con los Grandes Premios, se celebrarán carreras internacionales consecutivas en todos los países amantes del automovilismo. De este modo, nació un campeonato internacional. [SCOPE.sCountry('vikelas_gp_founder_scope').GetName] ha invitado a todos los países con un club automovilístico a participar en su primer Gran Premio el año que viene." #NT!
 vikelas.502.f: "Las carreras anuales de la Copa Gordon Bennett fueron el primer intento de organizar un campeonato mundial de automóviles entre 1900 y 1905. En vista del aumento constante de la velocidad, en 1902 la ACF emitió por primera vez un reglamento técnico en forma de la llamada fórmula de carrera, que los automóviles participantes debían respetar. Sin embargo, la frecuencia de accidentes siguió aumentando, por lo que a partir de 1903 solo se podían celebrar carreras en circuitos cerrados. Como sucesora de las carreras Gordon Bennett, la carrera principal organizada por la ACF se celebró por primera vez en 1906 bajo el nombre de Grand Prix. El primer ganador de un Gran Premio de la historia fue el piloto húngaro Ferenc Szisz con un Renault." #NT!
 vikelas.502.g: "¿Entonces hay algo que ganar?" #NT!
 vikelas.503.t: "Asociación Internacional de Automóvil Clubes Reconnus" #NT!
 vikelas.503.d: "La Asociación Internacional del Automóvil fue fundada en [GetGlobalVariable('vikelas_aiacr_seat_global_var').GetStateRegion.GetCityHubName]. Su nombre completo es Association Internationale des Automobile Clubs Reconnus (AIACR)." #NT!
 vikelas.503.f: "Para que los fabricantes de automóviles pudieran participar en todas las carreras internacionales, era necesario que una Asociación Internacional del Automóvil (AIACR) regulara en todos los países las normas técnicas y deportivas que hasta entonces había establecido de forma independiente el Automóvil Club Francés para sus carreras en forma de la respectiva fórmula del Gran Premio. La asociación se fundó el 20 de junio de 1904 en París con el nombre de Association Internationale del Automobile Club Reconnus (AIACR), después de que los clubes automovilísticos de los países de carreras más importantes hubieran tomado la decisión de fundarla unos días antes en el marco de la Copa Gordon Bennett en Bad Homburg. Después de la Segunda Guerra Mundial, la AIACR pasó a llamarse FIA." #NT!
 vikelas.503.g: "¡A partir de ahora las carreras de automóviles son internacionales!" #NT!
 vikelas.504.t: "Nuevo circuito de carreras del Gran Premio" #NT!
 vikelas.504.d: "Otro miembro de la AIACR ha construido un circuito oficial de Grand Prix. En la actualidad hay #G [GetGlobalVariable('vikelas_num_grand_prix_tracks_global_var').GetValue]#! #V circuitos de Grand Prix#! en el calendario anual de carreras." #NT!
 vikelas.504.f: "“Las carreras de autos, las corridas de toros y el montañismo son los únicos deportes reales… todos los demás son juegos”. -Ernest Hemingway" #NT!
 vikelas.504.g: "Reserva los asientos VIP en las gradas." #NT!
 vikelas.505.t: "Ubicación del fabricante de coches de carreras" #NT!
 vikelas.505.d: "Con [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')], [GetPlayer.GetName] tiene su primer equipo de carreras de serie. La fábrica de coches de [SCOPE.sState('vikelas_team_state').GetName] disfruta ahora de una gran demanda gracias a la marca consolidada." #NT!
 vikelas.505.f: "Con el lento desarrollo de los pilotos individuales masculinos a los equipos de carreras profesionales con pilotos de fábrica, el automovilismo cambió para siempre. Los aficionados con coches construidos por ellos mismos se convirtieron en una rareza. Aunque todavía ocurría que aristócratas excéntricos con licencias de otros fabricantes de automóviles buscaban emociones fuertes, el desarrollo de automóviles se convirtió en el verdadero centro del automovilismo." #NT!
 vikelas.505.g: "¡Ahora podemos diseñar nuestros propios coches de carreras!" #NT!
 vikelas.506.t: "Mecánico de coches de carreras" #NT!
 vikelas.506.d: "El ingeniero jefe Dr. [SCOPE.sCharacter('gaudi_engineer_scope').GetLastName] ha seleccionado a un excelente asistente del equipo [SCOPE.sCharacter('gaudi_engineer_scope').GetHerHis] que podría actuar como mecánico para el equipo de carreras recién fundado: [SCOPE.sCharacter('vikelas_new_mechanic_scope').GetFullName]. [SCOPE.sCharacter('vikelas_new_mechanic_scope').GetHerHis] la especialización es en el campo de..." #NT!
 vikelas.506.f: "Los mecánicos pueden realizar mejoras en las tres áreas de un automóvil: motor, seguridad y carrocería. La especialización permite realizar la modernización en un área específica el doble de rápido. Básicamente, aunque no siempre, es cierto que los motores aumentan la fiabilidad (y la velocidad), las extensiones de seguridad aumentan la seguridad y las carrocerías aumentan la velocidad (y la seguridad)." #NT!
 vikelas.506.h: "Motor." #NT!
 vikelas.506.i: "Seguridad." #NT!
 vikelas.506.j: "Cuerpo." #NT!
  
 vikelas.511.t: "La gran carrera [SCOPE.sState('vikelas_city_race_start_state').GetCityHubName]-[SCOPE.sState('vikelas_city_race_goal_state').GetCityHubName]" #NT!
 vikelas.511.d: "El [ROOT.GetCountry.GetCapital.GetCityHubName] [SCOPE.GetRootScope.GetCountry.GetCustom('generic_newspaper_type')] ha anunciado una gran carrera de coches en su edición semanal actual. La carrera entre ciudades está prevista para el [SCOPE.sState('vikelas_city_race_start_state').GetCityHubName] y el [SCOPE.sState('vikelas_city_race_goal_state').GetCityHubName]. También se espera la participación de numerosos pilotos extranjeros." #NT!
 vikelas.511.f: "En los primeros tiempos del automovilismo, los denominados gentleman drivers participaban en carreras de ciudad a ciudad con coches fabricados por ellos mismos y acompañados de su mecánico, que a menudo también hacía las veces de chófer. Este formato de competición solía ser publicitado, organizado y apoyado por periódicos y clubes automovilísticos. Como los mecánicos eran todavía unos novatos, lo más importante era llegar al destino. Accidentes mortales como el de Marcel Renault en la carrera París-Madrid hicieron que esta forma de organización fuera sólo una fase de transición en la historia de las carreras." #NT!
 vikelas.511.g: "Prepárese para el evento en tres meses." #NT!
 vikelas.512.t: "Participación en la carrera" #NT!
 vikelas.512.d: "La próxima carrera [SCOPE.sState('vikelas_city_race_start_state').GetCityHubName]-[SCOPE.sState('vikelas_city_race_goal_state').GetCityHubName] en [SCOPE.sCountry('vikelas_race_country').GetName] ha generado especulaciones sobre si el corredor más importante de nuestro país, [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName], también participará." #NT!
 vikelas.512.g: "¡Una excelente oportunidad!" #NT!
 vikelas.512.h: "Esto es demasiado peligroso." #NT!
 vikelas.512.tt: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] se preparará para la carrera en tres meses." #NT!
 vikelas.513.t: "Viaje gratis" #NT!
 vikelas.513.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName] tiene suerte: [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe] puede acelerar a fondo en carretera abierta. El motor se para, las curvas son suaves. Los mejores requisitos para un piloto de carreras." #NT!
 vikelas.513.f: "“Cuando la velocidad está en la sangre, hay que conducir para vivir”. -Rudolf Carraciola" #NT!
 vikelas.513.g: "¡Fantástico!" #NT!
 vikelas.514.t: "Naturaleza hermosa e intacta" #NT!
 vikelas.514.d: "Mientras [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe] conduce de ciudad en ciudad, [ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName] se da cuenta de la naturaleza intacta de la zona por la que pasa [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe]. ¿Tal vez [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe] debería llevarse un recuerdo?" #NT!
 vikelas.514.f: "En los inicios del automovilismo, la conducción por paisajes lo más salvajes e intactos posibles, que planteaban desafíos al piloto, era un atractivo especial. Por ello, los primeros circuitos también fueron criticados porque supuestamente exigían menos habilidad al volante y menos requisitos de adaptación. Por supuesto, algunos valles remotos, playas y zonas montañosas podían deparar sorpresas." #NT!
 vikelas.514.g: "¡Tenemos una carrera que ganar!" #NT!
 vikelas.514.h: "Recoge algunas plantas." #NT!
 vikelas.514.i: "Recoge algunas piedras." #NT!
 vikelas.515.t: "Azúcar en el tanque" #NT!
 vikelas.515.d: "Durante una breve parada, [ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName] se da cuenta de que el coche del competidor [ROOT.Var('vikelas_racer_var').GetCharacter.GetHerHis], [SCOPE.sCharacter('vikelas_racer_2_scope').GetLastName], también está cerca. Aparentemente, el coche pasa completamente desapercibido." #NT!
 vikelas.515.f: ""Si no haces trampa, no lo intentas"." #NT!
 vikelas.515.g: "Una dulce venganza." #NT!
 vikelas.516.t: "¿Un poco de ayuda para un amigo?" #NT!
 vikelas.516.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName] está en una buena posición en este momento, pero ve el auto humeante de [SCOPE.sCharacter('vikelas_racer_2_scope').GetLastName] al costado de la carretera. ¿Quizás [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe] debería verificar que todo esté bien?" #NT!
 vikelas.516.f: "En los primeros tiempos de las carreras, las lesiones y los accidentes de tráfico eran algo habitual. Sin embargo, aunque en épocas posteriores había comisarios disponibles en las rutas cerradas, una avería podía ser peligrosa en carreras de larga distancia sin un observador. En los años 30 todavía se veían lobos en la Mille Miglia de los Apeninos. Por eso, la ayuda entre compañeros de carrera suele ser algo natural." #NT!
 vikelas.516.g: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName] debería detenerse y ayudar." #NT!
 vikelas.516.h: "¡Jaja! ¡Qué tontos!" #NT!
 vikelas.517.t: "Problemas con el motor" #NT!
 vikelas.517.d: "Algo no funciona en el motor, algo que ni siquiera [ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName] puede explicar. Hasta ahora, el diagnóstico no ha dado resultado. [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe|U] podría tener que continuar la carrera a velocidad reducida." #NT!
 vikelas.517.f: "Los problemas de motor ocurren en todos los deportes de motor, tanto en la época como en la actualidad. Numerosos pilotos tuvieron que retirarse de una carrera antes de tiempo porque iban en cabeza. Tal y como están las cosas, [ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName] aún podría terminar la carrera, pero solo si reduce la velocidad, lo que haría mucho más difícil ganar." #NT!
 vikelas.517.g: "Utilice todas las medidas de ajuste fino mecánico disponibles." #NT!
 vikelas.517.h: "El coche tiene que sobrevivir a la carrera así." #NT!
 vikelas.518.t: "Clavos" #NT!
 vikelas.518.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName] pudo sacar cierta ventaja al resto del grupo. ¿Quizás [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe] podría mejorar sus posibilidades de ganar y complicarle la vida al resto del grupo?" #NT!
 vikelas.518.f: ""Sé que él hacía trampa porque yo hacía trampa y él me ganó"." #NT!
 vikelas.518.g: "Coge los clavos, Patán." #NT!
 vikelas.518.h: "Nos abstenemos de tales prácticas antideportivas." #NT!
 vikelas.519.t: "Descalificación" #NT!
 vikelas.519.d: "Lamentablemente, la mala conducta deportiva de [ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName] salió a la luz, por lo que la comisión de carreras excluyó inmediatamente a [ROOT.Var('vikelas_racer_var').GetCharacter.GetHerHim] de las carreras futuras." #NT!
 vikelas.519.f: "'De acuerdo con el reglamento de la carrera de ciudad a ciudad, de conformidad con el apartado 12, párrafo 6, línea 9, el participante ha infringido las reglas generales y, por lo tanto, será excluido anticipadamente. No es posible apelar.'" #NT!
 vikelas.519.g: "¿Descalificado? ¡Eso es injusto!" #NT!
  
 vikelas.520.f: "#V Resultados finales#!\n\nFirster puesto: [SCOPE.sCharacter('vikelas_racer_1_scope').GetFullName] de [SCOPE.sCountry('vikelas_first_winner_scope').GetName]\nSegundo puesto: [SCOPE.sCharacter('vikelas_racer_2_scope').GetFullName] de [SCOPE.sCountry('vikelas_second_winner_scope').GetName]\nTercer puesto: [SCOPE.sCharacter('vikelas_racer_3_scope').GetFullName] de [SCOPE.sCountry('vikelas_third_winner_scope').GetName]" #NT!
 vikelas.520.g: "¡Champán!" #NT!
 vikelas.521.t: "Victoria para [ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName]" #NT!
 vikelas.521.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] obtuvo el primer lugar en la carrera de ciudad a ciudad en [SCOPE.sCountry('vikelas_race_country').GetName]. [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe] condujo un [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')] [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]." #NT!
 vikelas.521.g: "¡Champán!" #NT!
 vikelas.522.t: "2do Lugar para [ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName]" #NT!
 vikelas.522.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] obtuvo el segundo lugar en la carrera de ciudad a ciudad en [SCOPE.sCountry('vikelas_race_country').GetName]. [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe] condujo un [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')] [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]." #NT!
 vikelas.522.g: "¡Hasta la próxima!" #NT!
 vikelas.523.t: "3er puesto para [ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName]" #NT!
 vikelas.523.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] obtuvo el tercer lugar en la carrera de ciudad a ciudad en [SCOPE.sCountry('vikelas_race_country').GetName]. [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe] condujo un [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')] [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]." #NT!
 vikelas.524.t: "Finaliza la carrera de ciudad a ciudad" #NT!
 vikelas.524.d: "La gran carrera de ciudad a ciudad en [SCOPE.sCountry('vikelas_race_country').GetName] ha terminado y se han elegido los ganadores. [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] condujo un [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')] [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]. Aunque no conseguimos un buen posicionamiento, al menos el coche y el conductor llegaron sanos y salvos." #NT!
  
 vikelas.531.t: "Carrera de resistencia" #NT!
 vikelas.531.d: "[GetPlayer.GetName] ha organizado una gran carrera de resistencia e invitó a corredores de todo el mundo a participar." #NT!
 vikelas.531.f: "Las primeras carreras de coches de principios del siglo XX eran carreras de larga distancia con el mayor alcance posible, en las que se debía poner a prueba la velocidad y la fiabilidad de los bólidos. Si bien Francia dominó las carreras en los primeros tiempos, pronto pasó a las carreras de Gran Premio. Eso no impidió que siguieran existiendo importantes carreras de resistencia internacionales. La carrera más tradicional era la Targa Florio en Sicilia. De 1906 a 1977 se celebraba principalmente en mayo como un importante evento internacional, algunas veces con categoría de Copa del Mundo. Después de la Targa Florio, la Mille Miglia se consideró un clásico entre las carreras en carretera (la Carrera Panamericana se añadió en los años 50) y la base del término "Gran Turismo" (GT), que describe a los rápidos coches deportivos de turismo para carreras de larga distancia, como los desarrollados por Ferrari específicamente para la MM." #NT!
 vikelas.531.g: "¡Nos vemos en la meta!" #NT!
 vikelas.533.t: "Daños en los neumáticos" #NT!
 vikelas.533.d: "A mitad de carrera, un neumático reventado obliga a [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] a detenerse de forma repentina. A pesar del incidente, el piloto salió ileso y se mostró satisfecho con su actuación, pero perdió un tiempo importante." #NT!
 vikelas.533.f: "La Mille Miglia de 1931 se caracterizó por un desgaste masivo de los neumáticos. Antes de llegar a Roma, Arcangeli tuvo que cambiar un neumático nueve veces. Nuvolari también sufrió varios pinchazos, pero aun así aventajó a Caracciola por dos minutos en Roma. En el viaje de vuelta al Adriático, los Alfa Romeo mantuvieron su ritmo enérgico a pesar de los problemas con los neumáticos. Entretanto, Borzacchini lideraba la competencia con 18 minutos de ventaja. A lo largo de la costa mediterránea hacia el norte, Campari aventajaba en cuatro minutos al resurgente Arcangeli. El liderato cambió varias veces dentro de los Alfa Romeo y los italianos parecían tenerlo todo bajo control después de dos tercios de la distancia de la carrera. Esto se debió también a una densa red de estaciones de servicio, que hizo posible muchos cambios de neumáticos. La decisión se tomó en los últimos 80 kilómetros, cuando comenzó a llover intensamente y los Alfa Romeo tuvieron accidentes con los neumáticos nuevamente desgastados." #NT!
 vikelas.533.g: "Mala suerte." #NT!
 vikelas.534.t: "El cruce ferroviario" #NT!
 vikelas.534.d: "Mientras persigue a otro conductor, de repente se oye un sonido de advertencia: una barrera de ferrocarril se baja delante de ambos coches. El coche que va delante pasa a toda velocidad. [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] debe decidir si se detiene o se arriesga a cruzar antes de que el oponente gane demasiado espacio." #NT!
 vikelas.534.f: "Los conductores de la Mille Miglia eran propensos a maniobras atrevidas, como Hans Hermann, que compitió en 1954, quien condujo su coche bajo una barrera ferroviaria que se estaba cerrando, por lo que él y su pasajero tuvieron que agachar la cabeza." #NT!
 vikelas.534.g: "¡Arriésgate!" #NT!
 vikelas.534.h: "¡Esto es demasiado temerario!" #NT!
 vikelas.538.t: "Lobos y revólveres" #NT!
 vikelas.538.d: "En un viaje nocturno por las montañas, el equipo de carreras se sale de la pista. De repente, se oye un aullido. Una manada de lobos parece rondar por los alrededores." #NT!
 vikelas.538.f: ""Nos encontramos en medio de una tormenta de nieve y nos perseguían los lobos. Sin embargo, los disparos del revólver que siempre tenía bajo el cojín del asiento y la llegada de un grupo de cuadrilleros armados con antorchas y pistolas los pusieron en fuga". -Enzo Ferrari" #NT!
 vikelas.538.g: "Matar a los lobos." #NT!
 vikelas.538.h: "Conduzca por la zona ampliamente." #NT!
 vikelas.538.i: "Este descubrimiento es mucho más importante que una carrera estúpida." #NT!
 vikelas.539.t: "¡Un coche de carreras se estrella contra los espectadores!" #NT!
 vikelas.539.d: "Un accidente terrible ocurrió cuando un coche de carreras se salió de la pista durante la carrera y se estrelló contra la multitud. El mundo del automovilismo está conmocionado y el debate sobre las normas de seguridad vuelve a encenderse." #NT!
 vikelas.539.f: "Desde la primera Mille Miglia de 1927, a pesar de la gran cantidad de espectadores que se agolpaban en los arcenes, la situación cambió el 3 de abril de 1938 a las 16:30 horas. En ese momento, los dos conductores genoveses Angelo Mignanego y su copiloto, el Dr. Luigi Bruzzo, conducían su Lancia Aprilia por el Viale Berti Pichat en Bolonia. A una velocidad de poco menos de 100 km/h, el inexperto Mignanego perdió el control del vehículo en las vías del tranvía que estaban allí tendidas. El Lancia se estrelló primero contra un árbol y luego contra un gran grupo de espectadores. Mientras que los dos ocupantes del vehículo resultaron casi ilesos, diez personas, entre ellas siete niños, murieron en el accidente. 26 espectadores resultaron heridos, algunos de ellos de gravedad. Una niña de 12 años murió en otro accidente en Stanghella." #NT!
 vikelas.539.g: "Un día negro para las carreras." #NT!
 vikelas.540.t: "Nuevo récord de velocidad media" #NT!
 vikelas.540.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] ha alcanzado una velocidad media sin precedentes en las carreras de resistencia. El récord pasará a la historia del automovilismo." #NT!
 vikelas.540.f: "Con una precisión impresionante y un dominio técnico impresionante, [GetPlayer.GetCustom('vikelas_race_team_name_type')] alcanzó una velocidad media que antes se creía imposible. El récord se considerará durante mucho tiempo el punto culminante de esta era dorada del automovilismo." #NT!
 vikelas.545.t: "¡Reunión de fans!" #NT!
 vikelas.545.d: "Durante la carrera de resistencia entre dos ciudades, una multitud entusiasta se reunió para celebrar el paso del [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] por su ciudad. Este acontecimiento marca el ascenso del automovilismo como sensación pública." #NT!
 vikelas.545.f: "Las calles estaban llenas de gente que se agolpaba para ver pasar el coche a toda velocidad. Los niños ondeaban banderas y los adultos gritaban el nombre del piloto cuyas habilidades y coraje los inspiraban. Cuando el coche se detuvo, una oleada de emoción lo invadió. Flores, aplausos y vítores acompañaron la breve parada antes de que el conductor se pusiera en marcha de nuevo. Fue un momento que encendió la pasión por la velocidad y la tecnología en los corazones de la gente, un anticipo de lo que significaría el automovilismo en las décadas venideras." #NT!
 vikelas.545.g: "Las carreras se vuelven populares." #NT!
  
 vikelas.541.t: "La carrera de resistencia termina" #NT!
 vikelas.541.d: "[SCOPE.sCharacter('vikelas_racer_1_scope').GetFullName] de [SCOPE.sCountry('vikelas_first_winner_scope').GetName] ganó la prestigiosa carrera de resistencia y también los corazones de los espectadores." #NT!
 vikelas.541.f: "Los últimos kilómetros fueron un auténtico espectáculo: el polvo se arremolinaba en la pista, los motores rugían y la emoción era palpable. Cuando el ganador cruzó por fin la línea de meta, estallaron los aplausos. Su coche, cubierto con las huellas de una carrera encarnizada, se convirtió en un símbolo de su voluntad de ganar. Los aficionados lo llevaron en hombros mientras la multitud celebraba el momento. Con este triunfo, [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] se convierte en una de las personalidades más importantes del deporte del motor y su equipo de carreras [GetPlayer.GetCustom('vikelas_race_team_name_type')] se convierte en una marca muy respetada." #NT!
 vikelas.542.d: "[SCOPE.sCountry('vikelas_endurance_race_country_scope').GetName]" #NT!
  
 vikelas.551.t: "Gran Premio de [GetPlayer.GetName]" #NT!
 vikelas.551.d: "La temporada de carreras ha llegado a [GetPlayer.GetNameNoFormatting]. Numerosos pilotos y sus equipos ya han llegado para prepararse para el Gran Premio que pronto acogerá nuestro país." #NT!
 vikelas.551.f: "“Correr es vivir. El resto es simplemente esperar”. -Rudolf Carraciola" #NT!
 vikelas.551.g: "Que gane el más rápido." #NT!
  
 vikelas.552.t: "Vuelta más rápida" #NT!
 vikelas.552.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] logró la vuelta más rápida en el entrenamiento de carrera. Estas son excelentes perspectivas para la carrera real." #NT!
 vikelas.552.f: "«Ya antes de empezar estaba seguro de ganar.» -Ettore Bugatti" #NT!
 vikelas.553.t: "Marea negra" #NT!
 vikelas.553.d: "Durante la carrera del Gran Premio, [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] se metió en la mancha de aceite de un vehículo accidentado y se salió de la carretera. El conductor y el coche pueden seguir conduciendo, pero han perdido mucho tiempo en la carrera actual." #NT!
 vikelas.553.f: "«Hago coches para que anden, no para que se detengan». -Ettore Bugatti" #NT!
 vikelas.553.g: "¡Oh, no!" #NT!
 vikelas.554.t: "Lluvia" #NT!
 vikelas.554.d: "La carrera del Gran Premio se vio sorprendida por un frente de lluvia repentino. Algunos pilotos se detuvieron para cambiar su equipo. La pregunta para [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] es si [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe] debería completar la carrera de manera imprudente o reducir la velocidad para estar seguro." #NT!
 vikelas.554.f: ""No temas a nada. Sólo cree." -Armand Peugeot" #NT!
 vikelas.554.g: "¡Eso no hace que un conductor se salga de la pista!" #NT!
 vikelas.554.h: "Disminuya el ritmo." #NT!
 vikelas.555.t: "Maniobra de adelantamiento" #NT!
 vikelas.555.d: "Surge una oportunidad única cuando [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] se acerca a [SCOPE.sCharacter('vikelas_racer_2_scope').GetLastName], un corredor de [SCOPE.sCountry('vikelas_race_country_scope').GetName]. ¿Debería [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe] intentar una maniobra de adelantamiento?" #NT!
 vikelas.555.f: "«El coche de carreras perfecto es el que cruza la línea de meta y luego se desmorona en sus distintas partes». -Ferdinand Porsche" #NT!
 vikelas.555.g: "¡Fuerza!" #NT!
 vikelas.555.h: "Esto es demasiado arriesgado." #NT!
 vikelas.556.t: "La maniobra de adelantamiento tiene éxito" #NT!
 vikelas.556.d: "La maniobra de adelantamiento fue todo un éxito. [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] va por delante y tiene ventaja de velocidad." #NT!
 vikelas.556.f: "«Cuando veo pasar un Alfa Romeo, me quito el sombrero.» -Henry Ford" #NT!
 vikelas.556.g: "¡Hurra!" #NT!
 vikelas.557.t: "La maniobra de adelantamiento falla" #NT!
 vikelas.557.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] no logró adelantar al rival, su adversario se defendió con éxito y nuestro piloto perdió mucho tiempo." #NT!
 vikelas.557.f: ""Es mala suerte, pero todo está en juego. Hice lo mejor que pude y, como perdí, estoy con el hombre que eligió el premio". -Ralph DePalma" #NT!
 vikelas.557.g: "Qué vergüenza." #NT!
 vikelas.558.t: "La multitud local motiva al corredor" #NT!
 vikelas.558.d: "En el Gran Premio de [GetPlayer.GetNameNoFormatting], [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] es considerado un héroe local y recibe un apoyo especialmente fuerte del público, lo que motiva enormemente al piloto de carreras." #NT!
 vikelas.558.f: "“Nadie recuerda quién quedó en segundo lugar y ese nunca seré yo” -Enzo Ferrari" #NT!
 vikelas.558.g: "¡Excelente!" #NT!
  
 vikelas.559.t: "Campeonato de carreras de autos" #NT!
 vikelas.559.d: "[SCOPE.sCountry('vikelas_first_winner_scope').GetNameNoFlag] dominó esta temporada de carreras y ganó el campeonato de autos." #NT!
 vikelas.559.f: "#V Resultados finales#!\n\nFirster puesto: [SCOPE.sCountry('vikelas_first_winner_scope').GetName], [SCOPE.GetValue('vikelas_first_winner_points_scope')] Puntos, [SCOPE.GetValue('vikelas_first_winner_victories_scope')] Victorias\nSegundo puesto: [SCOPE.sCountry('vikelas_second_winner_scope').GetName], [SCOPE.GetValue('vikelas_second_winner_points_scope')] Puntos, [SCOPE.GetValue('vikelas_second_winner_victories_scope')] Victorias\nTercer puesto: [SCOPE.sCountry('vikelas_third_winner_scope').GetName], [SCOPE.GetValue('vikelas_third_winner_points_scope')] Puntos, #!\n\nFirst0 Victorias\nCuarto puesto: #!\n\nFirst1, #!\n\nFirst2 Puntos, #!\n\nFirst3 Victorias\nQuinto puesto: #!\n\nFirst4, #!\n\nFirst5 Puntos, #!\n\nFirst6 Victorias" #NT!
 vikelas.559.g: "Ahora toca Bizet." #NT!
 vikelas.559.h: "No me interesan las estadísticas." #NT!
 vikelas.559.tt: "Las estadísticas del Campeonato Anual de Automovilismo ya no se muestran." #NT!
  
 vikelas.561.t: "Finaliza el Gran Premio de [GetPlayer.GetName]" #NT!
 vikelas.561.d: "La carrera del Gran Premio ha terminado y se han elegido los ganadores. El ganador del Gran Premio [GetPlayer.GetName] es [SCOPE.sCharacter('vikelas_racer_1_scope').GetFullName]. La carrera será recordada por la población durante mucho tiempo." #NT!
 vikelas.561.f: "#V Resultados finales#!\n\nFirster puesto: [SCOPE.sCharacter('vikelas_racer_1_scope').GetFullName] de [SCOPE.sCountry('vikelas_first_winner_scope').GetName]\nSegundo puesto: [SCOPE.sCharacter('vikelas_racer_2_scope').GetFullName] de [SCOPE.sCountry('vikelas_second_winner_scope').GetName]\nTercer puesto: [SCOPE.sCharacter('vikelas_racer_3_scope').GetFullName] de [SCOPE.sCountry('vikelas_third_winner_scope').GetName]" #NT!
 vikelas.561.g: "¡Champán!" #NT!
  
 vikelas.571.t: "Las primeras 24 horas de Le Mans" #NT!
 vikelas.571.d: "En 1923 se celebraron las primeras 24 Horas de Le Mans, convirtiéndose rápidamente en uno de los eventos más prestigiosos del automovilismo, atrayendo a pilotos y fabricantes de todo el mundo." #NT!
 vikelas.571.f: "El 26 y 27 de mayo de 1923 se celebraron las primeras 24 Horas de Le Mans, organizadas por el Automobile Club de l'Ouest. El trazado de 17,3 kilómetros de la región de Sarthe acogió a 33 vehículos. Las condiciones eran difíciles: lluvia, caminos embarrados y un recorrido que discurría por la ciudad de Le Mans y las carreteras comarcales de los alrededores. La victoria fue para André Lagache y René Léonard, al volante de un Chenard & Walcker Sport, que recorrió una distancia de 2.209 kilómetros en 24 horas. Esta carrera marcó el inicio de una tradición que sigue celebrando la innovación y la resistencia en el automovilismo." #NT!
 vikelas.571.g: "¿24 horas? ¡Esto es una locura!" #NT!
 vikelas.572.t: "El nacimiento de la Targa Florio" #NT!
 vikelas.572.d: "En 1906 nació la Targa Florio, una espectacular carrera que se disputaba en las sinuosas carreteras de Sicilia. Organizada por Vincenzo Florio, convirtió a la región en el centro del mundo del automovilismo." #NT!
 vikelas.572.f: "El 6 de mayo de 1906 se celebró la primera Targa Florio, una carrera de larga distancia que convertía las escarpadas carreteras de montaña y los pintorescos pueblos de Sicilia en un desafiante circuito. Organizada por Vincenzo Florio, un apasionado de los deportes de motor, la prueba cumplía su visión de un desafío deportivo. La pista tenía una longitud de 446 kilómetros, divididos en tres vueltas de 148 kilómetros cada una. La victoria fue para Alessandro Cagno, al volante de un Itala, que cruzó la línea de meta con una velocidad media de 46,8 km/h. La Targa Florio se convirtió rápidamente en un símbolo de valentía, habilidad y pasión por la velocidad." #NT!
 vikelas.572.g: "La Targa Florio establece una tradición" #NT!
 vikelas.573.t: "El primer Semmering Berg-Rennen" #NT!
 vikelas.573.d: "En 1899 se celebró la primera carrera de montaña en Semmering, que puso a prueba los límites de la ingeniería automovilística y la habilidad al volante. Este acontecimiento marcó un hito importante en la historia del automovilismo." #NT!
 vikelas.573.f: "El 27 de agosto de 1899 se celebró la primera carrera de montaña de Semmering, organizada por el Automóvil Club de Austria. El recorrido de 9,8 kilómetros, que discurría desde Klamm am Semmering hasta el puerto de montaña, puso a prueba a los primeros automóviles y a sus conductores. Con pendientes de hasta un 7% y curvas cerradas, la carrera fue una prueba tanto de tecnología como de coraje. La victoria fue para el conde Jenő Zichy, al volante de un automóvil Mors, que completó el recorrido a una velocidad media de 22,2 km/h. La carrera atrajo a un gran público y sentó las bases de la tradición de la escalada en montaña en Europa." #NT!
 vikelas.573.g: "La subida a la colina fascina a las masas." #NT!
  
 vikelas.581.t: "Nuevo motor de coche de carreras" #NT!
 vikelas.581.d_level_2: "[ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName] Se mejoró el motor. El último modelo de coche de carreras ahora utiliza un #V motor de seis cilindros#!. El nuevo coche ahora lleva el nombre [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')] [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]." #NT!
 vikelas.581.d_level_3: "[ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName] Se mejoró el motor. El último modelo de coche de carreras ahora utiliza un motor de compresor de cuatro cilindros #V #!. El nuevo coche ahora lleva el nombre [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')] [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]." #NT!
 vikelas.581.d_level_4: "[ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName] Se mejoró el motor. El último modelo de coche de carreras ahora utiliza un motor de compresor de ocho cilindros #V #!. El nuevo coche ahora lleva el nombre [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')] [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]." #NT!
 vikelas.581.f: "«Construyo motores y les coloco ruedas» -Enzo Ferrari" #NT!
 vikelas.581.g: "¡Fuerza!" #NT!
 vikelas_new_engine_tt: "Se actualizará el motor actual." #NT!
 vikelas.582.t: "Nuevas instalaciones de seguridad para coches de carreras" #NT!
 vikelas.582.d_level_2: "[ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName] Se han mejorado las instalaciones de seguridad. El último accesorio de seguridad para coches de carreras es un #V espejo retrovisor#!. El nuevo coche lleva ahora el nombre [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')] [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]." #NT!
 vikelas.582.d_level_3: "[ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName] Se han mejorado las instalaciones de seguridad. El último accesorio de seguridad para coches de carreras son los #V frenos hidráulicos#!. El nuevo coche lleva ahora el nombre [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')] [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]." #NT!
