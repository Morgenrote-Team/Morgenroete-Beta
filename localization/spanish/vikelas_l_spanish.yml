 vikelas_autoracing_found_automobile_club_button: "Club del Automóvil Fundado"
 vikelas_autoracing_found_automobile_club_button_desc: "La creación de un club automovilístico es el primer paso para construir otras instalaciones que son esenciales para los deportes de motor."
 vikelas_autoracing_long_distance_button: "Organiza una carrera de resistencia"
 vikelas_autoracing_long_distance_button_desc: "Las carreras de resistencia, a menudo entre ciudades, eran la norma en los primeros tiempos del automovilismo y continuaron hasta mediados del siglo XX. En Italia, las carreras como la Targa Florio o la Mille Miglia son los ejemplos más conocidos. Ponían a prueba a los hombres y a las máquinas y durante mucho tiempo se consideraron las verdaderas carreras automovilísticas nacionales."
 vikelas_autoracing_found_grand_prix_button: "Fundado Grand Prix Racing"
 vikelas_autoracing_found_grand_prix_button_desc: "En 1906 se organizó el primer Gran Premio oficial de la historia del automóvil, con la carrera del Grand Prix de l'ACF. Independientemente del país de origen, se aprobaron hasta tres coches de carreras por fabricante de automóviles, tal como solicitaron inicialmente los representantes de la industria francesa. Para cumplir con su condición de competición más importante de todas, la carrera se celebró sobre una distancia de más de 1200 km y en dos días consecutivos. En 1925, por iniciativa del Automobile Club de Italia, finalmente se anunció la creación de un campeonato mundial oficial. Las tres carreras oficiales del Grand Prix de la temporada (Francia, Italia y Bélgica) fueron designadas como carreras, así como Indianápolis como el evento automovilístico estadounidense más importante."
 vikelas_autoracing_race_track_button: "Construir una pista de carreras"
 vikelas_autoracing_race_track_button_desc: "Con las carreras del Gran Premio, las pistas fijas se están convirtiendo cada vez más en la norma para las carreras de coches. Una pista de carreras dedicada no solo centralizaría los eventos de carreras internacionales en un solo lugar, sino que, como pista de pruebas, también les daría a nuestros pilotos de carreras una ventaja de experiencia cada año."
