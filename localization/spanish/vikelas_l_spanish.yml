 vikelas.584.t: "El motor V"
 vikelas.584.d: "Nuestro ingeniero, el Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName], hizo una propuesta innovadora sobre cómo podría ser un nuevo motor para carreras y se puso en contacto con el mecánico [ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName]."
 vikelas.584.f: "Un motor en V es un tipo de motor de pistón alternativo con varios cilindros. Estos se dividen en dos bancos de cilindros que están en ángulo entre sí. Los motores en V son muy utilizados, especialmente con un mayor número de cilindros y un espacio de instalación limitado. El diseño compacto ahorra material y, por lo tanto, peso. El primer motor en V, un V-twin de dos cilindros, fue diseñado por Wilhelm Maybach y se utilizó en el automóvil Daimler Stahlradwagen de 1889. El primer motor V8 se fabricó en 1903, en forma del motor Antoinette diseñado por Léon Levavasseur para barcos de carreras y aviones."
 vikelas.584.g: "¡Hola!"
 vikelas.585.t: "Combustible mejorado"
 vikelas.585.d: "Nuestro químico, el Dr. [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName], ha desarrollado aún más el combustible para motores de combustión interna de tal manera que podría desempeñar un papel decisivo en el aumento de la eficiencia y el rendimiento de los coches de carreras. [ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName] ha expresado un gran interés en las pruebas."
 vikelas.585.f: "Las primeras décadas de la gasolina fueron extremadamente cambiantes. Muchas empresas tendían a estirar el combustible o mezclarlo con otros combustibles puros. Nikolaus August Otto ya utilizaba alcohol rectificado. En algunos países, la escasez de petróleo llevó al desarrollo de alternativas, o a hacer más eficiente la cantidad de combustible disponible. En las carreras, se utilizaron combustibles y aceites lubricantes mejorados para garantizar que el rendimiento de la conducción fuera óptimo."
 vikelas.585.g: "¡Hola!"
 vikelas.586.t: "Fuerzas aerodinámicas"
 vikelas.586.d: "Nuestro físico Dr. [ROOT.Var('curie_physicistvar').GetCharacter.GetLastName] ha descrito algunos cálculos sobre fuerzas aerodinámicas que podrían ser útiles para la construcción de vehículos. El mecánico de automóviles [ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName] recibió una copia del artículo."
 vikelas.586.f: "«La aerodinámica es para gente que no sabe construir motores». -Enzo Ferrari"
 vikelas.586.g: "¡Hola!"
