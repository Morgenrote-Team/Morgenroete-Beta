 vikelas.583.f: "“Las carreras de autos comenzaron cinco minutos después de que se construyera el segundo auto”. -Henry Ford" #NT!
 vikelas_new_body_tt: "El cuerpo actual será modernizado." #NT!
  
 vikelas.584.t: "El motor V" #NT!
 vikelas.584.d: "Nuestro ingeniero, el Dr. [ROOT.Var('gaudi_engineer_var').GetCharacter.GetLastName], hizo una propuesta innovadora sobre cómo podría ser un nuevo motor para carreras y se puso en contacto con el mecánico [ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName]." #NT!
 vikelas.584.f: "Un motor en V es un tipo de motor de pistón alternativo con varios cilindros. Estos se dividen en dos bancos de cilindros que están en ángulo entre sí. Los motores en V son muy utilizados, especialmente con un mayor número de cilindros y un espacio de instalación limitado. El diseño compacto ahorra material y, por lo tanto, peso. El primer motor en V, un V-twin de dos cilindros, fue diseñado por Wilhelm Maybach y se utilizó en el automóvil Daimler Stahlradwagen de 1889. El primer motor V8 se fabricó en 1903, en forma del motor Antoinette diseñado por Léon Levavasseur para barcos de carreras y aviones." #NT!
 vikelas.584.g: "¡Hola!" #NT!
 vikelas.585.t: "Combustible mejorado" #NT!
 vikelas.585.d: "Nuestro químico, el Dr. [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName], ha desarrollado aún más el combustible para motores de combustión interna de tal manera que podría desempeñar un papel decisivo en el aumento de la eficiencia y el rendimiento de los coches de carreras. [ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName] ha expresado un gran interés en las pruebas." #NT!
 vikelas.585.f: "Las primeras décadas de la gasolina fueron extremadamente cambiantes. Muchas empresas tendían a estirar el combustible o mezclarlo con otros combustibles puros. Nikolaus August Otto ya utilizaba alcohol rectificado. En algunos países, la escasez de petróleo llevó al desarrollo de alternativas, o a hacer más eficiente la cantidad de combustible disponible. En las carreras, se utilizaron combustibles y aceites lubricantes mejorados para garantizar que el rendimiento de la conducción fuera óptimo." #NT!
 vikelas.585.g: "¡Hola!" #NT!
 vikelas.586.t: "Fuerzas aerodinámicas" #NT!
 vikelas.586.d: "Nuestro físico Dr. [ROOT.Var('curie_physicistvar').GetCharacter.GetLastName] ha descrito algunos cálculos sobre fuerzas aerodinámicas que podrían ser útiles para la construcción de vehículos. El mecánico de automóviles [ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName] recibió una copia del artículo." #NT!
 vikelas.586.f: "«La aerodinámica es para gente que no sabe construir motores». -Enzo Ferrari" #NT!
 vikelas.586.g: "¡Hola!" #NT!
  
 vikelas.590.t: "¡[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] ahora es un corredor famoso!" #NT!
 vikelas.590.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] ganó carreras alrededor del mundo y es famoso por su estilo de carrera. ¡[ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe] ahora es lo suficientemente famoso como para ser considerado un corredor famoso!" #NT!
 vikelas.590.f: ""
 vikelas.590.g: "¡Una leyenda viviente!" #NT!
 vikelas.591.t: "Nuestro corredor de autos, [SCOPE.sCharacter('vikelas_retired_racer_scope').GetFullNameNoFormatting], se retira" #NT!
 vikelas.591.d: "Después de pasar años de su vida compitiendo en autos por todo el mundo, [SCOPE.sCharacter('vikelas_retired_racer_scope').GetFullName] ahora se retira. [SCOPE.sCharacter('vikelas_retired_racer_scope').GetSheHe] ya no estará activo como [concept_vikelas_racer]." #NT!
 vikelas.591.g: "[SCOPE.sCharacter('vikelas_retired_racer_scope').GetSheHe|U] ganado [SCOPE.sCharacter('vikelas_retired_racer_scope').GetHerHis] ¡jubilación!" #NT!
 vikelas.591.h: "¡Sería un gran ingeniero!" #NT!
 vikelas.591.new_racer_replace_tt: "[SCOPE.sCharacter('vikelas_retired_racer_scope').GetFullName] será retirado y [SCOPE.sCharacter('vikelas_new_racer_scope').GetFullName] se convertirá en el nuevo [concept_vikelas_racer] de [GetPlayer.GetName]." #NT!
 vikelas.591.racer_to_engineer_tt: "[SCOPE.sCharacter('vikelas_retired_racer_scope').GetFullName] se convertirá en tu nuevo [concept_gaudi_engineer]. [SCOPE.GetRootScope.GetCountry.GetCustom('academics_replacement_engineer_custom_loc')]" #NT!
 vikelas.591.new_racer_tt: "[SCOPE.sCharacter('vikelas_new_racer_scope').GetFullName] se convertirá en el nuevo [concept_vikelas_racer] de [GetPlayer.GetName]." #NT!
 vikelas.592.t: "Nuestro [concept_vikelas_racer] murió" #NT!
 vikelas.592.d: "Tras pasar años como [concept_vikelas_racer], el conocido corredor de autos de nuestro país ha fallecido. ¿Seremos capaces alguna vez de reemplazar a tan asombroso talento?" #NT!
 vikelas.592.g: "¡Esta es una gran pérdida!" #NT!
 vikelas.592_tt: "A veces, el juego mata a personajes. Un mod no puede evitar que esto suceda. Este evento elimina el rol de ese [concept_character] del juego, para que no te persiga su fantasma." #NT!
 vikelas.593.t: "Accidente automovilístico fatal" #NT!
 vikelas.593.d: "El piloto de carreras [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] presionó demasiado su suerte. [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe|U] salió de la carretera a una velocidad demasiado alta y sufrió un accidente fatal." #NT!
 vikelas.593.f: "«Las carreras son una gran manía a la que hay que sacrificar todo, sin reticencias, sin vacilaciones.» -Enzo Ferrari" #NT!
 vikelas.593.g: "¡El siguiente!" #NT!
 vikelas.594.t: "Avería del coche" #NT!
 vikelas.594.d: "Desafortunadamente, el corredor [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] tuvo que rendirse antes de que terminara la carrera. El coche se averió, afirma [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe]." #NT!
 vikelas.594.f: "«La mala suerte no existe» -Enzo Ferrari" #NT!
 vikelas.594.g: "¿Fue el coche o el conductor sobreestimuló el motor?" #NT!
 vikelas.595.t: "Un nuevo corredor" #NT!
 vikelas.595.d: "Un nuevo [concept_vikelas_racer] ha introducido [SCOPE.sCharacter('vikelas_new_racer_scope').GetHerselfHimself]. El nombre de [SCOPE.sCharacter('vikelas_new_racer_scope').GetHerHis|U] es ​​[SCOPE.sCharacter('vikelas_new_racer_scope').GetFullName]." #NT!
 vikelas.595.g: "Esperemos que [SCOPE.sCharacter('vikelas_new_racer_scope').GetSheHe] tenga más suerte." #NT!
 vikelas.596.t: "Una nueva mecánica" #NT!
 vikelas.596.d: "Se ha introducido un nuevo [concept_vikelas_mechanic]. [SCOPE.sCharacter('vikelas_new_mechanic_scope').GetHerHis|U] el nombre es [SCOPE.sCharacter('vikelas_new_mechanic_scope').GetFullName]. [SCOPE.sCountry('vikelas_new_mechanic_scope').GetHerhis] la especialización es en el campo de..." #NT!
  
 vikelas_autoracing_found_automobile_club_button: "Club del Automóvil Fundado" #NT!
 vikelas_autoracing_found_automobile_club_button_desc: "La creación de un club automovilístico es el primer paso para construir otras instalaciones que son esenciales para los deportes de motor." #NT!
 vikelas_autoracing_long_distance_button: "Organiza una carrera de resistencia" #NT!
 vikelas_autoracing_long_distance_button_desc: "Las carreras de resistencia, a menudo entre ciudades, eran la norma en los primeros tiempos del automovilismo y continuaron hasta mediados del siglo XX. En Italia, las carreras como la Targa Florio o la Mille Miglia son los ejemplos más conocidos. Ponían a prueba a los hombres y a las máquinas y durante mucho tiempo se consideraron las verdaderas carreras automovilísticas nacionales." #NT!
 vikelas_autoracing_found_grand_prix_button: "Fundado Grand Prix Racing" #NT!
 vikelas_autoracing_found_grand_prix_button_desc: "En 1906 se organizó el primer Gran Premio oficial de la historia del automóvil, con la carrera del Grand Prix de l'ACF. Independientemente del país de origen, se aprobaron hasta tres coches de carreras por fabricante de automóviles, tal como solicitaron inicialmente los representantes de la industria francesa. Para cumplir con su condición de competición más importante de todas, la carrera se celebró sobre una distancia de más de 1200 km y en dos días consecutivos. En 1925, por iniciativa del Automobile Club de Italia, finalmente se anunció la creación de un campeonato mundial oficial. Las tres carreras oficiales del Grand Prix de la temporada (Francia, Italia y Bélgica) fueron designadas como carreras, así como Indianápolis como el evento automovilístico estadounidense más importante." #NT!
 vikelas_autoracing_race_track_button: "Construir una pista de carreras" #NT!
 vikelas_autoracing_race_track_button_desc: "Con las carreras del Gran Premio, las pistas fijas se están convirtiendo cada vez más en la norma para las carreras de coches. Una pista de carreras dedicada no solo centralizaría los eventos de carreras internacionales en un solo lugar, sino que, como pista de pruebas, también les daría a nuestros pilotos de carreras una ventaja de experiencia cada año." #NT!