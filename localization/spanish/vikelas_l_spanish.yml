 vikelas.592.t: "Nuestro [concept_vikelas_racer] murió"
 vikelas.592.d: "Tras pasar años como [concept_vikelas_racer], el conocido corredor de autos de nuestro país ha fallecido. ¿Seremos capaces alguna vez de reemplazar a tan asombroso talento?"
 vikelas.592.g: "¡Esta es una gran pérdida!"
 vikelas.592_tt: "A veces, el juego mata a personajes. Un mod no puede evitar que esto suceda. Este evento elimina el rol de ese [concept_character] del juego, para que no te persiga su fantasma."
 vikelas.593.t: "Accidente automovilístico fatal"
 vikelas.593.d: "El piloto de carreras [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] presionó demasiado su suerte. [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe|U] salió de la carretera a una velocidad demasiado alta y sufrió un accidente fatal."
 vikelas.593.f: "«Las carreras son una gran manía a la que hay que sacrificar todo, sin reticencias, sin vacilaciones.» -Enzo Ferrari"
 vikelas.593.g: "¡El siguiente!"
 vikelas.594.t: "Avería del coche"
 vikelas.594.d: "Desafortunadamente, el corredor [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] tuvo que rendirse antes de que terminara la carrera. El coche se averió, afirma [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe]."
 vikelas.594.f: "«La mala suerte no existe» -Enzo Ferrari"
 vikelas.594.g: "¿Fue el coche o el conductor sobreestimuló el motor?"
