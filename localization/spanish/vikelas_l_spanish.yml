 vikelas.571.t: "Las primeras 24 horas de Le Mans"
 vikelas.571.d: "En 1923 se celebraron las primeras 24 Horas de Le Mans, convirtiéndose rápidamente en uno de los eventos más prestigiosos del automovilismo, atrayendo a pilotos y fabricantes de todo el mundo."
 vikelas.571.f: "El 26 y 27 de mayo de 1923 se celebraron las primeras 24 Horas de Le Mans, organizadas por el Automobile Club de l'Ouest. El trazado de 17,3 kilómetros de la región de Sarthe acogió a 33 vehículos. Las condiciones eran difíciles: lluvia, caminos embarrados y un recorrido que discurría por la ciudad de Le Mans y las carreteras comarcales de los alrededores. La victoria fue para André Lagache y René Léonard, al volante de un Chenard & Walcker Sport, que recorrió una distancia de 2.209 kilómetros en 24 horas. Esta carrera marcó el inicio de una tradición que sigue celebrando la innovación y la resistencia en el automovilismo."
 vikelas.571.g: "¿24 horas? ¡Esto es una locura!"
 vikelas.572.t: "El nacimiento de la Targa Florio"
 vikelas.572.d: "En 1906 nació la Targa Florio, una espectacular carrera que se disputaba en las sinuosas carreteras de Sicilia. Organizada por Vincenzo Florio, convirtió a la región en el centro del mundo del automovilismo."
 vikelas.572.f: "El 6 de mayo de 1906 se celebró la primera Targa Florio, una carrera de larga distancia que convertía las escarpadas carreteras de montaña y los pintorescos pueblos de Sicilia en un desafiante circuito. Organizada por Vincenzo Florio, un apasionado de los deportes de motor, la prueba cumplía su visión de un desafío deportivo. La pista tenía una longitud de 446 kilómetros, divididos en tres vueltas de 148 kilómetros cada una. La victoria fue para Alessandro Cagno, al volante de un Itala, que cruzó la línea de meta con una velocidad media de 46,8 km/h. La Targa Florio se convirtió rápidamente en un símbolo de valentía, habilidad y pasión por la velocidad."
 vikelas.572.g: "La Targa Florio establece una tradición"
 vikelas.573.t: "El primer Semmering Berg-Rennen"
 vikelas.573.d: "En 1899 se celebró la primera carrera de montaña en Semmering, que puso a prueba los límites de la ingeniería automovilística y la habilidad al volante. Este acontecimiento marcó un hito importante en la historia del automovilismo."
 vikelas.573.f: "El 27 de agosto de 1899 se celebró la primera carrera de montaña de Semmering, organizada por el Automóvil Club de Austria. El recorrido de 9,8 kilómetros, que discurría desde Klamm am Semmering hasta el puerto de montaña, puso a prueba a los primeros automóviles y a sus conductores. Con pendientes de hasta un 7% y curvas cerradas, la carrera fue una prueba tanto de tecnología como de coraje. La victoria fue para el conde Jenő Zichy, al volante de un automóvil Mors, que completó el recorrido a una velocidad media de 22,2 km/h. La carrera atrajo a un gran público y sentó las bases de la tradición de la escalada en montaña en Europa."
 vikelas.573.g: "La subida a la colina fascina a las masas."
