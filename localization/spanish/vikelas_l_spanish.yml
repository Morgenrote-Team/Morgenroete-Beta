 je_vikelas_endurance_race_reason: "En varios estados de nuestro país se está celebrando actualmente una carrera de resistencia en la que participan pilotos de todos los países amantes de las carreras. El país anfitrión tiene una ligera ventaja y recibe pruebas adicionales. A diferencia de los Grandes Premios, la fiabilidad es más importante que la velocidad, ya que los coches tienen que durar largas distancias. El riesgo de que se rompa un motor también es mayor que el de un accidente mortal."
