 vikelas.21.t: "The Gentlemen's Game"
 vikelas.21.d: "In [SCOPE.sState('vikelas_cricket_state').GetName], a group of cricket players has come together for the first time to play matches together under established rules. The club thus assumes a pioneering role in the sport."
 vikelas.21.f: "The 19th century was the era in which cricket evolved from a rural pastime to a sport of national and international importance. The English upper classes made the game their favorite pastime: it was cultivated in boarding schools like Eton and Harrow and glorified as a 'gentleman's sport.' At the same time, its popularity grew among the working class, particularly in northern England, where factory workers founded their own clubs. This democratization of the game led to an unprecedented growth in clubs and spectators.\n\nInternational matches were not long in coming. In 1844, the world's first documented international match between Canada and the United States took place in New York."
 vikelas.21.g: "Pass me the bat!"
 vikelas.601.t: "Pedals on the Pavement"
 vikelas.601.d: "A new invention has appeared on the boulevards — a two-wheeled contraption powered by pedals attached directly to the front wheel. It is called the 'velocipede'."
 vikelas.601.f: "In the parks and on the wide streets of the capital, heads turn. Gentlemen in hats and vests perch atop strange iron frames, pedaling furiously, wobbling through startled crowds. Some fall. Some fly. Children laugh. Elder statesmen raise their brows. The newspapers call it le vélocipède — half toy, half promise. Invented by a carriage-maker, this 'bone-shaker' is as heavy as it is revolutionary. On cobblestones, it jars the spine. But on smooth promenades, it moves with surprising grace. There are murmurs that this is not mere novelty, but the seed of a new kind of motion."
 vikelas.601.g: "An amusing fashion!"
 vikelas.602.t: "The Bicycle of the Future"
 vikelas.602.d: "A new design of bicycle has emerged, featuring equal-sized wheels, a chain-driven rear axle, and improved balance. Unlike the precarious high-wheelers, this 'safety bicycle' is stable, affordable, and fast becoming a sensation. Its inventor? [SCOPE.sCharacter('vikelas_bicycle_inventor_scope').GetFullName]!"
 vikelas.602.f: "The old velocipedes shook bones and nerves alike. The towering penny-farthings offered speed, but at a price few were willing to pay — one false move, and the rider flew. Now, a new kind of bicycle is spreading from workshops in our capital: compact, elegant, and safe. With a chain drive to the rear wheel and pneumatic tires, even ladies and laborers begin to ride. Streets once ruled by carriages now echo with the soft hum of rubber on stone. In cafés and factories alike, the verdict is the same: this is not a toy. It is freedom — fast, silent, and suddenly within reach."
 vikelas.602.g: "Let every citizen ride into the modern age."
 vikelas.611.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]"
 vikelas.611.d: "The day has come. Riders from across the country gather at the starting line, eager to test man and machine on the open road. The air crackles with anticipation."
 vikelas.611.f: "The sun rises over the boulevard, already crowded with spectators. Banners flutter. The smell of grease and dust hangs in the morning air. Dozens of riders mount their bicycles — some gleaming machines fresh from the factory, others patched together in back-alley workshops.\nA shot rings out. Cheers erupt. And the wheels begin to turn.\nThey ride through city gates and out into the countryside. Farmers pause in their fields. Children run beside the road. Priests bless them. Cynics scoff. And yet, as the dust trails behind them, a strange sense arises in the crowd: this feels like the beginning of something greater."
 vikelas.611.g: "Let every town hear the whir of progress."
 vikelas.621.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]"
 vikelas.621.d: "The victor of the national bicycle race has captured more than just the finish line — he has captured the imagination of the nation. Now, all eyes turn to what he stands for."
 vikelas.621.f: "The newspapers call him 'The Iron Rider'. Born to a weaver's family, orphaned at twelve, factory worker by sixteen. His victory on a battered safety bicycle — patched, scraped, and oiled with care — was no mere triumph of sport. It was a parable. Crowds chant his name. Painters sketch him. Children mimic his posture. But more than that, ideologues take note. Some call him the face of labor’s strength. Others say he proves the vitality of the nation. The press argues over whether he is a worker, a patriot — or something new entirely.\nThe rider himself speaks little. He smiles, nods, and rides."
 vikelas.621.g: "Make him a hero of the working class."
 vikelas.621.h: "Celebrate him as a national icon."
 vikelas.621.i: "Frame him as a symbol of progress and modern man."
 vikelas.622.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]"
 vikelas.622.d: "A tragic accident has occurred during the national bicycle race. One rider is dead, and several others injured. The cheering has stopped."
 vikelas.622.f: "A wheel caught a rut. A cry, a crash, and then screaming. Spectators surged forward as bicycles tumbled like dominos. Blood mixed with dust. Helmets split. Bones broke. One young man — seventeen, a factory apprentice — died on impact. Newspapers are divided. Some call it a necessary price of progress, others decry the recklessness of public sport."
 vikelas.622.g: "Honor the fallen."
 vikelas.623.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]"
 vikelas.623.d: "One particular stage of the race has captured the hearts of the public. Spectators speak of it not just as a contest, but as legend."
 vikelas.623.f: "The riders disappeared into the hills at dawn. What followed was no longer a race, but a test of spirit. A dozen fell behind. Three collapsed. One crashed on a hairpin curve and stood up bleeding, waving off help. But one surged ahead through the fog into the hearts of thousands. The whole nation speaks of nothing else."
 vikelas.623.g: "Let the road remember his effort for generations."
 vikelas.623.h: "Commission a painting of the moment."
 vikelas.624.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]"
 vikelas.624.d: "Accusations have erupted following the latest race stage. A rider has been caught cheating — though some claim he was only doing what everyone does, just less discreetly."
 vikelas.624.f: "'They said he changed bicycles behind the barn. Others say he was towed up the hill by a hidden wire.'\n\nThe facts are blurred. What's clear is this: the rider was too fast. Spectacularly fast. Too fresh after a brutal climb. His rivals fume. Spectators gasp. The press smells blood. One photograph shows a second man in matching clothes. Another witness claims he saw the rider pushed by a car during the night stage. The accused denies everything, calling it envy and politics."
 vikelas.624.g: "Disqualify the rider and expose the fraud."
 vikelas.624.h: "Cover it up for the good of the sport."
 vikelas.625.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]"
 vikelas.625.d: "A fierce rivalry has taken hold of this year's race season. Two riders — equal in strength, opposite in style — have split the nation into two camps."
 vikelas.625.f: "One is fire: reckless, bold, adored by the young. He throws his cap to the crowd, laughs as he pedals, and attacks without warning.\nThe other is ice: calm, calculating, almost mathematical. He saves his strength, wins by seconds, and speaks only when necessary.\n\nTheir names are shouted from rooftops. Towns take sides. Posters are printed in red or blue. Tailors sell caps in their colors. Children mimic their stances on wooden bicycles.\nThe newspapers speak of more than just a race. They speak of character, of philosophy, of who the people want to be. And neither rider gives an inch."
 vikelas.625.g: "This will benefit newspaper culture."
 vikelas.625.h: "Use the rivalry for political gain."
 vikelas.626.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]"
 vikelas.626.d: "A fierce rivalry has taken hold of this year's race season. Two riders — equal in strength, opposite in style — have split the nation into two camps."
 vikelas.626.f: "'They found him in a village forge, hammer in hand, face blackened by soot, alone.'\n\nThe descent was treacherous. A misjudged corner, a crunch of gravel—and the front fork split. His bicycle folded like a wounded bird. Most would have stopped. But not him.\nHe limped downhill, dragging the frame for kilometers. In a remote village, he found a forge. No mechanics. No team car. Just bellows, anvil, and his own two hands.\nFor hours he worked — sleeves rolled, jaw clenched—recasting the front fork by memory and feel. When officials arrived, he paused only to glare and say: 'Do not touch it.'\nEight hours behind the leaders, he rode again. No chance of victory. But all along the route, crowds rose to cheer — not for the winner, but for the one who refused to stop."
 vikelas.626.g: "An inspiring story."
 vikelas.626.h: "Permit emergency repairs."
 vikelas.626.i: "Honor him!"
 vikelas.401.t: "Fédération Internationale de Football Association"
 vikelas.401.d: "Today the International Football Association was founded in [GetGlobalVariable('vikelas_fifa_seat_global_var').GetStateRegion.GetCityHubName]. Its full name is Fédération Internationale de Football Association (FIFA)."
 vikelas.401.f: "On May 21st, 1904, delegates from seven nations—Belgium, Denmark, France, the Netherlands, Spain, Sweden, and Switzerland—signed a charter. The goal: to standardize football rules, organize international matches, and elevate the game to a global level. Thus was born the Fédération Internationale de Football Association — FIFA. In its early decades, FIFA was modest: a part-time presidency, amateur players, and regional disputes. But beneath the surface, a global movement grew. England hesitated to join, wary of foreign interference. South Americans began forming their own confederations. In 1924 and 1928, Olympic tournaments revealed football's true reach: crowds of 60,000 in Paris, cheering not armies, but teams."
 vikelas.401.g: "Join FIFA and support international competition."
 vikelas.411.t: "Football World Cup [TimeKeeper.GetCurrentDate.Format('y')]"
 vikelas.411.d: "FIFA has decided that this year's World Cup will take place in [SCOPE.sCountry('vikelas_fifa_host_scope').GetName]. After the preliminary round, the list of favorites is narrowed down to eight teams."
 vikelas.411.f: "#V The following national teams have qualified for the quarter-finals#!\n\n[SCOPE.sCountry('vikelas_first_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_second_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_third_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_fourth_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_fifth_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_sixth_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_seventh_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_eighth_qualified_team_scope').GetName]"
 vikelas.411.g: "May the best team prevail."
 vikelas.412.t: "Champions of the World"
 vikelas.412.d: "Our team has triumphed on the world stage, defeating the finest squads from every continent. Across the nation, celebrations erupt!"
 vikelas.412.f: "In a heated match against [SCOPE.sCountry('vikelas_second_winner_team_scope').GetName], our team proved itself in the final of the World Cup in [SCOPE.sCountry('vikelas_fifa_host_scope').GetName]. Our national team has lifted the golden trophy. The final whistle echoed through radios, cafés, barracks. From miners in the north to merchants in the port, the people roared as one. The captain weeps on the podium. A new generation watches and dreams."
 vikelas.412.g: "We are the champions."
 vikelas.413.t: "Silver Glory in [SCOPE.sCountry('vikelas_fifa_host_scope').GetName]"
 vikelas.413.d: "Our football team reached the final — and fell just short of glory. Across the nation, pride and heartbreak mix in equal measure."
 vikelas.413.f: "Unfortunately, our team's best wasn't good enough. In a nerve-wracking match against [SCOPE.sCountry('vikelas_first_winner_team_scope').GetName], our men came up short. For weeks, they carried the hopes of a nation. In muddy fields and blinding heat, they ran, they fought, they believed. Match by match, they became legends. They held their heads high as the other anthem played. No tears, only silence—and then, a slow, rising applause."
 vikelas.413.g: "This was stolen from us!"
 vikelas.414.t: "Dream Ends Early"
 vikelas.414.d: "Our national team was eliminated early from the FIFA World Cup in [SCOPE.sCountry('vikelas_fifa_host_scope').GetName]. [SCOPE.sCountry('vikelas_first_winner_team_scope').GetName] defeated [SCOPE.sCountry('vikelas_second_winner_team_scope').GetName] in the final."
 vikelas.414.f: "There had been hope—real, tangible hope. Victories cheered in factory yards, radio commentaries whispered in churches, children reenacting goals in alleys. The team stood for more than football: for ambition, for pride, for the belief that we could rise above ourselves. But the last match changed everything. A single goal conceded. A handball unseen. A missed opportunity. Now the dream is over, and the world moves on."
 vikelas.414.g: "We believed. That was enough."
