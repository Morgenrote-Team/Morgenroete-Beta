 vikelas_fire_of_olympia_modifier: "Fire of Olympia"
 mobilization_option_bicycle_recon_desc: "Bicycle Relays greatly increase the mobility of our troops and can also be deployed in inaccessible terrain."
 vikelas.21.h: "But who could be interested in such a game?"
 vikelas.31.t: "From meadow game to America's Pastime"
 vikelas.31.d: "In [SCOPE.sState('vikelas_baseball_state').GetName], a new game have become popular that represents the American spirit."
 vikelas.31.f: "In the 1840s, baseball began to emerge from the shadows of its predecessors and take on a distinctive form. The United States was undergoing rapid urbanization, and growing cities sought pastimes that could foster community while reflecting the spirit of the new nation. A pivotal moment came in 1845, when Alexander Cartwright and the members of the Knickerbocker Base Ball Club in New York established the game's first standardized rules. These 'Knickerbocker Rules' laid the foundation of modern baseball: a diamond field with four bases, three outs per inning, and nine players per team. They were significantly different from the less formal versions played on lawns and fields up to that point. On June 19, 1846, the Knickerbocker Club played the first documented game under these rules in Hoboken, New Jersey. The team lost to the New York Nine, but the event marked the symbolic birth of organized baseball."
 vikelas.31.g: "Homerun!"
 vikelas.41.t: "The beginnings of modern football"
 vikelas.41.d: "In order to regulate numerous conflicting rules in the area of ball games and thus to organize joint games, clubs in [SCOPE.sState('vikelas_football_state').GetName] have presented a new set of football rules."
 vikelas.41.f: "In the first half of the 19th century, football in England was not yet a unified sport, but rather a collective term for a variety of ball games played in towns, villages, and schools. These games often differed drastically in their rules. The first step towards standardization was taken by the Cambridge Rules of 1848, an attempt to create uniform rules for students at Cambridge. They were not a final solution, but they laid the foundation for what followed. The real breakthrough came on October 26, 1863, when eleven clubs met at the Freemasons' Tavern in London and founded the Football Association (FA). Within a few weeks, they agreed on a set of rules that allowed the ball to be played only with the feet and prohibited carrying or throwing the ball - a compromise that angered rugby supporters, who subsequently split off and developed their own set of rules. With the founding of the FA, modern football was born."
 vikelas.41.g: "Goal!"
 vikelas.51.t: "The Game with a Peach Basket"
 vikelas.51.d: "In a [SCOPE.sState('vikelas_basketball_state').GetName] gymnasium, a new game has been invented—one that may one day echo in halls and stadiums across the world."
 vikelas.51.f: "'No kicking. No running with the ball. And two peach baskets nailed to a gallery.'\n\nIn [TimeKeeper.GetCurrentDate.Format('y')], at a School in [SCOPE.sState('vikelas_basketball_state').GetFarmHubName], Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] faced a problem: how to keep [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] restless students active indoors during the winter. [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis|U] solution was simple — and strange. A soccer ball, two elevated peach baskets, and thirteen rules.\nThe boys found it odd at first. No contact. No dribbling. Just careful passing and arching throws. But something about it stuck. The game spread to other schools, then to other cities. In less than a decade, gymnasiums from New York to Tokyo were echoing with the rhythm of bouncing balls and shouts of 'Basket!'\nWhat began as a cold-weather pastime may become something greater. It is fast, team-based, suited to modern life — and above all, [ROOT.GetCountry.GetAdjectiveNoFormatting]-born."
 vikelas.51.g: "Introduce it in schools and gymnasiums."
 vikelas.302.h: "What an overrated game."
 vikelas.303.h: "What a boring game."
 vikelas.311.g: "Never miss a sports result again!"
 vikelas.312.t: "Sports Radio"
 vikelas.312.d: "A radio manufacturer in [SCOPE.sState('vikelas_radio_state').GetName] promotes its product primarily for radio broadcasts of sporting events. The population's desire not to miss a single [Country.MakeScope.Var('vikelas_national_sport_var').GetFlagName] match has led the factory to optimize its production."
 vikelas.312.f: "Radio was perfectly suited to become the new medium for sports: it could transmit the drama of a game live, convey the roar of the crowd, and make the commentator's voice the heartbeat of the audience. In the United States, it began on August 5, 1921, when Pittsburgh station KDKA broadcast the first live baseball game: the Pittsburgh Pirates versus the Philadelphia Phillies. Commentator Harold Arlin sat in the press box with a simple microphone and described every action as if recounting it to a friend. Listeners, captivated by the new devices, felt the sport taking over their living rooms. In Europe, the BBC followed suit: On January 11, 1927, it broadcast the first live football match—Arsenal versus Sheffield United—with commentator Teddy Wakelam."
 vikelas.312.g: "It's like being there live!"
 vikelas.318.t: "[GetPlayer.MakeScope.Var('vikelas_national_sport_var').GetFlagName] Association"
 vikelas.318.g: "Found the National [GetPlayer.MakeScope.Var('vikelas_national_sport_var').GetFlagName] Association!"
 vikelas.318.f: "A sports association—whether for cricket, baseball, football, or basketball—is always established when 35 percent of the integrated home states have a club for the respective sport. An association is the basis for the holding of league matches and a final match with a championship title. However, this is only possible if a nation has at least two clubs. A football association is a prerequisite for participation in the FIFA World Cup."
 vikelas.318.d: "[GetPlayer.MakeScope.Var('vikelas_national_sport_var').GetFlagName] has become a popular sport throughout [GetPlayer.GetNameNoFormatting]. The vibrant club culture has now resulted in the founding of a national association in [ROOT.GetCountry.GetCapital.GetCityHubName]."
 vikelas.321.g: "Homerun!"
 vikelas.322.t: "Baseball Cards"
 vikelas.322.d: "A prominent company in our country began printing baseball cards for promotional purposes. A real collecting craze has since developed."
 vikelas.322.f: "The history of baseball trading cards begins in the decades when baseball itself evolved from a regional pastime to the national sport of the United States. As early as the 1860s, when the National Association of Baseball Players (NABBP) organized the first clubs, early portraits of players appeared in the form of studio photographs. These so-called cabinet cards or trade cards were produced in photo studios and collected by wealthier fans, but they did not yet have a serial character. The actual beginning of trading cards in the modern sense dates back to the 1880s. At that time, tobacco manufacturers discovered the possibility of including small cardboard pictures in cigarette packs. Initially, these cards only stabilized the packs, but companies quickly recognized their advertising value. Goodwin & Company of New York is considered a pioneer of this era with its Old Judge series (1887-1890). The cards featured black-and-white photographs of players, printed on thin cardboard, and offered baseball fans the first opportunity to collect entire series of their idols."
 vikelas.322.g: "When will the scrapbooks be released?"
 vikelas.331.t: "Rival Football Club founded"
 vikelas.331.d: "After a disagreement with a football club in the neighboring state, the workers in [SCOPE.sState('vikelas_football_club_state_scope').GetName] came together and founded their own club, which they called [SCOPE.sState('vikelas_football_club_state_scope').GetCustom('vikelas_historical_football_club_names_type')]. Apparently there is animosity between the two clubs."
 vikelas.331.f: "A fair number of sports clubs have their origins in splits and disagreements with other clubs. Inter Milan, for example, was founded by several disgruntled cosmopolitan members of the Milan Cricket and Football Club (now AC Milan) in the Milanese restaurant Ristorante Orologio. The 'Football Club Internazionale Milano', as the club was officially called, was split off from the nationalist Milan CFC, in which only Italians were allowed to play."
 vikelas.331.g: "Is this a brewing rivalry?"
 vikelas.332.t: "Football Rivalry"
 vikelas.332.d: "The footbal clubs [SCOPE.sState('vikelas_rival_state_1_scope').GetCustom('vikelas_historical_football_club_names_type')] from [SCOPE.sState('vikelas_rival_state_1_scope').GetName] and [SCOPE.sState('vikelas_rival_state_2_scope').GetCustom('vikelas_historical_football_club_names_type')] from [SCOPE.sState('vikelas_rival_state_2_scope').GetName] are having a league match today, that might decide this year's champions. Tensions might be high as both of them see each others as rivals and want to become champions."
 vikelas.332.f: "Kick off, throw in, have a little scrimmage,\nKeep it low, a splendid rush, bravo, win or die;\nOn the ball, City!\nNever mind the danger,\nSteady on, now’s your chance,\nHurrah! We’ve scored a goal.\n - Albert T. Smith"
 vikelas.332.g: "I favor the team from [SCOPE.sState('vikelas_rival_state_1_scope').GetName]!"
 vikelas.332.h: "The Team from [SCOPE.sState('vikelas_rival_state_2_scope').GetName] is better!"
 vikelas.333.t: "Football Hooligans"
 vikelas.333.d: "The Football game over the [GetPlayer.GetAdjective] Championship was overshadowed by riots of violent football fans. They were unhappy with the result and attacked the other team, the referee and random shops in [ROOT.Var('vikelas_rival_state_var').GetState.GetName], causing havoc. Luckily none died."
 vikelas.333.f: "\"Where are you, you scaredy cat of a referee! We lost because of you! There he is! Get him Boys!\""
 vikelas.333.g: "What a Mess!"
 vikelas.334.t: "A Football Champion is born!"
 vikelas.334.d: "The new [GetPlayer.GetAdjective] Champion was decided in a tight game which the team from [ROOT.Var('vikelas_rival_state_var').GetState.GetName] one. The people in [ROOT.Var('vikelas_rival_state_var').GetState.GetNameNoFormatting] are celebrating the victory of their team."
 vikelas.334.f: "\"Ole! Ole! Ole! Oleeee! Oleeee! Oleeee!\""
 vikelas.334.g: "We are the Champions!"
 vikelas.391.t: "Adapt National Sport"
 vikelas.391.d: "Which national sport should [GetPlayer.GetNameNoFormatting] adapt?"
 vikelas.391.f: "'Have you ever heard about this lovely sport named Hornussen?'"
 vikelas.391.g: "Cricket."
 vikelas.391.h: "Baseball."
 vikelas.391.i: "Football."
 vikelas.391.j: "Basketball."
 vikelas.391.k: "Nevermind."
 vikelas.392.t: "Change National Sport"
 vikelas.392.d: "To which national sport should [GetPlayer.GetNameNoFormatting] change?"
 vikelas.392.f: "'[ROOT.GetCountry.MakeScope.Var('vikelas_national_sport_var').GetFlagName] has become so boring, how about a game of cheese rolling?'"
 vikelas.393.t: "A New National Sport"
 vikelas.393.d: "Envoys from [SCOPE.sCountry('vikelas_overlord_country_scope').GetName] have suggested to our government that we should introduce their national sport in our country and have accordingly sent a coach to implement this plan."
 vikelas.393.f: "'The game is like a rest, and since you cannot work continuously, you need rest.' -Aristotle"
 vikelas.393.g: "Pass me the bat!"
 vikelas.393.h: "Homerun!"
 vikelas.393.i: "Goal!"
 vikelas.393.j: "Splash!"
 vikelas.394.t: "A Common Sport"
 vikelas.394.d: "More and more residents of our country view [ROOT.GetCountry.MakeScope.Var('vikelas_national_sport_var').GetFlagName] as a unifying, ideological element - also in international relations. This shared national sport gives them the feeling that [GetPlayer.GetNameNoFormatting] has more in common with our overlord [SCOPE.sCountry('vikelas_overlord_country_scope').GetName] than mere power relations."
 vikelas.394.f: "If an overlord and a subject share a national sport, liberty desire is reduced."
 vikelas.394.g: "Common sports, common interests."
 vikelas.395.t: "Commonwealth [GetPlayer.MakeScope.Var('vikelas_national_sport_var').GetFlagName] Championship"
 vikelas.395.d: "Spectators and teams from all allied and friendly countries gathered to attend the Commonwealth [GetPlayer.MakeScope.Var('vikelas_national_sport_var').GetFlagName] Championship. The games are also a sign that the [ROOT.GetCountry.GetAdjectiveNoFormatting] sphere of influence is growing together not only politically but also culturally."
 vikelas.395.f: "Since the late 19th century, there have been test series between England and other parts of the Empire, which had a quasi-tournament-like character. The founding of the ICC (Imperial Cricket Conference) in 1909 laid the foundation for formal exchange between the Empire's cricket powers. Initial members were England, Australia, and South Africa—later India, New Zealand, and the West Indies joined.\n\nThe British Home Championship, meanwhile, was an annual tournament between the four Home Nations: England, Scotland, Wales, and Northern Ireland. It was the oldest regular international football event. It was considered a symbol of British supremacy in football.\n\nThe idea of a comprehensive Empire Cup was never fully realized - but there were individual attempts and series that came close."
 vikelas.395.g: "Let the games begin!"
 vikelas.396.t: "Commonwealth [GetPlayer.MakeScope.Var('vikelas_national_sport_var').GetFlagName] Championship - Victory!"
 vikelas.396.d: "We defeated rival [SCOPE.sCountry('vikelas_second_winner_team_scope').GetName] in the decisive match! We won the Commonwealth [GetPlayer.MakeScope.Var('vikelas_national_sport_var').GetFlagName] Championship."
 vikelas.396.f: "[SCOPE.sCharacter('vikelas_schaefer_scope').GetFullNameNoFormatting]'s pass to [SCOPE.sCharacter('vikelas_morlock_scope').GetFullNameNoFormatting] is blocked by [SCOPE.sCountry('vikelas_second_winner_team_scope').GetNameNoFormatting] - and [SCOPE.sCharacter('vikelas_bozsik_scope').GetFullNameNoFormatting], always [SCOPE.sCharacter('vikelas_bozsik_scope').GetFullNameNoFormatting], the [SCOPE.sCountry('vikelas_second_winner_team_scope').GetAdjectiveNoFormatting] right winger, has the ball. He has the ball - lost this time, to [SCOPE.sCharacter('vikelas_schaefer_scope').GetFullNameNoFormatting]. [SCOPE.sCharacter('vikelas_schaefer_scope').GetFullNameNoFormatting] crosses inside. Header - blocked. [SCOPE.sCharacter('vikelas_rahn_scope').GetFullNameNoFormatting] should shoot from behind - [SCOPE.sCharacter('vikelas_rahn_scope').GetFullNameNoFormatting] shoots - Goooooal! Goooooal! Goooooal! Goooal!"
 vikelas.396.g: "The Commonwealth Trophy goes to [GetPlayer.GetNameNoFormatting]!"
 vikelas.397.t: "Commonwealth [GetPlayer.MakeScope.Var('vikelas_national_sport_var').GetFlagName] Championship ends"
 vikelas.397.d: "The Commonwealth [GetPlayer.MakeScope.Var('vikelas_national_sport_var').GetFlagName] Championship is over. [SCOPE.sCountry('vikelas_first_winner_team_scope').GetName] defeated [SCOPE.sCountry('vikelas_second_winner_team_scope').GetName] in the final. The teams and spectators from the allied and friendly states have left again. [GetPlayer.GetNameNoFormatting] will remain in their fond memories as host and organizer."
 vikelas.397.f: "'Perhaps we are not disenfranchised subjects, cannon fodder, or a mere collection of influenced nations for the benefit of an overlord, but... a family.'"
 vikelas.397.g: "This was conducive to international understanding."
 vikelas.403.d: "The FIFA has appointed new board members at its meeting in [SCOPE.sState('vikelas_fifa_state').GetStateRegion.GetCityHubName] today."
