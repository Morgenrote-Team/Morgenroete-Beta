 je_elgar_composer_composing: "Compositor concentrados completamente en componer" #NT!
 je_elgar_composer_composing_reason: "[GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName] se dedicará por completo a componer para los próximos meses. ¡Esto trae #G 5#! @elgar_music_tradition! [concept_elgar_musical_tradition] y #G 5#! #V reputación#! anualmente. Los compositores que componen crean un número aleatorio de trabajos de composición cada año. Normalmente, un compositor componerá de 1 a 4 piezas anualmente, pero los rasgos positivos o negativos pueden influir en el número. El éxito de una gira depende en gran medida de cuántas obras puede presentar un compositor de su propio repertorio." #NT!
