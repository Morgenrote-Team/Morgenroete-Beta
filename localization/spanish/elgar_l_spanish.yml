 elgar_adopt_national_anthem_decision: "Adoptar un himno nacional" #NT!
 elgar_adopt_national_anthem_decision_desc: "A medida que avanza el nacionalismo, no tener un himno nacional equivale a engañar. Es suficiente seleccionar música ceremonial razonablemente aceptable para fines de representación. Los compositores pueden crear aleatoriamente piezas de música que se utilizarán más adelante, pero también se pueden encargar directamente. No todos los himnos tienen que tener letras, pero es mucho más prestigioso." #NT!
  
