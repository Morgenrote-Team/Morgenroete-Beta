 je_elgar_composer_masterpiece: "El compositor crea una obra maestra" #NT!
 je_elgar_composer_masterpiece_reason: "[GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName] se dedicará por completo a componer una obra maestra para los próximos meses. El tiempo que lleva un compositor crear una obra maestra depende principalmente de su reputación. Un gran compositor puede crear una obra maestra en solo dos años. Los compositores con menos de 400 reputación tardan significativamente más; Un compositor con menos de 250 reputación ni siquiera debería intentarlo. Al final del proceso de trabajo, [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName] presentará una obra maestra de música definitoria de nuestra generación." #NT!
 je_elgar_composer_masterpiece_goal: "Si no hay incidentes, nuestro [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName] continuará su trabajo todos los meses. Ha trabajado para #G [ROOT.Var('elgar_composer_progress').GetValue]#! meses." #NT!
 je_elgar_composer_duel: "Duelo compositor" #NT!
 je_elgar_composer_duel_reason: "El compositor [SCOPE.sCountry('target').GetAdjectiveNoFlag] [SCOPE.sCharacter('rival_composer_scope').GetFullName] declaró que nuestro país es culturalmente atrasado y [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName] es ​​un número desconocido. Absolutamente debemos asegurarnos de que se conozca mejor y, por lo tanto, demostrarle al mundo qué país se considera la vanguardia musical." #NT!
 je_elgar_composer_duel_success: "El primer compositor que logra ganar #V 100 reputación adicional#! demuestra que su país disfruta de más reconocimiento cultural que el otro." #NT!
 je_elgar_composer_duel_rival_death: "La muerte prematura del otro compositor también conduce a la victoria." #NT!
 je_elgar_composer_duel_fail: "Perdemos el duelo si el compositor rival obtiene #V 100 o más reputación ante us#! o nuestro compositor muere prematuramente." #NT!
  
 elgar.9.t: "Técnica de doce tonos" #NT!
 elgar.9.d: "Después de décadas de estancamiento musical, los compositores modernos han creado un nuevo concepto que revolucionará el mundo de la música." #NT!
 elgar.9.f: "La técnica de doce tonos, también conocida como dodecafonía, serialismo de doce tonos y (en uso británico) composición de doce notas, es un método de composición musical. La técnica es un medio para garantizar que las 12 notas de la escala cromática se suenen tan a menudo como en una pieza musical, al tiempo que evitan el énfasis de cualquier nota mediante el uso de filas de tono, pedidos de las 12 clases de tono. Por lo tanto, las 12 notas tienen más o menos igual importancia, y la música evita estar en una clave. Con el tiempo, la técnica aumentó mucho en la popularidad y finalmente se volvió ampliamente influyente en los compositores del siglo XX. Se considera comúnmente una forma de serialismo." #NT!
 elgar.9.g: "No estoy tan seguro de si esa fue una buena idea." #NT!
  
