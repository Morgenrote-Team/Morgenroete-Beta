 elgar_art_nouveau_tech_desc: "#R Esta tecnología solo está disponible a través de un botón en la pestaña Artes de la Gui Morgenröte! #!\n\n[concept_elgar_art_nouveau] es un estilo internacional de arte, arquitectura y arte aplicado, especialmente las artes decorativas. El estilo es conocido por diferentes nombres en diferentes idiomas: Jugendstil en alemán, libertad de montaje en italiano, modernismo en catalán, y también conocido como el estilo moderno en inglés. A menudo se inspiró en formas naturales como las curvas sinuosas de plantas y flores. Los arquitectos y diseñadores buscaron un Gesamtkunstwerk espiritualmente edificante (\ "Total Work of Art \") que unificaría las artes." #NT!
 elgar_impressionism_tech_desc: "#R Esta tecnología solo está disponible a través de un botón en la pestaña Arts de la Gui Morgenröte! #!\n\n[concept_elgar_impressionism] es un estilo de arte del siglo XIX que se caracteriza por la representación atmosférica de instantáneas fugaces. El término impresionismo también se ha aplicado a ciertos estilos de música, literatura, cine y fotografía." #NT!
 elgar_expressionism_tech_desc: "#R Esta tecnología solo está disponible a través de un botón en la pestaña Arts de la Gui Morgenröte! #!\n\n[concept_elgar_expressionism] es un movimiento modernista, inicialmente en poesía y pintura. Su rasgo típico es presentar el mundo únicamente desde una perspectiva subjetiva, distorsionándolo radicalmente para el efecto emocional para evocar estados de ánimo o ideas." #NT!
 elgar.423.d: "[SCOPE.sCharacter('elgar_conductor').GetFullName] se queja de que las condiciones de trabajo [SCOPE.sCharacter('elgar_conductor').GetHerHis] no son lo suficientemente buenas en vista de sus múltiples funciones de oficina. Quizás los apoyos monetarios podrían mejorar su "inspiración"." #NT!
 elgar.424.d: "[SCOPE.sCharacter('elgar_conductor').GetFullName] ha estado tratando de componer por algún tiempo, pero [SCOPE.sCharacter('elgar_conductor').GetSheHe] sigue siendo interrumpido por una determinada persona." #NT!
 elgar_irrationalism_tech_desc: "El irracionalismo es un movimiento filosófico que surgió a principios del siglo XIX, enfatizando la dimensión no racional de la vida humana. Los irracionalistas declaran que la razón humana por sí sola es incapaz de reconocer las bases, conexiones y leyes de la realidad objetiva. Como alternativas para explicaciones descriptivas y normativas del mundo, se sugieren funciones cognitivas más altas como, por ejemplo, la intuición, la fe o la experiencia directa." #NT!
  
 country_elgar_decorative_musical_tradition_add: "@elgar_music_tradition! [concept_elgar_musical_tradition] por año" #NT!
 country_elgar_decorative_musical_tradition_add_desc: "La cantidad de [concept_elgar_musical_tradition] acumulada por su país por año." #NT!
  
