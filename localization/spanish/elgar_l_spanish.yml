 elgar_classicism_tech: "Clasicismo" #NT!
 elgar_classicism_tech_desc: "El clasicismo, en las artes, se refiere generalmente a una gran consideración por un período clásico, la antigüedad clásica en la tradición occidental, como estándares establecidos para el sabor que los clasicistas buscan emular. En su forma más pura, el clasicismo es una actitud estética que depende de los principios basados ​​en la cultura, el arte y la literatura de la antigua Grecia y Roma, con énfasis en la forma, la simplicidad, la proporción, la claridad de la estructura, la perfección, la emoción restringida y el atractivo explícito del intelecto." #NT!
 elgar_irrationalism_tech: "Irracionalismo" #NT!
 elgar_modern_art_tech: "Arte moderno" #NT!
 elgar_modern_art_tech_desc: "#R Esta tecnología es solo un ficticio y no se puede investigar. Complete las entradas del diario para obtener [concept_elgar_impressionism], [concept_elgar_expressionism] o [concept_elgar_art_nouveau]! #!" #NT!
 elgar_art_nouveau_tech: "Art nouveau" #NT!
  
 elgar_art_deco_tech: "Arte de arte" #NT!
 elgar_art_deco_tech_desc: "Art Déco combinó estilos modernos con artesanía fina y materiales ricos. Durante su apogeo, representaba lujo, glamour, exuberancia y fe en el progreso social y tecnológico. Art Deco es uno de los primeros estilos verdaderamente internacionales, pero su dominio terminó con el comienzo de la Segunda Guerra Mundial." #NT!
 elgar_impressionism_tech: "Impresionismo" #NT!
  
 elgar_neoclassicism_tech: "Neoclasicismo" #NT!
 elgar_neoclassicism_tech_desc: "Después del cambio de siglo hubo un entusiasmo renovado por los ideales clásicos: el neoclasicismo. Abandonó al menos música, filosofía y literatura. Mientras que los arquitectos volvían a usar la construcción romana y griega como modelos, los compositores redescubrían la música barroca como fuente de inspiración." #NT!
 elgar_expressionism_tech: "Expresionismo" #NT!
  
 elgar_new_objectivity_tech: "Nueva objetividad" #NT!
 elgar_new_objectivity_tech_desc: "Aunque principalmente describió una tendencia en la pintura alemana, el término se quitó la vida y llegó a caracterizar la actitud de la vida pública en Weimar Alemania, así como el arte, la literatura, la música y la arquitectura creadas para adaptarse a ella. En lugar de un objetivo de la objetividad filosófica, estaba destinado a implicar un giro hacia el compromiso práctico con el mundo, una actitud de negocios, los alemanes entendidos por los alemanes como intrínsecamente estadounidenses." #NT!
 elgar_mass_culture_tech: "Cultura de masas" #NT!
 elgar_mass_culture_tech_desc: "#R Esta tecnología solo está disponible a través de la entrada de la revista! #!\n\n'The La hostilidad incrustante de la masa hacia todas las tradiciones representativas de la cultura, la inteligencia aguda y fría que confunde la sabiduría del campesino, el nuevo naturalismo encontrado que en relación con todos los asuntos de sexo y sociedad se remonta a los instintos bastante primitivos y las condiciones, la resonancia de la reacción de los cirensas en la forma de la forma de la forma de los estadios y los deportes de los deportes y los deportes. El cierre definitivo de la cultura y la apertura de una fase bastante nueva de la existencia humana. - Oswald Spengler, declive de Occidente" #NT!
  
