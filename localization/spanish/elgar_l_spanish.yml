 elgar.801.t: "Un himno nacional" #NT!
 elgar.801.d: "Con el creciente sentimiento nacional entre nuestra gente, el deseo de un himno nacional que representa adecuadamente al gobernante, el país y la gente ahora está creciendo no solo entre los intelectuales sino también entre las amplias secciones de la población ordinaria." #NT!
 elgar.801.f: "Incluso antes de mediados del siglo XIX, había muchos países en Europa y América que solían reproducir ciertas canciones en ocasiones oficiales, a menudo para representar al monarca. Algunos himnos fueron codificados desde el principio, mientras que otros permanecieron no oficiales hasta el siglo XX. Por lo tanto, algunos países comienzan con himnos nacionales predeterminados, que pueden cambiar debido a una revolución o cambios constitucionales. Muchos países, por otro lado, tienen que inventar sus himnos nacionales desde cero: los compositores y los escritores pueden proporcionar una valiosa ayuda con esto." #NT!
 elgar.801.g: "Nos encargaremos de eso más tarde." #NT!
 elgar.801.h: "[SCOPE.GetRootScope.GetCountry.GetCustom('elgar_monarch_anthem')]" #NT!
 elgar.801.i: "[SCOPE.GetRootScope.GetCountry.GetCustom('elgar_folk_anthem')]" #NT!
 elgar.801.j: "[SCOPE.GetRootScope.GetCountry.GetCustom('elgar_value_anthem')]" #NT!
 elgar.801.k: "[SCOPE.GetRootScope.GetCountry.GetCustom('elgar_military_anthem')]" #NT!
 elgar.801.l: "[SCOPE.GetRootScope.GetCountry.GetCustom('elgar_worker_anthem')]" #NT!
 elgar.801.m: "[SCOPE.GetRootScope.GetCountry.GetCustom('elgar_internationale_anthem')]" #NT!
 elgar.802.t: "Himno anticuado" #NT!
 elgar.802.d: "Tras los cambios recientes en la ley, el himno nacional anterior ya no parece apropiado. Muchos lo interpretan como un remanente anacrónico de un sistema político pasado. La presión está creciendo para deshacerse del equipaje." #NT!
 elgar.802.f: "'Tenemos un almirante sin una flota. Él gobierna un país sin costa. Este es un reino sin rey." #NT!
 elgar.802.g: "Este himno ya no representa a nuestro país." #NT!
 elgar.803.t: "Himno reaccionario" #NT!
 elgar.803.d: "Las voces se están volviendo más fuertes al cancelar el himno nacional anterior. Los políticos superiores están pidiendo una nueva pieza que enfatiza más claramente los logros del estado moderno que representa [ROOT.GetCountry.GetNameNoFormatting]." #NT!
 elgar.803.f: "'Las personas hacia adelante, hacia la redención \ nred Bandera, la bandera roja \ n para las personas, hacia la redención \ nred Bandera triunfará." #NT!
  
 elgar.811.t: "El himno de [ROOT.GetCountry.GetNameNoFormatting]" #NT!
 elgar.811.d: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullNameNoFormatting] aprobó un decreto de que se debe reproducir una pieza musical específica en ocasiones oficiales. La elección cayó ..." #NT!
  
 elgar.821.t: "Música para [ROOT.GetCountry.GetNameNoFormatting]" #NT!
 elgar.821.d: "[GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName] preguntó si había algún deseo especial con respecto a la composición a escribir y qué aspecto merecía atención especial." #NT!
 elgar.821.f: "Hay un total de cinco categorías de himnos nacionales. Los himnos de la monarquía mejoran la legitimidad, los himnos populares reducen la agitación, los himnos de valor mejoran la lealtad en mejores condiciones de vida y al mismo tiempo hacen que los ciudadanos sean más resistentes al deterioro, mientras que los himnos militares fortalecen el poder de defensa de una nación. Las repúblicas del consejo pueden comisionar himnos de los trabajadores, que aumentan el poder político de los sindicatos. Dependiendo de la forma del gobierno, no todos los himnos son posibles." #NT!
 elgar.821.g: "El himno tiene la intención de alabar a nuestro monarca." #NT!
 elgar.821.h: "Una canción popular popular está destinada a vincular al gobierno y al pueblo." #NT!
 elgar.821.i: "Himno sublime de Composteas que representa los valores de nuestro país." #NT!
 elgar.821.j: "¡Necesitamos una canción que motive a nuestra gente en la batalla!" #NT!
 elgar.821.k: "Solo una canción de los trabajadores que glorifica el proletariado es aceptable." #NT!
  
 elgar.822.t: "Himno melodía terminada" #NT!
 elgar.822.d: "Maestro [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetLastName] hoy presentó el puntaje para la propuesta [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetHerHis] para un posible himno nacional nuevo. Todavía no está claro si el estado realmente los aceptará." #NT!
 elgar.822.f: "Ha habido numerosos himnos que nunca se convirtieron en el himno nacional. Las razones de esto son variadas. El estado todavía tiene que sancionarlos. Además, los himnos nacionales que tienen una melodía y letra originales son más fuertes." #NT!
 elgar.822.g: "Ojalá encuentre aceptación entre la gente ..." #NT!
  
 elgar.831.t: "Letra de Anthem Terminada" #NT!
 elgar.831.d: "[GetPlayer.MakeScope.Var('manzoni_writer_var').GetCharacter.GetFullName] había estado considerando la posibilidad de que el país necesitara letras dignas para su himno nacional. El escritor rápidamente escribió palabras apropiadas para las notas que habían sido conocidas durante mucho tiempo." #NT!
 elgar.831.f: "'---------' -la marcha real" #NT!
  
