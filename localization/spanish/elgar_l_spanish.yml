 je_elgar_accademia_santa_cecilia: "Elevar a Santa Cecilia al rango de academia" #NT!
 je_elgar_accademia_santa_cecilia_reason: "La Accademia di Santa Cecilia fue fundada por el toro papal 'Ratione Congruit' por Sixtus V en 1585 en forma de congregación. En 1838, la Congregación de Santa Cecilia fue nombrada oficialmente una Academia y luego la Academia Pontificia. Sus miembros en ese momento incluían Luigi Cherubini, Mercadante, Donizetti, Rossini, Paganini, Auber, Liszt, Mendelssohn, Berlioz, Gounod y Meyerbeer. Uno de sus miembros honorarios fue la reina Victoria. En United Italia se convirtió en un conservatorio líder." #NT!
 je_elgar_leipzig_conservatory: "Encontró el conservatorio de Leipzig" #NT!
 je_elgar_leipzig_conservatory_reason: "La ciudad de la música tradicional de Leipzig, donde Johann Sebastian Bach ya estaba activa, ofrecía condiciones óptimas para la fundación de una fábrica de talentos musicales y académicos a principios del siglo XIX. Cuatro ciudadanos comprometidos de la ciudad, a saber, el abogado Heinrich Conrad Schleinitz (segundo director), el director de distrito de Leipzig Johann Paul von Falkenstein y el concejal de la Royal Saxon Councilor Johann Georg Keil, así como el Gewandhaus Kapellmeister Felix Mendelssohn Bartholdy en la práctica." #NT!
 je_elgar_petrograd_conservatory: "Encontró el conservatorio de Petrogrado" #NT!
 je_elgar_petrograd_conservatory_reason: "Sobre la iniciativa de la Gran Duquesa Elena Pavlovna, Anton Rubinstein, Andrei Nikolayevich Markovich y otras personalidades de la sociedad y la vida musical, se fundó la Sociedad de Música Rusa, de cuyas clases de música se fundó el primer conservatorio en Rusia. Anton Rubinstein fue el primer director del Conservatorio y Profesor de Piano. El primer graduado en completar sus estudios de composición aquí fue Peter Tchaikovsky. Nikolai Andreyevich Rimsky-Korsakov tuvo un papel particularmente influyente como profesor de composición e instrumentación y jefe de la clase de orquesta." #NT!
  
 elgar.201.t: "El premio [SCOPE.sState('elgar_art_capital').GetCityHubName]" #NT!
 elgar.201.d: "La élite de nuestro país amante del arte está presionando por un premio de artista para las mejores composiciones." #NT!
 elgar.201.f: "Las naciones que tienen un centro de irracionalismo o impresionismo organizan competiciones musicales de vez en cuando. Los cinco compositores más hábiles reciben un premio que tiene algún impacto en su reputación. Por lo general, se otorga un premio de arte cada cinco años. No se invitan a grandes compositores, ya han recibido su recompensa." #NT!
 elgar.201.g: "Deberíamos organizar una competencia de arte." #NT!
 elgar.201.h: "¡Qué desperdicio de dinero!" #NT!
 elgar.202.t: "El premio [SCOPE.sState('elgar_art_capital').GetCityHubName]" #NT!
 elgar.202.d: "El jurado ha llegado a una conclusión y ha seleccionado las mejores composiciones. La lista de cinco ganadores ya está haciendo las rondas." #NT!
 elgar.202.f: "1. [SCOPE.sCharacter('elgar_character_first_winner_scope').GetFullName] de [GetGlobalVariable('elgar_prize_winner_1_global_var').GetCountry.GetName] \ n2.   [SCOPE.sCharacter('elgar_character_second_winner_scope').GetFullName] de [GetGlobalVariable('elgar_prize_winner_2_global_var').GetCountry.GetName] \ n3.   [SCOPE.sCharacter('elgar_character_third_winner_scope').GetFullName] de [GetGlobalVariable('elgar_prize_winner_3_global_var').GetCountry.GetName] \ n4.   [SCOPE.sCharacter('elgar_character_fourth_winner_scope').GetFullName] de [GetGlobalVariable('elgar_prize_winner_4_global_var').GetCountry.GetName] \ n5.   [SCOPE.sCharacter('elgar_character_fifth_winner_scope').GetFullName] de [GetGlobalVariable('elgar_prize_winner_5_global_var').GetCountry.GetName]" #NT!
 elgar.202.g: "Premio a los ganadores." #NT!
  
 elgar.1201.t: "Daphnis et Chloé" #NT!
 elgar.1201.f: "Daphnis et Chloé es una sinfonía corégraphique, o sinfonía coreográfica, para orquesta y coro sin palabras. Está en tres secciones principales, o fiestas, y en una docena de escenas, la mayoría de ellas baila y dura poco menos de una hora, lo que lo convierte en el trabajo más largo del compositor. En efecto, es un ballet, y se presentó por primera vez como tal. El escenario de baile fue adaptado por el coreógrafo Michel Fokine de un romance pastoral del escritor griego Longus pensó hasta la fecha del siglo II dC. Con casi una hora de duración, Daphnis et Chloé es el trabajo más largo de Ravel. Cuatro leitmotifs discernibles le dan unidad musical. La música, algunas de las más apasionadas del compositor, es ampliamente considerada como algunas de las mejores, con armonías extraordinariamente exuberantes típicas del movimiento impresionista; Incluso durante la vida del compositor, los comentaristas lo describieron como su obra maestra para la orquesta." #NT!
 elgar.1202.t: "Rhapsodie Espagnole" #NT!
 elgar.1202.f: "Compuesto entre 1907 y 1908, el Rapsodie es uno de los primeros trabajos importantes de Ravel para la orquesta. Se realizó por primera vez en París en 1908 y rápidamente ingresó al repertorio internacional. La pieza se basa en la herencia española del compositor y es una de sus obras establecidas o reflejando España. El estreno del Rapsodie fue dado por Orchester Des Concerts Colonne, dirigido por Édouard Colonne, en el Théâtre du Châtelet el 15 de marzo de 1908. La recepción crítica fue generalmente favorable. Las voces disidentes fueron Pierre Lalo, a quien no le gustaba la música de Ravel, y Gaston Carraud, quien calificó la partitura "delgada, inconsistente y fugitiva". De lo contrario, hubo muchos elogios por la orquestación sutil y fresca y la pintorescos de la música." #NT!
 elgar.1203.t: "Bolero" #NT!
 elgar.1203.f: "'Solo he hecho una obra maestra, ese es el boléro; Lamentablemente no contiene música. -Maurice Ravel" #NT!
  
 elgar.1211.t: "Técnica de doce tonos" #NT!
 elgar.1211.f: "La técnica de doce tonos, también conocida como dodecafonía, serialismo de doce tonos y (en uso británico) composición de doce notas, es un método de composición musical. La técnica es un medio para garantizar que las 12 notas de la escala cromática se suenen tan a menudo como en una pieza musical, al tiempo que evitan el énfasis de cualquier nota mediante el uso de filas de tono, pedidos de las 12 clases de tono. Por lo tanto, las 12 notas tienen más o menos igual importancia, y la música evita estar en una clave. Con el tiempo, la técnica aumentó mucho en la popularidad y finalmente se volvió ampliamente influyente en los compositores del siglo XX. Se considera comúnmente una forma de serialismo." #NT!
 elgar.1211.g: "No estoy tan seguro de si esa fue una buena idea." #NT!
 elgar.1212.t: "String Quartett No 2." #NT!
 elgar.1212.f: "Este trabajo en cuatro movimientos fue escrito durante un momento muy emotivo en la vida de Schoenberg. El tercer y cuarto movimientos son bastante inusuales para un cuarteto de cuerda, ya que también incluyen un cantante de soprano, utilizando poesía escrita por Stefan George. Al establecer George, el propio Schoenberg luego escribió: 'Me inspiré en poemas de Stefan George, el poeta alemán, para componer música a algunos de sus poemas y, sorprendentemente, sin ninguna expectativa de mi parte, estas canciones mostraron un estilo bastante diferente de todo lo que había escrito antes. ... Se produjeron nuevos sonidos, apareció un nuevo tipo de melodía, se descubrió un nuevo enfoque para la expresión de los estados de ánimo y los personajes." #NT!
 elgar.1212.g: "¡Excelente! Pero, ¿puede detenerse la 'música' por ahora?" #NT!
 elgar.1213.t: "Sinfonía de cámara No. 1" #NT!
 elgar.1213.f: "La primera sinfonía de cámara de Schoenberg se terminó en 1906 y se estrenó el 8 de febrero de 1907 en Viena por el cuarteto Rosé junto con un conjunto de viento de la Filarmónica de Viena, bajo el testigo del compositor. En 1913, Schoenberg volvió a dirigir la pieza, como parte del famoso Skandalkonzert, en el que las tonalidades heterodoxas de la sinfonía de Schoenberg y, más aún, de las obras de su estudiante Alban Berg incitaron a los asistentes a embruce en protestas y terminan prematuramente el concierto." #NT!
 elgar.1213.g: "¿Esto nunca terminará?" #NT!
  
 elgar.1221.t: "El Firebird" #NT!
 elgar.1221.f: "El Firebird es un trabajo de concierto de ballet y orquestal basado en los cuentos de hadas rusos del Firebird y la bendición y maldición que posee para su dueño. Los elementos mortales y sobrenaturales del ballet se distinguen con un sistema de leitmotifs colocados en la armonía denominada 'Leit-Harmony'. Stravinsky utilizó intencionalmente muchas técnicas especializadas en la orquesta, incluidas Ponticello, Col Legno, Flautando, Glissando y Lighting Tonging. Ubicado en el malvado castillo inmortal de Koschei, el ballet sigue al Príncipe Ivan, quien lucha contra Koschei con la ayuda del Firebird mágico." #NT!
 elgar.1222.t: "Petrouchka" #NT!
 elgar.1222.f: "Petrushka fue escrita para la temporada de París de 1911 de la compañía Russes Ballets de Sergei Diaghilev. El ballet cuenta la historia de los amores y los celos de tres títeres. Los tres son cobrados por el Charlatan durante la Feria de Shrovetide de 1830 (Maslenitsa) en San Petersburgo. Petrushka reúne música, baile y diseño en un todo unificado. Es una de las producciones de Ballets Russes más populares. Por lo general, se realiza hoy utilizando los diseños y la coreografía originales. El trabajo se caracteriza por el llamado acorde de Petrushka, un dispositivo de bitonalidad que anuncia la apariencia del personaje principal." #NT!
 elgar.1223.t: "Sacre du Printemps" #NT!
 elgar.1223.f: "El rito de la primavera es un trabajo de concierto de ballet y orquestal del compositor ruso Igor Stravinsky. Fue escrito para la temporada de París de 1913 de Sergei Diaghilev's Ballets Russes Company; La coreografía original fue de Vaslav Nijinsky con diseños de escenarios y disfraces de Nicholas Roerich. Cuando se presentó por primera vez en el Théâtre des Champs-Elysées el 29 de mayo de 1913, la naturaleza vanguardista de la música y la coreografía causó una sensación. Muchos han llamado a la reacción de la primera noche como 'Riot' o 'cercano', aunque esta redacción no se produjo hasta las revisiones de actuaciones posteriores más de una década después. Aunque diseñado como un trabajo para el escenario, con pasajes específicos que acompañan a los personajes y la acción, la música logró un reconocimiento igual, si no mayor, como una pieza de concierto y se considera ampliamente como una de las obras musicales más influyentes del siglo XX." #NT!
  
