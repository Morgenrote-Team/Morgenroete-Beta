 elgar.90.h: "Deberíamos intensificar los esfuerzos culturales en nuestra capital." #NT!
 elgar.91.t: "Tivoli Glass Hall" #NT!
 elgar.91.d: "Los jardines de Tivoli han sido extremadamente populares entre el público de Copenhague durante años. Hay un plan para construir una sala de conciertos para que alrededor de 1,000 personas entretenan a la audiencia con música estimulante." #NT!
 elgar.91.f: "Una sala de conciertos se encontraba entre las atracciones cuando Tivoli Gardens abrió por primera vez sus puertas en 1843. Era un edificio rectangular de madera diseñado por Harald Conrad Stilling. Hans Christian Lumbye fue director musical y director principal desde 1843 hasta 1872. Escribió casi 700 composiciones para la orquesta, especialmente Polkas, Valses y Galops. La sala de conciertos fue expandida por Johan Andreas Stillmann en 1863." #NT!
 elgar.91.g: "¡Espero que el Sr. Lumbye se presente con sus famosos Galops!" #NT!
 elgar.92.t: "Gran Teatro Nacional" #NT!
 elgar.92.d: "Con el plan para construir una gran ópera en la Ciudad de México, el gobierno está planeando uno de los proyectos de construcción más grandes en la historia del país." #NT!
 elgar.92.f: "El teatro fue construido entre 1840 y 1844 por el arquitecto Lorenzo de la Hidalga en la Ciudad de México. Los historiadores lo consideran el trabajo arquitectónico más importante en la Ciudad de México entre la finalización de la Catedral Metropolitana y la construcción del Palacio de Bellas Artes. El gran teatro nacional fue inaugurado en uno de los términos de Antonio López de Santa Anna como presidente. Su nombre cambió sucesivamente, desde el gran teatro de Santa Anna hasta Great Theatre Vergara, luego Great Imperial Theatre, y finalmente Great National Theatre. Durante la temporada de ópera de 1852, el teatro estrenó 17 óperas y ofreció más de 60 actuaciones." #NT!
 elgar.93.t: "Teatro Amazonas" #NT!
 elgar.93.d: "Debido al auge que la región está experimentando a través del cultivo de caucho, Manaus recibirá una opulenta casa de ópera, ¡en el medio de la jungla!" #NT!
 elgar.93.f: "El Teatro Amazonas fue construido durante el Belle Époque en un momento en que se hicieron fortunas en el auge del caucho. La construcción del Amazon Theatre fue propuesta por primera vez en 1881 por un miembro de la Cámara de Representantes local, Antonio José Fernandes Júnior, quien imaginó una 'joya' en el corazón de la selva amazónica. El estilo arquitectónico del teatro se considera típicamente renacimiento del Renacimiento. Las baldosas de techo se importaron de Alsacia, las paredes de acero de Glasgow, Escocia y el mármol de Carrara para las escaleras, estatuas y columnas, de Italia. La cúpula está cubierta de 36,000 baldosas de cerámica decoradas pintadas en los colores de la bandera nacional de Brasil. El mobiliario interior provino de Francia en el estilo Louis Quinze. El artista italiano Domenico de Angelis, el joven, pintó los paneles que decoran los techos del auditorio y de la cámara de audiencia." #NT!
  
 elgar.101.t: "Un monumento para Beethoven" #NT!
 elgar.101.d: "Después de una llamada del compositor Robert Schumann, varios intelectuales, pero también ciudadanos, patriotas y aquellos interesados ​​en el arte hablaban a favor de erigir un monumento a Ludwig Van Beethoven en Bonn." #NT!
 elgar.101.f: "'El mausoleo de la memoria futura ya está frente a mí en persona: un cuboides razonablemente alto, una lira con el año de nacimiento y muerte, el cielo de arriba y algunos árboles al lado. Toda una nación enfrentada con un Beethoven que les enseña grandeza y orgullo en cada página, ¿no deberían poder establecer un monumento mil veces mayor para él? Si yo fuera un príncipe, ¡le construiría un templo al estilo palladiano! Forma en una forma gigantesca, como Saint Borromeo en Lago Maggiore, de modo que, como lo hizo en la vida, podría mirar por las montañas y las montañas, y cuando los barcos de Rin vuelen y los extraños pregunten: qué significa el gigante, entonces cada niño puede responder: Beethoven es eso, y pensarán que es un emperador alemán. En una palabra: ¡Levántate, deja de lado tu flema y considera que el monumento será tuyo! - Robert Schumann" #NT!
 elgar.101.g: "¡Beethoven era un titán alemán de música!" #NT!
 elgar.101.h: "Estamos felices de financiar este proyecto culturalmente valioso." #NT!
 elgar.101.i: "No puede haber sido tan bueno si no tenía un monumento antes." #NT!
 elgar.102.t: "Preparando el Festival Beethoven" #NT!
 elgar.102.d: "Se realizan los toques finales en el monumento de Beethoven. Ahora es el momento de prepararse para la inauguración." #NT!
 elgar.102.f: "El Festival Beethoven para la inauguración del Monumento Beethoven fue un importante evento musical de posición internacional. Además del rey prusiano, la reina británica Victoria también fue invitada, los grandes intelectuales como Alexander von Humboldt se encontraban entre los invitados, y los compositores del rango de Héctor Berlioz, Giacomo Meyerbeer y, sobre todo, Franz Liszt dieron forma a los cuatro días. Se suponía que miles de personas participarían en el festival, que planteó serios problemas para la pequeña ciudad de Bonn." #NT!
 elgar.102.g: "¡Envía las invitaciones!" #NT!
 elgar.103.t: "Invitación para el Festival Beethoven" #NT!
 elgar.103.d: "Nuestro gobierno ha recibido una invitación oficial al Festival Beethoven en Bonn, donde se presentará el monumento del compositor." #NT!
 elgar.103.g: "Con mucho gusto asistiremos." #NT!
 elgar.103.h: "La música clásica está sobrevalorada." #NT!
 elgar.104.t: "Construye el Beethoven Hall" #NT!
 elgar.104.d: "Debido a la gran cantidad de visitantes, Franz Liszt propuso desviar a los hombres y el material del sitio de construcción de la Catedral de Colonia a Bonn para construir una sala de festivales en tiempo récord." #NT!
 elgar.104.f: "La presentación oficial del Monumento Beethoven debía ser el punto culminante de un festival de Beethoven de 3 días. Un mes antes de que comenzara el festival, no había un lugar adecuado para celebrar los 3.000 asistentes esperados. En las impulso de Liszt, y solo después de que se ofreció a soportar el costo total, el comité contrató a un arquitecto y constructores para construir el Beethoven Hall. Para cuando finalmente comenzaron, tenían menos de dos semanas para hacer esto, y tuvieron que trabajar durante todo el día para terminarlo a tiempo. Franz Liszt también habló con los constructores de la Catedral de Colonia. La madera se cargó de Colonia a Bonn a través del Rin. Las decoraciones hechas en Colonia también llegaron a Bonn tan rápido. En solo once días, se creó un salón de festivales a partir de la nada." #NT!
 elgar.104.g: "Espléndido." #NT!
 elgar.105.t: "El festival de Beethoven" #NT!
 elgar.105.d: "Después de cuatro días de música de primera clase, el Festival Beethoven puede considerarse un éxito completo, incluso si los eventos de esta magnitud no pueden prescindir de sus escándalos." #NT!
 elgar.105.f: "La ceremonia no estuvo exenta de momentos incómodos. El Monumento de Beethoven le dio la espalda a los invitados más importantes, el rey Frederick William IV de Prusia y la reina británica Victoria, que había tomado sus lugares en el balcón del Palacio Fürstenberg. Alexander von Humboldt salvó el día al comentar que Beethoven siempre había sido un tipo grosero. Aún más vergonzoso fue el hecho de que, durante las brindis en el banquete del festival en la 'Goldene Stern', Liszt desairó al contingente francés dirigido por Berlioz y casi causó un motín. El banquete se vio interrumpido por el comportamiento de Lola Montez, quien bailó en una mesa y avergonzó a Liszt insistiendo en que ella fue su invitada en las celebraciones y exigió un asiento apropiado para su estado reclamado, alterando así un acuerdo de asiento preorganizado." #NT!
 elgar.105.g: "Beethoven nos da la espalda a nosotros?" #NT!
 elgar.105.h: "Alexander von Humboldt es un caballero." #NT!
 elgar.105.i: "Estos alemanes no tienen elegancia." #NT!
 elgar.105.j: "Esto fue inspirador." #NT!
 elgar.106.t: "Liszt Cantata" #NT!
 elgar.106.d: "Franz Liszt tuvo el gran honor de escribir y realizar públicamente la cantata para la inauguración del Monumento Beethoven." #NT!
 elgar.106.f: "'Sea como fuere, su cantata, realmente bien realizada y aplaudida calurosamente por tres cuartos y medio del pasillo, es algo grande y hermoso, que a la vez eleva a Liszt muy muy altamente entre los compositores. La expresión en él es verdadera, la entonación correcta, el estilo sublime y la nueva, la forma bien concebida y obediente, la instrumentación notable por su vigor y variedad. Nunca hay una sucesión de los mismos sonidos en su orquesta, lo que hace que ciertas obras, una vez apreciadas, tan agotador para el oyente; Él sabe cómo usar los medios pequeños y grandes, no exige ni los instrumentos ni las voces demasiado; En una palabra, se mostró en una caída que tenía estilo en la instrumentación y en las otras partes del arte musical, ya que uno temía que aún no lo había encontrado '. - Héctor Berlioz" #NT!
 elgar.106.g: "¡Granizo! ¡Granizo! Beethoven, ¡salve!" #NT!
 elgar.107.t: "Berlioz en el Festival Beethoven" #NT!
 elgar.107.d: "Las celebraciones que rodean la presentación del Monumento de Beethoven han dado considerable inspiración al compositor Héctor Belrioz." #NT!
 elgar.107.f: "'Fue durante este viaje a Austria, Hungría, Bohemia y Silesia que comencé a componer mi leyenda de Fausto, cuyo plan había estado reflexionando durante mucho tiempo. Tan pronto como resolví emprenderlo, tuve que conformarme con escribirme la mayor parte del libreto también; Los fragmentos de la traducción al francés de Fausto de Goethe por Gérard de Nerval, que ya había establecido en la música veinte años antes, y que tenía la intención de incluir en la nueva partitura en una versión revisada, y dos o tres escenas que habían sido escritas antes de mi desviación de París por M. Gandonnière después de mis instrucciones, no se acumuló hasta un nivel completo de todo el trabajo. Durante el viaje en el antiguo entrenamiento de escenario alemán, por lo tanto, intenté escribir los versos destinados a mi música. Comencé con la invocación de Faust a la naturaleza, sin intentar traducir o incluso imitar la obra maestra de Goethe, pero solo para inspirarme y extraer la sustancia musical que contenía. Una vez que comencé, escribí los versos restantes cuando las ideas musicales se me ocurrieron, y compuse la partitura con una facilidad que rara vez he experimentado con mis otros trabajos ''. - Héctor Berlioz" #NT!
 elgar.107.g: "Entonces, ¿valió la pena el viaje?" #NT!
 elgar.108.t: "Victoria visita la Catedral de Colonia" #NT!
 elgar.108.d: "La reina de Gran Bretaña, Victoria, usó su estadía en Renania como una oportunidad para visitar la Catedral de Colonia y obtener más información sobre la construcción de la catedral que acaba de comenzar." #NT!
 elgar.108.f: "La partida temprana de la Royal Company del concierto se debió al hecho de que en la tarde hubo un recorrido por la Catedral de Colonia, que tuvo lugar al timbre festivo de las campanas. Luego, las majestades continuaron a través de la entrada principal de la nave central al coro, en el que la Sociedad Coral Men Men's Reting Weber interpretaba una cantata de celebración con el acompañamiento de órganos del director musical Weber." #NT!
 elgar.108.g: "Somos honrados." #NT!
  
 elgar.111.t: "Un monumento para Mozart" #NT!
 elgar.111.d: "Los preparativos para erigir un monumento a Wolfgang Amadeus Mozart están en pleno apogeo. Sin embargo, todavía se están recolectando donaciones." #NT!
 elgar.111.f: "En 1835, el escritor Julius Schilling, que vino de Posen en lo que ahora es Polonia, sugirió un monumento sobre lo que ahora es Mozartplatz para Mozart, quien era relativamente desconocido en Salzburgo en ese momento. Patrocinadores significativos en el extranjero, pero también en Viena finalmente apoyaron la construcción del monumento. El rey bávaro Ludwig I de Baviera donó una suma considerable y donó la base de la estatua de bronce." #NT!
 elgar.111.g: "¡Mozart era un titán alemán de música!" #NT!
 elgar.113.t: "El monumento de Mozart" #NT!
 elgar.113.d: "Hoy, el monumento para el mejor hijo de Slazburg fue presentado en su lugar de nacimiento." #NT!
 elgar.113.f: "Diseñado por Ludwig Schwanthaler y fundido por Johann Bautista Stiglmaier, el monumento se presentó ceremonialmente el 5 de septiembre de 1842 en presencia de los dos hijos sobrevivientes de Mozart, Franz Xaver y Carl Thomas. Sin embargo, la viuda de Mozart no pudo ver la inauguración. Había muerto poco antes en la casa en Mozartplatz 8. Un festival con una procesión de antorcha, viajes en barco, trenes alpinos, disparos de objetivos y carreras de caballos enmarcaban la celebración." #NT!
 elgar.114.t: "Un monumento vivo" #NT!
 elgar.114.d: "Los esfuerzos para erigir un monumento a Mozart están aumentando en Austria. Por lo tanto, algunos ciudadanos de Frankfurt quieren organizar un concierto benéfico y vincular la idea con contenido político." #NT!
 elgar.114.f: "Originalmente, la ciudadanía de Frankfurt quería organizar un concierto para recolectar suficientes donaciones para un monumento de Mozart. Los monumentos a las personalidades burguesas fueron una novedad en Alemania. La erección de los monumentos en honor a figuras nacionales como artistas o científicos fue, por lo tanto, una oportunidad bienvenida para expresar sentimientos patrióticos. Algunos en Frankfurt incluso sugieren organizar una reunión de cantantes nacionales, cuyos ingresos deberían fluir hacia una base para que los músicos alemanes promuevan a los músicos jóvenes." #NT!
 elgar.114.g: "Recoge dinero para nuestro propio Memorial Living: ¡un festival en honor a Mozart!" #NT!
 elgar.114.h: "Done dinero al monumento en Salzburgo." #NT!
 elgar.115.t: "Invitación al Sängerfest" #NT!
 elgar.115.d: "La ciudadanía de Frankfurt ha invitado a cantantes patrióticos de nuestra nación a participar en un festival de Mozart." #NT!
 elgar.115.g: "Una oportunidad musical y nacional." #NT!
 elgar.115.h: "No puedo soportar canciones de arte." #NT!
 elgar.116.t: "El festival Mozart" #NT!
 elgar.116.d: "42 sociedades corales de Renania, Baden, Hessen y Franconia se conocieron en Frankfurt para celebrar un festival de tres días de música de Mozart. Sin embargo, el evento se convirtió en una manifestación para la unificación política de Alemania. El dinero recaudado se recaudó para una fundación para apoyar a los jóvenes compositores." #NT!
 elgar.116.f: "'La ciudad entró en éxtasis. Las casas estaban llenas de gente hasta los tragaluces. La gente de Mainz, Hanau y Offenbach vinieron en barco al sonido de las tomas de cañón, rodeadas de botes decorados con música; A través de todas las puertas entraron. Era una vista poderosamente conmovedora, el interés artístico se volvió secundario, pero el nacional nos acercó poderosamente; No negaré que las lágrimas brillantes corrieron por mis mejillas. - Heinrich Hoffmann" #NT!
 elgar.116.g: "La música reúne a la nación." #NT!
 elgar.117.t: "Los alborotadores liberales hacen ruido en Frankfurt" #NT!
 elgar.117.d: "No ha escapado de nuestro aviso de que algunos 'patriotas' con mentalidad de jacobin han explotado un supuesto festival de Mozart en Frankfurt por su agitación política." #NT!
 elgar.117.f: "42 sociedades corales de Renania, Baden, Hessen y Franconia se conocieron en Frankfurt para celebrar un festival de tres días de música de Mozart. Sin embargo, el evento se convirtió en una manifestación para la unificación política de Alemania. El evento se basó originalmente en financiar el Monumento de Mozart, pero los iniciadores pronto cambiaron el propósito de la organización benéfica a favor de su propia base." #NT!
 elgar.117.g: "¡Una conspiración contra el orden en la confederación alemana!" #NT!
 elgar.117.h: "Déjalos cantar." #NT!
  
 elgar.121.t: "La fundación de la Asociación General de Música Alemana" #NT!
 elgar.121.d: "Hoy, el Allgemeiner Deutscher Musikverein (Asociación General de Música Alemana) se fundó en [SCOPE.sState('elgar_musikverein_capital').GetCityHubName]. Inmediatamente surgió una discusión sobre si pertenecemos a la nueva escuela alemana o si defendemos la idea conservadora de la música." #NT!
 elgar.121.f: "La nueva escuela alemana es un término introducido en 1859 por Franz Brendel, editor del Neue Zeitung Für Musik, para describir ciertas tendencias en la música alemana. Ha sido utilizado por diferentes personas en diferentes momentos con diferentes significados. En general, se acuerda que Franz Liszt y Richard Wagner se encontraban entre los representantes más destacados de la "nueva escuela alemana". También hay un consenso en el que Johannes Brahms no participó. Más allá de esto, las interpretaciones difieren. El nuevo término debe entenderse como denota todo el período desde la muerte de Beethoven. Según Brendel, era un uso común llamar al período de J.S. Bach y Handel 'Old German School'. El período posterior fue el de los maestros vienos como Mozart que había sido influenciado por el estilo italiano. Beethoven había redirigido el interés al norte alemán nuevamente y con esto había abierto el 'Neudeutsche Schule'. Los compositores de ambos lados miraron hacia Beethoven como su héroe espiritual y artístico; Los conservadores lo ven como un pico insuperable, los progresistas como un nuevo comienzo en la música." #NT!
 elgar.121.g: "Somos parte de la nueva escuela alemana." #NT!
 elgar.121.h: "Defendemos la escuela alemana tradicional." #NT!
 elgar.122.t: "Membresía en la Asociación General de Música Alemana" #NT!
 elgar.122.d: "Los artistas de nuestra nación fueron invitados a la recién fundada Asociación General de Música Alemana. Inmediatamente surgió una discusión sobre si pertenecemos a la nueva escuela alemana o si defendemos la idea conservadora de la música." #NT!
 elgar.123.t: "Ubicación del próximo Congreso del músico" #NT!
 elgar.123.d: "Los miembros de la Asociación General de Música Alemana han elegido [SCOPE.sState('elgar_musikverein_capital').GetCityHubName] como la ubicación para la próxima reunión del Tonkünstler-Versammlung (Congreso del Músico)." #NT!
 elgar.123.f: "En 1859, la primera reunión de Tonkünstler tuvo lugar con motivo del 25 aniversario de la nueva revista para música en Leipzig. Durante la segunda reunión de Tonkunstler (1861) en Weimar, los estatutos de la Asociación General de Música Alemana (ADMV) fueron adoptados por más de 700 miembros fundadores. La nueva revista de música se convirtió en el órgano de la asociación. A finales del siglo XIX, el ADMV estaba bajo el protectorado del Gran Duque de Weimar. El ADMV ha celebrado una serie de grandes reuniones de Tonkunstler. Se orientó principalmente a la dirección de la nueva escuela alemana representada por Franz Liszt y Richard Wagner. Como parte de los objetivos artísticos del ADMV, se organizarían reuniones anuales de Tonkünstler en diferentes lugares, con actuaciones de importantes, raramente escuchadas, y especialmente nuevas obras musicales de todo tipo. Sin embargo, las obras más antiguas que rara vez se escucharon o no se escucharon en absoluto, pero de interés debido a su importancia, también debían realizarse. Además, se imprimirían nuevas obras, ya sea musicales o académicas." #NT!
 elgar.123.g: "¡Estamos honrados!" #NT!
 elgar.124.t: "Congreso del músico en [SCOPE.sState('elgar_tonkunstler_state').GetCityHubName]" #NT!
 elgar.124.d: "Tonkünstler-Inverammlung de este año (Congreso del músico) tendrá lugar en [SCOPE.sState('elgar_tonkunstler_state').GetCityHubName]. Nuestros artistas son invitados cordialmente a discutir música y escuchar la interpretación de piezas de música nuevas y olvidadas." #NT!
 elgar.124.g: "Disfrutemos de la música y escuchemos las contribuciones de personas de ideas afines." #NT!
 elgar.124.h: "El lugar justo para repartir contra estos diletantes musicales." #NT!
 elgar.124.i: "Este será el día de la verdad: ¡nuestra idea de la música es la única correcta!" #NT!
 elgar.125.t: "Guerra de los románticos" #NT!
 elgar.125.d: "Una disputa entre los representantes de la nueva escuela alemana y los representantes más conservadores ha llevado a un escándalo público. Una guerra completa entre las dos facciones ya está en la prensa. Es hora de que [ROOT.GetCountry.GetName] respalde a sus artistas." #NT!
 elgar.125.f: "La 'Guerra de los Románticos' es un término utilizado por algunos historiadores de la música para describir el cisma entre los músicos prominentes en la segunda mitad del siglo XIX. La estructura musical, los límites de la armonía cromática y la música del programa versus la música absoluta fueron las principales áreas de disputa. Las partes opuestas cristalizaron durante la década de 1850. Los miembros más destacados del círculo conservador fueron Johannes Brahms, Joseph Joachim, Clara Schumann y el Conservatorio Leipzig, que había sido fundado por Felix Mendelssohn. Sus oponentes, los progresistas radicales principalmente de Weimar, fueron representados por Franz Liszt y los miembros de la llamada nueva escuela alemana (alemán: Neudeutsche Schule), y por Richard Wagner. La controversia era de origen alemán y de Europa Central; Los músicos de Francia, Italia y Rusia solo estaban marginalmente involucrados. Los compositores de ambos lados miraron hacia Beethoven como su héroe espiritual y artístico; Los conservadores lo ven como un pico insuperable, los progresistas como un nuevo comienzo en la música." #NT!
 elgar.125.g: "¡Apoye a la nueva escuela alemana!" #NT!
 elgar.125.h: "¡Apoye a la escuela alemana tradicional!" #NT!
 elgar.126.t_konservativ: "Los conservadores ganan la 'Guerra de los Románticos'" #NT!
 elgar.126.d_konservativ: "La abrumadora mayoría de los seguidores de la escuela tradicional ganó la disputa sobre el futuro de la música. Si el contenido es correcto es de importancia secundaria: la masa de contribuciones a los debates y la polémica determina la imagen pública." #NT!
 elgar.126.f_konservativ: "Un punto central de desacuerdo entre estos dos grupos de músicos fue entre las formas musicales tradicionales y nuevas. Esta fue una consecuencia del debate sobre la viabilidad del género sinfónico, que había crecido en manos de Ludwig Van Beethoven de uno destinado al entretenimiento a una forma que incluía ideales sociales, morales y culturales. Liszt y su círculo favorecieron nuevos estilos en la escritura y las formas que combinarían música con ideas narrativas e pictóricas. Hacia este fin, Liszt desarrolló el poema sinfónico. La Escuela Leipzig/Berlín defendió las formas utilizadas por los Masters clásicos, formas codificadas por musicólogos como Adolf Bernhard Marx de principios del siglo XIX. La validez de la música del programa también fue un punto de disputa. En su libro de 1854, Vom Musikalisch-Schönen, Hanslick declaró que la música no podía y no podía representar nada específico que no sea sí mismo. \ n \ n Al final, #G [GetGlobalVariable('elgar_neudeutsch_yes').GetValue]#! miembros apoyaron la nueva escuela alemana y #R [GetGlobalVariable('elgar_konservativ_yes').GetValue]#! los miembros apoyaron la escuela tradicional." #NT!
 elgar.126.g: "La escuela tradicional es triunfante." #NT!
 elgar.126.t_neudeutsch: "Los progresistas ganan la 'Guerra de los Románticos'" #NT!
 elgar.126.d_neudeutsch: "La abrumadora mayoría de los seguidores de la nueva escuela alemana ganó la disputa sobre el futuro de la música. Si el contenido es correcto es de importancia secundaria: la masa de contribuciones a los debates y la polémica determina la imagen pública." #NT!
 elgar.126.f_neudeutsch: ""
 elgar.126.h: "La nueva escuela alemana es triunfante." #NT!
  
 elgar.131.t: "Franz Liszt comienza su gira europea" #NT!
 elgar.131.d: "Después de un momento bastante infeliz en París, Franz Liszt decidió emprender una gira después del ejemplo de su rival Thalberg y convertirse en músico célebre internacionalmente. Su primer destino será [SCOPE.sCountry('elgar_liszt_destination_scope').GetNameNoFlag]." #NT!
 elgar.131.f: "Franz Liszt fue un compositor austrohúngaro, pianista, director, director de teatro, profesor de música. Liszt fue uno de los virtuosos de piano más prominentes e influyentes y, con una obra de más de 1300 obras y arreglos, uno de los compositores más productivos del siglo XIX. Aunque una gran parte de su obra puede asignarse a la literatura de piano, Liszt también dio un claro impulso a la música orquestal con el desarrollo del poema sinfónico. Su concepto de música del programa y el uso de nuevos medios armónicos y formales lo hicieron, junto con Richard Wagner, el protagonista más conocido de la nueva escuela alemana. Liszt comenzó una extensa gira por Europa en 1839, que continuó durante los siguientes ocho años. Este período fue el más brillante de Liszt como pianista de concierto y recibió muchos honores y mucha adulación durante sus giras. Durante este período, aparecieron los primeros informes de respuestas intensas de los fanáticos de Liszt, que se conocieron como Lisztomania. Lisztomania se caracterizó por una reacción histérica a Liszt y sus conciertos. Se informó que la interpretación de Liszt elevaba el estado de ánimo de la audiencia a un nivel de éxtasis místico." #NT!
 elgar.131.g: "Le deseamos todo lo mejor." #NT!
 elgar.132.t: "Lisztomania en [ROOT.GetCountry.GetNameNoFlag]" #NT!
 elgar.132.d: "El pianista de fama mundial Franz Liszt ha elegido nuestro país como el próximo destino de su gira europea. ¡Los teatros y las casas de ópera ya están completamente reservados!" #NT!
 elgar.132.g: "¿De dónde vienen de repente todas estas mujeres que gritan?" #NT!
 elgar.133.t: "Liszt se va" #NT!
 elgar.133.d: "Liszt terminó su estadía y agradeció la hospitalidad. Lisztomania continuará en [SCOPE.sCountry('elgar_liszt_destination_scope').GetNameNoFlag]." #NT!
 elgar.133.f: "Se estima que Liszt apareció en público más de mil veces entre 1839 y 1847. Además, su gran fama como pianista, que continuaría disfrutando mucho después de retirarse oficialmente de la etapa del concierto, se basó principalmente en sus logros durante este tiempo. Además de su reputación, Liszt regaló gran parte de los ingresos de su trabajo a caridad y causas humanitarias. Donó grandes sumas al Fondo de Construcción de la Catedral de Colonia, y la Basílica de San Stephen en Pest, e hizo donaciones privadas a servicios públicos como hospitales y escuelas, así como organizaciones caritativas como el Fondo de Pensiones de Músicos Leipzig. Después del gran incendio de Hamburgo en mayo de 1842, dio conciertos en ayuda de los que quedaron sin hogar. Para satisfacer la necesidad de sus admiradores de un mechón de su cabello, Liszt adquirió un perro cuyo pelaje sirvió desapercibido como fuente de rizos." #NT!
  
 elgar.301.t: "Buenos ensayos" #NT!
 elgar.301.d: "Los ensayos de la orquesta, realizados por un compositor itinerante, fueron muy prometedores." #NT!
 elgar.301.f: "¡Un compositor itinerante se ha ganado la orquesta como director y ya ha impresionado con los ensayos!" #NT!
 elgar.301.g: "Bien." #NT!
 elgar.302.t: "Ensayos mediocres" #NT!
 elgar.302.d: "Desafortunadamente, los ensayos de la orquesta realizados por un compositor itinerante no fueron tan buenos como la sala de conciertos esperaba ..." #NT!
 elgar.302.f: "Ya sea debido a colegas no cooperativos, artistas mal preparados o las condiciones en la sala de conciertos: los ensayos no son un buen augurio para la actuación." #NT!
 elgar.302.g: "No está bien." #NT!
 elgar.303.t: "Una dedicación amorosa" #NT!
 elgar.303.d: "Una aventura de una 'pequeña' cortesía agita los ánimos." #NT!
 elgar.303.f: "Los artistas siempre han sido conocidos por su "estilo de vida suelto" y causaron uno o dos escándalos interpersonales. La atención se basa en un pequeño gesto, que, sin embargo, tiene poder explosivo. Un compositor itinerante dedicó una sonata a una dama casada y le dio el puntaje original como regalo. Sin embargo, la mujer es la esposa de un general muy respetado en nuestro ejército. El regalo ha provocado especulaciones y podría dañar la imagen pública del hombre. El ejército exige acción." #NT!
 elgar.303.g: "¿No veo el problema?" #NT!
 elgar.303.h: "¡Indignante!" #NT!
 elgar.304.t: "Una recepción nocturna" #NT!
 elgar.304.d: "Nuestro monarca ha invitado a un compositor itinerante a una recepción principesca. El compositor mostró su gratitud con una composición." #NT!
 elgar.304.f: "Aunque la cultura musical en el siglo XIX buscó cada vez más liberarse del patrocinio, los nobles y los reyes todavía estaban a la vanguardia del patrocinio de las artes, y muchas obras musicales todavía estaban dedicadas a príncipes y reyes. Por otro lado, la relación personal a menudo significaba que los compositores que fueron excluidos de las academias y los círculos de arte pudieron encontrar el apoyo de un patrón rico si se adaptaban a su gusto personal. Una serie completa de obras maestras de Wagner, por ejemplo, no hubiera sido posible sin el apoyo personal del Rey Ludwig II de Baviera." #NT!
 elgar.304.g: "¡Qué hermosa sorpresa!" #NT!
 elgar.305.t: "¡Agotado!" #NT!
 elgar.305.d: "¡Una fila por una actuación con entradas agotadas de un gran compositor ha provocado una protesta pública!" #NT!
 elgar.305.f: "El día de un estreno, una gran multitud se había reunido expectante frente a la ópera, que se había agotado durante días; Incluso el compositor que apareció solo pudo obtener un boleto en el mercado negro. Sin embargo, dado que un empleado de teatro había vendido boletos adicionales, los boletos vendidos superaron con creces la cantidad de asientos. Hubo escenas tumultuosas en y frente al teatro en la que la música estaba casi completamente perdida; Aquellos afuera gritaron para que lo dejaran entrar, los del interior lloraron por silencio. Los coros iniciales aún se podían realizar, pero luego la orquesta se rindió, que fue cuando la raqueta realmente comenzó." #NT!
 elgar.305.g: "¿Quién es responsable de eso?" #NT!
 elgar.306.t: "Estreno sorprendente" #NT!
 elgar.306.d: "El trabajo de un compositor que falló en su país de origen ha capturado los corazones de nuestra audiencia." #NT!
 elgar.306.f: "Siempre ha habido casos en los que fallaron el estreno de obras famosas. Tales experiencias a menudo conducían no solo a las dudas serias y al final de una carrera, sino también a un intento de realizar la misma obra para una audiencia diferente. Los clásicos posteriores a menudo solo prevalecían en el segundo o tercer intento. No es el lugar del estreno, pero el lugar de éxito fue recordado como la chispa inicial real. Héctor Berlioz es un ejemplo de un compositor que disfrutó de un mayor éxito con sus obras en Gran Bretaña y Alemania que en casa en Francia." #NT!
 elgar.306.g: "Nuestra audiencia está más agradecida." #NT!
 elgar.307.t: "Amistad musical" #NT!
 elgar.307.d: "Un compositor itinerante se llevó bien con sus compañeros músicos en el sitio de inmediato." #NT!
 elgar.307.f: "La relación entre los músicos extranjeros y residentes no siempre fue fácil. No era solo el resentimiento nacional y el prejuicio personal. Algunas orquestas no podrían funcionar con el estilo de conducción de un director invitado, a veces la naturaleza a corto plazo de las actuaciones requirió compromisos, para los cuales el invitado culpó al mundo de la música local. Muchos compositores o directores locales también temían que la influencia de los extranjeros fuera demasiado grande. Sin embargo, a pesar de todos estos obstáculos, las amistades continuaron creciendo." #NT!
 elgar.307.g: "Una fructífera mierda." #NT!
 elgar.308.t: "Rivalidad musical" #NT!
 elgar.308.d: "El mundo de la música local ve la aparición de un compositor itinerante con resentimiento y sospecha." #NT!
 elgar.308.f: "'Dos grandes obras para la ópera, dos más para el Renacimiento, dos más para Opera-Comique y otra para el Teatro Italien? Parece que Monsieur Donizetti nos trata como un país conquistado, es una verdadera invasión. Uno ya no se puede hablar de las óperas de París, sino solo de las ópera de Monsieur Donizetti. - Héctor Berlioz" #NT!
 elgar.308.g: "¡Estos músicos deberían unirse!" #NT!
 elgar.309.t: "Inspiración" #NT!
 elgar.309.d: "Un compositor extranjero ha inspirado a los miembros de la orquesta estatal." #NT!
 elgar.309.f: "La influencia exterior a menudo ha marcado la diferencia en el mundo de la música local y nacional. Las piezas desconocidas, un lenguaje musical extranjero o la apariencia de un músico carismático a menudo podrían llevar a los músicos locales a ganar una perspectiva completamente nueva." #NT!
 elgar.309.g: "¿Inspiración? ¡Quiero ver resultados!" #NT!
 elgar.309.h: "Esto tendrá un efecto positivo en la orquesta." #NT!
 elgar.310.t: "Manía" #NT!
 elgar.310.d: "La aparición de un compositor ha llevado a un entusiasmo público sin precedentes, casi histérico por su trabajo. ¡La gente no tiene nada más en mente!" #NT!
 elgar.310.f: "'Cuando antes escuché de los hechizos de desmayo que estallaron en Alemania y especialmente en Berlín, cuando Liszt se mostró allí, me encogí de hombros con los hombros de lástima y pensé: la tranquila Alemania sabatónica de Alemania no desea perder la oportunidad de obtener el pequeño ejercicio necesario que lo permitió ... en su caso, pensé, es un asunto del espectáculo para el Spectacle ... por lo que explicé este Sake, explicé este Lisszomemani Las condiciones políticamente poco libres existen más allá del Rin. Sin embargo, me equivocé, después de todo, y no lo noté hasta la semana pasada, en la ópera italiana, donde Liszt dio su primer concierto ... esto realmente no fue una audiencia de Berlinate, sentimental, antes de su genio. ¡Y sin embargo, cuán convulsivamente su mera apariencia los afectó! ¡Cuán bullicioso fue el aplauso que sonó para conocerlo! ... ¡qué aclamación fue! ¡Una verdadera locura, una inaudita en los anales de Furore! - Heinrich Heine" #NT!
 elgar.310.g: "Entonces, ¿están completamente distraídos?" #NT!
 elgar.311.t: "La música reúne a la gente" #NT!
 elgar.311.d: "Un embajador pregunta si podemos obtener un boleto para un concierto de un compositor que se queda con nosotros." #NT!
 elgar.311.f: "El embajador de un gran poder es un amante de un compositor viajero que actualmente está visitando nuestro país. Le gustaría asistir a una actuación, pero no hay más asientos disponibles. Por lo tanto, nos ha pedido que usemos nuestra influencia política para que aún pueda asistir a la actuación." #NT!
 elgar.311.g: "Ja ja. No." #NT!
 elgar.311.h: "Dale un orgullo de lugar." #NT!
 elgar.312.t: "¡Intento de asesinato en la ópera!" #NT!
 elgar.312.d: "¡Un terrible intento de asesinato contra un político líder en nuestro país eclipsó el rendimiento de la ópera de hoy!" #NT!
 elgar.312.f: "Desde hace algún tiempo, la falta de legitimidad en nuestro gobierno ha causado insatisfacción entre la población. Un asesino astuto aprovechó un concierto de compositor popular para filmar a un funcionario del gobierno de alto rango durante la presentación. [SCOPE.sCharacter('elgar_leader_victim').GetFullName] fue gravemente herido. El perpetrador todavía está en la carrera, la víctima que amenazaba la vida fue llevada inmediatamente al hospital más cercano." #NT!
 elgar.312.g: "¿Dónde estaban las fuerzas de seguridad?" #NT!
 elgar.313.t: "Un trabajo menor" #NT!
 elgar.313.d: "Un pequeño trabajo compuesto por el gran compositor en nuestro país puede no ser un gran éxito, pero ha encontrado a sus fanáticos." #NT!
 elgar.313.f: "Las obras ocasionales de compositores que fueron creados aparte de las famosas obras no tenían que ser de calidad promedio al mismo tiempo. Una y otra vez, las piezas pequeñas han logrado atraer más atención que el trabajo de muchas vida. A pesar de su riqueza de trabajo, Nikolai Rimsky -Korsakov es famoso en la cultura pop por el 'Flight of the Bumblebee' (de Tsar Saltan) y Edvard Grieg por 'en el Salón del Rey de la Montaña' (de Peer Gynt), mal, pero un éxito musical es un éxito musical." #NT!
 elgar.313.g: "A veces son las pequeñas cosas las que traen alegría." #NT!
 elgar.314.t: "Sin inspiración" #NT!
 elgar.314.d: "Decepcionantemente, nuestros invitados encuentran que se queda en nuestro país completamente poco inspirador." #NT!
 elgar.314.f: "A veces simplemente no funciona." #NT!
 elgar.314.g: "Deprimente." #NT!
 elgar.315.t: "Concierto privado" #NT!
 elgar.315.d: "Además de las actuaciones oficiales, nuestro compositor dio un concierto privado en un pequeño círculo." #NT!
 elgar.315.f: "Pequeños conciertos privados de grandes compositores tienen una larga tradición. Lo más famoso por esto es Franz Schubert con las Schubertiades que llevan su nombre. En la primera Schubertiades Franz Schubert tocó el piano, y los barítonos Johann Michael Vogl y luego Carl Von Schönstein cantaron sus canciones. Las noches también incluyeron lecturas y juegos ingeniosos de entretenimiento, que a menudo tenían un tema específico. Estas fueron una mezcla de reuniones amistosas y salón musical literario." #NT!
 elgar.315.g: "Eso fue bueno." #NT!
 elgar.315.h: "¡Da Capo!" #NT!
 elgar.316.t: "Un estudiante talentoso" #NT!
 elgar.316.d: "El gran compositor en nuestro país ha descubierto el talento de uno de los líderes políticos de nuestro país y ha considerado instruirlo en su arte de composición." #NT!
 elgar.316.f: "Uno podría sorprenderse de que los políticos sean capaces de talento artístico en absoluto, y que, como malas personas, en principio no deberían ser completamente insensibles a ningún arte musical. Ciertamente había compositores con ambiciones políticas, pero muchos menos políticos con ambiciones musicales. Lo que sea que pueda poseer este político, tal vez su alma no se pierda irremediablemente después de todo." #NT!
 elgar.316.g: "Un candidato prometedor." #NT!
 elgar.316.h: "Su energía se gasta mejor en otro lugar." #NT!
 elgar.317.t: "Desastre musical" #NT!
 elgar.317.d: "Una actuación en una de nuestras salas de conciertos podría ser uno de los mayores fracasos en nuestra historia de la música." #NT!
 elgar.317.f: "La orquesta no estaba preparada, el solista se resfrió, el director no descansó y el compositor, en cuya presencia tuvo lugar la actuación, amenaza con cancelar nuestro país desde su próxima gira. ¡No hay otra forma de describirlo que un desastre!" #NT!
 elgar.317.g: "¡Una desgracia internacional!" #NT!
 elgar.318.t: "Concierto de escándalo" #NT!
 elgar.318.d: "Un concierto escandaloso, que simplemente hizo que la audiencia estuviera en armas con sus sonidos 'modernos', no solo divide la sociedad, sino que también tiene consecuencias legales." #NT!
 elgar.318.f: "Los informes de prensa en ese momento hablan de disturbios tumultuosos. Los seguidores del compositor, sus alumnos y oponentes se gritaron el uno al otro, se arrojaron el uno al otro, interrumpieron la actuación, destruyeron los muebles, etc. Varias veces, los conservadores indignados de la audiencia subieron al escenario maldeciendo para abofetear al director. Cuando amenazó esa orden se crearía con la ayuda de la autoridad pública, se dice que el tumulto realmente comenzó. Luego hubo una bofetada en la cara. En la secuela judicial posterior, un compositor de operetta que estuvo presente: el aplaudir de las bofetadas fue lo más melodioso que uno podía escuchar esa noche "." #NT!
 elgar.318.g: "La chusma no tiene sentido de cultura. ¡Eso fue excelente!" #NT!
 elgar.318.h: "Retire la pieza del tablero de inmediato." #NT!
 elgar.319.t: "Espíritu" #NT!
 elgar.319.d: "La pieza moderna, que un gran compositor realizó personalmente hoy, golpea exactamente el sabor de las masas." #NT!
 elgar.319.f: "A veces solo tienes que tener suerte." #NT!
 elgar.319.g: "¡Excelente!" #NT!
 elgar.320.t: "Propaganda musical" #NT!
 elgar.320.d: "Algunos políticos gubernamentales están considerando si la música del compositor que actualmente se queda con nosotros podría ser ... tomada para propósitos de propaganda." #NT!
 elgar.320.f: "Especialmente desde principios del siglo XX y de la sociedad de masas que produjo los regímenes totalitarios de la época, prevaleció la idea de hacer que las masas se dólares a través de la música. Mientras que algunos músicos se resistieron a la dictadura incluso en estos tiempos, hubo otros que pusieron su trabajo directamente al servicio de una ideología, o al menos permitieron que su talento fuera puesto al servicio de una dirección política." #NT!
 elgar.320.g: "La música debe estar libre de política." #NT!
 elgar.320.h: "A veces, la música debería servir a la política." #NT!
 elgar.321.t: "Grandes compositores entre ellos" #NT!
 elgar.321.d: "Nuestro invitado musical conoció a un gran compositor empleado por nuestro país. En conversaciones y caminatas de una hora, intercambiaron pensamientos e ideas musicales." #NT!
 elgar.321.f: "Grandes mentes piensan igual." #NT!
 elgar.321.g: "Una reunión histórica." #NT!
  
 elgar.406.t: "La muerte del maestro [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetLastName]" #NT!
 elgar.406.d: "[GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName], la principal autoridad musical de [GetPlayer.GetNameNoFlag], murió inesperadamente hoy. El mundo de la música llora esta gran pérdida." #NT!
 elgar.406.f: "'Mientras estamos aquí en la tumba de este difunto, somos, por así decirlo, los representantes de una nación entera, llorando la caída de la única mitad de lo que nos quedó del esplendor desaparecido del arte nativo y la floración intelectual patriótica. El heredero y expansor de Handel y Bach, de la fama inmortal de Haydn y Mozart, ha vivido su vida, y nos ponemos llorando ante la cuerda rota de la obra desvaída. ¡Déjame llamarlo así! Porque él era un artista, y lo que era, solo estaba a través del arte. -Franz Grillparzer" #NT!
 elgar.406.g: "¿Pero quién debería escribir ahora?" #NT!
 elgar.407.t: "El compositor necesita un descanso" #NT!
 elgar.407.d: "Después de completar la última tarea, [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName] primero debe encontrar fuerza e inspiración antes de completar la próxima tarea. [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetSheHe|U] ha anunciado que [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetSheHe] se retirará por algún tiempo." #NT!
 elgar.407.f: "Después de completar cada pedido, un compositor no está disponible por algún tiempo. La longitud de la ruptura depende de la edad del compositor. Los compositores jóvenes solo están fuera por unas pocas semanas, mientras que los compositores antiguos pueden tardar meses en estar disponibles nuevamente." #NT!
 elgar.407.g: "Ah, veo, 'inspiración' ..." #NT!
  
 elgar.411.t: "Concierto excelente" #NT!
 elgar.411.d: "¡La temporada de conciertos dirigida por nuestro director [SCOPE.sCharacter('elgar_conductor').GetFullName] ha superado con creces las expectativas!" #NT!
 elgar.411.f: ""La audiencia debería ser estricta, debería silbar, pero sus aplausos no deberían cometerme nada". - Giuseppe Verdi" #NT!
 elgar.411.g: "¡Bravo!" #NT!
 elgar.412.t: "Concierto mediocre" #NT!
 elgar.412.d: "La temporada de conciertos bajo el liderazgo de nuestro director [SCOPE.sCharacter('elgar_conductor').GetFullName] avanza como de costumbre. No ha habido momentos sobresalientes hasta ahora." #NT!
 elgar.412.f: ""No se debe considerarse tan divino que ocasionalmente no puede mejorar las propias obras". - Ludwig Van Beethoven" #NT!
 elgar.412.g: "*bostezo*" #NT!
 elgar.413.t: "Concierto mal" #NT!
 elgar.413.d: "La temporada de conciertos hasta ahora no solo ha estado por debajo del promedio; Las actuaciones de nuestro director [SCOPE.sCharacter('elgar_conductor').GetFullName] se consideran particularmente decepcionantes este año. El público ni siquiera pide un bis ..." #NT!
 elgar.413.f: ""Después de las últimas notas de Gotterdammerung, sentí que me habían dejado fuera de prisión". - Pjotr ​​Tchaikovsky" #NT!
 elgar.413.g: "¡Boooo!" #NT!
 elgar.414.t: "Un embajador en la audiencia" #NT!
 elgar.414.f: ""El preludio de Tristán e Isolde me recuerda a la vieja pintura italiana de un mártir cuyos intestinos se desenrollan lentamente de su cuerpo en un carrete". - Eduard Hanslick" #NT!
 elgar.414.g: "El hombre ni siquiera sabe qué es la música." #NT!
 elgar.414.h: "¡Finalmente alguien lo dice!" #NT!
 elgar.415.t: "Ballet" #NT!
 elgar.415.d: "Una nueva pieza de ballet moderna celebró su estreno hoy." #NT!
 elgar.415.f: ""Me gusta la trama del Cascanueces, en absoluto". - Pjotr ​​Tchaikovsky" #NT!
 elgar.415.g: "¡Bailar!" #NT!
 elgar.416.t: "Música de cine" #NT!
 elgar.416.d: "Una de las primeras bandas sonoras de películas fue grabada hoy para un largometraje bajo la dirección de nuestro director principal." #NT!
 elgar.416.f: ""La música de cine debería tener la misma relación con el drama cinematográfico que el piano de alguien que suena en mi sala de estar tiene al libro que estoy leyendo". - Igor Stravinsky" #NT!
 elgar.416.g: "Tenía una trama de guiones sobre un arqueólogo que buscaba el arca del pacto hace mucho tiempo, pero luego fue robado." #NT!
 elgar.417.t: "Termina de la temporada de conducción" #NT!
 elgar.417.d: "La última actuación de la temporada de conciertos ha llegado a su fin. Las revisiones ya están en la prensa. Parece que [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetLastName] ha hecho bien y ha ganado reconocimiento. Se dice que la calidad de la orquesta estatal ha mejorado significativamente, lo que está aumentando la reputación musical de nuestra nación." #NT!
 elgar.417.f: "Los compositores que aún no son directores pueden adquirir la capacidad de conducir a través de la práctica al final de una sesión de concierto. Después de la tercera temporada a más tardar, la adquisición del estado del conductor es cierta. Esta es una buena manera de entrenar a los compositores no virtuosos y luego enviarlos de gira." #NT!
 elgar.417.g: "¡Da Capo!" #NT!
  
 elgar.421.d: "Nuestro compositor actualmente sufre de un bloque de escritura masivo." #NT!
 elgar.422.t: "Una caminata" #NT!
 elgar.422.d: "En una caminata en la naturaleza, [SCOPE.sCharacter('elgar_conductor').GetFullName] encontró cierta inspiración que avanzaba su trabajo." #NT!
 elgar.422.f: "La naturaleza ya ha inspirado a muchos compositores. Beethoven se retiró al campo y recolectó impresiones allí que luego lo inspiraron a escribir la sexta sinfonía. Gustav Mahler incluso creó su propia cabaña de compositor." #NT!
 elgar.422.g: "En los pasos de Beethoven." #NT!
 elgar.423.t: "No hay suficiente comodidad" #NT!
 elgar.423.f: "Tan pronto como le das a los artistas un trabajo importante, vienen con solicitudes especiales. Una figura pública seria se convierte rápidamente en una diva si la haces sentir importante. Antes de que te des cuenta, la fama va a las cabezas de estas personas." #NT!
 elgar.423.g: "Dale consuelo" #NT!
 elgar.424.t: "Perturbaciones" #NT!
 elgar.424.f: "Hay una persona que dificulta la vida para [SCOPE.sCharacter('elgar_conductor').GetFullName]. Ya sea un fanático o simplemente una persona que cree que puede ganar influencia política al estar particularmente cerca de una figura pública famosa. Casi podrías llamarlo groupie. Las interrupciones ahora son tan malas que [SCOPE.sCharacter('elgar_conductor').GetLastName] se está quejando de la paraonía. Desafortunadamente, el "fanático" es una figura política de alto rango cuyo ostracismo público tendría consecuencias comprensibles." #NT!
 elgar.424.g: "¡No lo molestes!" #NT!
 elgar.424.h: "Tiene que lidiar con eso." #NT!
  
 elgar.431.t: "Concierto para [SCOPE.GetRootScope.GetCountry.GetCustom('elgar_custom_concerto_instrument_name')] en [SCOPE.GetRootScope.GetCountry.GetCustom('elgar_custom_music_chord_name')] [SCOPE.GetRootScope.GetCountry.GetCustom('elgar_custom_music_major_minor_name')]" #NT!
 elgar.431.d: "Después de varios meses de esfuerzo y creatividad artística, [SCOPE.sCharacter('elgar_conductor').GetFullName] estrenó su concierto [SCOPE.GetRootScope.GetCountry.GetCustom('elgar_custom_concerto_instrument_name')] hoy con él en el podio." #NT!
 elgar.431.f: "Un concierto es, desde la era barroca tardía, en su mayoría entendida como una composición instrumental, escrita para uno o más solistas acompañados de una orquesta u otro conjunto. Como género de música instrumental, las primeras obras surgieron del concierto Grosso a principios del siglo XVIII. Encuentra su plena expresión en el período clásico. Por lo general, está en tres movimientos, con un movimiento lento en el medio." #NT!
 elgar.432.t: "Sinfonía No. [SCOPE.GetRootScope.GetCountry.GetCustom('elgar_custom_symphony_number_name')] en [SCOPE.GetRootScope.GetCountry.GetCustom('elgar_custom_music_chord_name')] [SCOPE.GetRootScope.GetCountry.GetCustom('elgar_custom_music_major_minor_name')]" #NT!
 elgar.432.d: "Esta noche se lleva a cabo una actuación muy especial en la sala de conciertos: High Society se ha reunido para asistir al estreno de la nueva sinfonía de [SCOPE.sCharacter('elgar_conductor').GetFullName] en [SCOPE.GetRootScope.GetCountry.GetCustom('elgar_custom_music_chord_name')] [SCOPE.GetRootScope.GetCountry.GetCustom('elgar_custom_music_major_minor_name')]." #NT!
 elgar.432.f: "Una sinfonía es un término para obras instrumentales de diversa forma e instrumentación a lo largo de los siglos. La forma clásica de la sinfonía se desarrolló en el siglo XVIII y mantuvo una posición dominante en el campo de la música orquestal hasta el siglo XX. Este es un trabajo que consta de varios movimientos (generalmente tres o cuatro, más raramente cinco) para la orquesta sin solistas. Desde la novena sinfonía de Ludwig Van Beethoven, las partes vocales (solistas y/o coros) también han aparecido ocasionalmente, por ejemplo en Gustav Mahler, aunque el papel de la orquesta sigue siendo dominante." #NT!
 elgar.433.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('elgar_custom_opera_name')]" #NT!
 elgar.433.d: "La ópera '[SCOPE.GetRootScope.GetCountry.GetCustom('elgar_custom_opera_name')]', compuesta por el Maestro [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetLastName] después de muchas semanas y meses de esfuerzo, se considera un nuevo punto destacado en el trabajo musical de este genio artístico. El próximo estreno promete ser un gran éxito." #NT!
 elgar.433.f: "Opera es un género musical de teatro que surgió en la era barroca. Una ópera consiste en un entorno musical de un poema dramático interpretado por un conjunto de cantantes, una orquesta acompañante y, a veces, un coro y un conjunto de ballet. Además de cantar, los actores actúan actuando y bailando en un escenario de teatro diseñado con pintura, arquitectura, accesorios, iluminación y tecnología de escenario. Los roles de los actores se ilustran visualmente por máscaras y disfraces. Claudio Monteverdi, que estableció estándares con su orfeo, se considera el antepasado de la ópera. En el siglo XIX, Richard Wagner estableció nuevos estándares con sus óperas." #NT!
  
 elgar.440.t: "Música folklórica" #NT!
 elgar.440.d: "Viajando a través de las partes más rurales del país, [SCOPE.sCharacter('elgar_conductor').GetFullName] ha encontrado un gran interés en aprender, escribir y recopilar los bailes y canciones de la gente local." #NT!
 elgar.440.f: "El nacionalismo del siglo XIX significaba que muchas formas de música previamente vilipendiadas despertaron de repente el interés porque supuestamente reflejaban el alma nacional de un país. Los historiadores locales y los músicos locales recopilaron canciones tradicionales. Algunos compositores también se inspiraron en la gente y los pusieron en la música de una manera completamente nueva." #NT!
 elgar.440.g: "Una colección de música interesante." #NT!
 elgar.440.h: "[SCOPE.sCharacter('elgar_conductor').GetLastName] debería concentrarse en la alta cultura en lugar de tratar la música de órgano." #NT!
 elgar.441.t: "Chabolas de mar" #NT!
 elgar.441.d: "Inspirado en los hechos del Almirante [SCOPE.sCharacter('elgar_admiral').GetLastName], nuestro compositor [SCOPE.sCharacter('elgar_conductor').GetFullName] escribió una pequeña chabola de mar a un lado." #NT!
 elgar.441.f: "El propósito práctico original de la chabola como canción de trabajo siempre ha sido primordial entre la gente de mar. Los aspectos lingüísticos y musicales, por otro lado, apenas jugaron un papel. Con el inicio de la revolución industrial, se necesitaban barcos más rápidos. El indiete este de Big-Bellied desapareció y fueron reemplazados por cortinas y fragatas. En última instancia, esto llevó a las chabolas a perder gradualmente su uso práctico para la navegación y ser cantado solo por ocio y entretenimiento. Los músicos recolectaron viejas chabolas en el mar o se inspiraron en ellos para crear sus propias obras." #NT!
 elgar.441.g: "¡Ho!" #NT!
 elgar.442.t: "Marzo" #NT!
 elgar.442.d: "Inspirado en los valores del general [SCOPE.sCharacter('elgar_general').GetFullName], nuestro compositor [SCOPE.sCharacter('elgar_conductor').GetFullName] escribió una nueva marcha militar." #NT!
 elgar.442.f: "La marcha floreció especialmente en los siglos XIX y principios del XX con sus tendencias nacionalistas y militaristas y sus revoluciones. Un ejemplo de esto es Gioachino Rossini, quien no solo incorporó regularmente marchas pomposas a sus óperas, sino que también compuso una serie de piezas para príncipes individuales: incluida una composición comisionada para el sultán turco Abdülmecid I (Marcia Per Il Sultano), que todavía se realiza regularmente en el programa de bandas militares italianas. También es ejemplar para las tendencias del siglo XIX es la producción de la familia Strauss en Viena, quien compuso una marcha en cada oportunidad adecuada para demostrar patriotismo o lealtad al emperador, o para honrar figuras militares." #NT!
 elgar.442.g: "Nuevo material para el ejército." #NT!
 elgar.443.t: "Kunstlied" #NT!
 elgar.443.d: "Basado en el poema de un gran poeta, [SCOPE.sCharacter('elgar_conductor').GetFullName] ha escrito un trabajo paralelo." #NT!
 elgar.443.f: "En la tradición de la música clásica occidental, Lied es un término para establecer la poesía en la música clásica para crear una pieza de música polifónica. El término se usa para cualquier tipo de canción en alemán contemporáneo, pero entre los hablantes de inglés y francés, la mentira a menudo se usa indistintamente con 'Art Song' para abarcar obras que la tradición también ha inspirado en otros idiomas. Los poemas que se han hecho en Lieder a menudo se centran en temas pastorales o temas de amor romántico." #NT!
 elgar.443.g: "¿No podría haber sido otra cosa ...?" #NT!
 elgar.444.t: "Sonata de piano en [SCOPE.GetRootScope.GetCountry.GetCustom('elgar_custom_music_chord_name')] [SCOPE.GetRootScope.GetCountry.GetCustom('elgar_custom_music_major_minor_name')]" #NT!
 elgar.444.d: "Las piezas de piano son parte del repertorio estándar de la música clásica. Como ejercicio de dedo para el próximo trabajo importante, [SCOPE.sCharacter('elgar_conductor').GetFullName] escribió una sonata y la realizó anoche en una pequeña fiesta de la tarde." #NT!
 elgar.444.f: "A principios del siglo XIX, se definió la forma Sonata, de una combinación de prácticas anteriores y las obras de importantes compositores clásicos, particularmente Haydn, Mozart, Beethoven, pero también compositores como Clementi. Es durante este período que las diferencias entre los diseños de tres y cuatro movimientos se convirtieron en un tema de comentarios, con énfasis en el concierto en tres movimientos, y la sinfonía en cuatro. Entre las obras expresamente etiquetadas Sonata para el piano, están los tres de Frédéric Chopin, los de Felix Mendelssohn, los tres de Robert Schumann, la Sonata de Franz Liszt en B menor, y más tarde las Sonatas de Johannes Brahms y Sergei Rachmaninoff." #NT!
 elgar.444.g: "Un clásico." #NT!
 elgar.445.t: "Tratado sobre música" #NT!
 elgar.445.d: "En los últimos meses, [SCOPE.sCharacter('elgar_conductor').GetFullName] ha estado trabajando ampliamente en un nuevo tratado sobre orquestación y el estudio de instrumentos musicales. El tratado se considera una contribución a las innovaciones musicales." #NT!
 elgar.445.f: ""Se necesita mucho tiempo para encontrar los océanos de la música, pero aún más aprender a navegarlos". -Hector Berlioz" #NT!
 elgar.445.g: "Un trabajo teórico importante." #NT!
 elgar.446.t: "Réquiem" #NT!
 elgar.446.d: "Un representante influyente del clero católico recientemente le pidió a [SCOPE.sCharacter('elgar_conductor').GetFullName] que escribiera un nuevo trabajo sagrado después de la muerte de un obispo muy respetado." #NT!
 elgar.446.f: "La forma litúrgica de la masa fúnebre es el réquiem. El término describe tanto la liturgia de la santa misa en el funeral de la Iglesia Católica como las composiciones musicales de la iglesia para la conmemoración de los muertos. Se deriva de la incipita de la introducción requiem aeternam dona eis, domine ('descanso eterno, oh señor'). El propiedad de la liturgia del réquiem corresponde al del día de todas las almas. Como la primera pieza de la masa musical, los compositores generalmente establecían la introducción en la música, al igual que el delincuorio, en contraste con la secuencia, que ocasionalmente se acorta u omite por completo por varias razones. Gloria y Credo no están listos en la música en el réquiem porque no son cantados ni hablados en la liturgia de la misa fúnebre." #NT!
 elgar.446.g: "Requiem Aeternam Dona Eis, Domine." #NT!
 elgar.447.t: "Una ópera atrevida" #NT!
 elgar.447.d: "La última composición de [SCOPE.sCharacter('elgar_conductor').GetFullName] se reunió con las críticas de las autoridades de censura. Ciertamente es de alto valor artístico, pero podría causar un alboroto. La intelectualidad del país ya está en armas." #NT!
 elgar.447.f: "En gran parte del siglo XIX, incluso los mejores compositores de su tiempo tuvieron que someterse a la censura. Los muchos entornos diferentes de 'Figaro' se consideraron altamente críticos debido al tema revolucionario. La sospecha de blasfemia u otras inmoralidades también fueron una espina en el costado de los censores. En cierto punto, algunos compositores ya no podían soportar el acoso y dejar su patrocinador." #NT!
 elgar.447.g: "El arte debe elevar, no causar un alboroto." #NT!
 elgar.447.h: "Deberíamos relajar un poco la censura." #NT!
  
 elgar.448.t: "Duelo compositor" #NT!
 elgar.448.d: "[SCOPE.sCharacter('rival_composer_scope').GetFullName], un compositor de [SCOPE.sCountry('rival_composer_country_scope').GetName], en un ajuste de la arrogancia típica de este país, describió a nuestro compositor [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName] como un "número desconocido" y cuestionó fundamentalmente el estado musical de nuestra nación." #NT!
 elgar.448.f: "'La fragmentación y la arbitrariedad de nuestro estilo musical fueron, si no provocados, al menos aumentó al máximo por el esfuerzo de Mendelssohn para expresar un contenido poco claro, casi sin sentido, lo más interesante y alucinante posible. While the last in the chain of our true musical heroes, Beethoven, had the highest desire and miraculous ability for the clearest, most certain expression of an ineffable content through sharply cut, plastic design of his sound images, Mendelssohn, on the other hand, blurs these acquired figures in his productions into a dissolving, fantastic shadow image whose indefinite shimmer of colors arbitrarily stimulates our capricious imagination, but our purely human inner Anhelo de una visión artística clara apenas se toca solo con la esperanza de satisfacción. -Richard Wagner en Felix Mendelssohn" #NT!
 elgar.448.g: "Aceptamos el desafío." #NT!
 elgar.448.h: "No podemos sobrevivir a este duelo." #NT!
 elgar.449.t: "Victoria en el duelo del compositor" #NT!
 elgar.449.d: "[GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName] se ha demostrado que es un compositor mucho más famoso y capaz que su rival smarmy, preservando así la reputación de nuestra nación como centro cultural." #NT!
 elgar.449.f: "'Nada muestra más claramente el poder de Wagner y el tipo de tormenta y estrés que desató que esta decadencia que su trabajo realmente consagró y que ha desarrollado APACE desde su época. ¡Qué poderoso hombre debe haber sido haber destruido una forma (ópera) esencialmente musical con tal energía que cincuenta años después de su muerte, todavía estamos tambaleando bajo la basura y la raqueta del drama musical! Porque el prestigio de la síntesis de las artes sigue vivo. ¿Es eso lo que se llama progreso? Tal vez. A menos que los compositores encuentren la fuerza para sacudirse este pesado legado obedeciendo la admirable orden de la admirable de Verdi: "Regresemos a los viejos tiempos, y eso será progreso". -Igor Stravinsky en Richard Wagner" #NT!
 elgar.449.g: "¡Ahora está claro qué país es la nación cultural dominante!" #NT!
 elgar.450.t: "Derrota en el duelo compositor" #NT!
 elgar.450.d: "Desafortunadamente, nuestro compositor fue derrotado por su rival extranjero en la competencia. ¡El mundo entero ahora está convencido de que hemos quedado atrás musicalmente!" #NT!
 elgar.450.f: "¿Es Wagner incluso un ser humano? ¿No es más una enfermedad? Él hace que todo lo que toca enfermo, ha enfermado la música. -Friedrich Nietzsche en Richard Wagner" #NT!
 elgar.450.g: "Ahora está claro qué país es la nación cultural dominante ..." #NT!
  
 elgar.451.t: "El maestro viaja a [SCOPE.sCountry('elgar_composer_destination_scope').GetNameNoFlag]" #NT!
 elgar.451.d: "Nuestro compositor [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName] ha completado todos los preparativos. El primer destino de la gira de conciertos de dos años y medio será [SCOPE.sCountry('elgar_composer_destination_scope').GetName]." #NT!
 elgar.451.f: ""Si el mundo alguna vez termine, iré a Viena, porque ahí es donde todo sucede cincuenta años después". - Gustav Mahler" #NT!
 elgar.451.g: "¡Envíenos una postal!" #NT!
 elgar.452.t: "[SCOPE.sCharacter('elgar_composer_scope').GetLastName] llega al [GetPlayer.GetNameNoFlag]" #NT!
 elgar.452.d: "Un compositor itinerante se detuvo en nuestro país en su gira actual y decidió quedarse por un tiempo." #NT!
 elgar.452.f: "[SCOPE.sCharacter('elgar_composer_scope').GetCharacter.GetCustom('elgar_composer_achievements_switch_to_character_scope_type')]"
 elgar.452.g: "¡Bienvenido, bienvenido!" #NT!
 elgar.453.t: "El compositor itinerante sale" #NT!
 elgar.453.d: "Después de una estadía de varias semanas y algunas actuaciones que le valieron el reconocimiento de la población local, el compositor viajero continuó su gira." #NT!
 elgar.453.f: "El destino de un compositor depende de una amplia gama de factores. Un criterio decisivo son las casas de ópera y la proximidad a la última ubicación. Pero factores como las tecnologías culturales, la presencia de un centro de arte (impresionismo, expresionismo, arte nouveau) o la existencia de un conservatorio también juegan un papel. Los compositores evitan los lugares donde recientemente se ha llevado a cabo una actuación de un compositor rival." #NT!
 elgar.453.g: "¡Espero verte de nuevo pronto!" #NT!
 elgar.455.t: "El compositor regresa de la gira" #NT!
 elgar.455.d: "[GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName] ha regresado de la gira [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetHerHis]. Ha dejado su huella en el mundo de la música y mejoró significativamente su reputación." #NT!
 elgar.455.f: "Los recorridos existen únicamente para aumentar la reputación de un compositor. Dependiendo de las habilidades de un compositor, esto será diferente. Sus propias composiciones juegan un papel, pero también lo hacen los rasgos de personajes: los personajes innovadores o ambiciosos tienen ventajas. Los compositores que tienen el rasgo del conductor y el rasgo virtuoso reciben una ventaja especial." #NT!
 elgar.455.g: "Bienvenido de nuevo, Maestro." #NT!
  
 elgar.501.t: "Canto degli italiani" #NT!
 elgar.501.d: "En un clima de lucha popular por la unificación e independencia de Italia, el estudiante y patriota Goffredo Mameli de 20 años ha escrito una canción inspiradora, llamándola 'La canción de los italianos'. Se ha vuelto bastante popular en poco tiempo." #NT!
 elgar.501.f: "Il canto degli italiani (la canción de los italianos) es mejor conocido entre los italianos como 'Inno di Mameli' (himno de Mameli), después del autor de la letra, o 'Fratelli d'Talia' (hermanos de Italia), desde su línea de apertura. El texto fue establecido en la música por otro Michele Novaro. El himno disfrutó de una popularidad generalizada durante todo el período del Risorgimento y en las siguientes décadas. También se imprimió en folletos en Génova y se publicó el 10 de diciembre: la manifestación se dedicó oficialmente al 101 aniversario de la expulsión de las potencias austriacas de la ciudad; de hecho, fue una excusa para protestar contra las ocupaciones extranjeras en Italia e inducir a Carlo Alberto a adoptar la causa italiana de la libertad. En esta ocasión, se mostró la bandera de tricolor y el himno de Mameli se cantó públicamente por primera vez." #NT!
 elgar.501.g: "Debería haber una ley en su contra ..." #NT!
 elgar.501.h: "Fratelli d'Italia, L'Italia S'è Desta!" #NT!
 elgar.503.t: "Deutschlandlied" #NT!
 elgar.503.d: "En respuesta al renovado deseo de expansión de Francia, que ve al Rin como una frontera natural, el poeta Hoffmann von Fallersleben escribió una canción que es ampliamente popular como el 'Deutschlandlied'." #NT!
 elgar.503.f: "La canción de los alemanes, también conocida como Deutschlandlied, fue escrita por August Heinrich Hoffmann von Fallersleben en Heligoland. La razón específica para que Hoffmann escribiera la canción fueron reclamos territoriales franceses de Renania durante la crisis de Rin. Rechazó estas afirmaciones con la canción, como sucedió con otras canciones alemanas de Rin de la época. Él complementó esto con más ideas, especialmente la de la unidad alemana, que solo podría proporcionar el requisito previo para defenderse de ataques enemigos de cualquier tamaño. El poeta creó su trabajo expresamente a la melodía del antiguo himno imperial 'Dios salve a Franz, el emperador' de Joseph Haydn (1797). La canción solo ganó mayor importancia durante la Primera Guerra Mundial. Su tercer verso ha sido el texto del himno nacional alemán desde 1952." #NT!
 elgar.503.g: "¡Vino alemán y canción alemana!" #NT!
 elgar.503.h: "Alemania, Alemania sobre todo!" #NT!
 elgar.503.i: "Debes estar equivocado, la canción se llama 'Gott Erhalte Franz den Kaiser'." #NT!
 elgar.504.t: "Muerte de Paganini" #NT!
 elgar.504.d: "La muerte del famoso virtuoso del violín Niccolò Paganini provocó una controversia en torno a su funeral." #NT!
 elgar.504.f: "Niccolò Paganini era un violinista y compositor italiano. Fue el virtuoso de violín más famoso de su tiempo, y dejó su huella como uno de los pilares de la técnica de violín moderna. Sus 24 caprichos para violín en solitario Op. 1 se encuentran entre los más conocidos de sus composiciones y han servido como una inspiración para muchos compositores prominentes. En mayo de 1840, el obispo de Niza envió a Paganini un párroco local para realizar los últimos ritos. Paganini asumió que el sacramento era prematuro y se negó. Una semana después, el 27 de mayo de 1840, Paganini, de 57 años, murió de hemorragia interna antes de que un sacerdote pudiera ser convocado. Debido a esto, y su asociación ampliamente rumoreada con el diablo, la iglesia negó a su cuerpo un entierro católico en Génova. Esto ha llevado a una discusión pública sobre cómo tratar con Paganini. Hay voces a favor de presionar a la iglesia y enterrar a Paganini en Génova, acorde su estatus y reclamando su legado. Sin embargo, esto conduciría a una disputa abierta con las autoridades eclesiásticas." #NT!
 elgar.504.g: "Dale un entierro digno y asegura su legado." #NT!
 elgar.504.h: "No intervine en este delicado asunto." #NT!
 elgar.505.t: "Nabucco" #NT!
 elgar.505.d: "Giuseppe Verdi ha celebrado el mayor éxito de su carrera hasta ahora con su última ópera. Al mismo tiempo, incita el sentimiento nacional del pueblo italiano." #NT!
 elgar.505.f: "Nabucco es una ópera en idioma italiano en cuatro actos compuestos en 1841 por Giuseppe Verdi a un libreto italiano de Temistocle Solera. El número más conocido de la ópera es el 'coro de los esclavos hebreos', un coro que regularmente recibe un bis en muchas ópera cuando se realiza hoy. Nabucco es la ópera que se considera establecido permanentemente la reputación de Verdi como compositor. Comentó que 'esta es la ópera con la que realmente comienza mi carrera artística. Y aunque tenía muchas dificultades para luchar, es seguro que Nabucco nació bajo una estrella de la suerte. La historia del cautiverio de los judíos en Babilonia se convirtió en un gran avance en toda Italia, sobre todo porque los italianos se sintieron dominados por potencias extranjeras en la era del nacionalismo. En qué medida Verdi realmente sirvió sentimientos nacionales italianos en Nabucco sigue siendo controvertido hoy." #NT!
 elgar.505.g: "VA Pensiero ..." #NT!
 elgar.505.h: "Esos italianos rebeldes de nuevo." #NT!
 elgar.507.t: "Aida" #NT!
 elgar.507.d: "Con motivo de la apertura del Canal de Suez, Giuseppe Verdi estrenó su ópera teñida de egipcio Aida, con un ligero retraso." #NT!
 elgar.507.f: "Aida es una ópera en cuatro actos de Giuseppe Verdi a un libreto italiano de Antonio Ghislanzoni, basado en un escenario a menudo atribuido al egiptoólogo francés Auguste Mariette, aunque se ha argumentado que el escenario fue realmente escrito por Temistocle Solera. Isma'il Pasha, Khedive de Egipto, encargó a Verdi que escribiera la ópera, pagándole 150,000 francos, pero el estreno se retrasó. Aida se reunió con gran aclamación cuando finalmente se abrió en El Cairo. Los disfraces y accesorios para el estreno fueron diseñados por Auguste Mariette, y supervisó el diseño y la construcción de los sets, que fueron creados en París y enviados a El Cairo. Aunque Verdi no asistió al estreno en El Cairo, estaba más insatisfecho con el hecho de que la audiencia consistía en dignatarios, políticos y críticos invitados, pero no miembros del público en general. Por lo tanto, consideró el estreno italiano (y europeo), celebrado en La Scala, Milán, y en el que estaba muy involucrado en cada etapa, era su verdadero estreno." #NT!
 elgar.507.g: "¡Un triunfo para Italia!" #NT!
 elgar.507.h: "¡Un triunfo para [ROOT.GetCountry.GetNameNoFlag]!" #NT!
 elgar.509.t: "Franz Schubert" #NT!
 elgar.509.d: "13 años después de su muerte, la quinta sinfonía de Franz Schubert fue presentada al público en general." #NT!
 elgar.509.f: "La quinta sinfonía, en B Flat Major, es quizás la más realizada de sus sinfonías juveniles y es ampliamente considerada como la primera sinfonía 'madura' de Schubert. Su elaboración es de perfección de música de cámara, ya que la instrumentación es más pequeña que la de cualquier otra sinfonía, y sus proporciones están finamente sintonizadas entre sí. Se puede entender como el examen productivo de Schubert de las obras sinfónicas de Mozart y revela la alteridad y la independencia de Schubert. Según las propias entradas de Schubert sobre el puntaje, el trabajo se compuso entre septiembre y el 3 de octubre de 1816; Fue escrito en un momento en que Schubert estaba buscando su propio lenguaje musical. La primera actuación de la 5ta Sinfonía de Schubert tuvo lugar con una pequeña orquesta amateur en Viena en 1816; La primera actuación pública, por otro lado, solo tuvo lugar el 17 de octubre de 1841, trece años después de la muerte de Schubert, bajo el testigo de Michael Leitermayer." #NT!
 elgar.509.g: "Incluso desde el cielo, Schubert nos deleita con su música." #NT!
 elgar.510.t: "Controversia sobre poliuto" #NT!
 elgar.510.d: "Una disputa irreconciliable entre el rey y el compositor Donizetti amenaza con activar su despido." #NT!
 elgar.510.f: "De 1829 a 1838 Gaetano Donizetti fue director musical de los teatros reales de Nápoles y, a pesar de los viajes y comisiones en otros estados, de facto, la figura cultural más importante del reino y su representante más famoso. Toda una serie de famosas óperas de Donizetti se escribió en Nápoles, que consolidó la posición del reino de las dos sicilías como una ubicación musical de alto rango. Pero a pesar de los muchos éxitos, Donizetti tuvo que luchar una y otra vez con la censura napolitana, que desfiguró sus libretos o canceló las óperas enteras. En la disputa más reciente, el propio Rey intervino para evitar el rendimiento de la ópera 'Poliuto'. Después de muchos años de disputas con la censura, Donizetti se ha cansado y ha hecho preparativos para huir a París. La élite política se ha unido al rey; Evitar a Donizetti de sus planes no solo alteraría el panorama político y social, sino que también dañaría masivamente la autoridad y la reputación del rey." #NT!
 elgar.510.g: "El rey ha hablado, él puede empacar sus cosas." #NT!
 elgar.510.h: "¡Debemos hacer todo lo posible para evitar que Donizetti se vaya!" #NT!
 elgar.511.t: "Les Martyres, 1840" #NT!
 elgar.511.d: "El compositor italiano Gaetano Donizetti ha llegado a París y realizó su ópera 'Les Martyres' allí, que fue extremadamente bien recibida por el público." #NT!
 elgar.511.f: "Poliuto es una tragedia lirica de tres actos (o ópera trágica) de Gaetano Donizetti del libreto italiano de Salvadore Cammarano, que se basó en la obra de Pierre Corneille, escrita en 1641/42. Reflejó la vida del mártir cristiano primitivo Santo Polyeuctus. Considerado por un autor como la "ópera más personal" de Donizetti con la música "algunos de los mejores Donizetti debían componer", Poliuto fue escrito en 1838 para presentaciones planificadas en el Teatro San Carlo en Nápoles más tarde ese año. Sin embargo, cerca del tiempo para que comiencen los ensayos, el rey Fernando II se negó a permitir que el martirio de un santo cristiano se vea en el escenario y prohibió la producción. Enojado por la decisión y con una comisión para la Opéra de París del compositor, Donizetti pagó la pena al San Carlo por no producir un trabajo original como sustituto, y dejó a Nápoles por París. Como su primera comisión para París, decidió revisar Poliuto y entre 1839-40 un texto francés, con el título Les Martyres." #NT!
 elgar.511.g: "No está mal para un italiano." #NT!
 elgar.512.t: "El Stabat Mater" #NT!
 elgar.512.d: "Gaetano Donizetti está visitando Bolonia para llevar a cabo el estreno de Stabat Mater de Gioachino Rossini. La actuación fue un completo éxito." #NT!
 elgar.512.f: "Cuando Donizetti fue a Bolonia para el Stabat Mater, Rossini asistió a la tercera actuación, y los dos hombres, cada ex alumnos del Conservatorio de Bolonia, se reunieron por primera vez, con Rossini declarando que Donizetti era "el único maestro en Italia capaz de conducir mi Stabat como lo haría". Amigos, incluido su cuñado, Antonio Vasselli (conocido como Totò), intentó continuamente persuadirlo para que asumiera una posición académica en Bolonia en lugar de la participación de la Corte de Viena, si no es por otra razón que le daría al compositor una base desde la cual trabajar y enseñar y no se agotaría continuamente con el viaje entre las ciudades. Donizetti informó la reacción del público: 'El entusiasmo es imposible de describir. Incluso en el ensayo final, al que asistió Rossini, en el medio del día, fue acompañado a su hogar a los gritos de más de 500 personas. Lo mismo la primera noche, debajo de su ventana, ya que no apareció en el pasillo." #NT!
 elgar.512.g: "Rossini y Donizetti - ¡Un partido en el cielo!" #NT!
 elgar.513.t: "¿Donizetti se está volviendo loco?" #NT!
 elgar.513.d: "El declive mental cada vez más rápido de Donizetti lo llevó a estar comprometido con un asilo loco en París." #NT!
 elgar.513.f: "Donizetti informó en sus cartas durante un largo período de tiempo, comenzando en la década de 1820, sobre dolores de cabeza, a veces ataques de fiebre que duraron solo un día y también sobre estados de ánimo depresivos ocasionales. La extraordinaria cantidad de trabajo que realizó a lo largo de su vida, así como los largos viajes que fueron particularmente extenuantes en ese momento, especialmente después de que se mudó a París y luego a Viena, condujo a un mayor síntomas de agotamiento de 1842 a 1843. El dolor de cabeza y los ataques de fiebre ocasionales fueron acompañados por mareos y, a veces, 'sensaciones en la cabeza'. En 1845, la salud de Donizetti se deterioró rápidamente y se derrumbó en la calle en París. Los médicos le prohibieron componer, lo que lo deprimió aún más. Finalmente, bajo falsas pretensiones, fue atraído al asilo loco en Ivry-sur-Seine sin su conocimiento y en contra de su voluntad, y fue internado por la fuerza allí. El compositor enfermo vio rápidamente a través de su situación como un "prisionero" y la clasificación como un "maníaco" y escribió cartas desesperadas y desgarradoras a amigos y familiares pidiendo ayuda." #NT!
 elgar.513.g: "Tal vez sea mejor de esa manera." #NT!
 elgar.513.h: "Sácalo del asilo loco y dale descanso en Bergamo." #NT!
 elgar.514.f: "Donizetti tardó 17 meses en ser rescatados del asilo mental. Los médicos prevenían una partida planificada, pero también por el prefecto policial de París por razones inescrutables. Solo con la ayuda de la presión diplomática, el compositor ahora completamente apático podría ser traído por su hermano Francesco y su sobrino Andrea. La hija de la baronesa Rosa Rota-Basoni interpretó el piano para el compositor todos los días y cantó Arias de sus obras, su amiga Dolci le habló en el dialecto bergamásque y recibió una visita del tenor Rubini, pero Donizetti no mostró más reacciones. Donizetti murió una semana después de un accidente cerebrovascular apopléctico con hemiplejia, fiebre alta e infecciones posteriores. Los resultados de la autopsia mostraron síntomas de meningitis 'pasada' y una médula espinal inflamada parcialmente dañada." #NT!
 elgar.514.g: "Una muerte trágica." #NT!
 elgar.515.t: "Donizetti curado" #NT!
 elgar.515.d: "El compositor se ha recuperado después de una cura intensiva y quiere componer con entusiasmo renovado para la vida." #NT!
 elgar.515.f: "Bajo la presión de nuestro gobierno, Donizetti fue expulsado rápidamente del asilo loco. En las órdenes del médico, debía experimentar una cura de varios meses en su ciudad natal de Bergamo en las mejores circunstancias posibles. El regreso a la vida en el país, la libertad del estrés y la presión, y el regreso a sus raíces ha dado fruto después de muchos meses. Donizetti, apático durante semanas, respondió a una de sus propias arias, cantada por Giovanna, hija de la baronesa Rosa Rota-Basoni. Hablar con los miembros de la familia en el dialecto local también mostró progreso día a día. Después de años de terapia, el compositor una vez terminal, parece haber sido devuelto a la vida." #NT!
 elgar.515.g: "Un milagro médico." #NT!
 elgar.516.t: "Liszt versus Thalberg" #NT!
 elgar.516.d: "Dos de los pianistas más famosos compitieron entre sí en París: Franz Liszt desafió al pianista vivo más importante, Sigismund Thalberg." #NT!
 elgar.516.f: "En el invierno de 1835/36, Sigismund Thalberg hizo su debut en un concierto privado dado por el Secretario de la Embajada de Austria en París. Fue recibido con entusiasmo por los artistas presentes, incluidos Rossini y Meyerbeer, y elogiado como el inventor de un nuevo estilo de piano. Mientras que los conciertos de Franz Liszt en Lyon trajeron alrededor de 500-600 francos, Thalberg obtuvo 10,000 francos de un solo concierto en el Teatro Italiano. Antes de que Thalberg apareciera en su segunda estadía en París, Liszt publicó una revisión plagada de insinuaciones y polémicas. Según Liszt, el éxito de Thalberg se produjo únicamente a través de la propaganda. Thalberg apareció nuevamente en París desde febrero de 1837 y fue celebrado nuevamente. El 31 de marzo, ambos artistas actuaron en un evento de caridad organizado por la princesa Belgiojoso." #NT!
 elgar.516.g: "Thalberg era mejor." #NT!
 elgar.516.h: "Liszt fue mejor." #NT!
 elgar.517.t: "Von der Wiege Zum Grabe" #NT!
 elgar.517.d: "En Roma, Franz Liszt completó su último poema sinfónico. La comunidad musical no sabe qué hacer con el último 'error' de este compositor." #NT!
 elgar.517.f: "En los últimos años de su vida, Liszt recurrió cada vez más a la música sagrada y la música de la iglesia. Su último poema de tono, "De la cuna a la tumba", por lo tanto, difería de todos sus predecesores. Liszt se inspiró en un dibujo del pintor húngaro Mihály Zichy. Las grandes secciones del trabajo no requieren una poderosa orquesta, especialmente el comienzo suena como música de cámara; Se forman muchas islas de sonido en las que el material musical es pobre, y los pasajes en solitario no son infrecuentes, especialmente al final de los movimientos. Los armónicos utilizados también son un presagio de los tiempos por venir. Durante su vida, sin embargo, los críticos de música calificaron el trabajo como el "error de un anciano"." #NT!
 elgar.517.g: "Las generaciones posteriores lo entenderán." #NT!
 elgar.518.t: "Lohengrin" #NT!
 elgar.518.d: "El estreno de 'Lohengrin' de Richard Wagner no solo era una multitud plena, sino que provocó una verdadera admiración por Wagner en Alemania." #NT!
 elgar.518.f: "Lohengrin es una ópera romántica en tres actos del compositor alemán Richard Wagner. Con Lohengrin, Wagner creó la nueva forma operística de drama musical compuesto a través del drama. La composición no se divide en números individuales, sino que se desempeña a través de ACT sin interrupción. Wagner se distingue así de la estructura convencional de las óperas numéricas con arias, recitativas y piezas corales. Para poder traducir la vida interna de los personajes de la etapa en motivos musicales claramente legibles, Wagner usó leitmotifs (por ejemplo, el motivo del Grial y el motivo de prohibición de preguntas). La ópera ha inspirado otras obras de arte. El rey Ludwig II de Baviera llamó a su castillo de Neuschwanstein Castle después del Caballero Swan." #NT!
 elgar.518.g: "Inspirador." #NT!
 elgar.519.t: "Kunstwerk der Zukunft" #NT!
 elgar.519.d: "Durante su estadía en Suiza, el compositor Richard Wagner escribió numerosos tratados sobre música y arte que se volverían innovadores para la comprensión alemana e internacional de la estética." #NT!
 elgar.519.f: "La 'obra de arte del futuro' son los escritos teóricos del arte de Richard Wagner que escribió entre 1849 y 1852 en Zurich. Como en su escritura 'Art and the Revolution', Wagner lamenta la decadencia de las artes y desarrolla su modelo de la nueva unidad de las artes, el 'Gesamtkunstwerk'. Como en sus escritos anteriores, Wagner desarrolló su convicción de que el arte griego estaba integrado en la religión y el misticismo griego y que, a través de la destrucción de la religión, el arte también estaba perdiendo su cohesión y convertirse en 'artes individuales' (drama, música y danza) tuvo que degenerarse. Se queja de que el arte de la música como un acompañamiento puro para la palabra se ha marchitado. En el curso adicional de sus explicaciones, entra en gran detalle sobre el desarrollo de las diferentes artes, desde el estado ideal durante la antigüedad hasta la decadencia de su tiempo. En su siguiente y más importante trabajo escrito, ópera y drama, Richard Wagner explica con mucha precisión (y muy teóricamente) cómo imagina la 'unión' óptima de la música y la poesía. Un poco más tarde se puso a trabajar en la ejecución 'práctica' y escribió y compuso su 'Ring des Nibelungen' como el drama musical por excelencia después de años de trabajo." #NT!
 elgar.519.g: "¿Quién se supone que debe entender estas oraciones en caja difícil de leer?" #NT!
 elgar.520.t: "Tristan und Isolde" #NT!
 elgar.520.d: "Tristan und Isolde es una ópera en tres actos de Richard Wagner a un libreto alemán del compositor, basado en gran parte en el romance del siglo XII Tristan e Iseult por Gottfried Von Strassburg. La ópera fue enormemente influyente entre los compositores clásicos occidentales y proporcionó inspiración directa a los compositores como Gustav Mahler, Richard Strauss, Alban Berg, Arnold Schoenberg y Benjamin Britten. Otros compositores como Claude Debussy, Maurice Ravel e Igor Stravinsky formularon sus estilos en contraste con el legado musical de Wagner. Muchos ven a Tristan como un hito en el alejamiento de la armonía y la tonalidad de la práctica común y consideran que sienta las bases para la dirección de la música clásica en el siglo XX." #NT!
 elgar.520.f: "'El trabajo que siempre ha despertado mi mayor admiración es Tristan. Un asombro estremecido me da frente a este gigantesco edificio, y todavía me parece increíble cómo un ser humano podría concebir y darse cuenta. Considero que el segundo acto es una de las creaciones más sublimes del espíritu jamás creado. Este segundo acto es maravilloso, maravilloso, indescriptiblemente maravilloso. - Giuseppe Verdi" #NT!
 elgar.521.t: "Festival Richard Wagner" #NT!
 elgar.521.d: "El establecimiento de Festspielhaus de Richard Wganer es considerado uno de los aspectos más destacados de la cultura musical del siglo XIX." #NT!
 elgar.521.f: "El Festival Bayreuth es un festival de música que se celebra anualmente, en el que se presentan actuaciones de óperas del compositor alemán del siglo XIX Richard Wagner. El propio Wagner concibió y promovió la idea de un festival especial para mostrar sus propias obras, en particular su ciclo monumental 'der Ring des Nibelungen' y 'Parsifal'. Las actuaciones tienen lugar en un teatro especialmente diseñado, el Bayreuth Festspielhaus. Wagner supervisó personalmente el diseño y la construcción del teatro, que contenía muchas innovaciones arquitectónicas para acomodar las enormes orquestas para las cuales Wagner escribió, así como la visión particular del compositor sobre la puesta en escena de sus obras. El festival se ha convertido en un destino de peregrinación para los wagnerianos y los entusiastas de la música clásica. Presentes en este evento musical único estaban Kaiser Wilhelm, Dom Pedro II de Brasil, el rey Ludwig y otros miembros de la nobleza, así como el filósofo Friedrich Nietzsche y los compositores exitosos como Anton Bruckner, Edvard Grieg, Pyotr Tchaikovsky, Franz Liszt, y el joven Arthur Foote." #NT!
 elgar.521.g: "¡Un pico de la cultura alemana!" #NT!
 elgar.523.t: "Escándalo de Tannhäuser" #NT!
 elgar.523.d: "Una actuación de Tannhäuser de Richard Wagner causó un escándalo real que indignó a toda la sociedad parisina. Además de la violación de Wagner de las buenas reglas de la vida de la ópera francesa, la animosidad entre los mundos musicales alemanes y franceses también jugó un papel." #NT!
 elgar.523.f: "Wagner siempre ha tenido un momento difícil en París, no solo por su competencia con el popular Giacomo Meyerbeer. Para acomodar su ópera Tannhäuser en la Gran Opera, tuvo que inclinarse ante la aduana francesa, como la instalación de un ballet. Pero Wagner resistió vehementemente las especificaciones y solo incluía un bacquanal. Al mismo tiempo, Wagner se hizo impopular con los músicos con ensayos agonizantes y largos. El estreno causó un escándalo: los caballeros del 'Club de Jockey de Jockey' de París se sintieron traicionados cuando el ballet no apareció después de la obertura. Los caballeros no vinieron por la música, sino para ver a las mujeres hermosas y visitarlas más tarde en el vestuario. Como no obtuvieron lo que querían, sabotearon el evento con silbatos y gritos. El día siguiente no fue mejor: la prensa parisina destrozó la actuación en el aire. No solo Francia, sino también los amigos y enemigos de Wagner en Alemania observará nuestra reacción de cerca." #NT!
 elgar.523.g: "¡Nunca debería volver a aparecer en París!" #NT!
 elgar.523.h: "Tenemos que apaciguar a Herrn Wagner." #NT!
 elgar.524.t: "Suite Holberg" #NT!
 elgar.524.d: "La suite Holberg de Edvard Grieg, que se estrenó en Oslo, no solo ha resultado ser una obra maestra musical, sino que también ha inspirado el sentimiento nacional noruego." #NT!
 elgar.524.f: "La suite de Holberg, subtitulada 'Suite in Olden Style', es una suite de cinco movimientos basados ​​en formas de baile del siglo XVIII, escrita por Edvard Grieg en 1884 para celebrar el 200 aniversario del nacimiento del dramaturgo humanista dano-norwegiano Ludvig Holberg (1684-1754). Ejemplifica la música del siglo XIX que utiliza estilos y formas musicales del siglo anterior. La suite Holberg fue originalmente compuesta para el piano, pero un año después fue adaptada por el propio Grieg para la orquesta de cuerda. La suite consiste en una introducción y un conjunto de bailes. Es un ensayo temprano en el neoclasicismo, un intento de hacer eco tanto como se sabía en la época de Grieg de la música de la era de Holberg. Aunque no es tan famosa como la música incidental de Grieg de Peer Gynt, que generalmente se realiza según lo dispuesto en un par de suites, muchos críticos consideran las obras como un mérito igual." #NT!
 elgar.525.t: "Nuevos carriles" #NT!
 elgar.525.d: "En la 'revista Neue Für Musik', Robert Schumann mencionó a un nuevo artista que de repente se hizo famoso durante la noche. Se llama Johannes Brahms e causó una fuerte impresión tanto en Schumann como en su esposa Clara." #NT!
 elgar.525.f: "'Y él ha venido, joven sangre, a cuyas gracias y héroes de la cuna han vigilado. Su nombre es Johannes Brahms, vino de Hamburgo, trabajó allí en un silencio oscuro, pero fue entrenado por un excelente y entusiasta maestro en entornos difíciles de arte, recomendado poco antes por un maestro venerado y conocido. En el exterior también, llevaba todas las señales que nos anuncian: es un hombre llamado. - Robert Schumann" #NT!
 elgar.525.g: "Esperamos grandes cosas del Sr. Brahms." #NT!
 elgar.526.t: "Gesang der Parzen" #NT!
 elgar.526.d: "'Song of the Fates' de Johannes Brahms se estrenó en Basilea. Junto con Viena, Suiza fue uno de los lugares más importantes de Brahms para quedarse." #NT!
 elgar.526.f: "El Gesang der Parzen (Song of the Fates) es la última composición para el coro y la orquesta de Johannes Brahms. Más de 10 años después del Cantata Rinaldo op. 50 y el Alto Rhapsody Op. 53, Brahms volvió a usar un texto de Johann Wolfgang von Goethe. Según Max Kalbeck, Brahms se inspiró para componer la actriz Charlotte Wolter, quien apareció en el papel de Iphigenia en el Burgtheater en Viena. El 13 de junio de 1896, Brahms escribió sobre la pieza: 'A menudo escucho filosofar sobre el sexto verso de los parzenliados. Creo que el corazón del oyente desprevenido debería volverse suave y el ojo mojado en la mera entrada del mayor; Solo entonces la miseria de la humanidad lo agarra." #NT!
 elgar.526.g: "Es tan maravilloso como inquietante." #NT!
 elgar.527.t: "Un propietario de una plantación de naranja componiendo" #NT!
 elgar.527.d: "El hijo del conocido empresario de lana Julius Delius tomó lecciones de un organista y publicó algunas de sus primeras composiciones." #NT!
 elgar.527.f: "Frederick Delius, un inglés nacido, era hijo del empresario de lana alemán Julius Delius. El padre quería que su hijo fuera el sucesor en la compañía, pero el hijo prestó poca atención a los negocios en Europa y estaba más interesado en el arte y la música. Por lo tanto, Delius Jr. Transferido a una plantación naranja en Florida para mantenerlo alejado de las influencias de las metrópolis europeas. Sin embargo, fue esta transferencia la que sería de excelente importancia para su creatividad musical posterior. En Jacksonville, Delius conoció al organista católico Thomas Ward, quien Delius dice que fue el único que realmente le enseñó cualquier cosa. Un poco más tarde, Delius debía publicar sus primeras composiciones en Danville, Virginia." #NT!
 elgar.527.g: "¿Qué iba a ser de este bien para nada?" #NT!
 elgar.528.t: "Un austriaco en Nueva York" #NT!
 elgar.528.d: "Después de disputas en su patria austriaca, Gustav Mahler encontró una audiencia en Nueva York, con quien sus obras fueron muy bien recibidas. A algunos de los responsables del mundo de la música estadounidense les gustaría involucrarlo a largo plazo." #NT!
 elgar.528.f: "Para algunos, el doblete alemán estaba demasiado apretado cuando escucharon el nombre de Mahler. Algunos por emoción, pero la mayoría de la ira. Ha sido así desde el primer día. Tuvo un efecto inmediato, incitante, provocativo, alarmante, no importa: pertenece a las naturalezas eléctricas y electrizantes que emiten chispas o se encienden al más mínimo toque. Al principio, por supuesto, solo su impopularidad frenética lo hizo popular. Llevado por el favor del odio, cuidadosamente iluminado por la envidia, ese protector eternamente insomnable y poderoso de todo lo que es real, por ridículo, por envidia y calumnia, proclamado por los portadores de sonido más fuertes en cada esquina de la calle, se ha hecho famoso. […] Y así se escuchó todos los días que maltrata a sus músicos, los guía en un trabajo inhumano, casi los incita a muerte, y que si solo pudieran, a todos les gustaría ahogarlo en una cucharada de agua. Se dijo que acortó a sus cantantes, los perforó como reclutas, tocó con ellos como el gran turco con sus esclavos. […] La intensidad de su ser parecía llenar toda la ciudad de Nueva York. - Felix Salten" #NT!
 elgar.528.g: "Qué tipo tan extraño." #NT!
 elgar.528.h: "Mahler debe quedarse en Estados Unidos." #NT!
 elgar.529.t: "Suite escita" #NT!
 elgar.529.d: "Sergei Prokofiev, uno de los talentos jóvenes más prometedores en la música rusa, sorprendió hoy al público con una actuación escandalosa." #NT!
 elgar.529.f: "Prokofiev originalmente escribió la música para el ballet ala i lolli, cuya historia tiene lugar entre los escitas. Corretado por Sergei Diaghilev, el ballet fue escrito a un escenario del poeta ruso Sergey Gorodetsky. Pero cuando Diaghilev rechazó la partitura incluso antes de su finalización, el compositor reelaboró ​​la música en una suite para la interpretación de conciertos. La actuación se convirtió en el mayor escándalo en la historia de los estrenos de Prokofiev. El director del conservatorio en ese momento, Alexander Glazunov, dejó el pasillo durante el concierto, la mayoría de la audiencia estaba indignada y las críticas fueron devastadoras. Sin embargo, Prokofiev no estaba muy impresionado y al día siguiente escribió sucintamente a Moscú que la actuación había ido 'con una verdadera raqueta'." #NT!
 elgar.529.g: "Una obra maestra!" #NT!
 elgar.529.h: "Desagradable." #NT!
 elgar.530.t: "La sinfonía de renés" #NT!
 elgar.530.d: "Robert Schumann tomó un trabajo en Düsseldorf en el Rin y de repente se inspiró en el trabajo de construcción en la Catedral de Colonia para escribir un nuevo trabajo." #NT!
 elgar.530.f: "Robert Schumann es considerado como uno de los compositores más representativos de la era romántica. En 1850, salió a Ferdinand Hiller como director musical y se mudó a Düsseldorf. Aunque criticado con respecto a sus malas habilidades de conductores y se burló de su 'decadencia creativa', Schumann compuso su última sinfonía, el 'renés'. Utilizó las sinfonías de Beethoven y Mendelssohn como modelo, pero también se inspiró en sus impresiones de Renania. El propio Schumann declaró que su viaje a Colonia y la vista de la Catedral fueron su principal inspiración para esta composición, que se convirtió en una de sus obras más famosas." #NT!
 elgar.530.g: "Fue una buena idea continuar construyendo la catedral, ¿no?" #NT!
 elgar.531.t: "Intento de suicidio de Schumann" #NT!
 elgar.531.d: "El compositor Robert Schumann fue rescatado del río en el último minuto de hoy; aparentemente había querido quitarse la vida en confusión mental. Todavía no está completamente claro cómo tratar con él." #NT!
 elgar.531.f: "El 10 de febrero de 1854, el sufrimiento psicológico de Schumann aumentó dramáticamente. Principalmente se quejó de 'problemas de audición'. Tonos, acordes, piezas musicales enteras en su cabeza y le robaron el sueño. Mientras tanto, Schumann fue observado de día y noche por su esposa e hijos y ya estaba bajo supervisión médica, pero aún podía salir del apartamento el 27 de febrero de 1854 en un momento no observado. Se dirigió al cercano puente de pontón, trepó sobre la barandilla y, después de lanzar su anillo de bodas al agua, se arrojó al río. Fue rescatado por el Maestro del Bridge y otros hombres desconocidos, llevado a casa y atendido por un médico que fue convocado. Después de su intento de suicidio, deseaba ser admitido en la institución para el tratamiento y el cuidado de personas con enfermedades mentales y locas en Endenich cerca de Bonn, que fue inaugurada en 1844 por el psiquiatra Franz Richarz." #NT!
 elgar.531.g: "No hay nada que podamos hacer." #NT!
 elgar.531.h: "Envíalo al asilo mental moderno cerca de Endenich." #NT!
 elgar.532.t: "La muerte de Schumann" #NT!
 elgar.532.d: "Después de varios años de trastorno mental, Robert Schumann, una vez un talento musical prometedor, murió en un asilo mental, ignorado por el mundo." #NT!
 elgar.532.f: "Brahms vio a Schumann el 31 de marzo y el 19 de agosto de 1854 sin poder hablar con él. El 11 de enero, el 23 de febrero y el 2 de abril de 1855, sin embargo, ambos pudieron hablar en detalle. Schumann estaba tan bien que pudo tocar música en el piano cuadrado con Brahms y acompañarlo parte del camino a la estación de tren de Bonn bajo la supervisión de un guardia. El 10 de abril de 1856, Brahms encontró a Schumann en una condición precaria. Schumann ya no podía hablar inteligiblemente. El 1 de mayo de 1856, se mencionó por última vez en los registros médicos que Schumann tocó el piano. La mayoría de las veces apenas podía expresarse de manera inteligible. El plan de Clara Schumann desde abril de 1856 para llevar a Schumann a Düsseldorf y cuidarlo allí no se realizó. Desde mediados de julio de 1856, Schumann comió cada vez menos. El 26 de julio de 1856 tenía "contracciones en varios músculos, la cara y las extremidades". Rales mucosos sugirió neumonía. Robert Schumann murió el 29 de julio; Nadie estaba presente." #NT!
 elgar.533.t: "La recuperación milagrosa de Robert Schumann" #NT!
 elgar.533.d: "Aparentemente, los métodos modernos en el sanatorio de Endenich han tenido un efecto. Schumann está mostrando signos de mejora, aunque su regreso al trabajo seguirá tomando unos meses." #NT!
 elgar.533.f: "La recuperación milagrosa de Schumann comenzó después de que le dijo a Peters en septiembre de 1854, poco antes de su 14 aniversario de bodas, que Düsseldorf se había derrumbado y Clara y los niños estaban muertos. Para disipar este engaño, Peters le pidió a Clara Schumann una carta a su esposo. Esto condujo al primer intercambio de letras desde la admisión. De ahora en adelante, Schumann nuevamente participó activamente en la vida fuera de la institución. También se correspondió con sus hijos, Johannes Brahms, Joseph Joachim y con editores. Entre septiembre de 1854 y mayo de 1855 escribió alrededor de 25 cartas. Durante este tiempo, Schumann a menudo expresó su deseo de poder abandonar Endenich nuevamente. Jugaba el piano de vez en cuando. Estudió composiciones de Brahms. El 11 de enero de 1855 tuvo su primera visita de Johannes Brahms. A partir de entonces, la condición de Schumann mejoró constantemente hasta que los médicos permitieron que Clara Schumann visitara. Con su apoyo y el de Brahms, Schumann pronto comenzó a componer nuevamente, y así inició un proceso de autocuración." #NT!
 elgar.533.g: "Pero, ¿cómo es eso posible?" #NT!
 elgar.534.t: "Tango" #NT!
 elgar.534.d: "El intérprete de tango Carlos Gardel ha registrado su primer éxito de récord con Mi Noche Triste." #NT!
 elgar.534.f: "Carlos Gardel fue la figura más destacada en la historia del tango. Fue uno de los intérpretes más influyentes de la música popular mundial en la primera mitad del siglo XX. Gardel es el cantante de tango popular más famoso de todos los tiempos y es reconocido en todo el mundo. Creó la Cancía de Tango en 1917 con su interpretación de Pascual contursi y Mi Noche Triste de Samuel Castriota. Con 'Mi Noche Triste', tuvo lugar el nacimiento del tango sentimental. Nostálgico, melodramático y triste, las nuevas letras y la música encarnada Buenos Aires y su gente." #NT!
 elgar.534.g: "El triunfo de la música argentina." #NT!
  
 elgar.601.t: "La muerte de [SCOPE.sCharacter('elgar_composer_scope').GetLastName]" #NT!
 elgar.601.d: "[SCOPE.sCharacter('elgar_composer_scope').GetFullName], una de las mejores mentes artísticas de nuestro país y una estrella brillante en el firmamento musical, murió hoy. Deja un espacio que difícilmente puede llenarse." #NT!
 elgar.601.g: "Un titán de la historia de la música nos ha dejado." #NT!
 elgar.603.t: "Rossini deja a Bolonia" #NT!
 elgar.603.d: "Rossini ha decidido dejar Bolonia. La noticia no solo fue una sorpresa para los residentes de la ciudad, sino que también entristeció todo el país." #NT!
 elgar.603.f: "Cuando Gioacchino Rossini decidió abandonar Bolonia y, por lo tanto, los estados papales, habían pasado alrededor de 20 años desde su retiro de la etapa de la ópera. Sin embargo, Rossini seguía siendo una figura muy respetada y uno de los compositores más queridos de Italia. Una razón principal por la cual Rossini regresó a París, después de un interludio en Florencia, probablemente fue no menos importante debido a su salud. En sus últimos años como estrella de la música europea, ya se había deteriorado tanto física como mentalmente. París prometió mejores perspectivas de atención médica, por lo que Rossini pensó en gastar su retiro allí." #NT!
 elgar.603.g: "¡Pero no terminó su tortellini!" #NT!
 elgar.609.d: "Franz Lachner anunció su retiro del podio del conductor hoy. Ya no ve un futuro para su carrera." #NT!
 elgar.609.f: "Toda una serie de circunstancias condujo a la salida prematura de Franz Lachner del mundo de la música. El factor decisivo para esto fue la nueva música de Richard Wagner y el triunfo de sus aliados. Lachner, que conocía a Schubert y Beethoven, no podía seguir este desarrollo y no quería. Similar a Rossini, quien entendió que fue visto como una reliquia de otras veces, mientras que el mundo había seguido adelante, Lachner se retiró, sobre todo debido al ridículo y la malicia de los críticos leales a Wagner." #NT!
 elgar.609.g: "Una pérdida para [GetPlayer.GetName]." #NT!
 elgar.613.f: "Gaetano Donizetti falleció pacíficamente esta mañana después de una larga y satisfactoria vida en los brazos de su segunda esposa y rodeada de sus hijos. Una procesión fúnebre con varias bandas, cientos de portadores de antorchas y miles de espectadores se despiden de un hombre que se dice que vivió una vida perfecta." #NT!
 elgar.614.f: "En 1867, Berlioz recibió la noticia de que su hijo había muerto en La Habana de fiebre amarilla. MacDonald sugiere que Berlioz pudo haber buscado la distracción de su dolor al seguir adelante con una serie planificada de conciertos en San Petersburgo y Moscú, pero lejos de rejuvenecerlo, el viaje agitó su fuerza restante.  Fue agradable para recuperarse en el clima mediterráneo, pero cayó en rocas a la orilla, posiblemente debido a un derrame cerebral, y tuvo que regresar a París, donde se convaló durante varios meses. En agosto de 1868, se sintió capaz de viajar brevemente a Grenoble para juzgar un festival coral.  Después de llegar a París, se debilitó gradualmente y murió en su casa en la Rue de Calais el 8 de marzo de 1869, a la edad de 65 años. Fue enterrado en el cementerio de Montmartre con sus dos esposas, que fueron exhumados y volvidos a buscar a su lado." #NT!
 elgar.615.f: "After the failed marriage to Carolyne zu Sayn-Wittgenstein, Liszt increasingly devoted himself to compositions with religious themes. En Roma, donde se quedó principalmente hasta 1870, dirigió una parte mundana y monástica de la vida y se retiró a un monasterio en el verano de 1863, donde el Papa Pío IX también lo visitó. En 1865, Liszt se sometió a una tonsura y recibió las cuatro órdenes menores. A partir de entonces, como clérigo, llevaba el collar romano y fue abordado como un Abbe. En 1886, Liszt asistió al Festival Wagner. En el momento del viaje, Liszt ya estaba gravemente enfermo y murió unos días después de su llegada el 31 de julio de 1886 como resultado de la neumonía. Bernhard Schnappauf, médico y amigo de Richard Wagner, pasó los últimos días en su lecho de muerte e informó que Liszt murió en silencio y con dignidad. Cerró los ojos e hizo la máscara de muerte, para lo cual, según la antigua costumbre, tenía derecho a la cubierta y la funda de almohada." #NT!
 elgar.616.f: "None" #NT!
 elgar.617.f: "Edvard Grieg murió en el Hospital Municipal en Bergen, Noruega, el 4 de septiembre de 1907 a los 64 años por insuficiencia cardíaca. Había sufrido un largo período de enfermedad. Sus últimas palabras fueron: 'Bueno, si debe ser así'. El funeral atrajo entre 30,000 y 40,000 personas a las calles de su ciudad natal para honrarlo. Obedeciendo su deseo, su propia marcha fúnebre en memoria de Rikard Nordraak fue jugado con orquestación por su amigo Johan Halvorsen, quien se había casado con la sobrina de Grieg. Además, se jugó el movimiento de la Marcha Funeral del Piano Sonata No. 2 de Chopin. Grieg fue cremado en el primer crematorio noruego inaugurado en Bergen justo ese año, y sus cenizas fueron sepultadas en una cripta de montaña cerca de su casa, Troldhaugen. Después de la muerte de su esposa, sus cenizas fueron colocadas junto a la suya." #NT!
 elgar.618.f: "Brahms murió el 3 de abril de 1897 temprano en la mañana a la edad de 63 años en su departamento en Karlsgasse 4, donde había vivido desde 1872, según algunas biografías del cáncer de hígado, según información más reciente del carcinoma pancreático. Su última aparición pública fue el 7 de marzo de 1897 cuando vio a Hans Richter llevar a cabo su Sinfonía No. 4; Hubo una ovación después de cada uno de los cuatro movimientos. Después de ser presentado en la casa de luto, donde Carl Kundmann le quitó la máscara de muerte y Ludwig Michalek hizo una última foto pastel, la consagración tuvo lugar el 6 de abril en la Iglesia de la Ciudad Luterana." #NT!
 elgar.619.f: "Mañana y Viena. Un caos. Te aferras a los detalles que nadie puede saber aún. Debe ser enterrado en el pequeño cementerio en Grinzing, junto a su pequeña hija. Se trae el cadáver. La otra mañana. El camino 'un den Langen Lüssen' conduce a través del país a los cipreses. La capilla es un espacio pequeño, solo para el ataúd y algunas coronas. Los otros se alinean en los caminos hacia la tumba. Una mujer viene y le dice a otra: 'Ahora está en paz por dentro. Todo era demasiado pequeño para él. La iglesia en Grinzing es pequeña, el cementerio estrecho. Y un espectáculo para los vienos es inminente. La iglesia y el cementerio serán acordonados. Solo las tarjetas darán acceso. Aprendemos que Franz Schalk, Gregor y la Junta Directiva han solicitado que la ópera esté cerrada el día del funeral. No hay palabra sobre eso. El tribunal, el municipio de Viena, no se mueve. Y luego la celebración. Estamos parados frente a la iglesia cuando se lleva a cabo el ataúd. Está lloviendo. Llegamos a la tumba más rápidamente a través de un camino de viñedo. Llega la procesión. La lluvia se detiene. Un ruiseñor canta, los terribles caen. Un arco iris. Y los cientos están en silencio. - Paul Stefan" #NT!
  
 elgar.701.g: "Esa fue una actuación maravillosa." #NT!
 elgar.701.h: "¡Contrata a este hombre brillante!" #NT!
 elgar.706.g: "A los 20 años, ¿no es demasiado joven para un trabajo como este?" #NT!
 elgar.701.t: "Grande Symphonie Funèbre et Triomphale" #NT!
 elgar.701.d: "Para conmemorar el décimo aniversario de la revolución de julio, Héctor Berlioz compuso una pieza que atrajo una gran admiración pública." #NT!
 elgar.701.f: "El gobierno francés encargó a la sinfonía las celebraciones que marcaban el décimo aniversario de la revolución de julio que había llevado a Louis-Philippe I al poder, por lo que estaba erigiendo la columna de julio en el lugar de la Bastille. Berlioz simpatizó con el régimen, pero dio la bienvenida a la oportunidad de escribir el trabajo porque el gobierno le había ofrecido 10,000 francos por ello. El Militaire de la Symphonie (más tarde renombrado Symphonie Funèbre et Triomphale), en lugar de seguir al modelo Berlioz había establecido en Romeo y Julieta, representa una reversión a un estilo anterior pre-beetoveniano en la tradición de la monumental música ceremonial del público francés. Berlioz revisó el puntaje en enero de 1842, agregando una parte opcional para las cuerdas y un coro final a un texto de Antony Deschamps. Richard Wagner asistió a una actuación de esta nueva versión en el Salle Vivienne el 1 de febrero de 1842. El 5 de febrero, le dijo a Robert Schumann que encontró pasajes en el último movimiento de la sinfonía de Berlioz tan "magnífica y sublime que nunca pueden ser superados"." #NT!
 elgar.702.t: "Liszt en Weimar" #NT!
 elgar.702.d: "Después de muchos años de giras de conciertos, el virtuoso del piano y el compositor Franz Liszt está considerando establecerse en Weimar." #NT!
 elgar.702.f: "Los años de Weimar fueron el período más productivo de Franz Liszt. Escribió muchas de sus obras de piano en Weimar, como la Sonata de piano en B menor, las armonías Poétiques et Religieus Cycle, quince rapsodias húngaras, así como numerosas transcripciones, reducciones de piano y revisiones de obras de piano anteriores, como los etudes de Paganini. Dos de sus conciertos de piano previamente concebidos también recibieron su forma final aquí. En Weimar, Liszt realizó muchas obras de compositores contemporáneos, algunos de los cuales eran controvertidos en ese momento, y también realizaron sus óperas. Realizó obras de Richard Wagner, quien estaba particularmente cerca de él y a quien ayudó a huir a Zúrich en la primavera de 1849 después del levantamiento de Dresde. En los años que siguieron, apoyó a Wagner financieramente y moralmente y mantuvo una correspondencia animada con él. Más tarde, Liszt y Wagner a menudo aparecían juntos como conductores. Desde 1865, después de que Wagner tuvo una relación con la hija de Liszt, Cosima, la relación se enfrió durante mucho tiempo." #NT!
 elgar.703.t: "Rienzi" #NT!
 elgar.703.d: "Un joven compositor ha impresionado al público en Dresde y artistas internacionales con su ópera 'Rienzi'. Se llama Richard Wagner." #NT!
 elgar.703.f: "'Ninguna experiencia posterior me ha dado sentimientos incluso remotamente similares a los que tuve en este día de la primera actuación de Rienzi. La única ansiedad demasiado bien fundada en cuanto a su éxito ha dominado tanto mis sentimientos en todas las primeras actuaciones posteriores de mis obras que nunca podría disfrutarlas o darme una gran cantidad de la forma en que la audiencia se estaba comportando. [...] El éxito inicial de Rienzi sin duda se aseguró de antemano. Pero la forma poco escasa en la que el público declaró su parcialidad por mí era extraordinaria ... el público había sido predispuesto a la fuerza a aceptarlo, porque todos los que se conectaban con el teatro habían estado difundiendo informes tan favorables ... que toda la población esperaba lo que estaba anunciado como un milagro ... al tratar de recordar mi condición esa noche, puedo recordar que solo poseía todas las características de un sueño ". - Richard Wagner" #NT!
 elgar.704.t: "Concierto para piano en un menor" #NT!
 elgar.704.d: "Un concierto para piano de Edvard Grieg celebró su estreno mundial hoy en Copenhague. Ya es previsible que esta sea una de sus piezas más populares." #NT!
 elgar.704.f: "El concierto para piano en un menor, op. 16, compuesto por Edvard Grieg en 1868, fue el único concierto de Grieg completado. El trabajo se encuentra entre las primeras obras importantes de Grieg, escritas por el compositor de 24 años en 1868 en Søllerød, Dinamarca, durante una de sus visitas allí para beneficiarse del clima. El concierto de Grieg proporciona evidencia de su interés en la música folclórica noruega; El florecimiento de apertura se basa en el motivo de un segundo menor que cae seguido de un tercio principal que cae, que es típico de la música popular del país natal de Grieg. El trabajo fue estrenado por Edmund Neupert el 3 de abril de 1869, en Copenhague, con Holger Simon Paulli dirigiendo. Algunas fuentes dicen que el propio Grieg, un excelente pianista, era el solista previsto, pero no pudo asistir al estreno debido a los compromisos con una orquesta en Christiania (ahora Oslo). Entre los que asistieron al estreno estaban el compositor danés Niels Gade y el pianista ruso Anton Rubinstein, quien proporcionó su piano para la ocasión. Grieg revisó el trabajo al menos siete veces, generalmente de maneras sutiles, pero las revisiones ascendieron a más de 300 diferencias con respecto a la orquestación original." #NT!
 elgar.705.t: "Variaciones sobre un tema de Haydn" #NT!
 elgar.705.d: "El compositor Johannes Brahms ha realizado una nueva obra maestra hoy, pero al mismo tiempo está considerando hacer un compromiso permanente con Viena." #NT!
 elgar.705.f: "Las variaciones sobre un tema de Haydn Op. 56a es un trabajo de variación para la orquesta de Johannes Brahms. El trabajo fue creado en el verano de 1873 en Tutzing. El estreno tuvo lugar el 2 de noviembre de 1873 en Viena bajo la dirección de Brahms. La pieza cae en una época en la que Brahms quería celebrar su estadía en Viena. Por un lado, dejó Detmold y Hamburgo decepcionados hace años. Por otro lado, se esforzó por vivir donde sus grandes modelos clásicos habían vivido y continuar la tradición vienés." #NT!
 elgar.706.t: "La primera aparición de Mahler" #NT!
 elgar.706.d: "En Bad Hall, el joven y talentoso director Gustav Mahler asumió la posición de Kapellmeister por primera vez. En los años siguientes subía la escalera de carrera a la ópera estatal de Viena" #NT!
 elgar.706.f: "'Y allí estaba en persona en la oficina del teatro cuando salí de mi primera visita a Pollini: pálido, delgado, pequeño en la estatura, la cara larga, la fuerte frente enmarcada por el cabello negro profundo, los ojos importantes detrás de las gafas, los surcos de sufrimiento y el humor en su semblante, que, mientras hablaba, mostró el cambio de expresión más sorprendente, tan interesante, demoníaca, incarida de la incarnación de Kapellmheister Kreisler como el juventud de la juventud de la juventud de la juventud de la juventud de la jóven E.T.A. Las fantasías de Hoffmann podrían imaginarse; Me preguntó amablemente sobre mi habilidad y conocimiento musical, a lo que respondí, a su evidente satisfacción con una mezcla de timidez y confianza en sí mismo, y me dejó en un estado aturdido y sacudido. [...] Mahler me apareció en la cara y el comportamiento como genio y demonio [...] ' - Bruno Walter" #NT!
 elgar.707.t: "Concierto para piano No. 2" #NT!
 elgar.707.d: "Después de muchos contratiempos, el compositor Sergei Rachmaninoff ha regresado impresionante: su segundo concierto para piano causó aplausos frenéticos." #NT!
 elgar.707.f: "Después del desastroso estreno de 1897 de su primera sinfonía, Rachmaninoff sufrió un desglose psicológico que evitó la composición durante tres años. Aunque la depresión agitó su energía, todavía se dedicó al rendimiento. Las lecciones de conducción y piano se hicieron necesarias para aliviar su posición financiera. En 1899, se suponía que debía realizar el segundo concierto para piano en Londres, que aún no había compuesto debido a una enfermedad, y en su lugar hizo un debut exitoso de conducción. Los familiares decidieron presentarle al neurólogo Nikolai Dahl, a quien visitó diariamente de enero a abril de 1900, lo que ayudó a restaurar su salud y confianza en la composición. Rachmaninoff dedicó el concierto a Dahl por tratarlo con éxito. Después de cumplir con su compromiso de conciertos de Londres de 1908 en el Queen's Hall bajo Serge Koussevitzky, surgió una revisión halagadora de The Times: "La expresión directa del trabajo, la extraordinaria precisión y exactitud de la interpretación de Rachmaninoff, e incluso la economía estricta de movimiento de las armas y las manos que ejerce, todos contribuyeron a la impresión de la impresión de la actuación"." #NT!
 elgar.708.t: "Sinfonía No. 1 'clásica'" #NT!
 elgar.708.d: "Con su primera sinfonía, Sergei Prokofiev se ha recomendado una vez más como un compositor prometedor. Por otro lado, empuja al joven artista al mundo para que se pague mejor." #NT!
 elgar.708.f: "'Ensayo de la sinfonía clásica con la orquesta estatal, lo llevé a cabo yo mismo, improvisando por completo, habiendo olvidado el puntaje y nunca la había estudiado desde una perspectiva de conducción. Pensé que podría ser una debacle completa, pero no pasó nada y, en cualquier caso, las partes tienen tantos errores en ellos que la sesión se convirtió principalmente en una para hacer correcciones. En Kislovodsk, me había preocupado que hubiera algo de antagonismo de una "orquesta revolucionaria" que interpretaba mis nuevas obras, pero lo contrario era el caso: la orquesta estatal, infundida con mucha sangre joven nueva, era flexible y atenta, y interpretaba la sinfonía con un evidente disfrute ". - Sergei Prokofiev" #NT!
 elgar.709.t: "Romeo y Julieta" #NT!
 elgar.709.d: "Pyotr Tchaikovsky, un aspirante a joven compositor, ha presentado su obertura Romeo y Julieta. La audiencia recibió el trabajo con sentimientos encontrados." #NT!
 elgar.709.f: "No solo al principio, sino a lo largo de toda su carrera, Tchaikovsky tuvo que afirmarse contra críticos y competidores. La obertura Romeo y Julieta, por ejemplo, estaban destinadas a ser un fracaso cuando se publicó. Por otro lado, esta crítica, que Tchaikovsky recibió repetidamente a lo largo de su vida, llevó al compositor a editar sobrevenuablemente esto y otras obras; Tchaikovsky siguió siendo uno de los mejores críticos de su propio trabajo a lo largo de su carrera. Tampoco fue sin ironía que los compositores nacionales de mentalidad rusa elogiaran precisamente este trabajo, a pesar de que luego estarían entre los críticos más duros de Tchaikovsky. Sin embargo, Tchaikovsky se convertiría en uno de los compositores rusos más importantes de este período a más tardar y, en solo unos años, alcanzar la fama internacional que apenas logró ningún otro músico del siglo." #NT!
 elgar.710.t: "Viva Verdi" #NT!
 elgar.710.d: "Con la creación del estado nacional italiano y la adición de la ciudad de la ópera de Milán a nuestro territorio, tenemos la oportunidad única de involucrar a una de las figuras más importantes en la historia musical italiana: Giuseppe Verdi." #NT!
 elgar.710.f: "Giuseppe Verdi fue un compositor y político italiano, universalmente reconocido como uno de los mejores artistas y compositores de ópera de todos los tiempos, junto con otros protagonistas del teatro musical italiano del siglo XIX: Gioachino Rossini, Vincenzo Bellini y Gaetano Donizetti. Simpatizó con el movimiento Risorgimento que siguió la unificación de Italia y participó activamente por un corto tiempo en la vida política; En el transcurso de su larga existencia, estableció una posición única entre sus compatriotas, convirtiéndose en un profundo símbolo artístico de la unidad del país. Fue por esta razón que un mes después de su muerte, una procesión solemne e interminable cruzó a Milán, acompañando sus restos con las notas de 'VA, Pensiero' de Nabucco, escrita por él 60 años antes, expresando efectivamente los sentimientos de los italianos hacia su héroe desaparecido. Esto demostró la medida en que la música de Verdi había sido asimilada en la conciencia nacional. Sus obras aún permanecen entre los más conocidos y realizados en los cines de todo el mundo, en particular Aida (1871), el Nabucco mencionado anteriormente (1842) y la llamada 'Verdi Triad': Rigoletto (1851), Il Trovatore (1853) y La Traviata (1853)." #NT!
 elgar.711.t: "Sinfonía de primavera" #NT!
 elgar.711.d: "La primera sinfonía de Robert Schumann se realizó hoy bajo la dirección de Felix Mendelssohn Bartholdy. Schumann está casado con la importante pianista Clara (Née Wieck) y hasta ahora ha atraído más atención como crítica de música que como compositor. Las opiniones difieren sobre sus piezas para el piano." #NT!
 elgar.711.f: "Con la excepción de Franz Schubert, ningún compositor de habla alemana fue tan juzgado durante su vida como Robert Schumann. Si bien la importancia de Schubert solo fue reconocida después de su muerte temprana, Schumann fue acusado de comenzar como un genio y terminar como un talento. Los contemporáneos a menudo no tenían acceso a su trabajo o simplemente no entendían sus obras. Sus piezas de piano, que componen parte de su fama hoy, eran en su mayoría desconocidas en ese momento. Los maquetas solo lo vieron como el hombre al lado de la pianista Clara Schumann. En su sajonia natal se paró a la sombra de Mendelssohn. Wagner luego se opuso a él, mientras que Brahms se convirtió en un confidente cercano de Clara y Robert. Liszt vio a Schumann como un pionero del progreso musical en Alemania, pero no tuvo éxito con el público cuando incluía las obras de Schumann en su repertorio. Las esperanzas de una posición permanente en una importante institución musical se desvanecieron repetidamente. Similar a Schubert, Schumann también cumplió con un final prematuro y trágico." #NT!
 elgar.712.t: "Rey Olaf" #NT!
 elgar.712.d: "Edward Elgar se ha distinguido en los últimos años con sus cantatas y obras corales. 'Escenas de la saga del rey Olaf', su trabajo más reciente, fue bien recibido por el público." #NT!
 elgar.712.f: "En la década de 1890, Edward Elgar construyó una creciente reputación como un importante compositor británico. Inicialmente fuertemente influenciado por la influencia continental: 'King Olaf' también muestra ecos del estilo Wganer - gradualmente encontró su propio lenguaje de sonido, lo que alentaría a los compositores británicos posteriores a tomar caminos completamente nuevos. Elgar sintió que era un extraño, no solo musicalmente, sino socialmente. En los círculos musicales dominados por los académicos, era un compositor autodidacta; En la Gran Bretaña protestante, su catolicismo romano fue considerado con sospecha en algunos sectores; Y en la sociedad consciente de la clase de Gran Bretaña victoriana y eduardiana, era muy sensible sobre sus humildes orígenes incluso después de lograr el reconocimiento. Sin embargo, Elgar puede considerarse el compositor británico más importante desde Henry Purcell." #NT!
 elgar.713.t: "Director musical de Hofball" #NT!
 elgar.713.d: "El puesto de director musical de Hofball ha estado abierto durante años. Una posición prestigiosa que se suponía que debía ir al compositor Johann Strauss. Anteriormente se le había negado este honor por razones políticas. Ahora hay voces crecientes para ofrecer el puesto al hijo del compositor que murió temprano." #NT!
 elgar.713.f: "Johann Strauss era un maestro de bandas austriaco-alemán y compositor y fue reconocido internacionalmente como el 'Rey de Valtz'. Ya había compuesto su primer vals a la edad de seis años y había tomado clases de violín en secreto porque su padre había planeado una carrera como funcionario. Debido a que este último se había roto con la familia, su madre apoyó su entrenamiento musical contra su voluntad. Su primera aparición en el Casino Dommayer, un lugar de entretenimiento conocido en toda la región, fue un gran éxito. Las giras inicialmente lo llevaron a través de la monarquía del Danubio con su propia orquesta (que aumentó su rivalidad con su padre). Después de la muerte de su padre, se hizo cargo de su orquesta y la fusionó con la suya. Debido a que había compuesto algunas obras para los revolucionarios de 1848 y, por lo tanto, mostró simpatía por el movimiento insurreccional, atrajo la atención de las autoridades de censura y cayó en desgracia en la corte a pesar de su popularidad. Como resultado, se le negó el puesto de director musical de la pelota de la corte hasta 1863." #NT!
 elgar.713.g: "Perdió su oportunidad, pero es bienvenido a componer." #NT!
 elgar.713.h: "¡Dale al rey de vals el lugar que se merece!" #NT!
 elgar.714.t: "Ganador del Premio Estatal de Composición" #NT!
 elgar.714.d: "El ganador del premio estatal de composición de este año es un talento checo excepcional. Se llama Antonín Dvořák." #NT!
 elgar.714.f: "Antonín Dvořák fue un compositor checo, que con frecuencia empleaba ritmos y otros aspectos de la música folklórica de Moravia y su bohemia natal. Dvořák mostró sus regalos musicales a una edad temprana, siendo un estudiante de violín de seis años. En 1874, hizo una sumisión al Premio del Estado de Austria para la Composición, incluidos decenas de dos sinfonías y otras obras. Aunque Dvořák no estaba al tanto de ello, Johannes Brahms fue el miembro principal del jurado y quedó muy impresionado. El premio fue otorgado a Dvořák en 1874 y nuevamente en 1876 y en 1877, cuando Brahms y el destacado crítico Eduard Hanslick, también miembro del jurado, se dieron a conocer. Brahms recomendó a Dvořák a su editor, Simrock." #NT!
 elgar.714.g: "Un trofeo bien merecido." #NT!
 elgar.714.h: "No deberíamos perder este talento." #NT!
 elgar.715.t: "El compositor bohemio" #NT!
 elgar.715.d: "Claude Debussy comenzó como el ganador del Prix de Roma, pero hasta ahora ha hecho poco con su talento certificado que no sea escribir piezas de piano pequeñas y provocativas. ¿Qué será de este bohemio?" #NT!
 elgar.715.f: "Incluso en el Conservatorio, las evaluaciones del talento de Claude Debussy variaron ampliamente. Algunos lo elogiaron como pianista y tenían grandes esperanzas para él. Otros lo describieron como descuidado. Durante este tiempo ya era pianista en la casa de Nadezhda von Meck, el patrón de Tchaikovsky. En 1884, Debussy ganó el Prix de Roma, pero no fue ambicioso durante su estadía en Roma. Encontró la ópera italiana aburrida y tenía poco uso para el estilo predominante de Giuseppe Verdi. Viajó de regreso a París temprano y vivió una vida inestable allí: 'Estoy seguro de que el instituto no aprobaría, porque, naturalmente, considera el camino que ordena como el único correcto. ¡Pero no hay ayuda para ello! ¡Estoy demasiado enamorado de mi libertad, demasiado aficionado a mis propias ideas!" #NT!
 elgar.715.g: "Bonita música de piano, pero tenemos suficientes vagabundos musicales." #NT!
  
 elgar.1011.t: "Don Pasquale" #NT!
 elgar.1011.d: "¡Un gran compositor acaba de completar una obra maestra musical!" #NT!
 elgar.1011.f: "Don Pasquale es una ópera buffa en tres actos. La ópera es una de las más famosas de su género y, junto con L'Elisir d'Amore y Lucia di Lammermoor, es una de las pocas obras de Donizetti que ha tenido una tradición de rendimiento casi continua desde el siglo XIX. Basado en las comedias de Carlo Goldoni, los personajes se basan más o menos de cerca en los tipos de Commedia Dell'arte, pero se les dan rasgos sentimentales, i. H. a través de la capacidad de sentir y expresar tristeza, dolor o remordimiento, una diferenciación que va más allá de su tipo. Don Pasquale fue un éxito instantáneo, como solo que I Puritani (1835) había tenido anteriormente en París." #NT!
 elgar.1011.g: "¡Bravissimo!" #NT!
 elgar.1012.t: "Dom Sébastien" #NT!
 elgar.1012.f: "Dom Sébastien es una gran ópera francesa en cinco actos de Gaetano Donizetti.  Es una ficción histórica sobre el rey Sebastián de Portugal (1554-1578) y su desafortunada expedición de 1578 a Marruecos. En ese momento, Donizetti intentaba componer una ópera competitiva con óperas históricas similares de Daniel Auber, Fromental Halévy y Giacomo Meyerbeer. Una descripción crítica de la naturaleza de Dom Sébastien es "un funeral en cinco actos". El trabajo fue recibido con renuencia, que el propio Donizetti sintió que era un fiasco. Aunque Donizetti consideró que su última ópera era una de sus obras más importantes, Dom Sébastien se olvida en gran medida hoy. Fue escrito en un momento en que Donizetti "ya no tenía control sin restricciones sobre su imaginación", por lo que la ópera ya estaba marcada por la enfermedad incipiente de Donizetti." #NT!
 elgar.1021.t: "Les Troyens" #NT!
 elgar.1021.f: "Les Troyens es una gran ópera francesa en cinco actos de Héctor Berlioz. El libreto fue escrito por el propio Berlioz del poema épico de Virgil, The Eneneid; El puntaje se compuso entre 1856 y 1858. Les Troyens es el trabajo más ambicioso de Berlioz, la suma de toda su carrera artística, pero no vivió para verlo en su totalidad. Bajo el título de Les Troyens à Carthage, los últimos tres actos se estrenaron con muchos cortes de la compañía de Léon Carvalho, The Théâtre Lyrique, en su teatro (ahora el Théâtre de la Ville) en el lugar du Châtelet en París el 4 de noviembre de 1863, con 21 actuaciones repetidas. Después de décadas de negligencia, hoy la ópera es considerada por algunos críticos de la música como uno de los mejores jamás escritos." #NT!
 elgar.1022.t: "La Damnation de Faust" #NT!
 elgar.1022.f: "La Damnation de Faust es un trabajo para cuatro voces en solitario, coro completo de siete partes, gran coro infantil y orquesta del compositor francés Héctor Berlioz. Lo llamó "Légende Dramatique" (leyenda dramática). El compositor francés se inspiró en una traducción del poema dramático de Goethe Faust y produjo un trabajo musical que, como la obra maestra en la que se basa, desafía la categorización fácil. Concebido en varios momentos como un oratorio de forma libre y como una ópera, su forma de viaje de viaje y su perspectiva cósmica han hecho que sea un desafío extremo para el escenario como una ópera. El propio Berlioz estaba ansioso por ver el trabajo organizado, pero una vez que lo hizo, admitió que las técnicas de producción de su tiempo no estaban a la altura de la tarea de llevar el trabajo a la vida dramática. La mayor parte de la fama del trabajo ha llegado a través de actuaciones de conciertos." #NT!
 elgar.1023.t: "Tratado sobre instrumentación" #NT!
 elgar.1023.f: "'Esta traité de instrumentación es un trabajo altamente paradójico. Comienza con un prefacio de varias líneas no relacionadas con el sujeto, en el que el autor toma una posición en contra de los músicos que abusan de las modulaciones y cuya inclinación por la disonancia coincide con el sabor que ciertos animales tienen por plantas saladas y arbustos espinosos. Luego recurre a los instrumentos orquestales y mezcla afirmaciones extrañas con las verdades más sólidas y los valiosos consejos. Para él, mi generación debe su educación, y me atrevo a decir una buena. Berlioz poseía el invaluable regalo de encender la imaginación y el amor excitante por el arte que enseñó. - Camille Saint-Saëns" #NT!
 elgar.1031.t: "Les Préludes" #NT!
 elgar.1031.f: "Les Préludes es el tercero de los trece poemas sinfónicos de Franz Liszt. La música se compuso entre 1845-54, y comenzó como una obertura al ciclo coral de Liszt, les quatre los pELEMENS (los cuatro elementos), luego revisado como una obertura de concierto independiente, con un nuevo título que se refiere a un poema de Alphonse de Lamartine. Les Préludes es el primer ejemplo de un trabajo orquestal titulado 'Poema sinfónico'. Liszt ve las fases de la vida como preludios a la melodía de la muerte. Estas fases de la vida son luchas y tormentas, aman la felicidad y el dolor, el consolación, experimentando la naturaleza. A pesar de los contrastes en estos estados de ánimo reflejados en Les Préludes, el trabajo es de gran coherencia. Comienza con una melodía melancólica, desde la cual se desarrolla el primer tema principal tormentoso, lo que lleva al segundo tema a través de una parte pastoral. Estos dos temas se desarrollan para cambiar de ánimo deslumbrantes. En un clímax, el tema original fluye al primer tema principal como una fanfarria majestuosa y glamorosa." #NT!
 elgar.1032.t: "Rapas húngaras" #NT!
 elgar.1032.f: "The Hungarian Rapsodies es un conjunto de 19 piezas de piano basadas en temas populares húngaros, compuestos por Franz Liszt durante 1846-1853, y más tarde en 1882 y 1885. Liszt también organizó versiones para orquesta, dueto de piano y piano trio. Algunos son mejor conocidos que otros, con Rhapsody Hungarian No. 2 siendo particularmente famosa y No. 6, No. 10, No. 12 y No. 14 (especialmente como se arregló para el piano y la orquesta como la fantasía húngara) también son bien conocidos. Liszt incorporó muchos temas que había escuchado en su Hungría occidental natal y que creía que era música popular, aunque muchos fueron de hecho canciones escritas por miembros de la clase media alta húngara, o por compositores como József Kossovits. En su forma original de piano, las rapsodias húngaras se destacan por su dificultad." #NT!
 elgar.1033.t: "Sinfonía de Dante" #NT!
 elgar.1033.f: "La 'Sinfonía Dante' es una sinfonía coral compuesta por Franz Liszt. Escrito en el alto estilo romántico, se basa en el viaje de Dante Alighieri a través del infierno y el purgatorio, como se muestra en la comedia divina. Algunos críticos han argumentado que la sinfonía Dante no es tanto una sinfonía en el sentido clásico como dos poemas sinfónicos descriptivos. La intención original de Liszt era componer el trabajo en tres movimientos: un infierno, un purgatorio y un paradiso. Los dos primeros debían ser puramente instrumentales, y el final coral. Wagner, sin embargo, persuadió a Liszt de que ningún compositor terrenal podría expresar fielmente las alegrías del paraíso. Liszt dejó caer el tercer movimiento, pero agregó un Magnificat coral al final del segundo movimiento. El erudito de Liszt, Humphrey Searle, argumenta que si bien Liszt puede haberse sentido más en casa retratando las regiones infernales que las celestiales, la tarea de retratar el paraíso en la música no habría estado más allá de sus poderes." #NT!
 elgar.1041.t: "Die Meistersinger von Nürnberg" #NT!
 elgar.1041.f: "'Die Meistersinger von Nürnberg' es un drama musical, u ópera, en tres actos, de Richard Wagner. Es la ópera más larga comúnmente realizada, que toma casi cuatro horas y media, sin contar dos descansos entre los actos, y tradicionalmente no se corta. El Meistersinger de Nuremberg ocupa un lugar único en la obra de Wagner. Es la única comedia entre sus óperas maduras y también es inusual entre sus obras al establecerse en un momento y lugar históricamente bien definidos en lugar de en un entorno mítico o legendario. Es la única ópera madura de Wagner basada en una historia completamente original. Incorpora muchas de las convenciones operísticas que Wagner había criticado en sus ensayos sobre la teoría de la ópera: verso rimado, arias, coros, un quinteto e incluso un ballet." #NT!
 elgar.1042.t: "Die Walküre" #NT!
 elgar.1042.f: "'Die Walküre' se forma junto con las óperas 'Das Rheingold', 'Siegfried' y 'Götterdämmerung' el trabajo completo 'der Ring des Nibelungen'. Wagner siguió en gran medida los principios relacionados con la forma de drama musical, reflejando los sentimientos y los estados de ánimo detrás del trabajo, utilizando un sistema de leitmotifs recurrentes para representar a personas, ideas y situaciones en lugar de las unidades operísticas convencionales de arias, conjuntos y coro. La historia de Die Walküre se basa en la mitología nórdica contada en la saga de Völsunga y la poética edda." #NT!
 elgar.1043.t: "Parsifal" #NT!
 elgar.1043.f: "El Parsifal de Richard Wagner contiene elementos religiosos como la música sagrada, la revelación del monstrato (grial), el bautismo y el ritual de comunión cristiana. Ya en sus escritos de arte de Zurich, desarrolló la idea de usar el arte para aclarar el núcleo de la religión. Wagner explicó que para transformar su mensaje parable de salvación y regeneración de la humanidad a través de la compasión, representada por el parsifal de búsqueda y el sufrimiento amfortas, eligió una forma de arte que, con simbolismo religioso, tenía la intención de tener un "efecto de rapaces en la mente". El propio Wagner describió la obra de tres actos como una obra de teatro del festival de consagración en el escenario y decretó que solo debería realizarse en el Bayreuth Festspielhaus." #NT!
 elgar.1051.t: "Gynt de pares" #NT!
 elgar.1051.f: "Gynt de pares, op. 23, es la música incidental a la obra de 1867 de Henrik Ibsen del mismo nombre, escrita por el compositor noruego Edvard Grieg. Aunque componiendo muchas obras de piano cortas y obras de cámara, el trabajo que Grieg hizo para Henrik Ibsen se destacó. Originalmente componiendo 90 minutos de música orquestal para la obra, luego regresó y extrajo ciertas secciones para las suites. Los viajes de Peer Gynt en todo el mundo y las tierras distantes están representados por los instrumentos que Grieg elige usar. Más tarde, Grieg creó dos suites de su música Gynt. Parte de la música de estas suites ha recibido cobertura en la cultura popular, especialmente las piezas 'Morning Mood', 'en el Salón del Rey de la Montaña' y 'Solveig's Song'." #NT!
 elgar.1052.t: "Piezas líricas" #NT!
 elgar.1052.f: "Lyric Pieces es una colección de 66 piezas cortas para piano en solitario escrita por Edvard Grieg. Fueron publicados en 10 volúmenes, de 1867 a 1901. La colección incluye varias de sus piezas más conocidas, como el día de la boda en Troldhaugen, a la primavera, marzo de los trolls y mariposa. El tema de la primera pieza en el set, Arietta, fue una de las melodías favoritas del compositor. En palabras del pianista Andrei Gavrilow, las piezas líricas son "un tipo muy especial de diario que Grieg mantuvo a lo largo de su vida, o una confesión, porque reflejan los momentos más íntimos en la vida del compositor"." #NT!
 elgar.1053.t: "Bailes noruegos" #NT!
 elgar.1053.f: "Los bailes noruegos fueron la respuesta de los noruegos a los enormemente exitosos bailes eslavos de Antonín Dvořák y los bailes húngaros de Johannes Brahms. Los dos colegas habían publicado su serie de baile para piano cuatro manos en 1878 y 1881 por la editorial Simrock. En ese momento, Grieg no se atrevió a orquestar sus bailes, ya que el terreno fue ocupado por las 'Rapas de Noruega' de su amigo Johan Svendsen. Robert Henriques organizó la versión orquestal de sus bailes noruegos, para la satisfacción de Grieg. Para el primer baile, Grieg utilizó la popular Marcha de Dipklar, para los últimos tres llamados "paseos", bailes nupciales noruegos tradicionales para hombres jóvenes, que son rápidos y muy acrobáticos para actuar." #NT!
 elgar.1061.t: "Deutsches réquiem" #NT!
 elgar.1061.f: "'Hay poco que decir aquí, pero todavía tengo que decirte que estoy completamente lleno de tu réquiem, es una pieza muy poderosa, se ajusta a toda la persona de una manera como algunas otras cosas. La profunda seriedad, combinada con toda la magia de la poesía, tiene un efecto maravilloso, impactante y relajante. Como saben, nunca puedo ponerlo en palabras, pero siento todo el rico tesoro de este trabajo hasta la núcleo, y el entusiasmo que habla de cada pieza me mueve profundamente, por lo que no puedo evitar pronunciar ... oh, si pudiera escucharlo, qué daría por ella. - Clara Schuman" #NT!
 elgar.1062.t: "Bailes húngaros" #NT!
 elgar.1062.f: "Los bailes húngaros de Johannes Brahms son un conjunto de 21 melodías de baile animadas basadas principalmente en temas húngaros, completados en 1879. Varían de aproximadamente un minuto a cinco minutos de largo. Están entre las obras más populares de Brahms y fueron los más rentables para él. Cada baile ha sido organizado para una amplia variedad de instrumentos y conjuntos. Brahms originalmente escribió la versión para el piano cuatro manos y luego organizó los primeros diez bailes para el piano en solitario. El violinista Joseph Joachim, amigo de Brahms, creó un arreglo virtuoso de todos los bailes húngaros para violín y piano." #NT!
 elgar.1063.t: "Sinfonía No. 4" #NT!
 elgar.1063.f: "Symphony No. 4 es la última sinfonía escrita por Johannes Brahms. Hoy es una de las obras orquestales más populares y realizadas por el compositor. A primera vista, la forma intransigente en que se diseña el trabajo fue desconcertante. Cuando Brahms e Ignaz Brüll jugaron la sinfonía con amigos en dos pianos, el biógrafo posterior de Clara Schumann y Brahms, Max Kalbeck, entre otros, reaccionó con rechazo. Se dice que Eduard Hanslick exclamó: "A lo largo del movimiento sentí como si dos personas terriblemente inteligentes me golpearan". Elisabeth von Herzogenberg describió el trabajo como "un mundo pequeño para lo inteligente y conocedor, en el que las personas que caminan en la oscuridad solo podían tener una pequeña parte". Cuando Brahms asistió a una actuación de la Sinfonía en 1897, poco antes de su muerte, recibió aplausos atronadores de la audiencia vienés, que el trabajo ha recibido hasta el día de hoy." #NT!
 elgar.1071.t: "Sinfonía No. 5" #NT!
 elgar.1071.f: "Al igual que algunas de las otras sinfonías de Mahler, la quinta sinfonía no se entendió después de su estreno. En 1905, después de una actuación fallida en Hamburgo, Mahler se quejó: 'El quinto es un trabajo maldito. Nadie lo entiende. Las reseñas de música en los años posteriores al estreno fueron en su mayoría negativas. El crítico de música Ferdinand Pfohl, por ejemplo, juzgó que la 5ª Sinfonía era una de las obras más débiles de Mahler. Solo el Neue Zeitung Für Musik le dio a la sinfonía un testimonio benevolente y habló de una "riqueza abrumadora de belleza". Especialmente en comparación con la cuarta sinfonía escrita dos años antes, representa una gran diferencia en el contenido y la forma. Con el mundo de sonido más duro de la 5ª Sinfonía, Mahler comienza una nueva fase creativa, que se desarrolla aún más en la siguiente sexta sinfonía. Solo después de la muerte de Mahler, el trabajo se volvió cada vez más apreciado." #NT!
 elgar.1072.t: "Mintió von der Erde" #NT!
 elgar.1072.f: "'¿Es realmente el mismo hombre que,' en armonía con lo infinito ', erigió el edificio del octavo que ahora encontramos en la canción bebida de los problemas de la Tierra? ¿Quién se arrastra solo en otoño a su amado lugar de descanso, anhelando refrescarse? ¿Quién mira a los jóvenes con una mirada amigable de vejez, con gentiles emociones en la belleza? ¿Quién busca olvidar la existencia terrenal sin sentido en la embriaguez y finalmente se despide en melancolía? […] apenas es la misma persona y compositor. Todos los trabajos hasta ese punto habían surgido de la sensación de vida [...] La tierra está desapareciendo, un aire diferente está soplando, una luz diferente brilla sobre ella. [...] Cuando le devolví el autógrafo, casi incapaz de decir una palabra al respecto, abrió el 'Abchied' y dijo: '¿Qué piensas? ¿Eso es soportable en absoluto? ¿La gente no se suicidará después? Luego señaló las dificultades rítmicas y le preguntó en broma: "¿Alguna idea de cómo conducir eso? ¡No yo! - Bruno Walter" #NT!
 elgar.1073.t: "Kindertotenlieder" #NT!
 elgar.1073.f: "'Puedo entender bien que uno compone letras tan terribles cuando uno no tiene hijos o cuando uno ha perdido hijos. ¡Pero no puedo entender cómo puedes cantar sobre la muerte de los niños si los abrazas y los besaste media hora antes, ¡felices y saludables! - Alma Mahler-Werfel, esposa de Gustav Mahler" #NT!
 elgar.1081.t: "Concierto para piano No. 3" #NT!
 elgar.1081.f: "En ese momento, Mahler era el único director que consideraba digno de ser clasificado con Nikisch. Se dedicó al concierto hasta que el acompañamiento, lo cual es bastante complicado, se había practicado a la perfección, aunque ya había pasado por otro largo ensayo. Según Mahler, cada detalle de la puntuación era importante: una actitud demasiado rara entre los conductores. ... Aunque el ensayo estaba programado para terminar a las 12:30, tocamos y tocamos, mucho más allá de esta hora, y cuando Mahler anunció que el primer movimiento sería ensayado nuevamente, esperaba una protesta o escena de los músicos, pero no noté una sola señal de molestia. La orquesta jugó el primer movimiento con una apreciación aguda o tal vez más cercana que la vez anterior. - Sergei Rachmaninoff" #NT!
 elgar.1082.t: "Rhapsody sobre un tema de Paganini" #NT!
 elgar.1082.f: "La pieza consta de 24 variaciones sobre un tema que el propio Niccolò Paganini usó como punto de partida para una serie de variaciones. Esta melodía ha servido repetidamente como plantilla para varios compositores, incluidos Johannes Brahms y Franz Liszt. En algunas variaciones, Rachmaninoff usa otra melodía mucho más antigua: la secuencia 'Dies Irae', una vez una parte integral de la masa latina para los muertos. Rachmaninoff usó este tema una y otra vez en sus obras. Aparece en todas las sinfonías, los bailes sinfónicos, el poema sinfónico Die Toteninsel y la primera sonata de piano. La combinación de un tema de Paganini con el 'dies irae' provoca la búsqueda de un fondo programático del trabajo. Según la leyenda, el gran violinista vendió su alma al diablo para lograr la perfección en su instrumento y el amor de una mujer. El motivo 'Dies Irae' representa al diablo, el tema de Paganini para el violinista componente." #NT!
 elgar.1083.t: "Sinfonía No. 3" #NT!
 elgar.1083.f: "'Fue tocado en Nueva York, Filadelfia, Chicago, etc. En las dos primeras actuaciones estuve presentes. Fue jugado maravillosamente. Su recepción del público y los críticos fue agrio. Una revisión se mantiene dolorosamente en mi mente: que ya no tenía una tercera sinfonía en mí. Personalmente, estoy firmemente convencido de que este es un buen trabajo. Pero a veces los compositores también están equivocados! Sea como fuere, estoy sosteniendo mi opinión hasta ahora. - Sergei Rachmaninoff" #NT!
 elgar.1091.t: "Romeo y Julieta" #NT!
 elgar.1091.f: "Romeo y Julieta es el ballet más largo y más conocido de Sergei Prokofiev y es ampliamente considerado como su contribución más importante al género. Se considera lo más destacado de su trabajo musical. La rica y variada instrumentación, así como la complejidad rítmica de la partitura, todavía plantean desafíos para la orquesta y los bailarines. En algunos lugares, las disonancias bordean la atonalidad. El famoso 'Dance of the Knights', con sus ritmos punteados, ahora es mejor conocido como un tema cuasiinfónico. En contraste, los temas asociados con el despertar del amor de Juliet son a la vez tiernos y juvenilmente animados. Prokofiev reutilizó la música del ballet en tres suites para la orquesta y un trabajo de piano en solitario." #NT!
 elgar.1092.t: "Teniente kijé" #NT!
 elgar.1092.f: "El teniente música Kijé fue escrita originalmente para acompañar la película del mismo nombre. Fue el primer intento de Prokofiev de música cinematográfica y su primera comisión. En los primeros días del cine de sonido, entre los diversos compositores distinguidos listos para probar suerte en la música de cine, Prokofiev no fue una opción obvia para la comisión. Con sede en París durante casi una década, tenía una reputación de experimentación y disonancia. Poco después del lanzamiento de la película, Prokofiev recibió una invitación de la Orquesta Sinfónica de Radio de Moscú para crear una suite orquestal de su música cinematográfica Kijé, probablemente la primera instancia de una partitura cinematográfica que se adapta a un trabajo musical significativo. Mientras Prokofiev estaba en los Estados Unidos para el estreno de Boston, los productores de cine buscados en gran medida, aunque se sintió halagado y atraído por sus ofertas, nunca compuso una partitura cinematográfica de Hollywood." #NT!
 elgar.1093.t: "Peter y el lobo" #NT!
 elgar.1093.f: "Peter and the Wolf es un 'cuento de hadas sinfónico para niños'. Es el trabajo realizado con más frecuencia de Prokofiev y uno de los trabajos más realizados en todo el repertorio clásico. The narrator tells a children's story, while the orchestra illustrates it by using different instruments to play a 'theme' that represents each character in the story: 'Each character of this tale is represented by a corresponding instrument in the orchestra: the bird by a flute, the duck by an oboe, the cat by a clarinet playing staccato in a low register, the grandfather by a bassoon, the wolf by three horns, Peter by the string Cuarteto, el tiro de los cazadores por el tambor y el bombo. Antes de una actuación orquestal, es deseable mostrar estos instrumentos a los niños y tocar en ellos los leitmotifs correspondientes. De este modo, los niños aprenden a distinguir los sonidos de los instrumentos durante el rendimiento de esta historia." #NT!
  
 elgar.1101.t: "Die Fledermaus" #NT!
 elgar.1101.f: "Fledermaus de Johann Strauss es considerado uno de los aspectos más destacados de la era de la opereta. Junto con el barón Gypsy y una noche en Venecia, Die Fledermaus es una de las tres operetas Strauss más famosas y también una de las pocas operetas que se realizan regularmente en las principales óperas internacionales. Las letras son pegadizas y llenas de ironía con verdades atemporales. Se dice que las partes esenciales de la música se crearon dentro de los 42 días. La obertura, escrita en forma de sonata libre, ocupa un lugar especial y es una de las mejores creaciones de Johann Strauss. Resume los numerosos aspectos musicales de todo el trabajo y, con su variada dinámica, siempre es un desafío incluso para las mejores orquestas." #NT!
 elgar.1102.t: "Donauwalzer" #NT!
 elgar.1102.f: "El vals del hermoso Danubio Blue (a menudo acortado para: Danube Waltz) se basa en las melodías que Johann Strauss ya había usado en trabajos anteriores. Ya en su estreno provocó entusiasmo entre la audiencia. Debido a la gran cantidad de nuevos lanzamientos musicales en la temporada de carnaval en ese momento, el vals inicialmente no se dio cuenta. Sin embargo, debido a que Strauss apareció en París en la Feria Mundial de 1867 en el mismo año y creó nuevas composiciones para ello, recordó incluir este vals en el programa. Bajo el nombre de Le Beau Danube Bleu, la pieza se convirtió en un gran éxito durante esta exposición. Se supone que las ediciones publicadas del vals, especialmente la versión de piano de dos manos, se vendieron casi 1,000,000 de veces en un corto período de tiempo. El vals se considera el himno secreto de Austria y una de las piezas más populares en toda la historia de la música clásica." #NT!
 elgar.1103.t: "Una noche en Venecia" #NT!
 elgar.1103.f: "Una noche en Venecia es una 'opereta cómica' en tres actos. La acción tiene lugar en Venecia a mediados del siglo XVIII y es una comedia de disfraz y identidad errónea con confusión de amor entre dos clases. Al igual que muchas otras operetas vienas, el libreto es una adaptación de una opéra-comique francesa. El estreno en Berlín fue un fracaso. Esto se debió en parte a la trama confusa, pero también en parte debido a los textos subyacentes. Por lo tanto, la pieza fue reelaborada para el estreno en el Teatro An Der Wien. La obertura también fue reelaborada por Strauss. Los números musicales más famosos son la vals de la laguna y la canción de Góndola. En 1923 y nuevamente en 1931 fue revisado significativamente por Erich Wolfgang Korngold; Otra versión fue escrita por Walter Felenstein en 1954; La versión original ahora solo se realiza muy raramente." #NT!
 elgar.1111.t: "Rigoletto" #NT!
 elgar.1111.f: "Rigoletto es una ópera de Giuseppe Verdi con un libreto de Francesco Maria Piave. Se basa en el melodrama 'le roi s'amuse' por Victor Hugo. La ópera fue inicialmente criticada por los censores; Verdi y Piave, por lo tanto, tuvieron que, entre otras cosas, cambiar el título originalmente previsto y mover el escenario de París a Mantua. Sin embargo, los elementos esenciales para Verdi, como el personaje principal paralizado Rigoletto y el saco en el que se pone su hija moribunda, permaneció intacta. La ópera se considera la primera obra maestra de Verdi y establece su fama mundial. El propio Verdi consideraba que Rigoletto era una de sus obras más exitosas, y a diferencia de otras óperas de Verdi, no hay revisiones ni nuevas versiones. Rigoletto fue un éxito abrumador en su estreno y se jugó en casi todas las óperas europeas en los próximos años. La ópera ha sido parte del repertorio de muchas casas de ópera durante más de 160 años y sigue siendo una de las óperas italianas más realizadas." #NT!
 elgar.1112.t: "La Traviata" #NT!
 elgar.1112.f: "La Traviata es una ópera de Giuseppe Verdi y Francesco Maria Piave basada en la novela La Dame Aux Camélias de Alexandre Dumas the Younger. Como antes en Rigoletto e Il Trovatore, Verdi colocó a una persona con ostracizada y rechazada por la sociedad en el centro de la acción. Una ópera sobre un cortesano que muere de tuberculosis era una innovación escandalosa en ese momento. El trabajo falló en el estreno, a pesar de que Verdi lo había escenificado él mismo y, como precaución, trasladó la acción a la época de Louis XIV. Después de su revisión, Verdi lo realizó nuevamente un año después, después de lo cual se convirtió en una de las óperas más exitosas en la historia de la música. En algunos países es la ópera más realizada. En términos de la cantidad de grabaciones realizadas, AIDA solo supera La Traviata. Por razones de censura, la ópera también se realizó en Italia bajo el título de Violetta." #NT!
 elgar.1113.t: "Messa da réquiem" #NT!
 elgar.1113.f: "Bajo la impresión de la muerte de Gioachino Rossini en 1868, Giuseppe Verdi invitó a los doce compositores más importantes en Italia en ese momento para componer conjuntamente una masa funeraria, el llamado Mesa por Rossini. Él mismo se hizo cargo del escenario del movimiento final, 'Libera Me', en este réquiem. Sin embargo, no tuvo lugar una actuación debido a circunstancias adversas. Verdi una vez más trató el material de réquiem después de que el poeta Alessandro Manzoni murió en 1873. Verdi admiraba profundamente al muy respetado Manzoni. Ofreció a la ciudad de Milán la composición de una misa que se realizará un año después de la muerte de Manzoni. El 'Libera Me' de la masa de Rossini ahora se convirtió en el núcleo del nuevo réquiem para Manzoni. La configuración de 'Dies Irae' de la composición anterior se tomó tres veces para los pasajes de la secuencia con el mismo texto o similar. La primera actuación, en la Iglesia de San Marco en Milán el 22 de mayo de 1874, marcó el primer aniversario de la muerte de Manzoni. Verdi mismo dirigido." #NT!
 elgar.1121.t: "Prélude à l'arprès-midi d'un faune" #NT!
 elgar.1121.f: "'La música de este preludio es una ilustración muy gratuita del hermoso poema de Mallarmé. De ninguna manera afirma ser una síntesis de la misma. Más bien hay una sucesión de escenas a través de las cuales pasan los deseos y los sueños del Faun en el calor de la tarde. Luego, cansado de perseguir el tramo tímido de ninfas y náiades, sucumbe al sueño intoxicante, en el que finalmente puede realizar sus sueños de posesión en la naturaleza universal. La pieza se considera un punto de inflexión en la historia de la música artística occidental, así como una obra maestra de la composición impresionista. Pierre Boulez consideró que la partitura era el comienzo de la música moderna, observando que "la flauta del Faun trajo un nuevo aliento al arte de la música"." #NT!
 elgar.1121.g: "Disfrute, sueña, disfruta del momento interminable ..." #NT!
 elgar.1122.t: "La Mer" #NT!
 elgar.1122.f: "'El concierto de anoche comenzó con muchos daubs impresionistas de color manchados de color Higgledy en una paleta tonal, con nunca un pensamiento de forma o propósito, excepto crear nuevas combinaciones de sonidos. ... Una cosa solo era segura, y eso fue que el océano del compositor era un estanque de rana y que algunos de sus habitantes habían entrado en la garganta de cada uno de los instrumentos de latón. Incluso algunos de los que habían sido sólidos partidarios del trabajo de Debussy no eran entusiastas, a pesar de que la pieza presentaba tres aspectos clave de la estética de Debussy: el impresionismo, el simbolismo y el japonismo. En las décadas posteriores al estreno La Mer se estableció en el repertorio orquestal central." #NT!
 elgar.1123.t: "Pelléas et Mélisande" #NT!
 elgar.1123.f: "'Como maestro era pedante, esa es la única palabra. Realmente pedante ... había un núcleo de ira y amargura en él. A menudo creo que era más bien como Golaud en Pelléas y, sin embargo, no lo fue. Estaba, está en toda su música, un hombre muy sensual. A nadie parecía gustarle. Jean Périer, quien interpretó a Pelléas para mi Mélisande, se volvió blanco de ira si mencionaste el nombre de Debussy ... '\ n \ npelléas et Mélisande es una ópera en cinco actos. El nombre del género del compositor Claude Debussy es 'drame Lyrique'. El texto es una adaptación de la obra Pelléas et Mélisande por Maurice Maeterlinck. Debussy evitó las arias y las escenas en solitario más grandes, lo que le dio al texto un carácter realista. Pelléas debía ser la única ópera completada de Debussy. Por esta razón, a veces se ha comparado con el Fidelio de Beethoven." #NT!
 elgar.1131.t: "Lago de cisne" #NT!
 elgar.1131.f: "Swan Lake es un ballet de fama mundial para la música de Pyotr Ilyich Tchaikovsky, que se estrenó en 1877 en el Teatro Bolshoi en Moscú y es parte del repertorio estándar de compañías de ballet clásicas. Se pueden encontrar motivos comunes de numerosos cuentos de hadas en el lago Swan: en particular, la desafortunada princesa encantada que es redimida por el amor de un príncipe. El desafortunado final del libreto original también es un conocido motivo de cuento de hadas de Swan Girl o Swan Maiden. Tchaikovsky se basó en composiciones anteriores para su puntaje de Swan Lake. Según dos de los parientes de Tchaikovsky, el compositor había creado anteriormente un pequeño ballet llamado 'El lago de los cisnes' en su casa en 1871. Este ballet incluía el famoso Leitmotif. También hizo uso de material de 'The Voyevoda', una ópera que había abandonado en 1868. En abril de 1876 se completó el puntaje y comenzó los ensayos. Pronto, el coreógrafo Reisinger comenzó a dejar a un lado ciertos números que llamó 'indiferente'. Reisinger incluso comenzó a coreografiar bailes a la música de otros compositores, pero Tchaikovsky protestó y sus piezas fueron reinstaladas." #NT!
 elgar.1132.t: "Symphony No. 6 'Pathétique'" #NT!
 elgar.1132.f: "'Ahora estoy totalmente ocupado con el nuevo trabajo ... y es difícil para mí alejarme de él. Creo que surge como el mejor de mis obras. Debo terminarlo lo antes posible, porque tengo que terminar muchos asuntos y pronto debo ir a Londres. Te dije que había completado una sinfonía que de repente me disgustó, y lo rompí. Ahora he compuesto una nueva sinfonía que ciertamente no romperé. 64, Tchaikovsky planeó, como él le escribió a un amigo, "escribir una magnífica sinfonía que formará la piedra angular de todo mi trabajo". El compositor tituló la obra 'La sinfonía apasionada'. La característica del trabajo es el lento movimiento final, inusual para las sinfonías, cuyo fin recuerda a un réquiem." #NT!
 elgar.1133.t: "Concierto para violín en D Major" #NT!
 elgar.1133.f: "El Concierto para violín en D Major es el único concierto para violín del compositor ruso Pyotr Ilyich Tchaikovsky. Tchaikovsky escribió el concierto en marzo y abril de 1878 en Clarens, una ciudad que cultiva vinos en el lago de Ginebra. Allí se recuperó de la depresión y un colapso nervioso severo. El efecto positivo de su estadía se reflejó en el concierto, en el que su nueva alegría de la vida se manifestó. El trabajo de composición se completó después de tres semanas, aunque Tchaikovsky reemplazó el movimiento medio planificado originalmente con el Andante conocido como 'Canzonetta'. Los críticos de música reaccionaron negativamente al trabajo. Tchaikovsky reaccionó con calma y estaba convencido de que el concierto prevalecería. Hasta el día de hoy, es uno de los conciertos de violín más famosos, más interpretados y más interpretados del mundo." #NT!
 elgar.1141.t: "Pomp y circunstancia" #NT!
 elgar.1141.f: "La pompa y las circunstancias marchas militares son una serie de cinco (o seis) marchas para la orquesta. Incluyen algunas de las composiciones más conocidas de Elgar. La más conocida de las seis marchas, la pompa y las circunstancias de marzo No. 1 en D tuvo su estreno, junto con el número 2 de marzo, en Liverpool el 19 de octubre de 1901. Elgar y su esposa asistieron, y fue un éxito 'frenético'. El trío contiene la melodía conocida como 'Land of Hope and Glory'. En 1902, la melodía se reutilizó, en forma modificada, para la sección 'Land of Hope and Glory' de su Oda de coronación para el Rey Eduardo VII. Las palabras se modificaron aún más para adaptarse a la melodía original, y el resultado se ha convertido desde entonces en la última noche de los Proms, y un himno deportivo inglés y una canción patriótica general." #NT!
 elgar.1141.g: "Tierra de esperanza y gloria!" #NT!
 elgar.1142.t: "La corona de la India" #NT!
 elgar.1142.f: "La Corona de la India, fue una máscara, una presentación teatral elaborada, organizada en 1912 para celebrar la visita al anterior diciembre del rey Jorge V y la reina María a Delhi por su coronación como emperador y emperatriz de la India. Para esta máscara, el compositor inglés Sir Edward Elgar escribió la música, con un libreto de Henry Hamilton. La máscara consistió en dos cuadros: 'Las ciudades de Ind' y 'Ave Imperator!'. Más tarde, Elgar extrajo cinco de las piezas y agregó un intermezzo para el violín en solitario para crear la suite Crown of India.  La suite ganó popularidad inmediata: durante la vida de Elgar, hubo 102 actuaciones en vivo en la BBC." #NT!
 elgar.1143.t: "Enigma Variaciones" #NT!
 elgar.1143.f: "Las variaciones de enigma son un trabajo orquestal que describe a las personas del entorno de Elgar en 14 variaciones. Hicieron a Elgar conocido internacionalmente después de su estreno por el director Hans Richter. El 'enigma' del título no se refiere a la asignación de qué variación se dedica a qué amigo, sino a otro rompecabezas. Según Elgar, hay un tema diferente y más grande que se extiende por toda la composición, pero no se reproduce, y el tema real se compone como una contramelodia. Se han presentado varias teorías hasta ahora. La novena variación (Nimrod) en particular ganó gran popularidad." #NT!
 elgar.1151.t: "La novena sinfonía" #NT!
 elgar.1151.f: "En 1892, Dvořák se mudó a los Estados Unidos y se convirtió en director del Conservatorio Nacional de Música de América en la ciudad de Nueva York. Mientras que en los Estados Unidos, Dvořák escribió una de sus obras orquestales más exitosas: la sinfonía 'del Nuevo Mundo', que difundió su reputación en todo el mundo. Se ha dicho que Dvořák se inspiró en los 'espacios abiertos' de Estados Unidos, como las praderas que podría haber visto en su viaje a Iowa en el verano de 1893. Dvořák también fue influenciado por el estilo y las técnicas utilizadas por los compositores clásicos anteriores, incluidos Beethoven y Schubertoven. La caída del cuarto y timbalia en el movimiento Scherzo de la Sinfonía del Nuevo Mundo evoca el Scherzo de la Sinfonía No. 9 de Beethoven. En el estreno en Carnegie Hall, el final de cada movimiento se encontró con aplausos atronadores y Dvořák se sintió obligado a ponerse de pie y inclinarse." #NT!
 elgar.1152.t: "Bailes eslavos" #NT!
 elgar.1152.f: "Los bailes eslavos son una colección de 16 piezas instrumentales de Antonín Dvořák, escrita para piano cuatro manos y cada una de poco después dispuesta para orquesta. Se encuentran entre las obras más famosas del compositor checo. Las composiciones de Dvořák utilizan patrones rítmicos característicos de bailes populares bohemios y moravos, así como los de los países vecinos. Sin embargo, todavía son creaciones completamente independientes del compositor. En la primera fila hay dos furiantes caracterizados por cambios en el ritmo, dos sousedskás similares al Ländler, dos Skočnás (baile de salto rápido), una polka y, como el único baile no cezico, una dumka ucraniana. En la segunda serie, predomina los bailes no celatos, por lo que Dvořák estuvo expuesto a cierta hostilidad. Fue acusado de no identificarse lo suficiente con su tierra natal y, en cambio, querer hacerse popular en el extranjero." #NT!
 elgar.1153.t: "Rusalka" #NT!
 elgar.1153.f: "Rusalka es la ópera más exitosa de Antonín Dvořák. Fue creado basado en un libreto por Jaroslav Kvapil y se remonta a los mitos populares eslavos sobre el Rusalky (espíritus de agua, sirenas) y es similar a la historia alemana Undine de Friedrich de la Motte Fouqué, Hans Christian Andersen's Fairy Tale The Little Mermaid y el viejo Melusine Saga. La ópera con el cuento de hadas de la lírica subtítulo también se conoce como 'checo undine'. Junto con la novia de Bedřich Smetana, Rusalka es la ópera checa más famosa. La ópera Rusalka ocupa un lugar destacado en el desarrollo de la música dramática checa." #NT!
 elgar.1161.t: "Fantasía en C-Dur" #NT!
 elgar.1161.f: "La fantasía en C Major es una de las composiciones de piano más importantes de Robert Schumann. Junto con las escenas de Kreisleriana y Children, es una de las piezas más conocidas del compositor y es parte del núcleo de la literatura romántica de piano. Lo dedicó a Franz Liszt, el virtuoso admirado que le agradeció años más tarde al donarle su gran sonata menor B. El columpio visionario de esta fantasía de piano y el poder sostenido en toda la composición recuerdan el dominio arquitectónico de Ludwig Van Beethoven, desde cuyo ciclo de la canción 'hasta el distante amado' Schumann cita varias veces en el primer movimiento, mientras que en el tercer movimiento usa un tema de la allegrete de la 7ª sínfónica." #NT!
 elgar.1162.t: "Concierto para piano en un menor" #NT!
 elgar.1162.f: "El concierto para piano en una op. 54 es un concierto romántico en solitario para piano y orquesta que fue escrito durante el alto período romántico. Lleva muchas características de la era romántica. Al igual que otros conciertos de piano del siglo XIX, el concierto menor tiene un personaje sinfónico. Dado que el trabajo se concibió inicialmente como una fantasía, todo el concierto tiene impresiones románticas y fantásticas. Schumann necesitaba más de cinco años para la finalización retrasada. En la página del título del autógrafo, Schumann señala los diferentes momentos en los que se escribieron los movimientos. Las ideas básicas del trabajo son anhelantes y la felicidad de dos personas enamoradas. En este trabajo, Schumann traduce su lucha por Clara Wieck en música. El tema principal del primer movimiento es similar a la melodía del Florestan Aria de la ópera Fidelio de Beethoven. Congruente con Beethoven, este tema también representa la lealtad conyugal y la lucha por la libertad en Schumann." #NT!
 elgar.1163.t: "Kinderszenen" #NT!
 elgar.1163.f: "El Kinderszenen (escenas infantiles) es un ciclo de Robert Schumann que consta de trece piezas cortas de piano. En contraste con el 'Álbum for the Youth', estas son piezas que no estaban compuestas para los niños, pero, en las propias palabras de Schumann, como un 'reflejo de una persona mayor para personas mayores'. La pieza más famosa y más larga del ciclo es 'Träumerei'. Con un tiempo de juego de poco menos de 20 minutos, las escenas de los niños se encuentran entre las obras de piano románticas más populares en la actualidad. Aunque las escenas de los niños no fueron particularmente exitosas durante la vida de Schumann, el trabajo tenía un significado especial, al menos para él. Un intercambio de cartas de 1839 muestra que Schumann en ese momento creía firmemente en la posibilidad de una unión matrimonial con Clara Wieck y que las escenas de los niños surgieron de su lado optimista y alegre." #NT!
 elgar.1171.t: "Concierto para violín en e menor" #NT!
 elgar.1171.f: "El concierto de violín de Felix Mendelssohn en E Minor es su último concierto. Bien recibido en su estreno, se ha mantenido entre los conciertos de violín más destacados y muy considerados. Tiene un lugar central en el repertorio de violín y ha desarrollado una reputación como concierto esencial para todos los aspirantes a violinistas de conciertos para dominar, y generalmente uno de los primeros conciertos románticos que aprenden. El trabajo en sí fue uno de los conciertos de violín más importantes de la era romántica y fue influyente en muchos otros compositores. Aunque el concierto consta de tres movimientos en una estructura estándar de lento rápido y cada movimiento sigue una forma tradicional, fue innovador e incluyó muchas características novedosas para su tiempo. Los aspectos distintivos incluyen la entrada casi inmediata del violín al comienzo del trabajo, en lugar de seguir una vista previa orquestal de los temas principales del primer movimiento, como era típico en los conciertos de la era clásica." #NT!
 elgar.1181.t: "Ètudes" #NT!
 elgar.1181.f: "Frédéric Chopin escribió un total de 27 études para piano: 12 études op. 10 (publicado en 1833), 12 études op. 25 (publicado en 1837) y otras tres études para la tercera parte (études de Perfectionnement Pour le piano, publicado en 1840) de la escuela de piano Méthodes des Méthodes de Ignaz Moscheles y François-Joseph Fétis. Las tres études se publicaron más tarde por separado bajo el título Trois Nouvelles études. Como la 'Carta Magna de Piano Playing' (Karl Schumann), se encuentran entre las composiciones de piano más importantes en la historia de la música. Grandes compositores de piano como Alkan, Scriabin, Debussy y Rachmaninoff les tomaron las señales de ellos. Franz Liszt y Józef Wieniawski fueron los primeros pianistas en realizar públicamente Chopin -Études." #NT!
 elgar.1191.t: "Una vida para el zar" #NT!
 elgar.1191.f: "Después de años de escuchar a los cantantes, romancar a las mujeres con su música y conocer gente famosa, incluidas Mendelssohn, Berlioz y Liszt, Glinka se dio cuenta de que la misión de su vida era regresar a Rusia, escribir de manera rusa y hacer por la música rusa lo que Donizetti y Bellini habían hecho por la música italiana. Una vida para el zar fue la primera de las dos grandes óperas de Glinka. Originalmente se tituló Ivan Susanin. Ambientada en 1612, cuenta la historia del campesino ruso y el héroe patriótico Ivan Susanin, quien sacrifica su vida por el zar al llevar por mal camino a un grupo de polos merodeadores que lo estaban buscando. Con esta ópera, Glinka logró crear una música rusa independiente; Se considera la primera ópera rusa." #NT!
 elgar.1192.t: "Ruslan y Ludmila" #NT!
 elgar.1192.f: "Ruslan y Ludmila es una 'ópera fantástica' en cinco actos con música de Mikhail Glinka con un libreto de Nestor Kukolnik y otros basados ​​en el poema del mismo nombre de Alexander Sergeyevich Pushkin. La muerte de Pushkin en el famoso duelo le impidió escribir el libreto mismo según lo planeado. Al igual que con 'una vida para el zar', Ruslan emplea algunos aspectos de la música popular rusa; También se observa por el uso imaginativo de disonancia, cromatismo y elementos orientales. De particular consecuencia es el uso de toda la escala de tono por primera vez en la música rusa. La obertura de Rollicking es una de las piezas orquestales más conocidas en Occidente y conocida por ser una pesadilla para los bajistas." #NT!
 elgar.1193.t: "Kamarinskaya" #NT!
 elgar.1193.f: "Kamarinskaya es una danza popular rusa tradicional, que se conoce principalmente hoy como la composición del compositor ruso Mikhail Glinka del mismo nombre. Kamarinskaya de Glinka, escrita en 1848, fue el primer trabajo orquestal basado completamente en la canción popular rusa y utilizar los principios compositivos de ese género para dictar la forma de la música. Se convirtió en una piedra de toque para la siguiente generación de compositores rusos que van desde el Pyotr Ilyich Tchaikovsky orientado a Occidente hasta el grupo de nacionalistas conocidos colectivamente como los cinco y también fue elogiado en el extranjero, especialmente por el compositor francés Héctor Berlioz. Para Tchaikovsky, Kamarinskaya ofreció un ejemplo viable de las posibilidades creativas de las canciones populares en una estructura sinfónica, utilizando una variedad de combinaciones armónicas y contrapuntales." #NT!
  
  ######1.8.6.###### 
  
 elgar_great_composer: "Gran compositor" #NT!
 elgar_great_composer_desc: "Los grandes compositores son la crème de la crème de los compositores. Son simplemente los mejores y son conocidos en todo el mundo." #NT!
  
 elgar.21.t: "Las naciones más musicales" #NT!
 elgar.21.d: "¡Aquí ves las 10 naciones con la mayor cantidad de @elgar_music_tradition! Tradición musical." #NT!
