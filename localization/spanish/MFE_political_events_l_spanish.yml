l_spanish:
 test_event_title:0 "Prueba"
 test_event_desc:0 "Prueba"
 test_event_flavor:0 "Prueba"
 test_event.a:0 "Prueba"
 test_event.b:0 "Prueba"
 MFE_political_events.1.t:0 "Artículos anónimos en el periódico"
 MFE_political_events.1.d:0 "Los miembros del [SCOPE.gsInterestGroup('ig_intelligentsia').GetName], envalentonados por el clima político actual, publican en los periódicos diatribas difamatorias contra el gobierno."
 MFE_political_events.1.f:0 "\"Hoy en día, ¿qué utilidad tiene la gente para un [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]? Visualizamos un futuro más audaz para [ROOT.GetCountry.GetName], uno finalmente liberado de las garras de los tiranos\"."
 MFE_political_events.1.a:0 "Suprimirlo: ¡estas acusaciones son una locura!"
 MFE_political_events.1.b:0 "Permitir que las publicaciones fluyan libremente"
 MFE_political_events.2.t:0 "Acoso en elecciones locales"
 MFE_political_events.2.d:0 "Las tensiones políticas están aumentando en [ROOT.GetCountry.GetCapital.GetName], lo que lleva a ataques a las oficinas locales de los periódicos del partido."
 MFE_political_events.2.f:0 "\"Vi a todos ellos, [SCOPE.sParty('harassing_party').GetName] hombres, armados con palancas y hachas, dijeron que iban a destrozar las [SCOPE.sParty('harassed_party').GetName] imprentas y maltratar a cualquiera que se interpusiera en su camino\"."
 MFE_political_events.2.a:0 "Defender el [SCOPE.sParty('harassed_party').GetName]"
 MFE_political_events.2.b:0 "Denunciar a las turbas [SCOPE.sParty('harassing_party').GetName]"
 MFE_political_events.3.t:0 "Fraude electoral"
 MFE_political_events.3.d:0 "Los resultados electorales en [ROOT.GetCountry.GetCapital.GetName] se han visto empañados por acusaciones de manipulación y compra de votos por parte de la oposición."
 MFE_political_events.3.f:0 "\"¿Cuántas veces te he visto hoy, jovencito? Juraría que ya estuviste aquí...\""
 MFE_political_events.3.a:0 "[SCOPE.sParty('party_1').GetName] claramente inventó esos votos..."
 MFE_political_events.3.b:0 "No se puede confiar en [SCOPE.sParty('party_2').GetName] en estos asuntos..."
 MFE_political_events.4.t:0 "comité de trabajadores"
 MFE_political_events.4.d:0 "Los trabajadores asociados con el [SCOPE.gsInterestGroup('ig_tradeunions').GetName] en [SCOPE.sState('workers_state').GetName] han formado un comité y están haciendo campaña por más derechos en el lugar de trabajo."
 MFE_political_events.4.f:0 "\"Los turnos de doce horas en las fábricas son inhumanos, una afrenta a la decencia humana; te digo, trabajador, que otro camino es posible.\""
 MFE_political_events.4.a:0 "Les permitiremos congregarse... por ahora."
 MFE_political_events.4.b:0 "¡Esto es inaceptable! Estas reuniones no pueden continuar."
 MFE_political_events.5.t:0 "Conflicto de gestión local"
 MFE_political_events.5.d:0 "El sindicato de trabajadores industriales de una de nuestras provincias está protestando contra el gerente de una fábrica acusado de abusar de sus trabajadores, llegando incluso a golpearlos con bastones cada vez que desencadenan su definición tan personal de pereza. Podríamos destituir al gerente, pero el dueño del molino insiste en que hace un muy buen trabajo."
 MFE_political_events.5.f:0 "Entonces necesitamos que lo eliminen. No sólo eliminado, sino eliminado bien. ¿Ya ves? Ya no lo queremos más. Es una mala noticia, te lo aseguro."
 MFE_political_events.5.a:0 "No se puede hacer nada al respecto..."
 MFE_political_events.5.b:0 "Necesitamos intervenir de inmediato"
 MFE_political_events.6.t:0 "Reunión pública celebrada"
 MFE_political_events.6.d:0 "Emulando el ejemplo encontrado en las capitales vecinas, los [SCOPE.gsInterestGroup('ig_trade_unions').GetName] en [ROOT.GetCountry.GetCapital.GetName] han comenzado a celebrar reuniones públicas."
 MFE_political_events.6.f:0 "\"El poder de un hombre no es nada, pero cuando combinemos nuestros números, pues... la totalidad de [ROOT.GetCountry.GetName] tendrá que escucharnos\"."
 MFE_political_events.6.a:0 "Estas reuniones son inofensivas...permítales continuar."
 MFE_political_events.6.b:0 "Hacer lo que podamos para prevenir esta actividad."
 MFE_political_events.7.t:0 "Ataque al asilo"
 MFE_political_events.7.d:0 "Las manifestaciones en [SCOPE.sState('attacked_state').GetName] se han salido de control y han provocado violencia en las calles."
 MFE_political_events.7.f:0 "\"La maldita chusma de la acería comenzó a reunirse afuera de la fábrica, y antes de que la policía pudiera llegar para dispersar a la multitud, hubo... bueno, ya sabes lo que pasó\"."
 MFE_political_events.7.a:0 "La democracia es un esfuerzo inherentemente desordenado"
 MFE_political_events.7.b:0 "Hagamos lo que podamos para ayudar"
 MFE_political_events.8.t:0 "Huelga de asilos"
 MFE_political_events.8.d:0 "Los salarios impagos, combinados con la escasez de pan en [ROOT.GetCountry.GetCapital.GetName], han provocado una huelga de trabajadores."
 MFE_political_events.8.f:0 "\"¿Cómo se puede esperar que trabajemos de sol a sol con nuestros salarios atrasados ​​y el estómago vacío? ¡A las barricadas, camarada!\""
 MFE_political_events.8.a:0 "¡Envía a la policía!"
 MFE_political_events.8.b:0 "Esto no es gran cosa..."
 MFE_political_events.9.t:0 "Profesor critica los sistemas de votación"
 MFE_political_events.9.d:0 "[SCOPE.sCharacter('professor').GetFullName], un profesor universitario agasajado por [SCOPE.gsInterestGroup('ig_intelligentsia').GetName], ha estado criticando las elecciones de [ROOT.GetCountry.GetName] en una serie de conferencias públicas."
 MFE_political_events.9.f:0 "\"Llamo ahora su atención sobre estos puntos más sutiles, que, tras un examen más detenido, resultará evidente que el sistema tal como existe bajo [ROOT.GetCountry.GetRuler.GetFullName] es insostenible\"."
 MFE_political_events.9.a:0 "Estos son argumentos válidos..."
 MFE_political_events.9.b:0 "Dile a [SCOPE.sCharacter('professor').GetFullName] que se abstenga de hablar en público."
 MFE_political_events.10.t:0 "Negociaciones de política comercial"
 MFE_political_events.10.d:0 "Después de un período de polémico debate, finalmente se ha producido un gran avance en las negociaciones sobre política comercial en [ROOT.GetCountry.GetCapital.GetName]."
 MFE_political_events.10.f:0 "\"Un buen compromiso deja a ambas partes insatisfechas, como dice el refrán. Afortunadamente, todos salen ganando con los acuerdos actuales: verdaderamente, una demostración magistral de habilidad diplomática\"."
 MFE_political_events.10.a:0 "Esto es gracias al [SCOPE.gsInterestGroup('ig_industrialists').GetName]"
 MFE_political_events.10.b:0 "¡[ROOT.GetCountry.GetRuler.GetFullName] hizo que esto sucediera por sí solo!"
 MFE_political_events.11.t:0 "Disturbios del pan"
 MFE_political_events.11.d:0 "La escasez de cereales en el extranjero ha hecho que el precio del pan se haya disparado en [SCOPE.sState('bread_riot_state').GetName]."
 MFE_political_events.11.f:0 "\"Antes se podían comprar tres panes por medio penique, pero ¿ahora? Tienes suerte si puedes encontrar una panadería que esté abierta\"."
 MFE_political_events.11.a:0 "El estado intentará aliviar su hambre."
 MFE_political_events.11.b:0 "¡Si quieren pan, pueden comprarlo!"
 MFE_political_events.12.t:0 "Tiempos difíciles en la granja"
 MFE_political_events.12.d:0 "La sequía en [SCOPE.sState('bread_queue_state').GetName] está empezando a arruinar a los agricultores locales, precipitando una crisis en [ROOT.GetCountry.GetName]."
 MFE_political_events.12.f:0 "\"¿Lluvia? No hemos visto ninguna aquí en [SCOPE.sState('bread_queue_state').GetName] en meses. La temporada de siembra ha sido muy dura para nosotros... vamos a perderlo todo\"."
 MFE_political_events.12.a:0 "Enviar ayuda inmediatamente"
 MFE_political_events.12.b:0 "Oh bueno, lo resolverán."
 MFE_political_events.13.t:0 "Las armas cruzan la frontera"
 MFE_political_events.13.d:0 "Circulan informes de que comerciantes sin escrúpulos están inundando [SCOPE.sState('neighbor_neighbor_state').GetName] con armas, aumentando el potencial de violencia."
 MFE_political_events.13.f:0 "\"[SCOPE.sState('neighbor_neighbor_state').GetName] es un polvorín en este momento, y todo lo que se necesita es una chispa para desencadenar una conflagración más amplia.\""
 MFE_political_events.13.a:0 "Poco se puede hacer en un mercado libre..."
 MFE_political_events.13.b:0 "¡Exige que detengan esto inmediatamente!"
 MFE_political_events.14.t:0 "El negocio local fracasa"
 MFE_political_events.14.d:0 "Un accidente industrial en [SCOPE.sState('failing_building').GetName] ocupa los titulares internacionales; Una explosión en una fábrica ha matado a treinta y dos trabajadores."
 MFE_political_events.14.f:0 "\"¿Cómo se suponía que íbamos a saber que las calderas iban a explotar? Olvídese del [SCOPE.gsInterestGroup('ig_trade_unions').GetName]: ¡pasarán meses antes de que el negocio vuelva a funcionar!\""
 MFE_political_events.14.a:0 "Enviar dinero a los administradores estatales."
 MFE_political_events.14.b:0 "Necesitamos apoyar al Pueblo"
 MFE_political_events.15.t:0 "Campaña de reclutamiento"
 MFE_political_events.15.d:0 "Un estallido de fervor patriotero en [SCOPE.sState('conscription_state').GetName] ha resultado en una cantidad sin precedentes de reclutas voluntarios."
 MFE_political_events.15.f:0 "\"No hay nada de malo en darles a los niños un poco de gloria; de todos modos, estarán en casa para Navidad\"."
 MFE_political_events.15.a:0 "Seguir adelante con la campaña de reclutamiento"
 MFE_political_events.15.b:0 "No necesitamos soldados adicionales"
 MFE_political_events.16.t:0 "Políticas seculares"
 MFE_political_events.16.d:0 "[SCOPE.sCharacter('ig_leader').GetFullName], una figura religiosa de cierta notoriedad, ha estado pidiendo públicamente al gobierno de [ROOT.GetCountry.GetName] que haga más para apoyar a los elementos más pobres de la sociedad."
 MFE_political_events.16.f:0 "\"¿Cómo puede [ROOT.GetCountry.GetRuler.GetFullName], que vive una vida suave y lujosa en [ROOT.GetCountry.GetCapital.GetName], saber lo que es sentir la amargura de la pobreza? Nuestro liderazgo está fuera de contacto\"."
 MFE_political_events.16.a:0 "'Convencer' a la Iglesia de que guarde silencio"
 MFE_political_events.16.b:0 "¿No tienen fe en nuestras políticas?"
 MFE_political_events.17.t:0 "Lobby proteccionista"
 MFE_political_events.17.d:0 "Elementos políticos alineados con el lobby proteccionista han propuesto una serie de reformas audaces, que provocaron debates a lo largo del [ROOT.GetCountry.GetName]."
 MFE_political_events.17.f:0 "\"El impulso está con nosotros, queridos amigos: ¡debemos atacar mientras el hierro está caliente y aprovechar la imaginación popular!\""
 MFE_political_events.17.a:0 "Quizás podamos aplicar algunas restricciones más..."
 MFE_political_events.17.b:0 "¿Quienes se creen que son...?"
 MFE_political_events.18.t:0 "Sociedad de libre comercio y derogación"
 MFE_political_events.18.d:0 "Un grupo de agitadores que se hacen llamar \"Sociedad de Libre Comercio y Derogación\" se han instalado en [ROOT.GetCountry.GetCapital.GetName] y han estado publicando panfletos incendiarios."
 MFE_political_events.18.f:0 "\"Ha llegado el momento de derribar las fronteras creadas por el hombre y de que el comercio fluya libremente entre las naciones de la Tierra. ¡Elimine la necesidad de supervisión y el hombre común triunfará!\""
 MFE_political_events.18.a:0 "El libre comercio puede ser una buena idea..."
 MFE_political_events.18.b:0 "¡El [SCOPE.sParty('liberal_party').GetName] no dictará nuestra política!"
 MFE_political_events.19.t:0 "Libre comercio y moral"
 MFE_political_events.19.d:0 "El consejo editorial de un periódico de [ROOT.GetCountry.GetCapital.GetName] ha estado publicando una serie de artículos sobre el libre comercio, provocando ondas de ira en todo el campesinado."
 MFE_political_events.19.f:0 "\"¿Por qué nosotros, la gente común, debemos vernos obligados a pagar impuestos onerosos sobre todo? ¿No hemos sufrido lo suficiente bajo el régimen actual? Es un imperativo moral que abracemos el libre comercio\"."
 MFE_political_events.19.a:0 "El libre comercio es el camino del futuro"
 MFE_political_events.19.b:0 "Nada cambiará por el momento."
 MFE_political_events.20.t:0 "Reforma sindical"
 MFE_political_events.20.d:0 "Los representantes del [SCOPE.gsInterestGroup('ig_trade_unions').GetName] proponen reformas radicales."
 MFE_political_events.20.f:0 "[SCOPE.sCharacter('trade_leader').GetFullName], un legislador con conexiones empresariales, está utilizando su influencia política para impulsar un paquete de reformas que beneficiaría a sus empresas."
 MFE_political_events.20.a:0 "Esta oferta no se puede aceptar."
 MFE_political_events.20.b:0 "Los apaciguaremos...por ahora"
 MFE_political_events.21.t:0 "La Oficina de Censura está sobrecargada de trabajo"
 MFE_political_events.21.d:0 "La Oficina de Censura ha escrito a [ROOT.GetCountry.GetRuler.GetFullName] solicitando un aumento de su presupuesto."
 MFE_political_events.21.f:0 "\"Cada mañana recibimos más de mil documentos (periódicos, boletines, folletos políticos, correspondencia personal) que debemos leer detenidamente, y simplemente no tenemos la mano de obra necesaria en este momento\"."
 MFE_political_events.21.a:0 "Bueno...necesitamos censurar a la gente."
 MFE_political_events.21.b:0 "Dígales que hagan lo que puedan con los recursos que tienen."
 MFE_political_events.22.t:0 "El libre mercado criticado"
 MFE_political_events.22.d:0 "Las discusiones sobre el comercio han consumido a nuestro pueblo y aparentemente todos han tomado partido."
 MFE_political_events.22.f:0 "\"¡Nuestro gobierno se preocupa más por los [SCOPE.gsInterestGroup('ig_industrialists').GetName] que por su propia gente! ¿Cómo podemos sobrevivir en un mercado tan despiadado?\""
 MFE_political_events.22.a:0 "¡El Libre Mercado es el único camino a seguir!"
 MFE_political_events.22.b:0 "Las cosas realmente ya no son como solían ser... debes adaptarte"
 MFE_political_events.23.t:0 "Convención contra la esclavitud"
 MFE_political_events.23.d:0 "La cuestión de #Y Esclavitud#! es polarizante en [ROOT.GetCountry.GetName]; Cada vez hay más voces que critican la institución, pero hay intereses arraigados que se resisten amargamente a cualquier cambio en el status quo."
 MFE_political_events.23.f:0 "\"Es un tema espinoso que por ahora es mejor no tocar. ¿Quién va a compensar a los dueños de esclavos, por ejemplo, por la pérdida de sus propiedades? Ni siquiera podemos permitirnos el lujo de discutir esto en este momento.\""
 MFE_political_events.23.a:0 "es poco lo que podemos hacer"
 MFE_political_events.23.b:0 "Sí, la esclavitud es realmente bastante mala."
 MFE_political_events.24.t:0 "Educación para las mujeres"
 MFE_political_events.24.d:0 "Clubes sociales influyentes en [ROOT.GetCountry.GetCapital.GetName] han estado presionando para que se amplíen los derechos de las mujeres, particularmente en lo que respecta al mundo académico."
 MFE_political_events.24.f:0 "\"¿Por qué se les debería negar la educación a nuestras hijas? ¿No son miembros contribuyentes de la sociedad de [ROOT.GetCountry.GetName]?\""
 MFE_political_events.24.a:0 "¡La educación es un derecho fundamental!"
 MFE_political_events.24.b:0 "El cambio incremental es un camino más seguro hacia el progreso."
 MFE_political_events.25.t:0 "Huelga de hambre"
 MFE_political_events.25.d:0 "En [ROOT.GetCountry.GetCapital.GetName] se está llevando a cabo una huelga de hambre masiva, con el apoyo de los trabajadores del [SCOPE.gsInterestGroup('ig_industrialists').GetName]."
 MFE_political_events.25.f:0 "\"¿Cómo se puede esperar que trabajemos turnos de doce horas sin tomar un descanso para comer? Si nuestros jefes continúan negándonos el sustento durante el horario laboral, entonces nos negaremos a comer hasta que esta política cambie\"."
 MFE_political_events.25.a:0 "Hacen algunos buenos puntos... el almuerzo es importante, después de todo."
 MFE_political_events.25.b:0 "Arresten a estos alborotadores."
 MFE_political_events.26.t:0 "Poeta local"
 MFE_political_events.26.f:0 "\"Y ahora, una lectura de 'El gozoso rapto de los jóvenes Werthers'... ejem.\n\nTe lo ruego, joven doncella de los cabellos dorados/Ilumíname; ¿dónde no compraste esos calcetines?/Para mi bar'd los pies están fríos; duros trozos de piedra/ Que amenazan con enviarme un escalofrío en los huesos.\""
 MFE_political_events.26.a:0 "Deberíamos contratarlo para enseñar a nuestros estudiantes."
 MFE_political_events.26.b:0 "Deberíamos centrarnos en cuestiones prácticas y no en el 'arte'"
 MFE_political_events.27.t:0 "Periódico subterráneo"
 MFE_political_events.27.d:0 "Algunos miembros anónimos del [SCOPE.gsInterestGroup('ig_intelligentsia').GetName] han autoeditado periódicos que satirizan al [ROOT.GetCountry.GetRuler.GetFullName]."
 MFE_political_events.27.f:0 "\"En la página seis, hay un cómic de un [ROOT.GetCountry.GetRuler.GetFirstName] desnudo bebiendo de un abrevadero para cerdos con la leyenda '¡Oink oink! ¡Comeré cualquier basura que me den los industriales!'"
 MFE_political_events.27.a:0 "¡Inmundicia increíble! suprimirlo inmediatamente"
 MFE_political_events.27.b:0 "Permitir que las publicaciones fluyan libremente"
 MFE_political_events.28.t:0 "Los nobles incitan al campesinado"
 MFE_political_events.28.d:0 "Estamos escuchando quejas del pueblo [SCOPE.sCulture('discriminated_culture').GetName] de nuestro país; Afirman que la nobleza los ha estado acosando."
 MFE_political_events.28.f:0 "Un sentimiento común entre las clases altas es que \"la gente de [SCOPE.sCulture('discriminated_culture').GetName] sólo sirve para cavar letrinas y conducir mulas en [ROOT.GetCountry.GetName], porque huelen a alcantarilla y duermen en establos\"."
 MFE_political_events.28.a:0 "Eso es realmente muy divertido."
 MFE_political_events.28.b:0 "¡Basta de insultos! Del lado de la gente [SCOPE.sCulture('discriminated_culture').GetName]"
 MFE_political_events.29.t:0 "Comerciantes locales molestos"
 MFE_political_events.29.d:0 "Una afluencia de productos extranjeros baratos a [ROOT.GetCountry.GetCapital.GetName] ha enfurecido a los comerciantes locales, quienes afirman que se les está quedando sin negocio."
 MFE_political_events.29.f:0 "\"Si no se hace algo al respecto, entonces no tendremos otra opción que hacer campaña por reformas políticas. ¿Cómo puede un hombre de negocios honesto esperar salir adelante en estos días?\""
 MFE_political_events.29.a:0 "¡Apoye el libre comercio!"
 MFE_political_events.29.b:0 "¡Nuestros mercados necesitan todas las ventajas que puedan obtener!"
 MFE_political_events.26.d: "[SCOPE.sCharacter('manzoni_new_writer_scope').GetFullName], un escritor de versos, ha llegado a [ROOT.GetCountry.GetCapital.GetName] en una gira de conferencias para promocionar su última colección."
 MFE_political_events.26.g: "[SCOPE.sCharacter('manzoni_new_writer_scope').GetSheHe|U] podría ser un buen talento después de todo."