l_spanish:
 mr_botanical_expedition_no_current_expedtion_tt: "#default_text [GetPlayer.GetName] no tiene un [concept_dubois_botanical_expedition] activo o ahora mismo #V está eligiendo donde enviarlo #!. #!"
 je_ito_botanical_expedition: "Expedición Botánica"
 je_ito_botanical_expedition_reason: "Tu [concept_dubois_naturalist] está ahora mismo en una [concept_dubois_botanical_expedition] para recolevtar nuevos [Concept('concept_dubois_specimen','$concept_dubois_specimens$')].\n$mr_divider_for_je$\nLa expedición producirá [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] cada mes y tiene una posibilidad de eventos que añadirán [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] adicionales o incluso plantas especiales.\n$mr_divider_for_je$\nProducción actual de la Expedición: @dubois_specimen! [GetPlayer.MakeScope.Var('ito_total_specimen_current_botanical_expedition_var').GetValue|*V0] [GetPlayer.MakeScope.Var('ito_total_specimen_current_botanical_expedition_var').GetValue|*V0] [Concept('concept_dubois_specimen','$concept_dubois_specimens$')]\nProducción mensual estimada: [GetPlayer.MakeScope.Var('ito_estimated_specimen_on_botanical_expedition_var').GetValue|=+0][GetPlayer.MakeScope.Var('ito_estimated_specimen_on_botanical_expedition_var').GetValue|=+0][Concept('concept_dubois_specimen','$concept_dubois_specimens$')][Concept('concept_dubois_specimen','$concept_dubois_specimens$')]"
