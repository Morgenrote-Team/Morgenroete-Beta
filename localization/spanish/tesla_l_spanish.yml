l_spanish:
 tesla_prototype_mechanical_computer_modifier: "Prototipo de computadora mecánica"
 tesla.223.t: "Un primer prototipo"
 tesla.223.d: "En su afán por construir una computadora mecánica, el Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] logró terminar un primer prototipo que puede realizar cálculos simples. Aunque no es tan potente como una computadora real, este dispositivo podría ayudar a nuestros científicos."
 tesla.223.f: "Todavía no es capaz de hacer todos los cálculos, pero al menos algunos. Sumar, restar, multiplicar y dividir no debería ser un problema. Pero tenga en cuenta que uno de mis asistentes casi pierde un dedo cuando la máquina estaba en funcionamiento."
 tesla.223.g: "Espero que [ROOT.Var('tesla_engineer_var').GetCharacter.GetSheHe] termine algo más que un simple prototipo..."
 tesla.224.t: "Aumento de funciones"
 tesla.224.d: "Parece que el Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] está lleno de ideas. No pasa un día sin que se hagan ajustes a los planes de la Computadora Mecánica. La única duda es si el proyecto se completará algún día."
 tesla.224.f: "\"Pero imagínense si también pudiera reproducir música. ¿No sería fantástico?\""
 tesla.224.g: "¿Podrías por favor construir esa computadora?"
 tesla.224.h: "Amenazan con recortar la financiación"
 tesla.225.t: "Incendio daña computadora mecánica"
 tesla.225.d: "Un gran incendio ha dañado partes del ordenador mecánico del Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] y ha destruido algunos planos del mismo. Todavía no sabemos cuánto retrasará esto el proyecto."
 tesla.225.f: "El incendio se produjo en el módulo de impresión del ordenador. Nadie sabe exactamente qué lo provocó, pero parece que la impresora producía grandes cantidades de papel."
 tesla.225.g: "¿Se construirá algún día esta computadora?"
 tesla.225.h: "Envíeles fondos adicionales."
