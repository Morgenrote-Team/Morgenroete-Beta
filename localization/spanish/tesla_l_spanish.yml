 je_tesla_irrigation_project: "Sistema de riego"
 tesla_states_with_irrigation_tt: "Todos los estados [GetPlayer.GetAdjective] tienen el rasgo estatal $tesla_state_trait_irrigation$ (actualmente [GetPlayer.MakeScope.GetVariable('tesla_num_states_irrigation_var').GetValue|+0] / [GetPlayer.MakeScope.GetVariable('tesla_num_states_var').GetValue|V0])."
 tesla_irrigation_project_finished_engineer_loc: "\nEl Dr. [GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetLastName] trabajó en los nuevos #b Sistemas de Riego#! de [GetPlayer.GetName] y pudo ampliarlos, lo que mejoró enormemente nuestro sector agrícola."
 gaudi.1111.t: "El sistema de riego de [GetPlayer.GetName]"
 gaudi.1111.d: "Nuestro [concept_gaudi_civil_engineer][GetPlayer.MakeScope.GetCountry.GetCustom('gaudi_dr_engineer_type')] finalmente ha completado el proyecto de construir un sistema de irrigación moderno en [GetPlayer.GetNameNoFormatting]. ¡Ahora que hemos domesticado los ríos y llevado agua a los campos, nuestra agricultura seguramente crecerá!"
 gaudi.1111.f: "\"Los ríos salvajes ahora están domesticados. La magia ha desaparecido. Ahora solo hay vías fluviales rectas. Incluso el castor desapareció...\""
 gaudi.1111.g: "Espero que esto no tenga consecuencias imprevistas..."
