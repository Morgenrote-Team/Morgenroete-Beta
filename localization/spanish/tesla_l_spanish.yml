l_spanish:
 
 ### 2.3.0 ###

 tesla_prototype_mechanical_computer_modifier: "Prototipo de computadora mecánica" #NT!
 tesla.223.t: "Un primer prototipo" #NT!
 tesla.223.d: "En su afán por construir una computadora mecánica, el Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] logró terminar un primer prototipo que puede realizar cálculos simples. Aunque no es tan potente como una computadora real, este dispositivo podría ayudar a nuestros científicos." #NT!
 tesla.223.f: "Todavía no es capaz de hacer todos los cálculos, pero al menos algunos. Sumar, restar, multiplicar y dividir no debería ser un problema. Pero tenga en cuenta que uno de mis asistentes casi pierde un dedo cuando la máquina estaba en funcionamiento." #NT!
 tesla.223.g: "Espero que [ROOT.Var('tesla_engineer_var').GetCharacter.GetSheHe] termine algo más que un simple prototipo..." #NT!
 tesla.224.t: "Aumento de funciones" #NT!
 tesla.224.d: "Parece que el Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] está lleno de ideas. No pasa un día sin que se hagan ajustes a los planes de la Computadora Mecánica. La única duda es si el proyecto se completará algún día." #NT!
 tesla.224.f: ""Pero imagínense si también pudiera reproducir música. ¿No sería fantástico?"" #NT!
 tesla.224.g: "¿Podrías por favor construir esa computadora?" #NT!
 tesla.224.h: "Amenazan con recortar la financiación" #NT!
 tesla.225.t: "Incendio daña computadora mecánica" #NT!
 tesla.225.d: "Un gran incendio ha dañado partes del ordenador mecánico del Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] y ha destruido algunos planos del mismo. Todavía no sabemos cuánto retrasará esto el proyecto." #NT!
 tesla.225.f: "El incendio se produjo en el módulo de impresión del ordenador. Nadie sabe exactamente qué lo provocó, pero parece que la impresora producía grandes cantidades de papel." #NT!
 tesla.225.g: "¿Se construirá algún día esta computadora?" #NT!
 tesla.225.h: "Envíeles fondos adicionales." #NT!

 ### 2.3.1 ###

 tesla_modernized_railway_lines_state_modifier: "Líneas ferroviarias modernizadas" #NT!
  
 tesla_railway_project_new_priority_button: "$tesla_topographic_map_project_new_priority_button$" #NT!
 tesla_railway_project_new_priority_button_desc: "$tesla_topographic_map_project_new_priority_button_desc$" #NT!
 tesla_topographic_map_project_new_priority_button: "Cambiar estados priorizados" #NT!
 tesla_topographic_map_project_new_priority_button_desc: "#T Cambiar los estados priorizados#!\nChange [Concept('concept_state', '$concept_states$')] que están priorizados para este proyecto.\n#n Advertencia: Pausa el juego para asegurarte de que la priorización funciona correctamente.#!" #NT!
  
 tesla_state_trait_irrigation: "Sistema de riego" #NT!
 je_tesla_irrigation_project: "Sistema de riego" #NT!
  
 tesla_states_with_irrigation_tt: "Todos los estados [GetPlayer.GetAdjective] tienen el rasgo estatal $tesla_state_trait_irrigation$ (actualmente [GetPlayer.MakeScope.GetVariable('tesla_num_states_irrigation_var').GetValue|+0] / [GetPlayer.MakeScope.GetVariable('tesla_num_states_var').GetValue|V0])." #NT!
  
 tesla_irrigation_project_finished_engineer_loc: "\nEl Dr. [GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetLastName] trabajó en los nuevos #b Sistemas de Riego#! de [GetPlayer.GetName] y pudo ampliarlos, lo que mejoró enormemente nuestro sector agrícola." #NT!
 gaudi.1111.t: "El sistema de riego de [GetPlayer.GetName]" #NT!
 gaudi.1111.d: "Nuestro [concept_gaudi_civil_engineer][GetPlayer.MakeScope.GetCountry.GetCustom('gaudi_dr_engineer_type')] finalmente ha completado el proyecto de construir un sistema de irrigación moderno en [GetPlayer.GetNameNoFormatting]. ¡Ahora que hemos domesticado los ríos y llevado agua a los campos, nuestra agricultura seguramente crecerá!" #NT!
 gaudi.1111.f: ""Los ríos salvajes ahora están domesticados. La magia ha desaparecido. Ahora solo hay vías fluviales rectas. Incluso el castor desapareció..."" #NT!
 gaudi.1111.g: "Espero que esto no tenga consecuencias imprevistas..." #NT!

