l_spanish:
 pbi_objective_publishing_industry_events.200.t: "Una novela periodística exitosa"
 pbi_objective_publishing_industry_events.200.d: "La novela de [SCOPE.sCharacter('target_character').GetFullName] se publicó por entregas en un periódico de [SCOPE.sState('target_state').GetName] y, después de una publicación muy popular, la serie terminó."
 pbi_objective_publishing_industry_events.200.f: "Durante el período de serialización, las ventas de periódicos finalmente se triplicaron. El editor publicó un libro que resume la serialización e incluso tradujo el libro para el mercado internacional, y las ventas de estos libros han aumentado constantemente."
 pbi_objective_publishing_industry_events.200.a: "¡Buen trabajo!"
 pbi_objective_publishing_industry_events.200.good: "El progreso en la escritura de la novela aumentará #positive_value#!"
 pbi_objective_publishing_industry_events.200.bad: "El progreso de la escritura de la novela se reducirá #negative_value#!"
 pbi_objective_publishing_industry_events.200.stop: "#negative_value Aumenta la probabilidad de futuros restablecimientos del progreso novedoso#!"
 pbi_objective_publishing_industry_events.201.t: "Cancelación de serialización"
 pbi_objective_publishing_industry_events.201.d: "La novela, que se estaba publicando por entregas en un periódico [SCOPE.sState('target_state').GetName], quedó inconclusa cuando el escritor ya no pudo seguir escribiendo."
 pbi_objective_publishing_industry_events.201.f: "Muchos lectores ya no podrán leer el resto de novelas serializadas que con tantas ansias esperaban."
 pbi_objective_publishing_industry_events.201.a: "Demasiado"
 pbi_objective_publishing_industry_events.202.t: "Gran escritor del futuro"
 pbi_objective_publishing_industry_events.202.d: "Una empresa de periódicos [SCOPE.sState('target_state').GetName] está buscando publicar un nuevo periódico.\nEstán buscando un nuevo novelista para este ambicioso periódico."
 pbi_objective_publishing_industry_events.202.f: "Hoy en día, no es la declaración política, el ingenioso editorial del editor jefe o el sensacional artículo de tres páginas lo que determina las ventas de un periódico, sino el interés de la ficción serializada."
 pbi_objective_publishing_industry_events.202.a: "¡[SCOPE.sCharacter('target_character_1').GetFullName] es el gran escritor del futuro!"
 pbi_objective_publishing_industry_events.202.a.tt: "Empieza a escribir una serie de novelas."
 pbi_objective_publishing_industry_events.202.b: "¡Siento una inteligencia desbordante de [SCOPE.sCharacter('target_character_2').GetFullName]!"
 pbi_objective_publishing_industry_events.202.c: "¡La escritura de [SCOPE.sCharacter('target_character_3').GetFullName] tiene una atracción irresistible!"
 pbi_objective_publishing_industry_events.202.e: "¡Debe haber otras gemas en bruto que brillen!"
 pbi_objective_publishing_industry_events.202.e.tt: "Buscaremos otros candidatos"
 pbi_objective_publishing_industry_events.203.t: "No puedo seguir escribiendo"
 pbi_objective_publishing_industry_events.203.d: "[SCOPE.sCharacter('target_character').GetFullName] tiene dificultades para avanzar en la novela [SCOPE.sCharacter('target_character').GetHerHis]. Si esto continúa, la serialización probablemente se detendrá."
 pbi_objective_publishing_industry_events.203.f: "Un editor a cargo visitó la casa de [SCOPE.sCharacter('target_character').GetLastName] temprano en la mañana para verificar el progreso del manuscrito, pero [SCOPE.sCharacter('target_character').GetSheHe] no estaba allí. El sirviente dijo que el amo no había estado en casa durante tres días y no sabía dónde estaba [SCOPE.sCharacter('target_character').GetSheHe]."
 pbi_objective_publishing_industry_events.203.a: "Ata [SCOPE.sCharacter('target_character').GetHerHim] a una silla, ¡pero deja [SCOPE.sCharacter('target_character').GetHerHim] escribiendo!"
 pbi_objective_publishing_industry_events.203.b: "[SCOPE.sCharacter('target_character').GetSheHe] necesita un cambio de escenario"
 pbi_objective_publishing_industry_events.204.t: "¿A quién pertenece el manuscrito?"
 pbi_objective_publishing_industry_events.204.d: "El autor se niega a permitir que el editor revise el contenido de una novela que [SCOPE.sCharacter('target_character').GetFullName] está publicando por entregas."
 pbi_objective_publishing_industry_events.204.f: "Al editor le preocupa que la interpretación de determinados personajes de la novela pueda interpretarse como una burla de determinados políticos."
 pbi_objective_publishing_industry_events.204.a: "Los editores tienen derechos de revisión."
 pbi_objective_publishing_industry_events.204.b: "Se debe respetar la voluntad del autor."
 pbi_objective_publishing_industry_events.205.t: "Contenido inmoral"
 pbi_objective_publishing_industry_events.205.d: "[SCOPE.gsInterestGroup('target_ig').GetName] exige mejoras en las novelas serializadas de [SCOPE.sCharacter('target_character').GetFullName] debido a su contenido inmoral."
 pbi_objective_publishing_industry_events.205.f: "'El contenido de la controvertida novela de [SCOPE.sCharacter('target_character').GetLastName], publicada por entregas en los periódicos, es inaceptable'"
 pbi_objective_publishing_industry_events.205.a: "Las grandes obras son inaceptables para los viejos valores."
 pbi_objective_publishing_industry_events.205.b: "Necesitamos revisar el contenido."
 pbi_objective_publishing_industry_events.206.t: "Sospecha de plagio"
 pbi_objective_publishing_industry_events.206.d: "Varios novelistas han afirmado que su trabajo ha sido plagiado en la novela serializada de [SCOPE.sCharacter('target_character').GetFullName]."
 pbi_objective_publishing_industry_events.206.f: "'La supuesta creatividad de su tan estimado escritor es puro fraude. Esta escena que dice haber inventado está basada en el capítulo de uno de mis libros. ¿Cómo puedes negar eso? La escena de la mujer bañándose es absolutamente única. ¡Reclamo mis derechos de autor!'"
 pbi_objective_publishing_industry_events.206.a: "Esa es una acusación falsa"
 pbi_objective_publishing_industry_events.207.t: "Una novela como una profecía"
 pbi_objective_publishing_industry_events.207.d: "El contenido de las novelas serializadas de [SCOPE.sCharacter('target_character').GetFullName] ha llamado la atención por su sorprendente similitud con un extraño asesinato reciente en [SCOPE.sState('target_state').GetName]."
 pbi_objective_publishing_industry_events.207.f: "'No hay duda de que el problema de la pobreza al que se enfrenta actualmente nuestra sociedad está detrás de la aparición de este tipo de incidentes. Y es sorprendente que la novela de [SCOPE.sCharacter('target_character').GetLastName], que actualmente se publica por entregas, contenga exactamente la misma descripción, como si predijera la ocurrencia de tal situación.'"
 pbi_objective_publishing_industry_events.207.a: "Es una pieza que captura los tiempos."
 pbi_objective_publishing_industry_events.208.t: "Reseñas favorables de libros por parte de celebridades"
 pbi_objective_publishing_industry_events.208.d: "[SCOPE.sCharacter('target_character_1').GetFullName], un miembro influyente de [SCOPE.gsInterestGroup('target_ig_1').GetName], ha publicado una reseña favorable de la novela que [SCOPE.sCharacter('target_character').GetFullName] está serializando."
 pbi_objective_publishing_industry_events.208.f: "'Todos los periódicos publican novelas, pero la novela de [SCOPE.sCharacter('target_character').GetFullName] es la más interesante de todas. Francamente, me sorprende que [SCOPE.sCharacter('target_character').GetSheHe] tenga tanto talento literario.'"
 pbi_objective_publishing_industry_events.208.a: "[SCOPE.sCharacter('target_character_1').GetLastName] tiene ojos para ver"
 pbi_objective_publishing_industry_events.208.b: "No necesito [SCOPE.sCharacter('target_character_1').GetHerHis] favores"
 pbi_objective_publishing_industry_events.209.t: "Reseñas de libros críticos de celebridades"
 pbi_objective_publishing_industry_events.209.d: "[SCOPE.sCharacter('target_character_1').GetFullName], un miembro destacado de [SCOPE.gsInterestGroup('target_ig_1').GetName], ha publicado una reseña crítica de una novela que [SCOPE.sCharacter('target_character').GetFullName] está serializando."
 pbi_objective_publishing_industry_events.209.f: "'La fealdad de las novelas serializadas de [SCOPE.sCharacter('target_character').GetLastName] es sobresaliente en comparación con las novelas serializadas de los últimos años. En particular, la novela publicada esta semana no tuvo nada especial. Ya no es posible reparar esta historia rota. Incluso siento simpatía por [SCOPE.sCharacter('target_character').GetLastName], que debe seguir escribiendo novelas a pesar de que [SCOPE.sCharacter('target_character').GetSheHe] se ha convertido en el hazmerreír del mundo.'"
 pbi_objective_publishing_industry_events.209.a: "[SCOPE.sCharacter('target_character_1').GetLastName] está revelando su propia ignorancia"
 pbi_objective_publishing_industry_events.210.t: "Las novelas serializadas llaman la atención"
 pbi_objective_publishing_industry_events.210.d: "Las novelas de [SCOPE.sCharacter('target_character').GetFullName], publicadas por entregas en los periódicos [SCOPE.sState('target_state').GetName], están ganando cada vez más atención con cada entrega."
 pbi_objective_publishing_industry_events.210.f: "La historia de las dificultades y esfuerzos del protagonista, basada en su propia vida, ha capturado los corazones de muchos lectores."
 pbi_objective_publishing_industry_events.210.a: "¡No puedo esperar a ver el resto!"
 pbi_objective_publishing_industry_events.211.t: "Fanático ardiente"
 pbi_objective_publishing_industry_events.211.d.rich: "Las novelas serializadas de [SCOPE.sCharacter('target_character').GetFullName] son populares entre [concept_upper_strata] de [SCOPE.sState('target_state').GetName]."
 pbi_objective_publishing_industry_events.211.d.middle: "Las novelas serializadas de [SCOPE.sCharacter('target_character').GetFullName] son populares entre [concept_middle_strata] de [SCOPE.sState('target_state').GetName]."
 pbi_objective_publishing_industry_events.211.d.poor: "Las novelas serializadas de [SCOPE.sCharacter('target_character').GetFullName] son populares entre [concept_lower_strata] de [SCOPE.sState('target_state').GetName]."
 pbi_objective_publishing_industry_events.211.f: "Si bien en [SCOPE.sState('target_state').GetName] se pueden disfrutar novelas de diversos periódicos, el trabajo de [SCOPE.sCharacter('target_character').GetFullName] ha sido inmensamente popular en los últimos años."
 pbi_objective_publishing_industry_events.211.a: "¿Tienes algún evento de firma planeado?"
 pbi_objective_publishing_industry_events.212.t: "Suspensión de serialización"
 pbi_objective_publishing_industry_events.212.d: "El tribunal ordenó que las novelas serializadas de [SCOPE.sCharacter('target_character').GetFullName] dejaran de publicarse por entregas alegando que los personajes que las contienen difaman a ciertos políticos."
 pbi_objective_publishing_industry_events.212.f: "Cualquiera que haya leído la novela sabe que los personajes de la novela de [SCOPE.sCharacter('target_character').GetFullName] están inspirados en ciertos políticos."
 pbi_objective_publishing_industry_events.212.a: "Ay dios mío"
 pbi_objective_publishing_industry_events.300.t: "Periodistas en el campo de batalla"
 pbi_objective_publishing_industry_events.300.d: "Los artículos enviados desde el [SCOPE.sFront('target_front').GetName] por periodistas que sirvieron en la guerra del [SCOPE.sWar('target_war').GetName] han despertado un gran interés."
 pbi_objective_publishing_industry_events.300.f: "El general [SCOPE.sCharacter('target_character').GetFullName] ordenó repetidos asaltos y finalmente logró obligar al enemigo a retirarse, pero nuestras fuerzas también sufrieron daños tremendos. El resultado de esta batalla, que duró medio día, fue sólo un avance de 100 metros sobre nuestra posición.'"
 pbi_objective_publishing_industry_events.300.a: "Reclutemos voluntarios"
 pbi_objective_publishing_industry_events.300.b: "Recaudemos donaciones"
 pbi_objective_publishing_industry_events.400.t: "Ganar la batalla diplomática"
 pbi_objective_publishing_industry_events.400.d: "Nuestras publicitadas conversaciones con [SCOPE.sCountry('target_country').GetName] fueron ampliamente publicadas en la prensa de [SCOPE.sCountry('target_country').GetName]. Si bien esto ha dado impulso al [Concept('concept_radical', '$concept_radicals$')] en [SCOPE.sCountry('target_country').GetName], también ha provocado la condena del [SCOPE.sCountry('target_country').GetName] entre los países involucrados."
 pbi_objective_publishing_industry_events.400.f: "'En respuesta a la #bold solicitud insolente del [SCOPE.sCountry('target_country').GetName] diplomático#!, [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName] #bold se negó a reunirse#! con el diplomático y le informó a través de #bold un oficial subalterno#! que no tenía #bold nada más que decir#! .'"
 pbi_objective_publishing_industry_events.400.a: "Incluso los tontos y los periódicos pueden ser útiles en manos de una persona inteligente."
 pbi_objective_publishing_industry_events.402.t: "Guerra de información"
 pbi_objective_publishing_industry_events.402.d: "Los periódicos tienen ahora más poder que el discurso de cualquier político. Si usamos este poder de manera efectiva, deberíamos poder causar daño a nuestros enemigos."
 pbi_objective_publishing_industry_events.402.f: "\"Tú proporcionas las fotografías y yo proporcionaré la guerra\".\nWilliam Randolph Hearst"
 pbi_objective_publishing_industry_events.402.a: "[SCOPE.sCountry('target_country_1').GetName] es nuestro enemigo"
 pbi_objective_publishing_industry_events.402.b: "No podemos dejar que [SCOPE.sCountry('target_country_2').GetName] siga creciendo"
 pbi_objective_publishing_industry_events.402.c: "Necesitamos solucionar el problema con [SCOPE.sCountry('target_country_3').GetName]"
 pbi_objective_publishing_industry_events.402.e: "Deberíamos considerarlo cuidadosamente"
 pbi_objective_publishing_industry_events.402.tt: "Pospondremos la decisión sobre el país objetivo durante un mes."
 pbi_objective_publishing_industry_events.403.t: "Revista de pólvora"
 pbi_objective_publishing_industry_events.403.d: "[SCOPE.sCountry('target_country').GetName] periódicos se han quejado de que nuestras afirmaciones en la región [SCOPE.sState('target_state').GetStateRegion.GetStrategicRegion.GetName] son injustificadas."
 pbi_objective_publishing_industry_events.403.f: "Para [SCOPE.sState('target_state').GetStateRegion.GetStrategicRegion.GetName], un [concept_strategic_region] tanto para nosotros como para [SCOPE.sCountry('target_country').GetName], los periódicos de [SCOPE.sCountry('target_country').GetName] apelan constantemente a la legitimidad de sus derechos. Los problemas en esta área estimularán fuertemente el sentimiento público [SCOPE.sCountry('target_country').GetName]."
 pbi_objective_publishing_industry_events.403.a: "No hay manera de no aprovechar esto."
 pbi_objective_publishing_industry_events.404.t: "Solicitud insolente"
 pbi_objective_publishing_industry_events.404.d: "El gobierno de [SCOPE.sCountry('target_country').GetName], a través de sus diplomáticos, nos pide concesiones y busca una reunión secreta con [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName]."
 pbi_objective_publishing_industry_events.404.f: "La opinión pública comienza a insistir en que se debe iniciar la guerra si no se reconoce su superioridad en la región. Es casi seguro que la última demanda del gobierno de [SCOPE.sCountry('target_country').GetName] refleja su deseo de evitar la guerra suprimiendo la opinión pública interna, que está siendo dominada por el campo pro-guerra abierta."
 pbi_objective_publishing_industry_events.404.a: "Quieren correr el telón.\n¡Y de la forma que más les convenga!"
 pbi_objective_publishing_industry_events.405.t: "Telegrama del destino"
 pbi_objective_publishing_industry_events.405.d: "Se entregó un telegrama a [SCOPE.sCharacter('target_character').GetFullName], informando a [SCOPE.sCharacter('target_character').GetHerHim] del contenido de una reunión secreta con [SCOPE.sCountry('target_country').GetName] diplomáticos en la villa de [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName] en [SCOPE.sState('target_state_2').GetName]. El [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] dijo que el [ROOT.GetCountry.GetRuler.GetSheHe] dejaría al gobierno decidir si hace públicos sus contenidos."
 pbi_objective_publishing_industry_events.405.f: "'Los diplomáticos de [SCOPE.sCountry('target_country').GetName] no sólo exigieron enérgicamente una reunión con [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName], sino que también pidieron retirar nuestro [concept_interest] a la región de [SCOPE.sState('target_state').GetStateRegion.GetStrategicRegion.GetName] y, como prueba de su compromiso, abdicar. El [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] respondió informando a los diplomáticos que el [ROOT.GetCountry.GetRuler.GetSheHe] no podía ni debía asumir tal compromiso y que el [ROOT.GetCountry.GetRuler.GetSheHe] no tenía nada más que decir en la reunión y que las negociaciones habían terminado."
 pbi_objective_publishing_industry_events.405.a: "Hazlo público. Pero un poco emocionante"
 pbi_objective_publishing_industry_events.405.a.tt: "Las cosas se convierten en un [concept_diplomatic_incident]"
 pbi_objective_publishing_industry_events.405.b: "No ser publicado"
 pbi_objective_publishing_industry_events.405.b.tt: "La situación se resolverá amistosamente."
 pbi_objective_publishing_industry_events.500.t: "iluminar"
 pbi_objective_publishing_industry_events.500.d: "A medida que los periódicos comienzan a publicar fotografías en lugar de ilustraciones, la cruda realidad de nuestra sociedad está saliendo a la luz."
 pbi_objective_publishing_industry_events.500.f: "La foto muestra una favela con poca seguridad y saneamiento deficiente. Muchos trabajadores se ven obligados a realizar trabajos peligrosos por salarios bajos. Los niños se ven obligados a trabajar porque no se les permite asistir a la escuela."
 pbi_objective_publishing_industry_events.500.a: "Necesitamos centrarnos en ampliar el bienestar."
 pbi_objective_publishing_industry_events.500.b: "[SCOPE.sCharacter('target_character_1').GetLastName] parece haber cambiado de opinión sobre [GetLawGroup('lawgroup_childrens_rights').GetName]"
 pbi_objective_publishing_industry_events.500.c: "[SCOPE.sCharacter('target_character_2').GetLastName] parece haber cambiado de opinión sobre [GetLawGroup('lawgroup_welfare').GetName]"
 pbi_objective_publishing_industry_events.500.e: "[SCOPE.sCharacter('target_character_3').GetLastName] parece haber cambiado de opinión sobre [GetLawGroup('lawgroup_citizenship').GetName]"
 gaudi_transatlantic_cable_expedition_modifier: "Expedición por cable transatlántico"
 gaudi_transatlantic_cable_expedition_failed_modifier: "Expedición fallida del cable transatlántico"