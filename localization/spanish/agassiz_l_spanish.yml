 je_agassiz_volcano_expedition: "Expedición al volcán"
 je_agassiz_volcano_expedition_reason: "Professor [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] is on a volcano expedition in [SCOPE.sState('agassiz_volcano_state').GetName] together with a team of experts and assistants. The expedition budget is limited to a maximum of 2 years. Usually the expedition makes some progress every month and should have completed its research work after a year and a half. However, unusual events - whether pleasantly scientific or unpleasantly catastrophic - can influence events. As a rule of thumb: the danger level should never be so high that it reaches its maximum. This isn't a kid's walk. Don't play with volcanoes."
 agassiz.21.t: "Observatorio Vesuviano"
 agassiz.21.d: "En geología, el Vesubio se considera un volcán modelo para extraer conclusiones sobre toda la vulcanología. Debido a su creciente actividad desde el siglo XVII y con la esperanza de poder predecir y estudiar científicamente las erupciones más recientes, el gobierno estatal decidió por decreto construir un observatorio vulcanológico en su ladera."
 agassiz.21.f: "El Observatorio Vesubio (en italiano: Osservatorio Vesuviano) es el centro de vigilancia de las tres zonas volcánicas de Campania, Italia: el Vesubio, los Campos Flégreos e Isquia. Fundado en 1841 en las laderas del Vesubio por Fernando II de Borbón, rey de las Dos Sicilias, es el instituto de vulcanología más antiguo del mundo."
 agassiz.21.g: "Somos la primera nación de la vulcanología."
