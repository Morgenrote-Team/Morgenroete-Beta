 agassiz.801.t: "El sismómetro"
 agassiz.801.d: "[GetPlayer.MakeScope.Var('tesla_engineer_var').GetCharacter.GetFullName] y [GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetFullName] presentaron hoy su nuevo aparato para registrar la actividad sísmica. El sismómetro es un primer paso para detectar mejor los terremotos."
 agassiz.801.f: "En respuesta a una serie de terremotos cerca de Comrie, Escocia, en 1839, se formó un comité en el Reino Unido para producir mejores dispositivos de detección de terremotos. El resultado fue un sismómetro de péndulo invertido construido por James David Forbes, presentado por primera vez en un informe de David Milne-Home en 1842, que registraba las mediciones de la actividad sísmica mediante el uso de un lápiz colocado sobre papel encima del péndulo. Los diseños proporcionados no resultaron efectivos, según los informes de Milne. Fue Milne quien acuñó la palabra sismómetro en 1841 para describir este instrumento."
 agassiz.801.g: "Ciertamente es útil para nuestros académicos."
 agassiz.801.h: "Ciertamente es útil para la ciencia."
 agassiz.802.t: "El sismógrafo"
 agassiz.802.d: "[GetPlayer.MakeScope.Var('tesla_engineer_var').GetCharacter.GetFullName] y [GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetFullName] presentaron hoy su nuevo aparato para registrar la actividad sísmica. Es muy superior al sismómetro anterior y puede detectar mucho mejor las zonas de terremotos. Esto nos permite prepararnos con mayor precisión para las emergencias."
 agassiz.802.f: "Los primeros sismógrafos se inventaron en las décadas de 1870 y 1880. El primero fue fabricado por Filippo Cecchi alrededor de 1875. Sin embargo, el instrumento no era lo suficientemente sensible y el primer sismograma producido por el instrumento fue en 1887, cuando John Milne ya había demostrado su diseño en Japón. En 1880, el primer sismómetro de péndulo horizontal fue desarrollado por el equipo de John Milne, James Alfred Ewing y Thomas Gray, quienes trabajaron como asesores de gobiernos extranjeros en Japón, de 1880 a 1895. Milne, Ewing y Gray, todos ellos contratados por el gobierno Meiji en los cinco años anteriores para ayudar a los esfuerzos de modernización de Japón, fundaron la Sociedad Sismológica de Japón en respuesta a un terremoto que tuvo lugar el 22 de febrero de 1880 en Yokohama."
 agassiz.802.g: "Ciertamente es útil para la geología."
 je_agassiz_seismometer: "Sismómetro"
 je_agassiz_seismometer_reason: "The seismometer is a further development of the seismoscope. It is still a very limited device for detecting earth tremors, but can at least be used as a means of recording that an earthquake has occurred.\n\nYou will gain progress if you have both an [concept_tesla_engineer] and a [concept_agassiz_geologist]"
 je_agassiz_seismometer_goal: "Un geólogo y un ingeniero deben pasar [JournalEntry.GetTotalGoalValue|V0] semanas trabajando juntos en el nuevo instrumento."
 je_agassiz_seismograph: "Sismógrafo"
 je_agassiz_seismograph_reason: "A seismograph on a seismometer improves the recording of earthquakes and earth tremors in an amazing way. This would finally make a more modern type of seismology possible. A seismoscope would trigger the device to begin recording, and then a recording surface would produce a graphical illustration of the tremors automatically (a seismogram).\n\nYou will gain progress if you have both an [concept_tesla_engineer] and a [concept_agassiz_geologist]"
 je_agassiz_seismograph_goal: "Un geólogo y un ingeniero deben pasar [JournalEntry.GetTotalGoalValue|V0] semanas trabajando juntos en el nuevo instrumento."
 agassiz_seismometer_done_tt: "El geólogo y el ingeniero terminan sus consideraciones teóricas preliminares sobre el dispositivo y comienzan a construir el sismómetro."
 agassiz_seismograph_done_tt: "El geólogo y el ingeniero terminan sus consideraciones teóricas preliminares sobre el dispositivo y comienzan a construir el sismógrafo."
 agassiz.302.t: "Géiser"
 agassiz.302.d: "En su búsqueda de características geológicas especiales, [GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetFullName] se topó con un espectáculo natural fenomenal en la lejanía de [SCOPE.sState('agassiz_geyser_state').GetName]. ¡Parece que hay géiseres en la zona!"
 agassiz.302.f: "Un géiser es un manantial de agua caliente que emite su agua en forma de fuente a intervalos regulares o irregulares. Este tipo de erupción se denomina erupción. Los géiseres reciben su nombre del Gran Géiser de Islandia. Los géiseres requieren una combinación especial de condiciones geológicas y climáticas que solo se dan a gran escala en unos pocos lugares. Los géiseres dependen de tres factores: un suministro de agua en forma de acuífero, una fuente de calor y al menos un depósito con un estrechamiento del sistema de tuberías asociado. Más de 300 géiseres activos, aproximadamente la mitad de todos los que existen en el mundo, se encuentran en el Parque Nacional de Yellowstone."
 agassiz.302.g: "¿El géiser tiene un ritmo de minutos o de horas?"
