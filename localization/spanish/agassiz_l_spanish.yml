 agassiz_building_production_mult_modifier: "Nueva veta de mineral"
 agassiz_building_production_2_mult_modifier: "Nuevo pozo de petróleo"
 agassiz_ore_search_cost_modifier: "Costo de búsqueda de mineral"
 agassiz_mineralogist: "Mineralogista"
 agassiz_mineralogist_desc: "Los mineralogistas son expertos en rocas raras y son particularmente útiles para encontrar minerales raros."
 agassiz_geophysicist: "geofísico"
 agassiz_geophysicist_desc: "Los geofísicos son expertos en la naturaleza del interior de la Tierra y están más familiarizados con la historia de la Tierra y sus procesos."
 agassiz_prospector: "Prospector"
 agassiz_prospector_desc: "Los buscadores tienen habilidades especiales que ayudan a encontrar nuevas vetas de mineral o fuentes de petróleo."
 agassiz_oceanographer: "Oceanógrafo"
 agassiz_oceanographer_desc: "Los oceanógrafos tienen un conocimiento excepcional de la naturaleza y los procesos de los océanos."
 agassiz_volcanologist: "vulcanólogo"
 agassiz_volcanologist_desc: "Los vulcanólogos son expertos en volcanes y son particularmente útiles en su investigación."
 agassiz.100.t: "La búsqueda de minerales"
 agassiz.100.d: "El Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] empacó [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] equipo y canceló todos los cursos para comenzar a buscar minerales. La pregunta sigue siendo: ¿qué tipo de depósitos de materia prima debería investigar el [ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe]?"
 agassiz.100.f: ""
 agassiz.100.g: "El Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] debería regresar a la universidad."
 agassiz.100.h: "Carbón."
 agassiz.100.i: "Hierro."
 agassiz.100.j: "Dirigir."
 agassiz.100.k: "Azufre."
 agassiz.100.l: "Oro."
 agassiz.100.m: "Uranio."
 agassiz.101.t: "Nuevas vetas de mineral"
 agassiz.101.d: "After Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] has found some new ore veins for the mining companies, [ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe] returns. The further expansion of the facilities is not [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] concern."
 agassiz.101.f: "\"Todo tiene su propio límite. El mineral de hierro no puede transformarse en oro\". - Mark Twain"
 agassiz.101.g: "Buen trabajo."
 agassiz.102.t: "¡Aceite!"
 agassiz.102.d: "After Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] discovered new oil sources, the black gold bubbled up. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe] considers his work to be done for the time being."
 agassiz.102.f: "\"La fórmula del éxito: levantarse temprano, trabajar duro, encontrar petróleo\". -J. Pablo Getty"
 agassiz.102.g: "Nunca se puede tener suficiente aceite."
