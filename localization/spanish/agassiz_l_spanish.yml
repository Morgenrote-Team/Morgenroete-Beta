 agassiz.103.t: "El equipo geológico se va"
 agassiz.103.d: "Una vez finalizado el trabajo del equipo geológico, los investigadores auxiliares regresan a su país de origen. Las formaciones y cuevas que han descubierto ahora también están a disposición de nuestros científicos."
 agassiz.103.f: "'Puedo concluir este capítulo citando un dicho del profesor Agassiz: siempre que se descubre un hecho nuevo y sorprendente en la ciencia, la gente dice primero: \"no es verdad\", luego: \"es contrario a la religión\" y, por último, \"todo el mundo lo sabía antes\". -Charles Lyell"
 agassiz.103.g: "Esa solía ser una ayuda exterior útil."
 agassiz.104.t: "El equipo de Uranio se va"
 agassiz.104.d: "Una vez que el equipo de uranio termina su trabajo, los asistentes de investigación regresan a su país de origen. Los yacimientos de uranio que encuentran también pueden ser explotados por nuestras empresas."
