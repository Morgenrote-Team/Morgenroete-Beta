 agassiz.917.tt: "[GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetFullName] y todos los miembros de la expedición mueren en la oscuridad y la desesperación."
 agassiz.909.tt: "El Viaje al Centro de la Tierra ya no estará disponible."
 agassiz.915.tt: "Algunos de los miembros de nuestra expedición podrían morir."
 agassiz_lidenbrock_diary_modifier: "El diario de Otto Lidenbrock"
