l_spanish:
 agassiz_geology_tech: "Geología"
 agassiz_geology_tech_desc: "En 1815, el constructor de canales William Smith publicó su mapa de la geología de Inglaterra y Gales, que tenía en cuenta tanto el contenido fósil como la litología. Smith reconoció que ciertas secuencias de rocas también se caracterizan por una secuencia faunística muy específica e inconfundible. En 1827, Leopold von Buch acuñó el término fósil índice para los fósiles que permiten una datación relativa. A partir de entonces, aclarar la cuestión de la edad real de la Tierra fue una cuestión científica."
 notification_agassiz_yearly_minerals_notification_name: "Informe geológico anual"
 notification_agassiz_yearly_minerals_notification_desc: "Hemos encontrado y registrado [GetPlayer.MakeScope.Var('agassiz_generic_minerals_notification_var').GetValue|0+=] [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')] nuevo este año."
 agassiz_sounding_tech: "Sondeo ecográfico"
 agassiz_sounding_tech_desc: "La sonda se inventó por primera vez como respuesta a la guerra submarina. Más tarde, sin embargo, también se utilizaría en muchos ámbitos civiles: por ejemplo, para localizar bancos de peces y en investigaciones en aguas profundas."
 building_agassiz_volcano_observatory: "Observatorio de volcanes"
 agassiz_volcano_observatory_can_construct_volcano_tt: "El estado tiene un #ORANGE Volcán#!."
