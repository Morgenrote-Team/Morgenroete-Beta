 je_geologist_dies_tt: "Muere el doctor [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]"
 agassiz_stop_geologist_project_button: "Detener el proyecto Geólogo"
 agassiz_stop_geologist_project_button_desc: "Detenga su proyecto de geólogo actual. Tu progreso de geólogo se perderá."
 agassiz_stop_geologist_improving_project_tt: "Decidió detener el proyecto haciendo clic en el botón #italic Detener proyecto geólogo#!."
 agassiz_mid_atlantic_ridge_cost_modifier: "Costo de la expedición al Atlántico"
 je_agassiz_mid_atlantic_ridge: "Montañas submarinas"
 je_agassiz_mid_atlantic_ridge_reason: "El [concept_agassiz_geologist] Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] se encuentra actualmente a bordo de un moderno buque de investigación que utiliza una ecosonda para explorar el subsuelo del Atlántico. Esto debería proporcionar nuevos conocimientos sobre la historia de la Tierra."
 je_agassiz_mid_atlantic_ridge_goal: "Después de 12 meses, se espera que el Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] muestre resultados."
 agassiz.201.t: "La Cordillera del Atlántico Medio"
 agassiz.201.d: "El Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] ha visto algunos de los primeros datos. El resultado de la expedición es sorprendente: no sólo en el norte del Atlántico, sino en todo el océano Atlántico, la elevación submarina se puede ver como una banda continua que sólo se rompe a la altura del ecuador. El geólogo ha denominado a este fenómeno Dorsal Mesoatlántica. En los próximos meses y años se realizarán más evaluaciones de los datos."
 agassiz.201.f: "La Cordillera del Atlántico Medio es una cadena montañosa en el Océano Atlántico que se encuentra en su mayor parte por debajo del nivel del mar y se extiende por unos 20.000 km. Esto la convierte en la más larga de las dorsales en medio del océano, un sistema que se extiende por la Tierra y tiene más de 60.000 km de largo. El ascenso del fondo marino en el Atlántico medio fue descrito por primera vez por el oficial naval Matthew Fontaine Maury en 1853 y confirmado por la expedición Challenger en 1872. El motivo fueron las investigaciones preliminares sobre el tendido de los primeros cables transatlánticos en aguas profundas. Durante la expedición alemana a los meteoritos de 1925-1927, se creó un perfil detallado de la Cordillera del Atlántico Medio utilizando mediciones de ecosonda. El descubrimiento de la cordillera del Atlántico Medio proporcionó una pista temprana sobre los procesos geodinámicos de la tectónica de placas relacionados con la teoría de Wegener sobre la deriva continental."
 agassiz.201.g: "Esto mejorará la comprensión geofísica del geólogo."
 agassiz.201.h: "Esto mejorará la comprensión oceanográfica del geólogo."
 agassiz.201.i: "Esto mejorará la comprensión general del geólogo."
 agassiz.202.t: "Simposio Geológico-Paleontológico"
 agassiz.202.d: "La Academia de Ciencias ha invitado a personas a un evento organizado por el Prof. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] y el Prof. [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetFullName]. El simposio se considera un hito en la investigación de la historia de la Tierra. Ambos han resaltado particularmente las sorprendentes similitudes en la composición geológica y fósil de las costas de América del Sur y África Occidental."
 agassiz.202.f: "La estrecha relación entre geología y paleontología lo demuestran numerosas personalidades científicas que se destacaron en ambos campos. La interacción entre la capa terrestre y el fósil para la determinación cronológica hace que ambas ciencias sean inseparables. George Cuvier es considerado el padre de la paleontología, pero también el padrino de la geología. Incluso en las disputas científicas, por ejemplo en el debate Cuvier-Geoffroy de 1830, que se centró en la disputa entre gradualismo y catastrofismo, fueron principalmente los hallazgos geológicos y paleontológicos los que se destacaron como argumentos. Tanto la geología moderna como la paleontología moderna no habrían sido posibles sin sinergias."
 agassiz.202.g: "Un fructífero intercambio académico."
 agassiz.311.t: "Una piedra del espacio"
 agassiz.311.d: "En una de las zonas más remotas de nuestro país, el Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] ha descubierto una piedra extraordinaria en su búsqueda de nuevos minerales. Después de una primera investigación, queda claro: ¡el monolito que contiene hierro es un meteorito!"
 agassiz.311.f: "Las primeras colecciones de meteoritos se fundaron ya en el siglo XVIII, antes de que se supiera que los meteoritos eran de origen extraterrestre. La colección de meteoritos más antigua del mundo se encuentra en el Museo de Historia Natural de Viena, donde se colocó la primera piedra con el meteorito Hraschina (caída en 1751). Hoy alberga la colección de exposiciones más grande del mundo con alrededor de 1.100 objetos. Hasta el siglo XX sólo se habían descubierto unos pocos centenares de meteoritos. La razón por la que ahora hay más de 30.000 hallazgos de meteoritos en las colecciones del mundo comenzó con el descubrimiento de Harvey H. Nininger de que los meteoritos son mucho más comunes en la superficie de la Tierra de lo que se pensaba anteriormente. La estrategia de Nininger fue buscar meteoritos en las Grandes Llanuras de los Estados Unidos, donde la tierra estaba en gran parte cultivada y el suelo contenía pocas rocas."
 agassiz.311.g: "¿De dónde viene?"
 agassiz_seismology_tech: "Sismología"
 agassiz_seismology_tech_desc: "En respuesta a una serie de terremotos cerca de Comrie, Escocia, en 1839, se formó un comité en el Reino Unido para desarrollar mejores métodos de detección de terremotos. El resultado fue la fabricación de uno de los primeros sismómetros modernos por parte de James David Forbes. A partir de 1857, Robert Mallet sentó las bases de la sismología instrumental moderna y llevó a cabo experimentos sismológicos utilizando explosivos. También es responsable de acuñar el término \"sismología\"."
 agassiz_geologist_demotivated_modifier: "Geólogo desmotivado"
 agassiz_set_new_age_of_earth_effect_tt: "[GetPlayer.GetName] formula el último estudio sobre la edad de la Tierra. Se está recalculando la edad de la Tierra."
 agassiz.401.tt: "Todas las naciones que tienen un voto de [concept_agassiz_geologist] en el estudio."
 notification_agassiz_new_earth_age_notification_name: "Se reestima la edad de la Tierra"
 notification_agassiz_new_earth_age_notification_desc: "Un [concept_agassiz_geologist] logró convencer a muchos colegas de que la Tierra es mucho más antigua de lo que se pensaba.\n\n[SCOPE.GetRootScope.GetCountry.GetCustom('agassiz_age_of_earth_type')]"
 je_agassiz_geological_research: "Investigación geológica"
 je_agassiz_geological_research_reason: "[ROOT.GetCountry.GetCustom('je_agassiz_geological_research_active_type')]A [concept_agassiz_geologist] who is not busy will conduct Geological Research.\n\nDuring the research the following things can happen:\n- If your Geologist has the $agassiz_mineralogist$ [concept_character_trait] the yearly [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')] yield will be doubled.\n- Your Geologist can find [Concept('concept_dubois_formation','$concept_dubois_formations$')], [Concept('concept_lepsius_cave','$concept_lepsius_caves$')] and Uranium.\n- After 5 years of research you will receive @agassiz_mineral! #p 25,000#! [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')] and @agassiz_rare_mineral! #p 1#! [Concept('concept_agassiz_rare_mineral','$concept_agassiz_rare_minerals$')]. Additionally your Geologist can gain the $agassiz_mineralogist$ [concept_character_trait]"
 agassiz.401.t: "Un nuevo cálculo"
 agassiz.401.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] has summarized all of [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] previous experiences and knowledge throughout [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] life to provide a new estimate of the age of the Earth. The question remains whether the theory is also recognized by the scientific community."
 agassiz.401.f: "Desde principios del siglo XIX hasta mediados del XX, la determinación de la edad de la Tierra siguió siendo vaga y, en su mayor parte, objeto de repetidos debates y hostilidades. La cuestión de la edad de la Tierra se relacionaba a menudo con la de la evolución, porque ésta necesitaba un período de tiempo suficientemente largo para funcionar como teoría. Hasta el cambio de siglo, muchos científicos creían que la Tierra tenía sólo unos pocos millones de años -al final de su vida, Lord Kelvin supuso que sólo tenía 20 millones de años-, pero incluso Charles Darwin, que fue uno de los \"maximalistas\" que defendieron su tesis, creía en unos 300 millones de años. No fue hasta el descubrimiento de la radiactividad que se pudo determinar correctamente la edad de la Tierra y se conoció la verdadera extensión de la edad de la Tierra (y, por tanto, de todo el sistema solar)."
 agassiz.401.g: "Envíe el artículo a todos los geólogos reconocidos en todo el mundo."
 agassiz.402.t: "Un geólogo presenta un nuevo cálculo"
 agassiz.402.d: "[SCOPE.sCharacter('agassiz_geologist_scope').GetLastName] propuso un cálculo de la edad real de la Tierra. El científico considera que la medición anterior es incorrecta y estima que la edad de la Tierra es significativamente mayor. Como nuestro geólogo es uno de los representantes más destacados de este tema, también nos enviaron una copia de la tesis."
 agassiz.402.g: "Estos cálculos son convincentes."
 agassiz.402.h: "¿Quién se supone que debe creer esta tontería pseudogeológica?"
 agassiz.403.t_yes: "Estudio geológico aceptado"
 agassiz.403.d_yes: "Afortunadamente, la mayoría de la Sociedad Geológica Internacional calificó los nuevos cálculos de nuestro geólogo como un hito y reconoció su teoría como válida."
 agassiz.403.f_yes: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]'s estimate for determining the Earth's age was accepted by a majority. [GetGlobalVariable('agassiz_age_of_earth_yes_global_var').GetValue|+0] scientists #G accepted#! the study, [GetGlobalVariable('agassiz_age_of_earth_no_global_var').GetValue|+0] #R rejected#! it. This meant that the theory was officially recognized and the age of the Earth was significantly increased."
 agassiz.403.g: "A triumph for Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName], a triumph for geology!"
 agassiz.403.t_no: "Estudio geológico rechazado"
 agassiz.403.d_no: "La ignorante élite de geólogos internacionales ha rechazado el nuevo estudio de nuestro geólogo. Todavía tenemos que determinar si hubo fraude en las elecciones o si fue una maniobra hostil para socavar a nuestra orgullosa nación."
 agassiz.403.f_no: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]'s estimate for determining the Earth's age was rejected by the majority. [GetGlobalVariable('agassiz_age_of_earth_yes_global_var').GetValue|+0] scientists #G accepted#! the study, [GetGlobalVariable('agassiz_age_of_earth_no_global_var').GetValue|+0] #R rejected#! it. The previous assessment of the age of the Earth therefore remains the same."
 agassiz.403.h: "A defeat for Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName], a defeat for geology..."
 je_agassiz_advanced_oceanography: "Oceanografía avanzada"
 je_agassiz_advanced_oceanography_reason: "Mientras que los estudios oceanográficos anteriores tenían como objetivo principal aportar beneficios prácticos a los militares para explotar estratégicamente las condiciones actuales del Pacífico, los científicos ahora abogan por utilizar los hallazgos de la investigación marina para aprender más sobre nuestro planeta, simplemente por el bien del conocimiento."
 je_agassiz_advanced_oceanography_success: "¡Terminaremos nuestros estudios si hemos obtenido #G 50#! @rapanui_oceanographic_knowledge! #E Conocimiento Oceanográfico#!."
 je_agassiz_advanced_oceanography_goal: "Terminaremos nuestros estudios si hemos adquirido #G 50#! @rapanui_oceanographic_knowledge! #E Conocimientos Oceanográficos#!."
 agassiz.312.t: "Servicio Geológico"
 agassiz.312.d: "Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] created a geological profile of a large area of land and made the map available to the public."
 agassiz.312.f: "La estratigrafía moderna se desarrolló a lo largo del siglo XIX: geólogos de toda Europa y América del Norte examinaron, categorizaron y correlacionaron las capas de roca de sus países siguiendo el ejemplo de William Smith y publicaron mapas, tablas estratigráficas y tratados con los resultados de su trabajo."
 agassiz.312.g: "Utilice el conocimiento teóricamente."
 agassiz.312.h: "Utilice el conocimiento de forma práctica."
 agassiz.313.t: "Depósito mineral"
 agassiz.313.d: "Geological investigations in a previously undeveloped region have revealed a rich deposit of minerals. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] is not yet sure what the main aspect of his search should be."
 agassiz.313.f: "Un mineral es un elemento o compuesto químico que suele ser cristalino y que se forma mediante procesos geológicos. La mayoría de las aproximadamente 6.000 especies minerales conocidas en la actualidad y reconocidas como independientes son inorgánicas, pero algunas sustancias orgánicas como la melita y la evenkita o las formadoras de cálculos renales whewellita y weddellita también se reconocen como minerales porque en su formación también intervinieron procesos geológicos. Si se incluyen todas las variedades minerales conocidas y los nombres sinónimos, así como las especies minerales que aún no se reconocen, existen más de 7.000 nombres de minerales."
 agassiz.313.g: "Cantidad."
 agassiz.313.h: "Calidad."
 agassiz.314.t: "Un geólogo inspirador"
 agassiz.314.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] has now made a name for [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerselfHimself] in the world of geology. At [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] chair, people often asked for advice from [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHim], and letters from colleagues from all over the world were piling up in the mailbox."
 agassiz.314.f: "\"Sugiero que el mejor geólogo es aquel que ha visto la mayoría de las rocas\". -Herbert Harold Leer"
 agassiz.314.g: "This will boost [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] reputation."
 agassiz.314.h: "This will boost the reputation of [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] university."
 agassiz.315.t: "Perspectivas geológicas"
 agassiz.315.d: "The current research journey, which has taken [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHim] to many different geological locations in our country, has opened [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName]'s eyes. In a thesis paper that is currently being prepared, [ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe] summarizes some new findings on geological principles."
 agassiz.315.f: "«El mundo es la gran caja de rompecabezas del geólogo; éste se encuentra ante ella como el niño para quien las piezas separadas de su rompecabezas siguen siendo un misterio hasta que detecta su relación y ve dónde encajan, y entonces sus fragmentos crecen de inmediato hasta formar una imagen conectada bajo su mano.» -Louis Agassiz"
 agassiz.315.g: "Excelente."
 agassiz.11.t: "La dinámica de los terremotos"
 agassiz.11.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] has attracted international attention today because [ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe] has revolutionized previous knowledge of this aspect of geology with a book about earthquakes. Words [ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe] coined such as 'epicenter' and 'seismology' have already found their way into science."
 agassiz.11.f: "El 9 de febrero de 1846, Robert Mallet presentó su obra 'La dinámica de los terremotos' en la Real Academia Irlandesa, considerada una de las bases de la sismología moderna. Entre 1852 y 1858, con la ayuda de su hijo John William Mallet, preparó el Catálogo de terremotos de la Asociación Británica, que apareció en 1858 y en el que se enumeraban los terremotos conocidos y se describían sus efectos. Durante este tiempo también llevó a cabo experimentos de explosión para determinar el tiempo de propagación de las ondas sísmicas en roca suelta y sólida."
 pmg_agassiz_seismology: "Sismología"
 pm_agassiz_basic_seismology: "Sismología básica"
 pm_agassiz_advanced_seismology: "Sismología avanzada"
 pm_agassiz_advanced_volcanology: "Vulcanología avanzada"
 agassiz_congress_host_modifier: "Se celebró un congreso geológico"
 agassiz_laughed_congress_modifier: "Se rieron de nosotros en el Congreso Geológico"
 agassiz_respected_congress_modifier: "Respetado en el Congreso Geológico"
 agassiz_lauded_congress_modifier: "Elogiado en el Congreso Geológico"
 agassiz.316.f: "Si no hay características geológicas interesantes en su propio territorio, los geólogos pueden buscar formaciones o cuevas en la zona fronteriza o más allá."
 agassiz.317.t: "Geólogo extranjero"
 agassiz.317.d: "Un geólogo extranjero logró entrar en nuestra zona durante su investigación y tomó nota de los resultados. Nos envió sus resultados como muestra de agradecimiento."
 agassiz.317.g: "Entonces...?"
 agassiz.501.t: "¿Se mueven los continentes?"
 agassiz.501.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] has just published a book in which [ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe] puts forward a thesis that is already highly controversial. Accordingly, the continents in their current form are of more recent geological origin. Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] postulates that today's continents formed a unit [ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe] calls 'Pangea'. In order to convince the international geological community of this thesis, [ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe] invited them to a congress."
 agassiz.501.f: "La sugerencia más antigua de que la causa fue la deriva continental provino del cartógrafo flamenco Abraham Ortelius. En la edición de 1596 de su Atlas Theatrum Orbis Terrarum ya se puede ver claramente la similitud de las dos costas. Alexander von Humboldt describió en 1801 y 1845 la similitud de las costas opuestas de América del Sur y África y su vegetación y especuló que el Atlántico fue arrasado por una corriente catastrófica. En 1858, el geógrafo Antonio Snider-Pellegrini fue un paso más allá cuando publicó el primer mapa que mostraba el Viejo y el Nuevo Mundo sin un océano que los separara. Sin embargo, fue sobre todo Alfred Wegener quien, con su teoría de la deriva continental, propició un replanteamiento del fijismo (la tesis de que los continentes están firmemente arraigados en la tierra) al movilismo. Sin embargo, durante su vida, su modelo de explicación siguió siendo una opinión minoritaria en la ciencia, que no se consolidó hasta la segunda mitad del siglo XX."
 agassiz.501.g: "¡Invita a las principales naciones geológicas!"
 agassiz.502.t: "Una invitación geológica"
 agassiz.502.d: "[SCOPE.sCountry('agassiz_congress_host_country').GetName] ha invitado a un congreso geológico internacional. El anfitrión, un destacado geólogo, afirma que los continentes se están moviendo..."
 agassiz.502.g: "Esto promete ser entretenido."
 agassiz.503.t_laughed: "El ridículo de la Sociedad Geológica"
 agassiz.503.t_respected: "Una apariencia segura"
 agassiz.503.t_lauded: "Admiración y felicitaciones"
 agassiz.503.d_laughed: "Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]'s appearance was greeted with amusement. [ROOT.GetCountry.GetNameNoFlag] does not exactly have a reputation for having achieved anything outstanding in the field of Geology. There were clearly jokes behind closed doors."
 agassiz.503.d_respected: "Before the start of the Geological Congress, [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] was warmly greeted and the usual presents were exchanged. [ROOT.GetCountry.GetNameNoFlag] has a recognized reputation in the research world."
 agassiz.503.d_lauded: "The arrival of Professor [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] was greeted with great joy, being considered one of the most awaited guests. A crowd quickly formed around [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHim], as [ROOT.GetCountry.GetNameNoFlag] is considered a pioneer in the field of Geology."
 agassiz.503.f_laughed: "'¿Por qué el [ROOT.GetCountry.GetAdjectiveNoFlag] geólogo no consigue chicas?\n\n¡Porque hay demasiada fricción entre ellas!'"
 agassiz.503.f_respected: "Upon his arrival, [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] had a few pleasant conversations with colleagues about mostly boring rock formations."
 agassiz.503.f_lauded: "Prof. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] seemed almost overwhelmed by the onslaught. So many colleagues sought to talk to [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHim] and wanted to benefit from [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] expeditions and [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] experiences. Some even urged [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHim] to give a private lecture."
 agassiz.503.g: "¡Qué vergüenza!"
 agassiz.503.h: "Por fin entre gente con ideas afines."
 agassiz.503.i: "¡Somos una nación líder en geología!"
 agassiz.504.t: "¿Fijismo o movilismo?"
 agassiz.504.d: "[SCOPE.sCharacter('agassiz_alfred_wegener_scope').GetFullName] pronunció una conferencia muy aclamada ante la comunidad geológica internacional reunida, en la que [SCOPE.sCharacter('agassiz_alfred_wegener_scope').GetSheHe] abogó vehementemente por la reversión de la geología hacia el movilismo, es decir, la deriva continental. Pero los oponentes son numerosos y no quieren desviarse de la doctrina predominante del fijismo."
 agassiz.504.f: "Hasta los años 60 del siglo XX, la teoría geotectónica clave fue el fijismo. Se suponía que la corteza terrestre estaba firmemente conectada al subsuelo, de modo que los procesos tectónicos a gran escala eran locales. De ahí que el desarrollo de la Tierra se caracterizara predominantemente por movimientos tectónicos verticales de la corteza terrestre y muy poco por movimientos tectónicos horizontales. La mayoría de las teorías de la geología clásica se basaban en la idea del fijismo. A principios del siglo X se encontraron fósiles de la misma especie en Sudamérica y África. Bajo la premisa del fijismo se planteó la hipótesis del puente terrestre, según la cual en el pasado existían puentes terrestres que conectaban África con Sudamérica y que permitían a los animales migrar al otro continente. Las mediciones realizadas con la ecosonda del buque de investigación Meteor entre 1924 y 1927, durante las cuales se descubrió la dorsal mesoatlántica, una cadena montañosa submarina que se extiende de norte a sur, y no, como se esperaba, los restos de un puente terrestre que debería haber corrido de este a oeste, hicieron que la hipótesis del puente terrestre comenzara a tambalearse, pero no fue abandonada por completo hasta los años 60. Lo opuesto al fijismo es el movilismo, que considera que los movimientos horizontales de la corteza terrestre tienen una influencia decisiva. La teoría del movilismo se desarrolló a partir del descubrimiento de la deriva continental por parte de Alfred Wegener."
 agassiz.504.g: "Los continentes no han cambiado en millones de años."
 agassiz.504.h: "Todo apunta a la tectónica de placas."
 agassiz.505.t: "Los geólogos entre ellos"
 agassiz.505.d: "On the sidelines of the major geological congress, [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] has the opportunity to exchange ideas with colleagues. What should [ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe] focus on in [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] free time?"
 agassiz.505.f: "«Es un hecho extraño, característico del estado incompleto de nuestro conocimiento actual, que se extraigan conclusiones totalmente opuestas sobre las condiciones prehistóricas de nuestro planeta, dependiendo de si el problema se aborda desde el punto de vista biológico o geofísico.» -Alfred Wegener"
 agassiz.505.g: "Conocimiento geológico."
 agassiz.505.h: "Conocimiento Oceanográfico."
 agassiz.505.i: "Minerales raros."
 agassiz.505.j: "Nuevos talentos."
 agassiz.509.t_fix: "El fijismo triunfante"
 agassiz.509.d_fix: "A pesar de todos los esfuerzos del profesor [SCOPE.sCharacter('agassiz_alfred_wegener_scope').GetHerHis], el profesor [SCOPE.sCharacter('agassiz_alfred_wegener_scope').GetFullName] no logró convencer a la mayoría de sus colegas. La acusación es que el profesor [SCOPE.sCharacter('agassiz_alfred_wegener_scope').GetLastName] no puede aportar pruebas suficientes para sus tesis. El hecho es que los continentes son estables."
 agassiz.509.f_fix: "«El Newton de la teoría de la deriva aún no ha aparecido. Su ausencia no debe causar ansiedad; la teoría es aún joven y a menudo todavía se la trata con sospecha. A largo plazo, no se puede culpar a un teórico por dudar en dedicar tiempo y esfuerzo a explicar una ley sobre cuya validez no prevalece la unanimidad.» -Alfred Wegener"
 agassiz.509.g: "Eppur se mueve."
 agassiz.509.t_tectonics: "El movilizacionismo triunfante"
 agassiz.509.d_tectonics: "[SCOPE.sCharacter('agassiz_alfred_wegener_scope').GetFullName] logró convencer a la comunidad científica de la tesis [SCOPE.sCharacter('agassiz_alfred_wegener_scope').GetHerHis]. La deriva continental se considera ahora la teoría más probable para explicar una variedad de fenómenos geológicos hasta ahora poco claros."
 agassiz.509.f_tectonics: "'Los científicos todavía no parecen entender lo suficiente que todas las ciencias de la Tierra deben aportar pruebas para desvelar el estado de nuestro planeta en épocas anteriores, y que la verdad del asunto sólo puede alcanzarse combinando todas estas pruebas. ... Sólo combinando la información proporcionada por todas las ciencias de la Tierra podemos esperar determinar aquí la \"verdad\", es decir, encontrar la imagen que exponga todos los hechos conocidos en la mejor disposición y que, por lo tanto, tiene el mayor grado de probabilidad. Además, debemos estar siempre preparados para la posibilidad de que cada nuevo descubrimiento, sin importar la ciencia que lo proporcione, pueda modificar las conclusiones que saquemos. -Alfred Wegener"
 agassiz.509.h: "Espera... ¡eso es sorprendente!"
 agassiz_conference_geologist_double_vote_tt: "Gracias a nuestro experimentado geólogo, tenemos #G dos veces#! el poder de voto."
 agassiz_conference_geologist_triple_vote_tt: "Gracias a nuestro famoso geólogo, tenemos #G tres veces#! el poder de voto."
 agassiz.601.t: "Ubicación del volcán"
 agassiz.601.d: "A group of scientists and assistants has come together for the upcoming volcano expedition. But the question now arises: which volcano should the team explore under the leadership of [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName]? There are several states we can choose from."
 agassiz.601.f: "«Debo pedirle que no utilice la palabra fuego cuando se refiera a la teoría del Dr. Hutton: calor es una expresión más correcta. El fuego, en el sentido habitual de esa palabra, supone la presencia de combustible en el acto de quemar; pero no tenemos ninguna razón para creer que exista un fuego de esta descripción en el centro de la tierra». -Maria Hack"
 agassiz.601.g: "[SCOPE.sState('agassiz_volcano_1').GetName]"
 agassiz.601.h: "[SCOPE.sState('agassiz_volcano_2').GetName]"
 agassiz.601.i: "[SCOPE.sState('agassiz_volcano_3').GetName]"
 agassiz.602.t: "Al pie del volcán"
 agassiz.602.d: "La expedición vulcanológica ha llegado a las faldas del volcán [SCOPE.sState('agassiz_volcano_state').GetName] y ahora comienza la investigación científica propiamente dicha."
 agassiz.602.f: "'La existencia de calor subterráneo está demostrada por fenómenos como las fuentes termales, los volcanes y los terremotos. Estas observaciones no dejan lugar a dudas sobre la existencia de calor en las entrañas de la tierra; pero ¿a qué profundidad, en qué medida y con qué intensidad actúa?' -John Playfair"
 agassiz.602.g: "No es tan peligroso como parece ¿verdad?"
 agassiz.603.t: "Expedición al volcán con éxito"
 agassiz.603.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] accomplished the daring maneuver of not only leading [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] assistants to the top of the volcano, but also carried out numerous experiments and collected specimens. The volcano expedition was a valuable contribution to learning more about the inner workings of the Earth."
 agassiz.603.f: "«Toda la naturaleza salvaje cuenta la misma historia: los temblores y estallidos de los terremotos, los volcanes, los géiseres, las olas y las inundaciones rugientes y atronadoras, el silencioso torrente de savia en las plantas, las tormentas de todo tipo, todas y cada una de ellas son los ordenados y bellos latidos amorosos del corazón de la naturaleza.» -John Muir"
 agassiz.603.g: "Y todo sin quemaduras de tercer grado."
 agassiz.604.t: "Expedición al volcán termina en catástrofe"
 agassiz.604.d: "Terrible news! Despite several warning signs - toxic fumes, small earthquakes, dark smoke - [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] apparently stubbornly persisted in continuing the expedition. The eruption took the participants completely by surprise; the area is a disaster zone. Lava is still flooding the mountain and the surrounding villages. It was only with great difficulty that some survivors were able to get to safety with research results and samples. However, Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] is missing. We have to expect the worst."
 agassiz.604.f: "Los periódicos ya informan de varios heridos y muertos. Hubo que evacuar grandes zonas de la zona. Los edificios resultaron dañados y las calles quedaron inundadas de lava. La posibilidad de que alguien que estuviera cerca del cráter del volcán sobreviviera a esta fuerza de la naturaleza es prácticamente nula."
 agassiz.604.g: "¡Horrible!"
 agassiz.605.t: "Expedición al Volcán termina sin resultados"
 agassiz.605.d: "La expedición al volcán agotó todos los fondos de investigación y regresó. Lamentablemente, solo produjo unos pocos resultados útiles. ¿Quizás el líder fue demasiado cauteloso?"
 agassiz.605.f: "«No puedes explorar un volcán si no bailas un poco sobre él.»"
 agassiz.605.g: "Decepcionante"
 agassiz.611.t: "Perspectivas químicas"
 agassiz.611.d: "During the expedition in [SCOPE.sState('agassiz_volcano_state').GetName], [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] was able to study some interesting chemical processes at the volcano crater in more detail. Some mineral compounds are still completely unknown."
 agassiz.611.f: "La mayoría de los elementos químicos se encuentran en compuestos que presentan una gran variedad, especialmente en los minerales. En los inicios de la química moderna, los geólogos siempre buscaban nuevas muestras de las que los químicos pudieran aislar elementos hasta entonces desconocidos."
 agassiz.611.g: "This might help Dr. [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]."
 agassiz.612.t: "Trampa de lava"
 agassiz.612.d: "La expedición al volcán se ha atrevido demasiado en su avance hacia el cráter, que se encuentra rodeado de lava por casi todos los lados. Abandonar el avance anterior significaría una gran pérdida de tiempo."
 agassiz.612.f: "«La lava tiene ese aspecto turbio que los poetas atribuyen a los ríos de las regiones infernales; avanza lentamente como un río de arena, negruzco de día y rojo de noche. A medida que se acerca, se oye una especie de crujido que provoca el mayor temor, ya que es indistinto. Su resplandor es tan intenso que, por primera vez, la tierra ilumina el cielo y le da la apariencia de un relámpago continuo; el cielo, a su vez, refleja este brillo sobre el agua y, de este modo, la naturaleza parece estar en llamas ante esta triple imagen del fuego.» -Germaine de Staël"
 agassiz.612.g: "Encuentra otro camino"
 agassiz.612.h: "Intenta cruzarlo."
 agassiz.613.t: "Un líder endurecido"
 agassiz.613.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] is an experienced volcanologist who knows exactly how to deal with the mountain; his knowledge ensures that the expedition progresses safely and well."
 agassiz.613.f: "\"El acontecimiento que tanto he deseado presenciar ha ocurrido y el Vesubio lleva varios días en estado de erupción. Ya he hecho muchos experimentos con la lava en el momento en que sale del volcán y los habría completado de no ser por una grave indisposición debida a que he permanecido demasiado tiempo en esa magnífica pero peligrosa situación a cinco o seis pies de una corriente de materia al rojo vivo fluida como el agua que cae como una catarata de fuego\". -Humphry Davy"
 agassiz.613.g: "Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] Geologist is a superb leader."
 agassiz.614.t: "Gases tóxicos"
 agassiz.614.d: "The expedition team, led by Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName], discovered abundant emissions of volcanic gases at one point on the volcano. The geologist would like to take some samples, even if it is not entirely safe."
 agassiz.614.f: "Los gases volcánicos son gases que emergen de la superficie terrestre durante la actividad volcánica. La emergencia puede ocurrir en áreas muy definidas o de forma difusa sobre una gran área desde las laderas de un volcán. Los gases volcánicos fueron recolectados y analizados ya en 1790 por Scipione Breislak en Italia. La composición de los gases volcánicos depende del movimiento del magma dentro del volcán. Por lo tanto, los cambios repentinos en la composición de los gases a menudo predicen un cambio en la actividad volcánica."
 agassiz.614.g: "Tenemos que estudiar estos gases."
 agassiz.614.h: "¡Eso es una locura!"
 agassiz.615.t: "Eyecta volcánica"
 agassiz.615.d: "Un repentino estruendo asustó por un momento a los participantes de la expedición al volcán. Cuando el equipo pensó que lo peor ya había pasado, el volcán de repente arrojó rocas incandescentes que cayeron sobre los participantes como una lluvia de meteoritos. Dos asistentes resultaron heridos y una mula de carga murió."
 agassiz.615.f: "'Oímos por encima de nosotros y alrededor de la isla un sonido extraño, como un poderoso fuego crepitante o el disparo de artillería pesada a intervalos de uno o dos segundos. A las cinco, el ruido rugiente continuó, la oscuridad se extendió por el cielo y una granizada de piedra pómez cayó sobre nosotros, o muchos de los cuales eran de tamaño considerable y bastante calientes.' -Capitán Watson"
 agassiz.615.g: "Un desafortunado giro de los acontecimientos."
 agassiz.616.t: "Muestra de lava"
 agassiz.616.d: "Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] briefly asked the expedition to stop. Nearby seems to be a good place to take some lava samples. It is a scientifically worthwhile and risky procedure."
 agassiz.616.f: "«La lava estaba atrapada en los profundos bancos de un amplio lecho y fluía hacia abajo, no como un fluido, sino como una montaña de coque, o a veces como carbón altamente gaseoso. Se partía, crujía, chispeaba, humeaba y ardía y seguía avanzando en un vasto y compacto cuerpo. Los pedazos se desprendían y rodaban hacia abajo, dejando tras de sí un resplandor tan feroz que podría haberme imaginado en la boca de un horno de hierro; y cuando cada masa caía con el ruido del trueno, los árboles se incendiaban y la multitud lanzaba gritos de admiración y pesar.» -Luigi Palmieri"
 agassiz.616.g: "Estamos aquí para experimentos como éste."
 agassiz.617.t: "Muestra de lava: ¡Éxito!"
 agassiz.617.d: "Nuestro geólogo logró tomar una muestra de lava en una arriesgada tarea. El resultado es de gran valor científico."
 agassiz.617.f: ""
 agassiz.617.g: "¡Ciencia candente!"
 agassiz.618.t: "Muestra de lava: ¡Fallo!"
 agassiz.618.d: "To the dismay of the other expedition members, collecting the sample failed. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] suffered severe burns and put the team in danger!"
 agassiz.618.f: ""
 agassiz.618.g: "Una ciencia que te quemará las manos..."
 agassiz.619.t: "Cristales"
 agassiz.619.d: "The unique geological processes in the volcanic area have produced a whole range of rare, crystalline minerals. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] is eager to add the stones to [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] collection..."
 agassiz.619.f: "La mayoría de las rocas volcánicas comparten una serie de minerales comunes. La diferenciación de rocas volcánicas tiende a aumentar el contenido de sílice (SiO2) principalmente por cristalización fraccionada. Así, las rocas volcánicas más evolucionadas tienden a ser más ricas en minerales con mayor cantidad de sílice, como filo y tectosilicatos, incluidos los feldespatos, los polimorfos de cuarzo y la moscovita. Si bien todavía están dominadas por silicatos, las rocas volcánicas más primitivas tienen conjuntos minerales con menos sílice, como el olivino y los piroxenos. La serie de reacciones de Bowen predice correctamente el orden de formación de los minerales más comunes en las rocas volcánicas. Ocasionalmente, un magma puede recoger cristales que cristalizaron de otro magma; estos cristales se llaman xenocristales. Los diamantes que se encuentran en las kimberlitas son xenocristales raros pero bien conocidos; Las kimberlitas no crean los diamantes, sino que los recogen y los transportan a la superficie de la Tierra."
 agassiz.619.g: "Una muestra es suficiente."
 agassiz.619.h: "¡Toma tantas muestras como puedas!"
 agassiz.619.i: "Unas cuantas piedras no valen la vida de un investigador."
 agassiz.620.t: "Río de fuego"
 agassiz.620.d: "A river of lava blocks the team's path. While some participants consider this obstacle a dangerous challenge that could threaten the entire volcano expedition, [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] sees this situation primarily as a scientific opportunity to test out [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] unused instruments..."
 agassiz.620.f: "\"En la mayoría de los casos se puede ver claramente que la luz emana de cuerpos incandescentes, pero no de cuerpos en llamas. Es la luz de la lava incandescente la que forma la gran columna de llamas que se eleva desde el Vesubio\". -John Philipps"
 agassiz.620.g: "Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] should study it."
 agassiz.620.h: "¡Esto es demasiado peligroso!"
 agassiz.621.t: "Teorías sobre el vulcanismo"
 agassiz.621.d: "During [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] stay at the volcano, [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] would like to finally verify some of [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] previous volcanism theories by collecting evidence and exploring the surrounding area. To do this, [ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe] needs a lot of time in what [ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe] calls an 'extremely fascinating and inspiring area', while [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] colleagues watch with gnashing teeth as more and more dark smoke rises in the background..."
 agassiz.621.f: "\"En el clímax de la erupción, una columna de ceniza se elevó hasta la forma de un inmenso pino hasta que finalmente comenzó a inclinarse hacia abajo, cuando, debido a la cantidad de materia densa que componía la columna, cayó al suelo. Torrentes de lava llameante de una magnitud terriblemente portentosa se derramaron montaña abajo\". -Mariana Starke"
 agassiz.621.g: "Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] should take time to study the phenomenon thoroughly."
 agassiz.621.h: "¡No pierdas el tiempo!"
 agassiz.622.t: "Terremoto"
 agassiz.622.d: "El desprendimiento de escombros y un alud de lodo acompañaron un temblor de tierra a primera hora de la mañana, cuando la expedición se encontraba muy cerca del cráter. El pequeño terremoto es una clara indicación de que el volcán está más activo de lo que los participantes creían posible."
 agassiz.622.f: "En otro lugar, este erudito geógrafo, al aludir a la tradición de que Sicilia había sido separada de Italia por una convulsión, observa que en la actualidad la tierra cercana al mar en esas partes rara vez era sacudida por terremotos, ya que ahora había orificios abiertos por donde escapaban el fuego, las materias inflamadas y las aguas; pero anteriormente, cuando los volcanes del Etna, las islas de Lípari, Ischia y otros estaban cerrados, el fuego y el viento aprisionados podrían haber producido movimientos mucho más vehementes. Por lo tanto, la doctrina de que los volcanes son válvulas de seguridad y de que las convulsiones subterráneas son probablemente más violentas cuando la energía volcánica se desplaza por primera vez a un nuevo lugar, no es moderna. -Charles Lyell"
 agassiz.622.g: "¿Fue esta expedición una buena idea...?"
 agassiz.623.t: "Minerales por todas partes"
 agassiz.623.d: "The expedition led by [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] on the volcano in [SCOPE.sState('agassiz_volcano_state').GetName] encountered a rich mineral deposit."
 agassiz.623.f: "Los minerales son el mejor amigo de un geólogo."
 agassiz.623.g: "¡Minerales!"
 agassiz.623.h: "No."
 agassiz.624.t: "Espécimen exótico"
 agassiz.624.d: "Puede parecer sorprendente, pero la expedición al volcán [SCOPE.sState('agassiz_volcano_state').GetName] encontró en realidad ejemplares raros de una fauna única que vive muy cerca del volcán. Algunos ejemplares serían sin duda de gran interés para los zoólogos locales."
 agassiz.624.f: "—¡Humphrey! Por favor, recoge algunos huevos de periquito enano volcánico. El desayuno fue escaso y extraño mi huevo frito del domingo."
 agassiz.624.g: "¡Muestra!"
 agassiz.625.t: "Fósiles desconocidos"
 agassiz.625.d: "Some rare fossils that [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] discovered on the volcano expedition in [SCOPE.sState('agassiz_volcano_state').GetName] could answer important paleontological and geological questions."
 agassiz.625.f: "«Si bordeamos la fértil región situada en la base del Etna por sus lados sur y este, contemplamos estratos marinos de arena arcillosa y toba volcánica que emergen de debajo de las lavas modernas. Las conchas fósiles marinas que se encuentran en estos estratos son todas, o casi todas, idénticas a las especies que ahora habitan el Mediterráneo; y como aparecen a una altura de 600 a 800 pies sobre el mar cerca de Catania, prueban claramente que ha habido en esta región, como en otras partes de Sicilia más al sur, un movimiento ascendente del antiguo lecho del mar. Es justo, por tanto, inferir que toda la montaña, con excepción de aquellas partes que son de origen muy moderno, ha participado en este levantamiento.' -Charles Lyell"
 agassiz.625.g: "¡Fósiles!"
 agassiz.626.t: "Datos geomagnéticos"
 agassiz.626.d: "The volcano expedition in [SCOPE.sState('agassiz_volcano_state').GetName] received a telegram from the capital this morning. The Geomagnetic Observatory asks to collect some data on the volcano crater. Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] has complied with this wish."
 agassiz.626.f: "«Si estos datos son tan importantes para el Instituto Geomagnético, ¿por qué no viene usted mismo a buscarlos?»"
 agassiz.626.g: "Perfecto"
 agassiz.627.t: "El elemento solar en la Tierra"
 agassiz.627.d: "When analyzing some previously neglected rocks, [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] was able to discover amazing things. Using on-site spectral analysis, [ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe] was able to prove that the volcanic rock actually contains the element helium, which was previously thought to only occur in space."
 agassiz.627.f: "Luigi Palmieri fue un físico, meteorólogo, sismólogo y vulcanólogo italiano. En 1845 sustituyó a Pasquale Galluppi en la docencia de lógica y metafísica en la Universidad de Nápoles. Tras la muerte de Gallupi en 1847, se le confió la cátedra que ocupó. En 1860 abandonó la cátedra y se hizo cargo de la cátedra de geofísica y meteorología que había iniciado. A la cátedra se unían el observatorio meteorológico y el observatorio del Vesubio, fundado en 1842, cuya gestión también asumió Palmieri. Dirigió la cátedra y los dos observatorios hasta su muerte. Palmieri se hizo conocido sobre todo por mejorar los aparatos de medición, como un sismógrafo electromagnético y aparatos para medir las tensiones eléctricas en la atmósfera. En 1882 consiguió detectar por primera vez el elemento helio en la Tierra mediante el análisis espectral de la lava del Vesubio."
 agassiz.627.g: "Esto abre... posibilidades interesantes."
 agassiz.628.t: "El equipo pide un descanso"
 agassiz.628.d: "Después de más de un año de expedición al volcán, los miembros del equipo piden cada vez más descansos. Muchos están al borde del agotamiento. Las primeras voces son fuertes para volver a casa."
 agassiz.628.f: "¿Tienes miedo? Con todo respeto, ¡sismos como estos son la razón por la que escalamos este volcán! ¿Eres un científico o un desertor?"
 agassiz.628.g: "Dales todo el descanso que necesiten."
 agassiz.628.h: "Un breve descanso, nada más."
 agassiz.628.i: "¡Se supone que estos asistentes inútiles deberían trabajar, no estar inactivos!"
 agassiz.629.t: "Infierno"
 agassiz.629.d: "La situación en el volcán [SCOPE.sState('agassiz_volcano_state').GetName] ha empeorado considerablemente. De repente, la montaña arroja humo negro y los flujos de lava parecen aumentar. La expedición se encuentra ahora en un dilema. ¿Deben los miembros de la expedición actuar con cautela y arriesgarse a quedar atrapados por la lava, o deben reaccionar rápidamente pero correr el riesgo de un peligro desconocido?"
 agassiz.629.f: "'El soplo de fuego barrió la ciudad y el mar con toda la fuerza que podría haberle dado un cañón. Nos dispararon brasas en la cara con efecto punzante. El aire se llenó de llamas. Involuntariamente levantamos las manos para protegernos la cara. Noté el mismo gesto cuando vi los cuerpos de las víctimas en la orilla.' -Conde de Fitz-James"
 agassiz.629.g: "Tenga cuidado."
 agassiz.629.h: "Tomar el riesgo."
 agassiz.630.t: "infierno en la tierra"
 agassiz.630.d: "It seems like all hell has broken out on the volcano in [SCOPE.sState('agassiz_volcano_state').GetName]. Lava fountains shoot up, blazing forces fight each other in streams of fire. A threatening event for the majority of the expedition participants. Only Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] cannot escape a rapturous fascination."
 agassiz.630.f: "'Por la noche, el efecto del fuego se hacía más hermoso. Estábamos rodeados de arroyos y cataratas de fuego rojo y radiante; y en medio, de la columna de humo bituminoso que se elevaba hacia el aire, caían las enormes masas de roca, blancas por la luz de su intenso calor, dejando tras de sí esplendorosas estelas de vapor.' -George Gordon Byron"
 agassiz.630.g: "¡Este es un espectáculo fascinante y deberíamos tomarle fotos!"
 agassiz.630.h: "Alarmante,"
 agassiz.630.i: "¡Retirar!"
 agassiz.631.t: "Volcán bastante activo"
 agassiz.631.d: "Apparently the volcano that Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] is researching is much more active than expected. An outbreak is probably imminent. This makes selling the expedition more dangerous. However, with higher risk, the scientific opportunities also increase..."
 agassiz.631.f: "“La gente nunca cree en los volcanes hasta que la lava los alcanza”. -George Santayana"
 agassiz.631.g: "¡Más conocimiento!"
 agassiz.631.h: "¡Más experiencia!"
 agassiz.631.i: "¡Más minerales!"
 agassiz.632.t: "Informe de periódico"
 agassiz.632.d: "El periódico #YELLOW [SCOPE.sState('manzoni_publisher_state').GetNameNoFormatting] Chronicle#!,, uno de los más importantes de la región, mantiene informados a sus lectores sobre la expedición al volcán. De este modo, un campo científico especializado ha despertado el interés de un sector más amplio de la población. Los niños y los jóvenes, en particular, se sienten fascinados por las historias de aventuras."
 agassiz.632.f: "'Read in the latest issue: The daring crater climb by Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastNameNoFormatting]! Brave scientists face against lava, toxic fumes and hellish heat. Man crosses another boundary at the edge of what the ancients believed was the entrance to the underworld. Our reporters continue to accompany the journey with illustrations. Thursday is Chronicle day!'"
 agassiz.632.g: "Esto inspirará a una nueva generación de científicos."
 agassiz.633.t: "Un lugar de descanso seguro"
 agassiz.633.d: "Los expedicionarios encontraron un lugar seguro para retirarse entre vapores de azufre, humo negro y coladas de lava."
 agassiz.633.f: "'My dear colleague Professor Schabernack!\n\nI thank you at this point for your illuminating insights into the dynamic development of water in a volcanic vacuum, but I will formulate my objections in more detail at a later date. Rather, my point is that in my correspondence with Dr. Dr. Sauerspeck I was told that you had spread the disgraceful rumor at the university that we were having fun on this volcano. I want you to stop making these assumptions. The [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastNameNoFormatting] Hot Springs I recently discovered have a maximum temperature of only 32°C, not 35°C as you recently claimed. So they are de facto frosty cold. Please correct these infamous misrepresentations!'"
 agassiz.633.g: "¡Relajación!"
 agassiz_volcano_tourist_modifier: "Turismo de volcanes"
 agassiz_small_volcano_eruption_modifier: "Pequeña erupción volcánica"
 agassiz_medium_volcano_eruption_modifier: "Erupción volcánica"
 agassiz_big_volcano_eruption_modifier: "Mega erupción volcánica"
 agassiz_medium_earthquake_modifier: "Terremoto"
 agassiz_big_earthquake_modifier: "Megaterremoto"
 agassiz.711.t: "Espectáculo del volcán"
 agassiz.711.d: "Los habitantes de [SCOPE.sState('agassiz_volcano_state').GetName] están presenciando actualmente un espectáculo impresionante: las fuentes de lava del volcán son un espectáculo fascinante, especialmente por la noche. Entre los espectadores se encuentran turistas y científicos."
 agassiz.711.f: "\"El más sublime de los volcanes. La llama del Etna palidece ante la tuya y la inextinguible llama de Hecla; el Vesubio muestra su resplandor, una vista habitual para los turistas boquiabiertos, desde su trillada altura\". - Lord Byron"
 agassiz.711.g: "¡Maravilloso!"
 agassiz.712.t: "Pequeña erupción volcánica"
 agassiz.712.d: "El volcán de [SCOPE.sState('agassiz_volcano_state').GetName] entró en erupción. Algunas aldeas más pequeñas quedaron destruidas y los campos se inundaron con lava, pero el desastre fue limitado."
 agassiz.712.f: "“¡Lo que vi entonces! Miles de lenguas de fuego iluminaron el entorno. En las copas de los árboles vi llamas. Oí un crujido y vi una cortina de fuego justo a mi lado. No se veía el mar. Todo estaba cubierto de ceniza. No podía ver mi mano delante de mí. Lo último que vi fue la ceniza saliendo a través de las grietas de las tablas del suelo, como una fuente. Sentí una fuerte presión que me arrojó al suelo. Entonces me pareció que me estaban chupando el aire y no podía respirar”. -Johanna Beyerinck"
 agassiz.712.f_basic: "\n\n#YELLOW Gracias a nuestros científicos del Observatorio de Volcanes, la catástrofe no nos sorprendió del todo, por lo que pudimos tomar precauciones y #G limitar un poco los estragos#!.#!"
 agassiz.712.f_advanced: "\n\n#YELLOW Gracias a nuestros excelentes científicos del Observatorio de Volcanes, pudimos iniciar rápidamente medidas de evacuación y tomar medidas de protección. Pudimos #G limitar significativamente la devastación#!."
 agassiz.712.g: "Sólo un poco de lava."
 agassiz.712.h: "¿Alguna noticia del observatorio?"
 agassiz.712.i: "This might be interesting for Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] and his students"
 agassiz.713.t: "Erupción volcánica"
 agassiz.713.d: "Una violenta erupción sacudió el estado de [SCOPE.sState('agassiz_volcano_state').GetName]. Fragmentos de tefra y ceniza volcánica destruyeron edificios y cultivos, y se cobraron la vida de algunos de nuestros habitantes."
 agassiz.713.f: "'Oímos por encima de nosotros y alrededor de la isla un sonido extraño, como un poderoso fuego crepitante, o el disparo de artillería pesada a intervalos de uno o dos segundos. A las cinco, el ruido rugiente continuó, la oscuridad se extendió por el cielo y una granizada de piedra pómez cayó sobre nosotros, o muchos de los cuales eran de un tamaño considerable y bastante calientes.\n\nAquella noche fue una noche de oscuridad, debido a la continua caída de cenizas, interrumpida por incesantes destellos de relámpagos, tanto en el cielo como alrededor de la isla.' -Capitán Watson"
 agassiz.713.g: "Esta pobre gente."
 agassiz.713.j: "¡Envíen toda la ayuda posible para apoyar a las víctimas!"
 agassiz.714.t: "Mega erupción del volcán"
 agassiz.714.d: "Una erupción de una magnitud sin precedentes destruyó por completo la vida de muchas personas en el estado de [SCOPE.sState('agassiz_volcano_state').GetName]. La explosión se escuchó a cientos de kilómetros de distancia y todo lo que tenía la mala suerte de rodear la montaña quedó devastado de inmediato."
 agassiz.714.f: "'Se oían los gritos de las mujeres, los llantos de los niños y los gritos de los hombres; algunos llamaban a sus padres, otros a sus hijos o a sus esposas, intentando reconocerlos por sus voces. La gente se lamentaba de su propio destino o del de sus familiares, y había quienes rezaban por la muerte en su terror a morir. Muchos imploraban la ayuda de los dioses, pero aún más imaginaban que ya no quedaban dioses y que el universo estaba sumido en la oscuridad eterna para siempre.' -Plinio el Joven"
 agassiz.714.g: "¡Una tragedia!"
 agassiz.715.t: "Humo y estruendo"
 agassiz.715.d: "El volcán en [SCOPE.sState('agassiz_volcano_state').GetName] retumba. Sale humo por encima del cráter. Eso es todo. Los habitantes están aliviados, los turistas y los científicos están decepcionados."
 agassiz.715.f: "\"Demasiado para investigar, demasiado poco para disfrutar. ¡Qué volcán tan miserable y melancólico!\""
 agassiz.715.g: "¿Se despierta o permanece dormido?"
 agassiz.721.t: "Ondas sísmicas"
 agassiz.721.d: "Un pequeño movimiento sísmico hizo que [SCOPE.sState('agassiz_earthquake_state').GetName] se levantara de su cama esta mañana. El pequeño terremoto causó sólo daños menores, pero despertó el interés de los sismólogos."
 agassiz.721.f: "'Entrevistador: Si el edificio en el que usted se encuentra ahora empezara a temblar y usted supiera que se está produciendo un terremoto, ¿qué haría?'\nCharles Richter: 'Caminaría, no correría, hasta el sismógrafo más cercano'."
 agassiz.721.g: "Interesante."
 agassiz.722.t: "El terremoto del [SCOPE.sState('agassiz_earthquake_state').GetName]"
 agassiz.722.d: "Un terremoto ha golpeado el estado de [SCOPE.sState('agassiz_earthquake_state').GetName], destruyendo edificios, hiriendo a personas e incluso cobrándose algunas vidas."
 agassiz.722.f: "\"Hubo un estruendo profundo, profundo y terrible, y luego pude verlo venir por Washington Street. Toda la calle se ondulaba. Era como si las olas del océano vinieran hacia mí, ondulando a medida que avanzaban\". -Jesse Cook"
 agassiz.722.f_basic: "\n\n#YELLOW Gracias a nuestros sismólogos capacitados, ya se sabía que [SCOPE.sState('agassiz_earthquake_state').GetName] era una región propensa a terremotos. Gracias a las medidas preventivas, por ejemplo en la construcción, los daños se minimizaron fácilmente.#!"
 agassiz.722.g: "¡Una tragedia!"
 agassiz.722.h: "¿Cómo evalúa el observatorio la situación?"
 agassiz.722.i: "Un campo perfecto para la investigación geológica."
 agassiz.722.j: "¡Envíen toda la ayuda posible para apoyar a las víctimas!"
 agassiz.723.t: "El gran terremoto del [SCOPE.sState('agassiz_earthquake_state').GetName]"
 agassiz.723.d: "El estado de [SCOPE.sState('agassiz_earthquake_state').GetName] ha quedado en ruinas a causa de un terremoto de una magnitud sin precedentes. Se han destruido innumerables edificios y es imposible calcular la cantidad de vidas perdidas."
 agassiz.723.f: "\"El terremoto derribó en San Francisco paredes y chimeneas que valían cientos de miles de dólares, pero el incendio que siguió quemó propiedades que valían cientos de millones de dólares. No se puede calcular con precisión el daño real causado. Nunca en la historia una ciudad imperial moderna ha sido destruida tan completamente. San Francisco ha desaparecido. No queda de ella nada más que recuerdos y una franja de viviendas en las afueras. Su sección industrial ha desaparecido. Su sección comercial ha desaparecido. Su sección social y residencial ha desaparecido. Las fábricas y los almacenes, las grandes tiendas y los edificios de los periódicos, los hoteles y los palacios de los nababs, todo ha desaparecido. Sólo queda la franja de viviendas en las afueras de lo que una vez fue San Francisco\". -Jack London"
