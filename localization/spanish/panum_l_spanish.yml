 panum_character_treatment_fatal_fallback_loc: "\ \"¿Quién hubiera pensado que cortar ese vaso sanguíneo mataría al paciente?\""
 panum_character_treatment_fatal_tripple_death_loc: "El Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] planificó una cirugía rápida para tratar el paciente [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] pudo realizar la cirugía en poco más de 2 minutos, pero amputó los dedos de un asistente, que luego muere de una infección. Lamentablemente, el paciente también murió de una infección más tarde. Además, un espectador cuyas colas de abrigo también se cortaron accidentalmente colapsadas porque le dieron a sus órganos vitales lesionados, luego se descubrió que murió por shock."
 panum_character_treatment_fatal_unwashed_hands_loc: "La cirugía fue perfecta. El paciente estaba vivo, todos los problemas se resolvieron y todos lo impusieron sería una recuperación rápida. Unos días después, sin embargo, se descubrió una infección que se propagó como un incendio forestal. Solo unas horas después murió el paciente. El Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] estaba muy confundido sobre cómo pudo haber sucedido esto, ya que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] cambió el cuchillo después de la cirugía anterior solo unos minutos antes."
 panum_character_treatment_fatal_forgotten_snack_loc: "Después de la muerte del paciente se realizó una autopsia. Dentro del paciente. Para sorpresa de todos, se encontró un sándwich a medias. Nadie sabía cómo llegó allí hasta que un asistente recordó que el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] comió un sándwich durante la cirugía."
 panum_character_treatment_fatal_blood_loss_loc: "Al principio, la cirugía salió bien. Parecía que el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] podía tratar al paciente con éxito. Sin embargo, el paciente nunca se recuperó. Parece que había demasiada sangre perdida que el paciente muy semana y resultó en la muerte después de 3 días más."
 panum_character_treatment_fatal_morphine_overdose_loc: "La cirugía pareció ir bien, gracias al uso de la morfina, el paciente no sintió ningún dolor durante el procedimiento. Lamentablemente, el paciente ya no sentía ningún dolor en absoluto, ya que la cantidad de morfina era demasiado y el paciente murió."
 panum_character_treatment_fatal_drunken_doctor_loc: "Todos estaban un poco confundidos cuando el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] comenzó a beber el alcohol médico durante la cirugía. Tampoco ayudó que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] comenzó a cortar en los lugares equivocados, gritar a los asistentes y finalmente golpear una arteria importante. Lamentablemente, el paciente no pudo ser salvado incluso después de que se llamó a otro médico para ayudar."
 panum_character_treatment_fatal_forgotten_instruments_loc: "Después de una cirugía exitosa, el paciente del Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] pareció mejorar. Pero solo un día después, el paciente murió. Una autopsia reveló un bisturí que de alguna manera fue olvidado dentro del paciente. A medida que el paciente se movió nuevamente, el bisturí comenzó a cortar el tejido y los vasos sanguíneos que causaron hemorragias internas."
 panum_character_treatment_fatal_deadly_anaesthesia_loc: "Una cirugía muy exitosa tuvo un final horrible. El paciente nunca se despertó de la anestesia. Nadie sabe qué podría haberlo causado, pero el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] supone que el cuerpo del paciente ya era demasiado débil."
 panum_character_treatment_fatal_fake_doctor_loc: "Al principio, la cirugía parecía haber ido bastante bien. Uno del médico salió de la habitación, no pasó mucho tiempo hasta que la situación cambió para peor. De repente, el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] irrumpió en la habitación y dijo que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] lamentaba mucho llegar tarde. Todos estaban confundidos ya que el médico acaba de realizar la cirugía. Parece que una persona al azar fingió ser el cirujano y realizó la cirugía. Lamentablemente, al final, el paciente murió y nadie sabe quién es responsable de la muerte."
 panum_character_treatment_fatal_slippery_floor_loc: "Fue una gran cirugía hasta que el pie del Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] se encontró con un charco de sangre en el piso. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] se deslizó y cayó justo encima del paciente. Lamentablemente, el bisturí empaló el corazón del paciente que causó la muerte del paciente."
 panum.242.t: "Muerte de la multitud"
 panum.242.d: "El Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] considera sorprendente que la tuberculosis ocurra constantemente en áreas densamente pobladas, pero rara vez en regiones escasamente pobladas."
 panum.242.f: "'He echado un vistazo más de cerca a algunos de los tratados que recomiendan resorts de salud climática para curar la tuberculosis. Un artículo me pareció tan poco convincente que creo que mi colega confundió la correlación con la causalidad. Él supone que las personas en las montañas son más saludables porque el aire es más saludable y, por lo tanto, no son víctimas de la tuberculosis. Pero, ¿no es obvio que, en principio, podemos observar que la tuberculosis no aparece en las montañas porque hay menos personas allí? Esto habla de la interpretación del sur de Europa que estamos tratando menos con miasma que con contagio. La tuberculosis puede ser una enfermedad contagiosa después de todo. '\ N \ nfrom the Journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] en [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]"
 panum.242.g: "Esta es una teoría que subraya que la tuberculosis es una enfermedad contagiosa."
 panum.242.h: "Esta es una teoría que subraya que la teoría del miasma es incorrecta."
 panum.243.t: "Un ermitaño de tuberculosis"
 panum.243.d: "El Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] hizo un descubrimiento interesante en un intercambio con un sobreviviente de tuberculosis."
 panum.243.f: "\"¿Dijiste que tu hermano murió de tuberculosis?\" Tenía diecinueve años entonces. Lo vi morir ante mis ojos. '\ N'y también te enfermaste con tuberculosis?' '\ N'Exactly. Asumí que, como él, moriría pronto. Eso fue seguro para mí. Así que me retiré a un área remota para morir. Quería pasar mis últimos días en la naturaleza, lejos de la civilización. 'Sin embargo, sobreviviste. ¿Cuál crees que es la razón de esto? En algún momento reuní suficiente fuerza para superar la enfermedad. '\ N'hm'."
 panum.243.g: "¿Eso es realmente todo?"
 panum.244.t: "Nada hereditario"
 panum.244.d: "Después de largos exámenes, el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] llega a la conclusión de que hay poco que sugiera que la tuberculosis es en realidad una enfermedad hereditaria."
 panum.244.f: "'Si me hubieras dicho durante mi entrenamiento que algún día buscaría trabajo genealógico, me habría sorprendido bastante. Pero casi no había ninguna forma de confirmar mi teoría más que preguntar a las propias familias afectadas, así como a las autoridades y al clero. Si la tuberculosis es de hecho una enfermedad hereditaria, entonces puede permanecer sin ser detectada durante generaciones. Hay árboles familiares enteros sin un caso de tuberculosis, solo para que de repente elimine a toda una familia. Y es un hecho sorprendente que la tuberculosis no es una enfermedad estática y manejable, sino que solo se ha convertido en el peligro que representa hoy en las últimas décadas. Permítanme decirlo de esta manera: si la tuberculosis es una enfermedad hereditaria, entonces obviamente todos tenemos una predisposición. Como puede ver en el apéndice de mi estudio, las estadísticas hablan por sí mismas. '\ N \ nlection por [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a la facultad médica"
 panum.244.g: "¿Entonces teóricamente alguien puede infectarse?"
 panum.245.t: "Tubérculos"
 panum.245.d: "Durante un examen anatómico, el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] obtuvo nuevas ideas sobre los tumores en el tejido pulmonar que le dan a la enfermedad su nombre."
 panum.245.f: "René Laennec desarrolló el estetoscopio, originalmente para examinar la tuberculosis. En los años siguientes, ayudó a que la enfermedad pudiera detectarse anteriormente al poder escuchar los cambios en el sistema respiratorio en una etapa temprana. Al mismo tiempo, el conocimiento sobre el desarrollo de la tuberculosis dentro del cuerpo creció."
 panum.245.g: "Pequeño progreso, pero progreso."
 panum.246.t: "Estilo de vida e inmunidad"
 panum.246.d: "El Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] tiene serias dudas sobre las teorías tradicionales sobre la causa de la tuberculosis después de examinar completamente a varios pacientes y sus biografías."
 panum.246.f: "'El examen de varios pacientes en [SCOPE.sState('panum_disease_state').GetCityHubName], incluidos sus historias personales, plantea más preguntas que respuestas; siempre que uno espera verdades que sean lo más simples posible, en lugar de solo fragmentos de la verdad. Es cierto que el proletariado en particular se ve gravemente afectado por la tuberculosis, pero me parece cuestionable si una persona rica en el mismo entorno no será víctima de la enfermedad. Estoy convencido de que la buena nutrición, el aire fresco y el ejercicio físico ofrecen un cierto nivel de resiliencia contra la enfermedad, pero no creo que puedan ser descartados en principio. En resumen: creo que la idea de que alguien recibe tuberculosis porque es un artista o un proletariano es una afirmación científicamente insostenible. Si ese fuera el caso, entonces la tuberculosis habría elegido su afiliación en los últimos años y ahora preferiría a los trabajadores de la fábrica como sus víctimas altamente elegidas espiritualmente en lugar de músicos y poetas. Nadie puede creer seriamente eso."
 panum.246.g: "Esta será una gran decepción para algunos genios no reconocidos."
 panum.247.t: "Una enfermedad notificable"
 panum.247.d: "El Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha estado experimentando con un sistema de informes en [SCOPE.sState('panum_disease_state').GetCityHubName] que podría ayudar a frenar la tuberculosis."
 panum.247.f: "'La clasificación de la tuberculosis de [SCOPE.sState('panum_disease_state').GetCityHubName] como una enfermedad notificable ha causado cierto resentimiento entre la población porque muchas personas consideran que la enfermedad es un asunto privado. Pero no lo es, especialmente cuando ocurre en forma epidémica. En el momento en que una enfermedad se considera contagiosa, y en el caso de la tuberculosis hay mucho que sugerir que lo es, es un asunto público que puede poner en peligro el bienestar público. Es mejor tener una enfermedad reportable que una cuarentena. El aislamiento de fuentes individuales de infección mostró que la propagación de la tuberculosis podría prevenirse sin poner una ciudad entera en un estado de emergencia. Desafortunadamente, el estigma que ahora llevan las grúas de tuberculosis tendrán consecuencias personales desagradables. Los pacientes con tuberculosis ahora son tratados como leprosos."
 panum.247.g: ""
 panum.248.t: "Matar los microbios"
 panum.248.d: "El Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha desarrollado un proceso químico que se basa en el conocimiento previo de los microorganismos. Podría prevenir la tuberculosis en el futuro."
 panum.248.f: "La pasteurización se refiere al calentamiento a corto plazo de los alimentos líquidos o pastosos a temperaturas de al menos 72 ° C a un máximo de 100 ° C para matar las fases vegetativas de los microorganismos para preservar los alimentos de manera suave. El proceso se utilizó para el vino desde mediados del siglo XIX. Solo más tarde se usó en leche cruda, a través del cual los patógenos de tuberculosis bovina podían transmitirse a los humanos. Por lo tanto, la pasteurización de la leche cruda jugó un papel en la contener tuberculosis. Este hallazgo es más importante de lo que uno podría pensar: durante mucho tiempo, los médicos, biólogos y químicos asumieron que la tuberculosis del ganado no podría transmitirse a los humanos. Incluso el experto en tuberculosis Robert Koch se equivocó a este respecto, y solo más tarde revisó su opinión, un período en el que muchos niños se infectaron a través de la leche y la mantequilla de tuberculosis."
 panum.248.g: "¡Y pensé que la leche era básicamente saludable!"
 panum.249.t: "Escupidora perosnal"
 panum.249.d: "El Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] notó un accesorio que se ha vuelto particularmente popular entre las mujeres que padecen tuberculosis. Tiene una carcasa de vidrio azul sofisticada que se ve tan de moda que olvidarás que es una escupidora."
 panum.249.f: "'La mayoría de nosotros tenemos eso aquí. También tiene un nombre con nosotros, un apodo, bastante divertido. Sin ninguna restricción, con una cara obstinadamente ignorante, ella pronunció la expresión sombría 'el azul azul' '. -Thomas Mann, Zauberberg"
 panum.249.g: "Si cada persona enferma llevara algo así ..."
 panum.251.t: "Una enfermedad celular?"
 panum.251.d: "El estudio muy notado de un especialista alemán sobre tuberculosis anula los hallazgos anteriores del Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] porque [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] aún no ha podido encontrar una contrapugnante adecuada."
 panum.251.f: "'Hay algunos colegas que afirman apasionadamente que la tuberculosis puede transmitirse a través de la infección. Cuando se enfrentan al hecho de que hay muchos pacientes que han desarrollado la enfermedad sin haber estado cerca de una grúa de tuberculosis, afirman que probablemente se infectó hace años. ¿Cómo se debe probar esto? Más bien, mis propios estudios muestran que los tubérculos del tejido pulmonar deben interpretarse como la proliferación celular. Por lo tanto, la tuberculosis debe interpretarse, como el carcinoma, como resultado de la proliferación de células locales. Se puede identificar claramente como una enfermedad constitucional. '\ N \ ndr. Angelika Hasenbein, 'Tuberculosis, una enfermedad similar al cáncer'"
 panum.251.g: "¿Entonces la tuberculosis funciona como un tumor celular?"
 panum.252.t: "Bronquiectasis"
 panum.252.d: "Como descubrió el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], algunos supuestos hallazgos que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] pensó que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] había ganado de pacientes con tuberculosis era incorrecta. Sufrían una enfermedad completamente diferente."
 panum.252.f: "'Desafortunadamente, algunas investigaciones han resultado ser un callejón sin salida. Entonces creí que algunos pacientes con tuberculosis se habían recuperado bajo ciertas circunstancias. En realidad no tenían tuberculosis, sino bronquiectasis. No se excluye que la tuberculosis pueda promover la bronquiectasia, pero estas son dos enfermedades diferentes y no todos los resultados son aplicables, por lo tanto, son aplicables. Es probable que esto retrase significativamente la búsqueda de un método de tratamiento exitoso."
 panum.252.g: "¡Tiempo perdido!"
 panum.253.t: "Charlatanismo"
 panum.253.d: "Una visita a un sanatorio en [SCOPE.sState('panum_disease_state').GetCityHubName] resultó ser una total decepción para el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]."
 panum.253.f: "'Muchos colegas y especialistas médicos reconocidos recomendaron el sanatorio en [SCOPE.sState('panum_disease_state').GetCityHubName] para mí. Es una institución ejemplar que opera en el campo de la tuberculosis con métodos extremadamente serios, dijeron. Varios pacientes hablaron de milagros médicos que ocurrían allí. Si bien los médicos en el sitio me aseguraron cuán grandes eran las posibilidades de recuperación, descubrí exactamente lo contrario. Cuando miré a través de los archivos del paciente, descubrí que casi el 50 por ciento de los pacientes ingresados ​​murieron en la primera semana. Todo este sanatorio es una estafa! \ N \ nfrom the Journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] en [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]"
 panum.253.g: "Pero ... pero ... ¡la cena debería ser excelente!"
 panum.254.t: "Contacto con la muerte blanca"
 panum.254.d: "Aparentemente, las muchas visitas a los pacientes con tuberculosis tienen un efecto involuntario: ¡el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] Spit Blood hoy!"
 panum.254.f: "'Qué día tan desafortunado. Mis tratos con la tuberculosis y mi supuesto conocimiento de la enfermedad ahora se vengan. Por un lado, me equivoqué en tantos niveles que es correcto que mi orgullo sea castigado. Por otro lado, es una indicación de que es una enfermedad contagiosa. Pero a qué costo tuve que hacer este descubrimiento? \ N \ nfrom the Journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] en [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]"
 panum.254.g: "El médico se recuperará de esto, ¿verdad?"
 panum.264.t: "De contagión"
 panum.264.d: "Los intereses históricos del Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] han llevado a [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] a encontrarse con un libro antiguo del Renacimiento, que tiene un valor inconmensurable."
 panum.264.f: "Ya en 1546, el médico veronese Girolamo Fracastoro postuló que las enfermedades fueron causadas principalmente por infección con pequeñas partículas que recuerdaban a los gérmenes posteriores. Por lo tanto, dudó de la teoría de miasma hace más de 300 años. Con respecto a la tuberculosis, Fracastoro también dice que es una enfermedad contagiosa que transmite estos patógenos. El libro a veces es más convincente que muchos tratados modernos. Lo que es revolucionario es que Fracastoro supone que estos llamados 'fomitos' ingresan a través del sistema respiratorio o los poros del cuerpo para buscar alimentos. Esto avanzaría la enfermedad."
 panum.264.g: "Esto estimulará la búsqueda de tratamiento."
 panum.264.h: "Esto es mucho más convincente que la teoría del miasma."
 panum.264.i: "¿Podría un patógeno pequeño causar tuberculosis?"
 panum.240.t: "Tuberculosis: una enfermedad contagiosa"
 panum.240.d: "A través de varios experimentos y exámenes de pacientes, el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] pudo demostrar de manera concluyente que la tuberculosis no es solo una enfermedad contagiosa, sino que también pudo obtener varios métodos de prevención de esto en el tratado [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] '[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_treatment_title')]'."
 panum.240.f: "'El conocimiento de que la tuberculosis es una enfermedad que se puede transmitir de persona a persona y también de animal a persona conduce a una serie completa de medidas para prevenir la enfermedad. al menos el uso de escupidos públicos y personales."
 panum.240.g: "La tuberculosis ya no es el destino."
 panum_add_dubious_yellow_fever_treatment_clues_effect_tt: "Esto da una pista ... probablemente."
 panum.540.t: "Prevenir? ¡Pedido!"
 panum.540.d: "¡Después de semanas de investigación y estudio, nuestro médico ha ideado un medio para detener la propagación de la fiebre amarilla!"
 panum.540.f: "'... Pero al final, una prueba permaneció, segura e inexcusable. Ya sea por red, humo o pesticida, mi investigación reveló que cada vez que se interrumpía el camino del mosquito por cualquier razón, se detuvo la propagación de la fiebre amarilla. Debe ser, entonces, una enfermedad de insectos. Si podemos interrumpir el proceso de desove, podemos evitar que lleguen nuevos mosquitos para infectar a nuestra gente. Es simplemente una cuestión de medios, y he ideado un plan de tres puntos. \ N \ Ni: rociar estanques locales, pantanos y pantanos con pesticidas para que los hagan inadecuados para el desove. Si es posible, drene los cuerpos de agua menores por completo. \ Nii: desplegar redes de mosquitos, cubiertas de telas dosificadas con pesticidas, sobre todas las aperturas de edificios públicos, especialmente los hospitales. \ Niii: informar a la gente de la naturaleza de esta enfermedad como uno nacido por el mosquito, y alentar el uso de las redes, el insecticidio y el humo para fumigar sus hogares. Acción, entonces bien podemos ver el final de la fiebre amarilla endémica en nuestras vidas, y el fin de estos enemigos más persistentes. '\ n \ nfrom: [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_treatment_title')] por el Dr.[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]"
 panum.540.g: "Bien hecho, médico. Ahora, para obtener algunas redes de mosquitos y spray de insectos ..."
 panum.541.d: "El médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], nuestro médico principal, ha llegado a [SCOPE.sState('panum_disease_state').GetName] para investigar la misteriosa fiebre amarilla."
 panum.541.f_america: "'Llegamos a [SCOPE.sState('panum_disease_state').GetCityHubName] mucho antes del amanecer, nuestro tren llegó a la estación para encontrar una plataforma desprovista de pasajeros y con solo un matraz de sopa caliente para el conductor y sus colegas en el motor. Pocos hombres podrían salir de un tren tan temprano en la mañana, pero había sido poco capaz de descansar; Las cartas y notas del gobierno local pesaron mucho en mi mente, ya que hablaron de una enfermedad extraña, la fiebre amarilla. El nombre proviene de la ictericia que viene con la enfermedad, aunque ese no es el final de los problemas: los vómitos, los dolores del abdomen, el sangrado de los ojos, y estos matan muchos. Es allí donde encontré el propósito y la energía para despertar a mis colegas, y llevarlos desde el tren hacia la ciudad, debajo del brillo de las lámparas de gas alrededor de las cuales los mosquitos zumban incesantemente. Si alguna vez vamos a derrotar esta enfermedad, debemos aprender la mayor pregunta de todas. ¿Qué estamos luchando?"
 panum.541.f_africa: "\"Fue justo después del mediodía cuando nuestro barco se detuvo en el puerto, y el capitán nos informó que habíamos llegado a nuestro destino. Uno de los grandes puestos de avanzada de nuestro imperio colonial, la administración local había devuelto la noticia a la capital de una enfermedad extraña y letal que tenían problemas para comprender, sin mera gripe común, sino la infame fiebre amarilla. No es un verdadero ajeno para mí, ni para nadie que lea bien sobre la historia de las enfermedades tropicales ... pero por todo lo que sabemos de sus muchos medios de matar, sabemos muy poca enfermedad en sí. Allí, podríamos mantener nuestras muestras, hacer nuestro hogar y realizar la investigación necesaria para descifrar los misterios de la fiebre amarilla ... pero primero, debemos encontrar esas muestras, y la incesante presencia de mosquitos es una distracción desagradable. Aún así, no nos mantendrá de nuestro trabajo."
 panum.541.g: "Ven, caballeros ... bostezo."
 panum.541.h: "... malditos mosquitos."
 panum.542.t: "Guerras de ayer"
 panum.542.d: "En un intento por descubrir más sobre la historia de la fiebre amarilla en estas tierras, el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha decidido consultar con el comandante de una guarnición local."
 panum.542.f: "'Ah, es bueno verte, médico. Mis hombres siempre están felices de saber que están en buenas manos si llega la enfermedad. ¿Qué puedo hacer por ti? '' El placer es el mío, coronel. Me dijeron que podría tener registros de campañas pasadas aquí. ¿Tienes alguna que haya visto un brote de fiebre amarilla entre las tropas? '\ N'oh, ciertamente ... aquí. Esa fue una campaña horrible, eso fue, créeme, y no solo el enemigo. Muchos muchachos que mueren en guerra mueren por los elementos, la enfermedad, la exposición. Lo llaman desgaste. '\ N'This ... el desgaste fue especialmente malo, entonces?' \ N'worse que malo. Entre la enfermedad y la temporada de lluvias, un hombre tenía más que temer en el campamento que en el campo de batalla. El calor también era horrible y los insectos."
 panum.542.g: "Insectos, enfermedades, lluvia ... un infierno de creación de la naturaleza, se podría decir."
 panum.543.t: "Campos de afirmación"
 panum.543.d: "Continuando la misión [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] Para aprender más sobre la fiebre amarilla, el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha viajado fuera del asentamiento a un frasco de infección aparente: una granja rural."
 panum.543.f: "'Admitiré que tardó casi una hora en aprender a entender este acento rural, pero el propietario de la granja demostró ser bastante informativo. Aunque esta región a menudo está bastante húmeda, todavía existe la necesidad de obras de riego. Sin embargo, cavar estas trincheras requiere una fuerza significativa, proporcionada por muchas docenas de trabajadores locales, que a menudo viven juntos en barracas estrechos y abarrotados. Tales condiciones podrían criar enfermedades, y es poca sorpresa que la fiebre amarilla se encontrara allí en poco tiempo. \ N \ n El mismo agricultor cree que proviene de un comerciante viajero de algún tipo, o tal vez con los comerciantes que recogen la cosecha o la entrega de herramientas, no puede decir con certeza, pero lo dudo yo mismo. Parece que esa fiebre amarilla surgió aquí por sí sola ... pero si es así, ¿cómo?"
 panum.543.g: "¿Cómo podría una enfermedad solo ... surgir de la nada?"
 panum.544.t: "El agua ...?"
 panum.544.d: "Investigando la posibilidad de que la fiebre amarilla sea una enfermedad transmitida por el agua, el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha reunido muestras de vías fluviales y pozos locales."
 panum.544.f: "'Una posibilidad que había considerado era que esta enfermedad podría ser quizás de naturaleza similar al de los cólera, que podría llevarse a través de agua enferma. Decidiendo ver si este era el caso, ordené a mis asistentes que reunieran muestras antes de encontrar un lugar tranquilo para mi microscopio, donde podría trabajar sin molestias. El aire húmedo y tropical distrae, al igual que el zumbido incesante de los mosquitos, pero en poco tiempo, las muestras comenzaron a deslizarse debajo de la lente, lo que me permitió mirar en ese mundo más pequeño. Algunos eran más sucios que otros, incluso con gusanos minuciosos y similares, pero estos no coincidían con el patrón de los infectados, que se dispersan por el mapa como un aerosol de disparo de pájaros. Cualquiera sea el caso, no puedo encontrar ninguna pista sobre la naturaleza de la fiebre amarilla en este agua ... '\ n \ nfrom the Journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], escritura de fiebre amarilla en [SCOPE.sState('panum_disease_state').GetName], [TimeKeeper.GetCurrentDate.Format('y')]"
 panum.544.g: "... Pero si no están allí, ¿dónde se esconden?"
 panum.545.t: "La isla"
 panum.545.d: "Perplejo por un aparente 'ruptura' en el patrón de infecciones, el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] se ha aventurado a un lugar inusual: una pesquería isleña."
 panum.545.f: "'Ah, debes ser doctor ... oh. Perdón el hedor, doctor. Eso tampoco te caes. Los peces que comen las tripas que arrojamos son como comerte, si pueden. '\ N' ... por favor, hazlo rápido. Cuéntame sobre este lugar. No esa fiebre amarilla, de todos modos. '¿Cómo? ¿Hay algo que pueda estar ahorrando a tus hombres? La mayoría de los días están en el mar, y algunos van más allá y no regresan por un día o más. Pero creo que hay más que eso que eso. Pasan su tiempo libre aquí en la isla, en los cuarteles o en sus hogares, y no hay fiebre aquí en absoluto. '\ N'i investigará ... No, mis asistentes pueden después de que regrese.' No me aseguraré de que todos sepan, doctor ... y ni siquiera se despidieron '."
 panum.545.g: "... Pero primero, un baño jabonoso. Un baño muy, muy jabonoso."
 panum.546.t: "¿Gas de pantano?"
 panum.546.d: "En lo que podría ser un retorno inquietante de la vieja teoría del miasma, el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha encontrado informes sorprendentes: ¡la fiebre amarilla podría estar relacionada con los humos del pantano!"
 panum.546.f: "'Me duele cómo tan poco aquí parece tener sentido. Nada se alinea con las teorías establecidas que conocemos, y me encuentro agarrando pajitas. Sin embargo, hay una línea de promesa: pantanos. Mis asistentes prepararon portaobjetos para el microscopio, y están llenos y prosperan con microbios, pero nada de lo que podamos identificar. Y, sin embargo, a pesar de eso, la plaga explota en las costas. Las casas cerca de estos pantanos son los más afectados con la fiebre amarilla. Algunos incluso mencionan tenerlo en la infancia. \ N \ nand todavía, no hay señales de ... cómo. No beben el agua, no comen pescado atrapado en él, y sin embargo, el hedor de ella deambula a sus hogares con la brisa, los inunda con el hedor y pronto sigue la enfermedad. Los viejos textos gritarían 'miasma', pero esto no puede ser así ... pero si no, ¿de qué otra forma podría la enfermedad extendida desde el pantano al hogar?"
 panum.546.g: "... o tal vez es astrológico ... no, eso no tiene sentido ... ¿verdad?"
 panum.547.t: "El rival"
 panum.547.d: "Decidiendo buscar experiencia local, el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha decidido visitar un posible aliado: el forense local."
 panum.547.f: "Ah, es bueno conocerte, médico. Mis disculpas si no nos damos la mano, tengo un cuerpo en la losa en la otra habitación. Malaria, ¿lo creerías? De todas las veces para ver un brote, lo entendemos ahora, al mismo tiempo. Los dos tienden a venir en parejas, y peor aún, tienen síntomas similares y muertes similares. Hace que sea una tarea terrible para distinguir a los dos, te lo digo. Hubiera pensado que ellos lo mismo \". ¿Tienes buenos registros de esto? '\ N'oh, por supuesto. Haré que mi asistente se los envíe, aunque no sé cuán útiles podrían ser. No sé cómo se difunde esto, médico, pero apostaría si puedes encontrar el indicado, es posible que encuentre la otra ''."
 panum.547.g: "Entonces quizás podríamos matar a dos pájaros de un solo piedra."
 panum.548.t: "El camino bifurcado"
 panum.548.d: "Perplejo por la naturaleza de la fiebre amarilla, el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha vuelto a la capital para solicitar más instrucciones."
 panum.548.f: "'... y, sin embargo, lo intenta, por lo que podría, me encuentro con una pérdida de cómo proceder. Hay pocos \"dichos\" que guíen mi curso de investigación, y aunque he examinado muchas revistas médicas y consultado con expertos locales, no estoy completamente seguro de qué es realmente la fiebre amarilla. Una enfermedad para estar segura, pero ¿de qué tipo? ¿Una enfermedad del aire, como en un miasma? ¿Algo en el agua o en la comida? ¿Cómo se extiende de hombre a hombre, o tal vez, de pantano al hombre? Si no puedo encontrar la enfermedad, no puedo esperar luchar directamente, sin embargo, mi investigación no está completamente sin fruto. Tal vez he encontrado dos posibles vías de investigación a considerar: \ n \ nfirstly, que podríamos intentar encontrar algún patrón en cuanto a cómo se está propagando. Quizás con una investigación enfocada podamos discernir alguna lógica sobre cómo se transmite la enfermedad, y así la interrumpir. Quizás detener la propagación revelará la verdadera causa. Es posible que no sepamos de sus orígenes, pero tal vez podamos lo mejor posible."
 panum.548.g: "Una onza de prevención vale una libra de cura."
 panum.548.h: "Jugamos para todas las canicas. Tendremos una vacuna."
 panum.551.t: "El camino hacia la prevención"
 panum.551.d: "Después de la instrucción de la capital, el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha comenzado a investigar cómo prevenir la propagación de la fiebre amarilla."
 panum.551.f: "'... Por supuesto, es difícil determinar qué se debe hacer exactamente para prevenir la propagación de una enfermedad que apenas entendemos de alguna manera más de cómo podría inducir la muerte. Sin embargo, si este es el desafío que debo enfrentar, entonces que así sea. He descubierto una serie de clientes potenciales prometedores hasta ahora; Mi mapa de la infección es esporádico, pero aquí y allá, aparecen ciertas islas de irregularidad ... lugares donde el brote cae significativamente, incluso por completo. Aquí hay un patrón, esperando ser descubierto, y si se puede encontrar, entonces podríamos resolver este rompecabezas y deshacernos de la fiebre amarilla para siempre."
 panum.551.g: "Estamos construyendo una fortaleza, un ladrillo a la vez."
 panum.552.t: "Filete de hechos"
 panum.552.d: "Mientras trabajaba en un medio para prevenir la propagación de la fiebre amarilla, el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] fue visitado por uno de los asistentes [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]."
 panum.552.f: "'Ah, es bueno verte de nuevo, muchacho y, ¡cielos! ¿Qué es ese hedor? ¡Encontré algo muy interesante! '' \ No interesante, no podrías hacer tiempo libre para un baño, parece ... '\ n'Forgive Me, pero sí. Busqué cómo la fiebre amarilla no afectaba a los hombres en la pesquería y comencé a seguirla de regreso al continente. Hay una casa de humo en la orilla, y los trabajadores se van, y nadie tiene fiebre amarilla allí. Y eso me hizo pensar ... ¿Quizás el humo lo mantiene alejado? Entonces, comencé a buscar lugares con mucho humo, y encontré este fabricante de jabones, y pusieron hierbas y aceites en su quemador. Ni una sola fiebre amarilla en su hogar. '\ N'hmmm ... Este es un trabajo fascinante. Continúe sus observaciones y mantenme informado y, oh, buen trabajo."
 panum.552.g: "Los pasos ansiosos envían al asistente ... pero deja al médico para que piense."
 panum.553.t_america: "La misión"
 panum.553.d_america: "Siguiendo el camino de los huecos en el brote, la investigación del Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] los ha llevado a una antigua misión colonial."
 panum.553.f_america: "'No tardó mucho en encontrar la misión aquí. Fue uno de los primeros edificios planteados después de la colonización, nuestros antepasados ​​recién salidos de las tierras que nunca podrían volver a ver. No es una gran catedral, pero fue construida con amor, y con el tiempo, los misioneros y los miembros de la Iglesia Madre la han visto creciendo, explotando con salas y pasillos propios. Fue uno de los primeros lugares donde los enfermos podrían ser traídos, atendidos por monjas y cualquier voluntario piadosa dispuesto a ayudar. Mientras que otros hospitales cuentan a sus muertos y ven el salto de la enfermedad de Ward a Ward, aquí, nada. Una familia fue traída después del fuego de la casa, pero después de una semana, ninguno de ellos atrapó fiebre amarilla, a pesar de estar protegida pero a pocas habitaciones de distancia. Me desconcierta, tanto para la misión como para el hospital son iguales, pero hay una gran diferencia: las redes. Un sermón es algo sagrado, y no puede ser interrumpido por los mosquitos zumbidos y su auda, ​​por lo que el clero ha colocado redes sobre cada ventana para evitar que los mosquitos, incluso en las salas."
 panum.553.g: "Porque restauraré la salud a ti ..."
 panum.553.t_africa: "El barrio pobre"
 panum.553.d_africa: "Siguiendo el camino de los huecos en el brote, la investigación del Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] los ha llevado a algún lugar curioso: los barrios bajos."
 panum.553.f_africa: "Los barrios marginales estaban lo suficientemente cerca de hacer que cualquier hombre dudara la importancia de nuestra gran empresa colonial en estas tierras. Subno y miserable, repleto de mujeres y niños, esperando que sus hombres regresen de las plantaciones o de las minas o donde sea que funcionen. Las bombas de agua con exceso de trabajo llenan las macetas, las moscas zumban y una clara falta de saneamiento se combinaría para que este lugar parezca un caldero de enfermedad. De hecho, lo es. A cambio, les hice preguntas: ¿qué hay de fiebre amarilla? Vi casos de cólera y disentería, pero no la enfermedad que estoy buscando. Una mujer señaló las ventanas, o donde deberían estar, en lugar de vidrio, una pared de tela, una red. Para ellos, mantuvo fuera la malaria, pero también, tal vez, fiebre amarilla ... que, según ellos, bien podrían ser aburridos por los insectos."
 panum.553.h: "... y tal vez, solo tal vez, los lugareños tienen razón?"
 panum.554.t: "El mayor asesino"
 panum.554.d: "Al leer los registros que les dieron las fuerzas militares locales, el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha hecho un descubrimiento."
 panum.554.f: "'Ah, es bueno conocerte de nuevo, coronel. ¿Tengo algunas preguntas sobre estos registros que me diste? ¿Tienes un momento de sobra? '\ N'oh, pero por supuesto! Cualquier cosa para ayudar. '\ N'it menciona aquí que la última campaña fue dirigida por un oficial que, al parecer, estaba profundamente preocupado por las picaduras de insectos'. Las bocados son solo una parte de la vida en esta tierra, pero de donde vinieron ... ninguna. Luego, una semana después, ordenó rociar el área local, y nuevamente, las tarifas cayeron. ¿Qué, exactamente, es este piretro?"
 panum.554.g: "¿Oh, Pyretrum? Está acostumbrado para delojar a las tropas. Mata a los insectos, ya ves."
 panum.555.t_america: "Los recuerdos de antaño"
 panum.555.d_america: "Encerrado en la batalla contra una enfermedad que ha afectado a América del Sur durante siglos, el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] busca respuestas en un lugar extraño: el pasado."
 panum.555.f_america: "'Algunos dicen que el pasado es un país diferente. En las Américas, tal vez eso es más cierto que en cualquier otro lugar, ya que mucho ha cambiado desde Columbus, pero para mi sorpresa, la enfermedad que lucha no es una de ellas. Tomó semanas rastrear revistas y registros de los primeros colonos en estas tierras, pero por fin, han llegado a mis manos. Es un hallazgo valioso. Con ellos, tengo los relatos de los médicos pasados, mentes brillantes que podrían haber carecido de las herramientas que hoy damos por sentado. Hay una preciosa revelación, oculta, difícil de notar sin tales cuentas. De vez en cuando, hay una explosión de fiebre amarilla en esta región, casi como un reloj. Eso solo es inútil, pero se correlaciona casi exactamente con revistas que hablan de lluvia intensa e incluso inundaciones, registradas aquí cuando las casas se arrastran en inundaciones que luego son seguidas de brotes de fiebre amarilla. ¿Podrían los dos estar relacionados?"
 panum.555.g: "Todos nos paramos sobre los hombros de los gigantes ... Simplemente tenían menos gigantes para pararse."
 panum.555.t_africa: "Remedios populares"
 panum.555.d_africa: "Quizás controvertido, el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha buscado consejos de las personas que podrían conocer mejor la fiebre amarilla: los nativos."
 panum.555.f_africa: "'Hay quienes me llamarían loco por elegir consultar a los nativos sobre una revista médica, pero creo que carecen de un buen razonamiento para tal juicio. La fiebre amarilla es una enfermedad que se encuentra aquí, en África, y estas personas han vivido aquí mucho más tiempo que nosotros. De hecho, existe la posibilidad de que esta enfermedad surgiera en esta tierra en primer lugar. Tal vez esto es así, ya que muchos brotes aquí pueden matar a los europeos y similares con facilidad, pero no darle más que síntomas africanos que se parecían a una influenza leve. \ N \ nyet, a pesar de eso, hay comprensión. He hablado con varios curanderos locales e incluso representantes de tribus más en tierra, y mencionan ciertas prácticas preventivas ... la quema de estiércol de elefante y varias plantas, incluso trayendo ese humo en interiores, lo que aleja los mosquitos que creen que están relacionados con la malaria, y tal vez, con la fiebre amarilla. Más que eso, tienen un medio para leer la tierra a su alrededor y predecir el comienzo de la temporada 'lluviosa', que creen que corresponde a lo peor de la malaria y la fiebre amarilla. Se necesitará más estudio y consideración, pero esto es prometedor."
 panum.555.h: "Sabiduría, en el lugar menos esperada."
 panum.556.t: "Tela simple?"
 panum.556.d: "Aunque pretenden apoyar a nuestras tropas en una guarnición fronteriza, las nuevas telas impregnadas de insecticidas han llegado a la misma ciudad que el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] está investigando."
 panum.556.f: "'¿Estás destinado a estar en esta área? Oh, ya veo, eres el médico de la capital. No sé si hay mucho aquí para ti, médico. No es un solo caso de esa fiebre aquí. '\ N' ... que puedo decir. ¿Qué es esto? ¿Ver? Mira el suelo. Docenas de los bastardos, ya muertos. ¿Cuántos hombres se quedan en estas carpas? La tela es nueva ya que los viejos estaban destrozados en un monzón el año pasado. Tiempo terrible, fiebre en todas partes y malaria también. Ahora tenemos esto, nada."
 panum.556.g: "... ¿Acabas de decir que no hay una sola fiebre ya que tienes esta nueva tela?"
