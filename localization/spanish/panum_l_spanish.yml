 je_panum_cholera_treatment_reason: "El doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] está examinando actualmente a varios pacientes para determinar la causa del #YELLOW cólera#!.. Sólo las verdaderas causas de la aparición de la enfermedad pueden ayudar a hacer prevenciones que conduzcan a un método moderno de tratamiento. Cuando el doctor haya terminado su trabajo, presentará su tesis al público. Esto no evitará futuras epidemias -para ello es necesario identificar el agente patógeno y posiblemente una vacuna- pero las consecuencias de una nueva epidemia serán relativamente pequeñas." #NT!
 je_panum_tuberculosis_treatment_reason: "El doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] está examinando actualmente a varios pacientes para determinar la causa de la #YELLOW tuberculosis#!.. Sólo las verdaderas causas de la aparición de la enfermedad pueden ayudar a hacer medidas preventivas que conduzcan a un método moderno de tratamiento. Cuando el doctor haya terminado su trabajo, presentará su tesis al público. Esto no evitará futuras epidemias -para ello es necesario identificar el agente patógeno y posiblemente una vacuna- pero las consecuencias de una nueva epidemia serán relativamente pequeñas." #NT!
 je_panum_smallpox_treatment_reason: "El doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] está examinando actualmente a varios pacientes para determinar la causa de la #YELLOW viruela#!.. Sólo las verdaderas causas de la aparición de la enfermedad pueden ayudar a hacer prevenciones que conduzcan a un método moderno de tratamiento. Cuando el doctor haya terminado su trabajo, presentará su tesis al público. Esto no evitará futuras epidemias -para ello es necesario identificar el agente patógeno y posiblemente una vacuna- pero los efectos de una nueva epidemia serán relativamente pequeños." #NT!
 je_panum_typhus_treatment_reason: "El doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] está examinando actualmente a varios pacientes para determinar la causa del #YELLOW tifus#!.. Sólo las verdaderas causas de la aparición de la enfermedad pueden ayudar a hacer prevenciones que conduzcan a un método moderno de tratamiento. Cuando el doctor haya terminado su trabajo, presentará su tesis al público. Esto no evitará futuras epidemias -para ello es necesario identificar el agente patógeno y posiblemente una vacuna- pero las consecuencias de una nueva epidemia serán relativamente pequeñas." #NT!
 je_panum_yellow_fever_treatment_reason: "El doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] está examinando actualmente a varios pacientes para determinar la causa de la #YELLOW fiebre amarilla#!.. Sólo las verdaderas causas de la aparición de la enfermedad pueden ayudar a hacer prevenciones que conduzcan a un método moderno de tratamiento. Cuando el doctor haya terminado su trabajo, presentará su tesis al público. Esto no evitará futuras epidemias -para ello es necesario identificar el agente patógeno y posiblemente una vacuna- pero las consecuencias de una nueva epidemia serán relativamente pequeñas." #NT!
  
