 je_panum_military_medicine_project_reason: "Los médicos militares y los médicos de la Cruz Roja tienen la oportunidad única de mejorar la atención médica en el campo de batalla y, por lo tanto, salvar muchas vidas, y posiblemente decidir una guerra. Dependiendo de los rasgos y la experiencia de los personajes, esta mejora ocurre a diferentes velocidades. Después de la reforma médica militar [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis], se desbloqueará un [concept_mobilization_option] o un nivel superior."
