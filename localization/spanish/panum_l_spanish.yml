 panum.112.t: "Un rayo de esperanza" #NT!
 panum.112.d: "En los hospitales de cólera de [SCOPE.sState('panum_disease_state').GetName], un médico ha destacado especialmente a [SCOPE.sCharacter('panum_new_physician_scope').GetHerselfHimself] en la actual epidemia. El modo de trabajar de [SCOPE.sCharacter('panum_new_physician_scope').GetFullName] ya ha adquirido importancia nacional. Este médico podría desempeñar un papel importante en la lucha contra la epidemia en [GetPlayer.GetName]." #NT!
 panum.209.t: "Doctor Tuberculosis" #NT!
 panum.209.d: "El director del sanatorio de tuberculosis, el Dr. [SCOPE.sCharacter('panum_new_physician_scope').GetLastName], ha ofrecido [SCOPE.sCharacter('panum_new_physician_scope').GetHerHis] servicios en medio de la furiosa epidemia." #NT!
 panum.112.f: ""Dios me habló y me llamó a Su servicio. La voz no dijo en qué forma debía realizarse ese servicio". - Florence Nightingale" #NT!
 panum.112.g: "¡Dale a [SCOPE.sCharacter('panum_new_physician_scope').GetHerHim] una posición oficial inmediatamente!" #NT!
 panum.112.h: "El médico debe formar a las futuras generaciones para luchar contra la próxima epidemia." #NT!
  
 panum.122.t: "Incubación del cólera" #NT!
 panum.122.d: "Después de varias observaciones y entrevistas, el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] descubrió que pasa cierto tiempo antes de que aparezcan los síntomas típicos del cólera en un paciente." #NT!
 panum.122.f: "El médico calcula que este período oscila entre medio día y cinco días, siendo la media de tres días. [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] ha mantenido varias conversaciones con víctimas de la enfermedad y sus familiares. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] ha podido reconstruir los hechos basándose en varios testimonios de testigos oculares. Aunque la causa sigue siendo oscura, de estas observaciones se pueden extraer conclusiones sobre lo que ocurrió exactamente el primer día." #NT!
 panum.122.g: "Bien observado." #NT!
 panum.124.g: "Observado con precisión." #NT!
 panum.123.t: "Síntomas del cólera" #NT!
 panum.123.d: "Hoy el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] envió a la Facultad de Medicina una lista completa de síntomas del cólera." #NT!
 panum.123.f: "Como ya se sabe, aunque hasta ahora sólo se ha analizado de forma rudimentaria, el cólera es una enfermedad del intestino delgado humano. Las consecuencias son una diarrea intensa con las típicas heces de color azul "como agua de arroz" y vómitos intensos. Se decía que el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] tenía cierta vena sádica porque [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] envió una descripción completa de estos y otros síntomas extremadamente desagradables a tiempo para la cena académica." #NT!
 panum.124.t: "Cólera asiática" #NT!
 panum.124.d: "En un informe muy aclamado, el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] elaboró ​​las diferencias entre el cólera y otras enfermedades similares, lo que se considera un hito en la descripción futura de la enfermedad." #NT!
 panum.124.f: "El nombre cólera, que deriva de la palabra griega bilis, se refería originalmente a todas las formas posibles de diarrea o problemas intestinales ('flujo biliar'). Aunque Jakob de Bondt ya había descrito una enfermedad de cólera específicamente india en 1642, el cólera siguió siendo un término puramente colectivo. Fue solo con la aparición de las grandes pandemias de cólera del siglo XIX que este nuevo tipo específico de cólera, que resultó ser la enfermedad más devastadora del siglo, también fue definido con un nombre propio para diferenciarlo claramente: Cólera asiática." #NT!
  
 panum.222.t: "Incubación de la tuberculosis" #NT!
 panum.222.d: "En sus investigaciones sobre la tuberculosis, el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] observó algunas rarezas relacionadas con la enfermedad. Al parecer, pueden pasar semanas antes de que una persona enferma presente síntomas típicos." #NT!
 panum.222.f: "La tuberculosis sigue siendo un misterio, ya se trate de la teoría de los miasmas o de los gérmenes. Si se trata de una enfermedad infecciosa, los síntomas pueden tardar semanas en aparecer: el médico calcula que entre dos y doce semanas. Además, no todas las personas que viven con un enfermo parecen contagiarse directamente, como se ha comprobado en numerosas encuestas a pacientes y familiares. O bien los científicos tienen razón con su teoría de que la tuberculosis no es una enfermedad infecciosa y que hay otros factores responsables, o bien el riesgo de contagio es menor de lo que se pensaba en un principio." #NT!
 panum.223.t: "Síntomas de la tuberculosis" #NT!
 panum.223.d: "Después de estudiar intensamente los síntomas de la tuberculosis, el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] llegó a una conclusión que sorprendió incluso a algunos colegas académicos: la tuberculosis es una enfermedad mucho más complicada, con una amplia variedad de síntomas que van mucho más allá de los problemas pulmonares." #NT!
 panum.223.f: "Aunque el ataque a los pulmones y su dolorosa y lenta destrucción es una de las características más conocidas de la tuberculosis, la tos es sólo uno de los muchos síntomas. La tuberculosis pulmonar es sólo un tipo de tuberculosis, que también puede afectar a otros órganos. El cansancio, la fiebre, la pérdida de apetito, los sudores nocturnos o la expectoración con sangre eran síntomas conocidos anteriormente. El hecho de que la tuberculosis no sólo ataque al organismo fuera de los pulmones, sino que puedan darse dos tipos diferentes de tuberculosis al mismo tiempo, ha cambiado significativamente la visión del mundo de algunos miembros de la Facultad de Medicina." #NT!
 panum.224.t: "Tuberculosis y escrófula" #NT!
 panum.224.d: "El Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] se ocupó intensivamente de las diversas formas de posibles enfermedades tuberculosas y, a pesar de las numerosas similitudes con otros síntomas de enfermedad, elaboró ​​las diferencias específicas entre la tuberculosis y la escrófula, pero al mismo tiempo también enfatizó las conexiones." #NT!
 panum.224.f: "La tuberculosis existe desde hace siglos, pero no tuvo efectos devastadores comparables hasta el siglo XIX debido a la menor urbanización. Se la siguió conociendo con otros nombres hasta bien entrado el siglo XIX; el término "tisis" se siguió utilizando en el mundo anglosajón hasta el siglo XX. René Laennec es considerado uno de los pioneros de la investigación sobre la tuberculosis, ya que inventó el estetoscopio para examinar los pulmones. Johann Lukas Schönlein acuñó el término tuberculosis en 1832 y lo asoció a un cuadro clínico específico. Un hallazgo importante de estos años fue que la escrófula y la tuberculosis eran dos enfermedades diferentes, pero era difícil diferenciarlas debido a la gran cantidad de síntomas de la tuberculosis." #NT!
  
 panum.322.t: "Incubación y síntomas de la viruela" #NT!
 panum.322.d: "En un resumen reciente, el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] señaló que los síntomas iniciales de la viruela no son muy distintos de los de la gripe antes de que aparezcan las infames pústulas. Se puede suponer que transcurren una o dos semanas entre la infección y los síntomas." #NT!
 panum.322.f: "'Aquellos que se curaron fácilmente de la peste me parece que habían sido previamente secados y purgados en todo el cuerpo, pues algunos vomitaron y todos tenían malestar estomacal. Y, de la misma manera, en aquellos que ya habían sido purgados y que iban a salvarse, aparecen claramente pústulas oscuras en todo el cuerpo, en la mayoría ulcerosas, en todos secas. (...) En el exterior, el cuerpo no estaba caliente al tacto, ni palidez; la piel estaba más bien roja, lívida y se cubría de pequeñas ampollas y úlceras.' -Galeno" #NT!
 panum.323.t: "¿Varicela o viruela?" #NT!
 panum.323.d: "Durante la observación de pacientes con viruela, el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] pudo presentar un informe parcial de que la varicela es una enfermedad independiente e inofensiva. Esta teoría ha sido muy controvertida hasta el momento." #NT!
 panum.323.f: "«La varicela aparece en muchas personas sin ninguna enfermedad o síntoma previo; en otras, va precedida de un ligero grado de escalofrío, lasitud, tos, sueño interrumpido, dolores erráticos, pérdida de apetito y fiebre durante tres días. La mayoría de ellas son del tamaño habitual de la viruela, pero algunas son más pequeñas. Nunca las vi confluyendo ni muy numerosas. La mayor cantidad que observé fue de unas doce en la cara y doscientas en el resto del cuerpo. Al segundo día o, como máximo, al tercer día desde el comienzo de la erupción, la mayor cantidad de viruelas que no están rotas parecen haber alcanzado su madurez completa, y las que están más llenas de ese líquido amarillo se parecen mucho a las viruelas genuinas al quinto o sexto día, especialmente cuando hay un espacio más grande de lo normal ocupado por el suero extravasado». -William Heberden" #NT!
 panum.324.t: "La diferencia entre el sarampión y la viruela" #NT!
 panum.324.d: "El Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] comparó con sumo cuidado los síntomas de los enfermos de viruela, sarampión y varicela y fue capaz de clasificarlos con mucha precisión." #NT!
 panum.324.f: "'La erupción de la viruela es precedida por una fiebre continua, dolor en la espalda, picazón en la nariz y pesadillas durante el sueño. Estos son los síntomas más agudos de su aparición junto con un notable dolor en la espalda acompañado de fiebre y picazón que siente el paciente en todo el cuerpo. Aparece una hinchazón de la cara, que va y viene, y se nota un color inflamatorio general que se nota como un fuerte enrojecimiento en ambas mejillas y alrededor de ambos ojos. Se experimenta pesadez en todo el cuerpo y gran inquietud, que se expresa como mucho estiramiento y bostezos. Hay dolor en la garganta y el pecho y se encuentra dificultad para respirar y toser. Los síntomas adicionales son: sequedad de aliento, saliva espesa, ronquera, dolor y pesadez de cabeza, inquietud, náuseas y ansiedad. Nótese la diferencia: la inquietud, las náuseas y la ansiedad ocurren con mayor frecuencia con el sarampión que con la viruela. Por otro lado, el dolor en la espalda es más evidente con la viruela que con el sarampión.' -Rhazes" #NT!
  
 panum.422.t: "Síntomas y periodos de incubación del tifus" #NT!
 panum.422.d: "En un primer informe provisional, el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] enumeró los síntomas del tifus, así como una estimación inicial de cuándo aparecen por primera vez en el curso de la enfermedad." #NT!
 panum.422.f: "'Fiebre, escalofríos, dolor de cabeza, tos, sarpullido, vómitos... todos ellos son síntomas del tifus, pero también pueden presentarse en enfermedades similares. Las náuseas y la confusión son típicas del tifus clásico. La evolución típica de la fiebre es un aumento de la temperatura durante dos o tres días, seguido de una fiebre continua de unos diez días y una posterior defervescencia durante varios días. Según mis cálculos, transcurren entre el contagio y la aparición de los primeros síntomas entre diez y catorce días.'" #NT!
 panum.423.t: "La fiebre del campamento" #NT!
 panum.423.d: "Después de que el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] compara los informes históricos de epidemias en el ejército con los síntomas actuales de quienes padecen tifus, llega a la conclusión de que equiparar el tifus con la "fiebre del campamento" es de poca ayuda." #NT!
 panum.423.f: ""Es, sin duda, una fiebre de campo, pero ¿es LA fiebre de campo?" El Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] hizo preguntas como estas que hicieron reflexionar a los miembros de la Facultad de Medicina. Históricamente conocida como "fiebre de campo", se ha asociado durante mucho tiempo con epidemias en los principales ejércitos o cuarteles, en particular como la enfermedad que infligió bajas masivas en el ejército napoleónico. Pero no todas las enfermedades del ejército conocidas como "fiebre de campo" pueden equipararse con el tifus. La fiebre recurrente y la fiebre de las trincheras son otras enfermedades que se sabe que han afectado al personal militar en espacios confinados. Por otro lado, la enfermedad que particularmente azotó durante la Guerra Civil estadounidense, a menudo se conoce como tifus, pero en realidad era fiebre tifoidea." #NT!
 panum.424.t: "Tifus: ¿Dos enfermedades en una?" #NT!
 panum.424.d: "Al examinar a pacientes con tifus, el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] descubrió que varias suposiciones eran fundamentalmente erróneas. Si los médicos anteriores habían diagnosticado un "cambio patológico" en los intestinos, [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] no pudo detectar nada de esto en los que murieron de tifus. En cambio, el médico supone que la enfermedad intestinal es una enfermedad que debe distinguirse del tifus, al que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] llama "fiebre tifoidea"." #NT!
 panum.424.f: "Hasta mediados del siglo XIX, los médicos no diferenciaban entre tifus y fiebre tifoidea, sino que se consideraban simplemente manifestaciones de la misma enfermedad con distintos grados de sintomatología. En 1836, el médico norteamericano William Gerhard observó que en algunos enfermos de tifus los intestinos no se veían afectados por la enfermedad, a pesar de que hasta entonces había sido uno de los síntomas más diagnosticados. Además, observaciones similares le llevaron a creer que el tifus no era una enfermedad de los intestinos, sino que atacaba a otros órganos: la confusión mental y los dolores musculares eran mucho más frecuentes que los problemas del tracto digestivo. La identificación durante siglos del tifus y la fiebre tifoidea no sólo ha dado lugar a una similitud en los nombres, sino también a que en algunos idiomas la fiebre tifoidea se denomine tifus, por ejemplo en alemán." #NT!
  
 panum.522.t: "Dos cursos de la fiebre amarilla" #NT!
 panum.522.d: "En su atenta observación de la fiebre amarilla, el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] descubrió que la enfermedad puede progresar de dos maneras." #NT!
 panum.522.f: "El doctor ha descubierto que en muchos casos conocidos la fiebre amarilla tiene una manifestación leve que pasa al cabo de unos días. Se calcula que cinco de cada seis pacientes padecen esta forma leve de fiebre amarilla. La otra forma de la enfermedad es peligrosa y puede ser mortal. Los pacientes sufren una segunda forma tóxica. Se caracteriza por fiebre recurrente, acompañada de ictericia por daño hepático, así como dolor abdominal. Las hemorragias en la boca, la nariz, los ojos y el tracto gastrointestinal provocan vómitos con sangre, de ahí uno de los nombres en español para la fiebre amarilla, el vómito negro. También puede haber insuficiencia renal, hipo y delirio. Se calcula que entre el 20 y el 50 por ciento de las víctimas de fiebre amarilla que llegan a esta segunda fase de la enfermedad mueren - concluye el académico en el informe presentado." #NT!
 panum.523.t: "Temporadas de fiebre amarilla" #NT!
 panum.523.d: "El Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha descubierto que las epidemias de fiebre amarilla siguen un cierto patrón temporal." #NT!
 panum.523.f: "Los registros históricos y los datos actuales sugieren que la fiebre amarilla se presenta principalmente en verano. El Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] aún no ha podido explicar por qué la enfermedad no se presenta anualmente como la gripe, sino que desaparece por completo después de largos períodos de tiempo. Es sorprendente que la fiebre amarilla fuera especialmente rampante en años lluviosos." #NT!
 panum.524.t: "¿Una enfermedad local?" #NT!
 panum.524.d: "Al describir la enfermedad de la fiebre amarilla, el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] enfatiza el hecho de que la fiebre amarilla es una enfermedad que se limita a ciertos territorios y se propaga principalmente en zonas pantanosas y tropicales, con algunas excepciones." #NT!
 panum.524.f: "El Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha revisado varios informes y registros de otras epidemias de fiebre amarilla. Lo que llama la atención es que éstas se produjeron en una zona muy limitada. Las regiones tropicales y pantanosas de África y América son las más afectadas. Aunque en algunos casos la epidemia se está extendiendo más al norte -por ejemplo a Filadelfia en los EE.UU. y a Barcelona en España- el médico está convencido de que ciertas zonas climáticas tienen algo que ver con la aparición de la enfermedad. El hecho de que haya habido brotes aislados de la enfermedad en puertos ingleses no preocupa a [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] - porque la enfermedad no se ha propagado mucho más allá de la zona circundante de la ciudad portuaria." #NT!
  
 notification_panum_description_progress_notification_name: "Descripción de la enfermedad Progreso" #NT!
 notification_panum_description_progress_notification_desc: "Nuestro [concept_panum_physician] Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha obtenido nuevos conocimientos al observar la enfermedad epidémica y ha obtenido una pista adicional." #NT!
  
 panum_antitoxins_tech: "Antitoxinas" #NT!
 panum_antitoxins_tech_desc: "Una antitoxina es un anticuerpo con la capacidad de neutralizar una toxina específica. Las antitoxinas contra las toxinas de la difteria y el tétanos fueron producidas por Emil Adolf von Behring y sus colegas a partir de 1890 y se consideran uno de los grandes hitos de la historia de la medicina." #NT!
  
