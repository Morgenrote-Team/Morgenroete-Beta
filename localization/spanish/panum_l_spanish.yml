 je_group_panum_medicine: "Morgenröte: #ORANGE Medicina Panum#!" #NT!
  
 je_panum_cholera: "Epidemia de cólera" #NT!
 je_panum_cholera_reason: "El cólera es considerada la peor epidemia del siglo XIX. Tiene un significado similar para la época victoriana al de la plaga en la Edad Media. Se propaga más rápido que cualquier otra enfermedad y se presenta en una variedad mortal.\n\nLa invención del #ORANGE Alcantarillado Moderno#! tiene especial importancia en la lucha contra el cólera. Con esta tecnología, un [concept_panum_physician] puede encontrar un #V Tratamiento para el cólera#!. Incluso un sistema de salud moderadamente bueno ayudará. Todo esto conduce a una mejor prevención y cura de la enfermedad. Las capitales que un [concept_gaudi_architect] equipa con un moderno sistema de alcantarillado están, en principio, protegidas de los brotes de cólera.\n\nPara derrotar al cólera de una vez por todas, se necesita una #V vacuna contra el cólera#! desarrollada por un [concept_theiler_biologist] ." #NT!
 je_panum_tuberculosis: "Epidemia de tuberculosis" #NT!
 je_panum_tuberculosis_reason: "Junto con el cólera, la tuberculosis fue una de las causas de muerte más comunes en el siglo XIX. La "muerte blanca" comenzó como una enfermedad romántica y, con el tiempo, se convirtió cada vez más en una enfermedad del proletariado. La tuberculosis se limita principalmente a unos pocos estados con bajos niveles de vida y alta urbanización.\n\nLa invención de la #ORANGE pasteurización#! tiene una importancia especial en la lucha contra la tuberculosis. Con esta tecnología, un [concept_panum_physician] puede encontrar un #V tratamiento para la tuberculosis#!. Un buen sistema de salud ayudará. Todo esto conduce a una mejor prevención y cura de la enfermedad. En casos raros, pueden surgir balnearios climáticos como respuesta a la tuberculosis, aunque con resultados curativos cuestionables.\n\nPara derrotar a la tuberculosis de una vez por todas, se necesita una #V vacuna contra la tuberculosis#! desarrollada por un [concept_theiler_biologist]." #NT!
 je_panum_smallpox: "Epidemia de viruela" #NT!
 je_panum_smallpox_reason: "La viruela es una de las grandes plagas de la humanidad que ha diezmado pueblos enteros. Debido a la variolización y la vacunación antivariólica, perdió su terror en el transcurso del siglo XVIII, pero sin precauciones todavía puede mostrar su fea cara.\n\nLa invención de la #ORANGE Vacunación#! tiene una importancia especial en la lucha contra la viruela. Con esta tecnología, un [concept_panum_physician] puede encontrar un #V Tratamiento para la viruela#!. Ya un sistema de salud rudimentario ayudará. Todo esto conduce a una mejor prevención y cura de la enfermedad.\n\nPara derrotar a la viruela de una vez por todas, se necesita una #V Vacuna contra la viruela#! que sea desarrollada por un [concept_theiler_biologist]." #NT!
 je_panum_typhus: "Epidemia de tifus" #NT!
 je_panum_typhus_reason: "Aunque el tifus se conoce desde finales de la Edad Media, sus efectos más devastadores se produjeron durante las guerras napoleónicas, por lo que siguió siendo terrible durante las generaciones posteriores a 1815. La fiebre tifoidea puede propagarse rápidamente a varios países, siendo especialmente afectadas las regiones con mayor devastación. Por ello, se considera una enfermedad clásica de guerra y afecta sobre todo a los soldados y a sus estrechos cuarteles.\n\nLa invención de los #ORANGE antibióticos#! tiene una importancia especial en la lucha contra el tifus. Con esta tecnología, un [concept_panum_physician] puede encontrar un #V tratamiento para el tifus#!. Un sistema sanitario rudimentario ya puede ayudar. Todo ello conduce a una mejor prevención y curación de la enfermedad.\n\nPara derrotar al tifus de una vez por todas, se necesita una #V vacuna contra el tifus#! desarrollada por un [concept_theiler_biologist]." #NT!
 je_panum_yellow_fever: "Epidemia de fiebre amarilla" #NT!
 je_panum_yellow_fever_reason: "La fiebre amarilla es una enfermedad regional que se da cerca de los trópicos, pero en el siglo XIX se extendió al sur de los EE. UU. y Europa. Por lo general, solo se propaga en unos pocos estados, pero no por ello deja de causar estragos.\n\nLa invención de la #ORANGE Prevención de la malaria#! tiene una importancia especial en la lucha contra la fiebre amarilla. Con esta tecnología, un [concept_panum_physician] puede encontrar un #V Tratamiento para la fiebre amarilla#!. Ya un sistema de salud rudimentario ayudará. Todo esto conduce a una mejor prevención y cura de la enfermedad.\n\nPara derrotar a la fiebre amarilla de una vez por todas, se necesita una #V Vacuna contra la fiebre amarilla#! desarrollada por un [concept_theiler_biologist]." #NT!
  
 panum.100.t: "La epidemia de cólera de [TimeKeeper.GetCurrentDate.Format('y')]" #NT!
 panum.100.d: "#YELLOW Cólera#!, uno de los peores flagelos de la humanidad, se ha extendido a una de nuestras ciudades. Han comenzado tiempos oscuros. Debemos esperar que se extienda por todo el país y que pase factura." #NT!
 panum.100.f: "El cólera, endémico del este de Asia, probablemente se manifestó en el subcontinente indio durante varios siglos en forma de epidemias localizadas, pero no se conocía en otros continentes. La primera pandemia se produjo entre 1817 y 1824 y afectó a partes de Asia, así como a África Oriental y Asia Menor y, posteriormente, a Rusia y Europa. En 1830 apareció en Galicia Oriental y Hungría, y en junio de 1831 en Viena. Azotó al mundo en un total de seis pandemias y se convirtió en el azote de la naciente sociedad industrial. Aunque la mayoría de las infecciones (alrededor del 85 por ciento) son asintomáticas, la tasa de mortalidad al principio es de entre el 20 y el 70 por ciento, si la enfermedad no se trata." #NT!
 panum.100.g: "Grim Reaper está a nuestra puerta." #NT!
 panum.102.t: "La epidemia de cólera llega a [SCOPE.sCountry('panum_infected_country').GetName]" #NT!
 panum.102.d: "Hemos recibido informes de que hoy se han registrado los primeros casos de cólera en la zona. Las autoridades nos culpan de no haber hecho lo suficiente para evitar su propagación." #NT!
 panum.102.g: "¿Se supone que esto es culpa nuestra...?" #NT!
 panum.103.t: "El cólera en las fábricas" #NT!
 panum.103.d: "Varias fábricas de [SCOPE.sState('panum_disease_state').GetName] informan de los primeros casos de cólera entre los trabajadores. Las autoridades locales están proponiendo regulaciones para combatir la propagación. Eso tendría un impacto enorme en la industria." #NT!
 panum.103.f: "El primer caso de cólera se produjo la semana pasada en un molino de agua situado en las afueras de la ciudad. Aunque el edificio fue puesto en cuarentena, se produjeron más incidentes en varias fábricas situadas río abajo. Aún no está del todo claro cómo se propagó la enfermedad, pero algunos políticos locales coinciden en que se deben aplicar restricciones más duras para recuperar la confianza perdida entre la población." #NT!
 panum.103.g: "¡Pongamos en cuarentena las fábricas!" #NT!
 panum.103.h: "¡Las fábricas deben seguir funcionando a toda costa!" #NT!
 panum.104.t: "¡[SCOPE.sCharacter('disease_victim_scope').GetFullName] ha contraído el cólera!" #NT!
 panum.104.d: "Hace apenas unos días [SCOPE.sCharacter('disease_victim_scope').GetFullName] parecía estar completamente sano, pero anoche [SCOPE.sCharacter('disease_victim_scope').GetSheHe] mostró los primeros síntomas de la terrible enfermedad que se ha apoderado de [ROOT.GetCountry.GetNameNoFlag]. La salud de [SCOPE.sCharacter('disease_victim_scope').GetHerHis|U] es deplorable." #NT!
 panum.104.f: "Las dos primeras oleadas de cólera del siglo XIX también se cobraron la vida de personajes célebres. En Prusia, el filósofo Georg Friedrich Wilhelm Hegel y el general August Neidhardt von Gneisenau murieron en la epidemia de cólera de 1831. El compositor Piotr Ilich Chaikovski también es considerado víctima del cólera, aunque las circunstancias (ingestión consciente o inconsciente de agua contaminada) son controvertidas." #NT!
 panum.104.g: "¡Asegure el mejor tratamiento posible!" #NT!
 panum.104.h: "Nuestro mejor médico atenderá a [SCOPE.sCharacter('disease_victim_scope').GetHerHim] personalmente." #NT!
 panum.104.i: "[SCOPE.sCharacter('disease_victim_scope').GetSheHe|U] no es tan importante..." #NT!
 panum.105.t: "El éxodo de los ricos" #NT!
 panum.105.d: "La clase alta de [SCOPE.sState('panum_disease_state').GetName] utiliza sus recursos económicos para abandonar la zona lo antes posible o para escapar al campo. Se pagaron numerosos sobornos para eludir las normas de cuarentena. La gente común ve este hecho con desprecio." #NT!
 panum.105.f: "Una de las características del cólera era que mataba por igual a ricos y pobres, lo que lo hacía similar a la peste de la Edad Media. Por lo tanto, las familias influyentes y ricas hicieron todo lo posible para evitar la plaga. La aristocracia veía al cólera como una especie de "enfermedad revolucionaria" porque no hacía distinción entre clases. Las medidas laxas hacia la clase alta convirtieron al cólera en un problema político debido a estos conflictos sociales. A menudo se ha afirmado que las epidemias de cólera de principios de la década de 1830 en Europa y los movimientos revolucionarios se dieron en un contexto." #NT!
 panum.105.g: "Déjalos ir." #NT!
 panum.105.h: "Hay un motivo por el cual lo llamamos EL GRAN IGUALADOR." #NT!
 panum.106.t: "La oposición intenta explotar el cólera" #NT!
 panum.106.d: "La oposición utiliza la epidemia para ajustar cuentas: acusa al gobierno de cometer enormes errores en la lucha contra la epidemia." #NT!
 panum.106.f: "Debido a sus implicaciones sociales y políticas, las epidemias de cólera fueron un tema en el que los liberales en particular podían culpar a los conservadores. Se recomendaron medidas más progresistas y nuevos métodos como alternativa a la élite "atrasada". No debería sorprender que esta ruptura entre conservadores y liberales se repitiera en diferentes circunstancias y con diferentes partidos." #NT!
 panum.106.g: "Tienes razón, nosotros estamos equivocados. ¡Ahora luchemos contra la epidemia!" #NT!
 panum.106.h: "Este gobierno tiene la situación perfectamente bajo control." #NT!
 panum.107.t: "Fosas comunes" #NT!
 panum.107.d: "Las nuevas fosas comunes excavadas en [SCOPE.sState('panum_disease_state').GetName] son objeto de crecientes críticas. Sobre todo entre las clases bajas, se trata de un proceso casi mecánico, en lugar de un tratamiento adecuado de los muertos." #NT!
 panum.107.f: "En vista de las muertes masivas y los posibles riesgos de contagio, el entierro masivo de los muertos se convirtió en un fenómeno inevitable. El hecho de que los ciudadanos más ricos pudieran permitirse un funeral al estilo habitual, mientras que los cadáveres de los pobres eran enterrados con sencillez, provocó una explosión social." #NT!
 panum.107.g: "¡No tenemos tiempo que perder con los funerales!" #NT!
 panum.107.h: "Todos merecen un entierro digno." #NT!
 panum.108.t: "Hospitales de cólera" #NT!
 panum.108.d: "Varios partidos políticos, por sus propios intereses, han decidido crear hospitales para enfermos de cólera destinados a atender a las clases bajas, pero no gozan de gran popularidad." #NT!
 panum.108.f: "La construcción de hospitales masivos durante epidemias como el cólera o la tuberculosis fue a menudo controvertida. Las familias preferían cuidar a sus enfermos en casa en lugar de dejarlos en el anonimato, donde eran hacinados en un pequeño espacio con otros enfermos, por lo que muchos estaban convencidos de que allí enfermarían y morirían. Circuló la acusación de que se trataba principalmente de una medida para aislar a los pobres de los ricos y así proteger a estos últimos." #NT!
 panum.108.g: "¡Golpéalos en los hospitales si es necesario!" #NT!
 panum.108.h: "No puedes obligar a estos bueyes testarudos a vivir." #NT!
 panum.109.t: "Pánico público" #NT!
 panum.109.d: "A pesar de los mejores esfuerzos del gobierno local en [SCOPE.sState('panum_disease_state').GetName], la población ha comenzado a sucumbir a una de las partes más peligrosas de cualquier brote: el pánico." #NT!
 panum.109.f: "'Es fácil pensar que estamos por encima de cualquier otra bestia en esta Tierra, pero si le quitamos la capa de razón, nos damos cuenta de que el hombre sigue siendo un animal, gobernado por el miedo y el terror de un mañana desconocido. El brote y la propagación de enfermedades pueden llenar de terror incluso los corazones de las tropas veteranas, porque ¿quién puede luchar contra un enemigo que ni siquiera puede ver? No, el terror puede carcomer sus corazones y dejarlos viendo enemigos en cada esquina, y donde hay enemigos, hay enemigos a los que luchar. El hombre enfermo, apedreado para mantenerlos alejados. Los susurros sobre esa familia que no ha salido de su puerta. El hombre tranquilo y honesto trae a casa un arma, temeroso de que el próximo golpe a la puerta traiga pequeños robos y hurtos, no ayuda.\n\nEste no es el fin del mundo. Es el fin del engaño: el hombre es un animal y tiene miedo.'\n\nUn extracto de un artículo de noticias sobre el brote de [TimeKeeper.GetCurrentDate.Format('y')], del [SCOPE.sState('panum_disease_state').GetName] Times." #NT!
 panum.109.g: "¡Maldito miedo! ¿Cómo podemos ayudarlos si no entran en razón?" #NT!
 panum.110.t: "Propósito común" #NT!
 panum.110.d: "El brote de cólera en [SCOPE.sState('panum_disease_state').GetName] parece haber fomentado un sentimiento de unidad nacional, y la gente de la región se unió para tratar de combatir el brote." #NT!
 panum.110.f: "'Una sala de hospital es un lugar sombrío, porque nos recuerda que vivimos en un mundo enfermizo. Pero a esa enfermedad no le importa quién eres: no le importa qué religión profesas, el amo que tienes, el color de tu piel o la política que llevas en el corazón. Miras a la cama y ves a un hombre, o a una mujer, o a un niño. Ves gente que necesita ayuda. No les importa quién se la trae. No les importa si el médico es un sacerdote, o un soldado, o un trabajador común que ofrece el poco tiempo que tiene libre, arriesgándose para ayudar a un extraño. No lo miran para ver a un monárquico, o a un republicano, o a un agitador, o cualquier otra cosa que lo que realmente son. Lo miran y ven a un hombre. Un hermano, un hijo, un compatriota, pero sobre todo, un semejante.'\n\nUn extracto de un artículo de noticias sobre el brote de [TimeKeeper.GetCurrentDate.Format('y')], del [SCOPE.sState('panum_disease_state').GetName] Times." #NT!
 panum.110.g: "¡Estamos unidos contra el cólera!" #NT!
 panum.111.t: "El horror" #NT!
 panum.111.d: "En [SCOPE.sState('panum_disease_state').GetName] se están acumulando montañas de cadáveres. No queda nadie que no conozca a al menos un conocido que haya sido infectado por el cólera. La región se ha convertido en un epicentro de la epidemia." #NT!
 panum.111.f: "En 42 años, entre 1831 y 1873, Berlín sufrió trece epidemias de cólera. Las epidemias de 1848/49, 1852, 1855 y 1866 fueron especialmente graves en toda Prusia. En esta última, murieron oficialmente 114.683 personas a causa de la enfermedad. El brote de cólera que se produjo en Londres en 1848/1849 fue mucho más grave que el de 1832/1832. Durante este brote, murieron en Londres 15.000 personas, más del 0,5 por ciento de una población de la ciudad que en aquel momento era de unos 2,5 millones de habitantes. En la primera semana de septiembre de 1849, murieron 300 personas al día. En la tercera pandemia, entre 1852 y 1860, murieron alrededor de un millón de personas en Rusia, lo que se vio facilitado por la Guerra de Crimea que se estaba desarrollando al mismo tiempo. El comandante en jefe británico, Lord Raglan, y el comandante de la flota francesa, Armand Joseph Bruat, murieron a causa de la enfermedad. Se cree que murieron más personas por cólera que por combates." #NT!
 panum.111.g: "¿¡Cuántos muertos más!?" #NT!
  
 panum.120.t: "La epidemia de cólera termina" #NT!
 panum.120.d: "Todo el país respira aliviado: las autoridades acaban de comunicar que ya no hay casos de cólera en la última zona afectada. El estado de emergencia ha terminado. Ahora es el momento de contar los muertos y volver a la normalidad." #NT!
 panum.120.f: "'¡Que Dios esté conmigo! Que el Cielo bendiga este Año Nuevo. Que sea un año de fecundidad, de paz y prosperidad; que sea un año de paz y de unidad para toda la humanidad; Que el mundo quede libre del cólera.' -Giacomo Meyerberr" #NT!
 panum.120.g: "¿Pero a qué precio?" #NT!
  
 panum.200.t: "Epidemia de tuberculosis" #NT!
 panum.200.d: "Ha estallado una epidemia en uno de nuestros estados: ¡La #YELLOW tuberculosis#! está causando estragos en [SCOPE.sState('panum_disease_state').GetName]!" #NT!
 panum.200.f: "En la Alta Edad Media, la tuberculosis tenía un papel menor en Europa debido a la escasa población. Solo estaba más presente en las pocas áreas metropolitanas. Después de un brote anterior en Italia en la segunda mitad del siglo XV, la ola de tuberculosis más grande y prolongada de la historia comenzó en el siglo XVII. La tuberculosis ganó un amplio interés en los siglos XIX y principios del XX como enfermedad endémica de los pobres urbanos. En 1815, una cuarta parte de las muertes en Inglaterra y en 1918 en Francia fueron causadas por tuberculosis. Alrededor de 1880, una de cada dos muertes en Alemania en el grupo de edad de 15 a 40 años se debía a esta enfermedad. La tuberculosis también era la causa más común de muerte en las zonas rurales." #NT!
 panum.200.g: "¿Hay al menos tiempo para una muerte romántica?" #NT!
  
 panum.220.t: "La epidemia de tuberculosis termina" #NT!
 panum.220.d: "Los médicos de la ciudad y del campo informan de que hace ya varias semanas que se ha superado el punto álgido de los casos de tuberculosis. Aunque la enfermedad no ha desaparecido por completo, se ha recuperado dentro de los límites habituales." #NT!
 panum.220.f: ""No puedo engañarme con ese color; esa gota de sangre es mi sentencia de muerte; debo morir". -John Keats" #NT!
  
 panum.300.t: "Epidemia de viruela" #NT!
 panum.300.d: "Ha estallado una epidemia en uno de nuestros estados: ¡La viruela #YELLOW está causando estragos en [SCOPE.sState('panum_disease_state').GetName]!" #NT!
 panum.300.f: "La viruela es conocida desde hace miles de años y apareció en los primeros asentamientos del noreste de África hace 12.000 años. Desde allí, es posible que la trajeran a la India los comerciantes egipcios. Los conquistadores europeos trajeron la viruela consigo a América, donde causó epidemias devastadoras entre los indios a partir de 1518, causando millones de muertes. En Europa, la viruela se consideraba a veces una enfermedad infantil y la enfermedad, por la que moría hasta el 10% de todos los niños pequeños hasta finales del siglo XVIII, también se denominaba “enfermedad infantil”. A partir del siglo XVIII, los casos de viruela aumentaron y sustituyeron a la peste como la peor enfermedad. Se estima que 400.000 personas morían de viruela cada año y un tercio de los que sobrevivían quedaban ciegos. A menudo, los niños solo eran considerados parte de la familia una vez que habían sobrevivido a la viruela. A pesar de la exitosa introducción de la vacunación contra la viruela alrededor de 1800, la viruela siguió siendo una enfermedad epidémica hasta la segunda mitad del siglo." #NT!
 panum.300.g: "Supongo que los productos cosméticos pronto se volverán populares." #NT!
  
 panum.320.t: "La epidemia de viruela termina" #NT!
 panum.320.d: "La terrible viruela, una de las peores plagas de la humanidad, está desapareciendo lentamente de [ROOT.GetCountry.GetNameNoFlag]. Los que sobrevivieron quedaron marcados de por vida." #NT!
 panum.320.f: "“Las naciones futuras sólo sabrán por la historia que la repugnante viruela ha existido y que ustedes la han erradicado”. -Thomas Jefferson" #NT!
  
 panum.400.t: "Epidemia de tifus" #NT!
 panum.400.d: "Ha estallado una epidemia en uno de nuestros estados: ¡El tifus #YELLOW#! está causando estragos en [SCOPE.sState('panum_disease_state').GetName]!" #NT!
 panum.400.f: "El tifus, que probablemente existió en la antigüedad, pero que sólo se describió de manera fiable en el siglo XVI, apareció principalmente como una epidemia típica de guerra y miseria. El tifus se convirtió en un problema grave para el ejército de Napoleón durante la campaña de Rusia. Cuando la Grande Armée, que se había trasladado a Rusia en junio de 1812, se retiró en el otoño de 1813, Maguncia fue la primera parada en suelo francés. Allí murieron entre 15.000 y 17.000 tripulantes franceses y otros tantos civiles. La enfermedad, que entonces también se llamaba "fiebre nerviosa" debido a los síntomas neurológicos que provocaba, permaneció en el idioma francés como tifus de Maguncia. A finales de octubre de 1814, se habían registrado 14.000 casos de tifus en la zona de Franconia alrededor del Gran Ducado de Wurzburgo, de los cuales 2.500 fueron mortales. Otra epidemia con alrededor de dos millones y medio de muertos ocurrió como resultado de la guerra y la guerra civil entre 1918 y 1922 en Rusia." #NT!
 panum.400.g: "¿Quizás cambiarte de ropa?" #NT!
  
 panum.420.t: "La epidemia de tifus termina" #NT!
 panum.420.d: "Parece que la peor fase de la epidemia de tifus ya ha pasado. Aunque todavía no se ha completado el recuento de víctimas, ya está claro que nadie puede ser considerado responsable de este terrible brote." #NT!
 panum.420.f: "Los únicos pacientes ingleses que he conocido que rechazan el té han sido casos de tifus; y la primera señal de que estaban mejorando fue que volvieron a tener ganas de tomar té. -Florencia Ruiseñor" #NT!
  
 panum.500.t: "Epidemia de fiebre amarilla" #NT!
 panum.500.d: "Ha estallado una epidemia en uno de nuestros estados: ¡la #YELLOW fiebre amarilla#! está causando estragos en [SCOPE.sState('panum_disease_state').GetName]!" #NT!
 panum.500.f: "La fiebre amarilla es endémica de las zonas tropicales y subtropicales de Sudamérica y África. En los siglos XVIII y XIX, también se vio afectada América Central, el Caribe y el sur de lo que hoy es Estados Unidos. La enfermedad probablemente se originó en África y llegó al Nuevo Mundo a través del comercio triangular del Atlántico. El primer brote probable de la enfermedad se produjo en Yucatán en 1648, donde se la denominó xekik (vómito negro). A continuación se produjeron al menos 25 brotes importantes, como el de Filadelfia en 1793, en el que murieron varios miles de personas y el gobierno estadounidense y el entonces presidente George Washington se vieron obligados a abandonar la ciudad. Una de las primeras descripciones médicas de la fiebre amarilla en América del Norte fue la de John Lining (1756), un médico de Charleston, donde se produjeron casos de fiebre amarilla en 1728 y 1732. También se registraron brotes ocasionales en Europa, por ejemplo en Barcelona en 1821 con varios miles de muertes. En 1867 hubo una erupción en Fort Jefferson, en Florida. En 1878, una erupción en el valle del Misisipi mató a 20.000 personas, y la última erupción en Estados Unidos fue en Nueva Orleans en 1905." #NT!
 panum.500.g: "¿Tiene la culpa la fruta en mal estado?" #NT!
  
 panum.520.t: "Termina la epidemia de fiebre amarilla" #NT!
 panum.520.d: "Después de que calles enteras y familias hayan sido arrasadas por la insidiosa fiebre amarilla, los médicos y las autoridades dan el visto bueno: la epidemia finalmente ha terminado." #NT!
 panum.520.f: ""Se llama fiebre amarilla, pero no se parece a nada conocido ni leído por los médicos". -Thomas Jefferson" #NT!

 ### 2.2.3 ###

 building_panum_tuberculosis_sanatorium: "Sanatorio de tuberculosis" #NT!
 pmg_panum_sanatorium: "Sanatorio de tuberculosis" #NT!
 pm_panum_sanatorium: "Sanatorio de tuberculosis" #NT!
 building_panum_tuberculosis_sanatorium_tt: "Se puede fundar un sanatorio para tuberculosos tras una epidemia de tuberculosis en zonas montañosas. #R Solo se activa mediante un evento.#!" #NT!
  
 panum_tuberculosis: "Tuberculosis" #NT!
 panum_tuberculosis_desc: "La tuberculosis, también conocida como la “muerte blanca”, fue una de las principales causas de muerte en la época victoriana." #NT!
  
 panum_forbidden_spitting_modifier: "Prohibición de escupir" #NT!
 panum_tuberculosis_quarantine_modifier: "Cuarentena por tuberculosis" #NT!
 panum_tuberculosis_sanatorium_cost_modifier: "Costo del sanatorio" #NT!
 panum_help_against_tuberculosis_modifier: "Ayuda contra la tuberculosis" #NT!
 panum_praised_for_tuberculosis_initiative_modifier: "Elogiado por su discurso sobre la tuberculosis" #NT!
 panum_supports_health_care_initiative_modifier: "Apoya la iniciativa de atención sanitaria" #NT!
 panum_opposes_health_care_initiative_modifier: "Se opone a la iniciativa de atención sanitaria" #NT!
 panum_tuberculosis_hospital_modifier: "Hospital de tuberculosis" #NT!
  
 panum.201.t: "La tuberculosis se extiende a [SCOPE.sState('panum_disease_state').GetName]" #NT!
 panum.201.d: "La epidemia de tuberculosis se ha extendido a pesar de nuestros mejores esfuerzos. Ahora también está haciendo estragos en [SCOPE.sState('panum_disease_state').GetName]." #NT!
 panum.201.g: "La muerte blanca parece imparable." #NT!
 panum.202.t: "¿Una enfermedad hereditaria?" #NT!
 panum.202.d: "A pesar de todos los estudios médicos, el origen de la tuberculosis sigue siendo un tema controvertido. Algunos médicos suponen que se trata de una enfermedad hereditaria o, al menos, que se basa en "factores internos". Otros médicos opinan que se trata de una enfermedad clásica y contagiosa y recomiendan medidas radicales." #NT!
 panum.202.f: "En cuanto al concepto de patogenia, en los países europeos de los siglos XVIII y XIX existían diferentes tradiciones. Muchos autores médicos de la época consideraban que la tuberculosis, o tisis, que no siempre era sinónimo de ella, era la peor de las epidemias conocidas en la época. Veían como causas la distribución desigual de los humores corporales, las ominosas exhalaciones del suelo, la urbanización o el declive de las costumbres. En Italia, en cambio, existía una tendencia tradicional hacia una causa contagiosa, es decir, transmisible. Por ello, a mediados del siglo XVIII, la República de Venecia introdujo la obligación escrita de comunicar los casos de tisis (tisis debida a tuberculosis pulmonar). Los objetos personales de los que morían a causa de la enfermedad se quemaban para reducir el riesgo de contagio. En Inglaterra y los países nórdicos, en cambio, se creía generalmente que la enfermedad se debía a una causa hereditaria." #NT!
 panum.202.g: "Es una enfermedad hereditaria y no hay nada que podamos hacer." #NT!
 panum.202.h: "¡Es una enfermedad contagiosa y debemos hacer todo lo posible para evitar que se propague!" #NT!
 panum.203.t: "Escupir en las calles" #NT!
 panum.203.d: "Debido a la falta de conocimiento sobre las causas de la tuberculosis, las medidas también fueron controvertidas. Quienes suponían que la causa era contagiosa abogaban por prohibiciones radicales, incluso de escupir en lugares públicos, para evitar la propagación. Esto afectaba especialmente a las clases bajas. Los escépticos veían estas regulaciones como una forma de hostigar a la gente común." #NT!
 panum.203.f: "Aunque las reglas de etiqueta del siglo XVIII erradicaron algunos "malos hábitos" de las clases altas y medias, muchas peculiaridades higiénicas dudosas siguieron estando muy extendidas entre las masas durante mucho tiempo. A principios del siglo XIX, los pañuelos y las escupideras aún no se habían generalizado en la sociedad y, por ejemplo, no fue hasta finales del siglo XIX cuando se generalizó la prohibición de escupir en el transporte público." #NT!
 panum.203.g: "¡Prohíban este repugnante hábito!" #NT!
 panum.203.h: "¡Anuncia una prohibición draconiana y haz que los malhechores paguen!" #NT!
 panum.203.i: "Escupir es parte de la naturaleza humana y no se puede prohibir." #NT!
 panum.204.t: "¡[SCOPE.sCharacter('disease_victim_scope').GetFullName] ha contraído tuberculosis!" #NT!
 panum.204.d: "¡La epidemia de tuberculosis también ha afectado a nuestro artista [SCOPE.sCharacter('disease_victim_scope').GetFullName]! Sorprendentemente, [SCOPE.sCharacter('disease_victim_scope').GetSheHe] no lo ve como el peor golpe del destino." #NT!
 panum.204.f: "A principios del siglo XIX, pero también mucho después, la tuberculosis se consideraba una «enfermedad romántica». Daba a la víctima tiempo suficiente para prepararse para la muerte y muchos consideraban que la palidez asociada a ella era poco menos que noble. Los escritores le erigieron monumentos con varias obras, como Dumas el Joven con «La dama de las camelias». Encuentra una transfiguración similar en las óperas de Verdi (La Traviata) y Puccini (La Bohème). Se dice que George Sand, la pareja de Chopin, dijo: «Chopin tose con infinita gracia»." #NT!
 panum.204.i: "¿No sería esa una ocasión inspiradora para un réquiem?" #NT!
 panum.204.j: "¿Pero no ha sido siempre la tuberculosis tema de los escritores?" #NT!
 panum.204.k: "Pero ¿acaso esta misma enfermedad no nos incita a visualizar la miseria?" #NT!
 panum.205.t: "Sanatorio de tuberculosis" #NT!
 panum.205.d: "En vista de la epidemia de tuberculosis que azota a [SCOPE.sState('panum_disease_state').GetName], uno de los médicos de la zona ha sugerido que algunos pacientes ricos sean trasladados a las montañas. Se dice que el clima de gran altitud y el aire purificador los curan de la enfermedad. Debería haber un sanatorio pulmonar dedicado a este fin. [SCOPE.sState('panum_davos_scope').GetName] parece ser el lugar perfecto para un sanatorio de este tipo." #NT!
 panum.205.f: "La terapia con aire es una forma de terapia climática que se consideró durante mucho tiempo la terapia estándar contra la tuberculosis a partir del siglo XIX. Los pacientes se tumbaban en tumbonas al aire libre o en salones abiertos durante varias horas al día. El tratamiento con aire se realizaba en sanatorios pulmonares especiales. En Alemania, el médico Hermann Brehmer fue el primero en describir la tuberculosis, una enfermedad hasta entonces incurable, como curable con la ayuda de la terapia con aire. En 1856 escribió su tesis sobre la curabilidad de la tuberculosis pulmonar crónica. Partió de la base de que existen "lugares inmunes" que, por un lado, debido a su clima, protegen eficazmente a los habitantes de la aparición de la tuberculosis y, por otro lado, tienen un efecto curativo después de que la enfermedad se manifiesta. En Suiza, el médico de origen alemán Alexander Spengler fue un pionero de la terapia con aire. Comenzó a ejercer como médico rural en Davos en 1853 y pronto llegó a la conclusión de que los habitantes de la zona en general no sufrían tuberculosis, lo que atribuyó al clima de alta montaña. Thomas Mann elogió a Davos como un lugar de bienestar climático en su 'Zauberberg'." #NT!
 panum.205.g: "¡Construye un sanatorio en [SCOPE.sState('panum_davos_scope').GetName]!" #NT!
 panum.205.h: "Todo esto no es más que charlatanería de lujo." #NT!
 panum.206.t: "La enfermedad de los proletarios" #NT!
 panum.206.d: "La epidemia de tuberculosis en [SCOPE.sState('panum_disease_state').GetName] afecta con mayor dureza a las clases bajas. Por ello, [SCOPE.sCharacter('union_leader').GetFullName] ha criticado especialmente las condiciones actuales y ha pedido cambios de gran alcance." #NT!
 panum.206.f: "La tuberculosis cobró un gran interés en el siglo XIX y principios del XX como enfermedad endémica de los pobres urbanos. En 1815, una cuarta parte de las muertes en Inglaterra y en 1918, una sexta parte de las muertes en Francia se debían a esta enfermedad. Alrededor de 1880, una de cada dos muertes en Alemania en el grupo de edad de 15 a 40 años se debía a esta enfermedad." #NT!
 panum.206.g: "¿Tal vez los pobres deberían simplemente lavarse más?" #NT!
 panum.206.h: "Se justifican mejoras selectivas en este ámbito." #NT!
 panum.206.i: "La cuestión de la asistencia sanitaria es un asunto nacional." #NT!
 panum.206.j: "¡Aplausos para esta iniciativa!" #NT!
 panum.207.t: "Iniciativa religiosa" #NT!
 panum.207.d: "[SCOPE.sCharacter('devout_leader').GetFullName] ha abogado personalmente por los numerosos enfermos de [SCOPE.sState('panum_disease_state').GetName]. [SCOPE.sCharacter('devout_leader').GetSheHe|U] quisiera establecer allí pronto un hospital sin ánimo de lucro." #NT!
 panum.207.f: "«No queda casi ningún país en el que, de una forma u otra, no se haya emprendido la lucha contra la tuberculosis, y es extraordinariamente gratificante ver cómo la campaña se libra ahora de manera bastante generalizada y con considerable vigor contra este peligroso enemigo.» -Robert Koch" #NT!
 panum.207.g: "¡Estos narradores sólo están tratando de ganar influencia!" #NT!
 panum.208.t: "La peste blanca pasa factura" #NT!
 panum.208.d: "El brote de tuberculosis en [SCOPE.sState('panum_disease_state').GetName] se ha agravado. El número de enfermos y muertos aumenta cada día. Ninguno de los médicos esperaba esta evolución." #NT!
 panum.208.f: "“¡Qué pálido estoy! Me gustaría, creo, morir de tuberculosis… porque entonces todas las mujeres dirían: “¡Miren a ese pobre Byron, qué interesante se ve al morir!”. -Lord Byron" #NT!
 panum.208.g: "¿Esto nunca terminará?" #NT!

 ### 2.2.4 ###

 panum_has_physician_tt: "#default_text tiene un [concept_panum_physician].#!" #NT!
 panum_has_active_physician_tt: "#default_text Tiene un [concept_panum_physician] que no está ocupado.#!" #NT!
  
 panum_physician_experienced: "Médico experimentado" #NT!
 panum_physician_experienced_desc: "Después de pasar años trabajando para tratar pacientes, este $panum_physician$ tiene experiencia en su campo." #NT!
 panum_physician_famous: "Médico famoso" #NT!
 panum_physician_famous_desc: "Las innovaciones y descubrimientos médicos realizados por este $panum_physician$ los hacen famosos en el campo de la Medicina." #NT!
  
 panum_typhus_quarantine_modifier: "Cuarentena por tifus" #NT!
 panum_typhus_fever_sheds_modifier: "La fiebre desaparece" #NT!
 panum_typhus_rigid_rules_modifier: "Reglas rígidas" #NT!
 panum_typhus_fever_sheds_help_modifier: "Ayuda para bajar la fiebre" #NT!
 panum_additional_fever_shed_protection_modifier: "Protección contra la fiebre" #NT!
 panum_additional_funeral_aids_modifier: "Ayudas funerarias adicionales" #NT!
 panum_typhus_barracks_modifier: "Tifus en los cuarteles" #NT!
  
 panum_yellow_fever_quarantine_modifier: "Cuarentena por fiebre amarilla" #NT!
 panum_plantation_quarantine_modifier: "Cuarentena de plantación" #NT!
 panum_administrative_evacuation_modifier: "Evacuación administrativa" #NT!
 panum_yellow_fever_barracks_modifier: "Fiebre amarilla en los cuarteles" #NT!
 panum_yellow_fever_port_modifier: "Fiebre amarilla en el puerto" #NT!
  
 panum.301.t: "La viruela se propaga a [SCOPE.sState('panum_disease_state').GetName]" #NT!
 panum.301.d: "Según los últimos informes, la viruela también está muy extendida en [SCOPE.sState('panum_disease_state').GetName]. Nuestros esfuerzos por detener la epidemia han sido infructuosos." #NT!
 panum.301.g: "¡Viruela por todas partes!" #NT!
 panum.302.t: "La epidemia de viruela llega a [SCOPE.sCountry('panum_infected_country').GetName]" #NT!
 panum.302.d: "Hemos recibido informes de que hoy se han registrado los primeros casos de viruela en [SCOPE.sCountry('panum_infected_country').GetName]. Las autoridades nos culpan de no haber hecho lo suficiente para evitar la propagación." #NT!
 panum.302.g: "¿Quién lo hubiera imaginado...?" #NT!
 panum.303.t: "La viruela fuera de control" #NT!
 panum.303.d: "El sistema sanitario de la región [SCOPE.sState('panum_disease_state').GetName] está al borde del colapso. Los médicos ya están abandonando la zona porque corren el riesgo de contagiarse. Lamentablemente, tenemos que aumentar el número de muertos en la región." #NT!
 panum.303.f: "'No se ha intentado contar las víctimas, ni es posible calcularlas en ninguna de estas tribus con precisión; se cree que si se duplicara el número de 17.200 para los indios del alto río Misuri, el total no sería demasiado grande para los que cayeron al este de las Montañas Rocosas.'" #NT!
 panum.303.g: "¿No existe cura para esta terrible enfermedad?" #NT!
  
 panum.401.t: "El tifus se propaga a [SCOPE.sState('panum_disease_state').GetName]" #NT!
 panum.401.d: "Al parecer, el peligroso tifus se ha extendido a otro estado. Según informes de [SCOPE.sState('panum_disease_state').GetName], cada vez hay más personas que son víctimas de la enfermedad." #NT!
 panum.401.g: "El tifus parece imparable..." #NT!
 panum.402.t: "¿Una enfermedad de corrupción moral?" #NT!
 panum.402.d: "Dado el limitado conocimiento sobre qué es el tifus, qué lo causa y cómo combatirlo de manera eficaz, existen numerosas teorías sobre qué favorece la infección. La opinión predominante es que se trata de una enfermedad relacionada con el estilo de vida, no con la transmisión." #NT!
 panum.402.f: "Al igual que en el caso de la tuberculosis, muchos médicos consideraban que el tifus no era una enfermedad contagiosa. Mientras que la tuberculosis se consideraba casi romántica (enfermedad de románticos y, por tanto, de espíritus "nobles"), en el caso del tifus se la consideraba un estigma de descrédito moral. El hecho de que las clases altas no se vieran afectadas conducía a un cierto sentimiento de superioridad. Así como en la Edad Media las enfermedades se atribuían a menudo a la influencia o al castigo divino, parecía un hecho probado que los defectos de carácter o la depravación estaban en cierta medida relacionados con ciertas enfermedades. No fue hasta el segundo tercio del siglo XIX cuando esta visión empezó a cambiar." #NT!
 panum.402.g: "Hay una razón por la cual el tifus afecta principalmente a criminales, prostitutas y soldados inmorales." #NT!
 panum.402.h: "Probablemente importa menos quiénes son estas personas que dónde viven." #NT!
 panum.403.t: "Cuarentena" #NT!
 panum.403.d: "En particular, las clases medias y altas desean que las clases bajas afectadas por el tifus cuenten con sus propias instalaciones. Estas "casas de la fiebre" también serían financiadas por organizaciones sin fines de lucro. Sin embargo, algunos representantes de las clases más pobres ven esto más como un método de exclusión que como una medida de asistencia sanitaria. Algunos miembros del gobierno, por el contrario, desean una cuarentena total, que la clase media en particular considera una medida completamente excesiva." #NT!
 panum.403.f: "Como muchas otras epidemias, el tifus servía para segregar a la población. Por ello, la petición de una cuarentena general fue impopular en muchos lugares porque se creía que la enfermedad podía atribuirse a determinadas personas, sobre todo porque muchos creían que era hereditaria. Sin embargo, el miedo subyacente al contagio influyó, por lo que en muchos lugares se construyeron casas de enfermos con fiebre. Durante la gran epidemia de tifus en América del Norte en 1847, la idea de que se trataba de una enfermedad contagiosa se extendió tanto que masas de inmigrantes irlandeses infectados fueron deportados de facto a esas instituciones." #NT!
 panum.403.g: "Toda la zona debería ser puesta en cuarentena." #NT!
 panum.403.h: "Llevad a los enfermos de tifus a casas especiales." #NT!
 panum.403.i: "El tifus no es una enfermedad contagiosa, por lo que la cuarentena no tiene sentido." #NT!
 panum.404.t: "Cobertizos sucios" #NT!
 panum.404.d: "La situación en las supuestas casas de enfermos, que se están convirtiendo cada vez más en ataúdes llenos de heces y miseria, se ha convertido ya en un grave problema en el [SCOPE.sState('panum_disease_state').GetName]. Los pastores y los cuidadores de enfermos han escrito una carta pidiendo que se desmantelen estas terribles casas." #NT!
 panum.404.f: "Los cobertizos para enfermos con fiebre estaban sucios y abarrotados de gente; los pacientes yacían en literas de dos niveles, lo que permitía que la suciedad de la litera superior cayera sobre la inferior. Según el informe del Comité del Senado, en una litera se colocaban juntos a dos o tres inválidos, independientemente de su edad o sexo. No había pan: las comidas consistían en té, gachas o caldo, que se servían tres veces al día. Como se transportaba agua potable, nunca había suficiente para los enfermos con fiebre. Un sacerdote católico, el padre Moylan, informó de que había dado agua a los inválidos que estaban en una tienda de campaña y que no habían podido beber durante 18 horas. Los cobertizos no estaban pensados ​​originalmente para albergar a enfermos con fiebre y no tenían ventilación; se construyeron cobertizos nuevos sin letrinas. El Comité del Senado afirmó que, debido a la falta de personal y de espacio, los inválidos yacían sobre sus propios excrementos durante días y que no había personal suficiente para llevarse a los que morían durante la noche." #NT!
 panum.404.g: "No podemos arriesgarnos a que más personas se infecten." #NT!
 panum.404.h: "Mejorar la situación de los enfermos de tifus y proporcionarles ayuda médica." #NT!
 panum.404.i: "¡Desmantelemos estas casas inhumanas!" #NT!
 panum.405.t: "Disturbios contra los cobertizos de fiebre" #NT!
 panum.405.d: "El temor a la propagación del tifus en [SCOPE.sState('panum_disease_state').GetName] ha radicalizado a algunos ciudadanos hasta el punto de formar una turba furiosa. ¡Corre el rumor de que quieren empujar las casas de enfermos con fiebre y a sus pacientes al río más cercano!" #NT!
 panum.405.f: "En 1847, el número de cobertizos en Montreal aumentaría a 22, y las tropas acordonaron la zona para que los enfermos no pudieran escapar. Cuando una turba amenazó con arrojar los cobertizos para enfermos de fiebre al río, el alcalde de Montreal, John Easton Mills, sofocó el motín y brindó atención médica, dando agua a los pacientes y cambiando la ropa de cama. Murió en noviembre, después de menos de un año en el cargo." #NT!
 panum.405.g: "¡Esta barbarie no tiene cabida en nuestro país!" #NT!
 panum.405.h: "Mueren de cualquier manera." #NT!
 panum.406.t: "Cadáveres insepultos" #NT!
 panum.406.d: "El número de muertos en el [SCOPE.sState('panum_disease_state').GetName] aumenta tan rápidamente que los encargados de la funeraria apenas pueden seguir el ritmo. Existe el peligro de que los cadáveres sin enterrar provoquen problemas aún mayores." #NT!
 panum.406.f: "En la década de 1860, condiciones climáticas excepcionalmente duras y pérdidas de cosechas afligieron lo que entonces era el Gran Ducado de Finlandia, lo que provocó hambruna y enfermedades epidémicas. Entre 1866 y 1868 hubo hambruna y, especialmente, lo que en ese momento se consideró tifus, que mató a 270.000 personas en la región." #NT!
 panum.406.g: "Utilice todos los medios disponibles para evitar que este problema se vuelva abrumador." #NT!
 panum.406.h: "Cavar las fosas comunes habituales." #NT!
 panum.406.i: "¡Nuestras capacidades están agotadas, tenéis que arreglar las cosas vosotros mismos!" #NT!
 panum.407.t: "Tifus en los cuarteles" #NT!
 panum.407.d: "En la actualidad, el tifus está contaminando principalmente las instalaciones militares de [SCOPE.sState('panum_disease_state').GetName], donde provoca graves consecuencias." #NT!
 panum.407.f: "Muchos historiadores creen que el brote de tifus entre las tropas de Napoleón es la verdadera razón por la que detuvo su campaña militar en Rusia, en lugar de la hambruna o el frío. El tifus fue una importante causa de muerte durante la Guerra Civil estadounidense, aunque la fiebre tifoidea fue la causa más frecuente de la "fiebre de campamento" en la Guerra Civil estadounidense. Se han atribuido hasta 900.000 muertes a la fiebre tifoidea durante la Guerra de Crimea en 1853-1856. El tifus era endémico en Polonia y varios países vecinos antes de la Primera Guerra Mundial (1914-1918), pero se convirtió en epidemia durante la guerra. El tifus asoló los ejércitos del Frente Oriental, donde murieron más de 150.000 personas solo en Serbia. Las muertes fueron generalmente de entre el 10% y el 40% de los infectados y la enfermedad fue una de las principales causas de muerte para los cuidadores de los enfermos." #NT!
 panum.407.g: "Un enemigo invisible más letal que cualquier ejército..." #NT!
 panum.408.t: "Atormentado en la enfermedad, no en la guerra" #NT!
 panum.408.d: "La epidemia de tifus en nuestros cuarteles continúa propagándose cada día. Los soldados se encuentran entre los que más mueren en el [SCOPE.sState('panum_disease_state').GetName], y sin la influencia del enemigo." #NT!
 panum.408.f: "«La guerra no es una aventura. Es una enfermedad. Es como el tifus». Antoine de Saint-Exupéry" #NT!
 panum.408.g: "¡Horrible!" #NT!
  
 panum.501.t: "La fiebre amarilla se propaga a [SCOPE.sState('panum_disease_state').GetName]" #NT!
 panum.501.d: "Los informes sobre nuevos casos de fiebre amarilla han confirmado nuestros peores temores. ¡La enfermedad también está causando estragos en [SCOPE.sState('panum_disease_state').GetName]!" #NT!
 panum.501.g: "¿Por qué no fue posible detener esto?" #NT!
 panum.502.t: "¿Una enfermedad contagiosa?" #NT!
 panum.502.d: "Aunque no está claro si la fiebre amarilla es una enfermedad contagiosa o tiene otras causas, muchos ciudadanos preocupados por la seguridad piden que se haga cuarentena para frenar la propagación. Si no lo hacemos, podrían verlo como una muestra de ignorancia o desinterés por sus necesidades." #NT!
 panum.502.f: "Los primeros brotes de fiebre amarilla en el siglo XVII provocaron pánico y desorientación. Incluso en el siglo XVIII, la gente no estaba de acuerdo sobre qué desencadenaba una infección. Aunque los gobiernos y los individuos recurrieron a medidas estrictas o de prevención, no tuvieron éxito. El miedo a la fiebre amarilla hizo que no se desaprovechara ninguna oportunidad para evitar su propagación, a veces con medidas experimentales o draconianas. Por lo tanto, algunas acciones podían tener razones psicológicas más que médicas para evitar que aumentara el descontento entre la población." #NT!
 panum.502.g: "No hay evidencia de que sea una enfermedad contagiosa." #NT!
 panum.503.t: "La fiebre amarilla afecta las plantaciones" #NT!
 panum.503.d: "Diariamente se reciben informes de que en las plantaciones de [SCOPE.sState('panum_disease_state').GetName] en particular hay una alta tasa de enfermos de fiebre amarilla. Algunos asesores del gobierno están presionando para que se interrumpan por completo los trabajos allí para reducir la propagación." #NT!
 panum.503.f: "'Un hombre negro pobre, llamado Sampson, iba constantemente de casa en casa donde había necesidad y no había ayuda, sin honorarios ni recompensa. Fue atacado por la enfermedad y murió. Después de su muerte, su familia fue abandonada por aquellos a quienes había servido. Sarah Bass, una pobre viuda negra, brindó toda la ayuda que pudo a varias familias, por lo que no recibió nada; y cuando le ofrecieron algo, lo dejó a la elección de aquellos a quienes sirvió.' -Richard Allen" #NT!
 panum.503.g: "¡Saquen a los trabajadores de los campos!" #NT!
 panum.503.h: "¡La plantación debe seguir funcionando a toda costa!" #NT!
 panum.504.t: "Evacuación" #NT!
 panum.504.d: "La situación sanitaria en [SCOPE.sState('panum_disease_state').GetName] sigue empeorando. Miembros del gobierno local y de la administración han pedido abandonar la ciudad y organizar la administración desde el campo. Algunos lo consideran una propuesta inteligente, otros una absoluta cobardía." #NT!
 panum.504.f: "Durante la epidemia de fiebre amarilla de 1793 en Filadelfia, 5.000 o más personas fueron registradas entre el 1 de agosto y el 9 de noviembre. La gran mayoría de ellas murieron de fiebre amarilla, lo que convirtió a la epidemia en la ciudad de 50.000 habitantes en una de las más graves de la historia de los Estados Unidos. A finales de septiembre, 20.000 personas habían huido de la ciudad, incluidos funcionarios del Congreso y del ejecutivo del gobierno federal. La mayoría no regresó hasta que la epidemia hubo remitido a finales de noviembre. El presidente George Washington abandonó la ciudad para trasladarse a su finca de Mount Vernon. La tasa de mortalidad alcanzó su punto máximo en octubre, antes de que las heladas acabaran por fin con los mosquitos y pusieran fin al brote. Algunas ciudades vecinas se negaron a dejar entrar a refugiados de Filadelfia, por temor a que fueran portadores de la fiebre. Las principales ciudades portuarias, incluidas las de Baltimore y la ciudad de Nueva York, impusieron cuarentenas a los refugiados y los bienes procedentes de Filadelfia, aunque la ciudad de Nueva York envió ayuda financiera a Filadelfia." #NT!
 panum.504.g: "Evacuar a las autoridades." #NT!
 panum.504.h: "La administración local no debe colapsar." #NT!
 panum.505.t: "La fiebre amarilla se propaga a los cuarteles" #NT!
 panum.505.d: "La fiebre amarilla está contaminando actualmente sobre todo las instalaciones militares de [SCOPE.sState('panum_disease_state').GetName], donde causa estragos mortales." #NT!
 panum.505.f: "Para los rebeldes de Haití a finales del siglo XVIII y principios del XIX y casi cien años después en Cuba, la fiebre amarilla era la gran aliada contra los ejércitos coloniales enviados desde Europa. El líder de la lucha por la independencia cubana hablaba de sus "generales invencibles: junio, julio y agosto", esos meses en los que llegan las lluvias y con ellas los mosquitos. Los británicos vivieron experiencias similares durante el sitio de Cartagena en 1741. 29.000 soldados británicos sitiaron la fortaleza. Cuando comenzaron las lluvias, 22.000 perecieron miserablemente en pocas semanas. La tasa de mortalidad en las guarniciones británicas en Jamaica era siete veces mayor que en las guarniciones de Canadá, sobre todo a causa de la fiebre amarilla y otras enfermedades tropicales." #NT!
 panum.505.g: "¡No! ¡Estaban destinados a una muerte honorable en el campo de batalla!" #NT!
 panum.506.t: "Enfermedad del marinero" #NT!
 panum.506.d: "Las operaciones portuarias en [SCOPE.sState('panum_disease_state').GetName] están prácticamente paralizadas debido a la fiebre amarilla. Por un lado, muchos trabajadores portuarios y marineros están enfermos. Por otro lado, el mayor número posible de barcos intenta evitar la región maldita." #NT!
 panum.506.f: "'La fiebre amarilla está causando los estragos más deplorables en Nueva Orleans. Miles de personas han muerto y cada día se suman 200 más a este espantoso récord. Los muertos son enterrados en trincheras por cuadrillas de negros encadenados, contratados por una guinea la hora. Y así, entre las canciones y las bromas obscenas de los sepultureros, el zumbido de las moscas, los gritos cantarines de las vendedoras de dulces, los roncos juramentos de los hombres que conducen los carros de los muertos, el alegre silbido de los muchachos y el hedor sofocante de las decenas de cadáveres ennegrecidos, el día avanza rápidamente, el trabajo de sepultura está hecho y la noche baja el telón. Mientras tanto, las diversiones, las regatas, los bailes, etc., se suceden como de costumbre, como si no hubiera una peste tan espantosa en la ciudad condenada.' -Cambridge Weekly News en 1853" #NT!
 panum.506.g: "¡Un colapso para el envío!" #NT!
 panum.507.t: "Vómito negro" #NT!
 panum.507.d: "En [SCOPE.sState('panum_disease_state').GetName], la fiebre amarilla ataca con más violencia de lo esperado. Los médicos informan de que han muerto más personas que antes a causa de la enfermedad." #NT!
 panum.507.f: "“Quienes se aventuraban a salir llevaban pañuelos o esponjas impregnadas de vinagre de alcanfor en la nariz o frascos de perfume llenos del vinagre de los ladrones. Otros llevaban trozos de cuerda alquitranada en las manos o en los bolsillos, o bolsas de alcanfor atadas al cuello... La gente cambiaba de rumbo rápidamente al ver un coche fúnebre que se acercaba a ellos. Muchos nunca caminaban por la acera, sino que iban por el centro de las calles, para evitar contagiarse al pasar por las casas en las que había muerto gente. Los conocidos y amigos se evitaban entre sí en las calles y sólo demostraban su afecto con un gesto frío de la cabeza. La antigua costumbre de estrechar la mano cayó en tal desuso general que muchos retrocedían de miedo incluso ante el ofrecimiento de una mano. Una persona con crespón de luto, o cualquier apariencia de luto, era rechazada como una víbora”. -Mathew Carey" #NT!
 panum.507.g: "¿Cuándo estaremos finalmente libres de esta plaga?" #NT!
  
