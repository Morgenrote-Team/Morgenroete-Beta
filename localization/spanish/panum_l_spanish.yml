 panum_vaccination_tech: "Vacunación"
 panum_vaccination_tech_desc: "La vacuna contra la viruela es la primera vacuna que se ha desarrollado contra una enfermedad contagiosa. En 1796, el médico británico Edward Jenner demostró que una infección con el virus de la cowpóa relativamente leve confería inmunidad contra el virus de la viruela mortal."
