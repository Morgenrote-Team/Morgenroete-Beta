 panum.2007.t: "Inventos médicos"
 panum.2007.d: "Se corrió la voz en el Congreso de que había especialistas que habían tenido éxito en innovaciones médicas. Están listos para compartir su conocimiento."
 panum.2007.f: "Las innovaciones únicas en la medicina, como los trasplantes, el desarrollo de radiografías o quimioterapia, son de gran importancia para la humanidad que los inventores comparten el conocimiento sin reserva. En última instancia, se trata del bienestar de todas las personas."
 panum.2007.g: "¡Salud a la humanidad!"
 panum.2205.t: "Prueba con animales"
 panum.2205.d: "El médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] se considera un científico helado con cierta inclinación por la crueldad. Se dice que el número de animales [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] asesinados 'en beneficio de la ciencia' se encuentra en tres cifras. Sin embargo, estos experimentos tienen sus éxitos."
 panum.2205.f: "Aunque las pruebas en animales para el beneficio de la medicina han existido desde la antigüedad, fue solo en el siglo XIX que las pruebas tuvieron lugar en una escala que se desconocía anteriormente. Particularmente en el curso del descubrimiento de la teoría de los gérmenes, y luego, se llevaron a cabo numerosos experimentos en los que los animales se infectaron conscientemente con patógenos innumerables veces y literalmente se convirtieron en 'conejillos de indias' para nuevas drogas. Esta fase también vio la introducción generalizada de las pruebas y la vivisección de animales en las universidades para los estudiantes."
 panum.2205.g: "El médico es libre como [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] le agrada."
 panum.2205.h: "Los estudiantes deben aprender a diseccionar animales."
 panum.2205.i: "Esto claramente va demasiado lejos."
 panum.2411.t: "Aspirina"
 panum.2411.d: "Nuestro químico Dr. [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] ha inventado un verdadero milagro médico que podría revolucionar la farmacia: la aspirina. El Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha confirmado los efectos de alivio del dolor."
 panum.2411.f: "El ácido salicílico se ha usado medicinalmente desde la antigüedad. Los medicamentos hechos de madera de sauce y otras plantas ricas en salicilato aparecen en tabletas de arcilla del antiguo Sumer y en el papiro de Ebers del antiguo Egipto. Hipócrates se refirió a 400 a. C. antes de Cristo Sobre el uso del té salicílico para reducir la fiebre. Las plantas ricas en salicilato fueron parte de la farmacopea de la medicina occidental en la antigüedad clásica y la Edad Media. El extracto de corteza de sauce se conoció a mediados del siglo XVIII por sus efectos específicos sobre la fiebre, el dolor y la inflamación. En el siglo XIX, los farmacéuticos experimentaron y prescribieron una variedad de productos químicos asociados con la salicina, el componente activo del extracto de sauce. En 1853, el químico Charles Frédéric Gerhardt trató el cloruro de acetilo con salicilato de sodio por primera vez para producir ácido acetilsalicílico. En 1897, los científicos de las fábricas de drogas y pintura de Bayer comenzaron a estudiar el ácido acetilsalicílico como un reemplazo menos irritante del estómago para los medicamentos salicilato estándar y crearon una nueva ruta sintética sin impurezas. Para 1899, Bayer había llamado a esta aspirina y la vendía en todo el mundo."
 panum.2411.g: "El medicamento será el punto de partida para más investigaciones médicas."
 panum.2411.h: "La química seguramente abrirá aún más descubrimientos espectaculares."
 panum.2411.i: "La industria farmacéutica se beneficiará de esto."
 panum.2412.t: "Rayos X"
 panum.2412.d: "Nuestro físico Dr. [ROOT.Var('curie_physicist_var').GetCharacter.GetLastName] ha hecho un descubrimiento espectacular: [ROOT.Var('curie_physicist_var').GetCharacter.GetSheHe] ha descubierto rayos previamente desconocidos que pueden usarse para iluminar el cuerpo. El Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] destacó las posibilidades de la medicina."
 panum.2412.f: "Los rayos X son ondas electromagnéticas con energías cuánticas por encima de aproximadamente 100 eV, correspondientes a longitudes de onda por debajo de aproximadamente 10 nm. Los rayos X se encuentran en el espectro electromagnético en el rango de energía sobre la luz ultravioleta. Las radiografías fueron descubiertas en 1895 por el científico alemán Wilhelm Conrad Röntgen, quien lo nombró X-Radiation para significar un tipo desconocido de radiación. Los rayos X pueden penetrar muchas sustancias sólidas, como materiales de construcción y tejido vivo, por lo que la radiografía de rayos X se usa ampliamente en diagnósticos médicos (por ejemplo, verificación de huesos rotos) y ciencia de materiales (por ejemplo, identificación de algunos elementos químicos y detectar puntos débiles en materiales de construcción)."
 panum.2412.g: "Spooky, como ver tu propia muerte."
 panum.2413.t: "Tipos de sangre"
 panum.2413.d: "El Dr. [ROOT.Var('curie_physicist_var').GetCharacter.GetLastName] ha hecho un descubrimiento sorprendente que explicaría por qué la sangre humana a veces se mezcla y a veces grupos: aparentemente hay diferentes grupos sanguíneos. Este es un avance decisivo para donaciones de sangre y transfusiones de sangre."
 panum.2413.f: "\"Recientemente he observado y declarado que el suero de las personas normales es capaz de agrupar los glóbulos rojos de otros individuos sanos ... Como se expresa comúnmente, se puede decir que en estos casos existen al menos dos tipos diferentes de aglutininas, uno en A, el otro en B, ambas juntas en C. Las células son naturalmente insensibles a las aglutininas en su propia suero\". -Karl Landsteiner"
 panum.2413.g: "La investigación en grupos de sangre debe ser promovida."
 panum.2413.h: "Se supone que la clínica recolecta tipos de sangre y los recoge para transfusiones de sangre."
 panum.2414.t: "Electrocardiografía"
 panum.2414.d: "El Dr. [ROOT.Var('curie_physicist_var').GetCharacter.GetLastName] ha inventado un dispositivo increíble que registra la actividad eléctrica de las fibras del músculo cardíaco. El médico llama al dispositivo un electrocardiógrafo, un ECG."
 panum.2414.f: "En 1843, Carlo Matteucci se dio cuenta a través de experimentos en corazones de palomas que la actividad cardíaca se basa en procesos eléctricos. En 1882, el fisiólogo Augustus Desiré Waller realizó el primer ECG en su perro Jimmy sumergiendo sus cuatro patas en una solución conductiva de cloruro de sodio. En 1887 pudo registrar corrientes cardíacas por primera vez usando un electrómetro capilar. Los instrumentos fueron mejorados significativamente en 1903 por Willem Einthoven, quien, según su galvanómetro de cuerda desarrollado en 1895, desarrolló el ECG en un procedimiento de diagnóstico útil y lo introdujo en la clínica. La terminología que introdujo todavía se usa hoy."
 panum.2414.g: "Este dispositivo debe estar en cada hospital."
 panum.2415.t: "Primer trasplante"
 panum.2415.d: "El talento quirúrgico del Dr. [ROOT.Var('curie_physicist_var').GetCharacter.GetLastName] se conoce en todo el país, pero [ROOT.Var('curie_physicist_var').GetCharacter.GetSheHe] recientemente sorprendió a expertos con un procedimiento atrevido: el médico trasplantó el tejido tiroideo humano debajo de la piel y en la cavidad abdominal de un hombre joven."
 panum.2415.f: "El primer trasplante en el sentido moderno, la implantación del tejido de órganos para reemplazar una función de órgano, fue un trasplante de tiroides en 1883. Fue realizado por el cirujano suizo y luego el Premio Nobel Theodor Kocher. En las décadas anteriores, Kocher había perfeccionado la eliminación del exceso de tejido tiroideo en casos de bocio hasta el punto de que pudo eliminar todo el órgano sin que la persona muriera de la operación. Kocher realizó la eliminación total del órgano en algunos casos como una medida para prevenir el bocio recurrente. En los años siguientes, Kocher y otros cirujanos usaron el trasplante de tiroides también para tratar la deficiencia de tiroides que parecían espontáneamente, sin una eliminación de órganos anterior. El trasplante de tiroides se convirtió en el modelo para una estrategia terapéutica completamente nueva: el trasplante de órganos."
 panum.2415.g: "¡Y la gente pensó que Frankenstein era una novela de terror!"
 panum.2416.t: "Método estereotáctico"
 panum.2416.d: "El genio quirúrgico del Dr. [ROOT.Var('curie_physicist_var').GetCharacter.GetLastName] no conoce límites: el médico revolucionó la neurocirugía con una nueva operación cerebral."
 panum.2416.f: "La cirugía cerebral estereotáctica se refiere a los procedimientos de neurocirugía y radioterapia mínimamente invasivos en los que la cabeza y los instrumentos médicos del paciente se fijan en un marco bien atornillado para lograr la máxima precisión. Por primera vez en los últimos años del siglo XIX, las operaciones aisladas se llevaron a cabo en el cerebro expuesto utilizando un procedimiento que ya se conocía en ese momento como estereotaxia. Durante el procedimiento, el cuerpo del paciente y especialmente la cabeza se sujetaron rígidamente en un sistema de marco confiablemente rígido. La prueba de posibilidades en el contexto de la curiosidad de la investigación y la cirugía psiquiátrica aún era muy limitada y simple en ese momento. En décadas posteriores, las herramientas y la metodología fueron refinadas."
 panum.2416.g: "¡Brillante!"
 panum.2417.t: "Bypass cardiopulmonar"
 panum.2417.d: "Con el desarrollo de un bypass cardiopulmonar, el doctor Hasenbein ha logrado una obra maestra de la medicina moderna. No pasará mucho tiempo antes de que las personas puedan someterse a una cirugía cardíaca sin ningún problema."
 panum.2417.f: "Durante un bypass cardiopulmonar, la sangre deja el cuerpo a través de una cánula y un sistema de tubo, se enriquece con oxígeno y se bombea hacia atrás nuevamente. Esto se conoce como circulación extracorpórea. El camino de la sangre generalmente funciona desde la vena cavae o del atrio derecho, así como desde las cámaras del corazón y las arterias coronarias abiertas en el área quirúrgica y, después de filtrar, enriquecimiento de oxígeno y eliminación de dióxido de carbono, así como calentamiento y filtrado adicional, a través de la arteria principal o una arteria femoral. El fisiólogo francés Le Gallois publicó la idea de la circulación extracorpórea en 1812. En 1885, Maximilian Von Frey y su colega Max Von Gruber de la Universidad de Leipzig construyeron el precursor del corazón de las máquinas de corazón con un oxigenador cinemato"
 panum.2417.g: "¡Este es el nacimiento de la cirugía cardíaca moderna!"
 panum.2418.t: "Endoscopio"
 panum.2418.d: "Una nueva invención del Dr. [ROOT.Var('curie_physicist_var').GetCharacter.GetLastName] podría proporcionar servicios de examen médico invaluables: ¡se puede utilizar para ver el interior del cuerpo!"
 panum.2418.f: "An endoscope is a device that can be used to examine and manipulate the inside of organisms or technical cavities. The use of the endoscope, known as endoscopy, was originally developed for human medical diagnostics. After the invention of Thomas Edison, the use of electric light was a major step in the improvement of endoscope. Las primeras luces de este tipo eran externas aunque suficientemente capaces de iluminación para permitir la cistoscopia, la histeroscopia y la sigmoidoscopia, así como el examen de las cavidades nasales (y más tarde torácica) como se realizaba de manera rutinaria en pacientes humanos por Sir Francis Cruise (utilizando su propio endoscopio comercialmente disponible) por 1865 en el hospital de Mater Misericordiae en Dublin, Irlanda."
 panum.2418.g: "None"
 panum.2419.t: "Oftalmoscopio"
 panum.2419.d: "El Dr. [ROOT.Var('curie_physicist_var').GetCharacter.GetLastName] inventó un aparato que facilita examinar las enfermedades oculares y, por lo tanto, hizo un servicio invaluable a la oftalmología."
 panum.2419.f: "La oftalmoscopia o la fundoscopia es la inspección de las partes visibles del ojo llevadas a cabo utilizando un oftalmoscopio. En particular, la retina y los vasos sanguíneos que la suministran se pueden examinar. El oftalmoscopio, inventado para en 1850, fue descrito por primera vez por su inventor Hermann von Helmholtz a principios de octubre de 1851. El oftalmoscopio puede usarse para detectar enfermedades del nervio óptico, retina, coroides y cuerpo vitreoso. Esto marcó el comienzo de la historia de la oftalmología como una disciplina médica y científica independiente. Después de eso, el oftalmoscopio se volvió cada vez más importante para el diagnóstico de enfermedades internas."
 panum.2419.g: "Un dispositivo médico interesante."
 panum.2420.t: "Quimioterapia"
 panum.2420.d: "Un nuevo procedimiento médico que el Dr. [ROOT.Var('curie_physicist_var').GetCharacter.GetLastName] está probando actualmente podría ofrecer un rayo de esperanza para muchas personas enfermas, incluso el cáncer no sería curable, pero al menos parcialmente tratable."
 panum.2420.f: "La quimioterapia es una terapia farmacológica para el cáncer o las infecciones. Paul Ehrlich usó quimioterapia para describir el tratamiento de enfermedades infecciosas con sustancias químicas que funcionan directamente contra el patógeno. En 1904 descubrió a Trypan Red como el primer medicamento efectivo de quimioterapia, que usó para curar ratones que sufrían una enfermedad del sueño. Ehrlich comenzó más experimentos el 31 de agosto de 1909 en Frankfurt am Main inyectando patógenos de sífilis en ratas y luego tratándolos con la ayuda de procedimientos quimioterapéuticos. Estos experimentos tuvieron un efecto tan convincente que fueron vistos como el nuevo \"arma\" de la medicina contra las enfermedades infecciosas. Ehrlich se conoció posteriormente como el 'Creador de quimioterapia'. Los medicamentos utilizados se fabrican artificialmente o son derivados de sustancias naturales."
 panum.2420.g: "¿Podría ser esta una respuesta al sufrimiento de pacientes con cáncer?"
 panum.2100.t: "Reclutamiento médico"
 panum.2100.d: "Uno de los médicos más prometedores en el Hospital General es [SCOPE.sCharacter('panum_new_physician_scope').GetFullName]. [SCOPE.sCharacter('panum_new_physician_scope').GetSheHe|U] sería un excelente candidato para convertirse en el nuevo médico jefe. [SCOPE.sCharacter('panum_new_physician_scope').GetHerHis|U] La especialidad es ..."
 panum.2100.f: "$concept_panum_physician_desc$ \ n \ nthe #V new#! Médico, [SCOPE.sCharacter('panum_new_physician_scope').GetFullName], es un #tooltip:[SCOPE.sCharacter('panum_new_physician_scope').GetTooltipTag],panum_physician_rating_tt_loc [SCOPE.sCharacter('panum_new_physician_scope').GetCustom('panum_physician_rating_new_physician_icon_text_type')]#! médico.[GetPlayer.GetCustom('panum_physician_rating_display_existing_physician_type')]"
