 panum_congress_host_modifier: "Recientemente fue sede de un Congreso Médico" #NT!
 panum_congress_attend_modifier: "Asiste a congreso médico" #NT!
  
 panum.2000.t: "Preparativos para el congreso médico" #NT!
 panum.2000.d: "Antes de que se celebre el próximo Congreso Médico Internacional en nuestro país, surge la pregunta de si el congreso debe centrarse en una enfermedad específica o no." #NT!
 panum.2000.f: "Los congresos médicos pueden centrarse en una enfermedad específica si el país anfitrión dispone al menos de una descripción de la misma. Solo se puede celebrar un congreso una vez por cada enfermedad. Los médicos y microbiólogos que asisten reciben pistas adicionales para que puedan avanzar más rápidamente en sus investigaciones. En un congreso general, los países participantes simplemente reciben una bonificación por su progreso académico." #NT!
 panum.2000.g: "Se supone que esta es una conferencia médica general." #NT!
 panum.2001.t: "Congreso médico" #NT!
 panum.2001.d: "La capital se prepara para la reunión internacional de especialistas médicos. [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] presidirá las reuniones como presidente. [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_congress_title')]" #NT!
 panum.2001.f: "Los congresos médicos son una excelente oportunidad para intercambiar conocimientos médicos. Aquí se comparten de manera fraternal logros que antes estaban reservados a un solo país. Los congresos médicos sólo pueden ser organizados por médicos, pero también se invita a biólogos con especialización en microbiología, que pueden compartir sus conocimientos en el campo de los patógenos y las vacunas. Si en un país hay tanto un médico como un microbiólogo, ambos pueden participar." #NT!
 panum.2001.g: "¡Envíen las invitaciones!" #NT!
 panum.2002.t: "Invitación a Congreso Médico" #NT!
 panum.2002.d: "[SCOPE.sCountry('panum_congress_host_country').GetName] invita a las principales naciones médicas a un congreso internacional en su capital. Están invitados tanto médicos como microbiólogos. [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_congress_title')]" #NT!
 panum.2002.g: "¡No olvides los estetoscopios y microscopios!" #NT!
 panum.2003.t: "Descripciones y tratamientos" #NT!
 panum.2003.d: "El Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] tiene la oportunidad única de obtener conocimientos epidemiológicos innovadores en el Congreso Médico de [SCOPE.sCountry('panum_congress_host_country').GetName]. ¿Qué enfermedad debería ser el foco?" #NT!
 panum.2003.f: "Si un país que asiste a un congreso médico conoce una descripción de una enfermedad o un tratamiento para una enfermedad que otro país no conoce, entonces este último puede aprenderlo en el congreso. Sólo se pueden mejorar los conocimientos sobre una enfermedad. Si en el congreso no es posible adquirir nuevos conocimientos, aún existe la posibilidad de acumular conocimientos generales y mejorar una tecnología médica. Para ello es fundamental la participación de un médico." #NT!
 panum.2003.g: "El médico debe recopilar algunos conocimientos médicos generales de sus colegas." #NT!
 panum.2003.h: "Cólera." #NT!
 panum.2003.i: "Tuberculosis." #NT!
 panum.2003.j: "Viruela." #NT!
 panum.2003.k: "Tifus." #NT!
 panum.2003.l: "Fiebre amarilla." #NT!
 panum.2003.m: "Sarampión." #NT!
 panum.2003.n: "Escarlatina." #NT!
 panum.2003.o: "Plaga." #NT!
 panum.2003.p: "Difteria." #NT!
 panum.2003.q: "Polio." #NT!
 panum.2004.t: "Patógeno y vacuna" #NT!
 panum.2004.d: "El Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] se sintió muy feliz al descubrir que en el congreso de [SCOPE.sCountry('panum_congress_host_country').GetName] había muchas personas con ideas afines que estaban dispuestas a compartir sus conocimientos microbiológicos. La única pregunta es: ¿sobre cuáles de las maravillosas enfermedades le gustaría saber más [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] en el futuro?" #NT!
 panum.2004.f: "Si un país que asiste a un congreso médico conoce un patógeno de una enfermedad o una vacuna para una enfermedad que otro país no posee, entonces este último puede aprenderlo en el congreso. El conocimiento sólo se puede mejorar sobre una enfermedad. Si no es posible obtener nuevos conocimientos en el congreso, aún existe la posibilidad de acumular conocimientos generales y mejorar una tecnología biológica. La participación de un biólogo con rasgos de microbiólogo es crucial para esto." #NT!
 panum.2004.g: "Nuestro científico debería recopilar algunos conocimientos biológicos generales de sus colegas." #NT!
 panum.2005.t: "Una visión médica" #NT!
 panum.2005.d_general: "Los médicos y biólogos asistentes al congreso decidieron, en particular, modernizar y mejorar la formación de los futuros estudiantes de medicina y escribieron una declaración conjunta al respecto." #NT!
 panum.2005.d_special: "Dado el enfoque principal de la conferencia, los médicos y biólogos han votado centrar todos los esfuerzos en la lucha contra una enfermedad específica en los próximos años." #NT!
 panum.2005.f: "Si al comienzo de un congreso médico se declara un tema central, todos los países participantes recibirán información adicional sobre esta enfermedad, dependiendo de si están presentes un físico, un microbiólogo o ambos. Si se trata de un congreso general, el foco está puesto en la formación de nuevos profesionales médicos." #NT!
 panum.2005.g: "El evento valió la pena." #NT!
  
 panum.2009.t: "Finaliza Congreso Médico" #NT!
 panum.2009.d: "Ayer finalizó el Congreso Médico en [SCOPE.sCountry('panum_congress_host_country').GetName]. Médicos y microbiólogos regresan a sus países y traen consigo numerosos hallazgos." #NT!
 panum.2009.f: "El Congreso Médico Internacional (en francés: Congrès International de Médecine) fue una serie de conferencias científicas internacionales sobre medicina que tuvieron lugar, periódicamente, desde 1867 hasta 1913. La idea de un congreso de este tipo surgió en 1865, durante el tercer Congreso Médico anual de Francia; el profesor Henri Giutrac propuso celebrar una conferencia médica internacional en 1867, aprovechando el hecho de que médicos y cirujanos de todo el mundo seguramente estarían en París para asistir a la Exposición Internacional de ese año." #NT!
 panum.2009.g: "¿Espero que el buffet fuera bueno?" #NT!
  
 panum_surgeon: "Cirujano" #NT!
 panum_surgeon_desc: "Los cirujanos se sienten cómodos en la vida médica cotidiana, pero pueden ser útiles en la investigación médica o en los tratados anatómicos." #NT!
 panum_psychiatrist: "Psiquiatra" #NT!
 panum_psychiatrist_desc: "Los psiquiatras están interesados ​​en mejorar las condiciones de las personas con enfermedades mentales y están impulsando la investigación y nuevos métodos de tratamiento en este campo." #NT!
 panum_military_physician: "Médico militar" #NT!
 panum_military_physician_desc: "Este médico se especializa en el cuidado de los heridos en el campo de batalla y es particularmente exitoso en mejorar los primeros auxilios." #NT!
