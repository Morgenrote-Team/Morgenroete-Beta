 je_panum_yellow_fever_description_expedition_reason: "El Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] dirige una expedición médica en [SCOPE.sCountry('target').GetName] para obtener conocimientos valiosos sobre #YELLOW la fiebre amarilla#!.. Mientras la enfermedad se propague en el país, [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] tiene una oportunidad mensual de obtener nuevos conocimientos para escribir una opinión científica completa sobre la enfermedad.\n\nSi la enfermedad remite, el progreso científico no se perderá, sino que también estará presente en el próximo examen." #NT!
  
