 panum.2500.t: "Apoyo médico avanzado"
 panum.2500.d: "Nuestro [concept_panum_physician] Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha trabajado durante años para mejorar el apoyo médico en la guerra. ¡Los nuevos métodos y medios ahora se pueden usar en el campo de batalla!"
 panum.2500.f: "\ n'pay atención al uso exacto de esta jeringa. Y siempre tenga suficiente suero a mano. Y vendajes. Preferiblemente un kit de primeros auxilios. ¿Sabes siquiera qué significa la esterilización?"
 panum.2500.g: "Los soldados algún día construirán un monumento al médico."
