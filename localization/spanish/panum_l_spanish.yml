 panum.61.t: "Se va del equipo de tratamiento médico"
 panum.61.d: "Después de que los asistentes de investigación han introducido a nuestros médicos locales a los métodos modernos de tratamiento médico de nuestro país Overlord, se despiden y regresan a su tierra natal."
 panum.61.f: "\"La única cosa de importancia, cuando nos vayamos, serán los rastros del amor que hemos dejado atrás\". -Albert Schweitzer"
 panum.61.g: "Nuestro señor supremo nos cuida?"
 panum.62.t: "El equipo de vacunación médica se va"
 panum.62.d: "Después de que los asistentes de investigación han introducido a nuestros médicos locales a las vacunas modernas de nuestro país Overlord, se despiden y regresan a su tierra natal."
