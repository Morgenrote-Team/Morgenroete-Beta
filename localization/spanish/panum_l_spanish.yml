 panum.55.t: "El Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] puede describir una enfermedad extranjera"
 panum.55.d: "Otro país tiene un brote de enfermedad que su [concept_panum_physician] podría investigar para describir la enfermedad."
 panum.55.g: "¡Envía a nuestro médico de inmediato!"
