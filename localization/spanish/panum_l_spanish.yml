 je_panum_cholera_description_expedition_reason: "El Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] dirige una expedición médica en [SCOPE.sCountry('target').GetName] para obtener conocimientos valiosos sobre #YELLOW el cólera. #!. Mientras la enfermedad siga haciendo estragos en el país, [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] tiene una oportunidad mensual de obtener nuevos conocimientos para escribir una opinión científica completa sobre la enfermedad.\n\nSi la enfermedad remite, el progreso científico no se perderá, sino que también estará presente en el próximo examen." #NT!
 je_panum_tuberculosis_description_expedition_reason: "El Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] dirige una expedición médica en [SCOPE.sCountry('target').GetName] para obtener conocimientos valiosos sobre #YELLOW la tuberculosis. #!. Mientras la enfermedad siga haciendo estragos en el país, [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] tiene una oportunidad mensual de obtener nuevos conocimientos para escribir una opinión científica completa sobre la enfermedad.\n\nSi la enfermedad remite, el progreso científico no se perderá, sino que también estará presente en el próximo examen." #NT!
 je_panum_smallpox_description_expedition_reason: "El Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] dirige una expedición médica en [SCOPE.sCountry('target').GetName] para obtener conocimientos valiosos sobre #YELLOW la viruela. #!. Mientras la enfermedad siga haciendo estragos en el país, [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] tiene una oportunidad mensual de obtener nuevos conocimientos para escribir una opinión científica completa sobre la enfermedad.\n\nSi la enfermedad remite, el progreso científico no se perderá, sino que también estará presente en el próximo examen." #NT!
