 je_panum_measles: "Epidemia de sarampión" #NT!
 je_panum_measles_reason: "El sarampión es una enfermedad altamente contagiosa, conocida por sus típicas manchas rojas en la piel. Puede tener consecuencias catastróficas, particularmente en poblaciones que carecen de inmunidad previa. Como enfermedad suprarregional, el sarampión puede propagarse a otras áreas.\n\nLa invención de los #ORANGE antibióticos#! tiene una importancia particular en la lucha contra el sarampión. Con esta tecnología, un [concept_panum_physician] puede encontrar un #V tratamiento para el sarampión#!. Solo un muy buen sistema de salud ayudará. Todo esto conduce a una mejor prevención y cura de la enfermedad.\n\nDesafortunadamente, la invención de una #V vacuna contra el sarampión#! está fuera del alcance del marco temporal victoriano." #NT!
 je_panum_scarlet: "Epidemia de escarlatina" #NT!
 je_panum_scarlet_reason: "La escarlatina es una enfermedad muy extendida que fue una de las causas más comunes de muerte entre los niños hasta principios del siglo XX.\n\nLa invención de las #ORANGE antitoxinas#! tiene una importancia particular en la lucha contra la escarlatina. Con esta tecnología, un [concept_panum_physician] puede encontrar un #V tratamiento para la escarlatina#!. Un buen sistema de salud ayudará. Todo esto conduce a una mejor prevención y cura de la enfermedad.\n\nDesarrollar una #V vacuna contra la escarlatina#! por un [concept_theiler_biologist] es posible, pero muy difícil." #NT!
 je_panum_plague: "Epidemia de peste" #NT!
 je_panum_plague_reason: "La peste bubónica se equipara a la "muerte negra" de la Edad Media, que es una de las peores catástrofes de la historia. Se creía que había desaparecido hasta que reapareció a finales del siglo XIX. En países con poca riqueza y sistemas sanitarios débiles, la peste puede propagarse por múltiples zonas.\n\nLa invención de las #ORANGE antitoxinas#! tiene una importancia especial en la lucha contra la peste. Con esta tecnología, un [concept_panum_physician] puede encontrar un #V tratamiento para la peste#!. Un sistema sanitario rudimentario ya puede ayudar. Todo ello conduce a una mejor prevención y cura de la enfermedad.\n\nPara derrotar a la peste de una vez por todas, se necesita una #V vacuna contra la peste#! desarrollada por un [concept_theiler_biologist]." #NT!
 je_panum_diphteria: "Epidemia de difteria" #NT!
 je_panum_diphteria_reason: "La difteria es una enfermedad peligrosa que puede provocar complicaciones que ponen en peligro la vida y consecuencias a largo plazo. Debido a la mortalidad infantil y a los problemas respiratorios asociados a ella, se la conoce como el "ángel estrangulador de los niños". Los efectos permanecen localizados.\n\nLa invención de las #ORANGE Antitoxinas#! tiene una importancia especial en la lucha contra la difteria. Con esta tecnología, un [concept_panum_physician] puede encontrar un #V Tratamiento para la difteria#!. Solo un buen sistema de salud puede ayudar. Todo esto conduce a una mejor prevención y cura de la enfermedad.\n\nPara derrotar a la difteria de una vez por todas, se necesita una #V Vacuna contra la difteria#! desarrollada por un [concept_theiler_biologist]." #NT!
 je_panum_polio: "Polio" #NT!
 je_panum_polio_reason: "La poliomielitis es una enfermedad que afecta principalmente a los niños y que suele provocar la muerte o complicaciones físicas de por vida. Aunque en el pasado sólo se producía de forma esporádica, la polio se volvió endémica durante el siglo XIX. La polio no se propaga más allá del estado en el que se produce.\n\nLa invención de las #ORANGE antitoxinas#! tiene una importancia particular en la lucha contra la polio. Con esta tecnología, un [concept_panum_physician] puede encontrar un #V tratamiento para la polio#!. Sólo un buen sistema sanitario ayudará. Todo ello conduce a una mejor prevención y cura de la enfermedad.\n\nDesafortunadamente, la invención de una #V vacuna contra la polio#! está fuera del alcance del marco temporal victoriano." #NT!
  
