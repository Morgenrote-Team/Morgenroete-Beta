 panum.1001.t: "Una nueva epidemia" #NT!
 panum.1001.d: "La poliomielitis es una enfermedad que se conocía con muchos nombres diferentes en el siglo XIX. Sorprendentemente, cada vez hay más noticias en [SCOPE.sState('panum_disease_state').GetName] sobre casos de polio que terminan en incapacidad y muerte. Lo que antes era una enfermedad que solo se daba en casos aislados ahora parece ocurrir con regularidad. La polio es ahora una enfermedad epidémica." #NT!
 panum.1001.g: "Noticias inquietantes." #NT!
 panum.1002.d: "Varios periódicos informan de forma independiente de que en [SCOPE.sState('panum_disease_country').GetName] se está produciendo una grave epidemia de polio. La enfermedad, que hasta ahora sólo se daba en casos aislados, parece haberse convertido en una epidemia." #NT!
 panum.1003.t: "Una epidemia violenta" #NT!
 panum.1003.d: "La epidemia de polio en [SCOPE.sState('panum_disease_state').GetName] ha resultado especialmente grave. El número de muertes aumenta cada día." #NT!
 panum.1003.f: "'La mañana del tercer día que estuve hospitalizada, que fue el primero o el segundo de septiembre, desayuné cereales, zumo y leche con chocolate. Recuerdo que intenté coger la leche con chocolate y se me cayó en la mano. Me sentí muy mal porque ya no podía moverme. Las enfermeras entraron corriendo y limpiaron el desastre. Recuerdo que quería la leche con chocolate, pero no me la dieron. En su lugar, me trajeron una pajita y bebí un poco de zumo. Después de eso, unos médicos entraron en mi habitación y me hicieron contar hacia atrás, 10-9-8-7-6, hasta donde recuerdo. En ese momento estaba acostada porque me costaba sentarme.'\n\nMarilynne R., sobreviviente de polio" #NT!
 panum.1003.g: "¿No existe cura?" #NT!
 panum.1004.t: "Una generación rota" #NT!
 panum.1004.d: "Cuanto más dure la epidemia en [SCOPE.sState('panum_disease_state').GetName], más evidente se hace: habrá una generación entera que tendrá que vivir con mutilaciones y parálisis." #NT!
 panum.1004.f: ""Recuerdo muy bien el día en que me diagnosticaron polio. Esa mañana, estaba en la clase de educación física en la escuela y estábamos en el campo de fútbol jugando al fútbol americano. Noté que, mientras corría, mi pierna se debilitaba o se desplomaba. Realmente no le di mucha importancia, pero más tarde ese día estaba tocando con la banda de música de la escuela secundaria en un desfile benéfico contra la polio en Hibbing, que está a unos 30 kilómetros de Coleraine, donde crecí. Durante la marcha en ese desfile, mis piernas volvieron a debilitarse. De hecho, estaban tan débiles que tuve que salirme de la fila de marcha y volví al autobús escolar para acostarme".\n\nDavid K., sobreviviente de polio" #NT!
 panum.1004.g: "Este efecto durará mucho tiempo..." #NT!
 panum.1005.t: "Sobrevivientes de polio" #NT!
 panum.1005.d: "Se dice que quienes sobreviven a esta epidemia albergan una profunda ira en su interior. Es una forma de venganza contra la enfermedad que ha devastado tanto a estas personas. En nuestro país se están formando cada vez más asociaciones de supervivientes de la polio." #NT!
 panum.1005.f: ""Ser diferente es muy difícil cuando estás en la escuela secundaria. Terminé simplemente no participando en muchas cosas en las que probablemente hubiera participado si no fuera por mi discapacidad. Me hubiera gustado probar suerte en el equipo de animadoras, pero la gente se burlaba de mí solo por hablar de eso. Así que terminé guardando muchos sentimientos dentro. No quería ir a un baile porque me daba vergüenza mi cojera. No quería que la gente me mirara mientras caminaba por la pista de baile. Odiaba que la gente se quedara boquiabierta y se riera de mí. Creo que todos los adolescentes son cohibidos, pero cuando tienes alguna discapacidad física, realmente magnifica esa cohibición. Hasta el día de hoy, odio que la gente se quede mirando mi pierna cuando llevo pantalones cortos".\n\nGail B., sobreviviente de polio" #NT!
 panum.1005.g: "La sociedad civil se moviliza contra la polio." #NT!
 panum.1006.t: "Político crea Fundación contra la Polio" #NT!
 panum.1006.d: "Ante la epidemia de polio, el dolor de los padres, los mutilados y los muertos, [SCOPE.sCharacter('panum_opposition_leader').GetFullName] ideó el plan de crear una fundación para combatir la enfermedad. Los críticos dicen que sólo está tratando de pulir su reputación política." #NT!
 panum.1006.f: "El presidente estadounidense Franklin D. Roosevelt se alojaba regularmente en el balneario de Warm Springs desde 1924 y murió aquí en 1945. En 1921 sufrió una parálisis de las piernas, considerada polio espinal; según investigaciones más recientes, se trataba del síndrome de Guillain-Barré, todavía poco conocido en aquella época. Roosevelt fundó en 1927 la Georgia Warm Springs Foundation, cuya misión principal en un principio era el tratamiento de la parálisis espinal. Hoy en día, el centro se llama Instituto de Rehabilitación Roosevelt Warm Springs y atiende a pacientes con todo tipo de discapacidades en veintiséis departamentos diferentes." #NT!
 panum.1006.g: "Un verdadero filántropo." #NT!
 panum.1006.h: "¿Y las próximas elecciones son pura coincidencia, supongo?" #NT!
 panum.1007.t: "Depresión por polio" #NT!
 panum.1007.d: "Los numerosos niños que son mutilados de por vida no sólo tienen repercusiones en la salud física de la siguiente generación, sino también en la de los padres, que acusan al gobierno de hacer muy poco." #NT!
 panum.1007.f: ""Recuerdo vívidamente el primer día que usé el corsé en la escuela. Era la mitad de la jornada escolar. Al parecer, había ido al médico esa mañana para que me lo ajustara. Mi madre me dejó en la puerta y recuerdo que tenía lágrimas en los ojos cuando me alejé".\n\nEdmund Sass, sobreviviente de polio" #NT!
 panum.1007.g: "Irracional, pero no incomprensible." #NT!
 panum.1008.t: "Clínica de polio" #NT!
 panum.1008.d: "La hermana [SCOPE.sCharacter('panum_polio_nurse').GetFirstName] fundó una clínica de polio en [SCOPE.sState('panum_disease_state').GetName] para poder atender a los numerosos pacientes que había allí." #NT!
 panum.1008.f: ""Era una mujer muy alta y elegante, e inspiraba confianza con sus modales y su manera de comportarse. Tenía un acento encantador que la convertía en una persona interesante a la que escuchar. Si cierro los ojos, todavía puedo visualizarla de pie junto a mi cama con un vestido largo y negro y un gran sombrero con una hermosa pluma de avestruz... No llevaba joyas ni maquillaje. Recuerdo que su rostro era fuerte y anguloso, y sus ojos eran muy intensos. Cuando te miraba a los ojos, esa intensidad exigía toda tu atención, y cuando hablaba, la gente la escuchaba... Todos sabían quién estaba a cargo, y recibíamos el tratamiento que ella recomendaba. Nunca he conocido a nadie tan asertivo como ella".\n\nRay G., sobreviviente de polio" #NT!
 panum.1008.g: "Gracias, Hermana [SCOPE.sCharacter('panum_polio_nurse').GetFirstName]." #NT!
 panum.1009.t: "Pánico público" #NT!
 panum.1009.d: "A pesar de los esfuerzos del gobierno local en [SCOPE.sState('panum_disease_state').GetName], la población ha comenzado a sucumbir a una de las partes más peligrosas de cualquier brote: el pánico." #NT!
 panum.1009.f: "El sábado 17 de junio de 1916 se anunció oficialmente la existencia de una epidemia de polio en Brooklyn, Nueva York. Ese año, hubo 27.363 casos y 7.130 muertes por polio en los Estados Unidos, con más de 2.000 muertes solo en la ciudad de Nueva York. La epidemia de 1916 causó pánico generalizado y miles de personas huyeron de la ciudad hacia los centros turísticos de montaña cercanos; se cerraron los cines, se cancelaron las reuniones, las reuniones públicas fueron casi inexistentes y se advirtió a los niños que no bebieran de las fuentes de agua y que evitaran los parques de atracciones, las piscinas y las playas." #NT!
 panum.1009.g: "¡Maldito miedo!" #NT!
 panum.1010.t: "Cuarentena" #NT!
 panum.1010.d: "Aunque no está claro si la polio es una enfermedad contagiosa, cada vez hay más voces en [SCOPE.sState('panum_disease_state').GetName] que piden que se introduzca una cuarentena para garantizar que no se propague." #NT!
 panum.1010.f: "La enfermedad llegó sin previo aviso y exigió largos períodos de cuarentena durante los cuales los padres debían estar separados de sus hijos: era imposible saber quién contraería la enfermedad y quién no. Los nombres y direcciones de las personas con casos confirmados de polio se publicaban diariamente en la prensa, sus casas estaban señalizadas con carteles y sus familias eran puestas en cuarentena." #NT!
 panum.1010.g: "Esto causará más daño que bien." #NT!
 panum.1010.h: "Aplicar una orden de cuarentena estricta." #NT!
  
 panum.1020.t: "La epidemia de polio termina" #NT!
 panum.1020.d: "Las clínicas de [SCOPE.sState('panum_disease_state').GetName] informan que los casos de polio han disminuido notablemente. Las secuelas de la epidemia seguirán preocupando a la región durante los próximos años." #NT!
 panum.1020.f: ""No estoy enferma. Estoy rota. Pero estoy feliz de estar viva mientras pueda pintar". - Frida Kahlo" #NT!
  
 panum.1022.t: "El comienzo de la poliomielitis" #NT!
 panum.1022.d: "El doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] envió hoy un breve resumen de los síntomas que se presentan cuando se presenta una poliomielitis temprana." #NT!
 panum.1022.f: "'Los niños sanos y de aspecto generalmente saludable de entre 6 y 36 meses, en casos excepcionales un poco mayores, se enferman después de haber disfrutado previamente de una salud tranquila, ya sea con o sin indicios previos de indisposición, como: ojos en blanco, repentinamente bajo manifestaciones de calor, estados congestivos e irritativos, fiebre, sed, irritabilidad, llanto, somnolencia sin sueño real, así como a veces con síntomas de curso alterado de procesos patológicos agudos, exantemáticos. Poco después estallan convulsiones de un grado más leve o más grave, que se repiten a intervalos más o menos largos.\n\nEn otros casos, la enfermedad aparece de repente sin los síntomas enumerados, con convulsiones o náuseas, hundimiento del cuerpo, espuma en la boca y la nariz, coloración azulada, etc.\n\nSin embargo, a veces todos estos síntomas están ausentes, o sólo están presentes en un grado muy leve, y la parálisis se instala lentamente e inadvertidamente.'" #NT!
  
 panum.1040.t: "Contribuciones al conocimiento de la enfermedad de Heine-Medin" #NT!
 panum.1040.d: "El Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] presentó hoy en la Facultad de Medicina un artículo revolucionario que servirá como punto de partida para controlar las epidemias de polio y mejorar el tratamiento de los supervivientes de la enfermedad." #NT!
 panum.1040.f: "En el apartado [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] 'Contribuciones al conocimiento de la enfermedad de Heine-Medin', el doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] menciona varios aspectos que deberían ayudar a prevenir y propagar la poliomielitis. Un aspecto clave es que la polio es una enfermedad infecciosa. Además de las medidas que se derivan de ello, también hay una variedad de métodos para ayudar a los pacientes. Las dietas ricas en proteínas, los programas de fisioterapia y los nuevos inventos como el pulmón de acero brindan nuevas esperanzas de que la polio no se erradique, pero se pueda controlar mejor en el futuro." #NT!
 panum.1040.g: "Necesitamos un Salón de la Fama de la Polio." #NT!
  
 panum.1041.t: "Fisioterapia" #NT!
 panum.1041.d: "El médico conoce a una enfermera que pone patas arriba todos sus conocimientos previos sobre el tratamiento de la polio." #NT!
 panum.1041.f: "—¿Y cuánto tiempo lleva haciendo esto? —Diez años, doctor. —¿Pone compresas calientes a los pacientes? —Sí, doctor. —¿Y dice que eso ayudó? —Su ​​escepticismo no puede ocultar el éxito. No se trata solo de las compresas calientes. Se necesitan masajes y ejercicios de relajación. Un músculo entablillado ya no se desarrolla. Necesita ejercicio. —Hmm..." #NT!
 panum.1041.g: "Pero...¡los pacientes de polio necesitan descanso y estabilización!" #NT!
 panum.1042.t: "La calle" #NT!
 panum.1042.d: "Al inspeccionar la zona del brote de polio, el Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] procede sistemáticamente." #NT!
 panum.1042.f: ""Si alguien sigue la propagación de la poliomielitis que se propaga por [SCOPE.sState('panum_disease_state').GetCityHubName], no puede pasar por alto un descubrimiento interesante. Las cataratas están unidas como un collar de perlas. Se puede seguir una carretera y ver los casos uno al lado del otro. Pude rastrear la ocurrencia cronológica en una línea de ferrocarril en la zona. Esto no es una coincidencia".\n\nDel diario del Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.1042.g: "¿Pero es esta evidencia suficiente para la infección?" #NT!
 panum.1043.t: "La Parroquia" #NT!
 panum.1043.d: "El doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha visitado una comunidad remota en la zona de la peste para continuar su investigación sobre las causas de la enfermedad de la polio." #NT!
 panum.1043.f: "'¿49 casos en esta comunidad?'
'Como alcalde, lamento decir esto, doctor.'
'Cuando estaba haciendo el mapa de dónde se produjeron estos casos en la parroquia, ¿observó algo?'
'Con el debido respeto, no soy científico.'
'Las enfermedades se propagaron desde un punto. Es la escuela del pueblo.'" #NT!
 panum.1043.g: "¿La polio no es acaso una enfermedad hereditaria sino contagiosa?" #NT!
 panum.1044.t: "Filantropía" #NT!
 panum.1044.d: "Los supervivientes de la polio han acudido al Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]. Te gustaría apoyar el trabajo científico relacionado con la investigación de la polio con una fundación." #NT!
 panum.1044.f: "A principios del siglo XX, la polio era una enfermedad que alarmaba a amplios sectores de la sociedad porque se desconocía su origen y podía afectar incluso a las clases medias o adineradas. Algunos supervivientes de la polio que se hicieron ricos también hicieron campaña contra la enfermedad durante toda su vida y apoyaron iniciativas privadas y gubernamentales. La polio es una enfermedad en cuya lucha la filantropía ha desempeñado un papel importante." #NT!
 panum.1044.g: "Un apoyo valioso." #NT!
 panum.1044.h: "El dinero debería fluir equitativamente hacia la investigación de vacunas." #NT!
 panum.1044.i: "El dinero de la fundación también beneficiaría a la investigación general." #NT!
 panum.1045.t: "Antibióticos" #NT!
 panum.1045.d: "El doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha conseguido éxito en el tratamiento de la polio mediante el uso de antibióticos." #NT!
 panum.1045.f: ""No existe cura para la polio y, por desgracia, no veo cómo será posible en el futuro. Solo se puede prevenir, investigar las causas y evitar la propagación, y tratar los síntomas para aliviarlos. Los antibióticos pueden ayudar a proteger los músculos debilitados de las infecciones. Este es un paso en la dirección correcta. Esperemos que se sigan otros".\n\nDel diario del Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.1045.g: "¡Salud por los antibióticos!" #NT!
 panum.1046.t: "Ostracismo social" #NT!
 panum.1046.d: "En un documento de reforma, el doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] señaló a sus colegas académicos que la reintegración de los supervivientes de la polio significa más que simplemente curar, tratar o aliviar la enfermedad. El estigma social de los individuos debe reducirse y eliminarse." #NT!
 panum.1046.f: ""Recuerdo que el mayor desafío para mí fue subir al autobús escolar. El primer paso para subir al autobús parecía una milla y yo simplemente no podía hacerlo. Durante un rato mi madre salió y fue muy vergonzoso porque sacaba un taburete. Pero yo no podía soportar la vergüenza, así que mi padre y el conductor del autobús (se llamaba Bill y lo recuerdo vívidamente) se reunieron y hablaron sobre cómo podían resolver ese problema. Lo que hizo mi padre fue ir al lugar donde se detenía el autobús y cavó una zanja en la tierra. Bill hundía la rueda delantera del autobús en esa zanja y eso bajaba el escalón hasta donde estaba realmente cerca del suelo. Entonces podía subir al autobús sin problema. Y nadie se daba cuenta realmente..."\n\nJennifer W., sobreviviente de polio" #NT!
 panum.1046.g: "Los sobrevivientes de la polio no son ciudadanos de segunda clase." #NT!
 panum.1047.t: "El precio del progreso" #NT!
 panum.1047.d: "En su investigación sobre las causas de las epidemias de polio que se producen desde hace años, el Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] llegó a una verdad desagradable." #NT!
 panum.1047.f: ""La polio se conoce desde la antigüedad, pero, según mis investigaciones, hasta finales del siglo XIX no era una enfermedad epidémica como lo es hoy. La razón de ello, si se confirma, es paradójica: una mejor asistencia sanitaria. Antes de la introducción del alcantarillado y el saneamiento, los niños estaban expuestos a la polio mucho antes, entre los seis meses y los cuatro años de edad. Durante este período, la enfermedad es más leve y proporciona inmunidad. Cuanto mayor sea la edad de una persona infectada con polio, más probabilidades hay de que se produzca parálisis. La mejora de los niveles de salud ha hecho que menos personas hayan desarrollado inmunidad y sean más vulnerables a las peligrosas consecuencias de la enfermedad".\n\nDel diario del Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.1047.g: "¿La enfermedad se está propagando porque ha mejorado la salud pública?" #NT!
 panum.1048.t: "¿Bacilo o virus?" #NT!
 panum.1048.d: "Aún no se sabe nada sobre el agente causal de la poliomielitis. Por eso, el doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] encuentra a [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself] en medio de una animada discusión con sus colegas." #NT!
 panum.1048.f: "Aunque la poliomielitis se conocía desde hacía mucho tiempo y, con el desarrollo de la microbiología, quedó claro que se trataba de un patógeno, las creencias siguieron difiriendo durante mucho tiempo en cuanto a si se trataba de bacterias o virus de la polio." #NT!
 panum.1048.g: "Todo apunta a que se trata de un virus." #NT!
 panum.1048.h: "¡Esta charla inútil está distrayendo al médico de su trabajo!" #NT!
 panum.1049.t: "Aceptación de silla de ruedas" #NT!
 panum.1049.d: "El doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha descubierto que no sólo es importante proporcionar sillas de ruedas a los pacientes, sino que también es necesario que sean aceptadas socialmente para que los supervivientes de la polio puedan reintegrarse fácilmente a la vida normal." #NT!
 panum.1049.f: ""Yo era muy ingenuo en cuanto a ir a la universidad y me sorprendió descubrir que la universidad no era accesible para una persona en silla de ruedas. Pero así eran las cosas en aquel entonces. Había escaleras por todos lados y no era como en la escuela secundaria, donde tenía un grupo de amigos para llevarme de un lado a otro... Muchas veces tuve que conseguir un grupo de voluntarios o simplemente reclutar gente que iba de clase en clase a toda prisa y, a veces, decían: 'No tengo tiempo. No puedo ayudarte'. Tuve que vivir en un apartamento fuera del campus porque ninguno de los dormitorios era accesible".\n\n David K., sobreviviente de polio" #NT!
 panum.1049.g: "Apoyamos una campaña para una mayor aceptación de sillas de ruedas." #NT!
 panum.1049.h: "Financiar un programa para agregar rampas accesibles para sillas de ruedas a los edificios públicos." #NT!
  
 panum.1051.t: "Consejos sobre la polio" #NT!
 panum.1051.d: "Actualmente está circulando en el mundo académico una recomendación de acción sobre la enfermedad de la polio y está causando al Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] todos los problemas para hacer cumplir [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] sus propias tesis sobre el tratamiento de la polio." #NT!
 panum.1051.f: "'Administrar oxígeno a través de las extremidades inferiores, mediante electricidad positiva. Baños frecuentes utilizando harina de almendras u oxidando el agua. Aplicaciones de cataplasmas de manzanilla romana, olmo resbaladizo, árnica, mostaza, cantharis, aceite de amygdalae dulcis y, de especial mérito, aceite de nardo y Xanthoxolinum. Utilizar internamente cafeína, Fl. Kola, muriato seco de quinina, elixir de quinhone, agua de radio, cloruro de oro, licor de calcis y vino de pepsina.'\n\nDra. Angelika Hasenbein, 'Una monografía sobre la epidemia de poliomielitis (parálisis infantil)'" #NT!
 panum.1051.g: "En realidad suena muy convincente." #NT!
 panum.1052.t: "Yesos y aparatos ortopédicos" #NT!
 panum.1052.d: "El doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha aprendido de varios "expertos en polio" que las férulas para las piernas son la mejor manera de mejorar la situación inicial de los pacientes, pero [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] no está convencido." #NT!
 panum.1052.f: "A los pacientes con parálisis residual se les trataba con aparatos ortopédicos y se les enseñaba a compensar la pérdida de función con la ayuda de calibradores, muletas y sillas de ruedas. También se promocionaba como tratamientos eficaces el uso de dispositivos como aparatos ortopédicos rígidos y yesos, que tendían a causar atrofia muscular debido a la limitación de movimientos del usuario. La mayoría de estos tratamientos demostraron tener poco valor terapéutico." #NT!
 panum.1052.g: "¿Quizás ayude...?" #NT!
 panum.1053.t: "Cirugía inútil" #NT!
 panum.1053.d: "Los cirujanos le aseguraron al doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] que los procedimientos quirúrgicos tienen un efecto positivo sobre la polio." #NT!
 panum.1053.f: ""He pasado incontables horas entrevistando a colegas, estudiando libros y revisando pacientes para convencerme del éxito de las intervenciones quirúrgicas para la polio. Los médicos están muy orgullosos de sus resultados. La forma en que tratan las mutilaciones recuerda a los mecánicos de precisión que creen que están montando un mecanismo de relojería. Utilizan herramientas de precisión para trabajar con máquinas humanas. Pero mi impresión es que aquí el foco no está en la enfermedad, ni en el paciente, sino en la reputación de los médicos. Hasta ahora, no conozco ningún caso en el que este método haya conducido realmente a un tratamiento exitoso de la polio".\n\nDel diario del Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.1053.g: "Una pista falsa." #NT!
 panum.1054.t: "Suero convaleciente" #NT!
 panum.1054.d: "El doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha probado un suero muy aclamado que se considera un remedio eficaz en la medicina actual contra la polio. Aunque sus colegas [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] están convencidos del método, el doctor piensa que es una pérdida de tiempo." #NT!
 panum.1054.f: ""En aquella época tenían la idea de que se trataba de una enfermedad infecciosa, así que me administraron lo que se denominaba 'suero de convalecencia', elaborado a partir de la sangre de personas que se habían recuperado de la polio. Esa forma de tratamiento estaba de moda en aquel entonces. Parece poco probable que tuviera algún efecto, ya que la enfermedad progresó hasta convertirse en una parálisis bastante pronunciada, sin movimiento en ninguna de las piernas ni en los músculos abdominales. Me aislaron y creo que me habrían dicho que tenía poliomielitis. Sin embargo, yo no sabía lo que era la poliomielitis. Nadie me dijo que tenía parálisis infantil, lo cual habría reconocido porque Roosevelt era presidente en ese momento y yo sabía que había sufrido una parálisis importante a causa de la enfermedad".\n\nRichard O., superviviente de la poliomielitis" #NT!
 panum.1054.g: "¿Pero todo médico lo prescribe?" #NT!
 panum.1055.t: "Aislamiento" #NT!
 panum.1055.d: "Además de la inmovilización de las extremidades, algunos expertos en polio consideran que es recomendable aislar completamente a los pacientes. El propio doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] realizó este tipo de experimentos y llegó a la conclusión de que se trataba de una terapia ineficaz e inhumana." #NT!
 panum.1055.f: "'Después de que me hicieron la punción lumbar y me diagnosticaron polio, me aislaron inmediatamente y me dijeron que no debía levantar la cabeza. Recuerdo que me pusieron en una cuna. Tenía nueve años y no podía entender por qué me habían puesto en una cuna. Era muy degradante. Desde luego, no iba a poder salir de la cama, ni tampoco era probable que me diera la vuelta y me cayera. De hecho, apenas podía moverme. Mientras estaba acostada en esa cuna, podía sentir cómo el virus se instalaba. Era como si una puerta se cerrara de golpe. Sentí que mi mundo había cambiado por completo. Para empeorar las cosas, hacía un calor terrible y había mucha humedad, y por supuesto, eso fue antes del aire acondicionado; recuerdo que me sentía muy incómoda...'\n\nSharon K., sobreviviente de polio" #NT!
 panum.1055.g: "¡Esto es inaceptable!" #NT!
 panum.1055.h: "Este podría ser el comienzo de una segunda carrera." #NT!
 panum.1055.i: "Dejemos que estos registros desaparezcan rápidamente." #NT!
 panum.1056.t: "Síndrome post-polio" #NT!
 panum.1056.d: "Durante un examen reciente, el Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] descubrió que después de la infección de polio propiamente dicha, incluidas sus consecuencias, pueden quedar secuelas en forma de síndrome post-polio. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U está completamente desesperado por este desarrollo." #NT!
 panum.1056.f: "'Cuando tenía unos 35 o 40 años, empecé a tener dolores terribles en las articulaciones y los músculos. Me cansaba muy fácilmente. Fui al médico y me hicieron radiografías y análisis de sangre. Me dieron unas pastillas y fui a fisioterapia. Nada ayudó. Mientras esperaba que encontraran los registros, le expliqué a la persona que me estaba ayudando que estaba experimentando todo este dolor nuevo y que esperaba que los registros pudieran ayudar a explicar por qué. Bueno, me preguntó si había oído hablar del síndrome pospolio. Le dije: 'No, ¿qué es eso?' Me explicó que unos 30 o 40 años después de tener polio, es como si la superaras de nuevo. Pensar en enfrentar la polio otra vez era más de lo que podía soportar. Simplemente me desmoroné. Llamé a mi cuñada y le conté lo que había descubierto. También se lo conté a mi familia. Lloré mucho. Mostré a mis médicos locales mis registros médicos y les expliqué sobre mi cita en el Instituto Hermana Kenny. Me volvieron a decir que la polio era cosa del pasado. Yo les dije: "Sí, pero ahora estoy aquí y lo estoy viviendo de nuevo".\n\nJanice G., sobreviviente de polio" #NT!
 panum.1056.g: "¡Qué situación tan desesperada!" #NT!
  
 panum.1061.t: "Experimentos" #NT!
 panum.1061.d: "En un experimento dudoso pero no menos exitoso, el Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] infectó a monos con polio." #NT!
 panum.1061.f: ""Recientemente leí acerca de un procedimiento que utilizó Jean-Antoine Villemin para demostrar la contagiosidad de la tuberculosis. Realizó experimentos con conejos poniéndolos deliberadamente en contacto con el tejido de enfermos de tuberculosis. Docenas de caninos muertos después, pudo demostrar su tesis. Mi experimento con monos se basa en una suposición similar".\n\nDel diario del Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.1061.g: "Si los animales pueden infectarse, también pueden hacerlo los humanos entre sí." #NT!
 panum.1062.t: "Pulmón de acero" #NT!
 panum.1062.d: "El brillante ingeniero [ROOT.Var('gaudi_engineer_var').GetCharacter.GetFullName] ayudó al Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a construir un ingenioso dispositivo que revolucionó el tratamiento de la polio." #NT!
 panum.1062.f: "El pulmón de acero fue uno de los primeros dispositivos clínicos que permitieron la ventilación mecánica de un ser humano. Alrededor de 1920, el ingeniero estadounidense Philip Drinker lo desarrolló para ventilar a pacientes con enfermedades pulmonares. El cuerpo del paciente, a excepción de la cabeza, se encuentra completamente dentro de un cilindro hueco. El dispositivo sella herméticamente el cuello y crea una presión negativa. Esto hace que la presión ambiental fuerce el aire a través de la nariz y la boca del paciente hacia los pulmones. La exhalación se produce en consecuencia al generar un exceso de presión en la cámara. Muchos pacientes de polio solo necesitaron el pulmón de acero en la fase aguda de la enfermedad hasta que se restableció la función muscular. Algunos pacientes lo utilizaron solo durante la noche, otros lo utilizaron de forma continua." #NT!
 panum.1062.g: "Esto podría salvar muchas vidas." #NT!
 panum.1063.t: "Apoyo psicológico" #NT!
 panum.1063.d: "Como psiquiatra, el doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] utilizó su experiencia [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] para facilitarle la vida a los pacientes de polio." #NT!
 panum.1063.f: ""Cuando hablamos de poliomielitis, prestamos atención al componente físico de la enfermedad, pero junto al cuerpo dañado hay un alma dañada. La polio no sólo deja huellas físicas. Sobre todo trabajando con niños, he experimentado el impacto que esta horrible enfermedad tiene en sus vidas privadas y sociales. Las palabras no pueden curar, pero sí pueden proporcionar alivio. Y tenemos que dar perspectiva a los supervivientes para que no sólo sobrevivan, sino que tengan la voluntad de sobrevivir".\n\nDel diario del Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.1063.g: "Gracias, Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]." #NT!
 panum.1064.t: "Dieta" #NT!
 panum.1064.d: "El doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] recomienda una dieta rica en nutrientes para los pacientes de polio." #NT!
 panum.1064.f: ""Los éxitos anteriores en la lucha contra el raquitismo, la deficiencia de yodo, el escorbuto y la pelagra han demostrado que nuestra dieta puede desempeñar un papel decisivo en la lucha contra las enfermedades. La polio no es una enfermedad carencial. Pero se sabe que las proteínas desempeñan un papel importante en la formación de los músculos, por lo que es importante señalar que la dieta de los pacientes de polio debe ser más rica que la de la gente común".\n\nDel diario del Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.1064.g: "Por fin un certificado médico para comer filetes T-bone." #NT!
  
 je_panum_polio_treatment_success: "[GetPlayer.GetName] ha recopilado al menos #ORANGE 10 pistas de tratamiento#!." #NT!
