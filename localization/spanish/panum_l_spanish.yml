 ### 2.3.1 ###

 panum.101.t: "Tercera pandemia de cólera" #NT!
 panum.101.d: "Hoy han llegado a la capital noticias preocupantes procedentes del delta del Ganges. Los casos de enfermedad han aumentado rápidamente allí. Tras un breve examen por parte de los médicos locales, se quedan consternados al descubrir que el cólera ha vuelto a aparecer." #NT!
 panum.101.g: "De alguna manera, el cólera regresó." #NT!
 panum.1000.t: "Epidemia de polio" #NT!
 panum.1000.d: "Ha estallado una epidemia en uno de nuestros estados: #YELLOW ¡La polio#! está causando estragos en [SCOPE.sState('panum_disease_state').GetName]!" #NT!
 panum.1000.f: "Existen imágenes del Antiguo Egipto que sugieren que la poliomielitis existe desde hace mucho tiempo y es endémica. Sin embargo, no alcanzó su condición de enfermedad epidémica hasta finales del siglo XIX, cuando estalló repentinamente en Suecia y los Estados Unidos. En 1910, las epidemias frecuentes se convirtieron en sucesos habituales en todo el mundo desarrollado, sobre todo en las ciudades durante los meses de verano. En su apogeo, en los años 40 y 50, la polio paralizaba o mataba a más de medio millón de personas en todo el mundo cada año. El miedo y la respuesta colectiva a estas epidemias dieron lugar a una reacción y una movilización públicas extraordinarias que impulsaron el desarrollo de nuevos métodos para prevenir y tratar la enfermedad y revolucionaron la filantropía médica." #NT!
 panum.1000.g: "Las muletas y las sillas de ruedas se convierten en objetos cotidianos..." #NT!
 je_panum_germ_theory_success: "[GetPlayer.GetName] ha recopilado al menos #V 20 piezas de evidencia#! para reforzar la teoría de los gérmenes y refutar la teoría del miasma." #NT!
  
 panum_aspirin_factory_modifier: "Fábrica de aspirinas" #NT!
 panum_xray_modifier: "Rayos X" #NT!
 panum_bloodtypes_modifier: "Transfusiones de sangre" #NT!
 panum_ecg_modifier: "Electrocardiografía" #NT!
 panum_transplantation_modifier: "Trasplantes" #NT!
 panum_stereotactic_method_modifier: "Método estereotáctico" #NT!
 panum_cardiopulmonary_bypass_modifier: "Bypass cardiopulmonar" #NT!
 panum_chemotherapy_modifier: "Quimioterapia" #NT!
  
 panum.2007.t: "Inventos médicos" #NT!
 panum.2007.d: "En el congreso se ha corrido la voz de que hay especialistas que han logrado innovaciones médicas y que están dispuestos a compartir sus conocimientos." #NT!
 panum.2007.f: "Las innovaciones únicas en medicina, como los trasplantes, el desarrollo de los rayos X o la quimioterapia, son de tal importancia para la humanidad que los inventores comparten el conocimiento sin reservas. En definitiva, se trata del bienestar de todas las personas." #NT!
 panum.2007.g: "¡Salud por la humanidad!" #NT!
  
 panum.2205.t: "Pruebas con animales" #NT!
 panum.2205.d: "El doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] es considerado un científico de sangre fría con cierta tendencia a la crueldad. Se dice que el número de animales que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] mató "en beneficio de la ciencia" es de tres cifras. Sin embargo, estos experimentos tienen sus éxitos." #NT!
 panum.2205.f: "Aunque la experimentación con animales en beneficio de la medicina existe desde la antigüedad, no fue hasta el siglo XIX cuando se realizaron experimentos a una escala desconocida hasta entonces. Especialmente durante el descubrimiento de la teoría de los gérmenes -y posteriormente- se llevaron a cabo numerosos experimentos en los que los animales fueron infectados conscientemente con patógenos innumerables veces y se convirtieron literalmente en "conejillos de indias" para nuevos medicamentos. En esta fase también se introdujo ampliamente la experimentación con animales y la vivisección en las universidades para los estudiantes." #NT!
 panum.2205.g: "El médico es libre como le plazca." #NT!
 panum.2205.h: "Los estudiantes deben aprender a diseccionar animales." #NT!
 panum.2205.i: "Está claro que esto es ir demasiado lejos." #NT!
  
 panum.2411.t: "Aspirina" #NT!
 panum.2411.d: "Nuestro químico Dr. [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] ha inventado un auténtico milagro médico que podría revolucionar la farmacia: la aspirina. El Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha confirmado sus efectos analgésicos." #NT!
 panum.2411.f: "El ácido salicílico se ha utilizado con fines medicinales desde la antigüedad. En tablillas de arcilla de la antigua Sumeria y en el papiro de Ebers del antiguo Egipto aparecen medicamentos elaborados a partir de madera de sauce y otras plantas ricas en salicilato. Hipócrates hizo referencia al año 400 a. C. sobre el uso del té salicílico para reducir la fiebre. Las plantas ricas en salicilato formaban parte de la farmacopea de la medicina occidental en la antigüedad clásica y la Edad Media. El extracto de corteza de sauce se hizo conocido a mediados del siglo XVIII por sus efectos específicos sobre la fiebre, el dolor y la inflamación. En el siglo XIX, los farmacéuticos experimentaron y prescribieron una variedad de sustancias químicas asociadas con la salicina, el componente activo del extracto de sauce. En 1853, el químico Charles Frédéric Gerhardt trató por primera vez el cloruro de acetilo con salicilato de sodio para producir ácido acetilsalicílico. En 1897, los científicos de las fábricas de medicamentos y pinturas de Bayer comenzaron a estudiar el ácido acetilsalicílico como sustituto menos irritante del estómago de los medicamentos salicilatos habituales y crearon una nueva vía sintética sin impurezas. En 1899, Bayer ya había bautizado este compuesto como aspirina y lo vendía en todo el mundo." #NT!
 panum.2411.g: "El medicamento será el punto de partida para futuras investigaciones médicas." #NT!
 panum.2411.h: "Sin duda, la química abrirá camino a descubrimientos aún más espectaculares." #NT!
 panum.2411.i: "La industria farmacéutica se beneficiará de esto." #NT!
 panum.2412.t: "Rayos X" #NT!
 panum.2412.d: "Nuestro físico, el Dr. [ROOT.Var('curie_physicist_var').GetCharacter.GetLastName], ha hecho un descubrimiento espectacular: [ROOT.Var('curie_physicist_var').GetCharacter.GetSheHe] ha descubierto rayos hasta ahora desconocidos que pueden utilizarse para iluminar el cuerpo. El Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha puesto de relieve las posibilidades que ofrece para la medicina." #NT!
 panum.2412.f: "Los rayos X son ondas electromagnéticas con energías cuánticas superiores a los 100 eV, que corresponden a longitudes de onda inferiores a los 10 nm. Los rayos X se encuentran en el espectro electromagnético en el rango de energía superior a la luz ultravioleta. Los rayos X fueron descubiertos en 1895 por el científico alemán Wilhelm Conrad Röntgen, quien los denominó radiación X para indicar un tipo de radiación desconocido. Los rayos X pueden penetrar muchas sustancias sólidas, como materiales de construcción y tejidos vivos, por lo que la radiografía con rayos X se utiliza ampliamente en diagnósticos médicos (por ejemplo, para detectar huesos rotos) y en ciencia de los materiales (por ejemplo, para identificar algunos elementos químicos y detectar puntos débiles en materiales de construcción)." #NT!
 panum.2412.g: "Es espeluznante, como ver tu propia muerte." #NT!
 panum.2413.t: "Tipos de sangre" #NT!
 panum.2413.d: "El Dr. [ROOT.Var('curie_physicist_var').GetCharacter.GetLastName] ha hecho un descubrimiento sorprendente que explicaría por qué la sangre humana a veces se mezcla y a veces se aglutina: al parecer existen diferentes grupos sanguíneos. Se trata de un avance decisivo para las donaciones y transfusiones de sangre." #NT!
 panum.2413.f: ""Recientemente he observado y comprobado que el suero de personas normales es capaz de aglutinar los glóbulos rojos de otros individuos sanos... Como se suele decir, se puede decir que en estos casos existen al menos dos tipos diferentes de aglutininas, una en A, otra en B, ambas juntas en C. Las células son naturalmente insensibles a las aglutininas de su propio suero". -Karl Landsteiner" #NT!
 panum.2413.g: "Es necesario promover la investigación sobre los grupos sanguíneos." #NT!
 panum.2413.h: "Se supone que la clínica recolecta tipos de sangre y los recolecta para transfusiones de sangre." #NT!
 panum.2414.t: "Electrocardiografía" #NT!
 panum.2414.d: "El Dr. [ROOT.Var('curie_physicist_var').GetCharacter.GetLastName] ha inventado un dispositivo sorprendente que registra la actividad eléctrica de las fibras musculares del corazón. El médico llama al dispositivo electrocardiógrafo, un ECG." #NT!
 panum.2414.f: "En 1843, Carlo Matteucci, a través de experimentos realizados con corazones de palomas, descubrió que la actividad cardíaca se basa en procesos eléctricos. En 1882, el fisiólogo Augustus Desiré Waller realizó el primer ECG a su perro Jimmy sumergiendo sus cuatro patas en una solución conductora de cloruro de sodio. En 1887, logró registrar por primera vez las corrientes cardíacas con un electrómetro capilar. En 1903, Willem Einthoven mejoró significativamente los instrumentos y, basándose en su galvanómetro de cuerda desarrollado en 1895, convirtió el ECG en un procedimiento de diagnóstico útil y lo introdujo en la clínica. La terminología que introdujo se sigue utilizando hoy en día." #NT!
 panum.2414.g: "Este dispositivo debería estar en todos los hospitales." #NT!
 panum.2415.t: "Primer trasplante" #NT!
 panum.2415.d: "El talento quirúrgico del Dr. [ROOT.Var('curie_physicist_var').GetCharacter.GetLastName] es conocido en todo el país, pero [ROOT.Var('curie_physicist_var').GetCharacter.GetSheHe] recientemente sorprendió a los expertos con un procedimiento atrevido: el médico trasplantó tejido tiroideo humano debajo de la piel y en la cavidad abdominal de un joven." #NT!
 panum.2415.f: "El primer trasplante en el sentido moderno, es decir, la implantación de tejido orgánico para sustituir la función de un órgano, fue un trasplante de tiroides en 1883. Lo realizó el cirujano suizo y posteriormente Premio Nobel Theodor Kocher. En las décadas anteriores, Kocher había perfeccionado la eliminación del tejido tiroideo sobrante en casos de bocio, hasta el punto de que era capaz de extirpar todo el órgano sin que la persona muriera a causa de la operación. Kocher llevó a cabo la extirpación total del órgano en algunos casos como medida para prevenir la recurrencia del bocio. En los años siguientes, Kocher y otros cirujanos utilizaron el trasplante de tiroides también para tratar la deficiencia de tiroides que aparecía de forma espontánea, sin una extirpación previa del órgano. El trasplante de tiroides se convirtió en el modelo para una estrategia terapéutica completamente nueva: el trasplante de órganos." #NT!
 panum.2415.g: "¡Y la gente pensaba que Frankenstein era una novela de terror!" #NT!
 panum.2416.t: "Método estereotáctico" #NT!
 panum.2416.d: "El genio quirúrgico del Dr. [ROOT.Var('curie_physicist_var').GetCharacter.GetLastName] no conoce límites: el médico revolucionó la neurocirugía con una nueva operación cerebral." #NT!
 panum.2416.f: "La cirugía cerebral estereotáctica se refiere a procedimientos mínimamente invasivos de neurocirugía y radioterapia en los que la cabeza del paciente y los instrumentos médicos se fijan en un marco firmemente atornillado para lograr la máxima precisión. Por primera vez en los últimos años del siglo XIX, se realizaron operaciones aisladas en el cerebro expuesto mediante un procedimiento que ya se conocía en ese momento como estereotaxia. Durante el procedimiento, el cuerpo del paciente y, especialmente, la cabeza se sujetaban rígidamente en un sistema de marco firmemente rígido. La prueba de posibilidades en el contexto de la curiosidad investigadora y la cirugía psiquiátrica era todavía muy limitada y simple en ese momento. En décadas posteriores, las herramientas y la metodología se perfeccionaron." #NT!
 panum.2416.g: "¡Brillante!" #NT!
 panum.2417.t: "Bypass cardiopulmonar" #NT!
 panum.2417.d: "Con el desarrollo de la circulación extracorpórea, el doctor Hasenbein ha logrado una obra maestra de la medicina moderna. No pasará mucho tiempo antes de que las personas puedan someterse a una operación de corazón sin problemas." #NT!
 panum.2417.f: "En la circulación extracorpórea, la sangre sale del cuerpo a través de un sistema de cánulas y tubos, se enriquece con oxígeno y se bombea de nuevo. Esto se conoce como circulación extracorpórea. El camino de la sangre discurre normalmente desde la vena cava o la aurícula derecha, así como desde las cámaras cardíacas y las arterias coronarias abiertas en la zona quirúrgica y, tras el filtrado, el enriquecimiento con oxígeno y la eliminación de dióxido de carbono, así como el calentamiento y el filtrado posterior, vuelve a través de la arteria principal o una arteria femoral. El fisiólogo francés Le Gallois publicó la idea de la circulación extracorpórea en 1812. En 1885, Maximilian von Frey y su colega Max von Gruber de la Universidad de Leipzig construyeron el precursor de las máquinas de circulación extracorpórea actuales con un oxigenador de película con una bomba de pistón para el primer uso de la circulación sanguínea en un sistema extracorpóreo cerrado." #NT!
 panum.2417.g: "¡Éste es el nacimiento de la cirugía cardíaca moderna!" #NT!
 panum.2418.t: "Endoscopio" #NT!
 panum.2418.d: "Un nuevo invento del Dr. [ROOT.Var('curie_physicist_var').GetCharacter.GetLastName] podría proporcionar servicios de examen médico invaluables: ¡puede usarse para ver el interior del cuerpo!" #NT!
 panum.2418.f: "Un endoscopio es un dispositivo que se puede utilizar para examinar y manipular el interior de organismos o cavidades técnicas. El uso del endoscopio, conocido como endoscopia, se desarrolló originalmente para el diagnóstico médico humano. Después de la invención de Thomas Edison, el uso de luz eléctrica fue un paso importante en la mejora del endoscopio. Las primeras luces de este tipo eran externas, aunque lo suficientemente capaces de iluminar como para permitir la cistoscopia, la histeroscopia y la sigmoidoscopia, así como el examen de las cavidades nasales (y más tarde torácicas) como lo realizaba de manera rutinaria en pacientes humanos Sir Francis Cruise (utilizando su propio endoscopio disponible comercialmente) en 1865 en el Hospital Mater Misericordiae en Dublín, Irlanda." #NT!
 panum.2418.g: "Un dispositivo médico útil." #NT!
 panum.2419.t: "Oftalmoscopio" #NT!
 panum.2419.d: "El Dr. [ROOT.Var('curie_physicist_var').GetCharacter.GetLastName] inventó un aparato que facilita el examen de las enfermedades oculares y prestó así un servicio inestimable a la oftalmología." #NT!
 panum.2419.f: "La oftalmoscopia o fondo de ojo es la exploración de las partes visibles del ojo que se realiza con un oftalmoscopio. En particular, se puede examinar la retina y los vasos sanguíneos que la irrigan. El oftalmoscopio, inventado en 1850, fue descrito por primera vez por su inventor Hermann von Helmholtz a principios de octubre de 1851. El oftalmoscopio puede utilizarse para detectar enfermedades del nervio óptico, la retina, la coroides y el cuerpo vítreo. Esto marcó el comienzo de la historia de la oftalmología como disciplina médica y científica independiente. A partir de entonces, el oftalmoscopio adquirió cada vez mayor importancia para el diagnóstico de enfermedades internas." #NT!
 panum.2419.g: "Un dispositivo médico interesante." #NT!
 panum.2420.t: "Quimioterapia" #NT!
 panum.2420.d: "Un nuevo procedimiento médico que el Dr. [ROOT.Var('curie_physicist_var').GetCharacter.GetLastName] está probando actualmente podría ofrecer un rayo de esperanza para muchas personas enfermas: incluso el cáncer no sería curable, pero al menos sería parcialmente tratable." #NT!
 panum.2420.f: "La quimioterapia es un tratamiento farmacológico contra el cáncer o las infecciones. Paul Ehrlich describió el tratamiento de enfermedades infecciosas con sustancias químicas que actúan directamente contra el agente patógeno. En 1904 descubrió el rojo tripán como el primer fármaco quimioterapéutico eficaz, con el que curó a ratones que sufrían la enfermedad del sueño. Ehrlich comenzó a realizar más experimentos el 31 de agosto de 1909 en Frankfurt am Main, inyectando patógenos de la sífilis en ratas y tratándolas después con la ayuda de procedimientos quimioterapéuticos. Estos experimentos tuvieron un efecto tan convincente que se consideraron la nueva "arma" de la medicina contra las enfermedades infecciosas. Posteriormente, Ehrlich fue considerado el "creador de la quimioterapia". Los medicamentos utilizados se fabrican artificialmente o son derivados de sustancias naturales." #NT!
 panum.2420.g: "¿Podría ser esta una respuesta al sufrimiento de los pacientes con cáncer?" #NT!
  
 panum.2100.t: "Reclutamiento de médicos" #NT!
 panum.2100.d: "Uno de los médicos más prometedores del Hospital General es [SCOPE.sCharacter('panum_new_physician_scope').GetFullName]. [SCOPE.sCharacter('panum_new_physician_scope').GetSheHe|U] sería un excelente candidato para convertirse en el nuevo médico jefe. La especialidad de [SCOPE.sCharacter('panum_new_physician_scope').GetHerHis|U] es..." #NT!
 panum.2100.f: "$concept_panum_physician_desc$\n\nEl #V nuevo#! Médico, [SCOPE.sCharacter('panum_new_physician_scope').GetFullName], es un #tooltip:[SCOPE.sCharacter('panum_new_physician_scope').GetTooltipTag],panum_physician_rating_tt_loc [SCOPE.sCharacter('panum_new_physician_scope').GetCustom('panum_physician_rating_new_physician_icon_text_type')]#! Médico.[GetPlayer.GetCustom('panum_physician_rating_display_existing_physician_type')]" #NT!
