 panum.139.d: "Después de un gran esfuerzo, el médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] finalmente escribió el tratado [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] sobre un método de tratamiento exitoso para la enfermedad [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_disease_title')]. Se considera un hito en la medicina [ROOT.GetCountry.GetAdjectiveNoFlag]."
