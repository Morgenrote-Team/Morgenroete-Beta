 je_panum_measles: "Epidemia de sarampión"
 je_panum_measles_reason: "El sarampión es una enfermedad altamente contagiosa conocida por sus típicos parches de piel roja. Puede tener consecuencias catastróficas, particularmente en poblaciones que carecen de inmunidad previa. Como una enfermedad suprarregional, el sarampión puede extenderse a otras áreas. Con esta tecnología, un [concept_panum_physician] puede encontrar un tratamiento #V para sarampión#!. Solo un muy buen sistema de salud ayudará. Todo esto lleva a una mejor prevención y cura de la enfermedad."
 je_panum_scarlet: "Epidemia de escarlatina"
 je_panum_scarlet_reason: "La escarlatina es una enfermedad generalizada que fue una de las causas más comunes de muerte entre los niños hasta principios del siglo XX. Con esta tecnología, un [concept_panum_physician] puede encontrar un tratamiento #V para la fiebre escarlata#!. Un buen sistema de salud ayudará. Todo esto lleva a una mejor prevención y cura de la enfermedad. \ N \ nDes- Desarrollar una vacuna #V contra la fiebre escarlata#! por un [concept_theiler_biologist] es posible, pero muy difícil."
 je_panum_plague: "Epidemia de peste"
 je_panum_plague_reason: "La peste bubónica se equipara con la 'muerte negra' de la Edad Media, que es una de las peores catástrofes de la historia. Se pensó que desapareció hasta que reapareció a fines del siglo XIX. En países con baja riqueza y sistemas de salud débiles, la plaga puede extenderse a través de múltiples áreas. Con esta tecnología, un [concept_panum_physician] puede encontrar un tratamiento #V para plaga#!. Ya un sistema de salud rudimentario ayudará. Todo esto lleva a una mejor prevención y cura de la enfermedad. \ N \ nin orden para derrotar a Plague de una vez por todas, se necesita una vacuna #V contra Plague#! que es desarrollada por un [concept_theiler_biologist]."
 je_panum_diphteria: "Epidemia de difteria"
 je_panum_diphteria_reason: "La difteria es una enfermedad peligrosa que puede conducir a complicaciones potencialmente mortales y consecuencias a largo plazo. Debido a la mortalidad infantil y los problemas respiratorios asociados con él, la difteria es apodada el \"ángel estrangulador de los niños\". Los efectos permanecen localizados. Con esta tecnología, un [concept_panum_physician] puede encontrar un tratamiento #V para difteria#!. Solo un buen sistema de salud ayudará. Todo esto lleva a una mejor prevención y cura de la enfermedad. \ N \ nin orden para derrotar a la difteria de una vez por todas, se necesita una vacuna #V contra difteria#! que es desarrollada por un [concept_theiler_biologist]."
 je_panum_polio: "Polio"
 je_panum_polio_reason: "La poliomielitis es una enfermedad que afecta principalmente a los niños, lo que a menudo resulta en la muerte o las complicaciones físicas de toda la vida. Si bien solo ocurrió esporádicamente en el pasado, la polio se volvió endémica durante el siglo XIX. La polio no se extiende más allá del estado donde ocurre. Con esta tecnología, un [concept_panum_physician] puede encontrar un tratamiento #V para polio#!. Solo un buen sistema de salud ayudará. Todo esto lleva a una mejor prevención y cura de la enfermedad."
