 panum_vitamins_tech: "Vitaminas"
 panum_vitamins_tech_desc: "Al aislar ciertos nutrientes que el cuerpo necesita, es posible asegurarse de que más personas tengan una dieta saludable y equilibrada."
 panum.2006.t: "La teoría de los gérmenes se refuerza"
 panum.2006.d: "El Congreso Médico también ofreció la oportunidad para que varios médicos intercambien ideas sobre las causas de la enfermedad. Se está volviendo evidente que cada vez menos investigadores creen en la teoría tradicional de miasma. La teoría de los gérmenes ahora se considera el estándar entre los académicos más respetados."
 panum.2006.f: "Últimamente, un cierto ajuste ha aparecido, en la medida en que los países individuales ya no proceden de una manera tan parcial como antes, y uno se hace cargo de otro lo que parece estar bien probado en el camino de la defensa. Sin embargo, en medio de la variedad persistentemente grande en las formas y medios para combatir la tuberculosis, es necesario preguntar qué medidas realmente satisfacen mejor los requisitos científicos y los hallazgos generales en la lucha contra la enfermedad contagiosa. Para todas las medidas profilácticas contra una enfermedad infecciosa solo pueden dirigirse a evitar que los gérmenes de la enfermedad invadan el cuerpo. -Robert Koch"
 panum.2006.g: "Esta evidencia no puede ser desestimada fuera de control."
 panum.2201.t: "La teoría de la miasma pierde soberanía interpretativa"
 panum.2201.d: "Con cada día que el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] se centre cada vez más en los nuevos métodos de investigación, la teoría tradicional de miasma se vuelve menos relevante. La teoría de los gérmenes parece más convincente."
 panum.2201.f: "\"Caballeros, son los microbios quienes tendrán la última palabra!\" -Louis pasteur"
 panum.2201.g: "¿Entonces la teoría del miasma es cuestionable?"
 panum_physician_recent_treatment_modifier: "Tratamiento reciente"
 panum_physician_recent_treatment_conducted_modifier: "Tratamiento reciente realizado"
 panum_physician_botched_treatment_modifier: "Tratamiento fallido"
 panum_physician_botched_treatment_ig_modifier: "Tratamiento fallido"
 panum.2301.t: "Tratamiento exitoso de [SCOPE.sCharacter('chosen_character').GetFullName] [SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')]"
 panum.2301.d: "El Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] ha tratado con éxito [SCOPE.sCharacter('chosen_character').GetFullName] [SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')]."
 panum.2301.f: "\ \"¡No se preocupe, señor, este tratamiento seguramente funcionará! Lo he hecho al menos 2 veces y solo un paciente murió! \""
 panum.2301.g: "¡Bien!"
 panum.2302.t: "Tratamiento neutral de [SCOPE.sCharacter('chosen_character').GetFullName] [SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')]"
 panum.2302.d: "El Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] ha tratado [SCOPE.sCharacter('chosen_character').GetFullName] [SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')] pero nada realmente cambió."
 panum.2302.f: "\ \"¡Realmente pensé que beber suficiente agua haría el truco! \""
 panum.2302.g: "Al menos no dolió."
 panum.2303.t: "Tratamiento fallido de [SCOPE.sCharacter('chosen_character').GetFullName] [SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')]"
 panum.2303.d: "El Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] ha tratado los [SCOPE.sCharacter('chosen_character').GetFullName] [SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')] tan mal que empeoró la condición [SCOPE.sCharacter('chosen_character').GetHerHis]."
 panum.2303.f: "\ \"Esta es la tercera vez que sucedió esta semana ... \""
 panum.2303.g: "¡Esto no debería haber sucedido!"
 panum.2304.t: "Tratamiento fatal [SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')]"
 panum.2304.d: "El Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] lamentablemente causó la muerte del paciente durante el tratamiento [SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')]."
 panum.2304.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_fatal_flavor_text_type')]"
 panum.2304.g: "¡Una tragedia!"
 panum_foreign_medical_expedition_modifier: "Expedición médica extranjera"
 panum.137.t: "La expedición quiere investigar enfermedades"
 panum.137.d: "Una expedición extranjera ha llegado a las fronteras de nuestro país. Consiste principalmente en médicos, científicos y sus asistentes. Aparentemente quieren investigar la epidemia desenfrenada."
 panum.137.f: "Las expediciones médicas pueden viajar a otros países para investigar científicamente los tratamientos de enfermedades y escribir descripciones de enfermedades para su tierra natal. Los países anfitriones, a su vez, se benefician de esto porque los médicos examinan a los pacientes en las áreas epidémicas."
 panum.137.g: "Bienvenido a estos valientes hombres y mujeres."
 panum.2202.t: "Enfermedad antigua"
 panum.2202.d: "¡Nuestro médico ha traído una visión preciosa del trabajo de nuestro antropólogo!"
 panum.2202.f: "'... Pero, por supuesto, si examinas esta parte de su cráneo, ¿puedes ver que en realidad habían comenzado a sanar de sus heridas \". Un golpe desagradable, pero no letal. Yo estimaría que pasaron otros seis meses más o menos antes de que otra lesión los derribara, o tal vez la herida salió mal. '\ N \ n'hmmm. Fascinante. A juzgar por la naturaleza del golpe, pensé que era probable que fuera una especie de ... instrumento contundente. '\ N \ n'a club, la mayoría, o tal vez una herramienta con una piedra contundente. Creo que esta costilla presenta la verdadera causa de muerte. Observe el estrechamiento de los huesos, aquí y aquí. Apuesto a que tu hombre murió después de años de luchar contra esta muerte blanca."
 panum.2202.g: "La ciencia interdisciplinaria sigue siendo la mejor ciencia."
 panum.2203.t: "Medicina extraña"
 panum.2203.d: "¡Con algo de tiempo libre juntos, nuestro médico y arqueólogo han compartido su investigación!"
 panum.2203.f: "Ah, pero ahí es donde las cosas se ponen interesantes, ¡doctor! Estos frascos provienen de Egipto y contienen lo que creemos que son muestras de medicina antigua. ¿Es este el aceite de Mummia? '\ N \ n' ... ¿no se encuentra eso en los cuerpos, con propiedades curativas? ¿La resina alrededor de sus envolturas? '\ N \ n'oh, ¡no, en absoluto! Mummia es un tipo de aceite que encuentran fuera del suelo, similar al petróleo. ¿Por qué? '\ N \ n' ... Creo que es mejor que examinemos más estos medicamentos. Hay todo tipo de tinturas. Por favor, échales un vistazo y volveré en un momento. Necesito deshacerme de ... algo '."
 panum.2203.g: "... No estás comiendo la mamá, ¿verdad?"
 panum.2204.t: "Remedios a base de hierbas?"
 panum.2204.d: "Después de haber tenido un tiempo para examinar sus hallazgos, nuestro naturalista ha entregado plantas con propiedades potencialmente medicinales para el consultorio de nuestro médico."
 panum.2204.f: "¡Ah, ahí estás! Estaba catalogando algunas de las muestras que trajimos de la última expedición botánica, y encontré algunas que podrían ser de interés para ti. '\ N \ n'oh, ¿verdad? ¿Cómo es así? Algunos de ellos son completamente ajenos a nosotros, pero vienen con buenas palabras de los nativos y vale la pena investigar más. Podría haber algo interesante en estos. Sabes las maravillas que encontraron en la planta de amapola, después de todo. Haré que mis asistentes trabajen para preparar algunas muestras en polvo, para un examen más detallado."
 panum.2204.g: "Creo que la hoja de coca es especialmente fascinante, médico."
 panum_germ_theory_loc: "Teoría actual: #V germ#!"
 panum_miasma_theory_loc: "Teoría actual: #V Miasma#!"
 panum_no_epidemic_corruption_modifier: "Sin corrupción epidémica"
 panum_measles_depression_modifier: "Depresión del sarampión"
 panum_sailor_quarantine_modifier: "El sarampión paraliza a los marineros"
 panum.600.t: "Epidemia de sarampión"
 panum.600.d: "Una epidemia ha estallado en uno de nuestros estados: #YELLOW saramps#! es devastador en [SCOPE.sState('panum_disease_state').GetName]!"
 panum.600.f: "Al igual que la viruela, el sarampión fue mencionado por el médico persa Rhazes en el siglo X y parece haber estado muy extendido en la región euroasiática a lo largo de la Edad Media. El sarampión fue endémico en Europa hasta el siglo XIX y se volvió aún más importante a medida que aumentaba la urbanización. Una característica especial de Masenr es la erupción que comienza en la cara y el cuello y se extiende por todo el cuerpo en unos pocos días. Junto con la viruela, el sarampión se considera una de las enfermedades que tocaron grandes partes de la población indígena india en el siglo XVI."
 panum.600.g: "Pero esa es solo una enfermedad inofensiva de la infancia ... ¿verdad?"
 panum.620.t: "Final de la epidemia de sarampión"
 panum.620.d: "La epidemia de sarampión aparentemente ha terminado. Un último grupo de padres enterró a su hijo muerto."
 panum.620.f: "\"Al igual que el sarampión, el amor es más peligroso cuando llega tarde en la vida\". -Lord Byron"
 panum.602.t: "La epidemia de sarampión alcanza [SCOPE.sCountry('panum_infected_country').GetName]"
 panum.602.d: "Hemos recibido informes de que los primeros casos de sarampión se informaron en el [SCOPE.sCountry('panum_infected_country').GetName] hoy. Las autoridades nos culpan por no hacer lo suficiente para evitar la propagación."
 panum.602.g: "No había forma de evitar esto."
 panum.603.t: "El sarampión mata a los niños"
 panum.603.d: "En [SCOPE.sState('panum_disease_state').GetName], el brote de sarampión fue mucho más severo de lo esperado. La epidemia fue particularmente desenfrenada entre los bebés y los niños pequeños y debilitó permanentemente a toda una generación."
 panum.603.f: "El sarampión siempre se ha visto como una enfermedad infantil, aunque también puede afectar a los adultos. Muestra sus efectos más devastadores entre las edades de 2 y 3 años. La tasa de mortalidad luego cae rápidamente. En 1963, antes de inventar una vacuna, las estadísticas oficiales estimaron que se producían 2 millones de muertes en el sarampión en todo el mundo cada año. Alrededor del 5 al 10 por ciento de los casos de la enfermedad terminaron fatalmente."
 panum.603.g: "¿No hay cura para esta terrible enfermedad?"
 panum.604.t: "El sarampión paraliza a los marineros"
 panum.604.d: "Por razones misteriosas, el sarampión en [SCOPE.sState('panum_disease_state').GetName] afectó particularmente a los pescadores y marineros. Las tasas de mortalidad son insignificantes, pero la pérdida de trabajo es notable en los patios de pescado y entre los balleneros."
 panum.604.f: "Durante su investigación sobre las Islas Feroe, Peter Panum descubrió que el sarampión también afectó a los adultos, especialmente en poblaciones más aisladas. Las razones de esto permanecieron oscuras durante mucho tiempo; En principio, sin embargo, era notable que los pescadores y sus familias que vivían fuera de las ciudades más ocupadas se veían particularmente afectados."
 panum.604.g: "¿Pero quién va al mar ahora?"
 panum.605.t: "Clínica infantil para el sarampión"
 panum.605.d: "[SCOPE.sCharacter('panum_government_leader').GetFullName] ha notado el alto número de niños que sufren de sarampión en [SCOPE.sState('panum_disease_state').GetName], particularmente entre las familias más pobres donde las tasas de mortalidad son más altas. El político desea financiar una clínica infantil para el sarampión y ha pedido una donación pública."
 panum.605.f: "'Es una pena ver a los buenos padres de [SCOPE.sState('panum_disease_state').GetName] a merced de esta terrible enfermedad. Los políticos deben actuar y asumir la responsabilidad. Durante demasiado tiempo, demasiado poco se ha hecho por demasiados. Un hospital infantil debería ayudar a proteger lo más valioso que tienen los padres. Ayudaremos. Te lo prometo eso. Mientras mi nombre sea [SCOPE.sCharacter('panum_government_leader').GetFullNameNoFormatting] ... ¿Qué quieres decir con que doy discursos electorales?"
 panum.605.g: "Una iniciativa que vale la pena apoyar."
 panum.605.h: "Este partido solo quiere explotar la enfermedad con fines políticos."
 panum.606.t: "Depresión del sarampión"
 panum.606.d: "'Los muchos niños enfermos y muertos en [SCOPE.sState('panum_disease_state').GetName] han dejado su huella en muchos padres. Algunos hablan de numerosas personas que están en una crisis de la vida."
 panum.606.f: "'EM. Miller tuvo que enterrar a su tercer hijo este mes. Ella es solo una de las muchas madres que ahora no tienen hijos. El Sr. Miller, que dirige una panadería en la ciudad, ha cerrado su tienda durante varias semanas. Muchas familias en esta área son como los Millers. Apenas hay un clan que no haya perdido a un hijo. Sin embargo, el fatalismo se ha convertido en insatisfacción durante semanas. Las personas en esta región se han vuelto significativamente más sensibles si las circunstancias continúan empeorando. Muchas personas ahora culpan al gobierno por su miseria."
 panum.606.g: "No del todo incomprensible dada la situación."
 panum.622.t: "Incubación de sarampión"
 panum.622.d: "El Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] ha compilado una lista meticulosa de casos de sarampión que muestra el período de incubación del sarampión."
 panum.622.f: "'No se puede negar que la etapa de descamación puede ser infecciosa, pero uno debe ser cauteloso al aceptar este punto de vista en la medida en que en los terrenos generales se sospecharía lo contrario. Casi parece que debido a que un período tan largo latente no pudo ser concebido, se eligió una etapa posterior de la enfermedad como la infección. En las aldeas de Hove y Lobre, en Suderø, hacia el final de la epidemia, ocurrió un intervalo de más de catorce días entre generaciones del Exantema en el mismo hogar, sin poder demostrar una nueva infección desde afuera; Sin embargo, estos dos casos pueden explicarse por una infección que se transmitió durante la etapa de convalecencia. A partir de los datos aquí presentados, creo que el período de incubación del sarampión se puede estimar con gran seguridad para ser de aproximadamente catorce días, sin, sin embargo, insistir en que este intervalo es uno que no puede modificarse por circunstancias particulares, como, por ejemplo, un viaje; Muchos factores hablan a priori contra un dictamen tan absoluto, así como la analogía con la incertidumbre de los períodos latentes de otras enfermedades. -Pedro Panum"
 panum.623.t: "Singularidad del sarampión"
 panum.623.d: "En un nuevo paso intermedio, el Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] se diferenciaba entre diferentes formas de sarampión y no solo observó las diferencias de otras enfermedades similares como la viruela, la rubéola y el sarampión, sino que también destacó los síntomas únicos."
 panum.623.f: "'La literatura sobre el sarampión es insignificante e incompleta en comparación con que en otros exantemas agudos, como, por ejemplo, escarlata y viruela. Además de los informes dispersos en las revistas relacionadas con brotes individuales, solo hay unas pocas monografías, varias de las cuales datan del siglo anterior. Esta fiebre exantemática, ciertamente desconocida para los médicos griegos y árabes, estaba tan insuficientemente diferenciada incluso en el siglo pasado que De Haën mantuvo la identidad del sarampión con la viruela, sobre la base de los síntomas, y los escritores anteriores al final del siglo XVII describieron ambas enfermedades como pertenecientes a la misma familia. -Pedro Panum"
 panum.624.t: "Poblaciones virgen e inmunidad de por vida"
 panum.624.d: "El Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] recientemente pudo mostrar muy claramente que cuando el sarampión afecta a un individuo, no vuelve a ocurrir. Por lo tanto, las poblaciones que nunca han estado expuestas a la enfermedad están particularmente en riesgo."
 panum.624.f: "\"Sin embargo, es bastante notable que de las muchas personas mayores que aún viven en los Faroes que habían tenido sarampión en 1781, no una, por lo que pude descubrir mediante una cuidadosa investigación, fue atacado por segunda vez. Yo mismo vi noventa y ocho personas mayores, que estaban exentas porque habían tenido la enfermedad de su juventud. Esto fue más notable en que una edad alta de ninguna manera disminuyó la susceptibilidad al sarampión, ya que, hasta donde yo sé, todas las personas mayores que no habían pasado por sarampión en la vida anterior fueron atacadas cuando fueron expuestas a la infección; mientras que ciertos jóvenes, aunque constantemente expuestos, estaban exentos. Si la recuperación del sarampión sesenta y cinco años antes podría asegurar a las personas contra la toma de la enfermedad por segunda vez, podría suponerse que se proporcionaría una protección aún mayor al recuperarse de ella un tiempo más corto antes de ' -Peter Panum"
 panum.700.t: "Epidemia de escarlatina"
 panum.700.d: "Una epidemia ha estallado en uno de nuestros estados: #YELLOW Scarlet Fever#! es devastador en [SCOPE.sState('panum_disease_state').GetName]!"
 panum.700.f: "La escarlata se conoce desde la antigüedad y fue bien descrita en el siglo XVII, especialmente por Thomas Sydenham. Aunque la escarlatina aparentemente se volvió menos peligrosa en el siglo XVIII, volvió a la nueva forma en el siglo XIX. Pierre Fidèle Bretonneau, por ejemplo, declaró que alrededor de 1800 no había conocido un solo caso fatal de escarlatina, mientras que en 1824 observó una epidemia en tours con tan alta mortalidad que colocó la escarlata a la par con la peste y el cólera. La escarlata se acompaña de una erupción característica. A diferencia de la viruela o el sarampión, la fiebre escarlata se caracteriza por un área de amígdalas hinchadas y una lengua de color fresa."
 panum.700.g: "Cada niño tiene que pasar por esto en algún momento. Con un poco de suerte."
 panum.720.t: "Finalización de la epidemia de escarlatina"
 panum.720.d: "La epidemia de escarlatina que se ha apoderado de nuestro país está dejando lentamente las ciudades y las aldeas. Innumerables padres respiran alivio."
 panum.720.f: "\"Es como escarlata: uno tiene que terminar.\" -Leo Tolstoy"
 panum.722.t: "Conocimiento antiguo"
 panum.722.d: "A través de un concesionario antiguo, [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] pudo encontrar varios libros antiguos que resuman las descripciones de escarlatina en el pasado y también pudieran ser útiles en el presente."
 panum.722.f: "No se puede decir con certeza si se conocía la fiebre escarlata en la antigüedad o si estaba confundido con enfermedades similares como difteria, sarampión y rubéola. La evidencia de una enfermedad similar a la escarlatina ya existe en Celsus, Caelius aurelianus, Arataeus de Capadocia y Aetius de Amida. Se pueden encontrar descripciones similares en la región árabe-perisia desde la Edad Media en adelante, a saber, por Avicena, Ali Abbas y Rhazes. La primera descripción definitiva de la escarlata es una descripción de Giovanni Filippo Ingrassia de 1553. El médico Daniel Sennert ocupa otra posición importante, también del siglo XVI. El nombre 'Scarlatina' se remonta a Thomas Sydenham y su descripción de 1675. Aunque la descripción de Sydenham se considera autorizada, hay brechas significativas en él, y el término escarlatina también parece haber sido extendida en Inglaterra ya en mediados del siglo XVI."
 panum.723.t: "Síntomas de escarlatina"
 panum.723.d: "El Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] ha progresado en su descripción de la escarlata y ha resumido los síntomas por primera vez."
 panum.723.f: "'Los pacientes sienten rigoros y temblando, tal como lo hacen en otras fiebres. Los síntomas, sin embargo, son moderados; Posteriormente, toda la piel se cubre con pequeñas máculas rojas, más gruesas que las del sarampión, así como más ancha, más roja y menos uniforme. Estos duran dos o tres días y luego desaparecen. El paciente no solo tiene una erupción, sino también la inflamación de las amígdalas. Puede haber complicaciones como el reumatismo y la hidropesía. '\ N \ na una carta del médico [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] a la facultad médica"
 panum.724.t: "Scarlatina no ama la laringe"
 panum.724.d: "El Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] ha identificado las diferencias específicas entre las enfermedades de escarlatina y difteria."
 panum.724.f: "'En la fiebre escarlata, la inflamación es ampliamente sobre las amígdalas, el paladar y la faringe, y no está, como en la difteria, al principio limitado a un lugar; y en segundo lugar, la inflamación escarlatinal de la faringe no tiene tendencia a splad en los pasajes respiratorios. Para decirlo brevemente: Scarlatina no ama la laringe. '\ N \ na una carta del médico [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] a la facultad médica"
 panum_plague_quarantine_modifier: "Cuarentena de peste"
 panum_plague_hospitals_modifier: "Casas de peste"
 panum_plague_burn_everything_modifier: "¡Quema todo!"
 panum_plague_rat_killer_modifier: "¡Mata todo!"
 panum_plague_loss_of_trust_modifier: "Pérdida de confianza"
 panum.800.t: "El regreso de la peste"
 panum.800.d: "Ha habido rumores durante varios años de que la peste ha regresado a partes de nuestro país. Anteriormente esto se había limitado a distritos rurales remotos. Sin embargo, con el brote en [SCOPE.sState('panum_disease_state').GetName] finalmente está claro: ¡la plaga se extiende una vez más sus dedos retorcidos!"
 panum.800.f: "La Pandemia de la Tercera Plaga (después de la plaga de Justinia en el siglo VI y la 'Muerte Negra' en el siglo XIV) comenzó en China a fines del siglo XIX. Se cree que la pandemia se originó en Yunnan, que vio un brote tan pronto como 1792, en 1855 y nuevamente en 1866. Un brote en la vecina ciudad de Guangzhou a partir de enero de 1894 en adelante mató a 80,000. A partir de marzo de 1894, los científicos y médicos británicos en Hong Kong se dieron cuenta del brote. Después de las ondas de cólera de las últimas décadas, se esperaba que la ola de peste causara muchas muertes, especialmente en China e India, y finalmente condujo a la inestabilidad del estado. Costaría aproximadamente 15 millones de vidas en todo el mundo."
 panum.800.g: "¡Imposible! ¡La plaga es una enfermedad del pasado olvidado!"
 panum.820.t: "Fines de la epidemia de la peste"
 panum.820.d: "La terrible plaga, uno de los peores flagelos de la humanidad, ha dejado a nuestro país nuevamente. Esperemos que vuelva a donde pertenece: en el abismo de la historia."
 panum.820.f: "'Pero, ¿qué significa, la peste? Es la vida, eso es todo. -Albert Camus"
 panum.802.t: "La plaga se extiende a [SCOPE.sCountry('panum_infected_country').GetName]"
 panum.802.d: "Los casos de plaga ahora también se informan más allá de nuestras fronteras. Aparentemente, las autoridades no pudieron contener la enfermedad. El embajador [SCOPE.sCountry('panum_infected_country').GetAdjectiveNoFlag] hizo serias acusaciones contra nosotros."
 panum.802.g: "A largo plazo, la plaga llega a todos ..."
 panum.803.t: "Epidemia de peste"
 panum.803.d: "Una epidemia ha estallado en uno de nuestros estados: #YELLOW plaga#! es devastador en [SCOPE.sState('panum_disease_state').GetName]!"
 panum.803.g: "La muerte negra está golpeando."
 panum.804.t: "La peste: una tercera ola"
 panum.804.d: "Las noticias perturbadoras nos llegan desde [SCOPE.sCountry('panum_plague_country').GetName]. Se dice que un brote de epidemia violento se desató hace unas semanas. Los médicos están preocupados: se supone que es la infame plaga."
 panum.804.g: "Deberíamos armar una expedición médica para prepararnos para esto."
 panum.805.t: "Cuarentena de peste"
 panum.805.d: "La situación en [SCOPE.sState('panum_disease_state').GetName] amenaza con salir de control. Los políticos influyentes, los jefes de autoridades y las personas privadas están pidiendo una cuarentena para evitar que la plaga se propague aún más. Estas son principalmente personas que no viven en [SCOPE.sState('panum_disease_state').GetName]."
 panum.805.f: "Las cuarentenas extensas y estrictas ya habían demostrado ser exitosas en la Edad Media. De hecho, el término cuarentena se remonta a la palabra 40 en el idioma italiano y aparentemente se usó por primera vez en tiempos de peste. La República de Venecia en particular, como una nación comercial con un amplio tráfico de envío, era conocida por esta medida, ya que las ciudades de puerto y comercio se vieron particularmente afectados por las epidemias."
 panum.805.g: "Toda el área debe estar en cuarentena."
 panum.805.h: "No debemos sobrecargar."
 panum.806.t: "Casas de peste"
 panum.806.d: "Las autoridades locales en [SCOPE.sState('panum_disease_state').GetName] han hecho una propuesta para establecer casas de peste para aislar mejor a la población sana de la población enferma. Esto afectaría particularmente a las clases más pobres, que no pueden huir como los ricos."
 panum.806.f: "Se usó una casa de peste para atender a los pacientes con peste durante las epidemias de la peste. Dado que la epidemia se consideró incurable durante el período pico de estas olas de enfermedad, a fines de la Edad Media y los primeros tiempos modernos, y por lo tanto fue solo un alivio como resultado de la atención médica, las casas de peste tenían la intención principalmente de aislar los enfermos de la población sana. Para este propósito, las casas de peste similares a los leprosorios generalmente se construyeron afuera o en las afueras de una ciudad. Otro tipo de casa de la peste tenía la intención de servir a la prevención en el sentido de un período de cuarentena. Las personas en cuyas inmediaciones se habían producido la plaga fueron llevadas a la casa de la peste, que solo se les permitía irse si resultaban no ser infectados."
 panum.806.g: "Es solo por su propio bien. Incluso si no quieren."
 panum.806.h: "Eso solo provocaría disturbios."
 panum.807.t: "El doctor de la peste"
 panum.807.d: "El médico líder en uno de nuestros hospitales de peste en [SCOPE.sState('panum_disease_state').GetName] ha ganado tanta experiencia en este campo que podría ser una ayuda valiosa a nivel nacional."
 panum.807.f: "¡Déjame pasar! Soy médico. Y sé exactamente cómo lidiar con esta enfermedad."
 panum.807.g: "Dale al médico una posición de alto rango como médico."
 panum.808.t: "El vuelo de los ricos"
 panum.808.d: "El número de emigrantes en [SCOPE.sState('panum_disease_state').GetName] está aumentando todos los días. En particular, aquellas familias que pueden pagarlo intentan escapar de la plaga. Existe un gran resentimiento entre aquellos que no pueden permitirse tal escape. Otros advierten que esto hará que la plaga sea más generalizada."
 panum.808.f: "'Una vez más, el más sólido, tal vez, en el juicio, ya que nosotros también los más duros en el temperamento, de todos, afirmamos que no había medicina para la enfermedad superior o igual en eficacia para volar; Después de qué receta, una multitud de hombres y mujeres, negligentes de todos menos ellos mismos, abandonó su ciudad, sus casas, su patrimonio, su pareja, sus bienes y se pusieron en exilio voluntario, o migraron a las partes del país, como si Dios visitara a los hombres con este plazo en el recurso de sus inquietudes que no les dijeron con sus Wrath, donde siempre pudieran estar, sino que solo la destrucción de la destrucción de los que no les quedaba en el Circuito de los Circuitos. ciudad; O considerando, perchance, que ahora era el momento de que todos huyeran de él, y que llegó su última hora. -Bocaccio"
 panum.809.t: "Montones de cadáveres"
 panum.809.d: "El número de muertes por la peste alcanzó tales proporciones que difícilmente podría mantenerse bajo control. Algunos ya recomiendan ardor público y tumbas masivas."
 panum.809.f: "En la cima de la plaga de 1894 en Hong Kong, las admisiones al hospital promediaron a los 80 por día, y la muerte alcanzó su punto máximo a más de 100 por día. A través del tráfico marítimo, la epidemia se extendió al resto del país después de 1894 y finalmente se extendió a British Raj India, donde fueron asesinados alrededor de diez millones de indios. Las principales medidas preventivas fueron establecer hospitales de peste y desplegar personal médico para tratar y aislar pacientes de peste; realizar operaciones de búsqueda de casa a casa, descubrir y transferir pacientes de peste, y limpiar y desinfectar casas y áreas infectadas; y establecer cementerios designados y asignar a una persona responsable de transportar y enterrar la peste muerta."
 panum.810.t: "La muerte negra tiene su precio"
 panum.810.d: "La epidemia de la peste está particularmente furiosa en [SCOPE.sState('panum_disease_state').GetName] en estos días. Se han informado numerosas muertes, incluso más de lo habitual."
 panum.810.f: "La enfermedad permaneció localizada en el suroeste de China durante varios años antes de propagarse. En la ciudad de Canton, a partir de enero de 1894, la enfermedad había matado a 80,000 personas en junio. El tráfico diario de agua con la cercana ciudad de Hong Kong extendió rápidamente la plaga allí, matando a más de 2.400 en dos meses durante la peste de Hong Kong de 1894."
 panum.810.g: "¡Nadie escapa a Grim Reaper!"
 panum.811.t: "¡Quema todo!"
 panum.811.d: "Limpiar y desinfectar las casas de los afectados es a menudo la única forma de detener la propagación de la peste. Esto a menudo incluye quemar cualquier cosa que entre en contacto con un paciente de peste."
 panum.811.f: "'Digo, entonces, que tal era la energía del contagio de dicha pestilencia, que no se propagaba simplemente de un hombre a otro, sino que, lo que es mucho más sorprendente, se observó con frecuencia que las cosas que habían pertenecido a un enfermo o muerto de la enfermedad, si alguna otra criatura viva, no de la especie humana, no era la ocasión, no por enfermedad, sino de una muerte casi instantánea. De lo cual mis propios ojos (como dije un poco antes) tenían conocimiento, algún día, entre otros, por la siguiente experiencia. Los trapos de un hombre pobre que había muerto de la enfermedad que estaba esparcida por la calle abierta, dos cerdos llegaron allí, y después, como es su costumbre, no poca cantidad de hocicos, tomó los trapos entre sus dientes y los arrojaron a y vayó por sus capítulos; con lo cual, casi de inmediato, dieron algunas vueltas y cayeron muertos, como por veneno, sobre los trapos que en una hora malvada habían perturbado ''. -Boccaccio"
 panum.811.g: "¡Quemar ropa, muebles e incluso casas si es necesario!"
 panum.811.h: "Esto no es necesario."
 panum.812.t: "¡Mata todo!"
 panum.812.d: "Se sospechaba desde el principio que las ratas podían ser portadores de la peste. Hay llamadas en el [SCOPE.sState('panum_disease_state').GetName] para erradicar específicamente a los animales y las alimañas para prevenir la propagación de la enfermedad."
 panum.812.f: "A raíz de la pandemia de la tercera plaga, las ciudades europeas crearon un \"cuerpo anti-rat\" real que se encargaron de buscar y matar específicamente a los animales o sumergirlos en cubos de gasolina. Sin embargo, a menudo se propuso que otras fuentes de peste, como los parásitos infectados específicos del ser humano o mordidos humanos, como las pulgas y los piojos, eran importantes para la transmisión en Europa durante la tercera pandemia. El bajo número de ratas infectadas por la peste encontradas durante los brotes europeos sugiere que jugaron un papel relativamente menor en la transmisión de la peste. Sin embargo, algunos investigadores han argumentado que era poco probable que las autoridades encontraran ratas infectadas por la peste porque se esconderían."
 panum.812.g: "Exterminar las ratas."
 panum.812.h: "Esto es demasiado costoso."
 panum.813.t: "Pérdida de confianza"
 panum.813.d: "Muchos residentes en [SCOPE.sState('panum_disease_state').GetName] encuentran escandaloso la situación médica actual. Las muchas muertes y el obvio fracaso del gobierno han llevado a una pérdida generalizada de confianza en el gobierno."
 panum.813.f: "La epidemia de la peste del siglo XIX causó una gran cantidad de víctimas, particularmente en China, que sacudieron severamente la confianza en el gobierno y el mandato celestial de los emperadores Qing."
 panum.813.g: "¡Entonces haz tu desorden solo!"
 panum.822.t: "La muerte negra"
 panum.822.d: "Usando varias fuentes históricas, el Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] pudo demostrar que la nueva ola de peste es en realidad una enfermedad que corresponde a la muerte negra de la Edad Media."
 panum.822.f: "El descubrimiento de la propagación de la peste en la India tenía un significado dominante en la opinión de la plaga en su significado actual como enfermedad moderna. Inicialmente condujo a la opinión de que solo había una forma en que la enfermedad se propagó. La investigación ahora se ha expandido para incluir una gran cantidad de roedores y una gran cantidad de especies de pulgas. La alta mortalidad en las colonias condujo a mayores esfuerzos de investigación para mapear las características de la epidemia. El hecho de que siempre fuera la plaga no fue cuestionada como el punto de partida. La enfermedad recibió la plaga histórica del término. Se asumió la identidad de la plaga medieval con la plaga investigada en la India."
 panum.823.t: "Temporada de peste"
 panum.823.d: "El Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] ha pasado por todos los registros. Ya sea en esta epidemia o antes, ya sea en el pasado cercano o distante: no hay epidemias de peste en invierno. Por qué este es el caso sigue sin estar claro, pero podría desempeñar un papel en la búsqueda de las razones del estallido de la enfermedad."
 panum.823.f: "'Así termina este año ... Es cierto que hemos pasado por una gran melancolía debido a la gran plaga, y puse grandes cargos por él, al mantener a mi familia en Woolwich, y a mí y a otra parte de mi familia, mis empleados, a mi cargo en Greenwich ... pero ahora la plaga está casi influyendo a nada ... pero muchos como yo conoce muy bien, muerto. Sin embargo, para nuestra gran alegría, la ciudad llena el apacio y las tiendas comienzan a abrirse nuevamente. Ore que Dios continúe la disminución de la peste, ya que eso mantiene a la corte alejada del lugar de los negocios, por lo que todo va a Wrack en cuanto a asuntos públicos, a esta distancia no piensan en ello \". -Samuel Pepys"
 panum.824.t: "Peste bubónica y peste neumónica"
 panum.824.d: "El Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] pudo demostrar que hay más de una forma de peste."
 panum.824.f: "La plaga generalmente se entiende que significa la peste bubónica. El período de incubación es de unas pocas horas a siete días. Los síntomas son fiebre, dolor de cabeza y dolores corporales, una fuerte sensación de enfermedad y mareos. Las perturbaciones de la conciencia ocurren más tarde. El nombre de la peste bubónica proviene de las protuberancias muy hinchadas y muy dolorosas en el cuello, las axilas y la ingle. La peste neumónica es significativamente más rara. Es probable que sea similar a la influenza, aunque su capacidad para propagarse es mucho más débil. La propagación es tan específica que solo puede convertirse en una epidemia en circunstancias particularmente favorables. En primer lugar, las fuentes de infección son raras. Solo una pequeña proporción de la población infectada por la peste tiene una peste neumónica, por ejemplo, en el caso de la peste bubónica y la resistencia débil."
 panum.241.t: "El experimento de conejo"
 panum.241.d: "El Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] presenta un experimento atrevido que finalmente demostrará la contagia de la tuberculosis. Se trata de inoculación. Y se trata de muchos conejos pequeños muertos."
 panum.241.f: "'Para mi primer experimento, compré un par de lindos conejos de tres semanas con el fin de determinar la contagia de la tuberculosis. Rocié uno de estos con extracto tuberculítico del tejido de un paciente de tuberculosis que había muerto 33 horas antes. Repetí el procedimiento dos veces. Después de unos días, diseccioné a los animales y descubrí que el conejo estaba infectado con tuberculosis. \ N \ na mes después repití el experimento con tres hermosos conejos. Repetí el procedimiento nuevamente, luego agregando un conejo. Luego diseccioné uno de los conejos cada día durante cuatro días consecutivos. Todos sufrieron tuberculosis, aunque en cuatro etapas diferentes de la enfermedad. Solo había inoculado el primero. \ N \ nin Mi tercer intento, adquirí cuatro pares de conejos jóvenes y lindos, de tres meses ... '\ n \ nfrom Doctor [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] folleto experimental' la causa y la naturaleza de la tuberculosis '"
 panum.241.g: "¡Detente estos terribles experimentos con animales!"
 panum.241.h: "Repitemos el experimento para estar seguro."
 panum.241.i: "¡Un tercer experimento de conejo para la ciencia!"
 panum.241.j: "[GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetSheHe|U] puede matar tantos conejos como sea posible para probar la teoría."
 panum.261.t: "Neumotórax artificial"
 panum.261.d: "El médico [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] ha inventado un dispositivo que colapsa artificialmente los pulmones y podría ayudar a combatir la tuberculosis."
 panum.261.f: "Con la ayuda de su hermano, Carlo Forlanini diseñó y construyó un dispositivo simple capaz de administrar gases intrapleuralmente. La presencia de gas en el fluido intrapleural hizo que el pulmón colapsara, por lo tanto, creó un neumotórax artificial. Después de haber construido el dispositivo, Forlanini intentó tratar dos casos de tuberculosis induciendo un neumotórax en los dos pacientes y obtuvo resultados positivos. Con los años, la técnica de Forlanini se desarrolló y mejoró aún más, lo que aumentó la tasa de éxito del procedimiento. El neumotórax artificial continuó como tratamiento hasta la introducción de estreptomicina."
 panum.262.t: "Toracoplastia"
 panum.262.d: "Gracias a las habilidades quirúrgicas [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetHerHis], el médico [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] inventó un procedimiento que revolucionó la cirugía pulmonar y, por lo tanto, permitió un tratamiento mejorado de los pacientes con tuberculosis."
 panum.262.f: "Una toracoplastia es un procedimiento quirúrgico en el que las costillas o partes de las costillas de un lado del cofre se eliminan quirúrgicamente para colapsar el pulmón o las partes del pulmón. Este procedimiento se remonta a Edouarde de Célenville y se usó principalmente para tratar la tuberculosis pulmonar, pero luego se volvió cada vez menos importante con la introducción de antibióticos efectivos."
 panum.263.t: "¡El médico lo hizo de nuevo!"
 panum.263.d: "Para probar una vez más la contagia de la tuberculosis, el Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] una vez más mató a innumerables conejos lindos."
 panum.263.f: "'De los cuatro pares que adquirí esta vez, maté al primer animal del primer par de inmediato. No mostró ninguna lesión de los pulmones."
 panum.263.g: "Se trata de salvar vidas humanas."
 panum.263.h: "Este médico tiene un problema grave."
 panum_pneumothorax_modifier: "Neumotórax artificial"
 panum_thoracoplasty_modifier: "Toracoplastia"
