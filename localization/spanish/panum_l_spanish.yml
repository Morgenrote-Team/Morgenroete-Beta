 panum.112.t: "Un rayo de esperanza"
 panum.112.d: "En los hospitales de cólera de [SCOPE.sState('panum_disease_state').GetName], un médico ha distinguido particularmente [SCOPE.sCharacter('panum_new_physician_scope').GetHerselfHimself] en la epidemia actual. La forma en que funciona [SCOPE.sCharacter('panum_new_physician_scope').GetFullName] ya ha ganado importancia nacional. Este médico podría desempeñar un papel importante para combatir la epidemia en [GetPlayer.GetName]."
 panum.209.t: "Dr. tuberculosis"
 panum.209.d: "El jefe del sanatorio de tuberculosis, Dr. [SCOPE.sCharacter('panum_new_physician_scope').GetLastName], ha ofrecido servicios [SCOPE.sCharacter('panum_new_physician_scope').GetHerHis] en medio de la furiosa epidemia."
 panum.112.f: "'Dios me habló y me llamó a su servicio. ¿Qué forma era este servicio para tomar la voz no dijo? -Florencia Nightingale"
 panum.112.g: "¡Dale a [SCOPE.sCharacter('panum_new_physician_scope').GetHerHim] un puesto oficial de inmediato!"
 panum.112.h: "El médico debe capacitar a las generaciones futuras para luchar contra la próxima epidemia."
 panum.122.t: "Incubación de cólera"
 panum.122.d: "Después de varias observaciones y entrevistas, el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] descubrió que pasa una cierta cantidad de tiempo antes de que aparezcan los síntomas típicos de cólera en un paciente."
 panum.122.f: "El médico estima que este período es de aproximadamente medio día a cinco días, con el promedio de tres días. [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] ha mantenido varias discusiones con las víctimas de la enfermedad y sus familiares. Por lo tanto, [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] pudo reconstruir los eventos basados ​​en varios informes de testigos oculares. Incluso si la causa permanece oscura, las conclusiones pueden extraerse más tarde de estas observaciones sobre lo que sucedió exactamente el día 1."
 panum.122.g: "Bien observado."
 panum.124.g: "Observado con precisión."
 panum.123.t: "Síntomas del cólera"
 panum.123.d: "Hoy, el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] envió a la facultad médica una lista completa de síntomas de cólera."
 panum.123.f: "Como ya se sabe, pero hasta ahora solo rudimentalmente procesado, el cólera es una enfermedad del intestino delgado humano. Las consecuencias son diarrea extrema con un típico 'heces de agua de arroz' de color azul y vómitos severos. Se dijo que el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] tenía una cierta racha sádica porque [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] envió una descripción completa de estos y otros síntomas extremadamente desagradables a tiempo para la cena académica."
 panum.124.t: "Cólera asiática"
 panum.124.d: "En un informe muy aclamado, el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] elaboró ​​las diferencias entre el cólera y otras enfermedades similares al cólera, que se considera un hito en la descripción futura de la enfermedad."
 panum.124.f: "El nombre del cólera, que se deriva de la palabra griega para la bilis, se refiere originalmente a todas las formas posibles de diarrea o problemas intestinales ('flujo bilista'). Aunque Jakob de Bondt ya había descrito una enfermedad de cólera específicamente india en 1642, el cólera permaneció puramente un término colectivo. Fue solo con el surgimiento de las principales pandemias de cólera del siglo XIX que este nuevo tipo específico de cólera, que resultó ser la enfermedad más devastadora del siglo, también se definió con un nombre propio para diferenciarlo claramente: Cholera Asiatica."
 panum.222.t: "Incubación de tuberculosis"
 panum.222.d: "En su investigación sobre tuberculosis, el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] notó algunas rarezas relacionadas con la enfermedad. Aparentemente, puede pasar semanas antes de que una persona enferma realmente muestre síntomas típicos."
 panum.222.f: "Ya sea teoría de miasma o teoría de gérmenes: la tuberculosis todavía plantea un misterio. Si se trata de una enfermedad infecciosa, aparentemente puede tomar semanas para que los síntomas se rompan: ¡el médico asume entre dos e incluso doce semanas! Además, no todos los que viven con alguien enfermo parecen infectarse directamente, como [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] descubrió en numerosas encuestas de pacientes y familiares. O los académicos tienen razón con su teoría de que la tuberculosis no es una enfermedad infecciosa y otros factores son responsables, o el riesgo de infección es más bajo que el primero en pensar."
 panum.223.t: "Síntomas de tuberculosis"
 panum.223.d: "Después de que el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] estudió intensamente los síntomas de la tuberculosis, [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] llegó a una conclusión que sorprendió incluso a algunos colegas académicos: la tuberculosis es una enfermedad mucho más complicada con una amplia variedad de síntomas que van mucho más allá de los problemas pulmonares."
 panum.223.f: "Aunque el ataque a los pulmones y su dolorosa destrucción lenta es una de las características más conocidas de la tuberculosis, la tos es solo uno de los muchos síntomas. La tuberculosis pulmonar es solo un tipo de tuberculosis, que también puede afectar a otros órganos. La fatiga, la fiebre, la pérdida de apetito, los sudores nocturnos o la sangre escupir fueron síntomas previamente conocidos. El hecho de que la tuberculosis no solo ataca al cuerpo fuera de los pulmones, sino que dos tipos diferentes de tuberculosis pueden ocurrir al mismo tiempo, ha cambiado significativamente la cosmovisión de algunos miembros de la facultad médica."
 panum.224.t: "Tuberculosis y escótula"
 panum.224.d: "El Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] trató intensamente con las diversas formas de posibles enfermedades de tuberculosis y, a pesar de las numerosas similitudes con otros síntomas de la enfermedad, elaboró ​​las diferencias específicas entre la tuberculosis y la escrófula, pero al mismo tiempo también enfatizó las conexiones."
 panum.224.f: "Las descripciones de tuberculosis han existido durante siglos, pero no tuvo efectos comparables y devastadores hasta el siglo XIX debido a la menor urbanización. Todavía era conocido bajo otros nombres hasta el siglo XIX: el término 'consumo' todavía se usaba en el mundo de habla inglesa hasta el siglo XX. René Laennec es considerado uno de los pioneros de la investigación de tuberculosis que inventó el estetoscopio para el examen pulmonar. Johann Lukas Schönlein acuñó el término tuberculosis en 1832 y la asoció con una imagen clínica específica. Un hallazgo importante de estos años fue que la escrófula y la tuberculosis eran dos enfermedades diferentes, pero difícilmente podrían diferenciarse debido a la gran cantidad de síntomas de tuberculosis."
 panum.322.t: "Incubación y síntomas de la viruela"
 panum.322.d: "En un resumen reciente, el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] señaló que los síntomas iniciales de la viruela no son diferentes a los de la influenza antes de que aparezcan las infames pústulas. Se puede suponer que pasan una o dos semanas entre infección y síntomas."
 panum.322.f: "'Aquellos fácilmente restaurados a la salud de la plaga me parecen haber sido secas y purgadas previamente con respecto a todo el cuerpo, ya que se produjo el vómitos en algunos de ellos y el estómago fue perturbado en total. Y, de la misma manera, en aquellos ya purgados que iban a ser salvados, las pústulas oscuras aparecen claramente en todo el cuerpo, en la mayoría de los ulcerosos, en seco. (...) En el exterior, el cuerpo no estaba caliente al tacto, ni había palidez; La piel era bastante roja, furiosa y estalló en pequeñas ampollas y úlceras. -Sar"
 panum.323.t: "Varicela o viruela?"
 panum.323.d: "Durante [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] observación de pacientes con viruela, el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] pudo presentar un informe parcial de que la varicela es una enfermedad independiente e inofensiva. Esta ha sido una teoría muy controvertida hasta ahora."
 panum.323.f: "'La varicela estalla en muchos sin ninguna enfermedad o signo previo: en otros están precedidos por un poco de frío, lasitud, tos, sueño roto, dolores errantes, pérdida de apetito y febril durante tres días. La mayoría de ellos son del tamaño común de la viruela, pero algunas son menos. Nunca los vi confluentes ni muy numerosos. El mayor número que observé fue de unos doce en la cara, y doscientos sobre el resto del cuerpo. En el segundo o más lejano del tercer día desde el comienzo de la erupción, tantos bolsos como no están rotos parecen llegar a su madurez total, y aquellos que son más completos de ese licor amarillo se asemejan mucho a lo que es el viruelo genuino en el quinto o sexto día, especialmente donde ocurre un espacio más grande que el ordinario ocupado por el suero extravasado. -Hilliam Heberden"
 panum.324.t: "La diferencia entre el sarampión y la viruela"
 panum.324.d: "El Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] comparó los síntomas de los pacientes con la viruela, los pacientes con sarampión y los pacientes con varicela con extrema cuidado y pudo clasificarlos con mucha precisión."
 panum.324.f: "'La erupción de la viruela está precedida por una fiebre continua, dolor en la espalda, picazón en la nariz y pesadillas durante el sueño. Estos son los síntomas más agudos de su enfoque junto con un dolor notable en la espalda acompañado de fiebre y una picazón por el paciente en todo su cuerpo. Aparece una hinchazón de la cara, que va y viene, y uno nota un color inflamatorio general notable como un fuerte enrojecimiento en ambas mejillas y alrededor de ambos ojos. Uno experimenta una pesadez de todo el cuerpo y una gran inquietud, que se expresa como un montón de estiramientos y bostezo. Hay un dolor en la garganta y el pecho y uno le resulta difícil respirar y tos. Los síntomas adicionales son: sequedad de la respiración, saliva gruesa, ronquera de la voz, dolor y pesadez de la cabeza, inquietud, náuseas y ansiedad. Tenga en cuenta la diferencia: la inquietud, las náuseas y la ansiedad ocurren con mayor frecuencia con el sarampión que con la viruela. Por otro lado, el dolor en la parte posterior es más evidente con la viruela que con el sarampión. -Rádicos"
 panum.422.t: "Tifus síntomas e incubación"
 panum.422.d: "En un primer informe interino, el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] enumeró los síntomas del tifus, así como una estimación inicial de cuándo aparecen por primera vez en el curso de la enfermedad."
 panum.422.f: "'Fiebre, escalofríos, dolor de cabeza, tos, erupción, vómitos: todos estos son signos de tifus. Sin embargo, todos estos síntomas también se pueden encontrar en enfermedades similares. Las náuseas y la confusión, por otro lado, son típicos para el tifus clásico. El curso característico de la fiebre es un aumento de temperatura de dos días de día, seguido de una fiebre continua de alrededor de diez días y posterior diferencia durante varios días. Según mis cálculos, lleva entre diez y catorce días entre la infección y los primeros síntomas ''."
 panum.423.t: "La fiebre del campamento"
 panum.423.d: "Después de que el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] compara informes históricos de epidemias en el ejército con los síntomas actuales de los pacientes con tifus, llega a la conclusión de que equiparar el tifus y la 'fiebre del campamento' es de poca ayuda."
 panum.423.f: "\"Ciertamente es fiebre del campamento, pero ¿es la fiebre del campamento?\" El Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] hizo preguntas como estas que hicieron pensar a los miembros de la facultad médica. Históricamente conocido como 'fiebre del campamento', se ha asociado durante mucho tiempo con epidemias en los ejércitos o cuarteles principales, particularmente como la enfermedad que infligió víctimas masivas en el ejército napoleónico. Pero no todas las enfermedades en el ejército conocidas como 'fiebre del campamento' pueden equipararse con tifus. La fiebre recurrente y la fiebre de la trinchera son otras enfermedades conocidas por haber afectado al personal militar en espacios confinados. La enfermedad que se desencadena particularmente durante la Guerra Civil estadounidense, por otro lado, a menudo se conoce como tifus, pero en realidad era fiebre tifoidea."
 panum.424.t: "Typhus: ¿Dos enfermedades en una?"
 panum.424.d: "Al examinar a los pacientes con tifus, el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] descubrió que varios supuestos eran fundamentalmente incorrectos. Si los médicos anteriores hubieran diagnosticado un 'cambio mórbido' en los intestinos, [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] no pudo detectar nada de esto en aquellos que murieron de tifus. Más bien, el médico supone que la enfermedad intestinal es una enfermedad que debe distinguirse del tifus, que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] llama 'fiebre tifoidea'."
 panum.424.f: "Hasta mediados del siglo XIX, los médicos no diferenciaron entre tifus y fiebre tifoidea. Simplemente se los consideraba manifestaciones de la misma enfermedad con diversos grados de síntomas. En 1836, el médico estadounidense William Gerhard observó que en algunas personas con tifus los intestinos no se vieron afectados por la enfermedad, a pesar de que había sido uno de los síntomas comúnmente diagnosticados hasta ese momento. Además, observaciones similares lo hicieron creer que el tifus no era una enfermedad de los intestinos, sino que atacó a otros órganos: la confusión mental y el dolor muscular eran mucho más comunes que los problemas del tracto digestivo. La identificación de siglos de tifus y fiebre tifoidea no solo ha llevado a una similitud en los nombres, sino que también ha llevado al hecho de que en algunos idiomas la fiebre tifoidea se conoce como tifus, por ejemplo, en alemán."
 panum.522.t: "Dos cursos de fiebre amarilla"
 panum.522.d: "En [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] observación cercana de la fiebre amarilla, el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] descubrió que la enfermedad puede progresar de dos maneras."
 panum.522.f: "El médico descubrió que en muchos casos conocidos, la fiebre amarilla tiene una manifestación leve que pasa después de unos días. Se estima que cinco de cada seis pacientes experimentan esta forma leve de fiebre amarilla. El otro curso de la enfermedad es peligroso y puede ser fatal. Los pacientes sufren un segundo curso tóxico. Se caracteriza por fiebre recurrente, acompañada de ictericia debido al daño hepático, así como al dolor abdominal. Sangrar en la boca, la nariz, los ojos y el tracto gastrointestinal causan vómito que contiene sangre, de ahí uno de los nombres en español para fiebre amarilla, Vómito negro ('vómito negro'). También puede haber insuficiencia renal, hipo y delirio. Se estima que el 20 al 50 por ciento de las víctimas de fiebre amarilla que alcanzan esta segunda etapa de la enfermedad murieron; el académico concluye en el informe presentado."
 panum.523.t: "Temporadas de fiebre amarilla"
 panum.523.d: "El Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha encontrado que las epidemias de fiebre amarilla siguen un cierto patrón temporal."
 panum.523.f: "Los registros históricos y los datos actuales sugieren que la fiebre amarilla ocurre principalmente en verano. El Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] aún no ha podido explicar por qué la enfermedad no ocurre anualmente como la influenza, sino que desaparece por completo durante largos períodos de tiempo. Es sorprendente que la fiebre amarilla fuera particularmente desenfrenada en años lluviosos."
 panum.524.t: "Una enfermedad local?"
 panum.524.d: "Al describir la enfermedad de la fiebre amarilla, el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] enfatiza el hecho de que la fiebre amarilla es una enfermedad limitada a ciertos territorios y se propaga principalmente en áreas pantanosas y tropicales, con algunas excepciones."
 panum.524.f: "El Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha revisado varios informes y registros de otras epidemias de fiebre amarilla. Lo sorprendente es que estos tuvieron lugar en un área muy limitada. Las regiones tropicales y los pantanos en África y América se ven afectados principalmente. Aunque en algunos casos la epidemia se está moviendo más al norte, por ejemplo, a Filadelfia en los Estados Unidos y a Barcelona en España, el médico está convencido de que ciertas zonas climáticas tienen algo que ver con la aparición de la enfermedad. El hecho de que haya habido brotes aislados de la enfermedad en los puertos ingleses no se molesta [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim], porque la enfermedad no se ha propagado mucho más allá del área circundante de la ciudad portuaria."
