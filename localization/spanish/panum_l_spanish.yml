 notification_panum_description_cholera_notification_name: "Primera descripción del cólera" #NT!
 notification_panum_description_cholera_notification_desc: "A [concept_panum_physician] de [GetGlobalVariable('panum_cholera_description_invented_global_var').GetCountryDefinition.GetName] se ha descrito científicamente por primera vez el cólera, lo que permite distinguirlo claramente de otras enfermedades." #NT!
 notification_panum_treatment_cholera_notification_name: "Primer tratamiento del cólera" #NT!
 notification_panum_treatment_cholera_notification_desc: "Por primera vez, un equipo de investigadores de la Universidad de Nottingham (Reino Unido) ha descrito científicamente las causas y el tratamiento del cólera, lo que supone un hito histórico en la lucha contra esta enfermedad." #NT!
