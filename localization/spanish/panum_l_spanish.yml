 panum.1100.t: "La gripe [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective]"
 panum.1100.d: "Varios hospitales, clínicas y oficinas médicas han informado un número inusualmente alto de casos de una enfermedad extraña que primero pensaron que era la gripe común. Las camas de grúas ahora están superpobladas y las habitaciones públicas tienen que ser despejadas. Los peores temores se confirman que aparentemente es la temida gripe [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] que ha alcanzado en los países vecinos."
 panum.1100.f: "Al principio, los médicos hablaron de una epidemia de gripe normal. En los primeros días, la prensa afirmó que era una extraña enfermedad de tipo epidemia, pero que era inofensivo y sin muertes. \ N \ nbut lo contrario es el caso. Todos los días, la epidemia de gripe llega a una nueva ciudad, una nueva región y exige una reorganización completa del tratamiento médico. Donde ayer dos hombres en un cuartel sufrieron de síntomas, hoy ya hay 700. La naturaleza siniestra de la enfermedad se refleja en el hecho de que no mata a los niños y las personas mayores como de costumbre, sino a los jóvenes de entre 20 y 40 años. Una de cada veinte personas enfermas no sobrevive a la gripe. De dónde vino, cómo vino, qué es: esta pandemia sigue siendo un misterio. Sin embargo, lo que ya está amanrando es que esta gripe podría cambiar completamente la normalidad como lo conocíamos anteriormente. El llamado a la acción del gobierno se está volviendo más fuerte. ¿Cómo responderá [GetPlayer.GetName] a esto?"
 panum.1100.g: "Esta es una enfermedad benigna, ¿no?"
 panum.1101.t: "La gripe española"
 panum.1101.d: "Varios hospitales, clínicas y oficinas médicas han informado un número inusualmente alto de casos de una enfermedad extraña que primero pensaron que era la gripe común. Las camas de grúas ahora están superpobladas y las habitaciones públicas tienen que ser despejadas. Los peores temores se confirman que esto es aparentemente una pandemia de proporciones previamente desconocidas."
 panum.1101.f: "La gripe española fue una pandemia de influenza causada por un derivado inusualmente virulento del virus de la influenza que se propagó en tres olas entre 1918 y 1920, alegando entre 20 millones y 50 millones de vidas, con estimaciones que van a una población global de aproximadamente 1.8 mil millones hasta 100 millones. Se dice que un total de alrededor de 500 millones de personas han sido infectadas, lo que resulta en una tasa de mortalidad del 5 al 10 por ciento, que fue significativamente más alta que la de las enfermedades causadas por otros patógenos de influenza. La gripe se convirtió en 'español' cuando, el 29 de junio de 1918, el director de salud español Martín Salazar anunció que no tenía informes de una enfermedad comparable en el resto de Europa. Desde finales de junio de 1918, la prensa internacional utilizó cada vez más el término 'gripe española', que también fue alentado por algunos gobiernos beligerantes para encubrir la propagación real. Se considera la \"madre de todas las pandemias\"."
 panum.1101.g: "¿Entonces la gente ya está hablando de la gripe española?"
 panum.1102.t: "La gran pandemia"
 panum.1102.d: "Varios hospitales, clínicas y oficinas médicas han informado un número inusualmente alto de casos de una enfermedad extraña que primero pensaron que era la gripe común. Las camas de grúas ahora están superpobladas y las habitaciones públicas tienen que ser despejadas. Los peores temores se confirman que esto es aparentemente una pandemia de proporciones previamente desconocidas."
 panum.1102.f: "Al principio, los médicos hablaron de una epidemia de gripe normal. En los primeros días, la prensa afirmó que era una extraña enfermedad de tipo epidemia, pero que era inofensivo y sin muertes. \ N \ nbut lo contrario es el caso. Todos los días, la epidemia de gripe llega a una nueva ciudad, una nueva región y exige una reorganización completa del tratamiento médico. Donde ayer dos hombres en un cuartel sufrieron de síntomas, hoy ya hay 700. La naturaleza siniestra de la enfermedad se refleja en el hecho de que no mata a los niños y las personas mayores como de costumbre, sino a los jóvenes de entre 20 y 40 años. Una de cada veinte personas enfermas no sobrevive a la gripe. De dónde vino, cómo vino, qué es: esta pandemia sigue siendo un misterio. Sin embargo, lo que ya está amanrando es que esta gripe podría cambiar completamente la normalidad como lo conocíamos anteriormente. El llamado a la acción del gobierno se está volviendo más fuerte. ¿Cómo responderá [GetPlayer.GetName] a esto?"
 panum.1102.g: "¿Entonces la gente ya está hablando de la gripe [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective]?"
 panum.1103.t: "Política pandémica"
 panum.1103.a.tt: "Las medidas estrictas sofocarán la economía, pero tendrán más posibilidades de entrar en vigencia antes y detener la pandemia en al menos algunos estados."
 panum.1103.b.tt: "Las medidas tardarán significativamente más en entrar en vigencia y tener un impacto, pero la economía estará menos dañada."
 panum.1103.c.tt: "La pandemia está tomando su curso natural y las medidas establecidas están siendo abolidas por completo."
 panum.1104.t: "[GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] gripe en [SCOPE.sState('panum_flu_fading_state').GetName] se desvanece"
 panum.1104.d: "Aparentemente, las restricciones en [SCOPE.sState('panum_flu_fading_state').GetName] han tenido sus primeros efectos. Después de semanas, se nota una disminución en el número de muertes."
 panum.1104.f: "Bajo ciertas condiciones, una pandemia puede disminuir en un estado después de unas pocas semanas. Las medidas rígidas, un buen sistema de salud, un médico de primera clase o técnicas médicas altamente desarrolladas ayudan a iniciar este proceso."
 panum.1104.g: "Una señal de esperanza."
 panum.1105.t: "[GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] gripe en [SCOPE.sState('panum_flu_disappearing_state').GetName] desaparece"
 panum.1105.d: "Después de que la pandemia en [SCOPE.sState('panum_flu_disappearing_state').GetName] ha disminuido notablemente en las últimas semanas, no se han registrado casos nuevos allí en estos días. ¡La región está completamente libre de gripe!"
 panum.1105.f: "Para que una pandemia desaparezca por completo de un estado, ya debe haberse desvanecido. Entonces es posible que alguna región esté libre de gripe antes del final de la pandemia real. Las medidas rígidas, un buen sistema de salud, un médico de primera clase o técnicas médicas altamente desarrolladas ayudan a deshacerse de la gripe."
 panum.1105.g: "¿Las medidas contribuyeron a esto?"
 panum.1106.t: "Víctima de la gripe [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective]"
 panum.1106.d: "[SCOPE.sCharacter('panum_pandemic_victim').GetFullName] contrató la gripe [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] hace unos días y está experimentando un curso severo de la enfermedad. Los médicos esperan lo peor."
 panum.1106.f: "Alrededor de las 12 en punto comencé a sentirme caliente. Tenía tan febril que temía que encendiera la ropa. Tenía una tos que arrancó mis entrañas cuando no podía suprimirla. Estaba oscuro; Seguramente tenía neumonía y nunca estaba tan triste e incómodo en mi vida. ... Entonces descubrí que estaba rompiendo en un diluvio de transpiración y, aunque debería haber estado más cómodo, estaba más miserable que nunca. Cuando finalmente llegó la luz, era un espécimen de miseria: no podría respirar sin una tos insoportable y no había esperanza en mí. -Franklin Martin, [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] Survivor de gripe"
 panum.1106.g: "No hay nada que podamos hacer."
 panum.1107.t: "Informes de gripe que crean sentimientos contra la guerra"
 panum.1107.d: "Los informes de las muchas muertes resultantes de la gripe [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] en [SCOPE.sState('panum_disease_state').GetName] están perjudicando el apoyo popular para nuestros esfuerzos de guerra."
 panum.1107.f: "'Es una locura que enviemos a los hombres a la guerra mientras esta plaga delvaza nuestros hogares. ¿No debería el estado priorizar la vida de sus ciudadanos por sus muertes?"
 panum.1107.g: "No interferiremos con la prensa libre."
 panum.1107.h: "Distribuir propaganda tranquilizadora respaldada por la ciencia médica."
 panum.1107.i: "Censura de noticias de tasas de mortalidad e infecciones."
 panum.1108.t: "Medidas pandémicas que contribuyen a la pobreza"
 panum.1108.d: "Con muchos incapaces de trabajar debido a nuestras medidas antipandémicas, los ciudadanos más pobres en [SCOPE.sState('panum_disease_state').GetName] están luchando por pagar el alquiler. Los trabajadores recién desempleados enfrentan el desalojo a medida que los propietarios rechazan sus súplicas de aplazamiento."
 panum.1108.f: "'Me dijeron que no podía trabajar porque la fábrica está superpoblada. ¡Cada fábrica está superpoblada! El propietario, que se quema en los incendios eternos, no se preocupa por nuestra difícil situación y exige alquiler antes del final de la semana sobre el dolor del desalojo. Mi familia seguramente será forzada de nuestra casa."
 panum.1108.g: "Instituto una prohibición de congelación y desalojo de alquileres."
 panum.1108.h: "Aumentar temporalmente el Seguro Social."
 panum.1108.i: "No hay nada que podamos hacer al respecto."
 panum.1109.t: "La liga anti-máscara"
 panum.1109.d: "[SCOPE.sCharacter('anti_mask_ig_leader').GetFullName] ha formado la liga anti-máscara en oposición a nuestras medidas de pandemia. Distribuyen la efectividad de nuestras políticas y exigen que las revocemos por el bien de la economía en dificultades."
 panum.1109.f: "¡Use una máscara y salga de su vida! La emergencia que ahora se enfrenta a nuestro país está más allá de las instalaciones del departamento de salud. ¡El hombre, la mujer o el niño que no usará una máscara ahora es un flojo peligroso!"
 panum.1109.g: "Ignora la liga."
 panum.1109.h: "Abandonar las medidas contra la plaga."
 panum.1109.i: "Desacreditar la liga con ciencia médica."
 panum.1120.t: "La gripe [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] termina"
 panum.1120.d: "Muchos ya no esperaban que este día llegara. Después de muchos meses, los gustos que [GetPlayer.GetName] no ha experimentado, la gripe [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] está desapareciendo lentamente de nuestro país. ¡En verdad, esta era la madre de todas las pandemias!"
 panum.1120.f: "'The ban was lifted to-day. No more .... masks. Everything open too. 'The Romance of Tarzan' is on at the Coliseum (movie theater) as it was about 6 weeks ago. I'd like to see it awfully. School opens this week—Thursday! Did you ever? As if they couldn't have waited till Monday!' -Violet Harris, [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] Flu survivor"
 panum.1120.g: "Esperamos que ella nunca regrese."
 je_panum_spanish_flu: "La gripe [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective]"
 je_panum_spanish_flu_reason: "La gripe [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] fue una pandemia de influenza causada por un derivado inusualmente virulento del virus de la influenza que apareció a principios del siglo XX, alegando entre 20 millones y 50 millones de vidas, con estimaciones que van desde una población global de aproximadamente 1.8 mil millones hasta 100 millones. Se dice que un total de alrededor de 500 millones de personas han sido infectadas, lo que resulta en una tasa de mortalidad del 5 al 10 por ciento, que fue significativamente más alta que la de las enfermedades causadas por otros patógenos de influenza. Se considera la \"madre de todas las pandemias\". La gripe se convirtió en '[GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective]' cuando el director de salud [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] anunció que no tenía informes de una enfermedad comparable en el resto del mundo. A partir de entonces, la prensa internacional utilizó cada vez más el término '[GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] gripe', que también fue alentado por algunos gobiernos para encubrir la propagación real."
 panum_remove_spanish_flu_effect_tt: "Derogaciones de todas las políticas de pandemia y sus efectos."
 panum_recent_pandemic_policy_change_modifier: "Cambio de política pandemia reciente"
 panum_spanish_flu_lockdown_modifier: "Bloqueo de pandemia"
 panum_spanish_flu_measures_modifier: "Medidas pandémicas"
 panum_spanish_flu_fading_modifier: "Desvanecimiento de la pandemia"
 panum.2600.t: "Un nuevo asilo"
 panum.2600.d: "El médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] celebró la inauguración del nuevo asilo mental con un discurso hoy."
 panum.2600.f: "Numerosas personalidades prominentes también estaban presentes en la inauguración, incluidos los políticos de la oposición. Mientras que el médico señaló los nuevos métodos y una serie completa de síntomas claros que llevaron al ingreso a la clínica, los oponentes del gobierno escépticos sospecharon que tal institución también podría ser adecuada para el abuso."
 panum.2600.g: "Finalmente el lugar correcto para políticos, periodistas, actores ..."
 panum.2601.t: "Una admisión psiquiátrica urgente"
 panum.2601.d: "El médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha preparado un informe que demuestre que [SCOPE.sCharacter('chosen_character').GetFullName] requiere atención de salud mental urgente. Lamentablemente, [SCOPE.sCharacter('chosen_character').GetLastName] pasará muchos años en el asilo mental. Posiblemente ... muchos años."
 panum.2601.f: "'Como algún día puede suceder que se encuentre una víctima que tenga una pequeña lista: tengo una pequeña lista de los delincuentes de la sociedad que podrían estar bajo tierra, que nunca se lo extrañarían, ¡que nunca se les extrañaría! Tribotándose la mano, date la mano contigo como si todas las terceras personas que estén maltratando tête-á-tête insistan en que no se extrañaron a ninguno de ellos, ¡no se les extrañaría! '"
 panum.2601.g: "[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] los tiene en la lista, ¡y no se perderán a ninguno de ellos!"
 panum.2601.tt: "[SCOPE.sCharacter('chosen_character').GetFullName] desaparece para siempre en los tratados del asilo mental ..."
 panum_physician_recent_asylum_conducted_modifier: "Admisión reciente al asilo mental"
 panum_send_leader_to_asylum_modifier: "Abuso político de la psiquiatría"
 panum_checkmark_loc: "@green_checkmark!"
 panum_cross_loc: "@Red_Cross!"
 panum.21.t: "Dispersión de los enfermos"
 panum.21.d: "El doctor Hasnebein se le atribuye el desarrollo de un sistema moderno para clasificar a los enfermos y heridos de acuerdo con la gravedad de sus lesiones, aumentando así las posibilidades de supervivencia del paciente."
 panum.21.f: "A partir de sus experiencias en la Guerra del Caucásico y la Guerra de Crimea, el cirujano ruso Nikolai Ivanovich Pirogov desarrolló procedimientos de tratamiento quirúrgico graduados y el principio de 'dispersión de los enfermos' (tratamiento distribuido del herido y enfermo) para ordenar las áreas de vestidos abarrotados y dividir las céspedes en las cinco estadios (principios de detección de Pirogov). El ejército prusiano adoptó el principio ruso en 1866, y luego también se aplicó a los otros servicios médicos de ejércitos aliados en Europa. En un desarrollo posterior, también se transfirieron numerosos avances en medicina y métodos quirúrgicos a la organización del Servicio Médico Militar. Sin embargo, el principio de Pirogov permaneció intacto durante la Primera Guerra Mundial."
 panum.21.g: "¿Entonces hay una jerarquía de los enfermos?"
 panum.22.t: "Un tratamiento para la malaria"
 panum.22.d: "Al extraer efectivamente la quinina de la corteza de los árboles de cinchona, el médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha inventado un método de tratamiento que ayuda contra la malaria."
 panum.22.f: "Los jesuitas ya tenían un monopolio de facto sobre el uso de Cinchona para curar la malaria en el período moderno temprano, incluso si inicialmente había reservas en algunos países protestantes. A principios del siglo XIX, poco después del descubrimiento de la morfina, la quinina se encontró como el ingrediente que determina la efectividad de la corteza de cinchona y la convirtió en una piedra angular de la química de las plantas emergentes. Fue producido en un estado impuro por Antoine François de Fourcroy en 1792 y aislado de la corteza de Cinchona en 1820 por Pierre Joseph Pelletier y Joseph Bienaimé Caventou por extracción con alcohol. En 1823, la quinina se obtuvo por primera vez a escala industrial de la corteza de las especies de Cinchona por el farmacéutico Friedrich Koch en Oppenheim. La quinina posteriormente estimuló la investigación de la química de las plantas."
 panum.22.g: "Una medicina valiosa."
 panum.23.t: "Solo una categoría diferente de pacientes"
 panum.23.d: "El médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] envió una carta urgente al gobierno hoy. En él, [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] critica el tratamiento de personas con enfermedades mentales y aboga por tratarlos como pacientes que merecen un mejor tretamento, y no como personas antisociales que necesitan ser excluidas de la sociedad."
 panum.23.f: "El primer paso decisivo hacia el tratamiento psicológico de los pacientes tuvo lugar en el siglo XVIII, cuando las personas con enfermedades mentales y los convictos comunes ya no se \"mantenían\" en las mismas habitaciones, pero las instituciones separadas se pusieron de moda. Estos todavía estaban muy por debajo de cualquier estándar humano. Se dio un paso más cuando las pesadas cadenas de hielo con las que los lunáticos habían sido encadenados fueron abolidos a favor de una mayor libertad de movimiento. Desde principios del siglo XIX en adelante, quedó claro que estas personas también estaban enfermas y tenían derecho al tratamiento. En Inglaterra, la Ley de locura de 1845 fue un hito importante, ya que cambió explícitamente el estado de las personas con enfermedades mentales a los pacientes."
 panum.23.g: "La vida mental de estas personas también cuenta."
 panum.24.t: "Conocimiento médico y de enfermería"
 panum.24.d: "El médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] nos recordó que el personal menos calificado a veces es de gran uso como enfermeras para las muchas víctimas en el campo de batalla, y aboga por un mayor uso de mujeres como enfermeras."
 panum.24.f: "Mientras que en otros países europeos, especialmente Francia y Alemania, las órdenes católicas hicieron que fuera su misión capacitar a las enfermeras, poca de esto en Gran Bretaña u otros países protestantes. Muy pocos monasterios y órdenes sobrevivieron a la Reforma inglesa. El público británico se hizo dolorosamente consciente de este hecho a través de publicaciones de Florence Nightingale. La capacitación del personal de enfermería fue vista como una tarea nacional para la cual se recolectaron donaciones. La Escuela de Enfermería Nightingale en el Hospital de San Tomás en Londres, fundada por Nightingale, se convirtió en el núcleo de esta profesionalización. Con su sentencia 'los médicos tratan con enfermedades, las enfermeras tratan con personas', se dice que sentó las bases para una filosofía de enfermería."
 panum.24.g: "Mujeres al frente."
 je_panum_spanish_flu_research: "La gripe [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective]: investigación"
 je_panum_spanish_flu_research_reason: "El médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha decidido investigar la misteriosa pandemia con más detalle. Cuánto éxito [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] tendrá una suposición de nadie. Sin embargo, un médico experimentado debería tener una mejor oportunidad de lograr un resultado."
 je_panum_spanish_flu_research_complete_tt: "Un [concept_panum_physician] puede obtener nuevos conocimientos de la pandemia: por ejemplo, el lugar de origen, una descripción de la enfermedad o incluso el patógeno."
 state_harvest_condition_panum_spanish_flu_condition_impact_mult: "[GetHarvestConditionType('panum_spanish_flu_condition').GetName] [concept_panum_disease] Impacto"
 state_harvest_condition_panum_spanish_flu_condition_impact_mult_desc: "Un aumento o disminución del impacto de la pandemia."
 panum_spanish_flu_physician_help_modifier: "El médico lucha contra la pandemia"
 panum.1110.t: "El doctor y la pandemia"
 panum.1110.d: "The outbreak of the pandemic is a crucial hour for Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]: now [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] can shine! But the question arises: should it be better to actively fight the pandemic or research it?"
 panum.1110.f: "'En el día en que quedó claro que no estaríamos lidiando con una ola de gripe ordinaria, sentí una gran motivación para hacer mi parte. Y al mismo tiempo sentí el peso vertiginoso sobre mis hombros. Las expectativas eran enormes. ¿Alguna vez podría cumplir las esperanzas que se colocaron sobre mí?"
 panum.1110.g: "Lucha contra la pandemia."
 panum.1110.h: "Investigue la pandemia."
 panum.1111.t: "Patógeno de la pandemia"
 panum.1111.d: "Nuestro médico principal, el médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], y nuestro biólogo jefe, el médico [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName], hoy hizo un descubrimiento brillante: ¡han descubierto el patógeno que causa la gripe [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective]!"
 panum.1111.f: "El virus de la influenza A H1N1 (A/H1N1) se refiere a un subtipo del virus de la influenza A (especies Alphainfluenzavirus influenzae) de la familia Orthomyxoviridae, que ocurre en patos, humanos y cerdos, pero también infecta a muchas otras especies mamíferas. Los virus de la influenza H1N1 se establecieron en humanos y cerdos como resultado de la gripe española de 1918. Este subtipo ha causado decenas de millones de muertes humanas. Algunos investigadores ya habían sospechado un \"virus filtrable\". En los libros de texto, la bacteria ahora llamada Haemophilus influenzae se consideraba la causa de la influenza. Sin embargo, no se pudo detectar patógenos utilizando los métodos habituales de bacteriología: no podría teñirse ni cultivarse en los medios de cultivo artificiales. Si había un avance en el conocimiento como resultado de la gripe española, entonces era en la medida en que el patógeno real de esta variante de gripe aún se desconocía en ese momento, lo que significa que Haemophilus influenzae se descartó como el patógeno. No fue sino hasta 1996 que el genoma del virus fue secuenciado."
 panum.1111.g: "¡Heureka!"
 panum.1112.t: "Origen de la pandemia"
 panum.1112.d_historical: "Después de una investigación científica sobresaliente que combina historia, criminología y conocimiento médico, el médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha hecho un descubrimiento innovador: la pandemia no se rompió en España, como se afirma tan a menudo, ¡sino en Estados Unidos!"
 panum.1112.f_historical: "El descubrimiento del médico está precedido por una investigación meticulosa. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] comparó los archivos de los pacientes y se remonta a los primeros casos de nuestro país para reconstruir una red de infecciones. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] también recopiló datos de colegas en el extranjero y, a veces, los visitaba él mismo. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] ha evaluado los hallazgos de otros médicos que han realizado esfuerzos similares en su país. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] no puede decir con certeza dónde ocurrió la primera infección, pero todo apunta al estado de Kansas. Que la enfermedad realmente estalló en Estados Unidos es ahora un hecho científico."
 panum.1112.g_historical: "¿Eso significa que deberíamos hablar sobre la gripe americana?"
 panum.1112.d_dynamic: "Después de una investigación científica sobresaliente que combina historia, criminología y conocimiento médico, el médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha hecho un descubrimiento innovador: la pandemia no se explotó en [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetName], como se afirma tan a menudo, ¡pero en [SCOPE.sCountry('panum_pandemic_country').GetName]!"
 panum.1112.f_dynamic: "El descubrimiento del médico está precedido por una investigación meticulosa. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] comparó los archivos de los pacientes y se remonta a los primeros casos de nuestro país para reconstruir una red de infecciones. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] también recopiló datos de colegas en el extranjero y, a veces, los visitaba él mismo. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] ha evaluado los hallazgos de otros médicos que han realizado esfuerzos similares en su país. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] no puede decir con certeza dónde ocurrió la primera infección. Que la enfermedad realmente estalló en [SCOPE.sCountry('panum_pandemic_country').GetNameNoFormatting] ahora es un hecho científico."
 panum.1112.g_dynamic: "¿Eso significa que deberíamos hablar sobre la gripe [SCOPE.sCountry('panum_pandemic_country').GetAdjectiveNoFormatting]?"
 panum.1113.t: "Tratamiento de la pandemia"
 panum.1113.d: "Durante la investigación [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] sobre la gripe [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective], el médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] inventó varios remedios y prácticas y desarrolló un plan de acción para contener la enfermedad. Aunque todos estos hallazgos llegan demasiado tarde, pueden ser útiles para las generaciones futuras."
 panum.1113.f: "'Mell much better and dressed today. Almost worn out with worry and loss of sleep. So much sickness and death this week, but one great ray of light and hope on the outcome of the war as peace came this past (11th).' -Helen Viola Jackson Kent, [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] Flu survivor"
 panum.1113.g: "Bueno, aprendimos algo."
 panum.1114.t: "Descripción de la pandemia"
 panum.1114.d: "Unfortunately, Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] has made little progress during the pandemic. However, [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] has written a description of the disease that could possibly be helpful in recognizing the symptoms of variants of the [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] flu."
 panum.1114.f: "'Estos hombres comienzan con lo que parece ser un ataque de La Grippe o influenza, y cuando se llevan al hospital desarrollan muy rápidamente el tipo de neumonía más viscoso que se haya visto. Dos horas después de la admisión, tienen los puntos de caoba sobre los pómulos, y unas horas más tarde puede comenzar a ver la cianosis que se extiende desde sus orejas y se extiende por toda la cara, hasta que es difícil distinguir a los hombres de color del blanco. Es solo cuestión de unas pocas horas hasta que llegue la muerte, y es simplemente una lucha por el aire hasta que se asfixian. Es horrible. Uno puede soportarlo para ver morir a uno, dos o veinte hombres, pero para ver a estos pobres demonios cayendo como moscas se ponen de los nervios. -NORTE. Roy Grist, [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] sobreviviente de gripe"
 panum.1114.g: "Esperábamos un poco más."
 panum.1115.t: "Misterio de la pandemia"
 panum.1115.d: "Unfortunately, Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] was not up to the demands of the pandemic. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] was unable to find any answers about the origin, how to combat or describe the disease. But the doctor wrote a little poem."
 panum.1115.f: "\"Tenía un pequeño pájaro, \ nits nombre era enza. \ Ni abrió la ventana, \ nand in-flu-enza\"."
 panum.1115.g: "Decepcionante."
 ACHIEVEMENT_panum_flu: "El patógeno de los patógenos"
 ACHIEVEMENT_DESC_panum_flu: "Descubra el patógeno de la gran pandemia."
 panum_functionalism_school_modifier: "Escuela psicológica de funcionalismo"
 panum_psychoanalysis_school_modifier: "Escuela Psicológica de Psicoanálisis"
 panum_analytical_psychology_school_modifier: "Escuela Psicológica de Psicología Analítica"
 panum_behaviorism_school_modifier: "Escuela psicológica del conductismo"
 panum_has_psychiatrist_tt: "[GetPlayer.GetName] tiene [concept_panum_physician] con el psiquiatra #V [concept_character_trait]#!."
 je_panum_functionalism: "Escuela psicológica de funcionalismo"
 je_panum_functionalism_reason: "La psicología o funcionalismo funcional se refiere a una escuela psicológica de pensamiento que fue una consecuencia directa del pensamiento darwiniano que enfoca la atención en la utilidad y el propósito del comportamiento que se ha modificado durante años de existencia humana. Edward L. Thorndike, mejor conocido por sus experimentos con aprendizaje de prueba y error, llegó a ser conocido como el líder del movimiento libremente definido. El funcionalismo niega el principio de introspección, que tiende a investigar el funcionamiento interno del pensamiento humano en lugar de comprender los procesos biológicos de la conciencia humana."
 je_panum_psychoanalysis: "Escuela Psicológica de Psicoanálisis"
 je_panum_psychoanalysis_reason: "El psicoanálisis es una teoría psicológica, teoría cultural, forma psicoterapéutica de tratamiento y método para la autoconciencia, que fue desarrollada alrededor de 1890 por el médico vienés Sigmund Freud. El término psicoanálisis representa el modelo de descripción y explicación de la psique humana basada en las teorías de Freud sobre la psicodinámica de los inconscientes y para la psicoterapia analítica y para la metodología psicoanalítica, que también trata la investigación de los fenómenos culturales. En los tres aspectos, el psicoanálisis continúa siendo desarrollado y cambiado por los médicos e investigadores hoy."
 je_panum_analytical_psychology: "Escuela Psicológica de Psicología Analítica"
 je_panum_analytical_psychology_reason: "La psicología analítica es una escuela psicológica con base en psicoanalíticamente fundada por el psiquiatra suizo Carl Gustav Jung en 1913. Similar al psicoanálisis, trata con las partes inconscientes de la psique humana, bajo el supuesto de que el inconsciente tiene una influencia mucho mayor que la percepción consciente. Jung y sus sucesores enfatizaron particularmente las posibilidades de expresión simbólica del inconsciente e intentaron usarlos psicoterapéuticamente."
 je_panum_behaviorism: "Escuela psicológica del conductismo"
 je_panum_behaviorism_reason: "El conductismo es el concepto de teoría científica de examinar y explicar el comportamiento de las personas y los animales utilizando métodos científicos, es decir, sin introspección o empatía. El conductismo fue fundado por John B. Watson a principios del siglo XX después de un importante trabajo preliminar de Edward Lee Thorndike. Ivan Petrovich Pavlov también llevó a cabo un importante trabajo pionero con sus experimentos sobre el condicionamiento clásico del comportamiento. En los Estados Unidos, los defensores del conductismo fueron durante décadas los investigadores conductuales más influyentes en las universidades y los acérrimos oponentes de las escuelas psicoanalíticas que emergían al mismo tiempo."
 panum_functionalism_school_founded_tt: "La escuela psicológica del funcionalismo se fundó en otro país."
 panum_psychoanalysis_school_founded_tt: "La escuela psicológica de psicoanálisis se fundó en otro país."
 panum_analytical_psychology_school_founded_tt: "La Escuela Psicológica de Psicología Analítica se fundó en otro país."
 panum_behaviorism_school_founded_tt: "La escuela psicológica del conductismo fue fundada en otro país."
 panum_psychotherapeutic_level_rises_tt: "El nivel psicoterapéutico de [GetPlayer.GetName] aumenta."
