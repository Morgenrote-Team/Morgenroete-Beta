 setting_panum_dynamic_spanish_flu_rule_desc: "En el primer tercio del siglo XX, comenzará una gripe global en un país industrializado. La pandemia lleva el nombre del lugar de origen."
 setting_panum_historical_spanish_flu_rule: "#V Flu#! histórica española"
 setting_panum_historical_spanish_flu_rule_desc: "La pandemia comenzará en 1918 y se llamará gripe española."
 setting_panum_no_spanish_flu_rule: "Sin gripe española"
 setting_panum_no_spanish_flu_rule_desc: "No habrá pandemia como la gripe española."
