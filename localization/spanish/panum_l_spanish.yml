 panum.165.t: "El corazón de la infección"
 panum_physician_health_bonus_modifier: "Seguro por lo siento"
 panum.168.f: "'¡Detener! ¿Quién está fuera de casa en este momento de - Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ¿Qué está haciendo esto tarde? '\ N \ n'i tiene rondas que hacer, y no esperarán el amanecer. Cada minuto es precioso, incluso los que después de la medianoche. '\ N \ n'good theod! ¡Estas calles no son seguras por la noche! Si me disculpa, agente, hay más trabajo por hacer antes de que mi aceite de linterna quema. Tengo una docena de viales para llenar con agua de los canales y bombas, casas para visitar, zanjas para examinar. '\ N \ n'aye, bueno, muy bien entonces. No estás haciendo nada malo, pero lo mejor es que te doy una escolta de todos modos."
 panum.3033.d: "La abrumadora mayoría de los miembros de la Cruz Roja han acordado la tercera convención internacional sobre el uso de armas químicas. Ahora es vinculante para todos los miembros."
 notification_panum_technology_boost_from_physician_notification_name: "Boost de investigación para [GetPlayer.MakeScope.GetCountry.GetCustom('panum_medical_research_next_technology_type')]"
 notification_panum_technology_boost_from_physician_notification_desc: "Gracias al Dr. [GetPlayer.MakeScope.GetVariable('panum_physician_var').GetCharacter.GetLastName] [GetPlayer.MakeScope.GetCountry.GetCustom('panum_medical_research_next_technology_type')] obtuve un impulso de investigación."
 je_panum_medical_research_project_reason: "[ROOT.GetCountry.GetCustom('panum_medical_research_project_active_type')] In addition to medical innovations, [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] can also find cures for diseases that are not among the ten classic epidemic diseases.\n\nThis is the default project of the [concept_panum_physician]. It is active when the Physician is not busy with another project.\nEvery time the progress reaches [JournalEntry.GetTotalGoalValue|V0] we will get a small technology boost.\n\nTechnology for the next boost: [GetPlayer.MakeScope.GetCountry.GetCustom('panum_medical_research_next_technology_type')]"
 panum.2611.t: "Institucionalización"
 panum.2611.d: "En vista de las condiciones inaceptables en algunos asilos mentales, los médicos y las figuras políticas están presionando para que las prácticas se reformen. Abogan por lugares aislados donde los psiquiatras pueden vivir una vida solitaria con sus pacientes, lejos del tráfico."
 panum.2611.f: "La era moderna de la provisión institucionalizada para el cuidado de los enfermos mentales, comenzó a principios del siglo XIX con un gran esfuerzo dirigido por el estado. Los asilos mentales públicos se establecieron en Gran Bretaña después de la aprobación de la Ley de Asilos del Condado de 1808. Esto capacitó a los magistrados para construir asilos respaldados por tarifas en todos los condados para albergar los muchos 'lunáticos de mando'. La Ley de locura de 1845 fue un hito importante en el tratamiento de los enfermos mentales, ya que cambió explícitamente el estado de las personas con enfermedades mentales a pacientes que requirieron tratamiento. La Ley creó la Comisión de locura, encabezada por Lord Shaftesbury, para centrarse en la reforma de la legislación loca. El Revista General de Psiquiatría debe mencionarse como un órgano de la psiquiatría institucional alemana entre 1830 y 1860. Fue fundado por Heinrich Damerow junto con Carl Friedrich Flemming y Christian Friedrich Wilhelm Roller en 1844."
 panum.2611.g: "La investigación psiquiátrica y psicológica está progresando."
 panum.2612.t: "Enfermedad del cerebro"
 panum.2612.d: "En psiquiatría, la teoría de la evolución se acompaña de cambios significativos. Una nueva generación de psiquiatras postulan que las enfermedades mentales son enfermedades del cerebro. La psiquiatría orientada científicamente está reemplazando la visión previamente prevaleciente de las humanidades."
 panum.2612.f: "Wilhelm Griesinger es considerado una de las figuras más importantes en el cambio científico en la psiquiatría. Conoció a François Magendie, fundador de la fisiología experimental y autor del primer libro de texto moderno sobre fisiología, cuyo enfoque de investigación lo influyó en gran medida. En 1839 se mudó a Friedrichshafen en el lago Constance como médico en ejercicio. Al año siguiente, 1840, recibió una oferta para trabajar como médico secundario en el asilo loco de Winnenthal. En los siguientes dos años que trabajó allí, Griesinger obtuvo una gran experiencia práctica, que se convirtió en la base de su gran trabajo 'La patología y la terapia de enfermedades mentales', publicada en 1845 e inaugurando una nueva era en psiquiatría. En él intentó encontrar psiquiatría sobre la base de la fisiología y la patología médica. La famosa declaración de Griesinger se puede encontrar en la primera página, según la cual, para comprender cada síntoma de enfermedad, es necesario localizar el fenómeno en cuestión y reconocer todas las enfermedades mentales como enfermedades del cerebro."
 panum.2613.t: "Clasificación de trastornos mentales"
 panum.2613.d: "Los psiquiatras y psicólogos han comenzado a clasificar las enfermedades mentales de acuerdo con un esquema que anteriormente solo estaba disponible en el resto de la medicina. Si bien anteriormente solo sabían 'imbécil' y 'locura', ahora reconocen 7 categorías: manía, melancolía, monomanía, paresis, demencia, dipsomanía y epilepsia."
 panum.2613.f: "El sistema triádico de la tradición psiquiátrica alemana es un sistema de enfermedades psiquiátricas que se clasifica según sus causas. La primera descripción se remonta a Emil Kraepelin; Kraepelin, a su vez, se basó en el trabajo preparatorio de Karl Ludwig Kahlbaum. Kraepelin anunció que había encontrado una nueva forma de ver la enfermedad mental, refiriéndose a la visión tradicional como \"sintomática\" y a su opinión como \"clínica\". Esta resultó ser su síntesis de paradigma de los cientos de trastornos mentales clasificados por el siglo XIX, agrupando enfermedades en función de la clasificación del síndrome - patrones comunes de síntomas a lo largo del tiempo, en lugar de una simple similitud de síntomas principales a la manera de sus predecesores."
 panum.2614.t: "Cura parlante"
 panum.2614.d: "A pesar de muchas reservas, el enfoque psicológico se está volviendo cada vez más popular entre los psiquiatras. El caso de una mujer joven que parece haber sido curada como resultado de largas discusiones se considera una plantilla para un nuevo punto de inflexión en el tratamiento de pacientes con enfermedades mentales."
 panum.2614.f: "Las experiencias que Josef Breuer obtuvo al tratar a Bertha Pappenheim (seudónimo: Anna O.) en 1880/1881 formaron la base de los estudios sobre histeria publicada junto con Sigmund Freud en 1895. Este trabajo (y el caso de casos subyacentes) fue descrito por Freud como la raíz y comenzando el punto de psicoanalisis. Después del trabajo pionero de Sigmund Freud, las ideas derivadas de la teoría psicoanalítica también comenzaron a arraigarse en la psiquiatría. La teoría psicoanalítica se hizo popular entre los psiquiatras porque permitió que los pacientes fueran tratados en prácticas privadas en lugar de almacenados en asilos."
 panum.2615.t: "Psicología y filosofía"
 panum.2615.d: "Además de la influencia de las escuelas psicológicas en la psiquiatría, también existe una creciente comprensión de las influencias filosóficas. El dominio de las ciencias naturales parece estar roto."
 panum.2615.f: "Karl Jaspers fue uno de los primeros psiquiatras del siglo XX en examinar y reflexionar sobre los supuestos filosóficos de su disciplina. La \"psicopatología general\" de Jaspers (1913) se considera el comienzo de la investigación psicopatológica reflejada metódicamente, junto con Wilhelm Griesinger, quien definió las enfermedades mentales como enfermedades del cerebro, y Emil Kraepelin, quien fue el primero en introducir un sistema de referencia nosológica útil en psiquiatría. Jaspers se refirió al trabajo temprano de Husserl sobre la psicología descriptiva y la distinción muy discutida de Wilhelm Dilthey entre 'explicar' y 'comprensión', con la que también complementó la psicopatología en un sentido metodológico."
 panum.2131.t: "Un plato para ganar"
 panum.2131.d: "Con el descubrimiento del papel que la pobreza podría desempeñar en los raquitismo, ¡los sindicalistas han asumido el manto de luchar por las comidas y la leche de la escuela gratis!"
 panum.2131.f: "Al principio comenzó lentamente: un vagón aquí o allá se estacionó fuera de la escuela, dando a los niños leche, sopa y un poco de pan. Ahora, se ha convertido en mucho más: los sindicatos de trabajadores, los socialistas y los activistas laborales de la nación han adoptado la causa no simplemente de luchar por la clase proletariada, sino también para sus hijos. Los carteles con imágenes de niños con tazones vacíos y ojos suplicantes son cada vez más comunes en las calles, y el fracaso del gobierno para proporcionar a sus ciudadanos más jóvenes y vulnerables es un cudgel fácil para condenarlo y su sistema. De verdad, ¿es para?"
 panum.2131.g: "Tendremos nuestra factura de leche gratis, sí lo haremos, sí lo haremos!"
 panum.2131.h: "No existe la leche gratis."
 panum_free_milk_modifier: "Leche libre"
 panum_no_free_milk_modifier: "Sin leche gratis"
 panum_medical_techniques_level_rises_tt: "El nivel de técnicas médicas de [GetPlayer.GetName] aumenta."
 panum.561.t: "El camino hacia una vacuna?"
 panum.561.d: "Después de la instrucción de la capital, el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha comenzado a investigar cómo tratar o incluso curar la fiebre amarilla."
 panum.561.f: "'' ... Sin embargo, me pregunto si tal vez estaba demasiado confiado en mi evaluación de que, de hecho, podría derrotar a la fiebre amarilla. La enfermedad tiene pocas certezas conocidas, incluso sus medios de transmisión son un misterio, por no decir nada de sus orígenes. ¿Es, uno podría sugerir, un resurgimiento de la teoría del miasma de lo antiguo? ¿Quién puede reclamar certeza frente a tal misterio? \ N \ nyet para todos esos misterios, hay algo que sabemos. No todos los que encuentran esta muerte enigmática son asesinadas por ella; Algunos apenas tienen señal de que era esta fiebre amarilla, y más de unos pocos se recuperan antes de que se vuelva mortal. Encontrar fiebre amarilla es bailar con la muerte, ciertamente, pero no es una certeza que te reclamará ... '"
 panum.561.g: "... y si podemos detenerlo en cualquier lugar, aún podríamos detenerlo en todas partes."
 panum.562.t: "El orfanato"
 panum.562.d: "Examinando todos y cada uno de los casos de recuperación de la fiebre amarilla, el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha llegado a una casa con una gran cantidad de sobrevivientes: un orfanato."
 panum.562.f: "'Ah, hola, debes ser la amante de este orfanato ... Veo que los niños han jugado con pintura hoy.' \ No me cree, no tengo la primera pista de dónde lo obtuvieron, ¡oh, debes ser el médico que dijeron que llamaría! Me temo que las tos ya se han aclarado, así que no hay ... 'No me temo que no soy ese médico, señora. Vengo de la capital, investigando la fiebre amarilla. Me dijeron que la enfermedad ha sido ... ¿Por aquí? '\ N'oh sí, los pequeños. Lo han tenido, muchos incluso. Algunos provienen de familias aniquiladas por la enfermedad, los pobres, pero parece ahorrar a los niños. ¿Tienes alguna teoría? ¡Ven, ven! ¡Hay un buen hombre de la capital aquí para hablar contigo! '\ N'oh ... hola, niños. Mi nombre es el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], y me gustaría hablar de fiebre amarilla ..."
 panum.562.g: "¿Cuál es la razón por la que los padres mueren pero los niños sobreviven?"
 panum.563.t_america: "La vieja sangre"
 panum.563.d_america: "En un intento por obtener más información sobre la fiebre amarilla, el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha decidido visitar a las familias de algunos de los primeros colonos en estas tierras."
 panum.563.f_america: "'' ... y sin embargo, no todas las primeras familias en estas tierras se han ido. Todavía hay algunos que pueden rastrear su historia hasta las primeras expediciones aquí, excelentes o pequeñas. Es para estas familias que he dirigido mi investigación, ya que algunas de ellas aún mantienen revistas y registros preciosos que nos dan una idea del pasado antes de los archivos históricos adecuados. Revela algo especialmente fascinante: los primeros casos de fiebre amarilla aparecieron en estas tierras en 1685 más o menos. Me lleva hacia una verdad."
 panum.563.g_america: "Son la misma enfermedad. La inmunidad a uno es inmunidad para el otro."
 panum.563.t_africa: "Los miembros de la tribu"
 panum.563.d_africa: "En un intento por descubrir más sobre la fiebre amarilla, el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha buscado los que tienen la mayor experiencia de la fiebre amarilla: los africanos nativos."
 panum.563.f_africa: "'... y sin embargo, aunque podríamos perecer rápidamente, los africanos nativos perduran. Es una enfermedad con la que son profundamente íntimas; Aunque la barrera del idioma presenta un obstáculo significativo, solo se necesitan algunas descripciones para comprender la enfermedad de la que hablo. ¿Tienen una resistencia natural, similar a la que los europeos podrían tener para la viruela que lleva los desechos a las Américas? Quizás, pero los de la herencia africana que trabajan en nuestras ciudades mueren al mismo ritmo que hacemos: algún otro factor, entonces, deben estar en juego. ¿Dietético? Cultural? \ N \ nthe Key, tal vez, es la exposición infantil en la tribu. Es la posibilidad de que estén expuestos jóvenes a la fiebre amarilla y, por lo tanto, desarrollen una inmunidad duradera, al igual que la cowpóxa podría otorgar protección contra la viruela ''."
 panum.563.g_africa: "Y si pueden ser inmunes ... entonces debería ser posible hacer una vacuna."
 panum.564.t: "La naturaleza del enemigo"
 panum.564.d: "Combatir una enfermedad requiere descubrir más sobre su naturaleza, y el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha ideado una prueba fascinante."
 panum.564.f: "'... Sin embargo, desde la revelación de que el cólera era una enfermedad transmitida por el agua, hemos tenido la oportunidad de examinar la posibilidad de eliminar tales enfermedades del agua con una filtración adecuada. Me tomó un tiempo entregar, pero encuentro mis manos sobre un filtro Berkefeld, un artillero fantástico que puede filtrar el agua a través de la tierra diatomeas. Es una cosa extremadamente precisa, capaz de eliminar incluso las bacterias. Preparé un vial que consiste en sangre de varios de los infectados, lo diluí con agua destilada, luego lo vertí a través del filtro. Lo que surgió era claro, líquido puro ... o eso pensé. Se han enfermado y luchan ahora por su vida. Sin embargo, esto demuestra que la fiebre amarilla no es un simple microbio, es algo aún más pequeño que una bacteria, algo que no podemos ver. \ N \ ni lo habría llamado imposible, pero encontré nota de tal cosa en una revista médica. Lo llaman virus."
 panum.564.g: "Conozca al enemigo, destruye al enemigo."
 panum.565.t: "No tratable?"
 panum.565.d: "Con la esperanza de cualquier signo de tratamiento adecuado, el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha visitado clínicas y hospitales locales para investigar sus prácticas de tratamiento."
 panum.565.f: "Ah, Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], ¡es un placer conocerte! Nosotros aquí en la clínica: '\ n'i me tememos que tendremos que atravesar las bromas, el médico. Necesito visitar otras clínicas, hospitales, barrios, unas dos docenas de anochecer. Cuéntame la efectividad de tu tratamiento. '\ N'ah, uh ... bueno, seguimos las pautas establecidas -' \ n'en éxito? Déjame tomar notas. '\ N'uhm ... sin.' \ N'mortalities? '' \ N'Quite ... alto. '\ N'wow muchos has perdido esta semana?' ¡Está trabajando en las pautas de tratamiento, correctas? No tendrán ningún efecto. Una pena."
 panum.565.g: "Un cambio en las tácticas, entonces, debemos tener una vacuna."
 panum.566.t: "La primera grieta"
 panum.566.d: "Aunque su investigación ha sido un fracaso hasta ahora, el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha experimentado con monos en un intento por idear una vacuna."
 panum.566.f: "Para muchos, la vista de un mono muerto en una jaula no sería mucho motivo de celebración, pero para el equipo Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] y [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis], fue un progreso notable. El desarrollo de una vacuna por esta terrible enfermedad requería la capacidad de producir la enfermedad en un laboratorio a pedido y, sin embargo, lo intentó, lo habían eludido ... hasta hoy. Con los monos y chimpancés africanos nativos aparentemente inmunes a la enfermedad, se necesitó la llegada de un macaco indio para proporcionar un sujeto de prueba adecuado. Inoculado con suero tomando las venas de un hombre infectado, el macaco se había enfermado y, en última instancia, murió. Finalmente, tenían sujetos para probar."
 panum.566.g: "Mmm. Esto es progreso ... al matar monos, al menos."
 panum.567.t: "El secreto del suero"
 panum.567.d: "Con el acceso a un \"sujeto de prueba\" confiable, el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha comenzado a probar las posibilidades de inocular utilizando la sangre de los pacientes en recuperación."
 panum.567.f: "'1. Transfusión de macaco a macaco: enfermedad transferida, sin inmunidad, macaco fallecido. Confirma la transmisión a base de sangre, la enfermedad probablemente sea transportada por insectos: mosquitos? \ N2. Transfusión humana a macacas: enfermedad transferida, sin inmunidad, el macaco sobrevivió. Confirma que la infección puede cruzar las especies directamente. \ N3. La fiebre amarilla sudamericana y africana para el macaco sobreviviente: inmunidad, macaco sobrevivió. Confirma la inmunidad compartida a ambas formas de enfermedad. \ N4. Patógeno muerto en suero, esterilizado bajo calor extremo: no pudo proporcionar protección, macaco fallecido después de la inoculación con patógeno vivo. Fallas significativas, descarta las posibilidades para una vacuna contra el patán muerto. \ N5. Transferencia de suero en recuperación al macaco: ¡evita la infección futura! ¡Prometedor! ¿Inicio potencial para una vacuna?"
 panum.567.g: "No puedes hacer una tortilla sin romper algunos macacos ..."
 panum.568.t: "El prototipo"
 panum.568.d: "Habiendo tenido tiempo de continuar trabajando en su vacuna, el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha alcanzado un punto crítico: una vacuna prototipo."
 panum.568.f: "'Debería ser un momento increíble, pero me encuentro luchando por mantener mi sobriedad. Usando grandes cantidades de suero humano, tomado de varios enfermos en recuperación, mi equipo y yo logramos procesarlas en una forma destilada, potencialmente capaz de entregar inmunidad al voluntario. Fue un buen primer borrador, y un paso potencial y crítico de piedra, por lo que comenzamos a probarlo en los macacos. Un buen número murió, un buen número vivió, pero un macaco no es un hombre. \ N \ nit necesitó pruebas en vivo. Diez voluntarios, reunidos desde aquí, allá y en todas partes. Algunas tropas de la guarnición local, miembro de mi propio equipo, algunos hombres sin trabajo de la ciudad se balancearon por la promesa de unos pocos peniques. Unas dos docenas de voluntarios, para casi tantos disparos. De ellos? Siete no tenían síntomas, luego confirmó la inmunidad una semana después. Cinco tenían una enfermedad menor, luego inmunidad. Otros seis estaban más enfermos, luego inmunes. El resto? Todos desarrollaron fiebre amarilla propiamente dicha y una murió. Es un paso en la dirección correcta, sin lugar a dudas, pero ... ¿qué pasa con los muertos?"
 panum.568.g: "El costo del progreso es alto."
 panum.569.t: "Un nuevo tema"
 panum.569.d: "Con el primer intento de una vacuna, un éxito mixto, el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] está determinado para refinar el proceso."
 panum.569.f: "Para el alivio de algunos manejadores y el horror de otros, el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] había hecho un descubrimiento crítico: los macacos no eran el único animal que podía incubar la enfermedad, y se encontró un anfitrión más nuevo y más adecuado: el ratón de investigación común. El lote que podrían jugar en la floreciente industria de la investigación médica no puede ser subestimado, pero aquí juegan un papel especialmente crítico: su líquido cerebral, la sustancia sustentativa alrededor de sus pequeños cerebros, es un medio de crecimiento adecuado para el virus de la fiebre amarilla. Este proceso, sin embargo, tiene una ventaja clara. Lento pero seguro, este asesino de hombres está siendo llevado al talón, un ratón a la vez."
 panum.569.g: "Oh bien, primero los macacos, ahora los ratones ..."
 panum.570.t: "El segundo prototipo"
 panum.570.d: "El refinamiento continuo de la vacuna del Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha llevado al desarrollo de una versión mejorada."
 panum.570.f: "'Aunque el último intento no fue un fracaso, no me atrevo a llamarlo un éxito. Esos pobres niños dieron sus vidas a la esperanza de librar a la humanidad de esta enfermedad, y les debo mejorar tanto como sea posible. Creo que he hecho exactamente eso. Al transferir el asunto de macacos a ratones, pude atenuar el virus lenta pero seguramente, debilitándolo sustancialmente en tiempo extra. Después de más de treinta pasajes, la fiebre amarilla resultante es una criatura debilitada, mucho más probable que sea útil en una vacuna que los primeros intentos. Hubo menos voluntarios que la última vez, pero un colega mío decidió correr el riesgo. No tuvieron vacunación ni exposición a la fiebre amarilla, y fueron intensamente en cuarentena durante una semana antes de la inoculación. Aparte de un pequeño enrojecimiento del área, no pudieron desarrollar fiebre amarilla. Resultados muy prometedores hasta ahora."
 panum.570.g: "Esto parece que finalmente estamos llegando a algún lado ..."
 panum.570.h: "... ¡Así que comencemos esta campaña de vacunación!"
 panum.571.t: "Incendio forestal"
 panum.571.d: "¡Desastre! ¡La distribución de la vacuna sérica desarrollada por el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha transferido inadvertidamente enfermedades nacidas en la sangre!"
 panum.571.f: "Era, en retrospectiva, bastante obvio que hacer una vacuna usando suero de sangre humana era, tal vez, una idea terrible. Los misterios de la sangre humana habían sido descifrados parcialmente, pero en un mundo donde el microscopio estaba revelando microbios siempre nuevos y una nueva teoría de los cuerpos virales estaba comenzando a surgir, siempre hubo una preocupación siempre apremiante de que algo inesperado podría ocurrir, algo desastroso. de soldados a funcionarios gubernamentales. Este virus era previamente desconocido para nuestra ciencia, y aún evita la detección de muchas de nuestras mentes más brillantes ... a diferencia del daño a nuestra imagen nacional. Aunque ha habido pocas muertes, si las hay, el fracaso obvio de este proyecto de vacunación ha dejado a nuestra comunidad médica en ruinas, el trasero de bromas en todo el mundo."
 panum.571.g: "Esta es una catástrofe para nuestra investigación médica ..."
 panum.572.t: "Ajustes finales?"
 panum.572.d: "Cerca de una vacuna finalizada, el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] está en el medio del desarrollo final."
 panum.572.f: "Si uno no supiera lo contrario, podrían haber pensado que el laboratorio del Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] parecía una cocina muy extraña. La sal, el agua, el aceite y los huevos cubrían los mostradores, junto con placas calientes, una amplia selección de vasos y un refrigerador de última generación. Aparentemente, la escena estaba preparada para desayunar, no un avance médico, pero es exactamente lo que está en marcha. El suero es demasiado costoso para hacer una vacuna que se pueda distribuir a escala, demasiado incómodo para trabajar en las grandes escalas necesarias para inocular una colonia o una ciudad. Tiene que ser eliminado de la ecuación, pero si no es eso, ¿entonces qué? \ N \ nmurmuring en silencio, aparentemente al borde de la locura, el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] trabaja incansablemente. Una selección cuidadosamente preparada de tejido de ratón es, cuidadosamente, sumergirse en la yema de huevo, y luego, con cuidado, siempre cuidadosamente, se coloca en el compartimento de liofilización. Salió un lote anterior, su contenido ahora es un polvo fino. Agrégalo a una solución salina ... \ n \ nthe Doctor sonrió. \ N \ n'at », dice el buen doctor. Lo tengo."
 panum.572.g: "¡Heureka!"
 panum.573.t: "El prototipo final"
 panum.573.d: "Habiendo completado el trabajo en su vacuna, el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha comenzado a implementarlo en un grupo de prueba final."
 panum.573.f: "'Era un camino largo y duro, pero el final finalmente está a la vista. La fase final fue hacer que la vacuna esté más fácilmente disponible, y ahora es: después de haber intercambiado el suero por una solución salina, el paquete de vacuna resultante es similar al utilizado para la viruela. No hay necesidad de una inyección, simplemente la misma práctica de escarificación. De hecho, los dos podrían incluso ser entregados al mismo tiempo. Según todos los informes, debe ser un medio confiable, seguro y eficiente para administrar esta vacuna, no solo a unos pocos miles, sino a millones. \ N \ nyet, las pruebas pasadas llenan mi corazón de inquietud. Hay pocos voluntarios, no lo suficiente como para crear un grupo de prueba ... pero si uno fuera para tener en cuenta a mí mismo, entonces hay suficientes. Ya he hecho los arreglos: un general solo puede enviar a tantos de sus hombres a la línea de fuego antes de que se espera que salgan al campo por sí mismos. Esta noche, a las ocho en punto, me inocularé con esta vacuna. Si funciona, entonces, cuando me inyecten la fiebre amarilla en dos semanas, no tendré nada más que un malestar leve."
 panum.573.g: "Deseo [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] suerte."
 panum.574.t: "Una vacuna contra la fiebre amarilla"
 panum.574.d: "Las noticias han llegado a la capital: ¡el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha creado con éxito una vacuna para la fiebre amarilla!"
 panum.574.f: "'... Pero al final, mi equipo y yo hemos logrado tener éxito contra viento y marea. Aunque todavía hay muchos misterios de fiebre amarilla que aún no se han resuelto, hemos producido con éxito una vacuna viable, lista para la producción a gran escala. Puede requerir algunas instalaciones especializadas, tripuladas por grandes mentes, pero se puede producir a escala, y millones y millones se beneficiarían de una rápida campaña de vacunación que podría hacer que la fiebre amarilla sea cosa del pasado. También se debe dar una palabra de elogio a los macacos, y a los ratones, que han jugado un papel fundamental en esta empresa."
 panum.574.g: "¡Bien hecho, doctor! ¡Ahora, comencemos el despliegue inmediato!"
