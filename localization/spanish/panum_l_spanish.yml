 je_panum_cholera_description_reason: "El Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] está examinando actualmente a varios pacientes para determinar los síntomas del #YELLOW Cólera#!.. Es fundamental poder diferenciar entre otras enfermedades similares o coexistentes. Al final de su trabajo, el científico pone su descripción a disposición del público para que las generaciones futuras tengan una mejor oportunidad de reconocer los antecedentes de la enfermedad y encontrar métodos de tratamiento." #NT!
 je_panum_tuberculosis_description_reason: "El Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] examina actualmente a varios pacientes para determinar los síntomas de la #YELLOW tuberculosis#!.. Es fundamental poder diferenciarlos de otras enfermedades similares o coexistentes. Al final de su trabajo, el científico pone su descripción a disposición del público para que las generaciones futuras tengan más posibilidades de reconocer los antecedentes de la enfermedad y encontrar métodos de tratamiento." #NT!
 je_panum_smallpox_description_reason: "El Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] está examinando actualmente a varios pacientes para determinar los síntomas de la #YELLOW viruela#!.. Es fundamental poder diferenciar entre otras enfermedades similares o coexistentes. Al final de su trabajo, el científico pone su descripción a disposición del público para que las generaciones futuras tengan una mejor oportunidad de reconocer los antecedentes de la enfermedad y encontrar métodos de tratamiento." #NT!
 je_panum_typhus_description_reason: "El Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] está examinando actualmente a varios pacientes para determinar los síntomas de #YELLOW tifus#!.. Es fundamental poder diferenciar entre otras enfermedades similares o coexistentes. Al final de su trabajo, el científico pone su descripción a disposición del público para que las generaciones futuras tengan una mejor oportunidad de reconocer los antecedentes de la enfermedad y encontrar métodos de tratamiento." #NT!
 je_panum_yellow_fever_description_reason: "El Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] está examinando actualmente a varios pacientes para determinar los síntomas de la #YELLOW fiebre amarilla#!.. Es fundamental poder diferenciarlos de otras enfermedades similares o coexistentes. Al final de su trabajo, el científico pone su descripción a disposición del público para que las generaciones futuras tengan más posibilidades de reconocer los antecedentes de la enfermedad y encontrar métodos de tratamiento." #NT!
  
 panum.52.t: "Expedición de observación médica" #NT!
 panum.52.d: "El Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha reunido un pequeño equipo de expertos y asistentes que son aptos para observar de cerca una epidemia en el extranjero y sacar conclusiones. Ahora se plantea la cuestión de qué enfermedad debe observarse en qué país." #NT!
 panum.52.f: "Existen dos tipos diferentes de expediciones médicas que un médico puede llevar a cabo: expediciones de observación y expediciones de investigación. Las expediciones de observación ayudan a completar una descripción de una enfermedad, mientras que las expediciones de investigación ayudan a descubrir un método de tratamiento. Sin embargo, una expedición no es tan eficiente como la investigación in situ y pueden necesitarse varios intentos para investigar por completo una enfermedad." #NT!
 panum.52.g: "La epidemia de cólera en [SCOPE.sCountry('panum_cholera_country_scope').GetName]." #NT!
 panum.52.h: "La epidemia de tuberculosis en [SCOPE.sCountry('panum_tuberculosis_country_scope').GetName]." #NT!
 panum.52.i: "La epidemia de viruela en [SCOPE.sCountry('panum_smallpox_country_scope').GetName]." #NT!
 panum.52.j: "La epidemia de tifus en [SCOPE.sCountry('panum_typhus_country_scope').GetName]." #NT!
 panum.52.k: "La epidemia de fiebre amarilla en [SCOPE.sCountry('panum_yellow_fever_country_scope').GetName]." #NT!
  
