 panum.1001.t: "Una nueva epidemia"
 panum.1001.d: "La poliomielitis es una enfermedad que fue conocida por muchos nombres diferentes en el siglo XIX. Sorprendentemente, hay noticias crecientes en [SCOPE.sState('panum_disease_state').GetName] sobre casos de poliomielitis que terminan en paralización y muerte. Lo que anteriormente era una enfermedad que solo ocurrió en casos aislados ahora parece ocurrir regularmente. La polio ahora es una enfermedad epidémica."
 panum.1001.g: "Noticias inquietantes."
 panum.1002.d: "Varios periódicos informan independientemente que una epidemia de polio severa está en [SCOPE.sState('panum_disease_country').GetName]. ¡La enfermedad, que anteriormente solo ocurrió en casos aislados, parece haberse convertido en una epidemia!"
 panum.1003.t: "Una epidemia violenta"
 panum.1003.d: "La epidemia de polio en [SCOPE.sState('panum_disease_state').GetName] ha demostrado ser particularmente severa. El número de muertes aumenta todos los días."
 panum.1003.f: "'La mañana del tercer día que fui hospitalizado, que fue el primero o el segundo de septiembre, tomé cereales, jugo y leche con chocolate para el desayuno. Recuerdo haber tratado de recoger la leche de chocolate, y cayó por mi mano. Me sentí tan mal porque no podía moverme más. Todas las enfermeras se apresuraron y limpiaron el desastre. Recuerdo que quería la leche con chocolate, pero no la entendí. En cambio, me trajeron una pajita y bebí un poco de jugo. Después de eso, algunos médicos entraron en mi habitación y me hicieron contar al revés, 10-9-8-7-6 durante todo el tiempo que recuerdo. Estaba acostado en ese momento porque estaba teniendo problemas para sentarme."
 panum.1003.g: "¿No hay cura?"
 panum.1004.t: "Una generación rota"
 panum.1004.d: "Cuanto más dure la epidemia en [SCOPE.sState('panum_disease_state').GetName], más obvio será: habrá una generación completa que tendrá que vivir con mutilaciones y parálisis."
 panum.1004.f: "'Recuerdo el día en que me diagnosticaron muy bien la poliomielitis. Esa mañana, estaba en la clase de educación física en la escuela, y estábamos en el campo de fútbol jugando al fútbol táctil. Me di cuenta de que mientras corría, mi pierna sería débil o colapsaría debajo de mí. Realmente no pensé demasiado, pero luego ese día estaba tocando con la banda de música de la escuela secundaria en un desfile de beneficios de polio en Hibbing, que está a unas 30 millas de Coleraine, donde crecí. Durante la marcha en ese desfile, mis piernas nuevamente se debilitaron. De hecho, eran tan débiles que tuve que abandonar la línea de marzo, y volví al autobús escolar para acostarme."
 panum.1004.g: "Este efecto durará mucho tiempo ..."
 panum.1005.t: "Sobrevivientes de poliomielitis"
 panum.1005.d: "Se dice que aquellos que sobreviven a esta epidemia albergan una ira profunda dentro de sí mismos. Es una forma de venganza contra la enfermedad que ha devastado tanto a estas personas. Cada vez se están formando más asociaciones de sobrevivientes de polio en nuestro país."
 panum.1005.f: "'Ser diferente es realmente difícil cuando estás en la escuela secundaria. Terminé no participando en muchas cosas en las que probablemente hubiera participado si no fuera por mi discapacidad. Me hubiera gustado probar por animadoras, pero la gente se burló de mí solo por hablar de eso. Así que terminé manteniendo muchos sentimientos adentro. No quería ir a un baile porque era consciente de mi cojera. No quería que la gente me mirara mientras cruaba la pista de baile. Odiaba que la gente mirara a la gente y me ría de mí. Creo que todos los adolescentes son cohibidos, pero cuando tienes algo de discapacidad física, realmente magnifica esa autoconciencia. Hasta el día de hoy, odio cuando la gente mira mi pierna cuando uso pantalones cortos."
 panum.1005.g: "La sociedad civil se está reuniendo contra la poliomielitis."
 panum.1006.t: "El político establece la base de la poliomielitis"
 panum.1006.d: "Ante la epidemia de polio desenfrenada, los padres afligidos, los mutilados y los muertos, [SCOPE.sCharacter('panum_opposition_leader').GetFullName] se le ocurrió el plan de establecer una base para combatir la enfermedad. Los críticos dicen que solo está tratando de brillar su reputación política."
 panum.1006.f: "El presidente de los Estados Unidos, Franklin D. Roosevelt, se había quedado regularmente en el spa de Springs Warm desde 1924 y murió aquí en 1945. En 1921 sufrió parálisis de sus piernas, que se consideraba polio espinal; Según investigaciones más recientes, fue el síndrome de Guillain-Barré, que todavía era poco conocido en ese momento. Roosevelt fundó la Fundación Georgia Warm Springs en 1927, cuya misión principal inicialmente era el tratamiento de la parálisis espinal. Hoy, la instalación se llama Instituto Roosevelt Warm Springs para la rehabilitación y cuida a pacientes con todo tipo de discapacidades en veintiséis departamentos diferentes."
 panum.1006.g: "Un verdadero filántropo."
 panum.1006.h: "Y la próxima elección es pura coincidencia, ¿supongo?"
 panum.1009.t: "Pánico"
 panum.1009.d: "A pesar de los mejores esfuerzos del gobierno local en [SCOPE.sState('panum_disease_state').GetName], la población ha comenzado a sucumbir a una de las partes más peligrosas de cualquier brote: el pánico."
 panum.1009.f: "El sábado 17 de junio de 1916, se realizó un anuncio oficial de la existencia de una infección de polio epidémica en Brooklyn, Nueva York. Ese año, hubo 27,363 casos y 7,130 muertes debido a la poliomielitis en los Estados Unidos, con más de 2,000 muertes solo en la ciudad de Nueva York. La epidemia de 1916 causó pánico generalizado y miles huyeron de la ciudad a los cercanos resorts de montaña; Se cerraron los cines de cine, se cancelaron las reuniones, las reuniones públicas eran casi inexistentes y se advirtió a los niños que no bebieran de fuentes de agua, y se les dijo que evitaran parques de diversiones, piscinas y playas."
 panum.1009.g: "¡Maldito miedo!"
 panum.1010.t: "Cuarentena"
 panum.1010.d: "Aunque no está claro si la polio es una enfermedad contagiosa, hay voces crecientes en [SCOPE.sState('panum_disease_state').GetName] para introducir cuarentena para garantizar que no se propague."
 panum.1010.f: "La enfermedad golpeó sin previo aviso y requirió largos períodos de cuarentena durante los cuales los padres se separaron de los niños: era imposible saber quién obtendría la enfermedad y quién se salvaría.  Los nombres y direcciones de individuos con casos de poliomielitis confirmados se publicaron diariamente en la prensa, sus casas se identificaron con carteles y sus familias estaban en cuarentena."
 panum.1010.g: "Esto causará más daño que bien."
 panum.1010.h: "Hacer cumplir una estricta orden de cuarentena."
 panum.1020.t: "Finaliza la epidemia de la poliomielitis"
 panum.1020.d: "Las clínicas en [SCOPE.sState('panum_disease_state').GetName] informan que los casos de polio han disminuido notablemente. Las secuelas de la epidemia continuarán preocupando a la región en los próximos años."
 panum.1020.f: "'No estoy enfermo. Estoy roto. Pero, estoy feliz de estar vivo mientras pueda pintar. -Frida Kahlo"
 panum.1022.t: "El comienzo de la poliomielitis"
 panum.1022.d: "El médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] hoy envió un breve resumen de los síntomas que ocurren cuando se rota la poliomielitis temprana."
 panum.1022.f: "'Healthy and mostly blooming-looking children between the ages of 6 and 36 months, in exceptional cases a little older, become ill after previously enjoying untroubled health, either with or without previous hints of indisposition, such as: rolling of the eyes, suddenly under the manifestations of heat, congestive and irritative states, fever, thirst, peevishness, crying, drowsiness without real sleep, as well sometimes with the symptoms of disturbed course of acute, Procesos exantematosos de la enfermedad. Poco después, las convulsiones de una ruptura de grado más suave o más severa, que se repiten a intervalos más cortos o más largos. lentamente y desapercibido."
 panum.1040.t: "Contribuciones al conocimiento de la enfermedad de los medios de heine"
 panum.1040.d: "El médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] presentó un documento revolucionario a la Facultad de Medicina hoy que servirá como punto de partida para controlar las epidemias de la poliomielitis, y mejorar el tratamiento de los sobrevivientes de la poliomielitis."
 panum.1040.f: "En [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] 'Contribuciones al conocimiento de la enfermedad de los medios de Heine', el médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] mencionó varios aspectos que deberían ayudar a prevenir y propagar la poliomielitis. Una idea clave es que la polio es una enfermedad infecciosa. Además de las medidas derivadas de esto, también hay una variedad de métodos para ayudar a los pacientes. Las dietas altas en proteínas, los programas de fisioterapia y los nuevos inventos como el pulmón de hierro brindan una nueva esperanza de que la polio no se erradice, pero se pueda manejar mejor en el futuro."
 panum.1040.g: "Necesitamos un Salón de la Fama de la Polio."
 panum.1041.t: "Fisioterapia"
 panum.1041.d: "El médico se encuentra con una enfermera que entrega [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] conocimiento previo del tratamiento de la poliomielitis sobre su cabeza."
 panum.1041.f: "'¿Y cuánto tiempo llevas haciendo esto ahora?' '\ No es años, médico.' '\ N'You Ponte almohadillas de calefacción bajo los pacientes? No se trata solo de la almohadilla de calefacción. Se necesitan masajes y ejercicios de relajación. Un músculo que está férula ya no se desarrolla. Necesita ejercicio. '\ N'hmm ...'"
 panum.1041.g: "Pero ... ¡los pacientes con polio necesitan descanso y estabilización!"
 panum.1042.t: "La calle"
 panum.1042.d: "Al inspeccionar el área de brote de la enfermedad de la poliomielitis, el médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] procede sistemáticamente."
 panum.1042.f: "'Si alguien sigue la propagación de la poliomielitis en [SCOPE.sState('panum_disease_state').GetCityHubName], no se puede perder un descubrimiento interesante. Las cataratas están unidas como una cadena de perlas. Puede seguir un camino y ver los casos uno al lado del otro. Pude rastrear la ocurrencia cronológica en una línea ferroviaria en el área. Esto no es una coincidencia. '\ N \ nfrom the Journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [SCOPE.sState('panum_disease_state').GetCityHubName]"
 panum.1042.g: "¿Pero es esta evidencia suficiente para la infección?"
 panum.1043.t: "La parroquia"
 panum.1043.d: "El médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha visitado una comunidad remota en el área de la peste para promover su investigación sobre las causas de la enfermedad de la poliomielitis."
 panum.1043.f: "'49 casos en esta comunidad? '' \ N'as alcalde, lamento decir esto, médico '. Es la escuela del pueblo."
 panum.1043.g: "¿Quizás la polio no es una enfermedad hereditaria sino contagiosa?"
 panum.1044.t: "Filantropía"
 panum.1044.d: "Los sobrevivientes de polio han venido al médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]. Le gustaría apoyar el trabajo científico relacionado con la investigación de la poliomielitis con una base."
 panum.1044.f: "A principios del siglo XX, la poliomielitis era una enfermedad que alarmaba grandes partes de la sociedad porque sus antecedentes eran desconocidos e incluso las clases de clase media o rica podían verse afectadas. Algunos sobrevivientes de poliomielitis que se volvieron ricos también hicieron campaña contra la enfermedad a lo largo de sus vidas y apoyaron iniciativas privadas y gubernamentales. La polio es una enfermedad que la filantropía ha jugado un papel importante en la combinación."
 panum.1044.g: "Un valioso apoyo."
 panum.1044.h: "El dinero debe fluir por igual en la investigación de vacunas."
 panum.1044.i: "El dinero de la fundación también beneficiaría a la investigación general."
 panum.1045.t: "Antibióticos"
 panum.1045.d: "El médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha logrado el éxito en el tratamiento de la poliomielitis mediante el uso de antibióticos."
 panum.1045.f: "'No hay cura para la poliomielitis. Y desafortunadamente no veo cómo será posible en el futuro. Solo puede haber prevención, investigación sobre las causas y evitar la propagación y el tratamiento para aliviar los síntomas. Los antibióticos pueden ayudar a proteger los músculos debilitados de las infecciones. Este es un paso en la dirección correcta. Con suerte seguirá más. '\ N \ nfrom the Journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [SCOPE.sState('panum_disease_state').GetCityHubName]"
 panum.1045.g: "¡Saludos a los antibióticos!"
 panum.1046.t: "Ostracismo social"
 panum.1046.d: "En un documento de reforma, el médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] señaló a sus colegas académicos que la reintegración de los sobrevivientes de la poliomielitis significa más que solo curar, tratar o aliviar la enfermedad. El estigma social de los individuos debe reducirse y eliminarse."
 panum.1046.f: "'Recuerdo que el mayor desafío para mí fue subir al autobús escolar. Ese primer paso hacia el autobús parecía una milla, y simplemente no podía hacerlo. Durante un tiempo salió mi madre, y fue muy vergonzoso porque sacaría este taburete. Pero no pude soportar la vergüenza, por lo que mi padre y el conductor del autobús (su nombre era Bill, y lo recuerdo vívidamente) se reunieron y discutieron cómo podrían resolver ese problema. Lo que hizo mi papá fue salir a donde se detuvo el autobús, y cavó una trinchera en la tierra. Bill conduciría la rueda delantera del autobús hacia abajo en esa trinchera, y eso reduciría el paso hasta donde estaba realmente cerca del suelo. Entonces podría subir al autobús sin problemas. Y nadie realmente se dio cuenta ... '\ n \ njennifer W., Polio Survivor"
 panum.1046.g: "Los sobrevivientes de la poliomielitis no son ciudadanos de segunda clase."
 panum.1047.t: "El precio del progreso"
 panum.1047.d: "En su investigación sobre las causas de las epidemias de la polio que han estado ocurriendo durante años, el médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] llegó a una verdad desagradable."
 panum.1047.f: "'Se conoce la polio desde la antigüedad, pero, en lo que respecta a mi investigación, hasta finales del siglo XIX, no era una enfermedad epidémica como es hoy. La razón de esto, si se confirma, es paradójica: mejor atención médica. Antes de la introducción de alcantarillado y saneamiento, los niños se expusieron a la poliomielitis mucho antes, alrededor de 6 meses a 4 años. Durante este tiempo, la enfermedad es más suave y proporciona inmunidad. Cuanto mayor sea una persona infectada con polio, se produce la parálisis más probable. Los estándares de salud mejorados han significado que menos personas han desarrollado inmunidad y son más vulnerables a las peligrosas consecuencias de la enfermedad."
 panum.1047.g: "¿La enfermedad se está propagando porque la salud pública ha mejorado?"
 panum.1048.t: "Bacillus o virus?"
 panum.1048.d: "Todavía no se sabe nada sobre el agente causal de la poliomielitis. Debido a esto, el médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] encuentra [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself] en una disputa animada con colegas."
 panum.1048.f: "Aunque la poliomielitis se había conocido durante mucho tiempo y, con el desarrollo de microbiología, quedó claro que era un patógeno, las creencias continuaron diferidos durante mucho tiempo sobre si se trataba de bacterias de polio o virus de polio."
 panum.1048.g: "Todo apunta a un virus."
 panum.1048.h: "¡Esta charla inútil distrae al médico de su trabajo!"
 panum.1049.t: "Aceptación de silla de ruedas"
 panum.1049.d: "El médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha descubierto que no solo es importante proporcionar a los pacientes sillas de ruedas, sino que también deben ser socialmente aceptados para que los sobrevivientes de la poliomielitis puedan reintegrarse fácilmente en la vida normal."
 panum.1049.f: "'Era realmente bastante ingenuo por ir a la universidad y me sorprendió descubrir que la universidad no era accesible para una persona en una silla de ruedas. Pero esa era la forma en que era entonces. Había pasos por todas partes, y no era como la escuela secundaria donde tenía un grupo de amigos para llevarme ... muchas veces tenía que conseguir un grupo de voluntarios o simplemente reclutar gente mientras corrían de clase en clase, y a veces decían: 'Simplemente no tengo tiempo. No puedo ayudarte. Tuve que vivir en un apartamento fuera del campus porque no era uno de los dormitorios."
 panum.1049.g: "Apoyamos una campaña para más aceptación de sillas de ruedas."
 panum.1049.h: "Fondo de un programa para agregar rampas accesibles para sillas de ruedas a edificios públicos."
 panum.1051.t: "Consejo de polio"
 panum.1051.d: "Actualmente, una recomendación para la acción sobre la enfermedad de la poliomielitis está circulando en el mundo académico y está causando el médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] todos los problemas para hacer cumplir las propias tesis en el tratamiento de la poliomielitis."
 panum.1051.f: "'Dar oxígeno a través de las extremidades inferiores, por electricidad positiva. Baños frecuentes con harina de almendras u oxidando el agua. Aplicaciones de catandeo romano de manzanilla romana, olmo resbaladizo, arnica, mostaza, cantaris, aceite amígdalae dulcis, y de mérito especial, aceite de Spikenard y xanthoxolinum. Use internamente cafeína, FL. Kola, Muriate seco de Quinine, Elixir de Cancone, agua de radio, cloruro de oro, licor calcis y vino de Pepsin. '\ N \ ndr. Angelika Hasenbein, 'Una monografía sobre la epidemia de la poliomielitis (parálisis infantil)'"
 panum.1051.g: "En realidad suena muy convincente."
 panum.1052.t: "Yeso y frenos"
 panum.1052.d: "El médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha aprendido de varios \"expertos en polio\" que las férulas de piernas son la mejor manera de mejorar la situación inicial para los pacientes, pero [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] no está convencido."
 panum.1052.f: "Los pacientes con parálisis residual fueron tratados con aparatos ortopédicos y se les enseñó a compensar la función perdida con la ayuda de pinzas, muletas y sillas de ruedas. El uso de dispositivos como aparatos ortopédicos rígidos y fundiciones corporales, que tendieron a causar atrofia muscular debido al movimiento limitado del usuario, también se promocionó como tratamientos efectivos. La mayoría de estos tratamientos demostraron ser de poco valor terapéutico"
 panum.1052.g: "¿Quizás ayuda ...?"
 panum.1053.t: "Cirugía inútil"
 panum.1053.d: "El médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] fue asegurado por los cirujanos de que los procedimientos quirúrgicos tienen un efecto positivo en la polio."
 panum.1053.f: "'He pasado innumerables horas entrevistando a colegas, estudiando libros y revisando pacientes para convencerme del éxito de las intervenciones quirúrgicas para la poliomielitis. Los médicos están muy orgullosos de sus resultados. La forma en que se ocupan de las mutilaciones recuerda a la mecánica de precisión que cree que están estableciendo un reloj. Utilizan herramientas de precisión para trabajar en máquinas humanas. Pero mi impresión es que el enfoque aquí no está en la enfermedad, no en el paciente, sino en la reputación de los médicos. Hasta ahora, no conozco ningún caso en el que este método haya llevado a un tratamiento exitoso de polio."
 panum.1053.g: "Un falso plomo."
 panum.1054.t: "Suero convaleciente"
 panum.1054.d: "El médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] probó un suero muy aclamado que se considera un remedio efectivo en la medicina de polio actual. Aunque los colegas [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] están convencidos del método, el médico cree que es una pérdida de tiempo."
 panum.1054.f: "'En ese momento tenían una idea de que era una enfermedad infecciosa, por lo que me dieron lo que se llamaba' suero convaleciente 'que estaba hecho de la sangre de las personas que se habían recuperado de la poliomielitis. Esa forma de tratamiento estaba de moda en ese entonces. Parece poco probable que haya tenido algún efecto ya que la enfermedad progresó a una parálisis bastante pronunciada sin movimiento en ninguna pierna y sin movimiento en mis músculos abdominales. Me pusieron aislados, y creo que me habían dicho que tenía poliomielitis. Sin embargo, no sabía qué era la poliomielitis. Nadie me dijo que tenía parálisis infantil, lo que habría reconocido porque Roosevelt era presidente en ese momento, y sabía que había sufrido una parálisis significativa por la enfermedad."
 panum.1054.g: "¿Pero cada médico lo prescribe?"
 panum.1055.t: "Aislamiento"
 panum.1055.d: "Además de restringir las extremidades, algunos expertos en polio creen que es aconsejable aislar a los pacientes por completo. El médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] realizó tales experimentos él mismo, y llegó a la conclusión de que era una terapia ineficiente e inhumana."
 panum.1055.f: "'Después de que se realizó el grifo espinal y se realizó el diagnóstico de polio, inmediatamente me pusieron de forma aislada y me dijeron que no debería levantar la cabeza. ¡Recuerdo que me pusieron en una cuna! Tenía nueve años y no podía entender por qué me habían colocado en una cuna. Fue muy degradante. Ciertamente no iba a salir de la cama, ni probablemente me volaría y me caería. De hecho, apenas podía moverme. Mientras yacía allí en esa cuna, podía sentir que el virus realmente se estaba poniendo. Era como una puerta cerrada. Sentí que mi mundo había cambiado totalmente. Para empeorar las cosas, hacía mucho calor y húmedo, y por supuesto, eso fue antes del aire acondicionado; Recuerdo que me sentí muy incómodo ... '\ n \ nsharon K., Polio Survivor"
 panum.1055.g: "¡Esto es inaceptable!"
 panum.1055.h: "Este podría ser el comienzo de una segunda carrera."
 panum.1055.i: "Deje que estos registros desaparezcan rápidamente."
 panum.1056.t: "Síndrome post-polio"
 panum.1056.d: "Durante un examen reciente, el médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] encontró que después de la infección de la polio real, incluidos sus efectos, puede haber efectos posteriores en forma de síndrome post-polio. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] está completamente desesperado por este desarrollo."
 panum.1056.f: "'Cuando tenía unos 35 o 40 años, comencé a tener un dolor terrible en mis articulaciones y músculos. Me cansé muy fácilmente. Fui al médico y tuve radiografías y análisis de sangre. Tengo algunas pastillas y tuve fisioterapia. Nada ayudó. \ Nas esperé a que encontraran los registros, le expliqué a la persona que me estaba ayudando que estaba experimentando todo este nuevo dolor, y esperaba que los registros pudieran ayudar a explicar por qué. Bueno, ella me preguntó si había oído hablar del síndrome post-polio. Le dije: 'No, ¿qué es eso?' Explicó que unos 30 o 40 años después de que tuvieras polio, es como si la volvieras a haber vuelto a tener la vuelta. Me acabo de desmoronar. Llamé a mi cuñada y le dije lo que había descubierto. También le dije a mi familia. Lloré mucho. Mostré a mis médicos locales mis registros médicos y expliqué sobre mi cita en el Instituto Hermana Kenny. Nuevamente me dijeron que la polio era cosa del pasado. Dije: 'Sí, ¡pero estoy aquí ahora, y lo estoy viviendo de nuevo!' \ N \ njanice G., Polio Survivor"
 panum.1056.g: "Qué situación desesperada."
 panum.1061.t: "Experimentos"
 panum.1061.d: "En un experimento dudoso pero no menos exitoso, el médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] infectó monos con polio."
 panum.1061.f: "'Recientemente leí sobre un procedimiento que Jean-Antoine Villemin usó para demostrar la contagia de la tuberculosis. Llevó a cabo experimentos en conejos al ponerlos deliberadamente en contacto con el tejido de las personas con tuberculosis. Docenas de caninos muertos más tarde, pudo probar su tesis. Mi experimento con monos se basa en una suposición similar. '\ N \ nfrom the Journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [SCOPE.sState('panum_disease_state').GetCityHubName]"
 panum.1061.g: "Si los animales pueden infectarse, también pueden los humanos entre sí."
 panum.1062.t: "Pulmón de hierro"
 panum.1062.d: "El brillante ingeniero [ROOT.Var('tesla_engineer_var').GetCharacter.GetFullName] ayudó al médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a construir un dispositivo ingenioso que revolucionó el tratamiento de la poliomielitis."
 panum.1062.f: "Un pulmón de hierro fue uno de los primeros dispositivos clínicos que permitió la ventilación mecánica de un humano. Alrededor de 1920, el ingeniero estadounidense Philip Drinker lo desarrolló para ventilar a pacientes con enfermedades pulmonares. El cuerpo del paciente, a excepción de la cabeza, se encuentra completamente dentro de un cilindro hueco. El dispositivo sella el cuello hermético y crea una presión negativa. Esto hace que la presión ambiental forre el aire a través de la nariz y la boca del paciente hacia los pulmones. La exhalación ocurre en consecuencia mediante la construcción de exceso de presión en la cámara. Muchos pacientes con polio solo necesitaban el pulmón de hierro en la fase aguda de la enfermedad hasta que la función muscular se reanudó. Algunos pacientes los usaron solo durante la noche, otros los usaron continuamente."
 panum.1062.g: "Esto puede salvar muchas vidas."
 panum.1063.t: "Apoyo psicológico"
 panum.1063.d: "Como psiquiatra, el médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] usó la experiencia [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] para facilitar la vida de los pacientes con polio."
 panum.1063.f: "'Con razón prestamos atención al componente físico de la enfermedad cuando hablamos de poliomielitis. Pero junto al cuerpo dañado hay un alma dañada. La polio no solo deja rastros físicos. Especialmente cuando trabajo con niños, he experimentado el impacto que esta horrible enfermedad tiene en sus vidas privadas y sociales. Las palabras no pueden sanar. Pero pueden proporcionar alivio. Y tenemos que dar a los sobrevivientes una perspectiva para que no solo sobrevivan, sino que tengan la voluntad de sobrevivir."
 panum.1063.g: "Gracias Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]."
 panum.1064.t: "Dieta"
 panum.1064.d: "El médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] aboga por una dieta rica en nutrientes para pacientes con polio."
 panum.1064.f: "'Los éxitos anteriores en la combinación de raquitismo, deficiencia de yodo, escorbuto y pelagra han demostrado que nuestra dieta puede desempeñar un papel decisivo en la combinación de enfermedades. La polio no es una enfermedad de deficiencia. Pero se sabe que las proteínas juegan un papel importante en la construcción de músculo y, por lo tanto, es importante señalar que la dieta de los pacientes con polio debe ser más rica que la de la gente común."
 panum.1064.g: "Finalmente, el certificado de un médico para comer filetes T-Bone."
