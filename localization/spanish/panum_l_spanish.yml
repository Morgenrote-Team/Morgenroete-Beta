 panum.1007.t: "Clínica de polio"
 panum.1007.d: "La hermana [SCOPE.sCharacter('panum_polio_nurse').GetFirstName] fundó una clínica de polio en [SCOPE.sState('panum_disease_state').GetName] para poder cuidar a los muchos pacientes allí."
 panum.1007.f: "'Era una mujer muy alta y elegante, e inspiró la confianza solo por su manera y la forma en que se llevaba. Tenía un acento encantador que la convirtió en una persona interesante para escuchar. Si cierro los ojos, todavía puedo visualizarla de pie junto a mi cama con un vestido largo y negro y un sombrero grande con una hermosa pluma de avestruz ... no usaba joyas y no usaba ningún maquillaje. Recuerdo que su rostro era fuerte y angular, y sus ojos eran muy intensos. Cuando te miró a los ojos, esa intensidad exigió toda tu atención, y cuando habló, la gente la escuchó ... Todos sabían quién estaba a cargo, y recibimos cualquier tratamiento que recomendó. Nunca he conocido a nadie tan asertivo como ella."
 panum.1007.g: "Gracias, hermana [SCOPE.sCharacter('panum_polio_nurse').GetFirstName]."
 panum.1008.t: "Polio depresión"
 panum.1008.d: "Los muchos niños que están mutilados de por vida no solo tienen un impacto en la salud física de la próxima generación, sino también en los padres, que acusan al gobierno de hacer muy poco."
 panum.1008.f: "'Recuerdo vívidamente el primer día que usé el aparato ortopédico para la escuela. Era la mitad del día escolar. Aparentemente había ido al médico esa mañana para que se instalara el aparato ortopédico. Mi madre me dejó en la puerta y recuerdo que tenía lágrimas en los ojos mientras me alejaba."
 panum.1008.g: "Irracional, pero no incomprensible."
