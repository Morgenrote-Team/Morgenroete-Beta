 panum.2111.t: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] anatomía"
 panum.2111.d: "En la batalla [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] con las autoridades locales para ampliar la atención médica, el médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha descubierto cuán mal que va la capacitación de los cirujanos jóvenes. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U], por lo tanto, escribió un trabajo estándar para frenar esta queja."
 panum.2111.f: "La anatomía de Henry Grey del cuerpo humano, generalmente llamado Grey's Anatomy, es un libro sobre la anatomía humana. Se considera un clásico del tema, especialmente en países de habla inglesa. La primera edición apareció en 1858 en Gran Bretaña y un año después en los Estados Unidos con el nombre de Gray's Anatomy: Descriptive and Surgical."
 panum.2111.g: "Cada estudiante debe leer este libro durante su entrenamiento."
 panum.2111.h: "La aplicación práctica es más importante que la enseñanza."
 panum.2112.t: "Diagrama de causas de mortalidad"
 panum.2112.d: "Al visitar hospitales militares, el médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] notó cuán poco material estadístico se usó para educar a los médicos jóvenes sobre el peligro de enfermedades infecciosas en el campo de batalla. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U], por lo tanto, ha creado una gran cantidad de diagramas significativos."
 panum.2112.f: "Debido a una enfermedad que había contraído durante la Guerra de Crimea, Florence Nightingale no pudo ver por sí misma cómo sería la situación en un cuartel, un hospital o una casa pobre. Por lo tanto, se concentró en recopilar datos, prepararlos y analizarlos, y luego sacar conclusiones de ellos. Los cuestionarios eran una herramienta importante para su trabajo, y ella también usó datos existentes. Entre otras cosas, demostró serios problemas con la atención médica militar. En su informe al gobierno británico, Nightingale encontró palabras claras para esto. Si 11 de cada 1,000 civiles murieron cada año, pero 17, 19 y 20 de 1,000 soldados de la línea de infantería, artillería y guardias estacionados en Inglaterra murieron, entonces eso sería tan criminal como liderar a 1,100 hombres cada año en Salisbury Plain y dispararlos allí. Florence Nightingale es considerado uno de los pioneros de la preparación de datos gráficos de dichos datos."
 panum.2112.g: "Estas estadísticas deben ser estudiadas cuidadosamente por médicos en el campo de batalla."
 panum.2112.h: "La aplicación práctica es más importante que la enseñanza."
 panum.2113.t: "Omnis Cellula E Cellula"
 panum.2113.d: "El médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha ampliado la teoría celular previamente conocida para incluir el principio de que cada célula surge de otra célula y que, por lo tanto, también surgen de las enfermedades enfermas. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] describió esta tesis en detalle en su trabajo sobre patología celular, que se utiliza como un manual en nuevas clínicas y hospitales."
 panum.2113.f: "La patología celular es una teoría de la enfermedad según la cual las enfermedades se basan en los trastornos de las células del cuerpo o sus funciones. Fue desarrollado en la década de 1850 por Rudolf Virchow, quien también acuñó el término 'patología celular' en 1855. Su trabajo del mismo nombre se convirtió en un trabajo estándar. Como un concepto de enfermedad basado en la teoría celular, reemplazó la patología humoral que anteriormente había estado en vigencia desde la antigüedad y, por lo tanto, es responsable de una revolución integral en la idea del desarrollo de enfermedades y enfermedades en general. Junto con la farmacología experimental, la fisiología y la microbiología, forma una base unificada para la medicina clínica y una base de la medicina científica."
 panum.2113.g: "El conocimiento sobre las células enfermas debe ser estándar en las universidades."
 panum.2113.h: "Esta es una visión extremadamente importante."
 panum.2114.t: "Criminal nacido"
 panum.2114.d: "El médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha estudiado la psique de delincuentes y la genética humana intensamente y ha descubierto que los elementos penales pueden identificarse en función de su fisonomía. [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis|U] Numerosos contactos con pacientes enfermos, locos y funcionarios perezosos durante sus intentos de reformar el sistema médico han inspirado [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] en todo momento."
 panum.2114.f: "Inspirado en la teoría de la evolución, el médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] llevó a cabo estudios de cientos de personas en penitenciarios y asilos mentales y descubrió que un tipo atavístico está muy extendido entre los delincuentes. Por lo tanto, ciertas formas de crimen se pueden ver en tipos faciales y formas de cráneo. El criminal no se convierte en un criminal de su propio libre albedrío, pero debido a su predisposición genética tiene un problema de que \"no puede evitar\". El criminal representa un tipo antropológico separado, el homo deliquens. Es un tipo evolutivo atrasado, anterior y más primitivo de una persona que se presenta como inmoral y impulsada por el instinto."
 panum.2114.g: "Entonces eres criminal desde el nacimiento."
 panum.2121.t: "El amor por los cráneos del Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]"
 panum.2121.d: "El médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] continuó su tesis de criminología antropológica y, por lo tanto, midió miles de cráneos en todo el país. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] incluso mantiene algunos en casa."
 panum.2121.f: "'La criminología es una ciencia natural grave que ha estado llena de filosofía durante demasiado tiempo. Mi revolución es equiparlo con el mismo empirismo que cada ciencia moderna de este siglo. La biología y las matemáticas son materias incorruptibles, y la psiquiatría y la criminología pueden aprender de ellas. Si mide y compara cada calavera, y lo he hecho con miles de delincuentes, locos y personas ejecutadas, entonces puede recopilar datos estadísticos que muestran el mismo resultado estadístico una y otra vez. A partir de esto, se pueden derivar valores casi perfectos para deducir la asimetría de la cara del criminal. Estas mediciones precisas son mucho más seguras que las suposiciones completamente infundadas sobre la mente humana: aquí tenemos números, hechos, en estudios empíricos cortos, su charla sin fondo. '\ N \ nfrom' el hombre criminal 'por [ROOT.Var('panum_physician_var').GetCharacter.GetFullName]"
 panum.2121.g: "A ... encantador pasatiempo."
 panum.2122.t: "Determinismo biológico"
 panum.2122.d: "Después de otros meses de sus estudios, el médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] profundizó sus tesis anteriores sobre el \"criminal nacido\" y publicó más hallazgos impactantes."
 panum.2122.f: "'El criminal es degenerado. Mientras el hombre evoluciona, el criminal representa una regresión, una forma de apostasía humana. Él es el 'salvaje moderno', nos permite mirar hacia atrás al hombre de la edad de piedra, que era menos sutil, menos sensible al dolor y menos empático. El criminal no nota el sufrimiento de la otra persona, así como solo tiene una capacidad limitada de compasión. Dado que el penal actúa de una disposición penal, se puede suponer que esta disposición penal se hereda. Por lo tanto, se podría suponer que si las personas no cometen sus actos por su propio libre albedrío, sino por determinación biológica, que esto debería ser un factor atenuante en el castigo. Pero lo contrario es el caso, porque el criminal no puede ser impresionado por una sentencia disuasoria, no es reintegrable ni predecible. El enfoque está en proteger la sociedad. Por lo tanto, es mejor pensar en el encarcelamiento por la vida o la pena de muerte. No podemos permitir que estos criminales peligrosos dañen a personas inocentes. '\ N \ nfrom' el hombre criminal 'por [ROOT.Var('panum_physician_var').GetCharacter.GetFullName]"
 panum.2122.g: "¿Tenemos alguna otra opción que aceptar esto como la teoría de gobierno?"
 panum.2123.t: "Un tema criminal peligroso"
 panum.2123.d: "El médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha estudiado cuidadosamente la fisonomía de [SCOPE.sCharacter('panum_victim_scope').GetFullName] y, en particular, la forma del cráneo [SCOPE.sCharacter('panum_victim_scope').GetHerHis] y ha llegado a la conclusión de que [SCOPE.sCharacter('panum_victim_scope').GetSheHe] es una persona altamente peligrosa con energía criminal que debe ser eliminada de todos los servicios de inmediato, ¡para proteger la sociedad!"
 panum.2123.f: "'Los ladrones generalmente tienen caras y manos muy móviles; Sus ojos son pequeños, inquietos, a menudo entrecerrados; cejas dobladas y chocadas; La nariz está torcida o roma, la barba es escasa, el cabello rara vez es grueso, la frente casi siempre es pequeña y retrocede, la oreja a menudo sobresale como un mango ... \ n \ n Los asesinos tienen una mirada vidriosa, helada y fija; Sus ojos a veces son inyectados en sangre. La nariz es grande, a menudo un águila o más bien la nariz de halcón; Las mandíbulas son de huesos fuertes, las orejas de largo, las mejillas anchas, el cabello rizado, lleno y oscuro, la barba a menudo escasa; Los labios son delgados, los dientes caninos son grandes ... En general, en los delincuentes desde el nacimiento, las orejas tienen forma de mango, el cabello está lleno, la barba es escasa, los senos frontales están arqueados, la mandíbula es enorme, la barbilla está cuadrada o sobresaliente, los pómulos son anchos \". -Ese lombroso"
 panum.2123.g: "Esta persona en realidad tiene una cara criminal."
 panum.2123.h: "¡El médico va demasiado lejos con las acusaciones [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]!"
 panum.2124.t: "¡Otro amante del cráneo!"
 panum.2124.d: "Hoy, el médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] introdujo un aspirante a académico que ama los cráneos casi tanto como [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe]. Sin embargo, el médico [SCOPE.sCharacter('lepsius_new_anthropologist_scope').GetLastName] está más preocupado por los cráneos de las personas muertas."
 panum.2124.f: "'[SCOPE.sCharacter('lepsius_new_anthropologist_scope').GetFullName] es un excelente científico que comprende la importancia de examinar los cráneos para sacar conclusiones sobre la persona a la que pertenece el cráneo. Desafortunadamente, [SCOPE.sCharacter('lepsius_new_anthropologist_scope').GetSheHe] solo trata con los cráneos de las personas que han muerto durante una cantidad inconmensurable de tiempo. ¡Increíble! No puedes estar seguro de si realmente eran criminales. ¿Cómo se supone que ayude eso?"
 panum.2124.g: "Esta es una ... sorpresa inesperadamente agradable."
 panum.4003.t: "El final de la viruela"
 panum.4003.d: "Contra todas las probabilidades, nuestra campaña contra la viruela ha tenido éxito más allá de todas las medidas: la enfermedad ahora ha sido erradicada."
 panum.4003.f: "Para muchos, es un día que comienza como cualquier otro, sin darse cuenta de la magnífica mañana que realmente es. Para aquellos que saben, es la culminación de la vida de trabajo, de un sueño apenas imaginable finalmente llegando a buen término. Muchos no pensaron que se pudiera hacer en sus vidas, que sería un trabajo legendario a fines del siglo XX, o incluso los veinte primeros y, sin embargo, aquí, ahora, se realiza en el año de [TimeKeeper.GetCurrentDate.Format('y')]. El último caso confirmado terminó con un solo nuevo individuo infectado, limitando esta enfermedad a la historia. Por primera vez en la historia, la amenaza de esta enfermedad se cuelga de no una sola cabeza. \ N \ nand eso significa que una cosa: la viruela ya no existe."
 panum.4003.g: "El hombre ha hecho su propio milagro este día."
 panum.2211.t: "Investigación de enfermedades"
 panum.2211.d: "Durante [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] exámenes médicos, el médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] se dio cuenta de que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] quería investigar en detalle una enfermedad sobre la que se ha publicado muy poco en nuestro país, pero que se ha convertido en una enfermedad generalizada en ciertas regiones."
 panum.2211.f: "Además de las principales enfermedades epidémicas, existen numerosas enfermedades cotidianas y generalizadas, así como los flagenes de la humanidad tan antiguos cuyas causas y métodos de curación aún se desconocen. El médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] se pregunta si no debe centrarse en una enfermedad muy específica."
 panum.2211.g: "Examine la enfermedad del Woolsorter."
 panum.2211.h: "Examina la enfermedad de Goitre."
 panum.2211.i: "Examina la enfermedad de la piedra renal."
 panum.2211.j: "Examina la pelagra."
 panum.2211.k: "Examinar los raquitis."
 panum.2211.l: "Examinar la sífilis."
 panum.2211.m: "Examinar el tétanos"
 panum.2211.z: "El médico debe usar el tiempo para concentrarse más en la capacitación."
 panum_disease_investigation_project_progress_bar: "Investigación de la enfermedad"
 panum_disease_investigation_project_progress_bar_desc: "Progreso de investigación de la enfermedad: #v [JournalEntry.GetCurrentBarProgress(ScriptedProgressBar.Self)|1%]#! ([JournalEntry.GetCurrentBarValue(ScriptedProgressBar.Self)|0]/60)"
