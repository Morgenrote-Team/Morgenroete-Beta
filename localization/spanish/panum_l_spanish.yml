 panum.101.t: "Tercera pandemia de cólera"
 panum.101.d: "Los informes preocupantes del Delta del Ganges llegaron hoy a la capital. Los casos de enfermedad han aumentado rápidamente allí. Después de un breve examen por parte de los médicos locales, se sorprenden al descubrir que el cólera ha vuelto a criar su fea cabeza."
 panum.101.g: "De alguna manera, el cólera regresó."
 panum.1000.t: "Epidemia de polio"
 panum.1000.d: "Una epidemia ha estallado en uno de nuestros estados: #YELLOW polio#! es devastador en [SCOPE.sState('panum_disease_state').GetName]!"
 panum.1000.f: "Ya hay imágenes del antiguo Egipto que sugieren que la poliomielitis ha existido durante mucho tiempo y es endémica. Sin embargo, solo alcanzó su estado como una enfermedad epidémica hacia fines del siglo XIX, cuando de repente estalló en Suecia y los Estados Unidos. Para 1910, las epidemias frecuentes se convirtieron en eventos regulares en todo el mundo desarrollado principalmente en las ciudades durante los meses de verano. En su apogeo en las décadas de 1940 y 1950, la polio paralizaría o mataría a más de medio millón de personas en todo el mundo cada año. El miedo y la respuesta colectiva a estas epidemias darían lugar a una reacción pública y movilización extraordinarias que estimulan el desarrollo de nuevos métodos para prevenir y tratar la enfermedad y revolucionar la filantropía médica."
 panum.1000.g: "Las muletas y las sillas de ruedas se convierten en objetos cotidianos ..."
 je_panum_germ_theory_success: "[GetPlayer.GetName] ha recopilado al menos #V 20 piezas de evidencia#! para reforzar la teoría de los gérmenes y refutar la teoría del miasma."
