 je_group_panum_medicine: "Morgenröte: #ORANGE Medicina Panum#!"
 je_panum_cholera: "Epidemia de cólera"
 je_panum_cholera_reason: "El cólera se considera la peor epidemia del siglo XIX. Tiene un significado similar para la era victoriana como la plaga en la Edad Media. Se propaga más rápido que cualquier otra enfermedad y viene en una variedad mortal. Con esta tecnología, un [concept_panum_physician] puede encontrar un tratamiento #V para el cólera#!. Incluso un sistema de salud moderadamente bueno ayudará. Todo esto conduce a una mejor prevención y cura de la enfermedad. Las capitales de las capitales que un [concept_gaudi_architect] se equipa con un sistema de alcantarillado moderno está en principio protegido de los brotes de cólera. \ N \ nin orden para derrotar al cólera de una vez por todas, una vacuna #V contra el cólera#! es necesario que se desarrolle un [concept_theiler_biologist]."
 je_panum_tuberculosis: "Epidemia de tuberculosis"
 je_panum_tuberculosis_reason: "Junto con el cólera, la tuberculosis fue una de las causas de muerte más comunes en el siglo XIX. La 'muerte blanca' comenzó como una enfermedad romántica y, en última instancia, se convirtió cada vez más en una enfermedad del proletariado. La tuberculosis se limita principalmente a algunos estados con bajos niveles de vida y alta urbanización. Con esta tecnología, un [concept_panum_physician] puede encontrar un tratamiento #V para tuberculosis#!. Un buen sistema de salud ayudará. Todo esto conduce a una mejor prevención y cura de la enfermedad. En casos raros, los resorts de salud climática pueden surgir como una respuesta a la tuberculosis, aunque con resultados de curación cuestionables. \ N \ nin orden para derrotar a la tuberculosis de una vez por todas, una vacuna #V contra tuberculosis#! es necesario que se desarrolle un [concept_theiler_biologist]."
 je_panum_smallpox: "Epidemia de viruela"
 je_panum_smallpox_reason: "La viruela es uno de los grandes azotes de la humanidad que ha diezmado a los pueblos enteros. Debido a la variolación y la vacuna contra la viruela, perdió su terror en el transcurso del siglo XVIII, pero sin precauciones aún puede mostrar su cara fea. Con esta tecnología, un [concept_panum_physician] puede encontrar un tratamiento #V para la viruela#!. Ya un sistema de salud rudimentario ayudará. Todo esto lleva a una mejor prevención y cura de la enfermedad. \ N \ nin orden para derrotar a la viruela de una vez por todas, se necesita una vacuna #V contra la viruela#! que se desarrolla por un [concept_theiler_biologist]."
 je_panum_typhus: "Epidemia de tifus"
 je_panum_typhus_reason: "Aunque el tifus ha sido conocido desde la Edad Media, sus efectos más devastadores ocurrieron durante las guerras napoleónicas. Por lo tanto, retuvo su horror para las generaciones posteriores a 1815. La fiebre tifoidea puede extenderse rápidamente a varios países. Las regiones con alta devastación están particularmente afectadas. Por lo tanto, se considera una enfermedad de guerra clásica y afecta particularmente a los soldados y sus barracones estrechos. Con esta tecnología, un [concept_panum_physician] puede encontrar un tratamiento #V para typhus#!. Ya un sistema de salud rudimentario ayudará. Todo esto lleva a una mejor prevención y cura de la enfermedad. \ N \ nin orden para derrotar a Typhus de una vez por todas, una vacuna #V contra typhus#! es necesaria que se desarrolla un [concept_theiler_biologist]."
 je_panum_yellow_fever: "Epidemia de fiebre amarilla"
 je_panum_yellow_fever_reason: "La fiebre amarilla es una enfermedad regional que ocurre cerca de los trópicos, pero en el siglo XIX se extendió al sur de los Estados Unidos y Europa. Por lo general, solo se propaga en algunos estados, pero no tiene menos rollo. Con esta tecnología, un [concept_panum_physician] puede encontrar un tratamiento #V para la fiebre amarilla#!. Ya un sistema de salud rudimentario ayudará. Todo esto lleva a una mejor prevención y cura de la enfermedad. \ N \ nin orden para derrotar la fiebre amarilla de una vez por todas, se necesita una vacuna #V contra la fiebre amarilla#! que es desarrollada por un [concept_theiler_biologist]."
 panum.100.t: "La epidemia del cólera de [TimeKeeper.GetCurrentDate.Format('y')]"
 panum.100.d: "#YELLOW CHOLERA#!, Uno de los peores flagelos de la humanidad se ha extendido a una de nuestras ciudades. Los tiempos oscuros han comenzado. Debemos esperar que se extienda por todo el país y pase factura."
 panum.100.f: "El cólera, endémico del este de Asia, probablemente ocurrió en el subcontinente indio durante varios siglos en forma de epidemias localizadas, pero era desconocido en otros continentes. La primera pandemia ocurrió entre 1817 y 1824 y afectó las partes de Asia, así como en África Oriental y Asia Menor y, posteriormente, Rusia y Europa. En 1830 apareció en el este de Galicia y Hungría, y en junio de 1831 en Viena. Abrumó el mundo en un total de seis pandemias y se convirtió en el flagelo de la sociedad industrial emergente. Aunque la mayoría de las infecciones (alrededor del 85 por ciento) son asintomáticas, la tasa de mortalidad al principio es de entre 20 y 70 por ciento, si la enfermedad no se trata."
 panum.100.g: "Grim Reaper está a nuestra puerta."
 panum.102.t: "La epidemia del cólera llega a [SCOPE.sCountry('panum_infected_country').GetName]"
 panum.102.d: "Hemos recibido informes de que los primeros casos de cólera se informaron en el [SCOPE.sCountry('panum_infected_country').GetName] hoy. Las autoridades nos culpan por no hacer lo suficiente para evitar la propagación."
 panum.102.g: "Se supone que esto es nuestra culpa ...?"
 panum.103.t: "Cólera en fábricas"
 panum.103.d: "Varias fábricas en [SCOPE.sState('panum_disease_state').GetName] informan los primeros casos de cólera entre los trabajadores. Las autoridades locales están proponiendo la regulación para combatir la propagación. Eso tendría un impacto masivo en la industria."
 panum.103.f: "El primer caso de cólera ocurrió la semana pasada en una fábrica de agua en las afueras de la ciudad. Aunque el edificio fue en cuarentena, hubo más incidentes más aguas abajo en varias fábricas. Todavía no está completamente claro cómo se propagó la enfermedad, pero algunos políticos locales están de acuerdo en que se deben usar restricciones difíciles para recuperar la confianza perdida entre la población."
 panum.103.g: "¡Quedan las fábricas!"
 panum.103.h: "¡Las fábricas deben continuar funcionando, a toda costa!"
 panum.104.t: "[SCOPE.sCharacter('disease_victim_scope').GetFullName] ha contratado al cólera!"
 panum.104.d: "Hace solo unos días [SCOPE.sCharacter('disease_victim_scope').GetFullName] parecía estar completamente saludable, pero anoche [SCOPE.sCharacter('disease_victim_scope').GetSheHe] mostró los primeros síntomas de la terrible enfermedad que ha barrido [ROOT.GetCountry.GetNameNoFlag]. [SCOPE.sCharacter('disease_victim_scope').GetHerHis|U] La salud es deplorable."
 panum.104.f: "Las dos primeras olas de cólera en el siglo XIX también mataron a personas famosas. En Prusia, el filósofo Georg Friedrich Wilhelm Hegel y el general agosto Neidhardt von Gneisenau murieron en la epidemia del cólera de 1831. El compositor Pyotrilyich tchaikovsky también se considera una víctima del cólera, a pesar de las circunstancias, consciente o la ingesta de la ingesta no controvertida."
 panum.104.g: "¡Asegure el mejor tratamiento posible!"
 panum.104.h: "Nuestro mejor médico se ocupará de [SCOPE.sCharacter('disease_victim_scope').GetHerHim] personalmente."
 panum.104.i: "[SCOPE.sCharacter('disease_victim_scope').GetSheHe|U] no es tan importante ..."
 panum.105.t: "El éxodo de los ricos"
 panum.105.d: "La clase alta de [SCOPE.sState('panum_disease_state').GetName] utiliza sus recursos financieros para abandonar el área lo más rápido posible o para escapar al campo. Se pagaron muchos sobornos para eludir las regulaciones de cuarentena. La gente común ve este desarrollo con desprecio."
 panum.105.f: "Una de las características del cólera era que mataba a los ricos y a los pobres por igual, por lo que es como la peste de la Edad Media. Por lo tanto, las familias influyentes y ricas hicieron todo lo posible para evitar la plaga. La aristocracia vio al cólera como una especie de \"enfermedad revolucionaria\" porque no se distinguió entre clases. Las laxas medidas hacia la clase alta hicieron del cólera un problema político debido a estos conflictos sociales. A menudo se ha declarado que las epidemias del cólera de principios de la década de 1830 en Europa y los movimientos revolucionarios estaban en un contexto."
 panum.105.g: "Déjalos ir."
 panum.105.h: "Hay un motivo que lo llamamos el gran ecualizador."
 panum.106.t: "La oposición intenta explotar el cólera"
 panum.106.d: "La oposición está utilizando la epidemia para resolver los puntajes: acusa al gobierno de cometer enormes errores al combatir la epidemia."
 panum.106.f: "Debido a sus implicaciones sociales y políticas, las epidemias del cólera eran un área en la que los liberales en particular podían culpar a los conservadores. Se recomendaron medidas más progresivas y nuevos métodos como una alternativa a la élite \"atrasada\". No debería sorprender que este límite entre conservadores y liberales se repita en diferentes circunstancias y con diferentes partes."
 panum.106.g: "Tienes razón, estamos equivocados. ¡Ahora luchemos contra la epidemia!"
 panum.106.h: "Este gobierno tiene la situación perfectamente bajo control."
 panum.107.t: "Tumbas"
 panum.107.d: "La crítica de las nuevas tumbas masivas en [SCOPE.sState('panum_disease_state').GetName] está creciendo. La clase baja en particular ve el proceso como un proceso casi mecánico en lugar de un cuidado adecuado para los muertos."
 panum.107.f: "A raíz de las muertes masivas y los posibles riesgos de infección, el entierro masivo de los muertos se convirtió en un fenómeno inevitable. El hecho de que los ciudadanos más ricos pudieran permitirse tener un funeral en el estilo habitual, mientras que los cuerpos de las personas pobres simplemente fueron enterrados, causaron explosividad social."
 panum.107.g: "¡No tenemos tiempo que perder con los funerales!"
 panum.107.h: "Todos merecen un entierro digno."
 panum.108.t: "Hospitales de cólera"
 panum.108.d: "Varios partidos políticos, a través de sus propios intereses, han decidido establecer hospitales de cólera para cuidar la clase baja. Sin embargo, no son muy populares."
 panum.108.f: "La construcción de hospitalizaciones de masas durante epidemias como el cólera o la tuberculosis a menudo era controvertida. Las familias prefirieron cuidar a sus personas enfermas en casa en lugar de entregarlas al anonimato, donde fueron abarrotados en un espacio pequeño con otras personas enfermas, por lo que muchos estaban convencidos de que se enfermarían y morirían allí. La acusación circuló de que era principalmente una medida aislar a los pobres de los ricos y, por lo tanto, proteger a los últimos."
 panum.108.g: "¡Bótalos en los hospitales si es necesario!"
 panum.108.h: "No puedes obligar a estos tercos bueyes a vivir."
 panum.109.t: "Pánico"
 panum.109.d: "A pesar de los mejores esfuerzos del gobierno local en [SCOPE.sState('panum_disease_state').GetName], la población ha comenzado a sucumbir a una de las partes más peligrosas de cualquier brote: el pánico."
 panum.109.f: "'Es fácil pensar que estamos por encima de cualquier otra bestia sobre esta tierra, pero eliminamos la apariencia de la razón, y descubres que el hombre sigue siendo un animal, gobernado por el miedo y el temor de un mañana desconocido. El brote y la propagación de la enfermedad pueden llenar los corazones de las tropas veteranas con terror, para ¿quién puede luchar contra un enemigo que ni siquiera pueden ver? No, el terror puede masticar sus corazones y dejarlos ver enemigos en cada esquina, y donde hay enemigos, hay enemigos que se libraron. El hombre enfermo, arrojado con piedras para mantenerlas alejadas. Susurros sobre esa familia que no ha salido de su puerta. El hombre tranquilo y honesto trae una pistola a casa, temerosa de que el próximo golpe en la puerta traiga un pequeño robo y robo, no ayuda. Es el final de la ilusión: el hombre es un animal, y tiene miedo."
 panum.109.g: "¡Maldito miedo! ¿Cómo podemos ayudarlos si no ven razón?"
 panum.110.t: "Propósito común"
 panum.110.d: "El brote del cólera en [SCOPE.sState('panum_disease_state').GetName] parece haber fomentado un sentido de unidad nacional, el pueblo de la región uniéndose para tratar de combatir el brote."
 panum.110.f: "'Una sala de hospital es un lugar sombrío, ya que es un recordatorio de que vivimos en un mundo enfermizo. Pero esa enfermedad no le importa quién eres: no le importa qué religión tienes, por el maestro que tienes, por el color de tu piel o la política que tienes cerca de tu corazón. Mira a la cama, y ​​ves a un hombre, una mujer o un niño. Ves Poeple, que necesita ayuda. No les importa quién lo trae. No les importa si el médico es sacerdote, un soldado, o un hombre trabajador común que ofrece el poco tiempo que tiene de ahorrar, poniéndose en peligro para ayudar a un extraño. No le miran a ver a un monarquista, un republicano, o un agitador, ni nada más que lo que realmente son. Un hermano, un hijo, un compatriota, pero sobre todo, un prójimo."
 panum.110.g: "¡Estamos unidos contra el cólera!"
 panum.111.t: "El horror"
 panum.111.d: "Las montañas de cadáveres en [SCOPE.sState('panum_disease_state').GetName] ahora se están acumulando. No queda nadie que no conozca al menos un conocido que estaba infectado con el cólera. La región se ha convertido en un epicentro de la epidemia."
 panum.111.f: "Berlín solo fue golpeado por el cólera trece veces en 42 años entre 1831 y 1873. Las epidemias de 1848/49, 1852, 1855 y 1866 fueron particularmente severas en toda Prusia. En el último caso, 114,683 personas murieron oficialmente de cólera. Un brote de cólera en Londres en 1848/1849 fue mucho más grave que el brote de cólera en 1832/1832. Durante este brote, 15,000 personas murieron en Londres, más del 0.5 por ciento de una población de la ciudad en el momento de aproximadamente 2.5 millones. En la primera semana de septiembre de 1849, 300 personas murieron por día. En la tercera pandemia entre 1852 y 1860, alrededor de un millón de personas murieron en Rusia, que fue facilitada por la Guerra de Crimea que estaba teniendo lugar al mismo tiempo. El comandante británico en jefe, Lord Raglan, y el comandante de la flota francesa, Armand Joseph Bruat, murieron de la enfermedad. Se cree que más personas murieron de cólera que por pelear."
 panum.111.g: "¿Cuántos más muertos?"
 panum.120.t: "Finaliza la epidemia del cólera"
 panum.120.d: "Todo el [ROOT.GetCountry.GetNameNoFlag] está respirando un suspiro de alivio: las autoridades acaban de informar que no hay más casos de cólera en la última área de enfermedad. El estado de emergencia ha terminado. Ahora es el momento de contar a los muertos y volver a la normalidad."
 panum.120.f: "¡Que Dios esté conmigo! Que el cielo bendiga este año nuevo. Que sea un año de fecundidad, de paz y prosperidad; Que sea un año de paz y unidad para toda la humanidad; Que el mundo sea liberado del cólera. -Giacomo meyerberr"
 panum.120.g: "¿Pero a qué costo?"
 panum.200.t: "Epidemia de tuberculosis"
 panum.200.d: "Una epidemia ha estallado en uno de nuestros estados: #YELLOW tuberculosis#! es devastador en [SCOPE.sState('panum_disease_state').GetName]!"
 panum.200.f: "A principios de la Edad Media, la tuberculosis jugó un papel menor en Europa debido a la población escasa. Solo estaba más fuertemente representado en las pocas áreas metropolitanas. Después de un brote previo en Italia en la segunda mitad del siglo XV, la ola de tuberculosis más grande y más larga de la historia comenzó en el siglo XVII. La tuberculosis ganó un interés generalizado en los siglos XIX y principios del XX como la enfermedad endémica de los pobres urbanos. En 1815, una cuarta parte de las muertes en Inglaterra y en 1918 en Francia, una sexta muertes fueron causadas por tuberculosis. Alrededor de 1880, cada segunda muerte en Alemania en el grupo de edad de 15 a 40 años se debió a esta enfermedad. La tuberculosis también fue la causa más común de muerte en las zonas rurales."
 panum.200.g: "¿Hay al menos tiempo para una muerte romántica?"
 panum.220.t: "Tuberculosis epidemia termina"
 panum.220.d: "La ciudad y los médicos rurales informan que el cenit de los casos de tuberculosis ya ha sido aprobado durante unas pocas semanas. Aunque la enfermedad no ha desaparecido por completo, está de vuelta dentro de los límites habituales."
 panum.220.f: "\"No puedo ser engañado en ese color; que la caída de sangre es mi jerga de muerte; \ n debo morir. -John Keats"
 panum.300.t: "Epidemia de viruela"
 panum.300.d: "Una epidemia ha estallado en uno de nuestros estados: #YELLOW StrainPox#! es devastador en [SCOPE.sState('panum_disease_state').GetName]!"
 panum.300.f: "La viruela probablemente ha sido conocida desde hace miles de años y apareció en los primeros asentamientos en el noreste de África hace 12,000 años. Desde allí pueden haber sido traídos a la India por comerciantes egipcios. Los conquistadores europeos trajeron la viruela con ellos a Estados Unidos, donde causó epidemias devastadoras entre los indios que comenzaron en 1518, causando millones de muertes. En Europa, la viruela a veces se consideraba una enfermedad infantil, y la enfermedad, desde la cual hasta el 10% de todos los niños pequeños murieron hasta finales del siglo XVIII, también se llamaba \"enfermedad infantil\". A partir del siglo XVIII, los casos de viruela aumentaron y reemplazaron la peste como la peor enfermedad. Se estima que 400,000 personas murieron de viruela cada año, y un tercio de los que sobrevivieron se quedaron ciegos. A menudo, los niños solo se consideraban parte de la familia una vez que habían sobrevivido a la viruela. A pesar de la exitosa introducción de la vacunación de la viruela alrededor de 1800, la viruela siguió siendo una enfermedad epidémica hasta la segunda mitad del siglo."
 panum.300.g: "Los productos cosméticos pronto se volverán populares, supongo."
 panum.320.t: "Smnpox Epidemic Fins"
 panum.320.d: "La terrible viruela, una de las peores plagas de la humanidad, está desapareciendo lentamente de [ROOT.GetCountry.GetNameNoFlag]. Los que sobrevivieron están marcados de por vida."
 panum.320.f: "\"Las naciones futuras sabrán solo por la historia que ha existido la sensación repugnante y por usted ha sido extirpado\". -Thomas Jefferson"
 panum.400.t: "Epidemia de tifus"
 panum.400.d: "Una epidemia ha estallado en uno de nuestros estados: #YELLOW typhus#! es devastador en [SCOPE.sState('panum_disease_state').GetName]!"
 panum.400.f: "La fiebre del tifus, que probablemente existía en la antigüedad, pero solo se describió de manera confiable en el siglo XVI, apareció principalmente como una epidemia típica de guerra y miseria. Typhus se convirtió en un grave problema para el ejército de Napoleón durante la campaña rusa. Cuando el Grande Armée, que se había mudado a Rusia en junio de 1812, se retiró en el otoño de 1813, Mainz fue la primera parada en el suelo francés. 15,000-17,000 tripulantes franceses y tal como muchos civiles murieron allí. La enfermedad, que luego también se llamaba \"fiebre nerviosa\" debido a los síntomas neurológicos que causó, permaneció en el idioma francés como tifus de mayores. A finales de octubre de 1814, 14,000 casos de tifus habían sido registrados en el área franconiana alrededor del Gran Ducado de Würzburg, de los cuales 2.500 eran fatales. Otra epidemia con alrededor de dos millones y medio de muertes ocurrió como resultado de la guerra y la guerra civil entre 1918 y 1922 en Rusia."
 panum.400.g: "Tal vez cambiar tu ropa?"
 panum.420.t: "Typhus Epidemic termina"
 panum.420.d: "Parece que la peor fase del tifus epidémico ha terminado. Aunque el recuento del cuerpo aún no se ha completado, ya está claro que nadie puede ser responsable de este terrible brote."
 panum.420.f: "'Los únicos pacientes ingleses que he conocido, rechazar el té, han sido casos de tifus; Y la primera señal de que mejoró fue su deseo nuevamente por el té. -Florencia Nightingale"
 panum.500.t: "Epidemia de fiebre amarilla"
 panum.500.d: "Una epidemia ha estallado en uno de nuestros estados: #YELLOW Fiebre amarilla#! es devastador en [SCOPE.sState('panum_disease_state').GetName]!"
 panum.500.f: "La fiebre amarilla es endémica de las áreas tropicales y subtropicales en América del Sur y África. En los siglos XVIII y XIX, América Central, el Caribe y el sur de lo que ahora es Estados Unidos también se vieron afectados. La enfermedad probablemente se originó en África y llegó al Nuevo Mundo a través del comercio triangular del Atlántico. El primer brote probable de la enfermedad ocurrió en Yucatán en 1648, donde la enfermedad se denominó Xekik (vómito negro). Siguieron al menos 25 brotes principales, como en Filadelfia en 1793, en los que murieron varios miles de personas y el gobierno estadounidense y luego el presidente George Washington se vieron obligados a abandonar la ciudad. Una de las primeras descripciones médicas de la fiebre amarilla en América del Norte fue de John Lining (1756), un médico en Charleston, donde la fiebre amarilla ocurrió en 1728 y 1732. También se registraron brotes ocasionales en Europa, por ejemplo en Barcelona en 1821 con varios miles de muertes. En 1867 hubo una erupción en Fort Jefferson en Florida. En 1878, una erupción en el valle de Mississippi mató a 20,000 personas, y la última erupción en los Estados Unidos estaba en Nueva Orleans en 1905."
 panum.500.g: "¿La fruta mimada es la culpa?"
 panum.520.t: "Finemia de fiebre amarilla termina"
 panum.520.d: "Después de que las calles y familias enteras hayan sido aniquiladas por la insidiosa fiebre amarilla, los médicos y las autoridades dan el todo claro: la epidemia finalmente ha terminado."
 panum.520.f: "\"Se llama fiebre amarilla, pero no se parece a nada o lee por los médicos\". -Thomas Jefferson"
 building_panum_tuberculosis_sanatorium: "Sanatorio de tuberculosis"
 pmg_panum_sanatorium: "Sanatorio de tuberculosis"
 pm_panum_sanatorium: "Sanatorio de tuberculosis"
 building_panum_tuberculosis_sanatorium_tt: "Se puede fundar un sanatorio de tuberculosis a raíz de una epidemia de tuberculosis en áreas con montañas. #R solo se activa a través de Event.#!"
 panum_tuberculosis: "Tuberculosis"
 panum_tuberculosis_desc: "La tuberculosis, también conocida como la 'muerte blanca', fue una causa principal de muerte en la era victoriana."
 panum_forbidden_spitting_modifier: "Prohibir escupir"
 panum_tuberculosis_quarantine_modifier: "Cuarentena de tuberculosis"
 panum_tuberculosis_sanatorium_cost_modifier: "Costo de sanatorio"
 panum_help_against_tuberculosis_modifier: "Ayuda contra la tuberculosis"
 panum_praised_for_tuberculosis_initiative_modifier: "Elogiado por el discurso de tuberculosis"
 panum_supports_health_care_initiative_modifier: "Apoya la iniciativa de atención médica"
 panum_opposes_health_care_initiative_modifier: "Se opone a la iniciativa de atención médica"
 panum_tuberculosis_hospital_modifier: "Hospital de tuberculosis"
 panum.201.t: "La tuberculosis se propaga a [SCOPE.sState('panum_disease_state').GetName]"
 panum.201.d: "La epidemia de tuberculosis se ha extendido a pesar de nuestros mejores esfuerzos. Ahora también está enriqueciendo en [SCOPE.sState('panum_disease_state').GetName]."
 panum.201.g: "La muerte blanca parece imparable."
 panum.202.t: "Una enfermedad hereditaria?"
 panum.202.d: "A pesar de todos los exámenes médicos, el origen de la tuberculosis sigue siendo un área controvertida. Algunos de nuestro personal médico suponen que esta es una enfermedad hereditaria, o al menos una basada en 'factores internos'. Otros médicos opinan que es una enfermedad clásica y contagiosa y recomiendan medidas radicales."
 panum.202.f: "Con respecto al concepto de patogénesis, existían diferentes tradiciones en los países europeos de los siglos XVIII y XIX. Muchos autores médicos de la época consideraban la tuberculosis, o el consumo, que no siempre era sinónimo de ella, era la peor de las epidemias conocidas en ese momento. Vieron las causas como una distribución desigual de los humores corporales, exhalaciones siniestras del suelo, la urbanización o el declive de las costumbres. En Italia, por otro lado, había una tendencia tradicional hacia una contagiosa, es decir, h. causa transmitible. En consecuencia, a mediados del siglo XVIII, la República de Venecia introdujo la obligación escrita de informar casos de tisis (consumo debido a tuberculosis pulmonar). Las pertenencias personales de aquellos que murieron de la enfermedad fueron quemadas para reducir el riesgo de infección. Sin embargo, en Inglaterra y los países nórdicos, generalmente se creía que la enfermedad se debía a una causa hereditaria."
 panum.202.g: "Es una enfermedad hereditaria y no hay nada que podamos hacer."
 panum.202.h: "¡Es una enfermedad contagiosa y debemos hacer todo lo posible para evitar que se propague!"
 panum.203.t: "Escupir en las calles"
 panum.203.d: "Debido a la falta de conocimiento sobre las causas de la tuberculosis, las medidas también fueron controvertidas. Aquellos que asumieron una causa contagiosa abogaron por las prohibiciones radicales, incluida la escupida en áreas públicas, para evitar la propagación. Esto afectó particularmente a las clases bajas. Los escépticos vieron tales regulaciones como una forma de acosar a la gente común."
 panum.203.f: "Incluso si las reglas de etiqueta del siglo XVIII erradicaron algunos \"malos hábitos\" en las clases superiores y medias, muchas peculiaridades higiénicamente dudosas permanecieron generalizadas entre las masas durante mucho tiempo. Los pañuelos y los aspiradores aún no se habían generalizado en la sociedad a principios del siglo XIX, y fue solo alrededor del cambio de siglo que se convirtió en una práctica común para prohibir escupir en el transporte público, por ejemplo."
 panum.203.g: "¡Prohibir este desagradable hábito!"
 panum.203.h: "¡Anuncie una prohibición draconiana y haga que los malhechores paguen!"
 panum.203.i: "Escupir es una naturaleza humana que no se puede prohibir."
 panum.204.t: "[SCOPE.sCharacter('disease_victim_scope').GetFullName] ha contraído tuberculosis!"
 panum.204.d: "¡La epidemia de tuberculosis también ha afectado a nuestro artista [SCOPE.sCharacter('disease_victim_scope').GetFullName]! Sorprendentemente, [SCOPE.sCharacter('disease_victim_scope').GetSheHe] no lo ve como el peor golpe del destino."
 panum.204.f: "A principios del siglo XIX, pero también mucho más allá, la tuberculosis se consideraba una \"enfermedad romántica\". Le dio a la víctima suficiente tiempo para prepararse para la muerte, y muchos vieron la palidez asociada como nada menos que noble. Los escritores le crearon monumentos con varias obras, como Dumas, la más joven con la 'Dama de las Camellias'. Ella encuentra una transfiguración similar en las óperas de Verdi (La Traviata) y Puccini (La Bohème). Se dice que George Sand, compañero de Chopin, señaló: \"Chopin tos con gracia infinita\"."
 panum.204.i: "¿No sería una ocasión inspiradora para un réquiem?"
 panum.204.j: "¿Pero no ha sido siempre la tuberculosis siempre sujeto a escritores?"
 panum.204.k: "Pero, ¿esta enfermedad no fomenta visualizar la miseria?"
 panum.205.t: "Sanatorio de tuberculosis"
 panum.205.d: "En vista de la epidemia de tuberculosis en [SCOPE.sState('panum_disease_state').GetName], uno de los médicos allí ha sugerido que algunos pacientes ricos se transfieren a las montañas. Se dice que el clima de gran altitud y el aire de limpieza los curan de la enfermedad. Debe haber un sanatorio pulmonar dedicado para este propósito. [SCOPE.sState('panum_davos_scope').GetName] parece ser el lugar perfecto para tal sanatorio."
 panum.205.f: "La cura de aire es una forma de terapia climática que se consideró la terapia estándar para la tuberculosis durante mucho tiempo desde el siglo XIX en adelante. Los pacientes yacían en tumbonas al aire libre o en salones abiertos durante varias horas al día. El tratamiento de aire se realizó en sanatorios pulmonar especiales. En Alemania, el médico Hermann Brehmer fue el primero en describir la tuberculosis de la enfermedad previamente incurable como curable con la ayuda de la terapia del aire. En 1856 escribió su disertación sobre la curabilidad de la tuberculosis crónica de los pulmones. Asumió que hay 'lugares inmunes' que, por un lado, debido a su clima, protegen efectivamente a los residentes de la ocurrencia de tuberculosis y, por otro lado, tienen un efecto curativo después de que la enfermedad se rompa. En Suiza, el médico nacido en alemán Alexander Spengler fue pionero de la terapia aérea. Comenzó a practicar como médico del país en Davos en 1853 y pronto llegó a la conclusión de que los residentes del área generalmente no sufrían de tuberculosis, que atribuyó al clima de alta montaña. Thomas Mann glorificó a Davos como un resort de salud climática en su 'Zauberberg'."
 panum.205.g: "¡Construya un sanatorio en [SCOPE.sState('panum_davos_scope').GetName]!"
 panum.205.h: "Todo esto es solo lujoso Charlatanry."
 panum.206.t: "La enfermedad de los proletarios"
 panum.206.d: "La epidemia de tuberculosis en [SCOPE.sState('panum_disease_state').GetName] llega a la clase baja más fuerte. Por lo tanto, [SCOPE.sCharacter('union_leader').GetFullName] ha criticado particularmente las condiciones actuales y ha pedido cambios de largo alcance."
 panum.206.f: "La tuberculosis ganó un interés generalizado en los siglos XIX y principios del XX como la enfermedad endémica de los pobres urbanos. En 1815, una cuarta parte de las muertes en Inglaterra y en 1918 en Francia, una sexta muertes fueron causadas por tuberculosis. Alrededor de 1880, cada segunda muerte en Alemania en el grupo de edad de 15 a 40 años se debió a esta enfermedad."
 panum.206.g: "¿Quizás los pobres deberían lavarse más?"
 panum.206.h: "Las mejoras selectivas en esta área están justificadas."
 panum.206.i: "La cuestión de la atención médica es un asunto nacional."
 panum.206.j: "Aplausos para esta iniciativa!"
 panum.207.t: "Iniciativa religiosa"
 panum.207.d: "[SCOPE.sCharacter('devout_leader').GetFullName] ha abogado personalmente por las muchas personas enfermas en [SCOPE.sState('panum_disease_state').GetName]. [SCOPE.sCharacter('devout_leader').GetSheHe|U] desea establecer un hospital sin fines de lucro allí pronto."
 panum.207.f: "\"Apenas un país permanece donde, de una forma u otra, la lucha contra la tuberculosis no se ha tomado, y es extraordinariamente gratificante ver cómo la campaña ahora se libra en general y con considerable vigor contra este peligroso enemigo\". -Robert Koch"
 panum.207.g: "¡Estos narradores solo están tratando de ganar influencia!"
 panum.208.t: "La peste blanca le da un paso factura"
 panum.208.d: "El brote de tuberculosis en [SCOPE.sState('panum_disease_state').GetName] ha empeorado. El número de personas enfermas y muertas está aumentando todos los días. Ninguno de los médicos esperaba este desarrollo."
 panum.208.f: "'¡Qué pálido me veo! - Me gustaría, creo, morir de consumo ... porque todas las mujeres dirían: 'Mira a ese pobre Byron, ¡qué interesante se ve al morir!' -Lord Byron"
 panum.208.g: "¿Esto nunca terminará?"
 panum_has_physician_tt: "#default_text tiene un [concept_panum_physician].#!"
 panum_has_active_physician_tt: "#default_text tiene un [concept_panum_physician] que no está ocupado.#!"
 panum_physician_experienced: "Médico experimentado"
 panum_physician_experienced_desc: "Después de pasar años trabajando para tratar a los pacientes, este $panum_physician$ se experimenta en su campo."
 panum_physician_famous: "Médico famoso"
 panum_physician_famous_desc: "Las innovaciones y descubrimientos médicos hechos por esto $panum_physician$ los hacen famosos en el campo de la medicina."
 panum_typhus_quarantine_modifier: "Cuarentena tifus"
 panum_typhus_fever_sheds_modifier: "Fiebre"
 panum_typhus_rigid_rules_modifier: "Reglas rígidas"
 panum_typhus_fever_sheds_help_modifier: "Ayuda de coberturas de fiebre"
 panum_additional_fever_shed_protection_modifier: "Protección contra la fiebre"
 panum_additional_funeral_aids_modifier: "Ayudas funerarias adicionales"
 panum_typhus_barracks_modifier: "Tifus en cuarteles"
 panum_yellow_fever_quarantine_modifier: "Cuarentena de fiebre amarilla"
 panum_plantation_quarantine_modifier: "Cuarentena de plantación"
 panum_administrative_evacuation_modifier: "Evacuación administrativa"
 panum_yellow_fever_barracks_modifier: "Fiebre amarilla en cuarteles"
 panum_yellow_fever_port_modifier: "Fiebre amarilla en el puerto"
 panum.301.t: "La viruela se extiende a [SCOPE.sState('panum_disease_state').GetName]"
 panum.301.d: "Según los últimos informes, la enfermedad de la viruela ahora también es desenfrenada en [SCOPE.sState('panum_disease_state').GetName]. Nuestros esfuerzos para detener la epidemia no han tenido éxito."
 panum.301.g: "¡POLLACIÓN EN TODAS PARTES!"
 panum.302.t: "La epidemia de la viruela alcanza [SCOPE.sCountry('panum_infected_country').GetName]"
 panum.302.d: "Hemos recibido informes de que los primeros casos de viruela se informaron en [SCOPE.sCountry('panum_infected_country').GetName] hoy. Las autoridades nos culpan por no hacer lo suficiente para evitar la propagación."
 panum.302.g: "¿Quién podría haber adivinado eso ...?"
 panum.303.t: "Viruela fuera de control"
 panum.303.d: "El sistema de salud en [SCOPE.sState('panum_disease_state').GetName] se ha llevado al borde del colapso. Los médicos ya salen del área porque ellos mismos corren el riesgo de infectarse. Desafortunadamente, tenemos que ajustar el número de muertos en la región hacia arriba."
 panum.303.f: "'No se ha intentado contar a las víctimas, ni es posible considerarlas en ninguna de estas tribus con precisión; Se cree que si el número 17.200 para los indios del río Moteouri superior se duplicara, el agregado no sería demasiado grande para aquellos que han caído al este de las montañas rocosas."
 panum.303.g: "¿No hay cura para esta terrible enfermedad?"
 panum.401.t: "El tifus se extiende a [SCOPE.sState('panum_disease_state').GetName]"
 panum.401.d: "El peligroso tifus aparentemente se ha extendido a otro estado. Los informes de [SCOPE.sState('panum_disease_state').GetName] sugieren que cada vez más personas son víctimas de la enfermedad."
 panum.401.g: "Typhus parece imparable ..."
 panum.402.t: "¿Una enfermedad de la corrupción moral?"
 panum.402.d: "Dado el conocimiento limitado de lo que es el tifus, qué lo causa y cómo combatirlo de manera efectiva, existen numerosas teorías sobre qué promueve la infección. La opinión predominante es que es una enfermedad relacionada con el estilo de vida, no la transmisión."
 panum.402.f: "Similar a la tuberculosis, había muchos médicos que asumieron que el tifus no era una enfermedad contagiosa. Mientras que la tuberculosis se veía de una manera casi romántica, era una enfermedad de los románticos y, por lo tanto, los espíritus 'nobles', en el caso del tifus, la enfermedad se veía como un estigma de descripción moral. El hecho de que las clases superiores no se vieron afectadas condujeron a una cierta sensación de superioridad. Al igual que en la Edad Media, las enfermedades a menudo se atribuyeron a la influencia o castigo divino, parecía ser un hecho comprobado de que los defectos o depravación de carácter estaban en cierta medida vinculados a ciertas enfermedades. Fue solo desde el segundo tercio del siglo XIX en adelante que este punto de vista comenzó a cambiar."
 panum.402.g: "Hay una razón por la cual el tifus afecta principalmente a delincuentes, prostitutas y soldados inmorales."
 panum.402.h: "Probablemente importa menos lo que son estas personas que donde viven."
 panum.403.t: "Cuarentena"
 panum.403.d: "Existe un deseo, particularmente por parte de las clases medias y altas, de proporcionar las clases sociales más bajas afectadas por el tifus con sus propias instalaciones. Estas 'casas de fiebre' también serían pagadas por organizaciones sin fines de lucro. Sin embargo, algunos representantes de las clases más pobres ven esto como un método de exclusión más que de atención médica. Algunos miembros del gobierno, por otro lado, quieren una cuarentena completa, que la clase media, en particular, considera una medida completamente excesiva."
 panum.403.f: "Al igual que muchas otras epidemias, Typhus sirvió para segregar. Por lo tanto, el llamado a una cuarentena general era impopular en muchos lugares porque se creía que ciertas personas podían atribuirse a una enfermedad, especialmente porque muchos creían que era hereditario. Sin embargo, el miedo subyacente a la infección jugó un papel, por lo que las casas de fiebre se construyeron en muchos lugares. Durante la gran epidemia de tifus en América del Norte en 1847, la idea de que era una enfermedad contagiosa se generalizó tanto que las masas de inmigrantes irlandeses infectados fueron deportados de facto a tales instituciones."
 panum.403.g: "Toda el área debe estar en cuarentena."
 panum.403.h: "Lleva a los typhus sufrientes a casas especiales."
 panum.403.i: "El tifus no es una enfermedad contagiosa, por lo que la cuarentena no tiene sentido."
 panum.404.t: "Cobertizos"
 panum.404.d: "La situación en las presuntas casas de fiebre, que se están convirtiendo cada vez más en ataúdes superpoblados llenos de heces y miseria, ya se ha convertido en un problema grave en el [SCOPE.sState('panum_disease_state').GetName]. Los pastores y los cuidadores enfermos han escrito una carta que pide que estas terribles casas sean desmanteladas."
 panum.404.f: "Los cobertizos de fiebre estaban sucios y llenos de gente, con pacientes que yacían en niveles dobles de literas que permitían que la suciedad desde la litera superior cayera sobre la parte inferior. Según el informe del Comité del Senado, se colocarían dos o tres inválidos juntos en un litero, independientemente de su edad o sexo. No había pan: las comidas consistían en té, gamuza o caldo servido tres veces al día. Como el agua potable se cargó, nunca hubo suficiente para los pacientes con fiebre. Un sacerdote católico, el padre Moylan, informó que dio agua a inválidos en una tienda de campaña que no había podido beber durante 18 horas. Los cobertizos no estaban destinados originalmente a los pacientes con fiebre y no tenían ventilación; Se construyeron nuevos cobertizos sin privados. El Comité del Senado declaró que debido a la falta de personal y espacio, los inválidos estaban en sus propios excrementos durante días y no había un personal suficiente para quitarle a los que murieron durante la noche."
 panum.404.g: "No podemos arriesgarnos a que más personas se infecten."
 panum.404.h: "Mejore la situación de los pacientes con tifus y brinde ayuda médica."
 panum.404.i: "¡Desmontar estas casas inhumanas!"
 panum.405.t: "Disturbios contra la fiebre"
 panum.405.d: "El miedo al tifus que se propaga en [SCOPE.sState('panum_disease_state').GetName] ha radicalizado a algunos ciudadanos en la medida en que han formado una mafia enojada. ¡Hay un rumor de que quieren empujar las casas de fiebre y sus pacientes al río más cercano!"
 panum.405.f: "En 1847, el número de cobertizos en Montreal crecería a 22, con tropas acordonándose del área para que los enfermos no pudieran escapar. Cuando una mafia amenazó con tirar los cobertizos de fiebre al río, el alcalde de Montreal, John Easton Mills, sofocó a los disturbios y brindó atención, brindando agua a los pacientes y cambiando de ropa de cama. Murió en noviembre, sirviendo menos de un año en el cargo."
 panum.405.g: "¡Esta barbarie no tiene lugar en nuestro país!"
 panum.405.h: "Mueren de cualquier manera."
 panum.406.t: "Cadáveres no enterrados"
 panum.406.d: "El número de muertes en [SCOPE.sState('panum_disease_state').GetName] está aumentando tan rápido que los arrepentidos apenas pueden mantenerse al día con el número. Existe el peligro de que los cuerpos no enterrados puedan conducir a problemas aún mayores."
 panum.406.f: "En la década de 1860, las condiciones climáticas excepcionalmente duras y las pérdidas de cultivos afectaron lo que entonces era el Gran Ducado de Finlandia, lo que condujo a la hambruna y la enfermedad epidémica. 1866–68 vio hambre y especialmente en lo que se pensaba en ese momento como tifus matando a 270,000 personas en la región."
 panum.406.g: "Use todos los medios disponibles para evitar que este problema se vuelva abrumador."
 panum.406.h: "Cava las tumbas de masa habituales."
 panum.406.i: "Nuestras capacidades están agotadas, ¡tienes que organizar las cosas tú mismo!"
 panum.407.t: "Tifus en cuarteles"
 panum.407.d: "El tifus actualmente está contaminando principalmente las instalaciones militares de [SCOPE.sState('panum_disease_state').GetName]. Hace un peaje mortal allí."
 panum.407.f: "Muchos historiadores creen que el brote del tifus entre las tropas de Napoleón es la verdadera razón por la que estancó su campaña militar en Rusia, en lugar de la inanición o el frío. El tifus fue un asesino significativo durante la Guerra Civil estadounidense, aunque la fiebre tifoidea fue la causa más frecuente de la guerra civil de los Estados Unidos 'fiebre del campamento'. Hasta 900,000 muertes se han atribuido a la fiebre del tifus durante la Guerra de Crimea en 1853-1856. El tifus fue endémico en Polonia y varios países vecinos antes de la Primera Guerra Mundial (1914-1918), pero se convirtió en epidemia durante la guerra. Typhus devastó los ejércitos del frente oriental, donde más de 150,000 murieron solo en Serbia. Las muertes generalmente estaban entre el 10% y el 40% de las infectadas y la enfermedad fue una causa importante de muerte para quienes amamantan los enfermos."
 panum.407.g: "Un enemigo invisible más mortal que cualquier ejército ..."
 panum.408.t: "Atormentado en enfermedades, no en la guerra"
 panum.408.d: "La epidemia del tifus en nuestros cuarteles continúa extendiéndose todos los días. Los soldados ahora se encuentran entre los más asesinados en el [SCOPE.sState('panum_disease_state').GetName], y sin influencia enemiga."
 panum.408.f: "'La guerra no es una aventura. Es una enfermedad. Es como tifus. Antoine de Saint-Exupéry"
 panum.408.g: "¡Horrible!"
 panum.501.t: "La fiebre amarilla se propaga a [SCOPE.sState('panum_disease_state').GetName]"
 panum.501.d: "Los informes de nuevos casos de fiebre amarilla han confirmado nuestros peores temores. ¡La enfermedad ahora también está en [SCOPE.sState('panum_disease_state').GetName]!"
 panum.501.g: "¿Por qué no fue posible detener esto?"
 panum.502.t: "Una enfermedad contagiosa?"
 panum.502.d: "Aunque no está claro si la fiebre amarilla es una enfermedad contagiosa o tiene otras causas, muchos ciudadanos con mentalidad de seguridad están pidiendo que la cuarentena detenga la propagación. Si no hacemos esto, podrían verlo como ignorancia o desinterés en sus necesidades."
 panum.502.f: "Los primeros brotes de fiebre amarilla en el siglo XVII causaron pánico y desorientación. Incluso en el siglo XVIII, las personas no estén en desacuerdo sobre lo que desencadenó una infección. Aunque los gobiernos e individuos recurrieron a medidas o prevención estrictas, no hubo éxito. El miedo a la fiebre amarilla significaba que no se desperdició ninguna oportunidad para evitar su mayor propagación, a veces con medidas experimentales o draconianas. Por lo tanto, algunas acciones podrían tener razones psicológicas más que médicas para evitar aumentar el descontento entre la población."
 panum.502.g: "No hay evidencia de que esta sea una enfermedad contagiosa."
 panum.503.t: "La fiebre amarilla afecta a las plantaciones"
 panum.503.d: "Se reciben diariamente informes de que las plantaciones en [SCOPE.sState('panum_disease_state').GetName] en particular tienen una alta tasa de pacientes con fiebre amarilla. Algunos asesores gubernamentales están presionando para dejar de trabajar allí por completo para reducir la propagación."
 panum.503.f: "'Un pobre hombre negro, llamado Sampson, fue constantemente de casa en casa donde estaba la angustia, y sin asistencia, sin tarifa o recompensa. Estaba enamorado del trastorno y murió. Después de su muerte, su familia fue descuidada por los que había servido. Sarah Bass, una pobre viuda negra, brindó toda la ayuda que pudo, en varias familias, por lo que no recibió nada; Y cuando se le ofreció cualquier cosa, lo dejó a la opción de aquellos a quienes sirvió. -Richard Allen"
 panum.503.g: "¡Saca a los trabajadores de los campos!"
 panum.503.h: "¡La plantación debe continuar funcionando, a toda costa!"
 panum.504.t: "Evacuación"
 panum.504.d: "La situación de salud en [SCOPE.sState('panum_disease_state').GetName] continúa empeorando. Los miembros del gobierno y la administración local han pedido que abandonen la ciudad y organicen la administración desde el campo. Algunos lo consideran una sugerencia inteligente, otros lo consideran pura cobardía."
 panum.504.f: "Durante la epidemia de fiebre amarilla de 1793 en Filadelfia, 5,000 o más personas fueron enumeradas en el Registro de Muertas entre el 1 de agosto y el 9 de noviembre. La gran mayoría de ellos murió de fiebre amarilla, lo que convirtió la epidemia en la ciudad de 50,000 personas una de las más severas en la historia de los Estados Unidos. A finales de septiembre, 20,000 personas habían huido de la ciudad, incluidos funcionarios del Congreso y Ejecutivos del Gobierno Federal. La mayoría no regresó hasta después de que la epidemia había disminuido a fines de noviembre. El presidente George Washington dejó la ciudad para su finca Mount Vernon. La tasa de mortalidad alcanzó su punto máximo en octubre antes de que Frost finalmente matara a los mosquitos y puso fin al brote. Algunas ciudades vecinas se negaron a dejar entrar a los refugiados de Filadelfia, temiendo que tenían la fiebre. Las principales ciudades portuarias, incluidas las de Baltimore y la ciudad de Nueva York, tenían cuarentajas contra refugiados y bienes de Filadelfia, aunque la ciudad de Nueva York envió ayuda financiera a Filadelfia."
 panum.504.g: "Evacuar las autoridades."
 panum.504.h: "La administración local no debe colapsar."
 panum.505.t: "La fiebre amarilla se extiende a los cuarteles"
 panum.505.d: "La fiebre amarilla actualmente está contaminando principalmente las instalaciones militares de [SCOPE.sState('panum_disease_state').GetName]. Hace un peaje mortal allí."
 panum.505.f: "Para los rebeldes en Haití a los siglos XVIII y XIX y en Cuba casi 100 años después, la fiebre amarilla fue el gran aliado contra los ejércitos coloniales enviados desde Europa. El líder de la lucha de la independencia cubana habló de sus 'generales invencibles de junio, julio, agosto', esos meses en los que vienen las lluvias y con ellos los mosquitos. Los británicos tuvieron experiencias similares durante el asedio de Cartagena en 1741. 29,000 soldados británicos asediaron a la fortaleza. Cuando comenzaron las lluvias, 22,000 perecieron miserablemente en unas pocas semanas. La tasa de mortalidad en las guarniciones británicas en Jamaica fue siete veces la de las guarniciones en Canadá, principalmente debido a la fiebre amarilla y otras enfermedades tropicales."
 panum.505.g: "¡No! ¡Estaban destinados a una muerte honorable en el campo de batalla!"
 panum.506.t: "Enfermedad del marinero"
 panum.506.d: "Las operaciones portuarias en [SCOPE.sState('panum_disease_state').GetName] se han detenido virtual debido a la fiebre amarilla. Por un lado, muchos trabajadores de muelles y mariscos están enfermos. Por otro lado, la mayor cantidad posible de barcos intenta evitar la región maldita."
 panum.506.f: "'El estragos más deplorable está siendo realizado en Nueva Orleans por la fiebre amarilla. Miles han sido trasladados por sus estragos, y cada día agrega 200 más al horrible registro. Los muertos están enterrados en trincheras por una cadena de pandillas de negros, contratados en una guinea por hora. Y por lo tanto, con las canciones y las bromas obscenas de los Gravediggers, el zumbido de las moscas, los gritos de la canción de los Huxter-Women que respaldan sus confecciones, los juramentos de los hombres que conducen los carros muertos, el alegre silbato de los niños, y las nocturnas, y las nocturnas, y la noche, y la noche, y las noches, y la noche, y las noches, y la noche, y las noches hacen y las noches, y la noche. cortina. Mientras tanto, diversiones, regatas, bolas, etc. son anteriores como de costumbre, como si no hubiera tanta pestilencia espantosa en la ciudad condenada. -Cambridge Weekly News en 1853"
 panum.506.g: "¡Un colapso para el envío!"
 panum.507.t: "Vómito negro"
 panum.507.d: "En [SCOPE.sState('panum_disease_state').GetName], la fiebre amarilla es sorprendente más violentamente de lo esperado. Los médicos informan que más personas que antes han muerto por la enfermedad."
 panum.507.f: "'Aquellos que se aventuraron en el extranjero, tenían pañuelos o esponjas impregnadas con vinagre de alcanfor en las narices, o las botellas de olfato llenas de vinagre de los ladrones. Otros llevaban piezas de cuerda asaltada en sus manos o bolsillos, o bolsas de alcanfor atadas alrededor de sus cuellos ... la gente cambió apresuradamente su curso al ver un coche fúnebre que se dirigía hacia ellos. Muchos nunca caminaron por el sendero, pero entraron en la mitad de las calles, para evitar ser infectados al pasar por casas en las que la gente había muerto. Los conocidos y los amigos se evitaron en las calles, y solo significaron su respeto por un asentimiento frío. La vieja costumbre de estrechar las manos cayó en tan desuso general, que muchos se encogieron de manera considerable incluso por la oferta de una mano. Una persona con el crepe de luto, o cualquier apariencia de duelo, fue rechazada como una víbora. '' -Mathew Carey"
 panum.507.g: "¿Cuándo finalmente seremos liberados de esta plaga?"
