 panum_cholera_desc: "El cólera es una enfermedad infecciosa peligrosa del intestino delgado. Se considera una epidemia definitoria del siglo XIX con millones de muertes en todo el mundo."
 panum.2626.t: "El espectáculo del Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetFullName]"
 panum.2626.d: "El Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] obtuvo el propio programa [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] en la radio en el que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] da consejos a las personas que desean hablar sobre sus problemas. El formato es muy popular."
 panum.2626.f: "'Hola, Ethan. Estoy escuchando. '\ N'hi, Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName].' \ N'How Old ¿Eres tú? Siempre me están golpeando. Tengo un IQ 160. Estoy en el club de astronomía y odio los deportes. sin inspiración. La verdadera sorpresa aquí es que te pagan para repartir este jugo de globo. Gracias por tu llamada."
 panum.2626.g: "¡Espera, sé este espectáculo!"
