 panum.2301.t: "Tratamiento exitoso de [SCOPE.sCharacter('chosen_character').GetFullName]'s [SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')]" #NT!
 panum.2301.d: "El Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] ha tratado con éxito el [SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')] de [SCOPE.sCharacter('chosen_character').GetFullName]." #NT!
 panum.2301.f: ""No se preocupe, señor, este tratamiento seguro que funcionará. Lo he hecho al menos dos veces y sólo un paciente murió"." #NT!
 panum.2301.g: "¡Bien!" #NT!
  
 panum.2302.t: "Tratamiento neutral de los [SCOPE.sCharacter('chosen_character').GetFullName] y [SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')]" #NT!
 panum.2302.d: "El Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] ha tratado el [SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')] de [SCOPE.sCharacter('chosen_character').GetFullName] pero nada ha cambiado realmente." #NT!
 panum.2302.f: ""¡Realmente pensé que beber suficiente agua resolvería el problema!"" #NT!
 panum.2302.g: "Al menos no me dolió." #NT!
  
 panum.2303.t: "Tratamiento fallido del [SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')] de [SCOPE.sCharacter('chosen_character').GetFullName]" #NT!
 panum.2303.d: "El Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] ha tratado tan mal a [SCOPE.sCharacter('chosen_character').GetFullName] y a [SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')] que empeoró aún más la condición de [SCOPE.sCharacter('chosen_character').GetHerHis]." #NT!
 panum.2303.f: ""Esta es la tercera vez que sucede esta semana..."" #NT!
 panum.2303.g: "¡Esto no debería haber sucedido!" #NT!
  
 panum.2304.t: "Tratamiento fatal [SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')]" #NT!
 panum.2304.d: "El Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] lamentablemente causó la muerte del paciente durante el tratamiento [SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')]." #NT!
 panum.2304.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_fatal_flavor_text_type')]" #NT!
 panum.2304.g: "¡Una tragedia!" #NT!
  
 panum_foreign_medical_expedition_modifier: "Expedición médica al extranjero" #NT!
  
 panum.137.t: "La expedición quiere investigar la enfermedad" #NT!
 panum.137.d: "Una expedición extranjera ha llegado a las fronteras de nuestro país. Está formada principalmente por médicos, científicos y sus asistentes. Al parecer, quieren investigar la epidemia que se propaga." #NT!
 panum.137.f: "Las expediciones médicas pueden viajar a otros países para realizar investigaciones científicas sobre tratamientos de enfermedades y escribir descripciones de enfermedades para su país de origen. Los países anfitriones, a su vez, se benefician de esto porque los médicos examinan a los pacientes en las zonas epidémicas." #NT!
 panum.137.g: "Démosle la bienvenida a estos valientes hombres y mujeres." #NT!
  
 panum.2202.t: "Enfermedad antigua" #NT!
 panum.2202.d: "¡Nuestro Doctor ha aportado información valiosa al trabajo de nuestro Antropólogo!" #NT!
 panum.2202.f: "—... pero, por supuesto, si examinas esta parte de su cráneo, puedes ver que en realidad habían comenzado a sanar de sus heridas. —Entonces, ¿esa definitivamente no fue la causa de la muerte? —¡Lo más probable! Un golpe feo, pero no letal. Calculo que pasaron otros seis meses más o menos con vida antes de que otra herida los derribara, o tal vez la herida se agrave. —Hmmm. Fascinante. A juzgar por la naturaleza del golpe, pensé que probablemente fue algún tipo de... instrumento contundente. —Un garrote, lo más probable, o tal vez una herramienta con una piedra roma. Creo que esta costilla presenta la verdadera causa de la muerte. Observa el estrechamiento de los huesos, aquí y aquí. —¿Lesión? —Tuberculosis, lo más probable. Apostaría a que tu hombre murió después de años de luchar contra esta muerte blanca." #NT!
 panum.2202.g: "La ciencia interdisciplinaria sigue siendo la mejor ciencia." #NT!
 panum.2203.t: "Medicina extraña" #NT!
 panum.2203.d: "¡Con algo de tiempo libre juntos, nuestro Doctor y Arqueólogo han compartido sus investigaciones!" #NT!
 panum.2203.f: "—Ah, pero ahí es donde las cosas se ponen interesantes, doctor. Estos frascos vienen de Egipto y contienen lo que creemos que son muestras de medicina antigua. —Fascinante, fascinante. ¿Es este el aceite de momia? —... ¿No es el que se encuentra en los cuerpos y tiene propiedades curativas? ¿La resina que rodea sus envoltorios? —Oh, no, ¡para nada! La momia es un tipo de aceite que encuentran en la tierra, similar al petróleo. ¿Por qué? —... Creo que será mejor que examinemos más a fondo estos medicamentos. Hay todo tipo de tinturas. Por favor, échales un vistazo y volveré en un momento. Necesito deshacerme de... algo. —Bueno, parece que estos podrían haber sido perfumados y... ¿estás comiendo algo ahí dentro?" #NT!
 panum.2203.g: "...no te estás comiendo la momia, ¿verdad?" #NT!
 panum.2204.t: "¿Remedios herbales?" #NT!
 panum.2204.d: "Después de haber tenido tiempo para examinar sus hallazgos, nuestro Naturalista ha entregado plantas con propiedades potencialmente medicinales al consultorio de nuestro Médico." #NT!
 panum.2204.f: "—¡Ah, ahí estás! Estaba catalogando algunas de las muestras que trajimos de la última expedición botánica y encontré algunas que podrían interesarte. —¿Ah, sí? ¿Cómo es eso? —Algunas de ellas están relacionadas con plantas con propiedades medicinales conocidas, como combatir inflamaciones o fiebre. Algunas de ellas son completamente ajenas a nosotros, pero vienen con buenas palabras de los nativos y vale la pena investigarlas más a fondo. —La medicina herbaria no es una ciencia muy buena... pero nunca se sabe. Podría haber algo interesante en estas. Después de todo, ya sabes las maravillas que encontraron en la planta de amapola. —¡Ah, morfina! —¡Sí, sí! Haré que mis asistentes se pongan a trabajar en la preparación de algunas muestras en polvo para examinarlas más de cerca." #NT!
 panum.2204.g: "Creo que la hoja de coca es especialmente fascinante, doctor." #NT!
  
  panum_germ_theory_loc: "Current Theory: #V Germ#!"
  panum_miasma_theory_loc: "Current Theory: #V Miasma#!"
  
 panum_physician_achievement_successful_treatments_loc: "El Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] tiene experiencia en el tratamiento de pacientes y ha #o tratado con éxito a [GetPlayer.MakeScope.Var('panum_physician_var').GetVariable('panum_physician_successful_treatments_var').GetValue] pacientes#!." #NT!
 panum_physician_achievement_epidemiologist_loc: "\n[GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetSheHe|U] estudió enfermedades extensamente y se convirtió en un #o $panum_epidemiologist$#!." #NT!
 panum_physician_achievement_surgeon_loc: "\n[GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetSheHe|U] realizó muchas cirugías y por lo tanto se le considera un buen #o $panum_surgeon$#!." #NT!
 panum_physician_achievement_psychiatrist_loc: "El Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] ha estudiado extensamente la mente humana y es un #o renombrado $panum_psychiatrist$#!." #NT!
 panum_physician_achievement_military_physician_loc: "\nComo #o $panum_military_physician$#! [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetSheHe] ha visto los horrores de la guerra y sabe cómo tratar a la gente en circunstancias horribles." #NT!
 panum_physician_achievement_germ_theory_inventor_loc: "\nEl Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] ha inventado la #o Teoría de los Gérmenes#! que ya ha salvado miles de vidas." #NT!
 panum_physician_achievement_pneumothorax_inventor_loc: "\nUno de los mayores inventos de [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetHerHim] es un #o Dispositivo para inducir un neumotórax artificial#!. Esto produce un colapso de los pulmones, lo que puede ayudar a tratar la tuberculosis." #NT!
 panum_physician_achievement_thoracoplasty_inventor_loc: "\nGracias a sus habilidades quirúrgicas, el Doctor [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] inventó un #o Procedimiento que revolucionó la Cirugía Pulmonar llamado Toracoplastia#! y permitió así mejorar el tratamiento de los pacientes con Tuberculosis." #NT!
 panum_physician_achievement_attended_medical_congress_loc: "\n[GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetSheHe] participó en al menos un #o Congreso Médico#! y compartió [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetHerHis] ideas." #NT!
  
 panum_no_epidemic_corruption_modifier: "No a la corrupción epidémica" #NT!
 panum_measles_depression_modifier: "Depresión por sarampión" #NT!
 panum_sailor_quarantine_modifier: "El sarampión paraliza a los marineros" #NT!
  
 panum.600.t: "Epidemia de sarampión" #NT!
 panum.600.d: "Ha estallado una epidemia en uno de nuestros estados: #YELLOW ¡El sarampión#! está causando estragos en [SCOPE.sState('panum_disease_state').GetName]!" #NT!
 panum.600.f: "Al igual que la viruela, el médico persa Rhazes mencionó el sarampión en el siglo X y parece que se extendió por la región euroasiática durante toda la Edad Media. El sarampión fue endémico en Europa hasta el siglo XIX y adquirió mayor importancia a medida que aumentaba la urbanización. Una característica especial de Masenr es la erupción que comienza en la cara y el cuello y se extiende por todo el cuerpo en pocos días. Junto con la viruela, el sarampión se considera una de las enfermedades que afectó a gran parte de la población indígena de la India en el siglo XVI." #NT!
 panum.600.g: "Pero eso es sólo una enfermedad infantil inofensiva... ¿verdad?" #NT!
 panum.620.t: "La epidemia de sarampión termina" #NT!
 panum.620.d: "La epidemia de sarampión aparentemente ha terminado. Un último grupo de padres enterró a su hijo muerto." #NT!
 panum.620.f: "«Al igual que el sarampión, el amor es más peligroso cuando llega tarde en la vida.» -Lord Byron" #NT!
  
 panum.602.t: "La epidemia de sarampión alcanza los [SCOPE.sCountry('panum_infected_country').GetName]" #NT!
 panum.602.d: "Hemos recibido informes de que hoy se han registrado los primeros casos de sarampión en el [SCOPE.sCountry('panum_infected_country').GetName]. Las autoridades nos culpan de no haber hecho lo suficiente para evitar la propagación." #NT!
 panum.602.g: "No había manera de evitar esto." #NT!
 panum.603.t: "El sarampión mata a los niños" #NT!
 panum.603.d: "En [SCOPE.sState('panum_disease_state').GetName], el brote de sarampión fue mucho más grave de lo esperado. La epidemia se propagó especialmente entre los bebés y los niños pequeños y debilitó permanentemente a toda una generación." #NT!
 panum.603.f: "El sarampión siempre se ha considerado una enfermedad infantil, aunque también puede afectar a los adultos. Sus efectos más devastadores se manifiestan entre los 2 y 3 años de edad, cuando la tasa de mortalidad desciende rápidamente. En 1963, antes de que se inventara una vacuna, las estadísticas oficiales estimaban que cada año se producían 2 millones de muertes por sarampión en todo el mundo. Entre el 5 y el 10 por ciento de los casos de la enfermedad acababan en muerte." #NT!
 panum.603.g: "¿No existe cura para esta terrible enfermedad?" #NT!
 panum.604.t: "El sarampión paraliza a los marineros" #NT!
 panum.604.d: "Por razones misteriosas, el sarampión afectó especialmente a pescadores y marineros en [SCOPE.sState('panum_disease_state').GetName]. Las tasas de mortalidad son insignificantes, pero la pérdida de trabajo es notable en los criaderos de peces y entre los balleneros." #NT!
 panum.604.f: "Durante sus investigaciones en las Islas Feroe, Peter Panum descubrió que el sarampión también afectaba a los adultos, sobre todo en las poblaciones más aisladas. Las razones de ello permanecieron en la oscuridad durante mucho tiempo, pero en principio se observó que los pescadores y sus familias que vivían lejos de las ciudades más concurridas se veían especialmente afectados." #NT!
 panum.604.g: "¿Pero quién se hace a la mar ahora?" #NT!
 panum.605.t: "Clínica infantil para el sarampión" #NT!
 panum.605.d: "[SCOPE.sCharacter('panum_government_leader').GetFullName] ha señalado el elevado número de niños que padecen sarampión en [SCOPE.sState('panum_disease_state').GetName], sobre todo en las familias más pobres, donde la tasa de mortalidad es más elevada. El político desea financiar una clínica infantil para el sarampión y ha solicitado una donación pública." #NT!
 panum.605.f: ""Es una vergüenza ver a los buenos padres de [SCOPE.sState('panum_disease_state').GetName] a merced de esta terrible enfermedad. Los políticos deben actuar y asumir su responsabilidad. Durante demasiado tiempo, demasiadas personas han hecho muy poco. Un hospital infantil debería ayudar a proteger lo más valioso que tienen los padres. Ayudaremos. Se lo prometo. Mientras mi nombre sea [SCOPE.sCharacter('panum_government_leader').GetFullNameNoFormatting]... ¿qué quiere decir con que doy discursos electorales?"" #NT!
 panum.605.g: "Una iniciativa que vale la pena apoyar." #NT!
 panum.605.h: "Este partido sólo quiere explotar la enfermedad con fines políticos." #NT!
 panum.606.t: "Depresión por sarampión" #NT!
 panum.606.d: "'Los numerosos niños enfermos y muertos en [SCOPE.sState('panum_disease_state').GetName] han dejado su huella en muchos padres. Algunos hablan de numerosas personas que están en crisis vital.'" #NT!
 panum.606.f: ""La señora Miller tuvo que enterrar a su tercer hijo este mes. Es sólo una de las muchas madres que ahora no tienen hijos. El señor Miller, que regenta una panadería en la ciudad, ha cerrado su tienda durante varias semanas. Muchas familias de esta zona son como los Miller. No hay casi ningún clan que no haya perdido un hijo. Sin embargo, el fatalismo se ha ido convirtiendo en insatisfacción durante semanas. La gente de esta región se ha vuelto mucho más sensible a la posibilidad de que las circunstancias sigan empeorando. Mucha gente ahora culpa al gobierno de su miseria".\n\nArtículo del [SCOPE.sState('panum_disease_state').GetCityHubName] Herald" #NT!
 panum.606.g: "No es del todo incomprensible dada la situación." #NT!
  
 panum.622.t: "Incubación del sarampión" #NT!
 panum.622.d: "El Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] ha compilado una lista meticulosa de casos de sarampión que muestra bastante bien el período de incubación del sarampión." #NT!
 panum.622.f: "'No se puede negar que la fase de descamación puede ser infecciosa, pero hay que ser cauteloso al aceptar esta opinión, ya que en términos generales se podría sospechar lo contrario. Casi parece que, como no se podía concebir un período de latencia tan largo, se eligió una fase posterior de la enfermedad como la infecciosa. En los pueblos de Hove y Lobre, en Suderø, hacia el final de la epidemia, hubo un intervalo de más de catorce días entre generaciones del exantema en la misma casa, sin que yo pudiera demostrar una nueva infección externa; sin embargo, estos dos casos pueden explicarse por una infección que se transmitió durante la fase de convalecencia. A partir de los datos aquí presentados, creo que el período de incubación del sarampión puede estimarse con gran seguridad en unos catorce días, sin insistir, sin embargo, en que este intervalo es uno que no puede modificarse por circunstancias particulares, como, por ejemplo, un viaje; muchos factores hablan a priori en contra de un dictamen tan absoluto, así como la analogía con la incertidumbre de los períodos de latencia de otras enfermedades.' -Peter Panum" #NT!
 panum.623.t: "Singularidad del sarampión" #NT!
 panum.623.d: "En un nuevo paso intermedio, el Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] diferenció las diferentes formas de sarampión y no sólo señaló las diferencias con otras enfermedades similares como la viruela, la rubéola y el sarampión, sino que también destacó los síntomas únicos." #NT!
 panum.623.f: "'La literatura sobre el sarampión es insignificante e incompleta en comparación con la de otros exantemas agudos, como, por ejemplo, la escarlatina y la viruela. Aparte de algunos informes dispersos en las revistas relacionados con brotes aislados, sólo hay unas pocas monografías, varias de las cuales datan del siglo anterior. Esta fiebre exantemática, ciertamente desconocida para los médicos griegos y árabes, estaba tan insuficientemente diferenciada incluso en el siglo pasado que De Haën mantuvo la identidad del sarampión con la viruela, basándose en los síntomas, y los escritores anteriores a fines del siglo XVII describieron ambas enfermedades como pertenecientes a la misma familia.' -Peter Panum" #NT!
 panum.624.t: "Poblaciones vírgenes e inmunidad de por vida" #NT!
 panum.624.d: "El Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] ha podido demostrar recientemente de forma muy clara que cuando el sarampión afecta a una persona, no vuelve a aparecer. Por tanto, las poblaciones que nunca han estado expuestas a la enfermedad corren un riesgo especial." #NT!
 panum.624.f: "'En este sentido, es muy notable, sin embargo, que de las muchas personas mayores que aún viven en las Islas Feroe y que habían tenido sarampión en 1781, ninguna, según pude averiguar mediante una investigación cuidadosa, fue atacada por segunda vez. Yo mismo vi a noventa y ocho de esas personas mayores, que estaban exentas porque habían tenido la enfermedad en su juventud. Esto fue más notable porque una edad avanzada de ninguna manera disminuyó la susceptibilidad al sarampión, ya que, hasta donde yo sé, todas las personas mayores que no habían tenido sarampión en su vida anterior fueron atacadas cuando estuvieron expuestas a la infección; mientras que ciertas personas jóvenes, aunque constantemente expuestas, estaban exentas. Si la recuperación del sarampión sesenta y cinco años antes podía asegurar a las personas contraer la enfermedad una segunda vez, se podría suponer que se proporcionaría una protección aún mayor al haberse recuperado de ella un tiempo más corto antes' -Peter Panum" #NT!
  
 panum.700.t: "Epidemia de escarlatina" #NT!
 panum.700.d: "Ha estallado una epidemia en uno de nuestros estados: ¡la #YELLOW escarlatina#! está causando estragos en [SCOPE.sState('panum_disease_state').GetName]!" #NT!
 panum.700.f: "La escarlatina es conocida desde la antigüedad y fue bien descrita en el siglo XVII, en particular por Thomas Sydenham. Aunque la escarlatina aparentemente se volvió menos peligrosa en el siglo XVIII, volvió a atacar bajo una nueva forma en el siglo XIX. Pierre Fidèle Bretonneau, por ejemplo, afirmó que alrededor de 1800 no había conocido un solo caso mortal de escarlatina, mientras que en 1824 observó una epidemia en Tours con una mortalidad tan alta que la colocó a la par de la peste y el cólera. La escarlatina se acompaña de una erupción cutánea característica. A diferencia de la viruela o el sarampión, la escarlatina se caracteriza por una zona de las amígdalas hinchada y una lengua de color fresa." #NT!
 panum.700.g: "Todos los niños tienen que pasar por esto en algún momento. Ojalá." #NT!
 panum.720.t: "La epidemia de escarlatina llega a su fin" #NT!
 panum.720.d: "La epidemia de escarlatina que ha asolado nuestro país está abandonando poco a poco las ciudades y los pueblos. Innumerables padres respiran aliviados." #NT!
 panum.720.f: ""Es como la escarlatina: hay que superarla".\n\n"Entonces habría que inventar una forma de inocular el amor, como una vacuna". - León Tolstoi" #NT!
  
 panum.722.t: "Conocimiento antiguo" #NT!
 panum.722.d: "A través de un anticuario, [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] pudo encontrar varios libros antiguos que resumen descripciones de la escarlatina en el pasado y que también podrían ser útiles en el presente." #NT!
 panum.722.f: "No se puede decir con certeza si la escarlatina era conocida en la antigüedad o si se confundía con enfermedades similares como la difteria, el sarampión y la rubéola. Ya existen evidencias de una enfermedad similar a la escarlatina en Celso, Celio Aureliano, Arateo de Capadocia y Aecio de Amida. Se pueden encontrar descripciones similares en la región árabe-perisiana desde la Edad Media en adelante, en particular por Avicena, Ali Abbas y Rhazes. La primera descripción definitiva de la escarlatina es una descripción de Giovanni Filippo Ingrassia de 1553. Otra posición importante la ocupa el médico Daniel Sennert, también del siglo XVI. El nombre "Scarlatina" se remonta a Thomas Sydenham y su descripción de 1675. Aunque la descripción de Sydenham se considera autorizada, hay lagunas significativas en ella, y el término escarlatina también parece haber estado muy extendido en Inglaterra ya a mediados del siglo XVI." #NT!
 panum.723.t: "Síntomas de la escarlatina" #NT!
 panum.723.d: "El Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] ha avanzado en su descripción de la escarlatina y ha resumido los síntomas por primera vez." #NT!
 panum.723.f: "'Los pacientes sienten escalofríos y temblores, como en otras fiebres. Los síntomas, sin embargo, son moderados; después toda la piel se cubre de pequeñas manchas rojas, más gruesas que las del sarampión, así como más anchas, más rojas y menos uniformes. Estas duran dos o tres días y luego desaparecen. El paciente no sólo tiene una erupción, sino también inflamación de las amígdalas. Puede haber complicaciones como reumatismo e hidropesía.'\n\nUna carta del Doctor [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] a la Facultad de Medicina" #NT!
 panum.724.t: "A la escarlatina no le gusta la laringe" #NT!
 panum.724.d: "El Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] ha identificado las diferencias específicas entre las enfermedades escarlatina y difteria." #NT!
 panum.724.f: ""En la escarlatina, la inflamación se extiende por las amígdalas, el paladar y la faringe, y no se limita inicialmente a un solo punto, como en la difteria; y, en segundo lugar, la inflamación escarlatinosa de la faringe no tiene tendencia a extenderse a las vías respiratorias. En pocas palabras: a la escarlatina no le gusta la laringe".\n\nUna carta del Doctor [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] a la Facultad de Medicina" #NT!
  
 panum_plague_quarantine_modifier: "Cuarentena por peste" #NT!
 panum_plague_hospitals_modifier: "Casas de la plaga" #NT!
 panum_plague_burn_everything_modifier: "¡Quemalo todo!" #NT!
 panum_plague_rat_killer_modifier: "¡Matadlo todo!" #NT!
 panum_plague_loss_of_trust_modifier: "Pérdida de confianza" #NT!
  
 panum.800.t: "El regreso de la plaga" #NT!
 panum.800.d: "Desde hace varios años se rumorea que la peste ha regresado a algunas partes de nuestro país. Anteriormente, esto se limitaba a distritos rurales remotos. Sin embargo, con el brote en [SCOPE.sState('panum_disease_state').GetName], finalmente está claro: ¡la peste está extendiendo nuevamente sus dedos nudosos!" #NT!
 panum.800.f: "La tercera pandemia de peste (después de la peste de Justiniano en el siglo VI y la "muerte negra" en el siglo XIV) comenzó en China a finales del siglo XIX. Se cree que la pandemia se originó en Yunnan, donde se produjo un brote ya en 1792, en 1855 y de nuevo en 1866. Un brote en la vecina ciudad de Cantón a partir de enero de 1894 mató a 80.000 personas. A partir de marzo de 1894, los científicos y médicos británicos en Hong Kong se dieron cuenta del brote. Después de las olas de cólera de las décadas anteriores, se esperaba que la ola de peste causara muchas muertes, especialmente en China y la India, y en última instancia condujera a la inestabilidad estatal. Se estima que costaría 15 millones de vidas en todo el mundo." #NT!
 panum.800.g: "¡Imposible! ¡La peste es una enfermedad del pasado olvidado!" #NT!
  
 panum.820.t: "La epidemia de peste termina" #NT!
 panum.820.d: "La terrible peste, uno de los peores azotes de la humanidad, ha abandonado nuevamente nuestro país. Esperemos que vuelva a donde debe estar: al abismo de la historia." #NT!
 panum.820.f: "«Pero ¿qué significa la peste? Es la vida, eso es todo.» -Albert Camus" #NT!
  
 panum.802.t: "La plaga se extiende a [SCOPE.sCountry('panum_infected_country').GetName]" #NT!
 panum.802.d: "Ahora se están registrando casos de peste también fuera de nuestras fronteras. Al parecer, las autoridades no han podido contener la enfermedad. El embajador de Estados Unidos ha lanzado graves acusaciones contra nosotros." #NT!
 panum.802.g: "A la larga, la plaga llega a todos..." #NT!
 panum.803.t: "Epidemia de peste" #NT!
 panum.803.d: "Ha estallado una epidemia en uno de nuestros estados: ¡La #YELLOW Plaga#! está causando estragos en [SCOPE.sState('panum_disease_state').GetName]!" #NT!
 panum.803.g: "La Peste Negra está llamando." #NT!
 panum.804.t: "La peste: una tercera ola" #NT!
 panum.804.d: "Nos llegan noticias inquietantes desde [SCOPE.sCountry('panum_plague_country').GetName]. Hace unas semanas se produjo allí una violenta epidemia. Los médicos están preocupados: se trata de la infame peste." #NT!
 panum.804.g: "Deberíamos organizar una expedición médica para prepararnos para esto." #NT!
 panum.805.t: "Cuarentena por peste" #NT!
 panum.805.d: "La situación en [SCOPE.sState('panum_disease_state').GetName] amenaza con salirse de control. Políticos influyentes, jefes de autoridades y particulares piden una cuarentena para evitar que la plaga se siga propagando. Se trata sobre todo de personas que no viven en [SCOPE.sState('panum_disease_state').GetName]." #NT!
 panum.805.f: "Las cuarentenas estrictas y extensas ya habían dado buenos resultados en la Edad Media. De hecho, el término cuarentena se remonta a la palabra italiana 40 y, al parecer, se utilizó por primera vez en tiempos de peste. La República de Venecia, en particular, como nación comercial con un gran tráfico marítimo, era conocida por esta medida, ya que las ciudades portuarias y comerciales se veían especialmente afectadas por las epidemias." #NT!
 panum.805.g: "Toda la zona debería ser puesta en cuarentena." #NT!
 panum.805.h: "No deberíamos dramatizar demasiado." #NT!
 panum.806.t: "Casas de la plaga" #NT!
 panum.806.d: "Las autoridades locales de [SCOPE.sState('panum_disease_state').GetName] han propuesto la creación de casas de apestosos para aislar mejor a la población sana de la enferma. Esto afectaría especialmente a las clases más pobres, que no pueden huir como los ricos." #NT!
 panum.806.f: "En las epidemias de peste se utilizaba una casa de la peste para atender a los enfermos. Dado que en el momento álgido de estas oleadas de enfermedades, a finales de la Edad Media y principios de la Edad Moderna, la epidemia se consideraba incurable y, por tanto, solo suponía un alivio gracias a la asistencia médica, las casas de la peste se concibieron principalmente para aislar a los enfermos de la población sana. Para ello, las casas de la peste, similares a los leprosorios, se construían normalmente fuera o en las afueras de las ciudades. Otro tipo de casa de la peste estaba destinada a servir de prevención en el sentido de un periodo de cuarentena. Las personas en cuyo entorno inmediato se había producido la peste eran llevadas a la casa de la peste, de la que solo se les permitía salir si resultaba que no estaban infectadas." #NT!
 panum.806.g: "Es sólo por su propio bien, aunque no quieran." #NT!
 panum.806.h: "Esto sólo provocaría malestar." #NT!
 panum.807.t: "El doctor de la peste" #NT!
 panum.807.d: "El médico jefe de uno de nuestros hospitales de peste en [SCOPE.sState('panum_disease_state').GetName] ha adquirido tanta experiencia en este campo que podría ser de valiosa ayuda a nivel nacional." #NT!
 panum.807.f: "¡Déjenme pasar! Soy médico y sé exactamente cómo tratar esta enfermedad." #NT!
 panum.807.g: "Darle al médico una posición de alto rango como médico." #NT!
 panum.808.t: "La huida de los ricos" #NT!
 panum.808.d: "El número de emigrantes en [SCOPE.sState('panum_disease_state').GetName] aumenta cada día. En particular, las familias que pueden permitírselo tratan de escapar de la peste. Existe un gran resentimiento entre aquellos que no pueden permitirse tal escape. Otros advierten que esto hará que la peste se extienda más." #NT!
 panum.808.f: "'Algunos, quizás los más sanos en su juicio, como también los más duros en su temperamento, afirmaron que no había medicina para la enfermedad superior o igual en eficacia a la huida; siguiendo esta prescripción, una multitud de hombres y mujeres, negligentes con todo excepto con ellos mismos, abandonaron su ciudad, sus casas, sus propiedades, sus parientes, sus bienes, y se fueron al exilio voluntario, o emigraron a las zonas rurales, como si Dios al visitar a los hombres con esta peste en castigo por sus iniquidades no los persiguiera con Su ira, dondequiera que estuvieran, sino que quisiera la destrucción solamente de aquellos que permanecieran dentro del circuito de los muros de la ciudad; o considerando, tal vez, que ahora era el momento de que todos huyeran de ella, y que su última hora había llegado.' -Bocaccio" #NT!
 panum.809.t: "Montones de cadáveres" #NT!
 panum.809.d: "El número de muertes por la peste alcanzó tales proporciones que fue difícil mantenerla bajo control. Algunos ya recomiendan la quema pública y las fosas comunes." #NT!
 panum.809.f: "En el momento álgido de la peste de 1894 en Hong Kong, las admisiones hospitalarias alcanzaron un promedio de 80 por día, y la cifra máxima de muertes llegó a más de 100 por día. A través del tráfico marítimo, la epidemia se extendió al resto del país después de 1894 y finalmente se extendió a la India bajo el Imperio Británico, donde murieron unos diez millones de indios. Las principales medidas preventivas fueron la creación de hospitales para enfermos de peste y el despliegue de personal médico para tratar y aislar a los enfermos de peste; la realización de operaciones de búsqueda casa por casa, el descubrimiento y traslado de enfermos de peste, y la limpieza y desinfección de las casas y zonas infectadas; y la creación de cementerios designados y la designación de una persona responsable del transporte y el entierro de los muertos por la peste." #NT!
 panum.810.t: "La peste negra se cobra su precio" #NT!
 panum.810.d: "La epidemia de peste está haciendo estragos en [SCOPE.sState('panum_disease_state').GetName] estos días. Se han registrado numerosas muertes, incluso más de lo habitual." #NT!
 panum.810.f: "La enfermedad permaneció localizada en el suroeste de China durante varios años antes de propagarse. En la ciudad de Cantón, a partir de enero de 1894, la enfermedad había matado a 80.000 personas en junio. El tráfico fluvial diario con la cercana ciudad de Hong Kong propagó rápidamente la plaga allí, matando a más de 2.400 personas en dos meses durante la plaga de Hong Kong de 1894." #NT!
 panum.810.g: "¡Nadie escapa de Grim Reaper!" #NT!
 panum.811.t: "¡Quemalo todo!" #NT!
 panum.811.d: "La limpieza y desinfección de las casas de los afectados suele ser la única forma de detener la propagación de la peste. Esto suele incluir la quema de todo lo que entre en contacto con un paciente con peste." #NT!
 panum.811.f: "“Digo, pues, que la energía del contagio de la susodicha peste era tal que no sólo se propagaba de hombre a hombre, sino que, lo que es mucho más sorprendente, se observaba con frecuencia que las cosas que habían pertenecido a un enfermo o muerto de la enfermedad, si eran tocadas por algún otro ser vivo, no de la especie humana, eran la causa, no sólo de la enfermedad, sino de una muerte casi instantánea. De lo cual mis propios ojos (como dije un poco antes) tuvieron conocimiento, un día entre otros, por la siguiente experiencia. Los harapos de un pobre hombre que había muerto de la enfermedad estaban esparcidos por la calle, dos cerdos llegaron allí y, después de jugar no poco con sus hocicos, como es su costumbre, tomaron los harapos entre sus dientes y los arrojaron de un lado a otro sobre sus mejillas; con lo cual, casi inmediatamente, dieron unas vueltas y cayeron muertos, como si estuvieran envenenados, sobre los harapos que en un mal momento habían tocado”. -Boccaccio" #NT!
 panum.811.g: "¡Quema ropa, muebles e incluso casas si es necesario!" #NT!
 panum.811.h: "Esto no es necesario" #NT!
 panum.812.t: "¡Matadlo todo!" #NT!
 panum.812.d: "Desde el principio se sospechó que las ratas podían ser portadoras de la peste. En el [SCOPE.sState('panum_disease_state').GetName] se hace un llamamiento a erradicar específicamente a los animales y a los parásitos para evitar la propagación de la enfermedad." #NT!
 panum.812.f: "Tras la tercera pandemia de peste, las ciudades europeas crearon auténticos "cuerpos antiratas" que se encargaron específicamente de buscar y matar a los animales o sumergirlos en cubos de gasolina. Sin embargo, a menudo se propuso que otras fuentes de peste, como los parásitos infectados específicos de los humanos o que pican a los humanos, como las pulgas y los piojos, fueron importantes para la transmisión en Europa durante la tercera pandemia. El bajo número de ratas infectadas con peste encontradas durante los brotes europeos sugiere que desempeñaron un papel relativamente menor en la transmisión de la peste. Sin embargo, algunos investigadores han argumentado que era poco probable que las autoridades encontraran ratas infectadas con peste porque se esconderían." #NT!
 panum.812.g: "Exterminar las ratas." #NT!
 panum.812.h: "Esto es demasiado costoso." #NT!
 panum.813.t: "Pérdida de confianza" #NT!
 panum.813.d: "Muchos habitantes de [SCOPE.sState('panum_disease_state').GetName] consideran escandalosa la situación sanitaria actual. Las numerosas muertes y el evidente fracaso del gobierno han provocado una pérdida generalizada de confianza en el gobierno." #NT!
 panum.813.f: "La epidemia de peste del siglo XIX causó un gran número de víctimas, sobre todo en China, lo que quebrantó gravemente la confianza en el gobierno y en el Mandato Celestial de los emperadores Qing." #NT!
 panum.813.g: "¡Entonces haz tu desorden solo!" #NT!
  
 panum.822.t: "La peste negra" #NT!
 panum.822.d: "Utilizando varias fuentes históricas, el Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] pudo demostrar que la nueva ola de peste es en realidad una enfermedad que corresponde a la Peste Negra de la Edad Media." #NT!
 panum.822.f: "El descubrimiento de la propagación de la peste en la India tuvo una importancia decisiva en la concepción de la peste en su sentido actual como enfermedad moderna. En un principio, se pensó que la enfermedad sólo se propagaba por un único medio. Ahora, la investigación se ha ampliado para incluir una gran cantidad de roedores y una gran cantidad de especies de pulgas. La elevada mortalidad en las colonias condujo a un aumento de los esfuerzos de investigación para trazar un mapa de las características de la epidemia. No se cuestionó el hecho de que siempre se tratara de la peste como punto de partida. A la enfermedad se le dio el término histórico de peste y se supuso la identidad de la peste medieval con la peste investigada en la India." #NT!
 panum.823.t: "Temporada de plagas" #NT!
 panum.823.d: "El Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] ha revisado todos los registros. Ya sea en esta epidemia o antes, en el pasado cercano o lejano: no hay epidemias de peste en invierno. No está claro por qué ocurre esto, pero podría desempeñar un papel en la búsqueda de las razones del brote de la enfermedad." #NT!
 panum.823.f: "'Así termina este año... Es cierto que hemos pasado por una gran melancolía debido a la gran plaga, y yo he pagado mucho por ello, manteniendo a mi familia mucho tiempo en Woolwich, y a mí y a otra parte de mi familia, mis empleados, a mi cargo en Greenwich... Pero ahora la plaga ha disminuido casi a nada... Pero muchos de los que conozco muy bien han muerto. Sin embargo, para nuestra gran alegría, la ciudad se llena rápidamente y las tiendas comienzan a abrir de nuevo. Ruego a Dios que continúe la disminución de la plaga, ya que eso mantiene a la Corte alejada del lugar de negocios, y así todo se va al traste en lo que respecta a los asuntos públicos, ya que a esta distancia no piensan en ello.' -Samuel Pepys" #NT!
 panum.824.t: "Peste bubónica y peste neumónica" #NT!
 panum.824.d: "El Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] pudo demostrar que existe más de una forma de peste." #NT!
 panum.824.f: "Por peste se entiende generalmente la peste bubónica. El periodo de incubación es de unas horas a siete días. Los síntomas son fiebre, dolor de cabeza y de cuerpo, una fuerte sensación de malestar y mareos. Más tarde aparecen alteraciones de la conciencia. El nombre de peste bubónica proviene de las protuberancias muy dolorosas e hinchadas que aparecen en el cuello, las axilas y las ingles. La peste neumónica es mucho más rara. Es probable que sea similar a la gripe, aunque su capacidad de propagación es mucho menor. La propagación es tan específica que solo puede convertirse en una epidemia en circunstancias especialmente favorables. En primer lugar, las fuentes de infección son raras. Solo una pequeña proporción de la población infectada por la peste contrae la peste neumónica, por ejemplo en el caso de la peste bubónica y la resistencia débil." #NT!
  
  
 panum.241.t: "El experimento del conejo" #NT!
 panum.241.d: "El Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] propone un experimento atrevido que, en última instancia, demostrará que la tuberculosis es contagiosa. Se trata de una inoculación y de muchos conejitos muertos." #NT!
 panum.241.f: "'Para mi primer experimento, compré una pareja de lindos conejos de tres semanas de edad con el propósito de determinar la contagiosidad de la tuberculosis. Rocié uno de ellos con extracto tuberculoso del tejido de un paciente con tuberculosis que había muerto 33 horas antes. Repetí el procedimiento dos veces. Después de unos días diseccioné los animales y descubrí que el conejo estaba infectado con tuberculosis.\n\nUn mes después repetí el experimento con tres hermosos conejitos. Repetí el procedimiento de nuevo, añadiendo más tarde un conejo. Luego diseccioné uno de los conejos cada día durante cuatro días consecutivos. Todos ellos sufrieron tuberculosis, aunque en cuatro etapas diferentes de la enfermedad. Sólo había inoculado al primero.\n\nEn mi tercer intento, adquirí cuatro parejas de conejos jóvenes y lindos, de tres meses de edad...'\n\nDel folleto experimental del Doctor [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] 'La causa y la naturaleza de la tuberculosis'" #NT!
 panum.241.g: "¡Detengan estos terribles experimentos con animales!" #NT!
 panum.241.h: "Repitamos el experimento para estar seguros." #NT!
 panum.241.i: "¡Un tercer experimento con conejos para la ciencia!" #NT!
 panum.241.j: "[GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetSheHe|U] puede matar tantos conejos como sea posible para probar la teoría." #NT!
  
 panum.261.t: "Neumotórax artificial" #NT!
 panum.261.d: "El doctor [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] ha inventado un dispositivo que colapsa artificialmente los pulmones y podría ayudar a combatir la tuberculosis." #NT!
 panum.261.f: "Con la ayuda de su hermano, Carlo Forlanini diseñó y construyó un dispositivo sencillo capaz de administrar gases por vía intrapleural. La presencia de gas en el líquido intrapleural provocó el colapso del pulmón, creando así un neumotórax artificial. Después de haber construido el dispositivo, Forlanini intentó tratar dos casos de tuberculosis induciendo un neumotórax en los dos pacientes y obtuvo resultados positivos. Con el paso de los años, la técnica de Forlanini se fue desarrollando y mejorando, aumentando así la tasa de éxito del procedimiento. El neumotórax artificial continuó como tratamiento hasta la introducción de la estreptomicina." #NT!
 panum.262.t: "Toracoplastia" #NT!
 panum.262.d: "Gracias a sus habilidades quirúrgicas, el Doctor [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] inventó un procedimiento que revolucionó la cirugía pulmonar y permitió así mejorar el tratamiento de los pacientes con tuberculosis." #NT!
 panum.262.f: "La toracoplastia es una intervención quirúrgica en la que se extirpan costillas o partes de costillas de un lado del tórax para colapsar el pulmón o partes del mismo. Este procedimiento se remonta a Edouarde de Cérenville y se utilizaba principalmente para tratar la tuberculosis pulmonar, pero luego perdió importancia con la introducción de antibióticos eficaces." #NT!
 panum.263.t: "¡El Doctor lo hizo de nuevo!" #NT!
 panum.263.d: "Para demostrar una vez más el carácter contagioso de la tuberculosis, el Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] volvió a matar a innumerables conejos adorables." #NT!
 panum.263.f: ""De las cuatro parejas que adquirí esta vez, maté inmediatamente al primer animal de la primera pareja. No presentaba ninguna lesión en los pulmones".\n\nDel folleto experimental del doctor [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] "La causa y la naturaleza de la tuberculosis"" #NT!
 panum.263.g: "Se trata de salvar vidas humanas." #NT!
 panum.263.h: "Este médico tiene un problema grave." #NT!
  
