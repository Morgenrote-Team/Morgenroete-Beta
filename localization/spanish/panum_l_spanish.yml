 je_panum_medical_techniques_project: "Introducir técnicas médicas"
 je_panum_medical_techniques_project_reason: "El objetivo del médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] es difundir la última tecnología médica en el [GetPlayer.GetName]. La rapidez con que se lleva a cabo este proceso depende de los rasgos y la experiencia de caracteres [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]. Después de completar la reforma médica, nuestra nación recibirá un mejor modificador para reemplazar el anterior. En algunos casos, un [concept_panum_physician] puede desarrollar sus propios inventos que revolucionen la historia de la medicina."
 panum_medical_techniques_advance_tt: "Las técnicas médicas en [GetPlayer.GetName] están mejorando por un nivel"
 panum.2401.t: "Vacunación"
 panum.2401.d: "La introducción de un programa de vacunación general se encontró inicialmente con escepticismo entre la población, pero después de que el médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] visitó varias provincias del país y demostró el procedimiento, la mayoría de los pacientes se han acostumbrado."
 panum.2401.f: "Había habido cierta resistencia a la idea de una campaña de vacunación, al menos al principio. Las madres preocupadas con sus hijos asustados, los viejos caballeros marchitaron que eran escépticos de esta nueva maravilla, el muy piadoso que temía que la ciencia manipulara algo más allá de su comprensión. La educación resolvió esto, explicaciones de cómo funcionó, por qué, pero mucho más que eso fueron los resultados. Los niños que se quedaron con su vista y salud, y no con las horribles consecuencias de una de las enfermedades más mortales que la humanidad había encontrado. Pocos debían convencerse cuando los vieron libres de cicatrices y llenos de vida."
 panum.2401.g: "¡Esta es una revolución médica!"
 panum.2401.h: "Nuestros estándares médicos e higiene están aumentando."
 panum.2402.t: "Anestesia"
 panum.2402.d: "El médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha demostrado el nuevo método de anestesia en varias clínicas. Ahora se considera el método estándar para operaciones particularmente desagradables."
 panum.2402.f: "'Zzz'."
 panum.2402.g: "Operaciones médicas sin conciencia? ¿Está permitido eso?"
 panum.2403.t: "Jeringas y pinzas"
 panum.2403.d: "El nuevo equipo médico al que el médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha introducido lleva algunos acostumbrados, pero ahora son estándar en el consultorio de cada médico."
 panum.2403.f: "'¿Qué tipo de herramienta es esa, doctor?' 'No es una herramienta, sino una jeringa. Puede inyectar fluido con él. '\ N'y eso es para cirugía dental, ¿tomo? ¿Y ese es un nuevo bisturí?"
 panum.2403.g: "La profesionalización en este campo es simplemente sorprendente."
 panum.2404.t: "Esterilización"
 panum.2404.d: "¡Al haber probado con éxito la importancia de la esterilización, el médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha hecho que sea una práctica estándar para todos los médicos en [GetPlayer.GetName] lavarse las manos y limpiar sus herramientas!"
 panum.2404.f: "'Por supuesto, todavía hay aquellos que creen que estas prácticas son innecesarias, y muchos de ellos serán caballeros aprendidos que han salvado muchas vidas antes. A estos hombres sagrados, digo esto: escuche la evidencia. El descubrimiento de la teoría de los gérmenes ha demostrado que la enfermedad nace de una criatura microscópica, que podría destruirse mucho antes de la infección, salvando vidas que de otro modo podrían perderse. No es mayor esto que en la sala de maternidad del hospital más grande de [ROOT.GetCountry.GetCapital.GetCityHubName], donde la tasa de mortalidad para las nuevas madres se redujo tan en gran medida del 18.3% a solo 2.2% un solo mes después."
 panum.2404.g: "¿Quién sabía que lavarse las manos después de tocar personas enfermas era tan importante?"
 panum.2404.h: "¡Ah, entonces un médico tiene otra razón para una botella de liqour!"
 panum.2404.i: "Mmm. Esto parece una excusa conveniente ..."
 panum.2405.t: "Registros médicos"
 panum.2405.d: "El médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha modernizado en gran medida la estadía del paciente, ya sea en el consultorio del médico o en el hospital, con un mejor registro y la creación de registros médicos."
 panum.2405.f: "Un registro médico describe la documentación sistemática del historial médico y la atención de un solo paciente a lo largo del tiempo dentro de la jurisdicción de un proveedor de atención médica particular. El historial médico es un registro longitudinal de lo que le ha sucedido al paciente desde su nacimiento. Nata las enfermedades, enfermedades mayores y menores, así como puntos de referencia de crecimiento. Le da al médico una idea de lo que ha sucedido antes al paciente. Como resultado, a menudo puede dar pistas sobre el estado actual de la enfermedad. El historial médico incluye varios subconjuntos como antecedentes quirúrgicos, medicamentos y alergias médicas, hábitos o antecedentes de inmunización. Dentro del registro médico, los encuentros médicos individuales están marcados por sumas discretas del historial médico de un paciente por un médico, enfermera practicante o asistente médico y pueden tomar varias formas. Cuando un paciente es hospitalizado, las actualizaciones diarias se ingresan en el registro médico que documenta cambios clínicos."
 panum.2405.g: "Estadísticas, matemáticas, burocracia y medicina - ¡Finalmente unido!"
 panum.2406.t: "Introducción de la ambulancia"
 panum.2406.d: "Hace unos días, un emprendedor rico en [ROOT.GetCountry.GetCapital.GetCityHubName] donó generosamente un vehículo nuevo al hospital local: la primera ambulancia autopotente en todo [GetPlayer.GetName]"
 panum.2406.f: "'... y allí lo vi. Pintado de un blanco brillante y orgullosamente estampado con una cruz, la nueva ambulancia no necesitaba el alboroto de los caballos o la fuerza de los hombres, sino que llevaba el poder de su propio motor. Por primera vez, los hombres y mujeres heridos en una mayor necesidad de ayudante podrían entregarse a las comodidades y el cuidado del hospital a la velocidad, algo que seguramente salvará la vida de innumerables almas que de otro modo podrían estar perdidas. Se agitó mi corazón para verlo, porque aquí, lo mejor del hombre, el amor que podría soportar por extraños, estaba en exhibición para que todos lo vieran."
 panum.2406.g: "¡Magnífico! Ahora, solo necesita una sirena ..."
 panum.2406.h: "¡Excelente! ¡Nuestros hospitales harán un gran uso de estos!"
 panum.2407.t: "La ambulancia aérea"
 panum.2407.d: "Las noticias acaban de llegar a la capital de algo sorprendente: ¡un piloto acaba de volar a una mujer en trabajo de parto desde el campo rural hasta un hospital, el primer vuelo médico en la historia de [GetPlayer.GetName]!"
 panum.2407.f: "'... Por supuesto, fue bastante difícil concentrarse. Un avión no tiene asientos para muchos, ya sabes, y casi se puede escuchar el llanto de trabajo sobre el sonido de la hélice y el motor. Por supuesto, esos no son importantes en comparación con la escritura en sí: no hay un alma en esta tierra que podría rechazar los gritos de una mujer necesitada, por lo que cuando se puso de parto en los terrenos de visualización, hice lo que cualquier alma buena haría, y la entregó tan rápidamente como pude a las manos calificadas y capaces de un hospital. Me dijeron que habría sido un peligroso nacimiento de la recámara, pero estar allí tan pronto hizo posible que el médico ajustara la posición del niño antes de un nacimiento saludable y natural."
 panum.2407.g: "¡Así que los bebés realmente vienen por aire!"
 panum.2407.h: "¡Un suspiro de alivio, para las madres en todas partes!"
 panum.52.l: "La epidemia de sarampión en [SCOPE.sCountry('panum_measles_country_scope').GetName]."
 panum.52.n: "La epidemia de la peste en [SCOPE.sCountry('panum_plague_country_scope').GetName]."
 panum.52.o: "La epidemia de la difteria en [SCOPE.sCountry('panum_diphteria_country_scope').GetName]."
 panum.52.p: "La epidemia de polio en [SCOPE.sCountry('panum_polio_country_scope').GetName]."
 country_panum_surgical_treatment_success_chance_mult: "Oportunidad de éxito del tratamiento quirúrgico"
 country_panum_psychological_treatment_success_chance_mult: "Oportunidad de éxito del tratamiento psicológico"
 panum.641.t: "Una enfermedad notificable"
 panum.641.d: "El médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha escrito una carta urgente a las autoridades para que dejen de tratar el sarampión como una enfermedad benigna y lo conviertan en una enfermedad reportable."
 panum.641.f: "'He tenido que escuchar acusaciones de colegas, incluso colegas muy influyentes en los cuerpos estatales y universitarios más altos, que estaba exagerando el peligro que plantea el sarampión. Incluso fui acusado de hacer que el problema de sarampión sea más grande de lo que era solo para mejorar mi posición. Es cierto que la tasa de mortalidad para el sarampión está entre 2 y 5 por ciento. Pero si solo asumimos que alrededor de 2 de cada 100 personas mueren por sarampión, entonces en un país de 10 millones, eso significa varios miles de muertes. Hay millones de muertes en todo el mundo que podrían evitarse con simples medidas de protección. ¿No es mejor si todos prestamos un poco más de atención y seguimos las reglas para salvar la vida de las personas? ¿Queremos cometer los mismos errores que las mujeres que recientemente han dado a luz y la arrogancia de los médicos al no lavarse las manos, a pesar de que es una pequeña inversión de tiempo con un gran impacto?"
 panum.641.g: "Las cosas pequeñas pueden tener un gran impacto."
 panum.642.t: "Infecciones animales con sarampión"
 panum.642.d: "En un experimento animal altamente publicitado, el médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] infectó monos con sarampión."
 panum.642.f: "'En vista de la gran importancia del sujeto, y de la aparente insensibilidad de otros animales, nos pareció altamente deseable presentar la cuestión de la receptividad de los monos a la infección de la sarampión a la prueba adicional. Puede mostrar una reacción febril definitiva que se asemeja al curso de la temperatura en algunos tipos de sarampión en el sujeto humano, con o sin un exantema generalizado. Los detalles de nuestro trabajo se darán en un artículo ahora en preparación."
 panum.642.g: "Esto ayudará a encontrar un tratamiento exitoso."
 panum.642.h: "None"
 panum.643.t: "Una enfermedad fluctuante de edad"
 panum.643.d: "El médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha revisado varios casos de enfermedad en [SCOPE.sState('panum_disease_state').GetName] y ha reconocido diferencias significativas en la mortalidad del paciente."
 panum.643.f: "'El sarampión se considera una enfermedad infantil inofensiva. Sin embargo, mi investigación ha demostrado que esto solo es cierto cuando los niños tienen edad de jardín de infantes. En contraste, la mortalidad es particularmente alta en niños entre las edades de 6 meses y 3 años. Después de eso, la mortalidad cae bastante rápido. Although measles in adults is considered harmless, reports from Ludvig Panum from the Faroe Islands have shown that it is better if immunization occurs in childhood - experienced fishermen also report a severe course of the disease and even death.'\n\nFrom the journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [TimeKeeper.GetCurrentDate.Format('y')]"
 panum.643.g: "Entonces hay grupos de riesgo especiales."
 panum.644.t: "Muy contagioso"
 panum.644.d: "Durante una visita a una escuela en [SCOPE.sState('panum_disease_state').GetName], el médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] pudo ver para [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself] que una vez que la enfermedad se ha roto, se propaga casi imparable."
 panum.644.f: "'Gracias por venir, doctor' '. Están de mi lado, señorita. ¿Cuántos casos de sarampión tiene la escuela ahora? Ayer había 35, pero ya deberíamos haber superado los 40 años."
 panum.644.g: "Preocupante."
 panum.645.t: "Estornudas y tos"
 panum.645.d: "El médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] recomienda medidas de cuarentena como las recomendadas para gripe o tuberculosis para limitar el sarampión."
 panum.645.f: "'El sarampión no se percibe como una enfermedad respiratoria, pero mis sospechas se han confirmado que esta es la única forma de detener su propagación. El sarampión, una de las enfermedades humanas más contagiosas, aparentemente se transmite mediante infección de gotas. Hay informes de que las personas en la habitación de una persona enferma se han infectado a pesar de que han estado fuera de la habitación durante dos horas. Las secreciones aparentemente infecciosas permanecen contagiosas más tarde. '\ N \ nfrom the Journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [TimeKeeper.GetCurrentDate.Format('y')]"
 panum.645.g: "Afortunadamente, estos son métodos bien conocidos."
 panum.646.t: "Antibióticos"
 panum.646.d: "El médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ve la posibilidad de reducir algunos de los efectos secundarios del sarampión en algunos antibióticos nuevos."
 panum.646.f: "'El hecho de que el sarampión a menudo no se tome en serio como una enfermedad también se debe al hecho de que a menudo no tiene más efectos secundarios. Desafortunadamente, este no siempre es el caso. Las enfermedades secundarias, como las infecciones en el oído o los pulmones, a menudo han inclinado la balanza entre un curso leve, grave y fatal. Los antibióticos no pueden curar el sarampión, pero pueden quitarle el horror."
 panum.646.g: "¡Obtenga más antibióticos!"
 panum.646.h: "Estos hallazgos deberían ayudar en la búsqueda del patógeno real."
 panum.647.t: "Estadística"
 panum.647.d: "El médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] se destacó particularmente en el registro estadístico de los casos de sarampión, el procesamiento de hogares infectados y la evaluación de los datos."
 panum.647.f: "'En una investigación meticulosa sobre los datos disponibles de los últimos años, examiné la mortalidad de los pacientes con sarampión en 22 países y llegué a las siguientes conclusiones:' \ n \ nchile 4.84%, Hungría 4.43%, Australia 0.24%, Escocia 0.35%, España 3.85%, Italia, Inglaterra y Wales 2.91%, USA 1.08%. En los países donde el sarampión era endémico, los brotes epidémicos ocurren cada tres o cinco años después de la renovación de la población. Posteriormente, se han informado tasas mucho más altas, que alcanzan el 10%, particularmente en las Islas del Pacífico y África."
 panum.647.g: "Útil."
 panum.647.h: "El médico tiene talento, [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] debe profundizar los estudios [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]."
 panum.648.t: "Multiplicación"
 panum.648.d: "El médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha publicado cifras sorprendentes sobre la propagación y la infección del sarampión."
 panum.648.f: "'El sarampión es extremadamente transmisible y se estima que el 90% de las personas no inmunes expuestas a un individuo infeccioso contraerán la enfermedad. Los modelos matemáticos estiman el número reproductivo básico en 12-18; Ese es el número promedio de infecciones secundarias que siguen una sola introducción a una población susceptible. Es extremadamente contagioso: nueve de cada diez personas que no son inmunes y comparten espacio vital con una persona infectada serán infectadas."
 panum.648.g: "Lo que anteriormente era reconocido por la percepción ahora ha sido probado por la ciencia."
 panum.649.t: "Infección sin síntomas"
 panum.649.d: "Después de algunas observaciones en el sitio, el médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] suponía razonable que el sarampión también es transmitido por pacientes asintomáticos, incluso antes de que aparezcan signos externos."
 panum.649.f: "'La alta prevalencia del sarampión es un fenómeno bien conocido y el riesgo de infección se conoce desde la antigüedad. Un gran problema es que las personas aparentemente sanas también llevan la enfermedad, incluso si aún no parece haber estallado. Esto vuelve a volar muchas suposiciones que eran previamente válidas. El contagio, como lo han demostrado varias observaciones en [SCOPE.sState('panum_disease_state').GetName], comienza 4 días antes de que aparezca la erupción y generalmente dura hasta 4 días después de que aparezca la erupción. Parece que el contagio es justo antes del inicio de la erupción."
 panum.649.g: "Por lo tanto, se justifican investigaciones más exhaustivas."
 panum.650.t: "Desinfección del cuartel"
 panum.650.d: "El médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] visitó un cuartel en [SCOPE.sState('panum_disease_state').GetName] que ha implementado algunas medidas ejemplares para evitar la propagación del sarampión entre los hombres jóvenes."
 panum.650.f: "'Algunas de estas medidas incluyeron aislamiento más y más estricto de los reclutas que llegan que antes; vigilancia para evitar la congregación en cuarteles, comedores, teatros y otros lugares; Señoridad de cabeza a pie de cunas de cuartel adyacentes; Contratación y desinfección húmedas continuas de pisos, paredes, mesas, perillas de puerta. Todo el personal usaba vestidos y máscaras de gasa, las cambió y se lavaba las manos con jabón o desinfectantes entre el contacto con los pacientes, que antes eran prácticas poco comunes. Ome Wards ordenó que el personal use guantes de goma. Los pacientes fueron colocados en aislamiento de cubículos, colgantes de sábanas de cables colgados alrededor de la cama y se les pidió que usara máscaras. Las láminas de cubículos a veces se rocían periódicamente con desinfectantes. Los pacientes enmascarados solo se permitieron en los baños uno a la vez bajo supervisión asistente. '\ N \ nfrom the Journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [TimeKeeper.GetCurrentDate.Format('y')]"
 panum.650.g: "Métodos modernos para combatir el sarampión."
 panum.651.t: "Inoculación fallida"
 panum.651.d: "El intento del médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] de inmunizar el sarampión utilizando un procedimiento similar a la variolación de la viruela demostró una falla colosal."
 panum.651.f: "En 1757, el médico escocés Francis descubrió que el sarampión era causado por un patógeno: transmitió la enfermedad a individuos sanos que usaban la sangre de pacientes infectados y demostró que era causado por un agente infeccioso. Probó un grupo de 12 niños, 10 de los cuales desarrollaron una erupción febril moderada y moderada después de un período de incubación de 6 a 7 días, y dos de los cuales permanecieron sin infectados. Este enfoque fue rápidamente abandonado debido a dificultades técnicas, particularmente para obtener material de sarampión en el momento adecuado para inocular la enfermedad."
 panum.651.g: "Una pérdida de tiempo."
 panum.652.t: "Garganta de garganta"
 panum.652.d: "El médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha probado varios remedios de gárgaras que han sido promocionados por otros médicos para curar el sarampión durante años. Todos resultaron ser un fracaso."
 panum.652.f: "'Después del último experimento, me queda algo más que un sabor amargo. Por un lado, porque incluso el aceite de serpiente tiene mejores efectos. Por otro lado, debido a que toleramos más vendedores de aceite de serpiente y charlatanes en nuestro gremio médico, que necesitan ser resueltos."
 panum.652.g: "¿A qué te refieres, el aceite de serpiente es inútil?"
 panum.653.t: "Rocío desinfectante"
 panum.653.d: "En un cuartel, los soldados que sufren de un brote de sarampión recientemente han comenzado a ingerir un lenguaje desinfectante. El médico piensa que esta es una empresa tonta y ha tenido que convencer mucho."
 panum.653.f: "'Realmente deberíamos poner pequeñas fotos en las etiquetas de productos químicos y médicos que muestran incluso el más pequeño tonto de lo que definitivamente no debe hacer con un líquido, rociado u otra sustancia."
 panum.653.g: "¡Este es un momento valioso que perdemos tratando de encontrar un tratamiento!"
 panum.661.t: "¡Toma tus vitaminas!"
 panum.661.d: "El médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] descubrió que tomar vitaminas durante una enfermedad de sarampión es beneficioso para eliminar los efectos secundarios desagradables."
 panum.661.f: "'El efecto de las vitaminas es bien conocido, pero en el caso del sarampión, su efecto me sorprendió. Los niños con deficiencia de vitamina A corren el riesgo de enfermedades graves o incluso ceguera. Los suplementos de vitamina A pueden fortalecer el sistema inmune general, aunque no pueden curar la enfermedad."
 panum.661.g: "Muy bien."
 panum.900.t: "Epidemia de difteria"
 panum.900.d: "Una epidemia ha estallado en uno de nuestros estados: #YELLOW Difteria#! es devastador en [SCOPE.sState('panum_disease_state').GetName]!"
 panum.900.f: "La difteria es una enfermedad infecciosa aguda que ocurre principalmente en los niños y es causada por una infección del tracto respiratorio superior (difteria faríngea). Pierre Fidèle Bretonneau introdujo el término difteria en uso médico en 1826 como difterita (\"difteritis\"). La palabra se refiere al bronceado de la garganta, seudomembranas oscuras (depósitos marrones coriáceos en la laringe y tráquea) hechos de membrana mucosa muerta y componentes sanguíneos. Se ha conocido difteria desde la antigüedad; Hipócrates ya había descrito la enfermedad. La difteria es fatal en 5-10% de los casos. En niños menores de cinco años y adultos mayores de 40 años, la tasa de mortalidad puede ser hasta el 20%."
 panum.900.g: "Mi garganta también se está apretando."
 panum.920.t: "Fines epidémicos de difteria"
 panum.920.d: "La severa epidemia de difteria que ha mantenido a nuestro país en un dominio absoluto ha alcanzado su fin. Los médicos y las autoridades dan al aclarado y los niños se atreven a salir a las calles nuevamente, las personas mayores se sienten aliviadas."
 panum.920.f: "\"En una temporada de frío húmedo, apareció en Kingston, una ciudad interior en New-Hampshire, situada en una llanura baja, una enfermedad entre los niños, comúnmente llamadas\" mojón de garganta \", de la muy maligna, y con mucho la más fatal jamás conocida en este país\". -Alino Noah Webster"
