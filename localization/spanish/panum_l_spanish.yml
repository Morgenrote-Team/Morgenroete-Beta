 panum.2100.j: "Medicina militar."
 panum_cholera_condition: "Cólera"
 panum_cholera_condition_desc: "El cólera es una enfermedad peligrosa del intestino delgado. Se considera una epidemia definitoria del siglo XIX con millones de muertes en todo el mundo."
 panum_tuberculosis_condition: "Tuberculosis"
 panum_tuberculosis_condition_desc: "Se considera la tuberculosis, junto con el cólera, una de las causas de muerte más comunes en la era victoriana. También conocido como consumo, afecta principalmente a los pulmones"
 panum_smallpox_condition: "Viruela"
 panum_smallpox_condition_desc: "Conocido por sus pústulas, que desfiguran la cara y el cuerpo, la viruela ha sido durante mucho tiempo una de las enfermedades más letales de la historia."
 panum_typhus_condition: "Tifus"
 panum_typhus_condition_desc: "Typhus ha aterrorizado a los soldados a lo largo de los siglos, particularmente en las guerras napoleónicas cuando mató a miles de personal del ejército. Se enfureció una y otra vez después de los desastres naturales"
 panum_yellow_fever_condition: "Fiebre amarilla"
 panum_yellow_fever_condition_desc: "La fiebre amarilla afecta principalmente las áreas tropicales de América del Sur y África. En el Caribe, la enfermedad ha cobrado más vidas entre soldados estacionados que cualquier guerra."
 panum_measles_condition: "Sarampión"
 panum_measles_condition_desc: "El sarampión es una enfermedad altamente contagiosa conocida por sus típicos parches de piel roja. Puede tener consecuencias catastróficas, particularmente en poblaciones que carecen de inmunidad previa."
 panum_scarlet_condition: "Escarlatina"
 panum_scarlet_condition_desc: "La escarlata es una enfermedad generalizada que fue una de las causas más comunes de muerte entre los niños hasta principios del siglo XX."
 panum_plague_condition: "Plaga"
 panum_plague_condition_desc: "La peste bubónica se equipara con la 'muerte negra' de la Edad Media, que es una de las peores catástrofes de la historia. El nombre proviene de los golpes hinchados y dolorosos."
 panum_diphteria_condition: "Difteria"
 panum_diphteria_condition_desc: "La difteria es una enfermedad peligrosa que puede conducir a complicaciones potencialmente mortales y consecuencias a largo plazo."
 panum_polio_condition: "Polio"
 panum_polio_condition_desc: "La poliomielitis es una enfermedad que afecta principalmente a los niños, lo que a menudo resulta en la muerte o las complicaciones físicas de toda la vida."
