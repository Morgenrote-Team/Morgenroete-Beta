 panum.440.t: "Tifus - un problema social"
 panum.440.d: "En su tratado [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_treatment_title')], el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] puso especial énfasis en el hecho de que el tifus es una enfermedad prevenible cuando las fuerzas políticas y sociales trabajan juntas."
 panum.440.f: "'Condiciones estrechas, ropa llena de piojos y apartamentos deteriorados o habitaciones de soldados me presentaron una imagen memorable. La fiebre del tifus estaba en todas partes allí. Dondequiera que la gente viviera en las mismas condiciones estrechas, pero bajo las condiciones higiénicas de la habitación del hospital, no se pudo observar una propagación. No se debe considerar que la medicina sea cuidada del individuo, sino en términos de salud pública, lo que también implica resolver problemas sociales. No puede haber ninguna duda de que una propagación epidémica del tifus como hemos visto recientemente solo ocurrió en condiciones de vida como la pobreza y la falta de educación. Quite estas circunstancias y estoy seguro de que veremos mejoras significativas en la lucha contra la enfermedad. '\ N \ ndr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] en su memorando al gobierno"
 panum.440.g: "Typhus está perdiendo su terror."
 panum.441.t: "Una autopsia"
 panum.441.d: "El Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] realizó varias autopsias sobre las muertes por tifus en [SCOPE.sState('panum_disease_state').GetCityHubName] e hizo hallazgos cruciales."
 panum.441.f: "'Durante mucho tiempo se sabe que la fiebre tifoidea y el tifus son dos enfermedades diferentes. Pero todavía hay algunos investigadores que creen que la mala nutrición, una infección del tracto intestinal o al menos una deficiencia nutricional podría estar relacionado con el estallido del tifus. Las razones dietéticas todavía se consideran una posible causa de muchas enfermedades. Durante mis exámenes no encontré nada que de alguna manera sugiriera un trastorno digestivo. La fiebre del tifus no tiene nada que ver con la dieta o la digestión. '\ N \ nfrom un informe de autopsia del Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] en [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]"
 panum.441.g: "Pero, ¿qué podría ser?"
 panum.442.t: "Sin lavar y enmarañado"
 panum.442.d: "En [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] buscar la causa de la epidemia del tifus, el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] se dio cuenta de que los hallazgos anteriores tenían que ser cuestionados."
 panum.442.f: "'He escuchado varias veces en mi carrera que la mala higiene es una forma de miasma o gérmenes, lo que sea que la gente pueda creer, para afianzar la ropa y contribuir a la enfermedad. Creo que esto es cuestionable en detalle, pero no en la declaración básica. Los soldados, los convictos, los pobres, los delincuentes y las prostitutas se encuentran entre las víctimas clásicas de la epidemia del tifus. Pero, ¿son los pobres sin lavar porque quieren no ser lavados, o no es más bien el caso de que no sean libres porque son pobres? No quiero creer que la tuberculosis es una enfermedad de un artista más que el tifus solo afecta a los delincuentes porque son moralmente malvados. Hay numerosos criminales ricos que no han sido afectados por el tifus en esta epidemia. Hay sacerdotes sin culpa en los barrios bajos que se sacrifican por los demás y que sucumben a la enfermedad. Entonces, ¿cuál es la conexión más convincente entre las víctimas?"
 panum.442.g: "¿[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] está tratando de afirmar que el tifus también puede afectar a las personas honestas?"
 panum.443.t: "Calidez y frío"
 panum.443.d: "Después de varias visitas a las casas de familias que padecen tifus, el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] llega a la conclusión de que no es, como se afirma, una enfermedad estacional."
 panum.443.f: "'Hay enfermedades estacionales y este parece ser el caso con Typhus también. Informes anteriores indican un aumento en las temporadas más frías, que también pueden incluir una primavera o otoño húmedo. Creo que se ha demostrado que el frío y el calor influyen en la enfermedad. Si depende de las estaciones es cuestionable. Puede ponerse igual de caliente en una habitación con calefacción bien llena. La enfermedad no ocurrió en todos los lugares en la misma época del año. Si ese fuera el caso, no solo ciertas áreas de una ciudad sino toda la ciudad tendría que verse igualmente afectada. Pero siempre apareció donde la gente estaba llena juntas. Pude determinar esto durante varias visitas domiciliarias."
 panum.443.g: "Esto contradice estudios previos."
 panum.444.t: "Sudor y respiración"
 panum.444.d: "El Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ahora está completamente convencido de que el tifus debe ser una enfermedad contagiosa, incluso si todas las circunstancias aún no se han aclarado."
 panum.444.f: "'Al comienzo de mi investigación, estaba firmemente convencido de que el tifus no era una enfermedad contagiosa. Sin embargo, a medida que mi familia con tifus aumentó, crecí firmemente en el contagio de la enfermedad, y enfatizo la naturaleza contaminante del sudor. Vi a un enfermero que, mientras se afeita a un paciente moribundo, inhaló la respiración del paciente. La enfermera describió que el aliento del paciente tenía un \"sabor náuseas\", y casi inmediatamente se enfermó. Del mismo modo, un asistente apoyaba a otro paciente que murió poco después, sintió el sudor picante del paciente sobre su piel, y el asistente fue tomado inmediatamente con los síntomas del tifus. Está claro que la proximidad a los pacientes con tifus pone a uno en riesgo de contraer la enfermedad."
 panum.444.g: "Esto puede ser útil, pero ¿realmente transmite de persona a persona?"
 panum.445.t: "¿Es hambre?"
 panum.445.d: "En una disputa acalorada con un colega en [SCOPE.sState('panum_disease_state').GetCityHubName], el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] refutó sus teorías."
 panum.445.f: "'¿Es un tipo especial de tifus, hambre tifus. En consecuencia, el hambre, o más bien la hambruna, es un desencadenante para el tifus. Los cambios en la sangre probablemente también tengan algo que ver con eso. 1829 fue un año próspero, pero había tifus. Es comprensible que un cuerpo debilitado sea más probable que se enferme, pero ¿la causa?"
 panum.445.g: "El término 'fiebre del hambre' es, por lo tanto, incorrecto."
 panum.446.t: "No ubicación, sino situación"
 panum.446.d: "El Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] cree que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] ha descubierto que lo que importa no es tanto cómo viven las personas con tifus, sino dónde viven."
 panum.446.f: "'Durante mi visita a [SCOPE.sState('panum_disease_state').GetCityHubName] descubrí que toda la enfermedad solo afectó a una sola parte de la ciudad. El área es conocida por su pobreza y depravación moral, que ha apoyado algunas teorías de que el tifus es una enfermedad de individuos moralmente inferiores. Pero por lo que puedo decir, es el vecindario densamente poblado y la situación económica de los afectados. En mi opinión, la propagación de la enfermedad no se trata de corrupción moral, sino proximidad física."
 panum.446.g: "Esto al menos significa que la enfermedad teóricamente puede superarse ..."
 panum.447.t: "Piojo"
 panum.447.d: "El Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha presentado una teoría altamente controvertida que, aunque [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] no puede probarlo, podría cambiar la comprensión de la enfermedad del tifus en el futuro."
 panum.447.f: "'Si hay una cosa que noté en mis muchas observaciones, fue que casi todos los pacientes estaban en un estado infestado de piojos. Ya sea que los soldados en los cuarteles superpoblados, las familias con sus innumerables hijos, los condenados en sus células deterioradas. Ya no creo que esta sea una coincidencia. Por supuesto, me falta evidencia. En los últimos años, varios científicos han podido demostrar una y otra vez que las enfermedades pueden transmitirse entre animales y humanos. Si es diferente en esta situación, estaría feliz de ser probado de otra manera. Por ahora, creo que el misterio del tifus no se puede resolver sin mirar más de cerca el papel de los piojos."
 panum.447.g: "¿Cómo puede algo tan pequeño causar tanta devastación?"
 panum.447.h: "Algo tan pequeño debe causar tanta devastación."
 panum.448.t: "Un hospital higiénico"
 panum.448.d: "Durante una visita a un hospital ejemplar, el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] pudo convencer a [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself] de que la transmisión de la enfermedad es solo mínima en condiciones favorables."
 panum.448.f: "'Cuando los enfermos comenzaron a ser llevados a los hospitales aquí y allá, tenía miedo de que la situación pudiera empeorar debido a la posible infección. Se suponía que podrían formarse nuevas fuentes de infección, a partir de las cuales la epidemia atacaría con una violencia aún mayor. Nada de esto sucedió, aunque tal efecto se había observado en muchos derramados de fiebre. Como he observado en otros casos, las condiciones higiénicas más favorables hicieron la diferencia."
 panum.448.g: "Entonces no es la estrechez como tal, sino las condiciones."
 panum.449.t: "Asistencia epidémica"
 panum.449.d: "Al entregar alimentos, mantas y medicamentos a [SCOPE.sState('panum_disease_state').GetCityHubName], el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] pudo asegurarse de que la epidemia disminuya ligeramente."
 panum.449.f: "'Puede sonar banal, pero con un envío de bienes destinados a aliviar la miseria de los residentes, los brotes de enfermedad cayeron la semana pasada. Algo similar ya se había observado en otras áreas donde el tifus se había roto en el pasado. Los trabajadores de ayuda distribuyeron arroz y guisantes, construyeron hospitales improvisados ​​y también trajeron medicamentos y ropa nueva. El caso lo demuestra sobre todo: el tifus no es una enfermedad hereditaria. Definitivamente depende de los factores ambientales. '\ N \ na Carta del Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] al Dr. Dementive"
 panum.449.g: "A veces, la única forma de abordar una solución es usar criterios de exclusión."
 panum.450.t: "Ropa contaminada?"
 panum.450.d: "El Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] notó un caso extraño en un derramamiento de fiebre que corresponde a experiencias similares."
 panum.450.f: "¿Es esta evidencia de un presunto contagio? No hay duda de que este caso corresponde a experiencias muy similares que he tenido en otros lugares. A veces son abrigos, a veces chaquetas o camisas. Una víctima tifus tenía un hermano que se llevó el abrigo. Unos días después también estaba enfermo. Se dice que los niños que jugaron con el abrigo se infectaron de manera similar. En las clases más pobres es bastante común transmitir ropa de parientes, especialmente en las estaciones frías. Si la ropa está contaminada o no: cambiar la ropa parece ser una de las medidas sensatas para evitar el tifus."
 panum.450.g: "¿Los hombres deberían cambiar sus calcetines y ropa interior? ¡Imposible!"
 panum.451.t: "Clima tifus"
 panum.451.d: "Después de que un médico extranjero proporcionó una nueva hipótesis sobre los orígenes del tifus, el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] duda de la propia investigación [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]."
 panum.451.f: "'Un' colega 'me envió su volumen sobre las causas del tifus hace dos días. Estoy bastante asombrado, por no decir desmotivado. Formuló de manera muy precisa y rigurosa cómo las condiciones climáticas y climáticas están relacionadas con el desarrollo de la enfermedad. En consecuencia, el miasma se forma cuando hay humedad en la tierra y luego se eleva hacia el aire. Esto explicaría la frecuente aparición de tifus en meses fríos y húmedos. Entonces, ¿es Miasma después de todo? '\ N \ nfrom el diario de [ROOT.Var('panum_physician_var').GetCharacter.GetFullName]"
 panum.451.g: "¿Pero es esta realmente la solución correcta?"
 panum.452.t: "Putrefacción"
 panum.452.d: "Algunos de los hallazgos que el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] resumió recientemente simplemente no encajan con la teoría anterior [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]."
 panum.452.f: "'Hasta ahora, no he pensado mucho en la teoría de que los procesos putrefactivos juegan un papel crucial en la propagación de la enfermedad. Pero donde quiera que vaya, donde sea que el tifus esté furioso, encuentro animales, encuentro exhalaciones, encuentro material humano, animal y vegetal. ¿Podría realmente disolver y dejar atrás miasma, o tal vez venenos?"
 panum.452.g: "Un revés desagradable."
 panum.453.t: "Corrientes de aire negativas"
 panum.453.d: "Una publicación de un médico alemán reconocido sacude el progreso del Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] hasta ahora. Por lo tanto, se ha demostrado que las corrientes de aire son responsables de la aparición de tifus."
 panum.453.f: "'Un aire tan cálido y húmedo puede ser transportado por una corriente de aire ecuatorial a las latitudes del norte y luego veremos a Typhus romper bajo el dominio de los vientos del sur y el oeste en temporadas relativamente cálidas. Tal relación debe ser más excelente en verano, cuando el sol está en su posición norte, las costas del Mediterráneo se incluyen en la extensión de los vientos comerciales y en nuestro país la batalla con la corriente norte tiene lugar en una temporada lluviosa con un carácter cambiante. Así es como se pueden explicar las epidemias del tifus del verano y principios del otoño. '\ N \ ndr. Angelika Hasenbein, \"Cómo las corrientes de aire causan tifus y lluvia de otoño causan gripe\""
 panum.453.g: "Esto es realmente muy convincente."
 panum.454.t: "Enfermo"
 panum.454.d: "El Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] se ha sentido peor durante unos días. ¿Se ha infectado [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe]?"
 panum.454.f: "'¿Dónde está el médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]? [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] ¿Quería visitar al paciente del Typhus en la habitación cinco hoy?"
 panum.454.g: "El médico debe descansar."
 panum.454.h: "¡El médico debería seguir trabajando!"
 panum.455.t: "Documentos perdidos"
 panum.455.d: "El médico desperdició algunas de las notas [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] que podrían haber sido útiles para desarrollar un tratamiento para el tifus."
 panum.455.f: "- - - - - - - - - - \ n \ n- - - - - - - - - \ n \ n- - - - - - - - - \ n \ nnot del Journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]"
 panum.455.g: "Que vergonzoso."
 panum.461.t: "Clases y casas"
 panum.461.d: "El Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha creado una tabla de los diversos typhus que viven en [SCOPE.sState('panum_disease_state').GetCityHubName], donde viven y qué nivel de vida tienen. La fiebre del tifus es, por lo tanto, una enfermedad 'social'."
 panum.461.f: "'Las tablas estadísticas muestran cuán grande es la influencia de los apartamentos en la salud de los residentes. Por ejemplo, en un estudio del suburbio de City, descubrí que la tasa de mortalidad en las calles de segunda clase era del 18 por ciento y en las calles de tercera clase 68 por ciento mayor que en la primera clase; y esa mortalidad fue un 31 por ciento mayor en casas de segunda clase y un 78 por ciento mayor en casas de tercera clase que en casas de primera clase. La mortalidad había mejorado en un 25 por ciento en esas carreteras pobres que se mejoraron."
 panum.461.g: "¿Entonces el médico también es un crítico social?"
 panum_typhus: "Tifus"
 panum_typhus_desc: "Esta persona sufre de tifus, una enfermedad peligrosa."
 panum.12.t: "La primera vacuna"
 panum.12.d: "[SCOPE.sCharacter('panum_physician_scope').GetFullName] ha hecho una invención innovadora. Usando un nuevo proceso, la vacunación, logró inventar un medio efectivo de protección contra la temida viruela."
 panum.12.f: "Según el biógrafo de Edward Jenner, John Baron, se dijo que Jenner explotó la creencia popular de que las lecheras que estaban infectadas con cowpox generalmente no obtenían viruela ('mito de la leche'). John Smunster había observado que un paciente que anteriormente había tenido una vaca (inofensiva) no podía ser variolada con la viruela. Por lo tanto, Jenner planteó la hipótesis de que la inoculación con la vaca proporcionaría la misma inmunidad que la vaca y, por lo tanto, proporcionaría protección contra la viruela. Jenner recolectó por primera vez los casos y estudios observacionales de personas que anteriormente habían tenido vacas o caballos de pozo, pero que luego demostraron ser inmunes en caso de una variolación posterior o en un brote de viruela real. El 14 de mayo de 1796, vacunó a James Phipps, de 8 años, con cacería o virus de vacunas que había tomado de una pústula de vaca de la mano de la lechera Sarah Nelmes, que tenía vaca. Aproximadamente seis semanas después, el 1 de julio de 1796, Jenner varioló al niño con pus de viruela; Él demostró ser inmune."
 panum.12.g: "¡Un héroe de la medicina!"
 je_panum_vaccine: "La vacuna"
 je_panum_vaccine_reason: "Nuestra nación está en el proceso de introducir una vacuna conocida en nuestro país por primera vez y distribuirla a nivel nacional."
 je_panum_vaccine_success: "[GetPlayer.GetName] ha recolectado al menos #ORANGE 4 pistas de vacuna#!."
 je_panum_smallpox_treatment_success: "[GetPlayer.GetName] ha recolectado al menos #ORANGE 3 pistas de tratamiento#!."
 panum.351.t: "El viejo enemigo"
 panum.351.d: "La viruela, quizás la enfermedad más mortal conocida por el hombre, ha resurgido en nuestras tierras."
 panum.351.f: "La viruela es un enemigo familiar y peligroso. A medida que se abre paso a través de las tierras de [GetPlayer.GetName], podría llevar la vida de un tercio completo de los que están infectados, y dejar a otros ciegos por el resto de sus días. Casi todos los infectados llevarán para siempre la tarjeta de presentación de este asesino sobre su carne: la cicatrización icónica de la cara y el cuerpo, el símbolo inmortal y sin edad de una enfermedad casi tan antigua como la civilización misma. Ha acechado en cada rincón del mundo, desde el antiguo Medio Oriente hasta el Nuevo Mundo, un ejército cuya marcha ha estado de desecho a imperios, mató a millones y humilló a los mayores líderes que jamás hayan caminado por la tierra. Donde el hombre se ha ido, la viruela ha seguido, un cazador persigue para siempre a su presa."
 panum.351.g: "Y entonces hacemos batalla contra la viruela una vez más ..."
 panum.352.t: "Rumores de tratamiento con viruela"
 panum.352.d: "¡Siguiendo los rumores de un tratamiento para la viruela, nuestra gente ha comenzado a probar prácticas extrañas que hacer con las pústulas mismas!"
 panum.352.f: "La vista de un caballero erudito que come costras de personas infectadas con viruela podría ser una vista que es asquerosa y horrible en igual medida, pero es una cura desesperada capturada por un hombre desesperado. Hay rumores de un tratamiento para esta horrible enfermedad en otro lugar del mundo y, supuestamente, funciona de manera similar ... pero ¿cómo? ¿Qué brujas, qué ciencia, pueden librarlos de esta horrible plaga? Las noticias provienen de las tierras lejanas de Europa de que el flagelo de la viruela ha sido conducido a la retirada, que las ciudades enteras pueden vivir sin un solo caso. Para algunos, esto es algo de esperanza. Si se puede vencer allí, entonces podríamos vencerlo aquí. \ N \ n para algunos, esto es una mentira. Nuestras mentes más grandes aún no han podido encontrar un tratamiento, pero tal vez, tal vez ..."
 panum.352.g: "... ¿podrían haber tenido éxito donde hemos fallado?"
 panum.353.t: "El flagelo de la viruela"
 panum.353.d: "No tratada e impacable, la viruela es devastando a nuestra sociedad ... y especialmente a nuestros jóvenes."
 panum.353.f: "Sollozo. Lamentos. Los frenéticos gritos de los desesperados, que apenas toman incluso un segundo del aliento jadeante final antes de caer en el dolor del que ninguna mano puede levantarlos. Los padres golpearán sus puños contra las paredes hasta que sus palmas se vuelvan rojas con sangre y sus nudillos se rompen y planos. Las madres arrojarán ordenadores con la fuerza de los gigantes para un último toque, para una última caricia de una mejilla fría y pálida. Estos son vistas comunes en [GetPlayer.GetName], porque la viruela tiene hambre de los más vulnerables de todos nosotros: nuestros hijos, nacidos y no nacidos. Más del ochenta por ciento de los bebés infectados por la viruela morirán, esta enfermedad se abre paso en el futuro de nuestras tierras. Sin tratamiento, no hay nada que podamos hacer sino llorar por las vidas que deberían haber sido."
 panum.353.g: "Debe haber un final para esta pesadilla ..."
 panum.354.t: "La vacuna contra la viruela"
 panum.354.d: "Nuestros diplomáticos traen más que noticias: ¡traen muestras de una 'vacuna' contra la viruela!"
 panum.354.f_generic: "Durante una visita a la Europa distante, nuestros dignatarios descubrieron algo fascinante: tienen lo que parece ser un tratamiento * que trabaja * para la viruela. ¡De hecho, han aprendido de la historia de esta enfermedad! Aparentemente, la práctica de la variolación, o el uso de muestras de costras de viruela secas de los enfermos en recuperación para dar a los niños una forma \"más débil\" de esta enfermedad, se había observado en el Imperio otomano ... Sin embargo, esta fue una solución defectuosa, peligrosa, porque fue un baile con un demonio demasiado cercano y la viruela lo ha desarrollado tan fácilmente como podría superarlo. Cowpox, una enfermedad casi inofensiva, como una forma de proteger contra su hermano mayor letal. Esto proporciona un escudo seguro, económico y prácticamente garantizado contra la plaga de la viruela. \ N \ nat primero para creerlo, nuestros médicos escépticos han probado esta cura por sí mismos ... y *funciona *. Por primera vez en nuestra historia, podemos luchar contra la viruela."
 panum.354.g_generic: "Nosotros ... ¡necesitamos importar esto, inmediatamente!"
 panum.354.f_fareast: "Durante una visita a la Europa distante, nuestros dignatarios descubrieron algo fascinante: tienen lo que parece ser un tratamiento * que trabaja * para la viruela. ¡De hecho, han aprendido de la historia de esta enfermedad! Aunque nuestros médicos están bien familiarizados con la práctica de la variolación, que podría usar costras secas de la recuperación para proteger a los no infectados, parecen haber descubierto una protección aún mayor. Mediante el uso de muestras derivadas de una pocina relativamente benigna, los europeos han desarrollado una 'vacuna', capaces de inocular a los niños, o incluso la recientemente infectada ... una vacuna que puede aumentar enormemente sus posibilidades de supervivencia. Solo aquellos educados de manera europea y titulados 'Médicos' podrían garantizar su potencial como una protección segura, económica y poderosa contra la viruela. Más que eso, ya han comenzado a probarlo entre nuestra gente, y descubrieron que estas afirmaciones no son simplemente afirmaciones, oh no, sino hechos."
 panum.354.g_fareast: "Parece que nuestros nuevos ... médicos ... han demostrado su valía. Importar esto de inmediato."
 panum.354.f_latino: "Durante una visita a la Madre Country en Europa, nuestros dignatarios descubrieron algo fascinante: tienen lo que parece ser un tratamiento * que trabaja * para la viruela. Aunque durante mucho tiempo estábamos familiarizados con la práctica de la variolación, donde nuestros médicos podrían usar muestras tomadas de la recuperación para dar a aquellos que necesitan desesperadamente protección, desde entonces han desarrollado un tratamiento mucho más sofisticado. En lugar de usar costras de viruela e infección por riesgo con esa enfermedad letal, usan materiales tomados de la vaca, una enfermedad común y generalmente inofensiva. Este nuevo suero es barato, común y, lo más importante, efectivo. La viruela no es ajena a las Américas, ya que diezmó a los pueblos nativos en estas tierras ... pero ahora tenemos un arma poderosa para hacer de este flagelo una cosa del pasado."
 panum.354.g_latino: "Envíe gracias a la patria y una solicitud para importar un envío para su uso inmediato."
 panum.355.t: "Comienza la vacunación"
 panum.355.d: "Con una vacuna viable de viruela ahora presente en [GetPlayer.GetName], el gobierno ha comenzado una campaña de vacunación."
 panum.355.f: "Había habido cierta resistencia a la idea de una campaña de vacunación, al menos al principio. Las madres preocupadas con sus hijos asustados, los viejos caballeros marchitaron que eran escépticos de esta nueva maravilla, el muy piadoso que temía que la ciencia manipulara algo más allá de su comprensión. La educación resolvió esto, explicaciones de cómo funcionó, por qué, pero mucho más que eso fueron los resultados. Los niños que se quedaron con su vista y salud, y no con las horribles consecuencias de una de las enfermedades más mortales que la humanidad había encontrado. Pocos debían convencerse cuando los vieron libres de cicatrices y llenas de vida. En las escuelas, las oficinas de los médicos, los lugares de trabajo, la campaña de la vacunación comienza a recoger el vapor ... y con ella, la viruela comienza a disminuir."
 panum.355.g: "Ay. Odio las agujas, pero si me mantiene a salvo ..."
 panum.356.t: "Una enfermedad en el retiro"
 panum.356.d: "Después de innumerables siglos de muerte y miseria, la reciente proliferación de la vacunación de la viruela ha puesto a este viejo enemigo en plena retirada."
 panum.356.f: "Ha tomado una gran cantidad de esfuerzo incansable de las manos y las mentes más allá de contar, pero dentro de nuestro amado [GetPlayer.GetName], la viruela es una amenaza que se está convirtiendo lenta pero seguramente en algo del pasado. El resultado de una extensa campaña para vacunar a los jóvenes de la nación y a todos los dispuestos a tomar la aguja, la capacidad de la viruela se abre paso a través de nuestras familias y comunidades, es llevar la promesa de que los niños de hoy no llevarán las cicatrices de sus abuelos. Con cada pinchazo de la aguja, la espada de la viruela se vuelve cada vez más aburrida, y la naturaleza de esta plaga se vuelve aún más algo del pasado. La viruela morirá aquí, y si no a nuestra mano, entonces la de nuestros herederos."
 panum.356.g: "Un día, un día, dejaremos esta bestia horrible para siempre."
 panum_smallpox_vaccination_character_modifier: "Vacunado"
 panum.340.t: "Variolación"
 panum.340.d: "El Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha encontrado un método de tratamiento para la viruela, aunque no es del todo inofensivo."
 panum.340.f: "La variolación (también inoculación) es la transferencia del contenido de la pústula de la viruela de persona a persona a través de la inoculación. Es una técnica para vacunar contra enfermedades virales que se utilizó en las personas, principalmente en China y Oriente Medio, hasta el siglo XVIII. Aquí, se utilizaron colectivos de virus de las heridas de la viruela que habían sobrevivido a la enfermedad. Por lo general, el material se tomó de una pústula en personas enfermas que usan una lanceta, que luego se introdujo subcutáneamente, es decir, a través de pequeñas heridas, en el brazo o la pierna de las personas sanas. Esto significaba que los virus atenuados se administraron a personas sanas. La reacción inmune debe activarse por la multiplicación de los virus. Sin embargo, los virus podrían volver a causar la enfermedad a través de la mutación inversa a medida que se multiplicaba, lo que condujo a una tasa de mortalidad relativamente alta (2-3%) entre los tratados de esta manera."
 panum.340.g: "A ... progreso."
