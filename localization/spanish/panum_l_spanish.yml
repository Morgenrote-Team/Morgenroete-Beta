 panum.131.t: "Estudios de enfermedad suspendidos"
 panum.131.d: "Dado que la epidemia peligrosa en [GetPlayer.GetName] ha llegado a su fin y los últimos pacientes se han recuperado, el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha terminado los estudios [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] por el momento. El médico ha podido recopilar información importante que debería simplificar una descripción científica futura de la enfermedad, pero [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] aún no ha logrado un avance"
 panum.131.f: "'Toda especulación en cuanto a su origen y sus causas, si las causas se pueden encontrar adecuadas para producir una perturbación tan grande, dejo a otros escritores, ya sean laicos o profesionales; Para mí, simplemente estableceré su naturaleza y explicaré los síntomas por los cuales el estudiante puede reconocerlo, si alguna vez se rompió nuevamente. Esto puedo hacerlo, ya que tuve la enfermedad yo mismo, y observé su funcionamiento en el caso de los demás. -Shucydides"
 panum.131.g: "Se ha dado otro paso."
 panum.133.t: "Expedición médica descontinuada"
 panum.133.d: "La expedición médica ha terminado su trabajo por ahora, ya que la epidemia ha terminado. El Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] no logró completar una descripción científica, pero los estudios [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] deberían ser valiosos para el futuro."
 panum.134.d: "La terrible epidemia que golpeó a nuestro país ha pasado. Pero esto también significa que el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] tiene que detener las investigaciones de [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] por el momento porque [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] no puede llevar a cabo ningún experimento adicional para encontrar un método de tratamiento para la enfermedad. Sin embargo, el médico ha obtenido información valiosa que sin duda serán útiles en el futuro."
 panum.134.f: "\"El contagio pasa de una cosa a otra, y originalmente es causado por la infección de la partícula imperceptible\". -Girolamo fracastoro"
 panum.134.g: "Es solo cuestión de tiempo antes de encontrar una cura."
 panum.136.d: "Desafortunadamente, la Expedición de Investigación Médica ha terminado por el momento sin ningún resultado final. Desde que la epidemia ha abandonado el país, el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] no verificó las teorías [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]. Los resultados provisionales estarán disponibles para las generaciones [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] y futuras para finalmente encontrar un método de tratamiento."
