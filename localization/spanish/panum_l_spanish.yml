 panum.3000.t: "La Cruz Roja"
 panum.3000.d: "Dados los horrores de la guerra moderna, un 'Comité Internacional de Sociedades de Ayuda para el cuidado de los heridos' se fundó en [SCOPE.sState('panum_red_cross_state').GetName]. Está destinado a trabajar en todas las naciones para ayudar a los heridos en la guerra."
 panum.3000.f: "La Cruz Roja ha adoptado las siguientes resoluciones: \ n- El establecimiento de sociedades de ayuda nacionales para la guerra heridas \ n- la neutralidad de las heridas que envían a las enfermeras voluntarias al campo de batalla para proporcionar asistencia \ n- La organización e implementación de más conferencias internacionales"
 panum.3000.g: "Un paso decisivo en la cooperación internacional."
 panum.3001.d: "Dados los horrores de la guerra moderna, un 'Comité Internacional de Sociedades de Ayuda para el cuidado de los heridos' se fundó en [SCOPE.sState('panum_red_cross_state').GetName]. Está destinado a trabajar en todas las naciones para ayudar a los heridos en la guerra. Un enviado preguntó si a nuestra nación también le gustaría unirse a esta asociación."
 panum.3001.g: "Nos unimos a esta organización como miembro fundador."
 panum.3001.h: "Interesante."
 panum.3002.d: "Reconociendo los horrores de la guerra moderna, el comerciante suizo Henry Dunant fundó un \"Comité Internacional de Sociedades de Ayuda para el cuidado de los heridos\". Está destinado a trabajar en todas las naciones para ayudar a los heridos en la guerra."
 panum.3002.f: "En 1859, el comerciante suizo Henry Dunant tropezó con el campo de batalla de Solferino por casualidad. Sacudido por los gritos de ayuda de alrededor de 40,000 soldados moribundos y heridos, comienza a alentar a los voluntarios del área a ayudar a las víctimas, ya sean amigos o enemigos. Su libro de 1862 'Un recuerdo de Solferino' trajo los horrores de la guerra moderna a la atención de las masas. Los gobiernos y los ciudadanos desarrollan un interés en la contención de la guerra. El 17 de febrero de 1863, cuyo comité de cinco miembros Dunant fue miembro fundó el Comité Internacional de la Cruz Roja. Los delegados de 16 naciones se reunieron en la primera conferencia de Ginebra del 26 al 29 de octubre de 1863 para desarrollar aún más las ideas de Dunant. La Cruz Roja en una bandera blanca se convierte en el símbolo internacional de protección para los ayudantes. En 1901, Dunant recibió el primer Premio Nobel de la Paz del mundo."
 panum.3011.t: "La convención [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_convention_title')]"
 panum.3011.d: "Se convocó una conferencia internacional en [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_convention_title')] para establecer la protección de los heridos, la neutralidad del personal médico y la Cruz Roja como símbolo de protección."
 panum.3011.f: "'Pero las mujeres de Castiglione, al ver que no me enojo distinción entre las nacionalidades, siguieron mi ejemplo, mostrando la misma amabilidad a estos hombres cuyos orígenes eran tan diferentes, y todos los extranjeros para ellos. \"Tutti Fratelli\", repitieron sintiendo. ¡Todo honor a estas mujeres, a estas chicas de Castiglione! Imperturbable, innecesario, inquebrantable, su silencioso sacrificio de sí mismo hizo poco fatiga y horrores, y de su propia devoción. -Henry Dunant"
 panum.3011.g: "[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_convention_title')] Convención. Suena bien."
 panum.3012.t: "Los tratados [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_convention_title')]"
 panum.3012.d: "Se programó una conferencia internacional en [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_convention_title')] para promover el desarme y extender las reglas de derecho internacional previo para la guerra terrestre a la guerra marina."
 panum.3012.f: "'El sentido moral de la importancia de la vida humana; el deseo humano de aligerar un poco de los tormentos de todos estos pobres miserables, o reafirmar su coraje destrozado; la actividad furiosa e implacable que un hombre convoca en tales momentos; Todos estos se combinan para crear un tipo de energía que se convierte en un ansia positivo para aliviar hasta que uno pueda. -Henry Dunant"
 panum.3012.g: "[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_convention_title')] tratados. Suena bien."
 panum.3013.t: "El protocolo [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_convention_title')]"
 panum.3013.d: "Se convocó una conferencia internacional en [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_convention_title')] para prohibir el uso de gas venenoso en la guerra."
 panum.3013.f: "\"Dado que los nuevos y terribles métodos de destrucción se inventan diariamente, con perseverancia digna de un mejor objeto, y dado que los inventores de estos instrumentos de destrucción son aplaudidos y alentados en la mayoría de los grandes estados europeos, que se dedican a una carrera de armamento; Y dado que finalmente el estado mental en Europa se combina con muchos otros síntomas para indicar la posibilidad de guerras futuras, la evitación de la cual, tarde o temprano, parece apenas posible, en vista de todo esto, ¿por qué no se podría tomar una ventaja de un momento relativo de calma y tranquilidad para investigar y tratar de resolver una cuestión de tan inmensa y en todo el mundo, tanto desde el punto de vista humano como el cristiano? -Henry Dunant"
 panum.3013.g: "[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_convention_title')] Protocolo. Suena bien."
 panum.3021.t: "Un médico de la Cruz Roja"
 panum.3021.d: "Después de una derrota extremadamente sangrienta, un médico distinguió [SCOPE.sCharacter('panum_new_physician_scope').GetHerselfHimself] en el hospital de campo. [SCOPE.sCharacter('panum_new_physician_scope').GetSheHe|U] pertenece a la Cruz Roja y tal vez se llame a algo más alto que el simple servicio de campo."
 panum.3021.f: "'En uno de los hospitales de Crona, un médico italiano había dicho: mantenemos las cosas buenas para nuestros amigos del ejército aliado y les damos a nuestros enemigos las necesidades desnudas. Si mueren, ¡tanto peor! y agregó, para excusar estas palabras bárbaras, que había escuchado de algunos soldados italianos que habían regresado de Verona y Mantua, que los austriacos permitieron que los heridos del ejército franco-sardiniano moriran sin seres. Una noble dama de Cremona, condesa ..., que había escuchado las palabras del médico y se había estado dedicando a los hospitales con el mayor celo, se apresuró a mostrar su desaprobación al declarar que prestó exactamente la misma atención a los austriacos a los aliados, y no hizo ninguna diferencia entre amigos y enemigos. Porque, dijo, nuestro Señor Jesucristo no hizo tales distinciones entre los hombres en lo que hace bien. -Henry Dunant"
 panum.3021.g: "Bienvenido, Doctor [SCOPE.sCharacter('panum_new_physician_scope').GetLastName]."
 panum.740.t: "Un miedo menos infantil"
 panum.740.d: "Después de un gran esfuerzo, el médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] finalmente escribió el tratado [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] sobre un método de tratamiento exitoso para [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_disease_title')]. Se considera un hito en la medicina [ROOT.GetCountry.GetAdjectiveNoFlag]."
 panum.740.f: "La facultad médica esperaba ansiosamente el documento científico sobre el método de tratamiento de [ROOT.Var('panum_physician_var').GetCharacter.GetFullName]. En el tratado [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis], el médico describe una serie completa de medidas eficientes para combatir la escarapa. La medicina moderna ofrece una amplia gama de opciones para mantener a raya la escarlatina de manera efectiva incluso después de que la enfermedad se ha roto. Una antitoxina recién inventada juega un papel clave. El trabajo del médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] lleva el nombre [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_treatment_title')]."
 panum.740.g: "Innumerables padres ahora dormirán más tranquilamente."
 panum.741.t: "La prueba [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting]"
 panum.741.d: "El médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] desarrolló un procedimiento que lleva el nombre de [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] que determina si un paciente tiene inmunidad a la escarlatina o no."
 panum.741.f: "La prueba de Dick, desarrollada en 1924 por George F. Dick y Gladys Dick, se utilizó para identificar a aquellos susceptibles a la escarlatina. La prueba de polla implicó inyectar una cepa diluida de los estreptococos que se sabe que causan fiebre escarlata; Una reacción en la piel en el sitio de inyección identificó a las personas susceptibles a desarrollar fiebre escarlata. La reacción se pudo ver cuatro horas después de la inyección, pero fue más notable después de 24 horas. Si no se observó reacción en la piel, se suponía que la persona no estaba en riesgo de la enfermedad, habiendo desarrollado inmunidad a ella."
 panum.741.g: "Un procedimiento útil."
 panum.742.t: "Suero escarlata"
 panum.742.d: "El médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha desarrollado un suero efectivo contra la escarlata, que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] obtuvo de sangre de caballo."
 panum.742.f: "El suero escarlata se utilizó a partir de noviembre de 1900 después de su desarrollo en el Laboratorio Sero-Therapéutico del Hospital Rudolph en Viena, Austria. El suero fue tomado de la sangre de los caballos. Los niños infectados fueron inyectados en su piel abdominal por el Dr. Paul Moser. Las tasas de mortalidad de la escarlatina (también conocida como escarlatina) disminuyeron significativamente después del uso del suero sanguíneo. La antitoxina de Moser redujo la mortalidad de la escarlatina en un 40%."
 panum.742.g: "Sangre de caballo? Urgh."
 panum.743.t: "La antitoxina"
 panum.743.d: "Después de varias pruebas, el médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] está seguro de que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] ha producido una antitoxina que es efectiva contra la escarlatina."
 panum.743.f: "'A pesar de los recientes avances importantes en el conocimiento y el tratamiento de la escarlatina, esta enfermedad tan afectada ha dado un gran salto sobre sus prevalencias estacionales. Cuando se administra lo suficientemente temprano, la antitoxina aliviará el peligro de la escarlatina y sus frecuentes complicaciones posteriores. La enfermedad aún mantiene aspectos, sin embargo, que hacen que su eredicación sea extremadamente deseable. Se ha encontrado que el aumento de las dosis de la toxina dada a los susceptibles hará que tales personas sean inmunes."
 panum.743.g: "¡Un avance decisivo!"
