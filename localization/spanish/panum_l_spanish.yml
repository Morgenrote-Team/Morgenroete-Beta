 panum_cholera_condition: "Cólera" #NT!
 panum_cholera_condition_desc: "El cólera es una enfermedad peligrosa del intestino delgado. Se considera una epidemia decisiva del siglo XIX que causó millones de muertes en todo el mundo." #NT!
 panum_tuberculosis_condition: "Tuberculosis" #NT!
 panum_tuberculosis_condition_desc: "La tuberculosis se considera, junto con el cólera, una de las causas más comunes de muerte en la época victoriana. También conocida como tuberculosis, afecta principalmente a los pulmones." #NT!
 panum_smallpox_condition: "Viruela" #NT!
 panum_smallpox_condition_desc: "Conocida por sus pústulas que desfiguran la cara y el cuerpo, la viruela ha sido durante mucho tiempo una de las enfermedades más letales de la historia." #NT!
 panum_typhus_condition: "Tifus" #NT!
 panum_typhus_condition_desc: "El tifus ha aterrorizado a los soldados a lo largo de los siglos, en particular durante las guerras napoleónicas, cuando mató a miles de miembros del ejército. Ha vuelto a aparecer tras los desastres naturales." #NT!
 panum_yellow_fever_condition: "Fiebre amarilla" #NT!
 panum_yellow_fever_condition_desc: "La fiebre amarilla afecta principalmente a las zonas tropicales de América del Sur y África. En el Caribe, la enfermedad ha causado más muertes entre los soldados que cualquier guerra." #NT!
 panum_measles_condition: "Sarampión" #NT!
 panum_measles_condition_desc: "El sarampión es una enfermedad muy contagiosa, conocida por sus típicas manchas rojas en la piel. Puede tener consecuencias catastróficas, en particular en poblaciones que carecen de inmunidad previa." #NT!
 panum_scarlet_condition: "Escarlatina" #NT!
 panum_scarlet_condition_desc: "La escarlatina es una enfermedad muy extendida que fue una de las causas más comunes de muerte entre los niños hasta principios del siglo XX." #NT!
 panum_plague_condition: "Plaga" #NT!
 panum_plague_condition_desc: "La peste bubónica se equipara a la «muerte negra» de la Edad Media, una de las peores catástrofes de la historia. El nombre proviene de las protuberancias dolorosas e hinchadas que produce." #NT!
 panum_diphteria_condition: "Difteria" #NT!
 panum_diphteria_condition_desc: "La difteria es una enfermedad peligrosa que puede provocar complicaciones potencialmente mortales y consecuencias a largo plazo." #NT!
 panum_polio_condition: "Polio" #NT!
 panum_polio_condition_desc: "La poliomielitis es una enfermedad que afecta principalmente a los niños y a menudo provoca la muerte o complicaciones físicas de por vida." #NT!
  
