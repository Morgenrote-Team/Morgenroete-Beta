 je_panum_medical_system_project: "Ampliar el sistema médico" #NT!
 je_panum_medical_system_project_reason: "Un médico que tiene que ampliar el sistema médico trabaja principalmente a nivel local para mejorar la atención sanitaria, pero también es necesaria una infraestructura administrativa. En este caso, resulta de gran ayuda un médico con talentos ventajosos que deje huella en la burocracia. Sus habilidades y experiencia impulsan el progreso mensual en la creación y construcción de nuevos hospitales y clínicas.\n\nLos médicos intentarán primero establecer clínicas en áreas especialmente desarrolladas antes de recurrir a clínicas en regiones menos desarrolladas. Los médicos preferirán el estado que tenga el nivel más alto de edificios administrativos.\n\nCada vez que se llena la barra de progreso, se activa una nueva clínica/hospital y se continúa trabajando en el siguiente estado adecuado. Los médicos activarán tantas clínicas y hospitales como sea posible como método de producción hasta que no haya más estados con los requisitos necesarios o hasta que el trabajo se detenga manualmente." #NT!
  
 panum.2101.t: "Sistema médico ampliado" #NT!
 panum.2101.d: "El Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha finalizado su trabajo y ha ampliado y modernizado las instalaciones médicas locales. El médico está disponible nuevamente para otras actividades." #NT!
 panum.2101.f: "«La medicina es una ciencia social y la política no es nada más que medicina a gran escala.» - Rudolf Virchow" #NT!
 panum.2101.g: "De vuelta al trabajo." #NT!
 panum.2102.t: "Clínica de Especialidades en [SCOPE.sState('panum_clinic_state').GetName]" #NT!
 panum.2102.d: "Con la ayuda del Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] se creó en [SCOPE.sState('panum_clinic_state').GetCityHubName] el primer consultorio especializado de nuestro país. El doctor anunció que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] lo dirigirá [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself] y se especializará en un área, aunque todavía no está claro en qué área deben concentrarse los especialistas." #NT!
 panum.2102.f: "“La educación médica no existe para proporcionar a los estudiantes un medio de vida, sino para garantizar la salud de la comunidad”. -Rudolf Virchow" #NT!
 panum.2102.g: "Cirugía." #NT!
 panum.2102.h: "Psiquiatría." #NT!
 panum.2102.i: "Epidemiología." #NT!
 panum.2102.j: "Medicina Militar." #NT!
 panum.2102.k: "Medicina General." #NT!
 panum.2103.t: "Hospital en [SCOPE.sState('panum_clinic_state').GetName]" #NT!
 panum.2103.d: "Hoy, con gran interés del público y presencia de la prensa, el Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] inauguró en [SCOPE.sState('panum_clinic_state').GetCityHubName] el primer hospital moderno del país, que marca un antes y un después con sus quirófanos y modernos equipos médicos." #NT!
 panum.2103.f: "«La maldición de la humanidad es que aprende a tolerar incluso las situaciones más horribles por hábito». -Rudolf Virchow" #NT!
 panum.2103.g: "¡Bravo!" #NT!
  
