 panum.51.t: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] viaja al estado epidémico"
 panum.51.f: "Una descripción completa de una enfermedad es un primer paso para comprenderla y luego combatirla. Las descripciones aún no tienen un efecto directo en el alivio, pero son la base de un método de tratamiento posterior. Los médicos que estudian una epidemia en su propio país trabajan de manera más efectiva que los médicos en un viaje al extranjero."
 je_panum_cholera_description: "Diagnóstico de cólera"
 je_panum_tuberculosis_description: "Diagnóstico de tuberculosis"
 je_panum_smallpox_description: "Diagnóstico de viruela"
 je_panum_typhus_description: "Diagnóstico de tifus"
 je_panum_yellow_fever_description: "Diagnóstico de fiebre amarilla"
 je_panum_cholera_description_reason: "El Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] está examinando actualmente a varios pacientes para determinar los síntomas del cólera #YELLOW#!. Es crucial poder diferenciar entre otras enfermedades similares, similares o coexistentes. Al final de su trabajo, el científico pone su descripción a disposición del público para que las generaciones futuras tengan una mejor oportunidad de reconocer los antecedentes de la enfermedad y encontrar métodos de tratamiento."
