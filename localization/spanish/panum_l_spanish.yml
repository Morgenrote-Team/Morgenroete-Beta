 je_panum_medical_research_project: "Investigación médica" #NT!
 je_panum_medical_research_project_reason: "El Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] está impulsando actualmente la investigación médica. Además de las innovaciones médicas, el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] también puede encontrar curas para enfermedades que no se encuentran entre las diez enfermedades epidémicas clásicas. Cada vez que el progreso alcance el [JournalEntry.GetTotalGoalValue|V0], obtendremos un pequeño impulso tecnológico. #n Este proyecto continuará indefinidamente. Utilice el botón para detenerlo. #!" #NT!
  
 notification_panum_technology_boost_from_physician_notification_name: "El Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] acelera la investigación" #NT!
 notification_panum_technology_boost_from_physician_notification_desc: "Gracias al Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] la tecnología médica recibió un impulso de progreso." #NT!
  
