 panum_vitamins_tech: "Vitaminas" #NT!
 panum_vitamins_tech_desc: "Al aislar ciertos nutrientes que el cuerpo necesita, es posible garantizar que más personas tengan una dieta sana y equilibrada." #NT!
  
 panum.2006.t: "La teoría de los gérmenes se refuerza" #NT!
 panum.2006.d: "El congreso médico también ofreció la oportunidad a varios médicos de intercambiar ideas sobre las causas de la enfermedad. Cada vez es más evidente que cada vez menos investigadores creen en la teoría tradicional de los miasmas. La teoría de los gérmenes se considera hoy la norma entre los eruditos más respetados." #NT!
 panum.2006.f: ""En los últimos tiempos se ha producido un cierto cambio, en el sentido de que los países ya no proceden de forma tan parcial como antes y cada uno de ellos adopta de otro los métodos de defensa que parecen bien probados. Sin embargo, en medio de la gran variedad de métodos y medios de lucha contra la tuberculosis, es necesario preguntarse qué medidas satisfacen mejor las exigencias científicas y los conocimientos generales en la lucha contra las enfermedades contagiosas. Pero antes de responder a esta pregunta, debemos aclararnos perfectamente cómo se produce la infección en la tuberculosis, es decir, cómo los bacilos tuberculosos invaden el organismo humano, ya que todas las medidas profilácticas contra una enfermedad infecciosa sólo pueden estar dirigidas a impedir que los gérmenes de la enfermedad invadan el cuerpo". -Robert Koch" #NT!
 panum.2006.g: "Esta evidencia no puede descartarse de plano." #NT!
 panum.2201.t: "La teoría del miasma pierde soberanía interpretativa" #NT!
 panum.2201.d: "Cada día que el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] se centra más en nuevos métodos de investigación, la teoría tradicional de los miasmas pierde relevancia. La teoría de los gérmenes parece más convincente." #NT!
 panum.2201.f: "«¡Señores, serán los microbios quienes tendrán la última palabra!» -Louis Pasteur" #NT!
 panum.2201.g: "¿Entonces la teoría del miasma es cuestionable?" #NT!
  
