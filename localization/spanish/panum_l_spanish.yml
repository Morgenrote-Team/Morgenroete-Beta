 panum.138.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_description_title')]"
 panum.138.d: "El médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] presentó [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] Descripción de la enfermedad de [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_disease_title')] hoy. La facultad médica ya lo ve como un clásico."
 panum.138.f: "En [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] tratado [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_description_title')] [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] trata de la enfermedad con más detalle que cualquier otro médico en nuestro país antes. Educa al lector sobre los síntomas, el período de incubación y la diferenciación de otras enfermedades, así como una cronología de epidemias pasadas y otras descripciones epidemiológicas tradicionales."
 panum.138.g: "Ahora conocemos mejor a la bestia."
 panum.139.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_treatment_title')]"
 panum.139.f: "La facultad médica esperaba ansiosamente el documento científico sobre el método de tratamiento de [ROOT.Var('panum_physician_var').GetCharacter.GetFullName]. ¿Este trabajo quizás tendría un gran avance? [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_treatment_title')] podría salvar la vida de innumerables personas. Las razones por las que describe para el estallido de [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_disease_title')] y las formas en que se puede prevenir o tratar después podrían cambiar fundamentalmente la forma en que se ha pensado esta enfermedad."
 panum.139.g: "[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_disease_title')] está perdiendo su horror."
 panum.140.t: "Cólera: ¡una enfermedad de nacimiento del agua!"
 panum.140.d: "Gracias al trabajo heroico del médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], ¡el estallido del cólera en [SCOPE.sState('panum_disease_state').GetCityHubName] ha sido aplastado decisivamente!"
 panum.140.f: "'Desde el comienzo de mi tiempo aquí en [SCOPE.sState('panum_disease_state').GetCityHubName], he reunido una gran cantidad de información que apunta a una conclusión: el cólera es una enfermedad transmitida por el agua. La enfermedad que ha matado a tantos durante siglos no se encuentra en el aire, como miasma, sino que se retorce y enjambres en gotas de agua. Ingencado, se desarrolla en el intestino y se manifiesta en el cólera que hemos aprendido a luchar. Es una lección muy aprendida, pero rápidamente actuó. La semana pasada, eliminaron las manijas de la bomba de agua en el corazón de este brote. Hoy, me retiro a la noche sin un solo caso nuevo traído a mi mesa. Es irrefutable. La bestia es asesinada. No deseo poder reclamar la responsabilidad total y exclusiva de los descubrimientos que hicimos aquí, solo que podrían haber sido descubiertos incluso antes. Se perdieron muchas vidas por falta de agua potable limpia, jóvenes y mayores. Si tenemos suerte, que este sea el último que enfrentamos el cólera."
 panum.140.g: "¡Increíble! ¡Este es un golpe mortal para la teoría del miasma!"
 panum.141.t: "La cervecería"
 panum.141.d: "La investigación del médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha llevado [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] a una isla de seguridad en el brote: una cervecería de cerveza."
 panum.141.f: "'¡Hola! Me dijeron que debes ser el capataz aquí en la cervecería. Soy el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], y estoy aquí para investigar el brote. Por favor, dime más. '\ N \ n'well, no ha sido un gran problema aquí abajo. La mayoría de las otras fábricas han estado cerrando, pero no nosotros ''. ¿Tienes alguna idea de por qué? '\ N \ n'No la primera pista, me temo. Pero si tuviera que apostar, ¿es porque los muchachos no van a casa con todo lo que apesta \". El jefe nos permite tener a todos algunos de los lotes más antiguos que no se venden bien con el almuerzo, un poco recogerme para los niños a bajo precio. Nada de ese agua de pozo para nosotros, solo una cerveza de cerveza por casi tan poco como cuesta hacer '."
 panum.141.g: "Hmmm ... para que no bebas el agua local. Muy fascinante."
 panum.142.t: "Criaturas de hábito"
 panum.142.d: "La investigación del médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] continúa - [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] ha encontrado lo que podría ser el centro del brote."
 panum.142.f: "'... pero tan comunes fueron los casos en el área que me di cuenta de que necesitaba más orientación. Afortunadamente, la oficina del forense local demostró ser de la máxima asistencia: habían escrito la dirección de cada casa desde la que habían tomado un cuerpo o se dieron cuenta de una enfermedad, y eso me proporcionó los medios para colocar cada una con precisión en un mapa simple. El área resultante es vasta, que abarca más de cien casas, pero también forma un vasto círculo. Si fuera un miasma, entonces seguramente sería llevado por la brisa, viajando a lo largo de los vientos predominantes. En cambio, va más allá de los vientos, redondos e inquietantes. Caminé hacia el centro de todo, tal vez con la esperanza de encontrar algo de pista ... y encontré nada menos que una bomba de agua. Cada casa en la tabla estaba a poca distancia. Debe haber algún tipo de conexión."
 panum.142.g: "¿Podría ... estar en la bomba, de alguna manera?"
 panum.143.t: "Los extraños"
 panum.143.d: "El doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha encontrado algo interesante: una ruptura en el patrón."
 panum.143.f: "'¡Oh, gracias a los cielos! ¡Debe ser el médico del que está hablando, Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]! Por favor, debe ayudarnos. '\ N \ n'i tiene la intención de, señora. Por favor, dígame todo lo que pueda sobre usted y los suyos, y no ahorre ni siquiera el más mínimo detalle si puede. ¿El suyo parece ser uno de los únicos casos en este vecindario? ¡Acaba de salir de la nada! ¡Tomamos todas las precauciones, incluso usando una de ellas máscaras florales con todas las flores para mantener a raya a los hirviendo! ' ¿Lo que sea para?"
 panum.143.g: "... ¿Dijiste que trajiste agua de su bomba?"
 panum.144.t: "Los filtros"
 panum.144.d: "¡En [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] intenta descubrir más pistas sobre el brote, el médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha descubierto que todas las víctimas tienen su agua de la misma compañía!"
 panum.144.f: "'... pero es lo más curioso de todo. Cuando viajé por la carretera, o río arriba, a las casas apoyadas por New River Company, la cantidad de casos de cólera cayó dramáticamente. No era más de lo habitual, si eso. Regrese hacia el sur, y uno encuentra que las calles están en llamas con cólera, llena de hedor de intestinos y muerte no establecidos. ¿Podría ser esto una localización del suelo miasmático? \ N \ ni pensar no. Parece demasiado marcado. Me puse en contacto con los honorables caballeros de New River Company, y me informaron que sus tuberías estaban cerradas recientemente mientras agregaban nuevos filtros, a gran costo, a su estación de bombeo. ¿Podrían estos filtros estar desempeñando un papel invisible en esto? ¿Podría ser una limpieza inactiva del agua manteniendo a raya el miasma, o algo más?"
 panum.144.g: "... ¿Hay algo en el agua que traiga enfermedad?"
 panum.145.t: "Agua marrón"
 panum.145.d: "Equipado con los últimos instrumentos para la investigación [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis], el médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha utilizado el microscopio [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] para examinar muestras del brote de cólera."
 panum.145.f: "No había sido fácil llevar el microscopio hasta [SCOPE.sState('panum_disease_state').GetCityHubName], ya que un golpe en el camino casi había destrozado cada lente ... pero ahora que estaba aquí, el médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] tenía una de las mejores herramientas en la medicina moderna a su disposición. Unas pocas docenas de muestras se reunieron del agua local, cuidadosamente preparadas, y cada una vista bajo el microscopio. Algunos vinieron de áreas con menos cólera. Esos fueron los más limpios, [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] anotados. \ N \ nbut los sucios? Los que se montaron con la suciedad del tipo más vil? Una ceja cepillada, un momento de pensamiento. Parpadeadores de mugre flotando en el líquido, como copos de nieve sucia. Aquí, allá, los pequeños movimientos de microbios inofensivos, inocentemente revoloteando sobre la miserable sopa."
 panum.145.g: "... ¿O no eres tan inofensivo como pareces?"
 panum.145.h: "Más evidencia de otra teoría."
 panum.145.i: "Tiene que haber más en eso."
 panum.146.t: "La primera muerte"
 panum.146.d: "Después de un trabajo e investigación incansable, el médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha rastreado el brote hasta el primer caso registrado: un bebé recién nacido."
 panum.146.f: "Había pocos recordatorios más sombríos de lo que hizo el Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] que visitar la casa de una mujer en lo peor de luto, una mujer que había sido una vez una esposa y una vez una madre, pero ahora tampoco. Ya, apenas fuera de los escalones de su puerta, el médico estaba tomando sus notas. Regresó con el cólera. Nappies lavados, posiblemente cargando enfermedad. \ N \ nhusband regresó del trabajo. Thirsty después del turno en Steel Mill. Comió bien, bebió bien, murió al final de la semana, el cólera. \ N \ nbehind ellos, llorando. Antes, calles lluviosas y desoladas. Entre todo, una oración susurrada."
 panum.146.g: "Por favor, que haya un final para todo esto."
 panum.147.t: "El pozo"
 panum.147.d: "Mientras realiza la investigación [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis], el médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha encontrado algo que se pasa por alto: un punto cess."
 panum.147.f: "El doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] no era aficionado a la teoría de miasma, pero [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] se encontró muy agradecido por las máscaras florales destinadas a mantenerla a raya. El punto cess estaba lleno de desechos podridos y completamente, completamente rancio. ¡Incluso el inspector de policía se alejó de su borde. \ N \ n'doctor! ¡Tal pozo seguramente debe ser la fuente de este miasma, y ​​el cólera miserable que nos da! ¿Ves la forma en que la lluvia fluye hacia la tierra, aquí? Debe fluir a través de ellos, pero si es así, tomaría el agua cerca de la bomba. Si los accesorios están comprometidos ... '\ n \ n' ... entonces atascó agua residual en el mango. Puaj. Algo bueno que la enfermedad no se extiende a través del agua ... '"
 panum.147.g: "...¿bien?"
 panum.147.h: "¡Equivocado!"
 panum.148.t: "La mansión"
 panum.148.d: "La investigación del médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha llevado [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] a un agujero curioso en el alcance del brote, el hogar de un hombre rico."
 panum.148.f: "'Visité la residencia de un caballero local hoy, una vivienda más grande dentro de los confines de la ciudad, peligrosamente cerca del corazón del brote. Parecería un remanente de un día anterior en la historia de esta ciudad, cuando esta parte era más rica que un pobre barrio pobre. El maestro de la casa estaba bastante fascinado por la investigación, y me proporcionó muchos libros sobre la historia local con la esperanza de que pudieran iluminar los brotes pasados. Más interesante, dejaron en claro que el cólera aún no ha alcanzado sus paredes. Incluso sus sirvientes no están afectados, los que viven en los cuartos, al menos. Comen del almacén y beben del pozo artesiano dentro de las paredes, y de alguna manera, esto no se ve afectado. Un curioso enigma. ¿Es algo que tienen que los demás no?"
 panum.148.g: "¿O ... quizás los sirvientes carecen de algo que los enfermos podrían tener?"
 panum.149.t: "La pequeña muerte"
 panum.149.d: "La investigación del médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] posiblemente ha revelado al culpable: ¡un microbio!"
 panum.149.f: "'' ... pero aún así, tenía que estar especialmente seguro. Llamé a muestras frescas, tomadas tanto del agua como del efluente especialmente preparado de los enfermos. Colocado sobre el vaso de mi microscopio, pude mirar dentro de estos líquidos y confirmar la presencia de lo que debe ser nuestro gran enemigo en esta batalla: vibradores. Pero cada muestra de los enfermos confirma su presencia, y parece seguro decir que estas criaturas están jugando algún papel en esta enfermedad. ¿Son ... Cólera en sí? Tal vez. Si es así, es evidencia contundente de la teoría de que los gérmenes como esta causan enfermedad. Ahora, debemos matarlos."
 panum.149.g: "Limpie y trate, hasta que esté hecho."
 panum.149.h: "Este descubrimiento va mucho más allá del cólera."
 panum.150.t: "Un asunto práctico"
 panum.150.d: "Un aliado raro en la batalla contra la enfermedad, el médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] se reúne con el forense en [SCOPE.sState('panum_disease_state').GetCityHubName] para discutir sus hallazgos."
 panum.150.f: "¡Ah, debes ser médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]! Perdóname por no estrecharte la mano, he estado hurgando en los cadáveres durante los últimos días. '\ N \ n' ... Créeme, no necesitas pedir mi perdón. Eres el forense local, por favor, cuéntame de tus hallazgos. Más que eso, no necesito decir. Vómitos, purgando, un intestino tan obstruido que parece claras de huevo, alguien tan aprendido como sabrá la lista. '\ N \ n'of, pero ¿qué es lo que parece interesante? Estaría muerto por ahora si es así. He tenido muchos cuerpos en esa mesa, médico. Esto apesta de intoxicación alimentaria, pero no lo es."
 panum.150.g: "Un pensamiento muy fascinante. Dime más."
 panum_physician_health_malus_modifier: "Trabajo inquieto"
 panum.151.t: "La fábrica de herramientas"
 panum.151.d: "Mientras trabaja en la investigación de [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis], el viaje del médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a una fábrica de herramientas locales plantea más preguntas de las que hace respuestas."
 panum.151.f: "'Cuando fui a la fábrica de herramientas el otro día, las cosas parecían estar teniendo sentido al principio. Esta fábrica se especializa en cuchillos, herramientas de carnicero y similares, por lo que tienen una estación de afilado. Utiliza ruedas de agua para convertir una gran cantidad de piedras, afilando las ruedas para terminar el borde en cada cuchilla. Cada trabajador yacía sobre sus barrigas cerca del molinillo y podría ser salpicado con agua. Tal tiene sentido, y si el brote en la fábrica hubiera sido limitado allí, habría tenido sentido. \ N \ n \ n \ n \ n \ n \ n \ n \ n \ n \ n \ n \ n \ n \ n \ n \ n \ n \ n \ n \ n \ n \ n \ n \ n \ n \ n \ n \ n \ n \ n \ n \ n \ n \ n \ n \ n \ n \ n \ n \ n \ n \ n \ n the Thing, then, then, the the Thel’s the Tending Se ve en cualquier otro lugar. Hay hombres en la fábrica que se enferman después de nunca estar cerca de la calle en el corazón de este brote, ni en las ruedas de afilado. ¿Cómo podría esto incluso ser posible?"
 panum.151.g: "Aparentemente una pista equivocada."
 panum.151.h: "Aparentemente una teoría equivocada."
 panum.152.t: "El frasco"
 panum.152.d: "Desafortunadamente, el médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha estado persiguiendo un callejón sin salida, un caso local de intoxicación alimentaria, no relacionada con el cólera."
 panum.152.f: "'Hoy fue un día muy agravante. La policía me llamó para investigar un brote repentino de enfermedad en un hotel popular, que parecía ser una explosión repentina de cólera. Había reunido todas mis cosas para investigar, alertando a las autoridades apropiadas de encontrar camas y cuidar a los enfermos, sin embargo, en el momento en que llegué supe que no era el cólera. Los síntomas estaban mal, el inicio repentino demasiado rápido. Una causa más local tuvo que tener la culpa, y como era de esperar, todos los que se ve afectados habían comido la misma comida. \ N \ na aventura en las cocinas reveló al culpable: un frasco de paté de pato seguramente expirado, manchado sobre pan fino por una cocinera con una nariz demasiado bloqueada por una fría para oler la pudrición. Una pérdida de tiempo si alguna vez hubo una. La intoxicación alimentaria no es la cólera."
 panum.152.g: "... Bueno, al menos sabemos que aclarar los armarios, al menos."
 panum.153.t: "Extravagantes"
 panum.153.d: "Se produjo un accidente durante la investigación del médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] - [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] mezclar sus muestras!"
 panum.153.f: "Pero justo en medio del trabajo, tuve una interrupción. Gritando, gritando, el sonido de una pelea en la calle. Una pelea borracha, una taza demasiada. La policía se apresuró a ordenarlo, arrastrándolos, gritando aún. Más tonto soy que no me di cuenta de que puse las muestras en el orden incorrecto, y de dónde hacer mi trabajo en el orden incorrecto, para registrar cada una en el orden incorrecto?"
 panum.153.g: "Semanas de trabajo, desperdiciado. Condenación."
 panum.154.t: "¿El asesino de imitación?"
 panum.154.d: "La investigación del brote de cólera en [SCOPE.sState('panum_disease_state').GetCityHubName] ha dado un giro alarmante: ¡parece que puede haber otra enfermedad!"
 panum.154.f: "'Ah, es bueno conocerlo de nuevo, Doctor %Nombre %. Mi mesa ha estado ocupada esta semana la semana pasada. '\ N \ ni no lo llamaría bueno conocerte, forense. ¿Qué tenemos? En su mayoría niños también, y los ancianos. '\ N \ n'Cholera es aún más letal para los vulnerables que para cualquier otra persona. ¿Estás seguro de que esto no es así? '\ N \ n'it no es como si escriba su nombre en el interior de sus venas. Disentería, cólera, tifus? Intoxicación alimentaria común? ¿Quién puede decirlo? Lo único que sé es que no parece lo mismo. No tengo el blanco, como el cólera, pero la muerte es la misma. '\ N \ n'T'TEN podríamos tener una segunda enfermedad ... explosión y condenación. ¿Cómo vamos a distinguir a los dos?"
 panum.154.g: "No puedo hacer un plan si no sé lo que estoy luchando."
 panum.155.t: "El miasma ...?"
 panum.155.d: "El médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] y [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] la investigación se ha encontrado con un problema, ¿podría ser el miasma es real?"
 panum.155.f: "'' ... pero los resultados de este último cuadrante de la investigación desafían los razonamientos de la teoría de los gérmenes, y no puedo por mí, por qué. Las casas se sientan además de un canal poco profundo, frecuentemente viajado por barcazas que entregan carbón a las fundiciones. No están dentro del campo fácil de caminar de ninguna bomba de agua, excepto un pozo viejo. Es puro, quizás el más puro de la ciudad. \ N \ nyet, por alguna razón más allá de mí, el cólera está aquí. Ya trabajan para mantener a raya el hedor, y el hedor, el miasma, realmente está allí. El canal apesta a efluentes ... pero si no beben esta agua, ¿de qué otra manera pueden ser dañados por el olor solo?"
 panum.155.g: "El miasma no puede ser correcto ... ¿puede?"
 panum.156.t: "Deconstruido"
 panum.156.d: "Con el hambre de cada vez más tierras sobre la construcción, el desarrollo de [SCOPE.sState('panum_disease_state').GetCityHubName] no tiene tiempo para detenerse, incluso para la investigación del Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]."
 panum.156.f: "'' ... ¿quién eres de nuevo? '' El médico investiga este brote. Esta calle estaba llena de gente enfermiza. ¿Dónde están? '' \ N \ n'No una pista. Los muchachos y yo estamos aquí para comenzar a derribar estas casas. ¿Qué? ¡Estas casas eran el hogar de una docena de familias, todas infectadas con el cólera! '\ N \ n'well, ya no ya no son. El propietario entregó el lote de los ''. No está pagando el alquiler como este, pero no importaría de todos modos. La tierra va a ser una fábrica textil, y si no te importa, los niños y yo tenemos que comenzar a trabajar derribando estas casas."
 panum.156.g: "Oh, por el bien del cielo. Ahora tengo que encontrar a los enfermos de nuevo ... simplemente no bebas nada."
 panum.157.t: "Contaminado"
 panum.157.d: "¡Terrible noticias! The doctor has been infected with Cholera!"
 panum.157.f: "'No sé cómo sucedió. ¿Miasma? He estado cerca de los enfermos, los muertos y los moribundos durante semanas, más que nadie. Gérmenes? No bebí el agua, pero ¿qué pasa con la contaminación? ¿Podría ser extendido por el tacto? ¿En el aire, en superficies? No lo sé. \ N \ nbut con los síntomas. El estómago se molesta y cómo nunca termina. También podría comer y beber nada, a pesar de todo lo bueno que me hace. It speaks a thousand truths, and one.\n\nI have cholera.'\n\nFrom the journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], writing of the Great Cholera Epidemic of [TimeKeeper.GetCurrentDate.Format('y')], investigating in [SCOPE.sState('panum_disease_state').GetCityHubName]"
 panum.157.g: "Oh, espero que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] mejore pronto."
 panum.161.t: "Un lugar de ginebra"
 panum.161.d: "El doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha tomado un tiempo lejos de su trabajo para 'investigar' su otra pasión: el alcohol."
 panum.161.f: "'... Pero mientras estaba en mi segundo vaso de esa bebida más maravillosa, comencé a darme cuenta de algo bastante extraño. Cuantas más personas vinieron a este lugar para beber, menos probabilidades de que se vean afectadas por el cólera. ¡En efecto! Mi propio mapa de trazado muestra que esas casas más cercanas a este lugar tienen una posibilidad sustancialmente menor de ser afectada por esta maldita enfermedad. \ N \ n. He hablado más con el propietario y varios de los lugareños más afables, y parecen estar de acuerdo. Hay algo en este lugar que parece ayudar a defenderse de la enfermedad. Debería investigar más '."
 panum.161.g: "Ah, las maravillas de los negocios y el placer en uno."
 panum.162.t: "Bottom está arriba"
 panum.162.d: "Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha tomado el movimiento más audaz de todo - [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] dio cólera [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself] bebiendo agua contaminada!"
 panum.162.f: "'' ... Por supuesto, toda la mejor teoría del mundo no es nada sin práctica. A pesar de todo el trabajo, sigue siendo pero casualidad para mis detractores, quienes continúan afirmando que no hay evidencia irrefutable con la que consolidan mis pensamientos. Muy bien, entonces. Los conoceré de frente, y de la manera más directa de todos: beber la misma agua que se encuentra en el corazón de este brote, entregada por un corredor fiel. Si tienen razón, entonces no me enfermé incluso cuando me quitan del lugar. Si lo soy, entonces pronto estaré luchando por mi vida, pero ¿cuál es una vida, en comparación con tantos que podrían salvarse si puedo probar mis afirmaciones?"
 panum.162.g: "'Oh, querida, yo, me siento ... oh no."
 panum.162.h: "¡Disuade al médico de esta maniobra tonta!"
 panum.163.t: "Un mapa para el éxito"
 panum.163.d: "El médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha logrado elaborar un excelente mapa del núcleo del brote, lo que facilita el seguimiento del progreso de la enfermedad."
 panum.163.f: "'Caballeros, caballeros, les presento mi mapa de la infección en [SCOPE.sState('panum_disease_state').GetName]. Cubre, con excelente detalle, la ubicación de cada infección en la región, cronometrada y estampada en consecuencia, con el nombre y el número de muertes, infecciones, etc. Presenta una línea de tiempo escrita de toda la progresión del brote de cólera en este vecindario. Un ejemplo: aquí, vemos una bomba de agua y el número de casas a poca distancia. Si usted, los caballeros, se mirarían a sí mismos, verá que las áreas atendidas por esta bomba de agua tienen las tasas de mortalidad más altas de todas. Aquí, en esta tabla, vemos que la compañía de agua, [SCOPE.sState('panum_disease_state').GetName] Wells, tiene una correlación directa con estas bombas, lo que a su vez muestra que esta compañía tiene el mayor riesgo de cólera de todas las áreas con servicios ..."
 panum.163.g: "Esta será una ciencia algún día."
 panum.164.t: "Fuego y furia"
 panum.164.d: "La falta de progreso en la lucha contra el brote del cólera en [SCOPE.sState('panum_disease_state').GetName] ha desgastado la paciencia del médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]"
 panum.164.f: "Se escuchó el grito de casi una cuadra, y el sonido de libros y tazas arrojadas desde su mesa desde fuera de la puerta. Una oleada de maldiciones, disculpas frenéticas y desesperadas de asistentes asustados, luego más gritos, y más aún. ¡Ustedes imbéciles absolutos y absolutos! ¡Estamos aquí por una razón! ¡La gente se está muriendo fuera de nuestra puerta, y nos buscan salvarlos, y los guardemos! ¡Aquellos de ustedes que pueden, sigan mis órdenes a la carta, y venceremos esta miserable plaga! ¿Me oyes? '\ N \ n'yes, doctor!' \ N \ n'Now, vuelve a salir, ¡y encuéntrame más muestras! ¡Los correctos, esta vez!"
 panum.164.g: "Y así, el médico pone a su ejército en la marcha, listo para hacer la guerra contra la enfermedad misma."
 panum.165.d: "En un momento de valor total, el médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha visitado uno de los hospitales más afectados en [SCOPE.sState('panum_disease_state').GetCityHubName] para entrevistar a los pacientes allí."
 panum.165.f: "La sala de este hospital improvisado era un lugar lleno de gente, lleno de lugares de interés y sonidos, pero huele más que a cualquier otro. El olor a enfermedad. El olor a muerte. Las flores habían sido traídas para tratar de mantener a raya el hedor, e incienso, pero aún así, pocos llegaron a esta sala de los malditos. Era demasiado arriesgado, dijeron, demasiado peligroso para su propia salud. ¿Cómo podrían esperar ayudar a los demás, si ellos también yacían muriendo en una cama? El doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] era uno de ellos, y caminaron por este lugar de muerte y muriendo con coraje incesante y energía sin fondo. Se sentaron al costado del enfermo y solo, haciendo preguntas, tomando notas. Cada pensamiento, cada respuesta, fue preciosa. Eran las pistas de la salvación, los indicios de dónde podría provenir esta muerte y cómo también podría ser asesinado."
 panum.165.g: "Y en este Salón de la Muerte, un ángel de la vida caminó, diario en la mano."
 panum.166.t: "El poder de la oración"
 panum.166.d_christian: "En busca de información y quizás consuelo, el médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha buscado a un sacerdote en una catedral local."
 panum.166.d_muslim: "En busca de información y quizás consuelo, el médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha buscado un imán en una mezquita local."
 panum.166.d_other: "En busca de información y quizás consuelo, el médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha buscado a un sacerdote en un templo local."
 panum.166.f_christian: "'Hola, padre. Soy médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], enviado por el capital para investigar este brote y ofrecer cualquier ayuda que pueda. Pediría su ayuda en esto, si puede prestarla. Dime, niño. ¿Qué necesitas? ¿Quién fue el primero en sucumbir? ¿Dónde? ¿Se piensa de dónde podría haber venido? Ven, ven. He estado tomando escritos propios, después de todo."
 panum.166.f_muslim: "'As-Salamu Alaykum, Imam. Soy médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], enviado por el capital para investigar este brote y ofrecer cualquier ayuda que pueda. Pediría su ayuda en esto, si puede prestarla. Dime, ¿qué necesitas? ¿Quién fue el primero en sucumbir? ¿Dónde? ¿Se piensa de dónde podría haber venido? Ven, ven. He estado tomando escritos propios, después de todo."
 panum.166.f_other: "'Saludos para ti, sacerdote. Soy médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], enviado por el capital para investigar este brote y ofrecer cualquier ayuda que pueda. Pediría su ayuda en esto, si puede prestarla. Dime, doctor. ¿Qué necesitas? ¿Quién fue el primero en sucumbir? ¿Dónde? ¿Se piensa de dónde podría haber venido? Ven, ven. He estado tomando escritos propios, después de todo."
 panum.166.g_christian: "La limpieza está al lado de la piedad."
 panum.166.g_muslim: "Hay una cura para cada enfermedad."
 panum.166.g_other: "Conozca bien lo que lo lleva hacia adelante y lo que lo detiene."
 panum.167.t: "Seguro por lo siento"
 panum.167.d: "En un intento por mantenerse seguro mientras realiza su investigación, el médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha aislado de forma segura [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself] lejos de los infectados."
 panum.167.f: "'Hay algunos que llamarían a esto cobardía. Yo lo llamaría pragmatismo. Esta no es una batalla que se puede ganar rápidamente, donde uno simplemente se puede imponar una bayoneta en el vientre del enemigo y dejar que mueran rápidamente. Es una pelea más dura, contra un enemigo que no podemos ver ni escuchar, pero que podría estar en cualquier lugar a nuestro alrededor. El aislamiento es la mejor clave. Alimentos y agua de áreas seguras, un lugar limpio para estudiar, y todos los contacto con los infectados y sus posesiones se realizan a través de intermediarios. A la caja de la enfermedad, puedo investigar en paz y enfocar todos mis esfuerzos en descubrir la verdad detrás de esta enfermedad."
 panum.167.g: "... pero incluso [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] tendrá que ensuciarse [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] manos sucias eventualmente"
 panum.168.t: "Trabajo inquieto"
 panum.168.d: "Decidido a llegar a la base del brote de cólera, el médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha estado funcionando especialmente tarde."
 panum.168.g: "Luego, por supuesto, deambulemos estas calles, agente."
 je_panum_cholera_treatment_goal: ""
 je_panum_germ_theory: "Gérmenes y miasma"
 je_panum_germ_theory_reason: "Hipócrates de Kos se considera el fundador de la teoría de los miasmas, las exhalaciones tóxicas del suelo que se llevan en el aire y, por lo tanto, contribuyen a la propagación de enfermedades. En el siglo XIX, debido a la falta de conocimiento sobre bacterias y virus, los médicos e investigadores simplemente atribuyeron epidemias como el cólera a los malos olores que se propagaron a través de 'miasmas'. Esta teoría luego demostró ser un camino equivocado en la medicina, aunque el modelo de miasma ya explicaba en parte de dónde provienen las epidemias y cómo se propagan. El conflicto entre los contagionistas, que reclamaron la infección humana a humana, y los anticontagionistas, los partidarios de la teoría del miasma, a veces a mediados del siglo XIX. Las debilidades del modelo de miasma se reconocieron en Londres, aunque las reglas improvisadas para lidiar con los miasmas, como la limpieza y el aislamiento, limitaron las epidemias en cierta medida. El primer descubridor de la teoría de los gérmenes recibe un bono de investigación adicional."
 je_panum_germ_theory_goal: ""
 notification_panum_germ_theory_notification_name: "Avance de la teoría de los gérmenes"
 notification_panum_germ_theory_notification_desc: "Un [concept_panum_physician] de [GetGlobalVariable('panum_germ_theory_invented_global_var').GetCountryDefinition.GetName] ha podido, por primera vez, justificar de manera concluyente la teoría de los gérmenes en todas sus facetas. La teoría del miasma fue completamente rechazada."
 panum.11.t: "La teoría de los gérmenes"
 panum.11.d: "Dada la abrumadora evidencia de la teoría de los gérmenes, y la evidencia igualmente abrumadora contra la teoría del miasma, se ha producido un cambio de paradigma médico. No es menos importante al Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] que la teoría de los gérmenes se haya establecido ahora."
 panum.11.f: "La teoría del miasma es un ejemplo típico de una tesis científica que es difícil de refutar, ya que presumiblemente se confirma en todas partes. El hecho de que las regulaciones de limpieza e higiene para el \"aire limpio\" aseguraron que algunas enfermedades realmente desaparecieran parecía confirmarse en el siglo XIX. Al mismo tiempo, evitó que la ciencia médica hiciera avances en una amplia variedad de campos porque las verdaderas causas y, por lo tanto, los métodos de curación reales seguían desconocidos. A partir de ahora, los médicos tendrán un mayor éxito en la búsqueda de métodos de tratamiento, y el camino es claro para la investigación de patógenos y vacunas."
 panum.11.g: "¿Pero realmente queríamos saber qué sucede en el agua ...?"
 panum.53.t: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] viaja al estado epidémico"
 panum.53.f: "Los métodos de tratamiento son el paso más importante para combatir una enfermedad. Es la base de una posible vacuna futura que puede prevenir una epidemia. Sin embargo, incluso un método de tratamiento exitoso es lo suficientemente fuerte como para contener epidemias futuras y minimizar su longitud y gravedad, lo que resulta en un número significativamente menor de víctimas. Los médicos que estudian una epidemia en su propio país trabajan de manera más efectiva que los médicos en un viaje al extranjero."
 panum.53.g: "¡Este horror debe terminar!"
 panum.54.t: "Expedición de investigación médica"
 panum.54.d: "El Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha reunido a un pequeño equipo de expertos y asistentes que son adecuados para estudiar intensamente una epidemia en el extranjero y posiblemente desarrollar un nuevo método de tratamiento. Ahora surge la pregunta sobre qué enfermedad debe observarse en qué país."
 notification_panum_epidemic_spread_notification_name: "La epidemia se está extendiendo"
 notification_panum_epidemic_spread_notification_desc: "La epidemia se ha extendido a otro estado a pesar de nuestros mejores esfuerzos."
