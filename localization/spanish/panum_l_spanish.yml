 panum_antitoxins_tech: "Antitoxinas"
 panum_antitoxins_tech_desc: "Una antitoxina es un anticuerpo con la capacidad de neutralizar una toxina específica. Emil Adolf Von Behring y sus colegas produjeron antitoxinas a difteria y toxinas tétanos. Se consideran uno de los grandes hitos en la historia médica."
