 panum.3031.t: "El primer convento se convierte en una convención vinculante"
 panum.3031.d: "La abrumadora mayoría de los miembros de la Cruz Roja han acordado la primera convención internacional sobre el cuidado de la guerra herido. Ahora es vinculante para todos los miembros."
 panum.3031.f: "Las convenciones internacionales suelen ser declaraciones de intención no vinculantes. Sin embargo, si suficientes miembros de la Cruz Roja lo firman, con el tiempo se convertirá en un derecho internacional válido, que se espera que todos los firmantes cumplan, y los otros miembros también lo firmarán. Esto sucede cuando el 65 por ciento de todos los miembros y la mayoría de las grandes potencias están de acuerdo con esta convención; entonces todos los demás miembros se ven obligados a cumplir con ella. Esta convención ya no puede ser abolida como de costumbre. Para evitar convenciones vinculantes, es necesaria un retiro completo de la Cruz Roja, con todas las consecuencias."
 panum.3031.g: "Se crea un derecho internacional globalmente válido."
 panum.3032.t: "La segunda convención se convierte en una convención vinculante"
 panum.3032.d: "La abrumadora mayoría de los miembros de la Cruz Roja han acordado la Segunda Convención Internacional sobre Desarme y Guerra Naval. Ahora es vinculante para todos los miembros."
 panum.3033.t: "La tercera convención se convierte en una convención vinculante"
 panum.3034.t: "La convención internacional se vuelve vinculante"
 panum.3034.d: "La abrumadora mayoría de los miembros de la Cruz Roja han acordado una convención. Ahora es vinculante para todos los miembros."
 panum.3034.g: "Verificaremos si esto es de nuestro interés."
