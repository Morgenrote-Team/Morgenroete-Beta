 panum_medical_research_cost_modifier: "Costo de investigación médica"
 je_panum_medical_system_project: "Expandir el sistema médico"
 je_panum_medical_system_project_reason: "Un médico que se supone que debe expandir el sistema médico trabaja principalmente localmente para mejorar la atención médica. Pero también existe la necesidad de una infraestructura administrativa allí. Un médico con talentos ventajosos que causan una impresión en la burocracia es útil aquí. Sus habilidades y experiencia impulsan el progreso mensual en la creación y construcción de nuevos hospitales y clínicas. \ N \ ndoctors primero intentarán establecer clínicas en áreas particularmente bien desarrolladas antes de recurrir a clínicas en regiones menos desarrolladas. Los médicos preferirán el estado que tenga el nivel más alto de edificios de administración. Los médicos activarán tantas clínicas y hospitales como un método de producción posible hasta que no haya más estados con los requisitos necesarios o hasta que el trabajo se detenga manualmente."
 panum.2101.t: "Sistema médico expandido"
 panum.2101.d: "El Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha completado su trabajo y expandido y actualizado las instalaciones médicas locales. El médico ahora está disponible para otras actividades nuevamente."
 panum.2101.f: "'La medicina es una ciencia social, y la política no es más que medicina a gran escala.'- Rudolf Virchow"
 panum.2101.g: "Volver al trabajo."
 panum.2102.t: "Clínica especializada en [SCOPE.sState('panum_clinic_state').GetName]"
 panum.2102.d: "Con la ansiosa ayuda del Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], la primera clínica especializada en nuestro país se estableció en [SCOPE.sState('panum_clinic_state').GetCityHubName]. El médico ha anunciado que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] lo ejecutará [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself] y se especializará en un área, aunque aún no está claro en qué área deben concentrarse los especialistas."
 panum.2102.f: "\"La educación médica no existe para proporcionar a los estudiantes una forma de ganarse la vida, sino para garantizar la salud de la comunidad\". -Rudolf Virchow"
 panum.2102.g: "Cirugía."
 panum.2102.h: "Psiquiatría."
 panum.2102.i: "Epidemiología."
 panum.2102.j: "Medicina militar."
 panum.2102.k: "Medicina general."
 panum.2103.t: "Hospital en [SCOPE.sState('panum_clinic_state').GetName]"
 panum.2103.d: "Hoy, con gran interés público y la presencia de la prensa, el médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] abrió el primer hospital moderno del país en [SCOPE.sState('panum_clinic_state').GetCityHubName], que anuncia un punto de inflexión con sus quirófanos y equipos médicos modernos."
 panum.2103.f: "\"Es la maldición de la humanidad que aprende a tolerar incluso las situaciones más horribles por habituación\". -Rudolf Virchow"
 panum.2103.g: "¡Bravo!"
