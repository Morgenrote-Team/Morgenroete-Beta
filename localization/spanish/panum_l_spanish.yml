 panum.2621.t: "El concepto de ansiedad"
 panum.2621.d: "Søren Kierkegaard, filósofo principal de Dinamarca, ha publicado 'El concepto de ansiedad', un trabajo estético, filosófico y psicológico que ha captado la atención de la audiencia de Copenhague."
 panum.2621.f: "'La posibilidad de la libertad no es la capacidad de elegir el bien o el mal. La posibilidad es poder. En un sistema lógico, es conveniente decir que la posibilidad pasa a la actualidad. Sin embargo, en realidad no es tan conveniente, y se requiere un término intermedio. El término intermedio es la ansiedad, pero ya no explica el salto cualitativo de lo que puede justificarlo éticamente. La ansiedad no es una categoría de necesidad ni una categoría de libertad; Está enredado la libertad, donde la libertad no es libre en sí misma, sino enredada, no por necesidad, sino en sí misma. -Søren Kierkegaard"
 panum.2621.g: "Una de las mentes más grandes de Dinamarca."
 panum.2621.h: "Kierkegaard se convertirá en el nuevo escritor nacional de Dinamarca."
 panum.2622.t: "El extraño caso de [SCOPE.sCharacter('panum_phineas_gage').GetFullName]"
 panum.2622.d: "El médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha investigado el extraño caso del capataz [SCOPE.sCharacter('panum_phineas_gage').GetFullName]. Durante una explosión, una varilla de hierro disparó de abajo hacia arriba a través de su cráneo, creando un gran canal de heridas. Según el médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], fue recuperado físicamente después de unas pocas semanas, y sus habilidades intelectuales, incluida la percepción, la memoria, la inteligencia, la capacidad del lenguaje, así como sus habilidades motoras, estaban completamente intactas. Sin embargo, en el período posterior al accidente, [SCOPE.sCharacter('panum_phineas_gage').GetLastName] experimentó cambios de personalidad notables."
 panum.2622.f: "'Horrible accidente. - Como [SCOPE.sCharacter('panum_phineas_gage').GetFullName], un capataz en el ferrocarril en [SCOPE.sState('panum_phineas_gage_state').GetName], se dedicaba ayer a tamparse por una explosión, el polvo explotaba, llevando un instrumento de hierro a través de su cabeza una pulgada y un cuarto de circunferencia, y tres pies y ocho pulgadas de largo, que estaba usando en el momento. El hierro entró en el lado derecho de su cara, rompiendo la mandíbula superior, y atravesó el ojo izquierdo, y en la parte superior de la cabeza. \ N \ n La circunstancia más singular conectada con este asunto melancólico es que estaba vivo a las dos en punto de esta tarde, y en plena posesión de su razón, y libre de dolor. \ N \ nthe [ROOT.GetCountry.GetCapital.GetCityHubName] Chronicle"
 panum.2622.g: "¿Entonces las áreas de psique y cerebro están conectadas?"
 panum.2623.t: "Psicología transcultural"
 panum.2623.d: "Durante una visita a [SCOPE.sState('panum_colonial_state').GetName], el médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] se sorprendió al descubrir que las enfermedades mentales, como las que ocurren con frecuencia en [ROOT.GetCountry.GetCapital.GetCityHubName], apenas ocurren en esta área."
 panum.2623.f: "Emil Kraepelin viajó a Java durante cuatro meses en 1904 y examinó a 225 personas en el asilo mental de Buitenzorg (ahora Bogor). Como el único psiquiatra líder de su tiempo que estaba interesado en investigar fenómenos transculturales en psiquiatría, quería averiguar, por un lado, si ciertas formas de locura, que forman el contenido principal de nuestras instituciones, también existen en condiciones de vida completamente diferentes y entre las tribus completamente diferentes ocurren de la misma manera y con la misma frecuencia que la nuestra. Por otro lado, predijo que \"la frecuencia y las formas de locura algún día formarán un tesoro rico para una comprensión más profunda de las peculiaridades de un pueblo\"."
 panum.2623.g: "Aparentemente, algunas neurosis están relacionadas con antecedentes culturales."
 panum.2624.t: "Drogas"
 panum.2624.d: "El químico jefe [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] ha experimentado recientemente varias veces con sustancias por sugerencia del médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] para producir drogas psicotrópicas efectivas. El resultado, sin embargo, fue ... sorprendente."
 panum.2624.f: "'¿Querías verme con urgencia?' '\ N'yes. Sospecho que el experimento fue exitoso. Es efectivo contra la fatiga. Y ayuda contra el miedo. Quizás incluso un poco demasiado bueno."
 panum.2624.g: "¿Dietilamida de ácido lisérgico? ¿Qué es?"
 panum.2624.h: "Nuestros soldados podrían beneficiarse de un chocolate blindado."
 panum.2625.t: "Psicofísica"
 panum.2625.d: "El médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha postulado algunas teorías interesantes con respecto a la interrelación entre la experiencia psicológica subjetiva y los estímulos físicos cuantitativamente medibles."
 panum.2625.f: "La psicofísica investiga cuantitativamente la relación entre los estímulos físicos y las sensaciones y percepciones que producen. La psicofísica se ha descrito como \"el estudio científico de la relación entre el estímulo y la sensación\". Muchas de las técnicas y teorías clásicas de la psicofísica fueron formuladas en 1860 por Gustav Theodor Fechner. Él acuñó el término 'psicofísica', describiendo la investigación destinada a relacionar estímulos físicos con el contenido de la conciencia, como las sensaciones. As a physicist and philosopher, Fechner aimed at developing a method that relates matter to the mind, connecting the publicly observable world and a person's privately experienced impression of it. El trabajo de Fechner fue estudiado y extendido por Charles S. Peirce, quien fue ayudado por su estudiante Joseph Jastrow, quien pronto se convirtió en un distinguido psicólogo experimental por derecho propio."
 panum.2625.g: "No entendí una palabra, ¡pero las bonificaciones se ven bien!"
