 panum.440.t: "El tifus, un problema social" #NT!
 panum.440.d: "En su tratado [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_treatment_title')], el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] puso especial énfasis en el hecho de que el tifus es una enfermedad prevenible cuando las fuerzas políticas y sociales trabajan juntas." #NT!
 panum.440.f: ""Las condiciones de hacinamiento, la ropa llena de piojos y los apartamentos en ruinas o las habitaciones de los soldados me ofrecieron una imagen memorable. Allí, el tifus estaba por todas partes. Allí donde la gente vivía en las mismas condiciones de hacinamiento pero bajo las condiciones higiénicas de una habitación de hospital, no se podía observar ninguna propagación. La medicina no debe considerarse como un cuidado del individuo, sino más bien en términos de salud pública, lo que también implica resolver problemas sociales. No puede haber duda de que una propagación epidémica de tifus como la que hemos visto recientemente sólo se produjo en condiciones de vida como la pobreza y la falta de educación. Si eliminamos estas circunstancias, estoy seguro de que veremos mejoras significativas en la lucha contra la enfermedad".\n\nEl Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] en su memorándum al gobierno" #NT!
 panum.440.g: "El tifus está perdiendo su terror." #NT!
  
 panum.441.t: "Una autopsia" #NT!
 panum.441.d: "El Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] realizó varias autopsias a muertes por tifus en [SCOPE.sState('panum_disease_state').GetCityHubName] e hizo hallazgos cruciales." #NT!
 panum.441.f: "'Se sabe desde hace mucho tiempo que la fiebre tifoidea y el tifus son dos enfermedades diferentes, pero todavía hay algunos investigadores que creen que una mala alimentación, una infección del tracto intestinal o al menos una deficiencia nutricional podrían estar relacionadas con el brote de tifus. Las razones dietéticas todavía se consideran una posible causa de muchas enfermedades. Durante mis exámenes no encontré nada que sugiriera de algún modo un trastorno digestivo. La fiebre tifoidea no tiene nada que ver con la dieta ni con la digestión.'\n\nDel informe de la autopsia del Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] en [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.441.g: "¿Pero qué podría ser?" #NT!
 panum.442.t: "Sin lavar y enmarañado" #NT!
 panum.442.d: "En su búsqueda de la causa de la epidemia de tifus, el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] se dio cuenta de que era necesario cuestionar los hallazgos anteriores." #NT!
 panum.442.f: ""He oído varias veces a lo largo de mi carrera que la falta de higiene es una forma de que los miasmas o los gérmenes -lo que sea que la gente crea- se instalen en la ropa y contribuyan a la enfermedad. Creo que esto es cuestionable en los detalles, pero no en la afirmación básica. Los soldados, los convictos, los pobres, los criminales y las prostitutas se encuentran entre las víctimas clásicas de la epidemia de tifus. Pero, ¿los que no se lavan son pobres porque quieren no lavarse, o no es más bien el caso de que no se lavan porque son pobres? No quiero creer que la tuberculosis sea una enfermedad de artistas, así como el tifus no afecta sólo a los criminales porque son moralmente malvados. Hay numerosos criminales ricos que no han sido afectados por el tifus en esta epidemia. Hay sacerdotes inocentes en los barrios bajos que se sacrifican por los demás y que sucumben a la enfermedad. Entonces, ¿cuál es la conexión más convincente entre las víctimas?"\n\nDel diario del Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] en [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.442.g: "¿[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] está intentando afirmar que el tifus también puede afectar a personas honestas?" #NT!
 panum.443.t: "Calor y frío" #NT!
 panum.443.d: "Después de varias visitas a hogares de familias afectadas por tifus, el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] llega a la conclusión de que no se trata, como a menudo se afirma, de una enfermedad estacional." #NT!
 panum.443.f: ""Existen enfermedades estacionales, y parece que también es el caso del tifus. Los informes anteriores indican un aumento de las estaciones más frías, que también pueden incluir una primavera o un otoño húmedos. Creo que se ha demostrado que el frío y el calor influyen en la enfermedad. Es cuestionable si depende de las estaciones. Puede hacer el mismo calor en una habitación abarrotada y calefaccionada. La enfermedad no se produjo en todos los lugares en la misma época del año. Si ese fuera el caso, no sólo ciertas áreas de una ciudad sino toda la ciudad tendrían que verse afectadas por igual. Pero siempre apareció donde la gente estaba hacinada. Pude determinarlo durante varias visitas domiciliarias".\n\nDel diario del Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] en [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.443.g: "Esto contradice estudios anteriores." #NT!
 panum.444.t: "Sudor y aliento" #NT!
 panum.444.d: "El Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] está ahora completamente convencido de que el tifus debe ser una enfermedad contagiosa, aunque todavía no se han aclarado todas las circunstancias." #NT!
 panum.444.f: ""Al principio de mi investigación, estaba firmemente convencido de que el tifus no era una enfermedad contagiosa. Sin embargo, a medida que aumentaba el número de personas con tifus en mi familia, llegué a creer firmemente en el contagio de la enfermedad, y hago hincapié en la naturaleza contaminante del sudor. Vi a un enfermero que, mientras afeitaba a un paciente moribundo, inhaló el aliento del paciente. El enfermero describió el aliento del paciente como "de sabor nauseabundo" y casi inmediatamente se sintió enfermo. De manera similar, un asistente estaba ayudando a otro paciente que murió poco después, sintió el sudor penetrante del paciente sobre su piel y el asistente sintió inmediatamente los síntomas del tifus. Está claro que la proximidad a los pacientes con tifus pone a uno en riesgo de contraer la enfermedad".\n\nDel diario del Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] en [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.444.g: "Esto puede ser útil, pero ¿realmente se transmite de persona a persona?" #NT!
 panum.445.t: "¿Es hambre?" #NT!
 panum.445.d: "En una acalorada disputa con un colega en [SCOPE.sState('panum_disease_state').GetCityHubName], el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] refutó sus teorías." #NT!
 panum.445.f: "'¿Se trata de un tipo especial de tifus, el tifus del hambre?'\n\n'¿Tifus del hambre?'\n\n'Se puede observar que dondequiera que se produce el tifus, prevalece la desnutrición. En consecuencia, el hambre, o más bien la hambruna, es un desencadenante del tifus. Los cambios en la sangre probablemente también tengan algo que ver con ello.'\n\n'1726, 1727 y 1728 fueron años de hambruna, pero no hubo tifus. 1829 fue un año próspero, pero hubo tifus. Es comprensible que un cuerpo debilitado tenga más probabilidades de enfermar, pero ¿cuál es la causa?'" #NT!
 panum.445.g: "Por lo tanto, el término «fiebre del hambre» es incorrecto." #NT!
 panum.446.t: "No es la ubicación, sino la situación" #NT!
 panum.446.d: "El Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] cree que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] ha descubierto que lo que importa no es tanto cómo viven las personas con tifus, sino dónde viven." #NT!
 panum.446.f: "'Durante mi visita a [SCOPE.sState('panum_disease_state').GetCityHubName] descubrí que toda la enfermedad sólo afectaba a una sola parte de la ciudad. La zona es conocida por su pobreza y depravación moral, lo que ha apoyado algunas teorías de que el tifus es una enfermedad de individuos moralmente inferiores. Pero hasta donde puedo decir, es el barrio densamente poblado y la situación económica de los afectados. En mi opinión, la propagación de la enfermedad no tiene que ver con la corrupción moral, sino con la proximidad física.'\n\nDel diario del Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] en [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.446.g: "Esto significa al menos que teóricamente la enfermedad puede ser superada..." #NT!
 panum.447.t: "Piojos" #NT!
 panum.447.d: "El Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha propuesto una teoría muy controvertida que, aunque [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] no puede probarla, podría cambiar la comprensión de la enfermedad del tifus en el futuro." #NT!
 panum.447.f: ""Si hay algo que he notado en mis numerosas observaciones es que casi todos los pacientes estaban infestados de piojos, ya fueran los soldados en los cuarteles abarrotados, las familias con sus innumerables hijos o los presos en sus celdas destartaladas. Ya no creo que esto sea una coincidencia. Por supuesto, no tengo pruebas. En los últimos años, varios científicos han podido demostrar una y otra vez que las enfermedades pueden transmitirse entre animales y humanos. Si en esta situación es diferente, me encantaría que me demostraran lo contrario. Por ahora, creo que el misterio del tifus no puede resolverse sin examinar más de cerca el papel de los piojos".\n\nDel diario del Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] en [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.447.g: "¿Cómo puede algo tan pequeño causar tanta devastación?" #NT!
 panum.447.h: "Algo tan pequeño debe causar tanta devastación." #NT!
 panum.448.t: "Un hospital higiénico" #NT!
 panum.448.d: "Durante una visita a un hospital ejemplar, el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] pudo convencer a [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself] de que la transmisión de la enfermedad sólo es mínima en condiciones favorables." #NT!
 panum.448.f: ""Cuando los enfermos empezaron a ser trasladados a hospitales, aquí y allá, se temía que la situación pudiera empeorar debido a una posible infección. Se suponía que podrían formarse nuevos focos de infección, desde los cuales la epidemia atacaría con mayor violencia aún. Nada de esto ocurrió, aunque se había observado tal efecto en muchos cobertizos de fiebre. Como he observado en otros casos, las condiciones higiénicas más favorables marcaron la diferencia".\n\nDel diario del Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] en [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.448.g: "Así que lo que importa no es la estrechez en sí, sino las condiciones." #NT!
 panum.449.t: "Asistencia en caso de epidemia" #NT!
 panum.449.d: "Al entregar alimentos, mantas y medicinas a [SCOPE.sState('panum_disease_state').GetCityHubName], el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] pudo garantizar que la epidemia remitiera ligeramente." #NT!
 panum.449.f: ""Puede parecer trivial, pero gracias a un envío de víveres destinados a aliviar la miseria de los habitantes, la semana pasada se redujeron los brotes de la enfermedad. Algo similar ya se había observado en otras zonas donde el tifus había asolado el país en el pasado. Los socorristas distribuyeron arroz y guisantes, construyeron hospitales improvisados ​​en tiendas de campaña y también trajeron medicamentos y ropa nueva. El caso demuestra sobre todo esto: el tifus no es una enfermedad hereditaria. Depende definitivamente de factores ambientales".\n\nUna carta del Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] al Dr. Dementive" #NT!
 panum.449.g: "A veces la única forma de llegar a una solución es utilizar criterios de exclusión." #NT!
 panum.450.t: "¿Ropa contaminada?" #NT!
 panum.450.d: "El Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] observó un caso extraño en un cobertizo de fiebre que corresponde a experiencias similares." #NT!
 panum.450.f: "“¿Es esto una prueba de un supuesto contagio? No hay duda de que este caso corresponde a experiencias muy similares que he tenido en otros lugares. A veces se trata de abrigos, a veces de chaquetas o camisas. Un enfermo de tifus tenía un hermano que le robó el abrigo. Unos días después también enfermó. Se dice que los niños que jugaban con el abrigo se contagiaron de forma similar. En las clases más pobres es bastante común transmitir ropa de los familiares, especialmente en las estaciones frías. Ya sea que la ropa esté contaminada o no, cambiarse de ropa parece ser una de las medidas sensatas para evitar el tifus”. Del diario del Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] en [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.450.g: "¿Los hombres deberían cambiarse los calcetines y la ropa interior? ¡Imposible!" #NT!
  
 panum.451.t: "Clima del tifus" #NT!
 panum.451.d: "Después de que un médico extranjero aportara una nueva hipótesis sobre el origen del tifus, el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] duda de su propia investigación." #NT!
 panum.451.f: ""Hace dos días un 'colega' me envió su volumen sobre las causas del tifus. Estoy bastante sorprendido, por no decir desmotivado. Él formuló con mucha precisión y rigor cómo el tiempo y las condiciones meteorológicas se relacionan con el desarrollo de la enfermedad. En consecuencia, el miasma se forma cuando hay humedad en la tierra y luego se eleva al aire. Esto explicaría la frecuente aparición del tifus en los meses fríos y húmedos. Entonces, ¿se trata de un miasma después de todo?"\n\nDel diario de [ROOT.Var('panum_physician_var').GetCharacter.GetFullName]" #NT!
 panum.451.g: "¿Pero es esta realmente la solución correcta?" #NT!
 panum.452.t: "Putrefacción" #NT!
 panum.452.d: "Algunos de los hallazgos que el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] resumió recientemente simplemente no encajan con su teoría anterior." #NT!
 panum.452.f: ""Hasta ahora no he pensado mucho en la teoría de que los procesos de putrefacción desempeñan un papel crucial en la propagación de enfermedades. Pero dondequiera que voy, dondequiera que el tifus está haciendo estragos, encuentro animales, encuentro exhalaciones, encuentro material humano, animal y vegetal. ¿Podría realmente disolverse y dejar tras de sí miasmas, o tal vez venenos?"\n\nDel diario del Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] en [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.452.g: "Un revés desagradable." #NT!
 panum.453.t: "Corrientes de aire negativas" #NT!
 panum.453.d: "Una publicación de un reconocido médico alemán pone en entredicho los avances del Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], pues se ha demostrado que las corrientes de aire son responsables de la aparición del tifus." #NT!
 panum.453.f: "'Este aire cálido y húmedo puede ser transportado por una corriente de aire ecuatorial hasta latitudes septentrionales y entonces veremos estallar el tifus bajo el dominio de los vientos del sur y del oeste en estaciones relativamente cálidas. Esta relación debe ser más excelente en verano, cuando el sol está en su posición norte, las costas del Mediterráneo están incluidas en la extensión de los vientos alisios y en nuestro país la batalla con la corriente del norte tiene lugar en una estación lluviosa de carácter cambiante. Así es como se pueden explicar las epidemias de tifus del verano y principios del otoño.'\n\nDra. Angelika Hasenbein, 'Cómo las corrientes de aire causan el tifus y la lluvia de otoño causa la gripe'" #NT!
 panum.453.g: "Esto es realmente muy convincente." #NT!
 panum.454.t: "Enfermo" #NT!
 panum.454.d: "El Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] se ha sentido peor durante unos días. ¿Se ha infectado [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe]?" #NT!
 panum.454.f: "'¿Dónde está el doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]? ¿[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] quería visitar al paciente con tifus en la habitación cinco hoy?'\n\n'Parece que el doctor [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself] está enfermo.'" #NT!
 panum.454.g: "El doctor debería descansar." #NT!
 panum.454.h: "¡El Doctor debería seguir trabajando!" #NT!
 panum.455.t: "Documentos perdidos" #NT!
 panum.455.d: "El Doctor desperdició algunas notas que podrían haber sido útiles para desarrollar un tratamiento para el tifus." #NT!
 panum.455.f: "- - - - - - - - -\n\n- - - - - - - - -\n\n- - - - - - - - -\n\nNO del diario del Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]" #NT!
 panum.455.g: "¡Qué vergüenza!" #NT!
  
 panum.461.t: "Clases y casas" #NT!
 panum.461.d: "El Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha elaborado una tabla con los diferentes enfermos de tifus que viven en [SCOPE.sState('panum_disease_state').GetCityHubName], dónde viven y qué nivel de vida tienen. Por tanto, el tifus es una enfermedad "social"." #NT!
 panum.461.f: "'Las tablas estadísticas muestran cuán grande es la influencia de los apartamentos en la salud de los residentes. Por ejemplo, en un estudio del suburbio de CITY, encontré que la tasa de mortalidad en las calles de segunda clase era del 18 por ciento y en las calles de tercera clase un 68 por ciento mayor que en las de primera clase; y que la mortalidad era un 31 por ciento mayor en las casas de segunda clase y un 78 por ciento mayor en las casas de tercera clase que en las de primera clase. La mortalidad había mejorado en un 25 por ciento en aquellas calles en mal estado que fueron mejoradas.'\n\n'Del Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]' 'Tablas y estadísticas sobre la epidemia de tifus en [SCOPE.sState('panum_disease_state').GetCityHubName]'" #NT!
 panum.461.g: "¿Entonces el médico también es un crítico social?" #NT!
  
 panum_typhus: "Tifus" #NT!
 panum_typhus_desc: "Esta persona sufre de tifus, una enfermedad peligrosa." #NT!
  
 panum.12.t: "La primera vacuna" #NT!
 panum.12.d: "[SCOPE.sCharacter('panum_physician_scope').GetFullName] ha realizado una invención revolucionaria. Mediante un nuevo procedimiento, la vacunación, ha conseguido inventar un medio eficaz de protección contra la temible viruela." #NT!
 panum.12.f: "Según John Baron, biógrafo de Edward Jenner, se decía que Jenner había explotado la creencia popular de que las lecheras que estaban infectadas con viruela bovina por lo general no contraían viruela (el "mito de la lechera"). John Fewster había observado que un paciente que había tenido previamente viruela bovina (inofensiva) no podía ser viruelado con viruela. Por lo tanto, Jenner planteó la hipótesis de que la inoculación con viruela bovina proporcionaría la misma inmunidad que la viruela bovina y, por lo tanto, proporcionaría protección contra la viruela. Jenner recopiló por primera vez estudios de casos y observaciones de personas que habían tenido previamente viruela bovina o equina, pero que luego demostraron ser inmunes en caso de una viruela posterior o en un brote real de viruela. El 14 de mayo de 1796, vacunó a James Phipps, de 8 años, con virus de viruela bovina o vaccinia que había tomado de una pústula de viruela bovina de la mano de la lechera Sarah Nelmes, que tenía viruela bovina. Aproximadamente seis semanas después, el 1 de julio de 1796, Jenner variolizó al niño con pus de viruela; resultó inmune." #NT!
 panum.12.g: "¡Un héroe de la medicina!" #NT!
  
 je_panum_vaccine: "La vacuna" #NT!
 je_panum_vaccine_reason: "Nuestra nación está en el proceso de introducir por primera vez una vacuna conocida en nuestro país y distribuirla a nivel nacional." #NT!
 je_panum_vaccine_success: "[GetPlayer.GetName] ha recopilado al menos #ORANGE 4 pistas sobre vacunas#!." #NT!
 je_panum_smallpox_treatment_success: "[GetPlayer.GetName] ha recopilado al menos #ORANGE 3 pistas de tratamiento#!." #NT!
  
 panum.351.t: "El viejo enemigo" #NT!
 panum.351.d: "La viruela, quizás la enfermedad más mortal conocida por el hombre, ha resurgido en nuestras tierras." #NT!
 panum.351.f: "La viruela es un enemigo conocido y peligroso. A medida que avanza por las tierras de [GetPlayer.GetName], puede acabar con la vida de un tercio de los infectados y dejar a otros ciegos para el resto de sus días. Casi todos los infectados llevarán para siempre la tarjeta de visita de este asesino en su piel: la icónica cicatriz en la cara y el cuerpo, el símbolo inmortal y eterno de una enfermedad casi tan antigua como la civilización misma. Ha acechado cada rincón del planeta, desde el antiguo Oriente Medio hasta el Nuevo Mundo, un ejército cuya marcha ha arrasado imperios, ha matado a millones y ha humillado a los más grandes líderes que han caminado sobre la tierra. Allá donde el hombre ha ido, la viruela lo ha seguido, un cazador que siempre persigue a su presa. Ahora, en nuestras tierras, ha encontrado nuevas víctimas, suficientes para romper con su forma endémica y convertirse en una epidemia una vez más." #NT!
 panum.351.g: "Y así luchamos una vez más contra la viruela..." #NT!
 panum.352.t: "Rumores sobre el tratamiento de la viruela" #NT!
 panum.352.d: "Tras los rumores de un tratamiento para la viruela, ¡nuestra gente ha empezado a probar prácticas extrañas relacionadas con las propias pústulas!" #NT!
 panum.352.f: "La visión de un caballero erudito comiendo costras de personas infectadas con viruela puede ser un espectáculo que es a la vez repugnante y horroroso a la vez, pero es una cura desesperada a la que se aferra un hombre desesperado. Hay rumores de un tratamiento para esta horrible enfermedad en algún otro lugar del mundo y, supuestamente, funciona de manera similar... pero ¿cómo? ¿Qué hechicerías, qué ciencia, pueden librarlos de esta horrible plaga? Llegan noticias de las lejanas tierras de Europa de que el azote de la viruela ha sido reprimido, de que ciudades enteras pueden vivir sin un solo caso.\n\nPara algunos, esto es algo de esperanza. Si se puede vencer allí, entonces podríamos vencerlo aquí.\n\nPara algunos, esto es una mentira. Nuestras mentes más brillantes aún no han logrado encontrar un tratamiento, pero tal vez, tal vez..." #NT!
 panum.352.g: "...¿Habrían podido tener éxito donde nosotros hemos fracasado?" #NT!
 panum.353.t: "El azote de la viruela" #NT!
 panum.353.d: "La viruela, que no se trata y no tiene cura, está devastando nuestra sociedad... y especialmente a nuestros jóvenes." #NT!
 panum.353.f: "Sollozos. Lamentos. Los gritos frenéticos de los desesperados, que apenas tardan un segundo en exhalar su último suspiro antes de caer en un dolor del que ninguna mano puede levantarlos. Los padres golpearán sus puños contra las paredes hasta que sus palmas se pongan rojas de sangre y sus nudillos queden rotos y planos. Las madres se quitarán de encima a los ordenanzas con la fuerza de gigantes para darles un último toque, una última caricia en una mejilla fría y pálida. Estas son imágenes comunes en [GetPlayer.GetName], porque la viruela tiene hambre de los más vulnerables de todos nosotros: nuestros hijos, nacidos y no nacidos. Más del ochenta por ciento de los bebés infectados por la viruela morirán, esta enfermedad se abrirá camino hacia el futuro de nuestras tierras.\n\nY sin tratamiento, no hay nada que podamos hacer excepto llorar por las vidas que deberían haber existido." #NT!
 panum.353.g: "Esta pesadilla debe tener un fin..." #NT!
 panum.354.t: "La vacuna contra la viruela" #NT!
 panum.354.d: "Nuestros diplomáticos traen más que noticias: ¡traen muestras de una «vacuna» contra la viruela!" #NT!
 panum.354.f_generic: "Durante una visita a la lejana Europa, nuestros dignatarios descubrieron algo fascinante: tienen lo que parece ser un tratamiento *que funciona* para la viruela. De hecho, ¡han aprendido la historia de esta enfermedad! Al parecer, la práctica de la variolización, o el uso de muestras de costras secas de viruela de los enfermos en recuperación para dar a los niños una forma "más débil" de esta enfermedad, se había observado en el Imperio Otomano... pero esta era una solución defectuosa, peligrosa, porque era como bailar con un diablo: acércate demasiado y la viruela te arrebatará con la misma facilidad con la que la vencerás.\n\nSin embargo, hoy en día, lo que los europeos han desarrollado es un medio para utilizar la viruela bovina, una enfermedad casi inofensiva, como una forma de protegerse contra su hermano mayor letal. Esto proporciona un escudo seguro, económico y prácticamente garantizado contra la plaga de la viruela.\n\nAl principio era demasiado para creerlo, pero nuestros médicos escépticos han probado esta cura por sí mismos... y *funciona*. Por primera vez en nuestra historia, podemos luchar contra la viruela." #NT!
 panum.354.g_generic: "Necesitamos...necesitamos importar esto, ¡inmediatamente!" #NT!
 panum.354.f_fareast: "Durante una visita a la lejana Europa, nuestros dignatarios descubrieron algo fascinante: tienen lo que parece ser un tratamiento *que funciona* contra la viruela. ¡De hecho, han aprendido la historia de esta enfermedad! Aunque nuestros médicos están muy familiarizados con la práctica de la variolización, que podría utilizar costras secas de los que se recuperan para proteger a los no infectados, parece que han descubierto una protección aún mayor. Al utilizar muestras derivadas de viruela bovina relativamente benigna, los europeos han desarrollado una "vacuna", capaz de inocular a los niños, o incluso a los recién infectados... una vacuna que puede aumentar enormemente sus posibilidades de supervivencia.\n\nNuestros médicos más educados apenas podían creerlo. Sólo aquellos educados a la manera europea y titulados "doctores" podrían dar fe de su potencial como una protección segura, económica y poderosa contra la viruela. Más que eso, ya han comenzado a probarlo entre nuestra gente, y han descubierto que estas afirmaciones no son meras afirmaciones, oh no, sino hechos.\n\nCon esto, tenemos un arma para luchar contra la viruela." #NT!
 panum.354.g_fareast: "Parece que nuestros nuevos... médicos... han demostrado su valor. Importen esto inmediatamente." #NT!
 panum.354.f_latino: "Durante una visita a la madre patria en Europa, nuestros dignatarios descubrieron algo fascinante: tienen lo que parece ser un tratamiento *que funciona* contra la viruela. Aunque conocíamos desde hace tiempo la práctica de la variolización, en la que nuestros médicos podían utilizar muestras tomadas de los pacientes en recuperación para dárselas a quienes necesitaban protección desesperadamente, desde entonces han desarrollado un tratamiento mucho más sofisticado. En lugar de utilizar costras de viruela y correr el riesgo de contraer esa enfermedad letal, utilizan materiales extraídos de la viruela bovina, una enfermedad común y normalmente inofensiva. Este nuevo suero es barato, común y, lo más importante, eficaz. Ahora, con acceso a las últimas publicaciones médicas, nuestros médicos sólo pueden celebrar este descubrimiento. La viruela no es una extraña en las Américas, ya que diezmó a los pueblos nativos de estas tierras... pero ahora, tenemos un arma poderosa para hacer de este azote una cosa del pasado." #NT!
 panum.354.g_latino: "Envía agradecimiento a la patria y una solicitud para importar un envío para uso inmediato." #NT!
 panum.355.t: "Comienza la vacunación" #NT!
 panum.355.d: "Ahora que en [GetPlayer.GetName] existe una vacuna viable contra la viruela, el gobierno ha iniciado una campaña de vacunación." #NT!
 panum.355.f: "Al principio, al menos, la idea de una campaña de vacunación había suscitado cierta resistencia: madres preocupadas con sus hijos asustados, ancianos marchitos que se mostraban escépticos ante esta nueva maravilla, los muy piadosos que temían que la ciencia estuviera manipulando algo que escapaba a su comprensión. La educación lo resolvió: se dieron explicaciones de cómo funcionaba, por qué... pero los resultados fueron mucho más que eso: niños que conservaban la vista y la salud, y no las horribles secuelas de una de las enfermedades más letales que la humanidad había conocido jamás. Pocos necesitaban que los convencieran cuando los veían libres de cicatrices y llenos de vida. Poco a poco, una a una, las colas empezaron a crecer. En las escuelas, en los consultorios médicos, en los lugares de trabajo, la campaña de vacunación empezó a coger impulso... y con ella, la viruela empezó a declinar." #NT!
 panum.355.g: "Ay, odio las agujas, pero si me mantienen a salvo..." #NT!
 panum.356.t: "Una enfermedad en retirada" #NT!
 panum.356.d: "Después de incontables siglos de muerte y miseria, la reciente proliferación de la vacunación contra la viruela ha puesto a este viejo enemigo en total retirada." #NT!
 panum.356.f: "Ha sido necesario un esfuerzo incansable de manos e inteligencias incontables, pero en nuestro querido mundo, la viruela es una amenaza que, lenta pero seguramente, se está convirtiendo en algo del pasado. Como resultado de una extensa campaña para vacunar a los jóvenes del país y a todos los que estén dispuestos a recibir la inyección, la capacidad de la viruela para abrirse paso a través de nuestras familias y comunidades se está desmoronando, con la promesa de que los niños de hoy no llevarán las cicatrices de sus abuelos. Con cada pinchazo de la aguja, la hoja de la viruela se vuelve cada vez más desafilada y la naturaleza de esta plaga se convierte aún más en algo del pasado.\n\nEs un logro trascendental, un día glorioso en nuestra historia: aunque la batalla aún no está ganada, la victoria está a la vista. La viruela morirá aquí, y si no a manos nuestras, entonces a manos de nuestros herederos." #NT!
 panum.356.g: "Un día, un día, acabaremos con esta horrible bestia para siempre." #NT!
  
 panum_smallpox_vaccination_character_modifier: "Vacunado" #NT!
  
 panum.340.t: "Variolización" #NT!
 panum.340.d: "El Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha descubierto un método de tratamiento para la viruela, aunque no es totalmente inofensivo." #NT!
 panum.340.f: "La variolación (también llamada inoculación) es la transferencia del contenido de las pústulas de la viruela de una persona a otra mediante inoculación. Se trata de una técnica de vacunación contra enfermedades víricas que se utilizó en personas, sobre todo en China y Oriente Próximo, hasta el siglo XVIII. En ella se utilizaban virus extraídos de las heridas de los enfermos de viruela que habían sobrevivido a la enfermedad. Normalmente, se extraía material de una pústula de una persona enferma con una lanceta, que se introducía por vía subcutánea, es decir, a través de pequeñas heridas, en el brazo o la pierna de la persona sana. De este modo, se administraban virus atenuados a personas sanas. La reacción inmunitaria debería desencadenarse por la multiplicación de los virus. Sin embargo, los virus podían volver a causar enfermedades a través de una mutación inversa a medida que se multiplicaban, lo que conducía a una tasa de mortalidad relativamente alta (2-3%) entre los tratados de este modo." #NT!
 panum.340.g: "Un...progreso." #NT!
  
