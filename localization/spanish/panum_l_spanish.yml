 panum_disease_investigation_progress_bar_at_full_tt: "La barra de investigación de la enfermedad ha llegado a #variable 100%#!"
 je_panum_disease_investigation: "Examen de enfermedades"
 je_panum_disease_investigation_reason: "A veces puede suceder que un médico, durante su investigación médica habitual, se arroje a la investigación de una enfermedad muy específica. Esta no es una enfermedad epidémica, sino más bien enfermedades cotidianas, enfermedades infantiles o enfermedades generalizadas. Ejemplos de esto incluyen raquitismo, cálculos renales o sífilis. Si un médico muere, el proyecto no se pierde, sino que se suspende hasta que otro médico se hace cargo."
 panum_woolsorters_disease_modifier: "Enfermedad de Woolsorter"
 panum_litholapaxy_modifier: "Litolapaxia"
 panum_salvarsan_modifier: "Salvarsano"
 panum_tetanus_antitoxin_modifier: "Antitoxina de tétanos"
 goods_output_meat_mult: "¡Building @meat! Salida de carne"
 goods_output_meat_mult_desc: "¡Un bono o penalización a la cantidad de @Meat! Carne producida por edificios"
 panum.2221.t: "La enfermedad del lano"
 panum.2221.d: "Al examinar la llamada 'enfermedad de Woolsorter', el médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] descubrió que en realidad era ántrax."
 panum.2221.f: "El ántrax en los humanos ocurrió principalmente como una enfermedad ocupacional en trabajadores de curtiduría y en personas que procesaron piel, cerdas y cabello, pero también en trabajadores de puerto y transporte que manejaban estos materiales, así como en Skinners. El pico de la ocurrencia fue tiempos de crisis en la industria del cuero, cuando se importó un número creciente de pieles de animales baratas de regiones con poco o ningún control veterinario de sacrificio. Durante mucho tiempo, el misterioso origen de la enfermedad era desconocido. Se creía que era un caso de envenenamiento y la gente lo llamaba \"enfermedad de Woolsorter\". Con el avance de la microbiología y la implementación de la teoría de los gérmenes, las conexiones reales entre la enfermedad animal económicamente extremadamente dañina y la enfermedad fatal para los humanos se establecieron y condujeron a nuevas regulaciones y regulaciones destinadas a garantizar la protección de los trabajadores."
 panum.2221.g: "Adoptar medidas de protección estrictas."
 panum.2222.t: "La enfermedad de bitre"
 panum.2222.d: "Después de examinar a varias personas en valles de montaña remotos con gigantescos Goiters, el médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] experimentó con un tratamiento usando yodo. Después de varios intentos, la terapia funcionó."
 panum.2222.f: "En las regiones alpinas de Estiria, Tirol y Suiza, pero también en otras regiones de montaña o en las Midlands inglesas, los Goiters eran una enfermedad cotidiana. Hubo una sospecha temprana de que la Formación de Goitre tenía algo que ver con el agua en cierto territorio. Paracelsus sospechaba la falta de ciertos minerales y recomendó agua potable que contenía plomo. En la antigua China, los médicos recomendaron comer algas y esponjas. Con una mejor comprensión de la función de la glándula tiroides y la importancia del yodo, los primeros esfuerzos de curación finalmente comenzaron. A partir de 1918, el doctor suizo Otto Bayard introdujo la sal yodada a través de la adición correctamente dosificada de potasa de yodo a la sal de la mesa en las comunidades en su área de práctica de la Nikolaital y demostró que este trastorno de desarrollo eliminado, la ampliación de la glándula tiroides y la formación de Goither y los nódulos sin ningún efecto indesirable y el daño pueden ser tratados con éxito."
 panum.2222.g: "¡Entonces es una enfermedad relacionada con la dieta!"
 panum.2223.t: "Nefrolitiasis"
 panum.2223.d: "El médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha desarrollado un procedimiento para operar con éxito en pacientes con cálculos renales."
 panum.2223.f: "Los cálculos renales son un fenómeno conocido a lo largo de la historia humana; Incluso Napoleón los sufrió. Aunque se desarrollaron varios procedimientos para eliminar cálculos renales desde el Renacimiento, la operación siguió siendo peligrosa. El cirujano estadounidense Henry Jacob Bigelow logró un avance: introdujo la técnica médica de la litolapaxia. En 1878 publicó 'Lithotricity por una sola operación', en la que describió su técnica A para 'el aplastamiento y la eliminación de una piedra de la vejiga en una sola vez'. Antes de esto, los cirujanos aplastarían una piedra de la vejiga y luego pasarían solo unos minutos quitando las piezas. Con este nuevo método, la tasa de mortalidad disminuyó de aproximadamente 24% a 2.4%."
 panum.2223.g: "Me estoy poniendo ansiosos solo de pensarlo."
 panum.2224.t: "Pelagra"
 panum.2224.d: "Como el médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] descubrió después de años de investigación, la pelagra es una enfermedad causada por la falta de ácido nicotínico."
 panum.2224.f: "Después de que Christopher Columbus descubrió América, el maíz fue una de las primeras plantas que se llevaron a Europa, donde se extendió rápidamente debido a sus altos rendimientos de cultivos. Pronto, en áreas con alto consumo de maíz, apareció una enfermedad extraña llamada 'piel áspera' después del síntoma clave, pelagra. La conexión entre la pelagra y el alto consumo de maíz (por ejemplo, en forma de polenta) se sospechó por primera vez en el siglo XVIII. Las explicaciones en ese momento incluían maíz mohoso o envenenado, infección o herencia. Joseph Goldberger y sus colegas demostraron a principios del siglo XX que tanto la llamada pelagra en humanos como la enfermedad de la lengua negra en los perros surgen de la desnutrición, que Conrad Elvehjem pudo atribuir a una deficiencia de ácido nicotínico. El descubrimiento de que Pellagra podría tratarse con la levadura de Brewer condujo a una reducción repentina en el número de reclusos de hospitales mentales en las áreas afectadas."
 panum.2224.g: "¿El mero resultado de una dieta desequilibrada?"
 panum.2225.t: "Raquitismo"
 panum.2225.d: "Después de muchos años de estudiar pacientes con raquitismo, el médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] llega a la conclusión de que la enfermedad ósea tiene que ver con una deficiencia de nutrientes, y recomienda el aceite de hígado y la luz solar de bacalao como prevención."
 panum.2225.f: "Aunque ha habido muchas descripciones científicas de raquitismo con el tiempo, sus causas permanecieron desconocidas durante mucho tiempo. Los principales patólogos propusieron una variedad de causas de raquitismo en el siglo XIX, incluida la sífilis congénita e infección por tuberculosis paterna. Una verdadera comprensión moderna de la base fisiopatológica de los raquitismo no comenzó hasta principios del siglo XX. En 1919, Edward Mellanby descubrió y publicado en la 'cuarta vitamina', 'declarar' los raquitis es una enfermedad de deficiencia que se desarrolla como consecuencia de la ausencia de algunos factores o factores de alimentos accesorios. Por lo tanto, parece probable que la causa de los raquitismo sea una ingesta disminuida de un factor antirractico, que es el factor A-soluble A o tiene una distribución similar '."
 panum.2225.g: "¿Estamos hablando de una vitamina D?"
 panum.2226.t: "Sífilis"
 panum.2226.d: "La sífilis, el antiguo flagelo de la humanidad, parece ser puesta pronto en la cadena por la ciencia: el médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] afirma haber inventado una cura milagrosa utilizando los métodos médicos más modernos."
 panum.2226.f: "Hasta principios del siglo XX, la sífilis se trataba principalmente con mercurio tóxico, que se aplicaba a grandes áreas del cuerpo del paciente, que, entre otros efectos indeseables, generalmente condujeron a una pérdida completa de vello corporal y todos los dientes y la rápida disminución de todas las funciones corporales iniciadas. Mercurio ya había sido utilizado varios siglos antes como un agente terapéutico más o menos efectivo contra la lepra y varias otras enfermedades de la piel. Experimentos con preparaciones de arsénico como el atoxilo y la arsacetina, así como la preparación 418 (arsenofenilglicina), que solo tuvo éxito en experimentos con animales y fueron desarrolladas y probadas por Paul Uhlenhuth y Paul Ehrlich en 1907/1908, falló, principalmente debido a los efectos secundarios graves. En 1909, Sahachiro Hata y Paul Ehrlich desarrollaron la arsfenamina compuesta de arsénico orgánico (Salvarsan), que fue el primero en intentar un tratamiento quimioterapéutico dirigido de la sífilis."
 panum.2226.g: "Salvavw ... ¿Qué?"
 panum.2227.t: "Tétanos"
 panum.2227.d: "Después de varias pruebas, el médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] anunció hoy que ha encontrado una antitoxina contra el tétanos."
 panum.2227.f: "El tétanos era bien conocido por las civilizaciones antiguas, que reconocieron la relación entre heridas y espasmos musculares fatales. En 1884, Arthur Nicolaier aisló la toxina de tétanos similar a la estricnina de las bacterias del suelo anaeróbico de vida libre. Detectó el patógeno de tétanos en el suelo inoculando el suelo del jardín en animales de prueba. La etiología de la enfermedad fue dilucidado en 1884 por Antonio Carle y Giorgio Rattone, dos patólogos de la Universidad de Turín, que demostraron la transmisibilidad del tétanos por primera vez. En 1891, C. tetani fue aislado de una víctima humana por Kitasato Shibasaburō, quien luego demostró que el organismo podía producir enfermedad cuando se inyectó en animales, y que la toxina podría neutralizarse por anticuerpos específicos. En 1890, Kitasato y Emil von Behring finalmente lograron obtener una antitoxina de tétanos específica, que podría permitir la inmunidad del tétanos en los animales. Con esta producción de antitoxinas, Behring sentó las bases para la 'terapia sérica' (así como con el descubrimiento de la antitoxina de la difteria, también en 1890)."
 panum.2227.g: "¿Quién hubiera pensado que el suelo de jardín podría ser tan peligroso?"
 country_panum_kidney_stone_treatment_success_chance_mult: "Oportunidad de éxito del tratamiento de piedra renal"
 country_panum_syphilis_treatment_success_chance_mult: "Oportunidad del éxito del tratamiento de la sífilis"
 panum.922.t: "Crup"
 panum.922.d: "El médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha encontrado que muchos médicos generalmente no pueden notar la diferencia entre el crup bastante inofensivo y la difteria peligrosa y ha destacado las diferencias en un artículo."
 panum.922.f: "Cuando el médico nacido en Prusiano Abraham Jacobi señaló en una conferencia médica en 1860 que había alrededor de 122 casos de difteria en Nueva York, sus colegas estaban asombrados: no habían diagnosticado ninguna difteria durante el mismo período. La falta de conocimiento en el campo de las enfermedades de los niños fue una de las razones para la fundación de los primeros hospitales infantiles en los Estados Unidos, en el que Diphteria jugó un papel especial. Jacobi es considerado como el padre de la pediatría estadounidense."
 panum.923.t: "Laringe -Larynx"
 panum.923.d: "El doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha identificado una de las principales características de la difteria como la pseudomembrana coriácea que se extiende a la laringe y causa asfixia. Esta característica es típica de la enfermedad para distinguirla de los demás."
 panum.923.f: "'Podemos establecer la identificación de la angina maligna de cuatro maneras: \ n \ nby investigaciones extensas sobre la anatomía mórbida de la enfermedad, se realizan sesenta autopsias en el curso de unos pocos meses; \ n \ nby observaciones clínicas, por lo que probamos que la angina, si se queda a sí misma, casi invariablemente ataca a la laringe y, por lo tanto, damos lugar a los síntomas de la crupa; demostró la identidad en la composición de la membrana falsa en la faringe con la de la tráquea; \ n \ nby el estudio de las obras de los escritores anteriores."
 panum.940.t: "El antídoto para la difteria"
 panum.940.d: "El médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] anunció públicamente hoy que los experimentos con la antitoxina de la difteria [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] producida fueron un éxito completo."
 panum.940.f: "El médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] explicó a la multitud asombrada que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] había usado una toxina de difteria debilitada para infectar caballos y, a su vez, obtener un suero de su sangre que era altamente efectivo para combatir la difteria. Aunque este es un gran avance, [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] también enfatizó que esto no debería confundirse con una vacuna porque no activa el sistema inmune del paciente. \"Todavía hay mucho trabajo por hacer aquí\", dijo [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]. Pero todos los padres que temían por la vida de sus hijos jadeadores por la noche podrán dormir mucho más a partir de ahora."
 panum.940.g: "Cortamos el aire de la difteria antes de que nos haga lo mismo."
 panum.941.t: "Perclorato de hierro"
 panum.941.d: "El médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] encontró en los registros más antiguos que se recomendó perclorato de hierro como remedio para la difteria. De hecho, parece tener un efecto."
 panum.941.f: "'Sorprendentemente, esta receta alquímica ha tenido un efecto en algunos pacientes. Aparentemente es uno de los pocos remedios para la difteria. '\ N \ na nota corta del médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] en difteria"
 panum.941.g: "¿Pero eso realmente nos lleva a alguna parte?"
 panum.942.t: "Intubación"
 panum.942.d: "El médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] intentó darle aire al paciente a través de la intubación. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] ha logrado un pequeño éxito contra la difteria."
 panum.942.f: "'El proceso es complicado y crítico, pero cualquier indicio de combatir la difteria es útil para mí en este momento'."
 panum.942.g: "¿Pero seguramente esa no puede ser una solución a largo plazo?"
 panum.943.t: "Traqueotomía"
 panum.943.d: "El médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha tenido experiencias bastante mixtas con la traqueotomía, aunque todos los colegas médicos [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] usan este procedimiento quirúrgico para tratar la difteria."
 panum.943.f: "'Por mi vida, no puedo entender por qué todos esos expertos en difteria, o al menos aquellos que afirman ser, han podido informar cualquier éxito. Trousseau afirma haber salvado la vida de casi la mitad de sus pacientes con difteria, pero en mi experiencia profesional es inferior a uno de cada diez. '\ N \ na nota corta del médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] en difteria"
 panum.943.g: "¿Y ahora?"
 panum.944.t: "Mercurio"
 panum.944.d: "Desafortunadamente, un tratamiento de mercurio para la difteria terminó exactamente como se esperaba el médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], con envenenamiento."
 panum.944.f: "'¿Debería haberlo sabido mejor? ¡Sí! Pero la literatura especializada no deja dudas de que Mercurio ha ayudado contra la difteria durante siglos. ¡Pretendidamente! De ahora en adelante encuentro otros remedios que supuestamente ayudan: nitrato de plata, por ejemplo. ¡O ácido clorhídrico! ¿Alguien realmente ha lidiado con esta enfermedad? '\ N \ na nota corta del médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] en difteria"
 panum.944.g: "Todo esto suena aún más mortal que la difteria."
 panum.945.t: "Sangría"
 panum.945.d: "Los expertos recomiendan una buena sangría para la difteria. El médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] intentó esto [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself] en dos casos, y descubrió que el método era bastante contraproducente."
 panum.945.f: "'Debilitarse a un paciente debilitado aún más sería como romper otro pilar en un puente con un pilar tembloroso. Lo que todo ingeniero entiende se considera herético en medicina. '\ N \ na nota corta del médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] sobre difteria"
 panum.945.g: "¿No hay mejoras?"
 panum.951.t: "El sonajero en la noche"
 panum.951.d: ""
 panum.951.f: "El sol se había retirado detrás de las casas. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] caminó en las sombras. Había sido otro día de fracasos. Tres hijos más muertos. Como siempre, la misma causa de muerte. Incluso si pasó el pico de la epidemia. Quedaba un riesgo residual de que la muerte del niño deambulara por las calles y sumergiera su guadaña en sus mandíbulas. El ahogamiento y la asfixia se encontraban entre las formas de muerte más crueles. \ N \ n[ROOT.Var('panum_physician_var').GetCharacter.GetLastName] se habían especializado en enfermedades epidémicas durante años. Pero la difteria era diferente. No era solo una enfermedad infantil como sarampión o escarlatina, lo que podría tener un resultado leve. La difteria hizo que los niños jadearan por aire. Difteria estranguló al niño en la noche como un ángel vengador. \ N \ n[ROOT.Var('panum_physician_var').GetCharacter.GetLastName] había declarado la guerra a la difteria. Pero parecía una guerra desesperada. Cada paso [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] tomó, la enfermedad siguió, y se revirtió [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] nuevamente. Todos los métodos que habían sido transmitidos resultaron ser inútiles. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] luchó con la muerte. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] luchó con el diablo. \ N \ nand hicieron [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] sentirse [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] desesperación e impotencia. Esa noche cuando [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] llegó a casa. Como un jadeo saludó [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] en la oscuridad. Porque había un paciente esperando [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] no tenía en la lista. La difteria se había extendido. Hasta la calle [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]. Hasta [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] casa. \ N \ nup a [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] cama del hijo."
 panum.951.g: "¿Los experimentos del médico ...?"
 panum.952.t: "Tratando la difteria"
 panum.952.d: ""
 panum.952.f: "Una golondrina desesperada. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] se había acostumbrado a este sonido. Por lo general, apenas podías escucharlo cuando otras personas se tragaron. Pero era la misma agonía [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] había escuchado tan a menudo antes. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] había memorizado el sonido. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] podría poner una tela fría en la cabeza del hijo [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] podría hablar con calma a él. \ N \ nbut [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] no podría hacer nada por él. No más de lo que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] había hecho por los otros niños. Para los muchos otros, docenas de niños muertos. \ N \ nif había alguien que sabía cuán poco valían estas drogas de difteria, era [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim]. Mercurio que envenenó el cuerpo. Nitrato de plata y perclorato de hierro con efectos variables. La traqueotomía, que se consideraba el arte más alto de la cirugía, y casi siempre falló. \ N \ n[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] lo había hecho con tanta frecuencia. Y sin embargo, fue diferente. Ya no se trataba de la enfermedad. Se trataba de [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] ahora. Esta epidemia odiada se estaba vengando de [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim]. Porque [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] había querido resistirlo. Porque [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] quería erradicarlo, como lo hizo a los niños pequeños. Se estaba vengando. Quería quitarle la cosa más preciosa [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe]. No [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] honor como médico, no [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] esperanza para una cura. Los líquidos brillan en viales pequeños. Un bisturí brilla a la luz de la luna."
 panum.952.g: "Trate al niño con perclorato de hierro."
 panum.952.h: "Realizar una traqueotomía."
 panum.952.i: "Examine una muestra de tejido con el microscopio."
 panum.953.t: "El ángel estrangulador"
 panum.953.d: ""
 panum.953.f: "No más traqueteo. El sonido que había atormentado [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim], que había acompañado [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] y enseñó [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] a temer, desaparecido. Pero no hubo triunfo. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] había despreciado el sonido. \ N \ nbut ahora [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] deseaba el ruido terrible hacia atrás. \ N \ nsilence. Silencio muerto, como [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] lo había conocido durante meses. Fue ese momento en que se podía escuchar el silencio. Un espeluznante silencio del cementerio que se extendió y absorbió cada fuerza vital. El silencio se podía escuchar y sentir. Llenó el cuerpo de vacío. Eso no fue una contradicción. Era lógico. Era empírico. \ N \ nbut lógica y empirismo fallaron [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] esa noche. [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis|U] Los dedos juntaron la mano de un niño frío. Pálido como la luz de la luna que brillaba a través de las ventanas. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] había desafiado la difteria. \ N \ nand Diphteria pisotear [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] en el suelo y torturado [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] con placer porque [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim]1 arrogancia había cegado [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim]."
 panum.953.g: "El médico tendrá dificultades para lidiar con eso."
 panum.954.t: "No laringe, sino corazón y ojos"
 panum.954.d: ""
 panum.954.f: "La luna se había hundido. El sol había resucitado de nuevo. Habían pasado días en la alternancia de la oscuridad nocturna y las persianas dibujadas. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] había estado esperando al lado de la cama. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] no había curado a los pacientes hasta entonces. [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] El trabajo no se había centrado en las personas, sino en las enfermedades. Fue fácil administrar nitrato de plata al experimentar con él; Era fácil inyectar un suero cuando era una mera prueba; Y fue fácil realizar una operación en la tráquea cuando no trataba a un ser humano, pero simplemente la piel, simplemente músculo, simplemente carne, simplemente hueso. \ n \ n[ROOT.Var('panum_physician_var').GetCharacter.GetLastName] había tratado enfermedades antes. La difteria había convertido a las personas en pacientes, historias en registros médicos y sufriendo síntomas. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] quería liberar a las personas por la falta de aliento. Sin embargo, fue [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] quien necesitaba curación. No en la laringe. Pero en [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] ojos y corazón. \ N \ n[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] podría volver a ver. Y una sonrisa domesticada transmitió en [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim]."
 panum.954.g: "[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] lo hizo!"
 panum.955.t: "El sacrificio"
 panum.955.d: ""
 panum.955.f: "Un alma perdida. Un mundo ganado. Microbios bulliciosos bajo el microscopio. Microbios como los que se habían encontrado en muchos otros casos. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] lo había descartado hasta ahora. Pero fue la explicación más razonable. [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis|U] El hijo no había tenido contacto con pacientes con difteria. \ N \ no ly [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] tenía. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself] había traído los gérmenes a esta casa. Durante días. Quizás durante semanas. Sin darse cuenta. De la otra docena de niños enfermos. De la otra docena de hijos muertos. \ N \ nwho ahora eran una víctima más rica. \ N \ n[ROOT.Var('panum_physician_var').GetCharacter.GetLastName] tenía una muestra. Y [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] tenía conejillos de indias y conejos que ningún niño cuidaba más; que ningún niño jugaba más. Serían un sacrificio. Así como [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] había hecho sacrificios. Si se enfermaron, eso fue una prueba. Se trataba de erradicar la difteria. Ese era un objetivo mayor que [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself]. \ N \ nand más grande que cualquier otro objetivo."
 panum.955.g: "Un sacrificio que no quedará impune."
 panum.956.t: "Cambio radical del teorema"
 panum.956.d: ""
 panum.956.f: "Las últimas semanas han desencadenado una Césura significativa para [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] ciertamente no lo llamaría un cambio copernicano. Pero rara vez tiene un evento causado que [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] cuestione mucho los métodos [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself] y [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]. La impotencia frente a la difteria tiene un efecto duradero. Y [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] sabe que volverá. Los libros de medicina y los tratados están apilados. Y medicamentos. [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis|U] La mano alcanza manicalmente todo lo que supuestamente se conoce sobre la difteria. \ N \ nevery supuesta cura. Cada presunto manual. Todos los supuestos tratados. \ N \ n[ROOT.Var('panum_physician_var').GetCharacter.GetLastName] borra la tabla. Lanza todo sobre él en la basura. Todos estaban equivocados. Bretonneau. Guerrero. Ajuar. Bochut. Daviot! \ N \ ndeciphing La causa de la difteria significaba finalmente curar difteria. Y después de que todo [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] había leído y probado hasta ahora, solo una posibilidad permaneció abierta. La difteria era contagiosa. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] había infectado [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] su propio hijo después del contacto con otros pacientes. Había un agente. No importa lo que dijeron los expertos. \ N \ n."
 panum.956.g: "Todos los esfuerzos ahora se centran en encontrar el patógeno."
 panum.956.h: "El enfoque de la investigación ya debe estar en una posible vacuna."
 panum.961.t: "La toxina de la difteria"
 panum.961.d: ""
 panum.961.f: "Un veneno era la clave. Veneno del tipo secretado por el patógeno de la difteria. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] había escuchado que un biólogo estaba experimentando con él. La toxina era demasiado fuerte para ser detenida. Si infectó a los animales con él, murieron. \ N \ nbut [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] sabía que esta era información que sacudiría el mundo científico. Uno podría leer al respecto en las revistas especializadas. Y hubo imitadores en todo el mundo que también aislaron la toxina de la difteria con la esperanza de inducir un efecto inmunológico en un animal sin que muriera de la misma manera que los millones de niños cuyos cadáveres estuvieran como tributo en el altar de la difteria. \ N \ n[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] investigarían. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] tuvo que encontrar la toxina. Y conducir [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] propios experimentos."
 panum.961.g: "Este es quizás el paso crucial ..."
 panum.961.h: "Este proceso ya se conoce por la producción de toxina tétánica ..."
 panum.961.i: "La cantidad correcta de yodo podría ayudar con esto."
 panum.962.t: "La difteria antitoxina"
 panum.962.d: ""
 panum.962.f: "Un avance. Un avance decisivo que compensó todos los sacrificios, todos los sufrimientos, todas las muertes [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] tuvieron que acompañar, incluidos los padres y parientes afligidos. Las llorosas adiós. La desesperación y la desesperanza. \ N \ nit era muy simple. Y tan eficiente. La toxina tuvo que debilitarse. Finalmente, una solución de yodo ayudaría. Los caballos eran los sujetos de prueba perfectos. El resto fue fácil. El animal desarrolló poderes inmunes contra la toxina, y fue así el proveedor de un suero. Una antitoxina contra la difteria. \ N \ nWhen [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] sostuvo el vial en su mano ese día, [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] sintió un sentido de satisfacción. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] había realizado las primeras pruebas. No todos los niños respondieron. Pero más de [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] se había atrevido a soñar. Ahora esta arma contra el enemigo invisible tenía que ser producida en masa y distribuida. En cada clínica. En cada cirugía del médico. La guerra de \ n[ROOT.Var('panum_physician_var').GetCharacter.GetLastName] contra la difteria no había terminado. Estaba comenzando."
 panum.962.g: "¡Ordene la mayor parte de este suero posible!"
 panum.963.t: "La sombra"
 panum.963.d: ""
 panum.963.f: "¡La difteria debe ser erradicada! ¡Debe desaparecer! \ N \ nit puede haber sido un pensamiento maníaco. Pero fue un pensamiento que mantuvo vivo al médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]. [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis|U] Guerra contra la difteria por fruto. Tantas vidas salvadas. ¡Muchos niños que habrían sufrido agonía y murieron en otro mundo! [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] habría dado su propia vida si [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] pudiera haber destruido la difteria. Pero el destino no fue amable con [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim]. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] no había vendido [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself] al diablo, sino [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] hijo. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] había decidido eso. Para él. Una ira contra la enfermedad. Pero [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] lo había borrado. Con pensamientos racionales que ahogaron el resentimiento hacia [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself] en el trabajo y la venganza. Pero hace unos días, esta ira desapareció. Paradójicamente, cuanto más salvados los niños [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe], más claro [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] podría ver. \ N \ n[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] saw [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself]. Y [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] detestaba lo que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] vio. \ N \ n[ROOT.Var('panum_physician_var').GetCharacter.GetHerHis|U] arrogancia había engañado [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim]. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] creía que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] estaba salvando vidas humanas. Sin embargo, [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] se había decidido por uno. Como un verdugo. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] ni siquiera había tocado el bisturí. O al menos un pequeño vaso de nitrato de plata. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] había puesto más valor en la muestra y el patógeno, que en el paciente [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]. Un ser humano. \ N \ n[ROOT.Var('panum_physician_var').GetCharacter.GetHerHis|U] propa carne y sangre. \ N \ nit disgustado [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] desde entonces. Y en [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] de apartamento solitario, [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] solo los compañeros fueron certificados, premios y fotos con políticos y académicos importantes. De lo contrario, solo una cama vacía. Y un pensamiento que se fortaleció. [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis|U] Cabeza palpitada. Se convirtió en un dolor de cabeza agonizante: debo ser erradicado. Debo desaparecer. \ N \ n'my hijo. Mi querido hijo ... '"
 panum.963.g: "Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ... ¡Doctor!"
 panum.640.t: "'Observaciones hechas durante la epidemia del sarampión'"
 panum.640.d: "El médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha presentado recomendaciones [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] para el tratamiento del sarampión, que están destinados a comprender mejor las causas y la transmisión de la enfermedad para mitigar y prevenir brotes en el futuro."
 panum.640.f: "'El contagio se extendió muy rápidamente en el Thorshavn grueso, y desde allí fue transportado por botes a las otras islas. Los viajes hacia y desde los lugares comerciales, la asistencia de la iglesia y la escuela y las unidades de rutina extendieron la infección a las otras aldeas. El contagio fue introducido en Suderø desde Thorshavn por un individuo identificado, y tras la investigación fue posible demostrar casi en todas partes cómo y por quién había sido traída la infección a cada aldea. Si la infección puede ser transmitida por cosas como ropa, lavandería y letras parece bastante dudosa, y no vi ni escuché ningún ejemplo de dicha transmisión durante la epidemia. -Peeter Panum, Observaciones hechas durante la epidemia de sarampión en las Islas Feroe en el año 1846"
 panum.640.g: "¡Un nuevo Peter Panum!"
 panum.52.m: "La epidemia de escarlatina en [SCOPE.sCountry('panum_scarlet_country_scope').GetName]."
 panum.52.q: "En realidad, ese es un mal plan ..."
 panum_no_expedition_effect_tt: "Su [concept_panum_physician] es libre de llevar a cabo otras actividades nuevamente."
 panum.51.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetFullName], una de las mentes principales de la Sociedad Médica de [GetPlayer.GetName], acordó viajar a un estado afectado por la epidemia e investigar la enfermedad allí. El médico espera que esto pueda dar como resultado una descripción completa de la enfermedad."
 panum.53.d: "La epidemia desenfrenada ha llevado a [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] a investigarla más de cerca para determinar las causas y desarrollar nuevos métodos para tratar la terrible enfermedad."
