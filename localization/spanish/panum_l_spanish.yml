 je_panum_germ_theory: "Gérmenes y miasmas" #NT!
 je_panum_germ_theory_reason: "Hipócrates de Cos es considerado el fundador de la teoría de los miasmas, exhalaciones tóxicas del suelo que se dispersan en el aire y contribuyen así a la propagación de enfermedades. En el siglo XIX, debido a la falta de conocimientos sobre bacterias y virus, los médicos e investigadores simplemente atribuían epidemias como el cólera a malos olores que se propagaban a través de los "miasmas". Esta teoría resultó ser un camino equivocado en medicina, aunque el modelo de los miasmas ya explicaba en parte de dónde vienen las epidemias y cómo se propagan. El conflicto entre los contagiadores, que defendían el contagio de persona a persona, y los anticontagiadores, los partidarios de la teoría de los miasmas, fue enconado a mediados del siglo XIX. En Londres se reconocieron las debilidades del modelo de los miasmas, aunque las reglas improvisadas para tratarlos, como la limpieza y el aislamiento, limitaron las epidemias hasta cierto punto. Si una nación encuentra evidencia suficiente a favor de la teoría de los gérmenes y en contra de la teoría de los miasmas, entonces este cambio de paradigma permitirá que haya menos eventos negativos en la búsqueda de métodos de tratamiento o en las epidemias. El primer descubridor de la teoría de los gérmenes recibe una bonificación adicional por investigación." #NT!
 je_panum_germ_theory_goal: ""
  
 notification_panum_germ_theory_notification_name: "Avance de la teoría de los gérmenes" #NT!
 notification_panum_germ_theory_notification_desc: "Por primera vez, un [concept_panum_physician] a partir del [GetGlobalVariable('panum_germ_theory_invented_global_var').GetCountryDefinition.GetName] ha podido fundamentar de manera concluyente la teoría de los gérmenes en todas sus facetas. La teoría de los miasmas ha sido completamente rechazada." #NT!
  
 panum.11.t: "La teoría de los gérmenes" #NT!
 panum.11.d: "Dada la abrumadora evidencia a favor de la teoría de los gérmenes y la igualmente abrumadora evidencia en contra de la teoría de los miasmas, se ha producido un cambio de paradigma médico. Y no es menos gracias al Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] que la teoría de los gérmenes se ha consolidado." #NT!
 panum.11.f: "La teoría de los miasmas es un ejemplo típico de tesis científica difícil de refutar, ya que se supone que se confirma en todas partes. El hecho de que las normas de limpieza e higiene para un "aire limpio" garantizaran la desaparición de algunas enfermedades parecía confirmarse en el siglo XIX. Al mismo tiempo, impidió que la ciencia médica lograra avances en una amplia variedad de campos, ya que las verdaderas causas y, por lo tanto, los métodos de curación reales seguían siendo desconocidos. A partir de ahora, los médicos tendrán más éxito en el descubrimiento de métodos de tratamiento, y el camino está libre para la investigación de patógenos y vacunas." #NT!
 panum.11.g: "Pero ¿realmente queríamos saber qué pasa en el agua...?" #NT!
  
 panum.53.t: "El Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] viaja al Estado Epidémico" #NT!
 panum.53.d: "La epidemia desenfrenada ha llevado a [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] a investigar el estado de [SCOPE.sState('panum_disease_state').GetName] más de cerca para determinar las causas y desarrollar nuevos métodos para tratar la terrible enfermedad." #NT!
 panum.53.f: "Los métodos de tratamiento son el paso más importante en la lucha contra una enfermedad. Son la base para una posible vacuna futura que pueda prevenir una epidemia. Sin embargo, incluso un método de tratamiento exitoso es lo suficientemente fuerte como para contener futuras epidemias y minimizar su duración y gravedad, lo que se traduce en un número significativamente menor de víctimas. Los médicos que estudian una epidemia en su propio país trabajan con mayor eficacia que los médicos que viajan al extranjero." #NT!
 panum.53.g: "¡Este horror debe terminar!" #NT!
  
 panum.54.t: "Expedición de investigación médica" #NT!
 panum.54.d: "El Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha reunido un pequeño equipo de expertos y colaboradores que están capacitados para estudiar de forma intensiva una epidemia en el extranjero y, posiblemente, desarrollar un nuevo método de tratamiento. Ahora se plantea la cuestión de qué enfermedad se debe observar en qué país." #NT!
  
