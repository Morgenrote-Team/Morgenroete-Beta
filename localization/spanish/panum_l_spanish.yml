 panum.55.t: "El Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] puede describir una enfermedad extraña" #NT!
 panum.55.d: "Otro país tiene un brote de enfermedad que su [concept_panum_physician] podría investigar para describir la enfermedad." #NT!
 panum.55.g: "¡Envíe a nuestro médico inmediatamente!" #NT!
 panum.55.h: "No ahora mismo." #NT!
 panum.55.i: "Avísame de una manera menos intrusiva." #NT!
 panum.55.j: "No me hables más de esto." #NT!
 panum_foreign_disease_research_only_notification_tt: "A partir de ahora se le notificará con #V Notificaciones#! sobre la posibilidad de enviar sus [concept_panum_physician] a países con enfermedades." #NT!
 panum_foreign_disease_research_no_notification_tt: "#n Ya no se le notificará sobre la posibilidad de enviar sus [concept_panum_physician] a países con enfermedades." #NT!
  
 panum.56.t: "El Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] puede encontrar un tratamiento para una enfermedad extraña" #NT!
 panum.56.d: "Otro país tiene un brote de enfermedad que su [concept_panum_physician] podría investigar para encontrar un tratamiento para la enfermedad." #NT!
  
 notification_panum_foreign_description_possible_notification_name: "Es posible realizar una expedición de observación médica" #NT!
 notification_panum_foreign_description_possible_notification_desc: "Podrías enviar a tu [concept_panum_physician] a una expedición de observación médica para describir una enfermedad." #NT!
 notification_panum_foreign_treatment_possible_notification_name: "Posible expedición de investigación médica" #NT!
 notification_panum_foreign_treatment_possible_notification_desc: "Podrías enviar tu [concept_panum_physician] a una expedición de investigación médica para describir una enfermedad." #NT!
  
 panum.131.t: "Estudios de enfermedades interrumpidos" #NT!
 panum.131.d: "Dado que la peligrosa epidemia en [GetPlayer.GetName] ha llegado a su fin y los últimos pacientes ya se han recuperado, el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha terminado por el momento los estudios de [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]. El médico ha podido recopilar información importante que debería simplificar una futura descripción científica de la enfermedad, pero [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] aún no ha logrado ningún avance." #NT!
 panum.131.f: ""Toda especulación sobre su origen y sus causas, si es que se pueden encontrar causas adecuadas para producir un trastorno tan grande, la dejo a otros escritores, ya sean profanos o profesionales; por mi parte, simplemente describiré su naturaleza y explicaré los síntomas por los cuales tal vez el estudiante pueda reconocerla, si alguna vez volviera a aparecer. Esto lo puedo hacer mejor, ya que yo mismo padecí la enfermedad y observé su desarrollo en el caso de otros". -Tucídides" #NT!
 panum.131.g: "Se ha dado otro paso." #NT!
 panum.133.t: "Expedición médica discontinuada" #NT!
 panum.133.d: "La expedición médica ha terminado su trabajo por ahora, ya que la epidemia ha terminado. El Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] no logró completar una descripción científica, pero los estudios de [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] deberían ser valiosos para el futuro." #NT!
 panum.134.d: "La terrible epidemia que azotó a nuestro país ya pasó, pero eso también significa que el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] tiene que suspender por el momento las investigaciones de [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis], ya que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] no puede realizar más experimentos para encontrar un método de tratamiento para la enfermedad. No obstante, el médico ha obtenido valiosos conocimientos que sin duda le serán útiles en el futuro." #NT!
 panum.134.f: "«El contagio pasa de una cosa a otra y es causado originalmente por la infección de la partícula imperceptible.» -Girolamo Fracastoro" #NT!
 panum.134.g: "Es sólo cuestión de tiempo antes de que encontremos una cura." #NT!
 panum.136.d: "Lamentablemente, la expedición de investigación médica ha finalizado por el momento sin ningún resultado final. Dado que la epidemia ha abandonado el país, el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] no ha verificado las teorías de [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]. Los resultados provisionales estarán a disposición de [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] y las generaciones futuras para que finalmente encuentren un método de tratamiento." #NT!
  
