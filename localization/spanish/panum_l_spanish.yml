 je_panum_measles_treatment_reason: "El doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] está examinando actualmente a varios pacientes en [SCOPE.sState('panum_disease_state').GetName] para determinar la causa del #YELLOW sarampión#!.. Sólo las verdaderas causas de la aparición de la enfermedad pueden ayudar a hacer prevenciones que conduzcan a un método moderno de tratamiento. Cuando el doctor haya terminado su trabajo, presentará su tesis al público. Esto no evitará futuras epidemias -para ello es necesario identificar el patógeno y posiblemente una vacuna- pero los efectos de una nueva epidemia serán relativamente pequeños." #NT!
