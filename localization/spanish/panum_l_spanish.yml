 panum_congress_host_modifier: "Recientemente organizó un Congreso médico"
 panum_congress_attend_modifier: "Asiste al Congreso Médico"
 panum.2000.t: "Preparaciones para el Congreso Médico"
 panum.2000.d: "Antes de que el próximo Congreso Médico Internacional se celebre en nuestro país, surge la pregunta de si el Congreso debería centrarse en una enfermedad específica o no."
 panum.2000.f: "Las conferencias médicas pueden centrarse en una enfermedad específica si la nación anfitriona tiene al menos una descripción de la enfermedad. Un Congreso solo se puede llevar a cabo una vez para cada enfermedad. Los médicos y los microbiólogos presentan reciben pistas adicionales para que puedan avanzar su investigación más rápidamente. En un Congreso General, las naciones participantes simplemente reciben una bonificación para su progreso académico."
 panum.2000.g: "Se supone que esta es una conferencia médica general."
 panum.2001.t: "Congreso médico"
 panum.2001.d: "La capital se está preparando para la reunión internacional de especialistas médicos. [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] presidirá las reuniones como presidente. [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_congress_title')]"
 panum.2001.f: "Las conferencias médicas son una excelente oportunidad para intercambiar conocimiento médico. Los logros que anteriormente estaban reservados para un solo país se comparten aquí de manera fraternal. Las conferencias médicas solo pueden ser organizadas por médicos, pero los biólogos con la especialización de microbiología también están invitadas y pueden compartir su conocimiento en el campo de los patógenos y las vacunas. Si un país tiene un médico y un microbiólogo, ambos pueden participar."
 panum.2001.g: "¡Envía las invitaciones!"
 panum.2002.t: "Invitación para el Congreso Médico"
 panum.2002.d: "[SCOPE.sCountry('panum_congress_host_country').GetName] está invitando a las principales naciones médicas a un congreso internacional en su capital. Tanto los médicos como los microbiólogos están invitados. [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_congress_title')]"
 panum.2002.g: "¡No olvides los estetoscopios y microscopios!"
 panum.2003.t: "Descripciones y tratamientos"
 panum.2003.d: "El Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] tiene la oportunidad única de obtener ideas epidemiológicas innovadoras en el Congreso Médico en [SCOPE.sCountry('panum_congress_host_country').GetName]. ¿Qué enfermedad debería ser el foco?"
 panum.2003.f: "Si una nación que asiste al Congreso Médico conoce una descripción de una enfermedad o un tratamiento para una enfermedad que otro país no posee, entonces este último puede aprenderla en el Congreso. El conocimiento solo se puede mejorar sobre una enfermedad. Si no es posible un nuevo conocimiento en el Congreso, todavía existe la posibilidad de acumular el conocimiento general y mejorar una tecnología médica. La participación de un médico es crucial para esto."
 panum.2003.g: "El médico debe reunir algunos conocimientos médicos generales de colegas."
 panum.2003.h: "Cólera."
 panum.2003.i: "Tuberculosis."
 panum.2003.j: "Viruela."
 panum.2003.k: "Tifus."
 panum.2003.l: "Fiebre amarilla."
 panum.2003.m: "Sarampión."
 panum.2003.n: "Escarlatina."
 panum.2003.o: "Plaga."
 panum.2003.p: "Difteria."
 panum.2003.q: "Polio."
 panum.2004.t: "Patógeno y vacuna"
 panum.2004.d: "Fue con deleite que el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] descubrió que había muchas personas de ideas afines en el Congreso en [SCOPE.sCountry('panum_congress_host_country').GetName] que estaban dispuestas a compartir su conocimiento microbiológico. La única pregunta es cuáles de las maravillosas enfermedades [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] les gustaría saber más en el futuro."
 panum.2004.f: "Si una nación que asiste al Congreso Médico conoce un patógeno de una enfermedad o una vacuna por una enfermedad que otro país no posee, este último puede aprenderlo en el Congreso. El conocimiento solo se puede mejorar sobre una enfermedad. Si no es posible un nuevo conocimiento en el Congreso, todavía existe la posibilidad de acumular el conocimiento general y mejorar una tecnología biológica. La participación de un biólogo con el rasgo de microbiólogo es crucial para esto."
 panum.2004.g: "Nuestro científico debería reunir algún conocimiento biológico general de colegas."
 panum.2005.t: "Una visión médica"
 panum.2005.d_general: "Los médicos y biólogos del Congreso decidieron, en particular, modernizar y mejorar la capacitación de posibles estudiantes de medicina y escribieron una declaración conjunta al respecto."
 panum.2005.d_special: "Dado el enfoque principal de la conferencia, los médicos y biólogos han votado para cambiar todos los esfuerzos a combatir una enfermedad específica en los próximos años."
 panum.2005.f: "Si se ha declarado un cierto tema el tema principal al comienzo del Congreso Médico, todas las naciones participantes recibirán pistas adicionales sobre esta enfermedad, dependiendo de si un físico, un microbiólogo o ambas están presentes. Si se trata de un Congreso General, el enfoque está en capacitar al nuevo personal médico."
 panum.2005.g: "El evento valió la pena."
 panum.2009.t: "El Congreso Médico termina"
 panum.2009.d: "El Congreso Médico en [SCOPE.sCountry('panum_congress_host_country').GetName] terminó ayer. Los médicos y los microbiólogos están de camino a casa nuevamente y están trayendo numerosos hallazgos."
 panum.2009.f: "El Congreso Médico Internacional (Francés: Congrès International de Médecine) fue una serie de conferencias científicas internacionales sobre medicina que tuvo lugar, periódicamente, desde 1867 hasta 1913. La idea de tal Congreso llegó en 1865, durante el tercer Congreso Médico Anual de Francia; El profesor Henri Giutrac propuso celebrar una conferencia médica internacional en 1867, aprovechando el hecho de que los médicos y cirujanos de todo el mundo seguramente estarían en París para asistir a la exposición internacional de ese año."
 panum.2009.g: "¿Espero que el buffet haya sido bueno?"
 panum_surgeon: "Cirujano"
 panum_surgeon_desc: "Los cirujanos están en casa en la vida médica cotidiana, pero pueden ser útiles en la investigación médica o los tratados anatómicos."
 panum_psychiatrist: "Psiquiatra"
 panum_psychiatrist_desc: "Los psicatristas están interesados ​​en mejorar las condiciones de las personas con enfermedades mentales y están impulsando la investigación y los nuevos métodos de tratamiento en este campo."
 panum_military_physician: "Médico militar"
 panum_military_physician_desc: "Este médico se especializa en el cuidado de los heridos en el campo de batalla y es particularmente exitoso en mejorar los primeros auxilios."
