 panum_medical_reformer_slot_modifier: "Reformador médico" #NT!
  
 panum.1000.t: "Llamados a reformas médicas" #NT!
 panum.1000.d: "Mientras una peligrosa enfermedad hace estragos en [GetPlayer.GetName], el médico local [SCOPE.sCharacter('panum_medical_reformer_scope').GetFullName] pide que se introduzca asistencia sanitaria para la población, con la esperanza de que la epidemia pueda detenerse gracias a la asistencia médica." #NT!
 panum.1000.f: ""¡Están muriendo en las calles! ¡Esto es inaceptable! ¡Tenemos que hacer algo!"" #NT!
 panum.1000.g: "¡Creo que [SCOPE.sCharacter('panum_medical_reformer_scope').GetSheHe] favorecería a [GetLawType('law_public_health_insurance').GetName]!" #NT!
 panum.1000.h: "¡Creo que [SCOPE.sCharacter('panum_medical_reformer_scope').GetSheHe] favorecería a [GetLawType('law_private_health_insurance').GetName]!" #NT!
 panum.1000.i: "¡Creo que [SCOPE.sCharacter('panum_medical_reformer_scope').GetSheHe] favorecería a [GetLawType('law_charitable_health_system').GetName]!" #NT!
  
 panum.51.t: "El Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] viaja al Estado Epidémico" #NT!
 panum.51.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetFullName], una de las mentes más destacadas de la sociedad médica de [GetPlayer.GetName], viajó a [SCOPE.sState('panum_disease_state').GetName] para investigar más sobre la enfermedad. El médico espera que esto pueda dar como resultado una descripción completa de la enfermedad." #NT!
 panum.51.f: "Una descripción completa de una enfermedad es un primer paso para comprenderla y combatirla más tarde. Las descripciones no tienen todavía un efecto directo sobre el alivio, pero son la base de un método de tratamiento posterior. Los médicos que estudian una epidemia en su propio país trabajan con mayor eficacia que los médicos que viajan al extranjero." #NT!
 panum.51.g: "Tienes que conocer a tus enemigos para poder derrotarlos." #NT!
  
