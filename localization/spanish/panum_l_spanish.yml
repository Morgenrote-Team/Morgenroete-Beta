 je_panum_smallpox_treatment_expedition_reason: "El Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] dirige una expedición médica en [SCOPE.sCountry('target').GetName] para encontrar métodos de tratamiento contra #YELLOW la viruela. #!. Mientras la enfermedad siga haciendo estragos en el país, [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] tiene una oportunidad mensual de rastrear las causas de la enfermedad y contenerla.\n\nSi la enfermedad remite, el progreso científico no se perderá, sino que también estará presente en el próximo examen." #NT!
