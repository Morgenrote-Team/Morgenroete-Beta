 panum.138.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_description_title')]" #NT!
 panum.138.d: "El doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] presentó hoy la descripción de la enfermedad [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] de [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_disease_title')]. La Facultad de Medicina ya la considera un clásico." #NT!
 panum.138.f: "En el tratado [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_description_title')] [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] se aborda la enfermedad con más detalle que ningún otro médico de nuestro país. Se enseña al lector sobre los síntomas, el período de incubación y la diferenciación con otras enfermedades, así como una cronología de epidemias pasadas y otras descripciones epidemiológicas tradicionales." #NT!
 panum.138.g: "Ahora conocemos mejor a la bestia." #NT!
 panum.139.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_treatment_title')]" #NT!
 panum.139.d: "Después de un gran esfuerzo, el Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] finalmente escribió su [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] sobre un método de tratamiento exitoso para la enfermedad [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_disease_title')]. Se considera un hito en la [ROOT.GetCountry.GetAdjectiveNoFlag] medicina." #NT!
 panum.139.f: "La Facultad de Medicina esperaba con impaciencia el artículo científico sobre el método de tratamiento de [ROOT.Var('panum_physician_var').GetCharacter.GetFullName]. ¿Podría este trabajo suponer un gran avance? [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_treatment_title')] podría salvar potencialmente la vida de innumerables personas. Las razones que describe para el brote de [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_disease_title')] y las formas en que se puede prevenir o tratar posteriormente podrían cambiar fundamentalmente la forma en que se ha pensado sobre esta enfermedad." #NT!
 panum.139.g: "[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_disease_title')] está perdiendo su horror." #NT!
  
 panum.140.t: "Cólera: ¡Una enfermedad transmitida por el agua!" #NT!
 panum.140.d: "¡Gracias al heroico trabajo del Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], el brote de cólera en [SCOPE.sState('panum_disease_state').GetCityHubName] ha sido aplastado decisivamente!" #NT!
 panum.140.f: "'Desde el comienzo de mi tiempo aquí en [SCOPE.sState('panum_disease_state').GetCityHubName], he reunido una gran cantidad de información que apunta a una sola conclusión: el cólera es una enfermedad transmitida por el agua. La enfermedad que ha matado a tantas personas durante siglos no se encuentra en el aire, como miasma, sino que se retuerce y se acumula en gotas de agua. Si se ingiere, se desarrolla en el intestino y se manifiesta en el cólera que hemos aprendido a combatir. Es una lección que se aprende con dificultad, pero que se pone en práctica rápidamente. La semana pasada, quitaron las manijas de la bomba de agua que estaba en el corazón de este brote. Hoy, me voy a la cama sin que me traigan un solo caso nuevo a la mesa. Es irrefutable. La bestia ha muerto.\n\nSin embargo, siento una punzada de lamento por todo esto. No deseo poder reclamar la responsabilidad total y exclusiva de los descubrimientos que hicimos aquí, solo que podrían haberse descubierto incluso antes. Se perdieron muchas vidas por falta de agua potable, jóvenes y viejos. Si tenemos suerte, que ésta sea la última vez que nos enfrentemos al cólera.'\n\nDel diario del Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], escribiendo sobre la Gran Epidemia de Cólera de [TimeKeeper.GetCurrentDate.Format('y')], concluyendo la investigación en [SCOPE.sState('panum_disease_state').GetCityHubName]." #NT!
 panum.140.g: "¡Increíble! ¡Esto es un golpe mortal para la teoría del miasma!" #NT!
 panum.141.t: "La cervecería" #NT!
 panum.141.d: "La investigación del Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha llevado a [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] a una isla segura en el brote: una fábrica de cerveza." #NT!
 panum.141.f: "—¡Hola! Me han dicho que usted debe ser el capataz de la cervecería. Soy el doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] y estoy aquí para investigar el brote. Cuénteme más, por favor. —Bueno, aquí no ha habido un gran problema. La mayoría de las otras fábricas han estado cerrando, pero no a nosotros. —¿El cólera no les afecta mucho aquí? ¿Tienen alguna idea de por qué? —Me temo que no es la primera pista. Pero si tuviera que apostar, es porque los muchachos no vuelven a casa a encontrar todo ese hedor. —¿Comen en la cervecería? —¡Sí, y también beben! El jefe nos deja a todos tomar algunos de los lotes más viejos que no se venden bien con el almuerzo, un pequeño estímulo para los muchachos a bajo precio. Nada de esa agua de pozo para nosotros, solo una pinta de cerveza por casi lo mismo que costó hacerla." #NT!
 panum.141.g: "Hmmm... así que no bebes el agua local. Muy fascinante." #NT!
 panum.142.t: "Criaturas de costumbres" #NT!
 panum.142.d: "La investigación del Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] continúa: [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] ha encontrado lo que podría ser el centro del brote." #NT!
 panum.142.f: ""... pero los casos eran tan comunes en la zona que me di cuenta de que necesitaba más orientación. Afortunadamente, la oficina forense local resultó ser de gran ayuda: habían anotado la dirección de cada casa de la que habían sacado un cuerpo o habían notado alguna enfermedad, y eso me proporcionó los medios para ubicar cada una de ellas con precisión en un mapa simple. El área resultante es vasta, abarca más de cien casas, pero también forma un gran círculo.\n\nEsto va en contra del pensamiento tradicional. Si fuera un miasma, seguramente sería transportado por la brisa, viajando a lo largo de los vientos dominantes. En cambio, va más allá de los vientos, redondo e inquietantemente ordenado. Caminé hasta el centro de todo, tal vez con la esperanza de encontrar alguna pista... y no encontré nada más que una bomba de agua. Todas las casas del mapa estaban a una distancia caminable. Debe haber algún tipo de conexión".\n\nDel diario del Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], escribiendo sobre la Gran Epidemia de Cólera de [TimeKeeper.GetCurrentDate.Format('y')], investigando en [SCOPE.sState('panum_disease_state').GetCityHubName]." #NT!
 panum.142.g: "¿Podría estar en la bomba, de alguna manera?" #NT!
 panum.143.t: "Los raros" #NT!
 panum.143.d: "El doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha encontrado algo interesante: una ruptura en el patrón." #NT!
 panum.143.f: "—¡Oh, gracias a Dios! ¡Usted debe ser el médico del que están hablando, doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]! Por favor, tiene que ayudarnos. —Tengo toda la intención de hacerlo, señora. Por favor, cuénteme todo lo que pueda sobre usted y los suyos, y no escatime ni el más mínimo detalle si puede. El suyo parece ser uno de los únicos casos en este vecindario. —¡Sí, sí, lo somos! ¡Simplemente salió de la nada! ¡Tomamos todas las precauciones, incluso usamos una de esas máscaras florales con todas las flores para mantener a raya el hedor! —¿Luego fue a la zona del brote? ¿Para qué? —Mi madre, mi querida madre... siempre le gustó más el agua de su bomba, pero cuando la traje de vuelta, la enfermedad debe haberse pegado a mi ropa y se vino a casa conmigo." #NT!
 panum.143.g: "...¿Dijiste que trajiste agua de su bomba?" #NT!
 panum.144.t: "Los filtros" #NT!
 panum.144.d: "En un intento de [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] por descubrir más pistas sobre el brote, el Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha descubierto que todas las víctimas reciben agua de la misma compañía." #NT!
 panum.144.f: ""...pero lo más curioso de todo es que cuando viajé por la carretera o río arriba hasta las casas que recibía el apoyo de la New River Company, la cantidad de casos de cólera descendió drásticamente. No fue más de lo habitual, si es que lo fue. Si se regresa al sur, uno encuentra las calles en llamas por el cólera, llenas del hedor de intestinos revueltos y muerte. ¿Podría ser una localización de suelo miasmático?\n\nNo lo creo. Parece demasiado claramente marcado. Me puse en contacto con los honorables caballeros de la New River Company y me informaron que sus tuberías habían sido cerradas recientemente mientras añadían nuevos filtros, a un gran costo, a su estación de bombeo. ¿Podrían estos filtros estar desempeñando algún papel invisible en esto? ¿Podría ser la limpieza ociosa del agua lo que mantiene a raya el miasma, o algo más?"\n\nDel diario del Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], que escribe sobre la Gran Epidemia de Cólera de [TimeKeeper.GetCurrentDate.Format('y')], investigando en [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.144.g: "...¿Hay algo en el agua que traiga enfermedades?" #NT!
 panum.145.t: "Agua marrón" #NT!
 panum.145.d: "Equipado con los últimos instrumentos para la investigación [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis], el Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha utilizado un microscopio [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] para examinar muestras del brote de cólera." #NT!
 panum.145.f: "No había sido fácil llevar el microscopio hasta [SCOPE.sState('panum_disease_state').GetCityHubName], porque un bache en el camino casi había destrozado todas las lentes... pero ahora que estaba allí, el doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] tenía a su disposición una de las mejores herramientas de la medicina moderna. Unas cuantas docenas de muestras recogidas del agua local, cuidadosamente preparadas y examinadas cada una bajo el microscopio. Algunas provenían de zonas con menos cólera. Esas eran las más limpias, observó [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe].\n\n¿Pero las sucias? ¿Las que estaban plagadas de suciedad de la peor clase?\n\nEsos eran los de las zonas más afectadas. Una frente cepillada, un momento de reflexión. Destellos de mugre flotando en el líquido, como copos de nieve sucia. Aquí, allí, los diminutos movimientos de microbios inofensivos, revoloteando inocentemente por la miserable sopa." #NT!
 panum.145.g: "...¿O no eres tan inofensivo como pareces?" #NT!
 panum.145.h: "Más evidencia para otra teoría." #NT!
 panum.145.i: "Tiene que haber algo más." #NT!
 panum.146.t: "La primera muerte" #NT!
 panum.146.d: "Después de un incansable trabajo e investigación, el Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha rastreado el brote hasta el primer caso registrado: un bebé recién nacido." #NT!
 panum.146.f: "Había pocos recordatorios más sombríos de lo que hacía el doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] que visitar la casa de una mujer en pleno duelo, una mujer que había sido esposa y madre, pero que ahora no era ni lo uno ni lo otro. Apenas había llegado a los escalones de la puerta de su casa y el doctor estaba tomando notas.\n\nSe llevaron a un niño recién nacido de la calle para visitar a su abuela. Volvió con cólera. Se lavaron los pañales, posiblemente portando la enfermedad.\n\nEl marido volvió del trabajo. Tenía sed después de su turno en la fábrica de acero. Comió bien, bebió bien, murió al final de la semana, cólera.\n\nDetrás de ellos, gemidos. Delante, calles lluviosas y desoladas. Entre todo eso, una frase susurrada." #NT!
 panum.146.g: "Por favor, que todo esto acabe." #NT!
 panum.147.t: "El pozo" #NT!
 panum.147.d: "Mientras realizaba la investigación [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis], el Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] encontró algo que había pasado por alto: un pozo negro." #NT!
 panum.147.f: "El doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] no era partidario de la teoría de los miasmas, pero [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] se sentía muy agradecido por las máscaras florales que se suponía que lo mantenían a raya. El pozo negro estaba lleno de desechos podridos y era completamente rancio. Hasta el inspector de policía se apartó de su borde.\n\n—¡Doctor! ¡Un pozo así debe ser sin duda la fuente de este miasma y del miserable cólera que nos da!\n\n—Quizás, pero mire aquí, inspector. ¿Ve cómo fluye la lluvia hacia la tierra, aquí?\n\n—Sí, lo veo, pero ¿qué pasa?\n\n—El agua de lluvia fluye desde este pozo negro de ahí abajo, hacia las canaletas. Debe fluir a través de ellas, pero si es así, llevaría el agua cerca de la bomba. Si los accesorios están dañados...\n\n—... entonces el agua residual se quedaría atascada justo en el mango. Uf. Menos mal que la enfermedad no se propaga a través del agua..." #NT!
 panum.147.g: "...¿bien?" #NT!
 panum.147.h: "¡Equivocado!" #NT!
 panum.148.t: "La Mansión" #NT!
 panum.148.d: "La investigación del Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha llevado a [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] a un curioso agujero en las garras del brote: la casa de un hombre rico." #NT!
 panum.148.f: "'Hoy visité la residencia de un caballero local, una vivienda más grande dentro de los confines de la ciudad, peligrosamente cerca del corazón del brote. Parecería un vestigio de una época anterior en la historia de esta ciudad, cuando esta parte era más rica que un pequeño barrio marginal. El dueño de la casa estaba bastante fascinado por la investigación y me proporcionó una gran cantidad de libros sobre la historia local con la esperanza de que pudieran arrojar luz sobre brotes pasados. Más interesante aún, dejaron en claro que el cólera aún no ha traspasado sus muros.\n\nEso me resultó bastante fascinante, ya que según los principios de la teoría del miasma, la enfermedad está en el aire, en el olor, y no debería discriminar entre ricos y pobres de esta manera. Incluso sus sirvientes no están afectados, al menos los que viven dentro de los aposentos. Comen del almacén y beben del pozo artesiano dentro de los muros y, de alguna manera, esto los hace inmunes. Un curioso enigma. ¿Es algo que ellos tienen que los demás no tienen? Del diario del Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], escribiendo sobre la Gran Epidemia de Cólera de [TimeKeeper.GetCurrentDate.Format('y')], investigando en [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.148.g: "O... ¿quizás a los sirvientes les falta algo que los enfermos podrían tener?" #NT!
 panum.149.t: "La pequeña muerte" #NT!
 panum.149.d: "La investigación del Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] posiblemente ha revelado al culpable: ¡un microbio!" #NT!
 panum.149.f: "''...pero, aun así, tenía que estar especialmente seguro. Pedí muestras frescas, tomadas tanto del agua como de un efluente especialmente preparado de los enfermos. Colocadas sobre el cristal de mi microscopio, pude mirar dentro de estos líquidos y confirmar la presencia de lo que debe ser nuestro gran enemigo en esta batalla: los vibriones.\n\nA primera vista, estos microbios parecen inofensivos, más parecidos a tubos que a cualquier gran depredador. Pero cada muestra de los enfermos confirma su presencia, y parece seguro decir que estas criaturas juegan algún papel en esta enfermedad. ¿Son... el cólera en sí? Tal vez. Si es así, es una prueba contundente de la teoría de que gérmenes como este causan enfermedades.\n\nPero una cosa es segura: hemos encontrado al enemigo. Ahora, debemos matarlo.'\n\nDel diario del Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], escribiendo sobre la Gran Epidemia de Cólera de [TimeKeeper.GetCurrentDate.Format('y')], investigando en [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.149.g: "Limpiar y tratar hasta que esté listo." #NT!
 panum.149.h: "Este descubrimiento va mucho más allá del cólera." #NT!
 panum.150.t: "Un asunto práctico" #NT!
 panum.150.d: "Un aliado poco común en la batalla contra la enfermedad, el Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] se reúne con el forense en [SCOPE.sState('panum_disease_state').GetCityHubName] para discutir sus hallazgos." #NT!
 panum.150.f: "—Ah, ¡usted debe ser el doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]! Perdóneme por no estrecharle la mano, he estado hurgando entre cadáveres durante los últimos días. —Créame, no necesita pedirme perdón. Usted es el forense local, por favor, cuénteme sus hallazgos. —Como usted sabe, el cólera es una enfermedad de los intestinos. No necesito decir más que eso. Vómitos, purgas, un intestino tan obstruido que parece clara de huevo, alguien tan erudito como usted sabrá la lista. —Por supuesto, pero ¿qué es lo que le parece interesante? —Bueno... me siguen diciendo que esto es miasma, que esta muerte está en el aire... pero honestamente, no lo creo. Si así fuera, ya estaría muerto. He tenido muchos cadáveres en esa mesa, doctor. Esto apesta a intoxicación alimentaria, pero no lo es." #NT!
 panum.150.g: "Una idea fascinante. Cuéntame más." #NT!
  
 panum_physician_health_bonus_modifier: "Ahorrar más de Lo siento" #NT!
 panum_physician_health_malus_modifier: "Trabajo inquieto" #NT!
  
 panum.151.t: "La fábrica de herramientas" #NT!
 panum.151.d: "Mientras trabaja en la investigación [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis], el viaje del Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a una fábrica de herramientas local plantea más preguntas que respuestas." #NT!
 panum.151.f: "'Cuando el otro día fui a la fábrica de herramientas, al principio todo parecía tener sentido. Esta fábrica se especializa en cuchillos, herramientas de carnicero y similares, y por eso tienen una estación de afilado. Utiliza ruedas hidráulicas para hacer girar una gran cantidad de piedras de afilar, ruedas de afilar para terminar el filo de cada hoja. Cada trabajador se tumba boca abajo cerca de la amoladora y puede ser salpicado con agua. Todo esto tiene sentido, y si el brote en la fábrica se hubiera limitado allí, habría tenido sentido.\n\nLo extraño es que esto rompe una tendencia que se observa en todas partes. Hay hombres en la fábrica que se enferman sin haber estado nunca cerca de la calle en el corazón de este brote, ni cerca de las ruedas de afilar. ¿Cómo podría ser esto posible?'\n\nDel diario del Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], escribiendo sobre la Gran Epidemia de Cólera de [TimeKeeper.GetCurrentDate.Format('y')], investigando en [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.151.g: "Aparentemente una pista equivocada." #NT!
 panum.151.h: "Aparentemente una teoría equivocada." #NT!
 panum.152.t: "El tarro" #NT!
 panum.152.d: "Desafortunadamente, el Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha estado persiguiendo un callejón sin salida: un caso local de intoxicación alimentaria, no relacionado con el cólera." #NT!
 panum.152.f: ""Hoy fue un día muy molesto. La policía me llamó para investigar un brote repentino de enfermedad en un hotel popular, que parecía ser un brote repentino de cólera. Había reunido todas mis cosas para investigar, alertando a las autoridades correspondientes para que encontraran camas y atendieran a los enfermos, pero en el momento en que llegué supe que no se trataba de cólera. Los síntomas no eran los adecuados, la aparición repentina fue demasiado rápida. Una causa más local tenía que ser la culpable y, como era de esperar, todos los afectados habían comido la misma comida.\n\nUna incursión en las cocinas reveló al culpable: un frasco de paté de pato seguramente caducado, untado en pan fino por un cocinero con la nariz demasiado tapada por un resfriado para oler la podredumbre. Una pérdida de tiempo si alguna vez las hubo. La intoxicación alimentaria no es cólera".\n\nDel diario del Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], escribiendo sobre la Gran Epidemia de Cólera de [TimeKeeper.GetCurrentDate.Format('y')], investigando en [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.152.g: "...bueno, al menos sabemos que hay que limpiar los armarios, al menos." #NT!
 panum.153.t: "Extravíos" #NT!
 panum.153.d: "Durante la investigación del Doctor ocurrió un accidente: ¡mezclaron sus muestras! [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] - [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe]" #NT!
 panum.153.f: "Pero justo en medio del trabajo, tuve una interrupción. Gritos, alaridos, el sonido de una pelea en la calle. Una pelea de borrachos, una taza de más. La policía se apresuró a poner orden, llevándolos a rastras, gritando todavía.\n\nNo me tomó más que un momento levantarme de mi asiento y cerrar las persianas, y menos aún volver a mi trabajo. Soy más tonto que yo por no haberme dado cuenta de que había colocado las muestras en el orden equivocado, y ¿de dónde a partir de ahí sino de hacer mi trabajo en el orden equivocado, registrando cada una en el orden equivocado?\n\nDel diario del Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], escribiendo sobre la Gran Epidemia de Cólera de [TimeKeeper.GetCurrentDate.Format('y')], investigando en [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.153.g: "Semanas de trabajo desperdiciadas. Maldita sea." #NT!
 panum.154.t: "¿El asesino imitador?" #NT!
 panum.154.d: "La investigación del brote de cólera en [SCOPE.sState('panum_disease_state').GetCityHubName] ha dado un giro alarmante: ¡parece que podría tratarse de otra enfermedad!" #NT!
 panum.154.f: "—Ah, me alegro de volver a verte, doctor %Name%. Mi mesa ha estado ocupada esta última semana. —No diría que me alegro de conocerte, forense. ¿Qué tenemos? —Están llegando más cadáveres. Pensé que se trataba más bien de cólera, y tal vez lo sea, pero esto no es del todo correcto. —¿Intoxicación alimentaria? —No, no con la velocidad a la que esto los está matando. Sobre todo a niños y ancianos. —El cólera es incluso más letal para los vulnerables que para cualquier otra persona. ¿Estás seguro de que no es esto? —No es como si escribiera su nombre en el interior de sus venas. ¿Disentería, cólera, tifus? ¿Intoxicación alimentaria común? ¿Quién puede decirlo? Lo único que sé es que no parece lo mismo. "No tenemos la enfermedad blanca, como el cólera, pero la muerte es la misma".\n\n"Entonces bien podríamos tener una segunda enfermedad... maldición y condenación. ¿Cómo podemos distinguirlas?\n\n"Tú eres el médico, no yo"." #NT!
 panum.154.g: "No puedo hacer un plan si no sé contra qué estoy luchando." #NT!
 panum.155.t: "¿El Miasma...?" #NT!
 panum.155.d: "La investigación del Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] y [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] se ha topado con un problema: ¿podría ser que el miasma sea real?" #NT!
 panum.155.f: "''...pero los resultados de este último cuadrante de la investigación desafían los razonamientos de la teoría de los gérmenes, y no puedo entender por qué. Las casas están situadas junto a un canal poco profundo, por el que suelen pasar barcazas que llevan carbón a las fundiciones. No están a poca distancia a pie de ninguna bomba de agua, excepto un viejo pozo. Es pura, tal vez la más pura de la ciudad.\n\nSin embargo, por alguna razón que no entiendo, el cólera está aquí. Ya están trabajando para mantener a raya el hedor, y el hedor, el miasma, realmente está allí. El canal apesta a efluente... pero si no beben esta agua, ¿cómo pueden sufrir daño, excepto por el olor?'\n\nDel diario del Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], escribiendo sobre la Gran Epidemia de Cólera de [TimeKeeper.GetCurrentDate.Format('y')], investigando en [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.155.g: "Miasma no puede tener razón...¿verdad?" #NT!
 panum.156.t: "Deconstruido" #NT!
 panum.156.d: "Con hambre de más y más tierra para construir, el desarrollo de [SCOPE.sState('panum_disease_state').GetCityHubName] no tiene tiempo para detenerse, ni siquiera para la investigación del Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]." #NT!
 panum.156.f: "''... ¿Quién eres tú otra vez?''El médico que investiga este brote. Esta calle estaba llena de gente enferma. ¿Dónde están?''Ni idea. Mis muchachos y yo estamos aquí para empezar a derribar estas casas.''¿Derribarlas? ¿Qué? ¡Estas casas eran el hogar de una docena de familias, todas infectadas con cólera!''Bueno, ya no están. El propietario los echó a todos a la calle.''¿Ellos QUÉ?''¡Los echaron! No voy a pagar el alquiler así, pero de todos modos no importaría. El terreno se va a convertir en una fábrica textil y, si no te importa, yo y los muchachos tenemos que empezar a trabajar en derribar estas casas.''" #NT!
 panum.156.g: "Oh, por el amor de Dios. Ahora tengo que encontrar a los enfermos de nuevo... pero no beban nada." #NT!
 panum.157.t: "Contaminado" #NT!
 panum.157.d: "¡Terrible noticia! ¡El médico se ha contagiado de cólera!" #NT!
 panum.157.f: ""No sé cómo sucedió. ¿Miasma? He estado cerca de enfermos, muertos y moribundos durante semanas, más que nadie. ¿Gérmenes? No bebí el agua, pero ¿qué pasa con la contaminación? ¿Podría transmitirse por contacto? ¿En el aire, en las superficies? No lo sé.\n\nPero conozco los síntomas. El malestar estomacal y cómo nunca se acaba. Bien podría no comer ni beber nada, por todo el bien que me hace. Dice mil verdades y una.\n\nTengo cólera".\n\nDel diario del Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], escribiendo sobre la Gran Epidemia de Cólera de [TimeKeeper.GetCurrentDate.Format('y')], investigando en [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.157.g: "Oh, espero que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] mejore pronto." #NT!
  
 panum.161.t: "Un poco de ginebra" #NT!
 panum.161.d: "El doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] se ha tomado un tiempo libre de su trabajo para 'investigar' su otra pasión: el alcohol." #NT!
 panum.161.f: ""... pero mientras tomaba mi segundo vaso de esa maravillosa bebida, comencé a darme cuenta de algo bastante extraño. Cuanta más gente venía a este lugar a beber, menos probabilidades había de que se viera afectada por el cólera. ¡En efecto! Mi propio mapa de trazado muestra que las casas más cercanas a este lugar tienen una probabilidad sustancialmente menor de verse afectadas por esta horrible enfermedad.\n\nTengo la sensación de que hay un patrón allí. He hablado más con el propietario y con varios de los lugareños más afables, y parecen estar de acuerdo. Hay algo en este lugar que parece ayudar a defenderse de la enfermedad. Debería investigar más".\n\nDel diario del Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], escribiendo sobre la Gran Epidemia de Cólera de [TimeKeeper.GetCurrentDate.Format('y')], investigando en [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.161.g: "Ah, las maravillas de los negocios y el placer en uno." #NT!
 panum.162.t: "De abajo hacia arriba" #NT!
 panum.162.d: "El doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] tomó la decisión más audaz de todas: ¡[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] le contagió cólera a [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself] al beber agua contaminada!" #NT!
 panum.162.f: "''...por supuesto, la mejor teoría del mundo no es nada sin la práctica. A pesar de todo el trabajo, no es más que una casualidad para mis detractores, que siguen afirmando que no hay pruebas irrefutables con las que cimentar mis ideas. Muy bien, entonces. Los enfrentaré de frente y de la forma más directa de todas: bebiendo la misma agua que se encuentra en el corazón de este brote, entregada por un fiel mensajero. Si tienen razón, entonces no enfermaré ni siquiera cuando me saquen del lugar. Si la tengo, entonces pronto estaré luchando por mi vida, pero ¿qué es una vida, comparada con tantas que podrían salvarse si puedo demostrar mis afirmaciones?\n\nAsí que, mi querido diario, un brindis por la salud.\n\nDel diario del Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], escribiendo sobre la Gran Epidemia de Cólera de [TimeKeeper.GetCurrentDate.Format('y')], investigando en [SCOPE.sState('panum_disease_state').GetCityHubName]." #NT!
 panum.162.g: ""Oh, querido mío, siento... oh no."" #NT!
 panum.162.h: "¡Disuadir al médico de esta maniobra temeraria!" #NT!
 panum.163.t: "Un mapa hacia el éxito" #NT!
 panum.163.d: "El doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha conseguido trazar un magnífico mapa del núcleo del brote, lo que facilita el seguimiento del progreso de la enfermedad." #NT!
 panum.163.f: "'Señores, señores, les presento mi mapa de la infección en [SCOPE.sState('panum_disease_state').GetName]. Cubre, con gran detalle, la ubicación de cada infección en la región, cronometrada y sellada en consecuencia, con el nombre y número de muertes, infecciones, etc. Presenta una cronología escrita de toda la progresión del brote de cólera en este vecindario. Un ejemplo: aquí, vemos una bomba de agua y el número de casas a una distancia caminable.\n\nAdemás, presento las siguientes tablas, elaboradas tabulando la información de ese mapa. Si ustedes, señores, echan un vistazo por sí mismos, verán que las áreas a las que llega esta bomba de agua tienen las tasas de mortalidad más altas de todas. Aquí, en esta tabla, vemos que la compañía de agua, [SCOPE.sState('panum_disease_state').GetName] Wells, tiene una correlación directa con estas bombas, lo que a su vez muestra que esta compañía tiene el mayor riesgo de cólera de todas las áreas a las que llega..." #NT!
 panum.163.g: "Esto será una ciencia algún día." #NT!
 panum.164.t: "Fuego y furia" #NT!
 panum.164.d: "La falta de avances en la lucha contra el brote de cólera en [SCOPE.sState('panum_disease_state').GetName] ha agotado la paciencia del Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]" #NT!
 panum.164.f: "Los gritos se oían a casi una cuadra de distancia, y el sonido de libros y tazas arrojados desde su mesa desde mucho más allá de la puerta. Una ráfaga de maldiciones, disculpas frenéticas y desesperadas de los asistentes asustados, luego más gritos, y más aún.\n\n"¡Idiotas! ¡Imbéciles absolutos! ¡Estamos aquí por una RAZÓN! ¡La gente está muriendo afuera de nuestra puerta, y esperan que los salvemos, y los salvaremos!"\n\nLa mano del Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] se cerró en un puño.\n\n"¡Si no pueden obedecer ni siquiera las instrucciones más simples, entonces no deberían estar aquí! ¡Aquellos de ustedes que puedan, sigan mis órdenes al pie de la letra, y venceremos a esta miserable plaga! ¿Me escuchan?\n\n"¡Sí, Doctor!"\n\n"¡Ahora regresen y búsquenme más muestras! ¡Las CORRECTAS, esta vez!"" #NT!
 panum.164.g: "Y así, el médico pone a su ejército en marcha, listo para hacer la guerra contra la enfermedad misma." #NT!
 panum.165.t: "El corazón de la infección" #NT!
 panum.165.d: "En un momento de absoluto coraje, el Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha visitado uno de los hospitales más afectados de [SCOPE.sState('panum_disease_state').GetCityHubName] para entrevistar a los pacientes allí." #NT!
 panum.165.f: "El pabellón de este hospital improvisado era un lugar abarrotado, lleno de imágenes y sonidos, pero más que ningún otro, de olores. El olor de la enfermedad. El olor de la muerte. Habían traído flores para intentar mantener a raya el hedor, y también incienso, pero aun así, pocos acudían a esta sala de los condenados. Era demasiado arriesgado, decían, demasiado peligroso para su propia salud. ¿Cómo podían esperar ayudar a los demás, si ellos también yacían moribundos en una cama? Pocos acudieron, pero no ninguno. El doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] era uno de ellos, y recorrieron este lugar de muerte y agonía con un coraje incesante y una energía inagotable. Se sentaban al lado de los enfermos y los que estaban solos, haciendo preguntas, tomando notas. Cada pensamiento, cada respuesta, era preciosa. Eran las claves para la salvación, los indicios de dónde podía venir esta muerte y cómo también podía ser eliminada." #NT!
 panum.165.g: "Y en esa sala de la muerte, caminaba un ángel de la vida, diario en mano." #NT!
 panum.166.t: "El poder de la oración" #NT!
 panum.166.d_christian: "En busca de conocimiento y quizás consuelo, el Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha buscado un sacerdote en una catedral local." #NT!
 panum.166.d_muslim: "En busca de conocimiento y quizás consuelo, el Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha buscado un imán en una mezquita local." #NT!
 panum.166.d_other: "En busca de conocimiento y quizás consuelo, el Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha buscado un sacerdote en un templo local." #NT!
 panum.166.f_christian: "—Hola, padre. Soy el doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], enviado por la capital para investigar este brote y ofrecer toda la ayuda que pueda. Me gustaría pedirte ayuda en esto, si puedes prestármela. —No soy más que un humilde sacerdote, no el Todopoderoso, pero haré lo que pueda. Dime, niña, ¿qué necesitas? —Me gustaría saber todo lo que puedas contarme sobre los primeros días de esta infección. ¿Quién fue el primero en sucumbir? ¿Dónde? ¿Tienes alguna idea de dónde pudo haber venido? —Sólo Dios puede tener la respuesta a algunas de esas preguntas, pero sí, sé mucho sobre mi rebaño. Ven, ven. Después de todo, he estado tomando mis propios escritos." #NT!
 panum.166.f_muslim: "—As-salamu alaykum, imán. Soy el doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], enviado por la capital para investigar este brote y ofrecer toda la ayuda que pueda. Te pediría ayuda en esto, si puedes prestármela. —No soy más que un humilde clérigo, no el Todopoderoso, pero haré lo que pueda. Dime, ¿qué necesitas? —Me gustaría saber todo lo que puedas contarme sobre los primeros días de esta infección. ¿Quién fue el primero en sucumbir? ¿Dónde? ¿Tienes alguna idea de dónde pudo haber venido? —Sólo Alá puede tener la respuesta a algunas de esas preguntas, pero sí, sé mucho sobre la comunidad de aquí. Ven, ven. He estado tomando mis propios escritos, después de todo." #NT!
 panum.166.f_other: "—Saludos, sacerdote. Soy el doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], enviado por la capital para investigar este brote y ofrecer toda la ayuda que pueda. Me gustaría pedirte ayuda en esto, si puedes prestármela. —No soy más que un humilde guardián de este templo, no uno de los dioses, pero haré lo que pueda. Dígame, doctor. ¿Qué necesita? —Me gustaría saber todo lo que pueda decirme sobre los primeros días de esta infección. ¿Quién fue el primero en sucumbir? ¿Dónde? ¿Tiene alguna idea de dónde pudo haber venido? —Sólo los teólogos podrían tener la respuesta a algunas de esas preguntas, pero sí, sé mucho sobre la gente de aquí. Venga, venga. He estado tomando mis propios escritos, después de todo." #NT!
 panum.166.g_christian: "La limpieza es lo más cercano a la piedad." #NT!
 panum.166.g_muslim: "Existe una cura para cada enfermedad." #NT!
 panum.166.g_other: "Conoce bien qué te lleva adelante y qué te detiene." #NT!
 panum.167.t: "Más vale prevenir que curar" #NT!
 panum.167.d: "En un intento por mantenerse a salvo mientras lleva a cabo su investigación, el Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha aislado de forma segura a [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself] lejos de los infectados." #NT!
 panum.167.f: "'Hay quienes lo llamarían cobardía. Yo lo llamaría pragmatismo. Esta no es una batalla que se pueda ganar rápidamente, donde uno simplemente pueda empalar una bayoneta en el vientre del enemigo y dejarlo morir rápidamente. Es una lucha más dura, contra un enemigo que no podemos ver ni oír, pero que podría estar en cualquier lugar a nuestro alrededor.\n\nCarecer de la protección adecuada es una locura. El aislamiento es la clave más importante. Comida y agua en zonas seguras, un lugar limpio para estudiar y todo contacto con los infectados y sus pertenencias hecho a través de intermediarios. A salvo de la enfermedad, puedo investigar en paz y concentrar todos mis esfuerzos en descubrir la verdad detrás de esta enfermedad.'\n\nDel diario del Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], escribiendo sobre la Gran Epidemia de Cólera de [TimeKeeper.GetCurrentDate.Format('y')], investigando en [SCOPE.sState('panum_disease_state').GetCityHubName]." #NT!
 panum.167.g: "...pero incluso [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] tendrá que ensuciarse las manos con [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] tarde o temprano" #NT!
 panum.168.t: "Trabajo inquieto" #NT!
 panum.168.d: "Decidido a llegar a la base del brote de cólera, el Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha estado trabajando especialmente hasta tarde." #NT!
 panum.168.f: "—¡Alto! ¿Quién anda por ahí a estas horas de... Doctor %Apellido%? ¿Qué haces a estas horas? —Tengo que hacer rondas y no esperarán a que salga el sol. Cada minuto es precioso, incluso después de medianoche. —¡Dios mío! ¡Estas calles no son seguras de noche! —Ni tampoco de día, hasta que se acabe este cólera. Si me disculpa, agente, hay más trabajo que hacer antes de que se me acabe el aceite de la lámpara. Tengo que llenar una docena de frascos con agua de los canales y las bombas, visitar casas y examinar zanjas. —Sí, muy bien, muy bien. No estás haciendo nada malo, pero será mejor que te escolte de todos modos." #NT!
 panum.168.g: "Entonces, por supuesto, caminemos juntos por estas calles, agente." #NT!
  
