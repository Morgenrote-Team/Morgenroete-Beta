 panum_character_treatment_fatal_fallback_loc: ""¿Quién habría pensado que cortar ese vaso sanguíneo mataría al paciente?"" #NT!
 panum_character_treatment_fatal_tripple_death_loc: "El Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] planeó una cirugía rápida para tratar al paciente [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] pudo realizar la cirugía en poco más de 2 minutos, pero le amputó los dedos a un asistente, quien luego murió de una infección. Lamentablemente, el paciente también murió de una infección más tarde. Además, un espectador al que también le cortaron los faldones del abrigo accidentalmente se desplomó porque pensó que sus órganos vitales estaban dañados; más tarde se descubrió que había muerto por shock." #NT!
 panum_character_treatment_fatal_unwashed_hands_loc: "La operación fue perfecta. El paciente estaba vivo, todos los problemas se habían solucionado y todos creían que la recuperación sería rápida. Sin embargo, unos días después se descubrió una infección que se propagó como un reguero de pólvora. Apenas unas horas después, el paciente murió. El Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] estaba muy confundido sobre cómo pudo haber sucedido esto, ya que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] había cambiado el bisturí después de la operación anterior, apenas unos minutos antes." #NT!
 panum_character_treatment_fatal_forgotten_snack_loc: "Después de la muerte del paciente se realizó una autopsia. En el interior del paciente se encontró, para sorpresa de todos, un sándwich a medio comer. Nadie supo cómo había llegado hasta allí hasta que un asistente recordó que el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] había comido un sándwich durante la cirugía." #NT!
 panum_character_treatment_fatal_blood_loss_loc: "Al principio la operación salió bien. Parecía que el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] había podido tratar al paciente con éxito. Sin embargo, el paciente nunca se recuperó. Parece que perdió demasiada sangre, lo que lo debilitó y provocó su muerte después de tres días." #NT!
 panum_character_treatment_fatal_morphine_overdose_loc: "La operación pareció ir bien, gracias al uso de morfina el paciente no sintió ningún dolor durante el procedimiento. Lamentablemente el paciente ya no sintió ningún dolor en absoluto ya que la cantidad de morfina era demasiada y el paciente falleció." #NT!
 panum_character_treatment_fatal_drunken_doctor_loc: "Todos estaban un poco confundidos cuando el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] comenzó a beber alcohol medicinal durante la cirugía. Tampoco ayudó que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] comenzara a cortar en los lugares equivocados, a gritarle a los asistentes y finalmente a golpear una arteria principal. Lamentablemente, no se pudo salvar al paciente ni siquiera después de que llamaran a otro médico para que lo ayudara." #NT!
 panum_character_treatment_fatal_forgotten_instruments_loc: "Después de una exitosa cirugía, el paciente del Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] parecía mejorar. Pero un día después, el paciente murió. Una autopsia reveló que un bisturí había sido olvidado dentro del paciente. Cuando el paciente se movió nuevamente, el bisturí comenzó a cortar tejido y vasos sanguíneos, lo que provocó una hemorragia interna." #NT!
 panum_character_treatment_fatal_deadly_anaesthesia_loc: "Una operación muy exitosa tuvo un final horrible. El paciente nunca despertó de la anestesia. Nadie sabe qué pudo haberlo causado, pero el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] supone que el cuerpo del paciente ya estaba demasiado débil." #NT!
 panum_character_treatment_fatal_fake_doctor_loc: "Al principio, la operación parecía haber ido bastante bien. Una vez que el doctor salió de la habitación, no pasó mucho tiempo hasta que la situación empeoró. De repente, el doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] irrumpió en la habitación y dijo que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] lamentaba haber llegado tarde. Todos estaban confundidos porque el doctor solo realizó la cirugía. Parece que una persona al azar se hizo pasar por el cirujano y realizó la cirugía. Lamentablemente, al final, el paciente murió y nadie sabe quién es el responsable de la muerte." #NT!
 panum_character_treatment_fatal_slippery_floor_loc: "Fue una gran cirugía hasta que el pie del Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] tocó un charco de sangre en el suelo. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] se resbaló y cayó justo encima del paciente. Lamentablemente, el bisturí atravesó el corazón del paciente, lo que le provocó la muerte." #NT!
  
 panum.242.t: "Muerte de la multitud" #NT!
 panum.242.d: "Al Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] le sorprende que la tuberculosis se presente sistemáticamente en zonas densamente pobladas, pero sólo raramente en regiones escasamente pobladas." #NT!
 panum.242.f: ""He examinado con atención algunos de los tratados que recomiendan los balnearios climáticos para curar la tuberculosis. Un artículo me pareció tan poco convincente que creo que mi colega confundió correlación con causalidad. Supone que la gente en las montañas está más sana porque el aire es más sano y, por lo tanto, no es víctima de la tuberculosis. Pero ¿no es obvio que en principio podemos observar que la tuberculosis no aparece en las montañas porque hay menos gente allí? Esto habla a favor de la interpretación del sur de Europa de que se trata menos de un miasma que de un contagio. La tuberculosis puede ser una enfermedad contagiosa después de todo".\n\nDel diario del Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] en [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.242.g: "Esta es una teoría que subraya que la tuberculosis es una enfermedad contagiosa." #NT!
 panum.242.h: "Esta es una teoría que subraya que la teoría del miasma es errónea." #NT!
 panum.243.t: "Un ermitaño tuberculoso" #NT!
 panum.243.d: "El Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] hizo un descubrimiento interesante en un intercambio con un sobreviviente de tuberculosis." #NT!
 panum.243.f: "—¿Dijiste que tu hermano murió de tuberculosis? —Correcto. Tenía diecinueve años en ese entonces. Lo vi morir ante mis ojos. —¿Y luego también enfermaste de tuberculosis? —Exactamente. Supuse que, como él, moriría pronto. Eso era seguro para mí. Así que me retiré a una zona remota para morir. Quería pasar mis últimos días en la naturaleza, lejos de la civilización. —Pero sobreviviste. ¿Cuál crees que es la razón para esto? —Comer sano y hacer ejercicio. En algún momento reuní la fuerza suficiente para superar la enfermedad. —Hm." #NT!
 panum.243.g: "¿Eso es realmente todo?" #NT!
 panum.244.t: "Nada hereditario" #NT!
 panum.244.d: "Después de largos exámenes, el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] llega a la conclusión de que hay pocos indicios de que la tuberculosis sea en realidad una enfermedad hereditaria." #NT!
 panum.244.f: ""Si durante mi formación me hubieran dicho que algún día me dedicaría a la genealogía, me habría sorprendido bastante. Pero no había otra forma de confirmar mi teoría que preguntar a las propias familias afectadas, así como a las autoridades y al clero. Si la tuberculosis es realmente una enfermedad hereditaria, entonces es una enfermedad que puede pasar desapercibida durante generaciones. Hay árboles genealógicos enteros sin un caso de tuberculosis, sólo para que de repente acabe con una familia entera. Y es un hecho sorprendente que la tuberculosis no sea una enfermedad estática y manejable, sino que sólo se ha convertido en el peligro que representa hoy en día en las últimas décadas. Permítanme decirlo de esta manera: si la tuberculosis es una enfermedad hereditaria, entonces obviamente todos tenemos una predisposición. Como pueden ver en el apéndice de mi estudio, las estadísticas hablan por sí solas".\n\nConferencia de [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] en la Facultad de Medicina" #NT!
 panum.244.g: "¿Entonces teóricamente cualquiera puede infectarse?" #NT!
 panum.245.t: "Tubérculos" #NT!
 panum.245.d: "Durante un examen anatómico, el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] obtuvo nuevos conocimientos sobre los tumores en el tejido pulmonar que dan nombre a la enfermedad." #NT!
 panum.245.f: "René Laennec inventó el estetoscopio, originalmente para examinar la tuberculosis. En los años siguientes, ayudó a que la enfermedad se pudiera detectar antes, ya que era posible escuchar los cambios en el sistema respiratorio en una etapa temprana. Al mismo tiempo, se fue ampliando el conocimiento sobre el desarrollo de la tuberculosis en el cuerpo." #NT!
 panum.245.g: "Pequeño progreso, pero progreso." #NT!
 panum.246.t: "Estilo de vida e inmunidad" #NT!
 panum.246.d: "El Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] tiene serias dudas sobre las teorías tradicionales sobre la causa de la tuberculosis después de examinar exhaustivamente a varios pacientes y sus biografías." #NT!
 panum.246.f: ""El examen de varios pacientes en [SCOPE.sState('panum_disease_state').GetCityHubName], incluyendo sus historias personales, plantea más preguntas que respuestas, siempre que se esperen verdades lo más simples posibles, en lugar de fragmentos de la verdad. Es cierto que el proletariado en particular se ve gravemente afectado por la tuberculosis, pero me parece dudoso que una persona adinerada en el mismo medio no caiga también víctima de la enfermedad. Estoy convencido de que una buena alimentación, el aire fresco y el ejercicio físico ofrecen un cierto nivel de resistencia contra la enfermedad, pero no creo que por ello se puedan descartar en principio. En resumen: creo que la idea de que alguien contrae tuberculosis porque es artista o proletario es una afirmación científicamente insostenible. Si así fuera, la tuberculosis habría elegido su filiación en los últimos años y ahora preferiría a los trabajadores de las fábricas como sus víctimas altamente espirituales en lugar de a los músicos y poetas. Nadie puede creer seriamente eso."\n\nDel diario del Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] en [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.246.g: "Esto será una gran decepción para algunos genios no reconocidos." #NT!
 panum.247.t: "Una enfermedad de declaración obligatoria" #NT!
 panum.247.d: "El Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha estado experimentando con un sistema de informes en [SCOPE.sState('panum_disease_state').GetCityHubName] que podría ayudar a frenar la tuberculosis." #NT!
 panum.247.f: ""La clasificación de la tuberculosis como enfermedad de declaración obligatoria por parte del [SCOPE.sState('panum_disease_state').GetCityHubName] ha provocado cierto resentimiento entre la población, porque mucha gente considera que la enfermedad es un asunto privado. Pero no lo es, especialmente cuando se presenta en forma epidémica. En el momento en que una enfermedad se considera contagiosa -y en el caso de la tuberculosis hay muchos indicios de que lo es- se convierte en un asunto público que puede poner en peligro el bienestar público. Es mejor tener una enfermedad de declaración obligatoria que una cuarentena. El aislamiento de fuentes individuales de infección demostró que la propagación de la tuberculosis podía prevenirse sin poner a una ciudad entera en estado de emergencia. Desafortunadamente, el estigma que ahora llevan las grullas tuberculosas tendrá consecuencias personales desagradables. Los enfermos de tuberculosis son tratados ahora como leprosos".\n\nDel diario del Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] en [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.247.g: ""
 panum.248.t: "Matando a los microbios" #NT!
 panum.248.d: "El Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha desarrollado un proceso químico basado en conocimientos previos sobre microorganismos que podría prevenir la tuberculosis en el futuro." #NT!
 panum.248.f: "La pasteurización es el calentamiento breve de alimentos líquidos o pastosos a temperaturas de entre 72 °C y 100 °C como máximo, con el fin de matar las fases vegetativas de los microorganismos y conservar los alimentos de forma respetuosa. Este proceso se utilizó para el vino desde mediados del siglo XIX. Más tarde, se utilizó en la leche cruda, a través de la cual los patógenos de la tuberculosis bovina podían transmitirse a los humanos. Por tanto, la pasteurización de la leche cruda desempeñó un papel en la contención de la tuberculosis. Este hallazgo es más importante de lo que se podría pensar en un principio: durante mucho tiempo, los médicos, biólogos y químicos supusieron que la tuberculosis del ganado no podía transmitirse a los humanos. Incluso el experto en tuberculosis Robert Koch se equivocó al respecto y solo más tarde revisó su opinión, en una época en la que muchos niños se contagiaron a través de la leche y la mantequilla tuberculosas." #NT!
 panum.248.g: "¡Y yo que pensaba que la leche era básicamente saludable!" #NT!
 panum.249.t: "Escupidera personal" #NT!
 panum.249.d: "El Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] descubrió un accesorio que se ha vuelto particularmente popular entre las mujeres que padecen tuberculosis. Tiene una sofisticada carcasa de vidrio azul que luce tan moderna que te olvidarás de que es una escupidera." #NT!
 panum.249.f: ""La mayoría de nosotros tenemos eso aquí arriba. También tiene un nombre, un apodo, muy divertido". Sin ninguna restricción, con un rostro tercamente ignorante, pronunció la expresión sombría: "El Heinrich azul". -Thomas Mann, Zauberberg" #NT!
 panum.249.g: "Si cada enfermo llevara algo así..." #NT!
  
 panum.251.t: "¿Una enfermedad celular?" #NT!
 panum.251.d: "El estudio, muy publicitado, de un especialista alemán en tuberculosis contradice los hallazgos anteriores del Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], ya que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] aún no ha sido capaz de encontrar una contrarespuesta adecuada." #NT!
 panum.251.f: "'Hay colegas que afirman con vehemencia que la tuberculosis puede transmitirse por infección. Cuando se enfrentan al hecho de que hay muchos pacientes que han desarrollado la enfermedad sin haber estado cerca de una grúa tuberculosa, afirman que probablemente se contagió hace años. ¿Cómo se puede demostrar esto? Más bien, mis propios estudios muestran que los tubérculos del tejido pulmonar deben interpretarse como proliferación celular. Por lo tanto, la tuberculosis debe interpretarse, al igual que el carcinoma, como el resultado de la proliferación de células locales. Puede identificarse claramente como una enfermedad constitucional.'\n\nDra. Angelika Hasenbein, 'La tuberculosis, una enfermedad similar al cáncer'" #NT!
 panum.251.g: "¿Entonces la tuberculosis funciona como un tumor celular?" #NT!
 panum.252.t: "Bronquiectasia" #NT!
 panum.252.d: "Como descubrió el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], algunos supuestos hallazgos que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] creía que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] había obtenido de pacientes con tuberculosis eran incorrectos. Sufrían de una enfermedad completamente diferente." #NT!
 panum.252.f: ""Lamentablemente, algunas investigaciones han resultado ser un callejón sin salida. Por eso creía que algunos pacientes con tuberculosis se habían curado en determinadas circunstancias. En realidad no tenían tuberculosis, sino bronquiectasias. No se descarta que la tuberculosis pueda provocar bronquiectasias, pero se trata de dos enfermedades diferentes y, por tanto, no todos los resultados son aplicables. Es probable que esto retrase considerablemente la búsqueda de un método de tratamiento eficaz".\n\nDel diario del Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] en [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.252.g: "¡Tiempo perdido!" #NT!
 panum.253.t: "Charlatanismo" #NT!
 panum.253.d: "Una visita al sanatorio en [SCOPE.sState('panum_disease_state').GetCityHubName] resultó ser una completa decepción para el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]." #NT!
 panum.253.f: "'Muchos colegas y reconocidos especialistas médicos me recomendaron el sanatorio de [SCOPE.sState('panum_disease_state').GetCityHubName]. Es una institución ejemplar que trabaja en el campo de la tuberculosis con métodos extremadamente serios - dijeron. Varios pacientes hablaron de milagros médicos que ocurrían allí.\n\nSin embargo, después de semanas de visitas, me di cuenta de que se trataba principalmente de marketing. Mientras que los médicos del lugar me aseguraban que había grandes posibilidades de curación, descubrí exactamente lo contrario. Cuando revisé los expedientes de los pacientes, descubrí que casi el 50 por ciento de los pacientes ingresados ​​murieron en la primera semana. ¡Todo este sanatorio es una estafa!\n\nDel diario del Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] en [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.253.g: "Pero...pero...¡la cena debe ser excelente!" #NT!
 panum.254.t: "Contacto con la Muerte Blanca" #NT!
 panum.254.d: "Al parecer las numerosas visitas a pacientes con tuberculosis tienen un efecto no deseado: ¡el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] hoy escupió sangre!" #NT!
 panum.254.f: ""Qué día tan desafortunado. Mis tratos con la tuberculosis y mi supuesto conocimiento de la enfermedad ahora están cobrando venganza. Por un lado, me equivoqué en tantos aspectos que es justo que mi orgullo sea castigado. Por otro lado, es una indicación de que es una enfermedad contagiosa. Pero ¿a qué precio tuve que hacer este descubrimiento?\n\nDel diario del Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] en [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.254.g: "El médico se recuperará de esto, ¿verdad?" #NT!
  
 panum.264.t: "De contagio" #NT!
 panum.264.d: "Los intereses históricos del Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] llevaron a [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] a encontrarse con un antiguo libro del Renacimiento, que tiene un valor inconmensurable." #NT!
 panum.264.f: "El médico veronés Girolamo Fracastoro, ya en 1546, postuló que las enfermedades se debían principalmente a la infección con partículas minúsculas que recordaban a gérmenes posteriores, por lo que hace más de 300 años puso en duda la teoría de los miasmas. En cuanto a la tuberculosis, Fracastoro también afirma que se trata de una enfermedad contagiosa que se transmite por estos patógenos. El libro es a veces más convincente que muchos tratados modernos. Lo revolucionario es que Fracastoro supone que estos llamados "fómites" entran a través del sistema respiratorio o de los poros del cuerpo para buscar alimento, lo que haría avanzar la enfermedad." #NT!
 panum.264.g: "Esto estimulará la búsqueda de tratamiento." #NT!
 panum.264.h: "Esto es mucho más convincente que la teoría del miasma." #NT!
 panum.264.i: "¿Podría un pequeño patógeno causar tuberculosis?" #NT!
  
 panum.240.t: "La tuberculosis, una enfermedad contagiosa" #NT!
 panum.240.d: "A través de varios experimentos y exámenes de pacientes, el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] pudo demostrar de manera concluyente que la tuberculosis no sólo es una enfermedad contagiosa, sino que también pudo derivar varios métodos de prevención de ésta en el [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] tratado '[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_treatment_title')]'." #NT!
 panum.240.f: "'El conocimiento de que la tuberculosis es una enfermedad que puede transmitirse de persona a persona y también de animal a persona conduce a toda una serie de medidas para prevenir la enfermedad.\nEn primer lugar, los enfermos de tuberculosis deben mantenerse alejados de las masas.\nEn segundo lugar, la enfermedad debe ser declarable para que se pueda mitigar la propagación.\nEn tercer lugar, deben promulgarse regulaciones para garantizar la higiene pública, como la prohibición de escupir en público o al menos el uso de escupideras públicas y personales.\nEn cuarto lugar, debe mejorarse la salud pública para minimizar la infección entre los proletarios.\nEn quinto lugar, es esencial la pasteurización de la leche cruda.'\n\nDe:[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_treatment_title')]" #NT!
 panum.240.g: "La tuberculosis ya no es un destino." #NT!
  
 panum_add_dubious_yellow_fever_treatment_clues_effect_tt: "Esto da una pista...probablemente." #NT!
 panum_yellow_fever_fork_note_tt: "#R NOTA:#! La segunda opción será posible con un biólogo. Esta función se añadirá más adelante." #NT!
  
 panum.540.t: "¿Prevenir? ¡Prevenir!" #NT!
 panum.540.d: "¡Después de semanas de investigación y estudio, nuestro médico ha ideado un medio para detener la propagación de la fiebre amarilla!" #NT!
 panum.540.f: ""...pero al final, quedó una prueba, cierta e inexcusable. Ya sea por medio de una red, humo o pesticida, mi investigación reveló que siempre que se interrumpía el camino del mosquito por cualquier razón, se detenía la propagación de la fiebre amarilla. Debe ser, entonces, una enfermedad transmitida por insectos. Si podemos interrumpir el proceso de desove, podemos muy bien evitar que lleguen nuevos mosquitos para infectar a nuestra gente. Es simplemente una cuestión de medios, y he ideado un plan de tres puntos.\n\nI: Rociar los estanques, ciénagas y pantanos locales con pesticida para que no sean aptos para el desove. Si es posible, drenar por completo los cuerpos de agua menores.\nII: Instalar mosquiteros y cubiertas de tela dosificadas con pesticidas en todas las aberturas de los edificios públicos, especialmente en los hospitales.\nIII: Informar a la gente sobre la naturaleza de esta enfermedad, que es transmitida por el mosquito, y alentar el uso de mosquiteros, insecticidas y humo para fumigar sus hogares.\n\nCreo, sinceramente, que si se ponen en práctica estos métodos, es posible que veamos el fin de la fiebre amarilla endémica en nuestras vidas y el fin de este enemigo tan persistente.'\n\nDe:[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_treatment_title')] por el Dr.[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]" #NT!
 panum.540.g: "Bien hecho, doctor. Ahora, a buscar mosquiteros y repelente de insectos..." #NT!
  
 panum.541.t: "¿Prevenir? ¡Prevenir!" #NT!
 panum.541.d: "El doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], nuestro médico jefe, ha llegado a [SCOPE.sState('panum_disease_state').GetName] para investigar la misteriosa fiebre amarilla." #NT!
 panum.541.f_america: "'Llegamos a [SCOPE.sState('panum_disease_state').GetCityHubName] mucho antes del amanecer, y nuestro tren llegó a la estación para encontrarse con un andén vacío y con sólo un frasco de sopa caliente para el conductor y sus colegas en la locomotora. Pocos hombres podrían salir de un tren tan temprano en la mañana, pero yo había tenido poco descanso; las cartas y notas del gobierno local pesaban mucho en mi mente, porque hablaban de una extraña enfermedad, la fiebre amarilla. El nombre proviene de la ictericia que acompaña a la enfermedad, aunque ese no es el final de los problemas: vómitos, dolores de abdomen, sangrado de los ojos, y estos matan a muchos.\n\nPero aunque los resultados nos son familiares, escritos en relatos que datan de la primera colonización de estas tierras, la naturaleza de la enfermedad en sí ha eludido a la ciencia durante mucho tiempo. Fue allí donde encontré el propósito y la energía para despertar a mis colegas y guiarlos desde el tren hasta la ciudad, bajo el resplandor de las lámparas de gas alrededor de las cuales los mosquitos zumban incesantemente. Si queremos vencer alguna vez esta enfermedad, debemos aprender la pregunta más importante de todas: ¿contra qué estamos luchando? Del diario del Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], escribiendo sobre la fiebre amarilla en [SCOPE.sState('panum_disease_state').GetName], [TimeKeeper.GetCurrentDate.Format('y')]" #NT!
 panum.541.f_africa: "'Era poco más de mediodía cuando nuestro barco atracó en el puerto y el capitán nos informó de que habíamos llegado a nuestro destino. La administración local, uno de los grandes puestos de avanzada de nuestro imperio colonial, había enviado un mensaje a la capital sobre una extraña y letal enfermedad que les costaba comprender: no se trataba de una simple gripe común, sino de la infame fiebre amarilla. No es una enfermedad desconocida para mí ni para nadie que conozca bien la historia de las enfermedades tropicales... pero, a pesar de todo lo que sabemos de sus múltiples medios de matar, sabemos muy poco de la enfermedad en sí.\n\nAcompañados por mis ayudantes y una escolta armada, hemos establecido un laboratorio no muy lejos del centro de la ciudad. Allí podríamos guardar nuestras muestras, establecernos y realizar la investigación necesaria para descifrar los misterios de la fiebre amarilla... pero primero debemos encontrar esas muestras, y la incesante presencia de mosquitos es una distracción indeseable. De todos modos, no nos impedirá realizar nuestro trabajo.'\n\nDel diario del Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], escribiendo sobre la fiebre amarilla en [SCOPE.sState('panum_disease_state').GetName], [TimeKeeper.GetCurrentDate.Format('y')]" #NT!
 panum.541.g: "Vamos, caballeros...bostezo." #NT!
 panum.541.h: "...malditos mosquitos." #NT!
 panum.542.t: "Guerras de ayer" #NT!
 panum.542.d: "En un intento por descubrir más sobre la historia de la fiebre amarilla en estas tierras, el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha decidido consultar con el comandante de una guarnición local." #NT!
 panum.542.f: "—Ah, me alegro de verte, doctor. Mis hombres siempre se alegran de saber que están en buenas manos si llega la enfermedad. ¿Qué puedo hacer por ti? —El placer es mío, coronel. Me han dicho que podrías tener registros de campañas pasadas aquí. ¿Tienes alguno en el que se haya visto un brote de fiebre amarilla entre las tropas? —Oh, sin duda... aquí. Esa fue una campaña terrible, créeme, y no solo por el enemigo. Muchos muchachos que mueren en la guerra mueren por los elementos, las enfermedades, la exposición. Lo llaman desgaste. —Entonces, ¿este... desgaste fue especialmente malo? —Peor que malo. Entre la enfermedad y la temporada de lluvias, un hombre tenía más que temer en el campamento que en el campo de batalla. El calor también era terrible, y los insectos." #NT!
 panum.542.g: "Insectos, enfermedades, lluvia... un infierno creado por la propia naturaleza, se podría decir." #NT!
 panum.543.t: "Campos de aflicción" #NT!
 panum.543.d: "Continuando con la misión [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] para aprender más sobre la fiebre amarilla, el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha viajado fuera del asentamiento a un aparente foco de infección: una granja rural." #NT!
 panum.543.f: ""Debo admitir que me llevó casi una hora aprender a entender este acento rural, pero el dueño de la granja resultó ser bastante informativo. Aunque esta región suele ser bastante húmeda, todavía hay necesidad de obras de irrigación. Sin embargo, cavar estas trincheras requiere una fuerza significativa, proporcionada por muchas docenas de trabajadores locales, que a menudo viven juntos en barracones abarrotados y abarrotados. Tales condiciones podrían generar enfermedades, y no es de extrañar que la fiebre amarilla se encontrara allí al poco tiempo.\n\nEl propio granjero cree que vino de algún tipo de comerciante ambulante, o tal vez de comerciantes que recogían la cosecha o entregaban herramientas, no puede decirlo con certeza, pero yo lo dudo. Parece más bien que la fiebre amarilla surgió aquí por sí sola... pero si es así, ¿cómo? "\n\nDel diario del Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], escribiendo sobre la fiebre amarilla en [SCOPE.sState('panum_disease_state').GetName], [TimeKeeper.GetCurrentDate.Format('y')]" #NT!
 panum.543.g: "¿Cómo pudo una enfermedad surgir de la nada?" #NT!
 panum.544.t: "¿El agua...?" #NT!
 panum.544.d: "Al investigar la posibilidad de que la fiebre amarilla pueda ser una enfermedad transmitida por el agua, el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha reunido muestras de vías fluviales y pozos locales." #NT!
 panum.544.f: ""Una posibilidad que había considerado era que esta enfermedad pudiera ser tal vez de naturaleza similar al cólera, que podría transmitirse a través de aguas contaminadas. Decidido a comprobar si era así, ordené a mis ayudantes que recogieran muestras antes de encontrar un lugar tranquilo para mi microscopio, donde pudiera trabajar sin interrupciones. El aire húmedo y tropical distrae, al igual que el zumbido incesante de los mosquitos, pero al poco tiempo, las muestras comenzaron a deslizarse bajo la lente, lo que me permitió escudriñar ese mundo diminuto.\n\nDesafortunadamente, fue un esfuerzo infructuoso. Algunas estaban más sucias que otras, incluso tenían gusanos diminutos y cosas por el estilo, pero no coincidían con el patrón de los infectados, que se esparce por el mapa como una lluvia de perdigones. Sea cual sea el caso, no puedo encontrar ninguna pista sobre la naturaleza de la fiebre amarilla en esta agua..."\n\nDel diario del Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], escribiendo sobre la fiebre amarilla en [SCOPE.sState('panum_disease_state').GetName], [TimeKeeper.GetCurrentDate.Format('y')]" #NT!
 panum.544.g: "...pero si no están allí, entonces ¿dónde se esconden?" #NT!
 panum.545.t: "La isla" #NT!
 panum.545.d: "Desconcertado por una aparente "ruptura" en el patrón de infecciones, el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] se ha aventurado a un lugar inusual: una pesquería en una isla." #NT!
 panum.545.f: "—Ah, usted debe ser el doctor... oh. Perdone el olor, doctor. Tenga cuidado de no caerse usted también. Los peces que se comen las tripas que arrojamos están tan dispuestos a comerlo a usted, si pueden. —... Por favor, hágalo rápido. Hábleme de este lugar. —Sí, bueno, creo que le alegrará saber que aquí no hay ninguna enfermedad. No esa fiebre amarilla, de todos modos. —¿Cómo es eso? ¿Hay algo que pueda estar salvando a sus hombres? —Puede ser que pasen tan poco tiempo en tierra. La mayoría de los días están en el mar, y algunos se alejan más y no regresan durante un día o más. Pero debe haber algo más que eso, creo. Pasan su tiempo libre aquí en la isla, en los cuarteles o en sus casas, y aquí no hay fiebre en absoluto. -Investigaré... no, mis asistentes pueden hacerlo cuando regrese. -Me aseguraré de avisarles a todos, doctor... y ni siquiera se despidieron." #NT!
 panum.545.g: "...pero primero, un baño con jabón. Un baño con mucho, mucho jabón." #NT!
 panum.546.t: "¿Gas de pantano?" #NT!
 panum.546.d: "En lo que podría ser un inquietante regreso de la vieja teoría del miasma, el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha encontrado informes sorprendentes: ¡la fiebre amarilla podría estar relacionada con los humos de los pantanos!" #NT!
 panum.546.f: ""Me duele que aquí haya tan pocas cosas que tengan sentido. Nada coincide con las teorías establecidas que conocemos, y me encuentro aferrándome a un clavo ardiendo. Sin embargo, hay una línea de vida prometedora: los pantanos. Mis ayudantes prepararon portaobjetos para el microscopio, y están repletos y prosperan con microbios, pero nada que podamos identificar. Y, sin embargo, a pesar de eso, la plaga estalla en las costas. Las casas cercanas a estos pantanos son las más afectadas por la fiebre amarilla. Algunos incluso mencionan haberla tenido en la infancia.\n\nY, sin embargo, no hay señales de... cómo. No beben el agua, no comen pescado capturado en ella, y sin embargo, el hedor llega a sus casas con la brisa, las inunda con el hedor, y pronto aparece la enfermedad. Los textos antiguos gritarían "miasma", pero esto no puede ser así... pero si no, ¿de qué otra manera podría propagarse la enfermedad desde el pantano hasta el hogar?'n\nDel diario del Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], escribiendo sobre la fiebre amarilla en [SCOPE.sState('panum_disease_state').GetName], [TimeKeeper.GetCurrentDate.Format('y')]" #NT!
 panum.546.g: "...o quizás es astrológico...no, eso no tiene sentido...¿verdad?" #NT!
 panum.547.t: "El rival" #NT!
 panum.547.d: "Decidido a buscar expertos locales, el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] decidió visitar a un aliado potencial: el forense local." #NT!
 panum.547.f: "—Ah, me alegro de conocerlo, doctor. Le pido disculpas si no nos damos la mano, pero tengo un cuerpo en la losa de la otra habitación. —¿Fiebre amarilla? —Eso pensaría, pero no. Malaria, ¿lo creería? De todas las ocasiones en que se puede ver un brote, lo tenemos ahora, al mismo tiempo. —¿Una coincidencia desafortunada? —Tal vez, pero he estado aquí el tiempo suficiente para haber visto un patrón. Los dos tienden a presentarse en pares y, lo que es peor aún, tienen síntomas similares y muertes similares. Se convierte en una tarea terrible distinguirlos, se lo aseguro. Yo habría pensado que eran lo mismo. —Eso es... bastante fascinante, en realidad. ¿Tiene buenos registros de esto? —Oh, por supuesto. Haré que mi asistente se los envíe, aunque no sé qué tan útiles podrían ser. No sé cómo se propaga esta cosa, doctor, pero apuesto a que si puede encontrar uno, es posible que encuentre el otro." #NT!
 panum.547.g: "Entonces quizás podríamos matar dos pájaros de un tiro." #NT!
 panum.548.t: "El camino bifurcado" #NT!
 panum.548.d: "Desconcertado por la naturaleza de la fiebre amarilla, el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] escribió a la capital para solicitar más instrucciones." #NT!
 panum.548.f: "'... y sin embargo, por más que lo intento, no sé cómo proceder. Hay pocos "indicios" que guíen mi investigación y, aunque he examinado muchas revistas médicas y he consultado a expertos locales, no estoy completamente seguro de qué es realmente la fiebre amarilla. Una enfermedad, sin duda, pero ¿de qué tipo? ¿Una enfermedad del aire, como un miasma? ¿Algo en el agua o en la comida? ¿Cómo se transmite de un hombre a otro, o tal vez de un pantano a otro?\n\nSon preguntas que no puedo responder y tal vez nunca descubra la verdad. Si no puedo encontrar la enfermedad, no puedo esperar combatirla directamente, pero mi investigación no está completamente infructuosa. Tal vez haya encontrado dos posibles vías de investigación a considerar:\n\nEn primer lugar, podríamos intentar encontrar algún patrón sobre cómo se está propagando. Tal vez con una investigación centrada podamos discernir alguna lógica sobre cómo se transmite la enfermedad y así interrumpirla. Tal vez, si se detuviera la propagación, se revelaría la verdadera causa. En segundo lugar, que intentemos idear algún tipo de cura o vacuna, tal vez investigando a los niños que se infectaron en la juventud pero que se recuperaron por completo, así como a los que sobrevivieron. Puede que no sepamos sus orígenes, pero tal vez aún podamos superarlo. Por ello, escribo a la capital, a ustedes, estimados caballeros del saber y la ciencia, y pregunto: ¿cuál será el enfoque de mi investigación aquí? Una carta del Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] en [SCOPE.sState('panum_disease_state').GetName], [TimeKeeper.GetCurrentDate.Format('y')]" #NT!
 panum.548.g: "Es mejor prevenir que curar." #NT!
 panum.548.h: "Jugamos con todas las canicas. Tendremos una vacuna." #NT!
  
 panum.551.t: "El camino hacia la prevención" #NT!
 panum.551.d: "Siguiendo instrucciones de la capital, el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] comenzó a investigar cómo prevenir la propagación de la fiebre amarilla." #NT!
 panum.551.f: ""...por supuesto, es difícil determinar qué, exactamente, se debe hacer para prevenir la propagación de una enfermedad que apenas comprendemos de otra manera que no sea cómo puede inducir la muerte. Sin embargo, si este es el desafío que debo enfrentar, que así sea. He descubierto una serie de pistas prometedoras hasta ahora; mi mapa de la infección es esporádico, pero aquí y allá, aparecen ciertas islas de irregularidad... lugares donde el brote disminuye significativamente, incluso por completo.\n\nNo puedo pretender comprender verdaderamente la naturaleza de esta enfermedad, pero la enfermedad no es para nada irregular. Hay un patrón aquí, esperando ser descubierto, y si se puede encontrar, entonces muy bien podríamos resolver este rompecabezas y librarnos de la fiebre amarilla para siempre".\n\nDel diario del Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], escribiendo sobre la fiebre amarilla en [SCOPE.sState('panum_disease_state').GetName], [TimeKeeper.GetCurrentDate.Format('y')]" #NT!
 panum.551.g: "Estamos construyendo una fortaleza, un ladrillo a la vez." #NT!
 panum.552.t: "Datos sobre el filete" #NT!
 panum.552.d: "Mientras trabajaba en un medio para prevenir la propagación de la fiebre amarilla, el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] recibió la visita de uno de los asistentes de [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]." #NT!
 panum.552.f: "—Ah, me alegro de volver a verte, hijo mío, y... ¡Dios mío! ¿Qué es ese hedor? —Lo siento, doctor... Acabo de volver de la pesquería, la que me enviaste a investigar. ¡He encontrado algo muy interesante! —Tan interesante que no pudiste tomarte un baño, parece... —Perdóname, pero sí. Investigué cómo la fiebre amarilla no afectaba a los hombres de la pesquería y comencé a seguirla hasta tierra firme. Hay un ahumadero en la orilla, y los trabajadores se van por allí, y nadie contrae la fiebre amarilla allí. Y eso me hizo pensar... ¿tal vez el humo la mantiene alejada? Entonces, comencé a buscar lugares con mucho humo, y encontré a este fabricante de jabón, que pone hierbas y aceites en su quemador. Ni una sola fiebre amarilla en su casa. —Hmmm... este es un trabajo fascinante. Continúa con tus observaciones y mantenme informado y, oh, buen trabajo." #NT!
 panum.552.g: "Pasos ansiosos alejan al asistente... pero dejan al médico pensando." #NT!
 panum.553.t_america: "La misión" #NT!
 panum.553.d_america: "Siguiendo el camino de las brechas en el brote, la investigación del Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] los ha llevado a una antigua misión colonial." #NT!
 panum.553.f_america: "'No nos llevó mucho tiempo encontrar la misión aquí. Fue uno de los primeros edificios que se levantaron después de la colonización, nuestros antepasados ​​recién llegados de tierras que tal vez nunca volverían a ver. No es una gran catedral, pero fue construida con amor y, con el tiempo, los misioneros y los miembros de la Iglesia Madre la han visto crecer, llenándose de pabellones y salones propios. Fue uno de los primeros lugares a los que se podía llevar a los enfermos, atendidos por monjas y cualquier voluntario piadoso dispuesto a ayudar.\n\nSegún todos los indicios, muy bien debería haberse convertido en un matadero propio... y sin embargo, no es así. Mientras que otros hospitales cuentan sus muertos y ven cómo la enfermedad salta de un pabellón a otro, aquí no hay nada. Una familia fue traída después de un incendio en la casa, pero después de una semana, ninguno de ellos cogió fiebre amarilla, a pesar de estar resguardados a pocas habitaciones de distancia. Me desconcierta, porque tanto la misión como el hospital son iguales, pero hay una diferencia importante: las mosquiteras. Un sermón es algo sagrado y no puede ser interrumpido por el zumbido de los mosquitos y sus similares, por lo que el clero ha colocado mosquiteros en todas las ventanas para mantener alejados a los mosquitos, incluso en las salas.\n\nY así, la fiebre amarilla parece desaparecer por completo.'\n\nDel diario del Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], escribiendo sobre la fiebre amarilla en [SCOPE.sState('panum_disease_state').GetName], [TimeKeeper.GetCurrentDate.Format('y')]" #NT!
 panum.553.g: "Porque yo haré que tu salud vuelva..." #NT!
 panum.553.t_africa: "La favela" #NT!
 panum.553.d_africa: "Siguiendo el camino de los huecos del brote, la investigación del Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] los ha llevado a un lugar curioso: los barrios marginales." #NT!
 panum.553.f_africa: "Los barrios bajos estaban lo suficientemente cerca como para hacer dudar a cualquier hombre de la importancia de nuestra gran empresa colonial en estas tierras. Sucios y miserables, abarrotados de mujeres y niños, esperando a que sus hombres regresaran de las plantaciones o las minas o dondequiera que pudieran trabajar. Las bombas de agua sobrecargadas llenan ollas, las moscas zumban y una clara falta de saneamiento se combinan para hacer que este lugar parezca un hervidero de enfermedades. De hecho, lo es.\n\nUna vista rara en estos lugares, un médico como yo era llevado ansiosamente de casa en casa por guías locales y escoltado por la policía, y se le pedía que proporcionara información sobre una enfermedad u otra. A cambio, les hacía preguntas: ¿qué pasa con la fiebre amarilla? Vi casos de cólera y disentería, pero no de la enfermedad que estoy buscando. Una mujer señaló las ventanas, o donde deberían estar: en lugar de vidrio, una pared de tela, una red. Para ellos, mantenía alejada la malaria, pero también, tal vez, la fiebre amarilla... que, creen, muy bien podría ser transmitida por insectos.'\n\nDel diario del Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], escribiendo sobre la fiebre amarilla en [SCOPE.sState('panum_disease_state').GetName], [TimeKeeper.GetCurrentDate.Format('y')]" #NT!
 panum.553.h: "...y tal vez, sólo tal vez, ¿los lugareños tengan razón?" #NT!
 panum.554.t: "El mayor asesino" #NT!
 panum.554.d: "Al leer los registros que les entregaron las fuerzas militares locales, el Dr. ROOT.Var('panum_physician_var').GetCharacter.GetLastName] hizo un descubrimiento." #NT!
 panum.554.f: "—Ah, es bueno volver a verlo, coronel. Tengo algunas preguntas sobre estos registros que me dio. ¿Tiene un momento libre? —¡Oh, por supuesto! Cualquier cosa que pueda ayudar. —Aquí se menciona que la última campaña fue dirigida por un oficial que, al parecer, estaba profundamente afectado por las picaduras de insectos. —Preocupado y muy, muy molesto, me temo. Las picaduras son parte de la vida en esta tierra, pero de donde vinieron... ninguna. —Ya veo, ya veo... pero también se menciona que el ejército estaba afectado tanto por malaria como por fiebre amarilla, que mataban más por enfermedad que en batalla. —Me temo que el desgaste es parte de la guerra desde hace mucho tiempo. —... pero una vez que ordenaron el uso de piretro, los casos de fiebre amarilla y malaria disminuyeron drásticamente. Luego, una semana después, ordenó rociar el área local y nuevamente las tasas bajaron. ¿Qué es exactamente este piretro?" #NT!
 panum.554.g: "—¿Ah, el piretro? Se usa para despiojar a las tropas. Mata insectos, ¿sabes?" #NT!
 panum.555.t_america: "Los recuerdos de antaño" #NT!
 panum.555.d_america: "Enfrascado en una batalla contra una enfermedad que ha afectado a Sudamérica durante siglos, el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] busca respuestas en un lugar extraño: el pasado." #NT!
 panum.555.f_america: "'Algunos dicen que el pasado es un país diferente. En las Américas, tal vez eso sea más cierto que en cualquier otro lugar, porque mucho ha cambiado desde Colón, pero para mi sorpresa, la enfermedad que lucho no es una de ellas. Me llevó semanas localizar los diarios y registros de los primeros colonos en estas tierras, pero por fin han llegado a mis manos. Es un hallazgo valioso. Con ellos, tengo los relatos de médicos del pasado, mentes brillantes que podrían haber carecido de las herramientas que hoy damos por sentado.\n\nSin embargo, aunque podemos haber heredado su batalla inacabada, nos han dejado información valiosa que podría permitirme terminar lo que empezaron. Hay una revelación preciosa, oculta, difícil de notar sin esos relatos. De vez en cuando, hay una explosión de fiebre amarilla en esta región, casi como un reloj. Eso por sí solo es inútil, pero se correlaciona casi exactamente con los diarios que hablan de lluvias intensas e incluso inundaciones, registradas aquí como casas arrasadas por las inundaciones seguidas de brotes de fiebre amarilla. ¿Podrían estar relacionados los dos? Del diario del Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], escribiendo sobre la fiebre amarilla en [SCOPE.sState('panum_disease_state').GetName], [TimeKeeper.GetCurrentDate.Format('y')]." #NT!
 panum.555.g: "Todos nos apoyamos sobre hombros de gigantes... sólo que ellos tenían menos gigantes sobre los cuales apoyarse." #NT!
 panum.555.t_africa: "Remedios populares" #NT!
 panum.555.d_africa: "Quizás de manera polémica, el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha buscado el consejo de las personas que podrían conocer mejor la fiebre amarilla: los nativos." #NT!
 panum.555.f_africa: "'Hay quienes me considerarían loco por elegir consultar a los nativos en lugar de una revista médica, pero creo que carecen de un razonamiento sólido para tal juicio. La fiebre amarilla es una enfermedad que se encuentra aquí, en África, y esta gente ha vivido aquí mucho más tiempo que nosotros. De hecho, existe la posibilidad de que esta enfermedad haya surgido en esta tierra en primer lugar. Tal vez sea así, ya que muchos brotes aquí pueden matar a los europeos y similares con facilidad, pero dar a los pueblos africanos nativos nada más que síntomas similares a una gripe leve.\n\nSin embargo, a pesar de eso, hay comprensión. He hablado con varios curanderos locales e incluso con representantes de tribus más alejadas del país, y mencionan ciertas prácticas preventivas... la quema de estiércol de elefante y varias plantas, incluso llevar ese humo al interior, lo que ahuyenta a los mosquitos que creen que están relacionados con la malaria, y tal vez, con la fiebre amarilla. Más que eso, tienen un medio para leer el terreno que los rodea y predecir el comienzo de la temporada "lluviosa", que creen que corresponde a lo peor de la malaria y la fiebre amarilla. Se necesitarán más estudios y consideraciones, pero es prometedor.'\n\nDel diario del Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], escribiendo sobre la fiebre amarilla en [SCOPE.sState('panum_disease_state').GetName], [TimeKeeper.GetCurrentDate.Format('y')]" #NT!
 panum.555.h: "Sabiduría, en el lugar menos esperado." #NT!
 panum.556.t: "¿Tela sencilla?" #NT!
 panum.556.d: "Aunque estaban destinados a apoyar a nuestras tropas en una guarnición fronteriza, nuevos tejidos impregnados con insecticidas han llegado al mismo pueblo que el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] está investigando." #NT!
 panum.556.f: "—¿Se supone que debería estar en esta zona? Ah, ya veo, usted es el médico de la capital. No sé si hay mucho aquí para usted, doctor. No hay ni un solo caso de esa fiebre por aquí. —... que yo sepa. ¿Qué es esto? —Los generales de casa descubrieron que pueden dosificar pesticidas directamente en la tela y mantener a raya a los malditos bichos. ¿Lo ve? Mire el suelo. Docenas de esos bastardos, ya muertos. —Debe ser muy efectivo matarlos tan rápido. ¿Cuántos hombres quedan en estas tiendas? —La mayor parte de un batallón, probablemente unos seiscientos. La tela es nueva, ya que las antiguas se destruyeron en un monzón el año pasado. Una época terrible, fiebre por todas partes y malaria también. Ahora tenemos esto, nada." #NT!
 panum.556.g: "...¿acabas de decir que no has tenido ni una sola fiebre desde que compraste esta nueva tela?" #NT!

