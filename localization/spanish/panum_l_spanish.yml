 je_panum_typhus_description_reason: "El Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] está examinando actualmente a varios pacientes para determinar los síntomas de #YELLOW typhus#!. Es crucial poder diferenciar entre otras enfermedades similares, similares o coexistentes. Al final de su trabajo, el científico pone su descripción a disposición del público para que las generaciones futuras tengan una mejor oportunidad de reconocer los antecedentes de la enfermedad y encontrar métodos de tratamiento."
 je_panum_yellow_fever_description_reason: "El Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] está examinando actualmente a varios pacientes para determinar los síntomas de la fiebre amarilla #YELLOW#!. Es crucial poder diferenciar entre otras enfermedades similares, similares o coexistentes. Al final de su trabajo, el científico pone su descripción a disposición del público para que las generaciones futuras tengan una mejor oportunidad de reconocer los antecedentes de la enfermedad y encontrar métodos de tratamiento."
 panum.52.t: "Expedición de observación médica"
 panum.52.d: "El Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha reunido a un pequeño equipo de expertos y asistentes que son adecuados para observar de cerca una epidemia en el extranjero y sacar conclusiones de él. Ahora surge la pregunta sobre qué enfermedad debe observarse en qué país."
 panum.52.f: "Hay dos tipos diferentes de expediciones médicas que un médico puede emprender: expediciones de observación y expediciones de investigación. Las expediciones de observación ayudan a completar una descripción de una enfermedad, expediciones de investigación para descubrir un método de tratamiento. Sin embargo, una expedición no es tan eficiente como la investigación en el sitio y puede tomar varios intentos para investigar completamente una enfermedad."
