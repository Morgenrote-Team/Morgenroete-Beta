 panum.840.t: "El misterio de la muerte negra"
 panum.840.d: "El médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha escrito un tratado integral sobre las causas, la transmisión y las medidas contra la plaga. Una digresión particularmente notable se ocupa del papel de ratas y pulgas."
 panum.840.f: "En su tratado sobre la peste, el médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] resumió muchos de los nuevos descubrimientos. Además de recomendar un sistema de rotación para la desinfección y un suero especialmente desarrollado por [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim], [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] apunta a la relación entre pulgas como portadores de la peste bacilo y la infección de ratas. La transmisión ocurre de pulga a rata, de rata a rata, y de rata a humana."
 panum.840.g: "Un antiguo enemigo de repente se vuelve domesticable."
 panum.841.t: "Una notable propagación"
 panum.841.d: "En las últimas semanas, el médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha tratado ampliamente con la primera aparición y los lugares donde se extendió la peste."
 panum.841.f: "'En las últimas semanas me han enviado mapas por el Departamento de Comercio y los comparé con los archivos de mis colegas en el extranjero. Los médicos que afirman que la enfermedad está vinculada a un clima o geografía particular están equivocados. Más bien, se puede observar una extensión en forma de onda en la tierra y una propagación a través de los puertos más estrechos. Esto no debería ser sorprendente, ya que la gran epidemia de la peste de la Edad Media también se enfureció en Escandinavia, el Mediterráneo y el Medio Oriente. ¿Pero eso convencerá a mis colegas?"
 panum.841.g: "Entonces tiene poco que ver con la geografía."
 panum.842.t: "Limpieza de rotación"
 panum.842.d: "El médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha probado un nuevo procedimiento en [SCOPE.sState('panum_disease_state').GetName] que está demostrando ser extremadamente efectivo."
 panum.842.f: "'Se intentó la desinfección sistemática de la ciudad, pero demostró ser una empresa muy costosa, y fue abandonada a favor de un esquema de' limpieza general de la casa ', en el que un personal de inspectores y enfriamientos europeos se empleaba constantemente. Los distritos fueron tratados en rotación, de modo que cada casa de vivienda fue limpiada al menos tres veces al año. Este método tiene todas las ventajas de simplicidad, eficacia y economía. A cada inspector se le asigna un cierto número de pisos diariamente; Los ocupantes producen sus posesiones domésticas, los pisos y los cubículos se lavan y las tablas de cama se limpian en tanques de hierro portátiles. Se realiza una inspección para ilegalidades estructurales menores, carreras de ratas y agujeros similares se llenan con cemento a la vez, y toda la basura se llevó a cabo."
 panum.842.g: "Este sistema debe implementarse en todas partes."
 panum.843.t: "Una mortalidad interesante"
 panum.843.d: "Al mirar a través de las estadísticas, el médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] descubrió que el número de muertes entre los receptores de ratas es exorbitantemente alto."
 panum.843.f: "'El jefe de la agencia me dijo que estaba confundiendo la correlación y la causalidad. En principio, se hizo demasiado énfasis en infectar ratas antes de un brote de peste, dijo casi literalmente. Ahora me pregunto seriamente si, si la mayoría de las autoridades asumieran que los brotes de peste tenían algo que ver con las ratas, si se mantendrían en su propia teoría dada un número similar de indicaciones de una enfermedad puramente tropical. La mortalidad descaradamente mayor entre los receptores de ratas en comparación con el resto de la población es una 'correlación' demasiada para mí."
 panum.843.g: "¿Cuánta más evidencia se necesita?"
 panum.844.t: "¡Son las ratas, estúpidas!"
 panum.844.d: "Durante la investigación más cercana del brote de la peste en [SCOPE.sState('panum_disease_state').GetName], el médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] fue informado de que antes de que estallara la plaga, todas las ratas en el área murieron."
 panum.844.f: "\"Veo muchas ratas muertas tiradas en el suelo\", escribió Alexandre Yersin a su llegada a Hong Kong el 15 de junio de 1894. \"Las ratas son ciertamente los verdaderos dispersantes de la epidemia\"."
 panum.844.g: "Una tesis atrevida."
 panum.845.t: "Una muestra"
 panum.845.d: "El médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] logró tomar una muestra de tejido de una víctima de la peste en una morgue. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] tuvo que hacer mucho convincente. O más bien, [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] tuvo que sobornar a algunas personas para obtenerlo."
 panum.845.f: "'Se encuentran en sus ataúdes, que están completamente cubiertos de lima. Se abre un ataúd. Empuando la cal a un lado para exponer el área de la ingle. El bulto es claramente visible. Lo corté en menos de un minuto. -Alexandre Yersin"
 panum.845.g: "Reembolsaremos los costos."
 panum.851.t: "'Simplemente pobreza y tierra'"
 panum.851.d: "El médico del distrito en [SCOPE.sState('panum_disease_state').GetName], en nombre de las autoridades locales, ha rechazado las investigaciones actuales del médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] como infundado. Las causas y los métodos de tratamiento para la plaga son \"bien conocidos\"."
 panum.851.f: "'Debemos expresar nuestra sorpresa de que el gobierno central en [ROOT.GetCountry.GetCapital.GetCityHubName] considerara necesario enviar a un oficial médico, a pesar de que tenemos la situación lo suficientemente bajo control. Las medidas de desinfección y saneamiento han tenido un impacto, especialmente la limpieza de las casas y la mejora de las condiciones de vida de los residentes. El veneno probablemente se desarrolla a partir de condiciones atmosféricas debajo de las casas en ciertos distritos, y que es causado simplemente por la pobreza y la suciedad. En el sentido ordinario, la enfermedad no es infecciosa ni contagiosa."
 panum.851.g: "El éxito habla por sí mismo ..."
 panum.852.t: "Comida contaminada"
 panum.852.d: "Varios científicos, en una controversia directa con el médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], han dejado en claro que la plaga es una enfermedad intestinal causada por una mala nutrición."
 panum.852.f: "'El médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] puede tener algunas teorías emocionantes, pero [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] tiene muy poca experiencia que se ocupa de la enfermedad. Los médicos locales en [SCOPE.sState('panum_disease_state').GetName] han apelado repetidamente a las autoridades para que no cuestionen los hallazgos establecidos. Los hechos son los siguientes: el 40 por ciento de los pacientes con la peste sufren de vómitos, otro 30 por ciento de la diarrea y casi el 20 por ciento del dolor abdominal. En general, las quejas gastrointestinales se documentaron en casi el 60 por ciento de los pacientes. Por lo tanto, está claro que es una infección del tracto digestivo, y está aún más claro que aparentemente se debe a una nutrición malcriada, mala o de otra manera deficiente."
 panum.852.g: "Doctor - ¿Qué respondes?"
 panum.853.t: "Enfermedades tropicales"
 panum.853.d: "Varios médicos de renombre internacional han presentado la teoría de que la plaga es otra enfermedad tropical que difícilmente ocurriría fuera de ciertas zonas climáticas, y si lo hiciera, solo esporádicamente. Por lo tanto, es una enfermedad climática."
 panum.853.f: "'Ya hemos encontrado en el pasado que un clima más fresco resultó en que la onda de la peste disminuyó. Las implicaciones son claras: la peste es una enfermedad fuertemente relacionada con los cambios climáticos. Los datos meteorológicos y las pinturas sobrevivientes muestran que la última ola de plaga tuvo lugar en un ambiente significativamente más cálido que hoy. La desaparición de la plaga desde finales del siglo XVII se correlaciona con un enfriamiento del clima hasta que la plaga desaparece por completo. Las temperaturas crecientes de los últimos años, por otro lado, se correlacionan con la propagación de la peste en áreas que anteriormente se consideraban más frías. ¿Necesito llevar esto más allá?"
 panum.853.g: "Así que solo una variante de la fiebre amarilla."
 panum.854.t: "La falsa peste"
 panum.854.d: "En los últimos días, el médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] había recibido a varios hospitales para examinar a los pacientes allí. Al final resultó que no eran personas de peste, sino que sufren tifus."
 panum.854.f: "\"La muerte negra, tifus, cólera, consumo, peste bubónica ... oh, esos fueron los días\". -Un desconocido"
 panum.854.g: "Lamentable."
 panum.854.h: "Si estamos perdiendo el tiempo, ¿tal vez el médico puede usarlo?"
 panum.861.t: "El opio no es una respuesta"
 panum.861.d: "El médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] examinó cuidadosamente los supuestos efectos curativos del opio contra las enfermedades de la peste y llegó a una conclusión clara."
 panum.861.f: "'No funciona.'"
 panum.861.g: "Esto es un poco decepcionante e esclarecedor al mismo tiempo."
 panum.862.t: "Septicamia"
 panum.862.d: "El médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] pudo demostrar que varios experimentos que se suponían que debían sugerir una enfermedad gastrointestinal ya que la causa de la plaga se malinterpretó por completo."
 panum.862.f: "La visión de la infección a través del tracto alimentario, debido a los alimentos específicamente contaminados, fue ampliamente aceptada durante varios años, aunque hubo quienes consideraron \"emanaciones de la respiración y la piel\" como el factor etiológico más importante. Se llevaron a cabo grandes cantidades de experimentos de alimentación animal, con material de la peste, y el color se prestó a la hipótesis gastrointestinal, ya que muchos de los animales y aves murieron de enfermedades septicémicas que se asemejan a la peste. Sin embargo, los resultados no fueron concluyentes y finalmente fueron disputados en Hong Kong en 1904 por el actual oficial médico de Health, quien expresó todo su desacuerdo, con esta opinión."
 panum.862.g: "Este es un duro golpe para la teoría de que la plaga fue causada por la contaminación de los alimentos."
 panum.863.t: "Antibióticos"
 panum.863.d: "El médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] pudo mostrar en varios experimentos que las plagas de los pacientes responden excelentemente al tratamiento con antibióticos y recomiendan expresamente este enfoque."
 panum.863.f: "'Llamar a mis experimentos un éxito completo sería un eufemismo. De hecho, me sorprendió cómo funcionaban los antibióticos. Algunos pacientes incluso dijeron que sentían que habían sido curados. Si se confirma este efecto, la búsqueda de una vacuna para la plaga puede volverse innecesaria."
 panum.863.g: "¿No hay desventajas en los antibióticos?"
 panum.864.t: "Insecticidas"
 panum.864.d: "El uso a gran escala de insecticidas en un punto de acceso de peste no ha tenido ningún efecto. Según el médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], este es un éxito sorprendente."
 panum.864.f: "'Tienes razón al preguntar por qué estoy feliz por este fracaso. Pero los científicos también aprenden de las derrotas percibidas. En este sentido, no fue una derrota, sino una prueba. Varios de mis colegas sugirieron que la plaga podría ser una enfermedad tropical no diferente a la malaria, que fue transmitida por un mosquito. Al menos podemos dejar a un lado esta suposición. '\ N \ nfrom una entrevista con el Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] en un periódico local"
 panum.864.g: "Una opción menos."
 panum.865.t: "Letrinas"
 panum.865.d: "Durante una investigación sobre las medidas de higiene en [SCOPE.sState('panum_disease_state').GetName], el médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] descubrió que la infraestructura moderna de aguas residuales y letrinas dejaba algo que desear, especialmente en un distrito infestado de peste, y contactó a las autoridades locales."
 panum.865.f: "\"Incluso si aún no se ha aclarado de manera concluyente la mejor manera de lidiar con la plaga, e independientemente de cómo sean mis teorías personales y las de mis colegas, la experiencia ha demostrado que los pisos contaminados con hechos y aguas contaminadas permanentes son en principio para ser retirados, pueden ser por las mimasmas que se sospechan de ellos, o por debido a que son focos de germs. Si queremos controlar no solo la plaga sino también otras fuentes de enfermedad en el futuro, entonces debemos tomar medidas preventivas. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] en una carta al gobierno local"
 panum.865.g: "Será costoso, pero es inevitable."
 panum.870.t: "Bacillus pestis"
 panum.870.d: "El médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] examinó la muestra de tejido con su microscopio y se determinó definitivamente: ¡la plaga es transmitida por un bacilo!"
 panum.870.f: "'20 de junio de 1894. Los golpes contienen, clara y claramente visible, una gran cantidad de bacilos. Son pequeños, cortos y tienen extremos redondeados. Esto es sin duda el microbio de la peste. -Alexandre Yersin"
 panum.870.g: "¡Eso lo cambia todo!"
 panum.871.t: "Pulgas"
 panum.871.d: "El médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] puede haber hecho uno de los descubrimientos más cruciales en la historia de la peste: la relación entre pulgas, ratas y brote de peste."
 panum.871.f: "En [TimeKeeper.GetCurrentDate.Format('y')], [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] descubrió el vector de poca de rata que impulsa la enfermedad. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] había señalado que las personas que se enfermaron no tenían que estar en contacto cercano entre sí para adquirir la enfermedad. En Yunnan, China, los habitantes huyeron de sus hogares tan pronto como vieron ratas muertas, y en la isla de Formosa (Taiwán), los residentes consideraron que el manejo de ratas muertas aumentó los riesgos de desarrollar peste. Estas observaciones llevaron a [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] a sospechar que la pulga podría ser un factor intermediario en la transmisión de la peste, ya que las personas adquirieron la peste solo si estaban en contacto con ratas que habían muerto menos de 24 horas antes. En un experimento ahora clásico, [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] demostró cómo una rata sana murió de la plaga después de que las pulgas infectadas le habían saltado de una rata que había muerto recientemente de la peste."
 panum.871.g: "Fascinante."
 panum.872.t: "Suero contra la plaga"
 panum.872.d: "Basado en el conocimiento previo de la transmisión y el origen de la peste, así como los experimentos con la peste bacillus, el médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ha desarrollado un suero anti-plaga altamente efectivo y lo ha probado con éxito en un primer paciente."
 panum.872.f: "\"Desde la medianoche, el paciente se vuelve más tranquilo, y a las seis de la mañana (...) se despierta y declara que se siente curado\". -Alexandre Yersin"
 panum.872.g: "¡Funciona!"
