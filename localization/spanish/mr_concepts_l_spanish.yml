l_spanish:
 ag_morgenroete_name: "[concept_morgenroete]"
 ag_morgenroete_tooltip: "Tenemos al menos una posible acción para una característica [concept_morgenroete]."
 concept_morgenroete: "#r MorGenröte#!"
 concept_morgenroete_mr: "SEÑOR"
 concept_morgenroete_concept: "Concepto"
 concept_pm_academics_university_humanities: "#b #BLUE Humanidades-enfoque antropológico#!#!"
 concept_pm_academics_university_natural_history: "#b #GREEN Historia natural Focus#!#!"
 concept_pm_academics_university_mathematics: "#b #ORANGE enfoque matemático técnico#!#!"
 concept_academics_university_specialization: "Enfoque universitario"
 concept_academics_academic: "Académico"
 concept_academics_academics: "Académica"
 concept_academics_scientist: "Científico"
 concept_academics_scientists: "Científicos"
 concept_academics_academic_desc: "In [concept_morgenroete] #b Academics#! are special characters that allow you to use certain mechanics of the mod. You can get #b Academics#! in some events or by aquiring enough [concept_academics_progress].\nCurrently these #b Academics#! exist:\n - [concept_tesla_engineer]\n - [concept_mendelejew_chemist]\n - [concept_verrier_astronomer]\n - [concept_agassiz_geologist]\n - [concept_dubois_paleontologist]\n - [concept_dubois_naturalist]\n - [concept_theiler_biologist]\n - [concept_panum_physician]\n - [concept_lepsius_archaeologist]\n - [concept_lepsius_anthropologist]"
 concept_academics_progress: "Progreso académico"
 concept_academics_progress_desc: "Al acumular 360 #b progreso académico#! puede obtener un nuevo [concept_academics_academic]. Para tener acceso a #b progreso académico#!, debe tener la tecnología #b academia#! y al menos una #b universidad#!. \ Nyour #b El progreso académico#! la ganancia está influenciada por varios factores. Cuanto más #!1 tenga, más rápido obtendrá #b progreso académico#!, por ejemplo. Otro factor es el porcentaje de POP académicos en su país. Obtendrá el máximo progreso académico #b#! para #!6 2%#! o más POP académicos. Mejores escuelas y una intelectualidad feliz también ayudan a obtener el progreso académico #b#!. Por último, algunos de los focos tecnológicos y los edificios especiales como el [concept_academics_academic]0 o el [concept_academics_academic]1 proporcionarán un progreso académico #b adicional#! también."
 concept_academics_scientific_society: "Sociedad científica"
 concept_academics_scientific_societies: "Sociedades científicas"
 concept_academics_scientific_society_desc: "La #b Scientific Society#! es una sociedad de las mentes más brillantes de sus países. Representa a los científicos y académicos de sus países y le permite visitar su [Concept('concept_academics_academic','$concept_academics_academics$')]. \ N \ nthe #b Scientific Society#! podría asignarle [Concept('concept_academics_academic_mission','$concept_academics_missions$')] que le darán recompensas útiles."
 concept_academics_experience: "Experiencia"
 concept_academics_experience_desc: "Algunos académicos se reúnen #b experiencia#! durante su vida. En [concept_morgenroete], los personajes obtienen #b experiencia#! cuando se crean. Por lo general, obtienen 10 #b experiencia#! por cada año anterior a 30. \ Naddicionalmente obtienen #b experiencia#! haciendo su trabajo, por ejemplo para encontrar nuevos [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]. Obtienen #b experiencia#! pasivamente cada año también. Si un personaje llega a 300 #b experiencia#!, obtiene el rasgo #b famoso#! \ nthe superior la experiencia #b#! de un personaje, mejor es su trabajo. Un [concept_morgenroete]2 experimentado o famoso, por ejemplo, encuentra más [concept_morgenroete]3 y es mejor para construir un [concept_morgenroete]4."
 concept_academics_academic_mission: "Misión académica"
 concept_academics_academic_missions: "Misiones académicas"
 concept_academics_mission: "Misión"
 concept_academics_missions: "Misiones"
 concept_academics_academic_mission_desc: "Su [concept_academics_scientific_society] a veces le pedirá que alcance un cierto objetivo. Tales objetivos podrían ser encontrar una cantidad específica de cosas [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')], [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] o cosas similares. Otras misiones #b#! podrían necesitar que encuentre el planeta X o que obtenga un [Concept('concept_lepsius_exhibition','$concept_lepsius_excellent_exhibition$')]. \ Ni si falla una misión #b#! su sociedad científica #b #! estará infeliz, pero completar una misión generará recompensas útiles para usted."
 concept_curtiss_aviation: "Aviación"
 concept_curtiss_aviation_desc: "#b Aviation#! es una de las principales características de [concept_morgenroete]. Los siglos XIX y XX vieron el surgimiento de la vuelo humano. Primero en forma de #b globos#! y #b aeronaves#!, luego con #b planes#!. Volar fue una actividad prestigiosa y permitió llegar a nuevos horizontes. Romper uno de los recorses le dará a su país un impulso tecnológico, así como un modificador de prestigio. Podrá construir #!2 que produzca los nuevos #b vuelos#! buenos, así como #b servicios#!. El #b aeropuerto#! permitirá que un #!9 crezca que le permitirá usar la acción diplomática [concept_morgenroete]0. La convención #b del espacio aéreo#! le permitirá obtener acceso a los estados y [concept_morgenroete]3, así como al Polo Norte. Si su aerolínea #b#! crece lo suficiente, podrá construir un dirigible gigantesco o el avión más grande del mundo. La característica más emocionante llega a principios del siglo XX: podrá competir en el [concept_morgenroete]6. El #b Schneider Trophy#! es una raza de hidroaviones en la que compiten diferentes países. Si ganas, también obtendrás prestigio y organizarás el próximo evento. Y si logras ganar la carrera 3 veces, mantendrás el #b Schneider Trophy#!."
 concept_curtiss_balloonist_role: "Rol de globo"
 concept_curtiss_balloonist_role_only_balloonist: "Aeronauta"
 concept_curtiss_balloonists_role: "Globos"
 concept_curtiss_balloonist_role_desc: "A #b Balloonist#! es un personaje especial que puede ser patrocinado por una nación. Por lo general, los países bien desarrollados u occidentales patrocinarán #b Balloonist#! y competirán por registros y nuevos hallazgos. El #b Balloonists#! realizará vuelos al azar y obtendrá registros para la distancia más larga, el tiempo de vuelo más largo o el vuelo más alto. Para cada vuelo de globo, el #b Balloonist#! obtendrá experiencia y clasificación, lo que elevará las posibilidades de nuevos registros. Pero tenga en cuenta que el globo es un negocio peligroso y muchos globo mueren temprano, especialmente si están enfermos, alcohólicos o abusadores de drogas."
 concept_curtiss_arctic_expedition: "Expedición ártica"
 concept_curtiss_arctic_expeditions: "Expediciones árticas"
 concept_curtiss_arctic_expedition_desc: "Si investigó la tecnología #b zeppelin#!, tenga un [concept_verrier_observatory] con una estación meteorológica #b#!, un [concept_curtiss_pilot] y acceso a un estado cercano al Polo Norte, puede realizar una expedición ártica #b#!. Puede que esos estados son #b Groenland#!, #b Northern Norway#!, #b Alaska#!, #b nunavut#! y #b nenetsia#!. Puede obtener acceso poseer el estado usted mismo o tener un #!8 con el propietario."
 concept_curtiss_pilot: "Piloto"
 concept_curtiss_pilots: "Pilotos"
 concept_curtiss_pilot_desc: "A #b piloto#! es un carácter con el rasgo piloto #b#!. #b Los pilotos#! tienen una baja posibilidad de desove después del descubrimiento de aviación temprana #b#!. Además, en las batallas en un frente utilizando el reconocimiento aéreo como método de producción, existe la posibilidad de que un #b piloto#! emerja de la batalla a través de un evento. Las mejores tecnologías, como los aviones y la aviación moderna, pero también establecer una escuela piloto a través de decisiones permite una mejor oportunidad para que un personaje tenga el rasgo #b piloto#!. \ N#b pilotos#! lo ayuda de diferentes maneras. #b Airlines#! puede estar interesado en #b pilotos#! para aumentar su imagen; En la batalla por el #!8, los pilotos #b #b#! tienen una mejor oportunidad; y es necesario un #b pilot#! para emprender el #b3. #b pilotos#! también se puede actualizar a los pilotos Ace a través de un evento si se implementan en un frente."
 concept_curtiss_airport: "Aeropuerto"
 concept_curtiss_airports: "Aeropuerto"
 concept_curtiss_airport_desc: "Un aeropuerto #b#! es un edificio que está desbloqueado por la tecnología #b Aviation Modern#!. Es un edificio puramente civil y proporciona servicios [GetGoods('air_travel').GetName] y #b#!, pero consume una variedad de bienes a partir de [GetGoods('tools').GetName], [GetGoods('paper').GetName], [GetGoods('aeroplanes').GetName] y #!0. Más tarde necesita #!1, #!2 y #!3 también. \ Ni si tiene suficientes aeropuertos #b#! se fundará un #!6 y con sus crecientes aeropuertos #b#!, la aerolínea #b #! crecerá también y ofrecerá más bonos."
 concept_curtiss_airline: "Aerolínea"
 concept_curtiss_airlines: "Aerolíneas"
 concept_curtiss_airline_desc: "Una aerolínea #b#! es una empresa o una institución gubernamental que ofrece [GetGoods('air_travel').GetName] desde el nivel local hasta vuelos internacionales al final del juego. #b Airlines#! también proporcionan otros bonos. #b Airlines#! necesita [Concept('concept_curtiss_airport','$concept_curtiss_airports$')] realizar esos vuelos. Si lo crece #b aeropuertos#!, también lo hará las aerolíneas #b#!. \ Ni si su aerolínea #b#! es el gobierno, tendrá la oportunidad de construir un enorme dirigible y dejar que viaja enormes distancias. Si su aerolínea #b#! es de propiedad pública o privada, en su lugar podría tener la oportunidad de construir el avión más grande jamás creado."
 concept_curtiss_airspace_convention: "Convención del espacio aéreo"
 concept_curtiss_airspace_conventions: "Convenciones de espacio aéreo"
 concept_curtiss_airspace_convention_desc: "La convención #b del espacio aéreo#! es un [concept_diplomatic_pact] importante que le permite interactuar con regiones lejos de su influencia. Si tiene una convención de espacio aéreo #b#! con otra nación que tiene una [concept_lepsius_excavation_site], podrá realizar un [concept_lepsius_expedition] sin tener un [concept_active_interest] en la región. \ Nan #b Convención del espacio aéreo#! le permitirá enviar un #!0 si no es propietario de uno de los estados necesario."
 concept_curtiss_schneider_trophy: "Trofeo Schneider"
 concept_curtiss_schneider_trophy_desc: "La lucha por este prestigioso trofeo, que el francés Jacques Schneider donó poco antes de la Primera Guerra Mundial, tenía la intención principalmente de estimular el desarrollo de los hidroaviones. Con el tiempo, la carrera por este trofeo se convirtió en una raza de naciones, con el Reino Unido, Estados Unidos e Italia en particular dando a sus equipos un apoyo masivo para ganar el codiciado trofeo. De hecho, el desarrollo tecnológico se ha beneficiado del #b Schneider Trophy#! utilizando marinas más rápidas y avanzadas. Una nación con una escuela piloto y una gran [concept_curtiss_airline] tendrá una ventaja, por ejemplo. Una gran financiación [concept_curtiss_pilot] y masiva también ayudará a ganar el trofeo. Ganar el trofeo 3 veces seguidas es aún mejor, ya que la nación mantendrá el trofeo para siempre y obtendrá una bonificación de prestigio."
 concept_curtiss_balloonist: "Aeronauta"
 concept_curtiss_balloonist_desc: "Este personaje es un globo que a menudo realiza viajes en globo aventureros."
 concept_curtiss_experienced_balloonist: "Balloonista experimentado"
 concept_curtiss_experienced_balloonist_desc: "Este personaje es un globo experimentado que a menudo realiza viajes en globo aventureros. Los personajes con este rasgo tienen una mayor probabilidad de establecer mejores discos."
 concept_curtiss_famous_balloonist: "Globo famoso"
 concept_curtiss_famous_balloonist_desc: "Este personaje es un famoso globo que a menudo se realiza en viajes de globos aventureros. Los personajes con este rasgo tienen una mayor probabilidad de establecer mejores discos."
 concept_dubois_natural_history: "Historia natural"
 concept_dubois_natural_history_desc: "#b Historia natural#! es una de las principales características de [concept_morgenroete]. El siglo XIX ha visto muchos grandes descubrimientos de la historia natural: muchas grandes expediciones, como la del Beagle, la invención de la teoría de la evolución, el descubrimiento de cientos de miles de especies nuevas y, por supuesto, el descubrimiento de los dinosaurios. En una expedición #b del Pacífico#! puede encontrar plantas raras, animales y fósiles, realizar investigaciones oceanográficas o observar fenómenos astronómicos como los eclipses solares. Cuantos más animales, mayor sea el efecto que tiene el #b zoo#!. Puede encontrar esos #b animales#! en expediciones, puede recolectarlas en su propio territorio o pedirle a otros países que se los vendan. A #!3 puede recopilar dicho espécimen #b#!. Se puede enviar un #!6 #b naturalist#!#! en #!9 a los estados con un modificador de estado de la selva tropical. En caso de que no tenga ese estado usted mismo, puede adquirir un [concept_morgenroete]0 de otro país. A #!6 #b naturalist#!#! ganará [concept_morgenroete]4 cuando encuentren muestras raras. \ N \ n[concept_morgenroete]5 son el campo de un [concept_morgenroete]6, ya sea fósiles de plantas, insectos u otros animales pequeños. #b fósiles#! se pueden encontrar en #b expediciones#! o en estados con [concept_dubois_pacific_expedition]1. Si tiene una excelente formación #b#!, incluso podría encontrar [concept_dubois_pacific_expedition]4. Y de lo contrario, puede acceder a uno comprando un [concept_dubois_pacific_expedition]5. \ N \ ni si su país tiene acceso a una cordillera que un general puede participar en [concept_dubois_pacific_expedition]6 y obtener mejores rasgos y una bonificación de prestigio."
 concept_dubois_naturalist: "#b #GREEN naturalist#!#!"
 concept_dubois_naturalists: "#b #GREEN naturalists#!#!"
 concept_dubois_naturalist_desc: "#b #GREEN Naturalist#!#! son académicos que pueden reunir [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] y [concept_dubois_specimen]. Se pueden enviar a un [concept_dubois_pacific_expedition] o un [concept_dubois_botanical_expedition] donde pueden encontrar plantas y animales raros que le dan una pequeña bonificación. #b #GREEN naturalists#!#! ganancia #GREEN0 cuando encuentran nuevos especímenes raros."
 concept_dubois_paleontologist: "#b #GREEN paleontólogo#!#!"
 concept_dubois_paleontologists: "#b #GREEN paleontólogos#!#!"
 concept_dubois_paleontologist_desc: "#b #GREEN paleontólogos#!#! son académicos que cavarán para [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] y [Concept('concept_dubois_fossil','$concept_dubois_fossils$')]. Para recolectarlos, necesita acceso a un [concept_dubois_formation]. Si tiene acceso a una formación #b#!, ya sea poseerlo usted mismo o con un [concept_dubois_paleontological_licence], puede enviar su #b paleontólogo#! en un #GREEN1. \ Nafter recolectando o reconstruyendo 5 #b huesos de dinosaurios#! su #b paleontólogo#! puede construir un #GREEN6. A medida que #b #GREEN paleontólogos#!#! ganan #!#!0, mejorará para reconstruir #b esqueletos de dinosaurio#! y también lo harán los esqueletos #b#!. Cuanto mejor sea los esqueletos de dinosaurio #b#!, más prestigio proporcionará su #!#!7."
 concept_dubois_pacific_expedition: "Expedición del Pacífico"
 concept_dubois_pacific_expeditions: "Expediciones del Pacífico"
 concept_dubois_pacific_expedition_desc: "Como gran o gran potencia, puede enviar una expedición al Océano Pacífico. Debe tener el empirismo #b#!, #b tornillo fragata#! y #b Tecnología de la dialéctica#!, necesita un puerto y una universidad, así como una marina de al menos 15 y un admiral. eclipses. Al comienzo de la expedición #b#! puede elegir un #b científico#! para su expedición también, ya sea un #b topógrafo#!, #!,6, #!,7 o #!,8. Cada uno ayudará a traer mejores rendimientos en eventos específicos vinculados a su experiencia. La expedición puede elegir un enfoque en lo que explora exactamente. Se puede dedicar completamente a los misterios del mar y mejorar su conocimiento oceanográfico y astronómico; En ese caso, solo se activarán los eventos oceanográficos. Si explora las maravillas de la naturaleza, se enfrentará a eventos botánicos, zoológicos y paleontológicos. Grandes potencias también tendrán la opción de realizar una misión de prestigio, en la que encontrará artefactos, establecerá puestos comerciales o establecer misiones, especialmente útil si no tiene intereses diplomáticos en Oceanía, pero querrá tratar de adquirir al menos una pequeña colonia a través de misioneros. Cada uno ofrece diferentes eventos y recompensas."
 concept_dubois_habitat: "Hábitat"
 concept_dubois_habitats: "Hábitats"
 concept_dubois_animal_habitat: "Hábitat animal"
 concept_dubois_habitat_desc: "Un #b hábitat#! es una región en un estado donde vive un [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animal$')] específico. En #r MorGenröte#! #b hábitats#! para los diversos animales existen en varias regiones estatales. Si posee un #b hábitat#!, puede transportar el #b animales#! al #!1 o incluso venderlos a otros países. \ N \ niif A [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animal$')]0 en un estado con un #b hábitat#!"
 concept_dubois_nature_reserve: "Reserva natural"
 concept_dubois_nature_reserves: "Reservas de la naturaleza"
 concept_dubois_royal_hunting_reserve: "Reserva de caza real"
 concept_dubois_nature_reserve_desc: "Una reserva natural #b #! es un área protegida donde puede proteger o establecer [Concept('concept_dubois_habitat','$concept_dubois_habitats$')]. \ N \ nif que ya tiene un #b hábitat#!, puede protegerlo de la destrucción por la influencia de los humanos mediante la construcción de la reserva natural #b#! en el estado con el #b hábitat#!. Para construir una #b Reserva de la naturaleza#!, debe tener la tecnología #b genética#! desbloqueada y tener un estado incorporado con un #b hábitat#! que sea una patria de una de sus culturas principales. Tecnología desbloqueada y al menos una [Concept('concept_dubois_habitat','$concept_dubois_habitats$')]1 de su continente en su [Concept('concept_dubois_habitat','$concept_dubois_habitats$')]2. \ N \ na #b Reserve natural#! no solo protege a su animal #b hábitats#!, sino que también le permite establecer #b animales exóticos#! de su continente en ellos. Al hacer esto, puede proteger todos los animales exóticos #b#! de su continente en un solo estado."
 concept_dubois_zoo_animal: "Animal zoológico"
 concept_dubois_zoo_animals: "Animales del zoológico"
 concept_dubois_exotic_animal: "Animal exótico"
 concept_dubois_exotic_animals: "Animales exóticos"
 concept_dubois_zoo_animal_desc: "Hay muchos animales en el mundo que su [concept_dubois_naturalist] puede atrapar. Para atrapar un #b exótico animal#! necesita un estado con un [concept_dubois_habitat]. Alternativamente, puede comprar un animal #b exótico#! de un país con un #b hábitat#! \ nonce atrapado, el #b zoo animals#! puede enviarse a su #b0 que le permitirá expandir el #b zoo#!."
 concept_dubois_zoo: "Zoo"
 concept_dubois_zoos: "Zoológicos"
 concept_dubois_zoo_desc: "Un #b zoo#! es un edificio especial que puede construir después de reunir 5 [concept_dubois_zoo_animal]. El #b zoo#! alberga sus animales #b#!, su colección de[concept_dubois_specimen] y su colección paleontológica."
 concept_dubois_specimen: "Muestra"
 concept_dubois_specimens: "Especímenes"
 concept_dubois_specimen_desc: "Los diversos insectos, plantas y animales más pequeños que un [concept_dubois_naturalist] puede recolectar, se denominan espécimen #b#!. Puede usar el espécimen #b#! para construir un jardín botánico o una recolección de muestras en su [concept_dubois_zoo]."
 concept_dubois_botanical_expedition: "Expedición botánica"
 concept_dubois_botanical_expeditions: "Expediciones botánicas"
 concept_dubois_botanical_expedition_desc: "You can send a [concept_dubois_naturalist] on a #b Botanical Expedition#! if you have access to a state with [concept_ito_medicinal_plants] either by owning such a state or by acquiring a [concept_dubois_botanical_licence].\nYour #b Naturalist#! will collect [concept_ito_medicinal_plants] and [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] during the one year journey. Sometimes they will find a rare plant that will make a great addition to the botanical collection of a [concept_dubois_zoo]."
 concept_dubois_botanical_licence: "Licencia botánica"
 concept_dubois_botanical_licences: "Licencias botánicas"
 concept_dubois_botanical_licence_desc: "Si no tiene acceso a un estado con el modificador del estado de la selva tropical, aún puede enviar un [concept_dubois_botanical_expedition] adquiriendo una licencia botánica #b#! de un país que lo hace. Tendrá que pagar una pequeña cantidad de dinero, pero esto le permitirá cobrar [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] y encontrar plantas raras."
 concept_dubois_fossil: "Fósil"
 concept_dubois_fossils: "Fósiles"
 concept_dubois_fossil_desc: "Un [concept_dubois_paleontologist] puede descubrir #b fósiles#! de plantas y animales, que se extinguen durante mucho tiempo, si descubrió un [concept_dubois_formation]."
 concept_dubois_dinosaur_bone: "Huesos de dinosaurio"
 concept_dubois_dinosaur_bones: "Huesos de dinosaurio"
 concept_dubois_dinosaur_bone_desc: "Un [concept_dubois_paleontologist] puede encontrar huesos de dinosaurio en grandes [Concept('concept_dubois_formation','$concept_dubois_formations$')]. \ Nan #b Paleontólogo experimentado#! también puede intentar reconstruir un #b Dinosaur Bone#! de 20 [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] fragmentos. Un #b Dinosaur Bone#! solo puede reconstruirse si al menos un hueso de dinosaurio está disponible para la orientación. Su éxito depende en gran medida del paleontológico [concept_academics_experience]. \ N#b Los huesos de dinosaurio#! se usan para reconstruir [Concept('concept_dubois_formation','$concept_dubois_formations$')]2."
 concept_dubois_dinosaur_skeleton: "Esqueleto de dinosaurio"
 concept_dubois_dinosaur_skeletons: "Esqueletos de dinosaurio"
 concept_dubois_dinosaur_skeleton_desc: "De cinco [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] de una región continental, un [concept_dubois_paleontologist] puede reconstruir un dinosaurio completo. Para reconstruir un esqueleto de dinosaurio #b #b huesos de dinosaurio#! de la misma región. \ Nhopencalmente su #b paleontólogo#! es lo suficientemente experimentado como para reconstruir el #b dinosaurio esqueleto#! correcto. De lo contrario, podría arriesgarse a perder el prestigio para su [concept_dubois_paleontologist]0. Sin embargo, si un esqueleto de dinosaurio #b se reconstruyó mal, puede intentar solucionarlo, lo que dará como resultado una reconstrucción ligeramente mejor."
 concept_dubois_paleontological_collection: "Colección paleontológica"
 concept_dubois_paleontological_collections: "Colecciones paleontológicas"
 concept_dubois_paleontological_collection_desc: "La colección paleontológica #b#! es el reino de su [concept_dubois_paleontologist]. Allí encontrará todos los [Concept('concept_dubois_fossil','$concept_dubois_fossils$')], [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] y [Concept('concept_dubois_dinosaur_skeleton','$concept_dubois_dinosaur_skeletons$')] de su nación. Si su #b paleontólogo#! montara los esqueletos #b#! horriblemente incorrecto, eso incluso podría hacer que pierda el prestigio. ¡Pero tal vez lo mismo u otro #b paleontólogo#! puede volver a montarlos mejor!"
 concept_dubois_formation: "Formación"
 concept_dubois_formations: "Formaciones"
 concept_dubois_geological_formation: "Formación geológica"
 concept_dubois_formation_desc: "Hay dos tipos de formaciones #b#!, formaciones normales permiten que su [concept_dubois_paleontologist] recolecte [Concept('concept_dubois_fossil','$concept_dubois_fossils$')], mientras que las grandes formaciones permiten el descubrimiento de [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')]. \ N#b formaciones#! puede ser descubierto por su paleontólogo o cuando investiga la tecnología de paleontología."
 concept_dubois_paleontological_expedition: "Expedición paleontológica"
 concept_dubois_paleontological_expeditions: "Expediciones paleontológicas"
 concept_dubois_paleontological_licence: "Licencia paleontológica"
 concept_dubois_paleontological_licences: "Licencias paleontológicas"
 concept_dubois_paleontological_licence_desc: "Si no tiene acceso a un [concept_dubois_formation], puede intentar obtener acceso a uno con una licencia paleontológica #b #b Esta acción diplomática le permite obtener acceso a una gran formación #b #b GRANDE #!. para poder usarla, debe ser una gran o gran potencia y la otra nación necesita una gran formación #b GRAN FORMACIÓN #!. Usted tendrá que pagar la otra nación una pequeña cantidad de sus ingresos, pero con suerte será que sea."
 concept_dubois_mountain: "Montaña"
 concept_dubois_mountains: "Montañas"
 concept_dubois_mountain_desc: "There are many #b Mountains#! that can be climbed.\n\n#V North America:#!\n#b Mount McKinley#! (Alaska), 6190 meters\n#b Mount Logan#! (Yukon Territory), 5959 meters\n#b Citlaltépetl#! (México), 5636 meters\n#b Mount Whitney#! (California), 4421 meters\n\n#V South America:#!\n#b Aconcagua#! (Mendoza), 6267 meters\n#b Huascarán#! (Lima Territory), 6768 meters\n#b Illimani#! (La Paz), 6438 meters\n#b Chimborazo#! (Ecuador), 6267 meters\n\n#V Europe:#!\n#b Shkara#! (Greater Caucasus), 5642 meters\n#b Dufourspitze#! (Dufourspitze), 4634 meters\n#b Matterhorn#! (West Switzerland), 4478 meters\n#b Aiguille Verte#! (Savoy), 4122 meters\n#b Pico de Aneto#! (Aragon), 3404 meters\n\n#V Africa:#!\n#b Kibo#! (Tanganyika), 5895 meters\n#b Mount Kenya#! (Kenya), 5199 meters\n#b Mount Stanley#! (Uganda), 5109 meters\n#b Kamerunberg#! (South Cameroon), 4095 meters\n\n#V Asia:#!\n#b Kamet#! (Delhi), 7756 meters\n#b Chogolisa#! (Kashmir), 7665 meters\n#b Kabru#! (Himalayas), 7412 meters\n#b Kaufmann Peak#! (Tajikistan), 7134 meters\n\n#V Australia & Oceania:#!\n#b Mount Wilhelm#! (Eastern New Guinea), 4121 meters\n#b Mount Cook#! (South Island), 3724 meters"
 concept_elgar_music: "Cultura musical"
 concept_elgar_opera: "Ópera"
 concept_elgar_operas: "Óperas"
 concept_elgar_opera_house: "Teatro de la ópera"
 concept_elgar_opera_houses: "Ópera"
 concept_elgar_musical_tradition: "Tradición musical"
 concept_elgar_impressionism: "Impresionismo"
 concept_elgar_expressionism: "Expresionismo"
 concept_elgar_art_nouveau: "Art nouveau"
 concept_elgar_architecture: "Arquitectura"
 concept_elgar_architectural_project: "Proyecto arquitectónico"
 concept_elgar_architectural_projects: "Proyectos arquitectónicos"
 concept_lepsius_archaeology: "Arqueología"
 concept_lepsius_archaeology_desc: "#b Archaeology#! es una de las principales características de [concept_morgenroete]. \ N \ n. Puede obtener acceso poseer el sitio usted mismo o pedirle a un país un sitio para un [concept_lepsius_excavation_licence]. \ N \ nyou ahora puede enviar una expedición arqueológica a uno de los sitios de excavación. Su equipo descubrirá [Concept('concept_lepsius_artifact','$concept_lepsius_minor_artifacts$')] y en casos muy raros y la ayuda de un buen [concept_lepsius_archaeologist], incluso podría encontrar un [concept_lepsius_major_artifact]. \ N \ nonce su equipo regresa con los artefactos, puede construir un #!0. En un museo arqueológico, podrá ver sus artefactos, crear #!1 y visitar su #b #!3 Archaeologist#!#!. \ N \ n Los artefactos y exposiciones más que tenga, más prestigio obtendrá. Si tiene un #!7 y un #!8, puede encontrar #!9 y reconstruir especies humanas prehistóricas. Cada esqueleto le dará más prestigio antropológico. Con suficiente prestigio antropológico, obtendrá un modificador de prestigio para su país."
 concept_lepsius_archaeologist: "#b #BLUE arqueólogo#!#!"
 concept_lepsius_archaeologists: "#b #BLUE arqueólogos#!#!"
 concept_lepsius_archaeologist_desc: "#b #BLUE arqueólogos#!#! son académicos que puede enviar a [Concept('concept_lepsius_expedition','$concept_lepsius_expeditions$')]. Se reunirán [Concept('concept_lepsius_artifact','$concept_lepsius_minor_artifacts$')] allí. A veces incluso pueden encontrar un [concept_lepsius_major_artifact]. \ Narqueólogos ganan [concept_academics_experience] durante su trabajo y pasivamente cada año. Pueden obtener mejores niveles del rasgo de arqueólogo ganando suficiente experiencia #b#!."
 concept_lepsius_anthropologist: "#b #BLUE antropólogo#!#!"
 concept_lepsius_anthropologists: "#b #BLUE antropólogos#!#!"
 concept_lepsius_anthropologist_desc: "#b #BLUE antropólogos#!#! son académicos que estudian la prehistoria humana, tanto en los sentidos paleontológicos como arqueológicos. Buscan [Concept('concept_lepsius_human_fossil','$concept_lepsius_human_fossils$')] en [Concept('concept_lepsius_cave','$concept_lepsius_caves$')] o identifican huesos previamente desconocidos. Tres #b fósiles humanos#! son suficientes para reconstruir una especie prehumana. El hallazgo e identificación de los huesos, así como la sistematización de las primeras especies humanas, trae prestigio antropológico. También pueden encontrar artefactos locales mientras exploran cuevas."
 concept_lepsius_museum: "Museo arqueológico"
 concept_lepsius_museum_desc: "El #b arqueológico Museum#! es un edificio que puede construir que muestra todo el [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] que su nación ha encontrado."
 concept_lepsius_excavation_site: "Sitio de excavación histórica"
 concept_lepsius_excavation_sites: "Sitios de excavación históricos"
 concept_lepsius_excavation_site_desc: "Hay múltiples sitios de excavación históricos #b#! en diferentes países que incluyen: Egipto superior e inferior, Babilonia, Asiria, Crete, Argolis, Yucatán y Perú. Cada sitio histórico #b#! ofrece diferentes [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] y eventos."
 concept_lepsius_expedition: "Expedición arqueológica"
 concept_lepsius_expeditions: "Expediciones arqueológicas"
 concept_lepsius_expedition_desc: "Una expedición arqueológica #b#! es una expedición de un [concept_lepsius_archaeologist] y su [concept_lepsius_archaeological_team]. Tomará varios meses en los que intentarán reunir tantos [Concept('concept_lepsius_artifact','$concept_lepsius_minor_artifacts$')] como sea posible. #b Expeditions#! son la única forma de obtener en posesión de [Concept('concept_lepsius_major_artifact','$concept_lepsius_major_artifacts$')]. \ Ni investigó la arqueología temprana, puede dejar a su equipo en el sitio para crear un [concept_lepsius_excavation] después de una expedición #b exitosa#!."
 concept_lepsius_archaeological_team: "Equipo arqueológico"
 concept_lepsius_archaeological_teams: "Equipos arqueológicos"
 concept_lepsius_excavation_team: "Equipo de excavación"
 concept_lepsius_archaeological_team_desc: "Necesita uno o más #b equipo arqueológico#! para poder realizar [Concept('concept_lepsius_expedition','$concept_lepsius_expeditions$')]. Puede obtener hasta 3 #b equipos arqueológicos#!, pero cada uno tiene requisitos más altos. Obtenga otro equipo #b#! que haya investigado la tecnología de anticuario y tenga un experimentado [concept_lepsius_archaeologist]. \ n \ nyou necesita #b equipos#! para [Concept('concept_lepsius_expedition','$concept_lepsius_expeditions$')] y #!3."
 concept_lepsius_excavation_licence: "Licencia de excavación"
 concept_lepsius_excavation_licences: "Licencias de excavación"
 concept_lepsius_excavation_licence_desc: "Si no posee algunos de los [Concept('concept_lepsius_excavation_site','$concept_lepsius_excavation_sites$')] usted mismo, aún puede obtener acceso a ellos utilizando la licencia de excavación #b#! Acción diplomática."
 concept_lepsius_artifact: "Artefacto"
 concept_lepsius_artifacts: "Artefactos"
 concept_lepsius_minor_artifact: "Artefacto menor"
 concept_lepsius_minor_artifacts: "Artefactos menores"
 concept_lepsius_oceanic_artifact: "Artefacto oceánico"
 concept_lepsius_oceanic_artifacts: "Artefactos oceánicos"
 concept_lepsius_artifact_desc: "Puede obtener artefactos enviando [Concept('concept_lepsius_archaeological_team','$concept_lepsius_archaeological_teams$')] en [Concept('concept_lepsius_expedition','$concept_lepsius_expeditions$')], [Concept('concept_lepsius_excavation','$concept_lepsius_excavations$')], en [Concept('concept_dubois_pacific_expedition','$concept_dubois_pacific_expeditions$')] o en eventos. \ N \ nusualmente obtendrá #b artefacts#!. Puede usar estos #b artifacts menores #! para [Concept('concept_lepsius_exhibition','$concept_lepsius_exhibitions$')] en su [concept_lepsius_museum]. \ N \ n[Concept('concept_lepsius_expedition','$concept_lepsius_expeditions$')]0 en la otra mano son únicos #b artifactores#! que solo se encuentran y se determina una vez que se encuentran un #! y que se encuentran únicos. nombre. Por lo general, puede encontrarlos en expediciones, excavaciones y como descubrimientos arqueológicos."
 concept_lepsius_major_artifact: "Artefacto importante"
 concept_lepsius_major_artifacts: "Artefactos importantes"
 concept_lepsius_major_artifact_desc: "#b artefactos principales#! son especiales [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] que tienen un nombre y una identidad. \ Nyou puede encontrar #b artefactos principales#! de diferentes maneras. Algunos de ellos encontrarás durante [Concept('concept_lepsius_expedition','$concept_lepsius_expeditions$')]. Para otros, debe mantener un [concept_lepsius_excavation] continuo hasta que lo encuentre. Y algunos serán descubiertos en un descubrimiento importante. Un artefacto principal #b de un país de un país ilegalmente podría causar un incidente diplomático que podría dañarlo más que poseer un artefacto #b importante#!. Por otro lado, #b artefactos principales#! le permiten crear un #!3 que le dará una gran bonificación de prestigio y es necesario para algunos #!4."
 concept_lepsius_exhibition: "Exhibición"
 concept_lepsius_exhibitions: "Exposiciones"
 concept_lepsius_excellent_exhibition: "Excelente exposición"
 concept_lepsius_excavation: "Excavación"
 concept_lepsius_excavations: "Excavaciones"
 concept_lepsius_excavation_desc: "Si ha investigado la arqueología temprana y ha terminado un [concept_lepsius_expedition], puede decidir dejar su [concept_lepsius_archaeological_team] en el sitio para cavar pasivamente [Concept('concept_lepsius_artifact','$concept_lepsius_minor_artifacts$')]. Siempre puede llamar a su equipo de la excavación #b#!."
 concept_lepsius_human_fossil: "Fósil humano"
 concept_lepsius_human_fossils: "Fósiles humanos"
 concept_lepsius_human_fossils_fossils: "Fósiles"
 concept_lepsius_human_bones: "Huesos humanos"
 concept_lepsius_human_fossil_desc: "#b Los fósiles humanos#! pertenecen a una de las cinco especies diferentes: Cro-Magnon, Neanderthal, Homo erectus, Australopithecus o Paranthropus. [Concept('concept_lepsius_anthropologist','$concept_lepsius_anthropologists$')] puede encontrarlos en [Concept('concept_lepsius_cave','$concept_lepsius_caves$')] y (generalmente) identificarlos y asignarlos inmediatamente. Sin embargo, los fósiles humanos rara vez pueden ser encontrados por arqueólogos y paleontólogos. Solo #b #BLUE antropólogos#!#! puede identificar correctamente estos 'fósiles humanos desconocidos'. Tres huesos completan una especie, que es recompensada con prestigio antropológico. La primera clasificación de un humano temprano da significativamente más prestigio. Los fósiles humanos se pueden completar tan a menudo como se desee."
 concept_lepsius_cave: "Cueva"
 concept_lepsius_caves: "Cueva"
 concept_lepsius_cave_desc: "#b Las cuevas prehistóricas#! son un lugar donde las primeras especies humanas o prehumanas pueden haber dejado [Concept('concept_lepsius_human_fossil','$concept_lepsius_human_fossils_fossils$')] y, en tipos más avanzados, herramientas. Las cuevas pueden ser descubiertas y exploradas por [Concept('concept_lepsius_anthropologist','$concept_lepsius_anthropologists$')]. Algunas cuevas también se desbloquean a través de eventos históricos. Los fósiles de una sola especie se encuentran en cada cueva, esto significa que los huesos de los humanos y los neandertales Cro -Magnon nunca están en la misma cueva. Algunas cuevas son históricas, mientras que otras se distribuyen al azar al comienzo del juego en uno de los tres continentes de África, Asia y Europa. Se basan aproximadamente en el área de distribución de los pre -humanos: el Australopithecus, por ejemplo, solo se encontrará en África."
 concept_verrier_astronomy: "Astronomía"
 concept_verrier_observatory: "Observatorio"
 concept_verrier_observatories: "Observatorios"
 concept_verrier_astronomer: "#b #ORANGE astronomer#!#!"
 concept_verrier_astronomers: "#b #ORANGE astrónomos#!#!"
 concept_verrier_astronomical_object: "Objeto astronómico"
 concept_verrier_astronomical_objects: "Objetos astronómicos"
 concept_verrier_astronomical_object_icon: "@verrier_astronomicalobject!"
 concept_verrier_celestial_body: "Cuerpo celestial"
 concept_verrier_celestial_bodies: "Cuerpos celestiales"
 concept_verrier_comet: "Gran cometa"
 concept_verrier_comets: "Grandes cometas"
 concept_verrier_comet_desc: "La edad victoriana tenía algunos #b grandes comets#! que recibieron atención pública generalizada. Si tiene un [concept_verrier_astronomer], existe la posibilidad de que descubra uno de estos #b grandes comets#! primero, lo que resulta en una bonificación para prestigio e investigaciones."
 concept_verrier_moon_photo: "Foto de luna"
 concept_verrier_moon_photos: "Fotos de luna"
 concept_rapanui_christian_mission: "Misión cristiana"
 concept_rapanui_christian_missions: "Misiones cristianas"
 concept_rapanui_christian_mission_desc: "[Concept('concept_major_power','$concept_major_powers$')] o [Concept('concept_great_power','$concept_great_powers$')] con [Concept('concept_interest','$concept_interests$')] en Oceanía puede tratar de convertir una nación isleña descentralizada en la región, pero esto solo es posible si su país no es demasiado secular y el grupo de interés \"devoto\" no es demasiado débil. Si envía un misionero, será recibido amablemente, ignorado o asesinado de inmediato. Si su misión sale mal, tendrá que esperar unos años para encontrar un nuevo misionero para difundir la palabra de Dios. Luego, su misionero convertirá el 1% de la población por año. Puede haber eventos que ayuden o obstaculizan la conversión. \ N \ n La segunda etapa comienza cuando alcanza el 30% de nativos convertidos. Ahora su estación misionera se volverá permanente. Si el 51 por ciento de los nativos profesa el cristianismo, entonces el jefe se convertirá a su religión y se colocará bajo su protección como [concept_protectorate]. Años más tarde, estas áreas se pueden anexar si tiene la tecnología para prevenir la malaria. O fortalece la misión directamente enviando misioneros adicionales, o intentas comerciar. Puede adquirir raro [Concept('concept_lepsius_artifact','$concept_lepsius_oceanic_artifacts$')], [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] o perlas que aumenten el nivel de vida de los ricos."
 concept_manzoni_literary_tradition: "Tradición literaria"
 concept_klimt_painters: "#PURPLE #b pintores#!#!"
 concept_klimt_painting_tradition: "Tradición de pintura"
 concept_vikelas_sports: "Deportes"
 concept_vikelas_sports_desc: "#b Sports#! es una de las principales características de [concept_morgenroete]. \ N \ nonce un país descubre #b deportes organizados#!, tiene acceso a diferentes actividades deportivas. La más importante es la base del [concept_vikelas_ioc] que comenzará a organizar el [concept_vikelas_olympic_games]. Los Juegos Olímpicos te darán la oportunidad de ganar medallas de oro que le proporcionarán a tu país [concept_prestige]."
 concept_vikelas_olympic_games: "Juegos Olímpicos"
 concept_vikelas_olympic_games_desc: "Una vez que se basa el [concept_vikelas_ioc], los juegos olímpicos #b#! pueden tener lugar cada 4 años. Cada vez que el comité vote por un #b host#!. El país anfitrión obtendrá un gran impulso [concept_prestige]. Muchos factores influyen en cuántas medallas obtendrás. Su población tiene una pequeña influencia, el [concept_sol] tiene una infleza más grande, algunos eventos también influyen en sus posibilidades y también lo hacen mucho [Concept('concept_general', '$concept_generals$')] y gran [Concept('concept_admiral', '$concept_admirals$')]. Además, los personajes con el rasgo #b atleta#! y los centros urbanos con las instalaciones deportivas #b#! también dan pequeños impulso. Esos factores influyen en cuántas medallas de las 12 medallas de oro obtendrán su país. Cada medalla de oro le otorgará 5 [concept_prestige]."
 concept_vikelas_ioc: "Comité olímpico internacional"
 concept_vikelas_ioc_desc: "A Nation that has researched #V $vikelas_international_sports_tech$#! can found the #b International Olympic Comittee#! or #b IOC#! in short. The IOC will then start organizing the [concept_vikelas_olympic_games]. Each member of the IOC can participate in the Olympic Games.\n The most important members of the IOC are the #b Board Members#!. The Founder of the IOC will become the #b President#! and therefore stay a board member forever while the other members will be elected every 4 years. The Board has space for 5 Great Powers, 2 European, 2 Asian, 2 American, 1 African and 1 Oceanic nation.\nThe main task of the Board Members is choosing the next Host of the Games. There will be 3 candidates (or 4 if a country decides to bribe the Board) to choose from.\nIf Greece founds the IOC, the Olympic Games will only be held in Greece resulting in the Board being less important, as they do not choose the Host."
 concept_lepsius_exhibition_desc: "Su [concept_lepsius_museum] configurará automáticamente exposiciones (en forma de un [concept_production_method] para cada región) si tiene suficiente [Concept('concept_lepsius_artifact','$concept_lepsius_minor_artifacts$')] del mismo tipo. Para artefactos normales, la primera exposición se creará para 10 o más artefactos. A partir de ahí, son posibles mejores exposiciones con 25 (exposición media), 50 (exposición grande) y 100 artefactos menores (excelente exposición). La excelente exposición también necesita uno [concept_lepsius_major_artifact]. \ N \ nlocal Artifacts tiene un conjunto menos diverso de exposiciones, ya que se limitan a una exposición regular y una gran exposición. La exposición regular requiere 25 artefactos locales y la gran exposición requiere 50."
 concept_vikelas_racer: "Corredor de autos"
 concept_vikelas_racers: "Corredores de autos"
 concept_vikelas_racer_desc: "Un corredor de autos es un [concept_character] especial que participa en [concept_vikelas_car_racing]."
 concept_vikelas_car_racing: "Carreras de autos"
 concept_vikelas_car_racing_desc: "Las carreras de automóviles son un deporte en el que [Concept('concept_vikelas_racer','$concept_vikelas_racers$')] compiten entre sí en una pista o en carreteras regulares."
 concept_lepsius_archaeological_exhibition: "Exposición arqueológica"
 concept_elgar_opera_desc: "El #b ópera#! es el centro musical de una nación. Es donde los músicos más importantes se reúnen y tocan para las masas. Cuanto mayor sea el nivel de la #b ópera#!, más [concept_elgar_musical_tradition] se producirá cada año."
 concept_elgar_impressionism_desc: "#b Impresionism#! es un estilo en la historia del arte que se caracteriza por la descripción atmosférica de instantáneas fugaces de una escena. Salió de un movimiento dentro de la pintura en Francia en la segunda mitad del siglo XIX. El término impresionismo también se ha aplicado a ciertos estilos de música, literatura, cine y fotografía. Si bien muchos naturalistas como Heinrich Hart rechazaron la música como un medio para expresar un \"accionismo de búsqueda de la verdad\", los impresionistas a menudo consideraban el \"sueño sin objetos\" a los acordes coloridos finamente graduados como un placer. con una aprobación de 5 arriba. Si elige #b impresionismo#!, no podrá desbloquear las otras dos ramas. Por lo tanto, le dará la mayor bonificación a [concept_elgar_musical_tradition]."
 concept_elgar_expressionism_desc: "#b Expressionism#! es un estilo en el arte. Sus inicios y precursores se pueden encontrar a fines del siglo XIX. Al igual que el impresionismo, el simbolismo y el fauvismo, el expresionismo es un movimiento contra las tendencias del naturalismo. En el expresionismo, el nivel expresivo supera el nivel estético, apelativo y de hecho. El artista quiere representar su experiencia para el espectador. En contraste con el impresionismo musical, que representa la percepción de la apariencia externa de las cosas, los movimientos artísticos expresionistas formulan las emociones del alma humana. \ N \ nin el juego, #b ExpressionIsm#! solo se puede desbloquear con una entrada de revista que requiere 1000 [concept_elgar_musical_tradition], un [concept_elgar_opera], un poderoso inteligente o un listón de inteligencia que no es poderoso y las tierras de listones que no son poderosas y los que no son poderosos y las tierras comerciales. Si elige #b Expressionism#!, no podrá desbloquear las otras dos ramas."
 concept_elgar_art_nouveau_desc: "#b Art Nouveau#! es un estilo artístico que se desarrolló a partir del movimiento de artes y artesanía #italic#! y se inspiró en formas naturales. A menudo se centró en el dinamismo y el movimiento y usó materiales modernos. Si elige #b Art Nouveau#!, no podrá desbloquear las otras dos ramas. Obtendrá varios eventos y entradas de diario sobre hechos arquitectónicos y podrá obtener un #!4."
 concept_elgar_composer: "#PURPLE #b composer#!#!"
 concept_elgar_composers: "#PURPLE #b compositores#!#!"
 concept_elgar_composer_desc: "#b compositores#! son hombres y mujeres que componen música. Los compositores son tipos de caracteres especiales que puede obtener de los eventos, desde obtener suficientes [concept_artistic_progress] para crear uno en su nación o ofreciendo una posición a un [concept_elgar_travelling_composer]. \ Nonce tiene un compositor #b#! puede dejar que comiencen [Concept('concept_elgar_composing','$concept_elgar_composing_lower_case$')], [Concept('concept_elgar_conducting','$concept_elgar_conducting_lower_case$')], para continuar [Concept('concept_elgar_musical_tour','$concept_elgar_musical_tours$')] o componer [Concept('concept_elgar_musical_masterwork','$concept_elgar_musical_masterwork_masterworks$')]. Cada acción es diferente en lo que hace el compositor, lo que requiere y lo que obtienes de ellos. El compositor #b#! será #!2 después de cada tarea y necesitará descansar por un tiempo hasta que pueda volver a trabajar. Cuanto mayor sea la reputación #b#!, mayores serán los beneficios de una #b compositor de acciones. #b Composers#! Alcanzar una reputación #b#! de 500 se convertirá en [concept_artistic_progress]4, titanes de la música, conocidos en todo el mundo."
 concept_elgar_great_composer: "#PURPLE #b gran compositor#!#!"
 concept_elgar_great_composers: "#PURPLE #b grandes compositores#!#!"
 concept_elgar_great_composer_desc: "#b Grandes compositores#! son los titanes de la música. Los que nombres serán conocidos por toda la eternidad. [Concept('concept_elgar_composer','$concept_elgar_composers$')] Alcanzar 500 [concept_artists_experience], se convertirá en #b grandes compositores#!. Esto aumentará enormemente su eficiencia y dejará que su nación gane mucho más [concept_elgar_musical_tradition]. A #b Great Composer#! puede crear una forma [concept_elgar_musical_masterwork] más rápida, por ejemplo."
 concept_elgar_travelling_composer: "Compositor viajero"
 concept_elgar_travelling_composers: "Compositor viajero"
 concept_elgar_travelling_composer_desc: "#b compositores viajeros#! son [Concept('concept_elgar_composer','$concept_elgar_composers$')] que no son contratados por ninguna nación. En cambio, viajan en giras de conciertos. Posiblemente puede adquirir un compositor #b #b #!, pero cuanto más [concept_artists_experience] tengan, más demandas tendrán. #b compositores#! con una reputación #b más alta exigirá casas de ópera más grandes, la música moderna #!3, un cierto #!4 y algunos pueden unirse solo #!5 o #!6. \ NA Case especial son #!7 que solo están disponibles para las naciones que son de la misma o una identidad nacional muy similar."
 concept_elgar_national_composer: "Compositor nacional"
 concept_elgar_national_composers: "Compositor nacional"
 concept_elgar_national_composer_desc: "#b compositores nacionales#! son [Concept('concept_elgar_composer','$concept_elgar_composers$')] que valoran mucho a su nación. No podrán ser contratados por otras naciones. Una de sus culturas principales debe compartir tanto un traidor #b #b#! como un [concept_cultural_heritage_trait]. Esto significa que un compositor nacional #b de Alemania del Norte #b National Composer#! estará disponible para los países alemanes y Suiza."
 concept_elgar_composing: "Composición"
 concept_elgar_composing_lower_case: "composición"
 concept_elgar_composing_compose: "componer"
 concept_elgar_composing_desc: "A [concept_elgar_composer] que #b compone#! recibe 5 [concept_artists_experience] por año y agrega 5 [concept_elgar_musical_tradition] al país. Además, crea un número aleatorio de composiciones cada año. A #b composer#! con habilidades especiales como conductor, virtuoso, innovador o meticuloso crea una composición adicional por año. El número de composiciones es decisivo para el éxito en [Concept('concept_elgar_musical_tour','$concept_elgar_musical_tour_tours$')] posterior. A #b composer#! se compone hasta que la acción se cancele en la entrada del diario. Un compositor #b que compone le cuesta al país una pequeña tarifa de mantenimiento anual."
 concept_elgar_conducting: "Conductible"
 concept_elgar_conducting_lower_case: "conductible"
 concept_elgar_conducting_conduct: "conducta"
 concept_elgar_conducting_desc: "El [concept_elgar_composer] se centrará en la conducción #b#! durante 24 meses y organizará una temporada de conciertos. Esto mejorará la producción musical de un [concept_elgar_opera] o 5 a 10 años aleatorio, le dará a su nación un pequeño impulso a [concept_elgar_musical_tradition] y le dará a su compositor #b un impulso medio a su [concept_artists_experience]. Si su compositor #b #b aún no es un conductor, puede obtener el #b0 al final de la temporada. Tendrá que pagar el compositor #b#! mientras él es #b conducting#!."
 concept_elgar_musical_tour: "Tour de conciertos"
 concept_elgar_musical_tours: "Tours de conciertos"
 concept_elgar_musical_tour_tour: "Recorrido"
 concept_elgar_musical_tour_tours: "Tours"
 concept_elgar_musical_tour_desc: "El [concept_elgar_composer] puede ir a una gira de conciertos #b#! en el extranjero durante 30 meses. #b Tours de conciertos#! Aumente el [concept_prestige] de la nación #b compositor #!. Además, el #b composer#! gana un impulso de #b0 al final de la #b tour#! que depende del número de composiciones de #b composer#! así como sus rasgos. Reserved#! rasgo no puede salir en #b tours#!."
 concept_elgar_musical_masterwork: "Obra maestra musical"
 concept_elgar_musical_masterworks: "Obras maestras musicales"
 concept_elgar_musical_masterwork_masterwork: "Obra maestra"
 concept_elgar_musical_masterwork_masterworks: "Obras maestras"
 concept_elgar_musical_masterwork_of_music: "Obra maestra de la música"
 concept_elgar_musical_masterworks_of_music: "Obras maestras de música"
 concept_elgar_musical_masterwork_desc: "El [concept_elgar_composer] puede comenzar a componer un #b maestro#! que llevará varios años. Cuanto más [concept_artists_experience] a #b composer#! tenga, más rápido terminará. Una vez que se compone el #b maestro #!, el #b composer#! ganará 50 [concept_artists_experience] y el país ganará hasta 150 #b1 dependiendo de su #b2. \ Na #b composer#! puede crear un máximo de 3 #b trabajadores maestros#! necesitará apoyo financiero de su país mientras trabaja en él."
 concept_elgar_composer_exhaustion: "Agotamiento del compositor"
 concept_elgar_composer_exhaustion_exhausted: "exhausto"
 concept_elgar_composer_exhaustion_desc: "Una vez que un [concept_elgar_composer] terminado [Concept('concept_elgar_composing','$concept_elgar_composing_lower_case$')], [Concept('concept_elgar_conducting','$concept_elgar_conducting_lower_case$')], componiendo [Concept('concept_elgar_musical_masterwork','$concept_elgar_musical_masterwork_masterworks$')] o un [Concept('concept_elgar_musical_tour','$concept_elgar_musical_tours$')], será #b agotado#! del trabajo. Un compositor #b agotado#! no podrá trabajar por algún tiempo. Cuanto mayor sea el compositor #b#!, más tiempo lleva eliminar el agotamiento #b#!."
 concept_manzoni_writer: "#PURPLE #b escritor#!#!"
 concept_manzoni_writers: "#PURPLE #b escritores#!#!"
 concept_klimt_painter: "#PURPLE #b pintor#!#!"
 concept_pm_artists_academy_conservatory: "#b #PURPLE Conservatorio#!#!"
 concept_pm_artists_academy_conservatory_desc: "Un conservatorio especializará la Academia de Artes para la Música. Si tiene un conservatorio, podrá promover [Concept('concept_elgar_composer','$concept_elgar_composers$')]. Obtendrá un modificador de rendimiento negativo #n#! para la academia de arte, así como un efecto negativo #n#! en su [concept_artistic_progress] cuando cambia este método de producción."
 concept_pm_artists_academy_salon: "#b #PURPLE salón literario#!#!"
 concept_pm_artists_academy_salon_desc: "Un salón literario especializará la Academia de Artes para la Literatura. Si tiene un salón de literatura, podrá promover [Concept('concept_manzoni_writer','$concept_manzoni_writers$')]. Obtendrá un modificador de rendimiento negativo #n#! para la academia de arte, así como un efecto negativo #n#! en su [concept_artistic_progress] cuando cambia este método de producción."
 concept_pm_artists_academy_studio: "#b #PURPLE Estudio de Arte#!#!"
 concept_pm_artists_academy_studio_desc: "Un estudio de arte especializa la Academia de Artes para la Pintura. Si tiene un estudio de arte, podrá promover [Concept('concept_klimt_painter','$concept_klimt_painters$')]. Obtendrá un modificador de rendimiento negativo #n#! para la academia de arte, así como un efecto negativo #n#! en su [concept_artistic_progress] cuando cambia este método de producción."
 concept_pm_artists_academy_specialization: "Enfoque de la Academia de Artes"
 concept_pm_artists_academy_specialization_desc: "Cada academia de artes puede especializarse cambiando su método de producción. \ Nan Arts Academy con un [concept_pm_artists_academy_conservatory] le permitirá promover [Concept('concept_elgar_composer','$concept_elgar_composers$')]. \ Nan Arts Academy con un [concept_pm_artists_academy_salon] le permitirá promover [Concept('concept_manzoni_writer','$concept_manzoni_writers$')]. \ Nan Arts Academy con un [concept_pm_artists_academy_studio] le permitirá promover [Concept('concept_klimt_painter','$concept_klimt_painters$')]. \ Nchanging la especialización tendrá un #n de efecto negativo"
 concept_artists_artist: "Artista"
 concept_artists_artists: "Artistas"
 concept_artistic_progress: "Progreso artístico"
 concept_artistic_progress_desc: "Al acumular 1000 #b progreso artístico#! puede obtener un nuevo [concept_artists_artist]. Para tener acceso a #b progreso artístico#!, debe tener una academia de artes #b#! o un #b ópera#!. \ Nyour #b El progreso artístico#! la ganancia está influenciada por varios factores. Cuanto más #!1 tenga, más rápido obtendrá #b progreso artístico#!, por ejemplo. Puede obtener información detallada sobre todos los factores que influyen en el progreso artístico desde la barra de herramientas de la barra de progreso artístico en la ventana Arts."
 concept_artists_experience: "Reputación"
 concept_artists_experience_desc: "Cada [concept_artists_artist] tiene una reputación #b#!. La reputación representa lo bien considerado que es el artista. Los artistas comienzan con una pequeña cantidad de reputación y pueden ganar reputación adicional trabajando en su campo. Los artistas que obtuvieron una reputación de 500, se convertirán en un #Great artistas#! y obtendrán el [concept_character_trait] correspondiente."
 concept_manzoni_great_writer: "Gran escritor"
 concept_manzoni_local_writer: "Escritor local"
 concept_artists_center_of_arts: "Centro de artes"
 concept_artists_centers_of_arts: "Centros de Artes"
 concept_artists_center_of_classicism: "Centro del clasicismo"
 concept_artists_center_of_romanticism: "Centro del romanticismo"
 concept_artists_center_of_realism: "Centro del realismo"
 concept_artists_center_of_impressionism: "Centro de impresionismo"
 concept_artists_center_of_expressionism: "Centro del expresionismo"
 concept_artists_center_of_art_nouveau: "Centro de Art Nouveau"
 concept_klimt_great_painter: "#PURPLE #b Gran pintor#!#!"
 concept_klimt_great_painters: "#PURPLE #b Grandes pintores#!#!"
 concept_klimt_great_painter_desc: "#b Grandes pintores#! son [Concept('concept_klimt_painter','$concept_klimt_painters$')] que serán conocidos por la eternidad. #b pintores#! que llegan a 500 [concept_artists_experience], se convertirán en #b grandes pintores#!. Esto aumentará enormemente su eficiencia y dejará que su nación gane mucho más [concept_klimt_painting_tradition]."
 concept_klimt_independent_painter: "Pintor independiente"
 concept_klimt_independent_painters: "Pintores independientes"
 concept_klimt_painter_trip: "Viaje educativo del pintor"
 concept_klimt_painter_trip_journeys: "Viajes"
 concept_elgar_music_desc: "#b Music Culture#! es una de las principales características de [concept_morgenroete]. Durante los siglos XIX y XX, la música era importante como un medio para entretener a la población y mostrar una grandeza de las naciones. El #b ópera#! producirá música pero necesita instrumentos para operar. Además de producir la música #b #! para que su población consuma, #b óperas#! agregará lentamente #!2 a su país. \ N \ n#b tradición musical#! refleja los logros y tradiciones musicales de una nación. La cantidad de tradición musical #b#! le da una bonificación de prestigio y le permite elegir un camino para que el arte de su nación avance. Puede seguir la ruta de #!7, #!8 o #!9. Cada uno de estos estilos artísticos tiene otro enfoque. Un compositor podrá [concept_morgenroete]3, [concept_morgenroete]4, ir a [concept_morgenroete]5 e incluso crear [concept_morgenroete]6. Estas acciones mejorarán el compositor #b #! [concept_morgenroete]9 o mejorará a sus naciones #b tradición musical#!."
 concept_artists_center_of_arts_desc: "Un centro #b de artes#! es un centro de un [concept_artists_art_style] que se crea en un [concept_state_region] una vez que se inventa un estilo #b art syle#!. Solo hay un centro #b de artes#! por #b Art Style#!. \ N#b Center of Arts#! son especialmente importantes para #!1 que pueden tomar #!2 para estudiar el #b Art Style#! allí. Aparte de eso, algunos #b Center of Arts#! ofrecen eventos únicos que sucederán allí. Algunos, por ejemplo, le permiten ganar #!7."
 concept_klimt_painting_culture: "Cultivo de pintura"
 concept_klimt_painting_culture_desc: "#b Cultura de pintura#! es una de las principales características de [concept_morgenroete]. Durante los siglos XIX y XX, la pintura se desarrolló rápidamente, lo que resultó en varios [Concept('concept_artists_art_style','$concept_artists_art_styles$')] nuevos que trajeron mucho progreso a individuos y países. #b Arts Academies#! le permite comenzar a ganar #!0 y reclutar nuevos #!1 \ n \ n#b pintores#! createpaint pinturas y #b obras maestras#! para su país y le dará una gran cantidad de tradición de pintura #b #b #!. Como hay diferentes [Concept('concept_artists_art_style','$concept_artists_art_styles$')] para #b pintores#! para centrarse, puede dejar que estudien estilos de arte #b adicionales#! en un [concept_morgenroete]3. Una vez que cumplan 40 años, #b pintores#! se especializará en uno de sus estilos artísticos #b#! y se centrará en crear pinturas en ese estilo #b Art Style#!."
 concept_artists_art_style: "Estilo de arte"
 concept_artists_art_styles: "Estilos de arte"
 concept_artists_art_style_style: "Estilo"
 concept_artists_art_style_desc: "Un #b Art Style#! es un foco específico del arte. Algunos estilos de arte #b#! están allí desde el principio como #b classicism#! y #b romanticism#!. Los otros, #b realism#!, #b irracionalismo#!, #!2, #!3 y #!4, solo aparecen más tarde después de que se cumplen ciertas condiciones. Cada #b Art Style#! tiene un #!7 correspondiente en el #!8 donde comenzó."
 concept_klimt_painter_desc: "#PURPLE #b pintores#!#! son hombres y mujeres que crean pinturas y otras piezas de arte. #b Painters#! are special character types that you can gain either from events, from gaining enough [concept_artistic_progress] to create one in your nation or by offering a position to a [concept_klimt_independent_painter].\n#b Painters#! will immediately start to paint and create a number of paintings each year depending on their [Concept('concept_character_trait','$concept_character_traits$')]. A veces incluso pueden crear un #b maestría#! que le dará aún más #b2. \ N#b pinters#! puede estudiar diferentes #b5 en #b6. Each #b Painter#! will specialize in an #b Art Style#! once they are 40 years old which will allow them to paint #b Masterworks#! of a certain Style."
 concept_klimt_independent_painter_desc: "[Concept('concept_klimt_painter','$concept_klimt_painters$')] que no son contratados por un país son #b pintores independientes#!. #b pintores independientes#! pueden ser contratados por países que tienen un [Concept('concept_primary_cultures','$concept_primary_culture$')] que comparte un [concept_cultural_trait] con la cultura del #b pintor#!. \ n#b pintores independientes#! tiene varios requisitos para su país anfitrión. Necesitará #b academias de artes#!, ciertas #b2 o #b3 dependiendo del #b pintor's#! #b6. Además, tendrá que pagarles una suma de dinero que depende de su #b renombre #!, así como de las capacidades financieras de su país."
 concept_klimt_painter_trip_desc: "Un [concept_klimt_painter] puede aprender nuevo [Concept('concept_artists_art_style','$concept_artists_art_styles$')] en un viaje educativo #b#! a uno de los [Concept('concept_artists_center_of_arts','$concept_artists_centers_of_arts$')]. \ Non tal #b Trip#! Un pintor puede ganar positivo y negativo [Concept('concept_character_trait','$concept_character_traits$')] que influirá en su trabajo y el número de pinturas que crean. Cada #b Centro de artes#! tiene eventos ligeramente diferentes y le dará al pintor #b#! un rasgo #b único#! al final que luego puede convertirse en la especialización #b pintor §3."
 concept_klimt_art_prize: "Premio de arte"
 concept_klimt_art_prizes: "Premios de arte"
 concept_klimt_art_prize_desc: "De vez en cuando, se realizan concursos artísticos en los que se otorgan premios, que promueven la reputación de un artista. Las naciones que tienen un [concept_artists_center_of_arts] para el irracionalismo o [concept_elgar_impressionism] eligen a los mejores músicos en una competencia que tiene lugar cada cinco años. Los propietarios de un centro de arte [concept_klimt_art_gallery] o un #b de Realism#! vienen a organizar una competencia de pintura que tiene lugar cada cinco años. El país del que vienen los ganadores también reciben música o tradición de pintura. Una forma especial de competencia de arte es la Bienal, que cada dos años otorga un premio de arte integral al país que tiene a los artistas con la más alta reputación, que aumenta todos los valores de la tradición cultural."
 concept_klimt_art_gallery: "Galería de arte"
 concept_klimt_art_gallery_desc: "La #b Art Gallery#! es un edificio especial en la capital de una nación que está disponible a partir de #b realism#!. Solo se puede construir si la nación tiene un [concept_klimt_painter] con especialización. #b pintores#! con una especialización desbloquea la colección de su [Concept('concept_artists_art_style','$concept_artists_art_style_style$')], es decir, un artista con una especialización en el estilo romántico desbloquea una colección de romanticismo. Para actualizar una colección a una excelente colección, se requiere una obra maestra de este tipo, que debe ser pintada por un pintor o adquirido en el extranjero."
 concept_manzoni_writer_novelist: "Novelista"
 concept_manzoni_writer_desc: "Un #b escritor#! es un personaje especial que escribirá obras de literatura para su país. #b Los escritores#! generalmente comienzan como [concept_manzoni_local_writer] y escribirán #b publicaciones#! y, a veces, incluso [Concept('concept_manzoni_bestseller','$concept_manzoni_bestsellers$')]. A #b bestseller#! otorgará al #b escritor#! una gran cantidad de #!2 y #!3 a su país. Existe la oportunidad de escribir un #b bestseller#! cada año, dependiendo de cuán cerca esté el #b escritor #! #!8 para el #!9. \ N \ na bien conocido #b escritor#! cuyo #b2 es lo suficientemente feliz, puede convertirse en su #b3. Un escritor nacional #b#! puede ganar #b6 o crear una novela de periódico. Si un #b escritor#! gana 500 #b reputación#!, pueden convertirse en un #!1 y proporcionar a su país aún más #b tradición literaria#!. \ N \ nbe cuidadosa, si #b escritores#! no está contento con la situación política en un país, pueden decidir convertirse en #!6 o interferir en el discurso político."
 concept_manzoni_great_writer_desc: "Un #b gran escritor#! es un [concept_manzoni_writer] conocido en todo el mundo. Un #b escritor#! puede convertirse en un #b gran escritor#! una vez que su [concept_artists_experience] llegue #V 500#!. Si su #b gran escritor#! es su #!2 obtendrá una bonificación a su ganancia anual #!3."
 concept_manzoni_local_writer_desc: "Casi cada [concept_manzoni_writer] comienza como un escritor local #b #b Local escritor#!. Cada país puede tener un máximo de 3 #b escritores locales#! que creará #b publicaciones#!, le otorgue [concept_manzoni_literary_tradition] si su [concept_manzoni_genre] coincide con el [concept_manzoni_popular_taste] y ganará #b0. \ Na #b escritor local#! con una reputación #b países #b6 que le otorgarán más #b tradición literaria#! y otras ventajas adicionales."
 concept_manzoni_national_writer: "Escritor nacional"
 concept_manzoni_national_writer_desc: "Un escritor nacional #b#! es un tipo de [concept_manzoni_writer] que se considera la cara de la literatura de su país. #b escritores nacionales#! le otorgan un mínimo de 1 y hasta 5 [concept_manzoni_literary_tradition]. \ Nyou puede obtener un #b escritor nacional#! designando a uno de sus [Concept('concept_manzoni_local_writer','$concept_manzoni_local_writers$')]. Para poder nombrar uno de sus escritores locales #b#! deben tener al menos #!1 150#! #!3 y su #!4 debe tener un #!5 positivo \ n"
 concept_manzoni_bestseller: "Mejor vendido"
 concept_manzoni_bestsellers: "Bestseller"
 concept_manzoni_bestseller_desc: "Un #b bestseller#! es una publicación #b#! por un [concept_manzoni_writer] que se vende muy bien, generalmente porque el #b escritor #! [concept_manzoni_genre] coincide o está cerca del actual [concept_manzoni_popular_taste]. \ Nevere año existe una posibilidad de un [concept_manzoni_national_writer] o #!0 para escribir un #b bestseller#!. El primer #b bestseller#! otorgará una gran cantidad de #!5 y cada #b bestseller#! después del primero otorgará al país una cantidad significativa de tradición literaria #b#!."
 concept_manzoni_genre: "Género"
 concept_manzoni_genres: "Géneros"
 concept_manzoni_genre_desc: "Cada [Concept('concept_manzoni_writer','$concept_manzoni_writer_novelist$')] tiene un género #b específico#! para su escritura. El #b género#! se asigna cuando el #b escritor#! se crea y depende de muchos factores."
 concept_manzoni_popular_taste: "Gusto popular"
 concept_manzoni_popular_taste_audience: "Gusto de la audiencia"
 concept_manzoni_popular_tastes_audience: "Sabores de audiencia"
 concept_manzoni_popular_taste_desc: "La población de cada nación tiene un sabor #b#! para un [concept_manzoni_genre] específico. Aproximadamente cada 10 años, este #b taste#! cambiará dependiendo de los cambios políticos, sociales y culturales en el país en sí. #!8, #!9 \ n- #b [concept_manzoni_genre]1#!: #!7, [concept_manzoni_genre]4, [concept_manzoni_genre]5 \ n- #b [concept_manzoni_genre]7#!: #!8, [concept_manzoni_genre]5, [concept_manzoni_genre]4 \ n- #b #b3#!: [concept_manzoni_genre]4, §36, [concept_manzoni_genre]4 \ n- #b #b9#!: #!1, #!7, [concept_manzoni_genre]5 \ n- #b #!5#!: #b6, #!8, #!9 \ n- #b [Concept('concept_manzoni_writer','$concept_manzoni_writers$')]1#!: [concept_manzoni_genre]4, #!1, #!9 \ n- #b [Concept('concept_manzoni_writer','$concept_manzoni_writers$')]7§§§#!: [concept_manzoni_genre]4, #!1, #!9 \ n- #b [Concept('concept_manzoni_writer','$concept_manzoni_writers$')]7§ = #!8, #!9"
 concept_manzoni_book_licence: "Licencia de libros"
 concept_manzoni_book_licences: "Licencias de libros"
 concept_manzoni_book_licence_desc: "Los editores extranjeros pueden obtener contratos con un [concept_manzoni_national_writer] y ofrecer sus libros como traducciones en su propio mercado. Esto sucede cuando un escritor se encuentra con el [Concept('concept_manzoni_popular_taste','$concept_manzoni_popular_tastes_audience$')] en el extranjero. Si un autor recibe al menos cinco licencias de libros, sus libros se consideran literatura mundial. Luego puede ir a una gira de lectura."
 concept_manzoni_local_writers: "Escritores locales"
 concept_manzoni_library: "Biblioteca nacional"
 concept_manzoni_library_desc: "Su #b National Library#! configurará automáticamente las colecciones de libros (en forma de un [concept_production_method]) si tiene suficiente [concept_manzoni_publications]. La primera colección de libros se creará para 1.000 o más publicaciones. A partir de ahí, son posibles mejores colecciones con 2.500 (colección de libros Tiny), 5.000 (colección de libros pequeños), 10.000 (colección de libros medianos), 25.000 (colección de libros grandes), 50.000 (excelente colección de libros) y 100.000 (gran colección de libros)."
 concept_manzoni_publications: "Publicaciones"
 concept_manzoni_publications_desc: "#b publicaciones#! incluyen todos los títulos de libros recién publicados, periódicos, ensayos y otros productos escritos similares en una nación. ¡No son consistentes con @manzoni_prints! $manzoni_prints$ circulando como productos básicos. Las publicaciones también pueden aparecer independientemente de la industria editorial, por ejemplo, a través de las prensas de impresión internas de edificios o universidades gubernamentales. Los académicos y los particulares también producen publicaciones dependiendo de su nivel de alfabetización. Sin embargo, la industria editorial representa la participación del león, y el factor decisivo es si se usa o no un método de producción moderno. Una gran cantidad de publicaciones es fundamental para la expansión de un [concept_manzoni_library]."
 concept_curtiss_tourism: "Turismo"
 concept_curtiss_tourism_desc: "El turismo proporciona una nación culturalmente superior con ingresos adicionales. Monumentos únicos, museos y galerías de arte, sitios arqueológicos, centros de arte, así como altos valores en las diversas tradiciones culturales, son factores que hacen de una nación un atractivo destino turístico. Las leyes que aumentan la libertad de movimiento y la actividad económica también contribuyen a un mayor ingreso turístico. La infraestructura también juega un papel crucial; después de todo, no se pueden alcanzar lugares remotos. Un aeropuerto en particular revoluciona el turismo y proporciona un aumento significativo en los ingresos."
 concept_curtiss_private_airline: "Aerolínea privada"
 concept_mendelejew_chemist: "#b #ORANGE Químico#!#!"
 concept_manzoni_literature: "Cultura literaria"
 concept_manzoni_literature_desc: "#b Cultura literaria#!is Una de las principales características de [concept_morgenroete]. La cultura impresa y la cultura de los periódicos en particular experimentaron trastornos significativos en los siglos XIX y XX. La masa de productos impresos y el uso diario está representada por la industria de la impresión. El valor cultural de la literatura producida se refleja en el [concept_manzoni_literary_tradition]. Este último depende en gran medida del [Concept('concept_manzoni_writer','$concept_manzoni_writers$')] de un país, y hay [Concept('concept_manzoni_local_writer','$concept_manzoni_national_writers$')] y [Concept('concept_manzoni_national_writer','$concept_manzoni_local_writers$')]. Si viven en las sombras o se convierten en autores célebres depende del [concept_manzoni_popular_taste]."
 concept_morgenroete_desc: "#r Morgenröte - Dawn of Flavor #! is a mod created to broaden the cultural and scientific aspects of Victoria 3. It features content for various aspects of the Victorian Age:\n\n#V Lepsius: #! [concept_lepsius_archaeology]\n#V Verrier:#! [concept_verrier_astronomy]\n#V Gaudi:#! [concept_elgar_architecture] & [concept_tesla_engineering]\n#V Dubois:#! [concept_dubois_natural_history]\n#V Mendelejew:#! [concept_mendelejew_chemistry]\n#V Elgar:#! [concept_elgar_music]\n#V Manzoni:#! [concept_manzoni_literature]\n#V Klimt:#! [concept_klimt_painting_culture]\n#V Curtiss:#! [concept_curtiss_aviation]\n#V Vikelas:#! [concept_vikelas_sports]"
 concept_agassiz_mineral: "Mineral"
 concept_agassiz_minerals: "Minerales"
 concept_agassiz_mineral_desc: "Los minerales son todo tipo de tipos especiales de rocas que no caen bajo los recursos conocidos utilizados en la industria. Una nación recibe un cierto número de minerales anualmente una vez que ha inventado la tecnología #b geology#!. Si un [Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')] está al servicio de esta nación, puede encontrar minerales adicionales. Las ubicaciones de los minerales se caracterizan por modificadores estatales: montañas, desiertos, áreas árticas, depósitos de materia prima (áreas de carbón, hierro y azufre, por ejemplo), así como geológicos [Concept('concept_dubois_formation','$concept_dubois_formations$')] y volcanes. Los desiertos y las áreas del Ártico se consideran pobres en los minerales, mientras que las grandes formaciones geológicas y volcanes se consideran particularmente ricos en minerales. Una forma más valiosa de minerales son [Concept('concept_agassiz_rare_mineral','$concept_agassiz_rare_minerals$')]."
 concept_agassiz_rare_mineral: "Mineral raro"
 concept_agassiz_rare_minerals: "Minerales raros"
 concept_agassiz_rare_mineral_desc: "[Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')] puede encontrar minerales raros en sus expediciones, como [Concept('concept_dubois_pacific_expedition','$concept_dubois_pacific_expeditions$')], [concept_douglas_mountaineering] expediciones, expediciones [concept_agassiz_volcano] o durante la prospección mineral. A diferencia de [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')] común, solo se encuentran en cantidades muy limitadas. Se utilizan minerales raros para construir un gabinete mineral."
 concept_agassiz_geologist: "#b #GREEN geólogo#!#!"
 concept_agassiz_geologists: "#b #GREEN geólogos#!#!"
 concept_agassiz_geologist_desc: "#b #GREEN Geologists#!#! are [Concept('concept_academics_academic','$concept_academics_academics$')] who primarily study rocks and earth history. They locate [Concept('concept_lepsius_cave','$concept_lepsius_caves$')], [Concept('concept_dubois_formation','$concept_dubois_formations$')] and [Concept('concept_curie_uranium','$concept_curie_uranium$')] deposits, which makes them irreplaceable colleagues for [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')], [Concept('concept_lepsius_anthropologist','$concept_lepsius_anthropologists$')] and [Concept('concept_curie_physicist','$concept_curie_physicists$')]. During their expeditions, they may find additional [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')] that a [concept_mendelejew_chemist] can use to discover or isolate [Concept('concept_mendelejew_element','$concept_mendelejew_elements$')]. They can find new deposits of raw materials. They are also active as volcanologists and can go on expeditions to local [Concept('concept_agassiz_volcano','$concept_agassiz_volcanoes$')] to research them in more detail. Together with [Concept('concept_tesla_engineer','$concept_tesla_engineers$')], they can develop new devices, such as seismographs, to learn more about the Earth's interior. Geologists can take part in [Concept('concept_dubois_pacific_expedition','$concept_dubois_pacific_expeditions$')] and [concept_douglas_mountaineering] expeditions."
 concept_agassiz_volcano: "Volcán"
 concept_agassiz_volcanoes: "Volcanes"
 concept_curie_physicist: "#b #ORANGE físico#!#!"
 concept_curie_physicists: "#b #ORANGE físicos#!#!"
 concept_curie_physicist_desc: "#n próximamente a Morgenröte! #!"
 concept_curie_uranium: "Uranio"
 concept_curie_uranium_desc: "El uranio es un material extremadamente raro que solo se puede encontrar en algunas provincias históricas seleccionadas por [Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')]. La física moderna debe haber sido investigada para esto. A primera vista, el uranio es un mineral secundario que solo se usa en la producción de cerámica. Sin embargo, será necesario más adelante, especialmente en el [concept_verrier_observatory]. Solo si los mejores métodos de producción física y química se suministran uranio, pueden cumplir con su propósito, ya sea en el campo de la física nuclear o en la investigación de elementos previamente desconocidos. Sin uranio, todas las actividades científicas en el campo de la radiactividad son simplemente imposibles. Por lo tanto, es particularmente interesante para [Concept('concept_mendelejew_chemist','$concept_mendelejew_chemists$')] y [Concept('concept_curie_physicist','$concept_curie_physicists$')] en la fase final de Victoria 3."
 concept_mendelejew_chemistry: "Química"
 concept_mendelejew_chemistry_desc: "#b Chemistry#! is one of the main features of [concept_morgenroete]. Starting in the 18th Century, #b Chemistry#! rapidly developed into a modern science. Suddenly many new elements were discovered and chemical processes were invented. The 19th and 20th century saw even more discoveries in Chemistry, ranging from new elements to the invention of dynamite or the Haber-Bosch-Process.\n\nIn #b Morgenröte#! #b Chemistry#! will be conducted by [Concept('concept_mendelejew_chemist','$concept_mendelejew_chemists$')] who will be able to focus on different tasks.\nOne focus is the improvement of your countries #b $building_chemical_plant$#!, #b $building_explosives_factory$#! or #b $building_synthetics_plant$#!, which will make those [Concept('concept_building', '$concept_buildings$')] more efficient.\nIf you are looking for a more prestigous task, you can let your #b Chemist#! theorize, discover or isolate [Concept('concept_mendelejew_element','$concept_mendelejew_elements$')]. Each Element will add a little bit of [concept_prestige] depending on whether you theoriized, discovered or isolated it.\nLater in the game the #b Chemist#! will also be able to invent #b Synthetic Oil#! and #b Synthetic Rubber#!. This will unlock the #b $building_mendelejew_hydrogenation_plants$#! or the #b $building_mendelejew_synthetic_rubber_factory$#!."
 concept_mendelejew_chemists: "#b #ORANGE Químicos#!#!"
 concept_mendelejew_chemist_desc: "#b #ORANGE Chemists#!#! son [Concept('concept_academics_academic','$concept_academics_academics$')] que teorizarán, descubrirán y aislarán [Concept('concept_mendelejew_element','$concept_mendelejew_elements$')]. \ N#b #ORANGE químicos#!#! ganan [concept_academics_experience] cuando investigan #b elementos#ORANGE0 o asisten a conferencias. También pueden mejorar los fertilizantes, los explosivos y los sintéticos. Los químicos pueden inventar la tabla periódica o el combustible sintético, haciéndolos valiosos para países sin acceso al petróleo. Obtienen experiencia #b#ORANGE0 pasivamente cada año. Esto permite que #b #ORANGE químicos#!#! obtenga mejores rasgos químicos. También pueden obtener una especialización (teórica, analista, inspector) cuando se crean o por evento."
 concept_mendelejew_element: "Elemento químico"
 concept_mendelejew_element_no_chemical: "Elemento"
 concept_mendelejew_elements: "Elementos químicos"
 concept_mendelejew_element_desc: "En la antigüedad, era común creer que el mundo consistía en los cuatro elementos: fuego, tierra, agua y aire. Con el comienzo de la emancipación de la química de la alquimia, se produjo el análisis científico de los elementos químicos. Este proceso estuvo lejos de completo en el siglo XIX. \ N \ n[Concept('concept_mendelejew_chemist','$concept_mendelejew_chemists$')] puede continuar esta investigación teorizando, descubriendo y aislando elementos uno a la vez. Solo cuando aislado es un elemento considerado completamente reconocido y dado su nombre; Anteriormente es solo un número. La categorización de elementos trae progreso científico y químico [concept_academics_experience]. \ No todos los elementos pueden teorizar, descubrir y aislarse desde el principio. Muchos elementos solo se pueden investigar adecuadamente con espectrografía; Hacia el final del juego, puede ser necesario un ciclotrón. [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')] son necesarios para el descubrimiento y el aislamiento de elementos químicos. Además de los métodos de producción, la experiencia y los rasgos de carácter de los químicos juegan un papel decisivo en cuánto tiempo lleva la investigación."
 concept_verrier_meteorite: "Meteorito"
 concept_verrier_meteorites: "Meteoritos"
 concept_manzoni_national_writers: "Escritores nacionales"
 concept_verrier_astronomy_desc: "#b astronomy#! es una de las principales características de [concept_morgenroete]. \ N \ nto obtener acceso a #b astronomy#! necesita un [concept_verrier_observatory] o un [concept_verrier_astronomer]. \ N \ nonce tiene un observatorio, usted descubrirá pasivamente [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]. \ N \ n si tiene un [concept_verrier_astronomer] incluso podrá encontrar planes nuevos, [Concept('concept_verrier_satellite','$concept_verrier_satellites$')], §10. #!1. \ Nsometimes Su #!2 también podría encontrar #!3 que puede ser examinado por #b astrónomos#! y #!6. \ N \ nevery astronomical Discovery le otorgará #!7 que se le agregará #!8. Verifique el #!9 [concept_morgenroete]0 para ver su #b astronómico prestigio#!"
 concept_verrier_observatory_desc: "Un observatorio #b#! es la columna vertebral de un país [concept_verrier_astronomy] y [concept_mendelejew_chemistry]. A partir de ahí, [Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')] puede descubrir planetas, [Concept('concept_verrier_satellite','$concept_verrier_satellites$')], [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')], [Concept('concept_verrier_comet','$concept_verrier_comets$')] y tomar [Concept('concept_verrier_moon_photo','$concept_verrier_moon_photos$')]. \ Nto construir un observatorio #b#!, debe tener una universidad y el #!1 o #!2 #!3 investigado. Además, un observatorio #b#! solo se puede construir una vez y solo en su capital."
 concept_verrier_astronomer_desc: "#b Astronomers#! son académicos que explorarán el cielo y descubrirán [Concept('concept_verrier_satellite','$concept_verrier_satellites$')], [Concept('concept_verrier_comet','$concept_verrier_comets$')] y [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]. \ N#b astrónomos#! ganan [concept_academics_experience] cuando descubren #b objetos astronómicos#! o asistir a conferencias. Obtienen #b experiencia#! pasivamente también cada año. Esto permite que #b astrónomos#! obtenga mejores rasgos de astrónomo. \ N \ nan #b astronomer#! puede centrarse en descubrir nuevos satélites #b#! o #b tomando fotos lunar#!. Sin embargo, esto reducirá la cantidad de objetos astronómicos #b #b#!"
 concept_verrier_astronomical_prestige: "Prestigio astronómico"
 concept_verrier_astronomical_prestige_desc: "#b prestigio astronómico#! es la cantidad de [concept_prestige] que gane de la astronomía. Varios factores influyen en su prestigio astronómico #b#!: \ n- Encontrar un nuevo planeta le otorgará entre #V 15#! y #V 100#! prestigio dependiendo de la dificultad para encontrarlo. Prestigio. \ N- Cada #!3 le otorgará #V 1#! prestigio. \ N- Cada #V 100#! #!8 le otorgará #V 1#! prestigio."
 concept_verrier_astronomical_object_desc: "#b objetos astronómicos#! son asteroides y estrellas que descubriste. Esos objetos se pueden descubrir si tiene un [concept_verrier_observatory]. Cuanto mejor sea su tecnología de astronomía, más objetos encontrará. También descubrirá más objetos #b#! si tiene un [concept_verrier_astronomer]. \ Nwith suficiente #b objetos astronómicos#! podrá descubrir nuevos planetas o la tecnología de física astro."
 concept_verrier_moon_map: "Mapa de luna"
 concept_verrier_moon_photo_desc: "Si tiene un [concept_verrier_observatory] e investiga la tecnología de la cámara, podrá ordenar que su [concept_verrier_astronomer] comience a fotografiar la luna. Esto reducirá la cantidad de [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] de su #b astronomer#!, pero le dará #b luna de luna#! cada año. \ Ni si recoge suficientes #b lunar fotos#!, creará un mapa preciso del compañero de la Tierra. Completar el mapa de la luna le otorgará a su nación algo [concept_verrier_astronomical_prestige]"
 concept_verrier_satellite: "Satélite"
 concept_verrier_satellites: "Satélites"
 concept_verrier_satellite_desc: "#b satélites#! o lunas son [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] que están orbitando un planeta. Algunos satélites #b#! como la luna de la Tierra ya están descubiertos, pero un [concept_verrier_astronomer] puede tratar de encontrar más de ellos."
 concept_verrier_meteorite_desc: "Los meteoritos son cuerpos sólidos relativamente pequeños de origen cósmico que han pasado por la atmósfera de la Tierra y han llegado al suelo. En casos raros, los fragmentos de meteoritos se pueden encontrar después de una lluvia de meteoritos. [Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')] también puede encontrar meteoritos que golpean la tierra hace miles de años en un terreno difícil, como desiertos y áreas árticas. [Concept('concept_mendelejew_chemist','$concept_mendelejew_chemists$')] y [Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')] en particular están interesados ​​en meteoritos y pueden querer analizarlos."
 concept_agassiz_volcano_desc: "#b volcanes#! son un nuevo rasgo de estado en #r MorGenröte#!. A diferencia del juego base para Victoria 3, no son regiones estratégicas, sino más bien estados con volcanes que están vinculados a si tiene lugar una erupción volcánica. La actividad volcánica es significativamente mayor, pero no siempre es destructiva. En países con volcanes, se puede construir un #b $building_agassiz_volcano_observatory$#!, lo que no solo ayuda a predecir y mitigar las erupciones a través de observaciones, sino que también es el punto de partida para una expedición de volcán. [Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')] puede adquirir nuevos [concept_agassiz_geological_knowledge], [Concept('concept_agassiz_rare_mineral','$concept_agassiz_rare_minerals$')], experiencia y el rasgo de volcanólogo en una expedición de volcán."
 concept_agassiz_geological_knowledge: "Conocimiento geológico"
 concept_agassiz_geological_knowledge_desc: "#b conocimiento geológico#! incluye la comprensión general de una nación de la naturaleza de la tierra. Es un recurso muy raro que se puede adquirir principalmente en el curso de los hitos geológicos. #b El conocimiento geológico#! no es lo mismo que el [concept_agassiz_geological_score], pero es el componente más importante de él y se considera particularmente valioso."
 concept_agassiz_geological_score: "Puntaje geológico"
 concept_agassiz_geological_score_desc: "El puntaje geológico #b#! incluye todos los logros y conocimientos de una nación relacionados con la geología. El componente más importante es [concept_agassiz_geological_knowledge], pero hay muchos otros factores importantes; como la experiencia de un [concept_agassiz_geologist], [concept_agassiz_oceanographic_knowledge], el número de [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')], [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] o [Concept('concept_dubois_specimen','$concept_dubois_specimens$')], y tecnologías geológicas. La puntuación geológica es crucial para redactar el [concept_agassiz_age_of_earth]."
 concept_agassiz_oceanographic_knowledge: "Conocimiento oceanográfico"
 concept_agassiz_oceanographic_knowledge_desc: "#b El conocimiento oceanográfico#! forma parte de [concept_agassiz_geological_knowledge] y corresponde al conocimiento sobre los mares, en particular las corrientes oceánicas, pero también la investigación marina general combinada con consideraciones geofísicas. #b El conocimiento oceanográfico#! se obtiene en gran medida en [Concept('concept_dubois_pacific_expedition','$concept_dubois_pacific_expeditions$')]. 50 #b El conocimiento oceanográfico#! es necesario para adquirir [concept_agassiz_geological_knowledge]."
 concept_agassiz_age_of_earth: "Edad de la tierra"
 concept_agassiz_age_of_earth_desc: "Una de las grandes preguntas del siglo XIX fue la cuestión de la edad #b de la Tierra#!. tenía implicaciones de historia natural, particularmente con respecto a la validez de la teoría de la evolución y la secuencia de eventos geológicos. Solo un [concept_agassiz_geologist] puede determinar una nueva edad de la Tierra. Para hacer esto, su nación debe tener un [concept_agassiz_geological_score] más alto que la nación que determinó por última vez una edad de la Tierra. Luego compartirá sus resultados de investigación con otros colegas. No necesariamente tiene que tener éxito: los geólogos que son demasiado jóvenes e inexpertos no serán escuchados. Sin embargo, las naciones extranjeras son un poco más complacientes cuando no se ha presentado una nueva teoría durante muchos años. Los geólogos solo pueden estimar la edad de la tierra una vez en sus vidas, pero esto solo se aplica si tienen éxito. Si falla, puede intentarlo nuevamente después de una fase de motivación."
 concept_agassiz_geology: "Geología"
 concept_agassiz_geology_desc: "#b Geology#! es una de las principales características de [concept_morgenroete]. Incluso antes del comienzo de la era victoriana, la geología ya había experimentado un auge significativo, por lo que está disponible para muchas naciones al comienzo del juego. \ N \ n[Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')] puede usarse de varias maneras: pueden encontrar [Concept('concept_dubois_formation','$concept_dubois_formations$')], [Concept('concept_lepsius_cave','$concept_lepsius_caves$')] y [concept_curie_uranium] depósitos durante una búsqueda geológica, continúe [concept_agassiz_volcano] expediciones, determinar [concept_agassiz_age_of_earth], encontrar nuevos orific y petróleo depositados o Expediciones útiles como compañeros científicos. A #!1 evalúa el conocimiento general de una nación y es crucial para determinar la edad de la tierra. #!2 y #!3 son una parte esencial de la geología; Este último puede usarse para establecer un gabinete mineral en el #!4. Una instalación geológica especial es la #b #!6#!, que lleva a cabo estudios volcanológicos y sísmicos."
 concept_theiler_biologist: "#b #GREEN biólogo#!#!"
 concept_theiler_biologists: "#b #GREEN biólogos#!#!"
 concept_theiler_biologist_desc: "A Biologist is an [concept_academics_academic] who researches all aspects of life.\nIn [concept_morgenroete] the Biologist is mostly responsible for researching [Concept('concept_theiler_microorganism','$concept_theiler_microorganisms$')], improving your Agriculture and finding [Concept('concept_theiler_pathogen','$concept_theiler_pathogens$')] and [Concept('concept_theiler_vaccine','$concept_theiler_vaccines$')].\nBiologists gain [concept_academics_experience] passively or by finishing projects."
 concept_gaudi_architect: "#b #PURPLE arquitecto#!#!"
 concept_gaudi_architects: "#b #PURPLE arquitectos#!#!"
 concept_academics_university_specialization_desc: "Each University can be specialized by changing its production method.\nA university with a [concept_pm_academics_university_humanities] will allow you to focus your nations research on society innovation and allows to specifically recruit [Concept('concept_lepsius_archaeologist','$concept_lepsius_archaeologists$')] and [Concept('concept_lepsius_anthropologist','$concept_lepsius_anthropologists$')].\nA university with a [concept_pm_academics_university_natural_history] will allow you to focus your nations research on society innovation and allows to specifically recruit [Concept('concept_dubois_naturalist','$concept_dubois_naturalists$')] and [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')].\nA university with a [concept_pm_academics_university_mathematics] will allow you to focus your nations research on production and military innovation and allows to specifically recruit [Concept('concept_tesla_engineer','$concept_tesla_engineers$')] or [Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')].\nChanging the Specialization will have a #n short negative effect#! for the building and your [concept_academics_progress].\nSpecialized Universities can influence various projects as well. Universities with a $concept_pm_academics_university_mathematics$ focus will help with engineering projects for example."
 concept_pm_academics_university_humanities_desc: "Un enfoque antropológico de humanidades especializa la universidad y permite un enfoque nacional en la investigación de la sociedad y reclutar específicamente [Concept('concept_lepsius_archaeologist','$concept_lepsius_archaeologists$')] y [Concept('concept_lepsius_anthropologist','$concept_lepsius_anthropologists$')]. Obtendrá un modificador de rendimiento negativo #n#! para la universidad, así como un efecto negativo #n#! en su [concept_academics_progress] Cuando cambie este método de producción."
 concept_pm_academics_university_natural_history_desc: "A Natural History Focus specializes the University and allowsa national focus on Society Research and to specifically recruit [Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')], [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')], [Concept('concept_dubois_naturalist','$concept_dubois_naturalists$')] and [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')]. You will get a #n negative throughput modifier#! for the University as well as a #n negative effect#! on your [concept_academics_progress] when you change this production method.\nSpecializing your Universities with the Natural History Focus will give you a bonus to various projects of your Natural scientists."
 concept_pm_academics_university_mathematics_desc: "Mathematical-Technical Focus specializes the University and allows a national focus on Production and Military Research and to specifically recruit [Concept('concept_tesla_engineer','$concept_tesla_engineers$')] or [Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')]. You will get a #n negative throughput modifier#! for the University as well as a #n negative effect#! on your [concept_academics_progress] when you change this production method.\nSpecializing your Universities with the Mathematical-Technical Focus will give you a bonus to various projects of your [Concept('concept_tesla_engineer','$concept_tesla_engineers$')] and [Concept('concept_mendelejew_chemist','$concept_mendelejew_chemists$')]."
 concept_panum_physician: "#b #BLUE médico#!#!"
 concept_panum_physicians: "#b #BLUE Médicos#!#!"
 concept_panum_physician_desc: "#b #BLUE Los médicos#!#! son [Concept('concept_academics_academic','$concept_academics_academics$')] que trabajan e investigan en el campo de [concept_panum_medicine]. Su tarea principal es escribir [Concept('concept_panum_disease_description','$concept_panum_disease_descriptions$')] y encontrar [Concept('concept_panum_disease_treatment','$concept_panum_disease_treatments$')]. También pueden mejorar la investigación médica, mejorar la atención médica y sanar otros personajes. \ Nphysicians ganan [concept_academics_experience] durante su trabajo y pasivamente cada año. Pueden obtener mejores niveles del rasgo médico ganando suficiente experiencia #b#!."
 concept_panum_medicine: "Medicamento"
 concept_panum_medicine_desc: "La medicina es una de las mayores expansiones de [concept_morgenroete] para Victoria 3. Uno de los enfoques está en la epidemia [Concept('concept_panum_disease','$concept_panum_diseases$')], como el cólera, la tuberculosis y el tifus, que han afectado a la humanidad durante siglos y finalmente han sido controlados gracias a los avances científicos. Por lo tanto, las enfermedades epidémicas son uno de los eventos negativos en [concept_morgenroete]. La contención a través de la búsqueda de un [concept_panum_disease_treatment] es, por lo tanto, aún más importante. Por lo tanto, un componente central de la medicina es un [concept_panum_physician] que es uno de los académicos del enfoque antropológico de la Universidad-Humanista. Puede describir enfermedades epidémicas y encontrar tratamientos. Un método de tratamiento generalmente requiere un [concept_panum_disease_description] y una tecnología. Un médico también puede mejorar la investigación de tecnologías médicas o expandir la atención médica a través de los hospitales, así como introducir nuevas técnicas médicas y curar a otros personajes. Las conferencias médicas ayudan a difundir el conocimiento médico internacionalmente. Un paso importante en la modernización de la medicina es también la transición de la teoría del miasma al [concept_panum_germ_theory]. Una nación que es líder en descubrimientos médicos también puede demostrar altos [concept_panum_medical_prestige]."
 concept_panum_disease: "Enfermedad"
 concept_panum_diseases: "Enfermedades"
 concept_panum_disease_desc: "El término enfermedad generalmente se refiere a las enfermedades epidémicas que pueden afectar a una nación cada pocos años. Un [concept_panum_physician] puede contrarrestarlos haciendo [Concept('concept_panum_disease_description','$concept_panum_disease_descriptions$')] y proporcionando enfermedades epidémicas [Concept('concept_panum_disease_treatment','$concept_panum_disease_treatments$')] generalmente no ocurren al mismo tiempo y las enfermedades epidémicas tardan algún tiempo en salir de nuevo. Dependiendo del tipo, las enfermedades epidémicas pueden tener un efecto devastador y propagarse en varios estados. Existen varios métodos [concept_panum_disease_prevention] para retrasar el inicio de dicha enfermedad o para mitigar sus efectos. Los desencadenantes para una enfermedad pueden ser muy diferentes. La fiebre amarilla solo ocurre en las regiones tropicales y el cólera y la tuberculosis requieren un mínimo de urbanización para tener un efecto. El nivel de vida de un estado y el nivel de devastación también juegan un papel. Dichas enfermedades incluyen raquitismo, pelagra y sífilis."
 concept_panum_disease_description: "Descripción de la enfermedad"
 concept_panum_disease_descriptions: "Descripciones de enfermedades"
 concept_panum_disease_description_desc: "Las descripciones son el primer paso para comprender un [concept_panum_disease]. No tienen impacto en la gravedad de una epidemia, pero son fundamentales para encontrar [Concept('concept_panum_disease_treatment','$concept_panum_disease_treatments$')], [Concept('concept_theiler_pathogen','$concept_theiler_pathogens$')] y [Concept('concept_theiler_vaccine','$concept_theiler_vaccines$')]. Las descripciones de enfermedades no tienen más requisitos: todo lo que se requiere es una enfermedad epidémica y un [concept_panum_physician]."
 concept_panum_disease_treatment: "Tratamiento de la enfermedad"
 concept_panum_disease_treatments: "Tratamientos de enfermedades"
 concept_panum_disease_treatment_desc: "A [concept_panum_physician], dada la tecnología correcta y un [concept_panum_disease_description], puede encontrar un tratamiento para un [concept_panum_disease] en un proceso largo. Los tratamientos no son lo mismo que una cura. Más bien, el médico descubre la causa de una enfermedad y desarrolla métodos sobre esta base para prevenir o limitar significativamente un brote. Los tratamientos de enfermedades limitan la duración de una enfermedad epidémica a unos pocos meses o semanas y también evitan que se propague a varios estados. Los tratamientos de enfermedades son parte de los posibles [concept_panum_disease_prevention] contra brotes de epidemia."
 concept_panum_disease_prevention: "Prevención de enfermedades"
 concept_panum_disease_prevention_no_disease: "Prevención"
 concept_panum_disease_prevention_desc: "Hay varias formas de evitar o al menos mitigar una epidemia [concept_panum_disease]. El método más conocido es el [concept_panum_disease_treatment] desarrollado por un [concept_panum_physician]. Reduce significativamente el tiempo en que se desata una enfermedad y también reduce la probabilidad de que se propague a otro país. El nivel de vida, los hospitales, las tecnologías y un alto nivel de instituciones de salud también tienen un impacto. La prevención final es un [concept_theiler_vaccine] que evita que ocurra una enfermedad en primer lugar. Las vacunas son desarrolladas por [Concept('concept_theiler_biologist','$concept_theiler_biologists$')]. Sin embargo, solo es efectivo si la institución de salud ha alcanzado al menos el nivel especificado en la facultad médica. Después de todo, la distribución de una vacuna debe organizarse y supervisarse."
 concept_panum_disease_type: "Tipo de enfermedad"
 concept_panum_disease_types: "Tipos de enfermedades"
 concept_panum_disease_type_desc: "La epidemia [Concept('concept_panum_disease','$concept_panum_diseases$')] puede diferenciarse de acuerdo con su grado de distribución. #V enfermedades locales#!, como escarlata, se limitan al estado en el que estallaron. #V Enfermedades regionales#!, como la tuberculosis, pueden propagarse a algunos estados circundantes, pero no más allá. #V Enfermedades transregionales#!, la más notoria de las cuales es el cólera, puede extenderse por todo el país, a pesar de que los estados no tienen que bordearse entre sí."
 concept_panum_local_disease: "Enfermedad local"
 concept_panum_local_diseases: "Enfermedades locales"
 concept_panum_regional_disease: "Enfermedad regional"
 concept_panum_regional_diseases: "Enfermedades regionales"
 concept_panum_transregional_disease: "Epidemia transregional"
 concept_panum_transregional_diseases: "Epidemia transregional"
 concept_panum_germ_theory: "Teoría del germen"
 concept_panum_germ_theory_desc: "La teoría de los gérmenes es uno de los avances científicos médicos fundamentales del siglo XIX. Reemplazó las teorías anteriores y más arcaicas, como la teoría del miasma, que estaba generalizado en Europa y representa todos los intentos tradicionales de explicar la causa de [Concept('concept_panum_disease','$concept_panum_diseases$')]. El descubrimiento de la teoría de los gérmenes no solo beneficia al primer descubridor. Al buscar [Concept('concept_panum_disease_treatment','$concept_panum_disease_treatments$')], las posibilidades de éxito son ligeramente más altas porque evita algunos eventos negativos y desbloquea eventos más positivos."
 concept_panum_medical_prestige: "Prestigio médico"
 concept_panum_medical_prestige_desc: "El prestigio médico se compone del [Concept('concept_panum_disease_description','$concept_panum_disease_descriptions$')] (2 puntos), [Concept('concept_panum_disease_treatment','$concept_panum_disease_treatments$')] (4 puntos), [Concept('concept_theiler_pathogen','$concept_theiler_pathogens$')] (3 puntos) y [Concept('concept_theiler_vaccine','$concept_theiler_vaccines$')] (4 puntos) descubiertos hasta ahora. Los primeros descubrimientos dan el doble de puntos. El prestigio médico adicional puede provenir de curar enfermedades cotidianas, inventar métodos especiales de curación o mejorar el sistema de salud a través de un [concept_panum_physician]."
 concept_theiler_pathogen: "Patógeno"
 concept_theiler_pathogens: "Patógenos"
 concept_theiler_pathogen_desc: "A Pathogen is the name for something that causes a [concept_panum_disease]. This could be anything from an organism to a [concept_theiler_microorganism]. Often it is a Bacterium, parasite or Virus.\nA Biologist with access to enough Microorganisms can try to find the Pathogen that causes a Disease. This can help tp prevent the disease and to discover and produce a [concept_theiler_vaccine]"
 concept_theiler_vaccine: "Vacuna"
 concept_theiler_vaccines: "Vacunas"
 concept_theiler_vaccine_desc: "The discovery of Vaccines has allowed humans to become immune to [Concept('concept_panum_disease','$concept_panum_diseases$')] without contracting them and can potentially save millions of lives.\nTo create a Vaccine, A [concept_theiler_biologist] must first find the [concept_theiler_pathogen] that causes a Disease. Then the development of a Vaccine can start if enough [Concept('concept_theiler_microorganism','$concept_theiler_microorganisms$')] are available."
 concept_panum_red_cross: "Cruz Roja"
 concept_panum_red_cross_desc: "La Cruz Roja es una de las primeras organizaciones internacionales y, en casos raros, ofrece la oportunidad de recibir médicos de la Cruz Roja en una guerra. Los miembros de la Cruz Roja también reciben ciertos bonos. Dependiendo de la regla del juego, la Cruz Roja se puede fundar histórica o dinámicamente; Los estados reconocidos pueden unirse bajo ciertos requisitos tecnológicos. El fundador recibe la sede de la Cruz Roja en su capital. Los miembros pueden acceder a hasta tres [Concept('concept_panum_convention','$concept_panum_conventions$')] que son vinculantes según el derecho internacional."
 concept_panum_convention: "Convención internacional"
 concept_panum_conventions: "Convenciones internacionales"
 concept_panum_convention_desc: "Una convención internacional es una declaración conjunta de intención por parte de los estados para establecer ciertas reglas del juego en el tráfico internacional. Hubo varios ejemplos de esto en el transcurso del siglo XIX, como la Convención de Ginebra o el Código de Guerra de Tierras de La Haya. Lo que todas las convenciones tienen en común es que intentan mitigar los horrores de la guerra. Por lo tanto, las opciones militares se prefieren sobre la atención médica segura para las armas heridas y finales están prohibidas, lo que conduce a una cierta contención de la guerra. La ventaja es una mayor flexibilidad. Si bien la adopción de una convención se considera favorablemente, la abolición de una convención puede conducir a la ira internacional. Las convenciones de las minoristas no son declaraciones de intención no vinculantes. Sin embargo, si suficientes miembros del [concept_panum_red_cross] lo firman, con el tiempo se convertirá en un derecho internacional válido, que se espera que todos los firmantes cumplan, y los otros miembros también lo firmarán. Esto sucede cuando el 65 por ciento de todos los miembros y la mayoría de las grandes potencias están de acuerdo con esta convención; entonces todos los demás miembros se ven obligados a cumplir con ella. Esta convención ya no puede ser abolida como de costumbre. Para evitar convenciones vinculantes, es necesaria un retiro completo de la Cruz Roja, con todas las consecuencias."
 concept_manzoni_literary_tradition_desc: "#b Literary Tradition#! is a representation of a nation's literary achievements and traditions.\nThere are various ways to gain #b Literary Tradition#!. Having at least one $building_art_academy$, having one or more [Concept('concept_manzoni_local_writer','$concept_manzoni_local_writers$')], a [concept_manzoni_national_writer] and having certain [Concept('concept_artists_center_of_arts','$concept_artists_centers_of_arts$')] will passively add #b Literary Tradition#! to your country.\nThe more #b Literary Tradition#! your nation gains, the higher the prestige bonus you gain. Additionally it will allow you to unlock the [concept_elgar_expressionism] [concept_artists_art_style]."
 concept_elgar_musical_tradition_desc: "#b La tradición musical#! es una representación de los logros y tradiciones musicales de una nación. Hay varias formas de ganar #b tradición musical#!. Si tiene al menos uno [concept_elgar_opera], obtendrá pasivamente la tradición musical #b#!. Cuanto más #b operas#! tenga, más obtendrá. También puede obtener más #b tradición musical#! de tecnologías musicales y artísticas. Cada tecnología ofrece una bonificación diferente. También puede obtener #b tradición musical#! de los eventos, especialmente si tiene un #!3. \ Nthe más #b tradición musical#! su nación gana, cuanto mayor sea el bono de prestigio que gane. Además, le permitirá desbloquear el #!6 #!7."
 concept_klimt_painting_tradition_desc: "#b La tradición de la pintura#! es una representación de los logros y tradiciones de pintura de una nación. Se puede obtener al tener #b Arts Academies#!, un [concept_klimt_painter], ciertos [Concept('concept_technology', '$concept_technologies$')] o de eventos."
 concept_mendelejew_theorized_elements: "Elementos teorizados"
 concept_mendelejew_discovered_elements: "Elementos descubiertos"
 concept_mendelejew_isolated_elements: "Elementos aislados"
 concept_panum_psycho_point: "Punto psicoterapéutico"
 concept_panum_psycho_points: "Puntos psicoterapéuticos"
 concept_panum_psycho_point_desc: "Los puntos psicoterapéuticos son una moneda abstracta que representa el progreso de un país en el campo de la psiquiatría y la psicología. Se generan mensualmente a partir de tecnologías, un asilo loco o un [concept_panum_physician] con #V psychiatrist#! [concept_character_trait]. Los puntos psicoterapéuticos también se pueden adquirir a través del evento. Un gran número de puntos psicoterapéuticos resulta en una mejor oportunidad de curar personajes con enfermedades mentales. Subir un nivel psicoterapéutico también ofrece bonos de investigación y [concept_academics_progress]. Un cierto número de puntos psicoterapéuticos es un requisito para la mayoría de las escuelas psicológicas."
 concept_vikelas_mechanic: "Mecánico"
 concept_vikelas_mechanic_desc: "Lorem ipsum"
 concept_vikelas_mechanical_innovation: "Innovación mecánica"
 concept_vikelas_race_car: "Coche de carreras"
 concept_vikelas_race_car_desc: "Lorem ipsum"
 concept_vikelas_race_car_reliability: "Fiabilidad del automóvil de la carrera"
 concept_vikelas_race_car_safety: "Seguridad del auto de carreras"
 concept_vikelas_race_car_speed: "Velocidad del auto de carreras"
 concept_dubois_dinosaur_bone_no_dinosaur: "Huesos"
 concept_dubois_dinosaur_bones_no_dinosaur: "Huesos"
 concept_dubois_paleontological_expedition_desc: "Se puede enviar a [concept_dubois_paleontologist] a [Concept('concept_dubois_formation','$concept_dubois_formations$')]. Tomará 1 año y, dependiendo del éxito de la expedición, obtendrá [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] y [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')]. Cuando termina una expedición y si tiene un [concept_dubois_paleontological_team] gratuito, puede configurar un [concept_dubois_paleontological_excavation] para obtener pasivamente fósiles y huesos de esa región. La forma más fácil de obtener acceso a una formación es controlar el estado asociado. Sin embargo, el acceso también se puede obtener pacíficamente a través de [Concept('concept_dubois_paleontological_licence','$concept_dubois_paleontological_licences$')]."
 concept_dubois_paleontological_team: "Equipo paleontológico"
 concept_dubois_paleontological_teams: "Equipos paleontológicos"
 concept_dubois_paleontological_team_desc: "Los equipos paleontológicos se pueden usar para configurar un [concept_dubois_paleontological_excavation] después de terminar un [concept_dubois_paleontological_expedition]. Esto le permitirá obtener pasivamente [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] y [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')]."
 concept_dubois_paleontological_excavation: "Excavación paleontológica"
 concept_dubois_paleontological_excavations: "Excavaciones paleontológicas"
 concept_dubois_paleontological_excavation_desc: "Puede configurar una expedición paleontológica después de terminar un [concept_dubois_paleontological_expedition] si tiene un [concept_dubois_paleontological_team] gratis. Una excavación paleontológica permitirá a su equipo producir pasivamente [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] y [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')]."
 concept_verrier_venus_transit: "Tránsito de Venus"
 concept_verrier_venus_transit_desc: "The transit of Venus refers to the rare occurrence of the moon passing between Earth and Venus. However, it occurred twice in the 19th century: in 1874 and 1882. Since observations of the transit of Venus allow conclusions to be drawn about the size of the solar system and a more precise determination of the size of the astronomical unit (AU), these were major scientific events. Countries located in the [concept_verrier_venus_transit_zone] can observe the event from there; other countries must send expeditions. The success of the observation depends on the experience of the [concept_verrier_astronomer], the availability of an [concept_tesla_engineer], and a bit of luck: sometimes the weather can prevent a good image. The better the observation, the greater the bonus."
 concept_verrier_venus_transit_zone: "Zona de tránsito de Venus"
 concept_verrier_venus_transit_zone_desc: "La Zona de Tránsito de Venus refiere a la parte de la Tierra desde la cual un tránsito de Venus completo (no tan solo parcial) puede ser observado. En 1874, esto fue particularmente verdadero para la región Asia Oriental-Pacífico, y en 1882 para casi todo el continente Americano. Una enumeración detallada de las regiones estratégicas se encuentra abajo. \n\n#V Tránsito de Venus 1874: #!\nIndonesia, Indochina, Oceania, China del Sur, China del Norte, Manchuria, Japón, India Central, Madras, Bengal, Himalayas; también, el Estado del Territorio Oceánico Indio. \n\n#V Tránsito de Venus 1882: #!\nBrazil, La Plata, Andes, Gran Colombia, Mexico, América Central, Caribe, El Medio Oeste, Dixie, Nueva Inglaterra; también, los Estados de Ontario y Quebec."
 concept_vikelas_coach: "Entrenador"
 concept_vikelas_coaches: "Entrenadores"
 concept_vikelas_coach_desc: "Los Entrenadores son los entrenadores nacionales de un país en un deporte nacional específico. Los deportes nacionales incluyen [concept_vikelas_football], baseball, basketball y cricket. Los entrenadores entregan beneficios a su equipo respectivo en las competiciones; sea en los Campeonatos Mundiales Internacionales o en partidos internacionales. Estos últimos son jugados secretamente en intervalos regulares y aumentan la experiencia del entrenador cuando gana. Puntos de experiencia altos y [Concept('concept_character_trait','$concept_character_traits$')] positivos aumentan las posibilidades de ganar un Campeonato Mundial. Características positivas son aquellas que motivan particularmente a los jugadores —como ambicioso o carismático— mientras que características desmotivacionales disminuyen las posibilidades de ganar un partido. Esto incluye características como despiadado o cruel.\n\n#R NOTA: Hasta el momento sólo el fútbol está integrado.#!"
 concept_vikelas_football: "Fútbol"
 concept_vikelas_football_desc: "El fútbol es un posible deporte nacional. Los primeros clubs de fútbol pueden ser establecidos en Europa  y Sudamérica; esto requerirá un sistema legal relativamente liberal, una pequeña burguesía fuerte, o un promedio considerable de estándar de vida. Después de eso, partidos de fútbol ocasionales podrán ser jugados. Con el establecimiento de FIFA, partidos internacionales y la Copa Mundial se vuelven posibles. Los ocho mejores equipos califican automáticamente para la Copa Mundial. Los equipos son calculados según el Valor del Equipo de Fútbol Nacional (VEFN) el cual es derivado desde los parámetros de estándar de vida (aptitud física de la población), fuerza de la pequeña burguesía (sistema de clubs), alfabetismo (tácticas), y tradición (deporte nacional: sí o no?). En partidas, no solo el VEFN es tomado en cuenta, sino también las características y experiencia del [concept_vikelas_coach]."
 concept_gaudi_architectural_splendour: "Arquitectura espléndida"
 concept_gaudi_architectural_splendour_desc: "Una nación que descubrió #b Art Déco#! puede crear una arquitectura espléndida #b #b espléndida arquitectura#! construyendo edificios en el estilo #b art decoco#!. Puede construir #b art deco#! cines, rascacielos o aeropuertos. Si recoge 10 #b arquitectura espléndida#! puntos su nación será conocida por su #b arquitectura espléndida#! en el estilo #b art deCO#! que le otorgará prestigio."
 concept_artists_artist_desc: "In [concept_morgenroete] #b Artists#! are special characters that allow you to use certain mechanics of the mod. You can get #b Artists#! in some events or by aquiring enough [concept_artistic_progress]. Artists have [concept_artists_experience] that reflects their standing in their respective field.\nCurrently these #b Artists#! exist:\n - [concept_elgar_composer]\n - [concept_klimt_painter]\n - [concept_manzoni_writer]\n - [concept_gaudi_architect]"
 concept_elgar_architecture_desc: "#b arquitectura#! es una de las principales características de [concept_morgenroete]. \ N \ nmany nations recibió nuevos monumentos #b#!: la catedral de colonia #b §0 §0 Cristo Redentor#! en Brazil, el #b MoleLIANDELILE italy. #b Vienna ringstrasse#! en Austria, el #b palacio de verano #b en China, el #b sagrada família#! en España, el #b Schloss Neuschwanstein#! en Bavaria, el #b palacio de bellas artes#! en mexico y el #b gyeongbobbobbing. Corea. \ Nall edificios, excepto para el #b del palacio de verano#!, el #b sajón palacio#! y el #b campanile#! debe ser construido por su propietario, el #b palacio sajón#! puede ser reactivado por una nación polaca. Hay aún más contenido, ya que pueden comenzar la transformación de sus ciudades para lograr un #b5"
 concept_gaudi_architect_desc: "#n próximamente a Morgenröte! #!"
 concept_douglas_mountaineering: "Montañismo"
 concept_douglas_mountaineering_desc: "Países que poseen al menos un [concept_dubois_mountain] o tienen una licencia de montañismo #b#! con un país que tiene uno puede participar en el montañismo. Para comenzar una expedición #b de montaña#!, necesita tanto la #b prospecting#! y #b nationalism#! Technologies, así como un general que tiene el #b montañero#!, #b explorerer #!, #b montaña commander#! u #b surderor#! Trait. ¿Qué general será el principal montañista? Luego elegirás la cumbre para escalar. En las montañas más altas, más peligroso es el ascenso. Las montañas se clasifican de acuerdo con su altura en metros que van desde menos de 4000 metros de arriba hasta más de 8000 metros. El éxito depende de las tecnologías militares investigadas, la edad y la salud del líder y sus características. Las avalanchas y las pendientes empinadas pueden representar un riesgo importante que amenaza todo el esfuerzo. O un #!0 o un #!1 ayudará a descubrir más sobre la montaña en la que subió. \ Nin."
 concept_gaudi_great_architect: "#PURPLE #b Gran Arquitecto#!#!"
 concept_gaudi_great_architects: "#PURPLE #b Grandes Arquitectos#!#!"
 concept_gaudi_great_architect_desc: "Los #b Grandes Arquitectos#! son [Concept('concept_gaudi_architect','$concept_gaudi_architects$')] que son considerados las mentes más importantes de su área. Los #b Arquitectos#!, al llegar a los 500 [concept_artists_experience], se convertirán en #b Grandes Arquitectos#!. Si un artista alcanza este rango especial, él o ella pueden diseñar los planos para un [concept_gaudi_custom_monument] verdaderamente excepcional que encarna el espíritu de la nación."
 concept_gaudi_monuments: "Monumentos en #R Morgenröte#!"
 concept_gaudi_monuments_desc: "Muchas Naciones recibieron nuevos #b Monumentos#! en [concept_morgenroete]: la #b Catedral de Colonia#! en Alemania, el #b Gotthardbahn#! en Suiza, el #b Cristo Redentor#! en Brazil, la #b Mole Antonelliana#! en Italia, el #b Palacio de Verano#! en China, la #b Sagrada Familia#! en España, el #b Schloss Neuschwanstein#! en Bavaria, el #b Palacio de Bellas Artes#! en Mexico y el #b Palacio Gyeongbokgung#! en Corea. \nTodos los edificios excepto por el #b Palacio #b Palacio de Verano#! y el #b Campanile#! necesitan ser construidos por su dueño, el #b Palacio de Sajonia#! puede ser reactivado por una nación Polaca. También hay nuevos monumentos en el comienzo del juego como el #b Buddhas de Bamiyan#! o el #b #b Palacio de Potala#!\nTambién hay la posibilidad de hacer que un [concept_gaudi_great_architect] diseñe un [concept_gaudi_custom_monument].\n\nA diferencia del juego base, los #b Monumentos #! no son construidos directamente, sino por una decisión. La construcción toma lugar en varias etapas, dependiendo del tamaño del edificio, y puede tomar años o incluso décadas; y es significativamente más caro."
 concept_athletes_athlete: "Athlete"
 concept_athletes_athletes: "Athletes"
 concept_athletes_athlete_desc: "In [concept_morgenroete] #b Athletes#! are special characters that allow you to use certain mechanics of the mod.#b Athletes#! are usually created through events or via a button. Like other characters, #b Athletes#! possess experiences that guarantee greater success in their field.\nCurrently these #b Athletess#! exist:\n - [concept_curtiss_balloonist]\n - [concept_curtiss_pilot]\n - [concept_vikelas_olympian]\n - [concept_douglas_mountaineer]\n - [concept_vikelas_coach]\n - [concept_vikelas_racer]"
 concept_gaudi_independent_architect: "Independent Architect"
 concept_gaudi_independent_architects: "Independent Architects"
 concept_gaudi_independent_architect_desc: "[Concept('concept_gaudi_architect','$concept_gaudi_architects$')] that are not hired by a country are #b Independent Architects#!.\nUnlike many other artists, there are few requirements to recruit an #b Independent Architect#!, except for a minimal technological recquirement. They are true globetrotters and usually only demand good payment."
 concept_gaudi_architectural_blueprint: "Architectural Blueprint"
 concept_gaudi_architectural_blueprints: "Architectural Blueprints"
 concept_gaudi_architectural_blueprint_desc: "Architectural blueprints can be researched by [Concept('concept_gaudi_architect','$concept_gaudi_architects$')]. They are essential for the construction of special [concept_gaudi_blueprint_buildings] that can only be erected once in a nation. There are a total of 15 different buildings in five different categories. Certain blueprints require technologies to be researched. Since research can sometimes take years, it's wise to decide beforehand which blueprints are most important. The buildings can potentially be constructed in any state, but require a certain level of urbanization. In some cases, there may be additional requirements."
 concept_gaudi_blueprint_buildings: "Blueprint Buildings"
 concept_gaudi_blueprint_buildings_desc: "Blueprint buildings are buildings which need a bluprint researched by [Concept('concept_gaudi_architect','$concept_gaudi_architects$')]. These buildings can only be built once in a nation. There are 15 different buildings:\n\n#b Monument#!\n- [GetBuildingType('building_gaudi_statue').GetName]\n- [GetBuildingType('building_gaudi_fountain').GetName]\n- [GetBuildingType('building_gaudi_arch').GetName]\n\n#b Public Square#!\n- [GetBuildingType('building_gaudi_park').GetName]\n- [GetBuildingType('building_gaudi_luna').GetName]\n- [GetBuildingType('building_gaudi_parade').GetName]\n\n#b Service Buildings#!\n- [GetBuildingType('building_gaudi_almshouse').GetName]\n- [GetBuildingType('building_gaudi_school').GetName]\n- [GetBuildingType('building_gaudi_prison').GetName]\n\n#b Health Institutions#!\n- [GetBuildingType('building_gaudi_canalization').GetName]\n- [GetBuildingType('building_gaudi_hospital').GetName]\n- [GetBuildingType('building_gaudi_health').GetName]\n\n#b National Academies#!\n- [GetBuildingType('building_gaudi_science').GetName]\n- [GetBuildingType('building_gaudi_arts').GetName]\n- [GetBuildingType('building_gaudi_sports').GetName]"
 concept_gaudi_custom_monument: "Custom Monument"
 concept_gaudi_custom_monument_desc: "A custom monument is an [concept_gaudi_architect]'s greatest possible masterpiece. It can compete with other, ordinary monuments. Only a [concept_gaudi_great_architect] can draw up such plans. It requires research into the most modern architectural technologies. The type of monument an architect designs depends largely on their architectural style. Art Deco architects design the [GetBuildingType('building_gaudi_people_monument').GetName], Bauhaus architects the [GetBuildingType('building_gaudi_people_forum').GetName], and Neoclassical architects the [GetBuildingType('building_gaudi_people_palace').GetName]."
 concept_douglas_mountaineer: "Mountaineer"
 concept_douglas_mountaineers: "Mountaineers"
 concept_douglas_mountaineer_desc: "#b Mountaineers#! are [Concept('concept_athletes_athlete','$concept_athletes_athletes$')] who can climb unconquered [concept_douglas_mountain_summit]. They can be recruited against [concept_douglas_alpine_heritage] after the establishment of a mountaineering club. Countries with geographical features such as mountains, peaks, or volcanoes therefore have an advantage in recruitment. Mountaineering traits and experience are the most important factors for progress in conquering a mountain or overcoming a dangerous situation.#!"
 concept_vikelas_olympian: "Olympian"
 concept_vikelas_olympian_desc: "#n This entry is being revised.#!"
 concept_douglas_mountain_summit: "Mountain Summit"
 concept_douglas_mountain_summits: "Mountain Summits"
 concept_douglas_mountain_summit_desc: "Mountain Summits are the coveted goal of all mountaineers. They mark the highest point of a mountain. Each summit has three distinct attributes that define how difficult it is to reach successfully.\n\n#V Height#!: Height determines how many steps are required to climb a mountain—this reflects the overall length of an expedition. For every 1,000 meters, one progress step is needed. The value is rounded up, meaning that the 4,421-meter-high Mount Whitney requires 5 steps, while the 7,134-meter-high Kauffmann Peak demands 8. A mountain's prestige is calculated based on its height: the total height is divided by 300. Thus, an ideal mountain of 4,500 meters grants 15 prestige.\n\n#V Level#!: A mountain's level represents the equipment demands necessary to climb it. This is not strictly tied to its height. For example, despite its 5,636 meters, Citlaltépetl is only Level 1 and requires just basic equipment. In contrast, the Matterhorn, at only 4,478 meters, is considered significantly more demanding at Level 3, requiring at least first aid preparation for Alpine emergencies.\n\n#V Risk#!: A mountain's risk level indicates the likelihood of negative events affecting an expedition. It is independent of both height and level. Avalanches, fog, and severe weather are key concerns. Popocatépetl could be ascended already in early modern times due to its hospitable surroundings. In contrast, the much smaller Großvenediger, at just 3,666 meters, still posed a serious threat to Austrian expeditions well into the early 19th century.\n\nMore information about individual summits can be found under the [concept_douglas_mountain_summit_list] section."
 concept_douglas_mountain_range: "Mountain Range"
 concept_douglas_mountain_ranges: "Mountain Ranges"
 concept_douglas_mountain_range_desc: "A mountain range is defined as a mountain formation that offers potential for [concept_douglas_mountaineering] training over long distances. Classic mountain ranges include the Rocky Mountains, the Andes, the Alps, and the Caucasus. Unlike the [Concept('concept_douglas_mountain_summit','$concept_douglas_mountain_summits$')] that are to be conquered, there are also plenty of less challenging mountains where there is no risk of a [concept_douglas_mountaineer] experiencing a fatal fall. Rather, they should be viewed as a training route. Countries with mountain ranges are more likely to produce mountaineers than those without this geographical feature."
 concept_douglas_alpine_heritage: "Alpine Heritage"
 concept_douglas_alpine_heritage_desc: "Alpine Heritage is a collective term for a connection with the mountains and a specialization in climbing mountains. It also refers to the potential to recruit new [Concept('concept_douglas_mountaineer','$concept_douglas_mountaineers$')]—since, in most cases, experienced mountaineers come from mountainous areas. This always gives countries with [Concept('concept_douglas_mountain_range','$concept_douglas_mountain_ranges$')] or [Concept('concept_douglas_mountain_summit','$concept_douglas_mountain_summits$')] an advantage. Recruiting a new mountaineer, as well as various other actions, costs Alpine Heritage."
 concept_douglas_mountain_summit_list: "List of Mountain Summits"
 concept_douglas_mountain_summit_list_desc: "There are many [Concept('concept_douglas_mountain_summit','$concept_douglas_mountain_summits$')] that can be climbed.\n\n#V North America:#!\n#b Mount McKinley#! (Alaska), Height 6190 meters, Level 4\n#b Mount Logan#! (Yukon Territory), Height 5959 meters, Level 4\n#b Citlaltépetl#! (México), Height 5636 meters, Level 1\n#b Mount Whitney#! (California), Height 4421 meters, Level 1\n\n#V South America:#!\n#b Aconcagua#! (Mendoza), Height 6267 meters, Level 3\n#b Huascarán#! (Lima Territory), Height 6768 meters, Level 5\n#b Illimani#! (La Paz), Height 6438 meters, Level 4\n#b Chimborazo#! (Ecuador), Height 6267 meters, Level 1\n\n#V Europe:#!\n#b Shkara#! (Greater Caucasus), Height 5642 meters, Level 4\n#b Dufourspitze#! (Dufourspitze), Height 4634 meters, Level 2\n#b Matterhorn#! (West Switzerland), Height 4478 meters, Level 3\n#b Aiguille Verte#! (Savoy), Height 4122 meters, Level 3\n#b Pico de Aneto#! (Aragon), Height 3404 meters, Level 1\n\n#V Africa:#!\n#b Kibo#! (Tanganyika), Height 5895 meters, Level 2\n#b Mount Kenya#! (Kenya), Height 5199 meters, Level 3\n#b Mount Stanley#! (Uganda), Height 5109 meters, Level 3\n#b Mount Cameroon#! (South Cameroon), 4095 meters, Level 1\n\n#V Asia:#!\n#b Kamet#! (Delhi), Height 7756 meters, Level\n#b Chogolisa#! (Kashmir), Height 7665 meters, Level 5\n#b Kabru#! (Himalayas), Height 7412 meters, Level 5\n#b Kaufmann Peak#! (Tajikistan), Height 7134 meters, Level 4\n\n#V Australia & Oceania:#!\n#b Mount Wilhelm#! (Eastern New Guinea), Height 4121 meters, Level 2\n#b Mount Cook#! (South Island), Height 3724 meters, Level 2"
