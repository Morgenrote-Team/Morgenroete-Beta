 concept_andersson_anthropological_prestige: "Anthropological Prestige"
 concept_andersson_anthropological_prestige_desc: "#b Anthropological Prestige#! refers to the total prestige accumulated through anthropological achievements. These are as follows:\n\n#b Prehistoric Artifact#!: 1 Prestige\n#b Neoanthropus, Palaeanthropus, Pithecanthropus, Australopithecus Fossil#!: 1 Prestige\n#b Venus Figurine#!: 5 Prestige\n#b Cave Paintings#!: 10 Prestige\n#b Discoverer of Anthropology#!: 15 Prestige\n#b New Neoanthropus Type#!: 20 Prestige\nn#b New Palaeanthropus Type#!: 40 Prestigen\n#b New Pithecanthropus Type#!: 60 Prestige\n#b New Pithecanthropus Type#!: 80 Prestige\n#b Neoanthropus Skeleton#!: 25 Prestige\n#b Palaeanthropus Skeleton#!: 50 Prestige\n#b Pithecanthropus Skeleton#!: 75 Prestige\n#b Australopithecus Skeleton#!: 100 Prestige\n#b Homo Sapiens introduced#!: 40 Prestige\n#b Homo Neanderthalensis introduced#!: 50 Prestige\n#b Homo Erectus introduced#!: 50 Prestige"
 concept_andersson_anthropology: "Anthropology"
 concept_andersson_anthropology_desc: "#b Anthropology#! focuses primarily on the prehistoric ancestors of humankind - from the Neolithic period right back to Australopithecus. [Concept('concept_andersson_anthropologist','$concept_andersson_anthropologists$')] examine [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')] and [Concept('concept_andersson_prehistoric_artifact','$concept_andersson_prehistoric_artifacts$')] in particular in order to reconstruct the distant past. Anthropologists still view [concept_andersson_human_evolution] as a progression from ape-man, through early man, to modern man (Pithecanthropus, Palaeanthropus, Neoanthropus). Accordingly, anthropologists search worldwide for representatives of these species, naming the types according to their sites of discovery. With enough fossils, they can reconstruct a [concept_andersson_skeleton]. In addition, they discover cave paintings, carry out craniometric measurements or organise exhibitions on the Neolithic, Mesolithic and Upper Palaeolithic periods. Two conferences, namely on the peopling of the Americas and the origins of modern humans, fall within their remit."
