 concept_academics_experience_famous: "Famous"
 concept_andersson_anthropologist: "#b #BLUE Anthropologist#!#!"
 concept_andersson_anthropologists: "#b #BLUE Anthropologists#!#!"
 concept_andersson_anthropologist_desc: "#b #BLUE Anthropologists#!#! are academics who study human prehistory, both in the paleontological and archaeological senses. They search for [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')], [Concept('concept_andersson_prehistoric_artifact','$concept_andersson_prehistoric_artifacts$')], find new human species and reconstruct [Concept('concept_andersson_skeleton','$concept_andersson_skeletons$')]. Anthropologists often work as speleologists (cave explorers) and, over time, can develop a wide range of specializations. These include categories such as monogenists, polygenists, diffusionists and evolutionists, whose voting behaviour at conferences often determines the outcome. Particularly skilled anthropologists can reform existing anthropological terminology of the [concept_andersson_human_evolution] or shed light on the Piltdown fraud."
 concept_andersson_human_fossil: "Human Fossil"
 concept_andersson_human_fossils: "Human Fossils"
 concept_andersson_human_bones: "Human Bones"
 concept_andersson_human_fossil_desc: "There are essentially two types of #b Human Fossils#!: non-specific fossils and specific fossils. Non-specific fossils are all remains of human biology, including those of a recent nature from historical times. They can also be found by people other than anthropologists, but are important, for example, for the establishment of the [GetBuildingType('building_andersson_institute').GetName]. Specific human fossils belong to one of four groups: Neoanthropus, Palaeanthropus, Pithecanthropus, Australopithecus. They can be found during a hominid survey or a hominid expedition. [Concept('concept_andersson_anthropologist','$concept_andersson_anthropologists$')] may also discover entirely new types in the process. There are a total of 16 different specific human fossils. [Concept('concept_andersson_skeleton','$concept_andersson_skeletons$')] can also be reconstructed from them to trace [concept_andersson_human_evolution]."
 concept_andersson_cave: "Cave"
 concept_andersson_caves: "Caves"
 concept_andersson_cave_desc: "#b Prehistoric Caves#! are a place where early human or pre-human species have left [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')]. They therefore provide a bonus when conducting anthropological research. Caves can be discovered and explored by [Concept('concept_andersson_anthropologist','$concept_andersson_anthropologists$')]. Some Caves are also unlocked through historical events."
 concept_andersson_human_evolution: "Human Evolution"
 concept_andersson_human_evolution_desc: "In the Victorian era, there was a tendency to classify [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')] and evolutionary stages according to their higher level of development. A distinction was drawn between the 'gifted' Homo sapiens, endowed with artistic talent, and their more coarse-featured ancestors or ape-like counterparts. Thus, the precursors of humanity were divided into categories such as Neoanthropus (True Man), Palaeanthropus (Cave Man) and Pithecanthropus (Ape-Man); the latter represented the actual 'missing link' between animals and humans. Although these concepts were frequently rejected by later scholarship, they served as an initial point of reference for further research into the early history of humankind. The discovery of Australopithecus (Southern Ape) in Africa was therefore, for a number of reasons, one that shook the established view."
 concept_andersson_prehistoric_artifact: "Prehistoric Artifact"
 concept_andersson_prehistoric_artifacts: "Prehistoric Artifacts"
 concept_andersson_prehistoric_artifact_desc: "#b Prehistoric Artifacts#! provide evidence of human presence in a [concept_andersson_cave] or other archaeological sites. Unlike non-specific [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')], they directly give [concept_andersson_anthropological_prestige]. In rare cases, they are also required for exhibitions on human life during the Neolithic, Mesolithic or Upper Palaeolithic periods. An [concept_andersson_anthropologist] with the [concept_lepsius_archaeologist] trait finds more prehistoric artifacts during an anthropological research."
 concept_andersson_skeleton: "Prehistoric Skeleton"
 concept_andersson_skeletons: "Prehistoric Skeletons"
 concept_andersson_skeleton_desc: "Reconstructing a #b Prehistoric Skeleton#! requires the construction of a [GetBuildingType('building_andersson_institute').GetName]. Once [Concept('concept_andersson_anthropologist','$concept_andersson_anthropologists$')] have found five [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')] of a specific species, they can begin the reconstruction - the anthropologist's [concept_character_traits] and experience affect the duration of the process. The first skeleton of a Neoanthropus, Palaeanthropus or Pithecanthropus activates the respective production method in the institute. However, an anthropologist can also easily reconstruct the other skeletons, provided they have the fossils, in order to gain further [concept_andersson_anthropological_prestige]."
 concept_lepsius_minor_excavation_site: "Minor Excavation Site"
 concept_lepsius_minor_excavation_site_desc: "Besides the large [Concept('concept_lepsius_excavation_site', '$concept_lepsius_excavation_sites$')], which are potentially usable by all countries internationally via licenses and offer Egyptian, Mesopotamian, Aegean, and pre-Columbian [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')], there are also 'smaller' excavation sites. These are only usable by the owner and contain only local artifacts. They are unlocked via a Journal Entry, which usually requires an [concept_lepsius_archaeologist] and special technology. Only then is the excavation site actually activated, visible through a State Trait in the State Region. After activation, Minor Excavation Sites generate an additional Local Artifact as long as the archaeologist is conducting an archaeological project. Examples of such excavation sites are Pompeii, Tikal, or Harappa."
