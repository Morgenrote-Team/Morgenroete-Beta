 concept_theiler_pest_desc: "Pests are primarily agricultural pests—most often insects—that can have a significant impact on a nation's agricultural production. Unlike many other factors affecting crops, they can persist for years, though they may subsequently vanish completely for a certain period. A [concept_theiler_biologist] — and sometimes a [concept_mendelejew_chemist] — can devise ways to contain this threat or eliminate it entirely. Pests are:\n\n- [GetHarvestConditionType('locust_swarm').GetName]"