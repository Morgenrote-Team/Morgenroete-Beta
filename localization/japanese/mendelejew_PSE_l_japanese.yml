 ELEMENT_INFO_TT: "それぞれのタイルが[concept_mendelejew_element]を表している。この見本はタイルにどのような情報が載っているかを示している。下線付きのテキストをマウスオーバーして詳細を確認しよう。"
 ELEMENT_ATOMIC_NUMBER_INFO: "#underline #V 原子番号#!#!"
 ELEMENT_INFO_ATOMIC_NUMBER_TT: "#V 原子番号: #!原子番号とは、元素内の陽子の数。\n\n史実では、この情報が明らかになるのは20世紀初頭になってからだ。メンデレーエフはまず元素を原子量順に並べたが、性質ごとにまとめるために一部の元素の順番を入れ替えた。彼が元素に割り当てた番号は、原子番号に酷似していた。"
 ELEMENT_CHEMICAL_SYMBOL_INFO: "#underline #V 化学記号#!#!"
 ELEMENT_NAME_INFO: "#underline #V 名称#!#!"
 ELEMENT_INFO_NAME_TT: "#V 名称 : #!元素の名称には、ラテン語、ギリシャ語、新ラテン語がよく使われる。\n\n史実では、太古から存在を知られていた元素も存在しており、自然と日常的な名称があたえられた。近代になって発見された元素は、人名（例: フィンランドの科学者ジョン・ガドリン→ガドリニウム）、地名（ヨーロッパ→ユウロピウム）、神話の登場人物や惑星（ネプテュヌス→ネプツニウム）、鉱物（ベリル→ベリリウム）から名称が取られた。\n\n1960年代の「超フェルミウム論争」に代表されるように、元素の命名が大きな論争になることもたびたびあった。"
 ELEMENT_ATOMIC_MASS_INFO: "#underline #V 原子量#!#!"
 ELEMENT_INFO_ATOMIC_MASS_TT: "#V 原子量 : #!原子量とは、原子の質量。単位はそのまま「原子質量単位（amu）」が用いられる。\n\n史実では、元素の質量基準はまず水素が用いられ、すなわち2つの水素分子の重さが基準となった。その後いくつかの変遷を経て、1858年に陽子量1の水素原子が基準になった。現在、原子量の基準は炭素12同位体の1/12であり、これは陽子と中性子の重さにほぼ等しい。"
 ALKALI_METALS_INFO: "#underline #V アルカリ金属#!#!"
 ALKALI_METALS_INFO_TT: "#V アルカリ金属#!は、周期表における第1族元素。光沢があり、柔らかく、反応しやすい。"
 NONMETALS_INFO: "#underline #V 非金属#!#!"
 NONMETALS_INFO_TT: "#V 非金属#!は金属以外の性質を持つ元素で、さまざまな性質を有している。種類も酸素のような気体から、ヨウ素のような結晶体まで幅広い。"
 ALKALINE_EARTH_METALS_INFO: "#underline #V アルカリ土類金属#!#!"
 ALKALINE_EARTH_METALS_INFO_TT: "#V アルカリ土類金属#!は第2族元素で、どれも非常に似た性質を持つ。銀白色の光沢があり、アルカリ金属ほどではないが反応しやすい。"
 HALOGENS_INFO: "#underline #V ハロゲン#!#!"
 HALOGENS_INFO_TT: "#V ハロゲン#!は周期表における元素グループ。ハロゲンとは「塩を作るもの」を意味し、金属と反応すると塩を形成する性質から名付けられた。"
 TRANSITION_METALS_INFO: "#underline #V 遷移金属#!#!"
 TRANSITION_METALS_INFO_TT: "#V 遷移金属#!は金属のひとつで、ほとんどが非常に固い。電気や熱を伝えやすく、酸化する。合金として用いられることが多い。"
 NOBLE_GASES_INFO: "#underline #V 希ガス#!#!"
 NOBLE_GASES_INFO_TT: "#V 希ガス#!は元素グループのひとつ。無臭・無色の気体で、ほとんど反応しない。"
 BASIC_METALS_INFO: "#underline #V 貧金属#!#!"
 BASIC_METALS_INFO_TT: "#V 貧金属#!は、柔らかい金属。ほとんどが低い金属融点を持つ。"
 LANTHANIDES_INFO: "#underline #V ランタノイド#!#!"
 LANTHANIDES_INFO_TT: "#V ランタノイド#!は似た性質を持つ元素グループ。分離や生成が難しいため、希土類元素とも呼ばれる。"
 SEMIMETALS_INFO: "#underline #V 半金属#!#!"
 SEMIMETALS_INFO_TT: "#V 半金属#!は、周期表では金属と非金属の間の右側に配置される元素。常温では固体で、基本的に導電性があまり高くない。しかし温度を上げると導電性も高くなる。"
 ACTINIDES_INFO: "#underline #V アクチノイド#!#!"
 ACTINIDES_INFO_TT: "#V アクチノイド#!はそれぞれ似た性質を持つ元素。放射性を有し、重金属である。"
