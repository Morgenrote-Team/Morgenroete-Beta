 mendelejew.11.t: "爆薬企業"
 mendelejew.11.d: "化学者の[SCOPE.sCharacter('mendelejew_chemist_scope').GetFullName]はニトログリセリンの知見を活かして高性能爆薬を発明し、文字どおりの大成功をおさめました。博士の発明品には特許料が入るようになり、いまでは自前の工場で試験的な生産も始めています。"
 mendelejew.11.f: "1850年、パリ留学中のアルフレッド・ノーベルは、アスカニオ・ソブレロと知己を得ました。ソブレロは3年前にニトログリセリンを発見しましたが、まだ衝撃や火に弱く、実用的ではありませんでした。このときノーベルはニトログリセリンに強い関心を持ち、やがて1862年からニトログリセリンを爆薬として利用できるように研究をはじめました。実験中はたびたび事故にみまわれ、1864年9月には研究所に保管していたニトログリセリン125キロが爆発しました。弟のエミール、技師のヘルツマン、女中のマリア、小使のヘルマン、大工のヨハン・ペーター・ナイマンを亡くしました。1866年、ノーベルの研究はついに実を結びました。完成した爆薬を「ダイナマイト」と命名し、ゲーストハハト郊外のクリュンメル爆薬工場で生産を開始しました。"
 mendelejew.11.g: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetSheHe]は社長にでもなるつもりか？"
 mendelejew.12.t: "[SCOPE.sCharacter('mendelejew_chemist_scope').GetFullName]がフラウンホーファー線の正体を解明"
 mendelejew.12.d: "太陽のスペクトル中にみられる細かな暗線の正体については、これまで長い間さまざまな仮説が出ていた。しかし現在、[SCOPE.sCharacter('mendelejew_chemist_scope').GetFullName]博士はとうとうその正体をつきとめた。この暗線は、特定の化学元素によって引き起こされていたのだ。これを利用して、天体にどのような元素が含まれているかを解明することもできるだろう。"
 mendelejew.12.f: "1813年、ヨゼフ・フラウンホーファーは太陽光のスペクトル中に暗線の存在を認めました。それから10年後、グスタフ・ロベルト・キルヒホフとロベルト・ブンゼンが暗線の正体を解明しました。2人はさまざまな元素や化合物を燃焼させたところ、元素がスペクトルの一部を吸収することを発見しました。この結果から、2人はスペクトルの一部吸収は、天体上層部に特定の元素や化合物が存在する証拠であると主張しました。\n\n分光法は天体を分類するにとどまらず、物質や化合物のスペクトル解析にも役立ちました。ヘリウムの発見も、太陽のスペクトル分析によって実現しました。"
 mendelejew.12.g: "またひとつ、宇宙の秘密が解明された！"
