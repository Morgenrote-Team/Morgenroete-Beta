 je_mendelejew_element_theory: "元素についての考察"
 je_mendelejew_element_theory_reason: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetFullName]は新元素の理論研究を進める。このプロセスが完了するまでの期間は、経験値やスキル、キャラクター特性、さらに観測所の研究所設備が大きく影響する。現在#YELLOW 元素番号[ROOT.Var('mendelejew_thought_variable').GetValue|0]#!を研究中。"
