 mendelejew_synthetic_rubber_tech: "合成ゴム"
 mendelejew_synthetic_rubber_tech_desc: "合成ゴムとは人工的なゴム性物質（エラストマー）。高分子（ポリマー）とも呼ばれ、石油精製過程で発生する材料を合成して作られます。天然ゴムと比べて耐熱性・耐油性に優れています。"
 building_mendelejew_synthetic_rubber_factory: "合成ゴム工場"
 pmg_mendelejew_isoprene: "イソプレン"
 pm_mendelejew_isoprene: "イソプレン"
 je_mendelejew_synthetic_rubber_reason: "1860年頃、チャールズ・ハンソン・グレヴィル・ウィリアムズが天然ゴムからイソプレンの精製に成功、その化学式をC5H8と定めました。1879年にはギュスターヴ・ブシャルダーが世界初の合成ゴムの生産に成功。これは天然ゴムから抽出したイソプレンを塩酸と混ぜて加熱することでゴムに似た物質を生産する方法で、作るまでに数カ月を要しました。1900年頃、イワン・コンダコフが2,3-ジメチルブタジエンからゴム性物質を生産。これが世界初の天然ゴム以外から作られた合成ゴムでした。1909年、フランツ・ホフマンが合成ゴムの生産法で初の特許を取得。いわゆる「メチルゴム」と呼ばれるもので、2,3-ジメチルブタジエンを重合することで生産します。"
 je_mendelejew_synthetic_rubber_goal: "#E 化学進捗#!が#ORANGE 75#!ポイント以上"
 mendelejew.702.t: "研究所産のゴム"
 mendelejew.702.d: "[GetPlayer.MakeScope.Var('mendelejew_chemist_var').GetCharacter.GetFullName]は化学史上に残る偉業をなしとげました。数年にわたる実験、新たな研究施設の建設の末、わが国の主任化学者が合成ゴムの生産に成功しました。これは化学産業そのものを大きく変えてしまうでしょう。"
 mendelejew.702.f: "2つの大戦中、ドイツは天然ゴムの貿易ルートを失い、代替物質の獲得が急務となりました。第一次世界大戦中、バイエル社のレーバークーゼン工場はフリッツ・ホフマン法を用いて約2500トンのメチルゴムを生産しました。1926年、IGファルベン社レーバークーゼン工場のドイツ人化学者ヴァルター・ボックとエドゥアルド・チュンカーが世界初の商用利用可能な合成ゴム「スチレン・ブタジエンゴム（SBR）」を発明し、1927年1月15日に特許を取得しました。"
 mendelejew.702.g: "ラテックスアレルギーとはおさらばだ！"
