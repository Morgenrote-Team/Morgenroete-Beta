 mendelejew_chemist_synthetic_oil_cost_modifier: "人工石油の研究"
 je_mendelejew_synthetic_oil: "石炭液化の研究"
 je_mendelejew_synthetic_oil_reason: "石炭液化（石炭水素化、現代ではCtLとも）とは、炭素化学プロセスのひとつです。褐炭や無煙炭から液状の基礎科学品や、ガソリン、ディーゼル、灯油などの合成燃料を生産します。1910年から1925年にかけて、フリードリヒ・ベルギウスが高圧法を発明しました。さらにマティアス・ペーアが改良を加え、世界初の大規模な石炭液化プロセスを実現しました。このベルギウス・ペーア法は2段階に分けて行われました。また1925年、カイザー・ヴィルヘルム協会石炭研究所のフランツ・フィッシャー所長とハンス・トロプシュは触媒反応を利用した石炭液化法「フィッシャー・トロプシュ法」を発明しました。これは不均一触媒分野において最大級の発見であり、後世の科学・経済・社会に絶大な影響をあたえました。"
 je_mendelejew_synthetic_oil_goal: "#E 化学進捗#!が#ORANGE 150#!ポイント以上"
 mendelejew.701.t: "石炭から石油"
 mendelejew.701.d: "[GetPlayer.MakeScope.Var('mendelejew_chemist_var').GetCharacter.GetFullName]は化学史上に残る歴史的大発見をなしとげました。数年にわたって実験を繰り返し、新しい研究所も建設した末に、わが国の主任化学者はついに合成燃料の生産にこぎつけました。これは化学産業界をひっくり返す革命です。"
 mendelejew.701.f: "ガソリンの代替燃料を人工的に生産する研究は、第一次世界大戦後のドイツではじまりました。当時のワイマール共和国では、歴代政権が景況によって石油輸入が滞る可能性を懸念しており、自給自足体制の確立を求める声が高まっていました。またアメリカでも、拡大の一途をたどるモータリゼーションを背景に、科学者たちが世界に埋蔵されている石油はすぐに枯渇すると予想していました。こうした背景から、政府の援助を得たいくつかの研究施設や企業が研究を開始し、ドイツの豊富な埋蔵資源である石炭から代替燃料を精製する方法を研究しました。石油からガソリンを生成するはるか以前の19世紀初頭には、すでに石炭にベンゼンが含有されていることが判明していました。そして1913年、ドイツの化学者フリードリヒ・ベルギウスは石油水素化技術の特許を取得しました。共同研究者のカール・ボッシュとともにノーベル賞を受賞しました。"
 mendelejew.701.g: "石油サプライの自給自足手段を得た"
 mendelejew_chemist_periodic_table_inventor: "周期表の発明者"
 mendelejew_chemist_periodic_table_inventordesc: "このキャラクターは周期表の発明者であり、元素の理論化をこれ以上ないほど得意としています。"
 mendelejew.801.t: "元素周期表"
 mendelejew.801.d: "[GetPlayer.MakeScope.Var('mendelejew_chemist_var').GetCharacter.GetFullName]はこれまで解明された化学元素を体系化し、さらに未知の元素の存在まで予言しました。事前の予想どおり、元素を並べ替えると、その性質は周期的に現れました。この周期性から[GetPlayer.MakeScope.Var('mendelejew_chemist_var').GetCharacter.GetLastName]博士は新たな元素配列体系を「元素周期表」と名付けました。"
 mendelejew.801.f: "現代の周期表を発明したのはロータル・マイヤーとドミトリー・イワノヴィッチ・メンデレーエフです。2人とも1869年に研究成果を発表し、1882年にはイギリス王立協会がその功績を称えてデービーメダルを授与しました。今日、周期表の発明者として名前がよく挙がるのはメンデレーエフのほうで、マイヤーはあまり言及されません。理由としては、マイヤーの周期表はメンデレーエフから数ヶ月遅れて発表されており、またメンデレーエフが当時発見されていなかった元素の性質も予言していたからです。ロシアでは現在も周期表を「メンデレーエフ表」と呼んでいます。メンデレーエフもマイヤーも、お互いの研究内容を知りませんでした。またメンデレーエフは、1862年のベギエ・ド・シャンクルトワ、1863〜64年のニューランズ、1866〜67年のヒンリヒスの先行研究の内容も知らなかったといわれています。"
 mendelejew.801.g: "いまでは化学もれっきとした科学だ"
 je_mendelejew_periodic_table: "元素の配列"
 je_mendelejew_periodic_table_reason: "19世紀初頭、元素間になにかしらの規則性があることはすでに着目されつつありました。しかし当時は原子量がまだ解明されておらず、まして未知の元素も多く残っており、解明には時間がかかりました。まずデーベライナーが、元素ごとの原子の重さと性質には何らかのつながりがあることを提唱しました。また1824年には、ファルクナーが自然元素族体系を公表しました。しかし、いまだ大きなブレイクスルーには至っていません。"
