 je_mendelejew_element_discovery: "元素解明"
 je_mendelejew_element_discovery_reason: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetFullName]は新元素発見にむけて日夜研究に励んでいる。このプロセスが完了するまでの期間は、経験値やスキル、キャラクター特性、さらに観測所の研究所設備が大きく影響する。現在#YELLOW 元素番号[ROOT.Var('mendelejew_searched_variable').GetValue|0]#!を研究中。 "
 je_element_discovery_failed_tt: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]博士よりも先に別の国が元素を発見する"
 je_mendelejew_element_isolation: "元素の観察"
 je_element_isolation_failed_tt: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]博士よりも先に別の国が元素の単離に成功する"
 mendelejew.101.t: "新元素の理論"
 mendelejew.101.d: "多大な研究と調査のすえ、[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]博士は未知の元素について確固たる仮説を立てた。化学者はこの未知の元素に#YELLOW 元素番号[ROOT.Var('mendelejew_thought_variable').GetValue|0]#!を割り当てた。しかし、まだ実際に発見されてはいない。"
 mendelejew.101.f: "「化学元素」の用語の初出は17世紀にさかのぼる。当時すでに錬金術の用語として「元素」が存在していたが、さまざまな物体の性質や、物体同士の反応について科学的に説明できなくなっていた。そうした中、1661年にロバート・ボイルが『懐疑的化学者』を発表、錬金術の不備をするどく批判した。このなかでボイルは化学元素について、「他の物体でできているのでも、物体同士でできているのでもなく、混ざり合うことでその物体を構成する」、それ以上分解できない物体であると説明した。"
 mendelejew.101.g: "落ち着け、まだ仮説だ。化学者がそう言ってるだけだ！"
 mendelejew.102.t: "未知の元素？"
 mendelejew.102.d: "最近の研究で、[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]博士は現代の化学知識をふまえると、まだ判明していない未知の元素があるはずだと結論づけた。そのような結論に至った経緯は不明だが、とにかくすぐに仮説を立てるはずだ。"
 mendelejew.102.f: "元素（ストイケイア）という用語は、紀元前360年頃にギリシャの哲学者プラトンの対話編『ティマイオス』ではじめて登場した。『ティマイオス』には有機物と無機物についての議論や、また化学についての推測をもとにした論説が含まれていた。プラトンは、紀元前5世紀にエンペドクレスが提唱した四元素論を基に、四元素はそれぞれ正四面体（火）、正八面体（空気）、正二十面体（水）、正六面体（地）といった小さな立方体から構成されていると考えた。"
 mendelejew.102.g: "存在も定かではないものがあると、どうして分かるのか？"
 mendelejew.103.t: "外国が新元素を理論化"
 mendelejew.103.d: "わが国が誇る化学者にとって悔しい出来事だ。[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetSheHe]が先日某国で出版された雑誌の科学欄を読んだところ、なんと#YELLOW 元素番号[ROOT.Var('mendelejew_thought_variable').GetValue|0]#!についての仮説が掲載されていたのだ。これはくしくも[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]博士が理論化を進めていた元素だ。すべての研究が中止となった。"
 mendelejew.103.f: "「幸運はよく準備した者に微笑む」 -ルイ・パスツール"
 mendelejew.103.g: "偉そうに！こっちの論文も印刷までは終わっていたんだ！"
 mendelejew.111.t: "教授の不在問題"
 mendelejew.111.d: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetFullName]はすぐれた研究者であると同時に、教師としても優秀だ。しかし現在は元素研究にかかりきりであり、そのしわ寄せが授業に響いている。すでに講義やゼミがないがしろにされているとの苦情が申し立てられている。"
 mendelejew.111.f: "ドイツの化学者ユストゥス・フォン・リービッヒ教授は、その現代的な教育方法から生徒の人気が非常に高かった。やがて数々の業績や論文で世界的に有名になると、最盛期にはドイツ人生徒はもちろんのこと、イギリス人84名、アメリカ人18名を含む多くの外国人がギーゼン大学に押し寄せ、リービッヒの化学・薬学を公聴したという。"
 mendelejew.111.g: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]博士には研究に専念してもらおう"
 mendelejew.111.h: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]博士には授業に専念してもらおう"
 mendelejew.111.i: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]にはバランスを取ってもらおう"
 mendelejew.112.t: "ある夢"
 mendelejew.112.d: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetFullName]が言うには、理論化学上の問題に突き当たっていたが、ある夜それを解決するような夢を見たそうだ。"
 mendelejew.112.f: "「私は自分の教科書の執筆にとりかかっていたが、作業は進まなかった。私の考えば別の所にあった。椅子を暖炉のほうに向けて、寝ることにした。すると、またしても原子がまぶたの裏で飛びまわっていた。今度は小さなあつまりが、遠くでおとなしくしていた。こうした光景を何度も見ていた私の心の眼はますます明敏になっていて、より多彩な形をした、大きな構造を判別できるようになっていた。長い列が、まるでヘビのように近づいては絡み合い、よじれたりしていた。しかし見よ！あれは何だ？あるヘビが自分の尻尾をくわえ、私の目の前であざ笑うかのように回転している。まるで稲妻が走ったかのように、私は目を覚まし、そして一晩かけて仮説を立てた。紳士諸君、夢から学ぼう。うまくいけば真実を教えてくれるかもしれない……しかし起きているときの理解力で証拠をそろえない限り、夢を発表するのは控えたほうがいいだろう」 -アウグスト・ケクレ"
 mendelejew.112.g: "博士は寝ている間も研究を続けているというのか？"
 mendelejew.113.t: "化学の論文"
 mendelejew.113.d: "未知の元素にまつわる理論研究を進めるうち、副産物として一本の化学論文ができた。これまでのところ[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]博士は私的な利用にとどめるつもりだったが、博士の助手はただの草稿で終わらせるべきではないと述べ、論文として完成させて発表すべきだと主張している。"
 mendelejew.113.f: "化学を含めたほぼあらゆる学術分野において、当初の研究目標が達成できなくても、ほんの端書にしか残っていないような結果から、より重要な発見が見つかることもある。より革新的な発見に専念するあまり、一時的に目標を見失ってしまうことはしばしば起こりうる。"
 mendelejew.113.g: "私的な研究目的に留めておく"
 mendelejew.113.h: "この研究は授業で教えるべきだ"
 mendelejew.113.i: "発表すれば科学的価値がある！大々的に発表するぞ！"
 mendelejew.114.t: "白昼夢"
 mendelejew.114.d: "わが国の化学者である[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]博士は、今進めている研究を完成させるためには、特別休暇を取って疲れを取る必要があると申し立てた。そこで休暇を与えたが、あれから進捗は芳しくない。"
 mendelejew.114.f: "「すべての仮説が正しければ……この化学式が正しければ……そうすればきっと……あっリスだ！」"
 mendelejew.114.g: "化学者は日がな一日ダラダラしていたのか！？"
 mendelejew.115.t: "天文学と化学の協力"
 mendelejew.115.d: "化学者の[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]博士は天文学者の[ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName]博士と意見を交わしたところ、新元素の理論化において重大な進歩がみられたという。"
 mendelejew.115.f: "古来より化学と天文学は相互に影響を与えており、分光法の発見によってますます加速した。もともと分光学は、ウィリアム・ハイド・ウォラーストンが実験に利用した天体観測法のひとつだった。彼は世界初の分光計も発明し、太陽光線のスペクトル線を可視化した。のちにヨゼフ・フォン・フラウンホーファーによって研究が進み、太陽光線中の暗線を「フラウンホーファー線」と命名。さらにグスタフ・ロベルト・キルヒホフとロベルト・ブンゼンが、化学元素のスペクトル線にそれぞれ固有の本数とパターンがあることを発見した。2人は研究の結果、ウォラーストンとフラウンホーファーが観測した暗線は、太陽上層部のさまざまな元素によって吸収されたため生じており、従って太陽の光球にこうした元素が存在すると結論づけた。"
 mendelejew.115.g: "学問のジンテーゼだ！"
 mendelejew.201.t: "新元素の発見"
 mendelejew.201.f: "「今後も未知の元素の発見が多く期待される。例えば、アルミニウムとケイ素に類似した、原子量65から75の元素が存在するはずである」 -ドミトリー・メンデレーエフ"
 mendelejew.201.g: "で、味のほうは？"
 mendelejew.202.d: "わが国の代表的化学者[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetFullName]は、仮説段階の#YELLOW 元素番号[ROOT.Var('mendelejew_searched_variable').GetValue|0]#!の実在を確信しており、その発見を決断した。"
 mendelejew.202.f: "今日の定義における元素のうち、古代より純粋な形で知られていたのは炭素、硫黄、鉄、銅、亜鉛、銀、錫、金、水銀、鉛の10種類だった。これらは自然界に存在するか、あるいは鉱石から精製する過程で発見された。また中世鉱業史のなかで、エルツ山脈などの鉱山などから少量の未知の金属が含有されているのが発見され、山の精霊を意味するコバルト、ニッケルと呼ばれた。さらに1669年のヘニッヒ・ブラントによるリンの発見を皮切りに、大部分の元素が発見される時代に突入。1789年にはマルティン・ハインリヒ・クラプロートがピッチブレンドからウランを発見した。"
 mendelejew.202.g: "Elementary research."
 mendelejew.203.t: "外国が新元素を発見"
 mendelejew.203.d: "本日、[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]博士はとある会議の席上、ある海外の化学者が先んじて#YELLOW 元素番号[ROOT.Var('mendelejew_searched_variable').GetValue|0]#!の発見に成功したと知らされた。このニュースを聞いた博士は落胆し、すべての研究を中止した。"
 mendelejew.203.f: "「私は物理学や化学の論文に書かれたさまざまな実験を試し、ときには予想もしない結果にたどり着くこともあった。わずかな望外の成功に背中を押されることもあれば、私の経験不足から生じた事故や失敗によって深い絶望に陥ることもあった」 -マリー・キュリー"
 mendelejew.203.g: "この発見が誤りであると証明しなければ！"
 mendelejew.211.t: "新しい実験設備？"
 mendelejew.211.d: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]博士は、所属する大学の化学研究所が不十分であるとして不満を漏らしている。新しい機材の購入が強く求められている。さもなければ、新元素の発見は大幅に遅れる可能性がある。"
 mendelejew.211.f: "当時、研究所の開設や新しい装置や機材の購入は、けっして当然のことではなかった。19世紀初頭、多くの地域において化学はいまだに否定的に受け取られていた。ドイツの化学者ユストゥス・フォン・リービッヒは要職に就いていたが、それでも研究所の機材は自費で揃えなければならなかった。"
 mendelejew.211.g: "新しい研究所を建設し、最先端の機材を揃える"
 mendelejew.211.h: "大学で節約して新しい機材を買いなさい"
 mendelejew.211.i: "で？誰がこんなものに金を出す？"
 mendelejew.212.t: "未知の化合物"
 mendelejew.212.d: "#YELLOW 元素番号[ROOT.Var('mendelejew_searched_variable').GetValue|0]#!の発見に向けた研究中、[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]博士はこれまで知られていなかった化合物を発見した。これは工業でも実用性があるかもしれない。"
 mendelejew.212.f: "「化合物」とは、2種類以上の化学元素の原子が化合し、そうやって生じた多量の同一分子（あるいは分子実体）から構成される化学物質である。したがって単一の元素の原子から構成される分子は化合物ではない。化合物に化学反応を加えると異なる物質に変化したり、またその際に他の物体と反応しあうことがある。この過程で原子間の結合が崩壊したり、新しく化合することもある。"
 mendelejew.212.g: "素晴らしい！"
 mendelejew.213.t: "化学者の助手"
 mendelejew.213.d: "未知の#YELLOW 元素番号[ROOT.Var('mendelejew_searched_variable').GetValue|0]#!の発見をめざす[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]博士は、とある優秀な助手に大きく支えられている。一部の研究員は、単なる助手で終わらせるにはもったいないほどの働きぶりだと考えている。"
 mendelejew.213.f: "「私は化学現象や、時にはまったく異なる性質をもった物質同士のあいだに生じる反応に、すっかり虜になってしまった。私はこの世界の一側面を、もっともっと学びたいと願った」 -ライナス・ポーリング"
 mendelejew.213.g: "助手には元素研究に注力してもらおう"
 mendelejew.213.h: "この優秀な学者を後押しすべきだ"
 mendelejew.214.t: "粗悪なサンプル"
 mendelejew.214.d: "要約すると、[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]博士は数か月間も粗悪な試料を使って研究しており、そこから誤った結果を導き出したのだ。"
 mendelejew.214.f: "「ただの変色した石英だったとは、どういう意味かね！？」"
 mendelejew.214.g: "科学的後退である"
 mendelejew.215.t: "地質学と化学の協力"
 mendelejew.215.d: "化学者の[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]博士は地質学者の[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]博士と意見を交わしたところ、新元素の理論化において重大な進歩がみられたという。"
 mendelejew.215.f: "地質学者が分類した新たな鉱物がなければ、多くの化学元素は発見できなかっただろう。1839年ドイツ、スイスの化学者クリスティアン・フリードリヒ・シェーンバインは「地化学（geochemistry）」という用語を提唱。鉱物そのものにとどまらず、鉱物の組成や化学力学の観点をも探求するという概念が下敷きとなっている。"
 mendelejew.301.t: "新元素の単離"
 mendelejew.301.f: "「自然界では何も増えず、何も減らず、万物は変化する。我々はまず事実のみを信じるべきである。事実は自然界が我々に与えたものであり、欺くことはできない」 -アントワーヌ・ラヴォアジエ"
 mendelejew.301.g: "科学の勝利である"
 mendelejew.302.d: "#YELLOW 元素番号[ROOT.Var('mendelejew_examined_variable').GetValue|0]#!は「発見済」とされてはいるが、新元素は単離に成功して初めて存在が確認される。[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetFullName]は新元素の存在をこの目で確かめ、純粋な形で取り出す方法を見つけるべく、より徹底した調査を開始した。"
 mendelejew.302.f: "世界初の近代的元素表は、アントワーヌ・ラヴォワジエが1789年に著した『化学原論』に収録されたもので、光やカロリック（熱素）を含む33の元素が配置されていた。1818年にはイェンス・ヤコブ・ベルザリウスが登場判明していた全部49元素のうち、45元素の原子量を特定した。1869年、ドミトリー・メンデレーエフの元素周期表には63の元素が掲載されていた。"
 mendelejew.302.g: "研究所が保険に入っていればいいが"
 mendelejew.303.t: "他国が新元素の単離に成功"
 mendelejew.303.d: "悪い知らせだ！どうやら外国の化学者が#YELLOW 元素番号[ROOT.Var('mendelejew_examined_variable').GetValue|0]#!の単離に成功したようだ。[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]が費やしてきたすべての労力と希望は水泡に帰した。これから別の元素を研究したほうがいいかもしれない。"
 mendelejew.303.f: "「発想は正しくとも、タイミングが悪いということはある。私が周囲より成功したのだとしたら、それは主に（私に言わせればほぼ全て）ありふれた勤勉さのおかげだ」 -ジョン・ドルトン"
 mendelejew.303.g: "その科学の栄光はわが国のものになるはずだったのに……"
 mendelejew.311.t: "化学合成"
 mendelejew.311.d: "#YELLOW 元素番号[ROOT.Var('mendelejew_examined_variable').GetValue|0]#!の単離実験中、[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]博士はこれまで技術的に非常に困難とされてきた合成物質の精製に成功した。これは経済、工業、そしてもちろん科学に貢献してくれるだろう。"
 mendelejew.311.f: "化学合成とは、人工的な化学反応で単一ないし複数の物質を作ること。基本的に物理的・化学的に手を加えていくつかの反応を誘発させることで実施する。近代的な研究設備があれば、合成過程の再現性と安定性は向上する。化学合成にはいくつかの化合物（試薬、反応薬とも）を使用し、一定の条件下に置くことで物質を変化させる。さまざまな反応を使い分けることで、目標の物質を作る。化合物を組み合わせる際は、化学反応器や単純な丸底フラスコなどの反応容器を用いる。最終的な目標物質を単離するためには何らかの処理・精製プロセスが必要であり、そのために多くの化学反応が必要となる。"
 mendelejew.311.g: "素晴らしい"
 mendelejew.312.t: "化学的解離"
 mendelejew.312.d: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]博士による#YELLOW 元素番号[ROOT.Var('mendelejew_examined_variable').GetValue|0]#!の単離実験に進展がみられた。化学的解離によって、博士は飛躍的な前進をとげたのだ。"
 mendelejew.312.f: "Dissociation in chemistry is a general process in which molecules (or ionic compounds such as salts, or complexes) separate or split into other things such as atoms, ions, or radicals, usually in a reversible manner. For instance, when an acid dissolves in water, a covalent bond between an electronegative atom and a hydrogen atom is broken by heterolytic fission, which gives a proton (H+) and a negative ion. Dissociation is the opposite of association or recombination."
 mendelejew.312.g: "素晴らしい！"
 mendelejew.313.t: "職務放棄"
 mendelejew.313.d: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetFullName]が#YELLOW 元素番号[ROOT.Var('mendelejew_examined_variable').GetValue|0]#!の単離研究を担当している。これを口実にして、博士がアカデミーでのわずらわしい職務から逃げているのは有名な話だ。大学の会合や講義も欠席しており、とうとう学長も苦言を呈する事態となった。"
 mendelejew.313.f: "「生徒」と称する目ざわりな怪物から離れられるなら、言い訳はいくつあってもいい。"
 mendelejew.313.g: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]博士はもっと重大な研究に取り組んでいる"
 mendelejew.313.h: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]博士は他の職務もまっとうすべきだ"
 mendelejew.314.t: "予期せぬ化学反応"
 mendelejew.314.d: "化学実験中、[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]博士は何やらちょっとした見落としがあったようで、反応の大きさを小さく見積もってしまったらしい。"
 mendelejew.314.f: "新聞がしつこく報じているように、消防隊が消火活動で放水したところ、かえって化学反応を誘発させてしまった。生徒数名が煙を吸い込んだと訴えており、研究施設にも被害がおよんだ。大学の理学部棟は大きな被害を受けており、数か月、あるいは数年は閉鎖しなければならない。地元紙は[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]博士の声明を待っていたが、当の本人はすぐに退院したせいで捕まらなかった。どうやらテニス大会に参加しているらしい。"
 mendelejew.314.g: "なんてことだ！"
 mendelejew.315.t: "技師と化学者の協力"
 mendelejew.315.d: "化学者の[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]博士は元素の単離計画を進めていたところ、技師の[ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName]博士が科学機材の改良に力を貸してくれた。"
 mendelejew.315.f: "20世紀初頭、化学企業では化学者と機械技師が手を携え、かなりの負荷（600℃や100バール）にも耐えられる反応機やボイラーを設計した。こうした協力関係のひとつの到達点が機械工学という新しい分野を生み出し、その教え子たちが今日の化学産業を支えている。"
 mendelejew.401.t: "化学実験"
 mendelejew.401.d: "普段の仕事から離れて一息つくために、[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]博士は国内最大の研究所の一角を借りて、化学実験をおこないたいそうだ。すでに実験用の機器もそろえている。"
 mendelejew.401.f: "ときどき化学者とは、与えられた職務よりも抑えきれない興味のほうを優先したがる。その過程で工場での肥料等の化学製品の生産性工場につながることも珍しくない。成功するかどうかは、キャラクター特性とスキル、化学経験値に大きく左右される。"
 mendelejew.401.g: "この実験の結果が楽しみだ！"
 mendelejew.401.h: "バカなことはやめなさい"
 mendelejew.402.t: "実験成功"
 mendelejew.402.d: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]博士は正しかった。この前の実験で、有益な知見を得たのだ。新しく発見した化学手法は、今後数年の農業・工業に影響をあたえるだろう。いずれは[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetHerHim]の名前を冠した手法として世に広まるかもしれない。"
 mendelejew.402.f1: "実験の結果、[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetFullName]はすぐれた肥料を発明した。これで今後数年間の収穫量増大は確実だ。"
 mendelejew.402.f2: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetFullName]は革新的プロセスを経て、特殊な肥料を開発した。プランテーション農園で特に効果を発揮するだろう。"
 mendelejew.402.f3: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetFullName]が発明した新たな手法のおかげで、化学工場の生産性は大幅に向上するだろう。"
 mendelejew.402.g: "成功だ！"
 mendelejew.403.t: "実験失敗"
 mendelejew.403.d: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetFullName]の研究には他の科学者も高い期待を寄せていたが、[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetHerHis]の実験は成功しなかった。[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetSheHe]は貴重な時間を浪費した。これなら元素研究をしていたほうがよっぽどマシだった。"
 mendelejew.403.f: "「いや、確かに予想通りとはいかなかった。しかし研究所が爆発したかっただけ幸いだ！」"
 mendelejew.403.g: "失望した"
