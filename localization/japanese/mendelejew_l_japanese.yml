 mendelejew_lauded_congress_modifier: "化学会議での称賛"
 mendelejew_stop_chemistry_project_button: "化学プロジェクトの中止"
 mendelejew_stop_chemistry_project_button_desc: "化学プロジェクトを中止する。現在の化学進捗はゼロになる。"
 mendelejew_stop_chemist_improving_project_tt: "You decided to stop the project by clicking the #italic Stop Chemistry Project#! button or you do not have a [concept_mendelejew_chemist]."
 mendelejew_conference_chemist_double_vote_tt: "経験豊富な化学者を雇用しているため、わが国の投票数は#G 2倍#!になっている"
 mendelejew_conference_chemist_triple_vote_tt: "著名な化学者を雇用しているため、わが国の投票数は#G 3倍#!になっている"
 je_mendelejew_improve_fertilizer_project: "肥料の改良"
 je_mendelejew_improve_explosives_project: "爆薬の改良"
 je_mendelejew_improve_synthetics_project: "合成物質の改良"
 mendelejew_synthetic_fuel_tech: "合成燃料"
 mendelejew_synthetic_fuel_tech_desc: "ベルギウス＝ペーア法とは、石炭を直接水素化することで石炭液化を精製する、大がかりな化学法です。石炭は高分子で構成されていますが、高温高圧下で水素と反応させることで、より小さな分子に分解されます。こうして気化・液化した炭化水素が精製され、燃焼や潤滑油に利用できます。1910年から1925年にかけてドイツの化学者フリードリヒ・ベルギウスが基礎理論を構築しました。その後はBASF社のマティアス・ベーアが中心となって、ベルギウス法の商業化と触媒の開発を牽引しました。"
 mendelejew.501.t: "人類への貢献"
 mendelejew.501.d: "[SCOPE.sCharacter('mendelejew_chemist_scope').GetFullName] has initiated a revolution in the country's fertilizer factories. New chemical processes and methods have significantly improved production and efficiency. There is already talk that Dr. [SCOPE.sCharacter('mendelejew_chemist_scope').GetLastName] has made a significant contribution to combating world hunger.\n\nTotal improved buildings: [GetPlayer.MakeScope.Var('mr_num_improved_chemical_plants_buildings_var').GetValue|V0]"
 mendelejew.501.f: "「わが社の最新肥料があれば、農家の収穫量はぐんぐん上昇します！まさに人類にとっての大きな一歩！教師がなし遂げた偉大な功績です！あの人は本当に天才ですよ。わたしにも大金が入ってきますが、そこは些事ですからな。記事には載せなくても構いません。まあ、私がこの前のゴルフ大会で優勝したのは好きなだけ書いてもらっていいんですがね」"
 mendelejew.501.g: "もっと、万人に硝酸塩を！"
 mendelejew.502.t: "鉱業への貢献"
 mendelejew.502.d: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetFullName] has initiated a new phase of mining in our country by patenting new processes in the production of explosives. With the new formula that Dr. [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] has developed, production has become more efficient and fewer materials are required.\n\nTotal improved buildings: [GetPlayer.MakeScope.Var('mr_num_improved_explosives_factory_buildings_var').GetValue|V0]"
 mendelejew.502.f: "'Of course, these explosives will not make the miners safer. But if they are successful, then they are even more successful now. I have assured myself of the explosive power of our new dynamite - invented by Dr. [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] - and discovered that the miners now have to work less than ever. Basically they should pay me because there's nothing left to do other than sweep up some debris.'"
 mendelejew.502.g: "もっと、万人にニトログリセリンを！"
 mendelejew.503.t: "国家主権への貢献"
 mendelejew.503.d: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetFullName] has initiated a significant change in the production of synthetic products. With the refinement of some formulas and improved processes, even more products can now be produced with less effort. [GetPlayer.GetName] has become more independent than ever from abroad and Dr. [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] is already considered a national hero.\n\nTotal improved buildings: [GetPlayer.MakeScope.Var('mr_num_improved_synthetics_factory_buildings_var').GetValue|V0]"
 mendelejew.503.f: "'Essentially, it is a patriotic duty to purchase our new synthetic products. They are invented by the [ROOT.GetCountry.GetAdjectiveNoFlag] Scientist Dr. [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] made by [ROOT.GetCountry.GetAdjectiveNoFlag] workers in [ROOT.GetCountry.GetAdjectiveNoFlag] factories from - more or less - [ROOT.GetCountry.GetAdjectiveNoFlag] resources. And hopefully you want to be a good, patriotic citizen? Then the higher price should be worth something to you, after all it's about the fatherland.'"
 mendelejew.503.g: "もっと、万人に合成製品を！"
 mendelejew.601.t: "国際化学会議"
 mendelejew.601.d: "[ROOT.GetCountry.GetCapital.GetCityHubName]にて、もうすぐ世界最大の国際化学者会議が始まります。[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetFullName]はこの日のために入念な準備を進め、世界でも屈指の専門家たちに出席を呼びかけました。あとは招待状を送るだけです。"
 mendelejew.601.f: "19世紀中盤になると、化学は科学分野のひとつとして確立されましたが、その理論にはまだ大きな相違がありました。さまざまな「学派」が乱立して異なる主張をし、なかでも原子や分子構造の問題は意見が割れていました。ジョン・ドルトンの研究によって、原子や分子が化合物の最小構成単位であることは広く受け入れられていましたが、その構造についてはまだ判明していませんでした。ほかにも原子量の基準、用語の意味や使い方、化学式の正書法についても意見の相違や矛盾が多くありました。しかしこうした問題を議論しようにも、議論できるフォーラムが存在しませんでした。こうしたなか、3人の若い化学者たちが動きました。彼らは世界中の化学者たちとともに、疑問点について意見を交わす会議を開くことにしました。こうして3人はヨーロッパ各地の著名な化学者に招待状を送り、1860年9月3日から5日までカールスルーエで会議を開きました。"
 mendelejew.601.g: "会議はスープ、賓客は塩だ"
 mendelejew.602.d: "[SCOPE.sCountry('mendelejew_congress_host_country').GetName]が国際的な化学会議の招待状を送ってきました。どうやら化学者が一同に介し、原子量の国際的基準を決めるために討議するようです。ついては[SCOPE.sCharacter('mendelejew_chemist_scope').GetLastName]博士もぜひご参加を、とのことです。"
 mendelejew.602.g: "すぐに返事を！"
 mendelejew.604.t: "原子量"
 mendelejew.604.d: "会議は出だしこそ順調でしたが、原子量の国際的基準をめぐる議論になると、いきなり頓挫しました。民族主義的な学者グループは、これまで自国で使ってきた体系を手放そうとしません。"
 mendelejew.604.f: "1860年カールスルーエ化学会議では、いくつか結論が出なかった議題もありました。なかでも大きな争点が、原子量・分子量の国際統一基準の制定です。これまでの研究により、原子が物体の最小単位であり、原子が集まってできたのが分子であることは共通認識として普及していましたが、原子量の基準は国ごとにまちまちでした。一例として、水素を基準点にして原子量1と定め、炭素に6、酸素に8を割り当てる基準体系が存在しました。原子量がバラバラのままでは、実験に使う化合物の元素組成が本当に正しいかどうかが確定しません。当時すでに5つの基準体系が存在しており、それぞれ変換方式が複雑だったため、化学者のなかには1つの体系以外は一切使わない者も少なくありませんでした。"
 mendelejew.604.g: "これだけ意見が割れるなら、古い体系を捨てる道理もない"
 mendelejew.604.h: "世界統一の原子量基準が必要だ"
 mendelejew.605.t: "国際化学会議"
 mendelejew.605.d: "科学会議の裏で、[SCOPE.sCharacter('mendelejew_chemist_scope').GetLastName]博士は世界中からあつまった多くの優秀な化学者たちと出会い、アイデアを交換する機会にめぐまれました。このまたとないチャンスを最大限に活かすためには、どうすればいいでしょうか。"
 mendelejew.605.f: "「さまざまな法則を理解するためには仮説が必要だが、これはまったく驚くべきことではない。あたらしい学問をまなぶ人の頭脳が、その学問がたどってきた歴史的進化のすべてを見直してみる必要に迫られる事例は、往々にしてある」\nスタスニラオ・カニッツァーロ"
 mendelejew.605.g: "化学者は将来について新しい知見を集めようとする"
 mendelejew.605.h: "化学者は現在の研究課題の解決策を見つけようとする"
 mendelejew.605.i: "化学者はまず助手を向かわせ、何かを学ばせるべきだ"
 mendelejew.609.t_national: "化学会議、結論を得ぬまま終了"
 mendelejew.609.d_national: "3日間に渡って、主賓と化学分野の専門家たちはどうにか意見をまとめようとしたが、結局原子量についての統一基準を制定することはできませんでした。各国は今後も古い体系にしがみつくでしょう。いずれまた会議の場を設ける必要があります。"
 mendelejew.609.f_national: "カールスルーエ国際化学会議は、科学分野の専門家を集めた世界初の会議でした。決定的な結論は出ませんでしたが、それでも19世紀化学史におけ最大のイベントと評価されています。内外からあつまった多くの化学者が顔を合わせたことは、のちの理論化学のさらなる発展につながりました。"
 mendelejew.609.g: "化学は数年後退した"
 mendelejew.609.t_international: "化学会議、合意を得て終了"
 mendelejew.609.d_international: "ありがたいことに、出席した化学者たちは原子量基準を統一することに成功しました。化学者たちがアメデオ・アボガドルの原子量仮説を参考にして制定された新しい基準は、いまや国際的に承認されています。[SCOPE.sCharacter('mendelejew_chemist_scope').GetLastName]博士は本日手紙を書き、会議の成功を喜んで伝えています。"
 mendelejew.609.f_international: "カールスルーエ国際化学会議の長期的成果として、現代とほとんど同じ原子量の基準が広く認められるようになりました。カールスルーエ会議のあと、水素の原子量を1と定め、炭素を12、酸素を16に割り当てる方式が広まりました。これは水素、窒素、酸素などの元素は2つの原子からなる「2原子分子」であって、単一の原子ではないという考え方が下敷きとなっています。"
 mendelejew.609.h: "化学界は目覚ましい進歩を遂げた！"
 mendelejew.201.d: "膨大な時間をかけて数えきれないほどの資材を調査した結果、[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]博士はついに目標を達成しました。調査結果が正しければ、これまで長らく仮説段階にすぎなかった#YELLOW 元素番号[ROOT.Var('mendelejew_searched_variable').GetValue|0]#!がついに発見されたのです。[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]博士はこの新元素を#YELLOW [SCOPE.GetRootScope.GetCountry.GetCustom('mendelejew_element_name')]#!と命名しました。"
 mendelejew.301.d: "もはや疑う余地はない。#YELLOW 元素番号[ROOT.Var('mendelejew_examined_variable').GetValue|0]#!は実在しています。そして最新の化学法を使って単離することにも成功しました。今日はまさしく、わが国にとって偉大な日です！"
 je_mendelejew_element_isolation_reason: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetFullName]は新元素の単離にむけて日夜研究に励んでいます。このプロセスが完了するまでの期間は、経験値やスキル、キャラクター特性、さらに観測所の研究所設備が大きく影響します。現在#YELLOW 元素番号[ROOT.Var('mendelejew_examined_variable').GetValue|0]#!を研究中。 "
