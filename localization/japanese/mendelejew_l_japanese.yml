 je_mendelejew_chemical_research_project_reason: "[ROOT.GetCountry.GetCustom('je_mendelejew_chemical_research_project_type')]多忙ではない[concept_mendelejew_chemist]は、化学研究に従事する。研究プロジェクトは毎月ごとに一定の進捗ポイントが貯まる。進捗ポイントが36に達すると、小規模の技術ボーナスを得る。\n$mr_divider_for_je$\n次にボーナスを得る技術 : [ROOT.GetCountry.GetCustom('mendelejew_chemist_next_technology_type')]\n$mr_divider_for_je$\n現在の月間進捗 : #underline #tooltip:[GetRawTextTooltipTag('mendelejew_monthly_chemist_improvement_progress_var_tt')] [JournalEntry.MakeScope.GetVariable('mr_monthly_progress_var').GetValue|2+]#!#!\n現在の総進捗ポイント : [JournalEntry.MakeScope.GetVariable('mr_je_progress_var').GetValue|2+] / 36"
