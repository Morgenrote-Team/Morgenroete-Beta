 gaudi.1111.t: "The Irrigation System of [GetPlayer.GetName]"
 gaudi.1111.d: "Our [concept_tesla_civil_engineer][GetPlayer.MakeScope.GetCountry.GetCustom('gaudi_dr_engineer_type')] has finally completed the project to construct a modern irrigation system in [GetPlayer.GetNameNoFormatting]. Now that we tamed rivers and brought water to the fields our agriculture will surely grow!"
 gaudi.1111.f: "\"The wild rivers are now tamed. The magic has disappeared. It is just straight waterways now. Even the beaver disappeared...\""
 gaudi.1111.g: "I hope this won't have unforseen consequences..."
