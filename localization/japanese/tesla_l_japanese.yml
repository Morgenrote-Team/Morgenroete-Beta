l_japanese:
  ### 2.3.0 ### 
  
 tesla_prototype_mechanical_computer_modifier: "Mechanical Computer Prototype" #NT!
 tesla.223.t: "A first Prototype" #NT!
 tesla.223.d: "In [ROOT.Var('gaudi_engineer_var').GetCharacter.GetHerHis] quest to build a Mechanical Computer, Dr. [ROOT.Var('gaudi_engineer_var').GetCharacter.GetLastName] was able to finish a first prototype that can perform simple calculations. Although not as powerful as a real computer, this device could help our scientists." #NT!
 tesla.223.f: "It is not yet able to do all calculations, but at least a few. Addition, Subtraction, Multiplication and Division shouldn't be a probblem. But be aware that one of my assistants nearly lost his finger, when the machine was running." #NT!
 tesla.223.g: "I hope [ROOT.Var('gaudi_engineer_var').GetCharacter.GetSheHe] will finish more than just a prototype..." #NT!
 tesla.224.t: "Feature Creep" #NT!
 tesla.224.d: "It seems as if Dr. [ROOT.Var('gaudi_engineer_var').GetCharacter.GetLastName] is full of ideas. Not a day goes by without adjustments to the Mechanical Computer's plans. The only question is whether the project will ever be completed." #NT!
 tesla.224.f: "\"But just imagine if it could also play music! Wouldn't that be great?\"" #NT!
 tesla.224.g: "Would you please just build that computer?" #NT!
 tesla.224.h: "Threaten to cut funding" #NT!
 tesla.225.t: "Fire damages Mechanical Computer" #NT!
 tesla.225.d: "A huge fire has damaged parts of Dr. [ROOT.Var('gaudi_engineer_var').GetCharacter.GetLastName]'s mechanical computer and destroyed some plans for it. We do not yet know how much this will set the project back." #NT!
 tesla.225.f: "The fire broke out at the printer module of the computer. No one knows exactly what caused it but it seems that the printer produced large amounts of paper." #NT!
 tesla.225.g: "Will this computer ever be built?" #NT!
 tesla.225.h: "Send them additional funding." #NT!
