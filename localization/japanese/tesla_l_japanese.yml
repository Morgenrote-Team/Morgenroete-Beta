 je_tesla_transatlantic_cable: "The Transatlantic Cable"
 je_tesla_transatlantic_cable_reason: "The construction of a submarine telegraph cable consists of three phases. In the first phase, additional investors are sought and planning begins. In the second phase, the cable is laid. In the third phase, the final preparations for commissioning are made.\n\nTwo metrics are crucial for the project's success: #O Cable Progress#! and #O Shareholder Confidence#!. Progress determines how long construction will take, and the [concept_tesla_engineer]'s skills are crucial here. Confidence depends heavily on the company's [concept_executive]. If confidence falls to zero, the project is considered so hopeless that it is doomed to failure. It is important to avoid a drop in confidence to zero at all costs.\n\nLaying the cable underwater doesn't necessarily lead to success. Historically, the first transatlantic cable was a failure. However, the company can recover from such a setback if shareholder confidence remains strong. In that case, a new cable will be laid. Should a first attempt fail, the chance of a successful second attempt is guaranteed."
 je_tesla_suez_india_cable: "The Suez India Cable"
 je_tesla_suez_india_cable_reason: "The construction of a submarine telegraph cable consists of three phases. In the first phase, additional investors are sought and planning begins. In the second phase, the cable is laid. In the third phase, the final preparations for commissioning are made.\n\nTwo metrics are crucial for the project's success: #O Cable Progress#! and #O Shareholder Confidence#!. Progress determines how long construction will take, and the [concept_tesla_engineer]'s skills are crucial here. Confidence depends heavily on the company's [concept_executive]. If confidence falls to zero, the project is considered so hopeless that it is doomed to failure. It is important to avoid a drop in confidence to zero at all costs.\n\nLaying the cable underwater doesn't necessarily lead to success. Historically, the first transatlantic cable was a failure. However, the company can recover from such a setback if shareholder confidence remains strong. In that case, a new cable will be laid. Should a first attempt fail, the chance of a successful second attempt is guaranteed."
 je_tesla_transpacific_cable: "The Transpacific Cable"
 je_tesla_transpacific_cable_reason: "The construction of a submarine telegraph cable consists of three phases. In the first phase, additional investors are sought and planning begins. In the second phase, the cable is laid. In the third phase, the final preparations for commissioning are made.\n\nTwo metrics are crucial for the project's success: #O Cable Progress#! and #O Shareholder Confidence#!. Progress determines how long construction will take, and the [concept_tesla_engineer]'s skills are crucial here. Confidence depends heavily on the company's [concept_executive]. If confidence falls to zero, the project is considered so hopeless that it is doomed to failure. It is important to avoid a drop in confidence to zero at all costs.\n\nLaying the cable underwater doesn't necessarily lead to success. Historically, the first transatlantic cable was a failure. However, the company can recover from such a setback if shareholder confidence remains strong. In that case, a new cable will be laid. Should a first attempt fail, the chance of a successful second attempt is guaranteed."
 je_engineer_dies_tt: "The Journal Entry will be invalidated if the [concept_tesla_engineer] dies."
 tesla.3001.t: "A Cable Across the Sea"
 tesla.3001.d: "[SCOPE.sCharacter('tesla_telegraph_boss_scope').GetFullName], the director of a leading telegraphy company has presented an ambitious plan: the construction of a submarine telegraph cable that would connect distant shores and bring nations closer through instant communication. To fund this effort, shares are now being offered in a newly formed cable company. As a gesture of confidence, the company has formally requested state participation, arguing that the project serves both commercial and national interests."
 tesla.3001.f: "It begins not with ships or signal lines, but with ink and confidence. Contracts are signed, prospectuses printed, and speeches given in salons and stock exchanges alike. The cable exists, for now, only as a promise—and as a question: who will invest in the future? The company's leader speaks of unity, vision, and progress. Others speak of risk. And the state must now decide what role it will play in this undertaking of wires and water."
 tesla.3001.g: "The state will participate in this venture."
 tesla.3001.h: "The company wants to build the cable, so they should pay for it."
 tesla.3002.t: "Enthusiastic Investors"
 tesla.3002.d: "A group of ambitious industrialists and financiers from [SCOPE.sState('tesla_fund_state').GetName] has come together to support the effort of laying a submarine telegraph cable. Their investment is seen as a strategic move to secure future communications infrastructure and gain early access to transoceanic markets."
 tesla.3002.f: "The investors are not philanthropists, nor visionaries in the romantic sense. But they understand the value of information—how quickly it travels, how securely it arrives, and who controls its flow. By pooling their capital into the cable company, they are betting on a world where distance becomes a matter of milliseconds. Some see in their enthusiasm a mark of progress; others a sign that even communication is now subject to speculation. Regardless, the project moves forward with newfound momentum."
 tesla.3002.g: "A commendable initiative!"
 tesla.3003.t: "A Political Cable?"
 tesla.3003.d: "Several prominent members of the [SCOPE.gsInterestGroup('tesla_fund_ig').GetName] have publicly expressed their intent to invest in the submarine cable venture. Though not previously associated with the Telegraph Company, their support appears both ideological and strategic—positioning themselves as champions of modernity while gaining influence over a vital communications link."
 tesla.3003.f: "At first glance, the offer seems like a welcome infusion of capital and political goodwill. Yet behind the investment lies the question of influence. A powerful opposition party securing stakes in a critical piece of infrastructure could shift not just market dynamics, but also the balance of national policy. Control over communications—who builds them, who maintains them, and who pays for them—has never been merely a technical matter. Some within the company warn that opening the door now may make it difficult to close later."
 tesla.3003.g: "This will promote trust in the project."
 tesla.3003.h: "This will promote the work of our engineer."
 tesla.3003.i: "This interest group is far too powerful"
 tesla.3004.t: "Reluctant Investors"
 tesla.3004.d: "Capitalists in [SCOPE.sState('tesla_fund_state').GetName] have shown little enthusiasm for the submarine cable project. While not hostile, they express serious doubts about its profitability and long-term viability. Some within the board propose launching a publicity campaign to reassure the region's financial elites—though this would require diverting funds from the project itself."
 tesla.3004.f: "They speak of risk margins, opportunity costs, and technological uncertainty. To them, the cable is not a marvel, but a wager—one with uncertain returns. Without visible proof of its success, they prefer to wait, or to stay out entirely. Yet influence flows with money, and their absence may weaken the project's credibility. A carefully crafted narrative might sway them—but every coin spent on persuasion is one less for steel, cable, and ships."
 tesla.3004.g: "Let them miss the opportunity. We move ahead regardless."
 tesla.3004.h: "Allocate funds from the project for a promotional campaign!"
 tesla.3005.t: "Industrialists Give Their Backing"
 tesla.3005.d: "Thanks to the personal efforts of the telegraph company's director—and his longstanding relationships within the cabinet—the influential industrialist faction has decided to endorse the submarine cable initiative. Their political position allows them to channel both private capital and public confidence into the project, giving it renewed momentum."
 tesla.3005.f: "Success in business often hinges not only on plans and calculations, but on trust. When the right hands shake, even the most hesitant investors begin to look differently at the balance sheets. With the industrialists on board, the cable project gains a powerful ally—one with the means to finance, protect, and promote it. Some may criticize the blurring of public and private interest, but few deny the results."
 tesla.3005.g: "Thank you, [SCOPE.sCharacter('tesla_telegraph_boss_scope').GetFullName]!"
 tesla.3006.t: "Nervous Shareholders"
 tesla.3006.d: "In [SCOPE.sState('tesla_fund_state').GetName], a group of regional shareholders has grown increasingly uneasy with the slow progress and mounting costs of the submarine cable project. Fearing long-term losses, they are now considering divesting their shares. Company leadership suggests that a limited buyout by the state could restore confidence—but such a move may set a precedent for future expectations."
 tesla.3006.f: "What began as whispers in the boardroom is now a full-throated call to exit. The investors cite project delays, unforeseen engineering costs, and vague returns. Some see panic; others see rational caution. If they walk away now, confidence may collapse elsewhere. But if the state steps in as buyer of last resort, it may reassure markets—at the price of entanglement."
 tesla.3006.g: "Stabilize the market—buy shares through the state."
 tesla.3006.h: "If they lack vision, they are free to exit."
 tesla.3007.t: "Engineering Breakthrough"
 tesla.3007.d: "The chief engineer of the cable project has submitted a revised set of plans that address several of the key technical uncertainties. [ROOT.Var('tesla_engineer_var').GetCharacter.GetFullName]'s' findings detail improvements in laying technique, insulation durability, and signal stability. The company board has unanimously endorsed the new approach, citing it as a major step forward."
 tesla.3007.f: "The schematics are meticulous. Every cable segment, every relay station, every voltage constraint is accounted for. What once seemed distant and speculative now begins to take on the contours of a workable system. Investors who had begun to waver now speak of long-term strategy and infrastructure legacy. When vision is matched by engineering, confidence tends to follow."
 tesla.3007.g: "Wonderful news!"
 tesla.3007.h: "This will reassure shareholders."
 tesla.3011.t: "Cable-Laying Ship Departs"
 tesla.3011.d: "The cable-laying vessel has departed from port, marking the transition from planning to execution. Loaded with precision instruments, insulated wire, and critical supplies, it also carries the project's chief engineer, [ROOT.Var('tesla_engineer_var').GetCharacter.GetFullName], who personally oversees the technical operation. With the ship now underway, the success of the cable project depends on careful work across thousands of kilometers of open sea."
 tesla.3011.f: "There was no grand ceremony—only the slow pull of ropes and the churn of the screw as the ship eased into the channel. For [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName], it was a moment of concentration, not celebration. Diagrams were checked again, tolerances reviewed, sea charts unfurled across damp wood. The weight of steel and ambition now rests on a vessel far from shore. What had been paper and speech is now reality—coiled, loaded, and cast into the deep."
 tesla.3011.g: "Bon voyage!"
 tesla.3012.t: "A Stowaway Below Deck"
 tesla.3012.d: "Several days into the cable-laying mission, the crew discovers a young man hiding among the lower storage compartments. He identifies himself as a student of natural history, claiming he smuggled himself aboard to study deep-sea fauna—an academic pursuit he could not afford to fund through official channels. While some officers view his presence as naïve curiosity, others suspect espionage on behalf of a foreign rival."
 tesla.3012.f: "The youth speaks in precise, unthreatening language—naming species, citing geological strata, nervously referencing books and lectures. Yet suspicion spreads fast aboard a ship where security is paramount and disruption can be fatal. Whispers suggest he may be no student at all, but an agent sent to compromise the mission. The captain now faces a difficult choice. To cast him into the sea would end the matter swiftly. To keep him aboard risks delay, division—and worse."
 tesla.3012.g: "Tolerate his presence under strict supervision."
 tesla.3012.h: "Dispose of the problem. Overboard."
 tesla.3013.t: "An Extra Passenger from the Excavations"
 tesla.3013.d: "Just before the cable-laying expedition departs Suez, a young assistant to a European excavation team requests passage aboard. His archaeological assignment in the Nile Delta has ended, and he now seeks transit to Bombay, where he intends to continue his studies on comparative temple architecture and ancient trade routes. He carries a letter of recommendation and offers assistance in cataloguing or translation work if needed."
 tesla.3013.f: "His clothes are dusty, his Arabic fluent, and his notebook filled with sketches of columns, cartouches, and sun-worn statuary. He speaks of Thutmose and Ashoka in the same breath, and believes that the past lives on in the forms of buildings and roads. The officers find him harmless, if a bit verbose. Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] calls him 'an echo collector'. But someone approves the passage—perhaps out of curiosity, perhaps out of sympathy for those who chase meaning through ruins."
 tesla.3013.g: "Grant him passage. Let history ride with us."
 tesla.3013.h: "Decline. This ship is for cables, not curiosity."
 tesla.3014.t: "A Scholar of the Pacific"
 tesla.3014.d: "Shortly before departure, a young ethnologist has requested passage aboard the cable-laying vessel scheduled to cross the Pacific. His stated aim is to study the social structures, oral traditions, and religious practices of Polynesian island communities encountered along the route. He is equipped with reference material, linguistic notes, and a letter from an overseas university supporting his fieldwork."
 tesla.3014.f: "He introduces himself with soft diction and a weathered notebook full of genealogies and chants. He asks few questions of the ship's machinery, but many of the crew's island stops. To some, he is a harmless eccentric; to others, a respectful observer of what modernity has not yet washed away. The captain grants him a berth, on the condition that he remain a passenger, not a passenger with opinions on how cables are laid."
 tesla.3014.g: "Let him aboard. Culture travels differently than current."
 tesla.3014.h: "This is not a cruise ship!"
 tesla_cable_student_gains_experience_tt: "[ROOT.Var('rapanui_adventurer_var').GetCharacter.GetFullName] gains experience, giving him a chance to become an [concept_academics_academic] after the cable mission is completed."
 tesla.3021.t: "Cable breaks!"
 tesla.3021.d: "The main cable has ruptured during deployment. The fault occurred several hundred nautical miles from shore, possibly due to strain, uneven terrain, or a manufacturing defect."
 tesla.3021.f: "It began as a stutter in the signal—a delay, then silence. When the crew hauled in the winch, the confirmation came in strands of torn insulation and frayed copper. Somewhere on the ocean floor, the connection had been severed."
 tesla.3021.g: "This is Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName]'s hour!"
 tesla.3022.t: "Cable repaired"
 tesla.3022.d: "Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] performed the miracle of repairing the cable on the high seas."
 tesla.3022.f: "Thanks to a piece of string, a broken pencil, and a piece of chewing gum, our engineer masterfully managed to repair the submarine cable, despite all the naysayers."
 tesla.3022.g: "Thanks God for Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName]!"
 tesla.3023.t: "Cable not patched..."
 tesla.3023.d: "Despite all efforts, Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] was unable to save the submarine cable."
 tesla.3023.f: "Engineers on board now debate stress tolerances and splice points. Investors at home debate liability. And the company debates how much truth the public should hear."
 tesla.3023.g: "Retrieve and repair the damaged segment, no matter the cost."
 tesla.3023.h: "Bypass the damage and continue—accept some signal loss."
 tesla.3024.t: "Storm Front Approaching"
 tesla.3024.d: "Barometric pressure has dropped rapidly, and dark clouds gather on the horizon. The crew reports that a storm system is moving toward the vessel's current position. With the cable-laying operation mid-phase, halting now would delay progress—but continuing may expose the cable to damage or loss."
 tesla.3024.f: "The wind rises in uneven gusten, and the horizon vanishes into slate. Rain has not yet begun, but the sea already shifts underfoot. The captain consults the charts; the engineer checks tension readings. The board's representatives debate the optics of delay versus the risk of ruin. Storms, unlike markets, do not negotiate. A decision must be made—now."
 tesla.3024.g: "Proceed through the storm. We cannot afford delay."
 tesla.3024.h: "Suspend operations and return to safer waters."
 tesla.3025.t: "Unexpected Seafloor Condition"
 tesla.3025.d: "The crew reports that the cable-laying route has entered an uncharted deep-sea trench, significantly increasing the stress on the cable. Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] is unsure whether the cable can withstand the added tension. A correction to the route is possible, but it would mean a costly detour."
 tesla.3025.f: "The seafloor, once mapped in theory, has revealed its unpredictability in practice. The bathymetric charts are either outdated or incorrect, and what looked stable on paper now shows signs of risk. The trench descends rapidly, dragging the cable over dangerous contours. With each nautical mile, the engineers weigh risk against cost. Turning now may save the cable—but not the budget."
 tesla.3025.g: "Proceed as planned. Accept the risk."
 tesla.3025.h: "Adjust the route to avoid the trench."
 tesla.3026.t: "Cable Accident"
 tesla.3026.d: "A worker was killed while handling a malfunctioning cable drum. The incident has shaken the crew and raised concerns about safety protocols. Though accidental, the death is already being reported in the press back home."
 tesla.3026.f: "The drum spun without warning, and within seconds, he was gone—crushed under a loop of iron and momentum. There was no time to react. His absence leaves behind more than silence; it leaves fear. The sea does not forgive mistakes. And neither, perhaps, does the public."
 tesla.3026.g: "Publicly reaffirm commitment to safety. Announce new protocols."
 tesla.3026.h: "Focus on continuing the mission."
 tesla.3027.t: "Illness among the Crew"
 tesla.3027.d: "Several sailors have fallen ill, showing symptoms of fever and weakness. Medical supplies are limited, and the cause remains unclear. Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] is among those affected."
 tesla.3027.f: "Work slows. Conversations grow hushed. The cough of one technician echoes louder than the hum of the winch. Without answers, fear becomes its own contagion. The ocean may separate nations, but it offers no quarantine."
 tesla.3027.g: "Suspend operations temporarily until the sick recover."
 tesla.3028.t: "Suspicious Activity Below Deck"
 tesla.3028.d: "[ROOT.Var('rapanui_adventurer_var').GetCharacter.GetFullName] was discovered tampering with sensitive instrumentation late at night. He claims to have been curious and denies any wrongdoing, but officers are unconvinced. The possibility of sabotage cannot be ruled out."
 tesla.3028.f: "Caught in the act, he offered only clumsy explanations—'just checking the readings', 'making sure everything was working'. No one remembers authorizing him to be in the restricted section. Now the engineers whisper of sabotage. The cable may run across oceans, but betrayal needs only a few meters of wire."
 tesla.3028.g: "You won't get away from us this time!"
 tesla.3028.h: "He is innocent."
 tesla.3029.t: "The Wrong Man"
 tesla.3029.d: "New evidence has emerged suggesting that the dismissed crewman had no intention of sabotaging the cable-laying mission. A misplaced maintenance order, found among a stack of unfiled paperwork, confirms that he had in fact been assigned to inspect the equipment in question. The incident, which was quietly handled at sea, has since become public knowledge through critical press reports."
 tesla.3029.f: "Newspapers now print what the crew muttered in private: that a man was cast off without trial, based on faulty assumptions and missing paperwork. Though the evidence absolves him, the damage is done—not to him alone, but to the project's reputation. Investors question whether panic governs the expedition more than discipline."
 tesla.3029.g: "Oh... erm... I think he's fine?"
 tesla.3030.t: "Smooth Progress Through Difficult Waters"
 tesla.3030.d: "A particularly complex segment of the cable route—previously thought to require special adjustments—has been laid successfully without delay or complication. The team's efficiency and preparation have exceeded expectations."
 tesla.3030.f: "The ocean floor in this section was expected to present irregular terrain, but careful planning and calm weather allowed for steady progress. The crew worked in near silence, the cable laying out like thread from a spool. Engineers exchanged brief nods of satisfaction, and for once, no corrections were needed. It is, as one officer dryly noted, 'the sort of uneventful success one always prays for but rarely gets.' Confidence aboard rises with the barometer."
 tesla.3030.g: "Great!"
 tesla.3031.t: "Whales and Dolphins"
 tesla.3031.d: "A unique spectacle of nature presents itself when whales and dolphins cross the route. [SCOPE.sCharacter('rapanui_adventurer_var').GetFullName] expects new biological insights from observation, but the crew shows little interest in this kind of academic curiosity."
 tesla.3031.f: "An argument breaks out on board when the student also points out the despicable hunting methods used to slaughter these enchanting sea creatures. For most sailors, for whom whales only serve as oil storage facilities, the lecture is additionally unnerving."
 tesla.3031.g: "Study these wonderful creatures."
 tesla.3031.h: "We don't have time for this."
 tesla.3032.t: "So many Fish!"
 tesla.3032.d: "[SCOPE.sCharacter('rapanui_adventurer_var').GetFullName] can't believe [SCOPE.sCharacter('rapanui_adventurer_var').GetHerHis] luck when [SCOPE.sCharacter('rapanui_adventurer_var').GetSheHe] notices schools of fish of previously unknown species in the North Atlantic. The student asks the captain to stop work and catch some specimens. Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] points out that this is a cable-laying ship and not a research facility."
 tesla.3032.f: "'So believe me! We are missing out on scientific research! These delicate little fish are a completely undiscovered species. Didn't you see that - what do you mean I can swim in the water with them right now?!'"
 tesla.3032.g: "Catch some fish."
 tesla.3033.t: "Experiments in the Atlantic Ocean"
 tesla.3033.d: "Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] used the time at sea to set up some of its instruments to conduct scientific studies on board the cable-laying ship. He hasn't chosen a focus yet."
 tesla.3033.atlantic: "'There is a river in the ocean. In the severest droughts it never fails, and in the mightiest floods it never overflows. Its banks and its bottom are of cold water, while its current is of warm. The Gulf of Mexico is its fountain, and its mouth is in the Arctic Sea. It is the Gulf Stream.' -Matthew Fontaine Maury"
 tesla.3033.indian: "'Though the Indian ocean abounds in rich and rare gems, it does not boast a clearer sky nor more unruffled sea. If there be a shore that dreads not the fury of the faithless billows, it is some poor and narrow inlet unknown to the winds.' -Pietro Metastasio"
 tesla.3033.pacific: "'The Pacific is my home ocean; I knew it first, grew up on its shore, collected marine animals along the coast. I know its moods, its color, its nature.' -John Steinbeck"
 tesla.3033.g: "Focus on magnetic experiments."
 tesla.3033.h: "Focus on oceanographic experiments."
 tesla.3034.t: "Mystery in the Depths"
 tesla.3034.d: "Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] makes a strange discovery while reviewing the survey data. In a certain part of the Atlantic, the seafloor rises to an unusually high level. So far [SCOPE.sCharacter('tesla_engineer_var').GetSheHe] only has a theory about this phenomenon."
 tesla.3034.f: "Actually, it was always thought that the seas should be particularly deep in the middle. But today's discovery turns this idea on its head. Instead of a depth record, the distance between the ground and the surface decreases. This is good news for the company because less cable length is required than first assumed. But for Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] it is clear that this means that all previous views on the deep sea must be corrected. Apparently there are hills and valleys on the ocean floor. And this hill is something more than just a hill."
 tesla.3034.g: "Is there an undersea mountain range?"
 tesla.3035.t: "The Awwam Temple"
 tesla.3035.d: "[SCOPE.sCharacter('rapanui_adventurer_var').GetFullName] has approached the captain with a request: a short detour inland from the Gulf of Aden, in order to visit the ruins of the Awwam Temple near Ma'rib. Known to scholars as a center of the ancient Sabaean civilization, the site has long remained elusive to systematic study. He argues that the chance to examine it firsthand—while passing so near—may not come again soon. The detour, however, would delay cable operations."
 tesla.3035.f: "[SCOPE.sCharacter('rapanui_adventurer_var').GetLastName] speaks of moon cults, incense routes, and epigraphic puzzles yet unsolved. His fingers trace imagined inscriptions in the air as he describes cyclopean walls and half-buried pillars lost in sand. To him, the Awwam Temple is a riddle waiting beneath dust. To Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName], it's a delay waiting to happen."
 tesla.3035.g: "Grant the detour."
 tesla.3035.h: "The cable has its own timetable."
 tesla.3036.t: "Socotra"
 tesla.3036.d: "While the ship anchors off Socotra for resupply, [SCOPE.sCharacter('rapanui_adventurer_var').GetFullName] discreetly requests permission to disembark. He has received word of a shipment of antiquities—small statuary and funerary objects said to be of Egyptian origin—being trafficked through the island by smugglers bound for the private collection of an Eastern princely court. He argues that if acquired now, the objects could be preserved, catalogued, and eventually returned to proper scholarly hands."
 tesla.3036.f: "[SCOPE.sCharacter('rapanui_adventurer_var').GetLastName] does not deny the informal nature of the transaction—only its urgency. 'Better an annotated crate in an archive than a silent idol on a palace shelf,' he says. The crew is uneasy; the captain warns of diplomatic sensitivities. But the assistant speaks of heritage, of fragments rescued from oblivion, of knowledge otherwise lost."
 tesla.3036.g: "Allow him to proceed—quietly."
 tesla.3036.h: "This is not our mission."
 tesla.3040.t: "Giant Shadow"
 tesla.3040.d: "Crew members have reported observing an enormous, slow-moving shadow beneath the vessel during routine cable deployment. The object appeared to match neither current nor known wildlife behavior, and disappeared without trace. Though dismissed by officers as a probable whale or optical illusion, the report has sparked rumors both aboard ship and in the press."
 tesla.3040.f: "It moved silently and steadily, far below the surface—too regular to be current, too vast for any whale known to science. Some say it had a metallic glint. Others claim they saw lights. The logbook notes only a 'dense marine mass of indeterminate origin'. But the whispers have already spread. What else moves beneath the cables we lay? What might already be watching?"
 tesla.3040.g: "Report it as a rare marine encounter to the press."
 tesla.3041.t: "Return of the submarine cable laying fleet"
 tesla.3041.d: "The cable-laying fleet has returned to port. After weeks at sea, the entire length of the submarine line has been deployed along the planned route. However, the final testing has yet to begin. The cable must now be connected to land stations and undergo signal verification. Only then will it be known whether the project has truly succeeded."
 tesla.3041.f: "Rust flecks cling to the winches, and the hull is streaked with salt. The crew returns exhausted, the engineer silent. The cable lies where it should—buried across seabeds, stretched over ridges, spliced and sealed. But still no word has passed from one continent to another. The ships may be home, but certainty has not arrived with them. All eyes now turn to the final test."
 tesla.3041.g: "Hooray!"
 tesla.3042.t: "An Expert of the Ocean"
 tesla.3042.d: "Despite the uncertainties surrounding the submarine cable mission, one man has turned the voyage into an unlikely scientific triumph. The young stowaway—initially suspected and nearly expelled—spent the expedition documenting deep-sea life forms, compiling hundreds of specimens and detailed sketches. Upon return, his findings have attracted the attention of natural science societies across the continent."
 tesla.3042.f: "Working by oil lamp and rationed paper, the student catalogued bioluminescent plankton, articulated fish bones, and crustaceans unknown to coastal taxonomy. What began as an act of desperation has ended in academic renown. The press calls him 'the naturalist of the abyss'. He simply calls it a matter of observation."
 tesla.3042.g: "Student? Call him doctor!"
 tesla.3042.h: "We need these scientific documents."
 tesla.3043.t: "A Chronicle of Ruins and Routes"
 tesla.3043.d: "During the cable expedition from Suez to Bombay, the young archaeological assistant made extensive notes on architecture, inscriptions, and cultural remnants observed or discussed along the route. Drawing from his earlier fieldwork and the geographic diversity of the voyage, he has authored a comprehensive report that now circulates in academic circles to wide acclaim."
 tesla.3043.f: "He observed more than just shorelines. His notebook followed the contours of abandoned temples, waystations, and forgotten harbor towns—fragments of civilizations once connected by trade and faith. Now, through his writing, those fragments speak again. The publication, praised for its clarity and sense of continuity, is seen as a work that bridges the gap between scholarship and seafaring. The cable may bind the present, but his chronicle restores the past."
 tesla.3043.h: "We need these archaeological artifacts."
 tesla.3044.t: "A Chair in Ethnology"
 tesla.3044.d: "Following the cable expedition, the student who traveled aboard has published a series of papers detailing kinship systems, oral traditions, and navigational cosmologies of the Polynesian peoples encountered during landings and stopovers. His work has received praise from scholars in multiple countries. A university now seeks to appoint him to a new chair in comparative ethnology."
 tesla.3044.f: "His writings avoid romanticism, but carry the rhythm of chants and the logic of lineage. He describes gods shaped like wind and family trees shaped like waves. In academic salons, his name now circulates alongside the term 'oceanic epistemology'. For those who remember him aboard ship, it is odd to think that such quiet note-taking could shape an entire field. He calls it listening."
 tesla.3044.h: "We need these polynesian artifacts."
 tesla.3051.t: "The First Word Across the Atlantic"
 tesla.3051.d: "Sent via a transoceanic undersea cable, [SCOPE.sCountry('tesla_country_1').GetRuler.GetPrimaryRoleTitle] [SCOPE.sCharacter('tesla_leader_1').GetFullName] of [SCOPE.sCountry('tesla_country_1').GetName]'s message was delivered 16 hours later to [SCOPE.sCountry('tesla_country_2').GetRuler.GetPrimaryRoleTitle] [SCOPE.sCharacter('tesla_leader_2').GetFullName] of [SCOPE.sCountry('tesla_country_2').GetName]."
 tesla.3051.f: "'It is a triumph more glorious, because far more useful to mankind, than was ever won by conqueror on the field of battle. May the Atlantic telegraph, under the blessing of Heaven, prove to be a bond of perpetual peace and friendship between the kindred nations, and an instrument destined by Divine Providence to diffuse religion, civilization, liberty, and law throughout the world.' -James Buchanan"
 tesla.3051.g: ".... . .-.. .-.. --- -.-.--"
 tesla.3052.t: "Silence"
 tesla.3052.d: "The cable has been connected to the shore station. Initial transmission attempts have been made—without response. No signal has yet been confirmed from the far end. Technicians continue to test and recalibrate the equipment, but with each hour, confidence begins to erode. The mission appears to have failed."
 tesla.3052.f: "The line is quiet. No crackle, no click, no flicker of current—just a stillness too perfect to be natural. Some blame the instruments, others the relay points, others still the ocean itself. Engineers work in tense silence, investors whisper of loss, and the press begins to speculate. Perhaps the signal is simply delayed. Perhaps something has gone wrong. Or perhaps it was always too much to ask—messages beneath the sea."
 tesla.3052.g: "An entire fortune was sunk at sea..."
 tesla.3052.tt: "The company will attempt to launch a new fundraising round if shareholder confidence does not fall to zero."
 tesla.3053.t: "Collapse of Confidence"
 tesla.3053.d: "Panic has gripped financial markets. Investor sentiment has collapsed. The telegraph company's stock has nosedived, triggering a broader loss of confidence in industrial innovation and the government's role in speculative ventures. The resulting crisis is spreading through banks, firms, and households."
 tesla.3053.f: "It began with uncertainty—then came the silence, and now, the reckoning. Shares once traded as symbols of the future are now worth less than paper. Offices shutter, banks halt withdrawals, and the name of the cable company is spoken only in bitterness. Thousands of small investors see their life savings vanish in hours. What was meant to unite continents has instead fractured a nation's economy. The cable lies quiet beneath the sea; above it, the noise is deafening."
 tesla.3053.g: "Surely the markets will correct themselves. They always do...?"
 tesla.3054.t: "Beaten"
 tesla.3054.d: "News has reached us that a foreign power has successfully completed and activated its own transoceanic cable connection. Telegraph signals are now being transmitted across the sea—just not through our wire. The announcement has shaken markets and raised difficult questions about the pace and purpose of our own endeavor."
 tesla.3054.f: "The headlines are clear, and brutal: a message has crossed the ocean, but not on our terms. What was once a race now has a winner—and it is not us. Investors pause, officials deflect, and rivals quietly take note. The foreign cable carries more than signals; it carries influence, credibility, and first-mover advantage. Our own ships still drift at sea, our engineers still calculate. Meanwhile, the world moves on—connected, but not by us."
 tesla.3054.g: "This... is a problem."
 tesla.3061.t: "The Eastern Telegraph Completed"
 tesla.3061.d: "A direct submarine telegraph cable now connects Egypt with India, by way of Suez. After years of preparation, surveying, and deployment through shallow seas and contested waters, the line is complete. Telegraph operators confirm that signals are being received clearly and without delay."
 tesla.3061.f: "'The cable to India is complete.' -Anonymous"
 tesla.3061.g: "-... --- -- -... .- -.-- ..--.."
 tesla.3071.t: "The First Message Across the Pacific"
 tesla.3071.d: "For the first time in history, a message has crossed the vast Pacific Ocean through an unbroken chain of underwater cable—from Australia to Canada. The cable spans thousands of nautical miles and now carries words across hemispheres in seconds. The first official transmission was brief, formal, and historic."
 tesla.3071.f: "'The Pacific Cable has been successfully laid. The Empire is now linked together by a chain of communication, owned and controlled by the Empire itself. This achievement will strengthen the bonds of unity and co-operation throughout all parts of His Majesty's dominions.' -Edmund Barton"
 tesla.3071.g: ".... --- --- .-. .- -.-- -.-.--"
