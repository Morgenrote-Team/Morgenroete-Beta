 pius.101.t: "The Apparition at La Salette"
 pius.101.d: "Two children in the mountains of southeastern France claim to have witnessed an apparition of the Virgin Mary, prompting waves of spiritual enthusiasm — and concern — throughout the Catholic world."
 pius.101.f: "'Come closer, my children, do not be afraid. I am here to bring you great news…'\n\nHigh in the alpine pastures above the village of La Salette, near Corps in southeastern France, two shepherd children report a vision that now stirs hearts across Christendom. A lady, radiant with light and draped in sorrow, appeared to them. She wept — tears falling for a world turned away from God. She spoke of blasphemies uttered without shame, of Sundays profaned, and of famine and ruin to come should mankind fail to repent.\nWhat first seemed like a rustic legend has become a movement. Pilgrims flock to the remote mountain slope. Monks and journalists climb the same trails. The Church wavers: some embrace the vision as a divine call to penitence; others fear the rise of popular mysticism and irrational fervor.\nThe Bishop of Grenoble offers cautious approval. The secular authorities remain suspicious.\nAnd Rome? Rome watches  —  silent. But already, the bells are tolling."
 pius.101.g: "A heavenly warning."
 pius.101.h: "Remain rational."
 pius.102.t: "The Apparition at Lourdes"
 pius.102.d: "In the small town of Lourdes, a fourteen-year-old girl claims to have seen a radiant lady in a grotto. Her visions soon attract pilgrims, controversy — and the attention of Rome."
 pius.102.f: "'She was young, barefoot, and poor. Yet she spoke of beauty that no words could describe.'\n\nIn a remote grotto near Lourdes, in the foothills of the Pyrenees, a peasant girl named Bernadette Soubirous tells of a lady clothed in white, with a blue sash and golden roses on her feet. The vision says nothing at first — only smiles. Then she speaks: of penance, of prayer, of suffering, and of divine mercy. She names herself simply: The Immaculate Conception.\nAt first, the villagers scoff. But when Bernadette uncovers a hidden spring and claims it to be a source of healing, thousands begin to arrive — hoping, praying, weeping. Crutches are left behind. Testimonials spread. Skeptics decry hysteria. Doctors, priests, and politicians descend upon Lourdes.\nThe Church investigates. The state looks on warily. And still the people come."
 pius.102.g: "A Shrine to Healing and Hope."
 pius.102.h: "Hallucinations!"
 pius.103.t: "The Silent Vision at Knock"
 pius.103.d: "In the Irish village of Knock, fifteen witnesses report a silent apparition of the Virgin Mary, Saint Joseph, and Saint John the Evangelist. The vision stirs a people long burdened by poverty, exile, and foreign rule."
 pius.103.f: "'They said not a word. Yet in that silence, a nation heard hope.'\n\nRain poured steadily over the parish church of Knock, County Mayo. And yet, fifteen villagers stood transfixed. Before them, bathed in light upon the south gable wall, stood a silent assembly: the Virgin Mary in prayerful pose; Saint Joseph at her side; Saint John the Evangelist, robed and holding a Gospel. Behind them, a lamb upon an altar, and a cross.\nNo message was spoken. No movement made. And still, the witnesses swore by what they saw — young and old, men and women alike.\nIn a land worn by famine, emigration, and spiritual longing, the silent vision echoed louder than sermons. Pilgrims soon arrived, seeking healing, signs, and consolation. The English authorities scoffed. Some in the Church hesitated. But among the poor and devout of Ireland, Knock became a holy cry for dignity."
 pius.103.g: "A Light in the Rain."
 pius.103.h: "Dismiss it as Folklore."
 pius.104.t: "The Secrets of Fátima"
 pius.104.d: "In central Portugal, three shepherd children report repeated apparitions of the Virgin Mary, culminating in a miraculous phenomenon witnessed by thousands. Their visions carry prophecies of war, suffering, and the future of the Church."
 pius.104.f: "'In the end, my Immaculate Heart will triumph.'\n\nNear the town of Fátima, in the rural hills of Cova da Iria, three children — Lucia, Francisco, and Jacinta — speak of a lady brighter than the sun, clothed in radiance and sorrow. Over six months, she appears again and again, warning of global war, the rise of godless ideologies, and the persecution of the faithful. She calls for penance, prayer, and the consecration of Russia to her heart.\nOn October 13th, 1917, as tens of thousands stand in the pouring rain, the sun appears to break loose from the heavens, spinning and crashing in the sky. Some fall to their knees. Others flee. When the light fades, their clothes are dry. The crowd disperses in silence, awed and afraid.\nThe Church is cautious. The press is divided. But among the people — especially the poor, the wounded, and the faithful — a new flame is lit: one of hope, one of warning, one that sees the Virgin not only as mother, but as sentinel of the age to come."
 pius.104.g: "Heed the Warnings of Fátima."
 pius.104.h: "Debunk the Solar Miracle."
 pius.105.t: "Our Lady of [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName]"
 pius.105.d: "In a remote village near [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName], reports emerge of an apparition of the Virgin Mary. The story spreads rapidly, drawing pilgrims, skeptics, and the attention of church authorities."
 pius.105.f: "'She stood above the fields, in a crown of light, and looked upon us as if she knew the sorrow of every soul.'\n\nThe first to speak was a child — eyes wide with awe, voice trembling. He spoke of a lady brighter than dawn, cloaked in radiance and sorrow, who appeared in silence and watched the world with deep, knowing grief. Others claimed to see her too. Some fell to their knees. Others ran. All remembered the stillness that followed.\nThe story spread beyond the village. Pilgrims arrived, candles in hand. The faithful prayed. The afflicted hoped. Priests debated. Officials raised eyebrows. But the people kept coming — drawn not by certainty, but by something older: the need to believe.\nWhether miracle, vision, or myth, the event has already shaped the hearts of those who witnessed it — and the lives of those who must now decide what it means."
 pius.105.g: "A Sign for the Faithful."
 pius.105.h: "Suppress the Hysteria."
 pius.111.t: "The Unbidden Procession"
 pius.111.d: "Despite official orders forbidding public displays, a crowd of the faithful has begun a spontaneous procession toward the site of the Marian apparition at [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName]."
 pius.111.f: "'We lit no torches, we carried no banners. Only rosaries, silence, and our feet in the dust.'\n\nThey came at dawn, in twos and threes, walking through fields and hamlets, whispering prayers. By noon they were hundreds, streaming along country roads, some barefoot, some weeping. Women held flowers. Old men muttered litanies. Children clutched icons carved from wood.\nThe authorities had declared the site closed. Soldiers stood watch. Yet no one stopped the crowd. Perhaps it was the singing. Perhaps the silence. Perhaps something unseen.\nAs the faithful reached the place of the vision, they knelt, murmured prayers, and lit candles in the soil. No voice thundered from heaven. No miracle was witnessed. But something had already changed. A people had acted — not in defiance of law, but in obedience to something older than law."
 pius.111.g: "Let them pray."
 pius.111.h: "Observe quietly."
 pius.111.i: "Disperse them by force."
 pius.112.t: "Blood at the Holy Ground"
 pius.112.d: "A confrontation between the authorities and the faithful at the site of the forbidden Marian procession has turned violent. The ground where visions once inspired hope now bears the stain of blood."
 pius.112.f: "'There were prayers, and then there were screams.'\n\nThe candles were still flickering when the soldiers arrived. Voices rose in confusion, then in pleading. A woman fell. A boy cried out. No one knows who gave the order — but muskets barked, batons swung, boots moved through incense and soil. When silence returned, it was heavier than before.\nThe Church is shaken. The faithful are outraged. The press speaks in hushed tones — some call it an accident, others a massacre. The site, once whispered to be holy, is now cursed by memory. And still the people gather — not with flowers, but with anger, with silence, with a gaze no law can extinguish."
 pius.112.g: "We regret what happened."
 pius.112.h: "They brought this upon themselves."
 pius.113.t: "The Voice in the Pulpit"
 pius.113.d: "A local priest has risen as the foremost defender of the Marian apparition at [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName]. His sermons draw crowds, his words inspire hope — and challenge state authority. His name is Father [SCOPE.sCharacter('pius_marian_priest_scope').GetFirstName]."
 pius.113.f: "'She appeared to the lowly, not the powerful. And perhaps that is why they wish to silence her.'\n\nIn the stone church above the village, a priest named Father [SCOPE.sCharacter('pius_marian_priest_scope').GetFirstName] has begun to preach — not only of the Virgin's mercy, but of her justice. His words echo beyond the nave: 'If Heaven has spoken here, then no government may forbid its echo.'\nPilgrims flock to his sermons. His name spreads in whispers and in hymnals. He urges peace, but his presence galvanizes unrest. Some call him a prophet. Others, a rebel in robes.\nAuthorities grow uneasy. The military speaks of incitement. The Church hierarchy hesitates — torn between dogma and diplomacy. A quiet proposal arrives on your desk: He could be removed. Quietly. Discreetly.\nBut some men, when silenced, speak louder still."
 pius.113.g: "Let him preach."
 pius.113.h: "Summon him to the capital for negotiation."
 pius.113.i: "Make him disappear."
 pius.114.t: "The Procession That Shook the Nation"
 pius.114.d: "Across the country, Catholic believers have begun public demonstrations in support of the Marian apparition. What began as a rural pilgrimage has become a national movement."
 pius.114.f: "'They walked with rosaries in their hands, their children on their shoulders, and the name of the Virgin on their lips.'\n\nFrom fishing villages to factory towns, the signs are the same: candles burning in windows, hymns echoing across town squares, thousands gathering in silence. No banners are flown — only statues, icons, and a single name murmured again and again: Maria. What began as devotion has become defiance.\nIn response to the violence at the holy site of [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName] the faithful have taken to the streets. They do not shout. They pray. But their numbers grow daily.\nSome in government urge tolerance. Others demand crackdowns. The military is restless. And in homes across the land, even the doubtful wonder: if so many believe, can it still be a lie?"
 pius.114.g: "Permit the national procession."
 pius.114.h: "Prohibit the national procession."
 pius.115.t: "The Fields Lie Empty"
 pius.115.d: "A severe crop failure has struck several rural regions of [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName]. Among the faithful, a dangerous whisper begins to spread: that the Virgin, once silenced by the state, now weeps — and punishes."
 pius.115.f: "'She asked for prayers. We gave her soldiers.'\n\nThe rains failed. The wheat yellowed too soon. Potatoes rotted beneath the earth, unseen and bitter. Villagers speak of fields that feel... abandoned. Not merely by men, but by mercy.\nAnd so they whisper. Of the woman in light who once appeared — and was mocked. Of the priest who vanished. Of the shrine sealed and the pilgrims beaten. Now, they say, she has turned her face away.\nCandles burn again, but now behind shuttered windows. Mothers baptize children in secret. Old men bury bread crusts as offerings. The Church dares not speak, but the people already believe: This is her sorrow. Or her warning."
 pius.115.g: "Superstition! I hope..."
 pius.116.t: "The Silence Beyond the Bell"
 pius.116.d: "After years of repression and denied miracles, many once-devout citizens have begun to abandon their faith in [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName]. A growing number now describe themselves not as Catholic — but as nothing at all."
 pius.116.f: "'She no longer comes. Not in dreams, not in visions. The candles go unlit.'\n\nThe shrine is shuttered. The priest is gone. The fields are silent.\nThere was a time when even the poorest whispered Ave Marias before sleep, when icons hung beside hearths, and tears fell at the sound of bells. Now, churches stand empty. Children ask what 'confession' was. The young speak of Reason, of Progress, of Nothing.\nThe people did not turn to ideology. They turned to ash. They are not radicals. They are exhausted. And somewhere in the hollow silence, the question lingers:\nDid she leave us — or did we leave her?"
 pius.116.g: "The Age of Faith has passed."
 pius.119.t: "Closure of the Shrine"
 pius.119.d: "The newly established atheist government has ordered the closure of the Marian pilgrimage site. What was once a place of light and prayer is now cordoned off, silent under state watch."
 pius.119.f: "'No bells rang. No candles burned. The gates were locked before sunrise.'\n\nThe shrine that once drew thousands now stands alone. A notice has been nailed to the chapel door: 'By order of the People's Assembly, this structure is declared non-essential.' Guards stand watch, not to protect, but to prevent.\nNo force was used. No protests permitted. The change came quietly, bureaucratically — an absence rather than an explosion. Yet in homes across the country, older hands tremble. Grandmothers hide their rosaries. Children ask why the pilgrims no longer sing.\nThe clergy are silent. The Party speaks of science, reason, and progress. And somewhere behind locked doors, a question flickers like a half-spent candle: Was this truly necessary?"
 pius.119.g: "We no longer build monuments to illusions."
 pius.121.t: "What does she mean?"
 pius.121.d: "The Marian apparition at [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName] has been officially recognized as a positive sign. But even now, its true meaning remains open to interpretation."
 pius.121.f: "In the weeks since the radiant figure appeared to the villagers, no further signs have followed. No fire from heaven. No voice in the clouds. Only calm skies, and the lingering echo of wonder.\nYet the people speak — of peace, of healing, of something having shifted in the soul of the nation. Pilgrims come not in frenzy, but in reverence. The clergy preach softly. The press, for once, reports without mockery: What does this miracle mean?"
 pius.121.g: "A blessing for the common people."
 pius.121.h: "A divine sign to our clergy."
 pius.121.i: "An indication of the legitimacy of our government."
 pius.122.t: "The Shrine of [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName]"
 pius.122.d: "The site of the Marian apparition has now become a fully recognized place of pilgrimage, drawing the faithful from near and far in growing numbers."
 pius.122.f: "'Where once there was only pasture, now stand candles, roses, and the quiet footsteps of thousands.'\n\nThe roads have widened. The fields have been cleared. A modest chapel rises near the spot where the children once spoke of a Lady clothed in light. Each day, pilgrims arrive: farmers with their sons, widows in black, soldiers on leave, mothers whispering prayers for their unborn.\nThe Church has acknowledged the sacredness of the site. A shrine is being built. Markets bloom at its edges, offering bread, medals, rosaries, wine. What was once a story doubted in drawing rooms is now a presence felt in the bones of the nation.\nAnd as the bells ring in the valley, one wonders: Is this faith reborn — or a seed of something greater yet to come?"
 pius.122.g: "Totus tuus."