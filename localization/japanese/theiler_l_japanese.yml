 je_group_theiler_biology: "Morgenröte: [concept_theiler_biology]"
 je_theiler_microorganism_research_reason: "微生物研究"
 je_theiler_microorganism_research: "[ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName]博士は、現在未知の微生物世界の研究を進めています。博士のスキルと顕微鏡の性能を応じて、月ごとに新しい微生物が発見されます。微生物の包括的な知識は、[Concept('concept_theiler_pathogen','$concept_theiler_pathogens$')]の特定に不可欠です。\n\n[concept_theiler_biologist]がまだ$theiler_microbiologist$特性をもっていない場合も研究の途中で獲得する可能性があります。"
 theiler_biologist_dies_tt: "[concept_theiler_biologist]が無くなるとジャーナル記事は失敗する"
 je_theiler_microscope_achromatic: "アクロマート顕微鏡"
 je_theiler_microscope_achromatic_reason: "1870年代、カール・ツァイス社のエルンスト・アッベは最先端のアポクロマート対物レンズを発明しました。光学的に考え抜かれた設計によって、鮮明さと解像度は大きく向上しました。アッベの功績は、現代の科学顕微鏡やレンズ構造の規格化につながりました。\n\n顕微鏡の改良は、[Concept('concept_theiler_pathogen','$concept_theiler_pathogens$')]などの[Concept('concept_theiler_microorganism','$concept_theiler_microorganisms$')]を特定するのに大いに役立ちます。[concept_tesla_engineer]と[concept_theiler_biologist]がいる場合、進捗があります。"
 je_theiler_microscope_achromatic_goal: "生物学者と技師が新装置を再発するには[JournalEntry.GetTotalGoalValue|V0]週間必要"
 je_theiler_microscope_electron: "電子顕微鏡"
 je_theiler_microscope_electron_reason: "1930年代にエルンスト・ルスカとマックス・クノールが発明した電子顕微鏡は、それまでの光に代わって電子線を用いることで高い解像度を実現しました。科学者は光学顕微鏡では実現できなかったナノメートル世界の構造を観察できるようになるなど、電子顕微鏡の登場は歴史的な転機となりました。\n\n顕微鏡の改良は、[Concept('concept_theiler_pathogen','$concept_theiler_pathogens$')]などの[Concept('concept_theiler_microorganism','$concept_theiler_microorganisms$')]を特定するのに大いに役立ちます。[concept_tesla_engineer]と[concept_theiler_biologist]がいる場合、進捗があります。"
 je_theiler_microscope_electron_goal: "生物学者と技師が新装置を再発するには[JournalEntry.GetTotalGoalValue|V0]週間必要"
