 MR_ASTRONOMER_DISCOVER_SATELLITES_BUTTON_TT: "#T 新しい衛星の発見#!\n地球に月があるように、太陽系にある惑星には未知の[Concept('concept_verrier_satellite','$concept_verrier_satellites$')]が数多く眠っている。技術レベルや天文台の生産方式、天文学者のスキルに応じて、これまでまったく知られていなかった天体を発見できる可能性が上がる。しかし天文学者に新しい衛星を捜索させると、発見できる天体の数は減少する。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
