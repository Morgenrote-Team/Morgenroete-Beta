 MR_AERONAUTICAL_ENGINEER_SPEED_AIRPLANE_BUTTON_TT: "#T High Speed Aircraft#!\nOur aeronautical engineer can build a high-speed aircraft to break the existing record. To build the fastest airplane in the world, you need not only an engineer but also a pilot to fly the airplane. Success depends on the experience of the engineer and pilot, as well as advanced technologies.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
