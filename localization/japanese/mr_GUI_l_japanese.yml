 MR_ORIGIN_CONGRESS_SPECIAL_HUMAN_FOSSIL_TT: "#default_text [GetPlayer.GetName] has at least #V 3#! @andersson_human_fossil! [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')] from one of these species: #V Homo Neanderthalensis, Homo Erectus, Australopithecus or Paranthropus#!.#!"
 MR_ORIGIN_CONGRESS_GLOBAL_HUMAN_FOSSIL_TT: "#default_text At least #V 50#! @andersson_human_fossil! [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')] were found worldwide (currently [GetGlobalVariable('dubois_global_human_fossil').GetValue|+0] @andersson_human_fossil! were found).#!"
