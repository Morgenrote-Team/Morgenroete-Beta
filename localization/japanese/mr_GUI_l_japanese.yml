 MR_HOLD_SCHNEIDER_TROPHY_RACE_BUTTON: "Host Schneider Trophy Race"
 MR_HOLD_SCHNEIDER_TROPHY_RACE_BUTTON_TT: "#T Host the next Schneider Trophy Race#!\nAs the winner of the last race, we have the honor of hosting the race the following year. If we win three races in a row, we get to keep the legendary Schneider Trophy forever.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
