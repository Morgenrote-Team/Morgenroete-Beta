 MR_PROMOTE_ENGINEER_TT: "#T Promote Engineer#!\n[Concept('concept_tesla_engineer','$concept_tesla_engineers$')] are versatile technicians in the military and in construction. They also speed up the construction of monuments by twice as much.\n\n#n Note:#! You can only have one Engineer at a time.[GetPlayer.GetCustom('mr_promote_has_engineer_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTE_ASTRONOMER_TT: "#T Promote Astronomer#!\n[Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')] find new astronomical objects, discover stars and planets or can take part in astronomical congresses.\n\n#n Note:#! You can only have one Astronomer at a time.[GetPlayer.GetCustom('mr_promote_has_astronomer_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTE_CHEMIST_TT: "#T Promote Chemist#!\n[Concept('concept_mendelejew_chemist','$concept_mendelejew_chemists$')] are scientists that focus on the discovery of new elements and on improving your chemical industry.\n\n#n Note:#! You can only have one Chemist at a time.[GetPlayer.GetCustom('mr_promote_has_chemist_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTE_GEOLOGIST_TT: "#T Promote Geologist#!\n[Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')] study minerals, volcanoes and other geological formations.\n\n#n Note:#! You can only have one Geologist at a time.[GetPlayer.GetCustom('mr_promote_has_geologist_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTE_NATURALIST_TT: "#T Promote Naturalist#!\n[Concept('concept_dubois_naturalist','$concept_dubois_naturalists$')] can capture animals at home or overseas, find specimens, or lead botanical expeditions.\n\n#n Note:#! You can only have one Naturalist at a time.[GetPlayer.GetCustom('mr_promote_has_naturalist_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTE_PALEONTOLOGIST_TT: "#T Promote Paleontologist#!\n[Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')] can examine geological formations for fossils and dinosaur bones or find them on expeditions.\n\n#n Note:#! You can only have one Paleontologist at a time.[GetPlayer.GetCustom('mr_promote_has_paleontologist_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTE_ARCHAEOLOGIST_TT: "#T Promote Archaeologist#!\n[Concept('concept_lepsius_archaeologist','$concept_lepsius_archaeologists$')] can find artifacts, make major discoveries, and attend archaeological conferences.\n\n#n Note:#! You can only have one Archaeologist at a time.[GetPlayer.GetCustom('mr_promote_has_archaeologist_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTE_ANTHROPOLOGIST_TT: "#T Promote Anthropologist#!\n[Concept('concept_andersson_anthropologist','$concept_andersson_anthropologists$')] study the origins of humans, from the beginning of human evolution to the Stone Age.\n\n#n Note:#! You can only have one Anthropologist at a time.[GetPlayer.GetCustom('mr_promote_has_anthropologist_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTE_COMPOSER_TT: "#T Promote Composer#!\n[Concept('concept_elgar_composer','$concept_elgar_composers$')] are needed to create a thriving Music Culture. They will help a country to create more [concept_elgar_musical_tradition].\n\n#n Note:#! You can only have one Composer at a time.[GetPlayer.GetCustom('mr_promote_has_composer_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTE_WRITER_TT: "#T Promote Writer#!\n[Concept('concept_manzoni_writer','$concept_manzoni_writers$')] are masters of storytelling and work on books and other literature. With their work they strengthen a countries [concept_manzoni_literary_tradition].\n\n#n Note:#! You can only have one national Writer and 3 local Writers at a time.[GetPlayer.GetCustom('mr_promote_has_writers_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTE_PAINTER_TT: "#T Promote Painter#!\n[Concept('concept_klimt_painter','$concept_klimt_painters$')] capture impressions, landscapes and the wonders of the world on canvas. Through their masterpieces, they strengthen the [concept_klimt_painting_tradition] of a country.\n\n#n Note:#! You can only have one Painter at a time.[GetPlayer.GetCustom('mr_promote_has_painter_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
