 MR_PAINTER_TRIP_BUTTON: "Educational Journey"
 MR_PAINTER_TRIP_BUTTON_TT: "#T Educational Journey#!\nOn a [concept_klimt_painter_trip], an artist can learn a previously unknown art style and thus improve the annual [concept_klimt_painting_tradition]. They can also acquire other positive and negative traits during their stay in a foreign [concept_artists_center_of_arts].\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ACQUIRE_MASTERWORK_BUTTON: "Acquire a Masterwork"
 MR_ACQUIRE_MASTERWORK_BUTTON_TT: "#T Acquire a Masterwork#!\nWe can purchase a masterwork of a style abroad that we don't yet own. However, this assumes that another nation has at least more than one masterwork of this style. Additionally, we need a National Gallery to hang the painting. In addition to the procurement costs, we also have to trade in some of our paintings, which costs us #R 100#! [concept_klimt_painting_tradition].\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_VERNISSAGE_BUTTON: "Vernissage"
 MR_VERNISSAGE_BUTTON_TT: "#T Vernissage#!\nAt a vernissage, a [concept_klimt_painter] can exhibit some of his pictures and in return acquire reputation and [concept_klimt_painting_tradition]. A vernissage is only possible once in a painter's lifetime.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
