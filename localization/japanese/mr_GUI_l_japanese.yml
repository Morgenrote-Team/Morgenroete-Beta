 MR_CHANGE_TO_AERONAUTICAL_EGINEER_BUTTON_TT: "#T Change your Engineer to specialize as an [concept_tesla_aeronautical_engineer]#!\nYour [concept_tesla_engineer] will focus on [Concept('concept_tesla_aeronautical_engineer','$concept_tesla_aeronautical_engineering$')]. This might reduce their efficiency. You will not be able to change the Specialization again for #n 5 years#!.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
