 MR_VISIT_GALLERY_BUTTON_TT: "#T Visit the Gallery#!\nThe total value of our painting tradition and its artworks can be checked in the gallery.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
