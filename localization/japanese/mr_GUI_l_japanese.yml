 MR_PHYSICIAN_MEDICAL_RESEARCH_BUTTON_TT: "#T 医学研究#!\nこのプロジェクトは[concept_panum_physician]が多忙ではない場合に自動的に選択される。\n\n[concept_panum_physician]は医学研究を発展させ、技術ボーナスを獲得したり、ときには日常的な病気の研究や治療法を見つけることがある。\n次にボーナスが入る技術: [GetPlayer.MakeScope.GetCountry.GetCustom('panum_medical_research_next_technology_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
