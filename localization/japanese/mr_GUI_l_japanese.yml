 MR_AERONAUTICAL_ENGINEER_GIANT_AIRPLANE_BUTTON: "Giant Airplane"
 MR_AERONAUTICAL_ENGINEER_GIANT_AIRPLANE_BUTTON_TT: "#T Giant Airplane#!\nThe sky is the last limit. What was once the age of discovery in the early modern period is now the conquest of the skies. But compared to the galleons of the Spaniards, today's celestial vessels are mere nutshells. Ocean giants sail the seas today, but the skies have so far only been dominated by small machines. The dream of building a gigantic airplane that can transport not dozens but hundreds of people seems utopian. But a thriving aircraft industry and a powerful airline headed by the right man could turn the world upside down...\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
