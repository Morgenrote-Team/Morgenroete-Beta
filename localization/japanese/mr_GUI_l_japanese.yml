 MR_PHYSICIAN_DESCRIBE_DISEASE_BUTTON_TT: "#T 病気の解明#!\n国内で感染症が蔓延している際、医師はこれまで解明されなかった病気についてより科学的に踏み込んだ医学書を執筆できる。治療法を確立するうえで重要な第一歩である。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PHYSICIAN_DESCRIBE_DISEASE_ACTIVE_TT: "#T 病気の解明#!\n#p $concept_panum_physician$は現在病気の概論の執筆に取り掛かっている。#!\n国内で感染症が蔓延している際、医師はこれまで解明されなかった病気についてより科学的に踏み込んだ医学書を執筆できる。治療法を確立するうえで重要な第一歩である。"
