 MR_FOUND_ASYLUM_BUTTON: "精神病院の設立"
 MR_FOUND_ASYLUM_BUTTON_TT: "#T 精神病院の設立#!\nかつて精神が不安定な患者は囚人と同じ刑務所に収監されていた。独立した精神病院の設立は現代精神医学の嚆矢だった。専門精神病院があれば助けが必要な人々により良い治療をもたらしてくれるだろう。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
