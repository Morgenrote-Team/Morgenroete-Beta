 MR_CURTISS_FOUND_PILOT_SCHOOL_BUTTON_TRIGGER_TT: "#default_text [GetPlayer.GetName] has a [concept_character] with the [concept_curtiss_pilot] Ace #V Trait#! #p OR#! a Character who is a Schneider Trophy Veteran and a [GetBuildingType('building_automotive_industry').GetName] of level #V 3#! or higher #p OR#! a character with the Pilot Trait, a [GetBuildingType('building_automotive_industry').GetName] of level #V 5#! or higher and an [GetBuildingType('building_airport').GetName] of level #V 2#! or higher.#!"
 MR_CHANGE_TO_CIVIL_EGINEER_BUTTON_TT: "#T Change your Engineer to specialize as a [concept_tesla_civil_engineer]#!\nYour [concept_tesla_engineer] will focus on [Concept('concept_tesla_civil_engineer','$concept_tesla_civil_engineering$')]. This might reduce their efficiency. You will not be able to change the Specialization again for #n 5 years#!.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_CHANGE_TO_CIVIL_EGINEER_BUTTON_HAS_NO_CIVIL_ENGINEER_TT: "#default_text [GetPlayer.GetName] does not have a [concept_tesla_civil_engineer].#!"
 MR_CHANGE_TO_MECHANICAL_EGINEER_BUTTON_TT: "#T Change your Engineer to specialize as a [concept_tesla_mechanical_engineer]#!\nYour [concept_tesla_engineer] will focus on [Concept('concept_tesla_mechanical_engineer','$concept_tesla_mechanical_engineering$')]. This might reduce their efficiency. You will not be able to change the Specialization again for #n 5 years#!.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
