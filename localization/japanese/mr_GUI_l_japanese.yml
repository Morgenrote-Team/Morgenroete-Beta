 TOTAL_MINERALS_VAR_TT: "#header [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')]#!\n[GetPlayer.GetName]はこれまで@agassiz_mineral![GetPlayer.MakeScope.GetVariable('agassiz_generic_minerals_var').GetValue|V0][Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')]を蒐集した。今年の[GetPlayer.GetNameNoFormatting]は[GetPlayer.MakeScope.ScriptValue('agassiz_yearly_mineral_value')|+=0][Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')]を採取する見込み。\n\n#T 毎年の[GetPlayer.GetNameNoFormatting]の鉱物量の内訳#!\n#p +500#!が#V 基準点#![GetPlayer.GetCustom('agassiz_yearly_minerals_desert_type')][GetPlayer.GetCustom('agassiz_yearly_minerals_arctic_type')][GetPlayer.GetCustom('agassiz_yearly_minerals_geyser_type')][GetPlayer.GetCustom('agassiz_yearly_minerals_special_deposit_type')][GetPlayer.GetCustom('agassiz_yearly_minerals_cave_type')][GetPlayer.GetCustom('agassiz_yearly_minerals_mountain_type')][GetPlayer.GetCustom('agassiz_yearly_minerals_formation_type')][GetPlayer.GetCustom('agassiz_yearly_minerals_great_formation_type')][GetPlayer.GetCustom('agassiz_yearly_minerals_volcano_type')][GetPlayer.GetCustom('agassiz_yearly_minerals_uranium_type')][GetPlayer.GetCustom('agassiz_yearly_minerals_geological_research_type')]"
