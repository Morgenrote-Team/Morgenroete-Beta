 MR_GEOLOGIST_ORE_VEIN_BUTTON_TT: "#T 鉱脈調査#!\n[concept_agassiz_geologist]は既存の鉱山近郊で新しい鉱床を調査して、鉱物資源の生産性をあげることができる。\n\n建造物は$agassiz_building_production_mult_modifier_with_tooltip$[concept_modifier]を得る\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GEOLOGIST_ORE_VEIN_STOP_BUTTON_TT: "#T Stop Prospecting Ore#!\nA Your [concept_agassiz_geologist] is currently searching for new raw material deposits near already established mines and thus increasing the production of the ore.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GEOLOGIST_OIL_BUTTON_TT: "#T 油田調査#!\n[concept_agassiz_geologist]は既存の石油リグ近郊で新しい油田を調査して、生産性をあげることができる。\n\n建造物は$agassiz_building_production_2_mult_modifier_with_tooltip$[Concept('concept_modifier','$concept_modifiers$')]を得る\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 VISIT_OBSERVATORY_BUTTON: "プラネタリウム"
 VISIT_OBSERVATORY_BUTTON_TT: "#T プラネタリウムを表示#!\nプラネタリウムではこの国や他国、科学界の天文学知識を確認できる。"
 MR_SELL_MINERALS_FOR_RARE_MINERAL_BUTTON_TT: "#T 鉱物と希少鉱物の交換#!\n[concept_agassiz_geologist]は同僚やコレクター、アマチュア地質学者から[Concept('concept_agassiz_rare_mineral','$concept_agassiz_rare_minerals$')]を買い取ることができる。代金として相当量の鉱物を売り払う必要がある。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GEOLOGIST_PALEONTOLOGIST_SYMPOSIUM_BUTTON: "学際シンポジウム"
 MR_GEOLOGIST_PALEONTOLOGIST_SYMPOSIUM_BUTTON_TT: "#T 地質学・古生物学シンポジウム#!\n地質学と古生物学には重なる部分が多い。両学問の著名人が一堂に会して意見を交わし、地球の歴史についての新たな仮説を生み出そう。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTING_GEOLOGIST_TT: "#T Promote Geologist#!\n#p You are currently promoting the Geologist.#!\n[Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')] study minerals, volcanoes and other geological formations."
