 MR_ARABLE_LAND: "[concept_arable_land]"
 MR_ARABLE_LAND_TT: "Sort [Concept('concept_state', '$concept_states$')] by available [concept_arable_land]."
 MR_RED_CROSS_BUTTON: "[concept_panum_red_cross]の設立"
 MR_RED_CROSS_BUTTON_TT: "#T [concept_panum_red_cross]の設立#!\n国際赤十字社は、世界でもっとも古い国際組織のひとつ。この組織の発足が大きな一歩となって、やがて国際法の形成につながった。赤十字社は人類の生命と健康の保護、あらゆる人の尊重、そして人類の苦難の保護・緩和をモットーとして設立された。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_IRC_INFAMY_TRIGGER_TT: "#default_text [GetPlayer.GetName]の#V [concept_infamy]が35#!未満である#!"
 MR_JOIN_RED_CROSS_BUTTON: "[concept_panum_red_cross]への参加"
 MR_JOIN_RED_CROSS_BUTTON_TT: "#T [concept_panum_red_cross]への参加#!\nわが国も赤十字社に参加し、国際的な枠組みの一員として評判を上げることができる。その代わり戦争にさまざまな制約がつく。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_SIGN_FIRST_CONVENTION_BUTTON: "第一回協定の調印"
 MR_SIGN_FIRST_CONVENTION_BUTTON_TT: "#T 第一次協定の調印#!\n第一次ジュネーブ条約（正式名称「戦地軍隊における傷病者の状態改善に関する条約」）は、武力紛争の犠牲者に関する国際法のルールの土台となっている。おもな規則として捕虜の保護、傷病兵の治療にあたる衛生施設への攻撃の禁止、あらゆる戦闘員の公平な処遇と治療があげられる。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_SIGN_SECOND_CONVENTION_BUTTON: "第二回協定の調印"
 MR_SIGN_SECOND_CONVENTION_BUTTON_TT: "#T 第二回協定の調印#!\n1899年と1907年、オランダのハーグにおける国際平和会議で複数の国際条約と共同宣言を調印された。2回の会議で武装解除や戦争法規、戦争犯罪について交渉された。1907年会議では海戦についても話し合われた。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_SIGN_THIRD_CONVENTION_BUTTON: "第三回協定の調印"
 MR_SIGN_THIRD_CONVENTION_BUTTON_TT: "#T 第三回協定の調印#!\n窒息性ガス、毒性ガスまたはこれらに類するガスおよび細菌学的手段の戦争における使用の禁止に関する議定書、通称ジュネーヴ議定書は、国際的な武力紛争における化学・生物兵器の使用を禁止する条約。1925年6月17日にジュネーヴで調印された。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_LEAVE_RED_CROSS_BUTTON: "赤十字社からの脱退"
 MR_LEAVE_RED_CROSS_BUTTON_TT: "#T 赤十字社からの脱退#!\n人間は人間にとって狼である。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PHYSICIAN_INTRODUCE_MEDICAL_TECHNIQUES_LEVEL_BUTTON_TT: "#T 医術の導入#!\n医師に命令して現代的な器具、方式、最新の治療法、医療施設を全国に普及させる。ときどき医師が画期的な新発明をすることがある。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PHYSICIAN_INTRODUCE_MEDICAL_TECHNIQUES_LEVEL_BUTTON_ACTIVE_TT: "#T 医術の導入#!\n現在、医師は現代的な器具、方式、最新の治療法、医療施設を全国に普及させている。ときどき医師が画期的な新発明をすることがある。"
