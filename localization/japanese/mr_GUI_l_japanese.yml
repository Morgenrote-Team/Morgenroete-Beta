 MR_EXAMINE_CAVE_BUTTON_BUTTON_TT: "#T Examine Cave#!\nWith the help of an [concept_andersson_anthropologist], the previously known [Concept('concept_andersson_cave','$concept_andersson_caves$')] on national territory can be explored. [Concept('concept_andersson_human_fossil','$concept_andersson_human_bones$')] and prehistoric artifacts can be recovered.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
