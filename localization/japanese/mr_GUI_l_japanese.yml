 MR_GEOLOGIST_AGE_EARTH_BUTTON_TT: "#T 地球の年齢測定#!\n地質学者は生涯で1度だけ地球の年齢を測定し、仮説を世界中の地質学者に提示することができる。学界が賛同すれば、新しい定説となる。否認されると地質学者は落ち込み、その後あらためて新説を提示することができる。新しい仮説を提示するためには、地質学スコアが最新の仮説を提唱した国のスコアを上回る必要がある。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
