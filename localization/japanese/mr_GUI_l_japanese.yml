 MR_CHANGE_TO_MILITARY_EGINEER_BUTTON_TT: "#T Change your Engineer to specialize as a [concept_tesla_military_engineer]#!\nYour [concept_tesla_engineer] will focus on [Concept('concept_tesla_military_engineer','$concept_tesla_military_engineering$')]. This might reduce their efficiency. You will not be able to change the Specialization again for #n 5 years#!.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
