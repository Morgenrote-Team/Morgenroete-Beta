 MR_GEOLOGIST_TECTONICS_CONGRESS_BUTTON_TT: "#T 大陸移動説会議#!\n何世紀にもわたって、大陸は固定された不動の存在であると固く信じられてきた。傑出した地質学者、それに大量の地質学的知見があれば、この仮説を崩すこともできる。しかし成功する確率はあまり高くない。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
