 VISIT_MUSEUM_BUTTON_TT: "#T Visit the Archaeological Museum#!\nThe [concept_lepsius_museum] is the place where all your [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] are presented. It offers an overview of your archaeological collection.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
