 MR_ASTEROID_CONGRESS_BUTTON: "小惑星会議"
 MR_ASTEROID_CONGRESS_BUTTON_TT: "#T 小惑星についての天文学会議#!\n1801年のケレス発見を皮切りとして天文学者は次々と大型天体を発見し、それにともなって太陽系の惑星は増加の一途をたどった。海王星の発見によって、火星・木星間などに存在する多数の小型天体を分類する新たなカテゴリーが必要ではないかという声が高まった。新天体用の新しい天体記号の発案問題、それに新惑星の比較的小さなサイズもからんで、天文学者たちは新惑星を「小惑星」と呼ぶほうがふさわしいのではないかと考えている。ただもちろん、この分類が制定されてしまうと、これまで惑星と考えられてきた天体の一部が惑星ではなくなり、ただの岩の塊に格下げになってしまう。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ASTEROID_CONGRESS_NEPTUNE_TT: "#default_text #V 海王星#!が発見されている#!"
 MR_ASTEROID_CONGRESS_OBSERVATORY_BUILDING_TRIGGER_TT: "#default_text [GetPlayer.GetName]に[GetBuildingType('building_verrier_observatory').GetName]が存在する#!"
 MR_ASTEROID_CONGRESS_ASTRONOMER_TRIGGER_TT: "#default_text [concept_verrier_astronomer]が存在する#!"
 MR_ASTEROID_CONGRESS_OBJECTS_TRIGGER_TT: "#default_text 世界で#BLUE 1500#!以上の@verrier_astronomicalobject![Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]が発見されている。現在[GetGlobalVariable('verrier_total_astronomical_objects').GetValue|+0]@verrier_astronomicalobject!個が発見済#!"
 MR_CARTE_DE_CIEL_CONGRESS_BUTTON: "写真天図星表"
 MR_CARTE_DE_CIEL_CONGRESS_BUTTON_TT: "#T 写真天図星表#!\n1887年、パリ天文台長アメデ・ムーシェは国際協力によるかつてない規模の巨大星図作成計画を立ち上げた。ムーシェは当時発明されたばかりの乾板写真に着目し、星図作成に革命をもたらすことができると考えた。1887年4月20日、パリにて50余名の天文学者が参加した会議がおこなわれ、世界各国の20の天文台がプロジェクトへの参加を表明した。わが国もこのような会議を開催して、国際社会の天文学的知見を共有することができる。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ASTRONOMY_CONGRESS_5_YEARS_TRIGGER_TT: "#default_text #V 過去5年以内#!に#V 天文学会議#!を開催していない（前回の主催国が「天文学会議の開催」補正を有していない）#!"
 MR_CARTE_DE_CIEL_CONGRESS_OBJECTS_TRIGGER_TT: "#default_text 世界で#BLUE 7000#!以上の@verrier_astronomicalobject![Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]が発見されている。現在[GetGlobalVariable('verrier_total_astronomical_objects').GetValue|+0]@verrier_astronomicalobject!個が発見済#!"
 MR_CARTE_DE_CIEL_CONGRESS_UNIVERSITY_BUILDING_TRIGGER_TT: "#default_text [GetPlayer.GetName]に#V 施設レベル10以上の#![GetBuildingType('building_university').GetName]が存在する#!"
 MR_GREAT_DEBATE_CONGRESS_BUTTON: "大論争"
 MR_GREAT_DEBATE_CONGRESS_BUTTON_TT: "#T 大論争#!\n大論争（シャプレー＝カーティス論争とも）は20世紀初頭の討論会をまとめたもので、のちに銀河の数や宇宙のサイズなどに新たな発見につながった。討論会では天の川銀河の大きさ、そして当時「渦巻星雲」と呼ばれていた天体は天の川銀河の一部の小型天体なのか、それとも天の川銀河よりも遠くに位置する別の銀河なのかが争点となった。討論会当日、シャプレーとカーティスはそれぞれ宇宙のスケールについての論文を用意して、午後に公開討論をおこなった。わが国もこのような会議を開催して、宇宙の謎に決着をつけることができる。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GREAT_DEBATE_CONGRESS_OBJECTS_TRIGGER_TT: "#default_text 世界で#BLUE 12000#!以上の@verrier_astronomicalobject![Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]が発見されている。現在[GetGlobalVariable('verrier_total_astronomical_objects').GetValue|+0]@verrier_astronomicalobject!個が発見済#!"
 SPECIMEN_VAR: "@dubois_specimen!  [GetPlayer.MakeScope.Var('dubois_specimen').GetValue|*V0]"
 SPECIMEN_VAR_TT: "#header [Concept('concept_dubois_specimen','$concept_dubois_specimens$')]#!\n[GetPlayer.GetName] has collected @dubois_specimen! [GetPlayer.MakeScope.GetVariable('dubois_specimen').GetValue|V0] [Concept('concept_dubois_specimen','$concept_dubois_specimens$')]."
 MR_SAFARI_EXPEDITION_BUTTON_TT: "#T Heia Safari#!\nOn an African Safari, through constant tracking and trapping, large game can be captured and then transported to a [concept_dubois_zoo]. It is only possible to catch one animal per safari. Depending on the animal species, it differs whether you need traps or have to stay on their trail. As a rule of thumb, large, sluggish animals need more traps, while fast animals require more tracking.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_SAFARI_EXPEDITION_NATURALIST_TRIGGER_TT: "#default_text [GetPlayer.GetName] has a [concept_dubois_naturalist] that is #V not busy#!.#!"
 MR_SAFARI_EXPEDITION_HAS_SMALL_OR_BIGGER_ZOO_TRIGGER_TT: "#default_text You have a [concept_dubois_zoo] that is at least #V small sized#!.#!"
 MR_SAFARI_EXPEDITION_HABITAT_TRIGGER_TT: "#default_text [GetPlayer.GetName] #V owns at least one African Animal habitat#! with big game or there is such a Habitat in a state #V owned by a decentralized nation#!.#!"
 MR_SAFARI_EXPEDITION_RECENT_TRIGGER_TT: "#default_text [GetPlayer.GetName] is not #V on a Safari#! or #V recently had one#!.#!"
 MR_ZOOLOGICAL_EXPEDITION_BUTTON_TT: "#T Catch local Animals#!\nOur nation has animal habitats with fascinating species that could be displayed in a [concept_dubois_zoo]. A [concept_dubois_naturalist] is to travel across the country for a year to collect [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] for a zoo.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ZOOLOGICAL_EXPEDITION_LOCAL_ANIMALS_TRIGGER_TT: "#default_text [GetPlayer.GetName] owns at least one animal habitat that is home to an [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] that does not live in our [concept_dubois_zoo].#!"
 MR_ZOOLOGICAL_EXPEDITION_CURRENT_EXPEDITION_TRIGGER_TT: "#default_text [GetPlayer.GetName] is not #V currently catching local animals#!.#!"
 MR_HIPPOCAMPUS_CONGRESS_BUTTON: "Hippocampus Congress"
 MR_HIPPOCAMPUS_CONGRESS_BUTTON_TT: "#T Hippocampus Congress#!\nHow unique is man? How much of an animal is he? The ancient Greeks had already noticed a closeness between humans and apes. The fact that Carl Linneaus classified apes and humans as primates - the 'highest' rank among animals - shows that the field was once not so controversial. However, with the formulation of the theory of evolution and the presumed descent of humans from an ape-like relative, conflicts have arisen that must now be resolved.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_NATURALIST_TRIGGER_TT: "#default_text [GetPlayer.GetName] has a [concept_dubois_naturalist]#!"
 MR_HIPPOCAMPUS_CONGRESS_5_NATURALISTS_TRIGGER_TT: "#default_text At least #V 5 countries#! have a [concept_dubois_naturalist].#!"
 MR_HIPPOCAMPUS_CONGRESS_SPECIMEN_TRIGGER_TT: "#default_text [GetPlayer.GetName] has #V 20000 or more#! [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] (currently [GetPlayer.MakeScope.Var('dubois_specimen').GetValue|0+]).#!"
 MR_HIPPOCAMPUS_CONGRESS_GLOBAL_SPECIMEN_TRIGGER_TT: "#default_text #V 100000 or more#! [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] have been collected worldwide (currently [GetGlobalVariable('dubois_global_specimen').GetValue|0+]).#!"
 MR_EXTEND_ZOO_SMALL_BUTTON: "Extend the [concept_dubois_zoo] (small)"
 MR_EXTEND_ZOO_SMALL_BUTTON_TT: "#T Extend the Zoo to small size#!\n[Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] are everyone's happiness: people disperse in the zoo, scientists can continue their zoological studies, and international prestige is granted to those who can show the largest possible number of foreign fauna. With each expansion, the prestige of a nation increases. Some expansion stages require not only to collect many animals, but also from different parts of the world.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_EXTEND_ZOO_SMALL_10_TOTAL_ANIMALS_TRIGGER_TT: "#default_text [GetPlayer.GetName] has #V 10 total#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')]. You currently have [GetPlayer.MakeScope.Var('dubois_zoo_animal_total').GetValue|0+].#!"
 MR_EXTEND_ZOO_SMALL_2_SPECIAL_ANIMALS_TRIGGER_TT: "#default_text [GetPlayer.GetName] has #V 2 African#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] (currently [GetPlayer.MakeScope.Var('dubois_zoo_animal_africa').GetValue|0+]), #V 2 Asian#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] (currently [GetPlayer.MakeScope.Var('dubois_zoo_animal_asia').GetValue|0+]) or #V 2 Oceanic#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] (currently [GetPlayer.MakeScope.Var('dubois_zoo_animal_australia').GetValue|0+])."
 MR_EXTEND_ZOO_SMALL_CURRENT_EXPANSION_TRIGGER_TT: "#default_text [GetPlayer.GetName] is #V not currently expanding#! the [concept_dubois_zoo].#!"
 MR_EXTEND_ZOO_MEDIUM_BUTTON: "Extend the [concept_dubois_zoo] (medium)"
 MR_EXTEND_ZOO_MEDIUM_BUTTON_TT: "#T Extend the Zoo to medium size#!\n[Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] are everyone's happiness: people disperse in the zoo, scientists can continue their zoological studies, and international prestige is granted to those who can show the largest possible number of foreign fauna. With each expansion, the prestige of a nation increases. Some expansion stages require not only to collect many animals, but also from different parts of the world.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_EXTEND_ZOO_SMALL_20_TOTAL_ANIMALS_TRIGGER_TT: "#default_text [GetPlayer.GetName] has #V 20 total#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')]. You currently have [GetPlayer.MakeScope.Var('dubois_zoo_animal_total').GetValue|0+].#!"
 MR_EXTEND_ZOO_SMALL_5_SPECIAL_ANIMALS_TRIGGER_TT: "#default_text [GetPlayer.GetName] has #V 5 African#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] (currently [GetPlayer.MakeScope.Var('dubois_zoo_animal_africa').GetValue|0+]), #V 5 Asian#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] (currently [GetPlayer.MakeScope.Var('dubois_zoo_animal_asia').GetValue|0+]), #V 5 Oceanic#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] (currently [GetPlayer.MakeScope.Var('dubois_zoo_animal_australia').GetValue|0+]) or #V 5 South American#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] (currently [GetPlayer.MakeScope.Var('dubois_zoo_animal_south_america').GetValue|0+]).#!"
 MR_EXTEND_ZOO_LARGE_BUTTON: "Extend the [concept_dubois_zoo] (large)"
 MR_EXTEND_ZOO_LARGE_BUTTON_TT: "#T Extend the Zoo to large size#!\n[Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] are everyone's happiness: people disperse in the zoo, scientists can continue their zoological studies, and international prestige is granted to those who can show the largest possible number of foreign fauna. With each expansion, the prestige of a nation increases. Some expansion stages require not only to collect many animals, but also from different parts of the world.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_EXTEND_ZOO_SMALL_30_TOTAL_ANIMALS_TRIGGER_TT: "#default_text [GetPlayer.GetName] has #V 30 total#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')]. You currently have [GetPlayer.MakeScope.Var('dubois_zoo_animal_total').GetValue|0+].#!"
 MR_EXTEND_ZOO_FAMOUS_BUTTON: "Extend the [concept_dubois_zoo] (famous)"
 MR_EXTEND_ZOO_FAMOUS_BUTTON_TT: "#T Extend the Zoo to famous size#!\n[Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] are everyone's happiness: people disperse in the zoo, scientists can continue their zoological studies, and international prestige is granted to those who can show the largest possible number of foreign fauna. With each expansion, the prestige of a nation increases. Some expansion stages require not only to collect many animals, but also from different parts of the world.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_EXTEND_ZOO_SMALL_40_TOTAL_ANIMALS_TRIGGER_TT: "#default_text [GetPlayer.GetName] has #V 40 total#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')]. You currently have [GetPlayer.MakeScope.Var('dubois_zoo_animal_total').GetValue|0+]#!"
 MR_SPECIMEN_GARDEN_BUTTON: "Found Botanical Garden"
 MR_SPECIMEN_GARDEN_BUTTON_TT: "#T Found Botanical Garden#!\nA Botanical Garden in your Zoo will make it even more prestigeous. We can plant all the exotic plants collected by our [concept_dubois_naturalist].\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_SPECIMEN_GARDEN_SPECIMEN_TRIGGER_TT: "#default_text [GetPlayer.GetName] has #V 50000 or more#! [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] (currently [GetPlayer.MakeScope.Var('dubois_specimen').GetValue|0+]).#!"
 MR_SPECIMEN_GARDEN_NO_BOTANICAL_GARDEN_TRIGGER_TT: "#default_text [GetPlayer.GetName] does not have a #V Botanical Garden#! yet.#!"
 MR_SPECIMEN_GARDEN_EFFECT_TT: "Your [GetBuildingType('building_dubois_zoo').GetName] will get a #V Botanical Garden#! that gives you 50 prestige and minor standard of living boost."
 MR_SPECIMEN_COLLECTION_BUTTON: "Found Specimen Collection"
 MR_SPECIMEN_COLLECTION_BUTTON_TT: "#T Found Specimen Collection#!\nOrdering all our exotic insects, butterflies and other [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] would show the world how scientifically advanced our nation is.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_SPECIMEN_GARDEN_NO_SPECIMEN_COLLECTION_TRIGGER_TT: "#default_text [GetPlayer.GetName] does not have a #V Specimen Collection#! yet.#!"
 MR_SPECIMEN_COLLECTION_EFFECT_TT: "Your [GetBuildingType('building_dubois_zoo').GetName] will get a #V Specimen Collection#! that gives you 50 prestige and minor research boosts."
 MR_BAN_ANIMAL_EXPORT_BUTTON: "Ban Animal Export"
 MR_BAN_ANIMAL_EXPORT_BUTTON_TT: "#T Ban Animal Export#!\nWith a ban on animal exports, we are making it clear in principle that we are not prepared to sell any of our animals abroad. Other nations will refrain from inquiries.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ALLOW_ANIMAL_EXPORT_BUTTON: "Allow Animal Export"
 MR_ALLOW_ANIMAL_EXPORT_BUTTON_TT: "#T Allow Animal Export#!\nWith an export permit for animals, we can earn a nice extra income.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BREEDING_ANIMALS_BUTTON: "Breed Animals"
 MR_BREEDING_ANIMALS_BUTTON_TT: "#T Breed Animals in your Nature Reserve#!\nTry to establish a new [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animal$')] [concept_dubois_habitat] in a state with a [concept_dubois_nature_reserve].\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BREEDING_ANIMALS_TRIGGER: "#default_text You can breed [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] if you have a state with a [concept_dubois_nature_reserve] that does not have the specific animal from the same region as the #V Nature Reserve#! yet and if you have that animal in your [concept_dubois_zoo].\nIf you have a #b Nature Reserve#! in a European State for example and want to breed the #b Alpine Ibex#! in it, you can only do that if the state does not have an Ibex [concept_dubois_habitat] yet and if you have #b Alpine Ibexes#! in your #b Zoo#!.#!"
 FOSSIL_VAR: "@dubois_fossil!  [GetPlayer.MakeScope.Var('dubois_fossil').GetValue|V0]"
 FOSSIL_VAR_TT: "#header [Concept('concept_dubois_fossil','$concept_dubois_fossils$')]#!\n[GetPlayer.GetName] has collected @dubois_fossil! [GetPlayer.MakeScope.GetVariable('dubois_fossil').GetValue|V0] [Concept('concept_dubois_fossil','$concept_dubois_fossils$')]."
 MR_PALEONTOLOGICAL_EXPEDITION_BUTTON: "Paleontological Expedition"
 MR_PALEONTOLOGICAL_EXPEDITION_NOT_TRAVELLING_TRIGGER: "#default_text The [GetPlayer.GetAdjective] [concept_dubois_paleontologist] is #V not currently travelling#!.#!"
 MR_ACTIVE_PALEONTOLOGIST_TRIGGER: "#default_text [GetPlayer.GetName]の[concept_dubois_paleontologist]が#V 多忙ではない#!#!"
 MR_PALEONTOLOGICAL_EXPEDITION_HAS_ACCESS_FORMATION_TRIGGER: "#default_text [GetPlayer.GetName] has either direct access to a [Concept('concept_dubois_formation','$concept_dubois_geological_formation$')] or has a [concept_dubois_paleontological_licence].#!"
 MR_PALEONTOLOGICAL_EXPEDITION_NOT_CHOOSING_CURRENTLY_TRIGGER: "#default_text [GetPlayer.GetName] is #V not in the process of sending a Paleontological Expedition#! currently.#!"
 MR_PALEONTOLOGICAL_EXPEDITION_RECALL_BUTTON: "Recall Paleontological Expedition"
 MR_PALEONTOLOGICAL_EXPEDITION_RECALL_BUTTON_TT: "#T Recall Paleontological Expedition#!\nOrders the paleontologist back from his paleontological investigation for other uses - such as building or remodeling dinosaur skeletons.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNT_SKELETON_BUTTON: "Construct Dinosaur Skeleton"
 MR_MOUNT_SKELETON_BUTTON_TT: "#T Construct Dinosaur Skeleton#!\nYour [concept_dubois_paleontologist] can build a new [concept_dubois_dinosaur_skeleton] with 5 [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] from the same continent.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNT_SKELETON_ACTIVE_BUTTON_TRIGGER: "#default_text You are not already #V considering to construct a [concept_dubois_dinosaur_skeleton]#!.#!"
 MR_MOUNT_SKELETON_TRIGGER_TT: "#default_text [GetPlayer.GetName] has #V 5 [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] from a continent of which we do not have all [Concept('concept_dubois_dinosaur_skeleton','$concept_dubois_dinosaur_skeletons$')] yet#!.#!"
 MR_REMOUNT_SKELETON_BUTTON: "Remount Dinosaur Skeleton"
 MR_REMOUNT_SKELETON_BUTTON_TT: "#T Remount Dinosaur Skeleton#!\nIf you have any imperfect [Concept('concept_dubois_dinosaur_skeleton','$concept_dubois_dinosaur_skeletons$')] you can let your [concept_dubois_paleontologist] try to remount it. If your Paleontologist is experienced enough the remountet skeleton might be of better quality.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_REMOUNT_SKELETON_ACTIVE_BUTTON_TRIGGER: "#default_text You are not already #V considering to remount a [concept_dubois_dinosaur_skeleton]#!.#!"
 MR_REMOUNT_SKELETON_PALEONTOLOGIST_TRIGGER: "#default_text [GetPlayer.GetName] has a [concept_dubois_paleontologist] that is #V not busy#!.#!"
 MR_REMOUNT_SKELETON_TRIGGER_TT: "#default_text [GetPlayer.GetName] has at least one #V imperfect#! [concept_dubois_dinosaur_skeleton].#!"
 MR_TRANSFORM_FOSSILS_TO_BONES_BUTTON: "Fossils to Bone"
 MR_TRANSFORM_FOSSILS_TO_BONES_BUTTON_TT: "#T Transform Fossils into a Bone#!\nAn experienced or famous [concept_dubois_paleontologist] can transform 20 [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] into one [concept_dubois_dinosaur_bone] if you already own at least one bone and do not have too many bones of each continent.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_TRANSFORM_FOSSILS_TO_BONES_TRANSFORMABLE_DINOSAUR_BONE_TRIGGER: "#default_text [GetPlayer.GetName] already has #V at least 1#! [concept_dubois_dinosaur_bone] and does #V not have all necessary Bones of each continent yet#!.#!"
 MR_TRANSFORM_FOSSILS_TO_BONES_FOSSILS_TRIGGER: "#default_text [GetPlayer.GetName] has #V 20 or more#! [Concept('concept_dubois_fossil','$concept_dubois_fossils$')].#!"
 MR_TRANSFORM_FOSSILS_TO_BONES_PALEONTOLOGIST_TRIGGER: "#default_text [GetPlayer.GetName]に経験豊富または著名な[concept_dubois_paleontologist]が存在し、かつ多忙ではない#!"
 MR_EXTINCTION_CONGRESS_BUTTON: "Extinction Congress"
 MR_EXTINCTION_CONGRESS_BUTTON_TT: "#T Extinction Congress#!\nOne of the most puzzling mysteries in natural history remains the disappearance of the dinosaurs. The father of paleontology, Georges Cuvier, discovered that there had been a mass extinction at the end of the Cretaceous period in which the dinosaurs also died out. But how could the dire lizards, which dominated the earth for millions of years, suddenly become obsolete?\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
