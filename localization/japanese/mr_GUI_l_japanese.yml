 MR_SEND_CHARACTER_TO_ASYLUM_BUTTON: "精神病院への入院"
 MR_SEND_CHARACTER_TO_ASYLUM_BUTTON_TT: "#T 精神病院への入院#!\n精神障害や中毒、痴呆のせいで職務を全うできない者は、政治家や扇動者、支配者であっても大勢いる。精神科医がいれば、そういった人物を心神喪失であると診断することができる──たとえ一切診察しなくともだ。しかし精神医学を政治的に乱用すれば民衆や野党に気づかれ、それ相応の結果を招くことになるかもしれない……\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
