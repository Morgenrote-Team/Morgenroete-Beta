 MR_PHYSICIAN_CAN_DESCRIBE_LOCAL_DISEASE_TRIGGER_TT: "#default_text [GetPlayer.GetName]でまだ完全に解明されていない感染症が蔓延している。#!"
 MR_PHYSICIAN_DESCRIBE_DISEASE_FOREIGN_BUTTON_TT: "#T 医学観察遠征#!\n医師は感染症が広がる外地に足をはこんで病気を調べることができる。国内での調査よりも時間がかかる。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PHYSICIAN_DESCRIBE_DISEASE_FOREIGN_ACTIVE_TT: "#T 医学観察遠征#!\n#p 現在、$concept_panum_physician$が調査遠征中#!\n医師は感染症が広がる外地に足をはこんで病気を調べることができる。国内での調査よりも時間がかかる。"
 MR_PHYSICIAN_CAN_DESCRIBE_FOREIGN_DISEASE_TRIGGER_TT: "#default_text [GetPlayer.GetName]に関心がある地域で感染症が広がり、かつその病気を完全に解明していない。#!"
 MR_PHYSICIAN_FIND_TREATMENT_BUTTON_TT: "#T 病気の治療法#!\n医師は、国内で蔓延する感染症の治療法を見つけることができる。病気の予防にはつながらないが、その影響を大きく抑えることはできる。治療法の解明には病気ごとに特定の技術の発明が必要。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PHYSICIAN_FIND_TREATMENT_ACTIVE_TT: "#T 病気の治療法#!\n#p 現在、$concept_panum_physician$が治療法を研究中#!\n医師は、国内で蔓延する感染症の治療法を見つけることができる。病気の予防にはつながらないが、その影響を大きく抑えることはできる。治療法の解明には病気ごとに特定の技術の発明が必要。"
 MR_PHYSICIAN_CAN_FIND_LOCAL_TREATMENT_TRIGGER_TT: "#default_text [GetPlayer.GetName]に関心がある地域で感染症が広がっている。なおかつその病気の概論はあるが治療法を発見しておらず、対応する技術は発明している。#!"
 MR_PHYSICIAN_FIND_TREATMENT_FOREIGN_BUTTON_TT: "#T 医学研究遠征#!\n医師は感染症が広がる外地に足をはこんで病気の治療法を調べることができる。国内での調査よりも時間がかかる。治療法の解明には病気ごとに特定の技術の発明が必要。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PHYSICIAN_FIND_TREATMENT_FOREIGN_ACTIVE_TT: "#T 医学研究遠征#!\n#p 現在、$concept_panum_physician$が治療法を研究中#!\n医師は感染症が広がる外地に足をはこんで病気の治療法を調べることができる。国内での調査よりも時間がかかる。治療法の解明には病気ごとに特定の技術の発明が必要。"
 MR_PHYSICIAN_CAN_FIND_FOREIGN_TREATMENT_TRIGGER_TT: "#default_text [GetPlayer.GetName]に関心がある地域で感染症が広がっている。なおかつその病気の概論はあるが治療法を発見しておらず、対応する技術は発明している。#!"
