 MR_RECRUIT_BALLOONIST_BUTTON_TT: "Sponsor a [Concept('concept_curtiss_balloonist_role','$concept_curtiss_balloonist_role_only_balloonist$')] for your country. The #b Balloonist#! will try to break records for your country. Sponsoring a #b Balloonist#! will cost @money! #n 400#! per month.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
