 MR_ASTRONOMER_MOON_MAP_BUTTON_TT: "#T 月面地図の作成#!\n写真機と最新望遠鏡があれば、地球の友達のかつてない詳細な地図を作製できる。月面地図の作成は天文学の大きな功績となる。しかし天文学者が製図作業にとりかかると、発見できる天体の数は減少する\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
