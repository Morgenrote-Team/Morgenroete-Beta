 MR_NO_MORE_BALLOONIST_DEATH_EVENTS_BUTTON: "#n Hide#! Balloonist Death Events"
 MR_NO_MORE_BALLOONIST_DEATH_EVENTS_BUTTON_TT: "You will no longer receive events about the deaths of your [Concept('concept_curtiss_balloonist_role','$concept_curtiss_balloonist_role_only_balloonist$')]. Your #b Balloonist#! will still die though. A new #b Balloonist#! will automatically be sponsored. You can turn it back on at any time.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
