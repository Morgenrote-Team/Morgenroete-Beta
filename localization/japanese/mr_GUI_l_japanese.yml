 MR_GEOLOGIST_UNDERWATER_MOUNTAINS_BUTTON_TT: "#T Explore the Atlantic Mountains#!\nAfter evidence of subsea elevations was found during the laying of the transatlantic cable, leading geologists are wondering what the cause could be. Modern measuring equipment and an experienced geologist could unravel the mystery.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
