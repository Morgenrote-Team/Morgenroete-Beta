 MR_STOP_ENGINEERING_PROJECT_BUTTON: "プロジェクトの中止"
 MR_STOP_ENGINEERING_PROJECT_BUTTON_TT: "#T Stop Engineering Project#!\nStop your current Engineering Project. Your Engineering Progress will be lost.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_CIVIL_ENGINEER_RESEARCH_BUTTON: "Civil Engineering Research"
 MR_CIVIL_ENGINEER_INFRASTRUCTURE_BUTTON: "Infrastructure Project"
 MR_CIVIL_ENGINEER_INFRASTRUCTURE_BUTTON_TT: "#T Infrastructure Project#!\nLet your [concept_tesla_engineer] focus on expanding the infrastructure in [GetPlayer.GetName]. There are different projects that add [Concept('concept_modifier','$concept_modifiers$')] that add [concept_infrastructure] to your states. Each time the state with the least infrastructure will gain the modifier. This project will add #n expenses#! to your country.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_CIVIL_ENGINEER_INFRASTRUCTURE_TRIGGER_TT: "#default_text Any State in your country does not have the all the infrastructure [Concept('concept_modifier','$concept_modifiers$')]. A state needs a [GetBuildingType('building_railway').GetName] to get the railway modifier.#!"
 MR_CIVIL_ENGINEER_CONSTRUCTION_BUTTON: "Construction Project"
 MR_CIVIL_ENGINEER_CONSTRUCTION_BUTTON_TT: "#T Construction Project#!\nLet your [concept_tesla_engineer] focus on modernizing the [GetBuildingType('building_construction_sector').GetName] of [GetPlayer.GetName].\n\nThis will add three modifiers to your building over time: $gaudi_new_construction_methods_modifier_with_tooltip$, $gaudi_faster_construction_methods_modifier_with_tooltip$ and $gaudi_efficient_construction_methods_modifier_with_tooltip$.\n\nThis project will add #n expenses#! to your country.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_CIVIL_ENGINEER_CONSTRUCTION_TRIGGER_TT: "#default_text 国内にレベル1以上の[GetBuildingType('building_construction_sector').GetName]が存在し、3つの[Concept('concept_modifier','$concept_modifiers$')]をすべて取得していない#!"
 MR_MECHANICAL_ENGINEER_RESEARCH_BUTTON: "Mechanical Research"
 MR_MECHANICAL_ENGINEER_LOCOMOTIVES_BUTTON: "New Locomotives"
 MR_MECHANICAL_ENGINEER_LOCOMOTIVES_BUTTON_TT: "#T Develop new Locomotives#!\nLet your [concept_tesla_engineer] focus on constructing new locomotives that will give a bonus to your [GetBuildingType('building_railway').GetName] buildings. This will add #n expenses#! to your country.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MECHANICAL_ENGINEER_LOCOMOTIVES_TRIGGER_TT: "#default_text 国内にレベル1以上の[GetBuildingType('building_railway').GetName]が存在し、5つの機関車[Concept('concept_modifier','$concept_modifiers$')]をすべて取得していない#!"
 MR_MECHANICAL_ENGINEER_INDUSTRIES_BUTTON: "Modernizing Industries"
 MR_MECHANICAL_ENGINEER_INDUSTRIES_BUTTON_TT: "#T Modernizing Industries#!\nLet your [concept_tesla_engineer] focus on modernizing the production methods of a building. This will add small bonuses on [concept_throughput], [concept_good_production] and [concept_input_mult] to your building. This project will add #n expenses#! to your country.\n\nModifiers that the building will gain:\n$gaudi_building_throughput_add_modifier_with_tooltip$\n$gaudi_building_production_mult_modifier_with_tooltip$\n$gaudi_building_goods_input_mult_modifier_with_tooltip$\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MECHANICAL_ENGINEER_INDUSTRIES_TRIGGER_TT: "#default_text 国内にレベル1以上の工場建物が存在し、3つの[Concept('concept_modifier','$concept_modifiers$')]をすべて取得していない#!"
 MR_MILITARY_ENGINEER_RESEARCH_BUTTON: "Military Research"
 MR_MILITARY_ENGINEER_NAVAL_RESEARCH_BUTTON: "Naval Research"
 MR_MILITARY_ENGINEER_ADVANCED_WEAPONS_BUTTON: "Advanced Rifles"
 MR_MILITARY_ENGINEER_ADVANCED_WEAPONS_BUTTON_TT: "#T Develop Advanced Rifles#!\nLet your [concept_tesla_engineer] focus on developing advanced rifles. This will allow you to use a new [concept_mobilization_option] or raise its tier. This project will add #n expenses#! to your country.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MILITARY_ENGINEER_ADVANCED_TANKS_BUTTON: "Advanced Tanks"
 MR_MILITARY_ENGINEER_ADVANCED_TANKS_BUTTON_TT: "#T Develop Advanced Tanks#!\nLet your [concept_tesla_engineer] focus on developing advanced tanks. This will allow you to use a new [concept_mobilization_option] or raise its tier. This project will add #n expenses#! to your country.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MILITARY_ENGINEER_ADVANCED_DEFENCE_BUTTON: "Advanced Fieldworks"
 MR_MILITARY_ENGINEER_ADVANCED_DEFENCE_BUTTON_TT: "#T Develop Advanced Fieldworks#!\nLet your [concept_tesla_engineer] focus on developing advanced fieldwork techniques. This will allow you to use a new [concept_mobilization_option] or raise its tier. This project will add #n expenses#! to your country.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ELECTRICAL_ENGINEER_RESEARCH_BUTTON: "Electrical Research"
 MR_ELECTRICAL_ENGINEER_MAGNETIC_RESEARCH_STATION_BUTTON: "Join Geomagnetic Association"
 MR_ELECTRICAL_ENGINEER_MAGNETIC_RESEARCH_STATION_BUTTON_TT: "#T Join the Geomagnetic Association#!\nJoining the Magnetic Association in Göttingen is a mandatory requirement to begin our research in the field of earth magnetism and to set up a Geomagnetic Observatory.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ELECTRICAL_ENGINEER_TELEGRAPH_BUTTON: "Telegraphic Network"
 MR_ELECTRICAL_ENGINEER_TELEGRAPH_BUTTON_TT: "#T Establish a Telegraphic Network#!\nTelegraphy revolutionizes a country's communications, improving services and infrastructure in regions where a telegraphic network exists. Wiring a nation becomes more difficult the larger the country. Telegraph poles can only be built in a state whose neighboring state also has a telegraph pole. For overseas telegraphing, both the electric telegraph and electromagnetism are needed to lay submarine cables.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ELECTRICAL_ENGINEER_TELEGRAPH_RAILWAY_CAPITAL_TRIGGER_TT: "#default_text [GetPlayer.GetName] has a [GetBuildingType('building_railway').GetName] in the capital.#!"
 MR_ELECTRICAL_ENGINEER_TELEGRAPH_RAILWAY_65_PERCENT_TRIGGER_TT: "#default_text [GetPlayer.GetName]の#p 65％#!以上の州に[GetBuildingType('building_railway').GetName]が敷設済#!"
 MR_ELECTRICAL_ENGINEER_RADIO_BUTTON: "Radio Network"
 MR_ELECTRICAL_ENGINEER_RADIO_BUTTON_TT: "#T Build a Radio Station Network#!\nThe time for annoying tangled cables is over! With the invention of radio technology, messages can now be sent via antenna. This not only makes it possible to exchange news, but also to establish radio programs. Before that, of course, a nationwide network of radio stations needs to be set up.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ELECTRICAL_ENGINEER_MAGNETIC_RESSOURCE_1_BUTTON: "Search Iron Deposit"
 MR_ELECTRICAL_ENGINEER_MAGNETIC_RESSOURCE_1_BUTTON_TT: "#T Search for an Iron Deposit#!\nGeophysics and geomagnetism have many practical uses. Mining in particular benefited from uncovering possible deposits. Large companies used geophysical knowledge to locate previously unknown deposits of iron, lead and oil. Together with the right technologies and the mapping of the earth's magnetic field, it should be easy to make productive use of current theoretical knowledge.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ELECTRICAL_ENGINEER_OBSERVATORY_WITH_MAGNETIC_OBSERVATORY_TRIGGER_TT: "#default_text [GetPlayer.GetName] has a [GetBuildingType('building_verrier_observatory').GetName] with the #V Geomagnetic Observatory#! [concept_production_method].#!"
 MR_ELECTRICAL_ENGINEER_MAGNETIC_RESSOURCE_2_BUTTON: "Search Lead Deposit"
 MR_ELECTRICAL_ENGINEER_MAGNETIC_RESSOURCE_2_BUTTON_TT: "#T Search for a Lead Deposit#!\nGeophysics and geomagnetism have many practical uses. Mining in particular benefited from uncovering possible deposits. Large companies used geophysical knowledge to locate previously unknown deposits of iron, lead and oil. Together with the right technologies and the mapping of the earth's magnetic field, it should be easy to make productive use of current theoretical knowledge.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ELECTRICAL_ENGINEER_MAGNETIC_RESSOURCE_3_BUTTON: "Search Oil Deposit"
