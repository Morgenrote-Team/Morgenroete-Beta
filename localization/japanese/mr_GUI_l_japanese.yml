 MR_CHEMIST_SYNTHETIC_RUBBER_BUTTON_TT: "#T 合成ゴム#!\nゴムはごく限られた気候帯にしか生息しない。この貴重な天然資源を得ようとすれば、植民地か輸入しかない。だがもしも、化学の力でわが国にないものを補うことができるとしたら？\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
