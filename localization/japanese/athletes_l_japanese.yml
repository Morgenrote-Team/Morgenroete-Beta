l_japanese:

 athletes.2.t: "我らがマウンテニア、[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullNameNoFormatting] 、引退" #deepl:814507835
 athletes.2.d: "After spending decades of [SCOPE.sCharacter('athletes_retired_person_scope').GetHerHis] life climbing peaks, charting unknown routes, and leading expeditions through perilous terrain, [SCOPE.sCharacter('athletes_retired_person_scope').GetFullName] has decided to retire. [SCOPE.sCharacter('athletes_retired_person_scope').GetSheHe|U] will no longer serve as our [concept_douglas_mountaineer]."
 athletes.2.f: ""
 athletes.2.g: "山頂は決して終わりではなく、下山前の景色だけだった。" #deepl:3095673486
 athletes.12.t: "我らがマウンテニア死す" #deepl:3903757311
 athletes.12.d: "ピークを征服し、最も危険なクライミングで他人を導くことに生涯を費やした後、我々の最も尊敬する[concept_douglas_mountaineer] 。今、誰が雲への道を導くのだろうか？" #deepl:820605549
 athletes.12.f: ""
 athletes.12.g: "ロープはなくなっても、足跡は残っている。" #deepl:3208123983

 athletes.52.t: "新型マウンテニア" #deepl:1807684299
 athletes.52.d: "[SCOPE.sCharacter('douglas_new_mountaineer_scope').GetFullName] は将来有望な才能の持ち主である。" #deepl:1736780592
 athletes.52.f: ""
 athletes.52.g: "[SCOPE.sCharacter('douglas_new_mountaineer_scope').GetSheHe|U] は目的を持って登る。" #deepl:1012883623

 athletes.102.t: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] がベテランマウンテニアになった！" #deepl:4259800261
 athletes.102.d: "氷河に挑み、稜線を越え、未知への探検を先導してきた私たちの[concept_douglas_mountaineer] [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] 、今やベテラン登山家と呼ばれるほど有名になった！" #deepl:334481273
 athletes.102.f: ""
 athletes.102.g: "山の達人！" #deepl:1052077048
