 je_gaudi_capital_expansion_project: "Capital Expansion"
 je_gaudi_capital_expansion_project_reason: "1836年から1936年にかけて、ヴィクトリア朝時代の首都は大きな都市変革を遂げた。パリはオスマンによる広い大通りと軸線に沿った眺望によって再形成された。ウィーンは1857年に城壁を取り壊し、壮大なリング大通りに置き換えた。ベルリンは、長屋街、工業地区、後のモダニズム住宅団地と急速に拡大した。ロンドンは、郊外鉄道、インフラ整備、世界初の地下鉄建設によって大きく発展した。ヨーロッパ大陸全域で、王宮都市は権力、野心、社会的緊張の高まりの象徴である近代的な大都市へと発展した。" #deepl:4052914498

 gaudi.41.t: "解き放たれた都市" #deepl:1231776512
 gaudi.41.d: "古い壁が取り払われる。その場所には空気と光、そして成長の約束がある。" #deepl:2117769530
 gaudi.41.f: "何世紀もの間、[ROOT.GetCountry.GetCapital.GetCityHubName] は城壁のようなものだった。誇り高く、コンパクトで、自分自身の中に閉じこもっていた。中世の要塞は取り壊された。中世の要塞は取り壊され、その代わりに、木々が生い茂り、高貴なファサードが並ぶ広い大通りが出現した。かつて衛兵が行進した場所を、今は市場の荷馬車や散歩するカップルが歩いている。大通りは単なる道路ではない。自信と拡大、大きすぎて収まりきらない未来の表明なのだ。古代の門が失われたことを嘆く人もいる。しかし、[ROOT.GetCountry.GetCapital.GetCityHubName] 、ついに最初の深呼吸をした。" #deepl:4076900735
 gaudi.41.g: "私たちは、ビジョンと活力をもって、外に向かって築いていく。" #deepl:1116241139
 gaudi.42.t: "進歩の指輪" #deepl:3156235256
 gaudi.42.d: "新しい大通りの環が都市と州を結びつける。" #deepl:3367270166
 gaudi.42.f: "かつてはぬかるんだ堤防があったが、今は石と鉄が支配している。大通りは[ROOT.GetCountry.GetCapital.GetCityHubName] の中心をネックレスのようにカーブし、地区を動きと光で結びつけている。街区全体が塗り替えられ、公園が切り開かれ、モニュメントが完璧な遠近法で縁取られた。ガス灯は夕暮れ時になると、整然と並んだ星のように咲き誇る。メートル舗装されるごとに、[ROOT.GetCountry.GetCapital.GetCityHubName] 。そして人々は？かつて歩くのを恐れた道を、見たこともない彫像を眺めながら散歩している。" #deepl:3543082084
 gaudi.42.g: "防御のリングではなく、方向性を示すリング。" #deepl:2497263912
 gaudi.43.t: "権威の道" #deepl:4104296278
 gaudi.43.d: "新しいプレフェクトは、[ROOT.GetCountry.GetCapital.GetCityHubName]- 一度に一つの軸を再構築する。広く、まっすぐで、まったく妥協を許さない。" #deepl:2867872335
 gaudi.43.f: "これは拡大ではない。近隣全体がコンパスと計画の下敷きになっている。通りは、かつては迷路のようだった四つ角に、大通りのように刻まれる。古い路地は消え去り、その代わりに、長くまっすぐな線が伸びている。抵抗は起こるが、許可証に署名し、家屋を収用し、ファサードを整列させる。[ROOT.GetCountry.GetCapital.GetCityHubName] 、視認性、回遊性、統制といった秩序の言葉を話すようになった。その壮大さの裏には意図がある。役人は「近代化」と呼ぶ。県知事は「必要」と呼ぶ。" #deepl:4133801679
 gaudi.43.g: "誰もこの計画から逃れることはできない" #deepl:2017759053
 gaudi.44.t: "The Metropolitan Horizon"
 gaudi.44.d: "[ROOT.GetCountry.GetCapital.GetCityHubName] はもはや単なる首都ではない。世界の縮図になりつつある。" #deepl:101717450
 gaudi.44.f: "旧市街には端があった。かつて石造りが主流だった場所に、鉄骨とガラスが突き刺さっている。公共の庭園の下には鉄道が交差している。電灯が夕暮れと夜明けの境界線を曖昧にする。大使館、銀行、ギャラリー、カフェが、新時代の鉄の温室で蘭の花のように咲き乱れる。超高層ビルは大聖堂に挑戦する。[ROOT.GetCountry.GetCapital.GetCityHubName] 、もはや成長の許可を求めることはなく、リードすることを期待されている。どの地区からも、ひとつの真実が浮かび上がってくる。国家の都市なのだ。" #deepl:3494578230
 gaudi.44.g: "世界はすでに見ているのだから。" #deepl:1129952378

 gaudi_capital_expansion_project_progress_bar: "資本拡大" #deepl:4033066520
 gaudi_capital_expansion_project_progress_bar_desc: "資本拡大：#v [JournalEntry.GetCurrentBarProgress(ScriptedProgressBar.Self)|1%] #! ([JournalEntry.GetCurrentBarValue(ScriptedProgressBar.Self)|0]/30)" #deepl:707314599

 gaudi.511.d: "[ROOT.GetCountry.GetCapital.GetCityHubName] の美化に関しては、都市計画における意見の相違があった。" #deepl:2161912626
 gaudi.512.t: "環状道路の銅像" #deepl:1070850347
 gaudi.512.d: "[ROOT.GetCountry.GetCapital.GetCityHubName] の新しい環状道路に新しいフィギュアのグループが建てられる予定だが、どの神話のフィギュアが特別な場所になるかは不明だ。" #deepl:275330526
 gaudi.513.f: "政府の旗艦として新省庁が建設されるはずだったが、絶え間ない計画の変更、拡張、そして潜在的な汚職のために、建物の建設は長引き、完成までにすべての資金が使い果たされてしまった。未完成のビルは、いくつかの一時的な措置で機能的な状態にすることは可能だが、それはおそらく政府の利益にはならない。さらなる建設は可能だが、おそらく高くつくだろう。" #deepl:3580582680

 gaudi.511.t: "噴水かパビヨンか？" #deepl:2151137688
 gaudi.511.f: "皇帝のひげをめぐるいさかいと見間違うかもしれない。小さな論争から具体的な政治的論争に発展したのだ。それは、美的価値の高い代表的な広場の建設計画である。ある派閥はそこに東屋を建てて長居をしたいといい、もう一方は噴水の建設を主張している。区画は一つしかないため、どちらか一方しか建設できず、妥協は不可能である。" #deepl:1541667756
 gaudi.511.g: "我々はパビリオンを建設する。" #deepl:2064679099
 gaudi.511.h: "泉を作るんだ。" #deepl:2431357846
 gaudi.511.i: "この場所には僕の計画があるんだ...。" #deepl:53271135
 gaudi.512.f: "環状道路を計画する際、いくつかの詳細がまだ明らかになっていない。どの人物を目立つ位置に配置するかはまだ決まっていない。ローマ神話に登場する人物であるべきなのは明らかだ。例えば、資本家は商業の神マーキュリーを中央に配置することを提案している。一方、貴族は神々の父であるジュピターにこだわる。軍人は火星を好み、学者はアポロを中央に置くことを望む。" #deepl:3457913174
 gaudi.512.g: "ジュピター" #deepl:641978563
 gaudi.512.h: "水銀だ。" #deepl:4064282680
 gaudi.512.i: "アポロ" #deepl:2704921915
 gaudi.512.j: "火星だ。" #deepl:4251022611
 gaudi.513.t: "省庁の建物がコスト超過" #deepl:3536337121
 gaudi.513.d: "省庁の新庁舎建設がちょっとしたスキャンダルに発展している。" #deepl:3745484689
 gaudi.513.g: "予算があり、この予算は守られなければならない。" #deepl:2982007153
 gaudi.513.h: "これは残念なことだが、この分野ではよくあることだ。" #deepl:3799202878
 gaudi.513.i: "このプロジェクトには、必要なだけの資金と時間を割くべきだ。" #deepl:3703152475
 gaudi.514.t: "新しいコーヒーハウス" #deepl:760472506
 gaudi.514.d: "リングシュトラーセに新しいコーヒーハウスがオープンした。" #deepl:977697169
 gaudi.514.f: "喫茶店は、私たちにとって、あらゆる新しいことを学ぶ最良の教育の場であり続けた」。このことを理解するためには、ウィーンのコーヒーハウスが、世界のどんな類似施設とも比較できない特別な施設であることを知らなければならない。コーヒー一杯の安い料金で誰でも利用でき、何時間でも座って議論したり、手紙を書いたり、トランプをしたり、郵便物を受け取ったり、何よりも新聞や雑誌を無制限に読むことができる。ウィーンの新聞だけでなく、ドイツ帝国全土の新聞、フランス、イギリス、イタリア、アメリカの新聞、さらに世界の重要な文学・芸術批評がすべて揃っていた。だから私たちは、世界で起こっていることをすべて直接知り、出版されるすべての本について、どこで行われるにせよすべての公演について聞き、すべての新聞の批評を読み比べた。おそらく、オーストリア人の知的柔軟性と国際志向にこれほど貢献したものは、彼がコーヒーハウスで世界のあらゆる出来事について包括的に方向づけ、同時に友好的なサークルで議論することができたという事実以外にはないだろう。私たちは毎日何時間もそこに座っていたが、何一つ見逃すことはなかった」。- シュテファン・ツヴァイク" #deepl:1426019469
 gaudi.514.g: "[SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('gaudi_ruler').GetFullName] を訪れるべきだ。" #deepl:3567062403
 gaudi.514.h: "これによってウィーンの生活水準が向上する。" #deepl:993415000
 gaudi.515.t: "リングロード・パレ" #deepl:2889767777
 gaudi.515.d: "ある貴族が、新市街地に宮殿を建設するために無理をした。[ROOT.GetCountry.GetCapital.GetCityHubName] 。中途半端に完成した建物の廃墟は、目障りになる恐れがある。" #deepl:3082201997
 gaudi.515.f: "リングロード宮殿とは、ウィーンのリング通りにある壮麗な宮殿を指す言葉です。これらの建物は、19世紀後半に旧貴族や銀行家、実業家によって建てられたものがほとんどです。これらの宮殿は、ネオ・バロック様式とネオ・ルネサンス様式、あるいはネオ・マンネリズム様式の混合様式で建てられた。それらはまた、出世と地位の象徴でもあった。しかし、最近、建設者の一人が背伸びをしすぎて倒産の危機に直面している。人々はすでにこの目障りな建物を嘲笑しており、最悪の場合、再び取り壊さなければならないため、プロジェクト全体の完成が延びることになる。" #deepl:2482976903
 gaudi.515.g: "We share the costs."
 gaudi.515.h: "私たちには関係ないことだ。" #deepl:2515722656
 gaudi.516.t: "資本拡張：順調な進展" #deepl:3725304670
 gaudi.516.d: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] は、資本増強はもっと早く完了する可能性があると述べている。" #deepl:1876608469
 gaudi.516.f: "理由はわからないが、祖国愛なのか、高賃金なのか、地元のエリートたちからの友好的なサポートなのか、それとも単に気候が良いからなのか。" #deepl:771529955
 gaudi.516.g: "素晴らしい。" #deepl:1621308786
 gaudi.517.t: "首都拡張：遅々とした進展" #deepl:4246146058
 gaudi.517.d: "[ROOT.GetCountry.GetCapital.GetCityHubName] 残念なことに、[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] 、新地区の建設が予定より遅れていることを認めざるを得なかった。" #deepl:984753109
 gaudi.517.f: "敵対的な政治勢力による扇動なのか、労働組合による労働意欲の低下なのか、イルミナティの陰謀なのか、単に天候が悪いだけなのか、理由はわからないが、すべてがゆっくりと進んでいる。" #deepl:967308050
 gaudi.517.g: "残念だ。" #deepl:1477108256
 gaudi.518.t: "モニュメント・トゥ[SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('gaudi_ruler').GetFullName]" #deepl:4291665084
 gaudi.518.d: "[SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle]リングシュトラーセに新しいモニュメントが計画されている。" #deepl:642834231
 gaudi.518.f: "The Ringstrasse served to illustrate Austrian history. On the one hand, the long line of monarchs from the Habsburg ruling family was immortalized, of which Maria Theresa received the most opulent monument. But also generals like Eugen von Savoyen or Schwarzberg enriched the Viennese cityscape. The bourgeoisie, meanwhile, attached great importance to immortalising their exponents, namely the poet princes Goethe and Schiller, but also the great composers Schubert, Mozart an Beethoven."
 gaudi.518.g: "[SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle] 。" #deepl:2477877691
 gaudi.518.h: "Lovely - but focus on completing the Ringstrasse instead."
 gaudi.519.t: "火事だ！" #deepl:3279516897
 gaudi.519.d: "[ROOT.GetCountry.GetCapital.GetCityHubName] 、建設現場の建物数棟が全焼する壊滅的な火災が発生した。" #deepl:603406045
 gaudi.519.f: "環状線で最も有名な大惨事は、1881年12月8日のリング劇場火災である。19世紀最大の大火災のひとつである。犠牲者は数百人から1000人以上と推定されている。原因はガス灯の故障で、ガスが漏れ出し、次に点火しようとしたときに爆発した。その結果、火は背景の列車に燃え移り、その後急速に舞台の他の部分、最終的には客席にまで燃え広がった。この火災は、特に劇場エリアにおける予防防火と、それに対応するオーストリアの劇場建設に関する法的規定に対して、国内外に影響を与えた。作曲家のアントン・ブルックナーは、その夜の公演のチケットを持っていたが、体調不良のため家にいたため難を逃れた。" #deepl:1763422665
 gaudi.519.g: "ひどい一日だった。" #deepl:3953408834
 gaudi.520.t: "市街地拡大に対する偏見" #deepl:3932558777
 gaudi.520.d: "The representatives of the rural population see the development of [ROOT.GetCountry.GetCapital.GetCityHubName] as a disadvantage for the common rural population."
 gaudi.520.f: "「政府は、首都での言いようのない威勢の良さで、数本先の通りしか考えず、[ROOT.GetCountry.GetCapital.GetCityHubName] から一歩も出たことのない飄々とした都会人で構成されていることを明らかにしている。莫大な金額がそこで浪費され、それは首都にしかやってこないが、小さな町や村の庶民は何も気づかない。その背後にあるイデオロギーは、中央集権主義を支持し、官僚主義を支持し、国家機構を支持し、援助している。しかし、このような退廃的なプロジェクトが、庶民にどのような視点を提供するのだろうか？" #deepl:2119590629
 gaudi.520.g: "勤勉な農村の人々のために、友好的な贈り物をするのはどうだろう？" #deepl:1425408969
 gaudi.520.h: "市と県は対等である。" #deepl:154752402
 gaudi.520.i: "こんなくだらない農家の話なんて誰が気にするんだ？" #deepl:1424618973
 gaudi.521.t: "インダストリアル・レジデンス" #deepl:1054941492
 gaudi.521.d: "裕福な実業家が新しい宮殿を建てさせ、[ROOT.GetCountry.GetCapital.GetCityHubName] 、素晴らしい建物で富を築いた。" #deepl:2324185893
 gaudi.521.f: "実業家や銀行家の宮殿は、国家における彼らの新たな地位を強調する方法と見なされた。また、ユダヤ系の富裕層も、自分たちの解放を強調することが可能だった。19世紀のウィーンの発展はその好例である。最も有名な環状道路の宮殿のひとつがエプシュタイン宮殿である。実業家で銀行家のグスタフ・リッター・フォン・エプシュタインのために建てられた。建築家はテオフィル・フライヘル・フォン・ハンセンで、隣接するオーストリア国会議事堂も彼が設計した。階建てで、当時の典型的なネオ・ルネッサンス様式で建てられている。" #deepl:2653721730
 gaudi.521.g: "[ROOT.GetCountry.GetCapital.GetCityHubName] は成長し、繁栄している。" #deepl:2259204183
 gaudi.522.t: "バラックの拡張" #deepl:3408528723
 gaudi.522.d: "[ROOT.GetCountry.GetCapital.GetCityHubName] の拡張は、バラックの近代化と拡張の機会を提供する。" #deepl:933440251
 gaudi.522.f: "フランツ・ヨーゼフス・バラックは、現在のリングシュトラーセ地区にあるウィーンのバラック建築で、長い間、大規模プロジェクト建設の障害となっていた。この兵舎は皇帝フランツ・ヨーゼフ1世にちなんで命名され、1848年の革命後の1854年から1857年にかけて建設された。建設後まもなく、兵舎は1857年に始まったウィーン環状通りの開発の邪魔になったが、軍隊が再びここから移動するまでに40年を要した。そのため、フランツ・ヨーゼフ兵営の損失を吸収するために、あらかじめ新しい兵営を建てなければならなかった。" #deepl:4162429863
 gaudi.522.g: "バラックを拡張する。" #deepl:2381627455
 gaudi.522.h: "時間を他に投資した方がいい。" #deepl:3269234038
 gaudi.523.t: "Extending the Construction sector"
 gaudi.523.d: "The expansion of [ROOT.GetCountry.GetCapital.GetCityHubName] offers the opportunity to expand the construction sector. "
 gaudi.523.f: "私たちは一般に、芸術家の本性を、芸術家の生産を妨げる資質の総体と呼ぶ」。- アーサー・シュニッツラー" #deepl:2115168723
 gaudi.523.g: "建設事務所を拡張する。" #deepl:771559939
 gaudi.524.t: "素晴らしい公園" #deepl:3707211248
 gaudi.524.d: "[ROOT.GetCountry.GetCapital.GetCityHubName]の新しい公園が完成し、市民の散歩に開放された。" #deepl:2209166008
 gaudi.524.f: "The gates of the new Stadtpark swing open. Lawns roll like velvet. Paths curve between flowerbeds and statues. But what draws the crowds most is not the grass—it's the sound. A bandstand, a small orchestra, a waltz drifting on the breeze. Public music, once reserved for salons and palaces, now fills the air for all to hear. In cities like Vienna, the Kursalon had become a civic temple of melody. The magnificent building in the style of the Italian Renaissance is located on Johannesgasse and has a wide terrace in the park. At the time of the Strauss brothers, the Kursalon was a popular place for dancing and concerts."
 gaudi.524.g: "散歩しよう。" #deepl:3870101360
 gaudi.524.h: "コンサートでお祝いしましょう！" #deepl:3249539672
 gaudi.525.t: "オペラの延長" #deepl:3647447347
 gaudi.525.d: "[ROOT.GetCountry.GetCapital.GetCityHubName] の拡張は、オペラの近代化と拡張の機会を提供する。" #deepl:1640821642
 gaudi.525.f: "大通りやアーケード、噴水や省庁の中にあって、既存のオペラハウスは控えめで、田舎臭ささえ感じ始める。そこで提案されたのが、新建築、あるいは大規模な拡張だ。座席数を増やし、音響効果を高め、記念碑的なファサードを設ける。街の威厳にふさわしい文化の殿堂。ヨーロッパ全土で、このようなジェスチャーは国の威信の象徴となっている。パリでは、オペラ・ガルニエが大理石の階段と黄金の天井でそびえ立つ。ウィーンでは、1869年にオープンした国立オペラ座が、優雅さと誇りをもってリング通りを支えている。" #deepl:2327891128
 gaudi.525.g: "オペラハウスの拡張。" #deepl:4005131669
 gaudi.526.t: "タウンホールの拡張" #deepl:857877700
 gaudi.526.d: "The expansion of [ROOT.GetCountry.GetCapital.GetCityHubName] offers the opportunity to modernize and expand the Town Hall."
 gaudi.526.f: "旧市庁舎には、1世紀前の紋章が残っている。内部は狭い階段、過密な事務室、羽目板よりも高く積み上げられた帳簿。市長の机は、事務処理に必要な大きさどころか、権力を握るにもやっとの大きさだ。今、提案されているのは、統治、経済、市民のアイデンティティにおいて拡大する市の役割を反映した新しい市庁舎だ。そびえ立つ尖塔か、抑制された古典主義か-いずれにせよ、権威を示すものでなければならない。ヨーロッパ各地で、都市はこの難題に立ち向かっている。ウィーンでは、ネオ・ゴシック様式のラートハウス（1883年竣工）が、市の自信の象徴となった。パリは1871年以降、壮麗さと反骨精神をもってオテル・ド・ヴィルを復元した。ベルリンのローテス・ラータハウスは、ルネサンス様式とプロイセン様式の機能の融合として登場した。" #deepl:2422046000
 gaudi.526.g: "タウンホールを拡張する。" #deepl:5728920
 gaudi.527.t: "ヘルデンプラッツ" #deepl:959071592
 gaudi.527.d: "ヘルデンプラッツ（英雄広場）の完成後、一部の有力な政治家たちは、それにふさわしい就任式を行うよう働きかけている。" #deepl:1468121085
 gaudi.527.f: "リングシュトラーセが建設された当時、皇帝フランツ・ヨーゼフがカイザーフォーラムの一部として「外側のブルク広場」を設計したが、これは完成しなかった。その計画では、レオポルディンの翼、新ホーフブルク王宮、ハプスブルク家のコレクション、そしてフォルクスガルテンの跡地に建設されることのなかった新城に囲まれた長方形の広場を作ることになっていた。ヘルデンプラッツという名称は1878年に決まったもので、アントン・ドミニク・ファーンコーン作の2つの騎馬像に由来する。古い方はカール大公のもので、1860年に除幕された。対になるオイゲン公の騎馬像も1865年に完成した。第一次世界大戦に敗れ、ハプスブルク＝ロレーヌ王朝の支配下にあったオーストリア＝ハンガリー二重君主制が崩壊し、オーストリア初の共和制が成立した後、ヘルデンプラッツはあらゆる政治陣営の集結地として、またオーストリア軍のパレード会場としての役割を果たした。" #deepl:562832934
 gaudi.527.g: "パレードを行い、友人を招待する。" #deepl:99539180
 gaudi.527.h: "今後数年間、常設の軍事パレードを設ける。" #deepl:3502479331
 gaudi.527.i: "その費用は誰が負担するのか？" #deepl:3263444788
 gaudi.528.t: "大学の拡張" #deepl:2548530815
 gaudi.528.d: "[ROOT.GetCountry.GetCapital.GetCityHubName] の拡張は、大学の近代化と拡張の機会を提供する。" #deepl:966048719
 gaudi.528.f: "思想のない大都市とは？鉄道、省庁、劇場が立ち並ぶ中、大学は自らの成功に喘ぎ始める。ホールが少なすぎるのに学生が多すぎる。借りたビルに広がる学部。図書館と研究室の狭間でせめぎ合う教授たち。新キャンパスか大規模な拡張、つまり近代的な講義室、専任の学部、記念碑的な図書館の建設である。このようなプロジェクトは単なるインフラではなく、知的野心の表明なのだ。ウィーンでは、大学は1870年代にリング通り沿いに移転再建され、壮大なファサードと象徴的な中心性を備えた。パリでは、ジュール・フェリーの改革により、ソルボンヌ大学はフランスのアカデミック・クラスの拡大に対応するために徹底的に拡張された。" #deepl:3542359765
 gaudi.528.g: "大学を拡大する。" #deepl:4228402238
 gaudi.529.t: "アート・アカデミーの拡張" #deepl:1188603187
 gaudi.529.d: "[ROOT.GetCountry.GetCapital.GetCityHubName] の拡張は、アート・アカデミーを近代化し拡張する機会を提供する。" #deepl:2971034584
 gaudi.529.f: "As the city grows, so does its appetite for art. Yet painters and sculptors crowd small studios and dim attics, learning not from masters but from rumor and borrowed sketches. The proposal: a proper art academy, with light-filled ateliers, anatomical theaters, and galleries open to public exhibitions. Across Europe, such academies shape national taste. The École des Beaux-Arts in Paris sets classical standards for half a continent. In Vienna, the grand building of the Akademie der bildenden Künste anchors the cultural prestige of the Ringstraße."
 gaudi.529.g: "アカデミーを拡大する。" #deepl:3521772928
 gaudi.530.t: "ウラニア" #deepl:3604286803
 gaudi.530.d: "With the Urania, a so-called 'people's education center' has opened in Vienna, the exact purpose of which is still disputed."
 gaudi.530.f: "1883年、ドイツの天文学者マックス・ヴィルヘルム・マイヤーは、ウィーン大学の助手として歴史的な日食と未来の日食を計算するためにウィーンにやってきた。彼はまた、民俗学の講義を行い、民俗教育機関の構想を練った。しかし、1885年にベルリンに呼び出されたため、彼は引き続きベルリンで構想を練った。ウィーンのウラニアはベルリンのウラニアをモデルにしたもので、800人収容のスペースがあり、200人収容の講義室、科学的実演のための部屋、天文台があった。しかし、この "仮設 "ウラニアでは、殺到する訪問者に対応しきれなかったため、すぐにリングシュトラーセに新しい建物が必要になった。ウラニアは、語学講座など教育の場を広げただけでなく、ウラニア交響楽団やウラニア合唱団を擁するコンサート会場にもなった。型破りな形と構造は、ウィーンでお決まりのスキャンダルを引き起こした。しかし、ウィーンの人々はこの建物を気に入り、ウラーニアはすぐにウィーンのランドマークのひとつとなりました。" #deepl:2564552960
 gaudi.530.g: "建築のランドマークである。" #deepl:631489671
 gaudi.530.h: "主に娯楽施設である。" #deepl:1069754801
 gaudi.530.i: "何よりもまず、ここは天文台だ。" #deepl:2017455388

 gaudi.9.t: "都市計画終了" #deepl:1330111739
 gaudi.9.d: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] 本日、重要な地方都市での都市計画業務を完了した。 が再び完全に利用できるようになった。[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] " #deepl:60424068
 gaudi.9.f: "'Architecture does not reach its highest estate until it is so infused with imagination and fancy - not undisciplined imagination or capricious fancy - that the ordered fabric delights the eye of every intelligent observer and excites emotions like a poem.' -Henry van Brunt"
 gaudi.9.g: "プロジェクトが多すぎて時間がない。" #deepl:224764128

 gaudi_architecture_treatise_modifier: "建築論" #deepl:1594143488

 gaudi.8.t: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetLastName]建築論" #deepl:1170819237
 gaudi.8.d: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U] 歴史的建築と現代建築に関する論考は、 理論的考察に富み、後世の建築家に影響を与えるだろう。[ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] " #deepl:66798799
 gaudi.8.f: "建築には人類の偉大な思想が記録されている。あらゆる宗教的シンボルだけでなく、あらゆる人間の思想が、その膨大な書物の中にそのページを持つ」。-ヴィクトル・ユーゴー" #deepl:864116211
 gaudi.8.g: "後世のための作品。" #deepl:575316054

 je_gaudi_architecture_treatise: "建築論" #deepl:1594143488
 je_gaudi_architecture_treatise_reason: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] 、建築芸術に関するこれまでの知識を一冊の本にまとめるため、一年間完全に引きこもった。 人生のマニフェストとして、建築に関するすべての 経験と理論をまとめることを意図している。 評判は作品の価値を決定する上で決定的な役割を果たす。しかし、 、 、 、 といった人物像も価値がある。[ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U] $literary$ $erudite$ $innovative$ $aesthete$ " #deepl:9152525
