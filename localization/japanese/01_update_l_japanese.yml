 douglas.103.t: "山岳部隊連隊" #deepl:459726214
 douglas.103.d: "[SCOPE.sCharacter('douglas_mountain_veteran').GetFullName] 、山岳征伐と山地防衛の素晴らしい経験を持つ彼は、その優れた技術を活かして山岳部隊の精鋭部隊を創設することにした。" #deepl:3198382874
 douglas.103.f: "ゲビルグス・イェーガー、アルピーニ、シャスール・アルパンは、高地での戦争に特化したいくつかの国の精鋭部隊のほんの一例にすぎない。1872年に創設されたアルピーニは、世界で最も古い現役の山岳歩兵部隊である。彼らの当初の任務は、イタリアとフランスおよびオーストリア＝ハンガリーとの国境を守ることだった。" #deepl:3963027024
 douglas.103.g: "彼らは彼の遺産を未来へと引き継ぐだろう。" #deepl:1701012348

