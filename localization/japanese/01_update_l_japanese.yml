 lepsius.1502_mauer_t: "T ホモ・ハイデルベルゲンシス#! が発見した。[SCOPE.sCountry('lepsius_heidelbergensis_finder_country').GetName]" #deepl:2213050324
 lepsius.1502_mauer_d: "\nハイデルベルク近郊で発見されたホモ・ハイデルベルゲンシスの下顎は、ヨーロッパ最古の初期ヒトの証拠であり、ホモ・エレクトスとそれ以降のホミニンの間の重要な変遷を示すものである。" #deepl:219138034

