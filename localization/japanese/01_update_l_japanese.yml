 MR_ALPINE_CLUB_BUTTON: "アルパイン・クラブ" #deepl:3580940097
 MR_ALPINE_CLUB_BUTTON_TT: "#T アルパイン・クラブ設立#! 1857年にロンドンで設立されたアルパイン・クラブは、世界最古の登山団体。1857年にロンドンで設立されたアルパイン・クラブは、世界最古の登山団体である。アルパイン・クラブは、アルプスの科学的、地理的、運動的探検を推進することを目的としていた。創設メンバーの中には、1865年にマッターホルンの初登頂を達成したエドワード・ホワイマーもいた。アルパイン・クラブは「アルピニズムの黄金時代」に重要な役割を果たし、『アルパイン・ジャーナル』などの影響力のある著作を出版した。アルパイン・クラブは、後の世界中の登山クラブの規範となった。[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:1435537543
