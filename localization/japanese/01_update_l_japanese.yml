 douglas.211.t: "サミット" #deepl:3152681021
 douglas.211.d: "困難な登頂の末、登山家一行はついに山頂に到達する。[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] 、[ROOT.GetCountry.GetNameNoFormatting] 地球上のこの場所を襲撃した最初の男である。あとはこの勝利の瞬間を味わうだけだ。" #deepl:2761012191
 douglas.211.f: "エベレストに登ることに何の意味があるのか：何の役にも立たない。高高度における人体の挙動について少しは学べるかもしれないし、医学者が我々の観察を航空の目的に役立てるかもしれない。しかし、そうでなければ何も生まれない。金や銀のかけらも、宝石ひとつも、石炭や鉄も持ち帰ることはできないだろう。作物を植えて食料を調達できるような大地は、1フィートも見つからないだろう。だから、この山の挑戦に応え、それに立ち向かう何かが人間の中にあること、その闘いは人生そのものの闘いであり、上へ上へと永遠に続くものであることを理解できないなら、私たちがなぜ行くのかわからないでしょう。この冒険から得られるのは、ただ純粋な喜びだ。私たちは食べてお金を稼ぐために生きているのではない。人生を楽しむために食べてお金を稼ぐんだ。それこそが人生の意味であり、人生とは何のためにあるのか」ジョージ・リー・マロリー" #deepl:2116445992
 douglas.211.g: "夜明けを楽しもう" #deepl:3916807741
 douglas.212.t: "登攀中止" #deepl:2889222354
 douglas.212.d: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName]'s attempt to reach the peak failed for the time being. Our mountaineer is forced to abandon the venture and return."
 douglas.212.f: "登山者が登頂を断念する理由はいくつもある。天候の変化だけで十分なこともあれば、山頂へのアクセスが危険すぎることが判明することもある。登頂に時間がかかりすぎたり、時間枠をオーバーしたりするのは、特定の時間帯や変化が登頂を困難にしたり、不可能にしたりするからだ。また、単に間違った道を選んでしまうこともある。" #deepl:430022267
 douglas.212.g: "がっかりだ。" #deepl:1131565686
 douglas.213.t: "登山の遭難！" #deepl:285221578
 douglas.213.d: "[SCOPE.sState('douglas_location_scope').GetName] 、[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] 、山登り中にとんでもないミスを犯し、遠征隊は大惨事に見舞われた。数人が死亡し、食料品や装備品も一緒に落下した。全国民がショックを受けている！" #deepl:2272067559
 douglas.213.f: "毎晩、マッターホルンの同志たちが、背中にのしかかって、両手を広げ、等間隔で完璧な順序で、次々と滑っていくのが見える。そうだ、私はいつも彼らを見るのだ......」エドワード・ホワイパー" #deepl:3038127729
 douglas.213.g: "悲劇だ！" #deepl:1503732790

 douglas_mountaineering_expedition_cost_modifier: "登山遠征費用" #deepl:1638465225

 douglas.201.t: "登山遠征 - レベル1" #deepl:3784620623
 douglas.201.d: "登山クラブは、登頂を試みるのに最低限の登山装備しか必要としない山を選んでいる。" #deepl:3440213430
 douglas.202.t: "登山遠征 - レベル2" #deepl:3762274122
 douglas.202.d: "登山クラブは、登山に挑戦するために標準的な登山装備を必要とする山のセレクションを作成した。" #deepl:1440623022
 douglas.203.t: "登山遠征 - レベル3" #deepl:2040905544
 douglas.203.d: "登山クラブは、登山に挑戦するために優れた登山装備を必要とする山を選んでいる。" #deepl:2737331426
 douglas.204.t: "Mountaineering Expedition - Level 4"
