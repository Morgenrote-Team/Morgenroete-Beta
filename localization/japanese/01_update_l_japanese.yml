 lepsius.1502_peking_d: "\nAlong with Java Man, Peking Man is believed to be the first Homo Erectus found and reinforced the belief that humanity originally came from Asia. The bones are said to be 400,000 to 780,000 years old." #please replace

 lepsius_state_trait_heidelbergensis_cave: "Prehistoric Cave"

 lepsius.1326.t: "ホモ・ハイデルベルゲンシス完成" #deepl:2121693630
 lepsius.1326.d: "[SCOPE.sCharacter('lepsius_anthropologist_scope').GetFullName] ホモ・ハイデルベルゲンシスは、絶滅した種について具体的な結論を出すのに十分な量の骨を収集した。ホモ・ハイデルベルゲンシスはもはや科学にとっての謎ではなく、人類家系図にある程度の確証をもって位置づけることができるようになった。" #deepl:4182329393
 lepsius.1326.f: "ホモ・ハイデルベルゲンシスの下顎は、1907年にハイデルベルク近郊のマウアー近くの砂場で作業員のダニエル・ハートマンによって発見され、1908年に解剖学者のオットー・シェーテンサックによって記載された。この約60万年前の発見は、ヨーロッパにおける初期人類の最古の証拠と考えられており、形態学的にホモ・エレクトスとホモ・サピエンスの中間に位置し、アフリカ、ヨーロッパ、アジアにこのヒト科動物が広く分布していたことを示している。" #deepl:2078634084
 
 lepsius.1336.t: "ハイデルベルク・マン" #deepl:140239375
 lepsius.1336.d: "ハイデルベルク近郊の町マウアーの鉱山で、ある作業員が驚くべき発見をした。ハイデルベルク大学の教授がすぐにその価値を認めた。" #deepl:3838910430
 lepsius.1336.f: "ホモ・ハイデルベルゲンシスの下顎は、1907年にハイデルベルク近郊のマウアー近くの砂穴で労働者ダニエル・ハートマンによって発見され、1908年に解剖学者オットー・シェーテンサックによって記載された。この約60万年前の発見は、ヨーロッパにおける初期人類の最古の証拠と考えられており、形態学的にホモ・エレクトスとホモ・サピエンスの中間に位置し、アフリカ、ヨーロッパ、アジアにこのヒト科動物が広く分布していたことを示している。" #deepl:2078634084

