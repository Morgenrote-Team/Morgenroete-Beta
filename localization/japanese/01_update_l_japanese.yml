 douglas.104.t: "内なる山" #deepl:2079471330
 douglas.104.d: "登山とトレーニングに明け暮れた過酷な5年間を経て、[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] 。" #deepl:862787273
 douglas.104.f: "山は声を持たないが、教えてくれる。この登山家は5年という長い年月の間、雪に閉ざされ、崩れ落ちそうな岩肌、身を切るような風、そしてどんな刃物よりも深く切り裂く沈黙に直面してきた。しかし、それぞれの苦難が知識を筋肉に、忍耐を呼吸に刻んだ。野心から始まったものは、今や技術へと鍛え上げられた。クライマーは石に耳を傾け、匂いで嵐を予測し、目を閉じて心を安定させながら結び目を作ることを学んだ。[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetSheHe|U] 。これが達人の始まりだ。" #deepl:1510753382
 douglas.104.g: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetSheHe|U] もはや山を征服することはない- 理解している。[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetSheHe] " #deepl:2453485277

