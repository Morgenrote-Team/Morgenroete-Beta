 gaudi.35.t: "Art Nouveau quarter in [SCOPE.sState('gaudi_art_nouveau_quarter_state').GetCityHubName]"
 gaudi.35.d: "新しい芸術的発展は、[SCOPE.sState('gaudi_art_nouveau_quarter_state').GetCityHubName] にとどまらない。現在、アヴァンギャルドの地区とされているこの地区では、新しいアール・ヌーヴォーの建物が建設されている。" #deepl:3696139674
 gaudi.35.f: "ブリュッセルにおけるアール・ヌーヴォー建築のデビューは、新しいスタイルの装飾芸術の波とともにあった。重要な芸術家としては、ブリュッセルのファサードに錬鉄を使ってバロック風の効果をもたらしたギュスターヴ・ストラウヴェン、非常に独創的な椅子やアーティキュレーテッド・メタル家具で知られる家具デザイナーのギュスターヴ・セルリエ＝ボヴィ、トンボ、蝶、白鳥、蛇の形をしたジュエリーを製作した宝飾デザイナーのフィリップ・ウォルファースなどが挙げられる。このスタイルは、隣国フランスでもすぐに注目された。オルタのオテル・タッセルを視察したヘクトール・ギマールは、新しいスタイルのパリ最初の建築物のひとつであるカステル・ベランジェを建設した。パリの人々はギマールの独創的で絵画的なスタイルを歓迎し、ベランジェ城はパリで最も優れた新しいファサードのひとつに選ばれ、ギマールのキャリアがスタートした。1900年のパリ万国博覧会は、アール・ヌーヴォーの頂点となった。1900年4月から11月にかけて開催されたこの博覧会には、世界中から5,000万人近い人々が訪れ、建築、デザイン、ガラス製品、家具、装飾品などが展示された。パリ万国博覧会が圧倒的に規模が大きかったとはいえ、他の万国博覧会もアール・ヌーヴォーの普及に大いに貢献した。" #deepl:3102882922
 gaudi.35.g: "活気に満ちた新しい文化。" #deepl:3379987285

 gaudi.22.t: "線と小節" #deepl:2020920879
 gaudi.22.d: "Our architect returns—this time with a surveyor's rod in hand and new eyes for the land."
 gaudi.22.f: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] はかつて、街の広場でファサードをスケッチし、影や装飾をなぞることで満足していた。今は 、大地に線を描いている。 の旅の間、 は都市を捨てて内陸に向かった。ガリシアの荒野で、ポー・デルタの湿地帯で、ミッドランドの鉄道の切り通しを横切って、 、エンジニア、農民、現場監督とともに歩いた。 、他の人が経典を読むように、地形を読むことを学んだ。   は今、勾配と測地点について話している。 ノートは華美な装飾ではなく、角度、高さ、インチ単位で測定された距離で埋め尽くされている。 「ドライになった」「厳密すぎる」と言う人もいる。しかし、 が何もない野原を見渡したとき、 はすでにどこに道が通っているか見えている。[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U][ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U] [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] " #deepl:3503840059
 gaudi.22.g: "建物は礎石を据えるずっと前から始まっている。" #deepl:960677900
 gaudi.23.t: "数える建築家" #deepl:2805524520
 gaudi.23.d: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] 、心はより鋭く、[ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] 図面はより奇妙になっている。" #deepl:3720893
 gaudi.23.f: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] かつては本能によってスケッチをした。今は 、論理によってスケッチする。♪♪♪♪♪♪♪♪♪♪♪♪♪♪♪♪♪♪♪♪♪♪♪♪♪♪♪♪♪♪♪♪♪♪♪♪♪♪♪♪♪♪♪♪♪♪♪♪♪♪♪♪♪♪♪♪ レンガ職人や建築家の間ではなく、講義室で 時間を過ごした。パリ、ゲッティンゲン、サンクトペテルブルグでさえも。 シンボルで埋め尽くされた黒板の下に座り、手では何も造らず、頭ですべてを造る男たちのもとで学んだ。 いまや対称性、弾性係数、優雅な数式で記述された荷重曲線について語る。 新しい設計図は厳格で、奇妙で、その精密さにおいてほとんど異質である。ある人には冷たく、非人間的に見える。しかし、 が説明する。ドームの美しさはその装飾にあるのではなく、その曲線の完璧さにある。しかし、他の人たち-特に若い人たち-は耳を傾けている。[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U] [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHim] [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U] [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] " #deepl:796837829
 gaudi.23.g: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] 他の人が想像しているだけのものを作る。" #deepl:2581034432
 gaudi.24.t: "Paper before Stone"
 gaudi.24.d: "私たちの建築家は、道具や方程式ではなく、ハンコや署名、関係者のネットワークを持って戻ってくる。" #deepl:223531508
 gaudi.24.f: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] 、今ではオフィスの中を滑るように歩いている。♪♪2年間の海外生活で、 、単に建築を勉強しただけでなく、 、行政を勉強した。 、プロジェクトの生死がいかにデザインではなく、政令によって決まるかを学んだ。ウィーンでは、 、省庁の仕事ぶりを観察した。ブリュッセルでは、 、許可証係の影武者をした。マルセイユでは、 、下水道がスカイラインを決める審議会に出席した。今、故郷に戻ると、 、どの書類をいつ提出すべきか、どの規則を引用すべきか、誰に媚び、誰を無視すべきかを知っている。 、ルールは壁ではなく足場であり、動かしたり、和らげたり、組み替えたりすることができる。そしてどういうわけか、許可証はこれまで以上に早く届く。[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe][ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] " #deepl:3047390249
 gaudi.24.g: "どんな素晴らしい構造も、署名されたフォームから始まる。" #deepl:3498658136
 gaudi.25.t: "建築家の帰還...いずれ" #deepl:2911431628
 gaudi.25.d: "Our architect has finally returned from [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] grand tour. No one is quite sure what [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] brings back—except stories."
 gaudi.25.f: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U][ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] シガリロと逸話を持って戻ってくる。 投下すべき名前、与えるべき意見、そして 覚えていないふりをする負債がある。計画を尋ねられると、 、話題を変える。結果を迫られると、 、笑顔で、輝きは急ぐことはできないと断言する。♪♪♪ある人は 's a fraud.また、 、誤解された天才と呼ぶ者もいる。真実は？トリエステのカフェとナポリの乗り遅れた列車の間のどこかにありそうだ。[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHim] " #deepl:3339735037
 gaudi.25.g: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] 、今まで何をしていたのか？" #deepl:3328871879
 gaudi.26.t: "巨匠の影で" #deepl:1494314704
 gaudi.26.d: "私たちの建築家は、より賢く、より安定し、偉大な教師としての足跡を残して戻ってきた。" #deepl:2040369888
 gaudi.26.f: "他の人たちが広く旅をする中、[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] 、距離よりも深さを選んだ。[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] 、伝説的な評判を持つ老齢の建築家というひとりの人物の指導のもとでほとんどの年月を過ごした。講義室だけでなく、足場や沈黙の中で、[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] 、装飾の背後にある構造、ファサードの背後にある意図を見ることを学んだ。[ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U] 線はよりきれいになった。[ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U] 視線はより批評的になった。[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] 、建築方法だけでなく、その理由も教えられた。[ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHim] 。若い弟子たちはすでに[ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHim] を探し求め、市の職員たちは予想外の敬意を持って彼を迎えている。[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] 、継続性、伝統、そしておそらくはいつの日か、レガシー（遺産）を特徴とする人物として戻ってくる。" #deepl:833263334
 gaudi.26.g: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] 他人の知恵の重みを背負う" #deepl:1891012360

