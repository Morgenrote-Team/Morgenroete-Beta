 douglas.111.t: "最初の一歩" #deepl:1387851608
 douglas.111.d: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] チームに基本的なクライミングギアを装備させる。" #deepl:1200110309
 douglas.111.f: "即興登攀の時代は終わった。[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] 、ロープ、ピッケル、ピトン、そして頑丈なザックといった標準的な装備を初めて手にする。これらの道具は単に命を救うだけでなく、山に対する認識を大きく変える。登攀はより理路整然と、計算されたものになった。かつては勇気と腕力だけが重要だったが、今ではテクニックと準備が主役だ。氷と岩の無慈悲な世界に足を踏み入れる勇気ある者にとっては、ささやかでありながら画期的な一歩なのだ。" #deepl:444296823
 douglas.111.g: "Now the mountains belong to the prepared."
 douglas.112.t: "ロープで縛られる" #deepl:263345135
 douglas.112.d: "登山家[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] 、新しいアイデアがある：安全性を高めるため、固定ロープチームを導入する。" #deepl:3311883976
 douglas.112.f: "山では一歩一歩がリスクを伴うが、今や誰も一人では登らない。ロープチームの導入は、もはや個人対山ではなく、信頼によって、そして編まれた紐によって結ばれたクライマーの鎖なのだ。この変化は秩序と規律、そして深い責任感をもたらす。一人が落ちても、他の者が彼を支える。危険は排除されるのではなく、再分配されるのだ。山は野生のままだが、それに対する私たちの答えはもはや英雄的なものではなく、協力的なものなのだ。" #deepl:1978213156
 douglas.112.g: "一本のロープ。一つの意志。ひとつのチーム。" #deepl:1569127386
 douglas.113.t: "壊れやすい身体" #deepl:3178580481
 douglas.113.d: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] はチームの救急システムの導入を主張している。" #deepl:887703212
 douglas.113.f: "マメ、骨折、凍傷......山は容赦しない。かつてはリスクの一部として受け入れられていたものも、今では組織的に治療される。小さな医療キットを賢く使えば、命を救うことができる。素早く作られたシェルターは時間を稼ぐことができる。初めて基本的な医療知識がトレーニングの一部になった。山は依然としてすべてを要求するが、救急キットと緊急時計画の導入により、チームは根性以上のもので対応するようになった。人体はもはや無視されるものではなく、守られるものなのだ。" #deepl:563827659
 douglas.113.g: "どんなに強い者でも倒れるかもしれない。" #deepl:4107036891
 douglas.114.t: "石は語る" #deepl:2102994496
 douglas.114.d: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] は登山に科学的手法を導入した：地質学の知識を導入し、地形分析を改善した。" #deepl:3612073372
 douglas.114.f: "かつては背景としか思えなかった岩石、堆積物、岩盤が、いまや読み解くべき言語となった。地層は古代の動きを明らかにし、岩の種類は雪崩を警告し、断層線は安全なルートを導く。山はもはや神話ではなく、アーカイブなのだ。科学がノートとハンマーを持ってやってきて、突然、探検は単なる冒険ではなく、現地調査になる。それは新しい見方であり、静かな革命である。" #deepl:1873707756
 douglas.114.g: "登る前に学ぼう。" #deepl:3896308340
 douglas.115.t: "ブレス・オブ・アルティテュード" #deepl:1444940126
 douglas.115.d: "Why not using the experiences in chemical warfare for mountaineering pruproses? New technology allows the use of oxygen masks at extreme heights."
 douglas.115.f: "ある高度を超えると空が薄くなる。呼吸は苦しくなり、身体は抗議する。しかし現在では、機械装置の助けを借りて、人間は決して到達するはずのない場所まで到達することができる。かつては科学の好奇心だった酸素マスクは、今や標準となった。彼らは可能性の限界を再定義する。7,000メートル以上の世界にアクセスできるようになったが、その代償として、登山者はもはや真の孤独ではなく、生命維持システムの一部となった。山に対する勝利は衰えるどころか、より寒くなるばかりだ。" #deepl:689433627
 douglas.115.g: "We breathe artificially—but we prevail."

