l_japanese:
 matsuura.101.t: "ある若者が蝦夷への旅を望んでいる"
 matsuura.101.d: "[SCOPE.sCharacter('character_1_scope').GetFullName]は北方の蝦夷地への旅を望んでいる若者です。しかし、松前藩は渡航を制限しています。この若者が北方の島々へ冒険に出ることを許可すべきだろうか？"
 matsuura.101.f: "「私はどこへでも旅をしたいのです！蝦夷、唐土、天竺！どうか、世界の驚異をこの目で私に見せさせてください！」"
 matsuura.101.g: "彼は現地の地理を調査できるかもしれない！"
 matsuura.101.h: "彼は詩人だと聞いている。旅からインスピレーションを得られるかもしれないのでは？"
 matsuura.101.i: "彼はその地域の絵画を描くことができるうるものか？"
 matsuura.101.j: "誰であれ出国することは許されない。"
 matsuura_allowed_travels_modifier: "蝦夷地への渡航許可"
 matsuura.102.t: "舎密学"
 matsuura.102.d: "[SCOPE.sCharacter('character_1_scope').GetFullName]は何年もの間、西洋の学問である蘭学を修めてきました。そして今、彼は「舎密（化学）」と呼ばれるものについての本を著そうとしています。彼を支援することは、良い考えかもしれません。"
 matsuura.102.f: "「いいですか、遠く離れた国の人間が、ある実験を行ったのです……」\n「実験とは何か知りたいと？もしあなたに仮説があるなら……」\n「おや、仮説が何かもご存じないのですね……」"
 matsuura.102.g: "彼が話しているこの「化学（舎密）」とは、一体何のことだ？"
 matsuura.102.h: "南蛮の思想だ！"
 matsuura_barbarian_ideas_modifier: "南蛮思想"
 matsuura_nintendo_modifier: "任天堂の花札"
 matsuura.103.t: "任天堂"
 matsuura.103.d: "京都において、山内房治郎は当時人気のあった花札の製造を専門とするかるた製造所を創業しました。この会社は瞬く間に日本全国で市場のリーダーへと登り詰めました。その会社の名は任天堂です。"
 matsuura.103.f: "「まあ座ってリラックスしてくれ、友よ\n今日のレッスンはそんなに長くはかからない\nそれに、もっと面白くするために\nこのオタクっぽい歌の形にしてみたんだ\n時は1889年、数々の栄誉や賞を受けるより前のこと\n任天堂は花札を作ることからその一歩を踏み出した\n\n1世紀もの間、彼らは何が売れるかを見極めるために成長と計画を重ねた\n掃除機やウルトラハンド、ラブテスターにラブホテルまで作りながらね\nだけど彼らはすぐにゲームへと狙いを定めた、ゲーム&ウオッチやカラーテレビゲームのように\n81年には『ドンキーコング』を生み出し、あとは皆が知る歴史の通りさ！\n\nこれが任天堂の歴史\n年月を跨ぐ、花札からマリオへの軌跡\n京都から直に、宮本という男と共に\nこれが任天堂の歴史」\n\n――マシュー・タラント"
 matsuura.103.g: "花札よりも人気が出るようなゲームが、本当に存在するのだろうか？"