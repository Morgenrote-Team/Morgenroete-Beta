l_japanese:
 ag_morgenroete_name: "[concept_morgenroete]"
 ag_morgenroete_tooltip: "We have at least one possible action for a [concept_morgenroete] feature."
 concept_morgenroete: "#r Morgenröte#!"
 concept_morgenroete_mr: "MR"
 concept_morgenroete_concept: "コンセプト"
 concept_pm_academics_university_humanities: "#b #BLUE 人文・人類学専攻#!#!"
 concept_pm_academics_university_natural_history: "#b #GREEN 博物学専攻#!#!"
 concept_pm_academics_university_mathematics: "#b #ORANGE 数理工学専攻#!#!"
 concept_academics_university_specialization: "大学の専攻分野"
 concept_academics_academic: "学者"
 concept_academics_academics: "学者"
 concept_academics_scientist: "科学者"
 concept_academics_scientists: "科学者"
 concept_academics_academic_desc: "In [concept_morgenroete] #b Academics#! are special characters that allow you to use certain mechanics of the mod. You can get #b Academics#! in some events or by acquiring enough [concept_academics_progress].\nCurrently these #b Academics#! exist:\n - [concept_tesla_engineer]\n - [concept_mendelejew_chemist]\n - [concept_verrier_astronomer]\n - [concept_agassiz_geologist]\n - [concept_dubois_paleontologist]\n - [concept_dubois_naturalist]\n - [concept_theiler_biologist]\n - [concept_panum_physician]\n - [concept_lepsius_archaeologist]\n - [concept_andersson_anthropologist]"
 concept_academics_progress: "学術進捗"
 concept_academics_progress_desc: "By acquiring 360 #b Academic Progress#! you can gain a new [concept_academics_academic]. To even have access to #b Academic Progress#!, you must have the #b Academia#! Technology and at least one #b University#!.\nYour #b Academic Progress#! gain is influenced by various factors. The more [concept_literacy] you have, the faster you gain #b Academic Progress#! for example. Another factor is the percentage of academic pops in your country. You will get the maximum #b Academic Progress#! for #p 2%#! or more academic pops. Better schools, and a happy intelligentsia help to gain #b Academic Progress#! as well. Lastly, Some of the technology foci and special buildings like the [concept_dubois_zoo] or the [concept_verrier_observatory] will provide additional #b Academic Progress#! too."
 concept_academics_scientific_society: "科学協会"
 concept_academics_scientific_societies: "科学協会"
 concept_academics_scientific_society_desc: "#b 科学協会#!はその国の最高峰の頭脳があつまる場所です。あなたの国の科学者全般が表しており、ここから[Concept('concept_academics_academic','$concept_academics_academics$')]を確認することができます。\n\n#b 科学協会#!はときどき[Concept('concept_academics_academic_mission','$concept_academics_missions$')]を提示し、達成するとボーナスが手に入ります。"
 concept_academics_experience: "経験値"
 concept_academics_experience_desc: "一部の学者は生涯を通じて#b 経験値#!を獲得します。[concept_morgenroete]では、キャラクターは何かを達成すると#b 経験値#!を獲得します。通常、30歳をこえると毎年10#b 経験値#!を得ます。\n新しい[Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]を発見するなど、研究の途中で#b 経験値#!を得ることもあります。さらに加齢とは別に、毎年ごとに#b 経験値#!を自動で獲得します。\n100#b 経験値#!を獲得したキャラクターは、#b 経験豊富特性#!を得ます。300#b 経験値#!に達すれば、#b 著名特性#!を得ます。\nキャラクターは#b 経験値#!が豊富なほど良い成果を出します。たとえば経験豊富または著名な[concept_dubois_paleontologist]は、より多くの[Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')]を発掘し、[concept_dubois_dinosaur_skeleton]の組み立ての結果も向上します。"
 concept_academics_academic_mission: "学術ミッション"
 concept_academics_academic_missions: "学術ミッション"
 concept_academics_mission: "学術ミッション"
 concept_academics_missions: "学術ミッション"
 concept_academics_academic_mission_desc: "[concept_academics_scientific_society]はときどき一定の目標を達成するよう求めることがあります。#b ミッション#!の目標はさまざまで、[Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]や[Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')]などを一定数以上発見するものや、惑星Xの発見、さらに[Concept('concept_lepsius_exhibition','$concept_lepsius_excellent_exhibition$')]の獲得などがあります。\n#b ミッション#!を達成できないと#b 科学協会#!を覚えますが、ミッションを達成できれば報酬もあります。"
 concept_curtiss_aviation: "Aviation"
 concept_curtiss_aviation_desc: "#b Aviation#! is one of the main features of [concept_morgenroete]. The 19th and 20th century saw the rise of human flight. First in the form of #b Balloons#! and #b Airships#!, then with #b Planes#!. Flying was a prestigious activity and allowed reaching new horizons.\n\nMany countries start their journey to the skies at the beginning of the game, when they start sponsoring a [Concept('concept_curtiss_balloonist_role','$concept_curtiss_balloonist_role_only_balloonist$')] to break records. Breaking one of the records will give your country a technology boost as well as a prestige modifier.\nResearching the Zeppelin Technology will allow you to conduct an [concept_curtiss_arctic_expedition] if you have access to the North Pole and a [concept_curtiss_pilot].\nResearching further in the aviation path will allow you to use multiple new mechanics. You will be able to build [concept_curtiss_airport] which produce the new #b Flights#! Good as well as #b Services#!. The #b Airport#! will allow an [concept_curtiss_airline] to grow which will allow you to use the [concept_curtiss_airspace_convention] diplomatic action. The #b Airspace Convention#! will allow you to get access to States and [Concept('concept_lepsius_excavation_site','$concept_lepsius_excavation_sites$')] as well as the North Pole. If your #b Airline#! grows enough you will be able to either build a gigantic blimp or the world's biggest plane.\nThe most exciting feature comes at the beginning of the 20th century: You will be able to compete at the [concept_curtiss_schneider_trophy]. The #b Schneider Trophy#! is a seaplane race in which different countries compete. If you win you will get prestige as well and host the next event. And if you manage to win the race 3 times, you will keep the #b Schneider Trophy#!."
 concept_curtiss_balloonist_role: "Balloonist Role"
 concept_curtiss_balloonist_role_only_balloonist: "Balloonist"
 concept_curtiss_balloonists_role: "Balloonists"
 concept_curtiss_balloonist_role_desc: "A #b Balloonist#! is a special character that can be sponsored by a nation. Usually well developed or western countries will sponsor #b Balloonist#! and compete for records and new findings. The #b Balloonists#! will randomly conduct flights and get records either for the longest distance, the longest flight time or the highest flight. For every balloon flight the #b Balloonist#! will get experience and rank up which will raise the chance for new records. But be aware that ballooning is a dangerous business and many balloonists die early, especially if they are sick, alcoholics or drug abusers."
 concept_curtiss_arctic_expedition: "Arctic Expedition"
 concept_curtiss_arctic_expeditions: "Arctic Expeditions"
 concept_curtiss_arctic_expedition_desc: "If you researched the #b Zeppelin#! Technology, have an [concept_verrier_observatory] with a #b Weather Station#!, a [concept_curtiss_pilot] and access to a state close to the North Pole, you can conduct an #b Arctic Expedition#!. Those States are #b Greenland#!, #b Northern Norway#!, #b Alaska#!, #b Nunavut#! and #b Nenetsia#!. You can get access by either owning the state yourself or having an [concept_curtiss_airspace_convention] with the owner.\nDuring an #b Arctic Expedition#! you can undertake research trips, build polar stations, gain new knowledge about geography, meteorology and biology of the arctic and be the first to cross the pole in an airship!"
 concept_curtiss_pilot: "Pilot"
 concept_curtiss_pilots: "Pilots"
 concept_curtiss_pilot_desc: "A #b Pilot#! is a character with the #b Pilot Trait#!. #b Pilots#! have a low chance of spawning after the #b Early Aviation#! discovery. In addition, in battles on a front using Aerial Reconnaissance as a production method, there is a chance that a #b Pilot#! emerges from the battle via an event. Better technologies such as Airplanes and Modern Aviation, but also establishing a Pilot School via Decisions allows for a better chance for a character to have the #b Pilot#! trait.\n#b Pilots#! help you in different ways. #b Airlines#! may be interested in #b Pilots#! to boost their image; in the battle for the [concept_curtiss_schneider_trophy], experienced #b Pilots#! have a better chance; and a #b Pilot#! is necessary to undertake the [concept_curtiss_arctic_expedition]. #b Pilots#! can also be upgraded to ace pilots via an event if they are deployed on a front."
 concept_curtiss_airport: "Airport"
 concept_curtiss_airports: "Airports"
 concept_curtiss_airport_desc: "An #b Airport#! is a building that is unlocked by the #b Modern Aviation#! Technology. It is a purely civilian building and provides [GetGoods('air_travel').GetName] and #b Services#! but consumes a variety of goods starting from [GetGoods('tools').GetName], [GetGoods('paper').GetName], [GetGoods('aeroplanes').GetName] and [GetGoods('oil').GetName]. Later it needs [GetGoods('electricity').GetName], [GetGoods('telephones').GetName] and [GetGoods('radios').GetName] as well.\nIf you have enough #b Airports#! an [concept_curtiss_airline] will be founded and with your growing #b Airports#!, the #b Airline#! will grow as well and offer more bonuses."
 concept_curtiss_airline: "Airline"
 concept_curtiss_airlines: "Airlines"
 concept_curtiss_airline_desc: "An #b Airline#! is a company or a government run institution that offers [GetGoods('air_travel').GetName] from the local level up to international flights at the end of the game. #b Airlines#! provide various other bonuses as well. #b Airlines#! need [Concept('concept_curtiss_airport','$concept_curtiss_airports$')] to conduct those flights. If you grow your #b Airports#!, so will the #b Airlines#!.\nIf your #b Airline#! is government run, you will get the opportunity to construct an enormous blimp and let it travel vast distances. If your #b Airline#! is publicly or privately owned, you might instead get the chance to build the biggest airplane ever created."
 concept_curtiss_airspace_convention: "Airspace Convention"
 concept_curtiss_airspace_conventions: "Airspace Conventions"
 concept_curtiss_airspace_convention_desc: "The #b Airspace Convention#! is an important [concept_diplomatic_pact] that allows you to interact with regions far away from your influence. If you have an #b Airspace Convention#! with another nation that has an [concept_lepsius_excavation_site], you will be able to conduct an [concept_lepsius_expedition] without having an [concept_active_interest] in the region.\nAn #b Airspace Convention#! will allow you to send an [concept_curtiss_arctic_expedition] if you do not own one of the states necessary."
 concept_curtiss_schneider_trophy: "Schneider Trophy"
 concept_curtiss_schneider_trophy_desc: "The fight for this prestigious trophy, which the Frenchman Jacques Schneider donated shortly before the First World War, was primarily intended to stimulate the development of seaplanes. Over time, the race for this trophy became a race of nations, with the UK, USA and Italy in particular giving their teams massive support to win the coveted trophy. In fact, technological development has benefited from the #b Schneider Trophy#! using ever faster and more advanced seaplanes.\nThe #b Schneider Trophy#! can be founded if there are 5 nations that invented the #b Seaplanes#! Technology and if you have a port and a level 10 urban center in one of your states.\nThe Winner of the Trophy is chosen by a journal entry and many factors. A nation with a pilot school and a big [concept_curtiss_airline] will have an advantage for example. A great [concept_curtiss_pilot] and massive funding will help winning the trophy as well.\nThe winner of the last Trophy will be able to hold the next one if they have a port or are Switzerland with its many lakes. Winning the Trophy 3 times in a row is even better, as the nation will keep the trophy forever and get a prestige bonus for it."
 concept_curtiss_balloonist: "Balloonist"
 concept_curtiss_balloonist_desc: "This character is a balloonist who often goes on adventurous balloon rides."
 concept_curtiss_experienced_balloonist: "Experienced Balloonist"
 concept_curtiss_experienced_balloonist_desc: "This character is an experienced balloonist who often goes on adventurous balloon rides. Characters with this trait have a higher chance of setting better records."
 concept_curtiss_famous_balloonist: "Famous Balloonist"
 concept_curtiss_famous_balloonist_desc: "This character is a famous balloonist who often goes on adventurous balloon rides. Characters with this trait have a higher chance of setting better records."
 concept_dubois_natural_history: "Natural History"
 concept_dubois_natural_history_desc: "#b Natural History#! is one of the main features of [concept_morgenroete]. The 19th century has seen many great natural history discoveries: many great expeditions, such as that of the Beagle, the invention of the theory of evolution, the discovery of hundreds of thousands of new species and, of course, the discovery of dinosaurs.\n\nMajor and Great Powers with a fleet and an admiral can send a ship on a [concept_dubois_pacific_expedition]. On a #b Pacific Expedition#! you can find rare plants, animals, and fossils, conduct oceanographic research, or observe astronomical phenomena such as solar eclipses.\n\nThe big animals you can find, the [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')], can be used to construct a [concept_dubois_zoo] and exhibit those animals. The more animals, the bigger the effect the #b Zoo#! has. You can find those #b Animals#! on Expeditions, you can collect them in your own territory or ask other countries to sell them to you.\n\nSmaller animals, plants and other organisms are called [concept_dubois_specimen]. A [concept_dubois_naturalist] can collect such #b Specimen#!. A #GREEN #b Naturalist#!#! can be sent on [Concept('concept_dubois_botanical_expedition','$concept_dubois_botanical_expeditions$')] to states with a rainforest state modifier. In case you do not have such a state yourself, you can acquire a [concept_dubois_botanical_licence] from another country. A #GREEN #b Naturalist#!#! will gain [concept_academics_experience] when they find rare specimens.\n\n[Concept('concept_dubois_fossil','$concept_dubois_fossils$')] are the field of a [concept_dubois_paleontologist], be it fossils of plants, insects or other small animals. #b Fossils#! can be found on #b Expeditions#! or in States with [Concept('concept_dubois_formation','$concept_dubois_formations$')]. If you have a #b Great Formation#! You might even be able to find [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')]. And otherwise you can access one by buying a [concept_dubois_paleontological_licence].\n\nIf your country has access to a mountain range a general can participate in [concept_douglas_mountaineering] and gain better traits and a prestige bonus."
 concept_dubois_naturalist: "#b #GREEN Naturalist#!#!"
 concept_dubois_naturalists: "#b #GREEN Naturalists#!#!"
 concept_dubois_naturalist_desc: "#b #GREEN Naturalist#!#! are Academics that can gather [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] and [concept_dubois_specimen]. They can be sent of to a [concept_dubois_pacific_expedition] or a [concept_dubois_botanical_expedition] where they can find rare plants and animals that give you a small bonus. #b #GREEN Naturalists#!#! gain [concept_academics_experience] when they find new rare specimens."
 concept_dubois_paleontologist: "#b #GREEN Paleontologist#!#!"
 concept_dubois_paleontologists: "#b #GREEN Paleontologists#!#!"
 concept_dubois_paleontologist_desc: "#b #GREEN Paleontologists#!#! are Academics that will dig for [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] and [Concept('concept_dubois_fossil','$concept_dubois_fossils$')]. To collect them, you need access to a [concept_dubois_formation]. If you have access to a #b Formation#! either by owning it yourself or with a [concept_dubois_paleontological_licence], you can send your #b Paleontologist#! on a [concept_dubois_paleontological_expedition].\nAfter collecting or reconstructing 5 #b Dinosaur Bones#! your #b Paleontologist#! can construct a [concept_dubois_dinosaur_skeleton]. As #b #GREEN Paleontologists#!#! gain [concept_academics_experience], they will get better at reconstructing #b Dinosaur Skeletons#! and so will the #b skeletons#!. The better the #b Dinosaur Skeletons#!, the more prestige your [concept_dubois_paleontological_collection] will provide."
 concept_dubois_pacific_expedition: "Pacific Expedition"
 concept_dubois_pacific_expeditions: "Pacific Expeditions"
 concept_dubois_pacific_expedition_desc: "As a Major or Great Power you can send an Expedition to the Pacific Ocean. You need to have the #b Empiricism#!, #b Screw Frigate#! and #b Dialectics Technology#! researched, you need a Port and a University, as well as a Navy of at least 15 and an Admiral.\nOn a #b Pacific Expedition#! you can find rare plants, [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')], and [Concept('concept_dubois_fossil','$concept_dubois_fossils$')], conduct oceanographic research, or observe astronomical phenomena such as solar eclipses. At the beginning of the #b Expedition#! you can choose a #b Scientist#! for your Expedition as well, either a #b Surveyor#!, [concept_dubois_naturalist], [concept_dubois_paleontologist] or [concept_verrier_astronomer]. Each one will help to bring better yields in specific events tied to their expertise.\nYour expedition can choose a focus on what exactly it explores. It can be devoted entirely to the mysteries of the sea and improve your oceanographic and astronomical knowledge; in that case, only oceanographic events will trigger. If you explore the wonders of nature, you will be confronted with botanical, zoological and paleontological events. Great Powers will also have the option to undertake a prestige mission, in which you'll find artifacts, establish trading posts or set up missions - especially useful if you don't have diplomatic interests in Oceania, but want to try to acquire at least a small colony through missionaries.\nYou will also have to choose where exactly your mission will travel to: Oceania, Australia or Indonesia. Each one offers different events and rewards."
 concept_dubois_habitat: "Habitat"
 concept_dubois_habitats: "Habitats"
 concept_dubois_animal_habitat: "Animal Habitat"
 concept_dubois_habitat_desc: "A #b Habitat#! is a region in a state where a specific [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animal$')] lives. In #r Morgenröte#! #b Habitats#! for the various animals exist in various State Regions. If you own a #b Habitat#! you can transport the #b Animals#! to the [concept_dubois_zoo] or even sell them to other countries.\n\nIf your state reaches an [concept_urbanization] of 2000 or higher or has no more [concept_arable_land], the #b Exotic Animals#! will go #n extinct after 10 years#!.\n\nTo save the #b Animals#! from extinction you can build a [concept_dubois_nature_reserve] in a state with a #b Habitat#!"
 concept_dubois_nature_reserve: "Nature Reserve"
 concept_dubois_nature_reserves: "Nature Reserves"
 concept_dubois_royal_hunting_reserve: "Royal Hunting Reserve"
 concept_dubois_nature_reserve_desc: "A #b Nature Reserve#! is a protected area where you can protect or establish [Concept('concept_dubois_habitat','$concept_dubois_habitats$')].\n\nIf you already have a #b Habitat#!, you can protect it from destruction by the influence of humans by constructing the #b Nature Reserve#! building in the state with the #b Habitat#!. To build a #b Nature Reserve#!, you need to have the #b Genetics#! technology unlocked and have an incorporated state with a #b Habitat#! that is a homeland of one of your primary cultures.\n\nIf you do not own a #b Habitat#!, you can build a #b Nature Reserve#! by surveying your country for a location if you have the #b Genetics#! technology unlocked and at least one [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animal$')] from your continent in your [concept_dubois_zoo].\n\nA #b Nature Reserve#! does not only protect your animal #b Habitats#!, it also allows you to settle #b Exotic Animals#! from your continent in them. By doing this, you can protect all the #b Exotic Animals#! of your continent in one single state."
 concept_dubois_zoo_animal: "Zoo Animal"
 concept_dubois_zoo_animals: "Zoo Animals"
 concept_dubois_exotic_animal: "Exotic Animal"
 concept_dubois_exotic_animals: "Exotic Animals"
 concept_dubois_zoo_animal_desc: "There are many animals in the world that your [concept_dubois_naturalist] can catch. To catch an #b Exotic Animal#! you need a state with a [concept_dubois_habitat]. Alternatively you can buy an #b Exotic Animal#! from a country with a #b Habitat#!\nOnce caught, the #b Zoo Animals#! can be sent to your [concept_dubois_zoo] which will allow you to expand the #b Zoo#!."
 concept_dubois_zoo: "Zoo"
 concept_dubois_zoos: "Zoos"
 concept_dubois_zoo_desc: "A #b Zoo#! is a special building you can construct after gathering 5 [concept_dubois_zoo_animal]. The #b Zoo#! houses your #b Animals#!, your collection of[concept_dubois_specimen] and your Paleontological Collection."
 concept_dubois_specimen: "標本"
 concept_dubois_specimens: "標本"
 concept_dubois_specimen_desc: "The various insects, plants and smaller animal that a [concept_dubois_naturalist] can collect, are called #b Specimen#!. You can use the #b Specimen#! to build a Botanical Garden or Specimen Collection in your [concept_dubois_zoo]."
 concept_dubois_botanical_expedition: "Botanical Expedition"
 concept_dubois_botanical_expeditions: "Botanical Expeditions"
 concept_dubois_botanical_expedition_desc: "You can send a [concept_dubois_naturalist] on a #b Botanical Expedition#! if you have access to a state with [concept_ito_medicinal_plants] either by owning such a state or by acquiring a [concept_dubois_botanical_licence].\nYour #b Naturalist#! will collect [concept_ito_medicinal_plants] and [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] during the one year journey. Sometimes they will find a rare plant that will make a great addition to the botanical collection of a [concept_dubois_zoo]."
 concept_dubois_botanical_licence: "Botanical License"
 concept_dubois_botanical_licences: "Botanical Licenses"
 concept_dubois_botanical_licence_desc: "If you do not have access to a state with the rainforest state modifier, you can still send a [concept_dubois_botanical_expedition] by acquiring a #b Botanical License#! from a country that does. You will have to pay a small amount of money but this will allow you to collect [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] and find rare plants."
 concept_dubois_fossil: "Fossil"
 concept_dubois_fossils: "Fossils"
 concept_dubois_fossil_desc: "A [concept_dubois_paleontologist] can discover #b Fossils#! of plants and animals, that are long extinct, if you uncovered a [concept_dubois_formation]."
 concept_dubois_dinosaur_bone: "Dinosaur Bones"
 concept_dubois_dinosaur_bones: "Dinosaur Bones"
 concept_dubois_dinosaur_bone_desc: "A [concept_dubois_paleontologist] can find Dinosaur Bones in Great [Concept('concept_dubois_formation','$concept_dubois_formations$')].\nAn #b Experienced Paleontologist#! can also attempt to reconstruct a #b Dinosaur Bone#! from 20 [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] fragments. A #b Dinosaur Bone#! can only be reconstructed if at least one dinosaur bone is available for orientation.\nTo perform any of the actions, the paleontologist must not be exhausted or busy. Its success depends largely on paleontological [concept_academics_experience].\n#b Dinosaur Bones#! are use to reconstruct [Concept('concept_dubois_dinosaur_skeleton','$concept_dubois_dinosaur_skeletons$')]."
 concept_dubois_dinosaur_skeleton: "Dinosaur Skeleton"
 concept_dubois_dinosaur_skeletons: "Dinosaur Skeletons"
 concept_dubois_dinosaur_skeleton_desc: "From five [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] from a continental region, a [concept_dubois_paleontologist] can reconstruct a complete dinosaur. To reconstruct a #b Dinosaur Skeleton#!, you need 5 #b Dinosaur Bones#! from the same region.\nHopefully your #b Paleontologist#! ist experienced enough to reconstruct the #b Dinosaur Skeleton#! right. Otherwise you might risk to lose prestige for your [concept_dubois_paleontological_collection]. However, if a #b Dinosaur Skeleton#! was reconstructed wrong, you can attempt to fix it which will result in a slightly better reconstruction."
 concept_dubois_paleontological_collection: "Paleontological Collection"
 concept_dubois_paleontological_collections: "Paleontological Collections"
 concept_dubois_paleontological_collection_desc: "The #b Paleontological Collection#! is the realm of your [concept_dubois_paleontologist]. There you will find all the [Concept('concept_dubois_fossil','$concept_dubois_fossils$')], [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] and [Concept('concept_dubois_dinosaur_skeleton','$concept_dubois_dinosaur_skeletons$')] of your nation.\nThe better your #b Paleontologist#! mounted these #b Dinosaur Skeletons#!, the more prestige your #b Collection#! will provide. If your #b Paleontologist#! mounted the #b Skeletons#! horribly wrong, that could even cause you to lose prestige. But maybe the same or another #b Paleontologist#! can remount them better!"
 concept_dubois_formation: "Formation"
 concept_dubois_formations: "Formations"
 concept_dubois_geological_formation: "Geological Formation"
 concept_dubois_formation_desc: "There are two kinds of #b Formations#!, normal Formations allow your [concept_dubois_paleontologist] to collect [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] while Great Formations allow for the discovery of [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')].\n#b Formations#! can be uncovered by your Paleontologist or when you research the Paleontology Technology.\nIf you do not have a #b Great Formation#! yourself, you can buy a [concept_dubois_paleontological_licence] from a nation that does and gain access to it."
 concept_dubois_paleontological_expedition: "Paleontological Expedition"
 concept_dubois_paleontological_expeditions: "Paleontological Expeditions"
 concept_dubois_paleontological_licence: "Paleontological Licence"
 concept_dubois_paleontological_licences: "Paleontological Licences"
 concept_dubois_paleontological_licence_desc: "If you do not have access to a [concept_dubois_formation], you can try to get access to one with a #b Paleontological Licence#!. This diplomatic Action allows you to gain access to a #b Great Formation#!. To be able to use it, you need to be a Major or Great Power and the other nation needs a #b Great Formation#!. You will have to pay the other nation a small amount of your income, but hopefully it will be worth it."
 concept_dubois_mountain: "Mountain"
 concept_dubois_mountains: "Mountains"
 concept_dubois_mountain_desc: "There are many #b Mountains#! that can be climbed.\n\n#V North America:#!\n#b Mount McKinley#! (Alaska), 6190 meters\n#b Mount Logan#! (Yukon Territory), 5959 meters\n#b Citlaltépetl#! (México), 5636 meters\n#b Mount Whitney#! (California), 4421 meters\n\n#V South America:#!\n#b Aconcagua#! (Mendoza), 6267 meters\n#b Huascarán#! (Lima Territory), 6768 meters\n#b Illimani#! (La Paz), 6438 meters\n#b Chimborazo#! (Ecuador), 6267 meters\n\n#V Europe:#!\n#b Shkara#! (Greater Caucasus), 5642 meters\n#b Dufourspitze#! (West Switzerland), 4634 meters\n#b Matterhorn#! (West Switzerland), 4478 meters\n#b Aiguille Verte#! (Savoy), 4122 meters\n#b Pico de Aneto#! (Aragon), 3404 meters\n\n#V Africa:#!\n#b Kibo#! (Tanganyika), 5895 meters\n#b Mount Kenya#! (Kenya), 5199 meters\n#b Mount Stanley#! (Uganda), 5109 meters\n#b Kamerunberg#! (South Cameroon), 4095 meters\n\n#V Asia:#!\n#b Kamet#! (Delhi), 7756 meters\n#b Chogolisa#! (Kashmir), 7665 meters\n#b Kabru#! (Himalayas), 7412 meters\n#b Kaufmann Peak#! (Tajikistan), 7134 meters\n\n#V Australia & Oceania:#!\n#b Mount Wilhelm#! (Eastern New Guinea), 4121 meters\n#b Mount Cook#! (South Island), 3724 meters"
 concept_elgar_music: "Music Culture"
 concept_elgar_opera: "Opera"
 concept_elgar_operas: "Operas"
 concept_elgar_opera_house: "Opera House"
 concept_elgar_opera_houses: "Opera Houses"
 concept_elgar_musical_tradition: "Musical Tradition"
 concept_elgar_impressionism: "Impressionism"
 concept_elgar_expressionism: "Expressionism"
 concept_elgar_art_nouveau: "Art Nouveau"
 concept_elgar_architecture: "Architecture"
 concept_elgar_architectural_project: "Architectural Project"
 concept_elgar_architectural_projects: "Architectural Projects"
 concept_lepsius_archaeology: "Archaeology"
 concept_lepsius_archaeology_desc: "#b Archaeology#! is one of the main features of [concept_morgenroete].\n\nThere are 8 [Concept('concept_lepsius_excavation_site','$concept_lepsius_excavation_sites$')] on the map.\n\n To be able to send an [concept_lepsius_expedition], you need to research the Antiquarianism Technology, have an [concept_lepsius_archaeological_team] and have acces to one of the Excavation Sites. You can either get access by owning the Site yourself or by asking a country with a Site for a [concept_lepsius_excavation_licence].\n\nYou can now send an Archaeological expedition to one of the Excavation Sites. Your Team will discover [Concept('concept_lepsius_artifact','$concept_lepsius_minor_artifacts$')] and in very rare cases and the help of a good [concept_lepsius_archaeologist], you might even find a [concept_lepsius_major_artifact].\n\nOnce your Team returns with the Artifacts, you might be able to build a [concept_lepsius_museum]. In a Archaeological Museum you will be able to see your Artifacts, create [concept_lepsius_exhibition] and visit your #b #BLUE Archaeologist#!#!.\n\nThe more Artifacts and Exhibitions you have, the more Prestige you will get.\n\n#b Anthropology#! is another part of Archaeology. If you have an [concept_andersson_anthropologist] and a [concept_andersson_cave], you can find [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')] and reconstruct prehistoric human species. Each skeleton will give you more anthropological prestige. With enough anthropological prestige, you will get a prestige modifier for your country."
 concept_lepsius_archaeologist: "#b #BLUE Archaeologist#!#!"
 concept_lepsius_archaeologists: "#b #BLUE Archaeologists#!#!"
 concept_lepsius_archaeologist_desc: "#b #BLUE Archaeologists#!#! are Academics that you can send to [Concept('concept_lepsius_expedition','$concept_lepsius_expeditions$')]. They will gather [Concept('concept_lepsius_artifact','$concept_lepsius_minor_artifacts$')] there. Sometimes they might even find a [concept_lepsius_major_artifact].\nArchaeologists gain [concept_academics_experience] during their work and passively every year. They can get better levels of the archaeologist trait by earning enough #b Experience#!."
 concept_lepsius_museum: "Archaeological Museum"
 concept_lepsius_museum_desc: "The #b Archaeological Museum#! is a building you can construct that displays all the [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] your nation has found."
 concept_lepsius_excavation_site: "Historical Excavation Site"
 concept_lepsius_excavation_sites: "Historical Excavation Sites"
 concept_lepsius_excavation_site_desc: "There are multiple #b Historical Excavation Sites#! in different countries including: Upper and Lower Egypt, Babylonia, Assyria, Crete, Argolis, Yucatán and Peru. Each #b Historical Site#! offers different [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] and Events. Besides these large, historically significant excavation sites, there are also [Concept('concept_lepsius_minor_excavation_site', '$concept_lepsius_minor_excavation_sites$')]."
 concept_lepsius_expedition: "Archaeological Expedition"
 concept_lepsius_expeditions: "Archaeological Expeditions"
 concept_lepsius_expedition_desc: "An #b Archaeological Expedition#! is an expedition of an [concept_lepsius_archaeologist] and his [concept_lepsius_archaeological_team]. It will take multiple months in which they will try to gather as many [Concept('concept_lepsius_artifact','$concept_lepsius_minor_artifacts$')] as possible. #b Expeditions#! are the only way to get in possession of [Concept('concept_lepsius_major_artifact','$concept_lepsius_major_artifacts$')].\nIf you researched early Archaeology, you can leave your Team at the Site to create an [concept_lepsius_excavation] after a successful #b Expeditions#!."
 concept_lepsius_archaeological_team: "Archaeological Team"
 concept_lepsius_archaeological_teams: "Archaeological Teams"
 concept_lepsius_excavation_team: "Excavation Team"
 concept_lepsius_archaeological_team_desc: "You need one or more #b Archaeological Team#! to be able to conduct [Concept('concept_lepsius_expedition','$concept_lepsius_expeditions$')]. You can gain up to 3 #b Archaeological Teams#!, but each one has higher requirements.\n\nYou can get your first #b Team#! by having researched the Antiquarianism Technology, having a University of at least level 3 and a Literacy of 33%.\n\nYou can get another Team if you have researched the Modern Archaeology Technology, have a University of at least level 15 and a Literacy of 66%.\n\nYou can get another #b Team#! having researched the Antiquarianism Technology and having an Experienced [concept_lepsius_archaeologist].\n\nYou need #b Teams#! for [Concept('concept_lepsius_expedition','$concept_lepsius_expeditions$')] and [Concept('concept_lepsius_excavation','$concept_lepsius_excavations$')]."
 concept_lepsius_excavation_licence: "Excavation Licence"
 concept_lepsius_excavation_licences: "Excavation Licences"
 concept_lepsius_excavation_licence_desc: "If you do not own some of the [Concept('concept_lepsius_excavation_site','$concept_lepsius_excavation_sites$')] yourself, you can still get access to them by using the #b Excavation Licence#! Diplomatic Action.\nTo be able to get a #b Excavation Licence#! you need to be at least a Major Power and have an [concept_active_interest] in the Region.\nYou will have to pay the other country a small amount of money to keep the #b Excavation Licence#!."
 concept_lepsius_artifact: "Artifact"
 concept_lepsius_artifacts: "Artifacts"
 concept_lepsius_minor_artifact: "Minor Artifact"
 concept_lepsius_minor_artifacts: "Minor Artifacts"
 concept_lepsius_oceanic_artifact: "Oceanic Artifact"
 concept_lepsius_oceanic_artifacts: "Oceanic Artifacts"
 concept_lepsius_artifact_desc: "You can get Artifacts by sending [Concept('concept_lepsius_archaeological_team','$concept_lepsius_archaeological_teams$')] on [Concept('concept_lepsius_expedition','$concept_lepsius_expeditions$')], [Concept('concept_lepsius_excavation','$concept_lepsius_excavations$')], on [Concept('concept_dubois_pacific_expedition','$concept_dubois_pacific_expeditions$')] or in Events.\n\nUsually you will get Minor #b Artifacts#!. You can use these Minor #b Artifacts#! for [Concept('concept_lepsius_exhibition','$concept_lepsius_exhibitions$')] in your [concept_lepsius_museum].\n\n[Concept('concept_lepsius_major_artifact','$concept_lepsius_major_artifacts$')] on the other hand are unique #b Artifacts#! that can only be found once and have a unique name. You can usually find them in Expeditions, excavations and as Archaeological Discoveries."
 concept_lepsius_major_artifact: "Major Artifact"
 concept_lepsius_major_artifacts: "Major Artifacts"
 concept_lepsius_major_artifact_desc: "#b Major Artifacts#! are special [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] that have a name and an identity.\nYou can find #b Major Artifacts#! in different ways. Some of them you will find during [Concept('concept_lepsius_expedition','$concept_lepsius_expeditions$')]. For others you need to maintain a continous [concept_lepsius_excavation] until you find. And some will be discovered in a major discovery.\nTaking a #b Major Artifact#! out of a country illegally might cause a diplomatic incident that might harm you more than owning a #b Major Artifact#!. On the other hand, #b Major Artifacts#! allow you to create a [Concept('concept_lepsius_exhibition','$concept_lepsius_excellent_exhibition$')] which will give you a huge prestige bonus and is needed for some [Concept('concept_academics_academic_mission','$concept_academics_academic_missions$')]."
 concept_lepsius_exhibition: "Exhibition"
 concept_lepsius_exhibitions: "Exhibitions"
 concept_lepsius_excellent_exhibition: "Excellent Exhibition"
 concept_lepsius_excavation: "Excavation"
 concept_lepsius_excavations: "Excavations"
 concept_lepsius_excavation_desc: "If you have researched Early Archaeology and finished an [concept_lepsius_expedition], you can decide to leave your [concept_lepsius_archaeological_team] at the Site to passively dig out [Concept('concept_lepsius_artifact','$concept_lepsius_minor_artifacts$')]. You can always call your Team back from the #b Excavation#!."
 concept_verrier_astronomy: "天文学"
 concept_verrier_observatory: "天文台"
 concept_verrier_observatories: "天文台"
 concept_verrier_astronomer: "#b #ORANGE 天文学者#!#!"
 concept_verrier_astronomers: "#b #ORANGE 天文学者#!#!"
 concept_verrier_astronomical_object: "天体"
 concept_verrier_astronomical_objects: "天体"
 concept_verrier_astronomical_object_icon: "@verrier_astronomicalobject!"
 concept_verrier_celestial_body: "天体"
 concept_verrier_celestial_bodies: "天体"
 concept_verrier_comet: "大彗星"
 concept_verrier_comets: "大彗星"
 concept_verrier_comet_desc: "ヴィクトリア朝時代、複数の#b 大彗星#!が目撃され、人々は関心を寄せました。[concept_verrier_astronomer]がいれば、こうした#b 大彗星#!を初めて発見し、威信と研究ボーナスが得られます。"
 concept_verrier_moon_photo: "月面写真"
 concept_verrier_moon_photos: "月面写真"
 concept_rapanui_christian_mission: "Christian Mission"
 concept_rapanui_christian_missions: "Christian Missions"
 concept_rapanui_christian_mission_desc: "[Concept('concept_major_power','$concept_major_powers$')] or [Concept('concept_great_power','$concept_great_powers$')] with [Concept('concept_interest','$concept_interests$')] in Oceania can try to convert a decentralized island nation in the region - but this is only possible if your country is not too secular and the \"devout\" interest group is not too weak.\n\nThe proselytizing takes place in three steps. If you send a missionary, he will either be received kindly, ignored - or killed immediately. Should your mission go awry, you will have to wait a few years to find a new missionary to spread the word of God. Afterwards your missionary will convert 1% of the population per year. There might be events that help or hinder the conversion.\n\nThe second stage begins when you reach 30% converted natives. Now your Missionary Station will become permanent. Should 51 percent of the natives profess Christianity, then the chief will convert to your religion and place himself under your protection as a [concept_protectorate]. Years later, these areas can even be annexed if you have the technology to prevent malaria.\n\nIn the third stage you can actively make decisions via the Journal Entry. Either you strengthen the mission directly by sending additional missionaries, or you try to trade. You can acquire rare [Concept('concept_lepsius_artifact','$concept_lepsius_oceanic_artifacts$')], [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] or pearls that increase the standard of living of the rich."
 concept_manzoni_literary_tradition: "Literary Tradition"
 concept_klimt_painters: "#PURPLE #b Painters#!#!"
 concept_klimt_painting_tradition: "Painting Tradition"
 concept_vikelas_sports: "Sports"
 concept_vikelas_sports_desc: "#b Sports#! are one of the main features of [concept_morgenroete].\n\nOnce a country discovers #b Organized Sports#!, it gets access to different sporting activities. The most important one is the foundation of the [concept_vikelas_ioc] which will start to organize the [concept_vikelas_olympic_games]. The Olympic Games will give you a chance to win Gold Medals that will provide your country with [concept_prestige]."
 concept_vikelas_olympic_games: "Olympic Games"
 concept_vikelas_olympic_games_desc: "Once the [concept_vikelas_ioc] is founded, the #b Olympic Games#! can take place every 4 years. Each time the Committee will vote for a #b Host#!. The host country will get a big [concept_prestige] boost.\n During the Olympic Games your Athletes will compete for medals. Many factors influence how many Medals you will get. Your population has a small influence, the [concept_sol] has a bigger influence, some events influence your chances as well and so do great [Concept('concept_general', '$concept_generals$')] and great [Concept('concept_admiral', '$concept_admirals$')]. Additionally characters with the #b Athlete#! trait and Urban Centers with the #b Sports Facilities#! also give small boosts.\nAll those factors have an influence on how many medals out of the 12 Gold Medals your country will get. Each Gold Medal will grant you 5 [concept_prestige]."
 concept_vikelas_ioc: "International Olympic Committee"
 concept_vikelas_ioc_desc: "A Nation that has researched #V $vikelas_international_sports_tech$#! can found the #b International Olympic Committee#! or #b IOC#! in short. The IOC will then start organizing the [concept_vikelas_olympic_games]. Each member of the IOC can participate in the Olympic Games.\n The most important members of the IOC are the #b Board Members#!. The Founder of the IOC will become the #b President#! and therefore stay a board member forever while the other members will be elected every 4 years. The Board has space for 5 Great Powers, 2 European, 2 Asian, 2 American, 1 African and 1 Oceanic nation.\nThe main task of the Board Members is choosing the next Host of the Games. There will be 3 candidates (or 4 if a country decides to bribe the Board) to choose from.\nIf Greece founds the IOC, the Olympic Games will only be held in Greece resulting in the Board being less important, as they do not choose the Host."
 concept_lepsius_exhibition_desc: "Your [concept_lepsius_museum] will automatically set up Exhibitions (in form of a [concept_production_method] for each region) if you have enough [Concept('concept_lepsius_artifact','$concept_lepsius_minor_artifacts$')] of the same kind. For normal Artifacts the first Exhibition will be created for 10 or more artifacts. From there better Exhibitions are possible with 25 (Medium Exhibition), 50 (Large Exhibition) and 100 Minor Artifacts (Excellent Exhibition). The Excellent Exhibition additionally needs one [concept_lepsius_major_artifact].\n\nLocal Artifacts have a less diverse set of Exhibitions as they are limited to a regular and a grand Exhibition. The regular Exhibition requires 25 local Artifacts and the Grand Exhibition requires 50."
 concept_vikelas_racer: "Car Racer"
 concept_vikelas_racers: "Car Racers"
 concept_vikelas_racer_desc: "A #b Car Racer#! is a special [concept_character] who takes part in [concept_vikelas_car_racing]. Apart from the [concept_vikelas_race_car], the driver is the most important factor in winning a car race. Their personal qualities are crucial."
 concept_vikelas_car_racing: "Car Racing"
 concept_vikelas_car_racing_desc: "Car Racing is a sport in which [Concept('concept_vikelas_racer','$concept_vikelas_racers$')] compete against each other either on a track or on regular roads."
 concept_lepsius_archaeological_exhibition: "Archaeological Exhibition"
 concept_elgar_opera_desc: "The #b Opera#! is the musical center of a nation. It is where the most important musicians gather and play for the masses.\nThe #b Opera#! is a separate building that can be constructed in states if the Urban Center is at least level 5. The #b Opera#! will produce Music and consume Instruments. The higher the level of the #b Opera#! is, the more [concept_elgar_musical_tradition] will be produced every year.\nAdditionally with an #b Opera#! you gain access to some decisions like visiting your Opera."
 concept_elgar_impressionism_desc: "#b Impressionism#!  is a style in art history that is characterized by the atmospheric depiction of fleeting snapshots of a scene. It emerged from a movement within painting in France in the second half of the 19th century. The term impressionism has also been applied to certain styles of music, literature, film and photography. While many Naturalists such as Heinrich Hart rejected music as a means of expressing a 'truth-seeking Actionism', the Impressionists often regarded the 'objectless dreaming ahead' to finely graduated colorful chords as a pleasure.\n\nIn the game, #b Impressionism#! is only unlockable with a journal entry that requires 1000 [concept_elgar_musical_tradition], an [concept_elgar_opera], powerful landowners, industrialists that are not powerful and an Intelligentsia with an approval of 5 above. If you choose #b Impressionism#!, you won't be able to unlock the other two branches.\n\nThe focus of #b Impressionism#! in the game is music. Therefore it will give you the biggest bonus to [concept_elgar_musical_tradition]."
 concept_elgar_expressionism_desc: "#b Expressionism#!  is a style in art. Its beginnings and forerunners can be found in the late 19th century. Like Impressionism, Symbolism and Fauvism, Expressionism is a movement against the tendencies of Naturalism. In Expressionism, the expressive level outweighs the aesthetic, appellative and factual level. The artist wants to represent his experience for the viewer. In contrast to musical impressionism, which depicts the perception of the external appearance of things, the expressionist art movements formulate the emotions of the human soul.\n\nIn the game, #b Expressionism#! is only unlockable with a journal entry that requires 1000 [concept_elgar_musical_tradition], an [concept_elgar_opera], a powerful intelligentsia or trade unions, landowners that are not powerful and either the Intelligentsia or the trade unions need an approval of 5 or above. If you choose #b Expressionism#!, you won't be able to unlock the other two branches.\n\nThe focus of #b Expressionism#! in the game would be literature, but it is not yet implemented."
 concept_elgar_art_nouveau_desc: "#b Art Nouveau#! is an Artstyle that developed from the #italic Arts and Crafts Movement#! and was inspired by natural forms. It often focused on dynamism and movement and used modern materials.\n\nIn the game, #b Art Nouveau#! is only unlockable with a journal entry that requires 1000 [concept_elgar_musical_tradition], an [concept_elgar_opera], powerful industrialists and an Intelligentsia with an approval of 5 or above. If you choose #b Art Nouveau#!, you won't be able to unlock the other two branches.\n\nThe focus of #b Art Nouveau#! and #b Art Déco#!, the next technology in this branch, is Architecture. You will get various events and journal entries about architectural deeds and be able get a [concept_gaudi_architectural_splendour]."
 concept_elgar_composer: "#PURPLE #b Composer#!#!"
 concept_elgar_composers: "#PURPLE #b Composers#!#!"
 concept_elgar_composer_desc: "#b Composers#! are men and women who compose music. Composers are special character types that you can gain either from events, from gaining enough [concept_artistic_progress] to create one in your nation or by offering a position to a [concept_elgar_travelling_composer].\nOnce you have a #b Composer#! you can let them start [Concept('concept_elgar_composing','$concept_elgar_composing_lower_case$')], [Concept('concept_elgar_conducting','$concept_elgar_conducting_lower_case$')], to go on [Concept('concept_elgar_musical_tour','$concept_elgar_musical_tours$')] or composing [Concept('concept_elgar_musical_masterwork','$concept_elgar_musical_masterwork_masterworks$')]. Each action is different in what the composer does, what they require and what you gain from them. The #b Composer#! will be [Concept('concept_elgar_composer_exhaustion','$concept_elgar_composer_exhaustion_exhausted$')] after every task and need to rest for a while until he can work again.\nDuring their life, #b Composers#! will gain [concept_artists_experience] and sometimes lose it again. The higher the #b Reputation#!, the greater the benefits of a #b Composer's#! actions will be. #b Composers#! reaching a #b Reputation#! of 500 will become [Concept('concept_elgar_great_composer','$concept_elgar_great_composers$')], Titans of Music, known throughout the world."
 concept_elgar_great_composer: "#PURPLE #b Great Composer#!#!"
 concept_elgar_great_composers: "#PURPLE #b Great Composers#!#!"
 concept_elgar_great_composer_desc: "#b Great Composers#! are the Titans of music. The ones whose names will be known for all eternity. [Concept('concept_elgar_composer','$concept_elgar_composers$')] reaching 500 [concept_artists_experience], will become #b Great Composers#!. This will greatly increase their efficiency and let your nation gain way more [concept_elgar_musical_tradition]. A #b Great Composer#! can create a [concept_elgar_musical_masterwork] way faster for example."
 concept_elgar_travelling_composer: "Travelling Composer"
 concept_elgar_travelling_composers: "Travelling Composer"
 concept_elgar_travelling_composer_desc: "#b Travelling Composers#! are [Concept('concept_elgar_composer','$concept_elgar_composers$')] that are not hired by any nation. Instead they travel around on concert tours. You can possibly aquire a #b Travelling Composer#!, but the more [concept_artists_experience] they have the more demands they will have.\nTo invite a #b Travelling Composer#! you need to at least have an [Concept('concept_elgar_opera','$concept_elgar_opera_house$')]. #b Composers#! with a higher #b Reputation#! will demand bigger Opera Houses, modern music [Concept('concept_technology', '$concept_technologies$')], a certain [concept_elgar_musical_tradition] and some might only join [Concept('concept_major_power', '$concept_major_power_short$')] or [Concept('concept_great_power', '$concept_great_powers$')].\nA special case are [Concept('concept_elgar_national_composer','$concept_elgar_national_composers$')] that are only available to nations that are of the same or a very similar national identity."
 concept_elgar_national_composer: "National Composer"
 concept_elgar_national_composers: "National Composer"
 concept_elgar_national_composer_desc: "#b National Composers#! are [Concept('concept_elgar_composer','$concept_elgar_composers$')] who value their nation very much. They will not be able to be hired by other nations.\nWhether a #b National Composer#! is available to you or not is decided by their culture's [Concept('concept_cultural_trait','$concept_cultural_traits$')]. One of your primary cultures needs to share both a non-heritage #b Trait#! as well as a [concept_cultural_heritage_trait]. This means that a North German #b National Composer#! will be available to German Countries as well as Switzerland."
 concept_elgar_composing: "Composing"
 concept_elgar_composing_lower_case: "composing"
 concept_elgar_composing_compose: "compose"
 concept_elgar_composing_desc: "A [concept_elgar_composer] who #b composes#! receives 5 [concept_artists_experience] per year and adds 5 [concept_elgar_musical_tradition] to the country. In addition, he creates a random number of compositions each year. A #b Composer#! with special skills such as Conductor, Virtuoso, Innovative or Meticulous creates one additional composition per year. The number of compositions is decisive for success in later [Concept('concept_elgar_musical_tour','$concept_elgar_musical_tour_tours$')]. A #b Composer#! composes until the action is canceled in the Journal Entry. A #b Composer#! who composes costs the country a small annual maintenance fee."
 concept_elgar_conducting: "Conducting"
 concept_elgar_conducting_lower_case: "conducting"
 concept_elgar_conducting_conduct: "conduct"
 concept_elgar_conducting_desc: "The [concept_elgar_composer] will focus on #b conducting#! for 24 months and organize a concert season. This will improve the music output of a random [concept_elgar_opera] for 5 to 10 years, give your nation a small boost to [concept_elgar_musical_tradition] and give your #b Composer#! a medium boost to his [concept_artists_experience]. If your #b Composer#! is not yet a Conductor, he can gain the [concept_character_trait] at the end of the season. You will have to pay the #b Composer#! while he is #b conducting#!."
 concept_elgar_musical_tour: "Concert Tour"
 concept_elgar_musical_tours: "Concert Tours"
 concept_elgar_musical_tour_tour: "Tour"
 concept_elgar_musical_tour_tours: "Tours"
 concept_elgar_musical_tour_desc: "The [concept_elgar_composer] can go on a #b Concert Tour#! abroad for 30 months. #b Concert Tours#! increase the [concept_prestige] of the #b Composer's#! nation. Additionally the #b Composer#! gains a boost of [concept_artists_experience] at the end of the #b Tour#! that depends on the number of Compositions of the #b Composer#! as well as his traits.\n#b Composers#! with less than 20 Compositions should probably not go on #b Tours#! and #b Composers#! with the #b Reserved#! Trait can not go on #b Tours#!."
 concept_elgar_musical_masterwork: "Musical Masterwork"
 concept_elgar_musical_masterworks: "Musical Masterworks"
 concept_elgar_musical_masterwork_masterwork: "Masterwork"
 concept_elgar_musical_masterwork_masterworks: "Masterworks"
 concept_elgar_musical_masterwork_of_music: "Masterwork of Music"
 concept_elgar_musical_masterworks_of_music: "Masterworks of Music"
 concept_elgar_musical_masterwork_desc: "The [concept_elgar_composer] can start composing a #b Masterwork#! which will take multiple years. The more [concept_artists_experience] a #b Composer#! has, the faster he will finish. Once the #b Masterwork#! is composed, the #b Composer#! will gain 50 [concept_artists_experience] and the country will gain up to 150 [concept_elgar_musical_tradition] depending on its [concept_rank].\nA #b Composer#! can create a maximum of 3 #b Masterworks#! and will need financial support from his country while working on it."
 concept_elgar_composer_exhaustion: "Composer Exhaustion"
 concept_elgar_composer_exhaustion_exhausted: "exhausted"
 concept_elgar_composer_exhaustion_desc: "Once a [concept_elgar_composer] finished [Concept('concept_elgar_composing','$concept_elgar_composing_lower_case$')], [Concept('concept_elgar_conducting','$concept_elgar_conducting_lower_case$')], composing [Concept('concept_elgar_musical_masterwork','$concept_elgar_musical_masterwork_masterworks$')] or a [Concept('concept_elgar_musical_tour','$concept_elgar_musical_tours$')], he will be #b exhausted#! from the work. An #b exhausted Composer#! will not be able to work for some time. The older the #b Composer#!, the longer it takes get rid of the #b Exhaustion#!."
 concept_manzoni_writer: "#PURPLE #b Writer#!#!"
 concept_manzoni_writers: "#PURPLE #b Writers#!#!"
 concept_klimt_painter: "#PURPLE #b Painter#!#!"
 concept_pm_artists_academy_conservatory: "#b #PURPLE Conservatory#!#!"
 concept_pm_artists_academy_conservatory_desc: "A Conservatory will specializes the Arts Academy for Music. If you have a Conservatory, you will be able to promote [Concept('concept_elgar_composer','$concept_elgar_composers$')]. You will get a #n negative throughput modifier#! for the Art Academy as well as a #n negative effect#! on your [concept_artistic_progress] when you change this production method."
 concept_pm_artists_academy_salon: "#b #PURPLE Literary Salon#!#!"
 concept_pm_artists_academy_salon_desc: "A Literary Salon will specializes the Arts Academy for Literature. If you have a Literature Salon, you will be able to promote [Concept('concept_manzoni_writer','$concept_manzoni_writers$')]. You will get a #n negative throughput modifier#! for the Art Academy as well as a #n negative effect#! on your [concept_artistic_progress] when you change this production method."
 concept_pm_artists_academy_studio: "#b #PURPLE Art Studio#!#!"
 concept_pm_artists_academy_studio_desc: "An Art Studio will specializes the Arts Academy for Painting. If you have a Art Studio, you will be able to promote [Concept('concept_klimt_painter','$concept_klimt_painters$')]. You will get a #n negative throughput modifier#! for the Art Academy as well as a #n negative effect#! on your [concept_artistic_progress] when you change this production method."
 concept_pm_artists_academy_specialization: "Arts Academy Focus"
 concept_pm_artists_academy_specialization_desc: "Every Arts Academy can be specialized by changing its production method.\nAn Arts Academy with a [concept_pm_artists_academy_conservatory] will allow you to promote [Concept('concept_elgar_composer','$concept_elgar_composers$')].\nAn Arts Academy with a [concept_pm_artists_academy_salon] will allow you to promote [Concept('concept_manzoni_writer','$concept_manzoni_writers$')].\nAn Arts Academy with an [concept_pm_artists_academy_studio] will allow you to promote [Concept('concept_klimt_painter','$concept_klimt_painters$')].\nChanging the Specialization will have a #n short negative effect#! for the building and your [concept_artistic_progress]."
 concept_artists_artist: "Artist"
 concept_artists_artists: "Artists"
 concept_artistic_progress: "Artistic Progress"
 concept_artistic_progress_desc: "By acquiring 1000 #b Artistic Progress#! you can gain a new [concept_artists_artist]. To even have access to #b Artistic Progress#!, you must either have an #b Arts Academy#! or an #b Opera#!.\nYour #b Artistic Progress#! gain is influenced by various factors. The more [concept_literacy] you have, the faster you gain #b Artistic Progress#! for example. You can gain detailed information on all the factors influencing Artistic Progress from the Toolbar of the Artistic Progress Bar in the Arts Window."
 concept_artists_experience: "Reputation"
 concept_artists_experience_desc: "Every [concept_artists_artist] has a #b Reputation#!. The Reputation represents how well regarded the artist is. Artists start with a small amount of Reputation and can gain additional Reputation by working in their field. Artists that gained a Reputation of 500, will become a #b Great Artists#! and get the corresponding [concept_character_trait]."
 concept_manzoni_great_writer: "Great Writer"
 concept_manzoni_local_writer: "Local Writer"
 concept_artists_center_of_arts: "Center of Arts"
 concept_artists_centers_of_arts: "Centers of Arts"
 concept_artists_center_of_classicism: "Center of Classicism"
 concept_artists_center_of_romanticism: "Center of Romanticism"
 concept_artists_center_of_realism: "Center of Realism"
 concept_artists_center_of_impressionism: "Center of Impressionism"
 concept_artists_center_of_expressionism: "Center of Expressionism"
 concept_artists_center_of_art_nouveau: "Center of Art Nouveau"
 concept_klimt_great_painter: "#PURPLE #b Great Painter#!#!"
 concept_klimt_great_painters: "#PURPLE #b Great Painters#!#!"
 concept_klimt_great_painter_desc: "#b Great Painters#! are [Concept('concept_klimt_painter','$concept_klimt_painters$')] that will be known for eternity. #b Painters#! reaching 500 [concept_artists_experience], will become #b Great Painters#!. This will greatly increase their efficiency and let your nation gain way more [concept_klimt_painting_tradition]."
 concept_klimt_independent_painter: "Independent Painter"
 concept_klimt_independent_painters: "Independent Painters"
 concept_klimt_painter_trip: "Painter's Educational Journey"
 concept_klimt_painter_trip_journeys: "Journeys"
 concept_elgar_music_desc: "#b Music Culture#! is one of the main features of [concept_morgenroete]. During the 19th and 20th Century, Music was important as a mean to entertain the populace and to show a nations greatness.\n\nTo access most of the Music content in #r Morgenröte#! you will need to build an [concept_elgar_opera]. The #b Opera#! will produce Music but needs Instruments to operate. Apart from producing #b Music #! for your populace to consume, #b Operas#! will slowly add [concept_elgar_musical_tradition] to your Country.\n\n#b Musical Tradition#! reflects a nation's musical achievements and traditions. The amount of #b Musical Tradition#! gives you a prestige bonus and allows you to choose a path for your nation's art to go forward. You can either go the route of [concept_elgar_impressionism], [concept_elgar_expressionism] or [concept_elgar_art_nouveau]. Each one of these Art Styles has another focus.\n\nA good way to gain even more #b Musical Tradition#! is by getting a [concept_elgar_composer]. A composer will be able to [Concept('concept_elgar_composing','$concept_elgar_composing_compose$')], [Concept('concept_elgar_conducting','$concept_elgar_conducting_conduct$')], go on [Concept('concept_elgar_musical_tour','$concept_elgar_musical_tours$')] and even create [Concept('concept_elgar_musical_masterwork','$concept_elgar_musical_masterworks_of_music$')]. These actions will either improve the #b Composer's#! [concept_artists_experience] or improve your nations #b Musical Tradition#!."
 concept_artists_center_of_arts_desc: "A #b Center of Arts#! is a center of an [concept_artists_art_style] that gets created in a [concept_state_region] once an #b Art Style#! gets invented. There is only one #b Center of Arts#! per #b Art Style#!.\n#b Center of Arts#! are especially important for [Concept('concept_klimt_painter','$concept_klimt_painters$')] that can take [concept_klimt_painter_trip] to study the #b Art Style#! there. Apart from that some #b Center of Arts#! offer unique events that will happen there. Some for example allow you to win [Concept('concept_klimt_art_prize','$concept_klimt_art_prizes$')]."
 concept_klimt_painting_culture: "Painting Culture"
 concept_klimt_painting_culture_desc: "#b Painting Culture#! is one of the main features of [concept_morgenroete]. During the 19th and 20th Century, Painting developed rapidly resulting in various new [Concept('concept_artists_art_style','$concept_artists_art_styles$')] that brought a lot of progress to individuals and countries.\n\nTo access most of the Painting content in #r Morgenröte#! you will need to build an #b Arts Academy#!. #b Arts Academies#! allow you to start gaining [concept_klimt_painting_tradition] and to recruit new [Concept('concept_klimt_painter','$concept_klimt_painters$')]\n\n#b Painters#! will create paintings and #b Masterworks#! for your country and give you a big amount of #b Painting Tradition#!. As there are different [Concept('concept_artists_art_style','$concept_artists_art_styles$')] for #b Painters#! to focus on, you can let them study additional #b Art Styles#! on a [concept_klimt_painter_trip]. Once they turn 40 years old, #b Painters#! will specialize in one of their #b Art Styles#! and focus on creating paintings in that #b Art Style#!."
 concept_artists_art_style: "Art Style"
 concept_artists_art_styles: "Art Styles"
 concept_artists_art_style_style: "Style"
 concept_artists_art_style_desc: "An #b Art Style#! is a specific focus of Art. Some #b Art Styles#! are there from the beginning like #b Classicism#! and #b Romanticism#!. The others, #b Realism#!, #b Irrationalism#!, [concept_elgar_impressionism], [concept_elgar_expressionism] and [concept_elgar_art_nouveau], only appear later after certain conditions are met. Every #b Art Style#! has a corresponding [concept_artists_center_of_arts] in the [concept_state_region] where it started."
 concept_klimt_painter_desc: "#PURPLE #b Painters#!#! are men and women that create paintings and other pieces of art. #b Painters#! are special character types that you can gain either from events, from gaining enough [concept_artistic_progress] to create one in your nation or by offering a position to a [concept_klimt_independent_painter].\n#b Painters#! will immediately start to paint and create a number of paintings each year depending on their [Concept('concept_character_trait','$concept_character_traits$')]. Sometimes they can even create a #b Masterwork#! that will give you even more [concept_klimt_painting_tradition].\n#b Painters#! can study different [Concept('concept_artists_art_style','$concept_artists_art_styles$')] on [Concept('concept_klimt_painter_trip','$concept_klimt_painter_trip_journeys$')]. Each #b Painter#! will specialize in an #b Art Style#! once they are 40 years old which will allow them to paint #b Masterworks#! of a certain Style."
 concept_klimt_independent_painter_desc: "[Concept('concept_klimt_painter','$concept_klimt_painters$')] that are not hired by a country are #b Independent Painters#!. #b Independent Painters#! can be hired by countries that have a [Concept('concept_primary_cultures','$concept_primary_culture$')] that shares a [concept_cultural_trait] with the culture of the #b Painter#!.\n#b Independent Painters#! have various requirements for their host country. You will need #b Arts Academies#!, certain [Concept('concept_technology', '$concept_technologies$')] or [concept_klimt_painting_tradition] depending on the #b Painter's#! [concept_artists_experience]. Additionally you will have to pay them a sum of money that depends on their #b Renown#! as well as your country's financial capabilities."
 concept_klimt_painter_trip_desc: "A [concept_klimt_painter] can learn new [Concept('concept_artists_art_style','$concept_artists_art_styles$')] on an #b Educational Journey#! to one of the [Concept('concept_artists_center_of_arts','$concept_artists_centers_of_arts$')].\nOn such a #b Trip#! a painter can gain positive and negative [Concept('concept_character_trait','$concept_character_traits$')] that will influence their work and the number of paintings they create. Each #b Center of Arts#! has slightly different events and will give the #b Painter#! a unique #b Trait#! at the end that can later become the #b Painter's#! Specialization."
 concept_klimt_art_prize: "Art Prize"
 concept_klimt_art_prizes: "Art Prizes"
 concept_klimt_art_prize_desc: "From time to time, artistic competitions are held in which prizes are awarded - which promote an artist's reputation. Nations that have a [concept_artists_center_of_arts] for Irrationalism or [concept_elgar_impressionism] choose the best musicians in a competition that takes place every five years. The owners of an [concept_klimt_art_gallery] or a #b Center of Art of Realism#! come to host a painting competition that takes place every five years. The country from which the winners come also receives Music or Painting Tradition. A special form of art competition is the Biennale, which every two years awards a comprehensive art prize to the country that has the artists with the highest reputation, which increases all cultural tradition values."
 concept_klimt_art_gallery: "Art Gallery"
 concept_klimt_art_gallery_desc: "The #b Art Gallery#! is a special building in a nation's capital that is available starting with #b Realism#!. It can only be built if the nation has a [concept_klimt_painter] with specialization. #b Painters#! with a specialization unlock the collection of their [Concept('concept_artists_art_style','$concept_artists_art_style_style$')] - that is, an artist with a specialization in the Romantic style unlocks a collection of Romanticism. In order to upgrade a collection to an excellent collection, a masterpiece of this kind is required, which must either be painted by a painter or acquired from abroad."
 concept_manzoni_writer_novelist: "Novelist"
 concept_manzoni_writer_desc: "A #b Writer#! is a special character that will write works of literature for your country. #b Writers#! usually start as [concept_manzoni_local_writer] and will write #b Publications#! and sometimes even [Concept('concept_manzoni_bestseller','$concept_manzoni_bestsellers$')]. A #b Bestseller#! will grant the #b Writer#! a big amount of [concept_artists_experience] and [concept_manzoni_literary_tradition] to your country. There is a chance to write a #b Bestseller#! every year, depending on how close the #b Writer's#! [concept_manzoni_genre] is to the [concept_manzoni_popular_taste].\n\nA well known #b Writer#! whose [concept_interest_group] is happy enough, can become your [concept_manzoni_national_writer]. A #b National Writer#! can gain [Concept('concept_manzoni_book_licence','$concept_manzoni_book_licences$')] or create a Newspaper Novel. If a #b Writer#! gains 500 #b Reputation#! they can become a [concept_manzoni_great_writer] and provide your country with even more #b Literary Tradition#!.\n\nBe careful, if #b Writers#! are unhappy with the political situation in a country, they can decide to become [Concept('concept_agitator', '$concept_agitators$')] or interfere in the political discourse."
 concept_manzoni_great_writer_desc: "A #b Great Writer#! is a [concept_manzoni_writer] known all over the world. A #b Writer#! can become a #b Great Writer#! once their [concept_artists_experience] reaches #V 500#!. If your #b Great Writer#! is your [concept_manzoni_national_writer] you will get a bonus to your yearly [concept_manzoni_literary_tradition] gain."
 concept_manzoni_local_writer_desc: "Nearly every [concept_manzoni_writer] starts as a #b Local Writer#!. Every country can have a maximum of 3 #b Local Writers#! that will create #b Publications#!, grant you [concept_manzoni_literary_tradition] if their [concept_manzoni_genre] matches the [concept_manzoni_popular_taste] and gain [concept_artists_experience].\nA #b Local Writer#! with a #b Reputation#! of 150 and whose [concept_interest_group] is not unhappy, can become a country's [concept_manzoni_national_writer] which will grant you more #b Literary Tradition#! and other additional advantages.\nBe aware that #b Local Writers#! unhappy with the current political situation can start to interfere in the political discourse or even become an [concept_agitator]"
 concept_manzoni_national_writer: "National Writer"
 concept_manzoni_national_writer_desc: "A #b National Writer#! is a type of [concept_manzoni_writer] that is considered to be the face of your country's literature. #b National Writers#! grant you a minimum of 1 and up to 5 [concept_manzoni_literary_tradition].\nYou can gain a #b National Writer#! by appointing one of your [Concept('concept_manzoni_local_writer','$concept_manzoni_local_writers$')]. To be able to appoint one of your #b Local Writers#! they must have at least #V 150#! [concept_artists_experience] and their [concept_interest_group] must have a positive [concept_approval].\n"
 concept_manzoni_bestseller: "Bestseller"
 concept_manzoni_bestsellers: "Bestsellers"
 concept_manzoni_bestseller_desc: "A #b Bestseller#! is a #b Publication#! by a [concept_manzoni_writer] that is selling very well, usually because the #b Writer's#! [concept_manzoni_genre] matches or is close to the current [concept_manzoni_popular_taste].\nEvery year there is a chance for a [concept_manzoni_national_writer] or [concept_manzoni_local_writer] to write a #b Bestseller#!. The first #b Bestseller#! will grant a big amount of [concept_manzoni_literary_tradition] and every #b Bestseller#! after the first one will grant the country a significant amount of #b Literary Tradition#!."
 concept_manzoni_genre: "Genre"
 concept_manzoni_genres: "Genres"
 concept_manzoni_genre_desc: "Every [Concept('concept_manzoni_writer','$concept_manzoni_writer_novelist$')] has a specific #b Genre#! for their writing. The #b Genre#! gets assigned when the #b Writer#! gets created and depends on many factors.\n#b Writers#! will gain more [concept_artists_experience] and write more [Concept('concept_manzoni_bestseller','$concept_manzoni_bestsellers$')] when their #b Genre#! matches or is close to the [concept_manzoni_popular_taste] of the country."
 concept_manzoni_popular_taste: "Popular Taste"
 concept_manzoni_popular_taste_audience: "Audience Taste"
 concept_manzoni_popular_tastes_audience: "Audience Tastes"
 concept_manzoni_popular_taste_desc: "Every nation's population has a #b Taste#! for a specific [concept_manzoni_genre]. About every 10 years this #b Taste#! will change depending on political, social and cultural changes in the country itself.\n[Concept('concept_manzoni_writer','$concept_manzoni_writers$')] who have a #b Genre#! matching the #b Taste#! or close to it will gain more [concept_artists_experience] and write more [Concept('concept_manzoni_bestseller','$concept_manzoni_bestsellers$')].\n\n#V Close Tastes:#!\n- #b $manzoni_taste_adventure_var_loc$#!: $manzoni_genre_science_fiction$, $manzoni_genre_juvenile$, $manzoni_genre_crime_mystery$\n- #b $manzoni_taste_crime_var_loc$#!: $manzoni_genre_science_fiction$, $manzoni_genre_adventure$, $manzoni_genre_romance$\n- #b $manzoni_taste_devotional_var_loc$#!: $manzoni_genre_juvenile$, $manzoni_genre_romance$, $manzoni_genre_adventure$\n- #b $manzoni_taste_juvenile_var_loc$#!: $manzoni_genre_adventure$, $manzoni_genre_devout$, $manzoni_genre_crime_mystery$\n- #b $manzoni_taste_literary_var_loc$#!: $manzoni_genre_social_critic$, $manzoni_genre_science_fiction$, $manzoni_genre_romance$\n- #b $manzoni_taste_romance_var_loc$#!: $manzoni_genre_devout$, $manzoni_genre_juvenile$, $manzoni_genre_literary_fiction$\n- #b $manzoni_taste_science_var_loc$#!: $manzoni_genre_adventure$, $manzoni_genre_social_critic$, $manzoni_genre_literary_fiction$\n- #b $manzoni_taste_social_var_loc$#!: $manzoni_genre_literary_fiction$, $manzoni_genre_juvenile$, $manzoni_genre_crime_mystery$"
 concept_manzoni_book_licence: "Book Licence"
 concept_manzoni_book_licences: "Book Licences"
 concept_manzoni_book_licence_desc: "Foreign publishers can get contracts with a [concept_manzoni_national_writer] and offer his books as translations in their own market. This happens when a writer meets the [Concept('concept_manzoni_popular_taste','$concept_manzoni_popular_tastes_audience$')] abroad. If an author gets at least five book licenses, his books are considered world literature. He can then go on a reading tour."
 concept_manzoni_local_writers: "Local Writers"
 concept_manzoni_library: "National Library"
 concept_manzoni_library_desc: "Your #b National Library#! will automatically set up Book Collections (in form of a [concept_production_method]) if you have enough [concept_manzoni_publications]. The first Book Collection will be created for 1.000 or more publications. From there better Collections are possible with 2.500 (Tiny Book Collection), 5.000 (Small Book Collection), 10.000 (Medium Book Collection), 25.000 (Large Book Collection), 50.000 (Excellent Book Collection) and 100.000 (Great Book Collection)."
 concept_manzoni_publications: "Publications"
 concept_manzoni_publications_desc: "#b Publications#! include all newly published book titles, newspapers, essays and other similar written products in a nation. They are not consistent with @manzoni_prints! $manzoni_prints$ circulating as commodities. Publications can also appear independently of the publishing industry, for example through the in-house printing presses of government buildings or universities. Academics and private individuals also produce publications depending on their literacy level. However, the publishing industry accounts for the lion's share, and the decisive factor is whether a modern production method is used or not. A large number of publications is fundamental to the expansion of a [concept_manzoni_library]."
 concept_curtiss_tourism: "Tourism"
 concept_curtiss_tourism_desc: "Tourism provides a culturally superior nation with additional income. Unique monuments, museums and art galleries, archaeological sites, centers of art as well as high values in the various cultural traditions are factors that make a nation an attractive tourist destination. Laws that increase freedom of movement and economic activity also contribute to higher tourism income. The infrastructure also plays a crucial role - after all, remote places cannot be reached. An airport in particular revolutionizes tourism and provides a significant increase in revenue."
 concept_curtiss_private_airline: "Private Airline"
 concept_mendelejew_chemist: "#b #ORANGE 化学者#!#!"
 concept_manzoni_literature: "Literary Culture"
 concept_manzoni_literature_desc: "#b Literary Culture#! is one of the main features of [concept_morgenroete]. Print culture and newspaper culture in particular experienced significant upheavals in the 19th and 20th centuries. The mass of printed products and everyday use is represented by the printing industry. The cultural value of the literature produced is reflected in the [concept_manzoni_literary_tradition]. The latter depends largely on the [Concept('concept_manzoni_writer','$concept_manzoni_writers$')] of a country, and there are [Concept('concept_manzoni_local_writer','$concept_manzoni_national_writers$')] and [Concept('concept_manzoni_national_writer','$concept_manzoni_local_writers$')]. Whether they live in the shadows or become celebrated authors depends on the [concept_manzoni_popular_taste]."
 concept_morgenroete_desc: "#r Morgenröte - Dawn of Flavor #! is a mod created to broaden the cultural and scientific aspects of Victoria 3. It features content for various aspects of the Victorian Age:\n\n#V Science:#!\n #indent_newline:3 • Tesla: [concept_tesla_engineering]#!\n #indent_newline:3 • Mendeleev: [concept_mendelejew_chemistry]#!\n #indent_newline:3 • Verrier: [concept_verrier_astronomy]#!\n #indent_newline:3 • Agassiz: [concept_agassiz_geology]#!\n #indent_newline:3 • Dubois: [Concept('concept_dubois_natural_history','$concept_dubois_natural_history_paleontology$')]#!\n #indent_newline:3 • Ito: [concept_dubois_natural_history]#!\n #indent_newline:3 • Theiler: [concept_theiler_biology]#!\n #indent_newline:3 • Panum: [concept_panum_medicine]#!\n #indent_newline:3 • Lepsius: [concept_lepsius_archaeology]#!\n #indent_newline:3 • Andersson: [concept_andersson_anthropology]#!\n\n#V Art:#!\n#indent_newline:3 • Gaudí: [concept_elgar_architecture]#!\n#indent_newline:3 • Elgar: [concept_elgar_music]#!\n#indent_newline:3 • Manzoni: [concept_manzoni_literature]#!\n#indent_newline:3 • Klimt: [concept_klimt_painting_culture]#!\n\n#V Sports:#!\n#indent_newline:3 • Douglas: [concept_douglas_mountaineering]#!\n#indent_newline:3 • Vikelas: [concept_vikelas_sports] and [concept_vikelas_car_racing]#!\n#indent_newline:3 • Curtiss: [concept_curtiss_aviation]#!"
 concept_agassiz_mineral: "鉱物"
 concept_agassiz_minerals: "鉱物"
 concept_agassiz_mineral_desc: "鉱物は、工場で使われている既知の資源に該当しない、すべての岩石の総称です。#b 地質学#!技術の研究が完了すると、毎年一定数の鉱物を自動的に獲得できます。[Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')]がいれば、さらに鉱物を発見することができます。鉱物の採掘地は山、砂漠、州補正、北極の地形、鉱山（石炭、鉄、硫黄など）、それに地質学コンテンツで追加された[Concept('concept_dubois_formation','$concept_dubois_formations$')]や火山などの州補正として表現されます。砂漠と北極の地形からは少量しか採れませんが、巨大地層や火山には豊富な鉱脈が眠っています。より貴重な鉱脈が[Concept('concept_agassiz_rare_mineral','$concept_agassiz_rare_minerals$')]です。"
 concept_agassiz_rare_mineral: "希少鉱物"
 concept_agassiz_rare_minerals: "希少鉱物"
 concept_agassiz_rare_mineral_desc: "[Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')]は[Concept('concept_dubois_pacific_expedition','$concept_dubois_pacific_expeditions$')]、[concept_douglas_mountaineering]遠征、[concept_agassiz_volcano]遠征、あるいは鉱脈調査中に希少鉱物を発見することがあります。通常の[Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')]と違って、ごくわずかな量しか発見できません。希少鉱物は鉱物棚の作成に使われます。"
 concept_agassiz_geologist: "#b #GREEN 地質学者#!#!"
 concept_agassiz_geologists: "#b #GREEN 地質学者#!#!"
 concept_agassiz_geologist_desc: "#b #GREEN Geologists#!#! are [Concept('concept_academics_academic','$concept_academics_academics$')] who primarily study rocks and earth history. They locate [Concept('concept_dubois_formation','$concept_dubois_formations$')] and [Concept('concept_curie_uranium','$concept_curie_uranium$')] deposits, which makes them irreplaceable colleagues for [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')] and [Concept('concept_curie_physicist','$concept_curie_physicists$')]. During their expeditions, they may find additional [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')] that a [concept_mendelejew_chemist] can use to discover or isolate [Concept('concept_mendelejew_element','$concept_mendelejew_elements$')]. They can find new deposits of raw materials. They are also active as volcanologists and can go on expeditions to local [Concept('concept_agassiz_volcano','$concept_agassiz_volcanoes$')] to research them in more detail. Together with [Concept('concept_tesla_engineer','$concept_tesla_engineers$')], they can develop new devices, such as seismographs, to learn more about the Earth's interior. Geologists can take part in [Concept('concept_dubois_pacific_expedition','$concept_dubois_pacific_expeditions$')] and [concept_douglas_mountaineering] expeditions."
 concept_agassiz_volcano: "火山"
 concept_agassiz_volcanoes: "火山"
 concept_curie_physicist: "#b #ORANGE 物理学者#!#!"
 concept_curie_physicists: "#b #ORANGE 物理学者#!#!"
 concept_curie_physicist_desc: "#n 今後のMorgenröteの更新をお待ちください！#!"
 concept_curie_uranium: "ウラン鉱石"
 concept_curie_uranium_desc: "Uranium is an extremely rare material that can only be found in a few selected, historical provinces by [Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')]. Modern Physics must have been researched for this. At first glance, uranium is a secondary ore that is only used in ceramic production. However, it will be needed later, especially in the [concept_verrier_observatory]. Only if the best physical and chemical production methods are supplied with uranium they can fulfill their purpose, whether in the field of nuclear physics or in the research of previously unknown elements. Without uranium, all scientific activities in the field of radioactivity are simply impossible. It is therefore particularly interesting for [Concept('concept_mendelejew_chemist','$concept_mendelejew_chemists$')] and [Concept('concept_curie_physicist','$concept_curie_physicists$')] in the final phase of Victoria 3."
 concept_mendelejew_chemistry: "化学"
 concept_mendelejew_chemistry_desc: "#b Chemistry#! is one of the main features of [concept_morgenroete]. Starting in the 18th Century, #b Chemistry#! rapidly developed into a modern science. Suddenly many new elements were discovered and chemical processes were invented. The 19th and 20th century saw even more discoveries in Chemistry, ranging from new elements to the invention of dynamite or the Haber-Bosch-Process.\n\nIn #b Morgenröte#! #b Chemistry#! will be conducted by [Concept('concept_mendelejew_chemist','$concept_mendelejew_chemists$')] who will be able to focus on different tasks.\nOne focus is the improvement of your countries #b $building_chemical_plant$#!, #b $building_explosives_factory$#! or #b $building_synthetics_plant$#!, which will make those [Concept('concept_building', '$concept_buildings$')] more efficient.\nIf you are looking for a more prestigious task, you can let your #b Chemist#! theorize, discover or isolate [Concept('concept_mendelejew_element','$concept_mendelejew_elements$')]. Each Element will add a little bit of [concept_prestige] depending on whether you theorized, discovered or isolated it.\nLater in the game the #b Chemist#! will also be able to invent #b Synthetic Oil#! and #b Synthetic Rubber#!. This will unlock the #b $building_mendelejew_hydrogenation_plants$#! or the #b $building_mendelejew_synthetic_rubber_factory$#!."
 concept_mendelejew_chemists: "#b #ORANGE 化学者#!#!"
 concept_mendelejew_chemist_desc: "#b #ORANGE 化学者#!#!は、[Concept('concept_mendelejew_element','$concept_mendelejew_elements$')]の理論化、発見、単離を行う[Concept('concept_academics_academic','$concept_academics_academics$')]です。\n#b #ORANGE 化学者#!#!は、#b 元素#!研究や会議への参加、肥料・爆薬・合成物質の改良などで[concept_academics_experience]を獲得します。化学コンテンツでは周期表や合成燃料を発明することも可能で、特に合成燃料は石油がない国にとっては貴重な手段です。また何もしなくても1年ごとに#b 経験値#!を自動で獲得できます。経験値が貯まると、#b #ORANGE 化学者#!#!特性がレベルアップします。化学者の専門分野（理論、分析、観察）は出現時に決まり、イベントでも変化することがあります。"
 concept_mendelejew_element: "化学元素"
 concept_mendelejew_element_no_chemical: "元素"
 concept_mendelejew_elements: "化学元素"
 concept_mendelejew_element_desc: "かつて古代では、この世界は火・土・水・風の四大元素から成り立っていると考えられていました。錬金術から化学が解放されるとともに、化学元素の科学的分析が始まりました。19世紀、まだこのプロセスは道半ばでした。\n\n[Concept('concept_mendelejew_chemist','$concept_mendelejew_chemists$')]は元素の理論化、発見、単離をひとつずつ達成し、元素研究を進めることができます。元素にはまず番号が割り当てられ、単離してその存在が完全に認められると元素名が名付けられる。元素研究を進めると科学進捗ポイント、それに化学者の[concept_academics_experience]が獲得できます。\nゲーム開始時点では、すべての元素を理論化・発見・単離することはできません。\nまずは[concept_verrier_observatory]の化学研究所を最新の方式に切り替える必要があり、場合によっては現代物理学研究所を前提条件とする元素もあります。また化学元素の発見・単離には、[Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')]が必要です。生産方式のほかにも、化学者の経験値やキャラクター特性は研究期間に大きな影響を与えます。\n\n元素の研究が進んだら、周期表の発明や国際化学会議の開催も必要です。"
 concept_verrier_meteorite: "隕石"
 concept_verrier_meteorites: "隕石"
 concept_manzoni_national_writers: "National Writers"
 concept_verrier_astronomy_desc: "#b 天文学#!は、[concept_morgenroete]でフィーチャーされる大きな要素のひとつです。\n\n#b 天文学#!コンテンツを解禁するには、まず[concept_verrier_observatory]か[concept_verrier_astronomer]が必要です。\n\n天文台を建設すると、自動的に[Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]を発見してくれます。\n\n[concept_verrier_astronomer]がいれば、新しい惑星や[Concept('concept_verrier_satellite','$concept_verrier_satellites$')]、[Concept('concept_verrier_comet','$concept_verrier_comets$')]を発見したり、[Concept('concept_verrier_moon_photo','$concept_verrier_moon_photos$')]を撮影することもできます。\nまれに[concept_agassiz_geologist]が[Concept('concept_verrier_meteorite','$concept_verrier_meteorites$')]を発見することもあります。隕石は#b 天文学者#!と[Concept('concept_mendelejew_chemist','$concept_mendelejew_chemists$')]によって分析されます。\n\n天文学での発見を重ねると[concept_verrier_astronomical_prestige]を獲得し、[concept_prestige]も上昇します。$verrier_astronomical_prestige_modifier$[concept_modifier]を確認すれば、あなたの#b 天文学的威信#!が表示されます。"
 concept_verrier_observatory_desc: "An #b Observatory#! is the backbone of a country's [concept_verrier_astronomy] and [concept_mendelejew_chemistry]. From there [Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')] can discover Planets, [Concept('concept_verrier_satellite','$concept_verrier_satellites$')], [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')], [Concept('concept_verrier_comet','$concept_verrier_comets$')] and take [Concept('concept_verrier_moon_photo','$concept_verrier_moon_photos$')].\nTo build an #b Observatory#!, you need to have a University and either the $verrier_astronomy_tech$ or $verrier_chemistry_tech$ [concept_technology] researched. Additionally an #b Observatory#! can only be built once and only in your capital."
 concept_verrier_astronomer_desc: "#b 天文学者#!は空を開拓し、[Concept('concept_verrier_satellite','$concept_verrier_satellites$')]や[Concept('concept_verrier_comet','$concept_verrier_comets$')]、[Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]を発見する科学者です。\n#b 天文学者#!は#b 天体#!を発見したり、会議に出席することで[concept_academics_experience]を獲得します。また毎年自動的に#b 経験値#!が上昇します。経験値が増えると、#b 天文学者#!の特性がレベルアップします。\n\n#b 天文学者#!は新しい#b 衛星#!の発見や、#b 月面写真の撮影#!に注力することもできる。ただしその場合は発見できる#b 天体#!の数は減ります。"
 concept_verrier_astronomical_prestige: "天文学的威信"
 concept_verrier_astronomical_prestige_desc: "#b 天文学的威信#!は、天文学で獲得できる[concept_prestige]の総量です。#b 天文学的威信#!は、さまざまな方法で獲得できます\n- 新しい惑星を発見すると、発見の難易度に応じて最低#V 15#!、最大#V 100#!の威信\n- [concept_verrier_satellite]を発見すると、10の威信\n- [Concept('concept_verrier_moon_photo','$concept_verrier_moon_map$')]を達成すると、#V 25#!の威信\n- 大彗星から10の威信\n- [concept_verrier_meteorite]ごとに#V 1#!の威信\n- #V 100#![Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]ごとに#V 1#!の威信"
 concept_verrier_astronomical_object_desc: "#b 天体#!は、あなたが発見した小惑星や星の総称です。天体の発見には[concept_verrier_observatory]が必要です。天文学技術の研究を進めれば、より多くの天体を発見できます。また[concept_verrier_astronomer]がいれば、さらに多くの#b 天体#!を発見できます。\n多くの#b 天体#!を発見すれば、新たな惑星を発見したり、天体物理学技術を発明することができます。"
 concept_verrier_moon_map: "月面図"
 concept_verrier_moon_photo_desc: "[concept_verrier_observatory]が存在し、写真機技術を研究が完了すると、[concept_verrier_astronomer]に月面写真の撮影を命じることができるようになります。#b 天体学者#!が発見する[Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]の数は減りますが、代わりに毎年#b 月面写真#!を獲得できるようになります。\n十分な数の#b 月面写真#!が集まったら、正確な月面地図を作成しましょう。完成すれば、[concept_verrier_astronomical_prestige]ボーナスを得ることができます。"
 concept_verrier_satellite: "衛星"
 concept_verrier_satellites: "衛星"
 concept_verrier_satellite_desc: "#b 衛星#!は、惑星を周回する[Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]です。惑星地球の月のように、一部の#b 衛星#!はすでに知られていますが、[concept_verrier_astronomer]はもっと多くの衛星を見つけることができます。\nあなたの国が#b 衛星#!を発見すると、少量の[concept_verrier_astronomical_prestige]を獲得します。"
 concept_verrier_meteorite_desc: "隕石は、宇宙からやってきた比較的小規模の天体が地球の大気圏を突破して地上に落ちたものです。ほかにも珍しいケースとして、流星群のあとに隕石のかけらが見つけることがあります。また数千年前に落下した隕石が、[Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')]によって砂漠や北極の地形などの険しい地形から発見される場合もあります。[Concept('concept_mendelejew_chemist','$concept_mendelejew_chemists$')]と[Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')]は隕石に強い興味をもち、隕石の解析も望んでいます。\n\nまた#b 隕石#!はあなたの[concept_agassiz_geological_score]を高め、[concept_agassiz_age_of_earth]のさらなる測定にも役立つでしょう。"
 concept_agassiz_volcano_desc: "#r Morgenröte#!では、新しい州補正として#b 火山#!が追加されます。Victoria 3のベースゲームと違って、火山噴火は戦略的重要地域ではなく州ごとに影響をあたえます。火山活動の規模は大きく拡大しましたが、毎回被害を出すこともなくなりました。火山のある国は#b $building_agassiz_volcano_observatory$#!を建設すれば、噴火を予知して被害の拡大を防いでくれます。さらに火山観測所は、火山遠征の出発地点にもなります。火山遠征では、[Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')]が[concept_agassiz_geological_knowledge]や[Concept('concept_agassiz_rare_mineral','$concept_agassiz_rare_minerals$')]、経験値、それに火山学者特性を獲得できます。"
 concept_agassiz_geological_knowledge: "地質学的知見"
 concept_agassiz_geological_knowledge_desc: "#b 地質学的知見#!は、その国の地球環境についての知識の総称です。手に入るチャンスは非常に少なく、おもに地質学分野で重要な功績を残した場合のみ獲得できます。[concept_agassiz_geological_score]を算出する際も、#b 地質学的知見#!はもっとも重視され、大きく評価される。"
 concept_agassiz_geological_score: "地質学スコア"
 concept_agassiz_geological_score_desc: "#b 地質学スコア#!は、その国の地質学分野における業績や知見をすべてまとめたものです。もっとも重視されるのは[concept_agassiz_geological_knowledge]ですが、その他にも[concept_agassiz_geologist]の経験値、[concept_agassiz_oceanographic_knowledge]、[Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')]・[Concept('concept_dubois_fossil','$concept_dubois_fossils$')]・[Concept('concept_dubois_specimen','$concept_dubois_specimens$')]の数、それに地質学関連の技術など、多くの要素が加算されます。地質学スコアは[concept_agassiz_age_of_earth]の再測定に必要です。"
 concept_agassiz_oceanographic_knowledge: "海洋学的知見"
 concept_agassiz_oceanographic_knowledge_desc: "#b 海洋学的知見#!は[concept_agassiz_geological_knowledge]の一種で、海流をはじめとする海についての知識や、地球物理学などを含めた海洋調査全般の総称です。#b 海洋学的知見#!は主に[Concept('concept_dubois_pacific_expedition','$concept_dubois_pacific_expeditions$')]で獲得できます。50#b 海洋学的知見#!で1[concept_agassiz_geological_knowledge]を獲得できます。"
 concept_agassiz_age_of_earth: "地球の年齢"
 concept_agassiz_age_of_earth_desc: "19世紀最大の難問のひとつが、#b 地球の年齢#!です。進化論の妥当性や地質学的イベントの順番など、地球の年齢問題は自然史に大きな影響をあたえました。地球の年齢を更新できるのは、[concept_agassiz_geologist]だけです。まずは最新の地球年齢を推定した国よりも、多くの[concept_agassiz_geological_score]を獲得します。条件を満たせば、地質学者は世界中の地質学者に研究結果を発表できます。毎回仮説が受け入れられるとは限りません。地質学者が若すぎたり経験不足だと、なかなか耳を貸してはもらえないでしょう。しかし長年新説が出ていなければ、諸外国もほんの少しは優しくしてくれるはずです。地質学者が地球の年齢を再計算できるのは、生涯に一度きりです。しかしこれは新説が認められた場合で、拒絶された場合はふたたびやる気を出して再度新説を世に訴えます。"
 concept_agassiz_geology: "地質学"
 concept_agassiz_geology_desc: "#b Geology#! is one of the main features of [concept_morgenroete]. Even before the beginning of the Victorian Age, geology had already experienced a significant boom, which is why it is available to many nations at the start of the game.\n\n[Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')] can be used in a variety of ways: they can find [Concept('concept_dubois_formation','$concept_dubois_formations$')], [Concept('concept_andersson_cave','$concept_andersson_caves$')] and [concept_curie_uranium] deposits during a geological search, go on [concept_agassiz_volcano] expeditions, determine [concept_agassiz_age_of_earth], find new ore and oil deposits or go on [concept_dubois_pacific_expedition] and [concept_douglas_mountaineering] expeditions useful as scientific companions. A [concept_agassiz_geological_score] evaluates the overall knowledge of a nation and is crucial in determining the age of the earth. [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')] and [Concept('concept_agassiz_rare_mineral','$concept_agassiz_rare_minerals$')] are an essential part of geology; The latter can be used to establish a mineral cabinet in the [concept_dubois_zoo]. A special geological facility is the #b $building_agassiz_volcano_observatory$#!, which carries out volcanological and seismic studies."
 concept_theiler_biologist: "#b #GREEN 生物学者#!#!"
 concept_theiler_biologists: "#b #GREEN 生物学者#!#!"
 concept_theiler_biologist_desc: "A Biologist is an [concept_academics_academic] who researches all aspects of life.\nIn [concept_morgenroete] the Biologist is mostly responsible for researching [Concept('concept_theiler_microorganism','$concept_theiler_microorganisms$')], improving your Agriculture, fighting [Concept('concept_theiler_pest','$concept_theiler_pests$')], and finding [Concept('concept_theiler_pathogen','$concept_theiler_pathogens$')] and [Concept('concept_theiler_vaccine','$concept_theiler_vaccines$')].\nBiologists gain [concept_academics_experience] passively or by finishing projects."
 concept_gaudi_architect: "#b #PURPLE Architect#!#!"
 concept_gaudi_architects: "#b #PURPLE Architects#!#!"
 concept_academics_university_specialization_desc: "Each University can be specialized by changing its production method.\nA university with a [concept_pm_academics_university_humanities] will allow you to focus your nations research on society innovation and allows to specifically recruit [Concept('concept_panum_physician','$concept_panum_physicians$')], [Concept('concept_lepsius_archaeologist','$concept_lepsius_archaeologists$')] and [Concept('concept_andersson_anthropologist','$concept_andersson_anthropologists$')].\nA university with a [concept_pm_academics_university_natural_history] will allow you to focus your nations research on society innovation and allows to specifically recruit [Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')], [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')], [Concept('concept_dubois_naturalist','$concept_dubois_naturalists$')] and [Concept('concept_theiler_biologist','$concept_theiler_biologists$')].\nA university with a [concept_pm_academics_university_mathematics] will allow you to focus your nations research on production and military innovation and allows to specifically recruit [Concept('concept_tesla_engineer','$concept_tesla_engineers$')], [Concept('concept_mendelejew_chemist','$concept_mendelejew_chemists$')] and [Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')].\nChanging the Specialization will lead to [concept_academics_academic_confusion] which has a #n short negative effect#! for the building and your [concept_academics_progress].\nSpecialized Universities can influence various projects as well. Universities with a $concept_pm_academics_university_mathematics$ focus will help with engineering projects for example."
 concept_pm_academics_university_humanities_desc: "A Humanities-Anthropological Focus specializes the University and allows a national focus on Society Research and to specifically recruit [Concept('concept_lepsius_archaeologist','$concept_lepsius_archaeologists$')] and [Concept('concept_andersson_anthropologist','$concept_andersson_anthropologists$')]. You will get a #n negative throughput modifier#! for the University as well as a #n negative effect#! on your [concept_academics_progress] when you change this production method.\nSpecializing your Universities with the Humanities-Anthropological Focus will give you a bonus on the success chance of Expeditions (maximum of +4 requiring 40 Levels of specialization) and improve the progress for some other projects."
 concept_pm_academics_university_natural_history_desc: "A Natural History Focus specializes the University and allowsa national focus on Society Research and to specifically recruit [Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')], [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')], [Concept('concept_dubois_naturalist','$concept_dubois_naturalists$')] and [Concept('concept_theiler_biologist','$concept_theiler_biologists$')]. You will get a #n negative throughput modifier#! for the University as well as a #n negative effect#! on your [concept_academics_progress] when you change this production method.\nSpecializing your Universities with the Natural History Focus will give you a bonus to various projects of your Natural scientists."
 concept_pm_academics_university_mathematics_desc: "数理工学専攻の大学は生産・軍事技術の研究にボーナスをもたらし、また[Concept('concept_tesla_engineer','$concept_tesla_engineers$')]や[Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')]を集中的に登用できるようになります。専門分野を変えると大学施設と#n 短期間の処理量低下デバフ#!が追加され、[concept_academics_progress]も#n 遅く#!なります。\n数理工学専攻の大学があると、[Concept('concept_tesla_engineer','$concept_tesla_engineers$')]や[Concept('concept_mendelejew_chemist','$concept_mendelejew_chemists$')]のさまざまなプロジェクトにボーナスが追加されます。"
 concept_panum_physician: "#b #BLUE 医師#!#!"
 concept_panum_physicians: "#b #BLUE 医師#!#!"
 concept_panum_physician_desc: "#b #BLUE 医師#!#!は[concept_panum_medicine]分野での治療や研究にあたる[Concept('concept_academics_academic','$concept_academics_academics$')]です。おもな仕事は[Concept('concept_panum_disease_description','$concept_panum_disease_descriptions$')]の手がかりとなる医学書の執筆や、[Concept('concept_panum_disease_treatment','$concept_panum_disease_treatments$')]の発見です。ほかにも医学研究や健康管理を向上させたり、他のキャラクターを治療することもできます。\n医師の[concept_academics_experience]は毎年の増加量に加えて、任務を達成することで獲得できます。多くの#b 経験値#!を獲得すると、医師の能力が上昇します。"
 concept_panum_medicine: "医学"
 concept_panum_medicine_desc: "Victoria 3の医学コンテンツは[concept_morgenroete]で大きく拡張されます。大きな要素のひとつが[Concept('concept_panum_disease','$concept_panum_diseases$')]です。コレラや結核、チフスといった数世紀にわたって人類に猛威を振るった感染症は、19世紀の科学発展によってとうとう制御できるようになりました。[concept_morgenroete]において、感染症はデバフイベントとして発生します。そのため[concept_panum_disease_treatment]を解明して病気を封じ込めるのが今まで以上に重要になります。医学コンテンツの中心となるのは、人文・人類学系科学者の[concept_panum_physician]です。医師は感染症の正体を解明し、その治療法を見つけることができます。治療法を解明するには、通常[concept_panum_disease_description]と特定の技術が前提条件になります。医師は医療系技術の研究や、病院を通じた衛生管理体制の拡充、さらに新しい医療技術の導入やキャラクターの治療などを行うことができます。医学会議を開催すれば、医療知識を世界中に広めることもできます。また瘴気説から[concept_panum_germ_theory]への転換も、医学の近代化にとって重要な一歩です。医学の発展を主導する国は、それだけ[concept_panum_medical_prestige]も高くなります。"
 concept_panum_disease: "病気"
 concept_panum_diseases: "病気"
 concept_panum_disease_desc: "The term disease usually refers to the epidemic diseases that can affect a nation every few years. A [concept_panum_physician] can counteract them by making [Concept('concept_panum_disease_description','$concept_panum_disease_descriptions$')] and providing [Concept('concept_panum_disease_treatment','$concept_panum_disease_treatments$')] Epidemic diseases usually do not occur at the same time and it takes some time for epidemic diseases to break out again. Depending on the type, epidemic diseases can have a devastating effect and spread across several states. There are various [concept_panum_disease_prevention] methods to delay the onset of such a disease or to mitigate its effects. The triggers for an illness can be very different. Yellow fever only occurs in tropical regions and cholera and tuberculosis require a minimum of urbanization to have an effect. A state's standard of living and level of devestation also play a role.\n\nIn addition to these particularly feared epidemic diseases, there are also everyday diseases that a physician can randomly examine during medical research. Such diseases include rickets, pellagra and syphilis.\n\nDiseases are:\n #indent_newline:3 • [GetHarvestConditionType('panum_cholera_condition').GetName]#!\n #indent_newline:3 • [GetHarvestConditionType('panum_tuberculosis_condition').GetName]#!\n #indent_newline:3 • [GetHarvestConditionType('panum_smallpox_condition').GetName]#!\n #indent_newline:3 • [GetHarvestConditionType('panum_typhus_condition').GetName]#!\n #indent_newline:3 • [GetHarvestConditionType('panum_yellow_fever_condition').GetName]#!\n #indent_newline:3 • [GetHarvestConditionType('panum_measles_condition').GetName]#!\n #indent_newline:3 • [GetHarvestConditionType('panum_scarlet_condition').GetName]#!\n #indent_newline:3 • [GetHarvestConditionType('panum_plague_condition').GetName]#!\n #indent_newline:3 • [GetHarvestConditionType('panum_diphteria_condition').GetName]#!\n #indent_newline:3 • [GetHarvestConditionType('panum_polio_condition').GetName]#!"
 concept_panum_disease_description: "病気の概論"
 concept_panum_disease_descriptions: "病気の概論"
 concept_panum_disease_description_desc: "概論は[concept_panum_disease]について知るための最初の手がかりです。猛威を振るう感染症には何の手立てにもなりませんが、[Concept('concept_panum_disease_treatment','$concept_panum_disease_treatments$')]や[Concept('concept_theiler_pathogen','$concept_theiler_pathogens$')]、[Concept('concept_theiler_vaccine','$concept_theiler_vaccines$')]を発見するうえで欠かせないものです。感染症が流行しているときに[concept_panum_physician]がいれば、それだけで概論を入手できます。"
 concept_panum_disease_treatment: "病気の治療法"
 concept_panum_disease_treatments: "病気の治療法"
 concept_panum_disease_treatment_desc: "[concept_panum_physician]は特定の技術と[concept_panum_disease_description]があれば、長い期間をかけて[concept_panum_disease]の治療法を見つけることができます。完全に治癒するわけではありません。医師は病気の原因をつきとめ、それをもとに病気を予防し、感染を最小限に抑える方法を発明します。病気の治療法は感染病の流行を数か月から数週間まで短縮し、多くの州に感染が広がるのを抑えてくれます。治療法は[concept_panum_disease_prevention]の一部であり、感染症の封じ込め策なのです。"
 concept_panum_disease_prevention: "病気の予防"
 concept_panum_disease_prevention_no_disease: "予防"
 concept_panum_disease_prevention_desc: "[concept_panum_disease]を防止する、あるいは感染拡大を最小限に抑える方法はいくつかあります。もっとも代表的な方法は[concept_panum_physician]が発見する[concept_panum_disease_treatment]です。感染終息までの期間を縮め、また他国への感染拡大を抑えることもできます。生活水準や病院、技術、さらに高いレベルの保険制度も重要です。究極の予防策は[concept_theiler_vaccine]で、病気の発生そのものを抑えてくれます。ワクチンは[Concept('concept_theiler_biologist','$concept_theiler_biologists$')]が開発します。しかし予防にはそれぞれの病気に設定された保険制度レベルを満たす必要があります（医学会タブから確認）。ワクチン接種は専門機関による監督下で組織的に行わなければならないのです。"
 concept_panum_disease_type: "病気のタイプ"
 concept_panum_disease_types: "病気のタイプ"
 concept_panum_disease_type_desc: "[Concept('concept_panum_disease','$concept_panum_diseases$')]には感染規模に応じたランクがあります。#V 局所的流行病#!には猩紅熱などが該当し、発生した州でのみ流行します。#V 地域流行病#!（結核など）は周辺の州にも広がりますが、範囲は限定されます。そして当時もっとも恐れられたコレラなどの#V 広域流行病#!は全国レベルに広がり、時には国境を超えた州にまで感染を広げます。"
 concept_panum_local_disease: "局所的流行病"
 concept_panum_local_diseases: "局所的流行病"
 concept_panum_regional_disease: "地域流行病"
 concept_panum_regional_diseases: "地域流行病"
 concept_panum_transregional_disease: "広域流行病"
 concept_panum_transregional_diseases: "広域流行病"
 concept_panum_germ_theory: "病原体説"
 concept_panum_germ_theory_desc: "病原体説は、19世紀における医療科学躍進の土台となった大発明のひとつです。それまでヨーロッパに普及していた古代からの[Concept('concept_panum_disease','$concept_panum_diseases$')]の考え方（瘴気説など）は、病原体説の登場によって一気に衰退しました。世界ではじめて病原体説を発見すればボーナスを得られます。また病原体説が普及すれば、[Concept('concept_panum_disease_treatment','$concept_panum_disease_treatments$')]の研究中に起きる後退イベントの発生率を抑えるとともに、より多くの前進イベントを解禁します。"
 concept_panum_medical_prestige: "医学的威信"
 concept_panum_medical_prestige_desc: "医学的威信の内訳は発見した[Concept('concept_panum_disease_description','$concept_panum_disease_descriptions$')]（2ポイント）、[Concept('concept_panum_disease_treatment','$concept_panum_disease_treatments$')]（4ポイント）、[Concept('concept_theiler_pathogen','$concept_theiler_pathogens$')]（3ポイント）、[Concept('concept_theiler_vaccine','$concept_theiler_vaccines$')]（4ポイント）です。最初に発見した国には2倍のポイントが付与されます。ほかにも日常的疾患の治療、特別な治療法の発明、[concept_panum_physician]が医療制度を拡充させることによっても増加します。"
 concept_theiler_pathogen: "病原体"
 concept_theiler_pathogens: "病原体"
 concept_theiler_pathogen_desc: "A Pathogen is the name for something that causes a [concept_panum_disease]. This could be anything from an organism to a [concept_theiler_microorganism]. Often it is a Bacterium, parasite or Virus.\nA [concept_theiler_biologst] with access to enough Microorganisms can try to find the Pathogen that causes a Disease. This can help tp prevent the disease and to discover and produce a [concept_theiler_vaccine]"
 concept_theiler_vaccine: "ワクチン"
 concept_theiler_vaccines: "ワクチン"
 concept_theiler_vaccine_desc: "The discovery of Vaccines has allowed humans to become immune to [Concept('concept_panum_disease','$concept_panum_diseases$')] without contracting them and can potentially save millions of lives.\nTo create a Vaccine, A [concept_theiler_biologist] must first find the [concept_theiler_pathogen] that causes a Disease. Then the development of a Vaccine can start if enough [Concept('concept_theiler_microorganism','$concept_theiler_microorganisms$')] are available."
 concept_panum_red_cross: "赤十字社"
 concept_panum_red_cross_desc: "赤十字社は世界でもっとも古い国際組織のひとつです。ごくまれに、戦争において敵味方の区別なく医療を提供します。赤十字社の参加国には一定のボーナスを得られます。ゲームルールに応じて、赤十字社は史実通りに結成されたり、あるいはGUIから結成することができます。前提条件となる技術を持った承認国は赤十字社に参加できます。赤十字社本部は創設国の首都におかれます。また加盟国は拘束力のある国際法、3つの[Concept('concept_panum_convention','$concept_panum_conventions$')]に参加することができます。"
 concept_panum_convention: "国際協定"
 concept_panum_conventions: "国際協定"
 concept_panum_convention_desc: "An international convention is a joint declaration of intent by states to establish certain rules of the game in international traffic. There were several examples of this in the course of the 19th century, such as the Geneva Convention or the Hague Code of Land Warfare. What all conventions have in common is that they attempt to mitigate the horrors of war. Military options are therefore preferred over safe medical care for the wounded and ultimate weapons are banned, which leads to a certain containment of the war. The advantage is greater flexibility. While the adoption of a convention is viewed favorably, the abolition of a convention can lead to international anger.\n\nInternational conventions are usually non-binding declarations of intent. However, if enough members of the [concept_panum_red_cross] sign it, over time it will become valid international law, which all signatories are expected to comply with - and the other members will also sign it. This happens when 65 percent of all members and the majority of the Great Powers agree to this convention - then all other members are then forced to comply with it. This convention can then no longer be abolished as usual. In order to avoid binding conventions, a complete withdrawal from the Red Cross is necessary - with all the consequences."
 concept_manzoni_literary_tradition_desc: "#b Literary Tradition#! is a representation of a nation's literary achievements and traditions.\nThere are various ways to gain #b Literary Tradition#!. Having at least one $building_art_academy$, having one or more [Concept('concept_manzoni_local_writer','$concept_manzoni_local_writers$')], a [concept_manzoni_national_writer] and having certain [Concept('concept_artists_center_of_arts','$concept_artists_centers_of_arts$')] will passively add #b Literary Tradition#! to your country.\nThe more #b Literary Tradition#! your nation gains, the higher the prestige bonus you gain. Additionally it will allow you to unlock the [concept_elgar_expressionism] [concept_artists_art_style]."
 concept_elgar_musical_tradition_desc: "#b Musical Tradition#! is a representation of a nation's musical achievements and traditions.\nThere are various ways to gain #b Musical Tradition#!. If you have at least one [concept_elgar_opera], you will passively get #b Musical Tradition#!. The more #b Operas#! you have the more you get. You can also gain more #b Musical Tradition#! from musical and arts technologies. Each Technology gives a different bonus. You can also get #b Musical Tradition#! from events, especially if you have a [concept_elgar_composer].\nThe more #b Musical Tradition#! your nation gains, the higher the prestige bonus you gain. Additionally it will allow you unlock the [concept_elgar_impressionism] [concept_artists_art_style]."
 concept_klimt_painting_tradition_desc: "#b Painting Tradition#! is a representation of a nation's painting achievements and traditions. It can be gained from having #b Arts Academies#!, a [concept_klimt_painter], certain [Concept('concept_technology', '$concept_technologies$')] or from events.\n#b Painting Tradition#! allows you to unlock the [concept_elgar_art_nouveau] [concept_artists_art_style] and is used to calculate your #b Cultural Tradition#!."
 concept_mendelejew_theorized_elements: "理論化済みの元素"
 concept_mendelejew_discovered_elements: "発見済みの元素"
 concept_mendelejew_isolated_elements: "単離済みの元素"
 concept_panum_psycho_point: "精神療法ポイント"
 concept_panum_psycho_points: "精神療法ポイント"
 concept_panum_psycho_point_desc: "精神療法ポイントは、その国の精神医学や心理学分野の発展をまとめて示す総称です。特定の技術や精神病院、#V 精神科医#![concept_character_trait]持ちの[concept_panum_physician]によって月ごとに上昇します。またイベントによっても獲得できます。精神療法ポイントが多いほど、精神病のキャラクター治療の成功率が上がります。精神療法レベルが高いと研究や[concept_academics_progress]にボーナスが入ります。ほとんどの精神学派の発明にも一定数の精神療法ポイントが必要です。"
 concept_vikelas_mechanic: "Mechanic"
 concept_vikelas_mechanic_desc: "#b Mechanics#! are responsible for building the [concept_vikelas_race_car], and their character traits and experience influence how long it takes to build or upgrade a car. However, they are not only responsible for the car itself, but also have a direct influence on [concept_vikelas_mechanical_innovation]. Good mechanics ensure that a car's speed (including the driver's tendency to seek the thrill of speed) does not exceed the safety rating, in order to prevent fatal accidents. The same applies to reliability: if the speed rating is higher than the reliability rating, there is a 50% chance that the car will not reach its destination."
 concept_vikelas_mechanical_innovation: "Mechanical Innovation"
 concept_vikelas_race_car: "Race Car"
 concept_vikelas_race_car_desc: "Alongside the [concept_vikelas_car_racer], the #b Race Car#! is the key factor in a [concept_vikelas_car_racing]. They are built by a [concept_vikelas_mechanic]. The most important attributes of a race car are speed, reliability and safety. A fast car that does not meet safety standards may well have a chance of winning, but it also carries a high risk of a fatal accident. A car that is safe but too slow, on the other hand, cannot secure a victory. The racing team must therefore strike the right balance."
 concept_vikelas_race_car_reliability: "Race Car Reliability"
 concept_vikelas_race_car_safety: "Race Car Safety"
 concept_vikelas_race_car_speed: "Race Car Speed"
 concept_dubois_dinosaur_bone_no_dinosaur: "Bones"
 concept_dubois_dinosaur_bones_no_dinosaur: "Bones"
 concept_dubois_paleontological_expedition_desc: "A [concept_dubois_paleontologist] can be dispatched to [Concept('concept_dubois_formation','$concept_dubois_formations$')]. It will take 1 year and depending on the Success of the Expedition, you will get [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] and [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')]. When you finish an Expedition and if you have a free [concept_dubois_paleontological_team] you can set up a [concept_dubois_paleontological_excavation] to passively gain Fossils and Bones from that region.\nThe easiest way to gain access to a formation is to control the associated state. However, access can also be gained peacefully through [Concept('concept_dubois_paleontological_licence','$concept_dubois_paleontological_licences$')]."
 concept_dubois_paleontological_team: "Paleontological Team"
 concept_dubois_paleontological_teams: "Paleontological Teams"
 concept_dubois_paleontological_team_desc: "Paleontological Teams can be used to set up an [concept_dubois_paleontological_excavation] after finishing a [concept_dubois_paleontological_expedition]. This will allow you to passively get [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] and [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')]."
 concept_dubois_paleontological_excavation: "Paleontological Excavation"
 concept_dubois_paleontological_excavations: "Paleontological Excavations"
 concept_dubois_paleontological_excavation_desc: "You can set up a Paleontological Expedition after finishing a [concept_dubois_paleontological_expedition] if you have a free [concept_dubois_paleontological_team]. A Paleontological Excavation will allow your Team to passively produce [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] and [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')]."
 concept_verrier_venus_transit: "金星の日面通過"
 concept_verrier_venus_transit_desc: "The transit of Venus refers to the rare occurrence of the Venus passing between Earth and the Sun. However, it occurred twice in the 19th century: in 1874 and 1882. Since observations of the transit of Venus allow conclusions to be drawn about the size of the solar system and a more precise determination of the size of the astronomical unit (AU), these were major scientific events. Countries located in the [concept_verrier_venus_transit_zone] can observe the event from there; other countries must send expeditions. The success of the observation depends on the experience of the [concept_verrier_astronomer], the availability of an [concept_tesla_engineer], and a bit of luck: sometimes the weather can prevent a good image. The better the observation, the greater the bonus."
 concept_verrier_venus_transit_zone: "金星の日面通過の観測地"
 concept_verrier_venus_transit_zone_desc: "The Venus Transit Zone refers to the part of the Earth from which a complete (not just partial) transit of Venus can be observed. In 1874, this was particularly true for the East Asia-Pacific region, and in 1882 for almost the entire American continent. A detailed breakdown of the strategic regions is provided below.\n\n#V Venus Transit 1874:#!\nIndonesia, Indochina, Oceania, South China, North China, manchuria, Japan, Central India, Madras, Bengal, Himalayas; also, the State of Indian Ocean Territory.\n\n#V Venus Transit 1882:#!\nBrazil, La Plata, Andes, Gran Columbia, Mexico, Central America, Caribbean, The Midwest, Dixie, New England; also, the States of Ontario and Quebec."
 concept_vikelas_coach: "Coach"
 concept_vikelas_coaches: "Coaches"
 concept_vikelas_coach_desc: "Coaches are the national trainers of a country in a specific national sport. National sports include [concept_vikelas_football], baseball, basketball, and cricket. Coaches provide bonuses for the respective team in competitions - whether at International World Championships or at international matches. The latter are played secretly at regular intervals and increase a coach's experience value upon victory. High experience points and positive [Concept('concept_character_trait','$concept_character_traits$')] increase the chance of winning a World Championship. Positive traits are those that particularly motivate players - such as ambitious or charismatic - while demotivating traits reduce the chance of winning a match. These include traits such as ruthless or cruel."
 concept_vikelas_football: "Football"
 concept_vikelas_football_desc: "Football is a possible national sport. The first football clubs can be established in Europe and South America; this will require a relatively liberal legal system, a strong petty bourgeoisie, or considerable average standard of living. After that, occasional football matches could be played. With the establishment of FIFA, international matches and the World Cup also become possible. The eight best teams automatically qualify for the World Cup. The teams are calculated according to the National Football Team Value (NFTV), which is derived from the parameters of standard of living (fitness of the population), strength of the petty bourgeoisie (club system), literacy (tactics), and tradition (national sport: yes or no?). In matches, not only the NFTV is taken into account, but also the character traits and experience of the [concept_vikelas_coach]."
 concept_gaudi_architectural_splendour: "Architectural Splendour"
 concept_gaudi_architectural_splendour_desc: "Architectural Splendour is a collective term for the spectacular advances in modern architecture, referring primarily to Art Deco, Bauhaus, and Neoclassicism as they emerged in the early 20th century. The value represents the transformation of outdated forms into a future-ready architecture. Art Deco requires reaching a higher threshold to fulfill the dream of an Art Deco city — yet the benefits are greater."
 concept_artists_artist_desc: "In [concept_morgenroete] #b Artists#! are special characters that allow you to use certain mechanics of the mod. You can get #b Artists#! in some events or by acquiring enough [concept_artistic_progress]. Artists have [concept_artists_experience] that reflects their standing in their respective field.\nCurrently these #b Artists#! exist:\n - [concept_elgar_composer]\n - [concept_klimt_painter]\n - [concept_manzoni_writer]\n - [concept_gaudi_architect]"
 concept_elgar_architecture_desc: "Architecture is one of the core concepts of [concept_morgenroete]. It is divided into two major parts.\n\nOn the one hand, [concept_gaudi_monuments] have been completely redesigned: they are no longer built directly, but expanded step by step based on decisions. On the other hand, numerous monuments have been added - some of which must be built, others exist at the start of the game.\n\nThe other key point is the introduction of the [concept_gaudi_architect], who can upgrade cities and design up to 15 new unique buildings by researching [Concept('concept_gaudi_architectural_blueprint','$concept_gaudi_architectural_blueprints$')]. Architects can also rebuild a country in the Bauhaus, Neoclassical, and Art Deco styles. A [concept_gaudi_great_architect] can even design their own [concept_gaudi_custom_monument]!"
 concept_gaudi_architect_desc: "#PURPLE #b Architects#!#! are [Concept('concept_artists_artist','$concept_artists_artists$')] whose skills relate to urban planning, building design and construction. They are special character types that you can gain either from events, from gaining enough [concept_artistic_progress] to create one in your nation or by offering a position to a [concept_gaudi_independent_architect].\nWhile other artists are more likely to accumulate cultural tradition, architects only rarely generate the very valuable [concept_gaudi_architectural_splendour] when they are involved in urban planning or the expansion of the capital—or when they completely redesign the country in a particular architectural style. Their main task is more practical in nature. They work in public construction, thus providing a nation with additional construction points. They improve infrastructure through planning and enhance capital cities into livable places. Architects can also hone their skills on a study tour or write an architectural treatise.\nOf paramount importance is the design of new, unique buildings, for which they create a [concept_gaudi_architectural_blueprint]. A total of 15 of these [concept_gaudi_blueprint_buildings] can be researched—since this takes a long time, it's worth considering which ones make sense.\nArchitects also provide a passive bonus: their mere presence accelerates the construction of [concept_gaudi_monuments] by 100 percent. The greatest achievement of an architect is the design of their own [concept_gaudi_custom_monument]. This is only possible with a [concept_gaudi_great_architect]."
 concept_douglas_mountaineering: "Mountaineering"
 concept_douglas_mountaineering_desc: "Countries that own at least one [concept_douglas_mountain_summit] or have a #b Mountaineering License#! with a country that has one can participate in mountaineering. To start a #b Mountain Expedition#! you need both the #b Prospecting#! and #b Nationalism#! technologies as well as a general that has either the #b Mountaineer#!, #b Explorer#!, #b Mountain Commander#! or #b Surveyor#! Trait.\nAs soon as you start a #b Mountain Expedition#! you will have to first choose which general will be the main Mountaineer. Then you will choose the summit to climb.\nThe higher the mountains, the more dangerous is the ascent. The Mountains are classified according to their height in meters ranging from under 4000 meters up to over 8000 meters. Success depends on researched military technologies, the age and health of the leader, and their characteristics. Avalanches and steep slopes can pose a major risk that threatens the entire endeavor.\nYou can even send an additional [Concept('concept_academics_academic','$concept_academics_scientist$')] on the trip. Either a [concept_dubois_naturalist] or a [concept_dubois_paleontologist] will help discover more about the mountain you climbed on.\nIn the end you will get a prestige bonus and your general will develop better traits that will help them in combat as well for mountaineering."
 concept_gaudi_great_architect: "#PURPLE #b Great Architect#!#!"
 concept_gaudi_great_architects: "#PURPLE #b Great Architects#!#!"
 concept_gaudi_great_architect_desc: "#b Great Architects#! are [Concept('concept_gaudi_architect','$concept_gaudi_architects$')] that are considered to be the most important minds in their field. #b Architects#! reaching 500 [concept_artists_experience] will become #b Great Architects#!. Should an artist achieve this special rank, he or she can design the blueprint for a truly outstanding [concept_gaudi_custom_monument] that embodies the spirit of the nation."
 concept_gaudi_monuments: "Monuments in #R Morgenröte#!"
 concept_gaudi_monuments_desc: "Many Nations received new #b Monuments#! in [concept_morgenroete]: the #b Cologne Cathedral#! in Germany, the #b Gotthardbahn#! in Switzerland, the #b Cristo Redentor#! in Brazil, the #b Mole Antonelliana#! in Italy, the #b Summer Palace#! in China, the #b Sagrada Família#! in Spain, the #b Schloss Neuschwanstein#! in Bavaria, the #b Palacio de Bellas Artes#! in Mexico and the #b Gyeongbokgung Palace#! in Korea.\nAll Buildings except for the #b Summer Palace#!, and the #b Campanile#! need to be constructed by their owner, the #b Saxon Palace#! can be reactivated by a Polish nation. There are also new monuments at game start like the #b Buddhas of Bamiyan#! or the #b Potala Palace#!\nThere is also the possibility to have a [concept_gaudi_custom_monument] designed by a [concept_gaudi_great_architect].\n\nUnlike in the vanilla game, #b Monuments#! are not built directly, but rather through a decision. Construction takes place in several stages, depending on the size of the building, and can take years or even decades - and is significantly more expensive."
 concept_athletes_athlete: "Athlete"
 concept_athletes_athletes: "Athletes"
 concept_athletes_athlete_desc: "In [concept_morgenroete] #b Athletes#! are special characters that allow you to use certain mechanics of the mod.#b Athletes#! are usually created through events or via a button. Like other characters, #b Athletes#! possess experiences that guarantee greater success in their field.\nCurrently these #b Athletess#! exist:\n - [concept_curtiss_balloonist]\n - [concept_curtiss_pilot]\n - [concept_vikelas_olympian]\n - [concept_douglas_mountaineer]\n - [concept_vikelas_coach]\n - [concept_vikelas_racer]"
 concept_gaudi_independent_architect: "Independent Architect"
 concept_gaudi_independent_architects: "Independent Architects"
 concept_gaudi_independent_architect_desc: "[Concept('concept_gaudi_architect','$concept_gaudi_architects$')] that are not hired by a country are #b Independent Architects#!.\nUnlike many other artists, there are few requirements to recruit an #b Independent Architect#!, except for a minimal technological recquirement. They are true globetrotters and usually only demand good payment."
 concept_gaudi_architectural_blueprint: "Architectural Blueprint"
 concept_gaudi_architectural_blueprints: "Architectural Blueprints"
 concept_gaudi_architectural_blueprint_desc: "Architectural blueprints can be researched by [Concept('concept_gaudi_architect','$concept_gaudi_architects$')]. They are essential for the construction of special [concept_gaudi_blueprint_buildings] that can only be erected once in a nation. There are a total of 15 different buildings in five different categories. Certain blueprints require technologies to be researched. Since research can sometimes take years, it's wise to decide beforehand which blueprints are most important. The buildings can potentially be constructed in any state, but require a certain level of urbanization. In some cases, there may be additional requirements."
 concept_gaudi_blueprint_buildings: "Blueprint Buildings"
 concept_gaudi_blueprint_buildings_desc: "Blueprint buildings are buildings which need a bluprint researched by [Concept('concept_gaudi_architect','$concept_gaudi_architects$')]. These buildings can only be built once in a nation. There are 15 different buildings:\n\n#b Monument#!\n- [GetBuildingType('building_gaudi_statue').GetName]\n- [GetBuildingType('building_gaudi_fountain').GetName]\n- [GetBuildingType('building_gaudi_arch').GetName]\n\n#b Public Square#!\n- [GetBuildingType('building_gaudi_park').GetName]\n- [GetBuildingType('building_gaudi_luna').GetName]\n- [GetBuildingType('building_gaudi_parade').GetName]\n\n#b Service Buildings#!\n- [GetBuildingType('building_gaudi_almshouse').GetName]\n- [GetBuildingType('building_gaudi_school').GetName]\n- [GetBuildingType('building_gaudi_prison').GetName]\n\n#b Health Institutions#!\n- [GetBuildingType('building_gaudi_canalization').GetName]\n- [GetBuildingType('building_gaudi_hospital').GetName]\n- [GetBuildingType('building_gaudi_health').GetName]\n\n#b National Academies#!\n- [GetBuildingType('building_gaudi_science').GetName]\n- [GetBuildingType('building_gaudi_arts').GetName]\n- [GetBuildingType('building_gaudi_sports').GetName]"
 concept_gaudi_custom_monument: "Custom Monument"
 concept_gaudi_custom_monument_desc: "A custom monument is an [concept_gaudi_architect]'s greatest possible masterpiece. It can compete with other, ordinary monuments. Only a [concept_gaudi_great_architect] can draw up such plans. It requires research into the most modern architectural technologies. The type of monument an architect designs depends largely on their architectural style. Art Deco architects design the [GetBuildingType('building_gaudi_people_monument').GetName], Bauhaus architects the [GetBuildingType('building_gaudi_people_forum').GetName], and Neoclassical architects the [GetBuildingType('building_gaudi_people_palace').GetName]."
 concept_douglas_mountaineer: "Mountaineer"
 concept_douglas_mountaineers: "Mountaineers"
 concept_douglas_mountaineer_desc: "#b Mountaineers#! are [Concept('concept_athletes_athlete','$concept_athletes_athletes$')] who can climb unconquered [concept_douglas_mountain_summit]. They can be recruited against [concept_douglas_alpine_heritage] after the establishment of a mountaineering club. Countries with geographical features such as mountains, peaks, or volcanoes therefore have an advantage in recruitment. Mountaineering traits and experience are the most important factors for progress in conquering a mountain or overcoming a dangerous situation."
 concept_vikelas_olympian: "Olympian"
 concept_vikelas_olympian_desc: "#n This entry is being revised.#!"
 concept_douglas_mountain_summit: "Mountain Summit"
 concept_douglas_mountain_summits: "Mountain Summits"
 concept_douglas_mountain_summit_desc: "Mountain Summits are the coveted goal of all mountaineers. They mark the highest point of a mountain. Each summit has three distinct attributes that define how difficult it is to reach successfully.\n\n#V Height#!: Height determines how many steps are required to climb a mountain—this reflects the overall length of an expedition. For every 1,000 meters, one progress step is needed. The value is rounded up, meaning that the 4,421-meter-high Mount Whitney requires 5 steps, while the 7,134-meter-high Kauffmann Peak demands 8. A mountain's prestige is calculated based on its height: the total height is divided by 300. Thus, an ideal mountain of 4,500 meters grants 15 prestige.\n\n#V Level#!: A mountain's level represents the equipment demands necessary to climb it. This is not strictly tied to its height. For example, despite its 5,636 meters, Citlaltépetl is only Level 1 and requires just basic equipment. In contrast, the Matterhorn, at only 4,478 meters, is considered significantly more demanding at Level 3, requiring at least first aid preparation for Alpine emergencies.\n\n#V Risk#!: A mountain's risk level indicates the likelihood of negative events affecting an expedition. It is independent of both height and level. Avalanches, fog, and severe weather are key concerns. Popocatépetl could be ascended already in early modern times due to its hospitable surroundings. In contrast, the much smaller Großvenediger, at just 3,666 meters, still posed a serious threat to Austrian expeditions well into the early 19th century.\n\nMore information about individual summits can be found under the [concept_douglas_mountain_summit_list] section."
 concept_douglas_mountain_range: "Mountain Range"
 concept_douglas_mountain_ranges: "Mountain Ranges"
 concept_douglas_mountain_range_desc: "A mountain range is defined as a mountain formation that offers potential for [concept_douglas_mountaineering] training over long distances. Classic mountain ranges include the Rocky Mountains, the Andes, the Alps, and the Caucasus. Unlike the [Concept('concept_douglas_mountain_summit','$concept_douglas_mountain_summits$')] that are to be conquered, there are also plenty of less challenging mountains where there is no risk of a [concept_douglas_mountaineer] experiencing a fatal fall. Rather, they should be viewed as a training route. Countries with mountain ranges are more likely to produce mountaineers than those without this geographical feature."
 concept_douglas_alpine_heritage: "Alpine Heritage"
 concept_douglas_alpine_heritage_desc: "Alpine Heritage is a collective term for a connection with the mountains and a specialization in climbing mountains. It also refers to the potential to recruit new [Concept('concept_douglas_mountaineer','$concept_douglas_mountaineers$')]—since, in most cases, experienced mountaineers come from mountainous areas. This always gives countries with [Concept('concept_douglas_mountain_range','$concept_douglas_mountain_ranges$')] or [Concept('concept_douglas_mountain_summit','$concept_douglas_mountain_summits$')] an advantage. Recruiting a new mountaineer, as well as various other actions, costs Alpine Heritage."
 concept_douglas_mountain_summit_list: "List of Mountain Summits"
 concept_douglas_mountain_summit_list_desc: "There are many [Concept('concept_douglas_mountain_summit','$concept_douglas_mountain_summits$')] that can be climbed.\n\n#V North America:#!\n#b Mount McKinley#! (Alaska), Height 6190 meters, Level 4\n#b Mount Logan#! (Yukon Territory), Height 5959 meters, Level 4\n#b Citlaltépetl#! (México), Height 5636 meters, Level 1\n#b Mount Whitney#! (California), Height 4421 meters, Level 1\n\n#V South America:#!\n#b Aconcagua#! (Mendoza), Height 6267 meters, Level 3\n#b Huascarán#! (Lima Territory), Height 6768 meters, Level 5\n#b Illimani#! (La Paz), Height 6438 meters, Level 4\n#b Chimborazo#! (Ecuador), Height 6267 meters, Level 1\n\n#V Europe:#!\n#b Shkara#! (Greater Caucasus), Height 5642 meters, Level 4\n#b Dufourspitze#! (West Switzerland), Height 4634 meters, Level 2\n#b Matterhorn#! (West Switzerland), Height 4478 meters, Level 3\n#b Aiguille Verte#! (Savoy), Height 4122 meters, Level 3\n#b Pico de Aneto#! (Aragon), Height 3404 meters, Level 1\n\n#V Africa:#!\n#b Kibo#! (Tanganyika), Height 5895 meters, Level 2\n#b Mount Kenya#! (Kenya), Height 5199 meters, Level 3\n#b Mount Stanley#! (Uganda), Height 5109 meters, Level 3\n#b Mount Cameroon#! (South Cameroon), Height 4095 meters, Level 1\n\n#V Asia:#!\n#b Kamet#! (Delhi), Height 7756 meters, Level 4\n#b Chogolisa#! (Kashmir), Height 7665 meters, Level 5\n#b Kabru#! (Himalayas), Height 7412 meters, Level 5\n#b Kaufmann Peak#! (Tajikistan), Height 7134 meters, Level 4\n\n#V Australia & Oceania:#!\n#b Mount Wilhelm#! (Eastern New Guinea), Height 4121 meters, Level 2\n#b Mount Cook#! (South Island), Height 3724 meters, Level 2"
 concept_panum_disease_description_describe: "概論"
 concept_panum_disease_description_described: "概論"
 concept_panum_disease_treatment_treat: "治療法"
 concept_panum_disease_treatment_treated: "治療法"
 concept_roy_ethnologist: "#b #ORANGE Ethnologist#!#!"
 concept_roy_ethnologists: "#b #ORANGE Ethnologists#!#!"
 concept_roy_ethnologist_desc: "#n 今後のMorgenröteの更新をお待ちください！#!"
 ag_morgenroete_desc: "We have open alerts from the [concept_morgenroete] Mod."
 concept_tesla_engineer: "#b #ORANGE Engineer#!#!"
 concept_tesla_engineers: "#b #ORANGE Engineers#!#!"
 concept_tesla_civil_engineer: "#b #ORANGE Civil Engineer#!#!"
 concept_tesla_civil_engineers: "#b #ORANGE Civil Engineers#!#!"
 concept_tesla_civil_engineering: "#b #ORANGE Civil Engineering#!#!"
 concept_tesla_mechanical_engineer: "#b #ORANGE Mechanical Engineer#!#!"
 concept_tesla_mechanical_engineers: "#b #ORANGE Mechanical Engineers#!#!"
 concept_tesla_mechanical_engineering: "#b #ORANGE Mechanical Engineering#!#!"
 concept_tesla_military_engineer: "#b #ORANGE Military Engineer#!#!"
 concept_tesla_military_engineers: "#b #ORANGE Military Engineers#!#!"
 concept_tesla_military_engineering: "#b #ORANGE Military Engineering#!#!"
 concept_tesla_electrical_engineer: "#b #ORANGE Electrical Engineer#!#!"
 concept_tesla_electrical_engineers: "#b #ORANGE Electrical Engineers#!#!"
 concept_tesla_electrical_engineering: "#b #ORANGE Electrical Engineering#!#!"
 concept_tesla_aeronautical_engineer: "#b #ORANGE Aeronautical Engineer#!#!"
 concept_tesla_aeronautical_engineers: "#b #ORANGE Aeronautical Engineers#!#!"
 concept_tesla_aeronautical_engineering: "#b #ORANGE Aeronautical Engineering#!#!"
 concept_tesla_engineering: "Engineering"
 concept_tesla_engineering_desc: "#b Engineering#! is one of the main features of [concept_morgenroete].\n\nTo get access to #b Engineering#!, you need to have an [concept_tesla_engineer]. #b Engineers#! can start #b Engineering Projects#! depending on their specialization. There are five specialized #b Engineers#!:\n- The [concept_tesla_civil_engineer] focuses on improving the infrastructure of a country.\n- The [concept_tesla_mechanical_engineer] focuses on mechanical inventions that benefit the industry, for example.\n- The [concept_tesla_military_engineer] focuses on improving the army and navy of a country.\n- The [concept_tesla_electrical_engineer] focuses on improving the electrical infrastructure of a country.\n- The [concept_tesla_aeronautical_engineer] focuses on making human flight possible and improving airplanes and other aircraft."
 concept_tesla_engineer_desc: "#b #ORANGE Engineers#!#! are Academics that will help with the construction of special buildings by providing expertise.\nAdditionally #b #ORANGE Engineers#!#! will provide a bonus to the [concept_technology_spread] of your nation. The bonus depends on how many nations have more technologies researched than your nation."
 concept_tesla_civil_engineer_desc: "#b Civil Engineers#! focus on improving the infrastructure of a country.\nThey can start #b Engineering Projects#! to add [Concept('concept_modifier','$concept_modifiers$')] to states that raise [concept_infrastructure], to improve your #b Construction Sectors#! or to research [Concept('concept_technology', '$concept_technologies$')]."
 concept_tesla_mechanical_engineer_desc: "#b Mechanical Engineers#! focus on mechanical innovations that improve your industry, machines or the lives of your population.\nThey can start #b Engineering Projects#! to add [Concept('concept_modifier','$concept_modifiers$')] to your industrial building that improve [concept_throughput], [concept_good_production] and [concept_input_mult], to improve your #b Railways#! with new locomotives or to research industrial [Concept('concept_technology', '$concept_technologies$')]."
 concept_tesla_military_engineer_desc: "#b Military Engineer#! focus on improving our army and navy by introducing new innovations.\nThey can start #b Engineering Projects#! to gain new [Concept('concept_mobilization_option','$concept_mobilization_options$')] by inventing weapons, new field works and better tanks or to research military or naval [Concept('concept_technology', '$concept_technologies$')]."
 concept_tesla_electrical_engineer_desc: "#b Electrical Engineer#! focus on improving your country with electrical innovations.\nThey can start #b Engineering Projects#! to research the geomagnetic field of the Earth, to build telegraph or radio networks or to research electrical [Concept('concept_technology', '$concept_technologies$')]."
 concept_tesla_aeronautical_engineer_desc: "#b Aeronautical Engineer#! focus on developing means to fly and improving airplanes and Zeppelins.\nThey can start #b Engineering Projects#! to add [Concept('concept_modifier','$concept_modifiers$')] to your #V Airports#! that improve [concept_throughput], [concept_good_production] and [concept_input_mult], to unlock #V Advanced Aircraft#! as [Concept('concept_mobilization_option','$concept_mobilization_options$')] or to research aviation [Concept('concept_technology', '$concept_technologies$')]."
 concept_vikelas_national_sport: "National Sport"
 concept_vikelas_national_sport_desc: "Any country can declare one of the following sports as its national sport: cricket, baseball, football, or basketball. Three of these four sports (the exception being cricket) were only invented during the 19th century. The country that first invents a sport is considered the 'mother country' of that sport. From this point on, sports spread throughout the world, but not under the same conditions: the spread of cricket and baseball is more limited, while that of football and basketball is subject to less stringent conditions. Sports can be spread by an overlord among subjects to improve relations. Different sports can coexist within a country, but to spread nationwide in every sports facility, they must be a national sport."
 concept_theiler_microorganism: "微生物"
 concept_theiler_microorganisms: "微生物"
 concept_theiler_microorganism_desc: "Microorganisms are tiny organisms like bacteria, viruses and single celled organisms.\nThey can be found by a [concept_theiler_biologst] through the $je_theiler_microorganism_research$ [concept_journal_entry] which Biologists conduct when they are not busy.\nMicroorganisms can mainly be used to discover [Concept('concept_theiler_pathogen','$concept_theiler_pathogens$')] and [Concept('concept_theiler_vaccine','$concept_theiler_vaccines$')] which help a country to protect their population from [Concept('concept_panum_disease','$concept_panum_diseases$')]."
 concept_theiler_biology: "生物学"
 concept_theiler_biology_desc: "In [concept_morgenroete], #b Biology#! plays a vital supporting role in the medical and agricultural sectors. Microbiological studies are particularly important: a [concept_theiler_biologist] can identify [Concept('concept_theiler_microorganism','$concept_theiler_microorganisms$')], especially [Concept('concept_theiler_pathogen','$concept_theiler_pathogens$')]. The latter is useful for developing [Concept('concept_theiler_vaccine','$concept_theiler_vaccines$')]. Vaccines can completely prevent the onset of [Concept('concept_panum_disease','$concept_panum_diseases$')] if the healthcare system is well-developed. Furthermore, biologists are useful in [concept_theiler_pest] control, such as combating the codling moth, and improve the output of agricultural businesses."
 concept_ito_medicinal_plants: "Medicinal Plants"
 concept_ito_medicinal_plants_desc: "Medicinal Plants are plants that have medicinal properties which can be used to create pharmaceuticals and other useful chemicals.\nYou can gather Medicinal Plants by sending a [concept_dubois_naturalist] on a [concept_dubois_botanical_expedition]. Once enough Medicinal Plants are gathered a [concept_mendelejew_chemist] can start to isolate the chemical substance. Once that is done a [concept_theiler_biologist] will be able to start producing a pharmaceutical."
 concept_academics_academic_confusion: "Academic Confusion"
 concept_academics_academic_confusion_desc: "Changing the [concept_academics_university_specialization] of a University will lead to many confused academics. This will result in a reduction of the scientific output for a short period of time."
 concept_academics_experience_civil_engineer: "Civil Engineer Experience"
 concept_academics_experience_mechanical_engineer: "Mechanical Engineer Experience"
 concept_academics_experience_military_engineer: "Military Engineer Experience"
 concept_academics_experience_electrical_engineer: "Electrical Engineer Experience"
 concept_academics_experience_aeronautical_engineer: "Aeronautical Engineer Experience"
 concept_academics_experience_chemist: "Chemist Experience"
 concept_academics_experience_astronomer: "Astronomer Experience"
 concept_academics_experience_physicist: "Physicist Experience"
 concept_academics_experience_geologist: "Geologist Experience"
 concept_academics_experience_paleontologist: "Paleontologist Experience"
 concept_academics_experience_naturalist: "Naturalist Experience"
 concept_academics_experience_biologist: "Biologist Experience"
 concept_academics_experience_physician: "Physician Experience"
 concept_academics_experience_archaeologist: "Archaeologist Experience"
 concept_academics_experience_anthropologist: "Anthropologist Experience"
 concept_academics_experience_tethnologist: "Ethnologist Experience"
 concept_academics_experience_experienced: "Experienced"
 concept_academics_experience_famous: "Famous"
 concept_andersson_anthropologist: "#b #BLUE Anthropologist#!#!"
 concept_andersson_anthropologists: "#b #BLUE Anthropologists#!#!"
 concept_andersson_anthropologist_desc: "#b #BLUE Anthropologists#!#! are academics who study human prehistory, both in the paleontological and archaeological senses. They search for [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')], [Concept('concept_andersson_prehistoric_artifact','$concept_andersson_prehistoric_artifacts$')], find new human species and reconstruct [Concept('concept_andersson_skeleton','$concept_andersson_skeletons$')]. Anthropologists often work as speleologists (cave explorers) and, over time, can develop a wide range of specializations. These include categories such as monogenists, polygenists, diffusionists and evolutionists, whose voting behaviour at conferences often determines the outcome. Particularly skilled anthropologists can reform existing anthropological terminology of the [concept_andersson_human_evolution] or shed light on the Piltdown fraud."
 concept_andersson_human_fossil: "Human Fossil"
 concept_andersson_human_fossils: "Human Fossils"
 concept_andersson_human_bones: "Human Bones"
 concept_andersson_human_fossil_desc: "There are essentially two types of #b Human Fossils#!: non-specific fossils and specific fossils. Non-specific fossils are all remains of human biology, including those of a recent nature from historical times. They can also be found by people other than anthropologists, but are important, for example, for the establishment of the [GetBuildingType('building_andersson_institute').GetName]. Specific human fossils belong to one of four groups: Neoanthropus, Palaeanthropus, Pithecanthropus, Australopithecus. They can be found during a hominid survey or a hominid expedition. [Concept('concept_andersson_anthropologist','$concept_andersson_anthropologists$')] may also discover entirely new types in the process. There are a total of 16 different specific human fossils. [Concept('concept_andersson_skeleton','$concept_andersson_skeletons$')] can also be reconstructed from them to trace [concept_andersson_human_evolution]."
 concept_andersson_cave: "Cave"
 concept_andersson_caves: "Caves"
 concept_andersson_cave_desc: "#b Prehistoric Caves#! are a place where early human or pre-human species have left [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')]. They therefore provide a bonus when conducting anthropological research. Caves can be discovered and explored by [Concept('concept_andersson_anthropologist','$concept_andersson_anthropologists$')]. Some Caves are also unlocked through historical events."
 concept_andersson_human_evolution: "Human Evolution"
 concept_andersson_human_evolution_desc: "In the Victorian era, there was a tendency to classify [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')] and evolutionary stages according to their higher level of development. A distinction was drawn between the 'gifted' Homo sapiens, endowed with artistic talent, and their more coarse-featured ancestors or ape-like counterparts. Thus, the precursors of humanity were divided into categories such as Neoanthropus (True Man), Palaeanthropus (Cave Man) and Pithecanthropus (Ape-Man); the latter represented the actual 'missing link' between animals and humans. Although these concepts were frequently rejected by later scholarship, they served as an initial point of reference for further research into the early history of humankind. The discovery of Australopithecus (Southern Ape) in Africa was therefore, for a number of reasons, one that shook the established view."
 concept_andersson_prehistoric_artifact: "Prehistoric Artifact"
 concept_andersson_prehistoric_artifacts: "Prehistoric Artifacts"
 concept_andersson_prehistoric_artifact_desc: "#b Prehistoric Artifacts#! provide evidence of human presence in a [concept_andersson_cave] or other archaeological sites. Unlike non-specific [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')], they directly give [concept_andersson_anthropological_prestige]. In rare cases, they are also required for exhibitions on human life during the Neolithic, Mesolithic or Upper Palaeolithic periods. An [concept_andersson_anthropologist] with the [concept_lepsius_archaeologist] trait finds more prehistoric artifacts during an anthropological research."
 concept_andersson_skeleton: "Prehistoric Skeleton"
 concept_andersson_skeletons: "Prehistoric Skeletons"
 concept_andersson_skeleton_desc: "Reconstructing a #b Prehistoric Skeleton#! requires the construction of a [GetBuildingType('building_andersson_institute').GetName]. Once [Concept('concept_andersson_anthropologist','$concept_andersson_anthropologists$')] have found five [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')] of a specific species, they can begin the reconstruction - the anthropologist's [concept_character_traits] and experience affect the duration of the process. The first skeleton of a Neoanthropus, Palaeanthropus or Pithecanthropus activates the respective production method in the institute. However, an anthropologist can also easily reconstruct the other skeletons, provided they have the fossils, in order to gain further [concept_andersson_anthropological_prestige]."
 concept_lepsius_minor_excavation_site: "Minor Excavation Site"
 concept_lepsius_minor_excavation_site_desc: "Besides the large [Concept('concept_lepsius_excavation_site', '$concept_lepsius_excavation_sites$')], which are potentially usable by all countries internationally via licenses and offer Egyptian, Mesopotamian, Aegean, and pre-Columbian [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')], there are also 'smaller' excavation sites. These are only usable by the owner and contain only local artifacts. They are unlocked via a Journal Entry, which usually requires an [concept_lepsius_archaeologist] and special technology. Only then is the excavation site actually activated, visible through a State Trait in the State Region. After activation, Minor Excavation Sites generate an additional Local Artifact as long as the archaeologist is conducting an archaeological project. Examples of such excavation sites are Pompeii, Tikal, or Harappa."
