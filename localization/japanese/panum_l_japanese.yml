 panum.138.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_description_title')]"
 panum.138.d: "Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] presented [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] disease description of [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_disease_title')] today. The Medical Faculty already sees it as a classic."
 panum.138.f: "In [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] treatise [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_description_title')] [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] deals with the disease in more detail than any other physician in our country before. It educates the reader about symptoms, the incubation period, and differentiation from other diseases, as well as a chronology of past epidemics and other traditional epidemiological descriptions."
 panum.138.g: "Now we know the beast better."
 panum.139.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_treatment_title')]"
 panum.139.f: "The Medical Faculty was eagerly awaiting the scientific paper on [ROOT.Var('panum_physician_var').GetCharacter.GetFullName]'s treatment method. Would this work perhaps have a breakthrough? [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_treatment_title')] could potentially save the lives of countless people. The reasons it describes for the outbreak of [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_disease_title')] and the ways in which it can be prevented or treated afterwards could fundamentally change the way in which this disease has been thought about."
 panum.139.g: "[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_disease_title')] is losing its horror."
 panum.140.t: "Cholera - A Waterborn Disease!"
 panum.140.d: "Thanks to the heroic work of Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], the outbreak of Cholera in [SCOPE.sState('panum_disease_state').GetCityHubName] has been decisively crushed!"
 panum.140.f: "'Since the beginning of my time here in [SCOPE.sState('panum_disease_state').GetCityHubName], I have gathered a great deal of information that all points to one conclusion: cholera is a waterborne disease. The sickness that has slain so many for centuries is not found in the air, as miasma, but squirms and swarms in drops of water. Ingested, it develops in the bowel, and manifests into the cholera we have learnt to fight. It is a lesson hard learned, but quickly acted upon. Last week, they removed the handles from the water pump at the heart of this outbreak. Today, I retire to the evening without a single new case brought to my table. It is irrefutable. The beast is slain.\n\nYet, I do feel a pange of lament for all this. I do not wish that I could claim full, sole responsibility for the discoveries we made here, only that they could have been discovered even sooner. Many lives were lost for a lack of clean drinking water, young and old. If we are lucky, let this be the last we face of cholera.'\n\nFrom the journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], writing of the Great Cholera Epidemic of [TimeKeeper.GetCurrentDate.Format('y')], concluding the investigation in [SCOPE.sState('panum_disease_state').GetCityHubName]."
 panum.140.g: "Incredible! This is a mortal blow to miasma theory!"
 panum.141.t: "醸造所"
 panum.141.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]博士は調査中、疫病の流行を免れた陸の孤島にたどり着きました──ビール醸造所です。"
 panum.141.f: "「はじめまして！醸造所の主任ですね？私は[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]博士、疫学の調査でここに来ました。どうかお話を聞かせてください」\n\n「いいよ。ウチじゃ病気になったヤツはあまりいないけどね。周りの工場はほとんど閉鎖しちまったけど、ウチは違うぜ」\n\n「この醸造所ではコレラ患者が少ないですよね？何か思い当たる理由はありますか？」\n\n「悪いけど見当もつかないよ。まあしいて言えば、若い衆が汚い家に帰らないからかな」\n\n「彼らは醸造所で食事を？」\n\n「おうよ、それに酒もな！ボスが売れ残ったビールを昼食と一緒にふるまってくれるんだ。若い衆には手頃だし、いい景気づけになるよ。なんせ製造原価とほぼ同額でビール1パインドだからね、誰も井戸水なんか飲みやしないよ」"
 panum.141.g: "フーム……つまり皆さんここの水は飲まないと。実に面白い"
 panum.142.t: "習慣の生き物"
 panum.142.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]博士は調査を続けています──[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe]は感染源らしきものを見つけました。"
 panum.142.f: "「……しかしこの地域には類似するケースがあまりにも多いため、もっと手がかりが必要だった。地元の検死官たちが積極的に協力してくれたのは、まったくの幸運だった。かれらが遺体を引き取ったり患者が出た家の住所をすべて書き留めてくれたおかげで、コレラが発生した家庭を1枚の地図上で正確にまとめることができた。その結果、さまざまなことが判明した。病気が発生した家は100件超にものぼるが、同時に広大な円形を描いていたのだ。\n\n「これは従来の仮説と異なる。瘴気説が正しければ、コレラは風に乗って感染を広げ、卓越風の風下に患者が出るはずだ。しかし実際には風向きとは関係なく、不気味なほど整然とした円形に広がっている。わたしは円の中心に向かった。もしかしたら何か手がかりを得られるかも……そこにあったのは、水道ポンプだった。地図に載っていた家庭は、すべてこのポンプの徒歩圏内にある。何らかの関連があるに違いない」\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]の日記、[TimeKeeper.GetCurrentDate.Format('y')]年コレラ大流行における[SCOPE.sState('panum_disease_state').GetCityHubName]での調査記録より引用。"
 panum.142.g: "まさか……ポンプの中に何かあるのか？"
 panum.143.t: "ひっかかり"
 panum.143.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]博士は興味深いものを発見しました──感染のパターンです。"
 panum.143.f: "「ああ、よかった！[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]先生ですね、お噂はかねがね！どうか私たち一家をお助けください」\n\n「もちろんそのつもりです、奥様。どうかあなたとご家族について出来る限り教えてください。どんな些細な事でもかまいませんので。奥様の一家は、この近隣では唯一のコレラ患者ですね？」\n\n「ええ、ええ！その通りです！どこからともなく病気になってしまって！予防は欠かさなかったんです。臭いを追い払うために、花でできたマスクもつけてたのに」\n\n「それで感染が広がっている地域に行ったそうですね？いったい何のために？」\n\n「母のためなんです、ああ母さん……いつもあそこのポンプで汲んだ水がお気に入りだったんです。きっと私が水を汲んだときに、病気が服にくっついて家に持ち帰ってしまったんですね」"
 panum.143.g: "……流行している地域のポンプを汲みに行った、と？"
 panum.144.t: "濾過"
 panum.144.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]博士は感染の謎を解き明かす手がかりを探しています。[ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]は、すべての犠牲者が同じ水道会社の水を飲んでいたことが突き止めました！"
 panum.144.f: "「……しかし何よりも気になる点がある。ニューリバー社が水道を引いている地域に沿って進むと、コレラ患者が大きく減少しているのだ。それだけなら偶然かもしれない。しかし街の南側に戻ると、そこでは街中でコレラが蔓延し、排泄物と死体の匂いにあふれている。地域ごとに土壌の瘴気性が違うからそうなるのか？\n\n「そうは思えない。あまりにも差異が出すぎている。わたしはニューリバー社の人々に聞いてみた。すると、社のほうでは先日パイプを閉鎖して、多額の費用をかけてポンプ場に新しい濾過装置を取り付けたという。この濾過装置が見えない効果を発揮しているのか？きれいな水には、瘴気を寄せ付けない効果があるのだろうか？それとも、まったく別の何かがあるのか？」\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]の日記、[TimeKeeper.GetCurrentDate.Format('y')]年コレラ大流行における[SCOPE.sState('panum_disease_state').GetCityHubName]での調査記録より引用。 "
 panum.144.g: "……水の中に、病気を運ぶ何かがいる？"
 panum.145.t: "茶色い水"
 panum.145.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]博士は最新の顕微鏡を使って、コレラが流行した地域のサンプルを調べています。"
 panum.145.f: "[SCOPE.sState('panum_disease_state').GetCityHubName]まで顕微鏡を運ぶのはひと苦労だった。道路の凸凹に乗り上げて、ほぼすべてのレンズが割れてしまったり……しかしなんとか持ってくることができた。[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]博士は、現代医学最高の発明品を手に入れたのだ。地元の水から採取した数十ヶ所のサンプルを慎重に準備し、ひとつひとつ顕微鏡で調べることにした。まずコレラ患者が少ない地域のサンプルを覗いてみた。きれいなものだ。[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe]はそう記した。\n\nしかし汚いサンプルはどうだろう？その中におぞましい怪物が潜んでいるのか？\n\nそこで最もコレラ患者の多い地域のサンプルを覗いた。博士は眉をひそめ、しばし考えた。水の中にはちらちらと汚れが浮かび、まるで泥雪のかけらのようだ。そしてそこには、無害な微生物がわずかに動き、汚いスープを無害そうに泳いでいる。"
 panum.145.g: "……それとも、君らは見た目ほど無害でもないのか？"
 panum.145.h: "別の仮説のさらなる証拠だ"
 panum.145.i: "もっと何かあるはずだ"
 panum.146.t: "最初の犠牲者"
 panum.146.d: "精力的な研究と調査の末に、[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]博士は流行が起きてから最初の犠牲者の記録にたどり着きました──新生児でした。"
 panum.146.f: "悲しみのどん底にいる女性の家を訪問したのは、[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]博士にとって非常に痛ましい記憶だった。かつて妻であり、母であり、そして今はどちらでもない女性。博士は玄関先の階段でさっそく聞き取りをはじめた。\n\n生まれたばかりの男の子は、祖母の家に向かうために街へ行った。帰るころにはコレラに罹っていた。おむつを洗ったそうで、そこから病気が広がった可能性がある。\n\n夫は仕事帰りだった。製鉄所のシフト勤務のあとで喉が渇いていた。よく食べ、よく飲み、週末にコレラで亡くなった。\n\n後ろから泣き叫ぶ声がきこえる。前方には雨の振る寂しい街道。そして女性は、静かにつぶやいた。"
 panum.146.g: "お願いです、どうか全部終わらせて下さい"
 panum.147.t: "汚水溜"
 panum.147.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]博士はコレラの調査を指揮する中で、これまで見落とされていたものを発見しました──汚水溜です。"
 panum.147.f: "瘴気説に否定的な[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]博士であっても、瘴気を寄せ付けないという花のマスクをこれほどありがたいと思ったことはなかった。汚水ためは腐ったゴミと、それに言葉にできないような悪臭でいっぱいだった。警察の検視官でさえ、その場から後ずさりしてしまった。\n\n「先生！きっとこの汚水溜が瘴気を出しているに違いありません！あの忌々しいコレラもここから出ているんですよ！」\n\n「その可能性も捨てきれません。しかし検視官どの、これを見てください。雨が地面に流れ落ちているのが見えますか？」\n\n「ええ、もちろん見えますとも。それが何か？」\n\n「雨水はこの汚水溜めに流れ落ちて、そこから側溝に向かいます。要するに雨水は汚水を経由して側溝に流れる。そうだとすると、この雨水は給水ポンプの近くを通っています。もしもポンプの接合部に隙間があれば……」\n\n「……ハンドルを押せば汚れた水が登ってくる、と。ぞっとしませんなあ。病気が水から広がらなくて何よりです……」"
 panum.147.g: "……そうなのか？"
 panum.147.h: "違う！"
 panum.148.t: "豪邸"
 panum.148.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]博士は調査中、コレラが流行する地域にぽっかりと空いた穴を発見しました──ある裕福な男の家です。"
 panum.148.f: "「今日、この地域のとある紳士の邸宅を訪ねた。市内でもかなり豪奢な、コレラが流行している地域の中心部と隣り合わせの場所にある。かつてここが一介のスラム街になる前、かつての裕福な時代の名残を感じさせる場所だった。家の主人はコレラ調査にたいへんな興味を示し、過去の流行を調べれば何かわかるかもしれないということで、このあたりの歴史について書かれた何冊もの本を見せてくれた。それよりも興味深いことが分かった。これまでこの邸宅では一度もコレラ患者が出たことがないのだ。\n\n「わたしはこの事実に大きな関心をもった。瘴気説の理論では、病気は空気や匂いが原因だといわれている。だとすると、貧乏人も金持ちも区別したりはしないはずだ。この家の召使いにしても、家の敷地内に住んでいる者のなかにコレラ患者はいないという。かれらは倉庫の食料を食べ、敷地内の井戸水を飲んでいる。そしてどういう訳か、この生活をするとコレラに罹らない。これは難問だ。この家の人々は、他の人にはない何かがあるのだろうか？」\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]の日記、[TimeKeeper.GetCurrentDate.Format('y')]年コレラ大流行における[SCOPE.sState('panum_disease_state').GetCityHubName]での調査記録より引用。 "
 panum.148.g: "あるいは……召使いには病気をもたらす何かが欠けているのか？"
 panum.149.t: "小さな死"
 panum.149.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]はコレラの調査中、真犯人を発見したかもしれません──正体は微生物です！"
 panum.149.f: "「……しかし私はどうしても確信がほしかった。そこで水のサンプルと、患者の排泄物から慎重に採取したサンプルを準備させた。顕微鏡のガラス板にサンプルを乗せた水を調べる。そして、この戦いの原因をついにとらえた。細菌だ。\n\n「最初の所感では、これらの微生物は無害そうなチューブのように見え、とても凶暴な殺人鬼には思えなかった。しかし患者から採取したサンプルすべてにその存在が確認された以上、この生き物がコレラで何らかの働きをしていると断言していいだろう。あるいはこれが……コレラの正体なのか？その可能性はある。この微生物が病気を引き起こすというなら、病原体説の動かぬ証拠だ。\n\n「しかしいま確かなことは一つある。我々はようやく敵を見つけた。さあ、こいつをやっつけよう」\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]の日記、[TimeKeeper.GetCurrentDate.Format('y')]年コレラ大流行における[SCOPE.sState('panum_disease_state').GetCityHubName]での調査記録より引用。  "
 panum.149.g: "治療し尽くすのだ、この病気が消えるまで"
 panum.149.h: "コレラどころではない大発見だ"
 panum.150.t: "現場の意見"
 panum.150.d: "疫病と戦う[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]博士は、数少ない味方に恵まれました。博士は[SCOPE.sState('panum_disease_state').GetCityHubName]の検死官と面会し、お互いの発見について意見を交わしました。"
 panum.150.f: "「おお、貴方が[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]先生ですか！失礼ながら握手はご遠慮いただきたく。ここ数日、死体に手を入れっぱなしでしたので」\n\n「……いえ、失礼などとは。あなたはこの地域の検死官殿ですね。どうか所見を教えていただきたい」\n\n「知っての通り、コレラは腸の病です。そこからは言うまでもありません。嘔吐や下痢が絶えず、患者の腸管は卵白のような便で一杯になる。先生ほどの知識があるなら、こうした症状についてはご存知でしょうな」\n\n「もちろんです。しかし他に何か気づいた点はありませんか？」\n\n「ふうむ……コレラは瘴気が原因だとされています。空気中に死の原因があると……。しかし正直に言って、私にはそうは思えんのです。もしそうなら、私もとっくに死んでいるはずです。私はね、そこの台でいくつもの死体を見てきましたよ、先生。食あたりしそうな臭いがしますが、コレラにはなっていません」"
 panum.150.g: "とても興味深いお考えです。もっとお話を"
 panum_physician_health_malus_modifier: "不眠不休の働き"
 panum.151.t: "工具工房"
 panum.151.d: "調査の途中、ある工具工房を訪れた[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]博士は、答えを得るどころかますます疑問を深めました。"
 panum.151.f: "「別の日に工具工房を訪ねたときは、私の仮説はますます正しいように思えた。ここの工房はナイフや肉切り包丁などの製作を専門としており、専用の研ぎ場もあった。そこでは刃物の仕上げ用に大量の丸砥石を用いており、それらを水車で動かしていた。工員たちはそれぞれ砥石の近くに腹ばいになって作業したから、水をかぶってもおかしくない。すべて説明がつく。もしこの研ぎ場で働いた人だけがコレラ患者になっていたら、何もかも推測どおりだっただろう。\n\n「しかしおかしな点があった。この工房では、他の場所で見られた傾向に当てはまらなかったのだ。この工房には、コレラ流行の中心地に近い大通りに行ったこともなければ、研ぎ場に足を踏み入れたこともない工員からも、コレラ患者が出ているのだ。いったい何故だ？」\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]の日記、[TimeKeeper.GetCurrentDate.Format('y')]年コレラ大流行における[SCOPE.sState('panum_disease_state').GetCityHubName]での調査記録より引用。  "
 panum.151.g: "手がかりが間違っていたのかもしれない"
 panum.151.h: "仮説が間違っているのかもしれない"
 panum.152.t: "瓶"
 panum.152.d: "残念ながら、[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]博士の調査は行き詰まりました──追っていたのはコレラとは無関係の、とある地域の集団食中毒だったのです。"
 panum.152.f: "「今日は非常に腹立たしい一日だった。とある大衆宿で、突如として病気を訴える人が続出した。すわコレラかと思った警察は、私を呼びつけたのだ。さっそく調査に必要な機材をすべてかき集め、関係各所にも連絡して患者用の病床と医療体制を整えるよう勧告までした。しかし現場についた瞬間、これはコレラではないと分かった。症状が異なるうえ、あまりにも突発的な症状が多い。もっと局所的な原因があるはずだ。そして当然というべきか、患者たちは全員おなじ食事をとっていた。\n\n「キッチンを調べると、原因が分かった。鴨のパテの瓶詰めだ。おそらく期限切れだろう。風邪で瓶詰の腐臭がわからなくなった料理人が、パンにたっぷり塗ったのだ。まさしく時間の無駄だった。これは食あたりであって、コレラではない」\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]の日記、[TimeKeeper.GetCurrentDate.Format('y')]年コレラ大流行における[SCOPE.sState('panum_disease_state').GetCityHubName]での調査記録より引用。  "
 panum.152.g: "……せめて食品棚の確認くらいはお願いします"
 panum.153.t: "ごちゃ混ぜ"
 panum.153.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]博士は調査中にうっかりやらかしました──[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe]はサンプルを混同してしまったのです！"
 panum.153.f: "しかし作業の途中で気を取られてしまった。叫び声、怒号、路上での喧嘩らしき音。酔っ払いの乱闘だった。飲みすぎたのだろう。警官たちはすぐに騒ぎを収めた。酔っ払いは引きずられながらまだ叫んでいた。\n\nほんの一瞬だけ席を立って鎧戸を閉め、すぐに仕事を再開した。私はバカか。サンプルを間違った順番で並べていたのにも気づかないなんて。間違った順番に並べておいて何が研究できるというか。間違った順番で記録でも取るのか？\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]の日記、[TimeKeeper.GetCurrentDate.Format('y')]年コレラ大流行における[SCOPE.sState('panum_disease_state').GetCityHubName]での調査記録より引用。   "
 panum.153.g: "数週間の研究がパアだ。くそったれ"
 panum.154.t: "模倣犯の殺し？"
 panum.154.d: "[SCOPE.sState('panum_disease_state').GetCityHubName]でのコレラ流行の調査はよくない方向に進んでいます──どうやら別の病気が起きているようです！"
 panum.154.f: "「おお、[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]先生ですか。またお会いできて何よりです。先週は検死台にかかりきりで」\n\n「あなたと私が再会するとは喜べませんな、検視官どの。いったい何が？」\n\n「このところ運び込まれる死体が増えまして。最初はコレラが勢いを増したのかとも考えました。その可能性も捨てきれませんが、どうやら違うようでして」\n\n「食中毒ですか？」\n\n「いや、それにしては数が多すぎる。ほとんどが子どもか老人です」\n\n「体力のないコレラ患者の致死率は高い。それでもコレラではないと確信を？」\n\n「静脈の内側に死因が書いている訳ではないので、何とも。赤痢か、コレラか、それともチフスか？はたまたよくある食中毒？誰にも分かりません。わかっているのはただ一つ、見た目が違うということです。コレラ患者のように便が白くない。しかし死因は同じです」\n\n「つまり、第二の疫病が流行っているかもしれないと……畜生、なんてことだ。この2つの病気をどう見分ければいいでしょうか？」\n\n「医者はあなたでしょう。わたしじゃない」"
 panum.154.g: "戦う相手の正体が分からなければ、作戦の立てようもない"
 panum.155.t: "瘴気なのか……？"
 panum.155.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]博士の調査は問題に突き当たりました──ひょっとして、瘴気は実在するのではないでしょうか？"
 panum.155.f: "「……しかしこの最新の調査結果をまとめた図は、病原体説の理論を否定している。私には何故そうなるのかが理解できない。この地域は浅い運河のそばに家が建ち並び、鋳物工場に石炭を運ぶ船が頻繁に行き来している。徒歩圏内の給水ポンプは古いものが1つだけ。さらに市内でも有数の清浄な水が出てくる。\n\n「しかしどうしてかは分からないが、ここでコレラが流行した。すでに住民たちは匂いを避けようとしている。この辺りの匂い、すなわち瘴気は確かに強い。運河からは排泄物混じりの匂いが漂ってくる……しかし住民たちは運河の水は飲んでいない。なら住民たちを害するものが、匂い以外にあり得るだろうか？」\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]の日記、[TimeKeeper.GetCurrentDate.Format('y')]年コレラ大流行における[SCOPE.sState('panum_disease_state').GetCityHubName]での調査記録より引用。"
 panum.155.g: "瘴気説は誤りである……だかしかし？"
 panum.156.t: "解体"
 panum.156.d: "建設はますます加速し、[SCOPE.sState('panum_disease_state').GetCityHubName]での開発は止まりません。[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]博士の調査にも影響しています。"
 panum.156.f: "「……だからアンタ誰よ？」\n\n「この地域の疫病を調べている医者です。この通りにはそこら中に病人がいたはずです。今どこにいるんですか？」\n\n「オレが知るかよ。オレたちも今しがたココに来たんだ。ここらへんの家を取り壊せって」\n\n「取り壊すですって！？ここには何十世帯も暮らしていた！全員コレラに罹患していたんですよ！」\n\n「そう、もう居ねえけどな。地主さんが家から退去させたからな」\n\n「な、なんですって！？」\n\n「だから、おん出したの！これじゃ家賃払えないけど、もう関係ねえんだと。地主さんはここに紡績工場を建てるらしいから。もういいかい？これからオレと若い衆で取り壊し作業始めるからよ」"
 panum.156.g: "ああなんてことを。またイチから患者を探さないと……どうか何も飲まないでくださいね"
 panum.157.t: "感染"
 panum.157.d: "大変です！医師がコレラに罹患しました！"
 panum.157.f: "「どうしてこうなったのか分からない。瘴気のせいか？もう何週間、ひょっとすると数ヶ月は患者や死体、瀕死の患者のところにいた。病原体のせいか？水は飲んでいない。しかし汚染の可能性は？触っただけで拡散しうるのか？空気中、あるいは皮膚に病気の原因があるのか？分からない\n\n「しかしこの症状は知っている。胃の吐き気が止まらない。しばらくは何も飲み食いしないほうがいいかもしれない。こうした諸々の証拠が、ひとつの事実を物語っている\n\n「わたしはコレラに罹った」\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]の日記、[TimeKeeper.GetCurrentDate.Format('y')]年コレラ大流行における[SCOPE.sState('panum_disease_state').GetCityHubName]での調査記録より引用。"
 panum.157.g: "なんと。[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe]の1日も早い回復を祈ろう"
 panum.161.t: "一杯のジン"
 panum.161.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]博士はしばし仕事から離れ、別の「調査」に没頭しています──お酒です。"
 panum.161.f: "「……至高の飲み物の2杯目を傾けていると、ある考えが頭に浮かんだ。ここで飲む人が多くなるほど、コレラに罹る確率が減ると。いや、その通りじゃないか！わたしがまとめた地図によると、この酒場に隣接する一帯に限って、コレラに罹患する確率が劇的に減少しているのだ。\n\n「ここには何らかのパターンがあると直感した。マスターや好意的な地元住民たちにこのことを話してみると、やはり彼らも同意してくれた。ここには病気を撃退する何かがある。もっと調べなければ」\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]の日記、[TimeKeeper.GetCurrentDate.Format('y')]年コレラ大流行における[SCOPE.sState('panum_disease_state').GetCityHubName]での調査記録より引用。  "
 panum.161.g: "おお、仕事と趣味が一つになる喜びよ"
 panum.162.t: "一気飲み"
 panum.162.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]博士は大胆極まりない行動に出ました──[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe]はコレラに汚染された水をみずから飲んだのです！"
 panum.162.f: "「……当たり前のことだが、世界最高の仮説も実践がなければ無意味だ。わたしの研究成果を偶然のひとことで片づける連中がいる。わたしの考えを補強する、反駁しえない決定的証拠などないと言い続けているのだ。いいだろう。わたしは連中に真正面から、そしてもっとも直接的な方法でぶつかってやる。今回の流行の中心地から採取し、慎重に運んできたこの水を飲んでやる。批判が正しければ、流行の中心地から離れた水を飲んでも病気にはならないはずだ。わたしが正しければ、わたしは命をかけてこの病気と闘うことになる。しかしひとりの命がどうした。わたしの主張が正しければ、大勢の人が救われるのを思えば、なんてことはない。\n\n「では、わが最愛の日記よ。健康に乾杯」\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]の日記、[TimeKeeper.GetCurrentDate.Format('y')]年コレラ大流行における[SCOPE.sState('panum_disease_state').GetCityHubName]での調査記録より引用。   "
 panum.162.g: "「おお、なんてことだ、これは……まずい」"
 panum.162.h: "博士に馬鹿なことはやめるよう説き伏せろ！"
 panum.163.t: "成功につながる地図"
 panum.163.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]博士は流行の中心地区の詳細な地図を作りました。これで病気の追跡調査がやりやすくなります。"
 panum.163.f: "「皆さん。こちらにあるのが[SCOPE.sState('panum_disease_state').GetName]の感染情報をまとめた地図です。ここには域内で疫病が発生した場所、発生した時刻と日付、犠牲者の名前や人数などを詳しく記しました。この部分は近隣地域でコレラが流行してからの推移を時系列順にまとめた表です。例えばここを見れば、徒歩圏内にある給水ポンプや家の数がわかります。\n\n「そしてこの地図をもとに情報を集計した表がこちらです。皆さんが見てもらえばわかる通り、この給水ポンプが稼働しているエリアだけ致死率が非常に高いのです。ここの表を見てください。[SCOPE.sState('panum_disease_state').GetName]・ウェルズ水道社のポンプと直接的な相関関係にあることがわかります。すなわちこの会社が水道を供給している地域は、すべてコレラ感染のリスクが最も高い場所なのです……」"
 panum.163.g: "いつかこれも一つの科学になる"
 panum.164.t: "怒りの炎"
 panum.164.d: "[SCOPE.sState('panum_disease_state').GetName]でのコレラ対策は遅々として進んでおらず、[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]博士は堪忍袋の緒が切れました。"
 panum.164.f: "怒号は1ブロック先先からも聞こえ、テーブルから本やカップを投げつける音はドアの外にまで響いた。罵倒、殺気立った声、怯えきった助手の釈明が飛び交う。またしても怒号が響き、そして静かになった。\n\n「この馬鹿モノ！どうしようもない愚か者め！我々がどうしてここにいるか考えろ！ドアの外では今にも死にそうな人たちがいる！我々に助けを求めているんだ！我々がやらずに誰がやるんだ！」\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]博士は拳を振り回した。\n\n「お前たちが単純な規則にも従えないなら、ここから立ち去れ！やれるなら私の命令に従え！我々は、必ずこの忌まわしい疫学を退治しなくてはならんだ！分かったか！？」\n\n「はい！先生！」\n\n「じゃあ戻れ！戻ってもっとサンプルを集めてこい！正しいサンプルだぞ！いいな！」"
 panum.164.g: "医師は軍を指揮し、病との戦いに挑む"
 panum.165.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]博士は持ち前の勇敢さを発揮しました。[SCOPE.sState('panum_disease_state').GetCityHubName]でもっとも感染が広がっている病院を訪れ、患者に聞き取り調査をしたのです。"
 panum.165.f: "この仮設病院には患者がぎゅうぎゅうに押し込められていた。視界や音、そして何より匂いが充満している。これは病気の匂いだ。死の匂いだ。悪臭を抑えるために花やお香が添えられていたが、それでもこの地獄の館を訪れるものはほとんどいなかった。みな口々に危険すぎる、あまりにも健康に悪すぎると言った。自分たちまで病床で死を待つ身になったら、誰が患者を救えるのかと。\n\nそれでも訪れる一団がいた。[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]博士もそのひとりだ。視察団は死体と瀕死の病人があふれる病棟を、底なしの勇敢さでぐんぐんと進んでいく。一人ひとりの患者のそばに座って話を聞き取り、それをメモに残した。どんな話や感想も貴重だった。すべては救済の手がかりであり、この病気の原因や死に至る症状を探るヒントとなった。"
 panum.165.g: "そしてこの死の広間を、命を救う天使が日記を片手に歩いた"
 panum.166.t: "祈りの力"
 panum.166.d_christian: "手がかり、あるいは休息できる場所を探していた[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]博士は、地元の教会の司祭に面会しました。"
 panum.166.d_muslim: "手がかり、あるいは休息できる場所を探していた[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]博士は、地元のモスクのイマームに面会しました。"
 panum.166.d_other: "手がかり、あるいは休息できる場所を探していた[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]博士は、地元の宗教施設の聖職者に面会しました。"
 panum.166.f_christian: "「初めまして、神父さま。わたしは[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]博士、今回の流行を調査するために首都からやってきました。できることは何でも協力させていただきます。これからいくつか質問させていただきます。この流行を食い止めるために、どうかお力添えをお願いします」\n\n「わたしは神ならぬ一介の司祭ですが、お役に立てるならば。どうぞ、神の子よ。何をお聞きになりたいのですか？」\n\n「この流行が広がった最初の数日間のことについて、神父さまが知っていることを教えてください。最初の患者のこと。どこに住んでいたのか。原因は何か。思い当たることがあればなんでも教えて頂きたいのです」\n\n「神のみぞ知る、としかお答えできない質問もございますな。ですが、信徒についてはよく知っています。さあ、こちらにどうぞ。わたしも自分なりに出来事をまとめて記していますので」"
 panum.166.f_muslim: "「アッサラーム・アライクム、イマームどの。わたしは[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]博士、今回の流行を調査するために首都からやってきました。できることは何でも協力させていただきます。これからいくつか質問させていただきます。この流行を食い止めるために、どうかお力添えをお願いします」\n\n「わたしは神ならぬ一介の導師ですが、お役に立てるならば。何をお聞きになりたいのですか？」\n\n「この流行が広がった最初の数日間のことについて、あなたが知っていることを教えてください。最初の患者のこと。どこに住んでいたのか。原因は何か。思い当たることがあればなんでも教えて頂きたいのです」\n\n「アッラーのみぞ知る、としかお答えできない質問もございますな。ですが、信徒についてはよく知っています。さあ、こちらにどうぞ。わたしも自分なりに出来事をまとめて記していますので」"
 panum.166.f_other: "「初めまして、司祭どの。わたしは[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]博士、今回の流行を調査するために首都からやってきました。できることは何でも協力させていただきます。これからいくつか質問させていただきます。この流行を食い止めるために、どうかお力添えをお願いします」\n\n「わたしは神ならぬこの寺院の管理人にすぎませんが、お役に立てるならば。どうぞ、博士。何をお聞きになりたいのですか？」\n\n「この流行が広がった最初の数日間のことについて、あなたが知っていることを教えてください。最初の患者のこと。どこに住んでいたのか。原因は何か。思い当たることがあればなんでも教えて頂きたいのです」\n\n「神のみぞ知る、としかお答えできない質問もございますな。ですが、この地域の人々についてはよく知っています。さあ、こちらにどうぞ。わたしも自分なりに出来事をまとめて記していますので」"
 panum.166.g_christian: "清潔は信心の次に重要だ"
 panum.166.g_muslim: "如何なる病にも治す方法がある"
 panum.166.g_other: "利と不利との二の道を知るべし"
 panum.167.t: "後悔先に立たず"
 panum.167.d: "調査を安全に進めるため、[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]博士は患者から隔離された環境に身を置いています。"
 panum.167.f: "「これを臆病と言う人もいるだろう。わたしに言わせれば現実主義だ。これは一気に敵の急所を指して、そのまますぐに勝てるような戦いとは訳が違う。厳しい戦いになる。敵は見えもしなければ聞こえもしない。しかしそこら辺にいるのだ。\n\n「適切な防護策を取らないなど愚の骨頂だ。隔離こそが最高のカギなのだ。食事や飲み水は安全な場所から用意し、清潔な場所で研究をする。患者とのやり取りや持ち物の調査などは、すべて間に第三者を入れる。病気から離れれば、安全に研究ができる。気兼ねなく病気の正体をつきとめることができるのだ」\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]の日記、[TimeKeeper.GetCurrentDate.Format('y')]年コレラ大流行における[SCOPE.sState('panum_disease_state').GetCityHubName]での調査記録より引用。   "
 panum.167.g: "……しかし[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe]もいずれ自分の手を汚す日が来る"
 panum.168.t: "不眠不休の働き"
 panum.168.d: "コレラ流行の原因をつきとめようとする[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]博士の決意は固く、夜遅くまで働くほどです。"
 panum.168.g: "それでは、ぜひ一緒についてきてください、巡査どの"
 je_panum_cholera_treatment_goal: ""
 je_panum_germ_theory: "病原体と瘴気"
 je_panum_germ_theory_reason: "瘴気説とは、地面の有毒物質が空気に乗って広がり、疫病の流行をもたらすという考え方で、古代ギリシャのヒポクラテスが提唱したといわれています。19世紀はまだ細菌やウイルスについてほとんど分かっておらず、医師や研究者もコレラなどの伝染病は悪臭等の「瘴気（ミアズマ）」によって拡散すると考えていました。やがて医学の発展によって瘴気説が誤りであると証明されましたが、19世紀時点で瘴気説は流行病の原因・拡散経路について一定の説明モデルがありました。ヒトからヒトへの接触感染を主張する「感染（コンダキオン）説」派と、瘴気説を支持する反感染説派の対立は19世紀の中頃まで続きました。ロンドンでは瘴気説の欠点がすでに指摘されていましたが、瘴気対策として清掃や隔離などの予防措置が取られていました。誤った前提に基づいた対策ではあったものの、感染抑止に一定の効果をあげていました。\n\n病原体説に十分な証拠が集まり、瘴気説が否定された国では、治療法の研究や疫病の流行時にバッドイベントが発生する確率が減少します。また世界ではじめて病原体を発見した国は追加の研究ボーナスを獲得します。"
 je_panum_germ_theory_goal: ""
 notification_panum_germ_theory_notification_name: "病原体説のブレイクスルー"
 notification_panum_germ_theory_notification_desc: "[GetGlobalVariable('panum_germ_theory_invented_global_var').GetCountryDefinition.GetName]の[concept_panum_physician]が、世界ではじめて病原体説の正しさを完璧に立証しました。瘴気説は完全に否定されました。"
 panum.11.t: "病原体説"
 panum.11.d: "病原体説には膨大な傍証が、そして瘴気説には同じく膨大な反証が集まり、医学は大きな転換点をむかえました。いまや病原体説は完全に立証されました。[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]博士のおかげです。"
 panum.11.f: "The miasma theory is a typical example of a scientific thesis that is difficult to refute, as it is presumably confirmed everywhere. The fact that cleaning and hygiene regulations for 'clean air' ensured that some diseases actually disappeared seemed to be confirmed in the 19th century. At the same time, it prevented medical science from making breakthroughs in a wide variety of fields because the true causes and thus the actual healing methods remained unknown. From now on, doctors will have greater success in finding treatment methods - and the path is clear for research into pathogens and vaccines."
 panum.11.g: "But did we really want to know what goes on in the water...?"
 panum.53.t: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]博士が疫病地帯へ出発"
 panum.53.f: "病気との戦いでもっとも重要なステップが治療法の発明です。今後のワクチン開発に繋がれば、疫病を予防することができます。それに治療法を発明するだけでも、これからの疫病の規模や期間を大幅に抑えて病気を封じ込めることができます。犠牲者も大きく減少します。医師は海外に派遣するよりも、国内で研究させるほうが研究期間が短くなります。"
 panum.53.g: "この恐るべき病に終止符を！"
 panum.54.t: "医療研究遠征"
 panum.54.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]博士は国外の流行病を徹底的に調べて新しい治療法を探るべく、専門家や助手からなる少人数のチームを率いて出発しようとしています。問題は、どの国のどの病気を調べるかです。"
 notification_panum_epidemic_spread_notification_name: "疫病の拡大"
 notification_panum_epidemic_spread_notification_desc: "最善を尽くしているものの、他の州に疫病が広がっている。"
