 je_panum_military_medicine_project_reason: "Military physicians and Red Cross medics have the unique opportunity to improve medical care on the battlefield and thereby save many lives - and possibly decide a war. Depending on character traits and experience, this improvement occurs at different speeds. After [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] military medical reform, a [concept_mobilization_option] or a higher tier will be unlocked."
