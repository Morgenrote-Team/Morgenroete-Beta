 panum_congress_host_modifier: "医学会議の開催"
 panum_congress_attend_modifier: "医学会議への出席"
 panum.2000.t: "医学会議の準備"
 panum.2000.d: "次回の万国医学会議はわが国で開催されます。それに先立って、特定の病気を大きく取り上げるのか否かが問題となっています。"
 panum.2000.f: "医学会議の主催国は、概論を持っている病気にフォーカスすることができます。会議はひとつの病気につき1回だけ開催することができます。医師と微生物学者は追加の手がかりを獲得し、研究期間を短縮することができます。どの病気にもフォーカスせずに会議を開催した場合は、参加国は学術進捗のボーナスだけ得ることができます。"
 panum.2000.g: "今回は医学全般を扱う会議にしよう"
 panum.2001.t: "医学会議"
 panum.2001.d: "首都では世界中の医学の専門家たちによる会議の準備が行われています。[ROOT.Var('panum_physician_var').GetCharacter.GetFullName]は議長として会議をすすめます。[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_congress_title')]"
 panum.2001.f: "医学会議は各国の医療知識を交換するまたとないチャンスです。これまで一国が独占してきた業績を、ここでは兄弟のように共有しあうのです。医学会議を主催できるのは医師だけですが、微生物学専門の生物学者も招待され、病原体やワクチン分野の知識を共有することができます。医師と微生物学者がいれば2人とも会議に参加できます。"
 panum.2001.g: "招待状を送れ！"
 panum.2002.t: "医学会議の招待状"
 panum.2002.d: "[SCOPE.sCountry('panum_congress_host_country').GetName]は医学先進各国に招待状を送り、首都で国際会議を開こうとしています。医師と微生物学者が招待されています。[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_congress_title')]"
 panum.2002.g: "聴診器と顕微鏡は持ったな？"
 panum.2003.t: "概説と治療法"
 panum.2003.d: "[SCOPE.sCountry('panum_congress_host_country').GetName]の医学会議に出席中の[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]博士は、いずれかの疫病について画期的な知見を得ることができる千載一遇の好機を迎えています。どの病気について調べましょう？"
 panum.2003.f: "他国が疫病が概論や治療法を発見して、かつ別の国が未発見だった場合、会議に参加した国はそれらを学ぶことができます。ひとつの疫病につき1回だけしか手がかりを得ることができます。会議に新しい知識を得ることができなくても、全般的な知識を涵養して医学技術を発展させることができます。医師が出席するかどうががこの会議の分かれ目となります。"
 panum.2003.g: "博士は各国の医師から幅広い医療知識を吸収するべきだ"
 panum.2003.h: "コレラ"
 panum.2003.i: "結核"
 panum.2003.j: "天然痘"
 panum.2003.k: "チフス"
 panum.2003.l: "黄熱"
 panum.2003.m: "麻疹"
 panum.2003.n: "猩紅熱"
 panum.2003.o: "ペスト"
 panum.2003.p: "ジフテリア"
 panum.2003.q: "ポリオ"
 panum.2004.t: "病原体とワクチン"
 panum.2004.d: "[SCOPE.sCountry('panum_congress_host_country').GetName]会議に出席した[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]博士は、同じ志をもった世界中の医師たちに巡り合うというすばらしい機会を得ました。博士たちはみな、微生物学についての知見を積極的に交換しようとしています。問題はただひとつ、[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe]が今後さらに研究を進めたい病気はどれだろうか？"
 panum.2004.f: "ある国が疫病の病原体やワクチンを発見して、かつ別の国が未発見だった場合、会議に参加した国はそれらを学ぶことができます。ひとつの疫病につき1回だけしか手がかりを得ることができます。会議に新しい知識を得ることができなくても、全般的な知識を涵養して生物学技術を発展させることができます。生物学者が出席するかどうががこの会議の分かれ目となります。"
 panum.2004.g: "先生は各国の生物学者から幅広い生物学知識を吸収するべきだ"
 panum.2005.t: "医療の展望"
 panum.2005.d_general: "会議に参加した医師や生物学者らは、これからの医療をになう医学生の教育過程の近代化と改革を進めることを決議し、このことを記した共同宣言を作成しました。"
 panum.2005.d_special: "医師や生物学者たちは、今後数年間は会議の主なテーマとなった病気との戦いに全力を投じることを採択しました。"
 panum.2005.f: "医学会議のはじめに特定の病気を大きく取り上げた場合、すべての参加国はこの病気について追加の手がかりを得ます。医師か微生物学者、あるいは両者とも出席しているかに応じて獲得量は変わります。特定のテーマがない場合は、新しい医療スタッフの育成がフォーカスされます。"
 panum.2005.g: "意義深い会議だった"
 panum.2009.t: "医学会議の閉会"
 panum.2009.d: "昨日、[SCOPE.sCountry('panum_congress_host_country').GetName]医学会議が閉会しました。医師と微生物学者たちは多くの発見をたずさえて帰路につきました。"
 panum.2009.f: "万国医学会議（仏: Congrès International de Médecine）は、1867年から1913年にかけて定期的に開催された世界的な医学会議。発案されたのは、1865年の第三回フランス医学会議の席上のことでした。アンリ・ジュトラク教授は1867年の万国博覧会で世界中の医師や外科医がパリに集まることを利用して、同年に国際的な医学会議を開催しました。"
 panum.2009.g: "ビュッフェを気に入ってくれたらいいが"
 panum_surgeon: "外科医"
 panum_surgeon_desc: "外科医は日常的な医療にも精通していますが、医学や解剖学の研究・論文作成でも活躍します。"
 panum_psychiatrist: "精神科医"
 panum_psychiatrist_desc: "精神科医は心を病んだ人々を治療したり、精神医療分野の研究や新たな治療法の発明に向いています。"
 panum_military_physician: "軍医"
 panum_military_physician_desc: "この医師は戦場での負傷者の治療を専門としており、なかでも応急処置の改善に成果をあげています。"
