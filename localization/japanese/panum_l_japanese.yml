 panum.301.t: "Smallpox spreads to [SCOPE.sState('panum_disease_state').GetName]"
 panum.301.d: "According to the latest reports, smallpox disease is now also rampant in [SCOPE.sState('panum_disease_state').GetName]. Our efforts to stop the epidemic have been unsuccessful."
 panum.301.g: "Smallpox everywhere!"
 panum.302.t: "Smallpox epidemic reaches [SCOPE.sCountry('panum_infected_country').GetName]"
 panum.302.d: "We have received reports that the first cases of smallpox were reported in [SCOPE.sCountry('panum_infected_country').GetName] today. The authorities blame us for not doing enough to prevent the spread."
 panum.302.g: "Who could have guessed that...?"
 panum.303.t: "天然痘の爆発的拡大"
 panum.303.d: "[SCOPE.sState('panum_disease_state').GetName]の医療体制は崩壊寸前です。すでに医師たちは感染するリスクを恐れて地域から離れました。残念ながら、この地域の死者数は上方修正せざるを得ないでしょう。"
 panum.303.f: "「各部族における犠牲者数の試算は出ておらず、精確な数値を推測するのも不可能である。ミズーリ川上流のインディアンが17200人。その2倍と仮定すれば、ロッキー山脈東部の推定死者数はそれほど多くはないと思われる」"
 panum.303.g: "この恐ろしい病を治す方法はないのか？"
 panum.401.t: "Typhus spreads to [SCOPE.sState('panum_disease_state').GetName]"
 panum.401.d: "The dangerous typhus has apparently spread to another state. Reports from [SCOPE.sState('panum_disease_state').GetName] suggest that more and more people are falling victim to the disease."
 panum.401.g: "Typhus seems unstoppable ..."
 panum.402.t: "堕落の病？"
 panum.402.d: "チフスとは何か。その原因や有効な対策についての知識が限られているため、病気が広がる原因についても様々な意見が乱立しています。有力な仮説は人から人へ感染する病気ではなく、生活水準が関係しているというものです。"
 panum.402.f: "かつての結核同様、チフスもまた伝染病ではないというのが医学界の定説でした。結核はロマンチックで「高貴な」精神の病として扱われるなど、ほとんど美化されていましたが、かたやチフスはモラルが欠如している証として敬遠されました。上流階級にチフス患者が少なかった事実も、こうした考えを後押ししました。中世において病気は神の権能や罰が原因であるとの考えが散見されたように、患者個人の性格や自堕落な生活によって特定の病気にかかるというのは、自明の理であると思われていました。こうした考え方が変わるのは、19世紀後半になってからです。"
 panum.402.g: "犯罪者や娼婦、だらしのない兵士にチフス患者が多いのも納得だ"
 panum.402.h: "患者がどんな人間かよりも、どこに住んでいるかが大事なのではなかろうか"
 panum.403.t: "封じ込め"
 panum.403.d: "中・上流階級の一部を中心に、下層階級のチフス患者専用の施設を作ろうとする動きがあります。この施設は「発熱小屋」と称され、非営利団体によって運営される予定です。しかし下層階級出身の議員は、この裏には治療というよりも排除の論理が働いていると考えています。政府内の一部メンバーは徹底的な隔離措置を求めていますが、中産階級を中心にやり過ぎだという反論もあります。"
 panum.403.f: "多くの疫病同様、チフス患者も隔離されました。そのため広範囲にわたる検疫措置を実施しようとすると、ほとんど反対されました。当時は遺伝する病気と考える人が多く、決まった人しか発病しないと思われていたからです。しかし万が一にも感染するかもしれない、という不安は根強く、そのため各地でチフス患者を収容する「発熱小屋」が建てられました。1847年の北アメリカでのチフス大流行時、チフスは伝染病であるという考えが一気に広まり、そのためアイルランド系移民の患者は手当たり次第に「発熱小屋」へと体よく収容されました。"
 panum.403.g: "流行している地域をまとめて隔離すべきだ"
 panum.403.h: "チフスで苦しむ人々に専用の家を"
 panum.403.i: "チフスは伝染病ではない、だから隔離などナンセンスだ"
 panum.404.t: "不潔な小屋"
 panum.404.d: "いわゆる「発熱小屋」は糞便と患者をすし詰めにした棺桶と化しており、こうした内情は[SCOPE.sState('panum_disease_state').GetName]における深刻な問題となっています。聖職者や介護人からも、このおぞましい小屋を解体するよう求める嘆願書が届いています。"
 panum.404.f: "「発熱小屋」は不潔で、しかも過密状態です。患者は2段ベッドを使っているため、上段の汚物が下段に垂れています。上院委員会の報告によると、年齢や性別もバラバラな2～3名の患者が1つのベッドに押し込まれています。パンもありません。食事は1日3食、お茶と薄い粥にスープです。飲み水は他所から運ばねばならず、熱病患者にはまったく足りない量です。カトリック教会のモイラン神父の報告では、小屋の患者に水を与えたところ、実に18時間も水を飲めなかったとの証言があったと書かれています。もともと熱病患者を収容する建物ではなかったため、換気も不十分です。新しい小屋には便所すらありません。上院委員会の最終声明によると、人員やスペースが足りないため、患者たちは何日も自分の排泄物にまみれて過ごしており、また夜中に亡くなった患者を運び出そうにもスタッフが圧倒的に不足しているとのことです。"
 panum.404.g: "これ以上感染を広げる危険は冒せない"
 panum.404.h: "チフス患者の入院環境を改善し、医療的な支援を与えよ"
 panum.404.i: "非人道的な小屋は解体すべし"
 panum.405.t: "発熱小屋での暴動"
 panum.405.d: "[SCOPE.sState('panum_disease_state').GetName]ではチフスの蔓延を恐れるあまり、一部の市民が暴徒化してしまいました。暴徒たちは発熱小屋に押しかけ、患者たちを近くの川に投げ捨てようとしているという噂が広がっています！"
 panum.405.f: "1847年、モントリオールには22の発熱小屋があり、患者が逃げられないように兵士たちが警護していました。暴徒たちがチフス患者を川に投げ捨てようと押し寄せると、モントリオール市長ジョン・イーストン・ミルズは暴徒を鎮圧。そして自らも看護師として志願し、患者に水を与えたり寝具を交換しました。ミルズはその年の11月に亡くなりました。"
 panum.405.g: "国内でこんな野蛮な行動を看過できない！"
 panum.405.h: "彼らはどうせ死ぬのだ"
 panum.406.t: "放置された遺体"
 panum.406.d: "[SCOPE.sState('panum_disease_state').GetName]では死者数が急激に上昇しつづけ、埋葬業者が間に合わないほどです。死体をそのままにしておくと更なる問題を招きかねず、危険な状態です。"
 panum.406.f: "1860年代、当時のフィンランド大公国では例年にない悪天候によって凶作が続き、飢餓や疫病を引き起こしました。1866年から68年は飢饉が深刻化し、チフスによって27万人が亡くなったと考えられています。"
 panum.406.g: "この問題を深刻化させぬよう、あらゆる手を尽くせ"
 panum.406.h: "通例どおり集団墓地を掘ればいい"
 panum.406.i: "我々の力にも限界がある、自分でどうにかしろ！"
 panum.407.t: "兵舎でのチフス流行"
 panum.407.d: "現在、[SCOPE.sState('panum_disease_state').GetName]の軍事施設でチフスが流行しています。すでに多くの犠牲者が出ています。"
 panum.407.f: "多くの歴史研究家は、ナポレオンがロシア遠征を断念したのは本当の理由はチフスであると考えています。ナポレオンの軍隊を襲ったのは飢えや寒さ以上にチフスの蔓延だったのです。アメリカ南北戦争でもチフスは猛威を振るい、また当時「キャンプ熱」と呼ばれた腸チフスも蔓延しました。1853～56年のクリミア戦争でも、およそ90万人が発疹チフスに罹患しました。第一次世界大戦（1914～18年）では、それまでほとんど感染者の出なかったポーランドや周辺諸国でもチフスが流行しました。チフスは東部戦線で特に犠牲者をだし、セルビアだけでも15万人が亡くなりました。発病してからの致死率はおよそ10～40％で、看護師の主な死因でもありました。"
 panum.407.g: "どんな軍隊よりも恐ろしい、見えない敵か……"
 panum.408.t: "戦争ではなく、病気で死ぬ"
 panum.408.d: "わが国の兵舎で発生したチフスは日を追うごとに広がっています。いまや[SCOPE.sState('panum_disease_state').GetName]で最も多くの犠牲者を出しているのは兵士たちです。ここに敵の影が一切ないにもかかわらずです。"
 panum.408.f: "「戦争は冒険ではない。疫病だ。それはチフスに似ている」\n──アントワーヌ・ド・サン＝テグジュペリ"
 panum.408.g: "恐ろしい！"
 panum.501.t: "Yellow Fever spreads to [SCOPE.sState('panum_disease_state').GetName]"
 panum.501.d: "Reports of new cases of yellow fever have confirmed our worst fears. The disease is now also raging in [SCOPE.sState('panum_disease_state').GetName]!"
 panum.501.g: "Why wasn't it possible to stop this?"
 panum.502.t: "伝染病なのか？"
 panum.502.d: "黄熱が伝染病なのか、それとも別の原因があるのかは定かではありません。しかし安全を求める多くの市民は、拡散を防ぐために隔離措置を求めています。もし実施しなければ、住民の要求に対して無知や無関心であると思われるでしょう。"
 panum.502.f: "17世紀に初めて黄熱が流行するとパニックや混乱を引き起こしました。18世紀になっても、発病する原因についてはハッキリとした定説はありませんでした。政府や個人レベルでさまざまな予防措置や治療法が発案されましたが、どれも成功しませんでした。黄熱への恐怖からさらなる拡大を防ぐことが何より優先され、実験的な施策や厳しい措置を試す余裕もなかったのです。そのため医学的な根拠よりも、住民の不満を抑える心理的な効果が優先されることもありました。"
 panum.502.g: "伝染病であるという証拠はない"
 panum.503.t: "黄熱がプランテーションに影響"
 panum.503.d: "[SCOPE.sState('panum_disease_state').GetName]のプランテーションでは、黄熱患者が特に多いとの報告が日夜寄せられています。ある政府顧問は、流行を抑えるためにプランテーションでの労働を完全にやめるべきだと提言しています。"
 panum.503.f: "「サンプソンという哀れな黒人がいた。彼は病に苦しむ家々をひっきりなしに訪ね歩いた。誰の助けも借りず、報酬や見返りも求めなかった。やがてサンプソンは病気にかかって亡くなった。残された一家に対して、かつてサンプソンが助けた人々は何もしなかった。サラ・バスという哀れな未亡人がいた。彼女はいくつの家庭にできる限り手を差し伸べたが、何の見返りも求めなかった。何かお礼をと言われても、サラは相手に任せていた」\n──リチャード・アレン"
 panum.503.g: "労働者を追い出せ！"
 panum.503.h: "何があってもプランテーションを止めるな！"
 panum.504.t: "撤退"
 panum.504.d: "[SCOPE.sState('panum_disease_state').GetName]の医療状況は悪化し続けています。現地の政府メンバーや役人らは、市内から退避して地方に行政府を移転したいと願い出ています。賢明な判断だという声もあれば、単なる臆病風だという意見もあります。"
 panum.504.f: "1793年のフィラデルフィアでは黄熱が流行し、記録に残るだけでも8月1日から11月9日までの間に5000人以上が死亡しました。死因のほとんどが黄熱でした。当時5万人都市だったフィラデルフィアで起きたこの黄熱は、アメリカ史上でも最悪の流行として記録されています。9月末までに2万人が街を離れ、連邦政府の議員や行政府職員も撤退しました。11月後半に流行が終息してからも、市民のほとんどは戻りませんでした。当時の大統領ジョージ・ワシントンは市内を離れてマウントバーノンの邸宅に移りました。犠牲者数は10月にピークに達し、その後気温が下がったことで蚊がようやく姿を消し、黄熱は終息しました、近隣の町では、黄熱を持ち込まれるのを恐れてフィラデルフィアからの避難民受け入れを拒否する所もありました。ニューヨークはフィラデルフィアの財政援助をしましたが、それでもボルチモアなどの主要な港町と足並みをそろえてフィラデルフィアからの難民や物品を隔離しました。"
 panum.504.g: "現地当局を撤退させる"
 panum.504.h: "地元当局が潰走してはならん"
 panum.505.t: "黄熱が兵舎に広がる"
 panum.505.d: "現在、[SCOPE.sState('panum_disease_state').GetName]の軍事施設で黄熱が流行しています。すでに多くの犠牲者が出ています。"
 panum.505.f: "18世紀末から19世紀のハイチ反乱軍、20世紀初頭のキューバ反乱軍にとって、ヨーロッパ諸国の植民地軍との戦争でもっとも心強い味方が黄熱でした。キューバ独立闘争の指導者は「6月、7月、8月の無敵将軍」という言葉を残しています。この時期は雨季で、蚊が大量発生するのです。イギリスも1741年のカルタヘナ包囲戦で同じ教訓を得ました。当時、29000名のイギリス軍兵士がカルタヘナ要塞を包囲しました。それから現地が雨季に入ると、わずか数週間で22000名が黄熱に感染して亡くなりました。同じイギリス軍でも、ジャマイカとカナダでは死亡率で7対1もの差がありました。これはおもに黄熱などの熱帯地域の風土病が原因だとされています。"
 panum.505.g: "ダメだ！彼らは戦場で名誉の戦死を遂げる定めなのだ！"
 panum.506.t: "水夫の病気"
 panum.506.d: "[SCOPE.sState('panum_disease_state').GetName]では黄熱によって港湾施設が事実上ストップしています。また港湾労働者や船員に黄熱患者が続出しています。さらに多くの船が呪われた地としてこの港を避けているのです。"
 panum.506.f: "「ニューオリンズでは、黄熱によって恐ろしい被害が広がっている。すでに数千人が亡くなり、毎日200人もの死者が出ている有様だ。死体を埋めるのは、時給1ギニーで雇われた黒人の囚人労働者たちだ。墓堀り人たちの歌や卑猥な冗談。ハエのブンブンという音。菓子売り女の朗々とした呼び込み。死体を載せた荷車を引く男たちのかすれた声。少年たちの陽気な口笛。黒焦げの死体の山から立ち込める悪臭。日が沈むと埋葬場所の仕事は終わり、夜のとばりが下りる。その横で、娯楽やレガッタ、舞踏会はいつも通りに行われている。死の町と化したこの町に疫病など流行っていないかのようにふるまっている」\n──ケンブリッジ・ウィークリー・ニュース、1853年"
 panum.506.g: "海運はもう滅茶苦茶だ！"
 panum.507.t: "黒い嘔吐"
 panum.507.d: "[SCOPE.sState('panum_disease_state').GetName]では、黄熱は予想を上回るスピードで広がっています。医師たちの報告でも、黄熱の死者数は以前よりも上がっていると指摘されています。"
 panum.507.f: "「外出する者は、酢や樟脳をしみこませたハンカチとかスポンジで鼻を覆ったり、泥棒の酢がたっぷり入った匂い瓶を携えている。ほかにもタールを塗ったロープを手やポケットに入れたり、首に樟脳袋を巻いている……。霊柩車が近づいてくると、人々はあわてて進路を変えた。死人が出た家から病気をもらうのを避けようと、みな歩道ではなく道の真ん中を歩いている。道端で知人や友人に出くわしたりしても、冷たい会釈で挨拶するだけ。握手などという古い慣習はもはや廃れてしまい、手を差し出そうものなら恐怖のあまり後ずさる人がほとんどだ。喪服を着ている人、あるいは喪服のような格好をしている人を見ると、まるで毒蛇のように無視された」\n──マシュー・キャリー"
 panum.507.g: "いつになったらこの疫病から解放されるんだ？"
