 je_panum_measles_description_reason: "現在、[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]博士は#YELLOW 麻疹#!の症状を特定するべく、[SCOPE.sState('panum_disease_state').GetName]で多くの患者を診断しています。これは非常に大事なステップであり、類似したり併発する病気と区別することができるようになります。博士は診断を終えると研究結果を世間に公開します。次の世代は病気の原因をより深く理解できるようになり、治療法が見つけることができるでしょう。"
