 panum.201.t: "Tuberculosis spreads to [SCOPE.sState('panum_disease_state').GetName]"
 panum.201.d: "The tuberculosis epidemic has spread despite our best efforts. Now it is also raging in [SCOPE.sState('panum_disease_state').GetName]."
 panum.201.g: "The white death seems unstoppable."
 panum.202.t: "遺伝する病気？"
 panum.202.d: "結核の原因についての医学界でも多くの研究がなされていますが、いまだにハッキリとした定説はありません。ある医療関係者の仮説でによると結核は親から子に遺伝する、そうでもなくとも「内的要因」によって引き起こされる病だそうです。かと思えば昔ながらの伝染病説を理由に、厳しい予防措置を実施すべしと説く医師もいます。"
 panum.202.f: "結核の病因については、18～19世紀のヨーロッパ諸国には2つの考え方がありました。当時書かれた医学書の多くでは、結核をもっとも深刻な病気に分類しており、その原因を体液の乱れ、土壌からの瘴気、都市化と関所制度の衰退などにもとめていました。一方イタリアでは結核を疫病、すなわち人から人への伝染が原因だと考えました。そのため18世紀中頃のヴェネツィア共和国では、労咳（肺結核）が発病した場合は報告書の提出を義務づける制度が導入されました。感染リスクを抑えるため、結核で亡くなった患者が身に着けていたものは焼却処分されました。しかしイギリスや北欧諸国では、結核が遺伝性の病であるとの見解が一般的でした。"
 panum.202.g: "親から子に伝わる病なら、我々にできることは何もない"
 panum.202.h: "伝染病なら、蔓延を防ぐためにあらゆる手段を講じるべし！"
 panum.203.t: "路上での唾吐き"
 panum.203.d: "結核の原因がわからない以上、その対策をどうするかについても意見が分かれます。伝染病説を主張する人々は結核を抑え込むために、公衆の場での唾吐き禁止などの過剰ともいえる禁止令の施行を求めています。この禁止令は特に下層階級に効果があるでしょう。ただこうした規制は、一般大衆を痛めつけるだけだという反対意見もあります。"
 panum.203.f: "18世紀にはエチケットに関するルールが普及し、中流・上流階級からはいくつかの「悪癖」が根絶されました。しかしまだ多くの人々のあいだで、衛生的に疑わしい習慣が広く残っていました。たとえば19世紀初頭はまだハンカチや痰壺が社会に普及しておらず、公共交通機関での唾吐きが禁止が一般常識になったのも20世紀初頭のことでした。"
 panum.203.g: "この汚らわしい悪癖を禁止しろ！"
 panum.203.h: "厳格な禁止令を布告する！違反者には罰を！"
 panum.203.i: "唾吐きは禁じることのできない人間の習性だ"
 panum.204.t: "[SCOPE.sCharacter('disease_victim_scope').GetFullName]が結核に罹患！"
 panum.204.d: "わが国の芸術家である[SCOPE.sCharacter('disease_victim_scope').GetFullName]もまた、はやり病の結核に罹ってしまった！しかし驚いたことに、[SCOPE.sCharacter('disease_victim_scope').GetSheHe]は結核で死ぬもよしと考えているようです。"
 panum.204.f: "19世紀初頭において結核は「ロマンチックな死」とされ、この考え方はその後もしばらく続きました。結核はゆっくりと進行するため、死を覚悟できるというのが理由でした。また結核患者特有の蒼白い顔も、当時は高貴ととらえる人が多かったのです。小デュマの『椿姫』など、結核をある種ロマンチックに描く作家もいました。ヴェルディ（椿姫）やパチーニ（ラ・ボエーム）のオペラに登場する結核もこの流れを汲んでいます。ショパンのパートナーだったジョルジュ・サンドは、「ショパンの咳には限りない優雅さがある」と記しています。"
 panum.204.i: "鎮魂歌を捧げるにふさわしい病ではないかね？"
 panum.204.j: "しかし結核といえば作家もよく書いているじゃないか？"
 panum.204.k: "しかしこの病こそが悲劇を描く後押しになるのではないかね？"
 panum.205.t: "結核サナトリウム"
 panum.205.d: "[SCOPE.sState('panum_disease_state').GetName]での結核の流行をうけて、ある医者が裕福な患者を山岳部に移してはどうかと提案しています。いわく、高地の気候と新鮮な空気には結核を治す効果があるというのです。こうした治療のためには専用の結核療養所（サナトリウム）が必要です。[SCOPE.sState('panum_davos_scope').GetName]は最適な候補地といえるでしょう。"
 panum.205.f: "空気療法、つまり新鮮な空気によって結核を治療できるという考え方は、19世紀に誕生してから長らく一般的なものでした。患者は1日数時間バルコニーに出て、デッキチェアに体を倒して日光浴をします。空気療法は専用の結核療養所（サナトリウム）で行われました。それまで不治の病とされてきた結核を空気の力で治せると主張したのは、ドイツの医師ヘルマン・ブレーマーでした。かれは1856年の論文で「免疫地」の存在を示しました。高地の住民は結核の発病率が有意に低く、これは高地特有の空気が免疫となっているからだと主張。また高地の空気は発病してからも治癒効果があると説きました。スイスでも、ドイツ出身の医師アレクサンダー・シュペングラーが空気療法に先鞭をつけました。郡医として研修中の1853年、シュペングラーは研修先のダボス一帯の住民には結核患者が少ないことを発見し、その後ダボス高地にサナトリウムを建設しました。トーマス・マンも『魔の山』の中でダボスでの空気療法を高く評価しました。"
 panum.205.g: "[SCOPE.sState('panum_davos_scope').GetName]にサナトリウムを建てよう！"
 panum.205.h: "中身は詐欺だろう"
 panum.206.t: "労働者の病"
 panum.206.d: "[SCOPE.sState('panum_disease_state').GetName]の結核の流行でいちばんの犠牲者が出ているのは下層階級です。[SCOPE.sCharacter('union_leader').GetFullName]は現状を厳しく批判しており、抜本的な改革を訴えています。"
 panum.206.f: "19世紀から20世紀初頭にかけて、結核は都市部の貧困層の流行病として蔓延しました。1815年のイングランドでは死因の4分の1、1918年のフランスでも6分の1が結核でした。1880年代のドイツでは、15歳から40歳までグループにおける死因の第2位は結核でした。"
 panum.206.g: "貧乏人はなりたくてああなっているんじゃないか？"
 panum.206.h: "この分野については改善を認める"
 panum.206.i: "健康増進は国家的課題だ"
 panum.206.j: "この取り組みを全面的に支持する！"
 panum.207.t: "宗教界の取り組み"
 panum.207.d: "[SCOPE.sCharacter('devout_leader').GetFullName]は[SCOPE.sState('panum_disease_state').GetName]で病める多くの人々のため、積極的な活動をしています。[SCOPE.sCharacter('devout_leader').GetSheHe|U]は近いうちに非営利の病院を設立するようです。"
 panum.207.f: "「現在、何らかの形で結核対策をしていない国はほとんどありません。この危険な敵への対策がこれほど広く、また活発に行われているのを見ると、非常に喜ばしい気持ちになります」\n──ロベルト・コッホ"
 panum.207.g: "この機に勢力を広げようとする嘘つき連中だ！"
 panum.208.t: "白いペストの蔓延"
 panum.208.d: "[SCOPE.sState('panum_disease_state').GetName]での結核流行は悪化しています。患者と死者は日を追うごとに増えています。この展開を予期できた医者は誰ひとりいません。"
 panum.208.f: "「なんて青ざめた顔なんだろう！叶うことなら、結核で死にたいものだ……女性たちに『おいたわしやバイロン卿──死に顔すら魅力的ですわ！』と言ってもらいたい」\n──バイロン卿"
 panum.208.g: "一体いつ終わるんだ？"
