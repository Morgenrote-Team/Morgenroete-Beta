 panum_cholera_condition: "コレラ"
 panum_cholera_condition_desc: "コレラは極めて致死率の高い小腸性の病気。19世紀を代表する疫病であり、世界中で数千万もの犠牲者を出した。"
 panum_tuberculosis_condition: "結核"
 panum_tuberculosis_condition_desc: "結核はコレラと並んでヴィクトリア朝時代にもっとも多かった死因のひとつ。当時は労咳と呼ばれ、おもに肺に症状が現れる。"
 panum_smallpox_condition: "天然痘"
 panum_smallpox_condition_desc: "天然痘は発病すると膿疱があらわれ、顔や身体に跡が残ることが有名。人類史上もっとも恐れられた病である。"
 panum_typhus_condition: "チフス"
 panum_typhus_condition_desc: "チフスは数世紀にわたって兵士たちから恐れられ、ナポレオン戦争では数十万もの軍人がチフスで亡くなった。自然災害の被災地でも幾度となく猛威を振るっている。"
 panum_yellow_fever_condition: "黄熱"
 panum_yellow_fever_condition_desc: "黄熱はおもに南米やアフリカの熱帯地域で流行する疫病。カリブ海地域では、駐屯する兵士たちは戦争よりも黄熱によって命を落としたとも言われている。"
 panum_measles_condition: "麻疹"
 panum_measles_condition_desc: "麻疹は非常に感染力が強い病気で、発病すると皮膚に赤い斑点が現れる。免疫のない場所に持ち込まれると壊滅的な被害をもたらす。"
 panum_scarlet_condition: "猩紅熱"
 panum_scarlet_condition_desc: "猩紅熱は感染力が非常に強い疫病で、20世紀初頭までは児童の死因のほとんどを占めていた。"
 panum_plague_condition: "ペスト"
 panum_plague_condition_desc: "中世において「黒死病」とも称された腺ペストは、史上もっとも猛威を振るった疫病。発病すると横痃とよばれる腫れが生じ、激痛を引き起こす。"
 panum_diphteria_condition: "ジフテリア"
 panum_diphteria_condition_desc: "ジフテリアは致死率の高い病気。さまざまな合併症を引き起こして命を奪い、回復しても長期にわたって重篤な後遺症が残る場合がある。"
 panum_polio_condition: "ポリオ"
 panum_polio_condition_desc: "急性灰白髄炎、通称ポリオはおもに子供に感染する疫病。症状が現れると死亡したり、回復しても重度の障害が一生残る場合がある。"
