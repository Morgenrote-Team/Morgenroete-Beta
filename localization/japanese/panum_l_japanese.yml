 panum.51.t: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]博士が疫病地帯に出発"
 panum.51.f: "病気を理解し、そして対策を講じるためには、まず病気を完全に解明する必要があります。概論は直接的な治療には役立ちませんが、治療法を作る土台です。医師は国外で研究するよりも、国内で起きた病気を調べさせたほうが効率的に研究できます。"
 je_panum_cholera_description: "コレラ研究"
 je_panum_tuberculosis_description: "結核の研究"
 je_panum_smallpox_description: "天然痘の研究"
 je_panum_typhus_description: "チフスの研究"
 je_panum_yellow_fever_description: "黄熱の研究"
 je_panum_cholera_description_reason: "現在、[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]博士は#YELLOW コレラ#!の症状を特定するべく、数名の患者を診断しています。これは非常に大事なステップであり、類似したり併発する病気と区別することができるようになります。博士は診断を終えると研究結果を世間に公開します。次の世代は病気の原因をより深く理解できるようになり、治療法が見つけることができるでしょう。"
 je_panum_tuberculosis_description_reason: "現在、[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]博士は#YELLOW 結核#!の症状を特定するべく、数名の患者を診断しています。これは非常に大事なステップであり、類似したり併発する病気と区別することができるようになります。博士は診断を終えると研究結果を世間に公開します。次の世代は病気の原因をより深く理解できるようになり、治療法が見つけることができるでしょう。"
 je_panum_smallpox_description_reason: "現在、[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]博士は#YELLOW 天然痘#!の症状を特定するべく、数名の患者を診断しています。これは非常に大事なステップであり、類似したり併発する病気と区別することができるようになります。博士は診断を終えると研究結果を世間に公開します。次の世代は病気の原因をより深く理解できるようになり、治療法が見つけることができるでしょう。"
 je_panum_typhus_description_reason: "現在、[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]博士は#YELLOW チフス#!の症状を特定するべく、数名の患者を診断しています。これは非常に大事なステップであり、類似したり併発する病気と区別することができるようになります。博士は診断を終えると研究結果を世間に公開します。次の世代は病気の原因をより深く理解できるようになり、治療法が見つけることができるでしょう。"
 je_panum_yellow_fever_description_reason: "現在、[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]博士は#YELLOW 黄熱#!の症状を特定するべく、数名の患者を診断しています。これは非常に大事なステップであり、類似したり併発する病気と区別することができるようになります。博士は診断を終えると研究結果を世間に公開します。次の世代は病気の原因をより深く理解できるようになり、治療法が見つけることができるでしょう。"
 panum.52.t: "医療観察遠征"
 panum.52.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]博士は国外で起きた病気の流行を詳しく観察するべく、専門家や助手からなる少人数のチームを率いて出発しようとしています。問題は、どの国のどの病気を調べるかです。"
 panum.52.f: "医師の医学遠征には、観察遠征と研究遠征の2つのパターンがあります。観察遠征では病気の概論を執筆する手がかりとなり、研究遠征は治療法の発見に役立ちます。しかし遠征は国内での研究よりも効率が落ち、研究を完了させるためには数回の遠征が必要になることもあります。"
 panum.52.g: "[SCOPE.sCountry('panum_cholera_country_scope').GetName]でのコレラ流行"
 panum.52.h: "[SCOPE.sCountry('panum_tuberculosis_country_scope').GetName]での結核流行"
