 panum.101.t: "コレラの第三次大流行"
 panum.101.d: "Worrying reports from the Ganges Delta reached the capital today. Cases of illness have increased rapidly there. After a short examination by local doctors, they are shocked to discover that cholera has reared its ugly head again."
 panum.101.g: "どういうわけか、コレラが戻ってきた"
 panum.1000.t: "Polio Epidemic"
 panum.1000.d: "An epidemic has broken out in one of our states: #YELLOW Polio#! is ravaging in [SCOPE.sState('panum_disease_state').GetName]!"
 panum.1000.f: "There are already images from Ancient Egypt that suggest that poliomyelitis has existed for a long time and is endemic. However, it only reached its status as an epidemic disease towards the end of the 19th century, when it suddenly broke out across Sweden and the USA. By 1910, frequent epidemics became regular events throughout the developed world primarily in cities during the summer months. At its peak in the 1940s and 1950s, polio would paralyze or kill over half a million people worldwide every year. The fear and the collective response to these epidemics would give rise to extraordinary public reaction and mobilization spurring the development of new methods to prevent and treat the disease and revolutionizing medical philanthropy."
 panum.1000.g: "Crutches and wheelchairs become everyday objects..."
 je_panum_germ_theory_success: "[GetPlayer.GetName] has collected at least #V 20 Pieces of Evidence#! to reinforce the Germ Theory and refute the Miasma Theory."
