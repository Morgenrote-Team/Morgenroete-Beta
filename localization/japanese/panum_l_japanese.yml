 panum_antitoxins_tech_desc: "抗毒素とは、ある毒素を中和する抗体。1890年にエミール・アドルフ・フォン・ベーリング率いる研究グループが世界初のジフテリアと破傷風の抗毒素を発明しました。これは医学の歴史における大きな転換点のひとつに数えられています。"
