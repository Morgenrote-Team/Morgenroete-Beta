 je_panum_cholera_treatment_reason: "現在、[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]博士#YELLOW コレラ#!の原因を特定するべく、複数の患者を診断しています。病気の本当の原因がわかれば予防できるようになり、現代的な治療につながります。博士は診断を終えると研究結果を世間に公開します。今後の流行を防げるわけではありません──それには病原体の特定と、可能であればワクチンの発明が必要です──しかし病気の悪影響は比較的減少します。"
