 panum.112.t: "一縷の希望"
 panum.112.d: "[SCOPE.sState('panum_disease_state').GetName]でコレラが猛威を振るう中、あるコレラ病院の医師が注目を集めています。この[SCOPE.sCharacter('panum_new_physician_scope').GetFullName]の活動は、すでに国中の注目をあつめています。もしかしたらこの医師が、[GetPlayer.GetName]での疫病との戦いで大きな活躍をしてくれるかもしれません。"
 panum.209.t: "結核先生"
 panum.209.d: "結核サナトリウムの院長を務める[SCOPE.sCharacter('panum_new_physician_scope').GetLastName]博士は、この疫病の流行について何か力になれないかと申し出ています。"
 panum.112.f: "「神からのお告げがあり、神に仕えよと仰られました。どのように仕えるかまでは語りかけてくださいませんでした」\n──フローレンス・ナイチンゲール"
 panum.112.g: "ただちに[SCOPE.sCharacter('panum_new_physician_scope').GetHerHim]を公職に就けるのだ！"
 panum.112.h: "先生には未来の医師を育て、次の流行に備えてもらいたい"
 panum.122.t: "コレラの潜伏期"
 panum.122.d: "数度の経過観察と聞き取り調査の結果、[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]博士はある事実を発見しました。コレラ患者は典型的な症状が現れるまで、一定の期間があるというのです。"
 panum.122.f: "潜伏期は半日から5日、平均3日間というのが[ROOT.Var('panum_physician_var').GetCharacter.GetFullName]博士の見立てです。博士は患者やその関係者と何度もやりとりを重ねました。そして[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U]は、複数の目撃証言を時系列順に並べなおしてこの結論を出しました。病気の原因については不明なままですが、今回の観察結果をもっと詳しく調べれば、発病初日に何が起きていたのかを突き止められるかもしれません。"
 panum.122.g: "優れた観察だ"
 panum.124.g: "精緻な観察だ"
 panum.123.t: "コレラの症状"
 panum.123.d: "本日、[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]博士は医学会宛にコレラの症状について網羅したリストを送りました。"
 panum.123.f: "これまで断片的な知識しかありませんでしたが、コレラは人間の小腸で発病するのはすでに知られています。患者は猛烈な下痢に見舞われ、「米のとぎ汁」とも称される白い液体を排泄し、激しい嘔吐を繰り返します。ところで[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]博士は底意地の悪い性格をしていると言わざるを得ないでしょう。[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe]はこうした極めて不快な症例の数々をまとめた論文を、わざわざ学会の晩餐会が始まろうかというタイミングで寄越したのですから。"
 panum.124.t: "アジア型コレラ"
 panum.124.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]博士はコレラとその他のコレラに似た病気を区別した報告書を提出し、高く評価されています。これは今後のコレラ研究を大きく前進させる布石となるでしょう。"
 panum.124.f: "コレラはギリシャ語の「胆汁」が語源で、もともとは下痢や腸の病気（胆汁流出と呼ばれた）をまとめて指す言葉でした。1642年にはヤーコブ・デ・ボントがインド型コレラを1つの病気として記録しましたが、その後もコレラは純粋な総称として扱われました。こうした状況は、19世紀になって新しいタイプのコレラが出現したことで変化しました。新型コレラの大流行は19世紀でもっとも大きな被害をもたらし、それまでのコレラと明確に区別されて「アジア型コレラ（Cholera Asiatica）」と呼ばれました。"
 panum.222.t: "結核の潜伏期"
 panum.222.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]博士は結核について調べるうちに、ある奇妙な点に気づきました。どうやら結核患者は典型的な症状が現れるまでに数週間ほどかかるようなのです。"
 panum.222.f: "瘴気説と病原体説のどちらで考えても、結核にはなお分からない謎があります。感染症だとすると、感染してから数週間ほど時間をおいて発病していることになるのです。博士の見立てでは、潜伏期間は2週間から12週間（！）にもなります。また感染症なら、結核患者と生活している人物は直接感染するはずです。しかし[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe]は複数の患者やその関係者から聞き取り調査を行った結果、患者と生活しても症状が現れない者がいることが判明しました。すなわち結核は感染症ではなく、他の原因があるという学界の定説が正しいのか、あるいは感染リスクは当初考えられていたよりも低いかのどちらかです。"
 panum.223.t: "結核の症状"
 panum.223.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]博士は結核の症例について徹底的に調べました。その結論に学会内でも驚きの声が挙がっています。これまで肺の病気だと考えられていた結核ですが、実は体のさまざまな場所で病気を引き起こしていたのです。"
 panum.223.f: "肺で発病して痛みを引き起こし、ゆっくりと症状が進行する。これが結核のよく知られた特徴ですが、じつは咳も多くの症状のひとつにすぎなかったのです。肺結核は数多くの症状のひとつにすぎず、結核は身体のさまざまな器官で病気を引き起こします。これまでも倦怠感、発熱、食欲不振、寝汗、喀血などの症状が知られています。すなわち結核は肺以外の器官でも発病し、しかも2つの異なるタイプの結核が同時に発病する可能性があるのです。この新事実に、少なくない医学会員に衝撃がはしっています。"
 panum.224.t: "結核と瘰癧"
 panum.224.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]博士は結核のさまざまな症例について徹底的に調べ上げました。その結果、結核と瘰癧の症状はさまざまな類似点がみられるものの全く別の病気であること、しかし何らかの繋がりがあることを発見しました。"
 panum.224.f: "結核について書かれた医学書は数世紀前から存在していましたが、都市化の進んだ19世紀の結核（19世紀から20世紀初頭は「労咳（英語: consumption）」と呼ばれていた）は、それまでとは比べものにならないほどの被害をもたらしました。当時の結核研究のパイオニアの一人がルネ・ラエネクで、肺の検査に使われる聴診器を発明しました。1832年にはヨハン・ルーカス・シェーリングが「結核（tuberculosis）」という用語を提唱し、臨床医学的な特徴を発見しました。またこの頃の重要な発見として、瘰癧と結核はそれぞれ異なる病気であることが分かりました。しかし結核の症状が多岐にわたるため、分類は困難を極めました"
 panum.322.t: "天然痘の潜伏期間と症状"
 panum.322.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]博士はこのたび小論を発表し、天然痘はまずインフルエンザと似た初期症状があらわれ、その後病気の代名詞ともいえる疱瘡が現れることを発見しました。感染から症状が出るまでの期間は1〜2週間とみられています。"
 panum.322.f: "「この疫病が重症にならずに回復した患者は、病気にかかる前から総身を乾かして浄化していたと思われる。そうした患者のなかには嘔吐を繰り返し、胃の不調を訴えるものが少なくなかったことからもそれは読み取れる。また同じくこの疫病から回復した患者は、黒い斑点が身体中にはっきりとあらわれている。ほとんどが潰瘍のあった場所が乾いてできたものだ。（中略）身体を触ったところ体温は高くない。肌も蒼白くなく、むしろ強く紅潮している。そして身体じゅうに水ぶくれと潰瘍があらわれる」\n──ガレノス"
 panum.323.t: "水疱が天然痘か？"
 panum.323.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]博士は天然痘患者の経過観察中に書いた報告書の一部を発表しました。それによると水疱は天然痘とは別の、無害な病気だというのです。この仮説をめぐっては大きな議論が巻き起こっています。"
 panum.323.f: "'Chickenpox breaks out on many without any illness or previous sign: in others they are preceded by a little degree of chillness, lassitude, cough, broken sleep, wandering pains, loss of appetite and feverishness for three days. Most of them are of the common size of the smallpox but some are less. I never saw them confluent nor very numerous. The greatest number which I ever observed was about twelve in the face, and two hundred over the rest of the body. On the second or at the farthest on the third day from the beginning of the eruption as many of the pocks as are not broken seem arrived at their full maturity, and those which are fullest of that yellow liquor very much resemble what the genuine smallpox are on the fifth or sixth day especially where there happens to be a larger space than ordinary occupied by the extravasated serum.' -William Heberden"
 panum.324.t: "麻疹と天然痘の区別"
 panum.324.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]は天然痘患者、麻疹患者、水疱患者の症状を細かく比較し、この3つの病気をかつてない正確さで識別しました。"
 panum.324.f: "「天然痘にかかると、まず発熱が続き、背中が痛み、鼻がかゆくなり、寝ている間に悪夢を見る。これらの初期症状につづいて、体温が上がり、背中の痛みがひどくなり、かゆみが患者の全身に広がる。顔にできものが出たり消えたりし、両の頬と目のまわりが炎症が真っ赤になる。全身が重苦しく、強い焦燥感にかられ、伸びやあくびを何度も繰り返す。のどや胸部に痛みを感じ、呼吸や咳が苦しくなる。さらに息の乾燥、太い唾、声のかすれ、頭部と痛みと重苦しさ、焦燥感、吐き気、気分の落ち込みなどの症状が出る。麻疹と比較すると、焦燥感や吐き気、気分の落ち込みは天然痘患者のほうが少ない。また背中の痛みは麻疹よりも天然痘患者のほうに多くみられる」\n──アル・ラーズィ"
 panum.422.t: "チフスの症状と潜伏期間"
 panum.422.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]は最初の中間報告書を提出しました。そこにはチフスの症状、またチフスにかかってから最初に症状が現れるまでの推定期間が記されています。"
 panum.422.f: "「発熱、寒気、頭痛、咳、発疹、嘔吐──これらはすべてチフスの兆候だ。しかしこれらは全て他の病気でもみられる症状でもある。古典的チフスの特徴は吐き気と譫妄だ。典型的な発熱の経過としては、2～3日かけて体温が上がり、その後10日間ほど発熱が続き、数日後に熱が下がる。私の計算では、病気にかかってから最初の症状が現れるまで10～14日間ほどかかる」"
 panum.423.t: "キャンプ熱"
 panum.423.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]博士は過去に軍隊内で流行した「キャンプ熱」の記録とチフス患者の症例とを比較検討した結果、この2つはほぼ同じ病気であるとの結論に達しました。"
 panum.423.f: "'It is certainly a camp fever - but is it THE camp fever?' Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] asked questions like these that got the members of the Medical Faculty thinking. Historically known as 'camp fever', it has long been associated with epidemics in the major armies or barracks, particularly as the disease that inflicted massive casualties on the Napoleonic Army. But not all illnesses in the army known as 'camp fever' can be equated with typhus. Relapsing fever and trench fever are other diseases known to have affected military personnel in confined spaces. The illness that particularly raged during the American Civil War, on the other hand, is often referred to as typhus, but was actually typhoid fever."
 panum.424.t: "チフスは2つあった？"
 panum.424.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]はチフス患者の診察中、過去の仮説を大きく塗り替える発見をしました。生前に医師から「腸の異変」と診断され、のちにチフスで亡くなった患者を調べたところ、すべてのケースで腸には何の異常も見当たらなかったというのです。博士はこの事実を手がかりとして、腸のチフスは従来のチフスと異なる病気として扱うべきものであるとの仮説を提唱し、また通常のチフスを「発疹チフス」と名づけました。"
 panum.424.f: "19世紀中盤まで、医師たちは腸チフスと発疹チフスを区別していませんでした。どちらも同じチフスという病気で、ただ症状が多岐にわたると考えていたのです。1836年、アメリカ人医師ウィリアム・ゲルハルトは複数のチフス患者を調べたところ、腸に症状が出ていない患者が何人かいることを発見しました（当時は腸の異常がチフスの典型的な症例とされていた）。ゲルハルトはさらに調査を続けた結果、チフス患者には消化器官の異常よりも、譫妄や筋肉痛といった症状が多く見られることから、チフスは腸ではなく身体の別の器官を攻撃する病であると確信しました。こうして数世紀にわたって腸チフスと発疹チフスが同一視された名残は今も残っており、ドイツでは現在も発疹チフスを「Typhus」と表記します。"
 panum.522.t: "黄熱の経過の2パターン"
 panum.522.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]博士は黄熱について詳しく調べた結果、2つの典型的な経過パターンを発見しました。"
 panum.522.f: "博士の研究によれば、黄熱患者のほとんどは感染してから数日で軽い症状があらわれます。推定では6人中5人の患者は、軽度の症状のまま回復します。そして6人に1人は重症化し、死に至るケースも出てきます。重症化すると第二の症状があらわれ、高熱、腎臓機能の低下による黄疸、腹痛などの典型的な症状が出ます。口、鼻、目、消化管から出血し、血の混じった嘔吐を引き起こします。スペイン語名の「黒い嘔吐（vómito negro）」はこれに由来しています。ほかにも腎不全、腎不全、しゃっくり、譫妄といった症状が出ることもあります。重症化した黄熱患者の致死率はおよそ20～50％に達します──以上が、博士が報告書に記した結論です。"
 panum.523.t: "黄熱の季節性"
 panum.523.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]博士は、黄熱の流行には特定の時間的パターンがあることを発見しました。"
 panum.523.f: "過去の記録と現在のデータを照らし合わせると、黄熱は基本的に夏季に流行します。なぜインフルエンザのように毎年流行しないのか、それでいて太古から現在の長い期間で消滅していないのか。それはまで[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]博士にもわかりません。ほかにも特筆すべき事項として、黄熱は降雨量が多い年にとりわけ猛威を振るっています。"
 panum.524.t: "風土病？"
 panum.524.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]博士は黄熱についての概論を執筆しています。その中で博士は次の点を強調しています。すなわち一部の例外を除いて、黄熱は限られた地域でのみ発生し、おもに沼地や熱帯地域でのみ拡散するのです。"
 panum.524.f: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]博士は過去に流行した黄熱の記録や報告書を調べました。どの流行も非常に限られたエリアで発生していた事実は特筆に値します。黄熱が流行しているのは、おもにアフリカ大陸やアメリカ大陸の熱帯地域と湿地帯です。アメリカのフィラデルフィア、スペインのバルセロナなど、より北側でも黄熱が流行したケースもありますが、あくまで少数の例にとどまります。ある一定の気候地域には黄熱の原因となる「何か」があるはずというのが、博士の推測です。過去にはイングランドの港湾部でも局地的な流行が記録されていますが、博士にはあくまで例外的なケースだとしています。港湾部とその周辺都市以外への拡大を確認できなかったというのが、その理由です。"
