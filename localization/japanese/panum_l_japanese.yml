 panum.131.t: "医学研究の中断"
 panum.131.d: "[GetPlayer.GetName]での大規模な流行は終息し、最後の患者も回復しました。[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]博士はひとまず研究を終えました。博士がいくつかの重要な情報を集めたことで、今後の科学的な概論を執筆しやすくなるでしょう。しかし[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe]はまだ重要なブレイクスルーには至っていません。"
 panum.131.f: "「この疫病がどこからやってきたのか、これほど重い症状を引き起こす原因が何なのか、それについては素人や専門家を問わず、別の作家に任せることにする。私は、ただありのままを簡潔に記し、その症状について著述する。もし万が一にもまた流行した場合、将来の学徒たちに判断しやすくするためである。私自身もこの病気を患い、他の患者の症状をつぶさに調べたので、私は誰よりもこの病気を詳しく描写できる」\n──トゥキュディデス"
 panum.131.g: "もっと手がかりが必要だ"
 panum.133.t: "医学遠征の中断"
 panum.133.d: "流行病も終息し、医学遠征もひとまず終了しました。[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]博士はまだ概論の執筆を終えていませんが、[ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]の研究は今後も貴重な手がかりとなるでしょう。"
 panum.134.d: "わが国で猛威を振るった流行病は終息しました。ですがそれは[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]博士の調査が中断されたということでもあります。もはや病気の治療法についての新しい被験者はいないのです。それでも博士は貴重な知見を得ました。きっと将来役立つでしょう。"
 panum.134.f: "「接触体（コンタギオン）は人から人へと移動する。コンダキオンは目に見えない粒子であり、これが疫病の原因である」\n──ジローラモ・フラカストロ"
 panum.134.g: "治療法を発見するのは時間の問題だ"
 panum.136.d: "残念ながら、医学研究遠征は最終結論の出ないまま終わりました。流行病が終息したことで、[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]博士は仮説を実証できなくなったのです。それでも中間報告書を作成すれば、次の世代がきっと治療法を見つけてくれるでしょう。"
