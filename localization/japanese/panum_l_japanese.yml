 je_panum_cholera_treatment_expedition_reason: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]博士は#YELLOW コレラ#!の治療法を見つけるべく、医学遠征隊を率いて[SCOPE.sCountry('target').GetName]に向かいました。現地での流行が長引くほど、[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe]は毎月ごとに新たなひらめきを獲得し、この病気の原因と封じ込め策を発見できるようになります。\n\n病気が終息した場合も科学進捗は失われず、次回以降に持ち越されます。"
