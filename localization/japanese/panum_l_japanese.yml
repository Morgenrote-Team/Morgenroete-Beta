 panum.61.t: "Medical Treatment Team leaves"
 panum.61.d: "After the research assistants have introduced our local doctors to the modern medical treatment methods from our overlord country, they say goodbye and return to their homeland."
 panum.61.f: "'The only thing of importance, when we depart, will be the traces of love we have left behind.' -Albert Schweitzer"
 panum.61.g: "Our overlord takes care of us?"
