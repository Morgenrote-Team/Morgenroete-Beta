 panum.641.t: "A Notifiable Disease"
 panum.641.d: "Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] has written an urgent letter to the authorities to stop treating measles as a benign disease and make it a reportable disease."
 panum.641.f: "'I have had to listen to accusations from colleagues, even very influential colleagues in the highest state and university bodies, that I was exaggerating the danger posed by measles. I was even accused of making the measles issue bigger than it was just to improve my position. It is true that the death rate for measles is between 2 and 5 percent. But if we only assume that around 2 out of 100 people die from measles, then in a country of 10 million that means several thousand deaths. There are millions of deaths worldwide that could be avoided with simple protective measures. Isn't it better if we all just paid a little more attention and followed the rules to save people's lives? Do we want to make the same mistakes as women who have recently given birth and the arrogance of doctors in not washing their hands, even though it is a small investment of time with a huge impact?'\n\nExcerpt from a letter from Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] to the local government in [SCOPE.sState('panum_disease_state').GetName]"
 panum.641.g: "Small things can have a big impact."
 panum.642.t: "Animal Infections with Measles"
 panum.642.d: "In a highly publicized animal experiment, Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] infected monkeys with measles."
 panum.642.f: "'In view of the great importance of the subject, and of the apparent insusceptibility of other animals, it appeared to us highly desirable to put the question of the receptivity of monkeys to the infection of measles to further test.\nWe began work a year ago and now desire to report some results which we believe demonstrate that the rhesus monkey is capable of being infected by the blood drawn from the general circulatlon of a case of measles and that a monkey so infected may show a definite febrile reaction resembling the course of the temperature in some types of measles in the human subject, with or without a generalized exanthem.\nFull details of our work will be given in a paper now in preparation.'\n\nReport from Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] to the Medical Faculty."
 panum.642.g: "This will help in finding a successful treatment."
 panum.642.h: "This will help in the search for the pathogen."
 panum.643.t: "An age-fluctuating Disease"
 panum.643.d: "Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] has reviewed several cases of illness in [SCOPE.sState('panum_disease_state').GetName] and has recognized significant differences in patient mortality."
 panum.643.f: "'Measles is considered a harmless childhood disease. However, my research has shown that this is only true when the children are kindergarten age. In contrast, mortality is particularly high in children between the ages of 6 months and 3 years. After that, mortality falls quite quickly. Although measles in adults is considered harmless, reports from Ludvig Panum from the Faroe Islands have shown that it is better if immunization occurs in childhood - experienced fishermen also report a severe course of the disease and even death.'\n\nFrom the journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [TimeKeeper.GetCurrentDate.Format('y')]"
 panum.643.g: "So there are special risk groups."
 panum.644.t: "Highly Contagious"
 panum.644.d: "During a visit to a school in [SCOPE.sState('panum_disease_state').GetName], Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] was able to see for [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself] that once the disease has broken out, it spreads almost unstoppably."
 panum.644.f: "'Thank you for coming, Doctor.'\n'Joy is on my side, miss. How many measles cases does the school now have?'\n'Unfortunately, we have completely lost track. Yesterday there were 35, but we should have exceeded 40 by now.'\n'When was the first case of measles documented?'\n'Last week.'"
 panum.644.g: "Worrying."
 panum.645.t: "Sneezes and Coughs"
 panum.645.d: "Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] recommends quarantine measures such as those recommended for flu or tuberculosis in order to limit measles."
 panum.645.f: "'Measles is not perceived as a respiratory disease, but my suspicions have been confirmed that this is the only way to stop its spread. Measles - one of the most contagious human diseases - is apparently transmitted via droplet infection. There are reports that people in the room of a sick person have become infected even though they have been out of the room for two hours. Apparently infectious secretions remain contagious later.'\n\nFrom the journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [TimeKeeper.GetCurrentDate.Format('y')]"
 panum.645.g: "Fortunately, these are well-known methods."
 panum.646.t: "Antibiotics"
 panum.646.d: "Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] sees the possibility of reducing some of the side effects of measles in some new antibiotics."
 panum.646.f: "'The fact that measles is often not taken seriously as a disease is also due to the fact that it often has no further side effects. Unfortunately, this is not always the case. Secondary diseases, such as infections in the ear or lungs, have often tipped the scales between a mild, severe and fatal course. Antibiotics cannot cure measles, but they can take away the horror of it.'\n\nFrom the journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [TimeKeeper.GetCurrentDate.Format('y')]"
 panum.646.g: "Get more antibiotics!"
 panum.646.h: "These findings should help in the search for the actual pathogen."
 panum.647.t: "Statistics"
 panum.647.d: "Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] particularly excelled in the statistical recording of measles cases, the processing of infected households and the evaluation of the data."
 panum.647.f: "'In meticulous research on the available data from the last few years, I examined the mortality of measles sufferers in 22 countries and came to the following conclusions:'\n\nChile 4.84%, Hungary 4.43%, Australia 0.24%, Scotland 0.35%, Spain 3.85%, Italy, England and Wales 2.91%, USA 1.08%. In countries where measles was endemic, epidemic outbreaks occur every three to five years following the population renewal. Subsequently, much higher rates have been reported, reaching 10%, particularly in the Pacific Islands and Africa.'\n\nReport from Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] to the Medical Faculty."
 panum.647.g: "Useful."
 panum.647.h: "The doctor has talent, [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] should deepen [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] studies."
 panum.648.t: "Multiplication"
 panum.648.d: "Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] has published astonishing figures on the spread and infection of measles."
 panum.648.f: "'Measles is extremely communicable and it is estimated that 90% of non-immune people exposed to an infective individual will contract the disease. Mathematical models estimate the basic reproductive number at 12–18; that is the average number of secondary infections that follow a single introduction into a susceptible population. It is extremely contagious: nine out of ten people who are not immune and share living space with an infected person will be infected.'\n\nReport from Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] to the Medical Faculty."
 panum.648.g: "What was previously only recognized by perception has now been proven by science."
 panum.649.t: "Infection without Symptoms"
 panum.649.d: "After some on-site observations, Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] made the reasonable assumption that measles is also transmitted by asymptomatic patients, even before external signs appear."
 panum.649.f: "'The high prevalence of measles is a well-known phenomenon and the risk of infection has been known since ancient times. A big problem is that apparently healthy people also carry the disease, even if it doesn't seem to have broken out yet. This overturns many assumptions that were previously valid. The contagiousness - as several observations in [SCOPE.sState('panum_disease_state').GetName] have shown - begins 4 days before the rash appears and generally lasts until 4 days after the rash appears. It appears that the contagiousness is just before the onset of the rash.'\n\nReport from Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] to the Medical Faculty."
 panum.649.g: "More thorough investigations are therefore warranted."
 panum.650.t: "Barracks disinfection"
 panum.650.d: "Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] visited a barracks in [SCOPE.sState('panum_disease_state').GetName] that has implemented some exemplary measures to prevent the spread of measles among young men."
 panum.650.f: "'Some of these measures included longer and more stringent isolation of arriving recruits than previously; policing to prevent congregation in barracks, canteens, theatres, and elsewhere; head-to-foot staggering of adjacent barrack cots; continual wet mopping and disinfection of floors, walls, tables, door knobs. All staff wore gowns and gauze masks, changed them, and washed hands with soap, water or disinfectants between contact with patients, which were uncommon practices before. ome wards mandated that staff wear rubber gloves. Patients were placed in cubicle isolation, hanging bed sheets from wires strung around the bed, and were required to wear masks. Cubicle sheets were sometimes periodically sprayed with disinfectants. Masked patients were only allowed into lavatories one at a time under attendant supervision.'\n\nFrom the journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [TimeKeeper.GetCurrentDate.Format('y')]"
 panum.650.g: "Modern methods of combating measles."
 panum.651.t: "Failed Inoculation"
 panum.651.d: "Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'s attempt to immunize measles using a procedure similar to smallpox variolation proved a colossal failure."
 panum.651.f: "In 1757, Scottish doctor Francis Home discovered that measles was caused by a pathogen: he transmitted the disease to healthy individuals using the blood of infected patients and demonstrated that it was caused by an infectious agent. He tested a group of 12 children, 10 of whom developed a characteristic moderate febrile rash after a 6–7 days incubation period, and two of whom remained uninfected. This approach was quickly abandoned because of technical difficulties, particularly for obtaining measles material at the right time to inoculate the disease."
 panum.651.g: "A waste of time."
 panum.652.t: "Throat gargling"
 panum.652.d: "Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] has tried out several gargle remedies that have been touted by fellow doctors for curing measles for years. They all turned out to be a failure."
 panum.652.f: "'After the last experiment, I'm left with more than just a bitter aftertaste. On the one hand, because even snake oil has better effects. On the other hand, because we tolerate more snake oil salesmen and quacks in our medical guild, who urgently need to be sorted out.'\n\nFrom the journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [TimeKeeper.GetCurrentDate.Format('y')]"
 panum.652.g: "What do you mean, snake oil is useless?"
 panum.653.t: "Disinfectant Spray"
 panum.653.d: "In one barracks, soldiers suffering from a measles outbreak have recently started ingesting disinfectant language. The doctor thinks this is a foolish venture and has had to do a lot of convincing."
 panum.653.f: "'We really should put little pictures on the labels of chemical and medical products that show even the smallest fool what you definitely should NOT do with a liquid, spray or other substance.'\n\nFrom a letter from Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] to Doctor Angelika Hasenbein"
 panum.653.g: "This is valuable time we lose trying to find a treatment!"
 panum.661.t: "Take your Vitamins!"
 panum.661.d: "Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] has found that taking vitamins during a measles disease is beneficial in eliminating unpleasant side effects."
 panum.661.f: "'The effect of vitamins is well known, but in the case of measles their effect surprised me. Children with vitamin A deficiency run the risk of severe illness or even blindness. Vitamin A supplements can strengthen the general immune system, although they cannot cure the disease.'\n\nReport from Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] to the Medical Faculty."
 panum.661.g: "Very good."
 panum.900.t: "Diphtheria Epidemic"
 panum.900.d: "An epidemic has broken out in one of our states: #YELLOW Diphtheria#! is ravaging in [SCOPE.sState('panum_disease_state').GetName]!"
 panum.900.f: "Diphtheria is an acute infectious disease that occurs primarily in children and is caused by an infection of the upper respiratory tract (pharyngeal diphtheria). Pierre Fidèle Bretonneau introduced the term diphtheria into medical usage in 1826 as diphtherite (“diphtheritis”). The word refers to the throat tan, dark pseudomembranes (leathery brown deposits in the larynx and trachea) made of dead mucous membrane and blood components. Diphtheria has been known since ancient times; Hippocrates had already described the disease. Diphtheria is fatal in 5–10% of cases. In children under five years and adults over 40 years, the fatality rate may be as much as 20%."
 panum.900.g: "My throat is tightening too."
 panum.920.t: "Diphtheria Epidemic ends"
 panum.920.d: "The severe diphtheria epidemic that has held our country in a stranglehold has reached its end. Doctors and authorities give the all-clear, children dare to go out on the streets again, older people are relieved."
 panum.920.f: "'In a wet cold season, appeared at Kingston, an inland town in New-Hampshire, situated in a low plain, a disease among children, commonly called the 'throat distemper', of a most malignant kind, and by far the most fatal ever known in this country.' -Even Noah Webster"
