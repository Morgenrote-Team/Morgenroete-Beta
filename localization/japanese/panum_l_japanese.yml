 je_group_panum_medicine: "Morgenröte : #ORANGE 医学#!"
 je_panum_cholera: "コレラの流行"
 je_panum_cholera_reason: "コレラは19世紀にもっとも猛威を振るった伝染病で、ヴィクトリア朝時代の黒死病とも称されました。すさまじい速度で伝染し、致死率も高いです。\n\n#ORANGE 近代下水道#!を発明すると、コレラとの戦いで大きな効果を発揮します。この技術があれば、[concept_panum_physician]は#V コレラの治療法#!を発見できるようになります。中程度の医療制度も大きな助けになり、コレラのさらなる予防と治療につながります。[concept_gaudi_architect]が首都に近代下水道網を整備すれば、コレラの感染拡大をかなり防いでくれます。\n\nコレラを根絶するには、[concept_theiler_biologist]に#V コレラワクチン#!を開発させる必要があります。"
 je_panum_tuberculosis: "結核の流行"
 je_panum_tuberculosis_reason: "結核は「白い死」とも称され、19世紀にはコレラと並んでもっとも多くの命を奪った伝染病です。当初は粋人の病として扱われ、やがて労働者の病となりました。結核の流行は生活水準が低く都市化の進んだいくつかの州に蔓延することがほとんどです。\n\n#ORANGE 低温殺菌#!を発明すると、コレラとの戦いで大きな効果を発揮します。この技術があれば、[concept_panum_physician]は#V 結核の治療法#!を発見できるようになります。高い医療制度も大きな助けになり、結核のさらなる予防と治療につながります。ごくまれに保養地での療養も選択肢にあがりますが、効果が上がるかどうかは不明です。\n\n結核を根絶するには、[concept_theiler_biologist]に#V 結核ワクチン#!を開発させる必要があります。"
 je_panum_smallpox: "天然痘の流行"
 je_panum_smallpox_reason: "天然痘は人類にとって最大の厄災であり、これまで多くの民族を滅ぼしてきました。18世紀には人痘摂取と種痘によってその恐怖も薄れてきましたが、予防措置を講じなければ再び猛威を振るうだろう。\n\n#ORANGE ワクチン#!を発明すると、天然痘との戦いで大きな効果を発揮します。この技術があれば、[concept_panum_physician]は#V 天然痘の治療法#!を発見できるようになります。基礎的な医療制度も大きな助けになり、天然痘のさらなる予防と治療につながります。\n\n天然痘を根絶するには、[concept_theiler_biologist]に#V 天然痘ワクチン#!を開発させる必要があります。"
 je_panum_typhus: "チフスの流行"
 je_panum_typhus_reason: "チフスは中世後期には確認されていましたが、もっとも多くの犠牲者が出たのをナポレオン戦争の時代でした。1815年に平和が訪れてからもチフスの恐怖は続きました。発疹チフスは複数の国へと急激に広がることもあり、わけても荒廃した地域では爆発的に感染が広まります。そのためチフスは戦争病と考えられており、とりわけ最前線や狭い兵舎で兵士たちに猛威を振るいます。\n\n#ORANGE 抗生物質#!を発明すると、チフスとの戦いで大きな効果を発揮します。この技術があれば、[concept_panum_physician]は#V チフスの治療法#!を発見できるようになります。基礎的な医療制度も大きな助けになり、チフスのさらなる予防と治療につながります。\n\nチフスを根絶するには、[concept_theiler_biologist]に#V チフスワクチン#!を開発させる必要があります。"
 je_panum_yellow_fever: "黄熱の流行"
 je_panum_yellow_fever_reason: "黄熱はもともと熱帯地域の風土病でしたが、19世紀にはアメリカ南部やヨーロッパに広がりました。基本的には感染が広がるのは数州だけですが、それでも猛威を振るいます。\n\n#ORANGE マラリア予防#!を発明すると、黄熱との戦いで大きな効果を発揮します。この技術があれば、[concept_panum_physician]は#V 黄熱の治療法#!を発見できるようになります。基礎的な医療制度も大きな助けになり、黄熱のさらなる予防と治療につながります。\n\n黄熱を根絶するには、[concept_theiler_biologist]に#V 黄熱ワクチン#!を開発させる必要があります。"
 panum.100.t: "[TimeKeeper.GetCurrentDate.Format('y')]年のコレラ流行"
 panum.100.d: "人類にとって忌むべき厄災たる#YELLOW コレラ#!が、わが国の都市部に広がっています。暗黒の時代が訪れようとしています。やがて国中にコレラが蔓延し、甚大な被害をもたらすことを覚悟しなくてはなりません。"
 panum.100.f: "コレラはもともと東アジアの風土病で、おそらくインド亜大陸では数世紀にわたって局所的な流行が発生したと考えられていますが、他の大陸ではまだ存在を知られていませんでした。1817年から1824年にかけて最初のパンデミックが発生し、アジアから東アフリカ、小アジアを経由してロシアやヨーロッパでも流行しました。1830年には東ガリツィアとハンガリー、翌31年6月にはウィーンで感染が確認されました。19世紀は計6回のパンデミックが発生し、当時台頭しつつあった産業社会に大きな傷を残しました。コレラ感染者のほとんど（85％）は無症状ですが、発病してから放置すると致死率は20％から70％にものぼります。"
 panum.100.g: "死神が迫っている"
 panum.102.t: "コレラの流行が[SCOPE.sCountry('panum_infected_country').GetName]に到達"
 panum.102.d: "今日、[SCOPE.sCountry('panum_infected_country').GetName]でコレラ患者が確認されたとの報告が入りました。当局は感染予防対策を怠ったとして政府に非難しています。"
 panum.102.g: "我々のせいなのか……？"
 panum.103.t: "工場のコレラ"
 panum.103.d: "[SCOPE.sState('panum_disease_state').GetName]の複数の工場で、従業員からコレラ患者が出ました。地元当局は感染を防ぐために検疫を提案しています。実行すれば経済に大きな影響が出るでしょう。"
 panum.103.f: "先週、市郊外の水車ではじめてのコレラ患者が確認されました。水車は隔離されましたが、下流にある工場では次々と感染が拡大しています。どうやってコレラが広がっているのかはまったく分かりませんが、地元の政治家たちはみな失った民衆からの信頼を取り戻そうと、厳しい規制の導入に賛同しています。"
 panum.103.g: "工場に検疫を！"
 panum.103.h: "何があっても操業を続けるべし！"
 panum.104.t: "[SCOPE.sCharacter('disease_victim_scope').GetFullName]がコレラに罹患！"
 panum.104.d: "数日前の[SCOPE.sCharacter('disease_victim_scope').GetFullName]は健康そのものに見えました。しかし昨夜から[SCOPE.sCharacter('disease_victim_scope').GetSheHe]の様子がおかしいです。これは現在[ROOT.GetCountry.GetNameNoFlag]に蔓延する恐ろしい病の初期症状に他なりません。[SCOPE.sCharacter('disease_victim_scope').GetHerHis|U]の生命は危険にさらされていますり"
 panum.104.f: "19世紀の第一次・第二次コレラ・パンデミックでは、当時の著名人も命を落としました。プロイセンは哲学者のゲオルグ・フリードリヒ・ヴィルヘルム・ヘーゲル、軍人のナイトハルト伯アウグストフォン・グナイゼナウが1831年にコレラで亡くなりました。作曲家のピョートル・イリイチ・チャイコフスキーもコレラが死因だと考えられています。ただ汚染された水をあえて飲んだのか、それとも気づかずに飲んだのかについては様々な説があります。"
 panum.104.g: "最高の治療を受けさせる！"
 panum.104.h: "わが国最高の医師が[SCOPE.sCharacter('disease_victim_scope').GetHerHim]につきっきりで診断する"
 panum.104.i: "[SCOPE.sCharacter('disease_victim_scope').GetSheHe|U]はどうでもいい……"
 panum.105.t: "富裕層の脱出"
 panum.105.d: "[SCOPE.sState('panum_disease_state').GetName]の上流階級は早くこの地域から脱出して田舎に逃れようと、みずからの財力を駆使しています。すでに検疫規制をすり抜けようと多額の賄賂が支払われています。一般大衆はこの動きを軽蔑しています。"
 panum.105.f: "コレラは中世におけるペストと似ており、貧富を区別せずに患者の命を奪うのが大きな特徴でした。そのため裕福な家族はあの手この手でコレラから逃れようとしました。貴族たちは階級を区別しないコレラをある種の「革命病」だと考えていたのです。上流階級への甘い規制は社会対立を招き、コレラは政治問題となりました。1830年代初頭のコレラの流行と革命運動が同じ流れにあったことは、たびたび指摘されています。"
 panum.105.g: "どこへなりとも行くがいい"
 panum.105.h: "「偉大なる平等」の渾名は伊達ではない"
 panum.106.t: "野党がコレラを利用"
 panum.106.d: "野党はコレラを点数稼ぎに利用しています。疫学との戦いで大きなミスをしていると、政府を糾弾する材料にしているのです。"
 panum.106.f: "社会や政治にもすさまじい影響をもたらしたコレラの流行は、自由派にとっては保守派を批判する上でうってつけの材料でした。かれらは「後進的」なエリート層に代わって、より進歩的であたらしい対処法を推進しようとしました。政情や党派が違っても、こうした保守と革新の対立構図が繰り返されたのも当然のことだったのです。"
 panum.106.g: "諸君が正しく、我々は間違っていた。一緒にコレラと戦おう！"
 panum.106.h: "この政府は状況を完全に制御下に置いている"
 panum.107.t: "集団墓地"
 panum.107.d: "[SCOPE.sState('panum_disease_state').GetName]で新しく掘られた集団墓地に批判があつまっています。なかでも下層階級は、死者をきちんと弔わずにほとんど機械のように扱っていると考えています。"
 panum.107.f: "大量の遺体と感染リスクのある状況では、集団墓地はどうしても避けられない現象です。裕福な人ほど従来どおりに埋葬され、貧しい市民の遺体がひとまとめに埋葬される現実に、民衆の怒りは頂点に達しました。"
 panum.107.g: "葬式をする暇なんてない！"
 panum.107.h: "何人も尊厳をもって埋葬されるべきだ"
 panum.108.t: "コレラ病院"
 panum.108.d: "いくつかの政党がそれぞれの利益のために協力して、下層階級に蔓延するコレラ治療のための病院を設立しました。しかしこの案が諸手をあげて歓迎されているかというと、そうでもありません。"
 panum.108.f: "コレラや結核の流行期には大勢の患者を収容できる病院を作ろうとする意見もありましたが、しばしば論争の的になってきました。見ず知らずの他人に家族を任せるよりも、自宅で療養させようとする家庭が多かったのです。他の病人とまとめて狭い場所に押し込まれたら、そこから病気が感染して死んでしまうというのが、当時多くの人が抱いた感覚でした。病院の建設は金持ちから貧乏人を切り離して守ろうとするのが目的であるとの非難が広がりました。"
 panum.108.g: "殴ってでも入院させろ！"
 panum.108.h: "頑固な連中に生きろと強制することはできない"
 panum.109.t: "パニック"
 panum.109.d: "[SCOPE.sState('panum_disease_state').GetName]当局はあらゆる手を尽くしましたが、民衆は病気の流行でもっとも危惧すべき状況、パニックを引き起こしました。"
 panum.109.f: "「我々は地球上のどんな動物よりも優れていると考えがちだ。しかし理性の皮を一枚はがせは人間もやはり動物であり、恐怖に突き動かされ、未知の明日に怯えている。歴戦の兵士ですら疫病の蔓延には震えあがるという。見えない敵と戦える人間がいるだろうか？答えは否だ。恐怖に心臓を鷲づかみにされると、人はあらゆる場所に敵を見出すようになる。敵がいれば戦わなければならない。石を投げて追い払われる病人。家に籠りきりの一家についての噂。正気で誠実な人間が自宅で銃を持ち、次にドアを叩くのが助けではなく、泥棒や追い剥ぎであることを恐れている。\n\nこれは世界の終わりではない。幻想の終わりなのだ。人間は動物だ。動物は恐怖に怯えている」\n\n[SCOPE.sState('panum_disease_state').GetName]・タイムズ、[TimeKeeper.GetCurrentDate.Format('y')]年の流行に関する記事から抜粋"
 panum.109.g: "忌々しい恐怖め！理性がない連中を助ける方法なんてあるのか？"
 panum.110.t: "Common Purpose"
 panum.110.d: "[SCOPE.sState('panum_disease_state').GetName]で起きたコレラの流行は、国民の団結意識を生みました。地域住民は協力してコレラに立ち向かおうとしています。"
 panum.110.f: "'A hospital ward is a grim place, for it is a reminder that we live in a sickly world. But that sickness does not care who you are: it does not care for what religion you keep, for the master you have, for the color of your skin or the politics you hold close to your heart. Look to the bed, And you see a man, or a woman, or a child. You see poeple, in need of help. They do not care for who brings it. They do not care if the doctor is a priest, or a soldier, or a common working man offering what little time he has to spare, endangering himself to help a stranger. They do not look to him to see a monarchist, or a republican, or an agitator, or anything else than what they truly are.\n\nThey look to him, and they see a man. A brother, a son, a countryman, but above all, a fellow Man.'\n\nAn excerpt from a news article on the outbreak of [TimeKeeper.GetCurrentDate.Format('y')], from the [SCOPE.sState('panum_disease_state').GetName] Times."
 panum.110.g: "力を合わせてコレラをやっつけよう！"
 panum.111.t: "恐怖"
 panum.111.d: "[SCOPE.sState('panum_disease_state').GetName]では遺体の山が次々と積み重なっています。もはや知り合いにコレラ患者がいない住民を探すのが難しいほどです。この地域は疫病の中心地となってしまいました。"
 panum.111.f: "ベルリンでは、1831年から73年までの42年間でコレラの流行は13回も発生しました。なかでも1848〜49年、52年、66年の流行はプロイセン各地で甚大な被害をもたらしました。66年の大流行では、公式記録では11,4683人が亡くなりました。1848年から49年にかけてのロンドンのコレラ流行では、32年の大流行よりもはるかに多くの犠牲者が出ました。死者数は約15000人にのぼり、当時のロンドンの都市人口250万人の0.5%が亡くなりました。49年9月の最初の7日間だけでも、1日あたり約300人が亡くなりました。1852年から60年にかけての第三次コレラ大流行では、ロシアでは100万人が死亡し、同時期のクリミア戦争がさらに追い打ちをかけました。イギリス軍総司令官ラグラン卿、フランス海軍司令アルマン・ジョセフ・ブリュアーもコレラで死亡しました。クリミア戦争では、直接の戦闘よりもコレラの犠牲者のほうが多かったと考えられています。"
 panum.111.g: "いったい何人が死んだんだ！？"
 panum.120.t: "コレラ流行の終息"
 panum.120.d: "[ROOT.GetCountry.GetNameNoFlag]中で人々が安堵のため息を漏らしている。当局の発表によると、最後の感染エリアでコレラの症例が確認されなくなったそうです。国家の危機は去りました。これより犠牲者を数え、平時に戻る時が来ました。"
 panum.120.f: "「神のご加護があらんことを！どうか天が新年を祝福してくれますように。豊穣と平和、繁栄の1年になりますよう。全人類の安らぎと団結の1年になりますよう。そしてどうか、コレラから世界が解放されますように」\n──ジャコモ・マイアベーア"
 panum.120.g: "いったいどれだけの犠牲が出たのか？"
 panum.200.t: "結核の流行"
 panum.200.d: "国内で疫病の流行が確認されました。[SCOPE.sState('panum_disease_state').GetName]にて、#YELLOW 結核#!が猛威を振るっています！"
 panum.200.f: "結核は昔からヨーロッパに存在していましたが、人口密度が希薄な中世初期まであまり目立たない病気でした。都市に人々が集まるようになると、結核ははじめて猛威を振るいました。15世紀中頃のイタリアを初めとしてたびたび流行し、17世紀初頭に最大・最長の流行期に入りました。19世紀から20世紀初頭にかけて、結核は都市部の貧困層の流行病として蔓延しました。1815年のイングランドでは死因の4分の1、1918年のフランスでも6分の1が結核でした。1880年代のドイツでは、15歳から40歳までグループにおける死因の第2位は結核でした。また地方部でも、結核はもっとも多い死因でした。"
 panum.200.g: "せめてロマンチックな死を迎えられないだろうか？"
 panum.220.t: "結核流行の終息"
 panum.220.d: "都市から農村までの全国の医師が、結核の流行は数週間前をピークに終息したと報告しました。病気が完全に根絶されたわけではありませんが、通常の水準に戻りつつあります。"
 panum.220.f: "「私はこの色について知っている\nあの血の粒が私の死刑執行令状だ\n私は死ぬのだな」\n──ジョン・キーツ"
 panum.300.t: "天然痘の流行"
 panum.300.d: "国内で疫病の流行が確認されました。[SCOPE.sState('panum_disease_state').GetName]にて、#YELLOW 天然痘#!が猛威を振るっています！"
 panum.300.f: "Smallpox has probably been known for thousands of years and appeared in the first settlements in northeast Africa 12,000 years ago. From there they may have been brought to India by Egyptian traders. The European conquerors brought smallpox with them to America, where it caused devastating epidemics among the Indians starting in 1518, causing millions of deaths. In Europe, smallpox was sometimes considered a childhood disease, and the disease, from which up to 10% of all small children died until the end of the 18th century, was also called “children's disease”. From the 18th century onwards, cases of smallpox increased and replaced the plague as the worst disease. It is estimated that 400,000 people died of smallpox each year, and a third of those who survived went blind. Often children were only considered part of the family once they had survived smallpox. Despite the successful introduction of smallpox vaccination around 1800, smallpox remained an epidemic disease until the second half of the century."
 panum.300.g: "すぐに化粧品が売れるだろう"
 panum.320.t: "天然痘流行の終息"
 panum.320.d: "人類最悪の疫病のひとつ、恐るべき天然痘は[ROOT.GetCountry.GetNameNoFlag]からゆっくりと姿を消しつつある。生き残った患者は生涯にわたって跡が残るでしょう。"
 panum.320.f: "「未来の国々では、かつて天然痘という恐ろしい病があったこと、そして諸君らによって駆逐されたことを、歴史の中でのみ知ることでしょう」\n──トマス・ジェファーソン"
 panum.400.t: "チフスの流行"
 panum.400.d: "国内で疫病の流行が確認されました。[SCOPE.sState('panum_disease_state').GetName]にて、#YELLOW チフス#!が猛威を振るっています！"
 panum.400.f: "発疹チフスは古代から存在していましたが、16世紀に入ると戦争と劣悪な環境でひろがる典型的な伝染病として言及されることが増えました。ナポレオンのロシア遠征でも、チフスは深刻な問題でした。1812年6月にロシアに向かったグランダルメはやがて劣勢になると撤退し、翌年秋にようやくフランス領マインツに帰還しました。このとき15000～17000人のフランス軍将兵、それにほぼ同数の市民がチフスで亡くなりました。この時の流行は「マイエンス発疹チフス（仏: Typhus de Mayence）」と呼ばれました。当時チフスは神経症によって生じると考えられ、「神経熱」とも呼ばれていました。1814年10月末までに、ヴュルツブルク大公国周辺のフランケン地方では14000件のチフス患者が確認されており、そのうち2500人が命を落としました。1918年から1922年にかけて対外戦争と内戦が続いたロシアでもチフスが流行し、およそ250万人が亡くなりました。"
 panum.400.g: "服を買えた方がいいんじゃないか？"
 panum.420.t: "チフス流行の終息"
 panum.420.d: "チフスの流行は最悪の時期を脱したようです。犠牲者数はまだ確認中だが、一つだけ確かなことがある。この恐ろしい流行の責任をだれも負うことはできない。"
 panum.420.f: "「私が知る限り、紅茶を飲もうとしないイギリス人患者はチフス患者だけだ。彼らが紅茶を飲みたがるようになることは、回復の最初の兆しである」\n──フローレンス・ナイチンゲール"
 panum.500.t: "黄熱の流行"
 panum.500.d: "国内で疫病の流行が確認されました。[SCOPE.sState('panum_disease_state').GetName]にて、#YELLOW 黄熱#!が猛威を振るっています！"
 panum.500.f: "黄熱は南アメリカやアフリカの熱帯・亜熱帯地域の風土病。18世紀から19世紀にかけて、中央アメリカやカリブ海地域、アメリカ南部で猛威を振るいました。もともとはアフリカの土着病で、大西洋三角貿易によって新大陸に持ち込まれたと考えられています。記録に残る初の黄熱の流行は1648年のユカタン半島で発生し、「黒い嘔吐（xekik）」という病気が流行したと伝えられています。それから少なくとも25回の流行が発生しました。アメリカ独立戦争中の1793年、フィラデルフィアでは黄熱によって数千人が亡くなり、ジョージ・ワシントンは市内からの撤退を余儀なくされました。チャールストン在住の医師ジョン・リニングは1728年と32年の黄熱の流行を観察し、1756年に本にまとめました。これが北アメリカで最初期の黄熱についての専門書とされています。黄熱はヨーロッパでもたびたび流行し、1821年のバルセロナでは数千人が亡くなりました。その後も1867年にはフロリダ州フォート・ジェファーソンで流行。1878年にはミシシッピ・バレーで流行し、20000人が亡くなりました。1905年のニューオリンズ以降、アメリカ国内で黄熱の流行は途絶えました。"
 panum.500.g: "腐った果実が原因なのか？"
 panum.520.t: "黄熱流行の終息"
 panum.520.d: "各地の街頭や家庭からは黄熱が消え去り、医師や当局はとうとう流行が終息したと発表しました。"
 panum.520.f: "「この病を黄熱という。しかし医師たちは聞いたことも読んだこともないそうだ」\n──トマス・ジェファーソン"
