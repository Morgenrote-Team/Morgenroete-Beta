 panum.3031.t: "First Conventinon becomes binding Convention"
 panum.3031.d: "The overwhelming majority of Red Cross members have agreed to the First International Convention Concerning the Care of War Wounded. It is now binding for all members."
 panum.3031.f: "International conventions are usually non-binding declarations of intent. However, if enough members of the Red Cross sign it, over time it will become valid international law, which all signatories are expected to comply with - and the other members will also sign it. This happens when 65 percent of all members and the majority of the Great Powers agree to this convention - then all other members are then forced to comply with it. This convention can then no longer be abolished as usual. In order to avoid binding conventions, a complete withdrawal from the Red Cross is necessary - with all the consequences."
 panum.3031.g: "A globally valid international law is created."
 panum.3032.t: "Second Convention becomes binding Convention"
 panum.3032.d: "The overwhelming majority of Red Cross members have agreed to the Second International Convention on Disarmament and Naval Warfare. It is now binding for all members."
 panum.3033.t: "Third Convention becomes binding Convention"
 panum.3034.t: "International Convention becomes binding"
 panum.3034.d: "The overwhelming majority of Red Cross members have agreed to a convention. It is now binding for all members."
 panum.3034.g: "We will check whether this is in our interest."
