 panum.2500.t: "Advanced Medical Support"
 panum.2500.d: "Our [concept_panum_physician] Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] has worked for years to improve the medical support in war. The new methods and means can now be used on the battlefield!"
 panum.2500.f: "\n'Pay attention to the exact use of this syringe. And always have enough serum on hand. And bandages. Preferably a first aid kit. Do you even know what sterilization means?'"
 panum.2500.g: "The soldiers will one day build a monument to the doctor."
