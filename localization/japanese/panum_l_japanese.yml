 je_panum_measles: "麻疹の流行"
 je_panum_measles_reason: "麻疹は致死率の高い疫病で、発病すると皮膚に赤い斑点があらわれるのが特徴です。一度流行すると多くの人命を奪い、とりわけ免疫を持たないグループには壊滅的な被害をもたらします。また感染力が非常に強く、他の地域に広がることもあります。\n\n#ORANGE 抗毒素#!を発明すると、麻疹との戦いで大きな効果を発揮します。この技術があれば、[concept_panum_physician]は#V 麻疹の治療法#!を発見できるようになります。最高レベルの医療制度も大きな助けになり、麻疹のさらなる予防と治療につながります。\n\n残念ながら、#V 麻疹ワクチン#!はVictoriaで扱われる年代以降の発明品です。"
 je_panum_scarlet: "猩紅熱の流行"
 je_panum_scarlet_reason: "猩紅熱は感染力が非常に強い疫病で、20世紀初頭までは児童の死因のほとんどを占める病気でした。\n\n#ORANGE 抗毒素#!を発明すると、猩紅熱との戦いで大きな効果を発揮します。この技術があれば、[concept_panum_physician]は#V 猩紅熱の治療法#!を発見できるようになります。高いレベルの医療制度も大きな助けになり、猩紅熱のさらなる予防と治療につながります。\n\n[concept_theiler_biologist]に#V 猩紅熱ワクチン#!を開発させることもできますが、非常に難しい作業になります。"
 je_panum_plague: "ペストの流行"
 je_panum_plague_reason: "腺ペストは中世において「黒死病」と呼ばれ、人類史上最大規模の被害をもたらした疫病です。その後消滅したと考えられていましたが、19世紀末になってふたたび姿を表しました。経済規模が小さく貧弱な医療制度しか持たない国々では、ペストは複数の地域で流行する恐れがあります。\n\n#ORANGE 抗毒素#!を発明すると、ペストとの戦いで大きな効果を発揮します。この技術があれば、[concept_panum_physician]は#V ペストの治療法#!を発見できるようになります。基礎的な医療制度も大きな助けになり、ペストのさらなる予防と治療につながります。\n\nペストを根絶するには、[concept_theiler_biologist]に#V ペストワクチン#!を開発させる必要があります。"
 je_panum_diphteria: "ジフテリアの流行"
 je_panum_diphteria_reason: "ジフテリアは致死率の高い病気。さまざまな合併症を引き起こして命を奪い、回復しても長期にわたって重篤な後遺症が残る場合があります。子供の致死率が高く、また呼吸器系疾患を引き起こすことから、ジフテリアは「子供を狙う絞殺魔」と綽名されました。流行範囲は局所的な規模にとどまります。\n\n#ORANGE 抗毒素#!を発明すると、ジフテリアとの戦いで大きな効果を発揮します。この技術があれば、[concept_panum_physician]は#V ジフテリアの治療法#!を発見できるようになります。高いレベルの医療制度も大きな助けになり、猩紅熱のさらなる予防と治療につながります。\n\nジフテリアを根絶するには、[concept_theiler_biologist]に#V ジフテリアワクチン#!を開発させる必要があります。 "
 je_panum_polio: "ポリオ"
 je_panum_polio_reason: "急性灰白髄炎、通称ポリオはおもに子供に伝染する病気。症状が現れると死亡したり、回復しても重度の障害が一生残る場合があります。かつてはまれな病気でしたが、19世紀になると散発的に流行するようになりました。\n\n#ORANGE 抗毒素#!を発明すると、ポリオとの戦いで大きな効果を発揮します。この技術があれば、[concept_panum_physician]は#V ポリオの治療法#!を発見できるようになります。最高レベルの医療制度も大きな助けになり、麻疹のさらなる予防と治療につながります。\n\n残念ながら、#V ポリオワクチン#!はVictoriaで扱われる年代以降の発明品です。 "
