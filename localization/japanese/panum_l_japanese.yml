 je_panum_measles_description_expedition_reason: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]博士は#YELLOW 麻疹#!についての貴重な知見を得るべく、医学遠征隊を率いて[SCOPE.sCountry('target').GetName]に向かいました。現地での流行が長引くほど、[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe]は毎月ごとに新たなひらめきを獲得し、この病気についての包括的な医学書を執筆できるようになります。\n\n病気が終息した場合も科学進捗は失われず、次回以降に持ち越されます。"
