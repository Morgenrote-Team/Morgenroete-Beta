 MR_NATURALIST_ACHIEVEMENTS_TT: "[AddLocalizationIf( Scope.IsSet , 'ito_naturalist_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'ito_naturalist_no_naturalist_loc')]" #deepl:1239426788

 ito_naturalist_achievements_loc: "$ito_naturalist_achievements_intro_loc$[Scope.GetCharacter.GetCustom('ito_naturalist_achievement_total_zoo_animals_type')][Scope.GetCharacter.GetCustom('ito_naturalist_achievement_total_wildlife_documentaries_type')][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_invented_evolution_theory_var').IsSet , Scope.Var('ito_naturalist_achievement_invented_evolution_theory_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_attended_hippocampus_congress_var').IsSet , Scope.Var('ito_naturalist_achievement_attended_hippocampus_congress_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_showed_evolution_in_peppered_moths_var').IsSet , Scope.Var('ito_naturalist_achievement_showed_evolution_in_peppered_moths_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_finished_pacific_expedition_var').IsSet , Scope.Var('ito_naturalist_achievement_finished_pacific_expedition_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_wallace_line_discovered_var').IsSet , Scope.Var('ito_naturalist_achievement_wallace_line_discovered_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_inaugurated_zoo_var').IsSet , Scope.Var('ito_naturalist_achievement_inaugurated_zoo_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_found_victoria_amazonica_var').IsSet , Scope.Var('ito_naturalist_achievement_found_victoria_amazonica_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_found_attacus_atlas_var').IsSet , Scope.Var('ito_naturalist_achievement_found_attacus_atlas_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_found_amorphophallus_titanum_var').IsSet , Scope.Var('ito_naturalist_achievement_found_amorphophallus_titanum_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_found_goliathus_var').IsSet , Scope.Var('ito_naturalist_achievement_found_goliathus_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_natualist_achievement_forestry_improvement_finished_var').IsSet , Scope.Var('ito_natualist_achievement_forestry_improvement_finished_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_rubber_improvement_finished_var').IsSet , Scope.Var('ito_naturalist_achievement_rubber_improvement_finished_var').GetFlagName)]" #deepl:3859703363
 ito_naturalist_no_naturalist_loc: "この[concept_dubois_naturalist]#! の#V アチーブメントは、一度でも手に入れれば、ここに表示される。" #deepl:2308010664
 ito_naturalist_achievements_intro_loc: "#V Achievements of thisNaturalist#! ㊨[Scope.GetCharacter.GetFullName] は、優れた博物学者で、[Scope.Var('dubois_naturalist_total_specimens_var').GetValue|0*V] [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] を収集した。" #deepl:2770611838

 ito_naturalist_achievement_total_zoo_animals_loc: "\[Scope.GetCharacter.GetHerHis] ナチュラリストとして在職中、合計[Scope.GetVariable('ito_naturalist_total_zoo_animals_var').GetValue|0+] [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] が捕獲され、[GetPlayer.MakeScope.GetCountry.GetName] に連れてこられた。" #deepl:3523686073
 ito_naturalist_achievement_total_wildlife_documentaries_loc: "\[GetPlayer.MakeScope.Var('dubois_naturalist_var').GetCharacter.GetFullName] [GetPlayer.MakeScope.Var('dubois_naturalist_var').GetVariable('ito_character_num_animal_documentations_var').GetValue|0+] [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] 彼らの自然な生息環境を記録することでよく知られている。" #deepl:2453492304
 ito_naturalist_achievement_invented_evolution_theory_loc: "#V \[Scope.GetCharacter.GetHerHis] 最大の功績のひとつは、進化論を初めて記述した『種の起源』#! である。" #deepl:510074125
 ito_naturalist_achievement_attended_hippocampus_congress_loc: "\[Scope.GetCharacter.GetLastNameNoFormatting] 博士は、人間が唯一無二の存在なのか、それとも他の動物と同じなのかを決める議論に参加した。" #deepl:1532833643
 ito_naturalist_achievement_showed_evolution_in_peppered_moths_loc: "\[Scope.GetCharacter.GetLastNameNoFormatting] 教授は、#V トウガラシガが環境の変化に適応するために#! 進化することを示した。進化論の証明。" #deepl:4279082533
 ito_naturalist_achievement_finished_pacific_expedition_loc: "\#V 太平洋探検#! で、[Scope.GetCharacter.GetLastNameNoFormatting] 博士はこのワンダーランドの動植物を幅広く調査した。[Scope.GetCharacter.GetSheHe] 多くの新種を発見した。" #deepl:1584400015
 ito_naturalist_achievement_wallace_line_discovered_loc: "#V \[Scope.GetCharacter.GetLastNameNoFormatting] 太平洋を旅行中に、アジアとオーストラリアの植物相と動物相が、#! 明確に分かれていることに気づいた。この発見は進化論を支持し、過去に島々が大規模に分離したことを示唆している。" #deepl:970429435
 ito_naturalist_achievement_inaugurated_zoo_loc: "[Scope.GetCharacter.GetLastNameNoFormatting] \#V 動物園の開園に尽力した#! 。遠くの動物を間近に見ることができる場所。" #deepl:915470862
 ito_naturalist_achievement_found_victoria_amazonica_loc: "\アマゾンの熱帯雨林への植物学的探検で、[Scope.GetCharacter.GetLastNameNoFormatting] 教授は#V ジャイアント・スイレン#! を発見した。葉の直径が3メートルにもなるユニークな植物。" #deepl:3652726149
 ito_naturalist_achievement_found_attacus_atlas_loc: "[Scope.GetCharacter.GetLastNameNoFormatting] \#V タイタンモス#! をインドシナ植物探検中に発見した。世界で最も大きな蝶のひとつで、非常に丈夫なシルクを作る。" #deepl:3954278434
 ito_naturalist_achievement_found_amorphophallus_titanum_loc: "\[Scope.GetCharacter.GetLastNameNoFormatting] 、ボルネオ島を探検していた教授は、#V 高さ3メートルにもなる巨大な花#! を発見した。まさに植物学上の奇跡である。" #deepl:998846928
 ito_naturalist_achievement_found_goliathus_loc: "\コンゴの熱帯雨林には多くの不思議がある。そのうちのひとつは、[Scope.GetCharacter.GetLastNameNoFormatting] 、植物学遠征で博士によって発見された。#V ゴライアスビートル#! 世界で最も大きな昆虫のひとつで、かなり珍しいらしい。" #deepl:3755908676
 ito_natualist_achievement_forestry_improvement_finished_loc: "\[Scope.GetCharacter.GetLastNameNoFormatting] 、森林と林業の改善方法に関する[Scope.GetCharacter.GetHerHis] 。" #deepl:3521424779
 ito_naturalist_achievement_rubber_improvement_finished_loc: "\[Scope.GetCharacter.GetHerHis|U] ゴム農園での作業と最適な栽培条件の実験により、わが国はゴムの生産量を大幅に向上させることができた。" #deepl:1444884744
