 lepsius_archaeologist_achievement_survived_maya_pyramid_loc: "\考古学は時に危険である。[Scope.GetCharacter.GetLastNameNoFormatting] 教授は、謎に包まれた#V マヤのピラミッド#! を巡る旅を生き延びたが、それは考古学というより冒険だった。" #deepl:2309875301
 lepsius_archaeologist_achievement_found_vilcabamba_loc: "[Scope.GetCharacter.GetLastNameNoFormatting] #V \インカ最後の避難所であるビラカンバ#! を再発見した。" #deepl:1401010459
 lepsius_archaeologist_achievement_discovered_nazca_loc: "#! \[Scope.GetCharacter.GetSheHe|U] #V  ナスカの砂漠で、空からしか見えない巨大な絵を見つけた。" #deepl:3398521121
 lepsius_archaeologist_achievement_dinosaur_myth_loc: "\Dr.[Scope.GetCharacter.GetLastNameNoFormatting] は科学界から嘲笑されている。彼は自分の#V 探検隊のメンバーは恐竜に食べられたと主張している#! 。この発言は馬鹿げているのだろうか、それとも真実なのだろうか？" #deepl:491140794
