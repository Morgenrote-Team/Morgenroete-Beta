 lepsius_archaeologist_achievement_found_tomb_of_pakal_loc: "#!\[Scope.GetCharacter.GetLastNameNoFormatting] 、博士が発見したパカル#V 墓はとても印象的だった。マヤの最も偉大な王にふさわしい。" #deepl:3301250790
 lepsius_archaeologist_achievement_raised_flag_on_pyramids_loc: "\[Scope.GetCharacter.GetSheHe] #V  ギザの大ピラミッドに旗を掲げた#! 。" #deepl:453060665
 lepsius_archaeologist_achievement_reconstructed_ishtar_gate_loc: "\nProfessor[Scope.GetCharacter.GetLastNameNoFormatting] 、#V イシュタル門#! を発見しただけでなく、それを再建した。今、それは再びすべての栄光に輝いている。" #deepl:3899648836
 lepsius_archaeologist_achievement_found_lamassu_loc: "\危険に満ちた大冒険の中で、[Scope.GetCharacter.GetSheHe] は威厳のある#V ラマス#! を見つけた。" #deepl:1325115031
