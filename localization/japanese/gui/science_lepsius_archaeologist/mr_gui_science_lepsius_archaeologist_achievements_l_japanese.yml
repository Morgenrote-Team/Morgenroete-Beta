 lepsius_archaeologist_achievement_found_gardens_of_sennacherib_loc: "[Scope.GetCharacter.GetLastNameNoFormatting] \世界の七不思議のひとつを再発見したと自慢できるのは、おそらく博士だけだろう。|U[Scope.GetCharacter.GetSheHe] 実際に#V 空中庭園#! を発見した。" #deepl:1376956218
