l_japanese:
 MR_BIOLOGIST_MICROORGANISM_RESEARCH_BUTTON: "Microorganism Research"
 MR_BIOLOGIST_MICROORGANISM_RESEARCH_BUTTON_TT: "#T Microorganism Research#!\nThe search for new [Concept('concept_theiler_microorganism','$concept_theiler_microorganisms$')], their study, and the associated experiments are an essential part of microbiological work. Biologists can not only conduct preliminary work for the search for a pathogen but also make serendipitous discoveries.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BIOLOGIST_MICROORGANISM_RESEARCH_ACTIVE_TT: "#T Microorganism Research#!\nYour [concept_theiler_biologist] is currently searching for new [Concept('concept_theiler_microorganism','$concept_theiler_microorganisms$')], studying them, and experimenting with them. Biologists can not only conduct preliminary work for the search for a pathogen but also make serendipitous discoveries.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BIOLOGIST_FIND_PATHOGEN_BUTTON: "Find Pathogen"
 MR_BIOLOGIST_FIND_PATHOGEN_BUTTON_TT: "#T Find Pathogen#!\nThe search for a [concept_theiler_pathogen] is a prerequisite for the subsequent development of a vaccine. Depending on the pathogen, the discovery process may take longer or only begin under certain conditions.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BIOLOGIST_FIND_PATHOGEN_ACTIVE_TT: "#T Find Pathogen#!\nYour [concept_theiler_biologist] is currently searching for a [concept_theiler_pathogen] which is a prerequisite for the subsequent development of a vaccine. Depending on the pathogen, the discovery process may take longer or only begin under certain conditions.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ACTIVE_BIOLOGIST_TRIGGER: "#default_text [GetPlayer.GetName] has a [concept_theiler_biologist] who is #V not busy#!.#!"
 MR_BIOLOGIST_CAN_FIND_PATHOGEN_TRIGGER_TT: "#default_text Any of these:[GetPlayer.GetCustom('GUI_theiler_can_find_cholera_trigger_custom_loc')][GetPlayer.GetCustom('GUI_theiler_can_find_diphtheria_trigger_custom_loc')][GetPlayer.GetCustom('GUI_theiler_can_find_measles_trigger_custom_loc')][GetPlayer.GetCustom('GUI_theiler_can_find_plague_trigger_custom_loc')][GetPlayer.GetCustom('GUI_theiler_can_find_polio_trigger_custom_loc')][GetPlayer.GetCustom('GUI_theiler_can_find_smallpox_trigger_custom_loc')][GetPlayer.GetCustom('GUI_theiler_can_find_tuberculosis_trigger_custom_loc')][GetPlayer.GetCustom('GUI_theiler_can_find_typhus_trigger_custom_loc')][GetPlayer.GetCustom('GUI_theiler_can_find_scarlet_trigger_custom_loc')][GetPlayer.GetCustom('GUI_theiler_can_find_yellow_fever_trigger_custom_loc')]"
 MR_BIOLOGIST_CREATE_VACCINE_BUTTON: "Create Vaccine"
 MR_BIOLOGIST_CREATE_VACCINE_BUTTON_TT: "#T Create Vaccine#!\nYour [concept_theiler_biologist] is currently creating a Vaccine, the Pinnacle of a Biologist's work. It requires first research into the [concept_theiler_pathogen] that causes the disease. Under certain circumstances, [Concept('concept_theiler_vaccine','$concept_theiler_vaccines$')] can completely prevent the outbreak of disease.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BIOLOGIST_CREATE_VACCINE_ACTIVE_TT: "#T Create Vaccine#!\nVaccine development is a biologist's pinnacle. It requires first research into the [concept_theiler_pathogen] that causes the disease. Under certain circumstances, [Concept('concept_theiler_vaccine','$concept_theiler_vaccines$')] can completely prevent the outbreak of disease.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BIOLOGIST_CAN_CREATE_VACCINE_TRIGGER_TT: "#default_text [GetPlayer.GetName] has discovered a pathogen for which there is still no vaccine and also has the corresponding technology.#!"
 MR_10000_SPECIMEN_TRIGGER_TT: "#default_text [GetPlayer.GetName] has #V 10000 or more#! [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] (currently [GetPlayer.MakeScope.Var('dubois_specimen').GetValue|0+]).#!"
 MR_BOTANICAL_EXPEDITION_BUTTON_TT: "#T Botanical Expedition#!\nBotanical expeditions (sometimes called 'Plant hunting') are scientific voyages designed to explore the flora of a particular region. A [concept_dubois_naturalist] would be responsible for identification, description and collection of specimens and [concept_ito_medicinal_plants].\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_SAFARI_EXPEDITION_BANNED_TRIGGER_TT: "#default_text Botanical Expeditions have been banned for #V political reasons#!.#!"
 MR_SAFARI_EXPEDITION_ACCESS_RAINFOREST_TRIGGER_TT: "#default_text [GetPlayer.GetName] has a State with a [concept_ito_medicinal_plants] State Trait. If that state is a #V Malaria State#! you additionally need to have researched the [GetTechnology('malaria_prevention').GetName] [concept_technology].#!"
 MR_BOTANICAL_EXPEDITION_RECALL_BUTTON_TT: "#T Recall Naturalist from Botanical Expedition#!\nOrders the [concept_dubois_naturalist] back from his botanical research to use it for other purposes - such as capturing animals.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BOTANICAL_EXPEDITION_RECALL_TRIGGER_TT: "#default_text Your [concept_dubois_naturalist] is #V neither travelling nor sick#!.#!"
 MR_BOTANICAL_EXPEDITION_RECALL_NATURALIST_EFFECT_TT: "Your [concept_dubois_naturalist] is no longer busy."
 MR_BIOLOGIST_COCHLIOMYIA_EREDICATION_BUTTON: "Cochliomyia Eradication"
 MR_BIOLOGIST_COCHLIOMYIA_EREDICATION_BUTTON_TT: "#T Cochliomyia Eradication#!\nGiven extensive technological possibilities, a biologist with government support could research a method to finally eradicate the pesky screwworm fly. This would improve agricultural yields in affected regions.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_COCHLIOMYIA_STATE_TRIGGER: "#default_text [GetPlayer.GetName] has at least one state with the #V $theiler_state_trait_cochliomyia$#! [Concept('concept_modifier','$concept_modifiers$')].#!"
 MR_BIOLOGIST_STI_BUTTON: "Sterile Insect Technique"
 MR_BIOLOGIST_STI_BUTTON_TT: "#T Sterile Insect Technique#!\nIn a state plagued by screwworm flies, a biologist can attempt to eradicate the parasite in a three-year trial.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BIOLOGIST_CYDIA_PESTICIDE_BUTTON: "Cydia Pesticide"
 MR_BIOLOGIST_CYDIA_PESTICIDE_BUTTON_TT: "#T Cydia Pesticide#!\nA biologist can develop an effective pesticide to relieve our nation's fruit growers of the crop losses caused by the codling moth.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_CYDIA_STATE_TRIGGER: "#default_text [GetPlayer.GetName] has at least one state with the #V $theiler_state_trait_cydia$#! [Concept('concept_modifier','$concept_modifiers$')].#!"
 MR_BIOLOGIST_IMPROVE_AGRICULTURE_BUTTON: "Improve Agriculture"
 MR_BIOLOGIST_IMPROVE_AGRICULTURE_BUTTON_TT: "#T Improve Agriculture#!\nYour Biologist can use their skill to improve agricultural buildings in your country. This will improve one of your [GetBuildingGroup('bg_agriculture').GetName], [GetBuildingGroup('bg_ranching').GetName] or [GetBuildingGroup('bg_plantations').GetName]-Buildings.\n\nModifiers that the building will gain:\n$theiler_building_throughput_add_modifier_with_tooltip$\n$theiler_building_production_mult_modifier_with_tooltip$\n$theiler_building_goods_input_mult_modifier_with_tooltip$\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BIOLOGIST_IMPROVE_AGRICULTURE_TRIGGER_TT: "#default_text At least one [GetBuildingGroup('bg_agriculture').GetName], [GetBuildingGroup('bg_ranching').GetName] or [GetBuildingGroup('bg_plantations').GetName]-Buildings of level 1 or higher does not have all three [Concept('concept_modifier','$concept_modifiers$')].#!"
 MR_BIOLOGIST_IMPROVE_AGRICULTURE_ACTIVE_TT: "#T Improve Agriculture#!\n#p Your Biologist is currently improving an [GetBuildingGroup('bg_agriculture').GetName], [GetBuildingGroup('bg_ranching').GetName] or [GetBuildingGroup('bg_plantations').GetName]-Buildings.#!"
 MR_ACHROMATIC_MICROSCOPE_TRIGGER_TT: "#default_text [GetPlayer.GetName] uses at least an #V Achromatic Microscope#!.#!"
