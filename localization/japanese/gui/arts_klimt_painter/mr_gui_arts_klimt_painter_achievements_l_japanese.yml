l_japanese:
 MR_PAINTER_ACHIEVEMENTS_TT: "[AddLocalizationIf( Scope.IsSet , 'klimt_painter_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'klimt_painter_achievements_no_painter_loc')]"
 klimt_painter_achievements_loc: "$klimt_painter_achievements_intro_loc$[AddLocalizationIf( Scope.Var('klimt_painter_achievement_vernissage_var').IsSet , Scope.Var('klimt_painter_achievement_vernissage_var').GetFlagName)][AddLocalizationIf( Scope.Var('klimt_painter_achievement_inaugurated_gallery_var').IsSet , Scope.Var('klimt_painter_achievement_inaugurated_gallery_var').GetFlagName)]"
 klimt_painter_achievements_no_painter_loc: "#V この[concept_klimt_painter]の功績#!を表示する。"
 klimt_painter_achievements_intro_loc: "#V この画家の実績#!\n #indent_newline:3 • [Scope.GetCharacter.GetFullName]は[Scope.GetCharacter.GetCustom('klimt_painter_achievement_experience_type')]です。#!\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe]は[Scope.Var('klimt_painter_num_paintings_var').GetValue|V0]の絵画を描き、そのうち[Scope.Var('klimt_painter_num_masterworks_var').GetValue|V0]の絵画が傑作とみなされています。#!"
 klimt_painter_achievement_vernissage_loc: "\n #indent_newline:3 • [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetLastName]は絵画を大内覧会において展示した。#!"
 klimt_painter_achievement_inaugurated_gallery_loc: "[Scope.GetCharacter.GetSheHe]は[Scope.GetCharacter.GetHerHis]の素晴らしい絵画群を展示した新しい美術館をオープンした。将来、数多くのより素晴らしい画家たちがきっとこの美術館を訪れるでしょう！#!"