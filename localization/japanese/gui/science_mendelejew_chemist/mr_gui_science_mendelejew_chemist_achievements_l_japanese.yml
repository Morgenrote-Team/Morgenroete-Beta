l_japanese:
 MR_CHEMIST_ACHIEVEMENTS_TT: "[AddLocalizationIf( Scope.IsSet , 'mendelejew_chemist_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'mendelejew_chemist_achievements_no_chemist_loc')]"
 mendelejew_chemist_achievements_loc: "$mendelejew_chemist_achievements_intro_loc$[Scope.GetCharacter.GetCustom('mendelejew_chemist_theorized_elementes_type')][Scope.GetCharacter.GetCustom('mendelejew_chemist_discovered_elementes_type')][Scope.GetCharacter.GetCustom('mendelejew_chemist_isolated_elementes_type')][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_periodic_table_inventor_var').IsSet , Scope.Var('mendelejew_chemist_achievement_periodic_table_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_invented_dynamite_var').IsSet , Scope.Var('mendelejew_chemist_achievement_invented_dynamite_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_noble_gases_discoverer_var').IsSet , Scope.Var('mendelejew_chemist_achievement_noble_gases_discoverer_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_discovered_reason_fraunhofer_lines_var').IsSet , Scope.Var('mendelejew_chemist_achievement_discovered_reason_fraunhofer_lines_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_aspirin_inventor_var').IsSet , Scope.Var('mendelejew_chemist_achievement_aspirin_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_synthetic_oil_inventor_var').IsSet , Scope.Var('mendelejew_chemist_achievement_synthetic_oil_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_synthetic_rubber_inventor_var').IsSet , Scope.Var('mendelejew_chemist_achievement_synthetic_rubber_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_attended_chemist_congress_var').IsSet , Scope.Var('mendelejew_chemist_achievement_attended_chemist_congress_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_fertilizer_improvement_finished_var').IsSet , Scope.Var('mendelejew_chemist_achievement_fertilizer_improvement_finished_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_explosives_improvement_finished_var').IsSet , Scope.Var('mendelejew_chemist_achievement_explosives_improvement_finished_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_synthetics_improvement_finished_var').IsSet , Scope.Var('mendelejew_chemist_achievement_synthetics_improvement_finished_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_discovered_radioactivity_var').IsSet , Scope.Var('mendelejew_chemist_achievement_discovered_radioactivity_var').GetFlagName)]"
 mendelejew_chemist_achievements_intro_loc: "#V この化学者の功績#!\n#indent_newline:3 ・[Scope.GetCharacter.GetFullName]は優れた化学者であった。#!"
 mendelejew_chemist_theorized_elementes_loc: "\n#indent_newline:3 ・[Scope.GetCharacter.GetLastNameNoFormatting]博士は#V [Scope.Var('mendelejew_theorized_elements_character_number_var').GetValue|0]個の元素を理論化した#!#!"
 mendelejew_chemist_discovered_elementes_loc: "\n#indent_newline:3 ・[Scope.GetCharacter.GetSheHe|U]は#V [Scope.Var('mendelejew_discovered_elements_character_number_var').GetValue|0]個の元素を発見した#!#!"
 mendelejew_chemist_isolated_elementes_loc: "\n#indent_newline:3 ・[Scope.GetCharacter.GetLastNameNoFormatting]は#V [Scope.Var('mendelejew_isolated_elements_character_number_var').GetValue|0]個の元素を単離した#!#!"
 mendelejew_chemist_achievement_periodic_table_inventor_loc: "\n#indent_newline:3 ・[Scope.GetCharacter.GetLastNameNoFormatting]教授は#V 周期表の発明者#!として知られている#!"
 mendelejew_chemist_achievement_invented_dynamite_loc: "\n#indent_newline:3 ・[Scope.GetCharacter.GetFullNameNoFormatting]は#V ダイナマイトを発明#!し、鉱業や建築、そして戦争を一変させた#!"
 mendelejew_chemist_achievement_noble_gases_discoverer_loc: "\n#indent_newline:3 ・#V 希ガスの発見#!によって、[Scope.GetCharacter.GetLastNameNoFormatting]博士は歴史に残る科学者となった#!"
 mendelejew_chemist_achievement_discovered_reason_fraunhofer_lines_loc: "\n#indent_newline:3 ・[GetPlayer.MakeScope.Var('mendelejew_chemist_var').GetCharacter.GetLastNameNoFormatting]博士はフラウンホーファー線の正体を解明し、天体分光学の分野を切り開いた#!"
 mendelejew_chemist_achievement_synthetic_oil_inventor_loc: "\n#indent_newline:3 ・[Scope.GetCharacter.GetSheHe|U]は#V 人工石油の生成法を確立#!した#!"
 mendelejew_chemist_achievement_synthetic_rubber_inventor_loc: "\n#indent_newline:3 ・[Scope.GetCharacter.GetLastNameNoFormatting]博士は#V 合成ゴムの発明#!によって、天然ゴムから世界を解放した#!"
 mendelejew_chemist_achievement_attended_chemist_congress_loc: "\n#indent_newline:3 ・[Scope.GetCharacter.GetLastNameNoFormatting]博士は#V 第1回国際化学会議#!に参加した#!"
 mendelejew_chemist_achievement_fertilizer_improvement_finished_loc: "\n#indent_newline:3 ・[Scope.GetCharacter.GetLastNameNoFormatting]博士は長い時間をかけて#V 肥料とその生産方法の改良#!研究に取り組んだ#!"
 mendelejew_chemist_achievement_explosives_improvement_finished_loc: "\n#indent_newline:3 ・[Scope.GetCharacter.GetSheHe|U]は#V 高性能爆薬と化学反応を用いた製造方法#!のパイオニアだった#!"
 mendelejew_chemist_achievement_synthetics_improvement_finished_loc: "\n#indent_newline:3 ・#V 合成製品とその生産方法の改良#!で知られる[Scope.GetCharacter.GetLastNameNoFormatting]博士は、化学界や化学産業で有名である#!"
 mendelejew_chemist_achievement_discovered_radioactivity_loc: "\n#indent_newline:3 ・[Scope.GetCharacter.GetLastNameNoFormatting]は#V 世界で初めて放射能を発見#!し、科学界に大きな足跡を残した。#!"
 mendelejew_chemist_achievements_no_chemist_loc: "The #V Achievements of this [concept_mendelejew_chemist]#! will be displayed here, once you have one."