l_japanese:
 MR_GORDON_BENNETT_CUP_BUTTON: "ゴードン・ベネット・カップ"
 MR_GORDON_BENNETT_CUP_BUTTON_TT: "#T ゴードン・ベネット・カップ#!\nゴードン・ベネット・カップ（またはクーペ・アエロナティーク・ゴードン・ベネット）は、世界最古のガス気球レースです。航空界の「ブルーリボン」とも呼ばれるこのイベントは、大富豪のスポーツマンでありニューヨーク・ヘラルド紙のオーナーでもあるジェームズ・ゴードン・ベネット・ジュニアによって主催されました。主催者によれば、このコンテストの目的は「シンプルに、離陸地点から最も遠い距離まで飛行すること」です。このコンテストは1906年から1938年まで開催されましたが、1914年から1919年までは第一次世界大戦により、また1931年にも中断されました。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GORDON_BENNETT_PUBLISHER_BUILDING_TRIGGER_TT: "#default_text [GetPlayer.GetName]は、[GetBuildingType('building_manzoni_publishing_industry').GetName]の建造物レベルを合計で#V 10以上#!所有しています。#!"