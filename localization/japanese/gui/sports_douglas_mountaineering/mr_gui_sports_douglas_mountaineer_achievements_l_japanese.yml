l_japanese:
 MR_SPORTS_MOUNTAINEERN_TT: "[AddLocalizationIf( Scope.IsSet , 'douglas_mountaineer_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'douglas_mountaineer_no_mountaineer_achievements_loc')]"
 douglas_mountaineer_achievements_loc: "$douglas_mountaineer_achievements_intro_loc$[AddLocalizationIf( Scope.Var('douglas_mountaineer_achievement_mount_everest_loc').IsSet , Scope.Var('douglas_mountaineer_achievement_mount_everest_loc').GetFlagName)]"
 douglas_mountaineer_no_mountaineer_achievements_loc: "The #V Achievements of this [concept_douglas_mountaineer]#! will be displayed here, once you have one."
 douglas_mountaineer_achievements_intro_loc: "#V Achievements of this Mountaineer#!\n[Scope.GetCharacter.GetFullName] is a mountaineer with an experience of [Scope.Var('douglas_mountaineer_experience_var').GetValue|V0]. So far [Scope.GetCharacter.GetSheHe] has done [Scope.Var('douglas_mountaineer_num_mountain_ascents_var').GetValue|V0] ascents. Of these, [Scope.Var('douglas_mountaineer_num_summits_reached_var').GetValue|V0] were successful, [Scope.Var('douglas_mountaineer_num_climbs_aborted_var').GetValue|V0] were aborted and [Scope.Var('douglas_mountaineer_num_disasters_suffered_var').GetValue|V0] ended in a disaster."
 douglas_mountaineer_achievement_mount_everest_loc: "\n[Scope.GetCharacter.GetLastNameNoFormatting] is considered the first person to #V summit Mount Everest#! and thus one of the most famous mountaineers of all time."