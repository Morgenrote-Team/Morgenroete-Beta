l_japanese:
 MR_SPORTS_MOUNTAINEERN_TT: "[AddLocalizationIf( Scope.IsSet , 'douglas_mountaineer_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'douglas_mountaineer_no_mountaineer_achievements_loc')]"
 douglas_mountaineer_achievements_loc: "$douglas_mountaineer_achievements_intro_loc$[AddLocalizationIf( Scope.Var('douglas_mountaineer_achievement_mount_everest_loc').IsSet , Scope.Var('douglas_mountaineer_achievement_mount_everest_loc').GetFlagName)]"
 douglas_mountaineer_no_mountaineer_achievements_loc: "#V この[concept_douglas_mountaineer]の功績#!を表示する。"
 douglas_mountaineer_achievements_intro_loc: "#V この登山家の業績#!\n #indent_newline:3 • [Scope.GetCharacter.GetFullName]は[Scope.Var('douglas_mountaineer_experience_var').GetValue|V0]の経験を持つ登山家です。これまでに[Scope.GetCharacter.GetSheHe]は[Scope.Var('douglas_mountaineer_num_mountain_ascents_var').GetValue|V0]回の登頂を試みました。そのうち[Scope.Var('douglas_mountaineer_num_summits_reached_var').GetValue|V0]回が成功し、[Scope.Var('douglas_mountaineer_num_climbs_aborted_var').GetValue|V0]回は中止され、[Scope.Var('douglas_mountaineer_num_disasters_suffered_var').GetValue|V0]回は惨事に終わりました。#!"
 douglas_mountaineer_achievement_mount_everest_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting]は#V エベレスト登頂#!を果たした最初の人物とみなされており、史上最も有名な登山家の一人です。#!"