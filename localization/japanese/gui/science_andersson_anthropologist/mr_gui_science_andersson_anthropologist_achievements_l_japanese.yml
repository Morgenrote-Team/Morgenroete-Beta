ist_achievement_completed_erectus_anthropologist_var').IsSet , Scope.Var('andersson_anthropologist_achievement_completed_erectus_anthropologist_var').GetFlagName)][AddLocalizationIf( Scope.Var('andersson_anthropologist_achievement_completed_australopithecus_anthropologist_var').IsSet , Scope.Var('andersson_anthropologist_achievement_completed_australopithecus_anthropologist_var').GetFlagName)][AddLocalizationIf( Scope.Var('andersson_anthropologist_achievement_completed_paranthropus_anthropologist_var').IsSet , Scope.Var('andersson_anthropologist_achievement_completed_paranthropus_anthropologist_var').GetFlagName)][AddLocalizationIf( Scope.Var('andersson_anthropologist_achievement_completed_heidelbergensis_anthropologist_var').IsSet , Scope.Var('andersson_anthropologist_achievement_completed_heidelbergensis_anthropologist_var').GetFlagName)]"
 andersson_anthropologist_no_anthropologist_loc: "#V この[concept_andersson_anthropologist]の功績#!を表示する。"
 andersson_anthropologist_achievements_intro_loc: "#V この人類学者の実績#!\n #indent_newline:3 • [Scope.GetCharacter.GetFullName]は[Scope.GetCharacter.GetCustom('andersson_anthropologist_experience_level_type')]であった。#!"
 andersson_anthropologist_achievement_famous_level_anthropologist_overview_loc: "有名な[concept_andersson_anthropologist]"
 andersson_anthropologist_achievement_experienced_level_anthropologist_overview_loc: "熟練の[concept_andersson_anthropologist]"
 andersson_anthropologist_achievement_normal_level_anthropologist_overview_loc: "練達の[concept_andersson_anthropologist]"
 andersson_anthropologist_achievement_total_human_fossils_anthropologist_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] has found a total of [Scope.Var('lepsius_total_human_fossils_anthropologist_var').GetValue|V0] Human Fossils. Those fossils consist of "
 andersson_anthropologist_achievement_no_human_fossils_anthropologist_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting]はまだ人類の化石を発見していない。#!"
 andersson_anthropologist_achievement_total_cromagnon_fossils_anthropologist_comma_loc: "[Scope.Var('lepsius_total_cromagnon_fossils_anthropologist_var').GetValue|V0]個のクロマニヨン人の化石、"
 andersson_anthropologist_achievement_total_cromagnon_fossils_anthropologist_no_comma_loc: "[Scope.Var('lepsius_total_cromagnon_fossils_anthropologist_var').GetValue|V0]個のクロマニヨン人の化石"
 andersson_anthropologist_achievement_total_neanderthalensis_fossils_anthropologist_comma_loc: "[Scope.Var('lepsius_total_neanderthalensis_fossils_anthropologist_var').GetValue|V0]個のネアンデルタール人の化石、"
 andersson_anthropologist_achievement_total_neanderthalensis_fossils_anthropologist_no_comma_loc: "[Scope.Var('lepsius_total_neanderthalensis_fossils_anthropologist_var').GetValue|V0]個のネアンデルタール人の化石"
 andersson_anthropologist_achievement_total_erectus_fossils_anthropologist_comma_loc: "[Scope.Var('lepsius_total_erectus_fossils_anthropologist_var').GetValue|V0]個のホモ・エレクトゥスの化石、"
 andersson_anthropologist_achievement_total_erectus_fossils_anthropologist_no_comma_loc: "[Scope.Var('lepsius_total_erectus_fossils_anthropologist_var').GetValue|V0]個のホモ・エレクトゥスの化石"
 andersson_anthropologist_achievement_total_australopithecus_fossils_anthropologist_comma_loc: "[Scope.Var('lepsius_total_australopithecus_fossils_anthropologist_var').GetValue|V0]個のアウストラロピテクスの化石、"
 andersson_anthropologist_achievement_total_australopithecus_fossils_anthropologist_no_comma_loc: "[Scope.Var('lepsius_total_australopithecus_fossils_anthropologist_var').GetValue|V0]個のアウストラロピテクスの化石"
 andersson_anthropologist_achievement_total_paranthropus_fossils_anthropologist_loc: "[Scope.Var('lepsius_total_paranthropus_fossils_anthropologist_var').GetValue|V0]個のパラントロプスの化石"
 andersson_anthropologist_achievement_total_identified_human_fossils_anthropologist_loc: "\n #indent_newline:3 • [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetSheHe|U]は合計で[Scope.Var('lepsius_total_identified_human_fossils_anthropologist_var').GetValue|V0]個の人類の化石を同定した。#!"
 andersson_anthropologist_achievement_attended_origin_congress_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting]教授は #V 人類の起源#!学会に出席した。#!"
 andersson_anthropologist_achievement_exposed_piltdown_fraud_loc: "\n #indent_newline:3 • [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetHerHim]のおかげで #V ピルトダウン人 が欺瞞であると暴かれた#!。#!"
 andersson_anthropologist_achievement_invented_anthropology_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting]博士は人類の骨と骨格について注意深く極めて精密に記録した最初の科学者だ。[Scope.GetCharacter.GetSheHe]は#V 人類学の先駆者#!として知られる。#!"
 andersson_anthropologist_achievement_completed_cromagnon_anthropologist_loc: "\n #indent_newline:3 • [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetSheHe|U]は初めて #V クロマニヨン人を科学的に分類#! した。#!"
 andersson_anthropologist_achievement_completed_neanderthalensis_anthropologist_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting]博士は#V ネアンデルタール人について、先史人類の系統分類学上における位置づけをした#!最初の人物である。#!"
 andersson_anthropologist_achievement_completed_erectus_anthropologist_loc: "\n #indent_newline:3 • [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetHerHis]のおかげで、人類とみなされていなかった#V ホモ・エレクトゥスが、人類として認識されるようになった #!。#!"
 andersson_anthropologist_achievement_completed_australopithecus_anthropologist_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting]教授は初めて #V アウストラロピテクスの秘密#! の解明に成功し、その外見と生活様式について結論を導き出した。#!"
 andersson_anthropologist_achievement_completed_paranthropus_anthropologist_loc: "\n #indent_newline:3 • 数少ない骨から #V 先史人類の復元を試み#! 、彼らの生活環境について結論を導き出すことができるのは一握りの人々であった。[Scope.GetCharacter.GetLastNameNoFormatting]博士は#V パラントロプス #! についてそれを成し遂げた。#!"