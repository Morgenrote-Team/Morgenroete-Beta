l_japanese:
 MR_ACTIVE_ANTHROPOLOGIST_TRIGGER_TT: "#default_text [GetPlayer.GetName] has an [concept_andersson_anthropologist] who is #V not busy#!.#!"
 MR_HAS_ANTHROPOLOGIST_TRIGGER_TT: "#default_text [GetPlayer.GetName] has an [concept_andersson_anthropologist].#!"
 MR_ANTHROPOLOGY_10_COUNTRIES_WITH_ANTHROPOLOGIST_TRIGGER_TT: "#default_text 10 or more countries have an [concept_andersson_anthropologist].#!"
 MR_ANTHROPOLOGIST_CAVE_EXPLORATION_BUTTON: "Cave Exploration"
 MR_ANTHROPOLOGIST_CAVE_EXPLORATION_BUTTON_TT: "#T Cave Exploration#!\nWith the help of an [concept_andersson_anthropologist], the previously known [Concept('concept_andersson_cave','$concept_andersson_caves$')] on national territory can be explored.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ANTHROPOLOGIST_HAS_CAVE_TRIGGER_TT: "#default_text [GetPlayer.GetName] has a [concept_andersson_cave].#!"
 MR_ANTHROPOLOGIST_NOT_HAS_CAVE_MODIFIER_TRIGGER_TT: "#default_text [GetPlayer.GetName] does #R not#! have the #V $andersson_cave_exploration_modifier$#! Modifier.#!"
 MR_ANTHROPOLOGIST_SKELETON_RECONSTRUCTION_BUTTON: "Skeleton Reconstruction"
 MR_ANTHROPOLOGIST_SKELETON_RECONSTRUCTION_BUTTON_TT: "#T Skeleton Reconstruction#!\nWith the help of an [concept_andersson_anthropologist], [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')] can be used to reconstruct a [concept_andersson_skeleton].\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ANTHROPOLOGIST_CAN_RECONSTRUCT_TRIGGER_TT: "#default_text [GetPlayer.GetName] has a #V 5#! @andersson_human_fossil! [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')] of a skeleton which has not been reconstructed yet.#!"
 MR_ANTHROPOLOGIST_HAS_INTITUTE_TRIGGER_TT: "#default_text [GetPlayer.GetName] has an [GetBuildingType('building_andersson_institute').GetName].#!"
 MR_RECALL_ANTHROPOLOGIST_BUTTON_TT: "#T Recall Anthropologist#!\nSometimes circumstances may require you to end a cave exploration prematurely. The [concept_andersson_anthropologist] is then available before the deadline expires, but does not bring any yield with him.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ORIGIN_CONGRESS_BUTTON: "Congress on Human Origin"
 MR_ORIGIN_CONGRESS_BUTTON_TT: "#T Congress on the Origin of Modern Humans#!\nWith the discovery of prehistoric human bones, the question of man's original origin also arose. While Darwin assumed an African origin, others postulated several parallel developments. From the turn of the century onwards, the dominant view was that modern humans developed in Asia.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ANTHROPOLOGY_INSTITUTE_TRIGGER_TT: "#default_text [GetPlayer.GetName] has an [GetBuildingType('building_andersson_institute').GetName].#!"
 MR_ORIGIN_CONGRESS_HUMAN_FOSSIL_TT: "#default_text [GetPlayer.GetName] has at least #V 30#! @andersson_human_fossil! [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')].#!"
 MR_ORIGIN_CONGRESS_SPECIAL_HUMAN_FOSSIL_TT: "#default_text [GetPlayer.GetName] has at least #V 10#! @andersson_human_fossil! [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')] from one of these species: #V Pithecanthropus#! or #V Australopithecus#!.#!"
 MR_ORIGIN_CONGRESS_GLOBAL_HUMAN_FOSSIL_TT: "#default_text At least #V 250#! @andersson_human_fossil! [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')] were found worldwide (currently [GetGlobalVariable('dubois_global_human_fossil').GetValue|+0] @andersson_human_fossil! were found).#!"
 NEOANTHROPUS_VAR: "@andersson_neoanthropus_fossil!  [GetPlayer.MakeScope.Var('andersson_neoanthropus_fossil_var').GetValue|V0]"
 NEOANTHROPUS_VAR_TT: "#header Neoanthropus [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')]#!\n[GetPlayer.GetName] has found @andersson_neoanthropus_fossil! [GetPlayer.MakeScope.Var('andersson_neoanthropus_fossil_var').GetValue|V0] Neoanthropus [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')]\n\nNeoanthropus Fossils:\n[GetPlayer.GetCustom('andersson_vero_fossil_discovered_type')][GetPlayer.GetCustom('andersson_lagoa_santa_fossil_discovered_type')][GetPlayer.GetCustom('andersson_cro_magnon_fossil_discovered_type')][GetPlayer.GetCustom('andersson_boskop_fossil_discovered_type')][GetPlayer.GetCustom('andersson_tianyuan_fossil_discovered_type')][GetPlayer.GetCustom('andersson_talgai_fossil_discovered_type')]"
 PALAEANTHROPUS_VAR: "@andersson_palaeanthropus_fossil!  [GetPlayer.MakeScope.Var('andersson_palaeanthropus_fossil').GetValue|V0]"
 PALAEANTHROPUS_VAR_TT: "#header Palaeanthropus [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')]#!\n[GetPlayer.GetName] has found @andersson_palaeanthropus_fossil! [GetPlayer.MakeScope.Var('andersson_palaeanthropus_fossil').GetValue|V0] Palaeanthropus [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')]\n\nPalaeanthropus Fossils:\n[GetPlayer.GetCustom('andersson_neanderthal_fossil_discovered_type')][GetPlayer.GetCustom('andersson_gibraltar_fossil_discovered_type')][GetPlayer.GetCustom('andersson_spy_fossil_discovered_type')][GetPlayer.GetCustom('andersson_krapina_fossil_discovered_type')][GetPlayer.GetCustom('andersson_galilee_fossil_discovered_type')]"
 PITHECANTHROPUS_VAR: "@andersson_pithecanthropus_fossil!  [GetPlayer.MakeScope.Var('andersson_pithecanthropus_fossil').GetValue|V0]"
 PITHECANTHROPUS_VAR_TT: "#header Pithecanthropus [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')]#!\n[GetPlayer.GetName] has found @andersson_pithecanthropus_fossil! [GetPlayer.MakeScope.Var('andersson_pithecanthropus_fossil').GetValue|V0] Pithecanthropus [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')]\n\nPithecanthropus Fossils:\n[GetPlayer.GetCustom('andersson_heidelberg_fossil_discovered_type')][GetPlayer.GetCustom('andersson_rhodesian_fossil_discovered_type')][GetPlayer.GetCustom('andersson_peking_fossil_discovered_type')][GetPlayer.GetCustom('andersson_java_fossil_discovered_type')]"
 AUSTRALOPITHECUS_VAR: "@andersson_australopithecus_fossil!  [GetPlayer.MakeScope.Var('andersson_australopithecus_fossil').GetValue|V0]"
 AUSTRALOPITHECUS_VAR_TT: "#header Australopithecus [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')]#!\n[GetPlayer.GetName] has found @andersson_australopithecus_fossil! [GetPlayer.MakeScope.Var('andersson_australopithecus_fossil').GetValue|V0] Australopithecus [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')]\n\nAustralopithecus Fossils:\n[GetPlayer.GetCustom('andersson_australopithecus_fossil_discovered_type')]"
 PREHISTORIC_ARTIFACTS_VAR: "@andersson_prehistoric_artifact!  [GetPlayer.MakeScope.Var('andersson_prehistoric_artifact_var').GetValue|V0]"
 PREHISTORIC_ARTIFACTS_VAR_TT: "#header [Concept('concept_andersson_prehistoric_artifact','$concept_andersson_prehistoric_artifacts$')]#!\n[GetPlayer.GetName] has found @andersson_prehistoric_artifact! [GetPlayer.MakeScope.Var('andersson_prehistoric_artifact_var').GetValue|V0] [Concept('concept_andersson_prehistoric_artifact','$concept_andersson_prehistoric_artifacts$')]"
 MR_ANTHROPOLOGIST_ANTHROPOLOGICAL_RESEARCH_BUTTON: "Anthropological Research"
 MR_ANTHROPOLOGIST_ANTHROPOLOGICAL_RESEARCH_BUTTON_TT: "#T Anthropological Research#!\nAn [concept_andersson_anthropologist] will primarily focus their work on the search for [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')] and [Concept('concept_andersson_prehistoric_artifact','$concept_andersson_prehistoric_artifacts$')], looking for sites throughout the country.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ANTHROPOLOGIST_HOMINID_PROSPECTING_BUTTON: "Hominid Prospecting"
 MR_ANTHROPOLOGIST_HOMINID_PROSPECTING_BUTTON_TT: "#T Hominid Prospecting#!\nAn [concept_andersson_anthropologist] and his team can search for anthropological sites to specifically find extinct human species. [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')] and [Concept('concept_andersson_prehistoric_artifact','$concept_andersson_prehistoric_artifacts$')] can be recovered. Archaic human types can only be found by using modern production methods in our [GetBuildingType('building_andersson_institute').GetName].\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ANTHROPOLOGIST_HOMINID_PROSPECTING_POSSIBLE_TRIGGER_TT: "#default_text [GetPlayer.GetName] does #R not#! have the #V $andersson_cave_exploration_modifier$#! Modifier.#!"
 MR_ANTHROPOLOGIST_IS_SPELEOLOGIST_TRIGGER_TT: "#default_text The [concept_andersson_anthropologist] has the #V $andersson_speleologist$#! [concept_character_trait].#!"
 MR_ANTHROPOLOGIST_EXPOSE_PILTDOWN_FRAUD_BUTTON: "Expose the [GetPlayer.GetCustom('andersson_fossil_piltdown')] Man Fraud"
 MR_ANTHROPOLOGIST_EXPOSE_PILTDOWN_FRAUD_BUTTON_TT: "#T Expose the [GetPlayer.GetCustom('andersson_fossil_piltdown')] Man Fraud#!\nIt is highly likely that the now infamous [GetPlayer.GetCustom('andersson_fossil_piltdown')] fossil is a fake. However, [GetGlobalVariable('andersson_piltdown_country_global_var').GetCountryDefinition.GetName] will probably defend this very prestigious fossil at all costs through its researchers. It's time to expose this lie!\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ANTHROPOLOGY_RATING_PILTDOWN_FRAUD_TT: "#default_text [GetPlayer.GetName] has at least #V 100#! Anthropological Prestige#!.#!"
 MR_ANTHROPOLOGY_PILTDOWN_NO_RECENT_TRY_TRIGGER_TT: "#default_text [GetPlayer.GetName] does not have the #V $andersson_piltdown_debate_lost_modifier$#! Modifier.#!"
 MR_ANTHROPOLOGY_PILTDOWN_NO_CURRENT_DEBATE_TRIGGER_TT: "#default_text There is #R no current debate#! about the [GetPlayer.GetCustom('andersson_fossil_piltdown')] Man.#!"
 MR_ANTHROPOLOGY_PILTDOWN_CAN_BE_EXPOSED_TRIGGER_TT: "#default_text [GetGlobalVariable('andersson_piltdown_country_global_var').GetCountryDefinition.GetName] has not successfully defended the [GetPlayer.GetCustom('andersson_fossil_piltdown')] Man in the last 5 years.#!"
 TOTAL_HUMAN_FOSSILS_VAR: "@andersson_human_fossil!  [GetPlayer.MakeScope.Var('andersson_total_human_fossil').GetValue|V0]"
 TOTAL_HUMAN_FOSSILS_VAR_TT: "#header Total [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')]#!\n[GetPlayer.GetName] has found @andersson_human_fossil! [GetPlayer.MakeScope.Var('andersson_total_human_fossil').GetValue|V0] out of @andersson_human_fossil! [GetGlobalVariable('andersson_global_human_fossil_global_var').GetValue|V0] [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')]"
 SPECIAL_HUMAN_FOSSILS_VAR: "@andersson_special_human_fossil_var!  [GetPlayer.MakeScope.Var('andersson_special_human_fossil_var').GetValue|V0]"
 SPECIAL_HUMAN_FOSSILS_VAR_TT: "#header Special [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')]#!\n[GetPlayer.GetName] has found @andersson_special_human_fossil_var! [GetPlayer.MakeScope.Var('andersson_special_human_fossil_var').GetValue|V0] Special [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')]\n\nSpecial Fossils:\n[GetPlayer.GetCustom('andersson_piltdown_fossil_discovered_type')][GetPlayer.GetCustom('andersson_paranthropus_fossil_discovered_type')]"
 PREHISTORIC_VENUSES_VAR: "@andersson_prehistoric_venus!  [GetPlayer.MakeScope.Var('andersson_prehistoric_venus_var').GetValue|V0]"
 PREHISTORIC_VENUSES_VAR_TT: "#header [Concept('concept_andersson_prehistoric_artifact','$concept_andersson_prehistoric_venuses$')]#!\n[GetPlayer.GetName] has found @andersson_prehistoric_venus! [GetPlayer.MakeScope.Var('andersson_prehistoric_venus_var').GetValue|V0] [Concept('concept_andersson_prehistoric_artifact','$concept_andersson_prehistoric_venuses$')]"