 panum_physician_achievement_successful_treatments_loc: "\[Scope.GetCharacter.GetLastNameNoFormatting] 患者の治療経験が豊富で、#o  [GetPlayer.MakeScope.Var('panum_physician_var').GetVariable('panum_physician_successful_treatments_var').GetValue] 患者の治療に成功している#! 。" #deepl:2185896488
 panum_physician_achievement_epidemiologist_loc: "[Scope.GetCharacter.GetSheHe|U] \#o $panum_epidemiologist$ #! 。" #deepl:1702393838
 panum_physician_achievement_surgeon_loc: "[Scope.GetCharacter.GetSheHe|U] \#o $panum_surgeon$ #! 。" #deepl:3171499380
 panum_physician_achievement_psychiatrist_loc: "\[Scope.GetCharacter.GetLastNameNoFormatting] 博士は人間の心を幅広く研究しており、#o  $panum_psychiatrist$ #! の著名人である。" #deepl:60079648
 panum_physician_achievement_military_physician_loc: "\#o $panum_military_physician$ #! [Scope.GetCharacter.GetSheHe] として、戦争の恐怖を目の当たりにし、恐ろしい状況下での人々の扱い方を知っている。" #deepl:696092700
 panum_physician_achievement_germ_theory_inventor_loc: "\[Scope.GetCharacter.GetLastNameNoFormatting] 、#o ジャーム理論（Germ Theory）#! 、すでに何千人もの命を救っている。" #deepl:2770995117
 panum_physician_achievement_pneumothorax_inventor_loc: "\[Scope.GetCharacter.GetHerHim] 、最も偉大な発明のひとつに、人工気胸を誘発する装置#o がある#! 。これにより肺が潰れ、結核の治療に役立つ。" #deepl:304953214
 panum_physician_achievement_thoracoplasty_inventor_loc: "[Scope.GetCharacter.GetLastNameNoFormatting] \[Scope.GetCharacter.GetHerHis] 、医師は#o 、胸郭形成術（Thoracoplasty）#! と呼ばれる肺の手術に革命をもたらし、結核患者の治療の改善を可能にする方法を考案した。" #deepl:3014173894
 panum_physician_achievement_attended_medical_congress_loc: "\[Scope.GetCharacter.GetSheHe] 少なくとも1回、#o 医学会議#! に参加し、[Scope.GetCharacter.GetHerHis] アイデアを共有した。" #deepl:1479296090
 mendelejew_chemist_achievement_aspirin_inventor_loc: "[GetPlayer.MakeScope.Var('mendelejew_chemist_var').GetCharacter.GetLastNameNoFormatting] \#o アスピリン#! の発明者であり、無数の患者に痛みを和らげただけでなく、医薬品業界に革命をもたらした。" #deepl:2162525717
 panum_physician_achievement_xray_inventor_loc: "\#o X線の発見により、#! 、[GetPlayer.MakeScope.Var('curie_physicist_var').GetCharacter.GetLastNameNoFormatting] 博士は医学と物理学に等しく革命をもたらした国際的な物理学者の一人とみなされている。" #deepl:34275984
 panum_physician_achievement_bloodtypes_inventor_loc: "#!\#o 、A、B、AB、0というさまざまな血液型が発見された。[Scope.GetCharacter.GetLastNameNoFormatting] 、血液というものをより深く理解し、輸血をより成功させるために、博士は重要な役割を果たした。" #deepl:3740473168
 panum_physician_achievement_ecg_inventor_loc: "#o #!\[Scope.GetCharacter.GetLastNameNoFormatting] 、心臓の電気的活動を測定することを可能にし、病院業務における画期的な出来事となった。" #deepl:2321856106
 panum_physician_achievement_transplantation_inventor_loc: "#! [Scope.GetCharacter.GetLastNameNoFormatting] \#o 、医学史にその名を刻んだ。" #deepl:2933890993
 panum_physician_achievement_stereotactic_method_inventor_loc: "\今日に至るまで、#o ステレオタクチック法#! [Scope.GetCharacter.GetSheHe] の発明は、脳外科手術において画期的なものと考えられている。" #deepl:147308326
 panum_physician_achievement_cardiopulmonary_bypass_inventor_loc: "#!\#o 、Dr.[Scope.GetCharacter.GetLastNameNoFormatting] 、現代医学の最高傑作を成し遂げた。" #deepl:3531788201
 panum_physician_achievement_endoscope_inventor_loc: "[Scope.GetCharacter.GetHerHis|U] \#o 内視鏡#! を発明し、人間の体内を初めて検査したことも記憶に新しい。" #deepl:2202274893
 panum_physician_achievement_ophthalmoscope_inventor_loc: "\[Scope.GetCharacter.GetLastNameNoFormatting] 、眼病の検査を容易にする器具を発明し、眼科学に貴重な貢献をした：#o The Ophthalmoscope#! 。" #deepl:657308744
 panum_physician_achievement_chemotherapy_inventor_loc: "\#o 化学療法#! [Scope.GetCharacter.GetSheHe] 最も頑固な病気でもさまざまな薬で治療できるよう開発されたこの薬は、がん患者にも、すべてが無駄ではないという希望を与えてくれる。" #deepl:1291980204
 panum_physician_achievement_iron_lung_inventor_loc: "\[GetPlayer.MakeScope.Var('tesla_engineer_var').GetCharacter.GetHerHis|U] #o  ポリオ患者の生命を維持するための最初の鉄製肺#! の建設は、この時代の最も魅力的な工学的偉業のひとつと考えられている。" #deepl:2605796385
 panum_physician_achievement_military_medicine_project_finished_loc: "\[Scope.GetCharacter.GetLastNameNoFormatting] 、#o フィールド医療の分野で最新の方法を発明し、#! 、軍の医療サービスを世界で最も認められたものにした。" #deepl:3753274088
 panum_physician_achievement_inaugurated_asylum_loc: "#! \[Scope.GetCharacter.GetLastNameNoFormatting] 、精神障害者に包括的かつ人道的な支援を提供するため、国内初の精神病院（#o ）の設立に重要な役割を果たした。" #deepl:2471346129
 panum_physician_achievement_anthrax_disease_loc: "#o \[Scope.GetCharacter.GetLastNameNoFormatting] 、炭疽菌に特化した#! 、効果的な予防法や治療法を開発してきた。" #deepl:2201385397
 panum_physician_achievement_goiter_disease_loc: "\Dr.[Scope.GetCharacter.GetLastNameNoFormatting] 、#o 甲状腺腫に特化し、#! 効果的な予防法と治療法を開発してきた。" #deepl:693298154
 panum_physician_achievement_nephrolithiasis_disease_loc: "#o \[Scope.GetCharacter.GetLastNameNoFormatting] 、腎結石症に特化した#! 、効果的な予防法と治療法を開発してきた。" #deepl:3950905505
 panum_physician_achievement_pellagra_disease_loc: "#o \[Scope.GetCharacter.GetLastNameNoFormatting] 、ペラグラに特化した#! 、効果的な予防法や治療法を開発してきた。" #deepl:1987809959
 panum_physician_achievement_rickets_disease_loc: "\Dr.[Scope.GetCharacter.GetLastNameNoFormatting] 。#o くる病#! に特化し、効果的な予防法と治療法を開発してきた。" #deepl:660217329
 panum_physician_achievement_syphilis_disease_loc: "#! \Dr.[Scope.GetCharacter.GetLastNameNoFormatting] 。#o 梅毒に特化し、その効果的な予防法と治療法を開発してきた。" #deepl:908555016
