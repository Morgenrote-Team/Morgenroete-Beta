l_japanese:
 MR_STANDARD_TIME_BUTTON: "標準時の導入"
 MR_STANDARD_TIME_BUTTON_TT: "#T 標準時の導入#!\n世界中で正確な時刻の重要性が高まりつつあり、もはや鐘塔や駅時計の鐘の音ではやっていけない。国内をすべて標準時間で統一することが大きな課題となっている。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PRIME_MERIDIAN_BUTTON: "本初子午線"
 MR_PRIME_MERIDIAN_BUTTON_TT: "#T 本初子午線#!\n全国標準時を採用する国が増えるにつれ、新たな問題が浮き彫りになっている。本初子午線をどこに置くかだ。本初子午線を基準にすれば、国際的なタイムゾーンを決めることができる。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_3_GREAT_POWERS_HAVE_STANDARD_TIME_TRIGGER_TT: "#default_text #V 3か国以上の列強#!が標準時を導入している#!"
 MR_20_COUNTRIES_HAVE_STANDARD_TIME_TRIGGER_TT: "#default_text #V 世界20か国以上#!が標準時を導入している#!"