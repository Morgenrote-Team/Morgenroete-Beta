 verrier_astronomer_achievements_intro_loc: "#V この天文学者の業績#![Scope.GetCharacter.GetFullName] [Scope.Var('verrier_astronomer_total_objects_var').GetValue|0V] [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] を発見した優れた天文学者である。" #deepl:2330629282
 verrier_astronomer_achievement_measured_distance_cygni_loc: "\61シグニからの距離（#V ）を11.4光年（#! ）で測定することにより、[Scope.GetCharacter.GetLastNameNoFormatting] 、宇宙がこれまで考えられていたよりもはるかに大きいことを一挙に示すことに成功した。" #deepl:4180687375
 verrier_astronomer_achievement_helium_discovered_loc: "\[Scope.GetCharacter.GetHerHis] 最大の功績のひとつは、#V 元素ヘリウムの発見#! 太陽の電磁スペクトルを研究していたときのこと。" #deepl:1824398573
 verrier_astronomer_achievement_uranus_discoverer_loc: "\新しい惑星が発見されるとは誰も予想していなかったが、[Scope.GetCharacter.GetLastNameNoFormatting] #V  教授が天王星#! を発見した。この発見は、太陽系にもっと惑星がないか探すことにつながった。" #deepl:596907633
 verrier_astronomer_achievement_ceres_discoverer_loc: "\多くの天文学者が火星と木星の間にある惑星を探した。しかし、[Scope.GetCharacter.GetLastNameNoFormatting] 博士は、#V ケレス#! を発見した人だった。" #deepl:134698821
 verrier_astronomer_achievement_pallas_discoverer_loc: "#! \[Scope.GetCharacter.GetLastNameNoFormatting] #V  火星と木星の間の領域に惑星パラスを発見した。" #deepl:2895291218
 verrier_astronomer_achievement_vesta_discoverer_loc: "\[Scope.GetCharacter.GetLastNameNoFormatting] #V  、火星と木星の間の領域で惑星ベスタ#! 。" #deepl:3332363292
 verrier_astronomer_achievement_juno_discoverer_loc: "\[Scope.GetCharacter.GetSheHe|U] #V  火星と木星の間の領域に惑星ジュノー#! を発見した。" #deepl:2722834301
 verrier_astronomer_neptune_discoverer_loc: "\[Scope.GetCharacter.GetHerHis] 偉大な功績のひとつは、#V 惑星海王星の発見だった#! 。この発見により、[Scope.GetCharacter.GetHerHim] 、歴史書に永遠に名を残すことになった。" #deepl:740023144
 verrier_astronomer_achievement_pluto_discoverer_loc: "\#V 冥王星#! が存在するかどうかさえ議論されていたが、教授は実際に[Scope.GetCharacter.GetLastNameNoFormatting] #V  #! この小さな惑星を発見した。天文学の偉業だ！" #deepl:2882859348
 verrier_astronomer_achievement_discovered_1843_comet_loc: "\#V 1843年#! [Scope.GetCharacter.GetSheHe] 大彗星を最初に発見したのは#V #! で、このことから[Scope.GetCharacter.GetLastNameNoFormatting] と命名された。" #deepl:493581168
 verrier_astronomer_achievement_discovered_1858_comet_loc: "\#V 、1858年の大彗星#! が地球を通過したとき、[Scope.GetCharacter.GetLastNameNoFormatting] 博士がその彗星を最初に見た。その結果、彗星は[Scope.GetCharacter.GetHerHim] にちなんで命名された。" #deepl:2184348218
 verrier_astronomer_achievement_discovered_1861_comet_loc: "\#V 、夜空の闇に浮かぶ1861年の大彗星（#! ）を最初に発見した教授（[Scope.GetCharacter.GetLastNameNoFormatting] ）は、この天体の命名者となった。" #deepl:2672737780
 verrier_astronomer_achievement_discovered_1874_comet_loc: "\n1874年の#V 大彗星#! が最初に出現したとき、それに最初に気づいたのは博士[Scope.GetCharacter.GetLastNameNoFormatting] だった。今、この彗星は永遠に[Scope.GetCharacter.GetHerHis] 。" #deepl:333537749
 verrier_astronomer_achievement_discovered_1882_comet_loc: "\#V 1882年#! は、天文学的に見ても壮観な年だった。[Scope.GetCharacter.GetLastNameNoFormatting] 教授が#V 大彗星#! を地球のフライバイで発見した。信じられない光景だ。" #deepl:3157970288
 verrier_astronomer_achievement_finished_pacific_expedition_loc: "\#V Pacific Expedition#! に参加中、[Scope.GetCharacter.GetLastNameNoFormatting] 博士は南半球でさまざまな新天体#V Astronomical Objects#! を発見した。" #deepl:27168137
 verrier_astronomer_achievement_observed_venus_transit_loc: "\#V 1874年#! 、教授[Scope.GetCharacter.GetLastNameNoFormatting] は太平洋で#V 金星の通過#! を観測した。通常、一生に一度の出来事である。" #deepl:885972622
