 verrier_astronomer_achievements_no_astronomer_loc: "#V この[concept_verrier_astronomer]の功績#!を表示する。"
 verrier_astronomer_achievements_intro_loc: "#V この天文学者の実績#!\n #indent_newline:3 • [Scope.GetCharacter.GetFullName]は優れた天文学者であり、[Scope.Var('verrier_astronomer_total_objects_var').GetValue|0V]個の[Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]を発見した。#!"
 verrier_astronomer_achievement_measured_distance_cygni_loc: "\n#indent_newline:3 ・#V はくちょう座61番星までの距離11.4光年#!を算出したことで、[Scope.GetCharacter.GetLastNameNoFormatting]はそれまで常識とされてきた宇宙の距離をさらに広げた。#!"
 verrier_astronomer_achievement_helium_discovered_loc: "\n#indent_newline:3 ・[Scope.GetCharacter.GetHerHis]最大の業績のひとつが、太陽の電磁スペクトルの研究中に#V ヘリウム元素#!を発見したことである。#!"
 verrier_astronomer_achievement_uranus_discoverer_loc: "\n#indent_newline:3 ・誰も新たな惑星などもう発見できないと考えていたが、[Scope.GetCharacter.GetLastNameNoFormatting]教授は#V 天王星を発見した。#!この発見によって太陽系内で次々と新惑星が発見された。#!"
 verrier_astronomer_achievement_ceres_discoverer_loc: "\n#indent_newline:3 ・これまで多くの天文学者が火星と木星の間に新たな惑星を見つけようとした。しかし#V ケレスを発見#!したのは[Scope.GetCharacter.GetLastNameNoFormatting]博士だ。#!"
 verrier_astronomer_achievement_pallas_discoverer_loc: "\n #indent_newline:3 ・[Scope.GetCharacter.GetLastNameNoFormatting]博士は火星と木星の間で#V 惑星パラスを発見#!した。#!"
 verrier_astronomer_achievement_vesta_discoverer_loc: "\n #indent_newline:3 ・[Scope.GetCharacter.GetLastNameNoFormatting]教授は火星と木星の間で#V 惑星ヴェスタを発見#!した。#!"
 verrier_astronomer_achievement_juno_discoverer_loc: "\n #indent_newline:3 ・[Scope.GetCharacter.GetSheHe|U]は火星と木星の間で#V 惑星ジュノーを発見#!した。#!"
 verrier_astronomer_neptune_discoverer_loc: "\n#indent_newline:3 ・[Scope.GetCharacter.GetHerHis]最大の功績の一つが、#V 海王星の発見#!だ。この発見によって[Scope.GetCharacter.GetHerHim]は永久に歴史書の1ページに記載されるだろう。#!"
 verrier_astronomer_achievement_pluto_discoverer_loc: "\n#indent_newline:3 ・#V 冥王星#!はその存在すら疑われていたが、[Scope.GetCharacter.GetLastNameNoFormatting]教授はこの小さな星を#V 発見した。#!まさに天文学的偉業だ！#!"
 verrier_astronomer_achievement_discovered_1843_comet_loc: "\n#indent_newline:3 ・#V 1843年#!、[Scope.GetCharacter.GetSheHe]ははじめて#V 大彗星を発見した#!。そのためこの年の大彗星は[Scope.GetCharacter.GetLastNameNoFormatting]彗星と名付けられた。#!"
 verrier_astronomer_achievement_discovered_1858_comet_loc: "\n#indent_newline:3 ・#V 1858年の大彗星#!が地球を通過したとき、[Scope.GetCharacter.GetLastNameNoFormatting]博士は世界ではじめてその姿を観測した。そのため[Scope.GetCharacter.GetHerHim]彗星と呼ばれた。#!"
 verrier_astronomer_achievement_discovered_1861_comet_loc: "\n#indent_newline:3 ・暗い夜空で初めて#V 1861年の大彗星#!を発見したことで、[Scope.GetCharacter.GetLastNameNoFormatting]教授はその彗星の名前の由来となった。#!"
 verrier_astronomer_achievement_discovered_1874_comet_loc: "\n#indent_newline:3 ・#V 1874年の大彗星#!が初めて姿を現したとき、それを初めて発見したのは[Scope.GetCharacter.GetLastNameNoFormatting]博士だった。そのため[Scope.GetCharacter.GetHerHis]の名前は彗星の名前として未来永劫記憶されるだろう。#!"
 verrier_astronomer_achievement_discovered_1882_comet_loc: "\n#indent_newline:3 ・#V 1882年#!は天文学にとってすばらしい1年だった。[Scope.GetCharacter.GetLastNameNoFormatting]教授は#V 大彗星#!の地球接近を発見した。信じられないような光景だった。#!"
 verrier_astronomer_achievement_finished_pacific_expedition_loc: "\n#indent_newline:3 ・#V 太平洋探検#!中、[Scope.GetCharacter.GetLastNameNoFormatting]博士は南半球で数々の新#V 天体#!を発見した。#!"
 verrier_astronomer_achievement_observed_venus_transit_loc: "\n#indent_newline:3 ・#V 1874年#!、[Scope.GetCharacter.GetLastNameNoFormatting]教授は太平洋地域で#V 金星の日面通過#!を観測した。これは人生に1度見れるかどうかというイベントだ。#!"
 verrier_astronomer_achievement_observed_carrington_event_loc: "\n#indent_newline:3 ・[Scope.GetCharacter.GetLastNameNoFormatting]博士は[Scope.GetVariable('verrier_astronomer_achievement_observed_carrington_event_var').GetValue]で#V 強力な太陽フレア#!を観測した。#!"
 verrier_astronomer_achievement_observed_corona_loc: "\n#indent_newline:3 ・#V [Scope.GetCharacter.GetHerHim]の名前を取った現象、[Scope.GetCharacter.GetLastNameNoFormatting]の数珠#!を発見した。#!"
 verrier_astronomer_achievement_sun_photo_loc: "\n#indent_newline:3 ・[Scope.GetCharacter.GetLastNameNoFormatting]博士は#V 世界初の日食の瞬間をとらえた写真#!を撮影した。#!"
 verrier_astronomer_achievement_deimos_discoverer_loc: "\n#indent_newline:3 ・[Scope.GetCharacter.GetLastNameNoFormatting]博士は#V 火星の衛星ダイモスを発見した#!。#!"
 verrier_astronomer_achievement_phobos_discoverer_loc: "\n#indent_newline:3 ・[Scope.GetCharacter.GetSheHe|U]は#V 火星の衛星フォボスを発見した#!。#!"
 verrier_astronomer_achievement_amalthea_discoverer_loc: "\n#indent_newline:3 ・[Scope.GetCharacter.GetLastNameNoFormatting]博士は#V 木星の衛星アマルテアを発見した#!。#!"
 verrier_astronomer_achievement_himalia_discoverer_loc: "\n#indent_newline:3 ・[Scope.GetCharacter.GetSheHe|U]は#V 木星の衛星ヒマリアを発見した#!。#!"
 verrier_astronomer_achievement_elara_discoverer_loc: "\n#indent_newline:3 ・[Scope.GetCharacter.GetLastNameNoFormatting]博士は#V 木星の衛星エララを発見した#!。#!"
 verrier_astronomer_achievement_pasiphae_discoverer_loc: "\n#indent_newline:3 ・[Scope.GetCharacter.GetSheHe|U]は#V 木星の衛星パシパエを発見した#!。#!"
 verrier_astronomer_achievement_sinope_discoverer_loc: "\n#indent_newline:3 ・[Scope.GetCharacter.GetLastNameNoFormatting]博士は#V 木星の衛星シノペを発見した#!。#!"
 verrier_astronomer_achievement_lysithea_discoverer_loc: "\n#indent_newline:3 ・[Scope.GetCharacter.GetSheHe|U]は#V 木星の衛星リシテアを発見した#!。#!"
 verrier_astronomer_achievement_carme_discoverer_loc: "\n#indent_newline:3 ・[Scope.GetCharacter.GetLastNameNoFormatting]博士は#V 木星の衛星カルメを発見した#!。#!"
 verrier_astronomer_achievement_enceladus_discoverer_loc: "\n#indent_newline:3 ・[Scope.GetCharacter.GetSheHe|U]は#V 土星の衛星エンケラドスを発見した#!。#!"
 verrier_astronomer_achievement_mimas_discoverer_loc: "\n#indent_newline:3 ・[Scope.GetCharacter.GetLastNameNoFormatting]博士は#V 土星の衛星ミマスを発見した#!。#!"
 verrier_astronomer_achievement_hyperion_discoverer_loc: "\n#indent_newline:3 ・[Scope.GetCharacter.GetSheHe|U]は#V 土星の衛星ハイペリオンを発見した#!。#!"
 verrier_astronomer_achievement_phoebe_discoverer_loc: "\n#indent_newline:3 ・[Scope.GetCharacter.GetLastNameNoFormatting]博士は#V 土星の衛星フェーベを発見した#!。#!"
 verrier_astronomer_achievement_titania_discoverer_loc: "\n#indent_newline:3 ・[Scope.GetCharacter.GetSheHe|U]は#V 天王星の衛星チタニアを発見した#!。#!"
 verrier_astronomer_achievement_oberon_discoverer_loc: "\n#indent_newline:3 ・[Scope.GetCharacter.GetLastNameNoFormatting]博士は#V 天王星の衛星オベロンを発見した#!。#!"
 verrier_astronomer_achievement_ariel_discoverer_loc: "\n#indent_newline:3 ・[Scope.GetCharacter.GetSheHe|U]は#V 天王星の衛星アリエルを発見した#!。#!"
 verrier_astronomer_achievement_umbriel_discoverer_loc: "\n#indent_newline:3 ・[Scope.GetCharacter.GetLastNameNoFormatting]博士は#V 天王星の衛星ウンブリエルを発見した#!。#!"
 verrier_astronomer_achievement_miranda_discoverer_loc: "\n#indent_newline:3 ・[Scope.GetCharacter.GetSheHe|U]は#V 天王星の衛星ミランダを発見した#!。#!"
 verrier_astronomer_achievement_triton_discoverer_loc: "\n#indent_newline:3 ・[Scope.GetCharacter.GetLastNameNoFormatting]博士は#V 海王星の衛星トリトンを発見した#!。#!"
 verrier_astronomer_achievement_nereid_discoverer_loc: "\n#indent_newline:3 ・[Scope.GetCharacter.GetSheHe|U]は#V 海王星の衛星ネレイドを発見した#!。#!"
 verrier_astronomer_achievement_moon_fission_loc: "\n #indent_newline:3 ・[Scope.GetCharacter.GetSheHe|U]は#V 月はもともと地球の一部#!で、やがて分裂したという仮説の提唱者とされている。#!"
 verrier_astronomer_achievement_moon_capture_loc: "\n#indent_newline:3 ・[Scope.GetCharacter.GetSheHe|U]は#V 月はまったく別の天体で、地球に捕獲された#!という仮説の提唱者と考えられている。#!"