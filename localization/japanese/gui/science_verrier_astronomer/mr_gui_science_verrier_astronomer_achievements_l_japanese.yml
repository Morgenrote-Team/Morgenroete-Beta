rier_astronomer_achievement_elara_discoverer_var').IsSet , Scope.Var('verrier_astronomer_achievement_elara_discoverer_var').GetFlagName)][AddLocalizationIf( Scope.Var('verrier_astronomer_achievement_pasiphae_discoverer_var').IsSet , Scope.Var('verrier_astronomer_achievement_pasiphae_discoverer_var').GetFlagName)][AddLocalizationIf( Scope.Var('verrier_astronomer_achievement_sinope_discoverer_var').IsSet , Scope.Var('verrier_astronomer_achievement_sinope_discoverer_var').GetFlagName)][AddLocalizationIf( Scope.Var('verrier_astronomer_achievement_lysithea_discoverer_var').IsSet , Scope.Var('verrier_astronomer_achievement_lysithea_discoverer_var').GetFlagName)][AddLocalizationIf( Scope.Var('verrier_astronomer_achievement_carme_discoverer_var').IsSet , Scope.Var('verrier_astronomer_achievement_carme_discoverer_var').GetFlagName)][AddLocalizationIf( Scope.Var('verrier_astronomer_achievement_enceladus_discoverer_var').IsSet , Scope.Var('verrier_astronomer_achievement_enceladus_discoverer_var').GetFlagName)][AddLocalizationIf( Scope.Var('verrier_astronomer_achievement_mimas_discoverer_var').IsSet , Scope.Var('verrier_astronomer_achievement_mimas_discoverer_var').GetFlagName)][AddLocalizationIf( Scope.Var('verrier_astronomer_achievement_hyperion_discoverer_var').IsSet , Scope.Var('verrier_astronomer_achievement_hyperion_discoverer_var').GetFlagName)][AddLocalizationIf( Scope.Var('verrier_astronomer_achievement_phoebe_discoverer_var').IsSet , Scope.Var('verrier_astronomer_achievement_phoebe_discoverer_var').GetFlagName)][AddLocalizationIf( Scope.Var('verrier_astronomer_achievement_titania_discoverer_var').IsSet , Scope.Var('verrier_astronomer_achievement_titania_discoverer_var').GetFlagName)][AddLocalizationIf( Scope.Var('verrier_astronomer_achievement_oberon_discoverer_var').IsSet , Scope.Var('verrier_astronomer_achievement_oberon_discoverer_var').GetFlagName)][AddLocalizationIf( Scope.Var('verrier_astronomer_achievement_ariel_discoverer_var').IsSet , Scope.Var('verrier_astro