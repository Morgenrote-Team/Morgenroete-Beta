l_japanese:
 MR_ARCHITECT_ACHIEVEMENTS_TT: "[AddLocalizationIf( Scope.IsSet , 'gaudi_architect_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'gaudi_architect_achievements_no_architect_loc')]"
 gaudi_architect_achievements_loc: "$gaudi_architect_achievements_intro_loc$[AddLocalizationIf( Scope.Var('gaudi_architecture_treatise_var').IsSet , Scope.Var('gaudi_architecture_treatise_var').GetFlagName)][AddLocalizationIf( Scope.Var('gaudi_architect_achievement_study_trip_var').IsSet , Scope.Var('gaudi_architect_achievement_study_trip_var').GetFlagName)][AddLocalizationIf( Scope.Var('gaudi_architect_achievement_urban_planning_var').IsSet , Scope.Var('gaudi_architect_achievement_urban_planning_var').GetFlagName)][AddLocalizationIf( Scope.Var('gaudi_architect_achievement_capital_expansion_var').IsSet , Scope.Var('gaudi_architect_achievement_capital_expansion_var').GetFlagName)][AddLocalizationIf( Scope.Var('gaudi_architect_achievement_art_deco_splendour_var').IsSet , Scope.Var('gaudi_architect_achievement_art_deco_splendour_var').GetFlagName)][AddLocalizationIf( Scope.Var('gaudi_architect_achievement_neoclassical_splendour_var').IsSet , Scope.Var('gaudi_architect_achievement_neoclassical_splendour_var').GetFlagName)][AddLocalizationIf( Scope.Var('gaudi_architect_achievement_bauhaus_splendour_var').IsSet , Scope.Var('gaudi_architect_achievement_bauhaus_splendour_var').GetFlagName)][AddLocalizationIf( Scope.Var('gaudi_architect_achievement_custom_monument_var').IsSet , Scope.Var('gaudi_architect_achievement_custom_monument_var').GetFlagName)]"
 gaudi_architect_achievements_no_architect_loc: "The #V Achievements of this [concept_gaudi_architect]#! will be displayed here, once you have one."
 gaudi_architect_achievements_intro_loc: "#V Achievements of this Architect#!\n[Scope.GetCharacter.GetFullName] is a [Scope.GetCharacter.GetCustom('gaudi_architect_achievement_experience_type')]. [Scope.GetCharacter.GetSheHe|U] has created [Scope.Var('gaudi_character_num_blueprints_var').GetValue|V0] #V Blueprints#! in [Scope.GetCharacter.GetHerHis] architectural career so far."
 gaudi_architect_achievement_study_trip_loc: "\n[Scope.GetCharacter.GetLastNameNoFormatting] has #V undertaken an Architect Study Trip#!."
 gaudi_architect_achievement_urban_planning_loc: "\nWith [Scope.GetCharacter.GetHerHis] #V Urban Planning#! [Scope.GetCharacter.GetSheHe] helped to improve life in cities."
 gaudi_architect_achievement_treatise_loc: "\n[Scope.GetCharacter.GetHerHis|U] #V Treatise on Architecture#! is considered a standard work."
 gaudi_architect_achievement_custom_monument_loc: "\n[Scope.GetCharacter.GetLastNameNoFormatting] is famous for having created the blueprint for a #V Unique Monument#! - an architectural masterpiece!"
 gaudi_architect_achievement_art_deco_splendour_loc: "\nOne of the most outstanding achievements of [Scope.GetCharacter.GetHerHis] career was the complete #V Urban transformation in the Art Deco style#!."
 gaudi_architect_achievement_neoclassical_splendour_loc: "\nOne of the most outstanding achievements of [Scope.GetCharacter.GetHerHis] career was the complete #V Urban transformation in the Neoclassical style#!."
 gaudi_architect_achievement_bauhaus_splendour_loc: "\nOne of the most outstanding achievements of [Scope.GetCharacter.GetHerHis] career was the complete #V Urban transformation in the Bauhaus style#!."
 gaudi_architect_achievement_capital_expansion_loc: "\n[Scope.GetCharacter.GetLastNameNoFormatting] worked tirelessly on the development of a capital city."