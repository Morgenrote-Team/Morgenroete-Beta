l_japanese:
 theme_mr_paleontology: "Morgenröte: 古生物学(陶製)"
 theme_mr_paleontology_desc: "化石や恐竜の骨など、古生物学にインスパイアされたUI。"
 mr_papermap_coprolite: "古生物学:糞石"
 mr_papermap_coprolite_desc: "ある古生物学者が現在糞石の標本を作製中のようだ。糞石とはなんだろうか？それは糞の化石だ。今回のは恐竜のものだろう。"
 mr_papermap_belemnite: "古生物学:矢石目の化石"
 mr_papermap_belemnite_desc: "ある古生物学者が矢石目の化石を発見した。矢石目は3億5800万年まえから6600万年前頃の海に生息していた生物である。"
 mr_papermap_ammonite: "古生物学:アンモナイト"
 mr_papermap_ammonite_desc: "最も有名な化石のひとつ。アンモナイトは数百万年前の海に生息していた。今では素晴らしいテーブルの飾りだ。"
 mr_papermap_trilobite: "古生物学:三葉虫"
 mr_papermap_trilobite_desc: "三葉虫は最も成功した初期の節足動物のひとつだ。悲しいかな、彼らは二畳紀に絶滅した。しかしながら幸運にも化石として残ったため、テーブル上に記念品として置いておける。"
 mr_papermap_battenberg_cake: "台所:バッテンベルクケーキ"
 mr_papermap_battenberg_cake_desc: "おなかが空いた？それならテーブルにこのおいしいケーキを置いておきましょう。バッテンベルク侯ルイスにちなんだ、マジパンで覆われたスポンジケーキです。"
 mr_papermap_old_fashioned: "台所:古風"
 mr_papermap_old_fashioned_desc: "古式ゆかしいものよりも良いものがあると思いますか？酒場の主人がこのカクテルできっとあなたを幸福な気分にいざないます！"
 mr_papermap_cucumber_ice_cream: "台所:キュウリアイスクリーム"
 mr_papermap_cucumber_ice_cream_desc: "空より日光の降り注ぐ、それは暑い晴天の日。素晴らしくさわやかなキュウリアイスクリームより良いものがあるでしょうか？"
 mr_papermap_croissant_hot_chocolate: "台所:クロワッサンとホットチョコレート"
 mr_papermap_croissant_hot_chocolate_desc: "朝食の一個のクロワッサンと一杯のホットチョコレートが最高の一日を始める秘訣です。何があなたを待ち受けようともです。"