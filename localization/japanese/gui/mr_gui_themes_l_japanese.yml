l_japanese:
 theme_mr_paleontology: "モルゲンレーテ古生物学（土製）" #deepl:1069050187
 theme_mr_paleontology_desc: "古生物学、化石、恐竜の骨にインスパイアされたユーザーインターフェース。" #deepl:415348285

 mr_papermap_coprolite: "古生物学 コプロライト"
 mr_papermap_coprolite_desc: "古生物学者が現在、コプロライトの準備に取り組んでいるようだ。コプロライトって何かって？ウンコの化石です。この場合は恐竜のものだろう。"
 mr_papermap_belemnite: "古生物学 ベレムナイト" #Please replace
 mr_papermap_belemnite_desc: "古生物学者が発見したベレムナイトの化石。この生物は3億5800万年前から6600万年前の海を闊歩していた。" #Please replace
 mr_papermap_ammonite: "古生物学 アンモナイト" #Please replace
 mr_papermap_ammonite_desc: "最も有名な化石のひとつ。このアンモナイトは数百万年前に海をさまよっていた。今は食卓の素敵な飾りです。" #Please replace
 mr_papermap_trilobite: "古生物学 三葉虫"
 mr_papermap_trilobite_desc: "三葉虫は最初の節足動物で、非常に成功した。残念なことに、三葉虫はペルム紀に絶滅してしまった。幸運にも化石化したものもあり、記念に食卓に並べることができる。"

 mr_papermap_battenberg_cake: "料理 バッテンベルグケーキ"
 mr_papermap_battenberg_cake_desc: "お腹が空いた？このおいしいケーキを食卓に並べたらどうだろう。マジパンで覆われたスポンジケーキで、バッテンベルク公ルイにちなんで名付けられた。"
 mr_papermap_cucumber_ice_cream: "料理 キュウリのアイスクリーム"
 mr_papermap_cucumber_ice_cream_desc: "空から太陽が照りつけ、暑い日が続いている。さっぱりとしたキュウリのアイスクリームほどおいしいものはないだろう。"
 mr_papermap_croissant_hot_chocolate: "料理 クロワッサンとホットチョコレート"
 mr_papermap_croissant_hot_chocolate_desc: "朝、クロワッサンとホットチョコレートで一日を始めるのは最高だ。何が待っていようと。"
