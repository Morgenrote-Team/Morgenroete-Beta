l_japanese:
 MR_GEOLOGIST_ACHIEVEMENTS: "[AddLocalizationIf( Scope.IsSet , 'agassiz_geologist_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'agassiz_geologist_no_geologist_loc')]"
 agassiz_geologist_achievements_loc: "$agassiz_geologist_achievements_intro_loc$[AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_invented_seismology_var').IsSet , Scope.Var('agassiz_geologist_achievement_invented_seismology_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_invented_plate_tectonics_var').IsSet , Scope.Var('agassiz_geologist_achievement_invented_plate_tectonics_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_attended_geologist_congress_var').IsSet , Scope.Var('agassiz_geologist_achievement_attended_geologist_congress_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_explored_volcano_var').IsSet , Scope.Var('agassiz_geologist_achievement_explored_volcano_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_discovered_helium_on_earth_var').IsSet , Scope.Var('agassiz_geologist_achievement_discovered_helium_on_earth_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_finished_pacific_expedition_var').IsSet , Scope.Var('agassiz_geologist_achievement_finished_pacific_expedition_var').GetFlagName)][AddLocalizationIf( Scope.Var('aagassiz_geologist_achievement_ring_of_fire_discovered_var').IsSet , Scope.Var('agassiz_geologist_achievement_ring_of_fire_discovered_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_moon_impact_var').IsSet , Scope.Var('agassiz_geologist_achievement_moon_impact_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_returned_from_center_of_earth_var').IsSet , Scope.Var('agassiz_geologist_achievement_returned_from_center_of_earth_var').GetFlagName)]"
 agassiz_geologist_no_geologist_loc: "#V この[concept_agassiz_geologist]の功績#!を表示する。"
 agassiz_geologist_achievements_intro_loc: "#V この地質学者の業績#!\n#indent_newline:3 ・[Scope.GetCharacter.GetLastNameNoFormatting]博士は優れた地質学者であり、[Scope.GetVariable('agassiz_geologist_minerals_var').GetValue|0V]個の[Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')]、[Scope.GetVariable('agassiz_geologist_rare_minerals_var').GetValue|0V]個の[Concept('concept_agassiz_rare_mineral','$concept_agassiz_rare_minerals$')]を蒐集した。[Scope.GetCharacter.GetHerHis|U]の地質学研究によって、[Scope.GetVariable('agassiz_geologist_geological_knowledge_var').GetValue|0V]個の[concept_agassiz_geological_knowledge]がもたらされた#!"
 agassiz_geologist_achievement_invented_seismology_loc: "\n#indent_newline:3 ・#V 地震学の発明#!は[Scope.GetCharacter.GetLastNameNoFormatting]博士の最大級の功績である。地震や火山噴火予知の端緒となった。#!"
 agassiz_geologist_achievement_invented_plate_tectonics_loc: "\n#indent_newline:3 ・#V プレートテクトニクス理論の提唱#!は[Scope.GetCharacter.GetLastNameNoFormatting]博士最大の功績……なのだろうか？[Scope.GetCharacter.GetHerHis]の同世代人には反対意見も多かった。プレートテクトニクスが[Scope.GetCharacter.GetHerHis]の最大の発見なのか、それとも忘れ去られるか。それはもっと先の話だ。#!"
 agassiz_geologist_achievement_attended_geologist_congress_loc: "\n#indent_newline:3 ・[Scope.GetCharacter.GetLastNameNoFormatting]博士は#V プレートテクトニクス会議に出席した#!#!"
 agassiz_geologist_achievement_explored_volcano_loc: "\n#indent_newline:3 ・#V 火山遠征#!は危険な冒険だったが、[Scope.GetCharacter.GetLastNameNoFormatting]博士は遠征隊に参加して多くを学んだ#!"
 agassiz_geologist_achievement_discovered_helium_on_earth_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] was the first person to #V discover Helium on Earth#! which will surely be a very useful resource in the future.#!"
 agassiz_geologist_achievement_finished_pacific_expedition_loc: "\n#indent_newline:3 ・[Scope.GetCharacter.GetFullNameNoFormatting]は#V 太平洋探検#!に参加した#!"
 agassiz_geologist_achievement_returned_from_center_of_earth_loc: "\n#indent_newline:3 ・[Scope.GetCharacter.GetLastNameNoFormatting]博士は#V 地底旅行#!を敢行し、そこから戻ってきたらしい。しかしこの話は本当なのか？#!"
 agassiz_geologist_achievement_moon_impact_loc: "\n #indent_newline:3 •[Scope.GetCharacter.GetLastNameNoFormatting]博士は #V 月は未知の巨大な天体が地球と衝突して生まれた#! という仮説を立てた。高度に推測的な理論だが、極めて独創的だ。#!"
 agassiz_geologist_achievement_ring_of_fire_discovered_loc: "\n #indent_newline:3 • #V 太平洋探検#!において、[Scope.GetCharacter.GetLastNameNoFormatting]博士は海洋の端に火山の大規模な集中（ #V 火の環#! ）がみられると記し、これが偶然の一致ではないと信じている。[Scope.GetCharacter.GetSheHe|U]はこうして地質学研究に重要な一石を投じた。#!"