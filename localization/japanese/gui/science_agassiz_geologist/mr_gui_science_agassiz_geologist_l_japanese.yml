l_japanese:
 mr_science_geologist_tab_organization: "組織"
 MR_GEOLOGIST_HIGHEST_MOUNTAIN_BUTTON: "最高峰"
 MR_GEOLOGIST_HIGHEST_MOUNTAIN_BUTTON_TT: "#T 最高峰の探索#!\n18世紀以来、それまでの地質学世界観は大きく揺らいだ。長いあいだ、世界でもっとも高い山はアンデス山脈にあると思われていたが、ヒマラヤ山脈に注目が集まりはじめたのだ。それ以来、世界でもっとも高い山の捜索は、地質学者たちのイマジネーションを燃え上がらせた。しかし、発見のメドはいまだに立っていない。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GEOLOGIST_HIMALAYAS_ACCESS_TRIGGER_TT: "#default_text [GetPlayer.GetName]はヒマラヤ地域に関心を有している#!"
 MR_GEOLOGIST_NO_HIMALAYA_SURVEY_TRIGGER_TT: "#default_text 現在、ヒマラヤ山脈で山岳調査を行なっている国が存在しない。#!"
 MR_GEOLOGIST_URANIUM_BUTTON: "ウラン鉱脈調査"
 MR_GEOLOGIST_URANIUM_BUTTON_TT: "#T ウラン鉱脈調査#!\n地質学者は国外のウラン鉱脈を調査して、鉱山を建設することができる。ただしウランの輸入には別途契約が必要となる。調査には5年を要する。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GEOLOGIST_FIND_URANIUM_TRIGGER_TT: "#default_text 未発見のウラン鉱脈が存在する#!"
 MR_GEOLOGIST_URANIUM_STOP_BUTTON_TT: "#T ウラン鉱脈調査#!\nあなたの[concept_agassiz_geologist]は、現在世界各地に眠る未知のウラン鉱脈を探している。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 mr_geologist_uranium_stop_button_effect_tt: "あなたの[concept_agassiz_geologist]がウラン鉱脈調査を中断する"