l_japanese:
 MR_COMPOSER_ACHIEVEMENTS_TT: "[AddLocalizationIf( Scope.IsSet , 'elgar_composer_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'elgar_composer_achievements_no_composer_loc')]"
 elgar_composer_achievements_loc: "$elgar_composer_achievements_intro_loc$[Scope.GetCharacter.GetCustom('elgar_composer_achievement_is_composer_virtuoso_type')][Scope.GetCharacter.GetCustom('elgar_composer_achievement_is_composer_conductor_type')]"
 elgar_composer_achievements_no_composer_loc: "#V この[concept_elgar_composer]の功績#!を表示する。"
 elgar_composer_achievements_intro_loc: "#V この作曲家の実績#!\n #indent_newline:3 • [Scope.GetCharacter.GetFullName]は[Scope.Var('elgar_composer_experience').GetValue|V0]の評価を得ている作曲家です。[Scope.GetCharacter.GetSheHe]はこれまでに[Scope.Var('elgar_composer_num_tours_var').GetValue|V0]回の公演を終えました。[Scope.GetCharacter.GetHerHis]の数多の楽曲のうち、[Scope.Var('elgar_composer_num_compositions_var').GetValue|V0]が特に際立っています。#!"
 elgar_composer_achievement_is_composer_virtuoso_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U]は素晴らしい #V 演奏家#!です。#!"
 elgar_composer_achievement_is_composer_conductor_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U]は有名な #V 指揮者#!だと評判です。#!"