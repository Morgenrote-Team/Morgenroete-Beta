me)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_plateosaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_plateosaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_giraffatitan_var').IsSet , Scope.Var('dubois_paleontologist_achievement_giraffatitan_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_spinosaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_spinosaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_psittacosaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_psittacosaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_velociraptor_var').IsSet , Scope.Var('dubois_paleontologist_achievement_velociraptor_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_muttaburrasaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_muttaburrasaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_rhoetosaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_rhoetosaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_mosasaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_mosasaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_plesiosaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_plesiosaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_basilosaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_basilosaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_megalodon_var').IsSet , Scope.Var('dubois_paleontologist_achievement_megalodon_var').GetFlagName)]" #deepl:3270133421

 dubois_paleontologist_no_paleontologist_loc: "この[concept_dubois_paleontologist]#! の#V アチーブメントは、一度でも手に入れれば、ここに表示される。" #deepl:2334446280
 dubois_paleontologist_achievements_intro_loc: "#V Achievements of thisPaleontologist#! ୧[Scope.GetCharacter.GetFullNameNoFormatting] is[Scope.GetCharacter.GetCustom('dubois_paleontologist_experience_level_type')] who collected total of[Scope.Var('dubois_paleontologist_total_fossils_var').GetValue|0+] [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] and[Scope.Var('dubois_dinosaur_bone_total_paleontologist_var').GetValue|0+] [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] ." #deepl:39291484

 dubois_paleontologist_achievement_opened_first_paleontological_museum_loc: "\[Scope.GetCharacter.GetSheHe|U] #V  世界初の古生物学博物館#! を設立し、さまざまな化石を展示している。" #deepl:2735413684
 dubois_paleontologist_achievement_attended_extinction_congress_loc: "[Scope.GetCharacter.GetLastNameNoFormatting] 博士は、恐竜がどのようにして絶滅したかを解明しようとする会議に参加した。" #deepl:3929204720
 dubois_paleontologist_achievement_fossil_amber_loc: "\[Scope.GetCharacter.GetSheHe|U] #V  琥珀#! の中に小さな蚊が閉じ込められているユニークな破片を発見した。もしかしたら恐竜の血も混じっているかも？" #deepl:1354321492
 dubois_paleontologist_achievement_fossil_ammonite_loc: "\[Scope.GetCharacter.GetLastNameNoFormatting] 、#V アンモナイトを発見した。#! 海洋堆積物の年代区分に役立つだろう。" #deepl:2717312690
 dubois_paleontologist_achievement_fossil_archaeopteryx_loc: "\[Scope.GetCharacter.GetLastNameNoFormatting] 博士の発見を最初の鳥と考える人は多い。確かに、#V Archaeopteryx#! は恐竜と鳥類のミッシングリンクのようだ。" #deepl:3644254959
 dubois_paleontologist_achievement_fossil_composita_loc: "\#V Compositas#! は、ほとんどすべての大陸で数百万年前に生息していた貝である。[Scope.GetCharacter.GetLastNameNoFormatting] 教授は[Scope.GetCharacter.GetHerHis] 発掘の1つ中に1つを見つけた。" #deepl:1938126946
 dubois_paleontologist_achievement_fossil_eusthenopteron_loc: "\興味深いことに、[Scope.GetCharacter.GetSheHe] が発見した#V Eusthenopteron#! 、その前鰭にはすでに明瞭な上腕骨、尺骨、橈骨がある。これらの骨は陸上で生活する脊椎動物すべてに存在する。" #deepl:1906215431
 dubois_paleontologist_achievement_fossil_ichthyosaurus_loc: "\#V イクチオサウラ（Ichthyosaura）#! 、そのうちの一匹を博士（[Scope.GetCharacter.GetLastNameNoFormatting] ）が発見した。非常にユニークな爬虫類である。イルカに似ていて、卵を産まず、生きたまま子供を産む。" #deepl:1058896905
 dubois_paleontologist_chievement_fossil_ichthyostega_loc: "\#V 、イクチオステガ（Ichthyostega）#! の発見により、[Scope.GetCharacter.GetLastNameNoFormatting] 教授は最古の陸上生活動物のひとつを発見した。魚類と四肢のある四肢動物との間のミッシング・リンクである。" #deepl:178680301
 dubois_paleontologist_achievement_fossil_megatherium_loc: "\ナマケモノは現在では小さいが、過去には巨大なものがいたことが、[Scope.GetCharacter.GetLastNameNoFormatting] 博士の発見のひとつで明らかになった。#V メガテリウム#! は体長6メートル（20フィート）もあった。" #deepl:2625011393
 dubois_paleontologist_achievement_fossil_pterodactylus_loc: "[Scope.GetCharacter.GetSheHe|U] \#V Pterodactylus#! 、おそらく湖や川の近くに生息していた翼を持つ恐竜の化石を発見した。" #deepl:1358755979
 dubois_paleontologist_achievement_fossil_smilodon_loc: "\#V スミロドン#! は数千年前まで生息していた恐ろしい肉食動物である。[Scope.GetCharacter.GetLastNameNoFormatting] 教授は非常に保存状態の良い骨格を発見した。" #deepl:209509221
 dubois_paleontologist_achievement_fossil_trilobite_loc: "\[Scope.GetCharacter.GetHerHis] マイナーな発見のひとつに、さまざまな T#V 三葉虫#! がある。目を見張るようなものではないが、素晴らしい指標となる化石である。" #deepl:623281739
 dubois_paleontologist_achievement_fossil_haast_eagle_loc: "[Scope.GetCharacter.GetLastNameNoFormatting] \[Scope.GetCharacter.GetSheHe] 現在では#V Haast Eagle#! と呼ばれている。" #deepl:758643186
 dubois_paleontologist_achievement_perfect_ankylosaurus_loc: "\[Scope.GetCharacter.GetLastNameNoFormatting] 、#V アンキロサウルス#! を完璧に復元した。他の古生物学者はその復元に驚嘆する。" #deepl:2799229951
 dubois_paleontologist_achievement_imperfect_ankylosaurus_loc: "\[Scope.GetCharacter.GetLastNameNoFormatting] 、#V アンキロサウルス#! を復元したが、不完全な方法だった。" #deepl:3408874547
 dubois_paleontologist_achievement_poor_ankylosaurus_loc: "\[Scope.GetCharacter.GetLastNameNoFormatting] 、#V アンキロサウルス#! を復元したが、それはひどい試みで、他の古生物学者からは笑われている。" #deepl:2085395454
 dubois_paleontologist_achievement_perfect_diplodocus_loc: "\#V ディプロドクス#! の[Scope.GetCharacter.GetHerHis|U] 復元は完璧で、すべての古生物学博物館が羨むほどだ。" #deepl:3626804845
 dubois_paleontologist_achievement_imperfect_diplodocus_loc: "[Scope.GetCharacter.GetHerHis|U] \#V ディプロドクス#! の復元は十分である。" #deepl:412034719
 dubois_paleontologist_achievement_poor_diplodocus_loc: "[Scope.GetCharacter.GetHerHis|U] #V ディプロドクス の復元は悲惨であり、醜態とみなされる。#! " #deepl:3022704965
 dubois_paleontologist_achievement_perfect_triceratop_loc: "[Scope.GetCharacter.GetLastNameNoFormatting]\#V トリケラトプス#! の完璧な復元は広く知られており、当センターの古生物コレクションの名声を高めている。" #deepl:2010941711
 dubois_paleontologist_achievement_imperfect_triceratop_loc: "[Scope.GetCharacter.GetLastNameNoFormatting]\#V トリケラトプス#! の復元は、当館にとっては十分だが、特別なものではない。" #deepl:996647347
 dubois_paleontologist_achievement_poor_triceratop_loc: "Dr.[Scope.GetCharacter.GetLastNameNoFormatting]'s#V Triceratops#! 復元されたトリケラトプスの恐怖は、私たちのコレクションにとって残念なことである。" #deepl:1193371056
 dubois_paleontologist_achievement_perfect_tyrannosaurus_loc: "\#V ティラノサウルス・レックス#! は素晴らしい光景だ。特に教授[Scope.GetCharacter.GetLastNameNoFormatting] 、完璧に組み立てられたもの。" #deepl:2375174801
 dubois_paleontologist_achievement_imperfect_tyrannosaurus_loc: "\#V ティラノサウルス・レックス#! は素晴らしい光景だ。たとえ、[Scope.GetCharacter.GetLastNameNoFormatting] 教授が復元したもののように完璧に組み立てられていないとしても。" #deepl:2816655238
 dubois_paleontologist_achievement_poor_tyrannosaurus_loc: "\#V ティラノサウルス・レックス#! は素晴らしい光景だ。しかし、[Scope.GetCharacter.GetLastNameNoFormatting] 教授が組み立てたものは違う。これはただの不条理な怪物だ。" #deepl:2924846018
 dubois_paleontologist_achievement_perfect_stegosaurus_loc: "\#V ステゴサウルス#! 骨格標本[Scope.GetCharacter.GetSheHe] は、恐竜展にぴったりの作品です。" #deepl:1011030116
 dubois_paleontologist_achievement_imperfect_stegosaurus_loc: "\#V ステゴサウルス#! の骨格標本[Scope.GetCharacter.GetSheHe] を組み立てた。" #deepl:3364926958
 dubois_paleontologist_achievement_poor_stegosaurus_loc: "\おぞましい#V ステゴサウルス#! の骨格[Scope.GetCharacter.GetSheHe] を組み立てたが、私たちの恐竜展ではスペースの無駄になっている。" #deepl:1841850726
 dubois_paleontologist_achievement_perfect_antarctosaurus_loc: "\#V Antarctosaurus#! を、Dr.[Scope.GetCharacter.GetLastNameNoFormatting] のように完璧に組み立てられる人はそうはいない。私たちのコレクションのハイライトのひとつです。" #deepl:4276626573
 dubois_paleontologist_achievement_imperfect_antarctosaurus_loc: "\#V 南極ザウルス#! を組み立てるのは大変な作業だが、[Scope.GetCharacter.GetLastNameNoFormatting] 博士はそれを見事にやってのけた。" #deepl:4006286419
 dubois_paleontologist_achievement_poor_antarctosaurus_loc: "\#V 南極ザウルス#! を組み立てられる人はそうはいない。しかし、[Scope.GetCharacter.GetLastNameNoFormatting] 博士のように恐ろしく下手くそに組み立てる人はあまりいない。私たちのコレクションの恥である。" #deepl:3523325515
 dubois_paleontologist_achievement_perfect_argyrosaurus_loc: "\素晴らしい#V アルギロサウルス#! の骨格標本は[Scope.GetCharacter.GetLastNameNoFormatting] 教授の作品である。本当に素晴らしい骨格です。" #deepl:2395444631
 dubois_paleontologist_achievement_imperfect_argyrosaurus_loc: "\#V アルギロサウルス（Argyrosaurus）#! の骨格標本は、[Scope.GetCharacter.GetLastNameNoFormatting] 教授の作品である。なかなかよくできた骨格標本である。" #deepl:2170414433
 dubois_paleontologist_achievement_poor_argyrosaurus_loc: "\#V アルギロサウルス#! 当館所蔵の怪物的なアルギロサウルス の骨格標本は、[Scope.GetCharacter.GetLastNameNoFormatting] 教授の作品である。明らかに不器用な古生物学者の作品である。" #deepl:2917340443
 dubois_paleontologist_achievement_perfect_iguanodon_loc: "[Scope.GetCharacter.GetSheHe|U] \#V イグアノドン#! の骨格を完璧に組み立てた。" #deepl:3595520963
 dubois_paleontologist_achievement_imperfect_iguanodon_loc: "\[Scope.GetCharacter.GetSheHe|U] #V  イグアノドン#! の骨格を組み立てた。" #deepl:948446383
 dubois_paleontologist_achievement_poor_iguanodon_loc: "\[Scope.GetCharacter.GetSheHe|U] #V  イグアノドン#! の骨格を恐ろしく間違って組み立てた。" #deepl:60351557
 dubois_paleontologist_achievement_perfect_plateosaurus_loc: "\[Scope.GetCharacter.GetLastNameNoFormatting] 博士は、#V プラテオサウルス#! の骨格を完璧に復元することができた。私たちのコレクションにとって素晴らしい展示品です。" #deepl:3288975063
 dubois_paleontologist_achievement_imperfect_plateosaurus_loc: "\[Scope.GetCharacter.GetLastNameNoFormatting] 博士は、#V プラテオサウルス#! の骨格を復元することができた。" #deepl:3540574047
 dubois_paleontologist_achievement_poor_plateosaurus_loc: "[Scope.GetCharacter.GetLastNameNoFormatting] \#V プラテオサウルス#! の骨格を復元することができた。しかし、それは非常に奇妙で変形しているように見える。" #deepl:4210803243
 dubois_paleontologist_achievement_perfect_giraffatitan_loc: "\#V キリンファティタン#! を復元するのは大変な作業で、多くのスペースが必要です。ありがたいことに、教授（[Scope.GetCharacter.GetLastNameNoFormatting] ）は当館の広さを利用して、立派な恐竜の骨格標本を用意することができた。" #deepl:1815044749
 dubois_paleontologist_achievement_imperfect_giraffatitan_loc: "\#V キリンファティタン#! を復元するのは大変な作業で、広いスペースが必要です。ありがたいことに、教授（[Scope.GetCharacter.GetLastNameNoFormatting] ）は恐竜の骨格を準備するために、私たちの博物館の広さを利用することができた。" #deepl:3585680135
 dubois_paleontologist_achievement_poor_giraffatitan_loc: "\#V キリンファティタン#! を復元するのは大変な作業で、かなりのスペースが必要だ。[Scope.GetCharacter.GetSheHe] 、博物館全体が仕事場であるにもかかわらず、教授[Scope.GetCharacter.GetLastNameNoFormatting] 、恐竜の不合理なバージョンを作ることしかできなかった。" #deepl:2737374971
 dubois_paleontologist_achievement_perfect_spinosaurus_loc: "\#V スピノサウルス#! の骨格標本は、[Scope.GetCharacter.GetLastNameNoFormatting] 博士が組み立てたもので、芸術品です。" #deepl:493475787
 dubois_paleontologist_achievement_imperfect_spinosaurus_loc: "\怖い#V スピノサウルス#! 骨格標本は[Scope.GetCharacter.GetLastNameNoFormatting] 博士によって収集された。" #deepl:1960639131
 dubois_paleontologist_achievement_poor_spinosaurus_loc: "\面白い#V スピノサウルス#! 骨格標本は[Scope.GetCharacter.GetLastNameNoFormatting] 博士によって組み立てられた。この骨格は出来が悪く、恐竜というより鶏のように見える。" #deepl:308117810
 dubois_paleontologist_achievement_perfect_psittacosaurus_loc: "\口がくちばしに似ていることから、[Scope.GetCharacter.GetLastNameNoFormatting] 教授が組み立てた#V プシッタコサウルス#! は、並外れた骨格であった。" #deepl:3089964090
 dubois_paleontologist_achievement_imperfect_psittacosaurus_loc: "\口がくちばしに似ていることから、[Scope.GetCharacter.GetLastNameNoFormatting] 教授が組み立てた#V プシッタコサウルス#! 、素晴らしい骨格だった。" #deepl:1049217798
 dubois_paleontologist_achievement_poor_psittacosaurus_loc: "\#V プシッタコサウルス#! は本当に背中に奇妙なくちばしがあり、口の代わりに幹があったのだろうか？少なくとも[Scope.GetCharacter.GetLastNameNoFormatting] 教授はそう考えているが、彼だけかもしれない。" #deepl:4134331305
 dubois_paleontologist_achievement_perfect_velociraptor_loc: "\怖い#V ヴェロキラプトル#! は、[Scope.GetCharacter.GetLastNameNoFormatting] 博士の傑作の一つです。完璧に組み立てられている。" #deepl:2793253329
 dubois_paleontologist_achievement_imperfect_velociraptor_loc: "\怖い#V ヴェロキラプトル#! は、[Scope.GetCharacter.GetLastNameNoFormatting] 博士の良い作品です。[Scope.GetCharacter.GetSheHe] かなり上手に組み立てました。" #deepl:4153443130
 dubois_paleontologist_achievement_poor_velociraptor_loc: "\怖い#V ヴェロキラプトル#! は、[Scope.GetCharacter.GetLastNameNoFormatting] 博士の最悪の作品の一つである。第一に、小さすぎる。第二に、王冠のような10本の爪はなかったはずだ...。" #deepl:3768344000
 dubois_paleontologist_achievement_perfect_muttaburrasaurus_loc: "\[Scope.GetCharacter.GetLastNameNoFormatting] 教授が復元した#V ムタブラサウルス#! は非常に印象的だったが、その大きさだけが理由ではない。" #deepl:877060609
 dubois_paleontologist_achievement_imperfect_muttaburrasaurus_loc: "\[Scope.GetCharacter.GetLastNameNoFormatting] 教授が復元した#V ムタブラサウルス#! は、その大きさからしてかなり印象的だった。" #deepl:2230628960
 dubois_paleontologist_achievement_poor_muttaburrasaurus_loc: "\[Scope.GetCharacter.GetLastNameNoFormatting] 教授が復元した#V ムッタブラザウルス#! はひどいものだった。他の古生物学者の誰もが、頭が尾にくっついていないこと、膝が反対側に曲がっていることを指摘した。" #deepl:1428907282
 dubois_paleontologist_achievement_perfect_rhoetosaurus_loc: "\#V Rhoetosaurus#! の大きさは印象的だ。しかし、[Scope.GetCharacter.GetLastNameNoFormatting]'博士の技術がなければ、それはきっとそれほど印象的なものではなかっただろう。" #deepl:2002445198
 dubois_paleontologist_achievement_imperfect_rhoetosaurus_loc: "\#V Rhoetosaurus#! の大きさは印象的だ。しかし、[Scope.GetCharacter.GetLastNameNoFormatting]'博士の技術がなければ、それは間違いなく印象的ではなかっただろう。'." #deepl:2197585922
 dubois_paleontologist_achievement_poor_rhoetosaurus_loc: "\#V Rhoetosaurus#! の背中に尻尾があると考えたのは、おそらく[Scope.GetCharacter.GetLastNameNoFormatting] 博士の最も愚かな考えだった。少なくともまだ...。" #deepl:2580418601
 dubois_paleontologist_achievement_perfect_mosasaurus_loc: "\[GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] 、教授が復元した#o ミササウルス#! 、海からやってきた巨大な怪物である。" #deepl:4291663506
 dubois_paleontologist_achievement_imperfect_mosasaurus_loc: "[GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] \#o モササウルス#! 教授が海から大きな怪物を復元した。" #deepl:2251013384
 dubois_paleontologist_achievement_poor_mosasaurus_loc: "\[GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] 教授が復元した#o モササウルス#! は恐ろしいものだった。モササウルスが海に住んでいたことは間違いないのですが、どういうわけか骨格に足がついてしまったのです。" #deepl:2727769146
 dubois_paleontologist_achievement_perfect_plesiosaurus_loc: "\[GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] 教授によって復元された#o プレシオサウルス#! は巨大な海洋爬虫類である。" #deepl:1469085529
 dubois_paleontologist_achievement_imperfect_plesiosaurus_loc: "\[GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] 、教授によって復元された#o プレシオサウルス#! 、恐竜の時代に生息していた海洋爬虫類である。" #deepl:1871243527
 dubois_paleontologist_achievement_poor_plesiosaurus_loc: "\[GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] 教授によって復元された#o プレシオサウルス#! は少し奇妙である。蛇のような4本の四肢があり、非常に短く、尾がない。" #deepl:1919744229
 dubois_paleontologist_achievement_perfect_basilosaurus_loc: "[GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] \#o バシロサウルス#! 教授が復元したバシロサウルスは、数千年前に生息していた先史時代のクジラである。" #deepl:142765907
 dubois_paleontologist_achievement_imperfect_basilosaurus_loc: "[GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] \#o バシロサウルス#! 教授が復元した先史時代のクジラである。" #deepl:1354996810
 dubois_paleontologist_achievement_poor_basilosaurus_loc: "\[GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] 教授によって復元された#o バシロサウルス#! は非常に奇妙な生理学を持っている。他の何よりもボールのように見えるが、これはかなり間違っているようだ。" #deepl:1206625829
 dubois_paleontologist_achievement_perfect_megalodon_loc: "\#o メガロドン#! 教授によって復元された[GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] は巨大なサメである。本当に印象的な骨格。" #deepl:1878769616
 dubois_paleontologist_achievement_imperfect_megalodon_loc: "\[GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] 、教授によって復元された#o メガロドン#! は巨大なサメである。" #deepl:117332675
 dubois_paleontologist_achievement_poor_megalodon_loc: "\[GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] 、教授によって復元された#o メガロドン#! 。巨大な頭部は非常に細い首に取り付けられており、サメの全身には奇妙なトゲがあったらしい。" #deepl:3797074524
