me)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_plateosaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_plateosaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_giraffatitan_var').IsSet , Scope.Var('dubois_paleontologist_achievement_giraffatitan_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_spinosaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_spinosaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_psittacosaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_psittacosaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_velociraptor_var').IsSet , Scope.Var('dubois_paleontologist_achievement_velociraptor_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_muttaburrasaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_muttaburrasaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_rhoetosaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_rhoetosaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_mosasaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_mosasaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_plesiosaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_plesiosaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_basilosaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_basilosaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_megalodon_var').IsSet , Scope.Var('dubois_paleontologist_achievement_megalodon_var').GetFlagName)]"
 dubois_paleontologist_no_paleontologist_loc: "#V この[concept_dubois_paleontologist]の功績#!を表示する。"
 dubois_paleontologist_achievements_intro_loc: "#V この古生物学者の実績#!\n #indent_newline:3 • [Scope.GetCharacter.GetFullNameNoFormatting]は[Scope.GetCharacter.GetCustom('dubois_paleontologist_experience_level_type')]であり、[Scope.Var('dubois_paleontologist_total_fossils_var').GetValue|0+]個の[Concept('concept_dubois_fossil','$concept_dubois_fossils$')]と[Scope.Var('dubois_dinosaur_bone_total_paleontologist_var').GetValue|0+]個の[Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')]を発掘した。#!"
 dubois_paleontologist_achievement_opened_first_paleontological_museum_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U]は 驚くべき化石コレクションを所蔵した世界#V 初の古生物学博物館#! を設立した。#!"
 dubois_paleontologist_achievement_attended_extinction_congress_loc: "[Scope.GetCharacter.GetLastNameNoFormatting]博士は恐竜の絶滅にまつわる神秘を解き明かす専門の学会に出席した。#!"
 dubois_paleontologist_achievement_fossil_amber_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U]は恐竜の地を吸った可能性のある先史時代の蚊が入った貴重な#V 琥珀#!のかけらを発見した。#!"
 dubois_paleontologist_achievement_fossil_ammonite_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting]教授は#V アンモナイト#!を発掘し、古代の海洋沈殿物の研究を助けた。#!"
 dubois_paleontologist_achievement_fossil_archaeopteryx_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting]博士による#V 始祖鳥#!の発見は、恐竜と鳥類の重大な関連を示すとして賞賛された。#!"
 dubois_paleontologist_achievement_fossil_composita_loc: "\n #indent_newline:3 • 古代の貝（訳注:実際には腕足動物）である#V コンポジタ#!が[Scope.GetCharacter.GetLastNameNoFormatting]教授に発見され、先史生物に対する知見を提供した。#!"
 dubois_paleontologist_achievement_fossil_eusthenopteron_loc: "\n #indent_newline:3 • #V ユーステノプテロン#!の化石が[Scope.GetCharacter.GetSheHe]により発見され、初期の陸棲生物への適応が明らかになった。#!"
 dubois_paleontologist_achievement_fossil_ichthyosaurus_loc: "\n #indent_newline:3 •[Scope.GetCharacter.GetLastNameNoFormatting]博士により発見された#V イクチオサウルス#!は、胎生のイルカのような爬虫類でした。#!"
 dubois_paleontologist_chievement_fossil_ichthyostega_loc: "\n #indent_newline:3 •[Scope.GetCharacter.GetLastNameNoFormatting]教授は最も初期の陸上脊椎動物である#V イクチオステガ#!を発表した。#!"
 dubois_paleontologist_achievement_fossil_megatherium_loc: "\n #indent_newline:3 •[Scope.GetCharacter.GetLastNameNoFormatting]博士は体長6メートルにも及ぶ巨大な先史時代のナマケモノである#V メガテリウム#!を発見した。#!"
 dubois_paleontologist_achievement_fossil_pterodactylus_loc: "\n #indent_newline:3 •[Scope.GetCharacter.GetSheHe|U]は古代より湖畔に生息した翼竜類である#V プテロダクティルス#!の化石を発見した。#!"
 dubois_paleontologist_achievement_fossil_smilodon_loc: "\n #indent_newline:3 •[Scope.GetCharacter.GetLastNameNoFormatting]教授は伝説的な、剣歯を持つ捕食者である#V スミロドン#!の状態の良い化石を発掘した。#!"
 dubois_paleontologist_achievement_fossil_trilobite_loc: "\n #indent_newline:3 •[Scope.GetCharacter.GetHerHis]の見つけた#V 三葉虫#!は、岩石層の年代を推定する重要な指標化石となった。#!"
 dubois_paleontologist_achievement_fossil_haast_eagle_loc: "\n #indent_newline:3 •ニュージーランドにて、[Scope.GetCharacter.GetLastNameNoFormatting]博士は巨大な猛禽類の一種である#V ハーストイーグル#!を発見した。#!"
 dubois_paleontologist_achievement_perfect_ankylosaurus_loc: "\n #indent_newline:3 •[Scope.GetCharacter.GetLastNameNoFormatting]教授は#V アンキロサウルス#!の完全な標本を作製し、同輩からの尊敬を集めた。#!"
 dubois_paleontologist_achievement_imperfect_ankylosaurus_loc: "\n #indent_newline:3 •[Scope.GetCharacter.GetLastNameNoFormatting]教授は不完全ながらも#V アンキロサウルス#!の標本の作製を行った。#!"
 dubois_paleontologist_achievement_poor_ankylosaurus_loc: "\n #indent_newline:3 •[Scope.GetCharacter.GetLastNameNoFormatting]教授の#V アンキロサウルス#!の標本作成の試みは物笑いの種となった。#!"
 dubois_paleontologist_achievement_perfect_diplodocus_loc: "\n #indent_newline:3 •[Scope.GetCharacter.GetHerHis|U]の完全な#V ディプロドクス#!の標本は博物館の誇りだ。#!"
 dubois_paleontologist_achievement_imperfect_diplodocus_loc: "\n #indent_newline:3 •[Scope.GetCharacter.GetHerHis|U]の#V ディプロドクス#!の標本は申し分のない出来だ。#!"
 dubois_paleontologist_achievement_poor_diplodocus_loc: "[Scope.GetCharacter.GetHerHis|U]の#V ディプロドクス#!の標本はひどい出来だと言われている。#!"
 dubois_paleontologist_achievement_perfect_triceratop_loc: "\n #indent_newline:3 •[Scope.GetCharacter.GetLastNameNoFormatting]博士の#V トリケラトプス#!の標本は有名であり、博物館の権威を向上させている。#!"
 dubois_paleontologist_achievement_imperfect_triceratop_loc: "\n #indent_newline:3 •[Scope.GetCharacter.GetLastNameNoFormatting]博士の#V トリケラトプス#!の標本は展示に堪える出来だ。#!"
 dubois_paleontologist_achievement_poor_triceratop_loc: "[Scope.GetCharacter.GetLastNameNoFormatting]博士の#V トリケラトプス#!の標本は悲惨な出来だ。#!"
 dubois_paleontologist_achievement_perfect_tyrannosaurus_loc: "\n #indent_newline:3 •[Scope.GetCharacter.GetLastNameNoFormatting]教授は#V ティラノサウルス・レックス#!の見るも驚異の完全な標本を作製した。#!"
 dubois_paleontologist_achievement_imperfect_tyrannosaurus_loc: "\n #indent_newline:3 •[Scope.GetCharacter.GetLastNameNoFormatting]教授の#V ティラノサウルス・レックス#!は、完全ではないが見応えがある。#!"
 dubois_paleontologist_achievement_poor_tyrannosaurus_loc: "\n #indent_newline:3 •[Scope.GetCharacter.GetLastNameNoFormatting]教授の#V ティラノサウルス・レックス#!は奇怪で滑稽だ。#!"
 dubois_paleontologist_achievement_perfect_stegosaurus_loc: "\n #indent_newline:3 •[Scope.GetCharacter.GetSheHe]は恐竜展示用の#V ステゴサウルス#!の骨格を完全に組み上げた。#!"
 dubois_paleontologist_achievement_imperfect_stegosaurus_loc: "\n #indent_newline:3 •[Scope.GetCharacter.GetSheHe]は展示用の#V ステゴサウルス#!の骨格を上手に組み上げた。#!"
 dubois_paleontologist_achievement_poor_stegosaurus_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe]は下手な#V ステゴサウルス#!の骨格を組み上げた。#!"
 dubois_paleontologist_achievement_perfect_antarctosaurus_loc: "\n #indent_newline:3 •[Scope.GetCharacter.GetLastNameNoFormatting]博士の完璧な#V アンタルクトサウルス#!は収蔵品のキモだ。#!"
 dubois_paleontologist_achievement_imperfect_antarctosaurus_loc: "\n #indent_newline:3 •[Scope.GetCharacter.GetLastNameNoFormatting]博士は立派な#V アンタルクトサウルス#!を組み上げた。#!"
 dubois_paleontologist_achievement_poor_antarctosaurus_loc: "\n #indent_newline:3 •[Scope.GetCharacter.GetLastNameNoFormatting]博士の#V アンタルクトサウルス#!は博物館の恥である。#!"
 dubois_paleontologist_achievement_perfect_argyrosaurus_loc: "\n #indent_newline:3 •[Scope.GetCharacter.GetLastNameNoFormatting]教授の#V アルギロサウルス#!の骨格標本は古生物学の驚異である。#!"
 dubois_paleontologist_achievement_imperfect_argyrosaurus_loc: "\n #indent_newline:3 •[Scope.GetCharacter.GetLastNameNoFormatting]教授の#V アルギロサウルス#!の骨格はよくできている。#!"
 dubois_paleontologist_achievement_poor_argyrosaurus_loc: "\n #indent_newline:3 •[Scope.GetCharacter.GetLastNameNoFormatting]教授の#V アルギロサウルス#!の骨格は不格好な出来だった。#!"
 dubois_paleontologist_achievement_perfect_iguanodon_loc: "\n #indent_newline:3 •[Scope.GetCharacter.GetSheHe|U]は#V イグアノドン#!の骨格を完璧に組み上げた。#!"
 dubois_paleontologist_achievement_imperfect_iguanodon_loc: "\n #indent_newline:3 •[Scope.GetCharacter.GetSheHe|U]は#V イグアノドン#!の骨格を組み上げた。#!"
 dubois_paleontologist_achievement_poor_iguanodon_loc: "\n #indent_newline:3 •[Scope.GetCharacter.GetSheHe|U]は多くの間違いを犯しながら#V イグアノドン#!の骨格を組み上げた。#!"
 dubois_paleontologist_achievement_perfect_plateosaurus_loc: "\n #indent_newline:3 •[Scope.GetCharacter.GetLastNameNoFormatting]博士は収蔵品として完全な#V プラテオサウルス#!の骨格標本を作製した。#!"
 dubois_paleontologist_achievement_imperfect_plateosaurus_loc: "\n #indent_newline:3 •[Scope.GetCharacter.GetLastNameNoFormatting]博士は#V プラテオサウルス#!の骨格標本を作製した。#!"
 dubois_paleontologist_achievement_poor_plateosaurus_loc: "\n #indent_newline:3 •[Scope.GetCharacter.GetLastNameNoFormatting]博士の#V プラテオサウルス#!の標本は奇妙で不格好だ。#!"
 dubois_paleontologist_achievement_perfect_giraffatitan_loc: "\n #indent_newline:3 •[Scope.GetCharacter.GetLastNameNoFormatting]教授は博物館のスペースを活用して、巨大な#V ギラッファティタン#!の骨格標本を作り上げた。#!"
 dubois_paleontologist_achievement_imperfect_giraffatitan_loc: "\n #indent_newline:3 •[Scope.GetCharacter.GetLastNameNoFormatting]教授は立派な#V ギラッファティタン#!の骨格標本を組み上げた。#!"
 dubois_paleontologist_achievement_poor_giraffatitan_loc: "\n #indent_newline:3 •[Scope.GetCharacter.GetLastNameNoFormatting]教授の#V ギラッファティタン#!は不条理な恐竜の類のものだ。#!"
 dubois_paleontologist_achievement_perfect_spinosaurus_loc: "\n #indent_newline:3 •[Scope.GetCharacter.GetLastNameNoFormatting]博士の#V スピノサウルス#!の骨格標本は真の芸術品だ。#!"
 dubois_paleontologist_achievement_imperfect_spinosaurus_loc: "\n #indent_newline:3 •[Scope.GetCharacter.GetLastNameNoFormatting]博士は#V スピノサウルス#!の骨格標本を組み上げた。#!"
 dubois_paleontologist_achievement_poor_spinosaurus_loc: "\n #indent_newline:3 •[Scope.GetCharacter.GetLastNameNoFormatting]博士の#V スピノサウルス#!の骨格標本は恐竜というよりは鶏のそれである。#!"
 dubois_paleontologist_achievement_perfect_psittacosaurus_loc: "\n #indent_newline:3 •[Scope.GetCharacter.GetLastNameNoFormatting]教授の#V プシッタコサウルス#!の骨格標本は、嘴のような風変わりな口を持っている。#!"
 dubois_paleontologist_achievement_imperfect_psittacosaurus_loc: "\n #indent_newline:3 •[Scope.GetCharacter.GetLastNameNoFormatting]教授の#V プシッタコサウルス#!は追加するに値する。#!"
 dubois_paleontologist_achievement_poor_psittacosaurus_loc: "\n #indent_newline:3 •[Scope.GetCharacter.GetLastNameNoFormatting]教授の#V プシッタコサウルス#!の標本には大いに疑義がある。#!"
 dubois_paleontologist_achievement_perfect_velociraptor_loc: "\n #indent_newline:3 •[Scope.GetCharacter.GetLastNameNoFormatting]博士の#V ヴェロキラプトル#!は完全に組み上げられた傑作だ。#!"
 dubois_paleontologist_achievement_imperfect_velociraptor_loc: "\n #indent_newline:3 •[Scope.GetCharacter.GetLastNameNoFormatting]博士は#V ヴェロキラプトル#!の骨格標本を上手く組み上げた。#!"
 dubois_paleontologist_achievement_poor_velociraptor_loc: "\n #indent_newline:3 •[Scope.GetCharacter.GetLastNameNoFormatting]博士の#V ヴェロキラプトル#!は可笑しいほど小さく、奇妙に飾り付けられている。#!"
 dubois_paleontologist_achievement_perfect_muttaburrasaurus_loc: "\n #indent_newline:3 •[Scope.GetCharacter.GetLastNameNoFormatting]教授の#V ムッタブラサウルス#!の標本は大きさときめ細やかさの双方が印象的だ。#!"
 dubois_paleontologist_achievement_imperfect_muttaburrasaurus_loc: "\n #indent_newline:3 •[Scope.GetCharacter.GetLastNameNoFormatting]教授の#V ムッタブラサウルス#!はその大きさで知られる。#!"
 dubois_paleontologist_achievement_poor_muttaburrasaurus_loc: "\n #indent_newline:3 •[Scope.GetCharacter.GetLastNameNoFormatting]教授の#V ムッタブラサウルス#!の標本は解剖学的に正しくない。#!"
 dubois_paleontologist_achievement_perfect_rhoetosaurus_loc: "\n #indent_newline:3 •[Scope.GetCharacter.GetLastNameNoFormatting]博士の手腕により、#V ロエトサウルス#!の骨格標本は本当に印象的に仕上がった。#!"
 dubois_paleontologist_achievement_imperfect_rhoetosaurus_loc: "\n #indent_newline:3 •[Scope.GetCharacter.GetLastNameNoFormatting]博士の手腕により、#V ロエトサウルス#!の骨格標本はまずまず印象的な仕上がりだ。#!"
 dubois_paleontologist_achievement_poor_rhoetosaurus_loc: "\n #indent_newline:3 •[Scope.GetCharacter.GetLastNameNoFormatting]博士の#V ロエトサウルス#!は尻尾が間違った位置についている—忘れがたい失敗だ。#!"
 dubois_paleontologist_achievement_perfect_mosasaurus_loc: "\n #indent_newline:3 •[GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting]教授は巨大な#o モササウルス#!を海から復元した。#!"
 dubois_paleontologist_achievement_imperfect_mosasaurus_loc: "\n #indent_newline:3 •[GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting]教授は大きな#o モササウルス#!を海から復元した。#!"
 dubois_paleontologist_achievement_poor_mosasaurus_loc: "\n #indent_newline:3 •[GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting]教授の#o モササウルス#!には足があった—一般的な解釈に反して。#!"
 dubois_paleontologist_achievement_perfect_plesiosaurus_loc: "\n #indent_newline:3 •[GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting]教授は海洋爬虫類の一種である巨大な#o プレシオサウルス#!の標本を作製した。#!"
