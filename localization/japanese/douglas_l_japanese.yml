 je_douglas_mountaineering_expedition_reason: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName]登山家である彼は現在、[SCOPE.sState('douglas_location_scope').GetName] で登山チームを率いて遠征中だ。目標はピークの初登頂だ。登頂のスピードは彼の経験と性格に大きく左右される。山の難易度によっては、より大きな危険が生じるかもしれない。探検隊が一定の時間内にゴールに到達しなければ、[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] 、登頂を中止する。遠征隊が何らかの理由で考えうる最大の危険に流れ込んだ場合、最悪の事態が起こる。" #deepl:488000629

