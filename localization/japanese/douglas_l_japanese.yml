 douglas.101.t: "登山クラブ設立" #deepl:222126293
 douglas.101.d: "[SCOPE.sCharacter('douglas_president_scope').GetFullName] 山が応える。マウンテニアリング・クラブの設立は、より高みを目指すすべての人々にとって新たな時代の幕開けとなった。" #deepl:4067420597
 douglas.101.f: "[SCOPE.sCharacter('douglas_president_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('douglas_president_scope').GetLastName] [SCOPE.sCharacter('douglas_president_scope').GetHerHim] 、嵐や雪崩を乗り越えてきた。しかし今、[SCOPE.sCharacter('douglas_president_scope').GetSheHe] は、[SCOPE.sCharacter('douglas_president_scope').GetHerHis] の遺産を受け継ごうとしている。[ROOT.GetCountry.GetCapital.GetCityHubName] で、[SCOPE.sCharacter('douglas_president_scope').GetSheHe] は[GetPlayer.GetName] の登山クラブを設立する。単独ではなく、有望な新人と一緒に：[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] [SCOPE.sCharacter('douglas_president_scope').GetFullName] は、[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetHerHim] に単なる野心ではなく、将来の伝説を見出す。彼らは共に、頂上だけでなく、栄光、勇気、そしておそらく歴史に残る場所へと続く道の入り口に立っている。クラブは、山の呼び声を聞くすべての人に開かれている。登山が始まる。" #deepl:3771164746
 douglas.101.g: "山が呼んでいる！" #deepl:249284577

 douglas.102.t: "The Alpine Club"
 douglas.102.d: "アルパイン・クラブは、[ROOT.GetCountry.GetCapital.GetCityHubName] （[TimeKeeper.GetCurrentDate.Format('y')] ）に正式に設立され、世界初の国際登山組織として知られている。アルパイン・クラブの設立は、近代アルピニズムの制度的な始まりである。" #deepl:3982546221
 douglas.102.f: "歴史的には、1857年にイギリスの紳士たちがロンドンに集まり、登山専門のクラブを設立したのが始まりである。ジョン・ボールやエドワード・ケネディといった人物に率いられたアルパイン・クラブは、肉体的な挑戦と地理的・自然的研究を組み合わせたアルプスの体系的な探検を推進しようとした。アルパイン・クラブは、知識を共有し、遠征を組織し、登山者同士の共同体意識を育むための体系的な枠組みを提供した。そのメンバーは、後に「アルピニズムの黄金時代」と呼ばれることになる時代に重要な役割を果たし、数々の初登攀を達成し、その経験を記録した。その後まもなく『アルパイン・ジャーナル』の発行が始まり、登山の新たな文献に貢献した。アルパイン・クラブの設立は、世界的な組織登山の基礎を築き、山岳探検における不朽のスタンダードを打ち立てた。" #deepl:4126383378
 douglas.102.g: "一緒に頂上へ！" #deepl:2506053391

