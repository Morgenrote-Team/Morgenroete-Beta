l_japanese:
 thriving_culture_lesson_start_tutorial_button_loc: "チュートリアルを始める"
 mr_tutorial_buttons: "Morgenröteボタン"
 mr_tutorial_buttons_desc: "Morgenröteの内容のほぼすべてがMorgenröteウィンドウを通してアクセス可能です。サイドバーボタンをクリックすることでアクセスできます。現在以下のボタンが存在します:\n\n\n- #V 科学ウィンドウ#!: ここではあなたの国の[Concept('concept_academics_academic','$concept_academics_academics$')]とその活動、[concept_academics_progress]と科学的探検について閲覧することができます。\n\n- #V 芸術ウィンドウ#!: ここではあなたの国の[Concept('concept_artists_artist','$concept_artists_artists$')]やその活動、[concept_artistic_progress]と[Concept('concept_artists_art_style','$concept_artists_art_styles$')]について知ることができます。\n\n- #V 体育ウィンドウ#!: ここでは様々なスポーツとそれにまつわるキャラクターについて、また航空力学の進捗とその活動に加え、国際的なスポーツ機関について知ることができます。"
 mr_tutorial_science_window_open: "科学ウィンドウを開く"
 mr_tutorial_science_window_open_desc: "では、科学ウィンドウについて詳しく見てみましょう。科学ボタンをクリックするか「M」キーを押して科学ウィンドウを開きます。"
 mr_tutorial_science_window_open_tt: "科学ボタンをクリックするか「M」キーで科学ウィンドウを開く"
 mr_tutorial_science_tab: "科学ウィンドウ"
 mr_tutorial_science_tab_desc: "科学ウィンドウではあなたの国の科学的な努力に関する情報と活動を見ることができます。\n\n\nそれは4つのタブに分かれています:\n\n- #V 概要#!:このタブには[concept_academics_progress]や#V 全般的な科学的探検#!、#V 科学的方針#!が含まれます\n\n- #V 数理工学#!:このタブには[concept_tesla_engineer]や[concept_mendelejew_chemist]、[concept_verrier_astronomer]が含まれます\n\n- [concept_dubois_natural_history]: このタブには[concept_agassiz_geologist]や[concept_dubois_paleontologist]、[concept_dubois_naturalist]が含まれます\n\n- #V 人文・人類学#!: このタブには[concept_panum_physician]や[concept_lepsius_archaeologist]、[concept_lepsius_anthropologist]が含まれます"
 mr_tutorial_science_tab_tt: "科学ウィンドウが開かれている"
 mr_tutorial_science_overview_tab_open: "概要タブを開く"
 mr_tutorial_science_overview_tab_open_desc: "概要タブより、[concept_academics_progress]や#V 科学的探検全般#!、#V 科学的方針#!にアクセスできます\n\n概要タブボタンを押して概要タブを見に行きましょう。"
 mr_tutorial_science_overview_tab_open_tt: "概要タブボタンを押して概要タブに行く。"
 mr_tutorial_science_overview_tab_promote_academics: "学者の登用"
 mr_tutorial_science_overview_tab_promote_academics_desc: "Morgenröteの核心はキャラクターですが、どうやってキャラクターを得ればよいでしょうか？\n\n新しい[concept_academics_academic]を獲得するには、十分な[concept_academics_progress]を取得する必要があります。進捗バーにマウスオンすることで、進捗の獲得に影響している要素について知ることができます。\n\nもし[concept_academics_university_specialization]を設定している大学があれば、特定の学者を昇進させることができます。\n\nお金を投資することで、学術進捗の入手を早めることも可能です。\n\n\nあるいは、自国が科学的に最先端でない場合には、イベントや外交アクションを通じて他国から学者を購入することも可能です。"
 mr_tutorial_science_overview_tab_scientific_focus: "科学的方針"
 mr_tutorial_science_overview_tab_scientific_focus_desc: "ときには何か特定の技術に注力したいときもあるでしょう。条件を満たしていれば、科学的方針を利用することが可能です。これは大抵、ある種の技術グループの研究を促進しますが、他の研究グループの研究は非効率になります。"
 mr_tutorial_science_overview_tab_scientific_expedition: "科学的探検"
 mr_tutorial_science_overview_tab_scientific_expedition_desc: "科学的探検はあなたの国が開始可能な探検です。探検の種類によっては莫大な利益をもたらします。\n\n現在以下の探検が存在します:\n- [concept_dubois_pacific_expedition]\n- [concept_verrier_venus_transit]調査\n- 北西航路探検\n- ツェッペリンによる探検\n- 大西洋横断ケーブル敷設"
 mr_tutorial_science_natural_history_tab_open: "博物学タブを開く"
 mr_tutorial_science_natural_history_tab_open_desc: "では[Concept('concept_academics_academic','$concept_academics_academics$')]の一つについて見てみましょう。博物学タブを開いてください。"
 mr_tutorial_science_natural_history_tab_open_tt: "博物学タブをクリックして博物学タブを開く"
 mr_tutorial_science_natural_history_tab_character: "学者"
 mr_tutorial_science_natural_history_tab_character_desc: "Morgenröteの核心はそのキャラクター達です。科学タブにおけるキャラクターは[Concept('concept_academics_academic','$concept_academics_academics$')]です。\n\n新たなキャラクターの役割パネルの左側に、あなたの学者とその追加情報が表示されます。"
 mr_tutorial_science_natural_history_tab_character_rating: "キャラクター評価"
 mr_tutorial_science_natural_history_tab_character_rating_desc: "あなたが出会うことになるであろうキャラクターのほぼ全員の名前の隣に小さなアイコンがあるのに気が付くでしょう。このアイコンは役割に対する彼らの才能を示しています。アイコンにマウスオンすることで、どんな要素が才能に影響しているか見ることができます。\n\nアイコンの説明:\n@mr_rating_fantastic!  完璧\n@mr_rating_very_good!  非常に良い\n@mr_rating_good!  良い\n@mr_rating_mediocre!  普通\n@mr_rating_bad!  悪い\n@mr_rating_very_bad!  非常に悪い"
 mr_tutorial_science_natural_history_tab_character_experience_bar: "キャラクター経験値"
 mr_tutorial_science_natural_history_tab_character_experience_bar_desc: "各キャラクターは専門分野に対する[concept_academics_experience]を持っています。より高い経験値を持つほど、キャラクターは様々な仕事を上手にこなすことができます。\n\n経験値は毎年受動的に得られるものに加え、仕事を完了し、成功に導くことでも得られます。[Concept('concept_academics_academic','$concept_academics_academics$')]は経験値が100 (熟練)あるいは300 (有名)になるとより高位の特性を得ます。"
 mr_tutorial_science_natural_history_tab_character_achievements: "キャラクター実績"
 mr_tutorial_science_natural_history_tab_character_achievements_desc: "[Concept('concept_academics_academic','$concept_academics_academics$')]は時に素晴らしい功績を成し遂げます。このアイコンをマウスオンすることで、いつでも学者のこれまでの功績を確認することができます。"
 mr_tutorial_science_natural_history_tab_currencies: "発見と価値"
 mr_tutorial_science_natural_history_tab_currencies_desc: "Morgenröteにおけるほとんどのキャラクター達はその価値と結びついています。価値は各学者パネルの中央に表示されます。地質学者であれば、どれほどの鉱物を発見したかや、どれほどの地質学的知見を発見したかなどのようなことを見ることができます。\n\n大抵はマウスオンすることでより詳しい価値について知ることができます。"
 mr_tutorial_science_natural_history_visit_button: "訪問ボタン"
 mr_tutorial_science_natural_history_visit_button_desc: "ほとんどの[Concept('concept_academics_academic','$concept_academics_academics$')]には特定の学者についてより詳しく知ることができる訪問ボタンがあります。\n\n例えば[concept_dubois_naturalist]には動物園に展示されている動物について知ることができる、「動物園訪問」ボタンがあります。"
 mr_tutorial_science_natural_history_ranking: "ランキング"
 mr_tutorial_science_natural_history_ranking_desc: "他国と比較するのがお好き？それならランキングがお気に召しますよ。ハイライトされたアイコンにマウスオンすることで、Morgenröteの各視点から見てどれほどうまくやっているのか、他国と比較してみることができます。\n\n例えば、[concept_agassiz_geologist]でいえば、地質学スコア、地質学的知見、海洋学的知見、鉱物と気象鉱物について比較できます。"
 mr_tutorial_science_natural_history_project_buttons: "プロジェクトボタンとその他ボタン"
 mr_tutorial_science_natural_history_project_buttons_desc: "インターフェースのこの部分は、最も重要な部分の一つです。ここで[Concept('concept_academics_academic','$concept_academics_academics$')]に指令を出したり、重要な操作をすることができます。\n\n[concept_agassiz_geologist]は探検に出かけたり、産業の改善、地球の年齢の再推定、鉱物棚の作製や大陸移動説会議の開始を行えます。"
 mr_tutorial_science_natural_history_view_switch_buttons: "レイアウトの変更"
 mr_tutorial_science_natural_history_view_switch_buttons_desc: "もっとみっちりしたインターフェースが良ければ、ハイライトされたボタンを押すことでインターフェースを切り替えることができます。ゲームの内容には影響がないので、好きな方を選んでください。"
 mr_start_culture_tutorial_button_loc: "文化チュートリアル"
 mr_tutorial_not_yet_implemented_tt: "このチュートリアルは準備中"
 mr_tutorial_arts_window_open: "芸術ウィンドウを開く"
 mr_tutorial_arts_window_open_desc: "では、芸術ウィンドウについて見てみましょう。芸術ボタンをクリックするか、「Ctrl + A」キーで芸術ウィンドウを開きます。"
 mr_tutorial_arts_window_open_tt: "芸術ボタンをクリックするか「Ctrl + A」キーで芸術ウィンドウを開く"
 mr_tutorial_arts_tab: "芸術タブ"
 mr_tutorial_arts_tab_desc: "芸術は19～20世紀において非常に重要な要素でした。この時代の偉大な[Concept('concept_artists_artist','$concept_artists_artists$')]達は現在でもよく知られています。\n\nMorgenröteは様々な種類の芸術家とその作品を提供します。\n\n芸術ウィンドウは2つのタブで構成されます。一つはあなたの国における芸術の概要を示し、もう一つでは芸術家の発掘と他国の芸術家の招致が可能です。"
 mr_tutorial_arts_tab_cultural_tradition: "文化的伝統"
 mr_tutorial_arts_tab_cultural_tradition_desc: "文化的伝統はあなたの国の文化的功績を示す値です。\nこの値は[concept_elgar_musical_tradition]、[concept_manzoni_literary_tradition]及び[concept_klimt_painting_tradition]より構成されます。\n\n文化的伝統は以下の公式で計算されます:\n音楽的伝統 / 4 + 絵画的伝統 / 3 + 文学的伝統 / 2\n\n芸術的伝統から追加の[concept_prestige]が得られます。5ポイントの芸術的伝統から1ポイントの威信が得られます。"
 mr_tutorial_arts_overview_tab_open_tt: "芸術概要タブを開く"
 mr_tutorial_arts_tab_artist_progress: "芸術家進捗"
 mr_tutorial_arts_tab_artist_progress_desc: "新しい[Concept('concept_artists_artist','$concept_artists_artists$')]はいくつかの方法で得ることができます:あなたはイベントか十分な[concept_artistic_progress]を集めることで芸術家を雇うことができます。\n\n一方で、すべての国が上記の方法で芸術家を得られるわけではありませんが、$building_elgar_opera$や$building_arts_academy$を所有していれば、芸術的進捗バーが一杯になったときに芸術家を得ることができます。\n進捗バーにマウスオンすることで、毎月の進捗に影響している要素のリストを見ることができます。\n\nまた、$building_arts_academy$において必要な[concept_production_method]を採用している場合、芸術を後援して進捗を増加させ、特定の芸術家を採用することができます。"
 mr_tutorial_arts_tab_center_of_arts: "芸術の中心"
 mr_tutorial_arts_tab_center_of_arts_desc: "[Concept('concept_artists_center_of_arts','$concept_artists_centers_of_arts$')]は[concept_artists_art_style]が発生した場所のことです。\n芸術の中心のいくつかはゲーム開始時にすでに存在します。他の芸術の中心は[Concept('concept_journal_entry','$concept_journal_entries$')]の完了、あるいはハイライトされたボタンの一つを押すことでアンロックされます。芸術の中心にマウスオンすることで、獲得方法を見ることができます。\n\n芸術の中心はあなたの国にボーナスを与えるため、極めて有用です。"
 mr_tutorial_arts_tab_artists_tab_open: "芸術家タブを開く"
 mr_tutorial_arts_tab_artists_tab_open_desc: "では、[Concept('concept_artists_artist','$concept_artists_artists$')]について詳しく見てみましょう。\n\n芸術家タブをクリックしてタブを開いてください。"
 mr_tutorial_arts_tab_artists_tab_open_open_tt: "芸術家タブを開く"
 mr_tutorial_arts_tab_artists: "芸術家タブ"
 mr_tutorial_arts_tab_artists_desc: "[Concept('concept_artists_artist','$concept_artists_artists$')]は学者とよく似ていますが、その働きはかなり異なります。\n\n現在、3種類の芸術家がいます:\n- [concept_elgar_composer]\n- [concept_manzoni_writer]\n- [concept_klimt_painter]"
 mr_tutorial_arts_tab_artists_invite: "芸術家の招待"
 mr_tutorial_arts_tab_artists_accquisation_desc: "すでに述べた通り、[Concept('concept_artists_artist','$concept_artists_artists$')]は十分な[concept_artistic_progress]を集めることのみでなく、ただ招待するだけでも得ることができます。\n\n各種類の芸術家はそれぞれ異なった要件を持っています。あなたは[Concept('concept_elgar_travelling_composer','$concept_elgar_travelling_composers$')]を世界中から招待できますが、十分な数の$building_elgar_opera$と十分な[concept_elgar_musical_tradition]が必要です。\n\n[Concept('concept_klimt_independent_painter','$concept_klimt_independent_painters$')]は文化的に近い場合のみ招待できます。\n\n一方で[Concept('concept_manzoni_writer','$concept_manzoni_writers$')]はいかなる場合にも招待できません。"
 mr_tutorial_arts_tab_artists_character: "一般情報"
 mr_tutorial_arts_tab_artists_character_desc: "ウィンドウ左側の大部分は、芸術家の基本情報を示しています。\n\nここでは以下の事項を見ることができます:\n-外見\n-名前と評価\n-[concept_artists_experience]\n-[Concept('concept_character_trait','$concept_character_traits$')]"
 mr_tutorial_arts_tab_artists_currencies: "重要な芸術の価値"
 mr_tutorial_arts_tab_artists_currencies_desc: "この部分は特定の芸術分野に関連する一般的な情報を示すインターフェースです。\n例えば、[concept_elgar_composer]の部分では[concept_elgar_musical_tradition]の値を表示し、あなたの作曲家の曲と傑作、 世界の5大作曲家の一覧を示しています。\n\nまた、右上の隅にあるアイコンをマウスオンするとランキングを見ることができます。"
 mr_tutorial_arts_tab_artists_actions: "芸術家アクション"
 mr_tutorial_arts_tab_artists_actions_desc: "[Concept('concept_artists_artist','$concept_artists_artists$')]もまた、アクションを持っています。ここでは、芸術家が何を実行できるか、国が芸術家に何を実施できるかを見ることができます。\n\nこれが芸術家についての最も重要な情報だといえます。体育についてのチュートリアルを継続するか、ゲームに戻るか選ぶことができます。"
 mr_start_sports_tutorial_button_loc: "体育チュートリアル"
 mr_tutorial_sports_window_open: "体育ウィンドウを開く"
 mr_tutorial_sports_window_open_desc: "では、体育ウィンドウについて見てみましょう。体育ボタンをクリックするか、「Ctrl + S」キーで体育ウィンドウを開きます。"
 mr_tutorial_sports_window_open_tt: "体育ボタンをクリックするか「Ctrl + S」キーで体育ウィンドウを開く"
 mr_tutorial_sports_window: "体育ウィンドウ"
 mr_tutorial_sports_window_desc: "体育ウィンドウでは体育に関連するあらゆる異なった種目とキャラクターを閲覧できます。\n\nウィンドウは通常のスポーツと航空学に分けられています。\n\n通常のスポーツは以下を含みます:\n- [concept_vikelas_olympic_games]\n- [concept_douglas_mountaineering]\n- Ball Sports\n- [concept_vikelas_car_racing]\n\n航空学は以下を含みます:\n- [concept_curtiss_balloonist]\n- [concept_curtiss_pilot]"
 mr_tutorial_sports_tab: "体育タブ"
 mr_tutorial_sports_tab_desc: "体育タブでは各種目に関連する活動とキャラクターの概要を見ることができます。\n学者や芸術家と違い、体育タブのキャラクターは大抵将軍や政治家です。"
 mr_tutorial_sports_tab_open_tt: "体育タブを開く"
 mr_tutorial_sports_tab_character_overview: "キャラクター概要"
 mr_tutorial_sports_tab_character_overview_desc: "UIのこの部分は[concept_character]の概要です。\n\n[concept_vikelas_coach]や自動車レーサーのようなキャラクターは[concept_academics_experience]を持ちます。登山家のようなキャラクターは経験値を持ちません。"
 mr_tutorial_sports_tab_currencies: "価値と情報"
 mr_tutorial_sports_tab_currencies_desc: "中央には特定のスポーツに関連した重要な情報が表示されます。\n\n[concept_vikelas_olympic_games]を例にとると、[concept_vikelas_ioc]の代表と理事、メンバーの数、これまでに何個のメダルを獲得したかが表示されます。"
 mr_tutorial_sports_tab_actions: "アクション"
 mr_tutorial_sports_tab_actions_desc: "右側では体育について何らかのアクションを取ることができます。\nこれらのアクションは基本的に[Concept('concept_character', '$concept_characters$')]に何かさせたり、[concept_vikelas_ioc]のような団体を新たに設立する決断のことです。"
 mr_tutorial_sports_tab_aeronautics_tab_open: "航空学タブを開く"
 mr_tutorial_sports_tab_aeronautics_tab_open_desc: "では、航空学タブを見てみましょう。ボタンをクリックしてタブを開いてください。"
 mr_tutorial_aeronautics_tab_open_tt: "航空学タブを開く"
 mr_tutorial_aeronautics_tab: "航空学タブ"
 mr_tutorial_aeronautics_tab_desc: "航空学タブはほぼ体育タブと同様の見た目をしています。\n\n一つの大きな違いはキャラクターそのものにあります。[concept_curtiss_balloonist]は後援し、自動化することができ、[concept_curtiss_pilot]は様々な状況から生まれます。\n\nこれで概要チュートリアルは終わりです。Morgenröteで追加されたキャラクターについてもっと詳しく知りたい場合、ヴィキペディアや我々が追加したコンセプトを活用してください。"
 mr_tutorial_lesson_button_finish: "チュートリアル終了"
