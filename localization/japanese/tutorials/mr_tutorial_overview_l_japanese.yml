 thriving_culture_lesson_start_tutorial_button_loc: "チュートリアル開始" #deepl:1296206908

 mr_tutorial_buttons: "モルゲンレーテ・ボタン" #deepl:3232304745
 mr_tutorial_buttons_desc: "MorgenröteのほとんどのことはMorgenröte-Windowsでアクセス可能です。サイドバーのボタンをクリックすれば、それらにアクセスできる。#V #!現在、以下のウィンドウがあります：#V #!Here can find your[Concept('concept_academics_academic','$concept_academics_academics$')], their activities, your[concept_academics_progress] and Scientific Expeditions：[Concept('concept_artists_artist','$concept_artists_artists$')], their activities, your[concept_artistic_progress] and[Concept('concept_artists_art_style','$concept_artists_art_styles$')].\n-#V Sports Window#! ：様々なスポーツやスポーツに関連するキャラクター、航空学、その活動、国際スポーツ組織などが紹介されています。" #deepl:3017682288

 mr_tutorial_science_window_open: "サイエンスウィンドウを開く" #deepl:734722697
 mr_tutorial_science_window_open_desc: "科学ウィンドウを詳しく見てみよう。ボタンをクリックするか、キーボードの "M "キーを押してサイエンスウィンドウを開く。" #deepl:1849505402
 mr_tutorial_science_window_open_tt: "科学ボタンをクリックするか ☑ を押して科学ウィンドウを開く。" #deepl:1188172678

 mr_tutorial_science_tab: "科学の窓" #deepl:1054166281
 mr_tutorial_science_tab_desc: "#V #!科学ウィンドウは、科学的な活動のための情報やアクションを見つける場所です：This tab contains[concept_academics_progress],#V General Scientific Expeditions#! and the#V Scientific Focus#! ￭#V Mathematical-Technical#!: This tab contains the[concept_gaudi_engineer],[concept_mendelejew_chemist] and[concept_verrier_astronomer] ￭#V Humanities-Anthropological#! ：This tab contains the[concept_panum_physician],[concept_lepsius_archaeologist] and[concept_lepsius_anthropologist] ୧[concept_dubois_natural_history]: This tab contains the[concept_agassiz_geologist],[concept_dubois_paleontologist] and[concept_dubois_naturalist] ୧#V Humanities-Anthropological#!: This tab contains the[concept_panum_physician],[concept_lepsius_archaeologist] and[concept_lepsius_anthropologist]" #deepl:271317186
 mr_tutorial_science_tab_tt: "サイエンスウィンドウが開く" #deepl:3571747254

 mr_tutorial_science_overview_tab_open: "概要タブを開く" #deepl:2171973784
 mr_tutorial_science_overview_tab_open_desc: "Overviewタブでは、[concept_academics_progress] 、#V General Scientific Expeditions#! 、#V Scientific Focus#! ￭タブボタンをクリックしてOverviewタブに入ります。" #deepl:3801100877
 mr_tutorial_science_overview_tab_open_tt: "タブボタンをクリックして「概要」タブに入る。" #deepl:583115154

 mr_tutorial_science_overview_tab_promote_academics: "学業の推進" #deepl:3127848749
 mr_tutorial_science_overview_tab_promote_academics_desc: "モルゲンレーテの中心はキャラクターです。[concept_academics_progress]新しいキャラクターを手に入れるには、[concept_academics_academic] 。[concept_academics_university_specialization]プログレスバーにカーソルを合わせると、プログレス獲得に影響する要素を確認できま す。大学を持っていれば、特定のアカデミックを昇格させることができます。" #deepl:3334402372

 mr_tutorial_science_overview_tab_scientific_focus: "科学的フォーカス" #deepl:4254522642
 mr_tutorial_science_overview_tab_scientific_focus_desc: "特定の種類の研究に集中したい場合もあるでしょう。その条件を満たせば、科学的焦点を利用することができる。彼らは基本的に、特定の技術グループの研究を促進し、他の技術グループの効率を低下させる。" #deepl:2966516010

 mr_tutorial_science_overview_tab_scientific_expedition: "科学探検" #deepl:3527687538
 mr_tutorial_science_overview_tab_scientific_expedition_desc: "科学遠征とは、あなたの国が始めることができる遠征のことです。[concept_dubois_pacific_expedition] [concept_verrier_venus_transit] 探検の種類によっては、自国に大きな利益をもたらすこともあります。現在、次のような探検があります。" #deepl:413711623

 mr_tutorial_science_natural_history_tab_open: "自然史タブを開く" #deepl:1440158592
 mr_tutorial_science_natural_history_tab_open_desc: "それでは、[Concept('concept_academics_academic','$concept_academics_academics$')] 。 続きは「自然史」タブを開いてください。" #deepl:3933847545
 mr_tutorial_science_natural_history_tab_open_tt: "タブボタンをクリックして「自然史」タブに入る。" #deepl:1038657530

 mr_tutorial_science_natural_history_tab_character: "アカデミックス" #deepl:1408513918
 mr_tutorial_science_natural_history_tab_character_desc: "Morgenröteの中心はキャラクターです。科学タブでは、これらのキャラクターが[Concept('concept_academics_academic','$concept_academics_academics$')] ⅳ新しいキャラクターの役割の左側には、あなたのアカデミックの肖像画と追加情報が表示されます。" #deepl:1020069787

 mr_tutorial_science_natural_history_tab_character_rating: "キャラクター評価" #deepl:3205270775
 mr_tutorial_science_natural_history_tab_character_rating_desc: "ほとんどのキャラクターには、名前の横に小さなアイコンが付いています。このアイコンは、その役割に対する適性を示しています。アイコンの説明にカーソルを合わせると、どの要素がこの評価に影響するかがわかります！  Perfectn@mr_rating_very_good！  Very Goodn@mr_rating_good！  Goodn@mr_rating_mediocre！  Mediocre  Badn@mr_rating_very_bad！  非常に悪い" #deepl:2393422146

 mr_tutorial_science_natural_history_tab_character_experience_bar: "キャラクター体験" #deepl:356262571
 mr_tutorial_science_natural_history_tab_character_experience_bar_desc: "各キャラクターは自分の専門分野で[concept_academics_experience] 。経験値が高いほど、そのキャラクターは様々な仕事において優れた能力を発揮します。経験値は、毎年受動的に得られるだけでなく、仕事をこなして成功することで能動的に得られます。[Concept('concept_academics_academic','$concept_academics_academics$')] 、経験値が100（経験豊富）、300（有名）に達すると、より高い特性を得ることができます。" #deepl:4293324584

 mr_tutorial_science_natural_history_tab_character_achievements: "キャラクターの功績" #deepl:2935735490
 mr_tutorial_science_natural_history_tab_character_achievements_desc: "[Concept('concept_academics_academic','$concept_academics_academics$')] 時には印象的な偉業を成し遂げることもある。このアイコンにカーソルを合わせれば、あなたのアカデミックがこれまでに成し遂げたことをいつでも確認できる。" #deepl:1195783621

 mr_tutorial_science_natural_history_tab_currencies: "ディスクボエリーとバリュー" #deepl:1384869411
 mr_tutorial_science_natural_history_tab_currencies_desc: "モルゲンレーテのほとんどのキャラクターには価値観が付随している。モルゲンレーテでは、ほとんどのキャラクターに数値が設定されています。例えば、地質学であれば、鉱物がいくつ見つかったか、地質学的な知識がどのくらいあるかなどが表示されます。" #deepl:4066533914

 mr_tutorial_science_natural_history_visit_button: "訪問ボタン" #deepl:3858963492
 mr_tutorial_science_natural_history_visit_button_desc: "ほとんどの[Concept('concept_academics_academic','$concept_academics_academics$')] 、特別な訪問ボタンがあり、その特定の学術について詳しく知ることができます。例えば、[concept_dubois_naturalist] 、動物園を訪問するボタンがあり、動物園の動物について詳しく知ることができます。" #deepl:1189517097

 mr_tutorial_science_natural_history_ranking: "ランキング" #deepl:4181663012
 mr_tutorial_science_natural_history_ranking_desc: "他国と自分を比較するのが好きなのかもしれない。その場合、ランキングはあなたにとって興味深いものかもしれません。このアイコンにカーソルを合わせると、様々なリストが表示され、モルゲンレーテの特定の側面において、他国と比較してどの程度優れているかを確認することができます。例えば、[concept_agassiz_geologist] では、地質スコア、地質知識、海洋知識、鉱物、希少鉱物を比較することができます。" #deepl:394625426

 mr_tutorial_science_natural_history_project_buttons: "プロジェクト・ボタンとその他のボタン" #deepl:430248338
 mr_tutorial_science_natural_history_project_buttons_desc: "インターフェイスのこの部分は、あなたにとって最も重要な部分の1つです。[Concept('concept_academics_academic','$concept_academics_academics$')] [concept_agassiz_geologist] にプロジェクトを課したり、その他の重要な交流を開始することができる。" #deepl:2696053152

 mr_tutorial_science_natural_history_view_switch_buttons: "レイアウトの変更" #deepl:1671308253
 mr_tutorial_science_natural_history_view_switch_buttons_desc: "より密集したインターフェアがお好みなら、このボタンで見た目を切り替えることができる。ゲーム自体は、どの変種を使ってもかまいません。ですから、より好きなバリエーションを選んでください。" #deepl:2800918764

 mr_start_culture_tutorial_button_loc: "文化チュートリアル" #deepl:231585177
 mr_tutorial_not_yet_implemented_tt: "このチュートリアルはまだ準備ができていない。" #deepl:1971937521

 mr_tutorial_arts_window_open: "アーツ・ウィンドウを開く" #deepl:2590280325
 mr_tutorial_arts_window_open_desc: "次に、アート・ウィンドウを詳しく見てみよう。ボタンをクリックするか、キーボードの "Ctrl + A "キーを押して、アート・ウィンドウを開いてください。" #deepl:53394483
 mr_tutorial_arts_window_open_tt: "科学ボタンをクリックするか、"Ctrl + A "を押して芸術ウィンドウを開く。" #deepl:2950751548

 mr_tutorial_arts_tab: "アート・タブ" #deepl:2793588649
 mr_tutorial_arts_tab_desc: "芸術は19世紀から20世紀にかけて重要な役割を果たした。この時代の偉大な[Concept('concept_artists_artist','$concept_artists_artists$')] は、今日でもよく知られています。♪Morgenröteは、さまざまな種類のアーティストとその作品を提供しています。もう1つのタブでは、自分のアーティストを探したり、外国からアーティストを募集することができます。" #deepl:543699742

 mr_tutorial_arts_tab_cultural_tradition: "文化の伝統" #deepl:3268694731
 mr_tutorial_arts_tab_cultural_tradition_desc: "[concept_prestige] 文化的伝統はあなたの国の文化的功績を表す値です。[concept_elgar_musical_tradition] 、[concept_manzoni_literary_tradition] 、[concept_klimt_painting_tradition] から構成されます。文化的伝統は以下の式で計算されます：音楽的伝統÷4＋絵画的伝統÷3＋文学的伝統÷2。芸術の伝統」を5ポイント獲得するごとに「名声」が1追加される。" #deepl:3774927584
 mr_tutorial_arts_overview_tab_open_tt: "アート概要タブを開く" #deepl:3810726030

 mr_tutorial_arts_tab_artist_progress: "アーティストの歩み" #deepl:61174778
 mr_tutorial_arts_tab_artist_progress_desc: "新しい[Concept('concept_artists_artist','$concept_artists_artists$')] ：募集する、イベントで獲得する、十分な数の[concept_artistic_progress] を集めるなどです。イベントや募集はすべての国で可能ではありませんが、$building_elgar_opera$ または$building_arts_academy$ を所有すれば、芸術プログレスバーを埋めてアーティストを獲得することができます。プログレスバーにカーソルを合わせると、毎月の獲得量に影響する要因の全リストを見ることができます。さらに、$building_arts_academy$ に必要な[concept_production_method] があれば、芸術を後援してより多くのプログレスを獲得し、特定のアーティストを昇格させることができます。" #deepl:1108726132

 mr_tutorial_arts_tab_center_of_arts: "芸術センター" #deepl:4265095628
 mr_tutorial_arts_tab_center_of_arts_desc: "[Concept('concept_artists_center_of_arts','$concept_artists_centers_of_arts$')] [concept_artists_art_style] センター・オブ・アーツには、ゲーム開始時にすでに存在しているも のもあります。その他のセンター・オブ・アーツは、 、またはここに表示されているボタンのいずれかを押すことでアンロックできます。センター・オブ・アーツにカーソルを合わせると、その獲得方法を見ることができます。[Concept('concept_journal_entry','$concept_journal_entries$')] " #deepl:1287628103

 mr_tutorial_arts_tab_artists_tab_open: "アーティスト・タブを開く" #deepl:974477655
 mr_tutorial_arts_tab_artists_tab_open_desc: "では、[Concept('concept_artists_artist','$concept_artists_artists$')].㊦タブボタンをクリックしてArtists Tabを開く。" #deepl:391030067
 mr_tutorial_arts_tab_artists_tab_open_open_tt: "アーティスト・タブを開く" #deepl:974477655

 mr_tutorial_arts_tab_artists: "アーティスト・タブ" #deepl:1211285969
 mr_tutorial_arts_tab_artists_desc: "[Concept('concept_artists_artist','$concept_artists_artists$')] [concept_elgar_composer] [concept_manzoni_writer] はアカデミックスとよく似ていますが、働きは少し違います。♪現在3人のアーティストがいます。[concept_klimt_painter]" #deepl:124747602

 mr_tutorial_arts_tab_artists_invite: "アーティストの招聘" #deepl:1648609371
 mr_tutorial_arts_tab_artists_accquisation_desc: "すでに述べたように、[Concept('concept_artists_artist','$concept_artists_artists$')] は十分な[concept_artistic_progress] を獲得するだけでなく、招待するだけでも獲得できる。[Concept('concept_klimt_independent_painter','$concept_klimt_independent_painters$')][Concept('concept_manzoni_writer','$concept_manzoni_writers$')] 世界中から[Concept('concept_elgar_travelling_composer','$concept_elgar_travelling_composers$')] 、招待することができますが、十分な$building_elgar_opera$、十分な[concept_elgar_musical_tradition] 、十分な 、十分な 、十分な 、十分な 、十分な 、十分な 、十分な 。" #deepl:2127803597

 mr_tutorial_arts_tab_artists_character: "一般情報" #deepl:995936974
 mr_tutorial_arts_tab_artists_character_desc: "The left most part of the window shows some basic information about your artist.︙ Here can see: ︙ The Portrait ︙ The Name and Rating ︙ The[concept_artists_experience] ︙ The Artist.[Concept('concept_character_trait','$concept_character_traits$')]" #deepl:1445240346

 mr_tutorial_arts_tab_artists_currencies: "重要な芸術の価値" #deepl:71895904
 mr_tutorial_arts_tab_artists_currencies_desc: "インターフェイスのこの部分では、芸術の特定の側面に関する一般的な情報を見ることができます。例えば、[concept_elgar_composer] の場合、[concept_elgar_musical_tradition] 、作曲家の作曲と傑作、世界のベスト5作曲家の概要などが表示されます。また、右上の小さなアイコンにカーソルを合わせると、ランキングを見ることができます。" #deepl:1891899818

 mr_tutorial_arts_tab_artists_actions: "アーティスト・アクション" #deepl:2320930103
 mr_tutorial_arts_tab_artists_actions_desc: "[Concept('concept_artists_artist','$concept_artists_artists$')] アクションもあります。ここでは、アーティス トたちがどのような作業を行えるのか、また、国に対してどのような決定を下すことができるのか を見ることができます。ここからスポーツのチュートリアルに進むことも、ゲームを続けることもできます。" #deepl:746856108
 mr_start_sports_tutorial_button_loc: "スポーツ・チュートリアル" #deepl:826655861

 mr_tutorial_sports_window_open: "スポーツウィンドウを開く" #deepl:1830514457
 mr_tutorial_sports_window_open_desc: "スポーツウィンドウを詳しく見てみましょう。ボタンをクリックするか、キーボードの "Ctrl + S "キーを押してスポーツウィンドウを開きます。" #deepl:243246943
 mr_tutorial_sports_window_open_tt: "科学ボタンをクリックするか、"Ctrl + S "を押してスポーツウィンドウを開く。" #deepl:1482293542

 mr_tutorial_sports_window: "スポーツウィンドウ" #deepl:4243980162
 mr_tutorial_sports_window_desc: "[concept_vikelas_olympic_games] [concept_dubois_mountaineering] [concept_vikelas_car_racing] [concept_curtiss_balloonist]スポーツウィンドウでは、様々なスポーツと、そのスポーツに関連するキャラクターを見ることができます。[concept_curtiss_pilot]" #deepl:2523227399

 mr_tutorial_sports_tab: "スポーツタブ" #deepl:2701935579
 mr_tutorial_sports_tab_desc: "スポーツタブでは、スポーツに関する様々な活動やキャラクターを見ることができます。学問や芸術家とは異なり、スポーツタブに登場するキャラクターは将軍や政治家であることが多いです。" #deepl:1383542418
 mr_tutorial_sports_tab_open_tt: "スポーツタブを開く" #deepl:176871982

 mr_tutorial_sports_tab_character_overview: "キャラクター概要" #deepl:96645084
 mr_tutorial_sports_tab_character_overview_desc: "このUIでは、[concept_character] の概要を説明しています。[concept_vikelas_coach] やカーレーサーのように、入手することで[concept_academics_experience] を持っているキャラクターもいます。登山家のようなキャラクターには経験値がありません。" #deepl:1695633540

 mr_tutorial_sports_tab_currencies: "価値と情報" #deepl:2440189283
 mr_tutorial_sports_tab_currencies_desc: "例えば、[concept_vikelas_olympic_games] には、[concept_vikelas_ioc] の会長と理事会の概要、メンバーの人数、これまでに集めたメダルの数などが表示されます。" #deepl:1125108675

 mr_tutorial_sports_tab_actions: "行動" #deepl:1951990429
 mr_tutorial_sports_tab_actions_desc: "右側では、そのスポーツの特定のアクションを行うことができます。♪これらのアクションは、基本的にあなたの[Concept('concept_character', '$concept_characters$')] 、または[concept_vikelas_ioc] のような新しい何かを確立することを可能にする決定です。" #deepl:2455654735

 mr_tutorial_sports_tab_aeronautics_tab_open: "航空タブを開く" #deepl:2120346894
 mr_tutorial_sports_tab_aeronautics_tab_open_desc: "では、航空タブを詳しく見てみよう。ボタンをクリックしてタブを開きます。" #deepl:2671641916
 mr_tutorial_aeronautics_tab_open_tt: "航空タブを開く" #deepl:2187560588

 mr_tutorial_aeronautics_tab: "航空タブ" #deepl:2661687945
 mr_tutorial_aeronautics_tab_desc: "Aeronauticsタブの見た目はSportsタブとほとんど変わりません。[concept_curtiss_balloonist] をスポンサーして自動化することができ、[concept_curtiss_pilot] はさまざまな状況でスポーンします。◆概要チュートリアルは以上です。モルゲンレーテのキャラクターについてもっと知りたい方は、Vickypediaや追加したConceptsをご利用ください。" #deepl:851922845
