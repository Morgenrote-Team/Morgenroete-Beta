 je_agassiz_volcano_expedition: "火山遠征"
 je_agassiz_volcano_expedition_reason: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]教授は助手や専門家チームとともに[SCOPE.sState('agassiz_volcano_state').GetName]での火山調査をおこなっています。遠征予算は限られているので、2年間が限度です。遠征は毎月ごとに進捗度が溜まり、基本的には1年半後に調査が完了します。しかし科学にまつわるボーナスイベントや、はたまた壊滅的なバッドイベントなど、さまざまな特殊イベントが発生して遠征に影響をあたえます。経験則から申し上げて、危険度を最大値に近づけるのは控えましょう。これは子どもの散歩ではありません。火山で遊ばないように。"
 agassiz.21.t: "ヴェスヴィオ火山観測所"
 agassiz.21.d: "In geology, Vesuvius is considered a model volcano for drawing conclusions about the entire volcanology. Due to its increased activity since the 17th century and in the hope of being able to predict and scientifically study more recent eruptions, the state government decided by decree to build a volcanological observatory on its slope."
 agassiz.21.f: "The Vesuvius Observatory (Italian: Osservatorio Vesuviano) is the surveillance centre for monitoring the three volcanic areas of Campania, Italy: Mount Vesuvius, the Phlegrean Fields and Ischia. Founded in 1841 on the slopes of Mount Vesuvius by Ferdinand II of Bourbon, King of the Two Sicilies, it is the oldest volcanology institute in the world."
 agassiz.21.g: "わが国は火山学発祥の地である"
 agassiz_conquered_volcano_modifier: "火山踏破"
 agassiz_geological_disaster_modifier: "地質学的災害"
 je_agassiz_volcano_expedition_ai: ""
 je_agassiz_volcano_expedition_ai_reason: ""
 agassiz.901.tt: "[SCOPE.sCharacter('agassiz_geologist_scope').GetFullName]は謎の本を慎重に調べる。未知の結果が待ち受けているかもしれない。"
 agassiz.917.tt: "[GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetFullName]と遠征隊メンバーは、みな暗闇と絶望につつまれて死んだ！"
 agassiz.909.tt: "地底旅行はもう発生しない"
 agassiz.915.tt: "遠征隊メンバーが何名か殺される"
 agassiz_lidenbrock_diary_modifier: "オットー・リーデンブロックの手記"
 agassiz_journey_coe_preparation_modifier: "地底旅行の準備"
 agassiz_tragic_subterranean_accident_modifier: "地底世界での悲劇的なアクシデント"
 je_agassiz_journey_coe: "地底旅行"
 je_agassiz_journey_coe_reason: "[GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetLastName]博士は謎めいた手稿を発見した。筆者はドイツの地質学者オットー・リーデンブロックで、彼は地底につながる洞窟の存在を示している。この洞窟は、16世紀アイスランドの錬金術師アルネ・サクヌッセンムも使用していたという。この手稿によれば、地底への入口はアイスランドのとある火山にあるそうだ。"
 je_agassiz_journey_coe_fail: "[GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetLastName]博士が亡くなるか引退すると、遠征は実行できなくなる"
 agassiz.901.t: "オットー・リーデンブロックの手記"
 agassiz.901.d: "火山遠征中、[GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetLastName]博士は奇妙な発見をした。帰ってきてから初めて話す気になったそうです。"
 agassiz.901.f: "[GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetFullName] found something that is currently overshadowing the volcano expedition. In a cave that is believed to have once belonged to an extinct volcano in the area, [GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetSheHe] discovered an abandoned geological observation station. When asked, however, the local authorities could not give us any information as to whether and which expedition could have taken place here. Upon closer examination of the volcanic vent, Dr. [GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetLastName] found that there were boxes and sacks with private belongings there, including the bag of an academic. Inside was a diary - belonging to Professor Otto Lidenbrock. Lidenbrock was a Hamburg geologist and mineralogist specializing in volcanism and subterranean cave systems. He was considered one of the most outstanding figures in his field, but also pugnacious and hot-headed. After a dispute at the university, he disappeared without a trace on a last trip. The diary is possibly a final clue to his last station in life - and of inestimable value to science, given its wealth of mineralogical and geological studies! However, Dr. [GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetLastName] does not agree to send the book directly to the nearest university, but would like to examine it more closely. The expedition leader argues that Lidenbrock's journal could provide access to something far greater than a mere cataloging of boring rock formations..."
 agassiz.901.g: "A discovery that will benefit everyone."
 agassiz.901.h: "Dr. [GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetLastName] should keep and study it."
 agassiz.902.t: "The Secret of Prof. Otto Lidenbrock"
 agassiz.902.d: "The book found during the volcano expedition has a bad influence on our geologist."
 agassiz.902.f: "Ever since [SCOPE.sCharacter('agassiz_journey_coe_leader').GetFullName] returned from Greece, [SCOPE.sCharacter('agassiz_journey_coe_leader').GetSheHe] has kept busy with little other than the mysterious diary [SCOPE.sCharacter('agassiz_journey_coe_leader').GetSheHe] found in a volcanic cavity. In return, [SCOPE.sCharacter('agassiz_journey_coe_leader').GetSheHe] neglected [SCOPE.sCharacter('agassiz_journey_coe_leader').GetHerHis] political and scientific duties. Employees report that the light was still on late at night - for weeks. Oddly enough, the geologist has recently had mainly Scandinavian literature delivered. [SCOPE.sCharacter('agassiz_journey_coe_leader').GetSheHe|U] is said to have even locked [SCOPE.sCharacter('agassiz_journey_coe_leader').GetHerselfHimself] in [SCOPE.sCharacter('agassiz_journey_coe_leader').GetHerHis] house with [SCOPE.sCharacter('agassiz_journey_coe_leader').GetHerHis] nephew and the house cook until a particularly difficult case was solved. The further our geologist digs into the book, the more manic [SCOPE.sCharacter('agassiz_journey_coe_leader').GetSheHe] becomes. Everything indicates that [SCOPE.sCharacter('agassiz_journey_coe_leader').GetSheHe] is increasingly drifting into mental illness."
 agassiz.902.g: "Disturbing."
 agassiz.903.t: "The Journey to the Center of the Earth"
 agassiz.903.d: "After a lengthy investigation of Prof. Lidenbrock's diary, [SCOPE.sCharacter('agassiz_journey_coe_leader').GetFullName] has made a breakthrough."
 agassiz.903.f: "[SCOPE.sCharacter('agassiz_journey_coe_leader').GetSheHe|U] had isolated [SCOPE.sCharacter('agassiz_journey_coe_leader').GetHerselfHimself]. Isolated from the outside world in order to spend time alone with the Lidenbrock diary. As [SCOPE.sCharacter('agassiz_journey_coe_leader').GetSheHe] was to tell us later, there was one passage that had intrigued [SCOPE.sCharacter('agassiz_journey_coe_leader').GetHerHim] for months. In addition to personal notes, a much older manuscript page was found between the pages. Creator: a 16th-century Icelandic alchemist named Arne Saknussemm. He left a mysterious inscription on runes that turned out to be more difficult to crack than [SCOPE.sCharacter('agassiz_journey_coe_leader').GetFullName] first thought. Then, as if by intuition, [SCOPE.sCharacter('agassiz_journey_coe_leader').GetSheHe] solved the riddle. As it turned out, [SCOPE.sCharacter('agassiz_journey_coe_leader').GetSheHe] was right. The book had a secret; a mystery so great and monstrous that it shook [SCOPE.sCharacter('agassiz_journey_coe_leader').GetHerHim] to the core. Because the alchemist's message was: \n\n 'Go down into the crater of Snaefells Jökull, which Scartaris's shadow caresses just before the calends of July, O daring traveler, and you'll make it to the center of the earth. I've done that.' \n\n What got [SCOPE.sCharacter('agassiz_journey_coe_leader').GetFullName] even more excited: Lidenbrock had added new runes to the text with his own handwriting. They were: 'And me too'. For the geologist it is clear that these sensational statements require scientific verification. [SCOPE.sCharacter('agassiz_journey_coe_leader').GetSheHe|U] has therefore demanded that we support [SCOPE.sCharacter('agassiz_journey_coe_leader').GetHerHis] trip to Iceland - [SCOPE.sCharacter('agassiz_journey_coe_leader').GetSheHe] wants to travel to the center of the earth [SCOPE.sCharacter('agassiz_journey_coe_leader').GetHerselfHimself]!"
 agassiz.903.g: "[SCOPE.sCharacter('agassiz_journey_coe_leader').GetSheHe|U]'s gone completely insane!"
 agassiz.903.h: "The Doctor knows what [SCOPE.sCharacter('agassiz_journey_coe_leader').GetSheHe]'s doing. Support [SCOPE.sCharacter('agassiz_journey_coe_leader').GetHerHim]!"
 agassiz.909.t: "The unfortunate end of [SCOPE.sCharacter('agassiz_journey_coe_leader').GetFullName]"
 agassiz.909.d: "Due to an unfortunate change in [SCOPE.sCharacter('agassiz_journey_coe_leader').GetFullName]'s living circumstances, we have to stop our planned venture to the center of the earth."
 agassiz.909.f: ""
 agassiz.909.g: "Regrettable."
 agassiz.911.t: "アイスランド"
 agassiz.911.d: "[SCOPE.sCharacter('agassiz_journey_coe_leader').GetFullName]率いる地底調査隊は、レイキャヴィク港に到着しました。"
 agassiz.911.f: "レイキャヴィクの通りで迷うことはまずありえないだろう。だから道を尋ねる必要もなかった。身ぶり手ぶりでしか尋ねることができないから、かえって混乱するだけだろう。レイキャヴィクの町は2つの丘に挟まれた、低い湿地に位置している。片側を巨大な溶岩流がおおい、その先は緩い斜面になって海にながれている。もう片方はこれまた大きなファクサ湾がひろがり、湾の北はスネッフェルスの雄大な氷河がひろがっている。港には「ヴァルキュリア号」だけしかみえなかった。いつもはイギリスとフランスの漁業監視船も停泊しているそうだが、この時はちょうど島の西海岸を哨戒していた。\nレイキャヴィクの2つの通りのうち、いちばん長い通りは海岸と並行に走っていた。なんとも憂うつな道のりで、散策もすぐに終わってしまった。そこここに色あせた芝生があって、まるですり切れたカーペットのようだ。家庭菜園もあった。野菜はごくわずかに生えている程度で、小人の国の食卓用かと思うほどだ。弱々しいアラセイドウも、陽の光を浴びようと懸命に伸びている。\n全体の印象としては、なんともわびしいものだった。樹木もなければ、植物もめったに見つからない。どこもかしこも火山性のごつごつした岩だらけだ。"
 agassiz.911.g: "では出発！"
 agassiz.912.t: "スネッフェルス山"
 agassiz.912.d: "調査隊はアイスランドの火山に到着し、火口に降りようとしています。"
 agassiz.912.f: "すぐに夕食をかきこみ、一行はできるだけ寝心地のよさそうな場所に泊まることにした。ベッドは固く、シェルターにしても頼りない。ここが海抜500メートルと思うと不安になってしまう。\n翌朝、刺すように冷たい風のせいでなかば凍えながら目を覚ましたが、みごとな朝日が差し込んできた。ぼくも玄武岩のベッドから身を起こし、目の前にひろがるすばらしい光景をたのしんだ。\n頭を上げるとちいさな穴が見えた。ごくわずかに空の一角が、完璧な円形で切り取られていた。スカルタリスの峰がくっきりと浮かんでいる。ぼくはまだ、これから飛び込もうとする底なしの穴をのぞき込む勇気がなかった。\nそしてその時が来た。すでに話したとおり、それは直径30メートル、つまり円周はおよそ100メートルあった。ぼくは突き出た岩のうえにかがみこんで、穴を見下ろした。恐怖のあまり髪の毛が逆立った。ぞっとする怖気につつまれる。身体の重心がぐらついたような感覚をおぼえ、まるで酔っぱらった時のように、めまいで頭までくらくらしてきた。"
 agassiz.912.g: "どうしてこんな所に来てしまったのか？"
 agassiz.913.t: "水源探し"
 agassiz.913.d: "火口から降り立ったところで、手持ちの水が突きました。数日もたつと、探検隊は深刻な危機に直面しました。"
 agassiz.913.f: "どんな鉱物学者も、実地研究でこんなすばらしい光景をみたことはないだろう。あの退屈で野蛮な無味乾燥とした掘削機では、地中の内部構造を地表にもってくることはできない。それをぼくたちは実際にこの目で見て、この手で触ることができたのだ。美しい緑色の片岩の層のなかに、銅とマンガンの鉱脈がくねくねと走り、ところどころプラチナや金も見えた。人の手の及ばない地球の奥底には、人間の貪欲な目からのがれて、こんなにも宝が埋まっている。ぼくはそう思わずにはいられなかった。午後6時頃、この光の祝宴はだんだんと弱まり、やがてほとんど消えた。\n予想したとおり、第1日目で手持ちの水はなくなった。ぼくたちの渇きを癒す飲み物はジンしかなくなった。だがこのいまいましい飲み物は喉を焼く。ぼくは視界に入れるのもいやだった。いつの間にか暑さで息苦しくなる。疲れて脚がまともに動かない。ぼくは何度も動けずにぶったおれて、そのたびに休憩した。私のおじとアイスランド人が一生懸命はげましてくれた。しかしおじも疲れ果て、地獄のようなのどの渇きに苦しんでいるようにみえた。ぼくたちはほうほうの体で2つの分かれ道にさしかかった。そこでぼくは溶岩のうえにぐったりと倒れ込んだ。"
 agassiz.913.g: "かなり地下に潜っている──ここで水を探すしかない"
 agassiz.913.h: "地上に戻って水を探そう"
 agassiz.914.t: "地中海"
 agassiz.914.d: "小川をたどって洞窟を抜けると、探検隊は地下に広大な海を発見した。"
 agassiz.914.f: "奇跡だ、ぼくたちは水を見つけた。激流が冷たい水を地中深くまで運び、ぼくたちは水を補給した。しかし流れをたどってその先にたどり着くと、さらに驚くべき光景がひろがっていた。\n最初はなにも見えなかった。暗闇に慣れていたぼくの目はすぐに閉じてしまった。ようやく目を開けられるようになると、ぼくは驚いて、いや呆然として立ち尽くした。巨大な水面が、湖か海が広がっているかのように、見渡すかぎりいっぱいに広がっていた。こんな開けた海を見ていると、クセノフォン率いる1万のギリシャ人が長い退路のはてに「タラッタ！（海だ！）タラッタ！（海だ！）」と一斉に叫んだという故事を思い起こさずにはいられない。\n深く入り組んだ砂浜には波が押し寄せ、キラキラときめ細やかな砂のところどころに、原初の生命を宿した貝殻が散らばっている。岸辺で砕ける波は、広大な閉鎖空間に特有の、よく響くざわめきのような音を立てていた。\n本物の海だ。地上と同じように不規則な海岸線だけれど、生物の気配を感じない荒涼した様子だった。狭いトンネルに47日間も閉じ込められていたのだ。潮の匂いのする空気を吸い込むことがどれだけ嬉しかったか、すぐにわかってくれるはずだ。"
 agassiz.914.g: "いかだを作ろう"
 agassiz.915.t: "巨人"
 agassiz.915.d: "原始時代の巨大キノコに刻まれた謎のルーン文字、これはかつてアルネ・サクヌッセンムがここにいた証しだ。しかしもっと証拠を探そうとすると、恐ろしく巨大な原人をやり過ごさなければならない。"
 agassiz.915.f: "ちらちらと漏れる光のおかげで、茂みの間から遠くの細かいものまでよく見えた。ぼくは何か見えたような気が──いや！ほんとうにこの目で見たのだ！巨大な何かが動いている！巨大な生き物、そうだ、マストドンだ──化石じゃない。1801年にオハイオの湿地帯で骨が見つかったあの生き物が生きている。しかも群れで！見た限りでは巨象のようで、長く柔軟な鼻を器用に動かして、まるで蛇の大群のように土を掘り返している。長い牙を古木の幹につきたててメキメキと裂ける音が聞こえる。\n次に見たものも信じられなくて、ぼくは頭を振った。しかしどんなにあり得なくても、事実は事実だ。そう、25メートルほど先、巨大なカウリマツにもたれかかるようにして、ひとりの人間が立っていた。この地下世界のプロテウス、ネプトゥーヌスの新たな息子が、数え切れないほどのマストドンの群れを見守っていた。そうだ、しかも人間よりも大きい。\nさっきみた骨の原で持ち上げた化石じゃない。巨大な怪物の群れをも統率できるような巨人だった。身長はおよそ4メートルほどはあろう。頭は大きく、ゴワゴワに絡み合った豪毛が顔の半分を覆い、まるでバッファローのように不格好だった。古代の象のたてがみによく似ていた。手にもった巨大な木の枝を軽々と操ってみせるその姿は、まさしくこの地下世界の羊飼いにふさわしい様子だった。"
 agassiz.915.g: "危険は覚悟の上だ"
 agassiz.915.h: "危険すぎる──すぐに地上に引き返そう！"
 agassiz.916.t: "アルネ・サクヌッセンムの痕跡"
 agassiz.916.d: "巨人から逃れた一行は、あちこちにアルネ・サクヌッセンムの遺したメッセージを発見した。しばし捜索すると、アルネ・サクヌッセンムが確かにここにいたという証拠をつかんだ──地球の奥底で、あの手稿を発見したのだ！"
 agassiz.916.f: "15分ほどかけて素早く動き、この恐ろしい怪物の届かないところに逃げることができた。今になって落ち着いて思い返してみても、心がざわついてしまう。あの常識では考えられない奇妙なめぐり合わせから数か月、いったい何を考えればいいだろう？何を信じればいいだろう？きっと勘違いだ、見間違いだったのだ。そう結論せざるをえない。地下世界で生きている人間なんているはずがない。地球の奥深くのほら穴で、地上にはまったく知られず、交流もなく、人間が何世代も生き残っているはずがない。信じようにも、あまりに荒唐無稽すぎる！きっと人間に似た構造の生き物だったのだと納得させた。古い地質学的時代のサルとかヒヒか、あるいはプロトピテクスか、メソピテクスか。サンサン洞窟でラルテ氏が骨を発見したという古代のサルかもしれない。だがあの生き物は、現代古生物学で判明しているどんな生き物よりも大きかった。しかし人間が、それも生きている人間が何世代も地下深くに埋もれて存在しているなんてあり得るはずがない。\nとにかく明るい森を抜けた。驚きのあまり言葉を失い、あまりの出来事に頭のなかは真っ白だった。恐ろしい怪物が後を追いかけてくるかもしれないと怯え、ひたすら走り続けた。まるで悪夢のように恐ろしい何かを追い立てられるかのように、がむしゃらに走り続けた。\nそしてぼくらは大変な好奇心で絶壁に沿って進み、どこかに繋がっている亀裂がないか探し回った。お目当ての花崗岩を見つけると、時間とともに半分掠れかかった謎の二文字が刻まれていた。それは勇敢な探検家のイニシャルだった。\n「A.S.」\nおじが叫んだ。\n「アルネ・サクヌッセンムだ！ここにもアルネ・サクヌッセンムがいたんだ！」"
 agassiz.916.g: "ようやく見つけた──我々のものだ！"
 agassiz.917.t: "地底旅行メンバーの消失"
 agassiz.917.d: "地底旅行は失敗しました。おそらく調査隊メンバーは全員水不足による渇きで死んだのだろう。"
 agassiz.917.f: "夜8時になった。水の手掛かりはどこにもなかった。ぼくの苦しみはいよいよ酷くなった。おじはぐんぐん歩いている。止まるつもりはなかった。遠くの泉のせせらぎが聞こえはしまいかと耳を立てていた。しかし駄目。しんと静まり返っている。そしてとうとう、ぼくの足に力が入らなくなった。おじの歩みを止めさせまいと痛みや苦しみを我慢した。そうなってしまえば一巻の終わり、おじは途方に暮れるだろう。そしてとうとう限界がきた。ぼくはうめき声をあげて倒れこんだ。\n「助けて、もう死にそうだ」\nおじはこちらに戻ってきた。ぼくを見つめて、手を差し伸べようとした。おじのつぶやきが漏れた。\n「万事休す！」\n恐ろしい怒りの身ぶりが最後に目に入り、ぼくは目を閉じた。"
 agassiz.917.g: "なんということだ！"
 agassiz.918.t: "ストロンボリ"
 agassiz.918.d: "地底旅行は大成功に終わった──ストロンボリ火山の噴火によって、科学者たちはヒーローになって帰還したのだ！"
 agassiz.918.f: "それからのことはハッキリと覚えてはいない。爆発が続き、発破の音がひびき、岩という岩がいっせいに揺れ、ぼくたちのいかだはぐるぐると回っていた。灰の雨がふりそそぎ、溶岩の波にただよっていた。炎がごうごうと音を立ててぼくたちに襲い掛かってきた。下からは巨大な鉄のかまどが一気に沸騰したかのような熱風が押し寄せ、激しい嵐になって突き上げてきた。ぼくは炎に照らされたハンスの顔を見た。そのあとはもう、大砲の口に縛りつけられた哀れな犯罪者になったかのような気持ちだった。あとは発射を待つだけ、そうなれば間違いなく生きたまま手足と皮がバラバラになって飛び散り、血がべしゃっと地面にたたきつけられる。\n\nふたたび目を開けると、ハンスの太い腕で腰のあたりをつかまれているのを感じた。どうやら山の斜面に横たわっていたらしい。すぐそばは深い崖で、ちょっとでもそちらに傾こうものなら真っ逆さまに落ちていただろう。ぼくたちの頭上150メートルの場所に火口が見えた。そこから15分ほどの間隔をおいて、大きな爆発音とともに軽石や灰、溶岩流がまざった火柱が高く吹き上がった。山のうねりを感じた。まるで巨大なクジラが呼吸をして、大きな噴水孔から火と風を吹き上げているかのようだ。下はかなりの急斜面で、200メートル前後に溶岩性物質がひろがっていた。山の高さは500メートルもないらしい。ふもとは緑豊かな美しい木々に覆われ、オリーブやイチジク、みずみずしい紫色の房のぶどうがあった。"
 agassiz.918.g: "大冒険だ！"
 agassiz.919.t: "巨人に食べられる"
 agassiz.919.d: "地底旅行は失敗した。調査隊メンバーは全員巨人に食べられてしまったのだろう。"
 agassiz.919.f: "我々はそう思っている"
