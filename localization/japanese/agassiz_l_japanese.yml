 agassiz.103.t: "地質学調査隊の帰国"
 agassiz.103.d: "After the geological team has finished its work, the research assistants return to their home country. The formations they found are now also accessible to our scientists."
 agassiz.103.f: "「最後にアガシー教授の箴言をもってこの章を締めくくりたい。科学の光が新しく、驚くべき事実をあかるみにした時、人々はまず『嘘だ』と言い、次に『宗教に反している』といい、最後は『みんな前から知っていた』と言うものだ」\n ──チャールズ・ライル"
 agassiz.103.g: "あの外国人は助けになった"
 agassiz.104.t: "ウラン鉱脈調査隊の帰還"
 agassiz.104.d: "ウラン鉱脈調査隊は作業を終えて帰国しました。かれらが発見した鉱脈は、現在わが国の企業にも開放されました。"
