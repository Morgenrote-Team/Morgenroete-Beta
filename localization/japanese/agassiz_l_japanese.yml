 agassiz_add_x_geological_knowledge_minus_x_tt: "[SCOPE.GetValue('geological_knowledge_amount')|0+]@agassiz_geological_knowledge![concept_agassiz_geological_knowledge]を失う"
 agassiz_add_x_geological_knowledge_0_tt: "@agassiz_geological_knowledge![concept_agassiz_geological_knowledge]を得られない"
 agassiz_add_x_geological_knowledge_plus_x_tt: "[SCOPE.GetValue('geological_knowledge_amount')|0+]@agassiz_geological_knowledge![concept_agassiz_geological_knowledge]を得る"
 agassiz_building_production_mult_modifier: "新しい鉱脈"
 agassiz_building_production_2_mult_modifier: "新しい油田"
 agassiz_ore_search_cost_modifier: "鉱脈調査のコスト"
 agassiz_mineralogist: "鉱物学者"
 agassiz_mineralogist_desc: "鉱物学者は珍しい石の専門家で、特に希少鉱物の発見で力を発揮する。"
 agassiz_geophysicist: "地球物理学者"
 agassiz_geophysicist_desc: "地球物理学者は地球内部の性質に関する専門家で、地球の歴史とその過程に詳しい。"
 agassiz_prospector: "探鉱者"
 agassiz_prospector_desc: "探鉱者は新しい鉱脈や石油の発見に役立つ技能を備えている。"
 agassiz_oceanographer: "海洋学者"
 agassiz_oceanographer_desc: "海洋学者は海の自然や成立過程について並外れた知見を有している"
 agassiz_volcanologist: "火山学者"
 agassiz_volcanologist_desc: "火山学者は火山の専門家で、火山調査で力を発揮する"
 agassiz.100.t: "鉱脈調査"
 agassiz.100.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]博士は自前の装備を詰め込んで、すべての予定をキャンセルして鉱脈調査に向かった。さて、[ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe]はどの鉱脈を探しているのだろうか？"
 agassiz.100.f: ""
 agassiz.100.g: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]博士は大学に戻るべきだ"
 agassiz.100.h: "石炭"
 agassiz.100.i: "鉄"
 agassiz.100.j: "鉛"
 agassiz.100.k: "硫黄"
 agassiz.100.l: "金"
 agassiz.100.m: "ウラン"
 agassiz.101.t: "新しい鉱脈"
 agassiz.101.d: "鉱脈会社の依頼を受けた[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]博士はいくつか新しい鉱脈を発見して帰宅しました。これで鉱山はますます拡大したが、それは博士にとってあずかり知らぬことです。"
 agassiz.101.f: "「何事にも限界はある。鉄鉱石を磨いてやっても金にはならない」 ──マーク・トウェイン"
 agassiz.101.g: "よくやった"
 agassiz.102.t: "石油だ！"
 agassiz.102.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]博士が発見した新しい油田を掘削したところ、黒い金が見つかりました。[ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe]はこれで仕事が終わったと考えています。"
 agassiz.102.f: "「成功の秘訣とは、早起きし、よく働き、そして石油を掘り当てることだ」──ジャン・ポール・ゲッティ"
 agassiz.102.g: "石油はいくらあっても困らない"
 je_agassiz_find_coal_project: "石炭調査"
 je_agassiz_find_iron_project: "鉄鉱石調査"
 je_agassiz_find_lead_project: "鉛調査"
 je_agassiz_find_sulfur_project: "硫黄調査"
 je_agassiz_find_gold_project: "金鉱脈調査"
 je_agassiz_find_uranium_project: "ウラン調査"
 je_agassiz_find_oil_project: "石油調査"
 je_group_agassiz_geology: "Morgenröte: [concept_agassiz_geology]"
 je_geologist_dies_tt: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]博士死去"
 agassiz_stop_geologist_project_button: "地質学プロジェクトの中止"
 agassiz_stop_geologist_project_button_desc: "地質学プロジェクトを中止する。現在の地質学進捗はゼロになる。"
 agassiz_stop_geologist_improving_project_tt: "#italic 地質学プロジェクトの中止#!ボタンを押して、プロジェクトを中止した。"
 agassiz_mid_atlantic_ridge_cost_modifier: "大西洋遠征のコスト"
 je_agassiz_mid_atlantic_ridge: "海底山脈"
 je_agassiz_mid_atlantic_ridge_reason: "現在、[concept_agassiz_geologist]の[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]博士は最新鋭の大型調査船に乗って、大西洋海底の音響測深を行っています。これにより地球の歴史について最新の知見を得られるでしょう。"
 je_agassiz_mid_atlantic_ridge_goal: "12か月後、[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]博士は結果を公開する予定"
 agassiz.201.t: "大西洋中央海嶺"
 agassiz.201.d: "Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] has viewed some of the first data. The result of the expedition is astonishing: not only in the north of the Atlantic, but throughout the entire Atlantic Ocean, the submarine elevation can be seen as a continuous band that is only broken at the level of the equator. The geologist has named this phenomenon the Mid-Atlantic Ridge. Further evaluation of the data will take place in the coming months and years."
 agassiz.201.f: "The Mid-Atlantic Ridge is a mountain range in the Atlantic Ocean that lies mostly below sea level and extends for around 20,000 km. This makes it the longest of the mid-ocean ridges, a system that spans the Earth and is over 60,000 km long. Seafloor rise in the mid-Atlantic was first described by naval officer Matthew Fontaine Maury in 1853 and confirmed by the Challenger expedition in 1872. The reason was preliminary investigations into the laying of the first transatlantic deep-sea cables. During the German Meteor Expedition 1925-1927, a detailed profile of the Mid-Atlantic Ridge was created using echo sounder measurements. The discovery of the Mid-Atlantic mountain range provided an early clue to the geodynamic processes of plate tectonics related to Wegener's theory of continental drift."
 agassiz.201.g: "This will improve the geologist's geophysical understanding."
 agassiz.201.h: "This will improve the geologist's oceanographic understanding."
 agassiz.201.i: "This will improve the geologist's general understanding."
 agassiz.202.t: "地質学・古生物学シンポジウム"
 agassiz.202.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName]、[ROOT.Var('dubois_paleontologist_var').GetCharacter.GetFullName]の両教授が中心となって、科学アカデミーで公開イベントを開催しました。このシンポジウムは、地球史研究に大きな足跡を残すでしょう。両教授は、南アメリカと西アフリカでは地層や発掘された化石に、きわめて顕著な類似がみられる点を浮き彫りにしました。"
 agassiz.202.f: "地質学と古生物学はきわめて密接な関係にあり、それは両分野で優れた功績を残した多くの学者からも裏付けされています。地層と化石の年代測定には相互関係にあり、双方の学問にもインスピレーションをもたらしました。古生物学の父と称されるジョルジュ・キュヴィエもまた、地質学において大きな足跡を残しています。その密接さゆえに学術論文に発展することもありました。たとえば1830年、漸進説と天変地異説をめぐって起きたキュヴィエ・ジョフロワ論争では、双方が地質学や古生物学の成果を証拠として挙げました。いずれにせよ、現代の地質学と古生物学は、双方の交流なくしてはありえませんでした。"
 agassiz.202.g: "実りある学術交流だ"
 agassiz.311.t: "宇宙からやってきた石"
 agassiz.311.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName]は遠隔地で新たな鉱物を捜索中、なんとも不思議な石を発見しました。この鉄を含有したモノリスを調査したところ、なんと隕石であると判明しました！"
 agassiz.311.f: "宇宙から石が降ってくることは古くから知られていました。18世紀、ウィーン自然史博物館にてフラシナ隕石（1751年落下）を中心とした、世界初の隕石コレクションが展示されました。現在も同博物館の隕石コレクションは約1100個を蒐集していますが、20世紀までは発見された隕石ですら数百個程度でした。それが現代では世界中で3万個以上もコレクションされるようになったのは、ハーヴィー・ナイニンガーの影響が大きいです。ナイニンガーは、地表にはそれまで考えられた以上に多くの隕石があることを発見しました。ナイニンガーが隕石蒐集の中心としたのは、大部分が耕作地で岩石をほとんど含有していない、アメリカのグレートプレーンズ地域でした。"
 agassiz.311.g: "一体どこから来たんだろう？"
 agassiz_seismology_tech: "地震学"
 agassiz_seismology_tech_desc: "1839年、スコットランドのコムリー周辺では地震が頻発し、イギリス政府は対応して地震探知を目的とした委員会を設立しました。その後ジェームズ・デイビッド・フォーブスが世界初の近代地震計を発明しました。1857年にはロバート・マレットは現代的な計測地震学の基礎を作り、爆薬を使った実験をしました。「地震学（seismology）」という用語も、マレットが発明しました。"
 agassiz_geologist_demotivated_modifier: "意気消沈の地質学者"
 agassiz_set_new_age_of_earth_effect_tt: "[GetPlayer.GetName]は最新の知識を用いて地球の年齢を再計算した。地球の年齢は見直される"
 agassiz.401.tt: "[concept_agassiz_geologist]を雇用している全ての国が投票する"
 notification_agassiz_new_earth_age_notification_name: "地球の年齢の再定義"
 notification_agassiz_new_earth_age_notification_desc: "[concept_agassiz_geologist]は、地球が考えられていた以上に古い年齢であると、多くの地質学者を納得させた。\n\n[SCOPE.GetRootScope.GetCountry.GetCustom('agassiz_age_of_earth_type')]"
 je_agassiz_geological_research: "地質学研究"
 je_agassiz_geological_research_reason: "[ROOT.GetCountry.GetCustom('je_agassiz_geological_research_active_type')]多忙ではない[concept_agassiz_geologist]は、地質学研究に従事します。\n\n研究中の効果\n- 地質学者が$agassiz_mineralogist$[concept_character_trait]を有していると、毎年の[Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')]獲得量が2倍になる\n- 地質学者が[Concept('concept_dubois_formation','$concept_dubois_formations$')]や[Concept('concept_lepsius_cave','$concept_lepsius_caves$')]、ウランを発見する。\n- 5年間研究すると、@agassiz_mineral!#p 25000#![Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')]、@agassiz_rare_mineral!#p 1#![Concept('concept_agassiz_rare_mineral','$concept_agassiz_rare_minerals$')]を獲得する。さらに地質学者が$agassiz_mineralogist$[concept_character_trait]を得る。"
 agassiz.401.t: "新たな計算結果"
 agassiz.401.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]はこれまでの経験と知見の集大成として、あたらしい地球の年齢を測定しました。問題は、学界がこの仮説をどう受け止めるかです。"
 agassiz.401.f: "19世紀初頭から20世紀中盤にかけて、地球の正確な年齢についてはさまざまな仮説が乱立し、対立や論争も絶えませんでした。地球の年齢は進化論にもかかわる問題でした。進化論が成立するためには、それだけ長い時間を要したからです。世紀の変わり目まで、多くの科学者は地球の年齢をわずか数百万年程度と信じていました。晩年のケルヴィン卿は、地球の年齢を2000万年と推定しました。進化論擁護の「最大化主義者」を自称したチャールズ・ダーウィンですら、およそ3億年程度だと考えていました。その後、放射能の発見によって正確な計測ができるようになり、地球（そして太陽系全体）の年齢が解明されました。"
 agassiz.401.g: "この仮説を世界中の有名な地質学者に送ろう"
 agassiz.402.t: "地質学者が新たな計算結果を提唱"
 agassiz.402.d: "[SCOPE.sCharacter('agassiz_geologist_scope').GetLastName]は、地球の本当の年齢について計算しました。この科学者は、これまでの算出方法に誤りがあり、地球の年齢はもっと古いものであると推定します。わが国の地質学者もこの問題については有名な識者であるため、この仮説のコピーが送られました。"
 agassiz.402.g: "この計算結果は正しい"
 agassiz.402.h: "こんな地質学もどきの戯言、誰が信じる？"
 agassiz.403.t_yes: "地質学の新説が認められる"
 agassiz.403.d_yes: "ありがたいことに、世界中の地質学コミュニティでは、わが国の地質学者の新たな計算結果が大きな成果として認められ、その仮説が正しいと判断する学者が大多数を占めています。"
 agassiz.403.f_yes: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]が計算した新しい地球の年齢は、過半数の学者に認められた。[GetGlobalVariable('agassiz_age_of_earth_yes_global_var').GetValue|+0]名の学者が仮説に#G 賛成#!、[GetGlobalVariable('agassiz_age_of_earth_no_global_var').GetValue|+0]名が#R 反対#!した。この新説は正式に認められ、地球の年齢は大きく延長された。"
 agassiz.403.g: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]の勝利！地質学の勝利だ！"
 agassiz.403.t_no: "地質学の新説が否定される"
 agassiz.403.d_no: "世界中の無知な「エリート」学者連中は、わが国の地質学の新説を認めませんでした。正確な理由はわかりません。選び方に不正があったのか、それともわが国の威信を貶めようとする策謀が存在したのかもしれません。"
 agassiz.403.f_no: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]が計算した新しい地球の年齢は、過半数の学者に否定された。[GetGlobalVariable('agassiz_age_of_earth_yes_global_var').GetValue|+0]名の学者が仮説に#G 賛成#!、[GetGlobalVariable('agassiz_age_of_earth_no_global_var').GetValue|+0]名が#R 反対#!した。これまでの地球の年齢はそのまま尊重される。"
 agassiz.403.h: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]の敗北、地質学の敗北だ……"
 je_agassiz_advanced_oceanography: "海洋学の発展"
 je_agassiz_advanced_oceanography_reason: "これまでの海洋学は、軍事利用に重点がおかれていました。太平洋環境の戦略的活用を目的とした時代を経て、科学者たちは地球をより深く理解するための海洋研究、すなわち純粋に知識をもとめる海洋学を提唱しています。"
 je_agassiz_advanced_oceanography_success: "#G 50#!@rapanui_oceanographic_knowledge!#E 海洋学的知見#!を獲得すると研究が終了する。"
 je_agassiz_advanced_oceanography_goal: "#G 50#!@rapanui_oceanographic_knowledge!#E 海洋学的知見#!を獲得すると研究が終了する。"
 agassiz.312.t: "地質調査"
 agassiz.312.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]博士は国内の大部分を網羅する地質断面図を作成し、広く世間にも公開しました。"
 agassiz.312.f: "近代地層学は19世紀に発展しました。ウィリアム・スミスを参考にして、ヨーロッパや北アメリカの地質学者たちは祖国の岩層を特定、分類、相互比較し、研究成果を地質図や地質表、論文にまとめました。"
 agassiz.312.g: "知見は理論的に活用する"
 agassiz.312.h: "知見は実践的に活用する"
 agassiz.313.t: "鉱床"
 agassiz.313.d: "はじめての場所で地質調査を行ったところ、大量の鉱床が見つかりました。[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName]は、どこに重点を置いて調査するかを決めかねています。"
 agassiz.313.f: "鉱物とは、元素や化合物の一種です。基本的に結晶構造で、地質学的プロセスから生成されます。現在では約6000種の鉱物が発見されていて、ほとんどが無機物です。その他にも蜜蝋石やエバンキ石、尿路結石に含まれるフーウェル石やウェッデル石などの有機物も、地質学的プロセスで生成されるため鉱物に分類されます。既知の鉱物の亜種や別名、さらにまだ分類されていない鉱物種も含めると、その数は7000種にもなります。"
 agassiz.313.g: "量"
 agassiz.313.h: "質"
 agassiz.314.t: "地質学者の発奮"
 agassiz.314.d: "今では[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName]は地質学の世界では有名になっています。[ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis]の講義にはアドバイスを求める人がたびたび訪れ、郵便箱は世界中の地質学者からの手紙でいっぱいです。"
 agassiz.314.f: "「最高の地質学者とは、いちばん石を見てきた者だろう」 ──ハーバート・ハロルド・リード"
 agassiz.314.g: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis]の名声が高まった"
 agassiz.314.h: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis]の所属する大学の名声が高まった"
 agassiz.315.t: "地質学の洞察"
 agassiz.315.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName]は、研究のために国内のさまざまな地層をおとずれ、ひらめきを得ました。[ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe]は執筆中の論文に、地質学のメカニズムに関する新たな発見をまとめました。"
 agassiz.315.f: "「地質学者にとって、世界は巨大なパズル箱だ。ひとつひとつのピースを前に、まるで子どものように立ち尽くしたかと思うと、あるときその関係に気づいてピースをはめる。地質学者の手の下で、バラバラの断面が一つの全体像となって繋がるのだ」──ルイ・アガシー"
 agassiz.315.g: "素晴らしい"
 agassiz.11.t: "地震の力学"
 agassiz.11.d: "今日、[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName]は世界中の注文をあつめています。[ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe]は地震についての本を出版し、それまでの地質学における地震研究に革命をもたらしたのです。[ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe]が作った「震央」や「地震学」などの用語は、すでに科学分野に普及しています。"
 agassiz.11.f: "1846年2月9日、ロバート・マレットは王立アイルランド・アカデミーにて『地震の力学』を発表。これが現代地震学のはじまりとされています。1852年から58年にかけて、マレットは息子ジョン・ウィリアムの助けを借りながら『イギリス協会地震目録』を執筆。1858年に出版し、これまで知られてきた地震をまとめ、その効果を解説しました。また同時期に爆発実験を行い、岩の固さの違いによる地震波の到達時間を解明しました。"
 pmg_agassiz_seismology: "地震学"
 pm_agassiz_basic_seismology: "基礎地震学"
 pm_agassiz_advanced_seismology: "発展地震学"
 pm_agassiz_advanced_volcanology: "発展火山学"
 agassiz_congress_host_modifier: "国際地質学会議の開催"
 agassiz_laughed_congress_modifier: "地質学会議での嘲笑"
 agassiz_respected_congress_modifier: "地質学会議での尊敬"
 agassiz_lauded_congress_modifier: "地質学会議での称賛"
 agassiz.316.f: "自国の領内に目立った地質学的ポイントが存在しない場合、地質学者は国境地帯や他国に赴いて地層や洞窟を研究することもあります。"
 agassiz.317.t: "他国の地質学者"
 agassiz.317.d: "どういうわけか他国の地質学者が研究中にわが国の領内に入り、記録を取りました。彼は「ありがとう」の言葉とともに、自らの研究成果を送ってくれました。"
 agassiz.317.g: "ええ……？"
 agassiz.501.t: "大陸は動いている？"
 agassiz.501.d: "先日[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName]が出版した本に登場した新説は、激しい議論の的になっています。なんでも現在の大陸には、より地質学的な原型があるというのです。[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]博士の意見によると、現代の大陸はかつて「パンゲア」という一つの巨大な大陸の一部だったというのです。この仮説を世界中の地質学者たちに認めさせるべく、[ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe]は会議を主催しました。"
 agassiz.501.f: "The oldest suggestion that continental drift was the cause came from the Flemish cartographer Abraham Ortelius. In the 1596 edition of his Atlas Theatrum Orbis Terrarum, the similarity of the two coastlines can already be clearly seen. Alexander von Humboldt described the similarity of the opposite coasts of South America and Africa and their vegetation in 1801 and 1845 and speculated that the Atlantic was washed out by a catastrophic current. In 1858, geographer Antonio Snider-Pellegrini went a step further when he published the first map showing the Old and New Worlds without a separating ocean. However, it was above all Alfred Wegener who, with his theory of continental drift, led to a rethinking from fixism (the thesis that the continents are firmly rooted in the earth) to mobilism. During his lifetime, however, his explanation model remained a minority opinion in science, which only became established in the second half of the 20th century."
 agassiz.501.g: "地質学の先進国に招待状を！"
 agassiz.502.t: "地質学会議からの招待状"
 agassiz.502.d: "[SCOPE.sCountry('agassiz_congress_host_country').GetName]は国際地質学会議への招待状を送ってきました。なんでも主賓によると、大陸が移動しているというのです……！"
 agassiz.502.g: "絶対面白いことになるぞ"
 agassiz.503.t_laughed: "地質学界の嘲笑"
 agassiz.503.t_respected: "確かな評判"
 agassiz.503.t_lauded: "称賛と喝采"
 agassiz.503.d_laughed: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]博士の出席は、物笑いのタネとして扱われています。[ROOT.GetCountry.GetNameNoFlag]が地質学の分野で目立った功績を残したという話はありません。まちがいなく、見えない場所で嘲笑されているでしょう。"
 agassiz.503.d_respected: "地質学会議が始まる前、[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName]は温かく迎えられ、いつものようにプレゼントを交換しました。[ROOT.GetCountry.GetNameNoFlag]は地質学界では一目置かれています。"
 agassiz.503.d_lauded: "待ちに待った賓客である[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]教授の到着は熱烈歓迎されています。[ROOT.GetCountry.GetNameNoFlag]は地質学分野の先進国で、教授の周りにはすぐに人だかりができました。"
 agassiz.503.f_laughed: "「[ROOT.GetCountry.GetAdjectiveNoFlag]の地質学者はなぜ娘がいないのかって？\n\nなぜって夫婦の間に摩擦が多すぎるからさ！」"
 agassiz.503.f_respected: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName]は到着するや否や、地質学者たちとつまらない岩層についての会話に花を咲かせています。"
 agassiz.503.f_lauded: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]教授は人だかりに面食らったようです。多くの地質学者たちが[ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHim]に話しかけ、[ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis]の遠征談や実験談から有益なものを聞き出そうとしています。なかには[ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHim]に個人レッスンを願う者までいます。"
 agassiz.503.g: "ああ恥ずかしい！"
 agassiz.503.h: "ようやく同志に会えた"
 agassiz.503.i: "わが国は地質学の先進国だ！"
 agassiz.504.t: "静止説か可動説か？"
 agassiz.504.d: "[SCOPE.sCharacter('agassiz_alfred_wegener_scope').GetFullName]は世界中から集まった地質学者たちを前に講演会を行い、高い評価を受けました。この中で[SCOPE.sCharacter('agassiz_alfred_wegener_scope').GetSheHe]は、従来の地質学から可動説、すなわち大陸移動説への大転換を強く訴えました。しかし反対派も多く、彼らはこれまで支配的だった静止説からの逸脱を望んでいませんでした。"
 agassiz.504.f: "静止説（Fixism）とは、1960年代まで存在した地質学の支配的仮説です。地球の地殻と下層土は固定されており、そのため大規模な地殻変動は局所的なものにとどまるという理論です。静止説では、地球の発展はおもに垂直方向への地殻変動によるもので、水平方向への地殻変動はきわめて少ないと論じています。古典地質学では、ほとんどの理論が静止説を前提としていました。10世紀初頭、南アメリカとアフリカで同じ種別の化石が発見されました。静止説の立場では、かつてアフリカ大陸と南アメリカ大陸をつなぐ1本の陸橋があり、動物はそこを渡ったとする「陸橋説」が唱えられました。1924年から27年の調査船メテオール号の音響測深によって、大西洋海底を南北に走る大西洋中央海嶺が発見されました。そして「陸橋説」が正しければ東西に走っているはずの陸橋の痕跡は見つかりませんでした。これ以降「陸橋説」は下火になったものの、完全な衰退は1960年代になってからです。静止説の反対が可動説（mobilism）で、これは水平方向への地殻変動を重視する説です。可動説は、アルフレート・ヴェーゲナーの大陸移動説の発見をもとに発展しました。"
 agassiz.504.g: "数百年程度で大陸が動いたりしない"
 agassiz.504.h: "あらゆる要素がプレートテクトニクスの存在を示している"
 agassiz.505.t: "地質学者と仲間たち"
 agassiz.505.d: "地質学会議の中心議題の裏で、[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName]博士は世界中からあつまった多くの優秀な地質学者たちと出会い、アイデアを交換する機会にめぐまれました。自由時間を利用して、何を重視すべきでしょうか？"
 agassiz.505.f: "「生物学の立場からアプローチするか、はたまた地球物理学の立場からアプローチするかによって、先史時代の地球環境についてまったく正反対の結論が出る。これは奇妙だが事実であり、現在の知識の不完全さを示している」──アルフレート・ヴェーゲナー"
 agassiz.505.g: "地質学的知見"
 agassiz.505.h: "海洋学的知見"
 agassiz.505.i: "希少鉱物"
 agassiz.505.j: "新しい才能"
 agassiz.509.t_fix: "静止説の勝利"
 agassiz.509.d_fix: "これまでの努力もむなしく、[SCOPE.sCharacter('agassiz_alfred_wegener_scope').GetFullName]はあつまった地質学者の過半数を納得させることはできませんでした。[SCOPE.sCharacter('agassiz_alfred_wegener_scope').GetLastName]教授は、新説に十分な裏付けが足りないと非難されました。これまでどおり、「大陸は動かない」が事実として扱われます。"
 agassiz.509.f_fix: "「大陸移動説におけるニュートンはまだ現れていない。だからといって心配する必要もない。まだ生まれたばかりの仮説なのだから、時には疑いのまなざしを向けられることもあろう。長い目でみれば、仮説の提唱者が責められる謂れはないだろう。学会全体から賛同を得られていない法則を説明するのだから、時間を浪費したり、もめごとに事に巻き込まれたりするのをためらう気持ちだって出てこよう」──アルフレート・ヴェーゲナー"
 agassiz.509.g: "それでも地球は動いている"
 agassiz.509.t_tectonics: "可動説の勝利"
 agassiz.509.d_tectonics: "[SCOPE.sCharacter('agassiz_alfred_wegener_scope').GetFullName]は、みずからの新説を学界に認めさせました。大陸移動説は、これまであいまいだった地質学のさまざまな現象を説明するうえで主流の理論となりました。"
 agassiz.509.f_tectonics: "'Scientists still do not appear to understand sufficiently that all earth sciences must contribute evidence toward unveiling the state of our planet in earlier times, and that the truth of the matter can only be reached by combing all this evidence. ... It is only by combing the information furnished by all the earth sciences that we can hope to determine 'truth' here, that is to say, to find the picture that sets out all the known facts in the best arrangement and that therefore has the highest degree of probability. Further, we have to be prepared always for the possibility that each new discovery, no matter what science furnishes it, may modify the conclusions we draw.' -Alfred Wegener"
 agassiz.509.h: "Wait - that...is surprising!"
 agassiz_conference_geologist_double_vote_tt: "経験豊富な地質学者を雇用しているため、わが国の投票数は#G 2倍#!になっている"
 agassiz_conference_geologist_triple_vote_tt: "著名な地質学者を雇用しているため、わが国の投票数は#G 3倍#!になっている"
 agassiz.601.t: "火山の場所"
 agassiz.601.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName]を中心に科学者と助手らのグループが集まって、きたる火山調査遠征の準備を進めています。問題は、どの火山を調査するかです。いくつかの州が候補に挙がっています。"
 agassiz.601.f: "「ハットン博士の理論を参照するときは、『火』という言葉を使わないようにしましょう。『熱』のほうがずっとふさわしい表現です。普通、『火』は燃料が燃える様子を想像します。しかし地球の中心にこうした意味の『火』が実在すると信じるに足る根拠がありません」──マリア・ハック"
 agassiz.601.g: "[SCOPE.sState('agassiz_volcano_1').GetName]"
 agassiz.601.h: "[SCOPE.sState('agassiz_volcano_2').GetName]"
 agassiz.601.i: "[SCOPE.sState('agassiz_volcano_3').GetName]"
 agassiz.602.t: "火山のふもとへ"
 agassiz.602.d: "火山調査隊は[SCOPE.sState('agassiz_volcano_state').GetName]にある火山のふもとに到着しました。これより実地調査に入ります。"
 agassiz.602.f: "「地熱の存在は温泉、火山、地震といった現象からも明らかである。これらを観察すれば、地球の奥深くに熱が存在することは疑うべくもない。しかし地中の熱はどれだけの深さに、どれほどの範囲に、そしてどれだけの熱量で存在しているのだろう？」──ジョン・プレイフェア"
 agassiz.602.g: "なんだ、聞いていたよりは平気そうじゃないか？"
 agassiz.603.t: "火山調査隊の成功"
 agassiz.603.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName]は助手たちを引き連れて火山の頂上まで登り、さらに数々の実験を行い、標本も採集しました。火山調査隊は地球内部のはたらきについて知るうえで、貴重な貢献をなしとげました。"
 agassiz.603.f: "'All Nature's wildness tells the same story: the shocks and outbursts of earthquakes, volcanoes, geysers, roaring, thundering waves and floods, the silent uprush of sap in plants, storms of every sort, each and all, are the orderly, beauty-making love-beats of Nature's heart.' -John Muir"
 agassiz.603.g: "それに全員やけどもしていない"
 agassiz.604.t: "火山調査隊が悲劇的結末を迎える"
 agassiz.604.d: "凶報！有毒ガスや小規模地震、黒い煙など、いくつも危険な予兆があったにもかかわらず、[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName]は頑迷にも遠征を続けようとしたようです。そして突然の噴火が遠征隊を襲いました。噴火の被害は周辺一帯におよびました。いまも山や周辺の村落に溶岩が流れ落ちていいます。何名かの生存者は命からがら逃げ延び、研究結果やサンプルを持ち帰ることができました。しかし[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]博士は行方不明です。最悪の結果を想定すべきでした。"
 agassiz.604.f: "すでに新聞各紙は、死傷者について報じています。周辺地域の大部分が避難を余儀なくされています。建物はボロボロになり、通りには溶岩が流れています。この自然の力を前にしては、噴火口近くに生存者がいる可能性は限りなくゼロに近い。"
 agassiz.604.g: "なんてことだ！"
 agassiz.605.t: "火山調査隊は収穫なく終了"
 agassiz.605.d: "火山調査隊は研究予算を使い果たして帰還しました。残念ながら、有益な結果はほとんど得られませんでした。リーダーが慎重すぎたせいかもしれません。"
 agassiz.605.f: "「火山の上でダンスでもやってみせる気概がないと、火山探検なんてできやしない」"
 agassiz.605.g: "失望したぞ"
 agassiz.611.t: "化学の洞察"
 agassiz.611.d: "[SCOPE.sState('agassiz_volcano_state').GetName]遠征中、[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]は火口付近の珍しい化学反応について、詳細な形で研究することができました。なかには全く存在の知られていなかった鉱石化合物も見つかりました。"
 agassiz.611.f: "Most chemical elements occur in compounds that show great variety, especially in minerals. At the beginning of modern chemistry, geologists were always looking for new samples from which chemists could isolate previously unknown elements."
 agassiz.611.g: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]博士の役に立つかもしれない"
 agassiz.612.t: "溶岩の罠"
 agassiz.612.d: "火口に向かう途中、火山調査隊はいささか蛮勇が過ぎたようです。いつの間にか周辺をほとんど溶岩に囲まれてしまいました。さっきまでの道を引き返すとなると、大きな時間のロスになります。"
 agassiz.612.f: "'The lava itself has that dingy appearance which the poets assign to the rivers of the infernal regions; it rolls on slowly like a stream of sand, blackish by day and red by night. As it approaches you hear a kind of crackling sound, which occasions the greatest fear as it is indistinct. Its resplendency is so intense, that for the first time the earth illuminates the sky, and gives it the appearance of continued lightning; the sky, in its turn reflects this lustre upon the water, and thus nature seems to be set in flames by this three-fold image of fire.' -Germaine de Staël"
 agassiz.612.g: "別のルートを探そう"
 agassiz.612.h: "頑張って渡ろう"
 agassiz.613.t: "不屈のリーダー"
 agassiz.613.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName]は経験豊富な火山学者なので、山について熟知してします。博士の知見のおかけで、調査隊は安全かつ着実に進行しています。"
 agassiz.613.f: "「常々この目で見ておきたかった瞬間がついにやってきました。ヴェスビオス火山はここ数日間噴火を続けています。すでに火口から噴出する溶岩で多くの実験を行いました。本当なら実験は終わっているはずなのですが、今はひどく体調が悪いのです。それというのも、すばらしいと同時に危険な場所に留まりすぎたせいです。赤熱した流体がまるで炎の滝のように流れている所から、5、6フィートしか離れていなかったのですから」──ハンフリー・デイビー"
 agassiz.613.g: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]博士はすばらしいリーダーだ"
 agassiz.614.t: "有毒ガス"
 agassiz.614.d: "地質学者の[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]博士率いる火山調査隊は、とある場所で大量の火山ガスの噴出を発見しました。博士は危険を承知で、このガスのサンプルを入手しようとしています。"
 agassiz.614.f: "Volcanic gases are gases that emerge from the earth's surface during volcanic activity. Emergence can occur either in narrowly defined areas or diffusely over a large area from the flanks of a volcano. Volcanic gases were collected and analyzed as long ago as 1790 by Scipione Breislak in Italy. The composition of volcanic gases is dependent on the movement of magma within the volcano. Therefore, sudden changes in gas composition often predict a change in volcanic activity."
 agassiz.614.g: "このガスを調べなければ"
 agassiz.614.h: "正気に戻れ！"
 agassiz.615.t: "火山噴出物"
 agassiz.615.d: "突如ゴロゴロという音が響き、火山調査隊はしばらく身構えた。落ち着いたかと気を抜いたその瞬間、とつぜん噴火が起き、流星群のように岩が降り注いだ。助手2名が負傷し、荷馬が1頭死んだ。"
 agassiz.615.f: "'We heard above us and about the island a strange sound, as a mighty crackling fire, or the discharge of heavy artillery at one or two second intervals. At five, the roaring noise continued, darkness spread over the sky and a hail of pumice stone fell on us, or which many pieces were of considerable size and quite warm.' -Captain Watson"
 agassiz.615.g: "運が悪かった"
 agassiz.616.t: "溶岩のサンプル"
 agassiz.616.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]博士は、やおらに部下に止まるよう命じました。どうやら近くに溶岩のサンプルを採取するのに適した場所があったようです。科学的には価値がありますが、危険が伴います。"
 agassiz.616.f: "'The lava was pent within the deep banks of a wide bed, and was flowing down, not like a fluid but like a mountain of coke, or at times like highly gaseous coal. It split, and crackled, and sparkled, and smoked and flamed up and ever moved on in one vast compact body. Pieces detaching themselves rolled down, leaving behind a glare so fierce that I could have imagined myself at the mouth of an iron furnace; and as every mass fell down with the noise of thunder the trees flamed up, and the crowds uttered shouts of admiration and regret.' -Luigi Palmieri"
 agassiz.616.g: "こういう経験のために来たんじゃないか"
 agassiz.617.t: "溶岩のサンプル──成功！"
 agassiz.617.d: "地質学者は危険なやり方でどうにか溶岩サンプルを採集しました。科学的にはきわめて貴重な結果を得られました。"
 agassiz.617.f: ""
 agassiz.617.g: "Hot science!"
 agassiz.618.t: "溶岩のサンプル──失敗！"
 agassiz.618.d: "サンプル採集は失敗し、調査隊メンバーは落胆しています。[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName]はひどい火傷を負い、チームも危険に晒されています！"
 agassiz.618.f: ""
 agassiz.618.g: "A science that will burn your hands..."
 agassiz.619.t: "クリスタル"
 agassiz.619.d: "火山地帯特有の地質学プロセスで生成されたのか、希少な結晶鉱物があたり一面に広がっています。[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName]は、どうにかして自分のコレクションに加えようとしています……"
 agassiz.619.f: "Most volcanic rocks share a number of common minerals. Differentiation of volcanic rocks tends to increase the silica (SiO2) content mainly by fractional crystallization. Thus, more evolved volcanic rocks tend to be richer in minerals with a higher amount of silica such as phyllo and tectosilicates including the feldspars, quartz polymorphs and muscovite. While still dominated by silicates, more primitive volcanic rocks have mineral assemblages with less silica, such as olivine and the pyroxenes. Bowen's reaction series correctly predicts the order of formation of the most common minerals in volcanic rocks. Occasionally, a magma may pick up crystals that crystallized from another magma; these crystals are called xenocrysts. Diamonds found in kimberlites are rare but well-known xenocrysts; the kimberlites do not create the diamonds, but pick them up and transport them to the surface of the Earth."
 agassiz.619.g: "1個のサンプルで十分だ"
 agassiz.619.h: "できるだけ多く持って帰れ！"
 agassiz.619.i: "石っころと研究者の生命とでは釣り合わない"
 agassiz.620.t: "炎の河"
 agassiz.620.d: "溶岩流が調査隊の行く手をはばんでいます。隊員たちは調査そのものを脅かしかねない危険な障害物とみていますが、[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName]は完成したばかりの科学器具をテストするチャンスだと考えているようです……"
 agassiz.620.f: "'In the majority of cases it can be clearly seen that the light emanates from incandescent, but not flaming bodies. It is the light of the glowing lava which makes the great column of seeming flame rushing up from Vesuvius.' -John Philipps"
 agassiz.620.g: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]博士は調査すべきだ"
 agassiz.620.h: "危険すぎる！"
 agassiz.621.t: "火山学の仮説"
 agassiz.621.d: "火山調査中の[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName]は、ようやく念願のチャンスを得ました。博士は証拠を集めたり一帯を調査して、これまで温めてきた火山学の仮説を検証しようとしています。ですがかなりの時間がかかります。博士は「非常にすばらしい、インスピレーションが湧いてくる場所」と評していますが、その背後でもうもうと立ちこめる黒煙を、調査隊員たちは引きつった顔で見つめています……"
 agassiz.621.f: "'At the climax of the eruption, a column of ash rose high into the shape of an immense pine till at length it began to incline downwards, when, from the quantity of dense matter which composed the column it fell to the ground. Torrents of flaming lava of an awefully portentous magnitude now poured down the mountain.' -Mariana Starke"
 agassiz.621.g: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]には時間をかけて火山現象を徹底的に調べてもらいたい"
 agassiz.621.h: "時間のムダだ！"
 agassiz.622.t: "地震"
 agassiz.622.d: "早朝、火口まであと一息というところで、地響きとともに土砂崩れが起きました。この小規模な地震は、予想よりも火山活動が活発化している兆候とみて間違いありません。"
 agassiz.622.f: "'In another place, this learned geographer, in alluding to the tradition that Sicily had been separated by a convulsion from Italy, remarks, that at present the land near the sea in those parts was rarely shaken by earthquakes, since there were now open orifices whereby fire and ignited matters, and waters escape; but formerly, when the volcanoes of Etna, the Lipari Islands, Ischia, and others, were closed up, the imprisoned fire and wind might have produced far more vehement movements. The doctrine, therefore, that volcanoes are safety-valves, and that the subterranean convulsions are probably most violent when first the volcanic energy shifts itself to a new quarter, is not modern.' -Charles Lyell"
 agassiz.622.g: "どうしてこんな目に……"
 agassiz.623.t: "豊富な鉱物"
 agassiz.623.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName]率いる[SCOPE.sState('agassiz_volcano_state').GetName]火山調査隊は、巨大な鉱床を発見した。"
 agassiz.623.f: "鉱床と地質学者は親友だ"
 agassiz.623.g: "鉱物！"
 agassiz.623.h: "いらない"
 agassiz.624.t: "珍しい生物"
 agassiz.624.d: "なんと[SCOPE.sState('agassiz_volcano_state').GetName]の火山調査隊は、火山にほど近い場所で希少な生物を発見しました。なかには地元の動物学者も間違いなく興味を抱くような生物もいますり"
 agassiz.624.f: "'Humphrey! Please collect some volcanic dwarf parakeet eggs. Breakfast was meager and I miss my Sunday fried egg.'"
 agassiz.624.g: "標本！"
 agassiz.625.t: "謎の化石"
 agassiz.625.d: "[SCOPE.sState('agassiz_volcano_state').GetName]火山調査隊の[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName]は、珍しい化石を発見しました。古生物学や地質学の疑問を解き明かす答えになるかもしれません。"
 agassiz.625.f: "'If we skirt the fertile region at the base of Etna on its southern and eastern sides, we behold marine strata of clay sand, and volcanic tuff, cropping out from beneath the modern lavas. The marine fossil shells occurring in these strata are all of them, or nearly all, identical with species now inhabiting the Mediterranean; and as they appear at the height of from 600 to 800 feet above the sea near Catania, they clearly prove that there has been in this region, as in other parts of Sicily farther to the south, an upward movement of the ancient bed of the sea. It is fair, therefore, to infer that the whole mountain, with the exception of those parts which are of very modern origin, has participated in this upheaval.' -Charles Lyell"
 agassiz.625.g: "化石！"
 agassiz.626.t: "地磁気のデータ"
 agassiz.626.d: "今朝、[SCOPE.sState('agassiz_volcano_state').GetName]火山調査隊宛に首都から電報が届きました。地磁気観測所からの依頼で、火口でのデータ収集を要請しました。すると[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]博士は要望に応えてくれました。"
 agassiz.626.f: "「このデータがそんなに重要というなら、なぜ地磁気研究所の職員がこっちに来てデータ収集をしないのかね？」"
 agassiz.626.g: "完璧だ"
 agassiz.627.t: "太陽の元素は地球にあった"
 agassiz.627.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName]がこれまで気に留めていなかった岩石を分析したところ、驚くべき発見がありました。現地でのスペクトル分析の結果、[ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe]は火山岩の中にはヘリウム元素が含まれているのを発見したのです。ヘリウムは宇宙にしか存在しないと思われていた元素です。"
 agassiz.627.f: "Luigi Palmieri was an Italian physicist, meteorologist, seismologist and volcanologist. In 1845 he took over Pasquale Galluppi's teaching position in logic and metaphysics at the University of Naples. After Gallupi's death in 1847, his chair was entrusted to him. In 1860 he gave up the chair and instead took over the chair of geophysics and meteorology that he had initiated. Attached to the chair were the meteorological observatory and the Vesuvius Observatory, founded in 1842, which Palmieri also took over management. He headed the chair and the two observatories until his death. Palmieri became known in particular for improved measuring devices, such as an electromagnetic seismograph and devices for measuring electrical voltages in the atmosphere. In 1882 he succeeded in detecting the element helium on Earth for the first time through spectral analysis of Vesuvius lava."
 agassiz.627.g: "これは……興味深い可能性が開けたな"
 agassiz.628.t: "調査隊が休息を求める"
 agassiz.628.d: "一年以上も火山遠征を続けた調査隊メンバーは、だんだんと休みを求めるようになってきました。みんな疲労困憊で、一言目には故郷に帰りたいと口にしています。"
 agassiz.628.f: "「諸君は怖気づいたのか？今さら語るまでもないが、このような地震現象が起きるからこそ、我々はこの火山に登っているのではないか！諸君は科学者か？それとも脱走兵か？」"
 agassiz.628.g: "十分に休息を取るように"
 agassiz.628.h: "少し休ませる、それ以上は許さん"
 agassiz.628.i: "使えない助手め！遊んでないで働け！"
 agassiz.629.t: "地獄の炎"
 agassiz.629.d: "[SCOPE.sState('agassiz_volcano_state').GetName]火山の様子はどんどん悪化している。突如黒煙を噴き出し、流れる溶岩も増えてきています。調査隊も窮地に追い込まれています。調査隊は溶岩に囲まれる危険を承知で慎重に動くか、それとも未知の危険も覚悟でどんどん進むべきだろうか？"
 agassiz.629.f: "'The breath of fire swept down upon the city and water front with all of the force that could have been given to it by a cannon. Cinders were shot into our face with stinging effect. The air was filled with flame. Involuntarily we raised our hands to protect our faces. I noticed the same gesture when I saw the bodies of the victims on shore.' -Comte de Fitz-James"
 agassiz.629.g: "Exercise caution."
 agassiz.629.h: "Take the risk."
 agassiz.630.t: "Hell on Earth"
 agassiz.630.d: "It seems like all hell has broken out on the volcano in [SCOPE.sState('agassiz_volcano_state').GetName]. Lava fountains shoot up, blazing forces fight each other in streams of fire. A threatening event for the majority of the expedition participants. Only Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] cannot escape a rapturous fascination."
 agassiz.630.f: "'By night the effect of the fire became more beautiful. We were surrounded by streams and cataracts of the red and radiant fire; and in the midst, from the column of bituminous smoke shot up into the air, fell the vast masses of rock, white with the light of their intense heat, leaving behind them vapour trains of splendour.' -George Gordon Byron"
 agassiz.630.g: "This is a fascinating spectacle and we should take photos of it!"
 agassiz.630.h: "Frightening,"
 agassiz.630.i: "Withdraw!"
 agassiz.631.t: "Quite active Volcano"
 agassiz.631.d: "Apparently the volcano that Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] is researching is much more active than expected. An outbreak is probably imminent. This makes selling the expedition more dangerous. However, with higher risk, the scientific opportunities also increase..."
 agassiz.631.f: "'People never believe in volcanoes until the lava actually overtakes them.' -George Santayana"
 agassiz.631.g: "More knowledge!"
 agassiz.631.h: "More experience!"
 agassiz.631.i: "More minerals!"
 agassiz.632.t: "Newspaper Report"
 agassiz.632.d: "The #YELLOW [SCOPE.sState('manzoni_publisher_state').GetNameNoFormatting] Chronicle#!, one of the region's leading newspapers, is currently keeping its readers up to date with reports about the volcano expedition. A scientific niche field has thus aroused the interest of a larger section of the population. Boys and young men in particular are fascinated by the adventurous stories."
 agassiz.632.f: "'Read in the latest issue: The daring crater climb by Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastNameNoFormatting]! Brave scientists face against lava, toxic fumes and hellish heat. Man crosses another boundary at the edge of what the ancients believed was the entrance to the underworld. Our reporters continue to accompany the journey with illustrations. Thursday is Chronicle day!'"
 agassiz.632.g: "This will inspire a new generation of scientists."
 agassiz.633.t: "A safe Resting Place"
 agassiz.633.d: "The expedition members found a safe place to retreat between sulfur fumes, black smoke and lava flows."
 agassiz.633.f: "'My dear colleague Professor Schabernack!\n\nI thank you at this point for your illuminating insights into the dynamic development of water in a volcanic vacuum, but I will formulate my objections in more detail at a later date. Rather, my point is that in my correspondence with Dr. Dr. Sauerspeck I was told that you had spread the disgraceful rumor at the university that we were having fun on this volcano. I want you to stop making these assumptions. The [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastNameNoFormatting] Hot Springs I recently discovered have a maximum temperature of only 32°C, not 35°C as you recently claimed. So they are de facto frosty cold. Please correct these infamous misrepresentations!'"
 agassiz.633.g: "Relaxation!"
 agassiz_volcano_tourist_modifier: "Volcano Tourism"
 agassiz_small_volcano_eruption_modifier: "Small Volcanic Eruption"
 agassiz_medium_volcano_eruption_modifier: "Volcanic Eruption"
 agassiz_big_volcano_eruption_modifier: "Mega Volcanic Eruption"
 agassiz_medium_earthquake_modifier: "Earthquake"
 agassiz_big_earthquake_modifier: "Mega Earthquake"
 agassiz.711.t: "Volcano Spectacle"
 agassiz.711.d: "The residents of [SCOPE.sState('agassiz_volcano_state').GetName] are currently witnessing an impressive spectacle: the volcano's lava fountains are a fascinating sight, especially at night. Tourists and scientists can be found among the onlookers."
 agassiz.711.f: "'The Sublimest of Volcanoes! Etna's flame\nPales before thine and quenchless Hecla's tame;\nVesuvius shows his blaze, an usual sight\nFor gaping tourists, from his hackneyed height.'\n\n - Lord Byron"
 agassiz.711.g: "Wonderful!"
 agassiz.712.t: "Small Volcano Eruption"
 agassiz.712.d: "The volcano in [SCOPE.sState('agassiz_volcano_state').GetName] has erupted. Some smaller villages were destroyed and fields were flooded with lava, but the disaster was limited."
 agassiz.712.f: "'What I saw then! Thousands of tongues of fire lit up the surroundings. On tops of the trees I saw flames. I heard a crack, and saw a sheet of fire right next to me. The sea was not to be seen. Everything was covered in ash. I could not see my hand before me. The last thing I saw was the ash being pushed up through the cracks in the floor boards, like a fountain. I felt a heavy pressure, throwing me to the ground. Then it seemed as if the air was being sucked away and I could not breathe.' -Johanna Beyerinck"
 agassiz.712.f_basic: "\n\n#YELLOW Thanks to our scientists at the Volcano Observatory, we were not entirely surprised by the catastrophe. We were therefore able to take precautions and #G limit the devastation somewhat#!.#!"
 agassiz.712.f_advanced: "\n\n#YELLOW Thanks to our excellent scientists at the Volcano Observatory, we were able to quickly initiate evacuation measures and take protective measures. We were able to #G limit the devastation significantly#!."
 agassiz.712.g: "Just a bit of lava."
 agassiz.712.h: "Any news from the observatory?"
 agassiz.712.i: "This might be interesting for Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] and his students"
 agassiz.713.t: "Volcano Eruption"
 agassiz.713.d: "A violent eruption has shaken the state of [SCOPE.sState('agassiz_volcano_state').GetName]. Fragments of tephra and volcanic ash have destroyed buildings and crops, taking some of the lives of our people."
 agassiz.713.f: "'We heard above us and about the island a strange sound, as a mighty crackling fire, or the discharge of heavy artillery at one or two second intervals. At five, the roaring noise continued, darkness spread over the sky and a hail of pumice stone fell on us, or which many pieces were of considerable size and quite warm.\n\nThat night was one of blackness — from the continuing fall of ash — broken by incessant flashes of lightning, both in the sky, and around the island.' -Captain Watson"
 agassiz.713.g: "These poor people."
 agassiz.713.j: "Send as much help as possible to support the victims!"
 agassiz.714.t: "Mega Volcano Eruption"
 agassiz.714.d: "An eruption of unprecedented records has utterly destroyed the lives of many in the state of [SCOPE.sState('agassiz_volcano_state').GetName]. The explosion could be heard from hundreds of miles away and anything that had the ill fate of surrounding the mountain was immediately devastated."
 agassiz.714.f: "'You could hear the shrieks of women, the wailing of infants, and the shouting of men; some were calling their parents, others their children or their wives, trying to recognize them by their voices. People bewailed their own fate or that of their relatives, and there were some who prayed for death in their terror of dying. Many besought the aid of the gods, but still more imagined there were no gods left, and that the universe was plunged into eternal darkness for evermore.' -Pliny the Younger"
 agassiz.714.g: "A tragedy!"
 agassiz.715.t: "Smoke and Rumble"
 agassiz.715.d: "The volcano in [SCOPE.sState('agassiz_volcano_state').GetName] is rumbling. Smoke rises above the crater. That's it. The residents are relieved, tourists and scientists are disappointed."
 agassiz.715.f: "'Too much to investigate, too little to enjoy. What a miserable, moody volcano!'"
 agassiz.715.g: "Does it wake up or stay asleep?"
 agassiz.721.t: "Seismic waves"
 agassiz.721.d: "A minor seismic disturbance shook [SCOPE.sState('agassiz_earthquake_state').GetName] out of bed this morning. The small earthquake caused only minor damage, but piqued the interest of seismologists."
 agassiz.721.f: "'Interviewer: If the building you are in now started to shake and you knew an earthquake was occurring, what would you do?'\nCharles Richter: 'I would walk - not run - to the nearest seismograph.'"
 agassiz.721.g: "Interesting."
 agassiz.722.t: "The [SCOPE.sState('agassiz_earthquake_state').GetName] Earthquake"
 agassiz.722.d: "An earthquake has hit the state of [SCOPE.sState('agassiz_earthquake_state').GetName], destroying buildings, injuring people and even taking some lives."
 agassiz.722.f: "'There was a deep rumble, deep and terrible, and then I could see it actually coming up Washington Street. The whole street was undulating. It was as if the waves of the ocean were coming towards me, billowing as they came.' -Jesse Cook"
 agassiz.722.f_basic: "\n\n#YELLOW Thanks to our trained seismologists, it was already known that [SCOPE.sState('agassiz_earthquake_state').GetName] was an earthquake-prone region. Due to preventative measures, for example in construction, the damage was easily minimized.#!"
 agassiz.722.g: "A tragedy!"
 agassiz.722.h: "How does the observatory assess the situation?"
 agassiz.722.i: "A perfect field for geological research."
 agassiz.722.j: "Send as much help as possible to support the victims!"
 agassiz.723.t: "The Great [SCOPE.sState('agassiz_earthquake_state').GetName] Earthquake"
 agassiz.723.d: "The state of [SCOPE.sState('agassiz_earthquake_state').GetName] has been reduced to ruins by an earthquake of unprecedented scale. Countless buildings have been destroyed and the amount of lives lost is impossible to tell."
 agassiz.723.f: "'The earthquake shook down in San Francisco hundreds of thousands of dollars worth of walls and chimneys. But the conflagration that followed burned up hundreds of millions of dollars' worth of property There is no estimating within hundreds of millions the actual damage wrought. Not in history has a modern imperial city been so completely destroyed. San Francisco is gone. Nothing remains of it but memories and a fringe of dwelling-houses on its outskirts. Its industrial section is wiped out. Its business section is wiped out. Its social and residential section is wiped out. The factories and warehouses, the great stores and newspaper buildings, the hotels and the palaces of the nabobs, are all gone. Remains only the fringe of dwelling houses on the outskirts of what was once San Francisco.' -Jack London"
