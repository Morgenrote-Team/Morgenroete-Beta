 agassiz.105.d: "After Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] has found some new ore veins for the mining companies, [ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe] returns. The further expansion of the facilities is not [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] concern.\n\nTotal improved buildings: [GetPlayer.MakeScope.Var('mr_num_improved_mines_buildings_var').GetValue|V0]\n$concept_agassiz_minerals$ from Project: [GetPlayer.MakeScope.ScriptValue('agassiz_generic_minderals_from_mine_project_for_event_value')|+0] @agassiz_mineral!"
