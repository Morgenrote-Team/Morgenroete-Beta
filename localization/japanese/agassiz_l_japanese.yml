 agassiz.812.t: "A New Highest Peak?"
 agassiz.812.d: "For years, Dhaulagiri had been accepted as the tallest mountain ever measured, but [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] was not convinced. After months of triangulation and relentless calculation, a new candidate emerged from the haze: Kangchenjunga."
 agassiz.812.f: "Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]'s instruments, though battered by storms, left little doubt. At over 28,000 feet, this remote peak on the Sikkim-Nepal border surpassed all previous records. The implications for geography, cartography, and national pride were profound."
 agassiz.812.g: "Couldn't the mountain have chosen a simpler name?"
 agassiz.812.tt: "#V Kangchenjunga#! is now considered the highest mountain in the world."
 agassiz.813.t: "King of the Hill"
 agassiz.813.d: "It began with silent figures on a hilltop in Bengal, leveling brass instruments against the sky. Among them was [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName], whose calculations confirmed the impossible: Peak XV—obscure, remote, unnamed—stood higher than any summit ever measured."
 agassiz.813.f: "The announcement sent a tremor through scientific circles. At 29,000 feet, this Himalayan giant dwarfed Kangchenjunga and Dhaulagiri. Though nameless still, scholars already began calling it the 'Roof of the World'."
 agassiz.813.g: "Name it after some random British surveyor no one remembers!"
 agassiz.813.tt: "#V Mount Everest#! is now considered the highest mountain in the world."
 je_agassiz_highest_mountain: "The Highest Mountain"
