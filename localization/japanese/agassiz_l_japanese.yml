 agassiz.812.t: "新しい最高峰？"
 agassiz.812.d: "これまで世界で最も高い山はダウラギリであるとされてきましたが、[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName]は違うようです。数カ月もの三角測量と徹底的な計算の結果、カンチェンジュンガが新たな候補にのぼりました。"
 agassiz.812.f: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]博士の装置は嵐で故障してしまったが、疑う余地のない結果を示しています。シッキム・ネパール国境に位置する辺境の山カンチェンジュンガは、これまでの記録を上回る標高28000フィート以上を記録しました。地質学、製図、それに国家の威信にも大きなインパクトを与えてます。"
 agassiz.812.g: "もっと呼びやすい名前にすればよかったのに"
 agassiz.812.tt: "これから世界最高峰は#V カンチェンジュンガ#!となる"
 agassiz.813.t: "山の王"
 agassiz.813.d: "それはベンガルの奥地で、静かに測量装置をのぞき込んでいる人々から始まりました。その中の1人、[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName]は信じられない計算結果を出しました。はるか遠くにある名前のない山、通称ピーク15は、これまで計測されたどの山よりも高かったのです。"
 agassiz.813.f: "この発表は科学界に衝撃をあたえました。ヒマラヤ山脈にそびえるこの巨峰は標高約29000フィート、カンチェンジュンガやダウラギリを超える高さを誇っています。まだ名前はありませんが、学者たちは「世界の屋根」と呼んでいます。"
 agassiz.813.g: "誰も知らない適当なイギリス人測量士の名前にしよう！"
 agassiz.813.tt: "これから世界最高峰は#V エベレスト#!となる"
