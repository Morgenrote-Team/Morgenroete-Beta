l_japanese:
 agassiz_geology_tech: "地質学"
 agassiz_geology_tech_desc: "In 1815, canal builder William Smith published his map of the geology of England and Wales, which took into account both fossil content and lithology. Smith recognized that certain rock sequences are also characterized by a very specific, unmistakable faunal sequence. In 1827, Leopold von Buch coined the term index fossil for fossils that allow relative dating. From now on, clarifying the question of the actual age of the Earth was a scientific matter."
 notification_agassiz_yearly_minerals_notification_name: "地質学の年次報告"
 notification_agassiz_yearly_minerals_notification_desc: "わが国は今年[GetPlayer.MakeScope.Var('agassiz_generic_minerals_notification_var').GetValue|0+=]個の新たな[Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')]を発見、記録しました。"
 agassiz_sounding_tech: "音響測深"
 agassiz_sounding_tech_desc: "測深器はもともと潜水艦対策として発明されました。しかしその後は魚群の位置測定や深海調査など、民生分野でも幅広く使われました。"
 building_agassiz_volcano_observatory: "火山観測所"
 agassiz_volcano_observatory_can_construct_volcano_tt: "州に#ORANGE 火山#!が存在する"
 agassiz_volcano_observatory_can_construct_geologist_tt: "#default_text [GetPlayer.GetName]が[concept_agassiz_geologist]を雇用している#!"
 pmg_agassiz_volcanology: "火山学"
 pm_agassiz_basic_volcanology: "基礎火山学"
 agassiz_add_x_generic_minerals_minus_x_tt: "[SCOPE.GetValue('generic_minerals_amount')|0+]@agassiz_mineral![Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')]を失う"
