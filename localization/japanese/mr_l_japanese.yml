 dlc_morgenrote: "Morgenröte - Dawn of Flavor"
 dlc_morgenrote_desc: "Morgenröte – Dawn of Flavorは、Victoria 3に文化・芸術・ライフスタイル要素を追加するModです。わたしたちが改善するのはマップや経済ではなく、これまでの無味乾燥なゲーム世界にほんの一部しか描かれなかった、ヴィクトリア朝時代のさまざまな文化的側面です。リアルな科学研究、文化を通じた国威高揚、芸術家や科学者の育成などを実装しています。\n\nご安心を、Morgenröteは#p 有効#!です。"
