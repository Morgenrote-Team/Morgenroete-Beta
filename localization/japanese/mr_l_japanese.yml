 je_mr_scientific_conferences: "Scientific Conferences"
 je_mr_scientific_conferences_reason: "How old is the earth? Where does man come from? How credible is the Bible as a historical source? Is the universe infinite - and what are galaxies actually? Over the course of a hundred years, not only science as such, but also people's view of the world has changed significantly. The theory of evolution has shaken man's certainty just as much as the theory of relativity. Scientific conferences are intended to clarify some of the fundamental questions by having international scientists discuss them."
