 MR_FIFA_BUTTON_TT: "#T FIFA#! ⅳサッカーが普及するにつれて国同士の試合が増え、世界的な統括組織の必要性が出てきた。FIFA（フランス語：Fédération Internationale de Football Association）は、アソシエーションサッカー、フットサル、ビーチサッカーの国際的な自主規制団体である。1904年5月21日に設立された世界最古かつ最大のNGOのひとつである。FIFAが設立されたことで、個々の国同士の国際試合が可能になり、その監督たちは試合に勝つことでレベルアップを図ることができるようになった。これがやがてワールドカップの創設につながる。[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:3292557058
