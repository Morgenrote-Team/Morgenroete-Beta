 building_mr_steamboat_rock: "恐竜国定公園 - スチームボート・ロック" #deepl:2047049064
 building_vikelas_fifa: "国際サッカー協会" #deepl:2799079916
 concept_verrier_venus_transit: "金星遷移" #deepl:3328636769
 concept_verrier_venus_transit_desc: "金星通過とは、月が地球と金星の間を通過する珍しい現象を指す。1874年と1882年の2回である。金星の通過を観測することで、太陽系の大きさや天文単位（AU）の大きさについてより正確な結論を導き出すことができるため、これらは科学的に重要な出来事であった。[concept_verrier_venus_transit_zone] に位置する国々はそこから観測することができるが、それ以外の国々は探検隊を派遣しなければならない。観測の成功は、[concept_verrier_astronomer] の経験、[concept_gaudi_engineer] の利用可能性、そして運に左右される。観測がうまくいけばいくほど、ボーナスも大きくなる。" #deepl:1890935103
 concept_verrier_venus_transit_zone: "金星通過ゾーン" #deepl:535627695
 concept_verrier_venus_transit_zone_desc: "金星通過帯とは、金星の完全な（部分的ではなく）通過が観測できる地球の部分を指す。1874年には特に東アジア太平洋地域が、1882年にはアメリカ大陸のほぼ全域がそうであった。#V 1874年の金星の完全な（部分的な）通過ではなく、1882年にはアメリカ大陸のほぼ全域がそうであった。 ⑭ 1874年金星通過：#! ⑯インドネシア、インドシナ、オセアニア、華南、華北、満州、日本、中央インド、マドラス、ベンガル、ヒマラヤ。\#V Venus Transit 1882:#! ブラジル、ラプラタ、アンデス、グランコロンビア、メキシコ、中央アメリカ、カリブ海、中西部、ディキシー、ニューイングランド、オンタリオ州とケベック州。" #deepl:1055797749
 concept_vikelas_coach: "コーチ" #deepl:3572285288
 concept_vikelas_coach_desc: "コーチは、特定の国別スポーツにおけるその国のナショナルトレーナーである。国別スポーツには、[concept_vikelas_football] 、野球、バスケットボール、クリケットなどがある。コーチは、国際世界選手権や国際試合などの大会で、それぞれのチームにボーナスを与えます。後者は定期的に密かに行われ、勝利するとコーチの経験値が増えます。経験値が高く、[Concept('concept_character_trait','$concept_character_traits$')] 、世界選手権で優勝する可能性が高まります。ポジティブな特性とは、野心的、カリスマ的など、プレーヤーのモチベーションを特に高めるもので、逆にモチベーションを下げる特性は、試合に勝つ確率を下げる。#R これには、冷酷や残酷といった特徴が含まれます。#!" #deepl:183600896
 concept_vikelas_coaches: "コーチ陣" #deepl:3998480532
 concept_vikelas_football: "サッカー" #deepl:3334413449
 concept_vikelas_football_desc: "サッカーは国技となりうる。最初のサッカークラブは、ヨーロッパと南米に設立することができる。そのためには、比較的自由な法制度、強力な小ブルジョワジー、または相当な平均的生活水準が必要となる。その後、時折サッカーの試合が行われるようになる。FIFAが設立されれば、国際試合やワールドカップも可能になる。ベスト8のチームは自動的にワールドカップへの出場権を得る。チームは、生活水準（国民の体力）、小ブルジョアジーの強さ（クラブシステム）、リテラシー（戦術）、伝統（国技の有無）のパラメーターから導き出されるナショナル・フットボール・チーム・バリュー（NFTV）に従って計算される。試合では、NFTVだけでなく、[concept_vikelas_coach] の性格的特徴や経験も考慮される。" #deepl:3000477120
 country_artists_decorative_can_promote_architect_boolean_desc: "[concept_pm_artists_academy_school] を持つ[GetBuildingType('building_arts_academy').GetName] が少なくとも1つあれば、アーティストの概要で[concept_gaudi_architect] を宣伝することができます。" #deepl:738833409
