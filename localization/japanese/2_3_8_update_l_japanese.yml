 dubois.2171.i: "バシロサウルス" #deepl:2592886142
 dubois.2171.j: "メガロドン" #deepl:1809322411
 dubois.2173.f: "プレシオサウルスは海洋爬虫類の目である。その化石は世界中で発見されている。種にもよるが、体長は1.5メートルから15メートル。種によって、おそらくさまざまな動物を食べていただろう。カタツムリやムール貝から魚やその他の獲物まで。魚捕り網のようなU字型の顎と鋭い歯は、彼らに便利な道具を提供した。" #deepl:1725138010
 dubois.2173.t: "プレシオサウルス" #deepl:3684543079
 dubois.2174.f: "バシロサウルスは恐竜ではなく、先史時代のクジラの一種だ。その長い体は長い蛇を思わせるが、全長は最大20メートルもあり、マッコウクジラに似ている。" #deepl:4279559397
 dubois.2174.t: "バシロサウルス" #deepl:3895138572
 dubois.2175.f: "巨大なサメ、メガロドンはおそらく現存する最大のサメである。しかし、現在のところ歯と脊椎骨しか見つかっていないため、体長を推定するのは難しい。我々の古生物学者は、全長は9メートルから30メートルの間ではないかと推定している。いずれにせよ、このサメの骨格標本は息をのむような美しさで、私たちのコレクションの宝石のひとつです。" #deepl:1066794911
 dubois.2175.t: "メガロドン" #deepl:439976392
