 verrier_venus_transit_diplomacy_modifier: "金星遷移のための外交交渉" #deepl:1903396933
 verrier_venus_transit_preparation_modifier: "金星通過の準備" #deepl:3653758437
 vikelas.21.d: "ある体育館（[SCOPE.sState('vikelas_basketball_state').GetName] ）で、新しいゲームが発明された。それは、いつか世界中のホールやスタジアムに響き渡るかもしれないゲームだ。" #deepl:3471187932
 vikelas.21.f: "キック禁止。ボールを持って走ることもない。そして、ギャラリーに釘付けにされた2つの桃のバスケット。」 ⅳ[TimeKeeper.GetCurrentDate.Format('y')] 、[SCOPE.sState('vikelas_basketball_state').GetFarmHubName] の学校で、[ROOT.Var('panum_physician_var').GetCharacter.GetFullName] 博士は問題に直面した。[ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] 落ち着きのない生徒たちを、冬の間、どうやって室内で活発に活動させるか。[ROOT.Var('panum_physician_var').GetCharacter.GetHerHis|U] 解決策は単純で、奇妙なものだった。サッカーボール、2つの高さのある桃のバスケット、そして13のルールだ。少年たちは最初、奇妙に感じた。接触禁止。ドリブルもない。ただ慎重にパスをし、アーチを描いて投げるだけだ。しかし、何かが引っかかった。このゲームは他の学校にも広がり、やがて他の都市にも広がっていった。10年も経たないうちに、ニューヨークから東京までの体育館に、弾むボールのリズムと「バスケット！」という掛け声が響き渡るようになった。スピードがあり、チームワークがあり、現代生活に適している。そして何よりも、[ROOT.GetCountry.GetAdjectiveNoFormatting] 。" #deepl:3707830614
 vikelas.21.g: "学校や体育館に導入する。" #deepl:2248999233
 vikelas.21.t: "ピーチバスケットとの試合" #deepl:2623215155
 vikelas.401.d: "今日、国際サッカー協会（International Football Association）は、[GetGlobalVariable('vikelas_fifa_seat_global_var').GetStateRegion.GetCityHubName] に設立された。その正式名称は国際サッカー連盟（Fédération Internationale de Football Association：FIFA）である。" #deepl:3487975302
 vikelas.401.f: "1904年5月21日、ベルギー、デンマーク、フランス、オランダ、スペイン、スウェーデン、スイスの7カ国の代表が憲章に署名した。その目的は、サッカーのルールを標準化し、国際試合を組織し、サッカーを世界的なレベルに引き上げることだった。こうして国際サッカー連盟（FIFA）が誕生した。初期の数十年間、FIFAはパートタイムの会長職、アマチュア選手、地域紛争といった控えめなものだった。しかし、水面下では世界的なムーブメントが広がっていた。イングランドは外国の干渉を警戒し、加盟をためらった。南米諸国は独自の連盟を結成し始めた。1924年と1928年、オリンピックのトーナメントがサッカーの真の到達点を明らかにした。" #deepl:2154770056
 vikelas.401.g: "FIFAに加盟し、国際大会を支援する。" #deepl:1192623767
 vikelas.401.t: "国際サッカー連盟" #deepl:2948752940
 vikelas.411.d: "FIFAは、今年のワールドカップの開催地を[SCOPE.sCountry('vikelas_fifa_host_scope').GetName] に決定した。予選の結果、優勝候補は8チームに絞られる。" #deepl:1721956240
 vikelas.411.f: "#V 以下の代表チームが準々決勝進出を決めた。#! ￤[SCOPE.sCountry('vikelas_first_qualified_team_scope').GetName] ￤[SCOPE.sCountry('vikelas_second_qualified_team_scope').GetName] ￤[SCOPE.sCountry('vikelas_third_qualified_team_scope').GetName] ￤[SCOPE.sCountry('vikelas_fourth_qualified_team_scope').GetName] ￤[SCOPE.sCountry('vikelas_fifth_qualified_team_scope').GetName] ￤[SCOPE.sCountry('vikelas_sixth_qualified_team_scope').GetName] ￤[SCOPE.sCountry('vikelas_seventh_qualified_team_scope').GetName][SCOPE.sCountry('vikelas_eighth_qualified_team_scope').GetName]" #deepl:1470693747
 vikelas.411.g: "最高のチームが勝つように" #deepl:900366891
 vikelas.411.t: "サッカーワールドカップ[TimeKeeper.GetCurrentDate.Format('y')]" #deepl:3683642621
 vikelas.412.d: "私たちのチームは、各大陸の強豪を破り、世界の舞台で勝利を収めました。国中で祝賀ムードが沸き起こる！" #deepl:1604872733
 vikelas.412.f: "[SCOPE.sCountry('vikelas_second_winner_team_scope').GetName] との白熱した試合で、私たちのチームはワールドカップの決勝[SCOPE.sCountry('vikelas_fifa_host_scope').GetName] でその実力を証明した。私たちの代表チームは黄金のトロフィーを掲げた。試合終了のホイッスルがラジオ、カフェ、バラックに響き渡った。北部の鉱山労働者から港の商人まで、国民は一体となって咆哮した。表彰台で涙を流すキャプテン。新しい世代が見守り、夢を見る。" #deepl:1159882054
 vikelas.412.g: "我々はチャンピオンだ。" #deepl:2663168066
 vikelas.412.t: "世界のチャンピオン" #deepl:3853223886
 vikelas.413.d: "私たちのサッカーチームは決勝に進み、そして栄光を手にすることはできなかった。全国各地で、誇りと悲嘆が同量に混ざり合っている。" #deepl:80141764
 vikelas.413.f: "残念ながら、チームのベストは尽くせなかった。[SCOPE.sCountry('vikelas_first_winner_team_scope').GetName] との神経をすり減らすような試合で、私たちの男たちは惜しくも敗れた。数週間、彼らは一国の希望を背負ってきた。泥だらけの野原、まばゆいばかりの暑さの中、彼らは走り、戦い、信じた。試合ごとに、彼らは伝説となった。国歌が流れる中、彼らは頭を高々と上げた。涙はなく、ただ静寂が訪れ、そしてゆっくりと拍手が沸き起こった。" #deepl:3695564906
 vikelas.413.g: "これは私たちから盗まれたものだ！" #deepl:3624655051
 vikelas.413.t: "銀の栄光[SCOPE.sCountry('vikelas_fifa_host_scope').GetName]" #deepl:3043927783
 vikelas.414.d: "[SCOPE.sCountry('vikelas_fifa_host_scope').GetName] [SCOPE.sCountry('vikelas_first_winner_team_scope').GetName] [SCOPE.sCountry('vikelas_second_winner_team_scope').GetName] を破り、決勝に進出した。" #deepl:317995881
 vikelas.414.f: "希望はあった。工場のヤードで歓声が上がり、教会でラジオの解説がささやかれ、路地で子供たちがゴールを再現した。チームはサッカー以上のものを象徴していた。野心、誇り、自分たちの上に立つことができるという信念。しかし、最後の試合がすべてを変えた。たった1点の失点。見えないハンドボール。逃したチャンス。今、夢は終わり、世界は前進している。" #deepl:640236906
 vikelas.414.g: "私たちは信じていた。それで十分だった。" #deepl:4069550601
 vikelas.414.t: "夢は早く終わる" #deepl:1366412702
 vikelas.490.d: "[ROOT.Var('vikelas_coach_var').GetCharacter.GetFullName] [ROOT.Var('vikelas_coach_var').GetCharacter.GetSheHe] 今やシニアコーチと呼ばれるほど有名になった！" #deepl:3173542618
 vikelas.490.f: ""
 vikelas.490.g: "ピッチで恥ずかしげもなく叫ぶことができたことに対する賞。" #deepl:1195265680
 vikelas.490.t: "[ROOT.Var('vikelas_coach_var').GetCharacter.GetFullName] は現在シニアコーチである！" #deepl:454610152
 vikelas.495.d: "新しい[concept_vikelas_coach] は[SCOPE.sCharacter('vikelas_new_coach_scope').GetHerselfHimself] を導入した。[SCOPE.sCharacter('vikelas_new_coach_scope').GetHerHis|U] の名前は[SCOPE.sCharacter('vikelas_new_coach_scope').GetFullName] 。" #deepl:1753591119
 vikelas.495.f: ""
 vikelas.495.g: "[SCOPE.sCharacter('vikelas_new_coach_scope').GetSheHe|U] が勝利に導いてくれるだろう。" #deepl:1930939286
 vikelas.495.t: "新しいコーチ" #deepl:2806014865
 vikelas.601.d: "新しい発明が大通りに登場した。前輪に直接取り付けたペダルで動く二輪車だ。その名も「ベロシペード」。" #deepl:497189807
 vikelas.601.f: "首都の公園や広い通りでは、人だかりができる。帽子をかぶり、ベストを着た紳士たちが奇妙な鉄のフレームの上に腰を下ろし、猛烈な勢いでペダルを漕ぎ、驚いた群衆の間をふらふらと通り抜けていく。転ぶ者。飛ぶ者もいる。子供たちが笑う。年配の政治家たちは眉をひそめる。新聞はこれを "le vélocipède "と呼ぶ。馬車職人が発明したこの「骨揺らし」は、革命的であると同時に重い。石畳の上では背骨を揺さぶる。しかし、滑らかなプロムナードでは驚くほど優雅に動く。これは単なる目新しさではなく、新しい運動の種になるのでは、と囁かれている。" #deepl:2987098471
 vikelas.601.g: "面白いファッションだ！" #deepl:3063453559
 vikelas.601.t: "舗道のペダル" #deepl:583302045
 vikelas.602.d: "同じ大きさの車輪、チェーン駆動のリアアクスル、改良されたバランスを特徴とする新しいデザインの自転車が登場した。不安定な高輪車とは異なり、この「安全自転車」は安定しており、価格も手ごろで、早くもセンセーションを巻き起こしている。発明者は？[SCOPE.sCharacter('vikelas_bicycle_inventor_scope').GetFullName]!" #deepl:1082254426
 vikelas.602.f: "古い二輪車は骨と神経を震わせた。そびえ立つペニーファージングはスピードを提供したが、その代償として、一歩間違えればライダーは宙を舞った。コンパクトで、エレガントで、安全だ。後輪のチェーンドライブと空気入りタイヤにより、女性や労働者までもが乗り始めた。かつては馬車に支配されていた通りも、今では石を踏むゴムの柔らかい音が響き渡る。これはおもちゃではない。それは自由であり、速く、静かで、突然手の届くところに来たのだ。" #deepl:2048166631
 vikelas.602.g: "すべての国民を現代に乗り込ませる。" #deepl:158167297
 vikelas.602.t: "未来の自転車" #deepl:3168239488
 vikelas.611.d: "その日がやってきた。全国からライダーがスタートラインに集まり、公道で人間とマシンをテストしようと躍起になる。空気が期待に包まれる。" #deepl:3817467534
 vikelas.611.f: "すでに観客でごった返している大通りから日が昇る。旗がはためく。朝の空気には油と埃の匂いが漂っている。何十人ものライダーが自転車に乗り込む。工場から出荷されたばかりのピカピカのマシンもあれば、路地裏の工房でつぎはぎされたマシンもある。歓声が沸き起こる。街の門をくぐり、田園地帯へと走り出す。農夫たちが畑で立ち止まる。子供たちが道の脇を走り神父たちは彼らを祝福する。皮肉屋は嘲笑する。しかし、彼らの後ろに砂埃が舞うとき、群衆の中に奇妙な感覚が生まれる。" #deepl:872369825
 vikelas.611.g: "すべての町に進歩の汽笛を聞かせよう。" #deepl:4082081516
 vikelas.611.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]" #deepl:804172156
 vikelas.621.d: "全国自転車レースの勝者は、単にゴールラインを捉えただけではない。そして今、彼が何を目指しているのかに注目が集まっている。" #deepl:2904065614
 vikelas.621.f: "新聞は彼を「アイアンライダー」と呼ぶ。織工の家に生まれ、12歳で孤児となり、16歳で工場労働者となった。ボロボロの安全自転車に乗っての勝利は、単なるスポーツの勝利ではなかった。それはたとえ話だった。群衆は彼の名を唱え画家たちは彼をスケッチする。子供たちは彼の姿勢を真似る。しかし、それ以上にイデオローグたちが注目するのは、その姿である。彼を労働者の強さの象徴と呼ぶ者もいる。また、彼が国家の活力を証明していると言う者もいる。マスコミは、彼が労働者なのか、愛国者なのか、それともまったく新しい何かなのかをめぐって議論する。彼は微笑み、うなずき、そして走る。" #deepl:2953543537
 vikelas.621.g: "彼を労働者階級のヒーローにするのだ。" #deepl:2363628364
 vikelas.621.h: "国民的アイコンとして彼を称えよう。" #deepl:255033591
 vikelas.621.i: "彼を進歩の象徴、現代人の象徴に仕立て上げる。" #deepl:3398545154
 vikelas.621.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]" #deepl:804172156
 vikelas.622.d: "国体競輪中に痛ましい事故が起きた。選手1人が死亡、数人が負傷。歓声は止んでいる。" #deepl:644341100
 vikelas.622.f: "車輪が轍に引っかかった。叫び声、衝突音、そして悲鳴。自転車がドミノ倒しのように転がり、観客が殺到。血と埃が混じり合う。ヘルメットが割れ、骨が折れた。骨が折れた。一人の若者（17歳、工場見習い）が衝撃で死亡した。新聞は賛否両論だ。ある者は進歩の必要な代償と呼び、またある者は公のスポーツの無謀さを非難した。" #deepl:1135060049
 vikelas.622.g: "戦死者を悼む。" #deepl:3728569964
 vikelas.622.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]" #deepl:804172156
 vikelas.623.d: "このレースのあるステージは、人々の心を捉えて離さない。観客はそれを単なるコンテストとしてではなく、伝説として語る。" #deepl:438486236
 vikelas.623.f: "夜明けとともに選手たちは丘へと消えていった。その後に続いたのは、もはやレースではなく、精神のテストだった。12人が遅れ、3人が倒れた。3人が倒れた。1人はヘアピンカーブで転倒し、血を流して立ち上がり、助けを振り払った。しかし、1人は霧の中を突き進み、何千人もの人々の心をつかんだ。全国民が口にするのは、それ以外の何ものでもない。" #deepl:130901318
 vikelas.623.g: "道路が何世代にもわたって彼の努力を記憶するように。" #deepl:3983380699
 vikelas.623.h: "その瞬間の絵画を依頼する。" #deepl:1275386135
 vikelas.623.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]" #deepl:804172156
 vikelas.624.d: "最新のレースステージで非難が噴出した。あるライダーが不正行為を行っていたことが発覚したのだ。" #deepl:3963790231
 vikelas.624.f: "「彼らは、彼が納屋の裏で自転車を乗り換えたと言いました。また、隠されたワイヤーで丘の上まで牽引されたと言う人もいます」。はっきりしているのは、ライダーが速すぎたということだ。目を見張る速さ。残酷な上り坂の後、フレッシュすぎた。ライバルはあせり観客は息をのみマスコミは血の匂いを嗅ぎつける。ある写真には、同じ服を着た2人目の男が写っている。別の目撃者は、ナイトステージでライダーが車に押されるのを見たと主張。被告人はすべてを否定し、妬みと政治的なものだと訴えた。" #deepl:2810733320
 vikelas.624.g: "騎手を失格にし、不正を暴く。" #deepl:2198835421
 vikelas.624.h: "スポーツのためにそれを隠す。" #deepl:3797817672
 vikelas.624.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]" #deepl:804172156
 vikelas.625.d: "熾烈なライバル関係が今年のレースシーズンを支配している。実力は互角、スタイルは正反対の2人のライダーが、国民を2つの陣営に分けた。" #deepl:2483368762
 vikelas.625.f: "もうひとつは氷：冷静で、計算高く、ほとんど数学的。もう1人は氷：冷静で、計算高く、ほとんど数学的。2人の名前は屋根の上から叫ばれる。町は味方をする。ポスターは赤か青で印刷される。仕立て屋は彼らの色の帽子を売る。子どもたちは木製の自転車で彼らの姿勢を真似る。新聞は単なるレース以上のことを語っている。そして、どちらの選手も一歩も譲らない。" #deepl:1380551122
 vikelas.625.g: "これは新聞文化に利益をもたらすだろう。" #deepl:3508242265
 vikelas.625.h: "ライバル関係を政治的利益のために利用する。" #deepl:442554493
 vikelas.625.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]" #deepl:804172156
 vikelas.626.d: "熾烈なライバル関係が今年のレースシーズンを支配している。実力は互角、スタイルは正反対の2人のライダーが、国民を2つの陣営に分けた。" #deepl:2483368762
 vikelas.626.f: "村の鍛冶屋でハンマーを手に、すすで真っ黒になった顔で、一人でいるところを発見された」下りは危険だった。コーナーの見極めを誤り、砂利が砕け、フロントフォークが折れた。彼の自転車は傷ついた鳥のように折れ曲がった。たいていの人は止まっただろう。しかし、彼は違った。彼はフレームを引きずりながら、何キロも下り坂を引きずった。人里離れた村で、彼は鍛冶屋を見つけた。メカニックはいない。チームカーもない。袖をまくり、顎を食いしばり、記憶と感触でフロントフォークを鋳造する作業を何時間も続けた。オフィシャルが到着すると、彼は睨みつけながら「触るな」とだけ言った。勝利のチャンスはない。しかし、沿道の観衆は歓声を上げていた--勝者ではなく、立ち止まることを拒んだ者に。" #deepl:896070649
 vikelas.626.g: "感動的な話だ。" #deepl:3324986220
 vikelas.626.h: "緊急修理を許可する。" #deepl:385201552
 vikelas.626.i: "彼を敬え！" #deepl:581594471
 vikelas.626.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]" #deepl:804172156
