 nationalization.11.d: "[TimeKeeper.GetCurrentDate.Format('y')] 、イタリアは、その食文化を永遠に変えることになる画期的な料理本の出版に立ち会った。著者のペッレグリーノ・アルトゥージは、こうして国の統一と偉大さを強調する国際的に認められたイタリア料理の確立に貢献することになる。" #deepl:4223602969
 nationalization.11.f: "1891年に出版されたペッレグリーノ・アルトゥージの『La scienza in cucina e l'arte di mangiare bene』は、イタリア初の近代的料理本として広く知られている。イタリアが国家としてのアイデンティティを築き始めたばかりの頃、アルトゥーシの著作は、多様な地方料理を首尾一貫した国家料理の伝統に統一する上で極めて重要な役割を果たした。ウィットに富み、わかりやすく紹介された彼の緻密なレシピ集は、料理文学の新たな基準を打ち立てただけでなく、郷土料理の品質、革新性、誇りを促進することで、国民の生活水準の向上にも大きく貢献した。" #deepl:2207143835
 nationalization.11.g: "料理芸術の勝利！" #deepl:1345745332
 nationalization.11.t: "食の科学とおいしい食べ方" #deepl:3987888764
 pius.101.d: "フランス南東部の山中で2人の子供が聖母マリアの出現を目撃したと主張し、カトリック世界全体に霊的な熱狂と懸念の波が押し寄せている。" #deepl:1912784731
 pius.101.f: "私の子供たちよ、近づいて、怖がらないで。私はあなたたちに素晴らしい知らせを届けに来たのだから......」♪フランス南東部のコルプスに近いラ・サレット村の高台にあるアルプスの牧草地で、二人の羊飼いの子供が、今キリスト教国中の心を揺さぶる幻を報告した。光に輝き、悲しみをまとった女性が彼らの前に現れた。彼女は涙を流し、神から背を向けた世界のために涙を流した。彼女は、恥じることなく口にした冒涜、冒涜された日曜日、そして人類が悔い改めなかった場合に訪れる飢饉と破滅について語った。人里離れた山の斜面に巡礼者が集まり、修道士やジャーナリストが同じ道を登る。修道士やジャーナリストも同じ道を登る。グルノーブル司教は慎重な承認を与える。グルノーブル司教は慎重な承認を示す。ローマは静観している。しかし、すでに鐘は鳴り響いている。" #deepl:2145205681
 pius.101.g: "天からの警告。" #deepl:3313498992
 pius.101.h: "理性的であり続けること。" #deepl:499500707
 pius.101.t: "ラ・サレットの出現" #deepl:3065761669
 pius.102.d: "小さな町ルルドで、14歳の少女が洞窟で輝く女性を見たと主張する。彼女の幻視はやがて巡礼者たちを魅了し、論争を巻き起こす。" #deepl:1624678567
 pius.102.f: "彼女は若く、裸足で、貧しかった。ピレネー山脈のふもと、ルルドにほど近い人里離れた洞窟で、ベルナデット・スビルーという農民の少女が、白い衣をまとい、青い帯を締め、足には金のバラをつけた女性の姿を見た。その幻影は最初は何も言わず、ただ微笑むだけだった。懺悔、祈り、苦しみ、そして神の慈悲について。彼女は自らをシンプルにこう名づける：無原罪の御宿り」最初は村人たちは嘲笑する。しかし、ベルナデットが隠れた泉を発見し、それが癒しの源であると主張すると、何千人もの人々が訪れ始める。松葉杖は置き去りにされる。証言は広まる。懐疑論者はヒステリーを批判する。医師、司祭、政治家たちがルルドに押し寄せる。教会は調査し、国家は警戒して見守る。それでも人々はやってくる。" #deepl:580789021
 pius.102.g: "癒しと希望の神社" #deepl:2629250679
 pius.102.h: "幻覚！" #deepl:3891021600
 pius.102.t: "ルルドの出現" #deepl:1767463178
 pius.103.d: "アイルランドのノック村で、15人の目撃者が聖母マリア、聖ヨセフ、福音書記者ヨハネの静かな出現を報告する。その幻影は、長い間、貧困、流浪、外国の支配に苦しめられていた人々をかき乱す。" #deepl:143567078
 pius.103.f: "彼らは一言も発しなかった。しかし、その沈黙の中で、国民は希望を聞いた」メイヨー州ノックの教区教会に雨がしとしとと降り注いだ。それでも、15人の村人が釘付けになっていた。祈りのポーズをとる聖母マリア、その傍らの聖ヨセフ、ローブを着て福音書を持つ福音書記者ヨハネ。聖母マリアは祈りのポーズをとり、聖ヨセフはそのそばに、聖ヨハネは衣をまとい福音書を手にしていた。何のメッセージも語られなかった。それでも目撃者たちは、老いも若きも、男も女も同じように、自分たちが見たものによって誓った。飢饉、移住、精神的な憧れによって疲弊した土地で、静かな幻影は説教よりも大きく響いた。やがて、癒し、しるし、慰めを求める巡礼者たちがやってきた。英国当局は嘲笑した。教会の中にはためらう者もいた。しかし、アイルランドの貧しく敬虔な人々の間で、ノックは尊厳を求める聖なる叫びとなった。" #deepl:216954390
 pius.103.g: "雨の中の光。" #deepl:4199802423
 pius.103.h: "民俗学と割り切る" #deepl:2853965001
 pius.103.t: "ノックのサイレント・ビジョン" #deepl:3086062832
 pius.104.d: "ポルトガル中部で、3人の羊飼いの子供たちが聖母マリアの出現を繰り返し報告する。彼らのビジョンには、戦争、苦しみ、そして教会の未来についての予言が記されていた。" #deepl:3494130064
 pius.104.f: "最後には、私の無原罪の御心が勝利するでしょう」。ファーティマの町の近く、コヴァ・ダ・イリアの田園地帯の丘で、ルチア、フランシスコ、ジャシンタの3人の子供たちが、太陽よりも明るく、輝きと悲しみをまとった女性のことを話す。6ヶ月の間、彼女は何度も現れ、世界規模の戦争、神を恐れぬイデオロギーの台頭、信者の迫害を警告する。1917年10月13日、何万人もの人々が降りしきる雨の中に立っていると、太陽が天から放たれ、回転しながら空に衝突しているように見える。ある者は膝をつき、ある者は逃げ惑う。逃げ惑う者もいる。光が弱まったとき、彼らの服は乾いていた。教会は慎重。教会は慎重。希望の炎、警告の炎、聖母を母としてだけでなく、来るべき時代の歩哨として見る炎。" #deepl:2513437425
 pius.104.g: "ファティマの警告に耳を傾けよ" #deepl:1664428204
 pius.104.h: "太陽の奇跡を否定せよ" #deepl:958137642
 pius.104.t: "ファティマの秘密" #deepl:1100906175
 pius.105.d: "[SCOPE.sState('pius_marian_apparition_state').GetFarmHubName] 近くの人里離れた村で、聖母マリアの出現が報告される。この話は急速に広まり、巡礼者、懐疑論者、教会当局の注目を集める。" #deepl:45703861
 pius.105.f: "彼女は光の冠をかぶって野原の上に立ち、すべての魂の悲しみを知っているかのように私たちを見つめていた。彼は、夜明けよりも明るく、輝きと悲しみに包まれた女性のことを話し、その女性は静寂の中に現れ、深い悲しみを知りながら世界を見つめていた。他の人たちも彼女を見たと言った。ある者は膝をついた。走った者もいた。その話は村の外にまで広まった。巡礼者たちがロウソクを手にやってきた。信者たちは祈った悩める者は願った司祭たちは議論した。役人たちは眉をひそめた。奇跡であれ、幻視であれ、神話であれ、この出来事は目撃した人々の心を、そしてその意味を今決めなければならない人々の人生を、すでに形作ってきた。" #deepl:3063415784
 pius.105.g: "信者へのサイン" #deepl:1177288670
 pius.105.h: "ヒステリーを抑える" #deepl:1037767630
 pius.105.t: "聖母マリア[SCOPE.sState('pius_marian_apparition_state').GetFarmHubName]" #deepl:4095895438
 pius.111.d: "公共の場での展示を禁止する公式の命令にもかかわらず、信者の群衆がマリア出現の場所（[SCOPE.sState('pius_marian_apparition_state').GetFarmHubName] ）に向かって自発的な行進を始めた。" #deepl:3379456873
 pius.111.f: "私たちは松明を灯さず、旗も持たなかった。ロザリオと静寂と埃に埋もれた足だけだった」。ある者は裸足で、ある者は泣きながら。ある者は裸足で、ある者は泣きながら。老人はリタニーを呟いた。子供たちは木彫りのイコンを握りしめていた。当局は閉鎖を宣言していた。しかし、群衆を止める者は誰もいなかった。おそらく歌声のせいだろう。静寂のせいかもしれない。信者たちは幻の場所にたどり着くと、ひざまずき、祈りをつぶやき、土にロウソクを灯した。天から轟く声はなかった。奇跡は目撃されなかった。しかし、すでに何かが変わっていた。民衆は、律法に背くのではなく、律法よりも古いものに従順に行動したのだ。" #deepl:2369382513
 pius.111.g: "彼らに祈らせよう。" #deepl:2163336687
 pius.111.h: "静かに観察する。" #deepl:3862482018
 pius.111.h_tt: "マリア出現をきっかけに、さらなる出来事が起こる可能性が高い。" #deepl:2612943668
 pius.111.i: "力ずくで追い払え。" #deepl:1733449904
 pius.111.i_tt: "流血事故の可能性が非常に高い。" #deepl:202372566
 pius.111.t: "禁じられた行列" #deepl:3613794317
 pius.112.d: "禁じられたマリア行列の場所で、当局と信者の対立が暴力に発展した。かつて幻影が希望を抱かせた地は今、血の染みを帯びている。" #deepl:2719807490
 pius.112.f: "兵士たちが到着したとき、ロウソクはまだ明滅していた。戸惑いの声、そして懇願の声が上がった。女性が倒れた。少年が泣き叫んだ。しかし、マスケット銃が吠え、警棒が振られ、ブーツが線香と土の中を動いた。静寂が戻ったとき、それは以前よりも重くなっていた。教会は震撼し、信者たちは憤慨した。ある者は事故と呼び、ある者は虐殺と呼ぶ。かつて聖地と囁かれたこの場所は、今や記憶によって呪われている。それでも人々は集う-花ではなく、怒り、沈黙、どんな法律も消し去ることのできないまなざしで。" #deepl:2186004653
 pius.112.g: "私たちは起こったことを後悔している。" #deepl:3313805008
 pius.112.h: "自分たちが招いたことだ。" #deepl:402397332
 pius.112.t: "聖地の血" #deepl:1312740775
 pius.113.d: "[SCOPE.sState('pius_marian_apparition_state').GetFarmHubName] 。彼の説教は群衆を集め、彼の言葉は希望を鼓舞し、そして国家権力に挑戦する。彼の名は神父[SCOPE.sCharacter('pius_marian_priest_scope').GetFirstName] 。" #deepl:1046441460
 pius.113.f: "聖母は権力者ではなく、卑しい者に現れた。村の上にある石造りの教会では、[SCOPE.sCharacter('pius_marian_priest_scope').GetFirstName] という神父が、聖母の慈悲だけでなく正義についても説教を始めた。彼の言葉は身廊の向こうまで響く：天がここに語りかけたのなら、いかなる政府もその響きを禁じることはできない」。巡礼者たちは彼の説教に群がる。彼の名は、ささやき声と賛美歌の中に広がっていく。彼は平和を求めるが、その存在は不安を煽る。ある者は彼を預言者と呼ぶ。当局は不安を募らせる。軍は扇動を口にする。教会は教義と外交の狭間で逡巡する。あなたの机に静かな提案が届く：彼は解任されるだろう。静かに。しかし、沈黙させられた時、より大きな声で話す者もいる。" #deepl:2395659126
 pius.113.g: "彼に説教させよう。" #deepl:3471579290
 pius.113.h: "交渉のために彼を首都に召喚する。" #deepl:1641636788
 pius.113.i: "彼を消してしまえ。" #deepl:3010062703
 pius.113.t: "説教壇の声" #deepl:3682486724
 pius.114.d: "全国各地でカトリック信者がマリア出現を支持するデモを始めた。田舎の巡礼から始まったものが、全国的な運動となった。" #deepl:3473602537
 pius.114.f: "彼らは手にロザリオ、肩に子供、唇に聖母の名を携えて歩く。旗は掲げられず、像とイコン、そして何度も何度もつぶやかれるひとつの名前だけがある：マリア。[SCOPE.sState('pius_marian_apparition_state').GetFarmHubName] 、聖地での暴力に呼応して、信者たちは街頭に繰り出した。彼らは叫ばない。彼らは祈る。しかし、その数は日に日に増えている。また、取り締まりを要求する者もいる。軍は落ち着きがない。そして国中の家庭で、疑い深い人たちでさえも、「これほど多くの人が信じているのなら、それでも嘘なのだろうか？" #deepl:3107082794
 pius.114.g: "国家行列を許可する。" #deepl:3918828179
 pius.114.h: "国家行列の禁止。" #deepl:1813497751
 pius.114.t: "全米を震撼させた行列" #deepl:738056863
 pius.115.d: "[SCOPE.sState('pius_marian_apparition_state').GetFarmHubName] 。信者の間では、かつて国家によって封じられた聖母が今、涙を流し、罰を与えるという危険なささやきが広がり始めている。" #deepl:3238123436
 pius.115.f: "「彼女は祈りを求めた。We gave her soldiers. 雨が降らなかった。小麦はすぐに黄色くなったジャガイモは土の下で腐り、見ることができず、苦かった。村人たちは、見捨てられた畑について語る。ただ人に捨てられたのではなく、慈悲に捨てられたと。かつて現れた光の女のことを-そして嘲笑された。姿を消した司祭のことを神社は封印され、巡礼者たちは打ちのめされた。蝋燭の火は再び燃え盛るが、今はシャッターの閉まった窓の向こう。母親たちは密かに子供たちに洗礼を授ける。老人たちはパンの耳を供え物として埋める。教会はあえて語らないが、人々はすでに信じている：これは教会の悲しみである。これは教会の悲しみであり、警告なのだと。" #deepl:2485032935
 pius.115.g: "迷信！そう願うよ..." #deepl:2447781343
 pius.115.t: "畑は空っぽ" #deepl:3151937266
 pius.116.d: "長年の抑圧と否定された奇跡の後、多くのかつての敬虔な市民は、[SCOPE.sState('pius_marian_apparition_state').GetFarmHubName] への信仰を捨て始めている。現在では、自らをカトリック教徒ではなく、まったく無宗教であると表現する人が増えている。" #deepl:1323000478
 pius.116.f: "彼女はもう来ない。夢でも幻でもない。The candles go unlit.神父はいない。貧しい人々でさえ、眠る前にアヴェ・マリアをささやき、イコンが囲炉裏のそばに吊るされ、鐘の音で涙が落ちた時代があった。今、教会には誰もいない。子供たちは「告解」とは何かと尋ねる。若者は理性について、進歩について、無について語る。灰になったのだ。彼らは急進派ではない。彼らは疲れ果てている。そして、空虚な沈黙のどこかに、疑問が残る。" #deepl:231766477
 pius.116.g: "信仰の時代は終わった。" #deepl:146424195
 pius.116.t: "鐘の向こうの静寂" #deepl:2179217507
 pius.119.d: "新しく発足した無神論政府は、マリア巡礼地の閉鎖を命じた。かつては光と祈りの場であったこの場所は、今や封鎖され、国家の監視の下で沈黙している。" #deepl:1939840262
 pius.119.f: "鐘は鳴らない。蝋燭も燃えない。門は日の出前に施錠された」。かつて数千人を集めた神社は、今はぽつんと建っている。礼拝堂の扉には、「人民代表大会の命令により、この建造物は必要でないと宣言する」という貼り紙がされている。警備員は、守るためではなく、防ぐために見張っている。抗議は許されなかった。変化は静かに、官僚的に起こった。しかし、国中の家庭では、年老いた手が震えている。祖母たちはロザリオを隠す。聖職者たちは沈黙している。党は科学、理性、進歩について語る。そして、鍵のかかったドアの向こうのどこかで、ある疑問が、半分燃えたロウソクのように揺らめいている：これは本当に必要なことだったのか？" #deepl:3255413028
 pius.119.g: "私たちはもはや幻想のモニュメントを建てることはない。" #deepl:702720701
 pius.119.t: "神社の閉鎖" #deepl:589514149
 pius.121.d: "[SCOPE.sState('pius_marian_apparition_state').GetFarmHubName] でのマリア出現は、肯定的なしるしとして公式に認められている。しかし、今でもその真の意味は解釈の余地がある。" #deepl:181746716
 pius.121.f: "村人たちの前に輝く姿が現れてから数週間、それ以上の兆候はなかった。天からの火もない。雲からの声もない。ただ穏やかな空と、驚きの余韻だけが残っている。巡礼者たちは熱狂的にではなく、畏敬の念を抱いてやってくる。聖職者たちは穏やかに説教する。マスコミは今回ばかりは嘲ることなく報道する：この奇跡は何を意味するのか？" #deepl:3589438214
 pius.121.g: "庶民への祝福。" #deepl:560950828
 pius.121.h: "聖職者への神のお告げだ。" #deepl:2114621818
 pius.121.h_tt: "この措置は、未知の深刻な結果をもたらすかもしれない。" #deepl:1123613034
 pius.121.i: "政府の正当性を示すものだ。" #deepl:1976662076
 pius.121.t: "どういう意味？" #deepl:1525290236
 pius.122.d: "マリア出現の地は、今や巡礼の地として完全に認知され、近隣からも遠方からも多くの信者が訪れるようになった。" #deepl:3557311135
 pius.122.f: "かつては牧草地しかなかった場所に、今はロウソクが立ち、バラが咲き、何千人もの静かな足音が響く」♪The roads have widened.畑は切り開かれた。かつて子供たちが光をまとった聖母について語った場所の近くには、ささやかな礼拝堂が建っている。毎日、巡礼者たちがやってくる。息子たちを連れた農民、黒い服を着た未亡人、休暇中の兵士、胎児のために祈りをささやく母親たち。教会はこの地の神聖さを認めている。その端には、パン、メダル、ロザリオ、ワインを提供する市場が咲き乱れる。かつては応接間で疑われた話も、今では国民の骨の髄まで感じられる存在となっている。谷間に鐘が鳴り響く中、人は不思議に思う：この信仰は生まれ変わったのだろうか、それとも、まだ来ていない何か大きなものの種なのだろうか？" #deepl:307938956
 pius.122.g: "Totus tuus。" #deepl:314650754
 pius.122.t: "の神社[SCOPE.sState('pius_marian_apparition_state').GetFarmHubName]" #deepl:3872076082
