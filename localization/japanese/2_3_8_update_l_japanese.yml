 MR_HIRE_COACH_BUTTON_TT: "#T ナショナルコーチを雇う#! ⅳFIFAが設立され、最初の国際試合が行われた後、ナショナルコーチを雇うことができる。ナショナルコーチは、試合結果の向上に貢献する。コーチが期待に応えられない場合、少なくとも3年後に交代させることができる。[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:3011015130
