 vikelas_coach_experience_gain_tt: "あなたの[concept_vikelas_coach] 、[GetPlayer.MakeScope.Var('vikelas_coach_var').GetCharacter.GetFullName] 、[SCOPE.GetValue('xp_amount')|0+] 経験を積む。" #deepl:3810622028
