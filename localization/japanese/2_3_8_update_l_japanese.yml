 pmg_vikelas_fifa: "国際サッカー連盟" #deepl:2948752940
 sports_has_coach_gui_loc: "[GetPlayer.MakeScope.Var('vikelas_coach_var').GetCharacter.GetLastName]" #deepl:2722178725
 sports_has_no_coach_gui_loc: "いいえ#V [concept_vikelas_coach]#!" #deepl:2886665526
 theme_mr_paleontology: "モルゲンレーテ古生物学（土製）" #deepl:1069050187
 theme_mr_paleontology_desc: "古生物学、化石、恐竜の骨にインスパイアされたユーザーインターフェース。" #deepl:415348285
 verrier.308.d: "天文学者は、#ORANGE 1874#! にオーストラリア・インドネシア・太平洋地域で金星の通過を予測している。[ROOT.GetCountry.GetNameNoFlag] の科学界は、この一生に一度の天文現象を観測することを要求している。" #deepl:1738426681
 verrier.308.f: "ビーナストランジットとは、金星が太陽の前を通過すること。この現象は約243年に4回しか起こらない。歴史的に、このような通過を正確に測定することは、地球と太陽の間の距離（天文単位）を決定するために非常に重要であり、重要な機関や科学者による多くの探検や測定キャンペーンを生み出した。1874年の金星の通過は、天文観測にとって比較的不利なものだった。金星はほとんどすべてのヨーロッパから見えないままであり、長い通過時間はアジアからしか観測されず、オーストラリア、南太平洋の島々、インド洋南部（特にケルゲレン群島）からは短い通過時間しか観測されなかった。それにもかかわらず、約60の探検隊が派遣された。" #deepl:3786277450
 verrier.308.g: "これを見逃すわけにはいかない。" #deepl:2334937119
 verrier.308.t: "1874年の金星遷移" #deepl:3101017563
 verrier.309.d: "天文学者は、#ORANGE 1882#! に、南米、中米、北東アメリカの地域で再び金星の通過が起こると予測している。[ROOT.GetCountry.GetNameNoFlag] の科学界は、この一生に一度の天文現象を観測することを要求している。" #deepl:3366532829
 verrier.309.f: "ビーナストランジットとは、金星が太陽の前を通過すること。この現象は約243年に4回しか起こらない。歴史的に、このような通過を正確に測定することは、地球と太陽の距離（天文単位）を決定する上で非常に重要であり、重要な研究機関や科学者による多くの探検や測定キャンペーンを生み出した。1882年の金星通過は、1874年の金星通過に比べ、より接近しやすい地域で見えたという利点があった。1882年の金星通過は、1874年の金星通過に比べ、よりアクセスしやすい地域で見られたという利点があった。" #deepl:1503344549
 verrier.309.t: "1882年の金星遷移" #deepl:2995649523
 verrier.311.d: "金星が太陽面を横切るという珍しい天文現象が近づいている。世界中の天文台や政府が準備を始める。" #deepl:4200477530
 verrier.311.f: "日付は秒単位で計算されている。望遠鏡が梱包されている。時計は同期している。惑星金星が太陽面を横切る。天文学者たちは、この通過によって太陽系の基本的なスケールである天文単位の正確な測定が可能になると考えている。しかし、この取り組みが成功するかどうかは、場所、天候、調整など、すべて視界にかかっている。" #deepl:2621945333
 verrier.311.g: "自宅からトランジットを観測する。" #deepl:2383387639
 verrier.311.h: "私たちは保護領のひとつに遠征隊を派遣する。" #deepl:1098022190
 verrier.311.i: "遠方に遠征隊を派遣する。" #deepl:381412623
 verrier.311.j: "このことをもう一度考えるべきだ。" #deepl:1178423846
 verrier.311.t: "金星遷移の準備" #deepl:967668025
 verrier.319.d: "金星の通過という珍しい天文現象を観測するため、[SCOPE.sCountry('verrier_venus_transit_leader').GetName] からの探検隊が我が領土内に到着した。" #deepl:853589
 verrier.319.f: "彼らはレンズ、時計、海図などの木箱を持って下船した。彼らの広報担当者は大学関係者と会い、友好的な文通と技術的な説明を提供した。天文台の助手は好奇心旺盛で、新聞は中立的だが警戒態勢をとっている。" #deepl:209223472
 verrier.319.g: "科学を私たちの共有言語としよう。" #deepl:183308092
 verrier.319.t: "空へのまなざし" #deepl:4019861958
 verrier.321.d: "航海中の探検船を激しい嵐が襲った。波が打ち寄せ、艤装が混乱するなか、甲板からいくつかの木箱が引きちぎられ、デリケートな航海計器も海に投げ出された。" #deepl:2127492192
 verrier.321.f: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName] 空が砕け散り、手すりにしがみついた。海が敵のように押し寄せてきて、ロープや樽を甲板に投げつけた。木箱が2つ、恐ろしい弧を描いて滑り、やがて漆黒の闇に消えていった。後日、嵐が過ぎ去り、静寂だけが残ったとき、被害が数えられた。メインのヘリオメーター。ケーニヒスベルクのダブルレンズ。精密な時計がいくつかあった。Beaked crew and broken wood among Dr. standing, staring at the void where the gear had been.バックアップはあった。でも、どれも完璧じゃなかった。金星のように時間は誰も待ってくれない。[ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] " #deepl:2744264311
 verrier.321.g: "続けてくれ。私たちはまだ十分に前進できる" #deepl:1985224258
 verrier.321.t: "トランジットをめぐるテンペスト" #deepl:2256455346
 verrier.322.d: "毎晩の星野較正で、探検隊の天文学者は不規則な動きと、何もないはずの定点に注目した。さらに入手可能な星図と比較して確認したところ、チームは新たな未知の天体を発見した可能性があった。" #deepl:2064965258
 verrier.322.f: "船はビロードのような空の下を漂っていた。雲は数時間前に切れ、不自然に感じられるほど純粋な透明度を残していた。[ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] 博士は再び接眼レンズに身を乗り出した。アルタイルと六分儀の端の間に、動きがあった。彗星にしては遅すぎる。毎晩毎晩、[ROOT.Var('verrier_astronomer_var').GetCharacter.GetSheHe] 、同じ空の一角に戻り、スケッチし、計算し、比較した。ついに、[ROOT.Var('verrier_astronomer_var').GetCharacter.GetHerHis] 、小惑星であることを確認した。おそらく2つ。カタログには載っていない。しかし、星々はすでに別のものを提示していた。" #deepl:1791725592
 verrier.322.g: "天にはまだ秘密がある。" #deepl:1342826733
 verrier.322.t: "予期せぬ光" #deepl:1561684464
 verrier.323.d: "旅の小休止中、探検隊は天体観測のために標高の高そうな場所を調査するために内陸に入った。その代わりに彼らが発見したのは、見慣れない植物の木立だった。" #deepl:3286240010
 verrier.323.f: "それは香りから始まった。森の端のシダから立ち上る、ほのかな、柑橘系の鋭い香りだった。博士[ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] 、その香りをたどって鬱蒼とした下草を抜けると、光が水のようにたまっている小道があった。赤い苔が黒曜石色の石を覆っていた。高いところでは、星がぶら下がったような形のつるが風に揺れていた。若い助手の一人がささやいた：「空が地球に落ちてきたみたい」。しかし、静まり返った空気と濾過された光の中で、彼らは違う種類の不思議を発見した。" #deepl:808904157
 verrier.323.g: "サンプルを収集し、研究のために保存する。" #deepl:1767661174
 verrier.323.t: "星と星の間の庭" #deepl:2845961206
 verrier.324.d: "探検隊は、高台の観測地を探しているときに、地質学的に非常に興味深い場所に出くわした。周囲の石には、これまで見たこともないような模様や内包物があった。" #deepl:539957699
 verrier.324.f: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] 博士は、[ROOT.Var('verrier_astronomer_var').GetCharacter.GetHerHis] 、露頭の層になった表面を手でなぞった。朝の光に照らされ、金属光沢のある割れ目がかすかに光っている。オレンジ色の結晶の芯に深い緑色の渦巻きが巻き付き、ほとんど意図的に作られたような模様を形成している。チームの地質学者は、火山が起源であることを示唆した。もう一人の地質学者は、「これは私が見たどのものよりも古い」と首を振った。しかし、彼らのブーツの下の岩の中には、地球自身の深い記憶の断片があった。" #deepl:908721635
 verrier.324.g: "この発見は、地球そのものの物語に属する。" #deepl:2450655201
 verrier.324.t: "時を超える石" #deepl:2335051515
 verrier.325.d: "探検隊は入国港に到着したが、税関当局は即時の通関を拒否している。科学機器の入ったいくつかの木箱が検査のために留め置かれ、係官はこれまで要求されたことのない追加書類を要求している。" #deepl:2525277400
 verrier.325.f: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] 博士は歯を食いしばって貨物目録の横に立っていた。水銀のレンズ、精密な時計、磨き上げられた真鍮の筐体......それらは鍵のかかったゲートの向こうの倉庫で、インクとスタンプを待っていた。税関職員は礼儀正しかったが、断固としてこう言った：「科学的であろうとなかろうと、条約で免除されない限り、外国製の機器はすべて申告、検査、課税されなければならない」。金星は官僚主義を待たない。" #deepl:34765689
 verrier.325.g: "手数料を支払い、通関を急ぐ。" #deepl:240478226
 verrier.325.t: "空の下の障壁" #deepl:2346862710
 verrier.340.d: "数週間の準備期間を経て、金星通過の観測ポストが完成。観測機器は校正されている。チャートも検証済み。あとは空だけが未知数だ。" #deepl:1138273071
 verrier.340.f: "ドームは真鍮と静かな目的の灯台のようにそびえ立っていた。自国の石造りであろうと、異国のキャンバスとリベットであろうと、そのドームには今、期待という息もつかせぬ静けさが宿っている。  内部では、光に照らされたヘリオメーターが輝いていた。歯車はささやき声とともに回転した。タイマーは期待に胸を膨らませてカチカチと音を立てた。外ではアシスタントがレンズの埃を払っていた。空気さえも躊躇しているようだった。[ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] 博士はドアの前に立ち、敷居に触れた。何カ月もの間、すべてがこの瞬間に向かって動いていた。そして今、もう作るものは何もなく、ただ待つだけである。彼らの頭上、見えない空のどこかで、金星がその進路をたどっていた。" #deepl:2967275520
 verrier.340.g: "正確さは冷静な手から始まる。" #deepl:2872475059
 verrier.340.t: "天文台、金星通過の準備完了" #deepl:966063237
 verrier.341.d: "[ROOT.Var('gaudi_engineer_var').GetCharacter.GetLastName] 博士は、主望遠鏡の内部スタビライザーに、わずかではあるが重要な変更を加えることを提案した。この改造により、内部振動を低減し、接触時の光学的シャープネスを向上させることができる。" #deepl:491784908
 verrier.341.f: "それはドームの中ではなく、その後ろにある作業場のテントの中で起こった。[ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] [ROOT.Var('gaudi_engineer_var').GetCharacter.GetLastName] 、油で汚れたメモ帳を持って近づいてきた。バッファーテンションの再計算。他の人たちは謹んで懐疑的に耳を傾けた。画像がコンマ何度安定したのだ。" #deepl:2995793810
 verrier.341.g: "小さな変化を正確に。" #deepl:1641676745
 verrier.341.t: "静かなる調整" #deepl:3486983252
 verrier.342.d: "電磁気理論における最近のブレークスルーにより、望遠鏡の観測プロトコルに新しい光学フィルタリング方法が適用された。これにより、大気中の光散乱による干渉をよりよく説明できるようになり、より鮮明な視覚データが得られるようになった。" #deepl:2503805121
 verrier.342.f: "そのアイデアはドームからではなく、レンズメーカーのベンチからでもなく、1枚のページから生まれた。それは波動方程式を改良したもので、光が単に粒子や光線としてではなく、振動する場としてどのように振る舞うかというものだった。これによって、干渉の新しいモデルを予測し、補正を加えることができた。フィルターはカットし直された。露光タイミングが調整された。その夜、[ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] 博士がテストレンズを覗いたとき、星々はもうピクリとも動かなかった。彼らは立っていた。空は揺れなくなっていた。" #deepl:914121255
 verrier.342.g: "数学は目を鋭くする。" #deepl:2639991371
 verrier.342.t: "明晰さの方程式" #deepl:1039194191
 verrier.351.d: "横浜からレユニオンまで、ケルゲレンから北京まで、大陸と海を越えて、天文学者たちは金星が太陽の面を横切るのを見てきた。1874年の太陽面通過は完了し、多くのチームが成功を報告している。" #deepl:3119534429
 verrier.351.f: "彼らは蒸気船で、ラクダに乗って、鉄道で、徒歩でやってきた。エンジニア、植物学者、地図製作者。彼らはジャングルや砂漠に天文台を作った。そして1874年12月9日の6時間、彼らは黒い点が太陽円盤を横切るのを観察した。金星はささやくように入り、秘密のように出ていった。測定は完璧ではなかったが、十分だった。三角測量を始めることができた。人類は初めて、神話や比喩ではなく、影でなぞられた数字で、太陽系の本当の規模を知ることができるかもしれない。[ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] 博士は[ROOT.Var('verrier_astronomer_var').GetCharacter.GetHerHis] ノートを閉じ、息を吐いた：終わった。" #deepl:1827747392
 verrier.351.g: "美しい" #deepl:2882436754
 verrier.351.t: "1874年のトランジット" #deepl:2395808814
 verrier.352.d: "1882年12月6日、金星が再び太陽の前を通過した。100年ぶりに、世界中の観測者たちが天を仰ぎ、飛行する金星の黒い円盤を捉えた。" #deepl:3903856343
 verrier.352.f: "今回は船の出発が早かった。天文台はより頑丈になった。時計はより正確になった。1874年に学んだ教訓が、すべての手、すべての影、すべての計算を導いた。♪ニュージャージーからパタゴニアまで、メキシコからオーストラリアまで、世界は太陽の点のために静止した。♪Dr.[ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] 、最後のフィルターを調整した。その円盤は、燃えるような白の上をゆっくりと滑るように現れた。歓声はなく、ペンのざわめき、シャッターのクリック音、勝利の静かな息づかいだけが響いた。金星が戻ってくるまで、あと121年かかる。しかし、この瞬間、時間そのものが計測されたのだ。" #deepl:907305697
 verrier.352.g: "次を見ることはないだろう。" #deepl:2603880366
 verrier.352.t: "1882年のトランジット" #deepl:2224364038
 verrier.353.d: "待ちに待った瞬間が近づくにつれ、天候が悪化し始める。雲が立ちこめ、すべてが見えなくなるほどではないが、明瞭さとタイミングをゆがめるには十分だ。" #deepl:1325753029
 verrier.353.f: "空は完全に閉ざされたわけではなかったが、もはや従わなかった。漂う雲の層がガーゼのように太陽の上に広がった。光は不均等なパルスの中で薄暗くなったり燃え上がったりした。すべてのレンズがバランスをとろうと奮闘し、すべての助手が呼吸をした。[ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] 、フィルターを通して[ROOT.Var('verrier_astronomer_var').GetCharacter.GetHerHis] 目を固定した。金星のシルエットが浮かび上がった-かすかに、屈折して、蒸気と計算の間で踊っていた。きれいな弧ではなかった。しかし、それはデータだった。気まぐれな空の下で苦労して得たデータだ。" #deepl:1908038831
 verrier.353.g: "天が破片を与えても、それを縫い合わせなければならない。" #deepl:1646978536
 verrier.353.t: "スルー・ベール・オブ・ライト" #deepl:674640397
 verrier.354.d: "金星通過の間、観測チームは正確なデータだけでなく画像も撮影した。何十枚もの写真プレートが順番に露光され、後に動画に組み立てられた。史上初めて、惑星通過がフィルムとして記録されたのである。" #deepl:2258153461
 verrier.354.f: "ちらつく。震える。しかし動く。一連の処理されたプレートの端から金星が入り込み、完璧な黒い点が太陽円盤を滑っている。単なる計算でもなく、スケッチでもない動き。時間として捉えられた。[ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] 博士は暗室に立ち、ランタンを掲げ、短いシークエンスが何度も繰り返されるのを見ていた。6時間に及ぶ測定は、数秒の驚きに凝縮された。天文学者たちは拍手を送った。自分たちが何か新しいことをしたのだと。彼らは天を動かしたのだ。" #deepl:1856959975
 verrier.354.g: "惑星運動モデルを改善するためにフレームを分析する。" #deepl:3348594448
 verrier.354.t: "動く影" #deepl:969441096
 verrier.355.d: "1882年の金星通過をめぐる世界的な興奮に触発され、[ROOT.Var('elgar_composer_var').GetCharacter.GetFullName] 。多くの聴衆の前で初演されたこの行進曲は、金星通過の荘厳さと新しい科学の世紀のリズムの両方を捉えている。" #deepl:1566390789
 verrier.355.f: "1882年の金星遷移の翌年、ジョン・フィリップ・スーザは、1878年に亡くなったアメリカの物理学者ジョセフ・ヘンリーの銅像除幕式のための行進曲の作曲を依頼された。フリーメーソンであったスーザは、自然現象に神秘性を見出すグループに魅了されていた。この曲はスーザの存命中には流行らなかった。スーザの手稿譜が洪水で焼失した後、この曲は何年も演奏されることがなかった。" #deepl:3349639062
 verrier.355.g: "ある種の音楽は、群衆のためではなく、歴史のために書かれる。" #deepl:1666827653
 verrier.355.t: "金星の行進" #deepl:1281729794
 verrier_add_x_venus_success_0_tt: "ゲインなし#V 金星通過観測成功#!." #deepl:2753469077
 verrier_add_x_venus_success_minus_x_tt: "失う[SCOPE.GetValue('verrier_venus_success_amount')|0+] #V  金星通過観測の成功#!." #deepl:867568724
 verrier_add_x_venus_success_plus_x_tt: "ゲイン[SCOPE.GetValue('verrier_venus_success_amount')|0+] #V  金星通過観測成功#!." #deepl:667317191
