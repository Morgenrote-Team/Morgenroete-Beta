l_japanese:
 mr_swe_nor_union_decision_1: "Appoint a new Governor-General in Norway"
 mr_swe_nor_union_decision_1_desc: "The position in Christiania is currently vacant. We should make a decision on who to appoint as the new head of the Norwegian Government in the absence of the King."
 mr_swe_nor_union_decision_2: "Demand that our ministers can participate in parliamentary debates"
 mr_swe_nor_union_decision_2_desc: "Currently, the ministers are forbidden to have a say in Stortinget. This cannot stand."
 mr_swe_nor_union_decision_3: "Demand that all symbols of the union are removed from our flag"
 mr_swe_nor_union_decision_3_desc: "We should use a clean Norwegian flag, without union symbols."
 mr_swe_nor_union_decision_4: "Demand Norwegian consular offices"
 mr_swe_nor_union_decision_4_desc: "With the increase in Norwegian shipping, the Swedish consular offices are not enough. We need Norwegian offices."
 mr_swe_nor_union_decision_5: "Demand that King Karl XV fulfills his promise"
 mr_swe_nor_union_decision_5_desc: "With the coronation as Karl XV as king of Sweden and King of Norway, it's time for him to fulfill his promise of abolishing the position as Governor-General."
 da_appoint_governor_general: "Appoint Governor-General"
 da_appoint_governor_general_desc: "Changes the Governor-General of a [concept_subject]. [concept_liberty_desire] may change depending on the candidate chosen."
 da_appoint_governor_general_action_name: "Appoint Governor-General"
 da_appoint_governor_general_action_notification_name: "[TARGET_COUNTRY.GetName] gets a new Governor-General"
 da_appoint_governor_general_action_notification_desc: "[INITIATOR_COUNTRY.GetName] has replaced the Governor-General of [TARGET_COUNTRY.GetName] with a new appointee."
 da_appoint_governor_general_action_notification_third_party_name: "[TARGET_COUNTRY.GetName] gets a new Governor-General"
 da_appoint_governor_general_action_notification_third_party_desc: "[INITIATOR_COUNTRY.GetName] has replaced the Governor-General of [TARGET_COUNTRY.GetName] with a new appointee."
 mr_swe_nor_union_event.1.t: "Appointing a new Governer-General"
 mr_swe_nor_union_event.1.d: "The position of Governor-General in Christiania is vacant. Perhaps we should consider appointing someone to fill the role."
 mr_swe_nor_union_event.1.f: "According to the Norwegian Constitution of 1814, a Governor-General of either Swedish or Norwegian nationality could be appointed to lead the Norwegian government in the absence of the King, who resides in Stockholm. In Sweden, many believe that it is essential for a Governor-General, acting on behalf of the Swedish King, to be of Swedish nationality. Anything to the contrary is seen as potentially jeopardizing national security."
 mr_swe_nor_union_event.1.a: "Appoint a Swedish Governor-General"
 mr_swe_nor_union_event.1.b: "Appoint a Norwegian Governor-General"
 mr_swe_nor_union_event.1.c: "Leave the position empty for the next 5 years"
 mr_swe_nor_union_event.2.t: "Norwegian Ministers"
 mr_swe_nor_union_event.2.d: "Stortinget allows Norwegian ministers to participate in parliamentary discussions."
 mr_swe_nor_union_event.2.f: "The Norwegian parliament, Stortinget, has voted in favor of permitting Norwegian ministers to participate in parliamentary discussions and negotiations. They now anticipate the King's approval of their decision."
 mr_swe_nor_union_event.2.a: "Refuse to acknowledge their decision"
 mr_swe_nor_union_event.2.b: "Approve their decision"
 mr_swe_nor_union_event.3.t: "The Norwegian Flag"
 mr_swe_nor_union_event.3.d: "Norway demand the right to use a clean Norwegian flag."
 mr_swe_nor_union_event.3.f: "Stortinget, the Norwegian parliament, has voted to adopt a new \"clean\" flag without the usual symbols of the Swedish-Norwegian union. Should we endorse their decision or deny them the right to use the flag of their choice?"
 mr_swe_nor_union_event.3.a: "They will keep their current flag"
 mr_swe_nor_union_event.3.b: "Let them use the flag of their choice"
 mr_swe_nor_union_event.4.t: "Norwegian Consular Offices"
 mr_swe_nor_union_event.4.d: "Norway demand the right to open their own consular offices around the world."
 mr_swe_nor_union_event.4.f: "The union's consular offices has been run by the foreign office in Stockholm, but as the Norwegian shipping industry has increased in importance, the Norwegians argue that a Norwegian consular office is necessary. \n In Sweden, the Norwegian demand is considered as the first step towards a Norwegian foreign service, and a potential future demand for a Norwegian independence."
 mr_swe_nor_union_event.4.a: "There's nothing wrong with our offices"
 mr_swe_nor_union_event.4.b: "The more offices the better"
 mr_swe_nor_union_event.5.t: "Karl XV's promise"
 mr_swe_nor_union_event.5.d: "Norway demand that the new king, Karl XV, fulfill his promise of abolishing the position of Governor-General in Christiania."
 mr_swe_nor_union_event.5.f: "Making promises to the to the people of Norway while being the heir is one thing, being the ruler of two countries is something else. Should the position be abolished as promised, having a Norwegian prime-minister replacing the Governor-General in Christiania?"
 mr_swe_nor_union_event.5.a: "We need our own person in Christiania"
 mr_swe_nor_union_event.5.b: "A promise should be kept"
 mr_swe_nor_union_event.6.t: "The Crown Prince's promise"
 mr_swe_nor_union_event.6.d: "Heir to throne, Karl Bernadotte, vows to abolish the Governor-General position in Christiania upon his coronation"
 mr_swe_nor_union_event.6.f: "In an endeavor to secure favor among the Norwegian people, the future king solemnly pledges to eliminate the office of Governor-General in Christiania upon his royal coronation. Reactions among Swedish landowners and armed forces unsurprisingly cast shadows on the young heir's proposal."
 mr_swe_nor_union_event.6.a: "Hopefully he knows what he's doing"
 mr_swe_nor_union_concessions_none: "Refused concessions to Norway"
 mr_swe_nor_union_concessions_minor: "Minor concessions to Norway"
 mr_swe_nor_union_concessions_major: "Major concessions to Norway"
 mr_swe_nor_clean_flag: "Norway removes all union symbols from their flag"