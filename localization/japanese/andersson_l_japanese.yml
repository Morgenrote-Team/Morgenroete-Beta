 je_andersson_hominid_expedition: "Hominid Expedition"
 je_andersson_hominid_expedition_reason: "#p Hominid expediiton is currently taking place in [SCOPE.sState('target').GetName] in [SCOPE.sState('target').GetCountry.GetName].#!\n$mr_divider_for_je$\nThe search for human fossils by anthropologists is divided into three steps: exploration, collection, and identification. During exploration, the anthropologist searches the area for a suitable anthropological site. Only then does he begin collecting fossils. Once enough fossils have been found, he begins the identification process. Exploration and collection culminate in a discovery event. During the identification process, a new hominid type may also be identified."
 andersson_je_no_subject_anymore_tt: "[GetPlayer.GetName] is no longer the overlord of the subject state in which an expedition is taking place."
 andersson_hominid_expedition_modifier: "Hominid Expedition"
 andersson.205.t: "Hominid Expedition: Type"
 andersson.205.d: "Before Dr. [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName] can assemble an expedition, a decision must first be made as to what type of hominid the target should be."
 andersson.205.f: "'Is evolution a theory, a system, or an hypothesis? It is much more: it is a general condition to which all theories, all hypotheses, all systems must bow and which they must satisfy henceforward if they are to be thinkable and true.' -Pierre Teilhard de Chardin"
 andersson.206.t: "Hominid Expedition: Region"
 andersson.206.d: "Dr. [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName] has already had his assistants bring him maps of the foreign territories that would be worthwhile for an expedition. The decision has not yet been made."
 andersson.206.f: "'I kept an open mind on the question of whether a hominid had been present in Europe in the early Pleistocene.' -Louis Leakey"
 andersson.213.t: "Hominid Expedition: Finished"
 andersson.213.d: "After a strenuous but worthwhile expedition, Dr. [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName] and his team have returned safe and sound. The Anthropological Institute is now richer by several bones."
 andersson.213.f: " Now that's finished ... and so am I. -Robert Broom (on finishing his monograph about the Australopithecus shortly before his death)"
 andersson.225.d: "Dr. [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName] has made a spectacular discovery in a cave in [SCOPE.sCountry('andersson_cave_country_scope').GetName]!"
