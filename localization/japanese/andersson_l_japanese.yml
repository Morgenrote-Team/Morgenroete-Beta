 andersson.10.t: "人類学・民族学研究所"
 andersson.10.d: "本日、盛大な式典において、[SCOPE.sCharacter('andersson_ruler').GetPrimaryRoleTitle][SCOPE.sCharacter('andersson_ruler').GetFullName]が自ら人類学・民族学研究所を開設した。"
 andersson.10.f: "開所式は厳粛かつ概ね歓迎される行事となり、報道機関、専門家、そして一般大衆からも好意的に受け止められたが、批判が全くなかったわけではない。またしても、ある種の収集癖に突き動かされた、真の価値などない、名ばかりの骨董品を収めるだけの建物なのか？野党系の新聞は、資金の無駄遣いであり、内容も想像力に欠けていると書き立てた。政府には提供できる新しいものなど何もない、という主張だった。ある者は人工物を集め、ある者は薬用植物を集め、さらには恐竜フェティシストなる連中まで現れ――そして今度は人間の骨だ！幸いにも、こうした否定的なコメントは絶対的な少数派にとどまり、新施設に対する絶え間ない熱意を削ぐことはなかった。[SCOPE.sCharacter('andersson_ruler').GetPrimaryRoleTitle][SCOPE.sCharacter('andersson_ruler').GetFullName]はその重要性を改めて強調した。"
 andersson.10.g: "研究所を訪問する。"
 andersson.21.t: "ヴェロ人"
 andersson.21.d: "エリアス・セラーズがフロリダで古代の骨を発見し、全米から大きな注目を集めた。"
 andersson.21.f: "ヴェロ人とは、1915年から1916年にかけて地質学者のエリアス・セラーズがフロリダ州ヴェロビーチで発見した、更新世の重要な人類遺骸の一群を指す。この発見は当初、非常に激しい論争を巻き起こした。その理由は、遺骸が絶滅した氷河期の大型哺乳類（メガファウナ）と同じ地層から出土したためであり、人類がアメリカ大陸に到達したのはそれよりも遥か後であるという、当時の支配的な科学的定説を覆すものだったからである。その後、現代の炭素年代測定や先進的な考古学技術により、この遺跡は約13,000年前の北アメリカにおける最古の人類定住例の一つであることが確認されている。"
 andersson.21.g: "魅力的だ。"
 andersson.22.t: "ラゴア・サンタ人"
 andersson.22.d: "デンマークの科学者がブラジルの洞窟で驚くべき発見をした。"
 andersson.22.f: "ラゴア・サンタ人（Lagoa Santa Man）とは、19世紀半ばにデンマークの博物学者ペーター・ヴィルヘルム・ルンドがブラジルのミナスジェライス州にある石灰岩洞窟で発見した、パレオ・インディアンの骨格遺骸のコレクションを指す。その後の現代の遺伝学的研究や考古学的分析により、これらの遺骸は約10,000年から12,000年前の南アメリカにおける最初期の人類定住の波の一部であったことが位置づけられている。"
 andersson.23.t: "クロマニョン人"
 andersson.23.d: "ルイ・ラルテは、ネアンデルタール人よりも遥かに現代人に酷似した先史時代の人類の骨格を複数発見した。アブリ・ド・クロマニョン（クロマニョンの岩陰）遺跡にちなみ、これら最初期のヨーロッパ人はクロマニョン人と呼ばれている。"
 andersson.23.f: "クロマニョン人（Cro-Magnon Man）とは、ヨーロッパの後期旧石器時代における最初期の後期更新世現代人類（ホモ・サピエンス）を指し、1868年に地質学者のルイ・ラルテがフランスのレ・ゼジにある岩陰遺跡で発見した。この遺跡からは、石器、彫刻が施された角、動物の遺骸とともに5体の骨格が出土し、解剖学的現代人が絶滅した更新世の動物相とともにヨーロッパに暮らしていたことを示す初の決定的な証拠となった。これらの発見は人類古生物学の分野を確立する上で極めて重要であり、標本は約28,000〜30,000年前のものと特定され、それ以前に発見されていたより頑丈な体格のネアンデルタール人とは明確に区別された。"
 andersson.24.t: "ボスコップ人"
 andersson.24.d: "ある頭蓋骨の発見が、農場労働者たちの間で騒ぎを引き起こしている。専門の調査機関に通報が入った。"
 andersson.24.f: "ボスコップ人（Boskop Man）とは、1913年に南アフリカのトランスヴァール地方で農場労働者によって発見された化石人類の頭蓋骨（頭蓋冠）を指し、その推定脳容量が異常に大きいことで知られている。20世紀初頭、一部の人類学者たちはこの標本を「ホモ・カペンシス（Homo capensis）」という独立した種に誤って分類し、この地域には現代人の集団に先んじて「巨大な脳を持つ」人類の種族が存在していたという仮説を立てた。しかし、その後の古人類学研究とより厳密な年代測定によってこれらの主張は覆され、この遺骸は先住民族であるコイサン人の祖先の血統と一致する、現代人（ホモ・サピエンス）のものであることが確認されている。"
 andersson.25.t: "山頂洞人"
 andersson.25.d: "本日、周口店遺跡のさらに上部にある洞窟から人類の化石が発見され、華北地域における最初期の定住があったことを示唆している。"
 andersson.25.f: "山頂洞人（Shandingdong Man）とは、1933年から1934年にかけて中国・北京近郊の周口店遺跡の「上洞」で発見された、初期の後期更新世現代人類（ホモ・サピエンス）の一群を指す。裴文中の指揮下で発掘され、後にフランツ・ワイデンライヒによって分析されたこれらの化石は、約30,000〜10,000年前のものとされている。歴史的に山頂洞人は、ヨーロッパのクロマニョン人に対応するアジアの存在とされてきた。3体の完全な頭蓋骨と様々な骨の破片からなる遺骸は、高度な石器、骨針、穴の開いた歯の装飾品とともに出土しており、複雑な文化を有していたことを示している。ワイデンライヒの当初の仮説では、これらの個体は現代のアジア人の祖先である「プロト・モンゴロイド」を表しているとされたが、現代の古人類学では、地域的特徴が完全に固定化する以前に東アジア全域に広がった、初期人類のより広範で多様な移動の波の一部であったと考えられている。"
 andersson.26.t: "タルガイ人"
 andersson.26.d: "タルガイ牧場の近くで、オーストラリアへの最初期の定住に全く新しい光を当てる骨が発見された。"
 andersson.26.f: "タルガイ人とは、1884年にクイーンズランド州アローラ近郊のタルガイ牧場で、柵設置作業員によって発見された先史時代の人類頭蓋骨を指し、オーストラリアにおける人類定住を示す最初期の証拠の一つである。その頑丈な特徴と厚い鉱物化のため、当初は遥かに古い化石人類種と誤認されていたが、その後の土壌炭酸塩の放射性炭素年代測定により、この標本は約13,500年前のものと特定された。この発見は、オーストラリア先住民の祖先が絶滅した大型哺乳類（メガファウナ）とともに暮らしていたことを裏付けるものであり、大陸の先住民族の深い歴史を理解する上で極めて重要な繋がりを提供するという、歴史的意義を持っている。"
 andersson.31.t: "ネアンデルタール人"
 andersson.31.d: "ボン大学の研究者が科学界の同僚とともに、本日、絶滅した初期人類種の発見を公表した。"
 andersson.31.f: "1856年8月中旬、イタリア人の採石場労働者たちが、近年の石灰岩採掘によって崩落したネアンデル谷の一画から、いくつかの骨の破片を発見した。当初それらは不注意にも瓦礫の中に投げ捨てられていたが、採石場の所有者であるヴィルヘルム・ベッカーショフとフリードリヒ・ヴィルヘルム・ピーパーがこれに気づき、16個の大きめの骨の破片を回収させてヨハン・カール・フルロットに調査を委ねた。報道を通じてこの事実を知ったボン大学の解剖学者ヘルマン・シャーフハウゼンもこれらの骨を調査し、フルロットが事前に達していたのと同じ結論、すなわち「これらは現代人の古代の形態である」という結論に至った。フルロットとシャーフハウゼンは1857年6月、プロイセン・ラインラント自然史協会の総会でこの発見を発表した。しかし、専門家である聴衆たちに彼らの解釈が受け入れられることはなかった。この「ネアンデルタール1」と名付けられた発見こそが、ホモ・ネアンデルターレンシス（ネアンデルタール人）という種の基準標本となった。"
 andersson.32.t: "ジブラルタル人"
 andersson.32.d: "エドマンド・フリント大尉が、ジブラルタル近郊でほとんど信じがたい発見をした。"
 andersson.32.f: "ジブラルタル人（特に「ジブラルタル1」）とは、1848年にエドマンド・フリント大尉がフォーブス採石場で発見した、極めて保存状態の良い成人女性の頭蓋骨を指し、現代科学によって初めて発見されたネアンデルタール人の化石である。この標本は、ドイツのネアンデル谷における有名な発見の8年前に回収されていたものの、人類の明確な近縁種としての重要性は、「ネアンデルタール」の名がすでに定着した後の1860年代まで完全には認識されなかった。その後の同遺跡や近隣のゴーラム洞窟の発掘調査により、ジブラルタルはネアンデルタール人の既知の最後の大規模な避難所（の一つであったことが明らかになっており、彼らが約28,000〜32,000年前までそこで生き延びていたことを示す証拠も存在している。"
 andersson.33.t: "スピー人"
 andersson.33.d: "スピーの近郊で、科学者たちが貴重な人類学上の発見をした。これにより、ベルギーの先史時代の歴史がかつてないほど明らかになる。"
 andersson.33.f: "スピー人とは、1886年に考古学者のマルセル・ド・ピュイドと地質学者のマクシミリアン・ロヘストが、ベルギーのスピー近郊にあるベッチェ・オー・ロッチェス洞窟で発見した、2体のほぼ完全なネアンデルタール人の骨格を指す。この発見は、遺骸がムスティエ文化の石器や絶滅した氷河期の哺乳類と明確に関連した状態で見つかったため、古人類学における重大な転換点となった。これにより、ネアンデルタール人が病変を抱えた現代人ではなく、古代の先史時代の人類であることが決定的に証明された。頑丈な骨格と突出した眼窩上隆起を特徴とするスピの化石は、約36,000〜40,000年前のものとされており、ヨーロッパ後期のネアンデルタール人の解剖学的特徴や行動を理解する上で、現在も最も重要な標本の一部であり続けている。"
 andersson.34.t: "クラピナ人"
 andersson.34.d: "クラピナの近郊で、研究者たちが先史時代の人類骨格の大規模な遺跡を発見した。これはバルカン半島全体の歴史を根底から覆すものである。"
 andersson.34.f: "クラピナ人とは、1899年から1905年にかけて古生物学者のドラグーティン・ゴリヤノヴィッチ＝クラムベルガーがクロアチアのフシュニャコヴォの丘の岩陰遺跡で発見した、約800点に及ぶネアンデルタール人化石の膨大なコレクションを指す。この発見は当時としては画期的なものであり、ゴリヤノヴィッチ＝クラムベルガーは地層学的分析を用いるとともに、先駆的にX線撮影を活用して化石の古さを証明し、ネアンデルタール人が人類の進化史に直接連なる一部であることを示した。約120,000〜130,000年前のものとされるこの遺跡は、現在も世界最大かつ最も重要なネアンデルタール人の発見例であり、彼らの身体的変異、健康状態、そして儀礼的行為の可能性に関する広範なデータを提供し続けている。"
 andersson.35.t: "ガリラヤ人"
 andersson.35.d: "聖地が実に人類最古の揺りかごの一つであることが確認されたようだ。この衝撃的な発見は、今や国際的な科学界の知るところとなっている。"
 andersson.35.f: "ガリラヤ人とは、1925年にフランシス・ターヴィル＝ピーターが現在のイスラエルにあるムハレット・エル＝ズッティエ洞窟で発見した、一部のみが残る頭蓋骨（特に「ズッティエ頭蓋骨」として知られる前頭骨）を指す。これは西アジアで初めて発見された化石人類であり、その独特な過渡期的特徴から、当初はネアンデルタール人を表しているのか、あるいは初期の現代人を表しているのかを巡って論争が巻き起こった。約200,000〜350,000年前のものとされるこの標本に対し、現代の古人類学的な見解では、後期のホモ・ハイデルベルゲンシス、あるいはネアンデルタール人とホモ・サピエンス双方の祖先にあたる集団の一員として分類されることが多い。"
 andersson.41.t: "ハイデルベルク人"
 andersson.41.d: "ハイデルベルクの近郊で、研究者たちが「史上最古のドイツ人」を発見したと考えている。"
 andersson.41.f: "ハイデルベルク人とはホモ・ハイデルベルゲンシスという種を指し、1907年にダニエル・ハルトマンがドイツのマウアー近郊の砂利採取場でおよそ600,000年前の化石化した下顎骨を発見したことで定義された。この「マウアー1」と呼ばれる下顎骨の標本は、頑丈で非常にがっしりとした構造と顎の突出（オトガイ）の欠如を特徴としながらも、現代人類に驚くほど酷似した歯を備えている。今日、ハイデルベルク人は中期更新世における極めて重要な祖先として広く認められており、ヨーロッパのネアンデルタール人とアフリカのホモ・サピエンス双方の共通の祖先であると考えられている。"
 andersson.42.t: "ローデシア人"
 andersson.42.d: "スイス人の鉱夫トム・ツウィグラールが、これまでのアフリカにおける最も重要な人類学上の発見の一つを、ほとんど偶然と言える形で成し遂げた。"
 andersson.42.f: "ローデシア人とは、1921年にスイス人の鉱夫トム・ツウィグラールが、北ローデシア（現在のザンビア・カブウェ）のブロークン・ヒル鉛・亜鉛鉱山で発見した、ほぼ完全な化石頭蓋骨を指す。正式に「カブウェ1」と分類されたこの標本は、アフリカで初めて発見された主要な人類化石であり、巨大な眼窩上隆起のような原始的特徴と、現代人類と同等の脳容量を併せ持っていることで知られている。近年の高精度な年代測定により、この頭蓋骨は約299,000年前のものと推定されており、ホモ・ハイデルベルゲンシス（またはホモ・ローデシエンシス）の一員、そして最初期に出現したホモ・サピエンスの時代まで生き延びていた後期の生存者であった可能性が高いと位置づけられている。"
 andersson.43.t: "北京原人"
 andersson.43.d: "北京近郊における初期人類の新たな発見は、人類の起源がアジアにあるという説を補強するものである。"
 andersson.43.f: "1920年代から北京の中心部から南西に約40km離れた周口店近郊で発見された化石は「北京原人」と呼ばれ、ホモ属に分類されている。1927年、デビッドソン・ブラックは、本質的には1本の歯に基づいていたこの化石の発見に対し、「シナントロプス・ペキネンシス」という新しい属名および種名を与えた。1940年、すでに数十点の化石に達していたこれらの発見は、ウィルフリッド・ル・グロス・クラークによって「ジャワ原人」と密接に関連していると解釈され、ジャワ原人と同様に、1892年にウジェーヌ・デュボワが選定した「ピテカントロプス・エレクトス」という属名および種名で命名された。オリジナルの化石は第二次世界大戦中に紛失している。"
 andersson.44.t: "ジャワ原人"
 andersson.44.d: "オランダ領東インドにおいて、医師であり解剖学者でもあるウジェーヌ・デュボワが、先史時代の人類の祖先の化石遺骸を発掘した。これは科学界に興奮と論争の双方を巻き起こしている。"
 andersson.44.f: "1891年にウジェーヌ・デュボワが東ジャワのトリニール近郊、ソロ川の川岸で初めて発見した化石は「ジャワ原人」と呼ばれる。現在の知見によれば、これらは約100万年前のものとされている。ヨーロッパ以外で発見された最初のヒト族（ホミン）の化石であり、ネアンデルタール人に次いで、解剖学的現代人（ホモ・サピエンス）の化石近縁種を示す2番目の証拠となった。ジャワからの出土品は、当初「アントロポピテクス」と呼ばれ、後に「ピテカントロプス・エレクトス」と称された。今日では、ほとんどの古人類学者によってホモ・エレクトスという種に分類されているが、1940年にフランツ・ワイデンライヒが提唱したように、その起源を強調するために亜種名を追加して「ホモ・エレクトス・ヤバネンシス」とされることもある。デュボワの発見から50年以上が経過した後、ラルフ・フォン・ケーニヒスヴァルトは次のように回想している。「これほど大きなセンセーションを巻き起こし、科学界の意見がこれほど多様に対立する原因となった古生物学上の発見は、他に存在しない。」"
 andersson.51.t: "タウング・チャイルド"
 andersson.51.d: "オーストラリア人のレイモンド・ダートがタウングで並外れた発見をした。猿のような子供の頭部は直立歩行を示している。歯と脳も人類誕生以前の特徴を備えているようだ。タウング・チャイルドは人類と他の霊長類を繋ぐミッシングリンクかもしれない。"
 andersson.51.f: "タウング・チャイルドとは、1924年に南アフリカのタングにある石灰岩採掘場の作業員によって発見され、後に解剖学者レイモンド・ダートによって記載された、幼いヒト族の化石化した頭蓋骨を指す。この標本はアウストラロピテクス・アフリカヌスという種の基準標本となり、アフリカで発見された二足歩行を行う人類の祖先に対して猿人という用語が科学的に初めて適用された事例となった。人類の起源はアジアかヨーロッパであると確信していた当時の科学界からは、当初こそ懐疑的な目で見られたものの、この発見は最終的に古人類学の焦点をアフリカへと移すことになり、この子供の化石は約280万年前のものと特定されている。"
 andersson.101.t: "先史時代の洞窟が発見される"
 andersson.101.d: "長期間にわたる探索の末、[SCOPE.sCharacter('andersson_anthropologist_scope').GetFullName]は洞窟の入り口を発見した。その中には先史時代の人類、あるいは人類の祖先の骨が眠っているのではないかと[SCOPE.sCharacter('andersson_anthropologist_scope').GetSheHe]は睨んでいる。"
 andersson.101.f: "先史時代の洞窟には、人類や人類誕生以前の種の化石だけでなく、人類学上あるいは考古学的な性質を持つ他の出土品が含まれていることがよくある。出土品を評価するには、人類学者が率いる遠征隊による探索が必要である。この研究は、人類の起源の探求を明確にする可能性がある。"
 andersson.101.g: "この洞窟はできるだけ早く調査されるべきだ。"
 andersson.201.t: "ヒト族の探査：種別"
 andersson.201.d: "[ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName]博士は、[GetPlayer.GetName]の領土内で、華々しい――あるいは少なくともある程度は成功するであろう――人類化石の探索を開始するという素晴らしいアイデアを思いついた。利用可能なすべての選択肢が[ROOT.Var('andersson_anthropologist_var').GetCharacter.GetHerHis]の机の上に広げられている。"
 andersson.201.f: "「拝啓、皆様。ここに皆様をお招きし、著名な、あるいは未だ推測の域を出ないヒト族の種別についての一般的な会合を執り行いたいと存じます。多くの方々のご出席を心よりお待ちしております。名称の提案はすべて抽選箱に入れられ、そこから無作為に選出される予定です。皆様の創造力に期待しております！」\n\n署名：[ROOT.Var('andersson_anthropologist_var').GetCharacter.GetFullName]"
 andersson.201.g: "やめておこう。"
 andersson.201.h: "新人"
 andersson.201.i: "旧人"
 andersson.201.j: "原人"
 andersson.201.k: "猿人"
 andersson.211.t: "ヒト族の探査：完了"
 andersson.211.d: "人類学研究グループは無事に作業を完了し、現在その成果を携えて[ROOT.GetCountry.GetCapital.GetCityHubName]へと帰還しつつある。"
 andersson.211.f: "「皆様、今回の件で我々は皆、何かしらの学びを得られたことと存じます！ 人類の起源は未だ謎に包まれていますが、少なくともその闇に一筋の光を当てることはできました。ジャクソン博士は歯の摩耗パターンから先史時代の口腔衛生に関する結論を導き出し、フィッティパルディ博士は発見された石器を文脈に当てはめて古代の技術における微細な差異を特定しました。そしてシャベルナック教授は、なぜ自分が石筍の上に始終座り込むべきではないのかを、ついに理解したのです！」\n\n敬意を込めて：[ROOT.Var('andersson_anthropologist_var').GetCharacter.GetFullName]"
 andersson.211.g: "人類学的な偉業"
 andersson.212.t: "洞窟の中の驚異"
 andersson.212.d: "我々の人類学者が[SCOPE.sState('andersson_cave_state_scope').GetName]で、圧倒されるほど見事な壁画が描かれた洞窟を発見したが、本国の多くの研究者たちは「これほど原始的な段階の人類にこのような芸当ができるはずがない、偽物に違いない」と主張している。"
 andersson.212.f: "「第1回廊の調査を進め、骨や貝殻を含む堆積物がまさに途切れるその場所で、観察者は洞窟の天井に描かれた膨大な数の動物の絵画を目にして驚嘆することになる。大型のこれらの絵画は黒と赤の黄土で描かれたようであり、その大部分は、せむしのような形状からバイソンに類似していると思われる動物を表している。そのうち2頭は側面から全身が完全な姿で描かれており、他のものは頭部がなかったり、理解しがたい姿勢で描かれていたりする。また、非常に巧みに描かれた1頭の雌鹿の全身像や、馬のものと思われる頭部も確認できる。」 ――マルセリーノ・サンス・デ・サウトゥオラ"
 andersson.212.g: "石器時代のシスティーナ礼拝堂だ！"
 andersson.221.t: "[SCOPE.sState('andersson_cave_state_scope').GetMineHubName]人"
 andersson.221.d: "[ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName]博士が、世間を揺るがす大発見を成し遂げました！ 初期人類の化石が発見され、数万年前の定住跡であることが示唆されています。これは、完全に未知の新人の代表例に違いありません。"
 andersson.221.f: "Neoanthropus is a historical taxonomic term utilized in 19th and early 20th-century anthropology to categorize anatomically modern humans as distinct from more 'primitive' fossil hominids. Within the linear evolutionary frameworks of the era, the term served to demarcate the final stage of human development, often used to contrast modern populations with the newly discovered 'Paleoanthropic' lineages. The classification primarily encompassed Homo sapiens, specifically focusing on Late Pleistocene finds such as Cro-Magnon man, who were viewed as the direct ancestors of contemporary Europeans. In the intellectual context of the 1800s, the concept of Neoanthropus was pivotal in establishing a chronological boundary between the 'antediluvian' extinct species, like Neanderthals, and the emergence of modern physical characteristics."
 andersson.221.g: "The [SCOPE.sState('andersson_cave_state_scope').GetMineHubName] Man? I like it."
 andersson.222.t: "The [SCOPE.sState('andersson_cave_state_scope').GetFarmHubName] Man"
 andersson.222.d: "The latest research by Dr. [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName] has revealed a sensational result: apparently, a previously unknown play species of Palaeanthropus lived in the cave."
 andersson.222.f: "Palaeoanthropus is a legacy anthropological designation used in the 19th and early 20th centuries to classify middle-to-late Pleistocene hominids that exhibited more 'archaic' or 'primitive' traits than modern humans. In the developmental hierarchies of Victorian-era science, this category represented a crucial intermediate evolutionary stage, bridging the gap between the most ancient apelike ancestors and the eventual emergence of Neoanthropus. The term was most frequently applied to Neanderthals. For 19th-century researchers, the definition of Palaeoanthropus was central to the debate over whether these extinct forms were direct ancestors of modern humans or an evolutionary dead-end that had been superseded by superior lineages."
 andersson.222.g: "The [SCOPE.sState('andersson_cave_state_scope').GetFarmHubName] Man - sounds good!"
 andersson.223.t: "The [SCOPE.sState('andersson_cave_state_scope').GetCityHubName] Man"
 andersson.223.d: "The bones that Dr. [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName] found during [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetHerHis] last excavation could be hundreds of thousands of years old. If this is true, then it is a Pithecanthropus, the likes of which we have never encountered before."
 andersson.223.f: "Pithecanthropus is a seminal taxonomic designation, literally meaning 'ape-man,' introduced by Ernst Haeckel and later applied by Eugène Dubois to his 1891 discovery of Java Man (Pithecanthropus erectus). In the landscape of 19th-century anthropology, the term represented the 'missing link' hypothesized to exist between non-human primates and the more advanced Palaeoanthropus or Neoanthropus lineages. The classification was initially based on fossil remains found in Indonesia, characterized by a low cranial vault and heavy brow ridges, which were seen as evidence of a transitional evolutionary stage. While modern taxonomy has reclassified these specimens as Homo erectus, the concept of Pithecanthropus was historically significant for providing the first physical evidence of human evolution occurring outside of Europe and within a much deeper chronological timeframe."
 andersson.223.g: "The [SCOPE.sState('andersson_cave_state_scope').GetCityHubName] ... ok."
 andersson.224.t: "The Australopithecus"
 andersson.224.d: "Dr. [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName]'s latest find leaves [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetHerHim] speechless. The fossils [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetSheHe] unearthed on [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetHerHis] last expedition must be at least a million years old, if not older. This Australopithecus - is it more ape or more human?"
 andersson.224.f: "Australopithecus is a genus of extinct hominids that gained scientific prominence following the 1924 discovery of the 'Taung Child,' serving as a definitive link between Miocene apes and the genus Homo. While the term was coined in the early 20th century by Raymond Dart, it fulfilled 19th-century evolutionary predictions by showcasing a creature that combined bipedal locomotion with a relatively small, ape-sized brain. For the field of paleoanthropology, the identification of Australopithecus shifted the perceived 'cradle of humankind' to Africa, fundamentally reorienting the search for human origins away from the previously favored European and Asian theaters."
 andersson.224.g: "I miss the good old days when we just put a random village and the word 'man' together."
 andersson.231.t: "Dead end?"
 andersson.231.d: "While exploring the anthropological site in [SCOPE.sState('andersson_cave_site').GetName], the team also had to contend with some rugged paths and narrow cave passages. As it turned out, the cave entrance was located in a completely different place than Dr. [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName] had thought."
 andersson.231.f: "As it turns out, the cave entrance is not on a rocky outcrop, but almost 1,000 meters below. The team faces a long detour—or a very dangerous route—from the anthropological site."
 andersson.231.g: "The team will have to take a detour, whether they like it or not."
 andersson.231.h: "The doctor should risk taking the shortcut!"
 andersson.232.t: "Cave Drawings"
 andersson.232.d: "The [SCOPE.sState('andersson_cave_site').GetName] cave contains carvings and images that are thousands of years old. However, their meaning and background remain mysterious."
 andersson.232.f: "With the beginning of prehistoric archeology and anthropology, it was assumed, based on the theory of evolution, that people of earlier times did not know any abstract concepts. Artistic expression was therefore excluded. This belief led to the fact that when cave paintings were discovered - most famously in the example of Altamira - it was assumed that they must be fakes. It was only after more and more cave paintings appeared around 1900, particularly in southwestern France, that scientists came to the conclusion that they had to be authentic."
 andersson.232.g: "Our ancestors were not as primitive as we thought."
 andersson.233.t: "Fruitful studies"
 andersson.233.d: "In the last few months, [SCOPE.sCharacter('andersson_anthropologist_scope').GetFullName] has deepened his studies. He has now cataloged numerous finds in the [SCOPE.sState('andersson_cave_site').GetName] cave and recorded the cave system for future generations."
 andersson.233.f: "How long humans had existed was not clear, even for long periods of the 19th century. At the beginning of the century, many scientists had already abandoned the idea that human history only consisted of a few thousand years; But when Boucher de Perthes cited much older stone tools in the 1840s as evidence that humans coexisted with extinct mammal species, it fell on deaf ears. Only the tireless collection and processing of prehistoric remains would soon complete the picture that humans had been walking the world for significantly longer than previously assumed."
 andersson.233.g: "This will be beneficial for him."
 andersson.233.h: "This will be beneficial for science."
 andersson.234.t: "Cave Accident"
 andersson.234.d: "An accident occurred during the exploration of the cave in [SCOPE.sState('andersson_cave_site').GetName]. An assistant fell with a pack donkey. There were only minor injuries, but the equipment needs to be replaced."
 andersson.234.f: "'Work with professionals for once!'"
 andersson.234.g: "Oh no!"
 andersson.236.t: "Cave Maze"
 andersson.236.d: "The collection of bones and prehistoric remains, Dr. [SCOPE.sCharacter('andersson_anthropologist_scope').GetLastName] reports, is being delayed. Several significant discoveries are postponing the transition to bone identification. These are important, very important delays. In fact, there has been no correspondence between the team and the institute for weeks. This can only mean one thing."
 andersson.236.f: "They got completely lost."
 andersson.236.g: "Fools!"
 andersson.237.t: "Stone Age tools"
 andersson.237.d: "[SCOPE.sCharacter('andersson_anthropologist_scope').GetFullName] found prehistoric stone tools in the cave that can provide information about the past."
 andersson.237.f: "In the 19th century, anthropology referred to a science that dealt primarily with the prehistoric history of humanity - in addition to bone finds, this included weapons or tools from the so-called Stone Age, which at the time was less of a scientific term and more of an era perceived to be barbaric. It was dominated by the cliché of the primitive caveman and less by historical reality. Nevertheless, the search for more and more artifacts and remains from this period was an opportunity to differentiate this picture in future years and to establish a genuine prehistoric archeology."
 andersson.237.g: "Examine the tools."
 andersson.237.h: "They belong in a museum!"
 andersson.238.t: "Human Bones"
 andersson.238.d: "Our anthropologist found additional bones during his cave exploration."
 andersson.238.f: "The general opinion is that the 19th and early 20th centuries contained only a few human fossil finds. That's only partly true. It was often the case that a number of early human bone finds were not recognized as such. Although the name Neanderthal comes from the location in the Neandertal, Neanderthal bones had already been found several times before. Even after its discovery, important scientists such as Rudolf Virchow questioned its authenticity and age. The problem was not the number of finds, but rather their verification as actual human remains from ancient times."
 andersson.238.g: "Yummy."
 andersson.239.t: "Assistant finds Fossils"
 andersson.239.d: "A student assistant played a crucial role in securing an anthropological find in the cave at [SCOPE.sState('andersson_cave_site').GetName]. However, [SCOPE.sCharacter('andersson_anthropologist_scope').GetFullName] points out that as head of research he is responsible for the discovery."
 andersson.239.f: "'Do you remember the story of the clever young Athenian who hat the itch of notoriety? He sought the Oracle, and asked 'What shall I do to become a great man?' The Oracle answered: 'Slay one'!' - Richard Owen."
 andersson.239.g: "This discovery was made by the young anthropologist."
 andersson.239.h: "This discovery was made by our senior anthropologist."
 andersson.240.t: "Basket Lost"
 andersson.240.d: "A somewhat embarrassing incident delayed the start of bone identification."
 andersson.240.f: "When the research team had finished their collection and was exploring another area of the anthropological site, the lead researcher, Dr. [SCOPE.sCharacter('andersson_anthropologist_scope').GetLastName], realized somewhat too late that they had lost the bones and artifacts they had collected. They must have misplaced the expedition basket containing the anthropological objects found thus far. Weeks ago."
 andersson.240.g: "Every bone is valuable."
 andersson.240.h: "Hurry up!"
 andersson_conference_anthropologist_double_vote_tt: "Thanks to our experienced anthropologist, we have #G two times#! the voting power."
 andersson_conference_anthropologist_triple_vote_tt: "Thanks to our famous anthropologist, we have #G three times#! the voting power."
 andersson_cave_exploration_decrease_10_tt: "Lose #R 10#! #V Exploration Progress#!."
 andersson_cave_exploration_decrease_20_tt: "Lose #R 20#! #V Exploration Progress#!."
 andersson_cave_collection_decrease_10_tt: "Lose #R 10#! #V Collection Progress#!."
 andersson_cave_collection_decrease_20_tt: "Lose #R 20#! #V Collection Progress#!."
 andersson.301.a: "Reconstruction Type Selection"
 andersson.301.d: "[ROOT.Var('andersson_anthropologist_var').GetCharacter.GetFullName] retreated to his bone collection with some fossils and meticulously arranged the finds according to their location and similarity. Apparently, the bones fit together to form a skeleton. But which one?"
 andersson.301.f: "'The head bone's connected to—the rib bone\nThe rib bone's connected to the—leg bone\nThe leg bone's connected to the—hip bone\nThe hip bone is connected to the—arm bone.\nThe arm bone is connected to the—head bone.\nThe head bone is connected to the—rib bone."
 andersson.301.g: "The [GetPlayer.GetCustom('andersson_fossil_vero')] Man."
 andersson.301.h: "The [GetPlayer.GetCustom('andersson_fossil_lagoa_santa')] Man."
 andersson.301.i: "The [GetPlayer.GetCustom('andersson_fossil_cro_magnon')] Man."
 andersson.301.j: "The [GetPlayer.GetCustom('andersson_fossil_boskop')] Man."
 andersson.301.k: "The [GetPlayer.GetCustom('andersson_fossil_tianyuan')] Man."
 andersson.301.l: "The [GetPlayer.GetCustom('andersson_fossil_talgai')] Man."
 andersson.301.m: "The [GetPlayer.GetCustom('andersson_fossil_neanderthal')] Man."
 andersson.301.n: "The [GetPlayer.GetCustom('andersson_fossil_gibraltar')] Man."
 andersson.301.o: "The [GetPlayer.GetCustom('andersson_fossil_spy')] Man."
 andersson.301.p: "The [GetPlayer.GetCustom('andersson_fossil_krapina')] Man."
 andersson.301.q: "The [GetPlayer.GetCustom('andersson_fossil_galilee')] Man."
 andersson.301.r: "The [GetPlayer.GetCustom('andersson_fossil_heidelberg')] Man."
 andersson.301.s: "The [GetPlayer.GetCustom('andersson_fossil_rhodesian')] Man."
 andersson.301.t: "The [GetPlayer.GetCustom('andersson_fossil_peking')] Man."
 andersson.301.u: "The [GetPlayer.GetCustom('andersson_fossil_java')] Man."
 andersson.301.v: "The [GetPlayer.GetCustom('andersson_fossil_australopithecus')]."
 andersson.311.t: "New Prehistoric Skeleton"
 andersson.311.d: "At a public event, Dr. [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName] presented the new prehistoric skeleton to the public. The scientific community has taken note of the reconstruction."
 andersson.311.f: "'You can only look forward as far as you can look back. -Raymond Dart"
 andersson.311.g: "[GetPlayer.GetName] is a world-class scientific nation!"
 andersson.911.t: "Anthropological Congress: Origin of Modern Humans"
 andersson.911.d: "Our country will host the most important congress in the history of anthropology. One of the great questions of humanity, namely that of its origin, should be clarified. Anthropologists from around the world will discuss whether this happened in Europe, Asia or Africa. [SCOPE.sCharacter('andersson_anthropologist_scope').GetFullName] will lead the debate."
 andersson.911.f: "Where does man come from? The biblical story about the expulsion from paradise already contains the core of this question - he obviously does not come from the region in which he lives today. Consequently, for a long time in Europe, ancient human bones were thought to be the remains of those people who perished in the Great Flood - just as dinosaurs were long thought to be animals that had no place on the ark. With the postulation of the ice age theory and subsequent geological and paleontological studies, which showed that the earth was significantly older than expected, interest in 'cavemen' increased. At the latest with the theory of evolution and the discovery of prehistoric bones that were more than a few thousand years old, the question of the place of origin of modern humans became more virulent."
 andersson.911.g: "Where is the cradle of humanity?"
 andersson.912.d: "[SCOPE.sCountry('andersson_congress_host_country').GetName] has invited to an international science congress. The topic will be the origin of modern humans. Professor [SCOPE.sCharacter('andersson_anthropologist_scope').GetLastName] has received a warm invitation."
 andersson.914.t: "Did modern humans emerge in Europe, Asia or Africa?"
 andersson.914.d: "The academic world has divided into three camps. The question of the cradle of humanity is not only linked to a certain national pride, but also to further theses on human evolution."
 andersson.914.f: "In a stimulating debate, the respective advocates of the three camps exchanged their arguments. [SCOPE.sCharacter('andersson_europe_defender_scope').GetLastName] brought Europe into the field because the finds so far showed the largest brain volume in European fossils. Since the larger brain preceded upright walking, this is inevitable. [SCOPE.sCharacter('andersson_asia_defender_scope').GetLastName] doubted this theory. The fossils of upright walking, human-like representatives have already been found in Asia - the brain therefore only developed after walking upright. [SCOPE.sCharacter('andersson_africa_defender_scope').GetLastName], on the other hand, pointed out that the known ape species that are closest to humans came from Africa, not Asia. As the inventor of the evolution theory had based it, the origin of humanity had to be found there."
 andersson.914.g: "Modern humans developed in Europe."
 andersson.914.h: "Everything points to an Asian origin."
 andersson.914.i: "The cradle of humanity lies in Africa."
 andersson.915.t: "Respected Speech"
 andersson.915.d: "[SCOPE.sCharacter('andersson_anthropologist_scope').GetFullName] gave a lecture to the assembled scientific staff in [SCOPE.sCountry('andersson_congress_host_country').GetName] that inspired the audience and young academics alike."
 andersson.915.f: "'The Earth is the cradle of humanity, but mankind cannot stay in the cradle forever.'\n -Konstantin Tsiolkovsky."
 andersson.915.g: "Professor [SCOPE.sCharacter('andersson_anthropologist_scope').GetLastName] makes a considerable impression."
 andersson.916.t: "Valuable Contribution to the Debate"
 andersson.916.d: "A brilliant scientific lecture by Professor [SCOPE.sCharacter('andersson_anthropologist_scope').GetFullName] broadened the horizons of the academic world at the science congress in [SCOPE.sCountry('andersson_congress_host_country').GetName]. It will probably have a long-lasting effect."
 andersson.916.f: "'He held very strange theories about a good many things. He had even got up once at the British Association, and declared that apes had hippopotamus majors in their brains just as men have. Which was a shocking thing to say; for, if it were so, what would become of the faith, hope, and charity of immortal millions? You may think that there are other more important differences between you and an ape, such as being able to speak, and make machines, and know right from wrong, and say your prayers, and other little matters of that kind; but that is a child's fancy, my dear. Nothing is to be depended on but the great hippopotamus test. If you have a hippopotamus major in your brain, you are no ape, though you had four hands, no feet, and were more apish than the apes of all aperies.' -Charles Kingsley"
 andersson.917.t: "Anthropological Heritage"
 andersson.917.d: "At the congress, the sad news was announced that a renowned anthropologist had passed away a few days earlier. His private collection is to be auctioned off."
 andersson.917.f: "'The man had no children, no wife, and no friends, but plenty of old stones and bones. What a blessed life!'"
 andersson.917.g: "Every bone is valuable to our collection."
 andersson.917.h: "...but we have enough bones."
 andersson.919.t_europe: "Modern humans come from Europe"
 andersson.919.t_asia: "Modern humans come from Asia"
 andersson.919.t_africa: "Modern humans come from Africa"
 andersson.919.d_europe: "International science has agreed on a European origin of modern humanity. Non-European scholars have denounced this decision as suprematism."
 andersson.919.d_asia: "The International Anthropological Congress recently agreed on the compromise that humans must come from Asia. Most members of the Assembly agreed with this view."
 andersson.919.d_africa: "After a very controversial final debate, the scientists were able to agree by a narrow majority that the origin of humanity should be located in Africa."
 andersson.919.f_europe: "Historically, the question of the actual place of origin of humanity was not resolved at the beginning of the 20th century. While a small group, partly misled by the discovery of the so-called Piltdown Man, suspected the origin of modern man in Europe less for scientific than ideological reasons, the Asia theory had received the most support. The discoveries on Java and the recovery of the Peking Man played a large part in this. It was only from the middle of the 20th century that more and more African finds began to erode this view."
 andersson.919.f_asia: "Historically, the question of the actual place of origin of humanity was not resolved at the beginning of the 20th century. While a small group, partly misled by the discovery of the so-called Piltdown Man, suspected the origin of modern man in Europe less for scientific than ideological reasons, the Asia theory had received the most support. The discoveries on Java and the recovery of the Peking Man played a large part in this. It was only from the middle of the 20th century that more and more African finds began to erode this view."
 andersson.919.f_africa: "Historically, the question of the actual place of origin of humanity was not resolved at the beginning of the 20th century. While a small group, partly misled by the discovery of the so-called Piltdown Man, suspected the origin of modern man in Europe less for scientific than ideological reasons, the Asia theory had received the most support. The discoveries on Java and the recovery of the Peking Man played a large part in this. It was only from the middle of the 20th century that more and more African finds began to erode this view."
 andersson.919.g: "As expected, Humanity evolved in Europe."
 andersson.919.h: "All evidences suggests that humanity evolved in Asia."
 andersson.919.i: "'Out of Africa' is an approved thesis now."
