l_japanese:
 rule_andersson_anthropology_rule: "#tooltip:[GetRawTextTooltipTag('mr_morgenroete_tt')] @mr_morgenroete_icon! #! 人類学のルール"
 setting_andersson_anthropology_historical_rule: "#tooltippable #tooltip:[GetPlayer.GetTooltipTag],setting_andersson_anthropology_historical_rule_desc 歴史的#!#!"
 setting_andersson_anthropology_historical_rule_desc: "歴史的な日付以降に、[Concept('concept_andersson_human_fossil','$MR_FOSSILS$')]が発見されるようになります。歴史的イベントの一環として発見されたヒト化石は、人類学的な威信を得られません。もしある国が歴史的な日付よりも前にヒト化石を発見した場合、その発見には発見場所にちなんだ一般的な名称が付けられます。"
 setting_andersson_anthropology_free_rule: "#tooltippable #tooltip:[GetPlayer.GetTooltipTag],setting_andersson_anthropology_free_rule_desc 自由#!#!"
 setting_andersson_anthropology_free_rule_desc: "[concept_andersson_human_fossil]の発見に関連する特定の歴史的イベントはありません。すべての発見には、それが発見された場所にちなんだ一般的な名称が付けられます。"
 andersson_has_active_anthropologist_tt: "多忙ではない[concept_andersson_anthropologist]がいる。"
 andersson.106.t: "人類学調査隊の出発"
 andersson.106.d: "人類学調査隊が任務を終えた後、研究助手たちは本国へと帰還します。彼らが発見した洞窟は、今や我が国の科学者たちも立ち入り可能となっています。"
 andersson.106.f: "「この深淵に足を踏み入れた人間は、我々の前には誰もいない。我々がどこへ向かっているのか、何を目にするのかも誰一人知らない。これほど奇妙で美しい光景は未だかつて提示されたことがなく、我々は思わずお互いに同じ問いを投げかける。――我々は夢を見ているのではないか、と」――チャールズ・ライエル"
 andersson.106.g: "あの外国人は助けになった"
 andersson_anthropologist_dies_tt: "[concept_andersson_anthropologist]が無くなるとジャーナル記事は失敗する。"
 je_andersson_reconstruct_prehistoric_skeleton: "先史時代の骨格の復元"
 je_andersson_reconstruct_prehistoric_skeleton_reason: "人類学者は、自身の経験と特徴に基づいて骨格を復元します。各人類種（新人、旧人、原人、アウストラロピテクス）の最初の骨格は、研究所に追加で展示され、威信（プレステージ）のボーナスをもたらします。人類学者はその他の様々な人類種の骨格もすべて復元することができ、それによってさらに人類学的な威信を蓄積していくことが可能です。"
