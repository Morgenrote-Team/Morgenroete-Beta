 andersson_piltdown_debate_won_modifier: "[GetPlayer.GetCustom('andersson_fossil_piltdown')] Man: Debate Won"
 andersson_piltdown_debate_lost_modifier: "[GetPlayer.GetCustom('andersson_fossil_piltdown')] Man: Debate Lost"
 andersson.501.t: "[GetPlayer.GetCustom('andersson_fossil_piltdown')] Man is a fraud!"
 andersson.501.d: "After thorough investigation by Dr. [SCOPE.sCharacter('andersson_piltdown_attacker_scope').GetLastName], [SCOPE.sCharacter('andersson_piltdown_attacker_scope').GetSheHe] has proven the alleged human remains to be fake. This is a huge embarrassment for [GetGlobalVariable('andersson_piltdown_country_global_var').GetCountryDefinition.GetName]. The [SCOPE.sCountry('andersson_piltdown_defender_country_scope').GetAdjectiveNoFormatting] chief anthropologist, Dr. [SCOPE.sCharacter('andersson_piltdown_defender_scope').GetLastName], has been exposed as a grifter!"
 andersson.501.f: "Since the discovery of the [GetPlayer.GetCustom('andersson_fossil_piltdown')] Man, several non-[SCOPE.sCountry('andersson_piltdown_defender_country_scope').GetAdjectiveNoFormatting] scientists had expressed considerable doubts about its authenticity, and rather attributed the 'discovery' to the [SCOPE.sCountry('andersson_piltdown_defender_country_scope').GetAdjectiveNoFormatting] need for recognition. Several attempts by respected academics to prove the fraud have so far failed. But [SCOPE.sCharacter('andersson_piltdown_attacker_scope').GetFullName] has finally revealed to the world what the discovery really is: the biggest hoax in the history of anthropology. Not only was the skull much more recent than claimed and only came from the Middle Ages; the forger had combined the human upperside with the jaws of an orangutan."
 andersson.501.g: "In the end, serious science wins."
 andersson.502.t: "A Scientific Disaster!"
 andersson.502.g: "An international embarrassment beyond compare!"
 andersson.503.t: "Debate Lost"
 andersson.503.d: "Despite [SCOPE.sCharacter('andersson_piltdown_attacker_scope').GetHerHis] numerous arguments, Dr. [SCOPE.sCharacter('andersson_piltdown_attacker_scope').GetLastName] ultimately failed to convince the academic world that the [GetPlayer.GetCustom('andersson_fossil_piltdown')] Man is actually a forgery. Dr. [SCOPE.sCharacter('andersson_piltdown_defender_scope').GetLastName] has proven to be an outstanding speaker."
 andersson.503.f: "Apparently, the [SCOPE.sCountry('andersson_piltdown_defender_country_scope').GetAdjectiveNoFormatting] scientist still had a few aces up [SCOPE.sCharacter('andersson_piltdown_defender_scope').GetHerHis] sleeve on the day of the debate. Our anthropologist blames bias, bribes, and a bad breakfast for the failure."
 andersson.503.g: "Perhaps the find is real after all...?"
 andersson.504.t: "A Scientific Triumph"
 andersson.504.d: "The attempt by an insignificant scientist from an even more insignificant country to expose our valuable [GetPlayer.GetCustom('andersson_fossil_piltdown')] human as a forgery has failed. The Anthropological Institute emerges strengthened from this dispute."
 andersson.504.f: "It is absolutely obvious that modern man must have originated in [SCOPE.sCountry('andersson_piltdown_defender_country_scope').GetName] if this is all that foreign countries have to offer with their silly arguments."
 andersson.504.g: "Next please!"
 andersson.511.t: "[GetPlayer.GetCustom('andersson_fossil_piltdown')] Man: Debate Preparation"
 andersson.511.d: "Dr. [SCOPE.sCharacter('andersson_piltdown_attacker_scope').GetLastName] is preparing to expose a significant fossil as a forgery. [SCOPE.sCharacter('andersson_piltdown_attacker_scope').GetSheHe|U] will be opposed by Dr. [SCOPE.sCharacter('andersson_piltdown_defender_scope').GetLastName]. Both are defending their honor and that of their country."
 andersson.511.f: "An anthropologist's debating strength is based primarily on their experience and secondarily on their character traits. There is also a small element of chance, as daily fluctuations in form are factored in. The country possessing the fossil has a slight advantage, since a new theory must first prevail against an established one. The anthropologist with the higher debating strength score wins the debate. The defender also wins in the event of a tie.\n\n[SCOPE.sCharacter('andersson_piltdown_attacker_scope').GetFullNameNoFormatting] from [SCOPE.sCountry('andersson_piltdown_attacker_country_scope').GetName]: [SCOPE.GetValue('andersson_piltdown_attacker_points_scope')|0+] #V Debating Prowess#!\n\n[SCOPE.sCharacter('andersson_piltdown_defender_scope').GetFullNameNoFormatting] from [SCOPE.sCountry('andersson_piltdown_defender_country_scope').GetName]: [SCOPE.GetValue('andersson_piltdown_defender_points_scope')|0+] #V Debating Prowess#!"
 andersson.511.g: "We are putting [GetGlobalVariable('andersson_piltdown_country_global_var').GetCountryDefinition.GetName] in a public-scientific debate!"
 andersson.511.h: "On second thought, this doesn't seem like a good idea."
