 andersson_evolutionist: "Evolutionist"
 andersson_evolutionist_desc: "An evolutionist is an anthropologist explaining cultures through independent development."
 andersson_diffusionist: "Diffusionist"
 andersson_diffusionist_desc: "A diffusionist is an anthropologist who explains cultures mainly through the spread of ideas between societies."
