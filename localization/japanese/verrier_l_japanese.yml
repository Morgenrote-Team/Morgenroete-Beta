 verrier_astronomer: "天文学者"
 verrier_astronomer_desc: "この科学者は星降る空での現象を研究し、望遠鏡で日夜天体を観測している。"
 verrier_astronomer_experienced: "経験豊富な天文学者"
 verrier_astronomer_experienced_desc: "このキャラクターは天文学の世界で大きな発見を成し遂げ、世間一般からも高く評価されています。"
 verrier_astronomer_famous: "著名な天文学者"
 verrier_astronomer_famous_desc: "この天文学者は数々の発見で宇宙の謎を解き明かしてきた。そのため現代最高峰の頭脳として評価されている。"
 verrier_mathematician: "数学者"
 verrier_mathematician_desc: "このキャラクターは数学の世界で大きな発見を成し遂げ、世間一般からも高く評価されています。"
 verrier_physics_tech: "古典物理学"
 verrier_physics_tech_desc: "近世初期、ヨーロッパでは定量的な実験手法をもちいて現在につながる物理法則が解き明かされ、物理学が独立した科学分野になりました。16世紀から17世紀にかけての大きな発見は、コペルニクスによる天動説から地動説への移行、1609年から19年にかけてケプラーが発表した惑星の運動法則、ガリレオ・ガリレイによって改良された望遠鏡や観測天文学などが挙げられます。そしてアイザック・ニュートンが万有引力などの力学法則を発見し、それを統一的な理論にまとめました。"
 verrier_astronomy_tech: "近代天文学"
 verrier_astronomy_tech_desc: "18世紀から19世紀にかけて、レオンハルト・オイラー、アレクシス・クロード・クレロー、ジャン・ル・ロン・ダランベールが「三体問題」の研究をすすめたことで、月や惑星の動きをより正確に予測できるようになりました。のちにジョセフ＝ルイ・ラグランジュとピエール・シモン・ラプラスがこの分野の研究をさらに推し進めた結果、太陽系内の惑星・衛星は、その軌道のズレ（摂動）から質量を予測できるようになりました。"
 verrier_electromagnetism_tech: "電磁気学"
 verrier_electromagnetism_tech_desc: "1864年、エディンバラ出身のジェームス・クラーク・マクスウェルが光の電磁理論を発表しました。これは電気についての世界史上最大級の発見といっても過言ではないでしょう。マクスウェルの理論は、空間を飛び交う「電波」の存在をあきらかにしました。その後の科学者たちは、実験によってマクスウェルの理論を実証しました。空気中の電磁波の発見は、19世紀末のラジオの発明につながりました。"
 verrier_chemistry_tech_desc: "19世紀前半、アレッサンドロ・ボルタの「ボルタ電堆」の発明を皮切りに、イェンス・ヤコブ・ベルセリウスとハンフリー・デイヴィは電気をつかって化合物を分解し、電気化学の分野を開拓しました。イギリス人のウィリアム・プラウトは、すべての元素を原子の重さを基準に並べると、すべての原子は水素原子の整数倍であるとの仮説を提唱しました。ジョン・ニューランズは、初期の元素表をつくり、現在の元素周期表の発明につながりました。"
 je_verrier_neptune: "未知の惑星"
 je_verrier_neptune_reason: "1821年、アレクシス・ブヴァールは天王星の軌道をまとめた運動表を発表しました。この中でブヴァールは、ニュートン力学をもちいて将来の天王星の位置を予測しました。その後の観測で、運動表と実際の天王星の軌道にズレが生じ、ブヴァールはなんらかの天体が軌道を乱しているとの仮説を立てました。\nこのように惑星の黄経や動径（太陽までの距離）のズレについて、当時いくつかの仮説が存在しました。遠く離れた太陽の引力は、ニュートンの理論とは異なる影響を与えるとの説や、単純な観測ミス説。そして天王星が未知の惑星からの弱い引力の影響をうけているとの説です。\nジョン・クーチ・アダムスは学部生時代にこのズレを知ると、未知の惑星の存在を確信しました。彼は天王星の軌道をニュートンの万有引力の法則に当てはめることで、未知の惑星の質量、位置、軌道を割り出せると考えていました。\nおなじ頃、1845年11月10日、ユルバン・ルヴェリエは、既知の理論では天王星の軌道を説明できないとの論文をパリ科学アカデミーに提出しました。アダムスの研究を知らなかったルヴェリエも同じ結論に達し、翌1846年1月1日、第2の論文をアカデミー公会に提出しました。そこには未知の惑星の位置は書かれていましたが、その質量と軌道は載っていませんでした。のちに発見されたこの惑星の位置とルヴェリエの計算結果の差は1度以下でした。\n一方イギリス側でもアダムスが内々に位置計算をおこない、未知の惑星を発見しようとしましたが、ルヴェリエはそのことを知りませんでした。46年8月31日、ルヴェリエは第3の論文を提出し、未知の惑星の質量と軌道を割り出しました。あとは天体を発見し、その実在を証明するだけです。"
 je_verrier_neptune_fail: "天体発見数第2位の国には、努力賞が与えられる。それ以外の国の努力はすべて無駄になる。"
 je_verrier_pluto: "惑星X"
 je_verrier_pluto_reason: "1840年代、ユルバン・ルヴェリエはニュートン力学をもちいて天王星の軌道をズレ（摂動）を分析し、当時知られていなかった海王星の位置を算出しました。そして19世紀後半、天文学者たちは海王星を観測するなかで、天王星の軌道に影響を与える惑星が海王星以外にも存在すると推測するようになりました。\nこれに目を付けたのが、ボストン出身の富豪パーシヴァル・ローウェルです。彼は天文学にも関心を寄せ、1894年にアリゾナ州フラッグスタッフにローウェル天文台を設立しました。1906年、彼は未知の惑星を「惑星X」と命名し、「惑星X」発見をめざす大規模プロジェクトを立ち上げました。1909年、ローウェルとウィリアム・P・ピッカリングは「惑星X」の候補を複数の天体にまで絞りました。その後もローウェルは1916年に亡くなるまで天文台で調査を続けましたが、成果はありませんでした。実は1915年3月19日と4月7日に撮影した写真には「惑星X」がかすかに写り込んでいたのですが、ローウェルを含めた研究チームはそれに気づいていなかったのです。その後ローウェルの妻コンスタンスが夫の遺産である天文台をめぐって法廷闘争を続けたことで、「惑星X」捜索は中断されました。\n1929年、ベストー・メルヴィン・スライファー天文台長は、当時23歳のクライド・トンボーに「惑星X」捜索の再開を命じました。トンボーは天文台に就職したばかりでしたが、その見事な製図術にスライファーが惚れ込んでの抜擢でした。トンボーは時間をおいて撮影した夜空の写真2枚を並べて比較し、移動している天体がないかを調べる手法を使いました。このとき使用したのがブリンクコンパレータという装置で、2枚の写真をすばやく並べ替えることで、位置や明るさが変化している天体が動いているように見えるというしくみでした。1930年2月18日、1年ほどの調査を経て、トンボーは写真のなかで移動しているとおぼしき天体を発見しました。 "
 je_verrier_pluto_fail: "他国が先に条件を満たして惑星Xを発見すると、わが国の努力はすべて無駄になる。"
 je_verrier_charter_moon: "月の地図"
 je_verrier_charter_moon_reason: "月理学（月面地理学、月測量学とも）とは、月の地表や物理学的特徴を調べる学問で、地理学や火星地理学とならぶ惑星科学の一分野です。\nかつて月理学者の大きな関心は月の地図をつくり、そして月の海やクレーター、山脈などのさまざまな地形を分類して名前をつけることにありました。月面製図の体系化は1799年、ヨハン・シュレーターによる正確な観測と月面地勢の測定からはじまりました。1834年、ヨハン・ハインリヒ・フォン・メドラーは世界初の大判月面図を作成しました。これは4面からなる地図で、のちに『万国月面地図』として出版しました。\nこうした月面地図はすべて直接観測に基づいていましたが、1840年3月にジョン・ウィリアム・ドレーパーが5インチ反射望遠鏡を使って月の銀板写真（ダゲレオタイプ）を撮影し、天文学に写真撮影を導入しました。当初の写真はほとんど使いものになりませんでしたが、17世紀の望遠鏡のように、月面写真のクオリティも急速に向上しました。1890年には、月面撮影学は天文学の一分野として認められました。"
 je_verrier_charter_moon_success: "#G 10#!@verrier_moon_photo!#T 月面写真#!を集めると、月面図の作成ができるようになる。"
