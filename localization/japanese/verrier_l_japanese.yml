 verrier_show_astronomical_decisions_desc: "天文学ディシジョンをすべて表示"
 verrier_found_observatory_decision: "天文台の建設"
 verrier_found_observatory_decision_desc: "In the 19th century, astronomy made enormous progress, not least because of the patronage of the nation states. The hunt for celestial bodies was also started because the naming of new stars, planets or asteroids secured prestige for countries and rulers. With ever newer methods, such as the modernization of telescopes or the introduction of photography, the yield increased immensely. Building an observatory will result in passive discovery of new celestial bodies every year; the exact number can be checked in the observatory itself, when it is completed. New technologies and an [concept_verrier_astronomer] improve the statistics."
 verrier_charter_moon_decision: "月の地図"
 verrier_charter_moon_decision_desc: "Atlases of the moon and the concomitant attempt to map Earth's companion have existed for centuries. The invention of the telescope revolutionized this science, known as 'selenography', but with the invention of photography we have a whole new way of accurately mapping the moon."
 verrier_visit_observatory_decision: "天文台訪問"
 verrier_visit_observatory_decision_desc: "Visit the main observatory of our country to see all important national and international information on astronomy."
 verrier_asteroid_congress_decision: "小惑星を巡る天文学会議"
 verrier_asteroid_congress_decision_desc: "Since the discovery of Ceres in 1801, astronomers have found more and more celestial bodies, which is why the number of planets in the solar system has continued to increase. The discovery of Neptune raised the question of whether a new category might make more sense for the numerous, smaller objects found particularly between Mars and Jupiter. In particular, the invention of new astronomical symbols and their relatively small size led astronomers to assume that they were more likely 'small stars' or 'small planets'. Of course, this categorization would mean that some of the objects previously considered planets would lose their status and would be degraded to mere boulders."
 verrier_asteroid_congress_decision_tt: "The more celestial bodies are found, the more urgent a reform of the previous definition of planets becomes. With more than #BLUE 1,500#! objects, the situation is likely to become so confusing that a conference becomes unavoidable."
 verrier_carte_congress_decision: "写真天図星表"
 verrier_carte_congress_decision_desc: "A vast and unprecedented international star-mapping project was initiated in 1887 by Paris Observatory director Amédée Mouchez, who realized the potential of the new dry plate photographic process to revolutionize the process of making maps of the stars. As a result of the Astrographic Congress of more than 50 astronomers held in Paris in April 1887, 20 observatories from around the world agreed to participate in the project. We can host such a congress to share the astronomical knowledge of the international community."
 verrier_great_debate_decision: "大論争"
 verrier_great_debate_decision_desc: "The Shapley-Curtis Debate, also known as The Great Debate, bundled the early 20th century discussions that eventually led to a new understanding of the nature of galaxies and the size of the Universe. It revolved around the size of the Milky Way and whether the galaxies then known as spiral nebulae are small objects in the Milky Way or much more distant and separate from the Milky Way. That day, the two scientists presented independent technical papers on the size scale of the Universe, followed by a public discussion in the evening. We can hold such a congress to discuss the ultimate mysteries of the universe."
 notification_verrier_astronomical_observation_notification_name: "天文学の年次報告"
 notification_verrier_astronomical_observation_notification_desc: "わが国の[Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')]は、今年あらたに[GetPlayer.MakeScope.Var('verrier_astronomical_objects_notification_var').GetValue|0+=][Concept('concept_verrier_astronomical_object','$concept_verrier_celestial_bodies$')]を発見、記録した"
 verrier.10.t: "海王星の発見"
 verrier.10.d: "[SCOPE.sCharacter('verrier_astronomer_scope').GetFullName]は海王星を発見し、わが国に栄誉をもたらしました！"
 verrier.10.f: "海王星が発見されたのは真夜中過ぎでした。捜索は1時間もかからずに終了し、ルヴェリエが算出した位置の誤差も1度未満という驚くべき正確さでした。その後二晩かけて位置と軌道を確認し、[SCOPE.sCharacter('verrier_astronomer_scope').GetFullName]は驚いてルヴェルリに応えました。\n「あなたの（算出した）場所に、本当に惑星がありました！」"
 verrier.10.g: "世界中が羨望のまなざしを向けるだろう！"
 verrier.5.t: "天文台の落成式"
 verrier.5.d: "本日、厳かな式典が催され、わが国の天文学研究の中心となる天文台の完成を祝いました。"
 verrier.5.f: ""
 verrier.5.g: "Visit the new Observatory."
 verrier.6.t: "天文台の解体"
 verrier.6.d: "わが国の天文学者たちは、いくつかの天文台の閉鎖を決断しました。"
 verrier.6.f: "昨今の政変によって、国内に複数の天文台を抱えることになりました。競争を廃し、政府予算を首都の主力天文台に集中させるために、科学者たちは地方の天文台を閉鎖して機能を停止しました。これまでの研究成果は、首都の一流の科学陣のもとに集約されます。"
 verrier.6.g: "もったいないが、仕方ない"
 verrier.6.h: "その……まだ首都に天文台がないんだ。移転しよう！"
 verrier.11.d: "今日、[SCOPE.sCountry('verrier_neptune_discoverer_country').GetName]の科学者が話したところによると、かの国の天文学者がこれまで知られていなかった未知の惑星、海王星を発見したそうです。"
 verrier.11.g: "おめでとう……"
 verrier.20.t: "冥王星の発見"
 verrier.20.d: "[SCOPE.sCharacter('verrier_astronomer_scope').GetFullName]は冥王星を発見し、わが国に栄誉をもたらしました！"
 verrier.20.f: "冥王星は暗く円形にも見えないため、発見されてからも本当に「惑星X」なのかと疑問視する声がありました。事実、一部の科学者にとっては納得できない天体でした。当初天文学者たちは冥王星の質量を予測する際に、天王星や海王星の軌道に影響をあたえることを前提条件としていました。しかし20世紀にかけて、冥王星の質量予測値はたびたび下方修正されました。1931年、冥王星の質量は地球とほぼ同じと算出され、1948年には修正されて火星の質量にほぼ等しいとされました。とはいえ、この発見は世界中で大々的に報道されました。"
 verrier.20.g: "小さくても惑星だ"
 verrier.21.d: "今日、[SCOPE.sCountry('verrier_pluto_discoverer_country').GetName]の科学者が話したところによると、かの国の天文学者がこれまで知られていなかった未知の惑星、冥王星を発見したそうです。"
 verrier.21.g: "本当に惑星なのか？"
 verrier.30.t: "小惑星を巡る天文学会議"
 verrier.30.d: "これまで惑星としてカウントされてきた一部の天体をどうするかを決める国際会議が開かれました。"
 verrier.30.f: "19世紀初頭、小型の天体があいついで発見されると、こうした天体は今までの惑星の定義には当てはまらないのではないかとの疑問が浮上しました。なかでも近年発見された海王星は古くから知られていた惑星との類似点が多いだけに、この議論をますます加速させました。こうして若干のためらいはありつつも、これまで半世紀近く惑星に分類されてきたパラス・ヴェスタ・ジュノーの3つの天体は、新たなカテゴリー「小惑星」に分類されました。しかし現在、1801年にジュゼッペ・ピアッツィが発見した小型の惑星、ケレスをどうするかについて意見が分かれています。古典派の学者たちは、ケレスを惑星として残留させるよう求めています。確かにケレスは他の惑星と比べると小さいですが、小惑星としては大きすぎるのです。そのため会議の出席者からは、投票を求める声が出ています。"
 verrier.30.f_astraea: "19世紀初頭、小型の天体があいついで発見されると、こうした天体は今までの惑星の定義には当てはまらないのではないかとの疑問が浮上しました。なかでも近年発見された海王星は古くから知られていた惑星との類似点が多いだけに、この議論をますます加速させました。こうして若干のためらいはありつつも、これまで半世紀近く惑星に分類されてきたパラス・ヴェスタ・ジュノー・アストラエアの4つの天体は、新たなカテゴリー「小惑星」に分類されました。しかし現在、1801年にジュゼッペ・ピアッツィが発見した小型の惑星、ケレスをどうするかについて意見が分かれています。古典派の学者たちは、ケレスを惑星として残留させるよう求めています。確かにケレスは他の惑星と比べると小さいですが、小惑星としては大きすぎるのです。そのため会議の出席者からは、投票を求める声が出ています。"
 verrier.30.g: "この惑星が好きだ。ケレスの処遇は投票で決めよう"
 verrier.30.h: "これ以上会議を開く必要はない"
 verrier.31.t: "ケレスの地位"
 verrier.31.d: "[SCOPE.sCountry('verrier_congress_host_country').GetName]の主催する天文学会議への招待が届きました。もっとも大きな議題は、（元？）惑星ケレスの地位についてです。"
 verrier.31.f: "19世紀初頭、小型の天体があいついで発見されると、こうした天体はこれまでの惑星の定義には当てはまらないのではないかとの疑問が浮上しました。なかでも近年発見された海王星は、古くから知られていた惑星との類似点が多いだけに、この議論をますます加速させました。こうして若干のためらいはありつつも、これまで半世紀近く惑星に分類されてきたパラス・ヴェスタ・ジュノーの3つの天体は、新たなカテゴリー「小惑星」に分類されました。しかし現在、1801年にジュゼッペ・ピアッツィが発見した小型の惑星、ケレスをどうするかについて意見が分かれています。古典派の学者たちは、ケレスを惑星として残留させるよう求めています。確かにケレスは他の惑星と比べると小さいですが、小惑星としては大きすぎるのです。一方別のグループは、ケレスを惑星として残留させると他の大型天体も惑星にカウントすることになり、天文学がより難しくなると訴えています。"
 verrier.31.f_astraea: "19世紀初頭、小型の天体があいついで発見されると、こうした天体はこれまでの惑星の定義には当てはまらないのではないかとの疑問が浮上しました。なかでも近年発見された海王星は、古くから知られていた惑星との類似点が多いだけに、この議論をますます加速させました。こうして若干のためらいはありつつも、これまで半世紀近く惑星に分類されてきたパラス・ヴェスタ・ジュノー・アストラエアの4つの天体は、新たなカテゴリー「小惑星」に分類されました。しかし現在、1801年にジュゼッペ・ピアッツィが発見した小型の惑星、ケレスをどうするかについて意見が分かれています。古典派の学者たちは、ケレスを惑星として残留させるよう求めています。確かにケレスは他の惑星と比べると小さいですが、小惑星としては大きすぎるのです。一方別のグループは、ケレスを惑星として残留させると他の大型天体も惑星にカウントすることになり、天文学がより難しくなると訴えています。"
 verrier.31.g: "ケレスは惑星である"
 verrier.31.h: "ケレスは惑星ではない"
 verrier.32.t_demoted: "ケレス降格"
 verrier.32.t_saved: "ケレス残留"
 verrier.32.d_demoted: "天文学会議はケレスの惑星としての地位を剥奪しました。"
 verrier.32.d_saved: "天文学会議はケレスの惑星としての地位を確認しました。"
 verrier.32.f_demoted: "結果は当然といえるでしょう。他の小型天体が小惑星であるならば、ケレスもまた小惑星に分類されるべきです。天文学者たちも、ケレスが「小惑星帯」では最大の天体であり、元惑星としての地位を尊重して小惑星番号1を割り当てることまでは同意しているが、裏を返せばそれだけです。惑星としての地位は科学のみならず文化へのインパクトを考慮すべきとの声も少なからず存在しますが、こうした主張そのものが、科学というよりは非合理的なノスタルジアを重視していると言わざるを得ません。\n\n最終結果は、賛成票#G [GetGlobalVariable('verrier_ceres_yes').GetValue]#!、反対票#R [GetGlobalVariable('verrier_ceres_no').GetValue]#!。"
 verrier.32.f_saved: "大方の予想を裏切る結果となりました。過半数の天文学者たちが、ケレスの惑星残留に賛成票を投じたのです！保守派が言うには、小惑星帯の天体のなかでは、ケレスは形状・質量からみて明らかに違う天体だというのです。また科学者たちは補足意見として、ケレスは数十年にわたって科学界のみならず社会・文化的にも太陽系の惑星として認められている。多くの人々が親しみを抱いてきた惑星を格下げし、あまつさえそのアイデンティティを奪うというのは思い上がりもはなはだしい、と付け加えました。\n\n最終結果は、賛成票#G [GetGlobalVariable('verrier_ceres_yes').GetValue]#!、反対票#R [GetGlobalVariable('verrier_ceres_no').GetValue]#!。"
 verrier.32.g: "ケレスは準惑星である"
 verrier.32.h: "ケレスは助かった！"
 verrier.33.t: "4つの惑星を降格"
 verrier.33.t_astraea: "5つの惑星を降格"
 verrier.33.d: "天文学会議は最終宣言を起草しました。これまで惑星として扱われてきた4つの天体は、今後は小惑星となります。"
 verrier.33.f: "会議では天文学の将来的発展のため、新しい天体の分類「小惑星」が創設されました。さらに1801年以降に発見された新たな天体から、ケレス・パレス・ヴェスタ・ジュノーの4つの「惑星」を、小惑星に分類しました。"
 verrier.33.f_astraea: "会議では天文学の将来的発展のため、新しい天体の分類「小惑星」が創設されました。さらに1801年以降に発見された新たな天体から、ケレス・パレス・ヴェスタ・ジュノー・アストラエアの5つの「惑星」を、小惑星に分類しました。"
 verrier.33.g: "太陽系は8つの惑星が存在する"
 verrier.34.t: "3つの惑星を降格"
 verrier.34.t_astraea: "4つの惑星を降格"
 verrier.34.d: "天文学会議は最終宣言を起草しました。これまで惑星として扱われてきた3つの天体は、今後は小惑星となります。"
 verrier.34.f: "会議では天文学の将来的発展のため、新しい天体の分類「小惑星」が創設されました。さらに1801年以降に発見された新たな天体から、パレス・ヴェスタ・ジュノーの3つの「惑星」を、小惑星に分類しました。ケレスは惑星の地位を維持します。"
 verrier.34.f_astraea: "会議では天文学の将来的発展のため、新しい天体の分類「小惑星」が創設されました。さらに1801年以降に発見された新たな天体から、パレス・ヴェスタ・ジュノー・アストラエアの4つの「惑星」を、小惑星に分類しました。ケレスは惑星の地位を維持します。"
 verrier.34.g: "太陽系は9つの惑星が存在する"
 verrier.35.t: "惑星分類への不満"
 verrier.35.d: "先だっての天文学会議の声明は、わが国の威信に打撃を与えました。"
 verrier.35.f: "反対意見もかき消されました。かつてわが国が発見した惑星が格下げされたため、世界におけるわが国の立ち位置にまで悪影響が出ました。今では小惑星くらい、ほとんど誰でも見つけることができます。国際的な評価を受けることはありません。かつて惑星を発見した科学者の母国であることは名誉なことでしたが、今ではそうした栄光も消え、何の力もありません。"
 verrier.35.g: "明らかに票が操作されていた！"
 verrier.40.t: "彗星の観測！"
 verrier.40.d: "わが国の天文台の科学者が新しい彗星を発見しました。"
 verrier.40.f: "空に彗星が出現した。これは不吉な前兆だと前触れだと信じる人もいれば、空を飛ぶ妖精だという人もいる。ほかにもこの彗星は空に浮かぶ巨大な氷の玉である可能性がもっとも高く、長い尾は太陽のエネルギーによるものとの意見もあります。この3つの説はどれも有力視され、わが国の知的探究心に火をつけています。"
 verrier.40.g: "神よ、啓蒙された時代に生を受けたことを感謝します"
 verrier.41.t: "新しい小惑星"
 verrier.41.d: "天文学者たちは新しい小惑星を発見し、星図に描き加えました。"
 verrier.41.f: "19世紀を通じて、小惑星をはじめとする天体図の作成は飛躍的に進歩しました。1850年には科学者たちも数十個しか発見されなかった小惑星は、世紀の変わり目にはおよそ300個にまで増えました。また相次ぐ天体の発見でこれまでのカテゴリーが見直され、新しい分類が作られました。"
 verrier.41.g: "どれだけあるんだろう？"
 verrier.42.t: "流星群"
 verrier.42.d: "今年は周期性の流星群が観測できるため、天文学者たちは例年以上に多くの天体を発見できます。"
 verrier.42.f: "流星群とは天文現象のひとつで、夜空のある一点から放射状に降り注ぐように見える大量の流星のことです。流星物体とよばれる宇宙空間のチリの集団が、高速の平行軌道で地球の大気にぶつかると流星になります。ほとんどの流星物体は砂粒よりも小さいため、地表にぶつかる前に気化します。なかでも大規模でめずらしい流星群は流星雨、流星嵐とよばれます。有名なのはしし座流星群で、1時間に1000個以上の流星がみられます。"
 verrier.42.g: "空が晴れて、よく見えますように！"
 verrier.43.t: "星雲"
 verrier.43.d: "わが国の天文台が、これまで知られていなかった美しい星雲を発見しました。無数の新しい星も観測できます。"
 verrier.43.f: "世界ではじめて星団とは異なる存在としての星雲について言及したのは、イスラム王朝時代のペルシャ人天文学者アブドゥル・ラフマーン・スーフィーでした。彼は後にアンドロメダ銀河とよばれる「小さな雲」について記録を残しています。1751年から53年にかけて、ニコラ＝ルイ・ド・ラカーユがケープタウンの喜望峰から観測した42の星雲を分類しました。そのほとんどが当時まだ知られていなかった星雲でした。さらにウィリアム・ハーシェルとその妹カロラインが2000もの星雲を観測し、星雲の数はますます増えました。1864年初頭、ウィリアム・ヒギンスは70個の星雲のスペクトル線を分析しました。1923年頃には「大論争」のなかで、それまで「星雲」とされてきた天体の多くが、実際は天の川銀河とは別の銀河であることが明らかになりました。"
 verrier.43.g: "すばらしい！"
 verrier.44.t: "星の命名"
 verrier.44.d: "[SCOPE.sCharacter('verrier_star_discoverer').GetFullName]は偶然にも新しい星を発見しました。現在、この星の名称をどこから、あるいは誰から名づけるかが議論されています。"
 verrier.44.f: "かつて天文学者たちは、天体の命名には神話に由来した名称を使うという暗黙のルールに従っていました。ですが新天地の発見と同じように、当時の為政者の名前や母国にゆかりのある名詞を使うことも少なくありませんでした。たとえば天王星は、もともと当時のイギリス国王から「ジョージ」と名づけられました。またピアッツァも惑星ケレスを発見した際、彼のパトロンだったシチリア王に由来する「フェルディナンデア」の形容詞を加えました。"
 verrier.44.g: "国名に由来する名前にしよう"
 verrier.44.h: "為政者に由来する名前にしよう"
 verrier.44.i: "発見者に由来する名前にしよう"
 verrier.45.t: "新たな[concept_verrier_astronomer]の台頭"
 verrier.45.d: "[SCOPE.sCharacter('verrier_new_astronomer_scope').GetFullName]はたびたび天文学への強い関心を口にしています。なんでも暇さえあれば星を観測しているそうです。"
 verrier.45.f: "現在に至るまで、天文学の発展の影には多くのアマチュア天文学者たちの優れた貢献がありました。天体の数は数えきれないほど存在するため、アマチュア天文学者であってもその記録が専門家の役に立つことは度々ありました。もっとも驚くべきことではありません。有名な天文学者にも天体観察趣味が高じて学者になった者が少なくないのですから。"
 verrier.45.g: "[SCOPE.sCharacter('verrier_new_astronomer_scope').GetFullName]はプロの[concept_verrier_astronomer]になるべきだ"
 verrier.45.h: "面白い研究だ、それ以上でもそれ以下でもない"
 verrier.46.t: "星図の誤り"
 verrier.46.d: "残念ながら古い星図をいくつか見直したところ、記載されていた天体の一部がそもそも実在しなかったことが判明しました。"
 verrier.46.f: "悲しいことですが、天文記録の誤りはけっして珍しいことではありません。近世はもとより、さまざまな発展や手法の発達を経験した19世紀ですらそうなのです。たとえば1861年には、ヘルマン・ゴルトシュミットが土星に新たな衛星を発見して「キロン」と命名しましたが、後年この発見は誤りであることが判明しました。"
 verrier.46.g: "あの星は望遠鏡についたゴミだって言うのか？"
 verrier.47.t: "土星に新たな衛星を発見"
 verrier.47.d: "わが国の主力天文台に設置されている望遠鏡が改良されたおかげで、天文学者たちは土星のあたらしい衛星を2つ発見することができました。"
 verrier.47.f: "土星には無数の衛星が存在し、そのサイズもわずか十数メートルの小衛星から、水星よりも大きいタイタンまでさまざまです。これまで土星軌道上には83個もの衛星が発見され、さらに土星の輪には数百万もの小衛星、そして数えきれないほどの無数の粒子が存在します。7つの衛星は大きさのあまり楕円軌道を描いて周回しており、タイタンとおそらくレアが静水圧平衡状態にあります。タイタンは木星のガニメデに次いで、太陽系で2番目に大きい衛星です。"
 verrier.47.g: "素晴らしい"
 verrier.48.t: "超新星！"
 verrier.48.d: "[concept_verrier_astronomer]の[ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName]は、周辺の星々よりもはるかに明るい新しい新星を発見しました。新星が見つかるのはきわめて稀で、一流の天文学者にしか発見できません。"
 verrier.48.f: "最初に新星を発見したのは我が国ですが、すぐに各国の天文台もそれぞれの望遠鏡で発見しました。新星はまわりの星よりもはるかに明るい光を放ち、2週間にわたって続きました。時間とともに光は弱くなりましたが、長い期間くっきりと見ることができました。この現象の正体はまだ判明していませんが、今回の観測で新星現象の研究がより深まるでしょう！"
 verrier.48.g: "すごい"
 verrier.50.t: "月の地図"
 verrier.50.d: "天文学者たちは長年の集中的観測と製図、そして国内最先端の写真撮影術によって、とうとう正確な月面地図を作り上げました。"
 verrier.50.f: "月面製図の体系化は1799年、ヨハン・シュレーターによる正確な観測と月面地勢の測定からはじまりました。1834年、ヨハン・ハインリヒ・フォン・メドラーは世界初の大判月面図を作成しました。これは4面からなる地図で、のちに『万国月面地図』として出版しました。\nこうした月面地図はすべて直接観測に基づいていましたが、1840年3月にジョン・ウィリアム・ドレーパーが5インチ反射望遠鏡を使って月の銀板写真（ダゲレオタイプ）を撮影し、天文学に写真撮影を導入しました。当初の写真はほとんど使いものになりませんでしたが、17世紀の望遠鏡のように、月面写真のクオリティも急速に向上しました。1890年には、月面撮影学は天文学の一分野として認められました。"
 verrier.50.g: "見事だ"
 verrier.51.t: "月の溝"
 verrier.51.d: "月面写真を使った地図作成プロジェクトが進んでいます。"
 verrier.51.f: "リル（羅 : rima, plural rimae）は、月面上の地形のひとつ。長く細いくぼ地で、川のように見えます。幅数キロ、長さは数百キロメートルのものがほとんどです。太陽系内の火星や金星、それに複数の衛星にも似たような地形が存在します。"
 verrier.51.g: "美しい"
 verrier.52.t: "月のクレーター"
 verrier.52.f: "月などの天体にはクレーターが存在します。これはおよそ39億年前の内太陽系で大きな衝突があったことを物語っています。月には浸食作用がほとんどないため、太古の昔のクレーターが残っています。1893年、グローブ・カール・ギルバートは月のクレーターが巨大な隕石の衝突で出来たと始めて主張しました。"
 verrier.53.t: "月の海"
 verrier.53.f: "月の海（羅 : lunar maria）は、月表面の黒く広大な玄武岩の平原です。かつて月に巨大な隕石が衝突し、それによって反対側（地球側）で火山活動が誘発されたためにできたといわれています。海と呼ばれているのは、初期の天文学者たちが本物の海と間違えたためです。鉄分を多く含むため月の高地よりも反射率が低く、肉眼だと黒く見えます。月面の16パーセントを占め、そのほとんどが地球から観測できます。反対側はより小さく、ほとんど巨大なクレーターのなかにあります。かつて月の地形の命名規則は海（oceanus）に由来しており、月面にはほかにも湖（lacus）、湿地（palus）、浜（sinus）と呼ばれる場所があります。この3つの地形は海よりも小さいですが、どれも同じ性質と特徴があります。"
 verrier.54.t: "月の高地"
 verrier.54.f: "月面の明るい部分はほとんどの海よりも標高が高く、そのため高地（terrae）と呼ばれています。およそ44億年前にできたと推定され、月のマグマオーシャンから斜長石が固まってできたと考えられています。月の海は地球側に集中していますが、裏側の高地の地殻はもっと厚い可能性があります。これは月の形成から数千年後、当時の地球にあったもうひとつの衛星が低速でぶつかったとする説があります。"
 verrier.61.t: "[SCOPE.sCharacter('verrier_1843_discoverer').GetLastName]彗星"
 verrier.61.d: "[SCOPE.sCharacter('verrier_1843_discoverer').GetFullName]が@verrier_comet!大彗星を発見しました！"
 verrier.61.f: "1843年の大彗星は1843年に数カ月間目撃された彗星で、同年3月にもっとも明るくなりました（そのため3月大彗星とも呼ばれる）。2月5日に発見され、その後急速に光を強めて大彗星になりました。その正体は、1106年頃に分裂した巨大な彗星の破片群、クロイツ彗星群です。クロイツ群は太陽のきわめて近く（わずか数太陽半径）を通過するため、地上から観測すると非常に明るく見えます。最接近したのは43年3月6日で、それから数日間もっとも強い光を観測しました。このときもっともよく見えたのは南半球側で、北半球ではあまり鮮明に見えなかったと言われています。最後に観測されたのは43年4月19日でした。当時、1843年大彗星は太陽にもっとも近づいた天体でした。"
 verrier.61.g: "[ROOT.GetCountry.GetNameNoFlag]万歳！"
 verrier.62.t_name: "[SCOPE.sCharacter('verrier_1843_discoverer').GetLastName]彗星"
 verrier.62.t_year: "1843年の大彗星"
 verrier.62.d: "ここ数日、空には美しい大彗星が見えます。"
 verrier.62.g: "空から目を離すな！"
 verrier.64.t: "[SCOPE.sCharacter('verrier_1858_discoverer').GetLastName]彗星"
 verrier.64.d: "[SCOPE.sCharacter('verrier_1858_discoverer').GetFullName]が@verrier_comet!大彗星を発見しました！"
 verrier.64.f: "1858年の大彗星は1811年の大彗星と並んで19世紀のもっとも明るい彗星でした。また写真で撮影されたはじめての彗星でもありました。1858年10月10日に地球に最接近し、その長い三日月状の尾と目立つガス尾は10月末までくっきりと観測できました。南半球の観測点からは11月に入っても肉眼で確認できました。観測史上もっとも美しい彗星の一つと考えられており、19世紀で最も明るい彗星の一つとして、芸術家と一般大衆の両方に強い印象を与えました。観測当初はパリを中心に集団ヒステリーを引き起こしました（ジョン・ラッセル・ハインドが1857年6月に地球に衝突するという誤った計算結果を発表したのが一因とされる）。やがてヨーロッパなどの北半球では夜空でも非常によく見えること、9月と10月に好天気が続いたことから、19世紀でもっとも多くの人が彗星を目撃しました。イギリスの天文学者ウィリアム・ヘンリー・スミスは「私が見た中で最も美しい天体の一つ」と回想しました。1858年の大彗星は多数のスケッチが残されており、またオックスフォードの画家ウィリアム・ターナーも1枚絵を残しています。"
 verrier.65.t_name: "[SCOPE.sCharacter('verrier_1858_discoverer').GetLastName]彗星"
 verrier.65.t_year: "1858年の大彗星"
 verrier.67.t: "[SCOPE.sCharacter('verrier_1861_discoverer').GetLastName]彗星"
 verrier.67.d: "[SCOPE.sCharacter('verrier_1861_discoverer').GetFullName]が@verrier_comet!大彗星を発見しました！"
 verrier.67.f: "「1861年3月13日の夜、西の空で彗星を探していると、エリダヌス座のラカイユ1316星付近でおぼろげな星雲らしき天体を確認した。手持ちの船上用望遠鏡ではぼんやりとしか見えず、周辺のよく知られた3つの恒星との距離を測るのは非常に困難を極めた。六分儀の小型望遠鏡でも見分けることは難しく、そこで指鏡と地平鏡のあいだに色ガラスを入れてみてはどうだろうと思った。基準星のプロキオン、シリウス、カノープスの明るさが勝っているので、3つの恒星が視界に入るとわずかな光がかき消されてしまうからだ。彗星を探す者なら作業中に豊富な星雲カタログを用意しておくのがどんなに大事かわかっているはずだが、残念ながらこの貴重な道具がなかった。私の手元はわずかなカタログしかなく、この星雲を見つけられなかった。そこでわたしはこの星雲を観察することにした。その判断は正解だった。さもなければ、わたしは天文学の世界に名を残す最大のチャンスをみすみす逃すところだった」"
 verrier.68.t_name: "[SCOPE.sCharacter('verrier_1861_discoverer').GetLastName]彗星"
 verrier.68.t_year: "1861年の大彗星"
 verrier.70.t: "[SCOPE.sCharacter('verrier_1874_discoverer').GetLastName]彗星"
 verrier.70.d: "[SCOPE.sCharacter('verrier_1874_discoverer').GetFullName]が@verrier_comet!大彗星を発見しました！"
 verrier.70.f: "1874年の大彗星は非周期彗星に分類され、1874年の夏に肉眼で観測することができました。ひじょうに美しい大彗星だったと伝えられています。もっとも明るい時期は一等星の光をかき消し、核周辺のコマは何重にも重なって見え、天文学者たちは16年前の彗星に匹敵すると考えました。7月に地球に接近した際、とある観測点では肉眼で見える尾の長さが最大70度に達したと記録しています。当時の世間のパニックの様子は、マーク・トウェインの短編小説「A Curious Pleasure Excursion.」で風刺されています。"
 verrier.71.t_name: "[SCOPE.sCharacter('verrier_1874_discoverer').GetLastName]彗星"
 verrier.71.t_year: "1874年の大彗星"
 verrier.73.t: "[SCOPE.sCharacter('verrier_1882_discoverer').GetLastName]彗星"
 verrier.73.d: "[SCOPE.sCharacter('verrier_1882_discoverer').GetFullName]が@verrier_comet!大彗星を発見しました！"
 verrier.73.f: "1882年の大彗星はクロイツ彗星群のひとつで、9月にもっとも明るくなりました。近日点では、昼間でも太陽の次に明るく見えました。当時の記録によると82年9月1日早朝、ケープ植民地の喜望峰からギニア湾までの広い範囲ではじめて観測され、その後数日間にわたって南半球の観測点から次々と新彗星発見の報告が寄せられたそうです。ケープ天文台長デビット・ギルの記録によると、9月18日には彗星が日の出よりも数分早く登りました。そして「核は間違いなく単体で、おそらく4メートル以下。これまで記録したように、日中に見える1等星に非常によく似ている」と記しています。1882年の大彗星の破片は2、3世紀かけて分裂し、数百年後には再び戻ってくると予測されています。"
 verrier.74.t_name: "[SCOPE.sCharacter('verrier_1882_discoverer').GetLastName]彗星"
 verrier.74.t_year: "1882年の大彗星"
 verrier.80.t: "写真天図星表会議"
 verrier.80.d: "天文学会議の準備が整いました。各国に招待状を送りましょう。"
 verrier.80.f: "写真天図星表計画では3回の会議（1887年、89年、91年）が開催され、当時最先端の技術をもとに観測、算出方法を統一しました。会議には世界38カ国の天文学者が参加し、最終的に18の天文台がそれぞれの経度ごとに担当赤緯の写真星図を撮影することが決まりました。しかし計画されていた40分間の露光は、各地の気候条件や既存の比較対象の評価に応じて微調整が必要でした。1895年頃になると、複数の天文台がプロジェクトの経験をつかって方法論やあたらしい研究技術の改善、発展を優先するようになった。これには当時勃興しつつあった宇宙物理学の振興にリソースを割きたいという意図もありました。"
 verrier.80.g: "天文学の先進国に招待状を送れ"
 verrier.81.t: "写真天図星表計画への招待"
 verrier.81.d: "星空のさらなる詳細な探査と星図作成を目的とした会議が開かれ、わが国の天文学者も招待された。"
 verrier.81.f: "写真天図星表計画では3回の会議（1887年、89年、91年）が開催され、当時最先端の技術をもとに観測、算出方法を統一しました。会議には世界38カ国の天文学者が参加し、最終的に18の天文台がそれぞれの経度ごとに担当赤緯の写真星図を撮影することが決まりました。しかし計画されていた40分間の露光は、各地の気候条件や既存の比較対象の評価に応じて微調整が必要でした。1895年頃になると、複数の天文台がプロジェクトの経験をつかって方法論やあたらしい研究技術の改善、発展を優先するようになった。これには当時勃興しつつあった宇宙物理学の振興にリソースを割きたいという意図もありました。"
 verrier.81.g: "行こう"
 verrier.82.t_laughed: "天文台会議での嘲笑"
 verrier.82.t_respected: "天文学会議での尊敬"
 verrier.82.t_lauded: "天文学会議での称賛"
 verrier.82.d_laughed: "天文学会議の席上、わが国代表は専門知識のなさを晒して嘲笑された！"
 verrier.82.d_respected: "天文学会議の席上、わが国代表は一目置かれています。"
 verrier.82.d_lauded: "天文学分野における我が国の先進知識は、他国の学者からも注目をあつめています。"
 verrier.82.f_laughed: "「なにっ、エーテル理論はもう古いのか？」"
 verrier.82.f_respected: "「あの土星の形をした軽食、まだビュッフェに残ってるといいんだがね」"
 verrier.82.f_lauded: "「こんばんわ、大マゼラン雲殿──このあだ名の理由、ようやく合点がいきました」"
 verrier.82.g: "駄目だこりゃ……"
 verrier.82.h: "よし"
 verrier.82.i: "すばらしい！"
 verrier.83.t: "星図の交換"
 verrier.83.d: "わが国の天文学者たちは、他国の学者と星図を交換したいようです。"
 verrier.83.f: "早くから世界的な協力がはじまった学問分野は天文学といわれており、第一次世界大戦でも一時的な中断がなされただけでした。天体を総覧して宇宙の謎を解き明かすのは、すべての国々にとって普遍的な目標だったのです。それを妨害するのは政治だけです。"
 verrier.83.g: "星図を交換したい"
 verrier.83.h: "興味ないな"
 verrier.84.t: "星図の交換"
 verrier.84.d: "天文学者たちは勝手に星図を交換してしまった。"
 verrier.84.f: "早くから世界的な協力がはじまった学問分野は天文学といわれており、第一次世界大戦でも一時的な中断がなされただけでした。天体を総覧して宇宙の謎を解き明かすのは、すべての国々にとって普遍的な目標だったのです。それを妨害するのは政治だけです──できないこともありますが。"
 verrier.84.g: "まずこちらに相談すべきだろう！"
 verrier.85.t: "天文学会議の終わり"
 verrier.85.d: "会議が終わり、星空について貴重な情報を手に入れることができました。"
 verrier.85.f: "世界各国の天文台が協力した星図作成プロジェクトでしたが、数十年も経つと規模は肥大化し、実現は困難になりました。現在に至るまで、写真天図星表は未完成のまま放置されています。しかし世界中の天文学者が一堂に会したこのプロジェクトはさまざまな交流の場となり、その後の天文学分野における国際協力体制や世界会議につながりました。"
 verrier.85.g: "勉強になった"
 verrier.86.t: "大論争"
 verrier.86.d: "天文学会議の準備が整いました。各国に招待状を送りましょう。"
 verrier.86.f: "大論争（シャプレー＝カーティス論争とも）は、天文学者のハーロウ・シャプレーとヒーバー・カーティスの討論会。テーマは「渦巻星雲の正体」、「銀河の大きさ」についてだった。シャプレーは渦巻星雲は比較的小さく、天の川銀河の外縁部にあると考えていた（当時は天の川銀河が唯一の銀河であり、他の銀河はすべて渦巻星雲とよばれていた）。一方カーティスは渦巻星雲の正体はそれぞれ独立した銀河であり、そのサイズも非常に巨大かつ離れた位置にあると考えていた。大論争の内容のほとんどは、全米研究評議会の紀要（1921年5月号）に掲載されたシャプレーとカーティスそれぞれの論文が下敷きになっている。公開討論会のあと、科学者たちは2人の論拠をひとつひとつ検証することができた。"
 verrier.86.g: "天文学の先進国に招待状を送れ"
 verrier.87.t: "大論争"
 verrier.87.d: "わが国の天文学者が会議に招待されています。銀河の大きさ、正体についての論争に決着をつけるようです。"
 verrier.87.f: "大論争（シャプレー＝カーティス論争とも）は、天文学者のハーロウ・シャプレーとヒーバー・カーティスの討論会。テーマは「渦巻星雲の正体」、「銀河の大きさ」についてだった。シャプレーは渦巻星雲は比較的小さく、天の川銀河の外縁部にあると考えていた（当時は天の川銀河が唯一の銀河であり、他の銀河はすべて渦巻星雲とよばれていた）。一方カーティスは渦巻星雲の正体はそれぞれ独立した銀河であり、そのサイズも非常に巨大かつ離れた位置にあると考えていた。大論争の内容のほとんどは、全米研究評議会の紀要（1921年5月号）に掲載されたシャプレーとカーティスそれぞれの論文が下敷きになっている。公開討論会のあと、科学者たちは2人の論拠をひとつひとつ検証することができた。"
 verrier.87.g: "答えは42じゃないか？"
 verrier.88.t: "銀河はひとつか、複数か？"
 verrier.88.d: "天文学会議の討論会では、天の川銀河が宇宙でただひとつの銀河であるか否かが大きな争点となっています。"
 verrier.88.f: "Shapley was arguing in favor of the Milky Way as the entirety of the universe. He believed that 'spiral nebulae' such as Andromeda were simply part of the Milky Way. He could back up this claim by citing relative sizes - if Andromeda were not part of the Milky Way, then its distance must have been on the order of 100,000,000 light years - a span most contemporary astronomers would not accept. Curtis, on the other hand, contended that Andromeda and other such 'nebulae' were separate galaxies, or 'island universes' (a term invented by the 18th-century philosopher Immanuel Kant, who also believed that the 'spiral nebulae' were extragalactic). He showed that there were more novae in Andromeda than in the Milky Way. From this, he could ask why there were more novae in one small section of the galaxy than the other sections of the galaxy, if Andromeda were not a separate galaxy but simply a nebula within Earth's galaxy. This led to supporting Andromeda as a separate galaxy with its own signature age and rate of nova occurrences."
 verrier.88.g: "宇宙には複数の銀河が存在する"
 verrier.88.h: "天の川銀河だけが銀河であり、他はすべて星雲である"
 verrier.89.t: "太陽の位置"
 verrier.89.d: "次の争点は、太陽が天の川銀河の中心にあるのか、それとも別の場所にあるかについてです。"
 verrier.89.f: "'As a consequence of the exceptional growth and activity of the great observatories, with their powerful methods of analyzing stars and of sounding space, we have reached an epoch, I believe, when another advance is necessary; our conception of the galactic system must be enlarged to keep in proper relationship the objects our telescopes are finding; the solar system can no longer maintain a central position.'\n\n 'There has been a similar general accord in the deduced results as to the shape and structure of the galaxy:\n 1. The stars are not infinite in number, nor uniform in distribution.\n 2. Our galaxy, delimited for us by the projected contours of the Milky Way, contains possibly a billion suns.\n 3. This galaxy is shaped much like a lens, or a thin watch, the thickness being probably less than one-sixth of the diameter.\n 4. Our Sun is located fairly close to the center of figure of the galaxy."
 verrier.89.g: "太陽は天の川銀河の中心部分に位置する"
 verrier.89.h: "太陽は天の川銀河の外縁部に位置する"
 verrier.90.t: "大論争終了"
 verrier.90.d: "大論争が終わり、科学者がどちらの意見をより重視したのかが判明しました。"
 verrier.91.t: "「奇跡の年」論文"
 verrier.91.d: "科学者のアルバート・アインシュタインが、古典物理学の根底を覆す論文を発表しました。"
 verrier.91.f: "「奇跡の年」論文とは、1905年にアルバート・アインシュタインが科学雑誌『アナーレン・デア・フィジーク』に寄稿した4つの論文。そのすべてが現代物理学の基礎を作ったといわれ、空間、時間、質量、エネルギーといった基本概念の科学的理解を根本から覆す内容でした。1枚目の論文では光電効果、2枚目の論文ではブラウン運動について述べています。3枚目の論文で、アインシュタインは特殊相対性理論を発表。観測者の運動によらず光の速度はつねに一定であるとする「光速度不変の原理」、そして時間と空間についてのまったく新しい考え方を提唱しました。そして4枚目の論文は特殊相対性理論の帰結として、質量とエネルギーは等価であるとの理論を示しました。これを表した式が有名なE＝mc²で、やがて原子力の発見と応用につながりましま。この4つの論文、のちにアインシュタインが発表した一般相対性理論、そして量子力学は、現代物理学の基礎を築いたのです。"
 verrier.91.g: "とにかく全部相対的ということだね？"
 verrier.92.t: "アインシュタインが[ROOT.GetCountry.GetNameNoFlag]に移住"
 verrier.92.d: "有名な物理学者アルバート・アインシュタインが、わが国のとある大学から教授職を打診された──彼はこれに応じてくれた。"
 verrier.92.f: "アルバート・アインシュタインはドイツ出身の理論物理学者で、これまででもっと偉大かつ多大な影響をあたえた物理学者のひとりとして広く認知されています。彼の代名詞ともいえる相対性理論の発表はもちろんのこと、量子力学の理論的発展にも大きく貢献しました。この2つは現代物理学の基礎になっています。また科学哲学への影響も有名です。アインシュタインは当時の帝政ドイツに生まれましたが、1895年にスイスに移住し、その後ドイツ国籍を放棄しました。1914年にはベルリンに移住してプロイセン科学アカデミー会員とフンボルト大学の教授になり、1917年にはカイザー・ヴィルヘルム協会物理学研究所長に就任。プロイセン市民としてドイツ国籍を再取得しました。アドルフ・ヒトラー政権が発足した1933年、アインシュタインはアメリカを訪問していた。ユダヤ人だったため新たに当選したナチ党政権の政策に反対していたアインシュタインは、そのままアメリカに留まり、1940年にアメリカ市民権を獲得しました。"
 verrier.92.g: "ようこそお越しくださいました！"
 verrier.93.t: "アインシュタインの一般相対性理論"
 verrier.93.d: "アルバート・アインシュタインはまたしても革命的な理論を発表し、重力や宇宙そのものの考え方を大きく変えました。"
 verrier.93.f: "General relativity, also known as the general theory of relativity, is the geometric theory of gravitation published by Albert Einstein in 1915 and is the current description of gravitation in modern physics. General relativity generalizes special relativity and refines Newton's law of universal gravitation, providing a unified description of gravity as a geometric property of space and time or four-dimensional spacetime. In particular, the curvature of spacetime is directly related to the energy and momentum of whatever matter and radiation are present. Einstein's theory has astrophysical implications, including the prediction of black holes - regions of space in which space and time are distorted in such a way that nothing, not even light, can escape from them. Black holes are the end-state for massive stars. Microquasars and active galactic nuclei are believed to be stellar black holes and supermassive black holes. It also predicts gravitational lensing, where the bending of light results in multiple images of the same distant astronomical phenomenon."
 verrier.93.g: "まさしく天才だ"
 verrier.94.t: "アインシュタインの亡命"
 verrier.94.d: "わが国での政情変化によって、有名な物理学者アルバート・アインシュタインが本日パスポート持って出国してしまった！"
 verrier.94.f: "生前のアルバート・アインシュタインは、おもに相対性理論の発表と物理学分野での研究が有名でした。その一方で、彼は世界各地の政治・人道活動・学術プロジェクトにたずさわっており、その名声もあって、アインシュタインの政治的意見は大きな関心を集めました。彼はその知名度をもちいて公民権運動を支持し、アメリカの差別問題を非難しました。アメリカに渡った当初から、アフリカ系アメリカ人への差別に反対したと伝えられています。また第二次世界大戦前夜のドイツで激しい反ユダヤ主義を経験していたのもあって、さまざまな公民権運動家や公民権団体と提携しました。またアインシュタインは社会主義に好意的で、晩年はますます傾倒を強めました。そのときの心情は1949年に『マンスリー・レビュー』に寄稿した「なぜ社会主義なのか？」に書かれています。ソ連についての意見もたびたび変化しました。1925年にはボリシェビキ政権が「きちんと規則のある政府制度」を持たないと批判し、ボリシェビキの統治は「恐怖の支配であり、人類史上の悲劇」と述べています。"
 verrier.94.g: "こっちから願い下げだ"
 verrier.95.t: "政治家アインシュタイン"
 verrier.95.d: "物理学者のアルバート・アインシュタインは国内外問わず評判が高く、どうやら現在本格的な政界進出というアイデアを冗談半分で考えているようです。"
 verrier.95.f: "1918年、アインシュタインは自由主義政党である「ドイツ民主党」の創設に携わりました。かれは世界中の政治・人道活動・学術プロジェクトにたずさわっており、その名声もあってアインシュタインの政治的意見は世間から大いに注目されました。かれは平和運動家で、世界連邦構想や国際法といった概念をつよくとなえました。また社会主義に好意的で、晩年はますます傾倒を強めました。そのときの心情は1949年に『マンスリー・レビュー』に寄稿した「なぜ社会主義なのか？」に書かれています。ソ連についての意見もたびたび変化しました。1925年にはボリシェビキ政権が「きちんと規則のある政府制度」を持たないと批判し、ボリシェビキの統治は「恐怖の支配であり、人類史上の悲劇」と述べています。ドイツでナチズムが台頭して多くの人が沈黙していた時代も、アインシュタインは社会的な立場をハッキリさせる性格ゆえに挑発的すぎるほど率直な発言や声明をのこしています。アメリカ移住後もその知名度をもちいて公民権運動を支持し、アメリカの差別問題を非難しました。"
 verrier.95.g: "彼は重要な公人だ"
 verrier.95.h: "彼は科学者であって、政治家じゃない"
 verrier.100.t: "The Observatory"
 verrier.100.d: "An overview of the most important astronomical statistics."
 verrier.100.planets: "The following #G [GetGlobalVariable('verrier_planets_number').GetValue]#! celestial bodies are recognized as #T Planets#! of the solar system:\n"
 verrier.100.mercury: "\n#V 水星#! 古代に発見済"
 verrier.100.venus: "\n#V 金星#! 古代に発見済"
 verrier.100.earth: "\n#V 地球#! 我らの故郷"
 verrier.100.mars: "\n#V 火星#! 古代に発見済"
 verrier.100.jupiter: "\n#V 木星#! 古代に発見済"
 verrier.100.saturn: "\n#V 土星#! 古代に発見済"
 verrier.100.moon: "\n\n#T @verrier_moon_photo! Lunar Photos#! collected: #G [ROOT.Var('verrier_moon_photo').GetValue]#!/#BLUE 10#!.\n"
 verrier.100.comets: "\n#T @verrier_comet! Great Comets#! sighted: #G [ROOT.Var('verrier_great_comet').GetValue]#!/#BLUE [GetGlobalVariable('verrier_total_verrier_great_comet').GetValue]#!.\n"
 verrier.100.objects: "\nInternational astronomy has found a total of #BLUE [GetGlobalVariable('verrier_total_astronomical_objects').GetValue]#! @verrier_astronomicalobject! [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')], of which we have detected #G [ROOT.Var('verrier_astronomical_objects').GetValue]#!.\n"
 verrier.100.no_galaxies: "\nThe Milky Way encompasses the #E entire universe#!. Phenomena like the Andromenade Nebula are #E mere clouds of gas#!."
 verrier.100.galaxies: "\nThe Milky Way is just #E one of many galaxies#! that make up the universe. Apparitions like the Andromeda Nebula are actually #E other galaxies#!."
 verrier.100.sun_center: "The Sun lies in a #E central region#! of the Milky Way."
 verrier.100.sun_outer: "The Sun lies in an #E outer region#! of the Milky Way."
 verrier.100.g: "Per aspera ad astra."
 verrier.100.h: "Visit the [concept_verrier_astronomer]!"
 verrier.100.i: "Show me the countries with the most Astronomical Discoveries!"
 verrier_leave_observatory_tt: "You will leave the Observatory"
 verrier.101.t: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]"
 verrier.101.d: "Our [concept_verrier_astronomer], [ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName], works relentlessly to uncover the mysteries of the sky."
 verrier.101.g: "Per aspera ad astra."
 verrier.101.h: "Back to the observatory."
 verrier.111.t: "天空の驚異"
 verrier.111.d: "現代ヨーロッパ天文学の権威ヨーゼフ・ヨハン・フォン・リットロウが、天文学の新たな金字塔となる本を出版しました。"
 verrier.111.f: "ヨーゼフ・ヨハン・フォン・リットロウはオーストリアの天文学者で、ウィーン大学天文台の発起人でした。1819年から初代天文台長、1838年には天文学部長に就任。当時遅れていたオーストリアの天体観測を立て直し、1825年には小型化した新しい機材も導入しました。34年から36年にかけて、リットロウは全3巻の大衆向け科学本『天体の驚異』を出版し、わずか数年で14000部も印刷されました。この本は天文学の古典として長く親しまれ、19世紀を通じてドイツ語圏の天文学者にもっとも読まれた本になりました。当初『天体の驚異』が全4巻構想で、第4巻にはそれまでの天文学全史がまとめられる予定でしたが、1840年11月にリットロウが亡くなり、志半ばで断念されました。かれの天文学史の手稿は現代ものこっています。"
 verrier.111.g: "この本は実用的な価値がある"
 verrier.111.h: "この本は理論的な価値がある"
 verrier.111.i: "この本は教育的な価値がある"
 verrier.112.t: "ボン掃天星表"
 verrier.112.d: "プロイセンの天文学者たちは広い範囲をとらえた天体カタログを発見しました。そこにはこれまで知られていなかった天体も収録されています。"
 verrier.112.f: "ボン掃天星表（独 : Bonner Durchmusterung, BD星図とも）は、北天の眼視観測をもとにした全36枚の星表・星図。ボン大学付属天文台の[SCOPE.sCharacter('verrier_new_astronomer_scope').GetFullName]が中心となって観測し、その結果をアーダルベルト・クリューガーとエドゥアルト・シェーンフェルトとともに1846年から63年にかけて出版しました。赤緯89度からマイナス2度までの9.5等星よりも明るい星（10等星も見受けられる）約32,4198個が収録されています。この観測ではヨーゼフ・フォン・フラウンホーファーが開発した彗星発見器（レンズ口径7.7cm、焦点距離65cm）が使われました。"
 verrier.112.g: "よし！"
 verrier.112.h: "[SCOPE.sCharacter('verrier_new_astronomer_scope').GetLastName]ならもっと多くの天体を見つけてくれるはずだ！"
 verrier.113.t: "火星の運河"
 verrier.113.d: "わが国のある天文学者が、火星に奇妙なものを発見したそうです。"
 verrier.113.f: "[SCOPE.sCharacter('verrier_new_astronomer_scope').GetFullName]は、19世紀もっとも目の良い[concept_verrier_astronomer]と言われており、水星や金星、火星の観測で有名です。1877年末、かれは火星表面にかすかな溝らしきものを発見しました。やがてメディアはこれを「火星の運河」と名づけ、その後80年ものあいだ研究対象となりました。この溝状の地形は当時の30〜50cmレンズ望遠鏡の視認限界すれすれに位置し、見つけるには特別な観測経験が必要とされました。1879年にふたたび火星が地球に最接近すると、ようやく他の天文学者たちも窪地の存在を視認しました。[SCOPE.sCharacter('verrier_new_astronomer_scope').GetLastName]はこの地形について考察し、自然にできた直線状の窪地で長さは最大2000km、幅およそ100km、水は乾いた地表に流れ出た可能性があると、考えました。ところが英語に翻訳される際に誤訳され（水路‘channels’とすべきところを運河‘canals’と翻訳した）、多くのジャーナリストたちが工学的な建造物を想像しました。これはSF小説の勃興につながり、それから何十年も続く火星人神話を生みました。"
 verrier.113.g: "驚くべき発見だ"
 verrier.113.h: "火星人襲来に備えて将軍を訓練すべきだ！"
 verrier.113.i: "[SCOPE.sCharacter('verrier_new_astronomer_scope').GetLastName]にちなんだ地名をもっと付けられるかも！"
 verrier.114.t: "ハレー彗星"
 verrier.114.d: "夜空には75年ぶりのハレー彗星が浮かんでいます。"
 verrier.114.f: "ハレー彗星は地球から肉眼で見ることのできる唯一の短周期彗星で、人間が生涯で2回見ることのできる唯一の彗星でもあります。ハレー彗星は周期的に内太陽系にもどり、その様子は少なくとも紀元前240年から世界中の天文学者たちに観測・記録されていました。そして1705年、イギリスの天文学者エドモンド・ハレーがその正体をつきとめ、同じ彗星が周期的に現れることを発見しました。ハレー彗星の名はこれに由来しています。1910年のハレー彗星接近にはいくつかのエピソードが残されています。まず初めて写真が撮影され、分光データも記録されました。そしてアメリカ風刺作家マーク・トウェインです。彼が生まれた1835年11月30日は、ハレー彗星の近日点通過からちょうど2週間後でした。彼は生前こんな言葉を残しています。\n「私は1835年のハレー彗星といっしょに生まれた。来年またやってくるそうだから、私もいっしょに去ろうと思う。ハレー彗星といっしょに死ねなかったら、人生最大の失望をあじわうことになる。全能の神もこう仰られているはずだ。『ここに説明のつかない変人が2人いる。いっしょに生まれたのだから、いっしょに去りなさい』と」\n1910年4月21日、彗星の近日点通過の翌日、トウェインは亡くなりました。"
 verrier.114.g: "また75年後に！"
 verrier.115.t: "ルメートルの膨張宇宙論"
 verrier.115.d: "とあるカトリックの司祭が驚くべき仮説を発表しました。これまでの宇宙の状態や起源についての考え方を根底から覆しかねないものです。"
 verrier.115.f: "ジョルジュ・ルメートルはベルギーのカトリック司祭、理論物理学者、数学者、天文学者で、ルーヴェン・カトリック大学の物理学教授。銀河が遠ざかる理由を膨張宇宙という理論にまとめた最初の人物で、これはエドウィン・ハッブルが観測によって宇宙の膨張を確認するよりも数年先んじたものです。またハッブル本人よりも2年早く「ハッブルの法則」を発見し、ハッブル定数も導きました（そのため国際天文学連合は『ハッブル＝ルメートルの法則』と呼ぶことを推奨している）。またルメートルは宇宙誕生を説明する「ビッグバン論」を提唱しました（ルメートル自身は当初「始祖的原子仮説」、後に「花火仮説」と呼んだ）。これらをまとめた論文「銀河系外星雲の後退速度を説明できるような、膨張速度を持つ質量一定で一様な宇宙」（1927年）の初出から時間はかかりましたが、やがでルメートルは相対性理論から発展して膨張宇宙論をはじめて提唱した人物として、世界中で知られるようになりました。"
 verrier.115.g: "「ビックバン」とかいう理論を考えたのはイエズス会員だった、ってことか！"
 verrier.116.t: "量子仮説"
 verrier.116.d: "With his quantum theory, the physicist [SCOPE.sCharacter('verrier_new_astronomer_scope').GetFullName] permanently changed the human understanding of atomic and subatomic processes."
 verrier.116.f: "'He was, by nature, a conservative mind; he had nothing of the revolutionary and was thoroughly skeptical about speculations. Yet his belief in the compelling force of logical reasoning from facts was so strong that he did not flinch from announcing the most revolutionary idea which ever has shaken physics.' - Max Born about Max Planck \n\n The central assumption behind his new derivation, was the supposition, now known as the Planck postulate, that electromagnetic energy could be emitted only in quantized form. Physicists now call these quanta photons. This assumption, incompatible with classical physics, is regarded as the birth of quantum physics and the greatest intellectual accomplishment of Planck's career. The discovery of Planck's constant enabled him to define a new universal set of physical units, all based on fundamental physical constants upon which much of quantum theory is based. In recognition of Planck's fundamental contribution to a new branch of physics, he was awarded the Nobel Prize in Physics for 1918."
 verrier.116.g: "A historic breakthrough for science!"
 verrier.116.h: "This brilliant man should work for us!"
 verrier.117.t: "天の川の外"
 verrier.117.d: "天文学者の[SCOPE.sCharacter('verrier_new_astronomer_scope').GetFullName]は、これまでチリやガスでできた雲状の天体、いわゆる「星雲」に分類されていた天体の多くが、実は天の川銀河以外の銀河であることを証明しました。"
 verrier.117.f: "[SCOPE.sCharacter('verrier_new_astronomer_scope').GetFullName]はアメリカの天文学者で、銀河系外天文学と観測的宇宙論の分野で大きな功績を残しました。かれは銀河の後退速度は地球から遠ければ遠いほど速くなることを実証し、現代では「ハッブルの法則」として知られています（ただしジョルジュ・ルメートルが2年前に同じ結論を導き出していた）。ハッブルはウィルソン山天文台のフッカー望遠鏡をもちいてセファイド変光星（ヘンリエッタ・リーヴィットが発見した、観測の基準となる標準光源）を観測し、見かけの等級と絶対等級を比較することで地球との距離を導き出そうとしました。こうしてハッブルはアンドロメダ、ネビュラなどの複数の星雲にセファイドを発見しました。1924年に観測結果を公開し、セファイドが発見された星雲は天の川銀河から遠く離れた場所にあり、したがってまったく別の銀河であると結論を出しました。アンドロメダやネビュラなどは星雲ではなく銀河に分類されて現在に至ります。またハッブルは現在もっとも広く使われている銀河の分類方法も発案しました。かれは銀河を写真から見たときの形状で分類し、これは現代では「ハッブル分類」と呼ばれています。"
 verrier.117.h: "[SCOPE.sCharacter('verrier_new_astronomer_scope').GetLastName]のおかげで私のコレクションがまた増えるな！"
 verrier.118.t: "原子物理学"
 verrier.118.d: "アーネスト・ラザフォードの研究と論文によって、原子核の構造や放射能半減期などの理論が確立されました。"
 verrier.118.f: "アーネスト・ラザフォードは、「原子物理学の父」と呼ばれる物理学者です。ニュージーランド出身で、キャリアのほとんどをカナダとイギリスで過ごしました。若くして放射能半減期説の提唱、放射性元素ラドンの発見、α線とβ線の発見と命名など、さまざまな功績を残しています。1908年には「元素の崩壊と放射性物質の化学的研究」を評価されてノーベル化学賞を受賞しました。その後はイギリスに拠点を移し、共同研究者のトーマス・ロイドとともにα線がヘリウムの原子核であることを発見しました。また原子の電荷が非常に小さな核に凝縮されていることを予想し、ハンス・ガイガーとアーネスト・マースデンとともに金箔を使った実験で「ラザフォード散乱」の存在を確認。この結果をもとに原子の有核模型（ラザフォードの原子模型）を発表しました。さらに窒素にアルファ線を衝突させることで、はじめて人工的な核反応を行いました。この実験で亜原子粒子の放出を確認し、ラザフォードをこれを「陽子」と名付けました。"
 verrier.119.t: "The Periodic Table"
 verrier.119.d: "The chemist Dmitri Mendeleev created a version of the periodic table of elements."
 verrier.119.f: "In 1863, there were 56 known elements with a new element being discovered at a rate of approximately one per year. Other scientists had previously identified periodicity of elements. After becoming a teacher in 1867, Mendeleev wrote 'Principles of Chemistry', which became the definitive textbook of its time. It was published in two volumes between 1868 and 1870, and Mendeleev wrote it as he was preparing a textbook for his course. As he attempted to classify the elements according to their chemical properties, he noticed patterns that led him to postulate his periodic table; he claimed to have envisioned the complete arrangement of the elements in a dream: 'I saw in a dream a table where all elements fell into place as required. Awakening, I immediately wrote it down on a piece of paper, only in one place did a correction later seem necessary.' By adding additional elements following this pattern, Mendeleev developed his extended version of the periodic table. Mendeleev published his periodic table of all known elements and predicted several new elements to complete the table in a Russian-language journal."
 verrier.120.t: "[SCOPE.sCharacter('verrier_new_astronomer_scope').GetFullName]"
 verrier.120.d: "フランスで最も有名な[concept_verrier_astronomer]が、太陽系内の主要な天体についての一覧表を作製しました。"
 verrier.120.f: "[SCOPE.sCharacter('verrier_new_astronomer_scope').GetFullName]はフランスの天文学者、数学者。天体力学を専門とし、海王星の軌道と位置を数学だけで予見したことで知られています。当時、天王星の軌道がケプラーやニュートンの物理法則と矛盾しており、ルヴェリエはそれの矛盾を解消する計算結果を導き出しました。そしてベルリン天文台のヨハン・ゴットフリート・ガレに連絡して、実際に天王星の位置を確認するよう依頼しました。その日の夜、ルヴェリエの計算結果からわずか1度未満の場所で、ガレは海王星を発見しました。その後、ルヴェリエはある課題に取りかかりました。\n「……太陽系全体の運動を包括し、可能であればすべてを調和させる理論にまとめる。それが出来ないとすれば、まだ惑星軌道をゆがませる未知の天体が存在すると断言しよう……」\nこの言葉通り、ルヴェリエは亡くなるまでこの仕事にとりくみました。ルヴェリエはまず、当時知られていた惑星軌道のズレを計算する際に用いられる「摂動函数」を、7回にわたって見直しました。この作業は1849年に終わり、469個の数学用語を新たに作りました。そして1750年まで観測記録をさかのぼって惑星の位置をまとめ、集めたデータを精査し、当時最新のデータとの矛盾を修正する作業を、1852年まで続けました。このデータをまとめた表はフランス経度局の天文年鑑『フランス天体歴』の雛形となり、1912年まで使われていました。"
 verrier.120.h: "我々に使えるべきだ"
 verrier_congress_attend_modifier: "天文学会議に出席中"
 verrier.121.t: "アストラエア発見"
 verrier.121.d: "プロイセンのアマチュア天文学者カール・ルドヴィク・ヘンケが偶然新しい惑星を発見し、「アストラエア」と名づけました。"
 verrier.121.f: "元プロイセン郵便長官カール・ルドヴィク・ヘンケは退官後、天文学に情熱を注ぎました。1845年12月8日、かれは太陽系15番目の天体アストラエアを発見しました。これは「惑星」ヴェスタの発見から40年ぶりの快挙で、プロイセン国王はヘンケに年金1200マルクを下賜しました。アストラエアの発見を皮切りに、小惑星帯ではつきつぎと新たな天体が発見され、また海王星が発見されるまではもっとも大きい天体でした。しかしアストラエアは発見当初から、このような小型天体に「惑星」の称号はふさわしいのかという異論が出ていました。アレクサンダー・フォン・フンボルトはこうした小型天体を分類する新たなカテゴリー「小惑星」を提唱したのは、この時でした。"
 verrier.121.g: "12番目の惑星だ！"
 verrier.122.g: "この頃はただの石ころでも発見され次第「惑星」になるらしい"
 verrier.200.t: "[SCOPE.sCharacter('verrier_astronomer_scope').GetFullName]がはくちょう座61番星までの距離を11.4光年と算出"
 verrier.200.d: "またひとつ宇宙は広がりました。[SCOPE.sCharacter('verrier_astronomer_scope').GetFullName]は地球とはくちょう座61番星との視差を用いて、その距離を11.4光年と算出しました。この視差を用いた計算方法によって、宇宙の研究はめざましい進歩を遂げるでしょう。"
 verrier.200.f: "1836年、ドイツの天文学者フリードリヒ・ベッセルは世界で初めて星までの距離を算出することに成功しました。このときベッセルは視差を使って距離を導きました。視差とは、物体をまず右目で見て、その後左目で見るように、地球の運動を利用して星の相対的な位置を割り出す方法です。\n\n地球と対象物の位置の変化によって、そこまでの距離を算出することができます。"
 verrier.200.g: "天文学にとって記念すべき日だ！"
 verrier_modern_astronomy_invented_modifier: "世界初の年周視差の算出"
 verrier.201.t: "[SCOPE.sCharacter('verrier_astronomer_scope').GetFullName]  found the cause for the Fraunhofer Lines"
 verrier.201.d: "For a long time the reason for the thin black lines in the sun's spectrum have been up to speculation. But now Dr. [SCOPE.sCharacter('verrier_astronomer_scope').GetFullName] has finally found the reason for them: Specific Chemical Elements cause those lines to appear. This offers a way to find out what Elements are present on stars."
 verrier.201.f: "Joseph Fraunhofer noticed distinct lines in the spectrum of the sun in 1813. Only decades later, Gustav Robert Kirchhoff and Robert Bunsen found the cause of those lines. By burning various elements and chemical compunds they obsevred that those elements absorbed specific parts of a spectrum. Therefore they argued that the absorbtion of specific parts of a spectrum are evidence of specific chemical compund or element in a star's outer part.\n\nSpectroscopy not only allowed to classify stars by their type but also allowed spectroscopic analysis of materials and chemicals. Even the discovery of Helium happened thanks to the spectroscopy of the sun."
 verrier.201.g: "Another mystery of the universe is solved!"
 verrier.1001.t: "ターラー・ワーリー・コーティの建設"
 verrier.1001.d: "わが国の天文台、ターラー・ワーリー・コーティの建設は遅々として進んでいない。昨年[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]中佐が王認[concept_verrier_astronomer]に任命され、作業に弾みがつくことが期待されています。ウィルコックを資金面・知識面で支援しなければ、天文台の完成にはもう数年はかかるでしょう。ですが何よりもまず、そもそも建設を続けるかどうかを決めなくてはなりません。"
 verrier.1001.f: "ターラー・ワーリー・コーティ（星々の館）はナーシルッディーン・ハイダル藩王の勅命で建設された天文台です。藩王は天文学や占星術に関心を持ち、カルカッタで天文学も学びました。\n1832年に建設がはじまり、9年後の1841年に完成しました。しかし天文台として運用されたのは数年間だけで、その後インド大反乱の司令部として利用され、反乱鎮圧後は銀行になりました。"
 verrier.1001.g: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName]が監督すれば、作業はもっと早くなるだろう！"
 verrier.1001.h: "金の無駄だ！"
 stop_constructing_tara_wali_kothi_tt: "ターラー・ワーリー・コーティ天文台の建設を中止します。もう建設はできません。"
 verrier.1002.t: "ターラー・ワーリー・コーティ完成"
 verrier.1002.d: "数年間の工事が終わり、ターラー・ワーリー・コーティがついに完成しました。最新鋭の観測機器が設置されたこの天文台が、大きな発見を導いてくれるでしょう。"
 verrier.1002.f: "[ROOT.GetCountry.GetRuler.GetFullName]は巨大な望遠鏡を覗き、星や惑星を観察している。ついに完成をみたターラー・ワーリー・コーティには、現在[ROOT.GetCountry.GetName]国内最高の頭脳が集結し、学生たちへの授業を行っている。これは未来に向けての大きな一歩です。"
 verrier.1002.g: "星の館が新たな発見を導いてくれるだろう！"
