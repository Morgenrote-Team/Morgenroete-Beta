 verrier.308.t: "1874年の金星の日面通過"
 verrier.308.d: "天文学者たちは、#ORANGE 1874年#!にオーストラリア＝インドネシア＝太平洋地域で金星の日面通過を観測できると予測しています。[ROOT.GetCountry.GetNameNoFlag]の科学界は、この生涯1度きりの天体現象の観測を求めています。"
 verrier.308.f: "金星の日面通過とは、金星が太陽と地球のあいだを通過する現象。およそ243年周期で4度だけ発生します。史実では、日面通過の精確な観測は地球から太陽までの距離（天文単位）を算出するうえで非常に重要であり、そのため各国の学術機関や科学者はこぞって観測隊や観測事業を組織しました。1874年の金星の日面通過は、天文観測にはいささか不利な環境でした。ヨーロッパの大部分は観測圏外にあり、日面通過の一部始終を長時間観測できるのはアジア地域に限られていました。ほかにも短時間だけならオーストラリア、南太平洋や南インド洋の島々（ケルゲレン諸島など）でも観測できました。こうした環境でも、全世界でおよそ60もの観測隊が派遣されました。"
 verrier.308.g: "見逃す手はない"
 verrier.309.t: "1882年の金星の日面通過"
 verrier.309.d: "天文学者たちは、#ORANGE 1882年#!に南アメリカ、中央アメリカ、北アメリカ地域で金星の日面通過を観測できると予測しています。[ROOT.GetCountry.GetNameNoFlag]の科学界は、この生涯1度きりの天体現象の観測を求めています。"
 verrier.309.f: "金星の日面通過とは、金星が太陽と地球のあいだを通過する現象。およそ243年周期で4度だけ発生します。史実では、日面通過の精確な観測は地球から太陽までの距離（天文単位）を算出するうえで非常に重要であり、そのため各国の学術機関や科学者はこぞって観測隊や観測事業を組織しました。1882年の金星の日面通過はヨーロッパから比較的アクセスしやすい場所で観測できたため、1874年に比べるといささか有利な環境にありました。そのためこの年は北アメリカ北部から北東部を除き、アメリカ大陸のほぼ全域で日面通過が観測されました。"
 verrier.311.t: "金星の日面通過に向けた準備"
 verrier.311.d: "金星が太陽の表面を通過するという珍しい天体現象が近づいています。世界各国の天文台や政府が準備を進めています。"
 verrier.311.f: "日時は秒単位で算出済。望遠鏡は荷物入れに。時計も時刻合わせ完了。いよいよ金星が太陽の表面を通過します。この現象を観測できれば、太陽系の基準となるスケールである天文単位をより正確に算出できる。天文学者たちはそう信じています。しかし成功するかどうかは、実際にこの目で見るまで分かりません──場所、天候、環境のすべてが絡んできます。"
 verrier.311.g: "わが国は本土から観測する"
 verrier.311.h: "保護領に観測隊を派遣する"
 verrier.311.i: "外国の地に観測隊を派遣する"
 verrier.311.j: "もう一度考え直すべきだ"
 verrier.319.t: "海外からの観測隊"
 verrier.319.d: "貴重な天文学的現象である金星の日面通過を観測するため、[SCOPE.sCountry('verrier_venus_transit_leader').GetName]の観測隊がわが国の領内に到着しました。"
 verrier.319.f: "彼らはレンズや時計、地図を満載した積荷とともに上陸した。大学関係者と観測隊の渉外役が面会し、終始なごやかな様子で専門的な会話を交わした。天文台の職員たちは好奇心にあふれ、新聞は訝しみながらも中立の立場で論じている。\n\nすでに複数の機関が遠征の影響について議論している。学術交流はもとより、データの交換や貿易主権、国際社会における地位にも影響するだろうということだ。"
 verrier.319.g: "科学を共通言語にしよう"
 verrier.321.t: "観測隊を襲う嵐"
 verrier.321.d: "調査隊の乗った船舶を巨大な嵐が襲いました。押し寄せる波に激しく揺れる船体から、一部の積荷がデッキからもやいを解かれて海に落ちてしまいました──中には観測用の精密機器も入っていました。"
 verrier.321.f: "空は荒れ狂い、[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]は手すりにしがみついた。海は船を飲み込まんばかりにうねり、ロープや樽を甲板に叩きつける。2つの木箱がぞっとするような弧を描いて、暗闇へと消えていった。\n\nやがて嵐が納まり、静寂だけが残った。被害を調べることにした。主力のヘリオメーター。ケーニヒスベルク製の2重レンズ。精密時計が数台。\n\n[ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName]博士はずぶ濡れのクルーと壊れた木材の前に立ち尽くし、かつて機材があったはずの場所を見つめた。予備はある。しかしどれも完璧な状態ではない。\n\nそして時は待ってくれない。金星もだ。"
 verrier.321.g: "しっかりしろ。まだ挽回できる"
 verrier.322.t: "予期せぬ光"
 verrier.322.d: "夜空の下での較正中、観測隊の天文学者は何もないはずの場所でおかしな動きをする固定点に気づきました。手元の星図表と比較して詳しく調べたところ、確認ができました。観測隊はこれまで星図に載っていなかった未知の天体を見つけたかもしれません。"
 verrier.322.f: "船は静かな空に浮かんでいた。雲は数時間前に消え、わざとらしい程にくっきりと晴れた。[ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName]博士はふたたび接眼レンズを覗き込んだ。すると、アルタイルと六分儀の格子状の枠のあいだに、何か動いている物体を見つけた。彗星にしては遅すぎる。傷にしては形が整いすぎている。\n\nそれから毎夜、[ROOT.Var('verrier_astronomer_var').GetCharacter.GetSheHe]は空の同じ場所を観測し、スケッチを描き、計算し、比較した。そしてとうとう、[ROOT.Var('verrier_astronomer_var').GetCharacter.GetHerHis]のノートに結論が記された。小型の小惑星1。2個の可能性あり。未発見。\n\nまだ金星が残っている。しかし星空から、すでに他の贈り物をもらった。"
 verrier.322.g: "みんなに知らせろ、宇宙にはまだ秘密が眠っている"
 verrier.323.t: "星々の園"
 verrier.323.d: "旅程の途上、観測隊は天体観測に適した標高にある候補地を測定するため内陸部へと向かいました。するとそこには、見慣れない植物が生い茂っていました。植物学の記録にもまったく見当たらないものだらけです。"
 verrier.323.f: "きっかけは香りだった。柑橘系のわずかな香りが森の端のシダから漂っている。[ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName]博士は香りをたどって鬱蒼とした藪のなかを進み、光が水のたまり場のように集まっている場所を発見した。\n\nそこには濃い紫色の花柄が、みごとな螺旋を描いて咲いていた。赤いコケが黒曜石のような色をした岩を覆っている。上を見れば、絡まったツタが星のようにぶら下がってそよ風に揺れている。誰も名前の知らない植物ばかりだ。\n\n若い助手が口にした。\n「まるで空が地上に落ちてきたみたいだ」\n\n目的は金星だ。しかしそよ風と穏やかな光が降りそそぐこの場所で、観測隊は金星とは別の驚異をみつけた。"
 verrier.323.g: "研究のためにサンプルを採取して保管しろ"
 verrier.324.t: "時を超えた石"
 verrier.324.d: "観測に適した標高の候補地を探す途中、観測隊は偶然にも地質学的にひじょうに興味深い場所にたどり着きました。周辺にある石の模様や含有物はこれまでめったに、それどころか一度も見たことがないようなものです。"
 verrier.324.f: "Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] ran [ROOT.Var('verrier_astronomer_var').GetCharacter.GetHerHis] hand along the layered surface of the outcrop. It shimmered faintly in the morning light, fractured with seams of metallic sheen. Swirls of deep green coiled around orange crystal cores, forming a pattern that looked almost deliberate.\n\nNearby, another slab revealed a fossilized bubble — hollow and still intact. A geologist in the team suggested a volcanic origin. Another shook his head: 'This is older than anything I've seen.'\n\nThe instruments they brought were built to observe the heavens. But here, in the rock beneath their boots, was a fragment of Earth's own deep memory."
 verrier.324.g: "This find belongs to the story of Earth itself."
 verrier.325.t: "空の下の障壁"
 verrier.325.d: "観測隊は入港地に到着しました。しかし現地の税関がなかなか入国許可を出そうとしません。科学器具の入った積荷が検査され、当局はこれまで必要とされなかった追加の書類を求めています。"
 verrier.325.f: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName]博士は積荷目録を横目に、苦々しい表情を浮かべて立ち尽くしている。水銀レンズ、精密時計、磨き抜かれた真鍮製のケース──それらがすべて鍵をかけた倉庫に山積みにされ、署名と捺印を待っている。\n\n税関職員は礼儀正しいが、しかし毅然とした態度を崩さない。\n「科学的かどうかによらず、すべての国外機材は条約で免除されていない限り申告、検査、課税の対象となります」\n\n条約を結んでいる暇はない。\n\n外ではまだ太陽が照りつけている。金星は役所の手続きを待ってはくれないだろう。"
 verrier.325.g: "代金を払って早く手続きを進めよう"
 verrier.340.t: "日面通過の観測"
 verrier.340.d: "数週間の準備が終わり、金星の日面通過を記録するための観天場の設営が完了しました。機器の微調整も完了し、星図も点検済み。あとは天候がどうなるかです。"
 verrier.340.f: "観測ドームはまるで真鍮でできた灯台のように、静かに目的を果たそうとしている。本国で建てられた石造りなのか、それとも海外の地に建造したかは関係ない。どこの観測点も、きっと固唾をのんで空を見上げている。ドームの中では、ヘリオメーターがランプの明かりに照らされている。ささやき声とともに歯車が回り始める。期待を込めてタイマーのスイッチを入れた。外では、助手たちがレンズの埃を拭いている。空気でさえ焦らしているかのようだ。[ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName]博士はドームの入り口の前に立ち、ドアに手をかけた。何か月も、すべてはこの瞬間のために準備してきた。あとはもう何も作るものはない。ただ待つだけだ。空を見上げる。この空のどこかで、金星が軌道に入っている。"
 verrier.340.g: "正確さは、落ち着いた手から生まれる"
 verrier.341.t: "微調整"
 verrier.341.d: "[ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName]博士は主力望遠鏡の内部安定装置に、わずかながらも重要な調整を施しました。この微調整によって機材のブレが抑えられ、観測した瞬間の解像度も上昇するでしょう。"
 verrier.341.f: "観測ドームの外、作業テントでの出来事だった。[ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName]博士が星図を眺めていると、[ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName]博士が油で汚れたメモ用紙をもって近づいてきた。緩衝器の張力の再計算と、内部真鍮リングの固定案。\n\n周りの隊員たちは敬意を払いつつも訝しげに聞いていた。しかしテスト結果は良好だ。対象物はわずかながら安定している。ほんの小さな改良だが、ぼやけた物体がハッキリと映るようになった。"
 verrier.341.g: "小さな変化が大きな精度を生み出す"
 verrier.342.t: "解像度の方程式"
 verrier.342.d: "近年の電磁気理論のブレイクスルーによって発明された新しい光学フィルター方式は、望遠鏡の観測手順にも応用できます。大気中の光散乱による影響をより正確に計算できるようになり、対象物をより鮮明に見ることができます。"
 verrier.342.f: "アイデアが浮かんだのは観測ドームでも、レンズメーカーの工房でもない。あるページからだった。そこには波動方程式の修正について書かれていた。光を単純な粒子や波ではなく、振動する場として扱っている。この方程式を使えば光の影響を新しいモデルで予測できるようになり、それに合わせた修正もできる。フィルターを切り直し、露光時間を調整した。技師たちは何度も疑問を口にした。\n\n夜、[ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName]博士が試作レンズを覗くと、星が一切ブレなくなった。正確に、ぴたりと、本物のように止まっていた。空はもう震えなくなった。"
 verrier.342.g: "数学が目を鋭くした"
 verrier.351.t: "1874年の日面通過"
 verrier.351.d: "横浜からレユニオン島、ケルゲレン諸島から北京。大陸と島々のあちこちで、天文学者たちは金星の太陽面通過を観測しています。1874年の日面通過は終わりました。多くの観測隊が成功を報告しています。"
 verrier.351.f: "観測隊は蒸気船で、ラクダで、鉄道で、あるいは徒歩でやってきた。技師や植物学者、製図家たちはジャングルや砂漠に観測地点を設けた。天候や影の出るタイミングを調べ、手が震えるまでレンズを磨いた。\n\nそして1874年12月9日の6時間、観測隊は太陽の表面に黒い点が通り過ぎる様子を観測した。\n\n金星はひっそりと太陽面に入り、そのままの静けさで離脱した。計測は完璧ではなかったが、十分な結果だった。三角測量も始まった。人類は史上初めて、太陽系のほんとうの大きさを解明できるかもしれない。神話でも比喩でもなく、影が物語る数字として。[ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName]博士はノートを閉じ、ため息をついた。これで終わったのだ。"
 verrier.351.g: "美しい"
 verrier.352.t: "1882年の日面通過"
 verrier.352.d: "1882年12月6日、金星はふたたび太陽を横切りました。今世紀最後のイベントのため、世界各国の観測班は機材を空に向け、黒い円盤状になって通過する金星の姿をとらえました。"
 verrier.352.f: "船は以前よりも早くに出発した。天文台も大きくなった。時計はより正確になった。1874年に得た教訓がすべての針を、すべての影を、すべての計算を導いた。\n\nニュージャージーからパタゴニア、メキシコからオーストリアまで、世界中が太陽に浮かぶ小さな点の前のために立ち尽くした。\n\n[ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName]博士はフィルターの最終調整を終えた。そして円盤が見えた。光り輝く白い球体の上を、ゆっくりと通過している。歓声はなく、ただペンの走る音と、シャッター音と、静かな勝利の息吹だけがあった。次に金星が戻ってくるのは121年後だ。しかし今この瞬間、時間そのものが計測された。"
 verrier.352.g: "もう二度と見ることはない"
 verrier.353.t: "光のヴェール越しに"
 verrier.353.d: "待ちに待った瞬間が近づく中、天候が崩れ始めました。雲が立ち込めています。何も見えないほど厚い雲ではありませんが、観測タイミングで対象物をぼやけさせるには十分すぎる大きさです。"
 verrier.353.f: "空が完全に覆われてしまったわけでは無いが、もうどうしようもない。幾層にも重なった漂う雲が、まるで薄い膜のように広がっている。光量も急に暗くなったり明るくなったりと安定しない。どのレンズも調整を繰り返し、観測隊員は息をつく暇もない。\n\n[ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName]博士はフィルター越しにじっと空を見つめている。金星のシルエットが現れた。おぼろげで、屈折して、まるで雲の合間で計算結果をもてあそぶように揺れ動いていた。\n\n結局、綺麗な弧は見えなかった。とても教科書に載せられるような観測結果ではない。しかしデータであることには変わりない。気まぐれな空の下で、苦労して手に入れたデータだ。"
 verrier.353.g: "天が手がかりを与えてくれたのなら、それをつなぎ合わせるのが我々の使命だ"
 verrier.354.t: "動く影"
 verrier.354.d: "金星の日面通過の途中、観測隊が得たのは正確なデータだけではありません──写真です。観測中に数十枚の写真乾板を撮影し、その後時系列順に並べて一連の動きをまとめました。史上はじめて、惑星の日面通過を映像として記録したのです。"
 verrier.354.f: "ちらつき、ぶれたりしながらも、しかし確かに動いている。並べた乾板の中で金星が太陽面に入り、完璧な黒点となって滑るように動いていた。ただの計算でもスケッチでもない。動いている。あの瞬間が確かに収められているのだ。[ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName]博士は暗室で立ち尽くし、ランタンを上げ、短い一部始終を何度も何度も繰り返し見た。6時間にも及んだ観測が、ほんの数秒間に凝縮された。天文学者たちは喜びを語った。新しいことを成し遂げたと実感した。彼らは空を動かしたのだ。"
 verrier.354.g: "各フレームを分析すれば、天体運動モデルをさらに修正できるだろう"
 verrier.355.t: "金星行進曲"
 verrier.355.d: "世界が熱狂した1882年の金星の日面通過から着想を得て、[ROOT.Var('elgar_composer_var').GetCharacter.GetFullName]は式典用の新曲を作曲しました。大勢の聴衆を前にした初演において、日面通過の荘厳さと科学新世紀のリズムをとらえた行進曲が演奏されました。"
 verrier.355.f: "1882年の金星の日面通過から1年後、アメリカのジョン・フィリップ・スーザは物理学者ジョセフ・ヘンリー（78年没）の銅像建立式のための行進曲を依頼されました。スーザはフリーメイソンの一員でした。フリーメイソンは自然現象には神秘的な性質があるととらえ、スーザもその神秘に魅了されていました。こうして金星の日面通過が作曲されましたが、スーザの生前は人気がありませんでした。死後もスーザの自筆譜が火災で焼失したため、長い間演奏されませんでした。"
 verrier.355.g: "聴衆のためではなく、歴史のために作られる曲がある"
 verrier_venus_transit_modifier: "金星の日面通過の観測"
 building_verrier_observatory_throughput_add: "天文台施設[concept_throughput]"
 building_verrier_observatory_throughput_add_desc: "天文台の[concept_throughput]上昇"
 verrier.161.t: "分裂説"
 verrier.161.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName]博士は革新的な仮説を発表しました。月はもともと地球の一部で、やがて自転の高速化と潮汐力で分裂したというのです。"
 verrier.161.f: "定説となっているカント＝ラプラスモデル（地球と月は回転するガス星雲から同時期に形成されたとする説）とは矛盾していますが、とにかく[ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName]博士の新説によると、かつて地球はすさまじい自転速度によって地表の一部がちぎれ、そのちぎれた部分が月になったというのです。この仮説は潮汐力から出発しており、地球＝月系の角運動量が月分裂を裏付けているとのことです。月の低い密度、それに地球の表面と似た組成である理由も、もともと地表付近だったとすれば説明がつきます。物理学的なサンプルに欠けてはいますが、この分裂説モデルは月の軌道と地球の遅い自転速度の緊密なつながりを、メカニズム面から説明しています。"
 verrier.161.g: "すばらしい"
 verrier.162.t: "捕獲説"
 verrier.162.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName]博士は大胆な仮説を発表しました。月は地球から形成されたのではなく、かつて太陽系のどこかにいた天体が地球の重力に囚われたというのです。"
 verrier.162.f: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName]博士は現行の双子説に異を唱え、月はかつて独立した天体であったと主張しています。[ROOT.Var('verrier_astronomer_var').GetCharacter.GetHerHis]の計算によると、かつて別々の場所で形成された地球と月が、長い年月をのなかで地球の強力な重力によって月が引き寄せられたというのです（博士は大気の抵抗や他の天体の影響で重力が強くなった可能性があるとしている）。この説なら月の軌道傾斜角や独特の運動を説明できますが、正確な条件が揃わなければ月のような天体を重力に捉えつづけるのは難しいという批判も寄せられています。また捕獲に必要なエネルギーがどこに消えたのかを説明できるメカニズムもありません。それでもこの仮説は古典的仮説への大胆な挑戦として注目をあつめています。"
 verrier.162.g: "憶測だが、検証する価値はある"
 verrier.163.t: "大衝突説"
 verrier.163.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]博士は大胆な地質学的仮説を発表しました。原始地球に巨大な天体が衝突したことで地球の物質が宇宙にばらまかれ、これが月を形成したというのです。"
 verrier.163.f: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]博士は月の起源にまつわる未解決の矛盾に不満を抱き、壮大な新説を発表しました。地球はその形成期において、巨大な天体（おそらく小惑星と惑星の中間サイズ）が斜めに衝突してきたというのです。その結果大量のデブリ（ほとんどは地表部）が放出され、同じ軌道に乗って徐々に月に集積していったとのことです。この仮説シナリオなら月の低い密度、月表面と地球のマントル部との類似、地球＝月系の大きな角運動量を説明できます。あくまで推測の域を出ておらず、証明も難しいでしょう。しかし天体メカニズムと地質学的説明を結びつけた点、また地球と月が徐々に形成されたのではなく衝突の過程で生まれたという大胆なシナリオは注目をあつめています。"
 verrier.163.g: "この仮説は惑星科学を発展させるかもしれない"
