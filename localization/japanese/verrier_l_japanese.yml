 je_verrier_venus_transit_1874: "1874年[SCOPE.sCountry('target').GetName]での日面通過観測"
 je_verrier_venus_transit_1874_reason: "珍しい天体現象が近づいています。金星が地球と太陽の間を通過し、太陽面に小さな影を落とします。世界各国の天文台がこの千載一遇の現象を観測するべく準備を進めています。うまくいけば、太陽系のスケールを精確に把握する手がかりになるかもしれません。\n$mr_divider_for_je$\nこの遠征の途中、成果ポイントを獲得できます。遠征終了時に成果ポイントに応じて補正が獲得できます。ポイントが多ければ多いほど補正の効果も上がります。\n#V 現在の成果:#![GetPlayer.MakeScope.Var('verrier_venus_transit_success_var').GetValue|0+]"
 je_verrier_venus_transit_1874_on_complete_tt: "遠征の終盤、#n 25%の確率で悪天候#!に見舞われ、成果ポイントが減少する。遠征が終わると、#V 成果ポイントに応じた#!#V 補正#!が獲得できる。"
