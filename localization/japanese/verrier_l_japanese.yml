 verrier_kothe_buy_additional_instruments_button_desc: "ターラー・ワーリー・コーティで使う観測機器を購入する。建設期間が短縮される。"
 verrier_kothe_employ_physics_teachers_button: "物理学講師の雇用"
 verrier_kothe_employ_physics_teachers_button_desc: "大学講師を雇い、最先端の物理学や天文学を学ぶ。ターラー・ワーリー・コーティの建設期間を短縮し、技術ボーナスを得る"
