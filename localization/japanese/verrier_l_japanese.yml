 verrier.142.t: "太陽フレア"
 verrier.142.d: "太陽フレアの観測中、[GetPlayer.MakeScope.Var('verrier_astronomer_var').GetCharacter.GetFullName]はきわめて特異な現象を発見しました。博士の仮説が正しければ、太陽嵐が地球に接近しているそうです。科学的にはこれまでにない重要なイベントですが、危険性も捨てきれないとのことです。"
 verrier.142.f: "太陽フレアとは、太陽表面付近の磁場エネルギーが変換されて爆発的に放出される現象。フレア付近のスペクトル線からはおもにヘリウム、カルシウム、水素が検出されます。ここでフレアが発生すると紫外線、X線　陽子、電子、イオンを含んだ爆発的な短波が放出され、地球に到達すると電離層を撹乱して通信障害を引き起こします。太陽フレアで放出された粒子が地球の大気圏にまで到達すると、磁気嵐という現象が起こります。まず粒子はゆっくりとオーロラ層に到達して電離層嵐を引き起こします。すると夜でも明るいオーロラが見えるようになり、強い電気の乱れが磁気に影響を与え、磁気嵐が発生します。"
 verrier.142.g: "教授、いったいどうなるんです？"
 verrier.143.t: "[SCOPE.sCharacter('verrier_carrington_discoverer').GetLastName]・イベント"
 verrier.143.d: "磁気嵐が地球にやってきた！この特異な自然現象によって、ローマやハバナ、中国でもオーロラが観測されています。人々は宇宙の神秘に驚いています。どうやらこの現象は、天文学者の[SCOPE.sCharacter('verrier_carrington_discoverer').GetFullName]が発見した太陽フレアと関係があるようです。"
 verrier.143.f: "1859年8月28日から9月4日にかけて、天文学者のリチャード・キャリントンは強力な太陽フレアを複数回観測しました。コロナ質量放出によって秒速2000kmで放出された物体は17.5時間後に地球に到達しました。最大規模の磁気嵐は9月1日から2日にかけて記録され、北半球と南半球の両方でオーロラが観測されました。アメリカのロッキー山脈ではあまりの明るさに金鉱の鉱員たちが目覚め、朝だと勘違いして朝食を作ったといいます。またアメリカ北東部では、オーロラの光で新聞が読めました。オーロラは各地で観測され、極点はもちろんのこと、メキシコの南部・中部、キューバ、ハワイ、クイーンズランド、日本と中国の南部など低緯度の場所、さらにはコロンビアなどの赤道に近い場所でも記録が残っています。"
 verrier.143.g: "恐ろしくも素晴らしい光景だ"
 verrier.144.t: "電信システムの寸断"
 verrier.144.d: "誘導電流によって磁場が乱れ、ヨーロッパと北アメリカ全土で電信網が途絶しています。電信ケーブルに高圧電流が流れているため、交換手が感電したり、書き取り用紙が漏電で燃えたとの報告も寄せられています。一部の交換台では電源が切れているにもかかわらず、メッセージの送受信が行えるとのことです。"
 verrier.144.f: "ボストン交換台（ポートランド交換台宛）:「15分間電源を落としてください」\nポートランド交換台:「了解。いま切断した」\nボストン:「こちらも切断済み。現在オーロラの電流によって稼働。こちらのメッセージは届いているか？」\nポートランド:「電源が付いていた時よりも良好。電流はゆっくりと増減を繰り返している」\nボストン:「こちらの電流は非常に強く、電源なしでも良好に稼働。オーロラのせいでバッテリーの出力が乱高下しているため、ときどき電磁リレーに強すぎる電流が流れる。おそらく問題は解決するまではバッテリーなしでも稼働する」\nポートランド:「承知した。では本題に入ってよろしいか？」\nボストン:「了解。どうぞ」"
 verrier.144.g: "電気なしで電信が使えるだと！？バカな、あり得ないことだ！"
 verrier.9010.t: "科学の音"
 verrier.9010.d: "[SCOPE.sState('sound_of_science_state').GetCityHubName]大学の教授が公開実験を行っています。#variable クリストファー・ドップラー#!の提唱する、音や光の周波数はその発生源や観測者が移動することで変化するという仮説を検証するためです。"
 verrier.9010.f: "走行用の列車、音源用のホルン、そして絶対音感を持った10名ほどの観測者が#bold #variable [SCOPE.sState('sound_of_science_state').GetFarmHubName]・[SCOPE.sState('sound_of_science_state').GetCityHubName]#!#!間鉄道に集まって、想像力豊かな実験を行いました。何のために？それはドップラーが提唱した星の運動についての仮説を検証するためです。仮説が正しければ、波の周波数は物体の速度に応じて変化する。つまり走る列車からホルンを鳴らせば、観測者からははっきりと音程が下がって聴こえるはずです。\n観測者には8分の1の音高差をも聞き分けることのできる人が選抜され、列車の通過を注意深く観察して記録しました。そして3日間の実験が終わり、結論が出そろいました。その結果……観察者は一様に音高の低下を記録しています！"
 verrier.9010.g: "観察と実験が知識の源だ"
 verrier.9010.h: "新たな事実が、思いもよらぬ形で役に立つこともある"
 verrier_sound_of_science_prestige_modifier: "科学の音"
 verrier_sound_of_science_tech_spread_modifier: "科学の音"
 je_verrier_uranus: "Another Planet?"
 je_verrier_uranus_reason: "Could it be that there is another planet out there? For centuries, there were only 6 planets, but with the recent improvements of telescopes, it is very much possible that we might find another one. And why stop at 7, maybe there are even more! Finding more planets might even help to unravel the mysteries of the universe.\n\n#b Historical Context:#! The 6 planets were known for a long time, as they were easy to observe even with bare eyes thanks to their brightness. Uranus, Neptune and Pluto on the other hand were less bright and even though Uranus is visible for eyes in the right circumstances, Its slow orbital speed has led many astronomers to believe that the planet is a fixed star."
 je_verrier_uranus_goal: "To determine whether there is another planet or not, we need to discover [JournalEntry.GetTotalGoalValue|0+] @verrier_astronomicalobject! [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]."
 je_verrier_uranus_fail: "If another nation meets the requirements before us they might find a new planet or maybe realise that there are only 6 planets."
 verrier.12.t: "A new Planet!"
 verrier.12.d: "[SCOPE.sCharacter('verrier_astronomer_scope').GetFullName] has discovered an unknown planet that is now called Uranus! An event no one has seen coming."
 verrier.12.f: "[SCOPE.sCharacter('verrier_astronomer_scope').GetFullName] first thought to have found a new comet. Only weeks later was it clear that it was in fact a new planet! It is incredible that another planet was basically not considered possible before. But now that Uranus was found, many ask, if there could be even more planets.\n\n#b Historical Context:#! It was not until 1781 that Wilhelm Herschel stumbled across Uranus by chance. At first he thought it was a comet, because why should there be more planets than the well-known ones? Within the next 3 months, however, the scientific community realized that it was indeed a new planet."
 verrier.12.g: "Unbelieveable! Are there possibly even more planets?"
 verrier.13.d: "A sensation happened! An astronomer from [SCOPE.sCountry('verrier_uranus_discoverer_country').GetName] has found a new planet called Uranus. And if there is one more, maybe we can find eben more!"
 verrier.13.g: "If there are more than 6, maybe there are even more for us to discover!"
 verrier_uranus_discoverer_modifier: "Discoverer of Uranus"
 je_verrier_dwarf_planets: "Celestial Police"
 je_verrier_dwarf_planets_reason: "Note: This Journal Entry can be completed multiple times.\n\nAfter the discovery of Uranus the possibility of finding other planets could exist. As there are no planets in a huge region between Mars and Jupiter, astronomers hope to find another planet there. Therefore they founded the Celestial Police, multiple observatories working together to find a planet.\n\n#b Historical Context:#! The Celestial Police (German: Himmelspolizey) was a cooperation of numerous European astronomers in the early 19th century. It is mainly known in relation to the search for objects expected between the orbits of Mars and Jupiter. It was formed in 1800 at the second European congress of astronomers."
 je_verrier_dwarf_planets_goal: "To possibly find a new planet, we need to discover [JournalEntry.GetGoalAddValue|0+] @verrier_astronomicalobject! [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]."
 verrier.14.t: "Ceres discovered"
 verrier.14.d: "[SCOPE.sCharacter('verrier_astronomer_scope').GetFullName] has discovered an unknown planet in the Region between Mars and Jupiter. A huge discovery!"
 verrier.14.f: "#b Historical Context:#! Astronomers have long suspected another planet in the gap between Mars and Jupiter. Therefore, the Celestial Police was founded and the space was divided up and transferred piece by piece to different observatories.\nOn New Year's night in 1801, Giuseppe Piazzi discovered Ceres by chance in a star catalog."
 verrier.14.g: "I wonder how many more planets there are?"
 verrier_ceres_discoverer_modifier: "Discoverer of Ceres"
 notification_verrier_ceres_discovered_notification_name: "Ceres discovered"
 notification_verrier_ceres_discovered_notification_desc: "Dr. [SCOPE.sCharacter('verrier_astronomer_scope').GetLastName] has made a incredible discovery and found a new planet in the solar system. The planet will be named Ceres and is located between Mars and Jupiter."
 verrier.15.t: "Pallas discovered"
 verrier.15.d: "[SCOPE.sCharacter('verrier_astronomer_scope').GetFullName] has discovered an unknown planet in the Region between Mars and Jupiter. A huge discovery!"
 verrier.15.f: "#b Historical Context:#! When Ceres was found between Mars and Jupiter, no one expected there to be another planet in the same region. It was a huge suprise, when Heinrich Wilhelm Olbers discovered a new planet while looking for Ceres. The discovery of Pallas lead the Celestial Police to search for other planets in the same region which proved fruitful only a few years later."
 verrier_pallas_discoverer_modifier: "Discoverer of Pallas"
 notification_verrier_pallas_discovered_notification_name: "Pallas discovered"
 notification_verrier_pallas_discovered_notification_desc: "Dr. [SCOPE.sCharacter('verrier_astronomer_scope').GetLastName] has made a incredible discovery and found a new planet in the solar system. The planet will be named Pallas and is located between Mars and Jupiter."
 verrier.16.t: "Vesta discovered"
 verrier.16.d: "[SCOPE.sCharacter('verrier_astronomer_scope').GetFullName] has discovered an unknown planet in the Region between Mars and Jupiter. A huge discovery!"
 verrier.16.f: "#b Historical Context:#! When Heinrich Wilhelm Olbers found his second planet in 1807 he asked Carl Friedrich Gauß to name it. The newly named Vesta was the fourth planet found in the region between Mars and Jupiter and would be the las for about 40 years."
 verrier_vesta_discoverer_modifier: "Discoverer of Vesta"
 notification_verrier_vesta_discovered_notification_name: "Vesta discovered"
 notification_verrier_vesta_discovered_notification_desc: "Dr. [SCOPE.sCharacter('verrier_astronomer_scope').GetLastName] has made a incredible discovery and found a new planet in the solar system. The planet will be named Vesta and is located between Mars and Jupiter."
 verrier.17.t: "Juno discovered"
 verrier.17.d: "[SCOPE.sCharacter('verrier_astronomer_scope').GetFullName] has discovered an unknown planet in the Region between Mars and Jupiter. A huge discovery!"
 verrier.17.f: "#b Historical Context:#! After the discovery of Ceres in 1801 and Pallas in 1802, it only took 2 more years until Karl Ludwig Hardwig found Juno in the same region between Mars and Jupiter. All three planets as well as Vesta (discovered in 1807) remained planets for a while until more and more asteroids were found and considered planets. Then astronomers decided that none of them were actual planets."
 verrier_juno_discoverer_modifier: "Discoverer of Juno"
 notification_verrier_juno_discovered_notification_name: "Juno discovered"
 notification_verrier_juno_discovered_notification_desc: "Dr. [SCOPE.sCharacter('verrier_astronomer_scope').GetLastName] has made a incredible discovery and found a new planet in the solar system. The planet will be named Juno and is located between Mars and Jupiter."
 je_verrier_neptune_goal: "未知の惑星を発見するためには、星空についての詳細な研究が必要です。[JournalEntry.GetTotalGoalValue|0+]個の@verrier_astronomicalobject![Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]を発見すれば、惑星の正体を突き止めることができます。"
 je_verrier_pluto_goal: "惑星Xを発見するためには、星空についての詳細な研究が必要です。[JournalEntry.GetTotalGoalValue|0+]個の@verrier_astronomicalobject![Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]を発見すれば、惑星の正体を突き止めることができます。"
 MR_ASTEROID_CONGRESS_DWARF_PLANETS_TT: "#default_text #V ケレス#!、#V パラス#!、#V ヴェスタ#!、#V ジュノー#!が発見されている。#!"
 je_verrier_astro_physics: "天体物理学"
 je_verrier_astro_physics_reason: "物理学の新たな発見は、科学の世界を一変させました。天文学もその例外ではありません。物理学と天文学は実りある交流を続け、物理学に基づいた理論や観察によって宇宙の謎はますます解き明かされるのです。"
 verrier_astro_physics_tech: "天体物理学"
 verrier_astro_physics_tech_desc: "天体物理学とは科学分野のひとつで、物理学や化学の手法・理論をもちいて天体や現象を研究します。天体物理学の祖ジェームス・キーラーはこんな言葉を残しています。いわく天体物理学とは、「天体の位置や運動ではなく、その本質を探ろうとする学問である──重要なのはどこにあるかではなく、それが何なのかだ」"
 verrier_modern_physics_tech: "現代物理学"
 verrier_modern_physics_tech_desc: "現代物理学とは、20世紀初頭に入ってから発展した物理学分野の1つです。有名なものでは量子力学、特殊相対性理論、一般相対性理論があります。おもに光の速さに匹敵する高速、原子半径レベルの極小世界、非常に強力なエネルギーなど、極端な条件を取り扱っています。"
 verrier_nuclear_physics_tech: "原子物理学"
 verrier_nuclear_physics_tech_desc: "原子物理学は物理学のひとつで、原子核の構造や性質を研究する分野です。核構造の解析、すなわち原子核の構造や反応について調べる学問です。核の自発的変化（放射能）、核の散乱プロセス、核同士の反応などを実験や理論をもちいて調べるのが目的です。核分裂や核融合を基軸としたテクノロジーは、すべて原子物理学の研究から生まれました。"
 verrier_first_sun_photo_modifier: "世界初の日食写真"
 verrier_helium_discovered_modifier: "太陽の元素"
 verrier_comet_observer: "彗星の観察"
 verrier_comet_observer_desc: "この天文学者は大彗星を発見した。その彗星には博士の名前が付けられている。"
 verrier_magnetic_storm_observer: "磁気嵐の観測"
 verrier_magnetic_storm_observer_desc: "この天文学者は太陽フレアによって発生した磁気嵐を詳細に観測、研究した。"
 verrier_solar_observer: "日食の観察"
 verrier_solar_observer_desc: "この天文学者は日食を観測し、貴重な科学的知見を得た。"
 verrier.152.t: "日食"
 verrier.152.d: "今年は珍しい現象が起こりました。[ROOT.GetCountry.GetCapital.GetCityHubName]一帯で皆既日食が観測できたのです。[GetPlayer.MakeScope.Var('verrier_astronomer_var').GetCharacter.GetFullName]は皆既日食を間近に観測するという貴重な経験をしました。"
 verrier.152.f: "日食とは、地球上の特定の地点から観測したときに太陽が一部分、あるいは全体が隠れて見える天体現象です。月の影が地球がを通過することで起きる現象で、そのため新月のタイミングでしか発生しない。日食を観測することで、太陽や宇宙全体についての新たな発見につながることもあります。1919年5月29日の皆既日食では、アーサー・スタンレー・エディントン率いる観測隊がアフリカのプリンシペ島に上陸して日食を観測しました。エディントン隊は、当時アインシュタインが数年前に発表したばかりの相対性理論を実証したことで有名です。彼らは太陽の重力場を通過した遠方の星の光が曲がっていることを発見し、相対性理論を観測によって証明したのです。"
 verrier.152.g: "非常に珍しい現象だ！"
 verrier.153.t: "[GetPlayer.MakeScope.Var('verrier_astronomer_var').GetCharacter.GetLastName]の数珠"
 verrier.153.d: "Our astronomer, [GetPlayer.MakeScope.Var('verrier_astronomer_var').GetCharacter.GetFullName], had the extraordinary opportunity to observe the solar corona and prominent objects more closely during the last solar eclipse. The scientist assigned these as parts of the solar atmosphere."
 verrier.153.f: "The Baily's beads, diamond ring or more rarely double diamond ring effects, are features of total and annular solar eclipses. Although caused by the same phenomenon, they are distinct events during these types of solar eclipses. As the Moon covers the Sun during a solar eclipse, the rugged topography of the lunar limb allows beads of sunlight to shine through in some places while not in others. They are named for Francis Baily, who explained the effects in 1836. The diamond ring effects are seen when only one or two beads are left, appearing as shining 'diamonds' set in a bright ring around the lunar silhouette."
 verrier.153.g: "This phenomenon should be named after Dr. [GetPlayer.MakeScope.Var('verrier_astronomer_var').GetCharacter.GetLastName]."
 verrier.154.t: "First Photo of a Solar Eclipse"
 verrier.154.d: "With a new technical process, Dr. [GetPlayer.MakeScope.Var('verrier_astronomer_var').GetCharacter.GetLastName] succeeded in taking the first photograph of a solar eclipse."
 verrier.154.f: "Photographing a rare event such as a total eclipse posed unique challenges for early photography, including the extreme contrast between the corona and the dark shadow of the Moon, as well as the unusual angle to which photographic equipment had to be oriented. Prior to the eclipse of July 28, 1851, no properly exposed photograph of the solar corona had yet been produced. For this occasion, the Royal Prussian Observatory at Königsberg commissioned one of the city's most skilled daguerreotypists, Johann Julius Friedrich Berkowski, to record a still image of the event. The observers attached a small six-centimeter refracting telescope to a 15.8 centimeter Fraunhofer heliometer, and Berkowski made an eighty-four second exposure shortly after the beginning of totality."
 verrier.154.g: "Perfect."
 verrier.155.t: "太陽の元素"
 verrier.155.d: "Using a new spectographic technique, Dr. [GetPlayer.MakeScope.Var('verrier_astronomer_var').GetCharacter.GetLastName] made a remarkable discovery during the last solar eclipse. It looks like he has discovered a new element. Nobody wanted to believe him at first, but the chemist Dr. [GetPlayer.MakeScope.Var('mendelejew_chemist_var').GetCharacter.GetLastName] has just confirmed this discovery."
 verrier.155.f: "Evidence of the element helium was first obtained from a bright yellow spectral line at a wavelength of 587.49 nanometers in the spectrum of the Sun's chromosphere. The French astronomer Jules Janssen made this observation in India during the total solar eclipse of August 18, 1868. When he announced his discovery, no one initially believed him because no new element had ever been found in space before it was proven on the planet Earth could be guided. On October 20 of the same year, the Englishman Norman Lockyer confirmed that the yellow line was indeed present in the solar spectrum and concluded that it was caused by a previously unknown element. Since this spectral line was very close (1.8 nm from the center) to the Fraunhofer double-D line (D2 = 589.00 nm, D1 = 589.60 nm) of the metal sodium, he named the line D3 to describe it to be distinguished from these lines D1 and D2 of sodium. He and his English colleague Edward Frankland suggested naming the new element helium (from the Greek helios, sun)."
 verrier.155.g: "Helium? An apt name for the solar element!"
