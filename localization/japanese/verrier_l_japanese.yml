 verrier.55.t: "暗黒面"
 verrier.55.d: "わが国の天文学者は才能と幸運にめぐまれています。博士は月の秤動の瞬間を撮影することに成功したのです！"
 verrier.55.f: "月は地球にほぼ同じ面を向けているが、ほんのごく僅かなゆらぎがあります。この軌道のブレによって普段なら見ることのできない月の裏側がほんの少しだけ垣間見える瞬間が発生し、月の最大の秘密について貴重な手がかりを得ることができるのです。この瞬間を撮影するには手腕はもちろんのこと、相当の運にも恵まれていなければなりません。何時間もひたすら写真機をのぞき込み、最高のタイミングで完璧な写真を撮れるよう祈り続けるのです。\n\nしかし成功すれば、地球のいちばん古い友が歴史上一度も見せてこなかった場所を見ることができるのです。"
 verrier.55.g: "月の裏側もすべて見られる日が来るだろう"
