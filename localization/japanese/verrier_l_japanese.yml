 ACHIEVEMENT_DESC_verrier_gmt: "本初子午線をあなたの天文台と同じ場所にする"
 verrier.171.t: "鉄道時間"
 verrier.171.d: "新たなテクノロジーの登場は人々の時間感覚を変えたばかりでなく、その限界も示しました。鉄道と電信の発達によって、人々は時間がどこでも同じではないことに気づき始めています。"
 verrier.171.f: "19世紀初頭、まだ世界には単一の標準時間が存在しておらず、どこの市や村も太陽時（太陽が最も高い位置に登る時間を基準にした時間系）を用いていました。移動や通信が遅かった時代は大きな問題もなく、この慣習は数世紀にわたって続いていました。しかし離れた場所が急速につながったこの時代、時間のズレも徐々に目立ちつつありました。たとえばロンドン＝ブリストル間には11分の、ニューヨーク＝シカゴ間には1時間もの時差がありました。このように地方時間が乱立している状況は、鉄道の正確な到着・出発を管理する時刻表を作るうえで大きな悩みのタネでした。\n\nそこでイギリスの鉄道会社は、1840年代からいわゆる「鉄道時間」と呼ばれるシステムを発明しました。もともとは運行目的にのみ用いられ、各地の駅は地元の太陽時に合わせていました。しかしやがて時刻の統一による利便性が優先されました。1847年初めには大半の鉄道会社が時刻表の基準としてグリニッジ標準時（GMT）を採用し、1855年にはイギリスのほとんどの都市にも導入されました。こうして鉄道時間は法的根拠がないままに事実上の全国標準時となったのです。"
 verrier.171.g: "鉄道会社と電信局が時間を作っているのか？"
 verrier.172.t: "標準時"
 verrier.172.d: "[GetPlayer.GetName]における時間の統一法が可決しました。これにより鉄道会社や電信局の時間管理にのみ用いられていた時系が、わが国の日常生活の一部となります。時間の統一によって経済や行政の効率が上がります。もっとも一部の町では地元の時間を惜しむ声もあるようですが。"
 verrier.172.f: "鉄道時間は全国標準時の先駆けとなりましたが、あくまで利益のための発明です。政府の政策ではなく、ビジネス上の要請から生まれたにすぎません。やがて多くの国々が全国規模の標準時間を決める法律を制定し、鉄道時刻表だけではなく社会のあらゆる場面で用いられるようになりました。まずイギリスでは1880年に全国標準時法が制定され、ドイツでも1893年に中央ヨーロッパ時間を導入。フランスもようやく1911年にグリニッジ標準時からプラス1時間を全国標準時と定めました。\n\n鉄道時間と全国標準時の大きな違いは、その範囲と強制力です。鉄道時間はもともと鉄道運行をスムーズに進めるための業界内ルールでしたが、全国標準時は政府が導入した包括的な統一時間です。この2つの時系の発展は間接的に影響を及ぼし、やがて1884年の世界子午線会議につながりました。"
 verrier.172.g: "マックス・ウェーバーはこの件について何か意見がありそうだ"
 verrier.173.t: "国際子午線会議"
 verrier.173.d: "[ROOT.GetCountry.GetCapital.GetCityHubName]で開かれた会議には複数の国々の代表が出席し、本初子午線を[GetGlobalVariable('verrier_prime_meridian_global_var').GetCountry.GetName]に置くことを定めました。すでに人々は「[GetPlayer.GetCustom('verrier_prime_meridian_city')]標準時」と呼んでいます。"
 verrier.173.f: "国際子午線会議は、国際的に使用される本初子午線を決めるための会議でした。議題は「国際的に採用される経度0度および全世界共通の時刻基準」の選定でした。史実では、グリニッジ子午線が国際的な経度0度基準に推薦されました。これ以前にも地図作成時に本初子午線が使われていましたが、この会議によって地域ごとに設けられる時間帯、タイムゾーンが国際的に承認されました。\n\n史実でグリニッジ天文台が普及した主な理由は、当時のイギリスが世界最大の列強国として貿易を支配していたからです。国力や物理的なテクノロジー、商船隊の市場での存在感、大西洋横断ケープの敷設、電信や鉄道を扱う企業、優秀な天文学者。これらすべてが本初子午線が通る場所を決める要素です。"
 verrier.173.g: "時間を国際化できるのか？"
 verrier.174.t: "タイムゾーン"
 verrier.174.d: "[GetPlayer.GetCustom('verrier_prime_meridian_city')]に本初子午線を置き、世界基準時間として[GetPlayer.GetCustom('verrier_prime_meridian_city')]標準時が採用された。国際子午線会議の次の議題は、タイムゾーンの定義についてだ。"
 verrier.174.f: "タイムゾーンによる分割に反対する国もありました。もともと国内に4つのタイムゾーンが存在したアメリカ合衆国はすぐに採用しましたが、そうした国ばかりではありませんでした。一部の国では国境地帯との時差が生じるのを承知で、依然として首都を基準としたタイムゾーンを全国に適応しました。ほかにも国内の事情に合わせて30分ごとのタイムゾーンを採用したり、中には実際とは異なるタイムゾーンを用いる国もありました。"
 verrier.174.g: "基本的には国際基準に従おう"
 verrier.174.h: "[GetPlayer.GetName]には国際基準よりも、国内事情に合わせたタイムゾーンが必要だ"
 verrier_radioactivity_tech: "放射能"
 verrier_radioactivity_tech_desc: "1895年、アントワーヌ・アンリ・ベクレルが写真乾板の感光から自然放射能を発見し、その後1915年に物理学現象として分類されました。ピエール・キュリーとマリー・キュリーは放射能研究を開拓し、放射性元素の発見・分離などの大きな功績を残しました。ベクレルとキュリー夫妻は放射能研究の成果を認められて、1903年にノーベル物理学賞を受賞しました。この3人の研究は原子力研究の歴史的なはじまりとされています。"
 verrier_spectroscopy_tech: "分光法"
 verrier_spectroscopy_tech_desc: "分光法とは、放射線の波長、エネルギー、質量などの特定の性質を分析する物理学の分析手法の総称です。分光法で得られる強度分布はスペクトルと呼ばれます。まず分光器が発明され、その後ロベルト・ブンセンとグスタフ・キルヒホフが発光スペクトルを観測することで新たな元素を発見しました。"
