 verrier.501.t: "他国が衛星を発見"
 verrier.501.d: "残念ながら、[ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName]博士が見つけようとした衛星は他の国に発見されてしまいました。このニュースはすでにあらゆる新聞に掲載されています。"
 verrier.501.f: "「見るという行為はそれだけでも尊敬に値する、学んで会得すべき技能なのだ」\n──ウィリアム・ハーシェル"
 verrier.501.g: "失望したぞ"
 verrier.511.t: "ダイモス発見"
 verrier.511.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]による数ヶ月の観測はムダではなかった。[ROOT.Var('verrier_astronomer_var').GetCharacter.GetSheHe]は火星軌道上に、これまで知られていなかった衛星を発見しました！この大型天体は#YELLOW ダイモス#!と命名されます。"
 verrier.511.f: "「わたしは（1877年8月）11日夜のはじめ頃に何度も観測したが、何も見つからなかった。それでも何時間か経つと惑星のすぐそば、わずかに北側にかすかな天体をとらえた。しかし近くの川からの霧で観測は中断され、天体の詳しい位置を図る時間はほとんどなかった。11日の深夜2時のことだった。それから数日間は曇りの日がつづいた。8月16日、またしても惑星のそばで天体を発見した。その夜の観測で、天体が惑星とともに動いていること、もしも衛星であれば離角に近い場所にあることが分かった。この時まで、わたしは火星の新たな衛星を捜索していると誰にも話していなかったが、16日夜の観測を終えて午前3時に帰宅する、助手のジョージ・アンダーソンにその天体をみせ、火星の衛星を発見したと思うと打ち明けた」\n──アサフ・ホール"
 verrier.511.g: "コレクションに月が増えた"
 verrier.512.t: "フォボス発見"
 verrier.512.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]による数ヶ月の観測はムダではなかった。[ROOT.Var('verrier_astronomer_var').GetCharacter.GetSheHe]は火星軌道上に、これまで知られていなかった衛星を発見しました！この大型天体は#YELLOW フォボス#!と命名されます。"
 verrier.512.f: "「（1877年）8月17日の1時から2時の間、わたしが観測結果をまとめていると、ニューカム教授が昼食を食べにやってきた。わたしは火星近くにかすかな天体を発見し、それが火星とともに動いていることを伝えた。翌17日、発見した衛星の観測を待っていると、その内側に新たな衛星を発見した。17日から18日の観測によってこの天体の正体は明らかになり、ロジャース提督が衛星の発見を公表した」\n──アサフ・ホール"
 verrier.521.t: "アマルテア発見"
 verrier.521.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]による数ヶ月の観測はとうとう報われました。[ROOT.Var('verrier_astronomer_var').GetCharacter.GetSheHe]は木星軌道上に、これまで知られていなかった衛星を発見しました！この大型天体は#YELLOW アマルテア#!と命名されます。"
 verrier.521.f: "アマルテアは、1892年9月9日に天文学者のエドワード・E・バーナードがリック天文台（アメリカ、カリフォルニア州ハミルトン山）の91cm望遠鏡で発見しました。かれは木星の新たな衛星を目的とした系統的調査の途中でした。1610年にガリレオ・ガリレイが4つの衛星を発見して以来初となる木星の衛星発見でした。当初は木星5番目の衛星ということでそのまま「Jupiter V」と命名されました。その後フランス人天文学者カミーユ・フラマリオンが長年通称として親しまれた「アマルテア」を正式な呼称としました。"
 verrier.522.t: "ヒマリア発見"
 verrier.522.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]による数ヶ月の観測はとうとう報われました。[ROOT.Var('verrier_astronomer_var').GetCharacter.GetSheHe]は木星軌道上に、これまで知られていなかった衛星を発見しました！この大型天体は#YELLOW ヒマリア#!と命名されます。"
 verrier.522.f: "ヒマリアは木星最大の不規則衛星。1904年12月3日に天文学者のチャールズ・ディロン・パーラインがリック天文台（カリフォルニア州サンノゼ）で発見しました。名前の由来はギリシャ神話に登場するゼウスの愛人、ニュンペー（妖精）のヒマリアから。"
 verrier.523.t: "エララ発見"
 verrier.523.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]による数ヶ月の観測はとうとう報われました。[ROOT.Var('verrier_astronomer_var').GetCharacter.GetSheHe]は木星軌道上に、これまで知られていなかった衛星を発見しました！この大型天体は#YELLOW エララ#!と命名されます。"
 verrier.523.f: "エララは、1905年1月2日に天文学者のチャールズ・ディロン・パーラインがリック天文台（カリフォルニア州サンノゼ）で発見しました。木星の衛星としては8番目、不規則衛星としては2番目に大きい。名前の由来はギリシャ神話に登場するゼウスの恋人エララから。"
 verrier.524.t: "パシファエ発見"
 verrier.524.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]による数ヶ月の観測はとうとう報われました。[ROOT.Var('verrier_astronomer_var').GetCharacter.GetSheHe]は木星軌道上に、これまで知られていなかった衛星を発見しました！この大型天体は#YELLOW パシファエ#!と命名されます。"
 verrier.524.f: "パシファエは、1908年1月27日に天文学者フィルベール・ジャック・メロッテが発見しました。その後2月28日の夜、王立グリニッジ天文台（イギリス）で撮影された乾板写真を現像した際に初めて存在が確認されました。他の乾板と比較したところ、1月27日付で記録されていたことが発覚したのです。当初は小惑星か衛星なのか判別できなかったため、小惑星の命名規則に従って1908 CJという仮称が与えられ、その後木星8番目の衛星であることが確認されました。名前の由来は、ギリシャ神話に登場するミノス王の妻・ミノタウロスの母のパーシパエーから。パシファエと同じ軌道を周回する木星の衛星群をパシファエ群と呼び、もっとも大きいパシファエを含めた13つの天体が存在します。"
 verrier.525.t: "シノペ発見"
 verrier.525.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]による数ヶ月の観測はとうとう報われました。[ROOT.Var('verrier_astronomer_var').GetCharacter.GetSheHe]は木星軌道上に、これまで知られていなかった衛星を発見しました！この大型天体は#YELLOW シノペ#!と命名されます。"
 verrier.525.f: "シノペは、1914年7月1日に天文学者セス・バーンズ・ニコルソンがリック天文台で発見しました。名前の由来はギリシャ神話でゼウスに求愛されアポロンに誘拐さへたニュンペー（妖精）シノペから。シノペは軌道が似ているためパシファエ群に分類されています。"
 verrier.526.t: "リシテア発見"
 verrier.526.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]による数ヶ月の観測はとうとう報われました。[ROOT.Var('verrier_astronomer_var').GetCharacter.GetSheHe]は木星軌道上に、これまで知られていなかった衛星を発見しました！この大型天体は#YELLOW リシテア#!と命名されます。"
 verrier.526.f: "リシテアは、1938年7月6日に天文学者セス・バーンズ・ニコルソンがウィルソン山天文台で発見しました。名前の由来はギリシャ神話に登場するゼウスの愛人リシテアから。木星の衛星ヒマリアと軌道が似ているためヒマリア群に分類されています。"
 verrier.527.t: "カルメ発見"
 verrier.527.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]による数ヶ月の観測はとうとう報われました。[ROOT.Var('verrier_astronomer_var').GetCharacter.GetSheHe]は木星軌道上に、これまで知られていなかった衛星を発見しました！この大型天体は#YELLOW カルメ#!と命名されます。"
 verrier.527.f: "カルメは、1938年7月30日に天文学者セス・バーンズ・ニコルソンがカリフォルニア州ウィルソン山天文台で発見しました。ニコルソンは7月5日から8月25日にかけて木星の写真を撮影し、後に7月30日分の写真を現像した際にカルメが写り込んでいるのが確認され、同年8月末に木星の新たな衛星として公表されました。名前の由来はギリシャ神話に登場するゼウスの愛人カルメから。"
 verrier.531.t: "エンケラドス発見"
 verrier.531.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]による数ヶ月の観測はとうとう報われました。[ROOT.Var('verrier_astronomer_var').GetCharacter.GetSheHe]は土星軌道上に、これまで知られていなかった衛星を発見しました！この大型天体は#YELLOW エンケラドス#!と命名されます。"
 verrier.531.f: "エンケラドスは、1789年8月28日にドイツ系イギリス人天文学者ウィリアム・ハーシェルが発見しました。土星の衛星としては6番目、太陽系全体では（月を除けば）12番目に発見された衛星です。発見当初は土星に2番目に近い軌道にあり、現在も土星の7つの大型衛星の第2衛星に分類されています。名前の由来はギリシャ神話に登場する巨人エンケラドスから。この名前を提唱したのはウィリアム・ハーシェルの息子で天文学者のジョン・ハーシェルで、かれは他にも土星の7つの衛星の名称を提案しました。"
 verrier.532.t: "ミマス発見"
 verrier.532.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]による数ヶ月の観測はとうとう報われました。[ROOT.Var('verrier_astronomer_var').GetCharacter.GetSheHe]は土星軌道上に、これまで知られていなかった衛星を発見しました！この大型天体は#YELLOW ミマス#!と命名されます。"
 verrier.532.f: "「わたしは天気が許すかぎり、根気強く観測を続けた。40フィート反射望遠鏡の明るさがとても役に立った。そして9月17日、7番目の衛星を最大離角の位置で発見した」\n──ウィリアム・ハーシェル"
 verrier.533.t: "ハイペリオン発見"
 verrier.533.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]による数ヶ月の観測はとうとう報われました。[ROOT.Var('verrier_astronomer_var').GetCharacter.GetSheHe]は土星軌道上に、これまで知られていなかった衛星を発見しました！この大型天体は#YELLOW ハイペリオン#!と命名されます。"
 verrier.533.f: "ハイペリオンは、1848年9月にアメリカでウィリアム・クランチ・ボンドとその息子ジョージ・フィリップが、イギリスではウィリアム・ラッセルがほぼ同時期に発見しました。名前の由来はギリシャ神話に登場するクロノス（土星の由来となったローマ神話のサトゥルヌス神と同一視される）の兄、監視と観察の神である巨人ヒュペリオンから。"
 verrier.534.t: "フェーベ発見"
 verrier.534.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]による数ヶ月の観測はとうとう報われました。[ROOT.Var('verrier_astronomer_var').GetCharacter.GetSheHe]は土星軌道上に、これまで知られていなかった衛星を発見しました！この大型天体は#YELLOW フェーベ#!と命名されます。"
 verrier.534.f: "フェーベは、1898年8月16日にデリール・スチュワートがペルーのアレキパ近郊のボイテン天文台が写真乾板を撮影し、1899年3月18日にウィリアム・ヘンリー・ピッカリングがその存在を発見しました。世界ではじめて写真撮影で発見された衛星でもあります。名前の由来はギリシャ神話に登場する巨人クロノスの姉妹のひとり、月の女神ポイベから。\n「1900年になると、私は1898年の4枚の写真について疑念がめばえ、あれは奇妙な偶然で起きた見間違いか、あるいは暗い星だと思った」\nピッカリングはこのような言葉を残していますが、その後フェーベを再発見しました。かれは1904年に撮影された写真乾板から土星10番目の衛星を発見したとして、翌年にこれを「テミス」と命名して発表。この功績でフランス科学アカデミーのラランド賞を贈られました。その後「テミス」は実在しないことが明らかとなりました。"
 verrier.541.t: "チタニア発見"
 verrier.541.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]による数ヶ月の観測はとうとう報われました。[ROOT.Var('verrier_astronomer_var').GetCharacter.GetSheHe]は天王星軌道上に、これまで知られていなかった衛星を発見しました！この大型天体は#YELLOW チタニア#!と命名されます。"
 verrier.541.f: "チタニアは天王星でもっとも大きな衛星で、太陽系全体でも8番目に大きな衛星です。1787年1月11日にウィリアム・ハーシェルが天王星の第2衛星オベロンとともに発見しました。ハーシェルはさらに4つの衛星を発見しましたが、後にすべて誤りであったとして撤回されました。発見から50年間、ハーシェルの観測装置以外ではチタニアとオベロンを観測することはできませんでしたが、現在ではアマチュア天文学者でも高性能望遠鏡を使えば地球から観測することがてきます。天王星の衛星はすべてウィリアム・シェイクスピアかアレクサンダー・ポープの作品の登場人物からつけられています。チタニアの由来は『真夏の夜の夢』に登場する妖精の女王ティターニア。"
 verrier.542.t: "オベロン発見"
 verrier.542.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]による数ヶ月の観測はとうとう報われました。[ROOT.Var('verrier_astronomer_var').GetCharacter.GetSheHe]は天王星軌道上に、これまで知られていなかった衛星を発見しました！この大型天体は#YELLOW オベロン#!と命名されます。"
 verrier.542.f: "オベロンは天王星からもっとも遠く離れた衛星。天王星の衛星としては2番目に、太陽系全体は10番目に大きな衛星です。1787年1月11日にウィリアム・ハーシェルが天王星最大の衛星チタニアとともに発見しました。ハーシェルはさらに4つの衛星を発見しましたが、後にすべて誤りであったとして撤回されました。発見から50年間、ハーシェルの観測装置以外ではチタニアとオベロンを観測することはできませんでしたが、現在ではアマチュア天文学者でも高性能望遠鏡を使えば地球から観測することがてきます。天王星の衛星はすべてウィリアム・シェイクスピアかアレクサンダー・ポープの作品の登場人物からつけられています。オベロンの由来は『真夏の夜の夢』に登場する妖精の王オベロンから。"
 verrier.543.t: "アリエル発見"
 verrier.543.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]による数ヶ月の観測はとうとう報われました。[ROOT.Var('verrier_astronomer_var').GetCharacter.GetSheHe]は天王星軌道上に、これまで知られていなかった衛星を発見しました！この大型天体は#YELLOW アリエル#!と命名されます。"
 verrier.543.f: "アリエルは天王星の既知の衛星で4番目に大きく、またもっとも明るい天体です。アリエルとウンブリエルは1851年10月24日にイギリスの天文学者ウィリアム・ラッセルがリバプールの自作天文台から60cmの反射望遠鏡をもちいて発見しました。名前の由来はアレクサンダー・ポープの抒情詩『髪盗人』に登場するシルフ（妖精）から。"
 verrier.544.t: "ウンブリエル発見"
 verrier.544.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]による数ヶ月の観測はとうとう報われました。[ROOT.Var('verrier_astronomer_var').GetCharacter.GetSheHe]は天王星軌道上に、これまで知られていなかった衛星を発見しました！この大型天体は#YELLOW ウンブリエル#!と命名されます。"
 verrier.544.f: "ウンブリエルは天王星で3番目に大きな衛星です。1851年10月24日にイギリスの天文学者ウィリアム・ラッセルがアリエルとともに発見し、アレクサンダー・ポープの抒情詩『髪盗人』の登場人物にちなんだ名称をつけられました。しかしウィリアム・ハーシェル（チタニアとオベロンの発見者）が18世紀末に天王星付近で4つの衛星を発見したと公表していたため、当初ラッセルの発見は認められませんでした。現在ではハーシェルが発見したとされる4つの衛星はすべて誤りであるとされています。"
 verrier.545.t: "ミランダ発見"
 verrier.545.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]による数ヶ月の観測はとうとう報われました。[ROOT.Var('verrier_astronomer_var').GetCharacter.GetSheHe]は天王星軌道上に、これまで知られていなかった衛星を発見しました！この大型天体は#YELLOW ミランダ#!と命名されます。"
 verrier.545.f: "ミランダは、1948年2月16日に惑星天文学者ジェラルド・カイパーがマクドナルド天文台の82インチ（208センチ）のオットー・シュトルーベ望遠鏡を用いて発見し、同年3月1日に天王星周辺軌道を周回していることが確認されました。天王星発見から100年近く経って初めて発見された衛星でした。これまで発見された天王星の衛星（アリエル、ウンブリエル、チタニア、オベロン）がウィリアム・シェイクスピアかアレクサンダー・ポープの作品の登場人物の名前であったため、ケルパーもシェイクスピアの『テンペスト』の登場人物をとって「ミランダ」と命名しました。ただしそれまでの衛星はすべて妖精の名前でしたがらミランダは人間の登場人物です。"
 verrier.551.t: "トリトン発見"
 verrier.551.d: "海王星発見から間もなく、[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]は海王星軌道上にこれまで知られていなかった衛星を発見しました！この大型天体は#YELLOW トリトン#!と命名されました。"
 verrier.551.f: "トリトンは海王星で最も大きな衛星。海王星の衛星では唯一の静水圧平衡にある天体で、薄いながらも大気の存在が確認されています。また太陽系で唯一、トリトンだけが逆行軌道（親惑星の自転と逆方向に公転する軌道）を描いています。海王星発見からわずか17日後の1846年10月10日、イギリスの天文学者ウィリアム・ラッセルが発見しました。もともとは海王星発見の報せを聞いたジョン・ハーシェルからの手紙で、衛星を探してみてはどうかと提案されたのがキッカケでした。酒蔵を営んでいたラッセルは自作の61センチ口径金属鏡反射望遠鏡（2フィート反射望遠鏡とも）を使って観測を始めて、8日後にトリトンを発見しました。名前の由来は、ギリシャ神話に登場するポセイドン（海王星の由来となったローマ神話のネプトゥーヌスと同一視される）の息子、海の神トリトンから。"
 verrier.552.t: "ネレイド発見"
 verrier.552.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]による数ヶ月の観測はとうとう報われました。[ROOT.Var('verrier_astronomer_var').GetCharacter.GetSheHe]は海王星軌道上にこれまで知られていなかった衛星を発見しました！この大型天体は#YELLOW ネレイド#!と命名されました。"
 verrier.552.f: "ネレイドは、海王星で3番目に大きな衛星。1949年5月1日にジェラルド・P・ケルパーがマクドナルド天文台の82インチ望遠鏡を使って撮影した写真乾板から発見しました。かれは発見を公表すると同時にネレイドという名前をつけました。名前の由来はギリシャ神話に登場する海のニュンペー（妖精）でネプトゥーヌス神の従者ネレイデスから。海王星で2番目に発見された衛星で、これ以降の発見はボイジャー2号による観測を待つことになります。"
 verrier.49.t: "太陽黒点"
 verrier.49.d: "天文台の研究者たちは通常とは異なる太陽活動を観測しています。黒点に関係があるようです。"
 verrier.49.f: "太陽黒点とは、太陽の表面（大気）に浮かんでいるように見える暗い部分のこと。周辺と比べて温度が低いため暗く見える。黒点の数と大きさは、太陽の活動を測るうえで最もシンプルな尺度です。黒点はおよそ11年周期で増減を繰り返しており、これを黒点周期と呼びます。黒点とその周辺の太陽フレアは強力な磁場になっており、太陽内部の熱を外に伝えるのを妨げています。今回、いくつかの未知の黒点が発見されました。"
 verrier.49.g: "美しい！"
