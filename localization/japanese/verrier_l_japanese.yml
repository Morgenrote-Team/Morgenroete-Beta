 verrier.300.t: "金星の日面通過"
 verrier.300.d: "Astronomers have predicted a solar eclipse in the Australian-Indonesian-Pacific region in #ORANGE 1874#!. The scientific community of [ROOT.GetCountry.GetNameNoFlag] is urging a [concept_dubois_pacific_expedition] to observe this once-in-a-lifetime astronomical event."
 verrier.300.f: "金星の日面通過とは、金星が太陽と地球のあいだを通過する現象。およそ243年周期で4度だけ発生します。史実では、日面通過の精確な観測は地球から太陽までの距離（天文単位）を算出するうえで非常に重要であり、そのため各国の学術機関や科学者はこぞって観測隊や観測事業を組織しました。1874年の金星の日面通過は、天文観測にはいささか不利な環境でした。ヨーロッパの大部分は観測圏外にあり、日面通過の一部始終を長時間観測できるのはアジア地域に限られていました。ほかにも短時間だけならオーストラリア、南太平洋や南インド洋の島々（ケルゲレン諸島など）でも観測できました。こうした環境でも、全世界でおよそ60もの観測隊が派遣されました。\n\n#R 注:太平洋に観測遠征隊を送るためには、[concept_verrier_astronomer]を雇用する必要があります。#!"
 verrier.300.g: "We shouldn't miss this."
 verrier.301.t: "Venus Transit of 1874"
 verrier.301.d: "The #YELLOW [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] Expedition#! was able to witness the transit of Venus. [SCOPE.sCharacter('rapanui_scientist').GetFullName] was able to make important records astronomical records that will keep science busy for years to come."
 verrier.301.f: "The 1874 transit of Venus, which took place on 9 December 1874, was the first of the pair of transits of Venus that took place in the 19th century. As with previous transits, the 1874 transit would provide an opportunity for improved measurements and observations. Numerous expeditions were planned and sent out to observe the transit from locations around the globe, with several countries setting up official committees to organise the planning. There were six official French expeditions, five British expeditions, eight expeditions funded by the US-Congress, three German expeditions (including the 'Gazelle' expedition) and two Mexican expeditions. Italy, Russia and Austria also sent an expedition to observe this astronomical moment. The recordings of a French expedition, which put several photographs one after the other and thus put together a first 'film', became particularly famous. The transit of Venus is one of the first moving images of mankind."
 verrier.301.g: "An overwhelming spectacle."
 verrier.401.t: "プウトゥスク流星群"
 verrier.401.d: "マゾフシェの人々は、空に何かを見つけたようです。"
 verrier.401.f: "マゾフシェ中心地近くにある風光明媚な町プウトゥスクには、宇宙からやってきた秘密が眠っています。かつて冬のある日、この町はかつてない天体現象の舞台となり、のどかな住民たちは広大な宇宙の神秘に触れることになったのです。時に、1868年1月30日。プウトゥスクの人々がいつもと変わらない1日を過ごしていると、突如として見たこともないような現象に遭遇しました。夕方に差し掛かろうかというとき、いつにない静けさが町を覆いました。なんの前触れもなく、空に一筋の明るい光がはしりました。太陽よりも明るい火の玉が空に輝いたのです。のちの証言では、燃える球体が光り輝く尾を引いて、轟音を立てて空を割った、と伝えられています。火の玉の正体は、地球の大気圏突入でばらばらになった隕石でした。数千もの破片がプウトゥスクと周辺地域に降り注ぎ、流星群となったのです。この一連のできごとは、現在ではプウトゥスク流星群として知られています。"
 verrier.401.g: "息を呑むような光景だ！"
 verrier.402.t: "ホルブルック流星群"
 verrier.402.d: "アリゾナの人々は、空に何かを見つけたようです。"
 verrier.402.f: "夜7時15分、ホルブルックの町にひろがる夜空に輝く火の玉があらわれました。ある一点からあちこちに広がった火の玉は、大きさも明るさもバラバラの数百の流星になって夜空にひろがりました。煌々とした白と黄色の尾を引くその姿は、人々に畏敬の念を抱かせました。大きな破片には燃えるような核があり、やがてバラバラになって大気圏仮想に消えました。大きな破片の膨大なエネルギーを反映するかのように、遠くで大砲のような音がとどろきました。最初は驚いていた住民たちも、この不思議な光景を見るために集まりました。その後の調査で、ホルブルック一帯に無数の小さな隕石の破片が見つかり、そのほとんどが鉄とニッケルを含んでいました。"
 verrier.403.t: "クニャーヒニャ流星群"
 verrier.403.d: "東スロバキアの人々は、空に浮かぶ不思議なものを目撃しました。"
 verrier.403.f: "クニャーヒニャ隕石は、有史以来のヨーロッパに墜落した中で最大級の隕石です。長い間、世界でもっとも重い石質隕石と考えられてきました。1866年6月9日の午後4時から5時、クニャーヒニャ市北部の山岳に墜落しました。数々の目撃証言が残っており、後にそれをまとめた絵が描かれました。隕石は地球の大気圏に突入し、1000個以上の破片に分かれました。"
 verrier.411.t: "ヨーク岬隕石"
 verrier.411.d: "地質学調査中の[GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetLastName]博士は、偶然にも大きな発見をしました。謎の石を発見して慎重な分析を重ねたところ、なんと宇宙からやってきた物体であることが判明したのです。この隕石は非常に大きく、これまでの記録を塗り替えるほどです。"
 verrier.411.f: "アイスランドの氷の大地で、地質学者の[GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetFullName]はヨーク岬隕石を発見しました。これは天文学的な大発見であり、わが国の科学を切り拓いてくれるでしょう。この隕石の破片は鉄を多く含んでいて、イヌイットたちがずっと以前から道具として利用していました。隕石に特有のウィドマンシュテッテン構造が見られ、トロイリ鉱が含まれていることから、この石は隕石であると断定されました。重さは31トン。こうした隕石からは、太陽系を形成した原始物質を知るううえで重要な手がかりとなります。この発見によって初期の太陽系の衛星についての知見が深まり、人類の歴史と宇宙のできごとにある深いつながりが判明するでしょう。科学研究所に運ばれた隕石は詳細に解析され、宇宙の全体像についての謎を解き明かしてくれる。この宇宙からやってきた遺物を研究すれば、宇宙の複雑な成り立ちと、その中における我々の立ち位置への理解が深まるでしょう。"
 verrier.411.g: "大発見だ！"
 verrier.412.t: "バクビリート隕石"
 verrier.412.f: "バクビリート隕石は現存する中ではメキシコ最大の隕石。1863年に地質学者ギルバート・エリス・ベイリーがシナロア・デ・レイバ市近郊のランチート村で発見しました。重さ20〜22トン、長さ4.25メートル、幅2メートル、高さ1.75メートルの鉄隕石です。"
 verrier.413.t: "マンドラビラ隕石"
 verrier.413.f: "マンドラビラ隕石は西オーストラリアのナラボー平原に衝突した鉄隕石で、大気圏でばらばらになった隕石の欠片。太古の地球に流星群として衝突したと考えられています。質量24トンと、現存する中では世界トップクラスの重さを誇る隕石ねす。およそ6000万年前に衝突したと考えられており、地球で最も古い隕石の一つです。"
 verrier.414.t: "ウィラメット隕石"
 verrier.414.f: "ウィラメット隕石は1902年にアメリカのオレゴン州で発見されました。数万年前に地球に落ちてきたと考えられています。発見当初は世界で3番目に大きく、現在は6番目に大きな隕石です。重量は15.5トン。計算によると13000年間の気象環境によって6トン分が削られています。もともとオレゴン州ウェストリン近郊のウィラメット渓谷にあり、昔からクラカマス族の崇拝の対象となっていました。1902年にヨーロッパからの入植者エリス・ヒューズが隕石の重要性に気づき、ウィラメット渓谷から移動させました。"
 verrier.415.t: "ホバ隕石"
 verrier.415.f: "ホバ隕石は、発見された中では有史以来最大の隕石です。ナミビアのグルートフォンテインなら西に20kmの地点にあるオタビ山脈のホバ農場の敷地で発見されました。種類は鉄隕石。重さは50〜60トン。発見当時の寸法は長さ2.70m、幅2.70m、高さ0.90m。80000年前に地球に衝突したと考えられています。推定年齢は1.9億〜4.1億年。"
 verrier.421.t: "[GetPlayer.MakeScope.Var('verrier_astronomer_var').GetCharacter.GetFullName]が隕石の研究を希望"
 verrier.421.d: "天文学者の[GetPlayer.MakeScope.Var('verrier_astronomer_var').GetCharacter.GetFullName]による努力のおかげで、隕石の衝突から数日で多くの破片を回収できました。どれも宇宙の謎を解き明かす手がかりになるかもしれません──しかし[GetPlayer.MakeScope.Var('verrier_astronomer_var').GetCharacter.GetLastName]博士は、自分が発見した分は手元に残しておきたいと述べています。"
 verrier.421.f: "この天文学者はヴィクトリア朝の熱狂の中にあっても空をみつめ、そのおかげで隕石の破片を発見しました。博士は観察力と系統的なアプローチを用いて星のカケラを集めて研究したのです。どの破片も徹底的に分析され、隕石の含有物質やその起源についてさらなる知識をもたらしました。博士の業績は飽くなき好奇心と宇宙の謎を解き明かそうとする強い意志に突き動かされた、まさにヴィクトリア朝時代特有の科学への献身的姿勢そのものです。"
 verrier.421.g: "すべての破片は科学協会に譲り渡すべし！"
 verrier.421.h: "[GetPlayer.MakeScope.Var('verrier_astronomer_var').GetCharacter.GetFullName]は隕石の内ひとつを調査させる"
 verrier.422.t: "[GetPlayer.MakeScope.Var('mendelejew_chemist_var').GetCharacter.GetFullName]が隕石の分析を求める"
 verrier.422.d: "わが国を代表する化学者の[GetPlayer.MakeScope.Var('mendelejew_chemist_var').GetCharacter.GetLastName]博士が、最近発見された隕石の調査許可を政府に求めています。また隕石そのものも安心できない金庫ではなく、より安全な博士の研究所で保管したいそうです。"
 verrier.422.f: "「地球の外からやってきた物質！それもはるか彼方から！これは科学にとっての一大事であり、隕石の化学組成を詳細に分析するまたとない機会です」"
 verrier.422.g: "私の隕石だ。なぜ学者はどいつもこいつもくすねそうとするんだ？"
 verrier.422.h: "きっと化学の進歩につながるはずだ"
 verrier.1013.f: "有名な[concept_verrier_astronomer]のゲオルギオス・コンスタンティノス・ヴーリスは、新設された大学でギリシャ人一期生数名に授業を行っています。ギリシャに学習と進歩の新時代がおとずれたのです。\n\n#b 史実では#!、ギリシャ本土初の大学は1836年に構想がスタートし、37年5月3日に正式に承認されました。本館建物は遅れて41年に完成し、大学機能もそこに移転しました。各棟の建設は64年までに完成しました。\nその後1862年のクーデターでオソン1世がギリシャから亡命すると、オソン大学も国立大学に改称されました。\n\n現在も国立カポストリア記念アテネ大学として、ギリシャ最高峰の大学のひとつに数えられています。卒業生にはノーベル賞を受賞した詩人2名、ギリシャ首相15名、ギリシャ大統領3名が名を連ねています。"
