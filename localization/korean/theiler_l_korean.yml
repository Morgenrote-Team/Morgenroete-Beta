 theiler.10.t: "미생물학의 탄생"
 theiler.10.d: "새로운 연구 결과가 생물학계와 의학계에 파장을 일으키고 있다. 이 연구의 저자인 [SCOPE.sCharacter('theiler_biologist_scope').GetLastName] 박사는 박테리아에 관한 발견으로 종전의 세계관을 뒤바꿀 수도 있는 위업을 이룩했다."
 theiler.10.f: "[SCOPE.sCharacter('theiler_biologist_scope').GetLastName] 박사의 체계적인 박테리아 분류 연구는 놀라운 성과를 거두었다. 박사는 〈박테리아에 관한 연구〉로 박테리아를 재현 가능한 특성을 지닌 독자적 분류군으로 확립하였다. 또한 박테리아도 식물이나 동물처럼 엄격하게 배앙, 연구, 분류할 수 있음을 입증하였다. 그 중에서도 가장 주목받은 것은 [SCOPE.sCharacter('theiler_biologist_scope').GetHerHis] 접근법으로 학계에서 무해한 박테리아와 병원성 박테리아를 구분할 수 있게 되었다는 점이었다. [SCOPE.sCharacter('theiler_biologist_scope').GetLastName] 박사의 접근법은 완전히 새로운 의학 분야의 토대를 마련하였으며, 이로써 마침내 감염성 질병의 매커니즘을 설명할 수 있게 되었다."
 theiler.10.g: "미생물 연구의 진일보로군."
 theiler.10.h: "매균설의 진일보로군."
