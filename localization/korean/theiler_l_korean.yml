 je_theiler_microorganism_research_reason: "[ROOT.GetCountry.GetCustom('je_theiler_microorganism_research_active_type')][ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] 박사는 현재 미생물의 경이로운 세계를 탐구하고 있습니다. 생물학자의 숙련도와 사용하는 현미경의 성능에 따라 매달 일정량의 새로운 미생물을 찾아냅니다. 미생물에 대한 포괄적 지식은 [Concept('concept_theiler_pathogen','$concept_theiler_pathogens$')] 탐지에 필수적입니다.\n\n우리 [concept_theiler_biologist]가 아직 이 기술을 습득하지 못했다면 [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] 박사가 $theiler_microbiologist$ 특성을 부여받을 가능성도 있습니다. 이 특성은 최대 60개월 기간의 미생물 연구를 수행하면 획득할 수 있습니다.\n$mr_divider_for_je$\n현재 [Concept('concept_theiler_microorganism','$concept_theiler_microorganisms$')]의 추산 수집량은 매달 @theiler_microorganisms_texticon![ROOT.Var('theiler_estimated_microorganisms_on_microorganisms_research_var').GetValue|+=0]개 입니다.[ROOT.GetCountry.GetCustom('je_theiler_microorganism_research_num_months_type')]"
