 theiler.42.f.strychnine: "#V Strychnine# was first isolated from the beans of the Strychnos Ignatii, a tree native to Southeast Asia. It found use as a pesticide, and in minute doses, as a muscle, heart and bowel stimulant. However, it may be best known for its neurotoxicity, with overdoses causing seizures, sweating and lockjaw amongst other painful symptoms, resulting in death, making it the drug of choice for would-be murderers and crime novelists."
 theiler.42.f.emetine: "#V Emetine#! is a drug found in the Carapichea ipecacuanha, otherwise known as the ipecac root, a flower native to Central and Southern America. It was first used to treat amoebic dysentery, an infection of the intestines. It was unceremoniously given its name for its emetic side effect - its propensity to cause nausea and vomiting."
 theiler.42.f.atropine: "#V Atropine#! is a medication derived from the Atropa Belladonna, otherwise known as deadly nightshade, a plant native to Europe and Western Asia. Atropine, in varying forms, found use as a treatment for asthma, to block side effects of nerve stimulation, to reduce saliva production, to treat certain poisons and was used by women to dilate the pupils for cosmetic purposes."
 theiler.42.f.aloin: "#V Aloin#! is a natural compound primarily found in varying degrees in the Aloe family of plants. It has been used as a laxative, to treat sunburn, to dress wounds, and for its antioxidant and anti-inflammatory properties."
 theiler.42.f.digitoxin: "#V Digitoxin#! is a natural compound found in the Digitalis Purpurea, otherwise known as the foxglove, a plant native throughout Europe as well as Morocco. Digitoxin has been used to reduce fluid retention in the muscles (dropsy), to ease urine passage, and in the treatment of heart arrhythmia and heart failure. As its name suggests however, it holds toxic properties which lead to irregular heart rate, nausea, cardiac arrest and death."
 theiler.42.f.quinine: "#V Quinine#! is a medication first isolated in the bark of a Cinchoha tree, native to Peru. Quinine has an illustrious history. The bark was first used by the Quechua as a muscle relaxant, and then brought to Europe by Jesuits for use as malaria treatment. Quinine, refined from this bark, soon became widespread, allowing for more opportunities for European colonisation and conquest in the African continent. It also can be used in the treatment of scarlet fever, yellow fever and influenza."
 theiler.42.f.thymol: "#V Thymol#! is a medication primarily extracted from the Thymus vulgaris, the common thyme, a plant native to Southern Europe, although it can also be found in various other plants around the world. It was noted for its antimicrobial, antifungal and antiseptic properties and therefore was commonly used to treat wounds, for dental hygiene and to combat parasites."
 theiler.42.f.pilocarpine: "#V Pilocarpine#! is a medication extracted from the plants of the Pilocarpus genus, native to the South American tropics. It has been used to stimulate saliva and sweat production, and therefore is commonly used to treat dry mouth brought about by disorders or as a side-effect of other treatment. It has also been used to treat various diseases of the eye."
 theiler.42.f.ephedrine: "#V Ephedrine#! is a stimulant extracted from the Ephedra Sinica plant, native to the highlands of Northern China, Mongolia and Russia. It found use as a treatment for asthma, narcolepsy, obesity and nasal congestion. It has numerous side effects, including sleep issues, headaches, anxiety, hallucinations, high blood pressure and increased heart rate. The latter two led to it being used as a performance enhancing stimulant."
 theiler.42.f.strophantine: "#V Strophantine#! is a drug produced from the Strophantus genus of plants, native to Africa. Strophantine was used to improve heart function, treat heart failure and improve performance of the nervous system, although in strong concentrations it was also used to poison arrows."
 theiler.42.g: "약학 분야의 획기적 발전이로군!"
