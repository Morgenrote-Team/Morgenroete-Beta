 je_theiler_improve_agriculture_project_reason: "우리 [concept_theiler_biologist] [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] 박사는 [JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetState.GetName]에 위치한 [JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetName]의 생산력 증진에 주력하고 있습니다.\n$mr_divider_for_je$\n이 사업은 매달 진행도를 얻습니다. 진행도가 24에 도달할 때마다 현재 선택된 건물에 새로운 변화 요인이 부여됩니다. 이 사업에 선정된 모든 건물이 변화 요인을 지니게 되면 사업은 끝이 납니다.\n\n변화 요인은 총 세 가지가 존재합니다. 각각의 새로운 변화 요인마다 진행도를 다시 채워야 합니다.\n\n작업이 완료될 때마다 소량의 [Concept('concept_theiler_microorganism','$concept_theiler_microorganisms$')]을 획득합니다. 또한 건물 개량이 완료될 때 생물학자에게 $ito_botanist$나 $ito_zoologist$ 특성이 부여될 수 있습니다.\n$mr_divider_for_je$\n현재 건물:[JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetState.GetName]의 [JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetName]\n[JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetCustom('je_theiler_improve_agriculture_project_modifier_1_type')]\n[JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetCustom('je_theiler_improve_agriculture_project_modifier_2_type')]\n[JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetCustom('je_theiler_improve_agriculture_project_modifier_3_type')]\n\n남은 건물 수 (현재 대상 제외): [JournalEntry.MakeScope.Var('mr_number_of_remaining_list_entries_var').GetValue|V0]곳\n사업으로 얻은 $concept_theiler_microorganisms$: @theiler_microorganisms_texticon![JournalEntry.MakeScope.ScriptValue('ito_specimens_from_forestry_project_value')|+0]\n\n현재 월간 진행도: #underline #tooltip:[GetRawTextTooltipTag('theiler_monthly_biologist_improvement_progress_var_tt')] [GetPlayer.MakeScope.ScriptValue('theiler_improve_agriculture_project_progress_value')|+2]#!#!"
