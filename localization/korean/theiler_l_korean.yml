 theiler.11.t: "색지움 현미경"
 theiler.11.d: "오늘 [GetPlayer.MakeScope.Var('tesla_engineer_var').GetCharacter.GetFullName](과)와 [GetPlayer.MakeScope.Var('theiler_biologist_var').GetCharacter.GetFullName](이)가 새로운 현미경을 선보였다."
 theiler.11.f: "1868년 에른스트 아베는 원색과 부색의 왜곡을 모두 제거하는 현미경용 렌즈인 색지움 렌즈(아포크로매틱 렌즈)를 발명하였습니다. 1870년에는 현미경의 조명에 쓰이는 '아베 콘덴서'를 발명하고, 1871년에는 최초의 굴절계를 설계하여 1874년 출간된 편람에 해설을 남겼습니다. 아베가 개량한 현미경은 1872년 자이스 광학 공장에서 생산 판매하기 시작하였으며, 1877년에는 균일 침수형 대물렌즈를 장착한 제품을, 1886년에는 색지움 대물렌즈를 장착한 현미경을 선보였습니다."
 theiler.11.g: "미생물학의 혁명이로다."
 theiler.12.t: "전자 현미경"
 theiler.12.d: "오늘 [GetPlayer.MakeScope.Var('tesla_engineer_var').GetCharacter.GetFullName](과)와 [GetPlayer.MakeScope.Var('theiler_biologist_var').GetCharacter.GetFullName](이)가 새로운 현미경을 선보였다."
 theiler.12.f: "전자 투과 현미경을 발명한 사람이 누구인지는 현재까지도 논란의 여지가 남아 있습니다. 1928년 샤를로텐부르크 공과대학의 아돌프 마티아스는 연구팀 대표로 막스 놀을 임명하여 전자빔과 음극선 오실로스코프 연구를 실시하도록 하였습니다. 이 연구팀은 에른스트 루스카를 비롯한 여러 박사 과정 학부생들로 구성되었습니다. 1931년 막스 놀과 에른스트 루스카는 양극 조리개에 놓인 매시 그리드의 확대화상을 얻는 데 성공하였습니다. 이것과는 별개로 지멘스-슈케르트 사의 라인홀트 뤼덴베르크도 똑같은 연구를 진행한 것으로 보입니다. 특허법에 따르면 뤼덴베르크가 전자 현미경의 발명자이지만, 실제 작동하는 현미경을 언제 제작하였는지는 불분명합니다."
 theiler.12.g: "바이러스까지 탐지할 수 있다고 하더군!"
