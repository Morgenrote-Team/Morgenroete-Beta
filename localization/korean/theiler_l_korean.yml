 theiler.42.d.ephedrine: "우리 학자들의 공동 연구로 #V $je_theiler_medicinal_plant_ephedrine$#! 추출물에서 #V 에페드린#!이 처음 발견되었습니다."
 theiler.42.d.strophantine: "우리 학자들의 공동 연구로 #V $je_theiler_medicinal_plant_strophantine$#! 추출물에서 #V 스트로판틴#!이 처음 발견되었습니다."
 theiler.42.f.strychnine: "#V 스트리크닌#!은 동남아시아에 자생하는 보두나무(학명 Strychnos Ignatii)의 열매에서 처음 추출된 성분이다. 성분 그대로는 살충제로 활용되었으며, 극소량으로는 근육, 심장, 대장 자극제로 활용되었다. 그러나 스트리크닌은 신경독성제로 유명하며 과다복용 시 발작과 발한, 파상풍 등의 고통스러운 증상을 유발하고 결국 사망에 이르게 만든다. 이 때문에 살인미수범이나 추리 소설가들이 좋아하는 약물이기도 했다."
 theiler.42.f.emetine: "#V 에메틴#!은 중남미에 자생하는 이페카크(학명 Carapichea ipecacuanha)의 뿌리에서 추출되는 약물이다. 처음에는 아메바성 이질, 즉 장내 감염 치료에만 사용되었다. 메스꺼움과 구토를 유발하는 부작용 때문에 '구토제'라는 명칭이 허물없이 붙여지기도 하였다."
 theiler.42.f.atropine: "#V 아트로핀#!은 유럽과 서아시아에 자생하여 독말풀로 불리는 벨라돈나(학명 Atropa Belladonna)에서 추출되는 약물이다. 아트로핀은 다양한 형태로 제조되어 천식 치료, 신경자극 부작용 차단, 타액 분비 감소, 특정 중독 치료에 활용되었으며, 동공 확장의 효과도 있어 여성들의 경우 미용 목적으로 쓰기도 했다."
 theiler.42.f.aloin: "#V 알로인#!은 주로 알로에과 식물에서 여러 농도로 발견되는 천연 화합물이다. 변비약과 일광건조 시 화상 치료, 상처 소독, 항산화와 항염증 효과 등에 활용되어 왔다."
 theiler.42.f.digitoxin: "#V 디기톡신#!은 유럽과 모로코가 원산지인 디기탈리스(학명 Digitalis Purpurea)에 함유된 천현 화합물이다. 디기톡신은 근육 내 체액 저류(수종) 감소, 배뇨 촉진, 심장 부정맥과 심부전 치료에 사용되어 왔다. 그러나 독성이 존재하여 심장박동, 메스꺼움, 심장마비에 사망을 초래할 수 있다."
 theiler.42.f.quinine: "#V 퀴닌#!은 페루 원산의 신초아나무 껍질에서 처음 추출된 약물이다. 퀴닌은 유구한 역사를 자랑하고 있다. 케추아족은 나무껍질을 근육이완제로 사용하였고, 이후 예수회 선교사들이 말라리아 치료제로 유럽에 전파하였다. 나무껍질에서 정제된 퀴닌은 머지않아 널리 퍼져 유럽의 아프리카 대륙 식민지 개척과 정복에 공헌하였다. 퀴닌은 성홍열, 황열, 독감 치료에도 활용된다."
 theiler.42.f.thymol: "#V 티몰#!은 주로 남유럽 자생종인 타임(Thymus vulgaris)에서 추출되는 약물이지만 전세계 곳곳의 다른 식물에서도 발견된다. 향균, 항진균, 소독 효과가 뛰어나 상처 치료와 구강위생 관리, 기생충 구제에 널리 활용되었다."
 theiler.42.f.pilocarpine: "#V 필로카르핀#!은 남아메리카 열대 지역이 원산지인 필로카르푸스속 식물에서 추출된 약물이다. 침샘과 땀샘 분비를 촉진하는 효과가 있어 구강질환이나 여타 치료의 부작용으로 발생하는 구강 건조증 치료에 널리 사용된다. 또 여러 안과 질환 치료에도 사용되어 왔다."
 theiler.42.f.ephedrine: "#V 에페드린#!은 중국 북부, 몽골, 러시아 고원 지대가 원산지인 마황(麻黃, 학명 Ephedra Sinica)에서 추출한 자극제다. 천식, 기면증, 비만, 코막힘 치료에 사용된다. 부작용으로는 수면장애, 두통, 불안, 환각, 고혈압, 심박수 증가 등 다양하다. 특히 고혈압과 심박수 증가로 에페드린이 운동 능력 향상제로 사용되는 계기가 되었다."
 theiler.42.f.strophantine: "#V 스트로판틴#!은 아프리카에 자생하는 스트로판투스속 식물에서 추출한 약물이다. 스트로판틴은 심장기능을 개선하고 심부전을 치료하며 신경계 기능을 향상시키는 데 사용되었으나, 고농도로 정제하였을 경우에는 독화살에 발라 쓰기도 하였다."
 theiler.42.g: "약학 분야의 획기적 발전이로군!"
