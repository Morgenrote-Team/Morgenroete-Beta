 theiler.41.strychnine: "Strychnos nux-vomica is a tropical tree native to India and Southeast Asia. Its seeds contain the alkaloids strychnine and brucine, both highly toxic. Strychnine affects the nervous system, causing severe muscle convulsions and potentially death. Despite its toxicity, in small, controlled doses, extracts were historically used in medicine as a stimulant and to treat digestive or nervous disorders."
 theiler.41.emetine: "Carapichea ipecacuanha is a tropical plant native to South America, especially Brazil. Its roots contain the alkaloids emetine and cephaeline, which induce vomiting and have antiparasitic effects. Traditionally, ipecac root was used as an emetic to treat poisoning and as an expectorant in cough syrups."
 theiler.41.atropine: "Atropa belladonna, also known as deadly nightshade, is a perennial plant native to Europe, North Africa, and Western Asia. It contains toxic alkaloids such as atropine, scopolamine, and hyoscyamine, which affect the nervous system by blocking acetylcholine receptors. Historically, it was used as a sedative, pain reliever, and to dilate pupils. In modern medicine, purified atropine is used in ophthalmology and to treat bradycardia or poisoning by organophosphates."
 theiler.41.aloin: "Aloe vera is a succulent plant native to North Africa and the Arabian Peninsula. Its thick leaves contain a gel rich in polysaccharides, vitamins, and enzymes with soothing and moisturizing properties. The gel is widely used in cosmetics and medicine to treat burns, wounds, and skin irritations. Dried latex from the leaf's inner layer contains aloin, a compound with strong laxative effects."
 theiler.41.digitoxin: "Digitalis purpurea, or foxglove, is a biennial plant native to Europe. Its leaves contain cardiac glycosides such as digoxin and digitoxin, which strengthen heart contractions and regulate heartbeat. Traditionally, extracts were used to treat heart failure and arrhythmias. Purified cardiac glycosides are carefully dosed in medicine for heart conditions, while the raw plant is avoided due to severe poisoning risks."
 theiler.41.quinine: "Cinchona pubescens is a tree native to South America, especially the Andean regions. Its bark contains quinine and other alkaloids, which have strong antimalarial properties. Traditionally, the bark was used to treat fever and malaria. Even today, quinine and its derivatives remain important in medicine for managing malaria. The tree is also cultivated in tropical regions for its medicinal bark."
 theiler.41.thymol: "Thymus vulgaris, or common thyme, is a small perennial herb native to the Mediterranean. Its leaves and oil contain thymol, carvacrol, and other essential oils with antimicrobial, antioxidant, and anti-inflammatory properties. Traditionally, thyme has been used to treat respiratory infections, coughs, and digestive issues. It is widely used in herbal medicine, aromatherapy, and as a natural preservative or flavoring agent in food."
 theiler.41.pilocarpine: "Pilocarpus pennatifolius is a tropical shrub native to Brazil. Its leaves contain the alkaloid pilocarpine, which stimulates salivary and sweat glands. Traditionally, it was used to treat dry mouth and eye conditions. In modern medicine, pilocarpine is used to manage glaucoma by reducing intraocular pressure and to treat xerostomia (dry mouth) caused by radiation or medications. The plant is valued primarily for its pharmacologically active alkaloids."
 theiler.41.ephedrine: "Ephedra sinica, also known as ma huang, is a shrub native to China and Central Asia. Its stems contain ephedrine and pseudoephedrine, alkaloids that stimulate the nervous system and bronchodilation. It was used in Chinese medicine to treat asthma, bronchitis, and nasal congestion. Its use is limited due to risks of hypertension, heart problems, and other side effects."
 theiler.41.strophantine: "Strophanthus gratus is a climbing plant native to West Africa. Its seeds contain cardiac glycosides such as ouabain, which strongly affect heart contractions. Traditionally, extracts were used as arrow poisons and in small doses to treat heart conditions. Ouabain has been studied for heart failure and arrhythmias."
