 theiler.101.t: "콜레라균 (비브리오 콜레라이)"
 theiler.101.d: "[ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] 박사가 콜레라 병원체의 식별과 분리에 성공하였습니다. 이는 효과적인 백신 개발을 착수하는 데 있어 큰 이정표가 될 것입니다."
 theiler.101.f: "The bacterium Vibrio cholerae was first described by the Italian anatomist Filippo Pacini in 1854, though its role in cholera outbreaks was later confirmed by Robert Koch in 1884. It is a curved, rod-shaped organism that thrives in aquatic environments, particularly in warm brackish water. V. cholerae is gram-negative, possesses a single polar flagellum for motility, and secretes cholera toxin, which disrupts intestinal water balance and causes severe diarrhea."
 theiler.101.g: "조만한 것이 까불기는."
 theiler.201.t: "결핵균 (미코박테리움 투베르쿨로시스)"
 theiler.201.d: "[ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] 박사가 결핵 병원체의 식별과 분리에 성공하였습니다. 이는 효과적인 백신 개발을 착수하는 데 있어 큰 이정표가 될 것입니다."
 theiler.201.f: "This bacterium was identified by Robert Koch in 1882, earning him the Nobel Prize in 1905. M. tuberculosis is a slow-growing, rod-shaped organism with a waxy cell wall rich in mycolic acids, making it resistant to standard Gram staining and many antibiotics. Instead, it is classified as 'acid-fast.'' The pathogen is strictly aerobic and primarily infects the lungs, though it can spread to other organs."
 theiler.201.g: "너의 시대는 끝났다, 말 없는 스토커여."
 theiler.301.t: "오르토폭스비루스 바리올라이"
 theiler.301.d: "[ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] 박사가 천연두 병원체의 식별과 분리에 성공하였습니다. 이는 효과적인 백신 개발을 착수하는 데 있어 큰 이정표가 될 것입니다."
 theiler.301.f: "The causative agent of smallpox, Variola virus, belongs to the family Poxviridae. Unlike most viruses, it replicates entirely in the cytoplasm of host cells. It is a large, brick-shaped virus containing double-stranded DNA. Variola was the target of the first successful vaccination, introduced by Edward Jenner in 1796, and became the first human pathogen eradicated through vaccination in 1980."
 theiler.301.g: "그렇게 조그만 것이 제국을 무너뜨렸단 말인가?"
 theiler.401.t: "리케차 프로바제키"
 theiler.401.d: "[ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] 박사가 발진티푸스 병원체의 식별과 분리에 성공하였습니다. 이는 효과적인 백신 개발을 착수하는 데 있어 큰 이정표가 될 것입니다."
 theiler.401.f: "Henrique da Rocha Lima discovered this bacterium in 1916. He named it after his colleague Stanislaus von Prowazek, who had died from typhus in 1915. Both Prowazek and Rocha Lima had been infected with typhus while studying its causative agent in a prisoner-of-war camp hospital in Cottbus, Germany. This bacterium lacks flagella and is aerobic. It is classed gram-negative because its cell walls do not retain crystal violet Gram stain; gram-negative bacteria in general are more resistant to many antibiotics such as penicillin."
 theiler.401.g: "작고 음침한 불청객일세!"
 theiler.501.t: "오르토플라비바이러스 플라비"
 theiler.501.d: "[ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] 박사가 황열병 병원체의 식별과 분리에 성공하였습니다. 이는 효과적인 백신 개발을 착수하는 데 있어 큰 이정표가 될 것입니다."
 theiler.501.f: "The yellow fever virus was first isolated in 1927 from a patient in Ghana. It is a member of the Flaviviridae family and carries a single-stranded positive-sense RNA genome. The virus is transmitted by Aedes mosquitoes, primarily Aedes aegypti. Infection can cause fever, muscle pain, and jaundice, and in severe cases, it leads to hemorrhage and organ failure."
 theiler.501.g: "잔혹하기로는 제일이던 자연의 장난이 실체를 드러냈구나."
 theiler.601.t: "홍역 모빌리바이러스"
 theiler.601.d: "[ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] 박사가 홍역 병원체의 식별과 분리에 성공하였습니다. 이는 효과적인 백신 개발을 착수하는 데 있어 큰 이정표가 될 것입니다."
 theiler.601.f: "The measles virus belongs to the genus Morbillivirus within the Paramyxoviridae family. It is an enveloped virus with a single-stranded negative-sense RNA genome. Transmission occurs through respiratory droplets, and the virus is one of the most contagious known to humans. Measles causes fever, cough, conjunctivitis, and a characteristic rash, and it can lead to severe complications like pneumonia or encephalitis."
 theiler.601.g: "면역 체계를 공격하는 초소형 테러분자일세."
 theiler.701.t: "연쇄상구균 (스트렙토코쿠스 피오게네스)"
 theiler.701.d: "[ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] 박사가 성홍열 병원체의 식별과 분리에 성공하였습니다. 이는 효과적인 백신 개발을 착수하는 데 있어 큰 이정표가 될 것입니다."
 theiler.701.f: "The bacterium Streptococcus pyogenes is a gram-positive coccus arranged in chains. It is classified as a Group A β-hemolytic streptococcus and was first linked to scarlet fever in the 19th century. Its virulence stems from secreted exotoxins, including the erythrogenic toxin responsible for the rash. This organism also causes strep throat, impetigo, and rheumatic fever."
 theiler.701.g: "정말이지 조그맣고 얄미운 악동일세..."
 theiler.801.t: "페스트균 (예르시니아 페스티스)"
 theiler.801.d: "[ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] 박사가 페스트 병원체의 식별과 분리에 성공하였습니다. 이는 효과적인 백신 개발을 착수하는 데 있어 큰 이정표가 될 것입니다."
 theiler.801.f: "Yersinia pestis was discovered by Alexandre Yersin in 1894 during an outbreak in Hong Kong. It is a gram-negative, non-motile coccobacillus. The bacterium is transmitted by fleas that feed on infected rodents, most famously black rats. It causes three forms of plague: bubonic, septicemic, and pneumonic. Without treatment, mortality rates are extremely high."
 theiler.801.g: "그럼 현미경으로 그 사신이 보인다는 거군?"
 theiler.901.t: "디프테리아균 (코리네박테리움 디프테리아이)"
 theiler.901.d: "[ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] 박사가 디프테리아 병원체의 식별과 분리에 성공하였습니다. 이는 효과적인 백신 개발을 착수하는 데 있어 큰 이정표가 될 것입니다."
 theiler.901.f: "This gram-positive, club-shaped bacterium was identified as the cause of diphtheria by Edwin Klebs in 1883 and cultured by Friedrich Löffler the following year. C. diphtheriae is aerobic and non-motile. Its most dangerous feature is the diphtheria toxin, encoded by a bacteriophage, which damages heart and nerve tissues. The disease was once a major childhood killer but is now controlled by vaccination."
 theiler.901.g: "겉보기엔 별거 없지만 지독하게도 잔인하지."
 theiler.1001.t: "폴리오바이러스"
 theiler.1001.d: "[ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] 박사가 소아마비 병원체의 식별과 분리에 성공하였습니다. 이는 효과적인 백신 개발을 착수하는 데 있어 큰 이정표가 될 것입니다."
 theiler.1001.f: "The poliovirus belongs to the Picornaviridae family and was first isolated in 1909. It is a small, non-enveloped virus with a single-stranded positive-sense RNA genome. The virus primarily spreads via the fecal-oral route and targets motor neurons in the spinal cord, sometimes leading to irreversible paralysis. Global vaccination campaigns have pushed poliovirus to the brink of eradication."
 theiler.1001.g: "눈에 보이지도 않는 것이 그렇게나 많은 사람을 망가뜨릴 줄이야?"
 theiler.102.t: "Cholera Vaccine"
 theiler.102.d: "After numerous experiments, setbacks, and tests, Dr. [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] achieved a breakthrough: The vaccine against cholera is no longer a mere dream, but a reality. A medical and biological revolution!"
 theiler.102.f: "The first cholera vaccine was developed in 1885 by Spanish physician Jaime Ferrán, who used live attenuated Vibrio cholerae strains. His field trials during an outbreak in Valencia marked one of the earliest mass immunizations against a bacterial disease. Later vaccines shifted to killed whole-cell preparations and eventually to modern oral formulations combining killed bacteria with the recombinant B subunit of cholera toxin."
 theiler.102.g: "Science fights back."
 theiler.202.t: "Tuberculosis Vaccine"
 theiler.202.d: "After numerous experiments, setbacks, and tests, Dr. [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] achieved a breakthrough: The vaccine against tuberculosis is no longer a mere dream, but a reality. A medical and biological revolution!"
 theiler.202.f: "The Bacillus Calmette-Guérin (BCG) vaccine was introduced in 1921 by French scientists Albert Calmette and Camille Guérin. It is based on a live, attenuated strain of Mycobacterium bovis, a relative of M. tuberculosis. The vaccine provides variable protection against pulmonary TB but is highly effective in preventing severe childhood forms such as miliary TB and tuberculous meningitis."
 theiler.202.g: "A spark of defense against the silent stalker."
 theiler.402.t: "Typhus Vaccine"
 theiler.402.d: "After numerous experiments, setbacks, and tests, Dr. [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] achieved a breakthrough: The vaccine against typhus is no longer a mere dream, but a reality. A medical and biological revolution!"
 theiler.402.f: "The first effective typhus vaccine was developed in the 1930s by Polish biologist Rudolf Weigl. He cultivated Rickettsia prowazekii inside the intestines of lice and used inactivated bacteria for immunization. During World War II, his laboratory in Lwów secretly used vaccine production to shelter and employ people at risk of Nazi persecution. Modern vaccines for epidemic typhus are rarely used today."
 theiler.402.g: "We outsmarted the hitchhiker."
 theiler.502.t: "Yellow Fever Vaccine"
 theiler.502.d: "After numerous experiments, setbacks, and tests, Dr. [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] achieved a breakthrough: The vaccine against yellow fever is no longer a mere dream, but a reality. A medical and biological revolution!"
 theiler.502.f: "The yellow fever vaccine was developed in the 1930s by South African virologist Max Theiler, who later received the Nobel Prize in 1951. He attenuated the virus by serially passing it in chicken embryos, producing the 17D strain. This live, attenuated vaccine remains one of the most effective vaccines ever created, conferring long-lasting immunity after a single dose."
 theiler.502.g: "A blow against the mosquito's disease."
 theiler.602.t: "Measles Vaccine"
 theiler.602.d: "After numerous experiments, setbacks, and tests, Dr. [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] achieved a breakthrough: The vaccine against measles is no longer a mere dream, but a reality. A medical and biological revolution!"
 theiler.602.f: "The measles vaccine was licensed in 1963, developed by John Enders and colleagues after they successfully grew the virus in chick embryo cells. The live, attenuated vaccine dramatically reduced measles deaths worldwide. Later, it was combined with vaccines against mumps and rubella to form the MMR vaccine, which remains a cornerstone of routine childhood immunization."
 theiler.602.g: "The tiny monster met its match."
 theiler.802.t: "Plague Vaccine"
 theiler.802.d: "After numerous experiments, setbacks, and tests, Dr. [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] achieved a breakthrough: The vaccine against plague is no longer a mere dream, but a reality. A medical and biological revolution!"
 theiler.802.f: "The first plague vaccine was introduced in 1897 by Waldemar Haffkine, who worked in Bombay during an epidemic. He used heat-killed Yersinia pestis bacteria to prepare an injectable vaccine. While it reduced mortality, protection was limited and short-lived. More recent research focuses on subunit vaccines targeting F1 and V antigens of the bacterium."
 theiler.802.g: "The reaper's final hour has come!"
 theiler.902.t: "Diphtheria Vaccine"
 theiler.902.d: "After numerous experiments, setbacks, and tests, Dr. [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] achieved a breakthrough: The vaccine against diphtheria is no longer a mere dream, but a reality. A medical and biological revolution!"
 theiler.902.f: "The diphtheria toxoid vaccine was developed in the 1920s after Gaston Ramon in France and Alexander Glenny in England discovered that formaldehyde-treated diphtheria toxin could induce immunity without causing disease. The vaccine, often combined with tetanus and pertussis antigens (the DTP vaccine), drastically reduced childhood mortality in the mid-20th century."
 theiler.902.g: "The wheezing in the night is over."
 theiler.1002.t: "Polio Vaccine"
 theiler.1002.d: "After numerous experiments, setbacks, and tests, Dr. [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] achieved a breakthrough: The vaccine against polio is no longer a mere dream, but a reality. A medical and biological revolution!"
 theiler.1002.f: "Two effective polio vaccines were created in the 20th century. Jonas Salk developed the inactivated polio vaccine (IPV) in 1955, using chemically killed polioviruses. A few years later, Albert Sabin introduced the oral polio vaccine (OPV), based on live attenuated strains, which was easier to administer and provided intestinal immunity. Both vaccines played central roles in the global effort to eliminate polio."
 theiler.1002.g: "No mercy for this murderer of children's dreams!"
