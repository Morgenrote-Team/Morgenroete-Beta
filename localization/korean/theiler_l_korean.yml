 theiler.2201.t: "농업 개량"
 theiler.2201.d: "[SCOPE.sCharacter('theiler_biologist_scope').GetLastName] 박사가 본인의 목표를 달성하였다. 스스로의 생물학적 전문지식을 신중히 선택 적용함으로서 우리나라의 농업을 지속적으로 강화하였다.\n\n개량된 건물 수: [GetPlayer.MakeScope.Var('mr_num_improved_agriculture_buildings_var').GetValue|V0]곳\n사업으로 얻은 $concept_theiler_microorganisms$: @theiler_microorganisms_texticon! [JournalEntry.MakeScope.ScriptValue('ito_specimens_from_forestry_project_value')|+0]"
 theiler.2201.f: "'이 바보들은 아직도 자신들이 이 모든 작물들을 길들였다고 생각하는군. 사실은 그 작물들이 우리 인간을 길들인 건데 말이야. 우리가 얘들을 얼마나 보살피는지를 보라고!'"
 theiler.2201.g: "우리 경제가 성장하겠군!"
