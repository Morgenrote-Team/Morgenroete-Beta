 je_theiler_medicinal_plant_strychnine: "마전자나무"
 je_theiler_medicinal_plant_strychnine_reason: "신약 개발 과정은 일반적으로 다음의 절차를 거칩니다. 우선 당신의 의료 기술 단계에 따라 [concept_panum_physician]가 약용으로 사용할 특정 [concept_ito_medicinal_plants]을 탐색할 것을 제안합니다. 이 경우 최소 #V 5개의 [AddLocalizationIf( Scope.Var('theiler_physician_demand_var').IsSet , Scope.Var('theiler_physician_demand_var').GetFlagName)]#!을 모으게 됩니다. [concept_dubois_naturalist]는 채집본들을 모아 분리하는 임무를 맡습니다. 그런 뒤 [concept_mendelejew_chemist]가 화학물질을 추출합니다. 화학 물질이 발견되면 [concept_theiler_biologist]는 제약에 나설 수 있습니다.\n\n마전자나무는 인도와 동남아시아에 서식하는 열대나무입니다. 이 나무의 씨앗에는 독성이 상당히 강한 알칼로이드인 스트리크닌과 브루신이 들어 있습니다. 스트리크닌 신경계에 영향을 끼쳐 심각한 근육 경련을 일으키고 사망에 이를 위험성이 존재합니다. 이러한 독성에도 예로부터 소량으로 조절된 추출물을 자극제나 소화기, 신경질환 치료제로 이용하기도 했습니다."
