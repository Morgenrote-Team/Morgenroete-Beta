 je_theiler_microscope_achromatic: "색지움 현미경"
 je_theiler_microscope_achromatic_reason: "1870년대 에른스트 아베는 정밀 광학 설계로 화상의 선명도와 해상도를 크게 향상시킨 신형 색지움 현미경을 개발하였습니다. 카를 자이스에서 진행했던 아베의 연구는 현대 과학 연미경의 근간을 마련하고 렌즈 구조의 기준을 정립하였습니다.\n\n더 나은 성능의 현미경을 개발하면 [Concept('concept_theiler_pathogen','$concept_theiler_pathogens$')]와 [Concept('concept_theiler_microorganism','$concept_theiler_microorganisms$')]의 관찰도 보다 수월하게 이루어집니다. [concept_tesla_engineer]와 [concept_theiler_biologist]를 모두 보유하면 진행도가 쌓입니다."
 je_theiler_microscope_achromatic_goal: "생물학자와 공학자의 신형 현미경 공동 개발에는 [JournalEntry.GetTotalGoalValue|V0]주가 소요됩니다."
 je_theiler_microscope_electron: "전자 현미경"
 je_theiler_microscope_electron_reason: "1930년대 에른스트 루스카와 막스 크놀이 개발한 전자 현미경은 조명 대신 전자빔을 사용하여 훨씬 높은 해상도를 구현합니다. 전자 현미경은 과학자들로 하여금 광학 현미경의 한계를 훨씬 뛰어넘는 나노미터 단위의 구조물을 관찰할 수 있게 만들면서 역사적으로 중대한 역할을 행사하였습니다.\n\n더 나은 성능의 현미경을 개발하면 [Concept('concept_theiler_pathogen','$concept_theiler_pathogens$')]와 [Concept('concept_theiler_microorganism','$concept_theiler_microorganisms$')]의 관찰도 보다 수월하게 이루어집니다. [concept_tesla_engineer]와 [concept_theiler_biologist]를 모두 보유하면 진행도가 쌓입니다."
 je_theiler_microscope_electron_goal: "생물학자와 공학자의 신형 현미경 공동 개발에는 [JournalEntry.GetTotalGoalValue|V0]주가 소요됩니다."
