 je_theiler_medicinal_plant_emetine_reason: "The process of inventing a new pharmaceutical typically follows this sequence: Based on the level of your Medical Technique, a [concept_panum_physician] proposes finding specific [concept_ito_medicinal_plants] for medicinal use, in this case at least #V 5 [AddLocalizationIf( Scope.Var('theiler_physician_demand_var').IsSet , Scope.Var('theiler_physician_demand_var').GetFlagName)]#!. A [concept_dubois_naturalist] is tasked with collecting enough samples to isolate them. A [concept_mendelejew_chemist] then isolates the chemical substance. Once it has been found, a [concept_theiler_biologist] can produce the pharmaceutical.\n\nCarapichea ipecacuanha is a tropical plant native to South America, especially Brazil. Its roots contain the alkaloids emetine and cephaeline, which induce vomiting and have antiparasitic effects. Traditionally, ipecac root was used as an emetic to treat poisoning and as an expectorant in cough syrups."
