 theiler.52.t: "백신 연구"
 theiler.52.d: "[ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] 박사가 인류의 고통을 멈추기 위한 혁신적인 백신 개발 준비에 나서고 있다. 다만 어떤 질병의 백신을 개발할 것인가는 아직 확정되지 않았다."
 theiler.52.f: "백신은 질병에 맞서는 의학과 생물학 분야의 가장 강력한 무기입니다. 탄탄한 의료 체계가 갖춰진다면 백신으로 질병의 발생을 완전히 차단할 수 있습니다. 백신을 개발하려면 생물학자는 관련 병원체를 반드시 연구해야 합니다. 일부 백신은 기술적 조건이 요구되기도 하는데, 이를테면 발진티푸스와 황열병, 디프테리아는 유전학 연구가 필요합니다."
