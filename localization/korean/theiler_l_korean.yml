 je_theiler_medicinal_plant_strychnine: "Strychnos Nux-Vomica"
 je_theiler_medicinal_plant_strychnine_reason: "The process of inventing a new pharmaceutical typically follows this sequence: Based on the level of your Medical Technique, a [concept_panum_physician] proposes finding specific [concept_ito_medicinal_plants] for medicinal use, in this case at least #V 5 [AddLocalizationIf( Scope.Var('theiler_physician_demand_var').IsSet , Scope.Var('theiler_physician_demand_var').GetFlagName)]#!. A [concept_dubois_naturalist] is tasked with collecting enough samples to isolate them. A [concept_mendelejew_chemist] then isolates the chemical substance. Once it has been found, a [concept_theiler_biologist] can produce the pharmaceutical.\n\nStrychnos nux-vomica is a tropical tree native to India and Southeast Asia. Its seeds contain the alkaloids strychnine and brucine, both highly toxic. Strychnine affects the nervous system, causing severe muscle convulsions and potentially death. Despite its toxicity, in small, controlled doses, extracts were historically used in medicine as a stimulant and to treat digestive or nervous disorders."
