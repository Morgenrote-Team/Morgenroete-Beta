 je_theiler_medicinal_plant_quinine_success: "[GetPlayer.GetName]에서 #V 기나나무 5개#! 이상 확보"
 je_theiler_medicinal_plant_thymol: "타임"
 je_theiler_medicinal_plant_thymol_reason: "신약 개발 과정은 일반적으로 다음의 절차를 거칩니다. 우선 당신의 의료 기술 단계에 따라 [concept_panum_physician]가 약용으로 사용할 특정 [concept_ito_medicinal_plants]을 탐색할 것을 제안합니다. 이 경우 최소 #V 5개의 [AddLocalizationIf( Scope.Var('theiler_physician_demand_var').IsSet , Scope.Var('theiler_physician_demand_var').GetFlagName)]#!을 모으게 됩니다. [concept_dubois_naturalist]는 채집본들을 모아 분리하는 임무를 맡습니다. 그런 뒤 [concept_mendelejew_chemist]가 화학물질을 추출합니다. 화학 물질이 발견되면 [concept_theiler_biologist]는 의약품 제조에 나설 수 있습니다.\n\n선백리향이라고도 불리는 타임 (Thymus vulgaris)은 지중해에 자생하는 조그마한 다년생 허브입니다. 잎과 기름에는 티몰과 카르바크롤, 그리고 기타 향균, 항산화, 항염증 효과가 있는 에센셜 오일이 함유되어 있습니다. 예로부터 타임은 호흡기 감염, 기침, 소화장애 치료에 사용되어 왔습니다. 약초학과 아로마테라피, 식품의 천연 방부제 및 향미제로도 널리 사용되고 있습니다."
 je_theiler_medicinal_plant_thymol_success: "붉은킨코나나무[GetPlayer.GetName]에서 #V 타임 5개#! 이상 확보"
 je_theiler_medicinal_plant_pilocarpine: "필로카르푸스 펜나티폴리우스"
 je_theiler_medicinal_plant_pilocarpine_reason: "신약 개발 과정은 일반적으로 다음의 절차를 거칩니다. 우선 당신의 의료 기술 단계에 따라 [concept_panum_physician]가 약용으로 사용할 특정 [concept_ito_medicinal_plants]을 탐색할 것을 제안합니다. 이 경우 최소 #V 5개의 [AddLocalizationIf( Scope.Var('theiler_physician_demand_var').IsSet , Scope.Var('theiler_physician_demand_var').GetFlagName)]#!을 모으게 됩니다. [concept_dubois_naturalist]는 채집본들을 모아 분리하는 임무를 맡습니다. 그런 뒤 [concept_mendelejew_chemist]가 화학물질을 추출합니다. 화학 물질이 발견되면 [concept_theiler_biologist]는 의약품 제조에 나설 수 있습니다.\n\n필로카르푸스 페나티폴리우스(Pilocarpus pennatifolius)는 브라질에 자생하는 열대 관목입니다. 잎에는 침샘과 땀샘을 자극하는 알칼로이드의 일종인 필로카르핀이 함유되어 있습니다. 예로부터 구강건조증과 안구질환 치료에 사용되었습니다. 현대 의학에서는 안압을 낮춰 녹내장을 다스리고 방사능이나 약물로 인한 구강건조증(제로스토미아)을 치료하는 데 사용됩니다. 식물 자체는 약리학적으로 활성화된 알칼로이드 성분에 주로 가치를 두는 편입니다. "
 je_theiler_medicinal_plant_pilocarpine_success: "[GetPlayer.GetName]에서 #V 필로카르푸스 펜나티폴리우스 5개#! 이상 확보"
 je_theiler_medicinal_plant_ephedrine: "마황"
 je_theiler_medicinal_plant_ephedrine_reason: "신약 개발 과정은 일반적으로 다음의 절차를 거칩니다. 우선 당신의 의료 기술 단계에 따라 [concept_panum_physician]가 약용으로 사용할 특정 [concept_ito_medicinal_plants]을 탐색할 것을 제안합니다. 이 경우 최소 #V 5개의 [AddLocalizationIf( Scope.Var('theiler_physician_demand_var').IsSet , Scope.Var('theiler_physician_demand_var').GetFlagName)]#!을 모으게 됩니다. [concept_dubois_naturalist]는 채집본들을 모아 분리하는 임무를 맡습니다. 그런 뒤 [concept_mendelejew_chemist]가 화학물질을 추출합니다. 화학 물질이 발견되면 [concept_theiler_biologist]는 의약품 제조에 나설 수 있습니다.\n\n마황은 에페드라 시니카(Ephedra sinica)라는 학명을 갖고 있으며 중국과 중앙아시아에 자생하는 관목입니다. 잎에는 침샘과 땀샘을 자극하는 알칼로이드의 일종인 필로카르핀이 함유되어 있습니다. 한의학에서는 천식, 기관지염, 코막힘 치료에 쓰였습니다. 그러나 지금은 고혈압, 심장질환, 기타 부작용의 위험으로 사용이 제한되고 있습니다."
 je_theiler_medicinal_plant_ephedrine_success: "[GetPlayer.GetName]에서 #V 마황 5개#! 이상 확보"
 je_theiler_medicinal_plant_strophantine: "스트로판투스 그라투스"
 je_theiler_medicinal_plant_strophantine_reason: "신약 개발 과정은 일반적으로 다음의 절차를 거칩니다. 우선 당신의 의료 기술 단계에 따라 [concept_panum_physician]가 약용으로 사용할 특정 [concept_ito_medicinal_plants]을 탐색할 것을 제안합니다. 이 경우 최소 #V 5개의 [AddLocalizationIf( Scope.Var('theiler_physician_demand_var').IsSet , Scope.Var('theiler_physician_demand_var').GetFlagName)]#!을 모으게 됩니다. [concept_dubois_naturalist]는 채집본들을 모아 분리하는 임무를 맡습니다. 그런 뒤 [concept_mendelejew_chemist]가 화학물질을 추출합니다. 화학 물질이 발견되면 [concept_theiler_biologist]는 의약품 제조에 나설 수 있습니다.\n\n스트로판투스 그라투스 (Strophanthus gratus)는 서아프리카에 자생하는 덩굴 식물입니다. 식물의 씨앗에는 심장수축에 큰 영향을 끼치는 우아바인 등의 강심배당체가 함유되어 있습니다. 예로부터 이 식물의 추출물은 화살독으로 사용되었으며 심부전 치료에 소량을 사용하기도 했습니다. 우아바인은 심부전과 부정맥 수술에 활용하려는 연구가 이뤄져 왔습니다."
