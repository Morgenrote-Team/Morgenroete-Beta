 je_theiler_polio_vaccine_success: "[GetPlayer.GetName]에서 #ORANGE 백신 단서 10개#! 이상 확보"
 je_theiler_polio_vaccine_goal: ""
 theiler.101.t: "콜레라균 (비브리오 콜레라이)"
 theiler.101.d: "[ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] 박사가 콜레라 병원체의 식별과 분리에 성공하였다. 이는 효과적인 백신 개발을 착수하는 데 있어 큰 이정표가 될 것이다."
 theiler.101.f: "콜레라균은 1854년 이탈리아 해부학자 필리포 파치니가 처음으로 기술하였으나, 콜레라 발병에서의 역할은 훗날 1884년 로베르트 코흐가 처음으로 확인하였습니다. 콜레라균은 구부러진 막대 모양의 세균으로, 수생 환경, 특히 따뜻한 염수에서 잘 자랍니다. 콜레라균은 그람 음성균 (그람염색 시 시약색을 유지하지 못하는 균)으로서 움직이는 데 필요한 극성 편모를 하나 가지고 있고, 장내 수분 균형을 깨뜨려 심한 설사를 유발하는 콜레라 독소를 분비합니다."
 theiler.101.g: "조만한 것이 까불기는."
 theiler.201.t: "결핵균 (미코박테리움 투베르쿨로시스)"
 theiler.201.d: "[ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] 박사가 결핵 병원체의 식별과 분리에 성공하였다. 이는 효과적인 백신 개발을 착수하는 데 있어 큰 이정표가 될 것이다."
 theiler.201.f: "결핵균은 1882년 로베르트 코흐가 처음 확인하여 1905년 노벨상 수상을 안겼습니다. 천천히 자라는 막대 모양의 유기체로, 미콜산이 풍부한 밀랍형 세포벽을 가지고 있어 통상적인 그람염색과 여러 항생제에 내성을 보입니다. 때문에 '항산성 세균'으로 분류됩니다. 이 병원은 편성호기성(생존에 산소가 필요한 세균)으로서 주로 폐를 감염시키지만 다른 장기로 퍼질 수도 있습니다."
 theiler.201.g: "너의 시대는 끝났다, 말 없는 스토커여."
 theiler.301.t: "오르토폭스비루스 바리올라이"
 theiler.301.d: "[ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] 박사가 천연두 병원체의 식별과 분리에 성공하였다. 이는 효과적인 백신 개발을 착수하는 데 있어 큰 이정표가 될 것이다."
 theiler.301.f: "천연두의 원인균인 바리올라 바이러스는 폭스바이러스과(Poxviridae)에 속한다. 대다수 바이러스와는 다르게 오로지 숙주 세포의 세포질에서만 복제가 이루어진다. 바리올라 바이러스는 벽돌 모양의 큼직한 크기를 지니고 있으며 이중가닥 DNA를 갖고 있다. 바리올라는 최초의 성공적인 백신 접종의 대상으로 1796년 에드워드 제너가 처음 도입하였으며, 1980년 백신 접종으로 박멸된 최초의 인간 병원체가 되었다."
 theiler.301.g: "그렇게 조그만 것이 제국을 무너뜨렸단 말인가?"
 theiler.401.t: "리케차 프로바제키"
 theiler.401.d: "[ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] 박사가 발진티푸스 병원체의 식별과 분리에 성공하였다. 이는 효과적인 백신 개발을 착수하는 데 있어 큰 이정표가 될 것이다."
 theiler.401.f: "리케차 프로바제키(Rickettsia Prowazekii)는 1916년 엔히키 다 호샤 리마가 발견하였다. 그 이름은 1915년 발진티푸스로 먼저 세상을 떠난 대학 동료 슈타니슬라우스 폰 프로바체크(Stanislaus von Prowazek)의 이름을 따왔다. 프로바체크와 호샤 리마 모두 독일 콧부스의 포로수용소 병원에서 발진티푸스 원인균을 연구하던 중 발진티푸스에 감염된 적이 있었다. 이 박테리아는 편모가 없고 호기성이다. 세포벽이 크리스탈 바이올렛 그람 염색에 반응하지 않기 때문에 그람 음성균으로 분류된다. 그람 음성균은 일반적으로 페니실린 등의 여러 항생제에 내성을 갖추고 있다."
 theiler.401.g: "작고 음침한 불청객일세!"
 theiler.501.t: "오르토플라비바이러스 플라비"
 theiler.501.d: "[ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] 박사가 황열병 병원체의 식별과 분리에 성공하였다. 이는 효과적인 백신 개발을 착수하는 데 있어 큰 이정표가 될 것이다."
 theiler.501.f: "황열병 바이러스는 1927년 가나의 발병 환자에게서 처음으로 분리되었다. 플라비바이러스과(Flaviviridae)에 속하며 단일 가닥 양성 RNA 유전체를 지니고 있다. 황열병 바이러스는 주로 이집트숲모기(Aedes aegypti)를 비롯한 숲모기속(Aedes) 개체에 의해 전파된다. 감염 시 발열과 근육통, 황달 증세가 나타날 수 있으며, 심한 경우 출혈과 장기부전으로 이어질 수 있다."
 theiler.501.g: "잔혹하기로는 제일이던 자연의 장난이 실체를 드러냈구나."
 theiler.601.t: "홍역 모빌리바이러스"
 theiler.601.d: "[ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] 박사가 홍역 병원체의 식별과 분리에 성공하였다. 이는 효과적인 백신 개발을 착수하는 데 있어 큰 이정표가 될 것이다."
 theiler.601.f: "홍역 바이러스는 파라믹소바이러스과(Paramyxoviridae)의 모르빌리바이러스속(Morbillivirus)에 속한다. 외피를 가지고 있고 단일 가닥 음성 RNA 유전체를 지니고 있다. 호흡기 비말을 통해 감염되며, 인간에게 가장 전염성이 강한 바이러스로 알려져 있다. 홍역은 발열과 기침, 결막염, 특유의 발전을 유발하며, 폐렴이나 뇌염 같은 심각한 합병증으로 이어질 수 있다."
 theiler.601.g: "면역 체계를 공격하는 초소형 테러분자일세."
 theiler.701.t: "연쇄상구균 (스트렙토코쿠스 피오게네스)"
 theiler.701.d: "[ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] 박사가 성홍열 병원체의 식별과 분리에 성공하였다. 이는 효과적인 백신 개발을 착수하는 데 있어 큰 이정표가 될 것이다."
 theiler.701.f: "스트렙토코쿠스 피오게네스(Streptococcus pyogenes)균은 사슬 모양으로 배열된 그람 양성 구균이다. A군 베타 용혈성 연쇄상구균으로 분류되며 19세기 성홍열의 원인으로 처음 지목되었다. 이 균의 독성은 발진을 유발하는 발적독(發赤毒)을 비롯하여 외독소 분비에서 생겨난다. 또한 인후염, 농가진, 류머티즘열도 유발한다."
 theiler.701.g: "정말이지 조그맣고 얄미운 악동일세..."
 theiler.801.t: "페스트균 (예르시니아 페스티스)"
 theiler.801.d: "[ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] 박사가 페스트 병원체의 식별과 분리에 성공하였다. 이는 효과적인 백신 개발을 착수하는 데 있어 큰 이정표가 될 것이다."
 theiler.801.f: "예르시니아 페스티스 (Yersinia pestis)는 1894년 홍콩 발병 당시 알렉상드르 예르신이 처음 발견하였다. 그람 음성의 비운동성 구상간균이며, 감염된 설치류, 특히 곰쥐를 흡혈하는 벼룩을 통해 감염이 이루어진다. 림프절 페스트, 패혈증 페스트, 폐렴 페스트의 세가지 형태로 페스트를 유발한다. 치료하지 않으면 사망률은 극도로 높아진다."
 theiler.801.g: "그럼 현미경으로 그 사신이 보인다는 거군?"
 theiler.901.t: "디프테리아균 (코리네박테리움 디프테리아이)"
 theiler.901.d: "[ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] 박사가 디프테리아 병원체의 식별과 분리에 성공하였다. 이는 효과적인 백신 개발을 착수하는 데 있어 큰 이정표가 될 것이다."
 theiler.901.f: "디프테리아균(Corynebacterium diphtheriae)은 곤봉 모양의 그람 음성 균으로, 1883년 에드윈 클레브스가 디프테리아의 원인균으로 처음 확인하고, 이듬해 프리드리히 뢰플러가 배양에 성공하였다. 호기성에 비운동성의 특성을 지니고 있으며, 박테리오파지가 생성하는 디프테리아 독소는 심장과 신경조직을 손상시킨다는 점에서 가장 위험한 특성으로 꼽힌다. 디프테리아는 한때 아동 사망의 대표적인 원인이었으나 오늘날 백신 접종으로 통제되고 있다."
 theiler.901.g: "겉보기엔 별거 없지만 지독하게도 잔인하지."
 theiler.1001.t: "폴리오바이러스"
 theiler.1001.d: "[ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] 박사가 소아마비 병원체의 식별과 분리에 성공하였다. 이는 효과적인 백신 개발을 착수하는 데 있어 큰 이정표가 될 것이다."
 theiler.1001.f: "소아마비 파이러스는 피코르나바이러스과(Picornaviridae)에 속하며, 1909년에 처음 분리되었다. 크기가 작고 외피가 없으며 단일 가닥의 양성 RNA 유전체를 지니고 있다. 이 바이러스는 주로 분변-구강 경로를 통해 전파되며 척수의 운동신경 세포를 공격하여 간혹 영구적인 마비를 유발한다. 전세계적인 백신 접종 캠페인으로 소아마비 바이러스는 현재 박멸에 근접한 수준에 이르렀다."
 theiler.1001.g: "눈에 보이지도 않는 것이 그렇게나 많은 사람을 망가뜨릴 줄이야?"
 theiler.102.t: "콜레라 백신"
 theiler.102.d: "수없이 많은 실험과 좌절, 시험을 거친 [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] 박사가 돌파구를 이룩하였다. 콜레라를 이기는 백신이 한낱 꿈에서 벗어나 현실이 된 것이다. 의학계와 생물학계의 혁명이 벌어졌다!"
 theiler.102.f: "최초의 콜레라 백신은 1885년 스페인의 의사 하이메 페란이 개발하였으며, 활성화된 약독화 비브리오 콜레라균을 이용해 개발하였다. 페란은 발렌시아에서 벌어진 콜레라 유행을 기회 삼아 현장 시험을 실시하였는데 이는 세균성 질병에 대한 최초의 대규모 면역 접종으로 역사에 기록되었다. 이후 백신은 불활성화 조합으로 바뀌었고, 최종적으로는 불활성화균과 콜레라 독소의 재조합 B서브유닛을 섞은, 현행 방식의 경구형 투여제로 나아가게 되었다."
 theiler.102.g: "과학의 반격일세."
 theiler.202.t: "결핵 백신"
 theiler.202.d: "수없이 많은 실험과 좌절, 시험을 거친 [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] 박사가 돌파구를 이룩하였다. 결핵을 이기는 백신이 한낱 꿈에서 벗어나 현실이 된 것이다. 의학계와 생물학계의 혁명이 벌어졌다!"
 theiler.202.f: "바실리우스 칼메트-게랭 백신 (BCG 백신)은 1921년 프랑스 과학자 알베르 칼메트와 카미유 게랭이 개발한 백신이다. 결핵균의 근연종인 마이코박테리움 보비스균을 활성화, 약독화시킨 것을 기반으로 삼고 있다. BCG 백신은 패결핵에 대해 다방면의 예방 효과를 보이나, 그 중에서도 속립성 결핵이나 결핵성 뇌수막염 등의 소아기 중증 결핵 예방에 매우 효과적이다."
 theiler.202.g: "소문 없이 찾아오는 자에 맞서는 방어의 불꽃일세."
 theiler.402.t: "발진티푸스 백신"
 theiler.402.d: "수없이 많은 실험과 좌절, 시험을 거친 [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] 박사가 돌파구를 이룩하였다. 발진티푸스를 이기는 백신이 한낱 꿈에서 벗어나 현실이 된 것이다. 의학계와 생물학계의 혁명이 벌어졌다!"
 theiler.402.f: "최초의 효과적인 발진티푸스 백신은 1930년대 폴란드의 생물학자 루돌프 바이글이 개발하였다. 바이글은 이의 장내에서 리케차 프로바제키균을 배양하여 불활성화된 세균을 면역에 활용하였다. 제2차 세계 대전 시기 바이글이 세운 르보프 연구소는 나치의 탄압 대상에 오른 사람들을 보호하고 채용하기 위해 비밀리에 백신 생산을 진행하기도 하였다. 오늘날 유행성 발진티푸스에 백신은 거의 쓰이지 않고 있다."
 theiler.402.g: "무임승차의 허를 찔렀구만."
 theiler.502.t: "황열병 백신"
 theiler.502.d: "수없이 많은 실험과 좌절, 시험을 거친 [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] 박사가 돌파구를 이룩하였다. 황열병을 이기는 백신이 한낱 꿈에서 벗어나 현실이 된 것이다. 의학계와 생물학계의 혁명이 벌어졌다!"
 theiler.502.f: "황열병 백신은 1930년대 남아프리카의 바이러스학자 막스 테일러가 개발하였다. 테일러는 훗날 1951년 노벨상을 수상한 인물이기도 하다. 그는 닭의 배아에서 바이러스를 연속 배양하여 약독화시키는 방식으로 17D 균을 만들어냈다. 활성화된 약독화 백신으로서 단 한번의 접종으로 장기간 면역력을 유지하여, 지금까지 개발된 백신 가운데 가장 효과적인 것으로 꼽히고 있다."
 theiler.502.g: "모기가 옮기는 질병에 일격을 가했구나."
 theiler.602.t: "홍역 백신"
 theiler.602.d: "수없이 많은 실험과 좌절, 시험을 거친 [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] 박사가 돌파구를 이룩하였다. 홍역을 이기는 백신이 한낱 꿈에서 벗어나 현실이 된 것이다. 의학계와 생물학계의 혁명이 벌어졌다!"
 theiler.602.f: "홍역 백신은 존 앤더스와 동료 학자들이 닭의 배아 세포에서 바이러스를 배양하는 데 성공한 것을 계기로 개발되어 1963년에 특허가 등록되었다. 활성화된 약독화 백신으로서 전세계의 홍역 사망자수를 획기적으로 줄여나갔다. 이후 볼거리와 풍진 백신과 결합되어 MMR 백신을 이루었으며, 현재까지도 어린이 정기 예방접종 시에 맞는 백신으로 유명하다."
 theiler.602.g: "조그만 괴물이 적수를 만났다."
 theiler.802.t: "페스트 백신"
 theiler.802.d: "수없이 많은 실험과 좌절, 시험을 거친 [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] 박사가 돌파구를 이룩하였다. 페스트를 이기는 백신이 한낱 꿈에서 벗어나 현실이 된 것이다. 의학계와 생물학계의 혁명이 벌어졌다!"
 theiler.802.f: "최초의 페스트 백신은 1897년 인도 봄베이에서 연구하던 발데마르 하프키네가 페스트 유행을 계기로 처음 개발하였다. 열처리를 통해 사멸시킨 페스트균을 이용하여 주사형 백신을 제조하였다. 이 백신은 사망률을 감소시키는 효과는 있었으나 예방효과가 제한적이고 지속기간도 짧았다. 오늘날에는 페스트균의 F1과 V항원을 표적으로 삼는 서브유닛 백신 개발에 연구가 집중되고 있다."
 theiler.802.g: "저승사자의 최후가 도래했다!"
 theiler.902.t: "디프테리아 백신"
 theiler.902.d: "수없이 많은 실험과 좌절, 시험을 거친 [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] 박사가 돌파구를 이룩하였다. 디프테리아를 이기는 백신이 한낱 꿈에서 벗어나 현실이 된 것이다. 의학계와 생물학계의 혁명이 벌어졌다!"
 theiler.902.f: "디프테리아 톡소이드 백신은 1920년대 프랑스의 가스통 라몽과 영국의 알렉산더 글레니가 포름알데히드로 처리한 디프테리아 독소가 질병을 유발하지 않고 면역을 유도할 수 있다는 사실을 발견한 계기로 개발되었다. 이 백신은 파상풍과 백일해의 항원과 결합되어 DTP 백신을 이루며, 20세기 중반부터 아동 사망률을 획기적으로 감소시켰다."
 theiler.902.g: "밤중의 씨근거림이 끝났군."
 theiler.1002.t: "소아마비 백신"
 theiler.1002.d: "수없이 많은 실험과 좌절, 시험을 거친 [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] 박사가 돌파구를 이룩하였다. 소아마비를 이기는 백신이 한낱 꿈에서 벗어나 현실이 된 것이다. 의학계와 생물학계의 혁명이 벌어졌다!"
 theiler.1002.f: "효과적인 소아마비 백신은 20세기에만 두 종류가 개발되었다. 1955년 요나스 잘크가 화학적으로 사멸시킨 소아마비 바이러스를 이용한 비활성 소아마비 백신 (IPV)을 개발하였다. 그러부터 몇년 뒤 앨버트 세이빈이 활성화된 약독화균을 기반으로 경구용 소아마비 백신 (OPV)을 개발하였는데, 투여하기도 편리하고 장내 면역도 이룩하였다. 이 두 백신은 전세계적인 소아마비 퇴치 노력에 중추적인 역할을 하였다."
 theiler.1002.g: "아이들의 꿈을 앗아간 살인마에게 자비란 없다!"
 theiler_microbiological_institute_modifier: "미생물학 연구소"
 theiler_microbiological_promotion_modifier: "미생물학 후원"
 theiler_military_vaccine_modifier: "군용 백신"
 theiler_failed_vaccine_experiment_modifier: "백신 실험 실패"
 theiler_vaccine_guinea_pigs_modifier: "백신용 기니피그"
 theiler_vaccine_subsidy_modifier: "백신 보조금"
 theiler.2101.t: "미생물학 연구소"
 theiler.2101.d: "병원체에 대한 집중적인 연구 과정에서 [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] 연구팀의 선도 학자들은 연구를 더욱 효율적으로 발전시키기 위하여 미생물 연구소를 설립하기에 이르렀다."
 theiler.2101.f: "로베르트 코흐는 1876년 탄저병, 1882년 결핵, 1884년 콜레라 등 여러 병원체들을 성공적으로 규명하는 성과를 거두고 1891년 프로이센 정부의 지원을 받아 자신의 연구소를 설립하였습니다. 이 연구소는 질병의 원인으로서 미생물을 체계적이고 제도적으로 연구했던 최초의 연구센터였습니다. 루이 파스퇴르가 1887년 파리에 설립했던 생리화학 연구소 역시 그러한 연구 시설의 성격을 보여준 바 있지만, 공식적으로는 로베르트 코흐 연구소가 근대적 의미를 지닌 최초의 미생물학 연구소로 평가받고 있습니다."
 theiler.2101.g: "연구소는 통상적인 연구에 전념해야 한다."
 theiler.2101.h: "연구소는 병원체 연구에 전념해야 한다."
 theiler.2102.t: "실험실 연구 방법 개선"
 theiler.2102.d: "[ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] 박사가 미생물 실험실에 최신 장비를 들이고 새로운 염색제와 고성능 현미경을 도입하여 병원체 연구의 획기적인 진전을 불러일으켰다."
 theiler.2102.f: "1860년대부터 합성 아닐린 염료가 미생물학계에 혁신을 불러왔다. 메틸렌 블루, 푸크신, 그리고 이후 그람 염색(1884년)과 지엘-닐슨 염색을 통해 처음으로 세균을 구별할 수 있게 된 것이다. 1900년경에는 포자, 낭포, 디프테리아균을 대상으로 한 특수 염색이 새로 개발되었고, 1920년대부터는 김사와 실버 염색이 널리 보급되었으며, 1940년대에는 형광 염색법이 처음으로 소개되었다."
 theiler.2102.g: "좋아."
 theiler.2103.t: "국제 협력"
 theiler.2103.d: "[SCOPE.sCountry('theiler_country_scope').GetName]의 [SCOPE.sCharacter('theiler_biologist_scopet').GetLastName] 박사가 편지를 보내왔다. [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] 박사의 친구로서 병원체 연구에 몇 가지 단서를 전하고 싶었다고 한다."
 theiler.2103.f: "1885년경 일본의 의사 기타사토 시바사부로가 로베르트 코흐의 베를린 연구소에서 근무하기 시작하였다. 1889년 코흐의 지도 하에 파상풍 병원균의 순수 배양에 처음 성공하여 세균학사에 이정표를 남겼다. 두 사람은 함께 혈청요법의 기반을 다졌으며, 훗날 파상풍과 디프테리아 치료에 사용되었다. 이들의 협업은 국제 연구 협력이 성공을 거둔 첫 사례로 평가받고 있다."
 theiler.2103.g: "이것으로 병원체 연구에 박차를 가할 수 있겠군."
 theiler.2103.h: "이 지식으로 더 큰 통찰력을 얻게 되었군."
 theiler.2104.t: "실험실 사고"
 theiler.2104.d: "병원체 탐색 과정에서 심각한 사고가 벌어지고 말았다. 허술한 안전 조치로 우리 연구원들이 감염되고 만 것이다. 수많은 직원들이 격리되고 연구 활동이 몇 달 간 중단될 수도 있다고 한다."
 theiler.2104.f: "병원균을 다룬다는 것은 극도로 위험한 일이다. 연구 과정에서 감염되는 미생물학자들도 많다. 로베르트 코흐는 탄저병과 결핵에 거듭 감염되었고, 에밀 폰 베링은 디프테리아 독소 실험 과정에서 감염되었으며, 막스 폰 페텐코퍼는 본인의 이론을 검증하기 위해 콜레라균을 삼키기도 했다. 이에 대한 보호 조치는 미흡했던 관계로 경증에서 중증에 이르는 감염으로 고통받는 연구자들도 많았다. 이러한 경험은 후대에 이르러 현대 실험실의 안전 기준을 확립하는 데 기여하게 되었다."
 theiler.2104.g: "이런 참사가!"
 theiler.2104.h: "무슨 수를 써서라도 실험실을 재정비해야 한다!"
 theiler.2105.t: "오염된 표본"
 theiler.2105.d: "[ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] 박사의 연구팀이 살펴보던 표본 가운데 일부가 오염된 것으로 밝혀지면서 병원체 연구에 차질이 생겼다는 안타까운 소식이 전해졌다."
 theiler.2105.f: "탄저병, 결핵, 디프테리아에 관한 연구는 곰팡이나 다른 세균, 불순물 섞인 혈청 시료로 오염되는 경우가 많았다. 파스퇴르의 초창기 백신 실험 역시 이 같은 일을 겪었다. 실험 환경의 오염으로 인해 병원균에 잘못된 결론을 내릴 수 있었기에, 순수 배양 기술, 멸균법, 무균 절차의 발전을 이끌어내기도 하였다. 세포 배양 연구는 이런 사고의 가능성을 크게 낮춰준다."
 theiler.2105.g: "이번 일에 책임질 사람은 누구인가?"
 theiler.2106.t: "연구원들의 다툼"
 theiler.2106.d: "최근 병원균 탐색을 놓고 학계 고위급 인사들 사이에 다툼이 벌어졌다. 국내 최고의 의사로 꼽히는 [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] 박사가 [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] 박사의 과거 발견 사항들을 비판하면서 논쟁을 벌인 것이다. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] 박사는 연구가 완전히 그릇된 방향으로 가고 있다고 주장한 반면, [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] 박사는 해당 주제에 전혀 알지도 못하면서 나선다고 맞서고 있다."
 theiler.2106.f: "\"당신네 실험은 2주 된 페트리 접시보다 더 역겹소!\"\n\"그쪽의 질병 진단은 동전 던지기나 다름없겠지!\"\n\"어이구야, 나는 사람 목숨을 구하는데 그쪽은 세균을 애완동물처럼 기르지 않았던가!\"\n\"하! 공포에 떠는 환자들에게 당신네 약을 먹이는 것보다야 낫겠지!\"\n\"현미경 쓰는 도둑놈 같으니!\"\n\"청진기 건 변태만 할까!\""
 theiler.2106.g: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName] 박사의 말이 옳다."
 theiler.2106.h: "[ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] 박사의 말이 옳다."
 theiler.2106.i: "말싸움을 벌일 게 아니라 연구를 하란 말이다!"
 theiler.2107.t: "연구 조수"
 theiler.2107.d: "우리나라의 생물학자 [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] 박사가 자신의 연구 지원을 위해 학계의 일부 학생들과 조교들을 데려와 연구실에 합류할 것을 제안해 왔다."
 theiler.2107.f: "\"학생들의 앞길을 가로막을지는 모르겠지만, 과학의 명예가 달려 있는 일이오!\""
 theiler.2107.g: "조수를 추가로 채용하시오."
 theiler.2107.h: "젊은 학도가 필요한 곳이 또 있소."
 theiler.2111.t: "군용 백신 접종"
 theiler.2111.d: "[ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] 박사가 개발한 백신이 엄청난 효과를 보고 있다. 군부에서는 추후 전쟁에서 장병들의 건강을 지키고 병력 손실을 줄일 수 있는 방안에 큰 관심을 보이고 있다."
 theiler.2111.f: "백신 접종은 전장에서 결정적인 이점을 가져다주었다. 인도 주둔 영국군은 천연두 접종과 백신 접종으로 전염병 유행으로부터 장병들을 보호하였다. 마찬가지로 20세기 초 열대 지방에서 황열병 백신 접종이 실시되어 전염병으로 인한 사상자 감소 효과를 보았다. 백신을 맞은 장병들은 전투에 필요한 건강을 유지한 반면, 맞지 않은 장병들은 병에 걸려 약해졌던 것이다. 이처럼 백신은 전략 무기와 같은 역할을 하였다."
 theiler.2111.g: "군 부대의 백신 접종을 우선하여야 한다."
 theiler.2111.h: "해당 분야 연구로 습득한 지식을 백신 개량에 활용하자."
 theiler.2112.t: "운 좋은 발견"
 theiler.2112.d: "어느 조수가 버려진 유리병에서 효과가 뛰어난 물질을 우연히 발견했다."
 theiler.2112.f: "루이 파스퇴르는 '오래된' 닭 콜레라균 배양액이 닭을 감염시키지 않는다는 사실을 우연히 발견하였다. 이 사실은 예방 효과가 있는 약독화 백신의 개발로 이어지게되었다. 조너스 소크는 소아마비 바이러스가 세포 배양 과정에서 증식하면서 동시에 불활성화될 수 있다는 사실을 이용하여 안전한 소아마비 백신을 처음으로 개발하였다. 알렉산더 플레밍은 곰팡이가 박테리아를 죽인다는 사실을 우연히 발견하고, 페니실린을 처음 발견하는 계기로 이어지게 되었다."
 theiler.2112.g: "조수를 치하하시오."
 theiler.2113.t: "시험 성공"
 theiler.2113.d: "신형 백신의 초기 임상 시험 결과가 예상 밖의 효력을 입증하였다. [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] 박사는 대량 생산과 대규모 접종을 훨씬 앞당길 것을 고려 중에 있다. 백신 연구에 있어 기쁜 날이 아닐 수 없다!"
 theiler.2113.f: "백신 임상 시험이 성공을 거둔 가장 대표적인 사례로는 19세기 말 발데마르 하프키네의 콜레라와 페스트 백신 개발을 꼽을 수 있다. 러시아계 유대인 미생물학자인 하프키네은 1892년 인도에서 최초의 콜레라 백신 임상 시험에 나섰으며, 이 때의 백신은 이후 대량으로 시중에 풀리게 되었다. 1897년에는 페스트 백신에서 개발하여 1898년 인도에서 시험을 거쳤고, 사망자수를 획기적으로 줄이는 데 성공하였다. 하프키네의 업적은 현대 백신 개발사에 있어 하나의 이정표로 기록되었다."
 theiler.2113.g: "백신 개발의 진일보일세!"
 theiler.2113.h: "의학 연구에 새로운 단서가 되겠어."
 theiler.2114.t: "의도찮은 부작용"
 theiler.2114.d: "[SCOPE.sState('theiler_state_scope').GetCityHubName]에서 [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] 박사가 개발한 신형 백신이 심각한 부작용을 보이고 있다. 시험 대상자 가운데 다수가 중병에 걸렸고 일부는 사망에 이르렀다. 이번 임상시험은 일반인의 신뢰를 흔들었을 뿐만 아니라 백신 개발에도 큰 차질을 빚게 될 전망이다."
 theiler.2114.f: "1930년대 뤼베크에서 심각한 백신 접종 사고가 벌어졌다. 신생아 251명이 결핵 예방을 위해 BCG 백신을 접종받았는데, 제조상의 결함으로 독성 강한 결핵균이 백신에 들어가 오염시킨 것이었다. 이 사건으로 208명이 병에 걸려 77명이 목숨을 잃었다. 이른바 '뤼베크 백신 접종 사고'(Lübecker Impfunglück)는 사회적 파문을 일으키며 독일 내 BCG 백신 도입이 보류되었으며, 백신 생산 과정에 보다 엄격한 안전 기준을 도입하는 계기가 되었다."
 theiler.2114.g: "이런 일을 누가 예상이나 했겠나?"
 theiler.2114.h: "그래도 해당 지역에 시험을 계속해 나가야 한다."
 theiler.2115.t: "가로채기 의혹 제기"
 theiler.2115.d: "[SCOPE.sCountry('theiler_country_scope').GetName]에서 온 외국 생물학자가 [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] 박사가 개발 중인 신규 백신의 생산 과정을 철저히 조사하였다. 그리고서 해당 백신은 [SCOPE.sCharacter('theiler_biologist_scope').GetLastName] 박사 본인이 특허를 출원하려 했던 매우 유사한 혈청을 보고 베낀 것이라고 주장하였다."
 theiler.2115.f: "19세기부터 20세기 초까지 특허 보호와 국제 표준의 부재로 백신학 분야에서 소유권 분쟁이 끊이지 않았다. 파스퇴르는 협조 관계에 있던 투생이 자신보다 앞서 실험을 진행하였음에도 소콜레라 백신 개발의 공은 자신에게 있다고 주장하였다. 이후 BCG균과 하프키네의 콜레라, 페스트 백신도 논란을 불러일으켰다. 우선권과 '표절'을 둘러싼 논란은 백신 접종법에 대단히 민감하고 귀중했던 당시 시대상이 반영된 전형적인 현상이었다. "
 theiler.2115.g: "사과드리겠소."
 theiler.2115.h: "그저 우연의 일치일 뿐이오."
 theiler.2116.t: "비용 급증"
 theiler.2116.d: "[SCOPE.sCharacter('theiler_biologist_scope').GetLastName] 박사가 신규 백신의 개발 비용을 평가절하했던 모양이다. 박사의 낙관적인 추정치가 이제 개발 사업 전반을 위태롭게 만들 위기에 처했다."
 theiler.2116.f: "\"돈? 돈이라고?! 그런 더러운 돈 따위! 내가 과학을 위해 한평생을 바치고 있단 걸 잊었는가? 무엇보다 이건 죽음에 맞선 마지막 승리란 말이다! 그런데 어딜 감히 재무제표니 목록표니 들고 와서 나한테 뭘 하라는 건가? 자넨 대체 뭐하자는 것인가? 회계 처리? 당장 내 연구실에서 나가게!\""
 theiler.2116.g: "신규 백신에 예산을 지원하시오."
 theiler.2116.h: "더 많은 연구원을 임시계약직으로 채용하시오."
 theiler.2116.i: "타협해야겠지."
 theiler_state_trait_cochliomyia: "신대륙나선벌레"
 theiler_state_trait_cydia: "사과굴나방"
 je_theiler_cochliomyia_eredication: "나선벌레 박멸"
 je_theiler_cochliomyia_eredication_reason: "지금까지 개발된 최신 기술을 동원하면 나선벌레파리를 박멸하여 인간과 동물을 재앙에서 벗어나게 만들 수 있을지도 모른다. 생물학자는 이론을 세우고 현장 실험에 나서 본 문제에 알맞는 해결책을 찾을 수 있다.\n\n생물학자가 연구 도중에 사망한다면 기생충 박멸 연구는 중단되지만, 새로운 생물학자가 위촉되는 즉시 연구가 재개된다."
 je_theiler_cochliomyia_eredication_success: "[concept_theiler_biologist]가 나선벌레 박멸 수단 연구에 #ORANGE 12개월#!의 시간을 보냄"
 je_theiler_cochliomyia_eredication_goal: ""
 theiler.21.t: "불임충방사법"
 theiler.21.d: "[SCOPE.sCharacter('theiler_biologist_scope').GetLastName] 박사가 독특하지만 획기적인 방안을 내놓았다. 기생충을 살충제로 박멸하지 말고, 암컷 번식이 불가능하도록 불임 상태의 수컷을 만들어내는 것이 유망한 수단이라는 의견이다."
 theiler.21.f: "불임충방사법 (SIT)은 1950년대 레이먼드 C. 부시랜드와 에드워드 F. 니플링이 개발하였다. 수컷 파리를 감마선, 주로 코발트-60이나 세슘-137로 불임으로 만든다. 고에너지 방사선이 생식 세포의 DNA를 파괴하지만, 곤충의 생명이나 짝짓기 능력에는 큰 영향을 미치지 않는다. 불임 처리된 수컷 파리는 대량으로 방사된다. 이들은 야생 암컷과 짝짓기에 계속 나서지만, 생식 능력이 있는 자손을 낳지 못하기 때문에 개체수가 점차 감소한다. 이 기술은 특히 아메리카 대륙의 나사벌레 방제에 효과적이었으며, 북중미 지역에서 해충 박멸이란 성과를 거두면서 경제적, 수의학적으로 막대한 피해를 방지할 수 있었다."
 theiler.21.g: "말 그대로 핵으로 날려버린다 이거지?"
 theiler.22.t: "[SCOPE.sState('theiler_state_scope').GetName]의 나선벌레 박멸"
 theiler.22.d: "[SCOPE.sCharacter('theiler_biologist_scope').GetLastName] 박사가 또 다른 지역의 신대륙나선벌레파리를 박멸했다고 전해 왔다."
 theiler.22.g: "벌레들을 쓸어버리세!"
 theiler_cochliomyia_experiment_lab_modifier: "나선벌레 실험실"
 je_theiler_sti: "불임충방사법"
 je_theiler_sti_reason: "[SCOPE.sCharacter('theiler_biologist_scope').GetLastName] 박사가 최신 기술을 활용하여 특정 지역 내 나선벌레파리를 박멸하고자 노력하고 있다."
 je_theiler_sti_success: "[concept_theiler_biologist]가 나선벌레 박멸에 #ORANGE 36개월#!의 시간을 보냄"
 je_theiler_sti_goal: ""
 je_theiler_cydia_pesticide: "나방 살충제"
 je_theiler_cydia_pesticide_reason: "살충제에 대한 기본 지식을 갖춘 생물학자는 화학자와의 협업으로 사과굴나방에 효과적인 방제법을 찾아낼 수 있다.\n\n생물학자나 화학자가 연구 도중에 사망한다면 살충제 연구는 중단되지만, 두 학자가 다시 위촉되는 즉시 연구가 재개된다."
 je_theiler_cydia_pesticide_success: "[concept_theiler_biologist]가 신형 살충제 개발에 #ORANGE 12개월#!의 시간을 보냄"
 je_theiler_cydia_pesticide_goal: ""
 je_theiler_lead_arsenate: "비산납"
 je_theiler_lead_arsenate_reason: "국내 시장에 납 공급 부족 사태가 발생하지 않는다는 가정 하에, 우리 과수 재배 농가들은 새로 개발된 비산납을 이용해 사과굴나방을 비롯한 해충을 방제할 수 있을 것이다. 매달 일정 수준으로 해충 박멸에 나설 수 있을 것으로 전망된다."
 theiler.31.t: "비산납"
 theiler.31.d: "[SCOPE.sCharacter('mendelejew_chemist_scope').GetLastName] 박사와 [SCOPE.sCharacter('theiler_biologist_scope').GetLastName] 박사가 공동 개발한 이 효과적인 살충제가 대량 생산에 들어간다면 농업에 혁신을 불러올 것이다. 이제 사과굴나방이 사과를 먹어치우는 것도 마지막이 된 것이다!"
 theiler.31.f: "비산납 (PbHAsO₄)은 1892년 미국 매사추세츠주의 멜빌 서스턴 쿡이 사과굴나방(학명 Cydia pomonella)의 방제를 위해 개발하였다. 독성이 강한 비산구리(패리스 그린)보다 안정적이고 식물에 해를 끼치지 않는 대체제였다. 비산납 분말을 잎과 과일에 뿌리면 그것을 갉아먹는 곤충을 죽이는 한편으로 오랫동안 겉에 부착되어 과일 생산업에 있어 효과적인 방제를 실현시켰다. 비산납은 환경과 인체 건강에 해롭다는 단점에도 불구하고 DDT 등의 합성살충제가 도입될 때까지 널리 활용되었다."
 theiler.31.g: "말 그대로 독살시킨다는 거군?"
 theiler.31.tt: "이제 농가에서 비산납을 과수원에 뿌리게 되면서 나방 해충 변화요인이 제거됩니다."
 theiler.32.t: "사과굴나방의 [SCOPE.sState('theiler_state_scope').GetName] 전파!"
 theiler.32.d: "사과굴나방이 서식 범위를 늘려나가고 있다. 인접 지역에서 [SCOPE.sState('theiler_state_scope').GetName]에 퍼져 그 지역의 과수원에 들끓고 있는 상황이다."
 theiler.32.f: "사과굴나방(학명: Cydia pomonella)은 유라시아 지역에서 기원하여 19세기 들어 사과 재배와 함께 중앙유럽, 북이탈리아, 발칸 반도, 헝가리, 러시아 우랄 산맥 서부 지역, 북미와 호주 지역으로 전파되었다. 북유럽 국가와 매우 덥거나 건조한 지역은 큰 피해를 입지 않았다. 20세기에는 스칸디나비아와 발트 국가, 남아메리카까지 전세계에서 사과가 재배되는 온화한 지역이라면 전부 퍼져 나가면서, 과수원에 가장 심각한 피해를 끼치는 해충으로 꼽히게 되었다. "
 theiler.32.g: "보아하니 과일 값이 오르겠구만."
 theiler.33.t: "사과굴나방의 남아메리카 전파!"
 theiler.33.d: "오늘 박물학자와 생물학자들이 발표한 보고서는 농부와 상인 모두를 불안하게 만들었다. 원래 서식지가 유럽과 서아시아였던 악명 높은 사과굴나방이 우리 과수원에서 처음으로 발견된 것이다. 이는 남아메리카 지역에서 처음으로 발견된 사례로 남게 되었다!"
 theiler.33.g: "내가 상상하던 국제무역의 이점은 이런 게 아니었는데..."
 theiler.34.t: "사과굴나방의 남아프리카 전파!"
 theiler.34.d: "오늘 박물학자와 생물학자들이 발표한 보고서는 농부와 상인 모두를 불안하게 만들었다. 원래 서식지가 유럽과 서아시아였던 악명 높은 사과굴나방이 우리 과수원에서 처음으로 발견된 것이다. 이는 남아프리카 지역에서 처음으로 발견된 사례로 남게 되었다!"
 theiler.35.t: "사과굴나방의 오세아니아 전파!"
 theiler.35.d: "오늘 박물학자와 생물학자들이 발표한 보고서는 농부와 상인 모두를 불안하게 만들었다. 원래 서식지가 유럽과 서아시아였던 악명 높은 사과굴나방이 우리 과수원에서 처음으로 발견된 것이다. 이는 오세아니아 지역에서 처음으로 발견된 사례로 남게 되었다!"
 theiler.41.t: "[AddLocalizationIf( Scope.Var('theiler_physician_demand_var').IsSet , Scope.Var('theiler_physician_demand_var').GetFlagName)]"
 theiler.41.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName] 박사는 #V [AddLocalizationIf( Scope.Var('theiler_physician_demand_var').IsSet , Scope.Var('theiler_physician_demand_var').GetFlagName)]#!의 활용을 통해 치료에 나선 결과 치료 효과가 뛰어난 잠재력을 갖추고 있다는 사실을 밝혀냈다. 그러나 이를 위해서는 더욱 많은 양을 입수해야 하며, 활성 성분을 분리하기 위한 철저한 조사가 필요하다. 이것으로 완전히 새로운 약을 개발할 수 있게 될 것이다!"
 theiler.41.g: "그러니까 [AddLocalizationIf( Scope.Var('theiler_physician_demand_var').IsSet , Scope.Var('theiler_physician_demand_var').GetFlagName)](이)가 새로운 기적의 약초라는 건가?"
