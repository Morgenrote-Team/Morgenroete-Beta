 je_theiler_polio_vaccine_success: "[GetPlayer.GetName]에서 #ORANGE 백신 단서 10개#! 이상 확보"
 je_theiler_polio_vaccine_goal: ""
 theiler.101.t: "콜레라균 (비브리오 콜레라이)"
 theiler.101.d: "[ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] 박사가 콜레라 병원체의 식별과 분리에 성공하였다. 이는 효과적인 백신 개발을 착수하는 데 있어 큰 이정표가 될 것이다."
 theiler.101.f: "콜레라균은 1854년 이탈리아 해부학자 필리포 파치니가 처음으로 기술하였으나, 콜레라 발병에서의 역할은 훗날 1884년 로베르트 코흐가 처음으로 확인하였습니다. 콜레라균은 구부러진 막대 모양의 세균으로, 수생 환경, 특히 따뜻한 염수에서 잘 자랍니다. 콜레라균은 그람 음성균 (그람염색 시 시약색을 유지하지 못하는 균)으로서 움직이는 데 필요한 극성 편모를 하나 가지고 있고, 장내 수분 균형을 깨뜨려 심한 설사를 유발하는 콜레라 독소를 분비합니다."
 theiler.101.g: "조만한 것이 까불기는."
 theiler.201.t: "결핵균 (미코박테리움 투베르쿨로시스)"
 theiler.201.d: "[ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] 박사가 결핵 병원체의 식별과 분리에 성공하였다. 이는 효과적인 백신 개발을 착수하는 데 있어 큰 이정표가 될 것이다."
 theiler.201.f: "결핵균은 1882년 로베르트 코흐가 처음 확인하여 1905년 노벨상 수상을 안겼습니다. 천천히 자라는 막대 모양의 유기체로, 미콜산이 풍부한 밀랍형 세포벽을 가지고 있어 통상적인 그람염색과 여러 항생제에 내성을 보입니다. 때문에 '항산성 세균'으로 분류됩니다. 이 병원은 편성호기성(생존에 산소가 필요한 세균)으로서 주로 폐를 감염시키지만 다른 장기로 퍼질 수도 있습니다."
 theiler.201.g: "너의 시대는 끝났다, 말 없는 스토커여."
 theiler.301.t: "오르토폭스비루스 바리올라이"
 theiler.301.d: "[ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] 박사가 천연두 병원체의 식별과 분리에 성공하였다. 이는 효과적인 백신 개발을 착수하는 데 있어 큰 이정표가 될 것이다."
 theiler.301.f: "천연두의 원인균인 바리올라 바이러스는 폭스바이러스과(Poxviridae)에 속한다. 대다수 바이러스와는 다르게 오로지 숙주 세포의 세포질에서만 복제가 이루어진다. 바리올라 바이러스는 벽돌 모양의 큼직한 크기를 지니고 있으며 이중가닥 DNA를 갖고 있다. 바리올라는 최초의 성공적인 백신 접종의 대상으로 1796년 에드워드 제너가 처음 도입하였으며, 1980년 백신 접종으로 박멸된 최초의 인간 병원체가 되었다."
 theiler.301.g: "그렇게 조그만 것이 제국을 무너뜨렸단 말인가?"
 theiler.401.t: "리케차 프로바제키"
 theiler.401.d: "[ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] 박사가 발진티푸스 병원체의 식별과 분리에 성공하였다. 이는 효과적인 백신 개발을 착수하는 데 있어 큰 이정표가 될 것이다."
 theiler.401.f: "리케차 프로바제키(Rickettsia Prowazekii)는 1916년 엔히키 다 호샤 리마가 발견하였다. 그 이름은 1915년 발진티푸스로 먼저 세상을 떠난 대학 동료 슈타니슬라우스 폰 프로바체크(Stanislaus von Prowazek)의 이름을 따왔다. 프로바체크와 호샤 리마 모두 독일 콧부스의 포로수용소 병원에서 발진티푸스 원인균을 연구하던 중 발진티푸스에 감염된 적이 있었다. 이 박테리아는 편모가 없고 호기성이다. 세포벽이 크리스탈 바이올렛 그람 염색에 반응하지 않기 때문에 그람 음성균으로 분류된다. 그람 음성균은 일반적으로 페니실린 등의 여러 항생제에 내성을 갖추고 있다."
 theiler.401.g: "작고 음침한 불청객일세!"
 theiler.501.t: "오르토플라비바이러스 플라비"
 theiler.501.d: "[ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] 박사가 황열병 병원체의 식별과 분리에 성공하였다. 이는 효과적인 백신 개발을 착수하는 데 있어 큰 이정표가 될 것이다."
 theiler.501.f: "황열병 바이러스는 1927년 가나의 발병 환자에게서 처음으로 분리되었다. 플라비바이러스과(Flaviviridae)에 속하며 단일 가닥 양성 RNA 유전체를 지니고 있다. 황열병 바이러스는 주로 이집트숲모기(Aedes aegypti)를 비롯한 숲모기속(Aedes) 개체에 의해 전파된다. 감염 시 발열과 근육통, 황달 증세가 나타날 수 있으며, 심한 경우 출혈과 장기부전으로 이어질 수 있다."
 theiler.501.g: "잔혹하기로는 제일이던 자연의 장난이 실체를 드러냈구나."
 theiler.601.t: "홍역 모빌리바이러스"
 theiler.601.d: "[ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] 박사가 홍역 병원체의 식별과 분리에 성공하였다. 이는 효과적인 백신 개발을 착수하는 데 있어 큰 이정표가 될 것이다."
 theiler.601.f: "홍역 바이러스는 파라믹소바이러스과(Paramyxoviridae)의 모르빌리바이러스속(Morbillivirus)에 속한다. 외피를 가지고 있고 단일 가닥 음성 RNA 유전체를 지니고 있다. 호흡기 비말을 통해 감염되며, 인간에게 가장 전염성이 강한 바이러스로 알려져 있다. 홍역은 발열과 기침, 결막염, 특유의 발전을 유발하며, 폐렴이나 뇌염 같은 심각한 합병증으로 이어질 수 있다."
 theiler.601.g: "면역 체계를 공격하는 초소형 테러분자일세."
 theiler.701.t: "연쇄상구균 (스트렙토코쿠스 피오게네스)"
 theiler.701.d: "[ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] 박사가 성홍열 병원체의 식별과 분리에 성공하였다. 이는 효과적인 백신 개발을 착수하는 데 있어 큰 이정표가 될 것이다."
 theiler.701.f: "스트렙토코쿠스 피오게네스(Streptococcus pyogenes)균은 사슬 모양으로 배열된 그람 양성 구균이다. A군 베타 용혈성 연쇄상구균으로 분류되며 19세기 성홍열의 원인으로 처음 지목되었다. 이 균의 독성은 발진을 유발하는 발적독(發赤毒)을 비롯하여 외독소 분비에서 생겨난다. 또한 인후염, 농가진, 류머티즘열도 유발한다."
 theiler.701.g: "정말이지 조그맣고 얄미운 악동일세..."
 theiler.801.t: "페스트균 (예르시니아 페스티스)"
 theiler.801.d: "[ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] 박사가 페스트 병원체의 식별과 분리에 성공하였다. 이는 효과적인 백신 개발을 착수하는 데 있어 큰 이정표가 될 것이다."
 theiler.801.f: "예르시니아 페스티스 (Yersinia pestis)는 1894년 홍콩 발병 당시 알렉상드르 예르신이 처음 발견하였다. 그람 음성의 비운동성 구상간균이며, 감염된 설치류, 특히 곰쥐를 흡혈하는 벼룩을 통해 감염이 이루어진다. 림프절 페스트, 패혈증 페스트, 폐렴 페스트의 세가지 형태로 페스트를 유발한다. 치료하지 않으면 사망률은 극도로 높아진다."
 theiler.801.g: "그럼 현미경으로 그 사신이 보인다는 거군?"
 theiler.901.t: "디프테리아균 (코리네박테리움 디프테리아이)"
 theiler.901.d: "[ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] 박사가 디프테리아 병원체의 식별과 분리에 성공하였다. 이는 효과적인 백신 개발을 착수하는 데 있어 큰 이정표가 될 것이다."
 theiler.901.f: "디프테리아균(Corynebacterium diphtheriae)은 곤봉 모양의 그람 음성 균으로, 1883년 에드윈 클레브스가 디프테리아의 원인균으로 처음 확인하고, 이듬해 프리드리히 뢰플러가 배양에 성공하였다. 호기성에 비운동성의 특성을 지니고 있으며, 박테리오파지가 생성하는 디프테리아 독소는 심장과 신경조직을 손상시킨다는 점에서 가장 위험한 특성으로 꼽힌다. 디프테리아는 한때 아동 사망의 대표적인 원인이었으나 오늘날 백신 접종으로 통제되고 있다."
 theiler.901.g: "겉보기엔 별거 없지만 지독하게도 잔인하지."
 theiler.1001.t: "폴리오바이러스"
 theiler.1001.d: "[ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] 박사가 소아마비 병원체의 식별과 분리에 성공하였다. 이는 효과적인 백신 개발을 착수하는 데 있어 큰 이정표가 될 것이다."
 theiler.1001.f: "소아마비 파이러스는 피코르나바이러스과(Picornaviridae)에 속하며, 1909년에 처음 분리되었다. 크기가 작고 외피가 없으며 단일 가닥의 양성 RNA 유전체를 지니고 있다. 이 바이러스는 주로 분변-구강 경로를 통해 전파되며 척수의 운동신경 세포를 공격하여 간혹 영구적인 마비를 유발한다. 전세계적인 백신 접종 캠페인으로 소아마비 바이러스는 현재 박멸에 근접한 수준에 이르렀다."
 theiler.1001.g: "눈에 보이지도 않는 것이 그렇게나 많은 사람을 망가뜨릴 줄이야?"
 theiler.102.t: "콜레라 백신"
 theiler.102.d: "수없이 많은 실험과 좌절, 시험을 거친 [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] 박사가 돌파구를 이룩하였다. 콜레라를 이기는 백신이 한낱 꿈에서 벗어나 현실이 된 것이다. 의학계와 생물학계의 혁명이 벌어졌다!"
 theiler.102.f: "The first cholera vaccine was developed in 1885 by Spanish physician Jaime Ferrán, who used live attenuated Vibrio cholerae strains. His field trials during an outbreak in Valencia marked one of the earliest mass immunizations against a bacterial disease. Later vaccines shifted to killed whole-cell preparations and eventually to modern oral formulations combining killed bacteria with the recombinant B subunit of cholera toxin."
 theiler.102.g: "Science fights back."
 theiler.202.t: "결핵 백신"
 theiler.202.d: "수없이 많은 실험과 좌절, 시험을 거친 [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] 박사가 돌파구를 이룩하였다. 결핵을 이기는 백신이 한낱 꿈에서 벗어나 현실이 된 것이다. 의학계와 생물학계의 혁명이 벌어졌다!"
 theiler.202.f: "The Bacillus Calmette-Guérin (BCG) vaccine was introduced in 1921 by French scientists Albert Calmette and Camille Guérin. It is based on a live, attenuated strain of Mycobacterium bovis, a relative of M. tuberculosis. The vaccine provides variable protection against pulmonary TB but is highly effective in preventing severe childhood forms such as miliary TB and tuberculous meningitis."
 theiler.202.g: "A spark of defense against the silent stalker."
 theiler.402.t: "발진티푸스 백신"
 theiler.402.d: "수없이 많은 실험과 좌절, 시험을 거친 [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] 박사가 돌파구를 이룩하였다. 발진티푸스를 이기는 백신이 한낱 꿈에서 벗어나 현실이 된 것이다. 의학계와 생물학계의 혁명이 벌어졌다!"
 theiler.402.f: "The first effective typhus vaccine was developed in the 1930s by Polish biologist Rudolf Weigl. He cultivated Rickettsia prowazekii inside the intestines of lice and used inactivated bacteria for immunization. During World War II, his laboratory in Lwów secretly used vaccine production to shelter and employ people at risk of Nazi persecution. Modern vaccines for epidemic typhus are rarely used today."
 theiler.402.g: "We outsmarted the hitchhiker."
 theiler.502.t: "황열병 백신"
 theiler.502.d: "수없이 많은 실험과 좌절, 시험을 거친 [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] 박사가 돌파구를 이룩하였다. 황열병을 이기는 백신이 한낱 꿈에서 벗어나 현실이 된 것이다. 의학계와 생물학계의 혁명이 벌어졌다!"
 theiler.502.f: "The yellow fever vaccine was developed in the 1930s by South African virologist Max Theiler, who later received the Nobel Prize in 1951. He attenuated the virus by serially passing it in chicken embryos, producing the 17D strain. This live, attenuated vaccine remains one of the most effective vaccines ever created, conferring long-lasting immunity after a single dose."
 theiler.502.g: "A blow against the mosquito's disease."
 theiler.602.t: "홍역 백신"
 theiler.602.d: "수없이 많은 실험과 좌절, 시험을 거친 [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] 박사가 돌파구를 이룩하였다. 홍역을 이기는 백신이 한낱 꿈에서 벗어나 현실이 된 것이다. 의학계와 생물학계의 혁명이 벌어졌다!"
 theiler.602.f: "The measles vaccine was licensed in 1963, developed by John Enders and colleagues after they successfully grew the virus in chick embryo cells. The live, attenuated vaccine dramatically reduced measles deaths worldwide. Later, it was combined with vaccines against mumps and rubella to form the MMR vaccine, which remains a cornerstone of routine childhood immunization."
 theiler.602.g: "The tiny monster met its match."
 theiler.802.t: "페스트 백신"
 theiler.802.d: "수없이 많은 실험과 좌절, 시험을 거친 [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] 박사가 돌파구를 이룩하였다. 페스트를 이기는 백신이 한낱 꿈에서 벗어나 현실이 된 것이다. 의학계와 생물학계의 혁명이 벌어졌다!"
 theiler.802.f: "The first plague vaccine was introduced in 1897 by Waldemar Haffkine, who worked in Bombay during an epidemic. He used heat-killed Yersinia pestis bacteria to prepare an injectable vaccine. While it reduced mortality, protection was limited and short-lived. More recent research focuses on subunit vaccines targeting F1 and V antigens of the bacterium."
 theiler.802.g: "The reaper's final hour has come!"
 theiler.902.t: "디프테리아 백신"
 theiler.902.d: "수없이 많은 실험과 좌절, 시험을 거친 [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] 박사가 돌파구를 이룩하였다. 디프테리아를 이기는 백신이 한낱 꿈에서 벗어나 현실이 된 것이다. 의학계와 생물학계의 혁명이 벌어졌다!"
 theiler.902.f: "The diphtheria toxoid vaccine was developed in the 1920s after Gaston Ramon in France and Alexander Glenny in England discovered that formaldehyde-treated diphtheria toxin could induce immunity without causing disease. The vaccine, often combined with tetanus and pertussis antigens (the DTP vaccine), drastically reduced childhood mortality in the mid-20th century."
 theiler.902.g: "The wheezing in the night is over."
 theiler.1002.t: "소아마비 백신"
 theiler.1002.d: "수없이 많은 실험과 좌절, 시험을 거친 [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] 박사가 돌파구를 이룩하였다. 소아마비를 이기는 백신이 한낱 꿈에서 벗어나 현실이 된 것이다. 의학계와 생물학계의 혁명이 벌어졌다!"
 theiler.1002.f: "Two effective polio vaccines were created in the 20th century. Jonas Salk developed the inactivated polio vaccine (IPV) in 1955, using chemically killed polioviruses. A few years later, Albert Sabin introduced the oral polio vaccine (OPV), based on live attenuated strains, which was easier to administer and provided intestinal immunity. Both vaccines played central roles in the global effort to eliminate polio."
 theiler.1002.g: "No mercy for this murderer of children's dreams!"
 theiler_microbiological_institute_modifier: "미생물학 연구소"
 theiler_microbiological_promotion_modifier: "미생물학 후원"
 theiler_military_vaccine_modifier: "군용 백신"
 theiler_failed_vaccine_experiment_modifier: "백신 실험 실패"
 theiler_vaccine_guinea_pigs_modifier: "백신용 기니피그"
 theiler_vaccine_subsidy_modifier: "백신 보조금"
 theiler.2101.t: "미생물학 연구소"
 theiler.2101.d: "병원체에 대한 집중적인 연구 과정에서 [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] 연구팀의 선도 학자들은 연구를 더욱 효율적으로 발전시키기 위하여 미생물 연구소를 설립하기에 이르렀다."
 theiler.2101.f: "로베르트 코흐는 1876년 탄저병, 1882년 결핵, 1884년 콜레라 등 여러 병원체들을 성공적으로 규명하는 성과를 거두고 1891년 프로이센 정부의 지원을 받아 자신의 연구소를 설립하였습니다. 이 연구소는 질병의 원인으로서 미생물을 체계적이고 제도적으로 연구했던 최초의 연구센터였습니다. 루이 파스퇴르가 1887년 파리에 설립했던 생리화학 연구소 역시 그러한 연구 시설의 성격을 보여준 바 있지만, 공식적으로는 로베르트 코흐 연구소가 근대적 의미를 지닌 최초의 미생물학 연구소로 평가받고 있습니다."
 theiler.2101.g: "연구소는 통상적인 연구에 전념해야 한다."
 theiler.2101.h: "연구소는 병원체 연구에 전념해야 한다."
 theiler.2102.t: "실험실 연구 방법 개선"
 theiler.2102.d: "Dr. [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] modernized the microbiology laboratory's equipment and introduced new stains and improved microscopes, leading to a breakthrough in pathogen research."
 theiler.2102.f: "Since the 1860s, synthetic aniline dyes revolutionized microbiology. Methylene blue, fuchsin, and later Gram (1884) and Ziehl-Neelsen stains enabled the differentiation of bacteria for the first time. Around 1900, special stains for spores, capsules, and diphtheria bacilli were added; from 1920 onward, Giemsa and silver stains became widespread, and the first fluorescence methods appeared in the 1940s."
 theiler.2102.g: "Good."
 theiler.2103.t: "International Cooperation"
 theiler.2103.d: "Dr. [SCOPE.sCharacter('theiler_biologist_scopet').GetLastName] from [SCOPE.sCountry('theiler_country_scope').GetName] wrote a letter. The biologist, a friend of Dr. [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName]'s, provided some clues to [ROOT.Var('theiler_biologist_var').GetCharacter.GetHerHis] pathogen research."
 theiler.2103.f: "From 1885 onward, the Japanese physician Shibasaburo Kitasato worked at Robert Koch's Berlin Institute. Under Koch's guidance, he achieved the first pure culture of the tetanus pathogen in 1889, a milestone in bacteriology. Together, they laid the foundations for serum therapy, which was later used to treat tetanus and diphtheria. Their collaboration is considered an early example of successful international research."
 theiler.2103.g: "This will accelerate pathogen research."
 theiler.2103.h: "This knowledge gives us further insights."
 theiler.2104.t: "Laboratory Accident"
 theiler.2104.d: "During the search for the pathogen, a serious incident occurred - due to lax safety precautions, it infected our researchers. Numerous employees have to be quarantined, and scientific operations could be disrupted for months."
 theiler.2104.f: "Working with pathogens was extremely risky. Numerous microbiologists became infected during their research: Robert Koch contracted anthrax and tuberculosis repeatedly, Emil von Behring was infected during diphtheria toxin experiments, and Max von Pettenkofer ingested cholera bacteria to test his theory. Protective measures were rudimentary, resulting in many researchers suffering from mild to severe infections. These experiences later contributed to the development of modern laboratory safety standards."
 theiler.2104.g: "A disaster!"
 theiler.2104.h: "We must reorganize the laboratory at all costs!"
 theiler.2105.t: "Contamined Samples"
 theiler.2105.d: "As it turns out, some of the samples Doctor [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName]'s scientific team was working with were contaminated, unfortunately setting back the search for the pathogen."
 theiler.2105.f: "Work on anthrax, tuberculosis, or diphtheria was often contaminated by mold, other bacteria, or impure serum samples. Pasteur's early vaccine experiments also suffered from this. Such contamination led to erroneous conclusions about pathogens and significantly advanced the development of pure culture techniques, sterilization, and aseptic procedures. Cell culture research makes such an incident less likely."
 theiler.2105.g: "Which scientist was responsible for this?"
 theiler.2106.t: "Researchers' Dispute"
 theiler.2106.d: "A high-level scientific dispute has erupted over the search for pathogens. Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], one of our country's leading physicians, has criticized Dr. [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName]'s previous discoveries in an exchange with him. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] claims that the biologist is on the completely wrong track. [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName], on the other hand, claims that the doctor has no idea about the subject at all."
 theiler.2106.f: "'Your experiments stink worse than a Petri dish after two weeks!'\n'And you diagnose diseases with the certainty of a coin toss!'\n'Please, I save lives while you pet bacteria like pets!'\n'Ha! Better pets than patients who swallow your pills in a panic!'\nMicroscope marauder!'\n'Stethoscope sodomist!'"
 theiler.2106.g: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] is right."
 theiler.2106.h: "Dr. [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] is right."
 theiler.2106.i: "They should research, not argue!"
 theiler.2107.t: "Research Assistants"
 theiler.2107.d: "Our biologist Dr. [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] has proposed withdrawing some students and assistants from academia and sending them to the laboratory to support [ROOT.Var('theiler_biologist_var').GetCharacter.GetHerHis] research."
 theiler.2107.f: "'We could ruin their careers, but hey, it's in the name of SCIENCE!'"
 theiler.2107.g: "Hire additional assistants."
 theiler.2107.h: "Young academics are needed elsewhere."
 theiler.2111.t: "Military Vaccine Use"
 theiler.2111.d: "The vaccine Dr. [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] is working on has achieved significant success. The military is already showing great interest in it as a way to ensure the health of its soldiers and reduce casualties in the next war."
 theiler.2111.f: "Vaccinations provided decisive advantages in war: British troops in India used smallpox variolation and vaccination, which protected them against epidemics. Similarly, yellow fever vaccination in tropical zones in the early 20th century reduced casualties due to epidemics. Vaccinated soldiers remained fit for duty, while unvaccinated troops were weakened by disease—vaccines thus acted like strategic weapons."
 theiler.2111.g: "The military has priority for vaccination."
 theiler.2111.h: "Use the knowledge from this field study to improve the vaccine."
 theiler.2112.t: "Lucky Find"
 theiler.2112.d: "An assistant unexpectedly discovered a sample in a waste jar containing a surprisingly effective preparation."
 theiler.2112.f: "Louis Pasteur discovered that an 'old' bacterial culture of chicken cholera did not make chickens sick. This coincidence led to the development of an attenuated vaccine that provided protection. Jonas Salk exploited the discovery that polio viruses could grow in cell cultures and be inactivated simultaneously. This led to the creation of the first safe polio vaccine. Alexander Fleming accidentally noticed that mold killed bacteria, which led to the discovery of penicillin."
 theiler.2112.g: "Reward the assistant."
 theiler.2113.t: "Successful Test"
 theiler.2113.d: "An initial trial of the new vaccine has proven unexpectedly effective. Dr. [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] is considering starting mass production and mass vaccination much sooner. This is a happy day for vaccinology!"
 theiler.2113.f: "An outstanding example of a successful vaccine pilot trial is the cholera and plague vaccine developed by Waldemar Haffkine at the end of the 19th century. Haffkine, a Russian-Jewish microbiologist, conducted the first clinical trials of a cholera vaccine in India in 1892, which was later used on a large scale. In 1897, he developed a vaccine against the plague, which was tested in India in 1898 and led to a drastic reduction in deaths. His work is considered a milestone in modern vaccine development."
 theiler.2113.g: "A major step forward for vaccine development!"
 theiler.2113.h: "These are new clues for medical research."
 theiler.2114.t: "Unintended Side Effects"
 theiler.2114.d: "In [SCOPE.sState('theiler_state_scope').GetCityHubName], Dr. [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName]'s new vaccine has shown drastic side effects. Many of the test subjects became seriously ill, and some even died. The trial has not only shaken public confidence but could also significantly set back vaccine development."
 theiler.2114.f: "In the 1930s, a serious vaccination incident occurred in Lübeck: 251 newborns received a BCG vaccine against tuberculosis that was contaminated with virulent tuberculosis bacteria due to faulty manufacturing. 208 children became ill, and 77 died. The 'Lübecker Impfunglück' (Lübeck Vaccination Incident) triggered a public scandal, delayed the introduction of the BCG vaccine in Germany, and led to the introduction of stricter safety standards in vaccine production."
 theiler.2114.g: "Who could have foreseen this?"
 theiler.2114.h: "Still carry out the experiments in the area."
 theiler.2115.t: "Allegation of Plagiarism"
 theiler.2115.d: "A foreign biologist from [SCOPE.sCountry('theiler_country_scope').GetName] has thoroughly investigated the production of the new vaccine currently being developed by Dr. [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName]. [SCOPE.sCharacter('theiler_biologist_scope').GetSheHe] makes serious allegations: [SCOPE.sCharacter('theiler_biologist_scope').GetSheHe] claims it is a plagiarism of a very similar serum that Dr. [SCOPE.sCharacter('theiler_biologist_scope').GetLastName] intended to patent."
 theiler.2115.f: "Between the 19th and early 20th centuries, the lack of patent protection and international standards led to disputes over authorship in vaccinology. Pasteur claimed credit for the bovine cholera vaccine, even though his collaborator Toussaint had experimented earlier. Later, BCG strains and Haffkine's cholera and plague vaccines sparked controversy. Debates over priority and 'plagiarism' were typical of a time when vaccination methods were highly sensitive and valuable."
 theiler.2115.g: "Apologize."
 theiler.2115.h: "This is mere coincidence."
 theiler.2116.t: "Cost Explosion"
 theiler.2116.d: "It looks like Dr. [SCOPE.sCharacter('theiler_biologist_scope').GetLastName] underestimated the cost of the new vaccine. [SCOPE.sCharacter('theiler_biologist_scope').GetHerHis|U] optimistic estimate could now jeopardize the entire development."
 theiler.2116.f: "'Money? Money?! Filthy lucre! Have you no idea that I'm sacrificing my life for science? After all, this is about the final victory over death! About eradicating a scourge of humanity! And you have the nerve to come to me with lists, tables, and balance sheets? What are you? An accountant? Get out of my lab!'"
 theiler.2116.g: "Subsidizes the new vaccine."
 theiler.2116.h: "Recruit more academics as temporary workers."
 theiler.2116.i: "Deal with it."
 theiler_state_trait_cochliomyia: "신대륙나선벌레"
 theiler_state_trait_cydia: "사과굴나방"
 je_theiler_cochliomyia_eredication: "나선벌레 박멸"
 je_theiler_cochliomyia_eredication_reason: "With the most modern methods available, the eradication of the dangerous New World screwworm fly might be possible, freeing humans and animals from this plague. A biologist can develop a theory and conduct field experiments to find a suitable solution to this problem.\n\nIf the biologist dies during his work, work on eradicating the parasite will be stopped but will continue as soon as a biologist is available again."
 je_theiler_cochliomyia_eredication_success: "A [concept_theiler_biologist] has worked at least #ORANGE 12 months#! to find a method to eredicate cochliomyia."
 je_theiler_cochliomyia_eredication_goal: ""
 theiler.21.t: "Sterile Insect Technique"
 theiler.21.d: "Dr. [SCOPE.sCharacter('theiler_biologist_scope').GetLastName] has developed an unorthodox but groundbreaking idea: instead of destroying the parasites with pesticides, a promising method would be to breed sterile males so that the females cannot produce offspring with them. "
 theiler.21.f: "The Sterile Insect Technique (SIT) was developed in the 1950s by Raymond C. Bushland and Edward F. Knipling. Male flies are sterilized with gamma radiation, usually from cobalt-60 or cesium-137 sources. This high-energy radiation destroys the DNA in the germ cells without significantly affecting the animals' vitality or ability to mate. The sterilized males are then released en masse. Since they continue to mate successfully with wild females but fail to produce viable offspring, the population gradually collapses. The method was particularly successful against the New World screwworm fly, whose eradication in North and Central America prevented massive economic and veterinary damage."
 theiler.21.g: "We literally nuke them?"
 theiler.22.t: "[SCOPE.sState('theiler_state_scope').GetName]의 나선벌레 박멸"
 theiler.22.d: "Dr. [SCOPE.sCharacter('theiler_biologist_scope').GetLastName] reports that the New World screwworm fly has been eradicated in another region."
 theiler.22.g: "Screw the worms!"
 theiler_cochliomyia_experiment_lab_modifier: "나선벌레 실험실"
 je_theiler_sti: "Sterile Insect Technique"
 je_theiler_sti_reason: "Dr. [SCOPE.sCharacter('theiler_biologist_scope').GetLastName] is trying to eradicate the screwworm fly in a region using modern technology."
 je_theiler_sti_success: "A [concept_theiler_biologist] has worked at least #ORANGE 36 months#! on the eradication of cochliomyia."
 je_theiler_sti_goal: ""
 je_theiler_cydia_pesticide: "Cydia Pesticide"
 je_theiler_cydia_pesticide_reason: "With a basic knowledge of insecticides, a biologist, in collaboration with a chemist, can find an effective remedy against the codling moth.\n\nIf the biologist or chemist dies during their work, work on the pesticide will be stopped but will continue as soon as both academics are available again."
 je_theiler_cydia_pesticide_success: "A [concept_theiler_biologist] has worked at least #ORANGE 12 months#! on a new pesticide."
 je_theiler_cydia_pesticide_goal: ""
 je_theiler_lead_arsenate: "Lead Arsenate"
 je_theiler_lead_arsenate_reason: "Our fruit growers can control the codling moth and other pests with the newly invented lead arsenate, assuming there is no lead shortage on the market. It should be possible to bring the parasite under control in a state every month."
 theiler.31.t: "Lead Arsenate"
 theiler.31.d: "In collaboration with Dr. [SCOPE.sCharacter('mendelejew_chemist_scope').GetLastName], Dr. [SCOPE.sCharacter('theiler_biologist_scope').GetLastName] has developed an effective pesticide whose mass production could revolutionize agriculture. The codling moth has finished its last meal in apples!"
 theiler.31.f: "Lead arsenate (PbHAsO₄) was developed in 1892 by Melville Thurston Cook in Massachusetts to control the codling moth (Cydia pomonella) in orchards. It was a more stable, plant-friendly alternative to the toxic copper arsenite ('Paris Green'). The powder killed insects as they fed, adhered to leaves and fruit for a long time, and enabled effective control in commercial fruit production for the first time. Lead arsenate remained widely used until the introduction of synthetic pesticides such as DDT, despite being harmful to the environment and human health."
 theiler.31.g: "We literally poison them?"
 theiler.31.tt: "From now on, farmers will use lead arsenate on their orchards to get rid of the Cydia modifier."
 theiler.32.t: "사과굴나방의 [SCOPE.sState('theiler_state_scope').GetName] 전파!"
 theiler.32.d: "사과굴나방이 서식 범위를 늘려나가고 있다. 인접 지역에서 [SCOPE.sState('theiler_state_scope').GetName]에 퍼져 그 지역의 과수원에 들끓고 있는 상황이다."
 theiler.32.f: "사과굴나방(학명: Cydia pomonella)은 유라시아 지역에서 기원하여 19세기 들어 사과 재배와 함께 중앙유럽, 북이탈리아, 발칸 반도, 헝가리, 러시아 우랄 산맥 서부 지역, 북미와 호주 지역으로 전파되었다. 북유럽 국가와 매우 덥거나 건조한 지역은 큰 피해를 입지 않았다. 20세기에는 스칸디나비아와 발트 국가, 남아메리카까지 전세계에서 사과가 재배되는 온화한 지역이라면 전부 퍼져 나가면서, 과수원에 가장 심각한 피해를 끼치는 해충으로 꼽히게 되었다. "
 theiler.32.g: "보아하니 과일 값이 오르겠구만."
 theiler.33.t: "사과굴나방의 남아메리카 전파!"
 theiler.33.d: "오늘 박물학자와 생물학자들이 발표한 보고서는 농부와 상인 모두를 불안하게 만들었다. 원래 서식지가 유럽과 서아시아였던 악명 높은 사과굴나방이 우리 과수원에서 처음으로 발견된 것이다. 이는 남아메리카 지역에서 처음으로 발견된 사례로 남게 되었다!"
 theiler.33.g: "내가 상상하던 국제무역의 이점은 이런 게 아니었는데..."
 theiler.34.t: "사과굴나방의 남아프리카 전파!"
 theiler.34.d: "오늘 박물학자와 생물학자들이 발표한 보고서는 농부와 상인 모두를 불안하게 만들었다. 원래 서식지가 유럽과 서아시아였던 악명 높은 사과굴나방이 우리 과수원에서 처음으로 발견된 것이다. 이는 남아프리카 지역에서 처음으로 발견된 사례로 남게 되었다!"
 theiler.35.t: "사과굴나방의 오세아니아 전파!"
 theiler.35.d: "오늘 박물학자와 생물학자들이 발표한 보고서는 농부와 상인 모두를 불안하게 만들었다. 원래 서식지가 유럽과 서아시아였던 악명 높은 사과굴나방이 우리 과수원에서 처음으로 발견된 것이다. 이는 오세아니아 지역에서 처음으로 발견된 사례로 남게 되었다!"
 theiler.41.t: "[AddLocalizationIf( Scope.Var('theiler_physician_demand_var').IsSet , Scope.Var('theiler_physician_demand_var').GetFlagName)]"
 theiler.41.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName] 박사는 #V [AddLocalizationIf( Scope.Var('theiler_physician_demand_var').IsSet , Scope.Var('theiler_physician_demand_var').GetFlagName)]#!의 활용을 통해 치료에 나선 결과 치료 효과가 뛰어난 잠재력을 갖추고 있다는 사실을 밝혀냈다. 그러나 이를 위해서는 더욱 많은 양을 입수해야 하며, 활성 성분을 분리하기 위한 철저한 조사가 필요하다. 이것으로 완전히 새로운 약을 개발할 수 있게 될 것이다!"
 theiler.41.g: "그러니까 [AddLocalizationIf( Scope.Var('theiler_physician_demand_var').IsSet , Scope.Var('theiler_physician_demand_var').GetFlagName)](이)가 새로운 기적의 약초라는 건가?"
 theiler_pharmaceutical_strychnine_flag: "마전자나무"
 theiler_pharmaceutical_emetine_flag: "토근"
 theiler_pharmaceutical_atropine_flag: "벨라돈나풀"
 theiler_pharmaceutical_aloin_flag: "알로에 베라"
 theiler_pharmaceutical_digitoxin_flag: "디기탈리스"
 theiler_pharmaceutical_quinine_flag: "기나나무"
 theiler_pharmaceutical_thymol_flag: "타임"
 theiler_pharmaceutical_pilocarpine_flag: "필로카르푸스 펜나티폴리우스"
 theiler_pharmaceutical_ephedrine_flag: "마황"
 theiler_pharmaceutical_strophantine_flag: "스트로판투스 그라투스"
 theiler.41.strychnine: "마전자나무는 인도와 동남아시아에 서식하는 열대나무입니다. 이 나무의 씨앗에는 독성이 상당히 강한 알칼로이드인 스트리크닌과 브루신이 들어 있습니다. 스트리크닌 신경계에 영향을 끼쳐 심각한 근육 경련을 일으키고 사망에 이를 위험성이 존재합니다. 이러한 독성에도 예로부터 소량으로 조절된 추출물을 자극제나 소화기, 신경질환 치료제로 이용하기도 했습니다."
 theiler.41.emetine: "토근은 브라질을 중심으로 남아메리카에 자생하는 열대 식물입니다. 뿌리에는 구토를 유발하고 항기생충 효과를 보이는 알칼로이드의 일종인 에메틴과 세팔린이 함유되어 있습니다. 예로부터 토근 뿌리는 중독 치료를 위한 구토제와 기침 시럽약의 거담제로 쓰였습니다."
 theiler.41.atropine: "벨라돈나풀은 독말풀이라고도 알려져 있으며 유럽, 북아프리카, 서아시아에서 자생하는 여러해살이풀입니다. 아트로핀, 스코폴라민, 히오시아민 등의 독성 알칼로이드가 함유되어 있으며, 아세틸콜린 수용체를 차단하여 신경계를 보호하는 효과를 지니고 있습니다. 예로부터 진정제, 진통제, 동공확장제로 사용되었습니다. 현대 의학에서는 정제된 아트로핀이 안과에서 사용되며 서맥이나 유기인산염 중독 지료에 쓰입니다."
 theiler.41.aloin: "알로에 베라는 북아프리카와 아라비아 반도에서 자생하는 다육식물입니다. 두꺼운 잎 속에는 다당류, 비타민, 효소가 풍부한 젤이 들어 있는데 진정과 보습 효과가 뛰어납니다. 젤은 화장품과 화상, 상처, 피부 극 치료제로 널리 사용됩니다. 잎 안쪽 층에서 추출한 건조 유액에는 강력한 완화 효과를 지닌 알로인이 함유되어 있습니다."
 theiler.41.digitoxin: "디기탈리스는 폭스글로브라고도 부르며 유럽에 자생하는 두해살이 식물입니다. 잎에는 다이곡신과 디기톡신과 같은 강심배당체가 함유되어 있어 심장수축을 강화하고 심장박동을 조절하는 효과를 지닙니다. 예로부터 디기탈리스 추출물은 심부전과 부정맥 치료에 사용되었습니다. 강심배당체를 정제하여 심장 질환 치료에 조심스레 투여되지만, 생 식물은 심각한 중독 위험 때문에 활용이 금지되어 있습니다."
 theiler.41.quinine: "기나나무는 남아메리카, 그 중에서도 안데스 산맥 지역에 자생하는 나무입니다. 나무껍질에 퀴닌과 기타 알칼로이드 성분이 함유되어 있는데 강력한 항말라리아 효능을 지니고 있습니다. 예로부터 기나나무 껍질은 열병과 말라리아 치료에 사용되었습니다. 오늘날까지도 퀴닌과 그 유도체는 말라리아 치료에 중요한 약으로 남아 있습니다. 기나나무는 열대 지역에서도 약용 나무껍질 수화을 위해 재배되고 있습니다."
 theiler.41.thymol: "선백리향이라고도 불리는 타임 (Thymus vulgaris)은 지중해에 자생하는 조그마한 다년생 허브입니다. 잎과 기름에는 티몰과 카르바크롤, 그리고 기타 향균, 항산화, 항염증 효과가 있는 에센셜 오일이 함유되어 있습니다. 예로부터 타임은 호흡기 감염, 기침, 소화장애 치료에 사용되어 왔습니다. 약초학과 아로마테라피, 식품의 천연 방부제 및 향미제로도 널리 사용되고 있습니다."
 theiler.41.pilocarpine: "필로카르푸스 페나티폴리우스(Pilocarpus pennatifolius)는 브라질에 자생하는 열대 관목입니다. 잎에는 침샘과 땀샘을 자극하는 알칼로이드의 일종인 필로카르핀이 함유되어 있습니다. 예로부터 구강건조증과 안구질환 치료에 사용되었습니다. 현대 의학에서는 안압을 낮춰 녹내장을 다스리고 방사능이나 약물로 인한 구강건조증(제로스토미아)을 치료하는 데 사용됩니다. 식물 자체는 약리학적으로 활성화된 알칼로이드 성분에 주로 가치를 두는 편입니다. "
 theiler.41.ephedrine: "마황은 에페드라 시니카(Ephedra sinica)라는 학명을 갖고 있으며 중국과 중앙아시아에 자생하는 관목입니다. 잎에는 침샘과 땀샘을 자극하는 알칼로이드의 일종인 필로카르핀이 함유되어 있습니다. 한의학에서는 천식, 기관지염, 코막힘 치료에 쓰였습니다. 그러나 지금은 고혈압, 심장질환, 기타 부작용의 위험으로 사용이 제한되고 있습니다."
 theiler.41.strophantine: "스트로판투스 그라투스 (Strophanthus gratus)는 서아프리카에 자생하는 덩굴 식물입니다. 식물의 씨앗에는 심장수축에 큰 영향을 끼치는 우아바인 등의 강심배당체가 함유되어 있습니다. 예로부터 이 식물의 추출물은 화살독으로 사용되었으며 심부전 치료에 소량을 사용하기도 했습니다. 우아바인은 심부전과 부정맥 수술에 활용하려는 연구가 이뤄져 왔습니다."
