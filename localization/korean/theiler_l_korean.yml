 theiler_cell_culture_tech: "세포 배양"
 theiler_cell_culture_tech_desc: "세포 배양은 동식물의 세포를 생체 외부의 배양기에서 기르는 것을 의미합니다. 1885년 빌헬룸 루가 닭의 배아 세포를 생리식염수에 담가 며칠 동안 배양하는 데 성공하며 세포 배양의 기본 원리를 처음으로 입증했습니다. 1907년 로스 그랜빌 해리슨은 양서류의 척수를 배양하고, 축색돌기가 개별 신경세포의 연장선으로 발달한다는 것을 입증하였습니다. 1913년 에트나 슈타인하르트, 차이 이스라엘리, 로버트 A. 램버트는 기니피그의 각막 조각에 백시니아 바이러스를 배양하는 성과를 거두었습니다."
 theiler.51.t: "병원체 연구"
 theiler.51.d: "[ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] 박사는 인류에게 고통을 주는 위험한 병원체에 대한 새로운 통찰력을 얻기 위하여 한층 더 자세히 들여다보기로 결정했다. 연구 대상은 아직 열려 있는 상태다."
 theiler.51.f: "병원체 연구는 발견과 분리로 나뉘며, 추후 효과적인 백신 개발에 중요한 단계로 작용합니다. 특정 병원체 연구는 해당 질병에 대한 기술서, (세균과 박테리아 구분에 따른) 색지움 현미경 내지는 전자 현미경 사용 여부, 일정 수의 기존 미생물이 필요하며, 무엇보다도 생물학자가 병원체를 구분할 능력을 갖추어야 합니다."
