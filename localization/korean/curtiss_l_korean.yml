 air_reconaissance_desc: "항공기는 적의 위치를 찾고 병력의 동태를 살피는 데 우수한 성능을 갖고 있습니다."
 aircrafts_desc: "항공기는 폭격이나 정찰을 비롯한 여러 임무에 유용합니다."
 curtiss_spent_additional_money_on_airline_company_modifier: "항공사 대규모 투자"
 curtiss_investment_new_aircraft_modifier: "신형 항공기 투자"
