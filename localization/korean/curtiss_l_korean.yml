 je_curtiss_airline_company: "항공사"
 je_curtiss_airline_company_reason: "항공사의 창설은 카리스마 넘치고 야심으로 가득 찬 별난 기업가의 주도로 항공 산업 발전에 특별한 기회를 열어주게 될 것이다."
 je_curtiss_air_combat: "공중전"
 je_curtiss_air_combat_reason: "[concept_curtiss_pilot]는 항공 지원을 받는 부대가 하나 이상이라는 전제 하에 최전선에서 벌어지는 작전에 투입될 수 있으며, 본인의 특성에 따라 부대의 공격력을 강화시켜 줍니다. 전선의 작전에 투입된 비행사는 매달 경험치 10을 획득합니다. 이 기간 동안 위험한 결과가 뒤따르는 추가 이벤트가 발생할 수 있습니다. 임관 후 비행사는 최소 6개월 동안 전선에 머물러야 하며, 그 이후에 복귀가 가능합니다. 부상당한 비행사는 경험치를 획득할 수 없습니다."
