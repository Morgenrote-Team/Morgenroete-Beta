 curtiss_tourist_tax_modifier: "관광객 세금"
 airspace_convention_proposal_third_party_accepted_name: "$airspace_convention_proposal_accepted_name$"
 airspace_convention_proposal_third_party_accepted_desc: "[TARGET_COUNTRY.GetName]에서 항공 협약을 맺자는 [INITIATOR_COUNTRY.GetAdjective]의 제안을 수락하였습니다."
 airspace_convention_proposal_third_party_declined_name: "$airspace_convention_proposal_declined_name$"
 airspace_convention_proposal_third_party_declined_desc: "[TARGET_COUNTRY.GetName]에서 항공 협약을 맺자는 [INITIATOR_COUNTRY.GetAdjective]의 제안을 거부하였습니다."
 curtiss_air_war_doctrin_tech: "공중전 교리"
 curtiss_air_war_doctrin_tech_desc: "\"폭격기는 항상 돌파한다!\". 이탈리아 장군 줄리오 두에트가 남긴 것으로 알려져 있는 이 말은 1932년 스탠리 볼드윈 영국 총리가 의회에서 인용하면서 유명해졌습니다. 이 말은 현대 공중전에 대한 두에트 본인의 획기적인 견해를 잘 보여주고 있습니다. 그는 전략 폭격의 선구자로서 영미권의 공중전 이론에 큰 영향을 끼쳤습니다."
 curtiss_airlines_tech: "항공사"
 curtiss_airlines_tech_desc: "DELAG (Deutsche Luftschiffahrts-Aktiengesellschaft, 독일 비행선 회사)는 세계 최초의 민간 여객 항공사입니다. 1909년에 창립되어 1910년 6월부터 정기 여객 항공 수송을 개시하였습니다. DELAG는 체펠린 사에서 제작한 비행선을 운항하였습니다."
 curtiss.681.t: "고든 베넷 컵"
 curtiss.681.d: "최초의 국제 대규모 열기구 경주를 위한 준비가 한창이다. 전세계의 열기구 조종사들이 장거리 경주에서 각자의 기량을 겨루기 위하여 [ROOT.GetCountry.GetCapital.GetCityHubName]에 모이고 있다. 벌써부터 전설적인 대회라고 불리우는 이 행사는 앞으로도 지속될 전망이다."
 curtiss.681.f: "\"이번 1907년 고든베넷컵에서 비행에 나서기 전까지 어떤 비행에서도 출발이나 비행 중에 이렇게나 많은 축복을 받아본 적이 없었고, 이토록 많은 준비에 나서본 적도 없었습니다. 1906년 9월 파리에서 경주가 끝난 직후, 저는 올해 비행에 참가하고픈 소망이 생겼습니다. 본인을 대표로 선발해 주신 독일 열기구 협회와, 대형 열기구 폼메른 호를 지원해 주신 폰 헤발트 남작과 힐데브란트 대위에게 감사를 표합니다. 그분들 덕분에 올해 우승을 차지할 수 있었습니다.\n\n비행 과정에서 열기구 비행과 환대에 있어 미국에 훌륭한 인상을 받았습니다. 아쉬운 점이 있다면 이 나라가 좀 더 컸더라면 제 열기구를 최대한 멀리 비행시켜 세계 기록을 경신할 수 있었을 텐데 하는 마음 뿐입니다.\" - 오스카 에르프슬뢰"
 curtiss.681.g: "대단해!"
 notification_curtiss_gordon_bennett_cup_notification_name: "[GetPlayer.MakeScope.Var('curtiss_balloonist_var').GetCharacter.GetFullName]의 고든 베넷 컵 우승"
 notification_curtiss_gordon_bennett_cup_notification_desc: "우리 열기구 조종사가 전설적인 고든 베넷 컵에서 우승하여 [concept_academics_experience] #G 25#!를 획득하였습니다. 다음 대회는 2년 뒤 우리나라에서 개최됩니다."
 curtiss_gordon_bennett_cup_modifier: "고든 베넷 컵"
 curtiss.1.t: "비행사의 사망"
 curtiss.1.d: "최신 항공기를 타고 창공을 누비는 데 일생을 바친 우리나라에서 최고로 존경받는 [concept_curtiss_pilot]가 세상을 떠났다. 이제 창공을 계속해서 정복해 나갈 자는 누가 있는가?"
 curtiss.1.g: "엄청난 손해로다!"