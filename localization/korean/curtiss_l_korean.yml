 curtiss.300.t: "전선으로 나아간 비행사"
 curtiss.300.d: "[GetPlayer.MakeScope.Var('curtiss_pilot_var').GetCharacter.GetFullName](이)가 전선에 도착하여 [SCOPE.sCharacter('flying_circus_general').GetFullName] 전투 편대에 합류하였다."
 curtiss.300.f: "공중전은 영웅적이면서도 위험천만한 일입니다. 건강에 이상 없는 비행사만이 경험치를 쌓을 수 있습니다. 전쟁 경험은 어떤 이에게는 긍정적이든 부정적이든 오래도록 남게 됩니다."
 curtiss.300.g: "공중전 지원에 나서도록!"
 curtiss.301.t: "전선에서 복귀한 비행사"
 curtiss.301.d: "[GetPlayer.MakeScope.Var('curtiss_pilot_var').GetCharacter.GetFullName](이)가 전투 작전에서 복귀하여 이제 오롯이 제 활동에 나설 수 있게 되었다."
 curtiss.301.f: "\"우리 스스로에 대한 자신감에 큰 타격이 가해졌다. 바라카를 쓰러뜨릴 수 있게 되면, 나는 어찌해야 같은 운명을 피할 수 있는가? 허나 동시에 예상치 못한 안도감도 찾아왔다. 바라카는 적군의 총에 맞아 쓰러지지 않았다. 사냥꾼으로서 본인의 명성에 금이 가지 않은 것이다. 지크프리트처럼 오로지 배신의 일격만이 바라카를 끝장낼 수 있었던 것이다. 적은 그 최후를 자랑할 수 없었을 터이다. 그리고 그것은 무엇보다 가장 중요했다.\" - 마리오 푸치니"
 curtiss.301.g: "안전히 그리고 무사히. 그것이 내가 바라는 우리 조종사의 모습이오."
 curtiss.321.t: "지옥문"
 curtiss.321.d: "[SCOPE.sCharacter('curtiss_bomber_general').GetFullName] 장군이 폭격기 편대를 이용하여 [SCOPE.sState('curtiss_bomber_state').GetName]의 상당 영토를 폭격하여 기존 기반시설을 크게 파괴하기로 결정을 내렸다. 민간인을 대상으로 한 부수적 피해는 비교적 클 것으로 전망된다."
 curtiss.321.f: "\"내 앞에 창조물은 영원한 것들뿐,\n나는 영원히 지속되리니.\n여기 들어오는 그대, 모든 희망을 버려라!\" - 단테 알리기에리"
 curtiss.321.g: "해당 구역을 완전히 날려 버리시오."
 curtiss.321.h: "전쟁에도 한계는 있는 법."
 curtiss.322.t: "강철 괴수의 위협"
 curtiss.322.d: "비행선은 이번 전쟁에서 무서운 위력을 자랑하는 최신 무기로 평가받고 있다. 우리 군의 비행선에 대한 집중 투자 역시 결실을 맺고 있다. [SCOPE.sCharacter('curtiss_zeppelin_general').GetFullName]의 비행선 편대는 너무나 악명 높은 나머지 적들이 그 이름만 들어도 공포에 떨 정도가 되었다!"
 curtiss.322.f: "비행선 공격으로 인한 피해는 비교적 적은 수준이었지만, 적국의 군대와 민간을 가리지 않고 엄청난 공포와 불안감을 조성하였으며, 전쟁 수행에 필요한 막대한 자원을 묶어두는 결과를 불러일으켰다. 제1차 세계 대전에서 연합군은 약 15,000명의 병력과 평균 25대의 비행선을 보유한 수준에 그쳤는데, 독일군의 비행선에 맞서기 위해 무기와 물자, 병력을 거의 1:33 비율로 투입하여야 했다. 해군처럼 다른 군사 분야에서도 이 같은 방어 전략을 채택하였으나, 비행선의 효율성은 독일 잠수함마저도 따라잡을 수 없을 정도로 우수했다. 그럼에도 비행선 공습은 공격받은 자들의 사기를 영구히 떨어뜨리거나 전쟁 수행 능력을 심각하게 저해하는 데에는 이르지 못했다."
 curtiss.322.g: "이토록 아름다운 것이 어떻게 이렇게 위험할 수가..."
 curtiss.323.t: "타격 입은 사냥감"
 curtiss.323.d: "[GetPlayer.MakeScope.Var('curtiss_pilot_var').GetCharacter.GetFullName]의 편대가 적의 습격을 격퇴하고 막대한 피해를 입혔다. 이제 비행사는 도망치는 적을 추격하여 마무리 짓고자 한다."
 curtiss.323.f: "\"그 때 밀폐된 조종석에서 전투기를 조종하는 것은 불가능하다 여긴 비행사들이 많았다. 그 이유는 적의 냄새를 맡아야 했기 때문이다. 적이 태우는 기름 때문에 냄새만 맡아도 적군을 감지할 수 있었던 것이다.\" - 아돌프 갈란트"
 curtiss.323.g: "계속 쫓아가라!"
 curtiss.323.h: "이건 함정일 수도 있겠어."
 curtiss.324.t: "적 항공기 노획"
 curtiss.324.d: "우리 군이 적의 영토에서 실시한 단기 작전에서 임시 비행장을 점령하고 항공기 몇 대를 노획하는 데 성공하였다."
 curtiss.324.f: ""
 curtiss.324.g: "저들의 항공기를 연구하라!"
 curtiss.325.t: "창공의 결투"
 curtiss.325.d: "지평선 너머로 위험이 드리워졌다. 적국 최고의 악명 높은 비행사 [SCOPE.sCharacter('duel_participant_2').GetFullName](이)가 본인의 편대를 이끌고 아군 진지를 공격하러 온 것이다. [SCOPE.sCharacter('duel_participant_1').GetFullName](은)는 그에 맞서 창공의 영웅으로 등극할 수 있을 것인가?"
 curtiss.325.f: "공중전에서 승리할 확률은 두 비행사의 특성과 경험치에 크게 좌우됩니다."
 curtiss.325.g: "공격하라!"
 curtiss.325.h: "공격에서 물러나라!"
 curtiss.325.i: "허를 찔러라!"
 curtiss.325.tt: "이 선택지는 [GetPlayer.MakeScope.Var('curtiss_pilot_var').GetCharacter.GetFullName]의 #YELLOW 곡예비행 특성#! 덕분에 가능합니다."
 curtiss.326.t: "전시 항공 공학자"
 curtiss.326.d: "우리 항공 공학자가 전선에서 피해를 입은 항공기를 수리하고, 박살난 항공기를 새로운 항공기로 교체하는 임무를 수행하고 있다. 이 과정에서 [GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetLastName](은)는 전선에서의 귀중한 경험을 쌓아가고 있다."
 curtiss.326.f: "\"항공학은 산업도 과학도 아니었다. 기적이었다.\" - 이고르 시코르스키"
 curtiss.326.g: "그야말로 없어선 안 될 인재로군."
 curtiss.327.t: "특수 공중 정찰"
 curtiss.327.d: "우리 조종사가 대담한 기동으로 적진의 상공을 비행하여, 적진의 지형과 기반시설을 촬영해 여러 사진 자료로 남겼다. [GetPlayer.MakeScope.Var('curtiss_pilot_var').GetCharacter.GetFullName]의 정찰 활동은 그 자체로 귀중한 임무로서 아군이 적진을 훨씬 더 빠르게 점령하는 데 보탬이 되엇다."
 curtiss.327.f: "\"처음에는 항공 정찰이 성공할 것으로 믿지 않는 사람들이 많았으나 머지않아 그 생각은 바뀌게 되었다. 비행장은 항상 전장에서 수 킬로미터 떨어진 사령부 인근에 대략 위치해 있다. 출격 명령이 떨어지면 비행장에서 적의 눈높이에서 약 1200m 상공으로 비행하게 된다. 프랑스 보병의 포격이 상당 높이까지 올라가기 때문에 그보다 낮게 비행하는 것은 바람직하지 않다. 필자도 이미 비행 날개에 여러 개의 구멍을 낸 적이 있다. 기상여건이 좋다면 이 고도에서 정찰하기가 정말 쉽다. 아군의 복엽기는 속도가 대략 시간당 110km 수준으로 매우 빨라서 짧은 시간에 상당 거리를 이동할 수 있다. 정찰병은 정찰한 사항을 기록하고, 비행사는 다시 비행장으로 복귀한다. 비행장에서 작성한 보고서는 차량에 실어 총사령부로 전달된다.\" - 1914년 9월 26일자 독일 《디 보허》에 실린 익명 조종사의 투고"
 curtiss.327.g: "아군에 상당히 도움이 되는군."
 curtiss.328.t: "비행사의 부상"
 curtiss.328.d: "지난번 공중전에서 [GetPlayer.MakeScope.Var('curtiss_pilot_var').GetCharacter.GetFullName](이)가 부상을 입는 바람에 임무를 일시 중단하게 되었다. 의료진은 비행사의 부상이 당초 예상보다 심각하다는 진단을 내렸다. 우리 비행사는 당분간 비행에 나설 수 없게 되었다."
 curtiss.328.f: "부상당한 비행사는 비행 임무를 수행할 수 없으며, 그에 따라 공중 격추를 기록할 수도, 경험치를 획득할 수도 없습니다. 부상으로부터 회복하려면 1달에서 3달의 시간이 소요됩니다."
 curtiss.328.g: "그렇다면 몇 주 동안 병원 신세를 져야 한다는 것인가..."
 curtiss.329.t: "비행사 추락!"
 curtiss.329.d: "[GetPlayer.MakeScope.Var('curtiss_pilot_var').GetCharacter.GetFullName](이)가 최근 임무 수행 중에 격추되어 큰 사고를 당하고 말았다. 비상 착륙은 난관이 있었음에도 아군 전선에서 이루어지면서 구조대원들이 비행사를 구조할 수 있었으나, 부상 상태가 심각한 상황인 것으로 알려졌다."
 curtiss.329.f: "중상을 입은 비행사는 운이 좋으면 6개월, 최악의 경우에는 최대 1년 동안 작전 불능 상태가 됩니다. 또한 심각한 전쟁 트라우마가 발병할 가능성도 존재합니다."
 curtiss.329.g: "이런 끔찍한 일이!"
 curtiss.331.t: "전쟁 트라우마"
 curtiss.331.d: "[GetPlayer.MakeScope.Var('curtiss_pilot_var').GetCharacter.GetFullName](이)가 큰 충돌 사고에서 회복하였다. 하지만 남은 것은 몸에 새겨진 흉터만이 아니다. 그 사고가 있은 뒤부터 우리 비행사는 예전 같지 않게 되었다."
 curtiss.331.f: "\"그대는 모든 것을 잃은 세대다.\" - 어니스트 헤밍웨이"
 curtiss.331.g: "걱정이 되는군."
 curtiss.400.t: "에어쇼"
 curtiss.400.d: "진정한 항공기 퍼레이드라면 화려한 편대비행과 기동을 선보이는 에어쇼를 개최하여야 한다. 이런 위험천만한 곡예비행은 우리 군의 항공 역량을 과시하고, 관객들에게 즐거움을 선사한다. [GetPlayer.MakeScope.Var('curtiss_pilot_var').GetCharacter.GetFullName](이)가 한층 더 대담하면서도 장대한 기동에 나서야 할까, 아니면 더욱 신중히 접근하여 표준 비행을 변형하는 수준의 기동에 나서야 할까?"
 curtiss.400.f: "비행사는 환상적인 에어쇼 비행 기동을 선보임으로서 곡예비행사 특성을 획득할 수 있습니다. 그러나 대담한 비행 기동은 실패와 사고로 이어져 목숨을 잃을 수도 있습니다. 이를 방지하려면 비행사에게 충분한 경험치와 전투 조종사, 슈나이더 트로피 베테랑, 용감함이나 수완가 등의 긍정적 특성을 보유해야 합니다. 곡예비행사는 항상 환상적인 기동을 선보이게 됩니다."
 curtiss.400.g: "장대한 기동을 선보인다."
 curtiss.400.h: "일반적인 기동을 선보인다."
 curtiss.411.t: "환상적인 에어쇼"
 curtiss.411.d: "[GetPlayer.MakeScope.Var('curtiss_pilot_var').GetCharacter.GetFullName](이)가 에어쇼에서 숨 막힐 듯 완벽에 가까운 비행 기동을 선보이며 군 장병과 관객 모두를 사로잡았다."
 curtiss.411.g: "환상적이군!"
 curtiss.412.t: "훌륭한 기동"
 curtiss.412.d: "[GetPlayer.MakeScope.Var('curtiss_pilot_var').GetCharacter.GetFullName](이)가 에어쇼에서 상당히 훌륭한 비행 기동을 선보였다. 몇 가지 사소한 부분만 빼면 완벽에 가까웠다."
 curtiss.412.g: "훌륭하군."
 curtiss.413.t: "평범한 기동"
 curtiss.413.d: "에어쇼는 예상 외로 지루한 행사로 끝났다. [GetPlayer.MakeScope.Var('curtiss_pilot_var').GetCharacter.GetFullName](은)는 평소의 기동만으로 사람들을 사로잡지 못했다."
 curtiss.413.g: "그닥 특별할 건 없군..."
 curtiss.414.t: "참사로 끝난 기동"
 curtiss.414.d: "에어쇼가 끔찍한 참사로 바뀌어 버렸다. [GetPlayer.MakeScope.Var('curtiss_pilot_var').GetCharacter.GetFullName](이)가 위험천만한 기동에 나섰다가 비행기 조종 능력을 잃고 추락한 것이다! 여러 관객이 부상을 입었고, 조종사는 안타깝게도 비행 과정에서 목숨을 잃고 말았다. 에어쇼 행사는 즉시 취소되고 말았다."
 curtiss.414.g: "어떻게 이런 참사가!"
 curtiss.411.f: "에어쇼는 비행사들이 자신의 항공기를 몰고 비행 공연에 나서는 야외 행사다. 곡예 비행 같은 화려한 비행 기동과 여건을 비행사들이 직접 선보이는 것이 묘미다. 이러한 기동은 단독이나 편대 비행으로 실시되며, 이를 통해 비행사들의 비행 기술과 항공기 성능을 과시하게 된다. 관객에게 즐거움과 감동을 선사하기 위하여 비행 기동을 재빠르게 이어나가기도 한다. 군용기 조종사들이 선보이는 여러 비행 기동은 군용기 비행 시 흔히 실시되는 기동이기도 하다. 이러한 기동은 비행사들이 공중전 대비를 위해 정기 훈련 시에 훈련하는 기술에 해당된다. 여러 종류의 항공기가 전시되고 비행 공연에 나선 최초의 국제 공개 에어쇼는 1909년 8월 22일부터 29일까지 프랑스 랭스에서 개최된 '샹파뉴 항공 대축제'(Grande Semaine d'Aviation de la Champagne)였다. 같은 해 9월에는 이탈리아 브레시아에서도 에어쇼가 개최되었다. 그 시절 에어쇼 대회와 훈련 과정에서 사고가 잦았으며 때로는 대형 사고로 이어지기도 했다. 이러한 항공기들은 무엇보다도 기체 간 거리가 가깝고, 고도가 낮으며, 비행 속도가 빠르다는 점에서 사고에 노출될 위험이 컸다."
 curtiss.421.t: "곡예비행단"
 curtiss.421.d: "[SCOPE.sCharacter('curtiss_general_scope').GetFullName] 장군은 유능한 지휘관일 뿐만 아니라 우수한 조종 실력으로도 이름나 있다. 장군은 항공기 퍼레이드를 계기로 여러 장교로 편성된 곡예비행단을 결성하여 편대 기동을 선보였다."
 curtiss.421.f: "곡예비행단은 곡예비행 기술을 숙달하여 선보이는 비행사들로 구성된 단체를 말한다. 여러 대의 군용기를 모아 편대라는 단위를 이룬다. 곡예비행단은 공군 소속의 한 편대를 이루는 경우가 많다. 곡예비행의 발상지는 영국이 꼽히는데 1920년대부터 개인과 단체 곡예비행 기술이 완성되었으며, 이 시기 비행장에서 최초의 곡예비행 공개 행사가 개최되어 수많은 관객을 끌어모았다."
 curtiss.421.g: "근사한 비행이로군."
 curtiss.422.t: "항공기 퍼레이드의 시범에 나선 신형 기체"
 curtiss.422.d: "항공기 퍼레이드 개최를 계기로 [SCOPE.sCharacter('gaudi_engineer_scope').GetFullName](이)가 신형 항공기의 시제품을 제작하였다."
 curtiss.422.f: "항공 퍼레이드는 곡예비행을 선보이고 공군의 군사적 잠재력을 과시하는 데서 그치는 것이 아니라, 기술적 성과와 공학계의 업적을 선전하는 자리이기도 했다."
 curtiss.422.g: "항공계의 귀감이로군."
 curtiss.423.t: "[ROOT.GetCountry.GetCapital.GetCityHubName]의 항공기 퍼레이드 개최"
 curtiss.424.t: "[ROOT.GetCountry.GetNameNoFormatting]의 항공기 퍼레이드 개최"
 curtiss.423.d: "[GetPlayer.MakeScope.Var('curtiss_airline_tycoon_var').GetCharacter.GetFullName](이)가 거대 비행기를 타고 항공기 퍼레이드에 등장하여 관객들을 놀라게 했다."
 curtiss.424.d: "항공기 퍼레이드에 나타난 거대 비행선이 관객들의 감탄을 자아냈다. 기술의 발전과 앞으로 이룩할 성과를 향하여 모두가 매혹에 빠졌던 것이다."
 curtiss.423.f: "한 국가의 우월성과 위대함을 사람들에게 각인시키는 데에는 거대 항공기만한 것이 없다."
 curtiss.423.g: "날아봐라, 요 예쁜 것!"
 curtiss.425.t: "대중에 미친 영향"
 curtiss.425.d: "항공기 퍼레이드는 점점 더 많은 국민들에게 놀라운 감정을 일깨우고 있다. 그것은 매혹과 두려움이 섞인 감정이다. 한편으로 항공기는 조국의 장대함과 위력을 보여주지만, 다른 한편으로 그 아름다움 속에 내재된 파괴욕이 자리잡고 있다. 제공권의 장악은 인간 우월성의 한 측면인가?"
 curtiss.425.f: "\"항공은 인간에게 새로운 활동 영역인 창공을 열어주었다. 그리하여 필연적으로 새로운 전장을 만들어낸 것이다. 사람이 두 명이 만나는 곳에는 언제나 갈등이 존재하기 때문이다. 사실 항공은 민간에서 활용되기 훨씬 전부터 전장에서 널리 활용되었다. 세계 대전 발발 당시 아직 초기 단계였던 이 새로운 기술 분야는 군사 발전에 상당한 추진력을 달게 되었다.\" - 줄리오 두에트"
 curtiss.425.g: "어찌 되었든 우리는 강대국이지 않은가."
 curtiss.431.t: "항공기 퍼레이드 폐막"
 curtiss.431.d: "항공기 퍼레이드가 막을 내렸다. 이번 행사는 오랫동안 깊은 인상을 남길 것이며, 군과 민간, 현재와 미래의 비행사들에게 영감을 불어넣고, 나아가 세계 만방에 조국의 위대함을 알릴 것이다."
 curtiss.431.f: "\"조만간 또 에어쇼가 열렸으면 좋겠군!\""
 curtiss.431.g: "정말 감동적인 행사였다."
 curtiss_airplane_speed_record_modifier: "항공기 속력 신기록"
 curtiss_testplane_cost_modifier: "시험기 제작"
 je_curtiss_testplane_build: "시험기 제작"
 je_curtiss_testplane_build_reason: "시험 항공기의 성능은 주로 항공 공학자의 경험치와 연구 기술에 달려 있다. 항공기 성능에 결정적인 영향을 끼치는 기술로는 #O 현대 물리학#!, #O 아크 용접#!, #O 수상기#!, #O 현대 항공#!이 있다. 항공기의 성능을 최대한으로 끌어내려면 #V 활동 중인 비행사#!가 필요하며, 비행사의 경험치 또한 최고 속력에 직접적인 영향을 끼친다."
 je_curtiss_testplane_build_goal: "신형 항공기 제작에 1년의 시간이 소요됨"
 notification_curtiss_speed_record_broken_notification_name: "[SCOPE.sCountry('curtiss_record_breaking_country').GetName]의 우리나라 속도 기록 경신!"
 notification_curtiss_speed_record_broken_notification_desc: "[SCOPE.sCountry('curtiss_record_breaking_country').GetName]의 [SCOPE.sCountry('curtiss_record_breaking_country').MakeScope.GetVariable('curtiss_pilot_var').GetCharacter.GetFullName](이)라는 비행사가 우리나라의 세계 속도 기록을 경신하였습니다. 이번에 세워진 기록은 [GetGlobalVariable('curtiss_airplane_speed_record_global_var').GetValue|V0]km/h입니다."
 curtiss.60.t: "[SCOPE.sCharacter('curtiss_cook_scope').GetFullNameNoFormatting] 앤 손"
 curtiss.60.d: "[SCOPE.sCharacter('curtiss_cook_scope').GetFullName](은)는 우리나라 최초의 여행사를 설립하여 지역 관광 산업의 토대를 마련한 인물로 평가받고 있다. 수입은 미미하지만 이 나라의 매력도가 올라갈수록 더 많은 관광객을 유치할 수 있을 것이다."
 curtiss.60.f: "관광은 우수한 문화를 지닌 국가에 추가 수입을 부여합니다. 고유의 기념 건축물, 박물관과 미술관, 고고학 유적, 예술의 중심지는 물론, 여러 문화 전통이 얼마나 높은가에 따른 요소들이 관광객들에게 매력적인 방문 국가로 만들 수 있습니다. 정치 운동과 경제 활동의 자유를 확대하는 법률 제정 또한 관광 수입을 높입니다. 기반 시설 역시 핵심적인 역할을 하는데 어쨌든 외딴 지역은 도달하기가 어렵기 때문입니다. 무엇보다도 공항을 지으면 관광에 큰 변화를 일으킬 수 있으며 수입 증대 효과도 상당합니다."
 curtiss.60.g: "관광객들이 미술과 문화에 돈을 쓴다라?"
 curtiss.700.t: "시험용 신형 항공기 제작 완료!"
 curtiss.700.d: "우리 공학자 [ROOT.Var('tesla_engineer_var').GetCharacter.GetFullName](이)가 신형 항공기의 시험 제작을 마쳤다. 이 기체의 기술명은 [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_testplane_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_testplane_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_testplane_second_number_name')]이다. [GetPlayer.MakeScope.Var('curtiss_pilot_var').GetCharacter.GetFullName](은)는 해당 기체에 [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_testplane_nick_name')] 호라는 이름을 붙였다."
 curtiss.700.f: "#V 항공기 정보 #!\n\n명칭: [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_testplane_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_testplane_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_testplane_second_number_name')] [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_testplane_nick_name')]\n유형: [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_testplane_type')]\n특성: [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_testplane_plane')]\n재질: [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_testplane_material')]\n엔진: [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_testplane_engine')]\n예상 속력: [ROOT.Var('test_airplane_speed_var').GetValue] km/h"
 curtiss.700.g: "이륙 준비에 나서도록!"
 curtiss.700.h: "이건 너무 위험하다!"
 curtiss.701.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_testplane_nick_name')] 호의 비행"
 curtiss.701.d1: "오늘 이뤄진 비행에서 속도 기록이 #b #n [ROOT.Var('new_airplane_speed_var').GetValue]#!km/h#!에 그쳐 기존 국내 기록인 #b #p [ROOT.Var('curtiss_airplane_speed_record_var').GetValue]#!km/h#!를 경신하지 못했다. 우리나라 항공계에 실망스러운 날로 기록되었다."
 curtiss.701.d2: "[ROOT.Var('curtiss_pilot_var').GetCharacter.GetFullName](이)가 [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_testplane_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_testplane_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_testplane_second_number_name')]호로 국내 속도 신기록을 경신하였다! 이번 속도 기록은 #b #p [ROOT.Var('new_airplane_speed_var').GetValue]#! km/h#!로 종전 국내 기록인 #b #p [ROOT.Var('curtiss_airplane_speed_record_var').GetValue]#!km/h#!를 경신한 것이다. 다만 아쉽게도 현재 세계 기록인 [GetGlobalVariable('curtiss_airplane_speed_record_holder_global_var').GetCountry.GetFlagTextIcon]의 #b #p [GetGlobalVariable('curtiss_airplane_speed_record_global_var').GetValue]#!km/h#!에 미치지는 못했다."
 curtiss.701.d3: "[ROOT.Var('tesla_engineer_var').GetCharacter.GetFullName]의 천재적인 기계공학 실력과 [ROOT.Var('curtiss_pilot_var').GetCharacter.GetFullName]의 뛰어난 비행 기술이 엄청난 성과를 거두었다. [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_testplane_nick_name')] 호가 국내 최고 속도 기록인 #b #p [ROOT.Var('curtiss_airplane_speed_record_var').GetValue] km/h#!를 경신했을 뿐만 아니라 세계 기록인 [GetGlobalVariable('curtiss_airplane_speed_record_holder_global_var').GetCountry.GetFlagTextIcon]의 #b #p [GetGlobalVariable('curtiss_airplane_speed_record_global_var').GetValue]#! km/h마저도 경신한 것이다. 이번 비행으로 세워진 기록은 #b #p [ROOT.Var('new_airplane_speed_var').GetValue]#! km/h#!에 달한다. 이로써 [ROOT.GetCountry.GetName](은)는 항공 분야의 선두 국가로 거듭나게 되었다!"
 curtiss.701.f1: "\"나는 오직 한 가지로만 기억되고 싶다. 그것은 바로 항공 분야에서의 공로다.\" - 하워드 휴즈"
 curtiss.701.f2: "\"불가능한 것을 해내자. 나의 발상을 놓고 거의 모든 사람들이 그저 공상에 지나지 않는다고 말했던 것을 보면 그 이유를 알 수 있다.\" - 하워드 휴즈"
 curtiss.701.f3: "\"설계에 실수가 있다면 내가 그 책임을 져야 한다. 내 스스로 직접 조종할 자신도 없으면서 다른 사람에게 조종을 맡기지는 않을 것이다.\" - 하워드 휴즈"
 curtiss.701.g: "원인이 항공기인가, 비행사인가?"
 curtiss.701.h: "만족스럽긴 하나 이것만으론 충분치 않다."
 curtiss.701.i: "놀랍군! 축하드리오!"
 curtiss.702.t: "참사로 끝나 버린 고속 비행"
 curtiss.702.d: "속도 기록을 경신하려는 시도가 참사로 끝나고 말았다. [ROOT.Var('curtiss_pilot_var').GetCharacter.GetFullName](이)가 고속 비행 과정에서 [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_testplane_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_testplane_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_testplane_second_number_name')] 호의 통제력을 잃고 만 것이다! [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_testplane_nick_name')] 호는 화염 속에 휩싸여 한 남자의 목숨을 거두어갔다. 승무원 전원이 충격에 빠졌다."
 curtiss.702.f: "\"그 이가 무슨 잘못을 했다고. 비행사로서 잘못했을지는 몰라도, 사람으로서 잘못하지는 않았건만.\""
 curtiss.702.g: "안 돼. 안 돼! 어떻게 이럴 수가!"
 alert_curtiss_balloonist_possible_alert_hint: "우리나라가 열기구 조종사를 후원할 수 있습니다. 후원을 위해서는 #V 모르겐뢰테 창#!의 체육 개요 란에 들어가 주십시오."
 alert_curtiss_zeppelin_expedition_possible_alert_hint: "우리나라가 북극점으로 향하는 비행선 탐사대를 파견할 수 있습니다. 파견을 위해서는 #V 모르겐뢰테 창#!의 체육 개요 란에 들어가 주십시오."
 alert_curtiss_schneider_trophy_race_possible_alert_hint: "[concept_curtiss_schneider_trophy] 경기를 개최할 수 있습니다. 경기 개최를 위해서는 #V 모르겐뢰테 창#!의 체육 개요 란에 들어가 주십시오."
 curtiss_add_x_schneider_trophy_point_minus_x_tt: "@curtiss_schneider_point! 슈나이더 트로피 점수 [SCOPE.GetValue('schneider_trophy_point_amount')|0+] 상실"
 curtiss_add_x_schneider_trophy_point_0_tt: "@curtiss_schneider_point! 슈나이더 트로피 점수 0 획득"
 curtiss_add_x_schneider_trophy_point_plus_x_tt: "@curtiss_schneider_point! 슈나이더 트로피 점수 [SCOPE.GetValue('schneider_trophy_point_amount')|0+] 획득"
 curtiss.652.d: "[SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName](이)가 정식으로 첫 비행을 마치고 첫번째 기록을 수립했다."
 curtiss_has_pilot_tt: "#default_text [THIS.GetCountry.GetName]에 [concept_curtiss_pilot]가 있음#!"
 curtiss_has_active_pilot_tt: "#default_text [THIS.GetCountry.GetName]에 분주한 상태가 아닌 [concept_curtiss_pilot]가 있음#!"
 curtiss_has_pilot_ace_tt: "#default_text [THIS.GetCountry.GetName]에서 #V $curtiss_pilot_ace$#! [concept_character_trait]을 지닌 [concept_curtiss_pilot]를 보유함#!"
 curtiss.108.l: "우리 현직 비행사 [SCOPE.sCharacter('curtiss_current_pilot').GetFullName] 씨가 좋겠소."
 curtiss.231.t: "기내에서 식사 제공 개시"
 curtiss.231.d: "새로운 기내 서비스가 첫선을 보였다! 승객들이 처음으로 기내에서 저렴한 가격에 샌드위치를 구매할 수 있게 된 것이다. 이로써 우리 항공사는 세계에서 가장 앞서가는 서비스로 높이 평가받을지도 모른다!"
 curtiss.231.f: "\"기내에 계시는 동안 샌드위치가 제공되는데 어떠십니까?\"\n\"샌드위치라, 그거 좋은걸! 혹시 마실 건 없소?\""
 curtiss.231.g: "적어도 배는 채우겠군!"
 curtiss.231.h: "샌드위치 하나에 얼마를 받는거야?!"
 curtiss_sandwiches_served_modifier: "샌드위치 제공"
