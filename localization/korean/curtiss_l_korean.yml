 curtiss_hide_aviation_decisions: "항공 결단 숨김"
 curtiss_hide_aviation_decisions_desc: "모든 항공과 열기구 관련 결단을 숨김 처리하여 개요를 정리합니다."
 curtiss_show_aviation_decisions: "항공 결단 표시"
 curtiss_show_aviation_decisions_desc: "모든 항공과 열기구 결단을 표시합니다."
 curtiss_arctica_expedition_decision: "비행선 북극 탐사"
 curtiss_arctica_expedition_decision_desc: "'북극 비행선 탐험을 위한 국제 연구 학회', 줄여서 에어로액틱 (Aeroarctic)은 비행선을 극지 연구에 활용하는 것을 목표로 삼은 비정부 과학 기관이었습니다. 이 단체는 비행사이저 훗날 학회 사무총장을 역임하는 월터 브룬스의 주도로 설립되었습니다. 1924년 초대 회장으로 프리티요프 난센이 임명되었습니다. 수년간의 준비 과정 끝에 1931년 에어로액틱은 비행선을 이용한 순수 과학용 극지 탐사에 나서 처음으로 성공을 거두었습니다. LZ 127 그라프 제펠린의 북극 비행을 통해 훑고 지나간 극지방의 지리 환경 지식을 대폭 확대하게 되었습니다. 앞서 1926년에는 움베르토 노빌레가 비행선 '노르게'호를 타고 북극점 상공을 지나갔으며, 이후 '이탈리아'호를 이용해 탐사에 나서기도 했습니다."
 curtiss_hold_schneider_trophy_race_decision: "슈나이더 트로피 경기 개최"
 curtiss_hold_schneider_trophy_race_decision_desc: "지난 경기의 우승국으로서 우리는 이듬해 경기를 개최할 영광을 안게 되었다. 경기에서 세 번 연달아 우승하면 전설적인 슈나이더 트로피를 영원히 간직할 수 있게 된다."
 curtiss_found_pilot_school_decision: "비행학교 창설"
 curtiss_found_pilot_school_decision_desc: "비행학교가 있다면 비행사 특성을 보유한 인물이 무작위로 등장할 확률이 더욱 늘어납니다."
 curtiss_lost_horizon_decision: "실종된 비행사"
 curtiss_lost_horizon_decision_desc: "인도 명예 영사이자 유명 비행사로 활동하던 [GetPlayer.MakeScope.Var('curtiss_conway_var').GetCharacter.GetFullName] 씨가 히말라야 산맥에서 영문도 모른 채 모습을 감췄다. 우리는 티베트에 구조대를 파견해야 한다."
 curtiss_lost_horizon_continue_decision: "실종된 비행사"
 curtiss_lost_horizon_continue_decision_desc: "[GetPlayer.MakeScope.Var('curtiss_conway_var').GetCharacter.GetLastName]의 수색을 계속한다."
 curtiss_lost_horizon_archaeologist_decision: "샹그릴라로 향하는 길"
 curtiss_lost_horizon_archaeologist_decision_desc: "숙련된 고고학자를 보내 유물 세 가지의 불가사의를 풀고 샹그릴라고 향하는 길을 찾아낸다."
 je_curtiss_found_schneider_trophy: "슈나이더 트로피 창설"
 je_curtiss_found_schneider_trophy_reason: "자크 슈나이더는 프랑스의 경영가이자 비행기와 열기구 조종사 자격증을 획득한 인물로 오랫동안 열기구 고도 기록을 보유한 선수이기도 하다. 심각한 사고를 당해 비행에 나설 수 없게 된 슈나이더는 여러 대회와 항공단을 후원하는 사업에 나섰다. 1912년 모나코에서 경기 심판을 맡은 슈나이더는 수상기의 설계 기술이 다른 항공기에 비해 크게 뒤처져 있음을 깨달았다. 수상기가 장거리 여객 운송에 최선의 해결책이라 생각한 슈나이더는 수상기 경주를 통해 그 발전을 가속화할 수 있을 것으로 보았다."
 je_curtiss_found_schneider_trophy_goal: "강대국 지위에 있고, 항구가 3개 이상이며, #E 수상기#!를 발명한 국가가 #BLUE 5개국#! 이상. 현재 해당 조건을 만족하는 국가는 총 #G [GetGlobalVariable('curtiss_seaplane_nations').GetValue]개국#!."
 je_curtiss_schneider_trophy_race: "슈나이더 트로피 경기"
 je_curtiss_schneider_trophy_race_reason: "슈나이더 트로피는 당대 최신 기술을 동원하고 최고의 비행사만이 참가하는 대회였다. 실제 경기에 나서기 전부터 승패 확률을 산정할 수 있다. 비행사의 수, 에이스 비행사, 항공기 개발 중점, 근대 항공술 연구 수준, 공항과 항공기 공장의 수, 훈련 수준과 정부의 지원 등의 요인이 경기 전부터 상당한 점수를 부여하여 우승 확률을 높인다. 항공사의 규모와 번영 수준 역시 큰 역할을 한다.  나머지 승리 확률은 본 경기에서 점수를 부여하는 이벤트를 통해 확정된다. @curtiss_schneider_point!#E 슈나이더 트로피 점수#! 30점을 가장 먼저 모으는 국가가 우승하게 된다.\n\n#b 이번 대회 참가국: [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_schneider_participiant_1_type')][SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_schneider_participiant_2_type')][SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_schneider_participiant_3_type')][SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_schneider_participiant_4_type')][SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_schneider_participiant_5_type')][SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_schneider_participiant_6_type')][SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_schneider_participiant_7_type')][SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_schneider_participiant_8_type')][SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_schneider_participiant_9_type')][SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_schneider_participiant_10_type')][SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_schneider_participiant_11_type')][SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_schneider_participiant_12_type')][SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_schneider_participiant_13_type')][SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_schneider_participiant_14_type')][SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_schneider_participiant_15_type')]"
 je_curtiss_schneider_trophy_race_goal: "우리 팀이 @curtiss_schneider_point! 슈나이더 트로피 점수 #BLUE 30점#!에 도달하면 우승합니다. 현재까지 확보한 @curtiss_schneider_point! 슈나이더 트로피 점수는 #G [ROOT.Var('curtiss_schneider_trophy_point_var').GetValue]점#!입니다."
 je_curtiss_schneider_trophy_race_invalid: "다른 국가가 우리보다 먼저 @curtiss_schneider_point!#E 슈나이더 트로피 점수#! #BLUE 30점#!을 확보하면 그 국가가 경기에서 우승합니다."
