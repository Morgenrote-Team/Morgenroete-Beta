 curtiss_montgolfier_balloon_tech: "몽골피에 열기구"
 curtiss_montgolfier_balloon_tech_desc: "몽골피에는 프랑스의 발명가 조셉 미셸 몽골피에와 자크 에티엔 몽골피에 형제의 이름을 따서 지어진 최초의 열기구입니다. '기상 기계'라는 이름은 유럽 전역으로 빠르게 퍼졌습니다. 항공기의 첫 군사적 사용은 프랑스 혁명 전쟁 중에 발생했으며, 프랑스군은 1794년 플뢰뤼 전투에서 오스트리아 군의 동향을 관찰하기 위해 결속된 수소 기구를 사용했습니다."
 curtiss_messenger_pidgeons_tech: "비둘기 우편"
 curtiss_messenger_pidgeons_tech_desc: "비둘기 우편은 1820년대까지 드물게 사용되었습니다. 1860년, 폴 로이터는 45마리가 넘는 비둘기 떼를 이용해 브뤼셀과 아헨(초기 전신 선의 종착지) 간에 뉴스와 주식 정보를 전달했습니다. 프랑코-프로이센 전쟁 동안에는 패배한 파리와 프랑스의 비점령 지역 간에 우편을 운반하기 위해 비둘기가 사용되었습니다. 1870년 12월, 페르피냥에서 브뤼셀로 마이크로필름을 실은 비둘기가 날아가는데 10시간이 걸렸습니다."
 curtiss_reconnaissance_balloon_tech: "정찰 열기구"
 curtiss_reconnaissance_balloon_tech_desc: "정찰 기구는 군사 정찰 기술이 장착된 기체로, 가스 혼합물로 채워진 기구입니다. 이 기구는 미국 남북 전쟁과 프랑코-독일 전쟁 동안 관측소로 사용되었습니다. 유인된 포로 기구는 밧줄에 묶여 공중으로 띄워져 적의 전선을 관찰하고 아래에 있는 아군에게 상황을 전달하는 역할을 했습니다."
 curtiss_early_aviation_tech: "초기 항공"
 curtiss_early_aviation_tech_desc: "1867년과 1896년 사이, 독일의 항공 선구자 오토 릴리엔탈은 공기보다 무거운 비행을 개발했습니다. 그는 잘 기록된 반복적이고 성공적인 활공 비행을 한 첫 번째 인물입니다. 릴리엔탈의 작업은 현대 날개 개념을 개발하게 했으며, 이는 이후 비행 기술 발전에 큰 영향을 미쳤습니다. 1903년 미국의 라이트 형제의 비행은 '최초의 지속적이고 제어된 공기보다 무거운 동력 비행'으로 인정받고 있습니다."
 curtiss_seaplanes_tech: "수상 항공기"
 curtiss_seaplanes_tech_desc: "1910년 3월 28일, 프랑스의 앙리 파브르는 최초의 성공적인 동력 수상 비행기인 그놈 오메가 엔진을 장착한 하이드라비옹을 비행했습니다. 이 비행기는 트리마란 형태의 부유식 비행기였습니다. 파브르의 첫 번째 성공적인 동력 수상 비행기 이륙과 착륙은 다른 비행사들에게 큰 영감을 주었습니다. 1912년 3월, 모나코에서 첫 번째 수상 비행기 대회가 열렸으며, 이 대회에는 파브르, 커티스, 텔리에, 파르망의 부유식 비행기가 참가했습니다. 같은 해, 프랑스 해군은 첫 번째 부유식 비행기를 주문했습니다."
 curtiss_modern_aviation_tech: "현대 항공"
 curtiss_modern_aviation_tech_desc: "민간 항공은 비군사적이고 비정부적인 모든 항공 활동을 포함하는 두 가지 주요 항공 범주 중 하나입니다. 민간 항공은 상업용과 개인용을 모두 포함합니다. 항공의 황금기 동안 민간 항공은 널리 확산되었습니다. 장거리 여행은 처음으로 고급 여행자를 위해 가능해졌으며, 초기 서비스는 비행선을 사용했지만, 힌덴부르크 참사 이후 비행선은 사용되지 않게 되었고, 그 자리를 비행정이 차지하게 되었습니다."
 DIPLOMATIC_ACCEPTANCE_FLIGHT_ROUTES_MAX: "이 나라는 이미 #R 10#!개 이상의 @curtiss_airlines! #E 항공 노선#!을 보유하고 있습니다."
