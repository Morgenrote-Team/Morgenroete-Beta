 curtiss.40.d: "Completely alone and on [SCOPE.sCharacter('curtiss_new_pilot_scope').GetHerHis] own, the young pilot [SCOPE.sCharacter('curtiss_new_pilot_scope').GetFullName] was the first person to complete the route between New York and Paris without stopping. While some call [SCOPE.sCharacter('curtiss_new_pilot_scope').GetHerHim] a 'flying fool', [SCOPE.sCharacter('curtiss_new_pilot_scope').GetSheHe] triggers a storm of enthusiasm in the population beyond and is celebrated as a national hero."
 curtiss.40.f: "After an overwhelming flight, the previously unknown pilot [SCOPE.sCharacter('curtiss_new_pilot_scope').GetFullName] has achieved a brilliant feat in the art of flying. A crowd, hearing of [SCOPE.sCharacter('curtiss_new_pilot_scope').GetHerHis] success, greeted [SCOPE.sCharacter('curtiss_new_pilot_scope').GetHerHim] with raptures. Over the 33,5 hours of his flight, [SCOPE.sCharacter('curtiss_new_pilot_scope').GetLastName] faced many challenges, which included skimming over storm clouds at 10,000 ft (3,000 m) and wave tops at as low as 10 ft (3.0 m). The aircraft fought icing, flew blind through fog for several hours, and [SCOPE.sCharacter('curtiss_new_pilot_scope').GetLastName] navigated only by dead reckoning ([SCOPE.sCharacter('curtiss_new_pilot_scope').GetSheHe] was not proficient at navigating by the sun and stars and rejected radio navigation gear as heavy and unreliable). [SCOPE.sCharacter('curtiss_new_pilot_scope').GetLastName] was fortunate that the winds over the Atlantic cancelled each other out, giving [SCOPE.sCharacter('curtiss_new_pilot_scope').GetHerHim] zero wind drift—and thus accurate navigation during the long flight over featureless ocean. This achievement will encourage significant global interest in both commercial aviation and air mail, revolutionizing the aviation industry worldwide"
 curtiss.42.t: "[SCOPE.sCharacter('curtiss_new_pilot_scope').GetLastName]'s Flight"
 curtiss.42.d: "With the transatlantic flight of the charismatic young pilot [SCOPE.sCharacter('curtiss_new_pilot_scope').GetFullName], our population caught fire and discovered a hitherto unknown passion for aviation. There is already talk of the [SCOPE.sCharacter('curtiss_new_pilot_scope').GetLastName] boom."
 curtiss.314.t: "비행 에이스"
 curtiss.314.d: "수많은 비행 기록을 세운 [GetPlayer.MakeScope.Var('curtiss_pilot_var').GetCharacter.GetFullName](이)가 이제 명실상부한 창공의 제왕으로 높이 평가받고 있다. 드디어 비행 에이스로 등극하게 된 것이다!"
