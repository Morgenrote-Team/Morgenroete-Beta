 curtiss_shangrila_end_search_tt: "샹그릴라를 향한 탐색을 취소합니다. 언제든지 결단으로 임무를 계속할 수 있습니다. 진행도는 일지 항목에 보존됩니다."
 curtiss_add_artifacts_of_shangrila_tt: "샹그릴라를 약탈하여 비밀과 보물들을 획득합니다. 여기에는 전세계에서 건너온 유물 10점이 포함됩니다."
