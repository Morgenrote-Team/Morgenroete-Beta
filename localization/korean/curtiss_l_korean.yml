 building_airport_throughput_add_desc: "$building_airport$의 투입량과 산출량에 대한 보너스 또는 불이익"
 curtiss_scenic_flights_modifier: "Scenic Flights"
 curtiss.140.t: "Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastNameNoFormatting] constructs new Engine for our airplane"
 curtiss.140.d: "Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName], our [concept_tesla_aeronautical_engineer] has invented a new engine for our airplane. This will surely boost our chances of winning the Trophy."
 curtiss.140.f: "This new engine is fantastic! I have never experienced anything like it. It is sooo fast! I would like to thank Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastNameNoFormatting] for this awesome engine!"
 curtiss.140.g: "A technical miracle!"
