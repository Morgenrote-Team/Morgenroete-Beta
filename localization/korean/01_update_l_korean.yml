 douglas.211.t: "서밋" #deepl:3152681021
 douglas.211.d: "고된 등반 끝에 마침내 정상에 도착한 산악인 그룹. [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] 은 [ROOT.GetCountry.GetNameNoFormatting] 을 위해 지구상에서 이곳을 최초로 정복한 사람입니다. 이제 남은 것은 이 승리의 순간을 음미하는 것뿐입니다." #deepl:2761012191
 douglas.211.f: ""여러분이 가장 먼저 물어보고 제가 대답해야 할 질문은 '에베레스트 산을 등반하는 것이 무슨 소용이 있느냐'는 질문이며, 저는 단번에 이렇게 대답해야 합니다: '아무 소용이 없습니다. 어떤 이득을 얻을 가능성은 조금도 없습니다.\n\n오, 우리는 높은 고도에서 인체의 행동에 대해 조금 배울 수도 있고, 아마도 의학자들이 우리의 관찰을 항공의 목적을 위해 어떤 설명으로 바꿀 수도 있습니다. 하지만 그렇지 않으면 아무것도 얻을 수 없습니다. 우리는 금이나 은, 보석, 석탄이나 철을 단 한 조각도 가져오지 않을 것입니다. 식량을 재배할 수 있는 농작물을 심을 수 있는 땅은 단 한 평도 찾지 못할 것입니다. 아무 소용이 없습니다.\n\n그래서 인간 안에 이 산의 도전에 반응하고 그것을 만나러 나가는 무언가가 있다는 것을, 그 투쟁이 삶 자체가 위로, 영원히 위로 올라가는 투쟁이라는 것을 이해하지 못한다면 우리가 왜 가는지 알 수 없을 것입니다. 이 모험에서 우리가 얻는 것은 순수한 기쁨일 뿐이며, 결국 기쁨은 인생의 끝입니다. 우리는 먹고 돈을 벌기 위해 사는 것이 아닙니다. 우리는 삶을 즐기기 위해 먹고 돈을 벌죠. 그것이 바로 인생의 의미이자 삶의 목적입니다.'- 조지 리 말로리" #deepl:2116445992
 douglas.211.g: "새벽을 즐겨보세요!" #deepl:3916807741
 douglas.212.t: "등반 중단됨" #deepl:2889222354
 douglas.212.d: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName]의 정상 도달 시도는 당분간 실패했습니다. 산악인은 모험을 포기하고 돌아와야만 했습니다." #deepl:641296697
 douglas.212.f: "등반가가 등반을 포기하는 데에는 여러 가지 이유가 있을 수 있습니다. 때로는 날씨 변화만으로도 충분하지만, 정상에 오르는 길이 너무 위험한 것으로 판명되는 경우도 있습니다. 하루 중 특정 시간대와 날씨 변화로 인해 등반이 어렵거나 불가능해져 등반 시간이 너무 오래 걸리거나 예상 시간을 초과하는 경우도 있습니다. 때로는 단순히 잘못된 길을 선택한 경우도 있습니다." #deepl:430022267
 douglas.212.g: "실망스럽습니다." #deepl:1131565686
 douglas.213.t: "등산 재난!" #deepl:285221578
 douglas.213.d: "[SCOPE.sState('douglas_location_scope').GetName] 에서 산을 등반하는 동안 [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] 끔찍한 실수를 저질러 여러 사람이 사망하고 식량과 장비가 함께 떨어지는 재앙으로 탐험을 끝냈습니다. 온 나라가 충격에 빠졌습니다!" #deepl:2272067559
 douglas.213.f: "'매일 밤 마테호른의 동지들이 등을 지고 팔을 뻗은 채 같은 거리에서 완벽한 순서로 차례로 미끄러져 내려오는 것을 보았습니다 - 가이드 크로즈, 그 다음에는 허드슨, 허드슨, 마지막으로 더글러스. 예, 나는 항상 그들을 볼 것입니다...'- 에드워드 휘퍼" #deepl:3038127729
 douglas.213.g: "비극입니다!" #deepl:1503732790

