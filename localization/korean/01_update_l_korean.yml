 gaudi.35.t: "아르누보 지구의 [SCOPE.sState('gaudi_art_nouveau_quarter_state').GetCityHubName]" #deepl:1088148255
 gaudi.35.d: "새로운 예술적 발전은 [SCOPE.sState('gaudi_art_nouveau_quarter_state').GetCityHubName] 에서 멈추지 않았습니다. 현재 아방가르드의 4분의 1에 해당하는 지역에 새로운 아르누보 건물이 지어지고 있습니다." #deepl:3696139674
 gaudi.35.f: "브뤼셀에서 아르누보 건축의 데뷔는 새로운 스타일의 장식 예술의 물결을 동반했습니다. 중요한 예술가로는 연철을 사용하여 브뤼셀 외관에 바로크 양식의 효과를 준 구스타브 스트라우벤(Gustave Strauven), 독창적인 의자와 굴절식 금속 가구로 유명한 가구 디자이너 구스타브 세루리에 보비(Gustave Serrurier-Bovy), 잠자리, 나비, 백조, 뱀 모양의 보석을 만든 보석 디자이너 필립 볼퍼스(Philippe Wolfers) 등이 있습니다. 이 스타일은 이웃 프랑스에서도 빠르게 주목받았습니다. 호르타의 호텔 태슬을 방문한 후 헥터 기마르는 새로운 스타일의 파리 최초의 건물 중 하나인 카스텔 베랑제(Castel Béranger)를 건축했습니다. 파리 시민들은 기마르의 독창적이고 그림 같은 스타일을 환영했고, 카스텔 베랑제는 파리 최고의 새로운 외관 중 하나로 선정되며 기마르의 경력을 시작하게 됩니다. 1900년 파리 만국박람회는 아르누보의 정점을 찍는 행사였습니다. 1900년 4월부터 11월까지 전 세계에서 약 5천만 명의 관람객이 방문한 이 박람회에서는 건축, 디자인, 유리 제품, 가구, 장식물 등 아르누보 양식의 모든 것을 선보였습니다. 파리 박람회가 가장 큰 규모의 박람회였지만 다른 박람회들도 아르누보 양식의 대중화에 많은 기여를 했습니다." #deepl:3102882922
 gaudi.35.g: "활기찬 새로운 문화." #deepl:3379987285

 gaudi.22.t: "라인 및 조치" #deepl:2020920879
 gaudi.22.d: "이번에는 건축가가 측량봉을 들고 새로운 눈으로 땅을 바라보며 돌아왔습니다." #deepl:505021070
 gaudi.22.f: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] 는 한때 마을 광장의 외관을 스케치하고 그림자와 장식을 추적하는 것으로 만족했습니다. 이제 [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] 대지에 선을 그립니다.\n\n [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] 여행하는 동안 [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] 도시를 버리고 오지로 떠났습니다. 갈리시아의 야생, 포 델타의 습지, 미들랜드의 철길을 가로질러 [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] 엔지니어, 농부, 감독과 함께 걸었습니다. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] 다른 사람들이 경전을 읽듯 지형을 읽는 법을 배웠습니다. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] 물이 어디로 흘러갈지, 흙이 어디로 움직일지, 다섯 겨울 후 지반이 갈라질지 알 수 있습니다.\n\n[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] 이제 경사도와 측지점을 말합니다. [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U] 공책은 번성기가 아니라 인치 단위로 측정된 각도, 높이, 거리로 채워져 있습니다. 어떤 사람들은 [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] 이 너무 엄격하고 딱딱해졌다고 말합니다. 하지만 [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] 에서 빈 들판을 바라보면 [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] 에서는 이미 길이 어디로 이어질지 알 수 있습니다." #deepl:3503840059
 gaudi.22.g: "건물은 주춧돌을 놓기 훨씬 전부터 시작됩니다." #deepl:960677900
 gaudi.23.t: "중요한 건축가" #deepl:2805524520
 gaudi.23.d: "2년간의 연구 끝에 우리 건축가가 돌아왔습니다 -[ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] mind sharper, [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] 드로잉 낯선 사람." #deepl:3720893
 gaudi.23.f: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] 한때는 본능에 의해 스케치했습니다. 이제 [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] 로직으로 스케치합니다.\n\n[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] 벽돌공이나 건축업자가 아닌 강단에서 [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] 시간을 보냈습니다. 파리, 괴팅겐, 심지어 상트페테르부르크까지. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] 기호가 가득한 칠판 아래 앉아 손으로 아무것도 만들지 않고 머리로 모든 것을 만드는 사람들 밑에서 공부했습니다. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] 이제 대칭, 모듈러스, 우아한 공식으로 설명되는 하중 곡선에 대해 이야기합니다.\n\n수작업으로 그려진 화려함은 사라졌습니다. [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U] 새로운 계획은 엄격하고 이상하며 거의 이질적인 정밀성을 지니고 있습니다. 어떤 사람들에게는 차갑고 비인간적으로 보일 수도 있습니다. 하지만 [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] 설명: 돔의 아름다움은 장식이 아니라 곡선의 완벽함에 있습니다.\n\n공무원들은 [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHim]. [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U] 동료들은 비현실적이라고 속삭입니다. 하지만 다른 사람들, 특히 젊은이들은 귀를 기울입니다." #deepl:796837829
 gaudi.23.g: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] 남들은 상상만 하는 것을 만들어냅니다." #deepl:2581034432
 gaudi.24.t: "돌보다 종이" #deepl:3533867777
 gaudi.24.d: "우리 건축가는 도구나 방정식이 아니라 우표, 서명, 공무원 네트워크를 가지고 돌아옵니다." #deepl:223531508
 gaudi.24.f: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] 이제 사무실을 활보합니다.\n\n2년간의 유학 기간 동안 [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] 은 단순히 건축을 공부한 것이 아니라 행정을 공부했습니다.[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] 프로젝트의 생사가 설계가 아니라 법령에 의해 결정되는 방식을 배웠습니다. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U]. 비엔나에서는 [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] 부처가 일하는 모습을 관찰했고, 브뤼셀에서는 [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] 허가 담당자를 관찰했으며, 마르세유에서는 [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] 하수도가 스카이라인을 결정하는 위원회 회의에 참석했습니다.\n\n이제 집으로 돌아온 [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] 어떤 문서를 언제 제출하고 어떤 규정을 인용하고 누구에게 아첨하고 누구에게 무시해야 할지 알고 있습니다. 규칙( [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] )은 벽이 아니라 발판이며, 움직이고, 부드럽게 하고, 재구성할 수 있다고 말합니다. 그리고 어떻게든 허가가 그 어느 때보다 빨리 도착합니다." #deepl:3047390249
 gaudi.24.g: "모든 위대한 구조는 서명된 양식에서 시작됩니다." #deepl:3498658136
 gaudi.25.t: "건축가가 돌아왔다... 결국은" #deepl:2911431628
 gaudi.25.d: "저희 건축가가 드디어 [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] 그랜드 투어를 마치고 돌아왔습니다. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] 에서 어떤 이야기를 가져올지 아무도 확신할 수 없습니다." #deepl:3640320352
 gaudi.25.f: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] 스케치북을 들고 떠났다가 [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] 시가릴로와 일화를 들고 돌아왔다. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] 이름도, 의견도, 빚도 있다. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] 기억하지 못하는 척한다.\n\n[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] 측정하지 않은 구조물 [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] 을 아름답게, 심지어 설득력 있게 이야기한다. 계획을 물으면 [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] 주제를 바꿉니다. 결과를 압박하면 [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] 미소를 지으며 서두를 수 없다고 확신합니다.\n\n어떤 이들은 [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] 을 사기라고 말합니다. 다른 사람들은 [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHim] 천재가 오해를 받았다고 합니다. 진실은 무엇일까요? 아마도 트리에스테의 카페와 나폴리의 놓친 기차 사이 어딘가에 있을 겁니다." #deepl:3339735037
 gaudi.25.g: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] 그동안 뭘 한 거죠?!" #deepl:3328871879
 gaudi.26.t: "마스터의 그림자 속에서" #deepl:1494314704
 gaudi.26.d: "더 현명하고, 더 안정적이며, 위대한 스승의 흔적을 남기고 돌아온 건축가." #deepl:2040369888
 gaudi.26.f: "다른 사람들이 널리 여행하는 동안 [ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] 거리보다 깊이를 선택했습니다. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] 전설적인 명성을 지닌 노 건축가 한 사람의 지도 아래 대부분의 세월을 보냈습니다. 강의실뿐만 아니라 비계와 침묵 속에서 [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] 장식 뒤에 숨겨진 구조, 파사드 뒤에 숨겨진 의도를 보는 법을 배웠습니다. [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U] 선이 더 깔끔해졌습니다. [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U] 시선이 더 비판적이 되었습니다. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] 건축하는 방법뿐만 아니라 왜 건축하는지를 배웠습니다. [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] 멘토링에 대한 소문이 [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHim] 보다 앞서 퍼졌습니다. 젊은 견습생들은 이미 [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHim] 를 찾고, 시 공무원들은 예상치 못한 존경심으로 그를 맞이합니다. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] 연속성과 전통, 그리고 언젠가는 유산을 남길 수 있는 사람이 되어 돌아왔습니다." #deepl:833263334
 gaudi.26.g: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] 다른 사람의 지혜의 무게를 지닙니다." #deepl:1891012360

 je_gaudi_study_trip: "건축가 스터디 여행" #deepl:471476780
 je_gaudi_study_trip_reason: "저희 건축가인 [ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] 는 현재 건축 랜드마크, 아카데미, 다른 아티스트들과의 미팅을 위해 여행 중입니다. 2년 동안은 연락이 닿지 않을 것 같습니다." #deepl:840922178
