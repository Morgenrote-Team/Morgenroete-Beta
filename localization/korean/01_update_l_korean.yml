 MR_MOUNTAINEERING_CLUB_BUTTON_TT: "#T 등산 클럽 설립#!\산악 클럽은 조직적인 알피니즘을 향한 국내 최초의 발걸음입니다. 등산에 대한 전문 지식을 갖춘 경험 많은 신사(또는 신사 숙녀)가 설립해야 합니다. 이 클럽을 통해 새로운 등반가들이 등장하여 세계의 봉우리를 정복할 수 있습니다![ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:2346036384

 MR_ALPINE_CLUB_BUTTON: "알파인 클럽" #deepl:3580940097
 MR_ALPINE_CLUB_BUTTON_TT: "#T 알파인 클럽 설립#!\n1857년 런던에서 설립된 알파인 클럽은 세계에서 가장 오래된 등산 단체입니다. 이 클럽의 설립은 빅토리아 시대 영국에서 조직적인 알피니즘의 시작을 알렸습니다. 이 클럽은 알프스에 대한 과학적, 지리적, 운동적 탐험을 장려하는 것을 목표로 삼았습니다. 창립 멤버 중에는 1865년 마테호른을 최초로 등정한 에드워드 윔퍼도 있었습니다. 알파인 클럽은 '알피니즘의 황금기'에 핵심적인 역할을 수행하며 알파인 저널을 비롯한 영향력 있는 저작물을 발간했습니다. 알파인 클럽은 이후 전 세계 산악 클럽의 표준을 세웠습니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:1435537543
