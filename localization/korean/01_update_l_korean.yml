 lepsius.1326.t: "호모 하이델베르겐시스 완성" #deepl:2121693630
 lepsius.1326.d: "[SCOPE.sCharacter('lepsius_anthropologist_scope').GetFullName] 는 멸종된 종에 대한 구체적인 결론을 도출할 수 있을 만큼 충분한 뼈를 수집했습니다. 호모 하이델베르겐시스는 더 이상 과학의 수수께끼가 아니며, 아직 풀리지 않은 의문이 많지만 이제 인류 가계도에서 어느 정도 확실하게 찾을 수 있게 되었습니다." #deepl:4182329393
 lepsius.1326.f: "호모 하이델베르겐시스의 아래턱은 1907년 하이델베르크 인근 마우어 근처의 모래 구덩이에서 노동자 다니엘 하트만이 발견하고 1908년 해부학자 오토 슈텐삭이 기술한 것으로, 약 60만 년 전의 이 화석은 유럽에서 가장 오래된 초기 인류의 증거로 간주되며 형태학적으로 호모 에렉투스와 호모 사피엔스 사이에 있고 아프리카, 유럽 및 아시아에 이 호미닌 형태의 광범위한 분포를 나타내며 견고성과 추정 뇌량으로 인해 고급 신체 적응, 도구 사용 및 사회 조직에 대한 결론을 이끌어낼 수 있게 해줍니다." #deepl:2078634084
 
 lepsius.1336.t: "하이델베르크 맨" #deepl:140239375
 lepsius.1336.d: "하이델베르크 인근 마을인 마우어의 광산에서 한 노동자가 놀라운 발견을 했습니다. 하이델베르크 대학의 한 교수는 즉시 그 가치를 인정했습니다." #deepl:3838910430
 lepsius.1336.f: "호모 하이델베르겐시스의 아래턱은 1907년 하이델베르크 인근 마우어 근처의 모래 구덩이에서 노동자 다니엘 하트만이 발견하고 1908년 해부학자 오토 슈텐삭이 기술한 것으로, 약 60만 년 전의 이 화석은 유럽에서 가장 오래된 초기 인류의 증거로 간주되며 형태학적으로 호모 에렉투스와 호모 사피엔스 사이에 있고 아프리카, 유럽 및 아시아에 이 호미닌 형태의 광범위한 분포를 나타내며 견고성과 추정 뇌량으로 인해 고급 신체 적응, 도구 사용 및 사회 조직에 대한 결론을 이끌어낼 수 있게 해줍니다." #deepl:2078634084

