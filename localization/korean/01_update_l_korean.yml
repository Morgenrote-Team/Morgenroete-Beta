 douglas.101.t: "등산 클럽 창립" #deepl:222126293
 douglas.101.d: "[SCOPE.sCharacter('douglas_president_scope').GetFullName] 산이 응답합니다. 등산 클럽의 창립은 더 높은 곳을 지향하는 모든 이들에게 새로운 시대를 여는 신호탄입니다." #deepl:4067420597
 douglas.101.f: "[SCOPE.sCharacter('douglas_president_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('douglas_president_scope').GetLastName] 원정대가 폭풍과 눈사태를 뚫고 [SCOPE.sCharacter('douglas_president_scope').GetHerHim] 를 이끌었다면, 이제 [SCOPE.sCharacter('douglas_president_scope').GetSheHe] 는 [SCOPE.sCharacter('douglas_president_scope').GetHerHis] 의 유산을 계승하고자 합니다. [ROOT.GetCountry.GetCapital.GetCityHubName] 에서 [SCOPE.sCharacter('douglas_president_scope').GetSheHe] 은 혼자가 아닌 유망한 신예와 함께 [GetPlayer.GetName] 의 등산 클럽을 설립합니다: [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] 예리한 눈과 불굴의 의지를 가진 산악인 야심가 [SCOPE.sCharacter('douglas_president_scope').GetFullName] 는 [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetHerHim] 에서 단순한 야망이 아닌 미래의 전설을 봅니다. 그들은 함께 정상뿐만 아니라 영광과 용기, 그리고 역사의 한 자리를 차지할 수 있는 길의 문턱에 서 있습니다. 이 클럽은 산의 부름을 듣는 모든 이에게 열려 있습니다. 등반이 시작됩니다." #deepl:3771164746
 douglas.101.g: "산이 부른다!" #deepl:249284577

 douglas.102.t: "알파인 클럽" #deepl:1599559370
 douglas.102.d: "알파인 클럽은 [ROOT.GetCountry.GetCapital.GetCityHubName] [TimeKeeper.GetCurrentDate.Format('y')] 에서 공식적으로 설립되었으며 세계 최초의 국제 산악 단체로 인정받고 있습니다. 알파인 클럽의 창립은 현대 알피니즘의 제도적 시작을 의미합니다." #deepl:3982546221
 douglas.102.f: "역사적으로 1857년 한 무리의 영국 신사들이 런던에 모여 등산 전용 클럽을 설립했습니다. 존 볼과 에드워드 케네디 같은 인물이 주도한 알파인 클럽은 신체적 도전과 지리적, 자연적 연구를 결합하여 알프스를 체계적으로 탐험하는 것을 장려하고자 노력했습니다. 이 클럽은 지식을 공유하고, 탐험을 조직하고, 등반가들 간의 공동체 의식을 함양할 수 있는 체계적인 틀을 제공했습니다. 이 클럽의 회원들은 훗날 '알피니즘의 황금기'로 알려진 시기에 핵심적인 역할을 수행하며 수많은 최초 등정을 달성하고 그들의 경험을 기록했습니다. 얼마 지나지 않아 알파인 저널이 발행되기 시작하면서 등산 문학의 발전에 기여했습니다. 알파인 클럽의 창립은 전 세계적으로 조직적인 등반의 토대를 마련하고 산악 탐험의 지속적인 기준을 세웠습니다." #deepl:4126383378
 douglas.102.g: "함께 정상에 오르자!" #deepl:2506053391

