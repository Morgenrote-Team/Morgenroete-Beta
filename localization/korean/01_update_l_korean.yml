 concept_douglas_mountain_summit: "산 정상" #deepl:193458424
 concept_douglas_mountain_summits: "Mountain Summits" #You can use this for plural [Concept('concept_douglas_mountain_summit','$concept_douglas_mountain_summits$')]
 concept_douglas_mountain_summit_desc: "산 정상은 모든 산악인들이 탐내는 목표입니다. 정상은 산의 가장 높은 지점을 표시합니다. 각 정상에는 성공적으로 도달하기 어려운 정도를 정의하는 세 가지 특성이 있습니다.\n\n#V 높이#!: 높이는 산을 오르는 데 필요한 걸음 수를 결정하며, 이는 탐험의 전체 길이를 반영합니다. 1,000미터마다 하나의 진행 단계가 필요합니다. 이 값은 반올림되므로 4,421미터 높이의 휘트니 산은 5단계, 7,134미터 높이의 카우프만 피크는 8단계가 필요합니다. 산의 명성은 높이에 따라 계산되는데, 총 높이를 250으로 나눕니다. 따라서 5,000미터의 이상적인 산은 20의 명성을 부여합니다.\n\n#V 레벨#!: 산의 레벨은 산을 오르는 데 필요한 장비의 요구 사항을 나타냅니다. 이는 산의 높이와 엄격하게 연관되어 있지 않습니다. 예를 들어, 시트랄테페틀은 5,636미터에 달하지만 레벨 1에 불과하며 기본적인 장비만 필요합니다. 반면 4,478미터에 불과한 마테호른은 레벨 3으로 훨씬 더 까다로워 알프스 응급 상황에 대비한 최소한의 응급처치 준비가 필요합니다.\n\n#V 위험#!: 산의 위험도는 원정대에 영향을 미칠 수 있는 부정적인 사건의 가능성을 나타냅니다. 산의 높이와 레벨과는 무관합니다. 눈사태, 안개, 악천후가 주요 우려 사항입니다. 포포카테페틀은 친절한 주변 환경 덕분에 근대 초기에 이미 등반이 가능했습니다. 반면 3,666미터에 불과한 훨씬 작은 그로스베네디거는 19세기 초까지도 오스트리아 탐험대에게 심각한 위협이 되었습니다.\n\n개별 정상에 대한 자세한 정보는 [concept_douglas_mountain_summit_list] 섹션에서 확인할 수 있습니다." #deepl:3359948048
 concept_douglas_mountain_range: "산맥" #deepl:3289022657
 concept_douglas_mountain_ranges: "Mountain Ranges" #You can use this for plural [Concept('concept_douglas_mountain_range','$concept_douglas_mountain_ranges$')]
 concept_douglas_mountain_range_desc: "산맥은 장거리 훈련( [concept_douglas_mountaineering] )을 위한 잠재력을 제공하는 산맥으로 정의됩니다. 대표적인 산맥으로는 록키산맥, 안데스산맥, 알프스산맥, 코카서스산맥 등이 있습니다. 정복해야 할 [Concept('concept_douglas_mountain_summit','$concept_douglas_mountain_summits$')] 산맥과 달리, 치명적인 추락사고( [concept_douglas_mountaineer] )의 위험이 없는 덜 도전적인 산맥도 많이 있습니다. 오히려 훈련 루트로 간주해야 합니다. 산맥이 있는 국가는 이러한 지리적 특징이 없는 국가보다 산악인을 배출할 가능성이 더 높습니다." #deepl:2685064578
 concept_douglas_alpine_heritage: "알파인 헤리티지" #deepl:3116364012
 concept_douglas_alpine_heritage_desc: "알파인 헤리티지란 산과의 연관성 및 산 등반에 대한 전문성을 통칭하는 용어입니다. 또한 대부분의 경우 숙련된 산악인이 산악 지역 출신이기 때문에 새로운 [Concept('concept_douglas_mountaineer','$concept_douglas_mountaineers$')]을 모집할 수 있는 잠재력을 의미합니다. 따라서 [Concept('concept_douglas_mountain_range','$concept_douglas_mountain_ranges$')] 또는 [Concept('concept_douglas_mountain_summit','$concept_douglas_mountain_summits$')] 을 사용하는 국가가 항상 유리합니다. 새로운 산악인을 모집하는 것뿐만 아니라 다른 다양한 활동에는 알파인 헤리티지 비용이 듭니다." #deepl:707449492

 concept_douglas_mountain_summit_list: "산 정상 목록" #deepl:4208448161
 concept_douglas_mountain_summit_list_desc: "등반할 수 있는 [Concept('concept_douglas_mountain_summit','$concept_douglas_mountain_summits$')] 이 많이 있습니다.\n\n#V 북미:#!\n#b 마운트 맥킨리#! (알래스카), 높이 6190m, 레벨 4\n#b 마운트 로건#! (유콘 준주), 높이 5959m, 레벨 4\n#b 시틀랄테페틀#! (멕시코), 높이 5636m, 레벨 1\n#b 마운트 휘트니#! (캘리포니아), 높이 4421m, 레벨 1\n\n#V 남아메리카:#!\n#b 아콩카과#! (멘도사), 높이 6267m, 레벨 3\n#b 후아스카란#! (리마 영토), 높이 6768m, 레벨 5\n#b 일리마니#! (라파스), 높이 6438m, 레벨 4\n#b 침보라조#! (에콰도르), 높이 6267m, 레벨 1\n\n#V 유럽:#!\#b 슈카라#! (그레이터 코카서스), 높이 5642m, 레벨 4\n#b 듀푸르스피체#! (듀푸르스피체), 높이 4634m, 레벨 2\n#b 마테호른#! (서스위스), 높이 4478m, 레벨 3\n#b 아이구이 베르테#! (사보이), 높이 4122m, 레벨 3\n#b 피코 데 아네토#! (아라곤), 높이 3404m, 레벨 1\n\n#V 아프리카:#!\n#b 키보#! (탕가니카), 높이 5895m, 레벨 2\n#b 바티안#! (케냐), 높이 5199m, 레벨 3\n#b 마운트 스탠리#! (우간다), 높이 5109m, 레벨 3\n#b 마운트 카메룬#! (남 카메룬), 4095m, 레벨 1\n\n#V 아시아:#!\n#b 카멧#! (델리), 높이 7756m, 레벨\n#b 초골리사#! (카슈미르), 높이 7665m, 레벨 5\n#b 카브루#! (히말라야), 높이 7412m, 레벨 5\n#b 카우프만 피크#! (타지키스탄), 높이 7134m, 레벨 4\n\n#V 호주 및 오세아니아:#!\#b 마운트 빌헬름#! (동부 뉴기니), 높이 4121m, 레벨 2\n#b 마운트 쿡#! (남섬), 높이 3724m, 레벨 2" #deepl:721187631

