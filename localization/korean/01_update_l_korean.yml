 MR_MOUNTAIN_EXPEDITION_LEVEL_1_BUTTON_TT: "#T 등산 탐험: 레벨 1 정상#!\n이 카테고리의 산은 레벨 1 등산 장비로 등반할 수 있습니다. 레벨은 고도나 위험을 나타내지 않습니다. 이러한 봉우리에는 다음이 포함됩니다: 휘트니산, 시틀랄테페틀, 포포카테페틀, 침보라조, 피코 아네토, 몽블랑, 그로스베네디거, 카메룬산, 라스다셴, 길루웨산 등이 있습니다. 자세한 내용은 [concept_douglas_mountain_summit_list].\n\n에서 확인하세요.[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:1466134091
