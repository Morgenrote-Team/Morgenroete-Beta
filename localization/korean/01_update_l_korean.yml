 gaudi_traditional_style_desc: "건축가:\n#p +10#! $country_construction_add$ (프로젝트에 사용 중이 아닌 경우)\n\n이 건축가는 새로운 혁신 없이 오래된 건물 스타일을 따르고 있습니다." #deepl:2882880328
 gaudi_historicism_style: "역사주의 건축" #deepl:3067188371
 gaudi_historicism_style_desc: "건축가:\n#p +20#! $country_construction_add$ (프로젝트에 참여하지 않는 경우)\n\n이 건축가는 고대로부터 건물의 주제, 형태, 스타일을 가져와 새로운 것으로 결합하고 해석합니다." #deepl:1017118081
 gaudi_bauhaus_style: "바우하우스 건축" #deepl:2452320752
 gaudi_bauhaus_style_desc: "건축가:\n#p +30#! $country_construction_add$ (프로젝트에 사용 중이 아닌 경우)\n\n이 건축가는 단순한 형태의 냉정하고 깔끔한 건물을 선호합니다." #deepl:300217312
 gaudi_neoclassical_style: "신고전주의 건축" #deepl:3915160230
 gaudi_neoclassical_style_desc: "건축가로서:\n#p +30#! $country_construction_add$ (프로젝트에 참여하지 않는 경우)\n\n이 건축가는 미적 형태가 뚜렷하고 제국의 과거를 참조한 기념비적인 건물을 선호하는 경향이 있습니다." #deepl:200197201
 gaudi_art_deco_style: "아르데코 건축" #deepl:2695214977
 gaudi_art_deco_style_desc: "건축가:\n#p +30#! $country_construction_add$ (프로젝트에 사용 중이 아닌 경우)\n\n이 건축가는 활력과 웅장함을 강조하는 고급스럽고 유쾌한 건축을 대표합니다." #deepl:4266155721

