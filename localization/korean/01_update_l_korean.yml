 je_gaudi_capital_expansion_project: "자본 확장" #deepl:4033066520
 je_gaudi_capital_expansion_project_reason: "1836년부터 1936년 사이에 빅토리아 시대의 수도는 대대적인 도시 변혁을 겪었습니다. 파리는 오스만의 넓은 대로와 축으로 뻗은 경관으로 재탄생했습니다. 비엔나는 1857년 성벽을 철거하고 웅장한 링슈트라세로 대체했습니다. 베를린은 연립주택, 산업 지구, 이후 모더니스트 주택 단지로 빠르게 확장되었습니다. 런던은 철도 교외, 인프라 프로젝트, 세계 최초의 지하철을 통해 외곽으로 뻗어나갔습니다. 유럽 대륙 전역의 왕실 도시는 권력과 야망, 사회적 긴장이 고조되는 현대 대도시로 발전했습니다." #deepl:4052914498

 gaudi.41.t: "경계 없는 도시" #deepl:1231776512
 gaudi.41.d: "낡은 벽이 무너집니다. 그 자리에 공기와 빛, 그리고 성장의 약속이 들어섭니다." #deepl:2117769530
 gaudi.41.f: "수 세기 동안 [ROOT.GetCountry.GetCapital.GetCityHubName] 은 자랑스럽고 콤팩트하며 스스로를 폐쇄하는 벽으로 둘러싸여 있었습니다. 하지만 이제 석조물은 허물어지고 가루로 변했습니다.\n\n중세 요새는 철거되었습니다. 그 자리에는 나무와 고상한 외관이 늘어선 넓은 대로가 생겨났습니다. 이제 시장 마차와 산책하는 커플들이 한때 근위병들이 행진하던 곳을 밟고 다닙니다. 이 대로는 단순한 도로가 아니라 자신감, 확장, 감당할 수 없을 만큼 큰 미래에 대한 선언입니다.\n\n고대 문이 사라진 것을 한탄하는 사람들도 있습니다. 하지만 [ROOT.GetCountry.GetCapital.GetCityHubName] 드디어 첫 심호흡을 시작했습니다." #deepl:4076900735
 gaudi.41.g: "비전과 활력으로 외연을 확장합니다." #deepl:1116241139
 gaudi.42.t: "진보의 반지" #deepl:3156235256
 gaudi.42.d: "새로운 대로 고리가 도시와 주를 하나로 묶어줍니다." #deepl:3367270166
 gaudi.42.f: "한때 진흙탕 제방이 서 있던 곳에 이제 돌과 철이 지배합니다. 큰 길은 [ROOT.GetCountry.GetCapital.GetCityHubName] 의 중심부를 목걸이처럼 휘감으며 지역을 움직임과 빛으로 묶습니다.\n\n단순한 도로 공사가 아니었습니다. 전체 블록이 다시 그려지고, 공원이 조성되고, 기념비가 완벽한 원근감으로 액자에 담겨 있습니다. 해질녘에는 가스등이 정돈된 별처럼 피어납니다. 1미터가 포장될 때마다 [ROOT.GetCountry.GetCapital.GetCityHubName] 은 더욱 가독성이 좋아지고 제국주의적인 분위기를 풍깁니다.\n\n관계자들은 '도시의 조화'에 대해 이야기합니다. 그리고 사람들은? 사람들은 한 번도 본 적 없는 동상을 바라보며 걷기 두려웠던 거리를 산책합니다." #deepl:3543082084
 gaudi.42.g: "방어의 반지가 아니라 방향의 반지입니다." #deepl:2497263912
 gaudi.43.t: "권한의 길" #deepl:4104296278
 gaudi.43.d: "새로운 지사는 [ROOT.GetCountry.GetCapital.GetCityHubName]-한 번에 한 축씩. 넓고 곧게, 그리고 완전히 타협하지 않습니다." #deepl:2867872335
 gaudi.43.f: "이것은 확장이 아닙니다. 그것은 수술입니다.\n\n이웃 전체가 나침반과 계획 아래로 떨어집니다. 미로 같던 구역을 가로지르는 도로가 대로처럼 만들어집니다. 오래된 골목은 사라집니다. 그 자리에는 기념비, 막사, 사역으로 이어지는 길고 곧게 뻗은 선이 생겨납니다.\n\n저항이 일어나지만 허가증이 발급되고 주택이 수용되고 파사드가 정렬됩니다. [ROOT.GetCountry.GetCapital.GetCityHubName] 이제 가시성, 동선, 통제라는 질서의 언어를 사용합니다. 웅장함 뒤에는 의도가 숨어 있습니다.\n\n빈민들은 이를 '수색'이라고 부릅니다. 관리들은 그것을 '현대화'라고 부릅니다. 총독은 그것을 '필요'라고 부릅니다." #deepl:4133801679
 gaudi.43.g: "아무도 계획에서 벗어나지 못하게 하세요" #deepl:2017759053
 gaudi.44.t: "메트로폴리탄 호라이즌" #deepl:3803938371
 gaudi.44.d: "[ROOT.GetCountry.GetCapital.GetCityHubName] 는 더 이상 단순한 수도가 아닙니다. 미니어처의 세계가 되어가고 있습니다." #deepl:101717450
 gaudi.44.f: "옛 도시에는 가장자리가 있었죠. 이곳에는 경계가 없습니다.\n\n석재가 지배적이었던 자리에 강철과 유리가 뚫고 들어왔습니다. 공공 정원 아래에는 철로가 교차합니다. 전등이 황혼과 새벽의 경계를 흐릿하게 만듭니다. 대사관, 은행, 갤러리, 카페가 새로운 시대의 철제 온실에서 난초처럼 피어납니다.\n\n아케이드에서는 외국어가 울려 퍼집니다. 고층 빌딩이 대성당에 도전합니다. [ROOT.GetCountry.GetCapital.GetCityHubName] 더 이상 성장에 대한 허락을 구하지 않습니다. 모든 지역에서 한 가지 진실이 드러납니다. 이곳은 더 이상 한 국가의 도시가 아닙니다. 이곳은 국가들의 도시입니다." #deepl:3494578230
 gaudi.44.g: "전 세계가 이미 지켜보고 있기 때문에 우리는 일어납니다." #deepl:1129952378

 gaudi_capital_expansion_project_progress_bar: "자본 확장" #deepl:4033066520
 gaudi_capital_expansion_project_progress_bar_desc: "자본 확충: #v [JournalEntry.GetCurrentBarProgress(ScriptedProgressBar.Self)|1%] #! ([JournalEntry.GetCurrentBarValue(ScriptedProgressBar.Self)|0]/30)" #deepl:707314599

 gaudi.511.d: "[ROOT.GetCountry.GetCapital.GetCityHubName] 을 아름답게 꾸미는 데 있어 도시 계획에 대한 의견 차이가 있었습니다." #deepl:2161912626
 gaudi.512.t: "순환 도로의 동상" #deepl:1070850347
 gaudi.512.d: "[ROOT.GetCountry.GetCapital.GetCityHubName] 의 새로운 순환 도로에 새로운 인물 그룹이 세워질 예정이지만 어떤 신화 속 인물이 특별한 자리를 차지할지는 불분명합니다." #deepl:275330526
 gaudi.513.f: "새로운 부처가 정부의 주력 부처로 건설될 예정이었지만, 끊임없는 계획 변경과 확장, 잠재된 부패로 인해 건물 건설이 지연되고 완공까지 모든 자금이 사용되었습니다. 미완성된 건물은 몇 가지 임시 조치를 통해 기능적인 상태로 만들 수 있지만, 이는 아마도 예상보다 작은 사무실과 덜 편안한 사무실로 만족해야 하는 정부의 이익에 부합하지 않을 것입니다. 추가 공사가 가능하지만 비용이 많이 들 것입니다." #deepl:3580582680

 gaudi.511.t: "분수 또는 파빌리온?" #deepl:2151137688
 gaudi.511.f: "황제의 수염을 둘러싼 다툼으로 착각할 수도 있지만, 사소한 일로 시작된 정치적 분쟁이 가시적인 정치적 분쟁으로 발전했습니다. 미적 가치가 높은 대표적인 광장에 대한 건설 프로젝트입니다. 한 세력은 그곳에 파빌리온을 짓고 싶어하고 다른 세력은 분수대 건설을 주장합니다. 부지가 하나밖에 없기 때문에 둘 중 하나만 지을 수 있어 타협이 불가능한 상황입니다." #deepl:1541667756
 gaudi.511.g: "파빌리온을 건설합니다." #deepl:2064679099
 gaudi.511.h: "분수를 만듭니다." #deepl:2431357846
 gaudi.511.i: "이곳에 대한 저만의 계획이 있습니다..." #deepl:53271135
 gaudi.512.f: "순환 도로를 계획할 때 몇 가지 세부 사항이 아직 불분명합니다. 어떤 인물을 눈에 잘 띄는 위치에 배치할지는 아직 결정되지 않았습니다. 로마 판테온의 인물이어야 한다는 것은 분명합니다. 예를 들어 자본가들은 상업의 신 머큐리를 가운데에 배치할 것을 제안하는 등 인구의 특정 부분이 각 인물과 동일시합니다. 반면 귀족들은 신들의 아버지인 목성을 고집했습니다. 군대는 화성을 선호하고 학계는 아폴로를 중심에 배치하길 원합니다." #deepl:3457913174
 gaudi.512.g: "주피터." #deepl:641978563
 gaudi.512.h: "Mercury." #deepl:4064282680
 gaudi.512.i: "아폴로." #deepl:2704921915
 gaudi.512.j: "화성." #deepl:4251022611
 gaudi.513.t: "부처 건물이 비용을 초과하는 경우" #deepl:3536337121
 gaudi.513.d: "새 교육부 청사 건설이 작은 스캔들로 번지고 있습니다." #deepl:3745484689
 gaudi.513.g: "예산이 정해져 있고 이 예산을 준수해야 합니다." #deepl:2982007153
 gaudi.513.h: "안타까운 일이지만 이 분야에서는 흔한 일입니다." #deepl:3799202878
 gaudi.513.i: "이 프로젝트는 필요한 만큼의 돈과 시간을 확보해야 합니다." #deepl:3703152475
 gaudi.514.t: "새로운 커피 하우스" #deepl:760472506
 gaudi.514.d: "링슈트라세에 새로운 커피 하우스가 문을 열었습니다." #deepl:977697169
 gaudi.514.f: "'커피 하우스는 새로운 모든 것을 위한 최고의 교육 장소로 남아있었습니다. 이를 이해하려면 비엔나 커피 하우스는 세계의 어떤 유사한 기관과도 비교할 수없는 특별한 종류의 기관이라는 것을 알아야합니다. 저렴한 커피 한 잔으로 누구나 이용할 수있는 일종의 민주적 인 클럽으로,이 작은 비용으로 모든 손님이 몇 시간 동안 앉아서 토론하고, 글을 쓰고, 카드를 치고, 우편물을 받고, 무엇보다도 신문과 잡지를 무제한으로 소비 할 수 있습니다. 더 나은 비엔나 커피 하우스에서는 비엔나 신문뿐만 아니라 독일 제국 전체, 프랑스, 영국, 이탈리아, 미국의 신문은 물론 세계의 모든 중요한 문학 및 예술 평론도 볼 수 있었습니다. 그래서 우리는 세상에서 일어나는 모든 일을 직접 알고 있었고, 출판된 모든 책과 모든 공연에 대해 들었고, 어디서든 공연이 열리고 있는지에 대해 들었으며, 모든 신문에 실린 리뷰를 비교했습니다. 커피 하우스에서 세계의 모든 사건에 대해 포괄적으로 파악하고 동시에 친근한 분위기에서 토론할 수 있었다는 사실만큼 오스트리아 사람의 지적 유연성과 국제적 지향성에 크게 기여한 것은 없을 것입니다. 우리는 매일 몇 시간씩 그곳에 앉아서 아무것도 놓치지 않았습니다. - 스테판 츠바이크" #deepl:1426019469
 gaudi.514.g: "[SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('gaudi_ruler').GetFullName] 를 방문해야 합니다." #deepl:3567062403
 gaudi.514.h: "이것은 비엔나의 생활 수준을 높일 것입니다." #deepl:993415000
 gaudi.515.t: "링 로드 팔레" #deepl:2889767777
 gaudi.515.d: "한 귀족이 [ROOT.GetCountry.GetCapital.GetCityHubName] 의 신시가지에 궁전을 짓기 위해 무리수를 뒀습니다. 반쯤 완성된 건물 폐허는 흉물이 될 위기에 처했습니다." #deepl:3082201997
 gaudi.515.f: "링 로드 궁전은 비엔나 링슈트라세에 있는 웅장한 궁전을 일컫는 말입니다. 이 건물들은 대부분 19세기 후반에 옛 귀족이나 은행가 및 산업가들에 의해 지어졌습니다. 궁전들은 네오 바로크와 네오 르네상스, 즉 네오 매너리즘 양식이 혼합된 형태로 지어졌어요. 궁전은 신분 상승과 지위의 상징이기도 했습니다. 하지만 최근 건축업자 중 한 곳이 무리하게 사업을 확장하여 파산에 직면했습니다. 최악의 경우 다시 철거해야 할 수도 있어 전체 프로젝트의 완공이 지연될 수 있다는 우려의 목소리가 벌써부터 나오고 있습니다." #deepl:2482976903
 gaudi.515.g: "비용을 분담합니다." #deepl:1778759255
 gaudi.515.h: "저희가 관여할 바가 아닙니다." #deepl:2515722656
 gaudi.516.t: "자본 확장: 좋은 진전" #deepl:3725304670
 gaudi.516.d: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] 자본 확충을 더 일찍 완료할 수 있다고 밝혔습니다." #deepl:1876608469
 gaudi.516.f: "조국에 대한 사랑, 높은 임금, 지역 엘리트들의 우호적인 지원 또는 단순히 더 나은 날씨 등 알 수 없는 이유로 모든 것이 더 빠르게 진행되고 있습니다." #deepl:771529955
 gaudi.516.g: "놀랍습니다." #deepl:1621308786
 gaudi.517.t: "자본 확장: 느린 진행" #deepl:4246146058
 gaudi.517.d: "안타깝게도 [ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] 의 건설 관리팀은 오늘 [ROOT.GetCountry.GetCapital.GetCityHubName] 의 새로운 지구 건설이 예정보다 늦어지고 있음을 인정해야 했습니다." #deepl:984753109
 gaudi.517.f: "적대적인 정치 요소에 의한 선동, 노조의 업무 윤리 훼손, 일루미나티의 음모 또는 단순히 악천후 등 알 수 없는 이유로 모든 것이 더디게 진행되고 있습니다." #deepl:967308050
 gaudi.517.g: "유감입니다." #deepl:1477108256
 gaudi.518.t: "기념비 [SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('gaudi_ruler').GetFullName]" #deepl:4291665084
 gaudi.518.d: "링슈트라세에 새로운 기념비가 계획되어 있습니다: 바로 우리 왕의 동상 [SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle] 입니다." #deepl:642834231
 gaudi.518.f: "링슈트라세는 오스트리아의 역사를 설명하는 역할을 했어요. 한편으로는 합스부르크 왕가의 오랜 군주들이 불멸의 명성을 얻었고, 그 중 마리아 테레지아가 가장 호화로운 기념비를 받았습니다. 하지만 유겐 폰 사보이엔이나 슈바르츠베르크 같은 장군들도 빈의 도시 풍경을 풍요롭게 만들었습니다. 한편 부르주아들은 시인인 괴테와 실러 왕자뿐만 아니라 위대한 작곡가 슈베르트, 모차르트, 베토벤 등 그들의 지수를 불멸화하는 것을 매우 중요하게 여겼습니다." #deepl:795951503
 gaudi.518.g: "[SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle]." #deepl:2477877691
 gaudi.518.h: "하지만 그 대신 링슈트라세 완주에 집중하세요." #deepl:1336009648
 gaudi.519.t: "불이야!" #deepl:3279516897
 gaudi.519.d: "끔찍한 화재로 건설 현장의 여러 건물이 파괴된 [ROOT.GetCountry.GetCapital.GetCityHubName]." #deepl:603406045
 gaudi.519.f: "링 로드에서 가장 잘 알려진 재앙은 1881년 12월 8일에 발생한 링 극장 화재입니다. 19세기 가장 큰 화재 참사 중 하나였습니다. 희생자 수는 수백 명에서 많게는 천 명에 달할 것으로 추산됩니다. 원인은 가스 조명의 결함으로 인해 가스가 누출되어 다음에 점화를 시도할 때 폭발한 것이었습니다. 이로 인해 발생한 화재는 무대 뒤편 열차로 번진 후 무대 나머지 부분과 강당으로 급속히 확산되었습니다. 이 화재는 국내외적으로 화재 예방, 특히 오스트리아 내 극장 건축에 대한 관련 법규에 영향을 미쳤습니다. 그날 저녁 공연 티켓을 가지고 있던 작곡가 안톤 브루크너는 몸이 좋지 않아 집에 머물러야만 죽음을 피할 수 있었습니다." #deepl:1763422665
 gaudi.519.g: "끔찍한 하루였습니다." #deepl:3953408834
 gaudi.520.t: "도시 확장에 대한 편견" #deepl:3932558777
 gaudi.520.d: "농촌 인구 대표들은 [ROOT.GetCountry.GetCapital.GetCityHubName] 의 개발이 일반 농촌 인구에게 불리한 것으로 보고 있습니다." #deepl:3359656956
 gaudi.520.f: "'정부는 수도에서 말로 표현할 수 없는 허세를 부리며 몇 거리만 떨어져 있고 한 번도 떠나본 적이 없는 냉담한 도시 거주자들로 구성되어 있다는 것을 분명히 밝혔습니다 [ROOT.GetCountry.GetCapital.GetCityHubName]. 막대한 금액이 그곳에서 낭비되고 있으며, 이는 수도로만 오지만 작은 마을이나 마을의 평범한 시골 사람들은 아무것도 눈치 채지 못합니다. 그 이데올로기는 중앙주의를 선호하고 관료주의를 선호하며 국가기구를 선호하고 지원하지만, 그러한 퇴폐적 인 프로젝트가 일반인에게 어떤 관점을 제공합니까?'" #deepl:2119590629
 gaudi.520.g: "열심히 일하는 농촌 주민들을 위한 착한 선물은 어떨까요?" #deepl:1425408969
 gaudi.520.h: "시와 도가 동일합니다." #deepl:154752402
 gaudi.520.i: "이 멍청한 농부의 이야기에 누가 신경을 쓰나요?" #deepl:1424618973
 gaudi.521.t: "산업가 레지던스" #deepl:1054941492
 gaudi.521.d: "한 부유한 사업가가 새 궁전을 지어 [ROOT.GetCountry.GetCapital.GetCityHubName] 을 풍요롭게 만들었습니다." #deepl:2324185893
 gaudi.521.f: "산업가와 은행가들의 궁전은 국가 내에서 그들의 새로운 지위를 강조하는 방법으로 여겨졌습니다. 또한 유대인 출신의 부유층이 자신의 해방을 강조하기 위해 궁전을 짓는 것도 가능했습니다. 19세기 비엔나의 발전이 이에 대한 좋은 예입니다. 가장 유명한 순환도로 궁전 중 하나는 팔레 엡스타인(Palais Epstein)입니다. 산업가이자 은행가인 구스타프 리터 폰 엡슈타인을 위해 지어졌습니다. 건축가는 인접한 오스트리아 국회의사당도 설계한 테오필 프라이허 폰 한센이었어요. 높이가 5층에 달하며 당시의 전형적인 네오 르네상스 양식으로 지어졌습니다." #deepl:2653721730
 gaudi.521.g: "[ROOT.GetCountry.GetCapital.GetCityHubName] 가 성장하고 번창하고 있습니다." #deepl:2259204183
 gaudi.522.t: "막사 확장" #deepl:3408528723
 gaudi.522.d: "[ROOT.GetCountry.GetCapital.GetCityHubName] 의 확장은 막사를 현대화하고 확장할 수 있는 기회를 제공합니다." #deepl:933440251
 gaudi.522.f: "프란츠 요제프 막사는 오늘날 링슈트라세 지역에 있는 비엔나 막사 건물로, 오랫동안 대규모 프로젝트 건설에 걸림돌이 되어 왔어요. 이 막사는 프란츠 요제프 1세 황제의 이름을 따서 1848년 혁명 이후 1854~1857년에 지어졌습니다. 건설 직후 막사는 1857년에 시작된 비엔나 링슈트라세(Vienna Ringstrasse) 개발에 방해가 되었지만, 군대가 다시 이곳을 떠나는 데 40년이 걸렸습니다. 따라서 프란츠 요제프 막사의 손실을 흡수하기 위해 새로운 막사를 미리 세워야 했습니다." #deepl:4162429863
 gaudi.522.g: "막사를 확장합니다." #deepl:2381627455
 gaudi.522.h: "다른 곳에 시간을 투자하는 것이 좋습니다." #deepl:3269234038
 gaudi.523.t: "건설 부문 확장" #deepl:2392547084
 gaudi.523.d: "[ROOT.GetCountry.GetCapital.GetCityHubName] 의 확장은 건설 부문을 확장할 수 있는 기회를 제공합니다. " #deepl:3106227577
 gaudi.523.f: "'우리는 일반적으로 예술가의 본성을 예술가의 제작을 방해하는 자질의 총합이라고 부릅니다.' - 아서 슈니츨러" #deepl:2115168723
 gaudi.523.g: "건설 사무소를 확장합니다." #deepl:771559939
 gaudi.524.t: "멋진 공원" #deepl:3707211248
 gaudi.524.d: "[ROOT.GetCountry.GetCapital.GetCityHubName]의 새로운 공원이 완공되어 이제 모든 시민이 산책할 수 있도록 개방되었습니다." #deepl:2209166008
 gaudi.524.f: "새로운 슈타트파크의 문이 열립니다. 잔디밭이 벨벳처럼 구른다. 화단과 조각상 사이로 구불구불한 길이 이어집니다. 하지만 사람들을 가장 매료시키는 것은 잔디가 아니라 소리입니다. 밴드 스탠드, 작은 오케스트라, 산들바람을 타고 흐르는 왈츠. 한때는 살롱과 궁전에서만 들을 수 있었던 대중 음악이 이제 모든 사람이 들을 수 있도록 공기를 가득 채웁니다. 비엔나와 같은 도시에서 쿠르살론은 시민을 위한 선율의 신전이 되었습니다. 이탈리아 르네상스 양식의 웅장한 건물은 요하네스 가세에 위치해 있으며 공원에는 넓은 테라스가 있습니다. 슈트라우스 형제 시대에 쿠르살론은 춤과 콘서트를 위한 인기 있는 장소였어요." #deepl:556984663
 gaudi.524.g: "산책하러 가자." #deepl:3870101360
 gaudi.524.h: "콘서트로 축하해 주세요!" #deepl:3249539672
 gaudi.525.t: "오페라 확장" #deepl:3647447347
 gaudi.525.d: "[ROOT.GetCountry.GetCapital.GetCityHubName] 의 확장은 오페라를 현대화하고 확장할 수 있는 기회를 제공합니다." #deepl:1640821642
 gaudi.525.f: "대로와 아케이드, 분수대와 부처가 즐비한 가운데 기존 오페라 하우스는 소박하고 지방적인 느낌이 들기 시작합니다. 제안: 새로운 구조 또는 대규모 확장. 더 많은 좌석, 더 나은 음향, 기념비적인 파사드. 도시의 위상에 걸맞은 문화의 성전. 유럽 전역에서 이러한 제스처는 국가적 명성의 상징이 되었습니다. 파리에는 오페라 가르니에가 대리석 계단과 황금빛 천장으로 우뚝 솟아 있습니다. 비엔나에서는 1869년에 개관한 슈타츠오퍼가 링슈트라세에 우아함과 자부심으로 자리 잡고 있습니다." #deepl:2327891128
 gaudi.525.g: "오페라 하우스를 확장하세요." #deepl:4005131669
 gaudi.526.t: "마을회관 확장" #deepl:857877700
 gaudi.526.d: "[ROOT.GetCountry.GetCapital.GetCityHubName] 의 확장은 타운홀을 현대화하고 확장할 수 있는 기회를 제공합니다." #deepl:3575590115
 gaudi.526.f: "구 시청사는 여전히 다른 세기의 문장을 간직하고 있습니다. 내부에는 좁은 계단, 비좁은 사무실, 웨인스코팅보다 높게 쌓인 장부 등이 있습니다. 시장의 책상은 권력은 고사하고 서류 작업도 겨우 할 수 있을 정도의 크기입니다. 이제 제안할 것은 거버넌스, 경제, 시민 정체성에서 확대되고 있는 시의 역할을 반영하는 새로운 시청사 건립입니다. 우뚝 솟은 첨탑이든 절제된 고전주의든, 어느 쪽이든 권위를 상징해야 합니다. 유럽 전역의 도시들이 이 문제에 도전하고 있습니다. 비엔나에서는 네오 고딕 양식의 라트하우스(1883년 완공)가 도시 신뢰의 상징이 되었습니다. 파리는 1871년 이후 웅장하고 도전적인 모습으로 호텔 드 빌을 복원했습니다. 베를린의 로테 라트하우스는 르네상스 양식과 프로이센의 기능이 융합된 모습으로 등장했습니다." #deepl:2422046000
 gaudi.526.g: "마을 회관을 확장합니다." #deepl:5728920
 gaudi.527.t: "헬덴플라츠" #deepl:959071592
 gaudi.527.d: "헬덴플라츠(영웅의 광장)가 완공된 후, 일부 주요 정치인들은 이에 걸맞은 취임식을 추진하고 있습니다." #deepl:1468121085
 gaudi.527.f: "링슈트라세 건설 당시 프란츠 요제프 황제가 카이저포럼의 일환으로 '외부 부르크플라츠'를 설계했지만 완공되지는 못했습니다. 계획은 레오폴딘 윙, 뉴 호프부르크, 합스부르크 컬렉션, 그리고 볼크스가르텐 부지에 지어지지 않은 뉴 캐슬에 대응하는 직사각형 광장을 만드는 것이었습니다. 헬덴플라츠라는 이름은 1878년 안톤 도미닉 페르콘의 작품인 두 개의 승마 기념비에서 따온 것입니다. 더 오래된 것은 1860년에 제막된 카를 대공의 기념비입니다. 이에 대응하는 유진 왕자의 기마 동상도 1865년에 완성되었습니다. 제1차 세계대전 패전 후 합스부르크-로렌 왕조의 통치 아래 오스트리아-헝가리 이중 군주제가 붕괴되고 오스트리아 최초의 공화국이 건국된 후 헬덴플라츠는 모든 정치 진영의 집결지이자 오스트리아 군대의 퍼레이드 장소로 사용되었어요." #deepl:562832934
 gaudi.527.g: "퍼레이드를 열고 친구들을 초대하세요." #deepl:99539180
 gaudi.527.h: "향후 몇 년 동안 상설 군사 퍼레이드를 개최합니다." #deepl:3502479331
 gaudi.527.i: "그렇다면 이 모든 비용은 누가 부담해야 할까요?" #deepl:3263444788
 gaudi.528.t: "대학 확장" #deepl:2548530815
 gaudi.528.d: "[ROOT.GetCountry.GetCapital.GetCityHubName] 의 확장은 대학을 현대화하고 확장할 수 있는 기회를 제공합니다." #deepl:966048719
 gaudi.528.f: "생각 없는 위대한 도시란 무엇인가요? 철도, 부처, 극장이 즐비한 가운데 대학은 자체적인 성공에 부담을 느끼기 시작합니다. 너무 적은 강의실에 너무 많은 학생. 학과가 임대 건물에 흩어져 있습니다. 교수들은 도서관과 실험실 사이의 공간을 차지하기 위해 서로 다투고 있습니다. 새로운 캠퍼스 또는 대규모 확장, 즉 현대식 강의실, 전담 교수진, 기념비적인 도서관 건립을 제안합니다. 이러한 프로젝트는 단순한 인프라를 넘어 지적 야망의 선언입니다. 비엔나에서는 1870년대에 링슈트라세를 따라 웅장한 외관과 상징적인 중심성을 갖춘 대학이 이전 및 재건되었습니다. 파리의 소르본느는 쥘 페리의 개혁에 따라 프랑스의 성장하는 학문적 계층을 수용하기 위해 전면적으로 확장되었습니다." #deepl:3542359765
 gaudi.528.g: "대학을 확장합니다." #deepl:4228402238
 gaudi.529.t: "아트 아카데미 확장" #deepl:1188603187
 gaudi.529.d: "[ROOT.GetCountry.GetCapital.GetCityHubName] 의 확장은 미술 아카데미를 현대화하고 확장할 수 있는 기회를 제공합니다." #deepl:2971034584
 gaudi.529.f: "도시가 성장함에 따라 예술에 대한 욕구도 커지고 있습니다. 하지만 화가와 조각가들은 작은 작업실과 어두운 다락방에 모여 스승이 아닌 소문과 빌린 스케치를 통해 배웁니다. 제안: 빛이 가득한 아틀리에, 해부학적인 극장, 공개 전시회가 열리는 갤러리를 갖춘 제대로 된 미술 아카데미를 만들자는 것입니다. 유럽 전역에서 이러한 아카데미는 국가적 취향을 형성합니다. 파리의 에콜 데 보자르는 반 대륙에 고전적인 기준을 제시합니다. 비엔나에서는 아카데미 데어 빌덴덴 쿤스트의 웅장한 건물이 링슈트라세 거리의 문화적 명성을 상징합니다." #deepl:2427288221
 gaudi.529.g: "아카데미를 확장하세요." #deepl:3521772928
 gaudi.530.t: "우라니아" #deepl:3604286803
 gaudi.530.d: "우라니아와 함께 비엔나에 이른바 '인민 교육 센터'가 문을 열었는데, 그 정확한 목적은 아직 논란이 되고 있습니다." #deepl:2388110616
 gaudi.530.f: "1883년 독일의 천문학자 막스 빌헬름 마이어는 비엔나 대학교의 조교로서 과거와 미래의 일식을 계산하기 위해 비엔나에 왔습니다. 그는 또한 민속학 강의를 하고 민속 교육 기관에 대한 아이디어를 발전시켰습니다. 그러나 1885년 베를린으로 부름을 받은 이후에도 그는 그곳에서 자신의 아이디어를 계속 발전시켰습니다. 빈의 우라니아는 베를린의 우라니아를 모델로 하여 800명을 수용할 수 있는 공간과 200명을 수용할 수 있는 강의실, 과학 시연실, 천문대 등을 갖추고 있었습니다. 그러나 이 '임시' 우라니아는 방문객의 유입을 감당할 수 없었기 때문에 곧 링슈트라세에 새로운 건물이 필요하게 되었습니다. 우라니아는 어학 강좌 등 다양한 교육 기회를 확대했을 뿐만 아니라 자체 우라니아 심포니 오케스트라와 우라니아 합창단을 갖춘 콘서트 장소로도 활용되었습니다. 파격적인 모양과 구조는 비엔나에서 흔히 볼 수 있는 스캔들을 일으켰습니다. 하지만 비엔나 사람들은 이 건물을 좋아했고 우라니아는 곧 비엔나의 랜드마크 중 하나로 자리 잡았습니다." #deepl:2564552960
 gaudi.530.g: "건축적 랜드마크입니다." #deepl:631489671
 gaudi.530.h: "주로 엔터테인먼트 시설입니다." #deepl:1069754801
 gaudi.530.i: "무엇보다도 이곳은 전망대입니다." #deepl:2017455388

 gaudi.9.t: "도시 계획 완료" #deepl:1330111739
 gaudi.9.d: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] 오늘 중요한 지방 도시에서 [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] 도시 계획 작업을 완료했습니다. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] 이제 다시 완전히 사용할 수 있습니다." #deepl:60424068
 gaudi.9.f: "'건축은 무절제한 상상력이나 변덕스러운 공상이 아닌 상상력과 공상으로 가득 차서 모든 지적인 관찰자의 눈을 즐겁게 하고 시처럼 감성을 자극할 때까지 최고의 경지에 도달하지 못합니다.' - 헨리 반 브룬트 '건축은 상상력과 공상으로 가득 차서 모든 지적인 관찰자의 눈을 즐겁게 하고 시처럼 감정을 자극합니다. -헨리 반 브런트" #deepl:2388189232
 gaudi.9.g: "프로젝트는 많은데 시간은 부족합니다." #deepl:224764128

