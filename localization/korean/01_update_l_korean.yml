 gaudi.51.d: "[ROOT.GetCountry.GetName] 는 시대를 초월한 품격 있는 건축의 모범이 되었습니다. 이는 문명화된 전 세계에 경외심을 불러일으키는 지위입니다!" #deepl:1191503815
 gaudi.51.f: "'고대 걸작의 일반적이고 가장 뛰어난 특징은 궁극적으로 자세와 표현 모두에서 고귀한 단순함과 조용한 웅장함입니다.'\n- 요한 요아킴 빈켈만(Johann Joachim Winckelmann)" #deepl:3328862889
 gaudi.51.g: "이것이 진정한 예술의 본질입니다." #deepl:3736488828
 gaudi.52.t: "바우하우스의 승리" #deepl:1539285104
 gaudi.52.d: "[ROOT.GetCountry.GetName] 는 합리적이고 진보적인 건축의 등대가 되었습니다. 이는 전 세계의 존경과 찬사를 받는 지위입니다!" #deepl:1188995024
 gaudi.52.f: "'디자인은 직업이 아니라 태도입니다.'\n- 라슬로 모홀리-나기(László Moholy-Nagy)" #deepl:1692369698
 gaudi.52.g: "사치 대신 사람들의 필요!" #deepl:3765042267

 je_gaudi_bauhaus_architecture: "바우하우스 건축" #deepl:2452320752
 je_gaudi_bauhaus_architecture_reason: "바우하우스는 1919년부터 1933년까지 운영된 독일의 예술 학교로 공예와 순수 예술을 결합한 학교입니다. 이 학교는 대량 생산의 원칙과 기능에 중점을 두고 개인의 예술적 비전을 통합하려는 디자인 접근 방식으로 유명해졌습니다. 이는 궁극적으로 모든 예술이 통합된 종합 예술품(Gesamtkunstwerk)을 만들겠다는 생각에 기반을 두고 있었습니다. 바우하우스 스타일은 이후 현대 디자인, 모더니즘 건축, 건축 교육에서 가장 영향력 있는 흐름 중 하나가 되었습니다." #deepl:1381087306
 je_gaudi_neoclassical_architecture: "신고전주의 건축" #deepl:3915160230
 je_gaudi_neoclassical_architecture_reason: "20세기 초의 신고전주의는 그리스-로마 고대의 형식적 명료성, 대칭성, 웅장함을 되찾고자 했던 부흥주의 건축 및 예술 운동이었습니다. 역사주의의 과잉과 현대 미술의 추상화에 대한 대항으로 등장한 이 양식은 기념비성, 기하학적 질서, 전통 양식의 사용을 합리적이고 종종 국가가 승인한 관용구에서 강조했습니다. 이는 국가 정체성 및 시민 건축과 밀접한 관련이 있었으며 영속성, 권위, 절제된 아름다움의 이상을 투영했습니다." #deepl:2628512539
 je_gaudi_art_deco_architecture: "아르데코 건축" #deepl:2695214977
 je_gaudi_art_deco_architecture_reason: "아르데코 운동은 1920년대에 고전적 질서의 요소를 유지하면서 현대성을 수용한 장식 및 건축 스타일로 등장했습니다. 양식화된 형태, 풍부한 재료, 장식적인 기하학이 특징인 아르데코는 장인 정신의 화려함과 새로운 기계 미학을 결합한 것이 특징입니다. 산업, 속도, 이국주의에서 영감을 받은 모티프를 통해 기술 발전과 도시의 역동성을 기념했습니다." #deepl:2018331500

 je_gaudi_splendour_bauhaus: "바우하우스의 승리" #deepl:1539285104
 je_gaudi_splendour_bauhaus_reason: "바우하우스 정신이 도입되면서 건축가들은 장식과 환상을 없애고 명확성, 정확성, 재료에 대한 진실을 추구하기 시작했습니다. 더 이상 화려함을 통해 감동을 주거나 과거 제국의 웅장함을 연상시키는 것이 아니라 기능적이고 정직하며 현대적인 공간을 만들어 사회에 봉사하는 것이 목표가 되었습니다. 바우하우스는 단순한 미학이 아니라 건축과 일상 생활이 단순성, 유용성, 형태와 목적의 통일성을 통해 조화를 이루어야 한다는 신념에 바탕을 둔 디자인 철학입니다. 수도는 바우하우스 원칙을 채택함으로써 현대성뿐만 아니라 가장 순수한 형태의 진보, 즉 외관보다 기능을, 전통보다 혁신을 더 중시하는 것을 상징합니다." #deepl:3357423326
 je_gaudi_splendour_neoclassical: "신고전주의 부흥" #deepl:3536136445
 je_gaudi_splendour_neoclassical_reason: "신고전주의는 고대의 합리적인 조화와 기둥, 페디먼트, 대칭적인 레이아웃의 건축 문법에 뿌리를 둔 스타일입니다. 하지만 20세기 초에는 현대적인 건축 기술, 깔끔한 선, 기념비적인 규모로 재탄생했습니다. 이는 전통뿐만 아니라 공공의 삶과 법, 문화가 경외심과 단결을 불러일으키는 건물로 구성되는 미래에 대한 절제된 비전을 의미하기도 했습니다. 이러한 원칙을 수용하는 건축물은 우리 수도에 중후함과 웅장함을 부여하여 세계인의 눈에 질서, 회복력, 축적된 힘의 등대로 비춰질 것입니다." #deepl:605890088
 je_gaudi_splendour_art_deco: "아르데코의 꿈" #deepl:1198646901
 je_gaudi_splendour_art_deco_reason: "아르데코가 도입되면서 건축가들은 과거의 경직된 역사주의와 결별하는 등 예술계에 혁명을 일으켰습니다. 그러나 많은 근대 학교와 달리 그들의 건물은 단순한 기능성과 객관성을 표현한 것이 아니었습니다. 아르데코는 고전 모더니즘이 전반적으로 각성하는 가운데 발전한 것으로, 형태의 우아함, 재료의 귀중함, 색채의 강렬함, 주제의 관능성이 창의적으로 결합된 것이 특징입니다. 전성기에는 사치, 화려함, 풍요로움, 사회 및 기술 진보에 대한 믿음을 상징했습니다. 이러한 원칙을 존중하는 건축은 우리나라를 근대성과 부의 상징으로 만들었습니다." #deepl:980834049

