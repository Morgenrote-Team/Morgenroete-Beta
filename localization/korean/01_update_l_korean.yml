 douglas.104.t: "내 안의 산" #deepl:2079471330
 douglas.104.d: "5년간의 혹독한 등반과 훈련 끝에 [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] 이 돌아왔습니다." #deepl:862787273
 douglas.104.f: "산은 말이 없지만 가르침을 줍니다. 5년이라는 긴 시간 동안 산악인은 앞이 보이지 않는 눈, 무너져 내리는 암벽, 매서운 바람, 칼날보다 더 깊은 침묵에 맞서야 했습니다. 하지만 그 모든 고난은 지식을 근육으로, 인내심을 숨결로 새겼습니다. 야망으로 시작된 도전은 이제 기술로 단련되었습니다. 등반가는 돌의 소리를 듣고, 냄새로 폭풍을 예측하고, 눈을 감고 마음을 안정시키며 매듭을 묶는 법을 배웠습니다. [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetSheHe|U] 변화된 모습으로 돌아옵니다. 이것이 숙달의 시작입니다." #deepl:1510753382
 douglas.104.g: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetSheHe|U] 더 이상 산을 정복하지 않습니다-[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetSheHe] 이해합니다" #deepl:2453485277

