 gaudi.8.t: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetLastName]건축에 관한 논문" #deepl:1170819237
 gaudi.8.d: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U] 이론적 성찰이 풍부한 역사 및 현대 건축에 관한 논문( [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] )은 미래 세대의 건축가들에게 영향을 미칠 것입니다." #deepl:66798799
 gaudi.8.f: "'건축은 인류의 위대한 사상을 기록해 왔습니다. 모든 종교적 상징뿐만 아니라 모든 인간의 사상은 그 방대한 책에 한 페이지를 차지하고 있습니다. -빅토르 위고" #deepl:864116211
 gaudi.8.g: "후손을 위한 작품." #deepl:575316054

