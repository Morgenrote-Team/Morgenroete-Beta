 gaudi.81.d: "최근 몇 년 동안 [THIS.GetCountry.GetName] 건축 분야에서 선도적인 국가 중 하나로 부상했습니다. [ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] 이 발전에 중요한 역할을 했습니다. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] 고대, 중세 및 현대 시대의 위대한 경이로움에 필적할 기념물을 디자인하라는 의뢰를 수락했습니다." #deepl:2672646441
 gaudi.81.f: "건축가 기념비는 위대한 건축가가 선호하는 스타일을 기반으로 합니다.\n\n아트 데코 건축가가 [GetBuildingType('building_gaudi_people_monument').GetName].\n바우하우스 건축가가 [GetBuildingType('building_gaudi_forum_monument').GetName].\n신고전주의 건축가가 [GetBuildingType('building_gaudi_people_palace').GetName] 를 디자인합니다." #deepl:4088582525
 gaudi.81.g: "웅장합니다." #deepl:573443058

