 gaudi.11.t: "블루프린트 선택: 도시 기념비" #deepl:3177181239
 gaudi.11.d: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName]는 우리나라에서 가장 중요한 건축가로서 새 건물의 청사진을 설계하는 중요한 임무를 맡았습니다. 문제는 남아 있습니다: 어떤 건물을 설계해야 할까요?" #deepl:1652669912
 gaudi.11.f: "A [GetBuildingType('building_gaudi_statue').GetName] 는 정부의 #G 정당성을#! 높입니다. [GetTechnology('elgar_classicism_tech').GetName] 이 필요합니다.\nA [GetBuildingType('building_gaudi_fountain').GetName] 는 해당 주가 위치한 주의 #G 생활 수준을#! 향상시킵니다.\nA [GetBuildingType('building_gaudi_arch').GetName] 는 전투 병력의 사기를 #G 감소시킵니다#!. [GetTechnology('napoleonic_warfare').GetName] 이 필요합니다." #deepl:2246128148
