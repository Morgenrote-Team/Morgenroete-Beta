 pbi_publishing_industry_events.100.t: "좋아하는 것은 무엇이든"
 pbi_publishing_industry_events.100.d.1: "[ROOT.GetCountry.GetName]에서는 [SCOPE.sParty('target_party_1').GetName] 세력을 지지하는 신문, [SCOPE.sParty('target_party_2').GetName] 세력을 지지하는 신문, 급기야 [SCOPE.gsInterestGroup('target_ig_3').GetName] 세력을 위한 신문도 발행되어, 시민들로 하여금 자기 성향에 가장 알맞는 신문을 골라볼 수 있게 만들고 있다."
 pbi_publishing_industry_events.100.d.2: "[ROOT.GetCountry.GetName]에서는 [SCOPE.sParty('target_party_1').GetName] 세력을 지지하는 신문과 [SCOPE.sParty('target_party_2').GetName] 세력을 지지하는 신문이 발행되어, 시민들로 하여금 자기 성향에 가장 알맞는 신문을 골라볼 수 있게 만들고 있다."
 pbi_publishing_industry_events.100.d.3: "[ROOT.GetCountry.GetName]에서는 [SCOPE.gsInterestGroup('target_ig_1').GetName] 세력을 지지하는 신문, [SCOPE.gsInterestGroup('target_ig_2').GetName] 세력을 지지하는 신문, 급기야 [SCOPE.gsInterestGroup('target_ig_3').GetName] 세력을 위한 신문도 발행되어, 시민들로 하여금 자기 성향에 가장 알맞는 신문을 골라볼 수 있게 만들고 있다."
 pbi_publishing_industry_events.100.d.4: "[ROOT.GetCountry.GetName]에서는 [SCOPE.gsInterestGroup('target_ig_1').GetName] 세력을 지지하는 신문과 [SCOPE.gsInterestGroup('target_ig_2').GetName] 세력을 지지하는 신문이 발행되어, 시민들로 하여금 자기 성향에 가장 알맞는 신문을 골라볼 수 있게 만들고 있다."
 pbi_publishing_industry_events.100.f: "\"세상에서 가장 위대한 권리는 틀릴 권리라고 우린 믿는다. 사람들은 이 권리를 행사하면서 모든 주제와 인물에 대해 자신의 생각을 거침없이 표현할 수 있는 불가침의 권리를 가지며, 오직 그 권리를 남용한 경우에만 책임을 져야 한다.\"\n윌리엄 랜돌프 허스트"
 pbi_publishing_industry_events.100.a: "선택할 수 있어서 좋군"
 pbi_publishing_industry_events.100.b: "국민들은 신문들이 자신들을 대신해서 할 말을 해주는 점에 만족하나 보군."
 pbi_publishing_industry_events.105.t: "정부 홍보물"
 pbi_publishing_industry_events.105.d.1: "[SCOPE.sParty('target_party_2').GetName]의 [SCOPE.sCharacter('target_character_2').GetFullName](이)가 [SCOPE.sState('target_state').GetName]에서 발행되는 [SCOPE.sCharacter('target_character_1').GetFullName] 소유의 [SCOPE.sParty('target_party_1').GetName] 대상 일간지 [SCOPE.GetRootScope.GetCountry.GetCustom('pbi_newspaper_type')](이)가 정부 홍보물처럼 변질되었다며 비판하고 나섰다."
 pbi_publishing_industry_events.105.d.2: "[SCOPE.gsInterestGroup('target_ig_2').GetName]의 [SCOPE.sCharacter('target_character_2').GetFullName](이)가 [SCOPE.sState('target_state').GetName]에서 발행되는 [SCOPE.sCharacter('target_character_1').GetFullName] 소유의 [SCOPE.sParty('target_party_1').GetName] 대상 일간지 [SCOPE.GetRootScope.GetCountry.GetCustom('pbi_newspaper_type')](이)가 정부 홍보물처럼 변질되었다며 비판하고 나섰다."
 pbi_publishing_industry_events.105.d.3: "[SCOPE.sParty('target_party_2').GetName]의 [SCOPE.sCharacter('target_character_2').GetFullName](이)가 [SCOPE.sState('target_state').GetName]에서 발행되는 [SCOPE.sCharacter('target_character_1').GetFullName] 소유의 [SCOPE.gsInterestGroup('target_ig_1').GetName] 대상 일간지 [SCOPE.GetRootScope.GetCountry.GetCustom('pbi_newspaper_type')](이)가 정부 홍보물처럼 변질되었다며 비판하고 나섰다."
 pbi_publishing_industry_events.105.d.4: "[SCOPE.gsInterestGroup('target_ig_2').GetName]의 [SCOPE.sCharacter('target_character_2').GetFullName](이)가 [SCOPE.sState('target_state').GetName]에서 발행되는 [SCOPE.sCharacter('target_character_1').GetFullName] 소유의 [SCOPE.gsInterestGroup('target_ig_1').GetName] 대상 일간지 [SCOPE.GetRootScope.GetCountry.GetCustom('pbi_newspaper_type')](이)가 정부 홍보물처럼 변질되었다며 비판하고 나섰다."
 pbi_publishing_industry_events.105.f: "\"노동계급부터 상류계급에 이르기까지 온 국민이 자신의 이익을 추구하는 것은 명백하므로, 국가의 의지는 정부가 행사하여야 하며, 국민은 정부의 결정을 지지하고 협력할 의무가 있다는 점을 의심할 여지는 없다.\""
 pbi_publishing_industry_events.105.a: "그것 또한 언론의 역할이오."
 pbi_publishing_industry_events.105.b: "야당을 대변하는 신문도 있어야겠소."
 pbi_publishing_industry_events.110.t: "보도 우선권"
 pbi_publishing_industry_events.110.d: "[SCOPE.gsInterestGroup('target_ig').GetName] 세력에 속한 [SCOPE.sCharacter('target_character').GetFullName](은)는 자신의 신문이 정부 보도자료의 전달에 있어 우선권을 가져야 한다고 목소리를 높였다."
 pbi_publishing_industry_events.110.f: "\"무책임하고 도덕적으로 타락한 3대 언론에서 우리 정책을 더럽히기 전에, 대중에게 우리가 무엇을 할 계획인지를 정확하게 알려야 하오.\""
 pbi_publishing_industry_events.110.a: "우리는 올바르게 소통한다는 사명을 갖고 있다."
 pbi_publishing_industry_events.110.b: "그런 식의 편애는 받아들일 수 없네."
 pbi_publishing_industry_events.115.t: "새 법안을 지지하는 신문사"
 pbi_publishing_industry_events.115.d.1: "[SCOPE.sCharacter('target_character').GetFullName](이)가 발행인으로 나선 [SCOPE.sParty('target_party').GetName] 소속 일간지 〈[SCOPE.GetRootScope.GetCountry.GetCustom('pbi_newspaper_type')]〉에서 [SCOPE.sLaw('target_law').GetName] 법안을 연일 칭찬하는 기사를 내보냈으나 다른 신문에서는 지나치나치다고 비판했다."
 pbi_publishing_industry_events.115.d.2: "[SCOPE.sCharacter('target_character').GetFullName](이)가 발행인으로 나선 [SCOPE.gsInterestGroup('target_ig').GetName] 소속 일간지 〈[SCOPE.GetRootScope.GetCountry.GetCustom('pbi_newspaper_type')]〉에서 [SCOPE.sLaw('target_law').GetName] 법안을 연일 칭찬하는 기사를 내보냈으나 다른 신문에서는 지나치나치다고 비판했다."
 pbi_publishing_industry_events.115.f: "\"이 법안에 문제가 있다면 야당 의원들이 법안의 중요성을 제대로 알 것이라고 기대하기가 어려울 것이라는 점이다.\""
 pbi_publishing_industry_events.115.a: "우리가 제정하는 것이 곧 여론이다."
 pbi_publishing_industry_events.115.b: "법안의 문제점을 짚어내는 것이 언론의 역할이다."
 pbi_publishing_industry_events.120.t: "정치인 스캔들"
 pbi_publishing_industry_events.120.d: "[SCOPE.gsInterestGroup('target_ig').GetName] 소속 [SCOPE.sCharacter('target_character').GetFullName]의 스캔들을 보도하는 일부 신문에 맞서 해당 기사들은 허위 사실이자 명예 훼손이라고 주장했다."
 pbi_publishing_industry_events.120.f: "\"[SCOPE.sCharacter('target_character').GetLastName](이)가 지금의 존경받는 지위에 오르기 전에 어떤 사람들과 어울렸는가를 생각해 보면, 납치와 살인에 연루되었다는 사실은 놀랄 일도 아닐 것이다. 실제로 본지는 당시 [SCOPE.sCharacter('target_character').GetHerHim]와 잘 알던 사람을 만나 이야기를 나눌 수 있었다. 그 놀라운 이야기는 다음 기사에서 공개될 예정이다!\""
 pbi_publishing_industry_events.120.a: "이 기회를 활용하는 것이 좋겠다."
 pbi_publishing_industry_events.120.b: "[SCOPE.gsInterestGroup('target_ig').GetName] 전반에 해당될 문제다!"
 pbi_publishing_industry_events.125.t: "누구를 위한 신문인가?"
 pbi_publishing_industry_events.125.d: "[SCOPE.sState('target_state').GetName] 시민들은 신문이 정부 입맛에만 맞춰 기사를 쓴다고 여기고 있다."
 pbi_publishing_industry_events.125.f: "\"[SCOPE.sState('target_state').GetName]에서 발행되는 신문이 그렇게 많은데, [SCOPE.sCharacter('target_character').GetFullName](이)가 그 많은 신문의 주주여서 지면에 무얼 실을지도 좌우한다 하더이다. 신문들은 그 자의 입맛에만 맞춰서 기사를 낼 수 있을 뿐이오. 그런 의미에서 [SCOPE.sState('target_state').GetName]의 소식지는 단 하나에 불과하오.\""
 pbi_publishing_industry_events.125.a: "정보는 통제되어야 유의미한 법."
 pbi_publishing_industry_events.125.b: "저들은 주어진 것에 만족하지 않을 것이다."
 pbi_publishing_industry_events.200.t: "산타 할아버지는 정말로 있나요?"
 pbi_publishing_industry_events.200.d: "편집장님\n제 나이는 여덞 살이에요. 친구들이 산타가 없다고 하던데요.\n정말인지 말씀해 주세요. 산타 할아버지는 정말로 있나요?\n버지니아 오핸런 올림"
 pbi_publishing_industry_events.200.f: "그럼요, 버지니아. 산타 할아버지는 정말 있습니다. 할아버지가 틀림없이 있다는 것은 사랑과 관용과 헌신이 있는 것을 보면 알 수 있어요. 그것들이 친구의 나날에 최고의 아름다움과 기쁨을 선사한다는 것을 우리 친구도 잘 알고 있을 거에요.\n프랜시스 퍼셀러스 처치 (더 선)"
 pbi_publishing_industry_events.200.a: "신문도 가끔은 좋은 기사를 낼 때가 있는 것 같군."
 pbi_publishing_industry_events.200.b: "사랑과 관용이 나라를 부강하게 만들진 않지."
 pbi_publishing_industry_events.205.t: "유력 일간지가 저가 소식지를 비판하다"
 pbi_publishing_industry_events.205.d: "[ROOT.GetCountry.GetName]의 유력 일간지에서 [SCOPE.sState('target_state').GetName]의 저가 소식지(페니 프레스)가 선정적인 허위 사실로 독자들을 확보하고 있다고 비판에 나섰다."
 pbi_publishing_industry_events.205.f: "\"우리나라 대중적인 언론의 오만함이 날로 심해져 가고 있다. 이들이 싣는 기사라고는 정치인과 사교계 인사들에 대한 가십거리나 추문성 범죄와 재판에 대한 이야기뿐이다. 게다가 이런 기사들은 대부분 제대로 된 취재나 근거 없는 사실들을 날조한 것이다!\""
 pbi_publishing_industry_events.205.a: "참으로 개탄스러운 일이오."
 pbi_publishing_industry_events.205.b: "그래도 대중에게 독서를 가르치지 않았던가."
 pbi_publishing_industry_events.210.t: "불명예"
 pbi_publishing_industry_events.210.d: "[SCOPE.sState('target_state').GetName]의 저가 소식지가 [SCOPE.sCharacter('target_character').GetPrimaryRoleTitle|l] [SCOPE.sCharacter('target_character').GetFullName]의 추문을 보도하고 있는 가운데, 그 본인은 해당 보도가 허위 사실이자 명예훼손에 해당하므로 지면에서 내려 줄 것을 요청하고 있다."
 pbi_publishing_industry_events.210.f: "\"[SCOPE.sCharacter('target_character').GetLastName](이)가 지금의 존경받는 지위에 오르기 전에 어떤 사람들과 어울렸는가를 생각해 보면, 납치와 살인에 연루되었다는 사실은 놀랄 일도 아닐 것이다. 실제로 본지는 당시 [SCOPE.sCharacter('target_character').GetHerHim]와 잘 알던 사람을 만나 이야기를 나눌 수 있었다. 그 놀라운 이야기는 다음 기사에서 공개될 예정이다!\""
 pbi_publishing_industry_events.210.a: "이런 상황에서 보도의 진위 여부는 쟁점이 아니다."
 pbi_publishing_industry_events.210.b: "[SCOPE.sCharacter('target_character').GetLastName]의 명예를 회복해야 한다."
 pbi_publishing_industry_events.215.t: "짜깁기로 만든 신문"
 pbi_publishing_industry_events.215.d: "[SCOPE.sState('target_state').GetName] 지역의 저가 소식지마다 기사 표절이 횡행하고 있다."
 pbi_publishing_industry_events.215.f: "\"[SCOPE.sState('target_state').GetName] 언론들은 배고픈 하이에나를 보는 듯하다. 독자를 끌어모을만치 싶은 기사를 찾아내면 바로 자기네 지면에 실어버린다. 표절 없는 기사를 찾기란 어려운 일이다. 어떤 신문은 다른 신문의 사설을 그대로 갖다 쓸 정도였다!\""
 pbi_publishing_industry_events.215.a: "기사에 대한 보상은 그 기사를 쓴 사람에게 돌아가야지."
 pbi_publishing_industry_events.215.b: "좋은 기사는 널리 퍼뜨려야 해."
 pbi_publishing_industry_events.220.t: "흥미진진"
 pbi_publishing_industry_events.220.d: "잔혹한 살인 사건, 꼴사나운 부부 싸움, 진위 여부를 알 수 없는 스캔들. [SCOPE.sState('target_state').GetName] 시민들은 하루가 멀다하고 저가 소식지에 실리는 자극적인 이야기에 빠져들고 있다."
 pbi_publishing_industry_events.220.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('pbi_publishing_industry_flavor_220')]"
 pbi_publishing_industry_events.220.f.1: "\"오래된 정자에서 충격적인 발견이 이루어졌다. 그 건물의 주인은 보수공사를 위해 건축업자를 불렀다. 벽 일부를 철거한 인부들은 깜짝 놀랐다. 큼직한 지하실로 이어지는 통로가 드러났던 것이다. 인부들은 두려움에 떨며 지하실로 들어갔다. 타오르는 횃불에 두 시신의 유해가 뚜렷하게 보였다. 옷차림은 이백 년은 족히 넘은 채 뼈만 남아 있었다. 이웃 주민들은 다양한 정보를 전해 주었지만, 두 사람이 지하실에 갇혀 끔찍한 죽음을 맞이했는지, 아니면 어딘가에서 살해당한 뒤 이곳으로 옮겨져 은닉된 것인지 현재로서는 결론을 내리기 어렵다.\""
 pbi_publishing_industry_events.220.f.2: "\"평소에는 조용하던 마을이 그날 토요일 오후 엄청난 긴장감에 휩싸였다. 듣기로는 일곱 살 먹은 소녀가 끔찍하게 살해당했다는 소문이 돌았기 때문이다. 오후 한시 반쯤에는 어느 젊은 법률사무소 직원이 세 아이들에게 다가왔다. 그 직원은 소녀에게 동전 한 닢을 건네며 마을로 이어지는 골짜기나 오래된 길로 같이 가자고 했다. 다른 두 아이도 동전을 받고 그 남자를 따라가기로 약속했다. 그러나 소녀는 그 사람을 따라가기 싫다고 했다. 그러나 남자는 소녀의 손을 잡고 끌었고 소녀는 울음을 터뜨렸다. 일곱 시, 여덟 시가 다 되었음에도 소녀는 어디에서도 보이지 않자 이웃들은 소녀를 입에 올리기 시작했다. 농장에 들어간 주민들은 머지않아 실종된 소녀의 머리가 땅에 떨어진 것을 발견했다. 날카로운 잘로 잘린 것이 분명했고 얼굴은 입에서 귀까지, 그리고 왼쪽 관자놀이까지 큰 상처로 베여 있었다. 참으로 끔찍한 광경이었다. 사지가 절단된 시신의 각 부분이 농장 곳곳에 흩어져 있던 것이었다.\""
 pbi_publishing_industry_events.220.f.3: "\"한 노동자가 아내를 학대한 혐의로 기소되었다. 며칠 전 남편은 기다란 말 채찍을 들고 집에 와서 침대에 누워 있던 아내를 마구 후드려팼다. 당시 임신 7개월이었던 아내는 저항할 수 없었다. 남편은 침대 위로 올라가 아내를 발로 밟고 갈비뼈 세 개를 부러뜨렸다. 중상을 입은 아내는 병원으로 이송되었다. 첫번째 심리에서 피고는 아내가 술을 마시는 버릇이 있어서 그랬다고 중얼거렸다. 판사는 남편에게 1주일의 구류형을 선고하였다.\""
 pbi_publishing_industry_events.220.f.4: "\"스물 세살 먹은 소작농의 아들이 부모와 형제자매 다섯, 하녀 한 명을 상상 이상의 잔혹한 방식으로 살해하였다. 아들의 자백은 살해 동기와 방법을 설명하는 것에 그쳤으며 뉘우치는 기색은 보이지 않았다. 이 남자는 여섯 피트(1.8m) 길이의 금색 지렛대를 들고 동생들을 차례대로 뒤에서 내리쳐 죽였다. 그 다음은 아버지 차례였다. 아들은 소가 도망쳤다고 거짓말을 하고는 현관문을 나서기를 기다려 들판 앞에서 지렛대를 내리쳐 죽였다고 진술했다. 아버지의 시신은 수레에 싣고 집 뒤편으로 옮긴 뒤, 핏자국을 감추려 흙을 파헤쳤다. 그리고는 자기 방으로 들어가 동생들을 마저 살해했다. 어머니는 도끼에 맞아 바닥에 쓰려졌다. 여동생은 어머니를 도우려고 침대에서 뛰쳐나왔으나 칼에 찔리고 도끼에 맞아 숨을 거뒀다. 마침내 남자는 하녀의 방으로 달려가 어둠 속에서 더듬거린 끝에 하녀의 침대에 도끼를 두 차례 휘둘렀다. 하녀는 소리 한번 내지 못하고 죽음을 맞이했다. 남자는 재판을 받고 사형 선고를 받았다. 범인은 놀라울 정도로 침착한 모습으로 법정을 떠났다.\""
 pbi_publishing_industry_events.220.f.5: "\"리드 스트리트에 거주하는 존 보티가 술에 취해 부모에게 폭력을 휘두른 혐의로 기소되었다. 존은 38세의 문제아였는데 아버지는 93세, 고발자의 어머니는 88세였으며, 이전에도 술에 취해 부모에게 폭력을 행사한 적이 여러 차례 있었다고 한다. 어머니는 아들을 안쓰럽게 여겨 차마 감옥으로 보낼 수 없다고 한다.\""
 pbi_publishing_industry_events.220.f.6: "\"타운젠드 부인이 '애들 머리를 감겨주겠다'며 남편에게 브랜디 한 병을 사겠다고 2실링을 달라고 했다. 남편은 아내를 믿지 못하고 거절했다. 브랜디를 사다 놓으면 애들 머리가 아니라 자기 뱃속으로 털어넣을 것이라고 생각했기 때문이다. 이에 두 사람은 부부 싸움을 시작했고, 화가 난 아내는 남편을 집밖으로 쫓아냈다. 밤에 남편이 집으로 돌아오니 아내는 입에 담기도 힘들 정도로 엉망진창인 모습이었다. 남편이 크게 꾸짖자 타운젠드 부인은 집게를 집어 남편의 머리를 내리쳤다. 남편도 가만있지 않고 아내를 두들겨 팼다. 결국 두 사람 모두 유죄 판결을 받았다.\""
 pbi_publishing_industry_events.220.f.7: "\"수잔 버크, 일명 '숙소 없음 부인'은 석달 동안 집 없이 지냈다. 담당 판사는 수잔에게 집이 필요하다고 판단하고 6개월 동안 머물 집을 제공하였다.\""
 pbi_publishing_industry_events.220.a: "이런 아우성이야말로 우리의 힘이다."
 pbi_publishing_industry_events.220.b: "우리는 단정한 모습을 되찾아야 한다."
 pbi_publishing_industry_events.225.t: "천문학계의 대발견"
 pbi_publishing_industry_events.225.d: "[SCOPE.sState('target_state').GetName]의 저가 소식지 〈더 선〉지에서 아프리카의 희망봉에 있는 관측소에서 완전히 새로운 원리로 작동하는 초대형 망원경을 이용해 놀라운 발견을 이뤄냈다고 보도했다."
 pbi_publishing_industry_events.225.f: "\"존 허셜은 이 초대형 망원경을 사용하여 달에 있는 것들을 뚜렷하게 관측할 수 있었다. 그 결과 달에는 생명체가 존재한다는 사실을 입증하고, 생명체가 존재한다는 우주의 법칙을 밝혀낼 수 있었다.\""
 pbi_publishing_industry_events.225.a: "우린 혼자가 아니었군!"
 pbi_publishing_industry_events.226.t: "이름하여 인간박쥐"
 pbi_publishing_industry_events.226.d: "[SCOPE.sState('target_state').GetName]의 저가 소식지 〈더 선〉에서 달에서 발견된 생명체에 대해 후속 보도를 내놓았고, 독자들은 그 놀라운 내용에 오싹함을 느꼈다. "
 pbi_publishing_industry_events.226.f: "\"갑자기 커다란 날개 달린 생명체가 절벽에서 평원으로 천천히 내려오는 것을 보았다. 날개가 박쥐의 것과 매우 흡사한 것을 똑똑히 볼 수 있었다. 날개는 반투명한 막으로 된 둥근 것으로 등에서 튀어나와 있었는데 참으로 거대한 구조였다. 그들 중에는 서로 마주보고 손과 팔을 크게 움직이는 이들이 있어, 몸짓으로 소통하고 있음을 확실히 보여주었다. 천문학계에서는 이 예기치 못한 새로운 생명체의 이름을 베스페르틸리오 호모, 우리말로 인간박쥐로 명명하였다. 이 생명체는 암수의 특성을 모두 갖고 있었으며 우리는 그 습성을 자세히 관찰하였다. 저들이 순수하고 행복한 생명체라는 점에는 의심할 여지가 없지만, 자신들끼리 즐기는 방식은 지구의 예절로서는 과격하다고 할 수 있었다.\""
 pbi_publishing_industry_events.226.a: "그 이야기가 사실이라면 역대급으로 놀라운 사실이로군!"
 pbi_publishing_industry_events.227.t: "사실이냐 거짓이냐, 그것이 문제인가"
 pbi_publishing_industry_events.227.d: "[SCOPE.sState('target_state').GetName]의 저가 소식지 〈더 선〉지가 보도한 달에서 생명체를 발견했다는 소식이 과학자와 지식인 모두를 비롯하여 미국 전역을 통틀어 화두에 올랐다. "
 pbi_publishing_industry_events.227.f: "\"지식인들과 지역 구독자들은 전례 없던 열의와 신뢰로 뉴욕에서 건너오는 우편물을 애타게 기다리고 있습니다. '존 허셜의 위대한 발견에 대해 들어보셨습니까? 인간이 달에서 발견되었다는 것을 알고 계셨는지요?' 이런 똑같은 질문을 가는 곳마다 받았습니다. 그땐 모든 사람이 그 소식에 빠져들었죠. 그 내용이 사실인지 아닌지는 그 누구도 생각하지도 거론하지도 않았습니다.\"\n예일대의 어느 학생"
 pbi_publishing_industry_events.227.a: "설령 거짓이라 하더라도 그 기자는 그만한 명예를 누릴 만하다."
 pbi_publishing_industry_events.230.t: "조지 워싱턴의 유모"
 pbi_publishing_industry_events.230.d: "[SCOPE.sState('target_state').GetName] 언론마다 자신이 조지 워싱턴의 유모였다고 주장하는 조이스 헤스라는 흑인 여성에 대해 보도하고 있다."
 pbi_publishing_industry_events.230.f: "\"이 노파의 나이는 무려 161살이다. 여기에는 의심의 여지가 없다. 설령 500살이라 했어도 의문을 가질 사람은 없다. 더군다나 공연 기획자인 P.T. 바넘은 그에 대한 증거로 이 할머니가 노예였을 때 받았던 매매계약서를 제시하였다. 계약서의 연도는 1727년으로 되어 있고, 조이스 헤스가 54살 때 조지 워싱턴의 아버지인 오거스틴 워싱턴에게 팔렸다고 적혀 있었다.\""
 pbi_publishing_industry_events.230.a: "세상은 놀라움으로 가득하군!"
 pbi_publishing_industry_events.235.t: "네스호의 괴물"
 pbi_publishing_industry_events.235.d: "[SCOPE.sState('target_state').GetOwner.GetName] [SCOPE.sState('target_state').GetName]의 네스호에서 미확인 생명체를 목격했다는 이야기가 연일 보도되며 일면을 장식하고 있다."
 pbi_publishing_industry_events.235.f: "\"발네인 마을에 거주하는 매켄지 박사는 통나무 내지는 뒤집힌 배처럼 생긴 물체가 물결을 일으키며 처음에는 천천히 움직이다 점차 속도를 높여 물 속으로 사라지는 것을 목격했다고 진술하였다.\""
 pbi_publishing_industry_events.235.a: "세상은 놀라움으로 가득하군!"
 pbi_publishing_industry_events.236.t: "네스호의 기묘한 구경거리"
 pbi_publishing_industry_events.236.d: "[SCOPE.sState('target_state').GetOwner.GetName] [SCOPE.sState('target_state').GetName]의 네스호에서 미확인 생명체를 목격했다는 이야기가 연일 보도되며 일면을 장식하고 있다."
 pbi_publishing_industry_events.236.f: "\"애브리아칸에 거주하는 석공 알렉산더 맥도널드는 그날 네스호 연안에서 약 50야드(45m) 떨어진 곳에서 큼직한 몸뚱이에 땅딸만한 발을 가진 괴수가 나타나는 것을 목격했다고 한다.\""
 pbi_publishing_industry_events.236.a: "세상은 놀라움으로 가득하군!"
 pbi_publishing_industry_events.237.t: "의사의 사진"
 pbi_publishing_industry_events.237.d: "[SCOPE.sState('target_state').GetOwner.GetName] [SCOPE.sState('target_state').GetName]의 네스호에서 정체 불명의 생명체가 사진으로 포착되어 각 언론의 일면을 장식하고 있다."
 pbi_publishing_industry_events.237.f: "\"네스호의 미확인 생명체 목격담을 둘러싼 논란은 오랫동안 계속되어 왔지만, 런던의 산부인과 의사인 로버트 케네스 윌슨이 촬영한 이 사진은 그 논란에 종지부를 찍고 네스호의 괴물이 여전히 그곳에 살고 있다는 반박할 수 없는 증거를 제공하고 있다.\""
 pbi_publishing_industry_events.237.a: "세상은 놀라움으로 가득하군!"
 pbi_publishing_industry_events.240.t: "코팅리의 요정들"
 pbi_publishing_industry_events.240.d: "[SCOPE.sCountry('target_country').GetName] [SCOPE.sState('target_state').GetName]의 코팅리 마을에서 어린 소녀와 요정이 함께 놀고 있는 사진이 포착되었다."
 pbi_publishing_industry_events.240.f: "\"[SCOPE.sCountry('target_country').GetName]에서 놀라운 사진이 찍혔다. 신지학회에서 공개한 이 사진은 요정이 어린 소녀와 함께 놀고 있는 모습이 분명히 담겨 있었다. 학회 측에서는 사진 전문가에게 진위 여부를 입증해달라고 의뢰하였으나 위조된 사진이 아니라는 결론을 내렸다. 소설가 아서 코난 도일은 심령론지에 그 사진이 초자연적 현상을 명증한 것이라 평했다.\""
 pbi_publishing_industry_events.240.a: "세상은 놀라움으로 가득하군!"
 pbi_publishing_industry_events.245.t: "영리한 한스"
 pbi_publishing_industry_events.245.d: "[SCOPE.sCountry('target_country').GetName]의 [SCOPE.sState('target_state').GetName] 마을에서 산수와 달력 계산을 할 줄 아는 말이 있어 화제가 되고 있다."
 pbi_publishing_industry_events.245.f: "\"한스에게 물었다. '8일이 화요일이면, 금요일은 몇 일인가?' 그러자 한스는 발굽을 11번 두드려 답했다. 독일 교육위원회는 수의사, 동물원장, 기병장교로 구성된 13인의 조사위원회를 결성하여 이 놀라운 말을 조사하기 시작했다. 그리고 한스의 행동에는 어떠한 속임수도 없었다는 결론을 내렸다.\""
 pbi_publishing_industry_events.245.a: "세상은 놀라움으로 가득하군!"
 pbi_publishing_industry_events.246.t: "지혜의 비밀"
 pbi_publishing_industry_events.246.d: "심리학자 오스카 풍스트가 [SCOPE.sCountry('target_country').GetName]에서 화제몰이를 하고 있는 영리한 말 한스의 비밀을 밝혀냈다."
 pbi_publishing_industry_events.246.f: "\"질문자가 답을 모를 때 한스는 정답을 거의 맞추지 못했다. 또 한스가 발굽으로 툭툭 두드리는 횟수가 정답에 가까워질수록, 질문자의 얼굴 표정과 몸짓에 긴장감이 드러나다가 정답에 다다르는 순간 긴장이 풀리는 공통점이 있음을 발견했다. 이를 통해 풍스트는 한스가 질문자의 신체적 신호를 정답의 단서로 이용하고 있다는 결론을 내렸다.\"\n주변 환경의 반응을 감지하고 관찰자의 기대에 반응하는 한스의 이러한 행동을 '영리한 한스 효과'라고 부르며, 오늘날에도 경찰견의 후각 탐지에서 비슷한 현상이 관찰되고 있다."
 pbi_publishing_industry_events.246.a: "영리한 한스는 정말로 영리한 거였군!"
 pbi_publishing_industry_events.250.t: "휘파람 부는 소년"
 pbi_publishing_industry_events.250.d: "[SCOPE.sState('target_state').GetName]의 일간지에 실린 작은 허위 기사가 독자들을 재미있게 만들고 있다."
 pbi_publishing_industry_events.250.f: "\"버몬트에 사는 한 소년은 혼자 일하는 데 익숙해서 주변에 아무도 없는 것을 확인하고 휘파람을 불기 시작했다. 휘파람을 엄청나게 크고 작은 소리로 불고, 심지어 완전히 의식을 잃고 잠들 때에도 불고, 입과 가슴, 폐가 절로 함께 움직이며 불었다. 소년을 걱정한 어머니는 서둘러 조치에 나섰다. 다른 소년에게 항상 곁에 있어 달라 부탁하고, 휘파람이 시작되면 자신을 때리라 하였다.\""
 pbi_publishing_industry_events.250.a: "세상은 놀라움으로 가득하군!"
 pbi_publishing_industry_events.300.t: "언론의 효과"
 pbi_publishing_industry_events.300.d: "[ROOT.GetCountry.GetName]에서는 [concept_upper_strata]부터 [concept_lower_strata]까지 모든 국민이 신문을 읽는다. 국민들은 신문을 통해 멀리 떨어진 외국 간의 긴장된 사건부터, 동네 매춘부의 기묘한 살인 사건에 이르기까지 다양한 뉴스를 접한다."
 pbi_publishing_industry_events.300.f: "\"이런 관점에서 볼 때, 그토록 조롱받는 신문은 한가지 실질적인 공헌을 했다고 할 수 있다. 바로 사람들에게 읽는 법을 가르치고 인쇄본의 맛을 알게 해 준 것이다.\"\n에밀 졸라"
 pbi_publishing_industry_events.300.a: "신문이 정치적 역할을 수행한다는 점에 주목해야 한다."
 pbi_publishing_industry_events.300.b: "신문은 사람들에게 즐거움을 주는 데서 위대한 가치를 지닌다."
 pbi_publishing_industry_events.305.t: "획기적인 인쇄기"
 pbi_publishing_industry_events.305.d: "[SCOPE.sCountry('target_country').GetName]의 [SCOPE.sCharacter('target_character').GetFullName](이)가 [SCOPE.gsInterestGroup('target_ig').GetName] 모임에서 선보인 신형 인쇄기의 성능이 탁월하다는 호평을 받고 있다."
 pbi_publishing_industry_events.305.f: "이 인쇄기는 회전식으로, 원통형으로 휘어진 활판을 회전시킨 뒤 용지를 집어넣어 인쇄하는 방식을 채택하여, 시간당 8,000본을 인쇄할 수 있어 기존 인쇄기보다 훨씬 빠른 성능을 보인다."
 pbi_publishing_industry_events.305.a: "정말 대단하군."
 pbi_publishing_industry_events.305.b: "이런 도움은 필요 없다."
 pbi_publishing_industry_events.310.t: "신문사 창설 계획"
 pbi_publishing_industry_events.310.d.1: "[SCOPE.sCharacter('target_character').GetFullName](이)가 [SCOPE.sState('target_state').GetName]에 신문사를 처음 설립할 전망이다.\n해당 신문은 [SCOPE.gsInterestGroup('target_ig').GetName](을)를 대상으로 발행될 예정이다."
 pbi_publishing_industry_events.310.d.2: "[SCOPE.sCountry('target_country').GetName]의 [SCOPE.sCharacter('target_character').GetFullName](이)가 [SCOPE.sState('target_state').GetName]에 신문사를 처음 설립할 계획이다.\n이것으로 [SCOPE.sCountry('target_country').GetName]와의 관계에 큰 영향이 있을 전망이다."
 pbi_publishing_industry_events.310.f: "\"[SCOPE.sState('target_state').GetName]에서 신문을 발행하자는 발상을 처음 이루게 된 동기는 우선 여러 지역사회의 상업적 수요와 관련이 있었다. 이 발상이 폭넓은 공감을 얻었다는 것은 창간 계획에 대한 반응으로 충분히 입증되었다.\" - \n광고주"
 pbi_publishing_industry_events.310.a: "좋은 생각이야."
 pbi_publishing_industry_events.310.b: "저들에게 목소리를 높일 기회를 주어서는 안 된다."
 pbi_publishing_industry_events.315.t: "신문의 논평"
 pbi_publishing_industry_events.315.f: "\"본지의 현명한 독자분들께서도 동의하시리라 생각하지만, 저들의 주장에는 어떠한 근거도 없고 본지를 공격하기 위한 갖은 거짓과 허위 사실에 지나지 않는다. 저들의 신문은 먼지 쌓인 종이에 불과할 따름이다!\""
 pbi_publishing_industry_events.315.c: "신문사들이 굳이 일을 크게 벌이고 있는 듯 하군."
 pbi_publishing_industry_events.320.t: "발행 금지"
 pbi_publishing_industry_events.320.d: "법원에서 반정부 기사를 반복적으로 내보낸 [SCOPE.sState('target_state').GetName] 지역 일간지 〈[SCOPE.GetRootScope.GetCountry.GetCustom('pbi_newspaper_type')]〉의 정간 명령을 내렸다."
 pbi_publishing_industry_events.320.f: "피고 측은 어떠한 정치적 권위도 없는 상황에서 신문을 이용하여 정부를 악의적으로 비판하고 국가를 파멸로 이끌 악마의 속삭임을 대중에게 전하고 있다."
 pbi_publishing_industry_events.320.a: "정의가 실현되었군."
 pbi_publishing_industry_events_320_tt.1: "[SCOPE.sState('target_state').GetName]의 [GetBuildingType('building_manzoni_publishing_industry').GetName]가 1년 동안 비활성화됩니다."
 pbi_publishing_industry_events_320_tt.2: "[SCOPE.sState('target_state').GetName]의 [GetBuildingType('building_manzoni_publishing_industry').GetName]가 6개월 동안 비활성화됩니다."
 pbi_publishing_industry_events.320.b: "징계 처분은 최소화해야 한다."
 pbi_publishing_industry_events.325.t: "신문 배달 소년들의 파업"
 pbi_publishing_industry_events.325.d: "[SCOPE.sState('target_state').GetName]의 신문 배달 소년들이 신문사에 더 나은 처우를 요구하며 대대적인 파업을 벌이기 시작했다."
 pbi_publishing_industry_events.325.f: "\"친구와 동료 노동자들이여, 지금은 사람의 마음을 시험할 시기다. 이럴 때일 수록 우리는 똘똘 뭉쳐야 한다... 우리는 원하는 것을 잘 알고 있고, 설령 눈이 멀더라도 그것을 쟁취할 것이다.\"\n- 루이스 '키드 블링크' 발레티"
 pbi_publishing_industry_events.325.a: "이런 부조리는 바로잡아야 한다."
 pbi_publishing_industry_events.325.b: "파업인데 뭐, 그게 어때서?"
 pbi_publishing_industry_events.330.t: "매춘부 살인 사건"
 pbi_publishing_industry_events.330.d: "[SCOPE.sState('target_state').GetName] 지역 신문들이 젊은 매춘부의 살인 사건을 선정적으로 보도하여 큰 주목을 받고 있다.\n개중에는 진범과의 가짜 대담을 지면에 실은 신문도 있다."
 pbi_publishing_industry_events.330.f: "\"23세 매춘부 헬렌 주엣의 시신이 사창가에서 발견되었다. 시신은 침대 위에서 완전히 불에 탄 상태였으며, 범인은 피해자를 도끼로 세 차례 내려찍은 뒤 불을 지른 것으로 보인다.\n경찰은 피해자의 마지막 손님이었던 19세 남성 리처드 P. 로빈슨을 용의자로 체ㅗ했다. 용의자는 혐의 부인에 나섰으며 재판은 두 달 후로 예정되어 있다.\""
 pbi_publishing_industry_events.330.a: "흥미롭군."
 pbi_publishing_industry_events.331.t: "편중된 재판"
 pbi_publishing_industry_events.331.d: "헬렌 주엣 살인 혐의로 체포된 리처드 P. 로빈슨의 재판이 [SCOPE.sState('target_state').GetName] 법원에서 시작되었다. 언론에서는 노동계층 출신인 주엣에게 동정심을 보이는 측과 매춘부에게는 동정할 가치가 없다고 주장하는 측으로 엇갈려 열띤 논쟁을 벌이고 있다. 그러나 재판은 순식간에 끝났다."
 pbi_publishing_industry_events.331.f: "\"제시된 모든 증언과 증거가 피고의 유죄를 드러내고 있음에도 판사는 증인 대다수가 매춘부라는 점을 들어 배심원들에게 증언을 무시하라고 지시하였다. 그 결과 피고는 30분도 되지 않아 무죄 판결을 받았다!\""
 pbi_publishing_industry_events.331.a: "이런 걸 어떻게 공정한 재판이라 할 수 있겠는가?"
 pbi_publishing_industry_events.331.b: "앞날이 창창한 젊은이의 삶이 매춘부의 삶과 같다고 할 수 있겠나?"
 pbi_publishing_industry_events.335.t: "연쇄 살인"
 pbi_publishing_industry_events.335.d: "[SCOPE.sState('target_state').GetOwner.GetName]의 [SCOPE.sState('target_state').GetName] 시 교외에서 발생한 연쇄살인 사건의 범인이 검거되었다. 조금씩 밝혀지는 잔혹한 범행 수법과 동기가 엄청난 파문을 일으키고 있다."
 pbi_publishing_industry_events.335.f: "\"파리 교외의 어느 밭에서 일하던 노동자가 여자와 다섯 아이의 시신을 땅 속에서 발견했다. 여성은 30군데 이상의 자상을 입었고, 아이들은 목이 베어거나, 졸리거나, 배가 갈라지는 등 다양한 수법으로 살해당했다. 이런 믿을 수 없을 정도로 잔혹한 살인 사건의 범인은 장바프티스트 트로프만이라는 정비공이었다. 범인은 아내의 불륜을 의심한 남편의 사주를 받아 살인을 저질렀다고 자백했다. 남편 장캥크는 행방이 묘연한 상태며 경찰은 아직 그를 수색하고 있는 상황이다.\""
 pbi_publishing_industry_events.335.a: "악마나 할 법한 짓이로군!"
 pbi_publishing_industry_events.336.t: "공개 처형"
 pbi_publishing_industry_events.336.d: "[SCOPE.sState('target_state').GetOwner.GetName]의 [SCOPE.sState('target_state').GetName] 시 교외에서 벌어진 연쇄 살인의 범인에 대한 단두대 공개 처형이 거행되어 수많은 구경꾼들이 모여들었다."
 pbi_publishing_industry_events.336.f: "\"경찰 측은 주요 증인으로 행방을 뒤쫓전 희생자의 남편이 사망한 것을 발견하였다. 트로트만은 자신의 증언이 거짓이었음을 인정하고, 처음부터 장캥크의 재산을 강탈하기 위해 살인을 저질렀다고 증언했다.\""
 pbi_publishing_industry_events.336.a: "동정할 가치도 없다."
 pbi_publishing_industry_events.340.t: "전신줄에 목 매인 범인들!"
 pbi_publishing_industry_events.340.d: "[SCOPE.sState('target_state').GetName]애서는 범죄자 [SCOPE.sState('target_state').GetOwner.GetName](이)가 열차로 탈주했다가 체포되었는데, 도주했던 역에서 전신을 보낸 것이 성공의 요인이었다고 알려져 큰 화제가 되었다."
 pbi_publishing_industry_events.340.f: "'슬라우역에서 패딩턴역에 알림. 본 지역 솔트힐에서 살인 사건 발생. 목격자들은 용의자가 런던행 열차 1등석 표를 구입하고 오전 7시 42분 기차에 탑승한 것을 목격. 용의자는 퀘이커교도의 옷차림, 발목까지 내려오는 갈색 망토 착용. 같은 기차의 2등석 둘째 칸 맨 뒤의 두번째에 있음.'"
 pbi_publishing_industry_events.340.a: "과학의 승리로다."
 pbi_publishing_industry_events.400.t: "제4권력"
 pbi_publishing_industry_events.400.d: "[SCOPE.gsInterestGroup('target_ig').GetName]의 [SCOPE.sCharacter('target_leader').GetFullName](이)가 의회에서 언론을 '제4권력'이라 규정하며 경종을 울렸다."
 pbi_publishing_industry_events.400.f: "\"이제 우리 사회에는 왕족과 성직자, 귀족, 일반 시민을 합친 것보다 더 강력하고 영향력 있는 제4권력이 존재하오. 그것은 바로 언론이오.\n그 힘은 막강하지만, 한 국가를 파멸시킬 수도, 번영시킬 수도 있소. 국가 권력은 언론의 자유를 보장해야 하지만, 국가가 올바르게 할 때에만 가능하다는 것은 아무리 강조해도 지나침이 없소!\""
 pbi_publishing_industry_events.400.a: "어떻게 통제할 수 있겠나, 어쩌면 그들 스스로도 통제할 수 없는 것을!"
 pbi_publishing_industry_events.400.b: "모든 것에는 굳은 약속이 필요하지."
 pbi_publishing_industry_events_400_tt: "다음은 국내의 모든 [GetBuildingType('building_manzoni_publishing_industry').GetName]에 대한 증보입니다."
 pbi_publishing_industry_events.405.t: "신문 발행인 체포"
 pbi_publishing_industry_events.405.d: "[SCOPE.sState('target_state').GetName] 지역 경찰서에서 반정부 기사를 반복적으로 내보낸 〈[SCOPE.GetRootScope.GetCountry.GetCustom('pbi_newspaper_type')]〉지의 발행인 [SCOPE.sCharacter('target_character').GetFullName] 씨를 체포하였다."
 pbi_publishing_industry_events.405.f: "\"투표권 있는 주권자들이여!\n여러분, 우리는 속았습니다!\n무력에 맞서 불굴의 힘으로 맞서시오!\n모든 공장을 폐쇄하고\n모든 회사를 폐쇄하고\n모든 증권 거래소를 폐쇄하고\n모든 극장을 폐쇄하시오!\n자부심 있는 공직자라면 사임하시오.\n모든 사람은 파업에 나서야 합니다.\n인민위원 에밀 드 지라르댕\""
 pbi_publishing_industry_events.405.a: "우리 언론들에게 본보기로 삼자."
 pbi_publishing_industry_events.405.b: "그 자는 법에 따라 보호받아야 한다."
 pbi_publishing_industry_events.405.c: "조금 진정하도록 하시오."
 pbi_publishing_industry_events.410.t: "신문 정간 조치"
 pbi_publishing_industry_events.410.d: "법원에서 정부를 계속해서 과도하게 비판하는 [SCOPE.sState('target_state').GetName] 지역 일간지에 대해 정간 명령을 내렸다."
 pbi_publishing_industry_events.410.f: "피고 측은 어떠한 정치적 권위도 없는 상황에서 신문을 이용하여 정부를 악의적으로 비판하고 국가를 파멸로 이끌 악마의 속삭임을 대중에게 전하고 있다."
 pbi_publishing_industry_events.410.a: "우리 언론들에게 본보기로 삼자."
 pbi_publishing_industry_events.410.b: "언론 자유는 마땅히 보장되어야 한다."
 pbi_publishing_industry_events.410.c: "모든 것에는 한계가 있기 마련."
 pbi_publishing_industry_events.415.t: "선정적인 소설"
 pbi_publishing_industry_events.415.d: "법원에서 [SCOPE.sState('target_state').GetName] 출판사가 발행한 연애 소설에서 지나치게 노골적이고 외설적인 부분들을 삭제하라는 판결을 내렸다."
 pbi_publishing_industry_events.415.f: "\"드디어 남자의 손이 여자의 @censored!@censored!@censored!@censored!를 @censored!@censored!@censored!@censored!하자, 그 기세로 @censored!@censored!하면서 @censored!@censored!@censored!@censored!@censored!@censored!@censored!@censored!하고 말았다. 여자는 @censored!@censored!@censored!@censored!에 @censored!@censored!@censored!@censored!하고, @censored!@censored!@censored!@censored!@censored!@censored!@censored!@censored!는 @censored!@censored!@censored!@censored!@censored!@censored!@censored!@censored!했던 것이다!\""
 pbi_publishing_industry_events.415.a: "예술은 타락할 뿐이다."
 pbi_publishing_industry_events.415.b: "이래서야 무슨 내용인지 알 수 없잖소!"
 pbi_publishing_industry_events.420.t: "국가 기밀 폭로"
 pbi_publishing_industry_events.420.d: "[SCOPE.sState('target_state').GetName] 지역 일간지 〈[SCOPE.GetRootScope.GetCountry.GetCustom('pbi_newspaper_type')]〉에서 특종으로 보도한 정보가 정부 관계자에만 알려져 있던 것으로 밝혀졌다."
 pbi_publishing_industry_events.420.f: "\"프랑스 신문사들은 구독자 수를 늘리기 위해 정치적 기밀을 떠벌리는 데 훨씬 더 보람을 느낀다.\"\n오노레 드 발자크, 《기자의 생리학》에서"
 pbi_publishing_industry_events.420.a: "관련자들을 즉각 배제하시오!"
 pbi_publishing_industry_events.420.b: "이 건은 건드리지 않는 것이 최선이다."
 pbi_publishing_industry_events.425.t: "법 개정의 목소리"
 pbi_publishing_industry_events.425.d: "[SCOPE.sState('target_state').GetName]의 대표 신문에서 [SCOPE.gsInterestGroup('target_ig').GetName]의 [SCOPE.sPoliticalMovement('target_movement').GetName] 주장을 지지하는 사설을 내보냈다."
 pbi_publishing_industry_events.425.f: "\"[SCOPE.gsInterestGroup('target_ig').GetName] 씨가 수년간 지지해 왔던 [SCOPE.sPoliticalMovement('target_movement').GetName]은 이 나라의 미래에 필요한 것임을 믿어 의심지 않는다.\""
 pbi_publishing_industry_events.425.a: "신문의 논지가 특정 집단의 선전에 활용되고 있군."
 pbi_publishing_industry_events.425.b: "이쪽도 언론으로 맞대응하자."
 pbi_publishing_industry_events.425.c: "정부의 관대한 모습을 보여줄 기회다."
 pbi_publishing_industry_events.430.t: "사회적 불안을 조장하는 언론들"
 pbi_publishing_industry_events.430.d.1: "[SCOPE.sState('target_state').GetName] 일간지 〈[SCOPE.GetRootScope.GetCountry.GetCustom('pbi_newspaper_type')]〉에서 [SCOPE.sState('target_state_2').GetName]의 [SCOPE.sBuilding('target_building').GetName]에서 벌어진 전염병 유행와 관련해 추측성 보도만 하고 있어 불필요한 사회적 불안을 조장하고 있다."
 pbi_publishing_industry_events.430.d.2: "[SCOPE.sState('target_state').GetName] 일간지 〈[SCOPE.GetRootScope.GetCountry.GetCustom('pbi_newspaper_type')]〉에서 [SCOPE.sState('target_state_2').GetName]의 [SCOPE.sBuilding('target_building').GetName]에서 벌어진 사고에 대해 추측성 보도만 하고 있어 불필요한 사회적 불안을 조장하고 있다."
 pbi_publishing_industry_events.430.d.3: "[SCOPE.sState('target_state').GetName] 일간지 〈[SCOPE.GetRootScope.GetCountry.GetCustom('pbi_newspaper_type')]〉에서 [SCOPE.sState('target_state_2').GetName]의 [SCOPE.sBuilding('target_building').GetName] 흉작 사태와 관련해 추측성 보도만 하고 있어 불필요한 사회적 불안을 조장하고 있다."
 pbi_publishing_industry_events.430.f.1: "\"본지의 특파원 보고에 따르면 전염병 발생으로 많은 노동자가 목숨을 잃거나 병에 걸렸고, 농장과 인근 마을은 폐허로 변했다고 한다. 농장을 운영하는 회사 임원들도 고국으로 돌아가기 시작했으며, 우리 삶에 미치는 영향도 불가피할 것이다.\""
 pbi_publishing_industry_events.430.f.2: "\"본지의 특파원 보고에 따르면 낙석으로 큰 사고가 벌어져 광산이 문을 닫았다고 한다. 광산을 운영하는 기업가들도 고국으로 돌아가기 시작했으며, 우리 삶에 미치는 영향도 불가피할 것이다.\""
 pbi_publishing_industry_events.430.f.3: "\"본지의 특파원 보고에 따르면 가뭄이 몇 달 동안 이어져 그 영향이 극심한 탓에 흉작으로 이어질 가능성이 매우 높을 것으로 전해진다. 식량 부족으로 우리 삶에 미치는 영향도 불가피할 것이다.\""
 pbi_publishing_industry_events.430.a: "그런 거짓을 용인하여서는 안 될 것이다."
 pbi_publishing_industry_events.430.b: "행동에 나설 차례가 왔다."
 pbi_publishing_industry_events.315.d.1: "[SCOPE.sState('target_state').GetName]에서 [SCOPE.sParty('target_party_2').GetName] 측을 지지하는 신문이 [SCOPE.sParty('target_party_1').GetName] 측을 지지하는 신문의 주장을 비판하면서 두 신문 간에 매일같이 격렬한 비난 공방이 벌어지고 있다."
