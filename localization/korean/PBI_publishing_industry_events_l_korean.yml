 pbi_publishing_industry_events.315.d.3: "[SCOPE.sState('target_state').GetName]에서 [SCOPE.gsInterestGroup('target_ig_2').GetName] 측을 지지하는 신문이 [SCOPE.gsInterestGroup('target_ig_1').GetName] 측을 지지하는 신문의 주장을 비판하면서 두 신문 간에 매일같이 격렬한 비난 공방이 벌어지고 있다."
 pbi_publishing_industry_events.315.a: "이런 논쟁에서 [SCOPE.gsInterestGroup('target_ig_1').GetName] 편을 드는 것이 더욱 설득력이 있군."
