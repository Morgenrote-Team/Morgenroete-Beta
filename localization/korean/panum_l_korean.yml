 panum.2000.t: "의학 학술회의 준비"
 panum.2000.d: "차기 국제 의학 학술회의를 우리나라에서 개최하기에 앞서, 이번에는 특정 질병을 회의에서 중점적으로 다룰 것인가에 관한 의문이 제기되었습니다."
 panum.2000.f: "의학 학술회의는 개최국이 특정 질병의 기술서를 하나 이상 확보하였을 경우 그 질병을 중점적으로 다룰 수 있습니다. 회의에서는 한번에 하나의 질병만 다룰 수 있습니다. 의사와 미생물학자는 추가적인 단서를 확보하여 본인의 연구 진척에 박차를 가할 수 있습니다. 통상적인 학술회의의 경우 각 참가국들은 자국의 학자 양성 진행도에 보너스를 부여받게 됩니다."
 panum.2000.g: "통상적인 의학 학술회의여야 합니다."
 panum.2001.t: "의학 학술회의"
 panum.2001.d: "우리 수도에서 전공의들의 국제 학술회의가 준비되고 있다. [ROOT.Var('panum_physician_var').GetCharacter.GetFullName](이)가 의장으로서 회의를 주재할 전망이다. [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_congress_title')]"
 panum.2001.f: "의학 학술회의는 의학 지식을 교류할 수 있는 완벽한 기회입니다. 이전에는 자국 내에서만 국한되었던 성과들이 이곳에서는 우호적인 분위기에서 공유가 이루어집니다. 의학 학술대회는 의사들이 주도하여 준비가 이루어지지만, 미생물학을 전공한 생물학자도 초청되어 병원체와 백신 분야의 지식을 공유할 수 있습니다. 특정 국가에 의사와 미생물학자가 모두 있다면 두 사람 모두 참석이 가능합니다."
 panum.2001.g: "초청장을 보냅시다!"
 panum.2002.t: "의학 학술회의 초청"
 panum.2002.d: "[SCOPE.sCountry('panum_congress_host_country').GetName]에서 의학계를 선도하는 국가들을 대상으로 자국의 수도에서 개최되는 국제 회의에 초청하였다. 의사와 미생물학자 모두가 초청 대상이다. [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_congress_title')]"
 panum.2002.g: "청진기와 현미경도 잘 챙겨 가시오!"
 panum.2003.t: "기술서와 치료법"
 panum.2003.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName] 박사가 [SCOPE.sCountry('panum_congress_host_country').GetName]에서 열리는 의학 학술회의에서 역학 분야의 획기적인 통찰력을 습득할 수 있는 특별한 기회를 갖게 되었다. 어떤 질병을 중점으로 삼아야 하는가?"
 panum.2003.f: "의학 학술회의의 참가국 가운데 어느 한 국가가 특정 질병의 기술서나 치료법을 확보하고 있다면, 그것들을 확보하지 못한 다른 국가에서는 학술회의를 통해 습득할 수 있습니다. 지식의 향상은 오직 한가지 질병을 대상으로 이루어집니다. 학술회의에서 새로운 지식을 얻을 수 없는 경우라도 통상적인 의학 지식을 쌓거나 의료 기술 발전을 이룩할 가능성은 여전합니다. 이를 위해서는 의사가 참석하는 것이 중요합니다."
 panum.2003.g: "동료 의사들로부터 통상적인 의학 지식을 얻어가는 것이 좋겠소."
 panum.2003.h: "콜레라"
 panum.2003.i: "결핵"
 panum.2003.j: "천연두"
 panum.2003.k: "발진티푸스"
 panum.2003.l: "황열병"
 panum.2003.m: "홍역"
 panum.2003.n: "성홍열"
