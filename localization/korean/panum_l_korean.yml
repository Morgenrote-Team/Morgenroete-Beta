 panum.2004.t: "병원체와 백신"
 panum.2004.d: "[SCOPE.sCountry('panum_congress_host_country').GetName]에서 열린 학술회의에 참석한 [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] 박사가 자신과 뜻을 같이 하는 사람들이 많을 뿐만 아니라, 미생물학 지식을 기꺼이 공유하려는 모습에 기쁨을 감추지 못하고 있다. 이제 남은 질문은 평소 궁금했던 질병 가운데 앞으로 더 자세히 알고 싶은 것은 무엇인가이다."
 panum.2004.f: "의학 학술회의의 참가국 가운데 어느 한 국가가 특정 질병의 병원체나 백신을 연구하였다면, 그것들을 연구하지 못한 다른 국가에서는 학술회의를 통해 습득할 수 있습니다. 지식의 향상은 오직 한가지 질병을 대상으로 이루어집니다. 학술회의에서 새로운 지식을 얻을 수 없는 경우라도 통상적인 의학 지식을 쌓거나 생물학 기술 발전을 이룩할 가능성은 여전합니다. 이를 위해서는 미생물학적 소양을 갖춘 생물학자가 참석하는 것이 중요합니다."
 panum.2004.g: "동료 생물학자들로부터 통상적인 생물학 지식을 얻어가는 것이 좋겠소."
 panum.2005.t: "의학계의 비전"
 panum.2005.d_general: "이번 학술대회에 참석한 의사와 생물학자들은 의대생 교육의 현대화와 개선을 중점으로 공동 선언문을 작성하였다."
 panum.2005.d_special: "학술회의의 주요 의제를 감안하여 의사와 생물학자들은 추후 수년 간 특정 질병의 퇴치에 온 노력을 다한다는 결의를 채택하였다."
 panum.2005.f: "의학 학술회의가 개막하면서 특정 주제가 주요 의제로 선정되면 참가국들은 물리학자나 미생물학자, 혹은 양쪽 전문가가 전원 참석했는지의 여부에 따라 해당 질병에 관한 추가 정보를 전달받습니다. 통상적인 학술회의라면 새로운 의료 인력 양성에 중점을 두게 됩니다."
 panum.2005.g: "유익한 자리였소."
 panum.2009.t: "의학 학술회의 종료"
 panum.2009.d: "[SCOPE.sCountry('panum_congress_host_country').GetName]에서 개최된 의학 학술회의가 어제 마무리되었습니다. 의사와 미생물학자는 수많은 연구 결과를 가지고 귀국길에 올랐다."
 panum.2009.f: "국제 의학 회의 (Congrès International de Médecine)는 1867년부터 1913년까지 정기적으로 개최된 일련의 국제 학술대회였습니다. 학술회의를 개최하자는 구상은 1865년 제3회 프랑스 의학 학술회의에서 제기되었습니다. 앙리 주트라크 교수는 전 세계의 의사와 외과의가 그해 파리에서 열리는 국제 박람회에 참석하고자 파리에 모인다는 사실을 이용하여 1867년에 국제 의학 학술회의를 개최할 것을 제안하였습니다."
 panum.2009.g: "뷔페는 입에 맞으셨습니까?"
 panum_surgeon: "외과의"
 panum_surgeon_desc: "외과의는 일상적인 의료 현장을 집안처럼 여기지만, 의학 연구나 해부학 논문 발표에도 유용합니다."
 panum_psychiatrist: "정신과의"
 panum_psychiatrist_desc: "정신과의는 정신 질환을 앓고 있는 사람의 상태 호전에 관심을 갖고 있으며, 해당 분야의 연구와 신규 치료법 개발을 주도하고 있습니다."
 panum_military_physician: "군의관"
 panum_military_physician_desc: "전장의 부상자들을 돌보는 업무에 특화된 의사이며, 특히 응급 처치 기술의 향상에 성과를 거둡니다."
 panum_yellow_fever: "황열병"
 je_panum_measles_description: "홍역 진단"
 je_panum_scarlet_description: "황열병 진단"
 je_panum_plague_description: "페스트 진단"
