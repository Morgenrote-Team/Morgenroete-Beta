 panum.840.t: "The Mystery of the Black Death"
 panum.840.d: "Doctor  [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] has written a comprehensive treatise on the causes, transmission and measures against the plague. A particularly notable digression deals with the role of rats and fleas."
 panum.840.f: "In his treatise on the plague, Doctor  [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] summarized many of the new discoveries. In addition to recommending a rotation system for disinfection and a serum specially developed by  [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim], [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] points to the relationship between fleas as carriers of the plague bacillus and the infection of rats. Transmission occurs from flea to rat, from rat to rat, and from rat to human."
 panum.840.g: "An ancient enemy suddenly becomes tamable."
 panum.841.t: "A remarkable Spread"
 panum.841.d: "In recent weeks, Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] has dealt extensively with the first appearance and the places where the plague spread."
 panum.841.f: "'In the last weeks I have had maps sent to me by the Department of Commerce and compared them with the files of my colleagues abroad. Doctors who claim that the disease is linked to a particular climate or geography are mistaken. Rather, one can observe a wave-like spread on land and a spread through the narrowest harbors. This should not be surprising, since the Great Plague Epidemic of the Middle Ages also raged in Scandinavia, the Mediterranean and the Middle East. But will that convince my colleagues?'\n\nFrom the journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [TimeKeeper.GetCurrentDate.Format('y')]"
 panum.841.g: "So it has little to do with geography."
 panum.842.t: "Rotation Cleansing"
 panum.842.d: "Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] has tested a new procedure in [SCOPE.sState('panum_disease_state').GetName] that is proving to be extremely effective."
 panum.842.f: "'The systematic disinfection of the town was attempted, but proved a very costly undertaking, and was abandoned in favour of a scheme of 'general house-cleansing', in which a staff of European Sanitary Inspectors and coolies was constantly employed. Districts were treated in rotation, so that each tenement house was cleansed at least three time a year. This method has all the advantages of simplicity, efficacy and economy. Each Inspector is allotted a certain number of floors daily; the occupants turn out their household possessions, the floors and cubicles are washed out, and the bed-boards are cleansed in portable iron tanks. An inspection is made for minor structural illegalities, rat-runs, and similar holes are filled in with cement at once, and all rubbish carted away.'\n\nFrom Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'s instructions for the better disinfection of [SCOPE.sState('panum_disease_state').GetName]"
 panum.842.g: "This system should be implemented everywhere."
 panum.843.t: "An interesting Mortality"
 panum.843.d: "When looking through statistics, Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] discovered that the number of deaths among rat catchers is exorbitantly high."
 panum.843.f: "'The head of the agency told me that I was confusing correlation and causation. In principle, too much emphasis was placed on infecting rats before a plague outbreak, he said almost literally. I'm now seriously wondering whether, if the majority of authorities assumed that the plague outbreaks had something to do with rats, whether they would stick to their own theory given a similar number of indications of a purely tropical disease. The blatantly higher mortality among rat catchers compared to the rest of the population is one 'correlation' too many for me.'\n\nFrom the journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [TimeKeeper.GetCurrentDate.Format('y')]"
 panum.843.g: "How much more evidence is needed?"
 panum.844.t: "It's the rats, stupid!"
 panum.844.d: "During the closer investigation of the plague outbreak in [SCOPE.sState('panum_disease_state').GetName], Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] was informed that before the plague broke out, all the rats in the area died."
 panum.844.f: "'I see a lot of dead rats lying on the ground,' wrote Alexandre Yersin upon his arrival in Hong Kong on June 15, 1894. 'The rats are certainly the real spreaders of the epidemic.'"
 panum.844.g: "A daring thesis."
 panum.845.t: "A Sample"
 panum.845.d: "Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] managed to take a tissue sample from a plague victim in a morgue. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] had to do a lot of convincing. Or rather, [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] had to bribe a few people to get it."
 panum.845.f: "'They lie in their coffins, which are completely covered in lime. One coffin is opened. I push the lime aside to expose the groin area. The lump is clearly visible. I cut it out in less than a minute.' -Alexandre Yersin"
 panum.845.g: "We will reimburse the costs."
 panum.851.t: "'Simply Poverty and Dirt'"
 panum.851.d: "The district doctor in [SCOPE.sState('panum_disease_state').GetName], on behalf of the local authorities, has rejected Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'s current investigations as baseless. The causes and treatment methods for the plague are 'well known'."
 panum.851.f: "'We must express our surprise that the central government in [ROOT.GetCountry.GetCapital.GetCityHubName] found it necessary to send a medical officer, even though we have the situation sufficiently under control. Disinfection and sanitation measures have had an impact, especially the cleaning of the houses and the improvement of the living conditions of the residents. The poison is probably developed from atmospheric conditions underneath houses in certain districts, and that it is caused simply by poverty and dirt. In the ordinary sense the disease is not infectious or contagious.'\n\nFrom a letter from the district doctor to the government"
 panum.851.g: "The success speaks for itself..."
 panum.852.t: "Contamined Food"
 panum.852.d: "Several scientists, in a direct controversy with Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], have made it clear that the plague is an intestinal disease caused by poor nutrition."
 panum.852.f: "'Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] may have some exciting theories, but [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] has far too little experience dealing with the disease. The local doctors in [SCOPE.sState('panum_disease_state').GetName] have repeatedly appealed to the authorities not to question the established findings. The facts are as follows: 40 percent of plague patients suffer from vomiting, another 30 percent from diarrhea, and almost 20 percent from abdominal pain. Overall, gastrointestinal complaints were documented in almost 60 percent of the patients. It is therefore clear that it is an infection of the digestive tract, and it is all the more clear that it is apparently due to spoiled, bad or otherwise deficient nutrition.'\n\n"
 panum.852.g: "Doctor - what do you reply?"
 panum.853.t: "A tropical Diseases"
 panum.853.d: "Several internationally renowned doctors have put forward the theory that the plague is another tropical disease that would hardly occur outside certain climatic zones, and if it did, then only sporadically. It is therefore a climatic disease."
 panum.853.f: "'We have already found in the past that a cooler climate resulted in the plague wave subsiding. The implications are clear: plague is a disease strongly linked to climatic changes. Meteorological data and surviving paintings show that the last wave of plague took place in a significantly warmer environment than today. The disappearance of the plague from the end of the 17th century correlates with a cooling of the weather until the plague disappears completely. The rising temperatures of the last few years, on the other hand, correlate with the spread of the plague in areas that were previously considered colder. Do I need to take this further?'\n\nA letter from Doktor Angelika Hasenbein to Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetFullNameNoFormatting]"
 panum.853.g: "So just a variant of yellow fever."
 panum.854.t: "The false Plague"
 panum.854.d: "In the last few days, Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] had been ordered to several hospitals to examine the patients there. As it turned out, they were not plague sufferers but typhus sufferers."
 panum.854.f: "'The Black Death, typhus, cholera, consumption, bubonic plague... Oh, those were the days.' -An unknown undertaker"
 panum.854.g: "Regrettable."
 panum.854.h: "If we're wasting time, maybe the doctor can use it?"
 panum.861.t: "Opium is not an answer"
 panum.861.d: "Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] carefully examined the alleged healing effects of opium against plague diseases and came to a clear conclusion."
 panum.861.f: "'It does not work.'\n\nConclusion by Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] regarding the use of opium"
 panum.861.g: "This is a bit disappointing and enlightening at the same time."
 panum.862.t: "Septicamia"
 panum.862.d: "Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] was able to prove that several experiments that were supposed to suggest a gastrointestinal disease as the cause of the plague were completely misinterpreted."
 panum.862.f: "The view of infection via the alimentary tract, due to specifically contaminated food, was widely accepted for several years, though there were those who considered 'emanations from the breath and skin' as being the most important etiological factor. Large numbers of animal feeding experiments, with plague material were undertaken, and colour was lent to the gastro-intestinal hypothesis, as many of the animals and birds died of septicemic disease resembling plague. However, the results were inconclusive, and were eventually disputed in Hong Kong in 1904 by the present Medical Officer of Health, who expressed his entire disagreement, with this view."
 panum.862.g: "This is a serious blow to the theory that the plague was caused by food contamination."
 panum.863.t: "Antibiotics"
 panum.863.d: "Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] was able to show in several experiments that plague patients respond excellently to antibiotic treatment and expressly recommends this approach."
 panum.863.f: "'To call my experiments a complete success would be an understatement. In fact, I was surprised at how the antibiotics worked. A few patients even said they felt like they had been healed. If this effect is confirmed, the search for a vaccine for the plague may become unnecessary.'\n\nFrom the journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [TimeKeeper.GetCurrentDate.Format('y')]"
 panum.863.g: "Are there no disadvantages to antibiotics?"
 panum.864.t: "Insecticides"
 panum.864.d: "Large-scale use of insecticides in a plague hotspot has had no effect. According to Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], this is a surprising success."
 panum.864.f: "'You are right to ask why I am happy about this failure. But scientists also learn from perceived defeats. In this sense it was not a defeat, but a proof. A number of my colleagues suggested that the plague might be a tropical disease not unlike malaria, which was found to be transmitted by a mosquito. At least we can put this assumption aside.'\n\nFrom an interview with Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] in a local newspaper"
 panum.864.g: "One less option."
 panum.865.t: "Latrines"
 panum.865.d: "During an investigation into the hygiene measures in [SCOPE.sState('panum_disease_state').GetName], Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] found that the modern sewage and latrine infrastructure left something to be desired, especially in a plague-infested district, and contacted the local authorities."
 panum.865.f: "'Even if it has not yet been conclusively clarified how best to deal with the plague, and regardless of what my personal theories and those of my colleagues look like - experience has shown that floors contaminated with faeces and standing polluted waters are in principle to be removed, may it be because of the miasmas that are suspected to arise from them, or because they are foci of germs. If we want to control not only the plague but also other sources of disease in the future, then we must take preventative measures.'\n\nDr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] in a letter to the local govenrment"
 panum.865.g: "It will be expensive, but it is unavoidable."
 panum.870.t: "Bacillus Pestis"
 panum.870.d: "Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] examined the tissue sample with his microscope and determined definitively: the plague is transmitted by a bacillus!"
 panum.870.f: "'June 20, 1894. The bumps contain, clearly and clearly visible, a huge number of bacilli. They are small, short and have rounded ends. This is without question the microbe of plague.' -Alexandre Yersin"
 panum.870.g: "That changes everything!"
 panum.871.t: "Fleas"
 panum.871.d: "Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] may have made one of the most crucial discoveries in the history of plague: the relationship between fleas, rats and the plague outbreak."
 panum.871.f: "In [TimeKeeper.GetCurrentDate.Format('y')], [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] discovered the rat-flea vector that drives the disease. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] had noted that persons who became ill did not have to be in close contact with each other to acquire the disease. In Yunnan, China, inhabitants would flee from their homes as soon as they saw dead rats, and on the island of Formosa (Taiwan), residents considered the handling of dead rats heightened the risks of developing plague. These observations led [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] to suspect that the flea might be an intermediary factor in the transmission of plague, since people acquired plague only if they were in contact with rats that had died less than 24 hours before. In a now classic experiment, [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] demonstrated how a healthy rat died of the plague after infected fleas had jumped to it from a rat that had recently died of the plague."
 panum.871.g: "Fascinating."
 panum.872.t: "Anti-plague Serum"
 panum.872.d: "Based on previous knowledge of the transmission and origin of the plague, as well as experiments with the plague bacillus, Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] has developed a highly effective anti-plague serum and successfully tested it on a first patient."
 panum.872.f: "'From midnight the patient becomes calmer, and at six in the morning (…) he wakes up and declares that he feels healed.' -Alexandre Yersin"
 panum.872.g: "It works!"
