 je_panum_measles_treatment_reason: "현재 [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] 박사가 #YELLOW 홍역#!의 원인을 밝혀내기 위해 [SCOPE.sState('panum_disease_state').GetName] 지역에서 여러 환자를 대상으로 시험에 나서고 있습니다. 질병이 발생하는 실제 원인을 밝혀내야 현대적인 치료법으로 이어지는 예방책 마련에 나설 수 있습니다. 의사가 연구를 마치면 자신의 연구 결과를 일반에 발표할 것입니다. 이것으로 추후 전염을 예방하지는 못합니다. 병원체를 확인하고 백신을 개발해야 하기 때문입니다. 그러나 유행이 다시 벌어지더라도 그 영향은 비교적 줄어들 것입니다."
