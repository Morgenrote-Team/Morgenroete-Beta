 panum.3000.t: "The Red Cross"
 panum.3000.d: "Given the horrors of modern warfare, an 'International Committee of Aid Societies for the Care of the Wounded' was founded in [SCOPE.sState('panum_red_cross_state').GetName]. It is intended to work across nations to help those injured in war."
 panum.3000.f: "The Red Cross has adopted the following resolutions:\n- the establishment of national relief societies for war wounded\n- the neutrality of the wounded\n- sending volunteer nurses to the battlefield to provide assistance\n- the organization and implementation of further international conferences\n- the introduction of an identification and protective symbol in the form of a white armband with a red cross"
 panum.3000.g: "A decisive step forward in international cooperation."
 panum.3001.d: "Given the horrors of modern warfare, an 'International Committee of Aid Societies for the Care of the Wounded' was founded in [SCOPE.sState('panum_red_cross_state').GetName]. It is intended to work across nations to help those injured in war. An envoy asked whether our nation would also like to join this association."
 panum.3001.g: "We join this organization as a founding member."
 panum.3001.h: "Interesting."
 panum.3002.d: "Recognizing the horrors of modern warfare, the Swiss merchant Henry Dunant founded an 'International Committee of Aid Societies for the Care of the Wounded'. It is intended to work across nations to help those injured in war."
 panum.3002.f: "In 1859, the Swiss merchant Henry Dunant stumbled upon the battlefield of Solferino by chance. Shaken by the cries for help from around 40,000 dying and wounded soldiers, he begins to encourage volunteers from the area to help the victims - whether friends or foes. His 1862 book 'A Memory of Solferino' brought the horrors of modern war to the attention of the masses. Governments and citizens alike develop an interest in war containment. On February 17, 1863, the five-member committee of which Dunant was a member founded the International Committee of the Red Cross. Delegates from 16 nations met at the 1st Geneva Conference from October 26th to 29th, 1863 to further develop Dunant's ideas. The Red Cross on a white flag becomes the international symbol of protection for helpers. In 1901, Dunant received the world's first Nobel Peace Prize."
 panum.3011.t: "The [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_convention_title')] Convention"
 panum.3011.d: "An international conference was convened in [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_convention_title')] to establish the protection of the wounded, the neutrality of medical personnel and the Red Cross as a symbol of protection."
 panum.3011.f: "'But the women of Castiglione, seeing that I mad no distinction between nationalities, followed my example, showing the same kindness to these men whose origins were so different, and all of whom were foreigners to them. 'Tutti fratelli,' they repeated feelingly. All honour to these women, to these girls of Castiglione! Imperturbable, unwearying, unfaltering, their quiet self-sacrifice made little of fatigue and horrors, and of their own devotion.' -Henry Dunant"
 panum.3011.g: "[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_convention_title')] Convention. Sounds good."
 panum.3012.t: "The [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_convention_title')] Treaties"
 panum.3012.d: "An international conference was scheduled in [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_convention_title')] to promote disarmament and to extend the previous international law rules for land war to sea war."
 panum.3012.f: "'The moral sense of the importance of human life; the humane desire to lighten a little of the torments of all these poor wretches, or restote their shattered courage; the furious and relentless activity which a man summons up at such moments; all these combine to create a kind of energy which gies one a positive craving to relieve as many as one can.\n\nThere is no more grieving at the multiple scences of this fearful and solemn tragedy.' -Henry Dunant"
 panum.3012.g: "[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_convention_title')] Treaties. Sounds good."
 panum.3013.t: "The [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_convention_title')] Protocol"
 panum.3013.d: "An international conference was convened in [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_convention_title')] to outlaw the use of poison gas in war."
 panum.3013.f: "'Since the new and terrible methods of destruction are invented daily, with perseverance worthy of a better object, and since the inventors of these instruments of destruction are applauded and encouraged in most of the great European States, which are engaged in an armament race; and since finally the state of mind in Europe combines with many other symptoms to indicate the prospect of future wars, the avoidance of which, sooner or later, seems hardly possible, In view of all this, why could not advantage be taken of a time of relative calm and quiet to investigate and try to solve a question of such immense and worldwide importance, both from the humane and Christian standpoint?' -Henry Dunant"
 panum.3013.g: "[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_convention_title')] Protocol. Sounds good."
 panum.3021.t: "A Red Cross Medic"
 panum.3021.d: "After an extremely bloody defeat, a medic distinguished [SCOPE.sCharacter('panum_new_physician_scope').GetHerselfHimself] in the field hospital. [SCOPE.sCharacter('panum_new_physician_scope').GetSheHe|U] belongs to the Red Cross and is perhaps called to something higher than mere field service."
 panum.3021.f: "'In one of the Cremona hospitals, an Italian doctor had said: We keep the good things for our friends of the Allied Army, and give our enemies the bare necessities. If they die, so much the worse! and he added, to excuse these barbarous words, that he had heard from some Italian soldiers who had returned from Verona and Mantua, that the Austrians allowed the wounded of the Franco-Sardinian army to die uncared for. A noble lady of Cremona, Countess..., who had heard the doctor's words and had been devoting herself to the hospitals with the utmost zeal, made haste to show her disapproval by declaring that she gave exactly the same attention to the Austrians as to the Allies, and made no difference between friends and enemies. For, she said, Our Lord Jesus Christ made no such distinctions between men in well doing.' -Henry Dunant"
 panum.3021.g: "Welcome, Doctor [SCOPE.sCharacter('panum_new_physician_scope').GetLastName]."
 panum.740.t: "One less Child Scare"
 panum.740.d: "After great effort, Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] finally wrote [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] treatise on a successful treatment method for [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_disease_title')]. It is considered a milestone in [ROOT.GetCountry.GetAdjectiveNoFlag] medicine."
 panum.740.f: "The Medical Faculty was eagerly awaiting the scientific paper on [ROOT.Var('panum_physician_var').GetCharacter.GetFullName]'s treatment method. In [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] treatise, the doctor describes a whole series of efficient measures to combat scarlet fever. Modern medicine offers a whole range of options for effectively keeping scarlet fever at bay even after the disease has broken out. A newly invented antitoxin plays a key role. Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'s' work bears the name [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_treatment_title')]."
 panum.740.g: "Countless parents will now sleep more peacefully."
 panum.741.t: "The [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] Test"
 panum.741.d: "Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] developed a procedure named after [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] that determines whether a patient has immunity to scarlet fever or not."
 panum.741.f: "The Dick test, developed in 1924 by George F. Dick and Gladys Dick, was used to identify those susceptible to scarlet fever. The Dick test involved injecting a diluted strain of the streptococci known to cause scarlet fever; a reaction in the skin at the injection site identified people susceptible to developing scarlet fever. The reaction could be seen four hours after the injection, but was more noticeable after 24 hours. If no reaction was seen in the skin, then the person was assumed not to be at risk from the disease, having developed immunity to it."
 panum.741.g: "A useful procedure."
 panum.742.t: "Scarlet Fever Serum"
 panum.742.d: "Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] has developed an effective serum against scarlet fever, which [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] obtained from horse blood."
 panum.742.f: "Scarlet fever serum was used beginning in November 1900 after its development in the Sero-Therapeutic Laboratory of Rudolph Hospital in Vienna, Austria. The serum was taken from the blood of horses. Infected children were injected in their abdominal skin by Dr. Paul Moser. Mortality rates from scarlet fever (also known as scarlatina) declined significantly following the use of the blood serum. Moser's antitoxin reduced the mortality of scarlet fever by 40%."
 panum.742.g: "Horse blood? Urgh."
 panum.743.t: "The Antitoxin"
 panum.743.d: "After several tests, Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] is sure that [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] has produced an antitoxin that is effective against scarlet fever."
 panum.743.f: "'In spite of recent important advances in the knowledge and treatment of scarlet fever this much-dreaded disease has taken a big jump over its seasonal prevalences. When administered early enough, antitoxin will alleviate the danger of scarlet fever and its frequent subsequent complications. The disease still maintains aspects, however, that render its eredication extremely desireable. It has been found that increasing doses of the toxin given to susceptibles will render such persons immune.'"
 panum.743.g: "A decisive breakthrough!"
