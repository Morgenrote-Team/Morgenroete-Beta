 je_panum_measles_description_reason: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName] 박사는 현재 #YELLOW 홍역#!의 증상을 파악하기 위해 [SCOPE.sState('panum_disease_state').GetName]의 여러 환자들을 대상으로 조사에 나서고 있다. 다른 유사 질환이나 동반 질환과 구별하는 것이 이번 활동의 핵심이다. 조사가 끝나면 자신의 기술서를 대중에게 공개하여 추후 해당 질병의 배경을 규명하고 치료법을 발견할 기회를 살리고자 한다."
