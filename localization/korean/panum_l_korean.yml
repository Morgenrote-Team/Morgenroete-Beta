 panum_antitoxins_tech: "Antitoxins"
 panum_antitoxins_tech_desc: "항독소는 특정 독소를 중화시키는 효능을 지닌 항체입니다. 1890년경 에밀 아돌프 폰 베링과 동료 학자들이 디프테리아와 파상풍 독소를 해소하는 항독소를 처음 개발하였습니다. 이는 의학사에 있어 중대한 이정표로 꼽히고 있습니다. "
