 panum_vitamins_tech_desc: "우리 몸에 필요한 특정 영양소를 분리하여 더 많은 사람들이 건강하고 균형잡힌 식단을 섭취할 수 있도록 돕습니다."
 panum.2006.t: "매균설에 힘을 싣다"
 panum.2006.d: "이번 의학 학술회의에서는 여러 의사들이 질병의 원인에 관한 견해를 나눌 수 있는 기회를 제공헀다. 전통적인 미아스마론을 믿는 연구자들은 점차 줄어들고 있다는 사실이 분명해지고 있다. 현재 학계 유수의 학자들 사이에서는 매균설이 표준으로 여겨지고 있다."
 panum.2006.f: "\"최근 들어 각국이 지난날처럼 편항된 방식으로 대응하지 않고, 효과적인 방어 수단으로 입증된 것을 다른 국가에서 도입하는 등의 일정한 조정이 현실에서도 보이는 모습이다. 그러나 결핵 퇴치법이 아직도 몹시 다양하므로 전염병 사투에 있어 과학적 연구와 일반적인 연구 결과를 가장 충족시킬 조치가 무엇인가 질문할 필요가 여전히 남아 있다.\n\n허나 이 질문에 답하기 전에 우리는 결핵에서 감염이 어떻게 이루어지는가, 즉 결핵균이 인간 체내에 어떻게 침입하는가를 명확히 할 필요가 있다. 전염병을 향한 모든 예방 수단은 질병의 병원균이 인체에 침입하는 것을 막는 데에만 직결되어야 하기 때문이다.\" - 로베르트 코흐"
 panum.2006.g: "이번 증거를 마냥 묵살할 수는 없다."
 panum.2201.t: "미아스마론이 해석의 주권을 상실하다"
 panum.2201.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName] 박사가 새로운 연구 방법에 계속해서 주력하는 과정에서 전통적인 미아스마론은 연관성이 더욱 떨어지고 있다. 매균설이 더욱 설득력 있어 보이게 된 것이다."
 panum.2201.f: "\"신사 여러분, 최후의 결정권은 미생물에 있습니다!\" - 루이 파스퇴르"
 panum.2201.g: "그렇다면 미아스마론은 의심의 여지가 있다는 것인가?"
