 panum.2221.t: "The Woolsorter's Disease"
 panum.2221.d: "When examining the so-called 'Woolsorter's Disease', Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] discovered that it was actually anthrax."
 panum.2221.f: "Anthrax in humans occurred primarily as an occupational disease in tannery workers and in people who processed fur, bristles and hair, but also in port and transport workers who handled these materials, as well as in skinners. The peak of the occurrence was times of crisis in the leather industry, when an increasing number of cheap animal hides were imported from regions with little or no veterinary control of slaughtering. For a long time, the mysterious origin of the disease was unknown. It was believed that it was a case of poisoning and people called it 'woolsorter's disease'. With the advancement of microbiology and the implementation of germ theory, the actual connections between the economically extremely damaging animal disease and the fatal disease for humans were established and led to new regulations and regulations that were intended to ensure the protection of workers."
 panum.2221.g: "Adopt strict protective measures."
 panum.2222.t: "The Goitre Disease"
 panum.2222.d: "After examining several people in remote mountain valleys with gigantic goiters, Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] experimented with a treatment using iodine. After several attempts, the therapy worked."
 panum.2222.f: "In Alpine regions of Styria, Tyrol and Switzerland, but also in other mountain regions or the English Midlands, goiters were an everyday illness. There was an early suspicion that the goitre formation had something to do with the water in a certain territory. Paracelsus suspected the lack of certain minerals and recommended drinking water containing lead. In ancient China, doctors recommended eating seaweed and sponges. With a better understanding of the function of the thyroid gland and the importance of iodine, the first healing efforts finally began. From 1918 onwards, the Swiss doctor Otto Bayard introduced iodized salt through the correctly dosed addition of iodine potash to the table salt in the communities in his practice area of the Nikolaital and showed that this eliminated developmental disorders, enlargement of the thyroid gland, and goiter and nodule formation without any undesirable effects and damage can be treated successfully."
 panum.2222.g: "So it's a diet-related illness!"
 panum.2223.t: "Nephrolithiasis"
 panum.2223.d: "Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] has developed a procedure to successfully operate on patients with kidney stones."
 panum.2223.f: "Kidney stones are a phenomenon known throughout human history; even Napoleon suffered from them. Although several procedures for removing kidney stones developed since the Renaissance, the operation remained dangerous. The American surgeon Henry Jacob Bigelow achieved a breakthrough: he introduced the medical technique of litholapaxy. In 1878 he published 'Lithotrity by a Single Operation', in which he described his a technique for 'the crushing and removal of a stone from the bladder at one sitting.' Prior to this, surgeons would crush a bladder stone and then spend only a few minutes removing the pieces. With this new method the mortality rate dropped from about 24% to 2.4%."
 panum.2223.g: "I'm getting antsy just thinking about it."
 panum.2224.t: "Pellagra"
 panum.2224.d: "As Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] discovered after years of research, pellagra is a disease caused by a lack of nicotinic acid."
 panum.2224.f: "After Christopher Columbus discovered America, corn was one of the first plants to be brought to Europe, where it spread quickly due to its high crop yields. Soon, in areas with high corn consumption, a strange disease called 'rough skin' after the key symptom, pellagra, appeared. The connection between pellagra and high corn consumption (e.g. in the form of polenta) was first suspected in the 18th century. Explanations at the time included moldy or poisoned corn, infection or heredity. Joseph Goldberger and colleagues then proved at the beginning of the 20th century that both the so-called pellagra in humans and the black tongue disease in dogs arise from malnutrition, which Conrad Elvehjem was able to attribute to a nicotinic acid deficiency. The discovery that pellagra could be treated with brewer's yeast led to a sudden reduction in the number of mental hospital inmates in the affected areas."
 panum.2224.g: "The mere result of an unbalanced diet?"
 panum.2225.t: "Rickets"
 panum.2225.d: "After many years of studying rickets patients, Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] comes to the conclusion that the bone disease has to do with a nutrient deficiency - and recommends cod liver oil and sunlight as prevention."
 panum.2225.f: "Although there have been many scientific descriptions of rickets over time, its causes remained unknown for a long time. A variety of causes of rickets were proposed by leading pathologists in the nineteenth century, including congenital syphilis and paternal tuberculosis infection. A true modern understanding of the pathophysiological basis of rickets did not begin until the early twentieth century. In 1919, Edward Mellanby discovered and published on the '4th vitamin,' stating 'Rickets is a deficiency disease which develops in consequence of the absence of some accessory food factor or factors. It therefore seems probable that the cause of rickets is a diminished intake of an anti-rachitic factor, which is either fat-soluble factor A, or has a similar distribution to it'."
 panum.2225.g: "Are we talking about a vitamin D?"
 panum.2226.t: "Syphilis"
 panum.2226.d: "Syphilis, the ancient scourge of humanity, seems to soon be put on the chain by science - Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] claims to have invented a miracle cure using the most modern medical methods."
 panum.2226.f: "Until the beginning of the 20th century, syphilis was mainly treated with toxic mercury, which was applied to large areas of the patient's body, which, among other undesirable effects, usually led to a complete loss of body hair and all teeth and the rapid decline of all bodily functions initiated. Mercury had already been used several centuries earlier as a more or less effective therapeutic agent against leprosy and various other skin diseases. Experiments with arsenic preparations such as atoxyl and arsacetin as well as the preparation 418 (arsenophenylglycine), which was only successful in animal experiments and were developed and tested by Paul Uhlenhuth and Paul Ehrlich in 1907/1908, failed, mainly because of the serious side effects. In 1909, Sahachiro Hata and Paul Ehrlich developed the organic arsenic compound arsphenamine (Salvarsan), which was the first to attempt a targeted chemotherapeutic treatment of syphilis."
 panum.2226.g: "Salvavw... what?"
 panum.2227.t: "Tetanus"
 panum.2227.d: "After several tests, Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] announced today that he has found an antitoxin against tetanus."
 panum.2227.f: "Tetanus was well known to ancient civilizations, who recognized the relationship between wounds and fatal muscle spasms. In 1884, Arthur Nicolaier isolated the strychnine-like toxin of tetanus from free-living, anaerobic soil bacteria. He detected the tetanus pathogen in the soil by inoculating garden soil onto test animals. The etiology of the disease was further elucidated in 1884 by Antonio Carle and Giorgio Rattone, two pathologists of the University of Turin, who demonstrated the transmissibility of tetanus for the first time. In 1891, C. tetani was isolated from a human victim by Kitasato Shibasaburō, who later showed that the organism could produce disease when injected into animals, and that the toxin could be neutralized by specific antibodies. In 1890, Kitasato and Emil von Behring finally succeeded in obtaining a specific tetanus antitoxin, which could enable tetanus immunity in animals. With this antitoxin production, Behring laid the foundation for 'serum therapy' (as well as with the discovery of the diphtheria antitoxin, also in 1890)."
 panum.2227.g: "Who would have thought that garden soil could be so dangerous?"
 country_panum_kidney_stone_treatment_success_chance_mult: "Kidney Stone Treatment Success Chance"
 country_panum_syphilis_treatment_success_chance_mult: "Syphilis Treatment Success Chance"
 panum.922.t: "Croup"
 panum.922.d: "Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] has found that many doctors usually cannot tell the difference between the rather harmless croup and the dangerous diphtheria and has highlighted the differences in an article."
 panum.922.f: "When the Prussian-born doctor Abraham Jacobi noted at a medical conference in 1860 that there were around 122 cases of diphtheria in New York, his colleagues were astonished: they had not diagnosed any diphtheria at all during the same period. The lack of knowledge in the field of children's illnesses was one of the reasons for the founding of the first children's hospitals in the USA, in which diphtheria played a special role. Jacobi is regarded as the Father of American Pediatrics."
 panum.923.t: "Leathery Larynx"
 panum.923.d: "Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] has identified one of the main features of diphtheria as the leathery pseudomembrane that extends to the larynx and causes suffocation. This characteristic is typical of the disease to distinguish it from others."
 panum.923.f: "'We can establish the identification of malignant angina in four ways:\n\nBy extensive researches on the morbid anatomy of the disease, sixty autopsies being performed in the course of a few months;\n\nby clinical observations, whereby we proved that the angina, if left to itself, almost invariably tended to attack the larynx, and thus give rise to symptoms of croup;\n\nby chemical examination, by which he proved the identity in composition of the false membrane in the pharynx with that in the trachea;\n\nby the study of the works of the earlier writers.'"
 panum.940.t: "The Antidote for Diphtheria"
 panum.940.d: "Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] announced publicly today that the experiments with the diphtheria antitoxin [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] produced were a complete success."
 panum.940.f: "Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] explained to the astonished crowd that [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] had used a weakened diphtheria toxin to infect horses and in turn obtain a serum from their blood that was highly effective in combating diphtheria. Although this is a great advance, [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] also emphasized that this should not be confused with a vaccine because it does not activate the patient's immune system. 'There is still a lot of work to be done here', [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] said. But all parents who feared for the lives of their gasping children at night will be able to sleep much more soundly from now on."
 panum.940.g: "We cut off the air from diphtheria before it does the same to us."
 panum.941.t: "Iron perchlorate"
 panum.941.d: "Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] found in older records that iron perchlorate was recommended as a remedy for diphtheria. In fact it seems to have an effect."
 panum.941.f: "'Surprisingly, this alchemical-like recipe has had an effect on some patients. Apparently it is one of the few remedies for diphtheria.'\n\nA short note from Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] on diphtheria"
 panum.941.g: "But does that really get us anywhere?"
 panum.942.t: "Intubation"
 panum.942.d: "Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] tried to give a patient air through intubation. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] has achieved a small success against diphtheria."
 panum.942.f: "'The process is complicated and critical, but any hint of combating diphtheria is useful to me at the moment.'\n\nA short note from Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] on diphtheria"
 panum.942.g: "But surely that can't be a long-term solution?"
 panum.943.t: "Tracheotomy"
 panum.943.d: "Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] has had rather mixed experiences with tracheotomy, although all of [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] medical colleagues use this surgical procedure to treat diphtheria."
 panum.943.f: "'I cannot for the life of me understand why all those diphtheria experts - or at least those who claim to be - have been able to report any success. Trousseau claims to have saved the lives of almost half of his diphtheria patients, but in my professional experience it is less than one in ten.'\n\nA short note from Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] on diphtheria"
 panum.943.g: "And now?"
 panum.944.t: "Mercury"
 panum.944.d: "Unfortunately, a mercury treatment for diphtheria ended exactly as Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] expected - with poisoning."
 panum.944.f: "'Should I have known better? Yes! But the specialist literature leaves no doubt that mercury has helped against diphtheria for centuries. Allegedly! From now on I find other remedies that supposedly help: silver nitrate, for example. Or hydrochloric acid! Has anyone really dealt with this disease?'\n\nA short note from Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] on diphtheria"
 panum.944.g: "This all sounds even more deadly than diphtheria."
 panum.945.t: "Bleeding"
 panum.945.d: "Experts recommend good bloodletting for diphtheria. Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] tried this [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself] in two cases - and found that the method was rather counterproductive."
 panum.945.f: "'Weakening a weakened patient even further would be like breaking down another pillar on a bridge with one shaky pillar. What every engineer understands is considered heretical in medicine.'\n\nA short note from Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] on diphtheria"
 panum.945.g: "Is there no improvement?"
 panum.951.t: "The Rattle in the Night"
 panum.951.d: ""
 panum.951.f: "The sun had retreated behind the houses. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] walked in the shadows. It had been another day of failures. Three more dead children. As always, the same cause of death. Even if the peak of the epidemic passed. There remained a residual risk that the child death would roam the streets and plunge his scythe into their jaws. Drowning and suffocation were among the most cruel forms of death.\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetLastName] had specialized in epidemic diseases for years. But diphtheria was different. It wasn't just a childhood disease like measles or scarlet fever, which could have a mild outcome. Diphtheria made children gasp for air. Diphtheria strangled the child in the night like an avenging angel.\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetLastName] had declared war on diphtheria. But it seemed a hopeless war. Every step [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] took, the disease followed - and reversed [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] again. All the methods that had been handed down turned out to be useless. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] wrestled with death. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] wrestled with the devil.\n\nAnd they made [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] feel [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] desperation and helplessness. That night when [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] came home. As a gasp greeted [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] in the darkness. Because there was a patient waiting for [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] that [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] didn't have on the list. The diphtheria had spread. Up to [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] street. Up to [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] house.\n\nUp to [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] son's bed."
 panum.951.g: "Did the doctor's experiments...?"
 panum.952.t: "Treating Diphtheria"
 panum.952.d: ""
 panum.952.f: "A desperate swallow. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] had become accustomed to this sound. Usually you could hardly hear it when other people swallowed. But it was the same agony [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] had heard so often before. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] had memorized the sound. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] could put a cold cloth on [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] son's head. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] could speak soothingly to him.\n\nBut [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] could do nothing for him. No more than [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] had done for the other children. For the many other, dozens of dead children.\n\nIf there was anyone who knew how little these diphtheria drugs were worth, it was [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim]. Mercury that poisoned the body. Silver nitrate and iron perchlorate with varying effects. Tracheotomy, which was considered the highest art of surgery - and almost always failed.\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] had done it so often. And yet it was different. It was no longer about the disease. It was about [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] now. This hated epidemic was taking revenge on [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim]. Because [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] had wanted to resist it. Because [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] wanted to eradicate it, like it did to small children. It was taking revenge. It wanted to take away the most precious thing [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] had. Not [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] honor as a doctor, not [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] hope for a cure.\n\nThe rattling in the night returns. Liquids glisten in small vials. A scalpel gleams in the moonlight."
 panum.952.g: "Treat the boy with iron perchlorate."
 panum.952.h: "Perform a tracheotomy."
 panum.952.i: "Examine a tissue sample with the microscope."
 panum.953.t: "The Strangling Angel"
 panum.953.d: ""
 panum.953.f: "No more rattling. The sound that had tormented [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim], that had accompanied [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] and taught [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] to fear - gone. But there was no triumph. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] had despised the sound.\n\nBut now [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] wished the dreadful noise back.\n\nSilence. Dead silence, as [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] had known it for months. It was that moment when you could hear silence. An eerie graveyard silence that spread out and sucked out every life force. Silence could be heard and felt. It filled the body with emptiness. That was not a contradiction. It was logical. It was empirical.\n\nBut logic and empiricism failed [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] that night. [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis|U] fingers clasped a cold child's hand. Pale as the moonlight that shone through the windows. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] had challenged the diphtheria.\n\nAnd diphtheria stomped [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] into the ground and tortured [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] with pleasure because [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] arrogance had blinded [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim]."
 panum.953.g: "The doctor will have a hard time dealing with that."
 panum.954.t: "Not Larynx, but Heart and Eyes"
 panum.954.d: ""
 panum.954.f: "The moon had sunk. The sun had risen again. Days had passed in the alternation of night-time darkness and drawn blinds. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] had been waiting at the bedside. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] had not cured patients until then. [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] work had not focused on people, but on illnesses. It was easy to administer silver nitrate when experimenting with it; it was easy to inject a serum when it was a mere test; and it was easy to perform an operation on the trachea when not treating a human being, but merely skin, merely muscle, merely flesh, merely bone.\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetLastName] had treated diseases before. Diphtheria had turned people into patients, histories into medical records and suffering into symptoms. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] wanted to free people from shortness of breath. Yet it was [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] who needed healing. Not in the larynx. But in [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] eyes and heart.\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] could see again. And a tame smile beamed at [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim]."
 panum.954.g: "[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] did it!"
 panum.955.t: "The Sacrifice"
 panum.955.d: ""
 panum.955.f: "A soul lost. A world gained. Microbes bustled under the microscope. Microbes like those that had been found in many other cases. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] had ruled it out so far. But it was the most reasonable explanation. [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis|U] son had had no contact with diphtheria patients.\n\nOnly [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] had. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself] had brought the germs into this house. Over days. Perhaps for weeks. Without realizing it. From the other dozen sick children. From the other dozen dead children.\n\nWho were now one victim richer.\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetLastName] had a sample. And [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] had guinea pigs and rabbits that no child looked after any more; that no child played with any more. They would be a sacrifice. Just as [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] had made sacrifices. If they fell ill, that was proof. It was about eradicating diphtheria. That was a goal greater than [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself].\n\nAnd bigger than any other goal."
 panum.955.g: "A sacrifice that will not go unpunished."
 panum.956.t: "Radical Change of Theorem"
 panum.956.d: ""
 panum.956.f: "The last few weeks have triggered a significant caesura for [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] certainly wouldn't call it a Copernican turnaround. But rarely has an event caused [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] to question [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself] and [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] methods so much. The powerlessness in the face of diphtheria has a lasting effect. And [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] knows that it will come back.\n\nOnly a successful, long-term solution can prevent this episode from recurring.\n\nGlasses are therefore piled up in the doctor's surgery. Medicine books and treatises are piled up. And medicines. [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis|U] hand manically reaches for everything that is supposedly known about diphtheria.\n\nEvery supposed cure. Every alleged manual. Every supposed treatise.\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetLastName] clears the table. Throws everything on it in the trash. They were all wrong. Bretonneau. Guersant. Trousseau. Bochut. Daviot!\n\nDeciphering the cause of diphtheria meant finally curing diphtheria. And after everything [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] had read and tried so far, only one possibility remained open. Diphtheria was contagious. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] had infected [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] own son after contact with other patients. There was an agent. No matter what the experts said.\n\nThere had to be a pathogen."
 panum.956.g: "All efforts are now focused on finding the pathogen."
 panum.956.h: "The focus of research should already be on a possible vaccine."
 panum.961.t: "The Diphtheria Toxin"
 panum.961.d: ""
 panum.961.f: "A poison was the key. Poison of the kind secreted by the diphtheria pathogen. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] had heard that a biologist was experimenting with it. The toxin was too strong to be stopped. If you infected animals with it, they died.\n\nBut [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] knew that this was information that would shake the scientific world. One could read about it in the specialist journals. And there were imitators worldwide who were also isolating the diphtheria toxin in the hope of inducing an immunological effect in an animal without it dying in the same way as the millions of children whose corpses lay as tribute on the altar of diphtheria.\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] would investigate. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] had to find the toxin. And conduct [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] own experiments. "
 panum.961.g: "This is perhaps the crucial step..."
 panum.961.h: "This process is already known from the production of tetanus toxin..."
 panum.961.i: "The right amount of iodine could help with this."
 panum.962.t: "The Diphtheria Antitoxin"
 panum.962.d: ""
 panum.962.f: "A breakthrough. A decisive breakthrough that made up for all the sacrifices, all the suffering, all the deaths [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] had to accompany, including the grieving parents and relatives. The tearful farewells. The despair and hopelessness.\n\nIt was so simple. And so efficient. The toxin had to be weakened. Finally, an iodine solution would help. Horses were the perfect test subjects. The rest was easy. The animal developed immune powers against the toxin - and was thus the supplier of a serum. An antitoxin against diphtheria.\n\nWhen [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] held the vial in his hand that day, [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] felt a sense of satisfaction. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] had carried out the first tests. Not all the children responded. But more than [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] had dared to dream of. Now this weapon against the invisible enemy had to be mass-produced - and distributed. In every clinic. In every doctor's surgery.\n[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'s war against diphtheria was not over. It was just beginning."
 panum.962.g: "Order as much of this serum as possible!"
 panum.963.t: "The Shadow"
 panum.963.d: ""
 panum.963.f: "Diphtheria must be eradicated! It must disappear!\n\nIt may have been a manic thought. But it was a thought that kept Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] alive. [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis|U] war against diphtheria bore fruit. So many lives saved. So many children who would have suffered agony and died in another world!\n\nThe good of the many outweighed the good of the individual. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] would have given his own life if [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] could have destroyed the diphtheria. But fate was not kind to [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim]. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] had not sold [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself] to the devil - but [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] son. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] had decided that. For him.\n\nSince that night, a veil had descended over [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim]. An anger against the disease. But [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] had erased it. With rational thoughts that drowned the resentment towards [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself] in work and revenge. But a few days ago, this anger disappeared. Paradoxically, the more children [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] saved, the clearer [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] could see.\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] saw [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself]. And [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] loathed what [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] saw.\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetHerHis|U] arrogance had deceived [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim]. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] believed [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] was saving human lives. Yet [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] had decided on one. Like an executioner. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] hadn't even touched the scalpel. Or at least a small glass of silver nitrate. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] had placed more value on the sample and the pathogen - than on [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] patient. A human being.\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetHerHis|U] own flesh and blood.\n\nIt disgusted [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] ever since. And in [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] lonely apartment, [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] only companions were certificates, prizes and photos with important politicians and academics. Otherwise just an empty bed. And a thought that grew stronger. [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis|U] head throbbed. It became an agonizing headache: I must be eradicated. I must disappear.\n\n'My son. My dear son...'"
 panum.963.g: "Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]... Doctor!"
 panum.640.t: "'Observations Made During the Epidemic of Measles'"
 panum.640.d: "Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] has presented [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] recommendations for the treatment of measles, which are intended to better understand the causes and transmission of the disease in order to mitigate and prevent outbreaks in the future."
 panum.640.f: "'The contagion spread very rapidly in the thickly populated Thorshavn, and thence it was carried by boats to the other islands. Journeys to and from the trading-places, church and school attendance and grind drives spread the infection to the other villages. The contagion was introduced into Suderø from Thorshavn by an identified individual, and upon investigation it was possible to demonstrate almost everywhere how and by whom the infection had been brought to each village. Whether the infection can be transmitted by such things as clothing, laundry and letters seems rather doubtful, and I did not see or hear of any examples of such transmission during the epidemic.' -Peter Panum, Observations Made During the Epidemic of Measles on the Faroe Islands in the Year 1846"
 panum.640.g: "A new Peter Panum!"
 panum.52.m: "The scarlet fever epidemic in [SCOPE.sCountry('panum_scarlet_country_scope').GetName]."
 panum.52.q: "Actually, that's a bad plan..."
 panum_no_expedition_effect_tt: "[concept_panum_physician]가 자유로운 몸으로 다른 활동에 나설 수 있게 됩니다."
 panum.51.d: "[GetPlayer.GetName] 의사 학회를 선도하는 지성으로 꼽히는 [ROOT.Var('panum_physician_var').GetCharacter.GetFullName](이)가 전염병 유행에 시달리는 주로 이동하여 질병을 연구하기로 동의하였다. 이번 연구를 통해 질병의 기술이 완전히 이루어지기를 기대하고 있다."
 panum.53.d: "The rampant epidemic has led [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] to investigate it more closely to determine the causes and develop new methods to treat the terrible disease."
 rule_panum_spanish_flu_rule: "#tooltip:[GetRawTextTooltipTag('mr_morgenroete_tt')] @mr_morgenroete_icon!#!스페인 독감"
 setting_panum_dynamic_spanish_flu_rule: "#V 유동적인 스페인 독감#!"
 setting_panum_dynamic_spanish_flu_rule_desc: "20세기 초반에 전세계적인 독감이 산업화된 국가에서 발병하게 됩니다. 유행병의 명칭은 발원지에서 유래하게 됩니다."
