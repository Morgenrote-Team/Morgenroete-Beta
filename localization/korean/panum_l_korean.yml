 panum.51.t: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName] 박사의 발병 지역 파견"
 panum.51.f: "질병을 완전히 기술하는 것은 질병을 이해하고 나아가 퇴치하는 첫걸음입니다. 기술서 자체만으로는 직접적인 치료 효과를 보기 어렵지만, 추후 치료법 확보의 근간이 됩니다. 자국에서 전염병을 연구하는 의사는 해외 파견 의사보다 더 효과적인 대응이 가능합니다."
 je_panum_cholera_description: "콜레라 진단"
 je_panum_tuberculosis_description: "결핵 진단"
 je_panum_smallpox_description: "천연두 진단"
 je_panum_typhus_description: "발진티푸스 진단"
 je_panum_yellow_fever_description: "황열병 진단"
 je_panum_cholera_description_reason: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName] 박사는 현재 #YELLOW 콜레라#!의 증상을 파악하기 위해 여러 환자들을 대상으로 조사에 나서고 있다. 다른 유사 질환이나 동반 질환과 구별하는 것이 이번 활동의 핵심이다. 조사가 끝나면 자신의 기술서를 대중에게 공개하여 추후 해당 질병의 배경을 규명하고 치료법을 발견할 기회를 살리고자 한다."
 je_panum_tuberculosis_description_reason: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName] 박사는 현재 #YELLOW 결핵#!의 증상을 파악하기 위해 여러 환자들을 대상으로 조사에 나서고 있다. 다른 유사 질환이나 동반 질환과 구별하는 것이 이번 활동의 핵심이다. 조사가 끝나면 자신의 기술서를 대중에게 공개하여 추후 해당 질병의 배경을 규명하고 치료법을 발견할 기회를 살리고자 한다."
