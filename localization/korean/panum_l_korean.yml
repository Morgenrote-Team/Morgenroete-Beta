 panum.55.t: "[ROOT.Var('panum_physician_var').GetCharacter.GetFullName] 박사의 해외 전염병 기술 가능"
 panum.55.d: "외국에 전염병이 유행하면서 [concept_panum_physician]를 보내 해당 질병을 조사하고 기술할 수 있게 되었다."
 panum.55.g: "우리 의사를 즉시 파견하도록!"
 panum.55.h: "지금은 안 돼."
 panum.55.i: "거슬리니 조금만 덜 알려주겠나."
 panum.55.j: "이 문제는 더 이상 알리지 말도록."
