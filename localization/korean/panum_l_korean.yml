 panum_character_treatment_fatal_fallback_loc: "\"혈관을 자르는 것이 환자를 죽일 것이라고 누가 생각이나 했겠나?\""
 panum_character_treatment_fatal_tripple_death_loc: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] planned a quick surgery to treat [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] patient. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] was able to perform the surgery in a little more than 2 minutes but amputated the fingers of an assistant - who later dies of an infection. Sadly the patient also died of an infection later. Additionally a spectator whose coat tails were also accidentally cut collapsed because he thaught his vital organs were injured, later he was discovered to have died from shock."
 panum_character_treatment_fatal_unwashed_hands_loc: "The surgery was perfect. The patient was alive, all problems were solved and everyone thaught it would be a swift recovery. A few days later however, an infection was discovered that spread like wildfire. Only hours later the patient died. Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] was very confused to how this could have happened, as [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] changed the knife after the previous surgery just a few minutes earlier."
 panum_character_treatment_fatal_forgotten_snack_loc: "After the death of the patient an autopsy was conducted. Inside of the patient. To the surprise of everyone, a half eaten sandwich was found. No one knew how it got there until an assistant remembered that Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ate a sandwich during the surgery."
 panum_character_treatment_fatal_blood_loss_loc: "At first the surgery went well. It seemed that Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] was able to treat the patient sucessfully. However the patient never recovered. It seems that there was too much lost blood which mde the patient very week and resulted in death after 3 more days."
 panum_character_treatment_fatal_morphine_overdose_loc: "The surgery seemed to go well, thanks to the use of Morphine the patient didn't feel any pain during the procedure. Sadly the patient did no longer feel any pain anymore at all as the amount of Morphine was too much and the patient died."
 panum_character_treatment_fatal_drunken_doctor_loc: "Everyone was a little confused when Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] started drinking the medical alcohol during surgery. It didn't help either that [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] started to cut in the wrong places, yell at assistants and finally hitting a major artery. Sadly the patient could not be saved even after another Doctor was called to help."
 panum_character_treatment_fatal_forgotten_instruments_loc: "After a successful surgery Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'s patient seemed to get better. But just a day later the patient died. An autopsy revealed a scalpel that somehow was forgotten inside of the patient. As the patient moved again, the scalpel started cutting through tissue and blood vessels which caused internal bleeding."
 panum_character_treatment_fatal_deadly_anaesthesia_loc: "A very succesful surgery sadly had a horrible end. The patient never woke up from the anaesthesia. No one knows what could have caused it but Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] assumes that the body of the patient was already too weak."
 panum_character_treatment_fatal_fake_doctor_loc: "At first the surgery seemed to have gone quite well. One the Doctor left the room, it didn't take long until the situation changed for the worse. Suddenly Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] barged into the room and said that [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] was so sorry about arriving late. Everyone was confused as the Doctor just performed the surgery. It seems like a random person pretended to be the surgeon and performed the surgery. Sadly in the end the patient died and no one knows who is responisble for the death."
 panum_character_treatment_fatal_slippery_floor_loc: "It was a great surgery until Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'s foot met a puddle of blood on the floor. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] slipped and fell right on top of the patient. Sadly the scalpel impaled the heart of the patient which caused the patient's death."
 panum.242.t: "Death of the Crowd"
 panum.242.d: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] finds it striking that tuberculosis consistently occurs in densely populated areas, but only rarely in sparsely populated regions."
 panum.242.f: "'I have taken a closer look at some of the treatises that recommend climatic health resorts to cure tuberculosis. One paper seemed so unconvincing to me that I think my colleague confused correlation with causation. He assumes that people in the mountains are healthier because the air is healthier and therefore do not fall victim to tuberculosis. But isn't it obvious that in principle we can observe that tuberculosis does not appear in the mountains because there are fewer people there? This speaks for the southern European interpretation that we are dealing less with miasma than with contagium. Tuberculosis may be a contagious disease after all.'\n\nFrom the journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] in [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]"
 panum.242.g: "This is a theory that underlines that tuberculosis is a contagious disease."
 panum.242.h: "This is a theory that underlines that the miasma theory is wrong."
 panum.243.t: "A Tuberculosis Hermit"
 panum.243.d: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] made an interesting discovery in an exchange with a tuberculosis survivor."
 panum.243.f: "'You said your brother died of tuberculosis?'\n'Correct. I was nineteen then. I saw him die before my eyes.'\n'And you also later became ill with tuberculosis?'\n'Exactly. I assumed that like him, I would die soon. That was safe for me. So I retreated to a remote area to die. I wanted to spend my last days in nature, away from civilization.'\n'But you survived. What do you think is the reason for this?'\n''Healthy eating and exercise. At some point I gathered enough strength to overcome the disease.'\n'Hm.'"
 panum.243.g: "Is that really all?"
 panum.244.t: "Nothing hereditary"
 panum.244.d: "After lengthy examinations, Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] comes to the conclusion that there is little to suggest that tuberculosis is actually a hereditary disease."
 panum.244.f: "'If you had told me during my training that I would one day pursue genealogical work, I would have been quite surprised. But there was hardly any way to confirm my theory other than to ask the affected families themselves, as well as authorities and clergy. If tuberculosis is indeed a hereditary disease, then one that can remain undetected for generations. There are entire family trees without a case of tuberculosis, only for it to suddenly wipe out an entire family. And it is a striking fact that tuberculosis is not a static, manageable disease, but rather has only become the danger it represents today in the last few decades. Let me put it this way: If tuberculosis is a hereditary disease, then we obviously all have a predisposition. As you can see in the appendix to my study, the statistics speak for themselves.'\n\nLecture by [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] to the Medical Faculty"
 panum.244.g: "So theoretically anyone can become infected?"
 panum.245.t: "Tubercles"
 panum.245.d: "During an anatomical examination, Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] gained new insights into the tumors in the lung tissue that give the disease its name."
 panum.245.f: "René Laennec developed the stethoscope, originally to examine tuberculosis. In the years that followed, it helped that the disease could be detected earlier by being able to listen for changes in the respiratory system at an early stage. At the same time, knowledge about the development of tuberculosis within the body grew."
 panum.245.g: "Small progress - but progress."
 panum.246.t: "Lifestyle & Immunity"
 panum.246.d: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] has serious doubts about traditional theories about the cause of tuberculosis after thoroughly examining several patients and their biographies."
 panum.246.f: "'The examination of several patients in [SCOPE.sState('panum_disease_state').GetCityHubName], including their personal histories, raises more questions than answers; provided that one expects truths that are as simple as possible, rather than just fragments of the truth. It is true that the proletariat in particular is severely affected by tuberculosis, but I find it questionable whether a wealthy person in the same milieu would not also fall victim to the disease. I am convinced that good nutrition, fresh air and physical exercise offer a certain level of resilience against illness - but I do not believe that they can therefore be ruled out in principle. In short: I believe that the idea that someone gets tuberculosis because they are an artist or a proletarian is a scientifically untenable claim. If that were the case, then tuberculosis would have chosen its affiliation in recent years and would now prefer factory workers as its highly spiritually chosen victims instead of musicians and poets. Nobody can seriously believe that.'\n\nFrom the journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] in [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]"
 panum.246.g: "This will be a great disappointment for some unrecognized geniuses."
 panum.247.t: "A notifiable Disease"
 panum.247.d: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] has been experimenting with a reporting system in [SCOPE.sState('panum_disease_state').GetCityHubName] that could help curb tuberculosis."
 panum.247.f: "'The [SCOPE.sState('panum_disease_state').GetCityHubName]'s classification of tuberculosis as a notifiable disease has caused some resentment among the population because many people consider the disease to be a private matter. But it is not, especially not when it occurs in epidemic form. The moment a disease is considered contagious - and in the case of tuberculosis there is much to suggest that it is - it is a public matter that can endanger the public welfare. Better to have a reportable illness than a quarantine. Isolation of individual sources of infection showed that the spread of tuberculosis could be prevented without putting an entire city into a state of emergency. Unfortunately, the stigma that tuberculosis cranes now carry will have unpleasant personal consequences. Tuberculosis sufferers are now treated as lepers.'\n\nFrom the journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] in [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]"
 panum.247.g: ""
 panum.248.t: "Killing the Microbes"
 panum.248.d: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] has developed a chemical process that is based on previous knowledge of microorganisms. It could prevent tuberculosis in the future."
 panum.248.f: "Pasteurization refers to the short-term heating of liquid or pasty foods to temperatures of at least 72 °C to a maximum of 100 °C to kill the vegetative phases of microorganisms in order to preserve food in a gentle manner. The process was used for wine from the middle of the 19th century. Only later was it used in raw milk, through which the bovine tuberculosis pathogens could be transmitted to humans. The pasteurization of raw milk therefore played a role in containing tuberculosis. This finding is more important than one might first think: for a long time, doctors, biologists and chemists assumed that tuberculosis from cattle could not be transmitted to humans. Even the tuberculosis expert Robert Koch was wrong in this regard, and he only later revised his opinion - a period in which many children became infected through tuberculosis milk and butter."
 panum.248.g: "And I thought milk was basically healthy!"
 panum.249.t: "Perosnal Spittoon"
 panum.249.d: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] noticed an accessory that has become particularly popular among women suffering from tuberculosis. It has a sophisticated blue glass casing that looks so fashionable that you'll forget it's a spittoon."
 panum.249.f: "'Most of us have that up here. It also has a name with us, a nickname, quite fun.' Without any restraint, with a stubbornly ignorant face, she uttered the grim expression 'The Blue Heinrich'.' -Thomas Mann, Zauberberg"
 panum.249.g: "If every sick person carried something like that..."
 panum.251.t: "A Cell Disease?"
 panum.251.d: "The much-noticed study by a German specialist on tuberculosis overturns Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'s previous findings because [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] has not yet been able to find a suitable counter-answer."
 panum.251.f: "'There are some colleagues who passionately claim that tuberculosis can be transmitted through infection. When confronted with the fact that there are many patients who have developed the disease without having been near a tuberculosis crane, they claim that it was probably infected somewhere years ago. How should one prove this? Rather, my own studies show that the tubercles of the lung tissue should be interpreted as cell proliferation. Tuberculosis must therefore be interpreted, like carcinoma, as the result of the proliferation of local cells. It can be clearly identified as a constitutional disease.'\n\nDr. Angelika Hasenbein, 'Tuberculosis, a Cancer-like Disease'"
 panum.251.g: "So tuberculosis works like a cell tumor?"
 panum.252.t: "Bronchiectasis"
 panum.252.d: "As Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] discovered, some alleged findings that [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] thought [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] had gained from tuberculosis patients were incorrect. They suffered from a completely different illness."
 panum.252.f: "'Unfortunately, some research has turned out to be a dead end. So I believed that some tuberculosis patients had recovered under certain circumstances. In reality they didn't have tuberculosis, but bronchiectasis. It is not excluded that tuberculosis can promote bronchiectasis, but these are two different diseases and not all results are therefore applicable. This is likely to significantly delay the search for a successful treatment method.'\n\nFrom the journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] in [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]"
 panum.252.g: "Wasted time!"
 panum.253.t: "Charlatanism"
 panum.253.d: "A visit to a sanatorium in [SCOPE.sState('panum_disease_state').GetCityHubName] turned out to be a complete disappointment for Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]."
 panum.253.f: "'Many colleagues and recognized medical specialists recommended the sanatorium in [SCOPE.sState('panum_disease_state').GetCityHubName] to me. It is an exemplary institution that operates in the field of tuberculosis with extremely serious methods - they said. Several patients spoke of medical miracles occurring there.\n\nHowever, after weeks of visiting, I realized that it was mostly marketing. While the doctors on site assured me how great the chances of recovery were, I discovered the exact opposite. When I looked through the patient files, I found that almost 50 percent of the patients admitted died in the first week. This whole sanatorium is a scam!\n\nFrom the journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] in [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]"
 panum.253.g: "But... but... the dinner should be excellent!"
 panum.254.t: "Contact with the White Death"
 panum.254.d: "Apparently the many visits to tuberculosis patients have an unintended effect: Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] spit blood today!"
 panum.254.f: "'What an unfortunate day. My dealings with tuberculosis and my supposed knowledge of the disease are now taking revenge. On the one hand, I was wrong on so many levels that it is only right that my pride be punished. On the other hand, it is an indication that it is a contagious disease. But at what cost did I have to make this discovery?\n\nFrom the journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] in [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]"
 panum.254.g: "The doctor will recover from this - right?"
 panum.264.t: "De Contagione"
 panum.264.d: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'s historical interests have led [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] to come across an ancient book from the Renaissance - which has immeasurable value."
 panum.264.f: "As early as 1546, the Veronese physician Girolamo Fracastoro postulated that diseases were caused mainly by infection with tiny particles that were reminiscent of later germs. He therefore doubted the miasma theory over 300 years ago. With regard to tuberculosis, Fracastoro also says that it is a contagious disease that is transmitted by these pathogens. The book is sometimes more convincing than many modern treatises. What is revolutionary is that Fracastoro assumes that these so-called 'fomites' enter via the respiratory system or body pores in order to look for food. This would advance the disease."
 panum.264.g: "This will spur the search for treatment."
 panum.264.h: "This is much more convincing than the miasma theory."
 panum.264.i: "Could a small pathogen cause tuberculosis?"
 panum.240.t: "Tuberculosis - A Contagious Disease"
 panum.240.d: "Through several experiments and patient examinations, Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] was able to conclusively prove that tuberculosis is not only a contagious disease, but was also able to derive several prevention methods from this in [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] treatise '[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_treatment_title')]'."
 panum.240.f: "'The knowledge that tuberculosis is a disease that can be transmitted from person to person and also from animal to person leads to a whole series of measures to prevent the disease.\nFirst, tuberculosis sufferers must be kept away from the masses.\nSecond, the disease must be reportable so that the spread can be mitigated.\nThird, regulations must be issued to ensure public hygiene - such as a ban on spitting in public or at least the use of public and personal spittoons.\nFourth, public health must be improved to minimize infection among proletarians.\nFifth, pasteurization of raw milk is essential.'\n\nFrom:[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_treatment_title')]"
 panum.240.g: "Tuberculosis is no longer fate."
 panum_add_dubious_yellow_fever_treatment_clues_effect_tt: "이것으로 단서를 획득...할지도 모릅니다."
 panum.540.t: "Preventing? Prevented!"
 panum.540.d: "After weeks of research and study, our doctor has devised a means to stop the spread of yellow fever!"
 panum.540.f: "'...but in the end, one proof remained, certain and inexcusable. Whether by net, smoke or pesticide, my investigation revealed that whenever the path of the mosquito was interrupted for whatever reason, the spread of yellow fever was halted. It must be, then, an insectborne disease. If we can interrupt the spawning process, we can very well prevent new mosquitoes arriving to infect our people. It is merely a matter of means, and I have devised a three point plan.\n\nI: Spray local ponds, bogs and swamps with pesticide to render them unsuitable for spawning. If possible, drain lesser bodies of water entirely.\nII: Deploy mosquito nets, fabric coverings dosed with pesticide, upon all openings of public buildings, especially hospitals.\nIII: Inform the people of the nature of this disease as one born by the mosquito, and encourage the use of nets, insecticide and smoke to fumigate their homes.\n\nI believe, earnestly, that if these methods are put into action, then we may well see the end of endemic yellow fever in our lifetimes, and an end to this most persistent of foes.'\n\nFrom:[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_treatment_title')] by Dr.[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]"
 panum.540.g: "Well done, doctor. Now, to get some mosquito nets and bug spray..."
 panum.541.d: "Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], our head physician, has arrived in [SCOPE.sState('panum_disease_state').GetName] to investigate the mysterious Yellow Fever."
 panum.541.f_america: "'We arrived in [SCOPE.sState('panum_disease_state').GetCityHubName] well before dawn, our train reaching the station to find a platform devoid of passengers and with but a flask of hot soup for the driver and his colleagues in the engine. Few men might depart a train so early in the morning, but I had been little able to rest; the letters and notes of the local government weighed heavily on my mind, for they spoke of a strange disease, Yellow Fever. The name stems from the jaundice that comes with the disease, though that is hardly the end of the troubles - vomiting, pains of the abdomen, bleeding of the eyes, and these slay many.\n\nBut whilst the results are familiar to us, written in accounts dating back to the first colonization of these lands, the nature of the disease itself has long evaded science. It is there that I found the purpose and energy to wake my colleagues, and lead them from the train and into the city, beneath the glow of the gas lamps around which the mosquitoes incessantly buzz. If we are to ever defeat this illness, we must learn the greatest question of all. What are we fighting?'\n\nFrom the journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], writing of Yellow Fever in [SCOPE.sState('panum_disease_state').GetName], [TimeKeeper.GetCurrentDate.Format('y')]"
 panum.541.f_africa: "'It was just past noon when our vessel pulled into port, and the captain informed us that we had reached our destination. One of the great outposts of our colonial empire, the local administration had sent word back to the capital of a strange, lethal disease that they had trouble understanding - no mere common flu, but the infamous Yellow Fever. It is no real stranger to me, nor to anyone well read on the history of tropical disease...but for all that we know of its many means of killing, we know so little of the disease itself.\n\nAccompanied by my assistants and an armed escort, we have established a laboratory not far from the center of town. There, we might keep our samples, make our home, and perform the necessary research to decipher the mysteries of Yellow Fever...but first, we must find those samples, and the ceaseless presence of mosquitoes is an unwelcome distraction. Still, it will not keep us from our work.'\n\nFrom the journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], writing of Yellow Fever in [SCOPE.sState('panum_disease_state').GetName], [TimeKeeper.GetCurrentDate.Format('y')]"
 panum.541.g: "Come along, gentlemen...yawn."
 panum.541.h: "...damned mosquitoes."
 panum.542.t: "Wars of Yesterday"
 panum.542.d: "In a bid to discover more about the history of Yellow Fever in these lands, Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] has decided to consult with the commander of a local garrison."
 panum.542.f: "'Ah, good to see you, doctor. My men are always happy to know they are in good hands if sickness comes. What can I do for you?'\n'The pleasure is mine, colonel. I was told that you might have records of past campaigns here? Do you have any that might have seen an outbreak of yellow fever amongst the troops?'\n'Oh, most certainly...here. That was an awful campaign, that was, believe me, and not just the enemy. Many lads that die in war die from the elements, disease, exposure. They call it attrition.'\n'This...attrition was especially bad, then?'\n'Worse than bad. Between the sickness and the rainy season, a man had more to fear at camp than they did on the battlefield. The heat was awful, too, and the insects.'"
 panum.542.g: "Insects, sickness, rain...a hell of nature's own making, one might say."
 panum.543.t: "Fields of Woe"
 panum.543.d: "Continuing [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] mission to learn more about Yellow Fever, Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] has travelled outside the settlement to a seeming hotbed of infection - a rural farm."
 panum.543.f: "'I will admit, it took nearly an hour to learn how to understand this rural accent, but the farm's owner proved to be quite informative. Although this region is often quite wet, there is still the need for irrigation works. Yet digging these trenches takes significant strength, provided by many dozens of local laborers, who oft live together in cramped, cluttered barracks. Such conditions might breed disease, and it is little surprise that the yellow fever was to be found there before long.\n\nThe farmer himself believes that it came from a travelling merchant of some kind, or perhaps with traders picking up the harvest or delivering tools, he cannot say for certain, but I would doubt this myself. It seems more like that Yellow Fever emerged here on its own...but if so, then how?'\n\nFrom the journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], writing of Yellow Fever in [SCOPE.sState('panum_disease_state').GetName], [TimeKeeper.GetCurrentDate.Format('y')]"
 panum.543.g: "How could a sickness just...spring up out of nowhere?"
 panum.544.t: "The Water...?"
 panum.544.d: "Investigating the possibility that Yellow Fever might be a waterborne disease, Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] has gathered samples from local waterways and wells."
 panum.544.f: "'One possibility that I had considered was that this sickness could be perhaps similar in nature to cholera, which might be carried through diseased water. Deciding to see if this was the case, I ordered my assistants to gather samples before I found a quiet place for my microscope, where I might work undisturbed. The humid and tropical air is distracting, as is the ceaseless buzz of the mosquitoes, but before long, the samples began to slip beneath the lense, allowing me to peer into that tiniest of worlds.\n\nUnfortunately, it was a fruitless endeavour. Some were dirtier than others, even bearing minute worms and the like, but these did not match the pattern of the infected, which scatters across the map like a spray of birdshot. Whatever is the case, I cannot find any clues as to the nature of yellow fever in this water...'\n\nFrom the journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], writing of Yellow Fever in [SCOPE.sState('panum_disease_state').GetName], [TimeKeeper.GetCurrentDate.Format('y')]"
 panum.544.g: "...but if they are not there, then where are they hiding?"
 panum.545.t: "The Island"
 panum.545.d: "Puzzled by a seeming 'break' in the pattern of infections, Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] has ventured to an unusual place - an island fishery."
 panum.545.f: "'Ah, you must be doctor...oh. Pardon the stink, doctor. Mind you don't fall in, either. The fish that eat the guts we toss are as like to eat you, if they can.'\n'...please, make it quick. Tell me about this place.'\n'Aye, well, I think you'll be glad to know that there's no sickness at all here. Not that yellow fever, anyway.'\n'How so? Is there anything that might be sparing your men?'\n'Might be that they spend so little time ashore. Most days they're out at sea, and some range further out and don't come back for a day or more. But there's gotta be more to it than that, I think. They spend their off time here on the island, in the barracks or in their homes, and there's no fever here at all.'\n'I will investigate...no, my assistants can after I return.'\n'I'll be sure to let everyone know, doctor...and they didn't even say goodbye.'"
 panum.545.g: "...but first, a soapy bath. A very, very soapy bath."
 panum.546.t: "Swamp Gas?"
 panum.546.d: "In what might be a haunting return of the old miasma theory, Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] has found startling reports - yellow fever might be related to swamp fumes!"
 panum.546.f: "'It pains me how so little here seems to make sense. Nothing aligns with the established theories that we know, and I find myself clutching at straws. However, there is one line of promise - swamps. My assistants prepared slides for the microscope, and they teem and thrive with microbes, but nothing we might identify. And yet, despite that, the plague explodes upon the shores. Homes near these bogs are the worst affected with yellow fever. Some even mention having it in childhood.\n\nAnd yet, there is no sign of...how. They do not drink the water, they do not eat fish caught in it, and yet the stink of it wanders to their homes on the breeze, floods them with the stench, and illness soon follows. The old texts would scream 'miasma', but this cannot be so...but if not, then how else could sickness spread from the swamp to the home?'\nFrom the journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], writing of Yellow Fever in [SCOPE.sState('panum_disease_state').GetName], [TimeKeeper.GetCurrentDate.Format('y')]"
 panum.546.g: "...or perhaps it is astrological...no, that makes no sense...does it?"
 panum.547.t: "The Rival"
 panum.547.d: "Deciding to seek out local expertise, Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] has decided to visit a potential ally - the local coroner."
 panum.547.f: "'Ah, good to meet you, doctor. My apologies if we do not shake hands, I have a body on the slab in the other room.'\n'Yellow fever?'\n'You would think so, but no. Malaria, would you believe it? Of all the times to see an outbreak, we get it now, at the same time.'\n'An unfortunate coincidence?'\n'Perhaps, but I've been here long enough to have seen a pattern. The two tend to come in pairs, and worse still, they've similar symptoms and similar deaths. Makes it a terrible chore to tell the two apart, I tell you. I would've thought them the same thing.'\n'That is...quite fascinating, actually. Have you good records of this?'\n'Oh, of course. I'll have my assistant send them over to you, though I don't know how helpful they might be. I don't know how this thing spreads, doctor, but I'd wager if you can find the one, you might find the other.'"
 panum.547.g: "Then perhaps we might kill two birds with one stone."
 panum.548.t: "The Forked Road"
 panum.548.d: "Puzzled by the nature of yellow fever, Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] has written back to the capital to request further instructions."
 panum.548.f: "'...and yet, try as I might, I find myself at a loss as to how to proceed. There are few 'tells' to guide my course of inquiry, and though I have examined a great many medical journals and consulted with local experts, I am not entirely certain of what yellow fever truly is. A sickness to be certain, but of what kind? A sickness of the air, as in a miasma? Something in the water, or the food? How does it spread from man to man, or perhaps, from swamp to man?\n\nThese are questions I cannot answer, and might never discover the truth of. If I cannot find the sickness, I cannot hope to fight it directly, yet my investigation is not entirely without fruit. I have perhaps found two possible avenues of research to consider:\n\nFirstly, that we might attempt to find some pattern as to how it is being spread. Perhaps with a focused investigation we may discern some logic as to how the sickness is conveyed, and so interrupt it. Perhaps halting the spread will reveal the true cause.\n\nSecond, that we attempt to devise some form of cure or vaccine, perhaps by investigating the children that were infected with it in youth but whom made a full recovery, as well as those who survive. We might not know of its origins, but perhaps we can best it still.\n\nAs such, I write to the capital, to you, esteemed gentlemen of learning and science, and ask: what is to be the focus of my research here?\n\nA letter from Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] in [SCOPE.sState('panum_disease_state').GetName], [TimeKeeper.GetCurrentDate.Format('y')]"
 panum.548.g: "An ounce of prevention is worth a pound of cure."
 panum.548.h: "We play for all the marbles. We will have a vaccine."
 panum.551.t: "The Path to Prevention"
 panum.551.d: "Following instruction from the capital, Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] has started to investigate how to prevent the spread of Yellow Fever."
 panum.551.f: "'...of course, it is hard to determine what, exactly, must be done to prevent the spread of a disease we scarcely understand in any way more than how it might induce fatality. Yet, if this is the challenge that I must face, then so be it. I have uncovered a number of promising leads so far; my map of the infection is sporadic, but here and there, certain islands of irregularity appear...places where the outbreak drops off significantly, even entirely.\n\nI can little pretend to truly understand the nature of this disease, but sickness is hardly irregular. There is a pattern here, waiting to be discovered, and if it can be found, then we might very well solve this puzzle and be rid of yellow fever for good.'\n\nFrom the journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], writing of Yellow Fever in [SCOPE.sState('panum_disease_state').GetName], [TimeKeeper.GetCurrentDate.Format('y')]"
 panum.551.g: "We are building a fortress, one brick at a time."
 panum.552.t: "Fillet O' Facts"
 panum.552.d: "Whilst working on a means to prevent the spread of yellow fever, Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] was visited by one of [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] assistants."
 panum.552.f: "'Ah, it is good to see you again, my boy, and - good heavens! What is that stench?'\n'Sorry, doctor...I just got back from the fishery, the one you sent me to investigate. I've found something very interesting!'\n'So interesting you couldn't spare time for a bath, it seems...'\n'Forgive me, but yes. I looked into how yellow fever didn't affect the men at the fishery, and started to follow it back to the mainland. There's a smokehouse on the shore, and the workers leave by it, and no one's getting yellow fever there. And that had me thinking...maybe the smoke keeps it away? So, I started looking around for places with lots of smoke, and I found this soapmaker, and they put herbs and oils into their burner. Not a single yellow fever in their household.'\n'Hmmm...this is fascinating work. Continue your observations and keep me informed and, oh, good work.'"
 panum.552.g: "Eager steps sends the assistant away...but leaves the doctor to think."
 panum.553.t_america: "The Mission"
 panum.553.d_america: "Following the path of gaps in the outbreak, Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'s research has led them to an old colonial mission."
 panum.553.f_america: "'It did not take long to find the mission here. It was one of the first buildings raised after colonization, our forefathers fresh from lands they might never see again. It is no grand cathedral, but it was built with love, and over time, missionaries and members of the Mother Church have seen it grown, exploding out with wards and halls of its own. It was one of the first places where the sick might be brought, tended to by nuns and any godly volunteers willing to help.\n\nBy all accounts, it should very well have become a slaughterhouse of its own...and yet, this is not so. Whereas other hospitals count their dead and see the disease leap from ward to ward, here, nothing. A family was brought in after ta house fire, but after a week, none of them caught yellow fever, despite being sheltered but a few rooms away. It puzzles me, for both mission and hospital are alike, but there is one major difference: nets. A sermon is a sacred thing, and cannot be interrupted by buzzing mosquitoes and their ilk, so the clergy have put nets over every window to keep out mosquitoes, even in the wards.\n\nAnd just like that, yellow fever seems to vanish entirely.'\n\nFrom the journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], writing of Yellow Fever in [SCOPE.sState('panum_disease_state').GetName], [TimeKeeper.GetCurrentDate.Format('y')]"
 panum.553.g: "For I will restore health unto thee..."
 panum.553.t_africa: "The Slum"
 panum.553.d_africa: "Following the path of gaps in the outbreak, Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'s research has led them somewhere curious - the slums."
 panum.553.f_africa: "The slums were near enough to make any man doubt the importance of our great colonial enterprise in these lands. Filthy and wretched, packed to the bursting with women and children, waiting for their menfolk to return from the plantations or the mines or wherever they might work. Overworked water pumps fill pots, flies buzz, and a distinct lack of sanitation would all combine to make this place seem a cauldron of disease. Indeed, it is.\n\nA rare sight in these places, a doctor such as I was eagerly taken from house to house by local guides and with the escort of the constabulary, asked to provide insight into one sickness or the other. In exchange, I asked questions of them: what of yellow fever? I saw cases of cholera and dysentery, but not the disease I am hunting for. One woman pointed to the windows, or where they should be - instead of glass, a wall of fabric, a net. To them, it kept out the malaria, but also, perhaps, yellow fever...which, they believe, might very well be bore by insects.'\n\nFrom the journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], writing of Yellow Fever in [SCOPE.sState('panum_disease_state').GetName], [TimeKeeper.GetCurrentDate.Format('y')]"
 panum.553.h: "...and maybe, just maybe, the locals are right?"
 panum.554.t: "The Biggest Killer"
 panum.554.d: "Reading through records given to them by local military forces, Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] has made a discovery."
 panum.554.f: "'Ah, it is good to meet you again, colonel. I have some questions about these records that you gave me? Do you have a moment to spare?'\n'Oh, but of course! Anything to help.'\n'It mentions here that the last campaign was led by an officer who was, it seems, deeply troubled by insect bites.'\n'Troubled, and very, very annoyed, I am afraid. Bites are just a part of life in this land, but where they came from...none.'\n'I see, I see...but it also mentions the army was afflicted with both malaria and yellow fever, which killed more by sickness than in battle.'\n'Attrition is long a part of warfare, I am afraid.'\n'...but once they ordered the use of pyrethrum, the cases of yellow fever and malaria dropped sharply. Then, a week later, he ordered spraying of the local area, and again, rates dropped. What, exactly, is this pyrethrum?'"
 panum.554.g: "'Oh, pyrethrum? It's used to delouse the troops. Kills insects, you see.'"
 panum.555.t_america: "The Memories of Yesteryear"
 panum.555.d_america: "Locked in battle against a disease that has plagued South America for centuries, Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] hunts for answers in a strange place - the past."
 panum.555.f_america: "'Some say that the past is a different country. In the Americas, perhaps that is more true than anywhere else, for much has changed since Columbus, yet to my surprise, the disease I fight is not one of them. It took weeks to track down journals and records from the first colonists in these lands, but at last, they have made their way into my hands. It is a valuable find. With them, I have the accounts of past physicians, brilliant minds that might have lacked the tools that we today take for granted.\n\nYet, whilst we may have inherited their unfinished battle, they have left us precious information that might allow me to finish what they started. There is a precious revelation, hidden, hard to notice without such accounts. Every once in a while, there is an explosion of yellow fever in this region, almost like clockwork. That alone is useless, but it correlates almost exactly with journals that talk of intense rain and even flooding, recorded here as homes being washed away in floods that are then followed by outbreaks of yellow fever. Could the two be related?'\n\nFrom the journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], writing of Yellow Fever in [SCOPE.sState('panum_disease_state').GetName], [TimeKeeper.GetCurrentDate.Format('y')]"
 panum.555.g: "We all stand on the shoulders of giants...they just had less giants to stand on."
 panum.555.t_africa: "Folk Remedies"
 panum.555.d_africa: "Perhaps controversially, Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] has sought out advice from the people that might know the yellow fever best - the natives."
 panum.555.f_africa: "'There are those who would call me mad for choosing to consult the natives over a medical journal, but I think they lack sound reasoning for such a judgement. Yellow fever is a disease found here, in Africa, and these people have lived here so much longer than us. Indeed, there is the chance that this disease emerged in this land in the first place. Perhaps this is so, for many outbreaks here may slaughter Europeans and the like with ease, but give the native African people nothing more than symptoms akin to a mild influenza.\n\nYet, despite that, there is understanding. I have spoken with a number of local healers and even representatives of tribes further in land, and they mention certain preventative practices...the burning of elephant dung and various plants, even bringing that smoke indoors, which drives away the mosquitos which they believe are related to malaria, and perhaps, to yellow fever. More than that, they have a means to read the land around them and predict the start of the 'rainy' season, which they believe corresponds to the worst of malaria and yellow fever both. It will take further study and consideration, but this is promising.'\n\nFrom the journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], writing of Yellow Fever in [SCOPE.sState('panum_disease_state').GetName], [TimeKeeper.GetCurrentDate.Format('y')]"
 panum.555.h: "Wisdom, in the place least expected."
 panum.556.t: "Simple Fabric?"
 panum.556.d: "Although meant to support our troops at a frontier garrison, new fabrics impregnated with insecticides have arrived at the same town that Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] is investigating."
 panum.556.f: "'Are you meant to be in this area - oh, I see, you're the doctor from the capital. I don't know if there's much here for you, doctor. Ain't a single case of that fever round here.'\n'...that I can tell. What is this?'\n'The generals back home figured out that they can dose pesticides straight into the fabric and keep the bloody bugs at bay. See? Look at the ground. Dozens of the bastards, dead already.'\n'It must be very effective to kill them so quickly. How many men stay in these tents?'\n'Best part of a battalion, probably about six hundred. Fabric is new since the old ones were wrecked in a monsoon last year. Terrible time, fever everywhere, and malaria, too. Now we got this, nothing.'"
 panum.556.g: "...did you just say there's not a single fever since you got this new fabric?"
