 panum.2301.t: "[SCOPE.sCharacter('chosen_character').GetFullName]의 [SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')] 치료 성공"
 panum.2301.d: "[GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] 박사가 [SCOPE.sCharacter('chosen_character').GetFullName]의 [SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')] 치료에 성공했다."
 panum.2301.f: "\"걱정 마십시오, 선생님. 이 치료법은 분명 효과가 있을 겁니다! 지금까지 최소 두 차례에 걸쳐 시술했는데, 사망한 환자는 딱 한 명 뿐이었습니다!\""
 panum.2301.g: "좋아!"
 panum.2302.t: "[SCOPE.sCharacter('chosen_character').GetFullName]의 애매한 [SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')] 치료"
 panum.2302.d: "[GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] 박사가 [SCOPE.sCharacter('chosen_character').GetFullName]의 [SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')] 치료에 나섰으나 별다른 차도를 보이지 않았다."
 panum.2302.f: "\"물만 충분히 마셔도 효과가 있을 줄 알았건만!\""
 panum.2302.g: "그래도 해가 되진 않았군."
 panum.2303.t: "[SCOPE.sCharacter('chosen_character').GetFullName]의 어설픈 [SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')] 치료"
 panum.2303.d: "[GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] 박사가 [SCOPE.sCharacter('chosen_character').GetFullName]의 [SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')] 치료에 나섰으나, 시술이 너무 형편없는 바람에 증세가 더욱 악화되고 말았다."
 panum.2303.f: "\"이번 주에만 벌써 세 번째로군...\""
 panum.2303.g: "이런 일이 벌어져서는 안 됐는데!"
 panum.2304.t: "죽음을 부르는 [SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')] 치료법"
 panum.2304.d: "[GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] 박사가 [SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')] 치료에 나섰다가 애석하게도 환자가 사망하고 말았다."
 panum.2304.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_fatal_flavor_text_type')]"
 panum.2304.g: "비극이군!"
 panum_foreign_medical_expedition_modifier: "해외 의학 탐사"
 panum.137.t: "질병 연구를 희망하는 탐사대"
 panum.137.d: "외국에서 온 탐사대가 우리나라의 국경 지대로 찾아왔다. 이들은 주로 의사와 과학자 그리고 그 조수들로 구성되어 있다. 이들은 한창 유행 중인 전염병을 조사하고 싶어하는 모양이다."
 panum.137.f: "의학 탐사는 다른 국가로 파견되어 질병 치료법을 과학적으로 연구하고 질병 기술서를 마련하여 자국에 보낼 수 있습니다. 탐사대를 들이는 국가 입장에서도 유행 지역의 환자들을 진료할 수 있다는 점에서 혜택을 봅니다."
 panum.137.g: "참 용감한 분들이로군. 환영하오."
 panum.2202.t: "Ancient Disease"
 panum.2202.d: "Our Doctor has brought precious insight to the work of our Anthropologist!"
 panum.2202.f: "'...but, of course, if you examine this part of their skull, you can see that they had actually begun to heal from their injuries.'\n\n'Then that was definitely not the cause of death?'\n\n'Most likely! A nasty blow, but not lethal. I would estimate they spent another six or so months alive before another injury took them down, or perhaps the wound went bad.'\n\n'Hmmm. Fascinating. Judging by the nature of the blow, I thought it likely to be some kind of...blunt instrument.'\n\n'A club, most like, or perhaps a tool with a blunt stone. I think this rib presents the true cause of death. Note the narrowing of the bones, here and here.'\n\n'Injury?'\n\n'Tuberculosis, most like. I would wager your man died after years of battling this white death.'"
 panum.2202.g: "Cross-disciplinary science remains the best science."
 panum.2203.t: "Strange Medicine"
 panum.2203.d: "With some free time together, our Doctor and Archaeologist have shared their research!"
 panum.2203.f: "'Ah, but that is where things get interesting, doctor! These jars come from Egypt, and contain what we believe to be samples of ancient medicine.'\n\nFascinating, fascinating. Is this the mummia oil?'\n\n'...isn't that found on the bodies, with healing properties? The resin around their wrappings?'\n\n'Oh, no, not at all! Mummia is a type of oil they find out of the ground, akin to petroleum. Why?'\n\n'...I think it best we examine these medications more. There are all sorts of tinctures. Please, take a look at them, and I will be back in a moment. I need to dispose of...something.'\n\n'Well, these seem as if they might have been perfumed and - are you eating something in there?'"
 panum.2203.g: "...you're not eating the mummy, are you?"
 panum.2204.t: "Herbal Remedies?"
 panum.2204.d: "Having had some time to examine their finds, our Naturalist has delivered plants with potentially medicinal properties to our Doctor's office."
 panum.2204.f: "'Ah, there you are! I was cataloguing some of the samples we brought back from the last botanical expedition, and I found a few that might be of interest to you.'\n\n'Oh, truly? How so?'\n\n'Some of them are related to plants with known medicinal properties, like fighting inflammation or fever. Some of them are completely alien to us, but come with good words from the natives and are worth investigating further.'\n\n'Herbal medicine isn't much good of a science...but one never knows. There could be something interesting in these. You know the wonders they found in the poppy plant, after all.'\n\n'Ah, morphine!'\n\n'Indeed, indeed! I will have my assistants get to work on preparing some powdered samples, for closer examination.'"
 panum.2204.g: "I believe the coca leaf is especially fascinating, doctor."
 panum_germ_theory_loc: "현재 정설: #V 매균설#!"
 panum_miasma_theory_loc: "현재 정설: #V 미아즈마설#!"
 panum_no_epidemic_corruption_modifier: "No Epidemic Corruption"
 panum_measles_depression_modifier: "Measles Depression"
 panum_sailor_quarantine_modifier: "Measles paralyzes Sailors"
 panum.600.t: "홍역 유행"
 panum.600.d: "우리나라의 어느 주에서 전염병이 돌고 있다. [SCOPE.sState('panum_disease_state').GetName]에서 #YELLOW 홍역#!이 발병한 것이다!"
 panum.600.f: "Like smallpox, measles was mentioned by the Persian physician Rhazes in the 10th century and appears to have been widespread in the Eurasian region throughout the Middle Ages. Measles was endemic in Europe until the 19th century and became even more important as urbanization increased. A special characteristic of Masenr is the rash that begins on the face and neck and spreads over the entire body within a few days. Along with smallpox, measles is considered one of the diseases that struck large parts of the Indian indigenous population in the 16th century."
 panum.600.g: "But that's just a harmless childhood illness... right?"
 panum.620.t: "홍역 유행 종식"
 panum.620.d: "The measles epidemic is apparently over. A last set of parents buried their dead child."
 panum.620.f: "'Like the measles, love is most dangerous when it comes late in life.' -Lord Byron"
 panum.602.t: "Measles epidemic reaches [SCOPE.sCountry('panum_infected_country').GetName]"
 panum.602.d: "We have received reports that the first cases of measles were reported in the [SCOPE.sCountry('panum_infected_country').GetName] today. The authorities blame us for not doing enough to prevent the spread."
 panum.602.g: "There was no way to prevent this."
 panum.603.t: "Measles kills children"
 panum.603.d: "In [SCOPE.sState('panum_disease_state').GetName], the measles outbreak was much more severe than expected. The epidemic was particularly rampant among infants and young children and permanently weakened an entire generation."
 panum.603.f: "Measles has always been viewed as a childhood disease, although it can also affect adults. It shows its most devastating effects between the ages of 2 and 3 years. The death rate then drops rapidly. In 1963, before a vaccine was invented, official statistics estimated that 2 million measles deaths were occurring worldwide every year. Around 5 to 10 percent of the cases of the disease ended fatally."
 panum.603.g: "Is there no cure for this terrible illness?"
 panum.604.t: "Measles paralyzes Sailors"
 panum.604.d: "For mysterious reasons, measles in [SCOPE.sState('panum_disease_state').GetName] particularly affected fishermen and sailors. The death rates are negligible, but the loss of work is noticeable in the fish yards and among the whalers."
 panum.604.f: "During his research on the Faroe Islands, Peter Panum found that measles also affected adults, especially in more isolated populations. The reasons for this remained obscure for a long time; In principle, however, it was noticeable that fishermen and their families who lived away from the busier towns were particularly affected."
 panum.604.g: "But who goes to sea now?"
 panum.605.t: "Children's Clinic for Measles"
 panum.605.d: "[SCOPE.sCharacter('panum_government_leader').GetFullName] has noted the high number of children suffering from measles in [SCOPE.sState('panum_disease_state').GetName], particularly among poorer families where death rates are higher. The politician would like to finance a children's clinic for measles and has asked for a public donation."
 panum.605.f: "'It is a shame to see the good parents of [SCOPE.sState('panum_disease_state').GetName] at the mercy of this terrible disease. Politicians must act and take responsibility. For far too long, far too little has been done by too many. A children's hospital should help protect the most valuable thing that parents have. We will help. I promise you that. As long as my name is [SCOPE.sCharacter('panum_government_leader').GetFullNameNoFormatting]...what do you mean I give election speeches?'"
 panum.605.g: "An initiative worth supporting."
 panum.605.h: "This party only wants to exploit the disease for political purposes."
 panum.606.t: "Measles Depression"
 panum.606.d: "'The many sick and dead children in [SCOPE.sState('panum_disease_state').GetName] have left their mark on many parents. Some speak of numerous people who are in a life crisis.'"
 panum.606.f: "'Ms. Miller had to bury her third child this month. She is just one of many mothers who are now childless. Mr. Miller, who runs a bakery in town, has closed his shop for several weeks. Many families in this area are like the Millers. There is hardly a clan that has not lost a child. However, the fatalism has been turning into dissatisfaction for weeks. People in this region have become significantly more sensitive should circumstances continue to take a turn for the worse. Many people now blame the government for their misery.'\n\nArticle from the [SCOPE.sState('panum_disease_state').GetCityHubName] Herald"
 panum.606.g: "Not entirely incomprehensible given the situation."
 panum.622.t: "Measles Incubation"
 panum.622.d: "Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] has compiled a meticulous list of measles cases that pretty much shows the incubation period of measles."
 panum.622.f: "'It cannot be denied that the desquamation stage may be infectious, but one should be cautious in accepting this view inasmuch as on general grounds one would suspect the opposite. It almost appears that because such a long latent period could not be conceived, a later stage of the illness was chosen as the infecting one. In the villages of Hove and Lobre, on Suderø, towards the end of the epidemic, there occurred an interval of longer than fourteen days between generations of the exanthem in the same household, without my being able to demonstrate a new infection from without; yet these two cases can be explained by an infection which was transmitted during the stage of convalescence. From the data here presented, I believe that the incubation period of measles can be estimated with great assurance to be about fourteen days, without, however, insisting that this interval is one which cannot be modified by particular circumstances, as, for example, a journey; many factors speak a priori against such an absolute dictum, as well as analogy with the uncertainty of the latent periods of other diseases.' -Peter Panum"
 panum.623.t: "Measles uniqueness"
 panum.623.d: "In a new intermediate step, Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] differentiated between different forms of measles and not only noted the differences from other, similar diseases such as smallpox, rubella and measles, but also highlighted the unique symptoms."
 panum.623.f: "'The literature on measles is insignificant and incomplete in comparison with that en other acute exanthemata, as, for example, scarlet fever and smallpox. Aside from scattered reports in the journals relating to single outbreaks, there are only a few monographs, several of which date back to the preceding century. This exanthematic fever, certainly unknown to Greek and Arabian physicians, was so insufficiently differentiated even in the last century that de Haën maintained the identity of measles with smallpox, on the basis of symptoms, and writers prior to the end of the seventeenth century described both diseases as belonging to the same family.' -Peter Panum"
 panum.624.t: "Virgin Populations and lifelong Immunity"
 panum.624.d: "Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] was recently able to show very clearly that when measles affects an individual, it does not occur again. Populations that have never been exposed to the disease are therefore particularly at risk."
 panum.624.f: "'In this connection it is quite remarkable, however, that of the many aged people still living on the Faroes who had had measles in 1781, not one, as far as I could find out by careful inquiry, was attacked the second time. I myself saw ninety-eight such old people, who were exempt because they had had the disease iii their youth. This was the more noteworthy in that a high age by no means lessened the susceptibility to measles, since, as far as I know, all the old people who had not gone through with measles in earlier life were attacked when they were exposed to infection; whereas certain young persons, although constantly exposed, were exempt. If recovery from measles sixty-five years before could insure people against taking the disease a second time, it might be supposed that still greater protection would be afforded by having recovered from it a shorter time before' -Peter Panum"
 panum.700.t: "성홍열 유행"
 panum.700.d: "우리나라의 어느 주에서 전염병이 돌고 있다. [SCOPE.sState('panum_disease_state').GetName]에서 #YELLOW 성홍열#!이 발병한 것이다!"
 panum.700.f: "Scarlet fever has been known since ancient times and was well described in the 17th century, notably by Thomas Sydenham. Although scarlet fever apparently became less dangerous in the 18th century, it struck back in a new form in the 19th century. Pierre Fidèle Bretonneau, for example, stated that around 1800 he had not known a single fatal case of scarlet fever, while in 1824 he observed an epidemic in Tours with such high mortality that he placed scarlet fever on a par with plague and cholera. Scarlet fever is accompanied by a characteristic rash. Unlike smallpox or measles, scarlet fever is characterized by a swollen tonsil area and a strawberry-colored tongue."
 panum.700.g: "Every child has to go through this at some point. Hopefully."
 panum.720.t: "성홍열 유행 종식"
 panum.720.d: "The scarlet fever epidemic that has gripped our country is slowly leaving the cities and villages. Countless parents breathe a sigh of relief."
 panum.720.f: "'It's like scarlet fever: one has to get it over.'\n\n'Then one should invent a way of inoculating love, like vaccination.' -Leo Tolstoy"
 panum.722.t: "Ancient Knowledge"
 panum.722.d: "Through an antique dealer, [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] was able to find several old books that summarize descriptions of scarlet fever in the past and could also be useful in the present."
 panum.722.f: "It cannot be said with certainty whether scarlet fever was known in ancient times or whether it was confused with similar diseases such as diphtheria, measles and rubella. Evidence of a disease similar to scarlet fever already exists in Celsus, Caelius Aurelianus, Arataeus of Cappadocia and Aetius of Amida. Similar descriptions can be found in the Arabic-Perisian region from the Middle Ages onwards, namely by Avicenna, Ali Abbas and Rhazes. The first definitive description of scarlet fever is a description by Giovanni Filippo Ingrassia from 1553. Another important position is held by the physician Daniel Sennert, also from the 16th century. The name 'Scarlatina' goes back to Thomas Sydenham and his description from 1675. Although Sydenham's description is considered authoritative, there are significant gaps in it, and the term scarlet fever also appears to have been widespread in England as early as the middle of the 16th century."
 panum.723.t: "Scarlet Fever Symptoms"
 panum.723.d: "Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] has made progress in his description of scarlet fever and has summarized the symptoms for the first time."
 panum.723.f: "'The patients feel rigoros and shivering, just as they do in other fevers. The symptoms, however, are moderate; afterwards the whole skin becomes covered with small red maculae, thicker than those of measles, as well as broader, redder, and less uniform. These last for two or three days and then disappear. The patient not only has a rash, but also inflammation of the tonsils. There may be complications such as rheumatism and dropsy.'\n\nA a letter from Doctor [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] to the Medical Faculty"
 panum.724.t: "Scarlatina does not love the Larynx"
 panum.724.d: "Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] has identified the specific differences between the diseases scarlet fever and diphtheria."
 panum.724.f: "'In scarlet fever, the inflammation is widely over the tonsils, palate, and pharynx, and is not, as in diphtheria, at first limited to one spot; and secondly, the scarlatinal inflammation of the pharynx has no tendency to sprad into the respiratory passages. To put it briefly: scarlatina does not love the larynx.'\n\nA a letter from Doctor [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] to the Medical Faculty"
 panum_plague_quarantine_modifier: "Plague Quarantine"
 panum_plague_hospitals_modifier: "Plague Houses"
 panum_plague_burn_everything_modifier: "Burn everything!"
 panum_plague_rat_killer_modifier: "Kill everything!"
 panum_plague_loss_of_trust_modifier: "Loss of Trust"
 panum.800.t: "The Return of the Plague"
 panum.800.d: "There have been rumors for several years that the plague has returned to parts of our country. Previously this had been limited to remote rural districts. However, with the outbreak in [SCOPE.sState('panum_disease_state').GetName] it is finally clear: the plague is once again extending its gnarled fingers!"
 panum.800.f: "The third plague pandemic (after the Justinian Plague in the 6th century and the 'Black Death' in the 14th century) began in China at the end of the 19th century. It is thought that the pandemic originated from Yunnan which saw an outbreak as early as 1792, in 1855 and again in 1866. An outbreak in neighboring city of Guangzhou from January 1894 onwards killed 80,000. From March 1894, British scientists and doctors in Hong Kong became aware of the outbreak. After the cholera waves of the past decades, the plague wave was expected to cause many deaths, especially in China and India, and ultimately lead to state instability. It would cost an estimated 15 million lives worldwide."
 panum.800.g: "Impossible! The plague is a disease of the forgotten past!"
 panum.820.t: "페스트 유행 종식"
 panum.820.d: "The terrible plague, one of the worst scourges of humanity, has left our country again. Let's hope it returns to where it belongs: into the abyss of history."
 panum.820.f: "'But what does it mean, the plague? It's life, that's all.' -Albert Camus"
 panum.802.t: "Plague spreads to [SCOPE.sCountry('panum_infected_country').GetName]"
 panum.802.d: "Cases of plague are now also being reported beyond our borders. Apparently the authorities were unable to contain the disease. The [SCOPE.sCountry('panum_infected_country').GetAdjectiveNoFlag] ambassador made serious accusations against us."
 panum.802.g: "In the long term, the plague comes to everyone..."
 panum.803.t: "페스트 유행"
 panum.803.d: "우리나라의 어느 주에서 전염병이 돌고 있다. [SCOPE.sState('panum_disease_state').GetName]에서 #YELLOW 페스트#!가 발병한 것이다!"
 panum.803.g: "The Black Death is knocking."
 panum.804.t: "The Plague: A Third Wave"
 panum.804.d: "Disturbing news reaches us from [SCOPE.sCountry('panum_plague_country').GetName]. A violent epidemic outbreak is said to have raged there a few weeks ago. Doctors are worried: it is supposed to be the infamous plague."
 panum.804.g: "We should put together a medical expedition to prepare for this."
 panum.805.t: "Plague Quarantine"
 panum.805.d: "The situation in [SCOPE.sState('panum_disease_state').GetName] threatens to get out of control. Influential politicians, heads of authorities and private individuals are calling for a quarantine to prevent the plague from spreading further. These are primarily people who do not live in [SCOPE.sState('panum_disease_state').GetName]."
 panum.805.f: "Extensive, strict quarantines had already proven successful in the Middle Ages. In fact, the term quarantine goes back to the word 40 in the Italian language and was apparently first used during times of plague. The Republic of Venice in particular, as a trading nation with extensive shipping traffic, was known for this measure, as port and trading cities were particularly affected by epidemics."
 panum.805.g: "The whole area should be quarantined."
 panum.805.h: "We shouldn't overdramatize."
 panum.806.t: "Plague Houses"
 panum.806.d: "The local authorities in [SCOPE.sState('panum_disease_state').GetName] have made a proposal to set up plague houses to better isolate the healthy population from the sick population. This would particularly affect the poorer classes, who cannot flee like the wealthy."
 panum.806.f: "A plague house was used to care for plague patients during plague epidemics. Since the epidemic was considered incurable during the peak period of these waves of illness, in the late Middle Ages and early modern times, and was therefore only a relief as a result of medical care, plague houses were primarily intended to isolate the sick from the healthy population. For this purpose, plague houses similar to leprosoriums were usually built outside or on the outskirts of a city. Another type of plague house was intended to serve prevention in the sense of a quarantine period. People in whose immediate vicinity the plague had occurred were taken to the plague house, which they were only allowed to leave if they turned out to be uninfected."
 panum.806.g: "It's only for their own good. Even if they don't want to."
 panum.806.h: "That would only provoke unrest."
 panum.807.t: "The Plague Doctor"
 panum.807.d: "The leading doctor in one of our plague hospitals in [SCOPE.sState('panum_disease_state').GetName] has gained so much experience in this field that he could be a valuable help on the national level."
 panum.807.f: "'Let me through! I am a doctor. And I know exactly how to deal with this illness.'"
 panum.807.g: "Give the doctor a high-ranking position as a physician."
 panum.808.t: "The Flight of the Wealthy"
 panum.808.d: "The number of emigrants in [SCOPE.sState('panum_disease_state').GetName] is increasing every day. In particular, those families who can afford it try to escape the plague. There is great resentment among those who cannot afford such an escape. Others warn that this will make the plague more widespread."
 panum.808.f: "'Some again, the most sound, perhaps, in judgment, as they we also the most harsh in temper, of all, affirmed that there was no medicine for the disease superior or equal in efficacy to flight; following which prescription a multitude of men and women, negligent of all but themselves, deserted their city, their houses, their estate, their kinsfolk, their goods, and went into voluntary exile, or migrated to the country parts, as if God in visiting men with this pestilence in requital of their iniquities would not pursue them with His wrath, wherever they might be, but intended the destruction of such alone as remained within the circuit of the walls of the city; or deeming, perchance, that it was now time for all to flee from it, and that its last hour was come.' -Bocaccio"
 panum.809.t: "Piles of corpses"
 panum.809.d: "The number of deaths from the plague reached such proportions that it could hardly be kept under control. Some are already recommending public burning and mass graves."
 panum.809.f: "At the peak of the 1894 plague in Hong Kong, admissions to hospital averaged at 80 a day, and death peaked at over 100 per day. Through maritime traffic, the epidemic spread to the rest of the country after 1894 and eventually spread to British Raj India where about ten million Indians were killed. The main preventive measures were setting up plague hospitals and deploying medical staff to treat and isolate plague patients; conducting house-to-house search operations, discovering and transferring plague patients, and cleaning and disinfecting infected houses and areas; and setting up designated cemeteries and assigning a person responsible for transporting and burying the plague dead."
 panum.810.t: "The Black Death takes its toll"
 panum.810.d: "The plague epidemic is particularly raging in [SCOPE.sState('panum_disease_state').GetName] these days. Numerous deaths have been reported, even more than usual."
 panum.810.f: "The disease remained localized in Southwest China for several years before spreading. In the city of Canton, beginning in January 1894, the disease had killed 80,000 people by June. Daily water traffic with the nearby city of Hong Kong rapidly spread the plague there, killing over 2,400 within two months during the 1894 Hong Kong plague."
 panum.810.g: "Nobody escapes Grim Reaper!"
 panum.811.t: "Burn everything!"
 panum.811.d: "Cleaning and disinfecting the homes of those affected is often the only way to stop the spread of the plague. This often includes burning anything that comes into contact with a plague patient."
 panum.811.f: "'I say, then, that such was the energy of the contagion of the said pestilence, that it was not merely propagated from man to man but, what is much more startling, it was frequently observed, that things which had belonged to one sick or dead of the disease, if touched by some other living creature, not of the human species, were the occasion, not merely of sickening, but of an almost instantaneous death. Whereof my own eyes (as I said a little before) had cognisance, one day among others, by the following experience. The rags of a poor man who had died of the disease being strewn about the open street, two hogs came thither, and after, as is their wont, no little trifling with their snouts, took the rags between their teeth and tossed them to and fro about their chaps; whereupon, almost immediately, they gave a few turns, and fell down dead, as if by poison, upon the rags which in an evil hour they had disturbed.' -Boccaccio"
 panum.811.g: "Burn clothes, furniture and even houses if necessary!"
 panum.811.h: "This is not necessary."
 panum.812.t: "Kill everything!"
 panum.812.d: "It was suspected early on that rats could be carriers of the plague. There are calls in the [SCOPE.sState('panum_disease_state').GetName] to specifically eradicate animals and vermin in order to prevent the spread of the disease."
 panum.812.f: "In the wake of the third plague pandemic, European cities created real 'anti-rat corps' that were tasked with specifically searching for and killing the animals or dipping them in buckets of petrol. However, it was often proposed that other sources of plague, such as infected human-specific or human-biting parasites, like fleas and lice, were important for transmission in Europe during the Third Pandemic. The low numbers of plague-infected rats found during European outbreaks suggest that they played a relatively minor role in plague transmission. However, some researchers have argued that the authorities were unlikely to find plague-infected rats because they would go into hiding."
 panum.812.g: "Exterminate the rats."
 panum.812.h: "This is too costly."
 panum.813.t: "Loss of Trust"
 panum.813.d: "Many residents in [SCOPE.sState('panum_disease_state').GetName] find the current medical situation scandalous. The many deaths and the obvious government failure have led to a widespread loss of trust in the government."
 panum.813.f: "The plague epidemic of the 19th century caused a high number of victims, particularly in China, which severely shook confidence in the government and the Heavenly Mandate of the Qing emperors."
 panum.813.g: "Then do your mess alone!"
 panum.822.t: "The Black Death"
 panum.822.d: "Using several historical sources, Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] was able to prove that the new wave of plague is actually a disease that corresponds to the Black Death of the Middle Ages."
 panum.822.f: "The discovery of the spread of the plague in India had a dominant significance in the view of the plague in its current meaning as a modern disease. It initially led to the view that there was only one way the disease spread. The research has now expanded to include a large number of rodents and a large number of flea species. The high mortality in the colonies led to increased research efforts to map the epidemic features. The fact that it was always the plague was not questioned as the starting point. The disease was given the historical term plague. The identity of the medieval plague with the plague researched in India was assumed."
 panum.823.t: "Plague season"
 panum.823.d: "Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] has gone through all the records. Whether in this epidemic or before, whether in the near or distant past: there are no plague epidemics in winter. Why this is the case remains unclear, but it could play a role in the search for the reasons for the outbreak of the disease."
 panum.823.f: "'Thus ends this year ... It is true we have gone through great melancholy because of the great plague, and I put to great charges by it, by keeping my family long at Woolwich, and myself and another part of my family, my clerks, at my charge at Greenwich ... But now the plague is abated almost to nothing ... But many of such as I know very well, dead. Yet to our great joy, the town fills apace, and shops begin to open again. Pray God continue the plague's decrease - for that keeps the Court away from the place of business, and so all goes to wrack as to public matters, they at this distance not thinking of it.' -Samuel Pepys"
 panum.824.t: "Bubonic Plague and Pneumonic Plague"
 panum.824.d: "Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] was able to show that there is more than just one form of plague."
 panum.824.f: "The plague is usually understood to mean the bubonic plague. The incubation period is a few hours to seven days. The symptoms are fever, headache and body aches, a strong feeling of illness and dizziness. Disturbances of consciousness occur later. The name bubonic plague comes from the severely swollen, very painful bumps on the neck, armpits and groin. Pneumonic plague is significantly rarer. It is likely to be similar to influenza, although its ability to spread is much weaker. The spread is so specific that it can only become an epidemic under particularly favorable circumstances. First of all, the sources of infection are rare. Only a small proportion of the plague-infected population gets pneumonic plague, for example in the case of bubonic plague and weak resistance."
 panum.241.t: "The Rabbit Experiment"
 panum.241.d: "Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] comes up with a daring experiment that will ultimately prove the contagiousness of tuberculosis. It's about inoculation. And it's about lots of little dead rabbits."
 panum.241.f: "'For my first experiment, I purchased a pair of cute rabbits three weeks old for the purpose of determining the contagiousness of tuberculosis. I sprinkled one of these with tuberculitic extract from the tissue of a tuberculosis patient who had died 33 hours previously. I repeated the procedure twice. After a few days I dissected the animals and discovered that the rabbit was infected with tuberculosis.\n\nA month later I repeated the experiment with three beautiful little rabbits. I repeated the procedure again, later adding a rabbit. I then dissected one of the rabbits each day for four consecutive days. All of them suffered from tuberculosis, although in four different stages of the disease. I had only inoculated the first one.\n\nIn my third attempt, I acquired four pairs of young, cute rabbits, three months old...'\n\nFrom Doctor [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting]'s experimental booklet 'The Cause and Nature of Tuberculosis'"
 panum.241.g: "Stop these terrible animal experiments!"
 panum.241.h: "Let's repeat the experiment to be sure."
 panum.241.i: "A third rabbit experiment for science!"
 panum.241.j: "[GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetSheHe|U] may kill as many rabbits as possible to proof the theory."
 panum.261.t: "Artificial Pneumothorax"
 panum.261.d: "Doctor [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] has invented a device that artificially collapses the lungs and could help fight tuberculosis."
 panum.261.f: "With the assistance of his brother, Carlo Forlanini designed and constructed a simple device capable of administering gases intrapleurally. The presence of gas in the intrapleural fluid caused the lung to collapse, therefore creating an artificial pneumothorax. After having built the device, Forlanini tried treating two cases of tuberculosis by inducing a pneumothorax in the two patients and obtained positive results. Over the years, Forlanini's technique was further developed and improved, therefore increasing the success rate of the procedure. Artificial pneumothorax continued as a treatment until the introduction of streptomycin."
 panum.262.t: "Thoracoplasty"
 panum.262.d: "Thanks to [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetHerHis] surgical skills, Doctor [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] invented a procedure that revolutionized lung surgery and thus enabled improved treatment of tuberculosis patients."
 panum.262.f: "A thoracoplasty is a surgical procedure in which ribs or parts of ribs from one side of the chest are surgically removed in order to collapse the lung or parts of the lung. This procedure goes back to Edouarde de Cérenville and was mainly used to treat pulmonary tuberculosis, but then became increasingly less important with the introduction of effective antibiotics."
 panum.263.t: "The Doctor did it again!"
 panum.263.d: "In order to once again prove the contagiousness of tuberculosis, Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] once again killed countless cute rabbits."
 panum.263.f: "'Of the four pairs I acquired this time, I killed the first animal of the first pair immediately. It did not show any lesion of the lungs.'\n\nFrom Doctor [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting]'s experimental booklet 'The Cause and Nature of Tuberculosis'"
 panum.263.g: "It's about saving human lives."
 panum.263.h: "This doctor has a serious problem."
