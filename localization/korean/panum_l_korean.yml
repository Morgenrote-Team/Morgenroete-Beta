 je_panum_functionalism: "기능주의 심리학파"
 je_panum_functionalism_reason: "Functional psychology or functionalism refers to a psychological school of thought that was a direct outgrowth of Darwinian thinking which focuses attention on the utility and purpose of behavior that has been modified over years of human existence. Edward L. Thorndike, best known for his experiments with trial-and-error learning, came to be known as the leader of the loosely defined movement. Functionalism denies the principle of introspection, which tends to investigate the inner workings of human thinking rather than understanding the biological processes of the human consciousness.\n\nEach country can only establish #R one#! psychological school."
 je_panum_psychoanalysis: "정신분석 심리학파"
 je_panum_psychoanalysis_reason: "Psychoanalysis is a psychological theory, cultural theory, psychotherapeutic form of treatment and method for self-awareness, which was developed around 1890 by the Viennese doctor Sigmund Freud was founded. The term psychoanalysis stands for the description and explanation model of the human psyche based on Freud's theories about the psychodynamics of the unconscious as well as for analytical psychotherapy and for the psychoanalytic methodology, which also deals with the investigation of cultural phenomena. In all three aspects, psychoanalysis continues to be developed and changed by clinicians and researchers today.\n\nEach country can only establish #R one#! psychological school."
 je_panum_analytical_psychology: "분석심리학파"
 je_panum_analytical_psychology_reason: "Analytical psychology is a psychoanalytically based psychological school founded by the Swiss psychiatrist Carl Gustav Jung in 1913. Similar to psychoanalysis, it deals with the unconscious parts of the human psyche, under the assumption that the unconscious has a much greater influence than conscious perception. Jung and his successors particularly emphasized the symbolic expression possibilities of the unconscious and tried to use them psychotherapeutically.\n\nEach country can only establish #R one#! psychological school."
 je_panum_behaviorism: "행동주의 심리학파"
 je_panum_behaviorism_reason: "Behaviorism is the scientific theory concept of examining and explaining the behavior of people and animals using scientific methods - i.e. without introspection or empathy. Behaviorism was founded by John B. Watson at the beginning of the 20th century after important preliminary work by Edward Lee Thorndike. Ivan Petrovich Pavlov also carried out important pioneering work with his experiments on the classical conditioning of behavior. In the USA, the advocates of behaviorism were for decades the most influential behavioral researchers at universities and staunch opponents of the psychoanalytic schools that were emerging at the same time.\n\nEach country can only establish #R one#! psychological school."
 panum_functionalism_school_founded_tt: "기능주의 심리학파가 다른 국가에서 창설되었습니다."
 panum_psychoanalysis_school_founded_tt: "정신분석 심리학파가 다른 국가에서 창설되었습니다."
 panum_analytical_psychology_school_founded_tt: "분석심리학파가 다른 국가에서 창설되었습니다."
 panum_behaviorism_school_founded_tt: "행동주의 심리학파가 다른 국가에서 창설되었습니다."
