 panum_cholera_condition: "콜레라"
 panum_cholera_condition_desc: "콜레라는 소장에 발병하는 위험한 질병입니다. 19세기를 대표하는 전염병으로 여겨지며 전세계적으로 수백만 명의 목숨을 앗아갔습니다."
 panum_tuberculosis_condition: "결핵"
 panum_tuberculosis_condition_desc: "결핵은 콜레라와 함께 빅토리아 시대의 가장 흔한 사망 원인으로 꼽힙니다. 소모성 질환으로도 알려진 결핵은 주로 폐에 악영향을 끼칩니다."
 panum_smallpox_condition: "천연두"
 panum_smallpox_condition_desc: "천연두는 얼굴과 몸을 흉지게 만드는 고름집으로 익히 알려져 있으며 역사상 가장 치명적인 질병으로 오랫동안 꼽혀 왔습니다."
 panum_typhus_condition: "발진티푸스"
 panum_typhus_condition_desc: "발진티푸스는 수 세기 동안 군인들을 공포에 빠뜨렸으며 특히 나폴레옹 전쟁 당시에는 장병 수천 명의 목숨을 앗아갔습니다. 자연 재해가 발생하고 나면 계속해서 창궐하는 질병입니다."
 panum_yellow_fever_condition: "황열병"
 panum_yellow_fever_condition_desc: "황열병은 주로 남아메리카와 아프리카의 열대 지방에서 영향력을 지니고 있습니다. 카리브해 지역에서는 그 어떤 전쟁보다도 주둔지 군인들의 목숨을 앗아간 바 있습니다."
 panum_measles_condition: "홍역"
 panum_measles_condition_desc: "홍역은 전염성이 매우 높은 질병으로 붉은 반점이 피부에 나타나는 특징으로 잘 알려져 있습니다. 면역력이 부족한 사람일수록 치명적인 결과를 초래할 수 있습니다."
 panum_scarlet_condition: "성홍열"
 panum_scarlet_condition_desc: "성홍열은 널리 퍼진 질병으로서 20세기 초까지 어린이들의 가장 흔한 사망 원인으로 꼽혔습니다."
 panum_plague_condition: "페스트"
 panum_plague_condition_desc: "페스트는 중세 시대의 '흑사병'과 동일한 질병으로 역사상 최악의 재앙으로 꼽힙니다. 그 이름은 고통스러운 붓기를 동반한다는 점에서 유래하였습니다."
 panum_diphteria_condition: "디프테리아"
 panum_diphteria_condition_desc: "디프테리아는 목숨을 위협하는 합병증과 장기적인 후유증을 초래하는 위험한 질병입니다."
 panum_polio_condition: "소아마비"
 panum_polio_condition_desc: "소아마비는 주로 어린이들에게 영향을 끼치는 질병으로, 사망에 이르게 하거나 평생 신체적 후유증을 안기는 경우가 많습니다."
