 panum.201.t: "[SCOPE.sState('panum_disease_state').GetName]에 퍼진 결핵"
 panum.201.d: "우리가 최선의 노력을 다하고 있음에도 결핵 유행이 확산되고 말았다. 이제 [SCOPE.sState('panum_disease_state').GetName]에서도 걷잡을 수 없이 퍼져나가고 있는 것이다."
 panum.201.g: "백색의 죽음은 누구도 막을 수 없을 듯하다."
 panum.202.t: "유전병?"
 panum.202.d: "그간의 의학적 조사에도 불구하고 결핵의 기원은 여전히 논란의 영역에 머물러 있다. 일부 의료진 가운데서는 결핵이 유전성 질병이거나 적어도 '체내적 요인'에 의한 것이라고 보고 있다. 한편 전형적인 전염성 질병이라 보고 근본적인 치료법을 권고하는 의사들도 있다."
 panum.202.f: "병인론의 개념과 관련해 18세기와 19세기 유럽 각국에서는 서로 다른 전통이 전해져 내려왔다. 당시 많은 의학 저술가들은 결핵 내지는 소모성 질환 (당시 동의어는 아니었음)을 당대 알려진 전염병 가운데 최악으로 여겼다. 이들은 결핵의 원인이 체액 불균형, 토양에서 나오는 불길한 기운,  도시화 내지는 풍습의 퇴보 등에 있다고 보았다. 반면 이탈리아에서는 전염성 요인, 즉 유전적으로 전파되는 요인에 대한 경향이 예로부터 존재하였다. 그 결과 18세기 중반 베네치아 공화국에서는 폐병(폐결핵으로 인한 소모성 질환) 발병 사례를 의무적으로 신고하도록 하는 제도를 도입하였다. 해당 질병으로 사망한 사람의 개인 소지품은 감염 위험을 덜기 위해 소각하는 조치도 내려졌다. 잉글랜드와 북유럽 국가에서는 결핵이 유전적인 원인에 의한 것으로 믿는 경우가 일반적이었다."
 panum.202.g: "유전성 질병이므로 우리가 할 수 있는 일이 없다."
 panum.202.h: "전염성 질병이므로 전파를 막기 위해서 무엇이든 해야만 한다!"
 panum.203.t: "길가에 침 뱉기"
 panum.203.d: "결핵의 원인이 무엇인지에 관한 지식이 부족한 바람에 그 대응 수단도 논란의 대상이 되고 있다. 전염성을 원인으로 보는 측에서는 확산을 막기 위해 공공장소에서 침 뱉는 행위 금지 등 극단적인 조치에 나서자고 목소리를 높였다. 이는 특히 저소득층에게 큰 영향을 미치고 있다. 회의론자들은 이러한 규제가 일반인들을 괴롭게 만들 뿐이라고 여기고 있다."
 panum.203.f: "18세기에는 예절 규칙을 통해 상류층과 중산층을 대상으로 몇가지 '나쁜 습관'을 없애기는 하였으나, 그럼에도 위생적으로 의심이 가는 여러 특이한 습관들이 대중들 사이에서 널리 퍼져 있었습니다. 이를테면 손수건이나 침 뱉는 통은 19세기 초에는 사회 전반에 널리 보급되지 않았고, 대중교통에서 침 뱉는 행위를 금지하는 것이 일반적인 습관으로 자리잡은 것은 세기말에 이르러서였습니다."
 panum.203.g: "이 역겨운 버릇을 금지하시오!"
 panum.203.h: "강경 금지령을 선포하고 범법자들에게 벌금을 매기시오!"
 panum.203.i: "침 뱉는 건 인간 본성이라 금할 수 없소."
 panum.204.t: "[SCOPE.sCharacter('disease_victim_scope').GetFullName]의 결핵 감염!"
 panum.204.d: "결핵의 유행이 우리 예술가 [SCOPE.sCharacter('disease_victim_scope').GetFullName]에게도 영향을 끼쳤다! 의외로 본인은 이번 일을 최악의 운명으로 여기지는 않는 모양이다."
 panum.204.f: "19세기 초는 물론 그 이후에도 결핵은 '낭만적인 질병'으로 여겨졌다. 이는 희생자에게 죽음을 맞이할 시간을 충분히 준 것도 있고, 결핵으로 인한 창백함을 고귀한 것으로 보는 사람들이 많았기 때문이다. 뒤마 2세의 《동백꽃 여인》에서 볼 수 있듯, 작가들은 여러 작품을 통해 결핵을 찬양했다. 베르디의 오페라 〈라 트라비아타〉와 푸치니의 〈라 보엠〉에서도 결핵은 비슷하게 묘사되고 있다. 쇼팽의 연인이었던 조르주 상드는 \"쇼팽은 한없이 우아하게 기침한다\"는 평을 남기기도 했다."
 panum.204.i: "진혼곡을 연주하기에 좋은 계기가 되지 않소?"
 panum.204.j: "허나 결핵은 늘 작가들의 소재로 쓰이지 않았소?"
 panum.204.k: "허나 그 질병 자체로 고통을 상상하게 만들지 않소?"
 panum.205.t: "결핵 요양원"
 panum.205.d: "In view of the tuberculosis epidemic raging in [SCOPE.sState('panum_disease_state').GetName], one of the doctors there has suggested that some wealthy patients be transferred to the mountains. The high altitude climate and the cleansing air are said to cure them of the disease. There should be a dedicated pulmonary sanatorium for this purpose. [SCOPE.sState('panum_davos_scope').GetName] seems to be the perfect place for such a sanatorium."
 panum.205.f: "The air cure is a form of climatic therapy that was considered the standard therapy for tuberculosis for a long time from the 19th century onwards. The patients lay on deck chairs outdoors or in open lounges for several hours a day. The air treatment was carried out in special pulmonary sanatoriums. In Germany, the doctor Hermann Brehmer was the first to describe the previously incurable disease tuberculosis as curable with the help of air therapy. In 1856 he wrote his dissertation on the curability of chronic tuberculosis of the lungs. He assumed that there are 'immune places' that, on the one hand, due to their climate, effectively protect the residents from the occurrence of tuberculosis and, on the other hand, have a healing effect after the disease breaks out. In Switzerland, the German-born doctor Alexander Spengler was a pioneer of air therapy. He began practicing as a country doctor in Davos in 1853 and soon came to the conclusion that the residents of the area generally did not suffer from tuberculosis, which he attributed to the high mountain climate. Thomas Mann glorified Davos as a climatic health resort in his 'Zauberberg'."
 panum.205.g: "Build a Sanatorium in [SCOPE.sState('panum_davos_scope').GetName]!"
 panum.205.h: "이건 전부 그저 호화로운 사기극일 뿐이다."
 panum.206.t: "프롤레타리아의 질병"
 panum.206.d: "The tuberculosis epidemic in [SCOPE.sState('panum_disease_state').GetName] hits the lower class hardest. [SCOPE.sCharacter('union_leader').GetFullName] has therefore particularly criticized the current conditions and called for far-reaching changes."
 panum.206.f: "Tuberculosis gained widespread interest in the 19th and early 20th centuries as the endemic disease of the urban poor. In 1815 a quarter of deaths in England and in 1918 in France a sixth of deaths were caused by tuberculosis. Around 1880, every second death in Germany in the 15 to 40 age group was due to this disease."
 panum.206.g: "Maybe the poor should just wash themselves more?"
 panum.206.h: "Selective improvements in this area are warranted."
 panum.206.i: "The question of health care is a national matter."
 panum.206.j: "Applause for this initiative!"
 panum.207.t: "종교 활동"
 panum.207.d: "[SCOPE.sCharacter('devout_leader').GetFullName] has personally advocated for the many sick people in [SCOPE.sState('panum_disease_state').GetName]. [SCOPE.sCharacter('devout_leader').GetSheHe|U] would like to set up a non-profit hospital there soon."
 panum.207.f: "'Hardly a country remains where, in one way or another, the struggle against tuberculosis has not been taken up, and it is extraordinarily gratifying to see how the campaign is now waged quite generally and with considerable vigour against this dangerous enemy.' -Robert Koch"
 panum.207.g: "These storytellers are just trying to gain influence!"
 panum.208.t: "백사병의 타격"
 panum.208.d: "[SCOPE.sState('panum_disease_state').GetName]의 결핵 유행이 심화되고 있다. 감염자와 사망자의 수가 날로 늘어가고 있는 것이다. 어느 의사도 이러한 상황까지 치달을 줄은 예상하지 못했다."
 panum.208.f: "\"내 모습은 얼마나 창백한가! 차라리 패결핵으로 죽어간다면... 그러면 여자들이 하나같이 '저 가여운 바이런 좀 봐, 죽어가는 게 참 볼썽사납구나!'할 터인데.\" - 바이런 경"
 panum.208.g: "이 사태는 언제쯤 끝날 것인가?"
