 je_group_panum_medicine: "모르겐뢰테: #ORANGE 파눔 의학#!"
 je_panum_cholera: "콜레라 유행"
 je_panum_cholera_reason: "콜레라는 19세기 최악의 전염병으로 평가받고 있습니다. 빅토리아 시대에서 콜레라가 가진 영향력은 중세 시대의 페스트와 비견될 만합니다. 여느 질병보다 더 빠르게 전파되며 치명적인 변종으로 발전하기도 합니다.\n\n#ORANGE 현대 하수도#!의 발명은 콜레라 퇴치에 특히 중대한 의미를 지닙니다. 이 기술을 통해 [concept_panum_physician]가 #V 콜레라 치료법#!을 찾아낼 수 있습니다. 적당한 의료 체계를 갖추는 것도 도움이 될 것입니다. 이 모든 것이 콜레라의 더 나은 예방과 치료로 이어집니다. [concept_gaudi_architect]가 현대 하수도망을 설치한 수도는 원칙적으로 콜레라 발병으로부터 안전해집니다.\n\n콜레라를 완전히 퇴치하기 위해서는 [concept_theiler_biologist]가 개발하는 #V 콜레라 백신#!이 필요합니다."
 je_panum_tuberculosis: "결핵 유행"
 je_panum_tuberculosis_reason: "콜레라와 함께 결핵은 19세기에 가장 흔한 사망 원인으로 꼽혔습니다. 결핵은 '백색의 죽음'이라 불리며 낭만적인 질병으로 출발했으나 결국엔 노동계층의 질병으로 점차 자리잡게 되었습니다. 결핵은 주로 생활 수준이 낮고 도시화가 높게 이루어진 일부 주에 국한되어 발병합니다.\n\n#ORANGE 저온 살균#!의 발명은 결핵 퇴치에 특히 중대한 의미를 지닙니다. 이 기술을 통해 [concept_panum_physician]가 #V 결핵 치료법#!을 찾아낼 수 있습니다. 적당한 의료 체계를 갖추는 것도 도움이 될 것입니다. 이 모든 것이 결핵의 더 나은 예방과 치료로 이어집니다. 드물게는 결핵 대응의 일환으로 특정 기후의 휴양지가 부상하기도 하지만 실제 치료 효과에는 의문점이 남습니다.\n\n결핵를 완전히 퇴치하기 위해서는 [concept_theiler_biologist]가 개발하는 #V 결핵 백신#!이 필요합니다."
 je_panum_smallpox: "천연두 유행"
 je_panum_smallpox_reason: "천연두는 여러 민족 전체를 몰살시킨 인류의 가장 큰 재앙으로 꼽힙니다. 18세기에 들어서면서 천연두를 향한 공포는 많이 줄어들었지만, 예방 조치를 취하지 않는다면 무서움을 여전히 떨칠 수도 있습니다.\n\n#ORANGE 예방 접종#!의 발명은 천연두 퇴치에 특히 중대한 의미를 지닙니다. 이 기술을 통해 [concept_panum_physician]가 #V 천연두 치료법#!을 찾아낼 수 있습니다. 기본적인 의료 체계만 갖춰져 있어도 도움이 됩니다. 이 모든 것이 천연두의 더 나은 예방과 치료로 이어집니다.\n\n천연두를 완전히 퇴치하기 위해서는 [concept_theiler_biologist]가 개발하는 #V 천연두 백신#!이 필요합니다."
 je_panum_typhus: "발진티푸스 유행"
 je_panum_typhus_reason: "발진티푸스는 중세 후기부터 알려져 왔지만, 가장 큰 피해를 입게 된 것은 나폴레옹 전쟁 기간이었습니다. 이에 따라 발진티푸스는 1815년을 기점으로 여러 세대에 걸쳐 공포의 대상이 되었습니다. 발진티푸스는 여러 나라로 빠르게 전파될 수 있으며, 특히 전쟁으로 인한 피해가 극심한 지역에서 영향력을 더욱 크게 발휘합니다. 그러므로 발진티푸스는 전쟁으로 인한 대표적인 질병으로 여겨지며, 비좁은 병영에 머무는 장병들일수록 특히 큰 피해를 줍니다.\n\n#ORANGE 항생제#!의 발명은 발진티푸스 퇴치에 특히 중대한 의미를 지닙니다. 이 기술을 통해 [concept_panum_physician]가 #V 발진티푸스 치료법#!을 찾아낼 수 있습니다. 기본적인 의료 체계만 갖춰져 있어도 도움이 됩니다.  이 모든 것이 발진티푸스의 더 나은 예방과 치료로 이어집니다.\n\n발진티푸스를 완전히 퇴치하기 위해서는 [concept_theiler_biologist]가 개발하는 #V 발진티푸스 백신#!이 필요합니다."
 je_panum_yellow_fever: "황열병 유행"
 je_panum_yellow_fever_reason: "황열병은 열대지방 근처에서 발생하는 지역성 질병이지만, 19세기에는 미국 남부와 유럽까지 확산되었습니다. 보통 몇몇 주에만 퍼지지만, 그 피해는 결코 작지 않습니다.\n\n#ORANGE 말라리아 예방#! 기술의 발명은 황열병 퇴치에 있어 특히 중요한 의미를 지닙니다. 이 기술을 통해 [concept_panum_physician]은 #V 황열병 치료법#!을 찾아낼 수 있습니다. 기초적인 보건 체계가 갖춰져 있다면 이미 어느 정도의 대응은 가능해지며, 이는 병의 예방과 치료 모두에 도움이 됩니다.\n\n그러나 황열병을 완전히 정복하기 위해서는 [concept_theiler_biologist]가 개발하는 #V 황열병 백신#!이 반드시 필요합니다."
 panum.100.t: "[TimeKeeper.GetCurrentDate.Format('y')]년 콜레라 유행"
 panum.100.d: "인류 역사상 최악의 재앙으로 꼽히는 #YELLOW 콜레라#!가 우리 도시 중 한 곳에서 발병하였다. 암울한 시기가 도래했다. 전국으로 확산되어 큰 피해를 가져올 것을 대비해야 한다."
 panum.100.f: "콜레라는 동아시아에 풍토병으로 존재했으며, 아마도 수세기에 걸쳐 인도 아대륙에서 국지적인 유행 형태로 발생했으나 다른 대륙에서는 알려지지 않았습니다. 첫 번째 대유행은 1817년부터 1824년까지 발생했으며, 아시아 일부 지역과 동아프리카, 소아시아, 이후 러시아와 유럽에 영향을 미쳤습니다. 1830년에는 동부 갈리시아와 헝가리에 나타났고, 1831년 6월에는 비엔나에도 발생했습니다. 콜레라는 총 6차례의 대유행을 통해 전 세계를 휩쓸며 신흥 산업 사회의 재앙이 되었습니다. 감염자의 약 85%는 무증상이지만, 치료하지 않을 경우 초기 치명률은 20\~70%에 이릅니다."
 panum.100.g: "저승사자가 우리 문앞에 있다."
 panum.102.t: "콜레라 유행이 [SCOPE.sCountry('panum_infected_country').GetName]에 도달함"
 panum.102.d: "오늘 [SCOPE.sCountry('panum_infected_country').GetName]에서 첫 콜레라 발병 사례를 접수했다는 보고를 받았다. 당국은 확산 방지에 충분히 노력하지 않았다고 우리를 비난하고 있다."
 panum.102.g: "이게 우리 탓이야...?"
 panum.103.t: "공장 내 콜레라"
 panum.103.d: "[SCOPE.sState('panum_disease_state').GetName] 지역의 여러 공장에서 노동자들 사이에서 첫 콜레라 감염 사례가 보고되었다. 지역 당국은 확산을 막기 위한 규제 방안을 제시하였는데, 이는 산업 전반에 큰 영향을 미칠 것으로 예상된다."
 panum.103.f: "지난주에 시 외곽의 한 물레방아에서 첫 콜레라 환자가 발생했다. 건물은 즉시 격리되었지만, 하류에 위치한 여러 제조 공장들에서도 추가 감염 사례가 보고되었다. 질병이 전파 양상은 아직 전혀 밝혀지지 않았으나, 일부 지역 정치인들은 주민들의 신뢰 회복을 위해 강력한 제한 조치를 시행해야 한다는 데 의견을 같이하고 있다."
 panum.103.g: "공장을 격리하라!"
 panum.103.h: "어떤 대가를 치르더라도 공장은 계속 가동되어야 한다!"
 panum.104.t: "[SCOPE.sCharacter('disease_victim_scope').GetFullName]의 콜레라 감염!"
 panum.104.d: "불과 며칠 전까지만 해도 무탈해 보였던 [SCOPE.sCharacter('disease_victim_scope').GetFullName](이)가 어젯밤부터 우리 [ROOT.GetCountry.GetNameNoFlag]을 휩쓸고 있는 끔찍한 질병의 최초 증상을 보이기 시작했다. [SCOPE.sCharacter('disease_victim_scope').GetHerHis|U] 건강은 뭐라 말하기 어려운 상황이다."
 panum.104.f: "19세기 전반에 두 차례에 걸쳐 유행한 콜레라는 유명인들의 목숨도 앗아갔습니다. 1831년 프로이센에서 벌어진 콜레라 대유행으로 철학자 게오르크 프리드리히 빌헬름 헤겔과 장군 아우구스트 나이하르트 폰 그나이제나우가 세상을 떠났습니다. 작곡가 표트르 일리치 차이코프스키도 콜레라의 희생자로 여겨지지만, 물이 오염된 것을 알고 마셨는지, 실수로 마셨는지의 여부는 아직 논란의 여지가 남아 있습니다."
 panum.104.g: "최상의 치료법을 동원하도록!"
 panum.104.h: "우리나라 최고의 의사가 개인 진찰에 나서게 됩니다."
 panum.104.i: "별로 중요치 않은 사람이네만..."
 panum.105.t: "부자들의 도피 행렬"
 panum.105.d: "[SCOPE.sState('panum_disease_state').GetName] 지역의 상류층 시민들은 막대한 재력을 동원해 그 지역을 최대한 빨리 떠나거나 시골로 도피하고 있다. 격리 규정을 면하기 위해 수많은 뒷돈이 오고가는 실정이다. 서민들은 이러한 상황을 경멸의 시선으로 바라보고 있다."
 panum.105.f: "콜레라의 주요 특징은 중세 시대의 페스트처럼 부자와 가난한 자 가릴 것 없이 모두 목숨을 앗아갔다는 점에 있습니다. 힘 있고 돈 많은 가문에서는 전염병을 피하기 위해 최선을 다했습니다. 귀족 계층에서는 콜레라가 계급을 가리지 않고 발병한다는 점에서 하나의 '혁명적 질병'으로 여겼습니다. 상류층에 대한 방역 조치가 미흡해지면서 벌어지는 사회적 분쟁으로 인해 콜레라는 정치적 쟁점으로 떠오르게 되었습니다. 1830년대 초 유럽에서 발생한 콜레라 대유행과 혁명 운동은 서로 밀접한 관련이 있다는 주장이 종종 제기되어 왔습니다."
 panum.105.g: "내버려 두어라."
 panum.105.h: "우리가 '너도 한 방 나도 한 방'을 외치는 데는 다 이유가 있지."
 panum.106.t: "콜레라를 악용하는 야당 세력"
 panum.106.d: "야당 세력이 이번 유행 사태를 기회로 한풀이에 나선 모습이다. 정부가 전염병 대책에 큰 실책을 저질렀다며 공세에 나서고 있다."
 panum.106.f: "콜레라의 유행에 따른 사회적, 정치적 영향은 특히 자유주의 세력이 보수주의 세력을 공격하는 빌미로 작용했습니다. 시대에 뒤처진 엘리트층을 대신하여 보다 적극적인 대응 조치와 새로운 접근법을 내세우게 된 것입니다. 이러한 보수-자유 세력의 갈등은 다른 상황에서도, 다른 정당 간에도 반복되었다는 사실은 그리 놀랄 일이 아닙니다."
 panum.106.g: "그래, 우리가 틀렸고 그쪽이 옳소. 이제 전염병에 맞서 싸웁시다!"
 panum.106.h: "우리 정부는 이번 사태를 완벽하게 통제하고 있소만."
 panum.107.t: "집단 매장"
 panum.107.d: "[SCOPE.sState('panum_disease_state').GetName] 지역에 새로 조성된 집단 매장 구역을 향한 비판의 목소리가 커지고 있다. 특히 하층민들은 이번 조치가 죽은 자를 제대로 대하는 것이 아니라 기계적인 대응에 불과한 것으로 바라보고 있다."
 panum.107.f: "집단 사망과 김염 위험성 증가로 시신을 일괄 매장하는 것은 불가피한 현상이 되었습니다. 부유한 시민들은 평소 방식대로 장례를 치를 수 있었던 반면, 가난한 자의 시신은 그냥 묻어버릴 수 밖에 없다는 사실은 사회적 갈등으로 번져나갔습니다."
 panum.107.g: "장례식까지 치를 여유는 없단 말이오!"
 panum.107.h: "어느 누구든 품위 갖춘 장례를 치를 자격이 있다."
 panum.108.t: "콜레라 병원"
 panum.108.d: "일부 정당 세력에서 자신들의 이익으로 돌아올 수 있도록 하층민을 위한 콜레라 병원을 설립하겠다는 결정을 내렸다. 하지만 그다지 인기는 없는 모양이다."
 panum.108.f: "콜레라나 결핵 같은 전염병의 유행으로 대규모 입원 시설을 확충하는 것이 논란의 대상에 오를 때가 많았습니다. 가정에서는 아픈 사람을 낯선 입원 시설에 맡기는 것보다 집안에서 간호하는 쪽을 선호했습니다. 여기에는 다른 환자들과 좁은 공간에 갇혀 지내다 결국 병에 걸려 죽을 것이라는 우려가 컸습니다. 이런 수용 시설을 짓는 것 자체가 대체로 가난한 사람들을 부유층으로부터 격리시켜 보호하려는 조치라는 비난이 제기되기도 했습니다."
 panum.108.g: "때려패서라도 입원시켜야 한다!"
 panum.108.h: "이런 황소 고집들을 억지로 살게 할 순 없소."
 panum.109.t: "공황에 빠진 시민들"
 panum.109.d: "[SCOPE.sState('panum_disease_state').GetName]의 지역 정부에서 최선의 노력을 다하였음에도 불구하고 시민들은 전염병 유행 시 제일 위험할 수 있는 공황 상태에 빠져들기 시작했다."
 panum.109.f: "\"우리가 이 세상의 다른 어떤 짐승보다 우월하다는 생각에 잠기기 쉽지만, 이성의 껍질을 벗기면 인간은 여전히 알 수 없는 내일에 대한 두려움과 공포에 사로잡힌 동물일 뿐이라는 것을 새삼 느낀다. 질병의 발생과 확산은 노련한 장병들의 마음조차 공포로 가득 채우게 된다. 눈에 뵈지도 않는 적과 싸울 수 있는 자가 어디에 있는가? 없다. 공포는 사람들의 마음을 갉아먹고, 사방에서 적을 찾게 하며, 적이 있는 곳에는 적에 맞서 싸우도록 만들기 마련이다. 병든 자는 돌팔매를 당하며 쫓겨난다. 집 밖으로 나오지 않는 가정을 두고 수군거린다. 침착하고 정직한 사람도 다음 번의 노크 너머에는 구호의 손길이 아닌 절도와 강도일까 두려워 총을 챙겨 둔다.\n\n이것은 세상의 종말이 아니다. 망상의 종말이다. 인간은 동물이며, 두려움을 느낀다.\"\n\n[TimeKeeper.GetCurrentDate.Format('y')]년 대유행을 보도하는 〈[SCOPE.sState('panum_disease_state').GetName] 타임스〉의 기사에서"
 panum.109.g: "그 놈의 공포! 이성 잃은 자들을 어떻게 도울 수가 있겠나?"
 panum.110.t: "공통의 목적"
 panum.110.d: "[SCOPE.sState('panum_disease_state').GetName]에서 벌어지는 콜레라 유행으로 지역 주민들이 힘을 합쳐 발병에 맞서 싸우면서 국민의 단합을 고취시킨 것으로 보인다."
 panum.110.f: "\"병실은 우리가 병든 세상에 살고 있음을 일깨운다는 점에서 참 우울한 공간이다. 그러나 그 병은 그대가 누구인지, 어떤 종교를 믿는지, 어떤 신을 섬기는지, 피부색이 어떤지, 어떤 정치적 성향을 갖고 있는지 상관하지 않는다. 병상을 보라, 남자가 있고 여자가 있고 어린애가 보인다. 그대가 보는 것은 도움이 필요한, 사람이다. 저들은 누가 돕는지를 상관하지 않는다. 의사가 사제인지 군인인지, 아니면 얼마 안되는 시간을 내어 위험을 무릅쓰고 낯선 사람을 돋는 평범한 노동자인지 상관하지 않는다. 의사를 보고 왕정주의냐, 공화주의냐, 선동가냐, 진정으로 어떤 부류의 사람이냐를 판단하지 않는다.\n\n그들은 그 사람을 보고, 사람인 줄 아는 것이다. 형제이고 아들이고 동포이지만 무엇보다도 같은 인간인 것이었다.\"\n\n[TimeKeeper.GetCurrentDate.Format('y')]년 대유행을 보도하는 〈[SCOPE.sState('panum_disease_state').GetName] 타임스〉의 기사에서"
 panum.110.g: "우리는 콜레라에 맞서 단결한다!"
 panum.111.t: "공포"
 panum.111.d: "[SCOPE.sState('panum_disease_state').GetName]에서 죽은 시신이 산더미처럼 쌓이고 있다. 이제 주변에 아는 사람 중에 콜레라에 걸리지 않은 사람은 한 명도 없는 상황이다. 전염병의 진원지가 된 것이다."
 panum.111.f: "1831년부터 1873년까지 총 42년 동안 독일의 베를린에서만 콜레라가 13회나 발병한 적이 있었습니다. 1848~49년, 1852년, 1855년, 1866년의 콜레라 유행은 프로이센 전역에 특히 심각한 영향을 끼쳤습니다. 1866년에는 콜레라로 인한 공식 사망자 수가 114,683명에 달했습니다. 1848년~1849년  런던의 콜레라 발병은 1832년~1833년의 발병 사례보다 훨씬 심각했습니다. 당시 유행으로 런던에서만 1만 5천명이 사망했는데 이는 약 250만 명에 달했던 런던 인구의 0.5%가 넘는 수준이었습니다. 1849년 9월 첫째 주에는 하루에 300명이 사망했습니다. 1852년부터 1860년까지 발생했던 제3차 유행에서는 러시아에서 약 100만 명이 사망하였는데, 이는 동시기에 발발한 크림 전쟁으로 더욱 악화된 면이 있었습니다. 영국군 총사령관 래글런 경과 프랑스 해군사령관 아르망 조제프 브뤼아도 콜레라로 목숨을 잃었습니다. 전투로 인한 사망자보다 콜레라로 인한 사망자가 더 많았던 것으로 추정됩니다."
 panum.111.g: "또 얼마나 더 죽었단 말인가?!"
 panum.120.t: "콜레라 유행 종식"
 panum.120.d: "[ROOT.GetCountry.GetNameNoFlag]의 온 국민이 안도의 한숨을 내쉬었다. 당국에서 마지막 콜레라 발생지에 더 이상 환자가 없다고 발표했기 때문이다. 이제 사망자수를 집계하고 일상으로 돌아갈 시간이다."
 panum.120.f: "\"하느님께서 나와 함께 하시기를! 하늘에서 이번 새해를 축복하시기를. 풍요롭고 평화롭고 번영하는 한 해가 되기를, 전 인류에게 평화와 화합이 가득한 한 해가 되기를, 세계가 콜레라로부터 해방되기를.\" - 자코모 마이어베어"
 panum.120.g: "하지만 그 대가는 무엇인가?"
 panum.200.t: "결핵 유행"
 panum.200.d: "우리나라의 어느 주에서 전염병이 돌고 있다. [SCOPE.sState('panum_disease_state').GetName]에서 #YELLOW 결핵#!이 발병한 것이다!"
 panum.200.f: "중세 초 결핵은 인구밀도가 낮았던 유럽에서 그 위력이 크지 않았습니다. 몇몇 대도시 지역에서만 비교적 더 많이 발병하였을 뿐입니다. 15세기 말 이탈리아에서 마지막으로 발병한 이래, 역사상 가장 크고 오랫동안 이어진 결핵의 파도가 17세기에 몰아치기 시작했습니다. 19세기와 20세기 초 결핵은 도시 빈민층의 풍토병으로 널리 주목받았습니다. 1815년에는 잉글랜드 내 사망자의 4분의 1이, 1918년에는 프랑스 내 사망자의 6분의 1이 결핵으로 사망했습니다. 1880년경에는 독일 내 15세~40세 사이 사망자의 절반이 결핵으로 목숨을 잃었습니다. 결핵은 농촌 지역에서도 가장 흔한 사망 원인으로 나타났습니다."
 panum.200.g: "낭만적인 죽음을 맞이할 시간이 조금이라도 남아 있소?"
 panum.220.t: "결핵 유행 종식"
 panum.220.d: "도시와 농촌의 의사들이 결핵 발생 건수가 이미 몇 주 전에 정점을 찍었다고 보고하였다.  결핵이 완전히 사라진 것은 아니지만 평소 수준으로 돌아온 것이다."
 panum.220.f: "\"나는 그 색깔에 현혹될 수 없어\n저 핏방울은 나를 향한 사형 선고\n나는 죽고 말 것이네\" - 존 키츠"
 panum.300.t: "천연두 유행"
 panum.300.d: "우리나라의 어느 주에서 전염병이 돌고 있다. [SCOPE.sState('panum_disease_state').GetName]에서 #YELLOW 천연두#!가 발병한 것이다!"
 panum.300.f: "천연두는 수천년 전부터 그 존재가 알려졌으며, 약 12,000년 전 북아프리카에 처음으로 정착한 마을에서도 발생한 것으로 보입니다. 그곳에서 이집트 상인들을 통해 인도로 전파되었을 가능성이 존재합니다. 유럽의 정복자들은 천연두를 아메리카 대륙에 전파했고, 1518년부터 원주민들 사이에서 엄청난 전염병을 일으켜 수백만 명의 목숨을 앗아갔습니다. 유럽에서는 천연두를 간혹 조그만 어린아이의 질병으로 여기기도 하였으며 18세기 말까지 전체 아동의 10%까지 천연두로 사망했기 때문에 '어린이의 질병'으로 불리기도 하였습니다. 18세기 이래 천연두 발병 사례가 증가하면서 흑사병을 제치고 최악의 질병으로 거듭났습니다. 매년 약 40만 명이 천연두로 사망하고, 생존자 가운데 3분의 1은 실명했던 것으로 추산됩니다. 어린이가 천연두에 걸려 살아남아야 비로소 가족의 일원으로 여겨지는 경우가 많았던 것도 이 때문입니다. 1800년경 종두법이 성공적으로 도입되었음에도 19세기 말까지 돌림병으로 남아 있었습니다."
 panum.300.g: "내 보기에 화장품이 머지않아 인기를 끌겠군."
 panum.320.t: "천연두 유행 종식"
 panum.320.d: "인류 최악의 전염병으로 꼽히는 천연두가 [ROOT.GetCountry.GetNameNoFlag]에서 점차 자취를 감추고 있다. 생존자들은 평생 흉터를 안고 살아가게 되었다."
 panum.320.f: "\"먼 훗날의 국가들은 역사를 통해 혐오스러운 천연두라는 것이 존재했고, 그대의 손에 박멸되었다는 사실을 알게 될 뿐일 것이오.\" - 토머스 제퍼슨"
 panum.400.t: "발진티푸스 유행"
 panum.400.d: "우리나라의 어느 주에서 전염병이 돌고 있다. [SCOPE.sState('panum_disease_state').GetName]에서 #YELLOW 발진티푸스#!가 발병한 것이다!"
 panum.400.f: "발진티푸스는 고대에도 존재했을 것으로 보이지만 16세기에 이르러서야 제대로 기록되었으며, 전쟁과 고통 속에서 전형적으로 나타나는 질병이었습니다. 발진티푸스는 나폴레옹 군의 러시아 원정 당시 심각한 문제로 부상하였습니다. 1812년 6월 러시아로 진격한 나폴레옹 대군은 1813년 가을 철수할 당시 프랑스 영토로는 처음으로 마인츠에 머무르게 되었습니다. 이곳에서 프랑스 군인만 15,000명에서 17,000명이, 민간인도 비슷한 규모의 숫자가 목숨을 잃은 것으로 전해집니다. 발진티푸스는 당시 신경계 증상을 유발한다는 점에서 '신경열'이라고도 불렀으며 프랑스어로는 '마인츠 티푸스' (Typhus de Mayence)라는 별칭으로 남아 있습니다. 1814년 10월까지 뷔르츠부르크 대공국 일대의 프랑스 영토에서 총 14,000건의 발병 사례가 기록되었으며 그 가운데 2,500건은 사망한 것으로 기록되었습니다. 1918년~1922년 러시아에서 발생한 전쟁과 내전으로 또다른 유행 사태가 빚어지면서 250만여 명이 목숨을 잃은 것으로 전해지고 있습니다."
 panum.400.g: "옷을 갈아입는 것이 어떻소?"
 panum.420.t: "발진티푸스 유행 종식"
 panum.420.d: "발진티푸스 유행 과정에서 가장 큰 고비는 넘긴 것으로 보입니다. 사망자수 집계는 아직 진행 중에 있으나 이번 끔찍한 발병에 책임을 물을 수 있는 사람은 아무도 남아있지 않다는 것은 이미 분명합니다."
 panum.420.f: "\"내가 아는 영국인 환자 가운데 차를 거부했던 사람은 발진티푸스 환자 뿐이었다. 그리고 그 환자가 다시 나아지고 있다는 첫번째 징후는 다시 차를 찾는 것이었다.\" - 플로렌스 나이팅게일"
 panum.500.t: "황열병 유행"
 panum.500.d: "우리나라의 어느 주에서 전염병이 돌고 있다. [SCOPE.sState('panum_disease_state').GetName]에서 #YELLOW 황열병#!이 발병한 것이다!"
 panum.500.f: "황열병은 남아메리카와 아프리카의 열대, 아열대 지역을 중심으로 한 풍토병입니다. 18세기와 19세기에는 중앙아메리카, 카리브해, 지금의 미국 남부 지역에서도 발생하였습니다. 황열병은 아프리카에서 기원하여 대서양 삼각 무역을 통해 신대륙에 도달했던 것으로 추정됩니다. 최초의 황열병 발병 사례는 1648년 유카탄 반도에서 발생하였으며 '제키크' (xekik, 검은색 구토)라는 이름으로 불렸습니다. 이후 적어도 25건의 대규모 발병이 있었는데, 1793년 필라델피아에서 벌어진 유행 당시 수천 명이 목숨을 잃고 미국 정부와 조지 워싱턴 대통령이 도시에서 떠나야 했습니다. 북미 지역의 황열병에 관한 최초의 의료 기록은 1756년 찰스턴의 의사 존 라이닝이 남긴 것으로, 찰스턴에서는 1728년과 1732년에도 발병한 전례가 있었습니다. 유럽에서도 발병 사례가 간헐적으로 기록되었는데 이를테면 1821년 바르셀로나에서 수천 명이 사망한 사례가 존재합니다. 1867년에는 미국 플로리다주의 포트제퍼슨에서도 발병이 있었습니다. 1878년 미시시피 계곡 일대를 중심으로 발병하여 2만 명이 목숨을 잃었으며, 1905년 뉴올리언스의 발병 사례가 미국에서의 마지막 발병 기록으로 남아 있습니다."
 panum.500.g: "상한 과일이 원인인가?"
 panum.520.t: "황열병 유행 종식"
 panum.520.d: "황열병이 길거리와 가정을 은밀히 휩쓸고 난 뒤 의료진과 정부 당국은 상황 종료를 선언하였다. 마침내 유행이 끝난 것이다."
 panum.520.f: "\"그것은 황열병이라 불리지만, 의사들이 터득하거나 읽어본 바는 전혀 없다.\" - 토머스 제퍼슨"
 building_panum_tuberculosis_sanatorium: "결핵 요양원"
 pmg_panum_sanatorium: "결핵 요양원"
 pm_panum_sanatorium: "결핵 요양원"
 building_panum_tuberculosis_sanatorium_tt: "결핵 요양원은 산악 지역에서 결핵 유행이 발생하면 건설할 수 있습니다. #R 특정 이벤트를 통해서만 활성화됩니다.#!"
 panum_tuberculosis: "결핵"
 panum_tuberculosis_desc: "결핵은 '백색의 죽음'으로도 알려져 있으며 빅토리아 시대의 주요 사망 원인으로 꼽혔습니다."
