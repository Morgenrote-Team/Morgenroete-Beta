 je_panum_disease_investigation: "Disease Examination"
 je_panum_disease_investigation_reason: "Sometimes it can happen that a physician, during his usual medical research, throws himself into the investigation of a very specific disease. This is not an epidemic disease, but rather everyday illnesses, childhood illnesses or widespread illnesses. Examples of this include rickets, kidney stones or syphilis.\n\nUnlike in other cases, the physician carries out this research on the side, which means he is not busy and is available for further activities. If a doctor dies, the project is not lost, but is put on hold until another doctor takes over."
 panum_woolsorters_disease_modifier: "Woolsorter Disease"
 panum_litholapaxy_modifier: "Litholapaxy"
 panum_salvarsan_modifier: "Salvarsan"
 panum_tetanus_antitoxin_modifier: "Tetanus Antitoxin"
 goods_output_meat_mult: "건물 @meat! 고기 산출량"
