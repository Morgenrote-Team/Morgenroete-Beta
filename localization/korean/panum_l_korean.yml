 je_panum_cholera_description_expedition_reason: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName] 박사는 #YELLOW 콜레라#!에 관한 귀중한 정보를 확보하기 위해 [SCOPE.sCountry('target').GetName]에서 의료 탐사에 나섰다. 해당 국가에서 질병이 유행하는 동안 박사는 매달 새로운 통찰력을 획득할 확률을 얻게 되며, 이를 통해 그 질병에 관한 과학적인 종합 소견서를 작성할 수 있다.\n\n질병이 잦아들더라도 연구 진행도는 사라지지 않고 다음 조사에 반영될 것이다."
