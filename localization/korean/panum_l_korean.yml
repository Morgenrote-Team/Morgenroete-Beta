 panum_tuberculosis_quarantine_modifier: "결핵 격리"
 panum_tuberculosis_sanatorium_cost_modifier: "요양원 예산"
 panum_help_against_tuberculosis_modifier: "결핵에 맞선 도움"
 panum_praised_for_tuberculosis_initiative_modifier: "결핵 연설로 찬사받다"
 panum_supports_health_care_initiative_modifier: "보건 계획 지지"
