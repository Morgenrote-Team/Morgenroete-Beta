 dubois.118.d: "Our zoo is enriched by a new, exotic animal: today the long-awaited #O Capybara#! moved into its new enclosure."
 dubois.118.f: "The Capybara, the world's largest rodent, is native to South America. With its webbed feet and semi-aquatic lifestyle, it thrives in wetlands and along riverbanks. Capybaras are highly social animals, often living in groups of 10 to 20 individuals. They feed primarily on grasses and aquatic plants and are known for their gentle and docile nature. Despite their size, they are excellent swimmers and can remain submerged to avoid predators."
 dubois.118.g: "It's a huge Guinea Pig!"
