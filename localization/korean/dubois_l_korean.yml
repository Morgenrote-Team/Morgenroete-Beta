 building_dubois_national_park: "자연보호구역"
 building_dubois_national_park_desc: "자연보호구역은 야생의 세계가 숨 쉴 공간을 제공하는 안식처입니다. 원시림과 드넓은 초원, 숨겨진 계곡이 문명의 끊임없는 확장으로부터 보존되는 곳입니다. 왕실 사냥터로 지정되었든, 국립공원으로 널리 알려졌든, 이러한 안식처는 희귀 생물들에게 피난처를 제공하고 대자연을 방해 없이 영원히 간직할 수 있도록 해줍니다."
