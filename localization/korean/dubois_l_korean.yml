 je_dubois_safari_lion_reason: "아프리카 사파리에서는 끊임없는 추적과 덫 설치로 대형 야생동물을 사로잡아 [concept_dubois_zoo]으로 보낼 수 있습니다. 사냥 한 차례당 하나의 동물만 잡을 수 있습니다. 동물의 종이 어떤가에 따라 덫을 놓아야 하는지, 아니면 흔적을 따라가야 하는지의 여부가 다양하게 갈립니다. 일반적으로 크고 움직임이 둔한 동물은 덫이 더 많이 필요하고, 빠른 동물은 추적에 주력하는 것이 좋습니다. 사파리는 총 300일 동안 진행됩니다. 그 기간 동안 동물을 잡지 못하면 사파리 원정대는 아무런 성과 없이 귀국하게 됩니다.\n\n공격적인 동물은 덫에 걸리면 스스로를 방어하며 공격에 나설 수 있습니다. 겁이 많은 동물은 달아납니다. 동물학자 특성을 지닌 [concept_dubois_naturalist]는 별다른 불이익 없이 상황을 해결할 수 있습니다. #ORANGE 기관총#!이나 #ORANGE 연소 엔진#! 같은 신기술이 있다면 동물의 추적과 덫 설치가 더욱 수월해집니다."
