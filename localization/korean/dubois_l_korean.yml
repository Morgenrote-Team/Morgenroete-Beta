 dubois_nope_out_breeding_tt: "You will not breed any [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] and return to your other duties."
 je_animal_breeding: "Breeding [SCOPE.GetRootScope.GetCountry.GetCustom('dubois_breeding_animal_type')]"
 je_animal_breeding_reason: "We are breeding [SCOPE.GetRootScope.GetCountry.GetCustom('dubois_breeding_animal_type')] in the hopes to create a new [concept_dubois_habitat] there.\n\nRight now there are [ROOT.Var('dubois_breeding_animal_amount_var').GetValue] [SCOPE.GetRootScope.GetCountry.GetCustom('dubois_breeding_animal_type')]. If we reach #p 4000#! [SCOPE.GetRootScope.GetCountry.GetCustom('dubois_breeding_animal_type')], the population will be viable and the habitat will be established."
 je_animal_breeding_goal: ""
 je_breeding_programm_failed_tt: "If there are less than #n 1#! [GetPlayer.MakeScope.GetCountry.GetCustom('dubois_breeding_animal_type')] the Breeding Program will fail."
 je_breeding_programm_succesfull_tt: "Having #p 4000#! or more [GetPlayer.MakeScope.GetCountry.GetCustom('dubois_breeding_animal_type')] will end the Breeding Program and establish a new Habitat."
 notification_dubois_animal_breeding_notification_name: "Breeding Report"
 notification_dubois_animal_breeding_notification_desc: "This year the number of [GetPlayer.MakeScope.GetCountry.GetCustom('dubois_breeding_animal_type')] in our [concept_dubois_nature_reserve] changed by [GetPlayer.MakeScope.Var('dubois_animal_breeding_change_var').GetValue|0+=]. There are currently [GetPlayer.MakeScope.Var('dubois_breeding_animal_amount_var').GetValue|0+] [GetPlayer.MakeScope.GetCountry.GetCustom('dubois_breeding_animal_type')]."
 dubois.1321.t: "A new home for the [GetPlayer.MakeScope.GetCountry.GetCustom('dubois_breeding_animal_type')]"
 dubois.1321.d: "Our [concept_dubois_nature_reserve] now harbors enough [GetPlayer.MakeScope.GetCountry.GetCustom('dubois_breeding_animal_type')] for a stable [concept_dubois_habitat]."
 dubois.1321.f: "This is a great day for the [GetPlayer.MakeScope.GetCountry.GetCustom('dubois_breeding_animal_type')]. Now they will be protected for the future!"
 dubois.1321.g: "Wonderful!"
 dubois.1322.t: "Breeding the [GetPlayer.MakeScope.GetCountry.GetCustom('dubois_breeding_animal_type')] failed"
 dubois.1322.d: "Sadly, our attempt to found a new stable [concept_dubois_habitat] in the [concept_dubois_nature_reserve] of [ROOT.Var('dubois_breeding_state_var').GetState.GetName] failed. If we want, we can try it again and hope that we have more luck this time."
 dubois.1322.f: "We mourn over this loss of [GetPlayer.MakeScope.GetCountry.GetCustom('dubois_breeding_animal_type')]."
 dubois.1322.g: "What a sad day."
 dubois.2001.t: "고생물학 전시관"
 dubois.2001.d: "고생물학 전시관에 오신 것을 환영합니다."
 dubois.2001.f_paleontologist: "현재 소장품의 관리 소관은 [concept_dubois_paleontologist] [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetFullName]에게 있습니다. 대표 소장품은 다음과 같습니다.\n\n@dubois_fossil! 화석 #G [ROOT.Var('dubois_fossil').GetValue]점#!\n\n@dubois_special_fossil! 특별 화석 #G [ROOT.Var('dubois_special_fossil').GetValue]점#!\n\n@dubois_human_fossil! 인류 화석 #G [ROOT.Var('dubois_human_fossil').GetValue]점#!\n\n@dubois_dinosaur_bone! 공룡 뼈 #G [ROOT.Var('dubois_dinosaur_bone_total').GetValue]점#!\n\n@dubois_dinosaur_skeleton! 공룡 골격 #G [ROOT.Var('dubois_dinosaur_skeleton').GetValue]점#!\n\n#T 공룡 평점#!은 현재 우리가 보유중인 모든 공룡 골격의 상태를 감정한 것으로서 [ROOT.Var('dubois_dinosaur_rating').GetValue]점에 해당됩니다."
 dubois.2001.f_no_paleontologist: "현재 소장품의 관리 소관은 #R 공석#! 상태입니다. 대표 소장품은 다음과 같습니다.\n\n@dubois_fossil! 화석 #G [ROOT.Var('dubois_fossil').GetValue]점#!\n\n@dubois_special_fossil! 특별 화석 #G [ROOT.Var('dubois_special_fossil').GetValue]점#!\n\n@dubois_human_fossil! 인류 화석 #G [ROOT.Var('dubois_human_fossil').GetValue]점#!\n\n@dubois_dinosaur_bone! 공룡 뼈 #G [ROOT.Var('dubois_dinosaur_bone_total').GetValue]점#!\n\n@dubois_dinosaur_skeleton! 공룡 골격 #G [ROOT.Var('dubois_dinosaur_skeleton').GetValue]점#!\n\n#T 공룡 평점#!은 현재 우리가 보유중인 모든 공룡 골격의 상태를 감정한 것으로서 [ROOT.Var('dubois_dinosaur_rating').GetValue]점에 해당됩니다."
