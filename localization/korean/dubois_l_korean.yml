 dubois.1019.t: "Meerkat Enclosure"
 dubois.1019.d: "The Meerkat Eclosure was dominated by rocks with caves in them. Immediately you noticed many of the little animals standing an running around."
 dubois.1019.f1: "\"Meerkats are remarkable for their highly organized social structure,\" the zookeeper explains. \"Each member of the group, known as a 'mob' or 'gang,' takes turns acting as a sentinel, watching out for predators while others forage or rest. Their communication is sharp and clear; different calls signal varying levels of threat. This constant vigilance and cooperation are key to their survival in the wild.\""
 dubois.1019.f2: "\"Meerkats are expert diggers,\" the zookeeper shares. \"They can dig multiple feet deep in just minutes, which is essential for finding food like insects, small reptiles, and roots. This digging behavior also plays a crucial role in creating their intricate burrow systems, where they live in groups and raise their young. These underground networks provide protection from predators and extreme weather.\""
 dubois.1019.f3: "\"Meerkats have a wide range of vocalizations,\" the zookeeper explains. \"Their sounds include everything from alarm calls to coordinate their movements, to softer calls used to maintain contact within the group. When a member finds food, it often calls out to share the discovery with others, emphasizing the communal nature of their society. These vocal communications are integral to their survival, helping them stay connected and coordinated.\""
