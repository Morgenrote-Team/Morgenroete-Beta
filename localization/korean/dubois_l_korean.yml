('dubois_has_grizzly_type')][GetPlayer.GetCustom('dubois_has_eagle_type')][GetPlayer.GetCustom('dubois_has_panther_type')][GetPlayer.GetCustom('dubois_has_bison_type')][GetPlayer.GetCustom('dubois_has_alligator_type')][GetPlayer.GetCustom('dubois_has_axolotl_type')][GetPlayer.GetCustom('dubois_has_gila_type')]\n#yellow 남아메리카#!:\n[GetPlayer.GetCustom('dubois_has_sloth_type')][GetPlayer.GetCustom('dubois_has_jaguar_type')][GetPlayer.GetCustom('dubois_has_anteater_type')][GetPlayer.GetCustom('dubois_has_armadillo_type')][GetPlayer.GetCustom('dubois_has_condor_type')][GetPlayer.GetCustom('dubois_has_manatee_type')][GetPlayer.GetCustom('dubois_has_monkey_type')][GetPlayer.GetCustom('dubois_has_capybara_type')]"
