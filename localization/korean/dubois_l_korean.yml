 dubois_send_paleontologist_to_excavation_button_desc: "우리 [concept_dubois_paleontologist]를 [concept_dubois_paleontological_excavation] 현장에 파견합니다.\n고생물학자를 파견하면 발굴을 통해 얻는 [Concept('concept_dubois_fossil','$concept_dubois_fossils$')]과 [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')]의 양이 늘어납니다.\n\n고생물학자는 언제든 호출할 수 있지만 한번 호출되면 1년 동안 발굴 현장으로 돌아갈 수 없습니다."
 dubois_recall_paleontologist_from_excavation_button: "고생물학자 호출"
 dubois_recall_paleontologist_from_excavation_button_desc: "[concept_dubois_paleontologist]를 [concept_dubois_paleontological_excavation] 현장에서 불러들입니다.\n발굴을 통해 얻는 [Concept('concept_dubois_fossil','$concept_dubois_fossils$')]과 [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')]가 추가되는 효과를 더 이상 누릴 수 없게 됩니다.\n\n고생물학자는 #n 1년#! 동안 다시 #n 발굴에 나설 수 없게 됩니다#!."
 dubois_recall_excavation_button: "발굴단 철수"
 dubois_recall_excavation_button_desc: "[concept_dubois_paleontological_team]을 [concept_dubois_paleontological_excavation] 현장에서 불러들입니다. 고생물학 발굴 현장이 사라지게 됩니다."
