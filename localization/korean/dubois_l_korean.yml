 dubois.52.t: "양질의 임업지"
 dubois.52.d: "[SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] 박사가 자신의 목표를 달성하였다. 내성이 강한 묘목을 신중히 선별하고, 자연적인 해충 방제 조치에 나서며, 여러 동식물의 공생 관계를 연구함으로써 우리나라의 목재 산업을 지속 가능한 수준으로 강화해 왔다.\n\n총 개량 건물 수: [GetPlayer.MakeScope.Var('mr_num_improved_forestry_buildings_var').GetValue|V0]곳\n사업으로 확보한 $concept_dubois_specimens$ 수: @dubois_specimen! [GetPlayer.MakeScope.ScriptValue('ito_specimens_from_forestry_project_for_event_value')|+0]점"
 dubois.52.f: "\"죄송한데 뭐라고 하셨습니까? 이 나무들을 베어버리라니요? 제가 얼마나 애지중지하면서 키우고 먹이고 돌봐준 애들인데, 이제는 자본주의 괴물들이 내 새끼들을 죽이려 든다니요? 아니 세상에, 난 뭘 한 거야!\""
 dubois.52.g: "만인을 위한 더 많은 나무!"
 dubois.53.t: "양질의 고무나무"
 dubois.53.d: "[ROOT.Var('ito_naturalist_var').GetCharacter.GetLastName] 박사가 자신의 목표를 달성하였다. 내성이 강한 묘목을 신중히 선별하고, 자연적인 해충 방제 조치에 나서며, 여러 동식물의 공생 관계를 연구함으로써 우리나라의 목재 산업을 지속 가능한 수준으로 강화해 왔다.\n\n총 개량 건물 수: [GetPlayer.MakeScope.Var('mr_num_improved_runner_buildings_var').GetValue|V0]곳"
 dubois.53.f: "\"아무 짝에도 쓸모 없는 고무 따위에 왜 이렇게들 관심을 갖는지 모르겠군요? 제가 이걸 하는 이유는 네오헤스페리얼리스트 늪모기에 관심이 있기 때문이에요. 조그맣지만 치명적인 곤충인데 이런 기후에서만 번식하고 있거든요.\""
 dubois.53.g: "만인을 위한 더 많은 고무!"
 dubois.22.t: "[ROOT.Var('ito_naturalist_var').GetCharacter.GetLastName] 교수, [SCOPE.GetRootScope.GetCountry.GetCustom('ito_animal_documentation_name')] 기록"
 dubois.22.d: "수 개월에 걸쳐 본래 서식지에서 동물을 관찰한 [ROOT.Var('ito_naturalist_var').GetCharacter.GetFullName](이)가 조사를 마치고 논문 #YELLOW 〈[SCOPE.GetRootScope.GetCountry.GetCustom('dubois_animal_documentation_title')]〉#!(을)를 세상에 선보였다. [SCOPE.GetRootScope.GetCountry.GetCustom('dubois_animal_documentation_topic')]"
 dubois.22.g: "국립 도서관에 사본 한 부를 보관해 두시오."
 dubois_document_new_animal_tt: "[ROOT.Var('ito_naturalist_var').GetCharacter.GetLastName] 교수가 #ORANGE [SCOPE.GetRootScope.GetCountry.GetCustom('dubois_animal_documentation_name')]#!을 기록합니다."
 je_dubois_native_animal: "현지 동물 기록"
 je_dubois_native_animal_reason: "[ROOT.Var('ito_naturalist_var').GetCharacter.GetLastName] 교수가 국내의 동물을 대상으로 원래 서식지에서 직접 연구에 나서고 있습니다. 연구 과정의 기간에는 경험치와 숙련도, 인물 특성은 물론 자연사 중점 대학의 수가 영향을 끼칩니다. 현재 연구 대상은 #ORANGE [SCOPE.GetRootScope.GetCountry.GetCustom('dubois_animal_documentation_name')]#!입니다."
 je_dubois_native_animal_goal: "#E 박물학자 진행도#!가 #GREEN [JournalEntry.GetTotalGoalValue|V0]#!점에 도달"
 je_naturalist_dies_tt: "[ROOT.Var('ito_naturalist_var').GetCharacter.GetLastName] 교수 사망"
 dubois.442.t: "Geological Knowledge"
 dubois.442.d: "During his stay in the mountains, the [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] examined the mountain in detail, mapped it and made scientific interpretations. To the surprise of the entire mountaineering team, he surprised them the next morning with a relief map showing the pitfalls and smoother climbs of the mountain."
 dubois.442.f: "'Why did I do that? Oh, I was just a bit bored and I had also cataloged my minerals. It's nothing special! I didn't even color it ...'"
 dubois.442.g: "Thank God we have Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]"
 dubois.443.t: "A Fine Mineral"
 dubois.443.d: "The mountaineering group was already complaining about the dilly-dallying nature of the geologist, who as a scientist was more of a burden than a help; but as it turns out, Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] discovered a rare material while climbing the peak."
 dubois.443.g: "What a lovely little surprise."
