 alert_dubois_paleontologist_unused_alert_hint: "현재 [concept_dubois_paleontologist]에게 할 일이 없어 특정 업무를 맡길 수 있습니다. [concept_dubois_paleontological_licence]를 받아 [concept_dubois_formation]으로 가는 길을 확보해 보십시오. 지층을 보유하고 있지 않다면 다른 일을 맡길 수도 있습니다. #V 모르겐뢰테 창#!의 학자 개요 란에서 업무를 부여할 수 있습니다. "
 dubois.39.d: "몇 주간의 좌절과 끝없는 노력 끝에 마침내 그토록 기다리던 동물을 포획하였다. [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] 교수는 기쁨에 겨운 모습이다. 사냥대는 포획한 동물과 함께 고국으로 돌아왔다. 이런 불편한 자연보다는 [ROOT.GetCountry.GetNameNoFlag]의 국립 동물원에서 틀림없이 훨씬 더 행복하게 지낼 것이다!"
