 ito_naturalist: "박물학자"
 ito_naturalist_desc: "자연계를 배워가는 제자로서 표본을 수집하고 희귀 생물을 생포하는 임무를 맡습니다."
 ito_naturalist_experienced: "노련한 박물학자"
 ito_naturalist_experienced_desc: "이 박물학자는 부지런한 현장 조사와 자연의 다양성 기록에 귀중한 공로로 명성을 얻은 학자입니다.  "
 ito_naturalist_famous: "저명한 박물학자"
 ito_naturalist_famous_desc: "획기적인 탐험과 자연 철학에 대한 공로로 널리 알려진 이 인물은 동시대 가장 존경받는 학자로 여겨집니다."
 ito_botanist: "식물학자"
 ito_botanist_desc: "이 인물은 정글에서 사막까지, 나무에서 이끼까지 전세계의 식물을 연구하는 데 시간을 보냅니다."
 ito_entomologist: "곤충학자"
 ito_entomologist_desc: "어떤 사람이 곤충을 들여다보고 싶어할까요? 글쎄 이 인물은 곤충을 연구해서 전문가까지 되었답니다."
 ito_marine_biologist: "해양생물학자"
 ito_marine_biologist_desc: "아, 바다라! 그곳에서 한평생을 보내면 얼마나 좋을지. 그저 선원일 필요는 없겠지요. 이 인물은 바다 생물들을 연구하며 일생을 보낼 수 있습니다. 참으로 근사한 삶 아닐까요!"
 ito_zoologist: "동물학자"
 ito_zoologist_desc: "동물은 흥미롭습니다! 정말이지 멋있죠! 그리고 이 인물은 그 모든 동물을 알아보려는 사람이랍니다!"
 dubois_stop_naturalist_improvement_project_tt: "#italic $dubois_stop_naturalist_project_button$#! 버튼을 클릭하거나 [concept_dubois_naturalist]가 더 이상 존재하지 않게 되면 과제를 중단할 수 있습니다."
