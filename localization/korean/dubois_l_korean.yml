 dubois_set_paleontologist_to_north_america_tt: "교수가 북아메리카의 고대 지층에서 #O 화석 흔적#!을 발굴하기 위한 탐사에 나서게 됩니다."
 dubois_set_paleontologist_to_south_america_tt: "교수가 남아메리카의 광활한 지형 속에 묻힌 선사 시대의 흔적들을 조사하게 됩니다."
 dubois_set_paleontologist_to_europe_tt: "교수가 유럽의 오래된 지형을 다니며 #O 고생물학적 퇴적물#!에 대한 정식 조사를 실시하게 됩니다."
 dubois_set_paleontologist_to_africa_tt: "교수가 아프리카 대륙의 원시 지층에서 #O 화석 표본#!을 찾아 나서게 됩니다."
 dubois_set_paleontologist_to_asia_tt: "교수가 고대 생물의 #O 화석화된 증거#!를 찾아 아시아로 여정을 떠납니다."
 dubois_set_paleontologist_to_australia_tt: "교수가 호주로 탐사를 떠나 외딴 곳의 알 수 없는 #O 화석 지대#!를 조사하게 됩니다."
 dubois_set_paleontologist_to_default_tt: "교수에게 현장에서 복귀하여 본업에 나서 달라고 요청합니다."
 dubois_has_formation_tt: "학계에서 주목받은 누층이나 주요 거대 누층을 특성으로 지닌 주를 하나 이상 보유함"
 dubois_has_rainforest_tt: "열대 우림을 지닌 주를 하나 이상 보유함. 여기에는 아마존 우림, 콩고 우림, 보르네오 우림, 인도차이나 우림이 인정됩니다."
 dubois_has_mountains_tt: "점유하고 있는 주 가운데 상당 규모의 산맥이 가로지르는 주가 하나 이상 존재함"
 dubois_unconquered_summit_tt: "국내에 미정복 상태의 산 정상을 보유하고 있거나, 외국에서 발급받은 등산 허가로 해당 산 정상에 접근할 권한을 부여받음"
 dubois_has_active_naturalist_tt: "[concept_dubois_naturalist]가 현재 특정 활동에 나서거나 현장 조사에 참여하고 있지 않음"
 dubois_has_active_paleontologist_tt: "[concept_dubois_paleontologist]가 현재 탐사나 연구에 참여하지 않고 지시에 따를 준비가 되어 있음"
 dubois_naturalist_sick_tt: "[concept_dubois_naturalist]가 병에 걸려 현장 연구를 수행할 수 없게 됩니다."
 dubois_botanical_expedition_banned_tt: "정치적 제약이 우세한 관계로 식물 탐사가 중단됩니다."
 dubois_chemical_warfare_tt: "이 선택지는 암울하지만 결정적인 기술인 #O 화학전#!을 연구한 덕분에 가능합니다."
 dubois_triage_tt: "이 수단은 전시 의학에서 #O 중증도 분류#!를 도입했기에 실현이 가능합니다."
 dubois_logistics_tt: "이 작전은 시기적절한 보급과 공동 작업을 보장하는 현대적인 #O 물류#!를 개발하였기에 가능합니다."
 dubois_hide_animal_decisions: "동물 결단 숨김"
 dubois_hide_animal_decisions_desc: "모든 동물 결단을 숨깁니다."
 dubois_hide_animal_decisions_tt: "모든 동물 결단을 숨깁니다."
 dubois_show_animal_decisions: "동물 결단 표시"
 dubois_show_animal_decisions_desc: "모든 동물 결단을 표시합니다."
 dubois_show_animal_decisions_tt: "모든 동물 결단을 표시합니다."
 dubois_extend_zoo_small_decision: "[concept_dubois_zoo] 확장 (소규모)"
 dubois_extend_zoo_small_decision_desc: "[Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')]은 모두에게 행복을 안깁니다. 사람들은 동물원에 모여들고, 과학자들은 동물학 연구를 계속할 수 있으며, 국제적인 위신은 제일 많은 수의 외래종을 전시한 국가에게 돌아가기 떄문입니다. 확장을 거듭할수록 국가의 위신도 높아집니다. 어떤 확장 단계에서는 단순히 동물을 많이 수집하는 것을 넘어서 세계 각지에서 동물을 골고루 데려와야 합니다."
