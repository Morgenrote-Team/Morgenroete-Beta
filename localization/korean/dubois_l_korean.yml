 dubois.2171.h: "플레시오사우르스"
 dubois.2171.i: "바실로사우루스"
 dubois.2171.j: "메갈로돈"
 dubois.2173.t: "플레시오사우루스"
 dubois.2173.f: "플레시오사우루스는 해양 파충류의 목(目)에 해당되며, 그 화석은 전세계에서 발견됩니다. 몸길이는 종에 따라 1.5m에서 15m에 이르렀습니다. 먹이는 달팽이와 홍합에서부터 물고기 등까지 종마다 다양했을 것으로 추정됩니다.\nU자형 턱과 통발을 닮은 날카로운 이빨은 유용한 사냥 도구로 활용되었을 것입니다."
 dubois.2174.t: "바실로사우루스"
 dubois.2174.f: "바실로사우루스는 공룡이 아니라 선사시대 고래의 일종입니다. 길쭉한 몸은 기다란 뱀을 연상시키지만, 20m에 달하는 몸길이는 향유고래와 비슷한 크기입니다."
 dubois.2175.t: "메갈로돈"
 dubois.2175.f: "거대 상어 메갈로돈은 지구 역사상 존재했던 상어 가운데 가장 컸던 것으로 추정됩니다. 하지만 지금까지 이빨과 척추뼈만 발견되어 정확한 길이를 가늠하기는 어렵습니다. 고생물학계에서는 몸길이가 9m에서 30m에 달했던 것으로 추정합니다. 어찌 되었든 이 상어 골격은 몹시 아름답고 우리 소장품 가운데서도 가장 귀한 보물로 꼽힙니다."
