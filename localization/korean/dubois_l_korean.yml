 dubois.158.t: "Thylacine"
 dubois.158.d: "Our zoo is enriched by a new, exotic animal: today the long-awaited #O Thylacine#! moved into its new enclosure."
 dubois.158.f: "The Thylacine, also known as the Tasmanian Tiger, was a carnivorous marsupial native to Tasmania and Australia. It had a distinctive striped back and was primarily nocturnal. Thylacines were solitary hunters, relying on stealth to catch prey such as small mammals and birds. Unfortunately, due to hunting and habitat loss, the Thylacine is now considered extinct."
 dubois.158.g: "How cute!"
 visit_thylacine_tt: "#o 주머니늑대#! 우리를 방문합니다."
