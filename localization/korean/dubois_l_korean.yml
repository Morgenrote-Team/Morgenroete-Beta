 je_dubois_paleontological_excavation_yearly_bones_paleontologist_present_loc: "\n#default_text [concept_dubois_paleontologist] 발굴 중이면 [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bone_no_dinosaur$')] #p 1점#!#!"
 dubois_paleontological_excavation_explanation_loc: "우리 [concept_dubois_paleontological_team]은 현재 [concept_dubois_paleontological_excavation]을 진행하고 있습니다. 발굴을 하면 해마다 일정량의 [Concept('concept_dubois_fossil','$concept_dubois_fossils$')]과 [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')]를 획득합니다.\n[concept_dubois_paleontologist]를 발굴 현장에 파견하여 연간 화석과 뼈 출토량을 늘릴 수 있습니다. 단 고생물학자를 현장에서 불러들이면 1년 간 다시 파견할 수 없게 됩니다."
 dubois_fossil_yield_from_all_excavations_loc: "\n\n전체 발굴지의 연간 @dubois_fossil![Concept('concept_dubois_fossil','$concept_dubois_fossils$')] 예상 출토량: [Country.MakeScope.Var('dubois_yearly_estimated_regular_fossils_var').GetValue|+0]점"
