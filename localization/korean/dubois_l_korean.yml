 dubois.2011.d_north_america: "[ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] 교수는 우리나라 일류의 [concept_dubois_paleontologist]입니다. 현재 #YELLOW 북아메리카#!의 암반층에 대한 조사를 수행하고 있습니다."
 dubois.2011.d_south_america: "[ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] 교수는 우리나라 일류의 [concept_dubois_paleontologist]입니다. 현재 #YELLOW 남아메리카#!의 암반층에 대한 조사를 수행하고 있습니다."
 dubois.2011.d_europe: "[ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] 교수는 우리나라 일류의 [concept_dubois_paleontologist]입니다. 현재 #YELLOW 유럽#!의 암반층에 대한 조사를 수행하고 있습니다."
