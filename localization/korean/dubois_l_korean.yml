 goods_output_wood_mult_desc: "건물에서 생산되는 @wood! 목재의 양에 대한 보너스 또는 불이익"
 dubois.10.t: "동물원 폐쇄"
 dubois.10.d: "정부는 [SCOPE.sState('dubois_zoo_state').GetName]의 동물원 운영에 더 이상 관심을 두고 있지 않다. 동물원은 폐쇄하고 동물들은 경매에 부칠 예정이다."
 dubois.10.f: "한 국가는 수도에 동물원 하나만 유지할 수 있습니다. 그 보상으로 동물원의 규모에 따라  일정한 금액과 표본이 국가에 돌아갑니다."
 dubois.10.g: "헌데... 그 동물들, 정말 멋있었단 말이오!"
 alert_dubois_zoo_extension_possible_alert_hint: "우리 [concept_dubois_zoo]의 확장이 가능합니다. 확장을 위해서는 #V 모르겐뢰테 창#!의 학자 개요 란에 들어가 주십시오. "
 alert_dubois_mountain_expedition_possible_alert_hint: "우리나라가 산악 원정대를 파견할 수 있습니다. 파견을 위해서는 #V 모르겐뢰테 창#!의 체육 개요 란에 들어가 주십시오. "
 alert_dubois_naturalist_unused_alert_hint: "현재 [concept_dubois_naturalist]에게 할 일이 없어 특정 업무를 맡길 수 있습니다. #V 모르겐뢰테 창#!의 학자 개요 란에서 업무를 부여할 수 있습니다. "
 alert_dubois_hippocampus_congress_alert_hint: "해마 학술회의를 개최할 수 있습니다. #V 모르겐뢰테 창#!에 있는 학자 개요 란의 버튼을 눌러 회의 준비에 나설 수 있습니다."
 alert_dubois_paleontological_collection_alert_hint: "[concept_dubois_zoo]에 화석 소장품을 마련할 수 있습니다. #V 모르겐뢰테 창#!에 있는 고생물학자 개요 란의 버튼을 눌러 신설할 수 있습니다."
