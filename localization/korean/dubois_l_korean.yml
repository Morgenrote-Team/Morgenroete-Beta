 dubois.251.t: "미지의 인간 뼈"
 dubois.251.d: "고생물학 연구를 진행하던 [SCOPE.sCharacter('dubois_paleontologist_scope').GetFullName](이)가 선사 시대의 인간 뼈를 발견하였다. 그 연대는 수만 년을 거슬러 올라가는 것으로 추정된다. 뼈는 전문가가 살펴볼 수 있도록 조심히 운반되었다."
 dubois.251.f: "고생물학자는 암석의 상층부에서 인간의 골격 유해를 발견하고 놀라움을 감추지 못했습니다. 하지만 연결 부위를 복원할 수 없는 상황이었습니다. [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName]도 기초적인 고인류학 지식을 갖고 있으나, 과학적 결과에 영향을 줄 수 있어 별다른 의견을 제시하지는 않기로 하였습니다."
 dubois_add_fossil_java_tt: "#O 특별 인류 화석#! @dubois_human_fossil! #G 1점#! 획득: 자바인"
