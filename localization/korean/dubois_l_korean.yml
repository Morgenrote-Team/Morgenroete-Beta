 dubois_nature_protection_tech: "자연 보호"
 dubois_nature_protection_tech_desc: "자연 보호는 산림 보호의 필요성에서 출발했습니다. 이후 멸종 위기에 처한 동물과 특정 지역 전체가 보호 대상이 되었습니다. 19세기와 20세기에는 다양한 자연 보전 계획이 성공을 거두었는데 대표적으로 스위스 알프스 지역의 알파인아이벡스를 재번식시키는 사업이 있었습니다."
