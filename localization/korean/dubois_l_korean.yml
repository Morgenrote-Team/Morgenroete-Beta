 dubois_extend_zoo_large_decision_desc: "[Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')]은 모두에게 행복을 안깁니다. 사람들은 동물원에 모여들고, 과학자들은 동물학 연구를 계속할 수 있으며, 국제적인 위신은 제일 많은 수의 외래종을 전시한 국가에게 돌아가기 떄문입니다. 확장을 거듭할수록 국가의 위신도 높아집니다. 어떤 확장 단계에서는 단순히 동물을 많이 수집하는 것을 넘어서 세계 각지에서 동물을 골고루 데려와야 합니다."
 dubois_extend_zoo_famous_decision: "[concept_dubois_zoo] 확장 (유명급)"
 dubois_extend_zoo_famous_decision_desc: "[Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')]은 모두에게 행복을 안깁니다. 사람들은 동물원에 모여들고, 과학자들은 동물학 연구를 계속할 수 있으며, 국제적인 위신은 제일 많은 수의 외래종을 전시한 국가에게 돌아가기 떄문입니다. 확장을 거듭할수록 국가의 위신도 높아집니다. 어떤 확장 단계에서는 단순히 동물을 많이 수집하는 것을 넘어서 세계 각지에서 동물을 골고루 데려와야 합니다."
 dubois_catch_local_animal_decision: "지역 동물 포획"
 dubois_catch_local_animal_decision_desc: "우리나라에는 [concept_dubois_zoo]에 전시할 만큼 매력적인 생물종이 사는 동물 서식지가 존재합니다. 1년 동안 동물 전문가가 우리나라를 돌아보며 동물원에 들일 [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')]을 포획합니다."
 dubois_visit_zoo_decision: "동물원 둘러보기"
 dubois_visit_zoo_decision_desc: "탐험과 노력을 통해 들여온 다채로운 이국적 동물들을 동물원에서 자유롭게 관람할 수 있는 특별 이벤트를 개시합니다."
 dubois_ban_animal_export_decision: "동식물 반출 금지"
 dubois_ban_animal_export_decision_desc: "살아있는 표본의 반출을 금지함으로써 우리는 천연 보물을 보존할 주권적 권한을 행사합니다. 외국 정부는 더 이상 우리와 접촉하려 하지 않을 것입니다."
 dubois_allow_animal_export_decision: "동식물 반출 허용"
 dubois_allow_animal_export_decision_desc: "특정 동물의 반출 허가를 발급하는 것은 외교적 우호 관계를 유지하는 데 도움이 될 뿐만 아니라 상당한 추가 수입원을 제공합니다."
 dubois_collect_specimen_decision: "[concept_dubois_specimen] 수집 개시"
 dubois_collect_specimen_decision_desc: "동식물을 아우르는 뛰어난 [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] 수집은 과학 기관의 발전을 도모할 뿐만 아니라, 우리나라의 탐구 정신과 계몽된 진보를 상징합니다."
 dubois_safari_decision: "아프리카 사파리 개시"
 dubois_safari_decision_desc: "우리 [concept_dubois_zoo]을 위해 아프리카 야생 깊숙히 탐사대를 파견하여 위협적인 사냥감을 포획합니다. 꾸준한 추적과 세심한 덫 설치로 살아있는 표본을 확보할 수 있게 됩니다. 사파리 한 번당 한 마리의 동물만 포획할 수 있습니다. 크고 육중한 동물이면 덫을 많이 놓을 필요가 있고, 발 빠른 동물일수록 지칠 줄 모르는 추적이 필요한 것이 원칙입니다."
 je_dubois_safari: "아프리카 사파리 원정"
 je_dubois_safari_reason: "노련한 사냥꾼과 박물학자로 이루어진 원정대가 [concept_dubois_zoo]에 전시할 희귀 표본을 확보하기 위해 아프리카로 파견되어 사파리 사냥에 나서고 있다. 이번 원정은 성공을 위해 기지와 인내력, 과학적 방법을 균형 있게 동원해야 한다. 덩치가 큰 동물에게는 덫을 여러 개 설치해야 하고, 잡기 힘든 사냥감은 숙련된 추적 능력으로 뒤쫓아가야 한다. 원정 한 번에 한 마리의 동물만 잡아올 수 있다."
 je_dubois_safari_goal: "아프리카 사파리는 반년 동안 진행됩니다. 그 기간 동안 원정대가 표본 확보에 실패한다면 빈손으로 돌아가게 되며, 그간의 노력은 어떠한 보상도 주어지지 않습니다."
 je_dubois_safari_fail: "사파리가 성공 없이 마무리됨. 몇 개월 간의 고난과 노력에도 불구하고 원정대는 그에 걸맞은 아무런 표본도 얻지 못하고 돌아오게 됩니다."
 je_dubois_dinosaur_excavation: "공룡 발굴"
 je_dubois_dinosaur_excavation_reason: "공룡 뼈 화석이 발굴되면서 [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] 교수는 본격적인 고생물학 발굴 작업에 나섰다. [concept_dubois_paleontologist]는 앞으로 1년 동안 경험과 통찰력을 살려 1개에서 3개의 화석 조각을 추가로 발견하게 된다. 발굴이 종료된 후에도 추가로 발견될 가능성이 남아 있으며, 공룡 골격 전체의 기록이 아직 완전히 밝혀지지 않았음을 보여준다. 고생물학 소장품에 표본을 전시하려면 총 다섯 개의 뼈로 완전한 복원을 이루어내야 한다."
 je_dubois_dinosaur_excavation_goal: "12개월이 지나면 [concept_dubois_paleontologist]는 발견 사항과 수습한 뼈에 대한 공식 보고서를 작성합니다."
 dubois_specimen_tt: "#G 50,000점 이상#!의 @dubois_specimen!#O 식물 [Concept('concept_dubois_specimen','$concept_dubois_specimens$')]#!을 수집하여, 발견한 동식물 소장품을 키워나감"
 notification_dubois_paleontological_report_notification_name: "연간 고생물학 현황"
 notification_dubois_paleontological_report_notification_desc: "우리 [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')]가 올해 새롭게 발견한 화석의 수는 총 [GetPlayer.MakeScope.Var('dubois_fossils_notification_var').GetValue|0+=]점입니다."
 notification_dubois_java_man_notification_name: "[INITIATOR_COUNTRY.GetName]에서 자바인을 발견"
 notification_dubois_java_man_notification_desc: "[INITIATOR_COUNTRY.GetName]의 [concept_dubois_paleontologist]가 인류 진화사의 의문점에 해답이 될 중요한 유골을 자바섬에서 발견하였습니다."
 dubois.1.t: "동물원 개원"
 dubois.1.d: "새로운 [concept_dubois_zoo]의 성대한 개원식에 수많은 관객이 몰려들어 다양한 동물들을 구경하고 있다. 대중들의 열렬한 반응 속에 우리를 추가로 확충하고 새로운 종을 들여와 달라는 요구가 벌써부터 터져나오고 있다."
 dubois.1.f: "\"이틀 밤 전에 엑서터 체인지에서 호랑이들이 밥 먹는 모습을 보았다. 모레아의 벨리 파샤가 데리고 있던 사자는 아랍 사육사를 개처럼 졸졸 따라다녔지만, 하이에나가 사육사에 애교 부리는 모습이 나로서는 가장 재미있었다. 이만한 모임이 또 어디 있으랴! - '하마'라는 동물은 그 얼굴이 리버풀 경을 꼭 닮았고, '곰바닥늘보'는 목소리와 태도가 내 하인을 꼭 닮았다 - 하지만 호랑이는 말이 너무 많았다. 코끼리는 내 돈을 받고 돌려주고- 내 모자를 벗기고, 문을 열고, 코로 채찍을 휘두르고, 몹시 얌전한 모습에 내 집사면 얼마나 좋을까 싶었다. 세상에서 가장 아름답기로는 표범 만한 게 없지만, 가여운 영양들이 죽어 있었다. 여기서 그런 모습을 보고 싶지는 않다. 낙타를 마주한 순간 나는 소아시아가 그리워졌다.\" - 바이런 경"
 dubois.1.g: "국립 사육원의 화려한 시작이다."
 dubois.2.t: "종의 기원"
 dubois.2.d: "[SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] 교수는 혁신적인 논문을 발표하며 종의 기원을 자연적인 과정으로 설명하려는 대담한 새 이론을 제시했다."
 dubois.2.f: "\"이러한 생존 경쟁으로 인해, 아무리 미세하고 그것이 어디서 유래했든 간에, 다른 유기체와 외부 환경과의 무한히 복잡한 관계 속에서, 특정 종의 개체가 살아가는 데 조금이라도 이득이 된다면, 변이는 그 개체의 보존에 기여하고 자손에게 유전되는 것이 일반적일 것이다... 나는 이처럼 유용하다는 전제 하에 미세한 변이가 보존되는 원리를, 인간의 선택 능력과의 관련성을 나타내기 위하여 '자연 선택'이란 용어로 명명하게 되었다.\" - 찰스 다윈"
 dubois.2.g: "자연과학을 다시 쓸 이론이로다."
 dubois.2.h: "과학이 다시 한번 미신에 일격을 가했군."
 dubois.3.t: "비글호의 귀환"
 dubois.3.d: "HMS 비글호가 수년간의 과학 탐사를 마치고 고국으로 돌아왔다. 비글호는 풍부한 자연 표본, 화석 유해, 상세한 스케치, 관찰 자료를 가지고 왔다. 선원들 가운데 [concept_dubois_naturalist] [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName](이)가 공헌한 연구 자료는 벌써부터 학계의 높은 평가를 받고 있다."
 dubois.3.f: "\"박물학자로 비글호에 승선할 당시, 나는 남아메리카의 식생 분포에 관한 자료와, 남아메리카의 현재와 과거의 식생 간 지질학적 관계에 관한 몇 가지 사실에 상당한 발견을 이룬 상황이었다. 이러한 사실은 나로서는 우리 시대 가장 위대한 철학자들이 수수께끼 중의 수수께끼로 칭했던 종의 기원에 대한 해답을 제시하는 것처럼 보였다.\" - 찰스 다윈"
 dubois.3.g: "역사적인 항해로군. 앞으로 어떤 발견이 뒤따를 것인가."
 dubois.4.t: "코스모스"
 dubois.4.d: "알렉산더 폰 훔볼트의 기념비적인 연구 《코스모스》가 출간되었다. 이는 하나의 철학적 기틀로 과학을 하나로 통합하려는 야심찬 시도다. 원래 베를린의 강연으로 출발한 이 연구는 전세계의 독자들을 찾아가 자연과 인간 탐구의 백과전서적 시각을 제시한다."
 dubois.4.f: "\"바쁜 나날을 보내던 어느 늦은 저녁에 나는 거의 반세기 동안 내 영혼 속에 어렴풋 맴돌던 작품을 독일 사람들에게 바친다. 여러 순간마다 이 연구는 할 수 없을 것으로 생각했고 정말로 포기했던 시점에도 무심코 손대곤 했다. 내 역량에 대한 정당한 불신으로 비롯된 수줍음을 안고 이 작품을 이 시대 독자들에게 헌정하고자 한다. 오랫동안 기다린 작품은 그보다 덜 관대하다는 사실을 애써 잊으려 한다.\" - 알렉산더 폰 훔볼트"
 dubois.4.g: "현대적인 과학 철학의 초석일세."
 dubois.4.h: "이 작품은 앞으로 다가올 세대들을 일깨울 것이오."
 dubois.5.t: "멘델의 유산"
 dubois.5.d: "오랫동안 묻혀 있던 애벗 그레고르 멘델의 실험이 재조명되면서 유전학 연구에 혁명을 불러일으켰다. 멘델이 제시한 단순하면서도 강력한 원리, 즉 멘델의 법칙은 신규 학문인 유전학의 토대를 마련하고 있다."
 dubois.5.f: "\"관상식물의 새로운 색상 변종을 위해 실시되는 것과 같은 인공 수정 사례는 여기서 논할 실험으로 이어졌다. 같은 종끼리 수정이 일어날 때마다 동일한 잡종 형태가 놀라울 정도로 규칙적으로 재발하는 현상에 착안해, 잡종의 후손에서 나타나는 발달 과정을 추적하는 실험을 추가로 진행하였다.\" - 그레고르 멘델"
 dubois.5.g: "근대 유전학의 출현일세."
 dubois.6.t: "자바인의 발견"
 dubois.6.d: "네덜란드 동인도 회사에서 의사이자 해부학자로 활동하는 [SCOPE.sCharacter('dubois_new_paleontologist_scope').GetFullName](이)가 선사시대 인류 조상의 유골 화석을 발견하여 학계 내에서 흥분과 논란을 동시에 불러일으켰다."
 dubois.6.f: "자바인 화석은 1891년 자바섬 동부의 솔로강에서 [SCOPE.sCharacter('dubois_new_paleontologist_scope').GetFullName](이)가 발견하였다. 약 100만여 년 전의 것으로 추산되는 이 유골은 유럽 외에서 발견된 최초의 유인원 화석이자 네안데르탈인 이래 발견된 두번째 화석이다. 처음에는 '안트로포피테쿠스'로, 나중에는 '피테칸트로푸스 에렉투스'라는 이름으로 명명된 이 화석은 오늘날 '호모 에렉투스'로 널리 인정받고 있으나 간혹 '호모 에렉투스 자바넨시스'로 자세히 구분하기도 한다. 고인류학자 랄프 폰 쾨니히스발트는 훗날 이렇게 말했다. \"이토록 엄청난 파장과 다채로운 과학적 견해의 충돌을 불러온 고생물학 발견은 없었다.\""
 dubois.11.t: "새로운 [concept_dubois_zoo_animal]"
 dubois.11.d: "[SCOPE.sCountry('dubois_animal_country').GetName]에서 우리의 소중한 동물원에 선보일 희귀 품종의 양도에 흔쾌히 동의하였다."
 dubois.11.f: "학계 교류 규정에 의거하여 동물원에서는 한번에 한 마리의 동물만 들여올 수 있습니다. 동물을 들여온 후에는 이송 과정과 새로운 환경 적응에 몇 주간의 시간이 소요됩니다. 동물 전시로의 편입 과정이 올바르고 품위 있게 이루어지고 나야만 추가 품종 도입을 위한 외교적 노력을 기울일 수 있습니다. 우리 동물원의 품격을 더할 동물은 무엇이 될까요?"
 dubois.11.grizzly: "회색곰"
 dubois.11.eagle: "대머리독수리"
 dubois.11.bison: "아메리카들소"
 dubois.11.panther: "플로리다퓨마"
 dubois.11.alligator: "미시시피악어"
 dubois.11.axolotl: "아홀로틀"
 dubois.11.sloth: "세발가락나무늘보"
 dubois.11.jaguar: "재규어"
 dubois.11.anteater: "큰개미핥기"
 dubois.11.armadillo: "아홉띠아르마딜로"
