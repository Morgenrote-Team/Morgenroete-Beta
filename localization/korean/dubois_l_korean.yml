 je_dubois_paleontological_expedition_reason: "고생물학자가 [concept_dubois_paleontological_expedition]에 나서고 있습니다.\n$mr_divider_for_je$\n탐사에는 12개월의 시간이 소요됩니다. 탐사가 마무리되면 그 #V 성공 확률#!에 따라 [Concept('concept_dubois_fossil','$concept_dubois_fossils$')]과 [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')]를 획득합니다.\n$mr_divider_for_je$\n매달 소량의 #V 성공 확률#!이 부여되며, 그와는 별개로 무작위 이벤트를 통해 성공 확률이 증가되거나 감소하게 됩니다.\n\n현재 월간 성공 확률 변동치: #underline #tooltip:[GetRawTextTooltipTag('je_dubois_paleontological_expedition_monthly_progress_tt')] [Country.MakeScope.Var('dubois_paleontological_expedition_estimated_progress_var').GetValue|2+] #!#!(최대치: 1)\n$mr_divider_for_je$\n남은 [concept_dubois_paleontological_team]이 있다면 [concept_dubois_paleontological_excavation]을 준비할 수도 있습니다. 발굴을 통해 화석과 뼈를 자동으로 추가 획득하게 됩니다.\n$mr_divider_for_je$\n탐사에서 얻는 현재 #tooltip:[GetRawTextTooltipTag('je_dubois_paleontological_expedition_yield_tt')] #underline #b 예상 획득량#!#!#!:\n[GetPlayer.GetCustom('je_dubois_paleontological_expedition_yield_type')]"
 je_dubois_paleontological_expedition_yield_tt: "#V 성공 확률#!에 따라 화석과 뼈를 다음과 같이 더 많이 획득할 수 있습니다.\n0 ~ 3:     $je_dubois_paleontological_expedition_yield_level_1_loc$\n4 ~ 7:     $je_dubois_paleontological_expedition_yield_level_2_loc$\n8 ~ 11:   $je_dubois_paleontological_expedition_yield_level_3_loc$\n12 ~ 14: @dubois_fossil!  [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] #p 4점#!과 @dubois_dinosaur_bone! [concept_dubois_dinosaur_bone] #p 1점#!\n15:         @dubois_fossil!  [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] #p 5점#!과 @dubois_dinosaur_bone! [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] #p 2점#!\n"
