 dubois.108.t: "Gila Monster"
 dubois.108.d: "Our zoo is enriched by a new, exotic animal: today the long-awaited #O Gila Monster#! moved into its new enclosure."
 dubois.108.f: "The Gila Monster is a venomous lizard native to the southwestern United States and northwestern Mexico. Recognizable by its distinctive black and orange markings, it is one of the few venomous lizards in the world. Gila Monsters are slow-moving and primarily nocturnal, feeding on small mammals, birds, and eggs. They store fat in their tails, allowing them to survive long periods without food."
 dubois.108.g: "It doesn't look that dangerous..."
