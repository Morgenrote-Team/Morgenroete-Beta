 dubois_theory_of_evolution_tech: "진화론"
 dubois_theory_of_evolution_tech_desc: "불변하는 생물학적 유형이라는 교리에서 결정적으로 이탈하게 된 계기는 자연선택에 의한 진화론을 통해서였습니다. 다윈은 통제 없는 개체수 증가는 필연적으로 '생존 경쟁'으로 이어지며, 이 과정에서 유리한 변이는 보전되고 그렇지 않은 변이는 도태된다고 주장했습니다. 이러한 원리는 다양한 동식물이 공통 조상으로부터 유래했다는 사실을 합리적으로 해설하고 있습니다. 진화론은 인류가 자연 질서에서 어떠한 특권적 위치도 차지하지 않는다는 점을 시사했기에 많은 사람들을 불안에 빠뜨렸습니다."
 dubois_paleontology_tech: "고생물학"
 dubois_paleontology_tech_desc: "지구의 오랜 역사와 멸종 생물에 관한 관심은 고대 그리스 로마 시대로 거슬러 올라가지만, 중대한 이정표에 도달하게 된 것은 1800년경 조르주 퀴비에르의 비교 해부 연구를 통해서였습니다. 〈종의 기원〉의 출간은 생명과학, 특히 고생물학 분야의 분수령으로 기록되었습니다. 이어진 과학계의 논의는 지질학적 기록 내에 과도기적 화석과 진화 과정에 관한 실증적 단서를 체계적으로 탐색하는 계기가 되었습니다."
 dubois_genetics_tech: "유전학"
 dubois_genetics_tech_desc: "근대 유전학은 아우구스띠노회 수도사였던 그레고르 요한 멘델의 정밀 실험에서 비롯되었습니다. 1900년 멘델의 연구가 재조명되면서 유전학 분야는 급속도로 발전했습니다. 1915년에는 멘델의 유전 법칙이 초파리를 비롯한 여러 생물로 규명되기에 이르렀습니다. 이와 동시에 수학자들은 집단유전학의 통계적 구조를 개발하여 유전 이론을 보다 넓은 연구 분야에 적용해 나갔습니다."
 dubois_paleontologist: "고생물학자"
 dubois_paleontologist_desc: "화석 흔적 연구에 헌신하며 사라져 버린 선사 시대 생명체의 세계를 밝혀내는 학자입니다."
 dubois_paleontologist_experienced: "이름난 고생물학자"
 dubois_paleontologist_experienced_desc: "이 과학자는 중요한 발굴 성과를 연이어 이룩한 것으로 유명하며, 현 시대 지질학계에서 존경받고 있습니다."
 dubois_paleontologist_famous: "저명한 고생물학자"
 dubois_paleontologist_famous_desc: "이 고생물학자는 다방면의 연구와 유명한 발굴 성과로 태고의 생명에 관해서는 주도적인 권위자로 평가받고 있습니다."
 ask_for_zoo_animal: "이국적 동물 입수"
 ask_for_zoo_animal_desc: "우리가 아직 들이지 않은 [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animal$')]을 이 나라에서 보유하고 있다면, 우리는 그 동물의 매수 의향을 정식으로 요청할 수 있습니다."
