 je_dubois_paleontological_excavation_yearly_fossils_paleontology_tech_loc: "\n#default_text [GetTechnology('dubois_paleontology_tech').GetName] 연구 완료로 [concept_dubois_fossil] #p 1점#!#!"
 je_dubois_paleontological_excavation_yearly_fossils_natural_history_10_levels_loc: "\n#default_text [concept_pm_academics_university_natural_history]로 설정된 [GetBuildingType('building_university').GetName]의 건물 단계가 #V 10단계 이상#!으로 #p [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] 3점#! (10단계로 최대 3점)#!"
 je_dubois_paleontological_excavation_yearly_fossils_natural_history_5_levels_loc: "\n#default_text [concept_pm_academics_university_natural_history]로 설정된 [GetBuildingType('building_university').GetName]의 건물 단계가 #V 5단계 이상#!으로 #p [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] 2점#! (10단계로 최대 3점)#!"
 je_dubois_paleontological_excavation_yearly_fossils_natural_history_loc: "\n#default_text [concept_pm_academics_university_natural_history]로 설정된 [GetBuildingType('building_university').GetName]의 건물 단계가 #V 1단계 이상#!으로 #p 화석 1점#! (10단계로 최대 3점)#!"
