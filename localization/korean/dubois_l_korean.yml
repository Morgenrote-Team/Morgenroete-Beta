 je_dubois_mount_dinosaur_skeleton_reason: "고생물학자가 [concept_dubois_dinosaur_skeleton]을 조립합니다.\n$mr_divider_for_je$\n조립이 끝나면 공룡 골격을 하나 얻게 됩니다. 고생물학자의 [concept_academics_experience]를 비롯한 여러 요인에 따라 #p 완벽한#!, #y 불완전한#!, #n 조악한#! 품질의 골격을 얻을 수 있습니다. 공룡 골격의 품질은 [concept_dubois_paleontological_collection]의 고생물학 명성에 영향을 끼칩니다.$je_dubois_mount_dinosaur_skeleton_progress_and_success_chance_loc$"
