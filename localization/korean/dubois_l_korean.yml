 dubois.1059.t: "Gila Monster Enclosure"
 dubois.1059.d: "The Gila Monster's enclosure was a rugged landscape of sandy terrain and rocky crevices. At first glance, the lizard's vibrant black and orange scales blended seamlessly with its surroundings. Then, you spotted it—slowly emerging from a shaded burrow, its thick, bead-like skin glinting in the light as it moved cautiously through its habitat."
 dubois.1059.f1: "In the sun-baked enclosure of the zoo, a solitary Gila Monster slowly makes its way across the rocky terrain, its distinctive black and orange scales catching the sunlight. The deliberate, almost lumbering movement of this venomous lizard draws the attention of curious onlookers. Intrigued by its unique appearance and behavior, you approach a zookeeper for more insights.\n\"The Gila Monster is one of the few venomous lizards in the world,\" the zookeeper explains. \"It moves slowly, conserving energy in the harsh desert environment. Unlike many other predators, it doesn't rely on speed but rather on its potent venom, which it uses to subdue prey like small mammals and birds. Its bright coloration serves as a warning to potential predators, signaling that it's not an easy target.\""
 dubois.1059.f2: "In the rocky enclosure, the Gila Monster is partially hidden beneath a large boulder, its forked tongue flicking out to taste the air. The sight of this prehistoric-looking creature, with its beady skin and powerful jaws, fascinates visitors. Curious about its feeding habits, you seek out a zookeeper for more information.\n\"Gila Monsters have a slow metabolism and can survive on just a few large meals a year,\" the zookeeper shares. \"They use their strong jaws to crush the eggs of birds and reptiles, one of their favorite foods. After a meal, they can store fat in their tails, which sustains them during long periods without food. This adaptation is crucial for surviving in the arid desert where food can be scarce.\""
 dubois.1059.f3: "As you watch the Gila Monster in its desert-like habitat, you notice it carefully climbing over rocks and inspecting crevices. The deliberate pace of its movements and the way it methodically explores its environment pique your interest. Wanting to learn more about this intriguing behavior, you approach a zookeeper.\n\"Gila Monsters are nocturnal by nature,\" the zookeeper explains. \"They spend most of the day hidden away in burrows or under rocks to avoid the extreme heat. When they emerge, they are meticulous in their movements, using their keen sense of smell to locate prey or to find a safe spot to rest. Their solitary and secretive lifestyle has helped them thrive in some of the harshest environments.\""
