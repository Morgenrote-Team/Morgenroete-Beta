 manzoni_je_pro_government_newspaper: "Pro-Government Newspaper"
 manzoni_je_pro_government_newspaper_reason: "The fourth estate exists to check the government. However, it has often happened that a certain court-like reporting has led to far too close a relationship between those in power and journalists. This may be unfortunate for reporting and press freedom, but who wants to be disturbed by unpleasant news?\n\n'Pro-Government Newspaper' triggers when the [concept_executive] of a publishing company belongs to an interest group that #G is part of the government#!. He then engages in pro-government articles."
 manzoni_has_publisher_ig_in_government_tt: "The interest group to which the Publishing Company [concept_executive] belongs is based in the #G government#!."
