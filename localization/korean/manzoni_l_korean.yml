 manzoni.1205.t: "\"La Coscienza di Zeno\""
 manzoni.1205.d: "Aron Ettore Schmitz, better known by the pseudonym [SCOPE.sCharacter('manzoni_writer_scope').GetFullName], was an Italian writer and businessman, author of novels, plays, and short stories. A close friend of Irish novelist and poet James Joyce, Svevo was considered a pioneer of the psychological novel in Italy and is best known for his modernist novel\"La Coscienza di Zeno\" or \"Zeno's Conscience\"\", which became a widely appreciated classic of Italian literature. Svevo was also a model for Leopold Bloom, the protagonist of Joyce's Ulysses."
 manzoni.1205.f: "\"Unlike other sicknesses, life is always fatal. It doesn't tolerate therapies. It would be like stopping the holes that we have in our bodies, believing them wounds. We would die of strangulation the moment we were treated.\"\n- Italo Svevo, La Coscienza di Zeno"
 manzoni.1207.t: "\"Le avventure di Pinocchio. Storia di un burattino\""
 manzoni.1207.d: "Carlo Lorenzini, better known as [SCOPE.sCharacter('manzoni_writer_scope').GetFullName], was a journalist and author who is best remembered for his story about the puppet Pinocchio who came to life. \"The Adventures of Pinocchio. Story of a Puppet\" first appeared in the 'Giornale dei Bambini' from 1880 as a serial story before being published in two volumes in 1883. It is about the mischievous adventures of an animated marionette named Pinocchio and his creator and father figure, a poor woodcarver named Geppetto."
 manzoni.1207.f: "\"A conscience is that still small voice that people won't listen to.\"\n- Carlo Collodi, Le avventure di Pinocchio. Storia di un burattino"
 manzoni.1208.t: "\"Cuore\""
 manzoni.1208.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName] was an Italian writer and journalist who later became known for his children's literature. De Amicis was a patriot and fought in the Italian Wars of Independence, but resigned from his service because he was disillusioned with the army. As an avowed Freemason, De Amicis made an effort in his works to replace the Catholicism deep in the Italian soul with secular virtues and commitment to the state. In later years, socialist ideas had a formative influence on him."
 manzoni.1208.f: "\"This book is particularly dedicated to elementary school children, who are between 9 and 13 years old, and it could be titled: Story of a school year, written by a third grader from a municipal school in Italy. By saying written by a third grader, I don't mean that he actually wrote it, as it is printed. He gradually noted in a notebook, as he knew, what he had seen, heard, thought, in school and outside; and his father, at the end of the year, wrote these pages on those notes, taking care not to alter his thoughts, and to preserve, as much as possible, his son's words. Who then, 4 years later, already being in high school, reread the manuscript and added something of his own, making use of his still fresh memory of the people and things. Now read this book, boys: I hope you will be happy with it and that it will do you some good.\"\n- Edoardo de Amicis, Cuore"
 manzoni.1208.h: "What a great book!"
 manzoni.1306.t: "\"Berlin Alexanderplatz\""
 manzoni.1306.d: "\"Berlin Alexanderplatz\" by [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] tells the story of the worker Franz Biberkopf, who, after his release from prison, is unable to regain his footing in normal life and drifts back into crime. Biberkopf not only fights against inner and outer demons, but also against the metropolis as such, against which he threatens to perish."
 manzoni.1306.f: "\"You shouldn't worry about your fate. I am an opponent of fate. I'm not Greek, I'm Berliner.\"\n- Alfred Döblin, Berlin Alexanderplatz"
 manzoni.1306.g: "A groundbreaking work of modernism."
 manzoni.1403.t: "\"Le Petit Prince\""
 manzoni.1403.d: "In \"Le Petit Prince\" or \"The Little Prince\" [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] lets a small prince from a small planet travel to other planets where he meets various people that are caricatures of different types of adults. On his travels the prince hopes to understand the universe. Will he find an answer to this question?"
 manzoni.1403.f: "\"All grown-ups were once children... but only few of them remember it.\"\n- Antoine de Saint-Exupéry, Le Petit Prince"
 manzoni.1403.g: "Understanding the Universe? That sounds impossible..."
 manzoni.1901.t: "\"Ulysses\""
 manzoni.1901.d: "\"Ulysses\" is a modern novel written by [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]. In it, the author takes the reader on a journey through Dublin on which Leopold Bloom, the protagonist, visits various places. A special feature of the novel is that it shows people's thoughts and associations. He describes them as they are going through the person's head."
 manzoni.1901.f: "\"I was a Flower of the mountain yes when I put the rose in my hair like the Andalusian girls used or shall I wear a red yes and how he kissed me under the Moorish wall and I thought well as well him as another and then I asked him with my eyes to ask again yes and then he asked me would I yes to say yes my mountain flower and first I put my arms around him yes and drew him down to me so he could feel my breasts all perfume yes and his heart was going like mad and yes I said yes I will Yes.\"\n- James Joyce, Ulysses"
 manzoni.1901.g: "This is an interesting new writing style!"
 manzoni_company_basic_publishing_industries: "출판"
 manzoni_company_basic_publishing_industries_dynamic_name_tag_singular: "출판"
 manzoni_company_basic_publishing_industries_dynamic_name_tag_plural: "출판"
 manzoni.500.d: "지역 작가로 활동하는 [SCOPE.sCharacter('manzoni_writer_scope').GetFullName](이)가 우리 정부에게 싫증이 난 모양이다. 우리나라를 더 나은 방향으로 바꾸기 위해 정계에 입문하기로 결정했다고 한다. 여기서 문제는 우리가 허락해 주는가의 여부다."
 manzoni.801.t: "아름다운 삽화"
 manzoni.801.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]의 최신작을 두고 화가 [SCOPE.sCharacter('klimt_painter_scope').GetFullName]에게 일부 삽화를 그려 힘을 보태달라고 설득하였다. 처음 완성된 삽화들은 비교할 수 없을 정도로 아름다웠으며 [SCOPE.sCharacter('manzoni_writer_scope').GetLastName]에게 감동을 안겨다 주었다."
 manzoni.801.f: "\"삽화가 참 멋지군요! 화가 분께서 이야기를 전달해줄 세부 묘사들을 작게 숨겨두지는 않았을지 궁금해지는군요?\""
 manzoni.801.g: "세부 묘사가 엄청나군!"
 manzoni.801.h: "베스트셀러가 되겠어!"
 manzoni.801.h_tt: "이것으로 [GetPlayer.MakeScope.Var('manzoni_writer_var').GetCharacter.GetLastName](이)가 [concept_manzoni_bestseller]를 집필할 확률이 증가하게 됩니다."
 manzoni.802.t: "Theories about Extraterrestrial Life"
 manzoni.802.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName], a Science Fiction Writer and our Astronomer Dr. [SCOPE.sCharacter('verrier_astronomer_scope').GetLastName] have met to discuss the possibility of extraterrestrial life. Together they made assumptions about what this life might look like and where it might be possible. They published their theories as the [SCOPE.sCharacter('verrier_astronomer_scope').GetLastName]-[SCOPE.sCharacter('manzoni_writer_scope').GetLastName]-Hypothesis."
 manzoni.802.f: "\"Obviously these creatures would live in the gaseous oceans of a Gas Giant. I would assume that they couldn't communicate with the outside world, but what if they would find a way which would allow them to colonize new Gas Giants? We might even see a revolution in one of those colonies!\""
 manzoni.802.g: "Maybe we should search for extraterrestials?"
 manzoni.802.h: "They should write a book about their theories!"
 manzoni.802.i: "Fascinating!"
 manzoni.803.t: "The Adventures of [SCOPE.sCharacter('manzoni_adventurer_scope').GetFullName]"
 manzoni.803.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName] has heard of the adventures of Dr. [SCOPE.sCharacter('manzoni_adventurer_scope').GetLastName] and decided to meet with [SCOPE.sCharacter('manzoni_adventurer_scope').GetHerHim] for an interview. They talked for a long time which lead to [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] getting many ideas for [SCOPE.sCharacter('manzoni_writer_scope').GetHerHis] next book."
 manzoni.803.f: "\"Yes, now that you mentioned it I remember there being pirates! In fact they were pirates with piranhas as pets!\""
 manzoni.803.g: "I hope this will prove fruitful!"
 manzoni.804.t: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName] inspired by Balloon Flight"
 manzoni.804.d: "[SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName] took our poet [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] on a Balloon flight. Now returned, [SCOPE.sCharacter('manzoni_writer_scope').GetLastName] seems to be inspired from the journey."
 manzoni.804.f: "\"The clouds looked like a white ocean and to see the tiny humans on the ground. It was incredible!\""
 manzoni.804.g: "Ah, the beauty of flight!"
 manzoni.804.h: "Maybe [SCOPE.sCharacter('manzoni_writer_scope').GetHerHis] poems now get better!"
 manzoni.804.i: "What would I give to be a balloonist myself!"
 manzoni.805.t: "Beauty of the Mountains"
 manzoni.805.d: "Together with well known mountaineer [SCOPE.sCharacter('mountaineer_scope').GetFullName], [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] took a tour on a mountain. The ascent was hard but once on the peak, [SCOPE.sCharacter('manzoni_writer_scope').GetLastName] marveled at the view"
 manzoni.805.f: "\"Surrounded by a sea of fog which is only broken up by a few peaks I stared at the rising sun. A wonderful view."
 manzoni.805.g: "Mountains have inspired many Poets!"
 manzoni.805.h: "I hope the mountain air helps [SCOPE.sCharacter('manzoni_writer_scope').GetHerHim] to write better poems!"
 manzoni.805.i: "Maybe he should become a mountaineer [SCOPE.sCharacter('manzoni_writer_scope').GetHerselfHimself]?"
 manzoni.1003.t: "\"Treasure Island\""
 manzoni.1003.d: "\"Treasure Island\", written by [SCOPE.sCharacter('manzoni_writer_scope').GetFullName], is the journey of Jim Hawkins, a young boy, on his quest to find a treasure. Together with Dr. Livesey and the squire John Trelawney they travel to the island in a ship. But it turns out that most of the crew are pirates who want to kill the rest of the crew to keep the treasure for themselves. Will Jim survive this adventure?"
 manzoni.1003.f: "\"That was Flint's treasure that we had come so far to seek, and that had cost already the lives of seventeen men from the Hispaniola. How many it had cost in the ammassing, what blood and sorrow, what good ships scuttled on the deep, what brave men walking the plank blindfold, what shot of cannon, what shame and lies and cruelty, perhaps no man alive could tell.\"\n- Robert Louis Stevenson, Treasure Island"
 manzoni.1003.g: "Arrr!"
 manzoni.1004.t: "\"Frankenstein; or, The Modern Prometheus\""
 manzoni.1004.d: "\"Frankenstein; or, The Modern Prometheus\", by [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] is a novel in which Dr. Frankenstein tries to resurrect a being made up of body parts. Thanks to lightning he is able to reanimate the body. Once the monster is back to life, Dr. Frankenstein cannot bear the ugliness of the monster and leaves it to its fate. The face of the monster spreads fear and terror among the villagers and so the good-natured creature begins to succumb to loneliness."
 manzoni.1004.f: "\"Even broken in spirit as he is, no one can feel more deeply than he does the beauties of nature. The starry sky, the sea, and every sight afforded by these wonderful regions, seems still to have the power of elevating his soul from earth. Such a man has a double existence: he may suffer misery, and be overwhelmed by disappointments; yet, when he has retired into himself, he will be like a celestial spirit that has a halo around him, within whose circle no grief or folly ventures.\"\n- Mary Shelley, Frankenstein; or, The Modern Prometheus"
 manzoni.1004.g: "Bringing back the death, wouldn't that be nice?"
 manzoni.1005.t: "\"Alice's Adventures in Wonderland\""
 manzoni.1005.d: "In \"Alice's Adventures in Wonderland\" the young Alice goes down a rabbit hole and finds herself in a strange world. The book written by [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] features fabulous creatures and weird rules created by adults. the story ridicules the moralist world of the Victorian age."
 manzoni.1005.f: "\"If I had a world of my own, everything would be nonsense. Nothing would be what it is, because everything would be what it isn't. And contrary wise, what is, it wouldn't be. And what it wouldn't be, it would. You see?\"\n- Lewis Carroll, Alice's Adventures in Wonderland"
 manzoni.1005.g: "What an interesting land!"
 manzoni.1006.t: "\"Winnie-the-Pooh\""
 manzoni.1006.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName] wrote \"Winnie-the-Pooh\" inspired by his son Christopher Robin and his stuffed animals. It is a collection of short stories focused on the bear Winnie-the-Pooh and his friends. In it Pooh experiences various adventures."
 manzoni.1006.f: "\" \"Well,\" said Pooh, \"what I like best,\" and then he had to stop and think. Because although Eating Honey was a very good thing to do, there was a moment just before you began to eat it which was better than when you were, but he didn't know what it was called.\"\n- A.A. Milne, Winnie-the-Pooh"
 manzoni.1006.g: "A Teddy Bear as a friend sounds wonderful!"
 manzoni.1007.t: "\"The Mysterious Affair at Styles\""
 manzoni.1007.d: "\"The Mysterious Affair at Styles\" is a detective novel by [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]. It introduces the character of Hercule Poirot, a Belgian man who moved to England and has to solve the murder of Mrs. Inglethorp with whom he lives currently. Poirot would later appear in a total of 33 of [SCOPE.sCharacter('manzoni_writer_scope').GetLastNameNoFormatting]'s novels."
 manzoni.1007.f: "\"You gave too much rein to your imagination. Imagination is a good servant, and a bad master. The simplest explanation is always the most likely.\"\n- Agatha Christie, The Mysterious Affair at Styles"
 manzoni.1007.g: "I wonder if I will see Hercule Poirot again?"
 manzoni.1008.t: "\"The Jungle Book\""
 manzoni.1008.d: "\"The Jungle Book\" is a childrens book written by [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]. It's main theme is abandonment and fostering reflected by Mowgli, a boy who was left in the wilderness and was raised by wolves. Another important facet of the book is the jungle law that the animals of the jungle follow. The book teaches children to know their place and adhere to rules and the law."
 manzoni.1008.f: "\"One of the beauties of Jungle Law is that punishment settles all scores. There is no nagging afterward.\"\n- Rudyard Kipling, The Jungle Book"
 manzoni.1008.g: "Look for the Bare necessities!"
 manzoni.1009.t: "\"The Tale of Peter Rabbit\""
 manzoni.1009.d: "\"The Tale of Peter Rabbit\" is the story of Peter Rabitt who who gets into the garden of Mr. McGregor and subsequently chased around in it. The story written by [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] is radical and innovative for a children's book with many innovations that were not common in children's literature before."
 manzoni.1009.f: "\"Once upon a time there were four little Rabbits, and their names were--Flopsy, Mopsy, Cottontail, and Peter.\"\n- Beatrix Potter, The Tale of Peter Rabbit"
 manzoni.1009.g: "Going into a forbidden garden, that sounds interesting!"
 manzoni.1010.t: "\"To the Lighthouse\""
 manzoni.1010.d: "\"To the Lighthouse\" is a modernist novel written by [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]. It depicts the goliday of family Ramsey on the Isle of Skye and is written with a focus on thoughts and observations instead of dialoues and action."
 manzoni.1010.f: "\"What is the meaning of life? That was all- a simple question; one that tended to close in on one with years, the great revelation had never come. The great revelation perhaps never did come. Instead, there were little daily miracles, illuminations, matches struck unexpectedly in the dark; here was one.\"\n- Virginia Woolf, To the Lighthouse"
 manzoni.1010.g: "Families..."
 manzoni.1307.t: "\"Buddenbrooks: Verfall einer Familie\""
 manzoni.1307.d: "\"Buddenbrooks: Verfall einer Familie\" or \"Buddenbrooks: The Decline of a Family\" is the first social novel in the German language. In it, [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] describes the decline of a wealthy merchant family over four generations in the Hanseatic city of Lübeck."
 manzoni.1307.f: "\"Often, the outward and visible material signs and symbols of happiness and success only show themselves when the process of decline has already set in. The outer manifestations take time - like the light of that star up there, which may in reality be already quenched, when it looks to us to be shining its brightest.\"\n- Thomas Mann, Buddenbrooks"
 manzoni.1307.g: "I hope may family is not in decline."
 manzoni.1404.t: "\"La Dame aux Camélias\""
 manzoni.1404.d: "\"La Dame aux Camélias\" or \"The Lady of the Camellias\" is a love story by [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]'s own life. In it the undying love between Armand and the courtesan Marguerite is stopped by Armand's father who is worried that his son's relationship might destroy his daughter's chances for mariage. Therefore he convinces her to leave Armand. Will he ever find out about it?"
 manzoni.1404.f: "\"Her delight in the smallest things was like that of a child. There were days when she ran in the garden, like a child of ten, after a butterfly or a dragon-fly. This courtesan who had cost more money in bouquets than would have kept a whole family in comfort, would sometimes sit on the grass for an hour, examining the simple flower whose name she bore.\"\n- Alexandre Dumas Fils, La Dame aux Camélias"
 manzoni.1404.g: "Ah, love that never dies!"
 manzoni.1405.t: "\"Madame Bovary\""
 manzoni.1405.d: "\"Madame Bovary\" is a realistic story written by [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]. In it Emma Bovary is bored by her life in rural France and her husband and starts to engage in romantic adventures with other men. She also spends way more money then she has and gets more and more in debt. Will she be able to repay her debt?"
 manzoni.1405.f: "\"At the bottom of her heart, however, she was waiting for something to happen. Like shipwrecked sailors, she turned despairing eyes upon the solitude of her life, seeking afar off some white sail in the mists of the horizon. She did not know what this chance would be, what wind would bring it her, towards what shore it would drive her, if it would be a shallop or a three-decker, laden with anguish or full of bliss to the portholes. But each morning, as she awoke, she hoped it would come that day; she listened to every sound, sprang up with a start, wondered that it did not come; then at sunset, always more saddened, she longed for the morrow.\"\n- Gustave Flaubert, Madame Bovary"
 manzoni.1405.g: "This book is a little... weird."
 manzoni.1406.t: "\"Boule de Suif\""
 manzoni.1406.d: "\"Boule de Suif\" is a short story by [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]. When the Prussians occupy parts of Normandy a group of French people flee from their home, however they accidentally get into the occupied territories and get detained indefinitely. Then Boule de Suif (Dumpling), a prostitute among the travellers, explains that the German officer will only let them go once she has sex with them. At first the other travelers support Boule de Suif, but after a few days that changes..."
 manzoni.1406.f: "\"The townsfolk in their darkened rooms were dazed as if by some cataclysm, some devastating earthquake, against which all wisdom and all resistance is of no avail. Such a feeling is produced every time the established order of things is upset, when security is destroyed and everything is hitherto protected by the laws of man or nature is suddenly at the mercy of wild unreasoning brutality.\"\n- Guy de Maupassant, Boule de Suif"
 manzoni.1406.g: "To stitch up your own savior like that..."
 manzoni.1407.t: "\"Arsène Lupin, gentleman-cambrioleur\""
 manzoni.1407.d: "In \"Arsène Lupin, gentleman-cambrioleur\" or \"Arsène Lupin, Gentleman Burglar\" is a collection of short stories featuring gentleman burgler Arsène Lupin. The stories created by [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] depict how Lupin first gets arrested, then escapes from prison and in the last story has to face of Sherlock Holmes."
 manzoni.1407.f: "\"What a pity that I am not an honest man!\"\n- Maurice Leblanc, Arsène Lupin, gentleman-cambrioleur"
 manzoni.1407.g: "I wonder who is better, Sherlock Holmes or Arsène Lupin?"
 manzoni.1408.t: "\"À la recherche du temps perdu\""
 manzoni.1408.d: "\"À la recherche du temps perdu\" or \"In Search of Lost Time\" follows the narrator's recollections of childhood and experiences into adulthood in the late 19th-century and early 20th-century high-society France. The author, [SCOPE.sCharacter('manzoni_writer_scope').GetFullName], especially uses involuntary memory as a plot device."
 manzoni.1408.f: "\"The bonds between ourselves and another person exists only in our minds. Memory as it grows fainter loosens them, and notwithstanding the illusion by which we want to be duped and which, out of love, friendship, politeness, deference, duty, we dupe other people, we exist alone. Man is the creature who cannot escape from himself, who knows other people only in himself, and when he asserts the contrary, he is lying.\"\n- Marcel Proust, À la recherche du temps perdu"
 manzoni.1408.g: "This book reminds me of something..."
 manzoni.1409.t: "\"La Petite Fadette\""
 manzoni.1409.d: "In \"La Petite Fadette\" or \"Little Fadette\" two twin brothers from a well known farmer family fall in love with Fadette. At first their relationship defies the patriarchal norms and expectations of the village, but when Fadette inherits a fortune, everything changes. [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] uses her rural origins to describe the village and its inhabitants precisely."
 manzoni.1409.f: "\"God abandons only those who abandon themselves, and whoever has the courage to shut up his sorrow within his own heart is stronger to fight against it than he who complains.\"\n- George Sand, La Petite Fadette"
 manzoni.1409.g: "Clever young people!"
 manzoni.1501.t: "\"Uncle Tom's Cabin\""
 manzoni.1501.d: "\"Uncle Tom's Cabin\" by [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] is a book that depicts the evils and horrors of slavery. It depicts the lives of various slaves, which are characterized by misery and suffering."
 manzoni.1501.f: "\"...the heart has no tears to give,--it drops only blood, bleeding itself away in silence.\"\n- Harriet Beecher Stowe, Uncle Tom's Hut"
 manzoni.1501.g: "That sounds horrible!"
 manzoni.1502.t: "\"Ben-Hur: A Tale of the Christ\""
 manzoni.1502.d: "In \"Ben-Hur: A Tale of the Christ\", [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] depicts the life of Judah Ben Hur, a Jewish prince who is enslaved by the Romans and becomes a charioteer. The story mirrors the life of Jesus."
 manzoni.1502.f: "\"It is more beautiful to trust in God. The beautiful in this world is all from his hand, declaring the perfection of taste; he is the author of all form; he clothes the lily, he colours the rose, he distils the dewdrop, he makes the music of nature; in a word, he organized us for this life, and imposed its conditions; and they are such guaranty to me that, trustful as a little child, I leave to him the organization of my Soul, and every arrangement for the life after death. I know he loves me.\"\n- Lew Wallace, Ben-Hur: A Tale of the Christ"
 manzoni.1502.g: "A true Christian!"
 manzoni.1503.t: "\"Moby-Dick; or, The Whale\""
 manzoni.1503.d: "\"Moby-Dick; or, The Whale\" by [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] shows Captain Ahab's obsession with a white whale from the perspective of the young sailor Ishmael. After the whale bites off Ahab's leg up to the knee, Ahab knows only one purpose in life: revenge."
 manzoni.1503.f: "\"Whenever I find myself growing grim about the mouth; whenever it is a damp, drizzly November in my soul; whenever I find myself involuntarily pausing before coffin warehouses, and bringing up the rear of every funeral I meet; and especially whenever my hypos get such an upper hand of me, that it requires a strong moral principle to prevent me from deliberately stepping into the street, and methodically knocking people's hats off - then, I account it high time to get to sea as soon as I can.\"\n- Herman Melville, Moby-Dick; or, The Whale"
 manzoni.1503.g: "What is my Whale?"
 manzoni.2100.t: "\"Tang Thương Ngẫu Lục\""
 manzoni.2100.d: "\"Tang Thương Ngẫu Lục - Arbitrary Records of Sorrow\" is a collection of stories by Pham Dinh Ho and Nguyen An, recording religious and societal events of late 18th and early 19th century Viet Nam. A total of 89 stories, separated into two books, Upper and Lower, the collection includes tales of great peoples, scenic travels, hístorical relics, and even local legends. The Records provide a unique view into the life in Viet Nam during the tumultuous era of the late Later Le and early Nguyen dynasties."
 manzoni.2100.f: "From Ly, Tran, Le, Trinh to this date, after hundreds of years, there are stories neither documented by official historians nor remembered by local legends; thus both men decided to collect them in the realm of sorrowful changes. Should they both consider these tales sorrowful and thus elected to forget, then they would sooner or later be forgotten. Fortunately, by penning these stories, they can serve as the raft delivering us from the delirious shore, as the light illuminating the dark, named Tang Thương Ngẫu Lục - Arbitrary Records of Sorrow, the meaning may thus be perceived."
 manzoni.2100.g: "Tales of a darker time, we must strive to be better."
 manzoni.2200.t: "A Duel for Honor"
 manzoni.2200.d: "After [SCOPE.sCharacter('manzoni_writer_scope').GetLastName] had sent a highly insulting letter to Georges d'Anthès, his wife's alleged admirer, the latter had challenged him to a duel. Now the time has come for the two to face each other."
 manzoni.2200.f: "\"The rules of the duel stipulate that the two opponents line up at an agreed distance. Their backs must be facing their opponent. At the signal, the two duelists turn around and walk towards each other. They decide when to shoot. Whoever shoots first must then stand still in the same place.\nDo you both agree with these rules?\""
 manzoni.2200.g: "I hope he survives!"
 manzoni.2200.h: "I hope this troublemaker dies!"
 manzoni.2201.t: "\"Prestupleniye i nakazaniye\""
 manzoni.2201.d: "\"Prestupleniye i nakazaniye\" or \"Crime and Punishment\" by [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] follows the mental anguish and moral dilemmas of Rodion Raskolnikov, an impoverished ex-student in Saint Petersburg who plans to kill an unscrupulous pawnbroker, an old woman who stores money and valuable objects in her flat."
 manzoni.2201.f: "\"Pain and suffering are always inevitable for a large intelligence and a deep heart. The really great men must, I think, have great sadness on earth.\"\n- Fjodor Dostoevsky, Prestupleniye i nakazaniye"
 manzoni.2201.g: "Good thing I don't owe anything!"
 manzoni.2202.t: "《전쟁과 평화》"
 manzoni.2202.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]의 《전쟁과 평화》는 소작농에서 귀족에 이르기까지 다양한 배경을 지닌 여러 인물들을 그리고 있다. 나폴레옹 전쟁기를 바탕으로 삼은 이 소설은 전쟁으로 세 주인공의 삶이 어떻게 바뀌었는가를 다루었다."
 manzoni.2202.f: "\"옳고 그름을 판단하는 것은 인간에게 주어진 일이 아니다. 인간은 늘 실수했고 앞으로도 실수할 것이며, 특히 옳고 그름에 대한 생각에 있어서는 더할 나위가 없다.\"\n- 레오 톨스토이의 《전쟁과 평화》에서"
 manzoni.2202.g: "참 명작이군! 내용이 좀 길긴 하지만..."
 manzoni.2300.t: "《당세서생기질》"
 manzoni.2300.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]의 《당세서생기질》(当世書生気質)은 일본 최초의 근대 문학소설로 평가받는 작품이다. 그가 쓴 비평서 《소설신수》(小説神髄)와 함께 일본에서 근대 소설과 희곡이 널리 받아들여지는 데 보탬이 되고 있다."
 manzoni.2300.f: ""
 manzoni.2300.g: "이제 일본에서도 근대 소설을!"
 manzoni.2400.t: "\"Memorias Posthumas de Braz Cubas\""
 manzoni.2400.d: "In \"Memorias Posthumas de Braz Cubas\" or \"The Posthumous Memoirs of Brás Cubas\" [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] allows the protagonist Brás Cubas to report on his life after his death. This makes it possible for Cubas to criticize Brazilian society. It is the first of Machado's realistic books and some characters and elements are taken up again in later books."
 manzoni.2400.f: "\"To the worm who first gnawed on the cold flesh of my corpse, I dedicate with fond remembrance these Posthumous Memoirs.\"\n- Machado de Assis, Memorias Posthumas de Braz Cubas"
 manzoni.2400.g: "To be criticized by a dead man!"
 manzoni.2401.t: "\"Iracema\""
 manzoni.2401.d: "\"Iracema\" is a story by [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] that tries to show how the first Brazilian came into existence. It is the story of the indigenous Iracema and the Portuguese colonist Martim who later have a son together called Moacir. The title of the book is an anagram to America, a title befitting of the theme of colonization."
 manzoni.2401.f: "\"Green wild seas of my birth land, where the jandaia sings in the fronds of the carnauba.\"\n- José de Alencar, Iracema"
 manzoni.2401.g: "A story to create a nation..."
 manzoni.2402.t: "\"O Cortiço\""
 manzoni.2402.d: "\"O Cortiço\" or \"The Slum\" is naturalistic novel by [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]. In it [SCOPE.sCharacter('manzoni_writer_scope').GetLastName] depicts the life of various Portuguese and other immigrants in a slum. Those people adapt and change in their new home."
 manzoni.2402.f: "\"And in that soggy, steaming earth, in that hot, muddy humidity, a world began to worm, to sprout, to grow, a living thing, a generation, which seemed to spring up spontaneously, right there, from that mud, and multiply like maggots in manure.\"\n- Aluísio Azevedo, O Cortiço"
 manzoni.2402.g: "How can we allow such slums to exist?"
 manzoni.2500.t: "\"Kuángrén Rìjì\""
 manzoni.2500.d: "\"Kuángrén Rìjì\" or \"Diary of a Madman\" is a modern Chinese story written mostly in vernacular Chinese by [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]. In it the brother of the narrator goes more and more mad. He suspects people to be cannibals and to try to force him to commit suicide."
 manzoni.2500.f: "\"I knew that in this laughter were courage and integrity. Both the old man and my brother turned pale, awed by my courage and integrity.\"\n- Xun Lu, Kuángrén Rìjì"
 manzoni.2500.g: "At least there are no cannibals around me!"
 manzoni_beautiful_illustrations_modfier: "아름다운 삽화"
 manzoni_alien_theories_modfier: "외계 생명체 이론"
 manzoni_adventure_idea_modifier: "모험 소재"
 manzoni.332.d: "세계적으로 유명한 작가가 우리나라에 경의를 표했다. 현재 [SCOPE.sCharacter('manzoni_writer_scope').GetSheHe|U]는 순회 낭독회에 나서고 있다."
 manzoni.332.f: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName](은)는 명성 [SCOPE.sCharacter('manzoni_writer_scope').MakeScope.GetVariable('manzoni_writer_experience').GetValue|V0]을 지닌 [SCOPE.sCharacter('manzoni_writer_scope').GetHomeCountry.GetName]의 작가입니다. 이 작가의 수많은 작품 가운데 베스트셀러로 평가받는 것은 총 [SCOPE.sCharacter('manzoni_writer_scope').MakeScope.GetVariable('manzoni_num_bestsellers_var').GetValue|V0]편이며, 작가의 작품이 출간된 국가는 [SCOPE.sCharacter('manzoni_writer_scope').MakeScope.GetVariable('manzoni_num_book_licenses_var').GetValue|V0]개국에 달합니다."
 manzoni_add_x_literary_tradition_minus_x_tt: "[THIS.GetCountry.GetName]에서 @manzoni_literary_tradition![concept_manzoni_literary_tradition] [SCOPE.GetValue('literary_tradition_amount')|0+]을 상실합니다."
 manzoni_add_x_literary_tradition_0_tt: "[THIS.GetCountry.GetName]에서 @manzoni_literary_tradition![concept_manzoni_literary_tradition]을 획득하지 않습니다."
 manzoni_add_x_literary_tradition_plus_x_tt: "[THIS.GetCountry.GetName]에서 @manzoni_literary_tradition![concept_manzoni_literary_tradition] [SCOPE.GetValue('literary_tradition_amount')|0+]을 획득합니다."
 country_manzoni_decorative_literary_tradition_add: "연간 @manzoni_literary_tradition![concept_manzoni_literary_tradition]"
 country_manzoni_decorative_literary_tradition_add_desc: "우리나라에서 매달 누적되는 [concept_manzoni_literary_tradition]의 양입니다."
 manzoni_writer_bestseller_poem_title_loc: "[ROOT.GetCharacter.GetCustom('manzoni_writer_poem_bestseller_title_type')]"
 manzoni_writer_poem_bestseller_title_1_loc: "가을 바람의 속삭임"
 manzoni_writer_poem_bestseller_title_2_loc: "달빛의 부드러운 시선 아래"
 manzoni_writer_poem_bestseller_title_3_loc: "새벽녘의 고독한 길"
 manzoni_writer_poem_bestseller_title_4_loc: "잊혀진 꿈의 고요한 메아리"
 manzoni_writer_poem_bestseller_title_5_loc: "시냇물의 비밀스런 노래로"
 manzoni_writer_poem_bestseller_title_6_loc: "황혼에 그림자가 춤출 때"
 manzoni_writer_poem_bestseller_title_7_loc: "저 멀리 별에 얽힌 마음"
 manzoni_writer_poem_bestseller_title_8_loc: "겨울 숨결 속에서 피어난 장미"
 manzoni_writer_poem_bestseller_title_9_loc: "시간의 심연에서 울려 퍼진 메아리"
 manzoni_writer_poem_bestseller_title_10_loc: "희미해진 기억의 정원에서"
 manzoni_writer_poem_bestseller_title_11_loc: "늘어진 버드나무 그늘 아래"
 manzoni_writer_poem_bestseller_title_12_loc: "아침 햇살의 살가운 부름"
 manzoni_writer_poem_bestseller_title_13_loc: "바다가 저녁 하늘을 만날 때"
 manzoni_writer_poem_bestseller_title_14_loc: "방황하는 영혼을 위한 노래"
 manzoni_writer_poem_bestseller_title_15_loc: "들판의 꽃이 속삭이는 곳"
 manzoni.2600.t: "\"De Leeuw van Vlaenderen, of de Slag der Gulden Sporen\""
 manzoni.2600.d: "\"De Leeuw van Vlaenderen, of de Slag der Gulden Sporen\" or \"The Lion of Flanders, or the Battle of the Golden Spurs\" by [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] is a historical novel focusing on the Battle of the Golden Spurs in which a Flemish Militia defeated a French invading force. The book is considered to be a Flemish national epic."
 manzoni.2600.f: "\"You Fleming who has read this book, reflect, through the glorious deeds that it recounts, what Flanders once was, what it is now, and even more what it shall become if you forget the sacred examples of your forefathers! \"\n- Hendrik Conscience, De Leeuw van Vlaenderen, of de Slag der Gulden Sporen"
 manzoni.2600.g: "For Flanders!"
 manzoni.1601.t: "\"Röda rummet\""
 manzoni.1601.d: "\"Röda rummet\" or \"The Red Room\" is a critique of Swedish society written by [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]. In it, the idealistic civil servant Arvid Falk becomes a writer and comes into conflict with his conservative brother Carl Nikolaus Falk. Stockholm society is portrayed in a satirical manner."
 manzoni.1601.f: "\"...as soon as a work of art is of practical use, betrays a purpose or a tendency its beauty vanishes.\"\n- August Strindberg, Röda rummet"
 manzoni.1601.g: "Society needs to change!"
 manzoni.1602.t: "\"Det går an\""
 manzoni.1602.d: "\"Det går an\" or \"It will do\" is an attack by [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] on lifelong marriage as an institution and the inability of women to become financially independent. In the novel, sergeant Albert falls in love with Sara Videbeck, a glazier's daughter, during a steamboat trip between Stockholm and Lidköping. Sara is interested but outlines an egalitarian marriage without a formal wedding ceremony and without shared property. The novel ends with her asking, \"Will this all do, Albert?\" (\"Går allt detta an, Albert?\"), and his answer, \"It will do\" (\"Det går an\" )."
 manzoni.1602.f: "\"...he who wishes to cut glass, my lord, must have a diamond!\"\n- Carl Jonas Love Almqvist, Det går an"
 manzoni.1602.g: "This will do!"
 manzoni.1603.t: "\"Pengar\""
 manzoni.1603.d: "\"Pengar\" or \"Money\" is a critique by [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] of the contemporary marriage laws. The book follows Selma from the age of sixteen to twenty-three. During this time, she transforms from a lively young girl with artistic dreams into a hardened woman with freedom as her sole goal. At sixteen, Selma marries the much older Pål Kristersson, a wealthy man who earned his fortune through hard work, largely because she is convinced that he is a good match financially. However, she never feels any love for him and seems to slowly forget what love even is. Her husband is described as 'a shaved pig'. Over the years of their marriage, she begins to recognize all the flaws in their relationship, but also the broader societal issues regarding the position of women, their lack of legal autonomy, and their rights."
 manzoni.1603.f: "\"...her self-deception conjured a distorted image, one that closely resembled happiness.\"\n- Victoria Benedictsson, Pengar"
 manzoni.1603.g: "Freedom for Selma!"
 manzoni.1604.t: "\"Hertha\""
 manzoni.1604.d: "\"Hertha\" is a novel by [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] advocating for women's legal autonomy and access to education. The novel's protagonist, the headstrong young woman Hertha, lives in a household dominated by a tyrannical father. They reside in a patriarchal small town called Kungsköping—a miniature version of Sweden. One night, a fire breaks out, threatening to destroy the entire town. The fire becomes an event that reveals the true faces of the inhabitants and exposes the narrow-mindedness of Swedish society. During the rescue efforts, however, for the first time, the town’s women and men, rich and poor, work side by side. The old has burned down, and something new can be built. Hertha emerges as a driving force, and in the town’s new reality after the fire, women are promised a central role."
 manzoni.1604.f: "\"...I would certainly like to marry this evening, if only I could be a widow by tomorrow!\"\n- Fredrika Bremer, Hertha"
 manzoni.1604.g: "Burn it down!"
 manzoni.1605.t: "\"Stänk och flikar\""
 manzoni.1605.d: "\"Stänk och flikar\" is a collection of poems by [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]. The erotic love poem \"En morgondröm\" or \"A Morning Dream\" featured in the collection is layered with meaning. At its core, it serves as a critique of the era's—particularly the church's—views on morality, nudity, and sexuality."
 manzoni.1605.f: "\"...she lay naked, unveiled in her beauty’s needs, and with parted knees and trembling core, she met the longing of her lover once more.\"\n- Gustaf Fröding, Stänk och flikar"
 manzoni.1605.g: "Censor it!"
 manzoni.1606.t: "\"På nyårsdagen\""
 manzoni.1606.d: "\"På nyårsdagen\" or \"On New Years Day\" is a short, expressive poem by [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]. It has been described as a battle hymn for die-hard individualists."
 manzoni.1606.f: "\"Alone in a fragile vessel, the sailor dares venture onto the vast sea...\"\n- Erik Gustaf Geijer, På nyårsdagen"
 manzoni.1606.g: "Forward! - such is the command of his fate"
 manzoni.1607.t: "\"Godnatt, jord\""
 manzoni.1607.d: "\"Godnatt, jord\" or \"Good Night, Earth\" is a collective novel by [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] portraying the lives of crofters on an estate in Södermanland – daily toil and impoverished surroundings, suppressed longing, and uncomplicated joy. From the bustling collective, a number of individual life stories emerge with remarkable intimacy. Surrounding them all is the scent of the Södermanland landscape, lush with oaks and vibrant with poppies."
 manzoni.1607.f: "\"It is said that plantain leaves are mostly found on pathways, where they are trampled on. The same can be said of the crofters.\"\n- Ivar-Lo Johansson, Godnatt, jord"
 manzoni.1607.g: "Good Night!"
 manzoni.1608.t: "\"Bödeln\""
 manzoni.1608.d: "\"Bödeln\" or \"The Executioner\" is a novel by [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]. The story unfolds across two timelines: the Middle Ages and the present. The common thread between the two parts is the setting, a tavern, and the executioner who  is present in both sections. The book concludes with the executioner delivering a speech to the guests, expressing his grim view of humanity."
 manzoni.1608.f: "\"Violence is the ultimate expression of humanity's physical as well as spiritual forces.\"\n- Pär Lagerkvist, Bödeln"
 manzoni.1608.g: "The horror!"
 manzoni.1609.t: "\"Nässlorna blomma\""
 manzoni.1609.d: "\"Nässlorna blomma\" or \"Flowering Nettle\" is a partly autobiographical novel by [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]. The book tells the story of the orphan child Martin, who is the author's alter ego and is written from the perspective of the child. Martin's father dies and his mother leaves her children for a new life in California. Everything he holds dear disappear at a very early age and he grows up working in several farms and being sent away or going himself away, as he faces the harsh working life of the farmhand. Martin is described as a selfish, stupid, childish, selfpitying, obsequious, coward and false. Thus, there is no idealisation of the child."
 manzoni.1609.f: "\"He thought too much, but had too little understanding.\"\n- Harry Martinson, Nässlorna blomma"
 manzoni.1609.g: "Poor child"
 manzoni.1610.t: "\"Mor gifter sig\""
 manzoni.1610.d: "\"Mor gifter sig\" or \"My Mother Gets Married\" is a partly autobiographical novel by [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]. The book tells the story of seven-year-old Mia who understands the world all too well, and yet she understands nothing. She can't understand why her mother wants to marry a handsome but hopeless man who drinks, fights, and cheats? Her mother toils for their daily bread and ensures that life in drafty rented rooms becomes bearable. Life in that family becomes a series of painful and humiliating departures where Mia is slowly molded into the class society. She dreams of a quiet home with blue flowers on a chalked stove wall but finds that the world doesn't have room for everyone's dreams—and barely even a place to live for many."
 manzoni.1610.f: "\"When grief is overwhelming and seeks to destroy a person, the dead rise from their graves to lend a hand.\"\n- Moa Martinson, Mor gifter sig"
 manzoni.1610.g: "A joyful marriage indeed"
 manzoni.1611.t: "\"Raskens\""
 manzoni.1611.d: "\"Raskens\" is a novel by [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]. Set in the latter half of the 19th century in southeastern Småland, the story follows Gustav, a poor farmhand who joins the allotment system as a soldier. Assigned a soldier’s croft and the name Rask, he marries Ida, a maid also living in poverty. The novel portrays their struggles and perseverance on the croft while offering a vivid historical account of life in Sweden."
 manzoni.1611.f: "\"Come on, then! I can fight you for eight days without even taking off my vest.\"\n- Vilhelm Moberg, Raskens"
 manzoni.1611.g: "Blasted scratchy cat!"
 manzoni.1612.t: "\"Doktor Glas\""
 manzoni.1612.d: "\"Doktor Glas\" is an epistolary novel by [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] telling the story of a physician in 19th-century Sweden who deals with moral and love issues. The novel is about Dr. Tyko Gabriel Glas who is a respected physician in Stockholm. The story is told in the form of a diary and follows Doctor Glas as he struggles with depression. The antagonist is Reverend Gregorius, a morally corrupt clergyman. Gregorius' beautiful young wife confides in Dr. Glas that her sex life is making her miserable and asks for his help. Glas falls in love with her and agrees to help even though she already has another lover. He attempts to intervene, but the Reverend refuses to give up his \"marital rights\" – she must have sex with him whether she likes it or not. So, in order to make his love happy, he begins to plot her husband's murder."
 manzoni.1612.f: "\"One wants to be loved, failing that admired, failing that feared, failing that hated and despised.\"\n- Hjalmar Söderberg, Doktor Glas"
 manzoni.1612.g: "Bring me the potassium cyanide!"
 manzoni.1613.t: "\"Singoalla\""
 manzoni.1613.d: "\"Singoalla\" is a novel by [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]. Set in medieval Sweden, it is a romantic and historical tale that blends elements of adventure, tragedy, and folklore. The story centers around Singoalla, a beautiful and enigmatic gypsy girl, and Jöran, a nobleman who falls in love with her. The novel unfolds in a time of political intrigue, where Singoalla and Jöran’s love becomes entwined with the conflict between social classes, the forces of fate, and personal desires."
 manzoni.1613.f: "\"Go! Away! Go to your stranger!\"\n- Viktor Rydberg, Singoalla"
 manzoni.1613.g: "So romantic!"
 manzoni.1614.t: "\"Nya dikter\""
 manzoni.1614.d: "\"Nya dikter\" or \"New Poems\" is a collection of poems by [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] embracing themes of Swedish history, nature, and national identity. This collection is often seen as the poet's embrace of Romantic nationalism, where he focuses on the beauty and strength of the Swedish people and their heritage. There is a distinct focus on honoring the past and celebrating the country's legacy, while also contemplating the future."
 manzoni.1614.f: "\"It is more beautiful to listen to a string that broke, than to never draw a bow.\"\n- Verner von Heidenstam, Nya dikter"
 manzoni.1614.g: "What a proud history!"
 manzoni.1504.t: "\"The Adventures of Tom Sawyer\""
 manzoni.1504.d: "Along the shores of the Mississippi River a mischievous boy named Tom Sawyer and his best friend, Huck Finn, embark on exciting escapades, including pranks, treasure hunts, and even witnessing a murder. Throughout his adventures, Tom learns important life lessons about friendship, morality, and responsibility."
 manzoni.1504.f: "\"Work consists of whatever a body is obliged to do, and play consists of whatever a body is not obliged to do.\"\n- Samuel \"Mark Twain\" Clemens, The Adventures of Tom Sawyer"
 manzoni.1504.g: "A little rascal!"
