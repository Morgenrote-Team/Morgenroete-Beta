 manzoni_je_freedom_of_the_press: "언론의 자유"
 manzoni_je_freedom_of_the_press_reason: "진실을 널리 알리려는 억누를 수 없는 의지에 이끌리거나, 단순히 자신이 속한 정당이 여권이 아니라는 이유로 출판사들은 국가에 여러 차례 도전해 왔다. 이러한 시대에 언론의 자유는 그 어느 때보다 중요하다.\n\n'언론의 자유'는 출판사의 [concept_executive]이 속한 이해 집단이 #R 비여권 세력#!에 놓여 있을 때 발동하며, 그 인물은 야당의 활동에 참여하게 됩니다."
 manzoni_has_publisher_ig_in_opposition_tt: "출판사의 [concept_executive]이 속한 이해 집단이 #R 야권#!에 속함"
