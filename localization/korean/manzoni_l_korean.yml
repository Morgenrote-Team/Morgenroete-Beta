 manzoni.3.t_literary: "창작 문학"
 manzoni.3.t_devotional: "종교 문학"
 manzoni.3.t_romance: "로맨스"
 manzoni.3.d: "[GetPlayer.GetName]의 정치, 사회, 문화적 변동에 따라 [Concept('concept_manzoni_popular_taste','$concept_manzoni_popular_tastes_audience$')]에 근본적인 변화가 일어나, 문학 [concept_manzoni_genre]에 대한 선호도 변화하게 되었다."
 manzoni.3.f_juvenile: "17세기~18세기 영미권의 청교도들은 개신교 윤리가 깊이 스며든 아동 서적을 출판했다. 최초의 아동 서적 가운데 1740년대 존 뉴베리가 출간한 것은 순수한 교육적 메시지와 오락적 가치를 동시에 지니고 있었으며, 그에 몇년 앞서 토머스 보어먼은 《거대 역사》(Gigantick Histories)를 집필한 바 있었다. 그럼에도 도덕적 가치관은 19세기 말까지 수많은 아동 서적에 영향을 끼쳤지만, 18세기 중반부터 순수한 종교적 메시지는 로크와 루소가 전파한 합리적 도덕주의로 조금씩 대체되어 갔다. 19세기 중반부터는 아동 문학이라면 순수한 판타지와 모험 이야기라는 인식이 더욱 확산되어갔다."
 manzoni.3.f_crime: "범죄소설의 기원은 훨씬 앞섰지만 하나의 문학 장르로 정립된 것은 19세기에 이르러서였다. 보통은 범죄 사건과 그것을 수사하는 경찰, 탐정, 개인을 중심으로 다뤄졌다. 범죄자의 심리 상태를 묘사하고, 사건 현장을 자세히 묘사하며, 수사관의 양심의 가책을 섬세히 표현하는 등 다양한 문학적 기법이 활용되었다. 포도르 도프토옙스키의 《죄와 벌》은 바로 이런 범죄소설의 한 예시로 볼 수 있다. 스릴러나 마스터리 장르로의 전환도 자연스러운 일이었다."
 manzoni.3.f_adventure: "모험 문학은 문학 그 자체만큼이나 오래되었다. 모험 문학은 고대 그리스 로마 시대, 심지어는 고대 중동 일대로 그 유래를 거슬러 올라갈 수 있다. 중세 아서왕 전설과 기사도 소설은 현대 모험 소설의 선구자로 평가된다. 19세기 이후에는 다양한 모험 문학이 등장하였는데 대표적인 작가로 알렉상드르 뒤마, 로버트 루이스 스티븐슨, 카를 마이, 쥘 베른이 꼽힌다."
 manzoni.3.f_science: "공상 과학이라는 용어가 만들어지기 전에도 미래의 기술 발전을 향한 시각은 아무리 늦어도 중세 시대부터 찾아볼 수 있다. 공상 과학이란 말은 1851년 영국의 시인이자 에세이 작가였던 윌리엄 윌슨이 처음 사용하였다. 19세기는 과학에 대한 믿음과, 과학과 기술에 대한 두려움이 동시에 나타나던 시대였다. 이러한 믿음과 두려움은 자신의 힘을 두려워하는 신화 속 거인이라는 시대적으로 새롭고도 양분된 삶의 태도로 이어졌다. 이것이 바로 올더스 헉슬리나 조지 오웰 같은 디스토피아 소설이 등장한 이유이기도 하다. 이러한 양면성은 공상 과학의 특징으로 꼽힌다."
 manzoni.3.f_social: "현대 사회 비판의 기원은 늦어도 계몽 시대로 거슬러 올라간다. 창작문학은 상당한 사회적 영향을 지닐 수 있다. 이를테면 1852년 소설 《톰 아저씨의 오두막》은 미국 노예제 폐지 운동에 지대한 영향을 끼쳤다. 조지 오웰과 찰스 디킨스도 《동물 농장》과 《두 도시 이야기》를 통해 사회와 인간 본성에 대한 환멸을 표현하였다."
 manzoni.3.f_literary: "창작 소설은 문학과 동의어로 쓰일 때가 많지만, 예술적 가치가 높은 것으로 여겨지는 작품들을 지칭하는 것으로 한정된다. 창작 소설에는 고전 작품이 포함되는데 어느 분야에서건 모범적이거나 주목할 만한 작품으로 인정받았기 때문이다. 창작 소설은 일반적으로 장르 소설보다 예술적으로 우수한 것으로 여겨지지만, 두 장르가 서로 배타적인 것은 아니다. "
 manzoni.3.f_devotional: "종교 문학은 원래 종교적 동기를 가진 대중적인 글을 가리키는 말이다. 신학적인 담론을 추구하지 않고 교조적인 의도를 지니고 있지도 않기 때문에 신학서와는 다르다. 그 대신 근대로의 변화 과정에서 내면에 집중하는 것이 경건함을 높인다는 특징을 지니게 되었고, 도덕적인 삶의 지침으로서 정신을 고양시키려는 의도를 지니고 있었다."
 manzoni.3.f_romance: "대중적인 로맨스 소설은 주로 여성 독자를 대상으로 하며, 구조가 단순하고 이해하기 쉬운 기본 양식을 따르는 광범위한 일상 문학 장르를 지칭한다. 그러나 모든 로맨스 소설이 일상 문학으로 분류될 수 있는 것은 아니다. 자식의 죽음, 학대, 죽음에 이르는 병이나 그와 같은 어려운 문제는 쉽게 일상적으로 다룰 수 있는 것은 아니기 때문이다. "
 manzoni.3.g: "취향과 유행은 흘러가기 마련이다."
 manzoni.10.t: "신규 출판사"
 manzoni.10.d: "새로운 출판사 [SCOPE.sCharacter('manzoni_publisher_scope').GetLastNameNoFormatting](이)가 오늘 [SCOPE.sState('manzoni_publisher_state').GetName]에 개업하였다. 인쇄기는 오늘 자정부터 쉴 새 없이 가동되고 있다. [GetPlayer.GetName] 사회의 생활이 한층 더 풍요로워지게 되었다."
 manzoni.10.f: "[SCOPE.sState('manzoni_publisher_state').GetName]에 새로 들어선 출판사가 현재 대중의 관심을 끌고 있다. [SCOPE.sCharacter('manzoni_publisher_scope').GetFullName](은)는 오늘 특별히 발행된 전단지를 통해 본 회사는 앞으로 다양한 신규 출판물들을 선보일 예정이라고 발표하였다. 이 소식은 순식간에 퍼져나가 건물 앞에 사람들이 장사진을 이뤘다. 새로운 출판사가 어떤 분야를 전문으로 할지 벌써부터 궁금증이 커지고 있다."
 manzoni.10.g: "분명 수준 높은 문학 작품을 선보일 것이다."
 manzoni.10.h: "아무래도 과학 출판사일듯 싶군?"
 manzoni.10.i: "출판사가 사람들을 즐겁게 해 주었으면 한다네."
 manzoni.10.j: "예술 출판사, 그거라면 훌륭할 거요!"
 manzoni.11.t: "대중 출판사"
 manzoni.11.d: "[SCOPE.sState('manzoni_publisher_state').GetName] 지역은 [SCOPE.sCharacter('manzoni_publisher_scope').GetLastNameNoFormatting]의 존재로 [GetPlayer.GetName] 전역을 통틀어 가장 흥미롭고 재미있는 출판사를 보유한 곳이 되었다. 사측에서는 추후 사업 확장에 나설 수 있기를 희망하고 있으며 사장을 맡은 [SCOPE.sCharacter('manzoni_publisher_scope').GetFullName](은)는 이미 출판업계를 대표하는 거물로 떠올랐다."
 manzoni.11.f: "상업 출판사는 질보다 양에 주력할 지는 몰라도 19세기의 선구적인 주체로 꼽혔다. 문학은 더 이상 소수의 부유층만 누릴 수 있는 특권이 아니라, 경제적 여유가 없는 사람들도 점점 더 널리 접할 수 있는 상품이 되었다. 출판 유통은 대중을 만족시킬 뿐만 아니라 크나큰 성공을 거두었다."
 manzoni.11.g: "이 출판사는 우리 도서 산업의 초석이군."
 manzoni.12.t: "문학 출판사"
 manzoni.12.d: "오늘 [SCOPE.sCharacter('manzoni_writer_scope').GetFullName](은)는 [SCOPE.sCharacter('manzoni_publisher_scope').GetLastNameNoFormatting] 출판사와 출판 계약을 체결했다. [SCOPE.sState('manzoni_publisher_state').GetName]에 본사를 둔 이 회사는 문학 분야에서 가장 주목받는 출판사로 거듭날 것으로 전망된다."
 manzoni.12.f: "일류 문학 사업은 모든 출판 업계을 통틀어 최고 성과에 해당된다. [concept_manzoni_national_writer]가 위대한 작가라는 명예를 이룩하면 그 자체로 가치 있는 일이 된다. 출판사는 작가의 작품을 보존하고 전파하는 역할을 맡으며, 작가의 사후에도 계속해서 독자와 소통하는 주요 접점으로 거듭날 것이다."
 manzoni.12.g: "이 출판사는 우리 문학의 수준을 높이는 초석이군."
 manzoni.13.t: "과학 출판사"
 manzoni.13.d: "[SCOPE.sCharacter('manzoni_scientist_scope').GetFullName]의 획기적인 발견은 오랫동안 학계에 반향을 일으켰다. 그의 논문과 저서는 [SCOPE.sCharacter('manzoni_publisher_scope').GetLastNameNoFormatting]에서 정기적으로 출간하고 있다. 출판사 측은 이제 사업 확대에 나서 [GetPlayer.GetName]에서 가장 앞서가는 학술 출판사로 거듭날 것이라고 밝혔다."
 manzoni.13.f: "과학 출판사는 출판업계와 과학 분야 간의 시너지 효과, 이를테면 과학자가 논문을 집필할 때에 모습을 드러낼 수 있다. 과학 연구에 중점을 둔 출판사는 새로운 발견과 기술에 관한 최신 지식을 신뢰도 있게 전달함으로써 학생들에게 큰 지원을 제공할 것이다."
 manzoni.13.g: "이 출판사는 우리 학계의 초석이군."
 manzoni.14.t: "예술 출판사"
 manzoni.14.d: "[SCOPE.sCharacter('manzoni_publisher_scope').GetLastNameNoFormatting] 출판사가 국내에서 최고로 존경받는 예술가 [SCOPE.sCharacter('manzoni_artist_scope').GetFullName]의 작품을 추후 출간할 예정이라고 밝혔다. 이는 전국을 대표하는 예술 출판사의 첫걸음이 될 가능성이 높다."
 manzoni.14.f: "위대한 예술가의 걸작이 그토록 중요해져서 출판까지 이루어진다면 예술계에는 놀라운 발전의 시작점이 될 수 있다. 악보집이나 삽화집은 교양 있는 일반인에게 아름다운 예술 작품으로 다가올 뿐만 아니라 위대한 예술가의 발자취를 따르려는 후대 예술가들에게도 영감과 가르침을 줄 수 있다."
 manzoni.14.g: "이 출판사는 우리 문화 생활의 초석이군."
 artists.52.h: "작가의 향후 활동을 관심 갖고 지켜보겠소!"
 manzoni.101.t: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]의 [SCOPE.sCharacter('manzoni_writer_scope').GetCustom('manzoni_writer_bestseller_title_work_type')]"
 manzoni.101.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetCustom('manzoni_writer_local_or_national_short_text_type')](이)가 베스트셀러 [SCOPE.sCharacter('manzoni_writer_scope').GetCustom('manzoni_writer_work_type')](을)를 써냈다. 《[SCOPE.sCharacter('manzoni_writer_scope').GetCustom('manzoni_writer_bestseller_title_work_type')]》라는 제목의 이 이야기는 [SCOPE.sCharacter('manzoni_writer_scope').GetCustom('manzoni_writer_work_genre_type')] [SCOPE.sCharacter('manzoni_writer_scope').GetCustom('manzoni_writer_work_type')]에 속한다."
 manzoni.101.f: "[SCOPE.sCharacter('manzoni_writer_scope').GetCustom('manzoni_writer_bestseller_flavor_work_type')]"
 manzoni.101.g: "대단하군!"
 manzoni.201.g: "이 책 좋은데!"
 manzoni.102.t: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]의 세계적 명성"
 manzoni.102.d: "우리 작가 [SCOPE.sCharacter('manzoni_writer_scope').GetFullName](이)가 국내 뿐만 아니라 해외에서도 크게 존경받는 작가로 평가받고 있다. 이 작가의 작품이 이제 세계적인 문학으로 거듭나게 된 것이다!"
 manzoni.102.f: "전세계 유수의 출판사들이 우리 작가의 작품을 자사의 출간 계획에 포함시키고 있다. 이 과정에서 작가는 우리 국경을 넘어 훨씬 먼 곳의 독자에게도 존재를 알릴 수 있게 되었다. 작가의 판권은 이제 상당히 수요가 많은 상품으로 거듭났다."
 manzoni.102.g: "작가가 너무 자만하지 말았으면 좋겠군."
 manzoni_universal_writer: "세계적인 작가"
 manzoni_universal_writer_desc: "이 작가는 세계 문학의 한 작가로 여겨집니다."
 manzoni_writer_local_or_national_short_text_national_writer_loc: "우리 국민 작가 [ROOT.GetCharacter.GetFullName]"
 manzoni_writer_local_or_national_short_text_local_writer_loc: "[GetPlayer.GetAdjective] 지역 작가 [ROOT.GetCharacter.GetFullName]"
 manzoni.301.t: "[SCOPE.sCulture('print_addict_culture').GetName]의 서적광"
 manzoni.301.d: "[GetPlayer.GetName]의 번성한 출판 산업과 남부끄럽지 않은 문학 엘리트를 보유하고 있다. 교육 수준이 높은 이 나라의 시민들은 점점 더 문화생활에 많은 관심을 보이고 있다. 일각에서는 벌써부터 글에 정말로 중독됐다는 이야기가 나올 정도이며, 인쇄물과 글에 대한 갈망이 끝이 없는 모양이다. [SCOPE.sCulture('print_addict_culture').GetName] 시민들은 이러한 새로운 흐름에 특히 취약하다."
 manzoni.301.f: "서적광(bibliomania, 장서광)이란 책 수집에 지나치게 몰두하여 중독이나 강박장애의 특징을 보이는 증상을 말한다. 단순히 개인서재를 모으는 정도의 해를 끼치지 않는 애착심인 서적애(bibliophilia)와는 달리, 서적광은 강박적인 수집행위, 수집으로 인한 재정 파탄, 서적광을 충족시키기 위한 범죄행위 등을 동반한다. 독일에서 범죄를 저지른 최초의 서적광은 작센의 사제였던 요한 게오르크 티니우스였다. 티니우스는 교회 예산을 횡령하고 마약을 복용하여 여러 차례 강도살인 미수를 저질렀는데, 티니우스의 남은 서재를 경매에 부칠 당시 그 권수만 16,650권에 달했던 것으로 전해진다. 서적광의 행보를 걸었던 사례로는 리녜롤 백작이 있다. 1848년부터 사회생활을 완전히 그만두고 본인의 서재를 키우고 유지하는 데에만 몰두하면서 파리에 특별히 마련된 아파트까지 두어 유지했다고 한다. 리녜롤 백작은 본인의 지식을 남들과 공유하지 않았고, 심지어 어떤 서적은 소유하고 있다는 사실조차 부정했다. 리녜롤 백작이 소장한 서적의 규모와 가치는 사후에 경매를 통해 비로소 드러났다."
 manzoni.301.g: "허나 읽기란 것이 얼마나 위험한지는 모두가 아는 사실 아닌가!"
 manzoni.302.t: "정점을 벗어난 서적광?"
 manzoni.302.d: "출판업게에 위기가 닥치고 있다. 국민들 다수가 독서에 대한 욕구를 잃고 있는데, 서적의 질이 떨어지거나 여가 활동이 바뀐 것이 그 원인으로 분석된다."
 manzoni.302.f: "책이 없는 세상도 있다. 보탬이 되는 것들이 있기 때문이다. 영화나 운동, 알코올 중독과 도박은 비슷한 동기를 부여하여 책벌레들을 사회 생활로 이끌어 줄 수 있다."
 manzoni.302.g: "여하간 책은 재미없단 말이지."
 manzoni.302.h: "독서를 향한 사랑을 일깨우는 운동을 벌이자!"
 manzoni.303.t: "[SCOPE.sCharacter('manzoni_bookmadame_scope').GetLastNameNoFormatting] 부인의 북클럽"
 manzoni.303.d: "[SCOPE.sState('manzoni_book_state').GetName]에서 영향력도 있고 교양도 갖춘 여인이 차린 북클럽이 문학 애호가들의 중심지로 변모하고 있다. 책에 대한 갈망을 가진 사람들이 이곳으로 모여들고 있다."
 manzoni.303.f: "1600년대부터 여성들이 성경 독서 모임을 결성해 왔다고는 하나, 세속적인 독서 모임이 등장하게 된 것은 1700년대 말 미국과 유럽에서였다. 독서 모임은 특정 인종이나 계급에 국한되지 않았으며, 1827년에는 미국 매사추세츠주 린에서 흑인 여성들을 위한 최초의 독서 모임이 결성되기도 했다. 1800년대에는 여성의 독서 모임이 더욱 확대되었으며 그 중 일부는 노예제 폐지와 같은 사회 문제에 목소리를 높이기도 했는데, 이는 세기말 클럽 운동의 전조였다. 1900년대까지 독서 클럽은 지적활동의 장이자 급진적인 정치 도구로서의 역할을 계속해 나갔다."
 manzoni.303.g: "근사한 솔선수범일세."
 manzoni.304.t: "서적 업계 진흥"
 manzoni.304.d: "[SCOPE.sState('manzoni_book_state').GetName]의 신흥 출판사 '[SCOPE.sCharacter('manzoni_publisher_scope').GetLastNameNoFormatting]&[SCOPE.sCharacter('manzoni_publisher_scope').GetLastNameNoFormatting]'(이)가 출판 시장에서 중요한 지분을 지닌 업체로 성장하였다. 보아하니 소유주 [SCOPE.sCharacter('manzoni_publisher_scope').GetFullName](이)가 시대의 핵심을 정확히 꿰뚫은 모양이다."
 manzoni.304.f: "옛날에는 '[SCOPE.sCharacter('manzoni_publisher_scope').GetLastNameNoFormatting]&[SCOPE.sCharacter('manzoni_publisher_scope').GetLastNameNoFormatting]'(이)라는 사명이 소형 인쇄물로 이름을 알리며 업계 내에서만 알려져 있었다. 그러나 이제는 소책자가 대중적인 인기를 얻으면서 사업 부문을 확장하고 대중의 취향에 더욱 집중하려는 모습이다. 일각에서는 기존 제품의 질이 벌써부터 떨어지고 있다고 지적하는 시각도 있으나, 이는 그저 현 시대의 동향에 따른 것으로 볼 수도 있다."
 manzoni.304.g: "서적을 더 많이 생산하시오!"
 manzoni.304.h: "고품질 서적을 생산하시오."
 manzoni.311.t: "꼭두각시 출판사"
 manzoni.311.d: "[SCOPE.sState('manzoni_book_state').GetName]의 유서깊은 출판사가 파산 위기에 내몰렸다. 이에 경쟁 출판사 측에서 많은 사람들의 일자리를 지킬 제안을 해 왔다. 그러나 출판인이 야당 세력, 정확히는 [SCOPE.sCharacter('publisher_ig_leader').GetInterestGroup.GetName]과 긴밀한 관계를 맺고 있는 상황이다."
 manzoni.311.f: "지난주에 한 대형 출판사가 파산 위기에 처해 대규모 해고를 단행해야 한다고 발표하면서 언론에 파장을 일으켰다. 다행히도 곧바로 다른 출판사가 인수 의사를 밝히며 감원은 없을 것이라고 약속했다. 하지만 여기에는 함정이 있다. 이 파격적인 제안의 배후에는 해당 출판사의 지분을 상당 부분 보유한 [SCOPE.sCharacter('publisher_ig_leader').GetInterestGroup.GetName](이)가 있는 것으로 드러났다. 따라서 기업 합병은 특정 정당의 주도하에 진행될 가능성이 높다. 일각에서는 이번 합병이 해당 지역을 넘어 언론 시장 전반에 상당한 영향을 미칠 수 있다고 지적하고 있다. 심지어 [SCOPE.sCharacter('publisher_ig_leader').GetFullName](이)가 배후에 있는 것으로 의심하는 목소리도 나오고 있다."
 manzoni.311.g: "회사를 살리겠다는데 우리가 앞길을 막아봤자 무엇 하겠소?"
 manzoni.311.h: "이런 정치적 영향력은 허락할 수 없다!"
 manzoni.312.t: "야권 출판사"
 manzoni.312.d: "[SCOPE.sState('manzoni_book_state').GetName]에서 출판사가 두각을 드러내고 있다. 가까운 미래에 사업을 확대해서 정부 정책의 대항마로서의 역할을 중시하고, 야당 세력과 긴밀한 관계를 유지하고 있다. 여권에서는 이런 문제 있는 출판사에 행정상의 장애물을 두면 될 것으로 보고 있다."
 manzoni.312.f: "\"타인의 의견과 발언할 자유는 소중한 자산입니다. 그렇다면 우리 스스로의 말은 더욱 소중히 여겨야 하지 않겠습니까, 선생님?\""
 manzoni.312.g: "몇 가지 행정 명령으로 사업을 어렵게 만들어 봅시다."
 manzoni.312.h: "그런 더러운 수작은 필요 없소."
 manzoni.321.t: "판권"
 manzoni.321.d: "오늘 [SCOPE.sCharacter('manzoni_publisher_scope').GetLastNameNoFormatting] 출판사에서 [SCOPE.sCountry('manzoni_country_scope').GetName]의 [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] 작가와 단독 계약을 체결하였다. 이 작가의 작품은 대중들로부터 열렬한 인기를 얻고 있다."
 manzoni.321.f: "출판사는 대중의 취향을 외면할 수 없다. 시류를 타고 성공을 거둔 해외의 작가들은 우리나라에 자기 작품을 출간할 기회를 얻게 된다."
 manzoni.321.g: "국내 작가들의 작품을 읽지 않는 이유는 무엇인가?"
 manzoni.322.t: "해외의 저속 문학"
 manzoni.322.d: "국내의 한 출판사에서 해외 작가인 [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]의 작품을 오랜 시간 동안 출판해 왔던 모양이다. 평론가들은 이러한 저속 문학에 큰 문제가 있으며 국내 도서 시장의 품질에 악영향을 미친다고 입을 모은다. 그러나 이런 저속한 작품이 불티나게 팔리고 있는 것도 사실이다."
 manzoni.322.f: "\"글로 적혀만 있다고 정말로 출판할 가치가 있소? 누가 플루트로 음표를 적어놨다고 그 곡을 연주하진 않을 것 아니오? 아이들이 그린 그림을 미술관이 아니라 냉장고에 붙여두는 이유는 또 뭐겠소? 문학적 결과물에는 쓰레기도 있기 마련이오!\""
 manzoni.322.g: "이런 외국산 불량품은 금지하시오!"
 manzoni.322.h: "국민들이 보고 싶다는데 그렇게 나쁠 수가 있겠는가."
 manzoni.323.t: "해적판"
 manzoni.323.d: "[SCOPE.sCountry('manzoni_country_scope').GetName] 상무부 대표가 오늘 우리나라에 항의 서한을 보냈다. [SCOPE.sState('manzoni_book_state').GetName]의 출판사가 자국의 국민 작가 [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]의 대표작들을 판권 없이 출간하여 이득을 보고 있는 것 같다는 내용이었다. 이에 우리 정부 차원에서 해적판의 발행을 중단시켜달라고 요청했다."
 manzoni.323.f: "안타깝게도 18세기에는 경쟁 출판사에서 저자의 동의 없이 작품을 복제하여 저자와 출판사의 수입을 가로채는 일이 흔했다. 19세기 이후 저자와 출판사의 권리를 보호하는 법률이 제정되기 시작했지만, 이러한 개선은 대개 국내 차원에서만 가능하였다. 해외의 출판사들은 여전히 저자의 동의 없이 복제본이나 번역본을 출간하는 경우가 많았다. 심지어 쥘 베른과 같은 세계적으로 유명한 작가의 작품들도 예외는 아니어서, 별다른 허가 없이 영어권 국가에 유통되거나 내용이 크게 바뀌는 경우도 있었다."
 manzoni.323.g: "계약이 성사될 때까지 인쇄기를 멈추도록."
 manzoni.323.h: "문학은 모두의 것이오."
 manzoni.331.t: "[SCOPE.sCharacter('manzoni_writer_scope').GetLastName]의 해외 순회 낭독회"
 manzoni.331.d: "[GetPlayer.GetNameNoFlag] 최고의 작가 [SCOPE.sCharacter('manzoni_writer_scope').GetFullName](이)가 해외 출판사와의 몇 차례 사전 논의 끝에, 해외의 독자들과 만나 본인의 작품을 낭독하는 행사를 가지며 감사를 표하기로 결정하였다. 첫번째로 방문할 국가는 [SCOPE.sCountry('manzoni_writer_destination_scope').GetName]이다."
 manzoni.331.f: "작가들은 본인의 경력 중 한 차례에 한해 순회 낭독회에 나설 수 있습니다. 순회 낭독회의 목적지는 독자의 취향이 작가의 장르와 알맞는 국가들로 정해집니다. 새로운 곳을 방문할 때마다 작가의 명성과 문학 전통, 상호 관계를 향상시킬 수 있습니다. 작가는 순회 기간 동안 최대 5개국까지 방문이 가능합니다. 또한 작가의 장르에 관심을 보이는 국가가 더 이상 없다면 순회는 마무리됩니다."
 manzoni.331.g: "행운을 빌겠네!"
 manzoni.332.t: "[SCOPE.sCharacter('manzoni_writer_scope').GetLastName]의 [GetPlayer.GetNameNoFlag] 도착"
 manzoni.332.g: "현지 출판사와의 회동을 주선해 주시오."
 manzoni.332.h: "문학 살롱에서 공개 낭독회를 열어 봅시다."
 manzoni.332.i: "국왕께서 작가의 비공개 낭독회를 열기를 바라시더군."
 manzoni.332.j: "따뜻한 환영으로 맞이해 주시오."
 manzoni.333.t: "문학 거장들의 만남"
 manzoni.333.d: "세계적으로 유명한 [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] 작가와 우리 나라의 국민 작가 [SCOPE.sCharacter('manzoni_writer_2_scope').GetFullName] 님이 서적 출판 기념회에서 마주하게 되었다. 두 사람의 교류는 큰 결실을 남겼다."
 manzoni.333.f: "\"작가님은 참으로 위대하십니다.\"\n\"감사합니다. 작가님도 참 위대하십니다.\"\n\"아니오, 작가님이 더 위대하지요.\"\n\"아니죠, 작가님이야말로.\""
 manzoni.333.g: "영감을 주는군!"
 manzoni.334.t: "또다른 목적지?"
 manzoni.334.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName](이)가 해외 체류를 마무리하였다. 그대로 조국으로 돌아올지, 아니면 새로운 목적지를 선택할지에 관한 질문이 제기되었다."
 manzoni.334.f: "작가들은 본인의 경력 중 한 차례에 한해 순회 낭독회에 나설 수 있습니다. 순회 낭독회의 목적지는 독자의 취향이 작가의 장르와 알맞는 국가들로 정해집니다. 새로운 곳을 방문할 때마다 작가의 명성과 문학 전통, 상호 관계를 향상시킬 수 있습니다. 작가는 순회 기간 동안 최대 5개국까지 방문이 가능합니다. 또한 작가의 장르에 관심을 보이는 국가가 더 이상 없다면 순회는 마무리됩니다."
 manzoni.334.g: "[SCOPE.sCountry('manzoni_writer_destination_scope').GetName](이)가 적당하겠다."
 manzoni.334.h: "[SCOPE.sCharacter('manzoni_writer_scope').GetLastName](은)는 복귀해야 한다."
 manzoni.341.t: "문학 주기"
 manzoni.341.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName](이)가 [ROOT.GetCountry.GetCapital.GetCityHubName]에서 조국을 대표하는 작가들의 모임을 결성했다. 이 행사는 대중의 커다란 관심을 불러모았다. 이번 정기 모임에 대한 기대가 대단히 높은 상황이다."
 manzoni.341.f: "문학 모임은 언제나 영향력이 큰 문화 기관이었다. 프랑스의 파르나스파 시인이나 독일의 게오르게크라이스처럼 제법 형식적인 형태를 띈 모임도 존재하였다. 비공식적인 문학 모임의 대표적인 사례로는 더 잉클링스(The Inklings)가 있는데, 1930년대 초부터 1949년 말까지 약 20년 간 옥스퍼드대에서 J. R. R. 톨킨과 C. S. 루이스가 주도했던 문학 토론 모임이었다. 잉클링스 회원들은 문학 애호가들로, 소설에서 서사의 가치를 높이 평가하고 판타지 소설 창작을 장려하였다. 톨킨과 루이스 외에 가장 유명한 인물로는 찰스 윌리엄스와 런던 출신임에도 참여한 오웬 바필드가 있었다."
 manzoni.341.g: "이것으로 우리나라의 문학 수준을 상당 수준 끌어올릴 것이다."
 manzoni.341.h: "신세대 예술가들의 귀감이 될 것이다."
 manzoni.341.i: "이런 모임은 우리 사회에 막강한 영향력을 끼치겠군."
 manzoni.400.t: "우리 정부에 비판적인 [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]"
 manzoni.400.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]의 눈에는 [GetPlayer.GetName]의 정치 상황이 불만스러운 모양이다. 우리가 정치 개편에 나서지 않는다면 [concept_manzoni_national_writer]로서의 지위를 내려놓을 수도 있다고 한다."
 manzoni.400.f: "\"어떻게 이럴 수가 있나! 불공평하지 않소!\" - [SCOPE.sCharacter('manzoni_writer_scope').GetFullNameNoFormatting]"
 manzoni.400.g: "이제는 변화해야 할 때일지도 모르겠군..."
 manzoni.400_tt: "[concept_manzoni_national_writer]의 [concept_interest_group]에서 갖고 있는 [concept_approval]이 #n -2#! 이하라면 사임을 고려할 것입니다. 찬성도를 높일 수 있는 기한은 1년입니다."
 manzoni.401.t: "국민 작가에서 물러난 [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]"
 manzoni.401.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]에게 [GetPlayer.GetName]의 현 상황은 견딜 수 없었던 모양이다. 이에 우리나라의 [concept_manzoni_national_writer] 지위에서 물러나 다시는 조국을 대표하는 얼굴이 되지 않겠다는 결단을 내렸다."
 manzoni.401.f: "\"더 이상은 못 참겠군! 당신네들은 멍청하고 무능하기 이를 데 없소! 우릴 신경쓰지도 않고! 도와주지도 않아! 이건 절대로 용납할 수 없소!\" - [SCOPE.sCharacter('manzoni_writer_scope').GetFullNameNoFormatting]"
 manzoni.401.g: "안돼! 그래도!"
 manzoni.500.t: "현 정부에 질려버린 [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]"
 manzoni.500.f: "\"변화가 필요해! 사람들이 고통받고 있소! 나는 오로지 세상을 바꾸는 데에만 집필에 주력할 것이오! 독재자 타도!\" - [SCOPE.sCharacter('manzoni_writer_scope').GetFullNameNoFormatting]"
 manzoni.500.g: "그러라지."
 manzoni.500.h: "갖은 수단을 동원해서라도 막아야 한다."
 manzoni.500.i: "안 될걸세."
 manzoni.500.j: "농담도 잘하는구만!"
 manzoni.510.t: "글쓰기에 집중하는 [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]"
 manzoni.510.d: "[SCOPE.gsInterestGroup('manzoni_writer_ig_scope').GetName]의 정치적 상황이 제법 안정됨에 따라 [SCOPE.sCharacter('manzoni_writer_scope').GetFullName](은)는 정계에서 물러날 좋은 시기라며, 평소 푹 빠져 있던 글쓰기에 집중하겠다는 결정을 내렸다."
 manzoni.510.f: "\"드디어 영감이 다시 떠올랐어! 좋은 일에 뛰어들었던 지난 세월을 뒤로 하고 다시 글쓰기로 돌아갈 수 있게 된 것이오! 아, 참으로 멋진 이야기가 되겠지. 아무래도 정치에 관한 이야기를 써야 하나 보오!\" - [SCOPE.sCharacter('manzoni_writer_scope').GetFullNameNoFormatting]"
 manzoni.510.g: "멋진 이야기를 써 주었으면 좋겠군!"
 manzoni.510.h: "정계에 남아 주었으면 좋겠군."
 set_character_as_local_writer_scope_effect_tt: "[SCOPE.sCharacter('wannabe_writer_scope').GetFullName](이)가 [concept_manzoni_local_writer]가 됩니다"
 manzoni.590.t: "지역 작가 등장"
 manzoni.590.d: "[concept_manzoni_local_writer] [SCOPE.sCharacter('manzoni_new_writer_scope').GetFullName]의 이름이 조금씩 알려지기 시작했다. 앞으로의 장래가 기대된다!"
 manzoni.590.f: "\"아, 하루빨리 [GetPlayer.GetName]에서 제일 유명한 작가가 되었으면! 최고의 작가로 거듭나 보겠소!\" - [SCOPE.sCharacter('manzoni_new_writer_scope').GetFullNameNoFormatting]"
 manzoni.590.g: "작가는 많을수록 좋지!"
 manzoni.600.t: "국립 도서관 개관"
 manzoni.600.d: "[GetPlayer.GetNameNoFlag] 국립 도서관의 개관으로, 지식 교류와 국민 교육의 확대를 위한 중요한 발걸음을 내딛었다. 신설 도서관의 초대 관장으로는 [SCOPE.sCharacter('manzoni_librarian_scope').GetFullName](이)가 임명되었다."
 manzoni.600.f: "유럽에서 국립 도서관은 18세기 말에 등장하여 19세기에 전성기를 맞이하였습니다. 당시 국립 도서관의 주된 목표는 당시 국가적 과제로 여겨지던, 폭넓고 평등한 시민사회에 교육의 기회를 제공하는 것이었습니다. 동시대 롤모델로 여겨지던 영국과 프랑스의 국립 도서관은 자국의 문화적 패권과 세계적 사명을 강조하였고, 미국과 러시아도 이를 모방하였습니다. 학문의 확대와 분화에 따라 국립 도서관은 사립 대학 도서관의 역할을 대체하기도 하였습니다."
 manzoni.600.g: "샴페인, 샴페인을 터뜨립시다!"
 manzoni.601.t: "도서관 폐관"
 manzoni.601.d: "정부는 수도에 자리한 국립 도서관이 완벽한 모습을 갖출 수 있도록 노력을 다하고 있다. 이에 따라 [SCOPE.sState('manzoni_library_state').GetName]의 도서관을 폐관하고 그곳에 소장된 서적들을 이전한다는 방침이다."
 manzoni.601.f: "어떤 이유에서건 수도 밖에 [concept_manzoni_library]이 존재한다면 소장 도서의 절반이 자동으로 수도로 이전됩니다. 수도 밖의 도서관은 폐관됩니다."
 manzoni.601.g: "이 훌륭한 서적 소장품이 우리 국립 도서관을 풍요롭게 만들 것이다."
 manzoni.601.h: "그 소장 서적들을 새로운 국립 도서관의 기반으로 삼겠다."
 manzoni.610.t: "[SCOPE.sCountry('manzoni_library_country').GetName]의 국립 도서관"
 manzoni.610.d: "적국의 수도를 점령하면서 [SCOPE.sCountry('manzoni_library_country').GetName] 국립 도서관도 우리 손에 넘어왔다. 혼란 속에서 희귀 서적을 챙기려던 병사들은 이미 체포되었다. 이 책들을 압수하고 우리나라의 국립 도서관으로 옮기려는 바람이 커지고 있다."
 manzoni.610.f: "굴리엘모 리브리는 이탈리아의 백작이자 수학자로, 귀중한 옛 필사본에 애착한 나머지 절도 행위를 벌인 것으로 악명을 떨쳤습니다. 리브리의 자체 연구는 갈릴레이, 페르마, 데카르트, 라이프니츠 등 저명한 학자들의 필사본과 서적 1,800여점을 기반으로 하였는데 본인은 이를 평생에 걸쳐 수집했다고 주장했습니다. 그러나 실제로는 이 가운데 일부가 피렌체의 메디치 라우렌치아나 도서관에서 도난되었던 것으로 밝혀졌습니다. 1841년 리브리는 당시 프랑스 경찰청장를 역임하던 프랑수아 기조와 친분을 쌓고 그의 영향력에 힘입어 프랑스 도서관 수석 감독관으로 임명되었습니다. 수석 감독관은 희귀 서적과 필사본의 목록을 작성하는 업무를 맡았었는데, 이를 통해 리브리 백작은 수집욕을 마음껏 발휘하여 자료 강탈에 나설 수 있었던 것입니다. 리브리 백작은 본인의 특권을 남용하고, (기침을 하거나 날씨와 관계없이 큰 망토를 두르는 등) 건강이 나쁜 척을 하며 프랑스 전국의 도서관 기록 보관소에 홀로 들어가 시간을 보냈습니다. 그곳에서 백작은 자료들을 '대출'한 뒤 단 한번도 반납하지 않았습니다. 그 결과 백작이 훔친 서적은 약 3만 점에 달했습니다."
 manzoni.610.g: "서적들을 압수하라."
 manzoni.610.h: "예술과 문화에 죄를 지을 순 없다!"
 manzoni.611.t: "국립 도서관의 약탈!"
 manzoni.611.d: "적군이 우리 국립 도서관을 약탈했다! 명성 높은 이곳이 예전의 영광을 되찾으려면 수년의 시간이 소요될지도 모른다!"
 manzoni.611.f: "굴리엘모 리브리는 이탈리아의 백작이자 수학자로, 귀중한 옛 필사본에 애착한 나머지 절도 행위를 벌인 것으로 악명을 떨쳤습니다. 리브리의 자체 연구는 갈릴레이, 페르마, 데카르트, 라이프니츠 등 저명한 학자들의 필사본과 서적 1,800여점을 기반으로 하였는데 본인은 이를 평생에 걸쳐 수집했다고 주장했습니다. 그러나 실제로는 이 가운데 일부가 피렌체의 메디치 라우렌치아나 도서관에서 도난되었던 것으로 밝혀졌습니다. 1841년 리브리는 당시 프랑스 경찰청장를 역임하던 프랑수아 기조와 친분을 쌓고 그의 영향력에 힘입어 프랑스 도서관 수석 감독관으로 임명되었습니다. 수석 감독관은 희귀 서적과 필사본의 목록을 작성하는 업무를 맡았었는데, 이를 통해 리브리 백작은 수집욕을 마음껏 발휘하여 자료 강탈에 나설 수 있었던 것입니다. 리브리 백작은 본인의 특권을 남용하고, (기침을 하거나 날씨와 관계없이 큰 망토를 두르는 등) 건강이 나쁜 척을 하며 프랑스 전국의 도서관 기록 보관소에 홀로 들어가 시간을 보냈습니다. 그곳에서 백작은 자료들을 '대출'한 뒤 단 한번도 반납하지 않았습니다. 그 결과 백작이 훔친 서적은 약 3만 점에 달했습니다."
 manzoni.611.g: "약탈을 했다고?!"
