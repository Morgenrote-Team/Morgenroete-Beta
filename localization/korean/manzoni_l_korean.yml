 manzoni.711.t: "[SCOPE.gsInterestGroup('target_ig_1').GetName] 찬양"
 manzoni.711.d: "[SCOPE.sCharacter('target_character_1').GetFullName]의 출판 제국에 소속된 어느 일간지가 [SCOPE.gsInterestGroup('target_ig_1').GetName]의 통치력에 큰 찬사를 보냈다. 여기서 [SCOPE.sCharacter('target_character_1').GetLastName] 본인이 해당 이익 집단에 속해 있다는 사실은 우연이 아닐 것이다."
 manzoni.711.f: "\"언론은 여자와도 같아서 거짓말에 탁월하고, 믿기 전까지 놓아주지 않는다. 대중은 어리석은 남편처럼 매번 굴복하게 된다.\" - 오노레 드 발자크"
 manzoni.711.g: "이 기사를 최대한 널리 배포해야 한다!"
 manzoni.711.h: "이런 역겨운 아첨꾼들을 다 봤나."
 manzoni.712.t: "위태로운 결합"
 manzoni.712.d: "[SCOPE.sCharacter('target_character_1').GetFullName]의 최근 결혼 소식이 이미 주목을 끈 바 있다. 이제는 그 배우자가 [SCOPE.sCharacter('target_character_2').GetLastNameNoFormatting] 가문의 일원이며, 그 가문의 수장인 [SCOPE.sCharacter('target_character_2').GetFullName](은)는 [SCOPE.gsInterestGroup('target_ig_1').GetName] 세력을 이끌고 있다는 사실이 밝혀졌다. 이것으로 신문의 독립성, 정부와의 유착 관계, 그리고 [SCOPE.sCharacter('target_character_1').GetLastName]의 출판 제국이 지닌 진정한 권력에 대한 의문이 제기되고 있다."
 manzoni.712.f: "재무장관의 아내가 [SCOPE.sCharacter('target_character_1').GetLastName] 출판사 소속 신문사에서 일한다는 소식이 알려지자 일부 공직자들은 본인의 인생에서 무엇이 잘못되었는지, 그리고 어째서 더 나은 배우자를 찾지 못했는지 고민에 빠졌다."
 manzoni.712.g: "사랑의 종착지란 바로 그런 것!"
 manzoni.712.h: "이런 전개는 비판받아 마땅하다."
 manzoni.713.t: "정부의 선전물"
 manzoni.713.d: "어느 지역에서 [SCOPE.sCharacter('target_character_1').GetFullName] 측 언론이 일상생활에서 독보적인 영향력을 행사하여 현재 벌어지는 사건에 대한 모든 정보를 이 매체를 통해서만 제공되고 있다고 한다. 사실상 [SCOPE.sCharacter('target_character_1').GetLastName](이)가 어느 쪽이 진실인지를 좌우할 수 있는 상황이다. 다행히도 이 언론은 친정부 성향이다."
 manzoni.713.f: "\"내가 곧 언론이다.\" - [SCOPE.sCharacter('target_character_1').GetFullNameNoFormatting]"
 manzoni.713.g: "언론이 정부를 대변한다면 무엇 하러 검열을 하는가?"
 manzoni.714.t: "은밀한 보조금"
 manzoni.714.d: "[SCOPE.sCharacter('target_character_1').GetFullName]의 신문사들은 수년 동안 국고에서 빼낸 보조금을 은밀히 받아왔다는 것이 드러났다. 정부 측에서 우호적인 언론을 매수하고 있는 것이다. 그 중간에는 여당의 당원으로 활동 중인 [SCOPE.sCharacter('target_character_1').GetLastName], [SCOPE.sCharacter('target_character_2').GetFullName](이)가 있다. 이번 사건은 언론을 향한 신뢰를 무너뜨리고 있다."
 manzoni.714.f: "\"극장 로비에서 기자들을 마주칠 때면 소름이 끼친다. 언론은 지옥과도 같다. 끝없는 불의와 배신, 거짓의 구덩이인 것이다. 단테처럼 베르길리우스의 성스러운 월계관을 쓰지 않고서야 스스로를 더럽히지 않고 그곳을 건너는 것은 있을 수 없다.\" - 오노레 드 발자크"
 manzoni.714.g: "협력이야 잘 진행되고 있소만, 어디 문제라도?"
 manzoni.714.h: "이런 국가와 언론 간의 유착은 끝을 내야 한다!"
 manzoni.721.t: "표적이 되어버린 [SCOPE.gsInterestGroup('target_ig_2').GetName]"
 manzoni.721.d: "[SCOPE.sCharacter('target_character_1').GetFullName](은)는 본인의 신문사에 현재 내각 장관직을 맡고 있는 [SCOPE.gsInterestGroup('target_ig_2').GetName] 세력을 표적으로 삼으라는 지시를 내렸다. 이것으로 시작된 본격적인 마녀사냥에, 자극적인 표제를 낼 때마다 신문 판매량은 날로 늘어가고 있다."
 manzoni.721.f: "\"우편번호를 조작하는 자는 누구인가?\n철도변에서 음모를 꾸미는 자는 누구인가?\n부채로 가린 입에 '진실'을 담고,\n왕권과 교회, 인간에 의문을 제기하는 자는 누구인가?\n그건 바로 [SCOPE.gsInterestGroup('target_ig_2').GetName]! 젠체 하는 역병들!\n같잖은 항의를 그칠 줄 모른다!\""
 manzoni.721.g: "거짓이다! 전부 거짓말이야!"
 manzoni.721.h: "이런 기사를 퍼뜨려서는 안 된다."
 manzoni.721.i: "신문에서 그렇게 말한다는데 우리가 어찌 하겠나."
 manzoni.722.t: "야당의 목소리"
 manzoni.722.d: "[SCOPE.sCharacter('target_character_1').GetFullName](이)가 자신의 언론 권력을 동원하여 유력지를 통해 [SCOPE.gsInterestGroup('target_ig_1').GetName] 세력을 띄워주고 있는 상황이다. 그와 연계된 매체망은 벌써부터 논조를 통일하고 선전 활동을 벌이고 있다."
 manzoni.722.f: "\"언론은 성직자의 손에 있었던 적은 없었고, 처음에는 당파의 무기가 되었다가, 그 다음에는 여느 상업적 투기처럼 양심에 거리낌 없이 행해지는 투기 행위가 되었다. 불론데의 말처럼, 모든 신문은 자기 입맛에 맞는 것을 보러 오는 사람들을 위한 가게나 마찬가지다. 만약 꼽추를 위한 신문이 있다면 그 신문은 아침저녁으로 지면을 통해 기형의 아름다움과 유용성, 필요성을 힘주어 말할 것이다.\" - 오노레 드 발자크"
 manzoni.722.g: "이런 질 떨어지는 선전에 누가 신경이나 쓰겠나?"
 manzoni.722.h: "정부에 우호적인 신문에 예산을 지원하여 반박 기사를 게제토록 한다."
 manzoni.723.t: "[SCOPE.sCharacter('target_character_2').GetLastName] 문제"
 manzoni.723.d: "[SCOPE.sCharacter('target_character_1').GetFullName](이)가 주요 논설과 탐사 보도를 통해 전국적인 갈등을 불러일으켰다. 그 내용인즉슨 [SCOPE.sCharacter('target_character_2').GetFullName](이)가 자금을 횡령한 것으로 드러났다는 소식이다. 국민들은 세금 낭비에 분노하고 있고, 정부에는 위기가 닥쳤으며, [SCOPE.gsInterestGroup('target_ig_2').GetName] 세력은 극심한 공황에 빠진 반면 [SCOPE.sCharacter('target_character_1').GetLastName]의 출판사는 전례 없는 매출을 올리고 있다."
 manzoni.723.f: "아무래도 그 자를 얕봤던 모양이다. [SCOPE.sCharacter('target_character_1').GetLastName](은)는 수년 동안 단순한 출판업자로만 여겨져 왔으나 [SCOPE.gsInterestGroup('target_ig_1').GetName]의 영향력을 확대하고 본인이 질색하는 정부 여당을 정권에서 끌어내리려는 야망을 품었다. 이에 수 개월 동안 최고의 기자들을 투입하여 정부 기관과 공무원들을 대상으로 전례 없는 횡령 스캔들을 폭로하였다. 과거의 비판 여론조차도 이번 보도가 앞으로 수년 동안 언론계에 보탬이 될 훌륭한 저널리즘 탐구 사례라는 것을 인정해 마지않게 되었다. 그러나 정부와 여당 관계자들에게 이번 공격은 헤아릴 수 없는 결과를 초래할 것이다. 직책 사임, 내각 개편, 심지어는 조기 총선 가능성까지 거론되고 있는 형편이다."
 manzoni.723.g: "이건 말 그대로 야당의 공작일세!"
 manzoni.723.h: "진작에 사임했어야 했던 것이 아닌가."
 manzoni.723.i: "내각 전체를 다시 꾸립시다."
 manzoni.723.j: "국민들의 표심에 결론을 맡기겠다!"
 manzoni.731.t: "온갖 수단으로 발행 부수 올리기"
 manzoni.731.d: "[SCOPE.sCharacter('target_character_1').GetFullName](은)는 자사 잡지의 발행부수가 줄어드는 이유가 단지 타블로이드판답지 않기 때문이라 믿어 의심치 않고 있다."
 manzoni.731.f: "\"아무래도 우리는 보통 사람들과 동떨어진 듯하다. 상아탑에 갇혀 있을 순 없지. 다시 속도를 내야 해. 길어봤자 서너 문단, 짧고 간결한 기사가 필요하다. 더 자극적인 기사가 말이야! 푹 찔러서 피가 철철 솟는 기사를 더 내야 해!\" -[SCOPE.sCharacter('target_character_1').GetFullNameNoFormatting]"
 manzoni.731.g: "바로 그거지!"
 manzoni.731.h: "최소한의 보도 윤리라는 게 있지 않은가?"
