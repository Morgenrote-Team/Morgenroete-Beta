 je_manzoni_literary_circle_reason: "우리가 문학 살롱과 수많은 작가들 뿐만 아니라 세기말의 전반적인 분위기까지 아우르는 풍요로운 문학 생활을 누리고자 한다면, 문학 협회의 설립은 시간 문제일 것이다."
 manzoni.3.t_juvenile: "아동 문학"
 manzoni.3.t_crime: "탐정·미스터리"
 manzoni.3.t_adventure: "모험물"
 manzoni.3.t_science: "공상 과학"
