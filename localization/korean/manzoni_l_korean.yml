 manzoni.921.t: "이탈리아의 음악 문화"
 manzoni.921.d: "이탈리아는 악기 제조, 오페라 발전, 유명 성악가의 양성, 위대한 작곡가 등의 분야에서 음악 문화의 발전에 결정적인 역할을 하는 국가로 꼽힌다. 음악계에서 이탈리아 반도는 특히 르네상스 시대부터 새로운 영감을 불어넣은 독창적인 음악 문화를 자랑해 왔다. 19세기까지 이탈리아어가 유일한 오페라 언어였다는 사실은 이러한 위대한 유산을 증명하는 것이다."
 manzoni.921.f: "\"세탁부 청구서를 주면 그것조차 음악으로 만들겠다.\" - 조아키노 로시니"
 manzoni.921.g: "이탈리아는 풍부한 음악사를 가진 국가다."
 manzoni.921.h: "이탈리아의 음악 문화에 미래가 달렸다!"
 manzoni.922.t: "단테를 숭배하다"
 manzoni.922.d: "단테 알리기에리는 이탈리아 문화의 궁극적인 상징으로 높이 평가받고 있으며 단테의 《신곡》은 세계 문학의 고전이자 중세 시대의 가장 중요한 증거로 여겨지고 있다. 단테에 대한 숭배는 애국자들 사이에서 진정한 교단으로 부상했으며, 동시에 외부 세계에 이탈리아 통일 운동 이전부터 범이탈리아적 정서가 존재했음을 보여주는 증거로도 여겨진다. 결국 긍정의 의미를 '시'(Sì)라 표현하는 지역으로 이탈리아의 경계를 처음으로 정의한 인물이기 때문이다. 피렌체에는 이 '최고의 시인'을 기리는 기념비가 세워질 전망이다."
 manzoni.922.f: "\"우리 인생 여정의 한가운데에서,\n나는 어두운 숲속에서 헤매고 있는 나 자신을 발견하였으니,\n그곳은 반듯한 길이 숨겨져 있다.\" - 단테 알리기에리"
 manzoni.922.g: "단테의 숭배를 지지하고 피렌체에 기념비를 세우시오."
 manzoni.922.h: "허나 미래 세대를 3행시로 고문할 순 없지 않소?"
 manzoni_italian_consiousness_2_tt: "현지 코르시카, 티치노, 몰타, 로만슈 인구가 이탈리아 인구로 통합됩니다. 이들의 본토 지역은 이탈리아의 본토 지역으로 전환될 것입니다."
 je_manzoni_italian_greater_national_identity: "단테의 유산"
 je_manzoni_italian_greater_national_identity_reason: "이탈리아의 정체성은 어디서 끝나는가? 단테가 내놓은 답은 분명했다. 언어다! 이탈리아 문화의 심장부와는 멀리 떨어진 수많은 애국자들에게 있어서도 진정한 경계를 넘어서 진정한 언어가 무엇인지는 명확했다. 투박한 라틴어를 쓰는 알프스의 반역자들, 프랑스의 지배 하에 토스카나 말을 쓰는 코르시카인들 역시 정치적으로는 물론 정신적으로도 국가의 일부가 되어야 했다. 몰타는 예외겠지만, 오랫동안 어머니와 떨어져 있던 아이처럼, 잃어버린 이탈리아 민족은 머지않아 제 언어를 되찾을 것이다."
 manzoni.924.t: "예(Sì)의 언어"
 manzoni.924.d: "단테 알리기에리가 500년 넘게 이탈리아의 언어 경계를 정립한 이래, 이제 이탈리아어 공동체는 하나의 국가 공동체를 이룩하게 되었다. 알프스 산맥의 계곡에서 몰타까지, 사르데냐와 코르시카 해안에서 이스트리아까지, 위대한 시인의 유산을 계승하는 하나의 이탈리아어 공동체가 있을 뿐이다."
 manzoni.924.f: "나폴리어? 이탈리아어의 방언. 베네치아어? 이탈리아어의 방언. 코르시카어? 이탈리아어의 방언. 라딘어? 이탈리아어의 방언. 로만슈어? 이탈리아어의 방언. 몰타어? 셈어계 어휘가 섞인 이탈리아어의 방언의 일종."
 manzoni.924.g: "이탈리아는 이제 언어에서도 통일을 이룩하였도다!"
 manzoni_italian_irredenta_decision_tt: "#YELLOW 미수복된 이탈리아#! 결단을 채택함"
 manzoni.925.t: "코르시카 통합"
 manzoni.925.d: "코르시카의 언어와 문화는 이제 이탈리아로 완전히 통합되었다. 동떨어져 있던 이탈리아의 문화가 다시 제 품으로 돌아온 것이다."
 manzoni.926.t: "티치노 통합"
 manzoni.926.d: "티치노의 언어와 문화는 이제 이탈리아로 완전히 통합되었다. 동떨어져 있던 이탈리아의 문화가 다시 제 품으로 돌아온 것이다."
 manzoni.927.t: "몰타 통합"
 manzoni.927.d: "몰타의 언어와 문화는 이제 이탈리아로 완전히 통합되었다. 동떨어져 있던 이탈리아의 문화가 다시 제 품으로 돌아온 것이다."
 manzoni.928.t: "로만슈 통합"
 manzoni.928.d: "로만슈의 언어와 문화는 이제 이탈리아로 완전히 통합되었다. 동떨어져 있던 이탈리아의 문화가 다시 제 품으로 돌아온 것이다."
 manzoni.925.f: "\"어떤 이들은 긍정을 표할 때 '오크'(Oc)를, 다른 이들은 '오일'(Oil), 또 다른 이들은 '시'(Si)라고 말하는데 그 이름하여 스페인, 프랑스, 라틴 사람들이다. 하지만 이 세 사람들의 언어가 하나의 방언에서 유래했다는 증거가 있다. 그것이 무엇이냐 하면 그들은 이를테면 데움(Deum), 카엘룸(Caelum), 아모렘(Amorem), 마레(Mare), 테람(Terram), 비빗(Vivit), 모리투르(Moritur), 아맛(Amat)처럼 거의 모든 것에 해당되는 많은 사물을 동일한 표현으로 이르기 때문이다. 이들 가운데 '오크'를 사용하는 자들은 제노바 국경부터 시작되는 남유럽 서부 지역에 산다. 반면 '시'를 사용하는 자들은 앞서 이른 경계의 동쪽, 즉 아드리아해가 시작되는 이탈리아 곶과 시칠리아에 이르는 지역에 산다.\" - 단테 알리기에리"
 manzoni.925.g: "어서 오시게, 형제들!"
 je_manzoni_italian_greater_national_identity_tt: "모든 코르시카, 티치노, 몰타, 로만슈 본토가 이탈리아 본토로 전환됩니다."
