l_korean:
 manzoni.1000.t: "아서 코난 도일의 《주홍색 연구》"
 manzoni.1000.d: "범죄를 논리와 지성으로 해결하는 탐정, 셜록 홈스는 정말 매력적인 캐릭터입니다. 아서 코난 도일이 생각해낸 이 소재는 참으로 흥미롭습니다."
 manzoni.1000.f: "\"그것을 알고 있다는 사실을 설명하는 것보다 깨우치는 것이 더 쉬웠다. 만약 누군가가 '2 더하기 2가 4임'을 증명하라고 한다면 다소 어려움을 느낄 수 있지만, 그럼에도 불구하고 그 사실에 대해 확신하고 있을 것이다.\"\n아서 코난 도일, 《주홍색 연구》"
 manzoni.1000.a: "엘리멘탈, 내 사랑 왓슨."
 manzoni.1100.g: "알프스에서 살고 싶다!"
 manzoni.1101.g: "사람을 외모로 판단하고 있나, 아니면 성격으로 판단하고 있나?"
 manzoni.1102.g: "나도 권위자의 말에 귀를 기울이면 성취감을 찾을 수 있을까?"
 manzoni.1103.g: "내 안의 늑대도 포효하고 있나?"
 manzoni.1104.g: "더 많은 반데스 데시네를 읽을 수 있나?"
 manzoni.1200.t: "알레산드로 만초니의 《약혼자들》"
 manzoni.1200.d: "《약혼자들》은 알레산드로 만초니가 1827년에 세 권으로 처음 출간한 이탈리아 역사 소설이다. 이 작품은 이탈리아 최초의 역사 소설로, 이후 이탈리아 문학 소설의 모델이 되었으며 현대 이탈리아어의 기초가 되었다. 19세기 초반에는 이탈리아 표준 문학 언어가 어떤 형태를 취해야 하는지에 대해 논란이 있었다. 만초니는 밀라노 출신이었지만 피렌체 방언을 확고히 지지했으며, '아르노 강가에서 자신의 어휘를 세탁했다'는 본인의 표현대로 1842년 재출간을 위해 소설의 문체를 수정했다."
 manzoni.1200.f: "이 소설은 1628년 북부 이탈리아를 배경으로 하며, 코모 호수 근처 마을에 사는 젊은 연인 렌초와 루치아의 이야기를 다룹니다. 두 사람은 결혼을 원하지만, 루치아를 노리는 지역 봉건 영주의 방해와 박해로 인해 마을을 떠나 도망쳐야 합니다. 소설에서 나온 여러 표현, 인용구, 이름들은 이탈리아어에서 여전히 자주 사용되는데, 예를 들어 '페르페투아'는 신부의 집안 일을 돕는 하녀를 뜻하며, 'Questo matrimonio non s'ha da fare'('이 결혼은 이루어질 수 없다')는 아이러니하게 쓰이는 문구입니다. 이 작품은 세계 문학의 진정한 걸작으로 여겨지고 있습니다. 또한, 스페인 점령 시기를 배경으로 하고 있어, 19세기 이탈리아에서 오스트리아 지배에 대한 은밀한 비판으로도 해석되어 왔습니다."
 manzoni.1200.g: "바보 같은 이탈리아 소설에 누가 신경을 쓰겠어?"
 manzoni.1200.h: "이탈리아 문화의 절정!"
 manzoni.1202.t: "자코모 레오파르디의 《라 지네스트라》"
 manzoni.1202.d: "자코모 레오파르디는 낭만주의 시대와 관련된 뛰어나고 유명한 시 작품을 창작했다. 알레산드로 만초니와 함께 레오파르디는 이탈리아어에 지대한 영향을 끼쳤으며, 이탈리아의 애국운동을 대표하는 인물 중 하나였다. 다만 민족주의와 진보에 대한 믿음에 대해선 회의적인 시각을 갖고 있었다. 그는 종종 시에 대해, 그리고 시의 언어와 범위에 관한 자신의 생각을 글로 남겼다. 레오파르디는 1837년에 38세의 젊은 나이로 세상을 떠났다."
 manzoni.1202.f: "《라 지네스트라》(빗자루꽃)는 지아코모 레오파르디의 마지막에서 두 번째 서정시입니다. 이 시는 서기 79년에 분화하여 빌라와 정원, 번영하던 도시들을 파괴하고 죽음을 가져온 베수비오 화산의 경사를 묘사하며 시작합니다. 이 순간부터 시인은 빗자루꽃을 시적 대화의 중심 대상으로 삼습니다. 기억에 잠긴 채, 레오파르디는 이 꽃에게 이미 버려진 시골에서 본 적이 있다고 이야기합니다. 빗자루꽃은 파괴 앞에서 아름다움과 저항의 상징으로 여겨집니다. 하지만 결국 빗자루꽃조차도 피할 수 없는 운명에 굴복할 수밖에 없다는 점을 시는 강조하며, 인간 존재의 덧없음을 자연의 힘과 대비시킵니다. 이를 통해 레오파르디는 인간이 자연을 지배하거나 물질적 부와 권력을 이상보다 우위에 두려는 생각을 비웃고 조롱합니다."
 manzoni.1202.g: "참으로 우울하군."
 manzoni.1203.t: "지오수에 카르두치의 《신가집》"
 manzoni.1203.d: "조수에 카르두치는 현대 이탈리아의 공식 국민 시인으로 평가받으며, 문화와 정치 전반에 깊이 관여했다. 인기 있는 강연자였으며 문학과 사회에 대해 날카로운 비평가로 활약했다. 대표작으로 꼽히는 시집 《신가집》(리메 누오베)와 《야만의 송가》(오디 바바레)에는 그의 가장 뛰어난 작품들이 수록되어 있다. 또한 괴테와 하이네의 작품 일부를 이탈리아어로 번역하기도 했다. 사망 1년 전, 카르두치는 이탈리아인으로서는 최초로 노벨 문학상을 수상했다."
 manzoni.1203.f: "시집 《신가집》는 간주곡을 앞세우며 시작되며, 이 안에는 빅토르 위고, 폰 플라텐, 괴테, 하이네, 보들레르, 포의 울림과 모티프가 담겨 있습니다. 이 시집의 내용과 형식은 주로 이전 작품들에서 유래하지만, 더욱 깊이 있고 성숙한 형태로 다듬어졌습니다. 라임 누오베에서 드러나는 주요 주제 중 하나는 과거에 대한 숭배와 역사적 기억으로, 특히 평등하고 자유로운 사회를 만들고자 하는 꿈이 두드러집니다. 이는 도덕적 건전성과 시민적 삶의 본보기로 여겨졌던 중세 도시 국가 시대에 대한 찬양을 통해 표현됩니다. 카르두치는 민주주의 확장의 또 다른 사례로 프랑스 혁명을 들며, 이는 카 이라라는 제목의 12편 소네트에서 회상됩니다."
 manzoni.1203.g: "하지만 사탄의 찬송가를 쓰는 사람을 믿을 수 있을까?"
 manzoni.1204.t: "지오바니 파스콜리의 《미리카에》"
 manzoni.1204.d: "조반니 파스콜리는 볼로냐 대학교에서 수학했으며, 그의 스승이자 멘토는 조수에 카르두치였다. 파스콜리는 실증주의와 과학이 중시되던 시대에도 인생은 신비 그 자체라고 믿었다. 그는 자연의 겸손한 사물들 속에서 발견되는 상징적 연관성을 통해서만, 겉모습 너머의 진실을 엿볼 수 있다고 여겼다. 그의 후기 시들은 유사한 주제를 공유하지만 더 실험적이며, 고전 고대에 대한 그의 깊은 지식을 반영한다. 이러한 시들은 후대의 이탈리아 시인들에게 큰 영향을 주었고, 많은 이들이 파스콜리의 우울하고 내성적인 주제를 자신들의 작품에 녹여냈다. 파스콜리는 이탈리아어와 라틴어를 모두 사용하여 작품을 남겼다."
 manzoni.1204.f: "《미리카에》는 조반니 파스콜리의 시집으로, 제목은 베르길리우스의 목가 제4편 두 번째 행에서 유래했습니다. 이 시집은 파스콜리의 거의 전 시기 동안 집필되었기 때문에, 그 구성의 역사는 곧 그의 시적 의식의 발전과도 겹친다고 할 수 있습니다.미리카에의 시들은 사물 간의 유사성과 불가해한 연결을 직관과 계시를 통해 포착하며, 상징적인 세계관을 드러냅니다. 삶에 대한 당혹과 혼란, 신비, 불안, 죽음, 우울함에 대한 감각은 파스콜리 시 세계 전반에 퍼져 있으며, 특히 ‘둥지’의 이미지를 ‘가정’의 은유로 삼는 주제도 반복적으로 나타납니다."
 manzoni.1204.g: "작고 위대한 시인."
 manzoni.1205.g: "저자는 지그문트 프로이트를 놀리는 건가?"
 manzoni.1206.t: "가브리엘레 단눈치오의 《쾌락》"
 manzoni.1206.d: "가브리엘레 단눈치오는 이탈리아 문학과 정치계에서 중요한 위치를 차지한 인물이다. 그는 '일 바테 시인'과 '일 프로페타 예언자'라는 별칭으로 불렸다. 단눈치오의 문학 작품은 프랑스 상징주의와 영국 심미주의와 긴밀히 연결된 데카당스 운동과 깊은 관련이 있다. 그의 전성기에는 독창성과 힘, 그리고 데카당스적 색채로 인해 큰 찬사를 받았으며, 그의 작품은 유럽 전역과 이탈리아 문학의 여러 세대에 지대한 영향을 끼쳤다."
 manzoni.1206.f: "《쾌락》은 단눈치오의 첫 번째 소설입니다. 약 한 세기 전 우고 포스콜로의 '야코포 오르티스의 마지막 편지'가 이탈리아에 낭만주의적 경향과 감성을 확산시킨 것처럼, 《쾌락》과 그 주인공 안드레아 스페렐리는 19세기 말 이탈리아 문화에 데카당스 경향과 심미주의를 도입했습니다. 단눈치오는 심리적이고 내성적인 새로운 산문 양식을 개척했으며, 이는 큰 성공을 거두었을 뿐 아니라 '지성의 마지막 후예'로서 삶의 오류와 역경을 탐구할 수 있게 했습니다."
 manzoni.1206.g: "이것은 상징적인 걸까, 아니면 이미 퇴폐적인 걸까?"
 manzoni.1207.g: "이 동화책은 영화로 만들어졌다면 더 큰 성공을 거뒀을 것이다."
 manzoni.1208.g: "이탈리아 젊은이들을 위한 애국 소설이다!"
 manzoni_great_writer: "훌륭한 작가"
 manzoni_great_writer_desc: "이 인물은 당대 최고의 작가 중 한 명입니다. 그의 문학 작품은 전 세계적으로 유명합니다."
 manzoni_heine_bad_influence_modifier: "하인리히 하이네"
 manzoni_heine_very_bad_influence_modifier: "하인리히 하이네"
 manzoni_heine_banned_modifier: "하이네 금지됨"
 manzoni_heine_censored_modifier: "하이네 검열됨"
 manzoni_heine_allowed_modifier: "하이네의 출판"
 manzoni_censorship_machinery_modifier: "검열 기계"
 manzoni_mocked_by_heine_modifier: "하인리히 하이네의 조롱"
 manzoni_michel_sleeps_modifier: "독일 미셸의 잠"
 manzoni_weaver_revolt_suppression_modifier: "방직공 반란 진압"
 manzoni_weaver_revolt_negotiation_modifier: "방직공과 협상"
 manzoni_suppressed_weaver_modifier: "방직공 반란 진압"
 manzoni_negotiated_weaver_modifier: "방직공과 협상"
 manzoni_political_tailwind_modifier: "정치적 역풍"
 manzoni.1300.t: "하인리히 하이네의《독일. 겨울 이야기》"
 manzoni.1300.d: "독일어권에서 가장 중요한 시인 중 한 명인 하인리히 하이네는, 독일의 정치 상황을 비판하는 풍자 서사시를 썼다. 자유주의자들은 이 책을 환영하는 반면, 일부 정치인들은 이를 금지하려 하고 있다."
 manzoni.1300.f: "1843년, 1831년에 독일을 떠나 프랑스로 이주한 독일 시인 하인리히 하이네는 잠시 독일로 돌아와 함부르크에서 어머니와 출판인 율리우스 캄페를 방문했습니다. 하이네는 전형적인 낭만주의 작가라기보다, 권위주의적 독일 국가들의 반동적 정책과 검열뿐만 아니라 민족주의적이고 쇼비니즘적인 동료들까지 풍자하며 비판한 작가였습니다. 파리로 돌아가는 길에 \"독일, 겨울 이야기\"의 초고가 형성되었습니다. 1819년 칼스바트 회의의 검열 규정에 따르면, 20쪽이 넘는 원고는 검열 대상에서 제외되었기에, 이 작품은 다른 시들과 함께 '새 시집'이라는 책에 수록되어 출간되었습니다. 이 작품은 하이네 특유의 이미지 세계와 민요 같은 시어를 응축하여, 고국의 상황에 대한 아이러니한 비판을 담고 있습니다."
 manzoni.1300.g: "게시해야 한다."
 manzoni.1300.h: "금지하고 압수하라!"
 manzoni.1300.i: "검열해라..."
 manzoni.1301.t: "쾰른 대성당을 조롱하는 하인리히 하이네"
 manzoni.1301.d: "하인리히는 자신의 최신작에서 쾰른 대성당 공사 재개를 단호히 조롱하고 나섰다."
 manzoni.1301.f: "쾰른 출신인 하이네는 이전 프로이센 시민으로서, 자국의 군국주의에 반대했습니다. 그의 서사시에서는 '프로이센식 태도'를 비판했을 뿐 아니라, 이상화된 독일 낭만주의에도 반기를 들었습니다. 사실 그는 중세 성당을 완성하는 데 집착하며 미래를 바라보지 못하는 시대착오적인 독일인들을 조롱했습니다."
 manzoni.1301.g: "빌어먹을, 하이네!"
 manzoni.1302.t: "요제프 폰 아이히도르프의《월야》"
 manzoni.1302.d: "요제프 폰 아이히도르프의 신작 시는 독일 시문학의 정점 중 하나로 평가받고 있다."
 manzoni.1302.f: "요제프 프라이헤어 폰 아이히도르프는 후기 독일 낭만주의를 대표하는 시인이자 소설가입니다. 아이히도르프의 시적 주제는 인간이 자연의 아름다움과 변화하는 정취에 완전히 몰입함으로써 행복을 찾아야 한다는 것이었습니다. 그의 시는 서정미가 뛰어나다는 찬사를 받았으며, 슈베르트, 슈만, 멘델스존, 브람스, 휴고 볼프, 리하르트 슈트라우스, 프리드리히 니체, 한스 피츠너, 알렉산더 젬린스키 등 수많은 작곡가들이 그의 시에 곡을 붙였습니다. 1837년에 발표된 그의 시 《월야》는 독일 낭만주의 서정시의 '진주 중의 진주'로 자주 불립니다."
 manzoni.1302.g: "아름답다."
 manzoni.1302.h: "독일인들은 정치적 자유를 위해 싸우는 대신 멍청한 시에 정신을 빼앗기는 것을 허용하나?"
 manzoni.1303.t: "방직공의 반란"
 manzoni.1303.d: "[SCOPE.sState('manzoni_weberaufstand_state').GetName] 지역에서는 사회적, 경제적, 정치적 문제들이 뚜렷하게 드러나고 있다. 새롭게 부상하는 자유주의 사상과 전통 장인 계층 사이에서 심화되는 빈곤은 불길한 갈등을 야기하고 있으며, 지역의 방직공들이 주도하는 반란이 곧 일어날 것이라는 소문이 돌고 있다."
 manzoni.1303.f: "산업화 초기, 많은 방직공들이 극심한 빈곤에 빠졌습니다. 지역 방직 공장주는 그들에게서 실을 구매하지만, 공급 과잉으로 인해 가격을 낮출 수 있었습니다. 이 방직공들은 전형적인 공장 노동자가 아니라, 공장에 의존하는 빈곤한 자영업자였습니다. 착취의 고통과 앞으로 더 심한 착취에 직면할 위험에 맞서, 지역의 일부 사람들은 힘을 합쳐 자신들의 고통의 책임이 있다고 여기는 기업가를 위협하고 있습니다. 정치인들은 이미 이 어려운 상황을 자신들 방식대로 해석하고 있습니다. 특히 산업계 인사들은 유사한 사건이 다시 발생하지 않도록 강경한 대응을 촉구하고 있습니다. 임금 조건 개선을 요구하는 이들은 물론 이를 모욕으로 받아들일 것입니다."
 manzoni.1303.g: "병사들을 보내라."
 manzoni.1303.h: "협상을 시도하겠다."
 manzoni.1304.t: "하인리히 하이네의 《방직공의 노래》"
 manzoni.1304.d: "[SCOPE.sCountry('manzoni_weberaufstand_country').GetAdjectiveNoFlag] [SCOPE.sState('manzoni_weberaufstand_state').GetName]에서 발생한 직조공 봉기의 진압은 독일 연방 영토 내에서 해결되지 않은 사회적·정치적 문제의 상징이 되었다. 하인리히 하이네는 이 책임 당국을 비판하는 시를 발표했다."
 manzoni.1304.f: "그들의 어두운 눈에 눈물은 흐르지 않고,\n흰 이빨 드러내며 베틀 앞에 앉았네.\n오 독일이여, 네 수의를 우리가 짜노라,\n세 겹의 저주를 너에게 엮어 내리니,\n—우린 짜고 있네, 우린 짜고 있네!\n\n굶주릴 때 우리의 간청을 헛되이 받았던\n그 신에게 저주를 내리노라.\n우리는 헛된 희망을 품었고 헛되이 기다렸으나,\n오직 조롱과 멸시만 돌아왔네,\n—우린 짜고 있네, 우린 짜고 있네!\n\n부유한 왕에게 저주를,\n우리의 비참함을 무심히 외면하는 자여,\n우리가 가진 마지막 돈마저 빼앗고,\n개처럼 길가에서 총에 맞게 내버려두네,\n—우린 짜고 있네, 우린 짜고 있네!\n\n거짓되고 간사한 우리 조국에 저주를,\n부끄러움과 불명예만이 번성하는 곳,\n꽃은 피기도 전에 꺾이고,\n부패와 썩음 위에 벌레만 배불리네,\n—우린 짜고 있네, 우린 짜고 있네!"
 manzoni.1304.g: "또 너야, 하이네?"
 manzoni.1304.h: "검열! 검열하라!"
 manzoni.1305.t: "게르하르트 하우프만의 《방직공들》"
 manzoni.1305.d: "게르하르트 하우프만은 자신의 경력에서 가장 중요한 희곡을 발표했다. 이 작품은 그를 독일 문학을 대표하는 인물로 국내외에 더욱 확고히 자리매김하게 했다. 1912년, 하우프만은 '극시 분야에서의 풍부하고 다양하며 탁월한 표현력'으로 노벨 문학상을 수상했다."
 manzoni.1305.f: "게르하르트 하우프만의 《방직공들》에 등장하는 인물 대부분은 권리를 위해 싸우는 프롤레타리아들입니다. 문학 비평과 서문 등에서 자주 지적되었듯이, 이 작품은 시대를 불문하고 드문 특징을 지니는데, 바로 뚜렷한 중심 인물이 없다는 점입니다. 이는 앙상블 연기를 위한 넓은 여지를 제공합니다. 하우프만은 영웅 대신 '군중'을 창조했으며, 이 군중이 곧 이 극의 주인공, 즉 중심 인물이라 할 수 있습니다. 평범한 대중 속에서 누군가가 부각된다 하더라도, 그들은 오랫동안 전면에 머무르지 않습니다. 이 극의 역사적 배경은 1840년대 [SCOPE.sState('manzoni_weberaufstand_state').GetName]에서 일어난 방직공 봉기입니다."
 manzoni.1305.g: "독일에서는 참혹한 비극도 문화유산이 된다."
 maria_luigia_died_tt: "#O 마리아 루이사 파르마#!가 세상을 떠납니다."
 je_manzoni_lucca: "루카의 운명"
 je_manzoni_lucca_reason: "1815년 복고 시기, 빈 회의는 몇 가지 문제에 직면했습니다. 그중에는 파르마에서 부르봉 왕가를 복위시킬 것인지와 합스부르크 출신인 나폴레옹의 아내 마리아 루이자에게 지급할 봉토 문제도 포함되어 있었습니다. 나폴레옹이 파르마를 프랑스 제국에 병합한 뒤, 파르마의 부르봉 왕가는 대체로 에트루리아 왕국을 부여받았지만, 에트루리아는 합스부르크 후계자에 의해 토스카나를 복원하는 데 자리를 내주어야 했습니다. 이에 따라 타협안으로 부르봉-파르마 가문의 군주들은 루카 공국을 자신들의 영지로 주장할 수 있게 되었고, 마리아 루이자는 사망할 때까지 파르마를 봉토로 유지할 수 있게 되었습니다. 마리아 루이사가 사망한 이후에는 부르봉-파르마 가문이 파르마로 돌아오고, 루카는 토스카나로 편입되기로 되어 있었습니다."
 manzoni.901.t: "루카의 운명"
 manzoni.901.d: "빈 회의의 조항에 따라, 합스부르크 가문의 마리아 루이사가 사망한 후 부르봉-파르마 가문이 다시 파르마의 왕위에 올랐다. 그 대가로 루카는 토스카나에 양도되어야 했다."
 manzoni.901.f: "1815년 복고 시기, 빈 회의는 몇 가지 문제에 직면했습니다. 그중에는 파르마에서 부르봉 왕가를 복위시킬 것인지와 합스부르크 출신인 나폴레옹의 아내 마리아 루이자에게 지급할 봉토 문제도 포함되어 있었습니다. 나폴레옹이 파르마를 프랑스 제국에 병합한 뒤, 파르마의 부르봉 왕가는 대체로 에트루리아 왕국을 부여받았지만, 에트루리아는 합스부르크 후계자에 의해 토스카나를 복원하는 데 자리를 내주어야 했습니다. 이에 따라 타협안으로 부르봉-파르마 가문의 군주들은 루카 공국을 자신들의 영지로 주장할 수 있게 되었고, 마리아 루이자는 사망할 때까지 파르마를 봉토로 유지할 수 있게 되었습니다. 마리아 루이사가 사망한 이후에는 부르봉-파르마 가문이 파르마로 돌아오고, 루카는 토스카나로 편입되기로 되어 있었습니다."
 manzoni.901.g: "[SCOPE.sCharacter('manzoni_ruler_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('manzoni_ruler_scope').GetFullName] 만세"
 manzoni.902.g: "루카가 드디어 우리의 것이 되었다."
 manzoni_italian_irredenta_decision: "잃어버린 이탈리아"
 manzoni_italian_irredenta_decision_desc: "역사적으로 달마티아, 이오니아 제도, 몰타, 코르시카는 이탈리아 본국의 일부였습니다. 코르시카는 제노바에 속했고, 몰타는 시칠리아의 일부였으며, 달마티아와 이오니아 제도는 베네치아 공화국의 영토였습니다. 오늘날에도 이 지역들에는 이탈리아 공동체가 여전히 존재합니다. 이탈리아의 영광스러운 통일과 우리가 이룬 위대한 발전 이후, 이제는 여전히 외세의 지배 아래 있는 마지막 이탈리아 영토들을 되찾아야 할 때입니다. 마지막으로 이렇게 외쳐야 합니다: \"물러가라, 외세여!\""
 united_italian: "이탈리아"
 je_manzoni_italianization: "이탈리아화"
 je_manzoni_italianization_reason: "이탈리아가 통일된 후, 마시모 다첼리오는 \"우리는 이탈리아를 만들었으니, 이제는 이탈리아화를 해야한다\"고 말했습니다. 이 말은 역사적으로 논쟁의 여지가 있긴 하지만, 이탈리아의 정치적 통일 이후에도 내부의 통합은 결코 안정적이지 않았다는 사실을 정확히 지적합니다. 이는 단지 산적들이 날뛰던 남부에만 해당되는 것이 아니었다. 북부에서도 부르주아 엘리트 계층 외의 대부분의 사람들은 여전히 지역 정체성과 더 깊은 유대감을 느끼고 있었습니다. 그러나 공동의 전쟁, 국가 교육 제도, 의무 군복무, 병영·군항·행정 시설 같은 국가 기관의 건설은 앞으로 몇 년 안에 이 고된 민족 통합 과정을 거치며 더욱 강한 범이탈리아 정체성이 형성되는 데 크게 기여할 것으로 보입니다."
 manzoni_italian_consiousness_capital_tt: "우리 수도 지역의 북이탈리아인과 남이탈리아인 주민들이 하나의 이탈리아 국민으로 통합됩니다. 이 지역은 이탈리아의 본국으로 탈바꿈할 것입니다. 우리의 주도 문화는 이탈리아 문화로 바뀌며, 우리는 온 나라를 이탈리아화할 수 있게 될 것입니다."
 je_manzoni_italianization_goal: "#O 국가 정체성 발전#!이 #G 250#!에 도달합니다."
 je_manzoni_italianization_ai: "이탈리아화"
 je_manzoni_italianization_ai_reason: "이탈리아가 통일된 후, 마시모 다첼리오는 \"우리는 이탈리아를 만들었으니, 이제는 이탈리아화를 해야한다\"고 말했습니다. 이 말은 역사적으로 논쟁의 여지가 있긴 하지만, 이탈리아의 정치적 통일 이후에도 내부의 통합은 결코 안정적이지 않았다는 사실을 정확히 지적합니다. 이는 단지 산적들이 날뛰던 남부에만 해당되는 것이 아니었다. 북부에서도 부르주아 엘리트 계층 외의 대부분의 사람들은 여전히 지역 정체성과 더 깊은 유대감을 느끼고 있었습니다. 그러나 공동의 전쟁, 국가 교육 제도, 의무 군복무, 병영·군항·행정 시설 같은 국가 기관의 건설은 앞으로 몇 년 안에 이 고된 민족 통합 과정을 거치며 더욱 강한 범이탈리아 정체성이 형성되는 데 크게 기여할 것으로 보입니다."
 je_manzoni_italianization_ai_goal: "#O 국가 정체성 발전#!이 #G 250#!에 도달합니다."
 je_manzoni_italian_national_identity: "이탈리아 정체성"
 je_manzoni_italian_national_identity_reason: "몇 년간의 공동 성장과 몇 가지 개혁을 거친 뒤, 범이탈리아 정체성에 대한 소속감이 점점 더 일반 대중 사이에 퍼지고 있습니다. 이 감정은 국가가 적절한 틀을 마련하기만 한다면 지역에서 지역으로 확산될 것입니다. 정부 행정기관, 대학교, 병영, 해군기지 등으로 잘 연결된 지역은 이러한 통합적 기능 덕분에 범이탈리아 정체성이 더 쉽게 자리잡을 수 있다. 고도로 도시화된 지역일수록, 이전까지는 지식인들 사이에서만 논의되던 이 개념에 더 쉽게 접근할 수 있습니다. 이상적인 여건 아래에서는 매년 하나의 하위 지역이 새로운 정체성을 받아들일 수도 있을 것입니다. 만약 국민국가 내 모든 이탈리아인들이 자신을 하나의 이탈리아인으로 느끼게 된다면, 이는 해외에 거주하는 이탈리아인들에게도 영향을 미쳐, 그들 또한 롬바르디아인이나 시칠리아인, 토스카나인이 아니라 해외에 있는 우리의 동포로서 점점 더 인식하게 될 것입니다."
 manzoni.911.t: "[SCOPE.sState('united_italian_culture_state').GetName]의 이탈리아 민족 의식"
 manzoni.911.d: "수년간의 사회적-정치적 영향 끝에, [SCOPE.sState('united_italian_culture_state').GetName]의 주민들은 이탈리아 반도 전체에 대한 소속감을 가지게 되었다. 이제 그들은 범이탈리아 정체성에 완전히 속해 있다."
 manzoni.911.f: "\"이탈리아인들은 새로운 이탈리아를 만들고자 하면서도, 예전의 이탈리아인으로 남고 싶어 했다. 옛 시절로부터 물려받은 두려움과 도덕적 비참함을 그대로 지닌 채 말이다. 그들은 이탈리아를 개혁하려 하지만, 정작 그것을 이루기 위해선 먼저 자기 자신부터 개혁해야 한다는 사실을 아무도 깨닫지 못한다.\"– 마시모 다첼리오"
 manzoni.911.g: "마키아벨리의 오래된 꿈이 현실이 되었다!"
 manzoni_italian_consiousness_tt: "현지 북이탈리아와 남이탈리아 인구가 이탈리아 인구로 통합됩니다. 북이탈리아와 남이탈리아의 본토 지역은 이탈리아의 본토 지역으로 전환될 것입니다."
 manzoni.912.t: "범이탈리아적 의식"
 manzoni.912.d: "이제 이탈리아 전역의 국민들이 더 이상 자신을 지역 정체성에 우선적으로 속한 존재로 여기지 않고, 국가 정체성의 일부로 인식하게 되면서, 이는 국내의 이탈리아인들뿐만 아니라 전 세계의 이탈리아인들에게도 영향을 미치고 있다."
 manzoni.912.f: "이탈리아 민족 국가가 수립되고 범이탈리아 정체성이 확립되면서, 국경 밖에 있는 이탈리아인들 — 세계 각지의 이민자이든, 본래 외세의 지배 아래 살고 있던 사람들이든 — 역시 자신을 무엇보다도 이탈리아인으로 인식하게 될 것입니다."
 manzoni.912.g: "우리는 이탈리아인들을 만들어냈다!"
 manzoni_pan_italian_identity_tt: "전 세계적으로 모든 북이탈리아인과 남이탈리아인들은 이제 자신을 범이탈리아 국민으로 인식하게 될 것입니다. 북이탈리아와 남이탈리아의 본국 지역은 전 세계 어디에서든 오직 이탈리아 본국으로 여겨질 것입니다."
 manzoni.913.d: "이제 이탈리아 전 국민이 더 이상 자신을 지역 정체성에 우선적으로 속한 존재로 여기지 않고 국가 정체성의 일부로 인식하게 되면서, 이는 국내의 이탈리아인들뿐만 아니라 전 세계의 이탈리아인들에게도 영향을 미치고 있다. 우리나라에서도 이전과 달리 단순히 지역 출신을 언급하는 대신, 이탈리아인으로서의 정체성을 확립하려는 열망이 커지고 있다."
 manzoni.913.g: "\"시칠리아 어부와 트렌티노 목동 사이에 차이가 없다는 말인가?\""
 rule_manzoni_united_cultures_rule: "#tooltip:[GetRawTextTooltipTag('mr_morgenroete_tt')] @mr_morgenroete_icon! #! 문화 통합"
 setting_manzoni_united_cultures_rule: "문화 통합: #G 활성화#!"
 setting_manzoni_united_cultures_rule_desc: "이탈리아화, 독일화, 스위스화가 가능하며, 개별 문화들이 각각 이탈리아, 독일, 스위스 문화로 통합될 수 있습니다. 이는 게임 진행 중 성과를 향상시키지만, 다른 모드와의 호환성 문제를 일으킬 수 있습니다."
 setting_manzoni_no_united_cultures_rule: "문화 통합: #R 비활성화#!"
 setting_manzoni_no_united_cultures_rule_desc: "이탈리아화, 독일화, 스위스화는 #R 불가능#!합니다. 이는 다른 모드와의 호환성을 높여주지만, 게임 진행 중 성과에는 긍정적인 영향을 미치지 않습니다."
 manzoni_brigants_modifier: "도적단"
 manzoni_anti_regionalism_ig_modifier: "반지역주의"
 manzoni_anti_regionalism_country_modifier: "반지역주의"
 manzoni_linguistic_impurity_modifier: "언어적 불순"
 manzoni_no_foscolo_modifier: "포스콜로 거부됨"
 manzoni.914.t: "[SCOPE.sCharacter('manzoni_character_scope').GetLastName]가 이탈리아 대의를 지지하다"
 manzoni.914.d: "범이탈리아 정체성에 대한 요구가 커지는 가운데, [SCOPE.sCharacter('manzoni_character_scope').GetFullName]는 완전히 리소르지멘토(이탈리아 통일운동)의 이상과 일치하게 되었다. 그는 자신의 출신 배경을 부차적인 것으로 여기며, 자신의 국가적 이탈리아 정체성을 강조하고 있다."
 manzoni.914.f: "이탈리아 통일 이전부터, 특히 지식인 엘리트들은 대부분 자신을 이탈리아인으로 인식했으며, 지역 출신은 단지 민속학적 요소로 여겼다. 통일이 이루어진 순간부터 이러한 인식은 특히 이탈리아 군대에서 퍼져나갔는데, 육군과 해군은 '국가의 학교'가 되었습니다. 정치에서는 중앙집권 세력이 지역주의 세력에 초기에 우위를 점했습니다."
 manzoni.914.g: "캄파닐리스모(지역 우선주의)의 시대는 끝났다."
 manzoni.915.t: "[SCOPE.sState('manzoni_brigant_state').GetName]의 산적들"
 manzoni.915.d: "[SCOPE.sState('manzoni_brigant_state').GetName] 지역의 열악한 상황 때문에 갈 곳 없는 사람들이 [SCOPE.sCharacter('manzoni_brigant_character').GetFullName] 세력에 점점 더 많이 합류하고 있다. 이들은 이제 주변 지역에서 큰 혼란을 일으키고 있으며, 산적들이 심각한 문제로 떠오른 지경이다. 일반 국민 중에도 이들을 이탈리아 정부와 커져가는 이탈리아화에 맞서는 정치적, 지역적 저항 세력으로 보는 지지자들이 있다."
 manzoni.915.f: "남부 이탈리아에서의 산적 행위는 고대부터 어떤 형태로든 존재해 왔습니다. 그러나 무작위 여행자를 노리는 무법자로서의 기원은 훗날 정치적 저항 운동의 형태로 크게 발전하였습니다. 1861년 사르데냐 왕국(후에 이탈리아 왕국)이 양시칠리아 왕국을 정복한 이후, 이 지역에서 가장 유명하고 잘 알려진 산적 형태가 등장하였습니다. 산적들 중에는 다양한 직업 배경과 동기를 가진 사람들이 혼재해 있었으며, 여기에는 전직 죄수, 도적, 그리고 이탈리아 정부가 일반 범죄자로 간주한 사람들이 포함되어 있었습니다. 또한 전직 군인과 부르봉 군대의 충성파도 있었습니다. 이들은 이탈리아 당국과 토지 소유 상류층뿐만 아니라 일반 민중에 대해서도 공격을 감행했으며, 마을, 도시, 농장을 자주 약탈하고 농부, 도시 주민, 경쟁 산적 무리 등 개인과 집단을 대상으로 무장 강도를 저질렀습니다."
 manzoni.915.g: "로빈 후드를 가장한 또 다른 산적이다!"
 manzoni.916.t: "지역 유산에 대한 두려움"
 manzoni.916.d: "[SCOPE.sState('manzoni_regionalist_state').GetName]의 일반 시민들은 새로운 이탈리아 정권과 이탈리아어 보급이 자신들의 전통적인 생활 방식을 파괴할까 두려워하고 있다. [SCOPE.sCharacter('manzoni_rural_leader_scope').GetFullName](은)는 이 지역 고유의 전통을 무시해서는 안 되며, 이탈리아의 균질화가 이미 너무 지나치게 진행되었다고 주장해 왔다."
 manzoni.916.f: "1848년~1849년 혁명이 실패하면서, 이탈리아 통일 운동의 주도 세력이었던 네오-겔피즘은 사실상 무력해졌습니다. 그들은 원래 교황의 '우선 평등자' 대통령직 아래 연방 구조의 이탈리아를 지지했습니다. 이에 대응하여 중앙집권 세력이 절대적인 우위를 차지하게 되었으며, 이 현상은 20세기까지도 지속되었습니다. 지역적 민감성은 더 이상 고려되지 않았고, 오히려 지역 감정은 이탈리아 통일 노력을 파괴할 위험한 경향으로 간주되었습니다."
 manzoni.916.g: "[SCOPE.sState('manzoni_regionalist_state').GetName]도 이탈리아의 일부라는 점에서 여느 지역과 다르지 않다."
 manzoni.916.h: "우리는 이 특별한 유산을 고려해야 한다."
 manzoni.917.t: "방언인가, 아니면 언어인가?"
 manzoni.917.d: "우리나라의 주요 교사, 강사, 교수진은 이탈리아어의 보급을 공공기관뿐만 아니라 일상생활에서도 특히 적극적으로 추진해야 한다는 입장을 밝혔다. 이는 새로운 이탈리아에서 과학적-정치적 과정의 개선에 크게 기여할 것으로 기대되지만, 일반 대중, 특히 농촌 지역 주민들 사이에서는 별다른 호응을 하지 않고 있다. 이들은 여전히 방언만 사용하고 있기 때문이다."
 manzoni.917.f: "18세기까지만 해도 이탈리아 반도의 각 언어 변종들이 독립된 언어라는 점에는 의심의 여지가 없었습니다. 단테 알리기에리 덕분에 토스카나어만 높은 위신을 가진 것이 아니었습니다. 베네치아어는 베네치아 공화국의 공식 문서 및 필기 언어였으며, 카를로 골도니의 희곡을 비롯한 문학 작품들도 베네치아어로 쓰였고, 아드리아해 지역에서는 여전히 일종의 공용어로서 특별한 의미를 지니고 있었습니다. 나폴리어에 대해서도 비슷한 말을 할 수 있습니다. 그러나 19세기 들어서는 이탈리아에는 단 하나의 표준어만 존재하며, 그 외의 모든 언어들은 단지 방언에 불과하다는 시각이 우세해졌습니다. 북부에서 사용된 이탈리아어는 이미 별도의 언어적 위상을 지니고 있었음에도 말입니다. 하지만 정치 운동이 전개되는 과정에서 점점 현실적인 인식이 퍼졌습니다. 즉, 언어와 방언의 차이는 \"언어에는 해군과 군대가 있다는 점\"이라는 인식이 그것입니다."
 manzoni.917.g: "우리의 언어적 다양성은 우리의 위신이다."
 manzoni.917.h: "이탈리아어를 말하라, 분명하게 말하라. 나머지는 단지 방언일 뿐이다."
 manzoni.918.t: "포스콜로의 운명"
 manzoni.918.d: "국가적 감정이 점점 뚜렷해지면서, 위대한 이탈리아 시인 우고 포스콜로의 유해를 영국에서 이탈리아로 이장하자는 목소리가 높아지고 있다."
 manzoni.918.f: "새롭게 탄생한 이탈리아 국가에는 이정표가 필요했습니다. 역사적 사건뿐만 아니라 역사적 인물들도 마찬가지였습니다. 프랑스의 경우처럼 파르테논 양식을 본떠 예술가, 과학자, 위대한 인물들을 위한 무덤을 조성하자는 생각은 초기에 제기되었습니다. 한때 저명한 시민들의 안식처였던 피렌체의 산타 크로체 성당은 이러한 목적에 가장 알맞은 장소로 보였습니다. 마키아벨리, 미켈란젤로, 갈릴레오 같은 인물들은 이미 오랫동안 토스카나인이라기보다 ‘이탈리아인’으로 인식되어 왔습니다. 자킨토스 섬 출신의 베네치아계 시인이자, 혁명기의 인물이었던 우고 포스콜로는 초기 이탈리아 자유주의와 민족주의의 상징적 인물로 여겨지며, 위대한 이탈리아 지성인들의 전당에 완벽히 어울리는 존재입니다. 그러나 포스콜로는 1827년 런던 근교의 턴햄 그린에서 망명 중 사망했습니다."
 manzoni.918.g: "그들에게 포스콜로를 우리에게 돌려달라고 요청하라."
 manzoni.918.h: "그들이 거절한다면 우리는 난처해질 것이다."
 manzoni.919.d: "이탈리아 정부는 유명한 시인이자 이탈리아 민족주의의 선구자인 우고 포스콜로의 유해를 넘겨줄 것을 요청했다."
 manzoni.919.g: "그들에게는 그들만의 하찮은 시인이 있을 것이다. 이름이 뭐였더라?"
 manzoni.919.h: "포스코라는 녀석은 여기 그대로 남는다."
 manzoni.920.t_foscolo: "포스콜로가 돌아오다"
 manzoni.920.d_foscolo: "영국 정부가 승인했다. 포스콜로의 유해가 곧 이탈리아 땅으로 돌아와 산타 크로체 성당에 영면하게 될 것이다!"
 manzoni.920.f_foscolo: "우고 포스콜로의 이탈리아 귀환은 신생 민족 국가의 첫번쨰 전환점으로 평가됩니다. 포스콜로는 돌아온 영웅으로 환영받았으며, 장례 행렬은 사람들이 흐느끼고 호응하는 가운데 하나의 행진식과도 같았다. 이탈리아의 위인들을 모신 산타 크로체 성당의 '판테온'은 이탈리아 민족주의의 확고한 기준점이 되었으며 그것을 출발점 삼아 민중들은 스스로 나아갈 수 있었다. 그 이념의 중점은 가톨릭 성인이 아니라 이탈리아의 영웅들이 되어야 한다는 것이었다."
 manzoni.920.g: "위대한 이탈리아인이 집으로 돌아왔다!"
 manzoni.920.t_no_foscolo: "귀환하지 못한 포스콜로"
 manzoni.920.d_no_foscolo: "안타깝게도 영국 정부에서 위선적인 변명들을 늘어놓으며 우고 포스콜로의 이탈리아 귀환을 가로막았다."
 manzoni.920.f_no_foscolo: "저들은 감히 이 위대한 이탈리아 시인을 '그 포스코란 양반'이라 부르는 무례함까지 보였다!"
 manzoni.920.h: "외다리 년의 자식들 주제에 포스콜로 작가님을 못 만나게 하다니!"
 manzoni_gbr_hits_ita_prestige_tt: "이것으로 이탈리아는 위신에 큰 타격을 받게 됩니다."
 manzoni_roma_aeterna_decision: "영원한 로마"
 manzoni_roma_aeterna_decision_desc: "영원의 도시 로마는 고대 로마 제국 이래 진정한 이탈리아의 수도로서 유일하게 남아 있었습니다. 그렇기 때문에 우리는 아무런 불이익 없이 정부청사를 로마로 옮길 수 있습니다. 만약 옛 수도에 동물원, 박물관, 천문대가 존재한다면 철거가 이루어지지만, 새로운 수도에는 각각 해당되는 시설이 즉시 들어서게 됩니다."
 manzoni.910.t: "영원한 로마"
 manzoni.910.d: "수도를 로마로 옮겨야지 비로소 이탈리아는 진정한 이탈리아인들의 중심임을 자부할 수 있다. 진정 이제는 이탈리아가 스키피오의 투구를 쓸 수 있게 된 것이다!"
 manzoni.910.f: "\"콜로세움이 무너지면, 로마도 무너지리니\n로마가 무너지면 — 세상도 무너지리니\" - 바이런 경"
 manzoni.910.g: "로마 카푸트 문디 (세계 수도 로마)."
