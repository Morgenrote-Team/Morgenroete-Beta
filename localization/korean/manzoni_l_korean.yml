 manzoni_writer_fiction_desc: "이 작가는 소설 작품 집필에 특화되어 있습니다. 등장인물과 이야기, 나아가 새로운 세계관까지 창작하는 경우도 있습니다."
 manzoni_writer_poet: "시인"
 manzoni_writer_poet_desc: "이 작가는 시 작품 집필에 특화되어 있으며 아름답게 들리는 놀라운 작품을 선보입니다."
 manzoni_writer_playwright: "극작가"
