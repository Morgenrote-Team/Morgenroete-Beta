 country_manzoni_decorative_literary_tradition_add: "연간 @manzoni_literary_tradition![concept_manzoni_literary_tradition]"
 country_manzoni_decorative_literary_tradition_add_desc: "우리나라에서 매달 누적되는 [concept_manzoni_literary_tradition]의 양입니다."
 manzoni_writer_bestseller_poem_title_loc: "[ROOT.GetCharacter.GetCustom('manzoni_writer_poem_bestseller_title_type')]"
 manzoni_writer_poem_bestseller_title_1_loc: "가을 바람의 속삭임"
 manzoni_writer_poem_bestseller_title_2_loc: "달빛의 부드러운 시선 아래"
 manzoni_writer_poem_bestseller_title_3_loc: "새벽녘의 고독한 길"
 manzoni_writer_poem_bestseller_title_4_loc: "잊혀진 꿈의 고요한 메아리"
 manzoni_writer_poem_bestseller_title_5_loc: "시냇물의 비밀스런 노래로"
 manzoni_writer_poem_bestseller_title_6_loc: "황혼에 그림자가 춤출 때"
 manzoni_writer_poem_bestseller_title_7_loc: "저 멀리 별에 얽힌 마음"
 manzoni_writer_poem_bestseller_title_8_loc: "겨울 숨결 속에서 피어난 장미"
 manzoni_writer_poem_bestseller_title_9_loc: "시간의 심연에서 울려 퍼진 메아리"
 manzoni_writer_poem_bestseller_title_10_loc: "희미해진 기억의 정원에서"
 manzoni_writer_poem_bestseller_title_11_loc: "늘어진 버드나무 그늘 아래"
 manzoni_writer_poem_bestseller_title_12_loc: "아침 햇살의 살가운 부름"
 manzoni_writer_poem_bestseller_title_13_loc: "바다가 저녁 하늘을 만날 때"
 manzoni_writer_poem_bestseller_title_14_loc: "방황하는 영혼을 위한 노래"
 manzoni_writer_poem_bestseller_title_15_loc: "들판의 꽃이 속삭이는 곳"
 manzoni.2600.t: "《플란데런의 사자》"
 manzoni.2600.d: "《플란데런의 사자 (황금 박두의 전투)》는 [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]의 역사 소설로, 플란데런 민병대가 프랑스 침략군을 물리친 '황금 박두 전투'를 중심으로 다루고 있으며, 플란데런의 민족 서사시로 높이 평가받고 있다."
 manzoni.2600.f: "\"이 책을 읽는 플란데런인 여러분, 이 책에 기록된 영광스런 움직임을 통해 플란데런이 과거에 어떠했는가, 지금은 어떠한가, 그리고 선조들의 신성한 모범을 잊는다면 앞으로 어떻게 되는가를 생각해 보시오!\"\n- 엔드릭 콘신서의 《플란데런의 사자》에서"
 manzoni.2600.g: "플란데런을 위하여!"
 manzoni.1601.t: "《붉은 방》"
 manzoni.1601.d: "《붉은 방》(Röda rummet)은 스웨덴 사회를 비판하는 [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]의 소설이다. 이 책의 줄거리는 이상주의에 빠진 공무원 아르비드 팔크가 작가가 되어 보수적인 형 칼 니콜라우스 팔크와 갈등을 겪는다는 내용으로, 스톡홀름의 도시 사회를 풍자하고 있다."
 manzoni.1601.f: "\"예술 작품이 실생활에 쓰이게 되는 순간, 즉 목적이나 경향을 드러내는 순간, 그 아름다움은 사라지고 만다.\"\n- 아우구스트 스트린베리의 《붉은 방》에서"
 manzoni.1601.g: "사회는 변화가 필요해!"
 manzoni.1602.t: "《그래도 괜찮아》"
 manzoni.1602.d: "《그래도 괜찮아》는 종신 결혼 생활과 여성의 경제적 독립 불가능을 비판하는 [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]의 소설이다. 소설에서 알베르트 하사는 스톡홀름과 리드셰핑을 오가는 증기선을 탔다가 유리공 딸 사라 비데벡과 사랑에 빠진다. 사라는 알베르트에게 호감을 보이지만, 정식 혼례나 재산 분할 없이 평등한 부부 생활을 원한다. 소설 막바지에서 사라가 \"이걸로 충분하신가요, 알베르트?\"(Går allt detta an, Albert?)라고 묻자, 알베르트가 \"그래도 괜찮아\" (Det går an)라고 답하는 것으로 끝난다."
 manzoni.1602.f: "\"...유리를 자르려는 자는 다이아몬드가 있어야 합니다, 나리!\"\n- 칼 요나스 로베 알름크비스트의 《그래도 괜찮아》에서"
 manzoni.1602.g: "그래도 괜찮아!"
 manzoni.1603.t: "《돈》"
 manzoni.1603.d: "《돈》(Pengar)은 동시대 결혼 제도를 비판하는 [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]의 소설이다. 이 책은 주인공 셀마의 열여섯 살부터 스물 세 살까지의 인생을 따라가고 있다. 이 기간 동안 셀마는 화가의 꿈을 지닌 활달한 소녀에서 자유를 유일한 목표로 삼는 강인한 여성으로 거듭난다. 열여섯 살에 셀마는 자기보다 나이가 훨씬 많은 폴 크리스테르손과 결혼한다. 폴은 근면 성실한 성격으로 부를 축적한 부유한 남자였고 셀마는 경제적으로 자신에게 유리할 거라는 생각에서였다. 그러나 셀마는 남편에게 사랑을 느끼지 못하고, 사랑이 무엇인지조차 서서히 잊어가는 듯 하는데, 여기에 남편은 '털 깎은 돼지'로 묘사된다. 부부 생활이 계속되면서 셀마는 자기가 속한 관계의 결점 뿐만 아니라 여성의 지위, 없다시피 한 법적 자율성, 그리고 여성권에 관한 한층 더 넓은 사회적 문제들을 인식하게 된다."
 manzoni.1603.f: "\"...그녀의 자기 기만은 왜곡된 상을 만들어냈고 그것은 행복과 꽤나 흡사했다.\"\n- 빅토리아 베네딕트손의 《돈》에서"
 manzoni.1603.g: "셀마에게 자유를!"
 manzoni.1604.t: "《헤르타》"
 manzoni.1604.d: "《헤르타》(Hertha)는 [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]의 소설로, 여성의 법적 자율성과 교육 접근성을 뒷받침하고 있다. 주인공이자 고집 센 젊은 여성 헤르타는 고압적인 아버지 밑에서 자란다. 헤르타가 사는 곳은 쿵셰핑이라는 작은 마을로, 가부장적이기가 스웨덴 전체의 축소판과도 같다. 어느날 밤, 화재가 발생하여 마을 전체가 잿더미로 변할 위기에 처한다. 화재로 마을 사람들의 진면모가 드러나고 스웨덴 사회의 편협함을 폭로하게 된다. 그러나 구조 활동에서 처음으로 마을 남녀 성별, 부자와 가난을 가릴 것 없이 한 마음으로 힘을 합친다. 낡은 것은 불타 없어졌지만 새로운 것을 다시 세울 수 있게 된 것이다. 헤르타는 마을을 이끄는 인물로 거듭나고 화재 이후 새 면모를 갖춘 마을에서 여성들이 주도해나가게 된다."
 manzoni.1604.f: "\"...내일 과부가 될 수만 있다면, 오늘 저녁에 꼭 결혼하고 싶네요!\"\n- 프레드리카 브레머의 《헤르타》에서"
 manzoni.1604.g: "불태워버려!"
 manzoni.1605.t: "《물방울과 조각들》"
 manzoni.1605.d: "《물방울과 조각들》는 [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]의 시집이다. 이 작품에 실린 야릇한 사랑시 《아침꿈》은 다층적인 의미를 담고 있다. 그 본질에는 당시 시대상, 특히 교회의 도덕관과 나체, 그리고 성을 향한 관점에 대한 비판이 담겨 있다. "
 manzoni.1605.f: "\"그이는 나체로 누워, 아름다움에 대한 갈망을 드러내며, 무릎을 벌리고 떨리는 마음으로, 연인의 간절한 갈망을 다시금 맞이했다.\"\n- 구스타프 프뢰딩의 《물방울과 조각들》에서"
 manzoni.1605.g: "이런 건 검열하시오!"
 manzoni.1606.t: "《새해 첫날》"
 manzoni.1606.d: "《새해 첫날》은 [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]의 짧고 표현력이 풍부한 시다. 시 자체의 평가에 있어 완고한 개인주의자들을 위한 투쟁가로 소개되고 있다."
 manzoni.1606.f: "\"위태로운 배에 홀로 선원은 감히 넓은 바다로 모험을 떠나고...\"\n- 에릭 구스타프 예이예르의 《새해 첫날》"
 manzoni.1606.g: "전진하라! 그것이 제 운명의 명령일지니."
 manzoni.1607.t: "《땅이여 잘 자거라》"
 manzoni.1607.d: "《땅이여 잘 자거라》는 [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]의 소설집으로, 쇠데르만란드 지방의 어느 농장에서 살아가는 소작농들의 삶을 그려내고 있다. 고된 노동과 가난한 환경, 억눌린 그리움, 그리고 소박한 기쁨이 어우러진 생동감 넘치는 공동체 속에서, 각자의 삶의 이야기가 상당히 가까이 펼쳐진다. 이 모든 이야기는 참나무가 우거지고 양귀비가 만발한 쇠데르만란드의 아름다운 풍경 속에 녹아든다."
 manzoni.1607.f: "\"질경이 이파리는 사람들이 밟고 다니는 길목에서 흔히들 볼 수 있다 하죠. 소작농들도 마찬가지랍니다.\"\n- 이바르로 요한손의 《땅이여 잘 자거라》에서"
 manzoni.1607.g: "잘 자거라!"
 manzoni.1608.t: "《형리》"
 manzoni.1608.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]의 소설 《형리》는 중세와 현대라는 두 시대를 넘나들며 이야기가 전개된다. 그 시대를 관통하는 것은 바로 술집이라는 배경과 두 시대 모두에 등장하는 형리 뿐. 이 소설은 형리가 술집 손님들에게 인간에 대한 냉혹한 시각을 담은 연설을 하는 것으로 마무리된다. "
 manzoni.1608.f: "\"폭력은 인간의 육체적, 정신적 위력의 궁극적 표현이다.\"\n- 페르 라게르크비스트의 《형리》에서"
 manzoni.1608.g: "이것이 공포다!"
 manzoni.1609.t: "《꽃쐐기풀》"
 manzoni.1609.d: "《꽃쐐기풀》은 [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]의 자전적 요소가 일부 포함된 소설이다. 이 책에서 작가는 자신의 분신 격인 고아 소년 마틴의 이야기를 1인칭 시점으로 그려내고 있다. 마틴의 아버지가 죽자 어머니는 아이들을 버리고 캘리포니아로 떠나 새로운 삶을 시작한다. 어린 나이에 소중히 여겼던 것들을 전부 잃은 마틴은 여러 농장을 전전하며 고된 농장 생활을 견디고, 쫓겨나고, 제 발로 나가기도 한다. 소설 속 마틴은 이기적이고, 어리석고, 유치하고, 자기연민에 빠지기 쉽고, 아첨꾼에 겁쟁이, 그리고 거짓된 인물로 묘사된다. 이 때문에 소설에는 마틴을 이상적으로 그리는 부분이 전혀 존재하지 않는다."
 manzoni.1609.f: "\"그 사람은 생각은 너무 많고 이해하는 바는 너무 적었다.\"\n- 하리 마르틴손의 《꽃쐐기풀》에서"
 manzoni.1609.g: "딱한 아이일세."
 manzoni.1610.t: "《엄마가 결혼해요》"
 manzoni.1610.d: "《엄마가 결혼해요》(Mor gifter sig)는 [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]의 자전적 요소가 일부 들어간 소설이다. 이 책은 세상을 너무나 잘 아는 듯하면서도 동시에 아무것도 이해하지 못하는 일곱 살 짜리 소녀 미아의 이야기를 다루고 있다. 미아는 엄마가 왜 술 마시고 싸우고, 바람까지 피우는, 잘생겼지만 별 희망 없는 남자와 재혼하려는지 알 겨를이 없다. 엄마는 낡고 바람 들어오는 월세방에서 생활하며 하루하루 먹고 살기 위해 애를 쓴다. 미아네 가족의 삶은 고통스럽고 굴욕적인 이별의 연속이며, 미아 본인도 서서히 계급사회에 물들어간다. 미아는 난로벽에 분필로 그린 파란 꽃 그림을 걸은 조용한 집에 살기를 꿈꾸지만, 세상은 모든 사람의 꿈을 위한 자리가 없고, 심지어 살 곳조차 없는 사람들이 많다는 것을 깨닫는다."
 manzoni.1610.f: "\"슬픔이 감당할 수 없을 만큼 벅차올라 한 사람을 파멸시키려 할 때, 죽은 자들이 무덤에서 일어나 도움의 손길을 내민다.\"\n- 모아 마르틴손의 《엄마가 결혼해요》에서"
 manzoni.1610.g: "참으로 행복한 부부 생활이로군."
 manzoni.1611.t: "《라스켄스》"
 manzoni.1611.d: "《라스켄스》는 [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]의 소설이다. 19세기 스웨덴 스몰란드 남동부 지방을 배경으로 가난한 농부 구스타프가 징병 할당 제도로 군인이 되는 이야기를 담고 있다. 군인에게 할당된 작은 농지와 '라스켄스'라는 이름을 얻은 구스타프는 똑같이 가난한 가정부 이다와 결혼한다. 이 소설은 두 사람이 농지에서 겪는 고난과 역경을 생생하게 그려내며, 스웨덴의 당시 옛 생활상을 고스란히 그려내고 있다."
 manzoni.1611.f: "\"그럼 어디 덤벼 봐! 옷도 안 벗고 여드레는 싸울 수 있으니.\"\n- 빌헬름 모베리의 《라스켄스》에서"
 manzoni.1611.g: "빌어먹을 할퀴는 고양이 같으니!"
 manzoni.1612.t: "《닥터 글라스》"
 manzoni.1612.d: "《닥터 글라스》는 [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]의 서간체 소설로서 19세기 스웨덴을 배경으로 도덕과 사랑의 문제를 겪는 어느 의사의 이야기를 다루고 있다. 주인공은 스톡홀름의 존경받는 의사 티코 가브리엘 글라스 박사로, 일기의 형식으로 본인이 겪는 우울증을 그려내고 있다. 소설 속 대적자는 도덕적으로 타락한 성직자 그레고리우스 목사다. 그레고리우스의 아름답고 젊은 아내는 성생활에 불만을 품고 글라스 박사에게 도움을 청한다. 글라스 박사는 그이에게 사랑에 빠지고 이미 애인이 있음에도 도와주기로 한다. 이윽고 두 사람의 관계에 개입한 박사였지만 목사는 '부인으로서의 권리'를 포기하지 않고, 아내가 원하든 원치 않든 자신과 관계를 맺어야 한다고 목소리를 높인다. 결국 글라스 박사는 사랑하는 그이를 행복하게 해 주기 위해 남편을 살해하기로 결심한다."
 manzoni.1612.f: "\"사람은 사랑받고 싶어 하고, 그것이 안 되면 존경받고 싶어 하고, 그것이 안 되면 두려움을 받고 싶어 하고, 그것이 안 되면 미움과 경멸을 받고 싶어한다.\"\n- 얄마르 쇠데르베리의 《닥터 글라스》에서"
 manzoni.1612.g: "청산칼륨을 가져오라!"
 manzoni.1613.t: "《싱고알라》"
 manzoni.1613.d: "《싱고알라》는 [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]의 소설로, 중세 시대 스웨덴을 배경으로 모험과 비극, 민속 설화의 요소가 어우러진 낭만적이고 역사적인 이야기다. 이야기는 아름답고 신비로운 집시 소녀 싱골라와 그녀에게 사랑에 빠진 귀족 요란을 중심으로 전개된다. 정치 음모가 난무하던 그 시절 싱골라와 요란의 사랑은 사회 계급의 갈등, 운명의 장난, 그리고 개인의 욕망과 얽히게 된다."
 manzoni.1613.f: "\"가라! 떠나거라! 너의 낯선이에게로!\"\n- 빅토르 뤼드베리의 《싱고알라》에서"
 manzoni.1613.g: "참으로 낭만적이군!"
 manzoni.1614.t: "《신시집》"
 manzoni.1614.d: "《신시집》은 [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]의 시집으로, 스웨덴의 역사와 자연, 국가 정체성을 소재로 삼고 있다. 이 시집은 낭만주의적 민족주의를 수용한 작품으로 평가받으며, 스웨덴인과 그 유산이 지닌 아름다움과 강인함에 집중하고 있다. 과거를 기리고 국가의 유산을 찬미하는 동시에 미래를 성찰하는 모습에 뚜렷한 초점을 맞추고 있다."
 manzoni.1614.f: "\"활시줄이 끊어지는 소리를 듣는 것이, 활을 당기지 않는 것보다 더욱 아름답다.\"\n- 베르네르 폰 하이덴스탐의 《신시집》에서"
 manzoni.1614.g: "참으로 자랑스러운 역사일세!"
 manzoni.1504.t: "《톰 소여의 모험》"
 manzoni.1504.d: "미시시피 강변을 따라 장난꾸러기 소년 톰 소여와 단짝 친구 허크 핀이 신나는 모험을 떠난다. 장난과 보물 찾기, 살인 사건을 목격하기까지. 그 모험을 통해 톰은 우정과 도덕성, 책임감에 대한 삶의 중요한 교훈을 터득하게 된다."
 manzoni.1504.f: "\"일이란 사람이 의무적으로 해야 하는 것이고, 놀이란 사람이 의무적으로 하지 않아도 되는 것이다.\"\n- 마크 트웨인의 《톰 소여의 모험》에서"
 manzoni.1504.g: "장난꾸러기 녀석!"
