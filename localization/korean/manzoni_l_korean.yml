 manzoni_writer_newspaper_report_loc: "뉴스 기사"
 manzoni_writer_newspaper_report_cap_loc: "뉴스 기사"
 manzoni_writer_masterpiece_newspaper_report_desc_loc: "[GetPlayer.MakeScope.Var('manzoni_writer_var').GetCharacter.GetFullName](이)가 모든 독자의 시선을 사로잡는 놀라운 기사를 작성하여 지면에 실었습니다. 그 기사 하나로 해당 신문은 배포된 지 한 시간도 채 되지 않아 매진되고 말았습니다."
 manzoni_writer_good_newspaper_report_desc_loc: "[GetPlayer.MakeScope.Var('manzoni_writer_var').GetCharacter.GetFullName](이)가 상당히 흥미롭고 매혹적인 기사를 새로 작성하여 지면에 실었습니다."
 manzoni_writer_mediocre_newspaper_report_desc_loc: "[GetPlayer.MakeScope.Var('manzoni_writer_var').GetCharacter.GetFullName](이)가 딱히 특별하지도 형편없지도 않은 기사를 새로 작성하였습니다. 괜찮은 언론 보도였지만 머지않아 잊혀지게 될 것입니다."
 manzoni_writer_bad_newspaper_report_desc_loc: "[GetPlayer.MakeScope.Var('manzoni_writer_var').GetCharacter.GetFullName]의 기사를 실어준 신문이 있긴 한지 신기할 따름이지만, 어떤 신문사에서는 자신들을 화장지 취급하는 모양입니다. 어쨌거나 그 기사는 형편 없어서 읽을 게 못 됩니다."
 manzoni_rotary_press_tech: "윤전기"
 manzoni_rotary_press_tech_desc: "원통형으로 비튼 활판을 회전시키고 그 사이로 종이를 집어넣는 방식으로, 이전보다 훨씬 빠른 속도로 인쇄를 가능하게 합니다."
 manzoni_linotype_tech: "라이노타입"
