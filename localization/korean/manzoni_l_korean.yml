 manzoni_je_pro_government_newspaper: "친정부 성향 신문"
 manzoni_je_pro_government_newspaper_reason: "제4계급으로 불리는 언론은 정부의 견제를 위해 존재한다. 그러나 때로는 양측의 입장을 모두 싣는 법정형 보도로 인해 권력층과 언론인 간에 지나치게 긴밀한 관계가 형성되는 경우가 있다. 이것으로 보도와 언론의 자유에 해가 될 지 모르나, 그렇다고 어느 누가 불쾌한 소식만 종일 보고 싶겠는가?\n\n'친정부 성향 신문'은 출판사 [concept_executive]이 특정 이익 집단에 속해 있고, 그 집단이 #G 정부 내각#!에 참여할 경우에 활성화됩니다. 그렇게 되면 해당 인물은 친정부 기사를 게시하게 됩니다."
 manzoni_has_publisher_ig_in_government_tt: "출판사 [concept_executive]의 이해 집단이 #G 정부#!에 속해 있음"
 manzoni_has_publishing_company_tt: "#default_text [GetPlayer.GetName]에 출판 [concept_company]가 있음#!"
 manzoni_has_penny_press_tt: "#default_text [GetPlayer.GetName]에 $manzoni_pm_penny_press$로 설정된 $building_manzoni_publishing_industry$가 있음#!"
 manzoni_je_freedom_of_the_press: "언론의 자유"
 manzoni_je_freedom_of_the_press_reason: "진실을 널리 알리려는 억누를 수 없는 의지에 이끌리거나, 단순히 자신이 속한 정당이 여권이 아니라는 이유로 출판사들은 국가에 여러 차례 도전해 왔다. 이러한 시대에 언론의 자유는 그 어느 때보다 중요하다.\n\n'언론의 자유'는 출판사의 [concept_executive]이 속한 이해 집단이 #R 비여권 세력#!에 놓여 있을 때 발동하며, 그 인물은 야당의 활동에 참여하게 됩니다."
 manzoni_has_publisher_ig_in_opposition_tt: "출판사의 [concept_executive]이 속한 이해 집단이 #R 야권#!에 속함"
