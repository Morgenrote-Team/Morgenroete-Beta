 manzoni.1205.t: "《제노의 의식》"
 manzoni.1205.d: "필명 [SCOPE.sCharacter('manzoni_writer_scope').GetFullName](으)로 더 잘 알려진 아론 에토레 슈미츠는 이탈리아의 작가이자 사업가로서 소설과 희곡, 단편소설을 썼다. 아일랜드 소설가이자 시인이었던 제임스 조이스의 절친으로서 이탈리아 심리 소설의 선구자로 여겨지며 대표작이자 근대 소설인 《제노의 의식》은 이탈리아 문학의 고전으로 널리 인정받고 있다. 스베보는 조이스의 소설 《율리시스》의 주인공 레오폴드 블룸의 모델이기도 했다."
 manzoni.1205.f: "\"다른 병과는 달리 삶은 언제나 필멸로 향한다. 삶은 치유를 용납치 아니한다. 마치 우리 몸의 구멍을 상처라 믿고 막는 것과 같다. 치료를 받는 순간 우리는 질식사하고 말 테니.\"\n- 이탈로 스베보의 《제노의 의식》에서"
 manzoni.1207.t: "《피노키오의 모험》"
 manzoni.1207.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName](이)라는 필명으로 더 알려진 카를로 로렌치니는 이탈리아의 언론인이자 작가로, 피노키오라는 이름의 인형이 살아 움직이게 되는 이야기의 작가로 가장 잘 알려져 있다.《피노키오의 모험》은 1880년부터 《조르날레 데이 밤비니》에 연재되었으며 1883년 두 권의 단행본으로 출판되었다. 이 작품은 생명을 얻은 꼭두각시 피노키오와 그의 아버지 같은 존재인 가난한 목수 제페토의 장난기 넘치는 모험을 그린 이야기다."
 manzoni.1207.f: "\"양심이란 사람들이 귀 기울이지 않는 작고 조용한 목소리란다.\"\n-카를로 콜로디의 《피노키오의 모험》에서"
 manzoni.1208.t: "《사랑의 학교》"
 manzoni.1208.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName](은)는 이탈리아의 작가이자 언론인으로 훗날 아동 문학으로 가장 유명해진 작가다. 데 아미치스는 애국주의자로서 이탈리아 독립 전쟁에 참전하였으나 군대에 환멸을 느끼고 전역하였다. 스스로 프리메이슨 회원임을 공언한 데 아미치스는 이탈리아인의 정신 깊숙이 자리잡은 가톨릭 신앙을 세속적 미덕과 국가에 대한 헌신으로 대체하려 노력하였다. 말년에는 사회주의 사상이 그의 작품에 큰 영향을 끼쳤다."
 manzoni.1208.f: "\"이 책은 특히 아홉 살에서 열세 살 사이의 초등학생들을 위하여 쓴 것으로, 제목은 '이탈리아의 어느 공립학교 3학년 학생이 쓴 한 해의 이야기'라 할 수 있습니다. 여기서 '3학년 학생이 썼다'는 것은 그 학생이 여기에 인쇄된 그대로 썼다는 것이 아닙니다. 학교 안팎에서 보고 듣고 생각한 것을 공책에 차근차근 적어 나갔습니다. 그리고 학기 말에 아버지는 노트를 바탕으로 이 책에 옮겨 적었는데, 아들의 생각을 바꾸지 않고 최대한 아들이 전하는 바를 그대로 보존하고자 힘썼습니다. 4년 뒤 고등학생이 된 아버지는 그 원고를 다시 읽고, 당시의 생생한 기억을 더해 자신의 생각을 덧붙였습니다. 자, 여러분. 이제 이 책을 읽어보세요. 이 책이 여러분께 즐거움을 주고 좋은 영향을 주기를 바랍니다.\"\n- 에도아르도 데 아미치스의 《사랑의 학교》에서"
 manzoni.1208.h: "정말 훌륭한 책일세!"
 manzoni.1306.t: "《베를린 알렉산더 광장》"
 manzoni.1306.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]의 《베를린 알렉산더 광장》에서는 감옥에서 출소한 뒤 정상적인 삶에 적응하지 못하고 다시 범죄의 길로 빠져드는 노동자 프란츠 비베르코프의 이야기를 다룬다. 비베르코프는 내외면의 악마 뿐만 아니라 자신의 파멸을 자초하는 도시 자체와도 싸우게 된다."
 manzoni.1306.f: "\"그대는 본인의 운명을 걱정하지 않아야 한다. 나는 운명의 상대다. 나는 그리스인이 아니라 베를린 사람이다.\"\n- 알프레트 되블린의 《베를린 알렉산더 광장》에서"
 manzoni.1306.g: "모더니즘 문학의 획기적인 작품일세."
 manzoni.1403.t: "《어린 왕자》"
 manzoni.1403.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName](은)는 《어린 왕자》에서 작은 행성 출신의 어린 왕자가 다른 행성들로 여행하여 여러 인물들을 만나면서 어른들의 다양한 면모를 풍자하고 있다. 여행 과정에서 왕자는 우주를 이해하고 싶어한다. 과연 왕자는 그 물음의 답을 찾을 수 있을까?"
 manzoni.1403.f: "\"어른들도 한때는 모두 어린이들이었습니다. 그것을 기억하는 어른은 거의 없지요.\"\n-앙투안 드 생텍쥐페리의 《어린 왕자》에서"
 manzoni.1403.g: "우주를 이해한다라, 할 게 못 되는 것 같은데..."
 manzoni.1901.t: "《율리시스》"
 manzoni.1901.d: "《율리시스》는 [SCOPE.sCharacter('manzoni_writer_scope').GetFullName](이)가 쓴 근대 소설이다. 이 소설에서 작가는 주인공 레오폴드 블룸이 더블린의 여러 곳을 방문하는 과정을 독자들에게 보여준다. 소설에서 보여주는 고유의 특징으로 등장인물의 생각과 연상을 머릿속에 스쳐 지나가듯 묘사한다는 점이 꼽힌다."
 manzoni.1901.f: "\"나는 산의 꽃이었지 그래 안달루시아 아가씨들이 하던 것처럼 머리에 장미꽃을 꽃을 때 아니면 빨간 장미를 꽃을까 그래 그리고 그가 무어인의 성벽 아래 나와 어떻게 입맞춤을 했던지 그리고 나는 생각했지 뭐 다른 놈보다 이 남자가 낫겠지 하고 나는 눈빛으로 그에게 다시 물어봐달라 졸랐지 그래 그러자 그가 내게 물었지 나하고 결혼해 주겠느냐고 그래 나의 산의 꽃이라 대답해 줄 거냐고 그래서 먼저 나는 그에게 두 팔을 감싸 안았지 그래 그리고 그가 내 향기로운 가슴을 모두 느낄 수 있도록 나에게로 끌어당겼지 그래 그리고 그의 심장은 미친 듯이 뛰었고 그래 나는 말했지 그래 그리하겠다고.\"\n- 제임스 조이스의 《율리시스》에서"
 manzoni.1901.g: "참으로 새롭고 흥미로운 문체일세!"
 manzoni_company_basic_publishing_industries: "출판"
 manzoni_company_basic_publishing_industries_dynamic_name_tag_singular: "출판"
 manzoni_company_basic_publishing_industries_dynamic_name_tag_plural: "출판"
 manzoni.500.d: "지역 작가로 활동하는 [SCOPE.sCharacter('manzoni_writer_scope').GetFullName](이)가 우리 정부에게 싫증이 난 모양이다. 우리나라를 더 나은 방향으로 바꾸기 위해 정계에 입문하기로 결정했다고 한다. 여기서 문제는 우리가 허락해 주는가의 여부다."
 manzoni.801.t: "아름다운 삽화"
 manzoni.801.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]의 최신작을 두고 화가 [SCOPE.sCharacter('klimt_painter_scope').GetFullName]에게 일부 삽화를 그려 힘을 보태달라고 설득하였다. 처음 완성된 삽화들은 비교할 수 없을 정도로 아름다웠으며 [SCOPE.sCharacter('manzoni_writer_scope').GetLastName]에게 감동을 안겨다 주었다."
 manzoni.801.f: "\"삽화가 참 멋지군요! 화가 분께서 이야기를 전달해줄 세부 묘사들을 작게 숨겨두지는 않았을지 궁금해지는군요?\""
 manzoni.801.g: "세부 묘사가 엄청나군!"
 manzoni.801.h: "베스트셀러가 되겠어!"
 manzoni.801.h_tt: "이것으로 [GetPlayer.MakeScope.Var('manzoni_writer_var').GetCharacter.GetLastName](이)가 [concept_manzoni_bestseller]를 집필할 확률이 증가하게 됩니다."
 manzoni.802.t: "외계 생명체 존재설"
 manzoni.802.d: "공상과학 소설가 [SCOPE.sCharacter('manzoni_writer_scope').GetFullName](와)과 우리나라 천문학자 [SCOPE.sCharacter('verrier_astronomer_scope').GetLastName] 박사가 만나 외계 생명체가 존재할 가능성을 논하였다. 두 사람은 외계 생명체가 어떤 모습일지, 어디에 존재할 수 있을지에 관한 가설을 세웠고, 그 내용을 [SCOPE.sCharacter('verrier_astronomer_scope').GetLastName]-[SCOPE.sCharacter('manzoni_writer_scope').GetLastName] 가설이라는 이름으로 발표하였다."
 manzoni.802.f: "\"이 생명체들은 분명 기체 행성의 가스 바다에서 살 것이오. 외부 세계와 소통할 수는 없을 듯 하나, 다른 기체 행성을 식민지로 삼을 줄 알게 된다면 어떻겠소? 그리고 그 식민지에서 혁명이 일어날지도 모르지!\""
 manzoni.802.g: "우리도 외계 생명체를 찾아보는 것이 좋겠군."
 manzoni.802.h: "본인들의 이론을 서적으로 출간했으면 좋겠군!"
 manzoni.802.i: "정말 흥미롭군!"
 manzoni.803.t: "[SCOPE.sCharacter('manzoni_adventurer_scope').GetFullName]의 모험"
 manzoni.803.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName](은)는 [SCOPE.sCharacter('manzoni_adventurer_scope').GetLastName] 박사의 여정을 전해듣고 대담을 위해 만나보기로 결심하였다. 두 사람은 오랫동안 이야기를 나누었고 [SCOPE.sCharacter('manzoni_writer_scope').GetFullName](은)는 차기작에 쓰일 여러 소재들을 머릿속에 담아두게 되었다."
 manzoni.803.f: "\"아무렴, 말씀하시니 기억났지마는 해적들이 있었구려! 사실은 피라냐를 애완동물로 삼는 해적이었소!\""
 manzoni.803.g: "이것으로 결실을 맺었으면 좋겠군!"
 manzoni.804.t: "열기구 비행에 감명받은 [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]"
 manzoni.804.d: "[SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName](이)가 시인 [SCOPE.sCharacter('manzoni_writer_scope').GetFullName](을)를 열기구에 태워 비행을 하고 돌아왔다. 지상으로 돌아온 [SCOPE.sCharacter('manzoni_writer_scope').GetLastName](은)는 이번 비행에 큰 영감을 받은 듯하다."
 manzoni.804.f: "\"구름은 하얀 바다 같고 지상의 사람들은 점과 같더이다. 참으로 놀라운 경험일세!\""
 manzoni.804.g: "아, 비행의 아름다움이여!"
 manzoni.804.h: "이제 더 훌륭한 시를 짓겠구나!"
 manzoni.804.i: "나도 열기구 조종사가 되고 싶군!"
 manzoni.805.t: "산세의 아름다움"
 manzoni.805.d: "오늘 [SCOPE.sCharacter('manzoni_writer_scope').GetFullName](이)가 유명 산악가 [SCOPE.sCharacter('mountaineer_scope').GetFullName](와)과 함께 등산에 나섰다. 등반 과정은 힘겨웠지만 정상에 올라 본 [SCOPE.sCharacter('manzoni_writer_scope').GetLastName](은)는 아름다운 경치에 감탄을 금할 수 없었다."
 manzoni.805.f: "\"안개 바다에 싸여 몇 봉우리만이 가로지른 가운데 떠오르는 태양을 보았소. 참으로 멋진 풍광이더이다.\""
 manzoni.805.g: "산이란 많은 시인들에게 영감을 주는군!"
 manzoni.805.h: "산속의 맑은 공기를 마셨으니 더 훌륭한 시를 쓰는 데 보탬이 되었으면!"
 manzoni.805.i: "본인도 산악가로 나설 수 있지 않겠나?"
 manzoni.1003.t: "《보물섬》"
 manzoni.1003.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]이 쓴 《보물섬》은 어린 소년 짐 호킨스가 보물을 찾아 나서는 여정을 그린 작품이다. 짐은 리브시 박사, 대지주 존 트렐로니와 함께 배를 타고 섬으로 향한다. 하지만 배에는 보물을 차지하기 위해 나머지 선원들을 죽이려는 해적들로 가득하다. 과연 짐은 이 모험에서 살아남을 수 있을까?"
 manzoni.1003.f: "\"우리가 이토록 멀리까지 찾아온 것은 플린트의 보물 때문이요, 그 보물을 위해 히스파니올라호에서 열일곱의 목숨을 벌써 앗아갔지. 그 보물 하나로 얼마나 많은 사람이 숨져 갔고, 얼마나 많은 피와 슬픔이 흘렀으며, 얼마나 훌륭한 배들이 깊은 바다에 가라앉고, 얼마나 용감한 사람들이 눈가리개를 하고 널빤지를 걸었으며, 얼마나 많은 대포를 발사하고, 얼마나 많은 수치와 거짓과 잔혹함이 그득했던가. 아마 목숨 부지한 이들 가운데 누구도 이루 말하기 어려울 것이다.\"\n- 로버트 루이스 스티븐슨의 《보물섬》에서"
 manzoni.1003.g: "으르렁!"
 manzoni.1004.t: "《프랑켄슈타인》"
 manzoni.1004.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]의 《프랑켄슈타인》은 프랑켄슈타인 박사가 여러 신체 부위를 짜맞추어 하나의 생명체로 되살리려 애쓰는 내용의 소설이다. 번개의 힘으로 괴물의 신체를 되살리는 데 성공한 프랑켄슈타인 박사는 그 괴물의 흉측한 얼굴을 견딜 수 없어 그를 버리고 떠난다. 괴물의 얼굴은 마을 사람들에게 공포와 불안감을 불러일으키고, 선량했던 프랑켄슈타인 박사는 점차 고독에 휩싸인다."
 manzoni.1004.f: "\"비록 그의 정신이 피폐해졌을지라도, 자연의 아름다움을 깊이 느끼는 데 있어서는 그 누구도 따라올 자가 없다. 별밤 하늘과 바다, 그리고 이 모든 경이로움이 선사하는 풍경은 여전히 ​​그의 영혼을 지상에서 끌어올리는 힘을 지닌 모양이다. 그런 사람은 이중적인 삶을 산다. 고통에 시달리고 실망에 굴복할 수도 있지만, 내면으로 침잠할 때면 마치 후광을 두른 천상의 영혼처럼 되어, 슬픔이나 어리석음이 감히 발을 들일 수 없는 존재로 거듭나는 것이다.\"\n- 메리 셸리의 《프랑켄슈타인》에서"
 manzoni.1004.g: "죽은 자를 되살릴 수 있다니, 얼마나 좋을까?"
 manzoni.1005.t: "《이상한 나라의 앨리스》"
 manzoni.1005.d: "《이상한 나라의 앨리스》에서 어린 소녀 앨리스가 토끼굴로 들어가 이상한 세계에 도착하게 된다. [SCOPE.sCharacter('manzoni_writer_scope').GetFullName](이)가 쓴 이 소설은 환상적인 동물과 어른들이 세운 기묘한 규칙들로 가득 차 있다. 이를 통해 빅토리아 시대의 도덕주의 세계관을 풍자하고 있다."
 manzoni.1005.f: "\"나만의 세상을 가지게 되면 모든 것이 터무니없어질 거야. 원래 모습을 지닌 것은 없겠지. 모든 게 원래 모습대로가 아닐 테니까. 반대로 말해서 있던 것은 없게 되고. 없던 것은 있게 될 거야. 내 말 알아듣겠니?\"\n-루이스 캐럴의 《이상한 나라의 앨리스》에서"
 manzoni.1005.g: "정말이지 흥미로운 나라로군!"
 manzoni.1006.t: "《곰돌이 푸》"
 manzoni.1006.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName](이)가 아들 크리스토퍼 로빈이 갖고 노는 인형에서 영감을 얻어 《곰돌이 푸》를 썼다. 이 작품은 곰돌이 푸와 그의 친구들을 주인공으로 한 단편 소설 모음집으로, 곰돌이 푸가 가지각색의 모험을 겪는 이야기를 다룬다."
 manzoni.1006.f: "\"'글쎄,' 푸가 말했습니다. '내가 제일 좋아하는 것이라.' 그러고는 잠시 생각에 잠겼습니다. 꿀을 먹는 건 정말 좋아하지만, 꿀을 먹기 직전의 그 순간이 먹고 있을 때보다 더 좋았기 때문입니다. 그런데 그 순간을 무어라 하는지는 몰랐답니다.\"\n-A.A. 밀른의 《곰돌이 푸》에서"
 manzoni.1006.g: "테디 베어를 친구로 삼는다라, 이거 정말 재미있군!"
 manzoni.1007.t: "《스타일스 저택의 괴사건》"
 manzoni.1007.d: "《스타일스 저택의 괴사건》은 [SCOPE.sCharacter('manzoni_writer_scope').GetFullName](이)가 쓴 탐정 소설이다. 벨기에 태생에 영국으로 건너온 탐정 에르퀼 푸아로를 처음 소개하는 책으로, 자신과 지금 같이 살고 있던 잉겔소프 부인의 살인 사건을 푸는 이야기를 담고 있다. 탐정 푸아로는 이후 [SCOPE.sCharacter('manzoni_writer_scope').GetLastNameNoFormatting]의 소설 33편에 줄곧 등장하게 되었다."
 manzoni.1007.f: "\"상상력에 너무 고삐를 달고 있군. 상상력은 좋은 머슴이자 나쁜 주인일세. 제일 단순한 설명이 가장 가능성이 높은 법이지.\"\n애거사 크리스티의 《스타일스 저택의 괴사건》에서"
 manzoni.1007.g: "에르퀼 푸아로가 나중에 또 나올지 궁금하군."
 manzoni.1008.t: "《정글북》"
 manzoni.1008.d: "《정글북》은 [SCOPE.sCharacter('manzoni_writer_scope').GetFullName](이)가 지은 어린이 서적이다. 이 책의 주제는 야생에 버려져 늑대들에게 길러진 소년 모글리를 통해 유기와 양육을 조명한 것이다. 또한 정글 속 동물들이 따르는 정글의 법칙도 중요한 요인으로 작용한다. 이 책은 아이들에게 본인의 위치를 알고 규칙과 법을 준수해야 한다는 교훈을 선사한다."
 manzoni.1008.f: "\"정글의 법칙에서 아름다운 면모를 꼽자면 만사를 벌로 해결한다는 것이다. 그 이후로 불평불만이란 없다.\"\n-루디야드 키플링의 《정글북》에서"
 manzoni.1008.g: "필수품이 있는지 찾아보자!"
 manzoni.1009.t: "《피터 래빗 이야기》"
 manzoni.1009.d: "《피터 래빗 이야기》는 토끼 피터 래빗이 맥그리거 씨의 정원으로 들어갔다가 그곳에서 쫓겨 다니는 이야기를 담은 동화다. [SCOPE.sCharacter('manzoni_writer_scope').GetFullName](이)가 쓴 이 이야기는 동시대 아동 문학에서는 흔치 않았던 여러 새로운 요인들을 담고 있어, 어린이 서적으로서는 대단히 획기적이고 혁신적인 작품으로 평가된다."
 manzoni.1009.f: "\"옛날 옛적에 네 마리 토끼가 살고 있었어요. 이름은 플롭시, 몹시, 코튼테일, 피터였답니다.\"\n-베아트릭스 포터의 《피터 래빗 이야기》에서"
 manzoni.1009.g: "들어가선 안 되는 정원으로 들어갔다라, 흥미진진하겠구만!"
 manzoni.1010.t: "《등대로》"
 manzoni.1010.d: "《등대로》는 [SCOPE.sCharacter('manzoni_writer_scope').GetFullName](이)가 쓴 근대소설이다. 스코틀랜드 스카이섬의 램지 가문의 황금기를 묘사하며, 대화와 행동보다는 심리와 관찰에 초점을 맞춘 것으로 평가된다."
 manzoni.1010.f: "\"사는 것의 의미는 무엇인가? 그것은 전부다 - 단순한 질문임에도 세월이 흐를수록 점차 우리를 옥죄어오는 질문이다. 위대한 깨달음은 결코 오지 않았다. 어쩌면 위대한 깨달음은 영원히 오지 않았을지도 모른다. 그런 대신 일상 속의 작은 기적과 일깨움, 어둠 속에서 뜻밖의 불씨가 있었다. 바로 그것이 깨달음이었다.\"\n- 버지니아 울프의 《등대로》에서"
 manzoni.1010.g: "가문이라..."
 manzoni.1307.t: "《부덴브로크가의 사람들: 어느 한 가족의 몰락》"
 manzoni.1307.d: "《부덴브로크가의 사람들: 어느 한 가족의 몰락》은 독일어로 쓰인 최초의 사회 소설이다. 이 소설에서 [SCOPE.sCharacter('manzoni_writer_scope').GetFullName](은)는 한자 동맹 도시 뤼베크에서 4대에 걸쳐 부유했던 상인 가문이 몰락하는 모습을 그리고 있다."
 manzoni.1307.f: "\"행복과 성공이 겉으로 드러나 눈에 보이는 물질적 징표와 상징은 몰락의 과정이 이미 시작된 후에야 드러나는 경우가 많다. 겉으로 드러나는 현상은 시간이 걸리기 마련이다. 마치 저 하늘의 별빛처럼, 우리 눈에 가장 밝게 빛날 때, 이미 꺼져가는 것처럼 말이다.\"\n- 토마스 만의 《부덴브로크가의 사람들: 어느 한 가족의 몰락》에서"
 manzoni.1307.g: "가문이 몰락하지 않았으면 좋겠군."
 manzoni.1404.t: "《동백꽃을 들고 있는 여인》"
 manzoni.1404.d: "《동백꽃을 들고 있는 여인》(춘희)는 [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]의 자전적 이야기를 담은 연애 소설이다. 아르망과 매춘부 마르그리트의 영원한 사랑을 아르망의 아버지가 가로막고 나선다. 아들의 사랑이 딸의 결혼 기회를 망칠까 봐 걱정하여 마르그리트에게 아르망에게서 떠나라고 설득한 것이다. 과연 아르망은 이 사실을 알게 될 것인가?"
 manzoni.1404.f: "\"그녀는 작은 것에서 기쁨을 찾는 아이와도 같았다. 어떤 날에는 열 살짜리 아이처럼 정원에서 나비나 잠자리를 쫓아다니기도 했다. 온 가족이 편안히 먹고 살 만큼 많은 돈을 들여 꽃다발을 사 모았던 이 매춘부는 때때로 잔디밭에 앉아 자신의 이름과 똑같은 소박한 꽃, 동백꽃을  한 시간씩 바라보곤 했다.\"\n-알렉상드르 뒤마 피스의 《동백꽃을 들고 있는 여인》에서"
 manzoni.1404.g: "아, 영원히 그치지 않을 사랑이여!"
 manzoni.1405.t: "《보바리 부인》"
 manzoni.1405.d: "《보바리 부인》은 [SCOPE.sCharacter('manzoni_writer_scope').GetFullName](이)가 쓴 사실주의 소설이다. 주인공 엠마 보바리는 프랑스 시골 생활과 남편에 환멸을 느끼고 다른 남자들과의 연애에 빠져든다. 그리고 가진 돈보다 훨씬 많은 돈을 써대며 빚더미에 앉게 된다. 과연 보바리는 빚을 갚을 수 있을 것인가?"
 manzoni.1405.f: "\"허나 마음 속 갚은 곳에서는 뭔가 일어나기를 바라고 있었다. 마치 난파된 선원처럼 절망적인 눈빛으로 자신의 고독한 삶을 바라보며, 지평선 너머 안개 속에서 흰 돛단배를 찾았다. 그 기회가 어떤 것일지, 어떤 바람이 불어올지, 어떤 해안가로 이끌지, 작은 배일지 아니면 삼단 범선일지, 창 너머로 고통이 가득할지 아니면 환희로 가득찰 지 그녀는 알지 못했다. 하지만 매일 아침 눈을 뜨면 그날이 오기를 간절히 바랐다. 온 소리에 귀 기울이고, 퍼뜩 놀라 일어나고, 오지 않으면 의아해했다. 그리고 해가 질 무렵이면 늘상 더욱 슬퍼져 내일을 애타게 기다렸다.\"\n- 퀴스타브 플로베르의 《보바리 부인》에서"
 manzoni.1405.g: "이 책은 좀... 이상하구만."
 manzoni.1406.t: "《비계 덩어리》"
 manzoni.1406.d: "《비계 덩어리》는 [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]의 단편 소설이다. 프로이센이 노르망디 일부 지역을 점령하자 한 무리의 프랑스인들이 고향을 떠나려다 실수로 점령지에 들어가 기약 없이 붙들리고 만다. 이때 함께 여정에 나섰던 매춘부 '불 드 쉬프'는 독일 장교가 자신과 관계를 맺어야 풀어주지 않겠느냐고 제안한다. 처음에는 다른 사람들도 그녀를 지지하지만, 며칠 뒤 상황이 바뀌어버리고 마는데..."
 manzoni.1406.f: "\"어두운 방에 갇힌 마을 사람들은 마치 어떤 재앙에 갇힌 듯, 여느 지혜나 저항도 무용지물이 된 파괴적인 지진을 겪는 듯이 멍하니 있었다. 이런 감정은 기존 질서가 무너지고, 안전이 파괴되고, 지금껏 인간이나 자연의 법칙으로 보호되어 왔던 모든 것이 갑자기 무자비하고 잔혹한 폭력에 노출되는 매 순간마다 생겨난다.\"\n- 기 드 모파상의 《비계 덩어리》에서"
 manzoni.1406.g: "자신의 구원자를 그렇게 속여먹다니..."
 manzoni.1407.t: "《괴도신사 아르센 뤼팽》"
 manzoni.1407.d: "《괴도신사 아르센 뤼팽》은 괴도 신사 아르센 뤼팽을 주인공으로 한 단편 소설 모음집이다. [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] 작가가 쓴 이 소설들은 뤼팽이 처음 체포되고 감옥에서 탈옥하며, 마지막에는 셜록 홈즈와 마주하게 되는 과정을 그리고 있다."
 manzoni.1407.f: "\"내가 정직한 사람이 아니라는 게 얼마나 안타까운지!\"\n- 모리스 르블랑의 《괴도신사 아르센 뤼팽》에서"
 manzoni.1407.g: "셜록 홈즈와 아르센 뤼팽 중에 누가 더 훌륭한지 궁금하구만."
 manzoni.1408.t: "《잃어버린 시간을 찾아서》"
 manzoni.1408.d: "《잃어버린 시간을 찾아서》는 19세기 말과 20세기 초 프랑스 상류 사회를 배경으로 화자가 어린 시절과 성인이 된 후의 경험을 돌이켜보는 이야기다. [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] 작가는 특히 무의식적 기억을 중요한 줄거리 장치로 활용하고 있다."
 manzoni.1408.f: "\"우리와 타인 간의 유대는 오직 우리 마음 속에만 존재한다. 기억이 희미해질수록 그 유대는 약해지고 사랑과 우정, 예의, 존경, 의무로 타인을 속이려 하면서도 속고 싶은 환상에도 우리는 홀로 존재한다. 인간은 자기 자신으로부터 벗어날 수 없는 존재이며, 타인을 오직 본인 안에서만 안다. 그리고 그 반대를 주장한다면 거짓말을 하고 있는 것이다.\"\n- 마르셀 프루스트의 《잃어버린 시간을 찾아서》에서"
 manzoni.1408.g: "이 책을 읽어보니 문득 무언가가 생각나는군..."
 manzoni.1409.t: "《사랑의 요정》"
 manzoni.1409.d: "《사랑의 요정》은 이름난 농부 집안의 쌍둥이 형제가 파데트와 사랑에 빠지는 이야기를 그린다. 처음에 이들의 관계는 마을의 가부장적 규범과 기대에 어긋나지만, 파데트가 막대한 유산을 상속받으면서 모든 것이 바뀐다. [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] 작가는 시골 출신이란 경험을 통해 마을과 주민들을 생생하게 그려내고 있다."
 manzoni.1409.f: "\"신은 자신을 버리는 자만을 버린다. 슬픔을 마음 속에 묻어둘 용기가 있는 자는 불평하는 자보다 슬픔과 싸울 힘이 더 강하다.\"\n- 조르주 상드의 《사랑의 요정》에서"
 manzoni.1409.g: "총명한 젊은이들이로군!"
 manzoni.1501.t: "《톰 아저씨의 오두막》"
 manzoni.1501.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]의 《톰 아저씨의 오두막》은 노예제의 악독함과 참혹함을 묘사한 소설이다. 이 책은 비참함과 고통으로 점철된 여러 노예들의 삶을 그리고 있다."
 manzoni.1501.f: "\"...마음은 눈물을 흘릴 수 없다. 오로지 피만 흘릴 뿐, 소리 없이 스스로를 피 흘리게 하는 것이다.\"\n- 해리엇 비처 스토의 《톰 아저씨의 오두막》에서"
 manzoni.1501.g: "정말 끔찍한 이야기일세!"
 manzoni.1502.t: "《벤허》"
 manzoni.1502.d: "《벤허》에서 [SCOPE.sCharacter('manzoni_writer_scope').GetFullName](은)는 로마에 의해 노예가 되어 전차를 몰게 된 유대인 왕자 유다 벤허의 삶을 그리고 있다. 소설에 예수의 삶을 반영한 것이 특징이다."
 manzoni.1502.f: "\"하나님을 믿는 것이 더 아름답다. 이 세상의 아름다움은 모두 주님의 손에서 나온 것이며 그 자체로 완벽하기 그지 없다. 주님은 모든 형상의 창조자이시며 백합을 물들이시고 장미를 물들이시고 이슬방울을 깨끗이 하시고 자연의 음악을 만드셨노라. 한마디로 주님은 우리를 이 세상에 창조하시고 주변을 정하셨다. 그렇기에 나는 어린아이처럼 주님께 내 영혼의 창조와 사후세계로의 온 준비를 맡기노라. 나는 주님이 나를 사랑하신다는 것을 안다.\"\n- 루 월리스의 《벤허》에서"
 manzoni.1502.g: "진정한 기독교인일세!"
 manzoni.1503.t: "《모비딕》"
 manzoni.1503.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]의 《모비딕》은 흰 고래를 잡으려는 아합 선장의 집착을 젊은 선원 이스마엘의 시점에서 그려낸 이야기다. 고래에게 종아리를 물어뜯긴 아합 선장은 삶의 유일한 목적으로 복수만을 생각하게 된다."
 manzoni.1503.f: "\"내 입가가 굳어진 것을 느낀 순간, 나의 영혼이 축축하고 이슬비 내리는 11월처럼 느끼는 순간, 나도 모르게 관 창고 앞에 멈춰서서 마주치는 온 장례 행렬의 맨 끝을 따라가는 순간, 그리고 무엇보다도 나의 우울증이 도져서 일부러 거리로 나가, 사람들의 모자를 마구 던져버리고 싶은 충동을 억누르려 확고한 도덕적 원칙이 필요한 순간, 그런 순간이야말로 내가 바다로 나갈 때가 되었음을 헤아린다.\"\n- 허먼 멜빌의 《모비딕》에서"
 manzoni.1503.g: "나의 고래는 어디 있는가?"
 manzoni.2100.t: "《상창우록》"
 manzoni.2100.d: "《상창우록》(桑滄偶錄, Tang Thương Ngẫu Lục)은 베트남의 학자 판딤호와 응우옌안이 엮은 설화 모음집으로, 18세기 말에서 19세기 초 베트남의 종교, 사회적 사건을 기록하고 있다. 상하권의 두 권으로 나뉘어 설화 89편을 담은 이 책은 위대한 인물의 이야기, 아름다운 유람기, 오랜 유물 이야기, 지역의 전승까지 다루고 있다. 레 왕조 말기와 응우옌 왕조 초기의 격동적인 시대 속에서 베트남 사람들의 삶을 엿볼 수 있는 독특한 시각을 제공하고 있다."
 manzoni.2100.f: "리, 쩐, 레, 찐 왕조를 거쳐 오늘날까지 수백 년에 이르는 세월 동안, 사서에도 없고 전승으로도 전해지지 않는 이야기들이 많다. 이에 두 사람은 세월의 흐름이란 비애 속에서 그러한 이야기들을 엮기로 하였다. 만일 그 이야기들을 소홀히 여겨 잊기로 하였다면 얼마나 영원히 남아 있겠는가. 다행히 붓을 들어 그것을 기록하였기에, 이 이야기들은 환상의 해안으로 실어 나르는 뗏목이자 어둠을 밝히는 빛이 되었다. 이에 표제를 '상창우록'(桑滄偶錄, 세상의 뒤바뀜 속 우연한 기록)이라 하여 그 뜻을 헤아릴 수 있겠다."
 manzoni.2100.g: "어두웠던 시대의 이야기를 통해 우리는 더 나은 사람이 되리라."
 manzoni.2200.t: "명예를 건 결투"
 manzoni.2200.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetLastName](이)가 아내의 구혼자로 알려진 조르주 당테스에게 상당히 모욕적인 편지를 보내고 당테스가 결투를 신청하였다는 소식이다. 이제 두 사람이 서로를 마주할 순간이 찾아왔다."
 manzoni.2200.f: "\"결투의 규칙은 두 사람이 합의된 거리를 두고 일렬로 서는 겁니다. 서로 등을 돌리고, 신호가 울리면 두 사람이 돌아서서 서로를 향해 걸어가십시오. 그리고 언제 총을 쏠지 결정합니다. 먼저 쏜 사람은 그 자리에 가만히 서 있으십시오\n두 분 모두 이 규칙에 동의하십니까?\""
 manzoni.2200.g: "살아남았으면 좋겠군!"
 manzoni.2200.h: "골칫거리였는데 잘 됐군!"
 manzoni.2201.t: "《죄와 벌》"
 manzoni.2201.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]의 《죄와 벌》은 상트페테르부르크에 사는 가난한 졸업생 로디온 라스콜니코프가, 전당포를 운영하며 돈과 귀중품을 아파트에 보관하는 파렴치한 노파를 살해할 계획을 세우면서, 정신적 고뇌와 도덕적 딜레마를 겪는 모습을 그린다."
 manzoni.2201.f: "\"고통과 괴로움은 드넓은 지성과 깊은 마음을 가진 자에게 늘상 피할 수 없는 것이다. 진정 위대한 사람은 이 세상에서 큰 슬픔을 겪어야 한다.\"\n- 표도르 도스토옙스키의 《죄와 벌》에서"
 manzoni.2201.g: "아무것도 빚지지 않아 다행이군!"
 manzoni.2202.t: "《전쟁과 평화》"
 manzoni.2202.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]의 《전쟁과 평화》는 소작농에서 귀족에 이르기까지 다양한 배경을 지닌 여러 인물들을 그리고 있다. 나폴레옹 전쟁기를 바탕으로 삼은 이 소설은 전쟁으로 세 주인공의 삶이 어떻게 바뀌었는가를 다루었다."
 manzoni.2202.f: "\"옳고 그름을 판단하는 것은 인간에게 주어진 일이 아니다. 인간은 늘 실수했고 앞으로도 실수할 것이며, 특히 옳고 그름에 대한 생각에 있어서는 더할 나위가 없다.\"\n- 레오 톨스토이의 《전쟁과 평화》에서"
 manzoni.2202.g: "참 명작이군! 내용이 좀 길긴 하지만..."
 manzoni.2300.t: "《당세서생기질》"
 manzoni.2300.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]의 《당세서생기질》(当世書生気質)은 일본 최초의 근대 문학소설로 평가받는 작품이다. 그가 쓴 비평서 《소설신수》(小説神髄)와 함께 일본에서 근대 소설과 희곡이 널리 받아들여지는 데 보탬이 되고 있다."
 manzoni.2300.f: ""
 manzoni.2300.g: "이제 일본에서도 근대 소설을!"
 manzoni.2400.t: "《브라스 쿠바스의 회고록》"
 manzoni.2400.d: "《브라스 쿠바스의 회고록》에서 [SCOPE.sCharacter('manzoni_writer_scope').GetFullName](은)는 주인공 브라스 쿠바스가 세상을 떠나고 본인의 삶을 회고하는 식으로 이야기를 전개한다. 이를 통해 쿠바스는 브라질 사회를 비판한다. 마샤두의 사실주의 소설 가운데 첫 작품에 해당하는 것으로, 일부 등장인물과 요소는 이후 작품에서도 다시 등장한다."
 manzoni.2400.f: "\"내 차가운 시신의 살점을 처음 갉아먹은 벌레에게, 이 회고록을 애정 어린 마음으로 바칩니다.\"\n- 마샤두 지 아시스의 《브라스 쿠바스의 회고록》에서"
 manzoni.2400.g: "죽은 자에게 욕을 먹다니!"
 manzoni.2401.t: "《이라세마》"
 manzoni.2401.d: "《이라세마》는 브라질인의 탄생을 다루는 [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]의 또다른 단편 소설이다. 원주민 이라세마와 포르투갈 식민개척자 마르팀, 그리고 두 사람 사이에서 아들 모아시르가 태어나 살아가는 이야기를 다뤘다. 책 제목은 '아메리카'(America)의 철자를 뒤바꾼 것으로 아메리카의 식민지 개척이라는 주제를 잘 나타내고 있다."
 manzoni.2401.f: "\"내가 태어난 고장의 푸르고 거친 바다, 그곳에서 잔다이아는 카르나우바 나무 이파리 사이에서 노래한다.\"\n- 조제 지 알렝카르의 《이라세마》에서"
 manzoni.2401.g: "민족을 이룩한 소설이라..."
 manzoni.2402.t: "《코르티수》"
 manzoni.2402.d: "《코르티수》(달동네)는 [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]의 사실주의 소설이다. 이 책에서 [SCOPE.sCharacter('manzoni_writer_scope').GetLastName](은)는 달동네에 사는 여러 포르투갈인과 여타 이민자들의 삶을 그리고 있다. 이들 모두가 새로운 보금자리에 적응하고 변화해 나간다."
 manzoni.2402.f: "\"그리고 그 질척거리고 김이 피어오르는 땅 속에서, 그 뜨겁고 질퍽한 습기 속에서, 세상이 싹트고 자라기 시작하매, 살아 있는 것, 한 세대가 마치 그 진흙 속에서 절로 솟아나와, 거름 속 구더기처럼 번식하는 듯하더라.\"\n- 알루이지우 아제베두의 《코르티수》에서"
 manzoni.2402.g: "어떻게 그런 달동네를 내버려둘 수 있단 말인가?"
 manzoni.2500.t: "《광인일기》"
 manzoni.2500.d: "《광인일기》(狂人日記)는 [SCOPE.sCharacter('manzoni_writer_scope').GetFullName](이)가 백화문(구어체 중국어)으로 쓴 중국 근대 소설이다. 화자의 형이 주변 사람들을 식인종이라 의심하고 본인을 자살로 몰아넣는다고 생각하며 조금씩 미쳐가는 과정을 그리고 있다."
 manzoni.2500.f: "\"나는 그 웃음 속에 용기와 정의가 있음을 알았다. 노인과 형은 얼굴빛이 창백해졌는데 내 용기와 정의에 압도된 것이다.\"\n-루쉰의 《광인일기》에서"
 manzoni.2500.g: "그래도 내 주변에 식인종이 있진 않으니까!"
 manzoni_beautiful_illustrations_modfier: "아름다운 삽화"
 manzoni_alien_theories_modfier: "외계 생명체 이론"
 manzoni_adventure_idea_modifier: "모험 소재"
 manzoni.332.d: "세계적으로 유명한 작가가 우리나라에 경의를 표했다. 현재 [SCOPE.sCharacter('manzoni_writer_scope').GetSheHe|U]는 순회 낭독회에 나서고 있다."
 manzoni.332.f: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName](은)는 명성 [SCOPE.sCharacter('manzoni_writer_scope').MakeScope.GetVariable('manzoni_writer_experience').GetValue|V0]을 지닌 [SCOPE.sCharacter('manzoni_writer_scope').GetHomeCountry.GetName]의 작가입니다. 이 작가의 수많은 작품 가운데 베스트셀러로 평가받는 것은 총 [SCOPE.sCharacter('manzoni_writer_scope').MakeScope.GetVariable('manzoni_num_bestsellers_var').GetValue|V0]편이며, 작가의 작품이 출간된 국가는 [SCOPE.sCharacter('manzoni_writer_scope').MakeScope.GetVariable('manzoni_num_book_licenses_var').GetValue|V0]개국에 달합니다."
