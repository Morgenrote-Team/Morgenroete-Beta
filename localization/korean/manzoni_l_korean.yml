 notification_manzoni_anthology_meets_taste_notification_desc: "우리 [concept_manzoni_writer]가 대중의 취향을 충족하는 시집을 출간하였습니다. 우리는 [concept_manzoni_literary_tradition] #G 30#!을 획득하고, [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]에게는 #V 명성#! #G 50#!이 부여됩니다."
 notification_manzoni_anthology_close_taste_notification_name: "신규 시집"
 notification_manzoni_anthology_close_taste_notification_desc: "우리 [concept_manzoni_writer]가 평론가들의 주목을 받은 새로운 시집을 출간하였습니다. 우리는 [concept_manzoni_literary_tradition] #G 15#!를 획득하고, [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]에게는 #V 명성#! #G 25#!가 부여됩니다."
 notification_manzoni_anthology_no_taste_notification_name: "비인기 시집"
 notification_manzoni_anthology_no_taste_notification_desc: "우리 [concept_manzoni_writer]가 새로운 시집을 출간하였으나 대중의 관심을 끌지 못했습니다. 우리는 [concept_manzoni_literary_tradition] #G 5#!를 획득하고, [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]에게는 #V 명성#! #G 10#!이 부여됩니다."
 manzoni.1001.t: "《호빗》"
 manzoni.1001.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName](이)가 출판한 소설이 순식간에 베스트셀러로 등극했다. 이 이야기는 [SCOPE.sCharacter('manzoni_writer_scope').GetLastName](이)가 창조한 환상 세계에서 호빗이 떠난 모험을 조명하고 있다. 작가가 앞으로 이 중간계라는 세계를 무대로 더 많은 소설을 써 주기를 기대해 본다!"
 manzoni.1001.f: "\"땅 위의 어느 굴에 호빗이 살고 있었다. 지저분하고 더럽고 축축한 굴도, 반토막난 벌레나 쿰쿰한 냄새로 가득찬 굴도, 그렇다고 앉을 데도 없고 먹을 것도 없는, 건조하거나 척박한 굴도 아니었다. 그것은 호빗굴, 편안한 보금자리였다.\"\n-J.R.R 톨킨의《호빗》에서"
 manzoni.1001.g: "참으로 놀라운 세계관을 만들어냈군!"
 manzoni.1002.t: "《우주 전쟁》"
 manzoni.1002.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]의 《우주 전쟁》은 외계인의 지구 침공을 다룬 공상과학 소설이다. 외계인들이 세발 달린 전쟁 기계를 타고 일으키는 파괴와 고통을 체험해 보라. 인류는 승리할 것인가, 아니면 화성인들에게 멸망당하고 말 것인가?"
 manzoni.1002.f: "\"이게 무슨 전쟁인가.\" 포병이 말했다. \"전쟁일 수가 없소, 인간과 개미 사이에 전쟁이 있을 수 없는 것처럼 말이오.\"\n- H.G. 웰스의 《우주 전쟁》에서"
 manzoni.1002.g: "정말 저 너머에 외계 침략자들이 있는 것일까?"
 manzoni.1100.t: "《하이디》"
 manzoni.1100.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName](이)가 알프스 산맥에서 할아버지와 함께 사는 고아 소녀에 대한 이야기를 선보였다. 《하이디, 방랑과 배움의 나날들》이란 제목의 이 책은 하이디가 할아버지와 깊은 유대를 만들고 함께 행복한 나날을 누리는 모습을 그린다. 그러나 하이디는 사업가 딸 클라라 슈트레제만과 함께 살고자 프랑크푸르트로 이사하게 되면서 할아버지와 헤어지게 된다. 과연 하이디는 할아버지를 다시 만날 수 있을까?"
 manzoni.1100.f: "\"전 발이 가벼운 염소처럼 살고 싶어요.\"\n- 요한나 슈피리의 《하이디》"
 manzoni.1101.t: "《옷이 사람을 만든다》"
 manzoni.1101.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName](은)는 무명 작가가 아니다. 《푸른 하인리히》, 《젤드빌라의 사람들》과 같은 작품을 발표하였으며, 최신작 〈옷이 사람을 만든다〉는 《젤드빌라의 사람들》의 제2부에 수록된 소설이다. 사장으로부터 임금을 받지 못한 견습 재단사가 길 가던 중 마차에 태워져 골다흐 마을에 도착하게 된다. 마차를 타고 온 데다 옷차림새도 호화롭고, 콧수염도 깔끔하게 다듬어져 마을 사람들로부터 귀족이라는 오해를 받는다. 수줍음이 많았던 그는 오해를 풀지 못한다. 과연 마을 사람들은 재단사의 비밀을 알게 될 것인가?"
 manzoni.1101.f: "\"공작이 땅과 백성을 빼앗기고, 사제가 믿음 없이 교회의 교리를 설파하면서도 한직에서 얻은 이익을 품위 있게 누리고, 자만심 가득한 교사가 본인의 학술적 가치는 아랑곳않고 학문 발전에 조금도 기여하지 않으면서 교육자로서의 명예와 혜택을 독차지하고, 덕 없는 예술가가 천박한 거래와 허황된 눈속임으로 명성을 얻으며 정직하게 일하는 사람들의 살림과 명예를 빼앗고, 사기꾼이 거대 기업의 직무를 상속받거나 사기로 얻어 수천의 재고를 떼간다. 이 모든 사람들은 본인의 장래를 걱정하기는커녕 오히려 얻어걸린 것에 기뻐하며 즐거운 친구들과 함께 저녁 시간을 빼놓지 않고 보낸다.\"\n-고트프리트 켈러의 《옷이 사람을 만든다》에서"
 manzoni.1102.t: "《머슴 울리》"
 manzoni.1102.d: "스위스 목사 알베르트 비치우스가 [SCOPE.sCharacter('manzoni_writer_scope').GetFullName](이)라는 필명으로 《머슴 울리》라는 책을 출간하였다. 이 책은 고트헬프의 전형적인 소설로서 농부 울리(울리크)가 게으름을 이겨내고 만족을 찾아가는 과정을 그리고 있다. 이 과정에서 울리는 여러 모범 대상들을 찾고 수많은 윗사람들에게 복종해야만 한다."
 manzoni.1102.f: "\"잘 들어라, 울리.\" 주인이 말했다. \"이대로는 안 돼. 나한테 버릇 없이 대하는 것도 그렇고, 밍기적대는 것도 한두번이 아니야. 머릿속에 밥하고 술만 가득 찬 놈에게 말과 소를 맡길 순 없어. 그런 놈에게 등불 쥐이고 마구간에 들여보낼 순 없고, 특히 너처럼 땅딸막한 놈이면 더더욱 안 돼. 그런 꼴사나운 농가를 너무 많이 봐 왔거든. 네가 무슨 생각을 하는 지, 앞으로 어쩌려는 건지 나는 모르겠다.\" 울리는 아직 아무 생각도 없고, 자기 일은 다 했을 뿐이고, 아무도 자기 일을 대신할 필요도 없으며, 술값도 내주는 사람이 없는 상황에서 뭘 어떻게 마시든 남이 상관할 바 아니고, 내 돈으로 마실 뿐이라고 답했다. \"근데 넌 나의 하인이란 말이야.\" 주인이 다시 말했다.\n예레미아스 고트헬프의 《머슴 울리》에서"
 manzoni.1103.t: "《황야의 이리》"
 manzoni.1103.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName](이)가 베젤에 머물면서 집필한 신간 소설 《황야의 이리》를 출간하였다. 헤세는 《싯다르타》 등의 작품으로 이미 유명한 작가다. 본인의 신작에서 중년의 해리 할러는 부르주아 사회에 불만을 품고 자살까지 생각하지만, 젊은 허마이어니과 동료들을 만나면서 인생이 바뀐다. 허마이어니는 때로는 매춘을 하는 등 늘상 좋은 사람으로 다가오지는 않지만, 해리가 이전에 경험하지 못했던 것을 접하게 해 주고 그 내면에 숨겨진 '황야의 이리'를 일깨워 준다."
 manzoni.1103.f: "\"내가 늘 가장 증오하고 혐오하고 저주했던 것은 바로 이 만족감, 이 건강함과 안락함, 조심스레 지켜온 중산층의 낙관주의, 풍족하고 안락한 보통 사람의 무리였다.\"\n-헤르만 헤세의 《황야의 이리》에서"
 manzoni.1104.t: "《알베르트의 역사》"
 manzoni.1104.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName](이)가 《알베르트의 역사》라는 만화를 새로 출간하였다. 전통적인 문학은 아니지만 일련의 그림 칸과 그 밑에 짤막한 문구를 적은 구성을 취했다. 그 내용은 제네바의 격동기 속에서 자신의 길을 찾으려 애쓰는 한 젊은이가 결국 급진파가 되어버리는 과정을 풍자적으로 그린 것이다."
 manzoni.1104.f: "\"더러운 피가\n우리 밭고랑을 적시게 하소서!\n우리 밭고랑을 적시게 하소서!\"\n-로돌프 퇴퍼의 《알베르트의 역사》에서"
 manzoni.1105.t: "《산 위의 대공포》"
 manzoni.1105.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName](이)가 스위스 알프스를 배경으로 한 문학 걸작을 써냈다. 이 작품에서 작가는 공포가 우리에게 어떤 영향을 끼치는지를 탐구한다. 평론계에서는 《산속의 대공포》가 [GetPlayer.GetNameNoFormatting]의 불확실성을 반영한다고 평가하고 있다."
 manzoni.1105.f: "\"태양은 더 이상 떠오르지 않았다. 우리 위로 거대한 그림자만이 드리워졌다. 그러다 그 그림자가 우리 뒤에서 빠른 속도로 비탈길을 오르는 것을 보았다. 먼저 풀밭의 비탈길을, 그 다음 바위들을 차례로 오르며 모든 풍경과 빛깔, 이윽고 날씨까지 바꾸어갔다.\"\n- C.F. 라뮈즈의 《산 속의 대공포》에서"
 manzoni.1105.g: "공포가 우리에게 끼치는 것은 무엇인가?"
 manzoni.1400.t: "《80일간의 세계 일주》"
 manzoni.1400.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]의 대작 《80일간의 세계 일주》는 필리어스 포그와 하인 파스파르투가 내기에서 이기기 위하여 전세계를 80일 이내에 일주하기로 하고, 수많은 나라들을 방문하며 위대한 모험에 나서는 이야기를 다뤘다."
 manzoni.1400.f: "\"한 사람이 상상할 수 있는 것이라면 무엇이든, 다른 사람이 현실로 만들 수 있다.\"\n- 쥘 베른의 《80일간의 세계 일주》에서"
 manzoni.1400.g: "언젠가는 하루 만에 지구 한 바퀴를 돌 수 있을런지 궁금하군."
 manzoni.1401.t: "《인간희극》"
 manzoni.1401.d: "《인간희극》은 [SCOPE.sCharacter('manzoni_writer_scope').GetFullName](이)가 쓴 소설로, 여러 권에 걸쳐 서로 간에 연결된 이야기를 담고 있다. 이 소설을 통해 [SCOPE.sCharacter('manzoni_writer_scope').GetLastNameNoFormatting](은)는 프랑스 사람들의 일상생활을 엿볼 수 있게 해주고 있다."
 manzoni.1401.f: "\"사람이 온종일 악행만 저지를 순 없다. 해적들과 함께 있다 하더라도 그들의 음침한 배 위에서 마치 호화 요트에 탄 기분을 느끼는 달콤한 순간이 있을 것이다.\"\n-오노레 드 발자크의 《인간희극》에서"
 manzoni.1401.g: "그래서 프랑스의 보통 사람들은 어떻게 산다고?"
 manzoni.1402.t: "《삼총사》"
 manzoni.1402.d: "《삼총사》는 프랑스의 루이 13세 시대를 배경으로 삼총사 아토스, 포르토스, 아라미스와 달타냥의 모험을 다루고 있다. [SCOPE.sCharacter('manzoni_writer_scope').GetFullName](이)가 쓴 이 소설은 출시된 지 며칠 만에 벌써 상당한 유명세를 누리고 있다."
 manzoni.1402.f: "\"사악한 자는 정직한 자처럼 웃지 않고, 위선스러운 자는 진실한 자처럼 눈물을 흘리지 않는다. 모든 거짓은 가면과도 같다. 아무리 정교하게 만든 가면이라도 조금만 자세히 살펴보면 진실과 구별할 수 있는 것이다.\"\n-알렉상드르 뒤마의 《삼총사》에서"
 manzoni.1402.g: "하나는 모두를 위하여, 모두는 하나를 위하여!"
 manzoni.1500.t: "〈갈까마귀〉"
 manzoni.1500.d: "〈갈까마귀〉는 [SCOPE.sCharacter('manzoni_writer_scope').GetFullName](이)가 쓴 서사시다. 시의 내용은 죽은 레노어를 애도하는 남자에게 까마귀가 찾아오고, 남자가 까마귀에게 말을 걸려고 하지만 \"더는 없다\"는 대답만 돌아오는 상황을 담고 있다."
 manzoni.1500.f: "언젠가 쓸쓸한 한밤중 내가 피로와 슬픔에 젖어\n잊혀진 전설의, 기묘하고 신비로운 얘기책을 떠올리다 선잠이 들어 머릴 꾸벅일 때\n갑자기 들려왔지. 문 두드리는 소리가-.\n누군가 살며시 나의 방문을 두드리는 소리.\n\"누가 왔나 봐\", 혼자 중얼거렸지.\n\"방문을 두드리기만 하며 딴 짓은 않고\"\n-에드가 엘런 포의 〈갈까마귀〉에서"
 manzoni.1500.g: "검은 그림자가 남자 위로 드리워졌구나..."
 manzoni.1600.t: "《닐스의 이상한 여행》"
 manzoni.1600.d: "《닐스 홀게르손의 이상한 스웨덴 여행》(닐스의 신기한 여행)은 [SCOPE.sCharacter('manzoni_writer_scope').GetFullName](이)가 지은 아동 서적이다. 이 책에서 닐스 홀게르손은 난쟁이 톰테로 변신하여 갑자기 동물들과 대화할 수 있게 된다. 얼마 뒤 홀게르손은 집에서 키우던 거위 마틴과 함께 야생 거위 무리에 합류하여 스웨덴 전역을 여행한다. 그 여정을 마치고 닐스는 더 나은 사람으로 거듭나게 된다."
 manzoni.1600.f: "\"그 아이는 별 볼일 없는 아이였다. 가장 좋아하는 것은 먹고 자는 것이었고, 그 다음으로는 장난치는 걸 좋아했다.\"\n- 셀마 라겔뢰프 《닐스의 이상한 여행》에서"
 manzoni.1600.g: "듣자하니 놀라운 모험일 듯 하군!"
 manzoni.1700.t: "《변신》"
 manzoni.1700.d: "내가 갑자기 거대한 벌레로 변한다면. [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]의 《변신》은 바로 그 시나리오를 탐구하고 있다. 가족의 생계를 홀로 책임지는 그레고르 삼사가 어느 날 갑자기 바퀴벌레로 변해 더 이상 돈을 벌 수 없게 되자, 스스로 가족에게 얼마나 하찮은 존재였던가를 깨닫는다."
 manzoni.1700.f: "\"사소한 부주의조차 곧바로 심각한 의심을 불러일으키는 회사에서 일해야 한다니, 이 무슨 기구한 운명인가! 설령 전 직원이 악당 무리에 불과하더라도, 그 중에 아침에 근무 시간을 단 한두 시간만 날렸다 해서, 양심의 가책에 시달려 미쳐버릴 지경이 되어 침대에서 일어나지도 못할 만큼, 충성스럽고 헌신적인 사원이 단 한 명이라도 있지 않겠나?\"\n-프란츠 카프카의 《변신》에서"
 manzoni.1700.g: "에그! 벌레라니!"
 manzoni.1701.t: "《특색 없는 남자》"
 manzoni.1701.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]의 《특색 없는 남자》는 제1차 세계 대전 발발 직전의 오스트리아 빈을 배경으로, 유혹적이고 회의적인 성격의 전직 군인이자 과학자 울리히가 프란츠 요제프 황제의 즉위 70주년 행사라는 거대 계획에 휘말리면서 벌어지는 이야기를 그린 위대한 사상 소설이다."
 manzoni.1701.f: "\"훌륭한 사서의 비결은 본인이 맡은 책의 제목과 목차 외에는 절대 더 이상 읽지 않는 것이다. 책을 읽기 시작하면 사서로서 길을 잃는다... 본연의 관점을 잃지 않을 수가 없는 것이다.\"\n-로베르트 무질의 《특색 없는 남자》에서"
 manzoni.1701.g: "특색 없는 남자라고?"
 manzoni.1702.t: "《광기와 우연의 역사》"
 manzoni.1702.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]의 《광기와 우연의 역사》는 14편에 달하는 일련의 역사 단편소설이다. 각 이야기에서 주인공 츠바이크는 역사의 흐름을 바꾼 일련의 순간들, 이른바 '세계의 순간들'을 그리고 있다. 이 순간들이라 함은 영웅적인 주인공이 본인의 운명을 완수하고, 그것으로 미래 세대를 위한 세상의 모습을 만들어가는 순간들이다."
 manzoni.1702.f: "\"그 순간 발보아는 선원들에게 멈추라 명령한다. 아무도 그를 따라오지 못하게 한 것인데, 미지의 바다를 처음으로 본 이 순간을 누구와도 나누고 싶지 않았기 때문이다. 발보아는 최초의 스페인인이자 유럽인이자 기독교인으로서 홀로 그리고 영원히 남고 싶었다. 온 세상의 거대한 바다인 대서양을 항해한 뒤, 이제는 또다른 미지의 바다인 태평양까지 발견한, 최초의 스페인인이자 유럽인이자 기독교인 말이다. 바스코 누녜스 데 발보아는 자랑스럽고 환희에 찬 표정으로, 자신의 눈이 유럽인 가운데 처음으로 이 바다의 무한한 푸른빛을 담았다는 사실을 음미하며 바라보고 또 바라본다.\"\n-슈테판 츠바이크의 《광기와 우연의 역사》에서"
 manzoni.1702.g: "그야말로 결정적인 순간이로군!"
 manzoni.1800.t: "《인어공주》"
 manzoni.1800.d: "인어가 육지로 이끌리는 이야기. [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]의 《인어공주》는 그렇게 시작한다. 해왕의 막내딸이 인간 왕자를 죽음에서 구해내고 사랑에 빠진다. 왕자의 마음을 얻기 위해 꼬리와 목소리를 다리로 바꾸려는 공주의 소망은 과연 행복한 결말로 끝날 것인가?"
 manzoni.1800.f: "\"무얼 바라는지 알겠군. 정말 어리석은 짓이지만, 네 뜻대로 될 거야. 그리고 너에게 슬픔을 가져다줄 거란다, 우리 예쁜 공주님.\"\n-한스 크리스티안 안데르센의 《인어공주》에서"
 manzoni.1800.g: "잠깐, 공주의 이름이 에이리얼이 아니었다고?!"
 manzoni.1900.t: "《드라큘라》"
 manzoni.1900.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]의 《드라큘라》는 선장의 항해일지부터 신문 기사, 일기의 한 장에 이르기까지 여러 관점에서 전개된다. 이야기 속 뱀파이어 드라큘라는 희생자들을 빨아먹지만 결국 사냥꾼들에게 쫒기게 된다. 사냥꾼들은 과연 살아남을 것인가? 아니면 드라큘라는 계속해서 인류를 괴롭힐 것인가?"
 manzoni.1900.f: "\"그쪽은 이해할 수 없지만 분명히 존재하는 것들이 있다고 생각하지 않습니까? 어떤 사람들은 다른 사람들이 보지 못하는 것을 보지요. 하지만 인간의 눈으로 보아서는 안 되는 오래된 것과 새로운 것이 있습니다. 그 이유는 사람들은 다른 사람이 전한 것들을 알거나, 알고 있다고 생각하기 때문입니다. 아, 우리 과학의 결점이라면 모든 것을 설명하려 한다는 것입니다. 그리고 설명하지 못하면 설명할 것이 없다고 말하지요.\"\n- 브램 스토커의 《드라큘라》에서"
 manzoni.1900.g: "슬슬 마늘 좀 사둬야겠어..."
 manzoni.2000.t: "《막스 하벌라르》"
 manzoni.2000.d: "《막스 하벌라르》는 [SCOPE.sCharacter('manzoni_writer_scope').GetFullName](이)가 네덜란드 식민 통치 하의 인도네시아에 대해 다룬 책이다. 전직 식민부 관리였던 그는 이 작품을 통해 식민 체제의 무능과 부패를 폭로하고 있다. 동시에 부르주아 계층에 대한 비판을 예견하고 풍자한다."
 manzoni.2000.f: "\"만국 국민의 양심이 유럽의 대상(大商)들이 자행한 이 잔혹한 폭정을 부르짖고 있다.\"\n- 에뒤아르트 다우어스 데커르(일명 뮐타튈리)의《막스 하벌라르》에서"
 manzoni.2000.g: "정말 끔찍한 내용이군! 무언가 조치를 취해야겠어!"
