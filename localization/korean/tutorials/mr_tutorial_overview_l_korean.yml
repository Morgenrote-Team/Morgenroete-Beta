l_korean:
 thriving_culture_lesson_start_tutorial_button_loc: "튜토리얼 시작"
 mr_tutorial_buttons: "모르겐뢰테 버튼"
 mr_tutorial_buttons_desc: "모르겐뢰테의 대다수 기능은 모르겐뢰테 창에서 이용할 수 있습니다. 사이드바의 버튼을 클릭하면 해당 창을 열 수 있습니다. 현재 존재하는 창은 다음과 같습니다.\n\n\n#V 과학 창#!: 여기서 [Concept('concept_academics_academic','$concept_academics_academics$')]와 연구 활동, [concept_academics_progress], 과학 탐사 현황을 확인할 수 있습니다.\n\n#V 예술 창#!: 여기서 [Concept('concept_artists_artist','$concept_artists_artists$')]와 창작 활동, [concept_artistic_progress], [Concept('concept_artists_art_style','$concept_artists_art_styles$')] 현황을 확인할 수 있습니다.\n\n#V 체육 창#!: 비행 분야를 비롯한 다채로운 체육 종목과 체육 관련 인물, 체육 활동, 국제 체육 기구 현황을 확인할 수 있습니다."
 mr_tutorial_science_window_open: "과학 창 열기"
 mr_tutorial_science_window_open_desc: "이제 과학 창을 살펴볼 차례입니다. 사이드바의 버튼을 클릭하거나 키보드에서 'M' 키를 눌러 과학 창을 열어주세요."
 mr_tutorial_science_window_open_tt: "과학 버튼을 클릭하거나 'M' 키를 눌러 과학 창 열기"
 mr_tutorial_science_tab: "과학 창"
 mr_tutorial_science_tab_desc: "과학 창은 과학적 시도에 관한 현황과 활동을 확인할 수 있는 곳입니다.\n\n\n총 4개의 탭으로 나누어져 있습니다.\n\n#V 개요#!: 이 탭에는 [concept_academics_progress], #V 일반 과학 탐사#!, #V 과학 특화 분야#!를 확인할 수 있습니다.\n\n#V 수학-기술#!: 이 탭에는 [concept_tesla_engineer], [concept_mendelejew_chemist], [concept_verrier_astronomer]를 확인할 수 있습니다.\n\n[concept_dubois_natural_history]: 이 탭에는 [concept_agassiz_geologist], [concept_dubois_paleontologist], [concept_dubois_naturalist]를 확인할 수 있습니다.\n\n#V 인문-인류학#!: 이 탭에는 [concept_panum_physician], [concept_lepsius_archaeologist], [concept_lepsius_anthropologist]를 확인할 수 있습니다."
 mr_tutorial_science_tab_tt: "과학 창이 열립니다"
 mr_tutorial_science_overview_tab_open: "개요 탭 열기"
 mr_tutorial_science_overview_tab_open_desc: "개요 탭에서는 [concept_academics_progress], #V 과학 탐사 현황#!, #V 과학 집중 과제#!를 둘러볼 수 있습니다.\n\n 탭 버튼을 클릭하여 개요 탭으로 들어가 보세요."
 mr_tutorial_science_overview_tab_open_tt: "탭 버튼을 클릭하여 개요 탭으로 들어가세요."
 mr_tutorial_science_overview_tab_promote_academics: "학계 후원"
 mr_tutorial_science_overview_tab_promote_academics_desc: "모르겐뢰테의 핵심은 인물입니다. 하지만 이러한 인물들은 어떻게 얻을 수 있을까요?\n\n새로운 [concept_academics_academic]을 얻으려면 충분한 [concept_academics_progress]를 축적해야 합니다. 진행도 막대에 마우스를 올리면 어떤 요소들이 진척도 증가에 영향을 주는지 확인할 수 있습니다.\n\n[concept_academics_university_specialization]이 있는 대학교를 보유하고 있다면 특정 학자를 우대하여 영입할 수 있습니다.\n\n또한 자금을 투자하여 학문 진척도를 더 빠르게 올릴 수도 있습니다.\n\n\n또한 이벤트를 통해 학자를 얻거나, 과학 기술이 선진국 수준에 미치지 못하는 국가라면 외교 행동을 통해 학자를 구매할 수도 있습니다."
 mr_tutorial_science_overview_tab_scientific_focus: "과학 중점"
 mr_tutorial_science_overview_tab_scientific_focus_desc: "때로는 특정 유형의 연구에 집중하고 싶을 수 있습니다. 조건을 충족하면 과학 중점 분야를 사용할 수 있으며, 이는 특정 기술 그룹의 연구를 촉진하는 대신 다른 분야의 효율을 감소시킵니다."
 mr_tutorial_science_overview_tab_scientific_expedition: "과학 탐사"
 mr_tutorial_science_overview_tab_scientific_expedition_desc: "과학 탐사는 당신의 국가가 나설 수 있는 탐사를 말합니다. 탐사의 종류에 따라 나라에 큰 보탬이 될 수도 있습니다. \n\n 현재 존재하는 탐사의 유형은 다음과 같습니다.\n - [concept_dubois_pacific_expedition]\n- [concept_verrier_venus_transit] 탐사\n- 북서항로 발견 탐사\n- 비행선 탐사\n- 대서양 횡단 케이블 부설 탐사"
 mr_tutorial_science_natural_history_tab_open: "자연사 탭 열기"
 mr_tutorial_science_natural_history_tab_open_desc: "이제 [Concept('concept_academics_academic','$concept_academics_academics$')] 중 하나를 살펴봅시다. 계속하려면 자연사 탭을 열어보세요."
 mr_tutorial_science_natural_history_tab_open_tt: "탭 버튼을 클릭하여 자연사 탭으로 들어가세요."
 mr_tutorial_science_natural_history_tab_character: "학회"
 mr_tutorial_science_natural_history_tab_character_desc: "모르겐뢰테의 핵심은 인물에 있습니다. 과학 탭의 인물은 [Concept('concept_academics_academic','$concept_academics_academics$')]입니다. \n\n 새로운 인물 직책의 좌측 편마다 학자의 초상과 그에 관한 추가 정보를 확인할 수 있습니다. "
 mr_tutorial_science_natural_history_tab_character_rating: "인물 평가"
 mr_tutorial_science_natural_history_tab_character_rating_desc: "대다수 인물의 이름 옆에 조그마한 아이콘이 있는 것을 보실 수 있습니다. 이 아이콘은 본인의 역할에 대한 적성을 나타냅니다. 아이콘에 커서를 올리면 어떤 요인이 평가에 영향을 미치는지를 확인할 수 있습니다.\n\n 아이콘의 의미는 다음과 같습니다.\n@mr_rating_fantastic! 완벽\n@mr_rating_very_good! 아주 좋음\n@mr_rating_good! 좋음\n@mr_rating_mediocre! 보통\n@mr_rating_bad! 나쁨\n@mr_rating_very_bad! 아주 나쁨"
 mr_tutorial_science_natural_history_tab_character_experience_bar: "인물 경험치"
 mr_tutorial_science_natural_history_tab_character_experience_bar_desc: "각 인물은 본인의 전문 지식 분야에서 [concept_academics_experience]를 보유하고 있습니다. 경험치가 높을수록 그 인물은 여러 과제에서 더 좋은 능력을 펼치게 됩니다.\n\n 경험치는 매년 알아서 획득하기도 하지만, 과제를 완수하고 성공을 거두는 등 내 손으로 직접 획득할 수도 있습니다. [Concept('concept_academics_academic','$concept_academics_academics$')]의 경험치가 100 (경험 많음)과 300 (저명함)에 도달하면 더 높은 특성을 획득하게 됩니다."
 mr_tutorial_science_natural_history_tab_character_achievements: "인물 업적"
 mr_tutorial_science_natural_history_tab_character_achievements_desc: "간혹 [Concept('concept_academics_academic','$concept_academics_academics$')]가 놀라운 성과를 이룩할 때가 있습니다. 이 아이콘 위에 커서를 올리면 당신의 학자가 지금까지 이룩한 성과를 언제든지 살펴볼 수 있습니다."
 mr_tutorial_science_natural_history_tab_currencies: "발견과 규모값"
 mr_tutorial_science_natural_history_tab_currencies_desc: "모르겐뢰테의 대다수 인물은 본인에게 부여되는 특정 값을 지니고 있습니다. 이러한 값은 각 학자 정보의 중심부에 표시됩니다. 예를 들어서 지질학의 경우, 찾아낸 광물의 규모나 지질학 지식이 어느 단계까지 확보되었는지를 확인할 수 있습니다.\n\n대체로 특정 값 위에 마우스를 올리면 더 자세한 정보를 볼 수 있습니다."
 mr_tutorial_science_natural_history_visit_button: "방문 버튼"
 mr_tutorial_science_natural_history_visit_button_desc: "대다수 [Concept('concept_academics_academic','$concept_academics_academics$')]에게는 특별한 방문 버튼이 존재하며, 해당 학문 분야에 관한 자세한 정보를 제공합니다.\n\n예를 들어서 [concept_dubois_naturalist]에게는 '동물원 방문' 버튼이 있어, 동물원에 수용된 동물에 관한 세부 정보를 확인할 수 있습니다."
 mr_tutorial_science_natural_history_ranking: "순위"
 mr_tutorial_science_natural_history_ranking_desc: "자국과 타국을 비교해 보는 것을 좋아하실지도 모르겠습니다. 그런 당신에게는 순위 정보가 흥미로울 수도 있습니다. 이 아이콘 위에 커서를 올리면, 모르겐뢰테의 특정 기준에서 다른 나라와 비교했을 때 본인의 성적이 어느 순위에 있는가를 나타낸 다양한 목록을 보실 수 있습니다.\n\n이를테면 [concept_agassiz_geologist] 란에서는 우리나라의 지질학 점수, 지질학 지식, 해양학 지식, 광물과 희귀 광물을 다른 나라와 비교해 보실 수 있습니다."
 mr_tutorial_science_natural_history_project_buttons: "과제 버튼과 기타 버튼"
 mr_tutorial_science_natural_history_project_buttons_desc: "이 버튼은 인터페이스 내에서도 당신에게 있어 제일 중요한 부분에 해당됩니다. 이것으로 당신의 [Concept('concept_academics_academic','$concept_academics_academics$')]에게 과제 업무를 맡기거나 기타 주요 상호작용에 나설 수 있습니다.\n\n[concept_agassiz_geologist]의 경우 탐사에 나서거나, 산업 현장을 개량하거나, 지구의 나이를 재측정할 수 있으며, 광물 표본실을 설립하거나 대륙 이동설에 관한 학술회의를 개최할 수도 있습니다."
 mr_tutorial_science_natural_history_view_switch_buttons: "레이아웃 변경"
 mr_tutorial_science_natural_history_view_switch_buttons_desc: "더욱 깔끔한 인터페이스를 원하시면 이 버튼을 눌러 디자인을 변경할 수 있습니다. 게임 자체에는 어떤 모습을 사용하든 상관없으니, 마음에 드는 모습을 골라보세요."
 mr_start_culture_tutorial_button_loc: "문화 튜토리얼"
 mr_tutorial_not_yet_implemented_tt: "이 튜토리얼은 아직 준비되지 않았습니다."
 mr_tutorial_arts_window_open: "예술 창 열기"
 mr_tutorial_arts_window_open_desc: "이제 예술 창을 살펴볼 차례입니다. 버튼을 클릭하거나 키보드에서 'Ctrl+A' 키를 눌러 예술 창을 열어주세요."
 mr_tutorial_arts_window_open_tt: "과학 버튼을 클릭하거나 'Ctrl+A' 키를 눌러 예술 창 열기"
 mr_tutorial_arts_tab: "예술 탭"
 mr_tutorial_arts_tab_desc: "예술은 19세기와 20세기의 주요 부문이었습니다. 이 시기의 위대한 [Concept('concept_artists_artist','$concept_artists_artists$')]는 오늘날까지도 널리 알려져 있습니다.\n\n 모르겐뢰테에서는 다양한 유형의 예술가와 그 작품을 제공합니다.\n\n 예술 창에는 두 개의 탭이 있습니다. 하나는 해당 국가의 예술 현황에 관한 개요를 보여주고, 다른 하나는 해당 국가의 예술가를 모집하거나 해외에서 예술가를 모집해 올 수 있습니다."
 mr_tutorial_arts_tab_cultural_tradition: "문화 전통"
 mr_tutorial_arts_tab_cultural_tradition_desc: "문화 전통은 당신의 국가가 이룩한 문화적 성과를 나타내는 값입니다.\n[concept_elgar_musical_tradition], [concept_manzoni_literary_tradition], [concept_klimt_painting_tradition]으로 구성되어 있습니다.\n\n문화 전통은 다음의 공식에 따릅니다.\n(음악 전통) / 4 + (회화 전통) / 3 + (문학 전통) / 2\n\n음악 전통으로 [concept_prestige]을 추가로 획득할 수 있습니다. 문화 전통 5점당 추가 위신 1점을 획득하게 됩니다."
 mr_tutorial_arts_overview_tab_open_tt: "예술 개요 탭 열기"
 mr_tutorial_arts_tab_artist_progress: "예술가 진행도"
 mr_tutorial_arts_tab_artist_progress_desc: "새로운 [Concept('concept_artists_artist','$concept_artists_artists$')]는 여러 방법으로 획득할 수 있습니다. 직접 채용할 수도 있고, 이벤트로 획득할 수도 있고, [concept_artistic_progress]를 충분히 모아 획득할 수도 있습니다.\n\n 이벤트와 채용은 모든 국가에서 가능한 것은 아니며, $building_elgar_opera$나 $building_art_academy$를 하나라도 보유한 다음, 예술 진행도 표시바를 채우면 예술가를 획득할 수 있게 됩니다. \n 진행도 표시바에 마우스를 올리면 월별 획득량에 영향을 미치는 모든 요인의 목록을 확인할 수 있습니다.\n\n 또한 $building_art_academy$의 [concept_production_method]을 요건에 따라 잘 갖췄다면, 예술 후원을 통해 더 큰 진행도를 얻고 특정 예술가를 후원할 수도 있습니다."
 mr_tutorial_arts_tab_center_of_arts: "예술의 중심지"
 mr_tutorial_arts_tab_center_of_arts_desc: "[Concept('concept_artists_center_of_arts','$concept_artists_centers_of_arts$')]는 [concept_artists_art_style]이 태동한 지역을 말합니다.\n 예술의 중심지 가운데서는 게임 시작 시점에서 이미 존재하는 경우도 있습니다. 나머지의 경우에는 [Concept('concept_journal_entry','$concept_journal_entries$')]을 통해서나 이곳에 보이는 버튼 중 하나를 눌러 해제할 수 있습니다. 예술의 중심지 위에 커서를 올리면 획득 방법을 확인하실 수 있습니다.\n\n예술의 중심지는 보너스가 주어진다는 점에서 당신과 국가에 틀림없이 보탬이 됩니다."
 mr_tutorial_arts_tab_artists_tab_open: "예술가 탭 열기"
 mr_tutorial_arts_tab_artists_tab_open_desc: "이제 [Concept('concept_artists_artist','$concept_artists_artists$')] 항목을 좀 더 자세히 살펴봅시다.\n\n 탭 버튼을 클릭하여 예술가 탭을 열어주세요."
 mr_tutorial_arts_tab_artists_tab_open_open_tt: "예술가 탭 열기"
 mr_tutorial_arts_tab_artists: "예술가 탭"
 mr_tutorial_arts_tab_artists_desc: "[Concept('concept_artists_artist','$concept_artists_artists$')]는 학자와 매우 유사해 보이지만 작업 방식은 약간 다릅니다.\n\n 현재 예술가에는 총 세 가지가 있습니다.\n - [concept_elgar_composer]\n- [concept_manzoni_writer]\n- [concept_klimt_painter]"
 mr_tutorial_arts_tab_artists_invite: "예술가 초빙"
 mr_tutorial_arts_tab_artists_accquisation_desc: "앞서 언급한 바와 같이 [Concept('concept_artists_artist','$concept_artists_artists$')]는 [concept_artistic_progress]를 충분히 모아 확보할 수도 있지만 초빙의 형식으로도 간단히 확보할 수 있습니다.\n\n예술가의 각 유형에 따라 필요 조건도 다릅니다. 전세계의 [Concept('concept_elgar_travelling_composer','$concept_elgar_travelling_composers$')]를 초빙하려면 $building_elgar_opera$을 충분히 세우고 [concept_elgar_musical_tradition]을 일정량 확보해 놓고 있어야 합니다.\n\n[Concept('concept_klimt_independent_painter','$concept_klimt_independent_painters$')]는 유사한 문화권인 경우에만 초빙이 가능합니다.\n\n반면 [Concept('concept_manzoni_writer','$concept_manzoni_writers$')]는 초빙이 아예 불가능합니다."
 mr_tutorial_arts_tab_artists_character: "기본 정보"
 mr_tutorial_arts_tab_artists_character_desc: "창 왼쪽 편에는 예술가에 관한 기본 정보를 보여줍니다.\n\n이곳에서 확인할 수 있는 정보는 다음과 같습니다.\n-초상\n-성명과 평가\n-[concept_artists_experience]\n-[Concept('concept_character_trait','$concept_character_traits$')]"
 mr_tutorial_arts_tab_artists_currencies: "주요 예술 규모값"
 mr_tutorial_arts_tab_artists_currencies_desc: "인터페이스의 이 부분에서는 예술의 특정 기준에 따른 일반 정보를 확인할 수 있습니다.\n이를테면 [concept_elgar_composer] 란에서는 [concept_elgar_musical_tradition], 작곡가의 작곡과 걸작 편수, 세계 최고의 작곡가 5인 현황이 표시됩니다.\n\n또한 상단 우측 구석의 작은 아이콘에 커서를 올리면 순위를 확인할 수 있습니다."
 mr_tutorial_arts_tab_artists_actions: "예술가 행동"
 mr_tutorial_arts_tab_artists_actions_desc: "[Concept('concept_artists_artist','$concept_artists_artists$')]도 행동을 취할 수 있습니다. 이곳에서는 예술가가 할 수 있는 작업과 나라에서 해 줄 수 있는 결단이 무엇인지를 보실 수 있습니다.\n\n지금까지 예술가에 관한 핵심 정보들을 알려드렸습니다. 이제 체육 튜토리얼을 계속하시거나 게임을 재개하실 수 있습니다."
 mr_start_sports_tutorial_button_loc: "체육 튜토리얼"
 mr_tutorial_sports_window_open: "체육 창 열기"
 mr_tutorial_sports_window_open_desc: "이제 체육 창을 살펴볼 차례입니다. 버튼을 클릭하거나 키보드에서 'Ctrl+S' 키를 눌러 스포츠 창을 열어주세요."
 mr_tutorial_sports_window_open_tt: "과학 버튼을 클릭하거나 'Ctrl+S' 키를 눌러 체육 창 열기"
 mr_tutorial_sports_window: "체육 창"
 mr_tutorial_sports_window_desc: "체육 창에서는 여러 가지 체육 종목과 체육에 관련된 인물들을 볼 수 있습니다.\n\n 체육 창은 일반 체육과 비행 종목으로 구분됩니다.\n\n 일반 체육에 해당되는 것은 다음과 같습니다.\n- [concept_vikelas_olympic_games]\n- [concept_douglas_mountaineering]\n- 구기 종목\n- [concept_vikelas_car_racing]\n\n비행 종목에 해당되는 것은 다음과 같습니다.\n- [concept_curtiss_balloonist]\n- [concept_curtiss_pilot]"
 mr_tutorial_sports_tab: "체육 탭"
 mr_tutorial_sports_tab_desc: "체육 탭에서는 체육 관련 활동과 인물에 관한 개요를 보여줍니다.\n 학자나 예술가와는 달리 체육 탭의 인물은 장군과 정치인이 겸하는 경우가 많습니다."
 mr_tutorial_sports_tab_open_tt: "체육 탭 열기"
 mr_tutorial_sports_tab_character_overview: "인물 개요"
 mr_tutorial_sports_tab_character_overview_desc: "이 UI 창에서는 [concept_character]의 개요를 보여줍니다.\n\n [concept_vikelas_coach]이나 카레이서 같은 일부 인물들은 따로 획득이 가능하므로 [concept_academics_experience]를 보유하게 됩니다. 산악인 등의 다른 인물들은 경험치를 보유하지 않습니다."
 mr_tutorial_sports_tab_currencies: "규모값과 정보"
 mr_tutorial_sports_tab_currencies_desc: "중앙부에는 해당 종목에 관한 주요 정보를 확인할 수 있습니다.\n\n이를테면 [concept_vikelas_olympic_games]에서는 [concept_vikelas_ioc]의 회장국과 이사회 현황, 회원국 규모와 현재까지 모은 메달수를 확인할 수 있습니다."
 mr_tutorial_sports_tab_actions: "행동"
 mr_tutorial_sports_tab_actions_desc: "우측에서는 해당 체육 분야에 관한 특정 행동을 취할 수 있습니다.\n이러한 행동은 기본적으로 결단에 해당되며, [Concept('concept_character', '$concept_characters$')]을 사용하거나 [concept_vikelas_ioc]와 같은 새로운 것을 창설하는 역할을 합니다."
 mr_tutorial_sports_tab_aeronautics_tab_open: "항공 탭 열기"
 mr_tutorial_sports_tab_aeronautics_tab_open_desc: "이제 항공 탭을 좀 더 자세히 살펴보겠습니다. 버튼을 클릭하여 탭을 열어주세요."
 mr_tutorial_aeronautics_tab_open_tt: "항공 탭 열기"
 mr_tutorial_aeronautics_tab: "항공 탭"
 mr_tutorial_aeronautics_tab_desc: "항공 탭에서는 체육 탭과 대부분 비슷하게 생겼습니다.\n\n 가장 큰 차이점은 인물 자체에 있습니다. [concept_curtiss_balloonist]를 후원하고 자동화할 수 있으며 여러 상황에서 [concept_curtiss_pilot]가 등장하게 됩니다.\n\n 이것으로 개요 튜토리얼이 끝났습니다. 모르겐뢰테의 인물에 대해 더 자세히 배우고 싶으시면 빅토백과나 각 인물에 추가해둔 배경을 참고해 주세요."
