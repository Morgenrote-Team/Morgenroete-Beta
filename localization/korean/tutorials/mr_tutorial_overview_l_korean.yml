l_korean:

 thriving_culture_lesson_start_tutorial_button_loc: "튜토리얼 시작" #deepl:1296206908

 mr_tutorial_buttons: "모닝콜 버튼" #deepl:3232304745
 mr_tutorial_buttons_desc: "모르겐뢰테의 대부분의 항목은 모르겐뢰테 창에서 액세스할 수 있습니다. 사이드바의 버튼을 클릭하여 액세스할 수 있습니다. 현재 이러한 창이 존재합니다: \n\n\n- #V 과학 창#!: 여기에서 [Concept('concept_academics_academic','$concept_academics_academics$')], 그들의 활동, [concept_academics_progress] 및 과학 탐험을 찾을 수 있습니다.\n\n- #V 예술 창#!: [Concept('concept_artists_artist','$concept_artists_artists$')] , 그들의 활동, [concept_artistic_progress] 및 [Concept('concept_artists_art_style','$concept_artists_art_styles$')].\n\n- #V 스포츠 창#!: 여기에서 항공, 그들의 활동 및 국제 스포츠 조직뿐만 아니라 스포츠와 관련된 다양한 스포츠 및 캐릭터를 찾을 수 있습니다." #deepl:3017682288

 mr_tutorial_science_window_open: "과학 창 열기" #deepl:734722697
 mr_tutorial_science_window_open_desc: "이제 과학 창을 자세히 살펴보겠습니다. 버튼을 클릭하거나 키보드의 \"M\" 키를 눌러 과학 창을 엽니다." #deepl:1849505402
 mr_tutorial_science_window_open_tt: "과학 버튼을 클릭하거나 \"M\"을 눌러 과학 창을 엽니다." #deepl:1188172678

 mr_tutorial_science_tab: "과학 창" #deepl:1054166281
 mr_tutorial_science_tab_desc: "과학 창은 과학적 탐험을 위한 정보와 활동을 찾을 수 있는 곳입니다.\n\n- #V 개요#!: 이 탭에는 [concept_academics_progress], #V 일반 과학 탐험#! 및 #V 과학적 초점#!\n\n- #V 수학-기술#!: 이 탭에는 [concept_gaudi_engineer], [concept_mendelejew_chemist] 및 [concept_verrier_astronomer]\n\n- #V 인문-인류학#!: 이 탭에는 [concept_panum_physician], [concept_lepsius_archaeologist] 및 [concept_lepsius_anthropologist]\n\n- [concept_dubois_natural_history]: 이 탭에는 [concept_agassiz_geologist], [concept_dubois_paleontologist] 및 [concept_dubois_naturalist]\n\n- #V 인문-인류학#!: 이 탭에는 [concept_panum_physician], [concept_lepsius_archaeologist] 및 [concept_lepsius_anthropologist]" #deepl:271317186
 mr_tutorial_science_tab_tt: "과학 창이 열립니다." #deepl:3571747254

 mr_tutorial_science_overview_tab_open: "개요 탭 열기" #deepl:2171973784
 mr_tutorial_science_overview_tab_open_desc: "개요 탭을 통해 [concept_academics_progress], #V 일반 과학 탐험#! 및 #V 과학 포커스#!\n\n탭 버튼을 클릭하여 개요 탭으로 이동합니다." #deepl:3801100877
 mr_tutorial_science_overview_tab_open_tt: "탭 버튼을 클릭하여 개요 탭으로 이동합니다." #deepl:583115154

 mr_tutorial_science_overview_tab_promote_academics: "학술 홍보" #deepl:3127848749
 mr_tutorial_science_overview_tab_promote_academics_desc: "모르겐뢰테의 핵심은 캐릭터입니다. 하지만 어떻게 캐릭터를 얻을 수 있을까요?\n\n새로운 [concept_academics_academic] 캐릭터를 얻으려면 충분한 [concept_academics_progress] 을 획득해야 합니다. [concept_academics_university_specialization] 진행률 표시줄에 마우스를 가져가면 진행률에 영향을 주는 요소를 확인할 수 있습니다.\n\n대학이 있는 경우 특정 학자를 승진시킬 수 있습니다.\n\n학자를 더 빨리 얻기 위해 돈을 투자할 수도 있습니다.\n\n또한 이벤트를 통해 학자를 얻거나 과학 선진국에 속하지 않은 국가인 경우 외교 행동으로 학자를 구입할 수 있습니다." #deepl:3334402372

 mr_tutorial_science_overview_tab_scientific_focus: "과학적 초점" #deepl:4254522642
 mr_tutorial_science_overview_tab_scientific_focus_desc: "때로는 특정 종류의 연구에 집중하고 싶을 수도 있습니다. 요구 사항을 충족하는 경우 과학적 초점을 사용할 수 있습니다. 기본적으로 특정 기술 그룹의 연구를 촉진하고 다른 기술 그룹의 효율성을 떨어뜨릴 수 있습니다." #deepl:2966516010

 mr_tutorial_science_overview_tab_scientific_expedition: "과학 탐험" #deepl:3527687538
 mr_tutorial_science_overview_tab_scientific_expedition_desc: "과학 탐험은 국가가 시작할 수 있는 탐험입니다. 탐험의 종류에 따라 국가에 큰 이익을 가져다줄 수 있습니다.\n\n현재 이러한 탐험이 존재합니다:\n- [concept_dubois_pacific_expedition]\n- [concept_verrier_venus_transit] 북서항로 찾기 탐험\n- 제플린 탐험\n- 대서양 횡단 케이블 놓기 탐험" #deepl:413711623

 mr_tutorial_science_natural_history_tab_open: "자연사 탭 열기" #deepl:1440158592
 mr_tutorial_science_natural_history_tab_open_desc: "이제 [Concept('concept_academics_academic','$concept_academics_academics$')]. 계속하려면 자연사 탭을 엽니다." #deepl:3933847545
 mr_tutorial_science_natural_history_tab_open_tt: "탭 버튼을 클릭하여 자연사 탭으로 이동합니다." #deepl:1038657530

 mr_tutorial_science_natural_history_tab_character: "학술" #deepl:1408513918
 mr_tutorial_science_natural_history_tab_character_desc: "모르겐뢰테의 핵심은 캐릭터입니다. 과학 탭에서 이러한 캐릭터는 [Concept('concept_academics_academic','$concept_academics_academics$')].\n\n새 캐릭터 역할의 왼쪽에서 학자의 초상화와 추가 정보를 볼 수 있습니다." #deepl:1020069787

 mr_tutorial_science_natural_history_tab_character_rating: "캐릭터 등급" #deepl:3205270775
 mr_tutorial_science_natural_history_tab_character_rating_desc: "대부분의 캐릭터는 이름 옆에 작은 아이콘이 있습니다. 이 아이콘은 해당 역할에 대한 적성을 나타냅니다. 아이콘 위로 마우스를 가져가면 어떤 요소가 이 등급에 영향을 미치는지 확인할 수 있습니다.\n\n아이콘 설명:\n@mr_rating_fantastic!  완벽\n@mr_rating_very_good!  매우 좋음\n@mr_rating_good!  Good\n@mr_rating_mediocre!  Mediocre\n@mr_rating_bad!  Bad\n@mr_rating_very_bad!  매우 나쁨" #deepl:2393422146

 mr_tutorial_science_natural_history_tab_character_experience_bar: "캐릭터 경험" #deepl:356262571
 mr_tutorial_science_natural_history_tab_character_experience_bar_desc: "각 캐릭터는 자신의 전문 분야에 [concept_academics_experience] 을 가지고 있습니다. 경험치가 높을수록 캐릭터는 다양한 작업을 더 잘 수행할 수 있습니다.\n\n경험치는 매년 수동적으로 얻을 수 있으며, 작업을 완료하고 성공하면 능동적으로도 얻을 수 있습니다. [Concept('concept_academics_academic','$concept_academics_academics$')] 100(경험치)과 300(명성)에 도달하면 더 높은 특성을 얻게 됩니다." #deepl:4293324584

 mr_tutorial_science_natural_history_tab_character_achievements: "캐릭터 업적" #deepl:2935735490
 mr_tutorial_science_natural_history_tab_character_achievements_desc: "[Concept('concept_academics_academic','$concept_academics_academics$')] 때때로 인상적인 업적을 달성하기도 합니다. 이 아이콘 위로 마우스를 가져가면 지금까지 달성한 업적을 언제든지 확인할 수 있습니다." #deepl:1195783621

 mr_tutorial_science_natural_history_tab_currencies: "디스커버리 및 가치" #deepl:1384869411
 mr_tutorial_science_natural_history_tab_currencies_desc: "모르겐뢰테의 대부분의 캐릭터에는 값이 부여되어 있습니다. 이러한 값은 각 학문의 중앙에 표시됩니다. 예를 들어 지질학에서는 발견된 광물 개수나 지질학 지식을 확인할 수 있으며, 특정 값에 마우스를 가져가면 해당 값에 대한 자세한 정보를 확인할 수 있는 경우가 많습니다." #deepl:4066533914

 mr_tutorial_science_natural_history_visit_button: "방문 버튼" #deepl:3858963492
 mr_tutorial_science_natural_history_visit_button_desc: "대부분의 [Concept('concept_academics_academic','$concept_academics_academics$')] 에는 해당 학문에 대해 자세히 알려주는 특별한 방문 버튼이 있습니다.\n\n 예를 들어 [concept_dubois_naturalist] 에는 동물원 방문 버튼이 있어 동물원 동물에 대해 자세히 알아볼 수 있습니다." #deepl:1189517097

 mr_tutorial_science_natural_history_ranking: "순위" #deepl:4181663012
 mr_tutorial_science_natural_history_ranking_desc: "다른 국가와 자신을 비교하는 것을 좋아하실 수도 있습니다. 이 경우 순위가 흥미로울 수 있습니다. 이 아이콘에 마우스를 올리면 다른 국가와 비교하여 모르겐뢰테의 특정 측면에서 얼마나 잘하고 있는지 확인할 수 있는 다양한 목록을 볼 수 있습니다.\n\n예를 들어 [concept_agassiz_geologist] 에서는 지질 점수, 지질 지식, 해양 지식, 광물 및 희귀 광물을 비교할 수 있습니다." #deepl:394625426

 mr_tutorial_science_natural_history_project_buttons: "프로젝트 버튼 및 기타 버튼" #deepl:430248338
 mr_tutorial_science_natural_history_project_buttons_desc: "인터페이스의 이 부분은 여러분에게 가장 중요한 부분 중 하나입니다. [Concept('concept_academics_academic','$concept_academics_academics$')] 에서 프로젝트를 수행하고 다른 중요한 상호작용을 시작할 수 있으며, [concept_agassiz_geologist] 에서 탐험을 떠나고, 산업을 발전시키고, 지구의 나이를 다시 계산하고, 광물 캐비닛을 찾거나 대륙 표류에서 의회를 시작할 수 있습니다." #deepl:2696053152

 mr_tutorial_science_natural_history_view_switch_buttons: "레이아웃 변경" #deepl:1671308253
 mr_tutorial_science_natural_history_view_switch_buttons_desc: "더 밀도가 높은 인터페이스를 선호하는 경우 이 버튼을 사용하여 모양을 전환할 수 있습니다. 게임 자체의 경우 어떤 변형을 사용하든 상관없습니다. 따라서 더 마음에 드는 변형을 선택하세요." #deepl:2800918764

 mr_start_culture_tutorial_button_loc: "문화 튜토리얼" #deepl:231585177
 mr_tutorial_not_yet_implemented_tt: "이 튜토리얼은 아직 준비되지 않았습니다." #deepl:1971937521

 mr_tutorial_arts_window_open: "아트 창 열기" #deepl:2590280325
 mr_tutorial_arts_window_open_desc: "이제 아트 창을 자세히 살펴보겠습니다. 버튼을 클릭하거나 키보드의 \"Ctrl + A\" 키를 눌러 아트 창을 엽니다." #deepl:53394483
 mr_tutorial_arts_window_open_tt: "과학 버튼을 클릭하거나 \"Ctrl + A\"를 눌러 예술 창을 엽니다." #deepl:2950751548

 mr_tutorial_arts_tab: "예술 탭" #deepl:2793588649
 mr_tutorial_arts_tab_desc: "예술은 19세기와 20세기의 중요한 부분이었습니다. 이 시대의 위대한 [Concept('concept_artists_artist','$concept_artists_artists$')] 예술가들은 오늘날에도 잘 알려져 있습니다.\n\n모겐뢰테는 다양한 종류의 예술가와 그들의 예술 작품을 제공합니다.\n\n예술 창 자체에는 두 개의 탭이 있습니다. 하나는 해당 국가의 예술에 대한 개요를 보여주고, 다른 하나는 아티스트를 찾고 외국에서 아티스트를 모집할 수 있습니다." #deepl:543699742

 mr_tutorial_arts_tab_cultural_tradition: "문화적 전통" #deepl:3268694731
 mr_tutorial_arts_tab_cultural_tradition_desc: "문화 전통은 국가의 문화적 업적을 나타내는 가치입니다.\n [concept_elgar_musical_tradition], [concept_manzoni_literary_tradition], [concept_klimt_painting_tradition] 로 구성됩니다.\n\n문화 전통은 다음 공식으로 계산됩니다:\n음악 전통 / 4 + 회화 전통 / 3 + 문학 전통 / 2\n\n예술 전통에서 [concept_prestige] 을 추가로 획득할 수 있습니다. 예술 전통 5점당 명성 1점을 추가로 획득할 수 있습니다." #deepl:3774927584
 mr_tutorial_arts_overview_tab_open_tt: "아트 개요 탭 열기" #deepl:3810726030

 mr_tutorial_arts_tab_artist_progress: "아티스트 진행 상황" #deepl:61174778
 mr_tutorial_arts_tab_artist_progress_desc: "새로운 [Concept('concept_artists_artist','$concept_artists_artists$')] 을 다양한 방법으로 획득할 수 있습니다: 모집하거나 이벤트를 통해 획득하거나 [concept_artistic_progress] 을 충분히 모아서 획득할 수 있습니다.\n\n모든 국가에 이벤트와 모집이 가능한 것은 아니지만, $building_elgar_opera$ 또는 $building_arts_academy$ 을 소유하고 있으면 예술 진행률 바를 채워 예술가를 획득할 수 있습니다.\n진행률 바에 마우스를 올리면 월간 획득량에 영향을 미치는 전체 요소 목록을 확인할 수 있습니다.\n\n 또한 예술을 후원하여 필요한 [concept_production_method] 을 가지고 있으면 더 많은 진행률을 얻고 특정 예술가를 홍보할 수 있습니다.\n\n $building_arts_academy$." #deepl:1108726132

 mr_tutorial_arts_tab_center_of_arts: "예술의 전당" #deepl:4265095628
 mr_tutorial_arts_tab_center_of_arts_desc: "[Concept('concept_artists_center_of_arts','$concept_artists_centers_of_arts$')] 은 [concept_artists_art_style] 이 탄생한 장소입니다.\n 일부 예술 센터는 게임 시작 시 이미 존재합니다. 다른 예술 센터는 [Concept('concept_journal_entry','$concept_journal_entries$')] 또는 여기에 표시된 버튼 중 하나를 눌러 잠금 해제할 수 있습니다. 예술의 전당에 마우스를 갖다 대면 획득 방법을 확인할 수 있습니다.\n\n예술의 전당은 보너스를 받을 수 있으므로 나와 내 국가에 유용합니다." #deepl:1287628103

 mr_tutorial_arts_tab_artists_tab_open: "아티스트 탭 열기" #deepl:974477655
 mr_tutorial_arts_tab_artists_tab_open_desc: "이제 [Concept('concept_artists_artist','$concept_artists_artists$')].\n\n탭 버튼을 클릭하여 아티스트 탭을 열어 자세히 살펴 보겠습니다." #deepl:391030067
 mr_tutorial_arts_tab_artists_tab_open_open_tt: "아티스트 탭 열기" #deepl:974477655

 mr_tutorial_arts_tab_artists: "아티스트 탭" #deepl:1211285969
 mr_tutorial_arts_tab_artists_desc: "[Concept('concept_artists_artist','$concept_artists_artists$')] 는 아카데믹과 매우 비슷해 보이지만 작동 방식은 약간 다릅니다.\n\n현재 3명의 아티스트가 있습니다:\n- [concept_elgar_composer]\n- [concept_manzoni_writer]\n-. [concept_klimt_painter]" #deepl:124747602

 mr_tutorial_arts_tab_artists_invite: "아티스트 초대하기" #deepl:1648609371
 mr_tutorial_arts_tab_artists_accquisation_desc: "이미 언급했듯이 [Concept('concept_artists_artist','$concept_artists_artists$')] 는 [concept_artistic_progress] 을 충분히 획득하는 것뿐만 아니라 단순히 초대하는 것으로도 획득할 수 있습니다.\n\n아티스트의 종류에 따라 요구 사항이 다릅니다. [Concept('concept_elgar_travelling_composer','$concept_elgar_travelling_composers$')] 은 전 세계에서 초대할 수 있지만 $building_elgar_opera$이 충분한 국가여야 하고 [concept_elgar_musical_tradition] 은 문화가 비슷한 국가여야만 초대할 수 있습니다.\n\n[Concept('concept_klimt_independent_painter','$concept_klimt_independent_painters$')] 은 문화가 비슷한 경우에만 초대할 수 있고, 반면에[Concept('concept_manzoni_writer','$concept_manzoni_writers$')] 은 아예 초대할 수 없습니다." #deepl:2127803597

 mr_tutorial_arts_tab_artists_character: "일반 정보" #deepl:995936974
 mr_tutorial_arts_tab_artists_character_desc: "창의 가장 왼쪽에는 아티스트에 대한 몇 가지 기본 정보가 표시됩니다.\n\n-초상화\n-이름 및 등급\n- [concept_artists_experience]\n- . [Concept('concept_character_trait','$concept_character_traits$')]" #deepl:1445240346

 mr_tutorial_arts_tab_artists_currencies: "중요한 예술 가치" #deepl:71895904
 mr_tutorial_arts_tab_artists_currencies_desc: "이 인터페이스에서는 예술의 특정 측면에 대한 일반적인 정보를 볼 수 있습니다.\n\n [concept_elgar_composer] 의 경우 [concept_elgar_musical_tradition], 작곡가의 작곡 및 걸작, 세계 최고의 작곡가 5인에 대한 개요가 표시됩니다.\n\n또한 오른쪽 상단의 작은 아이콘 위로 마우스를 가져가면 순위를 확인할 수 있습니다." #deepl:1891899818

 mr_tutorial_arts_tab_artists_actions: "아티스트 활동" #deepl:2320930103
 mr_tutorial_arts_tab_artists_actions_desc: "[Concept('concept_artists_artist','$concept_artists_artists$')] 행동도 있습니다. 여기에서 아티스트가 수행할 수 있는 작업이나 국가에 어떤 결정을 내릴 수 있는지 확인할 수 있습니다.\n\n이것이 아티스트와 관련된 가장 중요한 정보입니다. 여기에서 스포츠 튜토리얼을 계속 진행하거나 게임을 계속할 수 있습니다." #deepl:746856108
 mr_start_sports_tutorial_button_loc: "스포츠 튜토리얼" #deepl:826655861

 mr_tutorial_sports_window_open: "스포츠 창 열기" #deepl:1830514457
 mr_tutorial_sports_window_open_desc: "이제 스포츠 창을 자세히 살펴보겠습니다. 버튼을 클릭하거나 키보드의 \"Ctrl + S\" 키를 눌러 스포츠 창을 엽니다." #deepl:243246943
 mr_tutorial_sports_window_open_tt: "과학 버튼을 클릭하거나 \"Ctrl + S\"를 눌러 스포츠 창을 엽니다." #deepl:1482293542

 mr_tutorial_sports_window: "스포츠 창" #deepl:4243980162
 mr_tutorial_sports_window_desc: "스포츠 창에서는 다양한 스포츠와 해당 스포츠와 관련된 캐릭터에 액세스할 수 있습니다.\n\n창은 일반 스포츠와 항공으로 구분됩니다.\n\n일반 스포츠에는 다음이 포함됩니다:\n- [concept_vikelas_olympic_games]\n- [concept_dubois_mountaineering]\n- 구기 스포츠\n- [concept_vikelas_car_racing]\n\항공에는 다음이 포함됩니다:\n- [concept_curtiss_balloonist]\n- [concept_curtiss_pilot]" #deepl:2523227399

 mr_tutorial_sports_tab: "스포츠 탭" #deepl:2701935579
 mr_tutorial_sports_tab_desc: "스포츠 탭에서는 다양한 스포츠 관련 활동과 인물에 대한 개요를 볼 수 있습니다.\n학자와 예술가와 달리 스포츠 탭의 인물은 장군이나 정치인인 경우가 많습니다." #deepl:1383542418
 mr_tutorial_sports_tab_open_tt: "스포츠 탭 열기" #deepl:176871982

 mr_tutorial_sports_tab_character_overview: "캐릭터 개요" #deepl:96645084
 mr_tutorial_sports_tab_character_overview_desc: "이 부분에서는 [concept_character].\n\n [concept_vikelas_coach] 및 카 레이서와 같은 일부 캐릭터는 획득할 수 있는 캐릭터이므로 [concept_academics_experience]. 마운티니어와 같은 다른 캐릭터는 경험치가 없습니다." #deepl:1695633540

 mr_tutorial_sports_tab_currencies: "가치 및 정보" #deepl:2440189283
 mr_tutorial_sports_tab_currencies_desc: "예를 들어 [concept_vikelas_olympic_games] 에는 [concept_vikelas_ioc] 의 회장과 이사회에 대한 개요, 회원 수, 지금까지 수집한 메달 개수 등이 나와 있습니다." #deepl:1125108675

 mr_tutorial_sports_tab_actions: "작업" #deepl:1951990429
 mr_tutorial_sports_tab_actions_desc: "오른쪽에서는 해당 스포츠에 대한 구체적인 조치를 취할 수 있습니다.\n이러한 조치는 기본적으로 [Concept('concept_character', '$concept_characters$')] 을 사용하거나 [concept_vikelas_ioc] 과 같은 새로운 것을 설정할 수 있는 결정입니다." #deepl:2455654735

 mr_tutorial_sports_tab_aeronautics_tab_open: "항공 탭 열기" #deepl:2120346894
 mr_tutorial_sports_tab_aeronautics_tab_open_desc: "이제 항공 탭을 자세히 살펴보겠습니다. 버튼을 클릭하여 탭을 엽니다." #deepl:2671641916
 mr_tutorial_aeronautics_tab_open_tt: "항공 탭 열기" #deepl:2187560588

 mr_tutorial_aeronautics_tab: "항공 탭" #deepl:2661687945
 mr_tutorial_aeronautics_tab_desc: "항공 탭은 스포츠 탭과 거의 동일하게 생겼습니다.\n\n한 가지 큰 차이점은 캐릭터 자체에 있습니다. [concept_curtiss_balloonist] 을 후원하고 자동화할 수 있으며 [concept_curtiss_pilot] 이 다양한 상황에서 스폰됩니다.\n\n이것이 개요 튜토리얼의 끝입니다. 모르겐뢰테의 캐릭터에 대해 더 자세히 알고 싶으시다면 비키피디아 또는 추가한 콘셉트를 참고하시기 바랍니다." #deepl:851922845
 mr_tutorial_lesson_button_finish: "튜토리얼 완료" #deepl:895117430

