l_korean:
 thriving_culture_lesson_start_tutorial_button_loc: "튜토리얼 시작"
 mr_tutorial_buttons: "모르겐뢰테 버튼"
 mr_tutorial_buttons_desc: "모르겐뢰테의 대부분 기능은 모르겐뢰테 윈도우에서 접근할 수 있습니다. 사이드바의 버튼을 클릭하면 해당 창을 열 수 있습니다. 현재 존재하는 창은 다음과 같습니다:\n\n\n#V 과학 창#!: 여기서 [Concept('concept_academics_academic','$concept_academics_academics$')], 그들의 활동, [concept_academics_progress], 그리고 과학 탐험을 확인할 수 있습니다.\n\n#V 예술 창#!: 여기서 [Concept('concept_artists_artist','$concept_artists_artists$')], 그들의 활동, [concept_artistic_progress], 그리고 [Concept('concept_artists_art_style','$concept_artists_art_styles$')]을 확인할 수 있습니다.\n\n#V 스포츠 창#!: 다양한 스포츠 및 스포츠 관련 인물들, 항공학, 그들의 활동, 그리고 국제 스포츠 기구들을 확인할 수 있습니다."
 mr_tutorial_science_window_open: "과학 창 열기"
 mr_tutorial_science_window_open_desc: "이제 과학 창을 좀 더 자세히 살펴보겠습니다. 사이드바의 버튼을 클릭하거나 키보드에서 \"M\" 키를 눌러 과학 창을 열어주세요."
 mr_tutorial_science_window_open_tt: "과학 버튼을 클릭하거나 \"M\" 키를 눌러 과학 창을 열어주세요."
 mr_tutorial_science_tab: "과학 창"
 mr_tutorial_science_tab_desc: "The science window is the place where you can find information and actions for your scientific endeavours.\n\n\nIt is seperated in 4 tabs:\n\n- #V Overview#!: This tab contains [concept_academics_progress], #V General Scientific Expeditions#! and the #V Scientific Focus#!\n\n- #V Mathematical-Technical#!: This tab contains the [concept_tesla_engineer], [concept_mendelejew_chemist] and [concept_verrier_astronomer]\n\n- [concept_dubois_natural_history]: This tab contains the [concept_agassiz_geologist], [concept_dubois_paleontologist] and [concept_dubois_naturalist]\n\n- #V Humanities-Anthropological#!: This tab contains the [concept_panum_physician], [concept_lepsius_archaeologist] and [concept_lepsius_anthropologist]"
 mr_tutorial_science_tab_tt: "과학 창이 열립니다"
 mr_tutorial_science_overview_tab_open: "개요 탭 열기"
 mr_tutorial_science_overview_tab_open_desc: "The Overview tab allows you to access the [concept_academics_progress], #V General Scientific Expeditions#! and the #V Scientific Focus#!\n\nGo into the Overview tab by clicking on the tab button."
 mr_tutorial_science_overview_tab_open_tt: "탭 버튼을 클릭하여 개요 탭으로 들어가세요."
 mr_tutorial_science_overview_tab_promote_academics: "학술 홍보"
 mr_tutorial_science_overview_tab_promote_academics_desc: "모르겐뢰테의 핵심은 인물입니다. 하지만 이러한 인물들은 어떻게 얻을 수 있을까요?\n\n새로운 [concept_academics_academic]을 얻으려면 충분한 [concept_academics_progress]를 축적해야 합니다. 진행도 막대에 마우스를 올리면 어떤 요소들이 진척도 증가에 영향을 주는지 확인할 수 있습니다.\n\n[concept_academics_university_specialization]이 있는 대학교를 보유하고 있다면 특정 학자를 우대하여 영입할 수 있습니다.\n\n또한 자금을 투자하여 학문 진척도를 더 빠르게 올릴 수도 있습니다.\n\n\n또한 이벤트를 통해 학자를 얻거나, 과학 기술이 선진국 수준에 미치지 못하는 국가라면 외교 행동을 통해 학자를 구매할 수도 있습니다."
 mr_tutorial_science_overview_tab_scientific_focus: "과학적 초점"
 mr_tutorial_science_overview_tab_scientific_focus_desc: "때로는 특정 유형의 연구에 집중하고 싶을 수 있습니다. 조건을 충족하면 과학 집중 분야를 사용할 수 있으며, 이는 특정 기술 그룹의 연구를 촉진하는 대신 다른 분야의 효율을 감소시킵니다."
 mr_tutorial_science_overview_tab_scientific_expedition: "과학 탐사"
 mr_tutorial_science_overview_tab_scientific_expedition_desc: "Scientific Expeditions are Expeditions your country can start. Depending on the kind of expedition this can lead to great boons for your country.\n\nCurrently these Expeditions exist:\n- [concept_dubois_pacific_expedition]\n- [concept_verrier_venus_transit] Expedition\n- Expedition to find the Northwest Passage\n- Zeppelin Expedition\n- Expedition to lay a Transatlantic Cable"
 mr_tutorial_science_natural_history_tab_open: "Open the Natural History Tab"
 mr_tutorial_science_natural_history_tab_open_desc: "Now let us take a look at one of the [Concept('concept_academics_academic','$concept_academics_academics$')]. Open the Natural History Tab to continue."
 mr_tutorial_science_natural_history_tab_open_tt: "Go into the Natural History tab by clicking on the tab button."
 mr_tutorial_science_natural_history_tab_character: "학회"
 mr_tutorial_science_natural_history_tab_character_desc: "The heart of Morgenröte are its characters. In the science tab those characters are the [Concept('concept_academics_academic','$concept_academics_academics$')].\n\nOn the left side of each new character role you can see a portrait of your Academic and additional information on them."
 mr_tutorial_science_natural_history_tab_character_rating: "Character Rating"
 mr_tutorial_science_natural_history_tab_character_rating_desc: "For most characters you will find a small icon next to their name. This icon indicates their aptitude for their role. You can see which factors influence this rating by hovering over the icon.\n\nExplanation of the icons:\n@mr_rating_fantastic!  Perfect\n@mr_rating_very_good!  Very Good\n@mr_rating_good!  Good\n@mr_rating_mediocre!  Mediocre\n@mr_rating_bad!  Bad\n@mr_rating_very_bad!  Very Bad"
 mr_tutorial_science_natural_history_tab_character_experience_bar: "Character Experience"
 mr_tutorial_science_natural_history_tab_character_experience_bar_desc: "Each character has [concept_academics_experience] in their field of expertise. The higher the Experience the better the character performs in various tasks.\n\nExperience is gained passively every year as well as actively by completing tasks and having success. [Concept('concept_academics_academic','$concept_academics_academics$')] gain higher traits if they reach 100 (experienced) and 300 (famous) experience."
 mr_tutorial_science_natural_history_tab_character_achievements: "Character Achievements"
 mr_tutorial_science_natural_history_tab_character_achievements_desc: "[Concept('concept_academics_academic','$concept_academics_academics$')] sometimes achieve impressive deeds. You can always check what your academic has achieved so far by hovering over this icon."
 mr_tutorial_science_natural_history_tab_currencies: "Discoveries and Values"
 mr_tutorial_science_natural_history_tab_currencies_desc: "Most characters in Morgenröte have values attached to them. Those values are displayed in the center of each academic. For Geology, you will see how many minerals were found or how much geological knowledge you have for example.\n\nOftentimes you can find out more about certain values by hovering over them."
 mr_tutorial_science_natural_history_visit_button: "Visit Button"
 mr_tutorial_science_natural_history_visit_button_desc: "Most [Concept('concept_academics_academic','$concept_academics_academics$')] have special visit buttons that tell you more about this specific academic.\n\n The [concept_dubois_naturalist] for example has a button to visit the Zoo where you can find out more about your Zoo animals."
 mr_tutorial_science_natural_history_ranking: "Ranking"
 mr_tutorial_science_natural_history_ranking_desc: "Maybe you like comparing yourself to other countries. In that case the ranking might be interesting for you. Hoveringover this icon allows you to see various lists that allow you to see how well you are doing in a certain aspect of Morgenröte compared to other nations.\n\nThe [concept_agassiz_geologist] for example allows you to compare your Geological Score, Geological Knowledge, Oceanic Knowledge, Minerals and Rare Minerals."
 mr_tutorial_science_natural_history_project_buttons: "Project Buttons and other Buttons"
 mr_tutorial_science_natural_history_project_buttons_desc: "This part of the interface is one of the most important parts for you. It allows you to task your [Concept('concept_academics_academic','$concept_academics_academics$')] with projects and to start other important interactions.\n\nA [concept_agassiz_geologist] can go on expeditions, improve your industries, recalculate the age of the earth and you can found a mineralcabinet or start a congress on Continental Drift."
 mr_tutorial_science_natural_history_view_switch_buttons: "Change the Layout"
 mr_tutorial_science_natural_history_view_switch_buttons_desc: "If you prefer a more dense interfacre, you can switch the look of it by using this button. For the game itself it doesn't matter which variant you use. So, choose the variant that you like more."
 mr_start_culture_tutorial_button_loc: "Culture Tutorial"
 mr_tutorial_not_yet_implemented_tt: "This Tutorial is not yet ready."
 mr_tutorial_arts_window_open: "Open the Arts Window"
 mr_tutorial_arts_window_open_desc: "Now we will take a closer look into the arts window. Open the arts window by clicking on the button or by pressing the \"Ctrl + A\" keys on your keyboard."
 mr_tutorial_arts_window_open_tt: "Open the arts window by clicking the science button or pressing \"Ctrl + A\""
 mr_tutorial_arts_tab: "Arts Tab"
 mr_tutorial_arts_tab_desc: "Arts were an important part of the 19th and 20th century. Great [Concept('concept_artists_artist','$concept_artists_artists$')] of this epoch are still well known today.\n\nMorgenröte offers various kinds of Artists and their pieces of arts.\n\nThe Arts window itself has two tabs. One shows you an overview over the Arts in your country, in the other you can find your artists and recruit artists from foreign countries."
 mr_tutorial_arts_tab_cultural_tradition: "Cultural Tradition"
 mr_tutorial_arts_tab_cultural_tradition_desc: "Cultural Tradtion is value representing your countries cultural achievements.\nIt consists of [concept_elgar_musical_tradition], [concept_manzoni_literary_tradition] and [concept_klimt_painting_tradition].\n\nCultural Tradition is calculated using this formula:\nMusical Tradition / 4 + Painting Tradition / 3 + Literary Tradition / 2\n\nYou will additionally gain [concept_prestige] from your Arts Tradition. Every 5 points of Art Tradition will yield 1 additional Prestige."
 mr_tutorial_arts_overview_tab_open_tt: "Open the Arts Overview Tab"
 mr_tutorial_arts_tab_artist_progress: "Artist Progress"
 mr_tutorial_arts_tab_artist_progress_desc: "You can get new [Concept('concept_artists_artist','$concept_artists_artists$')] by different means: You can recruit them, gain them with events or by collecting enough [concept_artistic_progress].\n\nWhile events and recruitment is not possible for every nation, gaining artists by filling the Artistic Progress bar is possible once you own an $building_elgar_opera$ or an $building_art_academy$.\nYou can see a full list of factors influencing the monthly gain by hovering over the progress bar.\n\nAdditionally you can Patronize the Arts to gain more progress and promote certain artists if you have the necessary [concept_production_method] in your $building_art_academy$."
 mr_tutorial_arts_tab_center_of_arts: "Center of Arts"
 mr_tutorial_arts_tab_center_of_arts_desc: "[Concept('concept_artists_center_of_arts','$concept_artists_centers_of_arts$')] are the locations where an [concept_artists_art_style] was born.\n Some Centers of Arts are already existing at game start. Others can be unlocked by [Concept('concept_journal_entry','$concept_journal_entries$')] or by pressing one of the buttons that you can see here. Hover over the Center of Arts to see, how you can accquire it.\n\nObviously Center of Arts are useful for you and your country as they give you access to bonuses."
 mr_tutorial_arts_tab_artists_tab_open: "Open the Artists Tab"
 mr_tutorial_arts_tab_artists_tab_open_desc: "Now let us take a closer look at the [Concept('concept_artists_artist','$concept_artists_artists$')].\n\nOpen the Artists Tab by clicking on the tab button."
 mr_tutorial_arts_tab_artists_tab_open_open_tt: "Open the Artists Tab"
 mr_tutorial_arts_tab_artists: "Artists Tab"
 mr_tutorial_arts_tab_artists_desc: "The [Concept('concept_artists_artist','$concept_artists_artists$')] look quite similar to the Academics, but they work slightly different.\n\nCurrently there are 3 Artists:\n- [concept_elgar_composer]\n- [concept_manzoni_writer]\n- [concept_klimt_painter]"
 mr_tutorial_arts_tab_artists_invite: "Inviting Artists"
 mr_tutorial_arts_tab_artists_accquisation_desc: "As we already mentioned, [Concept('concept_artists_artist','$concept_artists_artists$')] can not just be acquired by gaining enough [concept_artistic_progress] but also by simply inviting them.\n\nEach kind of Artist has different requirements. You can invite [Concept('concept_elgar_travelling_composer','$concept_elgar_travelling_composers$')] from all around the world but you need to be a country with enough $building_elgar_opera$s and a good enough [concept_elgar_musical_tradition].\n\n[Concept('concept_klimt_independent_painter','$concept_klimt_independent_painters$')] can only be invited if they have a similar culture.\n\n[Concept('concept_manzoni_writer','$concept_manzoni_writers$')] on the other hand can't be invited at all."
 mr_tutorial_arts_tab_artists_character: "General Information"
 mr_tutorial_arts_tab_artists_character_desc: "The left most part of the window shows you some basic information on your artist.\n\nHere you can see:\n-The Portrait\n-The Name and Rating\n-The [concept_artists_experience]\n- The [Concept('concept_character_trait','$concept_character_traits$')]"
 mr_tutorial_arts_tab_artists_currencies: "Important Arts Values"
 mr_tutorial_arts_tab_artists_currencies_desc: "This part of the interface allows you to see general information regarding this specific aspect of art.\nFor the [concept_elgar_composer] it displays the [concept_elgar_musical_tradition], your Composer's Compositions and Masterworks and an overview of the five best Composers of the world for example.\n\nAdditionally you can find a Ranking when hovering over the small icon in the top right corner."
 mr_tutorial_arts_tab_artists_actions: "Artist Actions"
 mr_tutorial_arts_tab_artists_actions_desc: "[Concept('concept_artists_artist','$concept_artists_artists$')] have actions as well. Here you can see what your Artists can work on or what decisions you can take with your nation.\n\nThose were the most important informations concerning the Artists. You can continue with the Tutorial for Sports from here or continue your game."
 mr_start_sports_tutorial_button_loc: "Sports Tutorial"
 mr_tutorial_sports_window_open: "Open the Sports Window"
 mr_tutorial_sports_window_open_desc: "Now we will take a closer look into the sports window. Open the sports window by clicking on the button or by pressing the \"Ctrl + S\" keys on your keyboard."
 mr_tutorial_sports_window_open_tt: "Open the sports window by clicking the science button or pressing \"Ctrl + S\""
 mr_tutorial_sports_window: "Sports Window"
 mr_tutorial_sports_window_desc: "The Sports Window allows you to access all the different sports and characters who are relevant for the sports.\n\nThe Window is seperated into normal sports and Aeronautics.\n\nRegular Sports include:\n- [concept_vikelas_olympic_games]\n- [concept_douglas_mountaineering]\n- Ball Sports\n- [concept_vikelas_car_racing]\n\nAeronautics include:\n- [concept_curtiss_balloonist]\n- [concept_curtiss_pilot]"
 mr_tutorial_sports_tab: "Sports Tab"
 mr_tutorial_sports_tab_desc: "The Sports Tab gives you an overview over various sports related activities and characters.\nUnlike the Academics and Artists, the character in the sports tab are often just generals or politicians."
 mr_tutorial_sports_tab_open_tt: "Open the Sports Tab"
 mr_tutorial_sports_tab_character_overview: "Character Overview"
 mr_tutorial_sports_tab_character_overview_desc: "This part of the UI gives you an overview of the [concept_character].\n\nSome Characters like the [concept_vikelas_coach] and the Car Racer are characters that you can get and therefore have [concept_academics_experience]. Others like the Mountaineer do not have Experience."
 mr_tutorial_sports_tab_currencies: "Values and Information"
 mr_tutorial_sports_tab_currencies_desc: "In the middle you can see important information regarding this specific sport.\n\nThe [concept_vikelas_olympic_games] for example features an overview of the President and Board of the [concept_vikelas_ioc], how many members there are and how many medals you have collected so far."
 mr_tutorial_sports_tab_actions: "Actions"
 mr_tutorial_sports_tab_actions_desc: "The right side allows you to take specific actions for that sport.\nThose Actions are basically decisions that allow you to use your [Concept('concept_character', '$concept_characters$')] or to establish something new like [concept_vikelas_ioc]."
 mr_tutorial_sports_tab_aeronautics_tab_open: "Open Aeronautics Tab"
 mr_tutorial_sports_tab_aeronautics_tab_open_desc: "Now let us take a closer look at the Aeronautics Tab. Open the Tab by clicking the button."
 mr_tutorial_aeronautics_tab_open_tt: "Open the Aeronautics Tab"
 mr_tutorial_aeronautics_tab: "Aeronautics Tab"
 mr_tutorial_aeronautics_tab_desc: "The Aeronautics Tab looks mostly the same as the Sports Tab.\n\nOne big difference lies in the characters themselves. You can sponsor and automate the [concept_curtiss_balloonist] and the [concept_curtiss_pilot] will spawn under various circumstances.\n\nThis is the end of the overview Tutorial. Please use the Vickypedia or the Concepts we added if you would like to learn more about the characters of Morgenröte."
