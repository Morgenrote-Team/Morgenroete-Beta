 je_ito_specimen_collection_reason: "[ROOT.GetCountry.GetCustom('je_ito_specimen_collection_active_type')]A [concept_dubois_naturalist]가 바쁘지 않으면 당신의 나라에서 [Concept('concept_dubois_specimen','$concept_dubois_specimens$')]을(를) 찾을 것이다. 다른 프로젝트가 없으면 일부 표본을 수동으로 얻게 된다.\n$mr_divider_for_je$\n현재 예상 수확량은 @dubois_specimen! [ROOT.Var('ito_estimated_specimen_on_specimen_collection_var').GetValue|+=0] [Concept('concept_dubois_specimen','$concept_dubois_specimens$')]이다."
