l_korean:
 mr_botanical_expedition_no_current_expedtion_tt: "#default_text [GetPlayer.GetName]은(는) 현재 진행 중인 [concept_dubois_botanical_expedition]가 없음#!"
 je_ito_botanical_expedition: "식물 탐사"
 je_ito_botanical_expedition_reason: "현재 [concept_dubois_naturalist]는 [ROOT.Var('ito_botanical_expedition_target_var').GetFlagName|V]와 새로운 [Concept('concept_dubois_specimen','$concept_dubois_specimens$')]을 모으기 위한 [concept_dubois_botanical_expedition]에 참여 중입니다.\n$mr_divider_for_je$\n이 탐험으로 매달 [ROOT.Var('ito_botanical_expedition_target_var').GetFlagName|V] 수집 진행도를 획득합니다. 식물 탐사에서 최대 10종의 [concept_ito_medicinal_plants]를 수집할 수 있습니다.\n\n또한 탐사대는 매달 일정량의 [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] 산출량을 가지며 추가적인 [Concept('concept_dubois_specimen','$concept_dubois_specimens$')]이나 특수 식물을 더할 이벤트의 기회를 갖고 있습니다.\n$mr_divider_for_je$\n현재 탐험 산출량: @dubois_specimen! [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] [GetPlayer.MakeScope.Var('ito_total_specimen_current_botanical_expedition_var').GetValue|*V0]점\n예상 월간 산출량: @dubois_specimen! [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] [GetPlayer.MakeScope.Var('ito_estimated_specimen_on_botanical_expedition_var').GetValue|=+0]점"
 je_ito_botanical_expedition_goal_tt: "$ito_botanical_expedition_progress_bar$바가 #V 12#!에 도달"
 ito_botanical_expedition_progress_bar: "탐사 진행도"
 ito_botanical_expedition_progress_bar_desc: "탐사 진행도: #v [JournalEntry.GetCurrentBarProgress(ScriptedProgressBar.Self)|%]#! ([JournalEntry.GetCurrentBarValue(ScriptedProgressBar.Self)|1]/12)"
 ito_botanical_expedition_progress_bar_monthly_progress_tt: "월간 진행도"
 ito_naturalist_is_dead_tt: "#default_text [concept_dubois_naturalist]가 없습니다."
 dubois.390.t: "식물 탐사 귀환"
 dubois.390.d: "[SCOPE.sCharacter('dubois_naturalist_scope').GetFullName]가 이끄는 우리 [concept_dubois_botanical_expedition] 대원들이 돌아왔다. 총 [SCOPE.GetValue('medicinal_herbs_scope_value')|0+]개의 [ROOT.Var('ito_botanical_expedition_target_var').GetFlagName|V]와 @dubois_specimen! [GetPlayer.MakeScope.Var('ito_total_specimen_current_botanical_expedition_var').GetValue|*0+] 규모의 [Concept('concept_dubois_specimen','$concept_dubois_specimens$')]을 수집했다."
 dubois.390.f: "\"이곳에 아직 아무도 발견하지 않은 신기한 식물을 찾았군! 식물의 이름은 '[SCOPE.sCharacter('dubois_naturalist_scope').GetLastNameNoFormatting]'로 하겠네!\""
 dubois.390.g: "돌아온 걸 환영한다!"
 ito_total_specimen_collected_on_expedition_tt: "이번 [concept_dubois_botanical_expedition]에서 수집한 @dubois_specimen! [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] 수는 총 [GetPlayer.MakeScope.Var('ito_total_specimen_current_botanical_expedition_var').GetValue|*V0]에 달합니다."
 ito_state_trait_medicinal_plant_aloe_vera: "알로에 베라"
