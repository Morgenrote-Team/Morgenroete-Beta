l_korean:
 mr_botanical_expedition_no_current_expedtion_tt: "#default_text [GetPlayer.GetName]은(는) 현재 활성화된 [concept_dubois_botanical_expedition]이 없거나, 어디로 보낼지 #V 선택 중#!입니다.#!"
 je_ito_botanical_expedition: "식물 탐사대"
 je_ito_botanical_expedition_reason: "Your [concept_dubois_naturalist] is currently on a [concept_dubois_botanical_expedition] to gather [ROOT.Var('ito_botanical_expedition_target_var').GetFlagName|V] and new [Concept('concept_dubois_specimen','$concept_dubois_specimens$')].\n$mr_divider_for_je$\nEach month the Expedition will gain progress towards gathering [ROOT.Var('ito_botanical_expedition_target_var').GetFlagName|V]. Over a Botanical Expedition, a maximum of 10 [concept_ito_medicinal_plants] can be gathered\n\nAdditionally the expedition will yield [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] each month and has a chance of events that will add additional [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] or even special plants.\n$mr_divider_for_je$\nCurrent yield of the Expedition: @dubois_specimen! [GetPlayer.MakeScope.Var('ito_total_specimen_current_botanical_expedition_var').GetValue|*V0] [Concept('concept_dubois_specimen','$concept_dubois_specimens$')]\nEstimated monthly yield: @dubois_specimen! [GetPlayer.MakeScope.Var('ito_estimated_specimen_on_botanical_expedition_var').GetValue|=+0] [Concept('concept_dubois_specimen','$concept_dubois_specimens$')]"
 je_ito_botanical_expedition_goal_tt: "The $ito_botanical_expedition_progress_bar$ bar has reached #V 12#!."
 ito_botanical_expedition_progress_bar: "탐험 진행도"
 ito_botanical_expedition_progress_bar_desc: "탐험 진행도: #v [JournalEntry.GetCurrentBarProgress(ScriptedProgressBar.Self)|%]#! ([JournalEntry.GetCurrentBarValue(ScriptedProgressBar.Self)|1]/12)"
 ito_botanical_expedition_progress_bar_monthly_progress_tt: "월간 진행도"
 ito_naturalist_is_dead_tt: "#default_text [concept_dubois_naturalist]가 없습니다."
 dubois.390.t: "식물 탐사대 귀환"
 dubois.390.d: "Our [concept_dubois_botanical_expedition] lead by [SCOPE.sCharacter('dubois_naturalist_scope').GetFullName] has returned. In total they gathered [SCOPE.GetValue('medicinal_herbs_scope_value')|0+] [ROOT.Var('ito_botanical_expedition_target_var').GetFlagName|V] and  @dubois_specimen! [GetPlayer.MakeScope.Var('ito_total_specimen_current_botanical_expedition_var').GetValue|*0+] [Concept('concept_dubois_specimen','$concept_dubois_specimens$')]"
 dubois.390.f: "\"여기서 아무도 아직 발견하지 않은 신기한 식물을 찾았어! 이 식물 이름은 [SCOPE.sCharacter('dubois_naturalist_scope').GetLastNameNoFormatting]로 할게!\""
 dubois.390.g: "돌아온 걸 환영한다!"
 ito_total_specimen_collected_on_expedition_tt: "이번 [concept_dubois_botanical_expedition]가 수집한 @dubois_specimen!의 수는 총 [GetPlayer.MakeScope.Var('ito_total_specimen_current_botanical_expedition_var').GetValue|*V0] [Concept('concept_dubois_specimen','$concept_dubois_specimens$')]입니다."
