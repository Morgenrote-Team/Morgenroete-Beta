l_korean:
 mr_botanical_expedition_no_current_expedtion_tt: "#default_text [GetPlayer.GetName]은(는) 현재 활성화된 [concept_dubois_botanical_expedition]이 없거나, 어디로 보낼지 #V 선택 중#!입니다.#!"
 je_ito_botanical_expedition: "식물 탐사대"
 je_ito_botanical_expedition_reason: "당신의 [concept_dubois_naturalist]는 현재 새로운 [Concept('concept_dubois_specimen','$concept_dubois_specimens$')]을 수집하기 위한 [concept_dubois_botanical_expedition]에 참여 중입니다.\n$mr_divider_for_je$\n이 탐험은 매달 [Concept('concept_dubois_specimen','$concept_dubois_specimens$')]을 산출하며, 추가 [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] 또는 특별한 식물을 얻을 수 있는 이벤트가 발생할 가능성이 있습니다.\n$mr_divider_for_je$\n현재 탐험 산출량: @dubois_specimen! [GetPlayer.MakeScope.Var('ito_total_specimen_current_botanical_expedition_var').GetValue|*V0] [Concept('concept_dubois_specimen','$concept_dubois_specimens$')]\n예상 월간 산출량: @dubois_specimen! [GetPlayer.MakeScope.Var('ito_estimated_specimen_on_botanical_expedition_var').GetValue|=+0] [Concept('concept_dubois_specimen','$concept_dubois_specimens$')]"
 je_ito_botanical_expedition_goal_tt: "The progress bar has reached #V 24#!."
 ito_botanical_expedition_progress_bar: "탐험 진행도"
 ito_botanical_expedition_progress_bar_desc: "탐험 진행도: #v [JournalEntry.GetCurrentBarProgress(ScriptedProgressBar.Self)|%]#! ([JournalEntry.GetCurrentBarValue(ScriptedProgressBar.Self)|1]/24)"
 ito_botanical_expedition_progress_bar_monthly_progress_tt: "월간 진행도"
 ito_naturalist_is_dead_tt: "#default_text [concept_dubois_naturalist]가 없습니다."
 dubois.390.t: "식물 탐사대 귀환"
 dubois.390.d: "[SCOPE.sCharacter('dubois_naturalist_scope').GetFullName]가 이끄는 우리 [concept_dubois_botanical_expedition]이 돌아왔습니다. 총 @dubois_specimen! [GetPlayer.MakeScope.Var('ito_total_specimen_current_botanical_expedition_var').GetValue|*V0] [Concept('concept_dubois_specimen','$concept_dubois_specimens$')]을 수집했습니다."
 dubois.390.f: "\"여기서 아무도 아직 발견하지 않은 신기한 식물을 찾았어! 이 식물 이름은 [SCOPE.sCharacter('dubois_naturalist_scope').GetLastNameNoFormatting]로 할게!\""
 dubois.390.g: "돌아온 걸 환영한다!"
 ito_total_specimen_collected_on_expedition_tt: "총 @dubois_specimen! [GetPlayer.MakeScope.Var('ito_total_specimen_current_botanical_expedition_var').GetValue|*V0] [Concept('concept_dubois_specimen','$concept_dubois_specimens$')]이(가) 이번 [concept_dubois_botanical_expedition]에서 수집되었다."
 ito_state_trait_medicinal_plant_aloe_vera: "알로에 베라"
 ito_state_trait_medicinal_plant_atropa_belladonna: "아트로파 벨라-도나"
 ito_state_trait_medicinal_plant_carapichae_ipecacuanha: "카라피채 이페카쿠아나"
 ito_state_trait_medicinal_plant_cinchona_pubescens: "신초나 푸베센스"
 ito_state_trait_medicinal_plant_digitalis_purpurea: "디기탈리스 퍼푸레아"
 ito_state_trait_medicinal_plant_ephedra_sinica: "마황"
 ito_state_trait_medicinal_plant_pilocarpus_pennatifolius: "필로카르푸스 페나티폴리우스"
 ito_state_trait_medicinal_plant_strophanthus_gratus: "스트로판투스 그라투스"
 ito_state_trait_medicinal_plant_strychnos_nuxvomica: "스트라이크노스 눅스-보미카"
 ito_state_trait_medicinal_plant_thymus_vulgaris: "백리향"
 dubois_botany_sickness_modifier: "식물학병"
 je_ito_specimen_collection: "표본 수집"
 je_ito_specimen_collection_reason: "[ROOT.GetCountry.GetCustom('je_ito_specimen_collection_active_type')]A [concept_dubois_naturalist]가 바쁘지 않으면 당신의 나라에서 [Concept('concept_dubois_specimen','$concept_dubois_specimens$')]을(를) 찾을 것이다. 다른 프로젝트가 없으면 일부 표본을 수동으로 얻게 된다.\n$mr_divider_for_je$\n현재 예상 수확량은 @dubois_specimen! [ROOT.Var('ito_estimated_specimen_on_specimen_collection_var').GetValue|+=0] [Concept('concept_dubois_specimen','$concept_dubois_specimens$')]이다."
 je_ito_specimen_collection_active_loc: "#p 이 프로젝트는 현재 진행 중입니다.#!\n$mr_divider_for_je$\n"
 je_ito_specimen_collection_inactive_loc: "#n 이 프로젝트는 현재 비활성화 상태입니다.#!.\n$mr_divider_for_je$\n"