 je_ito_improve_forestry_project_reason: "우리 [concept_dubois_naturalist] [ROOT.Var('dubois_naturalist_var').GetCharacter.GetLastName] 박사가 [JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetState.GetName]의 [JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetName] 생산량 개선에 주력합니다.\n$mr_divider_for_je$\n이 사업은 매달 진행도를 얻습니다. 진행도가 24에 도달할 떄마다 현재 건물에 새로운 변화 요인이 부여됩니다. 이 사업에 선정된 모든 건물이 변화 요인을 부여받게 되었다면 사업은 끝이 납니다.\n변화 요인은 총 세 가지가 존재합니다. 각각의 새로운 변화 요인마다 진행도를 다시 채워야 합니다.\n하나의 [GetBuildingType('building_logging_camp').GetName]에서 모든 변화 요인을 부여받게 되면 [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] @dubois_specimen! #p 500점#!도 손에 넣게 됩니다.\n$mr_divider_for_je$\n현재 건물:[JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetState.GetName]의 [JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetName]\n[JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetCustom('je_ito_improve_forestry_project_modifier_1_type')]\n[JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetCustom('je_ito_improve_forestry_project_modifier_2_type')]\n[JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetCustom('je_ito_improve_forestry_project_modifier_3_type')]\n\n남은 건물 수 (현재 대상 제외): [JournalEntry.MakeScope.Var('mr_number_of_remaining_list_entries_var').GetValue|V0]곳\n사업으로 얻은 $concept_dubois_specimens$ 수: @dubois_specimen! [JournalEntry.MakeScope.ScriptValue('ito_specimens_from_forestry_project_value')|+0]점\n\n현재 월간 진행도: #underline #tooltip:[GetRawTextTooltipTag('dubois_monthly_naturalist_improvement_progress_var_tt')] [GetPlayer.MakeScope.ScriptValue('ito_naturalist_improvement_project_progress_value')|+2] #!#!"
