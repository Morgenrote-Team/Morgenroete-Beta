 je_ito_specimen_collection: "수집 표본"
 je_ito_specimen_collection_reason: "[ROOT.GetCountry.GetCustom('je_ito_specimen_collection_active_type')] [concept_dubois_naturalist]는 분주한 상태가 아닐 경우 우리나라에서 [Concept('concept_dubois_specimen','$concept_dubois_specimens$')]을 찾아 나서게 됩니다. 다른 과제가 없으면 표본 몇 개를 자동으로 얻게 됩니다.\n$mr_divider_for_je$\n현재 예상 획득량은 @dubois_specimen! [ROOT.Var('ito_estimated_specimen_on_specimen_collection_var').GetValue|+=0] [Concept('concept_dubois_specimen','$concept_dubois_specimens$')]입니다."
