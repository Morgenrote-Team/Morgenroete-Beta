 ito_state_trait_medicinal_plant_strychnos_nuxvomica: "Strychnos Nux-Vomica"
 ito_state_trait_medicinal_plant_thymus_vulgaris: "Thymus Vulgaris"
 dubois_botany_sickness_modifier: "Botany Sickness"
 je_ito_specimen_collection: "Specimen Collection"
 je_ito_specimen_collection_reason: "[ROOT.GetCountry.GetCustom('je_ito_specimen_collection_active_type')]A [concept_dubois_naturalist] who is not busy will search for [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] in your country. As long as no other project is active, you will gain some Specimens passively.\n$mr_divider_for_je$\nThe estimated yield is currently @dubois_specimen! [ROOT.Var('ito_estimated_specimen_on_specimen_collection_var').GetValue|+=0] [Concept('concept_dubois_specimen','$concept_dubois_specimens$')]"
