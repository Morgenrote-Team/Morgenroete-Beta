 agassiz.105.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] 박사가 광업 회사에서 활용할 새로운 광물 매장지를 찾아낸 뒤 복귀하였다. 이제 그곳을 얼마나 더 개발할 것인가는 박사의 몫이 아니다.\n\n개량된 건물 수: [GetPlayer.MakeScope.Var('mr_num_improved_mines_buildings_var').GetValue|V0]곳\n사업으로 획득한 $concept_agassiz_minerals$ 수: @agassiz_mineral! [GetPlayer.MakeScope.ScriptValue('agassiz_generic_minderals_from_mine_project_for_event_value')|+0]"
 agassiz_monthly_geologist_project_progress_geologist_is_surveyor_tt: "[concept_agassiz_geologist]의 #V $surveyor$#! [concept_character_trait]"
 je_agassiz_improve_mines_project: "광업 개량"
 je_agassiz_improve_mines_project_reason: "우리 [concept_agassiz_geologist] [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] 박사가 [JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetState.GetName]의 [JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetName]의 개량을 위해 광맥 탐사와 다른 수단의 동원에 열을 올리고 있습니다.\n$mr_divider_for_je$\n이 사업은 매달 진행도를 얻습니다. 진행도가 #V 24점#!에 도달하면 건물에 새로운 $agassiz_building_production_mult_modifier_with_tooltip$ [concept_modifier]이 부여됩니다. 추가로 [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')] @agassiz_mineral!#p 2500#!을 얻습니다.\n$mr_divider_for_je$\n현재 건물: [JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetState.GetName]의 [JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetName]\n[JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetCustom('je_agassiz_improve_mines_project_modifier_1_type')]\n\n남은 건물 수 (현재 대상 제외): [JournalEntry.MakeScope.Var('mr_number_of_remaining_list_entries_var').GetValue|V0]곳\n사업으로 얻는 $concept_agassiz_minerals$: @agassiz_mineral! [JournalEntry.MakeScope.ScriptValue('agassiz_generic_minderals_from_mine_project_value')|+0]\n\n현재 월간 진행도: #underline #tooltip:[GetRawTextTooltipTag('agassiz_monthly_geologist_improvement_progress_var_tt')] [GetPlayer.MakeScope.ScriptValue('agassiz_monthly_geologist_project_progress_value')|+2]#!#!"
