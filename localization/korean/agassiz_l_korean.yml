 agassiz_deep_sea_research_tech: "심해 연구"
 agassiz_deep_sea_research_tech_desc: "1930년대 오티스 바튼과 윌리엄 비비는 심해의 엄청난 압력을 견딜 수 있도록 설계된 구형 강철 압력 용기, '바티스피어'를 처음 활용하였습니다. 이 기기의 발명으로 인류는 처음으로 심해를 직접 눈으로 관찰할 수 있게 되었으며, 1934년 버뮤다 연안 지대에서 수심 923m라는 기록을 세웠습니다. 이러한 성공과 더불어 자신의 고고도 열기구 비행에서 영감을 얻은 스위스 물리학자 오귀스트 피카르는 가압식 선실 설계를 응용하여 자체동력식 심해장수정인 '바티스카프'를 개발하기도 했습니다."
