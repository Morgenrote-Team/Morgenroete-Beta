l_korean:
 agassiz_geology_tech: "지질학"
 agassiz_geology_tech_desc: "1815년 운하 시공업자 윌리엄 스미스는 화석 함량과 암석학적 특성을 모두 망라한 잉글랜드와 웨일스 지역의 지질도를 출판하였습니다. 스미스는 상당히 특징적이면서도 확실한 동물군 퇴적층으로 개별적인 암석층을 구분할 수 있다는 사실을 발견하였습니다. 1827년 레오폴트 폰 부흐는 상대적 연대측정법을 적용할 수 있는 화석을 아울러 '지표 화석'이라는 용어를 만들었습니다. 이 시점부터 지구의 실제 나이를 밝히는 것은 과학계의 숙제로 남게 되었습니다."
 notification_agassiz_yearly_minerals_notification_name: "연간 지질학 보고서"
 notification_agassiz_yearly_minerals_notification_desc: "올해 새롭게 발견하고 기록한 [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')] 수는 총 [GetPlayer.MakeScope.Var('agassiz_generic_minerals_notification_var').GetValue|0+=]점입니다."
 agassiz_sounding_tech: "음향측심기"
 agassiz_sounding_tech_desc: "음향 수심 측정기는 원래 잠수함전에 대응하려는 목적에서 발명되었습니다. 하지만 훗날 다양한 민간 분야에서도 사용되었는데 어군 탐지나 심해 연구 등이 대표적입니다."
 building_agassiz_volcano_observatory: "화산 관측소"
