 je_agassiz_volcano_expedition: "화산 탐사"
 je_agassiz_volcano_expedition_reason: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] 박사는 전문가와 조수로 구성된 탐사단을 이끌고 [SCOPE.sState('agassiz_volcano_state').GetName]의 화산 탐사에 나섰습니다. 탐사 예산은 최대 2년까지만 지원됩니다. 일반적으로 탐사는 매달 진행도를 획득하며 1년 반의 시간이 흐르면 연구 활동을 마무리하여야 합니다. 하지만 과학적인 이득이든 파국적인 불행이든 예기치 못한 상황이 발생할 수 있습니다. 일반적으로 위험도가 최고치에 도달하는 일은 절대 없어야 합니다. 여긴 애들 장난이 아닙니다. 화산을 즐겨서는 안 되는 것입니다."
 agassiz.21.t: "베수비오 관측소"
 agassiz.21.d: "지질학계에서 베수비오 화산은 화산학 전반의 결론 도출에 있어 본보기가 되는 화산으로 평가받고 있다. 17세기 이후 화산 활동을 늘려나가면서 최근의 분화를 예측하고 과학적으로 연구하기 위해 주 정부에서 산비탈에 화산 관측소를 건설한다는 칙령을 내렸다."
 agassiz.21.f: "베수비오 관측소 (Osservatorio Vesuviano)는 이탈리아 캄파니아주의 3대 화산 지대, 즉 베수비오산, 플레그리아 평원, 이스키아섬을 관측 대상으로 삼는 감시 센터이다. 1841년 양시칠라 왕국의 페르디난드 2세의 명으로 베수비오 산기슭에 설립된 이 관측소는 세계에서 가장 오래된 화산학 연구소로 남아 있다."
 agassiz.21.g: "우리는 화산학의 선두 국가다."
