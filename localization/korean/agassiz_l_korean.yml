 agassiz.812.t: "새로운 최고봉 발견?"
 agassiz.812.d: "지난 세월 동안 측정이 이루어진 가장 높은 산은 다울라기리산이라는 것이 정설이었으나 [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] 박사는 확신을 가지지 못했다. 수개월에 걸친 삼각측량과 끊임없는 계산을 진행한 결과, 안개 속에서 새로운 후보가 등장했다. 바로 칸첸중가산이었다."
 agassiz.812.f: "폭풍이 몰아쳐도 [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] 박사의 계측기는 의심의 여지를 남길 틈이 없었다. 시킴과 네팔 국경에 위치한 외딴 봉우리는 해발 28,000피트(8500m) 높이를 기록하며 이전의 모든 기록을 경신하였다. 이것으로 지리학계와 지도 제작, 국가의 자긍심에 지대한 영향을 끼치게 되었다."
 agassiz.812.g: "산 이름을 좀 더 쉽게 지을 순 없었소?"
 agassiz.812.tt: "이제부터 #V 칸첸중가산#!이 세계에서 가장 높은 산으로 인정받게 됩니다."
 agassiz.813.t: "산 중의 산"
 agassiz.813.d: "벵골의 어느 고지대 위에서 하늘을 향해 놋쇠 계측기를 두드리던 사람들로부터 모든 것은 시작됐다. 그 곁에 있던 [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName](이)가 있을 수 없는 사실을 계산으로 입증하고 말았다. 이름도 없고 알려지지도 않은 외딴 봉우리, '제15번 봉'이 지금껏 측정된 그 어떤 정상보다도 높은 것으로 드러난 것이다."
 agassiz.813.f: "그 사실이 발표되자 학계에 큰 파장이 일었다. 해발 29,000피트(8,800m) 높이에 달하는 이 히말라야의 거봉은 칸첸중가와 다울라기리를 낮잡아 보이게 만들었다. 아직 이름조차 없었으나 학자들은 벌써부터 이 봉우리를 '세계의 지붕'이라 칭하기 시작했다."
 agassiz.813.g: "아무도 기억 못할 무명의 영국 측량사로부터 이름을 따 옵시다!"
 agassiz.813.tt: "이제부터 #V 에베레스트산#!이 세계에서 가장 높은 산으로 인정받게 됩니다."
 je_agassiz_highest_mountain: "가장 높은 산"
 je_agassiz_highest_mountain_reason: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] 박사는 지질학자와 지리학자로 구성된 탐사대를 이끌고 지구상에서 가장 높은 산을 밝혀내기 위해 히말라야 산맥으로 떠났다. 박사는 2년 후에 돌아올 전망이다."
