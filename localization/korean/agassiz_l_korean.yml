 agassiz.103.t: "지질학 조사단 철수"
 agassiz.103.d: "지질학 조사단이 작업을 마치고 연구원들이 고국으로 돌아갔다. 이들이 발견한 지층은 이제 우리 학자들도 살펴볼 수 있게 되었다."
 agassiz.103.f: "\"나는 아가시즈 교수님의 말씀을 인용하며 이 장을 마무리 짓고자 한다. 과학에서 새롭고 놀라운 사실이 밝혀지면 사람들은 먼저 \"그건 사실이 아니다\"라 하고, 그 다음에는 \"종교에 어긋난다\"라 하며, 끝에 가서는 \"이미 다들 알고 있던 사실이다\"라고 말한다는 것이다.' -찰스 라이엘"
 agassiz.103.g: "해외의 손길도 도움이 되는군."
 agassiz.104.t: "우라늄 조사단 철수"
 agassiz.104.d: "우라늄 조사단이 작업을 마치고 연구원들이 고국으로 돌아갔다. 이들이 발견한 우라늄 매장지는 이제 우리 기업들도 개발할 수 있게 되었다."
