 agassiz.801.t: "지진계"
 agassiz.801.d: "오늘 [GetPlayer.MakeScope.Var('tesla_engineer_var').GetCharacter.GetFullName](와)과 [GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetFullName] 두 사람이 지진 활동을 기록하는 새로운 기기를 공개했다. 이른바 지진계라 하는 이 기기는 지진을 더욱 잘 감지하기 위한 첫걸음에 해당된다."
 agassiz.801.f: "1839년 스코틀랜드 콤리 인근에서 발생한 일련의 지진을 계기로 영국에서는 지진 탐지 방식을 개선하기 위한 위원회가 출범하였다. 그 결과 제임스 데이비드 포브스가 최초의 것으로 꼽히는 현대식 지진계를 제작하였다. 1857년부터 로버트 말렛은 폭약을 이용한 지진 실험을 실시하며 오늘날 계측 지진학의 기반을 다졌다. 말렛은 '지진학'이라는 용어를 처음 사용한 장본인이기도 하다."
 agassiz.801.g: "이 기기라면 분명 우리 학계에 도움이 되겠군."
 agassiz.801.h: "이 기기라면 분명 과학 연구에 도움이 되겠군."
 agassiz.802.t: "지진기록계"
 agassiz.802.d: "오늘 [GetPlayer.MakeScope.Var('tesla_engineer_var').GetCharacter.GetFullName](와)과 [GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetFullName] 두 사람이 지진 활동을 기록하는 새로운 기기를 공개했다. 이 기기는 기존 지진계보다 훨씬 우수한 성능을 보이며 지진 발생 지역도 한층 더 정확하게 감지할 수 있다. 이를 통해 비상 상황 시 더욱 정밀한 대비가 가능해졌다."
 agassiz.802.f: "최초의 지진기록계는 1870년대~1880년대에 이르러 발명되었다. 그 가운데 첫번째 사례는 1875년 필리포 체키가 제작한 것이지만 감도가 충분치 않았다. 1887년 지진기록계를 이용한 최초의 지진파 기록이 이루어졌으나, 그 무렵 존 밀른은 일본에서 이미 본연의 지진기록계를 제작 시연한 상황이었다. 1880년 존 밀른, 제임스 앨프레드 어윙, 토머스 그레이는 1895년까지 일본 정부 자문관으로 재직하면서 최초의 수평진자식 지진기록계를 발명하였다. 메이지 정부에 입각해 5년 동안 일본의 근대화 노력에 힘을 보탠 밀른과 어윙, 그레이는 1880년 2월 22일 요코하마에서 발생한 지진을 계기로 일본지진학회를 설립하기에 이르렀다."
 agassiz.802.g: "이 기기라면 분명 지질학에 도움이 되겠군."
 je_agassiz_seismometer: "지진계"
 je_agassiz_seismometer_reason: "지진계는 지진경을 한층 발전시킨 기기입니다. 지진을 감지하는 데에는 여전히 매우 제한적인 기기지만, 적어도 지진이 발생한 사실을 기록하는 수단으로서는 유용합니다.\n\n[concept_tesla_engineer]와 [concept_agassiz_geologist]를 모두 보유하면 진행도를 얻습니다."
 je_agassiz_seismometer_goal: "지질학자와 공학자가 새로운 기기 개발을 위해 [JournalEntry.GetTotalGoalValue|V0]주의 시간을 보내야 함"
 je_agassiz_seismograph: "지진기록계"
 je_agassiz_seismograph_reason: "지진기록계에 장착된 지진계는 지진과 지진파의 기록 성능을 놀라울 정도로 향상시킵니다. 이는 최종적으로 한층 더 현대적인 지진학 연구를 가능하게 할 것입니다. 지진경이 장치를 작동시켜 기록을 개시하면, 기록면(지진기록지)에 지진파가 그래프의 형태로 자동으로 그려집니다.\n\n[concept_tesla_engineer]와 [concept_agassiz_geologist]를 모두 보유하면 진행도를 획득합니다."
 je_agassiz_seismograph_goal: "지질학자와 공학자가 새로운 기기 개발을 위해 [JournalEntry.GetTotalGoalValue|V0]주의 시간을 보내야 함"
 agassiz_seismometer_done_tt: "지질학자와 공학자가 기기에 대한 이론적 예비 검토를 마치고 지진기록계 제작에 착수함"
 agassiz_seismograph_done_tt: "지질학자와 공학자가 기기에 대한 이론적 예비 검토를 마치고 지진계 제작에 착수함"
 agassiz.302.t: "간헐천"
 agassiz.302.d: "특별한 지질학적 지형을 탐색하던 [GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetFullName](이)가 외딴 지역에서 경이로운 자연 현상과 마주쳤다. 이 지역에 간헐천이 있었던 것이다!"
 agassiz.302.f: "간헐천은 규칙적이거나 불규칙적인 간격으로 물을 분수처럼 뿜어내는 온천을 말한다. 간헐천은 영어로 게이서(geyser)라고 하는데, 이는 아이슬란드의 대(大)게이시르 (Geysir)에서 유래한 말이다. 간헐천은 특수한 지질학적, 기후적 여건이 맞아떨어져야 형성되는데, 이러한 여건은 몇몇 지역에서만 대규모로 나타난다. 간헐천의 형성은 세 가지 요인에 달려 있다. 지하수층 형태의 수원과 열원이 존재하고, 하나 이상의 저수지가 수축되어 배수 체계로 연결되어야 한다. 미국 옐로스톤 국립공원에는 300개 이상의 간헐천이 있는데, 이는 전 세계에 존재하는 간헐천의 약 절반에 해당된다."
 agassiz.302.g: "간헐천이 분출하는 간격이 분 단위인가, 시간 단위인가?"
