 agassiz.11.g: "그 정도면 지진학의 창시자라 부를 만하지 않겠나?"
 agassiz.301.d: "[GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetLastName] 박사는 너무나도 지루한 암석 지형과 칙칙한 구릉 지대를 조사하는 5년 간의 연구를 마무리하고, 시간이 한가해진 틈을 타 대학으로 복귀하여 학생들에게 똑같은 수준의 재미가 담긴 강의로 괴롭히고 있다."
 agassiz.316.t: "이웃 국가의 지질학 조사"
 agassiz.316.d: "[GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetFullName](은)는 제 연구 분야를 가볍게 연기고 이웃 나라로 건너가 암석 지형과 동굴을 탐사하였다. 물론 지질학 연구 결과는 우리가 독차지하게 된다."
 agassiz.316.g: "어떻게 들키지 않고 잠입할 수가 있었지?"
 je_agassiz_find_coal_project_reason: "우리 [concept_agassiz_geologist] [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] 박사가 [JournalEntry.GetTarget.GetBuilding.GetName]의 [JournalEntry.GetTarget.GetBuilding.GetState.GetName]에서 광맥 탐사에 열을 올리고 있습니다.\n$mr_divider_for_je$\n이 사업은 매달 진행도를 얻습니다. 진행도가 [JournalEntry.GetTotalGoalValue|V0]에 도달하면 건물에 새로운 $agassiz_building_production_mult_modifier_with_tooltip$ [concept_modifier]이 부여됩니다.\n$mr_divider_for_je$\n현재 월간 진행도: #underline #tooltip:[GetRawTextTooltipTag('agassiz_monthly_geologist_improvement_progress_var_tt')] [GetPlayer.MakeScope.GetVariable('agassiz_monthly_geologist_improvement_progress_var').GetValue|2+]#!#!"
