 agassiz_stop_geologist_project_button_desc: "현재 지질학자 과제를 중단합니다. 모든 지질학자 진행도가 사라집니다."
 agassiz_stop_geologist_improving_project_tt: "#italic 지질학자 과제 중단#! 버튼을 클릭하여 과제를 중단할 수 있습니다."
 agassiz_mid_atlantic_ridge_cost_modifier: "대서양 탐사 예산"
 je_agassiz_mid_atlantic_ridge: "해저 산맥"
 je_agassiz_mid_atlantic_ridge_reason: "[concept_agassiz_geologist]로 활동 중인 [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] 박사는 현재 음향측심기로 대서양의 해저를 훑어보는 최신 탐사선에 승선해 있다. 이번 탐사를 통해 지구 역사에 관한 새로운 통찰력을 얻을 수 있을 것이다."
 je_agassiz_mid_atlantic_ridge_goal: "12개월 후 [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] 박사의 탐사 결과가 밝혀짐"
 agassiz.201.t: "대서양 중앙 해령"
 agassiz.201.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] 박사가 초기 자료 일부를 검토하였다. 탐사 결과는 놀라웠다. 해저 융기가 적도 부근에서만 끊어졌을 뿐, 대서양 북부를 넘어 대서양 전체에 걸쳐 연속적인 띠의 형태로 나타났던 것이다.  지질학자는 이 현상을 대서양 중앙 해령이라 명명하였다. 향후 수개월, 수 년에 걸쳐 자료 추가 분석이 진행될 전망이다."
 agassiz.201.f: "대서양 중앙 해령은 대부분 해수면 아래에 놓여 있는 대서양의 산맥으로 약 20,000km에 걸쳐 뻗어 있다. 이는 지구를 가로지르는 60,000km 길이의 중앙 해령 가운데서도 최대 규모에 해당된다. 대서양 중앙 해령의 해저 융기는 1853년 해군 장교 매튜 폰테인 모리가 처음 기록하였으며 1872년 챌린저호 탐사에서 처음 사실로 확인되었다. 이는 최초의 대서양 횡단 심해 케이블 부설 과정에서 사전 조사가 이루어졌기 때문이다. 1925년~1927년 독일의 메테오 탐사대는 음향측심기를 사용하여 대서양 중앙 해령의 세부 정보를 알아냈다. 대서양 중앙 해령의 발견은 베게너의 대륙이동설과 연관된 판 구조론의 지구역학적 과정에 관한 첫 단서를 제공하게 되었다."
 agassiz.201.g: "이것으로 지질학자의 지질학적 이해도가 향상됩니다."
 agassiz.201.h: "이것으로 지질학자의 해양학적 이해도가 향상됩니다."
 agassiz.201.i: "이것으로 지질학자의 포괄적인 이해도가 향상됩니다."
 agassiz.202.t: "지질학-고생물학 심포지엄"
 agassiz.202.d: "학술원에서 [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] 교수와 [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetFullName] 교수가 주최하는 행사에 관계 인사들을 초청하였다. 이번 심포지엄은 지구 역사 연구에 있어 하나의 이정표로 여겨진다. 두 교수는 특히 남아메리카와 서아프리카 연안의 지질학적, 화석 구성에서 놀라울 정도로 유사성을 보인다는 사실을 강조할 전망이다."
 agassiz.202.f: "지질학과 고생물학이 얼마나 가까운 관계에 있는지는 두 분야에서 모두 두각을 드러낸 과학자가 수없이 많았다는 사실로 알 수 있다. 지층과 화석의 상호작용을 통한 연대 측정은 두 학문을 불가분의 관계로 만든다. 조르주 쿠비에는 고생물학의 아버지인 동시에 지질학의 대부로 여겨진다. 심지어 과학적 논쟁의 경우에도 1830년 점진론과 격변론을 놓고 벌어진 쿠비에-조프리 논쟁에서도 지질학과 고생물학 발견을 주요 논거로 삼았다. 현대 지질학과 현대 고생물학은 시너지 효과 없이는 존재가 불가능했던 것이다."
 agassiz.202.g: "유익한 학계 교류로군."
 agassiz.311.t: "우주에서 건너온 암석"
 agassiz.311.d: "우리나라의 외딴 지역에서 새로운 광물을 탐색하던 [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] 박사가 놀라운 암석을 발견했다. 초반 조사를 진행한 결과, 철분을 함유한 이 거석은 운석임이 틀림없었다!"
 agassiz.311.f: "최초의 운석 수집은 이르면 18세기부터 이루어졌는데, 당시에는 운석이 외계에서 건너왔다는 사실이 밝혀지지 않았다. 세계에서 가장 오래된 운석 소장품은 오스트리아 빈의 자연사 박물관에 소장된 것으로, 1751년 지구에 떨어진 흐라시나 운석이 최초의 소장품으로 기록되어 있다. 오늘날 이곳은 총 1,100여점의 운석이 소장된 세계 최대 규모의 전시관이다. 20세기 이전에는 발견된 운석이 수백 점에 불과하였던 것이 오늘날 전세계 소장품을 통틀어 3만 점이 넘게 된 것은, 하비 H. 니닝거가 지구 표면에서 발견되는 운석이 생각보다 흔하다는 사실을 알아내면서부터였다. 니닝거는 미국 대평원에서 운석을 탐색하는 전략을 취했는데, 이 지역은 대부분 경작이 이루어져 토양에 암석이 적었기 때문이다. "
 agassiz.311.g: "이건 대체 어디서 온 것인가?"
 agassiz_seismology_tech: "지진학"
 agassiz_seismology_tech_desc: "1839년 스코틀랜드 콤리 인근에서 발생한 일련의 지진을 계기로 영국에서는 지진 탐지 방식을 개선하기 위한 위원회가 출범하였습니다. 그 결과 제임스 데이비드 포브스가 최초의 것으로 꼽히는 현대식 지진계를 제작하였습니다. 1857년부터 로버트 말렛은 폭약을 이용한 지진 실험을 실시하며 오늘날 계측 지진학의 기반을 다졌습니다. 말렛은 '지진학'이라는 용어를 처음 사용한 장본인이기도 합니다."
 agassiz_geologist_demotivated_modifier: "실의에 빠진 지질학자"
 agassiz_set_new_age_of_earth_effect_tt: "[GetPlayer.GetName]에서 지구의 나이에 관한 최신 연구를 제시하게 됩니다. 지구의 나이는 다시 산정됩니다."
 agassiz.401.tt: "[concept_agassiz_geologist]를 보유한 모든 국가가 해당 학설의 공인 여부를 표결에 부칩니다."
 notification_agassiz_new_earth_age_notification_name: "지구의 나이 재산정"
 notification_agassiz_new_earth_age_notification_desc: "어느 [concept_agassiz_geologist]가 제시한 지구의 나이가 생각했던 것보다 더 오래됐다는 학설이 여러 동료 학자들 사이에서 받아들여졌습니다.\n\n[SCOPE.GetRootScope.GetCountry.GetCustom('agassiz_age_of_earth_type')]"
 je_agassiz_geological_research: "지질학 연구"
 je_agassiz_geological_research_reason: "[ROOT.GetCountry.GetCustom('je_agassiz_geological_research_active_type')]분주한 상태가 아닌 [concept_agassiz_geologist]는 지질학 연구를 수행할 수 있습니다.\n\n연구 과정에서 다음의 변화가 발생할 수 있습니다.\n- 지질학자에게 $agassiz_mineralogist$ [concept_character_trait]이 있다면 연간 [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')] 수집량이 두 배가 됩니다.\n- [Concept('concept_dubois_formation','$concept_dubois_formations$')], [Concept('concept_andersson_cave','$concept_andersson_caves$')], 우라늄 매장지를 발견할 수 있습니다.\n- 연구가 5년 동안 이어진 후에는 @agassiz_mineral![Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')] #p 25,000점#!과 @agassiz_rare_mineral![Concept('concept_agassiz_rare_mineral','$concept_agassiz_rare_minerals$')] #p 1점#!을 획득하게 됩니다. 또한 지질학자는 $agassiz_mineralogist$ [concept_character_trait]을 획득합니다."
 agassiz.401.t: "새로운 계산"
 agassiz.401.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName](이)가 한평생 쌓아 왔던 모든 경험과 지식을 동원하여 지구의 나이를 새로 계산하는 데 성공했다. 이제 남은 질문은 이 학설이 학계의 공인을 받을 수 있는지의 여부다."
 agassiz.401.f: "19세기 초부터 20세기 중반까지 지구의 나이를 계산하는 것은 모호한 상태로 남아 있었으며 그 중 대부분은 논쟁과 갈등 대상에 올랐습니다. 지구의 나이 문제는 진화론과 밀접한 연관을 지녔는데, 진화론이 학설로서 기능하기 위해서는 충분히 긴 시간을 전제해야 했기 때문입니다. 세기말까지 많은 학자들은 지구의 나이가 수백만 년에 불과하다고 믿었습니다. 켈빈 경은 말년에 지구의 나이를 약 2천만 년으로 추정하기도 했습니다. 심지어 자신의 이론을 옹호했던 '비타협주의자'로 꼽히는 찰스 다윈조차도 지구의 나이를 약 3억 년으로 추정했습니다. 지구의 나이를 정확히 측정하고 지구, 나아가 태양계 전체의 실제 나이를 알아낸 것은 방사선이 발견되고 나서부터였습니다."
 agassiz.401.g: "세계 유수의 지질학자들에게 논문을 보내자."
 agassiz.402.t: "새로운 나이를 제시한 지질학자"
 agassiz.402.d: "[SCOPE.sCharacter('agassiz_geologist_scope').GetLastName](이)가 지구의 실제 나이를 계산했다는 주장을 제기하였다. 이 학자는 기존 측정값이 잘못되었다고 판단하고 지구의 나이가 훨씬 더 많은 것으로 추정하고 있다. 우리 학자는 지질학 분야의 저명한 전문가이기에 논문의 사본을 전달받게 되었다."
 agassiz.402.g: "이번 계산 결과는 설득력이 있군."
 agassiz.402.h: "누가 이런 사이비 지질학 같은 헛소리를 믿으란 겁니까?"
 agassiz.403.t_yes: "지질학 연구 공인"
 agassiz.403.d_yes: "다행히도 국제 지질학회의 과반수 회원들이 우리 지질학자의 새로운 산정법을 하나의 이정표로 평가하고 그의 이론이 유효한 것으로 공인하였다."
 agassiz.403.f_yes: "지구의 나이 산정에 관한 [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]의 추산 결과가 과반수의 표를 얻으며 승인되었다. 이번 연구를 #G 승인#!한 학자는 총 [GetGlobalVariable('agassiz_age_of_earth_yes_global_var').GetValue|+0]명, #R 반대#!한 학자는 [GetGlobalVariable('agassiz_age_of_earth_no_global_var').GetValue|+0]명으로 드러났다. 이것으로 해당 학설이 공인되어 지구의 나이가 훨씬 높아지게 되었다."
 agassiz.403.g: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] 박사의 업적이오, 지질학계의 업적이다!"
 agassiz.403.t_no: "지질학 연구 부결"
 agassiz.403.d_no: "소위 '엘리트'라 칭하지만 실제로는 무지한 국제 지질학계에서 우리 지질학자의 새로운 연구 결과를 받아들이지 않았다. 우리는 표결에 부정행위가 있었는지, 아니면 우리의 자랑스러운 조국을 무너뜨리려는 적대적인 묘책이었는지는 아직 밝혀내지 못했다."
 agassiz.403.f_no: "지구의 나이 산정에 관한 [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]의 추산 결과가 과반수의 표로 부결되었다. 이번 연구를 #G 승인#!한 학자는 총 [GetGlobalVariable('agassiz_age_of_earth_yes_global_var').GetValue|+0]명, #R 반대#!한 학자는 [GetGlobalVariable('agassiz_age_of_earth_no_global_var').GetValue|+0]명으로 드러났다. 이것으로 기존에 공인됐던 지구의 나이가 그대로 유지되었다."
 agassiz.403.h: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] 박사의 좌절은 곧 지질학계의 좌절이오..."
 je_agassiz_advanced_oceanography: "고급 해양학"
 je_agassiz_advanced_oceanography_reason: "기존 해양학 연구는 주로 태평양의 현 상황을 전략적으로 활용하여 군사적으로 실질적인 이득을 제공하는 것이 주를 이루었으나, 이제 학자들은 지구에 관하여 더 많은 사실을 알아내기 위하여, 즉 순전히 지식의 습득에 나서기 위하여 해양 연구 결과를 활용하는 쪽을 지지하고 있다."
 je_agassiz_advanced_oceanography_success: "@rapanui_oceanographic_knowledge! #E 해양학 지식#! #G 50#!을 획득하면 연구가 마무리됩니다."
 je_agassiz_advanced_oceanography_goal: "@rapanui_oceanographic_knowledge! #E 해양학 지식#! #G 50#!을 획득하면 연구가 마무리됩니다."
 agassiz.312.t: "지질 조사"
 agassiz.312.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] 박사는 광활한 지역의 지질 단면도를 작성하고, 그 지도를 일반에 공개했다."
 agassiz.312.f: "Modern stratigraphy developed over the course of the 19th century: geologists throughout Europe and North America examined, categorized and correlated the rock layers in their countries following the example of William Smith and published maps, stratigraphic tables and treatises with the results of their work."
 agassiz.312.g: "이 지식을 이론적으로 활용하자."
 agassiz.312.h: "Use the knowledge practically."
 agassiz.313.t: "광물 매장지"
 agassiz.313.d: "Geological investigations in a previously undeveloped region have revealed a rich deposit of minerals. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] is not yet sure what the main aspect of his search should be."
 agassiz.313.f: "A mineral is an element or chemical compound that is usually crystalline and formed by geological processes. The majority of the approximately 6,000 mineral species known today and recognized as independent are inorganic, but some organic substances such as mellite and evenkite or the kidney stone formers whewellite and weddellite are also recognized as minerals because geological processes were also involved in their formation. Including all known mineral varieties and synonymous names as well as mineral species that are not yet recognized, there are over 7,000 mineral names."
 agassiz.313.g: "Quantity."
 agassiz.313.h: "Quality."
 agassiz.314.t: "An Inspiring Geologist"
 agassiz.314.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] has now made a name for [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerselfHimself] in the world of geology. At [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] chair, people often asked for advice from [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHim], and letters from colleagues from all over the world were piling up in the mailbox."
 agassiz.314.f: "'I suggest that the best geologist is he who has seen most rocks.' -Herbert Harold Read"
 agassiz.314.g: "This will boost [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] reputation."
 agassiz.314.h: "This will boost the reputation of [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] university."
 agassiz.315.t: "Geological Insights"
 agassiz.315.d: "The current research journey, which has taken [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHim] to many different geological locations in our country, has opened [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName]'s eyes. In a thesis paper that is currently being prepared, [ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe] summarizes some new findings on geological principles."
 agassiz.315.f: "'The world is the geologist's great puzzle-box; he stands before it like the child to whom the separate pieces of his puzzle remain a mystery till he detects their relation and sees where they fit, and then his fragments grow at once into a connected picture beneath his hand.' -Louis Agassiz"
 agassiz.315.g: "Excellent."
 agassiz.11.t: "The Dynamics of Earthquakes"
 agassiz.11.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] has attracted international attention today because [ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe] has revolutionized previous knowledge of this aspect of geology with a book about earthquakes. Words [ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe] coined such as 'epicenter' and 'seismology' have already found their way into science."
 agassiz.11.f: "On February 9, 1846, Robert Mallet presented his work 'The Dynamics of Earthquakes' to the Royal Irish Academy, which is considered one of the foundations of modern seismology. Between 1852 and 1858, with the help of his son John William Mallet, he prepared the British Association's Earthquake Catalog, which appeared in 1858 and listed the known earthquakes and described their effects. During this time he also carried out explosion experiments to determine the travel time of seismic waves in loose and solid rock."
 pmg_agassiz_seismology: "지진학"
 pm_agassiz_basic_seismology: "기초 지진학"
 pm_agassiz_advanced_seismology: "고급 지진학"
 pm_agassiz_advanced_volcanology: "고급 화산학"
 agassiz_congress_host_modifier: "지질학 학술회의 개최"
 agassiz_laughed_congress_modifier: "지질학 회의에서 망신당함"
 agassiz_respected_congress_modifier: "지질학 회의에서 대우받음"
 agassiz_lauded_congress_modifier: "지질학 회의에서 칭송받음"
 agassiz.316.f: "If there are no interesting geological features in its own territory, geologists may search for formations or caves in the border area or beyond."
 agassiz.317.t: "외국의 지질학자"
 agassiz.317.d: "한 외국인 지질학자가 연구 과정에서 어떻게든 우리 영토 내에 들어와 기록을 남겼다. 이 학자는 '감사'의 표시로 연구 결과를 우리에게 보내주었다."
 agassiz.317.g: "그래서...?"
 agassiz.501.t: "Do the Continents move?"
 agassiz.501.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] has just published a book in which [ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe] puts forward a thesis that is already highly controversial. Accordingly, the continents in their current form are of more recent geological origin. Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] postulates that today's continents formed a unit [ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe] calls 'Pangea'. In order to convince the international geological community of this thesis, [ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe] invited them to a congress."
 agassiz.501.f: "The oldest suggestion that continental drift was the cause came from the Flemish cartographer Abraham Ortelius. In the 1596 edition of his Atlas Theatrum Orbis Terrarum, the similarity of the two coastlines can already be clearly seen. Alexander von Humboldt described the similarity of the opposite coasts of South America and Africa and their vegetation in 1801 and 1845 and speculated that the Atlantic was washed out by a catastrophic current. In 1858, geographer Antonio Snider-Pellegrini went a step further when he published the first map showing the Old and New Worlds without a separating ocean. However, it was above all Alfred Wegener who, with his theory of continental drift, led to a rethinking from fixism (the thesis that the continents are firmly rooted in the earth) to mobilism. During his lifetime, however, his explanation model remained a minority opinion in science, which only became established in the second half of the 20th century."
 agassiz.501.g: "Invite the leading geological nations!"
 agassiz.502.t: "A Geological Invitation"
 agassiz.502.d: "[SCOPE.sCountry('agassiz_congress_host_country').GetName] has invited people to an international geological congress. The host, a leading geologist, actually claims that the continents are moving...!"
 agassiz.502.g: "This promises to be entertaining."
 agassiz.503.t_laughed: "The Ridicule of the Geological Society"
 agassiz.503.t_respected: "A confident Appearance"
 agassiz.503.t_lauded: "Admiration and Congratulations"
 agassiz.503.d_laughed: "Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]'s appearance was greeted with amusement. [ROOT.GetCountry.GetNameNoFlag] does not exactly have a reputation for having achieved anything outstanding in the field of Geology. There were clearly jokes behind closed doors."
 agassiz.503.d_respected: "Before the start of the Geological Congress, [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] was warmly greeted and the usual presents were exchanged. [ROOT.GetCountry.GetNameNoFlag] has a recognized reputation in the research world."
 agassiz.503.d_lauded: "The arrival of Professor [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] was greeted with great joy, being considered one of the most awaited guests. A crowd quickly formed around [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHim], as [ROOT.GetCountry.GetNameNoFlag] is considered a pioneer in the field of Geology."
 agassiz.503.f_laughed: "'Why don't [ROOT.GetCountry.GetAdjectiveNoFlag] geologist get any girls?\n\nBecause there is too much friction between them!'"
 agassiz.503.f_respected: "Upon his arrival, [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] had a few pleasant conversations with colleagues about mostly boring rock formations."
 agassiz.503.f_lauded: "Prof. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] seemed almost overwhelmed by the onslaught. So many colleagues sought to talk to [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHim] and wanted to benefit from [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] expeditions and [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] experiences. Some even urged [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHim] to give a private lecture."
 agassiz.503.g: "How embarrassing!"
 agassiz.503.h: "Finally among like-minded people."
 agassiz.503.i: "We are a leading geological nation!"
 agassiz.504.t: "Fixism or Mobilism?"
 agassiz.504.d: "[SCOPE.sCharacter('agassiz_alfred_wegener_scope').GetFullName] gave a highly acclaimed lecture to the assembled international geological community in which [SCOPE.sCharacter('agassiz_alfred_wegener_scope').GetSheHe] vehemently advocates the reversal of geology to mobilism - that is, continental drift. But the opponents are numerous and do not want to deviate from the prevailing doctrine of fixism."
 agassiz.504.f: "Fixism was the key geotectonic hypothesis until the 1960s. It was assumed that the earth's crust was firmly connected to the subsoil, so that large-scale tectonic processes were local. From this it followed that the development of the earth was predominantly characterized by vertical and very little by horizontal tectonic movements of the earth's crust. Most theories of classical geology were based on the idea of fixism. At the beginning of the 10th century, fossils of the same species were found in South America and Africa. Under the assumption of fixism, the land bridge hypothesis was put forward, according to which there were once land bridges connecting Africa to South America, allowing animals to migrate to the other continent. Through the echo sounder measurements of the research ship Meteor between 1924 and 1927, during which the Mid-Atlantic Ridge - an undersea mountain range that runs from north to south - was discovered and not, as expected, the remnants of a land bridge that should have run from east to west, the land bridge hypothesis began to falter but was not completely abandoned until the 1960s. The opposite of fixism is mobilism, which sees horizontal movements of the earth's crust as having a decisive influence. The theory of mobilism developed from Alfred Wegener's discovery of continental drift."
 agassiz.504.g: "The continents have not changed in millions of years."
 agassiz.504.h: "Everything points to plate tectonics."
 agassiz.505.t: "Geologists among themselves"
 agassiz.505.d: "On the sidelines of the major geological congress, [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] has the opportunity to exchange ideas with colleagues. What should [ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe] focus on in [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] free time?"
 agassiz.505.f: "'It is a strange fact, characteristic of the incomplete state of our present knowledge, that totally opposing conclusions are drawn about prehistoric conditions on our planet, depending on whether the problem is approached from the biological or the geophysical viewpoint.' -Alfred Wegener"
 agassiz.505.g: "Geological Knowledge."
 agassiz.505.h: "Oceanographic Knowledge."
 agassiz.505.i: "Rare Minerals."
 agassiz.505.j: "New talents."
 agassiz.509.t_fix: "Fixism triumphant"
 agassiz.509.d_fix: "Despite all [SCOPE.sCharacter('agassiz_alfred_wegener_scope').GetHerHis] efforts, [SCOPE.sCharacter('agassiz_alfred_wegener_scope').GetFullName] did not manage to convince the majority of his colleagues. The accusation is that Prof. [SCOPE.sCharacter('agassiz_alfred_wegener_scope').GetLastName] cannot provide sufficient evidence for his theses. The fact remains: the continents are stable."
 agassiz.509.f_fix: "'The Newton of drift theory has not yet appeared. His absence need cause no anxiety; the theory is still young and still often treated with suspicion. In the long run, one cannot blame a theoretician for hesitating to spend time and trouble on explaining a law about whose validity no unanimity prevails.' -Alfred Wegener"
 agassiz.509.g: "Eppur si muove."
 agassiz.509.t_tectonics: "Mobilism triumphant"
 agassiz.509.d_tectonics: "[SCOPE.sCharacter('agassiz_alfred_wegener_scope').GetFullName] was able to convince the scientific community of [SCOPE.sCharacter('agassiz_alfred_wegener_scope').GetHerHis] thesis. Continental drift is now considered the most likely theory to explain a variety of previously unclear geological phenomena."
 agassiz.509.f_tectonics: "'Scientists still do not appear to understand sufficiently that all earth sciences must contribute evidence toward unveiling the state of our planet in earlier times, and that the truth of the matter can only be reached by combing all this evidence. ... It is only by combing the information furnished by all the earth sciences that we can hope to determine 'truth' here, that is to say, to find the picture that sets out all the known facts in the best arrangement and that therefore has the highest degree of probability. Further, we have to be prepared always for the possibility that each new discovery, no matter what science furnishes it, may modify the conclusions we draw.' -Alfred Wegener"
 agassiz.509.h: "Wait - that...is surprising!"
 agassiz_conference_geologist_double_vote_tt: "경험 많은 지질학자를 보유한 덕분에 우리의 투표권은 #G 2배#!로 적용됩니다."
 agassiz_conference_geologist_triple_vote_tt: "저명한 지질학자를 보유한 덕분에 우리나라의 투표권은 #G 3배#!로 적용됩니다."
 agassiz.601.t: "Volcano Location"
 agassiz.601.d: "A group of scientists and assistants has come together for the upcoming volcano expedition. But the question now arises: which volcano should the team explore under the leadership of [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName]? There are several states we can choose from."
 agassiz.601.f: "'I must request you not to use the word fire when you refer to Dr. Hutton's theory: heat is a more correct expression. Fire in the usual sense of that word, supposes fuel in the act of burning; but we have no reason for believing that there is a fire of this description in the centre of the earth.' -Maria Hack"
 agassiz.601.g: "[SCOPE.sState('agassiz_volcano_1').GetName]"
 agassiz.601.h: "[SCOPE.sState('agassiz_volcano_2').GetName]"
 agassiz.601.i: "[SCOPE.sState('agassiz_volcano_3').GetName]"
 agassiz.602.t: "At the Foot of the Volcano"
 agassiz.602.d: "The volcanological expedition has reached the foothills of the volcano in [SCOPE.sState('agassiz_volcano_state').GetName] and is now starting the actual scientific investigation."
 agassiz.602.f: "'The existence of subterraneous heat is proved by phenomena such as hot-springs, volcanoes, and earthquakes. These observations leave no doubt of the existence of heat in the bowels of the earth; but at what depth, to what extent, and with what intensity, does it act?' -John Playfair"
 agassiz.602.g: "It's not as dangerous as it sounds, is it?"
 agassiz.603.t: "Successful Volcano Expedition"
 agassiz.603.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] accomplished the daring maneuver of not only leading [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] assistants to the top of the volcano, but also carried out numerous experiments and collected specimens. The volcano expedition was a valuable contribution to learning more about the inner workings of the Earth."
 agassiz.603.f: "'All Nature's wildness tells the same story: the shocks and outbursts of earthquakes, volcanoes, geysers, roaring, thundering waves and floods, the silent uprush of sap in plants, storms of every sort, each and all, are the orderly, beauty-making love-beats of Nature's heart.' -John Muir"
 agassiz.603.g: "And all without third degree burns."
 agassiz.604.t: "Volcano Expedition ends in Catastrophe"
 agassiz.604.d: "Terrible news! Despite several warning signs - toxic fumes, small earthquakes, dark smoke - [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] apparently stubbornly persisted in continuing the expedition. The eruption took the participants completely by surprise; the area is a disaster zone. Lava is still flooding the mountain and the surrounding villages. It was only with great difficulty that some survivors were able to get to safety with research results and samples. However, Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] is missing. We have to expect the worst."
 agassiz.604.f: "The newspapers are already reporting several injuries and deaths. Large parts of the area had to be evacuated. Buildings were damaged and streets were flooded with lava. The possibility that anyone near the volcano crater survived this force of nature is close to zero."
 agassiz.604.g: "Horrible!"
 agassiz.605.t: "Volcano Expedition ends without Results"
 agassiz.605.d: "The volcano expedition has used up all research funds and has returned. Unfortunately, it only produced a few useful results. Maybe the leader was too overcautious?"
 agassiz.605.f: "'You can't explore a volcano if you don't dance on it a little.'"
 agassiz.605.g: "Disappointing"
 agassiz.611.t: "Chemical Insights"
 agassiz.611.d: "During the expedition in [SCOPE.sState('agassiz_volcano_state').GetName], [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] was able to study some interesting chemical processes at the volcano crater in more detail. Some mineral compounds are still completely unknown."
 agassiz.611.f: "Most chemical elements occur in compounds that show great variety, especially in minerals. At the beginning of modern chemistry, geologists were always looking for new samples from which chemists could isolate previously unknown elements."
 agassiz.611.g: "This might help Dr. [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]."
 agassiz.612.t: "Lava Trap"
 agassiz.612.d: "The volcano expedition was obviously a little too bold in its advance to the crater: it finds itself surrounded by lava on almost all sides. Abandoning the previous advance would mean a great loss of time."
 agassiz.612.f: "'The lava itself has that dingy appearance which the poets assign to the rivers of the infernal regions; it rolls on slowly like a stream of sand, blackish by day and red by night. As it approaches you hear a kind of crackling sound, which occasions the greatest fear as it is indistinct. Its resplendency is so intense, that for the first time the earth illuminates the sky, and gives it the appearance of continued lightning; the sky, in its turn reflects this lustre upon the water, and thus nature seems to be set in flames by this three-fold image of fire.' -Germaine de Staël"
 agassiz.612.g: "Find another path."
 agassiz.612.h: "Try to cross it."
 agassiz.613.t: "A hardened Leader"
 agassiz.613.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] is an experienced volcanologist who knows exactly how to deal with the mountain; his knowledge ensures that the expedition progresses safely and well."
 agassiz.613.f: "'The event which I have so much longed to witness has occurred and Vesuvius has been for some days in a state of eruption. I have already made many experiments on the lava at the moment that it issues from the volcano and I should have completed them but for a severe indisposition owing to my having remained too long in that magnificent but dangerous situation within 5 or six feet of a stream of red hot matter fluid as water falling as a cataract of fire.' -Humphry Davy"
 agassiz.613.g: "Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] Geologist is a superb leader."
 agassiz.614.t: "Toxic Gases"
 agassiz.614.d: "The expedition team, led by Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName], discovered abundant emissions of volcanic gases at one point on the volcano. The geologist would like to take some samples, even if it is not entirely safe."
 agassiz.614.f: "Volcanic gases are gases that emerge from the earth's surface during volcanic activity. Emergence can occur either in narrowly defined areas or diffusely over a large area from the flanks of a volcano. Volcanic gases were collected and analyzed as long ago as 1790 by Scipione Breislak in Italy. The composition of volcanic gases is dependent on the movement of magma within the volcano. Therefore, sudden changes in gas composition often predict a change in volcanic activity."
 agassiz.614.g: "We have to study these gases."
 agassiz.614.h: "That's insane!"
 agassiz.615.t: "Volcanic ejecta"
 agassiz.615.d: "A sudden rumbling frightened the participants of the volcano expedition for a short time. When the team thought the worst was over, the volcano suddenly spewed glowing rocks that fell on the participants like a meteor shower. Two assistants were injured and a pack mule was killed."
 agassiz.615.f: "'We heard above us and about the island a strange sound, as a mighty crackling fire, or the discharge of heavy artillery at one or two second intervals. At five, the roaring noise continued, darkness spread over the sky and a hail of pumice stone fell on us, or which many pieces were of considerable size and quite warm.' -Captain Watson"
 agassiz.615.g: "An unfortunate turn of events."
 agassiz.616.t: "Lava Sample"
 agassiz.616.d: "Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] briefly asked the expedition to stop. Nearby seems to be a good place to take some lava samples. It is a scientifically worthwhile and risky procedure."
 agassiz.616.f: "'The lava was pent within the deep banks of a wide bed, and was flowing down, not like a fluid but like a mountain of coke, or at times like highly gaseous coal. It split, and crackled, and sparkled, and smoked and flamed up and ever moved on in one vast compact body. Pieces detaching themselves rolled down, leaving behind a glare so fierce that I could have imagined myself at the mouth of an iron furnace; and as every mass fell down with the noise of thunder the trees flamed up, and the crowds uttered shouts of admiration and regret.' -Luigi Palmieri"
 agassiz.616.g: "We are here for experiments like this."
 agassiz.617.t: "Lava Sample - Success!"
 agassiz.617.d: "Our geologist managed to take a lava sample in a risky undertaking. The result is of the highest scientific value."
 agassiz.617.f: ""
 agassiz.617.g: "Hot science!"
 agassiz.618.t: "Lava Sample - Fail!"
 agassiz.618.d: "To the dismay of the other expedition members, collecting the sample failed. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] suffered severe burns and put the team in danger!"
 agassiz.618.f: ""
 agassiz.618.g: "A science that will burn your hands..."
 agassiz.619.t: "Crystals"
 agassiz.619.d: "The unique geological processes in the volcanic area have produced a whole range of rare, crystalline minerals. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] is eager to add the stones to [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] collection..."
 agassiz.619.f: "Most volcanic rocks share a number of common minerals. Differentiation of volcanic rocks tends to increase the silica (SiO2) content mainly by fractional crystallization. Thus, more evolved volcanic rocks tend to be richer in minerals with a higher amount of silica such as phyllo and tectosilicates including the feldspars, quartz polymorphs and muscovite. While still dominated by silicates, more primitive volcanic rocks have mineral assemblages with less silica, such as olivine and the pyroxenes. Bowen's reaction series correctly predicts the order of formation of the most common minerals in volcanic rocks. Occasionally, a magma may pick up crystals that crystallized from another magma; these crystals are called xenocrysts. Diamonds found in kimberlites are rare but well-known xenocrysts; the kimberlites do not create the diamonds, but pick them up and transport them to the surface of the Earth."
 agassiz.619.g: "One sample is enough."
 agassiz.619.h: "Take as many samples as you can!"
 agassiz.619.i: "A few stones are not worth a researcher's life."
 agassiz.620.t: "River of Fire"
 agassiz.620.d: "A river of lava blocks the team's path. While some participants consider this obstacle a dangerous challenge that could threaten the entire volcano expedition, [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] sees this situation primarily as a scientific opportunity to test out [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] unused instruments..."
 agassiz.620.f: "'In the majority of cases it can be clearly seen that the light emanates from incandescent, but not flaming bodies. It is the light of the glowing lava which makes the great column of seeming flame rushing up from Vesuvius.' -John Philipps"
 agassiz.620.g: "Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] should study it."
 agassiz.620.h: "This is far too dangerous!"
 agassiz.621.t: "Theories on Volcanism"
 agassiz.621.d: "During [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] stay at the volcano, [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] would like to finally verify some of [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] previous volcanism theories by collecting evidence and exploring the surrounding area. To do this, [ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe] needs a lot of time in what [ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe] calls an 'extremely fascinating and inspiring area', while [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] colleagues watch with gnashing teeth as more and more dark smoke rises in the background..."
 agassiz.621.f: "'At the climax of the eruption, a column of ash rose high into the shape of an immense pine till at length it began to incline downwards, when, from the quantity of dense matter which composed the column it fell to the ground. Torrents of flaming lava of an awefully portentous magnitude now poured down the mountain.' -Mariana Starke"
 agassiz.621.g: "Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] should take time to study the phenomenon thoroughly."
 agassiz.621.h: "Don't waste time!"
 agassiz.622.t: "Earthquake"
 agassiz.622.d: "Falling rubble and a mudslide accompanied an earth tremor early in the morning when the expedition was very close to the crater. The small earthquake is a clear indication that the volcano is more active than participants previously thought possible."
 agassiz.622.f: "'In another place, this learned geographer, in alluding to the tradition that Sicily had been separated by a convulsion from Italy, remarks, that at present the land near the sea in those parts was rarely shaken by earthquakes, since there were now open orifices whereby fire and ignited matters, and waters escape; but formerly, when the volcanoes of Etna, the Lipari Islands, Ischia, and others, were closed up, the imprisoned fire and wind might have produced far more vehement movements. The doctrine, therefore, that volcanoes are safety-valves, and that the subterranean convulsions are probably most violent when first the volcanic energy shifts itself to a new quarter, is not modern.' -Charles Lyell"
 agassiz.622.g: "Was this whole expedition such a good idea...?"
 agassiz.623.t: "Minerals everywhere"
 agassiz.623.d: "The expedition led by [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] on the volcano in [SCOPE.sState('agassiz_volcano_state').GetName] encountered a rich mineral deposit."
 agassiz.623.f: "Minerals are a geologist's best friend."
 agassiz.623.g: "Minerals!"
 agassiz.623.h: "No."
 agassiz.624.t: "Exotic Specimen"
 agassiz.624.d: "It may seem surprising, but the volcano expedition in [SCOPE.sState('agassiz_volcano_state').GetName] actually found rare animal specimens of a unique fauna that live very close to the volcano. Some specimens would certainly be of great interest to local zoologists."
 agassiz.624.f: "'Humphrey! Please collect some volcanic dwarf parakeet eggs. Breakfast was meager and I miss my Sunday fried egg.'"
 agassiz.624.g: "Specimen!"
 agassiz.625.t: "Unknown Fossils"
 agassiz.625.d: "Some rare fossils that [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] discovered on the volcano expedition in [SCOPE.sState('agassiz_volcano_state').GetName] could answer important paleontological and geological questions."
 agassiz.625.f: "'If we skirt the fertile region at the base of Etna on its southern and eastern sides, we behold marine strata of clay sand, and volcanic tuff, cropping out from beneath the modern lavas. The marine fossil shells occurring in these strata are all of them, or nearly all, identical with species now inhabiting the Mediterranean; and as they appear at the height of from 600 to 800 feet above the sea near Catania, they clearly prove that there has been in this region, as in other parts of Sicily farther to the south, an upward movement of the ancient bed of the sea. It is fair, therefore, to infer that the whole mountain, with the exception of those parts which are of very modern origin, has participated in this upheaval.' -Charles Lyell"
 agassiz.625.g: "Fossils!"
 agassiz.626.t: "Geomagnetic Data"
 agassiz.626.d: "오늘 아침 수도에서 전해진 전보 하나가 [SCOPE.sState('agassiz_volcano_state').GetName]에 있던 화산 탐사대 앞으로 전해졌다. 지자기장 관측소에서 화산 분화구의 측정 자료를 수집해 달라고 요청한 모양이다. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] 박사는 이 요청에 응했다."
 agassiz.626.f: "'If this data is so important to the Geomagnetic Institute, why don't you come here yourself to get the data?'"
 agassiz.626.g: "Perfect"
 agassiz.627.t: "The Solar Element on Earth"
 agassiz.627.d: "When analyzing some previously neglected rocks, [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] was able to discover amazing things. Using on-site spectral analysis, [ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe] was able to prove that the volcanic rock actually contains the element helium, which was previously thought to only occur in space."
 agassiz.627.f: "Luigi Palmieri was an Italian physicist, meteorologist, seismologist and volcanologist. In 1845 he took over Pasquale Galluppi's teaching position in logic and metaphysics at the University of Naples. After Gallupi's death in 1847, his chair was entrusted to him. In 1860 he gave up the chair and instead took over the chair of geophysics and meteorology that he had initiated. Attached to the chair were the meteorological observatory and the Vesuvius Observatory, founded in 1842, which Palmieri also took over management. He headed the chair and the two observatories until his death. Palmieri became known in particular for improved measuring devices, such as an electromagnetic seismograph and devices for measuring electrical voltages in the atmosphere. In 1882 he succeeded in detecting the element helium on Earth for the first time through spectral analysis of Vesuvius lava."
 agassiz.627.g: "This opens ... interesting possibilities."
 agassiz.628.t: "Team begs for a rest"
 agassiz.628.d: "After more than a year of the volcano expedition, the team members are increasingly asking for breaks. Many are on the verge of exhaustion. The first voices are loud to return home."
 agassiz.628.f: "'You're scared? With respect, seismic events like these are the reason we climb this volcano in the first place! Are you a scientist or a deserter?'"
 agassiz.628.g: "Give them as much rest as they need."
 agassiz.628.h: "A short break, nothing more."
 agassiz.628.i: "These useless assistants are supposed to work, not idle!"
 agassiz.629.t: "Inferno"
 agassiz.629.d: "The situation on the volcano in [SCOPE.sState('agassiz_volcano_state').GetName] has become significantly worse. The mountain suddenly spews black smoke and the lava flows seem to increase. The expedition is now in a quandary. Should the expedition members exercise caution and risk being trapped by the lava, or should they react quickly but risk unknown danger?"
 agassiz.629.f: "'The breath of fire swept down upon the city and water front with all of the force that could have been given to it by a cannon. Cinders were shot into our face with stinging effect. The air was filled with flame. Involuntarily we raised our hands to protect our faces. I noticed the same gesture when I saw the bodies of the victims on shore.' -Comte de Fitz-James"
 agassiz.629.g: "Exercise caution."
 agassiz.629.h: "Take the risk."
 agassiz.630.t: "Hell on Earth"
 agassiz.630.d: "It seems like all hell has broken out on the volcano in [SCOPE.sState('agassiz_volcano_state').GetName]. Lava fountains shoot up, blazing forces fight each other in streams of fire. A threatening event for the majority of the expedition participants. Only Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] cannot escape a rapturous fascination."
 agassiz.630.f: "'By night the effect of the fire became more beautiful. We were surrounded by streams and cataracts of the red and radiant fire; and in the midst, from the column of bituminous smoke shot up into the air, fell the vast masses of rock, white with the light of their intense heat, leaving behind them vapour trains of splendour.' -George Gordon Byron"
 agassiz.630.g: "This is a fascinating spectacle and we should take photos of it!"
 agassiz.630.h: "Frightening,"
 agassiz.630.i: "Withdraw!"
 agassiz.631.t: "Quite active Volcano"
 agassiz.631.d: "Apparently the volcano that Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] is researching is much more active than expected. An outbreak is probably imminent. This makes selling the expedition more dangerous. However, with higher risk, the scientific opportunities also increase..."
 agassiz.631.f: "'People never believe in volcanoes until the lava actually overtakes them.' -George Santayana"
 agassiz.631.g: "More knowledge!"
 agassiz.631.h: "More experience!"
 agassiz.631.i: "More minerals!"
 agassiz.632.t: "Newspaper Report"
 agassiz.632.d: "The #YELLOW [SCOPE.sState('manzoni_publisher_state').GetNameNoFormatting] Chronicle#!, one of the region's leading newspapers, is currently keeping its readers up to date with reports about the volcano expedition. A scientific niche field has thus aroused the interest of a larger section of the population. Boys and young men in particular are fascinated by the adventurous stories."
 agassiz.632.f: "'Read in the latest issue: The daring crater climb by Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastNameNoFormatting]! Brave scientists face against lava, toxic fumes and hellish heat. Man crosses another boundary at the edge of what the ancients believed was the entrance to the underworld. Our reporters continue to accompany the journey with illustrations. Thursday is Chronicle day!'"
 agassiz.632.g: "This will inspire a new generation of scientists."
 agassiz.633.t: "A safe Resting Place"
 agassiz.633.d: "The expedition members found a safe place to retreat between sulfur fumes, black smoke and lava flows."
 agassiz.633.f: "'My dear colleague Professor Schabernack!\n\nI thank you at this point for your illuminating insights into the dynamic development of water in a volcanic vacuum, but I will formulate my objections in more detail at a later date. Rather, my point is that in my correspondence with Dr. Dr. Sauerspeck I was told that you had spread the disgraceful rumor at the university that we were having fun on this volcano. I want you to stop making these assumptions. The [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastNameNoFormatting] Hot Springs I recently discovered have a maximum temperature of only 32°C, not 35°C as you recently claimed. So they are de facto frosty cold. Please correct these infamous misrepresentations!'"
 agassiz.633.g: "Relaxation!"
 agassiz_volcano_tourist_modifier: "화산 관광"
 agassiz_small_volcano_eruption_modifier: "소규모 화산 분화"
 agassiz_medium_volcano_eruption_modifier: "화산 분화"
 agassiz_big_volcano_eruption_modifier: "대규모 화산 분화"
 agassiz_medium_earthquake_modifier: "지진"
 agassiz_big_earthquake_modifier: "대지진"
 agassiz.711.t: "Volcano Spectacle"
 agassiz.711.d: "The residents of [SCOPE.sState('agassiz_volcano_state').GetName] are currently witnessing an impressive spectacle: the volcano's lava fountains are a fascinating sight, especially at night. Tourists and scientists can be found among the onlookers."
 agassiz.711.f: "'The Sublimest of Volcanoes! Etna's flame\nPales before thine and quenchless Hecla's tame;\nVesuvius shows his blaze, an usual sight\nFor gaping tourists, from his hackneyed height.'\n\n - Lord Byron"
 agassiz.711.g: "Wonderful!"
 agassiz.712.t: "Small Volcano Eruption"
 agassiz.712.d: "The volcano in [SCOPE.sState('agassiz_volcano_state').GetName] has erupted. Some smaller villages were destroyed and fields were flooded with lava, but the disaster was limited."
 agassiz.712.f: "'What I saw then! Thousands of tongues of fire lit up the surroundings. On tops of the trees I saw flames. I heard a crack, and saw a sheet of fire right next to me. The sea was not to be seen. Everything was covered in ash. I could not see my hand before me. The last thing I saw was the ash being pushed up through the cracks in the floor boards, like a fountain. I felt a heavy pressure, throwing me to the ground. Then it seemed as if the air was being sucked away and I could not breathe.' -Johanna Beyerinck"
 agassiz.712.f_basic: "\n\n#YELLOW Thanks to our scientists at the Volcano Observatory, we were not entirely surprised by the catastrophe. We were therefore able to take precautions and #G limit the devastation somewhat#!.#!"
 agassiz.712.f_advanced: "\n\n#YELLOW Thanks to our excellent scientists at the Volcano Observatory, we were able to quickly initiate evacuation measures and take protective measures. We were able to #G limit the devastation significantly#!."
 agassiz.712.g: "Just a bit of lava."
 agassiz.712.h: "Any news from the observatory?"
 agassiz.712.i: "This might be interesting for Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] and his students"
 agassiz.713.t: "Volcano Eruption"
 agassiz.713.d: "A violent eruption has shaken the state of [SCOPE.sState('agassiz_volcano_state').GetName]. Fragments of tephra and volcanic ash have destroyed buildings and crops, taking some of the lives of our people."
 agassiz.713.f: "'We heard above us and about the island a strange sound, as a mighty crackling fire, or the discharge of heavy artillery at one or two second intervals. At five, the roaring noise continued, darkness spread over the sky and a hail of pumice stone fell on us, or which many pieces were of considerable size and quite warm.\n\nThat night was one of blackness — from the continuing fall of ash — broken by incessant flashes of lightning, both in the sky, and around the island.' -Captain Watson"
 agassiz.713.g: "These poor people."
 agassiz.713.j: "Send as much help as possible to support the victims!"
 agassiz.714.t: "Mega Volcano Eruption"
 agassiz.714.d: "An eruption of unprecedented records has utterly destroyed the lives of many in the state of [SCOPE.sState('agassiz_volcano_state').GetName]. The explosion could be heard from hundreds of miles away and anything that had the ill fate of surrounding the mountain was immediately devastated."
 agassiz.714.f: "'You could hear the shrieks of women, the wailing of infants, and the shouting of men; some were calling their parents, others their children or their wives, trying to recognize them by their voices. People bewailed their own fate or that of their relatives, and there were some who prayed for death in their terror of dying. Many besought the aid of the gods, but still more imagined there were no gods left, and that the universe was plunged into eternal darkness for evermore.' -Pliny the Younger"
 agassiz.714.g: "A tragedy!"
 agassiz.715.t: "Smoke and Rumble"
 agassiz.715.d: "The volcano in [SCOPE.sState('agassiz_volcano_state').GetName] is rumbling. Smoke rises above the crater. That's it. The residents are relieved, tourists and scientists are disappointed."
 agassiz.715.f: "'Too much to investigate, too little to enjoy. What a miserable, moody volcano!'"
 agassiz.715.g: "Does it wake up or stay asleep?"
 agassiz.721.t: "Seismic waves"
 agassiz.721.d: "A minor seismic disturbance shook [SCOPE.sState('agassiz_earthquake_state').GetName] out of bed this morning. The small earthquake caused only minor damage, but piqued the interest of seismologists."
 agassiz.721.f: "'Interviewer: If the building you are in now started to shake and you knew an earthquake was occurring, what would you do?'\nCharles Richter: 'I would walk - not run - to the nearest seismograph.'"
 agassiz.721.g: "Interesting."
 agassiz.722.t: "The [SCOPE.sState('agassiz_earthquake_state').GetName] Earthquake"
 agassiz.722.d: "An earthquake has hit the state of [SCOPE.sState('agassiz_earthquake_state').GetName], destroying buildings, injuring people and even taking some lives."
 agassiz.722.f: "'There was a deep rumble, deep and terrible, and then I could see it actually coming up Washington Street. The whole street was undulating. It was as if the waves of the ocean were coming towards me, billowing as they came.' -Jesse Cook"
 agassiz.722.f_basic: "\n\n#YELLOW Thanks to our trained seismologists, it was already known that [SCOPE.sState('agassiz_earthquake_state').GetName] was an earthquake-prone region. Due to preventative measures, for example in construction, the damage was easily minimized.#!"
 agassiz.722.g: "A tragedy!"
 agassiz.722.h: "How does the observatory assess the situation?"
 agassiz.722.i: "A perfect field for geological research."
 agassiz.722.j: "Send as much help as possible to support the victims!"
 agassiz.723.t: "The Great [SCOPE.sState('agassiz_earthquake_state').GetName] Earthquake"
 agassiz.723.d: "The state of [SCOPE.sState('agassiz_earthquake_state').GetName] has been reduced to ruins by an earthquake of unprecedented scale. Countless buildings have been destroyed and the amount of lives lost is impossible to tell."
 agassiz.723.f: "'The earthquake shook down in San Francisco hundreds of thousands of dollars worth of walls and chimneys. But the conflagration that followed burned up hundreds of millions of dollars' worth of property There is no estimating within hundreds of millions the actual damage wrought. Not in history has a modern imperial city been so completely destroyed. San Francisco is gone. Nothing remains of it but memories and a fringe of dwelling-houses on its outskirts. Its industrial section is wiped out. Its business section is wiped out. Its social and residential section is wiped out. The factories and warehouses, the great stores and newspaper buildings, the hotels and the palaces of the nabobs, are all gone. Remains only the fringe of dwelling houses on the outskirts of what was once San Francisco.' -Jack London"
