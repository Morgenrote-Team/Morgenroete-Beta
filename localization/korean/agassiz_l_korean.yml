 agassiz_mineralogist: "광물학자"
 agassiz_mineralogist_desc: "광물학자는 희귀 암석의 전문가로서 희귀 광물 탐색에 특히 유용합니다."
 agassiz_geophysicist: "지구물리학자"
 agassiz_geophysicist_desc: "지구물리학자는 지구의 내부 환경에 관한 전문가로서 지구의 역사와 그 과정에 대해 제일 많이 알고 있습니다."
 agassiz_prospector: "탐사원"
 agassiz_prospector_desc: "탐사원은 신규 광맥이나 유전 탐색에 도움을 주는 특수 능력을 지니고 있습니다."
 agassiz_oceanographer: "해양학자"
 agassiz_oceanographer_desc: "해양학자는 해양 환경과 원리에 관하여 탁월한 지식을 갖고 있습니다."
 agassiz_volcanologist: "화산학자"
 agassiz_volcanologist_desc: "화산학자는 화산 분야의 전문가로서 화산 탐색에 특히 큰 도움이 됩니다."
 agassiz.100.t: "광맥 탐사"
 agassiz.100.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] 박사가 모든 강의를 취소하고 장비를 챙겨 광맥 탐사에 나섰다. 남은 질문은 단 하나. 박사가 조사해야 할 원자재 매장지의 유형은 무엇이 되어야 하는가?"
 agassiz.100.f: ""
 agassiz.100.g: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] 박사는 대학으로 돌아가는 것이 좋겠소."
 agassiz.100.h: "석탄."
 agassiz.100.i: "철."
 agassiz.100.j: "납."
 agassiz.100.k: "유황."
 agassiz.100.l: "금."
 agassiz.100.m: "우라늄."
 agassiz.101.t: "새로운 광맥"
 agassiz.101.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] 박사가 광산 회사의 새로운 광맥을 발견하고 돌아왔다. 이제 그곳을 얼마나 더 개발할 것인가는 박사의 몫이 아니다."
 agassiz.101.f: "\"모든 것은 한계가 있다. 철광석을 교육시켜 황금으로 바꿀 순 없다.\" - 마크 트웨인"
 agassiz.101.g: "고생했소."
 agassiz.102.t: "석유다!"
 agassiz.102.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] 박사가 새로운 석유 매장지를 발견하면서 흑색의 황금이 솟구쳐 올랐다. 박사는 이제 자신의 임무가 끝났다는 생각이다.\n\n개량된 건물 수: [GetPlayer.MakeScope.Var('mr_num_improved_oil_rigs_buildings_var').GetValue|V0]곳"
 agassiz.102.f: "\"성공의 공식: 일찍 일어나고, 열심히 일하고, 석유를 발견하라.\" - J. 폴 게티"
 agassiz.102.g: "기름은 아무리 많아도 부족하지 않은 법."
 je_agassiz_find_coal_project: "탄광 발견"
 je_agassiz_find_iron_project: "철광 발견"
 je_agassiz_find_lead_project: "납광 발견"
