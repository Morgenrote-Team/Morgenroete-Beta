l_korean:
 agassiz_geology_tech: "지질학"
 agassiz_geology_tech_desc: "1815년 운하 시공업자 윌리엄 스미스는 화석 함량과 암석학적 특성을 모두 망라한 잉글랜드와 웨일스 지역의 지질도를 출판하였습니다. 스미스는 상당히 특징적이면서도 확실한 동물군 퇴적층으로 개별적인 암석층을 구분할 수 있다는 사실을 발견하였습니다. 1827년 레오폴트 폰 부흐는 상대적 연대측정법을 적용할 수 있는 화석을 아울러 '지표 화석'이라는 용어를 만들었습니다. 이 시점부터 지구의 실제 나이를 밝히는 것은 과학계의 숙제로 남게 되었습니다."
 notification_agassiz_yearly_minerals_notification_name: "연간 지질학 보고서"
 notification_agassiz_yearly_minerals_notification_desc: "올해 새롭게 발견하고 기록한 [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')] 수는 총 [GetPlayer.MakeScope.Var('agassiz_generic_minerals_notification_var').GetValue|0+=]점입니다."
 agassiz_sounding_tech: "음향측심기"
 agassiz_sounding_tech_desc: "음향 수심 측정기는 원래 잠수함전에 대응하려는 목적에서 발명되었습니다. 하지만 훗날 다양한 민간 분야에서도 사용되었는데 어군 탐지나 심해 연구 등이 대표적입니다."
 building_agassiz_volcano_observatory: "화산 관측소"
 agassiz_volcano_observatory_can_construct_volcano_tt: "주에 #ORANGE 화산#!이 있음"
 agassiz_volcano_observatory_can_construct_geologist_tt: "#default_text [GetPlayer.GetName]에 [concept_agassiz_geologist]가 있음#!"
 pmg_agassiz_volcanology: "화산학"
 pm_agassiz_basic_volcanology: "기초 화산학"
 agassiz_building_production_mult_modifier: "신규 광맥"
 agassiz_building_production_2_mult_modifier: "신규 유정"
 agassiz_ore_search_cost_modifier: "광맥 탐사 비용"
 agassiz_mineralogist: "광물학자"
 agassiz_mineralogist_desc: "광물학자는 희귀 암석의 전문가로서 희귀 광물 탐색에 특히 유용합니다."
 agassiz_geophysicist: "지구물리학자"
 agassiz_geophysicist_desc: "지구물리학자는 지구의 내부 환경에 관한 전문가로서 지구의 역사와 그 과정에 대해 제일 많이 알고 있습니다."
 agassiz_prospector: "탐사원"
 agassiz_prospector_desc: "탐사원은 신규 광맥이나 유전 탐색에 도움을 주는 특수 능력을 지니고 있습니다."
 agassiz_oceanographer: "해양학자"
 agassiz_oceanographer_desc: "해양학자는 해양 환경과 원리에 관하여 탁월한 지식을 갖고 있습니다."
 agassiz_volcanologist: "화산학자"
 agassiz_volcanologist_desc: "화산학자는 화산 분야의 전문가로서 화산 탐색에 특히 큰 도움이 됩니다."
 agassiz.100.t: "광맥 탐사"
 agassiz.100.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] 박사가 모든 강의를 취소하고 장비를 챙겨 광맥 탐사에 나섰다. 남은 질문은 단 하나. 박사가 조사해야 할 원자재 매장지의 유형은 무엇이 되어야 하는가?"
 agassiz.100.f: ""
 agassiz.100.g: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] 박사는 대학으로 돌아가는 것이 좋겠소."
 agassiz.100.h: "석탄."
 agassiz.100.i: "철."
 agassiz.100.j: "납."
 agassiz.100.k: "유황."
 agassiz.100.l: "금."
 agassiz.100.m: "우라늄."
 agassiz.101.t: "새로운 광맥"
 agassiz.101.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] 박사가 광산 회사의 새로운 광맥을 발견하고 돌아왔다. 이제 그곳을 얼마나 더 개발할 것인가는 박사의 몫이 아니다."
 agassiz.101.f: "\"모든 것은 한계가 있다. 철광석을 교육시켜 황금으로 바꿀 순 없다.\" - 마크 트웨인"
 agassiz.101.g: "고생했소."
 agassiz.102.t: "석유다!"
 agassiz.102.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] 박사가 새로운 석유 매장지를 발견하면서 흑색의 황금이 솟구쳐 올랐다. 박사는 이제 자신의 임무가 끝났다는 생각이다.\n\n개량된 건물 수: [GetPlayer.MakeScope.Var('mr_num_improved_oil_rigs_buildings_var').GetValue|V0]곳"
 agassiz.102.f: "\"성공의 공식: 일찍 일어나고, 열심히 일하고, 석유를 발견하라.\" - J. 폴 게티"
 agassiz.102.g: "기름은 아무리 많아도 부족하지 않은 법."
 je_agassiz_find_coal_project: "탄광 발견"
 je_agassiz_find_iron_project: "철광 발견"
 je_agassiz_find_lead_project: "납광 발견"
 je_agassiz_find_sulfur_project: "유황 발견"
 je_agassiz_find_gold_project: "금광 발견"
 je_agassiz_find_uranium_project: "우라늄 발견"
 je_agassiz_find_oil_project: "유전 발견"
 je_group_agassiz_geology: "모르겐뢰테: [concept_agassiz_geology]"
 je_geologist_dies_tt: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] 박사 사망"
 agassiz_stop_geologist_project_button: "지질학자 과제 중단"
 agassiz_stop_geologist_project_button_desc: "현재 지질학자 과제를 중단합니다. 모든 지질학자 진행도가 사라집니다."
 agassiz_stop_geologist_improving_project_tt: "#italic 지질학자 과제 중단#! 버튼을 클릭하여 과제를 중단할 수 있습니다."
 agassiz_mid_atlantic_ridge_cost_modifier: "대서양 탐사 예산"
 je_agassiz_mid_atlantic_ridge: "해저 산맥"
 je_agassiz_mid_atlantic_ridge_reason: "[concept_agassiz_geologist]로 활동 중인 [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] 박사는 현재 음향측심기로 대서양의 해저를 훑어보는 최신 탐사선에 승선해 있다. 이번 탐사를 통해 지구 역사에 관한 새로운 통찰력을 얻을 수 있을 것이다."
 je_agassiz_mid_atlantic_ridge_goal: "12개월 후 [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] 박사의 탐사 결과가 밝혀짐"
 agassiz.201.t: "대서양 중앙 해령"
 agassiz.201.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] 박사가 초기 자료 일부를 검토하였다. 탐사 결과는 놀라웠다. 해저 융기가 적도 부근에서만 끊어졌을 뿐, 대서양 북부를 넘어 대서양 전체에 걸쳐 연속적인 띠의 형태로 나타났던 것이다.  지질학자는 이 현상을 대서양 중앙 해령이라 명명하였다. 향후 수개월, 수 년에 걸쳐 자료 추가 분석이 진행될 전망이다."
 agassiz.201.f: "대서양 중앙 해령은 대부분 해수면 아래에 놓여 있는 대서양의 산맥으로 약 20,000km에 걸쳐 뻗어 있다. 이는 지구를 가로지르는 60,000km 길이의 중앙 해령 가운데서도 최대 규모에 해당된다. 대서양 중앙 해령의 해저 융기는 1853년 해군 장교 매튜 폰테인 모리가 처음 기록하였으며 1872년 챌린저호 탐사에서 처음 사실로 확인되었다. 이는 최초의 대서양 횡단 심해 케이블 부설 과정에서 사전 조사가 이루어졌기 때문이다. 1925년~1927년 독일의 메테오 탐사대는 음향측심기를 사용하여 대서양 중앙 해령의 세부 정보를 알아냈다. 대서양 중앙 해령의 발견은 베게너의 대륙이동설과 연관된 판 구조론의 지구역학적 과정에 관한 첫 단서를 제공하게 되었다."
 agassiz.201.g: "이것으로 지질학자의 지질학적 이해도가 향상됩니다."
 agassiz.201.h: "이것으로 지질학자의 해양학적 이해도가 향상됩니다."
 agassiz.201.i: "이것으로 지질학자의 포괄적인 이해도가 향상됩니다."
 agassiz.202.t: "지질학-고생물학 심포지엄"
 agassiz.202.d: "학술원에서 [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] 교수와 [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetFullName] 교수가 주최하는 행사에 관계 인사들을 초청하였다. 이번 심포지엄은 지구 역사 연구에 있어 하나의 이정표로 여겨진다. 두 교수는 특히 남아메리카와 서아프리카 연안의 지질학적, 화석 구성에서 놀라울 정도로 유사성을 보인다는 사실을 강조할 전망이다."
 agassiz.202.f: "지질학과 고생물학이 얼마나 가까운 관계에 있는지는 두 분야에서 모두 두각을 드러낸 과학자가 수없이 많았다는 사실로 알 수 있다. 지층과 화석의 상호작용을 통한 연대 측정은 두 학문을 불가분의 관계로 만든다. 조르주 쿠비에는 고생물학의 아버지인 동시에 지질학의 대부로 여겨진다. 심지어 과학적 논쟁의 경우에도 1830년 점진론과 격변론을 놓고 벌어진 쿠비에-조프리 논쟁에서도 지질학과 고생물학 발견을 주요 논거로 삼았다. 현대 지질학과 현대 고생물학은 시너지 효과 없이는 존재가 불가능했던 것이다."
 agassiz.202.g: "유익한 학계 교류로군."
 agassiz.311.t: "우주에서 건너온 암석"
 agassiz.311.d: "우리나라의 외딴 지역에서 새로운 광물을 탐색하던 [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] 박사가 놀라운 암석을 발견했다. 초반 조사를 진행한 결과, 철분을 함유한 이 거석은 운석임이 틀림없었다!"
 agassiz.311.f: "최초의 운석 수집은 이르면 18세기부터 이루어졌는데, 당시에는 운석이 외계에서 건너왔다는 사실이 밝혀지지 않았다. 세계에서 가장 오래된 운석 소장품은 오스트리아 빈의 자연사 박물관에 소장된 것으로, 1751년 지구에 떨어진 흐라시나 운석이 최초의 소장품으로 기록되어 있다. 오늘날 이곳은 총 1,100여점의 운석이 소장된 세계 최대 규모의 전시관이다. 20세기 이전에는 발견된 운석이 수백 점에 불과하였던 것이 오늘날 전세계 소장품을 통틀어 3만 점이 넘게 된 것은, 하비 H. 니닝거가 지구 표면에서 발견되는 운석이 생각보다 흔하다는 사실을 알아내면서부터였다. 니닝거는 미국 대평원에서 운석을 탐색하는 전략을 취했는데, 이 지역은 대부분 경작이 이루어져 토양에 암석이 적었기 때문이다. "
 agassiz.311.g: "이건 대체 어디서 온 것인가?"
 agassiz_seismology_tech: "지진학"
 agassiz_seismology_tech_desc: "1839년 스코틀랜드 콤리 인근에서 발생한 일련의 지진을 계기로 영국에서는 지진 탐지 방식을 개선하기 위한 위원회가 출범하였습니다. 그 결과 제임스 데이비드 포브스가 최초의 것으로 꼽히는 현대식 지진계를 제작하였습니다. 1857년부터 로버트 말렛은 폭약을 이용한 지진 실험을 실시하며 오늘날 계측 지진학의 기반을 다졌습니다. 말렛은 '지진학'이라는 용어를 처음 사용한 장본인이기도 합니다."
 agassiz_geologist_demotivated_modifier: "실의에 빠진 지질학자"
 agassiz_set_new_age_of_earth_effect_tt: "[GetPlayer.GetName]에서 지구의 나이에 관한 최신 연구를 제시하게 됩니다. 지구의 나이는 다시 산정됩니다."
 agassiz.401.tt: "[concept_agassiz_geologist]를 보유한 모든 국가가 해당 학설의 공인 여부를 표결에 부칩니다."
 notification_agassiz_new_earth_age_notification_name: "지구의 나이 재산정"
 notification_agassiz_new_earth_age_notification_desc: "어느 [concept_agassiz_geologist]가 제시한 지구의 나이가 생각했던 것보다 더 오래됐다는 학설이 여러 동료 학자들 사이에서 받아들여졌습니다.\n\n[SCOPE.GetRootScope.GetCountry.GetCustom('agassiz_age_of_earth_type')]"
 je_agassiz_geological_research: "지질학 연구"
 je_agassiz_geological_research_reason: "[ROOT.GetCountry.GetCustom('je_agassiz_geological_research_active_type')]분주한 상태가 아닌 [concept_agassiz_geologist]는 지질학 연구를 수행할 수 있습니다.\n\n연구 과정에서 다음의 변화가 발생할 수 있습니다.\n- 지질학자에게 $agassiz_mineralogist$ [concept_character_trait]이 있다면 연간 [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')] 수집량이 두 배가 됩니다.\n- [Concept('concept_dubois_formation','$concept_dubois_formations$')], [Concept('concept_andersson_cave','$concept_andersson_caves$')], 우라늄 매장지를 발견할 수 있습니다.\n- 연구가 5년 동안 이어진 후에는 @agassiz_mineral![Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')] #p 25,000점#!과 @agassiz_rare_mineral![Concept('concept_agassiz_rare_mineral','$concept_agassiz_rare_minerals$')] #p 1점#!을 획득하게 됩니다. 또한 지질학자는 $agassiz_mineralogist$ [concept_character_trait]을 획득합니다."
 agassiz.401.t: "새로운 계산"
 agassiz.401.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName](이)가 한평생 쌓아 왔던 모든 경험과 지식을 동원하여 지구의 나이를 새로 계산하는 데 성공했다. 이제 남은 질문은 이 학설이 학계의 공인을 받을 수 있는지의 여부다."
 agassiz.401.f: "19세기 초부터 20세기 중반까지 지구의 나이를 계산하는 것은 모호한 상태로 남아 있었으며 그 중 대부분은 논쟁과 갈등 대상에 올랐습니다. 지구의 나이 문제는 진화론과 밀접한 연관을 지녔는데, 진화론이 학설로서 기능하기 위해서는 충분히 긴 시간을 전제해야 했기 때문입니다. 세기말까지 많은 학자들은 지구의 나이가 수백만 년에 불과하다고 믿었습니다. 켈빈 경은 말년에 지구의 나이를 약 2천만 년으로 추정하기도 했습니다. 심지어 자신의 이론을 옹호했던 '비타협주의자'로 꼽히는 찰스 다윈조차도 지구의 나이를 약 3억 년으로 추정했습니다. 지구의 나이를 정확히 측정하고 지구, 나아가 태양계 전체의 실제 나이를 알아낸 것은 방사선이 발견되고 나서부터였습니다."
 agassiz.401.g: "세계 유수의 지질학자들에게 논문을 보내자."
 agassiz.402.t: "새로운 나이를 제시한 지질학자"
 agassiz.402.d: "[SCOPE.sCharacter('agassiz_geologist_scope').GetLastName](이)가 지구의 실제 나이를 계산했다는 주장을 제기하였다. 이 학자는 기존 측정값이 잘못되었다고 판단하고 지구의 나이가 훨씬 더 많은 것으로 추정하고 있다. 우리 학자는 지질학 분야의 저명한 전문가이기에 논문의 사본을 전달받게 되었다."
 agassiz.402.g: "이번 계산 결과는 설득력이 있군."
 agassiz.402.h: "누가 이런 사이비 지질학 같은 헛소리를 믿으란 겁니까?"
 agassiz.403.t_yes: "지질학 연구 공인"
 agassiz.403.d_yes: "다행히도 국제 지질학회의 과반수 회원들이 우리 지질학자의 새로운 산정법을 하나의 이정표로 평가하고 그의 이론이 유효한 것으로 공인하였다."
 agassiz.403.f_yes: "지구의 나이 산정에 관한 [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]의 추산 결과가 과반수의 표를 얻으며 승인되었다. 이번 연구를 #G 승인#!한 학자는 총 [GetGlobalVariable('agassiz_age_of_earth_yes_global_var').GetValue|+0]명, #R 반대#!한 학자는 [GetGlobalVariable('agassiz_age_of_earth_no_global_var').GetValue|+0]명으로 드러났다. 이것으로 해당 학설이 공인되어 지구의 나이가 훨씬 높아지게 되었다."
 agassiz.403.g: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] 박사의 업적이오, 지질학계의 업적이다!"
 agassiz.403.t_no: "지질학 연구 부결"
 agassiz.403.d_no: "소위 '엘리트'라 칭하지만 실제로는 무지한 국제 지질학계에서 우리 지질학자의 새로운 연구 결과를 받아들이지 않았다. 우리는 표결에 부정행위가 있었는지, 아니면 우리의 자랑스러운 조국을 무너뜨리려는 적대적인 묘책이었는지는 아직 밝혀내지 못했다."
 agassiz.403.f_no: "지구의 나이 산정에 관한 [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]의 추산 결과가 과반수의 표로 부결되었다. 이번 연구를 #G 승인#!한 학자는 총 [GetGlobalVariable('agassiz_age_of_earth_yes_global_var').GetValue|+0]명, #R 반대#!한 학자는 [GetGlobalVariable('agassiz_age_of_earth_no_global_var').GetValue|+0]명으로 드러났다. 이것으로 기존에 공인됐던 지구의 나이가 그대로 유지되었다."
 agassiz.403.h: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] 박사의 좌절은 곧 지질학계의 좌절이오..."
 je_agassiz_advanced_oceanography: "고급 해양학"
 je_agassiz_advanced_oceanography_reason: "기존 해양학 연구는 주로 태평양의 현 상황을 전략적으로 활용하여 군사적으로 실질적인 이득을 제공하는 것이 주를 이루었으나, 이제 학자들은 지구에 관하여 더 많은 사실을 알아내기 위하여, 즉 순전히 지식의 습득에 나서기 위하여 해양 연구 결과를 활용하는 쪽을 지지하고 있다."
 je_agassiz_advanced_oceanography_success: "@rapanui_oceanographic_knowledge! #E 해양학 지식#! #G 50#!을 획득하면 연구가 마무리됩니다."
 je_agassiz_advanced_oceanography_goal: "@rapanui_oceanographic_knowledge! #E 해양학 지식#! #G 50#!을 획득하면 연구가 마무리됩니다."
 agassiz.312.t: "지질 조사"
 agassiz.312.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] 박사는 광활한 지역의 지질 단면도를 작성하고, 그 지도를 일반에 공개했다."
 agassiz.312.f: "근대 층서학은 19세기에 걸쳐 발전하였다. 유럽과 북미 전역의 지질학자들은 윌리엄 스미스의 사례를 따라 자국의 암석층을 조사와 분류, 상호연관지었고 그 결과를 담은 지도와 층서표, 논문을 출간하였다."
 agassiz.312.g: "이 지식을 이론적으로 활용하자."
 agassiz.312.h: "이 지식을 실용적으로 활용하자."
 agassiz.313.t: "광물 매장지"
 agassiz.313.d: "이전에는 개발되지 않았던 지역에 대한 지질 조사 과정에서 풍부한 광물 매장지가 발견되었다. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName](은)는 아직 탐색 과정에서 주력해야 하는 측면이 무엇이 되어야 하는지를 결정하지 못했다."
 agassiz.313.f: "광물은 대체로 결정 구조를 지니며 지질학적 과정을 통해 형성되는 원소 내지는 화합물을 말한다. 오늘날 그 존재가 알려져 있고 독자적인 광물로 인정되는 것은 약 6,000종에 달하며, 그 중 대다수가 무기물이지만 멜라이트와 이븐카이트, 신장 결석을 유발하는 웨웰라이트와 같은 일부 유기물도 지질학적 과정으로 형성되었기에 광물로 인정되고 있다. 현재까지 알려진 모든 광물과 그 동의어, 그리고 아직 공인되지 못한 광물을 모두 아우르면 7,000여개의 광물 명칭이 존재한다."
 agassiz.313.g: "질을 우선하자."
 agassiz.313.h: "양을 우선하자."
 agassiz.314.t: "영감을 주는 지질학자"
 agassiz.314.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName](은)는 이제 지질학계에서 명성을 떨치게 되었다. 본인의 자리에 돌아오기만 하면 [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHim]에게 조언을 구하려는 사람들이 많고, 전세계 동료 학자들로부터 전해진 편지가 우편함에 쌓여 있다."
 agassiz.314.f: "\"가장 훌륭한 지질학자는 암석을 가장 많이 본 사람이라 생각한다.\" - 허버트 해롤드 리드"
 agassiz.314.g: "이것으로 [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] 명성을 드높일 것이다."
 agassiz.314.h: "이것으로 본인의 대학이 지닌 명성을 드높일 것이다."
 agassiz.315.t: "지질학적 통찰력"
 agassiz.315.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName](은)는 이번 연구 탐사를 통해 국내의 수많은 지질학 조사지를 돌아다니며 새로운 시각에 눈을 뜨게 되었다. 현재 준비 중인 논문에서 지질학 원리에 대한 몇가지 새로운 연구 결과를 집대성할 예정이다."
 agassiz.315.f: "\"세상은 지질학자의 거대한 퍼즐 상자와도 같다. 퍼즐 조각들이 서로 어떤 관계인지, 어디에 맞춰야 하는지 알기 전까지 수수께끼를 대하는 아이처럼 그 앞에 서 있다. 그리고 마침내 조각들이 하나로 합쳐져 스스로의 손 아래에서 완성된 그림을 만들어내고 만다.\" - 루이 아가시즈"
 agassiz.315.g: "훌륭하다."
 agassiz.11.t: "지진역학"
 agassiz.11.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName](은)는 오늘날 국제적인 주목을 받았다. 지진에 관한 저서를 통해 지질학의 이 분야에 대한 기존 지식을 혁명적으로 뒤바꾸어 놓았기 때문이다. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe]가 고안한 '진원지', '지진학'과 같은 용어들은 이미 학계에 깊이 자리 잡았다."
 agassiz.11.f: "1846년 2월 9일,로버트 말렛은 왕실 아일랜드 아카데미에서 현대 지진학의 기초 중 하나로 평가받는 자신의 논문 '지진의 역학'을 발표했습니다. 1852년부터 1858년 사이에는 아들 존 윌리엄 말렛의 도움을 받아 1858년에 발간된 '영국 협회의 지진 카탈로그'를 준비했으며, 이 목록에는 당시까지 알려진 지진들의 기록과 그 영향들이 상세히 기술되었습니다. 또한 이 시기에 그는 느슨한 암석과 단단한 암석에서의 지진파 이동 시간을 측정하기 위해 폭발 실험을 수행하기도 했습니다."
 pmg_agassiz_seismology: "지진학"
 pm_agassiz_basic_seismology: "기초 지진학"
 pm_agassiz_advanced_seismology: "고급 지진학"
 pm_agassiz_advanced_volcanology: "고급 화산학"
 agassiz_congress_host_modifier: "지질학 학술회의 개최"
 agassiz_laughed_congress_modifier: "지질학 회의에서 망신당함"
 agassiz_respected_congress_modifier: "지질학 회의에서 대우받음"
 agassiz_lauded_congress_modifier: "지질학 회의에서 칭송받음"
 agassiz.316.f: "만약 자국 영토 내에 흥미로운 지질학적 특징이 없는 경우,지질학자들은 접경 지역이나 그 너머에서 지층이나 동굴을 찾아 탐색하기도 합니다."
 agassiz.317.t: "외국의 지질학자"
 agassiz.317.d: "한 외국인 지질학자가 연구 과정에서 어떻게든 우리 영토 내에 들어와 기록을 남겼다. 이 학자는 '감사'의 표시로 연구 결과를 우리에게 보내주었다."
 agassiz.317.g: "그래서...?"
 agassiz.501.t: "대륙은 이동하는가?"
 agassiz.501.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName]는 방금 저서를 출간했으며, 그 속에서 제시된 가설이 벌써부터 상당한 논란을 불러일으키고 있다. 이에 따르면 현재 모습의 대륙들은 지질학적 기원이 그리 오래되지 않았다. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] 박사는 오늘날의 대륙들이 과거에 하나의 거대한 대륙을 이루고 있었으며 그것을 '판게아'라고 명명한다는 가설을 제시했다.이 학설을 국제 지질학계에 설득하기 위해, 각국 학자들을 학술 대회에 초청하였다."
 agassiz.501.f: "대륙 이동이 그 원인이라는 가장 오래된 주장은 아브라함 오르텔리우스에게서 나왔다. 그의 1596년판 지도책 《세계의 무대(Theatrum Orbis Terrarum)》에서는 두 해안선의 유사성을 이미 분명하게 확인할 수 있다. 알렉산더 폰 훔볼트는 1801년과 1845년에 남아메리카와 아프리카의 맞은편 해안선과 식생의 유사성을 서술하며, 대서양이 거대한 격류에 의해 깎여나간 것이라고 추측했다. 1858년 지리학자 안토니오 스니데르-펠레그리니는 대양을 사이에 구분을 두지 않고 구대륙과 신대륙이 맞붙어 있는 첫 지도를 출판함으로써 한 걸음 더 나아갔다. 그러나 대륙이동설을 통해 대륙 고정설(대륙이 지구에 단단히 고정되어 있다는 가설)에서 이동설로 인식의 전환을 이끈 인물은 다름 아닌 알프레트 베게너였다. 하지만 그의 이론은 생전에는 학계의 소수 의견에 머물렀으며, 20세기 후반에 이르러서야 비로소 정설로 확립되었다."
 agassiz.501.g: "주요 지질학 선진국들을 초청하시오!"
 agassiz.502.t: "지질학과 초대"
 agassiz.502.d: "[SCOPE.sCountry('agassiz_congress_host_country').GetName]은(는) 국제 지질학 학회에 사람들을 초청했다. 저명한 지질학자인 주최자는 정말로 대륙이 이동하고 있다는 주장을 하고 있다...!"
 agassiz.502.g: "이것은 즐거움을 줄 것으로 기대된다."
 agassiz.503.t_laughed: "지질학회의 조롱"
 agassiz.503.t_respected: "자신감 넘치는 모습"
 agassiz.503.t_lauded: "존경과 축하"
 agassiz.503.d_laughed: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] 교수의 참석은 웃음거리로 전락하였다. [ROOT.GetCountry.GetNameNoFlag]에서 지질학 분야에 별다른 성과를 달성하지 않았다. 뒤에서는 저들끼리 조롱이 오갔을 것이 분명하다."
 agassiz.503.d_respected: "지질학 학술회의의 시작에 앞서,[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName](은)는 따뜻한 환대와 평범한 선물을 교환했다.[ROOT.GetCountry.GetNameNoFlag](이)가 학계에서 마땅한 명성을 지니고 있었던 덕분이다."
 agassiz.503.d_lauded: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] 교수가 도착하자 엄청난 환호성이 교수를 맞이하였다. 모두가 이번 행사에서 가장 기대되는 손님으로 생각했던 것이다. [ROOT.GetCountry.GetNameNoFlag](이)가 지질학 분야의 선구적인 국가로 여겨지는 만큼 교수의 주변으로 인파가 빠르게 모여들었다."
 agassiz.503.f_laughed: "\"[ROOT.GetCountry.GetAdjectiveNoFlag] 고고학자들이 여자 하나 못 사귀는 이유가 뭔지 아나?\n\n그야 매번 쩌적 하고 갈라지니깐!\""
 agassiz.503.f_respected: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] 교수는 도착하자마자 동료 학자들과 몇 차례 즐거운 이야기를 나누었다. 대화의 내용은 따분한 암석에 관한 것이 대부분이었다. 학자가 아니라면 훨씬 더 별 볼일 없는 암석 지형으로 치부할 만한 것들 말이다."
 agassiz.503.f_lauded: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] 교수는 무수한 악수의 요청에 정신을 못 차리는 모습이었다. 수많은 동료 학자들이 이야기를 나누고 싶어했으며 교수의 탐험과 경험에서 하나라도 얻어가고자 했다. 심지어 몇몇은 개인 강연을 해줄 수 있겠느냐고 간곡히 요청하기도 했다."
 agassiz.503.g: "이렇게 창피할 데가!"
 agassiz.503.h: "마침내 말이 통하는 사람들을 만났군."
 agassiz.503.i: "우리는 선도적인 지질학 국가다!"
 agassiz.504.t: "대륙 고정설인가? 대륙 이동설인가?"
 agassiz.504.d: "[SCOPE.sCharacter('agassiz_alfred_wegener_scope').GetFullName](은)는 국제 지질학자들이 모인 자리에서 강연에 나서 상당한 호응을 받았다. 지질학적 관점을 뒤집어 대륙 이동설에 힘을 싣는 것이 강연의 내용이었다. 그러나 이에 반대하며 대륙 고정설이라는 기존 학설에서 벗어나지 않으려 하는 학자들도 많았다."
 agassiz.504.f: "대륙고정설은 1960년대까지 대표적인 지각변동 가설로 자리잡았다. 대륙고정설은 지구의 지각이 지반과 단단히 묶여 있어, 대규모 지각변동도 국지적으로만 일어진다는 가정이다. 따라서 대지의 형성은 주로 수직적인 지각운동에 따른 것이며, 수평적인 지각운동은 거의 없다고 본다. 고전 지질학의 대다수 이론은 바로 이 대륙고정설에 기반을 두었다. 19세기 초 남아메리카와 아프리카에서 같은 종의 화석이 발견되자, 대륙고정설을 전제로 과거에 아프리카와 남아메리카가 육지로 연결되어 동물들이 다른 대륙으로 이동할 수 있었다는 '육교설'이 제기되었다. 1924년~1927년 연구선 메테오르호의 음향측심기 측정 결과, 예상과는 달리 동서로 뻗어 있어야 할 육교의 잔해는 없고 남북으로 해저 산맥이 뻗어 있는 일명 '대서양 중앙 해령'이 발견되면서 육교설은 흔들리기 시작, 1960년대에 이르러서야 완전히 폐기되었다. 대륙고정설의 반대 설은 지각의 수평적 운동이 결정적 영향을 끼친다고 보는 대륙이동설이며, 알프레드 베게너의 대륙이동설 창안에서 발전한 것이다."
 agassiz.504.g: "대륙은 수백만 년 동안 변하지 않았습니다."
 agassiz.504.h: "모든 증거가 판 구조론을 가리키고 있습니다."
 agassiz.505.t: "지질학자들끼리"
 agassiz.505.d: "지질학 학술회의 기간 동안 [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName](은)는 동료 학자들과 의견을 나눌 기회를 갖게 되었다. 자유 시간에 어떤 부분에 집중해서 이야기를 나누는 것이 좋을까?"
 agassiz.505.f: "\"우리의 현 지식이 불완전하다는 점을 감안할 때, 선사 시대 지구의 환경에 대해 생물학적 관점에서 접근하느냐, 아니면 지구물리학적 관점에서 접근하느냐에 따라 완전히 상반된 결론이 도출된다는 것은 참으로 이상한 일이다.\" -알프레드 베게너"
 agassiz.505.g: "지질학 지식"
 agassiz.505.h: "해양학 지식."
 agassiz.505.i: "희귀 광물."
 agassiz.505.j: "새로운 인재."
 agassiz.509.t_fix: "대륙 고정설 승리"
 agassiz.509.d_fix: "[SCOPE.sCharacter('agassiz_alfred_wegener_scope').GetFullName](은)는 그간의 노력에도 불구하고 동료 학자의 과반수를 납득시키지 못했다. [SCOPE.sCharacter('agassiz_alfred_wegener_scope').GetLastName] 교수가 본인의 주장을 뒷받침할 증거를 충분히 제시하지 못했다는 비판이 제기되고 있다. 대륙은 고정되어 있다는 것이 변함없는 사실로 남게 되었다."
 agassiz.509.f_fix: "\"이동설계의 뉴턴은 아직 나타나지 않았다. 그런 사람이 없다고 걱정거리가 될 필요는 없다. 이동설 자체가 아직 초기 단계이고 여전히 많은 이들이 의심의 눈초리를 보내고 있기 때문이다. 결국 타당성의 면에서 이견이 존재하는 않은 법칙을 설명하는 데 시간과 노력을 쏟기를 주저한다 하여도 그 이론가를 탓할 수는 없는 것이다.\" - 알프레드 베게너"
 agassiz.509.g: "그래도 지구는 돈다."
 agassiz.509.t_tectonics: "대륙 이동설의 승리"
 agassiz.509.d_tectonics: "[SCOPE.sCharacter('agassiz_alfred_wegener_scope').GetFullName](은)는 자신의 논문을 학계에 납득시키는 데 성공하였다. 대륙 이동설은 이제 과거에는 불분명했던 다양한 지질학적 현상을 설명할 수 있는 제일 유력한 이론으로 평가받게 되었다."
 agassiz.509.f_tectonics: "\"학계에서는 아직도 지구과학의 전 분야가 과거 지구의 환경을 밝히는 데 증거를 제시해야 하며, 그러한 모든 증거를 취합해야만 밝혀내야만 진실을 밝힐 수 있다는 사실을 충분히 이해하지 못하는 것 같다. (중략) 지구과학의 전 분야에서 제공하는 정보를 취합해야만 비로소 '진실'을 규명할 수가 있다. 다시 말해, 알려진 모든 사실을 최대한 잘 배치하고 그에 따라서 가장 개연성이 큰 그림을 알아낼 수 있다는 것이다. 뿐만 아니라 어떤 과학 분야에서 나온 발견이든 간에, 새로운 발견이 이뤄질 때마다 우리가 내렸던 결론을 수정할 가능성을 항상 염두에 두어야 한다.\" - 알프레드 베게너"
 agassiz.509.h: "잠깐, 이건...뜻밖인걸!"
 agassiz_conference_geologist_double_vote_tt: "경험 많은 지질학자를 보유한 덕분에 우리의 투표권은 #G 2배#!로 적용됩니다."
 agassiz_conference_geologist_triple_vote_tt: "저명한 지질학자를 보유한 덕분에 우리나라의 투표권은 #G 3배#!로 적용됩니다."
 agassiz.601.t: "화산 위치"
 agassiz.601.d: "학자들과 조수로 이루어진 조사단이 다가오는 화산 탐사를 위해 모였다. 허나 이제 의문이 하나 남았다. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName](이)가 이끄는 조사단이 어떤 화산을 탐사해야 하는 것인가의 문제다. 다음은 우리가 선택할 수 있는 지역의 목록이다."
 agassiz.601.f: "\"허튼 박사의 이론을 언급하실 때에는 '불'이란 표현을 사용하지 말아주시기를 부탁드립니다. 그보다 '열'이라는 표현이 더 정확합니다. 불은 일반적으로 연료가 타는 것을 뜻하지만, 지구 중심부에 그런 부류의 불이 존재한다는 근거는 없습니다.\" - 마리아 핵"
 agassiz.601.g: "[SCOPE.sState('agassiz_volcano_1').GetName]"
 agassiz.601.h: "[SCOPE.sState('agassiz_volcano_2').GetName]"
 agassiz.601.i: "[SCOPE.sState('agassiz_volcano_3').GetName]"
 agassiz.602.t: "화산 기슭에서"
 agassiz.602.d: "화산 탐사대가 [SCOPE.sState('agassiz_volcano_state').GetName]에 위치한 화산 기슭에 도달했으며, 이제 본격적으로 과학 조사를 시작하고 있다."
 agassiz.602.f: "\"지하 열의 존재는 온천과 화산, 지진 등의 현상으로 입증된다. 이러한 관찰 결과는 지구 내부에 열이 존재한다는 사실에 의심의 여지를 없앤다. 헌데 그 열의 깊이는 어느 정도고, 어디까지 뻗어 있고, 강도는 어느 정도인 것일까?\" - 존 플레이페어"
 agassiz.602.g: "들은 것 만큼 그리 위험하지는 않다네, 그렇지 않은가? "
 agassiz.603.t: "성공적인 화산 탐사"
 agassiz.603.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName](은)는 조수들을 이끌고 화산 정상까지 올라가는 대담한 작전에 나서는 것에 그치지 않고 수많은 실험을 실시하고 표본을 수집하였다. 이번 화산 탐사는 지구 내부의 작용 원리에 대해 한층 더 깊이 배우는 데 귀중한 보탬이 되었다."
 agassiz.603.f: "\"온 자연의 야생이 똑같은 이야기를 들려주고 있다. 지진과 화산, 간헐천 폭발, 천둥처럼 으르렁거리고 천둥처럼 울리는 움직임과 넘쳐 흐름, 식물 속에서 조용히 솟구치는 수액, 갖가지 폭풍까지, 그 모든 것은 자연의 심장이 질서정연하게 미(美)를 창조하는 사랑의 박동을 나타내고 있다.\""
 agassiz.603.g: "3도 화상 문제 없이 해냈어."
 agassiz.604.t: "대참사로 끝난 화산 탐사"
 agassiz.604.d: "끔찍한 소식이다! 유독 가스와 소규모 지진, 검은 연기 등 여러 경고 신호에도 불구하고 [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName](은)는 고집스럽게 탐사에 나섰다. 그런 뒤 탐사대로서는 전혀 예상 못한 화산 분화가 일어나 해당 지역이 재난구역으로 변해 버린 것이다. 극심한 고난 끝에 목숨을 부지한 몇몇 대원들이 연구 결과와 시료를 가지고 안전한 곳으로 대피할 수 있었다. 그러나 [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] 박사는 실종되고 말았다. 이대로라면 최악의 상황을 가정해야 할 것이다."
 agassiz.604.f: "신문들은 다수의 부상자와 사상자가 발생했다고 보도하고 있다. 해당 지역의 광범위한 구역에 대피 조치가 내려졌다. 건물들은 파괴되고 거리는 용암으로 뒤덮였다. 화산 분화구 근처에 있던 누군가가 이 자연의 힘 속에서 살아남았을 가능성은 없는것에 가까웠다."
 agassiz.604.g: "끔찍하군!"
 agassiz.605.t: "성과 없는 화산탐사"
 agassiz.605.d: "화산 탐사대는 연구 자금을 모두 소진하고 귀환했다. 불행히도 거의 유용한 성과를 내지 못했다. 아마 탐사 대장이 지나치게 조심한 것이 아니었을까?"
 agassiz.605.f: "'화산 위에서 조금도 춤을 출 각오가 없다면, 자네는 화산을 탐사할 수 없지.'"
 agassiz.605.g: "실망스럽군"
 agassiz.611.t: "화학적 통찰력"
 agassiz.611.d: "[SCOPE.sState('agassiz_volcano_state').GetName]에서 탐사를 진행하던 [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName](이)가 화산의 분화구에서 벌어지는 몇 가지 흥미로운 화학 과정을 한층 더 자세히 들여다볼 수 있었다. 그곳에서 찾아낸 광물 화합물 중에는 지금껏 전혀 알려지지 않은 것도 있었다."
 agassiz.611.f: "대다수 화학 원소는 특히 광물 내에서 굉장히 다양한 화합물 형태로 존재한다. 근대 화학 초창기에 지질학자들은 새로운 시료를 계속해서 찾아내어 화학자들이 미지의 원소를 분리해낼 수 있도록 도왔다."
 agassiz.611.g: "이것은 [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] 박사에게 도움이 될지도 모르겠군."
 agassiz.612.t: "용암 함정"
 agassiz.612.d: "화산 탐사대가 분화구로 나아간 것이 너무 무모했던 모양이다. 탐사대가 서 있던 곳 사방에 용암이 들어차버린 것이다. 그러나 여기서 걸음을 되돌리면 막대한 시간 낭비로 이어지게 된다."
 agassiz.612.f: "\"용암 자체는 시인들이 지옥의 강을 노래할 때처럼 우중충한 모습을 하고 있다. 마치 모래로 된 개천처럼 천천히 흘러가는데, 낮에는 검은색이고 밤에는 붉은 색을 띈다. 용암이 다가올수록 갈라지는 듯한 소리가 들리는데, 그 소리가 희미해서 더욱 공포감을 자아낸다. 용암의 눈부심은 제법 강렬한 것이 땅이 하늘을 밝히는 유례없는 풍경을 만들며, 번개가 끊임없이 몰아치는 모습을 띈다. 하늘은 다시 그 빛을 물에 반사하고, 이렇게 삼중으로 타오르는 화염의 상이 자연을 불태우는 듯하다.\" - 제르멘 드 스타엘"
 agassiz.612.g: "또 다른 길을 찾는다."
 agassiz.612.h: "위험을 무릅쓰고 지나간다."
 agassiz.613.t: "노련한 지도자"
 agassiz.613.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName](은)는 산을 어떻게 타고 올라야 하는가를 정확히 알고 있는 경험 많은 화산학자다. 그 지식 덕분에 탐사가 안전하고 순조롭게 진행되고 있다."
 agassiz.613.f: "\"내가 그토록 눈에 담고 싶었던 일이 벌어졌다. 베수비오 화산이 며칠 동안 분화하고 있는 것이다. 나는 이미 화산에서 분출되는 용암을 대상으로 여러 실험을 실시해 보았으며 원래라면 무사히 마무리했을 터, 그 장엄하지만 위험천만한 상황, 즉 붉게 달아오른 액체가 흐르며 불의 폭포처럼 쏟아지는 곳에서 불과 5~6피트 (1.5~1.8m) 떨어진 곳에 너무 오래 머무른 탓에 심한 몸살에 걸리고 말았다.\" - 험프리 데이비"
 agassiz.613.g: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] 박사는 우수한 지도자다."
 agassiz.614.t: "독가스"
 agassiz.614.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] 박사가 이끄는 탐사대가 화산의 어느 지점에서 화산 가스가 다량 분출하는 것을 발견하였다. 지질학자는 그렇게 안전하다고 볼 순 없는 상황에서 시료를 조금이나마 채취할 마음을 품고 있다."
 agassiz.614.f: "화산 가스는 화산 활동 중에 지표면으로 분출되는 기체다. 화산 가스의 분출은 좁은 지역에서 벌어지거나 화산 측면의 넓은 지역에 걸쳐 확산될 수 있다. 화산 가스는 일찍이 1790년 이탈리아의 시피오네 브레이슬라크가 처음 채취하고 분석하였다. 화산 가스의 구성은 화산 내부의 마그마 운동에 따라 달라진다. 따라서 가스 구성의 급격한 변화를 알아내어 화산 활동의 변화가 이루어지고 있음을 알아보는 지표로 삼는 경우가 많다."
 agassiz.614.g: "우리는 이 가스를 연구해야한다."
 agassiz.614.h: "그건 미친 짓이야!"
 agassiz.615.t: "화산 분출물"
 agassiz.615.d: "갑작스러운 굉음에 화산 탐사대는 잠시 두려움에 떨었다. 최악의 상황은 끝났다고 생각하던 그때, 화산에서 갑자기 뜨겁게 달궈진 암석들이 뿜어져 나오며 마치 유성우처럼 탐사대를 덮지고 말았다. 조수 두 명이 부상을 입고, 짐을 나르던 노새 한 마리가 죽고 말았다."
 agassiz.615.f: "\"우리 머리 위로 섬 주변에서 마치 거대한 불길이 타닥거리는 소리나 중포가 발사되는 듯한 기괴한 소리가 1초~2초 간격으로 들려왔다. 다섯 시가 되자 굉음은 계속되었고 하늘은 어둠으로 뒤덮였다. 그리고 제법 큰 크기에 매우 뜨거운 부석들이 우리를 향해 우박처럼 쏟아졌다.\" - 왓슨 대위"
 agassiz.615.g: "참으로 불행한 사태 전환이로군."
 agassiz.616.t: "용암 표본"
 agassiz.616.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] 박사는 탐사대에 잠시 멈출 것을 요청하였다. 근처에 용암 표본을 채취하기에 좋은 장소가 있는 모양이다. 과학적 가치는 크지만 그 과정은 위험이 따른다."
 agassiz.616.f: "\"용암은 넓은 지대의 깊은 둑 안에 갇혀 흘러내렸는데 그것은 유체가 아니라 꼭 코크스 무더기나 가스가 펄펄 나는 석탄 덩어리처럼 보여다. 갈라지고 탁탁 소리를 내며, 반짝이고, 연기를 내뿜고, 불꽃을 일으키며 거대한 덩어리를 이루어 끊임없이 움직였던 것이다. 떨어져 나간 조각들이 굴러떨어지면서 남기는 섬광은 어찌나 강렬했던지 내가 꼭 철 용광로 입구에 서 있는 것만 같았다. 온 덩어리가 천둥 소리를 내며 떨어질 때마다 나무들이 불길에 휩싸였고, 보는 이들은 경탄과 아쉬움의 함성을 질렀다.\" - 루이기 팔미에리"
 agassiz.616.g: "이런 경험을 하려고 이 자리에 온 것일세."
 agassiz.617.t: "용암 표본 채취 성공!"
 agassiz.617.d: "우리 지질학자가 위험을 무릅쓰고 용암 표본을 채취하는 데 성공했다. 그 결과는 과학적 가치가 상당하다."
 agassiz.617.f: ""
 agassiz.617.g: "뜨거운 과학의 맛!"
 agassiz.618.t: "용암 표본 채취 실패!"
 agassiz.618.d: "다른 대원들에게 실망스럽게도 표본 채취에 실패하고 말았다. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName](은)는 심한 화상을 입고 탐사대를 위험에 빠뜨리고 말았다!"
 agassiz.618.f: ""
 agassiz.618.g: "손을 데일 수 있는 학문이라..."
 agassiz.619.t: "결정체"
 agassiz.619.d: "화산 지대에서는 고유의 지질학적 현상으로 다양한 희귀 결정질 광물이 형성된다. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName](은)는 이러한 광물들을 수집품에 추가했으면 하는 바람이다..."
 agassiz.619.f: "대다수 화산암은 여러 가지 공통적인 광물이 들어 있다. 화산암의 분화는 주로 분별 결정화를 통해 이산화규소(SiO2) 함량을 늘리는 경향이 있다. 따라서 한층 더 발달한 화산암은 장석과 석영동질체, 백운모 등이 함유된 층상규산염(phyllosilicates)과 텍토규산염광물(tectosilicates)처럼, 이산화규소 함량이 높은 광물이 풍부하게 들어 있는 경향이 있다. 그보다 더 원시적인 화산암은 여전히 규산염이 주를 이루기는 하나 감람석과 휘석처럼 이산화규소 함량이 낮은 광물로 구성되어 있다. 보웬의 반응계열은 화산암에 제일 흔히 들어 있는 광물의 생성 순서를 정확하게 예측하고 있다. 간혹 마그마는 다른 마그마에서 결정화된 결정을 흡수하기도 하는데, 이러한 결정을 이질결정(xenocrysts)이라 부른다. 킴벌라이트암에서 발견되는 다이아몬드는 흔치는 않지만 유명한 이질결정의 한 예시다. 킴벌라이트암은 다이아몬드를 생성하는 것이 아니라, 다이아몬드를 끌어올려 지구 표면으로 이끄는 역할을 한다."
 agassiz.619.g: "표본 하나면 족하다."
 agassiz.619.h: "가능한 한 많은 표본을 챙겨간다!"
 agassiz.619.i: "그깟 돌덩이 몇 개로 대원들의 목숨을 버릴 순 없다."
 agassiz.620.t: "불의 강"
 agassiz.620.d: "용암으로 된 강이 탐사대의 앞길을 막았다. 이것을 두고 화산 탐사 전체가 위태로울 수 있는 위험한 난관이라 보는 대원들도 있지만, [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName](은)는 이런 상황이야말로 자신이 써보지 못했던 장비들을 시험해 볼 수 있는 과학적 기회로 보고 있다. "
 agassiz.620.f: "\"대부분의 경우 빛은 불타는 물체가 아니라 백열 상태에서 나오는 것임을 확실히 알 수 있다. 베수비오 화산에서 솟아오르는 거대 불꽃 기둥처럼 보이는 것은, 다름아닌 용암이 흘러내리면서 나오는 빛이다.\" - 존 필립스"
 agassiz.620.g: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] 박사가 연구하는 것이 좋겠다."
 agassiz.620.h: "이건 너무 위험해!"
 agassiz.621.t: "화산 활동 이론"
 agassiz.621.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName](은)는 화산에 머무는 동안 단서를 수집하고 주변 지역을 탐사하여, 과거에 본인이 제시했던 화산 활동 이론의 최종 검증을 이뤄내고 싶은 마음을 갖고 있다. 이를 위해 스스로 '극도로 빠져들고 영감을 주는 지역'이라 칭했던 곳에서 오랜 시간을 보내야 하는 한편으로, 동료 학자들은 저 멀리 점점 더 검은 연기가 피어오르는 것을 이 악물고 지켜보고 있다..."
 agassiz.621.f: "\"화산 분화가 절정에 다할 즈음, 거대한 소나무 모양의 화산재 기둥이 높이 솟아오르다가 마침내 아래로 기울기 시작했으며, 기둥을 이루던 고밀도 물질의 비중이 상당했던 탓에 결국 지면으로 떨어지고 말았다. 그리고선 어마무시한 규모의 불타는 용암이 화산에서 쏟아져 내렸다.\" - 마리아나 스타크"
 agassiz.621.g: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] 박사가 이 현상을 철저히 연구해야 한다."
 agassiz.621.h: "시간 낭비일세!"
 agassiz.622.t: "지진"
 agassiz.622.d: "이른 아침 탐사대가 분화구 바로 근처에 있을 즈음, 지진이 일어나 낙석과 산사태가 발생했다. 이번 소규모 지진은 화산 활동이 과거에 생각했던 것보다 훨씬 더 활발하다는 것을 분명히 보여주고 있었다."
 agassiz.622.f: "\"또 한편으로 학식을 갖춘 지리학자는 시칠리아가 진동을 거쳐 이탈리아에서 분리되었다는 전승을 언급하며, 현재 연안 지대는 지진의 피해를 거의 입지 않는다고 지적한다. 이는 불과 점화 물질, 그리고 물이 빠져나갈 수 있는 구멍이 열린 탓이다. 그러나 과거 에트나산, 리파리 제도, 이스키아섬 등의 화산들이 닫혀 있을 적에는 그 속에 갇혀버린 불과 바람이 훨씬 더 격렬한 지진을 일으켰을 가능성이 존재한다. 따라서 화산이 안전 밸브의 역할을 하며, 지하의 진동은 화산 에너지가 새로운 지역으로 이동할 때 제일 격렬하다는 이론은 뒤떨어진 것이다.\" - 찰스 라이엘"
 agassiz.622.g: "이번에 탐사하는 것 자체가 과연 좋은 생각이었을까...?"
 agassiz.623.t: "도처에 널린 광물들"
 agassiz.623.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName](이)가 이끄는 탐사대가 [SCOPE.sState('agassiz_volcano_state').GetName]의 화산에 광물이 풍부하게 묻혀 있다는 사실을 알아냈다."
 agassiz.623.f: "광물은 지질학자에게 있어 최고의 친구다."
 agassiz.623.g: "광물이다!"
 agassiz.623.h: "무시하자."
 agassiz.624.t: "이국적인 표본"
 agassiz.624.d: "놀라운 일일지 모르겠으나 [SCOPE.sState('agassiz_volcano_state').GetName]에 파견된 화산 탐사대가 화산 바로 근처에 서식하는 독특한 동물군의 희귀 표본들을 실제로 발견하였다. 일부 표본은 국내 동물학자들의 큰 관심을 불러일으킬 만한 수준이다."
 agassiz.624.f: "\"험프리! 화산난쟁이앵무새의 알을 모아다 줘. 아침밥이 너무 부실해서 일요일에 먹던 계란 프라이가 아른거려.\""
 agassiz.624.g: "표본이다!"
 agassiz.625.t: "미지의 화석"
 agassiz.625.d: "[SCOPE.sState('agassiz_volcano_state').GetName]의 화산 탐사에 나선 [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName](이)가 희귀 화석 몇 점을 발견하여 고생물학계와 지질학계의 중대한 문제에 답을 구할 수 있게 되었다."
 agassiz.625.f: "\"에트나산 남쪽과 동쪽 기슭의 비옥 지대를 따라가다 보면, 지금의 용암 아래에 있던 점토질 모래와 화산성 응회암으로 이루어진 해양 지층이 드러난다. 이 지층에서 발견되는 해양 화석 껍질은 전부, 아니면 거의 모두가 지금 지중해에 서식하는 종과 일치한다. 이것들이 카타니아 지역 인근 해발 200~250m 높이에서 발견되는 것을 보면, 이 지역 뿐만 아니라 시칠리아 남쪽의 다른 지역들도 고대의 해저에서 융기했음을 분명히 뒷받침할 수 있다. 따라서 아주 최근에 형성된 부분을 제외한 산 전체가 이런 지각 변동에 휘말렸다고 추론하는 것이 타당하다.\" - 찰스 라이엘"
 agassiz.625.g: "화석이다!"
 agassiz.626.t: "지자기 데이터"
 agassiz.626.d: "오늘 아침 수도에서 전해진 전보 하나가 [SCOPE.sState('agassiz_volcano_state').GetName]에 있던 화산 탐사대 앞으로 전해졌다. 지자기장 관측소에서 화산 분화구의 측정 자료를 수집해 달라고 요청한 모양이다. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] 박사는 이 요청에 응했다."
 agassiz.626.f: "\"이 측정 자료가 지자기 연구소에 그렇게나 중요하다면, 직접 오셔서 자료를 수집하면 되지 않겠습니까?\""
 agassiz.626.g: "완벽해."
 agassiz.627.t: "지구상의 태양계 원소"
 agassiz.627.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName](은)는 이전에 별수롭지 않게 여겼던 암석들을 분석하는 과정에서 놀라운 사실을 발견하였다. 현장에서 분광 분석을 진행하면서, 이전에는 우주에만 존재하는 것으로 여겨졌던 헬륨이 화산암에 함유되어 있다는 것을 증명한 것이다."
 agassiz.627.f: "루이지 팔미에리는 이탈리아의 물리학자, 기상학자, 지진학자, 화산학자이다. 1845년 나폴리 대학교에서 파스콸레 갈루피가 맡던 논리학, 형이상학 강의를 이어받았다. 1847년 갈루피가 사망하자 그 교수직도 함께 물려받게 되었다. 팔미에리는 1860년 교수직을 사임하고 본인이 직접 지구물리학과를 개설하여 기상학 교수로 나서게 되었다. 이와 함께 국내 기상 관측소와 1842년 설립된 베수비오 천문대 교수직과 관리직도 겸임하여 사망할 때까지 재직하였다. 팔미에리는 전자기 지진기록계와 대기중 전압 측정계와 같은 측정 장비를 개량한 것으로 특히 유명하다. 1882년에는 베수비오 화산 용암의 분광 분석을 통해 지구상에서 헬륨을 최초로 발견하는 데 성공하였다."
 agassiz.627.g: "이렇게 된다면... 가능성이 무궁무진하겠는걸."
 agassiz.628.t: "휴식이 간절한 탐사대원들"
 agassiz.628.d: "일 년 넘게 이어진 화산 탐사로 대원들은 점차 휴식을 요구하고 있다. 탈진할 지경에 이른 대원들이 많은 탓이다. 무엇보다도 집으로 돌아가자는 목소리가 크다."
 agassiz.628.f: "\"두렵나? 솔직히 말해서 이런 지진 활동이야말로 우리가 이 화산에 오르는 이유가 아닌가! 자네는 학자인가 이탈자인가?\""
 agassiz.628.g: "바라는 만큼 충분히 휴식을 취하도록."
 agassiz.628.h: "잠깐의 휴식, 그 이상은 금물이다."
 agassiz.628.i: "이런 무능한 조수들 같으니, 빈둥거릴 게 아니라 계속 일하란 말이다!"
 agassiz.629.t: "지옥불"
 agassiz.629.d: "[SCOPE.sState('agassiz_volcano_state').GetName]에 있는 화산의 상태가 급격히 악화되고 있다. 산에서 갑자기 검은 연기가 뿜어져 나오고 용암류가 더욱 거세지는 모양이다. 탐사대는 이제 갈림길에 놓였다. 용암에 갇힐 위험을 무릅쓰고 조심스럽게 행동해야 하는가, 아니면 알 수 없는 위험을 감수하고 재빠르게 행동해야 하는가?"
 agassiz.629.f: "'불길이 마치 대포에서 뿜어져 나오는 포탄처럼 도시와 해안가를 휩쓸고 지나갔다. 불씨가 얼굴에 튀어 따끔거리는 고통을 안겼다. 하늘은 온통 불길로 가득 찼다. 우리는 무의식적으로 얼굴을 가리기 위해 손을 들었다. 해안가에 쓰러진 희생자들의 시신을 보니 똑같은 자세를 취하고 있다는 것을 알아차렸다.' - 피츠제임스 백작"
 agassiz.629.g: "조심스레 행동한다."
 agassiz.629.h: "위험을 감수한다."
 agassiz.630.t: "눈앞에 펼쳐진 지옥"
 agassiz.630.d: "[SCOPE.sState('agassiz_volcano_state').GetName] 화산에 지옥이 펼쳐진 것만 같다. 용암 분수가 솟구치고 타오르는 위력이 불길 속에서 격렬히 부딪힌다. 대부분의 탐사대원이라면 위협을 느낄 만한 풍경이지만, [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] 박사만큼은 그 황홀한 매력에서 헤어나올 수 없다."
 agassiz.630.f: "\"밤이 되자 불길은 더욱 아름다워졌다. 우리는 붉고 찬란한 불길의 시내와 폭포에 둘러싸여 있었고, 그 한가운데 솟아오른 시커먼 연기 기둥 사이로, 거대한 바위 덩어리들이 강렬한 열기에 하얗게 빛나며 떨어지면서 찬란한 수증기 자국을 남겼다.\" - 조지 고든 바이런"
 agassiz.630.g: "참으로 매혹적인 광경이야. 사진으로 찍어두는 것이 좋겠군!"
 agassiz.630.h: "무서워라."
 agassiz.630.i: "물러나라!"
 agassiz.631.t: "생각보다 활발한 화산"
 agassiz.631.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] 박사가 조사 중인 화산이 예상보다 훨씬 활발한 모양이다. 화산 폭발이 임박한 것으로 보인다. 그렇기에 탐사대가 위험에 처할 가능성도 높아졌다. 허나 더 큰 위험을 감수하는 동시에 과학적 발견이 선사하는 것이 있었으니, 그것은 바로..."
 agassiz.631.f: "\"사람들은 용암이 정말로 쏟아져 내리기 전까지 화산이 있는 줄도 모른다.\" - 조지 산타야나"
 agassiz.631.g: "더 많은 지식이다!"
 agassiz.631.h: "더 많은 경험이다!"
 agassiz.631.i: "더 많은 광물이다!"
 agassiz.632.t: "뉴스 보도"
 agassiz.632.d: "지역 내 유력 일간지인 〈#YELLOW 일간 [SCOPE.sState('manzoni_publisher_state').GetNameNoFormatting]#!〉에서 현재 진행되고 있는 화산 탐사에 대한 최신 소식을 독자들에게 전하고 있다. 과학 분야의 특종 기사가 이렇게 많은 사람들의 관심을 불러일으킬 줄은 몰랐을 것이다. 특히 학생과 청년층이 이번 모험 이야기에 매료되었다는 소식이다."
 agassiz.632.f: "\"최신호에서 읽어보시라. 분화구에 대담히 오른 [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastNameNoFormatting] 박사! 용감한 학자들이 용암과 유독 가스, 지옥 같은 열기에 맞서 싸운다. 고대인들이 저승의 입구라 믿었던 그곳에서, 인류는 또 하나의 경계로 들어선다. 본지의 기자들이 삽화와 함께 계속해서 동행하는 여정. 목요일은 일간지의 날!\""
 agassiz.632.g: "이것으로 신세대 학자들에게 귀감이 될 것이다."
 agassiz.633.t: "안전한 휴식처"
 agassiz.633.d: "유황 연기와 검은 연기, 용암류 사이에서 탐사대원들이 안전한 피난처를 찾아냈다."
 agassiz.633.f: "\"친애하는 동료 학자, 샤베르낙 교수님께!\n\n화산의 진공 상태에서 수원의 동적 발달 과정에 대한 통찰력 있는 분석에 감사드립니다. 허나 제 이의 제기는 추후 더 자세히 말씀드리려고 합니다. 제가 드리려는 말씀은, 저희가 이 화산에서 즐거운 시간을 보내고 있다는 터무니없는 소문을 교수님께서 대학 내에 퍼뜨렸다는 이야기를, 자우어스페크 박사님과의 서신 교환으로 접했다는 것입니다. 그런 추측은 그만두시기를 희망합니다. 제가 최근에 발견한 [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastNameNoFormatting] 온천의 최고 온도는 교수님께서 주장하신 35°C가 아니라 32°C에 불과합니다. 이정도면 얼음 낄 정도로 차갑지요. 그런 파렴치한 오해를 바로잡아 주시기를 부탁드립니다!\""
 agassiz.633.g: "한 숨 돌렸군!"
 agassiz_volcano_tourist_modifier: "화산 관광"
 agassiz_small_volcano_eruption_modifier: "소규모 화산 분화"
 agassiz_medium_volcano_eruption_modifier: "화산 분화"
 agassiz_big_volcano_eruption_modifier: "대규모 화산 분화"
 agassiz_medium_earthquake_modifier: "지진"
 agassiz_big_earthquake_modifier: "대지진"
 agassiz.711.t: "화산의 장관"
 agassiz.711.d: "[SCOPE.sState('agassiz_volcano_state').GetName] 지역 주민들은 지금 인상적인 장관을 눈에 담고 있다. 화산에서 솟아오른 용암 분수는 밤이 될수록 더욱 매혹적인 광경을 연출하고 있다. 관광객과 학자들도 구경꾼 틈에 섞였다."
 agassiz.711.f: "\"숭고한 화산들이여! 에트나의 불꽃\n꺼지지 않는 헤클라의 불꽃 앞에서 잃는 빛\n베수비오의 불꽃은 평소와 다른 장관에\n별다를 것 없는 눈높이에 방랑객들이 입을 벌리네.\"\n\n- 바이런 경"
 agassiz.711.g: "경이롭다!"
 agassiz.712.t: "소규모 화산 폭발"
 agassiz.712.d: "[SCOPE.sState('agassiz_volcano_state').GetName] 지역의 화산이 분화하였다. 일부 작은 마을이 파괴되고 들판이 용암에 잠겼지만, 피해는 그리 크지 않았다."
 agassiz.712.f: "\"그때 내가 무엇을 보았던가! 수천 개의 불길이 주변을 환하게 비추었다. 나무 꼭대기에서도 불길이 치솟았다. 쩍 하는 소리가 들리더니 바로 옆에 거대한 불길이 펼쳐졌다. 바다는 보이지 않았고 모든 것이 재로 뒤덮였다. 내 앞이 두 손이 보이지 않을 정도였다. 마지막으로 본 것은 마룻바닥 틈새로 화산재가 분수처럼 솟구쳐 오르는 모습이었다. 갑자기 엄청난 압력이 느껴지며 땅에 내던져졌다. 그러자 공기가 빨려 나가는 듯하면서 숨을 쉴 수 없었다.\" - 요한나 바이어링크"
 agassiz.712.f_basic: "\n\n#YELLOW 화산 관측소의 학자들 덕분에 우리는 이번 사태에 그다지 놀랄 겨를이 없었다. 이에 따라 예방 조치를 취하고 #G 다소간의 피해 감소 효과#!를 볼 수 있었다.#!"
 agassiz.712.f_advanced: "\n\n#YELLOW 화산 관측소의 우수한 학자들 덕분에 우리는 신속히 대피 조치에 나서고 보호 수단을 강구할 수 있었다. 그 덕에 #G 상당한 피해 감소 효과#!를 볼 수 있었다."
 agassiz.712.g: "용암 좀 흐르면 어떤가."
 agassiz.712.h: "천문대에서는 별 소식 없는가?"
 agassiz.712.i: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] 박사와 제자들에게 흥미로운 소식일지 모르겠군."
 agassiz.713.t: "화산 분화"
 agassiz.713.d: "격렬한 화산 폭발이 [SCOPE.sState('agassiz_volcano_state').GetName] 지역을 발칵 뒤집어 놓았다. 화산재와 분출물이 숱한 건물과 작물을 파괴하고 일부 주민들의 목숨을 앗아갔다."
 agassiz.713.f: "\"우리 머리 위로 섬 주변에서 마치 거대한 불길이 타닥거리는 소리나 중포가 발사되는 듯한 기괴한 소리가 1초~2초 간격으로 들려왔다. 다섯 시가 되자 굉음은 계속되었고 하늘은 어둠으로 뒤덮였다. 그리고 제법 큰 크기에 매우 뜨거운 부석들이 우리를 향해 우박처럼 쏟아졌다.\n\n그날 밤은 끊임없이 떨어지는 재 때문에 칠흑같이 어두웠고, 하늘과 섬 주변에서 끊임없이 치는 번개만이 그 어둠을 깰 뿐이었다.\" - 왓슨 대위"
 agassiz.713.g: "주민들이 불쌍하다."
 agassiz.713.j: "희생자들을 돕기 위해 최대한 많은 지원을 해 주도록!"
 agassiz.714.t: "초대형 화산 분화"
 agassiz.714.d: "전례 없는 규모의 대폭발이 [SCOPE.sState('agassiz_volcano_state').GetName] 지역에서 살아가던 수많은 사람의 삶을 철저하게 파괴했다. 수백 마일 떨어진 곳에서 폭발음이 들릴 정도였고, 안타깝게도 하필 그 시점에 산 주변에 있던 것들은 모조리 증발시켜 버렸다."
 agassiz.714.f: "\"여인들의 비명, 갓난아기들의 울음소리, 남자들의 외침이 들려왔다. 어떤 이들은 부모를, 어떤 이들은 자식이나 아내를 부르며 목소리로 서로를 알아보려 애썼다. 사람들은 본인이나 친척들의 운명을 한탄했고, 죽음의 공포에 질려 죽기를 기도하는 이들도 있었다. 많은 이들이 신의 도움을 청했지만, 그보다도 신은 더 이상 없으며 우주가 영원한 어둠에 잠겼다고 보는 사람들이 더 많았다.\" - 소(小) 플리니우스"
 agassiz.714.g: "비극이군!"
 agassiz.715.t: "연기와 굉음"
 agassiz.715.d: "[SCOPE.sState('agassiz_volcano_state').GetName]의 화산이 엄청난 굉음을 내고 있다. 분화구 위로 연기도 피어오르고 있다. 하지만 그게 전부다. 주민들은 안도했지만 관광객과 학자들은 실망을 금치 못했다."
 agassiz.715.f: "\"조사할 건 산더미인데 즐길 거리는 많지도 않군. 정말이지 고약하고 변덕스러운 화산일세!\""
 agassiz.715.g: "깨어난 건가, 아니면 잠든 건가?"
 agassiz.721.t: "지진파"
 agassiz.721.d: "오늘 [SCOPE.sState('agassiz_earthquake_state').GetName](은)는 약한 지진에 잠에서 깨어났다. 이번 지진으로 인한 피해는 경미했지만 지진학자들을 거슬리게 하기에는  충분했다."
 agassiz.721.f: "\"기자: 지금 계신 건물이 흔들리기 시작하고, 지진이 발생하고 있다는 것을 알게 된다면 어떻게 하실 겁니까?\n찰스 리히터: 제일 가까운 지진기록계로, 뛰진 않고 걸어가렵니다.\""
 agassiz.721.g: "흥미롭군."
 agassiz.722.t: "[SCOPE.sState('agassiz_earthquake_state').GetName] 지진"
 agassiz.722.d: "[SCOPE.sState('agassiz_earthquake_state').GetName] 지역에 지진이 강타하여 건물들이 파괴되고 다치거나 끝내 죽은 사람들이 많았다."
 agassiz.722.f: "\"낮은 으르렁 소리가 깊고 무섭게 깔리더니 머지않아 워싱턴 거리를 따라 다가오는 것을 보았다. 온 거리가 물결치듯 출렁거리는 것이 마치 바다의 파도가 거세게 밀려오는 것만 같았다.\" - 제시 쿡"
 agassiz.722.f_basic: "\n\n#YELLOW 숙련된 지진학자들 덕분에 [SCOPE.sState('agassiz_earthquake_state').GetName] 지역이 지진 다발 지역이라는 사실이 널리 알려져 있었다. 내진 설계 등의 예방 조치 덕에 별일 없이 피해를 최소화할 수 있었다.#!"
 agassiz.722.g: "비극이군!"
 agassiz.722.h: "천문대에서는 상황을 어떻게 보고 있는가?"
 agassiz.722.i: "지질학 연구를 실시하기에 더할 나위 없는 현장이 되겠군."
 agassiz.722.j: "희생자들을 돕기 위해 최대한 많은 지원을 해 주도록!"
 agassiz.723.t: "[SCOPE.sState('agassiz_earthquake_state').GetName] 대지진"
 agassiz.723.d: "전례 없는 규모의 지진이 일어나 [SCOPE.sState('agassiz_earthquake_state').GetName] 지역이 쑥대밭이 되고 말았다. 무수히 많은 건물이 무너지고 사망자 수는 집계조차 불가능할 지경이다."
 agassiz.723.f: "'샌프란시스코에 지진이 강타하여 수십만 달러 상당의 벽과 굴뚝을 무너뜨렸다. 그러나 뒤이어 발생한 화재는 수억 달러 상당의 재산을 태워버렸다. 실제 피해액은 수억 달러라 헤아리기도 어려운 수준이다. 역사상 근대 제국의 도시가 이처럼 완전히 파괴된 적은 없었다. 샌프란시스코는 사라졌다. 이제는 교외에 남은 주택 몇 채와 기억만이 있을 뿐. 산업 지구는 완전히 무너졌고, 상업 지구도, 사회와 주거 지구도 전부 사라졌다. 공장과 창고, 대형 백화점과 신문사, 호텔과 부유층의 저택도 모두 사라졌다. 한때 샌프란시스코였던 곳에는 교외에 남아 있는 주택 몇 채만이 남았을 뿐이다.' - 잭 런던"
 agassiz_volcano_expedition_progress_tt: "월간 탐사 진행도"
 agassiz_volcano_expedition_progress_bar_at_full_tt: "화산 탐사 진행바가 #variable 100%#!에 도달함"
 agassiz_volcano_danger_progress_bar_at_full_tt: "화산 위험도가 #variable 100%#!에 도달함"
 agassiz_volcano_expedition_progress_bar: "화산 탐사"
 agassiz_volcano_expedition_progress_bar_desc: "탐사 진행도: #v [JournalEntry.GetCurrentBarProgress(ScriptedProgressBar.Self)|%]#! ([JournalEntry.GetCurrentBarValue(ScriptedProgressBar.Self)|1]/18)"
