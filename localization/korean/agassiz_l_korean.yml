 agassiz.901.tt: "[SCOPE.sCharacter('agassiz_geologist_scope').GetFullName](이)가 신비로운 책을 조심스레 살펴봅니다. 이것으로 예상치 못한 결과를 초래할 수도 있습니다."
 agassiz.917.tt: "[GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetFullName](와)과 모든 탐사대원이 어둠과 절망 속에서 죽어갑니다!"
 agassiz.909.tt: "지구 속 여행은 더 이상 진행할 수 없게 됩니다."
 agassiz.915.tt: "탐사대원 중 일부가 목숨을 잃을 수 있습니다."
 agassiz_lidenbrock_diary_modifier: "오토 리덴브로크의 일기"
 agassiz_journey_coe_preparation_modifier: "지구 속 여행 준비"
 agassiz_tragic_subterranean_accident_modifier: "비극적인 지하 사고"
 je_agassiz_journey_coe: "지구 속 여행"
 je_agassiz_journey_coe_reason: "[GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetLastName] 박사는 독일 지질학자 오토 리덴브로크가 남긴 수수께끼 같은 기록을 발견하였다. 거기에는 지하 동굴로 들어가는 길이 적혀 있었다. 이 동굴은 이미 16세기 아이슬란드 연금술사 아르네 사크누셈이 발을 들였던 곳이다. 책에서는 동굴 입구가 아이슬란드의 어느 화산에 있다고 한다."
 je_agassiz_journey_coe_fail: "[GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetLastName] 박사가 사망하거나 은퇴하면 탐사를 더 이상 진행할 수 없음"
 agassiz.901.t: "리덴브로크 교수의 일기"
 agassiz.901.d: "화산 탐사 도중에 [GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetLastName] 박사가 이상한 것을 발견하였는데, 여정에서 돌아온 뒤에야 비로소 그것을 소상히 설명할 수 있었다."
 agassiz.901.f: "[GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetFullName](은)는 지금의 화산 탐사에 무언가가 드리워지고 있는 것을 체감했다. 이 지역의 사화산에 속했던 것으로 추정되는 동굴에서 버려진 지질관측소를 발견한 것이다. 허나 현지 당국에 문의한 결과, 어떤 탐사대가 이곳에서 탐사에 나섰는지에 관한 정보는 파악할 수 없었다. 화산 분화구를 자세히 조사한 [GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetLastName] 박사는 개인 소지품이 담긴 상자와 자루들을 발견하였는데, 그 중에는 어느 학자의 가방도 있었다. 그 속에는 일기가 있었는데 오토 린덴브로크 교수라는 사람의 것이었다. 린덴브로크 교수는 함부르크 출신의 지질학자이자 광물학자로, 화산 활동과 지하 동굴 체계를 전공으로 연구하였다. 해당 분야에서 제일 우수한 학자로 여겨졌지만, 동시에 호전적이고 다혈질적인 성격으로 평판이 나빴다. 대학에서 논란을 일으킨 그는 마지막 여행에서 흔적도 없이 사라졌다. 교수의 일기는 생애 마지막 행적을 알 수 있는 최후의 단서일지도 모르는 데다, 광물학과 지질학 연구 자료도 풍부하게 담고 있어 학계에 헤아릴 수 없는 가치를 안길 것이었다. 그러나 [GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetLastName] 박사는 인근 대학에 해당 일기를 곧바로 보내지 않고 좀 더 자세히 살펴보고 싶어했다. 탐사대장은 리덴브로크의 일기가 단순 암석층 목록 이상의 훨씬 더 중요한 무언가를 밝혀낼 수 있는 단서를 전할 수 있다고 목소리를 높였다."
 agassiz.901.g: "모두에게 이득이 될 발견이로군."
 agassiz.901.h: "[GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetLastName] 박사가 잘 간칙해서 연구하는 것이 좋겠소."
 agassiz.902.t: "오토 리덴브로크 교수의 비밀"
 agassiz.902.d: "화산 탐사 도중에 발견한 책이 우리 지질학자에게 안 좋은 영향을 끼치고 말았다."
 agassiz.902.f: "[SCOPE.sCharacter('agassiz_journey_coe_leader').GetFullName] 대장은 그리스에서 돌아온 이후에도 화산 동굴에서 발견한 수수께끼 같은 일기에만 몰두하며 시간을 보내고 있다. 그 대가로 정계와 학계의 의무를 소홀히 하였던 것이다. 직원들은 연구실이 몇 주 동안 밤늦게까지 불이 켜져 있다고 전했다. 이상하게도 이 사람은 최근에 스칸디나비아 지역의 서적들을 주로 전해받고 있다고 한다. 또 너무나도 어려운 문제를 풀어낼 때까지 조카와 요리사를 집안에 가둘 요량이라고 한다. 책을 더 깊이 파고들수록 지질학자도 점점 더 광기에 물든다. 온 정황으로 볼 때, 점차 정신병으로 빠져드는 모양이다."
 agassiz.902.g: "걱정되는군."
 agassiz.903.t: "지구 속 여행"
 agassiz.903.d: "리덴브로크 교수의 일기를 오랜 기간 조사한 끝에 [SCOPE.sCharacter('agassiz_journey_coe_leader').GetFullName](은)는 결정적인 단서를 찾아냈다."
 agassiz.903.f: "[SCOPE.sCharacter('agassiz_journey_coe_leader').GetSheHe|U]는 혼자 있기를 자처했다. 리덴브로크 교수의 일기와 시간을 보내려 외부 세계와 단절된 채 말이다. 나중에 우리에게 설명해 준 바, 몇 개월 동안 [SCOPE.sCharacter('agassiz_journey_coe_leader').GetSheHe]를 사로잡았던 대목이 하나 있었다. 일기장 사이에는 개인적인 메모 뿐만 아니라 훨씬 오래된 필사본 한 장이 끼어 있었던 것이다. 그 필사본의 저자는 16세기 아이슬란드의 연금술사 아르네 사크누셈이었다. 사크누셈은 룬 문자로 수수께끼 같은 글을 남겼는데, 그것을 해독하는 것은 처음에 생각했던 것보다 훨씬 더 어려웠다. 그러다 마치 직감처럼 수수께끼를 풀고야 말았다. 그리고 자신의 생각이 옳다는 것을 밝혀냈다. 그 책에 비밀이 숨겨져 있엇던 것이다. 너무나 거대하고 저릿한 수수께끼가 [SCOPE.sCharacter('agassiz_journey_coe_leader').GetSheHe]의 마음을 뒤흔들었다. 연금술사가 전한 말은 이러했다.\n\n\"용감한 여행자여, 7월 초하루 직전에 스카르타스의 그림자가 어루만지는 스나이펠스외쿨 분화구로 내려가라. 그러면 지구의 중심에 도달할지니. 그것을 나는 해냈다.\"\n\n[SCOPE.sCharacter('agassiz_journey_coe_leader').GetFullName](을)를 더욱 흥분에 빠드린 것은 리덴브로크 교수가 자신의 필체로 새로운 룬 문자를 적어내려갔다는 점이다. 그것은 다름아닌 \"나 역시도 그렇다\"란 문구였다. 지질학자로서 이런 놀라운 주장에 과학적 검증이 필요하다는 생각이 스쳤다. 그래서 [SCOPE.sCharacter('agassiz_journey_coe_leader').GetSheHe|U]는 아이슬란드 여행을 지원해 달라고 요청하였다... 지구의 중심부로 직접 들어가 보기 위해 말이다!"
 agassiz.903.g: "아무래도 돌아버린 게 분명해!"
 agassiz.903.h: "박사라면 뭔가 알고 있겠지. 지원해 줍시다!"
 agassiz.909.t: "[SCOPE.sCharacter('agassiz_journey_coe_leader').GetFullName]의 불행한 최후"
 agassiz.909.d: "[SCOPE.sCharacter('agassiz_journey_coe_leader').GetFullName]의 생활 형편에  좋지 못한 변화가 이루어지면서 지구 중심으로 향하려던 계획을 중단할 수밖에 없게 되었다. "
 agassiz.909.f: ""
 agassiz.909.g: "유감스럽군."
 agassiz.911.t: "아이슬란드"
 agassiz.911.d: "[SCOPE.sCharacter('agassiz_journey_coe_leader').GetFullName](이)가 이끄는 지구 중심으로 향하는 탐사대가 레이캬비크 항구에 도착하였다."
 agassiz.911.f: "레이캬비크에서 길을 잃기란 쉽지 않은 일이리라. 때문에 나는, 방향을 물을 필요가 없었다. 의사소통을 위해 할 줄 아는 것이 몸짓뿐이라면, 도움을 청해보았자 오히려 실수로 이어지기도 했고. 마을은 두 언덕 사이의 낮고 늪이 많은 지대에 자리 잡고 있었는데, 엄청난 규모의 용암 대지가 마을 한쪽을 가득 채우다 바다로 완만하게 경사를 이루고 있었다. 대지의 반대편에는 광활한 팍사 만이 펼쳐져 있는데, 만의 북쪽은 거대한 스나이페틀 빙하로 막혀 있었다. 여기에는 발키리아 호만이 있다. 평소라면 영국과 프랑스 어업 관리관이 이 만에 정박했겠지만, 그때는 섬의 서쪽 해안을 순찰하고 있었다고 했다. 레이캬비크의 둘 뿐인 거리 중, 더 긴 거리는 해변과 평행을 이루고 있었다. 이내 나는 이 음울한 길을 탐사하기로 했다. 스윽 훑어봐도 여기저기 빛바랜 잔디는 흡사 낡아빠진 깔개 같았다. 아니면 작은 텃밭이 있었다. 뜯어먹을 채소도 별로 없는데 소인국의 식탁에나 어울리지 않을지. 안색이 어두워 보이는데 말도 거의 없는 이들은 공기와 햇살을 즐기려 하는 듯했다. 세 시간 동안 나는 마을뿐 아니라 그 주변 지역까지 모두 둘러보았는데, 전반적으로 풍경은 놀라우리만큼 황량했다. 나무도 없고, 풀도 거의 자라지 않았다. 사방에는 화산 활동의 흔적을 나타내는 바위만이 보였다."
 agassiz.911.g: "지금부터 시작이군."
 agassiz.912.t: "스나이펠스외쿨"
 agassiz.912.d: "탐사대가 아이슬란드 화산 분화구에 접근하여 지하로 내려가기를 앞두고 있다."
 agassiz.912.f: "저녁을 순식간에 먹어치운 일행은 최대한 몸을 웅크려 잠을 청했다. 누운 바닥은 딱딱했고 거처는 허름했으며 해발 1500m라는 고도는 위태로웠다. 다음 날 아침 우리는 매서운 공기에 반쯤 얼어붙은 채 눈부신 햇살을 맞으며 잠에서 깼다. 나는 화강암 바닥에서 일어나 눈앞에 펼쳐진 장엄한 광경을 눈에 담으러 나섰다. 고개를 들자 바로 위에 운뿔형 꼭대기 구멍이 보였고, 그 구멍 안에는 둘레가 아주 작지만 거의 원형으로 된 하늘 조각이 담겨 있었다. 그 가장자리에는 사리스 산의 눈 덮인 봉우리가 끝없이 펼쳐진 우주 공간을 바탕으로 뚜렷이 솟아 있었다. 나는 곧 뛰어들게 될 무한한 구덩이를 내려다볼 용기를 아직 내지 못했다. 마침내 때는 왔다. 상술했듯 그 구덩이는 지름이 30m, 둘레가 90m였다. 나는 튀어나온 바위에 몸을 숙여 아래를 내려다보았다. 공포에 머리카락이 곤두섰다. 어쩔 줄 모르겠는 공허함이 나를 덮친 것이다. 술에라도 취한 듯 무게중심이 이동하는 것을 느끼며 어지러움이 머릿속으로 밀려들어왔다."
 agassiz.912.g: "이게 과연 좋은 생각이었을까?"
 agassiz.913.t: "식수를 찾아서"
 agassiz.913.d: "화산 속으로 들어간 이후 식수가 동이 나고 말았다. 온 여정이 불과 며칠 만에 심각한 위기에 처하게 된 것이다."
 agassiz.913.f: "광물학자들이 이처럼 놀라운 기회를 통해 자연 그대로를 현장에서 연구할 수 있었던 적은 없다. 감각도 없고 움직임도 없는 건조한 시추 장비로는 지구 내부 구조의 표면으로 끌어올릴 수 없었을 것을, 우리는 직접 두 눈으로 보고 손으로 만져볼 수 있었다. 은은한 초록빛을 띈 편암층 사이로 구리와 망간 광맥이 구불구불 흐르고 있었고, 백금과 금의 흔적도 그 속에 섞여 있었다. 나는 생각했다. 인간의 탐욕스런 눈길로부터 영영 감추어진 이 땅속 깊은 곳에 얼마나 많은 보물이 묻혀 있을까! 여섯 시쯤 되자 이 눈부신 빛의 향연은 확실히 사그라들더니 거의 자취를 감추었다. 예상대로 첫날 되돌아 가는 길부터 식수가 완전히 바닥나 버렸다. 이제 우리가 가진 유일한 식량은 진 뿐이었다. 지독한 액체가 목을 태우는 듯했고 나는 쳐다보는 것조차 견딜 수가 없었다. 숨막힐 듯한 더위와 대기에 짓눌렸다. 극심한 피로가 사지를 마비시켰다. 나는 몇 번이고 꼼짝도 않고 주저앉았다. 그때마다 삼촌과 아이슬란드인이 걸음을 멈추고 나를 일으켜 세우려 애썼다. 허나 삼촌도 극심한 피로와 갈증에 몸부림치며 괴로워하는 것을 보았다. 우리는 반쯤 죽은 몸으로 손과 무릎으로 기어 두 갈래 길이 만나는 지점에 도착했다. 나는 마치 생명 없는 덩어리처럼 용암 지대에 쓰러졌다."
 agassiz.913.g: "지하에 너무 깊이 들어와 있으니 밑에서 식수를 구해야겠지."
 agassiz.913.h: "지상으로 돌아가 식수를 찾아보자."
 agassiz.914.t: "지중해"
 agassiz.914.d: "동굴 곳곳을 따라 흐르는 물줄기를 따라간 조사단이 광활한 지하 바다를 만났다."
 agassiz.914.f: "마치 기적처럼 우리는 마실 물을 발견했다. 급류가 차가운 물을 땅속 깊은 곳까지 흘려보내 식수를 보충해 주었던 것이다. 그런데 그 물줄기를 따라 끝에 다다르자 더욱 놀라운 광경이 우릴 기다리고 있었다. 처음에는 거의 아무것도 보이질 않았다. 빛에 익숙찮아 눈이 절로 감겼다. 다시 눈을 뜰 수 있게 되자 나는 놀라움보다 더 큰 충격에 굳어버렸다. 꼭 호수나 바다의 시작처럼 보이는 광할한 수면이 시야를 훨씬 넘어 펼쳐져 있었던 것이다. 그것은 크세노폰의 시에 나오는 만여 명의 그리스인들이 기나긴 후퇴 끝에 '탈라타! 탈라타!' (바다다! 바다야!)라 외쳤던 그 드넓은 바다가 머릿속을 강렬하게 스쳐 지나갔다. 깊게 파인 해안에는 곱고 윤기 나는 모래가 넓게 펼쳐져 있었으며, 파도는 부드럽게 밀려들고 최초의 생명체가 살던 조그만 조개껍질들이 흩어져 있었다. 파도는 해안가에 부딪히며 광활한 공간 특유의 텅 빈 메아리를 자아냈다. 그곳은 지구의 불규칙한 해안선처럼 바다임이 틀림없으나 사막처럼 황량하고 험준한 모습이었다. 좁은 통로에 47일 동안 갇혀 지낸 뒤, 짠 소금기가 섞인 습한 공기를 마시는 것이 육체적으로 더할 나위 없이 즐거운 일이었을 것이라는 점은 쉽게 짐작할 터다."
 agassiz.914.g: "뗏목을 만들자."
 agassiz.915.t: "거인"
 agassiz.915.d: "신비롭고 원시적인 거대 버섯에 룬 문자가 새겨져 있어 아르네 사크누셈이 이곳에 머물렀음을 보여주는 듯했다. 허나 이 주장을 뒷받침할 증거를 찾으려면 거대하고 기괴한 선사시대 인류를 마주해야 한다."
 agassiz.915.f: "The diffused light revealed the smallest object in the dense and distant thickets. I had thought I saw - no! I did see, with my own eyes, vast colossal forms moving. They were gigantic animals; it was a herd of mastodons - not fossil remains, but living and resembling those the bones of which were found in the marshes of Ohio in 1801. I saw those huge elephants whose long, flexible trunks were grouting and turning up the soil under the trees like a legion of serpents. I could hear the crashing noise of their long ivory tusks boring into the old decaying trunks. I looked, shaking my head incredulously. But though at first I was unbelieving I had to yield to the evidence of my senses. In fact, at a distance of a quarter of a mile, leaning against the trunk of a gigantic kauri, stood a human being, the Proteus of those subterranean regions, a new son of Neptune, watching this countless herd of mastodons. Yes, truly, huger still himself. It was no longer a fossil being like him whose dried remains we had easily lifted up in the field of bones; it was a giant, able to control those monsters. In stature he was at least twelve feet high. His head, huge and unshapely as a buffalo's, was half hidden in the thick and tangled growth of his unkempt hair. It most resembled the mane of the primitive elephant. In his hand he wielded with ease an enormous bough, a staff worthy of this shepherd of the geologic period."
 agassiz.915.g: "위험을 감수해야 해."
 agassiz.915.h: "이건 너무 위험하다. 지상으로 올라가세, 어서!"
 agassiz.916.t: "아르네 사크누셈의 필사본"
 agassiz.916.d: "거대한 인간 괴물에게서 탈출한 조사단은 곳곳에 아르네 사크누셈의 이니셜이 새겨진 회랑을 발견하였다. 한참을 수색한 끝에 이들은 그 아이슬란드 연금술사가 실제로 이곳에 머물렀다는 증거를 찾아냈다. 땅 속 깊은 곳에서 전설 속의 연금술 필사본이 발견된 것이다!"
 agassiz.916.f: "In another quarter of an hour our nimble heels had carried us beyond the reach of this horrible monster. And yet, now that I can reflect quietly, now that my spirit has grown calm again, now that months have slipped by since this strange and supernatural meeting, what am I to think? what am I to believe? I must conclude that it was impossible that our senses had been deceived, that our eyes did not see what we supposed they saw. No human being lives in this subterranean world; no generation of men dwells in those inferior caverns of the globe, unknown to and unconnected with the inhabitants of its surface. It is absurd to believe it! I had rather admit that it may have been some animal whose structure resembled the human, some ape or baboon of the early geological ages, some protopitheca, or some mesopitheca, some early or middle ape like that discovered by Mr. Lartet in the bone cave of Sansau. But this creature surpassed in stature all the measurements known in modern palæontology. But that a man, a living man, and therefore whole generations doubtless besides, should be buried there in the bowels of the earth, is impossible. However, we had left behind us the luminous forest, dumb with astonishment, overwhelmed and struck down with a terror which amounted to stupefaction. We kept running on for fear the horrible monster might be on our track. It was a flight, a fall, like that fearful pulling and dragging which is peculiar to nightmare. And, wonderfully interested, we peered all along the high wall, peeping into every fissure which might open out into a gallery. There, upon a granite slab, appeared two mysterious graven letters, half eaten away by time. They were the initials of the bold and daring traveller: 'A. S.,' shouted my uncle. 'Arne Saknussemm! Arne Saknussemm everywhere!'"
 agassiz.916.g: "드디어 찾아냈군, 우리 것이야!"
 agassiz.917.t: "바스라진 지구 속 여행"
 agassiz.917.d: "지구 속 여행은 실패로 끝났다. 탐사대원 전원이 식수 부족으로 갈증에 시달려 사망한 것으로 추정되고 있다."
 agassiz.917.f: "It was eight in the evening. No signs of water had yet appeared. I was suffering horribly. My uncle strode on. He refused to stop. He was listening anxiously for the murmur of distant springs. But, no, there was dead silence. And now my limbs were failing beneath me. I resisted pain and torture, that I might not stop my uncle, which would have driven him to despair, for the day was drawing near to its end, and it was his last. At last I failed utterly; I uttered a cry and fell. 'Come to me, I am dying.' My uncle retraced his steps. He gazed upon me with his arms crossed; then these muttered words passed his lips: 'It's all over!' The last thing I saw was a fearful gesture of rage, and my eyes closed."
 agassiz.917.g: "어떻게 이런 비극이!"
 agassiz.918.t: "스트롬볼리"
 agassiz.918.d: "지구 중심으로의 여행은 대성공을 거두었다. 우리 학자들이 스토롬볼리 화산의 분화를 기회로 무사히 돌아와 영웅으로 등극한 것이다!"
 agassiz.918.f: "I have a confused impression left of continuous explosions, loud detonations, a general shaking of the rocks all around us, and of a spinning movement with which our raft was once whirled helplessly round. It rocked upon the lava torrent, amidst a dense fall of ashes. Snorting flames darted their fiery tongues at us. There were wild, fierce puffs of stormy wind from below, resembling the blasts of vast iron furnaces blowing all at one time; and I caught a glimpse of the figure of Hans lighted up by the fire; and all the feeling I had left was just what I imagine must be the feeling of an unhappy criminal doomed to be blown away alive from the mouth of a cannon, just before the trigger is pulled, and the flying limbs and rags of flesh and skin fill the quivering air and spatter the blood-stained ground. \n\n When I opened my eyes again I felt myself grasped by the belt with the strong hand of our guide. I found myself lying on the sloping side of a mountain only two yards from a gaping gulf, which would have swallowed me up had I leaned at all that way. Above our heads, at a height of five hundred feet or more, we saw the crater of a volcano, through which, at intervals of fifteen minutes or so, there issued with loud explosions lofty columns of fire, mingled with pumice stones, ashes, and flowing lava. I could feel the heaving of the mountain, which seemed to breathe like a huge whale, and puff out fire and wind from its vast blowholes. Beneath, down a pretty steep declivity, ran streams of lava for eight or nine hundred feet, giving the mountain a height of about 1,300 or 1,400 feet. But the base of the mountain was hidden in a perfect bower of rich verdure, amongst which I was able to distinguish the olive, the fig, and vines, covered with their luscious purple bunches."
 agassiz.918.g: "이게 바로 모험이지!"
 agassiz.919.t: "거인에게 잡아먹히다"
 agassiz.919.d: "지구 속으로 향하는 여행은 실패로 돌아가고 말았다. 탐사대 전원이 산 채로 거인에게 잡아먹힌 것으로 추정되고 있다."
 agassiz.919.f: "그렇게 짐작할 수밖에 없군."
