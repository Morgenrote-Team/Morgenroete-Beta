 mobilization_option_advanced_defence_3: "신형 진지 3단계"
 mobilization_option_advanced_defence_3_desc: "장병들을 부상 위험에서 보호하는 것은 전쟁에서 극히 중요한 일입니다. 우리 [concept_tesla_military_engineer]가 개발한 최신형 진지로 장병들을 위험으로부터 보호해 줍니다.\n#V 주의:#!본 동원 옵션은 공학자가 신형 진지를 개발했을 때에만 활성화됩니다."
 gaudi_advanced_defence_tier_3_trigger_tt: "[concept_tesla_military_engineer]가 3단계 진지 기술을 개발하고, 상위 단계의 신형 진지를 보유하지 않고 있음"
 je_gaudi_electrical_research_project: "전기 공학 연구"
 pmg_gaudi_magnetic_observatory: "지자기장 관측소"
 pm_gaudi_no_magnetic_observatory: "지자기장 관측소 없음"
 pm_gaudi_magnetic_observatory: "지자기장 관측소"
 je_gaudi_magnetic_observation: "지자기장 관측"
 je_gaudi_magnetic_observation_reason: "카를 프리드리히 가우스는 1832년 괴팅겐에 최초의 지구물리학 관측소를 설립하고 정밀 자기계측기를 구축하였다. 가우스는 자기장 변동의 원인을 파악하고 정자기장을 정확히 측정하기 위해서는 지구상 곳곳에 분산되어 동시에 측정을 실시해야 한다는 사실을 깨달았다. 이러한 목적을 안고 1836년 출범한 지자기 학회와 영국 왕립학회는 측정 데이터를 전달하여 분석할 수 있도록 하였다. 전세계 각지에 분산된 여러 관측소를 이용하여 지자기장의 변동을 동시에 측정하는 것이 그 목표였다.  이 사업에는 유럽 관측소 35곳, 아시아 6곳, 아프리카 2곳, 북미 3곳, 오세아니아 4곳을 비롯하여 총 50곳의 관측소가 참여하였다. 측정 결과는 괴팅겐으로 전송되어 가우스와 빌헬름 베버가 과학적으로 분석하게 되었다."
 je_gaudi_magnetic_observation_goal: "@gaudi_magnetic_data!#O 자기 데이터#! #G 100개#! 수집. 이것은 국제적인 공조로 지자기 학회의 모든 참여국이 기여하게 됩니다."
 tesla_set_magnetic_association_tt: "지자기 학회 창설. 다른 국가도 참여하여 #O 지자기장 관측소#!를 설립해 @gaudi_magnetic_data!#O 자기 데이터#!를 수집할 수 있습니다. 이 데이터는 괴팅겐으로 보내집니다."
 tesla_add_magnetic_association_member_tt: "지자기 학회 가입. 참여국은 @gaudi_magnetic_data!#O 자기 데이터#!를 괴팅겐으로 보내 과학적 결과에 따라 이익을 보게 됩니다."
 tesla_add_x_magnetic_data_minus_x_tt: "@gaudi_magnetic_data!#O 자기 데이터#! [SCOPE.GetValue('magnetic_data_amount')|0+] 상실"
 tesla_add_x_magnetic_data_minus_1_tt: "@gaudi_magnetic_data!#O 자기 데이터#! [SCOPE.GetValue('magnetic_data_amount')|0+] 상실"
 tesla_add_x_magnetic_data_0_tt: "@gaudi_magnetic_data!#O 자기 데이터#! 0 획득"
 tesla_add_x_magnetic_data_plus_1_tt: "@gaudi_magnetic_data!#O 자기 데이터#! [SCOPE.GetValue('magnetic_data_amount')|0+] 획득"
 tesla_add_x_magnetic_data_plus_x_tt: "@gaudi_magnetic_data!#O 자기 데이터#! [SCOPE.GetValue('magnetic_data_amount')|0+] 획득"
 gaudi_geomagnetical_knowledge_modifier: "지자기학 지식"
 gaudi.1401.t: "지자기 학회의 신규 회원"
 gaudi.1401.d: "[GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetFullName](이)가 오늘 괴팅겐의 지자기 학회에 가입하였다. 다른 회원들은 그를 따뜻하게 맞이해 주었다."
 gaudi.1401.f: "이번 가입으로 [GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetLastName] 박사는 지자기 관측소를 마련하여 운영할 필수적인 지식들을 습득할 수 있게 되었다. 학회장은 우리 공학자에게 관측소와 자력측정기의 설계도를 제공해 주었다. 관측소 착공을 조속히 개시하고, 최초의 관측 자료를 괴팅겐으로 보낼 수 있도록 학회 전원이 지원한다는 방침이다."
 gaudi.1401.g: "지금 즉시 관측소를 지어야겠소."
 gaudi.1402.t: "지자기장 관측소 완공"
 gaudi.1402.d: "지자기장 관측소의 건설이 오늘 마무리되었다. 지난 몇 달 간 축적된 수많은 데이터는 괴팅겐으로 보내질 것이다."
 gaudi.1402.f: "측정 자료는 지자기장의 과학적 연구를 수행할 뿐만 아니라 실용적 측면도 갖추고 있다. 자기편차도는 예로부터 사용되어 오늘날 선박 항해와 항공 운항에도 여전히 활용되고 있다. 또한 광석이나 석유 매장지와 같은 원자재 탐사에도 지자기 측정 자료는 필수적이다."
 gaudi.1402.g: "지자기학을 위하여!"
 gaudi.1403.t: "지자기 측정 자료의 국제적인 수집 결과"
 gaudi.1403.d: "수년 동안 전세계의 지자기 측정 자료를 수집하고 비교한 결과, 괴팅겐의 연구원들은 흥미로운 결과를 도출할 수 있었다."
 gaudi.1403.f: "1839년 가우스는 지구의 자기장이 지구 내부에서 온 것이 대다수이며, 작고 단기적인 변화는 외부에서 비롯된다는 사실을 밝혀냈다. 가우스는 베버와 함께  〈자기 협회의 관측 결과〉라는 제목에 총 6권 분량으로 연구 결과를 출간하였다. 별권에 실린 지도에는 당시 지구상의 모든 위치에서 수집된 자기 측정 자료를 보여주고 있다. 이 지도에는 동일한 편각, 동일한 경사, 동일한 자기장 세기를 나타내는 지점들이 선으로 연결되어 있다. 이 출판물은 자연과학 발전사에 있아 하나의 이정표가 되었다."
 gaudi.1403.g: "인상적인 성과로군."
 gaudi.1404.t: "해양에 흥미를 느끼다"
 gaudi.1404.d: "[SCOPE.sCharacter('gaudi_admiral_scope').GetFullName] 측에서 [GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetFullName]의 지자기장 연구에 큰 관심을 표했다. 현재 건설 중인 지자기장 관측소에서 실험에 나서 성공을 거두었다고 한다."
 gaudi.1404.f: "\"개구리 다리 가지고 나는 도대체 뭘 하고 있는 거지? 아, 그건 아무것도 아니었구나, 정말 아무것도 아니었어...\""
 gaudi.1404.g: "새로운 지식은 본인에게 도움이 될 것이다."
 gaudi.1404.h: "이 지식은 모두에게 이익이 되어야 한다."
 gaudi.1405.t: "변칙"
 gaudi.1405.d: "측정을 다시 진행했음에도 [GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetLastName] 박사가 기록한 지구의 자기장 수치는 예상했던 것과 거의 일치하지 않았다. 박사는 그 이유를 아직 밝혀내지 못하고 있다."
 gaudi.1405.f: "특정 장소의 지자기장이 다른 지역과 유독 다른 이유는 다양할 수 있다. 이러한 현상은 해당 지역에 대규모 금속 매장지가 있을 가능성을 시사하는 경우가 많았다. 이것이 바로 지자기 연구가 광업계의 관심을 끌지 않을 수 없었던 이유다."
 gaudi.1405.g: "그 자료를 괴팅겐에 보냅시다."
 gaudi.1406.t: "지자기장 관측소에 자문을 구하는 천문학자"
 gaudi.1406.d: "[GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetFullName] 박사와 [GetPlayer.MakeScope.GetVariable('verrier_astronomer_var').GetCharacter.GetFullName] 박사가 새로 들어선 지자기 관측소를 둘러보던 중에 열띤 대화를 펼쳤다. 두 사람의 교류는 [GetPlayer.MakeScope.GetVariable('verrier_astronomer_var').GetCharacter.GetLastName]의 과학적 지식을 대폭 확대하는 계기가 되었다."
 gaudi.1406.f: "\"잼을 바른 빵이 항상 잼을 바른 면 쪽으로 바닥에 떨어지는 이유가 바로 그것 때문이었군!\""
 gaudi.1406.g: "이것으로 그분의 실용적인 연구에 보탬이 되겠지."
 gaudi.1406.h: "이것으로 그분의 이론적인 연구에 보탬이 되겠지."
 pmg_gaudi_communication: "통신 시설"
 pm_gaudi_no_communication: "통신 없음"
 pm_gaudi_telegraph_office: "전신국"
 gaudi_building_telegraph_network_modifier: "전신으로 연결된 전국"
 gaudi_telegraphy_network_modifier: "국립 전신망"
 gaudi_mocked_by_telegram_modifier: "Mocked by Telegram"
 je_gaudi_telegraphy_network: "Build a Telegraphic Network"
 je_gaudi_telegraphy_network_reason: "In principle, a Telegraph Office can only be built where there is already a railway line, as the telegraph poles run along the route and are of considerable importance in coordinating the train system. It takes around a year to open a new office, with an [concept_tesla_engineer] speeding up the process. Completion is even faster if it is an [concept_tesla_electrical_engineer]. The invention of electromagnetism also has a positive effect on work progress. The invention of electromagnetism is also needed to set up Telegraphy Offices in overseas countries or other exclaves. Otherwise, a Telegraph Office can only be built in a state that borders another Telegraph Office."
 gaudi.1411.t: "A National Telegraphy Network"
 gaudi.1411.d: "Dr. [GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetFullName] today presented plans for a new telegraph line to connect [GetPlayer.GetName]. This will bring people closer together than ever before."
 gaudi.1411.f: "Samuel Morse developed and patented a recording electric telegraph in 1837. Morse's assistant Alfred Vail developed an instrument that was called the register for recording the received messages. It embossed dots and dashes on a moving paper tape by a stylus which was operated by an electromagnet. Morse and Vail developed the Morse code signalling alphabet. The first telegram in the United States was sent by Morse on 11 January 1838, across two miles (3 km) of wire at Speedwell Ironworks near Morristown, New Jersey, although it was only later, in 1844, that he sent the message \"WHAT HATH GOD WROUGHT\" over the 44 miles (71 km) from the Capitol in Washington to the old Mt. Clare Depot in Baltimore."
 gaudi.1411.g: "..-. .. -. ."
 gaudi.1412.t: "Telegraphy Network stopped"
 gaudi.1412.d: "The government has ordered an immediate halt to the expansion of telegraph lines."
 gaudi.1412.f: "The following order was issued today, which is why all work will be suspended from now on:\n\n-.-. --- -. ... - .-. ..- -.-. - .. --- -. / ... - --- .--. --..-- / -. --- .-- -.-.--"
 gaudi.1412.g: "We're finishing construction for now."
 gaudi.1413.t: "Telegraphy Network finished"
 gaudi.1413.d: "Today the last telegraph pole was ceremoniously erected in a previously inaccessible area. Every place in our country is connected to the national telegraph network, and messages are sent from one end of the country to the other."
 gaudi.1413.f: "Covering the entire nation with one telegraph network is a tremendous achievement. The connection to the international network will ensure that the national and global exchange of ideas is significantly stimulated. Of course, this is not the end: if our nation acquires new areas that are not yet wired, we will have to set up telegraphy offices there too. And maybe one day there will be a way to send messages without using telegraph lines..."
 gaudi.1413.g: "..-. .- -. - .- ... - .. -.-. (환상적이야)"
 gaudi.1414.t: "Universities connected via Telegraph"
 gaudi.1414.d: "The universities of [SCOPE.sState('gaudi_university_state_1').GetName] and [SCOPE.sState('gaudi_university_state_2').GetName] are now connected by a direct telegraph line. The scientists hope this will lead to increased exchange."
 gaudi.1414.f: "'Of all the marvelous achievements of modern science the electric telegraph is transcendentally the greatest and most serviceable to mankind … The whole earth will be belted with the electric current, palpitating with human thoughts and emotions … How potent a power, then, is the telegraphic destined to become in the civilization of the world! This binds together by a vital cord all the nations of the earth. It is impossible that old prejudices and hostilities should longer exist, while such an instrument has been created for an exchange of thought between all the nations of the earth.' -Augustus Maverick"
 gaudi.1414.g: "This will strengthen technical research."
 gaudi.1414.h: "This will strengthen nature research."
 gaudi.1414.i: "This will strengthen archaeological research."
 gaudi.1415.t: "Telegram for your Neighbour"
 gaudi.1415.d: "The telegraph station in [SCOPE.sState('gaudi_our_telegraph_state').GetName] has established a connection to the neighboring state of [SCOPE.sState('gaudi_neigbour_telegraph_state').GetName]. We are now able to send a telegram to our neighbor."
 gaudi.1415.f: "Telegraphy can contribute to international understanding and improving relationships. Some telegrams, however, do not."
 gaudi.1415.g: "Send a friendly telegram to strengthen our relations."
 gaudi.1415.h: "Send a joke telegram to annoy their head of state."
 gaudi.1416.t: "Telegram from our Neighbour"
 gaudi.1416.d: "Our neighbor [SCOPE.sCountry('gaudi_telegram_country').GetName] has set up a telegraph line in a neighboring state and sent us a friendly message."
 gaudi.1416.f: "'To good neighbors.'"
 gaudi.1416.g: "A Telegram? For me? We should send one, too!"
 gaudi.1417.d: "The first official telegram from [SCOPE.sCountry('gaudi_telegram_country').GetName] was sent today. Apparently they want to make fools of us!"
 gaudi.1417.f: "'[SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('gaudi_ruler').GetFullName] has fleas.'"
 gaudi.1417.g: "Is this supposed to be a joke telegram?"
 gaudi_building_radio_network_modifier: "모두를 위한 라디오 방송국"
 gaudi_radio_network_modifier: "라디오 방송망"
 je_gaudi_radio_network: "라디오 방송망 건설"
 je_gaudi_radio_network_reason: "전국 어디든 철도가 놓인 곳이라면 라디오 방송국을 설치할 수 있으며, 사전에 전신망을 따로 구축할 필요는 없습니다. 신규 라디오 방송국을 건설하는 데이는 1년의 시간이 소요되며, [concept_tesla_engineer]가 참여하면 시간이 단축됩니다. 공학자가 [concept_tesla_electrical_engineer]라면 완공 시점이 더욱 앞당겨집니다."
 gaudi.1421.t: "Radio Network"
 gaudi.1421.d: "The invention of wireless telegraphy makes miracles possible. From now on, messages can be sent from any location to another, without any transmission towers, provided the right technical equipment is available."
 gaudi.1421.f: "In 1897, Karl Ferdinand Braun joined the line of wireless pioneers. His major contributions were the introduction of a closed tuned circuit in the generating part of the transmitter, its separation from the radiating part (the antenna) by means of inductive coupling, and later on the usage of crystals for receiving purposes. Wireless telegraphy claimed Dr. Braun's full attention in 1898, and for many years after that he applied himself almost exclusively to the task of solving its problems. Dr. Braun had written extensively on wireless subjects and was well known through his many contributions to the Electrician and other scientific journals. In 1899, he would apply for the patent Wireless electro transmission of signals over surfaces."
 gaudi.1421.g: "An antenna in every location!"
 gaudi.1422.t: "Radio Network stopped"
 gaudi.1422.d: "Construction work on new antennas and radio stations has been interrupted for the time being. They can be continued at any time with an [concept_tesla_electrical_engineer]."
 gaudi.1422.f: "'Have I done the world good, or have I added a menace?' -Guglielmo Marconi"
 gaudi.1422.g: "We're finishing construction for now."
 gaudi.1423.t: "Radio Network finished"
 gaudi.1423.d: "The physicists and engineers of [GetPlayer.GetName] proudly announce that they have now covered the entire country - wirelessly!"
 gaudi.1423.f: "'My chief trouble was that the idea was so elementary, so simple in logic that it seemed difficult to believe no one else had thought of putting it in practice.' -Guglielmo Marconi"
 gaudi.1423.g: "Listen to the Radio!"
 gaudi.1424.t: "First Radio Program"
 gaudi.1424.d: "The first private radio program broadcast in [SCOPE.sState('gaudi_radio_state').GetName] led to a sharp increase in interest in this new medium. The nearby factory is preparing for this and has improved the efficiency of its own production in order to be prepared for a possible rush of customers."
 gaudi.1424.f: "In 1909, the world's first news station began operating with a regular program at 14 watts. The station in San José, California, was created by physicist Charles 'Doc' Herrold and students from his College of Wireless and Engineering. In 1921 this station, now a commercial one, was given the identifier KQW, which was later taken over by CBS."
 gaudi.1424.g: "A radio in every house?"
 gaudi.1425.t: "Radio Agitation"
 gaudi.1425.d: "Politics and propaganda also change with technology. [SCOPE.sCharacter('gaudi_opposition_leader').GetFullName] has opened a own small radio channel that party supporters listen to every day. Even previously unpoliticized people are receptive to the program."
 gaudi.1425.f: "'Goood morning dear listeners. These are the morning announcements. Tryouts for the soccer team are on Friday afternoon. That is of course if our [SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle] does something about our abysmal soccer field. I have a question. What does [SCOPE.sCharacter('gaudi_ruler').GetFullName] actually do? He is supposed to be the [SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle], right? What is his agenda? He's lying to everyone? Or is he? Let's ask these questions. Besides that, who actually voted for [SCOPE.sCharacter('gaudi_ruler').GetFullName]? I know I didn't. And everyone who did is now scratching their heads and goin' \"Whoops. Guess I shouldn't have done that.\" I'm not in the cabinet, I'm just a normal person like all of you. And like all of you, I want to know what has happened... to my country.'"
 gaudi.1425.g: "Ban this radio station!"
 gaudi.1425.h: "This is a free country, so you can broadcast freely."
 gaudi.1426.t: "A disturbing Radio Play"
 gaudi.1426.d: "One of the first radio plays on a radio show caused mass panic among uninformed listeners because they thought the fictional story was part of the news reporting."
 gaudi.1426.f: "'This is Orson Welles, ladies and gentlemen, out of character, to assure you that The War of the Worlds has no further significance than as the holiday offering it was intended to be; The Mercury Theatre's own radio version of dressing up in a sheet and jumping out of a bush and saying 'Boo!' Starting now, we couldn't soap all your windows and steal all your garden gates by tomorrow night, so we did the next best thing. We annihilated the world before your very ears and utterly destroyed the CBS. You will be relieved, I hope, to learn that we didn't mean it, and that both institutions are still open for business. So goodbye everybody, and remember please for the next day or so the terrible lesson you learned tonight. That grinning, glowing, globular invader of your living room is an inhabitant of the pumpkin patch, and if your doorbell rings and nobody's there, that was no Martian, it's Halloween.' -Orson Welles"
 gaudi.1426.g: "An alien invasion? And people believed that?"
 gaudi.1426.h: "Good thing we were prepared!"
 gaudi.1420.t: "Transatlantic Cable"
 gaudi.1420.d: "A transatlantic cable now connects the two locations of Newfoundland and Ireland. A first message was exchanged between the continents."
 gaudi.1420.f: "'It is a triumph more glorious, because far more useful to mankind, than was ever won by conqueror on the field of battle. May the Atlantic telegraph, under the blessing of Heaven, prove to be a bond of perpetual peace and friendship between the kindred nations, and an instrument destined by Divine Providence to diffuse religion, civilization, liberty, and law throughout the world.' -James Buchanan"
 gaudi.1420.g: ".... . .-.. .-.. --- -.-.--"
 gaudi.1430.t: "Transatlantic Transmission"
 gaudi.1430.d: "A great success for human progress: today the first message was sent wirelessly across the Atlantic!"
 gaudi.1430.f: "-s-"
 gaudi.1430.g: "And does that really work? Messages through the air?"
 je_gaudi_transatlantic_cable: "Transatlantic Cable"
 je_gaudi_transatlantic_cable_reason: "By establishing a telegraphy station on both sides of the Atlantic, there is the possibility of laying an undersea telegraphy cable to bring Europe and America closer."
 je_gaudi_transatlantic_radio: "Transatlantic Transmission"
 je_gaudi_transatlantic_radio_reason: "It sounds like magic, but with state-of-the-art technology it is much easier to send messages across the Atlantic instead of using telegraphic cables. This would solve the problem of the cables breaking again and again and thus causing disruptions in communication."
