 gaudi.1221.t: "기계식 계산수"
 gaudi.1221.d: "우리 [concept_tesla_mechanical_engineer] [GetPlayer.MakeScope.GetCountry.GetCustom('gaudi_dr_engineer_type')](이)가 인류 역사상 가장 위대한 발명품, 기계식 계산수를 만들어냈다. 이번 발명품으로 그 누구도 쥐지 못할 영향력을 확보하게 되었다."
 gaudi.1221.f: "엔진이 그르렁거리자 거대 기계가 덜컹거리고 삐걱거리기 시작했다. 수천 개의 톱니바퀴가 움직이고 출력기에서는 숫자들을 쏟아내기 시작했다. 이 모든 것은 인간이 따라올 수 없는 속도와 정밀도로 이루어졌다."
 gaudi.1222.t: "The Analytical Engine"
 gaudi.1222.d: "[SCOPE.sCharacter('tesla_new_engineer_scope').GetFullName] a well-know polymath, designed a new machine that would be able to compute every calculation that exists. Now he is asking our government for support to actually build such a mechanical computer."
 gaudi.1222.f: "\"As soon as an Analytical Engine exists, it will necessarily guide the future course of the science. Whenever any result is sought by its aid, the question will then arise — by what course of calculation can these results be arrived at by the machine in the shortest time?\" - Charles Babbage"
 gaudi.1222.g: "What a fascinating Project!"
 gaudi.1222.h: "We could build so many warships instead!"
 tesla_mechanical_computer_project_finished_engineer_loc: "\n[GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetFullNameNoFormatting](은)는 #V 기계식 계산수#!를 최초로 발명했습니다. 인류 역사상 가장 위대한 발명 중 하나입니다."
