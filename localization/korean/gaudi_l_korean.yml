 je_gaudi_new_locomotives_project_reason: "우리 [concept_tesla_mechanical_engineer] [GetPlayer.MakeScope.GetCountry.GetCustom('gaudi_dr_engineer_type')](이)가 [GetPlayer.GetName]의 신형 기관차 제작을 위해 쉴 틈 없이 작업하고 있습니다. 이 사업은 매달 진행도를 획득합니다. 진행도가 [JournalEntry.GetTotalGoalValue|V0]에 도달하면 [GetBuildingType('building_railway').GetName] 건물에 신형 기관차가 투입됩니다. 가장 높은 단계의 건물에 변화 요인이 먼저 부여됩니다. 진행 바는 모든 건물에 변화 요인이 부여되면 초기화됩니다.\n부여되는 변화 요인에는 총 다섯 가지가 있습니다. 각각의 새로운 변화 요인마다 진행도를 다시 채워야 합니다.\n\n현재 월간 진행도: #underline #tooltip:[GetRawTextTooltipTag('gaudi_monthly_mechanical_research_progress_tt')] [GetPlayer.MakeScope.GetVariable('gaudi_monthly_mechanical_engineering_progress_var').GetValue|2+] #!#!"
 gaudi_railways_with_new_locomotives_tt: "[GetPlayer.GetAdjective] 모든 [GetBuildingType('building_railway').GetName]에는 5단계의 변화 요인이 있습니다.\n- 1단계 변화 요인을 지닌 건물: [GetPlayer.MakeScope.GetVariable('gaudi_num_railway_buildings_with_first_modifier_var').GetValue|+0] / [GetPlayer.MakeScope.GetVariable('gaudi_num_railway_buildings_var').GetValue|V0]\n- 2단계 변화 요인을 지닌 건물: [GetPlayer.MakeScope.GetVariable('gaudi_num_railway_buildings_with_second_modifier_var').GetValue|+0] /[GetPlayer.MakeScope.GetVariable('gaudi_num_railway_buildings_var').GetValue|V0]\n- 3단계 변화 요인을 지닌 건물: [GetPlayer.MakeScope.GetVariable('gaudi_num_railway_buildings_with_third_modifier_var').GetValue|+0] / [GetPlayer.MakeScope.GetVariable('gaudi_num_railway_buildings_var').GetValue|V0]\n- 4단계 변화 요인을 지닌 건물: [GetPlayer.MakeScope.GetVariable('gaudi_num_railway_buildings_with_fourth_modifier_var').GetValue|+0] / [GetPlayer.MakeScope.GetVariable('gaudi_num_railway_buildings_var').GetValue|V0]\n- 5단계 변화 요인을 지닌 건물: [GetPlayer.MakeScope.GetVariable('gaudi_num_railway_buildings_with_modifiers_var').GetValue|+0] / [GetPlayer.MakeScope.GetVariable('gaudi_num_railway_buildings_var').GetValue|V0]"
