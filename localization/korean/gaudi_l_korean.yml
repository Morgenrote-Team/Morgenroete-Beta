 gaudi.901.t: "경복궁 중건 개시"
 gaudi.901.d: "[SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('gaudi_ruler').GetFullName] 전하께서 옛 궁궐을 중건하라는 명을 내리셨다. 몇 년만 있으면 과거의 영광을 되찾을 것이다."
 gaudi.901.f: "경복궁은 250여년 간 폐허로 남아 있었습니다. [SCOPE.sCharacter('gaudi_ruler').GetFullName]께서 복원하려는 전체 규모는 13만여 평 부지의 행각 5백여 동, 7천 7백 여 칸입니다. 경복궁의 대대적인 중건 사업은 수년 안에 마칠 것으로 예상됩니다."
 gaudi.901.g: "이만한 궁궐이라면 [SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle] 전하께 걸맞지 않겠느냐!"
 gaudi.902.t: "경복궁 중건 완료"
 gaudi.902.d: "수 년이 흘러 경복궁이 마침내 중건되었다. 그 찬란한 빛이 도성를 굽어보는 옥석과도 같다. 마침내 우리는 이 나라의 권력과 재력이 고스란히 깃든 궁궐을 다시금 갖게 되었다."
 gaudi.902.f: "1867년 흥선대원군 섭정 시기, 경복궁은 330동 5,792칸 규모의 거대한 궁궐로 탈바꿈하며 중건되기에 이르렀습니다. 432,703제곱미터에 달하는 넓은 부지에 자리 잡은 경복궁은 한국과 조선 왕실의 상징적인 건축물로 다시금 자리매김했습니다. 1894년 일본이 경복궁을 점거하고 고종에게 친일 정부 수립을 강요했습니다. 국가 주권의 상징이었던 경복궁은 1910년 일제강점기에 이르러 극심한 피해를 입었습니다. 1911년 경복궁 부지가 조선 총독에게 넘어갔고, 1915년 일제는 박람회 개최를 구실로 경복궁 건물의 90% 이상을 철거했습니다. 박람회가 끝나고 남은 잔해마저 완전히 허물고 그 자리에 조선총독부 청사를 건설했습니다."
 gaudi.902.g: "조선의 위엄이 돌아왔노라!"
 gaudi.909.t: "서울 상실!"
 gaudi.909.d: "서울 지역을 상실하면서 경복궁을 중건할 기회도 영영 사라지게 되었다."
 gaudi.909.f: "어떤 이유에서건 서울을 상실하게 되면, 건설 진행도도 #R 통째로 상실#!하게 됩니다. 경복궁 건설을 계속할 수 있는 지역은 서울 뿐입니다. 우리를 침략한 외국 세력은 궁궐 건설에 전혀 관심을 보이지 않을 것입니다."
 gaudi.909.g: "서울을 언제까지고 넘겨줄 순 없다!"
 gaudi.911.t: "건설 진행도 느림"
 gaudi.911.d: "궁궐 공사가 더딘 진척을 보이고 있다. 도편수의 헤아림에 의하면 현재까지의 진척 상황은 예정보다 수 개월 뒤처진 상태라 한다."
 gaudi.911.f: "알 수 없는 이유로 경복궁 공사가 더디게 진행되고 있다. 그것이 역적 세력의 교란이든, 인부들이 공역에 소홀한 것이든, 비밀 계원들의 음모이든, 아니면 그저 악천후가 내려서든 간에 말이다."
 gaudi.911.g: "근무 시간을 강제로 연장하라."
 gaudi.911.h: "노동자들에게 상여금을 지급하라."
 gaudi.911.i: "기다려 보겠다."
 gaudi.912.t: "건설 진행도 양호"
 gaudi.912.d: "경복궁 공사의 진척 속도가 놀랍다. 도편수가 이르기를 궁궐이 예정보다 빨리 완공될 수도 있다고 한다."
 gaudi.912.f: "알 수 없는 이유로 경복궁 공사가 순조롭게 진행되고 있다. 그것이 애국충 때문이든, 임금이 높기 때문이든, 지역 유지들이 지원에 거리낌 없기 때문이든, 아니면 그저 날씨가 더 좋기 때문이든 간에 말입니다."
 gaudi.912.g: "아주 좋아."
 gaudi.913.t: "불이야!"
 gaudi.913.d: "도성 위로 피어오른 연기 구름이 몇 리 바깥에서도 보인다. 조선 최대의 건설 현장에서 화재가 발생했다!"
 gaudi.913.f: "화재 원인은 아직 밝혀지지 않았으나, 부주의와 소방 조직의 부실로 인해 불길이 수많은 행각으로 번졌습니다. 화재에 특히 취약한 목조 구조물이 화마에 휩싸여 무너졌습니다. 이로서 중건 사업은 수 주에서 수 개월까지 지연되었습니다!"
 gaudi.913.g: "통탄스럽다!"
 gaudi.914.t: "칸수 늘리기"
 gaudi.914.d: "공사가 한창이던 와중에 도편수가 궁궐 부지를 보다 면밀히 활용할 수 있는 새로운 도면을 올렸다. 이대로라면 전각과 방을 더 많이 들일 수 있지만, 그만큼 공사 비용이 추가되고 완공 시기도 크게 늦어질 터이다."
 gaudi.914.f: "'고작 오천 칸뿐이란 말인가? 칠천 칸은 되어야 할 것을!'"
 gaudi.914.g: "국왕 전하와 왕실을 위해서라도 공간을 늘려야겠다."
 gaudi.914.h: "사치를 부릴 순 없다!"
 gaudi.915.t: "궁궐에 감복한 자"
 gaudi.915.d: "며칠 전, [SCOPE.sCharacter('gaudi_sycophant_leader').GetFullName](이)가 공사 중인 경복궁의 규모와 장엄함을 직접 두 눈으로 담고자 했다. 서서히 위용을 드러내는 전각들을 마주한 그는, 눈앞에 펼쳐진 걸작에 넋을 잃고 말았다."
 gaudi.915.f: "\"전하, 소인은 궁궐의 위용을 보기 전까지 제 자신이 얼마나 미천한 존재인지 헤아리지 못하였나이다. 광활한 해안의 모래 한 알, 밤하늘에 길 잃은 작은 별 하나가 된 기분이옵니다. 그날 소인은 이글거리는 태양 앞에 선 반딧불이 한 마리에 불과하였나이다!\n\n본 궁궐은 참으로 궁궐 중의 으뜸이요, 군주와 황제, 나아가 상제께서도 머무르실 안식처가 아니온지요! 전하의 명철한 혜안 덕에 소인들이 이토록 찬란한 위용을 미리 엿볼 수 있게 되었나이다. 소인은 전하의 그림자라도 핥고 싶을 뿐이요, 전하께서 뱉은 침조차 이 비천한 몸뚱이에 과분한 성은이옵니다.\n\n아아, 참으로 이 미천한 벌레 같은 놈이 전하를 의심하고, 대지를 의심하고, 천상천해의 만방을 의심하였나이다! 허나 틀린 것은 오직 소인이었사옵니다. 이곳에서도, 저곳에서도, 천상에서도 천하에서도 소인이 그릇되었나이다! 무릇 뱁새가 대붕에게 이르듯...\""
 gaudi.915.g: "간사한 자들이 역병처럼 끝도 없구나."
 gaudi.1005.t: "The first Telegram"
 gaudi.1005.d: "Today, [GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetFullName] sent the first message via an electric telegraph using an alphabet [GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetSheHe] invented. The test was a complete success."
 gaudi.1005.f: "In March 1843, the US Congress appropriated USD 30,000 to Samuel Morse to lay a telegraph line between Washington, D.C., and Baltimore, Maryland. Morse originally decided to lay the wire underground, asking Ezra Cornell to lay the line using a special cable-laying plow that Cornell had developed. However, the project was stopped after about 9.3 miles of wire was laid because the line was failing. Morse learned that Cooke and Wheatstone were using poles for their lines in England and decided to follow their lead. A test of the still incomplete line occurred on May 1, 1844, when news of the Whig Party's nomination of Henry Clay for U.S. President was sent from the party's convention in Baltimore to the Capitol Building in Washington. Morse's line was demonstrated on May 24, 1844, from the Old Supreme Court Chamber in the United States Capitol in Washington to the Mount Clare station of the railroad in Baltimore, and commenced with the transmission of Morse's first message (from Washington) to Alfred Vail (in Baltimore)."
 gaudi.1005.g: "What has God wrought"
 gaudi.1006.t: "The first Automobile with a Combustion Engine"
 gaudi.1006.d: "Today, [GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetFullName] drove an automobile with an internal combustion engine all the way from [SCOPE.sState('gaudi_car_state_1_scope').GetName] to [SCOPE.sState('gaudi_car_state_2_scope').GetName] and reached a speed of 16 kilometers per hour."
 gaudi.1006.f: "\"16 kilometers per hour? That's a murderously dangerous speed!\""
 gaudi.1006.g: "Vroom!"
