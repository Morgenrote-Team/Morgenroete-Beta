 je_gaudi_gyeong_phase_1_reason: "경복궁은 서울의 궁궐로, 그 이름은 큰 복(慶福)을 누리기를 기원하는 뜻을 담고 있습니다. 조선 왕조의 5대 궁궐 가운데 가장 오래된 동시에 최대 규모를 자랑하고 있습니다. 조선 왕조의 초대 국왕인 태조 이성계가 지었으며 1395년에 완공하였습니다. 이후 왕가의 거처로 사용되다, 1592년 임진왜란 당시 일본군의 진주로 무너져 내렸습니다. 전쟁의 화마에 휩싸여 파괴된 이래 300년간 누구도 재건하지 못했던 경복궁. 이제는 다시 세워야 할 때가 찾아왔을지 모릅니다."
