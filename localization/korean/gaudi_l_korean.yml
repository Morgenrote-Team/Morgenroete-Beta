 gaudi.1311.d: "우리 [concept_tesla_military_engineer] [GetPlayer.MakeScope.GetCountry.GetCustom('gaudi_dr_engineer_type')](은)는 국군을 위해 수년 동안 신형 전차의 개발에 공들여 왔다. 이제 드디어 우리 기계화 여단에 보급할 때가 온 것이다!"
 gaudi.1311.f: "\"이 녀석은 가는 길의 모든 것을 파괴할 거요! 장담컨대 전쟁의 판도를 완전히 바꿀 것이오! 허나... 아직 겨울에는 운용하지 마시오. 난방 장치를 깜빡했소...\""
