 ACHIEVEMENT_gaudi_kulturnation: "문화국가"
 ACHIEVEMENT_DESC_gaudi_kulturnation: "독일계 국가로 쾰른 대성당을 완공하고, 해왕성을 발견하며, 전독일 음악협회를 설립하며, 리하르트 바그너 축제를 개최하고, 이슈타르의 문을 독일로 옮기고, 자국의 수도를 표현주의의 발상지로 만드십시오. 활동 중인 지휘자와 활동 중인 저명한 고고학자도 보유하고 있어야 합니다."
 ACHIEVEMENT_gaudi_segundo_siglo_de_oro: "스페인 제2의 황금기"
 ACHIEVEMENT_DESC_gaudi_segundo_siglo_de_oro: "스페인을 위대한 문화 강국의 반열에 다시 올려놓으십시오. 명왕성을 발견하고, 대표적인 고고학 발견을 달성하고, 자국의 수도를 아르누보의 발상지로 만들고, 사그라다 파밀리아를 완성하십시오! 캠페인 동안 최소 한 명의 위대한 작곡가를 보유하고 있어야 합니다."
