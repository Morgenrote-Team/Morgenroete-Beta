 je_gaudi_urban_planning_project_reason: "우리 [concept_gaudi_architect] [ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName](은)는 [JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetState.GetName]의 [JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetName]를 대상으로 생산 방식 현대화에 주력하고 있습니다.\n$mr_divider_for_je$\n이 사업은 매달 진행도를 얻습니다. 진행도가 #V 24점#!에 도달할 때마다 [GetBuildingType('building_urban_center').GetName]에 새로운 변화 요인이 부여됩니다.\n변화 요인은 총 세 가지가 존재합니다. 각각의 새로운 변화 요인마다 진행도를 다시 채워야 합니다.\n[GetBuildingType('building_urban_center').GetName]이 모든 변화 요인을 갖추게 된다면 @gaudi_architectural_splendour![concept_gaudi_architectural_splendour] #p 5#!를 획득하게 됩니다.\n$mr_divider_for_je$\n현재 대상 건물:[JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetState.GetName]의 [JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetName]\n[JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetCustom('je_gaudi_urban_planning_project_modifier_1_type')]\n[JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetCustom('je_gaudi_urban_planning_project_modifier_2_type')]\n[JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetCustom('je_gaudi_urban_planning_project_modifier_3_type')]\n\n남은 건물 수 (현재 대상 제외): [JournalEntry.MakeScope.Var('mr_number_of_remaining_list_entries_var').GetValue|V0]곳\n사업으로 얻은 $concept_gaudi_architectural_splendour$: @gaudi_architectural_splendour! [JournalEntry.MakeScope.ScriptValue('gaudi_architectural_splendor_from_urban_planning_value')|+0] "
