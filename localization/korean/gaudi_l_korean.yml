 gaudi.1301.t: "신형 소총 개발"
 gaudi.1301.d: "우리 [concept_tesla_military_engineer] [GetPlayer.MakeScope.GetCountry.GetCustom('gaudi_dr_engineer_type')](은)는 국군을 위해 수년 동안 신형 소총의 개발에 공들여 왔다. 이제 드디어 우리 장병들에게 보급할 때가 온 것이다!"
 gaudi.1301.f: "\"이것은 우리 적에 맞서 엄청난 우위를 선사할 매우 혁신적인 총기요! 지금 사용되고 있는 어떤 총보다도 더 빠르게, 더 멀리, 더 정확하게 발사할 수 있다고 나는 확신합니다!\""
 gaudi.1301.g: "참 매력적인 무기로군. 당장 시험해 봐야겠어!"
