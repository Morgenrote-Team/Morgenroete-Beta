 gaudi_gotthard_can_construct_tt: "고트하르트 철도는 #E 스위스 동부#!에만 건설할 수 있습니다. 결단을 통해서만 건설할 수 있습니다."
 gaudi_cristo_can_construct_tt: "구세주 그리스도상은 주 문화가 브라질인 국가만이 #E 히우 지 자네이루#!에만 건설할 수 있습니다. 결단을 통해서만 건설할 수 있습니다."
 gaudi_mole_can_construct_tt: "몰레 안토넬리아나는 이탈리아가 #E 피에몬테#!에만 건설할 수 있습니다. 결단을 통해서만 건설할 수 있습니다."
 gaudi_ringstrasse_can_construct_tt: "빈 순환도로는 오스트리아가 #E 빈#!에만 건설할 수 있습니다. 결단을 통해서만 건설할 수 있습니다."
 gaudi_sagrada_can_construct_tt: "사그라다 파밀리아는 주 문화가 이베리아인 나라만이 #E 바르셀로나#!에만 건설할 수 있습니다. 결단을 통해서만 건설할 수 있습니다."
 gaudi.60.tt: "이화원을 불태우면 중국의 #R 전쟁 피로#!가 증가하고 위신 #R 100#!이 소모됩니다."
 gaudi.62.tt: "빅벤을 불태우면 영국의 #R 전쟁 피로#!가 증가하고 위신 #R 75#!가 소모됩니다."
