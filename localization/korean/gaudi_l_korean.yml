 je_gaudi_tunnel_project_reason: "우리 [concept_tesla_civil_engineer] [GetPlayer.MakeScope.GetCountry.GetCustom('gaudi_dr_engineer_type')](이)가 [GetPlayer.GetName] 전역에 새로운 터널을 건설하는 사업에 착수하였습니다. 이 사업은 매달 진행도를 획득합니다. 진행도가 [JournalEntry.GetTotalGoalValue|V0]에 도달하면 사용 가능한 기반 시설이 가장 적은 주에 $gaudi_new_tunnel_modifier_with_tooltip$ [concept_modifier]이 부여됩니다.\n\n현재 월간 진행도: #underline #tooltip:[GetRawTextTooltipTag('gaudi_monthly_civil_research_progress_tt')] [GetPlayer.MakeScope.GetVariable('gaudi_monthly_civil_engineering_progress_var').GetValue|2+] #!#!"
 je_gaudi_railway_project_reason: "우리 [concept_tesla_civil_engineer] [GetPlayer.MakeScope.GetCountry.GetCustom('gaudi_dr_engineer_type')](이)가 [GetPlayer.GetName]의 [GetBuildingType('building_railway').GetName] 노선을 현대화하는 사업에 착수하였습니다. 이 사업은 매달 진행도를 획득합니다. 진행도가 [JournalEntry.GetTotalGoalValue|V0]에 도달하면 사용 가능한 기반 시설이 가장 적은 주에 $tesla_modernized_railway_lines_building_modifier_with_tooltip$ [concept_modifier]이 부여됩니다.\n\n현재 월간 진행도: #underline #tooltip:[GetRawTextTooltipTag('gaudi_monthly_civil_research_progress_tt')] [GetPlayer.MakeScope.GetVariable('gaudi_monthly_civil_engineering_progress_var').GetValue|2+] #!#!"
 je_gaudi_topographic_map_project_reason: "우리 [concept_tesla_civil_engineer] [GetPlayer.MakeScope.GetCountry.GetCustom('gaudi_dr_engineer_type')](이)가 전국의 지형도를 제작하는 사업에 착수하였습니다. 지형도를 구축하면 건설과 수송이 훨씬 수월해집니다.\n이 사업은 매달 진행도를 획득합니다. 진행도가 [JournalEntry.GetTotalGoalValue|V0]에 도달하면 사용 가능한 기반 시설이 가장 적은 주에 $gaudi_topographic_state_map_modifier_with_tooltip$ [concept_modifier]이 부여됩니다.\n\n현재 월간 진행도: #underline #tooltip:[GetRawTextTooltipTag('gaudi_monthly_civil_research_progress_tt')] [GetPlayer.MakeScope.GetVariable('gaudi_monthly_civil_engineering_progress_var').GetValue|2+] #!#!"
