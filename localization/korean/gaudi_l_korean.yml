 gaudi_eiffel_phase_1_decision: "에펠탑"
 gaudi_eiffel_phase_1_decision_desc: "산업화의 기술적 가능성으로 고층 건축물을 지으려는 구상이 제시되기 시작했습니다. 특히 타워 구조물은 시대정신을 반영했습니다. 1886년 5월 1일, 프랑스 무역장관 에두아르 로크루아는 프랑스 건축가와 공학자들을 대상으로 파리 만국 박람회의 건물 설계 공모전을 실시하기로 발표했습니다. 약 100편의 설계도가 제출되었고 그 중 대다수가 타워 구조물을 구상한 것이었습니다. 1차 심사를 거쳐 총 3안이 남았는데, 에펠의 설계안을 비롯해 페르디낭 뒤테르와 장 카미유 포르미제의 설계안이 선정되었습니다. 에펠은 소베스트르의 화려하게 장식된 설계안에서 일부 장식 요소만 남긴 채 수정 제출하여 공모전에 최종 선정되었습니다."
 gaudi_liberty_phase_1_decision: "자유의 여신상"
 gaudi_liberty_phase_1_decision_desc: "조각가 프레데리크 오귀스트 바르톨디는 프랑스와 미국 국민 간 우애의 상징이자 독립 전쟁에서 공동으로 맞서 싸운 기억을 담고, 계몽주의 이상을 기리기 위한 '자유의 여신상' 건립을 제안하였습니다. 자유의 여신상이 자유롭고 민주적인 미국의 상징이 될 것이라 생각던 것입니다. 1876년 미국에서 열린 독립 100주년 행사는 이러한 구상에 새로운 활력을 불러일으켰습니다."
 gaudi_ben_phase_1_decision: "훌륭한 국회의사당"
 gaudi_ben_phase_1_decision_desc: "1834년 10월 16일, 웨스트민스터 궁전에 발생한 화재로 건물 대부분이 소실되었습니다. 영국 재무부는 1826년 세제 개편으로 불필요한 목재를 소각하기로 결정하였는데, 두 수레 분량의 목재를 가마 두 개에 나눠 태우던 중 상원 회의실에 불이 붙었던 것입니다. 웨스트민스터 홀, 주얼 타워, 세인스 스티븐스 예배당의 지하당, 그리고 회랑만이 파괴를 면했습니다. 1835년 6월 관계 위원회에서 같은 부지에 고딕 양식이나 튜더 양식으로 궁전을 재건한다는 방침을 내렸습니다. 1836년 관계 위원회는 공모전으로 접수된 97개의 설계안을 심사한 끝에 찰스 배리의 고딕 양식 재건안을 선정했습니다."
 gaudi_ben_phase_2_decision: "특색 있는 종탑"
 gaudi_ben_phase_2_decision_desc: "빅벤이라는 이름은 런던 웨스트민스터 궁전에 있는 유명한 종탑의 다섯 종 가운데 가장 무거운 종(13.5톤)에서 따온 것입니다. 종탑의 높이는 96.3m로, 하단부 61m는 벽돌로 지어졌고 석회암으로 된 외관을 지녔으며, 상단부는 주철로 만들어졌습니다. 웨스트민스터 궁전의 건축가인 찰스 배리는 오거스터스 퓨긴에게 종탑 설계를 의뢰했습니다. 시계 장치는 1848년 조지 에어리 경과 에드먼드 데니슨이 개발하고, 시계 제작자 에드워드 존 덴트가 실물을 제작하였습니다. 4면 시계의 지름은 각각 7m에 달합니다. 각 시계 아래에는 라틴어로 '하느님, 우리 여왕 빅토리아 1세를 보호하소서'라는 글귀가 새겨져 있습니다."
 je_gaudi_eiffel_phase_1: "에펠탑"
 je_gaudi_eiffel_phase_1_reason: "산업화의 기술적 가능성으로 고층 건축물을 지으려는 구상이 제시되기 시작했습니다. 특히 타워 구조물은 시대정신을 반영했습니다. 1886년 5월 1일, 프랑스 무역장관 에두아르 로크루아는 프랑스 건축가와 공학자들을 대상으로 파리 만국 박람회의 건물 설계 공모전을 실시하기로 발표했습니다. 약 100편의 설계도가 제출되었고 그 중 대다수가 타워 구조물을 구상한 것이었습니다. 1차 심사를 거쳐 총 3안이 남았는데, 에펠의 설계안을 비롯해 페르디낭 뒤테르와 장 카미유 포르미제의 설계안이 선정되었습니다. 에펠은 소베스트르의 화려하게 장식된 설계안에서 일부 장식 요소만 남긴 채 수정 제출하여 공모전에 최종 선정되었습니다."
 je_gaudi_liberty_phase_1: "자유의 여신상"
 je_gaudi_liberty_phase_1_reason: "조각가 프레데리크 오귀스트 바르톨디는 프랑스와 미국 국민 간 우애의 상징이자 독립 전쟁에서 공동으로 맞서 싸운 기억을 담고, 계몽주의 이상을 기리기 위한 '자유의 여신상' 건립을 제안하였습니다. 자유의 여신상이 자유롭고 민주적인 미국의 상징이 될 것이라 생각던 것입니다. 1876년 미국에서 열린 독립 100주년 행사는 이러한 구상에 새로운 활력을 불러일으켰습니다."
 je_gaudi_ben_phase_1: "훌륭한 국회의사당"
 je_gaudi_ben_phase_1_reason: "1834년 10월 16일, 웨스트민스터 궁전에 발생한 화재로 건물 대부분이 소실되었습니다. 영국 재무부는 1826년 세제 개편으로 불필요한 목재를 소각하기로 결정하였는데, 두 수레 분량의 목재를 가마 두 개에 나눠 태우던 중 상원 회의실에 불이 붙었던 것입니다. 웨스트민스터 홀, 주얼 타워, 세인스 스티븐스 예배당의 지하당, 그리고 회랑만이 파괴를 면했습니다. 1835년 6월 관계 위원회에서 같은 부지에 고딕 양식이나 튜더 양식으로 궁전을 재건한다는 방침을 내렸습니다. 1836년 관계 위원회는 공모전으로 접수된 97개의 설계안을 심사한 끝에 찰스 배리의 고딕 양식 재건안을 선정했습니다."
