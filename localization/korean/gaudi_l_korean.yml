 je_gaudi_study_trip_reason: "우리 건축가 [ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName](은)는 현재 유학을 떠나 건축 명소와 학술원을 둘러보고, 다른 예술인과의 만남을 갖고 있다. 건축가와는 2년 동안 연락할 수 없게 된다."
