 je_gaudi_public_construction_reason: "[ROOT.GetCountry.GetCustom('je_gaudi_public_construction_active_type')]진행중인 사업이 없어 분주하지 않은 [concept_gaudi_architect]는 공공 건설에 주력하여 추가적인 #V 건설 포인트#!를 제공하게 됩니다.\n활성화된 사업이 따로 없는 경우에 변화 요인을 획득하게 됩니다. 건축가 본인도 매년 #V 명성#!을 획득합니다.\n\n#V $gaudi_art_deco_style$#!, #V $gaudi_bauhaus_style$#!, #V $gaudi_neoclassical_style$#! 특성을 보유한 건축가는 공공 건설에 임할 때 국가에 $country_construction_add$ #p +30#!을 부여합니다.\n#V $gaudi_historicism_style$#! 특성을 보유한 건축가는 공공 건설에 임할 때 국가에 $country_construction_add$ #p +20#!을 부여합니다.\n#V $gaudi_traditional_style$#! 특성을 보유한 건축가는 공공 건설에 임할 때 국가에 $country_construction_add$ #p +10#!을 부여합니다.\n\n추가로 #V $gaudi_great_architect$#! 특성을 보유한 건축가는 공공 건설에 임할 때 국가에 $country_construction_add$ #p +20#!을 부여합니다."
