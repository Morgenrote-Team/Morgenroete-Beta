 je_gaudi_blueprint_research: "설계도 연구"
 je_gaudi_blueprint_research_reason: "우리 건축가 [ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName]이가 새로운 건축물을 위한 설계도 작업에 쉴 틈 없이 임하고 있습니다. 소요 시간은 건축가의 실력에 달렸으며, 일반적으로 3년이 소요됩니다. 연구가 완료되면 새로운 고유 건물을 건설할 수 있게 됩니다."
 gaudi_architectural_blueprint_progress_bar_at_full_tt: "설계 진행 바가 #variable 100%#!에 도달함"
 gaudi.11.t: "설계도 선택: 도시 기념물"
 gaudi.11.d: "우리나라 최고의 건축가 [ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName](이)가 신규 건물의 설계도 제작이라는 막중한 임무에 착수하였다. 남은 질문은 어떤 종류의 건물을 설계해야 하는가이다."
 gaudi.11.f: "[GetBuildingType('building_gaudi_statue').GetName]은 #G 정부의 정통성#!을 늘려줍니다. [GetTechnology('elgar_classicism_tech').GetName] 연구가 필요합니다.\n[GetBuildingType('building_gaudi_fountain').GetName]는 건물이 설치된 주의 #G 삶의 질#!을 높여줍니다.\n[GetBuildingType('building_gaudi_arch').GetName]은 전투에 나선 병력의 #G 사기 손실 감소#! 효과가 부여됩니다.  [GetTechnology('napoleonic_warfare').GetName] 연구가 필요합니다."
 gaudi.11.g: "석상"
 gaudi.11.h: "분수"
 gaudi.11.i: "개선문"
 gaudi.12.t: "설계도 선택: 공공 광장"
 gaudi.12.f: "[GetBuildingType('building_gaudi_park').GetName]은 #G 오염도 감소#! 효과가 부여됩니다.\n[GetBuildingType('building_gaudi_luna').GetName]은 건물이 위치한 주의 #G 세금 수입#!을 늘려줍니다. [GetTechnology('curtiss_tourism_tech').GetName] 연구가 필요합니다.\n[GetBuildingType('building_gaudi_parade').GetName]은 #G 징병률#!에 긍정적 효과를 줍니다. [GetTechnology('nationalism').GetName] 연구가 필요합니다."
 gaudi.12.g: "공원."
 gaudi.12.h: "놀이동원."
 gaudi.12.i: "연병장."
 gaudi.13.t: "설계도 선택: 공공 광장"
 gaudi.13.f: "[GetBuildingType('building_gaudi_almshouse').GetName]은 #G 이주자 유입#!의 효과를 부여합니다. [GetTechnology('egalitarianism').GetName] 연구가 필요합니다.\n[GetBuildingType('building_gaudi_school').GetName]는 건물이 위치한 주의 #G 교육 접근성#!을 늘려줍니다. [GetTechnology('empiricism').GetName] 연구가 필요합니다.\n[GetBuildingType('building_gaudi_prison').GetName]는 #G 주 갈등 감소#!의 효과를 부여합니다. [GetTechnology('law_enforcement').GetName] 연구가 필요합니다."
 gaudi.13.g: "국립 구빈원."
 gaudi.13.h: "국립 학교."
 gaudi.13.i: "국립 교도소."
 gaudi.14.t: "설계도 선택: 공공 보건"
 gaudi.14.f: "[GetBuildingType('building_gaudi_canalization').GetName]은 #G 콜레라, 황열병, 페스트의 면역력#! 효과를 주에 부여합니다. [GetTechnology('modern_sewerage').GetName] 연구가 필요합니다.\n[GetBuildingType('building_gaudi_hospital').GetName]은 건물이 위치한 주의 #G 출산율#!을 높입니다. [GetTechnology('theiler_microbiology_tech').GetName] 연구가 필요합니다.\n[GetBuildingType('building_gaudi_health').GetName]은 #G 질병 강도 감소#!의 효과를 부여합니다. [GetTechnology('pharmaceuticals').GetName] 연구가 필요합니다."
 gaudi.14.g: "하수 처리 시설."
 gaudi.14.h: "대학병원."
 gaudi.14.i: "보건부."
 gaudi.15.t: "설계도 선택: 국립 학술원"
 gaudi.15.f: "[GetBuildingType('building_gaudi_science').GetName]은 #G 월간 학자 양성 진행도#!를 증가시켜 줍니다. [GetTechnology('dialectics').GetName] 연구가 필요합니다.\n[GetBuildingType('building_gaudi_arts').GetName]은 #G 월간 예술가 양성 진행도#!를 증가시켜 줍니다. [GetTechnology('romanticism').GetName] 연구가 필요합니다.\n[GetBuildingType('building_gaudi_sports').GetName]은 #G 우리 선수들의 경험치 가속#!을 부여합니다. [GetTechnology('vikelas_international_sports_tech').GetName] 연구가 필요합니다."
 gaudi.15.g: "과학원."
 gaudi.15.h: "예술원."
 gaudi.15.i: "체육원."
 gaudi.11.j: "새로운 설계도는 필요 없다."
 gaudi.16.t: "신규 설계도"
 gaudi.16.d: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName](이)가 오늘 설계도 제작을 마치고 의뢰처에게 전달하였다."
 gaudi.16.f: "\"장식은 노동력의 낭비이자 그 자체로 건강의 낭비이다. 오늘날 장식은 곧 재료의 낭비이며 이 둘을 합하면 자본의 낭비가 된다. 현대인과 현대적 감각을 지닌 사람은 장식을 필요로 하지 않는다. 되려 혐오한다.\" - 아돌프 로스"
 gaudi.16.g: "새로운 건축물이군!"
