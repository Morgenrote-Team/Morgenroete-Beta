 je_gaudi_capital_expansion_project: "수도 확장"
 je_gaudi_capital_expansion_project_reason: "1836년부터 1936년 사이 빅토리아 시대의 각 수도는 엄청난 도시 격변을 거치게 되었습니다. 파리는 조르주외젠 오스만이 설계한 넓은 대로와 중심축의 경관으로 새롭게 탈바꿈했습니다. 빈에서는 1857년 도시 성벽을 허물고 거대한 순환도로로 대체하였습니다. 베를린에서는 연립주택, 산업지구, 나중에는 모더니즘 양식의 주택 단지가 들어서면서 급속도로 확장되었습니다. 런던에서는 철도로 이어진 교외, 기반시설 확충 사업, 그리고 세계 최초의 지하철을 통해 시역 주변으로 뻗어나갔습니다. 유럽 대륙을 통틀어 왕립 도시들은 권력과 야망, 고조되는 사회적 긴장을 담아낸 근대적 대도시로서 진화해 나가게 되었습니다."
 gaudi.41.t: "A City Unbound"
 gaudi.41.d: "The old walls come down. In their place—air, light, and the promise of growth."
 gaudi.41.f: "For centuries, [ROOT.GetCountry.GetCapital.GetCityHubName] had been a walled thing: proud, compact, and closed in on itself. But now, masonry falls to pick and powder.\n\nThe medieval fortifications have been demolished. In their place rise broad boulevards, lined with trees and noble façades. Market wagons and strolling couples now tread where once guards marched. The boulevards are more than roads—they are statements: of confidence, of expansion, of a future too large to be contained.\n\nSome lament the loss of the ancient gates. But [ROOT.GetCountry.GetCapital.GetCityHubName] has finally taken its first deep breath."
 gaudi.41.g: "We build outward—with vision and vigor"
 gaudi.42.t: "The Ring of Progress"
 gaudi.42.d: "A new ring of boulevards binds city and state together."
 gaudi.42.f: "Where once stood muddy embankments, now stone and iron rule. The great avenue curves like a necklace around the heart of [ROOT.GetCountry.GetCapital.GetCityHubName], binding its districts in motion and light.\n\nIt was no mere roadwork. Entire blocks were redrawn, parks carved out, monuments framed in perfect perspective. Gas lamps bloom at dusk like ordered stars. With every meter paved, [ROOT.GetCountry.GetCapital.GetCityHubName] becomes more legible—more imperial.\n\nOfficials speak of 'urban harmony.' And the people? They promenade—gazing at statues they've never seen before, on streets they once feared to walk."
 gaudi.42.g: "A ring not of defense—but of direction."
 gaudi.43.t: "Avenues of Authority"
 gaudi.43.d: "The new prefect reshapes [ROOT.GetCountry.GetCapital.GetCityHubName]—one axis at a time. Wide, straight, and utterly uncompromising."
 gaudi.43.f: "This is not expansion. It is surgery.\n\nWhole neighborhoods fall beneath the compass and the plan. Streets are carved like boulevards through once-maze-like quarters. Old alleys vanish. In their place rise lines—long, straight, and always leading to a monument, a barracks, or a ministry.\n\nResistance brews, but permits are signed, houses expropriated, and façades aligned. [ROOT.GetCountry.GetCapital.GetCityHubName] now speaks the language of order: visibility, circulation, control. Behind the grandeur lies intention.\n\nThe poor call it 'The Scouring.'' The officials call it 'Modernization.'' The Prefect calls it necessary."
 gaudi.43.g: "Let no one escape the plan"
 gaudi.44.t: "The Metropolitan Horizon"
 gaudi.44.d: "[ROOT.GetCountry.GetCapital.GetCityHubName] is no longer just a capital. It is becoming the world in miniature."
 gaudi.44.f: "The old city had edges. This one has none.\n\nSteel and glass pierce where stone once dominated. Rail lines intersect beneath public gardens. Electric lights blur the lines between dusk and dawn. Embassies, banks, galleries, and cafés bloom like orchids in the iron conservatory of a new age.\n\nForeign tongues echo in arcades. Skyscrapers challenge cathedrals. [ROOT.GetCountry.GetCapital.GetCityHubName] no longer asks permission to grow—it expects to lead. From every district, a single truth emerges: this is no longer a city of a nation. It is a city of nations."
 gaudi.44.g: "We rise, because the world already watches."
