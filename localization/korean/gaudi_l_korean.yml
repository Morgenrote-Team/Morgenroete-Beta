 gaudi.73.t: "Past and Future of Jerónimos"
 gaudi.73.d: "Lisbon's Hieronymus Monastery is considered one of the prime examples of the Manueline architectural style, recalling one of Portugal's most glorious periods. However, the building has been so neglected in recent decades that it has now fallen into disrepair."
 gaudi.73.f: "The Mosteiro dos Jerónimos in Belém (Lisbon) is one of Portugal's most iconic late Gothic-Manueline buildings, originally built in the 16th century. After centuries of weathering and neglect, the second half of the 19th century saw a rising interest in national monuments. Restoration efforts began in earnest during the 1860s and 1880s, led by Romantic-era historians and architects who sought to elevate Portugal's imperial past as a source of cultural pride."
 gaudi.73.g: "Some minor repairs are necessary."
 gaudi.73.h: "Restore its historic splendor with a complete renovation!"
 gaudi.73.i: "Sell off the most valuable items to fill the state treasury."
