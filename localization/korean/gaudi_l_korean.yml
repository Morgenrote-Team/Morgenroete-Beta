 mobilization_option_advanced_defence_2_desc: "장병들을 부상 위험에서 보호하는 것은 전쟁에서 극히 중요한 일입니다. 우리 [concept_tesla_military_engineer]가 개발한 최신형 진지로 장병들을 위험으로부터 보호해 줍니다.\n#V 주의:#!본 동원 옵션은 공학자가 신형 진지를 개발했을 때에만 활성화됩니다."
