 gaudi.1101.t: "[GetPlayer.GetName]의 최신식 도로"
 gaudi.1101.d: "우리 [concept_tesla_civil_engineer] [GetPlayer.MakeScope.GetCountry.GetCustom('gaudi_dr_engineer_type')](이)가 마침내 [GetPlayer.GetNameNoFormatting]의 도로망을 현대화하는 사업을 마무리하였다. 우리나라의 도로는 이제 전세계 최고의 최신식 도로로 인정받고 있다. 이는 조국의 상업과 교통을 크게 증진시킬 것이다."
 gaudi.1101.f: "\"우리 때는 도로란 것도 없었어. 우리 손으로 매일같이 빽빽한 숲을 뚫고 길을 내야 했다고! 요즘 젊은이들은 참 편하게 산다니까! 정부에서 필요한 건 뭐든지 내어 주잖니! 일할 필요도 전혀 없고 말이야!\""
 gaudi.1101.g: "이제는 그놈의 도로 턱 없이도 이동할 수 있게 되었군!"
 je_gaudi_bridge_project: "교량 건설"
 gaudi_states_with_bridges_tt: "[GetPlayer.GetAdjective] 모든 주에 $gaudi_new_bridge_modifier_with_tooltip$ [concept_modifier]이 부여됨 (현재 [GetPlayer.MakeScope.GetVariable('gaudi_num_states_bridge_var').GetValue|+0] / [GetPlayer.MakeScope.GetVariable('tesla_num_states_var').GetValue|V0])"
 gaudi.1121.t: "[GetPlayer.GetName]의 교량"
 gaudi.1121.d: "우리 [concept_tesla_civil_engineer] [GetPlayer.MakeScope.GetCountry.GetCustom('gaudi_dr_engineer_type')](이)가 마침내 [GetPlayer.GetNameNoFormatting]의 주요 길목에 교량을 건설하는 사업을 마무리하였다. 이제 다리가 연결되어 멀리 떨어진 지역들이 하나로 이어지면서 조국에는 상업과 교통이 활발해질 것이다."
 gaudi.1121.f: "\"다리? 다리 같은 게 뭐가 필요하다고. 내 어릴 적엔 강도 헤엄쳐 건너갔어! 요즘 젊은이들은 수영도 하나 못 할 거야! 우리 사회가 어떻게 돌아가려는지!\""
 gaudi.1121.g: "건너야 하는 다리가 일곱 개로군!"
 je_gaudi_tunnel_project: "터널 건설"
 gaudi_states_with_tunnels_tt: "[GetPlayer.GetAdjective] 모든 주에 $gaudi_new_tunnel_modifier_with_tooltip$ [concept_modifier]이 부여됨 (현재 [GetPlayer.MakeScope.GetVariable('gaudi_num_states_tunnel_var').GetValue|+0] / [GetPlayer.MakeScope.GetVariable('tesla_num_states_var').GetValue|V0])"
 gaudi.1131.t: "[GetPlayer.GetName]의 터널"
 gaudi.1131.d: "우리 [concept_tesla_civil_engineer] [GetPlayer.MakeScope.GetCountry.GetCustom('gaudi_dr_engineer_type')](이)가 마침내 [GetPlayer.GetNameNoFormatting]의 구릉과 산간지대에 새로운 터널을 뚫는 사업을 마무리하였다. 이제 터널이 연결되어 이동과 교통이 훨씬 수월해지면 우리 산업에도 긍정적인 영향이 미칠 것이다."
 gaudi.1131.f: "\"나는야 난쟁이, 땅굴을 판다네! 파고 또 판다네, 땅굴을 판다네!\""
 gaudi.1131.g: "혹시 금을 발견하진 않았소?"
 je_gaudi_railway_project: "철도 노선 현대화"
 gaudi_states_with_modernized_railway_tt: "[GetPlayer.GetAdjective] 모든 주에 $tesla_modernized_railway_lines_building_modifier_with_tooltip$ [concept_modifier]이 부여됨 (현재 [GetPlayer.MakeScope.GetVariable('gaudi_num_states_modernized_railway_var').GetValue|+0] / [GetPlayer.MakeScope.GetVariable('tesla_num_states_var').GetValue|V0])"
 gaudi.1141.t: "[GetPlayer.GetName]의 최신식 철도 노선"
 gaudi.1141.d: "우리 [concept_tesla_civil_engineer] [GetPlayer.MakeScope.GetCountry.GetCustom('gaudi_dr_engineer_type')](이)가 마침내 [GetPlayer.GetNameNoFormatting]의 철도 시설을 현대화하는 사업을 마무리하였다. 세계에서 가장 최신식인 철도망을 갖추게 됨으로서 앞으로 철도망의 수송량이 확실히 크게 증가할 것으로 전망된다."
 gaudi.1141.f: "\"저 새로운 철도 노선에는 필요한 것은 뭐든 갖추고 있소! 선로 전환기에 난방 기능까지 갖춰져 있다고 해도 전혀 놀랍지 않을 것이오!\""
 gaudi.1141.g: "칙칙폭폭!"
 je_gaudi_construction_sector_project: "건설 부문 현대화"
 gaudi.1151.f: "\"벽을 쌓고 있는데 왠 말쑥한 정장 차림의 남자가 오더군. 그 사람이 자기가 생각해낸 비법을 쓰면 자재를 아낄 수 있다고 하더라고. 그런데 이것 봐라, 정말 되잖아! 저런 사무직 양반들도 제 할일을 하고 있을 줄은 몰랐단 말이지!\""
 gaudi.1151.g: "더 나은 건설은 더 많은 공장을 지을 수 있다는 뜻이지!"
