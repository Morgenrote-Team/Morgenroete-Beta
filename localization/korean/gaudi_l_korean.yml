 gaudi.1201.t: "최신 기관차"
 gaudi.1201.t_general: "웨스턴 & 애틀랜틱 철도#3 '제너럴'"
 gaudi.1201.t_forney: "'포니' 0-4-4T"
 gaudi.1201.t_e6: "E6 클래스 '애틀랜틱'"
 gaudi.1201.t_m_1000: "M-10000"
 gaudi.1201.t_gg1: "클래스 GG1"
 gaudi.1201.t_kkstb_30: "kkStB-라이에 30"
 gaudi.1201.t_fs_class_670: "FS 클래스 670"
 gaudi.1201.d: "드디어 우리 [concept_tesla_mechanical_engineer] [GetPlayer.MakeScope.GetCountry.GetCustom('gaudi_dr_engineer_type')](이)가 개발한 기관차가 [GetPlayer.GetAdjectiveNoFormatting] 철도망의 선로를 다니게 되었다! 앞으로 이 기관차들이 새로운 속도 기록을 낼 것이 분명하다."
 gaudi.1201.f: "\"이 공학 기술의 결정체를 봐주십시오! 정말 환상적이지 않습니까?\""
 gaudi.1201.f_general: "4-4-0 구조는 이미 그 우수성을 입증했다. 제너럴 호와 관련 차종은 틀림없이 미국의 주력마가 될 것이다!"
 gaudi.1201.f_forney: "포니 호는 크기가 작아 도시 철도의 급커브 구간을 잘 헤쳐나갈 수 있다는 점에서 기관차로는 도심지역에 가장 알맞다."
 gaudi.1201.f_e6: "E6 클래스 애틀랜틱 호는 부드러운 승차감을 선사하는 고속력 증기 기관차다. 주요 여객 노선에서 운용될 전망이다."
 gaudi.1201.f_m_1000: "M-10000은 유선형 가스전력 기관차로, 고속 주행이 가능하며 급행 노선에 이상적인 차량이다."
 gaudi.1201.f_gg1: "클래스 GG1은 놀라운 속도로 열차 견인이 가능한 유선형 전기 기관차이다. 이 기관차라면 분명 오랫동안 달릴 것이다!"
 gaudi.1201.f_kkstb_30: "kkStB-라이에 30 호는 증기와 연기가 발생하지 않는 연소 방식을 채택했다는 점에서 훌륭한 통근 열차로 삼을 만하다."
 gaudi.1201.f_fs_class_670: "FS 670 클래스는 기관차의 일반적인 배치 순서를 통째로 뒤집은 독특한 디자인을 지녔다. 운전실이 기관차 앞쪽에 위치하여 기관사에게 완벽한 시야를 제공한다."
 gaudi.1201.g: "경이로운 공학 기술일세!"
 je_gaudi_modernizing_industries_project: "생산 방식 현대화"
 gaudi_engineer_focus_building: "공학 집중 분야"
 gaudi.1211.f: "\"보시다시피 신형 기계로 필요한 노동자의 수가 세 명 줄었소. 이제 그 직원들은 다른 기계 세 대를 맡으면 되니 그만큼 훨씬 이득이 있겠지요. 이렇게 되면 새로운 요트도 하나 장만할 수 있겠소!\""
 gaudi.1211.g: "우리 수익이 폭등하겠군!"
