 gaudi.1441.t: "[GetPlayer.GetName]의 최신 $building_power_plant$"
 gaudi.1441.d: "우리 [concept_tesla_electrical_engineer] [GetPlayer.MakeScope.GetCountry.GetCustom('gaudi_dr_engineer_type')](은)는 케이블 개량부터 발전기 효율 개량까지 조국의 발전소와 전력 공급 시설의 수용량 확대를 위해 오랜 시간을 투자하였다.\n\n개량된 건물 수는 총 [GetPlayer.MakeScope.Var('mr_num_improved_power_plants_buildings_var').GetValue|V0]곳이다."
 gaudi.1441.f: "\"발전기의 출력이 훨씬 늘어났습니다. 실제로 제 직원 중 한 명이 실수로 피뢰침이 되는 바람에 발전기의 위력을 시험하게 되었죠.\""
 gaudi.1441.g: "무한한 동력!"
 tesla_civil_engineer_desc: "[Concept('concept_tesla_civil_engineer','$concept_tesla_civil_engineers$')]는 건설과 기반시설 사업에 주력하는 공학자입니다. 새로운 교량과 터널, 운하를 지을 수 있습니다."
 tesla_mechanical_engineer_desc: "[Concept('concept_tesla_mechanical_engineer','$concept_tesla_mechanical_engineers$')]는 새롭고 혁신적인 기계의 제작에 주력하고 있습니다. 어쩌면 고성능의 기관차나 혁신적인 증기 엔진을 만들어낼지도 모릅니다. 아니면 말 없이도 움직이는 차를 만들어낼 수도 있겠죠?"
 tesla_military_engineer_desc: "[Concept('concept_tesla_military_engineer','$concept_tesla_military_engineers$')]는 군 소속으로서 방어 시설의 확충이나 새롭고 혁신적인 병기 제작에 주력할 때가 많습니다."
 tesla_electrical_engineer_desc: "전기는 조명부터 전동기, 통신에 이르기까지 여러 혁신적인 용도로 활용할 수 있습니다. [Concept('concept_tesla_electrical_engineer','$concept_tesla_electrical_engineers$')]는 인류의 이익을 위한 전력의 활용 방안에 주력하고 있습니다."
 tesla_aeronautical_engineer_desc: "하늘을 날겠다는 꿈은 지나간 일입니다. 이제 인간이 정말로 하늘을 정복할 수 있게 된 지금, [Concept('concept_tesla_aeronautical_engineer','$concept_tesla_aeronautical_engineers$')]는 새로운 비행기와 비행선을 개발하여 사람들이 더 높이, 더 빨리, 더 멀리 날 수 있도록 하는 것을 목표로 삼고 있습니다."
