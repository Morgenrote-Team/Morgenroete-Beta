 gaudi.1161.t: "New Topographic Map of [GetPlayer.GetName]"
 gaudi.1161.d: "Our [concept_tesla_civil_engineer][GetPlayer.MakeScope.GetCountry.GetCustom('gaudi_dr_engineer_type')] finished a well crafted topographic map of [GetPlayer.GetName]. This map will help our Engineers to construct new infrastructure and buildings. Additionally it offers a good overview over [GetPlayer.GetNameNoFormatting]."
 gaudi.1161.f: "\"This is fantastic! I didnt't know I live so close to the next city. And even my garden shed is on the map!\""
 gaudi.1161.g: "I can see my house!"
 gaudi_good_topographic_map_modifier: "잘 만든 지형도"
 gaudi_topographic_state_map_modifier: "지형도"
 gaudi.2312.d: "The inferior material has taken its toll: this morning a section of the Palace of Westminster collapsed and caused considerable damage."
 je_gaudi_road_project_reason: "우리 [concept_tesla_civil_engineer] [GetPlayer.MakeScope.GetCountry.GetCustom('gaudi_dr_engineer_type')](이)가 [GetPlayer.GetName]의 도로를 확장하는 사업에 착수하였습니다. 이 사업은 매달 진행도를 획득합니다. 진행도가 [JournalEntry.GetTotalGoalValue|V0]에 도달하면 사용 가능한 기반 시설이 가장 적은 주에 $gaudi_modern_roads_modifier_with_tooltip$ [concept_modifier]이 부여됩니다.\n\n현재 월간 진행도: #underline #tooltip:[GetRawTextTooltipTag('gaudi_monthly_civil_research_progress_tt')] [GetPlayer.MakeScope.GetVariable('gaudi_monthly_civil_engineering_progress_var').GetValue|2+] #!#!"
