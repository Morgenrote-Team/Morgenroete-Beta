 gaudi.530.tt: "이 선택지는 우리가 아르누보를 처음 만들어냈으므로 가능합니다."
 je_gaudi_secession_1: "제1차 아르누보 분리파"
 je_gaudi_secession_1_reason: "아르누보라 불린 새로운 예술 운동이 수많은 예술가들을 매료시키고 있습니다. 일정 환경 내에서 국제적인 명성을 얻고, 회화와 건축에 새로운 활력을 불어넣는 확고한 예술 운동으로 나아갈 수 있습니다. 실제 역사에서 이러한 유형의 가장 중요한 집단으로 '빈 분리파'가 꼽힙니다. 빈 분리파, 정확한 명칭으로 오스트리아 예술가 협회는 19세기 말 빈에서 활동했던 예술가 단체입니다. 이 점에 착안하여 빈에서 유행한 아르누보 양식을 분리파 양식 또는 빈 아르누보라고도 부릅니다."
 je_gaudi_secession_2: "제2차 아르누보 분리파"
 je_gaudi_secession_2_reason: "아르누보라 불린 새로운 예술 운동이 수많은 예술가들을 매료시키고 있습니다. 일정 환경 내에서 국제적인 명성을 얻고, 회화와 건축에 새로운 활력을 불어넣는 확고한 예술 운동으로 나아갈 수 있습니다. 실제 역사에서 이러한 유형의 가장 중요한 집단으로 '빈 분리파'가 꼽힙니다. 빈 분리파, 정확한 명칭으로 오스트리아 예술가 협회는 19세기 말 빈에서 활동했던 예술가 단체입니다. 이 점에 착안하여 빈에서 유행한 아르누보 양식을 분리파 양식 또는 빈 아르누보라고도 부릅니다."
 je_gaudi_secession_3: "제3차 아르누보 분리파"
 je_gaudi_secession_3_reason: "아르누보라 불린 새로운 예술 운동이 수많은 예술가들을 매료시키고 있습니다. 일정 환경 내에서 국제적인 명성을 얻고, 회화와 건축에 새로운 활력을 불어넣는 확고한 예술 운동으로 나아갈 수 있습니다. 실제 역사에서 이러한 유형의 가장 중요한 집단으로 '빈 분리파'가 꼽힙니다. 빈 분리파, 정확한 명칭으로 오스트리아 예술가 협회는 19세기 말 빈에서 활동했던 예술가 단체입니다. 이 점에 착안하여 빈에서 유행한 아르누보 양식을 분리파 양식 또는 빈 아르누보라고도 부릅니다."
 je_gaudi_splendid_architecture: "장엄한 신건축"
 je_gaudi_splendid_architecture_reason: "아르누보와 아르데코의 도입으로 건축가들은 과거의 경직된 역사주의를 타파하는 식으로 예술계를 뒤바꿔놓았다. 그러나 여러 모더니즘 사조와는 달리 이들의 건축은 단순히 기능성과 즉물성을 표현한 것이 아니었다. 아르데코는 고전 모더니즘의 전반적인 부흥 속에서 일궈낸 하나의 발전으로서, 형태의 우아함, 재료의 고급스러움, 색채의 강렬함, 주제의 관능미가 조화롭게 어우러졌다. 전성기 아르데코는 사치와 화려함, 풍요, 사회 기술 발전에 대한 신뢰를 상징했다. 이러한 원칙들을 존중하는 건축은 조국을 근대성과 부의 얼굴로 탈바꿈할 것이다."
 je_gaudi_splendid_architecture_goal: "#E 장엄한 건축#!이 #BLUE 10#!에 도달함. 현재 @gaudi_architectural_splendour! #G [ROOT.Var('gaudi_splendid_architecture').GetValue]점#! 보유. 일지 항목을 통해 아르누보 구역, 아르데코 영화관, 아르데코 빌딩, 아르데코 사옥, 아르데코 공항을 건설하면 추가 점수가 부여됩니다."
 je_gaudi_art_nouveau_quarter: "아르누보 지구"
 je_gaudi_art_nouveau_quarter_reason: "1890년대 벨기에 브뤼셀에서 폴 한카르, 헨리 반 데 벨데, 그리고 특히 빅토르 오르타가 설계한 타셀 호텔(1893년 완공)로 최초의 아르누보 양식 주택과 실내 장식이 등장했습니다. 아르누보 양식은 곧바로 프랑스 파리로 전파되었고, 브뤼셀에서 오르타의 작품을 접한 헥토르 기마르가 파리 지하철 입구에 그 양식을 적용하면서 한층 발전시켰습니다. 벨기에와 프랑스를 시작으로 아르누보는 유럽 전역으로 퍼져나가며 각 나라마다 다른 이름과 특징을 지니게 되었습니다. 아르누보는 수도뿐만 아니라 빠른 성장과 함께 예술적 정체성을 세우려던 도시(이탈리아의 토리노와 팔레르모, 스코틀랜드의 글래스고, 독일의 뮌헨과 다름슈타트)와 독립 운동의 중심지(당시 러시아 제국의 일부였던 핀란드의 헬싱키, 스페인 카탈루냐의 바르셀로나)에서도 흔히 모습을 보이게 되었습니다."
 je_gaudi_art_deco_cinema: "아르데코 영화관"
 je_gaudi_art_deco_cinema_reason: "아르데코 양식 건축물 가운데 제일 보존 상태가 좋은 것으로 꼽히는 사례들은 대부분 1920년대~1930년대에 지어진 영화관들입니다. 아르데코 시대는 무성영화에서 유성영화로의 전환과 맞물려 있었고, 영화사들은 영화를 보려는 수많은 관객을 끌어들이기 위해 주요 도시에 대형 영화관을 건설했습니다. 1920년대 영화관들은 이국적인 테마와 아르데코 스타일을 조합한 사례가 많았습니다. 할리우드의 그라우만 이집션 극장(1922년)은 고대 이집트 무덤과 피라미드에서 영감을 받았고, 캘리포니아 베이커스필드의 폭스 극장은 아르데코 양식의 홀에 캘리포니아 선교 건축양식의 탑을 덧붙였습니다."
 je_gaudi_art_deco_skyscraper: "아르데코 빌딩"
 je_gaudi_art_deco_skyscraper_reason: "고층빌딩은 현대의 종탑과도 같다. 하지만 고유의 종소리가 없는 종탑은 무슨 의미가 있는가? 아르데코 스타일로 고층 빌딩을 꾸미는 것은 전 세계의 찬사를 이끌어낼 훌륭한 사업이 될 것이다."
 je_gaudi_art_deco_airport: "아르데코 공항"
 je_gaudi_art_deco_airport_reason: "한때 유럽인들은 카라벨선을 타고 대양으로 나서, 알려진 세계와 미지의 대륙을 연결했습니다. 이제 항공 시대가 도래하면서, 이전에는 폐쇄됐던 국경들이 열리고 있습니다. 새로운 비행선의 항구를 맞이하기에 이보다 더 적합한 양식이 있을까요? 화려하고 트렌디한 아르데코 양식과 비교할 만한 것이 있을까요? 비행사들이여, 태양에게 안녕!"
 je_gaudi_art_deco_office: "아르데코 사옥"
 je_gaudi_art_deco_office_reason: "아르데코 양식은 상업 현장과 오락 산업을 지배하였지만, 각국 정부 역시 국가 번영을 강조하고 자국민으로 하여금 떠오르는 국가에 산다는 느낌을 줄 수 있도록 현대적인 건물로 감동을 선사하고자 하였습니다."
 je_gaudi_bauhaus: "바우하우스"
 je_gaudi_bauhaus_reason: "바우하우스는 공예와 순수미술을 조화한다는 취지에서 1919년부터 1933년까지 운영된 독일의 예술 학교입니다. 바우하우스는 개인의 예술적 관점과 대량 생산의 원칙, 기능성을 중시하는 고유의 디자인 철학으로 유명해졌습니다. 모든 예술 분야를 궁극적으로 결합하여 '종합예술작품'(Gesamtkunstwerk, 게잠트쿤스트베르크)을 창조한다는 이념을 바탕으로 설립되었습니다. 바우하우스 양식은 이후 현대 디자인, 현대 건축, 건축 교육에 가장 큰 영향을 끼친 사조로 거듭나게 되었습니다."
 je_gaudi_summer_burn: "이화원 방화"
 je_gaudi_summer_burn_reason: "이화원은 18세기 초부터 청나라 황실이 실질적으로 머무르던 거처로, 중국의 위대함과 웅장함을 상징하는 곳이다. 이화원의 파괴는 적에게 상당한 굴욕감을 안겨줄 뿐만 아니라 귀중한 약탈품을 획득할 기회를 만들기도 했다."
 je_gaudi_summer_burn_success: "#T 북경#! 수도 지역 전체를 점령"
 je_gaudi_ben_burn: "빅벤 방화"
 je_gaudi_ben_burn_reason: "영국은 웨스트민스터 의사당 화재를 계기로 제국의 위엄을 강조하는 새롭고 상징적인 의사당 건물을 지었다. 어쩌면 또 다른 화재를 통해 영국인들의 자만심을 현실로 되돌려야 할 때가 온 것일지도 모른다."
 je_gaudi_ben_burn_success: "#T 홈 컨트리스#! 수도 지역 전체를 점령"
 je_gaudi_dombau_phase_1: "쾰른 대성당: 건설 재개"
 je_gaudi_dombau_phase_1_reason: "쾰른 대성당은 세계에서 가장 완벽한 고딕 성당으로 평가받고 있다. 13세기에 착공된 쾰른 대성당은 거대한 규모를 자랑하고 있다. 성가대 건물이 완공되고 한동안 진척을 보이지 못했던 공사는 15세기에 완전히 중단되고 말았다. 현재까지도 중세 후기에 쓰였던 건설용 크레인이 미완성된 남쪽 탑 위로 솟아 있는 모습이다. 독일 부르주아 계층 사이에서 민족주의와 낭만주의 감정이 부활하고, 무엇보다도 원본 건축 설계도가 다시 발견되었다는 소식이 널리 퍼지면서, 쾰른 대성당의 완공은 단순히 신의 영광을 위한 사업에 그칠 것이 아니라 독일 문화와 독일 민족의 통일을 상징한다는 인식이 생겨나기 시작하였다."
 je_gaudi_dombau_phase_1_goal: "#E 건설 진행도#!가 #BLUE 120점#! 도달. 현재 #G [GetGlobalVariable('gaudi_dombau_progress').GetValue]#!점을 보유하고 있습니다. 보통 달마다 1점씩 획득합니다."
 je_gaudi_dombau_phase_2: "쾰른 대성당: 남측 정면"
 je_gaudi_dombau_phase_2_reason: "수년 간의 공사가 진행된 끝에 건축가들은 성당 남측 정면의 공사와 장식에 착수하게 되었다. 남측 정면은 풍부한 조각 장식을 갖추며 독일 조소의 정점일 뿐만 아니라 고딕 부활 건축의 대표작으로 손꼽히고 있다. 정면 하나에만 13년의 공사 시간이 소요되었고 장식하여 마무리하는 데에는 18년의 시간이 소요되었다."
 je_gaudi_dombau_phase_2_goal: "#E 건설 진행도#!가 #BLUE 120점#! 도달. 현재 #G [GetGlobalVariable('gaudi_dombau_progress').GetValue]#!점을 보유하고 있습니다. 보통 달마다 1점씩 획득합니다."
 je_gaudi_dombau_phase_3: "쾰른 대성당: 지붕 구조물"
 je_gaudi_dombau_phase_3_reason: "쾰른 대성당의 설계는 고딕 양식의 이상에 근간을 두었음에도 대표 시공사들이 당대 최신의 건축 자재를 사용하는 것을 막지는 못했다. 지붕 구조물은 철강으로 만들어졌으며 에펠탑이 지어지기 전까지 세계에서 가장 큰 철강 구조물로 등극하게 되었다. 이러한 결정 덕에 지붕 구조물은 제2차 세계 대전 시기 연합군의 폭격에 직면하였음에도 살아남을 수 있었다."
