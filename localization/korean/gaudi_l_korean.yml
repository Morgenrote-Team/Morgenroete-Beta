 gaudi.1321.t: "신형 진지 개발"
 gaudi.1321.d: "우리 [concept_tesla_military_engineer] [GetPlayer.MakeScope.GetCountry.GetCustom('gaudi_dr_engineer_type')](은)는 국군을 위해 수년 동안 신형 진지와 방어 시설의 개발에 공들여 왔다. 이제 우리 장병들은 진지와 방어 시설을 활용하여 더욱 발전된 방법으로 자신들을 보호할 수 있게 되었다."
 gaudi.1321.f: "\"쥐나 해충이 들어오는 것만 제외하면 이 방어 시설은 정말 안전하오!\""
 gaudi.1321.g: "강력한 방어력은 우리 장병들의 생명을 지킨다!"
