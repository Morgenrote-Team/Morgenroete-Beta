l_korean:
 mr_swe_nor_union_decision_1: "노르웨이의 새로운 총독 임명"
 mr_swe_nor_union_decision_1_desc: "크리스티아니아의 해당 직위는 현재 공석입니다. 왕이 부재한 가운데 노르웨이 정부의 새 수장을 임명할 사람을 결정해야 합니다."
 mr_swe_nor_union_decision_2: "우리 장관들이 의회 토론에 참여할 수 있도록 요구"
 mr_swe_nor_union_decision_2_desc: "현재 장관들은 노르웨이 국회에서 발언이 금지되어 있습니다. 이것은 용납할 수 없습니다."
 mr_swe_nor_union_decision_3: "우리 국기에서 연합의 모든 상징을 제거할 것을 요구"
 mr_swe_nor_union_decision_3_desc: "노조 기호가 없는 깨끗한 노르웨이 국기를 사용해야 합니다."
 mr_swe_nor_union_decision_4: "노르웨이 영사관 수요"
 mr_swe_nor_union_decision_4_desc: "노르웨이 해운량이 증가하면서 스웨덴 영사관만으로는 역부족인 상황이다. 노르웨이 영사관이 필요하다."
 mr_swe_nor_union_decision_5: "칼 15세 국왕에게 약속을 이행할 것을 요구"
 mr_swe_nor_union_decision_5_desc: "스웨덴과 노르웨이의 왕으로서 칼 15세가 즉위한 만큼, 이제 그가 약속한 총독직 폐지 약속을 이행할 때입니다."
 da_appoint_governor_general: "총독 임명"
 da_appoint_governor_general_desc: "[concept_subject]의 총독을 변경합니다. 선택된 후보에 따라 [concept_liberty_desire]가 변동될 수 있습니다."
 da_appoint_governor_general_action_name: "총독 임명"
 da_appoint_governor_general_action_notification_name: "[TARGET_COUNTRY.GetName]의 새 총독 임명"
 da_appoint_governor_general_action_notification_desc: "[INITIATOR_COUNTRY.GetName]가 [TARGET_COUNTRY.GetName]의 총독을 새로운 인사로 교체했습니다."
 da_appoint_governor_general_action_notification_third_party_name: "[TARGET_COUNTRY.GetName]의 새 총독 임명"
 da_appoint_governor_general_action_notification_third_party_desc: "[INITIATOR_COUNTRY.GetName]가 [TARGET_COUNTRY.GetName]의 총독을 새로운 인사로 교체했습니다."
 mr_swe_nor_union_event.1.t: "새로운 총독 임명"
 mr_swe_nor_union_event.1.d: "크리스티아니아의 총독직이 공석으로 남아 있다. 아무래도 이 직책을 맡을 사람을 알아보는 것이 좋을 것 같다."
 mr_swe_nor_union_event.1.f: "1814년 노르웨이 헌법에 따르면, 스톡홀름에 거주하는 국왕이 부재할 때 노르웨이 정부를 이끌 총독은 스웨덴 또는 노르웨이 국적자 중 임명할 수 있습니다. 그러나 스웨덴에서는 스웨덴 국왕을 대리하는 총독이 스웨덴 국적자여야 한다고 보는 사람이 많습니다. 반대의 경우는 국가 안보를 위태롭게 할 가능성이 있다고 여겨집니다."
 mr_swe_nor_union_event.1.a: "스웨덴 총독 임명"
 mr_swe_nor_union_event.1.b: "노르웨이 총독 임명"
 mr_swe_nor_union_event.1.c: "다음 5년간 해당 직위를 공석으로 둡니다."
 mr_swe_nor_union_event.2.t: "노르웨이 장관"
 mr_swe_nor_union_event.2.d: "노르웨이 국회는 노르웨이 장관들이 국회 토론에 참여하는 것을 허용하였다."
 mr_swe_nor_union_event.2.f: "노르웨이의 의회인 노르웨이 국회는 노르웨이 장관들이 국회 토론과 협상에 참여하는 것을 허용하는 안건에 찬성표를 던졌습니다. 이제 그들은 국왕의 승인을 기다리고 있습니다."
 mr_swe_nor_union_event.2.a: "그들의 결정을 인정하지 않겠다."
 mr_swe_nor_union_event.2.b: "결정을 승인하겠다."
 mr_swe_nor_union_event.3.t: "노르웨이 국기"
 mr_swe_nor_union_event.3.d: "노르웨이가 깔끔한 노르웨이 국기를 사용할 권리를 요구하고 있다."
 mr_swe_nor_union_event.3.f: "노르웨이의 의회인 노르웨이 국회는 스웨덴-노르웨이 연합의 상징이 없는 새로운 '깨끗한' 깃발을 채택하기로 표결했습니다. 그들의 결정을 승인할까요, 아니면 자신들이 원하는 깃발을 사용할 권리를 부인할까요?"
 mr_swe_nor_union_event.3.a: "현재 깃발을 유지하라고 해라."
 mr_swe_nor_union_event.3.b: "원하는 깃발을 사용하게 하라."
 mr_swe_nor_union_event.4.t: "노르웨이 영사관"
 mr_swe_nor_union_event.4.d: "노르웨이가 전 세계에 자국 영사관을 개설할 권리를 요구하고 있다."
 mr_swe_nor_union_event.4.f: "연합의 영사관은 스톡홀름의 외무부가 운영해 왔으나, 노르웨이 해운업이 중요성을 더해가면서 노르웨이 측은 노르웨이 영사관이 필요하다고 주장하고 있습니다.\n스웨덴에서는 이 노르웨이의 요구를 노르웨이 외교 서비스 설립을 위한 첫걸음이자, 향후 노르웨이 독립 요구로 이어질 가능성으로 보고 있습니다."
 mr_swe_nor_union_event.4.a: "사무소엔 문제가 없다."
 mr_swe_nor_union_event.4.b: "사무소는 많을수록 좋다."
 mr_swe_nor_union_event.5.t: "칼 15세의 약속"
 mr_swe_nor_union_event.5.d: "노르웨이는 새로운 왕 칼 15세가 크리스티아니아의 총독 직위를 폐지하겠다는 약속을 이행할 것을 요구하고 있다."
 mr_swe_nor_union_event.5.f: "왕위 계승자로서 노르웨이 국민에게 약속하는 것과 두 나라의 통치자가 되는 것은 전혀 다른 문제입니다. 약속대로 총독 직위를 폐지하고, 크리스티아니아에 노르웨이 총리로 대체하는 것이 옳을까요?"
 mr_swe_nor_union_event.5.a: "우리는 크리스티아니아에 우리 사람을 배치해야 한다."
 mr_swe_nor_union_event.5.b: "약속은 지켜야 한다."
 mr_swe_nor_union_event.6.t: "왕세자의 약속"
 mr_swe_nor_union_event.6.d: "왕위 계승자 칼 베르나도트가 대관식을 계기로 크리스티아니아의 총독 직위를 폐지하겠다고 약속했다."
 mr_swe_nor_union_event.6.f: "노르웨이 국민들의 지지를 얻기 위해, 미래의 국왕은 대관식에서 크리스티아니아 총독 직위를 반드시 폐지하겠다고 엄숙히 약속했습니다. 이에 대해 스웨덴 지주들과 군부의 반응은 예상대로 젊은 왕세자의 제안에 그림자를 드리우고 있습니다."
 mr_swe_nor_union_event.6.a: "그가 자신이 무엇을 하고 있는지 알고 있기를 바란다."
 mr_swe_nor_union_concessions_none: "노르웨이에 대한 양보 거부"
 mr_swe_nor_union_concessions_minor: "노르웨이에 대한 사소한 양보"
 mr_swe_nor_union_concessions_major: "노르웨이에 대한 중대한 양보"
 mr_swe_nor_clean_flag: "노르웨이, 국기에서 모든 노동조합 상징 제거"