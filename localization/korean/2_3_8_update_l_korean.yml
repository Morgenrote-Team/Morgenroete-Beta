 MR_AUTOMATE_PALEONTOLOGIST_TT: "#T 자동화 [concept_dubois_paleontologist]#! \n자동화하면 고생물학자에게 더 이상 작업을 주지 않아도 됩니다.\n그들은 독립적으로 일하며 현재 적합한 작업을 수행하게 됩니다. 여전히 [Concept('concept_dubois_paleontological_expedition','$concept_dubois_paleontological_expeditions$')] 또는 [Concept('concept_dubois_paleontological_team','$concept_dubois_paleontological_teams$')] 을 설정해야 합니다. 이벤트도 계속 받게 됩니다." #deepl:1919857505
