 MR_VENUS_TRANSIT_1874_EXPEDITION_BUTTON_TT: "#T 금성 통과 관측#!\n19세기 가장 중요한 천문학적 사건 중 하나인 금성 통과를 관측할 수 있는 기회는 1872년과 1884년입니다. 목표 연도 2년 전부터 준비하면 이 기회를 놓치지 않을 수 있습니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:3310758031
