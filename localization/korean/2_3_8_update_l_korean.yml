 MR_FOOTBALL_WORLDCUP_FOOTBALL_ASSOCIATION_TRIGGER_TT: "#기본_텍스트 최소 #G 10#! 축구 협회가 있는 국가가 있습니다.#!" #deepl:1475904503
 MR_HIRE_COACH_BUTTON: "국가대표 코치 고용" #deepl:1754227168
 MR_HIRE_COACH_BUTTON_TT: "#T 국가대표 코치 고용하기#!\FIFA가 창립되고 첫 국제 경기가 열린 후 국가대표 코치를 고용할 수 있습니다. 국가대표 코치는 경기 결과 향상에 자신의 기술을 기여합니다. 코치가 기대에 부응하지 못하면 최소 3년이 지나면 교체될 수 있습니다\n\n.[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:3011015130
