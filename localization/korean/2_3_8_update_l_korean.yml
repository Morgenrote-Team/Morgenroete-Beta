 nationalization.11.d: "[TimeKeeper.GetCurrentDate.Format('y')] 에서 이탈리아는 요리 문화를 영원히 바꿔놓을 획기적인 요리책의 출간을 목격했습니다. 저자 펠레그리노 아르투시는 이탈리아의 단합과 위대함을 강조하는 국제적으로 인정받는 이탈리아 요리를 확립하는 데 기여하게 됩니다." #deepl:4223602969
 nationalization.11.f: "1891년에 출간된 펠레그리노 아르투시의 '라 스켄치나 인 쿠치나와 라 아르테 디 망시아레 베네'는 최초의 현대 이탈리아 요리책으로 널리 알려져 있습니다. 이탈리아가 이제 막 국가 정체성을 확립하기 시작하던 시기에 아르투시의 작품은 다양한 지역 요리를 일관된 국가 요리 전통으로 통합하는 데 중추적인 역할을 했습니다. 재치와 명료함이 돋보이는 그의 세심한 레시피 모음은 요리 문학의 새로운 기준을 세웠을 뿐만 아니라 지역 요리의 품질, 혁신, 자부심을 고취하여 국가 생활 수준을 향상시키는 데 크게 기여했습니다." #deepl:2207143835
 nationalization.11.g: "요리 예술의 승리!" #deepl:1345745332
 nationalization.11.t: "요리 과학과 잘 보관하는 기술" #deepl:3987888764
 pius.101.d: "프랑스 남동부 산속에서 두 명의 어린이가 성모 마리아의 발현을 목격했다고 주장하면서 가톨릭 세계 전체에 영적 열광과 우려의 물결이 일고 있습니다." #deepl:1912784731
 pius.101.f: "'얘들아, 가까이 와라, 두려워하지 마라. 내가 너희에게 좋은 소식을 전하러 왔다...'\n\n프랑스 남동부 코프스 근처의 라 살레트 마을 위 고산 목초지 높은 곳에서 두 명의 양치기 어린이가 기독교계의 마음을 뒤흔드는 환상을 목격했다고 보고했습니다. 빛으로 빛나고 슬픔에 잠긴 한 여인이 그들에게 나타났습니다. 그 여인은 하나님을 외면한 세상에 대해 눈물을 흘리며 울부짖었습니다. 그녀는 부끄러움 없이 행해지는 신성 모독과 모독당한 주일, 인류가 회개하지 않으면 다가올 기근과 파멸에 대해 이야기했습니다."n 처음에는 소박한 전설처럼 보였던 것이 이제는 하나의 운동이 되었습니다. 순례자들이 외딴 산비탈로 몰려들었습니다. 수도사들과 기자들이 같은 길을 오르고 있습니다. 교회는 흔들립니다. 어떤 이들은 이 환상을 참회에 대한 신성한 부르심으로 받아들이고, 어떤 이들은 대중적인 신비주의와 비이성적 열광의 부상을 우려합니다.\n그르노블 주교는 신중한 승인을 내립니다. 세속 당국은 여전히 의구심을 품고 있습니다.\n그리고 로마는? 로마는 침묵으로 일관합니다. 하지만 이미 종은 울리고 있습니다." #deepl:2145205681
 pius.101.g: "하늘의 경고입니다." #deepl:3313498992
 pius.101.h: "이성을 유지하세요." #deepl:499500707
 pius.101.t: "라 살레뜨의 유령" #deepl:3065761669
 pius.102.d: "작은 마을 루르드에서 열네 살 소녀가 동굴에서 빛나는 여인을 봤다고 주장합니다. 소녀의 환영은 곧 순례자들과 논란을 불러일으키고 로마의 관심을 끌게 됩니다." #deepl:1624678567
 pius.102.f: "'그녀는 젊고, 맨발에 가난했다. 하지만 그녀는 어떤 말로도 설명할 수 없는 아름다움을 이야기했습니다.'\n\n피레네 산기슭 루르드 근처의 외딴 동굴에서 베르나데트 수비루스라는 시골 소녀가 하얀 옷을 입고 푸른 띠를 두르고 발에 황금빛 장미를 꽂은 여인에 대해 이야기합니다. 환상은 처음에는 아무 말도 하지 않고 미소만 짓습니다. 그런 다음 그녀는 참회, 기도, 고통, 하느님의 자비에 대해 말합니다. 성모님은 자신의 이름을 간단하게 말씀하십니다: 원죄 없는 잉태입니다." 처음에는 마을 사람들이 비웃습니다. 하지만 베르나데트가 숨겨진 샘을 발견하고 그것이 치유의 원천이라고 주장하자 수천 명의 사람들이 희망과 기도, 눈물을 흘리며 찾아오기 시작합니다. 목발을 짚은 채로. 입소문이 퍼집니다. 회의론자들은 히스테리라고 비난합니다. 의사, 사제, 정치인들이 루르드로 내려오고 교회는 조사에 들어갑니다. 국가는 경계심을 보입니다. 그럼에도 사람들은 찾아옵니다." #deepl:580789021
 pius.102.g: "치유와 희망의 신전." #deepl:2629250679
 pius.102.h: "환각!" #deepl:3891021600
 pius.102.t: "루르드에서의 발현" #deepl:1767463178
 pius.103.d: "아일랜드의 노크 마을에서 15명의 목격자가 성모 마리아, 성 요셉, 성 요한 전도자의 조용한 유령을 목격했다고 보고합니다. 이 환상은 오랫동안 가난과 망명, 외세의 지배에 시달리던 사람들을 뒤흔듭니다." #deepl:143567078
 pius.103.f: "'그들은 아무 말도 하지 않았습니다. 그러나 그 침묵 속에서 한 국가는 희망을 들었습니다.'\n\n마요 카운티의 노크 교구 교회에는 비가 계속 쏟아졌습니다. 하지만 마을 주민 열다섯 명은 넋을 잃은 채 서 있었습니다. 그들 앞에는 남쪽 박공 벽에 햇빛을 받으며 기도하는 자세를 취한 성모 마리아와 그 곁에 있는 성 요셉, 옷을 입고 복음서를 든 전도자 성 요한이 조용히 서 있었습니다. 그 뒤에는 제단 위에 놓인 어린 양과 십자가가 있었습니다. \n아무 말도 하지 않았습니다. 아무런 움직임도 없었습니다. 그럼에도 목격자들은 남녀노소 할 것 없이 자신이 본 것을 맹세했습니다. \n기근과 이민, 영적 갈망으로 지친 이 땅에서 조용한 환상은 설교보다 더 크게 울려 퍼졌습니다. 순례자들은 곧 치유와 표적, 위로를 구하며 이곳에 도착했습니다. 영국 당국은 비웃었습니다. 교회 내 일부 사람들은 망설였습니다. 하지만 아일랜드의 가난하고 독실한 신자들 사이에서 노크는 존엄을 향한 거룩한 외침이 되었습니다." #deepl:216954390
 pius.103.g: "빗속의 빛." #deepl:4199802423
 pius.103.h: "민속으로 무시합니다." #deepl:2853965001
 pius.103.t: "노크의 조용한 비전" #deepl:3086062832
 pius.104.d: "포르투갈 중부에서 세 명의 양치기 어린이가 성모 마리아의 반복적인 발현을 보고하고 수천 명이 목격한 기적적인 현상으로 절정에 달합니다. 이들의 환상에는 전쟁과 고통, 교회의 미래에 대한 예언이 담겨 있습니다." #deepl:3494130064
 pius.104.f: "'결국 나의 성모 마리아가 승리할 것이다'\n\n코바 다 이리아의 시골 언덕에 있는 파티마 마을 근처에서 루시아, 프란시스코, 자킨타 세 아이는 태양보다 더 밝은, 빛과 슬픔으로 옷을 입은 한 여인에 대해 이야기합니다. 6개월이 넘는 시간 동안 그녀는 계속해서 나타나 세계 전쟁, 경건하지 않은 이데올로기의 부상, 신자들에 대한 박해에 대해 경고합니다. 1917년 10월 13일, 수만 명의 군중이 쏟아지는 비를 맞으며 서 있는 가운데 태양이 하늘에서 떨어져 나와 하늘에서 빙글빙글 돌며 충돌하는 것처럼 보입니다. 어떤 이들은 무릎을 꿇고 쓰러집니다. 다른 이들은 도망칩니다. 빛이 사라지자 그들의 옷은 말라버립니다. 군중은 경외심과 두려움에 휩싸여 조용히 흩어집니다.\n교회는 신중합니다. 언론은 분열되어 있습니다. 그러나 사람들, 특히 가난한 이들, 상처 입은 이들, 신자들 사이에서 희망의 불꽃, 경고의 불꽃, 성모님을 어머니일 뿐만 아니라 다가올 시대의 파수꾼으로 보는 새로운 불꽃이 타오릅니다." #deepl:2513437425
 pius.104.g: "파티마의 경고에 귀를 기울이세요." #deepl:1664428204
 pius.104.h: "태양의 기적을 파헤치다." #deepl:958137642
 pius.104.t: "파티마의 비밀" #deepl:1100906175
 pius.105.d: "[SCOPE.sState('pius_marian_apparition_state').GetFarmHubName] 근처의 한 외딴 마을에서 성모 마리아의 유령이 나타났다는 보고가 나옵니다. 이 이야기는 순례자, 회의론자, 교회 당국의 관심을 끌며 빠르게 퍼져나갑니다." #deepl:45703861
 pius.105.f: "'그녀는 빛의 면류관을 쓰고 들판 위에 서서 모든 영혼의 슬픔을 아는 듯 우리를 바라보았다.'\n\n처음 말을 꺼낸 사람은 경외감으로 눈을 크게 뜨고 목소리를 떨리는 아이였습니다. 그는 새벽보다 더 밝고 광채와 슬픔에 가려진 여인이 침묵 속에 나타나 깊은 슬픔을 알고 세상을 지켜보고 있다고 말했습니다. 다른 사람들도 그녀를 보았다고 주장했습니다. 어떤 이들은 무릎을 꿇었습니다. 다른 이들은 도망쳤습니다. 모두 그 후의 고요함을 기억했습니다.\n그 이야기는 마을 너머로 퍼졌습니다. 순례자들이 촛불을 들고 도착했습니다. 신자들은 기도했습니다. 고통받는 이들은 희망을 품었다. 사제들은 토론을 벌였다. 관리들은 눈살을 찌푸렸다. 그러나 사람들은 확신이 아니라 믿어야 한다는 더 오래된 무언가에 이끌려 계속 모여들었습니다.\n기적이든, 환상이든, 신화가든, 이 사건은 이미 목격한 사람들의 마음과 이제 그 의미를 결정해야 하는 사람들의 삶을 형성했습니다." #deepl:3063415784
 pius.105.g: "신자들을 위한 표시." #deepl:1177288670
 pius.105.h: "히스테리를 억제하세요." #deepl:1037767630
 pius.105.t: "성모님 [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName]" #deepl:4095895438
 pius.111.d: "공개 전시를 금지하는 공식적인 명령에도 불구하고 많은 신자들이 자발적으로 마리아 발현 장소( [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName])를 향해 행렬을 시작했습니다." #deepl:3379456873
 pius.111.f: "'우리는 횃불을 밝히지도 않았고 깃발도 들지 않았습니다. 오직 묵주와 침묵, 그리고 흙먼지를 밟는 발만 있었을 뿐입니다."\n\n그들은 새벽에 두세 명씩 삼삼오오 모여 들판과 마을을 걸으며 기도를 속삭였습니다. 정오가 되자 수백 명이 시골길을 따라 몰려들었고, 일부는 맨발로, 일부는 울면서 걸어왔습니다. 여자들은 꽃을 들고 있었습니다. 노인들은 교독문을 중얼거렸다. 아이들은 나무로 조각한 성화를 움켜쥐고 있었습니다.\n당국은 현장 폐쇄를 선언했습니다. 군인들이 보초를 섰다. 하지만 아무도 군중을 막지 않았다. 아마도 노래 때문이었을 것이다. 침묵 때문이었을지도 모른다. 보이지 않는 무언가였을지도 모릅니다. 신자들은 환상의 장소에 도착하자 무릎을 꿇고 중얼거리며 기도를 하고 촛불을 밝혔습니다. 하늘에서 천둥 같은 소리가 들리지 않았습니다. 기적도 목격되지 않았습니다. 하지만 이미 무언가 바뀌고 있었습니다. 사람들은 법을 거스르는 것이 아니라 법보다 더 오래된 무언가에 순종하여 행동했습니다." #deepl:2369382513
 pius.111.g: "기도하게 하세요." #deepl:2163336687
 pius.111.h: "조용히 관찰하세요." #deepl:3862482018
 pius.111.h_tt: "마리아 발현 이후 추가 이벤트가 발생할 가능성이 높습니다." #deepl:2612943668
 pius.111.i: "강제로 해산합니다." #deepl:1733449904
 pius.111.i_tt: "유혈 충돌이 발생할 가능성이 매우 높습니다." #deepl:202372566
 pius.111.t: "금지된 행렬" #deepl:3613794317
 pius.112.d: "금지된 마리아 행렬이 열리는 현장에서 당국과 신자들 간의 대립이 폭력적으로 변했습니다. 한때 환상으로 희망을 불러일으켰던 땅은 이제 피의 얼룩으로 얼룩져 있습니다." #deepl:2719807490
 pius.112.f: "'기도 소리가 들리더니 비명 소리가 들렸습니다.'\n\n군인들이 도착했을 때 촛불은 여전히 깜빡이고 있었습니다. 혼란에 휩싸였다가 애원하는 목소리가 높아졌다. 한 여자가 쓰러졌다. 한 소년이 울부짖었다. 누가 명령을 내렸는지는 아무도 모르지만 총소리가 울리고, 곤봉이 휘둘리고, 군화가 향과 흙 사이로 움직였다. 침묵이 돌아왔을 때 이전보다 더 무거웠습니다. 교회가 흔들립니다. 신자들은 분노했습니다. 언론은 조용한 어조로 보도하며 일부는 사고라고, 또 다른 일부는 학살이라고 말합니다. 한때 거룩하다고 속삭이던 성지는 이제 기억의 저주를 받았습니다. 하지만 여전히 사람들은 꽃이 아닌 분노와 침묵, 어떤 법으로도 꺼뜨릴 수 없는 시선으로 모입니다." #deepl:2186004653
 pius.112.g: "이번 일을 유감스럽게 생각합니다." #deepl:3313805008
 pius.112.h: "스스로 자초한 일입니다." #deepl:402397332
 pius.112.t: "성지의 피" #deepl:1312740775
 pius.113.d: "한 지역 사제가 [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName] 에서 마리아 발현을 옹호하는 대표적 인물로 떠올랐습니다. 그의 설교는 군중을 모으고 희망을 불러일으키며 국가 권위에 도전합니다. 그의 이름은 신부 [SCOPE.sCharacter('pius_marian_priest_scope').GetFirstName] 입니다." #deepl:1046441460
 pius.113.f: "'성모님은 권력자가 아닌 비천한 자들에게 나타나셨다. 그래서 그들은 성모님을 침묵시키고자 하는 것일지도 모른다'\n\n마을 위 돌 성당에서는 [SCOPE.sCharacter('pius_marian_priest_scope').GetFirstName] 신부가 성모님의 자비뿐만 아니라 정의에 대해 설교하기 시작했습니다. 신부님의 말씀이 본당 너머로 울려 퍼집니다: '하늘이 이곳에서 말씀하셨다면 어떤 정부도 그 메아리를 금지할 수 없다'\n순례자들이 그의 설교에 몰려들었습니다. 그의 이름은 속삭임과 찬송가에 퍼져 나갑니다. 그는 평화를 촉구하지만 그의 존재는 불안을 부추깁니다. 어떤 이들은 그를 예언자라고 부릅니다. 또 다른 이들은 예복을 입은 반란군이라고 부르기도 합니다. 군부는 선동을 말합니다. 교회 위계질서는 교리와 외교 사이에서 갈등하며 망설입니다. 조용한 제안이 당신의 책상에 도착합니다: 그를 제거하자고요. 조용히. 하지만 어떤 사람들은 침묵하면 더 큰 목소리를 냅니다." #deepl:2395659126
 pius.113.g: "설교하게 하세요." #deepl:3471579290
 pius.113.h: "협상을 위해 그를 수도로 소환하세요." #deepl:1641636788
 pius.113.i: "그를 사라지게 만드세요." #deepl:3010062703
 pius.113.t: "강단의 목소리" #deepl:3682486724
 pius.114.d: "전국에서 가톨릭 신자들이 마리아 발현을 지지하는 공개 시위를 시작했습니다. 시골 순례로 시작된 시위는 이제 전국적인 운동이 되었습니다." #deepl:3473602537
 pius.114.f: "'그들은 손에는 묵주를 들고, 어깨에는 아이들을 업고, 입술에는 성모님의 이름을 부르며 걸었다.'\n\n어촌 마을에서 공장 도시까지, 창문에 타오르는 촛불, 마을 광장에 울려 퍼지는 찬송가, 침묵 속에 모인 수천 명의 사람들 등 그 표식은 동일합니다. 깃발은 나부끼지 않고 동상과 아이콘, 그리고 하나의 이름만이 반복해서 울려 퍼집니다: 마리아. 성지( [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName] )에서 벌어진 폭력에 맞서 신자들은 거리로 나섰습니다. 그들은 소리치지 않습니다. 그들은 기도합니다. 하지만 그 수는 매일 증가하고 있습니다.\n정부 내 일부에서는 관용을 촉구합니다. 다른 이들은 단속을 요구합니다. 군대는 불안합니다. 그리고 이 나라 전역의 가정에서는 '그렇게 많은 사람들이 믿는다면 여전히 거짓일 수 있을까'라는 의구심마저 듭니다." #deepl:3107082794
 pius.114.g: "국가 행렬을 허용합니다." #deepl:3918828179
 pius.114.h: "국가 행렬을 금지합니다." #deepl:1813497751
 pius.114.t: "전국을 뒤흔든 행렬" #deepl:738056863
 pius.115.d: "심각한 흉작이 [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName] 의 여러 농촌 지역을 강타했습니다. 신자들 사이에서 한때 국가에 의해 침묵했던 성모님이 이제 눈물을 흘리며 벌을 내린다는 위험한 속삭임이 퍼지기 시작합니다." #deepl:3238123436
 pius.115.f: "'그녀는 기도를 요청했다. 우리는 그녀에게 병사들을 주었다.'\n\n비가 내리지 않았다. 밀은 너무 빨리 누렇게 변했다. 감자는 땅속에서 썩어서 보이지 않고 씁쓸했습니다. 마을 사람들은 버려진 듯한 들판에 대해 이야기합니다. 인간에 의해서가 아니라 자비에 의해... 그렇게 속삭입니다. 한때 나타났다가 조롱당했던 빛의 여인에 대해. 사라진 사제에 대해. 봉인된 신전과 구타당한 순례자들에 대해. 이제 그녀는 얼굴을 돌렸다고 합니다.\n촛불은 다시 타오르지만 이제는 닫힌 창문 뒤에서 타오릅니다. 어머니들은 비밀리에 아이들에게 세례를 줍니다. 노인들은 빵 껍질을 제물로 묻습니다. 교회는 감히 말하지 못하지만 사람들은 이미 믿습니다: 이것이 그녀의 슬픔입니다. 또는 그녀의 경고입니다." #deepl:2485032935
 pius.115.g: "미신! 나는 희망합니다..." #deepl:2447781343
 pius.115.t: "들판은 비어 있습니다" #deepl:3151937266
 pius.116.d: "수년간의 탄압과 기적을 거부당한 후, 한때 독실했던 많은 시민이 [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName] 에 대한 믿음을 버리기 시작했습니다. 이제 점점 더 많은 사람들이 자신을 가톨릭 신자가 아니라 아무것도 아니라고 말합니다." #deepl:1323000478
 pius.116.f: "'그녀는 더 이상 오지 않습니다. 꿈에도, 환상에도 오지 않는다. 촛불은 꺼지고 신전은 닫힙니다.'\n\n신전은 닫힙니다. 사제는 사라졌다. 들판은 고요합니다.\n가장 가난한 사람들도 잠들기 전에 아베 마리아를 속삭이던 시절, 난로 옆에 성화가 걸려 있고 종소리에 눈물이 흘렀던 시절이 있었습니다. 이제 교회는 텅 비어 있습니다. 아이들은 '고해성사'가 무엇인지 묻습니다. 젊은이들은 이성과 진보, 무(無)에 대해 이야기합니다.\n사람들은 이데올로기로 향하지 않았습니다. 그들은 재로 변했습니다. 그들은 급진주의자가 아닙니다. 그들은 지쳤습니다. 그리고 공허한 침묵 속 어딘가에는 그녀가 우리를 떠난 것인가, 아니면 우리가 그녀를 떠난 것인가라는 질문이 남아있습니다." #deepl:231766477
 pius.116.g: "믿음의 시대는 지났습니다." #deepl:146424195
 pius.116.t: "종소리 너머의 침묵" #deepl:2179217507
 pius.119.d: "새로 출범한 무신론 정부가 마리아 순례지 폐쇄를 명령했습니다. 한때 빛과 기도의 장소였던 이곳은 이제 정부의 감시 아래 조용히 폐쇄되었습니다." #deepl:1939840262
 pius.119.f: "'종소리가 울리지 않았습니다. 촛불도 타오르지 않았다. 해가 뜨기 전에 문은 잠겨 있었다.'\n\n한때 수천 명이 모이던 성당은 이제 홀로 서 있습니다. 예배당 문에는 '인민 대표 회의의 명령에 따라 이 건물은 불필요한 것으로 선언되었습니다'라는 안내문이 못 박혀 있습니다. 경비병들은 보호가 아닌 예방을 위해 보초를 서고 있습니다.\n무력은 사용되지 않았습니다. 어떤 시위도 허용되지 않았습니다. 변화는 조용하고 관료적으로, 폭발이 아닌 부재로 다가왔습니다. 하지만 전국의 가정에서는 노인들의 손이 떨렸습니다. 할머니들은 묵주를 숨깁니다. 아이들은 순례자들이 왜 더 이상 노래를 부르지 않느냐고 묻지만 성직자들은 침묵합니다. 당은 과학, 이성, 진보에 대해 이야기합니다. 그리고 잠긴 문 뒤 어딘가에서 반쯤 꺼진 촛불처럼 질문이 깜빡입니다: 이것이 정말 필요한 일이었을까요?" #deepl:3255413028
 pius.119.g: "우리는 더 이상 환상을 위한 기념비를 세우지 않습니다." #deepl:702720701
 pius.119.t: "신전 폐쇄" #deepl:589514149
 pius.121.d: "[SCOPE.sState('pius_marian_apparition_state').GetFarmHubName] 의 마리아 발현은 공식적으로 긍정적인 신호로 인정받았습니다. 그러나 지금도 그 진정한 의미는 해석의 여지가 남아 있습니다." #deepl:181746716
 pius.121.f: "마을 사람들에게 빛나는 형상이 나타난 후 몇 주 동안 더 이상의 징후는 나타나지 않았습니다. 하늘에서 불이 내리지 않았습니다. 구름 속 목소리도 없었습니다. 잔잔한 하늘과 경이로움의 여운만 남아있을 뿐. 하지만 사람들은 평화와 치유, 민족의 영혼에 변화가 일어났다고 말합니다. 순례자들은 열광이 아니라 경건한 마음으로 찾아옵니다. 성직자들은 부드럽게 설교합니다. 언론은 이번만큼은 조롱하지 않고 보도합니다: 이 기적은 무엇을 의미할까요?" #deepl:3589438214
 pius.121.g: "서민을 위한 축복입니다." #deepl:560950828
 pius.121.h: "성직자에게 보내는 신의 계시입니다." #deepl:2114621818
 pius.121.h_tt: "이 조치는 알려지지 않은 심각한 결과를 초래할 수 있습니다." #deepl:1123613034
 pius.121.i: "우리 정부의 정당성을 보여주는 증거입니다." #deepl:1976662076
 pius.121.t: "무슨 뜻인가요?" #deepl:1525290236
 pius.122.d: "마리아 발현의 현장은 이제 명실상부한 순례지로 자리 잡았으며, 국내외에서 신자들이 점점 더 많이 찾아오고 있습니다." #deepl:3557311135
 pius.122.f: "'한때 목초지만 있던 곳에 촛불과 장미, 수천 명의 조용한 발걸음이 서 있습니다.'\n\n길이 넓어졌습니다. 들판은 개간되었습니다. 한때 아이들이 빛으로 옷을 입은 여인에 대해 이야기하던 그 자리 근처에 소박한 예배당이 솟아 있습니다. 아들을 데리고 온 농부, 검은 옷을 입은 과부, 휴가 중인 군인, 태아를 위해 속삭이는 어머니 등 매일 순례자들이 이곳을 찾는다\n\n교회는 이곳의 신성함을 인정했다. 신전이 세워지고 있습니다. 빵, 메달, 묵주, 포도주를 파는 시장이 가장자리에 피어납니다. 한때는 안방에서나 믿었던 이야기가 이제는 뼛속까지 느껴지는 존재가 되었습니다." 계곡에 종소리가 울려 퍼지면 궁금해집니다: 이 믿음은 다시 태어난 것일까요, 아니면 아직 오지 않은 더 큰 것의 씨앗일까요?" #deepl:307938956
 pius.122.g: "토투스 투스." #deepl:314650754
