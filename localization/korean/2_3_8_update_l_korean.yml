 concept_verrier_venus_transit: "비너스 트랜짓" #deepl:3328636769
 concept_verrier_venus_transit_desc: "금성 통과는 달이 지구와 금성 사이를 통과하는 드문 현상을 말합니다. 하지만 19세기에는 1874년과 1882년에 두 번 발생했습니다. 금성 통과를 관측하면 태양계의 크기에 대한 결론을 도출하고 천문 단위(AU)의 크기를 보다 정확하게 결정할 수 있기 때문에 중요한 과학적 사건이었습니다. [concept_verrier_venus_transit_zone] 에 위치한 국가는 이 행사를 관측할 수 있지만 다른 국가는 탐험대를 보내야 합니다. 관측의 성공 여부는 [concept_verrier_astronomer], [concept_gaudi_engineer], 그리고 약간의 운에 따라 달라지는데, 때로는 날씨로 인해 좋은 이미지를 얻지 못할 수도 있습니다. 관측이 잘 될수록 보너스는 더 커집니다." #deepl:1890935103
 concept_verrier_venus_transit_zone: "금성 환승 구역" #deepl:535627695
 concept_verrier_venus_transit_zone_desc: "금성 통과 구역은 금성의 부분적인 통과가 아닌 완전한 금성 통과를 관측할 수 있는 지구의 일부를 말합니다. 1874년에는 동아시아 태평양 지역이, 1882년에는 거의 모든 미국 대륙이 이에 해당했습니다. 전략 지역에 대한 자세한 분석은 아래에 나와 있습니다.\n\n#V 금성 통과 1874:#!\n인도네시아, 인도차이나, 오세아니아, 중국 남부, 중국 북부, 만주, 일본, 인도 중부, 마드라스, 벵골, 히말라야, 또한 인도양 영토의 국가.#!\n브라질, 라플라타, 안데스, 그란 콜롬비아, 멕시코, 중앙 아메리카, 카리브해, 중서부, 딕시, 뉴잉글랜드, 온타리오 주 및 퀘벡 주. \n\n#V Venus Transit 1882: \n브라질, 라플라타, 안데스, 그란 콜롬비아, 멕시코, 카리브해, 중서부, 딕시, 뉴잉글랜드." #deepl:1055797749
 concept_vikelas_coach: "코치" #deepl:3572285288
 concept_vikelas_coach_desc: "코치는 특정 국가 스포츠에서 한 국가의 국가대표 트레이너입니다. 국가 스포츠에는 [concept_vikelas_football], 야구, 농구, 크리켓이 포함됩니다. 코치는 국제 세계 선수권 대회나 국제 경기 등 대회에서 해당 팀에 보너스를 제공합니다. 후자는 일정한 간격으로 비밀리에 진행되며 승리 시 코치의 경험치가 증가합니다. 높은 경험치와 긍정적인 특성( [Concept('concept_character_trait','$concept_character_traits$')] )은 월드 챔피언십에서 우승할 확률을 높입니다. 긍정적인 특성은 야망이나 카리스마와 같이 플레이어에게 특히 동기를 부여하는 특성인 반면, 부정적인 특성은 경기에서 승리할 확률을 낮춥니다. 여기에는 무자비함이나 잔인함 같은 특성이 포함됩니다.\n\n#R 참고: 현재는 축구만 통합되어 있습니다.#!" #deepl:183600896
 concept_vikelas_coaches: "코치" #deepl:3998480532
 concept_vikelas_football: "축구" #deepl:3334413449
 concept_vikelas_football_desc: "축구는 가능한 국가 스포츠입니다. 최초의 축구 클럽은 유럽과 남미에서 설립될 수 있으며, 이를 위해서는 상대적으로 자유로운 법률 시스템, 강력한 소부르주아 계급 또는 상당한 평균 생활 수준이 필요합니다. 그 후 가끔씩 축구 경기가 열릴 수 있습니다. FIFA가 설립되면서 국제 경기와 월드컵도 가능해졌습니다. 최고의 8개 팀은 자동으로 월드컵 출전 자격을 얻습니다. 각 팀은 생활 수준(인구의 체력), 소부르주아의 힘(클럽 시스템), 문해력(전술), 전통(국가 스포츠: 예 또는 아니오?)이라는 매개변수에서 파생된 국가 축구팀 가치(NFTV)에 따라 계산됩니다. 경기에서는 NFTV뿐만 아니라 [concept_vikelas_coach] 의 성격 특성과 경험도 고려됩니다." #deepl:3000477120
 country_artists_decorative_can_promote_architect_boolean_desc: "[concept_pm_artists_academy_school] 을 사용하는 [GetBuildingType('building_arts_academy').GetName] 이 하나 이상 있는 경우 아티스트 개요에서 [concept_gaudi_architect] 을 홍보할 수 있습니다." #deepl:738833409
