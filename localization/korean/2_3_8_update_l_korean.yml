 khaldun.101.d: "수세기 전 알카라위인은 과학과 학문의 중심지였습니다. 이제는 세계 주요 대학 중 하나로 다시 그 자리를 되찾았습니다." #deepl:2097299752
 khaldun.101.f: "\"알카라위인은 유럽의 모든 대학보다 더 오랜 역사를 가진 대학입니다. 많은 책을 소장해왔지만 슬프게도 쇠퇴하기 시작했습니다. 오늘은 이 대학이 다시 제자리를 찾는 날입니다!"" #deepl:2075544153
