 verrier.308.d: "천문학자들은 1874년 호주-인도네시아-태평양 지역에서 금성 통과를 예측했습니다 #ORANGE 1874#!. [ROOT.GetCountry.GetNameNoFlag] 의 과학 커뮤니티는 일생에 한 번뿐인 이 천문학적 사건을 관찰할 것을 요구하고 있습니다." #deepl:1738426681
 verrier.308.f: "금성 통과는 금성 행성이 태양 앞을 통과하는 것을 말합니다. 이 현상은 약 243년 동안 단 네 번만 발생합니다. 역사적으로 이러한 통로의 정확한 측정은 지구와 태양 사이의 거리(천문 단위)를 결정하는 데 매우 중요했으며 중요한 기관과 과학자들의 많은 탐험과 측정 캠페인을 불러 일으켰습니다. 1874년 금성의 통과는 천문학적 측정에 상대적으로 불리한 조건이었습니다. 거의 모든 유럽에서는 보이지 않았고, 아시아에서는 긴 통과 시간이, 호주, 남태평양 섬, 인도양 남부(특히 케르겔렌 군도)에서는 짧은 통과 시간이 관측되었을 뿐이었죠. 그럼에도 불구하고 약 60개의 탐험대가 파견되었습니다." #deepl:3786277450
 verrier.308.g: "이걸 놓쳐서는 안 됩니다." #deepl:2334937119
 verrier.308.t: "1874년 금성 통과" #deepl:3101017563
 verrier.309.d: "천문학자들은 남미, 중앙 아메리카, 북동 아메리카 지역에서 또 다른 금성 통과를 예측했습니다 #ORANGE 1882#!. [ROOT.GetCountry.GetNameNoFlag] 의 과학 커뮤니티는 일생에 한 번뿐인 이 천문학적 사건을 관찰할 것을 요구하고 있습니다." #deepl:3366532829
 verrier.309.f: "금성 통과는 금성 행성이 태양 앞을 통과하는 것을 말합니다. 이 현상은 약 243년 동안 단 네 번만 발생합니다. 역사적으로 이러한 통과를 정확하게 측정하는 것은 지구와 태양 사이의 거리(천문 단위)를 결정하는 데 매우 중요했으며 중요한 기관과 과학자들의 많은 탐험과 측정 캠페인을 불러 일으켰습니다. 1882년 금성 통과는 1874년 금성 통과에 비해 접근성이 좋은 일부 지역에서 볼 수 있었다는 장점이 있었습니다. 따라서 금성 통과는 북미 북쪽과 북동쪽을 제외한 미국 대륙 전역에서 볼 수 있었습니다." #deepl:1503344549
 verrier.309.t: "1882년 금성 통과" #deepl:2995649523
 verrier.311.d: "금성이 태양의 얼굴을 가로지르는 희귀한 천문학적 사건이 다가오고 있습니다. 전 세계의 천문대와 정부가 준비를 시작합니다." #deepl:4200477530
 verrier.311.f: "날짜가 초 단위로 계산되었습니다. 망원경이 포장 중입니다. 시계가 동기화되었습니다. 금성 행성이 태양의 얼굴을 가로지릅니다. 천문학자들은 이번 통과를 통해 태양계의 기본 단위인 천문 단위를 정밀하게 측정할 수 있을 것이라고 믿습니다. 그러나 이 노력의 성공 여부는 전적으로 가시성, 즉 위치, 날씨, 조율에 달려 있습니다." #deepl:2621945333
 verrier.311.g: "우리는 집에서 출발하는 교통편을 관찰합니다." #deepl:2383387639
 verrier.311.h: "저희는 보호 지역 중 한 곳으로 원정대를 파견합니다." #deepl:1098022190
 verrier.311.i: "먼 땅으로 탐험대를 파견합니다." #deepl:381412623
 verrier.311.j: "이에 대해 다시 생각해봐야 합니다." #deepl:1178423846
 verrier.311.t: "금성 통과 준비" #deepl:967668025
 verrier.319.d: "금성 통과라는 희귀한 천문 현상을 관찰하기 위해 [SCOPE.sCountry('verrier_venus_transit_leader').GetName] 의 탐험대가 우리 영토에 도착했습니다." #deepl:853589
 verrier.319.f: "그들은 렌즈, 시계, 차트 상자를 들고 하선했습니다. 그들의 대변인은 대학 관계자들을 만나 우호적인 서신과 기술 브리핑을 제공했습니다. 천문대 조교들은 호기심을 보였고, 신문들은 중립적이지만 경계심을 늦추지 않았습니다.\n\n과학 협력은 물론 데이터 교환, 물류 주권, 세계 무대에서의 가시성 등 여러 부서에서 그 의미에 대해 논의하고 있습니다." #deepl:209223472
 verrier.319.g: "과학이 우리의 공유 언어가 되게 하세요." #deepl:183308092
 verrier.319.t: "하늘을 바라보는 외국인의 시선" #deepl:4019861958
 verrier.321.d: "항해 도중 격렬한 폭풍이 탐험선을 강타했습니다. 부서지는 파도와 혼란스러운 장비 속에서 갑판에서 여러 개의 상자가 찢어져 바다로 유실되었고, 그 중에는 섬세한 운송 장비도 포함되어 있었습니다." #deepl:2127492192
 verrier.321.f: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName] 하늘이 산산조각 나자 난간에 매달렸습니다. 바다가 적처럼 밀려와 갑판 위로 밧줄과 통을 던졌습니다. 두 개의 상자가 무서운 호를 그리며 미끄러지더니 어둠 속으로 사라졌습니다.\n\n폭풍이 지나가고 정적만 남았을 때, 피해 상황을 집계했습니다. 주 헬리미터. 쾨니히스베르크의 이중 렌즈. 몇 개의 정밀한 시계들.\n\n [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] 박사는 물에 젖은 승무원들과 부서진 나무들 사이에 서서 장비가 있던 빈자리를 바라보았습니다. 백업이 있었습니다. 하지만 그 어느 것도 완벽하지 않았습니다.\n\n그리고 금성처럼 시간은 아무도 기다리지 않습니다." #deepl:2744264311
 verrier.321.g: "계속하세요. 아직 진행할 시간이 충분합니다." #deepl:1985224258
 verrier.321.t: "경유지 위의 폭풍" #deepl:2256455346
 verrier.322.d: "밤마다 별자리를 보정하는 동안 탐험대의 천문학자는 불규칙한 움직임과 없어야 할 곳에 고정된 점을 발견했습니다. 기존 별자리 차트와 비교한 결과, 탐험대는 미지의 새로운 천체를 발견했을 가능성이 있음을 확인했습니다." #deepl:2064965258
 verrier.322.f: "배는 벨벳 같은 하늘 아래를 표류했습니다. 구름은 몇 시간 전에 부서져 부자연스러울 정도로 맑은 하늘을 남겼습니다. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] 박사는 다시 접안렌즈를 들여다보았습니다. 알타이르와 육분의 가장자리 사이에 움직임이 있었습니다. 혜성이라고 하기에는 너무 느렸습니다. 결함이라고 하기에는 너무 안정적이었습니다.\n\n밤마다 [ROOT.Var('verrier_astronomer_var').GetCharacter.GetSheHe] 는 같은 하늘로 돌아와 스케치하고, 계산하고, 비교했습니다. 마침내 [ROOT.Var('verrier_astronomer_var').GetCharacter.GetHerHis] 메모를 통해 소행성 천체를 확인했습니다. 두 개일 수도 있습니다. 분류되지 않은 금성은 기다렸습니다. 하지만 별들은 이미 다른 것을 제안하고 있었습니다." #deepl:1791725592
 verrier.322.g: "하늘은 여전히 비밀을 간직하고 있습니다." #deepl:1342826733
 verrier.322.t: "예상치 못한 조명" #deepl:1561684464
 verrier.323.d: "탐험대는 여정을 잠시 멈추고 내륙으로 들어가 천문 관측을 위한 잠재적 고도 지점을 조사했습니다. 탐험대가 발견한 것은 기존의 식물 기록에 없는 생소한 식물 숲이었습니다." #deepl:3286240010
 verrier.323.f: "그것은 향기로 시작되었습니다. 숲 가장자리에 있는 양치류에서 은은하고 시트러스한 향이 피어올랐습니다. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] 박사는 그 향기를 따라 울창한 덤불을 지나 빛이 물처럼 고여 있는 숲속을 발견했습니다.\n\n그곳에는 짙은 보라색 줄기가 완벽한 나선형으로 피어 있었습니다. 붉은 이끼가 흑요석색 돌을 덮었습니다. 그 위에는 별처럼 매달린 덩굴송이가 바람에 흔들리고 있었습니다. 아무도 이름을 지을 수 없었습니다.\n\n젊은 조수 중 한 명이 속삭였습니다."하늘이 땅으로 떨어진 것 같아요."\n\n그들은 금성을 쫓으러 왔습니다. 하지만 이곳의 고요한 공기와 여과된 빛 속에서 그들은 다른 종류의 경이로움을 발견했습니다." #deepl:808904157
 verrier.323.g: "샘플을 수집하고 연구를 위해 보존하세요." #deepl:1767661174
 verrier.323.t: "별 사이의 정원" #deepl:2845961206
 verrier.324.d: "탐험대는 고공 관측 지대를 정찰하던 중 지질학적으로 매우 흥미로운 장소를 우연히 발견했습니다. 주변 돌에는 이전에는 거의 볼 수 없었던 무늬와 내포물이 있었습니다." #deepl:539957699
 verrier.324.f: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] 박사가 노두의 층층이 쌓인 표면을 따라 [ROOT.Var('verrier_astronomer_var').GetCharacter.GetHerHis] 손을 움직였습니다. 그것은 아침 햇살에 희미하게 반짝였고, 금속성 광택의 이음새로 부서져 있었습니다. 짙은 녹색의 소용돌이가 주황색 결정핵 주위를 감싸며 거의 의도적으로 보이는 패턴을 형성했습니다.\n\n근처에 있는 다른 석판에서는 속이 비어 있고 여전히 온전한 화석화된 거품이 드러났습니다. 팀의 한 지질학자는 화산 기원으로 추정했습니다. 다른 지질학자는 고개를 절레절레 흔들며 '내가 본 어떤 것보다 더 오래된 것'이라고 말했습니다. \n\n그들이 가져온 도구는 하늘을 관측하기 위해 만들어졌습니다. 하지만 여기, 그들의 장화 밑에 있는 바위에는 지구의 깊은 기억의 조각이 있었습니다." #deepl:908721635
 verrier.324.g: "이 발견은 지구 자체의 이야기에 속합니다." #deepl:2450655201
 verrier.324.t: "시간 너머의 돌" #deepl:2335051515
 verrier.325.d: "탐험대가 입국 항구에 도착했지만 세관 당국은 즉각적인 통관을 거부하고 있습니다. 과학 장비 상자 몇 개가 검사를 위해 억류되었고, 세관원들은 이전에는 요구하지 않았던 추가 서류를 요구하고 있습니다." #deepl:2525277400
 verrier.325.f: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] 박사는 이를 악물고 화물 적하목록 옆에 서 있었다. 수은 렌즈, 정밀 시계, 광택이 나는 황동 케이스 등 모든 물품은 잠긴 문 뒤 창고에서 잉크와 도장을 기다리고 있었다.\n\n세관원은 정중했지만 단호했다: '과학적이든 아니든, 조약으로 면제되지 않는 한 모든 외국 기구는 신고, 검사, 과세를 해야 한다'\n\n조약은 시간이 없었다.\n\n밖은 여전히 해가 떠 있었다. 그리고 금성은 관료주의를 기다리지 않았습니다." #deepl:34765689
 verrier.325.g: "수수료를 지불하고 신속하게 통관하세요." #deepl:240478226
 verrier.325.t: "하늘 아래의 장벽" #deepl:2346862710
 verrier.340.d: "몇 주간의 준비 끝에 금성 통과를 위한 관측소가 완성되었습니다. 기기가 보정됩니다. 차트가 확인되었습니다. 이제 남은 것은 하늘뿐입니다." #deepl:1138273071
 verrier.340.f: "돔은 황동과 조용한 목적의 등대처럼 우뚝 솟아 있었습니다. 고국 땅의 돌로 지었든 이국 땅의 캔버스와 리벳으로 지었든, 이제 그 돔은 숨막히는 기대의 정적을 품고 있었습니다.  내부에는 헬리미터가 조명 아래서 반짝이고 있었습니다. 기어가 속삭이듯 돌아갔습니다. 타이머가 기대에 차서 딸깍거렸습니다. 밖에서는 조수들이 렌즈에 묻은 먼지를 털어냈습니다. 공기조차 주저하는 듯했습니다. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] 박사가 문 앞에 서서 문지방을 만졌습니다. 몇 달 동안 모든 것이 이 순간을 향해 움직였습니다. 이제 더 이상 지을 것은 아무것도 없었고 기다리는 일만 남았습니다. 그들 위, 보이지 않는 하늘 어딘가에서 금성이 그 길을 따라가고 있었습니다." #deepl:2967275520
 verrier.340.g: "정확성은 침착한 손에서 시작됩니다." #deepl:2872475059
 verrier.340.t: "금성 통과를 위한 천문대 준비" #deepl:966063237
 verrier.341.d: "[ROOT.Var('gaudi_engineer_var').GetCharacter.GetLastName] 박사가 주망원경의 내부 안정장치에 사소하지만 중요한 변경을 제안했습니다. 이 수정은 내부 진동을 줄이고 접촉 순간에 광학 선명도를 높일 수 있습니다." #deepl:491784908
 verrier.341.f: "돔이 아니라 그 뒤에 있는 작업장 텐트에서 일어난 일이었습니다. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] 박사는 기름이 묻은 메모장을 들고 [ROOT.Var('gaudi_engineer_var').GetCharacter.GetLastName] 박사가 다가왔을 때 차트를 꼼꼼히 살펴보고 있었습니다. 다시 계산된 버퍼 장력. 내부 황동 링에 대한 수정된 지지대\n\n다른 사람들은 정중하게 회의적인 반응을 보였지만, 테스트 결과 이미지가 몇 분의 1 정도 더 안정적이라는 것이 증명되었습니다. 흐릿함과 선명함 사이의 경계를 바꾸기에 충분했습니다." #deepl:2995793810
 verrier.341.g: "작은 변화로 큰 변화를 만들어냅니다." #deepl:1641676745
 verrier.341.t: "조용한 조정" #deepl:3486983252
 verrier.342.d: "최근 전자기 이론의 획기적인 발전으로 망원경의 관측 프로토콜에 새로운 광학 필터링 방법을 적용할 수 있게 되었습니다. 이제 대기 중 빛의 산란으로 인한 간섭을 더 잘 설명할 수 있게 되어 더욱 선명한 시각적 데이터를 얻을 수 있게 되었습니다." #deepl:2503805121
 verrier.342.f: "이 아이디어는 돔이나 렌즈 제조사의 연구실이 아닌 한 페이지에서 나왔습니다. 빛이 단순히 입자나 광선이 아니라 진동하는 장으로서 어떻게 작용하는지에 대한 파동 방정식을 개선한 것이었습니다. 이를 통해 새로운 간섭 모델을 예측하고 보정을 적용할 수 있었습니다. 필터를 재편집했습니다. 노출 타이밍을 조정했습니다. 엔지니어들은 의심을 다시 확인했습니다.\n\n그날 밤 [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] 박사가 테스트 렌즈를 들여다봤을 때 별들은 더 이상 흔들리지 않았습니다. 별들은 정확하고 차갑고 진짜처럼 서 있었습니다. 하늘이 흔들림을 멈췄습니다." #deepl:914121255
 verrier.342.g: "수학은 눈을 예리하게 합니다." #deepl:2639991371
 verrier.342.t: "명확성의 방정식" #deepl:1039194191
 verrier.351.d: "요코하마에서 레위니옹, 케르구엘렌에서 베이징에 이르기까지 대륙과 바다를 가로질러 천문학자들은 금성이 태양을 가로지르는 모습을 지켜보았습니다. 1874년 금성 통과가 완료되었고 많은 팀이 성공을 보고했습니다." #deepl:3119534429
 verrier.351.f: "그들은 증기선을 타고, 낙타를 타고, 철도를 타고, 걸어서 왔습니다. 엔지니어, 식물학자, 지도 제작자. 그들은 정글과 사막에 천문대를 세웠습니다. 그들은 날씨를 연구하고 그림자의 시간을 측정하고 렌즈가 손에 떨릴 때까지 연마했습니다.\n\n그리고 1874년 12월 9일, 6시간 동안 태양 원반을 가로지르는 검은 점을 지켜보았습니다.\n\n금성이 속삭이듯 들어왔다가 비밀처럼 빠져나가는 모습을 지켜보았습니다. 측정은 완벽하지는 않았지만 충분했습니다. 삼각 측량을 시작할 수 있었습니다. 인류는 처음으로 신화나 은유가 아닌 그림자로 추적한 수치로 태양계의 실제 규모를 알게 될지도 모릅니다. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] 박사는 [ROOT.Var('verrier_astronomer_var').GetCharacter.GetHerHis] 노트를 닫고 한숨을 내쉬었습니다: 끝났습니다." #deepl:1827747392
 verrier.351.g: "아름답습니다." #deepl:2882436754
 verrier.351.t: "1874년의 교통" #deepl:2395808814
 verrier.352.d: "1882년 12월 6일, 금성 행성이 태양 앞을 다시 한 번 지나갔습니다. 전 세계의 관측자들은 한 세기 만에 처음으로 천체 망원경을 하늘에 고정하고 비행 중인 금성의 검은 원반을 포착했습니다." #deepl:3903856343
 verrier.352.f: "이번에는 배들이 더 일찍 출발했습니다. 천문대는 더 견고했습니다. 시계는 더 정확했습니다. 1874년에 배운 교훈은 모든 손, 모든 그림자, 모든 계산을 안내했습니다.\n\n뉴저지에서 파타고니아까지, 멕시코에서 호주까지, 세계는 태양의 한 점을 위해 멈춰 섰습니다.\n\n [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] 박사가 마지막 필터를 조정했습니다. 디스크가 타오르는 흰색을 가로질러 천천히 미끄러지듯 나타났습니다. 환호성은 없었고 펜의 바스락거리는 소리, 셔터의 찰칵거리는 소리, 승리의 조용한 숨소리만 들렸습니다. 금성이 돌아오려면 121년이 더 지나야 했습니다. 하지만 바로 이 순간, 시간 자체가 측정되었습니다." #deepl:907305697
 verrier.352.g: "다음 편은 절대 볼 수 없습니다." #deepl:2603880366
 verrier.352.t: "1882년 환승" #deepl:2224364038
 verrier.353.d: "오랫동안 기다려온 순간이 가까워지면 기상 조건이 악화되기 시작합니다. 모든 것을 가릴 만큼 두껍지는 않지만 선명도와 타이밍을 왜곡하기에 충분한 구름이 몰려옵니다." #deepl:1325753029
 verrier.353.f: "하늘은 완전히 닫히지는 않았지만 더 이상 복종하지 않았습니다. 떠다니는 구름 층이 거즈처럼 태양을 가로질러 퍼졌습니다. 빛은 고르지 않은 맥박으로 희미해지고 번쩍였다. 모든 렌즈가 균형을 잡기 위해, 모든 조력자가 숨을 쉬기 위해 몸부림쳤습니다.\n\n [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] 박사는 필터를 통해 [ROOT.Var('verrier_astronomer_var').GetCharacter.GetHerHis] 눈을 고정했습니다. 금성의 실루엣이 희미하게, 굴절되어 수증기와 계산 사이에서 춤을 추며 나타났습니다.\n\n깨끗한 호가 아니었습니다. 교과서적인 관찰도 아니었습니다. 하지만 데이터였습니다. 변덕스러운 하늘 아래서 힘들게 얻은 데이터였습니다." #deepl:1908038831
 verrier.353.g: "하늘이 우리에게 조각을 주면 우리는 그 조각들을 이어 붙여야 합니다." #deepl:1646978536
 verrier.353.t: "빛의 베일을 통해" #deepl:674640397
 verrier.354.d: "금성을 통과하는 동안 관측팀은 정밀한 데이터뿐만 아니라 이미지도 포착했습니다. 수십 장의 사진 판을 순차적으로 노출하고 나중에 조립하여 움직임을 기록했습니다. 역사상 처음으로 행성 통과가 영화로 기록되었습니다." #deepl:2258153461
 verrier.354.f: "깜빡입니다. 떨립니다. 하지만 움직입니다. 일련의 처리된 플레이트에서 금성은 가장자리에서 태양 원반을 가로지르는 완벽한 검은 점으로 들어옵니다. 단순한 계산이나 스케치가 아닌 움직임입니다. 시간에 맞춰 포착한 것입니다. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] 박사는 암실에 서서 랜턴을 들고 이 짧은 순서가 반복되는 것을 지켜보았습니다. 6시간의 측정이 몇 초의 경이로움으로 압축되었습니다. 천문학자들은 박수를 보냈습니다. 자신들이 새로운 일을 해냈다는 것을 알았기 때문입니다. 그들은 하늘을 움직였습니다." #deepl:1856959975
 verrier.354.g: "프레임을 분석하여 행성 모션 모델을 개선합니다." #deepl:3348594448
 verrier.354.t: "움직이는 그림자" #deepl:969441096
 verrier.355.d: "1882년 금성 통과를 둘러싼 전 세계적인 흥분에서 영감을 받아 [ROOT.Var('elgar_composer_var').GetCharacter.GetFullName] 에서 새로운 기념곡을 작곡했습니다. 많은 청중 앞에서 초연된 이 행진곡은 행사의 장엄함과 새로운 과학의 세기의 리듬을 모두 담아냈습니다." #deepl:1566390789
 verrier.355.f: "1882년 금성의 통과가 있은 지 1년 후, 존 필립 소사는 1878년에 사망한 미국 물리학자 조셉 헨리의 동상 제막식을 위한 행렬을 작곡해 달라는 의뢰를 받았습니다. 프리메이슨이었던 수사는 프리메이슨이 자연 현상에서 신비로운 특성을 발견하는 것에 매료되었습니다. 이 곡은 수사의 생전에 인기를 끌지 못했습니다. 수사의 악보 사본이 홍수로 유실된 후 수년 동안 연주되지 못했습니다." #deepl:3349639062
 verrier.355.g: "어떤 음악은 군중을 위한 것이 아니라 역사를 위해 만들어졌습니다." #deepl:1666827653
 verrier.355.t: "금성의 행진" #deepl:1281729794
 verrier_add_x_venus_success_0_tt: "아니오 #V 금성 통과 관측 성공#!." #deepl:2753469077
 verrier_add_x_venus_success_minus_x_tt: "잃다 [SCOPE.GetValue('verrier_venus_success_amount')|0+] #V  금성 통과 관측 성공#!." #deepl:867568724
 verrier_add_x_venus_success_plus_x_tt: "획득 [SCOPE.GetValue('verrier_venus_success_amount')|0+] #V  금성 통과 관측 성공#!." #deepl:667317191
 verrier_foreign_venus_expedition_modifier: "외국인 금성 통과 탐험대" #deepl:253236392
 verrier_venus_transit_diplomacy_modifier: "금성 통과를 위한 외교 협상" #deepl:1903396933
 verrier_venus_transit_preparation_modifier: "금성 통과를 위한 준비" #deepl:3653758437
 vikelas.21.d: "[SCOPE.sState('vikelas_basketball_state').GetName] 한 체육관에서 언젠가 전 세계의 홀과 경기장에 울려 퍼질 새로운 게임이 발명되었습니다." #deepl:3471187932
 vikelas.21.f: "'발로 차는 행위 금지. 공을 가지고 뛰지 마세요. 그리고 복숭아 바구니 두 개를 갤러리에 못 박아 놓는다'\n\n [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('vikelas_basketball_state').GetFarmHubName] 의 한 학교에서 [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] 박사는 겨울 동안 [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] 불안해하는 학생들을 어떻게 실내에서 활동적으로 만들 수 있을까 하는 문제에 직면했습니다. [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis|U] 해결책은 간단하면서도 기이했습니다. 축구공 하나, 높은 복숭아 바구니 두 개, 그리고 13가지 규칙이었습니다.\n학생들은 처음에 이상하다고 생각했습니다. 접촉 금지. 드리블도 금지. 조심스럽게 패스하고 아치형으로 던지기만 하면 됩니다. 하지만 뭔가 끌렸어요. 이 게임은 다른 학교로, 그리고 다른 도시로 퍼져나갔습니다. 10년도 채 되지 않아 뉴욕에서 도쿄까지 체육관은 공이 튕기는 리듬과 '바스켓!"이라는 함성으로 울려 퍼졌습니다. 추운 날씨에 즐기는 오락으로 시작된 농구는 이제 더 위대한 스포츠로 자리 잡았습니다. 빠르고, 팀 기반이며, 현대 생활에 적합하고, 무엇보다도 [ROOT.GetCountry.GetAdjectiveNoFormatting]-탄생했습니다." #deepl:3707830614
 vikelas.21.g: "학교와 체육관에 도입하세요." #deepl:2248999233
 vikelas.21.t: "복숭아 바구니 게임" #deepl:2623215155
 vikelas.401.d: "오늘날 국제축구협회는 [GetGlobalVariable('vikelas_fifa_seat_global_var').GetStateRegion.GetCityHubName] 에서 설립되었으며, 정식 명칭은 Fédération Internationale de Football Association(FIFA)입니다." #deepl:3487975302
 vikelas.401.f: "1904년 5월 21일, 벨기에, 덴마크, 프랑스, 네덜란드, 스페인, 스웨덴, 스위스 등 7개국의 대표단이 헌장에 서명했습니다. 축구 규칙을 표준화하고, 국제 경기를 조직하며, 축구를 세계적인 수준으로 끌어올리는 것이 목표였습니다. 이렇게 탄생한 것이 바로 국제 축구 협회, 즉 FIFA입니다. 초창기 FIFA는 비상근 회장단, 아마추어 선수, 지역 분쟁 등 소박한 모습을 보였습니다. 하지만 물밑에서는 전 세계적인 움직임이 일어나고 있었습니다. 영국은 외국의 간섭을 경계하며 가입을 주저했습니다. 남미 국가들은 자체 연맹을 결성하기 시작했습니다. 1924년과 1928년, 올림픽 토너먼트는 축구의 진정한 영향력을 드러냈는데, 파리에 모인 6만 명의 관중은 군대가 아닌 팀을 응원했습니다." #deepl:2154770056
 vikelas.401.g: "FIFA에 가입하고 국제 대회를 지원하세요." #deepl:1192623767
 vikelas.401.t: "국제축구연맹 국제 축구 협회" #deepl:2948752940
 vikelas.411.d: "FIFA는 올해 월드컵 개최지를 [SCOPE.sCountry('vikelas_fifa_host_scope').GetName] 로 결정했습니다. 예선 라운드가 끝나면 우승 후보 목록이 8개 팀으로 좁혀집니다." #deepl:1721956240
 vikelas.411.f: "#V 다음 국가 대표팀이 8강에 진출했습니다#!\n\n[SCOPE.sCountry('vikelas_first_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_second_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_third_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_fourth_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_fifth_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_sixth_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_seventh_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_eighth_qualified_team_scope').GetName]" #deepl:1470693747
 vikelas.411.g: "최고의 팀이 승리하길 바랍니다." #deepl:900366891
 vikelas.411.t: "축구 월드컵 [TimeKeeper.GetCurrentDate.Format('y')]" #deepl:3683642621
 vikelas.412.d: "우리 팀은 모든 대륙에서 온 최고의 팀을 물리치고 세계 무대에서 승리를 거두었습니다. 전국에서 축하 행사가 열렸습니다!" #deepl:1604872733
 vikelas.412.f: "[SCOPE.sCountry('vikelas_second_winner_team_scope').GetName] 와의 열띤 경기 끝에 우리 대표팀은 월드컵 결승에서 [SCOPE.sCountry('vikelas_fifa_host_scope').GetName]. 우리 대표팀이 우승 트로피를 들어 올렸습니다. 결승전 휘슬이 라디오, 카페, 막사에 울려 퍼졌습니다. 북쪽의 광부부터 항구의 상인까지 온 국민이 하나가 되어 환호했습니다. 함장은 연단에서 눈물을 흘립니다. 새로운 세대가 지켜보며 꿈을 꿉니다." #deepl:1159882054
 vikelas.412.g: "우리는 챔피언입니다." #deepl:2663168066
 vikelas.412.t: "세계 챔피언" #deepl:3853223886
 vikelas.413.d: "우리 축구 대표팀이 결승에 진출했지만 아쉽게도 영광을 놓쳤습니다. 전국적으로 자부심과 비통함이 뒤섞여 있습니다." #deepl:80141764
 vikelas.413.f: "안타깝게도 우리 팀은 최선을 다했지만 충분하지 않았습니다. [SCOPE.sCountry('vikelas_first_winner_team_scope').GetName] 와의 긴장감 넘치는 경기에서 우리 선수들은 아쉬운 결과를 얻었습니다. 몇 주 동안 그들은 한 나라의 희망을 짊어지고 있었습니다. 진흙탕과 눈부신 더위 속에서도 그들은 달리고, 싸우고, 믿었습니다. 한 경기 한 경기, 그들은 전설이 되었습니다. 그들은 다른 국가가 연주될 때 고개를 높이 들었습니다. 눈물 대신 침묵만이 흘렀고, 그 후 천천히 고조되는 박수가 이어졌습니다." #deepl:3695564906
 vikelas.413.g: "이것은 우리에게서 도난당했습니다!" #deepl:3624655051
 vikelas.413.t: "실버 글로리 [SCOPE.sCountry('vikelas_fifa_host_scope').GetName]" #deepl:3043927783
 vikelas.414.d: "우리 대표팀은 [SCOPE.sCountry('vikelas_fifa_host_scope').GetName]. [SCOPE.sCountry('vikelas_first_winner_team_scope').GetName] 이 결승전에서 [SCOPE.sCountry('vikelas_second_winner_team_scope').GetName] 을 꺾고 조기에 탈락했습니다." #deepl:317995881
 vikelas.414.f: "희망, 즉 실체적인 희망이 있었습니다. 공장 마당에서 환호성이 울려 퍼지고, 교회에서 속삭이는 라디오 해설과 골목길에서 골을 재현하는 아이들이 있었습니다. 이 팀은 축구 이상의 것, 즉 야망과 자부심, 우리 자신을 뛰어넘을 수 있다는 믿음을 상징했습니다. 하지만 마지막 경기는 모든 것을 바꾸어 놓았습니다. 한 골을 허용했습니다. 보이지 않는 핸드볼. 놓친 기회. 이제 꿈은 끝났고 세상은 계속 흘러갑니다." #deepl:640236906
 vikelas.414.g: "우리는 믿었습니다. 그 정도면 충분했습니다." #deepl:4069550601
 vikelas.414.t: "꿈은 일찍 끝납니다" #deepl:1366412702
 vikelas.490.d: "[ROOT.Var('vikelas_coach_var').GetCharacter.GetFullName] 전 세대의 선수를 훈련하고 육성하며 이름을 알렸고, [ROOT.Var('vikelas_coach_var').GetCharacter.GetSheHe] 이제는 시니어 코치로 인정받을 만큼 유명해졌습니다!" #deepl:3173542618
 vikelas.490.f: ""
 vikelas.490.g: "경기장에서 뻔뻔하게 소리를 지를 수 있는 사람에게 주는 상입니다." #deepl:1195265680
 vikelas.490.t: "[ROOT.Var('vikelas_coach_var').GetCharacter.GetFullName] 이제 시니어 코치가 되었습니다!" #deepl:454610152
 vikelas.495.d: "새로운 [concept_vikelas_coach] 이 [SCOPE.sCharacter('vikelas_new_coach_scope').GetHerselfHimself] 을 도입했습니다. [SCOPE.sCharacter('vikelas_new_coach_scope').GetHerHis|U] 이름은 [SCOPE.sCharacter('vikelas_new_coach_scope').GetFullName] 입니다." #deepl:1753591119
 vikelas.495.f: ""
 vikelas.495.g: "[SCOPE.sCharacter('vikelas_new_coach_scope').GetSheHe|U] 우리 아이들을 승리로 이끌 것입니다." #deepl:1930939286
 vikelas.495.t: "새로운 코치" #deepl:2806014865
 vikelas.601.d: "앞바퀴에 직접 부착된 페달로 구동되는 이륜 장치인 새로운 발명품이 도로에 등장했습니다. '벨로시피드'라고 합니다." #deepl:497189807
 vikelas.601.f: "공원과 수도의 넓은 거리에서 고개를 갸우뚱하게 만듭니다. 모자와 조끼를 입은 신사들이 이상한 철제 프레임 위에 앉아 맹렬하게 페달을 밟으며 놀란 군중 사이를 비집고 지나갑니다. 일부는 넘어지고. 일부는 날아갑니다. 아이들이 웃습니다. 원로 정치가들은 눈썹을 치켜뜹니다. 신문에서는 이를 장난감 반, 약속 반인 '벨로시페드'라고 부릅니다. 마차 제작자가 발명한 이 '뼈를 흔드는 기계'는 혁명적인 만큼이나 무겁습니다. 자갈길에서는 등골이 오싹할 정도입니다. 하지만 부드러운 산책로에서는 놀라울 정도로 우아하게 움직입니다. 단순한 신기함이 아니라 새로운 종류의 운동의 씨앗이라는 소문이 돌고 있습니다." #deepl:2987098471
 vikelas.601.g: "재미있는 패션!" #deepl:3063453559
 vikelas.601.t: "포장 도로 위의 페달" #deepl:583302045
 vikelas.602.d: "동일한 크기의 바퀴, 체인 구동식 뒷차축, 향상된 균형감을 특징으로 하는 새로운 디자인의 자전거가 등장했습니다. 불안정한 하이 휠러와 달리 이 '안전 자전거'는 안정적이고 저렴하며 빠르게 센세이션을 일으키고 있습니다. 이 자전거의 발명가는? [SCOPE.sCharacter('vikelas_bicycle_inventor_scope').GetFullName]!" #deepl:1082254426
 vikelas.602.f: "낡은 벨로시페드는 뼈와 신경을 모두 흔들었습니다. 우뚝 솟은 페니 파싱은 빠른 속도를 제공했지만, 한 번만 잘못 움직여도 라이더는 날아가는 대가를 치러야 했습니다. 이제 작고 우아하며 안전한 새로운 종류의 자전거가 수도의 공방에서 보급되고 있습니다. 뒷바퀴에 체인 드라이브와 공기압 타이어를 장착한 이 자전거는 여성과 노동자들까지 타기 시작했습니다. 마차가 다니던 거리는 이제 돌 위를 달리는 부드러운 고무 소리로 울려 퍼집니다. 카페와 공장에서 모두 같은 결론을 내립니다: 이것은 장난감이 아닙니다. 빠르고, 조용하고, 갑자기 손이 닿는 곳에 있는 자유입니다." #deepl:2048166631
 vikelas.602.g: "모든 시민이 현대의 시대로 나아갈 수 있도록 하세요." #deepl:158167297
 vikelas.602.t: "미래의 자전거" #deepl:3168239488
 vikelas.611.d: "드디어 그날이 왔습니다. 전국에서 온 라이더들이 출발선에 모여 인간과 기계의 능력을 시험하기 위해 열망합니다. 공기는 기대감으로 가득합니다." #deepl:3817467534
 vikelas.611.f: "이미 관중들로 붐비는 대로 너머로 해가 떠오릅니다. 현수막이 펄럭입니다. 아침 공기에는 기름과 먼지 냄새가 가득합니다. 수십 명의 라이더가 공장에서 갓 출고된 반짝이는 자전거와 뒷골목 작업장에서 수리한 자전거를 타고 자전거를 타기 시작합니다. 환호성이 터져 나옵니다. 그리고 바퀴가 돌아가기 시작합니다.\n그들은 도시의 문을 지나 시골로 향합니다. 농부들은 밭에서 일손을 멈춥니다. 아이들은 길 옆에서 뛰어다닙니다. 사제들이 그들을 축복합니다. 냉소주의자들은 비웃습니다. 하지만 먼지가 뒤따라오는 동안 군중들 사이에서는 뭔가 더 큰 무언가가 시작되는 것 같은 묘한 느낌이 듭니다." #deepl:872369825
 vikelas.611.g: "모든 마을에 발전의 소리가 들리게 하세요." #deepl:4082081516
 vikelas.611.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]" #deepl:804172156
 vikelas.621.d: "전국 자전거 레이스의 우승자는 결승선을 넘어 전 국민의 상상력을 사로잡았습니다. 이제 모든 시선은 그가 무엇을 상징하는지 주목합니다." #deepl:2904065614
 vikelas.621.f: "신문에서는 그를 '철의 라이더'라고 불렀죠. 직공 가정에서 태어나 열두 살에 고아가 되었고, 열여섯 살에는 공장 노동자가 되었습니다. 낡은 안전 자전거를 정성껏 고치고 긁고 기름칠을 한 그의 승리는 단순한 스포츠의 승리가 아니었습니다. 그것은 비유였습니다. 관중들은 그의 이름을 외칩니다. 화가들은 그를 스케치합니다. 아이들은 그의 자세를 따라합니다. 하지만 그보다 더 많은 이데올로그들이 주목합니다. 어떤 이들은 그를 노동의 힘의 얼굴이라고 부릅니다. 다른 이들은 그가 국가의 활력을 증명한다고 말합니다. 언론은 그가 노동자인지, 애국자인지, 아니면 완전히 새로운 존재인지에 대해 논쟁을 벌입니다.\n라이더 자신은 거의 말을 하지 않습니다. 그는 미소를 짓고 고개를 끄덕이며 라이딩을 합니다." #deepl:2953543537
 vikelas.621.g: "그를 노동자 계급의 영웅으로 만들어주세요." #deepl:2363628364
 vikelas.621.h: "국가적 아이콘인 그를 축하하세요." #deepl:255033591
 vikelas.621.i: "그를 진보와 현대인의 상징으로 설정하세요." #deepl:3398545154
 vikelas.621.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]" #deepl:804172156
 vikelas.622.d: "전국 자전거 경주 도중 비극적인 사고가 발생했습니다. 한 명의 선수가 사망하고 여러 명이 부상을 입었습니다. 응원이 멈췄습니다." #deepl:644341100
 vikelas.622.f: "바퀴가 틀에 박혔습니다. 비명과 충돌, 그리고 비명이 터져 나왔습니다. 자전거가 도미노처럼 굴러 떨어지자 관중들이 앞으로 몰려들었습니다. 피와 먼지가 뒤섞였다. 헬멧이 찢어지고 뼈가 부러졌습니다. 공장 견습생이었던 열일곱 살 청년 한 명이 충격으로 사망했습니다. 신문은 분열되었습니다. 어떤 이들은 이를 발전의 필수적인 대가라고 말하고, 어떤 이들은 대중 스포츠의 무모함을 비난합니다." #deepl:1135060049
 vikelas.622.g: "전사자를 기립니다." #deepl:3728569964
 vikelas.622.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]" #deepl:804172156
 vikelas.623.d: "레이스의 한 특별한 무대가 대중의 마음을 사로잡았습니다. 관중들은 이 무대를 단순한 경연이 아닌 전설로 이야기합니다." #deepl:438486236
 vikelas.623.f: "라이더들은 새벽녘 언덕으로 사라졌습니다. 그다음은 더 이상 레이스가 아니라 정신력을 시험하는 시간이었습니다. 12명이 낙오했습니다. 세 명은 쓰러졌습니다. 한 명은 헤어핀 커브길에서 추락해 피를 흘리며 일어나 도움을 요청했습니다. 하지만 한 명은 안개 속을 뚫고 수천 명의 심장 속으로 뛰어들었습니다. 온 나라가 입을 다물지 못했습니다." #deepl:130901318
 vikelas.623.g: "도로가 그의 노력을 대대로 기억하게 하세요." #deepl:3983380699
 vikelas.623.h: "순간을 담은 그림을 의뢰하세요." #deepl:1275386135
 vikelas.623.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]" #deepl:804172156
 vikelas.624.d: "최근 레이스 스테이지에서 부정행위가 적발되어 비난이 쏟아지고 있습니다. 한 라이더가 부정행위를 하다가 적발되었지만, 일부에서는 그가 단지 덜 은밀하게 행동했을 뿐이라고 주장하고 있습니다." #deepl:3963790231
 vikelas.624.f: "'사람들은 그가 헛간 뒤에서 자전거를 갈아탔다고 합니다. 다른 사람들은 그가 숨겨진 와이어에 의해 언덕 위로 견인되었다고 말합니다.'\n\n사실은 모호합니다. 분명한 것은 그 라이더가 너무 빨랐다는 것입니다. 놀라울 정도로 빨랐습니다. 가혹한 업힐을 마친 후 너무 신선했습니다. 라이벌들은 숨을 헐떡입니다. 관중들은 숨을 헐떡입니다. 언론은 피 냄새를 맡습니다. 한 사진에는 같은 옷을 입은 두 번째 남자가 등장합니다. 또 다른 목격자는 야간 무대에서 라이더가 차에 밀리는 것을 봤다고 주장합니다. 피고인은 질투와 정치라고 부르며 모든 것을 부인합니다." #deepl:2810733320
 vikelas.624.g: "라이더의 자격을 박탈하고 사기를 폭로합니다." #deepl:2198835421
 vikelas.624.h: "스포츠를 위해 은폐하세요." #deepl:3797817672
 vikelas.624.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]" #deepl:804172156
 vikelas.625.d: "올해 레이스 시즌에는 치열한 라이벌전이 펼쳐지고 있습니다. 힘은 같지만 스타일은 정반대인 두 라이더가 전국을 두 진영으로 나눴습니다." #deepl:2483368762
 vikelas.625.f: "하나는 불: 무모하고 대담하며 젊은이들의 사랑을 받습니다. 모자를 군중에게 던지고 페달을 밟으며 웃고 경고 없이 공격합니다.\n\n다른 하나는 얼음으로 차분하고 계산적이며 거의 수학적입니다. 그는 힘을 아끼고, 초 단위로 승리하며, 필요할 때만 말을 합니다.\n\n옥상에서 그들의 이름을 외칩니다. 마을은 편을 가릅니다. 포스터는 빨간색 또는 파란색으로 인쇄됩니다. 양복점에서는 그 색깔의 모자를 판매합니다. 아이들은 나무 자전거를 타는 자세를 따라합니다.\n\n신문은 단순한 인종 이상의 것을 이야기합니다. 인격과 철학, 사람들이 어떤 사람이 되고 싶어 하는지에 대해 이야기합니다. 그리고 두 라이더는 한 치의 양보도 하지 않습니다." #deepl:1380551122
 vikelas.625.g: "이는 신문 문화에 도움이 될 것입니다." #deepl:3508242265
 vikelas.625.h: "경쟁을 정치적 이득을 위해 이용하세요." #deepl:442554493
 vikelas.625.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]" #deepl:804172156
 vikelas.626.d: "올해 레이스 시즌에는 치열한 라이벌전이 펼쳐지고 있습니다. 힘은 같지만 스타일은 정반대인 두 라이더가 전국을 두 진영으로 나눴습니다." #deepl:2483368762
 vikelas.626.f: "'그들은 마을 대장간에서 망치를 손에 들고 그을음으로 검게 그을린 얼굴로 홀로 그를 발견했습니다.'\n\n하강은 위험했습니다. 코너를 잘못 돌아 자갈이 깔렸고 앞 포크가 갈라졌습니다. 그의 자전거는 부상당한 새처럼 접혔습니다. 대부분은 멈췄을 겁니다. 하지만 그는 자전거 프레임을 몇 킬로미터나 끌고 절뚝거리며 내리막길을 내려왔습니다. 외딴 마을에서 그는 대장간을 발견했습니다. 정비공도 없고. 팀 차량도 없었습니다. 오직 벨로우즈와 모루, 그리고 자신의 두 손뿐이었습니다.\n몇 시간 동안 그는 소매를 걷어붙이고 턱을 괴며 기억과 느낌으로 앞 포크를 만들었습니다. 관리들이 도착했을 때 그는 잠시 멈춰 서서 '만지지 마세요'라고만 말했습니다.\n리더들보다 8시간 뒤에서 그는 다시 라이딩을 시작했습니다. 승리의 기회는 없었습니다. 하지만 코스 곳곳에서 관중들은 승자가 아니라 멈추기를 거부한 그를 응원하기 위해 환호성을 질렀습니다." #deepl:896070649
 vikelas.626.g: "감동적인 이야기입니다." #deepl:3324986220
 vikelas.626.h: "긴급 수리를 허용합니다." #deepl:385201552
 vikelas.626.i: "그를 기리세요!" #deepl:581594471
