 dubois.2173.f: "수장룡은 해양 파충류의 일종이에요. 전 세계 곳곳에서 화석을 찾을 수 있어요. 종에 따라 몸길이는 1.5미터에서 15미터 사이였어요. 종에 따라 다른 동물을 먹었을 거예요. 달팽이와 홍합부터 물고기와 다른 먹이까지... 물고기 덫을 닮은 U자형 턱과 날카로운 이빨은 유용한 도구가 되었어요." #deepl:1725138010
 dubois.2173.t: "플레시오사우루스" #deepl:3684543079
 dubois.2174.f: "바실로사우루스는 공룡이 아니라 선사 시대 고래의 한 형태예요. 긴 몸은 긴 뱀을 연상시키지만 길이가 최대 20미터에 달해 향유고래와 길이가 비슷합니다." #deepl:4279559397
 dubois.2174.t: "바실로사우루스" #deepl:3895138572
 dubois.2175.f: "거대 상어 메갈로돈은 아마도 지금까지 존재했던 상어 중 가장 큰 상어일 거예요. 하지만 현재 이빨과 척추뼈만 발견되었기 때문에 길이를 추정하기는 어렵습니다. 고생물학자들은 메가로돈의 길이를 9미터에서 30미터 사이로 추정하고 있습니다. 어느 쪽이든 상어 골격은 놀랍고 우리 컬렉션의 최고 보석 중 하나입니다." #deepl:1066794911
