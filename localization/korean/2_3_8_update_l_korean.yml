 add_je_verrier_venus_transit_1874_tt: "1874년 금성 통과#! 저널에 #V 금성 통과를 추가합니다. [GetPlayer.GetName]" #deepl:4189792598
 building_mr_lyme_regis_cliff: "라임 레지스 절벽" #deepl:3679524850
 building_mr_steamboat_rock: "공룡 국립 기념물 - 증기선 바위" #deepl:2047049064
