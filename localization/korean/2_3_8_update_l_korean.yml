 MR_FIFA_BUTTON_TT: "#T FIFA 찾기#!\n축구가 확산됨에 따라 국가 간 경기 수가 증가함에 따라 글로벌 관리 단체의 필요성이 대두되었습니다. FIFA(프랑스어: 국제축구연맹)는 협회 축구, 풋살 및 비치 사커의 국제 자율 규제 관리 기구입니다. 1904년 5월 21일에 설립된 세계에서 가장 오래되고 규모가 큰 비정부기구 중 하나입니다. FIFA의 창립으로 개별 국가 간의 국제 경기가 가능해졌고, 각국 코치들은 경기를 통해 실력을 향상시킬 수 있었습니다. 이는 결국 월드컵의 설립으로 이어집니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:3292557058
 MR_FIFA_CONTROLS_HQ_TRIGGER_TT: "#기본_텍스트 [GetPlayer.GetName] 는 [GetBuildingType('building_vikelas_fifa').GetName]#! 을 제어합니다." #deepl:3927007057
 MR_FIFA_PRESIDENT_BUTTON: "FIFA 회장 되기" #deepl:2121834751
 MR_FIFA_PRESIDENT_BUTTON_TT: "#T FIFA 회장 되기#!\n현직 FIFA 회장이 없어도 이 직책을 맡을 수 있습니다. 국제 축구 협회 본부를 통제한다는 전제하에 말입니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:1598483912
