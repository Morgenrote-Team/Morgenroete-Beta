 mfe_industry_events.1.t:0 "철도 회사 설립"
 mfe_industry_events.1.d:0 "인맥이 있는 정치인 [SCOPE.sCharacter('rich_dude').GetFullName]는 새로운 철도 회사를 지원하려 하지만, [SCOPE.gsInterestGroup('ig_intelligentsia').GetName]는 이 새로운 제안을 지지하지 않고 있다."
 mfe_industry_events.1.f:0 "\"철도 열풍이 전 세계를 휩쓸고 있습니다. 돈을 벌 기회가 많지만, 우리는 움직여야 하고, 빨리 움직여야 합니다. 어떻게 생각하십니까?\""
 mfe_industry_events.1.a:0 "[SCOPE.sCharacter('rich_dude').GetFullName]가 사업을 계속할 수 있도록 허용"
 mfe_industry_events.1.b:0 "추가 시도 차단"
 mfe_industry_events.1.c:0 "직원들의 노력에 보조금 지원"
 mfe_industry_events.2.t:0 "번창하는 철도 회사"
 mfe_industry_events.2.d:0 "[SCOPE.sState('railway_state').GetName]에 새로 들어선 철도는 지역 주민들에게 큰 인기를 끌었으며, 주민들이 열렬히 환영하고 있다."
 mfe_industry_events.2.f:0 "\"[SCOPE.sState('railway_state').GetName]에서 [ROOT.GetCountry.GetCapital.GetName]까지 가는 데 예전에는 세 시간이 걸렸지만, 이 새로운 노선 덕분에 이동 시간이 절반으로 줄었다.\""
 mfe_industry_events.2.a:0 "정말 대단하다!"
 mfe_industry_events.3.t:0 "곤경에 처한 철도 회사"
 mfe_industry_events.3.d:0 "주식 시장의 갑작스러운 변화로 인해 [SCOPE.gsInterestGroup('ig_industrialists').GetName]에 압력이 가해졌으며, 자본 조달원이 고갈되고 무리한 사업 확장에 나섰던 [SCOPE.sState('railway_state').GetName]의 철도 회사들도 어려움에 처했다."
 mfe_industry_events.3.f:0 "\"당연히 언론은 이 일을 대서특필하고 있다. 매일 [SCOPE.gsInterestGroup('ig_intelligentsia').GetName] 구성원들이 우리의 절망을 비웃는 기사를 쏟아내고 있다 — 뭔가 조치가 필요하겠어.\""
 mfe_industry_events.3.a:0 "철도에 보조금을 지급하라!"
 mfe_industry_events.3.b:0 "[SCOPE.gsInterestGroup('ig_industrialists').GetName]가 바로 자유 시장을 원했던 사람들이다..."
 subsidize_rail_state_tt:0 "[SCOPE.sState('railway_state').GetName]의 철도에 보조금을 지원합니다."