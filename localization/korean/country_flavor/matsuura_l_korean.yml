l_korean:
 matsuura.101.t: "에조로 향하려는 젊은이"
 matsuura.101.d: "[SCOPE.sCharacter('character_1_scope').GetFullName]라는 젊은이가 이북의 에조를 둘러보고 싶다고 밝혔다. 그러나 마츠마에 번은 사사로운 유람을 금하고 있다. 이 젊은이가 북방의 제도로 모험을 떠나는 것을 허락할 것인가."
 matsuura.101.f: "\"소인은 온 천하를 둘러보고 싶사옵나이다! 에조에서 당토, 다시 천축에 이르기까지! 천하의 장관을 눈에 담도록 허락하여 주시옵소서!\""
 matsuura.101.g: "그곳의 산천을 익히고 오는 것이 좋겠구나!"
 matsuura.101.h: "듣자하니 시를 쓴다던데, 둘러보고 오면 시상이 떠오를지 어찌 알겠느냐?"
 matsuura.101.i: "그 땅을 화폭에 담을 수 있지 않겠는가?"
 matsuura.101.j: "어느 누구라도 떠날 순 없다."
 matsuura_allowed_travels_modifier: "에조로의 유람 허락"
 matsuura.102.t: "서양의 화학"
 matsuura.102.d: "[SCOPE.sCharacter('character_1_scope').GetFullName]는 수년간 난학(서양 학문)을 연구해 왔다. 이제 그는 '화학'이라 부르는 학문에 관한 책을 집필하려 한다. 이 자를 지원하는 것이 좋은 선택일지도 모른다."
 matsuura.102.f: "\"그러니까, 먼 나라의 어떤 자가 실험을 하였는데…\"\n\"그 실험이란 게 무엇이냐 여쭈심은, 이론을 바탕으로…\"\n\"아, 이론은 또 무엇이냐 여쭈심은…\""
 matsuura.102.g: "이 자가 말하는 '화학'이란 도대체 무엇인가?"
 matsuura.102.h: "오랑캐의 학문이다!"
 matsuura_barbarian_ideas_modifier: "오랑캐의 학문"
 matsuura_nintendo_modifier: "닌텐도의 화투"
 matsuura.103.t: "닌텐도"
 matsuura.103.d: "교토의 야마우치 후사지로가 한창 유행 중인 화투의 전용 생산 공장을 설립하여, 일본 전역에서 시장을 선도하게 된 모양이다. 회사의 이름은 닌텐도라고 한다."
 matsuura.103.f: "\"자, 친구여 편하게 기대어 쉬게\n오늘의 수업은 그리 오래 걸리지 않을 걸\n조금 더 흥미롭게 만들기 위해\n이 괴짜 같은 노래 형식을 빌렸지\n때는 1889년, 찬사와 상을 받기 전의 이야기\n닌텐도는 화투 카드, 하나후다를 만들며 출발했네\n\n한 세기 동안 성장하며 무엇이 팔리는지 탐색했고\n청소기와 울트라 핸드, 러브 테스터와 러브 호텔까지 만들었지\n그러다 게임에 집중하게 되었네, 게임 앤 워치와 컬러 TV\n1981년에는 동키콩을 만들었고, 그 뒤는 모두가 아는 역사라네!\n\n이것이 닌텐도의 역사\n하나후다에서 마리오에 이르는 세월\n교토에서 시작해 미야모토라는 남자와 함께\n이것이 닌텐도의 역사라네\"\n\n— 매슈 타란토"
 matsuura.103.g: "제일 유행하는 놀이로 화투만한 것이 또 있으랴."