l_korean:
 matsuura.101.t: "에조로 여행하고 싶은 한 청년"
 matsuura.101.d: "[SCOPE.sCharacter('character_1_scope').GetFullName]는 북쪽의 에조로 여행을 가고 싶어 하는 젊은이입니다. 그러나 마츠마에 번은 여행을 제한하고 있습니다. 이 젊은이가 북쪽 섬들로 모험을 떠나는 것을 허락해야 할까요?"
 matsuura.101.f: "\"나는 어디든 여행하고 싶어! 에조, 모로코시, 텐지쿠! 세상의 경이로움을 꼭 보고 싶어!\""
 matsuura.101.g: "그는 그곳에서 풍경을 공부할 수 있었다!"
 matsuura.101.h: "시인이라고 들었는데 여행에서 영감을 받을 수 있을까?"
 matsuura.101.i: "이 지역의 그림을 그릴 수 있을까?"
 matsuura.101.j: "아무도 퇴장할 수 없다."
 matsuura_allowed_travels_modifier: "에조 여행 허용"
 matsuura.102.t: "서양 화학"
 matsuura.102.d: "[SCOPE.sCharacter('character_1_scope').GetFullName]는 수년간 난학, 즉 서양 학문을 연구해 왔습니다. 이제 그는 \"화학\"이라고 불리는 학문에 관한 책을 집필하려 합니다. 그를 지원하는 것이 좋은 선택일지도 모릅니다."
 matsuura.102.f: "\"있잖아, 먼 나라에서 온 어떤 사람이 실험이라는 걸 했대…\"\n\"실험이 뭐냐고? 만약 네가 어떤 이론을 갖고 있다면…\"\n\"아, 이론이 뭔지도 모르겠다고…?\""
 matsuura.102.g: "그가 말하는 '화학'이란 도대체 무엇인가?"
 matsuura.102.h: "야만적인 생각이다!"
 matsuura_barbarian_ideas_modifier: "야만적인 생각"
 matsuura_nintendo_modifier: "닌텐도 하나후다 카드"
 matsuura.103.t: "닌텐도"
 matsuura.103.d: "교토에서 야마우치 후사지로는 인기 있는 화투 카드 생산에 전념하는 카드 공장을 설립했습니다. 이 회사는 빠르게 일본 전역에서 시장을 선도하게 되었습니다. 회사 이름은 닌텐도입니다."
 matsuura.103.f: "\"자, 친구여 편하게 기대어 쉬게\n오늘의 수업은 그리 오래 걸리지 않을 걸\n조금 더 흥미롭게 만들기 위해\n이 괴짜 같은 노래 형식을 빌렸지\n때는 1889년, 찬사와 상을 받기 전의 이야기\n닌텐도는 화투 카드, 하나후다를 만들며 출발했네\n\n한 세기 동안 성장하며 무엇이 팔리는지 탐색했고\n청소기와 울트라 핸드, 러브 테스터와 러브 호텔까지 만들었지\n그러다 게임에 집중하게 되었네, 게임 앤 워치와 컬러 TV\n1981년에는 동키콩을 만들었고, 그 뒤는 모두가 아는 역사라네!\n\n이것이 닌텐도의 역사\n하나후다에서 마리오에 이르는 세월\n교토에서 시작해 미야모토라는 남자와 함께\n이것이 닌텐도의 역사라네\"\n\n— 매슈 타란토"
 matsuura.103.g: "하나후다 카드보다 더 인기 있는 게임이 있을까?"