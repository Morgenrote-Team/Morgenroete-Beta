l_korean:
 je_nationalization_germanization: "독일화"
 je_nationalization_germanization_goal: "#O 국가 정체성 발전#!이 #G 250#!에 도달합니다."
 je_nationalization_german_national_identity: "독일 정체성"
 je_nationalization_german_national_identity_reason: "몇 년간의 공동 성장과 일부 개혁을 거치며 범독일 정체성에 대한 의식이 점차 일반 대중 사이로 확산되고 있습니다. 이 의식은 국가가 어떤 방식으로 틀을 마련하든 지역 간에 점점 퍼져나갈 것입니다. 특히 정부 행정, 대학, 병영, 해군 기지 등의 혜택을 받는 지역은 통합적 기능 덕분에 범독일적 정체성을 더 쉽게 받아들이게 됩니다. 고도로 도시화된 지역일수록 이전까지는 지식인들만 연구하던 이 개념에 더 쉽게 접근할 수 있습니다. 이상적인 조건이 갖춰질 경우, 매년 한 개의 하위 국가가 이 새로운 정체성을 받아들일 수도 있습니다."
 nationalization.101.t: "[SCOPE.sState('united_german_culture_state').GetName] 내 독일 민족 의식"
 nationalization.101.d: "수년간의 사회적·정치적 영향 끝에, [SCOPE.sState('united_german_culture_state').GetName] 지역의 주민들은 독일 전체 민족에 대한 소속감을 갖게 되었다. 이제 이들은 범독일 정체성에 완전히 속해 있다."
 nationalization.101.f: "\"독일인이란, 그 자체를 위해 무언가를 하는 사람이다.\" - 리하르트 바그너"
 nationalization.101.g: "화합과 정의, 자유!"
 nationalization.102.t: "범독일적 의식"
 nationalization.102.d: "이제 독일 전역의 국민들이 더 이상 자신을 지역 정체성보다 국가 정체성에 우선적으로 속한 존재로 인식하게 되면서, 이는 국내의 독일인들뿐만 아니라 전 세계에 있는 독일인들에게도 영향을 미치고 있다."
 nationalization.102.f: "독일 민족 국가가 수립되고 범독일 정체성이 확립됨에 따라, 국경 밖에 있는 독일인들—세계 각지의 이민자든, 원래 외국 통치 하에 살던 사람들이든—도 이제 주로 자신을 독일인으로 인식하게 될 것입니다."
 nationalization.102.g: "독일어가 들리는 곳까지!"
 nationalization.103.d: "독일 민족국가가 수립되고 범독일 정체성이 확립됨에 따라, 국경 밖에 있는 독일인들 — 세계 각지의 이민자들이든 원래 외국 지배를 받던 지역 출신이든 — 역시 주로 자신을 독일인으로 인식하게 될 것이다. 우리나라에서도 이전처럼 단순히 지역적 출신을 언급하는 대신 독일인으로서의 정체성을 표명하려는 움직임이 생겨나고 있다."
 nationalization.103.g: "하지만 이 발명품이 인류에게 위험할 수도 있지 않을까?"
 united_german: "독일"
 nationalization_pan_german_identity_tt: "이제 전 세계적으로 모든 북부 독일과 남부 독일 인구는 자신을 범독일 인구로 식별하게 됩니다. 북독일과 남독일의 고향은 독일 고향일 뿐입니다."
 nationalization_german_consiousness_tt: "현지 북독일과 남독일 인구가 독일 인구로 통합됩니다. 북독일과 남독일의 본토 지역은 독일의 본토 지역으로 전환될 것입니다."
 nationalization_german_consiousness_capital_tt: "우리 수도 주의 북부 독일인과 남부 독일인 지역 주민들이 하나의 독일인 집단으로 통합됩니다. 이 지역은 독일인의 고향지로 재편될 것입니다. 우리의 주된 문화가 독일 문화로 바뀌며, 국가 전역에 걸쳐 독일화가 가능해질 것입니다."
 je_nationalization_german_national_identity_tt: "북부 독일, 남부 독일, 알레만 고향지가 모두 독일 고향지로 재편되었습니다."
 nationalization.104.t: "북독일 통합"
 nationalization.104.d: "이제 북독일 문화는 독일 문화로 완전히 통합되었다."
 nationalization.105.t: "남독일 통합"
 nationalization.105.d: "이제 남독일 문화는 독일 문화로 완전히 통합되었다."
 nationalization.106.t: "알레만 통합"
 nationalization.106.d: "이제 알레만 문화는 독일 문화로 완전히 통합되었다."
 nationalization.104.f: "두꺼운 외투를 걸치고 무장을 갖춘 레이더들이 우리 영토에 들어왔다. 그들은 우리 창고를 약탈하고, 귀중품을 훔치며, 산업을 파괴하고, 저항하는 자는 가차 없이 살해하고 있다. 국경의 마을들은 민병대와 군대를 보내 이 침입자들과 맞서 싸워 달라고 간절히 요청하고 있다. 우리 산업을 지키기 위해서라도 반드시 대응해야 한다."
 nationalization.104.g: "환영합니다, 형제 여러분!"
 nationalization.111.t: "[SCOPE.sCharacter('german_character_scope').GetLastName]가 독일 대의를 지지하다"
 nationalization.111.d: "범독일 정체성에 대한 요구가 커져가는 가운데, [SCOPE.sCharacter('german_character_scope').GetFullName]은 완전히 통일된 독일 민족국가의 이상과 자신을 동일시하게 되었다. 본인의 출신 지역보다는 독일이라는 국가 정체성을 더욱 중시하고 있는 것이다."
 nationalization.111.f: "\"나는 더 이상 어떤 정당도 모른다, 내가 아는 것은 독일인뿐이다!\" — 빌헬름 2세"
 nationalization.111.g: "클라인슈타테레이의 시대는 끝났다."
 nationalization.112.t: "독일 문화"
 nationalization.112.d: "독일은 시인과 사상가의 나라로 알려져 있다. 정치적 통일 이전에도 문화가 국가를 형성했다. 독일 문학과 음악은 세계적으로 유명하며, 정체성을 결속하는 접착제 역할을 할 수 있다."
 nationalization.112.f: "'인간, 특히 독일인은 자신만의 세계를 형성하며 교육을 받아들이지 않는 것을 견디는 법을 배운다.' - 프리드리히 실러"
 nationalization.112.g: "독일은 풍부한 음악적 역사를 가지고 있다."
 nationalization.112.h: "독일은 풍부한 문학의 역사를 가지고 있다."
 nationalization.112.i: "미래는 독일인에 있다!"
 nationalization.113.t: "독일 기념물"
 nationalization.113.d: "여러 단체와 협회, 그리고 애국자들과 민족주의자들이 독일의 영웅들을 기리고 새롭게 이루어진 국가 통일을 축하하는 수많은 기념비를 세우는 데 전념하고 있다. 라인 강변 니더발트에는 거대한 게르마니아 상이 건립될 예정이다."
 nationalization.113.f: "독일 통일 이후 활발한 건축 활동이 시작되었고, 이는 독특하고 풍부한 기념비 문화로 나타났습니다. 키프회저베르크의 바르바로사 기념비, 코블렌츠의 도이체스 에크, 튀토부르크 숲 남부 데트몰트 근처의 헤르만 기념비, 포르타 베스트팔리카의 카이저 빌헬름 기념비, 라이프치히의 민족전투 기념비, 함부르크의 비스마르크 기념비, 도나우슈타우프 근처의 발할라와 함께 니더발트 기념비는 독일 제국 시대에 주로 건립된 독일의 대표적인 대형 기념 건축물 중 하나입니다. 이 기념비의 건설에는 12년이 걸렸습니다."
 nationalization.113.g: "기념비 문화를 지원하고 니더발트덴크말을 건설하라."
 nationalization.113.h: "됐다."
 je_nationalization_frenchization: "프랑스화"
 je_nationalization_frenchization_reason: "1881년부터, 줄 페리 장관의 지침에 따라 학교에서 옥시타니아어를 사용하는 아이들은 처벌을 받았습니다. 이는 '라 베르곤야', 즉 '수치심 주기'로 알려진 언어 억압 현상으로 이어졌습니다. 이러한 억압은 프랑스 혁명 이래 중앙집권화 정책에 시달려온 프랑스의 다른 지역들에도 적용되었습니다. 19세기 말부터 프랑스 정부는 지역적 차이를 줄이고 획일적인 국가 정체성을 강화하기 위한 노력을 더욱 가속화했습니다."
 nationalization_frenchization_tt: "옥시타니아 지역, 프랑코 프로방스 지역, 브르타뉴 지역, 왈로니아 지역의 인구가 프랑스인이 됩니다. 그들의 고향은 프랑스의 고향으로 변모할 것입니다."
 je_nationalization_french_national_identity_tt: "모든 옥시타니아 지역, 프랑코 프로방스 지역, 브르타뉴 지역, 왈로니아 지역이 프랑스 고향으로 바뀝니다."
 nationalization_pan_french_identity_tt: "이제 전 세계의 모든 옥시타니아, 프랑코 프로방스, 브르타뉴, 왈로니아 인구는 스스로를 범프랑스 인구로 인식하게 됩니다."
 nationalization.201.t: "[SCOPE.sState('frenchization_state').GetName] 프랑스화"
 nationalization.201.d: "수년간의 정치적 영향과 집중적인 교육을 통해, [SCOPE.sState('frenchization_state').GetName]의 인구는 다른 프랑스 시민들과 구별할 수 없을 정도가 되었다. 그들의 생활 방식과 문화는 파리 지역과 동일해졌다."
 nationalization.201.f: "'파리 사람은 프랑스인에게 있어서 그리스인에게 아테네 사람이 그러했던 것과 같다. 그는 누구보다도 편안히 잠들고, 누구보다도 노골적으로 경박하고 게으르며, 누구보다도 태평스러워 보인다. 그러나 이는 오해다. 그는 모든 종류의 나태함에 빠질 수 있지만, 영광을 쟁취해야 할 때면 모든 종류의 분노로 불타오를 수 있다. 창을 쥐어주면 8월 10일의 반란을 재현하고, 머스킷총을 주면 오스터리츠 전투를 만들어낸다. 그는 나폴레옹의 도약대이자 당통의 버팀목이었다. '라 파트리'의 외침에 그는 입대하고, 자유의 부름에 그는 보도를 부순다. 그를 경계하라!' - 빅토르 위고"
 nationalization.201.g: "청결을 유지하고 프랑스어로 말해라."
 nationalization.202.t: "프랑스화 완료"
 nationalization.202.d: "수년간의 노력은 그만한 가치가 있었다. 프랑스는 하나의 언어, 하나의 문화, 하나의 중심 수도를 가진 국가다. 언어적, 문화적 차이의 시대는 끝났다. 프랑스인의 교육은 하나의 이정표로서 우리 역사에 기록됐다."
 nationalization.202.f: "프랑스 정체성이 확립됨에 따라, 국경 밖의 프랑스어 사용 공동체—세계 각지의 이민자이든 원래 외국 지배 하에 있던 이들이든 간에—도 주로 자신을 프랑스인으로 인식하게 될 것입니다."
 nationalization.202.g: "영광의 날이 다가왔다!"
 nationalization.204.t: "옥시타니아 통합"
 nationalization.204.d: "수년간 교육과 선전을 거듭하고, 지역의 하찮은 것들을 몰아낸 결과, 옥시타니아 문화는 이제 프랑스 문화와 거의 구분할 수 없게 되었다."
 nationalization.205.t: "프랑코 프로방스 통합"
 nationalization.205.d: "수년간 교육과 선전을 거듭하고, 지역의 하찮은 것들을 몰아낸 결과, 프랑코 프로방스 문화는 이제 프랑스 문화와 거의 구분할 수 없게 되었습니다."
 nationalization.206.t: "브르타뉴 통합"
 nationalization.206.d: "수년간 교육과 선전을 거듭하고, 지역의 하찮은 것들을 몰아낸 결과, 브르타뉴 문화는 이제 프랑스 문화와 거의 구분할 수 없게 되었습니다."
 nationalization.207.t: "왈로니아 통합"
 nationalization.207.d: "수년간 교육과 선전을 거듭하고, 지역의 하찮은 것들을 몰아낸 결과, 왈롱 문화는 이제 프랑스 문화와 거의 구분할 수 없게 되었다."
 nationalization.204.f: "'프랑스는 프랑스이기에 위대하다'. -빅토르 위고"
 nationalization.204.g: "환영합니다, 형제 여러분!"
 je_nationalization_swissiziation: "스위스화"
 je_nationalization_swissiziation_reason: "스위스가 여러 주의 연합체에서 연방 국가로 변모함에 따라, 각 주가 그 권리를 치열하게 지켜온 알프스 공화국은 진정한 민족 국가로 함께 성장하고 있습니다. 이제는 다른 나라에 맞서 통일된 스위스 정체성을 확립하기 위해 국민적 정서를 형성할 때입니다."
 je_nationalization_swissiziation_goal: "#O 국가 정체성 발전#!이 #G 50#!에 도달합니다."
 je_nationalization_swiss_national_identity: "스위스 정체성"
 je_nationalization_swiss_national_identity_reason: "급성장하는 민족주의 시대에 스위스도 자신의 역할을 지켜야 합니다. 프랑스, 이탈리아, 독일에서는 프랑스어, 이탈리아어, 독일어를 사용하는 것은 곧 프랑스인, 이탈리아인, 독일인이라는 생각이 강합니다. 수세기 동안 스위스만의 특수성을 인지한 독자적인 스위스 정체성이 이웃 국가들에 맞서 자신을 드러낼 수 있을 것입니다."
 nationalization.301.t: "[SCOPE.sState('united_swiss_culture_state').GetName]의 스위스 민족 의식"
 nationalization.301.d: "수년간의 사회적·정치적 영향 끝에, [SCOPE.sState('united_swiss_culture_state').GetName]의 주민들은 하나의 스위스 독일 민족으로서 소속감을 가지게 되었다. 이제 그들은 스위스인의 정체성에 완전히 속해 있다."
 nationalization.301.f: "\"세상이 끝난다 해도 나는 스위스에 있기를 원한다.\" — 알버트 아인슈타인"
 nationalization.301.g: "하나의 옴니버스, 하나의 모든 것!"
 nationalization.302.t: "스위스화 완료"
 nationalization.302.d: "스위스 전 국민은 이제 자신들을 지역 정체성보다 국가 정체성에 더 우선하여 속한다고 인식하게 되었다. 이제부터는 프랑스인도, 이탈리아인도, 독일인도 우리를 단지 여러 민족이 섞여 모인 집단으로 우습게 여길 수 없을 것이다."
 nationalization.302.f: "우리는 형제된 하나의 민족이 되고자 하네,\n위기와 고난 속에서도 결코 갈라지지 않으리.\n우리의 선조들처럼 자유롭고자 하며,\n차라리 죽음을 택할지언정 노예로는 살지 않으리.\n우리는 오직 가장 높은 하느님을 믿고 의지하며,\n결코 인간의 권세를 두려워하지 않으리."
 nationalization.302.g: "우리는 의지의 민족이다."
 nationalization.313.t: "빌헬름 텔 기념비"
 nationalization.313.d: "빌헬름 텔은 스위스 건국 신화의 대표적인 인물로 여겨지며, 국민 역사 기억 속에서 뤼틀리 맹세와 비견되는 위상을 가지고 있다. 여러 애국자들이 새롭게 깨어난 민족 의식을 고취하기 위해 그의 동상을 세우고자 한다."
 nationalization.313.f: "\"선한 사람은 자신을 마지막으로 생각한다.\" — 프리드리히 실러"
 nationalization.313.g: "우리는 과거를 미화할 필요가 있다."
 nationalization.313.h: "그렇다면 그 비용은 누가 부담해야 하나?"
 united_swiss: "스위스"
 nationalization_swiss_consiousness_capital_tt: "우리 수도 주의 알레만, 프랑코-프로방스, 티치네제, 로망슈 지역 주민들이 하나의 스위스 인구로 통합됩니다. 이 지역은 스위스 본토로 변모할 것이며, 우리의 주된 문화는 스위스로 변경되고, 전 국토에 스위스화 정책을 시행할 수 있게 됩니다."
 nationalization_swiss_consiousness_tt: "지역 내 알레만, 프랑코-프로방스, 티치네제, 로망슈 인구가 하나의 스위스 인구로 통합됩니다. 이들의 고향은 스위스 본토로 변화할 것입니다."
 je_nationalization_swiss_national_identity_tt: "모든 알레만, 프랑코-프로방스, 티치네제, 로망슈 고향지가 모두 스위스 고향지로 재편되었습니다."
 nationalization_pan_swiss_identity_tt: "남아 있는 모든 알레만, 프랑코-프로방스, 티치네제, 로망슈 인구가 하나의 스위스 인구로 통합됩니다. 이들에 속한 모든 인물들도 스위스인이 됩니다."
 nationalization_disunited_italy_modifier: "이탈리아 통일의 여파"
 nationalization_disunited_germany_modifier: "독일 통일의 여파"
 nationalization_brigants_modifier: "도적단"
 nationalization_anti_regionalism_ig_modifier: "반지역주의"
 nationalization_anti_regionalism_country_modifier: "반지역주의"
 nationalization_linguistic_impurity_modifier: "언어적 불순"
 nationalization_no_foscolo_modifier: "포스콜로 거부됨"
 je_nationalization_italianization: "이탈리아화"
 je_nationalization_italianization_reason: "이탈리아 통일 후, 마시모 다제글리오는 \"우리는 이탈리아를 만들었지만 이제 이탈리아인을 만들어야 한다\"고 말했습니다. 비록 이 말이 역사적으로 논란이 있을 수 있지만, 정치적 통일 이후 내부 단합이 결코 안정적이지 않았다는 점을 잘 보여줍니다. 산적들이 문제였던 남부뿐 아니라, 북부에서도 부르주아 엘리트를 제외한 대부분 사람들은 여전히 자신들의 지역 정체성에 더 강하게 연결되어 있었습니다. 앞으로 몇 년간 공동 전쟁, 높은 명성, 대학·미술원·행정기관 같은 국가 기관의 설립이 어려운 통일 과정을 거쳐 전 이탈리아적 정체성이 훨씬 강하게 자리 잡는 데 기여할 것으로 보입니다."
 je_nationalization_italianization_goal: "#O 국가 정체성 발전#!이 #G 250#!에 도달합니다."
 je_nationalization_germanization_reason: "1871년 독일 제국이 성립된 이후, 여러 연방 국가들 사이에서 독일인의 통일된 정체성 의식은 이미 매우 널리 퍼져 있었습니다. 독일 국가들을 통합해야 한다는 절박한 요구는 1848년부터 존재해 왔습니다. 바이에른에서는 20세기까지도 특정한 지역 정체성이 강하게 남아 있었지만, 이것 역시 점차 약화되었습니다. 공동의 전쟁 경험과 높은 국가적 위신, 그리고 대학·예술 학교·행정 기관과 같은 국가적 제도의 건설은, 힘겨운 통일 과정을 거친 뒤 앞으로 몇 년 안에 훨씬 더 강한 범독일적 정체성이 형성되도록 할 가능성이 높습니다."
 nationalization.12.f: "남부 이탈리아에서의 산적 행위는 고대부터 어떤 형태로든 존재해 왔습니다. 그러나 무작위 여행자를 노리는 무법자로서의 기원은 훗날 정치적 저항 운동의 형태로 크게 발전하였습니다. 1861년 사르데냐 왕국(후에 이탈리아 왕국)이 양시칠리아 왕국을 정복한 이후, 이 지역에서 가장 유명하고 잘 알려진 산적 형태가 등장하였습니다. 산적들 중에는 다양한 직업 배경과 동기를 가진 사람들이 혼재해 있었으며, 여기에는 전직 죄수, 도적, 그리고 이탈리아 정부가 일반 범죄자로 간주한 사람들이 포함되어 있었습니다. 또한 전직 군인과 부르봉 군대의 충성파도 있었습니다. 이들은 이탈리아 당국과 토지 소유 상류층뿐만 아니라 일반 민중에 대해서도 공격을 감행했으며, 마을, 도시, 농장을 자주 약탈하고 농부, 도시 주민, 경쟁 산적 무리 등 개인과 집단을 대상으로 무장 강도를 저질렀습니다."
 nationalization.12.g: "로빈 후드를 가장한 또 다른 산적이다!"
 nationalization.13.t: "지역 유산에 대한 두려움"
 nationalization.13.f: "1848년~1849년 혁명이 실패하면서, 이탈리아 통일 운동의 주도 세력이었던 네오-겔피즘은 사실상 무력해졌습니다. 그들은 원래 교황의 '우선 평등자' 대통령직 아래 연방 구조의 이탈리아를 지지했습니다. 이에 대응하여 중앙집권 세력이 절대적인 우위를 차지하게 되었으며, 이 현상은 20세기까지도 지속되었습니다. 지역적 민감성은 더 이상 고려되지 않았고, 오히려 지역 감정은 이탈리아 통일 노력을 파괴할 위험한 경향으로 간주되었습니다."
 nationalization.13.h: "우리는 이 특별한 유산을 고려해야 한다."
 nationalization.14.t: "방언인가, 아니면 언어인가?"
 nationalization.14.d: "우리나라의 주요 교사, 강사, 교수진은 이탈리아어의 보급을 공공기관뿐만 아니라 일상생활에서도 특히 적극적으로 추진해야 한다는 입장을 밝혔다. 이는 새로운 이탈리아에서 과학적-정치적 과정의 개선에 크게 기여할 것으로 기대되지만, 일반 대중, 특히 농촌 지역 주민들 사이에서는 별다른 호응을 하지 않고 있다. 이들은 여전히 방언만 사용하고 있기 때문이다."
 nationalization.14.f: "18세기까지만 해도 이탈리아 반도의 각 언어 변종들이 독립된 언어라는 점에는 의심의 여지가 없었습니다. 단테 알리기에리 덕분에 토스카나어만 높은 위신을 가진 것이 아니었습니다. 베네치아어는 베네치아 공화국의 공식 문서 및 필기 언어였으며, 카를로 골도니의 희곡을 비롯한 문학 작품들도 베네치아어로 쓰였고, 아드리아해 지역에서는 여전히 일종의 공용어로서 특별한 의미를 지니고 있었습니다. 나폴리어에 대해서도 비슷한 말을 할 수 있습니다. 그러나 19세기 들어서는 이탈리아에는 단 하나의 표준어만 존재하며, 그 외의 모든 언어들은 단지 방언에 불과하다는 시각이 우세해졌습니다. 북부에서 사용된 이탈리아어는 이미 별도의 언어적 위상을 지니고 있었음에도 말입니다. 하지만 정치 운동이 전개되는 과정에서 점점 현실적인 인식이 퍼졌습니다. 즉, 언어와 방언의 차이는 \"언어에는 해군과 군대가 있다는 점\"이라는 인식이 그것입니다."
 nationalization.14.g: "우리의 언어적 다양성은 우리의 위신이다."
 nationalization.14.h: "이탈리아어를 말하라, 분명하게 말하라. 나머지는 단지 방언일 뿐이다."
 nationalization.15.t: "포스콜로의 운명"
 nationalization.15.d: "국가적 감정이 점점 뚜렷해짐에 따라, 위대한 이탈리아 시인 우고 포스콜로의 유해를 영국에서 이탈리아로 이장하자는 목소리가 높아지고 있다."
 nationalization.15.f: "새롭게 탄생한 이탈리아 국가에는 이정표가 필요했습니다. 역사적 사건뿐만 아니라 역사적 인물들도 마찬가지였습니다. 프랑스의 경우처럼 파르테논 양식을 본떠 예술가, 과학자, 위대한 인물들을 위한 무덤을 조성하자는 생각은 초기에 제기되었습니다. 한때 저명한 시민들의 안식처였던 피렌체의 산타 크로체 성당은 이러한 목적에 가장 알맞은 장소로 보였습니다. 마키아벨리, 미켈란젤로, 갈릴레오 같은 인물들은 이미 오랫동안 토스카나인이라기보다 ‘이탈리아인’으로 인식되어 왔습니다. 자킨토스 섬 출신의 베네치아계 시인이자, 혁명기의 인물이었던 우고 포스콜로는 초기 이탈리아 자유주의와 민족주의의 상징적 인물로 여겨지며, 위대한 이탈리아 지성인들의 전당에 완벽히 어울리는 존재입니다. 그러나 포스콜로는 1827년 런던 근교의 턴햄 그린에서 망명 중 사망했습니다."
 nationalization.15.g: "그들에게 포스콜로를 우리에게 돌려달라고 요청하라."
 nationalization.15.h: "그들이 거절한다면 우리는 난처해질 것이다."
 nationalization.16.d: "이탈리아 정부는 유명한 시인이자 이탈리아 민족주의의 선구자인 우고 포스콜로의 유해를 넘겨줄 것을 요청하였다."
 nationalization.16.g: "그들에게는 그들만의 하찮은 시인이 있을 것이다. 이름이 뭐였더라?"
 nationalization.16.h: "포스코라는 녀석은 여기 그대로 남는다."
 nationalization.17.t_foscolo: "포스콜로가 돌아오다"
 nationalization.17.d_foscolo: "영국 정부가 승인했다. 포스콜로의 유해가 곧 이탈리아 땅으로 돌아와 산타 크로체 성당에 영면하게 될 것이다!"
 nationalization.17.f_foscolo: "Ugo Foscolo's return to Italy is considered one of the first key points for the young nation-state. Foscolo was celebrated like a returned hero; his burial was like a procession - with people crying and cheering. With the 'Pantheon' of great Italian personalities in Santa Croce, a fixed point of Italian nationalism was inaugurated that people could orientate themselves towards. The Italian heroes should would be the focus of this ideology, rather than the Catholic saints."
 nationalization.17.g: "위대한 이탈리아인이 고향으로 돌아왔다!"
 nationalization.17.t_no_foscolo: "여전히 망명 생활을 하는 포스콜로"
 nationalization.17.d_no_foscolo: "안타깝게도 영국 정부는 여러 가지 위선적인 핑계를 대며, 우고 포스콜로의 이탈리아 귀환을 가로막았다."
 nationalization.17.f_no_foscolo: "They actually had the arrogance to refer to the great Italian poet as 'that Fosco-guy'!"
 nationalization.17.h: "These sons of a one-legged cow are denying us our Foscolo!"
 nationalization.18.t: "이탈리아 음악 문화"
 nationalization.18.d: "Italy is considered one of the countries that played a decisive role in the development of musical culture - whether in the field of instrument making, in the development of opera, in the training of famous singers or in terms of great composers. Musically, since the Renaissance at the latest, the peninsula has been characterized by a unique musical culture that has captivated the whole of Europe and provided new impulses. The fact that Italian was the only opera language until the 19th century is evidence of this great heritage."
 nationalization.18.f: "'Give me the laundress' bill and I will set to music even that.' -Gioachino Rossini"
 nationalization.18.g: "Italy has a rich musical history."
 nationalization.18.h: "The future belongs to Italian musical culture!"
 nationalization.19.t: "Dante Cult"
 nationalization.19.d: "Dante Alighieri is considered the ultimate symbol of Italian culture, and his 'Divine Comedy' is considered one of the classics of world literature and the most important literary testimony of the Middle Ages. The worship of Dante has become a true cult among patriots and is at the same time seen as evidence to the outside world that a pan-Italian feeling existed long before the Risorgimento - after all, it was Dante who first defined the borders of Italy as the area in which the language of the 'Sì' would be spoken. A monument is to be erected in Florence that commemorates the 'supreme poet'."
 nationalization.19.f: "'Nel mezzo del cammin di nostra vita\nmi ritrovai per una selva oscura,\nché la diritta via era smarrita.' -Dante Alighieri"
 nationalization.19.g: "Support the Dante cult and build a monument in Florence."
 nationalization.19.h: "And torture future generations with tercets?"
 nationalization.12.t: "Brigands in [SCOPE.sState('nationalization_brigants_modifier').GetName]"
 nationalization.12.d: "The poor conditions in [SCOPE.sState('nationalization_brigants_modifier').GetName] have led to more and more people with no prospects joining the [SCOPE.sCharacter('manzoni_brigant_character').GetFullName] gang. They are now wreaking havoc in the surrounding area - to such an extent that the brigands have become a real problem. There are even supporters among the common people who see them as opponents of the government and increasing Italianization, and therefore as political and regional resisters."
 nationalization.13.d: "Ordinary people in [SCOPE.sState('nationalization_regionalist_state').GetName] fear that the new national Italian institutions and the popularization of the Italian language could destroy the traditional way of life there. [SCOPE.sCharacter('nationalization_rural_leader_scope').GetFullName] has argued that the region's special heritage should not be ignored and that the homogenization of Italy has already progressed too far."
 nationalization.13.g: "[SCOPE.sState('nationalization_regionalist_state').GetName] is an Italian region like any other."
 nationalization.11.t: "La scienza in cucina e l'arte di mangiar bene"
 nationalization.11.d: "In [TimeKeeper.GetCurrentDate.Format('y')], Italy witnessed the publication of a groundbreaking cookbook that would forever change its culinary culture. The author, Pellegrino Artusi, would thus make his contribution to the establishment of an internationally recognized Italian cuisine that emphasizes the unity and greatness of the nation."
 nationalization.11.f: "Published in 1891, Pellegrino Artusi's 'La scienza in cucina e l'arte di mangiare bene' is widely regarded as the first modern Italian cookbook. At a time when Italy was just beginning to forge a national identity, Artusi's work played a pivotal role in unifying the diverse regional cuisines into a coherent national culinary tradition. His meticulous collection of recipes, presented with wit and clarity, not only set a new standard for culinary literature but also contributed significantly to the improvement of the nation's standard of living by promoting quality, innovation, and pride in local gastronomy."
 nationalization.11.g: "A Triumph of Culinary Art!"