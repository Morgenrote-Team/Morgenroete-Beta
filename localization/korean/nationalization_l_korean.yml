l_korean:
 je_nationalization_germanization: "독일화"
 je_nationalization_germanization_goal: "#O 국가 정체성 발전#!이 #G 250#!에 도달합니다."
 je_nationalization_german_national_identity: "독일 정체성"
 je_nationalization_german_national_identity_reason: "몇 년간의 공동 성장과 일부 개혁을 거치며 범독일 정체성에 대한 의식이 점차 일반 대중 사이로 확산되고 있습니다. 이 의식은 국가가 어떤 방식으로 틀을 마련하든 지역 간에 점점 퍼져나갈 것입니다. 특히 정부 행정, 대학, 병영, 해군 기지 등의 혜택을 받는 지역은 통합적 기능 덕분에 범독일적 정체성을 더 쉽게 받아들이게 됩니다. 고도로 도시화된 지역일수록 이전까지는 지식인들만 연구하던 이 개념에 더 쉽게 접근할 수 있습니다. 이상적인 조건이 갖춰질 경우, 매년 한 개의 하위 국가가 이 새로운 정체성을 받아들일 수도 있습니다."
 nationalization.101.t: "[SCOPE.sState('united_german_culture_state').GetName] 내 독일 민족 의식"
 nationalization.101.d: "수년간의 사회적·정치적 영향 끝에, [SCOPE.sState('united_german_culture_state').GetName] 지역의 주민들은 독일 전체 민족에 대한 소속감을 갖게 되었습니다. 이제 이들은 범독일 정체성에 완전히 헌신하고 있습니다."
 nationalization.101.f: "\"독일인이란, 그 자체를 위해 무언가를 하는 사람이다.\" - 리하르트 바그너"
 nationalization.101.g: "화합과 정의, 자유!"
 nationalization.102.t: "범독일적 의식"
 nationalization.102.d: "이제 독일 전역의 국민들이 더 이상 자신을 지역 정체성보다 국가 정체성에 우선적으로 속한 존재로 인식하게 되면서, 이는 국내의 독일인들뿐만 아니라 전 세계에 있는 독일인들에게도 영향을 미치고 있습니다."
 nationalization.102.f: "독일 민족 국가가 수립되고 범독일 정체성이 확립됨에 따라, 국경 밖에 있는 독일인들—세계 각지의 이민자든, 원래 외국 통치 하에 살던 사람들이든—도 이제 주로 자신을 독일인으로 인식하게 될 것입니다."
 nationalization.102.g: "독일어가 들리는 곳까지!"
 nationalization.103.d: "독일 민족국가가 수립되고 범독일 정체성이 확립됨에 따라, 국경 밖에 있는 독일인들 — 세계 각지의 이민자들이든 원래 외국 지배를 받던 지역 출신이든 — 역시 주로 자신을 독일인으로 인식하게 될 것입니다. 우리나라에서도 이전처럼 단순히 지역적 출신을 언급하는 대신 독일인으로서의 정체성을 표명하려는 움직임이 생겨나고 있습니다."
 nationalization.103.g: "하지만 이 발명품이 인류에게 위험할 수도 있지 않을까?"
 united_german: "독일"
 nationalization_pan_german_identity_tt: "이제 전 세계적으로 모든 북부 독일과 남부 독일 인구는 자신을 범독일 인구로 식별하게 됩니다. 북독일과 남독일의 고향은 독일 고향일 뿐입니다."
 nationalization_german_consiousness_tt: "북부 독일과 남부 독일의 지역 주민들이 독일인으로 통합됩니다. 북부 독일과 남부 독일의 고향 지역들은 독일의 고향 지역으로 재편됩니다."
 nationalization_german_consiousness_capital_tt: "우리 수도 주의 북부 독일인과 남부 독일인 지역 주민들이 하나의 독일인 집단으로 통합됩니다. 이 지역은 독일인의 고향지로 재편될 것입니다. 우리의 주된 문화가 독일 문화로 바뀌며, 국가 전역에 걸쳐 독일화가 가능해질 것입니다."
 je_nationalization_german_national_identity_tt: "북부 독일, 남부 독일, 알레만족 고향지가 모두 독일 고향지로 재편되었습니다."
 nationalization.104.t: "북독일 통합"
 nationalization.104.d: "이제 북독일 문화는 독일에 완전히 통합되었습니다."
 nationalization.105.t: "남독일 통합"
 nationalization.105.d: "이제 남독일 문화는 독일에 완전히 통합되었습니다."
 nationalization.106.t: "알레만 통합"
 nationalization.106.d: "이제 알레만 문화는 독일에 완전히 통합되었습니다."
 nationalization.104.f: "두꺼운 외투를 걸치고 무장을 갖춘 레이더들이 우리 영토에 들어왔다. 그들은 우리 창고를 약탈하고, 귀중품을 훔치며, 산업을 파괴하고, 저항하는 자는 가차 없이 살해하고 있다. 국경의 마을들은 민병대와 군대를 보내 이 침입자들과 맞서 싸워 달라고 간절히 요청하고 있다. 우리 산업을 지키기 위해서라도 반드시 대응해야 한다."
 nationalization.104.g: "환영합니다, 형제 여러분!"
 nationalization.111.t: "[SCOPE.sCharacter('german_character_scope').GetLastName]가 독일 대의를 지지하다"
 nationalization.111.d: "범독일 정체성에 대한 요구가 커져가는 가운데, [SCOPE.sCharacter('german_character_scope').GetFullName]은 완전히 통일된 독일 민족국가의 이상과 자신을 동일시하게 되었습니다. 그는 자신의 출신 지역보다는 독일이라는 국가 정체성을 더욱 중시합니다."
 nationalization.111.f: "\"나는 더 이상 어떤 정당도 모른다, 내가 아는 것은 독일인뿐이다!\" — 빌헬름 2세"
 nationalization.111.g: "클라인슈타테레이의 시대는 끝났다."
 nationalization.112.t: "독일 문화"
 nationalization.112.d: "독일은 시인과 사상가의 나라로 알려져 있다. 정치적 통일 이전에도 문화가 국가를 형성했다. 독일 문학과 음악은 세계적으로 유명하며, 정체성을 결속하는 접착제 역할을 할 수 있다."
 nationalization.112.f: "'인간, 특히 독일인은 자신만의 세계를 형성하며 교육을 받아들이지 않는 것을 견디는 법을 배운다.' - 프리드리히 실러"
 nationalization.112.g: "독일은 풍부한 음악적 역사를 가지고 있다."
 nationalization.112.h: "독일은 풍부한 문학의 역사를 가지고 있다."
 nationalization.112.i: "미래는 독일인에 있다!"
 nationalization.113.t: "독일 기념물"
 nationalization.113.d: "여러 단체와 협회, 그리고 애국자들과 민족주의자들이 독일의 영웅들을 기리고 새롭게 이루어진 국가 통일을 축하하는 수많은 기념비를 세우는 데 헌신하고 있습니다. 라인 강변 니더발트에는 거대한 게르마니아 상이 건립될 예정입니다."
 nationalization.113.f: "독일 통일 이후 활발한 건축 활동이 시작되었고, 이는 독특하고 풍부한 기념비 문화로 나타났습니다. 키프회저베르크의 바르바로사 기념비, 코블렌츠의 도이체스 에크, 튀토부르크 숲 남부 데트몰트 근처의 헤르만 기념비, 포르타 베스트팔리카의 카이저 빌헬름 기념비, 라이프치히의 민족전투 기념비, 함부르크의 비스마르크 기념비, 도나우슈타우프 근처의 발할라와 함께 니더발트 기념비는 독일 제국 시대에 주로 건립된 독일의 대표적인 대형 기념 건축물 중 하나입니다. 이 기념비의 건설에는 12년이 걸렸습니다."
 nationalization.113.g: "기념비 문화를 지원하고 니더발트덴크말을 건설하라."
 nationalization.113.h: "됐다."
 je_nationalization_frenchization: "프랑스화"
 je_nationalization_frenchization_reason: "1881년부터, 줄 페리 장관의 지침에 따라 학교에서 옥시타니아어를 사용하는 아이들은 처벌을 받았습니다. 이는 '라 베르곤야', 즉 '수치심 주기'로 알려진 언어 억압 현상으로 이어졌습니다. 이러한 억압은 프랑스 혁명 이래 중앙집권화 정책에 시달려온 프랑스의 다른 지역들에도 적용되었습니다. 19세기 말부터 프랑스 정부는 지역적 차이를 줄이고 획일적인 국가 정체성을 강화하기 위한 노력을 더욱 가속화했습니다."
 nationalization_frenchization_tt: "옥시타니아 지역, 프랑코 프로방스 지역, 브르타뉴 지역, 왈로니아 지역의 인구가 프랑스인이 됩니다. 그들의 고향은 프랑스의 고향으로 변모할 것입니다."
 je_nationalization_french_national_identity_tt: "모든 옥시타니아 지역, 프랑코 프로방스 지역, 브르타뉴 지역, 왈로니아 지역이 프랑스 고향으로 바뀝니다."
 nationalization_pan_french_identity_tt: "이제 전 세계의 모든 옥시타니아, 프랑코 프로방스, 브르타뉴, 왈로니아 인구는 스스로를 범프랑스 인구로 인식하게 됩니다."
 nationalization.201.t: "[SCOPE.sState('frenchization_state').GetName] 프랑스화"
 nationalization.201.d: "수년간의 정치적 영향과 집중적인 교육을 통해, [SCOPE.sState('frenchization_state').GetName]의 인구는 다른 프랑스 시민들과 구별할 수 없을 정도가 되었습니다. 그들의 생활 방식과 문화는 파리와 동일해졌습니다."
 nationalization.201.f: "'파리 사람은 프랑스인에게 있어서 그리스인에게 아테네 사람이 그러했던 것과 같다. 그는 누구보다도 편안히 잠들고, 누구보다도 노골적으로 경박하고 게으르며, 누구보다도 태평스러워 보인다. 그러나 이는 오해다. 그는 모든 종류의 나태함에 빠질 수 있지만, 영광을 쟁취해야 할 때면 모든 종류의 분노로 불타오를 수 있다. 창을 쥐어주면 8월 10일의 반란을 재현하고, 머스킷총을 주면 오스터리츠 전투를 만들어낸다. 그는 나폴레옹의 도약대이자 당통의 버팀목이었다. '라 파트리'의 외침에 그는 입대하고, 자유의 부름에 그는 보도를 부순다. 그를 경계하라!' - 빅토르 위고"
 nationalization.201.g: "청결을 유지하고 프랑스어로 말해라."
 nationalization.202.t: "프랑스화 완료"
 nationalization.202.d: "수년간의 노력은 그만한 가치가 있었습니다. 프랑스는 하나의 언어, 하나의 문화, 하나의 중심 수도를 가진 국가입니다. 언어적, 문화적 차이의 시대는 끝났습니다. 프랑스인의 교육은 우리 역사의 이정표입니다."
 nationalization.202.f: "프랑스 정체성이 확립됨에 따라, 국경 밖의 프랑스어 사용 공동체—세계 각지의 이민자이든 원래 외국 지배 하에 있던 이들이든 간에—도 주로 자신을 프랑스인으로 인식하게 될 것입니다."
 nationalization.202.g: "영광의 날이 다가왔다!"
 nationalization.204.t: "옥시타니아 통합"
 nationalization.204.d: "수년간의 교육과 선전, 지역 문화 배제를 거쳐 오시탕 문화는 이제 프랑스 문화와 거의 구분할 수 없게 되었다."
 nationalization.205.t: "프랑코 프로방스 통합"
 nationalization.205.d: "수년간의 교육과 선전, 지역적 비본질적인 것들을 배제한 결과, 프랑코 프로방스 문화는 이제 프랑스 문화와 거의 구분할 수 없게 되었습니다."
 nationalization.206.t: "브르타뉴 통합"
 nationalization.206.d: "수년간의 교육과 선전, 지역적 비본질적인 것들을 배제한 결과, 브르타뉴 문화는 이제 프랑스 문화와 거의 구분할 수 없게 되었습니다."
 nationalization.207.t: "왈로니아 통합"
 nationalization.207.d: "수년간의 교육과 선전, 지역적 비본질적인 것들을 배제한 결과, 왈로니아 문화는 이제 프랑스 문화와 거의 구분할 수 없게 되었습니다."
 nationalization.204.f: "'프랑스는 프랑스이기에 위대하다'. -빅토르 위고"
 nationalization.204.g: "환영합니다, 형제 여러분!"
 je_nationalization_swissiziation: "스위스화"
 je_nationalization_swissiziation_reason: "스위스가 여러 주의 연합체에서 연방 국가로 변모함에 따라, 각 주가 그 권리를 치열하게 지켜온 알프스 공화국은 진정한 민족 국가로 함께 성장하고 있습니다. 이제는 다른 나라에 맞서 통일된 스위스 정체성을 확립하기 위해 국민적 정서를 형성할 때입니다."
 je_nationalization_swissiziation_goal: "#O 국가 정체성 발전#!이 #G 50#!에 도달합니다."
 je_nationalization_swiss_national_identity: "스위스 정체성"
 je_nationalization_swiss_national_identity_reason: "급성장하는 민족주의 시대에 스위스도 자신의 역할을 지켜야 합니다. 프랑스, 이탈리아, 독일에서는 프랑스어, 이탈리아어, 독일어를 사용하는 것은 곧 프랑스인, 이탈리아인, 독일인이라는 생각이 강합니다. 수세기 동안 스위스만의 특수성을 인지한 독자적인 스위스 정체성이 이웃 국가들에 맞서 자신을 드러낼 수 있을 것입니다."
 nationalization.301.t: "[SCOPE.sState('united_swiss_culture_state').GetName]의 스위스 민족 의식"
 nationalization.301.d: "수년간의 사회적·정치적 영향 끝에, [SCOPE.sState('united_swiss_culture_state').GetName]의 주민들은 하나의 스위스 독일 민족으로서 소속감을 가지게 되었습니다. 이제 그들은 스위스 정체성에 완전히 헌신하고 있습니다."
 nationalization.301.f: "\"세상이 끝난다 해도 나는 스위스에 있기를 원한다.\" — 알버트 아인슈타인"
 nationalization.301.g: "하나의 옴니버스, 하나의 모든 것!"
 nationalization.302.t: "스위스화 완료"
 nationalization.302.d: "The entire population of Switzerland no longer sees itself primarily as belonging to its regional identity but to its national identity. From now on no French, Italian or German nation can so easily claim that we are just a mixture of different peoples."
 nationalization.302.f: "We want to be a single People of brethren,\nNever to part in danger nor distress.\nWe want to be free, as our fathers were,\nAnd rather die than live in slavery.\nWe want to trust in the one highest God\nAnd never be afraid of human power."
 nationalization.302.g: "We are a nation of will."
 nationalization.313.t: "A monument to Wilhelm Tell"
 nationalization.313.d: "William Tell is considered one of the mythical founding figures of Switzerland and has a comparable status to the Rütli Oath in the historical memory of the population. Many patriots want to erect a statue in his honor to inspire the newly awakened national consciousness."
 nationalization.313.f: "'The good man thinks of himself last.' -Friedrich Schiller"
 nationalization.313.g: "We need to glorify our past."
 nationalization.313.h: "And who should pay for that?"
 united_swiss: "Swiss"
 nationalization_swiss_consiousness_capital_tt: "The local Alemannic, Franco-Provencal, Ticinese and Rumantsch populations of our capital state become one Swiss population. It will be transformed into a Swiss homeland. Our primary culture will change to Swiss and we will be able to swissize the whole country."
 nationalization_swiss_consiousness_tt: "The local Alemannic, Franco-Provencal, Ticinese and Rumantsch populations become one Swiss population. The homelands will be transformed into Swiss homelands."
 je_nationalization_swiss_national_identity_tt: "All Alemannic, Franco-Provencal, Ticinese and Rumantsch Homelands have been transformed into Swiss Homelands."
 nationalization_pan_swiss_identity_tt: "All remaining Alemannic, Franco-Provencal, Ticinese and Rumantsch populations become one Swiss population. All characters of this kind will become Swiss, too."
 nationalization_disunited_italy_modifier: "Aftermath of Italian Unification"
 nationalization_disunited_germany_modifier: "Aftermath of German Unification"
 nationalization_brigants_modifier: "Brigandage"
