 roy_ethnology_tech: "민족학"
 roy_ethnology_tech_desc: "19세기에 이르러 민족학은 별개의 학문 분야로 부상하며, 단순한 여행을 통한 관찰에서 벗어나 인간의 문화와 그 기원을 체계적으로 연구하는 학문으로 나아갔습니다. 진화론의 등장과 식민지 확장의 영향을 받은 초기 민족학자들은 비교론과 물질적 가공품 수집을 통해 세계구급 다양성을 분류하고자 하였습니다. 수십 년에 걸쳐 민족학은 순전히 추측에 지나지 않았던 인종적 위계질서에서 벗어나, 보다 엄격한 민족지학적 현장 연구로 나아가며 현대 사회인류학의 토대를 마련하였습니다."
 alert_roy_ethnologist_will_retire_soon_alert_name: "은퇴에 가까워진 [concept_roy_ethnologist]"
 alert_roy_ethnologist_will_retire_soon_alert_desc: "[concept_roy_ethnologist]가 은퇴에 가까워졌습니다. 대체할 인재를 찾아야 할 수도 있습니다."
 roy_ethnologist_will_retire_soon_alert_setting_name: "#tooltip:[GetRawTextTooltipTag('mr_morgenroete_tt')] @mr_morgenroete_icon!#!은퇴에 가까워진 [concept_roy_ethnologist]"
 alert_roy_ethnologist_will_retire_soon_alert_hint: "[concept_roy_ethnologist]가 향후 #V 5년#! 이내에 은퇴할 가능성이 있습니다. 새로운 민족학자를 선발하여 대체해야 할 수도 있습니다."
