 je_elgar_composer_composing_reason: "[ROOT.GetCountry.GetCustom('je_elgar_composer_composing_active_type')]진행중인 과제가 없어 분주한 상태가 아닌 [concept_elgar_composer]는 음악 작품을 작곡하게 됩니다.\n활성화된 과제가 없다면 매 12개월마다 @elgar_music_tradition![concept_elgar_musical_tradition] #G 5#!와 #V 명성#! #G 5#!를 획득하며 여러 상황에 따라 #V 작품#!을 얻게 됩니다.\n$mr_divider_for_je$\n[GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName](은)는 매 12개월마다 [ROOT.Var('elgar_estimated_yearly_compositions_var').GetValue|+=0]곡의 #V 작품#!을 작곡하게 됩니다."
