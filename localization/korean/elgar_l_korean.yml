 elgar.801.t: "국가"
 elgar.801.d: "국민들의  사이에서 민족 감정이 고조되면서, 통치자와 국가, 그리고 민족을 제대로 대표하는 국가를 향한 열망이 지식인층 뿐만 아니라 일반 대중들 사이에서도 커지고 있다."
 elgar.801.f: "19세기 중반 이전부터 유럽과 아메리카의 여러 국가에서는 공식 행사가 있을 때마다 특히 군주를 대표하는 특정한 곡을 연주하곤 했습니다. 어떤 국가는 일찍이 공식화되었지만 20세기가 되어서도 비공식으로 남은 국가도 있었습니다. 그 때문에 일부 국가는 처음부터 국가를 지정한 상태에서 시작하지만, 혁명이나 헌법 개정이 이뤄지면 바꿀 수 있습니다. 그러나 대다수 국가는 처음부터 국가를 새로 만들어 내야 하는데, 이 때 작곡가와 작가가 큰 보탬이 될 수 있습니다."
 elgar.801.g: "그건 나중에 처리하겠소."
 elgar.801.h: "[SCOPE.GetRootScope.GetCountry.GetCustom('elgar_monarch_anthem')]"
 elgar.801.i: "[SCOPE.GetRootScope.GetCountry.GetCustom('elgar_folk_anthem')]"
 elgar.801.j: "[SCOPE.GetRootScope.GetCountry.GetCustom('elgar_value_anthem')]"
 elgar.801.k: "[SCOPE.GetRootScope.GetCountry.GetCustom('elgar_military_anthem')]"
 elgar.801.l: "[SCOPE.GetRootScope.GetCountry.GetCustom('elgar_worker_anthem')]"
 elgar.801.m: "[SCOPE.GetRootScope.GetCountry.GetCustom('elgar_internationale_anthem')]"
 elgar.802.t: "시대에 맞지 않는 국가"
 elgar.802.d: "최근 법 개정으로 과거의 국가가 더 이상 적절치 않다는 인식이 확산되고 있다. 많은 이들이 지나간 정치 체제의 시대착오적인 잔재로 여기고 있으며, 이러한 과거의 짐을 없애야 한다는 압력이 커져가고 있다."
 elgar.802.f: "\"우리는 함대 없는 장군이 있소. 그 장군은 해안 없는 국가를 다스리지. 이것은 국왕 없는 왕국과도 같소.\""
 elgar.802.g: "현행 국가는 더 이상 조국을 대표하지 않고 있다."
 elgar.803.t: "반동적인 국가"
 elgar.803.d: "기존 국가를 폐지하자는 여론이 점점 더 커지고 있다. 정계 고위층에서는 [ROOT.GetCountry.GetNameNoFormatting](이)가 대표하는 근대 국가의 위업을 더욱 명확히 강조하는 국가를 새로 제정할 것을 요구하고 있다."
 elgar.803.f: "\"나아가라 민중이여, 구원을 향하여\n붉은 깃발이여, 붉은 깃발이여\n나아가라 민중이여, 구원을 향하여\n붉은 깃발은 승리하리라\n붉은 깃발은 승리하리라\n붉은 깃발은 승리하리라\n붉은 깃발은 승리하리라\n공산주의여 자유여 영원하라\""
 elgar.811.t: "[ROOT.GetCountry.GetNameNoFormatting] 국가"
 elgar.811.d: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullNameNoFormatting]께서 공식 행사에 연주될 특정 곡을 지정하는 칙령을 내렸다. 그 곡은 이름하여..."
 elgar.821.t: "[ROOT.GetCountry.GetNameNoFormatting]의 국가"
 elgar.821.d: "[GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName]에서 작업할 곡에 관하여 특히 바라는 부분이 있는지, 특별히 주의를 기울여야 할 부분은 없는지 질의해 왔다."
 elgar.821.f: "국가의 유형에는 총 다섯 가지가 있습니다. 군주 찬가는 정통성을 높이고, 민족 찬가는 갈등을 낮춰 주며, 이상 찬가는 삶의 질이 개선될 수록 충성도를 높이는 동시에 시민들이 사회적 퇴보에 저항력을 갖추도록 하며, 군사 찬가는 국가의 방어력을 강화합니다. 평의회 공화국은 노동 찬가를 의뢰할 수도 있는데 노동조합의 정치적 영향력을 증진시킵니다. 정부의 유형에 따라 모든 국가를 제정할 수 있는 것은 아닙니다."
 elgar.821.g: "국가는 우리 군주를 찬미해야 하오."
 elgar.821.h: "우리 정부와 민족을 결속시키려면 민족 찬가가 좋겠소."
 elgar.821.i: "우리나라의 이상을 담은 숭고한 국가를 작곡하기를 바라오."
 elgar.821.j: "우리 국민들에게 전투에 임하는 사기를 북돋아줄 노래가 필요하오!"
 elgar.821.k: "프롤레타리아를 찬양하는 노동자의 노래만이 용인될 수 있소."
 elgar.822.t: "찬가 작곡 완료"
 elgar.822.d: "오늘 거장 [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetLastName] 씨가 새 국가 후보로 제시할 악보를 제출해 왔다. 정부에서 이를 받아들일지는 아직 미지수로 남아 있다."
 elgar.822.f: "실제 국가로 지정되지 못한 찬가는 여러 가지가 존재하였으며, 그 이유도 다양했다. 국가의 승인을 받아야 하는 경우도 있고, 국가가 독창적인 곡조와 가사를 갖추어 더 강력한 위력을 발휘한 경우도 있었다."
 elgar.822.g: "국민들 사이에서 널리 받아들여지기를..."
 elgar.831.t: "찬가 작사 완료"
 elgar.831.d: "[GetPlayer.MakeScope.Var('manzoni_writer_var').GetCharacter.GetFullName] 씨는 오랫동안 국가에 걸맞은 가사가 필요할지 모른다는 생각을 풍고 있었다. 따라서 예전부터 전해져 내려오는 곡조에 잘 어울리는 가사를 빠르게 써내려갈 수 있었다."
 elgar.831.f: "\"......\" - 〈스페인 국왕 행진곡〉"
