 elgar_classicism_tech_desc: "예술에서 고전주의란 일반적으로 서양에서 전해져 내려오는 고전 시대, 즉 고대 그리스와 로마를 높이 평가하며 고전주의자들이 모방하고자 하는 감각적 기준을 제시하였습니다. 순수한 형태의 고전주의는 고대 그리스와 로마의 문화, 미술, 문학을 바탕으로 삼는 원칙에 따라 형태, 단순, 비례, 구조의 명확성, 완벽성, 절제된 감정, 그리고 지성에 대한 솔직한 호소에 방점을 둔 미적 태도에 해당됩니다."
 elgar_irrationalism_tech: "비이성주의"
 elgar_modern_art_tech: "현대 미술"
 elgar_modern_art_tech_desc: "#R 이 기술은 단순 더미 데이터로서 연구가 불가능합니다. [concept_elgar_impressionism], [concept_elgar_expressionism], [concept_elgar_art_nouveau]를 연구하려면 일지 항목을 완료하십시오!#!"
 elgar_art_nouveau_tech: "아르누보"
 elgar_art_deco_tech: "아르데코"
 elgar_art_deco_tech_desc: "아르데코는 정교한 장인정신과 고급 소재를 근대 양식에 접목한 예술 양식입니다. 전성기에는 사치와 화려함, 활력, 사회 기술 발전을 향한 믿음을 대변하였습니다. 아르데코는 최초의 진정한 국제 양식으로 꼽히지만 제2차 세계 대전 발발과 함께 그 권세도 끝을 맞이하였습니다."
 elgar_impressionism_tech: "인상주의"
 elgar_neoclassicism_tech: "신고전주의"
 elgar_neoclassicism_tech_desc: "새로운 세기가 열리면서 고전주의 이상을 향한 새로운 열풍이 불었는데, 바로 신고전주의입니다. 신고전주의는 적어도 음악과 철학, 문학 부문에 있어서 이들을 아우르는 양식이었습니다. 건축가들은 다시 한번 고대 로마와 그리스의 건축을 본보기로 삼았으며, 작곡가들은 바로크 음악을 영감의 원천으로 삼았습니다."
 elgar_expressionism_tech: "표현주의"
 elgar_new_objectivity_tech: "신즉물주의"
 elgar_new_objectivity_tech_desc: "본디 독일 회화의 한 경향을 가리키는 말로 쓰였던 이 용어는 독자적인 생명력을 얻고, 바이마르 공화국의 일상생활을 향한 태도 뿐만 아니라 그에 따라 창작되는 미술, 문학, 음악, 건축을 아우르는 것이 특징으로 자리잡게 되었습니다. 철학적 객관성을 목표로 삼기보다는 세상과의 실질적인 관계 형성, 즉 모든 것을 사업적으로 대하는 태도를 의미하였습니다. 독일 사람들은 이를 본질적으로 미국식으로 이해하였습니다."
 elgar_mass_culture_tech: "대중 문화"
 elgar_mass_culture_tech_desc: "#R 이 기술은 일지 항목을 통해서만 얻을 수 있습니다!#!\n\n'대중'—문화의 전통을 대표하는 모든 것에 대한 이해할 수 없는 적대감, 농민의 지혜를 혼동시키는 날카롭고 냉정한 지성, 성과 사회의 모든 문제와 관련하여 매우 원시적인 본능과 조건으로 돌아가는 새롭게 발견된 자연주의, 임금 분쟁과 경기장 형태로 되살아난 '빵과 서커스'—이 모든 것은 문화의 확실한 종말과 완전히 새로운 인간 존재 단계의 개막을 나타낸다.' - 오스발트 스펭글러, 《서구의 몰락》"
