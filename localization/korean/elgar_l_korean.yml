 je_elgar_composer_masterpiece: "작곡가의 걸작 작곡"
 je_elgar_composer_masterpiece_reason: "[GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName](은)는 추후 몇 달 동안 걸작 한 편을 작곡하기 위해 온전히 헌신할 것입니다. 작곡가가 걸작을 작곡하기까지 소요되는 시간은 주로 작곡가의 명성이 좌우합니다. 위대한 작곡가는 2년 만에 걸작을 작곡할 수 있습니다. 명성 400 미만의 작곡가는 훨씬 더 긴 시간이 소요되며, 250 미만의 작곡가는 시도조차 하지 않는 것이 좋습니다. 작곡 과정이 끝나면 [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName](은)는 우리 세대를 대표하는 음악 걸작을 선보이게 됩니다."
 je_elgar_composer_masterpiece_goal: "우리 [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName](은)는 별다른 일이 벌어지지 않는 이상 본연의 활동에 임하게 됩니다. 지금까지의 진행 기간은 #G [ROOT.Var('elgar_composer_progress').GetValue]개월#!입니다."
 je_elgar_composer_duel: "작곡가 2인 대결"
 je_elgar_composer_duel_reason: "[SCOPE.sCountry('target').GetAdjectiveNoFlag] 작곡가 [SCOPE.sCharacter('rival_composer_scope').GetFullName](이)가 우리나라는 문화적으로 뒤쳐져 있으며 [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName] 역시 미지수에 해당된다는 발언을 남겼다. 우리는 반드시 이 사실을 널리 알려야 하며 그것을 통해 어느 나라가 음악계의 전위대로 여겨지는지를 세계에 증명해야 한다."
 je_elgar_composer_duel_success: "양국의 작곡가 중에서 #V 추가 명성 100#!을 먼저 획득하는 작곡가가 있다면 상대국보다 자기 나라가 문화적으로 더 높은 인정을 받고 있음을 증명하게 됩니다."
 je_elgar_composer_duel_rival_death: "상대 작곡가가 요절하는 경우에도 승리로 이어지게 됩니다."
 je_elgar_composer_duel_fail: "상대 작곡가가 우리보다 먼저 #V 100 이상의 명성#!을 확보하거나 우리 작곡가가 일찍 사망하면 대결에서 패배합니다."
 elgar.9.t: "12음 기법"
 elgar.9.d: "수십 년간 이어진 음악의 침체기를 뒤로 하고 현대 작곡가들은 음악계를 뒤바꿔놓을 새로운 개념을 제시하였다."
 elgar.9.f: "12음 기법 (12음 음악)은 음악 작곡의 한 기법입니다. 이 기법은 반음계의 12음 전부를 음렬대로, 즉 12개 음정을 순서대로 배열하여 모든 음이 동일한 빈도로 연주되도록 하면서도 특정 음이 강조되지 않도록 하는 것입니다. 이에 따라 12음 모두가 과하지도 모자라지도 않는 균일한 중점을 지니며, 음악 자체도 특정 조에 얽매이지 않게 됩니다. 시간이 흐르면서 12음 기법은 상당한 인기를 끌었고 결국 20세기 작곡가들에게 지대한 영향력을 끼치게 되었습니다. 12음 기법은 음렬주의의 한 형태로 널리 여겨집니다."
 elgar.9.g: "그게 좋은 발상인지는 잘 모르겠구만."
