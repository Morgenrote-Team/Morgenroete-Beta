 elgar_art_nouveau_tech_desc: "#R 이 기술은 모르겐뢰테 GUI 내 예술 탭의 버튼으로만 개발이 가능합니다!#!\n\n[concept_elgar_art_nouveau]는 미술과 건축, 응용미술 (특히 공예미술) 분야의 국제적인 양식입니다. 아르누보는 여러 언어에서 서로 다른 이름으로 불렸습니다. 독일어로는 유겐트슈틸, 이탈리아어로는 스틸레 리베르티, 카탈루냐어로는 모데르니즈메, 영어로는 모던 스타일로 알려지게 되었습니다. 아르누보는 식물과 꽃의 물결형 곡선처럼 자연의 형상에서 영감을 받은 경우가 많았습니다. 건축가와 디자이너들은 정신적으로 고양되는 '총체적 예술 작품' (Gesamtkunstwerk, 게잠트쿤스트베르크)으로 예술의 통합을 추구하였습니다."
 elgar_impressionism_tech_desc: "#R 이 기술은 모르겐뢰테 GUI 내 예술 탭의 버튼으로만 개발이 가능합니다!#!\n\n[concept_elgar_impressionism]는 19세기에 나타난 미술 양식으로 순간적인 장면 속 분위기를 묘사하는 것이 특징입니다. 인상주의라는 용어 자체는 음악과 문학, 영화, 사진의 특정 양식에도 적용되었습니다."
 elgar_expressionism_tech_desc: "#R 이 기술은 모르겐뢰테 GUI 내 예술 탭의 버튼으로만 개발이 가능합니다!#!\n\n[concept_elgar_expressionism]는 시와 회화에서 출발한 모더니즘 운동입니다. 세상을 오로지 주관적 관점으로 표현하고, 분위기나 생각을 불러일으키기 위해 감정적 효과로서 세상을 근본적으로 왜곡하는 것이 전형적인 특징이었습니다."
 elgar.423.d: "[SCOPE.sCharacter('elgar_conductor').GetFullName](은)는 자신의 작업 환경이 여러 직책을 수행하기에 충분치 않다고 불만을 표하고 있다. 아무래도 이 분의 '영감'을 향상시키기 위해서는 금전적 지원이 필요할 지도 모른다."
 elgar.424.d: "[SCOPE.sCharacter('elgar_conductor').GetFullName](은)는 한동안 작곡에 힘써 왔으나 특정 인물로부터 방해를 받고 있는 상황이다."
 elgar_irrationalism_tech_desc: "비이성주의는 19세기에 등장한 철학 운동으로서 인간의 삶에 있어서 비이성적 관점을 강조합니다. 비이성주의자들은 인간의 이성만으로는 객관적 현실의 근본과 관계, 법칙을 파악할 수 없다고 주장합니다. 세계에 대한 서술적이고 규범적인 해설의 대안으로 직관과 신앙, 직접적인 경험과 같은 고차원 인지 기능을 제시하고 있습니다."
