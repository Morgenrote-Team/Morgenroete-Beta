 elgar.440.i: "모두가 공감할 수 있는 민요가 분명 하나쯤은 있을 터."
 elgar.441.h: "뱃노래는 선원들만 북돋우는 것이 아니오..."
 elgar.442.h: "행진가는 군인들만 북돋우는 것이 아니지..."
 elgar_adopt_national_anthem_decision: "국가 채택"
 elgar_adopt_national_anthem_decision_desc: "민족주의가 부상하는 요즘 시대에 국가가 없다는 것은 바보나 다름없다. 상징적인 목표를 위해 적정히 받아들일 수 있는 의례 음악을 채택하는 것으로도 충분하다. 작곡가는 나중에 국가로 쓰일 음악을 무작위로 작곡하기도 하지만, 직접 의뢰를 받아서 작곡할 수도 있다. 찬가에 가사가 꼭 들어가야 하는 것은 아니지만 가사가 있ㄴ는 것이 훨씬 근사할 것이다."
 je_elgar_composer_anthem: "국가의 선율을 짓는 작곡가"
 je_elgar_composer_anthem_reason: "[GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName](은)는 [ROOT.GetCountry.GetNameNoFormatting]의 국가가 될 선율을 작곡하는 막중한 임무를 맡게 되었다."
