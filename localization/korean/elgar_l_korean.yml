 je_elgar_accademia_santa_cecilia: "산타 체칠리아의 학술원 지위 승격"
 je_elgar_accademia_santa_cecilia_reason: "산타 체칠리아 아카데미아는 1585년 교황 식스투스 5세의 칙령 '라티오네 콩그루이트' (Ratione Congruit)에 따라 수도원의 형태로 설립되었다. 1838년 산타 체칠리아 수도회는 정식 명칭을 아카데미로, 그 후에는 교황청 아카데미로 바꾸었다. 당시 회원으로는 루이지 케루비니, 메르카단테, 도니체티, 로시니, 파가니니, 오베르, 리스트, 멘델스존, 베를리오즈, 구노, 마이어베어 등이 있었다. 명예 회원으로는 영국의 빅토리아 여왕이 있었다. 이탈리아 통일 이후 산타 체칠리아 아카데미아는 선두적인 음악원으로 발전해 나갔다."
 je_elgar_leipzig_conservatory: "라이프치히 음악원 설립"
 je_elgar_leipzig_conservatory_reason: "요한 세바스티안 바흐가 일찍이 자취를 남겼던 전통적인 음악 도시 라이프치히는 19세기 초에 이르러 음악과 학술 인재 양성소를 설립하기에 모자람 없는 환경을 마련하였습니다. 변호사 하인리히 콘라트 슐라이니츠 (부원장), 라히프치히 구역담당관 요한 파울 폰 팔켄슈타인, 작센 왕정 고문 요한 게오르크 카일, 그리고 게반트하우스 지휘자 펠릭스 멘델손 바르톨디, 이들 라히프치히 시민 4인의 헌신으로 구상의 실현에 나서게 되었습니다."
 je_elgar_petrograd_conservatory: "페트로그라드 음악원 설립"
 je_elgar_petrograd_conservatory_reason: "옐레나 파블로브나 대공비, 안톤 루빈슈타인, 안드레이 니콜라예비치 마르코비치 등 사회와 음악계 저명 인사들의 주도로 설립된 러시아 음악 협회는 음악 강좌를 기반으로 러시아 최초의 음악원이 탄생하는 계기를 마련했다. 안톤 루빈슈타인은 음악원의 초대 원장이자 피아노 교수였다. 이곳에서 작곡을 전공한 최초의 졸업생은 표트르 차이코프스키였다. 니콜라이 안드레예비치 림스키코르사코프는 작곡과 기악 전공 교수이자 오케스트라 학부장으로서 특히 상당한 영향력을 행사하였다."
 elgar.201.t: "[SCOPE.sState('elgar_art_capital').GetCityHubName]상"
 elgar.201.d: "미술을 사랑하는 우리나라의 엘리트층에서 최고의 음악을 선정하는 예술상 제정을 추진하고 있다."
 elgar.201.f: "비이성주의나 인상주의의 중심지를 보유한 국가들은 간혹 음악 대회를 개최합니다. 가장 뛰어난 작곡가 다섯 명이 입상하여 명성에 큰 영향을 미치게 됩니다. 음악 대회는 보통 5년에 한 번씩 열립니다. 위대한 작곡가들은 이미 본인의 공로를 인정받았기 때문에 초청받지 않습니다."
 elgar.201.g: "음악 대회를 개최해야겠다."
 elgar.201.h: "돈 낭비야!"
 elgar.202.t: "[SCOPE.sState('elgar_art_capital').GetCityHubName]상 수상 결과"
 elgar.202.d: "심사위원단이 심사를 마치고 최고의 음악들을 선정했다. 이제 막 5인의 수상 명단이 공개되었다."
