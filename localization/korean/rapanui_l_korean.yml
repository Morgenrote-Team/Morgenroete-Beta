 rapanui_easter_island_ai_decision_desc: "이스터섬은 태평양 해역에서 칠레의 패권을 확립하기 위해 전략적으로 중요한 요충지다."
 rapanui_pacific_expedition_decision: "태평양 탐험"
 rapanui_pacific_expedition_decision_desc: "태평양은 극지대와 더불어 아직도 비밀을 간직하고 있는 지구상 최후의 지역 중 하나이다. 자연사, 고생물학, 천문학, 해양학 연구를 수행하기 위한 조사 임무에 여러 과학 분야의 학자들이 관심을 보이고 있다. 한편 강대국으로서는 세계의 끝자락에서 영향력을 과시할 영광스러운 사건으로 남을지도 모른다."
