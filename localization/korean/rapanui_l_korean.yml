 rapanui_low_mission_tension_tt: "이 땅에서는 다른 선교 활동과 관련해 아무런 문제가 없습니다."
 rapanui_medium_mission_tension_tt: "다른 교파의 선교사들과 일부 갈등을 빚고 있지만, 아직까지 잘 다룰 수 있는 상황에 머물러 있습니다."
 rapanui_high_mission_tension_tt: "경쟁 선교단과의 갈등이 언제든 정치 갈등으로 비화될 수 있는 상황입니다."
