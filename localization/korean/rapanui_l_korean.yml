 rapanui_northwest_expedition_location_arctic_tt: "탐사대가 캐나다와 북극해 사이를 따라 항해합니다."
 rapanui_northwest_expedition_location_ice_tt: "탐사대가 빙붕 속에 갇힙니다."
 rapanui_northwest_expedition_location_lost_tt: "탐사대가 모습을 감춥니다."
 rapanui_northwest: "Discoverer of the Northwest Passage"
 je_rapanui_northwest_expedition: "The [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting] Expedition"
 je_rapanui_northwest_expedition_reason: "The [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting] Expedition is searching for a Northwest Passage in the Arctic. The government expects this to be a multi-year undertaking. Each summer the expedition will attempt a breakthrough; every winter the crew will hibernate in the Eternal Ice. If no breakthrough has been achieved after four years, the expedition is considered lost. Whether a breakthrough through the Northwest Passage succeeds, a lost expedition returns or the entire mission ends as a national disaster depends largely on the mission's #V Success Chance#!. A #V Success Chance#! of at least #G 80#! guarantees passage through the Northwest Passage. A #V Success Chance#! of #YELLOW 60#! means that the expedition will not achieve a breakthrough, but will at least bring back new knowledge. If the #V Success Chance#! is #R less than 30#!, a national tragedy can be expected.\n\nAt the moment our #V Success Chance#! is #ORANGE [ROOT.Var('rapanui_northwest_success').GetValue]#!."
 je_rapanui_northwest_expedition_fail: "The expedition will fail if there is no breakthrough through the Northwest Passage within four years."
 je_rapanui_northwest_expedition_success: "With a #V Success Chance#! of at least #G 80#!, a breakthrough through the Northwest Passage is possible, provided it stays above this value for a year."
 je_rapanui_northwest_expedition_invalid: "If another nation breaks through the Northwest Passage before us, the crew will return without having achieved anything."
 rapanui.401.t: "Northwest Passage: Chance of Success"
 rapanui.401.d: "Preparations for the expedition have begun. With the '[SCOPE.sCharacter('rapanui_ship_scope').GetLastNameNoFormatting]' a flagship is ready. Scientists and sailors are calculating our current chances of success for the first time."
 rapanui.401.f: "The chance of successfully making a safe breakthrough through the Northwest Passage is based on several factors. The basic value, which is determined during the preparations, is the sum of the naval technologies researched. Advances in the field of food preservation - vacuum canning and pasteurization - also have a very positive effect. Completing oceanographic research from the Pacific Expedition or having a Vanguard Navy brings additional bonuses. With scientists such as engineers and astronomers, this baseline can be improved. During the journey, random events such as the weather can influence the value - for better or for worse."
 rapanui.401.g: "We will find the Northwest Passage - for the glory of [ROOT.GetCountry.GetNameNoFormatting]!"
 rapanui.401.h: "At second glance, this undertaking is much more dangerous than first thought."
 rapanui.402.t: "Objection!"
 rapanui.402.d: "[SCOPE.sCharacter('rapanui_ig_leader').GetFullName], whose party is a member of the current government coalition, has vehemently objected to the expedition to find the Northwest Passage. [SCOPE.sCharacter('rapanui_ig_leader').GetSheHe] speaks of a 'suicide mission'."
 rapanui.402.f: "Yesterday, representatives of [SCOPE.sCharacter('rapanui_ig_leader').GetLastName]'s party announced a protest against the action, which they say took place behind their backs. They see an expedition to cross the Arctic as expensive, pointless and highly risky. The money, they say, could be better spent elsewhere. It would also jeopardize the lives of important men who could otherwise serve our country."
 rapanui.402.g: "They'll have to live with it."
 rapanui.402.h: "Grant them political concessions."
 rapanui.403.t: "Northwest Passage: Expedition Leader"
 rapanui.403.d: "An expedition to the Arctic is one of the most dangerous maritime maneuvers. It takes a good captain to accept this challenge and lead the venture to a happy end."
 rapanui.403.f: "Only experienced captains should lead this mission: good captains give the expedition a better chance of success. Qualities like #YELLOW Experienced or Expert Naval Commander#! help with this. #YELLOW Explorers#! are particularly predestined and if the captain has even #YELLOW completed a circumnavigation#! of the world, he is considered the best choice. But be careful: if the expedition ends in disaster, there is a chance that the captain will also go down with the ship..."
 rapanui.403.g: "[SCOPE.sCharacter('rapanui_northwest_expedition_leader_1').GetFullName]"
 rapanui.403.h: "[SCOPE.sCharacter('rapanui_northwest_expedition_leader_2').GetFullName]"
 rapanui.403.i: "[SCOPE.sCharacter('rapanui_northwest_expedition_leader_3').GetFullName]"
 rapanui.404.t: "Ships Chaplains"
 rapanui.404.d: "The upcoming sea voyage into the unknown means a long period of isolation. [SCOPE.sCharacter('rapanui_ig_leader').GetFullName] has offered to use [SCOPE.sCharacter('rapanui_ig_leader').GetHerHis] contacts and appoint ship chaplains to improve morale on board."
 rapanui.404.f: "'This is a purely pastoral matter to look after the lost souls at sea. The Inuit? What made you think we wanted to convert the Inuit? Infamous allegations!\nOf course we'll ask them politely beforehand.'"
 rapanui.404.g: "The sailors need pastors on such a dangerous journey."
 rapanui.404.h: "Technology and skill, not God, will save us at sea."
 rapanui.405.t: "Engineer improves Expedition ships"
 rapanui.405.d: "[SCOPE.sCharacter('rapanui_engineer_scope').GetFullName] offered [SCOPE.sCharacter('rapanui_engineer_scope').GetHerHis] technical knowledge to upgrade our fleet for the Arctic Sea expedition."
 rapanui.405.f: "In advance of the infamous Franklin expedition to cross the Northwest Passage, the ships Erebus and Terror were modernized, including additional steel reinforcement on the bow and hull flanks, which was intended to prevent the ships from being crushed by the pressure of the pack ice. In order to keep Erebus and Terror maneuverable in the drifting ice even when there is calm or unfavorable wind direction, an approximately 15-ton steam engine was installed in each of the ships, which drove a specially designed, two-meter-high propeller. They were the first ships in the Royal Navy to be equipped with steam propulsion and screw propellers. The propellers and rudders were mounted so that if they got stuck in the pack ice they could be removed and brought to safety. In retrospect, this additional drive was far too weak."
 rapanui.405.g: "Progress will break the ice."
 rapanui.406.t: "Astronomer offers meteorological studies"
 rapanui.406.d: "[SCOPE.sCharacter('rapanui_astronomer_scope').GetFullName] offered [SCOPE.sCharacter('rapanui_astronomer_scope').GetHerHis] metereological knowledge to prepare a better weather report and to schedule a good time to sail."
 rapanui.406.f: "'I used the observatory's weather station and, after weeks of experiments, meticulous observations and studies deep into the night, realized that a low temperature could be of little benefit to the success of this journey.'"
 rapanui.406.g: "Science helps us to triumph."
 rapanui.407.t: "[SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting] Expedition starts"
 rapanui.407.d: "The ships for the expedition to search for the Northwest Passage are ready. The name #YELLOW [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting] Expedition#! after their leader [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetFullName] has already established itself colloquially."
 rapanui.407.f: "In the first half of the 19th century, some parts of the Northwest Passage were explored separately by many expeditions, including those by John Ross, Elisha Kent Kane, William Edward Parry, and James Clark Ross; overland expeditions were also led by John Franklin, George Back, Peter Warren Dease, Thomas Simpson, and John Rae. In 1826 Frederick William Beechey explored the north coast of Alaska, discovering Point Barrow. In 1845, a lavishly equipped two-ship expedition led by Sir John Franklin sailed to the Canadian Arctic to chart the last unknown swaths of the Northwest Passage. Confidence was high, as they estimated there was less than 500 km (310 mi) remaining of unexplored Arctic mainland coast. When the ships failed to return, relief expeditions and search parties explored the Canadian Arctic, which resulted in a thorough charting of the region, along with a possible passage."
 rapanui.407.g: "Good luck!"
 rapanui.410.t: "Amundsen crosses the North West Passage"
 rapanui.410.d: "The Norwegian adventurer Roald Amundsen was the first person to sail through the Northwest Passage by boat. The campaign lasted three years. This is a great day for our country!"
 rapanui.410.f: "Amundsen managed to sail the Northwest Passage from the Atlantic to the Pacific with his wooden ship Gjøa and a crew of six between 1903 and 1906. However, the chosen route from Baffin Bay via Lancaster Sound and Peel Sound and further through James Ross Strait and Simpson Strait was unsuitable for regular shipping as the sea depth was less than one meter in places. However, this does not detract from the nautical and exploratory achievement of the six Norwegians and the Dane Godfred Hansen in conquering the Northwest Passage from east to west for the first time, which many expedition teams had attempted over more than four centuries. During their trip, Amundsen's expedition team found skeletal remains and equipment from John Franklin's lost expedition."
 rapanui.410.g: "노르웨이에 영광을!"
 rapanui.411.t: "The Northwest Passage discovered!"
 rapanui.411.d: "The #YELLOW [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting] Expedition#! made a breakthrough in the Arctic Ocean between Canada and the Arctic, thereby proving that this sea route does not represent an insurmountable obstacle to progress. [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetFullName] Expedition is celebrated as a hero!"
 rapanui.411.f: "Crossing the Northwest Passage did not open up a new, profitable trade route, contrary to what was hoped for in its theoretical projections. Driving through the thick ice was far too risky for that. Possible overwintering delayed a crossing. Nevertheless, the discovery was a milestone. Previously unknown areas were mapped and travel to the North Pole or South Pole was no longer out of the question. Nautical, cartographic, meteorological, geomagnetic and biological knowledge was expanded. And for some brave adventurers, the area was no longer terra incognita."
 rapanui.411.g: "For the glory of [ROOT.GetCountry.GetNameNoFormatting]!"
 rapanui.412.t: "[SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting]'s Lost Expedition"
 rapanui.412.d: "It's been around 4 years since we haven't heard anything about the #YELLOW [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting] Expedition#!. The Admiralty therefore declared the expedition officially missing. The prevailing belief is that the crew and ship are trapped in the pack ice."
 rapanui.412.f: "A lost expedition does not necessarily mean that it is the worst possible case scenario. However, it is certain that the actual goal, the discovery and crossing of the Northwest Passage, has definitely failed. The fate of the crew is another story. If the #V Success Chance#! of the expedition was not too low, then there is hope that not everything is lost."
 rapanui.412.g: "That's not good news."
 rapanui.413.t: "Lost Expedition returns!"
 rapanui.413.d: "To the happy surprise of all of [ROOT.GetCountry.GetNameNoFormatting], the #YELLOW [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting] Expedition#! has returned. The crew has suffered a few deaths and the ship is in poor condition, but it brought back valuable scientific knowledge."
 rapanui.413.f: "The McClure Arctic expedition, one of many attempts to find the missing Franklin expedition, was significant for being the first to successfully discover and transit the Northwest Passage, which it accomplished by both boat and sledging. However, it is precisely for this reason that it is doubtful whether this can be considered an actual passage. It was only Roald Amundsen who made the first real passage through the Northwest Passage between 1903 and 1905."
 rapanui.413.g: "What a relief!"
 rapanui.414.t: "Expedition members return"
 rapanui.414.d: "The meager remnant of what's left of the #YELLOW [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting] Expedition#! crossed the border into civilization in Canada a few days ago. The emaciated figures explained that they had to abandon the ships in the pack ice. The men saved what they needed on a few puny sledges. Captain [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetFullName] was seriously ill at times, but has now returned home safely. Other crew members did not survive cold, hunger, illness and exhaustion."
 rapanui.414.f: "In 1852 Edward Belcher was given command of the government Arctic expedition in search of Franklin. It was unsuccessful; Belcher's inability to render himself popular with his subordinates was peculiarly unfortunate on an Arctic voyage and he was not wholly suited to commanding vessels among ice. Four of the five ships (HMS Resolute, Pioneer, Assistance and Intrepid) were abandoned in pack ice, for which Belcher was court-martialled but acquitted. One of these ships, HMS Resolute, was eventually recovered intact by an American whaler and returned to the United Kingdom."
 rapanui.414.g: "At least, they are alive."
 rapanui.415.t: "No sign of the [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting] Expedition"
 rapanui.415.d: "After weeks of waiting, the terrible suspicion becomes clear that the expedition searching for the Northwest Passage will not return. We probably have to get used to the terrible certainty that this is one of the greatest tragedies in [ROOT.GetCountry.GetAdjectiveNoFormatting] maritime history."
 rapanui.415.f: "The Franklin Expedition was the third major and final research trip by the British polar explorer Sir John Franklin. Their goal was to sail completely through the Northwest Passage from east to west for the first time, to map it and thus find a shorter sea route from Europe to Asia. The expedition failed disastrously; From 1845 to 1848 everyone involved died in the Canadian Arctic Archipelago. The last traces of the expedition members were only discovered many years later near King William Island. The tragic fate of the Franklin expedition, long obscured, attracted widespread attention in the mid-19th century. Newspapers achieved high circulation with reports and speculations about Franklin's fate and exploited the topic according to all the rules of modern mass media. The expedition itself, as well as Lady Jane Franklin's intensive efforts to save her husband by sending new search expeditions, occupied the British public for years."
 rapanui.415.g: "We have to accept that they are all dead..."
 rapanui.415.h: "Send a rescue mission!"
 rapanui.415.tt: "There is a small chance of finding the expedition members alive. In most cases we will find nothing, or at least a few remains. However, there is also the - very small - risk that this expedition could also go missing."
 rapanui.416.t: "Traces of the [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting] Expedition"
 rapanui.416.d: "[SCOPE.sCharacter('rapanui_northwest_expedition_hero').GetFullName] was able to find remnants of the lost expedition during an arduous journey in northern Canada. The evidence suggests that all of the members of the expedition are dead. However, [SCOPE.sCharacter('rapanui_northwest_expedition_hero').GetSheHe] was able to secure some finds - and [SCOPE.sCharacter('rapanui_northwest_expedition_hero').GetHerHis] mission brought new knowledge back to [ROOT.GetCountry.GetNameNoFormatting]."
 rapanui.416.f: "After weeks, members of the rescue mission found some hidden messages from the missing ship's crew. These are status reports and position statements. The ships led by [SCOPE.sCharacter('rapanui_northwest_expedition_hero').GetFullName] were finally able to determine a specific territory in which the #YELLOW [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting] Expedition#! must have been lost. In fact, they were able to purchase items from some Inuit that came from one of the lost ships. The death of the crew and their captain is now a sad certainty. But the rescue mission has mapped previously unknown areas, gained new research results and also recovered lost measurements. Captain [SCOPE.sCharacter('rapanui_northwest_expedition_hero').GetLastName] has gained significant experience."
 rapanui.416.g: "At least we were able to shed some light on the matter."
 rapanui.417.t: "The Mystery of the Lost Expedition"
 rapanui.417.d: "Even after weeks of searching, [SCOPE.sCharacter('rapanui_northwest_expedition_hero').GetFullName] was unable to find any traces that would point to the fate of the #YELLOW [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting] Expedition#!. The bad weather meant that the mission had to be aborted to avoid suffering a similar fate."
 rapanui.417.f: "The members of the lost expedition are most likely dead and their ships sunk. However, the uncertainty leaves its mark. Stories are making the rounds in the press. Stories are told of cannibalism or demons, of good gentlemen who became wild animals and fell into madness. The fate of the #YELLOW [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting] Expedition#! will probably never be clarified and will provide material for many horror tales."
 rapanui.417.g: "Presumably the canned goods were poorly soldered?"
 rapanui.418.t: "An Arctic Wonder"
 rapanui.418.d: "Nobody expected this. But then a telegram reached the capital: Captain [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastName] was alive. Very emaciated, sick and weak. But alive. A little later, [SCOPE.sCharacter('rapanui_northwest_expedition_hero').GetFullName] reached the home port with what was left of the crew. The rescue mission was a complete success."
 rapanui.418.f: "All ships of the #YELLOW [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting] Expedition#! were trapped in the pack ice. They had been abandoned months ago. The sick and weak who were left there met a certain death. Others died while marching with improvised sledges made from the ship's wood. Hunger and cold had claimed more victims. About one in three men had died. But the joy was even greater that at least they were able to return home - as if by a miracle, [SCOPE.sCharacter('rapanui_northwest_expedition_hero').GetFullName] had found them in an ice-free bay and taken them on board. The important scientific findings of the successful expedition were also saved. Although [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetFullName] has lost his fleet, he is celebrated at home along with [SCOPE.sCharacter('rapanui_northwest_expedition_hero').GetLastName] as if he had crossed the passage."
 rapanui.418.g: "These men are heroes!"
 rapanui.419.t: "Rescue mission fails!"
 rapanui.419.d: "The worst of all possible twists has occurred: after the loss of the #YELLOW [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting] Expedition#!, the rescue mission led by [SCOPE.sCharacter('rapanui_northwest_expedition_hero').GetFullName] is now also missing. It is to be feared that they both suffered the same fate."
 rapanui.419.f: "'Rae had heard from Eskimos in April 1854 at Pelly Bay (latitude 69° north, longitude 72° west) that 10-12 days' journey further west a number of more than 40 white men had died due to lack of food. Continuing his journey, he learned that in the spring of 1850 some Eskimos, who had gone out to catch seals near the northern shore of King William's Island, had seen about 40 white men migrating across the ice towards the south; A few weeks later, 30 bodies of white men were found on the coast of the American continent, a day's journey to the northwest of a large river, and 5 others on a nearby island. It turned out that the Eskimos had still found powder, bullets, shot, watches, compasses, telescopes and guns, since at least parts of these items, as well as silver spoons, forks, etc., were discovered and purchased by Rae.'"
 rapanui.419.g: "This sea of ice is cursed!"
 rapanui.420.t: "[SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting] Expedition returns"
 rapanui.420.d: "After another nation found the decisive breakthrough in the Northwest Passage, our expedition has returned. Although it did not achieve any decisive success, it did bring with it useful insights. This is the last expedition of its kind."
 rapanui.420.f: ""
 rapanui.420.g: "Welcome home."
 rapanui.421.t: "Mild Weather"
 rapanui.421.d: "An unusual thaw has caused some otherwise icy passages to be open earlier this year. The #YELLOW [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting] Expedition#! is therefore progressing better than planned."
 rapanui.421.f: "The vagaries of the weather are unbreakable and have already cost the lives of many an Arctic explorer. An astronomer serving our nation can help predict a more favorable time to travel before the expedition, increasing the chance of a positive weather event."
 rapanui.421.g: "Good."
 rapanui.422.t: "Harsh Weather"
 rapanui.422.d: "Unfortunately, this year the winter in the Arctic appears to be lasting longer and the icing period is starting earlier, starting in September. This significantly worsens the #YELLOW [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting] Expedition#!'s chances."
 rapanui.422.g: "Bad."
 rapanui.423.t: "Inuit Guide"
 rapanui.423.d: "During his trip through northern Canada, [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetFullName] managed to recruit an Inuit for the expedition. He not only brings geographical knowledge, but also knows one or two survival techniques in this harsh climate."
 rapanui.423.f: "Europeans had already made use of the Inuit's knowledge during the Arctic expeditions of the first half of the 19th century; some expedition participants even spoke the language. For example, the fate of the participants in the missing Franklin Expedition was able to be reconstructed because some Inuit eyewitnesses were interviewed. However, the respect for the natives left something to be desired. It was Roal Amundsen who relied heavily on the survival techniques of the polar inhabitants in order to successfully complete his own Northwest Passage voyage and his journey to the South Pole."
 rapanui.423.g: "Great!"
 rapanui.424.t: "Game Meat"
 rapanui.424.d: "Some of the crew have asked to go ashore for a few days and hunt seals, caribou or birds."
 rapanui.424.f: "The barren tundra landscape of northern Canada and especially the regions in the arctic environment leave little chance of survival for larger wild animals. However, there are exceptions. One reason for the failed Franklin Expedition was that the participants relied heavily on their own provisions and had little reliance on the area's food supply. Later expeditions made intensive use of the opportunity to hunt local animals and thus supplement the diet. However, not every hunt is crowned with success."
 rapanui.424.g: "They should use the time to hunt."
 rapanui.424.h: "That's a waste of time."
 rapanui.425.t: "Poisoning"
 rapanui.425.d: "Several men of the #YELLOW [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting] Expedition#! suffer from symptoms of poisoning. It is unknown whether the provisions rotted or whether other causes were responsible. A dispute has already broken out on board the flagship about what to do with the remaining food - there is hardly any replacement."
 rapanui.425.f: "To this day there are discussions about the real reasons for the failure of the Franklin Expedition. The argument that is often used is that the cans were not soldered properly and lead poisoning occurred, which was at least responsible for weakening the crew. Others postulated mercury poisoning. However, food poisoning cannot be ruled out and is not a unique phenomenon. "
 rapanui.425.g: "Was the provision that bad?"
 rapanui.425.h: "Throw the provisions overboard and look for something to eat on land."
 rapanui.426.t: "Tuberculosis"
 rapanui.426.d: "[SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetFullName] is faced with a difficult decision in the Arctic: tuberculosis is rampant on board an expedition ship. The risk of infection for healthy men is high in such a small space."
 rapanui.426.f: "'So whatever you wish that others would do to you, do also to them, for this is the Law and the Prophets.' -Matthew 7:12"
 rapanui.426.g: "Take care of them as best you can."
 rapanui.426.h: "Throw them overboard!"
 rapanui.427.t: "Pack Ice"
 rapanui.427.d: "Nothing works anymore. After a while the ship stands still. The wood doesn't move as far as a fingertip. Soon it will be cold: the #YELLOW [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting] Expedition#! is completely surrounded by pack ice!"
 rapanui.427.f: "'A strong man is not a man who does great tasks, but a man who faces difficulties, failures, and discouragement with great determination.' -Ernest Shakleton"
 rapanui.427.g: "This is the worst twist of all."
 rapanui.427.h: "Fortunately, our engineer has prepared the ship for such a situation."
 rapanui.428.t: "Geomagnetic Data"
 rapanui.428.d: "The #YELLOW [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting] Expedition#!'s physics team has gained new scientific knowledge near the polar ice caps."
 rapanui.428.f: "'The history of the human race is a continual struggle from darkness towards light. It is, therefore, to no purpose to discuss the use of knowledge; man wants to know, and when he ceases to do so, he is no longer man.' -Fridtjof Nansen"
 rapanui.428.g: "Fine!"
 rapanui.429.t: "Polar Flora and Fauna"
 rapanui.429.d: "Despite the hostile environment, researchers on the #YELLOW [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting] Expedition#! were able to collect animal and plant samples to improve knowledge of this remote region."
 rapanui.429.f: "'The numerous people who imagine that a long stay in the Polar regions makes a man less susceptible of cold than other mortals are completely mistaken.' -Roald Amundsen"
 rapanui.430.t: "Unknown Lands"
 rapanui.430.d: "The #YELLOW [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting] Expedition#! found previously unknown islands and bays in northern Canada and thereby increased oceanographic and cartographic knowledge."
 rapanui.430.f: "After James Cook's voyages, the motto was that there was nothing left to discover. No matter how hostile these countries may be, [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetFullName] has mapped new, previously unknown areas of land and thus proven that the final frontiers have not been reached."
 rapanui.431.d: "The Norwegian adventurer Roald Amundsen was the first person to sail through the Northwest Passage by boat. The campaign lasted three years."
 rapanui.431.g: "Congratulations..."
 rapanui.432.d: "An expedition from [SCOPE.sCountry('rapanui_northwest_country_scope').GetName] completed the incredible task of crossing the Northwest Passage today."
 rapanui.433.t: "The Lost [SCOPE.sCountry('rapanui_franklin_country').GetAdjectiveNoFormatting] Expedition"
 rapanui.433.d: "One of the worst catastrophes in maritime history hits [SCOPE.sCountry('rapanui_franklin_country').GetName]: an entire expedition with the most modern equipment went missing in the Arctic. The expedition was supposed to find and sail through the Northwest Passage. There has been no contact for four years. As the entire country is caught in deep mourning, some speculate that the entire crew may be dead."
 rapanui.433.g: "Send a telegram expressing our sincere condolences."
 rapanui.433.h: "Whoever seeks danger should perish in danger."
 rapanui.434.t: "Traces of the [SCOPE.sCountry('rapanui_franklin_country').GetAdjectiveNoFormatting] Expedition"
 rapanui.434.d: "[SCOPE.sCharacter('rapanui_northwest_expedition_hero').GetFullName] was able to find remnants of the lost expedition during an arduous journey in northern Canada. The evidence suggests that all of the members of the expedition are dead. However, [SCOPE.sCharacter('rapanui_northwest_expedition_hero').GetSheHe] was able to secure some finds - and [SCOPE.sCharacter('rapanui_northwest_expedition_hero').GetHerHis] mission brought new knowledge back to [ROOT.GetCountry.GetNameNoFormatting]."
 rapanui.434.f: "After weeks, members of the rescue mission found some hidden messages from the missing ship's crew. These are status reports and position statements. The ships led by [SCOPE.sCharacter('rapanui_northwest_expedition_hero').GetFullName] were finally able to determine a specific territory in which the [SCOPE.sCountry('rapanui_franklin_country').GetAdjectiveNoFormatting] expedition must have been lost. In fact, they were able to purchase items from some Inuit that came from one of the lost ships. The death of the crew and their captain is now a sad certainty. But the rescue mission has mapped previously unknown areas, gained new research results and also recovered lost measurements. Captain [SCOPE.sCharacter('rapanui_northwest_expedition_hero').GetLastName] has gained significant experience."
 rapanui.435.t: "The Mystery of the Lost Expedition"
 rapanui.435.d: "Even after weeks of searching, [SCOPE.sCharacter('rapanui_northwest_expedition_hero').GetFullName] was unable to find any traces that would point to the fate of the [SCOPE.sCountry('rapanui_franklin_country').GetAdjectiveNoFormatting] expedition. The bad weather meant that the mission had to be aborted to avoid suffering a similar fate."
 rapanui.435.f: "The members of the lost expedition are most likely dead and their ships sunk. However, the uncertainty leaves its mark. Stories are making the rounds in the press. Stories are told of cannibalism or demons, of good gentlemen who became wild animals and fell into madness. The fate of this mission will probably never be clarified and will provide material for many horror tales."
 rapanui.436.t: "A ship found again!"
 rapanui.436.d: "It's a sensation: one of the ships from the lost expedition has appeared as a ghost ship off the coast of North America. [SCOPE.sCharacter('rapanui_northwest_expedition_hero').GetFullName] was able to secure it. The ship is almost completely intact, but is located around 1,200 miles from the suspected location. A debate has arisen as to whether it is flotsam or someone else's property."
 rapanui.436.f: "HMS Resolute was a mid-19th-century barque-rigged ship of the British Royal Navy, specially outfitted for Arctic exploration. Resolute became trapped in the ice searching for Franklin's lost expedition and was abandoned in 1854. The British Government announced in The London Gazette that the ship was still Her Majesty's property, but no salvage was attempted. The ship was released again and was spotted as a ghost ship in Baffin Bay on September 16, 1855 - almost 2,000 kilometers from her last berth - by the American whaler George Henry. The Resolute was then again trapped by the pack ice of the Davis Strait near Baffin Island, but was still seaworthy and could be sailed by the whalers as a prize into the harbor of New London, Connecticut. She was eventually purchased by the United States Congress for USD 40,000, rebuilt and officially presented to Queen Victoria of Britain on December 17, 1856 as a sign of peace between the two nations."
 rapanui.436.g: "Restitute the ship to its owner."
 rapanui.436.h: "The scientific knowledge on board could be useful to us..."
 rapanui_add_x_oceanographic_understanding_minus_x_tt: "@rapanui_oceanographic_knowledge! 해양학 지식 [SCOPE.GetValue('understanding_amount')|0+] 감소"
 rapanui_add_x_oceanographic_understanding_0_tt: "@rapanui_oceanographic_knowledge! 해양학 지식 변화 없음"
 rapanui_add_x_oceanographic_understanding_x_tt: "@rapanui_oceanographic_knowledge! 해양학 지식 [SCOPE.GetValue('understanding_amount')|0+] 상승"
 rapanui.501.t: "The New Atlantic Telegraph Company"
 rapanui.501.d: "An influential stock corporation has formed under the auspices of [SCOPE.sCharacter('rapanui_telegraph_boss_scope').GetFullName]. The telegraphy mogul is supposed to raise the money for the risky laying of a telegraphic cable through the Atlantic. The [SCOPE.sCharacter('rapanui_telegraph_boss_scope').GetLastNameNoFormatting] Atlantic Telegraph Company will try to do the impossible."
 rapanui.501.f: "The first time [SCOPE.sCharacter('rapanui_telegraph_boss_scope').GetLastName] presented his idea he was met with ridicule - he would literally sink his fortune into the ocean. But in the meantime, other sponsors have been found who consider the project to be realistic."
 rapanui.501.g: "Let's connect the continents!"
 rapanui.502.t: "Scientific support"
 rapanui.502.d: "Shortly before the departure of the cable-laying ship, there is an opportunity to add a scientist to the mission to support the project."
 rapanui.502.f: "An [concept_tesla_engineer] can help out in the event of accidents at sea, thereby protecting the transoceanic cable project from harm. He also increases the chance that the cable will actually work after it has been laid. A [concept_dubois_naturalist], on the other hand, uses his stay in the Atlantic to observe nature."
 rapanui.502.g: "[SCOPE.sCharacter('gaudi_engineer_scope').GetFullName], our Engineer."
 rapanui.502.h: "[SCOPE.sCharacter('dubois_naturalist_scope').GetFullName], our Naturalist."
 rapanui.511.t: "Whales and Dolphins"
 rapanui.511.d: "A unique spectacle of nature presents itself when whales and dolphins cross the route. [SCOPE.sCharacter('rapanui_cable_guy_scope').GetFullName] expects new biological insights from observation, but the crew shows little interest in this kind of academic curiosity."
 rapanui.511.f: "An argument breaks out on board when the professor also points out the despicable hunting methods used to slaughter these enchanting sea creatures. For most sailors, for whom whales only serve as oil storage facilities, the lecture is additionally unnerving."
 rapanui.511.g: "Study these wonderful creatures."
 rapanui.511.h: "We don't have time for this."
 rapanui.512.t: "So many Fish!"
 rapanui.512.d: "[SCOPE.sCharacter('rapanui_cable_guy_scope').GetFullName] can't believe [SCOPE.sCharacter('rapanui_cable_guy_scope').GetHerHis] luck when [SCOPE.sCharacter('rapanui_cable_guy_scope').GetSheHe] notices schools of fish of previously unknown species in the North Atlantic. The professor asks the captain to stop work and catch some specimens. [SCOPE.sCharacter('target_character').GetFullName] points out that this is a cable-laying ship and not a research facility."
 rapanui.512.f: "'So believe me! We are missing out on scientific research! These delicate little fish are a completely undiscovered species. Didn't you see that - what do you mean I can swim in the water with them right now?!'"
 rapanui.512.g: "Catch some fish."
 rapanui.513.t: "Experiments in the Atlantic Ocean"
 rapanui.513.d: "[SCOPE.sCharacter('rapanui_cable_guy_scope').GetFullName] used the time at sea to set up some of its instruments to conduct scientific studies on board the cable-laying ship. He hasn't chosen a focus yet."
 rapanui.513.f: "'There is a river in the ocean. In the severest droughts it never fails, and in the mightiest floods it never overflows. Its banks and its bottom are of cold water, while its current is of warm. The Gulf of Mexico is its fountain, and its mouth is in the Arctic Sea. It is the Gulf Stream.' -Matthew Fontaine Maury"
 rapanui.513.g: "Focus on magnetic experiments."
 rapanui.513.h: "Focus on oceanographic experiments."
 rapanui.521.t: "Mystery in the Depths"
 rapanui.521.d: "[SCOPE.sCharacter('rapanui_cable_guy_scope').GetFullName] makes a strange discovery while reviewing the survey data. In a certain part of the Atlantic, the seafloor rises to an unusually high level. So far [SCOPE.sCharacter('rapanui_cable_guy_scope').GetSheHe] only has a theory about this phenomenon."
 rapanui.521.f: "Actually, it was always thought that the seas should be particularly deep in the middle. But today's discovery turns this idea on its head. Instead of a depth record, the distance between the ground and the surface decreases. This is good news for the company because less cable length is required than first assumed. But for [SCOPE.sCharacter('rapanui_cable_guy_scope').GetFullName] it is clear that this means that all previous views on the deep sea must be corrected. Apparently there are hills and valleys on the ocean floor. And this hill is something more than just a hill."
 rapanui.521.g: "Is there an undersea mountain range?"
 rapanui_cable_guy.option: "[SCOPE.sCharacter('rapanui_cable_guy_scope').GetFullName] will fix this."
 rapanui_transatlantic_cable_start_button: "Start laying the Atlantic cable"
 rapanui_transatlantic_cable_start_button_desc: "After enough investors have been won for the project, the actual laying of the submarine cable can begin."
 rapanui_transatlantic_cable_start_tt: "[GetPlayer.GetName]에서 #V 진행도#! #G 8#! 이상 확보"
 subject_type_rapanui_protectorate: "#O Oceanic Protectorate#!"
 alert_rapanui_pacific_expedition_possible_alert_hint: "우리나라가 [concept_dubois_pacific_expedition]를 보낼 수 있습니다. 개최를 위해서는 #V 모르겐뢰테 창#!의 학자 개요 란에 들어가 주십시오."
 rapanui.248.t: "Minerals"
 rapanui.248.d: "The crew of the [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] found some rock formations rich in raw materials on their journey. The team is currently examining the rocks in more detail."
 rapanui.248.f: "A geologist was also on board the Galathea on the Danish Pacific expedition: Hinrich Johannes Rink. He was particularly involved in the geographical research of the Nicobar Islands, which were then colonized by Denmark. After five months he fell ill with Nicobar Fever, weakening him the rest of his life, and forcing his return to Denmark. As a result, he collected most of the geological material not in the Pacific or Indian Ocean, but in Cairo and Malta on his return journey."
 rapanui.248.g: "Collect as many minerals as possible."
 rapanui.248.h: "Study this geological area more closely."
 rapanui.249.t: "A Strange Lump"
 rapanui.249.d: "Last time, after the crew cast their nets to collect material from the seabed, they fished out a strange lump of metal. These are obviously collections of different materials. On board the [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] it is not yet clear how to deal with the find."
 rapanui.249.f: "'Over the whole bottom of the Pacific (...) we find red clay, and particularly in the North Pacific, where there is a great depth of water. The red clay has all through it nodules, which vary from the size of sago, or a canary seed to the size of a child's head or an orange, composed of nearly pure peroxide of manganese. These are found in enormous quantity. The trawl (...) brings up masses of concretions, much resembling lumps of the mineral known as wad, almost all of which contain as a kernel in the interior, a fish's tooth, or a little bit of sponge, or some fossil of some kind, which has formed the nucleus round which the manganese has accumulated.' -Charles Wyville Thomson"
 rapanui.249.g: "Smash it and use the resources."
 rapanui.249.h: "Dr. [SCOPE.sCharacter('rapanui_scientist').GetLastName] should take it apart carefully."
 rapanui.249.i: "This strange node should be studied and exhibited in a scientific institute."
 rapanui.249.j: "Dr. [SCOPE.sCharacter('rapanui_scientist').GetLastName] should keep the piece as a souvenir and draw conclusions from it."
 rapanui.269.t: "A Precious Stone"
 rapanui.269.d: "During a shore leave in Australia, Associate Scientist [SCOPE.sCharacter('rapanui_scientist').GetFullName] had the opportunity to explore some previously little-explored massifs. In addition to opals and crystals, [SCOPE.sCharacter('rapanui_scientist').GetSheHe] found other rare minerals."
 rapanui.269.f: "To this day, Australia is a place rich in raw materials, from which rare earths, minerals and metals find their way into the world. It was therefore no coincidence that it was on this continent that Dr. [SCOPE.sCharacter('rapanui_scientist').GetLastName] came across a rare mineral that he had not yet been able to assign to his collection."
 rapanui.269.g: "My precious!"
 rapanui.270.t: "불의 고리"
 rapanui.270.d: "The longer [SCOPE.sCharacter('rapanui_scientist').GetFullName] is on board of the [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] and the longer [SCOPE.sCharacter('rapanui_scientist').GetSheHe] sails the Pacific Ocean, the more [SCOPE.sCharacter('rapanui_scientist').GetSheHe] becomes aware of how much this part of the world is characterized by volcanic activity. They form a ring around the shores of the sea. The Associate Scientist was able to get close to the smoke-spewing rock monsters and take important notes."
 rapanui.270.f: "The Pacific Ring of Fire is a volcanic belt that surrounds the Pacific Ocean on three sides. Around two thirds of all Holocene volcanic eruptions and around 90% of the world's earthquakes can be traced back to this area. The Ring of Fire includes approximately 850-1,000 volcanoes that have been active over the last 11,700 years."
 rapanui.270.g: "Is the Pacific actually a single volcanic crater with side vents?"
 rapanui.203.l: "An extraordinary chance for [SCOPE.sCharacter('dubois_geologist_scope').GetFullName], the [concept_agassiz_geologist]."
 rapanui.280.t: "A strange Wolf"
 rapanui.280.d: "A hunter has approached the crew of the #YELLOW [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] Expedition#!. He brought a strange wolf that he caught and offers to sell it to us."
 rapanui.280.f: "\"Those beasts are killing our precious lifestock! I first wanted to kill it, but then I saw your ship. Thought you might be interested...\""
 rapanui.280.g: "Such an exotic animal needs to be in our Zoo!"
 rapanui.280.h: "We'd rather observe it in its natural habitat."
 rapanui.280.i: "No, thank you."
 rapanui.502.i: "Our scientists are needed elsewhere."
