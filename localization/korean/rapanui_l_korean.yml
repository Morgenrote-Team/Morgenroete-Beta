 rapanui_send_new_missionaries_button: "신규 선교사 파견"
 rapanui_send_new_missionaries_button_desc: "선교사를 새로 파견하면 개종 확률을 높일 수 있을 것입니다. 이 계획이 얼마나 성공할지는 운에 달려 있습니다."
 rapanui_trade_with_natives_button: "원주민과의 교역"
 rapanui_trade_with_natives_button_desc: "계속해서 개종에 나서는 대신 우리 영향력을 이국적인 선물의 확보에 활용합니다."
 rapanui_sabotage_rival_missionaries_button: "경쟁국 선교사의 평판 훼손"
 rapanui_sabotage_rival_missionaries_button_desc: "현지에 경쟁국의 선교단이 머무르고 있다면, 그 선교단의 평판을 떨어뜨려 향후 수년 동안 선교 사업이 성공에 이를 가능성을 저해할 수 있습니다. 우리의 성공 확률은 50:50입니다. 이는 연간 개종률에만 영향을 끼치게 됩니다."
 rapanui_change_course_button: "탐사대 진로 변경"
 rapanui_change_course_button_desc: "[concept_dubois_pacific_expedition] 도중에는 함선의 진로를 단 한차례 변경할 수 있습니다. 그렇게 되면 함선은 원래 선택했던 목적지를 떠나 다른 두 목적지 중 한 곳으로 향하게 됩니다."
 je_rapanui_catholic_mission_oceania: "오세아니아 가톨릭 선교회 수립"
 je_rapanui_catholic_mission_oceania_reason: "우리 선교단의 [SCOPE.sCharacter('rapanui_missionary_scope').GetFirstName] 신부가 원주민들을 기독교로 개종시키기 위해 부단히 노력하고 있다. 매년 인구의 약 1%가 가톨릭교로 개종할 것으로 전망된다. 우연히 벌어지는 사건들이 그 결과를 향상시킬 수도 있다. 다만 지나친 선교 활동으로 원주민들의 분노를 산다면 모든 노력이 수포로 돌아갈 수 있다. 현지 주민의 30%가 기존 신앙을 버리고 그리스도의 이름으로 나아간다면 우리는 영구적인 선교회를 설립할 수 있게 된다."
 je_rapanui_protestant_mission_oceania: "오세아니아 개신교 선교회 수립"
 je_rapanui_protestant_mission_oceania_reason: "우리 선교단의 [SCOPE.sCharacter('rapanui_missionary_scope').GetFullName] 신부가 원주민들을 기독교로 개종시키기 위해 부단히 노력하고 있다. 매년 인구의 약 1%가 기독교로 개종할 것으로 전망된다. 우연히 벌어지는 사건들이 그 결과를 향상시킬 수도 있다. 다만 지나친 선교 활동으로 원주민들의 분노를 산다면 모든 노력이 수포로 돌아갈 수 있다. 현지 주민의 30%가 기존 신앙을 버리고 그리스도의 이름으로 나아간다면 우리는 영구적인 선교회를 설립할 수 있게 된다."
 je_rapanui_mission_fail: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]의 기독교 전파는 현지인의 공격성이 5점 이상을 넘어가면 실패하게 됩니다."
 je_rapanui_catholic_conversion_oceania: "족장의 가톨릭 개종"
 je_rapanui_catholic_conversion_oceania_reason: "부족장의 개종은 주민들 사이에서 기독교가 완전히 자리잡고 국교로 삼는 데 결정적인 단계로 작용한다. 하지만 이를 위해서는 주민 대다수가 가톨릭교를 믿어야 한다. 이 지역에 혹시라도 성모를 혐오하는 이단자들의 경쟁 선교회가 생긴다면, 저들이 정치 권력을 잡지 못하도록 갖은 노력을 다해야 한다. 우리 측 선교를 맡은 [SCOPE.sCharacter('rapanui_missionary_scope').GetFirstName] 신부는 그런 일이 일어나지 않도록 매년 전체 인구의 1%를 올바른 신앙으로 인도할 것이다. 본 활동은 3년에 한번씩 진행할 수 있다."
 je_rapanui_protestant_conversion_oceania: "족장의 개신교 개종"
 je_rapanui_protestant_conversion_oceania_reason: "부족장의 개종은 주민들 사이에서 기독교가 완전히 자리잡고 국교로 삼는 데 결정적인 단계로 작용한다. 하지만 이를 위해서는 주민 대다수가 개신교를 믿어야 한다. 이 지역에 혹시라도 신성 모독을 행하는 가톨릭 교도들의 경쟁 선교회가 생긴다면, 저들이 정치 권력을 잡지 못하도록 갖은 노력을 다해야 한다. 우리 측 선교를 맡은 [SCOPE.sCharacter('rapanui_missionary_scope').GetFullName] 신부는 그런 일이 일어나지 않도록 매년 전체 인구의 1%를 올바른 신앙으로 인도할 것이다. 본 활동은 3년에 한번씩 진행할 수 있다."
 je_rapanui_crisis_in_paradise: "다른 종교를 가진 나라에서 우리보다 먼저 족장을 개종시킨다면 우리의 개종 시도는 실패로 끝나게 됩니다."
 je_rapanui_pacific_expedition: "[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]호 탐사"
 je_rapanui_pacific_expedition_reason: "태평양은 극지대와 더불어 아직도 비밀을 간직하고 있는 지구상 최후의 지역 중 하나입니다. 자연사, 고생물학, 천문학, 해양학 연구를 수행하기 위한 조사 임무에 여러 과학 분야의 학자들이 관심을 보이고 있습니다. 한편 강대국으로서는 세계의 끝자락에서 영향력을 과시할 영광스러운 사건으로 남을지 모릅니다."
 je_rapanui_pacific_expedition_success: "탐사대는 통상적인 항해의 경우 7곳의 거점을, 특정 분야에 집중하는 항해의 경우 5곳의 거점을 거친 후 복귀하게 됩니다."
 je_rapanui_pacific_expedition_goal: "탐사대는 통상적인 항해의 경우 7곳의 거점을, 특정 분야에 집중하는 항해의 경우 5곳의 거점을 거친 후 복귀하게 됩니다."
 je_rapanui_oceanographic_studies: "해양학 연구"
 je_rapanui_oceanographic_studies_reason: "해양학은 우리에게 해양과 해양의 성질에 대한 이해를 늘려나가는 데 도움이 될 뿐만 아니라, 특정한 성과를 거둔다면 상당한 이점을 가져다줄 것입니다. 모든 해류를 파악하고 대양의 변화를 올바르게 이해하는 국가는 경쟁국들보다 언제나 한발 더 앞서나갈 수가 있습니다."
 je_rapanui_oceanographic_studies_success: "#E 해양학 지식#! #G 25#!를 확보하면 연구를 마치게 됩니다."
 je_rapanui_oceanographic_studies_goal: "#E 해양학 지식#! #G 25#!를 확보하면 연구를 마치게 됩니다."
 notification_rapanui_challenger_notification_name: "[INITIATOR_COUNTRY.GetName]에서 해저의 최저점을 발견"
 notification_rapanui_challenger_notification_desc: "[INITIATOR_COUNTRY.GetName]의 탐사대가 지금까지의 측정 기록 가운데 지구상에서 가장 깊은 지점을 태평양 바닥에서 발견해냈습니다."
 notification_rapanui_wallace_notification_name: "[INITIATOR_COUNTRY.GetName]의 연구원이 진화론의 증거 발견"
 notification_rapanui_wallace_notification_desc: "[INITIATOR_COUNTRY.GetName]의 과학자가 인도네시아의 동물상 경계를 규명하며  진화론의 증명에 중대한 공헌을 하였습니다."
 rapanui.101.t_cat: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag] 가톨릭교 선교단"
 rapanui.101.t_pro: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag] 개신교 선교단"
 rapanui.101.d_cat: "용감한 성격의 [SCOPE.sCharacter('rapanui_missionary_scope').GetFirstName] 신부가 선교사의 자격으로 [SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]에 파견되어, 현지 이교도들을 예수님의 기독교도로 개종시키기로 하였다."
 rapanui.101.d_pro: "용감한 성격의 [SCOPE.sCharacter('rapanui_missionary_scope').GetFullName] 목사가 선교사의 자격으로 [SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]에 파견되어, 현지 이교도들을 예수님의 기독교도로 개종시키기로 하였다."
 rapanui.101.f: "19세기 오세아니아의 섬들은 고립 지역으로서 서구 문명과 거의 단절되어 있었습니다. 선교사들은 이 지역에 신앙 뿐만 아니라 교육과 기술의 전파에도 큰 역할을 하였습니다. 오세아니아는 20세기 중반에 이르러서 기독교를 완전히 받아들였지만, 초창기 선교사들은 불신과 거듭된 실패를 겪어야 했다. '야만스러운 남태평양'이란 고정관념도 수많은 선교사들이 끔찍한 최후를 맞이하며 순교한 것에서 비롯되었다."
 rapanui.101.g_cat: "바데 쿰 데오 (주님과 함께 가시오)."
 rapanui.101.g_pro: "주님과 함께 가시오."
 rapanui.102.t_cat: "[SCOPE.sCountry('rapanui_mission_departure_country').GetNameNoFlag]의 가톨릭 선교사"
 rapanui.102.t_pro: "[SCOPE.sCountry('rapanui_mission_departure_country').GetNameNoFlag]의 개신교 선교사"
 rapanui.102.d: "오늘 이국 땅에서 온 선교사가 해안가에 발을 내딛었다. 저 자를 골칫거리로 여기는 사람이 있는가 하면, 저 사람이야말로 우리나라에 이익을 가져다줄 것으로 믿는 사람도 있다."
 rapanui.102.f: "태평양 섬 주민들과 바다 건너 찾아온 기독교 선교사 간의 관계는 몹시 복잡했습니다. 선교사들은 식민 세력의 개척자이자 전통 문화를 파괴할지 모를 잠재적인 위협으로 취급받았는데 이것 자체로도 타당한 시각이었습니다. 다만 다수의 사례에서 섬 주민들은 유럽인들의 경험과 지식으로 이득을 누렸습니다. 선교사들은 학교를 세우고, 현대 의학을 전파하고, 새로운 농업 기술을 도입하였습니다. 여러 부족에게 있어 선교사의 당도는 중앙집권화로 향하는 첫걸음이 되었습니다. 물론 태평양의 모든 주민들이 이러한 위험을 감수하고 싶었던 것은 아니었고, 초대하지 않은 불청객들을 단번에 쫓아내기도 했습니다."
 rapanui.102.g: "죽여 버리자!"
 rapanui.102.h: "용서는 하되 관심도 주지 말자."
 rapanui.102.i: "따뜻하게 맞이해 주자."
 rapanui.104.t: "선교사, 순교하다!"
 rapanui.104.d_cat: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]에서의 선교 활동이 완전히 실패로 돌아갔다. [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_missionary_death_type')]"
 rapanui.104.d_pro: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]에서의 선교 활동이 완전히 실패로 돌아갔다. [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_missionary_death_type')]"
 rapanui.104.f: "불행하게도 선교사가 기독교 전파에 나섰다가 목숨을 잃는 경우가 많았는데 이는 현지인들에게 오해를 사거나 현지 관습을 제대로 알지 못한 것이 주요 원인을 이루었다. 피에르 샤넬 신부는 퓌튀나섬에서 살해당했고, 존 윌리엄스와 동료 선교사 제임스 해리스는 에로망고섬에서 식인종에게 잡아먹혔으며, 칼 푈크너는 뉴질랜드에서 참수당한 뒤 추장이 눈을 뽑아 삼키는 끔찍한 사건을 겪었다.\n선교가 한 차례 실패로 돌아가면 다음 자원자를 찾기까지 약 5년의 시간이 소요됩니다. 개종 시도가 많을수록 다음 차례의 성공 가능성은 높아집니다."
 rapanui.104.g_cat: "레퀴엠 아에테르남 도나 에이스, 도미네 (주님, 그들에게 영원한 안식을 주소서)."
 rapanui.104.g_pro: "주님께서 영원한 안식을 주소서."
 rapanui.105.t: "선교사의 [SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag] 도착"
 rapanui.105.d_cat: "[SCOPE.sCharacter('rapanui_missionary_scope').GetFirstName] 신부가 [SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]에 무사히 도착했다. 지금까지는 현지인들의 무관심에 직면한 상황이다. 아직은 신부가 살아 있다는 사실 자체가 작은 성공일지 모르지만, 그에게는 해야 할 일이 많다."
 rapanui.105.d_pro: "[SCOPE.sCharacter('rapanui_missionary_scope').GetFullName] 목사가 [SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]에 무사히 도착했다. 지금까지는 현지인들의 무관심에 직면한 상황이다. 아직은 목사가 살아 있다는 사실 자체가 작은 성공일지 모르지만, 그에게는 해야 할 일이 많다."
 rapanui.105.f: "어떤 선교사는 현지에 도착하면서 적대감을 보이며 자신을 빨리 내쫓으려는 원주민들과 마주해야 했습니다. 반면에 무기 거래나 신기술에 관심을 보이며 기대하는 원주민들도 있었습니다. 하지만 예수님의 가르침에 아무 반응도 보이지 않는 경우도 있었습니다. 하지만 이것은 선교사들에게 오히려 좋은 징조였습니다. 어찌 되었든 살아 있다는 것 자체로 죽은 선교사와는 달리 무언가를 이룩할 수 있었기 때문입니다."
 rapanui.105.g_cat: "데오 그라티아스 (하나님의 도움으로)."
 rapanui.105.g_pro: "하나님께 감사드립니다."
 rapanui.106.t: "따뜻한 환영을 받은 선교사"
 rapanui.106.d_cat: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag] 선교 활동이 큰 성공을 거두었다. [SCOPE.sCharacter('rapanui_missionary_scope').GetFirstName] 신부는 현지인들의 따뜻한 환영을 받았으며, 첫 세례식을 거행할 수 있었다."
 rapanui.106.d_pro: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag] 선교 활동이 큰 성공을 거두었다. [SCOPE.sCharacter('rapanui_missionary_scope').GetFullName] 목사는 현지인들의 따뜻한 환영을 받았으며, 첫 세례식을 거행할 수 있었다."
 rapanui.106.f: "토착민들이 선교사에게 대한 태도는 섬마다 달랐다. 적대감이나 두려움을 표할 뿐만 아니라 일부 주민들은 자발적으로 관심을 보이기도 했다. 망가레바 왕국에서는 프랑스 선교단이 상당히 빠른 시간 내에 수많은 주민들을 개종시키고 국왕에게 세례를 베풀기도 했다. 타라바이, 아우케나, 아카무루섬에서는 도착한 지 1년 만에 주민들을 기독교로 개종시키고 교회를 세웠으며, 심지어 섬 주민들이 선교복을 입게 만들기도 했다. 리키테아섬에서는 남태평양 제도에서 가장 큰 교회인 성 미카엘 대성당이 들어섰다."
 rapanui.106.g_cat: "아드 마이오렘 데이 글로리암! (하느님의 더 큰 영광을 위하여!)"
 rapanui.106.g_pro: "하나님의 더 큰 영광을 위하여!"
 rapanui.111.t_cat: "가톨릭계의 성과"
 rapanui.111.t_pro: "개신교계의 성과"
 rapanui.111.d_cat: "우리 선한 신부 [SCOPE.sCharacter('rapanui_missionary_scope').GetFirstName]께서 [SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]에 펼친 사역이 비옥한 땅에 뿌리를 내렸다. 자유로운 선교 활동을 통해 기독교 공동체가 형성되어 번성해 나가게 된 것이다."
 rapanui.111.d_pro: "우리 선한 목사 [SCOPE.sCharacter('rapanui_missionary_scope').GetFullName]께서 [SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]에 펼친 사역이 비옥한 땅에 뿌리를 내렸다. 자유로운 선교 활동을 통해 기독교 공동체가 형성되어 번성해 나가게 된 것이다."
 rapanui.111.f: "견고한 기독교 공동체를 이룩하면서 선교사들을 더 이상 쉽사리 쫓아낼 수 없게 되었다. 이곳을 다스리는 군주조차도 머지않아 기독교에 대한 입장을 다시 생각해봐야 할 것이다. 이제 문제는 [SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag](이)가 기독교로 개종할 수 있는가가 아니라 언제 개종을 이룰 것인가이다. 다음 목표는 군주의 개종으로 기독교를 국교로 삼고, 이를 통해 온 나라에 개종을 이룩해 나가는 것이다."
 rapanui.112.t: "가톨릭 선교단의 영구 정착"
 rapanui.113.t: "개신교 선교단의 영구 정착"
 rapanui.112.d: "기독교 선교단이 우리나라에 영구히 자리를 잡게 되었다. 이제 이 이방인들을 몰아내는 것이 훨씬 더 어려워지게 되었다."
 rapanui.112.f: "우리 국민의 3분의 1이 옛 신앙을 버리고  이제 기독교를 받아들였으니 [ROOT.GetCountry.GetNameNoFlag]의 미래가 어떻게 전개될지에 대한 의문이 떠올랐다. 이렇듯 빠른 개종은 앞으로도 계속 이뤄질 것이다. 무당들도 향후 추이를 지켜보고 있는 가운데, 개신교로 개종한 일부 부족장들은 이번 기회를 이용하여 나라를 근대화하자고 주장하고 나섰다."
 rapanui.112.g: "이런 상황을 면밀히 주시할 필요가 있겠다."
 rapanui.112.h: "이방인들에게 보다 열린 자세로 대해야 한다."
 rapanui.114.t: "이교도의 진노"
 rapanui.114.d_cat: "끔찍한 소식이다! [SCOPE.sCharacter('rapanui_missionary_scope').GetFirstName] 신부가 [SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]에서 요령 없는 행동을 벌여 원주민들의 분노를 샀다. 원주민들은 선교 기지에 불을 지르고 신부를 살해하고 말았다!"
 rapanui.114.d_pro: "끔찍한 소식이다! [SCOPE.sCharacter('rapanui_missionary_scope').GetFullName] 목사가 [SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]에서 요령 없는 행동을 벌여 원주민들의 분노를 샀다. 원주민들은 선교 기지에 불을 지르고 목사를 살해하고 말았다!"
 rapanui.114.f: "선교 활동은 강경 행동과 멋드러진 처세술 간의 적절한 균형을 필요로 할 때가 많다. 지나치게 열정적인 선교사는 사명을 완수하기도 전에 목숨을 잃는 경우가 많다. 특히 남태평양 지역에서 복음주의 선교사들은 주민들을 개종시키기 위해 극단적인 수단을 가리지 않은 것으로 악명이 높았는데, 그 결과 역시 성공 아니면 큰 파국으로 이어지고 말았다. 이번에 우리 선교사에게 닥친 운명은 후자라 할 수 있다."
 rapanui.115.t: "가톨릭 선교단 해산"
 rapanui.115.d: "외국 선교사들의 부적절한 행태는 우리 주민들의 인내를 너무 오랫동안 건드려 왔다. 결국 민중 봉기로 선교 기지는 폐허가 되었고, 선교사도 그와 함께 목숨을 잃었다."
 rapanui.115.f: "유럽인들은 너무나도 부주의한 모습을 보였다. 주민들을 개종시키기는커녕 오히려 배척하게 만든 것이다. 이 사건 이후 수많은 우리 동족들이 옛 신앙으로 되돌아갔다. 저들이 믿는 기독교란 순전히 사기극에 불과했다."
 rapanui.115.g: "그럴 만도 했군."
 rapanui.116.t: "개신교 선교단 해산"
 rapanui.122.t: "성경 번역"
 rapanui.122.d: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]에서 선교사로 활동 중인 [SCOPE.sCharacter('rapanui_missionary_scope').GetFullName](이)가 성경을 현지 언어로 번역하였다. 이것으로 기독교 신앙으로의 개종을 촉진하게 될 것이다."
 rapanui.122.f: "초기에 태평양 제도로 파견된 선교사들은 기록을 남겨 사전을 만들고, 이후 성경을 현지 언어로 번역하기도 했다. 그러나 지나친 열정은 일부 선교사들에게 오히려 해로 다가오는 결과를 초래하기도 했다."
 rapanui.122.g: "현지인들을 개종시키는 데 큰 도움이 되겠군."
 rapanui.122.h: "지금이야말로 새로운 선교 사업을 시작할 때다."
 rapanui.123.t: "노예상인들이 선교중인 섬을 습격하다"
 rapanui.123.d: "[SCOPE.sCountry('rapanui_slaver_country').GetNameNoFlag]에서 온 노예 상인들이 [SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]의 침략에 나섰다. 우리 선교사로 나선 [SCOPE.sCharacter('rapanui_missionary_scope').GetFullName](이)가 습격을 막아달라고 긴급히 요청하고 나섰다."
 rapanui.123.f: "19세기 말까지만 하더라도 특히 페루의 노예 상인들은 태평양 섬 전체 주민들을 몰아내는 일이 잦았다. 이런 식으로 값싼 노동력을 확보하는 것은 호주 북부에서 특히 늘리 퍼져 있던 이른바 '블랙버딩'(흑인 노예 매매)보다 훨씬 더 잔혹하였다. 이러한 습격은 선교사들에게 큰 부담이 되었는데, 명목상의 기독교인들조차 양심을 저버리고 섬 주민들을 노예로 착취하는 상황에서 개종을 설득시키는 것이 결코 쉬운 일이 아니었기 때문이다. 가톨릭교와 개신교 성직자들 사이에서 널리 퍼져 있던 노예제 폐지 운동은 이러한 사건을 계기로 더욱 탄력을 얻게 되었다."
 rapanui.123.g: "그건 우리 소관이 아니다."
 rapanui.123.h: "이런 비인간적 행위를 즉각 중단시켜야 한다!"
 rapanui.124.t: "우상숭배"
 rapanui.124.d: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]에는 우상숭배를 하는 원주민이 여전히 상당수 존재한다. [SCOPE.sCharacter('rapanui_missionary_scope').GetFullName](은)는 성 보니파시오의 전례를 따라 모범을 보이고자 한다."
 rapanui.124.f: "우상이나 성소 파괴는 예로부터 원시 부족민에게 깊은 충격을 주었다. 기독교 신이 본인들의 신보다 우월하다는 증거로 여긴 부족이 있는가 하면, 기독교에 더욱 맹렬히 맞서 싸워야 할 계기로 삼는 부족도 있었다. 어떤 예술 애호가들은 이교도의 형상을 다른 곳에 옮겨다 두는 것이 더 나을지 모른다고 지적하기도 했다."
 rapanui.124.g: "우상을 파괴하라!"
 rapanui.124.h: "좀 더 부드럽게 처분하는 것이 낫겠다."
 rapanui.124.i: "건드리지 말도록 하시오."
 rapanui.125.t: "조상 숭배"
 rapanui.125.d: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]에서는 조상 숭배 문제를 어떻게 해결해야 할지에 관한 논란이 절정에 달했다. 조상 숭배 행위로 인해 선교 활동이 상당히 난관에 봉착한 탓이다."
 rapanui.125.f: "세계 여러 지역과 마찬가지로 조상 숭배는 영적 생활의 중심으로 자리잡았다. 가톨릭교 선교사들은 수 세기 전부터 이 문제에 직면했고 처음에는 나중의 문제로 미루며 외면하였으나, 개신교 선교사들을 중심으로 조상 숭배에 대해 엄청나게 경직된 태도를 보이기도 했다. 그럼에도 오늘날까지도 폴리네시아 일부 지역에서는 조상 숭배가 여전히 널리 행해지고 있다."
 rapanui.125.g: "이런 숭배 행위를 중단시켜야 한다!"
 rapanui.125.h: "지금 할 수 있는 임시 방편을 모색해 보자."
 rapanui.126.t: "융합"
 rapanui.126.d: "그간의 방지 노력에도 불구하고 선교사로 나선 [SCOPE.sCharacter('rapanui_missionary_scope').GetFullName](은)는 최근 보고에서 [SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]에 토속 신앙과 기독교의 요소가 혼재된 융합 신앙 공동체가 형성되었음을 인정하지 않을 수 없었다."
 rapanui.126.f: "융합 신앙은 선교사들에게 언제나 골칫거리로 다가왔다. 이를 다음 단계에서 극복할 수 있는 과도기라 여기는 선교사가 있는가 하면, 개종 대상으로 삼은 기존 종교보다 더 큰 악으로서 이단 행위라 여기는 선교사도 있었다. 그럼에도 융합 신앙은 과거에도 지금도 여전히 많은 사람들에게 정체성을 이루었으므로 이러한 교리를 억압하면 긴장을 유발하게 된다. 융합 현상이 문화적으로, 예술적으로 흥미로운 특성을 지닌다는 점에서 인류학자들과 예술애호가들을 언제나 매혹시켜 온 것도 사실이다."
 rapanui.126.g: "이런 이단 행위는 반드시 근절시켜야 한다!"
 rapanui.126.h: "우리의 가르침을 이해하려면 시간이 더 필요하겠군."
 rapanui.126.i: "문화가 융합된 것이 정말 흥미로운걸."
 rapanui.127.t: "[SCOPE.sCharacter('rapanui_missionary_scope').GetLastName] 씨의 소년 합창단"
 rapanui.127.d: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag] 현지 소년들로 결성된 교회 합창단이 뜻밖의 훌륭한 실력을 선보였다."
 rapanui.127.f: "\"Vita vita nostra tellus nostra sic clamant sic\nVita vita nostra tellus nostra vita nostra clamant\nPoena poena nostra vires nostra poena nostra sic\nPoena poena nostra vires nostra poena nostra clamant\nIra ira nostra fides nostra ira nostra sic.\nIra ira nostra fides nostra ira nostra clamant.\nVita vita nostra tellus nostra vita nostra sic.\"\n-엔리오 모리코네의 〈On Earth As It Is In Heaven〉"
 rapanui.127.g: "이것으로 현지인들에게 신앙의 아름다움을 보여줄 것이다."
 rapanui.127.h: "이것으로 현지인들의 마음에 평안을 가져다줄 것이다."
 rapanui.127.i: "이 음악은 유럽 본토에서도 울려퍼져야 한다!"
 rapanui.128.t: "대규모 세례"
 rapanui.128.d_cat: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]에 머물던 [SCOPE.sCharacter('rapanui_missionary_scope').GetFirstName] 신부가 어느 지역 부족과 부족민 전원이 예수 그리스도를 영접한 뒤 대규모 세례식을 거행하였다고 보고하였다."
 rapanui.128.d_pro: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]에 머물던 [SCOPE.sCharacter('rapanui_missionary_scope').GetFullName] 목사가 어느 지역 부족과 부족민 전원이 예수 그리스도를 영접한 뒤 대규모 세례식을 거행하였다고 보고하였다."
 rapanui.128.f_cat: "한 분이신 하느님을 믿나이다,\n전능하신 아버지,\n하늘과 대지와,\n유형무형 만물의 창조주를 믿나이다\n또 한 분이신 주 예수 그리스도,\n하느님의 외아들,\n영원으로부터 성부에게서 나신 분을 믿나이다."
 rapanui.128.f_pro: "나 홀로 하나이신\n전능 천주 성부,\n천지와 모든 유형하고 무형한\n만물을 창조하신 이를 믿나이다.\n또 홀로 하나이신 주 예수 그리스도,\n천주의 독생 성자,\n모든 세계 전에 성부께 나신 이를 믿나이다."
 rapanui.128.g: "아멘."
 rapanui.129.t: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]의 질병 유행"
 rapanui.129.d: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag] 주민들은 정체불명의 질병이 섬을 휩쓸고 있는 가운데 선교사들이 그 병을 섬으로 옮아 왔다고 분통을 터뜨리고 있다. "
 rapanui.129.f: "유럽의 정착민과 선교사, 상인이 도래하면서 이전에 존재를 몰랐던 질병도 섬마다 퍼져나가게 되었다. 독감, 폐렴, 홍역, 볼거리, 성홍열, 천연두, 백일해, 감기 등이 그 예시다.  이러한 질병은 전통 의학으로는 별다른 차도를 보이지 못했다. 기독교 선교 활동과 발병의 시작이 서로 연관되어 있다는 점에서 세례를 받아 무엇 하느냐고 의문을 품는 주민들이 많았다. 기독교의 신을 믿어봤자 전염병에 별 도움이 되지 못한다고 생각했기 때문이다."
 rapanui.129.g: "악마의 농간이 분명하다."
 rapanui.130.t: "선교사가 말라리아로 사망하다"
 rapanui.130.d_cat: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]에서 비보가 전해졌다. [SCOPE.sCharacter('rapanui_missionary_scope').GetFirstName] 신부가 열대성 질병으로 서거했다는 소식이다. 그곳에서 펼친 용감한 헌신과 선교 활동의 이끄심은 영원히 기억될 것이다."
 rapanui.130.d_pro: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]에서 비보가 전해졌다. [SCOPE.sCharacter('rapanui_missionary_scope').GetFullName] 목사가 열대성 질병으로 서거했다는 소식이다. 그곳에서 펼친 용감한 헌신과 선교 활동의 이끄심은 영원히 기억될 것이다."
 rapanui.130.f: "오세아니아의 선교사들은 단순히 순교를 겪은 것에 그치지 않았다. 원주민들이 유럽인들이 퍼뜨린 질병으로 죽어간 것처럼, 유럽인들도 현지에서 질병으로 목숨을 잃곤 했다. 선교 활동은 계속될 것이며, 후계자도 이미 임명되었다. 다만 올해는 개종 활동이 이루어지지 않을 전망이다."
 rapanui.132.t: "선교단의 효과"
 rapanui.132.d: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]에 파견된 신규 선교단이 상당히 유능한 모습을 보이고 있다. 선교단의 활약으로 선교가 예상보다 훨씬 수월해졌다는 평가다."
 rapanui.132.f: "\"이들 원주민의 가까운 친척들에게 복음이 무엇을 이루었는가를 생각해 보라. 우리가 있는 아네이튬섬에서는 3500명에 달하는 식인종들이 이교도의 신앙을 버리도록 이끌었다... 피지에서는 식인종 79,000명이 복음에 응했고, 교회 신자 13,000명이 예수님을 따라 살고 일한다고 고백하고 있다. 사모아에서는 식인종 34,000명이 기독교를 고했고, 19년간 그곳의 학교에서 배출한 현지 교사와 전도사는 206명에 달한다. 우리 뉴헤브리디스 제도에서는 12,000명이 넘는 식인종들이 그리스도의 발밑에 이르도록 인도하였는데 물론 그렇다고 저들 모두가 모범적인 기독인이라 할 수는 없다. 그리고 133명의 원주민이 가르침을 받고 복음교사와 설교자로 나아가게 되었다.\" - 존 G. 패튼"
 rapanui.132.g: "하나님의 사역에 힘쓰고 있구나."
 rapanui.133.t: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]의 신규 선교단"
 rapanui.133.d: "신규 선교단이 기지에 도착한 뒤 바로 선교 활동에 나서 첫 성과를 보고할 수 있었다."
 rapanui.133.f: "저들의 숭배는 전적으로 공포에 기반한 것이었으며, 그 목적은 이런저런 악령을 달래고 재앙을 막거나 복수를 하는 것이었다. 저들에게는 족장을 신격화하여 성스러운 인물로 받드는 일이 거의 모든 마을이나 부족마다 이루어졌다. 이 마을이나 부족의 사제들은 악을 향해 엄청난 영향력을 행사했으며, 본연의 신성한 의식을 통해 생사여탈권을 쥐고 있다고 주민들은 믿었다. 또한 목재나 석재로 만든 우상을 통해 죽은 조상과 영웅의 영혼을 숭배했다. 저들은 영혼을 두려워하고 도움을 구했으며, 특히 전쟁과 평화, 기근과 풍요, 건강과 질병, 파괴와 번영, 생사를 관장하는 영혼들을 달래려 하였다. 저들의 모든 숭배는 노예로서의 공포에 기반한 것이었으며, 내가 아는 한 저들에게는 자비나 은혜의 신에 대한 개념이 전혀 없었다. - 존 G. 패튼"
 rapanui.133.g: "잘 해주고 있군."
 rapanui.134.t: "무능한 선교단?"
 rapanui.134.d: "신규 선교단을 [SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]에 파견하였음에도 개종 노력이 미미한 성과를 거두고 있다는 보고다."
 rapanui.134.f: "적들은 잠시 진정되거나 좌절하는 순간에도 내 목숨을 노리려는 악의적인 계획을 조금도 늦추지 않았다... 어느 사나운 추장이 머스킷총을 장전해 들고 네 시간 동안 나를 따라다녔는데, 나를 향해 총을 겨눈 것도 여러 번이었지만 하나님께서 그의 손을 막아주셨다. 나는 주님께 친절하게 고하고 마치 주님이 없는 것처럼 사역에 전념했다. 하나님께서 나를 그곳에 두셨고, 맡겨진 임무가 끝날 때까지 나를 보호해 주실 것이라고 믿어 의심치 않았기 때문이다. 사랑하는 주 예수께 끊임없이 기도하며 모든 것을 그분의 손에 맡겼고, 나의 사역이 끝날 때까지 불멸할 것이라고 느꼈다. 시련과 위기로부터의 아슬아슬한 탈출은 믿음을 더욱 굳건히 만들었고, 앞으로 닥칠 더 ​​많은 시련을 감내할 용기를 북돋아 주었다. 그리고 그런 시련들은 쉴 새 없이 이어졌다. - 존 G. 패튼"
 rapanui.134.g: "지금껏 대체 무얼 했단 말인가?"
 rapanui.135.t: "현지인과의 교역"
 rapanui.135.d: "지역 통치자와 접촉한 뒤 어떤 물품을 거래할 것인가의 문제가 남았다. 저쪽에서는 귀한 유물이나 [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animal$')], 고가의 진주를 교역 대상으로 제시하고 있다."
 rapanui.135.f: "이번 교역은 서로에게 보탬이 된다. 원주민 국가에게는 물품을 넘기는 대가로 기술 보너스를 얻게 된다."
 rapanui.135.g: "유물에 관심이 있소."
 rapanui.135.h: "동물을 택하겠소."
 rapanui.135.i: "진주가 마음에 드오."
 rapanui.136.t: "대왕쥐가오리"
 rapanui.136.d: "원주민들이 우리에게 아주 근사한 대왕가오리를 보내왔다. 가오리는 받은 그날 바로 본국으로 이송되었다."
 rapanui.136.f: "대왕쥐가오리는 매혹적이면서도 이국적인 동물로, 국내 동물원의 새로운 볼거리로 거듭났다. 대왕쥐가오리는 호주와 오세아니아 지역을 대표하는 동물로 꼽힌다."
 rapanui.136.g: "아름답구나!"
 rapanui.137.t: "푸른바다거북"
 rapanui.137.d: "원주민들이 우리에게 아주 근사한 푸른바다거북을 보내왔다. 거북이는 받은 그날 바로 본국으로 이송되었다."
 rapanui.137.f: "푸른바다거북은 매혹적이면서도 이국적인 동물로, 국내 동물원의 새로운 볼거리로 거듭났다. 대왕쥐가오리는 호주와 오세아니아 지역을 대표하는 동물로 꼽힌다."
 rapanui.138.t: "평판 훼손의 성공"
 rapanui.138.d: "현지인들을 매수해 증인으로 나서게 함과 동시에 선교사들의 뛰어난 언변 덕분에 우리는 경쟁 선교 기지의 악의를 지역 부족민들에게 알릴 수 있었다."
 rapanui.138.f: "경쟁 선교 기지, 특히 개신교와 가톨릭교 간의 의견차는 갈등으로 번져, 한쪽이 개종할 경우 해당 지역 통치자에 의해 추방당하는 사태로 이어지는 경우가 많았다. 타히티의 경우 개신교를 믿던 타히티인들이 프랑스의 보호를 받는 가톨릭 선교사들에게 반발하면서 갈등이 전면전으로 치달았다. 이 사건은 프랑스의 타히티 군사 개입의 서막을 알렸고, 타히티를 개종시킨 영국은 고작 몇몇 섬으로 분쟁에 휘말리지 않고자 물러나면서 일단락되었다."
 rapanui.139.t: "평판 훼손의 역효과"
 rapanui.139.d: "경쟁 선교 기지의 악의에 대해 우리 교인들, 그리고 앞으로 교인이 될 주민들에게 경고하고자 최선을 다하였지만 안타깝게도 우리 말을 믿으려 하지 않았다. 오히려 우리는 섬의 평화를 어지럽히려는 위선적인 골칫거리로 여겨지고 있다!"
 rapanui.139.g: "뜻대로 안 되었군."
 rapanui.140.t: "누명 쓴 선교단!"
 rapanui.140.d: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]에서 우리와 경쟁하고 있는 선교 기지가 우리 선교단의 평판을 떨어뜨리고 정치 공작과 영향력 행사만 일삼는다고 비난하였다. 이에 우리 선교지의 개종 속도가 크게 떨어지고 말았다!"
 rapanui.140.g: "저런 놈들이 기독교인을 자칭한다고?"
 rapanui.141.t_cat: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]에서 가톨릭교 신앙을 따름"
 rapanui.141.t_pro: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]에서 개신교 신앙을 따름"
 rapanui.141.d_cat: "오늘 엄숙히 거행된 미사에서 [SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]의 통치자가 예수 그리스도를 믿고 가톨릭교 신앙을 받아들였다. 이것으로 [SCOPE.sCharacter('rapanui_missionary_scope').GetLastName] 신부의 선교 활동은 절정에 이르렀다."
 rapanui.141.d_pro: "우리 선교사로 활동 중인 [SCOPE.sCharacter('rapanui_missionary_scope').GetFullName] 목사가 오늘 주님의 이름으로 [SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]의 통치자의 세례식을 거행하였다. 이것으로 우리나라의 기독교 선교단이 마지막 고비를 넘겼다."
 rapanui.141.f: "한때 이교도의 터전을 다스리던 자가 개종에 이르면서, 통치자 본인도 백성들을 참된 신앙으로 개종시키기 위해 몸소 나설 것이다. [SCOPE.sCharacter('rapanui_missionary_scope').GetFullName](은)는 고문으로서 개종 과정을 지원하기 위해 당분간 현지에 머물 것이나, 머지않은 미래에 고국으로 돌아올 전망이다. 개종과 함께 [SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag](은)는 우리나라에 보호를 요청하였고 다른 종교의 선교사들은 추방령을 내렸다. 강대국들 역시 우리나라의 현지 영향력 행사를 존중하고 있는 가운데 우리는 이를 바탕으로 추후 직접 통치에 나설 수 있을 것이다. 현지에서 이루어지던 직접 선교 활동은 마무리되었지만, 예수 그리스도의 가르침이 절실한 곳이 세계 어딘가에 또 있을지도 모른다."
 rapanui.141.g_cat: "인 노미네 도미니 노스트리, 예수 크리스티 (우리 주님, 예수 그리스도의 이름으로)."
 rapanui.141.g_pro: "우리 주님, 예수 그리스도의 이름으로."
 rapanui.142.t: "[SCOPE.sCharacter('rapanui_ruler').GetFullName]의 세례"
 rapanui.142.d: "[SCOPE.sCharacter('rapanui_ruler').GetFullName]의 가톨릭교 개종으로 우리나라는 기독교를 완전히 받아들이게 되었다. 개종한 통치자는 백성들의 개종을 최우선 과제로 삼기로 하였다."
 rapanui.143.d: "[SCOPE.sCharacter('rapanui_ruler').GetFullName]의 개신교 개종으로 우리나라는 기독교를 완전히 받아들이게 되었다. 개종한 통치자는 백성들의 개종을 최우선 과제로 삼기로 하였다."
 rapanui.142.f: ""
 rapanui.144.t_cat: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]의 개신교 이단 개종"
 rapanui.144.t_pro: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]의 가톨릭교 이단 개종"
 rapanui.144.d_cat: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]의 통치자가 개신교 선교사에게 세례를 받으면서 우리의 개종 노력은 결국 실패로 돌아가고 말았다."
 rapanui.144.d_pro: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]의 통치자가 가톨릭교 선교사에게 세례를 받으면서 우리의 개종 노력은 결국 실패로 돌아가고 말았다."
 rapanui.144.f: "현지인들을 참된 신앙으로 개종시키려는 온 노력이 헛수고로 돌아갔다. 이번 개종으로 거짓된 설교자를 지원하는 세력이 섬 내에서 영향력을 확대하였고 머지않아 우리쪽 선교사들을 추방할지도 모른다. 이러한 정책 변화로 선교사들을 철수시키고 다른 나라가 참된 신앙을 받아들일 수 있을지 가늠해봐야 할 것이다."
 rapanui.144.g_cat: "악마의 농간이 분명하다."
 rapanui.144.g_pro: "악마의 농간이 분명하다."
 rapanui.146.t: "이방인과의 교류"
 rapanui.146.d: "외국 선교 기지의 교섭자들이 우리에게 물물교환을 제안해 왔다. 우리가 제일 관심 가는 품목을 고를 차례다."
 rapanui.146.f: "이 교역은 상호교류 원칙에 따라 이루어진다. 외국은 우리네 유물, 동물, 진주 중 하나를 선택하게 된다."
 rapanui.146.g: "새로운 농경 기술."
 rapanui.146.h: "최신 무기."
 rapanui.146.i: "교육 확대."
 rapanui.151.t: "선교사의 설화 채록"
 rapanui.151.d: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]에 파견된 우리 선교사가 현지인들의 사고방식과 문화적 배경을 한층 더 이해하기 위하여 그들의 설화와 노래, 신화를 채록하고 나섰다."
 rapanui.151.f: "성 보니파시오의 선례를 이어받아 원주민들의 특이한 관습에 정면 대결을 시도한 선교사들도 있었지만, 언제나 그 지역 문화를 우선적으로 탐구하여 그들과의 접점을 찾고, 이를 바탕으로 원주민들을 그리스도로 인도하는 데 더욱 효과를 보고자 했던 학자 유형의 선교사들도 있었다. 예수회 선교사들도 이 같은 방식을 따랐다. 선교사들은 구전 설화를 최초로 글로 남겼기에, 이들이 수집한 자료는 후대의 문화 연구에 중대한 역할을 하였다. 동시에 유럽에서는 이국적인 문화와 관습에 대한 관심이 커져갔다."
 rapanui.151.g: "이 지식을 주민들의 개종에 활용한다."
 rapanui.151.h: "이런 수집품은 박물관에 들여야 한다."
 rapanui.152.t: "기독교 학교"
 rapanui.152.d: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]에 선교 학교를 세우면서 이 나라의 기독교 개종과 교육으로 향하는 중대한 걸음을 걷게 되었다."
 rapanui.152.f: "기독교 학교들은 외부 세계와 오랫동안 단절되어 있던 오세아니아 지역에 서구의 교육을 점진적으로 도입하고, 현지인들의 문해력을 증진하는 데 큰 역할을 하였다. 식인 풍습과 부족 간의 분쟁을 종식하는 것과 더불어, 학교 설립은 선교 활동이 남긴 가장 큰 긍정적인 효과로 꼽힌다."
 rapanui.152.g: "학교를 위해서가 아니라 인생을 위해 배운다."
 rapanui.153.t: "이단 선교사와의 갈등"
 rapanui.153.d: "어느 선교사의 공격적 행동으로 원래부터 있었던 경쟁 선교 기지와의 갈등이 한층 더 심화되었다. 이 선교사는 원주민 무리를 두고 우리네 교단 소속이 아니라 자기네 전도사가 이끌고 있다고 주장하고 나섰다."
 rapanui.153.f: "선교사들의 도래로 식인 풍습과 부족 간의 분쟁이 사라졌다는 기독교계의 서술은 안타깝게도 명백한 결함이 존재했다. 교파 간의 적대감이 과거에는 없었던 다툼으로 이어진 것이다."
 rapanui.153.g: "이들은 우리 전도사란 말이요."
 rapanui.153.h: "다른 쪽 뺨도 돌려 댑시다."
 rapanui.154.t: "역관"
 rapanui.154.d: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]에서 우리와 경쟁하고 있는 선교 기지에서 명백히 우리를 의식하며 자국의 역관 설치를 지원하고 나섰다. 아무래도 악랄한 상품 로 원주민들을 자국에 단단히 묶어두려는 바람인 모양이다."
 rapanui.154.f: "때로는 지루한 성경책보다 크리스마스 선물이 기독교 개종에 더 중요한 역할을 할 수도 있다."
 rapanui.154.g: "우리도 역관을 지어야 한다!"
 rapanui.155.t: "경쟁자에게 주어진 특권"
 rapanui.155.d: "경쟁 관계에 있던 선교사가 현지 통치자의 고문으로 임명되어 궁정에서 일하는 특권을 부여받았다. 이는 우리에게 심각한 모욕일 뿐만 아니라 [SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]에서의 입지를 약화시킬 수도 있다."
 rapanui.155.f: "통치자의 신뢰를 얻어낸 선교사들이 신하로 영입된 것은 대개 학력과 외교적 인맥, 그리고 무엇보다도 지식 보급에 대한 기대로 인한 것이었다. 이것만으로 순순히 개종할 의지를 피력했다고만 볼 순 없지만, 적어도 선교사가 나라 전체의 권력을 강화시켜 주었던 것은 사실이다. 이는 통치자에게 영향력을 행사하여 보호령 단계로 나아가려는 경쟁 관계의 선교사들에게 큰 불만거리였다."
 rapanui.155.g: "우리도 같은 특권을 요구해 보자."
 rapanui.171.t: "천국의 위기"
 rapanui.171.d: "외국 선교단 사이의 갈등이 위험 수준에 도달하고 말았다. 지금으로서는 정치 분쟁이 불가피해 보인다."
 rapanui.171.f: "서로 다른 교파에 속한 선교사들 간의 의견차가 특정 시점에 이르러 정치 갈등으로 번질 수 있다. 제일 유명한 사례는 타히티가 있다. 외부 세력의 개입을 두려워했던 타히티의 통치자는 두 교파 중 하나로 개종하여, 군사적 개입이 불가피할 경우에 최소한 상대 세력의 지원을 기대해볼 수 있는 상황을 만들고자 하였다. 보호국의 개입이 완벽한 것은 아니었으나 적어도 단순 식민지로 전락하는 것보다는 살아남을 기회를 열어준 것도 사실이다."
 rapanui.171.g: "가톨릭교로 개종한다."
 rapanui.171.h: "개신교로 개종한다."
 rapanui.172.t: "천국의 위기"
 rapanui.172.d: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]의 상황이 악화되고 말았다. 현지 통치자가 경쟁 선교 기지의 이단 신앙을 따르기로 한 것이다. 정계 일각에서는 벌써부터 해군 파견을 요구하고 있다."
 rapanui.172.f: "통치자가 다른 종교로 개종하면서 우리 선교사들의 추방도 시간 문제에 불과하게 되었다. 새로 정해진 국교가 머지않아 선교사들의 체류를 금할 것이기 때문이다. 섬나라를 참된 신앙으로 영구 개종시키고 영향력을 행사하려던 우리의 야망은 큰 타격을 입었지만, 상황이 완전히 절망 속으로 빠진 것은 아니다. 이번 사태는 [SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]에 직접 군사 개입에 나서 우리의 사상을 정치적, 종교적으로 관철시킬 수 있는 절호의 기회를 만들었다. 물론 새로운 보호국이 이번에 확보한 동포들의 편에 선다면, 이번 갈등은 [SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]의 연안을 훨씬 넘어서 전면전으로 치닫게 될 수도 있다..."
 rapanui.172.g: "그런 외딴 섬에 [ROOT.GetCountry.GetAdjectiveNoFlag] 해군의 뼈를 묻게 둘 순 없소."
 rapanui.172.h: "조국의 위신이 위협받고 있다!"
 rapanui.173.t: "천국의 위기"
 rapanui.173.d: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]의 상황이 악화되면서 그곳의 통치자가 우리네 종교로 개종하였다. 그러나 경쟁 선교 기지를 운영하던 국가가 이를 받아들이지 않고 자국의 신앙을 강요하기 위해 무력 침공에 나설 것이라 위협하고 있다."
 rapanui.173.f: "태평양 일부 제도의 통치권이 조국에 얼마나 가치 있는가에 관한 질문은 오늘날 그 어느 때보다 중요해졌다. 그것은 새로 얻은 보호령을 지키기 위해 전쟁을 벌일 준비가 되어 있는가에 관한 질문이다. 어찌 되었든 우리의 경쟁국은 본색을 드러내고 있다. 그렇기에 [SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]의 통치 여부는 국가 위신의 문제가 될지 모른다."
 rapanui.173.g: "허나 그런 갈등은 우리의 자원을 지나치게 소모하지 않겠는가."
 rapanui.173.h: "아무렴, 우리는 새로운 보호령을 도우러 갈 것이다."
 rapanui.174.t: "보호에 나서지 않는 보호국"
 rapanui.174.d: "우리의 '보호국'을 자처하던 열강에서 다가오는 전쟁에서 우리를 보호하기엔 너무 부담이 크다는 입장을 전해 왔다."
 rapanui.174.f: "성공적인 선교 활동과 지역 분쟁에서 우호적인 상호 지원이 있었음에도, 남태평양의 민족을 개종시킨 국가가 다른 강대국으로부터 이들을 보호하는 데 항상 관심을 갖는 것은 아니었다. 그렇기에 가톨릭 국가인 프랑스가 자국의 영향권이 침해당하는 것에 들고 일어나자, 영국은 자국 차원에서 개신교로 개종시킨 타히티의 보호에 나서지 않았다. 영국 정부는 프랑스의 통치권 주장을 그대로 인정했는데, 외딴 섬 몇 곳을 두고 세계 대전을 일으키고 싶지 않았기 때문이기도 했다."
 rapanui.174.g: "그래도 우리의 자유를 위하여 싸우겠다!"
 rapanui.174.h: "사태가 더욱 악화되기 전에 굴복하자."
 rapanui.175.t: "외교적 승리"
 rapanui.175.d: "우리가 군사 개입을 천명한 것은 [SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag] 통치자의 의지를 꺾기에 충분했다. 이 기회에 우리네 종교로 개종하고 보호령을 자처할 전망이다."
 rapanui.175.f: "보호 세력이 개입하지 않고 현지 통치자가 종교적 결정을 번복한다면 드물게나마 유혈 사태 없이 해결될 가능성이 있다."
 rapanui.175.g: "최상의 결과로군."
 rapanui.176.t: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]의 전쟁 태세"
 rapanui.176.d: "새로 들인 보호국에게 배신당했음에도 원주민들은 자유 수호를 위해 우리와 전쟁을 벌일 태세에 나섰다."
 rapanui.176.f: "우리나라의 개입으로 강대국 간의 분쟁을 초래하지는 않겠지만, 원주민들이 자유를 얻기 위해 투쟁에 나선다면 그저 미개인의 봉기라고 하기엔 예상보다 훨씬 더 폭력적인 양상을 띌지도 모른다."
 rapanui.176.g: "그렇다면 전쟁에 나설 수밖에."
 rapanui.177.t: "새로운 그리스도의 형제"
 rapanui.177.d: "개신교와 가톨릭교 선교단 사이의 갈등이 점차 심화되면서 현지 통치자는 보호를 요청하기 위해 우리네 교단을 공식적으로 인정한다는 결정을 내렸다."
 rapanui.177.f: "우리는 유혈 사태 없이 조국의 이익을 얻어낼 수 있었다. 경쟁 선교사들은 우리나라의 영향력을 인정하고 벌써부터 짐을 싸고 있다. 앞으로 저들은 더 이상 우리의 길을 막지 못할 것이다."
 rapanui.177.g: "개종은 개종이다."
 rapanui.178.t: "천국에서의 전쟁이 끝이 나다"
 rapanui.178.d: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]에서 우리의 이익을 관철시키는 데 성공하였다. 해당 지역의 통치자와 주민들은 우리의 지배에 복종하고 우리 종교로 개종할 것이다."
 rapanui.178.f: "어떤 이들은 뼈아픈 경험을 통해 배워야 한다. 허나 나중에는 우리의 너그러운 행동에 감사를 표하게 될 것이다."
 rapanui.201.t: "탐사대장"
 rapanui.201.d: "[concept_dubois_pacific_expedition]에는 경험 많은 제독이 필요하다. 이번 기회에 총 3명까지 후보로 지원할 수 있다."
 rapanui.201.f: "탐사에서 돌아온 제독은 항해 이력을 통해 많은 것을 배우게 되지만, 자리를 비우는 사이에 전쟁이 발발한다면 아무런 도움을 구할 수 없게 됩니다."
 rapanui.201.g: "[SCOPE.sCharacter('rapanui_pacific_expedition_leader_1').GetFullName]"
 rapanui.201.h: "[SCOPE.sCharacter('rapanui_pacific_expedition_leader_2').GetFullName]"
 rapanui.201.i: "[SCOPE.sCharacter('rapanui_pacific_expedition_leader_3').GetFullName]"
 rapanui.202.t: "탐사의 중점"
 rapanui.202.d: "이번 연구 탐사가 특정 주제에 중점을 두어야 하는지, 그렇다면 이번 여정의 중점 분야는 무엇인지에 관하여 아직 견해가 엇갈리고 있다."
 rapanui.202.f: "특화 분야가 있다면 각 세부 방면에서 우리에게 이점을 안겨다 줄 것입니다. 군사 분야는 해양학 지식 향상으로, 사회과학 분야는 생물학 연구로 이점을 얻게 됩니다. 강대국은 제국주의적 야망을 드러낼 수도 있으며, 해당 지역에서 자국의 위신과 영향력을 늘리는 행동에 나설 수도 있습니다."
 rapanui.202.g: "이번에는 통상적인 연구 여정을 진행한다."
 rapanui.202.h: "해양학 연구를 주로 수행할 것이다."
 rapanui.202.i: "자연의 경이로움을 더 자세히 배웠으면 한다."
 rapanui.202.j: "벌레나 실험보다 조국의 위신이 더 중요하다."
 rapanui.203.t: "동행 학자"
 rapanui.203.d: "관련 자격을 갖췄다는 전제 하에 특정 과학자를 탐사대에 합류시킬 여지가 생겼다. 동행 대상은 측량사, 박물학자, 고생물학자, [Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')]이다."
 rapanui.203.f: "태평양 탐사대는 다양한 분야의 학자들이 대거 합류하고, 귀국한 뒤에는 본국에 남은 학자들의 시야를 넓혀주는 것으로 명성이 자자했습니다. 물론 탐사의 주된 목적은 관찰과 표본 수집이었고, 그에 대한 평가는 본국에서만 이루어지는 것이 보통이었습니다. 선원들은 '곤충 수집가'라며 다소 경멸하는 시선을 보냈지만, 심해 측정, 자기 실험, 금성 일면토오가 관측 등을 통해 뛰어난 과학적 성과를 거둔 사람은 이토록 꼼꼼하고 성실한 사람이어야 하는 경우가 많았습니다."
 rapanui.203.g: "다른 학자는 필요 없다."
 rapanui.203.h: "측량사가 필요해. [SCOPE.sCharacter('rapanui_surveyor').GetFullName](이)라면 탐사에 나설 자격이 될 것이다."
 rapanui.203.i: "[SCOPE.sCharacter('dubois_naturalist_scope').GetFullName] 같은 [concept_dubois_naturalist]가 제격일 듯 하군."
 rapanui.203.j: "[concept_dubois_paleontologist] [SCOPE.sCharacter('dubois_paleontologist_scope').GetFullName]에게 선택의 기회를 주겠다."
 rapanui.203.k: "[concept_verrier_astronomer] [SCOPE.sCharacter('verrier_astronomer_scope').GetFullName]야말로 이런 탐사에 필요한 인재겠지."
 rapanui.204.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] 탐사대 출항"
 rapanui.204.d: "[concept_dubois_pacific_expedition]를 위한 준비가 마무리되었다. [SCOPE.sCharacter('rapanui_pacific_expedition_leader').GetFullName](은)는 [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] 호를 기함으로 선정하였다. 이번 여정은 #Yellow [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]호 탐사#!라는 이름으로 역사에 기록될 것이다."
 rapanui.204.f: "화창한 어느 날, [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] 호의 형상이 수면에 비쳐 보인다. 학계의 엘리트들이 부두에 서 있는 가운데, 한 교수는 과학적 면모에 매몰되지 않고 역사적 순간을 강조하는 강연에 나섰다. 오늘은 과학 뿐만 아니라 [ROOT.GetCountry.GetNameNoFormatting]에게 있어서도 특별한 날이다. 탐험의 결과가 어떻든 이번 여정에 거는 기대가 크다. 이윽고 [SCOPE.sCharacter('rapanui_pacific_expedition_leader').GetFullName](이)가 출항 명령을 내린다. 거창한 예포 소리와 함께 작별을 나눈 탐사선은 먼 곳으로 자취를 감췄다."
 rapanui.204.g: "밧줄을 풀고 오세아니아로!"
 rapanui.204.h: "호주와 뉴질랜드를 향해 돛을 올려라."
 rapanui.204.i: "인도네시아와 멜라네시아로 진로를 정한다."
 rapanui.205.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] 탐사대, 오세아니아 도착"
 rapanui.205.d: "[SCOPE.sCharacter('rapanui_pacific_expedition_leader').GetLastName] 장군이 이끄는 #YELLOW [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] 호#!의 선원들이 폴리네시아 동부 해역에 무사히 도착하였으며, 곧바로 연구 활동에 나설 전망이다."
 rapanui.205.f: "[concept_dubois_pacific_expedition]는 태평양을 경계로 삼는 오세아니아, 호주, 인도네시아의 세 지역을 목적지로 삼아 나아갑니다. 이러한 여정은 목적 뿐만 아니라 지역도 제 역할을 하게 되는데, 이를테면 캥거루는 호주에서만 발견할 수 있습니다. 제국주의 강대국들은 외교적 이해 관계를 두지 않고도 오세아니아에 선교사를 파견하거나 무역소를 세울 수 있지만, 인도네시아나 호주에서는 그것이 불가능합니다. 탐사 도중에는 일지 항목을 통해 지역을 한 차례 변경할 수 있습니다."
 rapanui.205.g: "아, 타히티여."
 rapanui.206.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] 탐사대, 호주 도착"
 rapanui.206.d: "[SCOPE.sCharacter('rapanui_pacific_expedition_leader').GetLastName] 장군이 이끄는 #YELLOW [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] 호#!의 선원들이 태즈메이니아 해역에 무사히 도착하였으며, 곧바로 연구 활동에 나설 전망이다."
 rapanui.206.g: "아, 호주여."
 rapanui.207.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] 탐사대, 인도네시아 도착"
 rapanui.207.d: "[SCOPE.sCharacter('rapanui_pacific_expedition_leader').GetLastName] 장군이 이끄는 #YELLOW [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] 호#!의 선원들이 자바섬 해역에 무사히 도착하였으며, 곧바로 연구 활동에 나설 전망이다."
 rapanui.207.g: "아, 바타비아여."
 rapanui.210.t: "항로 변경"
 rapanui.210.d: "[SCOPE.sCharacter('rapanui_pacific_expedition_leader').GetLastName] 제독이 지난 탐사 지역에서 벗어나 항로를 변경할 기회를 주었습니다. [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]호가 앞으로 나아갈 지역은 어디가 좋을까요?"
 rapanui.210.f: "\"자신감이 없는 일은 무엇이든 제대로 못 하게 될 것이다\" - 제임스 쿡"
 rapanui.210.g: "폴리네시아."
 rapanui.210.h: "호주."
 rapanui.210.i: "인도네시아."
 rapanui.210.j: "항로를 유지한다."
 rapanui.211.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] 탐사대 귀환"
 rapanui.211.d: "[SCOPE.sCharacter('rapanui_pacific_expedition_leader').GetFullName](이)가 지휘하는 탐사대가 수 년 간의 여정을 마치고 돌아왔다. 오늘의 업적은 후손의 이익으로 돌아올 것이다."
 rapanui.211.f: "대규모 연구 탐사대의 귀향은 단순한 끝이 아니라 장기 연구의 시작인 경우가 많습니다. 덴마크의 갈라테아 탐사대가 좋은 예시입니다. 갈라테아호는 동물학, 곤충학, 식물학, 지질학 관련 자료가 담긴 화물칸 93개를 싣고 돌아왔습니다. 여기에 민족지학 자료가 담긴 상자 21개, 자바섬에서 수집된 방대한 자료, 그리고 탐사대가 방문한 여러 도시와 항구의 과학자들이 기증한 선물들도 있었습니다. 안타깝게도 이 때의 발견 성과는 정치적인 이유로 완전히 출판되지 못했습니다. 이후 이 수집 자료들은 주로 출처 자료로 활용되었습니다."
 rapanui.211.g: "귀향을 환영하오."
 rapanui.212.t: "신임 박물학자"
 rapanui.212.d: "연구에 동행했던 [SCOPE.sCharacter('dubois_naturalist_scope').GetFullName](이)가 오랜 탐사와 그에 따른 집중 연구 끝에 이제는 검증된 자연과학자이자 본인의 분야에서 전문가로 인정받게 되었다."
 rapanui.212.f: "\"결론적으로 젊은 박물학자에게 있어 먼 나라로의 여정만큼 유익한 것은 없을 듯하다. 여정으로 하여금 감각을 예리하게 만드는 동시에, 모든 감각이 완전히 충족되었음에도 인간이 느끼는 갈망과 욕구를 다소간 해소해 준다는 점은 존 허셜 경도 지적한 사실이다. 색다른 주제를 향한 즐거움과 성공 가능성은 활동량 증가를 자극하게 된다. 또한 여러 가지 개별적 사실은 머지않아 흥미를 잃게 되므로, 비교하는 버릇은 일반화로 이어진다. 반면 여행자는 각각의 장소마다 짧게 머물다 가기 때문에 그런 사람의 해설은 상세한 관찰보다는 단순한 스케치에 그칠 수밖에 없는 것이다. 그렇기에 나 자신이 뼈저리게 경험했듯 부정확하고 피상적인 가설로 지식의 공백을 메우려는 경향이 끊이질 않게 된다.\" - 찰스 다윈"
 rapanui.212.g: "우리의 향후 계획에 보탬이 되겠군."
 rapanui.213.t: "동행 과학자의 보고서 집필"
 rapanui.213.d: "연구 항해에서 복귀한 [SCOPE.sCharacter('rapanui_scientist').GetFullName](이)가 태평양으로의 여정에 관한 보고서를 처음으로 집필하였다. 그 결과물은 향후 몇 년에 걸쳐 더욱 자세히 기록될 것이다."
 rapanui.213.f: "연구 항해가 성공적으로 마무리된 후에는 그 기간에 벌어졌던 일에 관한 장문의 과학 논문이 발표되는 경우가 많았으며, 수년에 걸쳐 진행되는 것이 보통이었습니다. 찰스 다윈이 비글호 탐사로 얻은 지식은 이후 몇 년 간 여러 편의 논문에 반영되었습니다. 오스트리아의 노바라호의 연구 항해는 21권 분량의 보고서를 결과물로 냈습니다. 챌린저 탐사대의 연구 결과는 항해를 마친 지 19년이 흐른 1895년까지 에든버러의 챌린저 사무소에서 지속적으로 출판되었습니다. 이 보고서의 경우 50권 분량에 29,500쪽이 넘는 분량을 기록하였습니다."
 rapanui.213.g: "도서관에 과학 논문이 또 하나 추가되는군."
 rapanui.221.t: "해류"
 rapanui.221.d: "[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]호가 대단히 거센 해류를 만났다."
 rapanui.221.f: "해류 연구는 해양학 발전의 기반이 된 기초 과학 중 하나였습니다. 대항해시대 초기부터 스페인과 포르투갈의 항해사들은 세계의 대양을 빠르게 횡단하는 데 도움이 될 법한 해류들을 파악해 두었습니다. 필리핀 마닐라와 멕시코 아카풀코 간의 무역로가 대표적인 사례입니다. 19세기에는 전세계의 해류 체계가 정확히 어떤 원리에 기반하는지에 관하여 보다 포괄적이고 한층 더 발전한 그림을 그려내기 위해 이러한 해양학적 지식을  심화시키기에 이르렀습니다."
 rapanui.221.g: "과학자들은 꼭 필요한 실험들부터 수행해야 한다."
 rapanui.221.h: "더 많은 지식 확보를 위해 해류를 따라간다."
 rapanui.222.t: "해양학 조사"
 rapanui.222.d: "현재 #YELLOW [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] 탐사대#!는 지금까지 탐사가 이뤄지지 않은 지역의 해수 구성과 온도에 관한 연구를 진행하고 있다."
 rapanui.222.f: "세계의 해수는 끊임없이 움직입니다. 주된 원동력은 조수와 바람입니다. 온도와 염분차도 해수 이동에 중대한 역할을 하는데, 그러한 밀도 차이가 해류 자체를 발생시키기 때문입니다. 수온과 염분, 해류의 속도 변화는 육지에도, 기후에도 영향을 끼칩니다. 가장 널리 알려진 사례로는 멕시코 만류가 있습니다."
 rapanui.222.g: "신선한 바닷소금!"
 rapanui.223.t: "자기장"
 rapanui.223.d: "[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] 호에 승선한 과학자들은 지구의 자기장에 관한 학설을 증명하기 위해 다양한 실험에 나섰다."
 rapanui.223.f: "여행용 경위의(세오돌라이트)는 탐사용으로 제작된 측지성 경위의로 최대한 작고 튼튼하게 제작되었으며 이동 중에도 조작이 가능했습니다. 이는 오스트리아의 '노바라 탐사대'에서 사용한 것으로 알려져 있습니다. 육지 위에서 지자기성 매개변수를 측정하기 위하여 미리 가져온 '벽돌'로 단단한 지반을 만들어 측정소를 설치하는 경우가 일반적이었습니다. 수 시간 동안 연속으로 이어지는 자기장 측정은 항상 천문학적 위치 측정을 동반하여야 했습니다. 이 같은 방식으로 지구 전역의 17개 지점에서 지구 자기장을 측정할 수 있었습니다."
 rapanui.223.g: "이것으로 우리의 물리학 지식이 향상될 것이오."
 rapanui.223.h: "[SCOPE.sCharacter('rapanui_scientist').GetLastName] [SCOPE.sCharacter('rapanui_scientist').GetCustom('getMsMr')]가 특별 실험에 나서줘야겠소."
 rapanui.223.i: "이것으로 우리의 해양학 지식이 향상될 것이오."
 rapanui.224.t: "심해 측정"
 rapanui.224.d: "#YELLOW [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] 탐사대#!는 바다의 고심도 구간의 밀도와 온도, 염도를 측정하기 위한 고난이도의 심해 조사를 진행하고 있다. 또 이전에 학계에 보고되지 않은 생물들도 심해에서 채집할 방침이다."
 rapanui.224.f: "19세기 중반부터 심해 탐사는 조금씩 중요한 역할을 행사하게 되었습니다. 한편으로 이것은 전신이 등장하던 시대에 전신선의 부설을 위한 해저 조사와도 관련이 있었고, 다른 한편으로는 물리적, 생물학적 이론을 검증해야 할 필요성이 있었습니다. 오랫동안 특정 수심 아래에는 생명체가 존재할 수 없거나 '살아 있는 화석'이 보존되어 있을 것이라는 가정이 있었습니다. C.W. 톰슨을 비롯한 과학자들은 일정한 저온과 어둠, 해류와 파도 혹은 지진 활동의 결여와 같은 여건이 진화가 느려지거나 완전히 멈출 정도로 안정적인 환경을 제공할 것이라 보았습니다. 이러한 이유로 심해 연구는 자연학자, 고생물학자, 진화론 지지자들에게 중요한 분야로 거듭났습니다."
 rapanui.224.g: "측정에 집중하시오."
 rapanui.224.h: "심해의 [Concept('concept_dubois_specimen','$concept_dubois_specimens$')]에 집중하시오."
 rapanui.225.t: "남극"
 rapanui.225.d: "강한 해류로 항로를 이탈한 [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] 호가 남극의 영구 빙원에 당도했다는 사실이 밝혀졌다. 과학자들은 뜻밖의 기쁨을 누렸지만, 선원들은 얼음에 갇힐까 두려워하는 모습이다."
 rapanui.225.f: "[concept_dubois_pacific_expedition]가 남극에 도달하면 진행하던 연구를 심화시킬 좋은 기회입니다. 다만 탐사선이 빙붕 지대로 너무 깊숙이 진입하면 귀중한 시간을 허비할 위험이 존재합니다. 19세기에는 여러 탐사대가 아극지대로 향했으나 챌린저 탐사대조차도 거센 환경에서 너무 오랜 시간을 보내지 않도록 주의를 거듭했습니다."
 rapanui.225.g: "해양학 연구를 하기에 안성맞춤이군."
 rapanui.225.h: "기상학 연구를 하기에 안성맞춤이군."
 rapanui.225.i: "동식물학 연구를 하기에 안성맞춤이군."
 rapanui.225.j: "전반적인 연구를 하기에 안성맞춤이군."
 rapanui.226.t: "얼음"
 rapanui.226.d: "[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]의 항해가 상당히 지연될 전망이다. 탐사선이 영구 빙원에 갇혀버린 모양이다."
 rapanui.226.f: "#YELLOW [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] 탐사대#!가 실험을 수행할 수 없게 되었다."
 rapanui.226.g: "아까운 시간을 버리다니!"
 rapanui.227.t: "미지의 섬"
 rapanui.227.d: "#YELLOW [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] 탐사대#!가 지금까지 알려지지 않았던 섬을 발견했다. [SCOPE.sCharacter('rapanui_pacific_expedition_leader').GetLastName] 대장은 좀 더 가까이 탐사해볼 것을 명했다."
 rapanui.227.f: "\"겁은 전염된다는 말이 있지만, 반대로 말하면 논쟁은 용기를 북돋아주게 만든다.\" - 로버트 루이스 스티븐슨"
 rapanui.227.g: "[SCOPE.sCharacter('rapanui_scientist').GetLastName] 박사를 섬으로 보내 탐색하도록 한다."
 rapanui.227.h: "소규모 육지 탐사대를 보낸다."
 rapanui.229.t: "해류로 밀려난 탐사선"
 rapanui.229.d: "지난번 과학 실험의 대가가 너무 컸던 모양이다. [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] 호가 해류에 휩쓸리고 있고 바람도 우리의 편이 아니다."
 rapanui.229.f: "탐사선이 해류에 휘말리면 원래 연구 지역을 벗어나 나머지 두 지역 중 한 곳으로 떠밀려가게 됩니다. 어디로 표류하는지는 무작위로 정해집니다."
 rapanui.229.g: "우리의 탐사 목표를 눈앞에서 놓치고 있다는 이야기로군."
 rapanui.230.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] 해구"
 rapanui.230.d: "#YELLOW [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] 탐사대#!가 심해 측정을 실시하는 과정에서, 해저에서 가장 깊은 지점을 확인하였다. 이 지점을 발견한 공로를 기려 심해의 명칭에 탐험선의 이름을 붙이기로 하였다!"
 rapanui.230.f: "1875년 3월 23일 챌린저 탐사대는 남서태평양의 괌과 팔라우 사이 해역에 위치한 표본 채취 지점 225번에서 해저 수심이 4,475패덤(수심 8,184m)에 달하는 것으로 처음 측정하였으며, 추가 측정을 통해 이를 재확인하였다. 이후 현대 장비를 동원한 여러 탐사대의 조사 과정에서 밝혀진 바, 그 지역은 마리아나 해구의 남쪽 끝자락에 해당되며 해저에서 가장 깊은 곳으로 꼽힌다. 챌린저호가 처음으로 수심 측정에 나섰던 지점 부근에서 최신 측량을 실시한 결과 최대 6,012패덤(10,994m)에 달하는 것으로 확인되었다. 챌린저호의 수심 측정은 바다의 깊이와 범위에 대한 해양학적 지식을 넓히는 데 큰 역할을 하였으며, 오늘날 이 지점은 챌린저호의 이름을 따서 '챌린저 해구'라 불린다."
 rapanui.230.g: "역사적인 날이로군."
 rapanui.231.t: "거북섬"
 rapanui.231.d: "#YELLOW [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] 탐사대#!가 항해 중에 거북이들의 서식지를 발견하였다. 섬에 거북이들이 엄청나게 많이 살고 있었던 것이다."
 rapanui.231.f: "멀리 떨어진 선원들의 눈에는 섬 해변이 움직이는 것처럼 보였다. 이곳은 푸른바다거북이 알을 낳곤 하는 섬이었다. 일부 선원들은 상륙하자마자 아무것도 모르는 거북이들에게 장난을 치고 싶어 했다. 거북이알을 훔치거나 말로만 듣던 거북 수프를 드디어 맛보겠다고 대놓고 말하기도 했다. 그러나 과학자들이 [SCOPE.sCharacter('rapanui_pacific_expedition_leader').GetLastName] 선장에게 아무도 손대지 않도록 간곡히 요청하면서 선원들은 마지못해 요리할 욕심을 버리게 되었다."
 rapanui.231.g: "거북이 한 마리를 포획해야 하오."
 rapanui.231.h: "거북이를 연구하고 일부 표본을 수집하시오."
 rapanui.232.t: "가오리"
 rapanui.232.d: "새로운 이국의 어류를 찾아 나선 #YELLOW [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] 탐사대#!의 과학자들이 거대하고 장엄한 대왕쥐가오리를 찾아냈다."
 rapanui.232.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] 호는 해 뜰 무렵 만에 잠시 정박하여 어류 개체군의 조사에 나섰다. 몇몇 과학자들이 작은 보트에 올라 표본을 수집하던 중, 너무나 아름다운 거대 가오리가 뱃머리를 지나가는 것을 보고 학자들은 제 눈을 믿지 못했다. 그런 특별한 생물은 전근대 뱃사람의 이야기에서나 전해들을 것만 같았다. 그러나 이 소식을 전해들은 다른 선원들은 반응이 엇갈렸다. 동물학자들 가운데서는 그 가오리를 포획하여 수조통에 넣어 본국으로 가져가는 것이 최선이라 주장하였다. 반면 과학적 결론을 도출하기 위해 서식지에서 직접 관찰하고 떠나는 것이 좋다는 주장도 제기되었다. 또 결국에는 가오리에 손대지 않고 표본 채집을 계속해야 한다고 단언하는 학자들도 있었다. 반면 [SCOPE.sCharacter('rapanui_pacific_expedition_leader').GetLastName] 선장은 전혀 다른 계획에 나서겠노라 말했다. 가오리를 사냥하여 훈장으로 삼고 [SCOPE.sCharacter('rapanui_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('rapanui_ruler').GetFullName]에게 감사의 표시로 진상하자고 제안한 것이다. 이것이 정부의 예산 지원에 대한 감사의 뜻인지 아니면 자기 경력을 드높이기 위해서인지는 알 수 없었다."
 rapanui.232.g: "이 놀라운 생물을 포획해야 한다."
 rapanui.232.h: "우리 나랏님께 훌륭한 훈장이 될 것이다."
 rapanui.232.i: "[SCOPE.sCharacter('rapanui_scientist').GetLastName] 씨가 연구에 나서는 것이 좋겠다."
 rapanui.232.j: "자연 그대로 두고 다른 표본이나 채취하는 것이 좋겠다."
 rapanui.233.t: "캥거루 포획"
 rapanui.233.d: "호주 연안에 잠시 정박한 [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] 호의 정찰선이 현지 주민들과 접촉에 나섰다. 주민들은 이 지역에 붉은캥거루가 살고 있다고 알려주었다."
 rapanui.233.f: "\"덩치도 크고 털도 북슬한 괴수란 말이여!\" 웨일스에서 건너온 정착민의 말에 동물학자 버튼홀토스터 교수는 신나서 붉은캥거루 사냥에 나섰다. 하지만 버튼홀토스터 교수가 미처 예상치 못한 것은 호주의 붉은캥거루가 동물계에서 제일 사나운 동물로 꼽힌다는 사실이었고, 웨일스 정착민의 말조차 과소평가했다는 점이다. 데드캣 굴리에서 벌어진 악명 높은 붉은캥거루 사냥꾼들이 참혹한 결과를 맛보았다는 사실을 주민들이 수차례 알려주엇지만, 버튼홀토스터 교수가 실제로 겪게 될 일에 비하면 아무것도 아니었다. #YELLOW [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] 탐사대#!에 오르기 전에 버튼홀토스터 교수는 대학교의 칙칙한 지하실에서 서른세 해를 보냈으며, 호주에서 제일 큰 육상 동물을 잘 다룰 법한 체격은 아니었다는 점을 열렬한 동료 학자들은 지적하고 싶어했다. 버튼홀토스터 교수가 지난 몇 년 동안 했던 유일한 체력 단련은 부스러기 떨어지는 체리 케이크 접시를 차곡차곡 쌓는 것 뿐이었다. 동료 학자들은 거대 캥거루를 찾는 것이 보편적인 동물학 연구에 보탬이 되리라는 점에는 뜻을 같이 하였으나, 이것이 올바른 접근 방식인가에 대해서는 의문을 품었다."
 rapanui.233.g: "캥거루를 손에 넣겠다. 뭐 그리 잘못되기라도 하겠나?"
 rapanui.234.t: "코알라 거래"
 rapanui.234.d: "육지에 상륙하자 호주의 떠돌이 상인이 우리에게 접촉해 왔다. 그는 동물을 거래하는 자로 세상 어디에서도 찾아볼 수 없는 '복실복실한 곰'을 우리에게 보여주겠다고 제안해 왔다..."
 rapanui.234.f: "#YELLOW [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] 탐사대#!의 학자들은 그 곰이 사실은 코알라, 즉 유대류 동물이라는 것을 금방 알아냈다. 그럼에도 동물학자와 생물학자들의 관심은 대단했다. 허나 조건은 있었다. 거래상은 돈을 원하는 게 아니라 다른 동물, 즉 담비를 요구했던 것이다. 몇몇 대원들은 뜻밖의 요구에 놀랐지만 거래상은 족제비, 패럿 같은 동물들이 호주와 뉴질랜드에서는 인기가 많다고 힘주어 말했다. 그 이유는 이주민들이 토끼를 들여왔는데 천적이 없는 탓에 지역 동식물 뿐만 아니라 농작물에도 해를 끼치고 다니기 때문이라는 것이다. 그래서 지금은 토끼를 퇴치하기 위해 담비를 아주 많이 들여와야 하는 상황이라고 전했다. 그것이 어떤 결과를 초래할 것인가? 동물 거래상은 어깨를 으쓱하며 우리에게 담비를 키우고 있지는 않은지 물었다."
 rapanui.234.g: "우리네 담비를 코알라와 기꺼이 교환하자."
 rapanui.234.h: "담비가 호주에서도 일으킬 피해를 생각하면 끔찍할 것이오!"
 rapanui.234.i: "참 이상한 제안이로군. 우린 표본에 더 관심이 있다네."
 rapanui.235.t: "가장 괴상한 동물"
 rapanui.235.d: "항구 도시에서 어느 연락책이 유명 사냥꾼이자 동물 포획 전문가를 소개해 주었는데 그 사람이 학자들에게 놀라운 동물을 보여주었다."
 rapanui.235.f: "학자들 가운데 어느 누구도 이런 동물에 대해서 들어본 적도 본 적도 없었다. 호주의 야생 동물은 다소 신비로울 것이라는 예상은 있었지만, 부니입의 경우처럼 원주민들이 유럽인들에게 환상적인 동물 이야기를 들려주었으나 그것이 단순 설화로 밝혀진 사례가 있었다는 경고도 있었다. 그러나 두 가지 사실이 학자들의 의심을 키웠다. 첫째로 사냥꾼이 오리와 비버와 수달이 섞인 이 키메라를 만지거나 너무 가까이 하지 말라고 요구한 점이었다. 이는 일부 동물학자들로 하여금 박제된 동물이 아닐까 하는 의심을 불러일으켰다. 어느 생물학자는 오리에 수달 털을 붙이고 비버 꼬리를 달았다는 조사 결과를 내놓았다. 둘째로 의심을 일으킨 것은 가격이었다. 이 거액을 충당하려면 정부의 보조 예산이 필요할 것이 분명했다. 사냥꾼이 추가 비용을 요구할 가능성도 배제할 수 없었다."
 rapanui.235.g: "사들이시오!"
 rapanui.235.h: "이 동물은 가짜가 분명하다. 이런 판매 전략의 이면에 어떤 사업 계획이 있을지 의심스럽군."
 rapanui.236.t: "보르네오의 비밀"
 rapanui.236.d: "#YELLOW [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] 탐사대#!가 보르네오 밀림에서 흥미로운 발견을 이루어냈다."
 rapanui.236.f: "학자와 현지 안내인, 조력자와 무장한 호위대로 이루어진 조사단이 보르네오 밀림 지대를 거니는 과정에서 오랑우탄 한 마리가 홀로 남은 것을 발견했다. 이 오랑우탄을 어떻게 할 것인가에 대해 의견이 엇갈렸다. 오랑우탄은 보통 단독 생활을 하며, 유럽인들의 유입으로 개체수가 현저히 줄어들고 더욱 자취를 감추게 되었다. 한편 곤충학자들은 표본에 관심을 보이며 딱정벌레를 계속해서 찾고 싶다는 의향을 보였다."
 rapanui.236.g: "동물원에 들일 동물로 제격이군."
 rapanui.236.h: "[SCOPE.sCharacter('rapanui_scientist').GetLastName] 씨가 이 경이로운 생명체를 연구해주어야겠소."
 rapanui.237.t: "용"
 rapanui.237.d: "순다 제도에 도달한 [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]호 선원들이 선사시대에서나 볼 법한 파충류와 마주쳤다."
 rapanui.237.f: "[SCOPE.sCharacter('rapanui_pacific_expedition_leader').GetLastName] 대장은 순다 제도에서 거대한 파충류가 바위 위에 앉아 있는 모습을 목격하고 말았다. 동물학자는 저 동물이 지금껏 눈에 담은 것 가운데 가장 크고 장대한 왕도마뱀이라 확언하였으며, 대장으로 하여금 한평생 본 것 가운데 제일 흉측한 생물을 발견했다는 확신을 더욱 굳히게 하였다. 물론 자연과학자들은 여느 때처럼 화색이 돌았다."
 rapanui.237.g: "이런 용 같은 동물도 조국에 들이는 것이 좋겠지."
 rapanui.237.h: "누군가 이 동물의 생태를 연구하는 것이 좋겠군. 적당히 거리를 두고 말이야."
 rapanui.237.i: "이보다 학자들은 곤충과 조류, 어류에 집중해야 해. 이런 흉측한 생물만 아니면 뭐든 좋다."
 rapanui.238.t: "캥거루 포획!"
 rapanui.238.d: "탐사대원들은 붉은캥거루를 덫으로 유인하여 사로잡은 뒤 옮겨 놓았다. 이제 캥거루는 무사히 우리에 갇혀 있다."
 rapanui.238.f: "\"제발 등에 태워 주세요!\"\n오리가 캥거루에게 말했습니다.\n\"저는 하루 종일 가만히 앉아서\n 꽥 소리만 낼 게요!\n그리고 우린 디강과 젤리보강으로,\n육지와 바다를 건널 거라구요-\n제발 저를 태워 주세요! 제발요!\"\n오리가 캥거루에게 말했습니다.\n\n캥거루가 오리에게 말했습니다.\n\"이건 좀 생각해 봐야겠군.\n어쩌면 좋은 일로 돌아올 지도 모르잖아.\n그런데 한 가지 문제라면,\n솔직히 말해도 될까 싶은데,\n네 발이 축축하고 차가워서\n관절염을 옮을 것만 같아!\"\n캥거루가 말했습니다.\n- 에드워드 리어"
 rapanui.238.g: "고국으로 보내라!"
 rapanui.239.t: "탐사대원이 캥거루에게 맞아 사망하다"
 rapanui.239.d: "일방적인 혈투 끝에 선원 여럿이 쓰러져 중상을 입고, 유리창은 찌그러지고 교수들은 공포에 질렸다. 탐사대는 결국 캥거루 포획에 실패했다는 것을 인정하지 않을 수 없었다. 심지어 연구 조교 한 명은 날뛰는 캥거루에게 맞아 죽고 말았다."
 rapanui.239.g: "이런 끔찍한 일이!"
 rapanui.240.t: "[SCOPE.sCharacter('rapanui_scientist').GetLastName]선"
 rapanui.240.d: "[SCOPE.sCharacter('rapanui_scientist').GetFullName](이)가 아시아와 호주 간에 그어진 동물상의 경계를 발견하며 생물학에 큰 공헌을 하는 동시에 진화론을 뒷받침하였다. 이 경계선은 그의 업적을 기려 그 이름을 따서 명명될 것이다."
 rapanui.240.f: "\"나는 이곳에서 서쪽의 제도에서는 전혀 찾아볼 수 없는 호주의 수많은 고유종들을 처음으로 접했다. 이곳엔 조그만 흰색 앵무새들이 많았는데, 큰 울음소리와 눈에 띄는 흰색 깃털, 멋진 노란색 머리가 주를 이루었다. 그 과에 속하는 조류가 발견되는 지역으로는 이곳이 지구상에서 가장 서쪽에 위치한 지점이다. 여기서 동쪽으로 이동하는 박물학자는 먼저 작은 꿀빨판앵무과와 특이하게 생긴 탑새를 발견하게 된다. (중략) 발리와 20마일도 채 되지 않는 해협으로 분리된 롬복섬에서 나는 당연히 이 새들을 다시 만날 수 있을 것으로 예상했다. 그러나 석 달 동안 그 섬에 머무르면서 그 어떤 종도 발견하지 못했으며, 오히려 전혀 다른 종들을 발견하였는데, 그 종들 대다수가 자바섬은 물론 보르네오, 수마트라, 말라카 반도에서도 거의 찾아볼 수 없는 종이었다.\" - 알프레드 러셀 월리스"
 rapanui.240.g: "[SCOPE.sCharacter('rapanui_scientist').GetLastName]선이라고? 괜찮은 이름이로군."
 rapanui.241.t: "희귀 조류"
 rapanui.241.d: "#YELLOW [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] 탐사대#!의 연구 조수들이 희귀 조류가 머무는 둥지 몇 개를 발견했다."
 rapanui.241.f: "\"이 새들은 칠레의 텐카나 라플라타 지역의 칼란드라와 생김새가 제법 유사하다. (중략) 각각의 부류마다 고유종이 있으며 모든 종의 습성은 구별할 수 없다. 스페인 사람들은 신체의 형태, 껍데기의 모양, 전체적인 크기만 보고도 어느 섬에서 거북이가 왔는지 바로 알아낼 수 있었던 사실을 헤아려 본다. 이 섬들이 서로 마주보고 있고, 동물의 종류도 몇 되지 않으며, 서식하는 새들도 구조적으로 조금씩만 다르고 자연에서 같은 지위를 차지한 것을 보면, 나는 이들이 단지 변종일 뿐이라고 의심하지 않을 수 없다. 본인이 알고 있는 유사한 사례로는 동포클랜드와 서포클랜드 제도의 늑대형 여우 간에 차이가 존재한다는 거듭된 주장 뿐이다. 만약 이러한 주장에 조금이라도 근거가 있다면 군도의 동물상은 연구해 볼 가치가 있을 것이다. 왜냐면 그러한 사실은 종의 안정성을 위협할 것이기 때문이다.\" - 찰스 다윈"
 rapanui.241.g: "새를 관찰하고 연구하자."
 rapanui.241.h: "새를 잡고 알을 가져가자."
 rapanui.242.t: "해양 표본"
 rapanui.242.d: "우리 표본 수집원들이 어제 새로운 해양 생물들을 알차게 포획해 왔다."
 rapanui.242.f: "윌크스 탐사대는 19세기 미국의 탐사대로, 당대 과학계 발전, 무엇보다 미국 과학계의 발전에 큰 역할을 하였다. 탐사대가 발견한 수많은 종과 표본은 스미소니언 박물관을 신설할 당시 기본 소장품을 이루는 데 한몫하였다. 해군 승무원들은 '조개 캐는 사람'이나 '곤충 사냥꾼'이라 조롱했지만, 탐사대 과학자들의 도움으로 6만 점이 넘는 식물과 조류 표본이 수집되었던 것이다. 탐사 기간 동안 엄청난 양의 자료와 표본을 모았는데 여기에는 식물 종자 648종도 함께 포함되어 미국 전역에 교역, 파종, 배포되었다. 건조 표본은 현재 스미소니언 박물관의 일부인 미국 국립 식물 표본관으로 전달되었다. 또한 탐사 막바지에 주로 발견한 살아있는 식물 254종은 1850년에 신설된 온실에 옮겨 심어졌는데, 이 온실은 훗날 미국 식물원의 기원이 되었다."
 rapanui.242.g: "생물학자들의 보고일세."
 rapanui.243.t: "환상적인 화석들"
 rapanui.243.d: "#YELLOW [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] 탐사대#!는 이동 과정에서 이전에는 알려지지 않았던 화석들이 매장된 지역을 찾아냈다."
 rapanui.243.f: "비글호의 탐사에서 화석의 발견은 큰 중요성을 지녔다. 복귀 당시 리처드 오웬은 찰스 다윈이 발견한 화석들을 기록으로 남기는 데 특히 전념하였다. 비글호는 거대 나무늘보 밀로돈이나 거대 아르마딜로 (글립토돈)와 같은 새로운 종의 화석을 찾아냈다. 산타페 근처에서 발견한 화석 가운데서는 말 이빨이 발견되어 다윈을 당혹스럽게 만들기도 했는데, 그전까지는 말이 16세기가 되어서야 아메리카 대륙으로 건너갔다고 여겨졌기 때문이다. 오웬은 이 말 이빨이 멸종된 남아메리카 종의 것임을 확인하고, 1845년 해당 종의 학명을 '에쿠스 쿠르비덴스'(Equus curvidens)라 명명하였다."
 rapanui.243.g: "화석을 찾아 나서자."
 rapanui.244.t: "스트로마톨라이트"
 rapanui.244.d: "[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]호가 닻을 내린 만에서 학자들이 대규모 스트로마톨라이트 군락을 발견하였다."
 rapanui.244.f: "스트로마톨라이트는 수중 미생물의 성장과 대사 작용으로 퇴적물 입자가 포집되고 결합되거나 용질이 침전되어 형성된, 생물의 기원이 되는 퇴적암이다. 대다수가 층상 구조를 지니며 상당히 미세한 층을 이룬 석회암으로 이루어진 경우가 많다. 스트로마톨라이트 가운데서는 덩이줄기와 기둥 내지는 물결 모양의 층으로 이루어진 껍질 구조 때문에 콜리플라워의 형태를 연상시키기도 한다. 제일 오래된 화석은 대부분 스트로마톨라이트이며 따라서 생명체가 극히 단순한 형태에서 더욱 복잡한 형태로 진화한 과정의 단서를 제공할 수 있다. 스트로마톨라이트는 생물이 만들어낸 최초의 구조물로 평가받고 있으며 그 기원은 이르면 35억년 전 선캄브리아대로 거슬러 올라간다. 호주 서부 필바라 지역의 노스폴 유적에서 발견된 와라우나 지층은 34억 5천만 년 전의 것이다. 지구사의 특정 시기, 산호가 존재하기 훨씬 이전에는 스트로마톨라이트를 만든 생물들이 산호초 형성의 주역이었다. 약 10억년 전까지만 하더라도 스트로마톨라이트는 거의 모든 연안 해역에 널리 분포하였다. 7억년 전부터 스트로마톨라이트의 다양성과 분포도가 떨어지기 시작하였으며, 4억 5천만 년 전부터 지금까지 살아있는 스트로마톨라이트를 보기란 매우 드물다."
 rapanui.244.g: "[concept_dubois_specimen]으로 수집한다."
 rapanui.244.h: "화석을 수집한다."
 rapanui.244.i: "스트로마톨라이트를 연구한다."
 rapanui.245.t: "식물 화석"
 rapanui.245.d: "[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]의 선원들이 절벽면에서 수백만 년 된 양치식물의 흔적을 발견하였다."
 rapanui.245.f: "석탄기(약 3억 6천만~3억년 전)에는 오늘날보다 훨씬 큰 양치류, 보통 나무고사리라 부르는 식물이 속새류, 석송류와 함께 거대한 숲을 이루었으며, 오늘날 대다수 석탄 매장지를 형성하는 토대가 되었다. 지금껏 발견된 것 가운데 가장 오래된 화석은 데본기 전기 (약 4억년 전)으로 거슬러 올라간다. 따라서 양치류는 데본기 후기에 처음 등장한 종자식물보다 오래되었을 가능성이 높다."
 rapanui.245.g: "산업혁명의 초석이로군."
 rapanui.246.t: "호박 목걸이"
 rapanui.246.d: "어느 부족장이 선사시대 곤충이 박혀 있는 유구한 호박 목걸이를 우리에게 팔겠다고 제안해 왔다. 그러나 [SCOPE.sCharacter('rapanui_pacific_expedition_leader').GetLastName] 대장은 이 유물을 어떻게 처분해야 할 지 아직 고민하고 있는 상황이다."
 rapanui.246.f: "현지 부족장의 제안은 뜻밖의 일이었다. 알고보니 그 족장은 이미 [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]호의 항해 소식을 전해듣고 좋은 거래가 되리라 기대했던 것이다. 학자들이 보석을 살펴본 뒤 이것을 어떻게 처리할지에 관한 논쟁이 거세게 일었다. 한쪽은 이것을 통으로 구입해 박물관에 전시하여 곤충 화석이 어떻게 보존되는지 방문객들에게 보여주어야 한다고 주장했다. 다른 한쪽은 보석을 해체하여 각각의 화석을 개별적으로 조사해야 한다고 주장했다. 자연학자와 고생물학자들은 명백히 고생물학적인 이 유물을 어떻게 처분해야 하는가에 관하여 엇갈린 의견을 보였고, 인류학자와 고고학자들도 이 보석이 문화적 가치를 지닌다고 맞섰다. 반면 장교단은 학술적 논쟁을 불필요한 다툼으로 여기고, 무쓸모한 것에 예산을 낭비하지 말고 계속해서 항해해야 한다고 주장했다."
 rapanui.246.g: "그 목걸이는 고생물학계의 몫이다."
 rapanui.246.h: "그 목걸이는 고고학계의 몫이다."
 rapanui.246.i: "목걸이를 부수고 살펴보자."
 rapanui.246.j: "목걸이는 우리와 아무 상관도 없다."
 rapanui.247.t: "호주인의 뼈"
 rapanui.247.d: "#YELLOW [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] 탐사대#!의 선원들이 이른 아침에 놀라운 고생물학 유적지를 발견하였다. 이곳이 뭔가 특별하다는 것은 문외한이라도 충분히 알아차릴 수 있었을 것이다."
 rapanui.247.f: "밖으로 드러난 퇴적층의 화석들이 언뜻 보기에도 놀라운 수준으로 잘 보존되었음을 알 수 있었다. 수많은 출토품 가운데서도 특히 '호주인의 뼈'라는 별칭이 붙은 특이한 유골 하나가 선원들과 나중에 합류한 학자들의 눈길을 사로잡았다. 머지않아 체계적이고 정확한 방식으로 연구를 실시하는 고생물학자가 미숙한 인부들의 손길보다 훨씬 더 많은 것을 알아낼 것이라는 사실이 분명해졌다."
 rapanui.247.g: "[SCOPE.sCharacter('rapanui_scientist').GetLastName] 교수가 발굴해 보는 것이 좋겠군."
 rapanui.247.h: "화석을 최대한 많이 수집하자."
 rapanui.250.t: "자바인"
 rapanui.250.d: "#YELLOW [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] 탐사대#!에 동행한 [SCOPE.sCharacter('rapanui_scientist').GetLastName] 교수가 엄청난 화석을 발견하였다. 백만 년 전에 살았던 선사시대 사람의 골격을 찾아낸 것이다. 과학계에 충격을 일으킬 만한 발견이다!"
 rapanui.250.f: "1891년 외젠 뒤부아가 자바 동부 트리닐 인근의 솔로 강변에서 처음 발견한 화석을 자바인이라 부른다. 현재까지 알려진 바에 따르면 이 화석은 약 100만 년 전의 것으로 추정된다. 유럽 이외의 지역에서 발견된 최초의 영장류 화석이며, 네안데르탈인에 이어 해부학적으로 현생 인류, 즉 호모 사피엔스의 친척 관계에 있는 두번째 화석 증거로 남았다. 자바에서 발견된 화석은 처음에는 안트로포피테쿠스, 나중에는 피테칸트로푸스 에렉투스로 불렸다. 오늘날 대다수 고인류학자들은 이 화석을 호모 에렉투스로 분류하고 있으며, 1940년 프란츠 바이덴라이히의 제안처럼 아종 명칭인 '호모 에렉투스 자바넨시스'로 칭하여 그 기원을 강조하기도 한다. 뒤부아의 발견 이래 50년이 넘은 뒤 인류학자 랄프 폰 쾨니히스발트는 \"이처럼 거대한 충격을 불러일으키고 다양한 과학적 견해가 대립했던 적은 그 어떤 고생물학계의 발견도 뛰어넘을 수 없었던 순간\"이라 회상하였다."
 rapanui.250.g: "이게 바로 잃어버린 고리인가?"
 rapanui.251.t: "값진 유물"
 rapanui.251.d: "외딴 섬의 부족민들을 방문하는 과정에서 오세아니아의 값진 유물을 손에 넣었다."
 rapanui.251.f: "사실 [SCOPE.sCharacter('rapanui_pacific_expedition_leader').GetLastName] 대장은 식량과 식수 보충을 위해 선원들과 잠시 상륙할 생각이었다. 교역로의 변두리에 위치한 이 섬은 외부 세계와의 교류가 거의 없었다. 그러나 섬의 족장은 어떤 오해에서인지 사령관을 왕자로 착각하고 예술적인 나무 조각품을 선물하였다. [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]호의 선원들은 별볼일 없는 유리 구슬을 족장에게 선물하였고, 족장은 몹시 기뻐했다."
 rapanui.251.g: "이건 박물관에 들여야 하겠군."
 rapanui.252.t: "새로운 만 발견"
 rapanui.252.d: "#YELLOW [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] 탐사대#!는 그전까지 섬으로 기록됐던 곳이 사실은 반도에 불과하다는 것을 입증하고 새로운 만을 발견하였다. 허나 이 곳을 어떤 이름으로 부를지는 아직 이견이 남아 있다."
 rapanui.252.f: "1875년 8월 가젤호는 태평양의 비스마르크 제도에 머물면서 뉴브리튼섬(옛 노이포메른섬) 북동쪽의 천연항인 블랑슈 만의 조사에 나섰다. 이때 뉴브리튼섬 동쪽 부분이 반도라는 사실을 알아내고, 이에 따라 탐사선의 이름을 따서 '가젤 반도'라 명명하였다. 이 이름은 오늘날까지도 남아 있다. 또한 뉴아일랜드와 다이얼섬 사이의 해협을 '가젤 해협', 부갱빌섬 서쪽 연안의 천연항을 '가젤항'이라 이름하였다."
 rapanui.252.g: "이곳을 측정한 과학자의 이름을 따서 [SCOPE.sCharacter('rapanui_scientist').GetLastName]만으로 명명한다."
 rapanui.252.h: "우리 국가원수의 이름을 따서 [SCOPE.sCharacter('rapanui_ruler').GetFullName]만으로 명명하는 것이 좋겠다."
 rapanui.252.i: "발견한 사람의 이름을 따서 [SCOPE.sCharacter('rapanui_pacific_expedition_leader').GetLastName]만이라 부르자."
 rapanui.252.j: "탐사대가 영원히 기억될 수 있도록 [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]만이 좋겠다."
 rapanui.253.t: "역관"
 rapanui.253.d: "#YELLOW [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] 탐사대#!가 훌륭한 정박지를 찾아냈다."
 rapanui.253.f: "탐사대가 만에 들어서자 [SCOPE.sCharacter('rapanui_pacific_expedition_leader').GetLastName] 사령관은 이곳이라면 장차 탐사나 무역 사업을 벌일 만큼 안전한 입지를 지니고 있다는 것을 알아차렸다. 이후 연안 지대를 탐사한 끝에 비옥한 토양으로 농작물 재배에 적합할 뿐만 아니라 기후도 쾌적하다는 것을 확인하였다. 상업 고문들은 이 지역을 [ROOT.GetCountry.GetNameNoFlag]에 터놓을 수 있도록 지금 바로 모든 노력을 기울여야 한다는 주장을 내세웠다. 반면 학자들은 그러한 제국주의적 행태로 과학 연구가 소홀해질 수 있다고 맞섰다."
 rapanui.253.g: "역관을 세우자."
 rapanui.253.h: "지도에 기록만 해두자."
 rapanui.254.t: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]로의 선교?"
 rapanui.254.d_cat: "[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]호의 사제로 나선 [SCOPE.sCharacter('rapanui_missionary_scope').GetLastName] 신부가 [SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]의 원주민들이 예수 그리스도를 접해본 적이 없다는 사실을 알게 되었다. 이에 하선하여 원주민들을 가톨릭교 신앙으로 개종시킬 수 있게 해 달라고 허락을 구하였다."
 rapanui.254.d_pro: "[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]호의 사제로 나선 [SCOPE.sCharacter('rapanui_missionary_scope').GetFullName] 목사가 [SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]의 원주민들이 예수 그리스도를 접해본 적이 없다는 사실을 알게 되었다. 이에 하선하여 원주민들을 개신교 신앙으로 개종시킬 수 있게 해 달라고 허락을 구하였다."
 rapanui.254.f: "최근 몇몇 상인들이 탐사선에 올라 현지 소식을 전하고 탐사대의 물품을 보충해 주었다. 이들과의 대화 주제는 이 지역의 기독교 문화와 이교도 문화에 관한 것으로 흘러갔다. 탐사선의 사제는 이야기에 집중하다 동포들이 아직 이 지역에 발을 들이지 못했다는 사실에 놀랐다. 섬에서 빈번하게 벌어지는 식인을 향한 공포 탓에 신자들이 최근 몇 년 간 상륙을 꺼린 탓이다."
 rapanui.254.g_cat: "바데 쿰 데오 (신과 함께 가시오)."
 rapanui.254.g_pro: "신과 함께 가시오."
 rapanui.254.h: "그건 너무 위험하오!"
 rapanui.255.t: "적대적인 반응"
 rapanui.255.d: "[SCOPE.sCountry('rapanui_hostile_country').GetNameNoFlag]에 방문했던 것은 사실 우호적 태도를 잘 보이고 국제적인 위신도 높이려는 의도였다. 하지만 아쉽게도 상대방은 우리의 의도를 거의 알아채지 못했다."
 rapanui.255.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]호에 승선한 영사는 [SCOPE.sCharacter('rapanui_pacific_expedition_leader').GetFullName] 대장을 잠시 만나 현지 통치자에게 대표로 나설 것을 권했다. 그런데 대장은 현지 관습을 제대로 파악하지 못한 모양이다. 자기도 모르게 그 나라의 고위 관리들을 모욕했던 것이다. 사실 우리 사절단이 대체 무엇을 잘못했는지조차 알 수 없다. 뭔가 심각한 실수를 저질렀던 모양이다."
 rapanui.255.g: "우리가 바로잡아야 할 큰 실례다."
 rapanui.255.h: "대장이 책임을 지시오."
 rapanui.255.i: "우리는 아무것도 사과할 필요가 없다."
 rapanui.256.t: "진주 잠수부"
 rapanui.256.d: "#YELLOW [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] 탐사대#!가 항해 도중 평화로운 작은 마을을 발견하였다. 그곳에서는 귀한 진주를 채취하며 생계를 유지하고 있었다. 온 선원들이 그곳의 풍경과 넘쳐나는 진주에 매혹되었다."
 rapanui.256.f: "[SCOPE.sCharacter('rapanui_pacific_expedition_leader').GetLastName] 대장은 지금 다다른 어촌 마을이 남태평양 최고의 진주 잠수부들이 바다 깊은 곳에서 제일 아름다운 보석을 건져 올리며, 인근 섬에서 큰 명성을 이미 떨치고 있다는 사실을 알게 되었다. 마을 사람들은 가난하지만 정직하고 무역 활동은 거의 나서지 않는 듯했다. [SCOPE.sCharacter('rapanui_pacific_expedition_leader').GetLastName] 대장은 마을 사람들과 거래하여 [ROOT.GetCountry.GetNameNoFlag]에도 진주를 수입할 수 있도록 하는 것이 어떻겠느냐고 제안하였다. 그러나 탐험선에 동승한 일부 장교들과 어디로 튈지 모를 선원들은 우리 배가 무장과 화력이 충분하니, 마땅히 우리 것이어야 할 것을 손쉽게 탈환할 수 있을 것이라 목소리를 높였다."
 rapanui.256.g: "조그마한 무역로를 구축한다."
 rapanui.256.h: "박물학자가 이곳을 조사하는 것이 좋겠다."
 rapanui.256.i: "저 진주들은 우리 것이다."
 rapanui.257.t: "외교 사절단"
 rapanui.257.d: "[SCOPE.sCountry('rapanui_friendly_country').GetNameNoFlag] 대표단과의 만남은 대성공이었다. [SCOPE.sCharacter('rapanui_pacific_expedition_leader').GetLastName] 대장은 때맞춰 화제를 이끌어냈고 모두가 귀를 기울여 주었다."
 rapanui.257.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]호 함장은 차가운 원숭이 뇌 요리를 대접받은 뒤, 바닷일 뿐만 아니라 대인관계에 있어서도 뛰어난 수완을 보여주었다. 외교 회담에서의 통상적인 담소를 나눈 [SCOPE.sCountry('rapanui_friendly_country').GetNameNoFlag] 사절단은 대장의 정중한 모습에 경탄했다. [ROOT.GetCountry.GetNameNoFlag](은)는 이번 기회를 통해 국제적인 명성을 쌓을 것이 틀림없다."
 rapanui.257.g: "우리에게 평화적 의도가 있음을 강조하자."
 rapanui.257.h: "함장을 칭찬하자."
 rapanui.260.t: "지구 한 바퀴"
 rapanui.260.d: "[SCOPE.sCharacter('rapanui_pacific_expedition_leader').GetFullName] 대장이 [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]호를 타고 지구 한 바퀴를 항해하였다!"
 rapanui.260.f: "세계 일주에 나섰던 유명 탐사대도 많았으며, 그렇게 하는 것이 소요 시간도 짧고 효율적인 경우가 대다수였다. 대표적인 사례로는 비글호와 챌린저호 (영국), 노바라호 (오스트리아), 가첼호 (프로이센), 갈라테아호 (덴마크)가 있었다."
 rapanui.260.g: "전 세계를 한아름에!"
 rapanui.261.t: "한층 더 정확해진 지도"
 rapanui.261.d: "[SCOPE.sCharacter('rapanui_scientist').GetLastName](이)가 연구원으로 #YELLOW [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] 탐사대#!에 승선하여 과거 지도 제작 과정에서 저지른 측정 오류를 바로잡으면서 지도 자료를 크게 개선하였다."
 rapanui.261.f: "19세기의 지도는 이전 세기의 지도보다 훨씬 발전했지만, 오류가 전혀 없었던 것은 아니었다. 존재하지 않는 섬이 그려져 있거나 미지의 섬이 누락되는 경우가 빈번했던 것이다. 20세기 초까지도 태평양의 일부 지역은 여전히 ​완벽하지 못하거나 잘못 그려진 경우가 있었다. 1937년 아멜리아 이어하트 비행사의 실종 역시, 원래 목표로 삼았던 하울랜드 제도의 위치가 지도에 잘못 표시되어 있었기 때문이라는 설도 존재한다."
 rapanui.261.g: "잘 했소."
 rapanui.262.t: "거리 정정"
 rapanui.262.d: "#YELLOW [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] 탐사대#!에 동승한 학자 [SCOPE.sCharacter('rapanui_scientist').GetLastName](이)가 지도를 수정하는 과정에서 기존에 표시된 거리가 잘못되었다는 사실을 알아냈다. 이에 따라 지도 자료를 갱신할 예정이다."
 rapanui.262.f: "기술 조건의 향상과 과학 탐사의 신속한 진행으로 거리 측정의 최소 정확도가 상당히 개선될 수 있었다. 제임스 쿡의 마지막 항해 이후, 남극과 북극을 제외하고는 발견할 것이 거의 없었다는 것이 통설이다. 그러나 이러한 발견들이 서로 어떻게 연관되는지는 언제나 명확하지 않았다. 세계 경제의 흐름에 빠듯한 일정과 마감일이 생겨나면서, 대략적인 측정을 넘어서 아주 정확한 측정을 하는 것이 갈수록 중요해진 것이다."
 rapanui.263.t: "이국의 씨앗"
 rapanui.263.d: "#YELLOW [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] 탐사대#!의 [SCOPE.sCharacter('rapanui_scientist').GetLastName] 교수가 상륙 중에 상당한 과학적, 농업적 이득을 가져다줄 것으로 보이는 특별한 씨앗들을 발견하였다."
 rapanui.263.f: "태평양과 동아시아의 종자를 발견하고 실어 오는 일은 그리 흔한 일이 아니었다. 반란 사태로 유명한 1789년 바운티 탐사대의 진짜 목적은 카리브해에서 재배할 빵나무 묘목을 채집하는 것이었다. 빵나무를 값싼 주식으로 삼아 농장 인부들이 기아에 빠지지 않도록 하리라는 기대에 따른 것이었다. 그러나 19세기에 들어서면서 식물 채집과 과학 연구라는 목적이 더해지게 되었다."
 rapanui.263.g: "이 씨앗이라면 과학 수집품에 큰 보탬이 되겠군."
 rapanui.263.h: "이런 새로운 종자라면 농업에 유용하게 쓰일 수 있겠어."
 rapanui.264.t: "신종 딱정벌레"
 rapanui.264.d: "[SCOPE.sCharacter('rapanui_scientist').GetLastName] 교수는 섬에서 신종 딱정벌레를 발견하여 자신의 이름을 붙였다. 벌레 자체는 대단히 혐오스럽게 생겼지만, 교수에게 있어서는 인생 최고의 날이라 할 수 있다."
 rapanui.264.f: "언젠가 못생기고 끈적거리고 역겨운 벌레에 자기 이름을 붙이고, 본인 성씨로 영원히 불리게 된다는데 누가 그걸 마다하겠소?"
 rapanui.264.g: "축하...드리오."
 rapanui.265.t: "작은 지층"
 rapanui.265.d: "해안 탐사 도중 [SCOPE.sCharacter('rapanui_scientist').GetLastName] 박사가 엄청난 양의 화석이 묻혀 있는 자그마한 누층을 발견하였다. 이 퇴적층은 아직 어떤 지도에도 표시되어 있지 않다."
 rapanui.265.f: "\"이와 관련하여 훨씬 더 심각한 어려움이 또 있다. 바로 동물계의 주요 군에 속하는 여러 종들이, 지금껏 알려진 최하위 지층의 화석 암석에서 갑자기 나타나는 현상이다. (중략) 이 현상은 현재로서는 설명이 전혀 불가능하며, (진화론적) 견해에 대한 타당한 반론으로 충분히 제시될 수 있다.\" - 찰스 다윈"
 rapanui.265.g: "화석은 아무리 많아도 부족하지 않지."
 rapanui.266.t: "콤포시타"
 rapanui.266.d: "[SCOPE.sCharacter('rapanui_scientist').GetLastName] 교수가 기쁨을 감추지 못하고 있다. 후기 데본기의 희귀한 화석인 콤포시타를 손에 넣었기 때문이다. 이것으로 교수가 지금껏 발견한 가장 오래된 생명체를 입수한 것이다!"
 rapanui.266.f: "콤포시타는 후기 데본기부터 후기 페름기까지 살았던, 지금은 멸종한 완족류의 한 속이다. 콤포시타는 남극 대륙을 제외한 전 대륙에 서식하며 전세계적으로 분포하였다. 콤포시타는 매끄러운 껍데기에 주름과 홈이 뚜렷하고, 육경 강판에 육경이 동그랗게 나 있는 것이 특징이다. 콤포시타는 아티리디다이과(Athyrididae)의 스피리게렐리니아과 (Spirigerellinae)에 속한다. 이처럼 유서 깊은 화석을 단순히 껍데기로 알아보는 사람은 교양이 없다고 할 수 있다."
 rapanui.266.g: "그거 참...신나는 소식이군."
 rapanui.267.t: "남반구의 밤하늘"
 rapanui.267.d: "[concept_verrier_astronomer] [SCOPE.sCharacter('rapanui_scientist').GetFullName](은)는 [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]호를 타고 남반구의 밤하늘을 대대적으로 관측하고 있다. 이곳에서 북반구에서는 거의 볼 수 없었던 현상들을 관찰할 수 있기 때문이다."
 rapanui.267.f: "남반구에서는 북반구보다 별이 약간 더 많다. 이는 은하수의 중심이 적도에서 남쪽으로 약 20° 떨어진 궁수자리에 위치하기 때문이다. 시야가 좋을 경우 남반구에서 맨눈으로 볼 수 있는 고정별의 수는 2,000개 이상이며, 쌍안경으로 관측한다면 20,000~40,000개에 달하게 된다. 적도에서는 연중 어느 때나 밤낮으로 남반구과 북반구 밤하늘의 절반씩을 정확히 볼 수 있지만, 남아프리카나 호주처럼 남위도가 높은 지역에서는 남쪽 하늘의 약 3분의 2를 언제나 볼 수 있고, 남미 최남단에서는 80% 이상을 볼 수 있다."
 rapanui.268.t: "일식"
 rapanui.268.d: "[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] 호에 오른 동반 과학자 [SCOPE.sCharacter('rapanui_scientist').GetFullName](이)가 일식을 경험하는 특별한 기회를 가지고 대대적인 천문학 연구를 수행할 수 있었다!"
 rapanui.268.f: "19세기 중반 일부 산업화 국가의 천문학회를 중심으로 일식을 관측하기 위해 더 먼 대륙으로 탐사대를 파견하기 시작하였다. 주요 관심사는 코로나의 관측이었다. 프랑스 천문학자 쥘 장상은 1868년 8월 18일 인도에서 벌어진 완전 개기일식을 관측하면서 헬륨의 존재 가능성을 시사하는 단서를 확보하였다. 1919년 5월 29일 아프리카 프린시페섬에서 벌어진 개기일식은 아서 스탠리 에딩턴이 이끄는 탐사대가 관측하였는데, 알베르트 아인슈타인이 수년 전 제시한 상대성 이론과 관련해 특히 주목을 받았다. 아인슈타인의 상대성 이론은 태양의 중력장에 의해 멀리 떨어진 별빛이 휘어질 것이라 예측하였는데, 일식 관측 결과로 그것이 뒷받침되었기 때문이다."
 rapanui.268.g: "아주 잘 했소!"
 rapanui_avantgarde_navy_modifier: "선진 해군"
 rapanui.300.t: "한 시대를 보내며"
 rapanui.300.d: "전 세계를 누빌 수 있는 현대식 선박의 개발로 태평양 연구 탐사는 더 이상 특별히 나서는 것이 아니라 일상적인 활동이 되었다. 한때 접근하기도 어려웠던 태평양 지역에서 발견할 수 있는 모든 것은 다 찾고 기록으로 남겼다고 보는 학자들도 존재한다."
 rapanui.300.f: "항해와 탐사의 시대가 마침내 저물었다. 제국주의와 식민주의의 성취, 그리고 국제 경제와 범지구적 통신의 상호 연결이 더욱 긴밀해지면서 태평양은 이제 지구상에 널린 지역 중 하나로 비춰지게 되었다. 세계 반대편으로 가는 것은 더 이상 모험이 아니라 시간 문제일 뿐이다. 인류는 모든 것을 탐사한 듯한 시대로 진입하였으며, 남태평양 지역조차 이국적인 휴양지로서의 오랜 매력을 잃어버리고 말았다."
 rapanui.300.g: "더 이상 발견할 것은 없다."
 rapanui.1001.t: "이스터섬의 비밀"
 rapanui.1001.d: "우리나라의 조사선 중 하나가 이스터섬에 정박하였다. 지도 제작자를 꿈꾸는 [SCOPE.sCharacter('rapanui_adventurer_scope').GetFullName](은)는 이스터섬의 사라진 문화에 관심을 가졌다."
 rapanui.1001.f: "언뜻 보기에 이스터섬(부활절 섬)이라는 세례명이 붙은 이 섬만큼이나 황량한 곳은 드물어 보였다. 현지인들 사이에서는 라파누이라는 이름으로 알려진 이 섬은 오랜 옛날에 산림이 자취를 감췄고 과일이나 곡식은 귀한 실정이었다. 화산 분화구가 섬 위로 우뚝 솟아 있는 이스터섬은 미지의 영역이지만 위대한 과거를 간직하는 듯했다. 현지 주민들은 거인의 어깨 위에서 사는 것이 꼭 이집트의 농민들을 닮았다. 야심찬 모험가 [SCOPE.sCharacter('rapanui_adventurer_scope').GetFullName](은)는 세상 끝에 위치한 이 섬에 무언가 숨겨져 있을 거라 굳게 믿었다. 해안가에 상륙한 그는 계획 실현을 위해 남자들을 불러모았다."
 rapanui.1001.g: "정말이지 영문 모를 곳이야..."
 rapanui.1002.t: "라파누이"
 rapanui.1002.d: "이스터섬의 내부 탐사에 나선 선원들은 현지의 라파누이 부족으로부터 환대를 받았다."
 rapanui.1002.f: "자신들을 라파누이라 칭하는 이 원주민들은 동부 폴리네시아 일대에서 쓰이는 언어와 매우 흡사한 언어를 사용한다. 이스터섬은 폴리네시아의 나머지 외딴 섬들보다 미국 본토에 더 가까이 위치해 있지만, 선원들은 원주민들이 수백 년 전에 오세아니아 지역에서 건너온 것이 분명하다는 사실을 이해하고 있었다. 원주민들은 환대와 함께 선장 일행을 식사 자리에 초대했다. 그러나 이 작은 탐사대의 일부 대원들은 숨겨진 보물을 정말로 찾고 싶다면 저들을 피해야 한다고 경고하고 나섰다."
 rapanui.1002.g: "저들의 친절한 초대에 응하겠다."
 rapanui.1002.h: "저런 야만인들은 믿을 게 못 된다."
 rapanui.1011.t: "의식의 춤"
 rapanui.1011.d: "[SCOPE.sCharacter('rapanui_adventurer_scope').GetFullName] 일행은 이스터섬의 라파누이 사람들과 함께 작은 시간을 보내고 있다."
 rapanui.1011.f: "이스터섬에는 수많은 미스터리가 남아 있다. 현지인들과 식사를 나누는 동안 선장 일행은 라파누이 사람들의 역사와 종교에 대한 단편적인 정보만 얻어갈 수 있었다. 부족민들의 경쟁과 새알 획득을 목표로 해마다 시합이 열리는데, 라파누이 사람들은 이를 가장 중요한 의식으로 여긴다고 한다. 이는 그들의 주신인 마케마케와 밀접한 관련이 있다. [SCOPE.sCharacter('rapanui_adventurer_scope').GetLastName](은)는 모임 도중에 새 인간과 마케마케를 묘사한 암각화를 자세히 살펴볼 기회를 얻었다. 그곳에서 원주민들조차 더 이상 그 뜻을 알아볼 수 없는 문자를 발견하고, 스스로도 잘 알지 못하는 과거를 섬 주민들이 간직하고 있을지도 모른다는 의심이 들게 되었다."
 rapanui.1011.g: "저들이 그렇게나 말하는 이 새 인간이란 것은 도대체 무엇인가?"
 rapanui.1021.t: "모아이 하바"
 rapanui.1021.d: "라파누이 사람들과 여러 날을 보낸 [SCOPE.sCharacter('rapanui_adventurer_scope').GetFullName](과)와 선원들이 심상치 않은 발견을 이뤄냈다."
 rapanui.1021.f: "알고 보니 라파누이 사람들은 원시적인 새 인간 숭배보다 훨씬 더 풍부한 유산을 소유하고 있었다. [SCOPE.sCharacter('rapanui_adventurer_scope').GetLastName](은)는 여러 지역 부족민이 모이던 장소로 보이는 오래된 광장을 둘러보다 지면에 튀어나온 현무암 조각상 받침대를 발견했다. 이 조각상은 곧 모아이 석상으로 드러났다. 모아이 석상은 조상의 살아있는 얼굴을 담았다고 전해진다. 조각상은 손상된 상태이지만 우리 일행이 조국의 박물관으로 가져갈 수 있다면 대단히 귀중한 가치를 지니게 될 지도 모른다. 다만 그것을 어떻게 해낼지, 또 과연 가능할지는 아직 불확실한 상황이다."
 rapanui.1021.g: "원주민들이 알아채기 전에 유물을 나라 밖으로 빼돌려야겠군..."
 rapanui.1021.h: "우리가 유물을 가져가겠다고 라파누이 사람들을 설득해 보자."
 rapanui.1021.i: "우린 다른 민족의 유산을 훔칠 것이 아니라 존중을 표해야 한다."
 rapanui.1022.t: "모아이 하바의 도둑"
 rapanui.1022.d: "이스터섬에 있던 우리 선원들이 모아이 석상을 배에 싣는 것까지는 성공했으나, 현지인들이 도난 사실을 알아차리고 말았다. 선원들은 서둘러 도망쳐야 했다!"
 rapanui.1022.f: "그것은 말하자면 첩보 작전이었다. [SCOPE.sCharacter('rapanui_adventurer_scope').GetFullName](은)는 작전을 최대한 비밀리에 진행하기 위해 모든 노력을 기울였으나, 선원들의 기강 부족으로 경계 근무를 서던 선원이 잠에 들고 말았다. 원주민들은 사람들이 모아이 석상을 땅 속에서 파내는 모습을 언덕 위에서 지켜보게 되었다. 석상이 지면에서 완전히 뽑혔다고 생각한 그 순간, 원주민들이 먼 곳에서 들이닥치기 시작했다. 선원 일행은 어쩔 수 없이 최대한 빨리 도망치게 되었다."
 rapanui.1022.g: "어서, 집으로 가져가자!"
 rapanui.1023.t: "모아이 하바 확보"
 rapanui.1023.d: "[SCOPE.sCharacter('rapanui_adventurer_scope').GetFullName]의 뛰어난 능력 덕분에 우리 이스터섬 탐사대는 누구도 모르게 거대 모아이 석상을 배에 실을 수 있었다."
 rapanui.1023.f: "[SCOPE.sCharacter('rapanui_adventurer_scope').GetFullName](은)는 모아이 석상을 옮기면서 최대한 눈에 띄지 않도록 온 노력을 기울였다. 밤중에 희미한 등불을 켜고 땅을 파서, 지역 주민들이 땅속을 파고 들어가 석상을 들어올리는 것을 알아채지 못하도록 했다. 해가 뜰 무렵, 모아이 석상은 이미 배 위로 무사히 옮겨져 칠레산 구아노 더미 아래에 실렸다."
 rapanui.1023.g: "완벽해."
 rapanui.1024.t: "친구들의 작은 도움"
 rapanui.1024.d: "라파누이 사람들은 우리의 요청에 회의적이었지만, 설득 끝에 모아이 하바 상을 우리 배로 싣게 할 수 있었다."
 rapanui.1024.f: "쉽지 않은 대화였지만 결국 [SCOPE.sCharacter('rapanui_adventurer_scope').GetFullName](이)가 현지인들을 설득하여 모아이 석상을 파내고 운반하는 데 도움을 받을 수 있었다. 그러나 라파누이 사람들의 허락을 구하고 본인의 계획을 실행할 수 있었던 것은 우선 그들의 신뢰를 얻은 뒤에야 가능한 일이었다. 그 대가로 [SCOPE.sCharacter('rapanui_adventurer_scope').GetLastName](은)는 배에 실린 귀중한 보물들을 현지인들에게 선물로 주었다. 이를테면 값비싼 유리 구슬, 낡은 카드 두 벌, 닳은 부분이 전혀 없는 솜브레로 모자 등이 있었다."
 rapanui.1025.t: "시간 낭비"
 rapanui.1025.d: "이스터섬에서 유물을 더 많이 찾아내기 위해 큰 노력을 기울였음에도 선원들은 탐사를 포기할 수밖에 없었다."
 rapanui.1025.f: "이스터섬보다 척박한 곳은 아마 얼마 되지 않을 것이다. 바위와 풀 아니면 있는 게 거의 없다. 이렇게 이해하기 힘든 여건에도 수천 명의 사람들이 거주하고 있다는 점에서 이스터섬은  그 자체로 독특하다. [SCOPE.sCharacter('rapanui_adventurer_scope').GetLastName](은)는 저들이 자초했을지도 모른다고 생각했다. 나무를 전부 베어내고 동물들을 죽였을지 모른다는 것이다. 이 곳에서 보내는 시간은 매 순간이 낭비다."
 rapanui.1025.g: "이 섬에 특별한 무언가가 없다는 게 사실인가?"
 rapanui.1026.t: "모아이 호아 하카나나이아"
 rapanui.1026.d: "이스터섬 탐사에 나선 선원들은 근사한 모아이상을 찾아냈다. 땅속에 반쯤 묻혀 있지만 그 만듦새는 대단히 뛰어났다."
 rapanui.1026.f: "참 정교한 유물이군, 하고 [SCOPE.sCharacter('rapanui_adventurer_scope').GetFullName](은)는 모아이를 처음 마주하며 생각했다. 석상은 거의 알아볼 수 없었지만 보이는 부분으로도 이 섬에 있었던 완전히 다른 시대가를 머릿속에 그려볼 수 있게 했다. 그것은 암각화가 문화의 정점이나 샤머니즘 의식과 경쟁의 중심이 아니었던 시대, 오히려 인상적인 석상을 만들고 명확한 형상을 조각할 수 있는 문화가 존재했던 시대였던 것이다. [SCOPE.sCharacter('rapanui_adventurer_scope').GetLastName](은)는 학자도 예술감정가도 아니었지만 역사 감각은 있었다. 모아이 석상의 움푹 들어간 눈이 그를 응시하는 순간, 역사를 들여다보게 된 것이다. 이제 남은 유일한 질문은, 어떻게 이 역사를 고국으로 가져갈 수 있을까 하는 것이었다."
 rapanui.1026.g: "선원들을 동원하여 모아이를 파낸다."
 rapanui.1026.h: "현지인들에게 석상을 파내달라고 부탁해 본다."
 rapanui.1026.i: "석상을 두고 간다."
 rapanui.1027.t: "라파누이 사람들과의 갈등"
 rapanui.1027.d: "라파누이 사람들에게 도움을 청한 것이 역효과를 불러왔다. 언제까지 너그러이 받아줄 것인지를 시험하고 있다고 생각한 모양인지, 이제는 섬을 떠나라고 밝혀온 것이다!"
 rapanui.1027.f: "현지인들의 신뢰를 얻으려던 그간의 시도는 우리가 처음 생각했던 것보다 별로 보탬이 되지 않았던 모양이다. 라파누이 원로들은 우리가 선의로 값싼 유리 구슬을 건넸던 시도가 한 번은 통할지 몰라도 두 번은 안 될 거라 생각하는 듯하다. 어떤 할머니는 우리가 예전에 현지인들의 마음을 얻으려고 건넸던 낡은 솜브레로 모자를 [SCOPE.sCharacter('rapanui_adventurer_scope').GetLastName]의 발치에 던지기도 했다. 이런 행동은 전쟁 선포의 상징이었을 것이다. 우리가 그 자리에서 떠나지 않는다면 말이다."
 rapanui.1027.g: "저들의 문화에 관심이 생겼을 따름인데... 왜 저렇게 심술이 난 건가?"
 rapanui.1028.t: "모아이 석상 파괴!"
 rapanui.1028.d: "안타깝게도 모아이 석상 출토 작업은 참담한 결과를 낳았다. 선원들이 석상을 땅 속에서 꺼내는 게 아니라 복구 못할 수준으로 망가뜨려 버렸다."
 rapanui.1028.f: "의도치 않았다면 고고학적 반달리즘은 아니다. 그렇게들 말한다."
 rapanui.1028.g: "고고학과 예술의 큰 손실이구나."
 rapanui.1029.t: "현지인들의 도움!"
 rapanui.1029.d: "라파누이 사람들이 모아이 석상 출토를 돕겠다고 나섰다."
 rapanui.1029.f: "낡은 크리켓 배트와 살구잼 한 병이 때로는 놀라운 결과를 만들어내는 법이다. 물론 이 둘을 어떻게 조합해야 하는지 안다면 말이다."
 rapanui.1029.g: "기대도 안 하고 있었는데 놀랍군."
 rapanui.1041.t: "새 인간의 섬"
 rapanui.1041.d: "[SCOPE.sCharacter('rapanui_adventurer_scope').GetFullName](은)는 이스터섬을 직접 탐사해 보기로 결정을 내렸다. 현지인들은 이득보다는 문제를 더 일으킬 수 있다."
 rapanui.1041.f: "[SCOPE.sCharacter('rapanui_adventurer_scope').GetLastName](은)는 이스터섬을 혼자서 탐험하기로 한 결정이 옳았음을 증명했다. 이 섬에 귀중한 것이 있다면 라파누이 사람들의 반발을 누르고 얻어내야 할 것이라고 짐작하였다. 그것은 근거 없는 짐작이 아니기도 했다. 지금까지 탐사대는 새 인간 형상이 크게 새겨진, 기묘한 표시와 상징로 가득한 영문 모를 암각화 바위들만 발견하였다. 하지만 지도 담당은 훨씬 더 값진 보물이 자신들을 기다리고 있을 것이라고 확신하였다."
 rapanui.1041.g: "이것으로 탐사의 성공 여부가 확실히 보장될 것이다."
 rapanui.1042.t: "모아이 하바"
 rapanui.1042.d: "며칠 간의 수색 끝에 [SCOPE.sCharacter('rapanui_adventurer_scope').GetFullName](이)가 엄청난 발견을 이뤄냈다."
 rapanui.1042.f: "라파누이 사람들이 정말로 원시적인 새 인간 숭배보다 훨씬 더 큰 유산을 갖고 있었다. 여러 지역의 부족들이 모이던 장소로 보이는 오래된 터를 둘러보던 중, [SCOPE.sCharacter('rapanui_adventurer_scope').GetLastName](은)는 현무암 조각상의 받침대가 땅 속에서 튀어나온 것을 발견했다. 석상은 손상되었지만 조국의 박물관으로 가져갈 수만 있다면 엄청난 가치를 지니게 될 수도 있다. 하지만 그것을 어떻게, 그리고 과연 가능할지는 아직 불확실하다."
 rapanui.1042.g: "석상을 배에 싣고 섬을 떠난다."
 rapanui.1042.h: "계속해서 섬을 탐사한다."
 rapanui.1043.t: "[SCOPE.sCharacter('rapanui_adventurer_scope').GetFullName]의 죽음"
 rapanui.1043.d: "폴리네시아 유물을 찾는 것은 완전히 쓸모없는 것으로 드러났을 뿐만 아니라, 척박한 섬의 고난은 사람과 물자 모두에게 문제를 일으켰다."
 rapanui.1043.f: "원주민의 도움을 포기하고 아무런 성과도 없이 보물을 계속 찾아 나서기로 한 결정, 그리고 처음에 세운 모든 계획은 돌이켜보면 재앙으로 귀결되고 말았다. 불과 며칠 사이에 식수와 식량이 동나고 병에 걸리기 쉬워지게 된 것이다. [SCOPE.sCharacter('rapanui_adventurer_scope').GetLastName]도 원인을 알 수 없는 병에 걸려, 어느 날 아침 사망한 모습으로 발견됐다. 일행은 그를 이곳에 묻어주고, 이제는 귀신이 나올 이 섬을 떠나 탐사선으로 돌아갔다."
 rapanui.1043.g: "이제 남은 것은 이 무의미한 탐사를 중단하는 것 뿐이다."
 rapanui.1050.t: "라파누이의 모아이상"
 rapanui.1050.d: "[SCOPE.sCharacter('rapanui_adventurer_scope').GetFullName](이)가 이끄는 용감한 일행의 이스터섬 탐험이 예상치 못한 성과와 함께 마무리되었다. 귀중한 오세아니아 유물 두 점이 [ROOT.GetCountry.GetNameNoFlag]의 귀국길에 함께 올랐다. 이들이 명예와 영광을 받을 자격이 있다는 것은 이미 명백한 사실이다."
 rapanui.1050.f: "\"저 원시적인 두상은\n야심차게 거대한데\n그 예술은 투박해서\n손쉽게 읽을 수 있네\n과거에서 온 고통을\n마치 임상 도표처럼.\n오직 단 한가지라면\n경멸하듯이 말려 든\n입술의 성공 덕분에\n그리 무거운 석상이\n배에 실려 찾아왔네\" - 로버트 프로스트"
 rapanui.1050.g: "두 모아이 석상 모두 박물관에 모셔야 한다!"
 rapanui.1051.t: "모아이 하바 석상과 함께 귀국하다"
 rapanui.1051.d: "[SCOPE.sCharacter('rapanui_adventurer_scope').GetFullName](은)는 자신의 명성을 널리 떨친 사람이 되었다. 사람이 살기 힘든 이스터섬에서 희귀한 모아이 석상을 발견하고, 배 위에서 [SCOPE.sCharacter('rapanui_ruler').GetFullName] [SCOPE.sCharacter('rapanui_ruler').GetPrimaryRoleTitle]에게 바치겠노라고 공언하였다. 선원들의 급여도 인상되었지만 [SCOPE.sCharacter('rapanui_adventurer_scope').GetLastName] 본인은 향후 계획을 고민하고 있다."
 rapanui.1051.f: "이스터섬에서의 역경을 어떻게 보든 간에 이번 모험은 성공적이었다. 고국에서는 벌써부터 이 대담한 모험가가 이국적인 예술품으로 국가의 격을 높였다는 이야기가 화제가 되고 있다. 어떤 이들에게는 절도 행위일지 모르겠지만 다른 이들에게는 소설의 소재로 삼을 만한 이야기다."
 rapanui.1051.g: "이제 이스터섬의 비밀은 밝혀진 것인가?"
 rapanui.1052.t: "라파누이라는 안식처"
 rapanui.1052.d: "[SCOPE.sCharacter('rapanui_adventurer_scope').GetFullName](은)는 모험 과정에서 현지인들과 친분을 쌓고 그들의 풍습과 역사, 비밀을 전해 듣는 관계에 이르렀다. 이제는 이스터섬 연구 분야의 전문가로 인정받고 있다."
 rapanui.1052.f: "바다로 돌아온 [SCOPE.sCharacter('rapanui_adventurer_scope').GetLastName](은)는 이스터섬에서의 사건을 되돌아본다. 내가 아닌 다른 사람이었다면 더욱 무모하게 행동했을지 모를 일이다. 본인의 출세를 위해 희귀 유물을 강탈했을지도 모르고, 원주민에 대한 무지와 멸시로 죽음을 맞이했을지도 모를 일이다. 섬에서 희귀한 보물 그 이상의 것을 얻었다고 생각하는 나 자신이었다. 현지인들이 감사를 표한 것이 그 이유였다. 이제 그들의 역사를 알고 있다. 선사 시대의 살아 있는 문화가 모습을 드러낸 것이다. 이제부터 나는 이 분야에 전념할 것이다."
 rapanui.1052.g: "이것으로 학자의 길을 걷게 된 것인가?"
 rapanui.1053.t: "남은 것은 파편 뿐"
 rapanui.1053.d: "[SCOPE.sCharacter('rapanui_adventurer_scope').GetFullName]의 이스터섬 모험은 상당히 안타까운 반전으로 실망스러운 결말을 맞이했다. 그러나 모든 것이 헛된 것은 아니었다."
 rapanui.1053.f: "돛을 펴고 뱃머리를 고국으로 돌리면서 [SCOPE.sCharacter('rapanui_adventurer_scope').GetLastName](은)는 한때 모아이 석상을 이루었던 파편들을 손에 쥐었다. 당연히 그가 바랐던 귀향은 이런 모습이 아니었다. 비록 유물을 가져오지는 못하지만, 이번 여정에서 무언가를 배웠다는 사실에는 변함이 없었다."
 rapanui.1053.g: "별은 뜨고 지는 법이다."
 rapanui.1054.t: "이스터섬과의 씁슬한 작별"
 rapanui.1054.d: "석양 빛에 모아이 석상의 실루엣이 빛난다. 그 순간 [SCOPE.sCharacter('rapanui_adventurer_scope').GetFullName](은)는 한때 또다른 모아이 석상이었을 돌멩이들을 문질러 본다. 그리고는 눈앞의 바다를 바라본다."
 rapanui.1054.f: "잃은 것을 슬퍼해야 할까, 아니면 챙긴 것에 만족해야 할까. [SCOPE.sCharacter('rapanui_adventurer_scope').GetLastName]의 마음 속에 성취의 그림자가 드리워진다. 선원들은 선장을 위로하려 하지만, 완벽한 결말이었다면 달랐을 것이란 생각을 떨칠 수가 없다. 마음 속의 결심은 더욱 굳어져 간다. 다시는 안 돼! 그는 이번 경험에서 교훈을 얻을 것이다. 다음에는 이런 일이 벌어지지 않도록 할 것이다. 지금의 경험은 사건들을 정리하기로 한 결심을 한층 확고히 한다. 어쩌면 이번 탐험이 마지막이 아닐지도 모른다."
 rapanui.1054.g: "모아이 석상이 하나라도 없는 것보다 낫다."
 rapanui.1055.t: "피로 물든 성공"
 rapanui.1055.d: "선원들은 이스터섬에서 모아이 석상 두 개를 모두 가까쓰로 확보했지만, [SCOPE.sCharacter('rapanui_adventurer_scope').GetFullName](이)가 비극적인 상황으로 목숨을 잃고 말았다!"
 rapanui.1055.f: "\"배에 타! 배에!\" 모아이 석상을 훔쳐 이스터섬을 떠나려는 사람들이 할 수 있는 말은 오직 그뿐이었다. 현지인들은 끝내 외지인들이 저지른 짓을 알아채고 배신감을 느꼈다. 배는 이미 출항 준비를 마치고 모아이 석상들을 실었지만, 마지막 순간에 비극적인 사건이 발생했다. 모든 선원들의 승선을 위해 마지막까지 남아 있던 [SCOPE.sCharacter('rapanui_adventurer_scope').GetLastName](이)가 등에 창을 맞고 쓰러져 움직일 수 없게 된 것이다. 선원들은 선장을 두고 떠날 수밖에 없었다. 그날 [ROOT.GetCountry.GetNameNoFlag]에는 귀중한 유물 두 개를 얻었지만, 동시에 밝은 미래를 꿈꾸던 소중한 인재를 잃고 말았다."
 rapanui.1055.g: "[ROOT.GetCountry.GetNameNoFlag](은)는 이 영웅을 기억할 것이다."
 rapanui.1056.t: "이스터섬의 비극"
 rapanui.1056.d: "선원들이 모아이상을 배 위에 무사히 실었다. 그러나 그 대가는 무엇이었을까?"
 rapanui.1056.f: "\"배에 타! 배에!\" 모아이 석상을 훔쳐 이스터섬을 떠나려는 사람들이 할 수 있는 말은 오직 그뿐이었다. 현지인들은 끝내 외지인들이 저지른 짓을 알아채고 배신감을 느꼈다. 배는 이미 출항 준비를 마치고 모아이 석상들을 실었지만, 마지막 순간에 비극적인 사건이 발생했다. 모든 선원들의 승선을 위해 마지막까지 남아 있던 [SCOPE.sCharacter('rapanui_adventurer_scope').GetLastName](이)가 등에 창을 맞고 쓰러져 움직일 수 없게 된 것이다. 선원들은 선장을 두고 떠날 수밖에 없었다. 그날 [ROOT.GetCountry.GetNameNoFlag]에는 귀중한 유물 두 개를 얻었지만, 동시에 밝은 미래를 꿈꾸던 소중한 인재를 잃고 말았다."
 rapanui.1056.g: "[ROOT.GetCountry.GetNameNoFlag](은)는 이 영웅을 기억할 것이다."
 rapanui.1057.t: "마지막 순간의 탈출"
 rapanui.1057.d: "현지인의 분노를 샀지만 [SCOPE.sCharacter('rapanui_adventurer_scope').GetFullName]의 지휘로 귀중한 모아이 석상을 배에 싣는 데 성공했다."
 rapanui.1057.f: "[SCOPE.sCharacter('rapanui_adventurer_scope').GetLastName](은)는 자신이 현지인들의 인내심을 끝까지 시험했음을 곧바로 알아차렸다. 모아이 석상을 회수하자 적대적인 태도를 보였기 때문이다. 망가진 흔들목마, 깡통 몇 개, 화려한 동물원 책자 석 장 등 자신들이 받은 선물이 사기라는 것을 깨닫고 배신감을 느꼈던 모양이다. 선장은 침착하게 부하들을 배에 태우고 뭍에서 발을 뗐다. 그 직후 선원들은 라파누이 사람들이 무기를 들고 해안으로 모여드는 것을 볼 수 있었다..."
 rapanui.1057.g: "이 남자에겐 자질이 있다."
 rapanui.1058.t: "실종"
 rapanui.1058.d: "이스터섬의 특별한 것을 찾아 떠났던 탐사대가 흔적도 남기지 않고 사라졌다."
 rapanui.1058.f: "야망이 지나쳤던 모험가의 과신 탓이었을까? 배에 남은 선원들은 며칠 동안 다른 선원들과 대장 [SCOPE.sCharacter('rapanui_adventurer_scope').GetLastName]의 소식을 듣지 못했다. 나흘 차에는 세 사람이 용기를 내어 그들의 운명을 알아보려 했지만 화가 난 원주민 몇 명과 마주쳤을 뿐 아무런 소득 없이 수색을 포기해야 했다. 배는 이 불운한 섬을 떠났다. 그곳에서 무슨 일이 벌어졌는지는 풀리지 않는 미스터리로 남게 되었다."
 rapanui.1058.g: "무섭구만."
 rapanui.1059.t: "침울한 귀국길"
 rapanui.1059.d: "선원들이 유망한 지도자의 죽음을 애도하고 있다. 쓸쓸한 분위기가 귀국길을 뒤덮고 있다."
 rapanui.1059.f: "\"바다 건너 들었소, 조국이 부르는 소리\n드넓은 바다 너머로 부르고 또 부르네\n칼은 허리에 차고, 투구는 머리에 쓰고,\n발치에 널린 죽어가는 자와 죽은 자\n전투의 소란과 작렬하는 대포 소리\n그대 아들로서 모국으로 길을 재촉하네\" - 세실 스프링라이스"
 rapanui.1059.g: "안타깝다."
 rapanui_custom_death_shot_arrows: "[ROOT.Var('rapanui_missionary_var').GetCharacter.GetFullName](은)는 소형배를 타고 여러 차례 섬에 접근하였으나 그때마다 화살 세례를 받았다. 원주민들은 화살을 바로 쏘지 않고 쫓아낼 뿐이었다. 그러나 세 번째로 상륙하려 하자 지렬 버린 원주민들이 제대로 겨냥하여 쏘았고, 여러 개의 살이 [ROOT.Var('rapanui_missionary_var').GetCharacter.GetFirstName]에게 명중하여 맥없이 쓰러지고 말았다."
 rapanui_custom_death_lunch: "처음에는 모든 것이 순조로운 듯했다. [ROOT.Var('rapanui_missionary_var').GetCharacter.GetFullName](은)는 현지인들의 따뜻한 환대를 받았으며, 심지어 낯선 손님을 위한 잔치를 베풀기까지 하였다. 허나 [ROOT.Var('rapanui_missionary_var').GetCharacter.GetFirstName](이)가 현지 언어를 제대로 익혀두지 못했던 모양이다. [ROOT.Var('rapanui_missionary_var').GetCharacter.GetSheHe]는 잔칫상을 받은 것이 아니라 그 자신이 잔칫상이 되었던 것이었다."
 rapanui_custom_death_burnt: "[ROOT.Var('rapanui_missionary_var').GetCharacter.GetFullName](이)가 어째선지 원주민들을 화나게 만든 모양이다. 도착한 직후 [ROOT.Var('rapanui_missionary_var').GetCharacter.GetSheHe]가 타고 온 배의 선원들은 해변에서 큰 모닥불이 이는 것을 보았다. 며칠이 지나도 [ROOT.Var('rapanui_missionary_var').GetCharacter.GetFirstName]에게서 소식이 없자 조사에 나서기로 하였다. 이들은 해변에서 [ROOT.Var('rapanui_missionary_var').GetCharacter.GetFullName]의 불타버린 시신을 발견하고 말았는데, 늘상 차고 다니던 십자가로 겨우 알아볼 수 있을 뿐이었다."
 rapanui_custom_death_shipwrecked: "비극이 닥쳤다! [ROOT.Var('rapanui_missionary_var').GetCharacter.GetFullName](이)가 목적지에 도달하기도 전에 타고 있던 배가 폭풍에 휘말려 바다에 가라앉고 만 것이다. 그 결과 [ROOT.Var('rapanui_missionary_var').GetCharacter.GetFirstName](을)를 제외한 모든 승객이 살아남았다. 이것이 하느님의 계시였던 것인가?"
 rapanui_custom_death_clubbed: "[ROOT.Var('rapanui_missionary_var').GetCharacter.GetFullName](이)가 해안에 발을 디딘 지 머지않아 현지인들에게 둘러싸였다. 처음에 관심을 보이는 듯했던 주민들은 머지않아 큰 다툼을 벌이고 말았다. 그 과정에서 섬 주민들은 [ROOT.Var('rapanui_missionary_var').GetCharacter.GetFirstName](을)를 몽둥이로 마구 팼고, 결국 땅바닥에 쓰러져 움직이지 못하게 되었다."
 rapanui_custom_death_beheaded: "[ROOT.Var('rapanui_missionary_var').GetCharacter.GetFullName](이)가 타고 온 배의 선원들은 섬에 상륙한 지 불과 하루 만에 끔찍한 광경을 목격하고 말았다. 해변에 [ROOT.Var('rapanui_missionary_var').GetCharacter.GetFirstName]의 잘린 머리가 꼬챙이에 꽂혀 있는 것을 발견한 것이다. 현지인들이 왜 이런 끔찍한 일을 벌였는지는 아무도 모른다."
 rapanui_custom_death_join_natives: "[ROOT.Var('rapanui_missionary_var').GetCharacter.GetFullName]의 소식이 전혀 들리지 않은 지 몇 주가 흘렀다. 이에 [ROOT.Var('rapanui_missionary_var').GetCharacter.GetSheHe]가 방문한 마을로 조사단을 보내 경황을 알아내고자 하였다. 알고 보니 [ROOT.Var('rapanui_missionary_var').GetCharacter.GetFirstName](은)는 아무 문제 없이 잘 지내고 있었으며, 다만 야만인들과 함께 어울려 살기로 결심했다는 것이 밝혀졌다. 어떻게 이런 일이 벌어질 수가 있는가?"
