 je_rapanui_northwest_expedition: "[SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting] 탐사대"
 je_rapanui_northwest_expedition_reason: "[SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting] 탐사대가 북극의 북서항로를 찾아 나섰다. 우리 정부는 이 탐사가 수년에 걸쳐 진행될 것으로 전망하고 있다. 매년 여름에는 탐사대가 돌파구를 찾아 나서고, 겨울에는 영구 빙설지대에서 시간을 보내게 된다. 4년이 지나도 돌파구를 찾아내지 못한다면 탐사대는 연락이 두절된 것으로 보게 된다. 북서항로를 돌파하는 데 성공할지, 탐사대가 무사히 돌아올지, 아니면 국가적 참사로 끝나게 될지의 여부는 #V 성공 확률#!에 좌우된다. #V 성공 확률#!이 최소 #G 80#!에 도달하면 북서항로를 돌파할 수 있다. #V 성공 확률#!이 #YELLOW 60#!에 머무르면 돌파구를 찾지는 못하지만 새로운 지식을 얻고 돌아올 수 있다. #V 성공 확률#!이 #R 30 미만#!이라면 국가적 참사로 끝날 수 있다.\n\n현재 우리의 #V 성공 확률#!은 #ORANGE [ROOT.Var('rapanui_northwest_success').GetValue]#!이다."
 je_rapanui_northwest_expedition_fail: "4년 이내에 북서항로를 돌파하지 못하면 탐사가 실패로 끝납니다."
 je_rapanui_northwest_expedition_success: "#V 성공 확률#!이 #G 80#!을 넘고 1년 이상 그 이상의 수준을 유지한다면 북서항로를 돌파할 수 있습니다."
 je_rapanui_northwest_expedition_invalid: "다른 국가에서 우리보다 먼저 북서항로를 돌파한다면 어떠한 성과도 거두지 못하고 복귀하게 됩니다."
 rapanui.401.t: "북서항로: 성공 확률"
 rapanui.401.d: "탐사 준비가 도화선에 올랐다. 기함으로는 [SCOPE.sCharacter('rapanui_ship_scope').GetLastNameNoFormatting] 호가 선발되어 준비에 나서게 되었다. 학자들과 선원들은 지금 선에서 얼마나 성공할지의 확률을 가늠해보고 있다. "
 rapanui.401.f: "북서항로를 무사히 돌파할 수 있는 성공 확률은 여러 가지 요인에 좌우됩니다. 준비 과정에서 산정되는 기본값은 연구한 해군 기술의 총합에 기반합니다. 진공 통조림이나 저온 살균과 같은 식품 보존 기술의 발전 또한 상당히 긍정적인 효과를 끼칩니다. 태평양 탐사로 해양학 연구를 마치거나 선두적인 해군력을 보유하는 것 역시 추가 보너스를 부여합니다. 공학자나 천문학자를 비롯한 학자는 기본 확률을 더욱 높이게 됩니다. 항해 중에는 날씨와 같은 예측 불가능한 사건들이 성공 확률을 높이거나 낮출 수 있습니다."
 rapanui.401.g: "북서항로를 발견하고 말겠다. [ROOT.GetCountry.GetNameNoFormatting]의 영광을 위해!"
 rapanui.401.h: "다시 생각해보니 이번 탐사는 처음 생각했던 것보다 훨씬 더 위험할 듯 싶다."
 rapanui.402.t: "이의 있소!"
 rapanui.402.d: "현 정부 여당과 연립을 이루고 있는 정당의 [SCOPE.sCharacter('rapanui_ig_leader').GetFullName] 대표가 북서항로 탐사에 강경 반대 입장을 드러냈다. 이번 탐사가 '자살 임무'나 다름이 없다는 주장이다."
 rapanui.402.f: "어제 [SCOPE.sCharacter('rapanui_ig_leader').GetLastName] 대표가 이끄는 정당 대표들은 본인들의 동의 없이 추진된 이번 탐사에 항의 성명을 발표하였다. 북극 횡단 탐사가 예산이 많이 들고, 큰 의미가 없으며, 위험성도 크다는 것이 이들의 입장이다. 또 그 예산을 다른 곳에 쓰는 것이 훨씬 더 효율적이지 않느냐는 반론도 제기하였다. 게다가 국가를 위해 봉사할 수 있는 주요 인재들의 생명을 위험에 빠뜨릴 것이라고 경고하였다."
 rapanui.402.g: "그런 것쯤은 감안해야 하는 것 아니겠소."
 rapanui.402.h: "정치적 양보를 해줘야겠지."
 rapanui.403.t: "북서항로의 탐사 대장"
 rapanui.403.d: "북극 탐사는 가장 위험한 해상 작전으로 꼽힌다. 이러한 도전을 받아들이고 탐사를 성공적으로 이끌기 위해서는 훌륭한 선장이 필요하다."
 rapanui.403.f: "경험 많은 선장만이 이번 임무를 이끌 수 있다. 훌륭한 선장은 탐사의 성공 확률을 높여준다. #YELLOW 경험 많은 / 전문 해군 지휘관#!과 같은 인물 특성이 도움이 될 수 있다. #YELLOW 탐험가#!는 특히 적합한 자질을 갖추고 있으며, #YELLOW 세계 일주 경험#!이 있다면 최고의 선택으로 평가받을 수 있다. 그러나 조심해야 할 것은, 탐사가 참사로 끝날 경우 선장 또한 배와 함께 운명을 다할 수 있다는 점이다..."
 rapanui.403.g: "[SCOPE.sCharacter('rapanui_northwest_expedition_leader_1').GetFullName]"
 rapanui.403.h: "[SCOPE.sCharacter('rapanui_northwest_expedition_leader_2').GetFullName]"
 rapanui.403.i: "[SCOPE.sCharacter('rapanui_northwest_expedition_leader_3').GetFullName]"
 rapanui.404.t: "선상의 사제"
 rapanui.404.d: "다가오는 미지로의 항해는 장기간의 고립을 감안해야 한다. [SCOPE.sCharacter('rapanui_ig_leader').GetFullName] 대장은 자신의 인맥을 활용하여 선내 사제를 임명함으로써 선상의 사기를 진작시키겠다는 제안을 하였다."
 rapanui.404.f: "\"이건 바다에서 길 잃은 영혼들을 돌보는 순전히 목회의 문제요. 이누이트족이라니? 우리가 언제 이누이트족을 개종시킨다고 말하기나 했던가? 터무니없는 주장이오!\n물론 사전에 정중하게 허락을 구해야 하겠지.\""
 rapanui.404.g: "이토록 위험한 여정에서는 선원들에게 목회자가 필요하다."
 rapanui.404.h: "바다에서 우리 목숨을 부지하는 것은 신이 아니라 기술과 실력이오."
 rapanui.405.t: "공학자의 탐사선 개량"
 rapanui.405.d: "[SCOPE.sCharacter('rapanui_engineer_scope').GetFullName](이)가 본인의 기술적 지식을 활용해 북극해 탐사에 나설 함대를 개선시켰다."
 rapanui.405.f: "비극으로 끝난 프랭클린 탐사대의 함선 가운데 에레버스호와 테러호는 본격적인 북서항로 개척에 앞서 최신 기술 도입을 거쳤다. 특히 선수와 선체 측면에 강철 보강재를 덧대어 유빙의 압력으로 선박이 파손되는 것을 막았다. 또한 바람이 약하거나 불리한 상황에서도 유빙 속에서 기동성을 유지하기 위해 각 함선에 15톤에 달하는 증기엔진을 설치하고, 맞춤 설계된 2미터 높이의 프로펠러를 구동하였다. 이들은 영국 해군 최초로 증기 추진 방식과 스크류 프로펠러를 장착한 함선이기도 했다. 프로펠러와 방향타는 유빙에 걸렸을 때 분리하여 안전하게 옮길 수 있도록 설계되었다. 그러나 돌이켜보면 이 같은 추진력을 더했음에도 그 위력이 지나치게 약한 것이 문제였다. "
 rapanui.405.g: "기술 발전이 유빙을 부수고 나아갈 것이다."
 rapanui.406.t: "천문학자의 기상 자료 제공"
 rapanui.406.d: "[SCOPE.sCharacter('rapanui_astronomer_scope').GetFullName](이)가 기상학 지식을 제공하여 일기 예보를 개선하고 항해에 알맞은 시간을 정하는 데 보탬이 되어주었다."
 rapanui.406.f: "\"천문대의 기상 관측소를 이용하면서 몇 주 동안 실험을 진행하고 밤늦도록 꼼꼼히 관측, 연구한 끝에, 저온 환경이 이번 항해의 성공에 큰 도움이 되지 않을 것이라는 사실을 알아냈소.\""
 rapanui.406.g: "과학이 우리를 승리로 이끌 것이다."
 rapanui.407.t: "[SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting] 탐사대 출항"
 rapanui.407.d: "북서항로 개척을 위한 탐사용 함대가 모든 준비를 마쳤다. 이번 탐사는 탐사대장 [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetFullName]의 이름을 따서 #YELLOW [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting] 탐사대#!로 벌써부터 널리 알려지게 되었다."
 rapanui.407.f: "19세기 초에는 존 로스, 엘리샤 켄트 케인, 윌리엄 에드워드 패리, 제임스 클라크 로스를 비롯한 여러 탐사대가 북서항로 일부 구간을 각자 탐험하였다. 또한 존 프랭클린, 조지 백, 피터 워런 디즈, 토머스 심슨, 존 래 등도 북서육로 탐사대를 이끌었다. 1826년에는 프레더릭 윌리엄 비치가 알래스카 북부 해안을 탐험하여 포인트 배로를 발견하였다. 1845년 존 프랭클린 경이 호화 장비를 갖춘 두 척의 탐험선을 이끌고 북서항로의 마지막 미개척지를 탐사하기 위해 캐나다 북극으로 향했다. 탐험대는 북극 본토 해안의 미탐사 구간이 500km(310마일) 미만이라 추산하며 높은 자신감을 보였다. 그러나 탐사대는 돌아오지 않았고, 구조대와 수색대가 캐나다 북극을 탐사하는 과정에서 해당 지역에 대한 상세한 지도가 작성되었으며, 통과 가능한 항로도 발견되기에 이르렀다."
 rapanui.407.g: "행운을 빌겠네!"
 rapanui.410.t: "아문센의 북서항로 횡단"
 rapanui.410.d: "노르웨이 탐험가 로알드 아문센이 북서항로를 해로로 처음 횡단한 인물이 되었다. 아문센의 항해는 3년 동안 이루어졌다. 오늘은 조국에 참으로 위대한 날이다!"
 rapanui.410.f: "아문센은 1903년부터 1906년까지 목선 괴위아호(Gjøa)에 선원 여섯 명을 태우고 대서양에서 태평양으로 이어지는 북서항로를 지나가는 데 성공하였다. 그러나 배핀만에서 랭커스터 해협과 필 해협을 거쳐, 제임스 로스 해협과 심슨 해협을 통과하는 항로는, 수심이 1미터도 채 되지 않은 곳이 많아 정기 선박 운항에는 부적합했다. 허나 6인의 노르웨이인과 덴마크인 고드프레드 한센이 400년 넘게 수많은 탐사대가 시도했던 북서항로를 동서 방향으로 처음 개척했다는 것은, 항해와 탐험사에 있어 지대한 업적을 세웠음을 평가절하할 수 없는 것도 사실이다. 아문센 탐사대는 항해 도중 실종 상태에 놓여 있었던 존 프랭클린의 탐사대의 유골과 장비를 발견하는 성과도 이룩하였다."
 rapanui.410.g: "노르웨이에 영광을!"
 rapanui.411.t: "북서항로 발견!"
 rapanui.411.d: "#YELLOW [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting] 탐사대#!가 캐나다와 북극 사이의 북극해를 뚫고 지나가는 데 성공하여, 그 지역의 해상 항로가 전혀 나아갈 수 없는 장애물이 아님을 입증하였다.  탐사를 이끈 [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetFullName] 대장은 영웅으로 추앙받게 되었다!"
 rapanui.411.f: "북서항로 개척은 이론상의 예측과는 달리 새롭거나 큰 이득을 가져다주는 무역로를 열지는 못했다. 두꺼운 빙붕을 헤쳐 나가는 것은 너무나 위험했고, 겨울철 혹독한 추위를 인해 개척이 지연되기도 했다. 그럼에도 북서항로의 발견은 중대한 이정표로 기록되었다. 이전에 존재를 알지 못했던 지역들이 지도에 기록되었고, 북극점이나 남극점으로의 여정은 더 이상 불가능의 영역이 아니게 되었다. 항해와 지도술, 기상학, 지자기학, 생물학 분야의 지식이 확장되었고, 용감한 탐험가들에게도 그 지역은 더 이상 미지의 땅이 아니게 된 것이다."
 rapanui.411.g: "[ROOT.GetCountry.GetNameNoFormatting]에 영광을!"
 rapanui.412.t: "[SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting] 탐사대 실종"
 rapanui.412.d: "#YELLOW [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting] 탐사대#!와 연락이 끊긴 지 4년이란 시간에 접어들었다. 해군 본부는 탐사대가 실종 상태라 공식 선언하였다. 탐사대원들이 탄 배가 유빙 속에 갇혀 있을 가능성이 높은 것으로 여겨지고 있다."
 rapanui.412.f: "탐사대가 실종되었다고 해서 반드시 최악의 상황을 뜻하는 것은 아니다. 하지만 탐사의 진정한 목표였던 북서항로의 발견과 개척은 확실히 실패한 것으로 볼 수 있다. 대원들의 운명은 다른 별개의 이야기다. 탐사대의 #V 성공 확률#!이 지나치게 낮은 수준이 아니었다면 모든 것이 끝장난 것은 아닐지도 모른다."
 rapanui.412.g: "썩 좋지 않은 소식이군."
 rapanui.413.t: "실종 탐사대의 귀환!"
 rapanui.413.d: "#YELLOW [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting] 탐사대#!의 귀환으로 [ROOT.GetCountry.GetNameNoFormatting] 전역이 뜻밖의 환희로 가득 찼다. 대원들 가운데 몇 명이 목숨을 잃고 탐사선의 상태도 좋지 않았지만, 값어치를 매길 수 없는 과학적 지식을 갖고 돌아온 것이다."
 rapanui.413.f: "실종된 프랭클린 탐사대를 찾아 나선 수많은 탐사선 중 하나였던 매클루어 북극 탐사대는 배와 썰매를 이용해 북서항로를 처음으로 발견하고 통과하는 데 성공했다는 점에서 중요한 의미를 지닌다. 하지만 바로 그것 때문에 진정한 의미에서 북서항로를 통과한 탐사대로 보기는 어렵다는 견해도 존재한다. 실제로 처음부터 북서항로를 목표로 삼아 처음으로 완전히 통과한 사람은 1903년~1905년 탐사에 나선 로알드 아문센이었다."
 rapanui.413.g: "정말 다행이야!"
 rapanui.414.t: "탐사대의 귀환"
 rapanui.414.d: "#YELLOW [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting] 탐사대#!의 얼마 남지 않은 대원들이 며칠 전 캐나다 국경을 넘어 문명 사회로 진입하게 되었다. 쇠약한 상태였던 이들은 유빙 속에서 탐사선을 버릴 수밖에 없었다고 털어놓았다. 필수 물품은 작은 썰매 몇 대에 실어 옮겼다. [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetFullName] 선장은 잠시 중병에 걸리기도 하였으나 이제는 무사히 귀환하게 되었다. 반대로 나머지 대원들은 추위와 굶주림, 질병, 탈진을 견디지 못하고 목숨을 잃고 말았다."
 rapanui.414.f: "1852년 에드워드 벨처는 프랭클린 탐사대를 찾기 위한 정부 주도의 북극 탐사대를 이끌게 되었다. 그러나 이 탐사대 역시 실패로 끝났다. 벨처는 제 성격 탓에 부하 대원들의 마음을 얻지 못하였는데 이는 북극 항해에서 특히나 불리하게 작용하는 요소였으며, 얼음 속에서 배를 이끌고 나아가는 데에도 적격인 인물은 아니었다. 총 다섯 척의 함선 가운데 네 척 (레졸루트호, 파이오니어호, 어시스턴스호, 인트레피드호)은 유빙에 갇혀 버려졌고, 벨처는 탐사 실패의 책임을 물어 군사 재판에 회부되었으나 무죄를 선고받았다. 네 척 가운데 레졸루트호는 결국 미국 포경선에 온전한 상태로 인양되어 영국으로 되돌아갔다."
 rapanui.414.g: "그래도 목숨은 건졌으니."
 rapanui.415.t: "기약 없는 [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting] 탐사대"
 rapanui.415.d: "몇 주 간의 기다림 끝에 북서항로 개척에 나섰던 탐사대가 돌아오지 못할 것이라는 참담한 예감이 확실해졌다. 우리는 아무래도 이것이 [ROOT.GetCountry.GetAdjectiveNoFormatting] 해양 역사상 가장 큰 비극이라는 끔찍한 사실을 받아들여야 할 것 같다."
 rapanui.415.f: "프랭클린 탐사대는 영국의 극지 탐험가 존 프랭클린 경이 주도한 세번째이자 마지막 연구 탐사였다. 이들의 목표는 동쪽에서 서쪽으로 이어지는 북서항로를 완전히 통과하여 해도를 작성하고 유럽에서 아시아로 나아가는 더욱 짧은 항로를 찾는 것이었다. 탐사대는 끔찍한 실패를 맞이하였다. 1845년부터 1848년까지 캐나다 북극 제도를 지나는 과정에서 탐사대원 전원이 사망했던 것이다. 탐사대원들의 마지막 흔적은 수년 뒤 킹 윌리엄 섬에서 발견되었다. 오랫동안 가려져 있던 프랭클린 탐사대의 비극적 운명은 19세기 중반에 이르러서야 널리 알려지게 되었다. 신문들은 프랭클린의 운명에 대한 보도와 추측으로 높은 발행부수를 기록하였고, 현대 대중 매체의 모든 수단에 따라 해당 소재가 적극적으로 활용되었다. 탐사대는 물론 남편을 살리기 위해 새로운 수색대를 파견하였던 제인 프랭클린 여사의 끊임없는 노력은 수년간 영국 국민들의 관심을 사로잡았다."
 rapanui.415.g: "전원 사망한 것이라고 봐야겠지..."
 rapanui.415.h: "구조 수색대를 파견하라!"
 rapanui.415.tt: "탐사대원들이 생존한 채로 발견될 가능성은 매우 낮습니다. 대부분의 경우 아무것도 찾지 못하거나 최소한 약간의 유해만 발견됩니다. 그런 반면 탐사대 역시 실종될 가능성이 아주 희박하게나마 존재합니다."
 rapanui.416.t: "[SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting] 탐사대의 흔적"
 rapanui.416.d: "[SCOPE.sCharacter('rapanui_northwest_expedition_hero').GetFullName](은)는 캐나다 북부의 험난한 여정에 나선 과정에서 실종된 탐사대의 잔해를 발견하였다. 이것으로 미뤄보아 탐사대원 전원이 사망한 것으로 보인다. 그러나 그 과정에서 몇 가지 새로 알아낸 사항이 있었으며 이번 임무를 통해 [ROOT.GetCountry.GetNameNoFormatting]에 새로운 지식을 가져다주게 되었다."
 rapanui.416.f: "출항한 지 몇 주가 지난 뒤 구조선은 실종된 탐사대원들이 남긴 숨겨진 메시지를 발견하였다. 바로 현 상황을 알리는 보고서와 위치를 남기는 기록지였다. [SCOPE.sCharacter('rapanui_northwest_expedition_hero').GetFullName] 대장이 이끄는 함대는 마침내 #YELLOW [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting] 탐사대#!가 실종되었을 것으로 보이는 지역이 정확히 어딘지를 파악할 수 있었다. 이들은 과연 실종된 선박에서 나온 물품을 이누이트족으로부터 입수할 수 있었다. 대원과 선장의 사망은 이제 슬픈 현실로 다가오게 되었다. 그러나 이번 구조 작전을 통해 과거에 알려지지 않았던 지역을 지도화할 수 있었고, 새로운 연구 결과를 도출하였으며, 잊혀진 측정 자료도 되살릴 수 있었다. [SCOPE.sCharacter('rapanui_northwest_expedition_hero').GetLastName] 선장 역시 상당한 경험을 터득하게 되었다."
 rapanui.416.g: "그래도 이번 사안에 대해서 조금이나마 밝혀낼 수 있었군."
 rapanui.417.t: "사라진 탐사대의 미스터리"
 rapanui.417.d: "몇 주간의 수색에도 [SCOPE.sCharacter('rapanui_northwest_expedition_hero').GetFullName] 대장은 #YELLOW [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting] 탐사대#!의 운명을 가늠할 흔적을 전혀 찾아낼 수 없었다. 여기에 악천후까지 닥치면서 수색대는 비슷한 운명에 빠지지 않도록 임무 중단을 택해야 했다."
 rapanui.417.f: "실종된 탐사대는 목숨을 잃고 탐사선도 침몰했을 가능성이 크다. 그러나 불확실한 면모는 여전히 남아 있다. 언론에서는 여러 낭설이 떠돌고 있다. 식인 풍습이나 악마 이야기, 선량한 신사들이 광기에 빠져 야수로 변해버렸다는 이야기가 돌고 있는 것이다. #YELLOW [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting] 탐사대#!의 운명은 여전히 미스터리로 남아 있다. 아마도 영원히 밝혀지지 않을 것이며, 수많은 공포 이야기의 소재가 될 것이다."
 rapanui.417.g: "통조림의 납땜이 제대로 안 된 것은 아닌가?"
 rapanui.418.t: "북극의 기적"
 rapanui.418.d: "그 누구도 예상하지 못한 소식이 수도로 전해졌다. [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastName] 대장이 살아 있었다. 그 모습은 수척해지고 병들고 쇠약해졌지만, 목숨은 붙어 있었다. 얼마 후 [SCOPE.sCharacter('rapanui_northwest_expedition_hero').GetFullName](이)가 남은 선원들과 함께 조국의 항구로 도착하였다. 구조 작전은 대성공을 거두었다."
 rapanui.418.f: "#YELLOW [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting] 탐사대#!는 모든 함선이 유빙에 갇혀 몇 달 전에 버리고 떠난 상태였다. 병들고 허약한 탓에 그곳에 남게 된 대원들은 죽음을 맞이할 수밖에 없었다. 배의 목재를 떼어 임시 썰매를 끌고 행군하다 목숨을 잃은 대원들도 있었다. 굶주림과 추위 또한 수많은 희생자를 냈다. 전체 대원 가운데 3분의 1이 목숨을 잃었다. 허나 무엇보다도 가장 큰 기쁨은 마치 기적처럼 조국으로 돌아갈 수 있다는 사실이었다. [SCOPE.sCharacter('rapanui_northwest_expedition_hero').GetFullName](이)가 얼음 없는 만에서 생존자들을 발견하고 배에 태워주었던 것이다. 탐사 자체는 성공적이었기에 과학적으로 중요한 발견 사항들도 무사히 간직할 수 있었다. [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetFullName] 대장은 비록 함대는 잃었어도 고향에서는 [SCOPE.sCharacter('rapanui_northwest_expedition_hero').GetLastName](와)과 함께 항로를 건넌 것처럼 환대받게 되었다."
 rapanui.418.g: "정말이지 영웅이로군!"
 rapanui.419.t: "구조 작전 실패!"
 rapanui.419.d: "최악의 상황이 벌어지고 말았다. #YELLOW [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting] 탐사대#!가 실종되고 난 뒤 [SCOPE.sCharacter('rapanui_northwest_expedition_hero').GetFullName](이)가 이끌던 구조대마저 자취를 감추고 말았다. 두 함대 모두 같은 운명을 맞이했을까 두려울 뿐이다."
 rapanui.419.f: "\"레이는 1854년 4월 펠리만 (북위 69도, 서경 72도)의 에스키모인들로부터 서쪽으로 10일에서 12일 정도 더 가면 다다를 곳에 40명 넘는 백인들이 식량 부족으로 사망해 있다는 이야기를 들었다. 항해를 이어나가던 1850년 봄, 킹 윌리엄 섬 북쪽 연안 인근에서 물개를 잡으러 나갔던 에스키모인들로부터 약 40명의 백인들이 얼음 위를 건너 남쪽으로 이동하는 것을 목격했다고 전해들었다. 그로부터 몇 주 뒤, 큰 강에서 북서쪽으로 하루 정도의 거리에 떨어진 아메리카 대륙 연안에서 백인 시신 30구가 발견되었고, 인근 섬에서도 5구가 추가로 발견되었다. 에스키모인들은 화약과 총알, 산탄, 시계, 나침반, 망원경, 총 등을 잘 간직하고 있었던 것으로 밝혀졌는데, 이러한 물품 일부와 더불어 은수저, 포크 등을 레이가 발견하고 사들였기 때문이다.\""
 rapanui.419.g: "저주받은 얼음 바다일세!"
 rapanui.420.t: "[SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting] 탐사대의 귀환"
 rapanui.420.d: "다른 국가가 북서항로 개척에 결정적인 돌파구를 마련하면서 우리나라가 보냈던 탐사대가 귀환하게 되었다. 아무런 결실을 거두지 못했지만 해당 지역에 관한 유용한 통찰력을 확보한 것도 사실이다. 북서항로를 향한 탐사는 이번이 마지막이 되었다."
 rapanui.420.f: ""
 rapanui.420.g: "고국에 온 것을 환영하오."
 rapanui.421.t: "온화한 날씨"
 rapanui.421.d: "금년에는 이례적인 해빙기에 돌입하면서 평소에 얼음으로 덮여 있던 일부 항로가 예년보다 일찍 열렸다. 이에 따라 #YELLOW [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting] 탐사대#!는 당초 계획보다 순조로운 항해를 진행하고 있다."
 rapanui.421.f: "날씨의 변화는 막을 수 없으며 북극 탐험가들의 목숨을 앗아간 적도 많다. 국가에 봉사하는 천문학자가 탐사대 출발 전에 유리한 시기를 예측하여 기상 여건이 좋을 확률을 높여 줄 수 있다."
 rapanui.421.g: "좋아."
 rapanui.422.t: "악천후"
 rapanui.422.d: "안타깝게도 올해 북극의 겨울은 예년보다 더욱 길어지고 있으며, 결빙 시기도 9월부터 시작되며 일찍 앞당겨지게 되었다. 이로써 #YELLOW [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting] 탐사대#!의 성공 확률이 크게 낮아지게 되었다."
 rapanui.422.g: "상황이 좋지 않군."
 rapanui.423.t: "이누이트 안내인"
 rapanui.423.d: "캐나다 북부를 항해하던 [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetFullName] 대장은 이누이트 한 명을 탐사대에 동행시키는 데 성공했다. 이 사람은 이 지역의 지리를 훤히 꿰고 있을 뿐만 아니라 악천후에서의 생존 기술 한두 가지도 우리에게 전해주었다."
 rapanui.423.f: "유럽인들은 이미 19세기 초부터 북극 탐험에서 이누이트의 지식을 활용하였으며, 일부 대원은 이누이트어를 구사하기도 했다. 이를테면 실종된 프랭클린 탐사대의 운명은 이누이트 목격자들의 증언으로 추적하여 알 수 있었다. 그러나 원주민을 존중하려는 마음은 다소 부족했다. 로알 아문센은 북서항로 항해와 남극점 도달 성공을 위해 극지방 주민들의 생존 기술에 크게 의존하였다."
 rapanui.423.g: "아주 좋아!"
 rapanui.424.t: "사냥감"
 rapanui.424.d: "일부 대원들이 며칠 간 육지에 상륙해서 물개와 순록, 새를 사냥하고 싶다고 요청해 왔다."
 rapanui.424.f: "캐나다 북부, 특히 북극 지역의 황량한 툰드라 지역은 대형 야생 동물이 생존하기에 무척 어려운 환경을 지니고 있다. 다만 예외는 있다. 프랭클린 탐사대가 실패한 이유는 대원들이 자체 식량에 크게 의존하고, 현지 식량 공급에 별달리 의존하지 않았던 것도 있다. 이후 탐사대들은 현지의 동물을 사냥하여 식량을 보충할 기회를 적극 활용하였다. 허나 사냥에 나선다 하여 반드시 성공으로 이어지는 것은 아니다."
 rapanui.424.g: "잠시 멈춰서 사냥에 나서는 것이 좋겠다."
 rapanui.424.h: "시간 낭비야."
 rapanui.425.t: "중독"
 rapanui.425.d: "#YELLOW [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting] 탐사대#!의 여러 대원들이 중독 증세를 겪고 있다. 식량이 상한 건지 아니면 다른 원인이 있었는지는 아직 밝혀지지 않았다. 기함에서는 남은 식량을 어떻게 처리할지를 놓고 벌써부터 논쟁을 겪고 있다. 대체할 만한 식량도 거의 없기 때문이다."
 rapanui.425.f: "프랭클린 탐사대의 실패 원인에 대해서는 오늘날까지도 의견이 분분하다. 흔히 제기되는 주장으로는 깡통의 납땜이 제대로 되지 않아 납 중독이 발생했고 이 때문에 탐사대원들이 쇠약해졌다는 것이다. 수은 중독을 원인으로 지목하는 의견도 있으나, 식중독 또한 드문 현상이 아니라는 점에서 배제할 수는 없다."
 rapanui.425.g: "식량의 상태가 그렇게나 별로인가?"
 rapanui.425.h: "식량을 배 밖으로 던져버리고 육지에서 먹을 것을 구해 보세."
 rapanui.426.t: "결핵"
 rapanui.426.d: "[SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetFullName](이)가 북극해 한복판에서 어려운 결단을 내려야 할 처지에 놓였다. 탐사선 내에 결핵이 한창 돌게 된 것이다. 좁은 공간에서는 아무리 건장한 남성이라도 감염 위험이 매우 높은 것이 사실이다."
 rapanui.426.f: "\"그러므로 무엇이든지 남에게 대접을 받고자 하는 대로 너희도 남을 대접하라, 이것이 율법이요 선지자니라.\" - 마태복음 7장 12절"
 rapanui.426.g: "최대한 잘 보살펴 주자."
 rapanui.426.h: "병자들을 배 밖으로 던져 버려라!"
 rapanui.427.t: "유빙"
 rapanui.427.d: "이제 아무것도 할 수 없다. 조금 뒤면 배가 멈춰 서서 손가락 끝만큼도 움직이지 않는다. 머지않아 추위가 닥칠 것이다. #YELLOW [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting] 탐사대#!가 유빙에 완전히 갇혀버린 것이다!"
 rapanui.427.f: "\"강인한 사람은 위대한 업적을 이룬 사람이 아니라, 어려움과 실패, 좌절에 맞서 강력한 의지를 보여준 사람을 말한다.\" - 어니스트 섀클턴"
 rapanui.427.g: "최악의 국면이군."
 rapanui.427.h: "다행히 우리 공학자가 이런 상황에 대비해 탐험선을 보강해 두었지."
 rapanui.428.t: "지자기 데이터"
 rapanui.428.d: "#YELLOW [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting] 탐사대#!의 물리학 조사단이 극지방 빙하 근처에서 새로운 과학 지식을 확보하였다."
 rapanui.428.f: "\"인류의 역사는 어둠에서 빛을 향해 끊임없이 나아가는 투쟁이다. 따라서 지식의 활용에 대해 논하는 것은 무의미하다. 사람은 알고자 하고, 알고자 하는 욕구를 잃는 순간 사람이 아니게 된다.\" -프리티오프 난센"
 rapanui.428.g: "좋아!"
 rapanui.429.t: "극지대 동식물"
 rapanui.429.d: "#YELLOW [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting] 탐사대#!의 연구원들은 혹독한 환경에도 아랑곳않고 동식물 표본을 수집하여 외딴 극지대에 관한 지식을 넓힐 수 있었다."
 rapanui.429.f: "\"극지방에 오랫동안 머물면 다른 사람들보다 추위에 둔해진다고 생각하는 사람들이 많은데, 그것은 완전히 잘못된 것이다.\" -로알드 아문센"
 rapanui.430.t: "미지의 영역"
 rapanui.430.d: "#YELLOW [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting] 탐사대#!는 캐나다 북부에서 이전에 알려지지 않았던 섬과 만을 발견하여 해양학과 지도학 지식을 확장할 수 있었다."
 rapanui.430.f: "제임스 쿡의 항해 이래 더 이상 발견할 것은 없다는 것은 하나의 격언이었다. 이 지역이 얼마나 혹독할지는 몰라도 [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetFullName] 대장은 과거에 알려지지 않았던 새로운 지역을 지도에 표시함으로서 아직 마지막 변방 지대에 도달하지 않았음을 증명해내고 말았다."
 rapanui.431.d: "노르웨이 탐험가 로알드 아문센이 배를 타고 북서항로를 지나간 최초의 인간으로 기록되었다. 탐사는 3년 동안 이루어졌다."
 rapanui.431.g: "경축드리오..."
 rapanui.432.d: "[SCOPE.sCountry('rapanui_northwest_country_scope').GetName]의 탐사대가 오늘 북서항로를 횡단하는 놀라운 과업을 완수했다는 소식이 전해졌다."
 rapanui.433.t: "사라진 [SCOPE.sCountry('rapanui_franklin_country').GetAdjectiveNoFormatting] 탐사대"
 rapanui.433.d: "해양 역사상 최악의 참사가 [SCOPE.sCountry('rapanui_franklin_country').GetName]에 닥치고 말았다. 최첨단 장비를 갖춘 탐사대가 북극에서 실종되고 만 것이다. 이 탐사대는 북서항로를 찾아 항해할 예정이었으나, 4년 넘게 연락이 두절된 상황이다. 온 나라가 깊은 슬픔에 빠진 가운데, 일각에서는 탐사대 전원이 사망했을지도 모른다는  시각을 내비쳤다."
 rapanui.433.g: "진심 어린 애도를 표하는 전보를 보냅시다."
 rapanui.433.h: "위험을 자처하면 그 위험 속에서 죽음을 맞이하는 법이다."
 rapanui.434.t: "[SCOPE.sCountry('rapanui_franklin_country').GetAdjectiveNoFormatting] 탐사대의 흔적"
 rapanui.434.d: "[SCOPE.sCharacter('rapanui_northwest_expedition_hero').GetFullName](은)는 캐나다 북부의 험난한 여정에 나선 과정에서 실종된 탐사대의 잔해를 발견하였다. 이것으로 미뤄보아 탐사대원 전원이 사망한 것으로 보인다. 그러나 그 과정에서 몇 가지 새로 알아낸 사항이 있었으며 이번 임무를 통해 [ROOT.GetCountry.GetNameNoFormatting]에 새로운 지식을 가져다주게 되었다."
 rapanui.434.f: "출항한 지 몇 주가 지난 뒤 구조선은 실종된 탐사대원들이 남긴 숨겨진 메시지를 발견하였다. 바로 현 상황을 알리는 보고서와 위치를 남기는 기록지였다. [SCOPE.sCharacter('rapanui_northwest_expedition_hero').GetFullName] 대장이 이끄는 함대는 마침내 [SCOPE.sCountry('rapanui_franklin_country').GetAdjectiveNoFormatting] 탐사대가 실종되었을 것으로 보이는 지역이 정확히 어딘지를 파악할 수 있었다. 이들은 과연 실종된 선박에서 나온 물품을 이누이트족으로부터 입수할 수 있었다. 대원과 선장의 사망은 이제 슬픈 현실로 다가오게 되었다. 그러나 이번 구조 작전을 통해 과거에 알려지지 않았던 지역을 지도화할 수 있었고, 새로운 연구 결과를 도출하였으며, 잊혀진 측정 자료도 되살릴 수 있었다. [SCOPE.sCharacter('rapanui_northwest_expedition_hero').GetLastName] 선장 역시 상당한 경험을 터득하게 되었다."
 rapanui.435.t: "사라진 탐사대의 미스터리"
 rapanui.435.d: "몇 주간의 수색에도 [SCOPE.sCharacter('rapanui_northwest_expedition_hero').GetFullName] 대장은 [SCOPE.sCountry('rapanui_franklin_country').GetAdjectiveNoFormatting] 탐사대의 운명을 가늠할 흔적을 전혀 찾아낼 수 없었다. 여기에 악천후까지 닥치면서 수색대는 비슷한 운명에 빠지지 않도록 임무 중단을 택해야 했다."
 rapanui.435.f: "실종된 탐사대는 목숨을 잃고 탐사선도 침몰했을 가능성이 크다. 그러나 불확실한 면모는 여전히 남아 있다. 언론에서는 여러 낭설이 떠돌고 있다. 식인 풍습이나 악마 이야기, 선량한 신사들이 광기에 빠져 야수로 변해버렸다는 이야기가 돌고 있는 것이다. 탐사대의 운명은 여전히 미스터리로 남아 있다. 아마도 영원히 밝혀지지 않을 것이며, 수많은 공포 이야기의 소재가 될 것이다."
 rapanui.436.t: "탐사선 발견!"
 rapanui.436.d: "놀라운 소식이다. 실종된 탐사대의 배 한 척이 북아메리카 연안에서 유령선으로 모습을 드러냈다. [SCOPE.sCharacter('rapanui_northwest_expedition_hero').GetFullName](이)가 해당 탐사선을 인수하는 데 성공하였다. 선내는 거의 온전하지만 실종된 것으로 추정되었던 지점에서 약 2000km나 떨어진 곳에서 발견되었다. 이 탐사선을 표류물로 처리해야 할지 아니면 다른 누군가의 소유로 되돌려 주어야 할지 논란이 벌어지고 있다."
 rapanui.436.f: "HMS 레졸루트호는 19세기 중반 영국 왕립 해군의 바크형 범선으로, 북극 탐사를 위해 특수 제작된 함선이다. 레졸루트호는 1854년 프랭클린의 실종된 탐사대를 수색하던 과정에서 얼음에 갇혀 버려졌다. 영국 정부는 관보를 통해 레졸루트가 여전히 국왕 폐하의 소유(국유)라 발표하였지만 인양 시도는 이루어지지 않았다. 레졸루트호는 얼음에서 다시 풀려나 1855년 9월 16일 마지막 정박지에서 약 2,000km 떨어진 배핀만에서 유령선으로 발견되었다. 당시 이 사실은 미국의 포경선 조지 헨리호가 처음 확인하였다. 이후 레졸루트호는 배핀 섬 인근 데이비스 해협에서 유빙에 다시 갇혔지만, 항해는 아직 가능했기에 포경선들이 나포하여 미국 코네티컷주 뉴런던 항으로 인계하였다. 마침내 미국 의회가 4만 달러에 레졸루트호를 매수하여 재건한 뒤, 양국 간 평화의 상징으로서 1856년 12월 17일 영국의 빅토리아 여왕에게 공식적으로 헌납하였다."
 rapanui.436.g: "원래 주인에게 반환해야 한다."
 rapanui.436.h: "이 배에 실린 과학적 지식이 우리에게 유용할지도 모르겠군..."
 rapanui_add_x_oceanographic_understanding_minus_x_tt: "@rapanui_oceanographic_knowledge! 해양학 지식 [SCOPE.GetValue('understanding_amount')|0+] 감소"
 rapanui_add_x_oceanographic_understanding_0_tt: "@rapanui_oceanographic_knowledge! 해양학 지식 변화 없음"
 rapanui_add_x_oceanographic_understanding_x_tt: "@rapanui_oceanographic_knowledge! 해양학 지식 [SCOPE.GetValue('understanding_amount')|0+] 상승"
 rapanui.501.t: "새로운 태평양 전신 회사"
 rapanui.501.d: "[SCOPE.sCharacter('rapanui_telegraph_boss_scope').GetFullName]의 주도로  유력 주식회사가 설립되었다. 이 회사는 전신업계의 거물로서 대서양을 가로지르는 위험한 전신 케이블 부설 사업에 필요한 투자금을 모으고자 한다. 이제 [SCOPE.sCharacter('rapanui_telegraph_boss_scope').GetLastNameNoFormatting] 태평양 전신 회사는 불가능에 도전한다."
 rapanui.501.f: "[SCOPE.sCharacter('rapanui_telegraph_boss_scope').GetLastName](이)가 처음 자신의 구상을 발표했을 때만 해도 비웃음을 샀다. 말 그대로 자기 재산을 바다에 내다버릴 짓이라는 것이었다. 하지만 그 사이에 이 사업을 현실적이라고 생각한 후원자들도 나타났다."
 rapanui.501.g: "대륙을 하나로 이어보세!"
 rapanui.502.t: "학계의 지원"
 rapanui.502.d: "케이블 부설선이 출발하기 전에 이번 사업을 지원할 학자를 추가로 동승시킬 기회가 생겼다."
 rapanui.502.f: "[concept_tesla_engineer]는 해상 사고 발생 시 해저 케이블 사업이 피해를 보지 않도록 지키는 역할을 한다. 또한 케이블이 부설된 이후 실제로 작동할 확률을 높여 준다. 한편 [concept_dubois_naturalist]는 대서양에 머무는 동안 자연을 관찰하게 된다."
 rapanui.502.g: "공학자 [SCOPE.sCharacter('gaudi_engineer_scope').GetFullName]."
 rapanui.502.h: "박물학자 [SCOPE.sCharacter('dubois_naturalist_scope').GetFullName]."
 rapanui.511.t: "고래와 돌고래"
 rapanui.511.d: "고래와 돌고래가 항로를 가로지를 때면 독특한 자연 풍경이 펼쳐진다. [SCOPE.sCharacter('rapanui_cable_guy_scope').GetFullName](은)는 이들을 관찰하면서 생물학적으로 새로운 통찰력을 얻기를 기대하지만, 선원들은 그런 학술적 호기심에 별다른 관심을 두고 있지 않는 상황이다."
 rapanui.511.f: "선상에서 논쟁이 불거졌다. 교수가 이 매혹적인 해양 생물들을 도살하는 것이 비열하다며 사냥 방법을 지적한 탓이다. 고래를 기름 저장고로만 여기던 대다수 선원들은 교수의 꾸지람에 더욱 낙담할 뿐이었다."
 rapanui.511.g: "이 경이로운 생물들을 연구하자."
 rapanui.511.h: "그럴 시간은 없어."
 rapanui.512.t: "넘쳐나는 생선!"
 rapanui.512.d: "[SCOPE.sCharacter('rapanui_cable_guy_scope').GetFullName](은)는 눈앞의 행운에 어안이 벙벙했다. 북대서양 해상에서 지금껏 알아내지 못한 종의 물고기떼를 발견했기 때문이다. 교수는 선장에게 작업을 중단하고 표본을 좀 잡자고 요청하였다. 그러나 [SCOPE.sCharacter('target_character').GetFullName](은)는 이곳이 연구소가 아니라 해저 케이블 부설 현장이라고 맞섰다."
 rapanui.512.f: "\"제발 제 말 좀 들어보십시오! 과학 연구를 날려버릴 셈입니까! 이 물고기는 작고 미세해보일지 몰라도 지금껏 전혀 발견된 적이 없는 종이라니깐요. 모르실 수도 있겠지만... 그렇게 좋으면 지금 당장 바다에서 같이 헤엄치고 놀으라니 그게 무슨 말입니까?!\""
 rapanui.512.g: "생선을 잡자."
 rapanui.513.t: "대서양의 해상 실험"
 rapanui.513.d: "[SCOPE.sCharacter('rapanui_cable_guy_scope').GetFullName](은)는 해상에서 시간을 내어 과학 연구를 수행하기 위한 몇 가지 장비를 케이블 부설선에 설치하였다. 어떤 연구를 실시할지는 아직 정하지 않았다."
 rapanui.513.f: "'바다에는 강이 하나 있다. 극심한 가뭄에도 마르지 않고, 엄청난 홍수에도 넘치지 않는다. 강둑과 강바닥은 차가운 물이지만, 흐르는 물은 따뜻하다. 그 강의 발원지는 멕시코만이고, 그 끝은 북극해에 있다. 그것이 바로 멕시코 만류다.' - 매튜 폰테인 모리"
 rapanui.513.g: "지자기 실험에 주력한다."
 rapanui.513.h: "해양학 실험에 주력한다."
 rapanui.521.t: "심해의 수수께끼"
 rapanui.521.d: "[SCOPE.sCharacter('rapanui_cable_guy_scope').GetFullName](은)는 조사 자료를 점검하던 중 수상한 점을 발견하였다. 대서양의 특정 지역에서 해저면이 비정상적으로 높게 솟은 것이다. 지금으로썬 이 현상에 이론 정도만 세워볼 수밖에 없는 상황이다."
 rapanui.521.f: "바다는 중심부에 도달할수록 더욱 깊어진다는 것이 실로 그간의 상식이었다. 허나 오늘의 발견은 그런 생각을 완전히 뒤집어 높았다. 수심이 더욱 깊어지는 것이 아니라 해저와 해수면 간의 거리가 줄어들었던 것이다. 이는 회사 입장에서는 희소식이 되었는데 부설해야 할 케이블의 길이가 짧아지기 때문이다. 하지만 [SCOPE.sCharacter('rapanui_cable_guy_scope').GetFullName]에게는 이번 발견으로 심해에 대한 기존 견해를 전부 바로잡아야 한다는 뜻이 되었다. 해저에도 고원과 계곡이 있으며, 그 고원은 단순한 고원 그 이상의 의미가 담겨 있는 것으로 밝혀진 것이다."
 rapanui.521.g: "해저에도 산맥이 있다는 것인가?"
 rapanui_cable_guy.option: "[SCOPE.sCharacter('rapanui_cable_guy_scope').GetFullName](이)가 수리에 나섭니다."
 rapanui_transatlantic_cable_start_button: "대서양 횡단 케이블 부설 개시"
 rapanui_transatlantic_cable_start_button_desc: "해저 케이블 부설 계획에 필요한 투자자를 충분히 확보하면, 부설 작업에 본격적으로 나설 수 있습니다."
 rapanui_transatlantic_cable_start_tt: "[GetPlayer.GetName]에서 #V 진행도#! #G 8#! 이상 확보"
 subject_type_rapanui_protectorate: "#O 오세아니아 보호국#!"
 alert_rapanui_pacific_expedition_possible_alert_hint: "우리나라가 [concept_dubois_pacific_expedition]를 보낼 수 있습니다. 개최를 위해서는 #V 모르겐뢰테 창#!의 학자 개요 란에 들어가 주십시오."
 rapanui.248.t: "광물"
 rapanui.248.d: "[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]호의 선원들은 항해 도중 원자재가 풍부한 암석 지대를 발견했다. 현재 탐사대가 이 암석 지대를 더욱 자세히 조사하고 있다."
 rapanui.248.f: "덴마크의 태평양 탐사대 갈라테아호에는 지질학자 힌리히 요한네스 링크도 동승하였다. 링크는 당시 덴마크 식민지였던 니코바르 제도의 지리 연구에 주력하였다. 그로부터 다섯 달 뒤 니코바르 열병에 걸린 링크는 결국 덴마크로 귀국하여 평생을 허약한 상태로 보내게 되었다. 이에 따라 링크는 태평양이나 인도양이 아니라 돌아오는 길에 들른 카이로와 몰타에서 지질 자료 대부분을 수집하게 되었다."
 rapanui.248.g: "광물을 최대한 많이 수집하라."
 rapanui.248.h: "이 일대 지질을 더욱 자세히 연구해 보자."
 rapanui.249.t: "이상한 덩어리"
 rapanui.249.d: "최근에 탐사대원들이 해저 물질을 채취하기 위해 그물을 던졌는데 이상한 금속 덩어리를 건져 올렸다. 그 덩어리는 여러 가지 물질이 섞인 것이 분명했다. [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]호에서는 이것을 어떻게 처리해야 할지 아직 결정하지 못하고 있다."
 rapanui.249.f: "\"태평양 해저 전역, 특히 수심이 깊은 북태평양에서는 붉은 점토가 발견된다. 붉은 점토에는 크기가 사고(sago) 알갱이나 카나리아 씨앗만한 것에서 아이 머리나 오렌지만한 것까지 다양한 크기의 자그마한 덩어리들이 섞여 있다. 이 덩어리는 거의 순수한 과산화망간으로 이루어져 있으며, 발견되는 양도 엄청난 수준이다. 저인망 어선들은 와드(wad)라는 광물 덩어리와 매우 유사한 것을 끌어올리기도 하는데, 거의 모든 덩어리의 속에는 물고기 이빨이나 작은 해면 조각, 특정 종류의 화석 등의 내용물이 들어 있으며, 망간이 축적된 중심부를 형성하고 있다.\" - 찰스 와이빌 톰슨"
 rapanui.249.g: "부숴서 자재로 활용하자."
 rapanui.249.h: "[SCOPE.sCharacter('rapanui_scientist').GetLastName] 박사가 조심스럽게 분해해보는 것이 좋겠다."
 rapanui.249.i: "이상하게 생긴 혹이군. 전문 기관에서 연구해서 전시하는 것이 좋겠소."
 rapanui.249.j: "[SCOPE.sCharacter('rapanui_scientist').GetLastName] 박사가 기념으로 챙기고 결론을 내리시오."
 rapanui.269.t: "귀중한 돌"
 rapanui.269.d: "동행 학자로서 호주 연안에 상륙한 [SCOPE.sCharacter('rapanui_scientist').GetFullName](이)가 과거에 사람의 손길이 거의 닿지 않은 암괴들을 탐사할 기회를 갖게 되었다. 그곳에서 오팔과 수정 외에도 여러 가지 희귀한 광물들을 발견하였다."
 rapanui.269.f: "오늘날까지 호주는 희토류, 광물, 금속 등 원자재가 풍부한 국가이며 전세계로 널리 수출되고 있다. 따라서 [SCOPE.sCharacter('rapanui_scientist').GetLastName] 박사가 아직 본인의 소장품에 들이지 못했던 희귀 광물을 호주에서 발견하게 된 것은 결코 우연이 아닐 것이다."
 rapanui.269.g: "내 보물!"
 rapanui.270.t: "불의 고리"
 rapanui.270.d: "[SCOPE.sCharacter('rapanui_scientist').GetFullName](이)가 [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]호에 탑승한 기간이 길어지고 태평양을 항해하는 기간도 길어지면서, 이 지역에서 화산 활동이 얼마나 뚜렷한지를 더욱 확실히 깨닫게 되었다. 화산 지대는 해안선을 따라 고리 모양으로 전개되어 있었는데, 연기를 뿜어내는 큼직한 바위 괴수에 가까이 접근하여 중요한 기록을 남길 수 있었던 것이다."
 rapanui.270.f: "태평양의 '불의 고리'는 태평양을 삼면으로 둘러싸고 있는 화산 지대이다. 홀로세 시기에 벌어진 화산 폭발의 약 90%가 이 지역에서 벌어진 것으로 추정된다. 불의 고리에 존재하는 화산은 총 850개에서 1,000개에 달하며, 그 활동 연대는 지난 11,700년의 세월을 아우르고 있다."
 rapanui.270.g: "태평양은 측면 분출이 벌어지는 하나의 화산 분화구였던 것인가?"
 rapanui.203.l: "[concept_agassiz_geologist] [SCOPE.sCharacter('dubois_geologist_scope').GetFullName]에게는 절호의 기회다."
 rapanui.280.t: "이상한 늑대"
 rapanui.280.d: "#YELLOW [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] 탐사대#! 대원들에게 어느 사냥꾼이 접근해 왔다. 이 사냥꾼은 자신이 잡은 이상한 늑대를 데려와 우리에게 팔겠다고 제안하였다."
 rapanui.280.f: "\"저 짐승들이 귀한 가축들을 잡아먹고 다닌단 말이오! 처음에는 내가 죽이려고 했지만 이 배를 보고 생각이 바뀌었소. 혹시 관심을 보일지도 모르니까...\""
 rapanui.280.g: "이런 이국적인 동물이라면 우리 동물원에 들이기에 충분하다!"
 rapanui.280.h: "그보다 자연 서식지에서 관찰하는 쪽을 택하겠다."
 rapanui.280.i: "아니오, 괜찮소."
 rapanui.502.i: "우리 학자들은 다른 곳에 신경 쓰는 것이 좋겠다."
 alert_rapanui_pacific_expedition_possible_alert_action: "$mr_alert_send_to_academy_tab$"
