 catholic_mission_to_oceania_desc: "오스트레일리아로 선교사를 보내 주민들을 개종시키고 우호 관계를 다집니다. 최적의 상황이라면 영향력을 행사한 지 수년 만에 보호국을 수립하는 결과로 이어질 수 있습니다. 최악의 상황이라면 선교사가 식인종에게 잡아먹힐 것입니다. 그렇게 된다면 우리는 한동안 그의 소식을 듣지 못하게 됩니다."
