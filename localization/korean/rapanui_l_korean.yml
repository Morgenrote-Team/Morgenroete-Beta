 rapanui.290.t: "그레이트 배리어 리프"
 rapanui.290.d: "[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]호가 호주 해역에 있는 암초로 악명높은 그레이트 배리어 리프를 지나가게 되자, [SCOPE.sCharacter('rapanui_scientist').GetLastName] 박사는 이곳을 더 자세히 연구하고 싶다는 뜻을 분명히 밝혔다. 박사가 발견한 것은 상상 이상이었다. 이곳의 암초는 단순히 선박의 항로를 방해하는 장애물 이상의 가치를 지니고 있었던 것이다."
 rapanui.290.f: "1836년 찰스 다윈은 HMS 비글호의 귀환 항해 중에 그레이트 배리어 리프를 방문하였다. 그곳에서 다윈은 몇 가지 고유의 특징을 기록하였는데, 암초의 거대한 외곽 끝이 수백미터 수심까지 깎아지른 듯한 산호벽으로 이루어져 있다는 점이었다. 반대로 석호 내부에서는 살아있는 산호 군락이 전혀 보이지 않았으며, 그곳의 산호 군락은 모두 죽은 것으로 보였다. 다윈은 또 바깥쪽 산호들이 해저가 가라앉는 와중에도 계속해서 위로 자라면서 해수면 근처에 자리를 계속 잡는다는 사실을 꺠달았다. 이러한 관찰을 바탕으로 산호초 형성 과정을 규명할 수 있게 되었다. 1842년 다윈은 〈산호조의 구조와 분포〉를 출간하여 침강설을 제시하였다. 침강설이란 천천히 가라앉는 섬이나 대륙붕에서 산호초가 형성될 수 있다는 설명이다. 그레이트 배리어 리프는 다윈이 제시한 제일 눈에 띄는 사례로서 그 이론을 뒷받침하는 핵심적인 증거로 자리매김하였다."
 rapanui.290.g: "환초의 형성 원인이... 산호라고?"
 notification_rapanui_ring_of_fire_notification_name: "불의 고리"
 notification_rapanui_ring_of_fire_notification_desc: "어느 지질학자가 태평양에서 보고 느낀 점을 바탕으로 획기적인 발견 사항을 정리하여 '불의 고리'로 명명하였습니다."
 notification_rapanui_great_barrier_reef_notification_name: "그레이트 배리어 리프"
 notification_rapanui_great_barrier_reef_notification_desc: "태평양 탐사에 나선 외국 과학자가 호주에 있는 그레이트 배리어 리프의 진가를 처음으로 밝혀냈습니다."
