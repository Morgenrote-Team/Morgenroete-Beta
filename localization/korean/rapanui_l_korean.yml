 rapanui_low_native_aggressiveness_tt: "#YELLOW 원주민의 공격성#!이 #G 낮음#! 상태입니다. 걱정할 필요는 없습니다."
 rapanui_medium_native_aggressiveness_tt: "원주민의 공격성이 #YELLOW 중간#! 상태입니다. 이제부터는 우리 선교사의 목숨이 위험해지지 않도록 주의를 기울여야 합니다."
