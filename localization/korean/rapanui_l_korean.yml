 rapanui.290.t: "그레이트 배리어 리프"
 rapanui.290.d: "As the [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] passes the infamous Great Barrier Reef in Australian waters, Dr. [SCOPE.sCharacter('rapanui_scientist').GetLastName] makes it clear that [SCOPE.sCharacter('rapanui_scientist').GetSheHe] would like to study it more closely. The discoveries [SCOPE.sCharacter('rapanui_scientist').GetSheHe] makes are astonishing - reefs are apparently more than just obstacles to shipping."
 rapanui.290.f: "Charles Darwin visited the Great Barrier Reef in 1836 during the return leg of the HMS Beagle voyage. He noted several distinctive features: the massive outer margins of the reef were formed by towering coral walls that dropped steeply into the open ocean, in some places plunging hundreds of meters. Within the lagoons, by contrast, he observed an absence of living coral formations; the coral colonies there appeared to have died. Darwin also realized that the outer corals maintained their position near the sea surface even as the seabed beneath them subsided, by growing continuously upwards. These observations became the foundation for his general model of coral reef formation. In 1842, he published 'The Structure and Distribution of Coral Reefs', where he presented his subsidence theory. This theory proposed that coral reefs could form on slowly sinking islands or continental shelves. The Great Barrier Reef served as Darwin's most striking example of a barrier reef and became a central piece of evidence for his theory."
 rapanui.290.g: "환초의 형성 원인이... 산호라고?"
