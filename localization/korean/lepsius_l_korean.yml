 lepsius_specialization_egypt_button: "이집트학"
 lepsius_specialization_egypt_button_desc: "이집트학은 기원전 5000년경 선사 시대의 네가데와 바다리 문화부터 기원후 4세기 로마 제국의 통치기에 이르기까지, 고대 이집트 문명의 모든 면모(일상생활, 언어와 문학, 역사와 종교, 문화와 미술, 경제와 법률, 윤리와 학술)를 탐구하는 학문입니다. "
 lepsius_specialization_mesopotamia_button: "아시리아학"
 lepsius_specialization_mesopotamia_button_desc: "아시리아학은 설형문자학이나 고대 근동학으로도 알려져 있으며 설형문자를 사용하던 여러 문화에 대한 고고학, 인류학, 역사학, 언어학 연구를 진행하는 학문입니다. 아시리아학의 연구 분야로는 선왕조 메소포타미아, 수메르 문명, 초기 수메르-아카드 도시국가, 아카드 제국, 에블라, 아시리아와 바빌로니아의 아카드어-제국 아람어권 국가, 메소포타미아 남부의 이민족 왕조 (구트족, 아모리족, 카시트족, 아람족, 수테족, 칼데아족)인 해국 왕조가 있습니다."
 lepsius_specialization_aegean_button: "에게 고고학"
 lepsius_specialization_aegean_button_desc: "에게 문명은 그리스의 에게해 일대에서 발원한 청동기 문명을 통칭하는 용어입니다. 이 용어는 크레타섬, 키클라데스 제도, 그리스 본토라는 세 가지의 뚜렷하면서도 상호작용하는 지리적 권역들을 망라하고 있습니다. 크레타섬은 초기 청동기 시대부터 미노아 문명과 연계되었습니다. 키클라데스 문명은 초기 헬라스 시대에 그리스 본토와, 크레타섬은 중기 미노아 시대와 연관이 있었습니다. 기원전 1450년경 (후기 헬라스, 후기 미노아 시대)부터 그리스 미케네 문명은 크레타섬으로 진출하였는데 군사적 정복에 따른 것으로 추정되고 있습니다."
 lepsius_specialization_precolumbian_button: "선콜럼버스 고고학"
 lepsius_specialization_precolumbian_button_desc: "아메리카의 역사에서 선콜럼버스 시대라 함은 구석기 시대 후기의 아메리카 원주민부터 1492년 크리스토퍼 콜럼버스의 항해로 시작되는 유럽 식민지 개척 시대까지를 아우릅니다. 보통 이 시대는 유럽인들로부터 큰 영향을 받던 시점까지의 원주민 문화의 역사를 다루고 있습니다. 특정 문화권에서는 유럽의 영향력 확대가 콜럼버스 이래 수십년, 수세기 후에 발생하기도 하였습니다."
 lepsius_alexander_search_clue_button: "추가 단서 탐색"
 lepsius_alexander_search_clue_button_desc: "알렉산더 대왕의 무덤에 관한 단서를 발견하기 위해 특별 고고학 탐사를 진행할 수 있습니다."
 lepsius_ark_search_clue_button: "추가 단서 탐색"
 lepsius_ark_search_clue_button_desc: "언약궤에 관한 단서를 발견하기 위해 특별 고고학 탐사를 진행할 수 있습니다."
 lepsius_atlantis_search_clue_button: "추가 단서 탐색"
 lepsius_atlantis_search_clue_button_desc: "아틀란티스에 관한 단서를 발견하기 위해 특별 고고학 탐사를 진행할 수 있습니다."
 lepsius_eldorado_search_clue_button: "추가 단서 탐색"
 lepsius_eldorado_search_clue_button_desc: "엘도라도에 관한 단서를 발견하기 위해 특별 고고학 탐사를 진행할 수 있습니다."
 lepsius_legendary_expedition_modifier: "전설을 찾아 나서는 고고학 탐사"
 lepsius_alexander_intensive_study_button: "시와"
 lepsius_alexander_intensive_study_button_desc: "The Siwa Oasis is considered one of the key places in Alexander's life. Some even claim that he was buried here rather than in Alexandria, due to his strong association with the Egyptian god Ammon, whose oracle was located here. Due to our outstanding knowledge in the field of Egyptology, we can easily find an additional clue here. Our archaeologist will travel privately and covertly, without the fuss of an expedition."
 lepsius_ark_intensive_study_button: "예루살렘"
 lepsius_ark_intensive_study_button_desc: "The Jerusalem Temple Mount is believed to be the last place where the Ark of the Covenant was kept before it disappeared. It is very likely that there are still important clues beneath the Temple Mount as to what could actually have happened in the chaos of the Babylonian conquest. Due to our outstanding knowledge in the field of Assyriology, we can easily find an additional clue here. Our archaeologist will travel privately and covertly, without the fuss of an expedition."
 lepsius_atlantis_intensive_study_button: "산토리니"
 lepsius_atlantis_intensive_study_button_desc: "Santorini (Thera) is famous for its massive volcanic eruption, which severely affected a Minoan city on the island and possibly the entire Minoan civilization. The thesis that the eruption of the volcano was the origin of Plato's story about the sinking of Atlantis is one of the many localization hypotheses about Atlantis. Due to our outstanding knowledge in the field of Aegean Archaeology, we can easily find an additional clue here. Our archaeologist will travel privately and covertly, without the fuss of an expedition."
 lepsius_eldorado_intensive_study_button: "보고타"
 lepsius_eldorado_intensive_study_button_desc: "Bogotá is considered the former capital of the Muisca, a civilization associated with the gold myth of El Dorado. Each new ruler of the Muisca made a sacrifice to the sun god when he took office, his naked body being covered with a paste made of gold dust. Due to our outstanding knowledge in the field of Pre-Columbian Archaeology, we can easily find an additional clue here. Our archaeologist will travel privately and covertly, without the fuss of an expedition."
 lepsius_2_sub_archaeological_team_tt: "발굴단 #R 2팀#! 상실"
 lepsius_egypt_specialist: "이집트학 전공"
 lepsius_egypt_specialist_desc: "이 고고학자는 고대 이집트 분야의 전문가로서 유물과 단서를 보다 수월하게 찾아냅니다."
 lepsius_mesopotamia_specialist: "아시리아학 전공"
 lepsius_mesopotamia_specialist_desc: "이 고고학자는 고대 메소포타미아 분야의 전문가로서 유물과 단서를 보다 수월하게 찾아냅니다."
 lepsius_aegean_specialist: "에게 문명 고고학 전공"
 lepsius_aegean_specialist_desc: "이 고고학자는 미케네와 미노아 문명 분야의 전문가로서 유물과 단서를 보다 수월하게 찾아냅니다."
 lepsius_precolumbian_specialist: "선콜럼버스 고고학 전공"
 lepsius_precolumbian_specialist_desc: "이 고고학자는 선콜럼버스 문명 분야의 전문가로서 유물과 단서를 보다 수월하게 찾아냅니다."
 lepsius_state_trait_alexander: "알렉산더의 흔적"
 lepsius_state_trait_ark: "방주의 흔적"
 lepsius_state_trait_atlantis: "아틀란티스의 흔적"
 lepsius_state_trait_eldorado: "엘도라도의 흔적"
 lepsius.1001.t: "Alexander's Call"
 lepsius.1001.d: "The inauguration of a world-leading, excellent collection of Egyptian artifacts brings back a memory that some scientists at the Archaeological Museum had long since suppressed..."
 lepsius.1001.f: "The memory of the Macedonian temple in the sand is awakened as [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetFullName] looks at the exhibition. Because there are other pieces from the Ptolomaic period, some even from the time of the Greek conquest. Pieces of the puzzle that were previously impossible to interpret suddenly make sense. A hint that there could be more lying dormant in the Egyptian desert. Something so big and massive that the entire Sahara isn't enough to bury it. The final resting place of Alexander the Great remains a mystery to this day. But the many finds, the vast amount of knowledge, and the brilliant archaeological expertise of Dr. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] are a mixture that is historically unique. The archaeologist is sure: Alexander was a man who belonged to the living, not the dead. And whoever would ever find his eternal resting places - would achieve eternal fame."
 lepsius.1001.g: "Every archaeologist's dream ..."
 lepsius.1002.t: "The Ark"
 lepsius.1002.d: "The inauguration of a world-leading, excellent collection of Mesopotamian artifacts brings back a memory that some scientists at the Archaeological Museum had long since suppressed..."
 lepsius.1002.f: "Cherubim decorated the Ark of the Covenant. Hybrid creatures as they occur in Mesopotamia. Abraham, the progenitor of Israel and three world religions, came from Ur. The creation account shows parallels to the Babylonian myths. Babylon is at the same time a place of fate for Israel: it was the rulers of Mesopotamia who destroyed the first Jewish states, reduced the Temple to ashes and deported the population. Since that day, the Ark of the Covenant, in which Moses is said to have placed the Ten Commandments, has also disappeared without a trace. It is one of the most important lost artifacts in world history. With an eye on the perfect collection, [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetFullName] has found clues that show that the Ark of the Covenant may not have been lost forever - and has been waiting to be recovered for 2,500 years."
 lepsius.1003.t: "The Greatest Myth of all"
 lepsius.1003.d: "The inauguration of a world-leading, excellent collection of Aegean artifacts brings back a memory that some scientists at the Archaeological Museum had long since suppressed..."
 lepsius.1003.f: "[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetFullName] looked at the orichalcum between [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] fingers. A small shiny ball. A material that wasn't allowed to exist. It had fallen into [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] hand after the Archaeological Museum opened its magnificent exhibition. An exhibition in which other exhibits from the Minoan-Aegean region also cemented [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] opinion that this was on the threshold between science and myth. Was an archaeologist allowed to dream? Nobody believed Schliemann when he searched for Troy. The Tower of Babel had also been dismissed as a mere metaphor. But what about the greatest myth of all time? A myth so big that even the ancient world no longer seemed to know what was narrative or what was history.\nDr. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] looks into the shiny little ball in which [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] face is reflected. The fate of an entire lost civilization looks back."
 lepsius.1004.t: "The Curse of Gold"
 lepsius.1004.d: "The inauguration of a world-leading, excellent collection of Pre-Columbian artifacts brings back a memory that some scientists at the Archaeological Museum had long since suppressed..."
 lepsius.1004.f: "Since the arrival of Europeans in America, rumors have been circulating. Deadly rumors. Countless men perished because their greed for gold drove them: into the arms of warring tribes, into malaria-infested swamps and into storms at sea. Ponce de Léon was looking for the fountain of youth. Vázquez de Coronado searched for the Seven Cities of Gold. Hernando de Soto traversed much of North America in search of unknown riches. The hope of becoming famous and wealthy like Cortés and Pizarro was too seductive, although deceptive. But now that [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetFullName] is inspired by the supposed Inca idol and compares it with other artifacts from the rich pre-Columbian exhibition, [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerselfHimself] fears that [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] may succumb to the same gold fever. In the end, should it be science that led [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim] to the road to El Dorado?"
 je_lepsius_archaeology_start_in_egypt: "The Birth of Egyptology"
 je_lepsius_archaeology_start_in_egypt_reason: "There are still many treasures waiting to be discovered in the deserts of Egypt. Will one of our archaeologists usher in a new era of Egyptology and make [Concept('concept_lepsius_expedition','$concept_lepsius_expeditions$')] to Egypt possible?"
 lepsius.22.t: "The Birth of Egyptology"
 lepsius.22.d_egyptology: "After an expedition to Egypt, Dr. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] presented [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] research. Not only was [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] able to find various new sites thanks to the decipherment of the Hieroglyphes, [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] findings sparked new interest in the region as well."
 lepsius.22.f_egyptology: "#b Historical Context:#! After the death of François Champollion, research into hieroglyphs came to a halt. In 1837, the young German philologist Karl Richard Lepsius wrote a letter to Ippolito Rosellini, a close companion of Champollion and jointly responsible for the Franco-Tuscan Egyptian expedition of 1829. Lepsius systematized and presented the knowledge accumulated by Champollion and was instrumental in elevating Egyptology to a serious science. On the other hand, he convinced the political elites of Europe of future expeditions to Egypt."
 notification_lepsius_birth_of_egyptology_notification_name: "The Birth of Egyptology"
 notification_lepsius_birth_of_egyptology_notification_desc: "An Archaeologist from [GetGlobalVariable('lepsius_egyptology_invented_country_global_var').GetCountry.GetName] has set out to an expedition to Egypt, ushering in a new era of Egyptology. We should send an Archaeologist to Egypt too, like all great nations!"
 je_lepsius_yucatan_expedition: "Expedition to Yucatán"
 je_lepsius_yucatan_expedition_reason: "There are rumors of ancient ruins in the Yucatán jungles. It is said that fantastic treasures await a brave explorer. Perhaps an Archaeologist can find the Mayan treasures for us? This would allow us and other nations to embark on [Concept('concept_lepsius_expedition','$concept_lepsius_expeditions$')] to Yucatán."
 lepsius.23.t: "[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] Expedition"
 lepsius.23.d: "Dr. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] and [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] team spent months in the jungles of Yucatán. Now they have returned with treasures, information and various drawings of the ruins they found. This will start a new era of archaeology in Central America."
 lepsius.23.f: "#b Historical Context:#! Was the New World only home to savages and barbarians before Europeans reached the continent? The explorers John Lloyd Stephens and Frederick Catherwood profoundly shook this world view. For several years, the American and the Brit roamed the jungle of the Yucatan Peninsula and, according to their own statements, visited 44 different locations of a long-gone Mesoamerican culture. The locals have been telling stories of long-forgotten cities in the jungle and temples hidden in the jungle for a long time; but Stephens' reports, and especially Catherwood's stunning lithographs, open up a world hitherto completely unknown. The images of temples, statues and steles not only inspire the fantasies of romantics. A wave of interest in the unknown civilization is spreading across the US and Europe, ranging from curiosity to glorification to genuine scientific interest."
 notification_lepsius_yucatan_expedition_notification_name: "Yucatán Expedition"
 notification_lepsius_yucatan_expedition_notification_desc: "An Archaeologist from [GetGlobalVariable('lepsius_yucatan_expedition_country_global_var').GetCountry.GetName] has returned from an adventurous journey on the Yucatán Peninsula - and tells of legendary ruins in the jungle. Scientists have expressed interest in exploring the Mayan culture more closely."
 lepsius.1011.t: "[SCOPE.sState('lepsius_location_state').GetNameNoFormatting]"
 lepsius.1011.d_alexander: "Another chapter in the search for the tomb of the most powerful man in antiquity begins. The information so far suggests that there may be a lead in [SCOPE.sState('lepsius_location_state').GetName] that could help locate the Alexander Mausoleum. The excavation teams and Dr. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] are ready."
 lepsius.1011.d_ark: "A warm wind from the desert touches the expedition team and Dr. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] as they reach the goal of their search with [SCOPE.sState('lepsius_location_state').GetName]. The secret of the Ark of the Covenant will be unraveled once again here."
 lepsius.1011.d_atlantis: "Was [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] a fool? One of thousands in thousands of years? How many had believed Plato's story and either never returned - or full of shame and grief? Dr. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] knows: There was only success on this journey. Anything else meant the end of [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] career."
 lepsius.1011.d_eldorado: "The expedition members complain about the tropical climate. Dr. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] cools himself off with a fan. The trail leads to a remote area. Some porters rumor that they may become as lost as so many Spanish conquistador troops in their search for gold..."
 lepsius.1011.f: "'Ask yourself, why do you seek the Cup of Christ? Is it for His glory, or for yours?'"
 lepsius.1011.g: "Dig deeper."
 lepsius.1012.t: "Successful Return"
 lepsius.1012.d_alexander: "The unbearable heat disappears for a moment. Dr. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] looks at [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] notes. New connections shed new light on the search for Alexander the Great's mausoleum. A thought flashes through [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] mind. It wouldn't be long before [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] would encounter history... and make history."
 lepsius.1012.d_ark: "The search for the Ark of the Covenant was more than a search for an archaeological artifact. It was the search for a lost cult object that promised contact with God. Dr. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] had experienced this again and again on this trip. But how many archeological pilgrimages did [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe]  have to endure before this contact came about?"
 lepsius.1012.d_atlantis: "The myth of Atlantis lives on. Dr. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] knows that the journey has not yet come to an end. As [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] looks out over the sea at the harbor and sees the birds circling, [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] philosophizes about how many challenges still need to be overcome before they finally reach their destination."
 lepsius.1012.d_eldorado: "To the surprise of the rest of the expedition team, the scientists return alive and in one piece. For a moment it seems forgotten that Dr. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] sent them on a suicide mission. The successful completion of this stage on the way to El Dorado proves [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim] right."
 lepsius.1012.f: "'The search for the Grail is the search for the divine in all of us. But if you want facts, I've none to give you. At my age, I'm prepared to take a few things on faith.'"
 lepsius.1012.g: "Another fragment of a large mosaic."
 lepsius.1013.t_alexander: "Siwa"
 lepsius.1013.d_alexander: "Disguised as a Bedouin, Dr. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] was able to single-handedly find access to the destroyed Oracle of Ammon. During the investigation, [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] found preserved papyri from the early reign of the Ptolomaians in a previously inaccessible area, which provide information about the Alexander cult."
 lepsius.1013.t_ark: "Jerusalem"
 lepsius.1013.d_ark: "Where else than in the Holy City could a clue pointing to the fate of the Ark of the Covenant be found with greater certainty? With a mixture of bribery and breaking the law, Dr. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] managed to search into the hidden tunnel system under the Dome of the Rock and find a crucial clue to the whereabouts of the precious artifact."
 lepsius.1013.t_atlantis: "Santorini"
 lepsius.1013.d_atlantis: "Minoan traces can still be seen on Santorini under the rubble of the massive eruption thousands of years ago. Dr. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] has examined an ancient palace that fell victim to the catastrophic disaster; [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] uncovered and restored a whole series of buried frescoes. One of them shows a map that, surprisingly, shows the features of the Mediterranean and the Atlantic west coast precisely."
 lepsius.1013.t_eldorado: "Bogotá"
 lepsius.1013.d_eldorado: "Dr. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] has explored the area surrounding Bogotá, where the mysterious Musica people once lived. Tips from the locals led [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim] to a previously unknown place, where numerous Muisca artifacts provide more information about the ritual of the \"Golden Man\"."
 lepsius.1013.f: "Countries that focus on a specific archaeological branch consistent with the goal of a Legendary Expedition have far-reaching advantages in their quest for an archaeological sensation. This doesn't just apply to obtaining an additional clue that will speed up your search."
 lepsius.1013.g: "Another fragment of a large mosaic."
 lepsius_discovery_vilcabamba_modifier: "The Discovery of Vilcabamba"
 lepsius_peru_inspection_modifier: "Our archaeologist visits our excavation team in Peru to establish a new excavation site."
 lepsius_add_1_vilcabamba_clue_tt: "페루 지역의 중대한 고고학 발견에 관한 새로운 단서 #G 1개#! 획득"
 lepsius_add_2_vilcabamba_clue_tt: "페루 지역의 중대한 고고학 발견에 관한 새로운 단서 #G 2개#! 획득"
 lepsius_add_3_vilcabamba_clue_tt: "페루 지역의 중대한 고고학 발견에 관한 새로운 단서 #G 3개#! 획득"
 je_lepsius_discovery_vilcabamba: "Investigations in Peru"
 je_lepsius_discovery_vilcabamba_reason: "We have every reason to believe that not all of the Incan mysteries have been solved yet. The search could take us years. Whoever succeeds in making this discovery should have a place in history for it."
 je_lepsius_discovery_vilcabamba_goal: ""
 je_lepsius_disovery_vilcabamba_success: "Should we manage to find ten clues in Peru, we will have gathered enough material to rediscover a lost place of great historical significance."
