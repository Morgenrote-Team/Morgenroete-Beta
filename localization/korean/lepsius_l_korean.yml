 lepsius.5000.t: "The Ruins of Palmyra"
 lepsius.5000.d: "Our country is the home to the Ruins of the ancient city of Palmyra. Our Archaeologists are eager to start excavating the site and learning as much from it as possible."
 lepsius.5000.f: "Palmyra is an ancient city Syria that existed over centuries. The city was well known for its merchants. The wealthy merchants constructed many monuments that survived the time. As a result, many of the ancient buildings underwent alterations, a difficult situation for the archaeologists.\nThe city is famous not only for its merchants but also for Zenobia, queen of the short-lived Palmyran Empire. She seized control of the east of the Roman Empire for some time until Emperor Aurelian reconquered the east and destroyed the city of Palmyra."
 lepsius.5000.g: "I wonder, what we will find!"
 lepsius.5001.t: "Temple of Bel restored"
 lepsius.5001.d: "Our archaeologists have been working tirelessly to restore the Temple of Bel. Additions and alterations from the city's Muslim period had to be removed and buried parts of the building had to be freed."
 lepsius.5001.f: "The Tell or hill on which the temple was built was already used by humans as early as 3000 B.C. as our stratigraphic analysis revealed. The temple that we reconstructed as much as possible is a the Roman temple, dating back to the late first and the first half of the second century AD.\nLater the temple was converted into a Christian church and once the Arabs conquered the region it became a mosque.\n\n#V Today:#! Sadly the Temple of Bel was destroyed by ISIS in 2015. There are plans however to reconstruct the temple with the parts that are still existing."
 lepsius.5001.g: "I wonder, what we will find!"
 lepsius.5002.t: "Valley of the Tombs excavated"
 lepsius.5002.d: "There are many tombs to the west of Palmyra. They are home to impressive tomb towers that our archaeologists excavated and partly restored."
 lepsius.5002.f: "The Necropolis called Valley of the Tombs houses many tower-tombs. The earliest one dates back to 9 B.C. and is called Tower of Atenaten. Another Tower, the Tower of Elahbel was constructed during the reign of Emperor Trajan by the Palmyrene aristocrat Marcus Ulpius Elahbelus. Elahbelus seems to have become a Roman citizen when Emperor Trajan was in power as they share their first and second name.\nAnother interesting find are silk fragments that were probably brought from China.\n\n#V Today:#! Many of the Tombs were destroyed when ISIS controlled Palmyra. Among them were the Tower of Elahbel the Tower of Iamblichus."
 lepsius.5002.g: "Impressive!"
 lepsius.5003.t: "Palmyra - City of Palm Trees"
 lepsius.5003.d: "Our Archaeologists have spent many years unearthing the remains of Palmyra and rebuilding what is possible. Now the once wealthy city is a place worth visiting again."
 lepsius.5003.f: "The ruins of Palmyra attract visitors again. Many people want to see the ruins of the once great city that even took on Rome but lost. The majestic Tomb Towers, the Great Colonnade, the Temple of Bel and the Temple of Baalshamin all show the once great wealth of the city. It must have been a fantastic sight when the City of Palm Trees was at its greatest!"
 lepsius.5003.g: "A wonderful place to visit!"
