 je_lepsius_labyrinth: "미궁"
 je_lepsius_labyrinth_reason: "크레타의 탐사 대장이 어떤 발굴 보고서에서도 등재되지 않은 고대의 지하 유적지에서 길을 잃었습니다. 출구를 찾아낸다면 영광과 명예가 기다리고 있겠지만, 그렇지 못한다면 이곳에서 비참하게 생을 마감할 것입니다."
 je_lepsius_labyrinth_fail: "탐사 대장이 너무 자주 길을 잃으면 정말이지 끔찍한 일이 벌어질 위험성이 있습니다..."
 je_lepsius_labyrinth_success: "탐사 대장이 모든 지점에서 정답을 찾아내야만 미로를 안전히 빠져나갈 수 있습니다."
 je_ishtar_gate: "이슈타르의 문 복원"
 je_ishtar_gate_reason: "바빌로니아 탐사대가 전설 속 이슈타르 문의 잔해를 발견한 뒤, 우리는 발굴 허가를 연장하여 바빌로니아의 벽돌을 우리 박물관으로 실어 나르기로 하였습니다."
 je_ishtar_gate_success: "문이 과거의 영광 그대로 복원되려면 총 20만 개의 벽돌이 필요합니다. 한 해에 우리에게 도착하는 벽돌의 수는 약 2만 개로 예상됩니다. 별다른 문제가 없다면 말이죠."
