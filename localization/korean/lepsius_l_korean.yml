 je_lepsius_cleopatras_needle: "클레오파트라의 첨탑"
 je_lepsius_cleopatras_needle_reason: "수백 년 동안 알렉산드리아의 두 오벨리스크는 '클레오파트라의 첨탑'이란 이름으로 알려지며 이방인들의 관심을 끌어모았다. 그 중 하나는 이미 영국에 선물로 전달되었으나, 런던까지의 거리가 너무 먼 바람에 오벨리스크 복원 계획은 무산되고 말았다. 어쩌면 우리도 이 전례를 따라 이집트 당국에 다른 한쪽 첨탑을 가져도 되는지 문의할 수 있지 않을까? 이것이 실현되려면 당연히 이집트학계를 선도하는 국가가 되어야 할 것이다."
 je_lepsius_cleopatras_needle_fail: "다른 국가에서 클레오파트라의 첨탑을 수송할 권리를 확보함"
 je_lepsius_cleopatras_needle_transport: "클레오파트라의 첨탑 - 수송"
 je_lepsius_cleopatras_needle_transport_reason: "오벨리스크의 운반은 생각보다 훨씬 어려운 일이다. 프랑스 콩코르드 광장에 잇는 오벨리스크는 하나 뿐이고, 전달하기로 약속받았던 나머지 하나가 여전히 룩소르에 우뚝 서 있는 것은 어찌보면 당연한 일이다."
 je_lepsius_cleopatras_needle_transport_success: "오벨리스크가 수도로 옮겨지면 고고학자는 복원 준비에 나서고 공학자가 직립 공사를 도와야 합니다.\n\n#R 주의:#! 고고학자의 복원 작업과 공학자의 직립 공사는 오벨리스크가 도착하기 전까지 시작되지 않습니다."
 je_lepsius_ishtar_gate: "이슈타르의 문"
 je_lepsius_ishtar_gate_reason: "이르면 1815년 클라우디우스 리치가 바빌론 유적의 지형 조사를 실시했던 것으로 전해진다. 그 당시에도 이런 큼직한 언덕은 궁전이나 심지어 바벨탑일 수 있다는 결론을 내렸다. 궁정의 전체 권역 가운데 현존하는 것은 얼마나 되는지, 거기서 복원할 수 있는 것은 있는지는 아직 미지수이다. 그러나 현대적인 조사가 이루어진다면 언덕의 실체를 조명할 수 있을 것으로 전망된다. 물론 그 유물을 챙겨 고국으로 가져갈 수 있다는 허가를 보장받아야 할 것이다. "
 je_lepsius_ishtar_gate_fail: "다른 국가에서 이슈타르의 문을 발견함"
 je_lepsius_ishtar_gate_transport: "이슈타르의 문 - 수송"
 je_lepsius_ishtar_gate_transport_reason: "바빌로니아 탐사대가 전설 속 이슈타르의 문의 잔해를 발견한 이후 우리는 발굴 허가를 연장하여 바빌로니아의 벽돌을 조국의 박물관으로 실어나를 수 있게 되었다."
 je_lepsius_ishtar_gate_transport_success: "이슈타르의 문이 과거의 영광을 되찾기 위해서는 총 20만 점의 벽돌이 필요합니다. 문제 없이 진행된다는 전제 하에서 해마다 우리나라에 도착하는 벽돌의 수는 약 2만여 점에 달할 것으로 예상됩니다. 수송 절차는 바빌로니아 발굴을 계속해서 진행하는 동안에만 이루어지게 됩니다.\n\n#R 중요:#! 고고학자들이 복원 작업에 착수하고 공학자들이 시공하기 위해서는 최소 10만 점의 벽돌이 반입되어야 합니다."
 je_lepsius_piedras_negras: "피에다스 네그라스 비석"
 je_lepsius_piedras_negras_reason: "피에드라 네그라스는 과테말라의 대표적인 마야 도시로 기원전 7세기 경부터 사람이 거주했던 것으로 알려져 있다. 7세기부터 9세기에 즈음하여 자체적인 도시 국가를 꾸려 문화 면에서 황금기를 이루었던 것으로 알려져 있으며 기념 비석을 여럿 세운 것으로도 유명하다. 그 중에 특별한 비석 하나를 우리 박물관에 들일 수 있지 않을까?"
 je_lepsius_piedras_negras_fail: "다른 국가에서 피에다스 네그라스 비석을 자국의 박물관으로 옮김"
 je_lepsius_piedras_negras_transport: "피에다스 네그라스 비석 - 수송"
 je_lepsius_piedras_negras_transport_reason: "1930년대 미국 펜실베이니아 대학 박물관은 대대적인 탐사대를 꾸려 과테말라의 울창한 정글 숲에 서 있던 수 톤에 달하는 비석을 극한의 환경 속에 옮겨오는 작업에 나섰다. 제대로 된 도로는 없었기에 거대 비석을 나무 썰매와 뗏목을 이용해 위험천만한 우수마신타강을 건너 조심스럽게 옮겨야 했다."
 je_lepsius_piedras_negras_transport_success: "피에드라 네그라스 비석이 수도로 옮겨지면 고고학자는 복원 준비에 나서고 공학자가 직립 공사를 도와야 합니다.\n\n#R 주의:#! 고고학자의 복원 작업과 공학자의 직립 공사는 비석이 도착하기 전까지 시작되지 않습니다."
 je_lepsius_axum_obelisk_transport: "악숨 오벨리스크 - 수송"
 je_lepsius_axum_obelisk_transport_reason: "역사적인 측면에서 1937년 악숨에서 로마로 오벨리스크를 운반하고 다시 세우는 것은 대단히 중요한 사업이었다. 로마에 옮겨진 오벨리스크는 내부에 금속 막대를 넣어 단단히 고정한 채로 세워지게 되었다."
 je_lepsius_axum_obelisk_transport_success: "오벨리스크가 수도로 옮겨지면 고고학자는 복원 준비에 나서고 공학자가 직립 공사를 도와야 합니다.\n\n#R 주의:#! 고고학자의 복원 작업과 공학자의 직립 공사는 오벨리스크가 도착하기 전까지 시작되지 않습니다."
