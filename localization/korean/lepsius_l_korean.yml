 lepsius.1601.t: "[SCOPE.sCharacter('lepsius_donator_scope').GetLastName]'s Donation"
 lepsius.1601.d: "[SCOPE.sCharacter('lepsius_donator_scope').GetFullName] is considered a collector of rare Egyptian rarities. His Egyptological interests have led to him now owning a remarkable collection. He has generously offered to donate his exquisite artifacts to the Archaeological Museum."
 lepsius.1602.d: "It is a well-known fact that [SCOPE.sCharacter('lepsius_donator_scope').GetFullName] has probably the most impressive private collection of Mesopotamian artifacts. He has signaled to the government that this collection could be transferred to state hands, although some critical observers warn that he may demand something in return."
 lepsius.1603.d: "[SCOPE.sCharacter('lepsius_donator_scope').GetFullName] may not be considered the most art-loving person, but as luck would have it, he discovered some archaeological treasures of great value on his property, which he has been keeping under lock and key for a few years. Since he can't do much with them, he has offered the government to donate them to the Archaeological Museum."
 lepsius.1604.d: "[SCOPE.sCharacter('lepsius_donator_scope').GetFullName] has taken several trips through South America in recent years, where he has collected important relics of Mesoamerican and Andean cultures as souvenirs. Now he has announced that he wants to donate these artifacts to the museum."
 lepsius.1605.d: "[SCOPE.sCharacter('lepsius_donator_scope').GetFullName] was impressed by the ancient Aegean cultures. He has been collecting artifacts from Crete for a few years and even had an entire Minoan fresco brought to his villa. However, knowing his social obligations, he decided to donate his treasures to the [ROOT.GetCountry.GetAdjectiveNoFlag] people."
 lepsius.1601.f: "Numerous archaeological collections date back to the Renaissance princes, who collected ancient art objects and bought them through dealers. In 1824, King Charles Felix acquired the material from the Drovetti collection (5,268 pieces, including 100 statues, 170 papyri, stelae, mummies, and other items), that the French General Consul, Bernardino Drovetti, had built during his stay in Egypt. This later became the basis of the Egyptian Museum in Turin. Rich entrepreneurs and influential elites also had an interest in collecting status symbols, which they often donated to the public in their wills. It was often the case that people not only wanted to improve their own reputation through such donations, but also hoped for a better standing in society."
 lepsius.1601.g: "A wonderful donation for our museum!"
 lepsius.1601.h: "This sycophant is just trying to take advantage."
 lepsius.1606.t: "Egyptomania"
 lepsius.1606.d: "A group of people who are passionate about Egypt have come together. The group is led by [SCOPE.sCharacter('lepsius_esoteric_leader').GetFullName]. Some may not share the almost fanatical admiration for ancient Egypt, but the appearance may have advantages."
 lepsius.1606.f: "Although the 19th century is viewed as being progressive in many respects and dominated by the scientific spirit, it was precisely during this time that several forms of occult and pseudoscientific phenomena became widespread. The best known of these is spiritualism, which wanted to prove the existence of spirits. Archaeological research not only inspired many misguided theories, but also pseudo-scientific and esoteric movements such as Panbabylonism, Mayanism and the belief in Atlantis. Although such phenomena could often have a corrosive effect on science, certain phenomena enjoyed a certain fashion and popularized scientific research that they could have quite fruitful side effects."
 lepsius.1606.g: "Let them indulge in their little cult."
 lepsius.1606.h: "Ban this humbug."
 lepsius.1607.t: "Mayanism"
 lepsius.1607.d: "Some elites in our country have fallen into the strange misconception that the world follows an ancient calendar that dates back to the Maya. Furthermore, this people would have possessed knowledge that holds the secrets of the universe. One could laugh at these absurd ideas if the influential group wasn't led by [SCOPE.sCharacter('lepsius_esoteric_leader').GetFullName]."
 lepsius.1608.t: "Panbabylonism"
 lepsius.1608.d: "A group of people has caused a stir in society and science by insisting that all knowledge comes from Babylon; even the Jewish and Christian religions are a mere imitation. [SCOPE.sCharacter('lepsius_esoteric_leader').GetFullName] is also involved in this 'Club of Panbabylonists' who are trying to spread their ideas."
 lepsius.1608.g: "This is pseudoscience!"
 lepsius.1608.h: "Great."
 lepsius.1609.t: "Atlantism"
 lepsius.1609.d: "[SCOPE.sCharacter('lepsius_esoteric_leader').GetFullName] leads an esoteric-pseudo-scientific group that claims that Atlantis is not a myth, but a historical city that had advanced technology in the Ice Age. Furthermore, all cultures descended from Atlantis. He wants to make contact with the spirits of the Atlantids in weekly seances."
 lepsius.1609.h: "Who can say whether it's true or just a legend?"
 lepsius.1609.i: "There is solid evidence of Atlantis."
 lepsius.1610.t: "Archaeological Investment"
 lepsius.1610.d: "The director of the Archaeological Museum has offered to support the training of new specialists. However, this would involve additional costs."
 lepsius.1610.f: "The Institute has heard that the government currently has a particular interest in promoting archaeology in our country. Additional financial support could help recruit new, promising assistants.'"
 lepsius.1610.g: "Give the museum an additional financial injection."
 lepsius.1610.h: "That's not worth it."
 lepsius.1611.t: "박물관 입장료"
 lepsius.1611.d: "박물관에서 늘어나는 운영비를 감당하기 위해 입장료를 인상할 수밖에 없는 상황에 놓였다. 추가 수익은 국가에서 환수할 수도 있다. 그러나 이렇게 되면 조국의 위신에 다소 부정적인 영향을 미칠 수도 있다."
 lepsius.1611.f: "'입장권 매진!'"
 lepsius.1611.g: "입장료를 인상한다."
 lepsius.1611.h: "입장료를 인하한다."
 lepsius.1611.i: "입장권이라니? 박물관 입장은 무료로 해야지!"
 lepsius.1612.t: "The Legacy of Director [SCOPE.sCharacter('lepsius_director_scope').GetLastName]"
 lepsius.1612.d: "The recently deceased museum director [SCOPE.sCharacter('lepsius_director_scope').GetLastName] was a respected man. He enjoyed an excellent scientific reputation. But a recent discovery could tarnish his legacy."
 lepsius.1612.f: "An investigation has shown that [SCOPE.sCharacter('lepsius_director_scope').GetFullName] repeatedly received private donations from anonymous individuals during his term of office. However, he never gave these artifacts to the museum - but kept them for himself. Although there are only a few individual pieces, they are no less valuable. The entire Intelligentzia is threatened with a real scandal."
 lepsius.1612.g: "The truth must come out!"
 lepsius.1612.h: "[SCOPE.sCharacter('lepsius_director_scope').GetFullName] was a honorable man."
 je_lepsius_pompeii: "Modern Excavations in Pompeii"
 je_lepsius_pompeii_reason: "The ancient Roman city of Pompeii, which was buried by an eruption of Mount Vesuvius in 79 AD, has been excavated since the 18th century. In many ways, however, this type of exploration can largely be described as plunder, destroying scientific material to acquire art treasures or destroying valuable material out of sheer ignorance. New archaeological methods could significantly improve Pompeii research."
 je_lepsius_teotihuacan: "Teotihuacán"
 je_lepsius_teotihuacan_reason: "Teotihuacán was already considered a mysterious place by the Aztecs that had emerged long before their rule - for them, this ruined city had to be the birthplace of the gods. In fact, much evidence suggests that Teotihuacán was an ancient city that influenced much of Central America centuries before the Aztec Empire and is one of the largest pre-Columbian sites in the Americas. The Mexican government therefore has more than just scientific reasons to research this place in more detail. Teotihuacán can be seen as a symbol of a long, uninterrupted culture in Mexico and thus as a forerunner of our nation. The reconstruction of the partially destroyed Sun Pyramid of Teotihuacán before the 100th anniversary of independence is intended to underline this symbolism and celebrate national unity and history."
 je_lepsius_harappa: "The Indus Valley Civilisation"
 je_lepsius_harappa_reason: "Although the ruin site in Harappa has been known for some time and was first described by Charles Masson in 1844 in his book 'Narrative of Various Journeys in Balochistan, Afghanistan and The Panjab' as 'a ruined fortification built of brick', its significance is still not completely clarified. Perhaps there are previously completely unknown archaeological treasures in India too?"
 je_lepsius_first_emperor: "The Tomb of the First Emperor"
 je_lepsius_first_emperor_reason: "China is a young nation in the field of archaeology. Our researchers need to go out into the world and gain experience in order to deepen their knowledge. Only when we have enough success and our archaeologists are sufficiently trained can we attempt the greatest archaeological adventure: namely, examining the tomb of the First Emperor, a task that no one has yet dared to undertake."
 lepsius.7.t: "The Excavation of Pompeii"
 lepsius.7.d: "In Pompeii, new scientific methods are to be tested under the direction of Prof. [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName]. This is a turning point in the excavation history of Pompeii. However, the focus of the research still needs to be decided."
 lepsius.7.f: "Giuseppe Fiorelli's excavations opened a new chapter in the study and excavation of Pompeii. During early excavations of the site, occasional voids in the ash layer had been found that contained human remains. Fiorelli realised these were spaces left by the decomposed bodies, and so devised the technique of injecting plaster into them to recreate the forms of Vesuvius's victims. This technique is still in use today, with a clear resin now used instead of plaster because it is more durable and does not destroy the bones, allowing further analysis. Fiorelli also introduced scientific documentation. He divided the city into today's nine areas and blocks and numbered the entrances of the individual houses. Fiorelli also published the first periodical with excavation reports. Under his successors, the entire west section of the city was exposed."
 lepsius.7.g: "We are primarily interested in artifacts."
 lepsius.7.h: "We need to know more about the past."
 lepsius.7.i: "We want to train a new generation of scientists."
 lepsius.8.t: "The Pyramid of the Sun of Teotihuacán"
 lepsius.8.d: "[SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName] looks at the panorama of Teotihuacán from the highest point of the reconstructed pyramid: this prestigious project has overcome an important hurdle, but it is still unclear what concrete benefit the country will derive from the excavations."
 lepsius.8.f: "Teotihuacán in the Central Highlands of Mexico is one of the most important prehistoric ruin metropolises in the Americas, best known for its step temples such as the Great Pyramid of the Sun. The area of Teotihuacán had been permanently inhabited since the sixth century BC. Between 100 and 650 AD, the city was the dominant cultural, economic and military center of Mesoamerica. At the peak of its development it may have had up to 200,000 inhabitants. At its time, it was by far the largest city on the American continent and one of the largest in the world. From around 650 its importance declined until around 750 it was largely abandoned for reasons that are not fully understood. Their cultural influences continued to shape central Mexico until the Spanish conquest of Mexico."
 lepsius.9.t: "An unknown Civilization"
 lepsius.9.d: "[SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName] is completely amazed. It seems that he has found traces of a previously completely unknown culture that settled in the Indus Valley thousands of years ago - and would therefore be a cradle of civilization like Egypt or Babylon. Decades of research are pending - but what are the priorities?"
 lepsius.9.f: "The Bronze Age Indus Civilization, also known as the Indus Civilization or Harappan Culture, was one of the earliest urban civilizations. It existed between around 2800 BC and 1800 BC along the Indus in the northwest of the Indian subcontinent. The Indus Civilization extended across almost all of what is now Pakistan as well as parts of India and Afghanistan. In 1912, J. Fleet found seals with unknown characters in what was then British India, which aroused the interest of the scientific public in Europe. Excavations were then carried out in Harappa and Mohenjo-Daro in 1921/22 under the direction of John Marshall, the then director of the British Antiquities Service. The similarity of the two excavated cities quickly made it clear that a previously unknown advanced culture had been discovered here."
 lepsius.70.t: "An Army of Terracotta"
 lepsius.70.d: "[SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName] has made an amazing discovery when he examined the area around the Mausoleum of the First Qin Emperor: An army made entirely of terracotta that defends the dead emperor to this day."
 lepsius.70.f: "'In the ninth month, the First Emperor was interred at Mount Li. Digging and preparation work at Mount Li began when the First Emperor first came to the throne. Later, after he had unified his empire, 700,000 men were sent there from all over his empire. They dug through three layers of groundwater, and poured in bronze for the outer coffin. Palaces and scenic towers for a hundred officials were constructed, and the tomb was filled with rare artifacts and wonderful treasure. Craftsmen were ordered to make crossbows and arrows primed to shoot at anyone who enters the tomb. Mercury was used to simulate the hundred rivers, the Yangtze, Yellow River, and the great sea, and set to flow mechanically. Above were representation of the heavenly constellations, below, the features of the land. Candles were made from fat of \"man-fish\", which is calculated to burn and not extinguish for a long time.' -Sima Qian"
 lepsius.70.g: "China's ancient greatness is astounding."
 lepsius.61.t: "The Excavation in [SCOPE.sState('lepsius_excavation_state').GetName]"
 lepsius.61.d: "During the occupation of [SCOPE.sState('lepsius_excavation_state').GetName], archaeological teams and artifacts fell into our hands. The archaeologists insist not to interrupt the scientific work and to protect the excavation site. Some officers, however, insist that we should help ourselves to the loot."
 lepsius.61.f: "Unfortunately, looting of important excavation sites is not uncommon. Approaching armies did not always live up to their reputation of preserving and protecting art treasures. In some cases, it was only exposure to the prospect of returning with additional loot that aroused the desires of ambitious men - why should what was true in Sulla's time be any different today?"
 lepsius.61.g: "Loot the excavation site!"
 lepsius.61.h: "Protect the excavation site."
 lepsius.62.t: "Excavation site looted!"
 lepsius.62.d: "The war in one of our excavation countries has left its mark: enemy troops have occupied the region in which an archaeological site is being researched and have summarily confiscated the artifacts our team found there - leaving a trail of destruction behind."
 lepsius.62.f: "Archaeological excavation sites can become victims of war and destruction - this also affects neutral archaeological teams that are not part of a belligerent nation as a third party. Rapacious nations can then make use of the artifacts which have not yet been returned to their respective home countries. Don't worry: the excavation team remains on site and the excavation is not lost. However, it will take three years until the archaeologists have repaired the damage to such an extent that normal operations are possible again. During this time, no annual artifacts from this archaeological site will reach our museums."
 lepsius.62.g: "These barbarians!"
 lepsius_excavation_sacked_state_modifier: "Looted Archaeological Site"
 lepsius_excavation_protected_state_modifier: "Protected Archaeological Site"
 lepsius_4_excavation_team_needed_tt: "발굴 조사단 #G 4팀#! 이상 보유"
 lepsius.2101.t: "Remains of a Roman Battle"
 lepsius.2101.f: "\"Sir, I found another nail!\"\n\"Fabulous! This strenghtens the theory that this place was the scene of an ancient battle! I hope we will find some bones as well soon!\""
 lepsius.2101.g: "Not a prestigeous, but an important discovery!"
 lepsius.2102.t: "Villa Rustica discovered"
 lepsius.2102.f: "\"A Villa Rustica was not just a major producer of agricultural goods, food and drinks. Additionally it allowed travellers to rest on their journeys and was instrumental in supplying the legions. Those Remains allow us to draw conclusions about food production, life of Romans and agriculture in the Imperium Romanum.\""
 lepsius.2102.g: "This will tell us a lot about the life of rural Romans!"
 lepsius.2103.t: "Ancient Roman tablets discovered"
 lepsius.2103.f: "Claudia Severa to her Lepidina greetings.\nOn 11 September, sister, for the day of the celebration of my birthday, I give you a warm invitation to make sure that you come to us, to make the day more enjoyable for me by your arrival, if you are present. Give my greetings to your Cerialis. My Aelius and my little son send him their greetings.\nI shall expect you, sister. Farewell, sister, my dearest soul, as I hope to prosper, and hail.\nTo Sulpicia Lepidina, wife of Cerialis, from Cl. Severa."
 lepsius.2103.g: "Not all treasure is made of silver and gold!"
 lepsius.2104.t: "Roman Coin Treasure discovered"
 lepsius.2104.d: "Roman coin treasures a re a rare find. Nontheless, one was found in [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]. Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] was able to revocer the treasure that was probably hidden during a time of crisis for the Imperium Romanum."
 lepsius.2104.f: "\"I wonder if archaeologists in the future will one day find coins left by us and wonder how they ended up there.\""
 lepsius.2104.g: "My Precious!"
 lepsius.2111.t: "Ancient Persian Sarcophagus"
 lepsius.2111.f: "\"Careful, careful. We can't let this find get damaged. Please refrain from using a crowbar on it!\""
 lepsius.2111.g: "What an amazing find!"
 lepsius.2112.t: "Hoard in Persian Palace"
 lepsius.2112.d: "A farmer's clue has led [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullName] to a lost Persian palace from the Achaemenid period. During the subsequent excavation there was a surprise."
 lepsius.2112.f: "Mesopotamia was one of the core provinces of the ancient Persian Empire. During the conquest, the Achaeminids brought numerous works of art, as well as cuneiform tablets, back to their homeland. Nevertheless, it was surprising for the archaeological team to unearth an entire archive of Mesopotamian tablets in a section of the palace they found."
 lepsius.2112.g: "Collect them all!"
 lepsius.2113.t: "Egyptian Statue in Persian Tomb"
 lepsius.2113.d: "A small excavation in the tomb of a Persian nobleman has uncovered a small figure of the Egyptian god Thoth."
 lepsius.2113.f: "The Persians ruled Egypt for more than a century. But even before and after there was a cultural exchange between the two civilizations, even if war was common between both empires."
 lepsius.2113.g: "How did the artifact get here?"
 lepsius.2114.t: "Monumental Inscription"
 lepsius.2114.d: "A landslide has uncovered a monumental rock inscription in a mountain that was previously thought to be lost. Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] set out directly to evaluate the ancient report."
 lepsius.2114.f: "Persian rock inscriptions or reliefs have a permanent place in the art of the fallen empire. The most famous is the Behistun Inscription, which is a multilingual Achaemenid royal inscription and large rock relief on a cliff at Mount Behistun in the Kermanshah Province of Iran, established by Darius the Great. It was important to the decipherment of cuneiform, as it is the longest known trilingual cuneiform inscription, written in Old Persian, Elamite, and Babylonian (a variety of Akkadian)."
 lepsius.2114.g: "An important primary source on Persian history!"
 lepsius_state_trait_tikal: "Tikal - City in the Jungle\n#G +1#! @lepsius_local_minor! Local Artifact from Archaeological Projects"
 je_lepsius_tikal: "Tikal - City in the Jungle"
 je_lepsius_tikal_reason: "Stephens & Catherwood's expedition generated great interest, particularly after a book featured numerous illustrations of lost Mayan cities. But the two adventurers hadn't found all the places. Numerous unknown sites were still waiting to be rediscovered. One of them was the legendary Tikal."
 lepsius.71.t: "Tikal - City in the Jungle"
 lepsius.71.d: "After a laborious search deep in the jungles of Guatemala, an expedition led by Prof. [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] has found the legendary Mayan city of Tikal. A historic event for our nation - but what conclusion should we draw from it?"
 lepsius.71.f: "Tikal is an ancient Mayan city in the Petén rainforests of northern Guatemala with notable step temples. It was one of the most important cities of the Classic Maya period (3rd to 9th centuries) and is one of the best-researched Mayan cities. The first traces of settlement date back to the early 1st millennium BC. In the 2nd century, actual urban development began with the construction of temples, stelae and palace-temple complexes. A first high point was reached in the 5th century, when a powerful ruling dynasty subdued one small state after another in the neighborhood and turned them into vassal kingdoms, which resulted in a long-term conflict with the powerful neighboring state of Calakmul. Tikal experienced a second peak in the 8th century after Calakmul was defeated as a rival. In the early 9th century, Tikal's power waned and construction ceased. By the 10th century at the latest, the city was completely deserted."
 LEPSIUS_NO_MORE_EXPEDITIONS_FOR_YEARS_TT: "You #n won't#! be able to conduct any [Concept('concept_lepsius_expedition','$concept_lepsius_expeditions$')] for #n 3 to 5 years#!, as your [concept_lepsius_archaeologist] will be occupied with cataloging the finds."
 LEPSIUS_SUB_TEAM_WITH_EXPLANATION_TT: "Lose #R 1#! [Concept('concept_lepsius_archaeological_team','$concept_lepsius_excavation_team$')]. You can get it #p back#! after the [concept_lepsius_expedition] or leave it there for an [concept_lepsius_excavation] if you researched the #V Early Archaeology Technology#!."
 lepsius_long_expedition_tt: "장기간의 [concept_lepsius_expedition]은 #V 1년#!의 시간이 소요됩니다. 탐사 후 [concept_lepsius_archaeologist]는 발견 사항의 목록화 작업에 나서며 #n 5년#! 동안 다른 탐사를 수행할 수 #p 없습니다.#!"
 lepsius_medium_expedition_tt: "중간 기간의 [concept_lepsius_expedition]은 #V 10개월#!의 시간이 소요됩니다. 탐사 후 [concept_lepsius_archaeologist]는 발견 사항의 목록화 작업에 나서며 #n 4년#! 동안 다른 탐사를 수행할 수 #p 없습니다.#!"
 lepsius_short_expedition_tt: "단기간의 [concept_lepsius_expedition]은 #V 8개월#!의 시간이 소요됩니다. 탐사 후 [concept_lepsius_archaeologist]는 발견 사항의 목록화 작업에 나서며 #n 3년#! 동안 다른 탐사를 수행할 수 #p 없습니다.#!"
 lepsius_leave_team_for_excavation_tt: "You will let your [Concept('concept_lepsius_archaeological_team','$concept_lepsius_excavation_team$')] set up an [concept_lepsius_excavation] that will usually yield #V 1#! [concept_lepsius_artifact] #V yearly#!."
 lepsius.2101.d: "When a citizen found an iron dagger in [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName], [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullName] gathered a team and started an excavation. They found various remains of an ancient Roman battle, ranging from parts of a shield to nails and some coins. The coins allowed the Archaeologists to date the battle quite accurately."
 lepsius.2102.d: "A farmer found ancient remains in one of his fields. Thankfully he contacted the University and Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] was able to uncover an ancient Villa Rustica in [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]. The variety of archaeological finds allows conclusions to be drawn about the life of the Roman population in the countryside."
 lepsius.2103.d: "The discovery of various Roman tablets made of thin wood in [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] are celebrated among Archaeologists. Although Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] was only able to find the meaning of a few tablets with todays methods, even those few tablets open a window into Roman life."
 lepsius.2111.d: "An extraordinary find from the ancient Persian Empire was made in [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]. A Farmer found an old bronze sarcophagus and contacted Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]. Thanks to [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] eypertise, Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] was able to open the Sarcophagus and discovered a skeleton covered in luxurious jewelry. The jewelry suggests that it was an Achaemenid dignitary."
 je_lepsius_dreamtime: "The Dreamtime"
 je_lepsius_dreamtime_reason: "The British ethnologist Walter Baldwin Spencer and his Australian colleague Francis James Gillen translated the word alcheringa from the Central Australian language Arrernte as dreaming. For Aboriginal people, the dreamtime is about the spiritual, natural and moral order of the cosmos. In this context, dreaming means the collective ability to correctly understand and use the world and its connections, to reflect on the mythical world within the framework of a cult act, and to have life force. A number of places of worship related to this Dreamtime, other Aboriginal myths and archaeological and anthropological remains are spread across Australia. It is time to thoroughly examine the past of the last continent."
 lepsius_2_excavation_team_needed_tt: "발굴 조사단 #G 1팀#! 이상 보유"
 lepsius.72.t: "Dreamtime"
 lepsius.72.d: "During their journey throughout Australia, the Professors [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] and [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName] have carried out valuable scientific research that sheds light on the continent's previously unexplored past."
 lepsius.72.f: "After their return, the scientists surprised the Academic Society with a whole series of impressive finds. They had made drawings and sketches of cave paintings, brought back bones that were thousands of years old, recovered artifacts of ancient and recent history, and recorded the myths and stories of the Aborigines. None of the colleagues would have expected such a rich loot."
 lepsius.72.g: "Oh, there's even a didgeridoo!"
 je_lepsius_gwanggaeto: "광개토대왕릉비"
 je_lepsius_gwanggaeto_reason: "광개토대왕릉비는 서기 391년부터 승하할 때까지 고구려를 다스린 광개토대왕을 기리는 비석이다. 현재는 중국과 북한의 국경 지대 인근에 서 있다. 비석에 새겨진 비문은 고구려 왕국의 역사와 관련해 현존하는 가장 오래되고 상세한 기록으로 남아 있다. 서기 668년 고구려와 그 후계국 발해가 멸망하자 국내성과 환도산성 일대는 수도의 지위를 잃게 되었다. 1644년 만주족이 중원을 정복하고 청나라의 황제들은 압록강 이북의 광토에 출입 금지령(봉금령)을 내렸다. 이 지역에 다시 사람이 들어와 정착하게 된 것은 19세기 후반에 이르러서였다. 1876년경 청나라의 어느 관리가 땅속에 일부 파묻혀 잡초로 완전히 뒤덮여 있던 대왕릉비를 다시 발견하기에 이르렀다."
 lepsius_gwanggaeto_modifier: "고구려의 유산"
 lepsius.73.t: "광개토대왕릉비"
 lepsius.73.d: "흘러간 고구려 왕조 시대의 거대한 비석이 우연히 발견되면서, 지금까지 알려지지 않았던 과거를 엿볼 수 있을 뿐만 아니라 정치적 파장으로 이어질 수수께끼도 드러나고 있다."
 lepsius.74.t: "고구려는 한국의 왕조"
 lepsius.74.d: "광개토대왕릉비가 발견되고 중국은 이를 근거로 고구려가 한국계 국가가 아니라 중국계 국가 내지는 최소 중국의 속국이었다는 대담한 주장을 펼쳤다. 반면 일본은 이것으로 일본이 한반도 남부를 지배했음을 증명한다고 주장하고 있다."
 lepsius.75.t: "The Invasion of Wa"
 lepsius.75.d: "The recently discovered Gwanggaeto Stelo provides evidence of a successful Japanese invasion of South Korea and the subjugation of states there."
 lepsius.73.f: "[SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName]에서 발견한 이 비석은 거대한 기념비로 어쩌면 현존하는 세계 최대 규모의 비석일 것으로 추정된다. 한반도 이북 지역과 남만주 일대를 지배했던 고구려의 역사를 복원하는 데 있어 독보적인 자료임에도, 판독이 힘들다는 점과 더불어 고구려 왕조의 정체성을 둘러싼 분쟁으로, 동양 각국에서 민족주의가 고조되는 지금 이 시점에, 무시할 수 없는 파장을 불러일으켰다. 고구려 왕국은 오늘날 한민족 집단과 깊은 역사적, 문화적 유대를 공유하고 있으나, 중국 측은 남만주의 다민족 지역이 고구려의 중심지였다는 점에서 한국 민족주의자들이 영토 회복 주장에 나설 수 있다는 우려를 안고 있는 것에 결코 지나침이 없다. 한편 일부 단락에서 일본(왜)의 침공 가능성이 담겨 있어 당시 일본이 한국을 지배했다는 추측도 제기되었으나, 한국 측은 한반도의 국가들이 일본을 침공한 것이라고 보고 있다."
 lepsius.73.g: "해독해 볼 가치가 있는 교훈적인 과거로군."
 lepsius.73.h: "고구려는 중국의 주요 국가였소."
 lepsius.73.i: "이것으로 남만주가 본래 한국의 땅이었음을 분명히 보여주고 있군."
 lepsius.73.j: "일본이 한반도에 영향력을 행사했다는 증거일세."
 lepsius.2131.t: "Skull Fragmets found in Aztec Settlement"
 lepsius.2131.d: "A gruesome discovery was made in [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]. Various skull fragments led Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] to believe that this was the location of a Tzompantli, a skull rack."
 lepsius.2131.f: "The Aztecs tended to sacrifice the captives of the Flower Wars. Oftentimes the skulls of those human sacrifices were then collected in a Tzompantli or skull rack. Often the skulls were just piled up on each other to create kind of a skull wall. Some temples even have stone walls into which stonemasons carved skulls as decoration."
 lepsius.2131.g: "How cruel!"
 lepsius.2132.t: "Aztec Inscription saved by local Scholar"
 lepsius.2132.d: "When a pavement in [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] was replaced, none thought that the pavement stones would uncover an archaeological discovery, but a local scholar found various aztec inscriptions on the stones. Professor [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] was called to the site and was able to save the inscriptions."
 lepsius.2132.f: "The find depicts some sort of battle that was waged by the Mexica. We are not sure yet what all the Nahuatl means, but there are many toponyms. So at least we can figure out what places are mentioned."
 lepsius.2132.g: "Thank God he was able to find it before it ended up as pavement."
 lepsius.2133.t: "Aztec Ruins discovered"
 lepsius.2133.d: "Old Aztec ruins were discovered in [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]. Professor [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] started the excavations immediately. Sadly there was not a lot to be found except the buildings themselves."
 lepsius.2133.f: "\"Although the ruins were already looted, they allow insights into the life of the Mexica people before the arrival of the Europeans. This is still an important find for us!\""
 lepsius.2133.g: "Interesting."
 lepsius.2134.t: "Obsidian Mirror discovered"
 lepsius.2134.d: "A masterpiece of Aztec craftmanship was discovered in [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]. Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] was able to retrieve a perfect obsidian mirror used by the Aztecs in ther religious rituals."
 lepsius.2134.f: "\"Obsidian mirrors were believed to be a mean to communicate with the underworld. One god, Tezcatlipoca, was even depicted as having a mirror instead of a foot. This is a great archaeological find!\""
 lepsius.2134.g: "Incredible!"
 lepsius.2141.t: "Carthaginian shipwreck discovered"
 lepsius.2141.d: "Pearl divers in [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] discovered an ancient Carthaginian shipwreck. Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] decided that the ship shall remain in the sea for now but thanks to the divers the cargo could be analyzed and recorded, allowing new insights on the Carthaginian trade routes."
 lepsius.2141.f: "\"There is a lot of purple cloth, which was probably intended for the nobility of various countries.\""
 lepsius.2141.g: "The greatest traders of the Mediterranean!"
 lepsius.2142.t: "Stranded Punic warship"
 lepsius.2142.d: "Who would have thought that the Carthaginians, the masters of the sea, stranded. Well it apparently happened in [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]. Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] was able to recover many finds from the once mighty battle ship. The wood though was already mostly decomposed."
 lepsius.2142.f: "\"Is this a Bireme, a Trireme a Quinquireme or an even more reme?\""
 lepsius.2142.g: "A once magnificent ship!"
 lepsius.2143.t: "Punic Port discovered"
 lepsius.2143.d: "An ancient port of Carthage was discovered in [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]. Professor [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] ordered a thorough investigation of the site. Sadly only parts could be recovered as a rich industrial wanted to build a new factory there immediately."
 lepsius.2143.f: "\"At least we were able to find some amphoras. Surely they will tell us a lot about ancient mediterranean trade.\""
 lepsius.2143.g: "An entire unknown port! What a discovery!"
 lepsius.2144.t: "Coins from ancient Carthage discovered"
 lepsius.2144.d: "A hoard of ancient coins was unearthed by a farmer in [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]. Sadly even a thorough investigation by Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] did not provide any more punic artifacts. It is a mystery, how the coins ended up in this field."
 lepsius.2144.f: "\"This coin depicts Hasdrubal, brother of Hanibal. It obviously must be a relatively new coin.\""
 lepsius.2144.g: "I am rich now!"
 lepsius.2151.t: "Celtic Cauldron discovered"
 lepsius.2151.d: "The Celts used Cauldrons for many reasons. Now one of those huge cauldrons was found in [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]. Professor [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] was able to get this huge piece of metallware into our collection."
 lepsius.2151.f: "\"There is a legend that a great warrior fell into a cauldron full of magic potion that grants everyone drinking from it inhumane strength. Apparently that warrior was so strong that he could lift huge rocks. He also loved fighting Romans.\""
 lepsius.2151.g: "I hope no one has fallen into the Magic Cauldron yet!"
 lepsius.2152.t: "Celtic Bronze Shield Cover found"
 lepsius.2152.d: "In the muddy bed of a river in [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] a bronze plate was found. When Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] arrived, [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] was able to determine that the metal plate was once part of a Celtic shield."
 lepsius.2152.f: "\"Some stories say, that Celtic Chiefs were carried on shields, but that is most certainly a children's story. Tacitus however tells us about chiefs being lifted on a shield when they were declared to be the new chiefs. This might be the historical source for those stories.\""
 lepsius.2152.g: "A shield worthy of a great chief!"
 lepsius.2153.t: "Celtic Bronze Helmet recovered"
 lepsius.2153.d: "A Horned Bronze Helmet was found in [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]. Professor [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] quickly determined that it was in fact not a helmet worn into battle but instead a Celtic cult object."
 lepsius.2153.f: "\"You might have seen depictions of Celts wearing helmets with wings or horns, but those depictions are wrong. In a battle such a helmet would have been a hinderance. Such helmets existed but were often just cult objects referring to certain Celtic gods.\""
 lepsius.2153.g: "What a magnifcient helmet!"
 lepsius.2154.t: "Ancient Menhir discovered"
 lepsius.2154.d: "On one of [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] hikes through the countryside, Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] found a weird stone in [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]. It turned out that it is a Celtic Menhir once errected by the local Celtic tribe. Now Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] is studying the Menhir thoroughly."
 lepsius.2154.f: "\"We do not know why the Celts errected Menhirs, as they left no written testimonies. But it might well be some sort of cult site. Some locals have their own story about a famous warrior and his mighty dog. This Obelix apparently made perfectly shaped Menhirs and errected them without any help. That is just a silly story though.\""
 lepsius.2154.g: "Was this the work of Obelix?"
 lepsius.2161.t: "Aegean Fresco found"
 lepsius.2161.d: "A local excavation of an Aegean ruin unearthed a magnificent fresco in [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]. Professor [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] ordered drawings of the find to be produced as the fresco is connected to the ruins."
 lepsius.2161.f: "\"Those patterns are amazing! I wish we would create such beauty in todays age!\""
 lepsius.2161.g: "This is Art!"
 lepsius.2162.t: "Aegean Ruins discovered"
 lepsius.2162.d: "During construction work in [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName], an ancient Aegean ruin was discovered. Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] started with a thorough investigation of the site. Sadly not many finds are left, but the ruins can help to understand the life of the people that once lived here."
 lepsius.2162.f: "\"Those arches are standing here since millenias. I wonder whether our buildings will survive as long...\""
 lepsius.2162.g: "This will tell us a lot about living in the ancient Aegean."
 lepsius.2163.t: "Aegean Jewelry unearthed"
 lepsius.2163.d: "In a stroke of good fortune, a farmer stumbled over a fascinating find in [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]. When Professor [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] arrived, [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] could only marvel about the fascinating, Aegean Jewelry."
 lepsius.2163.f: "\"Such pretty jewelry. I wish we could create similar pieces of jewelry today!\""
 lepsius.2163.g: "Wonderful craftmanship!"
 lepsius.2164.t: "Golden Cup of Aegean Origin"
 lepsius.2164.d: "Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] was able to uncover a golden cup in one of our local digsites. No one would have expected such a marvellous find, but apparently, [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]. still offers many opportunities for great finds."
 lepsius.2164.f: "\"The cup depicts a scene with a man and several bulls. The bulls are quite dynamic and in various poses.\""
 lepsius.2164.g: "I would like a cup like this!"
 lepsius.2171.t: "Egyptian Wall Paintings"
 lepsius.2171.d: "Ancient Egyptian Wall Paintings were found by Professor [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] on one of [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] trips to [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]. The wall paintings depict scenes from ancient Egypt."
 lepsius.2171.f: "\"The fascinating thing is, that the walls still have painting on them, while in Greece everything is just white. But apparently the Egyptians were either way more keen on colors or the desert kept the colors intact better.\""
 lepsius.2171.g: "Wonderful pictures!"
 lepsius.2172.t: "Ancient Egyptian Temple unearthed"
 lepsius.2172.d: "Who would have thought that there are still unknown temples in [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]? Apparently there are and Professor [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] found one beneath the sand. It is a great find, even though everything of value was long gone."
 lepsius.2172.f: "\"Look at this temple! Can you imagine the religious ceremonies taking place here? Isn't it amazing?\""
 lepsius.2172.g: "There is so much to learn here!"
 lepsius.2173.t: "Egyptian Statue retrieved"
 lepsius.2173.d: "Even though the Statue is broken, it is still a great work of an unknown Egyptian stonemason. The statue found in [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] probably used to depict a Falcon before it broke. At least that is what Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] believes."
 lepsius.2173.f: "\"It might not look like a lot but this statue will tell us a lot about how the Egyptians crafted such statues!\""
 lepsius.2173.g: "Those are fantastic works of stonemasons!"
 lepsius.2174.t: "Egyptian Mummy discovered"
 lepsius.2174.d: "Mummies are probably one of the most common find in Egypt. This one was found in [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]. Professor [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] started examinating it very carefully, but some people have... other ideas."
 lepsius.2174.f: "\"Just imagine if we could use these mummies to figure out, what the people of ancient Egypt ate, what they drank, how healthy they were. That would be fantastic!\""
 lepsius.2174.g: "Death is only the beginning."
 lepsius.2174.h: "I heard some people like to eat mummies! Let us sell it!"
 lepsius.2181.t: "Hellenic Battle Site discovered"
 lepsius.2181.d: "The Wars of the Diadochi laid waste to many areas of the world. In [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] for example there seems to have been a limited battle. Whether it was part of the Diadochi War has still to be determined- Professor [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] found various weapons and parts of armor."
 lepsius.2181.f: "\"There must have been a small battle here. Not as big as others but still important. I am sure we will find out more about this site!\""
 lepsius.2181.g: "What a pitty those wars were..."
 lepsius.2182.t: "Hellenic Coins found"
 lepsius.2182.d: "The ancient Hellenes left their marks in far parts of the world, from the Mediterranean all the way to India. Oftentimes coins can be found, like it happened in [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]. Thanks to the coins, Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] will be able to determine the Greek presence in the region."
 lepsius.2182.f: "\"I guess I am rich now!\""
 lepsius.2182.g: "Fascinating!"
 lepsius.2183.t: "Hellenic Ruins excavated"
 lepsius.2183.d: "[SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] is the newest site to offer a Hellenic ruin. Hellenic Cities can be found from Spain all the way to India. Professor [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] thinks that this specific city will tell us more about Greek settlements"
 lepsius.2183.f: "\"Can you imagine one culture spanning such a huge distance? It is truely unbelievable!\""
 lepsius.2183.g: "Greek Cities are just everywhere, aren't they?"
 lepsius.2184.t: "Depiction of a Greek God"
 lepsius.2184.d: "The Greek Gods and their religion travelled to far of lands. In [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] a depiction of a Greek God was recently uncovered. Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] determined, that it must be Dionysus, the Greek God of wine."
 lepsius.2184.f: "\"As it is, the Greek story has it that no sooner was Dionysus born than Zeus sewed him up in his thigh and carried him away to Nysa in Ethiopia beyond Egypt; and as for Pan, the Greeks do not know what became of him after his birth. It is therefore plain to me that the Greeks learned the names of these two gods later than the names of all the others, and trace the birth of both to the time when they gained the knowledge.\"\n- Herodotus"
 lepsius.2184.g: "Let us drink some wine on that discovery!"
 lepsius.2500.t: "New Archaeological Map of [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]"
 lepsius.2500.d: "Professor [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] has been hard at work to record all archaeological finds from recent years in [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] on a map. This map allows conclusions to be drawn as to where further finds are possible."
 lepsius.2500.f: "\"Here we found some nails and over there we found the bones of a sheep! Isn't it incredible?!\""
 lepsius.2500.g: "This will open doors to new finds!"
 lepsius.2501.t: "An Illustrated Archaeological Catalog of [GetPlayer.GetName]"
 lepsius.2501.d: "Professor [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] is not only a formidable Archaeologist but also an amazing artist. Thanks to this skill he was able to publish an Illustrated Archaeological Catalog of [GetPlayer.GetNameNoFormatting] that is regarded as an amazing entry into Archaeology by many laymen."
 lepsius.2501.f: "\"Look at those illustrations! It looks like we are in a museum and can see the objects right in front of us! Amazing!\""
 lepsius.2501.g: "A wonderful book!"
 lepsius.2502.t: "New Catalog of all Archaeological finds of [GetPlayer.GetName]"
 lepsius.2502.d: "With his new catalog of all archaeological finds in [GetPlayer.GetNameNoFormatting], Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] has done a diligent job that hardly anyone would have thought possible. Thanks to his extraordinary work, we now have a precise catalog of all finds made to date in 7 volumes."
 lepsius.2502.f: "\"Number 7342: A piece of stone, probably neolithic, named Rocky.\""
 lepsius.2502.g: "This will be helpful in the future!"
 lepsius.2503.t: "Professor [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] stops artifact smuggle"
 lepsius.2503.d: "After months of work, Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] succeeded in arresting a smuggling ring that was smuggling artifacts through our country. The artifacts were seized and are now safely stowed away in our collection."
 lepsius.2503.f: "\"You destroyed valuable archaeological insights, you scoundrels!\""
 lepsius.2503.g: "This belongs into a Museum!"
 lepsius.2600.t: "The Lost Star"
 lepsius.2600.d: "Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] was always confused by ancient depictions of the stars as they seemed to not reflect the stars we see today. Thanks to the help of Professor [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] he was finally able to figure out what was wrong. Together they discovered a new star in the night sky."
 lepsius.2600.f: "\"There! There it is, like the ancient Egyptians told me! We finally found the lost star!\""
 lepsius.2600.g: "A tremendous scientific discovery!"
 lepsius.2601.t: "Estimating Dates of Historical Events by using astronomical knowledge of Solar Eclipses"
 lepsius.2601.d: "In a joint effort, Professor [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] and Professor [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] were able to use modern astronomical knowledge about solar eclipses to date specific historical events in primary sources."
 lepsius.2601.f: "\"Obviously Thales of Milet was talking about the solar eclipse on the 28th of May 585 A.D. and not any other solar eclipse!\""
 lepsius.2601.g: "This is a huge step for archaeology"
 lepsius.2602.t: "Overview of the Astronomical Knowledge of past Cultures"
 lepsius.2602.d: "Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] and Professor [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] released a new book featuring an overview over the astronomical knowledge of ancient civilizations."
 lepsius.2602.f: "\"Yes, they knew the Earth was not the center of anything. No, even back then they were not stupid enough to believe that the Earth is flat. Yes, I am absolutely sure about that.\""
 lepsius.2602.g: "An interesting read!"
 lepsius.2603.t: "Hero's Steam Engine reconstructed"
 lepsius.2603.d: "When Professor [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] spoke to Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] about Hero's ancient steam engine, the latter was immediately on fire to make a reconstruction. Together they built a small reconstruction of the Aeolipile."
 lepsius.2603.f: "\"As you can see, the Aeolipile is missing a mean to transmit power. Therefore it is more of a toy than a real machine. Sadly it was never further developed.\""
 lepsius.2603.g: "How did they not industrialize?"
 lepsius_illustrated_archaeological_catalog_modifier: "Wrote an Illustrated Archaeology Catalog"
 lepsius.12.f: "현재 이집트 전시관에서는 @lepsius_egypt_minor! 일반 유물 #p [ROOT.Var('lepsius_egyptian_artifact_minor').GetValue]#!점과 @lepsius_egypt_major! 대표 유물 #p [ROOT.Var('lepsius_egyptian_artifact_major').GetValue]#!점을 소장하고 있습니다.\n\n이집트 전시관은 #T 재배치#!가 가능하며 이를 통해 새로운 전시를 기획할 수 있게 됩니다. 단 여기에는 특정 수의 유물이 필요합니다.\n\n#T 소규모 전시#!에는 @lepsius_egypt_minor! 유물 #p 10점#!, #T 중규모 전시#!에는 @lepsius_egypt_minor! 유물 #p 25점#!, #T 대규모 전시#!에는 @lepsius_egypt_minor! 유물 #p 50점#!, #T 완벽한 전시#!에는 @lepsius_egypt_minor! 유물 #p 100점#!이 필요합니다. 또한 #T 완벽한 전시#!에는 @lepsius_egypt_major! 대표 유물 #p 1점#!이 필요합니다.\n\n소장품의 재배치와 새 전시 준비에는 반년의 시간이 소요됩니다. 전시에 따른 보너스는 새로 재배치가 이뤄질 때까지 영구적으로 적용됩니다."
 lepsius.13.f: "현재 메소포타미아 전시관에서는 @lepsius_mesopotamia_minor! 일반 유물 #p [ROOT.Var('lepsius_mesopotamian_artifact_minor').GetValue]#!점과 @lepsius_mesopotamia_major! 대표 유물 #p [ROOT.Var('lepsius_mesopotamian_artifact_major').GetValue]#!점을 소장하고 있습니다.\n\n메소포타미아 전시관은 #T 재배치#!가 가능하며 이를 통해 새로운 전시를 기획할 수 있게 됩니다. 단 여기에는 특정 수의 유물이 필요합니다.\n\n#T 소규모 전시#!에는 @lepsius_mesopotamia_minor! 유물 #p 10점#!, #T 중규모 전시#!에는 @lepsius_mesopotamia_minor! 유물 #p 25점#!, #T 대규모 전시#!에는 @lepsius_mesopotamia_minor! 유물 #p 50점#!, #T 완벽한 전시#!에는 @lepsius_mesopotamia_minor! 유물 #p 100점#!이 필요합니다. 또한 #T 완벽한 전시#!에는 @lepsius_mesopotamia_major! 대표 유물 #p 1점#!이 필요합니다.\n\n소장품의 재배치와 새 전시 준비에는 반년의 시간이 소요됩니다. 전시에 따른 보너스는 새로 재배치가 이뤄질 때까지 영구적으로 적용됩니다."
 lepsius.14.f: "현재 에게 문명 전시관에서는 @lepsius_aegean_minor! 일반 유물 #p [ROOT.Var('lepsius_aegean_artifact_minor').GetValue]#!점과 @lepsius_aegean_major! 대표 유물 #p [ROOT.Var('lepsius_aegean_artifact_major').GetValue]#!점을 소장하고 있습니다.\n\n에게 문명 전시관은 #T 재배치#!가 가능하며 이를 통해 새로운 전시를 기획할 수 있게 됩니다. 단 여기에는 특정 수의 유물이 필요합니다.\n\n#T 소규모 전시#!에는 @lepsius_aegean_minor! 유물 #p 10점#!, #T 중규모 전시#!에는 @lepsius_aegean_minor! 유물 #p 25점#!, #T 대규모 전시#!에는 @lepsius_aegean_minor! 유물 #p 50점#!, #T 완벽한 전시#!에는 @lepsius_aegean_minor! 유물 #p 100점#!이 필요합니다. 또한 #T 완벽한 전시#!에는 @lepsius_aegean_major! 대표 유물 #p 1점#!이 필요합니다.\n\n소장품의 재배치와 새 전시 준비에는 반년의 시간이 소요됩니다. 전시에 따른 보너스는 새로 재배치가 이뤄질 때까지 영구적으로 적용됩니다."
 lepsius.15.f: "현재 선콜럼버스 전시관에서는 @lepsius_precolumbian_minor! 일반 유물 #p [ROOT.Var('lepsius_precolumbian_artifact_minor').GetValue]#!점과 @lepsius_precolumbian_major! 대표 유물 #p [ROOT.Var('lepsius_precolumbian_artifact_major').GetValue]#!점을 소장하고 있습니다.\n\n선콜럼버스 전시관은 #T 재배치#!가 가능하며 이를 통해 새로운 전시를 기획할 수 있게 됩니다. 단 여기에는 특정 수의 유물이 필요합니다.\n\n#T 소규모 전시#!에는 @lepsius_precolumbian_minor! 유물 #p 10점#!, #T 중규모 전시#!에는 @lepsius_precolumbian_minor! 유물 #p 25점#!, #T 대규모 전시#!에는 @lepsius_precolumbian_minor! 유물 #p 50점#!, #T 완벽한 전시#!에는 @lepsius_precolumbian_minor! 유물 #p 100점#!이 필요합니다. 또한 #T 완벽한 전시#!에는 @lepsius_precolumbian_major! 대표 유물 #p 1점#!이 필요합니다.\n\n소장품의 재배치와 새 전시 준비에는 반년의 시간이 소요됩니다. 전시에 따른 보너스는 새로 재배치가 이뤄질 때까지 영구적으로 적용됩니다."
 lepsius.99.t: "Moving the Archaeological Museum"
 lepsius.99.d: "Out of some reason we have an [GetBuildingType('building_lepsius_archaeological_museum').GetName] but it is not located in our marvellous Capital. Obviously we have to move it to the Capital!"
 lepsius.99.f: "\"Please be vareful with the vases, they are very fragile! No! You can't just throw them in a box like that, they need some sort of padding! I really don't think this is a great idea!\""
 lepsius.99.g: "Now I can go there every day!"
 lepsius.140.d: "Our archaeologist has used [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] connections to recruit highly qualified personnel for the expedition."
 lepsius.250.f: "It started with an argument, which was followed by curses, threats and finally fisticuffs. The incident ended in a full-blown tavern brawl. Right in the middle: our expedition leader. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] temper has cost us a lot of reputation. A report of the faux pas reached a high dignitary this morning. We averted a major diplomatic incident, but the bad impression will linger for a long time."
 lepsius.260.f: "Good news! As it turned out, our expedition leader proved to be an impeccable [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetCustom('academics_gentleman_or_gentlewoman_type')] during [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] trip. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis|U] tactful and charismatic demeanor is equated with typical [ROOT.GetCountry.GetAdjectiveNoFlag] behavior. Our nation's reputation there has increased significantly."
 lepsius.270.d: "The leader of our expedition stands out above all because [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] sits in the café every day to drink soda and eat ice cream."
 lepsius.270.f: "There are ambitious leaders who do nothing but work all day. They want to achieve great things or accumulate wealth. Some want to be famous for their deeds. Others are obsessive about every detail. Not so our archaeological director. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe]'s made a habit of beating the heat every day by binging on soda and gulping down ice cream. You could call that laziness. For others, it is a sign of human elegance, good taste, and having the right priorities in life."
 lepsius.280.d: "Our expedition leader's diplomatic skills have resulted in [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim] being invited and rewarded by the local governor."
 lepsius.311.d: "The leader of the last archaeological expedition abroad has decided to publish the diary [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] wrote during the trip."
 lepsius.312.d: "[SCOPE.sCharacter('lepsius_scientific_writer').GetFullName](이)가 탐사 과정에서 집필한 과학 논문을 출간하기로 결심했다."
 lepsius.408.f: "A nazar is an amulet meant to protect against the evil eye. Such a superstition exists in large parts of the Orient, but also in parts of the Mediterranean. Of course, it would be absurd to think that a scientifically trained mind could protect itself with a talisman to keep evil forces from wreaking havoc on the expedition. The situation is different with the local helpers and porters. They ask the leader to get one of the amulets, convinced that otherwise [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] will face great misfortune. Whatever the nazar's abilities, if it doesn't affect the expedition then at least affect the morale of our minions."
 lepsius.409.f: "As our expedition progressed along a coast, they soon encountered a broad bay whose extreme promontories nearly touched. Instead of going the long way around, some Greek fishermen offered to take us across the bay. The expedition leader quickly accepted the offer. In a conversation with the fishermen, [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] was also able to obtain important information about a ruin not far away, which probably dates from pre-classic times."
 lepsius.421.d: "Our archaeologist has found a small Egyptian lapis lazuli scarab that [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] would like to keep."
 lepsius.452.f: "In the past, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] had repeatedly heard that there must be historical records of long-destroyed archaeological sites in the area. A few days ago [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] received a helpful tip: a merchant possessed a 16th-century manuscript containing a copy of records long lost. The originals are probably lost forever, but at least there is the possibility of reconstruction."
 lepsius.461.f: "There was this strange, crushing feeling. Middle of the night. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] stood up, believing in the wind beating against the pitched tent in the desert sand; but it was more than wind. It was an odd whisper. A murmur that rose to dissonant tones until it increased to a melodic song. Like siren song, it beguiled - and clouded the senses. At least, that was what [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetLastName] claimed when, after hours of searching, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] was found at the paws of the Great Sphinx of Giza, digging like a madman, convinced that beneath the Sphinx was a secret chamber from which knowledge was to be found been hidden for thousands of years. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetHerHis] condition has hardly improved since then. This place has a truly bad influence on [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetHerHim]."
 lepsius.462.f: "There was this strange, crushing feeling. Middle of the night. [SCOPE.sCharacter('lepsius_military_attache').GetFullName] stood up, believing in the wind beating against the pitched tent in the desert sand; but it was more than wind. It was an odd whisper. A murmur that rose to dissonant tones until it increased to a melodic song. Like siren song, it beguiled - and clouded the senses. At least, that was what [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetLastName] claimed when, after hours of searching, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] was found at the paws of the Great Sphinx of Giza, digging like a madman, convinced that beneath the Sphinx was a secret chamber from which knowledge was to be found been hidden for thousands of years. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetHerHis] condition has hardly improved since then. This place has a truly bad influence on [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetHerHim]."
 lepsius.465.f: "Our expedition leader makes no bones about where he's from, what language [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] speaks, what food [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] prefers, and which culture [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] thinks is superior. The insults against the locals increase by the day - whether against recruited staff or random people. Traveling through different villages, [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] has developed the attitude of treating the mayors like [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] subordinates. Even the most hospitable gesture is not enough for [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim]. There have already been several complaints from various parts of the local administration about [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName]'s arrogant and defamatory behavior, and our expedition is increasingly degenerating into a negative publicity campaign for our country."
 lepsius.467.f: "Not much is left of the former Christian Middle East - and yet there are the scattered Christian communities of Copts, Maronites, Chaldeans and Armenians that have survived for centuries. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName], who actually had no religious intentions when [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] started the trip, had a local priest lead [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim] to a long-forgotten church last night. Archaeologically and historically interesting, the clergyman only later unveiled a reliquary containing a relic of a church father that was believed to have been lost. Since it was already late and the camp was far away, the expedition leader stayed there for a night and a morning. A dream that hasn't let [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim] rest since then and which [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] hardly ever talks about means that [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] wants to change [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] life in certain areas. The priest has offered to give [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim] part of the forgotten relic to strengthen [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim] in his newly found faith."
 lepsius.467.g: "Did [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] have a beatific vision?"
 lepsius.471.g: "[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe|U] should take his time and find out as much as possible about the place."
 lepsius.471.h: "[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe|U]'s allowed to stay there longer - if [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] brings some artifacts with him."
 lepsius.471.i: "[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe|U] is allowed to visit the place, but only for as long as necessary."
 lepsius.472.f: "[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] has an unbelievable explanation for the enormous loss of people and material. It is outrageous as well as shameful - especially for the mind of a reasonably enlightened individual. The expedition leader claims that [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] and [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetHerHis] men were lost for a week before they stumbled upon an unfamiliar valley surrounded by high mountains in the impenetrable Yucatán forest. Hoping to find a previously unknown Mayan site, they devised a plan to explore the valley - a huge mistake, as it turned out. For the valley is home to terrible monsters, mighty lizards. In fact, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] explained to us that extinct dinosaurs have lived in this 'lost world' for millions of years, having survived because they were isolated. The beasts terrorized the expedition team and ruthlessly mauled several porters and researchers. On the run [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] would have had to give up much of the equipment. Now [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe]'s begging us to re-equip the entire expedition. We don't know why [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] thinks [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] can impress us with this fairytale story - rather, doubts are raised as to whether [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] is still the right man to run this company!"
 lepsius.472.g: "Is [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] saying dinosaurs ate our expedition?!"
 lepsius.501.h: "Let [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim] investigate further."
 lepsius.506.f_engine: "Unfortunately, our expedition members hardly had time to explore the tomb of the Unknown Pharaoh in more detail. Rocks crumbled from the ceiling and sand trickled through upper cracks as our archaeologists hacked their way through the burial chamber. Apparently the environment consisted of a much more porous rock than assumed; and the detached boulder had finished the construction. With quick wits, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] stayed the course despite the risk and fought [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] way to the sarcophagus to have all available men take it out. A magnificent, unique piece that will probably console us for the loss of the remaining finds - after all, the entire royal tomb threatens to collapse within minutes ..."
 lepsius.506.f_muscular: "It was a truly historic experience when [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName], entered the actual burial chamber. A special surprise awaited [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim]: the sarcophagus together with the mummy of the Unknown Pharaoh still rested where he was buried more than 3,000 years ago! Again, the incomparably strong Paduan was to help us - and lift the wooden sarcophagus and mummy out of the granite enclosure. But as happy as our archaeologists were at first, their later unhappiness was greater. During the lunch break, as the team shared bread in the decorated gallery, a terrible crunching and cracking sounded from the burial chamber. To the horror of the excavation helpers and our expedition leader, the giant muscle man had also allowed himself a break - and accidentally sat on the sarcophagus. Only scraps remain of the king mummy and the wooden coffin..."
 lepsius.532.f: "The military attaché has repeatedly warned against entering Kurdish territory. Past expeditions to this area have not had good experiences with the locals. The Kurds are considered free, honorable - but also proud. Invading their territory might anger them. [SCOPE.sCharacter('lepsius_military_attache').GetFullName] has therefore insisted on arming several men in order to be able to more effectively combat unpleasant incidents. While the attaché is expecting the worst, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] would like to find the Kurdish tribe as quickly as possible in order to negotiate with them and find an amicable settlement in order to quickly get the Lamassu into [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] own hands. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] proposes splitting up the troops: the unarmed men, untrained porters, and most of the provisions and equipment should stay behind while [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] goes ahead with the military attaché to create a more flexible force that can efficiently search for the lamassu. The attaché, on the other hand, expressed his concern that the remaining part of the expedition would then be completely helpless in the event of a Kurdish attack."
 lepsius.534.f: "Far too late, the expedition leader realized that his latest attempt to win favor with the native tribes produced the opposite of what [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] had intended. A shriek went through the tent, and instinctively some of the subordinates were already laying their hands on their weapons. Tension was in the air from then on, and the military attaché saw his concern confirmed that this conflict could not be settled with diplomacy, but only with violence. He only has a short time to line up the men he has brought with him. Some research assistants are already insisting on packing up and gaining as much distance as possible."
 lepsius.551.f: "[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] had worked late that day. The Greek sun brooded on his head, the wind from the mountains and from the sea remained absent. The boring and tedious cataloging of dull archaeological objects dragged on for days. The finds often amounted to only measly fragments of broken glass and chicken bones left behind, which the archaeological director attributed less to the Minoan food culture and more to the proletarian eating manners of the excavation helpers. In a mood of weariness and resignation, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] strolled the sprawling grounds of a little-explored palace complex. The last time [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetLastName] was sighted was near a structure classified as late Bronze Age or early Archaic. A crash echoed through the Cretan hills, drowning out cicadas and startling doves as the archaeologist broke through the ground - and despite a two-day search could not be found."
 lepsius.552.d: "When [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] regains consciousness, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] finds himself in an unfamiliar subterranean building."
 lepsius.552.f: "It was perhaps the strangest experience in the archaeological leader's life. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe|U]'d thought [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe]'d fallen down a meter-long rabbit hole; the shaft had been so narrow, accompanied at the same time by sand and mud, which had pressed it down like quicksand in excruciating lengths. Impossible that anyone could have followed him; and impossible to see anything as no sunlight followed him down the shaft. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe|U]'d felt plates under his palms upon impact and hadn't believed [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe]'d landed in a natural cave system. In the glow of his lighter [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] recognizes the smoothly hewn walls, to which remains of paint are stuck. Frescoes from a lost culture, which [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] initially wants to assign to the Minoan, but soon no longer knows which century they come from. Apparently there are smooth transitions between Minoan and Mycenaean influences. Looking around, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] finds himself in a hall not unlike a Megaron. The archaeologist slowly feels [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetHerHis] way forward, hearing [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetHerHis] own footsteps echoing in the hollow space. Corridors without ornaments, without objects, without distinguishable details follow; forks in the road; chambers; and dead ends. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] realizes that [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] has ended up in an ancient labyrinth that [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] has no overview of. The more [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] thinks he's researching it, the bigger and more unknown it becomes..."
 lepsius.553.d: "After some time of trial and error, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] realizes that [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] has arrived at the starting point of the labyrinth..."
 lepsius.553.f: "Legs heavy, head foggy - could it be that [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] had been here before? The spot on the plates where [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] landed when [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] arrived is unmistakable. And with growing horror the question arises: how long was [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] here? How many hours had passed? Maybe days? And would [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] find out before hunger and thirst tormented him to death...?"
 lepsius.554.d: "In the labyrinth, the missing person comes across a mosaic. The question is whether [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] chooses one of the two corridors or the stairs."
 lepsius.554.f: "After corridors and stairs without distinction, the expedition leader reaches a larger room. A corridor opens to the left and right, and a staircase leads up and down. A mosaic on the floor catches the eye. A sea scene confirms the thesis that the walls may come from Minoan times, while the rare jewelry bears witness to Mycenaean influences. The gods depicted are predecessors of the classical Greek pantheon. Surrounded by dolphins, father of the gods Zeus stretches his arm in the air with a thunderbolt. Demeter and Persephone point to the west, ears of corn in hand; Artemis is accompanied by two lions looking east. Finally Poseidon, the father of the gods of the Mycenaeans: with a trident [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] makes the earth tremble beneath him."
 lepsius.557.d: "In a hall, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] again encounters a riddle."
 lepsius.557.f: "Four passes. Four pictures. Above each passage, the prisoner of the labyrinth can see outlines engraved in stone. It takes some time before [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] realizes that these are the shores of islands. Based on his experiences on Crete, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] can roughly assign them. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe|U] assigns the first passage to the island of Rhodes; the second of the island of Delos; the third of the island of Euoboea; the fourth of the island of Naxos. Unfortunately, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] cannot find any further clues."
 lepsius.558.d: "After several days, our excavation team found the missing archaeologist near a cliff. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe|U] was completely exhausted - and has been mentally confused ever since."
 lepsius.558.f: "It remains a mystery where the leader of the expedition has been for the past 72 hours. It was found a few kilometers from the actual excavation site - in a pitiful condition, as if mauled by a wild animal. Although [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] has since regained consciousness, the expedition doctor believes [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] must have received a severe blow to the head. At least his language center seems disturbed. Again and again [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] falls into an almost delusional style when [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] has to tell what happened. We've left the area because we're concerned [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] might go on a quest again - to prove he's not crazy."
 lepsius.559.f: "The police examined the body of the former expedition leader yesterday evening. [SCOPE.sCharacter('lepsius_minotaur_victim').GetFullName] became known to the public mainly because of a mental illness after [SCOPE.sCharacter('lepsius_minotaur_victim').GetSheHe] went missing under mysterious circumstances during an excavation on Crete and was found again days later under just as mysterious circumstances. [SCOPE.sCharacter('lepsius_minotaur_victim').GetSheHe|U] just hasn't been the same person since then. Increasingly [SCOPE.sCharacter('lepsius_minotaur_victim').GetSheHe] feared being alone, thought [SCOPE.sCharacter('lepsius_minotaur_victim').GetSheHe] saw monsters in the shadows. In the end [SCOPE.sCharacter('lepsius_minotaur_victim').GetSheHe] only slept when the light was on because nightmares kept [SCOPE.sCharacter('lepsius_minotaur_victim').GetHerHim] awake all night. In the last days of [SCOPE.sCharacter('lepsius_minotaur_victim').GetHerHis] life, [SCOPE.sCharacter('lepsius_minotaur_victim').GetLastName] had not only become heavily dependent on medication and had visibly deteriorated both physically and mentally, but [SCOPE.sCharacter('lepsius_minotaur_victim').GetSheHe] had also drawn the ridicule of his academic colleagues because of his abstruse claims about his Crete research. Despised by the scientific world, ridiculed in newspapers and visually reduced to a caricature of his former self, investigators agree that [SCOPE.sCharacter('lepsius_minotaur_victim').GetSheHe] took his own life."
 lepsius.560.f: "At first [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetFullName] was surprised how far away from the old excavation site [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] finally saw the sun again. It was several hours before [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] rejoined the rest of the digging mission, much to the relief of his colleagues. There, to the surprise of those present, [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] was able to report on his find - a truly magnificent discovery that could perhaps change the way we have interpreted the myths of the ancient Greeks. Today is not just a day of personal glory, but a great day for the whole nation. What was the solution of banal mysteries for some, will be a revolution in archeology for the rest of the world..."
 lepsius.561.f: "Haze hangs over the Yucatec hills as the column pushes through the selva. Jaguars cry in the distance; the air hums with mosquitoes, and fever fells more than one of our helpers. What remains is a party of three and a few porters. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] signals a halt. Stelae and carved stones stud the ground; half-buried steps, slick with moss, climb a broken terrace. The outline of a Maya pyramid emerges. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe|U] cocks an ear as a porter raises his hand and calls: 'Patrón—an opening!'"
 lepsius.562.f: "Insisting on entering alone, the expedition leader passes the bleached bones of an earlier intruder and confronts a panel crowded with glyphs. Four recessed cartouches—visages of great gods—can be pressed like keys. Beneath them runs the distich: the one who rises in the east, blazes at zenith, descends at dusk, and keeps the count of days. The device is plainly a test; one mistake could be [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetHerHis] undoing."
 lepsius.563.f: "Footfalls echo in a narrow passage. By torch‑light the walls glimmer with engravings; roots of giant trees bite through a fallen lintel. Beyond, a chamber opens—a low altar at its heart, an idol glinting faintly in the gloom. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe|U] weighs a satchel of sand in [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetHerHis] left hand, judges the idol’s mass with the right, and steadies [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetHerHis] breath. One clean exchange—then out."
 lepsius.564.d: "It may be that [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] read the riddle amiss—or merely that the builders trusted no one. A thunder rolls; a stone sphere tears free and barrels down the corridor toward [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetHerHim]."
 lepsius.564.f: "The switch is made; the bag rests upon the altar. For a heartbeat nothing moves. Then a dull tremor builds, dust sifts from the ceiling, and a roar answers from above—it is a gigantic rolling boulder!"
 lepsius.565.d_wrong: "When [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] stumbles into the light, a worse surprise awaits: the camp has been overrun, and armed men demand the idol—or [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetHerHis] life."
 lepsius.565.f_right: "It was an affair of wit, not muscle. Choosing K'inich Ajaw, the Sun Lord who 'keeps the count of days,' spared [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetHerHim] the device’s malice. Slipping through the contrivances unscathed, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] secures the idol and hastens out; word reaches [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetHerHim] that a rival party is on the way, and so the team quits the site at once."
 lepsius.565.f_wrong_right: "As [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] flees the passage, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] catches a root and swings clear while the stone hurtles past and bursts into the jungle. Outside lie scattered spears and fallen men—the wreckage of an ambush undone by the same trap. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe|U] cannot prove it, but the scene bears the touch of a foreign rival who meant to let us spring the hazards for him. No matter—time to move on."
 lepsius.565.f_wrong: "With a final leap [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] gains the threshold—only to be ringed by bowmen. A suave voice with a soft [SCOPE.sCountry('lepsius_archaeological_rival').GetAdjectiveNoFlag] accent drifts from the trees as a man in pale linen steps forward: 'A pleasure at last. But this piece belongs in better hands.' Outnumbered and with the porters slain, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe|U] yields the idol. 'Too bad the Hovitos do not know you as I do,' [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] mutters—and seizes a chance to escape, empty‑handed."
 lepsius.581.d: "[SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] has come forward with a personal concern: [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] wants to prove that the \"Lost World\" actually exists and thus restore his honor. [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe|U]'s raising money for a private expedition."
 lepsius.581.f: "Several years have passed since much of the Yucatán expedition mysteriously disappeared. [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] has since become the laughingstock of the academy. Cartoons in the newspapers portray [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHim] as crazy with [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHis] 'Dino stories'. The trauma has left deep scars: [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] is obsessed with proving to the world that the alleged valley is real. [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe|U] is said to have now spent [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHis] entire inheritance to set up an expedition at [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHis] own expense. Of course, [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] also asked the state for support for [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHis] completely insane journey. Our experts advise against this suicide mission - everyone knows how the last expedition to Yucatán went. There are therefore voices that want to forbid such an expedition altogether. However, this could only aggravate [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHis] mental state. Still others think [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] should be let go, but without further official interference; after all, nobody wants to be associated with the journey of an apparently mentally disturbed man. Only a minority even thinks to open their wallets for this madness. They argue that we have an alleged responsibility for [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHis] condition..."
 lepsius.581.h: "May [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] hunt [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHis] dinosaurs."
 lepsius.582.f: "Months after [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] disappeared into the forests of Yucatán, the exhausted adventurer reappeared in the provincial capital of Mérida. Again [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] had lost many helpers and the rest of [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHis] troupe was in a sorry state. Alongside a number of witnesses, however, [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] had one compelling piece of evidence: thanks to modern photographs, verified as authentic by several scholars, [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] has unbeatable claims for [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHis] wild stories. And indeed: one can clearly see pterosaurs and herbivorous brontosaurs on the illustrations! The people celebrate [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] as an idol, the professional world is shocked, and our government is seen as a stubborn group of ignoramuses who have denied a national hero the fame [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] deserves!"
 lepsius.583.d: "We haven't heard from [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] for months. Apparently [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] is lost in the unknown depths of the Yucatán forest."
 lepsius.583.f: "Perhaps one day tragic plays could be made about the matter. [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName], who was close to mad shortly before [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHis] life, apparently searched for traces of the alleged dinosaur valley to the last. Disease and hostile Mayan tribes killed [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHis] expedition. One of the few survivors reports that [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] last claimed to have rediscovered the slopes of the plateau in which the valley lies. But the last of the men would have mutinied and gone home. Nobody knows what became of [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHim]. However, we have reason to believe that alone and emaciated, [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] had little chance of surviving whatever ultimately killed [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHim]."
 lepsius.583.g: "[SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe|U] really wasn't a bad guy. A bad explorer yes, but noch a bad guy."
 lepsius.584.f: "Actually, everyone had expected that this journey would not be long: either because the circumstances condemned the men to death or a mutiny would break out. The discovery one morning was all the more astonishing. [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] had been leading the troop through the impenetrable forests of Yucatán for days like a manic prospector. It seemed as if [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] recognized every tree and every stone. The other expedition members had taken this as either madness or part of an elaborate plan to deceive them and give them false hope. But now, on the slopes of a vast plateau, in the hollow of which lies the fabled valley [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe]'s been talking about for years, some are revising their views. The scream of a pterodactyl reverberates through the air and pierces through the ears of the participants so deeply that all doubts are dispelled."
 lepsius.586.f: "Actually, [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] should be satisfied: [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] was right with all [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHis] claims. The team has already collected a whole range of evidence that should cause a sensation at home. But on closer exploration of the Lost World, it turns out more and more that [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] was not the first person in this valley. In fact, there seems to have been a significant Mayan presence in this area around 1,500 years ago. Apparently, the inhabitants of a hitherto unknown Mayan city came to this valley at regular intervals. [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] speculates that the tradition of human sacrifice might have its origins here. Be that as it may, there is strong evidence that the valley served a religious function. A collaborator recently unearthed Mayan artifacts, suggesting that their discovery might cause an even greater sensation than a few scattered giant lizards. The problem: the suspected Mayan site is in the middle of an area inhabited by raptors! Most of the expedition members therefore insist on returning home immediately instead of letting one suicide mission follow the next."
 lepsius.587.f: "Only one survivor. Nothing more is left of the expedition. It is a young research assistant at the university. He is traumatized and physically in poor condition. So reports a telegram from Yucatán. You couldn't squeeze a lot out of him. Apparently, our expedition leader made a crucial, tragic mistake when attempting to survey a Mayan site in the Lost World. A mistake for which almost all members of the expedition paid with their lives. The incident caused such a shock that all trips to the Yucatán that were not strictly archaeological were banned indefinitely."
 lepsius.587.g: "[SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe|U] chose ... poorly."
 lepsius.588.f: "Kukulkan was known to the Mayans as the feathered serpent - a deity worshiped by the Aztecs under the name Quetzalcoatl. Was it a coincidence that the Maya knew of this valley? Was there a connection between the Lost World and the Kukulkan cult? [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] cannot decide this yet. What [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] did discover, however, was that between raptor nests lay a long-forgotten sanctuary that represented the feathered serpent that is called Kukulkan in this country. A mysterious gem set in an amulet was striking. It is of such amazing beauty that the expedition leader dubbed it the 'Gem of Kulkulkan' - the deity possessed a jewel with which he could control the wind. It is probably one of the greatest archaeological finds of Central and South America."
 lepsius.588.g: "[SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe|U] chose wisely."
 lepsius.589.d: "Our expedition from the Lost World led by [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] has returned. [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe|U] and his team are celebrated as heroes by the people."
 lepsius.589.g: "[SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHim]에 영광을!"
 lepsius.803.d: "[SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] has completed his travel preparations. [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetSheHe|U] will leave today to advance the knowledge at an already established excavation site."
 lepsius.803.f: "The absence of our archaeologist is expected to be around a year but may vary depending on the situation. At the end of [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetHerHis] activity [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetSheHe] will open up a new excavation site, the quality of which may vary. [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetSheHe] will also find references to previously unknown archaeological sites."
 lepsius.811.f_vok: "[SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] reports that [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetSheHe] has discovered a small tomb in the Valley of the Kings. Grave robbers have apparently already stolen a large number of objects, and graffiti shows that it was also known in Late Antiquity. The expedition leaders decided to carry out an excavation there in the hope of being able to report more finds later."
 lepsius.811.f_ass: "The excavation in Assyria had its difficulties from the start. After a few days, [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] still couldn't find a good excavation site, so [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetSheHe] contented himself with the next best site. So far they have only uncovered the foundations of a shrine that may have once been part of a larger complex."
 lepsius.812.f_bab: "Times have not devoured all the witnesses of Babylonian greatness in Mesopotamia. After [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] had refreshed [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetHerHis] water supplies, locals told [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetHerHim] about a strange ruin that the devout Muslims in the region avoid because of their pagan origins. As it turned out, it is the remainder of a ziggurat. The complex is surprisingly well preserved and according to the latest reports, our archaeologists have even unearthed the first finds."
 lepsius.813.f_vok: "A sensational telegram arrived this morning. [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] reports that [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetSheHe] has discovered the tomb of a Queen. The identity of the dead consort is not entirely clear, but according to initial reports the burial chamber is surprisingly intact. Wall paintings and valuable artifacts give a valuable insight into Ancient Egypt that has not been known for a long time."
 lepsius.813.f_bab: "Legends of the Babylonian gates and city walls have survived for thousands of years. But it is always something else when they are in front of you. At first, [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] couldn't believe it as [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetSheHe] walked wall after wall and discovered the enormous dimensions of a lost city. This discovery will keep us busy for years to come."
 lepsius.813.f_ass: "In addition to being a major military power, the Assyrians were also famous for their gardens. Some even claim that the famous Gardens of Babylon were actually located in the Assyrian capital of Nineveh. During the excavation of a palace complex and adjoining terraces, [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] was able to see for [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetHerselfHimself] the splendor of Assyrian culture. The museum management rejoices."
 lepsius.2191.t: "Inca Bathing Complex Unearthed"
 lepsius.2191.d: "Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] unearthed a spectacular find in [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]. The site has revealed a bath complex of the Inca Empire. Initial assumptions are that the complex was used for ritual ceremonies."
 lepsius.2191.f: "\"Isn't it ironic that we dug up a bath and could use a bath ourselves now?\""
 lepsius.2191.g: "A bath would be great right now!"
 lepsius.2192.t: "Inca Skull with a Hole discovered"
 lepsius.2192.d: "A strange Fund was made in [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]. During the excavation of an Inca site, Professor [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] came across a large number of bones. One skull in particular caught [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] eye. The skull had a hole that appeared to have been made on purpose. Apparently, the deceased survived the trial, as the hole had partially closed again."
 lepsius.2192.f: "\"I'm sure it must have been a human sacrifice! What do you think?\""
 lepsius.2192.g: "Aliens!"
 lepsius_recent_excavation_inspection_modifier: "Recent Archaeological Inspection"
 lepsius.2193.t: "Incan Mountain Mummies"
 lepsius.2193.d: "During an expedition with [SCOPE.sCharacter('lepsius_mountaineer_character_scope').GetFullName] in [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName], Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] made a shocking discovery. On a mountain they found the remains of a young girl, who was now mummuified. It seems that she was a \"qhapaq hucha\" of the Incans, a child sacrifice. Although it is a sad find it could lead to various new insights into the Inca."
 lepsius.2193.f: "\"It was ice cold, the wind the wind tore at our clothes and we could barely see anything. When we noticed the body, we first thought that it was a mountaineer who died in similar circumstances that we had to endure now. But soon we realized that it was not a mountaineer but a young girl.\""
 lepsius.2193.g: "This is quite sad."
 lepsius.2194.t: "Inca Ruins"
 lepsius.2194.d: "Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] made a discovery in a far of region of [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]. He found various ruins from the time of the Inca Empire. Most of the ruins are scorched and some European equipment was found, which led to the idea that this settlement was destroyed by the Spanish. They probably also plundered the settlement, as no other finds were made. Everything of value seemed to have been removed."
 lepsius.2194.f: "\"A long time ago those ruins must have been well constructed dwellings. They seem to be able to withstand even earthquakes. Just... Spanish invaders seem to be stronger than earthquakes apparently.\""
 lepsius.2194.g: "No gold? Why even bother?"
