 lepsius_ariadne_discoverer_loc: "\n\n#V 아리아드네의 실타래#!는 [GetGlobalVariable('lepsius_ariadne_year_global_var').GetValue|V0]년 [GetGlobalVariable('lepsius_ariadne_discoverer_global_var').GetCountryDefinition.GetName]에서 처음 발견하였습니다."
 lepsius_state_trait_persepolis: "아케메네스 제국의 보석 페르세폴리스\n고고학 과제를 통한 @lepsius_local_minor! 현지 유물 #G +1#!"
 je_lepsius_persepolis: "아케메네스 제국의 보석"
 je_lepsius_persepolis_reason: "페르세폴리스는 일찍이 고대의 역사학자와 저술가들로부터 칭송을 받은 도시였다. 이곳은 수백 년 동안 먼 곳에서 온 방랑객들을 매혹시켰던 유적으로서 그 존재가 잊혀진 적이 한번도 없었으며, 무엇보다도 페르시아 제국의 고대 수도로서 알렉산더 대왕이 공격 목표로 삼았다는 전승이 널리 전해지고 있다. 허나 현대적인 발굴 작업은 여전히 진행 중에 있는 상태다."
 lepsius.69.t: "페르세폴리스"
 lepsius.69.d: "알렉산더 대왕의 군대가 장대한 페르세폴리스를 파괴한 지 거의 2500여년이 흘렀지만 [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] 박사가 이끄는 발굴단은 보존할 것은 보존하고, 복원할 것은 복원하며, 연구할 것은 연구하기 위해 온 노력을 다하고 있다. 미참내 그 모든 약탈과 파괴를 뒤로 하고 페르세폴리스 시에 대한 과학적 조사를 실시할 수 있게 되었다."
 lepsius.69.f: "\"페르세폴리스는 페르시아 왕조의 수도다. 알렉산더 대왕은 마케도니아에게 이 도시가 아시아에서 가장 미움받는 도시라 일컬었으며, 궁전을 제외한 모든 것을 약탈하라는 명을 제군들에게 내렸다. 페르세폴리스는 세상에서 가장 부유한 도시였으며, 개인 주택은  오랜 세월에 걸쳐 온갖 부를 축적하고 있었다. 마케도니아군은 도시로 진격하여 마주치는 모든 남자를 학살하고 주택가를 약탈하였다. 많은 집이 평민의 소유였으며, 갖가지 가구와 의복으로 풍족하게 넘쳐났다.\"\n- 디오도로스 시쿨루스"
 lepsius.2271.t: "Tairona Pendants"
 lepsius.2271.d: "A local archaeological excavation has unearthed valuable gold pendants. Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] has already examined the exclusive pieces in detail and considers them masterpieces of pre-Columbian art."
 lepsius.2271.f: "The Tairona were a highly advanced pre-Columbian civilisation in the Sierra Nevada de Santa Marta in what is now Colombia. Renowned for their outstanding engineering skills, they overcame the steep terrain by constructing complex stone terraces, drainage systems and paved paths. Their society was organised into rival chiefdoms such as Bonda and Pocigüeica, which were spiritually united by an influential priestly caste. The Tairona are famous for their 'lost gold' - exquisite goldwork using the tumbaga technique, which often depicted shamanic transformations and the revered jaguar."
 lepsius.2271.g: "Colombia is full of archaeological treasures!"
 lepsius.2272.t: "San Agustín Statue"
 lepsius.2272.d: "In southern Colombia, farmers have reported an abandoned site where several mysterious statues are said to be located. An archaeological team has examined one of these enigmatic figures more closely."
 lepsius.2272.f: "The enigmatic San Agustín culture left behind one of South America's most significant archaeological sites in the Colombian highlands. Between 200 BC and 800 AD, unknown sculptors created over 500 monumental statues from volcanic rock, which are scattered across a vast mountainous landscape. These sculptures, some of which are over four metres tall, guard monumental burial sites and ceremonial centres. The depictions are often anthropozoomorphic: human features merge with the teeth of predators, eagle claws or serpentine attributes, suggesting a deeply rooted shamanism and ancestor worship. Particularly striking are the depictions of the 'double self', in which one figure carries another on its back. As the culture disappeared centuries before the arrival of the Spanish and left no written records, the stone guardians of places such as the Bosque de las Estatuas remain a mystery of Andean archaeology."
 lepsius.2272.g: "A culture that leaves so many questions unanswered!"
 lepsius.2273.t: "Zenú Artifacts"
 lepsius.2273.d: "Archaeological investigations have uncovered several everyday objects from the Zenú culture and informed the Museum in [ROOT.GetCountry.GetCapital.GetCityHubName]."
 lepsius.2273.f: "The Zenú (or Sinú) people thrived in the fertile lowlands and river valleys of northern Colombia. Their enduring legacy is a monumental system of water management: over the centuries, they created a vast network of artificial canals that drained over 500,000 hectares of land in a controlled manner, thereby enabling intensive agriculture in a region prone to flooding. Socially, they were divided into three provinces, each specialising in production, religion and burial rites. Their craftsmanship was evident in delicate goldwork - mostly in the form of aquatic and terrestrial animals - as well as in weaving. The tradition of the Sombrero Vueltiao, now a national symbol of Colombia, has its roots in the Zenú's basket-weaving craft."
 lepsius.2273.g: "A people with great craftsmanship."
 lepsius.2274.t: "Muisca Gold"
 lepsius.2274.d: "Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] raves about a hoard [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] and [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] team recently secured in the Andes. It contained several valuable artifacts. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe|U] is absolutely certain: these treasures once belonged to the legendary Muisca."
 lepsius.2274.f: "The Muisca (or Chibcha) inhabited the cool highlands of the Andes in what is now central Colombia. Together with the Inca, Maya and Aztecs, they formed one of the four most advanced civilisations in the Americas, though they eschewed monumental stone architecture in favour of wood and thatch. Politically, their territory was organised into the Muisca Confederation, led by the Zipa (Bacatá) and the Zaque (Hunza). Their economy was based on an extensive trade network for salt, emeralds and textiles. They became world-famous through the legend of El Dorado: at the inauguration of a new ruler, he would ritually cover himself in gold and sacrifice gold figurines (tunjos) in Lake Guatavita. These magnificent goldsmith's works served not as currency, but as spiritual offerings."
 lepsius.2274.g: "A tiny glimpse of the gold that was once lost..."
 lepsius.550.tt: "Specializing in Aegean archaeology can unlock the secret."
 lepsius.550.t: "Mysterious Minoan Palace"
 lepsius.550.d: "During the expedition, Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] found ruins not far from Knossos that apparently no one has cataloged before."
 lepsius.550.f: "Of course, only very modest remains of the former complex were left. The archaeologists suspect that the majority of the palace may lie underground. However, this would require an extensive excavation project, which would not be possible on this general expedition. Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] decides to examine and research the site in detail in the future."
 lepsius.550.g: "What secrets might lie hidden in this palace?"
 je_lepsius_mysterious_minoan_palace: "Mysterious Minoan Palace"
 je_lepsius_mysterious_minoan_palace_reason: "During an expedition, our archaeological team discovered a mysterious palace near Knossos. The excavation requires a significant focus on Aegean archaeology in order to unlock its secrets."
 je_lepsius_the_labyrinth_fail: "If Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastNameNoFormatting] gets lost too often, there is a risk that something very, very bad will happen to [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim]..."
 je_lepsius_the_labyrinth_success: "Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastNameNoFormatting] escapes the maze without getting too lost."
 lepsius_labyrinth_progress_bar: "진행도"
 lepsius_labyrinth_progress_bar_desc: "미궁 진행도: #v [JournalEntry.GetCurrentBarProgress(ScriptedProgressBar.Self)|1%]#! ([JournalEntry.GetCurrentBarValue(ScriptedProgressBar.Self)|0]/4)"
 lepsius_labyrinth_confusion_bar: "혼동"
 lepsius_labyrinth_confusion_bar_desc: "미궁 혼동: #v [JournalEntry.GetCurrentBarProgress(ScriptedProgressBar.Self)|1%]#! ([JournalEntry.GetCurrentBarValue(ScriptedProgressBar.Self)|0]/4)"
 lepsius.2241.t: "Khmer Temple"
 lepsius.2241.d: "A local archaeological expedition in [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName], led by Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName], has discovered a previously unknown temple from the Angkor Empire!"
 lepsius.2241.f: "The architecture of the Khmer Empire, peaking between the 9th and 13th centuries, was primarily characterized by the Temple Mountain design. These sandstone structures were built to represent Mount Meru, the mythical home of the gods. Architects employed sophisticated corbel arches to create extensive galleried enclosures, which were often surrounded by vast moats symbolizing the cosmic ocean. The aesthetic is defined by the Prasat, or lotus-bud tower, and bas-relief carvings that transform stone walls into narrative tapestries of Hindu mythology and imperial history. As seen in the iconic Angkor Wat, this style achieved a perfect balance of symmetry, massive scale, and intricate detail."
 lepsius.2241.g: "Astonishing."
 lepsius.2242.t: "Khmer Sculptures"
 lepsius.2242.d: "In the jungle, Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] discovered some magnificent Khmer statues, whose exquisite aesthetics have impressed numerous fellow archaeologists. However, there is still disagreement about how to proceed with them..."
 lepsius.2242.f: "Khmer sculpture during the Angkor period is renowned for its transition from Hindu iconography to a distinct, localized aesthetic that emphasizes serenity and spiritual authority. Unlike the dynamic poses found in Indian art, Khmer statues are characterized by a hieratic stillness and a sense of monumental permanence. Early works often depicted Hindu deities like Vishnu and Shiva with powerful, athletic frames. However, the 'Angkor Wat style' introduced more refined proportions and elaborate jewelry. By the late 12th century, under King Jayavarman VII, the focus shifted toward Mahayana Buddhism. This era produced the iconic 'Bayon style', famous for the Angkor Smile—a facial expression featuring closed eyes and slightly upturned lips, symbolizing internal peace and detached enlightenment."
 lepsius.2242.g: "Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] should thoroughly examine and study the statues."
 lepsius.2242.h: "Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] should cut up the statues and send them to the museum."
 lepsius.2243.t: "Khmer Artifacts"
 lepsius.2243.d: "The archaeological team in [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] has found a hoard of artifacts from the time of the Angkor Empire. Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] secured bronze vessels and ceramics."
 lepsius.2243.f: "While monumental architecture and sculpture dominate the narrative, Khmer craftsmanship excelled in diverse media. Bronze casting was a pinnacle of their metallurgical skill; using the lost-wax technique, artisans created elaborate ritual vessels, palanquin fittings, and bells often adorned with intricate floral motifs or mythical creatures like the Garuda. Ceramics played an equally vital role, particularly the distinctive 'brown-glaze' stoneware produced in provincial kilns. These vessels, often shaped as animals like elephants or owls, served as containers for lime used in betel nut chewing or as storage for precious oils. Additionally, the Khmer were masters of jewelry and goldwork, forging heavy necklaces, armbands, and tiaras from beaten gold to adorn both royalty and wooden cult images."
 lepsius.2243.g: "New exhibits for our museum."
 lepsius.2244.t: "Khmer History"
 lepsius.2244.d: "Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] has compiled his accumulated knowledge about the Khmer Empire of Angkor into a monograph. The book is already considered a standard work."
 lepsius.2244.f: "The Khmer Empire, or the Angkor Empire, emerged in the early 9th century as the dominant power in Southeast Asia, spanning much of modern-day Cambodia, Thailand, Laos, and Vietnam. Founded in 802 AD by Jayavarman II, who declared himself a 'universal monarch' (chakravartin), the empire unified disparate principalities through a sophisticated blend of Hindu-Buddhist kingship and advanced hydraulic engineering. The empire's prosperity relied on a complex system of barays (reservoirs) and canals, which allowed for intensive rice cultivation and supported a massive population. At its peak in the 12th century, the Khmer reached an artistic and political zenith, constructing monumental capitals like Angkor Thom. However, by the 14th and 15th centuries, the empire declined due to a combination of ecological failure, the rise of powerful Thai kingdoms, and the shifting of trade routes, leading to the eventual abandonment of Angkor."
 lepsius.2244.g: "This book belongs in the National Library."
 lepsius.2251.t: "Aksumite Coin Hoard"
 lepsius.2251.d: "A local archaeological excavation in [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] has unearthed a rich hoard of coins from late antiquity - Roman and Aksumite coins could be secured."
 lepsius.2251.f: "Coinage was introduced in the Aksumite Empire around 270 AD under King Endubis. Aksum was the first major polity in sub-Saharan Africa to mint its own currency, producing coins in gold, silver, and bronze. These issues were designed to facilitate international commerce, particularly with Rome and Byzantium, and often featured Greek inscriptions—the lingua franca of the Red Sea trade. Early issues depict traditional polytheistic symbols like the crescent and disc, while coins minted after King Ezana's conversion in the 4th century prominently feature the Christian cross."
 lepsius.2251.g: "This will please numismatists."
 lepsius.2252.t: "Aksumite Palace"
 lepsius.2252.d: "Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] and his team recently succeeded in painstakingly uncovering the foundations of a huge palace complex, which undoubtedly belongs to the period of the Aksum Empire."
 lepsius.2252.f: "The palace architecture of the Aksumite Empire is characterized by massive, multi-story pavilions built upon elevated masonry platforms. The most famous example is Dungur in Aksum - the so-called Palace of the Queen of Sheba. Architecturally, these palaces utilized the distinctive 'monkey-head' technique, where horizontal wooden beams were embedded in stone walls to provide structural reinforcement, with their protruding ends creating a rhythmic external pattern. The foundations were constructed from finely dressed granite blocks, often featuring recessed walls to add aesthetic depth and stability."
 lepsius.2252.g: "Palaces worthy of King Solomon!"
 lepsius.2253.t: "Ge'ez Literature"
 lepsius.2253.d: "Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] was able to acquire a valuable writing from the ancient Aksumite Empire for the museum."
 lepsius.2253.f: "The literature of the Aksumite Empire is inextricably linked to the introduction of Christianity and the development of Ge'ez, a unique South Semitic script. While early Aksumite inscriptions on stone monuments were often multilingual—utilizing Greek and Sabaean—the empire eventually fostered a rich indigenous literary tradition centered on religious and royal texts. The most significant literary undertaking was the translation of the Bible and various apocryphal texts from Greek into Ge'ez during the 5th and 6th centuries. Works like the Garima Gospels, featuring stunning illuminations, represent some of the world's oldest Christian manuscripts."
 lepsius.2253.g: "A precious work of writing!"
 lepsius.2254.t: "Aksumite History"
 lepsius.2254.d: "Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] has compiled his accumulated knowledge about the Aksumite Empire into a monograph. The book is already considered a standard work."
 lepsius.2254.f: "The Aksumite Empire (c. 100-940 AD) emerged in the highlands of modern-day Ethiopia and Eritrea, evolving into one of the four great powers of the ancient world alongside Rome, Persia, and China. Its prosperity was built on its strategic control over the Red Sea trade routes, linking the Roman Empire to India. Through the port of Adulis, Aksum exported gold, ivory, and emeralds, while importing silk and spices. Under King Ezana in the 4th century, Aksum reached its political zenith and became one of the first major empires to adopt Christianity as its state religion. This transition profoundly influenced the region's art, architecture, and the development of the Ge'ez script. However, by the 7th century, the rise of Islamic caliphates shifted trade routes and isolated the empire. Ecological degradation and internal unrest eventually led to its decline, though its cultural and religious legacy remains the foundation of the modern Ethiopian state."
 lepsius.2254.g: "This book belongs in the National Library."
 lepsius.2261.t: "Mississippian Figurines"
 lepsius.2261.d: "Artful figurines showcasing the creativity of the American Native Americans of Mississippian culture were presented to the press today by Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]. They were found in [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]."
 lepsius.2261.f: "Mississippian stone statues, dating from approximately 800 to 1500 AD, represent a pinnacle of prehistoric North American figurative art. Carved primarily from fluorspar, sandstone, or bauxite, these anthropomorphic figures were central to the ancestral cults of the Southeastern Ceremonial Complex. Typically found in pairs within temple-mortuary complexes atop earthen mounds, the statues depict seated or kneeling men and women. They are characterized by a monumental stillness, featuring rigid postures, stylized hairstyles (such as the 'top-knot'), and serene, stoic facial expressions. These figures are believed to embody the spirits of high-ranking ancestors or lineage founders."
 lepsius.2261.g: "Collect as many as possible."
 lepsius.2262.t: "Mississippian Mound"
 lepsius.2262.d: "Archaeologists have discovered a massive mound, almost as large as the well-known structures of the Maya and Aztecs. Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] was immediately summoned to investigate this fascinating remnant of the Mississippian culture in more detail."
 lepsius.2262.f: "The defining feature of Mississippian culture is the construction of massive earthwork mounds, which transformed the floodplains of the American Midwest and Southeast into complex urban landscapes. Unlike the conical burial mounds of earlier periods, Mississippian mounds were typically flat-topped pyramids, or platform mounds, designed to support wooden temples, council houses, or the residences of the elite 'Sun' deities. Constructed by hand using baskets of soil, these structures served as the ceremonial and political heart of chiefdoms. The most famous example, Monks Mound at Cahokia, rises 30 meters and covers over 5 hectares, rivaling the Great Pyramid of Giza in base area."
 lepsius.2262.g: "Pyramids of mud!"
 lepsius.2263.t: "Mississippian Ceramics"
 lepsius.2263.d: "A local excavation in [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] has found a ceramic hoard that is dated to the late 1st millennium BC and appears to be related to the urban culture of the Mississippian culture."
 lepsius.2263.f: "Mississippian ceramics distinguished themselves primarily by the use of crushed mussel shells as a tempering agent. This innovation allowed potters to create thinner, stronger walls and more complex shapes than previous grit-tempered methods. The pottery is renowned for its diverse forms, including hooded water bottles, plates, and 'effigy' jars shaped like animals, human heads, or mythological beings. Aesthetic styles varied by region; the 'Avenue Polychrome' featured vibrant red and white slip designs, while others utilized deep incising or negative painting. Many vessels served ritual purposes, decorated with motifs from the Southeastern Ceremonial Complex like the 'hand and eye' or 'sunburst.'"
 lepsius.2263.g: "Wait, they are made of shells?"
 lepsius.2264.t: "Mississippian Burial Site"
 lepsius.2264.d: "Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] has discovered hidden graves of the Mississippian culture and made some remarkable finds."
 lepsius.2264.f: "Mississippian burial practices were deeply intertwined with social hierarchy and cosmological beliefs, reflecting a highly stratified society. Elite individuals were often interred within mortuary temples atop platform mounds or in specialized burial mounds. These high-status graves frequently contained prestigious grave goods, such as embossed copper plates, marine shell gorgets, and finely crafted ceramics, intended to accompany the deceased into the afterlife. In contrast, commoners were typically buried in simpler cemetery plots near residential areas. A distinctive feature of this period was the use of stone box graves, where the deceased were placed in cists lined with limestone or sandstone slabs."
 lepsius.2264.g: "Fascinating!"
 lepsius.2281.t: "Scythian Weapons"
 lepsius.2281.d: "During a local excavation in [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName], archaeologists have unearthed a Scythian weapons hoard. Bridles, bows, and scimitars bear witness to the weaponry of this ancient steppe people."
 lepsius.2281.f: "Scythian warfare was defined by mobility and long-range lethality. The primary weapon was the composite bow, made of wood, horn, and sinew. It was carried in a gorytos, a specialized leather case housing both the bow and up to 200 bronze-tipped arrows, enabling rapid, sustained fire from horseback. For close-quarters combat, Scythians utilized the akinakes, a distinctive iron short sword or dagger with a rectangular or 'kidney-shaped' guard. Archaeological finds also frequently include the sagaris, a narrow-bladed battle-axe capable of piercing helmets. Protection consisted of scale armor, featuring overlapping iron or bronze plates stitched onto leather vests. "
 lepsius.2281.g: "No wonder they ruled the steppe!"
 lepsius.2282.t: "Scythian Kurgan"
 lepsius.2282.d: "Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] was able to announce some very good news to the museum today: Apparently, [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] team has discovered a previously unknown kurgan - a Scythian burial mound."
 lepsius.2282.f: "The Scythian kurgans of the Pontic steppe are  burial mounds that served as both elite tombs and territorial markers. They typically feature a central wooden chamber built from massive oak or larch logs, sunken deep into the earth. To honor the deceased, vast quantities of soil and turf were piled overhead, often reaching heights of over 20 meters in 'royal' kurgans like Chertomlyk. Beyond the primary burial, these mounds frequently contain lateral chambers for sacrificed servants and distinct pits for dozens of warhorses, fully equipped with bronze bits and bridles."
 lepsius.2282.g: "I usually jump when a professor comes into the room and announces 'Good News!...'"
 lepsius.2283.t: "Scythian Settlement"
 lepsius.2283.d: "Archaeologists have discovered a large-scale settlement of the ancient Scythians. Excavations so far have unearthed artifacts and human remains that expand our knowledge of this ancient steppe culture."
 lepsius.2283.f: "The most prominent example for a Scythian settlement is the Belsk fortified site, a proto-urban complex enclosed by earthen ramparts stretching over 30 kilometers. These settlements were strategically positioned along river routes to control trade and protect livestock. Archaeological excavations have uncovered permanent timber dwellings, storage pits, and specialized workshops for iron smelting, bronze casting, and weaving. These centers acted as economic hubs where nomads exchanged raw materials for Greek luxury goods like wine and pottery."
 lepsius.2283.g: "Gigantic villages..."
 lepsius.2284.t: "Scythian Babas"
 lepsius.2284.d: "Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] has found an ancient stele in the area of [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]. It dates back to the time of the ancient Scythians."
 lepsius.2284.f: "Scythian stelae, or 'Stone Babas,' are monumental sandstone slabs marking kurgan summits across the Pontic steppe. Functioning as ancestral monuments, these statues depict deceased warriors in a rigid, frontal pose. Unlike the stylized 'deer stones' of the East, these figures are anthropomorphic, featuring detailed engravings of Scythian military equipment. Central to their iconography is the warrior's belt, displaying the akinakes (dagger), gorytos (bow-case), and whetstones. Many figures hold a ritual drinking horn (rhyton) to their chest, symbolizing high status and cultic banquets. The 'babas' served as territorial markers and focal points for funerary rituals."
 lepsius.2284.g: "Take baba to the museum."
 lepsius.2285.t: "The Golden Comb"
 lepsius.2285.d: "Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] has made the most remarkable discovery to date in Scythian archaeology in Solokha: The kurgan there contains a vast gold treasure. The highlight is a golden comb depicting battle scenes."
 lepsius.2285.f: "The Solokha Kurgan, located on the left bank of the Dnieper in modern-day Ukraine, is a premier site of Scythian archaeology discovered by Nikolai Veselovsky in 1912. Dating to the early 4th century BCE, this monumental burial mound stood 18 meters high. It contained two royal chambers: an earlier central grave, which had been looted in antiquity, and an intact side tomb. The latter revealed the remains of a Scythian king, a cup-bearer, and a guard, accompanied by five sacrificed horses. Beyond its famous gold artifacts, the inventory includes a vast array of Greek amphorae, bronze weaponry, and a silver ritual vessel."
 lepsius.2285.g: "It's far too beautiful to use for combing your hair..."
 lepsius.2291.t: "바이킹의 룬석"
 lepsius.2291.d: "[SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] 지역의 외딴 곳에서 [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] 박사가 룬 문자가 새겨진 비석을 발견하였다. 그 연대는 바이킹 시대로 거슬러 올라가는 것으로 확인되었다."
 lepsius.2291.f: "바이킹 룬석은 주로 화강암이나 사암 재질에 후기 푸타르크식 룬 문자를 새긴 뒤에 세운 기념비를 말한다. 이러한 비석은 주로 9세기부터 11세기까지 스칸디나비아 일대에 세워졌으며 그 중에서도 지금의 스웨덴 지역에 가장 높은 분포를 보인다. 무덤의 비석과는 달리 룬석은 무덤 위에 세워지는 경우는 드물고, 죽은 자를 기리거나 상속 관계를 기록하고, 중대한 업적이나 원정을 자랑하는 공공 기념비로 활용되었다."
 lepsius.2291.g: "룬석을 판독하시오."
 lepsius.2291.h: "룬석을 박물관에 들이시오."
 lepsius.2292.t: "바이킹 정착촌"
 lepsius.2292.d: "[SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] 지역의 어느 농부가 밭에서 심상찮은 것을 발견하고 당국에 신고하였다. 학계에서 해당 지역을 발굴한 결과 바이킹 시대의 유물이 출토되었다. 이어 경험 많은 고고학자들로 구성된 발굴단이 정착촌 전체를 발굴하기에 이르렀다."
 lepsius.2292.f: "바이킹 정착촌의 기본적인 건축 요인으로 랑후스(langhús)라 불리우는 직사각형 형태의 공동주택이 있었다. 이 주택은 일반적으로 길이가 15~30m에 달했으며, 목재, 토탄, 석재로 만들어진 곡선형의 선박 모양 벽체와 난방, 취사용 중앙 화덕을 둔 것이 특징이었다. 북대서양 일대에서는 현지 환경에 맞춰 정착촌의 모습도 변화하였는데, 아이슬란드와 그린란드처럼 목재가 부족한 지역에서는 토탄이 주요 건축 자재로 활용되었다. 이러한 정착촌의 양식이 북미 대륙까지 잠시나마 진출하였음을 확인된 증거로 뉴펀들랜드의 랑스 오 메도즈(L'Anse aux Meadows) 등의 유적지 발굴 사례가 꼽힌다."
 lepsius.2292.g: "이런 잔혹한 약탈자들이 가정에서는 자상한 가장이기도 했다는 점이 믿기 어렵군."
 lepsius.2293.t: "바이킹의 롱십"
 lepsius.2293.d: "[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] 박사가 보존 상태가 양호한 옛 바이킹 선박의 잔해를 발견하였다. 박사가 이끄는 발굴단이 현장 보존을 통해 여러 점의 파편을 수습할 수 있었다."
 lepsius.2293.f: "바이킹의 롱십은 바이킹 시대에 노르드인들이 무역과 탐험, 전쟁을 목적으로 개발하고 사용했던 특수한 형태의 선박을 말한다. 길고 날렵한 목조 선체, 얕은 흘수, 선수와 선미의 대칭이 특징이다. 이러한 설계 구조 덕분에 깊은 바다와 얕은 내륙 수로 모두에서 빠른 속도로 항해가 가능했다. 건조에는 주로 겹판 공법이 사용되었는데, 보통 참나무로 만든 목재 판자를 겹쳐 철제 대갈못으로 고정하는 방식이었다. 이러한 구조로 대서양의 거친 파도에도 견딜 수 있는 유연성을 확보할 수 있었다. 커다란 사각돛 하나와 여러 개의 노를 통해 추진력을 얻었으며, 그에 따라 '용선'이라는 별명이 붙기도 하였다. 바이킹 롱십은 바람의 방향과 상관없이 해안 상륙이나 전술 기동을 수행할 수 있었다."
 lepsius.2293.g: "다시 바다에 띄울 수 있는가? 아니라고? 그럼 박물관에 들여야겠군!"
 lepsius.2294.t: "바이킹의 배 무덤"
 lepsius.2294.d: "고고학계에 파장이 일고 있다! [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] 연안 지역에서 [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] 박사가 이끄는 고고학 조사단이 매장지로 사용된 것으로 보이는 완벽 보존된 바이킹 선박을 발견한 것이다. 족장의 유해와 더불어 귀중한 유물들이 다수 매장되어 있었다!"
 lepsius.2294.f: "바이킹의 배 무덤은 사회적 지위가 높은 사람의 시신을 항해용 선박 안에 매장하는 장례 풍습이다. 이는 사후 세계(발할라나 폴크방그르)로 향하는 데 배를 타고 가야 한다는 믿음에 따른 것이다. 매장 의식은 선박 내부 공간에 고인을 안치하는 것으로 시작되었으며, 부장품은 말이나 개 등의 희생 제물, 무기와 고급 원단이 주를 이루었고, 때로는 노예와 같은 다양한 것들을 함께 묻기도 했다. 오세베르크 선박 등의 유적지에서는 화려한 무기, 은 장신구, 생활 도구 등 풍부한 부장품이 발견되어 노르드인들의 뛰어난 장인 정신을 엿볼 수 있다."
 lepsius.2294.g: "저들에겐 발할라를, 우리에겐 유물을"
 lepsius.2106.t: "프리마 포르타의 아우구스투스상"
 lepsius.2106.d: "프리마 포르타에서 [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] 박사가 전혀 예상치 못한 발견을 해냈다. 로마 인근의 빌라 라비아에서 박사의 발굴단이 초대 로마 황제 아우구스투스의 거대 조각상을 출토한 것이다!"
 lepsius.2106.f: "프리마 포르타의 아우구스투스상은 초대 로마 황제를 묘사한 대리석상으로 높이는 약 2.04m이다. 1863년 로마 인근 빌라 리비아에서 발견되었다. 아우구스투스가 장군의 모습(아들로쿠티오)으로 군대 앞에서 연설하는 자세를 취하고 있다. 정교한 장식이 들어간 흉갑판이 역사적으로 특히 중요한 부분으로 평가된다. 중앙의 부조는 기원전 20년 파르티아가 탈취해 간 로마 군단의 독수리 깃발을 되찾은 사건을 묘사하고 있다. 이는 아우구스투스가 로마의 명예를 되찾은 외교적 대승리이기도 했다. 발치에는 돌고래를 탄 작은 큐피드가 묘사되어 있는데 이는 율리우스 황가가 여신 비너스로부터 신성한 혈통을 전해받았음을 나타낸다. 아우구스투스 조각상은 황제의 자아 표현과 로마 고전주의를 보여주는 대표적인 유물로 높이 평가받고 있다."
 lepsius.2106.g: "고대 로마 시대에서 제일 아름다운 조각상이 틀림없군."
 lepsius.2116.t: "키루스의 원통"
 lepsius.2116.d: "바빌론에서 발굴 조사에 나선 고고학 조사단이 놀라운 발견을 이루어냈다. 다름아닌 페르시아의 대왕 키루스가 쓴 것으로 추정되는 점토판이 발견된 것이다. 이 문서에는 키루스가 여러 민족을 돌려보내고 종교의 자유를 보장한다고 명시한 내용이 담겨 있었다. 그 자체로 고대의 인권 선언문인 것은 아닌가."
 lepsius.2116.f: "\"짐은 키루스다. 세계 제국의 왕이자, 위대하고 강력한 왕이요, 바빌로니아의 왕이자, 수메르와 아카드의 왕이며, 세계만방의 왕이자, 안샨의 위대한 왕 캄비세스의 아들, 키루스 1세의 손자, 벨과 나부가 사랑했던 테이스페스의 후손이다. 짐은 티그리스강 건너편의 신들을 베려왔노라. 짐은 그들의 백성을 전부 모아 고향으로 돌려보냈노라. 환희와 기쁨 속에 바빌론의 왕궁에 왕자를 세웠노라. 짐은 날마다 마르두크 신을 숭배했노라. 짐은 수메르와 아카드의 온 땅에 소란 일으키는 자가 없도록 하였노라. 짐은 바빌론의 성과 신전을 수호하고 번영시켰노라. 신들의 뜻에 반하여 부당한 멍에를 지던 그곳 주민들이 지친 몸을 쉬게 하였노라. 위대한 신 마르두크께서 짐과 키루스, 내 아들 캄비세스 뿐만 아니라 짐의 온 군대를 축복하셨노라.\""
 lepsius.2116.g: "바빌론에서 귀중한 페르시아 유물이 나왔다니, 믿기 어렵군."
