 je_lepsius_archaeological_expedition_south_america_reason: "현재 남아메리카에서 탐사가 진행되고 있음$lepsius_expedition_general_information_loc$"
 lepsius_expedition_general_information_loc: "\n$mr_divider_for_je$\n우리 [concept_lepsius_expedition]에게 매달 이벤트가 발생하여 탐사 진행도를 하나씩 추가하게 됩니다. 진행도가 끝에 도달하면 탐사는 마무리됩니다.\n$mr_divider_for_je$\n성공도는 탐사의 성공 여부를 나타냅니다. 성공도를 더 많이 확보할 수록 탐사가 마무리되는 시점에서 얻는 [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')]의 수도 늘어납니다. 성공도가 #V 15#!에 도달하면 가장 많은 수의 유물을 확보할 수 있습니다.\n이벤트의 발생부터 준비 과정까지 많은 요인이 성공 확률에 영향을 끼칩니다. 예를 들어 [concept_pm_academics_university_humanities]으로 설정된 대학 10단계가 존재하면 탐사가 시작되는 시점부터 성공도 1점을 부여받게 됩니다. 특화 대학으로 얻을 수 있는 최대 점수는 4점이라는 점에 유의하십시오."
