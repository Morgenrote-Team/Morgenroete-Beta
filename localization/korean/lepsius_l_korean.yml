 alert_lepsius_expedition_possible_alert_hint: "[Concept('concept_lepsius_excavation','$concept_lepsius_excavations$')]과 [Concept('concept_lepsius_expedition','$concept_lepsius_expeditions$')]에 사용할 수 있는 고고학 인력이 한 팀 이상 존재합니다. 이들을 국외에 파견하려면 다른 국가와 [Concept('concept_lepsius_excavation_licence','$concept_lepsius_excavation_licences$')]를 체결하십시오. #V 모르겐뢰테 창#!의 학자 현황 란에서 파견할 수 있습니다."
 alert_lepsius_exodus_congress_possible_alert_hint: "우리나라가 출애굽기의 역사성에 관한 학술회의를 개최할 수 있습니다. 개최를 위해서는 #V 모르겐뢰테 창#!의 학자 개요 란에 들어가 주십시오."
 alert_lepsius_civilization_congress_possible_alert_hint: "우리나라가 문명의 기원에 관한 학술회의를 개최할 수 있습니다. 개최를 위해서는 #V 모르겐뢰테 창#!의 학자 개요 란에 들어가 주십시오."
 alert_lepsius_troy_congress_possible_alert_hint: "우리나라가 슐리만이 발견한 도시가 호메로스가 소개했던 트로이인지의 여부를 놓고 학술회의를 개최할 수 있습니다. 개최를 위해서는 #V 모르겐뢰테 창#!의 학자 개요 란에 들어가 주십시오."
 lepsius_sargon_discoverer_loc: "\n\n#V 사르곤의 가면#!은 [GetGlobalVariable('lepsius_sargon_year_global_var').GetValue|V0]년 [GetGlobalVariable('lepsius_sargon_discoverer_global_var').GetCountryDefinition.GetName]에서 처음 발견하였습니다."
