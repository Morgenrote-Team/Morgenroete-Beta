 notification_lepsius_rosellini_notification_name: "레프지우스가 로셀리니에게 보낸 편지"
 notification_lepsius_rosellini_notification_desc: "독일의 언어학자 카를 리하르트 레프지우스가 이탈리아 이집트학자 이폴리토 로셀리니에게 편지를 보내 자신이 발전시킨 상형문자 해독법을 전달하였습니다. 이집트로 탐사를 떠나야 한다는 목소리가 높아지고 있습니다."
 notification_lepsius_stephens_catherwood_expedition_notification_name: "스티븐스와 캐터우드의 탐사"
 notification_lepsius_stephens_catherwood_expedition_notification_desc: "미국 탐험가 존 로이드 스티븐스와 영국 화가 프레더릭 캐터우드가 유카탄 반도의 위험천만한 여정에서 돌아와 정글 속의 전설적인 유적에 대해 이야기하였습니다. 학계에서는 마야 문화를 한층 더 자세히 탐구하는 데 관심을 표했습니다."
 notification_lepsius_decipherment_akkadian_notification_name: "아카드어 해독"
 notification_lepsius_decipherment_akkadian_notification_desc: "온 나라의 신문에서 경험 많은 고고학자가 이끄는 저명한 연구진의 획기적인 연구 결과를 보도하고 있습니다. 바로 메소포타미아의 고대 언어가 비밀스러운 단계에서 벗어났다는 것입니다. 바빌로니아와 아시리아에 대한 본격적인 탐사를 이제 누가 막을 수 있겠습니까."
 notification_lepsius_support_schliemann_notification_name: "슐리만이 트로이를 발견하다!"
 notification_lepsius_support_schliemann_notification_desc: "독일 사업가 하인리히 슐리만이 오랜 시간 동안 설화로 여겨져 왔던 트로이를 실제로 발견하였습니다. 전세계의 고고학자들은 고대 그리스에 대한 새로운 열정을 갖게 되었습니다. 비록 신화 속에 잠긴 고대일지라도 말입니다."
 notification_lepsius_machu_picchu_notification_name: "마추픽추"
 notification_lepsius_machu_picchu_notification_desc: "한 고고학 탐사대가 안데스 산맥 깊숙한 곳에서 잉카 문명의 잃어버린 도시, 마추픽추를 발견하였습니다. 연구진들은 해당 지역의 심층적인 연구에 나서자고 목소리를 높이고 있습니다."
 notification_lepsius_excavation_artifacts_notification_name: "새로운 발굴 유물"
 notification_lepsius_excavation_artifacts_notification_desc: "오늘 아침 고고학 박물관은 우리 발굴 현장에서 출토된 새로운 유물들을 전달받았습니다."
 lepsius_hide_archaeological_decisions: "고고학 결단 숨김"
 lepsius_hide_archaeological_decisions_desc: "모든 고고학 결단을 숨김 처리하여 개요를 정리합니다."
 lepsius_show_archaeological_decisions: "고고학 결단 표시"
 lepsius_show_archaeological_decisions_desc: "모든 고고학 결단을 표시합니다."
 lepsius_cancel_excavation_decision: "발굴단 철수"
 lepsius_cancel_excavation_decision_desc: "특정 상황에서는 발굴단을 철수하는 것이 유리할 수도 있습니다. 입수한 유물과 수집품은 그대로 우리 손에 남지만, 상시 발굴은 끝마치게 됩니다."
 lepsius_gather_first_excavation_team_decision: "신규 발굴단 획득"
 lepsius_gather_first_excavation_team_decision_desc: "고고학 인력을 추가로 양성할 수 있습니다. 이로써 동시에 여러 곳에서 발굴을 진행할 수 있게 됩니다."
 lepsius_gather_second_excavation_team_decision: "신규 발굴단 획득"
 lepsius_gather_second_excavation_team_decision_desc: "고고학 인력을 추가로 양성할 수 있습니다. 이로써 동시에 여러 곳에서 발굴을 진행할 수 있게 됩니다."
 lepsius_gather_third_excavation_team_decision: "고고학자의 새 발굴단 모집"
 lepsius_gather_third_excavation_team_decision_desc: "고고학 인력을 한 팀 더 양성할 수 있습니다. 이로써 동시에 여러 곳에서 발굴을 진행할 수 있게 됩니다."
 lepsius_upper_egypt_expedition_decision: "왕가의 계곡"
 lepsius_upper_egypt_expedition_decision_desc: "고대 수도 테베와 왕가의 계곡이 있는 상이집트는 이집트학의 성지로 불립니다. 이 지역의 탐사 허가를 받아 이집트 유물을 탐색해야 합니다."
 lepsius_lower_egypt_expedition_decision: "피라미드군"
 lepsius_lower_egypt_expedition_decision_desc: "이집트의 피라미드는 태초부터 인류를 매혹 속에 빠뜨렸습니다. 하이집트의 모래 속에는 또다른 무덤과 사원, 도시까지 제 모습을 다시 드러내기만을 기다리고 있다고 전해집니다."
 lepsius_babylonia_expedition_decision: "문명의 요람"
 lepsius_babylonia_expedition_decision_desc: "메소포타미아 남부 지역에 해당되는 바빌로니아는 한때 강력했던 도시국가 바빌론의 명칭을 따왔습니다. 이 지역은 귀중한 고고학적 유물이 끊임없이 발견되는 '문명의 요람'으로 여겨집니다. 분명 박물관에 소장되어야 마땅할 것입니다."
 lepsius_assyria_expedition_decision: "아시리아의 정원"
 lepsius_assyria_expedition_decision_desc: "아시리아는 메소포타미아 북부 지역을 가리키는 말로 아수르와 니네베의 두 대도시가 자리해 있었습니다. 이 지역에 대한 드문 지식은 그 출처를 따지면 성경으로 거슬러 올라가는 경우가 아직도 있지만, 그보다 더 믿을 만한 역사적 단서가 존재할지도 모릅니다."
 lepsius_argolis_expedition_decision: "아가멤논의 도시"
 lepsius_argolis_expedition_decision_desc: "트로이가 발견된 후, 회의적이던 학자들조차 고대 그리스 신화가 단순한 동화 그 이상이라는 사실을 깨닫게 되었습니다. 청동기 시대 도시의 유적은 오늘날까지 아르고리스에 있다고 전해지는데, 그 중 가장 잘 알려진 곳이 미케네입니다. 우리도 그 사실을 우리 손으로 입증해야 합니다."
 lepsius_crete_expedition_decision: "미노타우루스 설화"
 lepsius_crete_expedition_decision_desc: "전설 속의 미노스 왕은 크레타섬 전역을 다스렸다고 전해집니다. 트로이나 미케네처럼 이 설화에도 실체가 있는 것으로 보입니다. 신화로만 여겨졌던 미노아 문명의 유물이 섬에서 점차 발견되고 있기 때문입니다. 우리도 그 유물을 확보할 필요가 있겠습니다."
 lepsius_yucatan_expedition_decision: "마야의 잃어버린 도시"
 lepsius_yucatan_expedition_decision_desc: "정글 숲 한가운데 미지의 거대 도시가 존재한다는 목격담이 늘고 있습니다. 한층 더 깊이 조사하여 유카탄 반도에 고고학 탐사대를 파견해야겠습니다."
 lepsius_peru_expedition_decision: "잉카의 숨겨진 유산"
 lepsius_peru_expedition_decision_desc: "페루 상공을 비행하다 안데스 산맥에 이상한 요새와 성벽 유적이 세워진 것을 목격했다는 비행사들이 있습니다. 아무래도 스페인 사람들이 잉카의 문화 유산을 완전히 파괴하진 못했나 봅니다. 원주민이 저항하던 일부 마을은 오늘날까지도 발견된 적이 없습니다."
 lepsius_found_archaeological_museum_decision: "고고학 박물관 수립"
 lepsius_found_archaeological_museum_decision_desc: "자부심 있는 나라는 전부 그 나라의 수도에 특별한 박물관을 두고, 대담한 모험이나 과학적 탐사로 확보한 최고 수준의 문화유산을 한 데 모아 전시해 둡니다. 유물의 수와 소장품의 다양성은 국제적인 위상을 높일 뿐만 아니라 교육적 가치도 지니게 됩니다."
 lepsius_visit_archaeological_museum_decision: "고고학 박물관 방문"
 lepsius_visit_archaeological_museum_decision_desc: "우리가 수집한 유물 통계 현황을 살피고 품격 있는 전시로 재구성합니다."
 lepsius_appoint_lead_scientist_decision: "수석 학자 임명"
 lepsius_appoint_lead_scientist_decision_desc: "고고학 박물관의 신규 수석 학자를 임명합니다. 해당 인물은 15년에서 20년 동안 재직하게 됩니다. 이 직함으로 해당 기간 동안 정치 무대에서 사라지는 것을 막게 됩니다."
 lepsius_found_archaeological_society_decision: "고고학회 창설"
 lepsius_found_archaeological_society_decision_desc: "우리나라에서 꾸준히 늘어난 것은 고고학을 향한 관심 뿐만이 아닙니다. 지난 수년 간의 탐사와 발굴, 유물 출토로 우리나라는 놀라운 수준의 고고학 지식을 축적해 왔습니다. 뛰어난 고고학자가 고고학회를 설립하면 과학과 지적 역량을 모아 새로운 활력을 불어넣을 수 있을 것입니다. 이는 과학적 성과를 도모할 뿐만 아니라 후대 고고학자들의 경험을 향상시킬 것입니다."
 lepsius_inspect_excavation_decision: "심층 고고학 조사 실시"
 lepsius_inspect_excavation_decision_desc: "발굴이 이루어지는 지역의 조사 강화를 위하여 경험 많은 고고학자를 그곳에 파견할 수 있습니다. 파견된 고고학자는 1년 이내에 새로운 발굴지를 마련하여 집중적인 연구에 나서게 되며, 그 과정에서 과거에는 알려지지 않았던 대표적인 고고학 발견의 징후를 확보할 수 있습니다. 그 성공 여부는 우리 고고학자의 경험치에 크게 달려 있습니다. 고고학회를 설립하는 것 역시 우리가 성공할 확률을 높여줄 것입니다."
 lepsius.2.t: "로셀리니 교수님께 보내는 편지"
 lepsius.2.d: "독일의 언어학자 [SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName](이)가 이탈리아 이집트학자 이폴리토 로셀리니에게 편지를 보내 자신이 발전시킨 상형문자 해독법을 전달하였다. 이집트로 탐사를 떠나야 한다는 목소리가 높아지고 있다."
 lepsius.2.f: "프랑수아 샹폴리옹이 세상을 떠나면서 상형문자 연구도 중단되었습니다. 1837년 독일의 젊은 언어학자 [SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName](이)가 샹폴리옹의 가까운 동반자이자 1829년 프랑스-토스카나 이집트 탐사대를 공동으로 이끌었던 이폴리토 로셀리니에게 편지를 보냈습니다. 이 학자는 샹폴리옹이 축적한 지식을 체계화하여 발표했으며, 이집트학을 진정한 학문으로 발돋움하는 데 중대한 역할을 하였습니다. 또 유럽의 정계 인사들을 설득하여 이집트로의 탐사를 추진하였습니다."
 lepsius.2.a: "이집트의 경이로움을 탐색하겠다!"
 lepsius.3.t: "스티븐스와 캐터우드"
 lepsius.3.d: "미국 탐험가 존 로이드 스티븐스와 영국 화가 프레더릭 캐터우드가 유카탄 반도의 위험천만한 여정에서 돌아와 정글 속의 전설적인 유적에 대해 이야기하였다. 학계에서는 마야 문화를 한층 더 자세히 탐구하는 데 관심을 표했다."
 lepsius.3.f: "유럽인이 발을 내딛기 전까지 신대륙은 단순히 미개인과 야만인의 땅이었는가? 탐험가 존 로이드 스티븐스와 프레데릭 캐터우드는 이러한 세계관을 근본부터 뒤흔들었다. 이 영국인과 미국인 탐험가는 수년 동안 유카탄 반도의 정글을 누비며 오래전에 사라진 메소아메리카 문명의 유적지 44곳을 방문했다고 밝히고 있다. 현지 주민들은 오랫동안 정글 속에 숨겨진 사원과 한동안 잊혀졌던 도시들을 전해 왔지만 스티븐스의 보고서, 특히 캐터우드의 놀라운 석판화는 지금껏 전혀 알려지지 않았던 세계를 열었다. 사원과 조각상, 석비를 묘사한 그림은 낭만주의자들의 상상력을 자극하는 데서 그치지 않고, 호기심에서부터 미화, 그리고 진정한 과학적 연구에 이르기까지, 미지의 문명을 향한 관심의 물결을 미국과 유럽 전역으로 확대하고 있다."
 lepsius.3.a: "쓸만한 가죽 재킷을 쟁여놔야겠군."
 lepsius.4.t: "아카드어 해독"
 lepsius.4.d: "온 나라의 신문에서 경험 많은 고고학자가 이끄는 저명한 연구진의 획기적인 연구 결과를 보도하고 있다. 바로 메소포타미아의 고대 언어가 더 이상 비밀의 영역이 아니라는 소식이다. 바빌로니아와 아시리아에 대한 본격적인 탐사를 막을 사람은 아무도 없다."
 lepsius.4.f: "일찍이 18세기 독일 수학자 카르슈텐 니부어 시대에도 쐐기문자 점토판은 학계의 관심을 불러일으켰으며 이것을 해독하고 그 언어를 번역하려는 노력이 이어졌다. 게오르크 프리드리히 그로테펜트, 앙크티유-뒤페롱, 앙투안 이자크 실베스트르 드 사시는 고대 페르시아어 쐐기문자의 해독에 결정적인 역할을 하였으며, 상형문자와 4개 언어로 쓰인 '칼리우스 항아리'의 해독으로 이들의 연구가 입증되기에 이르렀다. 지금도 잘 알려진 페르시아어 외에도 메소포타미아의 고대 언어가 담긴 베히슈툰의 기념비가 발견되면서 엘람어, 바빌로니아어, 아카드어를 다시 해석할 수 있게 되는 것은 시간 문제였다. 우리 학술원에서는 이 고대 언어를 해석할 수 있다고 주장하는 여러 아시리아학자들을 초청하여, 동일한 비문을 놓고 각자 번역하도록 하는 시험에 나섰다. 그 결과는 놀랍게도 모든 학자들의 해석이 일치하는 것이었다. 이제 메소포타미아의 인류 최대 문명에 관한 본격적인 탐구가 시작되리라."
 lepsius.4.a: "우리가 샹폴리옹의 후손이다."
 lepsius.5.t: "슐리만의 트로이 발견!"
 lepsius.5.d: "독일 사업가 하인리히 슐리만이 오랜 시간 동안 설화로 여겨져 왔던 트로이를 실제로 발견하는 데 성공했다. 전세계의 고고학자들은 고대 그리스에 대한 새로운 열정을 갖게 되었다. 그것이 비록 신화 속에 잠긴 고대일지라도 말이다."
 lepsius.5.f: "과학은 어디에서 끝나고, 신화는 어디서부터 시작되는가? 현대는 종교와 지식의 분리를 위해 갖은 노력을 기울여 왔다. 수십년 전만 해도 현실로 여겼던 신화와 서사시를 동화의 영역으로 밀어낸 것이다. 그런데 갑자기 언론에, 그 다음에는 학계에 속보가 전해졌다. 트로이가 발견됐다는 것이다! 호메로스가 일리아스에서 찬미했던, 서양의 지식인이라면 모두 알고 있는 프리아모스의 전설 속 도시 트로이가 단순한 신화 이상의 실체를 갖추고 있다는 것이다. 독일 사업가 하인리히 슐리만은 세상의 체념에도 아랑곳않고 귀중한 보물을 발견했다고 주장했다. 그 이름하여 프리아모스의 보물인 것이다. 고고학계는 이 사건으로 충격과 동시에 매혹을 느끼고 있다. 과연 머나먼 과거의 다른 설화도 실제일 가능성이 있는가? 에게해 연안에는 다시 발견되기를 기다리는 수중 도시가 더 많이 숨겨져 있는 것은 아닐까?"
 lepsius.5.a: "여신이여, 분노를 노래하소서, 펠레우스의 아들 아킬레우스..."
 lepsius.6.t: "마추픽추"
 lepsius.6.d: "한 고고학 탐사대가 안데스 산맥 깊숙한 곳에서 잉카 문명의 잃어버린 도시, 마추픽추를 발견하였다. 연구진들은 해당 지역의 심층적인 연구에 나서자고 목소리를 높이고 있다."
 lepsius.6.f: "오늘날 우리를 지배하는 몇 가지 서사가 있다. 정복되지 않은 것이 없고, 발견되지 않은 것이 없으며, 논하지 않은 것이 없다. 식민지 깃발이 꽂히지 않은 곳은 없고, 철도로 연결되지 않은 마을은 없으며, 우리가 알지 못하는 획기적인 기술도 없다고들 한다. 하지만 최고위층의 허무주의가 무너지는 순간들이 있다. 극지 탐험, 창공 정복, 그리고 인류의 마지막 미스터리에 관한 탐구는 역사가 아직 끝나지 않았음을 보여주고 있다. 마추픽추의 발견은 우리가 이해하고 다스린다고 생각하는 세상에 우리가 아는 것이 얼마나 적은지를 보여주는 단편적인 사례에 그친다. 스페인 사람들을 속이기 위해 지은 것으로  해석되는 미지의 잉카 도시들에 관한 이야기에는 어쩌면 진실이 깃들어 있을지도 모른다. 자유로운 잉카 문명의 마지막 수도였던 빌카밤바는 오늘날까지도 발견되지 않고 있다..."
 lepsius.6.a: "페도라를 집어들 시간이군!"
 lepsius.10.t: "박물관 개관"
 lepsius.10.d: "고고학 박물관이 오늘 성대한 개관식을 갖고 문을 열었다."
 lepsius.10.f: ""
 lepsius.10.g: "박물관을 둘러볼 생각을 하니 기대되는군!"
 lepsius.10.h: "샴페인! 샴페인을 터뜨립시다!"
 lepsius.11.t: "박물관 방문"
 lepsius.11.d: "고고학 박물관에 오신 것을 환영합니다."
 lepsius.11.f: "우리 박물관의 소장품에는 현재 #T 총 #G [ROOT.Var('lepsius_total_artifacts').GetValue]개#!의 유물#!이 있습니다.\n\n전체 유물은 다음 소장품으로 분류됩니다.\n\n#T 이집트 소장품: #!\n@lepsius_egypt_minor! 일반 유물 #G [ROOT.Var('lepsius_egyptian_artifact_minor').GetValue]개#!와 @lepsius_egypt_major! 대표 유물 #G [ROOT.Var('lepsius_egyptian_artifact_major').GetValue]개#!\n\n#T 메소포타미아 소장품:#!\n@lepsius_mesopotamia_minor! 일반 유물 #G [ROOT.Var('lepsius_mesopotamian_artifact_minor').GetValue]개#!와 @lepsius_mesopotamia_major! 대표 유물 #G [ROOT.Var('lepsius_mesopotamian_artifact_major').GetValue]개#! \n\n#T 에게 문명 소장품: #!\n@lepsius_aegean_minor! 일반 유물 #G [ROOT.Var('lepsius_aegean_artifact_minor').GetValue]개#!와 @lepsius_aegean_major! 대표 유물 #G [ROOT.Var('lepsius_aegean_artifact_major').GetValue]개#! \n\n#T 선콜럼버스 소장품: #!\n@lepsius_precolumbian_minor! 일반 유물 #G [ROOT.Var('lepsius_precolumbian_artifact_minor').GetValue]개#!와 @lepsius_precolumbian_major! 대표 유물 #G [ROOT.Var('lepsius_precolumbian_artifact_major').GetValue]개#! \n\n#T 고고학 발굴단: #!\n총 #G [ROOT.Var('lepsius_total_excavation_teams').GetValue]팀#! 중에서 #G [ROOT.Var('lepsius_excavation_teams').GetValue]팀#!을 사용할 수 있습니다."
 lepsius.11.g: "참 유익한 시간이었습니다. 다음에 뵙겠습니다!"
 lepsius.11.h: "이집트 전시관 방문"
 lepsius.11.i: "메소포타미아 전시관 방문"
 lepsius.11.j: "에게 문명 전시관 방문"
 lepsius.11.k: "선콜럼버스 전시관 방문"
 lepsius.11.l: "선임 학자 방문"
 lepsius.11.m: "대표 유물 전시관 방문"
 lepsius.11.n: "세계 문화 소장품 방문"
 lepsius.11.o: "가장 많은 유물을 보유한 국가를 보여주시오!"
 lepsius.12.t: "이집트 전시관"
 lepsius.12.d: "이곳은 상하 이집트에서 발견된 유물을 전시하고 있습니다."
 lepsius.12.g: "소규모 전시로 정비한다."
 lepsius.12.h: "중규모 전시로 정비한다."
 lepsius.12.i: "대규모 전시로 정비한다."
 lepsius.12.j: "완벽한 전시 배치"
 lepsius.12.k: "중앙 홀로 돌아가기"
 lepsius.12.l: "박물관 떠나기"
 lepsius.13.t: "메소포타미아 전시관"
 lepsius.13.d: "이곳은 바빌로니아와 아시리아에서 발견된 유물을 전시하고 있습니다."
 lepsius.14.t: "에게 문명 전시관"
 lepsius.14.d: "이곳은 아르골리스와 크레타에서 발견된 유물을 전시하고 있습니다."
 lepsius.15.t: "선콜럼버스 시대 전시관"
 lepsius.15.d: "이곳은 유카탄과 페루에서 발견된 유물을 전시하고 있습니다."
 lepsius.16.t: "[SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName]"
 lepsius.16.d: "이곳은 우리나라 최고의 고고학자, [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] 교수의 집무실입니다."
 lepsius.16.f: "[SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName]의 총 고고학 경험치는 #G [ROOT.Var('lepsius_archaeologist_var').GetVariable('lepsius_archaeologist_experience_var').GetValue]#!입니다.\n\n우리나라가 후원한 탐사 횟수: #G [ROOT.Var('lepsius_total_expeditions').GetValue]회#!\n\n우리나라가 이뤄낸 주요 고고학 발견: #G [ROOT.Var('lepsius_total_discoveries').GetValue]건#!"
 lepsius.16.g: "고고학 회의 개최"
 lepsius.17.t: "대표 유물"
 lepsius.17.d: "이곳은 박물관의 대표 유물 현황을 표시합니다."
 lepsius.17.egypt: "\n#T 이집트:#!\n"
 lepsius.17.sarcophagus: "우리나라는 왕가의 계곡에 있던 잊혀진 무덤에서 #E 신원 불명 파라오의 관#!을 발견하였습니다.\n"
 lepsius.17.nefertiti: "#E 네페르티티의 흉상#!은 험난한 발굴 작업과 외교 분쟁 끝에 거둔 성과입니다.\n"
 lepsius.17.tut: "#E 투탕카멘의 가면#!은 왕가의 계곡에 위치한 전설적인 무덤의 가장 귀중한 보물입니다.\n"
 lepsius.17.narmer: "#E 나르메르 팔레트#!는 인류가 발견한 가장 오래된 문서로 꼽히며, 일각에서는 이집트의 건국을 기록한 것으로 봅니다.\n"
 lepsius.17.mesopotamia: "\n#T 메소포타미아:#!\n"
 lepsius.17.lamassu: "우리나라는 아시리아에서 위험천만한 과정을 거친 끝에 #E 사르곤 왕의 라마수 석상#!을 확보하였습니다.\n"
 lepsius.17.meskalamdug: "우리는 바빌로니아에서 이뤄진 대대적인 발굴 조사 끝에 #E 메스칼람두그의 투구#!를 찾아냈습니다.\n"
 lepsius.17.sargon: "고대 아시리아의 수도 니네베에서의 발굴 작업을 거쳐 #E 사르곤의 가면#!을 찾아냈습니다.\n"
 lepsius.17.gilgamesh: "새로운 파편을 끊임없이 탐색하고 최신 연구를 진행한 끝에 #E 길가메시 서사시#!의 일부분을 복원하는 데 성공하였습니다.\n"
 lepsius.17.greece: "\n#T 그리스:#!\n"
 lepsius.17.agamemnon: "#E 아가멤논의 가면#!은 우리나라가 미케네에서 이룩한 위대한 발견을 대표하는 유물입니다.\n"
 lepsius.17.priam: "우리나라는 하인리히 슐리만에게서 #E 피리암의 보물#!을 선물받았습니다.\n"
 lepsius.17.snake: "우리는 미노아 문명을 대표하는 유물로 인정받는, 일명 크레타의 #E 뱀 여신상#!을 다소 특이한 과정을 거쳐 박물관에 들여왔습니다.\n"
 lepsius.17.diskos: "우리는 끈질긴 발굴조사 끝에 #E 파이스토스의 원반#!을 출토하였습니다.\n"
 lepsius.17.southamerica: "\n#T 남아메리카:#!\n"
 lepsius.17.kukulkan: "신비롭고 위험천만한 여정에 나선 우리 고고학자가 #E 쿠쿨칸의 보석#!을 입수하였습니다.\n"
 lepsius.17.pakal: "우리 고고학자들은 팔렌케에서 수년 동안 발굴을 진행한 끝에 #E 파칼의 부장품#!을 확보하였습니다.\n"
 lepsius.17.other: "\n#T 그 외:#!\n"
 lepsius.17.abraham: "우리 고고학자가 종교적 여정을 거쳐 #E 아브라함의 지팡이#!를 찾아냈습니다.\n"
 lepsius.17.arne: "환상적인 모험을 떠난 우리네 용감한 고고학자들은 #E 아르네 사크누셈의 원고#!를 발견하였습니다. 이는 그가 16세기에 지구 중심부로 들어갔다는 증표입니다.\n"
 lepsius.17.skull: "우리나라는 믿음직한 골동품상으로부터 몹시 신비로운 #E 크리스탈 해골#!을 입수하였습니다.\n"
 lepsius.17.hoa: "이스터섬의 모험가가 #E 모아이 호아 하카나나이아#!라는 신비로운 석상을 발견하였습니다.\n"
 lepsius.17.summer: "중국의 황궁이 불길에 휩싸인 가운데 우리는 #E 이화원의 귀중한 약탈품#!을 상당수 손에 넣었습니다."
 lepsius.18.t: "세계 문화 전시관"
 lepsius.18.d: "이곳은 세계의 여러 문화권에서 만들어진 유물을 전시하고 있습니다."
 lepsius.18.f: "이 전시관에서는 지금도 일부 남아 있는 여러 문화권의 인류학, 고고학 유물을 아우르고 있습니다. 유물 #G 10점#!을 확보하면 전시를 개최할 수 있습니다. 그보다 더 상위 규모의 전시는 없지만 소장품 하나하나가 더 큰 가치를 지닙니다. 현재 본 전시관은 다음의 전시실로 구성되어 있습니다.\n\n@lepsius_oceanian_minor!일반 오세아니아 유물 #G [ROOT.Var('lepsius_oceanic_artifact_minor').GetValue]#!점\n@lepsius_oceanian_major!대표 오세아니아 유물 #G [ROOT.Var('lepsius_oceanic_artifact_major').GetValue]#!점\n\n@lepsius_east_asian_minor!일반 동양 유물 #G [ROOT.Var('lepsius_fareastern_artifact_minor').GetValue]#!점\n@lepsius_east_asian_major!대표 동양 유물 #G [ROOT.Var('lepsius_fareastern_artifact_major').GetValue]#!점\n"
 lepsius.18.g: "동양 전시를 정비한다."
 lepsius.18.h: "오세아니아 전시를 정비한다."
 lepsius.22.d: "우리 수도의 고위 관계자들이 한자리에 모였다. 고고학 박물관에서 새로운 전시 개최에 나섰기 때문이다."
 lepsius.22.f: "상류층과 중산층을 아우르는 인파가 아침부터 박물관 입구 앞에 모여들었다. 새로운 전시는 수석 고고학자의 강연으로 시작되어 최근 발굴 조사와 현장 발굴에 대한 생생한 이야기를 들려줄 것이다. 강연 후에는 미술 애호가와 관람객들이 전시품을 직접 감상할 수 있다. 오늘은 [ROOT.GetCountry.GetNameNoFlag]에 있어 대내외적으로 중요한 날이다. 강대국들도 우리의 품격 있는 소장품을 우러러보기 때문이다."
 lepsius.22.g: "입장권을 하나 더 받았으면 좋겠는데."
 lepsius.24.t: "신규 에게 문명 전시"
 lepsius.25.t: "신규 선콜럼버스 전시"
 lepsius.26.t: "고고학 회의 종료"
 lepsius.26.d: "오늘 우리 고고학회가 주최한 학술회의가 마무리되었습니다. [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] 교수는 이번 기회를 통해 자신의 지식을 넓혀나갔습니다."
 lepsius.26.f: "수 주에 걸친 회의와 강연, 컨퍼런스, 화기애애한 만남이 막을 내렸습니다. 학회와 밀접한 관계를 맺은 국내외 고고학자들이 그간의 발견과 탐사, 학설을 교류하였습니다. 이번 행사는 대성공을 거두었으며 참여자 모두의 시야를 넓히는 계기로 작용하였습니다."
 lepsius.26.g: "누구의 가죽 재킷이 제일 멋진가에 관한 논쟁은 항상 벌어지는군..."
 lepsius.27.t: "신대륙 문화 전시"
 lepsius.30.t: "신임 수석 학자"
 lepsius.30.d: "고고학 박물관에서 [SCOPE.sCharacter('lepsius_museum_lead_scientist').GetFullName] [SCOPE.sCharacter('lepsius_museum_lead_scientist').GetPrimaryRoleTitle]를 신임 수석 학자로 임명하였다."
 lepsius.30.f: ""
 lepsius.30.g: "경축드립니다!"
 lepsius.31.t: "수석 학자를 박물관장에 임명"
 lepsius.31.d: "[SCOPE.sCharacter('lepsius_museum_lead_scientist').GetFullName] [SCOPE.sCharacter('lepsius_museum_lead_scientist').GetPrimaryRoleTitle]가 신임 박물관장으로 임명되는 영예를 누리게 되었다. 이에 따라 현직에서 물러나게 되었다."
 lepsius.31.f: "지난 세월 동안 [SCOPE.sCharacter('lepsius_museum_lead_scientist').GetFullName](은)는 과학과 문화에 일생을 바쳐 왔으며, 정치에 피로감을 느낀 지 오래인 상황입니다. 박물관 운영에만 전념하기로 한 그의 결정은 많은 이들에게 그리 놀라운 일이 아니었습니다. 그는 더 이상 정치 활동이나 탐사에 나서지 않을 것이며, 인사 이동이 이루어지게 되어 유감스럽게 생각합니다."
 lepsius.31.g: "안녕히 가시오..."
 lepsius.80.t: "고고학의 새 시대!"
 lepsius.80.d_egypt: "[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] 박사가 고대 이집트 마을의 여러 실상을 밝혀낼 새로운 고고학 연구법을 활용하였다. 발견 사항을 기록하는 것은 물론 층위학과 삼시기법을 동원하여 고고학의 새 시대를 열게 된 것이다."
 lepsius.80.d_mesopotamia: "[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] 박사가 고대 메소포타미아 마을의 여러 실상을 밝혀낼 새로운 고고학 연구법을 활용하였다. 발견 사항을 기록하는 것은 물론 층위학과 삼시기법을 동원하여 고고학의 새 시대를 열게 된 것이다."
 lepsius.80.d_aegean: "[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] 박사가 고대 에게해 마을의 여러 실상을 밝혀낼 새로운 고고학 연구법을 활용하였습니다. 발견 사항을 기록하는 것은 물론 층위학과 삼시기법을 동원하여 고고학의 새 시대를 열게 된 것입니다."
 lepsius.80.d_precolumbian: "[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] 박사가 고대 선콜럼버스 마을의 여러 실상을 밝혀낼 새로운 고고학 연구법을 활용하였다. 발견 사항을 기록하는 것은 물론 층위학과 삼시기법을 동원하여 고고학의 새 시대를 열게 된 것이다."
 lepsius.80.f: "\"마을의 유물이 발견된 지층은 그 마을에 관하여 많은 것을 알려줍니다. 예컨대 석탄이 많이 들어 있는 지층은 그 시기의 유물이 더 이상 발견되지 않는다는 것을 의미하지요. 아마 화재로 마을이 파괴되고 버려졌을 가능성이 큽니다. 또 금속 유물이 전혀 없다는 것은 이곳이 석기 시대의 마을이었음을 시사합니다. 우리가 발견한 유골 역시 영양실조 상태에 치아가 마모되었다는 점에서 대단히 흥미롭습니다.\""
 lepsius.80.g: "식견이 높군!"
 lepsius.100.t: "[ROOT.GetCountry.GetAdjectiveNoFlag] 고고학 탐사 준비"
 lepsius.100.d: "고고학 탐사 준비가 본궤도에 올랐다. 다만 여정을 얼마나 오랫동안 지원해야 하는가는 아직 불확실하다."
 lepsius.100.f: "[ROOT.GetCountry.GetName]에서 학계의 바람에 응하여 오래토록 고대하던 탐사대를 파견하기로 결정하면서, 예산 문제 뿐만 아니라 탐사의 기간 역시 머지않아 정치적 쟁점으로 떠오르게 되었습니다. 왕복 여정만 하더라도 귀중한 시간이 소요될 텐데, 정부 내각의 구두쇠 영감들은 골동품 상인에게서 유물 몇 점만 사올 협상가 몇 명만 보내면 되지 않겠느냐며 고집를 부리고 있습니다."
 lepsius.100.g: "어줍잖게 다녀와서는 안될 일이다. 긴 여정이 될 것이다."
 lepsius.100.h: "중간 길이의 여정으로 절충하면 되지 않을까."
 lepsius.100.i: "짧은 여정으로 충분하다."
 lepsius.110.t: "탐사 대장을 향한 논란"
 lepsius.110.d: "지식인 세력에서는 자신들의 대표가 이번 고고학 탐사의 대장으로 나설 가능성이 높다고 보고 있다. 하지만 반대하는 목소리도 적지 않다."
 lepsius.110.f: "우리나라의 고위층들이 분열되었다. 탐사대에 대한 국가 예산 지원으로 비판하거나 질투하는 자들이 나서게 된 것이다. 지식인들은 탐사대를 자신들의 주권 대상으로 여기고 있다. 여야 할 것 없이 자신들에게 참관인 자격을 줄 것을 요구하고 있다. 지식인 대표가 이번 과제에 가장 적합하다는 것은 부인할 수 없지만, 다른 가능성도 있는 법이다..."
 lepsius.110.g: "지식인이 가장 적합하다."
 lepsius.110.h: "정부 대표가 탐사대에 동행한다."
 lepsius.110.i: "이번 일에는 야당 정치인이 제격이다."
 lepsius.110.j: " 이번 일은 고고학 경험을 갖춘 인물이 맡아야 한다."
 lepsius.110.k: "이런 영예는 오직 왕위 계승자에게 돌아가야 한다."
 lepsius.120.t: "육군 무관"
 lepsius.120.d: "이번 고고학 탐사에 육군 무관을 모집할 것을 강력히 권고하는 목소리가 있다."
 lepsius.120.f: "군부에서 이번 탐사대에 파견될 육군 무관으로 세 명의 후보를 추천하였다. 국방부는 오늘 이 같은 결정을 발표하였다. 최종 선발자는 아직 확정되지 않았다."
 lepsius.120.g: "[SCOPE.sCharacter('lepsius_military_attache_1').GetFullName]."
 lepsius.120.h: "[SCOPE.sCharacter('lepsius_military_attache_2').GetFullName]."
 lepsius.120.i: "[SCOPE.sCharacter('lepsius_military_attache_3').GetFullName]."
 lepsius.130.t: "예술가의 탐사대 합류"
 lepsius.130.d: "우리 학회의 예술가들이 다가오는 고고학 탐사에 참여하고 싶다는 의사를 밝혀 왔다."
 lepsius.130.f: "탐사대가 머지않아 잃어버린 도시와 미지의 예술 작품을 찾아 나설 것이라는 소문이 예술원 내에 돌고 있다. 화가와 소묘가들은 앞서 나폴레옹의 이집트 원정에서 느꼈던 분위기와 색채, 풍광에 영감을 받았다. 고고학 유적지의 드로잉과 스케치를 그려줄 지원자도 충분한 상황. 탐사대가 이렇게 커지면 추가 예산이 들어가야 하겠지만, 그만한 가치가 충분히 있을 것이다."
 lepsius.130.a: "기꺼이 받아들이겠소."
 lepsius.130.b: "고맙지만 사양하겠소."
 lepsius.140.t: "고고학자의 경험 많은 학자 모집"
 lepsius.140.f: "공통의 관심사가 우리를 하나로 묶었다. 우리 대장은 고고학, 역사학, 인류학에 조예가 깊은 학자들과 친분이 있다. 탐사대의 인재풀을 넓히면 이번 탐사의 결과에도 분명 긍정적인 영향을 미칠 것이다. 하지만 이는 단순한 호의가 아니다. 숙식과 급여는 국가에서 부담해야 한다. 일각에선 이러한 지원을 탐사대장의 '지인 찬스'라 부를 지도 모르겠지만, 대장은 탐사대 규모 확대가 순전히 과학적인 목적에 의한 것이라고 우리 측에 확언했다."
 lepsius.140.a: "탐사대가 한층 더 강화되겠군."
 lepsius.140.b: "고고학자의 파벌 놀음에 쓸 예산은 없소!"
 lepsius.150.t: "자연과학자의 탐사 동행"
 lepsius.150.d: "과학자들이 다가오는 탐사를 계기로 실험을 진행하고 싶다는 의사를 전했다."
 lepsius.150.f: "우리나라 대학들도 이번 탐사의 영향을 피해가지 못했다. 일부 학자들은 지리 환경을 연구하거나, 천문학적 관측값을 비교하거나, 기상 실험을 수행하기 위해 탐사대에 동행하겠다는 의사를 표했다. 암석과 목재 견본을 채취하면 이번 탐사의 과학적 성과를 향상시킬 수 있다고 생각하는 학자도 있다. 선발된 과학자들 중 상당수는 오랫동안 해외여행을 꿈꿔왔으며, 이번 기회를 통해 해외로 나갈 수 있기를 간절히 기다려온 것이 분명하다. 그저 무임 승차를 해서라도 함께 나아갈 구실을 찾고 있었을 뿐이다. 이들도 예산 지원을 바라는 것은 당연한 사실!"
 lepsius.150.a: "정말 훌륭한 생각이야!"
 lepsius.150.b: "수염만 수북하다고 다 챙겨줄 순 없는 노릇이오..."
 lepsius.200.t: "출발지에 도착한 탐사대"
 lepsius.200.d: "탐사대가 출발지에 도착했다. 출발 전 마지막 준비에 나설 시간이다."
 lepsius.200.f_ex_upe: "\"룩소르, 룩소르다!\" 카르나크 신전이 수평선 너머로 모습을 드러내자 함성이 터져 나왔다. 나일 강 속으로 배가 기우뚱할까 위태로운 상황에서도 한쪽 난간에 기대어 모인 탐사대원들은 테베라 불리었던 고대 이집트 도시의 윤곽을 바라보며 눈을 반짝였다. 수천 년 된 건물의 흔적들이 나일강변을 따라 늘어서 있는가 하면, 허물어진 집과 천막 사이로 오벨리스크가 솟는다. 반면 나일 강변의 반대쪽에는 모래빛의 갈색 산맥이 솟아 있을 뿐인데, 전설 속 왕들의 계곡이 숨겨져 있고, 아직 그 존재를 모르는 파라오의 무덤이 있다고 전한다. 허나 그곳으로 향하기 전에 룩소르에서 해결해야 할 몇 가지가 아직 남아 있다..."
 lepsius.200.f_ex_loe: "햇빛에 반짝이는 나일 강의 수면 위로 '세계의 어머니'가 모습을 드러냈다. 첨탑과 돔이 주변의 경치를 장식하며 그 옛날과 오늘날 중동의 운명을 좌우했던 이 도시의 위대함과 중대함을 전하고 있다. 파티마 왕조 건축의 정교한 장식은 물론, 다채로운 바자르 시장과 카펫이 거리를 수놓는다. 허나 그 풍경에는 더한 것이 있다 - 저 멀리, 피라미드의 꼭대기가 흘러간 시대를 예고하는 저 곳이 우리 여정의 진정한 목적지인 것이다. 허나 그 전에 우리는 카이로에서 준비해야 할 몇 가지가 남았다."
 lepsius.200.f_ex_bab: "메소포타미아의 최대 도시 바그다드는 활기로 가득하다. 이곳은 카이로처럼 아랍 세계의 중심이고, 카이로처럼 권력과 위신이 자리한 곳이었다. 허나 기자의 피라미드군이 태고의 세계를 알리는 카이로와는 달리 바그다드에는 바빌론과 아카드 제국을 떠올리게 할 만한 것이 적다. 부주의한 탐험 대원이 수상한 상인에게서 구매한 자칭 골동품마저도 가품으로 드러났던 것이다. 이집트와 마야의 석조 건축물은 사라진 문명의 흔적을 여전히 품고 있으나, 이곳에는 그와 비견될 만한 것이 별로 없다. 아무래도 우리는 처음부터 다시 시작해야 할지 모른다."
 lepsius.200.f_ex_ass: "레이어드가 님루드를 발굴한 이래 아시리아에서 또 무엇을 발견할 수 있는가? 모술의 상인이 이르기를 꽤나 많다고 한다. 불과 한 달 전에는 모래 속에서 라마수의 두상이 발견되었다고 한다. 시장에서는 항상 좋은 유물을 구할 수 있다고 그는 우리에게 일러두었다. 하지만 모든 유물을 입수하지 못한 데에는 그 지역의 쿠르드족 세력이 한몫했다. 발굴 허가 여부와는 관련 없이 아무나 자기네 구역에서 유물을 발굴하는 것을 허락치 않았기 때문이다. 우리는 이 경고를 마음에 새겨두고, 여정에 나서기 전에 필요한 물건들을 준비하려고 한다."
 lepsius.200.f_ex_arg: "아, 정겨운 아테네여! 우리 탐사대가 찾는 것만큼 오래된 것은 별로 없지만, 며칠 더 머물기에는 충분한 곳이 아티카다. 그리스에는 대도시가 그리 많지 않아서, 우리 탐사대도 시골 지역으로 출발하기 전에 가장 필요한 것들을 준비하는 곳에 있어 선택지가 많지 않았다. 우리 고고학 안내인은 서두르자고 재촉하였는데, 몇몇 학자들이 고대의 대리석이나 그리스 포도주 같은 것에 너무 많은 시간을 허비했기 때문이다. 따사로운 햇살과 올리브나무 그늘, 아카드의 전원 풍경은 그곳에 남으며 휴식을 취하기에 제격이다 - 어떤 이들은 우리가 여기에 왜 왔는지조차 잊어버린 듯하다."
 lepsius.200.f_ex_cre: "에게해에서 불어오는 산들바람을 맞으며 우리 탐사대는 헤라클리온 항구에 도착했다. 중세 시대에 칸디아가 무역 중심지였던 시절을 연상케 하는 오래된 베네치아 요새들이 눈앞에 펼쳐졌다. 갈매기 울음소리를 배경으로 화물이 내려지고 탐사대원들이 하선하자 따뜻한 환영이 이어졌지만, 머지않아 냉혹한 현실이 닥쳐왔다. 일부 탐사대원은 현지 요리에 불만을 표하고 더 나은 숙박 시설을 요구했지만, 탐사대장은 그런 사소한 요구에는 별다른 관심을 보이지 않았다. 그에게 있어 헤라클리온은 중간 기착지일 뿐 - 미노아 문명의 보물은 섬 내륙에서 기다리고 있기 때문이다."
 lepsius.200.f_ex_yuc: "메리다에서 우리 발굴단은 대규모 출정을 앞두고 최종 준비에 나서고 있다. 도시 곳곳에 스페인의 정복과 식민화의 흔적이 남아 있는데, 규모는 단순해도 한때는 캄페체와 함께 스페인이 유카탄 반도를 지배하던 거점이었음을 보여주고 있다. 160km도 채 안 되는 거리에는 지난 몇백 년 동안 밀림 속에 묻혀버린 마야 유적지가 있다고 전해진다. 우리 탐사대원들은 새로운 사원과 도시를 발견하려면 덤불 속을 더욱 깊숙히 파헤치지 않고선 안 될 것이다..."
 lepsius.200.f_ex_per: "안데스 산맥은 마치 백성들의 머리 위로 군림하는 왕과도 같다. 그 봉우리는 마치 우리가 그 계곡에 들어갈 자격이 있는지를 시험하듯 위풍당당하게 우리를 내려다본다. 쿠스코로 향하는 여정은 고달팠지만, 기술의 발전 덕에 더 이상 예측불가한 모험으로 가득 찬 여정이 아니게 되었다. 잉카 제국의 옛 수도였던 쿠스코의 거리에는 스페인 지배의 흔적과 안데스 건축 양식의 매력이 어우러져 있다. 그 사이에는 거대한 거석이 옛 지배자들의 건축 양식임을 증명하고 있다. 도심에서 가까운 잉카 요새인 삭사이우아만 유적은 우리 탐사대원들이 이번 여행에서 찾으려던 것의 맛보기라고 할 수 있다."
 lepsius.200.g: "아, 이집트여."
 lepsius.200.h: "아, 메소포타미아여."
 lepsius.200.i: "아, 그리스여."
 lepsius.200.j: "아, 모기떼와 죽을병이여."
 lepsius.200.k: "아, 페루여."
 lepsius.210.t: "통역사와 신비로운 안내자"
 lepsius.210.d: "탐험 대원 사이에서 남은 여비를 유능한 통역사에 쓸지, 신비로운 안내자에게 쓸지를 두고 의견이 엇갈리고 있다."
 lepsius.210.f: "질과 양의 문제가 아니다, 라고 말하는 탐험대원도 있었다. 통역사는 현지어를 구사한다는 장점 뿐만 아니라 현지인의 신뢰를 더욱 빨리 얻을 수 있다. 유물에 관한 정보를 입수할 확률도 비교적 높아진다. 반면 신비로운 안내자는 우리가 결코 찾지 못하거나 찾기가 대단히 어려울, 특별한 유물과 미지의 역경이 기다리고 있는 비밀스러운 곳으로 우리를 데려갈 수도 있다."
 lepsius.210.a: "통역들을 대동해야겠다."
 lepsius.210.b: "이 지역의 비밀을 아는 안내자가 필요하다."
 lepsius.220.t: "고고학자의 유물 구입"
 lepsius.220.d: "우리 탐사대장은 현지 시장에서 귀한 유물 몇 점을 발견하고 구입하였다."
 lepsius.220.f: "최초의 고고학자가 발을 내딛기 전에는 무덤 도굴꾼, 보물 사냥꾼, 모험가들이 세계 곳곳의 발굴지를 누볐다. 이것은 씁쓸한 현실이다. 대다수의 경우 유물은 흔적도 없이 모습을 감추거나, 개인 소장품이 되거나, 귀금속으로 만들어졌다면 녹여 없어지기도 했다. 하지만 회수가 가능한 유물도 그 기원을 밝혀내기란 영원히 불가능할 수 있다는 한계가 존재한다. 경험 많은 고고학자는 유물을 발굴하는 임무 뿐만 아니라 거래를 통해서도 유물을 찾아내고 그 출처를 재구성하는 데에도 재능을 발휘하게 된다."
 lepsius.220.g: "뜻밖의 횡재로군."
 lepsius.230.t: "일지 작성"
 lepsius.230.d: "이국적인 풍경과 일상의 감명에서 영감을 받은 우리 탐험대장이 일지를 작성하기 시작했다."
 lepsius.230.f: "여느 나라와 장소라면 저마다의 특색과 정취를 지니기 마련이다. 동양의 신비로움, 그리스의 마법, 마야와 잉카의 전설은 사람들을 사로잡는다. 어떤 이들은 미지의 일상이나 알 수 없는 언어, 모험가가 마주한 낯선 세상의 모습에 영감을 얻었다. 때로는 글로 남기기만 해도 그러한 인상의 여운을 정리하고, 기록할 수 있었다."
 lepsius.230.g: "누구도 뭐라 못할 낭만적인 정신일세."
 lepsius.240.t: "논문 집필"
 lepsius.240.d: "우리 탐사대장이 탐사 과정에 관한 과학 논문을 작성하기로 결심했다."
 lepsius.240.f: "놀라운 사실일지 모르겠지만 모든 사람이 본업과 병행하며 개인적인 기록을 남길 시간을 갖는 것은 아니다. 어떤 주제는 공식 보고서에서 다루지 않는 경우도 있는데, 실제 연구 주제에서 너무 벗어나거나 논문이 아직 충분치 않았기 때문일 수 있다. 그런데 우리 탐험대장은 공식 보고서와는 별도로 연구해서 나중에 발표하고 싶은 주제를 발견한 모양이다."
 lepsius.240.g: "그걸로 무언가 유익한 결과가 나왔으면 좋겠군."
 lepsius.250.t: "술집에서의 다툼"
 lepsius.250.d: "우리 탐사대장의 고약한 기질이 외교적 사건으로 번지고 말았다."
 lepsius.250.g: "부끄럽구나..."
 lepsius.260.t: "감사"
 lepsius.260.d: "우리 탐사대장이 올바른 성품을 지닌 덕에 우리 고고학 사업이 널리 인정받게 되었다."
 lepsius.260.g: "좋은 소식이군."
 lepsius.270.t: "아이스크림과 레모네이드"
 lepsius.270.g: "여행은 거창하게 해야지."
 lepsius.280.t: "알현"
 lepsius.280.f: "우리 탐사대의 소식을 들은 현지의 수령이 이번 고고학 탐사의 대장을 불러들였다. 그는 탐사의 목표에 관심을 보였고 손님에 대해서도 몹시 궁금해하는 모습이었다. 이어지는 대화에서 우리 대장은 수령을 즐겁게 해 주었을 뿐만 아니라 본인의 뛰어난 능력으로 깊은 인상을 남기면서 수령이 우리에게 도움을 주겠다고 제안하게 되었다. 알고 보니 수령에게는 귀중한 유물이 있었는데, 그 유물을 우리 탐사대에 기증하는 호의를 베풀었다."
 lepsius.280.g: "멋진 선물이로군!"
 lepsius.290.t: "육군 무관의 경비대 고용"
 lepsius.290.d: "우리 고고학 탐사의 육군 무관이 여정을 무사히 진행할 수 있도록 용병을 고용하였다."
 lepsius.290.f: "국방부는 우리 군무관을 선발하는 데 운이 좋았던 듯 하다. 무관의 능력은 현지 군 장교의 인정을 받았으며 우리 탐사대를 호위하기 위해 경비대를 파견해 달라고 윗선에 요청하였다. 그 보답으로 무관은 이 나라의 부대를 방문하여 자신의 전문 지식을 공유하였다."
 lepsius.290.g: "군부에서 적임자를 선발했군."
 lepsius.300.t: "고고학 탐사 개시!"
 lepsius.300.d: "챙길 것을 다 챙기고, 마지막 조력자도 모집했고, 탐험 계획도 세웠다... 이제 여정에 나설 수 있다."
 lepsius.300.f: ""
 lepsius.300.g: "시작해 봅시다!"
 lepsius.310.t: "고고학 탐사 종료"
 lepsius.310.d: "고고학 탐사가 끝났다. 이제 우리가 손에 넣은 것들을 헤아릴 시간이다!"
 lepsius.310.f: "수많은 고난과 장애물이 가로막은 험난한 여정이었지만, 이번 탐사로 우리나라는 과거에 대한 지식을 넓혔을 뿐만 아니라 박물관에 들일 소중한 유물들도 입수하게 되었다. 이미 조력자 중에서는 우리 곁을 떠났으며 일부 탐사대원은 고국으로 돌아가기를 기원하고 있다. 한편 대장은 탐사의 성공 여부를 좌우할, 우리가 입수한 작은 유물들을 세어보고 있다. 낭만적인 모험 뒤에는 무미건조한 유물 목록 작성이 뒤따른다."
 lepsius.310.g: "학문에 경배를! 이제 우리 대원들을 돌려보내자."
 lepsius.310.h: "이것은 시작일 뿐, 장기적인 발굴 조사를 실시한다."
 lepsius.311.t: "고고학자의 일기 출간"
 lepsius.311.f: ""
 lepsius.311.g: "우리 모두에게 영감이 될 것이오."
 lepsius.312.t: "고고학자의 과학 논문 발표"
 lepsius.312.f: ""
 lepsius.312.g: "국립 도서관에도 사본 한 부를 들였으면 좋겠소."
 lepsius.313.t: "고국으로 돌아온 탐사대장"
 lepsius.313.d: "[SCOPE.sCharacter('lepsius_relaxing_archaeologist').GetFullName](이)가 고고학 탐사를 마치고 돌아왔다. 여행 과정에서 얻은 경험은 깊은 여운을 남겼다. 그럼에도 고된 유물 평가 과정이 우리를 기다리고 있다. 파편이나 천조각, 나무조각처럼 별볼일 없는 유물도 예외는 아니다."
 lepsius.313.f: "실제 고고학 연구란 낡은 대학 건물 안에서 그 많은 유물을 목록으로 작성하고, 분류하고, 과거에 대한 결론을 도출하는 일이며, 고고학자의 삶이라 하면 떠오를 법한 것만큼 매력적이거나 모험적이지 않다. 이 과정에는 보통 #V 3년의 시간이 소요된다.#! 이러한 과정이 남아 있음에도 지역 발굴 조사처럼 국가에서 고고학자를 필요로 하는 일이 생긴다면, 박사를 즉시 소환하는 것이 나을 수 있다. [SCOPE.sCharacter('lepsius_relaxing_archaeologist').GetLastName] 박사도 불러줘서 고마워할 수도 있다."
 lepsius.313.g: "목록을 작성해 봅시다!"
 lepsius.401.t_bedouin: "베두인족의 습격"
 lepsius.401.t_kurdish: "쿠르드족의 습격"
 lepsius.401.d: "우리 고고학 탐사대가 현지 부족의 습격을 받았다."
 lepsius.401.f_bedouin: "사막의 모든 지역이 정부의 완전 통제 하에 있는 것은 아니다. 베두인족 일부는 국가의 근대화와 사회 변화에 저항에 나서 성공을 거두고 있다. 이들은 여전히 수백년 전 조상들의 생활 방식대로 살아가고 있다. 캐러밴과 부주의한 여행객을 노린 습격은 이제 하나의 일상에 불과하다. 우리 탐사대 역시 베두인족의 공격으로 피해를 입었다. 귀중품과 고고학 장비가 도난당하고 낙타가 납치되었던 것이다. 탐사대장은 정부 측에 이러한 사고는 탐사대를 위협하고 있으며 재발 방지에 나서달라고 요청하였다. 물론 이는 내정 간섭으로 여겨질 수 있다..."
 lepsius.401.f_kurdish: "북쪽과 동쪽으로 메소포타미아와 경계를 면한 자그로스 산맥은 예로부터 쿠르드족의 본고장이었으며 지역 정부의 통제를 제대로 받지 못하고 있다. 이들 가운데 다수는 독자적으로 행동하며, 자기네 부족만을 권한당국으로 여기고 있다. 이들은 끊임없이 습격에 나서 왔다. 이번에는 쿠르드족의 습격이 우리 탐사대에도 영향을 끼쳤다. 귀중품과 고고학 장비가 도난당하고 타자가 납치된 것이다. 탐사대장은 정부 측에 이러한 사고는 탐사대를 위협하고 있으며 재발 방지에 나서달라고 요청하였다. 물론 이는 내정 간섭으로 여겨질 수 있다..."
 lepsius.401.g: "정부에 정식으로 항의하자."
 lepsius.401.h: "우리 손으로 준비해야겠소."
 lepsius.401.i: "본때를 보여주자!"
 lepsius.401.j: "호위대!"
 lepsius.402.t_desert: "사막 폭풍"
 lepsius.402.t_tropical: "열대성 폭풍"
 lepsius.402.d: "우리 고고학 탐사대가 엄청난 폭풍을 만났다!"
 lepsius.402.f_desert: "처음에는 탐사대의 눈에 모래를 날리는 가벼운 바람일 뿐이었다. 그런데 머지않아 바람이 너무 강해져서 사람과 짐 나르는 짐승을 압도할 정도였다. 몇 시간이 지나도 사막 폭풍의 격렬함은 조금도 잦아들지 않았다. 우리 고고학자들이 현지인에게 이 현상에 대해 묻자, 해마다 이런 시기에는 이런 유형의 폭풍이 흔하다는 대답이 돌아왔다. 이런 사막 폭풍은 우리 탐사대 전원을 위험에 빠뜨릴 수 있다!"
 lepsius.402.f_tropical: "어느 오후, 우리 탐사대는 천둥과 번개도 없이 갑작스러운 소나기를 맞이했다. 처음에는 비를 피할 곳을 찾았지만 몇 시간 뒤에는 이것이 열대성 폭풍이며 이 지역의 평소 강우와는 다르다는 사실을 깨달았다. 심지어 짐꾼 중 한 명은 허리케인이 만개했을지도 모른다고까지 말했다!"
 lepsius.402.g: "이런 산들바람도 우릴 막을 순 없다."
 lepsius.402.h: "지금 상황은 너무 위험해. 탐사대는 대기하라."
 lepsius.403.t: "안데스 산맥의 안개"
 lepsius.403.d: "육군 무관이 우리 탐사대를 다시 한번 위험에 빠뜨리자, 다른 대원들은 책임질 것을 요구하였다."
 lepsius.403.f: "안데스 산맥을 탐사하던 대원들이 육군 무관에 대해 불만을 토로하고 있다. 고대 잉카 유적지를 찾으려는 탐사대를 수차례 잘못된 길로 이끌었던 것이다. 최근에는 목적지에 빨리 도달하려는 야심에 산 속의 안개를 생각하지 않은 바람에, 탐사대가 귀중한 시간을 허비하는 일까지 벌어졌다. 일부 대원들은 새로운 지휘관을 임명해야 한다고 목소리를 높였다."
 lepsius.403.g: "이대로라면 해임할 수밖에 없다."
 lepsius.403.h: "최선을 다했을 뿐이다."
 lepsius.404.t_aegean: "무너진 다리"
 lepsius.404.t_peru: "무너진 현수교"
 lepsius.404.d: "다리가 무너져 우리 탐사대가 앞으로 나아가지 못하고 있다."
 lepsius.404.f_aegean: "그리스와 크레타섬은 험준한 지형으로 유명하다. 우리 탐사대가 협곡에 발을 들였을 때 최근 산사태로 다리 교각이 유실된 것을 발견했다. 우리는 다리를 복구하고 원래 목적지로 향할지, 아니면 다른 곳으로 향할지 결정해야 한다. 후자는 소요 시간도 적고 비용도 적게 들지만, 고고학 성과는 떨어질지도 모른다."
 lepsius.404.f_peru: "안데스 산맥의 고갯길과 좁은 산간도로를 힘겹게 오른 우리 고고학 탐사대는 예상치 못한 문제에 직면하게 되었다. 현지인들이 전설 속의 사원으로 이어진다고 알려준 현수교가 완전히 무너져 내린 것이다. 탐사대원 중에는 목적지를 포기하고 좀 더 쉬운 유적지로 향하자고 주장하지만, 현지인들은 그런 고생을 할 만한 가치가 있다고 입을 모으고 있다. 그러나 다리를 재건하려면 시간과 비용이 들 것이다."
 lepsius.404.g: "다리를 다시 짓는다."
 lepsius.404.h: "우회로를 찾아보자."
 lepsius.405.t_mesopotamia: "메소포타미아의 거친 도로"
 lepsius.405.t_yucatan: "유카탄 반도의 거친 도로"
 lepsius.405.d: "도로의 상태가 형편없는 바람에 우리 탐사대가 이전까지 생각지도 못했던 난관에 부닥쳤다."
 lepsius.405.f_mesopotamia: "안타깝게도 모든 도로가 마땅히 기대하는 관리 상태를 지니고 있는 것은 아니었다. 특히 주요 교역로에서 벗어난 샛길과 길목은 상태가 매우 열악했다. 하지만 우리 여정의 잠재적 목적지는 문명의 중심지에서 멀리 떨어져 있다. 여정은 고된 일이었고 일부 탐사대원은 벌써부터 다른 길을 택했어야 했다고 불만의 목소리를 높이고 있다."
 lepsius.405.f_yucatan: "유카탄 반도의 정글은 현대에 이르러서도 아직 미개발 상태로 남아 있다. 이 때문에 수많은 유적들이 수백 년 동안 그 누구도 자세히 조사한 적이 없어, 고고학적으로 가치 있는 목적지에 해당된다. 하지만 여정은 고난으로 가득 차 있다. 잘 다져진 숲길 몇 곳을 제외하면 도로라 할 만한 것이 거의 없다. 탐험대원들은 벌써부터 이 길을 택한 것을 후회하고 있다."
 lepsius.405.g: "다른 길로 가보자."
 lepsius.405.h: "인부와 짐 드는 동물을 추가로 들여 좀 더 쾌적한 여정이 되도록 하자."
 lepsius.405.i: "이 길 그대로 따라간다."
 lepsius.406.t: "탐사선의 난파!"
 lepsius.406.d: "우리 군무관이 대단히 불미스러운 사건에 책임을 져야 하는 상황이 벌어졌다."
 lepsius.406.f: "우리 탐사선 중 하나가 에게해에서 난파되고 말았다. 다행히 누구도 다치지 않았으나 고고학 장비의 상당량이 앞바다에 가라앉고 말았다. 우리 탐사대원의 대다수는 선장이 암초를 간과했다고 비난의 목소리를 높이고 있다. 하지만 선장은 항해를 빨리 끝내고 싶었고 어느 지도에도 그 암초는 수록되지 않았다고 해명했다. 지금의 대장으로는 성공 가능성이 점점 낮아지고 있다는 분위기가 대두되고 있다."
 lepsius.406.g: "이런 일에 책임을 지는 것이 맞다."
 lepsius.406.h: "장비는 새로 구입하고 아무 일 없었던 것처럼 하자."
 lepsius.407.t: "오아시스"
 lepsius.407.d: "탐사 중 고고학자들은 이전에 존재가 알려지지 않은 오아시스를 발견하고 식수를 새로 확보할 수 있었다."
 lepsius.407.f: "사실 탐사대원들은 며칠 간의 고난을 견뎌야 하리라 마음먹고 있었다. 이들이 탐사하려는 고대 이집트 유적지는 사막 어딘가에 위치해 있어 이틀에서 사흘 정도를 걸어가야 했기 때문이다. 그러나 놀랍게도 이들은 그 길목에 오아시스가 있는 것을 발견했다. 탐스러운 대추가 달린 야자수와 달콤한 열매가 열린 무화과나무가 그들을 기다렸던 것이다. 식수도 보충할 수 있었고 몇몇 대원들은 이집트의 태양 아래 일광욕을 즐기기도 했다."
 lepsius.407.g: "기운 차리게 하는 소식이군."
 lepsius.408.t: "나자르 부적"
 lepsius.408.d: "우리가 고용한 짐꾼 몇 명은 우리 고고학 대장이 '악마의 눈'에 시달리고 있다며 부적을 사라고 권유하고 있다."
 lepsius.408.g: "부적을 산다."
 lepsius.408.h: "이런 미신은 어떤 과학적 신념과도 어긋난다!"
 lepsius.409.t: "친절한 어부"
 lepsius.409.d: "해안가를 지나던 친절한 어부들이 우리 탐사대의 장비를 수 킬로미터 정도 운반해 주겠다고 제안해 왔다."
 lepsius.409.g: "큰 도움이 되겠소."
 lepsius.410.t_yucatan: "마스코트 앵무새"
 lepsius.410.t_peru: "험악한 콘도르"
 lepsius.410.d_yucatan: "유카탄 반도의 정글 속으로 들어간 이래, 작고 화려한 앵무새 한 마리가 우리 곁에 함께하고 있다."
 lepsius.410.d_peru: "안데스 산맥을 오르기 시작한 이래, 위풍당당한 콘도르의 그림자가 매일같이 우리 위를 드리우고 있다."
 lepsius.410.f_yucatan: "유카탄 반도의 밀림은 위험으로 가득 차 있다. 재규어와 뱀, 독충이 덤불 속에 도사리고 있는 것이다. 하지만 탐사대원들은 그곳의 동식물에 매료되었다. 특히 작고 화려한 앵무새 한 마리가 모자와 쓰개 위를 날아다니며 그 곁을 떠나지 못하는 모습에 푹 빠진 것이다. 이 앵무새는 몹시 영리해 보이며 이제는 정기적으로 먹이도 받아먹게 되었다. 탐사대장은 이 앵무새를 우리 탐사대의 마스코트로 삼고 탐사가 끝난 뒤에는 고국으로 데려갈 계획이다."
 lepsius.410.f_peru: "콘도르는 안데스 산맥의 제왕이다. 거대한 새는 하늘을 지배하고, 그 그림자는 상상할 수 없을 만큼 불어난다. 탐사가 시작된 이래 콘도르는 알파카와 짐꾼들 위를 어슬렁거리며 위협을 안겼다. 현지인들은 콘도르를 믿지 않는다. 독수리처럼 산 사람보다는 죽은 시체 위를 맴도는 것으로 알려져 있기 때문이다. 이러한 불안감은 일부 대원들 사이에서도 퍼져 있다."
 lepsius.410.g: "좋은 징조다."
 lepsius.410.h: "애완 앵무새로 삼아도 되겠는걸."
 lepsius.410.i: "나쁜 징조다."
 lepsius.410.j: "우리가 데려가면 되겠군."
 lepsius.411.t: "짐 나르다 지쳐 버린 동물들"
 lepsius.411.d: "짐 나르는 동물들을 너무 혹사시킨 모양이다."
 lepsius.411.f: "며칠 동안 우리는 짐 나르는 동물이 필요했다. 너무 오래 걸렸다는 목소리도 있었다. 이제는 동물들이 피로한 징후를 보이고 있다.  어떤 동물은 더 이상 이동을 거부하고 주먹으로 쳐야 발걸음을 옮긴다. 오늘 아침에는 앞서 가던 동물이 쓰러졌다."
 lepsius.411.g: "죽으면 편히 쉴 수 있을 것이다."
 lepsius.411.h: "쉬도록 두어라!"
 lepsius.412.t: "고고학 탐사대 실종!"
 lepsius.412.d: "두 달 동안 우리 고고학 탐사대와의 모든 연락이 두절되었다."
 lepsius.412.f: "간혹 운이 지독히도 없을 때가 있다. 미신을 믿는 일부 현지인들은 우리 탐사대 전체가 불운하다고도 한다. 어찌 되었든 우리 고고학 탐사대와의 연락이 완전히 두절된 상황이다. 마지막 서신도 꽤 오래 전의 일이다. 고고학자들이 머지않아 돌아올 것이라 확신하지만, 현재로서는 모든 대원이 길을 잃은 듯하다."
 lepsius.412.g: "제기랄!"
 lepsius.413.t: "이국의 질병"
 lepsius.413.d: "우리 고고학 탐사대의 일부 대원이 지독한 병에 걸렸다."
 lepsius.413.f: "질병은 장기간 여정을 항상 어렵게 만드는 요인이었다. 열대 지방이든, 사막이든, 늪지대든, 험준한 산맥이든 우리 대원들은 낯선 환경에 익숙하지 않고 미지의 병원균이 곳곳에 도사리고 있다. 특히 말라리아는 희생자를 끊임없이 내고 있다. 이번 여정에서 일부 대원들은 지독한 병에 걸려 더 이상 탐사에 나설 수 없는 상황이다."
 lepsius.413.g: "탐사를 잠시 중단하고 돌봐준다."
 lepsius.413.h: "내버려 두고 간다."
 lepsius.414.t: "뇌물"
 lepsius.414.d: "우리 탐사대가 지역 관리들에게 시달려 앞으로 나아가지 못하고 있다."
 lepsius.414.f: "탐사가 시작된 이래 대원들은 온갖 종류의 괴롭힘에 시달렸다. 중소급 관리들은 허가와 특별 부과세를 요구하며 곤란에 빠뜨렸다. 심지어 어떤 관리는 우리의 비자를 문제삼으며 벌금을 부과하려 했다. 상황이 너무나 어수선하다. 이 나라에서는 좋은 인맥이나 친지 없이는 출세할 수 없는 모양이다."
 lepsius.414.g: "날강도 같으니!"
 lepsius.414.h: "도둑놈들 같으니!"
 lepsius.414.i: "정치인들이란!"
 lepsius.415.t: "홍수"
 lepsius.415.d: "나라 전체가 홍수에 휩쓸린 가운데 우리 탐사대장은 불어난 물에 떠내려가는 한 여인을 목격했다."
 lepsius.415.f: "며칠간 계속된 폭우로 강물이 범람했다. 이레적인 날씨였지만 우리 탐사대원들은 만반의 대비를 갖추고 있었다. 강물이 급류로 변했지만 대원들은 여정을 계속했다. 그 순간, 강변에서 비명 소리가 들려왔다. 탐험대장은 화려한 색의 꾸러미가 휩쓸려 가는 것을 보았다. 이제는 곧바로 행동에 나서야 할 순간이다. 모든 여정이 확실히 늦어지더라도 말이다."
 lepsius.415.g: "구해주자!"
 lepsius.415.h: "탐사를 미룰 순 없어!"
 lepsius.416.t: "좋은 날씨"
 lepsius.416.d: "고고학 탐사대가 예상 밖의 순조로운 진척을 보이고 있다."
 lepsius.416.f: "우리 탐사대가 순조로운 진척을 보이고 있다. 때로는 아무 소식도 없는 것이 최고의 소식이기 마련, 이번에는 썩 괜찮거나 훌륭한 장소를 발견할 것으로 우리 고고학자들이 믿어 의심치 않고 있다. 날씨가 좋다는 것을 제외하면 이렇다 할 보고 사항은 없다!"
 lepsius.416.g: "이보다 더 만족스러울 데가."
 lepsius.417.t: "친절한 현지인들"
 lepsius.417.d: "현지인들이 우리 탐사대를 친절히 맞이해 주었다. 허나 어쩌면 우리는 그보다 더 많은 것을 얻게 될 지도 모른다..."
 lepsius.417.f: "우리 탐사대는 작은 마을에 잠시 들렀다. 마을 주민들은 몹시 친절했고 탐사대에게 편안한 휴식처를 내어줌과 동시에 동물들에게도 먹이를 주었다. 현지인들과 이야기를 나누던 중 이들이 이 지역에 대해, 특히 고대 유적에 대해 더 많은 것을 알고 있을지도 모른다는 생각이 들었다..."
 lepsius.417.g: "알아낼 수 있는 건 모두 알아내야 해."
 lepsius.417.h: "그만하면 충분하다."
 lepsius.418.t: "현지 안내인"
 lepsius.418.d: "어느 현지인이 우리 탐사대의 안내인을 자원하고 나섰다."
 lepsius.418.f: "간혹 운이 좋을 때가 있다. 우리 탐사대는 이 지역을 두루 꿰고 있고 지역 명소에 대해서도 잘 아는 현지 안내인을 얻게 되었다."
 lepsius.418.g: "완벽해!"
 lepsius.419.t: "지름길"
 lepsius.419.d: "탐사대의 육군 무관이 유적지로 향하는 지름길을 발견했지만 그 대가로 포상을 바라고 있다."
 lepsius.419.f: "우리 육군 무관이 지름길이 있다고 알려주었다. 어제 오후 우리가 휴식을 취하는 사이 그 지름길을 따라 이 지역을 탐사하였으며 어느 지도에도 없는 오래된 길을 찾았다고 주장했다. 이 말이 사실이라면 우리 탐사대에 큰 도움이 되겠지만, 그에게 마땅히 포상해 주어야 할 것이다."
 lepsius.419.g: "포상해 주고 따라갑시다!"
 lepsius.419.h: "저 자가 으스대는 꼴을 봐서는 안 될 일이오."
 lepsius.420.t: "의욕 넘치는 대원들"
 lepsius.420.d: "우리 탐사대가 의욕 넘치는 대원들을 데려온 것이 다행이다. 덕분에 이번 탐사가 성과를 거둘 가능성이 크게 높아졌다."
 lepsius.420.f: "휘파람과 구호 소리가 쩌렁쩌렁하게 들려온다. 고고학 탐사대가 예상 밖의 순조로운 진척을 보이고 있다. 대원들은 의욕이 넘치고 성공을 믿어 의심치 않는다. 난관이나 문제가 발생해도 훨씬 여유로운 모습이다. 그 이유는 알 수 없지만 아무래도 인재 선발에 있어 운이 좋았던 모양이다. 어찌 되었든 이것으로 우리가 성과를 거둘 가능성도 대단히 높아졌다."
 lepsius.420.g: "카르페 디엠."
 lepsius.421.t: "풍뎅이"
 lepsius.421.f: "마스타바 인근에서 소규모 발굴 작업에 나선 우리 발굴단은 푸른빛의 청금석을 가공해 만든 조그마한 풍뎅이 조각 하나를 제외하고는 아쉽게도 아무런 성과를 거두지 못했다. 그 풍뎅이는 고대 이집트에서 행운의 부적으로 여겨졌던 것이다. 풍뎅이가 똥덩어리를 앞에서 굴리는 모습은 태양신 레가 태양선을 타고 하늘을 가로지르는 여정과 관련이 있다고 믿은 것이다. 우리 발굴단장은 혹시 이 작은 조각을 예외로 삼아 기념으로 가져가도 되느냐고 물었다."
 lepsius.421.g: "간직해도 된다."
 lepsius.421.h: "유물을 발견했다면 무조건 박물관에 넘겨야 한다. 예외는 없다!"
 lepsius.422.t: "모래 속의 신전"
 lepsius.422.d: "우리 고고학자들이 마케도니아 시대의 신전으로 보이는 유적을 발견했다."
 lepsius.422.f: "처음에 우리 대원들은 모래 언덕이라고 생각했다. 하지만 잘 다듬어진 석회암이 조그맣게 튀어나온 것을 보고 이집트 사막 한가운데 자리한 이 특이한 언덕에 무언가 비밀이 감춰져 있음을 우리 학자들은 알 수 있었다. 며칠 뒤 탐사대는 그 속에서 신전을 발견해냈다. 어떤 이들에게는 실망스러운 결과였다. 고대 이집트의 건축과는 전혀 닮지 않았고 알렉산더 대왕 재위기의 건축으로 밝혀졌기 때문이다. 하지만 전문가들은 이 신전이 오늘날까지도 무덤을 발견하지 못한 그리스의 대왕이 이집트를 누볐음을 보여주는 증거라고 입을 모으고 있다."
 lepsius.422.g: "알렉산더 대왕의 발자취를 따라서..."
 lepsius.422.h: "모두 부질없는 이야기일 뿐이오."
 lepsius.423.t: "날개 달린 사자"
 lepsius.423.d: "우리 고고학자들이 메소포타미아에서 천사처럼 생긴 조각품을 출토해냈다."
 lepsius.423.f: "인간과 동물이 섞인 생명체는 근동에 널리 퍼져 있다. 우리 탐사대는 발굴지를 탐색하던 중 굉장히 다름답고 보존 상태가 좋은 조각품을 운 좋게 발견하였으며, 벌써부터 박물관으로 이송되고 있다. 조각품에 새겨진 쐐기문자는 이 생물이 성전의 수호신임을 밝히고 있다는 점에서 더욱 흥미롭다. 우리 학자들은 이 성전 수호신들이 성경에 언급된 이스라엘의 케루빔과 관련이 있을 것으로 추정하고 있다. 예루살렘 성전의 언약궤는 케루빔 두 마리가 지키고 서 있었다고 전해진다."
 lepsius.423.g: "사라진 언약궤를 말하는 것이오?"
 lepsius.423.h: "성 마가, 당신이오?"
 lepsius.423.i: "모두 부질없는 이야기일 뿐이오."
 lepsius.424.t: "쐐기문자 보관소"
 lepsius.424.d: "우리 고고학자들이 엄청난 수의 메소포타미아 유물을 발견했다."
 lepsius.424.f: "우리 학자들이 작은 마을 외곽의 고대 성벽을 조사할 당시만 하더라도 별다른 성과를 거두지는 못하리라고 예상하고 있었다. 석재를 만져보고 나서야 구조물에 빈 공간이 존재한다는 사실을 알아차렸다. 심층 조사를 진행한 끝에 성벽의 특정 지점을 부수자, 그 안에 쐐기문자 점토판이 붙박이로 보관되어 있는 것이 드러났다! 이 보관소는 놀라울 정도로 보존 상태가 양호하며 고대 메소포타미아에 관한 정보를 제공하고 있었다."
 lepsius.424.g: "놀라운 발견일세!"
 lepsius.425.t: "오리칼쿰?"
 lepsius.425.d: "우리 고고학자들이 정체를 알 수 없는 이상한 재료로 만들어진 유물을 찾아냈다."
 lepsius.425.f: "그리스 탐사에 나선 우리 학자들이 흥미로운 발견을 이뤄냈다. 아침에 박물관 관리실에 작은 구슬 하나가 도착한 것이다. 관장은 처음에는 왜 직원들이 이 구슬을 보냈는지 이해하지 못했다. 평소대로라면 그저 사소한 발견에 그쳤을 것이기 때문이다. 그러나 호박색을 띈 이 구슬은 지금까지 어디에서도 발견하지 못한 미지의 재료로 제작된 것이었다. 전문가들도 지금까지 이 유물이 무엇으로 만들어졌는가를 밝혀내지 못하고 있으며, 가짜라고 보는 학자들도 있다. 일각에서는 이것이야말로 에게 문명에 대한 우리의 지식이 완전히 부족하다는 것을 보여주는 증표라고 말한다."
 lepsius.425.g: "플라톤이 크리티아스와의 대담에서 이렇게 생긴 것을 언급하지 않았던가...?"
 lepsius.425.h: "모두 부질없는 이야기일 뿐이오."
 lepsius.426.t: "도자기 더미"
 lepsius.426.d: "우리 고고학자들이 에게 문명의 유물을 대량으로 발굴하였다."
 lepsius.426.f: "고대인들에게 쓰레기였던 것은 고고학자에게는 보물창고다. 이런 말은 최근 우리 발굴팀이 발굴지를 탐색하며 작은 유적지에 머물렀다가 심층 조사를 통해 도자기 더미가 쌓인 구덩이를 발견하면서 현실이 되었다. 아직 짜맞춰야 하는 파편이 많지만 이번에 발견된 수많은 도자기들은 우리 박물관의 소장품을 한층 풍성하게 만들 것이다."
 lepsius.426.g: "전부 우리 것이다!"
 lepsius.427.t: "마야의 옥"
 lepsius.427.d: "우리 고고학자들이 옥으로 만들어진 마야 문명의 유물을 발견했다."
 lepsius.427.f: "옥은 마야 문명에서 예술과 종교 분야에 널리 사용됐던 소재였다. 권력층은 스스로를 옥으로 치장하였으며 태양신도 옥 장신구에 새겨졌다. 뿐만 아니라 중앙아메리카 사람들은 옥으로 도구를 만들기도 하였는데  신대륙에 알려져 있던 재료 가운데 가장 단단한 것으로 꼽혔기 때문이다. 우리 고고학자들은 지난 발굴 조사를 통해 그러한 옥 유물 몇 점을 찾아내는 행운을 누리게 되었다"
 lepsius.427.g: "우리 소장품에 들이면 볼만하겠군."
 lepsius.428.t: "잉카의 신상"
 lepsius.428.d: "우리 고고학자들은 정체를 알 수 없는 잉카의 신상을 발굴해냈다."
 lepsius.428.f: "잉카 문명의 신 인티(Inti)를 표현한 황금 조각상이 오늘 아침 박물관에 속달로 전달되었다. 우리 고고학자들은 이것을 어떻게 어디서 얻었는지는 함구하고 있다. 섬뜩하면서도 아름답고 기괴한 형상이 마치 보는 이를 응시하는 듯하다. 일부 전문가들은 이 조각상이 정말로 잉카 문명의 것인지 의문을 품고 있다. 조각상의 외형이 미지의 문화의 것임을 시사하고 있기 때문이다. 또한 잉카 문명의 황금상은 거의 대부분 페루에서 도난당한 것이다. 아마도 지금까지 우리 박물관의 선콜럼버스 시대 소장품 가운데 가장 독특한 유물일 것이다. 박물관장은 벌써부터 방문을 닫고 전설이 사실일지도 모른다고 목소리를 낮춰 말했다."
 lepsius.428.g: "엘도라도는 실존하는가?"
 lepsius.428.h: "모두 부질없는 이야기일 뿐이오."
 lepsius.429.t: "크리스탈 해골"
 lepsius.429.d: "우리 고고학자들이... 무언가를 발견했다."
 lepsius.429.f: "우리 발굴대원이 맹세컨대 믿음직한 거래업자가 최근에 굉장히 흥미로우면서도 섬뜩한 유물을 보여주었다고 전했다. 그것은 오로지 메소아메리카 석영으로 만들어진 인간의 두개골이다. 표면은 놀라울 정도로 매끄럽게 연마되어 있으며, 우리가 지금까지 남미 대륙의 문화에 대해 알고 있던 그 어떤 것보다도 우수한 만듦새다. 하지만 의심도 크다. 우리 수석 고고학자조차도 이 유물을 어떻게 받아들여야 할지 100% 확신하지 못하고 있다."
 lepsius.429.g: "우리 소장품으로 추가하자."
 lepsius.429.h: "명백한 가짜일세."
 lepsius.430.t: "가짜 크리스탈 해골"
 lepsius.430.d: "수년 전 화제를 불러모으며 매입했지만 진위 여부가 의심되던 그 유물이 정말로 가짜라는 사실이 밝혀졌다."
 lepsius.430.f: "어떻게 이런 일이 있을 수 있단 말인가? 우리가 너무 부주의했던 탓일까? 아니면 화제에만 휩쓸려, 믿고 싶은 대로만 믿고 너무 이기적이었던 탓일까? 우리 박물관이 몇년 전 명물로 들여왔던 전설적인 크리스탈 해골이 싸구려 모조품이라는 사실이 밝혀졌다. 이것으로 실추된 고고학계에서의 위상을 되찾으려면 오랜 시간이 걸릴 것이다!"
 lepsius.430.g: "우리 고고학계에 대한 국가적 수치다!"
 lepsius.431.t: "유적을 알고 있는 현지인"
 lepsius.431.d: "어느 현지인이 유물 탐색을 돕겠다고 기꺼이 나섰다."
 lepsius.431.f: "우리 탐사대가 진로 상에 있는 작은 마을에 들렀다가 우리의 목적지를 전해들은 어느 늙은 농부를 만났다. 그 농부에게 빵과 소금, 물을 건네니 몹시 친절하게 맞아주었다. \"당신네들이 찾고 있는 게 뭔지 다른 동네 사람들이 벌써 말해줬다우\"라고 그 농부는 설명했다. 그리고 그날 반나절 동안 우리를 미지의 땅으로 안내해 주었다. 고대 유적지로 곧장 따라가게 된 우리 고고학자들은 깜짝 놀라고 말았다. 우리 박물관에 들일 유물 몇 점을 발견할 수 있었기 때문이다."
 lepsius.431.g: "오늘은 참 운이 좋구만!"
 lepsius.432.t: "현지인의 유물 거래"
 lepsius.432.d: "어느 현지인이 우리에게 유물을 팔겠다고 제안해 왔다."
 lepsius.432.f: "우리 탐사대는 대도시에 발을 들였다. 짐꾼들이 짐승들에게 먹일 사료를 사는 동안, 어떤 상인이 우리에게 말을 걸어왔다. 우리 탐사대에 대한 소식이 지역민들 사이에서도 널리 퍼진 모양이다. 그는 무덤 도굴꾼에게서 얻은 귀중한 예술품을 좋은 가격에 팔겠다고 제안했다. 유물의 출처는 불분명하지만 매력적인 제안이었다. 값이 좀 높긴 해도 말이다."
 lepsius.432.g: "박물관에 들여야겠다."
 lepsius.432.h: "그런 꺼림칙한 거래에는 관심 없소."
 lepsius.433.t: "진품이냐 가품이냐"
 lepsius.433.d: "석연찮은 평판을 지닌 골동품상이 우리에게 유물 한 점을 팔겠다고 제안해 왔다."
 lepsius.433.f: "스스로 가치가 높다는 고고학 유물을 파는 사람들 모두가 믿음직한 것은 아니다. 이를테면 귀중한 예술품을 파는 데 너무 열을 올리는 상인이 있다. 이런 무분별한 접근과 '부담없는 가격'을 약속하는 유동적인 가격 책정은 우리 탐사대장 사이에서 과연 이것이 안전한 거래인지를 의심케 만들었다. 따라서 이런 미심쩍은 상인으로부터 유물을 입수해야 하는지 박물관 측에 문의하였다."
 lepsius.433.g: "위험을 감수할 필요가 있다."
 lepsius.433.h: "저 자는 믿지 말도록."
 lepsius.434.t: "무덤 도굴꾼을 붙잡다"
 lepsius.434.d: "우리 탐사대가 무덤 도굴에 나서던 무리를 사로잡고 그들이 꺼내간 약탈품을 손에 넣었다. 그러나 이들을 어떻게 처리해야 할지는 결정하지 못했다."
 lepsius.434.f: "우리 고고학자들은 이미 좋은 발굴지를 찾아냈다고 생각했지만, 그곳이 수백 년 동안 도굴당했다는 사실을 깨달았다. 다시 장비를 챙기는 과정에서 모닥불을 지키던 두 대원이 버려진 유적지에서 유물을 몰래 빼돌리려던 수상한 사람들을 붙잡았다. 사실 우리는 이들을 당국에 넘기고 도난당한 유물도 반환하여야 한다. 그러나 어떤 대원들은 우리가 유물을 갖고 도굴꾼에게 돈을 건내 입막음을 해야 한다고 생각하는 것 같다."
 lepsius.434.g: "유물은 우리 것이 되어야 한다."
 lepsius.434.h: "신고서를 제출하고 유물을 지역 당국에 반환하자."
 lepsius.435.t: "경매"
 lepsius.435.d: "정치적 압력으로 인해 최근에 발견된 유물을 경매에 넘기는 방안이 고려되고 있다."
 lepsius.435.f: "우리 정부 인사 중에는 해외 고고학 발굴 사업이 국가 경제로 얻은 이득을 소수 학계 집단의 상아탑에 몰아넣고 있는 돈낭비에 불과하다고 우려하고 있다. 이들은 과학적 성과 뿐만 아니라 발굴 사업의 타탕성을 재정적 근거로 입증할 것을 요구하고 있다. 이에 따라 일부 정치인들은 최근 발견된 유물을 매각하여 고고학 발굴 사업에 들인 비용을 충당해야 한다고 목소리를 높였다."
 lepsius.435.g: "경매에 넘기도록."
 lepsius.435.h: "하지만 이건 박물관에 들여야 한단 말이오!"
 lepsius.436.t: "숨겨진 방"
 lepsius.436.d: "우리 고고학자들은 도굴꾼이 약탈한 것으로 보이는 무덤 한 곳을 발견하였다. 그러나 심층 조사를 실시한 결과 가짜 벽 뒤에 또다른 방이 있는 것을 알아냈다."
 lepsius.436.f: "마지막으로 들른 곳은 처음에는 실망 그 자체였다. 우리 탐사대장은 그 유적지에 큰 기대를 걸고 있었다. 귀족 고위층의 무덤인데다 신성한 용도로 사용되었을지도 모르기 때문이다. 최소한 몇몇 농부들의 증언은 그와 같았다. 하지만 현장에 도착했을 때의 실망감은 더욱 컸다. 무덤은 텅 비어 있고 벽은 앙상했으며 역사적 중요성을 드러낼 만한 것이 아무것도 남아 있지 않았던 것이다. 처음에는 그저 매끄럽게 다듬어진 굴로만 보였다. 그러나 연구를 돕던 조수가 벽에 기대어 서 있다가 우연히 문틀의 윤곽을 발견하면서 상황은 급변했다. 두 시간 동안 잔해와 덧문, 돌을 파헤친 결과 이전에는 숨겨져 있던 방으로 통하는 입구가 드러난 것이다."
 lepsius.436.g: "내 보물!"
 lepsius.437.t: "버려진 캠프"
 lepsius.437.d: "우리는 외국 발굴단이 버리고 떠난 캠프를 발견하였다. 그곳에서 유물 두 점을 확보하자 해당 국가의 대사가 그 유물들은 자기네 국가의 것이라고 주장하고 나섰다."
 lepsius.437.f: "우리 탐사대가 발굴 캠프에 발을 내딛자, 불과 몇 달 전 인근 신전을 탐색한 탐사대가 남기고 간 것을 조사하게 되었다. 상자 안에서 두고 간 유물 두 점이 발견되었는데, 알고 보니 발굴 인부들이 현장을 너무 서둘러 정리하고 떠났기 때문이었다. 우리 고고학자들은 발견한 유물을 입수하엿지만, 머지않아 해당 국가의 대사가 찾아와 유물을 자국 소유라 주장하였다. 이 사건은 강대국과의 외교적 마찰에 불을 지폈다."
 lepsius.437.g: "우리가 찾았으니 우리 것이다."
 lepsius.437.h: "유물을 나누도록 하시오."
 lepsius.437.i: "대신 우리 지식을 공유하겠소."
 lepsius.437.j: "정당한 소유자는 저들이오."
 lepsius.438.t: "은자"
 lepsius.438.d: "어느 은둔자가 유물을 갖고 있는데 협력할 의향이 거의 없어 곤란한 상황이 되었다."
 lepsius.438.f: "우리는 기이한 은둔자가 유물을 소유하고 있다는 이야기를 들었다. 이 사람은 과거에 대한 놀라운 지식과 방대한 기억력을 갖고 있었다. 여러 면에서 우리 탐험대의 학자들조차 그 지식에 감탄할 정도다. 이 심술궂은 노인은 우리에게 알려줄 것은 많지만, 유물을 넘겨줄 생각은 없는 모양이다. 아무래도 우리는 무력을 동원해야 할지도 모른다."
 lepsius.438.g: "우린 그 유물을 원하오, 지금 당장!"
 lepsius.438.h: "그냥 귀 기울여 줍시다."
 lepsius.439.t: "다이너마이트?"
 lepsius.439.d: "특별한 도전에는 특별한 수단을 동원해야 할 때가 있다."
 lepsius.439.f: "발굴을 진행하던 중 우리 안내인은 벽 뒤에 통로가 숨겨져 있을지 모른다는 결론을 내렸다. 최소한 벽 뒤에 빈 공간을 포착했다는 것이 그의 주장이었다. 초창기 고고학에서는 과학적 목표의 달성을 위해 폭약 사용을 비롯한 과감한 조치가 동원되곤 했다. 물론 그 빈 공간이 속임수였고 그동안 우리가 안전한 상태로 두었던 발굴 현장을 위험에 빠뜨린다면, 우리는 아무런 소득 없이 떠날 수밖에 없다."
 lepsius.439.g: "퍼펑!"
 lepsius.439.h: "야만인이나 할 법한 생각이오."
 lepsius.440.t: "부서진 파편"
 lepsius.440.d: "부서진 유물을 발견했다. 잃어버린 조각은 약소국의 손에 들어갔다."
 lepsius.440.f: "발굴 작업 도중 고고학자들이 귀중한 예술품을 발견했다. 그 일부이긴 해도 말이다. 나머지 조각은 어느 약소국이 몇년 전 골동품상에게서 구입해 입수해간 것으로 밝혀졌다. 우리는 외교적 교섭으로 잃어버린 조각을 되찾아 유물을 완성할 수도 있지만, 대사는 정치적인 부담이 될 것이라고 이미 분명히 밝혀 둔 상황이다."
 lepsius.440.g: "남은 조각을 달라고 정중히 요청해 보자."
 lepsius.440.h: "사실 그렇게까지 중요한 문제는 아니다."
 lepsius.441.t: "잊혀진 오벨리스크"
 lepsius.441.d: "미완성 오벨리스크가 우리 학자들에게 고대의 건축 공법에 관한 정보를 선사하고 있다."
 lepsius.441.f: "고대 이집트의 어느 채석장에서 우리 고고학자들은 미완성 오벨리스크로 추정되는 것을 발견하였다. 거대한 석조물이 완성되지 않은 채 방치되어 있었던 것이다. 상형문자는 새겨져 있지 않고, 크기 때문에 운반할 수도 없지만, 학자들은 고대 이집트인들이 이러한 구조물을 어떻게 제작하고 세울 수 있었는지 새로운 통찰력을 얻게 되었다. "
 lepsius.441.g: "정말 흥미롭군."
 lepsius.442.t: "동물 미라"
 lepsius.442.d: "최근 발견된 동물 미라의 취급을 놓고 고고학자들 사이에서 논란을 불러일으켰다."
 lepsius.442.f: "며칠 전 고고학자들은 안치실에서 특별한 유물을 찾아냈다. 귀족의 시신 외에도 동물이 담긴 조그마한 석관이 함께 발견된 것이다. 외형으로 보아 이들은 각각 고양이, 개, 원숭이로 추정된다. 미라 발견 이후 학자들 사이에서 논쟁에 불이 붙게 되었다. 미라 동물은 고대 이집트의 동물 사육 방식과 생활상을 엿볼 수 있는 중요한 단서를 제공하지만, 동시에 이런 귀한 유물이 파괴될 위험성이 있다는 뜻이기 때문이다."
 lepsius.442.g: "철저한 조사가 필요하다."
 lepsius.442.h: "손대지 말도록, 박물관의 대표 전시품이 될 거니까!"
 lepsius.443.t: "악어를 둘러싼 다툼"
 lepsius.443.d: "죽은 악어를 놓고 우리 학자들과 육군 무관 사이에 이상한 다툼이 벌어졌다."
 lepsius.443.f: "나일강의 동물상은 우리 학자들에게 생물학 연구에 대한 영감을 불어넣었다. 이들은 나일 악어에 특히 주목했는데 학자들은 악어를 공포와 혐오감, 동시에 매혹의 대상으로 여겼다. 학자들의 요청으로 육군 무관이 악어 한 마리를 잡았다. 그런데 이제는 육군 무관이 그 악어를 넘겨주기를 거부하고 있다. 그 대신 악어를 박제해서 자기네 집 굴뚝 위에 걸어놓고 싶다고 한다."
 lepsius.443.g: "악어를 학자들에게 넘기도록 하시오."
 lepsius.443.h: "박제여 영원하라!"
 lepsius.443.i: "참 예쁜 악어인데 말이지..."
 lepsius.444.t: "파라오의 저주"
 lepsius.444.d: "영문을 알 수 없는 사고가 연속으로 발생하면서 현지 조력자들은 물론 일부 학자들까지도 우리의 이집트 탐사가 저주받았다고 믿고 있다!"
 lepsius.444.f: "사건의 발단은 우리 탐사대장이 어느 이집트 무덤을 개방하면서부터였다. 석관 안에는 끔찍하게 생긴 미라가 있었는데, 대원들이 보는 앞에서 몇 분 만에 썩어들어가기 시작했다. 며칠 뒤 거의 모든 대원들 사이에서 정체를 알 수 없는 질병이 돌기 시작했다. 미라 공개 현장에 있었던 연구보조원은 목숨을 잃고 말았다. 그 다음 날에는 모래폭풍이 불어와 일주일 동안 꼼짝할 수 없게 되었다. 오늘 아침에는 식수가 오염되어 마실 수 없다는 사실이 드러났다. 물이 구릿빛으로 빛나고 있던 것이다. 이제 점점 더 많은 사람들이 무덤을 모독한 대가를 치러야 한다고 믿고 있다. 신원을 알 수 없는 파라오의 저주가  우리에게 탁친 것이다!"
 lepsius.444.g: "이게 무슨 일이오? 혜성이라도 봤나?!"
 lepsius.445.t: "길가메시 서사시의 파편"
 lepsius.445.d: "학자들은 그 유명한 길가메시 서사시가 담긴 파편을 발견했다. 길가메시 서사시는 인류 문학 사상 가장 오래된 소설 구절로 평가받고 있다."
 lepsius.445.f: "길가메시 서사시는 주로 바빌로니아 일대에서 발견되는 일련의 문학 작품에 담긴 이야기로, 현존하는 가장 오래된 쐐기 문자로 쓰여져 있다. 길가메시 서사시는 여러 판본이 존재하며 아카드어와 수메르어 문학에서 제일 유명한 이야기로 꼽힌다. 그 줄거리는 우루크의 왕 길가메시의 이야기를 전하는 것으로, 길가메시의 업적과 모험, 엔키두와의 우정과 최후, 불멸을 향한 길가메시의 여정을 담고 있다. #T 서사시의 원본을 복원하기 위해서는 @lepsius_gilgamesh_fragment! 파편 5점을 모아야 한다.#!"
 lepsius.445.g: "파편을 더 찾아봅시다."
 lepsius.445.h: "이게 마지막 파편이로군!"
 lepsius.445.i: "파편이 더 있다면 언제든 환영일세."
 lepsius.446.t: "미노아의 프레스코화"
 lepsius.446.d: "크레타에서 조사를 진행하던 우리 발굴단은 미노아 문명의 유적을 발견했다."
 lepsius.446.f: "아름다운 프레스코화가 우리 고고학자들의 관심을 끌었다. 어부와 무용수, 공놀이 하는 사람들의 모습은 고대 미노아 문명의 일상 생활을 보여주고 있다. 크레타섬에서 탐사대가 발견한 이 벽화는 4천 년이 넘는 세월에도 채색된 흔적이 남아 있었다! 이 놀라운 발견에 이어 더 많은 유물이 발견될 것이 확실하다."
 lepsius.446.g: "잃어버린 문명이 우리 눈앞에 살아 있구나."
 lepsius.447.t: "키클롭스식 석조"
 lepsius.447.d: "아르골리스에서 조사를 진행하던 우리 발굴단이 미케네 문명의 유적을 발견했다."
 lepsius.447.f: "그리스에 머물던 고고학자들이 여러 차례의 난관 끝에 무언가를 발견했다. 현지 주민들은 처음에 올리브 나무를 심은 계단석이라고 했으나, 사실은 키클롭스식 석조의 윗부분이라는 사실이 밝혀진 것이다. 발굴단은 아직 많은 것을 찾아내지는 못했지만 적어도 시작은 이뤄낸 셈이다."
 lepsius.447.g: "그 시절에 어떻게 이렇게 견고한 석조물을 세웠는가?"
 lepsius.448.t: "마야 비석"
 lepsius.448.d: "유카탄 반도의 고고학 탐사대가 마야 상형문자 해독에 진전을 보였다."
 lepsius.448.f: "유카탄 반도 정글 속 깊은 곳에 우리 탐사대원들은 마야 시대의 비문을 발견했다. 학자들은 이 비문의 제작연대가 기원전 6세기로 거슬러 올라가는 것으로 추정하고 있다. 이번 발견은 잃어버린 문화에 대한 지식을 크게 넓혀주었으나, 일부 상형문자는 우리 학자들에게 아직 풀어야 할 숙제로 남아 있다. 그러나 이 비문에 담긴 상형문자로 마야 문자의 해독은 시간 문제라는 희망을 갖게 되었다."
 lepsius.448.g: "반드시 해독하고 말겠다."
 lepsius.449.t: "마야 동굴"
 lepsius.449.d: "탐사대가 마야 문명의 흔적을 발견했지만 실제로 이렇다 할 만한 것은 없었다."
 lepsius.449.f: "마야인들은 한때 동굴에서 의식을 거행했다. 그 의식이 무엇인지는 오늘날까지도 명확히 밝혀지지 않았다. 아마 앞으로 고고학자들이 자세한 정보를 밝혀낼 수 있을 것이다. 이들은 과테말라 북부에서 마야 동굴의 입구를 발견했다. 다만 지금까지 별다른 성과는 없는 상황이다."
 lepsius.449.g: "그래서 당신들은 그 돈 받고 뭘 했소?"
 lepsius.450.t: "안데스의 미라"
 lepsius.450.d: "산꼭대기에 오른 우리 학자들은 잉카 의식의 희생물로 바쳐진 어린아이들의 시신을 발견했다. 추운 환경 덕분에 수 세기동안 보존될 수 있었던 것이다."
 lepsius.450.f: "카파코차는 잉카 제국에서 중요한 희생 의식으로서 어린아이를 제물로 바치는 것이 일반적이었다. 잉카 제국 전역에서 남녀 어린이들이 선발되어 카포차 의식에 희생되었으며, 제국 곳곳에 흩어져 있는 대표 신전에서 의식이 거행되었다. 이러한 방식의 의식을 치른 이유는 잉카인들이 인류 최고의 존재들을 신들에게 보내려 했던 것으로 여겨진다. 카포차 의식의 제물로 선발된 어린아이는 보통 술과 코카잎을 먹여 제사 장소에 안치하였다. 잉카인들은 상당히 높은 고도에 위치한 여러 곳의 와크아(wak'a)라는 제례 장소에 특별히 관심을 기울였다. 이러한 산 중에서 가장 중요한 곳에서는 카파코차 의식에 희생된 아이들의 미라화된 시신이 발견되는 경우가 많다."
 lepsius.450.g: "불쾌하지만 가치 있군."
 lepsius.451.t: "석상"
 lepsius.451.d: "고고학자들이 탐사 과정에서 근사한 석상을 발견했다. 하지만 안타깝게도 크기 때문에 옮길 수가 없었다."
 lepsius.451.f: "다음 발굴지로 향하던 우리 탐사대는 이전에 탐사가 잘 이뤄지지 못했던 험준한 지역에서 거대한 석상을 발견했다. 현지 조력자와 짐꾼들조차 그 존재를 알지 못한 이 석상에 탐사대원들은 처음부터 매혹에 빠졌다. 탐사대장은 석상을 보자마자 이것을 실어다 옮기자고 제안했지만, 크기도 크고 땅 속에 단단히 박혀 쉽지 않은 일이 될 것으로 보였다. 따라서 대원들 대다수는 석상에 새겨진 비문들을 전부 기록하고 정확한 그림으로 남기는 것이 최선이라고 생각했다. 하지만 이 귀중한 유물을 조각내어 수도로 옮겨야 한다는 불순한 목소리도 조금씩 들려오고 있다..."
 lepsius.451.g: "그림으로 정확히 옮겨 그리고 비문을 꼼꼼히 배껴 적는 것이 좋겠다."
 lepsius.451.h: "석상을 조각내어 고국으로 실어보내자."
 lepsius.452.t: "사본"
 lepsius.452.d: "우리 탐사대장은 오랫동안 실전되어 왔던 자료를 담고 있는 고대의 기록을 입수하였다."
 lepsius.452.g: "없는 것보다 낫다."
 lepsius.453.t: "풍경을 화폭에 담는 화가들"
 lepsius.453.d: "이번에 고고학 탐사대에 동행한 화가들은 지금의 풍경을 생생하게 기록하여, 다가올 수십 년 동안 학자들에게 유용한 기록으로 남게 될 것이다."
 lepsius.453.f: "역사를 통틀어 고고학 탐사에는 고대의 학자 뿐만 아니라 지리학자, 생물학자, 수학자, 천문학자까지 다양한 분야의 전문가들이 동행해 왔으며, 펜과 종이로 탐사 현장을 기록하는 화가도 예외가 아니었다. 이들은 탐사에 참여하지 않고 조국에 머무는 학자들에게 고고학 현장을 최대한 정확하게 설명할 수 있도록 중요한 지식들을 가져오는 역할을 했다. 나폴레옹의 이집트 침공 이래 고고학 탐사는 이러한 학제간 접근방식으로 여러 분야에서 동시다발적으로 학술적 이정표를 세울 수 있는 다각적인 기회로 발전해 왔다."
 lepsius.453.g: "데려와서 다행이군."
 lepsius.454.t: "연구에 나서는 과학자들"
 lepsius.454.d: "우리 과학자들은 현장에서 다양한 실험을 수행하며 비교분석을 넘어서 고고학자들에게 유용한 조언도 제공하고 있다."
 lepsius.454.f: "역사를 통틀어 고고학 탐사에는 고대의 학자 뿐만 아니라 지리학자, 생물학자, 수학자, 천문학자까지 다양한 분야의 전문가들이 동행해 왔으며, 펜과 종이로 탐사 현장을 기록하는 화가도 예외가 아니었다. 이들은 탐사에 참여하지 않고 조국에 머무는 학자들에게 고고학 현장을 최대한 정확하게 설명할 수 있도록 중요한 지식들을 가져오는 역할을 했다. 나폴레옹의 이집트 침공 이래 고고학 탐사는 이러한 학제간 접근방식으로 여러 분야에서 동시다발적으로 학술적 이정표를 세울 수 있는 다각적인 기회로 발전해 왔다."
 lepsius.455.t: "경쟁 탐사대"
 lepsius.455.d: "황야로 몇 킬로쯤 들어갔을 무렵, 우리 탐사대장은 뼈만 앙상하게 남은 한 무리의 사람들을 마주쳤다. 이들은 외국 탐사대의 가엾은 낙오자들이었다."
 lepsius.455.f: "미지의 영역으로 모험을 떠난 것은 우리 고고학자뿐만이 아니었다. 괴짜 학자 한 명이 이끄는 소규모 민간 탐사대가 국가 주도의 우리네 탐사대와 마주쳤다. 우리 탐사대와는 달리 경쟁 관계에 있는 탐사대는 열악한 여건을 갖추고 있다. 한눈에 봐도 물자가 부족하고 궁핍한 것이 눈에 띈다. 우리 탐사대의 사제가 이들을 돕자고 제안하였는데 그 자체로 고국에서는 자선 행위로 비춰질 수 있다. 반면 다른 탐사대원들은 외국 학자들과 지식을 나눌 기회로 보고 있다. 한편 군사 무관은 탐사대가 소유한 귀중한 유물을 넘겨받는 조건으로 도와줄 기회라고 생각하는 듯하다."
 lepsius.455.g: "도와주자."
 lepsius.455.h: "저들의 지식을 대가로 도와주도록 하자."
 lepsius.455.i: "저들의 보물을 우리에게 넘겨야 식량과 도움을 제공할 수 있다."
 lepsius.461.t: "스핑크스의 속삭임"
 lepsius.461.d: "우리 탐사대장 [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName]의 미심쩍은 생활 방식이 본인 스스로 잊을 수 없는 환각에 시달리는 데 일조하고 말았다."
 lepsius.462.d: "우리 육군 무관 [SCOPE.sCharacter('lepsius_military_attache').GetFullName]의 미심쩍은 생활 방식이 본인 스스로 잊을 수 없는 환각에 시달리는 데 일조하고 말았다."
 lepsius.461.g: "이 자는 자기가 사는 방식을 제대로 돌아봤으면 좋겠군."
 lepsius.463.t: "고양이 여신 바스테트"
 lepsius.463.d: "여정에 나선 [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName](이)가 연구를 통해 자신이 고양이에 애정이 있다는 것을 깨달았다."
 lepsius.463.f: "고대 이집트에는 동물 형상을 한 신이 여럿 존재했다. 그 중에는 고양이 여신 바스테트도 있었다. 고양이는 쥐뿐만 아니라 뱀과 같은 유해동물이 곡식 창고에 들어오지 못하도록 막아주었기에 고대 이집트인들의 큰 사랑을 받았다. 이집트에 매혹된 탐사대장은 바스테트 여신에게 큰 관심을 갖게 되었고 결국 고양이 한 마리를 기르기에 이르렀다. 고양이를 키우면서 스스로의 엄한 성격도 다소 누그러진 듯하다."
 lepsius.463.g: "사람들은 고양이파와 강아지파로 나뉜단 말이지."
 lepsius.464.t: "살루키와 함께 사냥을"
 lepsius.464.d: "우리 탐사대의 육군 무관 [SCOPE.sCharacter('lepsius_military_attache').GetFullName](이)가 메소포타미아를 탐사하던 중 현지 사냥개를 사들였다."
 lepsius.464.f: "중동에서는 일반적으로 개에 대한 인식이 좋지 않다. 예외가 있다면 살루키라는 그레이하운드종이 있다. 베두인족은 살루키를 고귀한 반려견으로 여기며, 토끼나 가젤 사냥에 탁월한 능력을 발휘한다고 생각한다. 우리 육군 무관이 현지인으로부터 이 훌륭한 개를 선물받았는데, 몇 주 전부터 사람과 개 사이에 깊은 유대감이 일고 있다."
 lepsius.464.g: "사람들은 강아지파와 고양이파로 나뉜단 말이지."
 lepsius.465.t: "문제를 일으키는 우월주의 행동"
 lepsius.465.d: "[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName]의 오만한 성격으로 우리가 탐사에 나서는 국가로부터 반감을 불러일으키고 있다."
 lepsius.465.g: "그런 걸 왜 신경쓰나? 어차피 다 미개인인 것을!"
 lepsius.465.h: "이런 외교적 실책은 무슨 수를 써서라도 바로잡아야 한다."
 lepsius.466.t: "지도 제작"
 lepsius.466.d: "고고학 탐사 도중 육군 무관이 지도 제작에 엄청난 관심을 보이며 지도 자료를 직접 제작하기로 하였다. 측량에 재능이 있는 모양이다."
 lepsius.466.f: "탐사에 처음 나설 적부터 육군 무관은 병력의 이동과 전진 상황을 꼼꼼하게 기록하고 직접 지도를 제작하였다. 보고 과정에서 이 사람은 이미 상당양의 지도를 보유하고 있다는 사실이 드러났다. 지난 한 주 동안 과학 조수가 이 사람과 동행하며 지도 제작을 도왔고, 이제는 측량 도구 사용법까지 익혔다. 과학 조수는 전문 측량사로 교육받는 것이 어떻겠느냐고 제안하였다."
 lepsius.466.g: "앞으로 좋은 경력을 쌓게 되겠군!"
 lepsius.466.h: "지도는 훌륭하나 군 관련 사안에 집중해야 한다."
 lepsius.467.t: "잊혀진 성유물"
 lepsius.467.d: "우리 고고학 탐사대의 대장이 동방의 소수 기독교 공동체와 이야기를 나눴다. 그리고는 그에 관한 놀라운 사실들을 들려주었다."
 lepsius.467.h: "그 성유물을 연구해 보는 것이 좋겠다."
 lepsius.468.t: "유물을 훔치다 들킨 무관"
 lepsius.468.d: "오늘 아침 우리 인부 중 한 명이 몇 주 동안 소재를 알 수 없다고 생각했던 유물 두 점을 육군 무관의 숙소에서 발견하였다. 육군 무관은 이 유물들을 자신의 주머니에 챙겼던 것이 분명하다."
 lepsius.468.f: "우리 무관의 내력에 대해서는 모르는 사람이 없었지만 그렇다고 [SCOPE.sCharacter('lepsius_military_attache').GetFullName] 씨가 설마 옛 버릇으로 되돌아갈까 싶었던 대원들도 있었다. 그러나 그것은 완전히 틀렸다. 한 번 도둑은 영원한 도둑이었던 것이다. 발굴 작업자가 최근 발굴 현장에서 우연히 유물 두 점을 발견했는데 육군 무관은 이를 보고하지 않았다. 그렇기에 무관이 유물을 챙기거나 팔아넘기려 했다는 결론을 내릴 수밖에 없다. 탐사대장은 아직 본인을 직접 추궁하지는 않았지만, 이 사건으로 인한 결과가 초래되기 전에 어떻게 처리할까에 관한 합의를 도출하는 것이 더 현명하다고 판단하고 있다."
 lepsius.468.g: "이 사안에 대해선 입을 닫는 것이 좋겠소."
 lepsius.468.h: "신중히 처리하되 유물은 되돌려 놓으라고 전하시오."
 lepsius.468.i: "공개적으로 폭로하고 징계하시오!"
 lepsius.471.t_karnak: "카르나크"
 lepsius.471.t_memphis: "멤피스"
 lepsius.471.t_uruk: "우루크"
 lepsius.471.t_niniveh: "니네베"
 lepsius.471.t_tiryns: "티린스"
 lepsius.471.t_phaistos: "파이스토스"
 lepsius.471.t_itza: "치첸이트사"
 lepsius.471.t_olla: "오얀타이톰보"
 lepsius.471.d: "[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] 대장이 이름난 유적지로 탐사를 떠나고 싶어하는 듯하다. 해당 유적지는 고고학적으로는 중요한 곳이지만, 그곳으로 떠나는 것 자체로 우리 탐사대에게 큰 방해가 될 수 있다."
 lepsius.471.f_karnak: "룩소르 북부의 카르나크 신전은 고대 세계를 통틀어 최대 규모의 신전으로 높이 평가받고 있다. 테베의 신 아문-라가 지역의 신을 넘어서 제국의 신으로 추대된 이래 초기 중왕국 시대의 통치자들이 신전 건설에 나섰고, 이후 수천 년에 걸쳐 확장되어 오늘날의 신전을 이루게 되었다. 이곳에서 아문 신의 사제들은 매일 제사를 지냈다. 신전의 건설에 참여한 파라오만 30명이 넘는 것으로 알려져 있다."
 lepsius.471.f_memphis: "마네토는 전설에 따르면 멤피스가 기원전 3000년에 메네스 왕에 의해 건설되었다고 기록하였다. 멤피스는 이집트 고왕국 시대의 수도였으며 이집트 역사에서 대표 도시로 남아 있다. 멤피스는 장인의 수호신인 프타의 보호를 받았으며, 프타의 신전인 후트-카-프타는 도시 중심부에 자리해 있었다. 멤피스의 흥망성쇠는 이집트 전체의 역사와 밀접한 관련이 있다."
 lepsius.471.f_uruk: "우루크는 최초의 문자가 발견된 곳으로 기원전 4천년기 후반에 이미 존재하였다. 초기 수메르 시대의 주요 정치 중심지로 꼽혔던 우루크는 고대 메소포타미아의 도시로, 강변에 자리잡고 있었다. 신화와 문학에서 우루크는 길가메시 서사시의 영웅 길가메시의 수도로 유명하다. 학자들은 우루크가 성경 창세기 10장 10절에 나오는 에렉과 동일한 곳으로 보고 있는데, 에렉은 니므롯이 시날에 세운 두 번째 도시로 일컬어진다."
 lepsius.471.f_niniveh: "니네베는 티그리스강 동안에 위치해 있으며 신아시리아 제국의 수도이자 최대 도시, 그리고 수백 년 동안 세계에서 가장 큰 도시였다. 신아시리아 제국 시기, 특히 아슈르나시르팔 2세 재위기 이래 시가지가 크게 확장되었다. 주요 성문에는 무게가 최대 30톤에 달하는 거대한 라마수 석상으로 장식되어 있는 것도 존재하였다."
 lepsius.471.f_tiryns: "티린스는 기원전 1400년에서 1200년경에 정점을 찍으며 미케네 문명, 특히 아르골리스 지역의 대표적인 중심지로 거듭났다. 티린스에서 가장 유명한 유적은 궁전과 거대한 굴, 그리고 무엇보다도 성벽이 꼽히는데, 성벽 덕분에 호메로스가 \"견고한 성벽의 티린스\"라 칭하기도 하였다. 티린스는 헤라클레스 관련 신화와도 연관이 있게 되었는데, 헤라클레스가 난제를 수행하는 동안 이곳에 거주하였으며, 일부 문헌에서는 헤라클레스 본인의 출생지로 기록되기 때문이다. "
 lepsius.471.f_phaistos: "전승에 따르면 파이스토스 시는 국왕 미노스가 건설하였으며 헤라클레스의 아들 내지는 손자 (헤로스 파이스토스)에서 이름을 따왔다. 헤로스 파이스토스는 미노스의 손자이자 후대에 크레타 국왕이 된 이도메네우스에게 살해당했다. 파이스토스의 초대 통치자는 미노스의 동생 라다만티스로 전해진다. 파이스토스 시에는 크노소스 다음으로 크레타섬에서 두 번째로 큰 궁전이 들어서 있다."
 lepsius.471.f_itza: "치첸이트사는 멕시코의 유카탄 반도에 남아 있는 대표적인 유적으로 꼽힌다. 유카탄주 메리다시에서 동쪽으로 약 120km 떨어진 지점에 위치해 있으며, 그 연대는 마야 후기로 거슬러 올라간다. 총 1.547헥타르 면적의 치첸이트사는 유카탄에서 가장 장대한 유적지이기도 하다. 유적지 중앙에는 종교, 정치적 배경을 지닌 수많은 기념 건축물이 자리해 있으며 ,그 중에서도 상당 부분 보존된 거대한 계단식 피라미드가 눈길을 사로잡는다."
 lepsius.471.f_olla: "잉카 제국 시기에 오얀타이탐보는 파차쿠티 황제의 왕궁이 있던 도시였다. 파차쿠티 황제는 이 일대를 직접 정복하고 도시와 제례용 건물을 지었다. 스페인이 페루를 침공할 당시에는 잉카 저항군의 대장 만코 잉카 유판쿠이의 강력한 거점 역할을 했다. 오얀타이탐보는 잉카 도시 계획이 그대로 남아 있는 유일한 지역이다. 각종 건물들과 잉카 특유의 계단식 논, 좁은 거리는 여전히 제 모습을 간직하고 있다. 곧게 뻗은 좁은 거리들은 15개의 정사각형 구역 (칸차)를 이루고 있고, 각 구역마다 주택으로 둘러싸인 중앙 안뜰로 통하는 입구를 두었다."
 lepsius.471.j: "절대 안돼, 탐험이 우선이다!"
 lepsius.472.t: "잃어버린 세계?"
 lepsius.472.d: "우리 탐사대가 한동안 소식이 없다가 갑자기 많은 인명과 가축, 장비 손실을 입었다는 보고를 해왔다. 그런데 탐사대장이 내놓은 변명은 정말 어처구니가 없었다."
 lepsius.501.t: "신원 불명 파라오의 무덤"
 lepsius.501.d: "우리 탐사대의 [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] 대장은 왕가의 계곡에 잊혀진 무덤이 있다는 사실을 전해들었다. 듣자하니 과거에 알려지지 않은 파라오의 무덤인 모양이다. 현지인들은 그곳으로 들어가는 입구를 발견했다고 주장했다."
 lepsius.501.f: "이집트 파라오들이 전설적인 왕가의 계곡에 묻히게 된 것은 삼천 년도 더 된 일이다. 이곳의 무덤 가운데 상당수는 고대부터 존재가 알려져 관광 명소로 여겨졌는데, 고대 로마와 그리스의 낙서가 이를 증명한다. 콥트교도들도 무덤 일부를 예배당으로 개조하기도 했다. 수백 년 동안 인근 지역의 도굴꾼들이 무덤과 신전의 예술품들을 훔쳐 장터에 팔아넘겼다. 이 때문에 많은 무덤들은 빈 공간으로 남아 있다. 그러나 먼곳과 가까운 곳을 가리지 않고 건너온 사람들이 오랫동안 잊혀진 무덤들을 찾고 또 찾아내기 시작하였는데, 그 안에는 부장품과 벽화, 그리고 개봉된 적 없는 안치실이 존재했던 것이다. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] 역시 상태가 양호할 것으로 보이는 무덤에 대한 제보를 최근에 입수하였다."
 lepsius.501.g: "이런 것에 들일 시간은 없다."
 lepsius.502.t: "모래, 그것도 아주 많이"
 lepsius.502.d: "고고학자들이 현장에 도착하고 나서 그곳이 정말로 왕의 무덤이 흔적으로 남아 있는 것을 알아보았지만, 유적 자체가 모래 속에 완전히 묻혀 있었다."
 lepsius.502.f: "발굴 작업이 쉬울 거라고 생각한 사람은 아무도 없었다. 그러나 현지인이 고고학자들에게 무덤이 있는 곳으로 데려갔을 때, 그들이 마주한 첫번째 광경은 수직 절벽 아래 모래와 진흙이 무더기로 쌓인 모습이었다. 무덤의 흔적은 어디에도 없었다. 현지인에게 물어보니 자신은 무덤 입구를 본 적이 없지만, 할아버지께서는 아직도 알고 있고 아버지도 어렸을 때 어렴풋 본 것 같다고 했다. 왕가의 계곡은 강우량이 많아 진흙이 자주 쌓이고, 이집트의 바람과 모래는 수백 년 된 유적지를 감춰 버리는 것으로 악명높다. 무덤이 정말로 있긴 한 건지 의심하는 조수들도 있었으나, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName](은)는 잃어버린 무덤을 찾겠다는 결심을 굳게 다졌다. 하지만 오랜 세월 동안 쌓인 엄청난 양의 모래를 치우려면 추가 예산이 필요할 것이다."
 lepsius.502.g: "장비를 더 가져와라!"
 lepsius.503.t: "거대한 바위"
 lepsius.503.d: "반경 15km 이내에 있는 모든 삽을 동원해 끈질기게 파낸 끝에 탐사대는 입구를 파냈으나, 그곳에서 발견한 것은 입구를 가로막은 거대한 바위 뿐이었다."
 lepsius.503.f: "며칠 동안 모래와 진흙을 파내느라 고생한 보람이 있기를. 탐사대원들은 적어도 그렇게 바라고 있었다. 무덤 입구의 삼인방이 마침내 모습을 드러내자, 지쳐 있던 대원들의 침울한 기분은 환희로 바뀌었다. 그로부터 단 몇시간 만에 입구의 나머지 부분이 드러났다. 하지만 더 깊숙히 들어가자마자 이 무덤이 도굴되지 않고 남아 있던 이유를 알 수 있었다. 수십 년 전, 아니 수백 년 전에 암벽에서 떨어져 나온 것으로 보이는 거대한 바위가 입구를 막고 있었던 것이다. 키가 작은 소년이라도 그 바위를 지나갈 수는 없어 보였는데, 자갈과 굳은 진흙이 마치 시멘트처럼 통로를 가득 채우고 있었기 때문이다. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName](은)는 중대한 결정에 직면했다. 무덤 입구의 장애물을 어떻게 제거하면 좋은가?"
 lepsius.503.g: "고도의 연구 방법을 동원한다."
 lepsius.503.h: "고도의 기계를 활용한다."
 lepsius.503.i: "고도의 니트로글리세린을 사용한다."
 lepsius.503.j: "순수한 근력으로 밀어붙인다."
 lepsius.504.t: "폭약으로 박살난 무덤"
 lepsius.504.d: "안타깝게도 폭약을 사용하는 것은 이점보다 결점이 더 많았다. 폭약이 바위를 부수는 것을 넘어서 무덤을 통째로 박살내 버린 것이다!"
 lepsius.504.f: "폭약 설치는 쉬운 일이 아니었지만, 지질학자에게 저렴한 값으로 구할 수 있어 며칠 만에 해결을 보았다. 탐사대원 중 누구도 스스로를 폭파 전문가로 자부한 적은 없지만, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName](은)는 고위험 니트로글리세린을 다루는 것이 그렇게 어려운 일이 아니라고 생각했다. 허나 사전에 전문가와 상의했더라면 더 좋았을 지도 모른다. 탐사대원들이 필요한 양을 잘못 계산하는 바람에, 바위 하나를 날리는 게 아니라 바위면 전체가 날아가 버린 것이다! 탐사대원들은 바로 인근의 산에서 낙석이 쏟아져내려 주변을 완전히 박살내기 전에 간신히 목숨을 건지는 기적을 경험했다. 입구 뒤에 무엇이 었었던 간에 이제는 돌이킬 수 없을 정도로 박살나 버렸을 것이다."
 lepsius.504.g: "우리가 너무 과했나?"
 lepsius.505.t_archaeology: "벽화"
 lepsius.505.t_engine: "박살난 벽화"
 lepsius.505.t_muscular: "벽화"
 lepsius.505.d_archaeology: "우리 고고학자들은 정밀 고고학 조사와 최신 기술을 활용한 바위 제거 작업을 거쳐, 보존 상태가 양호한 파라오 무덤의 내부로 들어섰다."
 lepsius.505.d_engine: "탐사대는 장비를 이용하여 바위를 제거하였으나 부정적인 결과도 낳고 말았다."
 lepsius.505.d_muscular: "힘센 이탈리아인을 고용한 덕분에 바위를 치우고 보존 상태가 양호한 무덤 내부로 진입할 수 있게 되었다."
 lepsius.505.f_archaeology: "고도의 작전을 수행하듯 고고학자들은 거대한 바위에 다가갔다. 바위를 분석하고 그 재질을 확인한 뒤, 삽과 곡괭이로 조심스레 파헤쳤다. 면밀한 조사 끝에 입구의 상형문자가 손상되지 않도록 바위 덩어리를 얇은 층으로 제거하는, 복잡하면서도 오랜 시간이 걸리는 방식을 택하기로 결정을 내렸다. 작업은 고되었지만 단연코 그만한 가치가 있었다. 기름등을 손에 든 학자들은 첫번째 통로를 더듬어 내려가 고대 이집트의 아름다움을 마주했다. 들판에서 일하는 농부, 파라오의 궁정, 심판의 신을 담은 그림이 놀라운 보존 상태와 함께 벽에 그려져 있던 것이다. 비록 도굴의 흔적이 뚜렷히 남아 있는 등 유물은 발견하지 못했지만, 이처럼 기대를 불러일으키는 것들이 한데 어우러진 것만으로도 무덤을 철저히 탐사할 가치가 충분하다고 할 수 있었다."
 lepsius.505.f_engine: "최신 기술은 우리가 신원 미상 파라오의 무덤을 발굴하는 과정에 보탬이 될 것이다. 그라우트를 사용하여 입구 통로에서 바위를 끌어올리는 기계를 동원하는 것이다. 처음에는 바위가 꿈쩍도 하지 않았다. 그래서 우리 학자들은 엔진을 최대 출력으로 가동했다. 그건 치명적인 실수였다. 바위가 박혀 있던 곳에서 잠시 빠져나와 경사면 위로 끌려올라갔지만, 머지않아 벨트가 완전히 풀려 무덤 쪽으로 빠르게 굴러떨어지면서 무덤 내부에 극심한 손해를 끼친 것이다! [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName](와)과 조수들은 드러난 통로 쪽으로 급히 달려가 보았지만 그들이 마주한 것은 충격적인 광경 뿐이었다. 바위가 한때 아름다운 채색 벽화로 가득하던 통로를 완전히 박살냈을 뿐만 아니라 무덤 전체를 떠받치던 중요한 벽면도 심하게 부숴져 버린 것이었다."
 lepsius.505.f_muscular: "룩소르로 복귀한 우리 탐사대원들은 인상적인 사람을 찾아냈다. 이 남자는 이탈리아 파도바 출신으로서, 원래는 나일강의 범람을 막는 수력 장치를 이집트의 통치자에게 시연하기 위해 이곳에 찾아왔으나, 사업이 실패로 끝나고 말았다. 2미터에 달하는 거구에 황소 같은 근육질을 가진 남자는 이전에 서커스단에서 '파타고니아의 헤라클레스'라는 이름으로 공연에 나섰다고 밝혔다. 그 남자가 데리고 다니는 영국인 하인의 증언에 따르면 한번에 여섯 명까지 들어올릴 수 있다고 한다. 바로 이 특별한 능력을 기회 삼아 우리는 그 남자를 고용하여 무덤의 문을 열기로 결정했다. 남자는 현장에 도착하자마자 놀라운 기력으로 돌을 굴려 치워버렸다. 기름등을 든 고고학자들은 복도로 달려 들어가 고대 이집트의 아름다움과 마주했다. 들판에서 일하는 농부, 파라오의 궁정, 심판의 신을 담은 그림이 놀라운 보존 상태와 함께 벽에 그려져 있던 것이다. 이처럼 기대를 불러일으키는 것들이 한데 어우러진 것만으로도 무덤을 철저히 탐사할 가치가 충분하다고 할 수 있었다."
 lepsius.505.g: "고대 이집트의 장엄함일세!"
 lepsius.505.h: "이럴수가."
 lepsius.506.t_archaeology: "무사히 보존된 석관"
 lepsius.506.t_engine: "위태로운 석관"
 lepsius.506.t_muscular: "박살난 석관"
 lepsius.506.d_archaeology: "우리 고고학자들은 놀라움과 경외심을 담아둔 채, 파라오가 안치된 묘실에 들어서서 제20왕조 시대의 아름다운 석관과 미라를 확보하였다."
 lepsius.506.d_engine: "기계로 인해 파괴된 부분이 곳곳에 선명하게 남아 있었다. 고고학자들은 상황을 제대로 파악할 여유도 없이 최대한 빨리 석관을 바깥으로 옮기느라 분주해졌다!"
 lepsius.506.d_muscular: "우리 학자들은 마침내 손상 없이 아름답게 장식된 파라오의 묘실로 들어가는 데 성공했으나, 그 순간 예기치 못한... 사고가 발생했다."
 lepsius.506.f_archaeology: "[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName]의 지휘로 우리 고고학자들이 실제 묘실에 들어가게 된 것은 진정으로 역사적인 경험이라 할 수 있었다. 제물로 바친 항아리 몇 개와 미라로 만들어진 개 외에도 이들을 앞에 놀라운 발견이 기다리고 있었다. 다름아닌 3천년 전도 더 전에 묻혔던 그 자리에 신원 미상 파라오의 관이 그대로 남아 있었던 것이다! 학자들은 조심스레 먼지를 털어내고 도굴꾼이 망가뜨리고 간 관뚜껑을 열어보니 잘 보존된 나무관이 있음을 확인하였다. 이것으로 우리 박물관은 이집트 문명에 대한 하나뿐인 증거를 얻게 되었다!"
 lepsius.506.g: "고고학이 곤경을 면하게 해 줬군."
 lepsius.506.h: "어서 옮겨라!"
 lepsius.506.i: "이럴수가."
 lepsius.511.t: "명예의 문제"
 lepsius.511.d: "어떤 농부들의 말에 따르면 외국 탐사대가 자국의 국기를 며칠 전 피라미드 꼭대기에 꽂고 왔다고 한다. 우리 탐사대의 애국심 넘치는 대원들은 이에 자극받고 똑같이 나서고 싶은 모양이다."
 lepsius.511.f: "카이로 인근에 있던 탐사대에게 모든 대원을 충격에 빠뜨릴 소식이 전해졌다. 지난주 누군가가 자국의 국기를 기자의 대피라미드 꼭대기에 꽂은 것 같다는 것이었다! 학계에서 그런 과시적인 행동은 사실상 금물이며, 이집트의 통치자인 파샤도 그러한 승리의 제스처를 허락하였는지의 여부도 알려지지 않았다. 다만 한가지 분명한 것은, 탐사대원들 전반이 조국에 불명예를 안기고 싶지 않다는 간절한 마음으로 우리도 똑같이 해야겠다는 열망이 가득했다는 것이다."
 lepsius.511.g: "이런 데 낭비할 시간은 없어."
 lepsius.511.h: "해보자고, [ROOT.GetCountry.GetName](을)를 위하여!"
 lepsius.512.t: "새벽녘"
 lepsius.512.d: "탐사대는 기자의 대피라미드를 오르기 위해 아침 일찍 출발하였다!"
 lepsius.512.f_wine: "피라미드 등정의 참가자들은 아침 5시에 일찍 기상하였다. 어제 대원들은 5m 높이의 국기를 제작하여 거대한 스핑크스를 지나 쿠푸의 피라미드까지 끌고 왔다. 아침 식사로는 차가운 칠면조 고기가 준비되었고, 일부 대원들은 어제의 국기 제작 작업으로 아직 힘들어하고 있다. 일부 대원들은 스핑크스 기슭에 텐트를 쳐서 머물고, 나머지는 피라미드로 향한다. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] 대장은 피라미드 정상에서 축하를 나누기 위해 특별히 포도주 한 병을 준비했다고 공언하였다."
 lepsius.512.f_no_wine: "피라미드 등정의 참가자들은 아침 5시에 일찍 기상하였다. 어제 대원들은 5m 높이의 국기를 제작하여 거대한 스핑크스를 지나 쿠푸의 피라미드까지 끌고 왔다. 아침 식사로는 차가운 칠면조 고기가 준비되었고, 일부 대원들은 어제의 국기 제작 작업으로 아직 힘들어하고 있다. 일부 대원들은 스핑크스 기슭에 텐트를 쳐서 머물고, 나머지는 피라미드로 향한다. 일행이 대피라미드에 거의 다다르자, 육군 무관은 [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] 대장이 오늘 아침 제일 중요한 것을 빼놓고 왔다는 사실을 깨달았다. 그것은 다름아닌 건배를 나눌 포도주였다!"
 lepsius.512.g: "최고의 포도주를 가져왔기를 바라오..."
 lepsius.512.h: "포도주를 빼먹었다고?"
 lepsius.513.t: "등정"
 lepsius.513.d: "탐사대장과 육군 무관이 대피라미드 아래에 섰다. 이 위험한 계획을 누가 이끌 것인가를 놓고 의견차를 보이고 있다."
 lepsius.513.f: "우리 탐사대는 쿠푸 왕의 대피라미드가 서있는 지상에 도착하였다. 꼭대기에 이르려면 얼마나 많은 계단을 올라야 하는가를 놓고 의문이 생겼는데 [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] 대장은 총 203계단이라고 정확히 답했다. 정복해야 할 돌계단이 너무나 많았던 것이다. 한편 누가 등반을 이끌 것인가에 관한 의문도 제기되었다. [SCOPE.sCharacter('lepsius_military_attache').GetFullName](은)는 자신이 산악가만큼 알맞은 지도자라고 자부하고 있다..."
 lepsius.513.g: "[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] 대장이 앞으로 나아가 이끌어 주길 바라네."
 lepsius.513.h: "[SCOPE.sCharacter('lepsius_military_attache').GetFullName](이)가 앞으로 나아가 이끌어 주기를 바라네."
 lepsius.514.t: "원래의 입구"
 lepsius.514.d: "우리 탐사대는 피라미드 저층부를 오르고 있다. 이제 열세 번째 계단에 오른 탐사대는 안치실로 이어지는 원래의 입구와 근접해 있다."
 lepsius.514.f: "첫 단계는 넘어섰다. 우리 탐사대는 아직 바닥과 더 가깝지만 잠시 휴식을 취하게 되었다. 탐사대장은 쿠푸의 피라미드로 들어가는 옛 입구를 좀 더 자세히 살펴보고 발굴 조수들과 함께 내부로 내려가보고 싶은 모양이었다. 몇몇 대원들은 점심 식사를 위해 휴식을 취했다. 모두들 이제부터 등반이 위험해질 것을 알고 있었다."
 lepsius.514.i: "이곳도 우리 국기를 꽂기에 충분하겠군."
 lepsius.515.t: "100번째 계단"
 lepsius.515.d: "우리 탐사대는 피라미드의 100번째 계단에 올랐다. 이제 거의 절반쯤 올라온 것이다."
 lepsius.515.f: "100번째 계단은 별것 아닌 것처럼 보이지만, 많은 인원과 짐, 그리고 제한된 공간을 생각하면 상당히 어려운 도전이었다. 우리 현수막은 여전히 말려 있어 다섯 명이서 나눠들고 있었다. 일부 탐사대원은 벌써 이쯤  되면 경치가 충분하다고 말하고 있다. 한편 [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] 대장은 걱정스런 표정으로 정상을 바라보고 있다. 이제 전체 등반에서 가장 위험한 구간이 시작되기 때문이다."
 lepsius.516.t: "추락"
 lepsius.516.d: "마지막 피라미드 단계를 오르던 우리 탐사대장과 대원들이 너무 무리한 나머지 참사가 벌어지고 말았다!"
 lepsius.516.f: "어쩌면 인간의 실수였을지도 모르고 계획이 틀어진 것일지도 모르지만, 어쩌면 운명이 우리의 오만함을 벌한 것일지도 모른다. 피라미드를 오르던 중 한 조력자가 계단에서 미끄러져 다른 대원들과 짐까지 함께 낭떠러지 아래로 추락했다. 우리 대장과 육군 무관은 최악의 상황을 막았지만, 심하게 다치고 말았다. 일부 짐꾼들은 보급품을 가지고 무사히 빠져나왔지만, 다른 이들은 뼈가 부러진 것 같다고 호소했다. 결국 우리는 대피라미드 정상에 국기를 게양하려던 야심찬 계획을 포기할 수밖에 없었다."
 lepsius.516.g: "우리 모두의 수치로구나."
 lepsius.517.t: "대피라미드 정상에서"
 lepsius.517.d: "탐사대와 조국에게 실로 엄청난 날이 아닐 수 없다. [ROOT.GetCountry.GetAdjectiveNoFlag] 국기가 기자의 대피라미드 꼭대기에서 휘날리게 된 것이다!"
 lepsius.517.f: "고고학계에 위대한 순간이요 [ROOT.GetCountry.GetName]에게 위대한 순간이었다. 우리 탐사대가 쿠푸의 피라미드 정상에 올라 ㅈ가은 기념 행사를 열었다. 샹폴리옹과 레프지우스, 로셀리니의 이름이 '만세! 만만세!' 하는 우렁찬 함성과 함꼐 울려 퍼졌으며 애국심 넘치는 대원들은 마침내 국기를 게양하게 된 것이다. 저물어가는 태양빛 아래, 우리 국기가 나일강 계곡 전체에 환하게 빛나고 있다!"
 lepsius.517.g: "[ROOT.GetCountry.GetName] 국기를 게양하고 건배를 나누세!"
 lepsius.517.h: "[ROOT.GetCountry.GetName] 국기를 게양하세!"
 lepsius.521.t: "이슈타르의 문"
 lepsius.521.d: "바빌론에서 발굴 조사를 진행하던 고고학자들이 전설 속 이슈타르의 문의 거대한 잔해를 발견하였다. 이 역사적인 도시 성문은 보존상태가 상당히 좋았다."
 lepsius.521.f: "고대 바빌로니아 수도 유적지를 발굴하는 과정에서 작업하던 인부들이 먼저 유약을 바른 벽돌을 발견하여, 근엄하고 상징적인 건축이 존재하였음을 시사하였다. 발굴을 계속할 수록 더 많은 유물이 발견되었고, 마침내 보존 상태가 매우 양호한 성문의 벽과 성탑까지 확인할 수 있었다. 이 문에는 사자와 황소, 신화 속 동물들이 위풍당당하게 서 있는 모습이 새겨져 있었다. 탐사대장 [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName](은)는 정부에 과감한 계획을 제시하였다. 바로 성문 전체를 해체하여 우리 수도에 원래 모습 그대로 재건하자는 것이었다. 막대한 비용과 여러 난제가 따르는 사업이었지만, 동시에 굉장히 매력적인 발상이었기에 저명한 지식인들과 박물관 관계자들이 동참하고 나섰다."
 lepsius.521.g: "일부만 챙긴다. 원래 있었던 자리에 두는 것이 좋다."
 lepsius.521.h: "[SCOPE.sState('capital_scope').GetCityHubName]에 옮겨서 복원해야 한다."
 lepsius.522.t: "메소포타미아에서 보내온 벽돌"
 lepsius.522.d: "성문 복원에 필요한 대량의 벽돌이 오늘 [SCOPE.sState('capital_scope').GetCityHubName]의 박물관에 전달되었다."
 lepsius.522.f: ""
 lepsius.522.g: "아침부터 메소포타미아의 벽돌 냄새를 맡으니 기분이 좋군."
 lepsius.523.t: "외세의 손에 넘어간 이슈타르 벽돌"
 lepsius.523.d: "지난 수십년 간 바빌론에서 발굴 작업을 해온 것은 우리 뿐만이 아니었다. 알고 보니 외국에서도 이슈타르의 문 복원에 필요한 벽돌 일부를 소장하고 있었다. 우리는 정중하게 요청해볼 수밖에 없는 상황이다."
 lepsius.523.f: ""
 lepsius.523.g: "겸손한 자세로 부탁할 수밖에."
 lepsius.523.h: "그깟 벽돌 가지고? 절대 안 돼!"
 lepsius.524.t: "적군이 벽돌 수송을 차단했다!"
 lepsius.524.d: "우리 박물관에 들어서는 이슈타르의 문의 복원에 필요한 메소포타미아의 벽돌이 수 개월이 지나도록 도착하지 않고 있다. 이와 함께 전쟁 중에 수송이 차단되었다는 소식이 전해졌다."
 lepsius.524.f: ""
 lepsius.524.g: "어떻게 이런 방해 행위를!"
 lepsius.525.t: "특별 부과세"
 lepsius.525.d: "이슈타르의 문에 사용된 벽돌이 출토되는 국가에서 우리의 계획을 빌미로 이득을 취하려는 듯하다. 벽돌을 국외로 반출할 때 '특별 부과세'를 매겼다고 한다!"
 lepsius.525.f: ""
 lepsius.525.g: "매 파편마다 돈을 내야 하겠군..."
 lepsius.526.t: "메소포타미아에서 보내온 소규모 벽돌"
 lepsius.526.d: "이번에는 알 수 없는 사정으로 인해 우리 배에 이슈타르의 문에 쓰인 벽돌이 절반 가량밖에 채워지지 않았다."
 lepsius.526.f: ""
 lepsius.526.g: "벽돌 조금 운반하는 게 그리도 어려운가."
 lepsius.527.t: "벽돌을 가득 실은 선박의 입항"
 lepsius.527.d: "이슈타르의 문 복원에 필요한 벽돌이 평소보다 훨씬 많은 규모로 오늘 박물관에 전달되었다. 메소포타미아 현지의 벽돌 운반 작업이 예상보다 순조로웠던 모양이다."
 lepsius.527.f: ""
 lepsius.527.g: "아, 벽돌이 또 왔구만!"
 lepsius.528.t: "못 쓰게 된 벽돌"
 lepsius.528.d: "도우리 학예사들은 [SCOPE.sState('capital_scope').GetCityHubName]에 도착한 벽돌의 상태를 확인하는 과정에서 안타깝게도 일부 상자가 완전히 사용 불가능한 수준이라는 것을 밝혀냈다. 좋든 싫든 그 벽돌은 빼고 활용하게 되었다."
 lepsius.528.f: ""
 lepsius.528.g: "안 돼! 이게 얼마나 귀한 벽돌인데..."
 lepsius.529.t: "외교적 굴복"
 lepsius.529.d: "몇 년 전 우리나라가 골동품상으로부터 구입했던 가치 없는 고고학 유물 몇 점을, 해외의 어떤 국가가 전세계 앞에서 굴욕적인 태도를 보이면서까지 우리에게 구걸해 왔다. 물론 우리는 기꺼이 그 호의를 받아들이고 그 쓸모없는 유물들을 처분할 수 있게 되었다."
 lepsius.529.f: ""
 lepsius.529.g: "굉장하군!"
 lepsius.530.t: "이슈타르의 문 복원 완료!"
 lepsius.530.d: "수만 점에 달하는 바빌로니아 파편들을 수 년 간의 노력과 정성스러운 조립을 거친 끝에, 전설적인 이슈타르의 문이 본연의 크기 그대로 우리 박물관에 전시되어 새로운 영광을 누리게 되었다!"
 lepsius.530.f: "이슈타르의 문은 바빌론 내부 도시의 여덟번째 성문이었다. 기원전 575년경 네부카드네자르 2세의 명에 따라 도시 북쪽 편에 건설되었다. 이슈타르의 문은 도시로 이어지는 행렬용 대로에 세워진 웅장한 성벽의 일부였다. 벽 부분은 주로 푸른색으로 된 유약 바른 벽돌로 마감하였으며, 일정 간격으로 동물과 신의 부조가 새겨져 있었다. 이 부조 역시 다양한 색깔과 형태의 벽돌로 만들어졌다. 성문의 정면은 바빌론 신화의 주요 신 2인의 상이 반복적으로 새겨진 얕은 돋을새김으로 장식되었다. 바빌론 국가를 대표하는 신이자 최고신인 마르두크와 하인으로 부리는 용 무슈후슈가 묘사되어 있는데, 무슈후슈는 뱀처럼 생긴 머리와 꼬리, 비늘로 덮인 사자의 몸, 강력한 발톱을 가진 용으로 표현되었다. 마르두크는 선과 악의 싸움에서 승리하는 신성한 수호자로 여겨졌으며 바빌론 사람들은 마르두크의 수호를 기원하는 주문을 외우곤 했다. 이슈타르의 문에 설치된 부조의 문양에 등장하는 두번째 신은 아다드(이슈쿠르라고도 함)로, 소의 조상이자 지금은 멸종된 들소를 신성한 동물로 데리고 다녔다. 이슈타르의 문에는 선형 테두리와 장미 문양도 장식으로 들어가 있는데 이는 다산의 상징으로 여겨질 때가 많다. 이슈타르의 문에 쓰인 벽돌은 미세한 질감의 점토를 나무틀에 넣어 눌러서 만들었다. 각각의 동물 부조 또한 재사용 가능한 틀에 점토를 넣어 만든 벽돌로 제작되었다."
 lepsius.530.g: "장엄하군!"
 lepsius.531.t: "라마수 석상의 전설"
 lepsius.531.d: "우리 고고학자들은 엄청나게 장대한 라마수 석상이 오랜 세월 동안 잊혀진 채 쿠르드 지역 어딘가에 존재한다는 소문을 들었다."
 lepsius.531.f: "어느 저녁날 우리 탐사대가 텐트를 설치하고, 모닥불을 피우고, 양고기를 구우며 하루를 마무리하고 있던 참이었다. 새벽녘 검붉은 노을이 짙게 물든 가운데, 어느 늙은 양치기가 숙소에 도착해 식량을 좀 달라고 부탁하였다. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName](은)는 양치기의 부탁을 들어주고 놀라운 이야기를 전해들었다. 30여년 전, 이 지역에 또다른 고고학 탐사대가 보물과 특별한 유물을 찾아 박물관에 감동을 안기고 명예와 영광을 얻고서 고국으로 돌아가고자 했다고 한다. 그 때 탐사대가 발견한 것은 거대한 라마수 석상으로, 그 기념비적 크기와 뛰어난 보존 상태 덕에 지금도 현지인들에게 잘 알려져 있었다. 그러나 이송 과정에서 사고가 벌어졌는데, 수십 명의 인부를 동원해 그 메소포타미아의 거대 석상을 옮기던 중 탐사대장이 현지 쿠르드족과 갈등을 빚게 된 것이다. 탐사대장이 고용한 쿠르드족 인부들의 임금을 속였다는 것이 그 원인이었다. 따라서 쿠르드족은 탐사대원들을 매복 공격하여 유물을 빼앗아 본인들의 것으로 삼았다고 한다. 하지만 라마수 석상은 제자리에 그대로 남아 있었고, 지금도 쿠르드족의 영역에서 모습을 드러내며 주인을 기다린다고 한다. 그 양치기는 우리가 도와준 대가로 전설 속 라마수 석상의 위치를 알려주겠다고 제안하였다."
 lepsius.531.g: "그런 옛이야기 때문에 우리 스스로를 불필요한 위험에 빠뜨리는 것은 너무나 무모하다."
 lepsius.531.h: "어떤 대가를 치르고서라도 라마수 석상을 손에 넣겠다!"
 lepsius.532.t: "라마수 석상 탐색"
 lepsius.532.d: "우리 탐사대는 쿠르드족의 권역으로 위험천만한 여정에 나섰다. 일부 대원들은 성공 가능성을 높이기 위해 탐사대를 나눠야 한다고 주장하고 있다."
 lepsius.532.g: "나눠서는 안 된다."
 lepsius.532.h: "탐사대를 나눠야 한다."
 lepsius.533.t: "선물"
 lepsius.533.d: "우리 탐사대는 쿠르드족의 두목을 만나 이 지역을 무사히 통과하고 라마수 석상을 발굴할 수 있도록 허가해 달라고 부탁에 나섰다."
 lepsius.533.f: "탐사대를 나누지 않은 것이 예상치 못한 이점으로 작용했다. 물자 수송대의 느린 속도 덕분에 현지 쿠르드족의 두목들이 우리를 예상보다 빨리 찾아냈던 것이다. 탐사대장과 육군 무관은 머지않아 이 지역의 실질적인 통치자로 여겨지는 족장들 앞에 서게 되었다. 족장들은 여전히 우리를 믿지 못하며 불편함을 드러냈다. 지난번 고고학 탐사대의 불쾌한 기억이 여전히 남아 있는 듯했다. 게다가 이들은 손님인 우리에게 선물을 기대하고 있었다. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName]도 이러한 상황에 대비는 했지만, 우리가 가져온 물품들은 여러 두목들을 설득하기에 충분하지 않은 모양이었다."
 lepsius.533.g: "고급 원단을 선물하겠소."
 lepsius.533.h: "저들의 존경과 환대에 감사를 표하시오."
 lepsius.533.i: "복종의 표시를 보이시오."
 lepsius.534.t: "모욕"
 lepsius.534.d: "쿠르드족 두목들을 회유하려던 시도는 완전히 실패하고 말았다. 오히려 저들이 우리에게 등을 돌렸다. 상황이 악화되면 우리 탐사대 전체가 위험에 처하게 된다!"
 lepsius.534.g: "경비대!"
 lepsius.534.h: "방어하라!"
 lepsius.534.i: "도망쳐!"
 lepsius.535.t: "쿠르드족에게 납치된 탐사대원들"
 lepsius.535.d: "여럿으로 갈라진 탐사대는 수색에 실패한 뒤 돌아온 뒤 후방에 남았던 일부 탐사대원들이 쿠르드족의 공격으로 희생되었다는 끔찍한 사실을 마주해야 했다."
 lepsius.535.f: "탐사대를 나눈다는 전략은 치명적인 실수였던 것으로 뒤늦게 드러났다. 쿠르드족은 먹잇감만 노리고 있다가 육군 무관이 이끄는 무장 부대가 후송대에서 이탈한 틈을 타 공격했던 것이다. 이들이 가져간 물품 대다수는 약탈자들에게는 별 가치가 없었으므로 난데없이 10여 명의 조력자를 인질로 잡고 몸값을 요구하기 시작했다. 그러나 탐사대는 그러한 협박을 받아들이지 않기로 결정했다. 이것이 하나의 선례가 되어 앞으로 유사한 사건이 발생할 수 있었기 때문이다. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] 대장은 쿠르드족 두목과의 협상을 주장한 반면, [SCOPE.sCharacter('lepsius_military_attache').GetFullName](은)는 쿠르드족 진영을 공격하여 약탈자들을 혼내주겠다고 목소리를 높였다."
 lepsius.535.g: "협상을 시도해 보자."
 lepsius.535.h: "저들을 공격한다!"
 lepsius.536.t: "협상 결렬!"
 lepsius.538.t: "슬픔의 밤"
 lepsius.538.d: "라마수 석상의 탐색이 실패로 돌아갔다."
 lepsius.538.f: "탐사대는 별다른 결실 없이 쿠르드족의 영역을 떠나게 되었다. 마치 발로 차인 개처럼, 밤중에 산길을 헤쳐나가 옛길을 다시 찾아 나선다. 인명과 물자 손실은 탐사대원 모두에게 낙심을 안겼다. 이번 여정이 과연 무슨 의미가 있는지에 관한 의문은 슬픔과 절망만을 남긴다."
 lepsius.538.g: "우리는 돌아오리라..."
 lepsius.539.t: "고귀한 죽음"
 lepsius.539.d: "우리 육군 무관으로 나선 [SCOPE.sCharacter('lepsius_military_attache').GetFullName](이)가 쿠르드족과의 전투에서 쓰러졌다!"
 lepsius.539.f: "치열한 전투였지만 훈련 부족 상태였던 우리 병사들은 노련하고 용감한 쿠르드족 전사들을 상대로 할 수 있는 게 적었다. 무관은 후퇴를 명하는 동시에 부하들과 함께 남아 우리의 후방을 엄호하였다. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName](은)는 마지막으로 뒤를 돌아보며 무관이 땅에 쓰러지는 모습을 보았다. 무관은 대원들이 안전한 곳으로 대피할 귀중한 시간을 벌어주었지만, 본인 스스로가 구원되기에는 너무나 늦었다."
 lepsius.539.g: "우리를 위해 목숨을 바쳤구나."
 lepsius.540.t: "라마수 석상"
 lepsius.540.d: "[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName](은)는 쿠르드족에게 우리의 입장을 납득시킬 수 있었다. 라마수를 되찾으러 가는 길이 활짝 열렸다."
 lepsius.540.d_victory: "우리는 현지 쿠르드족을 상대로 군사적 승리를 거두면서 전설 속 라마수 석상으로 향하는 길을 열고야 말았다!"
 lepsius.540.f: "쿠르드족에게 우리의 선의를 납득시키는 것은 쉽지 않았으나, 탐사대장의 뛰어난 능력 덕분에 불가능해 보였던 이번 임무가 성공으로 이어지게 되었다. 며칠 간의 수색 끝에 우리는 절벽 근처에서 보고된 라마수 석상을 발견하기에 이르렀다. 그 거대한 모습은 계곡 전체를 압도하였다! 우리 고고학자들은 거대한 조각상이 거의 손상되지 않은 것을 보고 기뻐하였다. 이 조각상은 우리 메소포타미아 소장품의 핵심 전시물이 되리라는 것은 벌써부터 분명한 사실이었다."
 lepsius.540.f_victory: "치열하고 격렬한 전투 끝에 우리의 영웅으로 떠오른 육군 무관 [SCOPE.sCharacter('lepsius_military_attache').GetFullName](이)가 우수한 실력(과 병사들의 작은 도움)을 바탕으로 적을 물리치는 데 성공하였다. 이번 교훈에 느낀 바가 있었던 쿠르드족은 더 이상 라마수 석상의 발굴을 방해하려 들지 않았다. 며칠 간의 수색 끝에 우리는 절벽 근처에서 보고된 라마수 석상을 발견하기에 이르렀다. 그 거대한 모습은 계곡 전체를 압도하였다! 우리 고고학자들은 거대한 조각상이 거의 손상되지 않은 것을 보고 기뻐하였다. 이 조각상은 우리 메소포타미아 소장품의 핵심 전시물이 되리라는 것은 벌써부터 분명한 사실이었다."
 lepsius.540.g: "정말 아름답구나!"
 lepsius.551.t: "고고학계의 큰 사고"
 lepsius.551.d: "발굴지에서 무서운 사고가 벌어졌다. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] 박사가 감쪽같이 사라진 것이다!"
 lepsius.551.g: "[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim]에게 무슨 일이?"
 lepsius.552.t: "미궁"
 lepsius.552.g: "황소 같은 신화 속 생물과 마주치지만 않았으면 좋겠군..."
 lepsius.553.t: "(또) 미궁"
 lepsius.553.g: "이거 어디서 봤던 풍경인데!"
 lepsius.554.t: "돌고래의 전당"
 lepsius.554.g: "제우스 - 왼쪽으로 간다."
 lepsius.554.h: "데메테르와 페르세포네 - 오른쪽으로 간다."
 lepsius.554.i: "아르테미스 - 위쪽 계단으로 올라간다."
 lepsius.554.j: "포세이돈 - 아래쪽 계단으로 내려간다."
 lepsius.555.t: "태양의 전당"
 lepsius.555.d: "복도의 끝부분이 세 갈래로 갈라졌다. 벽에는 프레스코화의 흔적이 남아 있다."
 lepsius.555.f: "프레스코 벽화에서 푸른색이 [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullNameNoFormatting] 쪽으로 빛나고 있었다. 하늘은 벽 전체를 뒤덮고 있고, 새벽의 여신 에오스가 동쪽에 서서 벽화를 압도하고 있다. 에오스의 맞은편, 서쪽에는 그 남편 아스트라이오스가 있는데 밤에는 실루엣으로만 알아볼 수 있다고 한다. 그 사이에는 정오의 태양이 빛나고 있다."
 lepsius.555.g: "에오스 - 왼쪽 통로로 향한다."
 lepsius.555.h: "아스트라이오스 - 오른쪽 통로로 향한다."
 lepsius.555.i: "헬리오스 - 가운데 통로로 향한다."
 lepsius.556.t: "여인들의 전당"
 lepsius.556.d: "길 잃은 자가 방 끝에 다다랐다. 그 방에는 네 개의 문이 열려 있다. 앞에는 네 명의 여인을 형상화한 조그만 조각상이 세워져 있다."
 lepsius.556.f: "네 개의 조각상은 서로 다른 연령과 남편을 둔 여인들을 묘사하고 있다. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullNameNoFormatting](은)는 이들이 여신인가 아니면 필면자인가를 판단할 수 없다. 그 형상은 원시적이고 본질만 알아볼 수 있는 요소만 담겨져 있다. 색은 오래 전에 바래졌다. 이들을 구분할 수 있는 것은 손에 들린 물건 뿐. 첫번째 조각상은 실뭉치를 들고 실을 뽑고 있다. 두번째 조각상은 거울을 들고 자신을 바라본다. 세번째 조각상은 뱀을 들고 있다. 마지막 조각상은 아치 문으로 인도하고 있다."
 lepsius.556.g: "실뭉치 - 1번 문."
 lepsius.556.h: "거울 - 2번 문."
 lepsius.556.i: "뱀 - 3번 문."
 lepsius.556.j: "아치 - 4번 문."
 lepsius.557.t: "섬의 전당"
 lepsius.557.g: "로도스."
 lepsius.557.h: "델로스."
 lepsius.557.i: "에우보이아."
 lepsius.557.j: "낙소스."
 lepsius.558.t: "미노타우루스의 분노"
 lepsius.558.g: "저 아래에서 무슨 일이 벌어진 거지?"
 lepsius.559.t: "[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullNameNoFormatting]의 비참한 죽음"
 lepsius.559.d: "[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastNameNoFormatting] 박사가 영문을 알 수 없는 상황에 놓여 방 안에서 사망한 채로 발견되었다."
 lepsius.559.g: "정말 자살이었을까?"
 lepsius.560.t: "미궁에서 탈출하다!"
 lepsius.560.d: "마침내 미궁에서 탈출한 [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullNameNoFormatting](이)가 동료들에게 엄청난 발견을 했다고 전해주었다. 자신이 미치지 않았다는 것을 증명하기 위하여 미궁 깊숙한 곳에서 발견해 직접 가지고 나온 놀라운 증거품을 보여주었다."
 lepsius.560.g: "그렇다면 이것은... 전설 속 다이달로스의 미궁인가?"
 lepsius.561.t: "불가사의한 피라미드"
 lepsius.561.d: "우리 고고학 탐사대가 유카탄 고원에 반쯤 묻혀 지금까지 기록되지 않았던 피라미드를 발견했다. 전에도 이 지역에 얽힌 전설을 접한 적이 있었던 [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName](은)는 이번 탐사를 계기로 그 안에 들어가 보기로 결심했다..."
 lepsius.561.g: "안 좋은 예감이 드는군."
 lepsius.561.h: "흥미로운걸. 자네가 먼저 가보게."
 lepsius.562.t: "상형문자의 수수께끼"
 lepsius.562.d: "길게 이어진 돌출형 통로를 지나보니 잘 다듬어 세운 돌판에 수수께끼가 새겨져 있었다. 마야 신의 얼굴이 새겨진 네 개의 오목한 단추가 튀어나와 있는데, 석재의 질감이 마치 기계 장치처럼 보인다. 그 아래에는 두 행으로 된 시가 새겨져 있었다. \"나는 동쪽에서 불타는 영광으로 떠오르고, 정점에 이르면 옥처럼 빛나고, 황혼에는 땅 속의 길로 내려간다. 나는 날을 세고 왕을 꿇어눕힌다.\" 이제 남은 질문은 어떤 단추를 누를 것인가다."
 lepsius.562.g: "크인치 아자우 (태양신)."
 lepsius.562.h: "차아크 (비와 번개)."
 lepsius.562.i: "이트삼나아지 (창조주와 하늘)."
 lepsius.562.j: "쿠쿨칸 (깃털뱀신)."
 lepsius.563.t: "우상"
 lepsius.563.d_right: "우리 고고학자가 탐험의 목표를 이룩하였다. 기계 장치가 작동을 멈추고 성소가 열린 것이다."
 lepsius.563.d_wrong: "우리 고고학자가 안쪽 방에 도달했다. 그러나 이렇게 쉽게 들여보내 준다는 것은 상식에 어긋난다. 분명 그 장치는 아직 완전히 멈춘 것이 아닐 것이다."
 lepsius.563.g: "천천히... 조심스럽게... 꺼내보는 거야..."
 lepsius.563.h: "이런 상황은 나도 잘 알지, 절대 뜻대로 안 되니까. 그 저주받을 유물을 갖고 도망칩시다!"
 lepsius.564.t: "함정이다!"
 lepsius.564.g: "도망쳐!"
 lepsius.564.h: "역시 그랬군, 젠장!"
 lepsius.565.t_right: "피라미드를 떠나며"
 lepsius.565.t_wrong: "고고학계의 경쟁자"
 lepsius.565.d_right: "예상과는 달리 [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName](이)가 피라미드 내부의 계략에서 벗어나 우상을 손에 넣었다!"
 lepsius.565.g: "찰리, 시동 걸게!"
 lepsius.565.h: "저 자식, 정말 싫다니까."
 lepsius.566.t: "고고학계의 제안"
 lepsius.566.d: "민간 고고학자가 경쟁국으로부터 빼앗은 상당히 귀중한 유물을 구입할 것을 제안해 왔다."
 lepsius.566.f: "어느 민간 탐사대가 유카탄 반도의 열대우림 깊숙한 곳에서 마야 문명의 피라미드를 발견했다고 밝혀왔다. (우리 동포인) 탐사대장은 신성한 우상을 입수했다고 주장하였는데, 그 우상은 공교롭게도 페도라 모자를 쓴 [PREV.GetCountry.GetAdjectiveNoFlag] 고고학자의 손에서 탈취한 것이라고 한다. 전해지는 바에 따르면 그 고고학자는 직후 호비토스 부족민과의 격렬한 충돌에서 목숨을 잃고 말았다는 것이다. 상황이 어떻든 간에 해당 유물은 우리 박물관의 선콜럼버스 시대 소장품에 대단히 귀중한 가치를 더할 것이다. 상대가 요구하는 제값을 치뤄준다면 말이다."
 lepsius.566.g: "이 유물이라면 우리 소장품에 제격이겠군!"
 lepsius.566.h: "가차 없는 무덤 도굴꾼과는 거래하지 않겠소."
 lepsius.581.t: "잃어버린 세계로 돌아가기"
 lepsius.581.g: "그 사람의 명예를 회복해 주어야 한다."
 lepsius.581.i: "하찮은 개인의 상처 입은 자존심보다 국가의 이익이 우선이야."
 lepsius.582.t: "무시당하던 탐험가가 당당히 돌아오다"
 lepsius.582.d: "[SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName](이)가 유카탄 반도에서 돌아와 자신의 기묘한 주장을 뒷받침할 증거를 제시하여 온 학계를 놀라게 만들었다!"
 lepsius.582.g: "그 주장이... 사실이었다고?"
 lepsius.583.t: "무시당하던 탐험가가 유카탄에서 실종"
 lepsius.584.t: "잃어버린 세계로 들어가다"
 lepsius.584.d: "몇 주가 지난 뒤 탐사대는 그 누구도 알지 못했던 계곡에 도착하였다. 공상으로 여겨졌던 [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName]의 주장이 사실이었다!"
 lepsius.584.g: "믿을 수가 없군!"
 lepsius.585.t: "공룡을 사진에 담다"
 lepsius.585.d: "신기술의 도입에 힘입어 잃어버린 세계의 독특한 동물상과 식물상을 카메라에 담을 수 있게 되었다."
 lepsius.585.f: "마치 창문 틀 속으로 수백만 년 전의 모습을 들여다보는 느낌이다. 익룡이 하늘을 지배하고, 거대한 브론토사우루스가 땅을 뒤흔들고, 위험한 벨로시랩터가 방심한 먹이를 사냥한다. 이곳의 식물들도 유카탄의 다른 지역과는 완전히 다르다. 어느 동료 학자가 이 기회를 놓치지 않고 여러 장의 사진을 찍었으며, 본국으로 보내져 증거로 활용될 것이다. 본국의 과학자들은 이 사진들을 통해 지구의 초창기 역사를 더욱 정확하게 복원할 수 있을 것이다."
 lepsius.585.g: "자 여기 보시고, '으르렁'!"
 lepsius.586.t: "마야 문명의 흔적"
 lepsius.586.d: "계곡을 따라 탐색한 뒤 탐사대장이 위험한 계획을 세웠다."
 lepsius.586.g: "다시 없을 기회야!"
 lepsius.586.h: "우리에게 가장 필요한 증거물만 챙겨갑시다."
 lepsius.587.t: "끔찍한 참사로 끝난 탐사"
 lepsius.587.d: "탐사대가 벨로시랩터의 공격으로 최악의 상황에 직면하게 되었다."
 lepsius.588.t: "쿠쿨칸의 보석"
 lepsius.588.d: "모든 역경을 뒤로 하고 우리 탐사대장은 전설 속 쿠쿨칸의 보석을 손에 넣는 데 성공하고야 말았다!"
 lepsius.589.t: "잃어버린 세계에서 귀환한 영웅들"
 lepsius.589.f: "정말 대단한 하루였다! 위험천만하고 모험적인 여정을 거쳐 세상 끝까지 도달한 우리 탐사대는 그 누구도 상상조차 못할 것들을 발견하여, [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName](이)가 미친 사람이 아니라 명망 있는 과학자이자 진정한 영웅임을 대중에게 증명할 수 있었다! 언론과 여론은 완전히 바뀌었고 정부의 지원이 올바른 결정이었음을 인정하였다. 그러나 탐사대장은 그곳의 동식물을 보존하고 밀렵꾼의 위협을 막기 위해, 그 계곡이 어디에 있는지는 비밀로 간직하겠다고 약속했다."
 lepsius.701.t: "이방인들의 우리 문화유산 반출 시도"
 lepsius.701.d: "[SCOPE.sCountry('lepsius_smuggler_country').GetAdjectiveNoFlag] 고고학자들이 오늘 우리나라의 대표 유물을 불법 반출하려다 적발되었다. 우리는 어떻게 대응해야 하는가?"
 lepsius.701.f: "오늘 우리나라로부터 발굴 허가를 받은 [SCOPE.sCountry('lepsius_smuggler_country').GetName] 국민이 굉장히 귀중한 유물을 국외로 반출하려다 적발되었다. 현행법에 따르면 해외 고고학자는 발굴한 유물의 절반을 출토 국가에 전달해야 할 의무가 있다. 이들은 우리가 조사에 나서지 못한 틈을 타 고국으로 빼돌리려 했던 것으로 보인다."
 lepsius.701.g: "항의하시오!"
 lepsius.701.h: "이 횡설수설하는 노인네들을 어떻게 대해야 하는가?"
 lepsius.702.t: "외교 마찰"
 lepsius.702.d: "불행하게도 귀중한 유물을 고국으로 가져가려는 시도를 [SCOPE.sCountry('lepsius_protest_country').GetName] 당국에서 알아차리고 말았다. 우리는 어떻게 대응해야 하는가?"
 lepsius.702.f: "19세기 말부터 고고학 발굴 허가의 가장 일반적인 형태는 유물 배분이었다. 이말인즉슨 발굴자는 출토 유물의 절반을 발굴 국가에 전달해야 하는 방식이었다. 당국은 출토 유물을 검사하고 무엇보다도 귀중한 유물이 해외로 반출되지 않도록 철저히 감시하였다. 그러나 일부 국가에서 출도 유물의 반환을 거부하는 사례가 종종 발생하였고, 양측이 합의를 통해 문제를 해결하는 경우도 있었다."
 lepsius.702.g: "찾아낸 사람이 임자다."
 lepsius.702.h: "꼭 원만한 합의를 이루고 말 것이다."
 lepsius.702.i: "자선 활동의 뜻을 담아 유물을 기증하자."
 lepsius.703.t: "우리를 우습게 아는 이방인들"
 lepsius.703.d: "[SCOPE.sCountry('lepsius_smuggler_country').GetName] 놈들이 우리의 소유권 주장을 우습게 보았다. 저들은 우리가 유물 발견에 조금이라도 관여한 것을 꿈에서도 생각하지 않았는지 유물을 자기네 나라로 밀반출해 갔다."
 lepsius.703.f: "빅토리아 시대에는 유럽 열강을 중심으로 유물을 불법 반출한 사례가 수없이 많았다. 개중에는 오늘날까지도 원래 있던 국가에서 반환을 요구하는 유물들도 있다."
 lepsius.703.g: "이렇게 오만할 줄은 생각조차 못했소!"
 lepsius.704.t: "양보 승인"
 lepsius.704.d: "[SCOPE.sCountry('lepsius_smuggler_country').GetName] 측에서 우리의 소유권 주장이 정당하다고 인정하고 받아들였다. 저쪽에서 외교적으로도 재정적으로도 양보를 해 주려는 모양이다. 또한 귀중한 보물을 넘겨받는 대가로 다른 유물도 여럿 전달하겠다고 제안해 왔다."
 lepsius.704.f: "유럽 열강들은 도굴이나 유물 절도가 의심되는 경우 대부분 발굴국을 배려해 주었다. 이를테면 트로이 발굴 후 슐리만은 유물을 해외로 밀반출한 혐의로 오스만 제국 정부의 조사를 받아야 했다. 슐리만은 유물 일부를 넘겨주었을 뿐만 아니라 요구액의 다섯 배를 지불하게 되었다. 물론 이러한 절차가 국제적으로 최선의 해결 방식이었던 것은 아니었지만, 발굴국을 완전히 속여먹는 것보다는 나았으며, 상대 측도 우호적인 합의로 받아들이는 경우가 많았다."
 lepsius.704.g: "저들이 본인들의 잘못을 깨달았다니 다행이군."
 lepsius.706.t: "대표 유물 도착!"
 lepsius.706.d: "약간의 지연이 있었지만, 드디어 오늘 박물관에 귀한 유물이 도착했다. 박물관장은 벌써 유물을 놓을 아주 특별한 자리를 마련해 두었다!"
 lepsius.706.f: "대표 유물은 온 박물관과 전시관의 자랑이다. 그런 보물을 조국의 것으로 부를 수 있는 국가야말로 자랑스러울 것이다!"
 lepsius.711.t: "투탕카멘의 가면"
 lepsius.711.d: "투탕카멘의 잊혀진 무덤을 발견한 이래 우리 고고학자들은 아주 특별한 유물을 되찾는 데 성공했다. 그것은 다름아닌 파라오의 가면이었다!"
 lepsius.711.f: "투탕카멘의 가면은 고대 이집트 제18왕조의 파라오 투탕카멘의 황금 가면이다. 투탕카멘의 죽은 얼굴을 본떠 만든 이 가면은 전세계에서 가장 유명한 예술품 중 하나이자 고대 이집트에서 제일 가는 상징이라 볼 수 있다. 이집트 사후 세계의 신 오시리스의 모습을 한 이 가면은 높이 54cm, 무게 10kg이 넘으며 반귀석으로 장식되어 있다. 가면의 어깨죽지에는 옛 사자의 서에 나오는 주문이 상형문자로 새겨져 있다. 가면은 파라오의 전형적인 외모를 나타내며, 발굴 당시 무덤의 다른 곳, 특히 수호신상에서도 동일한 외모를 발견한 바 있다. 이집트학자 니콜라스 리브스는 이 가면이 \"투탕카멘 무덤에서 가장 대표적인 표상일 뿐만 아니라, 어쩌면 고대 이집트의 유물 가운데 가장 널리 알려진 것\"이라 평가하였다."
 lepsius.711.g: "우리 소장품의 가장 훌륭한 유물이 될 것이다."
 lepsius.711.h: "이 유물을 우리나라로 무사히 반입해야 한다..."
 lepsius.712.t: "네페르티티의 흉상"
 lepsius.712.d: "이집트에서 발굴을 진행하던 중 우리 고고학자들이 참으로 귀중한 유물을 발견했다. 그것은 다름아닌 네페르티티의 흉상이었다!"
 lepsius.712.f: "네페르티티의 흉상은 이집트 파라오 아크나텐의 대비였던 네페르티티의 흉상이다. 석회암에 회반죽을 덮어 채색한 이 조각상은 고대 이집트의 예술품 가운데 가장 복제본이 많은 유물이기도 하다. 또한 이 유물 하나로 네페르티티는 고대 세계의 여성 중에서도 가장 유명한 인물이자 여성미의 상징이 되었다. 네페르티티 본인에 대해서는 알려진 바가 많지 않다. 이집트 왕족 출신이라는 설, 외국 공주라는 설, 훗날 투탕카멘의 뒤를 이어 파라오로 즉위한 고위 관리 '아이'의 딸이었다는 설까지 존재한다. 기원전 1352년부터 1336년까지 아크나텐과 함께 이집트를 공동 통치했을 가능성도 제기된다. 흉상에는 명문이 없으나 네페르티티라는 신원만큼은 확실히 확인되는데, 이는 네페르티티를 묘사한 다른 사례에서도 볼 수 있는 특유의 왕관 때문이다."
 lepsius.713.t: "나르메르의 팔레트"
 lepsius.713.d: "우리 고고학자들이 발굴 과정에서 엄청난 유물을 출토했다. 그것은 다름아닌 나르메르의 팔레트였다!"
 lepsius.713.f: "나르메르 팔레트는 대(大) 히에라콘폴리스 팔레트라는 이름으로도 알려져 있으며, 제작연대는 기원전 31세기경으로 추정되는 이집트의 대표적인 고고학 유물로서, 명목상으로는 화장에 사용되는 팔레트로 분류된다. 팔레트에는 지금까지 발견된 상형문자 가운데 가장 오래된 명문이 새겨져 있다. 학계 일각에서는 이 팔레트가 나르메르 치세기에 상이집트와 하이집트가 통일되는 모습을 묘사했다고 본다. 네켄의 주요 발굴지에서 함께 출토된 전갈 철퇴와 나르메르 철퇴와 함께, 이집트 국왕의 모습을 묘사한 가장 오래된 유물로 꼽힌다. 나르메르 팔레트는 고대 이집트 미술의 고전 양식을 많이 보여주고 있는데 팔레트가 제작될 당시 그러한 양식이 이미 자리잡았음을 시사한다. 이집트학자 밥 브라이어는 나르메르 팔레트가 '세계 최초의 역사서'라고 평가하기도 했다."
 lepsius.722.t: "사르곤의 가면"
 lepsius.722.d: "니네베에서 공중정원을 수색하기 위해 발굴을 진행하던 도중, 우리 고고학자들이 엄청난 유물을 발견하였다. 그것은 다름아닌 사르곤의 가면이었다!"
 lepsius.722.f: "고대 수메르 왕들이 쓰던 가발형 투구를 쓴 국왕의 청동 두상으로, 사르곤 본인을 묘사한 것으로 추정된다. 무늬가 새겨진 눈이 빠져 있고 곳곳에 손상된 부분이 있긴 하지만 고대 미술에서 가장 위대한 걸작으로 꼽히고 있다. 니네베에서 발견된 실물 크기의 청동 두상으로, 정교하게 말린 수염과 복잡한 헤어스타일에서 왕족의 위엄과 권력, 이상적인 남성의 표상을 엿볼 수 있다. 두상 자체에 담긴 미적 가치 뿐만 아니라 밀랍 주조법을 사용한 최초의 중공주조형 조각상이라는 점에서도 특별하다. 얼굴 왼쪽과 눈 부위에 의도적인 손상이 가해져 있는데, 이는 후대에 정치적 반항의 표시로 고의로 훼손하였음을 시사하고 있다."
 lepsius.723.t: "메스칼람두그의 투구"
 lepsius.723.d: "바빌로니아에서 발굴을 진행 중이던 우리 고고학자들이 특별한 유물을 발견해냈다. 그것은 다름아닌 메스칼람두그의 투구였다!"
 lepsius.723.f: "메스칼람두그의 투구는 우르의 왕릉에서 발견된 유물 가운데 가장 유명한 것으로 꼽힌다. 메스칼람두그는 기원전 26세기 우르 제1왕조 시대의 초창기 수메르 통치자였다. 투구는 금박으로 장식되어 있어 전시에 보호구로 쓰이기엔 부적절했을 것으로 보이며, 의례나 종교 의식에 사용되었을 가능성이 높다. 양쪽 측면의 귀 부위를 제외하면 전체적으로 가발과 더 유사한 형태를 지니고 있으며, 물결 모양의 머리카락을 섬세한 조각으로 표현해내고 있다. 한편 측면에는 곱슬머리가 표현되어 있는데, 머리 둘레를 따라 땋은 머리가 물결 모양과 구분되어 있다. 땋은 머리는 끝부분에서 단추처럼 묶여 있다. 투구의 가장자리에는 작은 구멍이 연달아 나 있는데, 안감을 덧대기 위한 용도로 추정된다."
 lepsius.731.t: "아가멤논의 가면"
 lepsius.731.d: "미케네의 보물을 입수한 이래 학계의 시선을 특히 사로잡은 유물 하나가 있었다. 그것은 다름아닌 황금 데스마스크, 일명 아가멤논의 가면이었다!"
 lepsius.731.f: "'아가멤논의 가면'은 미케네의 고대 그리스 유적지에서 발견된 장례용 황금 가면에 붙은 명칭이다. 독일의 고고학자 하인리히 슐리만이 1876년에 발견하였으며, 당시 슐리만이 호메로스 서사시 속 트로이 전쟁에서 아카아이 동맹의 지도자로 등장하는 미케네 국왕 아가멤논의 무덤을 발견하였다고 생각하여 이러한 이름이 붙었다. 그러나 오늘날 고고학 연구 조사에 따르면 가면의 제작 연대는 기원전 1600년경으로 거슬러 올라가, 트로이 전쟁이 벌어진 것으로 전해지는 시기보다 약 300년~400년 앞선 것으로 밝혀졌다. 가면은 노란색과 붉은색이 섞인 단단한 금박으로 제작되었으며, 높이는 약 26cm, 너비는 26.5cm다. 턱수염과 콧수염, 눈썹을 지닌 남성의 얼굴이 금박에 양각으로 새겨졌다. 양쪽 귓불 옆에는 구멍이 있는데 고정용으로 쓰인 것으로 추정된다. 고고학자 캐시 기어는 이 가면을 두고 '선사시대의 모나리자'라고 칭송한 바 있다."
 lepsius.732.t: "파이스토스 원반"
 lepsius.732.d: "크레타에서 발굴 조사를 진행하던 중 특이하고 신비로운 유물이 발견되었다. 그것은 다름아닌 파이스토스 원반이었다!"
 lepsius.732.f: "파이스토스 원반은 크레타섬에 위치한 미노아 문명의 파이스토스 궁전에서 발견된 점토를 구워 만든 원반이다. 그 제작연대는 미노아 청동기 중기에서 후기(기원전 2000년경)으로 추정된다. 파이스토스 원반은 직경 약 15cm의 크기로 원반의 양면에는 나선형 순으로 상형문자가 새겨져 있다. 그 용도와 원래 제작되었던 장소는 여전히 논란의 여지가 존재한다. 1908년 이탈리아 고고학자 루이지 페르니에르가 파이스토스 궁전 유적지에서 발견하였으며, 총 241자가 새겨진 가운데 45개의 각기 다른 상형문자가 쓰인 것으로 조사되었다. 각 글자는 부드러운 점토 원반에 상형문자 형태의 '인장'을 찍어 원반의 중심에 다다를 때까지 시계방향으로 나선형으로 돌아가며 새긴 것으로 보인다. 파이스토스 원반은 아마추어와 전문 고고학자들의 상상력을 사로잡았으며, 원반에 새겨진 상형문자의 의미를 해독하려는 시도가 계속되고 있다."
 lepsius.733.t: "뱀 여신상"
 lepsius.733.d: "크레타에서 발굴 조사를 진행하던 중 상당히 아름답고 역사적으로도 중요한 미노아 문명의 유물을 입수하였다. 그것은 다름아닌 뱀 여신상이다!"
 lepsius.733.f: "1903년 그리스 크레타섬에 위치한 미노아 문명의 크노소스 궁전에서 미노아 양식으로 된 뱀 여신상 두 점이 발견되었다. 이 두 여신상은 상태가 상당히 불완전하지만 기원전 1600년경 미노아 문명의 신궁전 시대 말기에 제작된 것으로 추정된다. 에반스는 두 조각상 가운데 큰 것을 '뱀 여신상', 작은 것을 '뱀 여사제상'으로 명명하였다. 이후 학계에서는 해당 명칭대로가 맞는지, 아니면 두 점 모두 여사제나 같은 신을 묘사했거나 서로 다른 신을 묘사한 것인지 논란이 이어져 왔다. 가슴을 완전히 드러낸 화려한 의상과 뱀을 다루는 모습은 대중의 상당한 주목을 받았으며 위조품이 여럿 등장하기도 하였다. 특히 작은 조각상은 미노아 문명의 미술과 종교에서 널리 알려진 상징으로 남아 있으며 현재는 대체로 '뱀 여신상'이라 불리운다."
 lepsius.771.t: "파칼의 부장품"
 lepsius.771.d: "파칼 왕의 무덤을 탐색하던 과정에서 특별한 유물을 손에 넣을 수 있었다. 그것은 다름아닌 파칼의 부장품이었다!"
 lepsius.771.f: "금속 도구가 없던 마야 문명에서 상당히 두텁고 밀도가 높은 재료인 옥으로 허리띠 장식, 귀걸이, 펜던트, 가면 등의 다양한 물건을 제작했다는 것은 놀라운 사실이다. 허리띠 장식은 그 모양 때문에 납작한 도끼 모양의 장식으로도 불리는데, 간혹 석비에서 볼 수 있는 왕의 초상이 새겨져 있기도 하며, 고전기 초기의 '레이던 장식판'이 대표적인 사례다. 가면 중에서 가장 유명한 사례로는 팔렠네의 국왕 파칼의 데스마스크가 꼽힌다. 파칼의 가면은 불규칙한 형태의 대리석판으로 덮여 있고, 눈은 자개와 흑요석으로 만들어졌다. 파칼 대왕은 콜럼버스 도래 이전 메소아메리카 연대기에서 고전기 후기에 마야 문명의 도시국가 팔렌케의 국왕으로, 615년 7월에 즉위하여 죽을 때까지 68년의 세월 동안 팔렌케를 통치하였다."
 lepsius.772.t: "마야의 벨트 장식판"
 lepsius.772.d: "유카탄에서 발굴을 진행하던 중 상당히 아름답고 역사적으로도 중요한 선콜럼버스 유물을 입수하였다. 그것은 다름아닌 마야의 벨트 장식판이다!"
 lepsius.772.f: "레이던 장식판은 옅은 녹색의 옥을 조각해 만든 마야 문명의 유물로 벨트 장식으로 사용되었다. 1864년 과테말라 푸에르토바리오스 근처에서 발견된 이 유물은 마야 문명에서 가장 오래된 유물로 꼽힌다. 장식판의 양면에는 그림이 섬세하게 조각되어 있다. 앞면에는 포로를 짓밟는 마야 군주의 옆모습이 새겨져 있는데, 티칼의 시야지 찬 카윌 1세로 추정된다. 뒷면에는 장기력으로 된 날짜(8.14.3.1.12)가 새겨져 있는데 서력으로 환산하면 320년 9월에 해당되며, 해당 군주가 즉위한 시기를 나타낸다. 고전기 초기의 마야 역사에 관한 대표적인 사료로서, 초창기 왕실 도상과 금석문에 관하여 중대한 정보를 제공하고 있다. 현재 네덜란드 레이던에 위치한 국립 민속박물관에 소장되어 있으며, 그 도시의 이름을 따서 명명되었다."
 lepsius.721.t: "길가메시 서사시"
 lepsius.721.d: "우리 아시리아학자들이 그간 발견한 쐐기문자 점토판을 바탕으로 길가메시의 기본 줄거리를 재구성하는 데 성공하였다."
 lepsius.721.f: "길가메시는 일어나 꿈을 헤아리며\n어머니에게 말을 걸었다\n\"어머니, 간밤에\n저는 욕정에 사로잡혀\n징조들 사이를 헤메였나이다\n그리고 하늘에 별이 나타났는데\n그 모습이 하늘의 (...)처럼 떨어졌나이다\n그 별을 안았지만 너무나도 무거웠나이다\n그 별은 그물을 지녔으나 그것을 들 수 없었나이다\n온 땅을 불러모아 그 별에게로 오게 하매\n영웅들이 그 별의 발에 입맞추도록 하였나이다\n그 별은 내 앞에 섰고\n영웅들은 내 맞은편에 섰나이다\n그 별을 들어올려 당신께로 데려갔나이다\""
 lepsius.721.g: "인류 역사상 가장 오래된 서사시로군..."
 lepsius.741.t: "프리아모스의 보물"
 lepsius.741.d: "트로이의 발견이라는 위업을 달성한 하인리히 슐리만이 프리아모스의 보물을 기증하기 위해 적당할 박물관을 물색하고 있다고 한다."
 lepsius.741.f: "슐리만은 발굴 작업으로 학계를 놀라게 하고 유럽 전역에서 명성을 얻었지만, 본인의 연구 방식을 중심으로 학계의 반대에 부딪히기도 하였다. 또한 여러모로 문제점이 남아 있었다. 예를 들어 역사학자와 고고학자들은 소위 프리아모스의 보물이 정말로 호메로스 시대의 트로이와 일치하는 지층에서 나왔을 가능성에 회의감을 보였다. 더욱이 슐리만이 출토품을 박물관에 기증하기로 결정하였을 때 기대했던 만큼의 반응은 없었다. 기존 후원자들은 냉담한 반응을 보였고, 에르미타주 박물관이나 루브르 박물관과 같은 유명 박물관들도 거절하였다. 결국 슐리만은 프리아모스의 보물을 런던에서 임시로 전시하다가 1881년 '독일 국민이 영구적으로 소유하고 안전하게 보전할 수 있도록 제국의 수도에 기증한다'는 결정을 내렸다."
 lepsius.741.g: "그런 보물이라면 완벽한 소장처를 알고 있지...!"
 lepsius.743.t: "슐리만, 프리아모스의 보물 기증"
 lepsius.743.d: "[SCOPE.sCharacter('lepsius_new_archaeologist_scope').GetFullName](은)는 많은 고심 끝에 프리아모스의 보물을 우리 박물관에 맡기기로 결정하였다!"
 lepsius.743.g: "보물 전용 전시관을 하나 세워서 슐리만의 이름을 명명합시다!"
 lepsius.743.h: "[SCOPE.sCharacter('lepsius_new_archaeologist_scope').GetLastName]야말로 진정한 보물일세!"
 lepsius.744.t: "슐리만, 프리아모스의 보물을 박물관에 기증"
 lepsius.744.d: "오늘 하인리히 슐리만이 프리아모스의 보물을 어느 박물관에 기증했다는 안타까운 소식이 전해졌다. 유감스럽게도 그 보물은 우리 것이 아니게 되었다."
 lepsius.744.g: "어떻게 우릴 배신할 수가?"
 lepsius.801.t: "발굴지"
 lepsius.801.d: "우리 고고학자를 파견할 발굴지는 어디로 하는 것이 좋을까?"
 lepsius.801.f: "커피케이크 씨는 참으로 진짜 같던 보물지도가 사실은 검볼 기계에서 나온 것임을 꺠닫고, 이전에는 볼 수 없었던 곳으로 고고학 여행 계획을 바꿔야만 했답니다."
 lepsius.801.g: "상이집트."
 lepsius.801.h: "하이집트."
 lepsius.801.i: "바빌로니아."
 lepsius.801.j: "아시리아."
 lepsius.801.k: "아르골리스."
 lepsius.801.l: "유카탄."
 lepsius.801.m: "그만두겠다."
 lepsius.802.t: "고고학자"
 lepsius.802.d: "새로운 발굴지를 마련하려면 어떤 고고학자를 파견해야 할까?"
 lepsius.802.f: "대다수 국가에서는 고고학자를 오직 한 명만 두게 되며, 이 고고학자가 수석 학자의 지위를 겸하는 경우가 많습니다. 그러나 어떤 이유로든 해당 국가에 경험이 더욱 풍부한 고고학자가 존재할 경우, 두번째 고고학자를 선임할 수 있는 선택권이 주어집니다."
 lepsius.802.g: "[SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName]"
 lepsius.802.h: "[SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName]"
 lepsius.803.t: "출발"
 lepsius.803.g: "행운을 비네!"
 lepsius.811.t_vok: "귀족의 무덤"
 lepsius.811.t_pyr: "바스테트 신전"
 lepsius.811.t_bab: "수메르 무덤"
 lepsius.811.t_ass: "아시리아 신전"
 lepsius.811.t_arg: "미케네 성전"
 lepsius.811.t_yuc: "수장고"
 lepsius.811.d: "우리 고고학자가 적당한 발굴지를 마련하였다."
 lepsius.811.f_pyr: "[SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] 대장이 하이집트 나일 삼각주의 습지대에서 고대 이집트의 신전 유적을 발견하였다. 처음에는 그렇게 보였다. 그러나 안타깝게도 그 유적은 그보다 훨씬 작은 규모였다. 신전으로 추정되던 곳은 고양이 여신 바스테트에게 바쳐진 신전이었다. 그렇지만 연구팀은 발굴 작업에 나섰다. 어찌 되었든 시작은 해야 하지 않겠는가."
 lepsius.811.f_bab: "수메르 문명은 세계에서 가장 오래된 문명으로 보인다. 바빌로니아에 머무르던 [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] 대장은 바퀴와 문자를 발명한 것으로 전해지는 고대인의 무덤을 우연히 발견하였다. 그러나 안타깝게도 이 무덤은 머지않아 대다수 유물이 도난당하거나 파괴된 것으로 밝혀졌다. 과학자들은 발굴 작업에 나섰다."
 lepsius.811.f_arg: ""
 lepsius.811.f_yuc: "안타깝게도 유카탄 반도에 머무르던 우리 발굴단은 마야 문명의 유적을 탐색하는 과정에서 큰 성과를 거두지 못했다. 어느 계곡에서 고고학자들은 옛날에 깨진 토기를 보관하던 오래된 수장고를 발견하였다. [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] 대장은 전보를 통해 앞으로 더 많은 발견을 이룰 것으로 기대한다고 밝혔다."
 lepsius.811.g: "특별할 건 없지만 그래도 우리 구역이니..."
 lepsius.812.t_vok: "왕자의 무덤"
 lepsius.812.t_pyr: "태양신 라의 신전"
 lepsius.812.t_bab: "달의 지구라트"
 lepsius.812.t_ass: "아시리아 요새"
 lepsius.812.t_arg: "석실묘"
 lepsius.812.t_yuc: "마야 천문대"
 lepsius.812.d: "우리 고고학자가 좋은 발굴지를 마련했다."
 lepsius.812.f_vok: "이집트에서 좋은 소식이 전해졌다! 여러 어려움 끝에 [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] 대장이 이전에는 존재를 몰랐던 무덤을 발견한 것이다. 초반 정보에 따르면 이 무덤은 고대 이집트 왕자의 마지막 안식처라고 한다. 과거 지역 주민들이 일부 유물을 훔쳐 팔아버리기는 했지만, 향후 고고학 발굴을 위한 좋은 시작점이 될 것으로 보인다."
 lepsius.812.f_pyr: "푸르른 이집트의 하늘 아래, 지평선 너머 오벨리스크 꼭대기에서 마지막 남은 전기 섬광이 번쩍이며 태양신 라의 신전 입구를 알렸다! [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] 대장은 즉시 현장 확보에 들어가 발굴을 개시하였다."
 lepsius.812.f_ass: "오늘까지도 성경은 유대인과 기독교인들 사이에서 아시리아인을 다소 부정적으로 받아들여지게 만들었다. 악명 높은 전사 민족으로서 이스라엘 백성을 끊임없이 괴롭히고 북왕국을 끝내 멸망시킨 원흉으로, 아시리아는 역사 속에서 군사 강국으로 기록되어 있다. 이러한 부정적인 왜곡이 전부 사실인 것은 아니나, 아시리아 요새의 발견으로 고대 중동의 지배자들이 뛰어난 군사 문화를 보유하고 있었음을 확인할 수 있었다."
 lepsius.812.f_arg: "[SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] 대장이 최근에 미케네 문명의 석실묘를 발견하였다. 이러한 구조를 지닌 장례용 건축물은 후기 청동기 시대에 에게 문명의 영향을 받은 지역에서 널리 확인된다. 석실묘는 바위를 깎아 만들었으며 안치실과 스토미온, 드로모스의 세가지 구역으로 구성되어 있고, 벽감과 측면실을 추가로 두어 1차나 2차에 걸쳐 매장을 실시하는 경우도 많았다. 우리 박물관장은 이날을 기리기 위해 샴페인 한 병을 차갑게 식혀 두고 있다."
 lepsius.812.f_yuc: "마야 문명은 천문학에 큰 관심을 두고 있었다. 천체 현상에 관해서는 여러모로 고대 그리스인보다 뛰어나고 독창적인 지식을 갖고 있었던 것으로 보인다. [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] 대장은 정글숲에서 뱀 모양의 나선형 계단을 맨 위에 올려둔 건물을 발견하였다. 우리 연구원들은 이번 발견이 어떤 지식과 유물을 선사할 지 기대감에 부풀어 올랐다."
 lepsius.812.g: "발굴하기에 좋은 구역이로군."
 lepsius.813.t_vok: "여왕의 무덤"
 lepsius.813.t_pyr: "미공인 피라미드"
 lepsius.813.t_bab: "바빌로니아 성문과 성벽"
 lepsius.813.t_ass: "아시리아 궁전"
 lepsius.813.t_arg: "미케네 성채"
 lepsius.813.t_yuc: "마야의 피라미드"
 lepsius.813.d: "우리 고고학자가 완벽한 발굴지를 마련했다."
 lepsius.813.f_pyr: "오늘 [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] 대장으로부터 전보가 이제 막 전해졌을 즈음, 우리 연구원들은 처음에는 믿기 어려워했다. 우리 고고학자들이 이집트 사막에서 과거에 알려지지 않았던 피라미드를 다시 발견했다는 소식이었다. 현지 주민들도 모래 속에 피라미드가 완전히 파묻혀 있다고 이야기한 적이 있었지만, 그 입구는 전혀 발견하지 못했다. 이제 우리나라는 이집트 고왕국 시대의 수많은 유물을 우리 것으로 자랑할 수 있게 되었다!"
 lepsius.813.f_arg: "반인반신이나 외눈박이들이 고대의 도시를 지었다는 것은 과연 사실인가? 우리 탐사대는 그리스 언덕 위로 솟은 웅장한 미케네 성채를 바라보며, 발견 일주일 만에 연이은 성과를 보고하고 있다. 위엄 가득한 건축물은 물론, 점토와 황금으로 만들어진 유물들은 앞으로 더 많은 발견을 예고하고 있었다. 심지어 메넬라우스의 반지도 발견에 성공했다는 것이 [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] 대장의 설명이다."
 lepsius.813.f_yuc: "몇 시간 동안 퍼붓던 비가 그치고 정글의 나무 위로 얇은 안개만 남아 감싸고 있을 즈음, 탐사대는 장엄한 풍경을 목격하였다. 나무 꼭대기 위로 덤불과 덩굴로 뒤덮인 수많은 계단이 하늘 높이 솟아 있고, 새와 맥이 서식하는 밀림 한가운데 거대한 계단식 피라미드가 드넓게 펼쳐져 있던 것이다. [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] 대장은 곧바로 처음 발굴한 일부 유물을 확보하여 특급 배송으로 박물관에 전달하였다."
 lepsius.813.g: "정말 훌륭한 곳이군!"
 lepsius.190.t: "고고학 발굴단 호출"
 lepsius.190.d: "어느 발굴지에서 발굴단을 호출해야 할까?"
 lepsius.190.f: "누군가 헨리 J.를 모함한 모양이다. 왜냐하면 그는 아무 잘못도 없는데 어느 날 아침 발굴 현장에서 소환되었기 때문이다."
 lepsius.190.g: "상이집트"
 lepsius.190.h: "하이집트"
 lepsius.190.i: "바빌로니아"
 lepsius.190.j: "아시리아"
 lepsius.190.k: "아르골리스"
 lepsius.190.l: "크레타"
 lepsius.190.m: "유카탄"
 lepsius.190.n: "페루"
 lepsius.190.o: "계속하시오."
 lepsius.901.t: "투탕카멘의 무덤"
 lepsius.901.d: "오늘은 우리나라에서 위대한 발견을 이룩하여 국제 학계에 파장을 일으킨 날로 기록되었다. [ROOT.GetCountry.GetAdjectiveNoFlag] 고고학자들이 오늘 투탕카멘의 무덤을 발견한 것이다!"
 lepsius.901.f: "출입구 하단부를 틀어막고 있던 통로의 잔해를 천천히, 우리가 지켜본 바로는 말할 것도 없이 천천히 하나씩 제거하자, 그렇게 우리 앞에 말끔한 출입구가 온전히 드러나게 되었다. 결정적인 순간이 다가온 것이다. 나는 떨리는 손으로 문 왼쪽 위 모서리에 아주 작은 구멍을 냈다. 쇠막대가 닿을 수 있는 곳까지, 어둠과 빈 공간이 눈앞에 드러났는데 그 너머에는 아무것도 없었고, 방금 우리가 치웠던 통로처럼 뭔가 채워져 있지도 않았다. 혹시 있을지 모를 가스에 대비해 촛불을 켜서 확인한 뒤, 구멍을 조금 더 넓혀 촛불을 넣고 안을 들여댜보았다. 처음에는 아무것도 보이지 않았다. 방에서 빠져나가는 뜨거운 공기 때문에 촛불이 흔들렸지만, 머지않아 눈이 조명에 익숙해지자 안개 속에서 방 안의 모습이 천천히 드러났다. 사방에서 기묘한 동물과 조각상, 그리고 금빛이 반짝였다. 곁에 서 있던 다른 사람들에게는 영원처럼 느껴졌을 지 모를 그 순간, 나는 놀라움에 할 말을 잃었다. 동료가 더 이상 참지 못하고 불안한 목소리로 물었다. '뭔가 보입니까?' 나는 그저 이렇게 답할 수밖에 없었다. '네, 놀라운 것들이 보입니다.'"
 lepsius.901.g: "놀라운 것들이라, 정말 그렇군."
 lepsius.902.d: "[SCOPE.sCountry('lepsius_tut_discoverer').GetName]에서 위대한 발견을 이룩하였습니다. 투탕카멘의 무덤이 오늘 발견된 것입니다!"
 lepsius.902.f: ""
 lepsius.902.g: "저들에게 파라오의 저주가 닥쳤으면 좋겠군."
 lepsius.911.t: "쿠푸의 배"
 lepsius.911.d: "오늘은 우리나라에서 위대한 발견을 이룩하여 국제 학계에 파장을 일으킨 날로 기록되었다. [ROOT.GetCountry.GetAdjectiveNoFlag] 고고학자들이 오늘 쿠푸의 배를 발견한 것이다!"
 lepsius.911.f: "구멍 속의 어둠에 익숙해지기 위하여, 심호흡을 한 뒤 눈을 감은 다음 천천히 눈을 떴다. 떨리는 손으로 다시 땅을 파기 시작하였다. 덮개가 바스라져 내리자 재빨리 발굴을 계속하였다. 몸을 아래로 비틀어 머리를 숙일 만큼 깊숙히 구멍을 파고, 머리에서 불과 한 발짝 떨어진 곳까지 파고 들어갔다. 계속해서 땅을 파고, 파고, 또 파냈다. 시간이 얼마가 흐르든 아무런 의미가 없다. 피곤한 기분도, 수직으로 누운 느낌도 의식하지 못했다. 땅을 캐고, 파냈다. 갑자기, 그리고 기적처럼 손이 허공으로 빠져들었다. 마치 최면에 걸린 듯 누워 있었다. 눈을 감았다. 흐릿한 냄새가 코끝으로 스며들었다. 무슨 냄새인지는 정확히 알 수 없었다. 단내에 가까웠다. 향은 아니다. 향인가? 케케묵은 냄새인 것인가? 그리고 알았다. 이건 삼나무다! 아직도 눈은 뜨지 않았다. 심호흡을 하고 정말로 삼나무인지를 확인했다. 그전까지 느껴본 적 없는 성취감을 느꼈다. 행복이 온몸을 감쌌다. 아직도 눈은 뜨지 않았다. 하느님께 감사 기도를 조용히 올렸다. 의구심 가득한 마음이 다시 동하기 시작했다. 저 아래에 있을지 모를 태양의 배에서 삼나무 냄새를 맡았다 하여 흰개미가 가만 있었을 리는 없으니까. 어쩌면 그 귀중한 나무토막은 수많은 흰개미떼에게 갉아 먹혔을지 모를 일이었다. \"배다!\", 하고 소리쳐 본다. \"배야!\""
 lepsius.911.g: "사천 년이 지났는데도 물 위를 가로지를 수 있다니?"
 lepsius.912.d: "[SCOPE.sCountry('lepsius_ship_discoverer').GetName]에서 위대한 발견을 이룩하였습니다. 쿠푸의 배 무덤이 오늘 발견된 것입니다!"
 lepsius.912.f: ""
 lepsius.912.g: "저들이 운용하는 새 함대의 주력함일 게 틀림없군."
 lepsius.921.t: "바빌론의 탑"
 lepsius.921.d: "오늘은 우리나라에서 위대한 발견을 이룩하여 국제 학계에 파장을 일으킨 날로 기록되었다. [ROOT.GetCountry.GetAdjectiveNoFlag] 고고학자들이 오늘 바벨탑을 발견한 것이다!"
 lepsius.921.f: "이 능선 너머 암란 이븐 알리 고원 쪽으로, 상당히 넓고 놀랄 만큼 평평한 평야가 펼쳐져 있는데, 우리가 있는 크웨이레쉬 마을에서 힐레로 향하는 길이 그 평야를 대각선으로 가로지른다. 이 평야는 '사흔'이라 불리는데 직역하면 냄비라는 뜻이지만, 오늘날에는 카르발라나 네드셰프처럼 순례가 이루어지는 대형 사원을 회랑으로 둘러싼 탁 트인 공간을 뜻한다. 그러나 우리가 향하는 '사흔'은 다름아닌 고대의 성역을 지금에 와서 일컫는데, 이곳에는 '하늘과 땅의 초석'이라 불리우는 바빌론의 탑, 이름하여 지구라트 에테메난키가 우뚝 솟아 있었으며, 그 주변에 성벽이 둘러져 있고 종교 의식과 관련된 여러 건물들이 자리해 있었다. 바빌론의 탑의 높이가 어느 정도인지는 알지 못한다. 그러나 에테메난키에서 발견한 원통형 비문을 통해 나부폴라사르는 네부카드네자르와 마찬가지로 이 탑에 주안점을 두어 설명하였다. 나부폴라사르의 표현에 따르면 \"그 순간 마르두크께서 내게 명하시었노니... 나 이전에 약해져 무너진 바빌론의 탑을 다시 세워, 저승의 품에 굳건히 기반을 다지고, 꼭대기는 하늘 높이 솟아오르게 하라\"라고 전해진다."
 lepsius.921.g: "결국 성경의 기록이 옳았군."
 lepsius.922.d: "[SCOPE.sCountry('lepsius_babylon_discoverer').GetName]에서 오늘 엄청난 발견을 해냈다는 소식이 전해졌다. 그것은 다름아닌 바벨탑을 발견했다는 것이다!"
 lepsius.922.f: ""
 lepsius.922.g: "바벨탑을 세운 사람들처럼 저들도 나중에 혼란이 닥치길 바랄 뿐이다."
 lepsius.931.t: "센나케리브의 정원"
 lepsius.931.d: "오늘은 우리나라에서 위대한 발견을 이룩하여 국제 학계에 파장을 일으킨 날로 기록되었다. [ROOT.GetCountry.GetAdjectiveNoFlag] 고고학자들이 오늘 공중 정원을 발견한 것이다!"
 lepsius.931.f: "바빌론에 공중 정원이 정말로 존재했는가? 최근 발견된 유적을 조사한 결과 그 주장은 사실이 아닌 것으로 밝혀졌다. 실제로 옛 기록들을 비교해본 결과, 전설적인 공중 정원이 바빌론에 존재했다고 기록한 자료는 극히 드문 것으로 드러났다. 더욱이 정교한 정원술로 유명했던 것은 바빌론 민족이 아니라 아시리아인이었다. 다층 구조로 펼쳐진 광대한 정원의 모습이 부조로 남아 있던 것이다. 고고학팀은 이를 계기로 아시리아 국왕 센나케리브의 대궁전에서 그동안 발굴이 전혀 이루어지지 않았던 구역의 발굴 조사에 나섰다. 그 결과는 명확했다. 한동안 잊혀졌던 세계의 불가사의는 틀림없이 니네베에 있었던 것이다. 따라서 우리 고고학자들은 이번 발견을 통해 2천 5백년 동안 풀리지 않던 난제를 해결했다는 점에서 큰 성과를 이룩하였다."
 lepsius.931.g: "그러니까 니네베에 공중 정원이 실존했단 말인가?"
 lepsius.932.d: "[SCOPE.sCountry('lepsius_semiramis_discoverer').GetName]에서 오늘 엄청난 발견을 해냈다는 소식이 전해졌다. 그것은 다름아닌 공중 정원을 발견했다는 것이다!"
 lepsius.932.f: ""
 lepsius.932.g: "우리 쪽에 혼동이 있었던 모양이군."
 lepsius.941.t: "미케네의 보물"
 lepsius.941.d: "오늘은 우리나라에서 위대한 발견을 이룩하여 국제 학계에 파장을 일으킨 날로 기록되었다. [ROOT.GetCountry.GetAdjectiveNoFlag] 고고학자들이 오늘 미케네의 보물을 발견한 것이다!"
 lepsius.941.f: "제일 중요하면서도 가치 있었던 유물은 사자의 문 바로 뒷편에서 출토되었다. 1874년 발굴 조사 당시 슐리만은 성채의 최하 지점에 있는 바위가 잔해로 가장 깊숙히 묻혀 있다는 사실을 이미 확인한 바 있다. 파우사니아스의 증언에 따르면 슐리만은 지배 가문의 무덤이 성벽 안에 있을 가능성이 높다고 보았으며, 발굴 작업에 나선 직후 3~5m 깊이에서 부조를 새긴 고대 묘비 3점이 발견되면서 그 추측을 다시금 돌아보게 되었다. 슐리만은 묘비를 치워보니 기존 생각대로 땅 위에 서 있는 것이 아니라, 무덤을 만들기 위해 바위에 수직으로 파낸 구덩이를 메운 흙 위에 서 있었다고 말한다. 그렇게 구덩이 다섯 곳을 파고, 죽은 자를 매장한 뒤 제단으로 쓰였던 석층을 일정 깊이까지 제거한 뒤, 도끼로 약 6m 깊이까지 파고들었던 것이다. 바닥에는 총 15구의 시신이 다섯 곳의 무덤에 흩어져 있었는데 전부 화려하면서도 경이로운 수준에 이를 만큼 정교한 금 장신구로 치장되어 있었다. 남성 시신의 얼굴에는 고인의 외모를 본뜬 황금 가면이 씌워져 있었고, 나선형 무늬로 화려하게 장식된 금판이 가슴을 덮고 있었으며, 여성의 수의는 황금으로 장식되어 있었다."
 lepsius.941.g: "아가멤논, 당신이야?"
 lepsius.942.d: "[SCOPE.sCountry('lepsius_mycenae_discoverer').GetName]에서 오늘 엄청난 발견을 해냈다는 소식이 전해졌다. 그것은 다름아닌 미케네의 보물을 발견했다는 것이다!"
 lepsius.942.f: ""
 lepsius.942.g: "저 사기꾼들이 제발 저릴까 봐 제 손으로 갖다 감춰 놓고 '보물' 운운하는군."
 lepsius.961.t: "파칼의 유산"
 lepsius.961.d: "오늘은 우리나라에서 위대한 발견을 이룩하여 국제 학계에 파장을 일으킨 날로 기록되었다. [ROOT.GetCountry.GetAdjectiveNoFlag] 고고학자들이 오늘 파칼의 무덤과 부장품을 발견한 것이다!"
 lepsius.961.f: "내가 처음으로 마주한 것은 녹색과 적색, 백색이 어우러진 모자이크와도 같았다. 그러다 문득 자세히 들여다보니 녹색 옥 장신구, 붉게 칠한 치아와 뼈, 가면 조각들이 눈에 다가왔다. 나는 이 모든 거대한 건축물, 다시 말해 지하묘실과 조각상, 계단을 두고 꼭대기에 신전을 둔 거대한 피라미드가 세워진 이유를 깨달았다. 팔렌케에서 가장 위대한 인물로 꼽히는 자의 유해를 바라보고 있었던 것이다! 이것은 다름아닌 마야 문명의 피라미드에서 발견된 최초의 석관이었다!"
 lepsius.961.g: "그야말로 남미판 투탕카멘의 무덤이로군!"
 lepsius.962.d: "[SCOPE.sCountry('lepsius_pakal_discoverer').GetName]에서 오늘 엄청난 발견을 해냈다는 소식이 전해졌다. 그것은 다름아닌 파칼의 무덤과 부장품을 발견했다는 것이다!"
 lepsius.962.f: ""
 lepsius.962.g: "이러나 저러나 가면이 정말 흉측하게 생겼더군."
 lepsius_local_excavation_modifier: "현지 발굴"
 lepsius_local_excavation_state_modifier: "현지 발굴"
 lepsius_local_excavation_cost_modifier: "현지 발굴 예산"
 lepsius.1101.t: "고고학 학술회의: 출애굽기"
 lepsius.1101.d: "우리나라는 차기 고고학 학술회의를 개최하기 위한 모든 준비를 마쳤다. 이번 회의의 주제는 고고학과 고전 시대 연구에 있어 성경의 역할이 어디까지인가에 관한 것이며, 전세계 주요 고고학자에게 초청장을 발송할 계획이다. 이번 회의의 의장은 [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] 교수가 맡게 된다."
 lepsius.1101.f: "일찍이 고대 로마 시대부터 고대 이집트에 관한 기록이 부족했던 탓에 헤로도토스와 같은 2차 사료에 의존할 수밖에 없었다. 이러한 모습은 중세 시대에도 전개되었다. 성경은 근동의 역사에 관한 단서를 제시하였고, 전해져 내려오는 다른 이야기가 없엇던 관계로 오랜 세월 동안 믿을 만한 사료로 여겨져 왔다. 상형문자의 해독과 근대 이집트학의 발달로 성경의 기록이 거짓인가 진실인가에 관하여 성경 옹호론자와 비판론자 양측에서 각자의 증거를 제시하려는 시도에 나섰다. 고대 바빌로니아 탐사가 시작되면서 이러한 흐름은 더욱 심화되었다. 성경 이야기의 역사성에 관한 논쟁의 대표적인 사례로 출애굽기, 즉 이스라엘 백성들의 이집트 탈출기를 들 수 있는데, 이집트 측 사료에서는 그것을 뒷받침할 증거가 전혀 없었기 때문이었다."
 lepsius.1101.g: "고고학계의 석학들을 우리 손님으로 받아들입시다."
 lepsius.1102.d: "[SCOPE.sCountry('lepsius_congress_host_country').GetName]에서 고고학 학술회의에 우리나라를 초청하였다. 이번 회의의 주제는 출애굽기를 대표 사례로 삼아 성경의 역사성을 다룰 전망이다. 우리나라 고고학계를 대표하는 [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] 교수가 따뜻한 환대를 받으며 회의에 참석하게 되었다."
 lepsius.1102.g: "내 가죽 재킷이 제일 멋있다는 자랑질은 여전하군..."
 lepsius.1103.t_laughed: "고고학계의 조롱"
 lepsius.1103.t_respected: "자신만만한 모습"
 lepsius.1103.t_lauded: "존경과 환대"
 lepsius.1103.d_laughed: "[SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] 교수의 참석은 웃음거리로 전락하였다. [ROOT.GetCountry.GetNameNoFlag]에서 이집트학 분야에 별다른 성과를 이룩하지 못한 탓이다. 겉은 몰라도 뒤에서는 저들끼리 조롱이 오갔을 것이 분명하다."
 lepsius.1103.d_respected: "고고학 학술회의의 시작에 앞서 우리 고고학자가 따뜻한 환대를 받으며 관례적인 인사를 나누었다. 학계에서 [ROOT.GetCountry.GetNameNoFlag](이)가 마땅한 명성을 지니고 있었던 덕분이다."
 lepsius.1103.d_lauded: "[SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] 교수가 도착하자 엄청난 환호성이 교수를 맞이하였다. 모두가 이번 행사에서 가장 기대되는 손님으로 생각했던 것이다. [ROOT.GetCountry.GetNameNoFlag](이)가 이집트학 분야의 선구적인 국가로 여겨지는 만큼 교수의 주변으로 인파가 빠르게 모여들었다."
 lepsius.1103.f_laughed: "\"[ROOT.GetCountry.GetAdjectiveNoFlag] 고고학자들이 여자 하나 못 사귀는 이유가 뭔지 아나?\n\n그야 삽질만 해대니깐!\""
 lepsius.1103.f_respected: "[SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] 교수는 도착하자마자 동료 학자들과 몇 차례 즐거운 이야기를 나누었다. 대화의 내용은 따분한 유적에 관한 것이 대부분이었다. 학자가 아니라면 훨씬 더 별 볼일 없는 암석 지형으로 치부할 만한 것들 말이다."
 lepsius.1103.f_lauded: "[SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] 교수는 무수한 악수의 요청에 정신을 못 차리는 모습이었다. 수많은 동료 학자들이 이야기를 나누고 싶어했으며 교수의 탐험과 경험에서 하나라도 얻어가고자 했다. 심지어 몇몇은 개인 강연을 해줄 수 있겠느냐고 간곡히 요청하기도 했다."
 lepsius.1103.g: "이렇게 부끄러울 데가!"
 lepsius.1103.h: "드디어 말이 통하는 사람들과 함께 있게 되었군."
 lepsius.1103.i: "우리는 고고학을 선도하는 국가다!"
 lepsius.1104.t: "출애굽기는 역사적 사실인가, 창작인가?"
 lepsius.1104.d: "특정 주제를 중심으로 다루려던 학술회의가 순식간의 원칙의 문제를 다루는 장으로 거듭나게 되었다. 처음에는 성경에 소개된 출애굽과 이집트 기록에 대해서만 다루고자 하였으나 머지않아 성경이 역사와 고고학에서 갖는 가치에 관한 논쟁으로 번졌다. 이제 두 학파는 돌이킬 수 없을 정도로 대립하고 있다."
 lepsius.1104.f: "[SCOPE.sCharacter('lepsius_bible_defender_scope').GetFullName](은)는 원래 이스라엘 민족의 기록 문화와 출애굽의 역사적 지위에 관해서 강연하고자 하였으나, [SCOPE.sCharacter('lepsius_bible_attacker_scope').GetFullName](이)가 그런 발표가 결국 시간 낭비에 불과하지 않겠느냐는 도발적이면서도 합당한 질문을 던졌다. 그 이유는 출애굽이 실존한 사건이라는 것을 뒷받침하는 고고학적 기록이 존재하지 않고, 현재 번역된 성경 본문에도 그러한 내력은 없기 때문에 성경을 사료로 볼 수 있는가의 여부부터 명확히 할 필요가 있기 때문이다. 그렇기 때문에 우리들은 모세오경이 사실은 지어낸 이야기인가, 또 무가치한 것인가에 관하여 의문을 던져야 하는 것이 원칙이라는 입장을 내세우며, \"고고학은 사실에 관한 학문이지 진실에 관한 학문이 아니다\"라는 결론을 지었다. [SCOPE.sCharacter('lepsius_bible_defender_scope').GetFullName] 측은 이러한 비난에 대해 성경 본문을 목격자의 증언으로 이해해서는 안 되며, 고대의 기록 문화라는 퍼즐 한 조각을 이루는 사건의 2차 사료로 이해해야 한다고 반박했다. 그리고 \"성경을 완전히 배격하는 것은 성경의 모든 말씀을 역사적 사실로 받아들이는 것만큼이나 어리석은 짓. 중요한 것은 올바른 질문을 던지는 것\"이라 말했다."
 lepsius.1104.g: "성경은 2차 사료로서 다소간의 역사적 가치를 지닌다."
 lepsius.1104.h: "성경에는 역사적 가치가 전혀 없다."
 lepsius.1105.t: "고고학자들끼리"
 lepsius.1105.d: "고고학 학술회의와는 별도로 우리 고고학자가 외국의 동료 학자들과 어울려 서로의 견해를 교환하고 있다."
 lepsius.1105.f: "학술회의는 며칠 간 계속되었고 [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] 교수는 처음에는 초면 사이의 동료 학자들과 쉬는 시간에 잠깐 몇 마디를 나눌 여유밖에 없었다. 회의를 마치고 함께 식사 자리를 가지며 학자들은 이야기를 나눌수록 서로에 대해, 그리고 서로간에 더 많은 것을 알 수 있었다. 알고 보니 [SCOPE.sCharacter('lepsius_foreign_archaeologist_scope').GetFullName](은)는 경험이 풍부한 학자였던 것이다."
 lepsius.1105.g: "고고학계에 또 하나의 동지가 생겼군!"
 lepsius.1106.t: "유물 거래 협의"
 lepsius.1106.d: "골동품 소유자의 대리인이 [SCOPE.sCountry('lepsius_congress_host_country').GetName]에서 열린 고고학 학술회의에 참석하였다. 신분을 밝히지 않으려는 귀족을 대신해 유물 판매에 나서 거래에 관심있는 박물관을 물색하고자 하지만 아직까지 협의 대상을 확보하지 못한 모양이다."
 lepsius.1106.f: "[SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] 교수는 유물의 진위 여부를 가릴 것 없이 진품으로 확신하였지만, 거래가가 높아 구매를 망설이며 큰손의 확답이 나기까지 먼저 나서지 않고 기다리고 있다."
 lepsius.1106.g: "값은 비싸지만 그만한 가치가 있군."
 lepsius.1106.h: "별다른 가치가 없어."
 lepsius.1107.t: "정담"
 lepsius.1107.d: "[SCOPE.sCountry('lepsius_congress_host_country').GetName]에서 열린 고고학 학술회의 기간 중에 우리 고고학자가 여러 동료 학자들과 대화를 나누며 [ROOT.GetCountry.GetNameNoFlag]에 대단히 긍정적인 인상을 남기는 데 공헌하였다."
 lepsius.1107.f: "[SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] 교수가 정확히 어떤 말을 했는지는 알 수 없지만, 다른 고고학자들의 공감을 산 것으로 보인다. 오늘 받았던 긍정적인 인상을 자국에 틀림없이 전파할 것이다."
 lepsius.1107.g: "외교 관계를 개선하자."
 lepsius.1107.h: "우리 명성을 높이자."
 lepsius.1108.t: "조교"
 lepsius.1108.d: "고고학 학술회의에 참석하고 싶어 기웃거리다 경비원에 저지당한 어느 젊은이가 [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] 교수의 주목을 끌게 되었다."
 lepsius.1108.f: "물론 그 학생은 세계 유수의 고고학자들만 모인 학술회의장에 들어오지는 못했지만, 그 끈기에 감명받은 [SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName] 교수가 학생을 좀 더 알아가고 싶은 마음에 면담에 나섰다. 알고 보니 그 학생은 나이에 비해 고대 언어와 지리에 대한 해박한 지식을 갖추고 있었다. 교수는 불과 몇 시간 만에 이 학생이 학계에 큰 공헌을 할 수 있기를 바라며 회의가 끝나고 조교로 채용하기로 결심하였다."
 lepsius.1108.g: "학계에서 큰일을 해낼 것으로 믿소."
 lepsius.1109.t_merit: "출애굽기는 단순 이야기 그 이상이다"
 lepsius.1109.t_invention: "출애굽기는 사실이 아닌 허구다"
 lepsius.1109.d_merit: "수차례의 회의와 토론, 논쟁을 거친 끝에 고고학 학술회의가 종료되어 최종 선언문이 작성되었다. 성경은 1차 사료는 아니며 이집트나 바빌론 연구에 직접 응용할 수는 없지만, 여러 측면에서 역사적 가치를 지닌다는 것이 회의의 결론이었다."
 lepsius.1109.d_invention: "수차례의 회의와 토론, 논쟁을 거친 끝에 고고학 학술회의가 종료되어 최종 선언문이 작성되었다. 성경은 고고학에도 역사학에도 아무런 가치가 없으며, 고대 연구에 도움이 되기보다는 오히려 방해가 되는 일련의 허구에 불과하다는 것이 회의의 결론이었다."
 lepsius.1109.f_merit: "소수의 학자들은 이번 선언을 타협안으로 여겼으나, 나머지 학자들은 이것이 절대적인 입장에 불과한 것이 아니라 과거에 대한 미묘한 접근방식이라 인식하였다. 출애굽기를 직접적으로 언급하였음에도 불구하고 일부 학자들은 최근 발견된 메렌프타 파라오의 기록에서 이스라엘 백성의 멸망을 거론한 단락이 있음을 역설하였다. 또 한편으로 샹폴리옹이 번역한 부바스티스 문서에서 시사크 파라오가 예루살렘을 실제로 함락시켰다고 지적하는 학자들도 있었다. 이 모든 증거는 성경을 문자 그대로 해석하기보다는 고대 역사를 연구하는 단서로 보는 것이 더 중요하다는 것을 시사하고 있다. 잘못된 해석은 불가피하지만 그것은 여느 학문이든 해당되는 사항이다."
 lepsius.1109.f_invention: "회의론파가 자신들의 최대 요구를 관철시키는 데 결국 성공하였다. 이제 성경 이야기는 로마의 7왕 전설이나 고대 그리스 신화와 동등한 가치에 지나지 않게 된 것이다. 이로써 서양에서 성경의 지배적인 지위는 최소한 고고학 분야에서는 종말을 맞이하게 되었다. 고고학계 발견과 성경 구절 간에 우연의 일치가 있었다는 절박한 주장도 그 말 그대로 우연의 일치에 지나지 않았음이 인정되었다. 따라서 성경을 어떻게 다룰 것인가는 문학계의 몫으로 여겨지게 되었다. 일부 고고학자들은 성경 이야기가 기껏해야 이집트 설화나 바빌로니아 신화에서 베껴왔을 가능성을 제기하기도 했다. 이는 그저 관련성을 조사해 볼 필요가 있는 문제였다. 그렇지 않다면 고고학과 역사학계는 더 이상 해당 건을 연구할 필요가 없다는 결론을 내렸다. 성경은 학술적으로 가치가 없으며 대부분 지어낸 이야기의 조합이라는 것이다."
 lepsius.1109.g: "문헌은 올바르게 분간하고 해석하여야 한다."
 lepsius.1109.h: "성경은 쓸모 없는 소설책에 불과하다."
 lepsius.1109.i: "우린 그 사실을 이미 알고 있었다."
 lepsius.1111.t: "고고학 학술회의: 문명의 발흥"
 lepsius.1111.d: "우리나라는 차기 고고학 학술회의를 개최하기 위한 모든 준비를 마쳤다. 이번 회의의 주제는 문명이 처음 발원한 지역이 어디인가에 관한 것이다. 최신 연구에 따르면 그 정답은 바빌로니아인 것으로 추정되며, 바빌로니아 문화가 타 문화권에 어느 정도 영향을 미쳤는가에 관한 의문을 한층 더 제기하게 되었다. 이에 따라 전세계 주요 고고학자에게 초청장을 발송할 계획이다. 이번 회의의 의장은 [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] 교수가 맡게 된다."
 lepsius.1111.f: "바빌로니아 문명이 존재했다는 사실은 완전히 잊혀진 적이 없었다. 심지어 고대 그리스 시대에도 바빌로니아인과 아시리아인에 관한 기록이 남아 있었다. 허나 아카드어 해독을 계기로 수메르인처럼 훨씬 더 오래된 문명이 존재했으며, 그 역사가 이집트 문명보다도 더욱 오래되었다는 사실이 드러났다. 문명의 전형적인 특징을 이루는 여러 발명품이 바빌로니아 사람들의 일상 생활을 이루었다는 것이 확인된 만큼, 언어학계와 고고학계에서는 바빌론이 문명의 진정한 요람이었을 것이라 추측하는 학자들이 많아졌다. 고대 메소포타미아를 향한 관심은 머지않아 모든 문명의 기원을 바빌론으로 보는 관점으로 이어졌다. 성경 뿐만 아니라 레반트와 페르시아 문명, 심지어 이집트 문명까지도 바빌론 문화가 '수용'되거나 '전래'된 것에 불과했다는 것이다. 이 같은 편협한 연구관점은 머지않아 조롱이 섞였음에도 추종자들도 자칭하게 된 '범바빌로니즘'으로 불리게 되었다."
 lepsius.1111.g: "고고학계의 석학들을 우리 손님으로 받아들입시다."
 lepsius.1112.d: "[SCOPE.sCountry('lepsius_congress_host_country').GetName]에서 고고학 학술회의에 우리나라를 초청하였다. 이번 회의의 주제는 문명이 처음 발원한 지역이 어디인가에 관한 것이다. 최신 연구에 따르면 그 정답은 바빌로니아인 것으로 추정되며, 바빌로니아 문화가 타 문화권에 어느 정도 영향을 미쳤는가에 관한 의문을 한층 더 제기하게 되었다. 우리나라 고고학계를 대표하는 [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] 교수가 따뜻한 환대를 받으며 회의에 참석하게 되었다."
 lepsius.1112.g: "내 가죽 재킷이 제일 멋있다는 자랑질은 여전하군..."
 lepsius.1113.d_laughed: "[SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] 교수의 참석은 웃음거리로 전락하였다. [ROOT.GetCountry.GetNameNoFlag]에서 아시리아학 분야에 별다른 성과를 이룩하지 못한 탓이다. 겉은 몰라도 뒤에서는 저들끼리 조롱이 오갔을 것이 분명하다."
 lepsius.1113.d_respected: "고고학 학술회의의 시작에 앞서 우리 고고학자가 따뜻한 환대를 받으며 관례적인 인사를 나누었다. 학계에서 [ROOT.GetCountry.GetNameNoFlag](이)가 마땅한 명성을 지니고 있었던 덕분이다."
 lepsius.1113.d_lauded: "[SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] 교수가 도착하자 엄청난 환호성이 교수를 맞이하였다. 모두가 이번 행사에서 가장 기대되는 손님으로 생각했던 것이다. [ROOT.GetCountry.GetNameNoFlag](이)가 아시리아학 분야의 선구적인 국가로 여겨지는 만큼 교수의 주변으로 인파가 빠르게 모여들었다."
 lepsius.1114.t: "바빌론은 문명의 요람인가?"
 lepsius.1114.d: "학술회의가 진행되는 동안 문명의 기원이 어디인가에 관한 의문은 점차 바빌론이 중동과 지중해 동부의 모든 문명에 얼마나 영향을 미쳤는가에 관한 의문으로 거듭났다. 일각에서는 후대에 중요한 역할을 했던 모든 발상이 고대 바빌로니아에서 탄생한 것이라는 주장도 제기되었다!"
 lepsius.1114.f: "[SCOPE.sCharacter('lepsius_babylon_defender_scope').GetLastName] 교수는 4000년도 더 전에 이룩했던 바빌론의 문명사적 업적과 높은 수준의 지식에 관한 매우 흥미로운 발표로 학술회의를 시작하였다. \"수메르-바빌론 문명권은 모든 국가와 사회 조직에 규율이 확립된 세계관을 전제로 한다. 여느 곳의 과학과 예술은 하늘이 계시한 근원적 지혜에서 비롯되었으며, 그 지혜에 따라 재산을 유지하고 보호할 수 있었다. 범바빌론주의는 이러한 천체 세계관이 세상 모든 문명과 종교에 흔적을 남겼다는 증거를 제시하고자 한다\"고 발언하였다. 그러나 이러한 견해는 수많은 학자들의 강력한 반발을 불러일으켰고 그들을 대변하는 입장에서 [SCOPE.sCharacter('lepsius_babylon_attacker_scope').GetFullName] 교수가 강단에 나섰다. 모든 신화가 바빌로니아에서 유래했다는 견해를 반박하며, \"[SCOPE.sCharacter('lepsius_babylon_defender_scope').GetLastName] 씨가 말한 것은 사실이라기보다 짜맞추기에 가깝다. 다원적 발전이 있을 수 없다는 생각은 터무니없다. 이를테면 이집트 상형문자는 쐐기문자에서 영감을 받은 것이 아니다\"라는 것이 그의 주장이었다. 범바빌론주의파는 메소포타미아를 중심에 두고 다른 모든 신화를 변방으로 밀어내며 우선순위를 두고자 하였으나, 문명이란 것 자체가 공통된 스펙트럼에 존재할 수 있다는 사실을 완전히 간과했다는 것이다."
 lepsius.1114.g: "바빌론이 문명의 요람이다."
 lepsius.1114.h: "문명은 여러 곳에서 발원하였다."
 lepsius.1119.t_panbabylonism: "문명의 발흥: 범바빌론주의의 승리"
 lepsius.1119.t_antipanbabylonism: "문명의 발흥: 범바빌론주의의 부정"
 lepsius.1119.d_panbabylonism: "여러 학자들 사이에 의견차를 불러일으킨 열띤 논쟁 끝에 회의의 최종 선언문에 도달할 수 있었다. 메소포타미아는 문명의 요람일 뿐만 아니라 중동의 모든 신화와 종교적 발상지라는 것이 이번 회의의 결론이다."
 lepsius.1119.d_antipanbabylonism: "양측 대결은 끝나고 격렬한 언쟁 끝에 학자들은 마음을 추스려 범바빌로니아 진영이 최종적으로 물러섰음을 확정짓는 선언문에 합의할 수 있었다. 메소포타미아가 문명의 최중요 발상지로 인정받는 것은 사실이지만, 유일한 지위에 있지는 않는다는 것이다. 모든 신화의 기원을 바빌로니아로 돌리려는 시도는 싹부터 잘려나가게 되었다."
 lepsius.1119.f_panbabylonism: "최종 선언문에는 범바빌론주의파가 밀어붙인 모든 이론을 확증하는 내용이 담겼다. 동방의 신화와 문학이 바빌로니아 문명에 크게 의존했다는 사실이 명백해졌다는 것이다. 성경과 이집트 신화 모두 길가메시 서사시에서 찾아볼 수 있는 바빌로니아의 대표 설화에서 큰 영향을 받았던 것이 분명하다. 결국 중동 전역의 문명 발전은 바빌로니아라는 문명 근원의 천문학과 점성술에서 큰 영향을 받았으며, 바빌로니아의 지식이 적든 크든 드러나 있다는 것이다."
 lepsius.1119.f_antipanbabylonism: "요 근래 범바빌론주의파 학자들은 자신들이 소수설로 전락했다는 사실을 자각하였다. 학계에서는 메소포타미아 문명의 수많은 업적이 중동의 지식 기반의 핵심을 이뤘다는 점을 인정하였다. 그러나 최종 선언에서 학계는 절대적 문명, 심지어 '근원적 문명'이라는 개념을 주장하는 것 자체를 거부하였다. 바빌로니아 지식의 출발점으로 여겨졌던 천문학 지식 역시 과거에는 초창기부터 이룩한 것으로 잘못 여겨졌지만 사실은 후대에 발전이 이루어졌던 것으로 밝혀졌다. 학계에서는 또한 바빌로니아의 전통 설화를 우선해야 한다는 전제를 인정하지 않았다. 오히려 바빌로니아 설화라고 부르던 수많은 이야기들은 지역에서 공통적으로 전해져 내려오던 유산을 바빌로니아인들이 처음 기록하였을 뿐이라는 사실이 밝혀졌다. 특히 범바빌론주의파가 유사과학에 지나지 않는다고 신랄하게 비판한 대목이 눈에 띈다. \"이 신비로운 지혜라는 개념은 세계의 모든 차원에 대한 '근원적 계시'가 거대 피라미드에 담겨 있다는 주장만큼이나 과학적으로 무의미한 것임에도 아직까지 추종자가 있다는 것은 불행한 사실이 아닐 수 없다.\""
 lepsius.1119.g: "모든 것은 메소포타미아에서 기원하였다."
 lepsius.1119.h: "발상지는 하나가 아니었다."
 lepsius.1121.t: "고고학 학술회의: 트로이의 지위"
 lepsius.1121.d: "우리나라는 차기 고고학 학술회의를 개최하기 위한 모든 준비를 마쳤다. 이번 회의의 주제는 트로이 문제를 최종 해결하기 위한 것이다. 하인리히 슐리만이 엄청난 발굴을 해냈음에도 실제로 무엇을 발견한 것인지, 그것이 정말 트로이인지, 그리고 트로이가 그런 모습으로 존재했는지에 관하여 여전히 합당한 의문이 남아 있다. 이를 위해 전세계 주요 고고학자에게 초청장을 발송할 계획이다. 이번 회의의 의장은 [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] 교수가 맡게 된다."
 lepsius.1121.f: "슐리만이 트로이를 발견했다고 선언한 이래 학계의 부정론자들은 충격에서 벗어나기까지 시간이 걸렸다. 이후 조사 결과 슐리만이 잘못된 지층을 발굴했을 뿐만 아니라, 슐리만이 발견했다고 알려진 '프리아모스의 보물'이란 것도 호메로스 대의 트로이보다 제작연대가 훨씬 더 오래됐음이 밝혀졌다. 슐리만이 엉뚱한 도시를 발굴했을지 모른다는 이야기가 머지않아 퍼져나가기 시작했다. 일각에서는 처음부터 존재를 하지 않은 것을 어떻게 발굴하겠느냐는 주장을 고집하였다. 또 한편으로는 슐리만의 발견을 옹호하고, 고대 기록에 근거하여 발굴을 진행하였으므로 증거는 충분하다고 보는 학자들도 존재했다. 고대 로마 시대의 유물 발견 또한 고대 그리스인과 로마인들도 이곳을 트로이 전쟁의 무대로 여겼다는 것을 증명하였다. 트로이의 발견은 학계의 논쟁을 종식시키지는 못했지만, 새로운 국면으로 접어들게 되었다."
 lepsius.1121.g: "고고학계의 석학들을 우리 손님으로 받아들입시다."
 lepsius.1122.d: "[SCOPE.sCountry('lepsius_congress_host_country').GetName]에서 고고학 학술회의에 우리나라를 초청하였다. 이번 회의의 주제는 트로이 문제를 최종 해결하기 위한 것이다. 하인리히 슐리만이 엄청난 발굴을 해냈음에도 실제로 무엇을 발견한 것인지, 그것이 정말 트로이인지, 그리고 트로이가 그런 모습으로 존재했는지에 관하여 여전히 합당한 의문이 남아 있다. 우리나라 고고학계를 대표하는 [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] 교수가 따뜻한 환대를 받으며 회의에 참석하게 되었다."
 lepsius.1122.g: "내 가죽 재킷이 제일 멋있다는 자랑질은 여전하군..."
 lepsius.1123.d_laughed: "[SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] 교수의 참석은 웃음거리로 전락하였다. [ROOT.GetCountry.GetNameNoFlag]에서 에게 고고학 분야에 별다른 성과를 이룩하지 못한 탓이다. 겉은 몰라도 뒤에서는 저들끼리 조롱이 오갔을 것이 분명하다."
 lepsius.1123.d_respected: "고고학 학술회의의 시작에 앞서 우리 고고학자가 따뜻한 환대를 받으며 관례적인 인사를 나누었다. 학계에서 [ROOT.GetCountry.GetNameNoFlag](이)가 마땅한 명성을 지니고 있었던 덕분이다."
 lepsius.1123.d_lauded: "[SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] 교수가 도착하자 엄청난 환호성이 교수를 맞이하였다. 모두가 이번 행사에서 가장 기대되는 손님으로 생각했던 것이다. [ROOT.GetCountry.GetNameNoFlag](이)가 에게 고고학 분야의 선구적인 국가로 여겨지는 만큼 교수의 주변으로 인파가 빠르게 모여들었다."
 lepsius.1124.t: "트로이는 단순 신화인가?"
 lepsius.1124.d: "트로이의 지위에 관한 논쟁이 예상보다 더욱 격렬해지고 있다. 이 문제에 관하여 진영이 둘이 아니라 셋으로 갈라진 탓이다. 첫번째 부류는 슐리만을 열렬히 지지하는 학자들로, 슐리만이 제시한 모든 주장이 옳다고 확신하는 측이다. 이에 맞서는 반대 부류는 호메로스의 트로이가 슐리만의 발굴지와 관련이 있다는 증거가 몹시 미약하다고 주장하며, 타협할 수 없는 입장을 고수하고 있다. 제3의 부류는 슐리만이 심각한 실수를 저지르긴 했으나 본래 찾고 있던 도시인 것은 사실이라고 믿고 있다."
 lepsius.1124.f: "\"슐리만이 트로이를 발견한 것이 아니라면 대체 무얼 발견했단 말입니까? 슐리만은 《일리아스》와 고전 작가들이 기록했던 바와 일치하는 곳을 발견했소. 그 시대에 맞는 건축물을 발견했고, 적군이 파괴한 것으로 보이는 유적도 찾아냈소. 도대체 얼마나 증거를 더 많이 제시해야 하겠습니까?\" 이 말과 함께 강연에 나선 [SCOPE.sCharacter('lepsius_troy_defender_scope').GetLastName] 교수였지만, 동료 학자인 [SCOPE.sCharacter('lepsius_troy_attacker_scope').GetLastName] 교수의 연이은 질문 공세에 말을 멈추고 말았다. 이를테면 고대 그리스인들은 고전 시대에도 트로이의 위치를 알지 못했고, 그 시절에도 이미 그곳을 트로이로 착각하고 있었으며, 도시의 실제 이름은 알려진 바가 없는데다 그리스 문명권과 어떤 관련이 있었는가에 관한 단서도 없고, 트로이 전쟁에 관하여 호메로스의 기록과 유사한 형태의, 신뢰할 만한 사료가 부재하다는 점이 지적되었다. 그러자 [SCOPE.sCharacter('lepsius_troy_mediator_scope').GetLastName] 씨가 끼어들어 이렇게 말했다. \"동료 학자 여러분, 슐리만이 실수를 한 것은 분명하지만, 그렇다고 우리가 큰그림을 놓치는 것을 바라지는 않을 것 아니오?\""
 lepsius.1124.g: "슐리만은 트로이를 찾아낸 것이 맞다."
 lepsius.1124.h: "슐리만은 '트로이'를 발견했다지만 문제가 좀 복잡하다."
 lepsius.1124.i: "그곳이 정말 트로이라는 확실한 증거는 없다."
 lepsius.1129.t_homeric: "트로이는 신화가 아닌 역사다"
 lepsius.1129.t_historical: "트로이는 역사이자 신화다"
 lepsius.1129.t_myth: "트로이는 역사가 아닌 신화다"
 lepsius.1129.t_disputed: "트로이는 해결되지 못한 미스터리다"
 lepsius.1129.d_homeric: "치열한 토론과 연이은 강연 끝에 히사를리크 고원에서 호메로스의 일리온을 발견했다고 주장하는 슐리만 지지파 측이 승리하게 되었다. 트로이의 역사성 뿐만 아니라 트로이 전쟁과 호메로스 서사시의 다른 면모 또한 역사적 사실로 인정받게 된 것이다."
 lepsius.1129.d_historical: "[SCOPE.sCountry('lepsius_congress_host_country').GetName]에서 열린 이번 학술회의에 참석한 고고학자들은 호메로스 전승에는 적어도 그 일부라도 진실의 핵심이 담겨 있다는 결론에 도달했다. 슐리만의 발굴이 그릇된 것이라 하더라도 히사를리크 고원이 문학과 역사학에서 대체로 트로이로 알려진 장소와 일치한다는 증거가 있으며, 이제 남은 것은 세부적인 부분들을 규명해야 할 문제라는 것이다."
 lepsius.1129.d_myth: "학술회의에서는 수백 년 동안 이어져 온 트로이 논쟁이 마침내 끝을 맺었다는 결론을 내렸다. 이번에 트로이가 발견된 것은 오히려 호메로스 서사시가 순전히 허구라는 회의론자들의 주장에 더욱 힘을 싣게 된 것이다. 슐리만이 무엇을 발굴했든 간에, 그것은 트로이일 수가 없게 되었다. 왜냐하면 트로이는 처음부터 존재하지 않았기 때문이다."
 lepsius.1129.d_disputed: "최근 학자들 간의 물러설 수 없는 대결은 큰 실망과 무관심을 낳게 되었다. 트로이 문제에 대한 해결법은 아직 요원한 수준이며, 공동 최종 선언문조차 합의에 이르지 못했다. 일부 대표는 일찍이 자리를 떠났으며, 다른 대표들도 무의미한 토론에 시간을 허비하며 자리를 비웠다."
 lepsius.1129.f_homeric: "슐리만을 지지하는 학자들이 오늘 큰 승리를 자축하고 있다. 이들은 트로이를 발견한 슐리만에게 그간의 주장이 사실임을 확인하고 그를 학회의 명예 회원으로 추대하겠다는 내용의 전보를 흥분과 함께 전했다. 슐리만은 틀림없이 트로이를 발굴하였으며, 호메로스 서사시에 나오는 트로이 전쟁이 허구도, 흐릿한 기억도 아닌, 역사적 사건임을 입증하는 단서를 제시하였다. 이제 에게해 지역에서 '신화'로 가려져 있던 시대에 대한 더 많은 정보를 전해 줄 유물을 찾는 것이 더욱 중요해졌다. 연구자들의 열정 덕에 슐리만의 주장을 뒷받침할 집중적인 발굴 작업이 머지않아 이루어질 것으로 전망된다. 어쩌면 오디세우스의 저택, 아킬레스의 무덤, 아니면 아가멤논이 처형당했다던 욕조가 곧 발견될 지도 모른다. 슐리만이 아직 이 전보에 답장을 보내지 않은 것은 다소 의아한 일이다..."
 lepsius.1129.f_historical: "오랜 토론과 무수한 설득 끝에 대다수 학술회의 참석자들 간에 타협점을 찾을 수 있었다. 국제 고고학회 회원의 절대 과반수는 슐리만이 트로이 발굴에서 심각한 오류를 저질렀다고 보기로 했다. 무엇보다도 잘못된 지층을 발굴했다는 사실이 분명하다. 그러나 슐리만이 찾아낸 트로이가 엉뚱한 곳이었을 뿐, 위치 자체는 맞다는 의미가 된다. 실제로 트로이 전쟁 시기의 도시 유적은 다른 지층에 있었을 가능성이 존재한다. 고고학자들은 트로이 전쟁이 실제 역사 속 사건인지의 여부를 최종적으로 판단하지 못했다. 트로이가 자리했던 언덕은 수차례 화재와 전쟁으로 파괴되었기 때문이다. 도시의 정체와 관련해서는 히타이트의 영향이 있었다는 설이 확인되었다. 학계에서는 이번 결과를 계기로 심층 연구를 진행하고 트로이 문제에 관한 논의를 계속해서 이어갈 것이라고 발표하였다."
 lepsius.1129.f_myth: "진지한 논쟁이 연이어진 끝에 속이 끓는 극소수를 제외한 모든 고고학자와 역사학자들이 공동 선언문에 서명하기에 이르렀다. 선언문에 따르면 호메로스의 서사시는 문학 작품으로 취급하여야 하며, 옛 사건을 다루었을 가능성은 있으나 근대 고고학의 시각에서 재구성하기엔 어렵다는 것이었다. 그 대신 트로이 전쟁은 인류의 경험 전반이 반영된 '전쟁 그 자체'로 평가할 수 있다는 것이다. 이에 따라 트로이는 아틀란티스와 마찬가지로 역사적 맥락이 전혀 없는 일종의 유토피아이자 사상이 투쟁하는 문학적 공간일지도 모르게 되었다. 학회 측은 트로이 연구를 원칙적으로 무의미하고 목적 없는 '유사과학의 곁다리'에 해당되는 활동으로 규정하였다. 고고학은 더욱 가치있는 분야로 나아가야 한다는 것이다."
 lepsius.1129.f_disputed: "\"뭐 그래도 식사는 입에 맞았으니까!\""
 lepsius.1129.g: "그러니까 슐리만은 정말로 트로이를 발견했다는 것이로군!"
 lepsius.1129.h: "슐리만이 잘못된 트로이를 발굴하긴 했으나, 그 위치는 정확하다."
 lepsius.1129.i: "트로이는 순수 문학일 것이다."
 lepsius.1129.j: "이번 회의는 완전히 시간 낭비였군!"
 lepsius.1201.t: "[SCOPE.sState('lepsius_excavation_site').GetName]의 현지 발굴지"
 lepsius.1201.d: "[SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName](은)는 [SCOPE.sState('lepsius_excavation_site').GetName]에 새로운 발굴지가 존재하는 것을 확인했다. 이에 고고학자 본인과 발굴 인력이 즉시 조사 단계에 들어갔다. 다만 발굴 조사의 예산 투입 기간을 얼마나 할지는 아직 불분명한 상황이다."
 lepsius.1201.f: "발굴 조사는 5년, 7년, 10년 기한으로 승인이 가능합니다. 해외에서 진행되는 발굴 작업과는 달리 언제나 취소할 수는 없습니다. 담당 고고학자는 기한에 따라 6개월, 12개월, 18개월 동안 해당 발굴지에 머무르게 되며, 이 기간 동안에는 사용할 수 없습니다."
 lepsius.1201.g: "10년"
 lepsius.1201.h: "7년"
 lepsius.1201.i: "5년"
 lepsius.1202.t: "발굴 현장에서 돌아온 [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] 교수"
 lepsius.1202.d: "[SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName](은)는 지난 몇 달 간 [SCOPE.sState('lepsius_excavation_site').GetName]의 고고학 발굴지를 조성하는 과정에 임하였으며 몇가지 발견을 처음으로 이루어냈다. 교수는 평가를 위해 대학으로 복귀하고 발굴단은 예산이 소진될 때까지 향후 몇 년 간 독자적으로 발굴을 실시하게 된다."
 lepsius.1202.f: "\"발굴 작업만큼 결과물이 작업자의 성격과 직결되는 일도 드물다. 옛말에 사람은 본인이 찾는 것을 찾는다고 하던데 정말 사실이다. 원하던 바를 찾는 통찰력을 충분히 갖추지 못하면, 원하는 것도 결코 찾지 못한다는 것은 애석하게도 사실이다.\" -플린더스 페트리"
 lepsius.1202.g: "어서 오시오."
 lepsius.1203.t: "현지 발굴 완료"
 lepsius.1203.d: "발굴단이 현지 발굴을 마치고 마지막 발굴품의 수납에 나섰다. 이제 해당 인력은 다른 발굴이나 탐사에 나설 수 있게 되었다."
 lepsius.1203.f: "\"운명의 길은 어둡고\n앞날의 길은 모르니\n잠자리에 들을 때면\n코냑 한 잔 바라노라\" - 로베르트 콜데바이"
 lepsius.1203.g: "조만간 다른 발굴에 나서야겠군."
 lepsius.2000.t: "[SCOPE.sCharacter('lepsius_new_archaeologist_scope').GetLastName]의 삼시대 체계 고안"
 lepsius.2000.d: "[SCOPE.sCharacter('lepsius_new_archaeologist_scope').GetFullName] 덴마크 국립박물관장이 고고학 출토품을 #b 석기 시대#!, #b 청동기 시대#!, #b 철기 시대#!의 세 시대로 구분하는 체계를 고안해냈다. 이것으로 고고학에 혁명을 불러일으키게 되었다!"
 lepsius.2000.f: "\"보시다시피 어떤 유물은 반드시 함께 발견되지만 어떤 소재는 같은 발굴지에서 전혀 발굴되지 않는 사례가 있습니다. 이를테면 은은 철기와 철제 무기가 함께 발견되는 곳에서만 나오지요. 반면에 금은 철기와 청동기 출토지 모두에서 함께 발견될 가능성이 있습니다\n또 어떤 소재는 특정 형태의 무덤에서만 나온다는 점도 흥미롭지요. 석기는 화장하지 않은 시신과 석실묘에서만 나옵니다. 철기는 봉분묘에서만 발견되고요.\n이 모든 것을 통해 출토품의 연대를 훨씬 더 정확하게 추정할 수 있습니다. 처음엔 석기, 그 다음엔 청동기, 그리고 그 뒤에야 철기가 등장한 것이지요.\""
 lepsius.2000.g: "그토록 뛰어난 석학이 국가를 위해 힘쓴다면 얼마나 좋겠는가!"
 lepsius.2000.h: "박물관장직을 계속 지키는 것이 좋겠다..."
