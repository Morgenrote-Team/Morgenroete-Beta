 je_lepsius_archaeological_inspection: "고고학 시찰"
 je_lepsius_archaeological_inspection_reason: "[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] 박사는 기존 발굴지에서 이전에 탐험하지 못했던 새로운 고고학 구역을 탐색하고 있습니다. 어쩌면 지금껏 알려지지 않았던 고고학계 발견의 실마리를 제공할지 모릅니다."
 je_lepsius_archaeological_inspection_timeout: "[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] 박사는 소규모, 중규모, 대규모 중 하나에 해당되는 고고학 구역을 발견하게 됩니다. 우리 고고학자의 능력에 결과가 달렸습니다."
