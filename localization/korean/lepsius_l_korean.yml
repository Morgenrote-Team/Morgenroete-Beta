 notification_lepsius_rosellini_notification_name: "레프지우스가 로셀리니에게 보낸 편지"
 notification_lepsius_rosellini_notification_desc: "독일의 언어학자 카를 리하르트 레프지우스가 이탈리아 이집트학자 이폴리토 로셀리니에게 편지를 보내 자신이 발전시킨 상형문자 해독법을 전달하였습니다. 이집트로 탐사를 떠나야 한다는 목소리가 높아지고 있습니다."
 notification_lepsius_stephens_catherwood_expedition_notification_name: "스티븐스와 캐터우드의 탐사"
 notification_lepsius_stephens_catherwood_expedition_notification_desc: "미국 탐험가 존 로이드 스티븐스와 영국 화가 프레더릭 캐터우드가 유카탄 반도의 위험천만한 여정에서 돌아와 정글 속의 전설적인 유적에 대해 이야기하였습니다. 학계에서는 마야 문화를 한층 더 자세히 탐구하는 데 관심을 표했습니다."
 notification_lepsius_decipherment_akkadian_notification_name: "아카드어 해독"
 notification_lepsius_decipherment_akkadian_notification_desc: "온 나라의 신문에서 경험 많은 고고학자가 이끄는 저명한 연구진의 획기적인 연구 결과를 보도하고 있습니다. 바로 메소포타미아의 고대 언어가 비밀스러운 단계에서 벗어났다는 것입니다. 바빌로니아와 아시리아에 대한 본격적인 탐사를 이제 누가 막을 수 있겠습니까."
 notification_lepsius_support_schliemann_notification_name: "슐리만이 트로이를 발견하다!"
 notification_lepsius_support_schliemann_notification_desc: "독일 사업가 하인리히 슐리만이 오랜 시간 동안 설화로 여겨져 왔던 트로이를 실제로 발견하였습니다. 전세계의 고고학자들은 고대 그리스에 대한 새로운 열정을 갖게 되었습니다. 비록 신화 속에 잠긴 고대일지라도 말입니다."
 notification_lepsius_machu_picchu_notification_name: "마추픽추"
 notification_lepsius_machu_picchu_notification_desc: "한 고고학 탐사대가 안데스 산맥 깊숙한 곳에서 잉카 문명의 잃어버린 도시, 마추픽추를 발견하였습니다. 연구진들은 해당 지역의 심층적인 연구에 나서자고 목소리를 높이고 있습니다."
 notification_lepsius_excavation_artifacts_notification_name: "새로운 발굴 유물"
 notification_lepsius_excavation_artifacts_notification_desc: "오늘 아침 고고학 박물관은 우리 발굴 현장에서 출토된 새로운 유물들을 전달받았습니다."
 lepsius_hide_archaeological_decisions: "고고학 결단 숨김"
 lepsius_hide_archaeological_decisions_desc: "모든 고고학 결단을 숨김 처리하여 개요를 정리합니다."
 lepsius_show_archaeological_decisions: "고고학 결단 표시"
 lepsius_show_archaeological_decisions_desc: "모든 고고학 결단을 표시합니다."
 lepsius_cancel_excavation_decision: "발굴단 철수"
 lepsius_cancel_excavation_decision_desc: "특정 상황에서는 발굴단을 철수하는 것이 유리할 수도 있습니다. 입수한 유물과 수집품은 그대로 우리 손에 남지만, 상시 발굴은 끝마치게 됩니다."
 lepsius_gather_first_excavation_team_decision: "신규 발굴단 획득"
 lepsius_gather_first_excavation_team_decision_desc: "고고학 인력을 추가로 양성할 수 있습니다. 이로써 동시에 여러 곳에서 발굴을 진행할 수 있게 됩니다."
 lepsius_gather_second_excavation_team_decision: "신규 발굴단 획득"
 lepsius_gather_second_excavation_team_decision_desc: "고고학 인력을 추가로 양성할 수 있습니다. 이로써 동시에 여러 곳에서 발굴을 진행할 수 있게 됩니다."
 lepsius_gather_third_excavation_team_decision: "고고학자의 새 발굴단 모집"
 lepsius_gather_third_excavation_team_decision_desc: "고고학 인력을 한 팀 더 양성할 수 있습니다. 이로써 동시에 여러 곳에서 발굴을 진행할 수 있게 됩니다."
 lepsius_upper_egypt_expedition_decision: "왕가의 계곡"
 lepsius_upper_egypt_expedition_decision_desc: "고대 수도 테베와 왕가의 계곡이 있는 상이집트는 이집트학의 성지로 불립니다. 이 지역의 탐사 허가를 받아 이집트 유물을 탐색해야 합니다."
 lepsius_lower_egypt_expedition_decision: "피라미드군"
 lepsius_lower_egypt_expedition_decision_desc: "이집트의 피라미드는 태초부터 인류를 매혹 속에 빠뜨렸습니다. 하이집트의 모래 속에는 또다른 무덤과 사원, 도시까지 제 모습을 다시 드러내기만을 기다리고 있다고 전해집니다."
 lepsius_babylonia_expedition_decision: "문명의 요람"
 lepsius_babylonia_expedition_decision_desc: "메소포타미아 남부 지역에 해당되는 바빌로니아는 한때 강력했던 도시국가 바빌론의 명칭을 따왔습니다. 이 지역은 귀중한 고고학적 유물이 끊임없이 발견되는 '문명의 요람'으로 여겨집니다. 분명 박물관에 소장되어야 마땅할 것입니다."
 lepsius_assyria_expedition_decision: "아시리아의 정원"
 lepsius_assyria_expedition_decision_desc: "아시리아는 메소포타미아 북부 지역을 가리키는 말로 아수르와 니네베의 두 대도시가 자리해 있었습니다. 이 지역에 대한 드문 지식은 그 출처를 따지면 성경으로 거슬러 올라가는 경우가 아직도 있지만, 그보다 더 믿을 만한 역사적 단서가 존재할지도 모릅니다."
 lepsius_argolis_expedition_decision: "아가멤논의 도시"
 lepsius_argolis_expedition_decision_desc: "트로이가 발견된 후, 회의적이던 학자들조차 고대 그리스 신화가 단순한 동화 그 이상이라는 사실을 깨닫게 되었습니다. 청동기 시대 도시의 유적은 오늘날까지 아르고리스에 있다고 전해지는데, 그 중 가장 잘 알려진 곳이 미케네입니다. 우리도 그 사실을 우리 손으로 입증해야 합니다."
 lepsius_crete_expedition_decision: "미노타우루스 설화"
 lepsius_crete_expedition_decision_desc: "전설 속의 미노스 왕은 크레타섬 전역을 다스렸다고 전해집니다. 트로이나 미케네처럼 이 설화에도 실체가 있는 것으로 보입니다. 신화로만 여겨졌던 미노아 문명의 유물이 섬에서 점차 발견되고 있기 때문입니다. 우리도 그 유물을 확보할 필요가 있겠습니다."
 lepsius_yucatan_expedition_decision: "마야의 잃어버린 도시"
 lepsius_yucatan_expedition_decision_desc: "정글 숲 한가운데 미지의 거대 도시가 존재한다는 목격담이 늘고 있습니다. 한층 더 깊이 조사하여 유카탄 반도에 고고학 탐사대를 파견해야겠습니다."
 lepsius_peru_expedition_decision: "잉카의 숨겨진 유산"
 lepsius_peru_expedition_decision_desc: "페루 상공을 비행하다 안데스 산맥에 이상한 요새와 성벽 유적이 세워진 것을 목격했다는 비행사들이 있습니다. 아무래도 스페인 사람들이 잉카의 문화 유산을 완전히 파괴하진 못했나 봅니다. 원주민이 저항하던 일부 마을은 오늘날까지도 발견된 적이 없습니다."
 lepsius_found_archaeological_museum_decision: "고고학 박물관 수립"
 lepsius_found_archaeological_museum_decision_desc: "자부심 있는 나라는 전부 그 나라의 수도에 특별한 박물관을 두고, 대담한 모험이나 과학적 탐사로 확보한 최고 수준의 문화유산을 한 데 모아 전시해 둡니다. 유물의 수와 소장품의 다양성은 국제적인 위상을 높일 뿐만 아니라 교육적 가치도 지니게 됩니다."
 lepsius_visit_archaeological_museum_decision: "고고학 박물관 방문"
 lepsius_visit_archaeological_museum_decision_desc: "우리가 수집한 유물 통계 현황을 살피고 품격 있는 전시로 재구성합니다."
 lepsius_appoint_lead_scientist_decision: "수석 학자 임명"
 lepsius_appoint_lead_scientist_decision_desc: "고고학 박물관의 신규 수석 학자를 임명합니다. 해당 인물은 15년에서 20년 동안 재직하게 됩니다. 이 직함으로 해당 기간 동안 정치 무대에서 사라지는 것을 막게 됩니다."
 lepsius_found_archaeological_society_decision: "고고학회 창설"
 lepsius_found_archaeological_society_decision_desc: "우리나라에서 꾸준히 늘어난 것은 고고학을 향한 관심 뿐만이 아닙니다. 지난 수년 간의 탐사와 발굴, 유물 출토로 우리나라는 놀라운 수준의 고고학 지식을 축적해 왔습니다. 뛰어난 고고학자가 고고학회를 설립하면 과학과 지적 역량을 모아 새로운 활력을 불어넣을 수 있을 것입니다. 이는 과학적 성과를 도모할 뿐만 아니라 후대 고고학자들의 경험을 향상시킬 것입니다."
 lepsius_inspect_excavation_decision: "심층 고고학 조사 실시"
 lepsius_inspect_excavation_decision_desc: "발굴이 이루어지는 지역의 조사 강화를 위하여 경험 많은 고고학자를 그곳에 파견할 수 있습니다. 파견된 고고학자는 1년 이내에 새로운 발굴지를 마련하여 집중적인 연구에 나서게 되며, 그 과정에서 과거에는 알려지지 않았던 대표적인 고고학 발견의 징후를 확보할 수 있습니다. 그 성공 여부는 우리 고고학자의 경험치에 크게 달려 있습니다. 고고학회를 설립하는 것 역시 우리가 성공할 확률을 높여줄 것입니다."
 lepsius.2.t: "로셀리니 교수님께 보내는 편지"
 lepsius.2.d: "독일의 언어학자 [SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName](이)가 이탈리아 이집트학자 이폴리토 로셀리니에게 편지를 보내 자신이 발전시킨 상형문자 해독법을 전달하였다. 이집트로 탐사를 떠나야 한다는 목소리가 높아지고 있다."
 lepsius.2.f: "프랑수아 샹폴리옹이 세상을 떠나면서 상형문자 연구도 중단되었습니다. 1837년 독일의 젊은 언어학자 [SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName](이)가 샹폴리옹의 가까운 동반자이자 1829년 프랑스-토스카나 이집트 탐사대를 공동으로 이끌었던 이폴리토 로셀리니에게 편지를 보냈습니다. 이 학자는 샹폴리옹이 축적한 지식을 체계화하여 발표했으며, 이집트학을 진정한 학문으로 발돋움하는 데 중대한 역할을 하였습니다. 또 유럽의 정계 인사들을 설득하여 이집트로의 탐사를 추진하였습니다."
 lepsius.2.a: "이집트의 경이로움을 탐색하겠다!"
 lepsius.3.t: "스티븐스와 캐터우드"
 lepsius.3.d: "미국 탐험가 존 로이드 스티븐스와 영국 화가 프레더릭 캐터우드가 유카탄 반도의 위험천만한 여정에서 돌아와 정글 속의 전설적인 유적에 대해 이야기하였다. 학계에서는 마야 문화를 한층 더 자세히 탐구하는 데 관심을 표했다."
 lepsius.3.f: "유럽인이 발을 내딛기 전까지 신대륙은 단순히 미개인과 야만인의 땅이었는가? 탐험가 존 로이드 스티븐스와 프레데릭 캐터우드는 이러한 세계관을 근본부터 뒤흔들었다. 이 영국인과 미국인 탐험가는 수년 동안 유카탄 반도의 정글을 누비며 오래전에 사라진 메소아메리카 문명의 유적지 44곳을 방문했다고 밝히고 있다. 현지 주민들은 오랫동안 정글 속에 숨겨진 사원과 한동안 잊혀졌던 도시들을 전해 왔지만 스티븐스의 보고서, 특히 캐터우드의 놀라운 석판화는 지금껏 전혀 알려지지 않았던 세계를 열었다. 사원과 조각상, 석비를 묘사한 그림은 낭만주의자들의 상상력을 자극하는 데서 그치지 않고, 호기심에서부터 미화, 그리고 진정한 과학적 연구에 이르기까지, 미지의 문명을 향한 관심의 물결을 미국과 유럽 전역으로 확대하고 있다."
 lepsius.3.a: "쓸만한 가죽 재킷을 쟁여놔야겠군."
 lepsius.4.t: "아카드어 해독"
 lepsius.4.d: "온 나라의 신문에서 경험 많은 고고학자가 이끄는 저명한 연구진의 획기적인 연구 결과를 보도하고 있다. 바로 메소포타미아의 고대 언어가 더 이상 비밀의 영역이 아니라는 소식이다. 바빌로니아와 아시리아에 대한 본격적인 탐사를 막을 사람은 아무도 없다."
 lepsius.4.f: "일찍이 18세기 독일 수학자 카르슈텐 니부어 시대에도 쐐기문자 점토판은 학계의 관심을 불러일으켰으며 이것을 해독하고 그 언어를 번역하려는 노력이 이어졌다. 게오르크 프리드리히 그로테펜트, 앙크티유-뒤페롱, 앙투안 이자크 실베스트르 드 사시는 고대 페르시아어 쐐기문자의 해독에 결정적인 역할을 하였으며, 상형문자와 4개 언어로 쓰인 '칼리우스 항아리'의 해독으로 이들의 연구가 입증되기에 이르렀다. 지금도 잘 알려진 페르시아어 외에도 메소포타미아의 고대 언어가 담긴 베히슈툰의 기념비가 발견되면서 엘람어, 바빌로니아어, 아카드어를 다시 해석할 수 있게 되는 것은 시간 문제였다. 우리 학술원에서는 이 고대 언어를 해석할 수 있다고 주장하는 여러 아시리아학자들을 초청하여, 동일한 비문을 놓고 각자 번역하도록 하는 시험에 나섰다. 그 결과는 놀랍게도 모든 학자들의 해석이 일치하는 것이었다. 이제 메소포타미아의 인류 최대 문명에 관한 본격적인 탐구가 시작되리라."
 lepsius.4.a: "우리가 샹폴리옹의 후손이다."
 lepsius.5.t: "슐리만의 트로이 발견!"
 lepsius.5.d: "독일 사업가 하인리히 슐리만이 오랜 시간 동안 설화로 여겨져 왔던 트로이를 실제로 발견하는 데 성공했다. 전세계의 고고학자들은 고대 그리스에 대한 새로운 열정을 갖게 되었다. 그것이 비록 신화 속에 잠긴 고대일지라도 말이다."
 lepsius.5.f: "과학은 어디에서 끝나고, 신화는 어디서부터 시작되는가? 현대는 종교와 지식의 분리를 위해 갖은 노력을 기울여 왔다. 수십년 전만 해도 현실로 여겼던 신화와 서사시를 동화의 영역으로 밀어낸 것이다. 그런데 갑자기 언론에, 그 다음에는 학계에 속보가 전해졌다. 트로이가 발견됐다는 것이다! 호메로스가 일리아스에서 찬미했던, 서양의 지식인이라면 모두 알고 있는 프리아모스의 전설 속 도시 트로이가 단순한 신화 이상의 실체를 갖추고 있다는 것이다. 독일 사업가 하인리히 슐리만은 세상의 체념에도 아랑곳않고 귀중한 보물을 발견했다고 주장했다. 그 이름하여 프리암의 보물인 것이다. 고고학계는 이 사건으로 충격과 동시에 매혹을 느끼고 있다. 과연 머나먼 과거의 다른 설화도 실제일 가능성이 있는가? 에게해 연안에는 다시 발견되기를 기다리는 수중 도시가 더 많이 숨겨져 있는 것은 아닐까?"
 lepsius.5.a: "여신이여, 분노를 노래하소서, 펠레우스의 아들 아킬레우스..."
 lepsius.6.t: "마추픽추"
 lepsius.6.d: "한 고고학 탐사대가 안데스 산맥 깊숙한 곳에서 잉카 문명의 잃어버린 도시, 마추픽추를 발견하였다. 연구진들은 해당 지역의 심층적인 연구에 나서자고 목소리를 높이고 있다."
 lepsius.6.f: "오늘날 우리를 지배하는 몇 가지 서사가 있다. 정복되지 않은 것이 없고, 발견되지 않은 것이 없으며, 논하지 않은 것이 없다. 식민지 깃발이 꽂히지 않은 곳은 없고, 철도로 연결되지 않은 마을은 없으며, 우리가 알지 못하는 획기적인 기술도 없다고들 한다. 하지만 최고위층의 허무주의가 무너지는 순간들이 있다. 극지 탐험, 창공 정복, 그리고 인류의 마지막 미스터리에 관한 탐구는 역사가 아직 끝나지 않았음을 보여주고 있다. 마추픽추의 발견은 우리가 이해하고 다스린다고 생각하는 세상에 우리가 아는 것이 얼마나 적은지를 보여주는 단편적인 사례에 그친다. 스페인 사람들을 속이기 위해 지은 것으로  해석되는 미지의 잉카 도시들에 관한 이야기에는 어쩌면 진실이 깃들어 있을지도 모른다. 자유로운 잉카 문명의 마지막 수도였던 빌카밤바는 오늘날까지도 발견되지 않고 있다..."
 lepsius.6.a: "페도라를 집어들 시간이군!"
 lepsius.10.t: "박물관 개관"
 lepsius.10.d: "고고학 박물관이 오늘 성대한 개관식을 갖고 문을 열었다."
 lepsius.10.f: ""
 lepsius.10.g: "박물관을 둘러볼 생각을 하니 기대되는군!"
 lepsius.10.h: "샴페인! 샴페인을 터뜨립시다!"
 lepsius.11.t: "박물관 방문"
 lepsius.11.d: "고고학 박물관에 오신 것을 환영합니다."
 lepsius.11.f: "우리 박물관의 소장품에는 현재 #T 총 #G [ROOT.Var('lepsius_total_artifacts').GetValue]개#!의 유물#!이 있습니다.\n\n전체 유물은 다음 소장품으로 분류됩니다.\n\n#T 이집트 소장품: #!\n@lepsius_egypt_minor! 일반 유물 #G [ROOT.Var('lepsius_egyptian_artifact_minor').GetValue]개#!와 @lepsius_egypt_major! 대표 유물 #G [ROOT.Var('lepsius_egyptian_artifact_major').GetValue]개#!\n\n#T 메소포타미아 소장품:#!\n@lepsius_mesopotamia_minor! 일반 유물 #G [ROOT.Var('lepsius_mesopotamian_artifact_minor').GetValue]개#!와 @lepsius_mesopotamia_major! 대표 유물 #G [ROOT.Var('lepsius_mesopotamian_artifact_major').GetValue]개#! \n\n#T 에게 문명 소장품: #!\n@lepsius_aegean_minor! 일반 유물 #G [ROOT.Var('lepsius_aegean_artifact_minor').GetValue]개#!와 @lepsius_aegean_major! 대표 유물 #G [ROOT.Var('lepsius_aegean_artifact_major').GetValue]개#! \n\n#T 선콜럼버스 소장품: #!\n@lepsius_precolumbian_minor! 일반 유물 #G [ROOT.Var('lepsius_precolumbian_artifact_minor').GetValue]개#!와 @lepsius_precolumbian_major! 대표 유물 #G [ROOT.Var('lepsius_precolumbian_artifact_major').GetValue]개#! \n\n#T 고고학 발굴단: #!\n총 #G [ROOT.Var('lepsius_total_excavation_teams').GetValue]팀#! 중에서 #G [ROOT.Var('lepsius_excavation_teams').GetValue]팀#!을 사용할 수 있습니다."
 lepsius.11.g: "참 유익한 시간이었습니다. 다음에 뵙겠습니다!"
 lepsius.11.h: "이집트 전시관 방문"
 lepsius.11.i: "메소포타미아 전시관 방문"
 lepsius.11.j: "에게 문명 전시관 방문"
 lepsius.11.k: "선콜럼버스 전시관 방문"
 lepsius.11.l: "선임 학자 방문"
 lepsius.11.m: "대표 유물 전시관 방문"
 lepsius.11.n: "세계 문화 소장품 방문"
 lepsius.11.o: "가장 많은 유물을 보유한 국가를 보여주시오!"
 lepsius.12.t: "이집트 전시관"
 lepsius.12.d: "이곳은 상하 이집트에서 발견된 유물을 전시하고 있습니다."
 lepsius.12.g: "소규모 전시로 정비한다."
 lepsius.12.h: "중규모 전시로 정비한다."
 lepsius.12.i: "대규모 전시로 정비한다."
 lepsius.12.j: "완벽한 전시 배치"
 lepsius.12.k: "중앙 홀로 돌아가기"
 lepsius.12.l: "박물관 떠나기"
 lepsius.13.t: "메소포타미아 전시관"
 lepsius.13.d: "이곳은 바빌로니아와 아시리아에서 발견된 유물을 전시하고 있습니다."
 lepsius.14.t: "에게 문명 전시관"
 lepsius.14.d: "이곳은 아르골리스와 크레타에서 발견된 유물을 전시하고 있습니다."
 lepsius.15.t: "선콜럼버스 시대 전시관"
 lepsius.15.d: "이곳은 유카탄과 페루에서 발견된 유물을 전시하고 있습니다."
 lepsius.16.t: "[SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName]"
 lepsius.16.d: "이곳은 우리나라 최고의 고고학자, [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] 교수의 집무실입니다."
 lepsius.16.f: "[SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName]의 총 고고학 경험치는 #G [ROOT.Var('lepsius_archaeologist_var').GetVariable('lepsius_archaeologist_experience_var').GetValue]#!입니다.\n\n우리나라가 후원한 탐사 횟수: #G [ROOT.Var('lepsius_total_expeditions').GetValue]회#!\n\n우리나라가 이뤄낸 주요 고고학 발견: #G [ROOT.Var('lepsius_total_discoveries').GetValue]건#!"
 lepsius.16.g: "고고학 회의 개최"
 lepsius.17.t: "대표 유물"
 lepsius.17.d: "이곳은 박물관의 대표 유물 현황을 표시합니다."
 lepsius.17.egypt: "\n#T 이집트:#!\n"
 lepsius.17.sarcophagus: "우리나라는 왕가의 계곡에 있던 잊혀진 무덤에서 #E 신원 불명 파라오의 관#!을 발견하였습니다.\n"
 lepsius.17.nefertiti: "#E 네페르티티의 흉상#!은 험난한 발굴 작업과 외교 분쟁 끝에 거둔 성과입니다.\n"
 lepsius.17.tut: "#E 투탕카멘의 가면#!은 왕가의 계곡에 위치한 전설적인 무덤의 가장 귀중한 보물입니다.\n"
 lepsius.17.narmer: "#E 나르메르 팔레트#!는 인류가 발견한 가장 오래된 문서로 꼽히며, 일각에서는 이집트의 건국을 기록한 것으로 봅니다.\n"
 lepsius.17.mesopotamia: "\n#T 메소포타미아:#!\n"
 lepsius.17.lamassu: "우리나라는 아시리아에서 위험천만한 과정을 거친 끝에 #E 사르곤 왕의 라마수 석상#!을 확보하였습니다.\n"
 lepsius.17.meskalamdug: "우리는 바빌로니아에서 이뤄진 대대적인 발굴 조사 끝에 #E 메스칼람두그의 투구#!를 찾아냈습니다.\n"
 lepsius.17.sargon: "고대 아시리아의 수도 니네베에서의 발굴 작업을 거쳐 #E 사르곤의 가면#!을 찾아냈습니다.\n"
 lepsius.17.gilgamesh: "새로운 파편을 끊임없이 탐색하고 최신 연구를 진행한 끝에 #E 길가메시 서사시#!의 일부분을 복원하는 데 성공하였습니다.\n"
 lepsius.17.greece: "\n#T 그리스:#!\n"
 lepsius.17.agamemnon: "#E 아가멤논의 가면#!은 우리나라가 미케네에서 이룩한 위대한 발견을 대표하는 유물입니다.\n"
 lepsius.17.priam: "우리나라는 하인리히 슐리만에게서 #E 피리암의 보물#!을 선물받았습니다.\n"
 lepsius.17.snake: "우리는 미노아 문명을 대표하는 유물로 인정받는, 일명 크레타의 #E 뱀 여신상#!을 다소 특이한 과정을 거쳐 박물관에 들여왔습니다.\n"
 lepsius.17.diskos: "우리는 끈질긴 발굴조사 끝에 #E 파이스토스의 원반#!을 출토하였습니다.\n"
 lepsius.17.southamerica: "\n#T 남아메리카:#!\n"
 lepsius.17.kukulkan: "신비롭고 위험천만한 여정에 나선 우리 고고학자가 #E 쿠쿨칸의 보석#!을 입수하였습니다.\n"
 lepsius.17.pakal: "우리 고고학자들은 팔렌케에서 수년 동안 발굴을 진행한 끝에 #E 파칼의 부장품#!을 확보하였습니다.\n"
 lepsius.17.other: "\n#T 그 외:#!\n"
 lepsius.17.abraham: "우리 고고학자가 종교적 여정을 거쳐 #E 아브라함의 지팡이#!를 찾아냈습니다.\n"
 lepsius.17.arne: "환상적인 모험을 떠난 우리네 용감한 고고학자들은 #E 아르네 사크누셈의 원고#!를 발견하였습니다. 이는 그가 16세기에 지구 중심부로 들어갔다는 증표입니다.\n"
 lepsius.17.skull: "우리나라는 믿음직한 골동품상으로부터 몹시 신비로운 #E 크리스탈 해골#!을 입수하였습니다.\n"
 lepsius.17.hoa: "이스터섬의 모험가가 #E 모아이 호아 하카나나이아#!라는 신비로운 석상을 발견하였습니다.\n"
 lepsius.17.summer: "중국의 황궁이 불길에 휩싸인 가운데 우리는 #E 이화원의 귀중한 약탈품#!을 상당수 손에 넣었습니다."
 lepsius.18.t: "세계 문화 전시관"
 lepsius.18.d: "이곳은 세계의 여러 문화권에서 만들어진 유물을 전시하고 있습니다."
 lepsius.18.f: "이 전시관에서는 지금도 일부 남아 있는 여러 문화권의 인류학, 고고학 유물을 아우르고 있습니다. 유물 #G 10점#!을 확보하면 전시를 개최할 수 있습니다. 그보다 더 상위 규모의 전시는 없지만 소장품 하나하나가 더 큰 가치를 지닙니다. 현재 본 전시관은 다음의 전시실로 구성되어 있습니다.\n\n@lepsius_oceanian_minor!일반 오세아니아 유물 #G [ROOT.Var('lepsius_oceanic_artifact_minor').GetValue]#!점\n@lepsius_oceanian_major!대표 오세아니아 유물 #G [ROOT.Var('lepsius_oceanic_artifact_major').GetValue]#!점\n\n@lepsius_east_asian_minor!일반 동양 유물 #G [ROOT.Var('lepsius_fareastern_artifact_minor').GetValue]#!점\n@lepsius_east_asian_major!대표 동양 유물 #G [ROOT.Var('lepsius_fareastern_artifact_major').GetValue]#!점\n"
 lepsius.18.g: "동양 전시를 정비한다."
 lepsius.18.h: "오세아니아 전시를 정비한다."
 lepsius.22.d: "우리 수도의 고위 관계자들이 한자리에 모였다. 고고학 박물관에서 새로운 전시 개최에 나섰기 때문이다."
 lepsius.22.f: "상류층과 중산층을 아우르는 인파가 아침부터 박물관 입구 앞에 모여들었다. 새로운 전시는 수석 고고학자의 강연으로 시작되어 최근 발굴 조사와 현장 발굴에 대한 생생한 이야기를 들려줄 것이다. 강연 후에는 미술 애호가와 관람객들이 전시품을 직접 감상할 수 있다. 오늘은 [ROOT.GetCountry.GetNameNoFlag]에 있어 대내외적으로 중요한 날이다. 강대국들도 우리의 품격 있는 소장품을 우러러보기 때문이다."
 lepsius.22.g: "입장권을 하나 더 받았으면 좋겠는데."
 lepsius.24.t: "신규 에게 문명 전시"
 lepsius.25.t: "신규 선콜럼버스 전시"
 lepsius.26.t: "고고학 회의 종료"
 lepsius.26.d: "오늘 우리 고고학회가 주최한 학술회의가 마무리되었습니다. [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] 교수는 이번 기회를 통해 자신의 지식을 넓혀나갔습니다."
 lepsius.26.f: "수 주에 걸친 회의와 강연, 컨퍼런스, 화기애애한 만남이 막을 내렸습니다. 학회와 밀접한 관계를 맺은 국내외 고고학자들이 그간의 발견과 탐사, 학설을 교류하였습니다. 이번 행사는 대성공을 거두었으며 참여자 모두의 시야를 넓히는 계기로 작용하였습니다."
 lepsius.26.g: "누구의 가죽 재킷이 제일 멋진가에 관한 논쟁은 항상 벌어지는군..."
 lepsius.27.t: "신대륙 문화 전시"
 lepsius.30.t: "신임 수석 학자"
 lepsius.30.d: "고고학 박물관에서 [SCOPE.sCharacter('lepsius_museum_lead_scientist').GetFullName] [SCOPE.sCharacter('lepsius_museum_lead_scientist').GetPrimaryRoleTitle]를 신임 수석 학자로 임명하였다."
 lepsius.30.f: ""
 lepsius.30.g: "경축드립니다!"
 lepsius.31.t: "수석 학자를 박물관장에 임명"
 lepsius.31.d: "[SCOPE.sCharacter('lepsius_museum_lead_scientist').GetFullName] [SCOPE.sCharacter('lepsius_museum_lead_scientist').GetPrimaryRoleTitle]가 신임 박물관장으로 임명되는 영예를 누리게 되었다. 이에 따라 현직에서 물러나게 되었다."
 lepsius.31.f: "지난 세월 동안 [SCOPE.sCharacter('lepsius_museum_lead_scientist').GetFullName](은)는 과학과 문화에 일생을 바쳐 왔으며, 정치에 피로감을 느낀 지 오래인 상황입니다. 박물관 운영에만 전념하기로 한 그의 결정은 많은 이들에게 그리 놀라운 일이 아니었습니다. 그는 더 이상 정치 활동이나 탐사에 나서지 않을 것이며, 인사 이동이 이루어지게 되어 유감스럽게 생각합니다."
 lepsius.31.g: "안녕히 가시오..."
 lepsius.80.t: "고고학의 새 시대!"
 lepsius.80.d_egypt: "[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] 박사가 고대 이집트 마을의 여러 실상을 밝혀낼 새로운 고고학 연구법을 활용하였다. 발견 사항을 기록하는 것은 물론 층위학과 삼시기법을 동원하여 고고학의 새 시대를 열게 된 것이다."
 lepsius.80.d_mesopotamia: "[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] 박사가 고대 메소포타미아 마을의 여러 실상을 밝혀낼 새로운 고고학 연구법을 활용하였다. 발견 사항을 기록하는 것은 물론 층위학과 삼시기법을 동원하여 고고학의 새 시대를 열게 된 것이다."
 lepsius.80.d_aegean: "[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] 박사가 고대 에게해 마을의 여러 실상을 밝혀낼 새로운 고고학 연구법을 활용하였습니다. 발견 사항을 기록하는 것은 물론 층위학과 삼시기법을 동원하여 고고학의 새 시대를 열게 된 것입니다."
 lepsius.80.d_precolumbian: "[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] 박사가 고대 선콜럼버스 마을의 여러 실상을 밝혀낼 새로운 고고학 연구법을 활용하였다. 발견 사항을 기록하는 것은 물론 층위학과 삼시기법을 동원하여 고고학의 새 시대를 열게 된 것이다."
 lepsius.80.f: "\"마을의 유물이 발견된 지층은 그 마을에 관하여 많은 것을 알려줍니다. 예컨대 석탄이 많이 들어 있는 지층은 그 시기의 유물이 더 이상 발견되지 않는다는 것을 의미하지요. 아마 화재로 마을이 파괴되고 버려졌을 가능성이 큽니다. 또 금속 유물이 전혀 없다는 것은 이곳이 석기 시대의 마을이었음을 시사합니다. 우리가 발견한 유골 역시 영양실조 상태에 치아가 마모되었다는 점에서 대단히 흥미롭습니다.\""
 lepsius.80.g: "식견이 높군!"
 lepsius.100.t: "[ROOT.GetCountry.GetAdjectiveNoFlag] 고고학 탐사 준비"
 lepsius.100.d: "고고학 탐사 준비가 본궤도에 올랐다. 다만 여정을 얼마나 오랫동안 지원해야 하는가는 아직 불확실하다."
 lepsius.100.f: "[ROOT.GetCountry.GetName]에서 학계의 바람에 응하여 오래토록 고대하던 탐사대를 파견하기로 결정하면서, 예산 문제 뿐만 아니라 탐사의 기간 역시 머지않아 정치적 쟁점으로 떠오르게 되었습니다. 왕복 여정만 하더라도 귀중한 시간이 소요될 텐데, 정부 내각의 구두쇠 영감들은 골동품 상인에게서 유물 몇 점만 사올 협상가 몇 명만 보내면 되지 않겠느냐며 고집를 부리고 있습니다."
 lepsius.100.g: "어줍잖게 다녀와서는 안될 일이다. 긴 여정이 될 것이다."
 lepsius.100.h: "중간 길이의 여정으로 절충하면 되지 않을까."
 lepsius.100.i: "짧은 여정으로 충분하다."
 lepsius.110.t: "탐사 대장을 향한 논란"
 lepsius.110.d: "지식인 세력에서는 자신들의 대표가 이번 고고학 탐사의 대장으로 나설 가능성이 높다고 보고 있다. 하지만 반대하는 목소리도 적지 않다."
 lepsius.110.f: "우리나라의 고위층들이 분열되었다. 탐사대에 대한 국가 예산 지원으로 비판하거나 질투하는 자들이 나서게 된 것이다. 지식인들은 탐사대를 자신들의 주권 대상으로 여기고 있다. 여야 할 것 없이 자신들에게 참관인 자격을 줄 것을 요구하고 있다. 지식인 대표가 이번 과제에 가장 적합하다는 것은 부인할 수 없지만, 다른 가능성도 있는 법이다..."
 lepsius.110.g: "지식인이 가장 적합하다."
 lepsius.110.h: "정부 대표가 탐사대에 동행한다."
 lepsius.110.i: "이번 일에는 야당 정치인이 제격이다."
 lepsius.110.j: " 이번 일은 고고학 경험을 갖춘 인물이 맡아야 한다."
 lepsius.110.k: "이런 영예는 오직 왕위 계승자에게 돌아가야 한다."
 lepsius.120.t: "육군 무관"
 lepsius.120.d: "이번 고고학 탐사에 육군 무관을 모집할 것을 강력히 권고하는 목소리가 있다."
 lepsius.120.f: "군부에서 이번 탐사대에 파견될 육군 무관으로 세 명의 후보를 추천하였다. 국방부는 오늘 이 같은 결정을 발표하였다. 최종 선발자는 아직 확정되지 않았다."
 lepsius.120.g: "[SCOPE.sCharacter('lepsius_military_attache_1').GetFullName]."
 lepsius.120.h: "[SCOPE.sCharacter('lepsius_military_attache_2').GetFullName]."
 lepsius.120.i: "[SCOPE.sCharacter('lepsius_military_attache_3').GetFullName]."
 lepsius.130.t: "예술가의 탐사대 합류"
 lepsius.130.d: "우리 학회의 예술가들이 다가오는 고고학 탐사에 참여하고 싶다는 의사를 밝혀 왔다."
 lepsius.130.f: "탐사대가 머지않아 잃어버린 도시와 미지의 예술 작품을 찾아 나설 것이라는 소문이 예술원 내에 돌고 있다. 화가와 소묘가들은 앞서 나폴레옹의 이집트 원정에서 느꼈던 분위기와 색채, 풍광에 영감을 받았다. 고고학 유적지의 드로잉과 스케치를 그려줄 지원자도 충분한 상황. 탐사대가 이렇게 커지면 추가 예산이 들어가야 하겠지만, 그만한 가치가 충분히 있을 것이다."
 lepsius.130.a: "기꺼이 받아들이겠소."
 lepsius.130.b: "고맙지만 사양하겠소."
 lepsius.140.t: "고고학자의 경험 많은 학자 모집"
 lepsius.140.f: "공통의 관심사가 우리를 하나로 묶었다. 우리 대장은 고고학, 역사학, 인류학에 조예가 깊은 학자들과 친분이 있다. 탐사대의 인재풀을 넓히면 이번 탐사의 결과에도 분명 긍정적인 영향을 미칠 것이다. 하지만 이는 단순한 호의가 아니다. 숙식과 급여는 국가에서 부담해야 한다. 일각에선 이러한 지원을 탐사대장의 '지인 찬스'라 부를 지도 모르겠지만, 대장은 탐사대 규모 확대가 순전히 과학적인 목적에 의한 것이라고 우리 측에 확언했다."
 lepsius.140.a: "탐사대가 한층 더 강화되겠군."
 lepsius.140.b: "고고학자의 파벌 놀음에 쓸 예산은 없소!"
 lepsius.150.t: "자연과학자의 탐사 동행"
 lepsius.150.d: "과학자들이 다가오는 탐사를 계기로 실험을 진행하고 싶다는 의사를 전했다."
 lepsius.150.f: "우리나라 대학들도 이번 탐사의 영향을 피해가지 못했다. 일부 학자들은 지리 환경을 연구하거나, 천문학적 관측값을 비교하거나, 기상 실험을 수행하기 위해 탐사대에 동행하겠다는 의사를 표했다. 암석과 목재 견본을 채취하면 이번 탐사의 과학적 성과를 향상시킬 수 있다고 생각하는 학자도 있다. 선발된 과학자들 중 상당수는 오랫동안 해외여행을 꿈꿔왔으며, 이번 기회를 통해 해외로 나갈 수 있기를 간절히 기다려온 것이 분명하다. 그저 무임 승차를 해서라도 함께 나아갈 구실을 찾고 있었을 뿐이다. 이들도 예산 지원을 바라는 것은 당연한 사실!"
 lepsius.150.a: "정말 훌륭한 생각이야!"
 lepsius.150.b: "수염만 수북하다고 다 챙겨줄 순 없는 노릇이오..."
 lepsius.200.t: "출발지에 도착한 탐사대"
 lepsius.200.d: "탐사대가 출발지에 도착했다. 출발 전 마지막 준비에 나설 시간이다."
 lepsius.200.f_ex_upe: "\"룩소르, 룩소르다!\" 카르나크 신전이 수평선 너머로 모습을 드러내자 함성이 터져 나왔다. 나일 강 속으로 배가 기우뚱할까 위태로운 상황에서도 한쪽 난간에 기대어 모인 탐사대원들은 테베라 불리었던 고대 이집트 도시의 윤곽을 바라보며 눈을 반짝였다. 수천 년 된 건물의 흔적들이 나일강변을 따라 늘어서 있는가 하면, 허물어진 집과 천막 사이로 오벨리스크가 솟는다. 반면 나일 강변의 반대쪽에는 모래빛의 갈색 산맥이 솟아 있을 뿐인데, 전설 속 왕들의 계곡이 숨겨져 있고, 아직 그 존재를 모르는 파라오의 무덤이 있다고 전한다. 허나 그곳으로 향하기 전에 룩소르에서 해결해야 할 몇 가지가 아직 남아 있다..."
 lepsius.200.f_ex_loe: "햇빛에 반짝이는 나일 강의 수면 위로 '세계의 어머니'가 모습을 드러냈다. 첨탑과 돔이 주변의 경치를 장식하며 그 옛날과 오늘날 중동의 운명을 좌우했던 이 도시의 위대함과 중대함을 전하고 있다. 파티마 왕조 건축의 정교한 장식은 물론, 다채로운 바자르 시장과 카펫이 거리를 수놓는다. 허나 그 풍경에는 더한 것이 있다 - 저 멀리, 피라미드의 꼭대기가 흘러간 시대를 예고하는 저 곳이 우리 여정의 진정한 목적지인 것이다. 허나 그 전에 우리는 카이로에서 준비해야 할 몇 가지가 남았다."
 lepsius.200.f_ex_bab: "메소포타미아의 최대 도시 바그다드는 활기로 가득하다. 이곳은 카이로처럼 아랍 세계의 중심이고, 카이로처럼 권력과 위신이 자리한 곳이었다. 허나 기자의 피라미드군이 태고의 세계를 알리는 카이로와는 달리 바그다드에는 바빌론과 아카드 제국을 떠올리게 할 만한 것이 적다. 부주의한 탐험 대원이 수상한 상인에게서 구매한 자칭 골동품마저도 가품으로 드러났던 것이다. 이집트와 마야의 석조 건축물은 사라진 문명의 흔적을 여전히 품고 있으나, 이곳에는 그와 비견될 만한 것이 별로 없다. 아무래도 우리는 처음부터 다시 시작해야 할지 모른다."
 lepsius.200.f_ex_ass: "레이어드가 님루드를 발굴한 이래 아시리아에서 또 무엇을 발견할 수 있는가? 모술의 상인이 이르기를 꽤나 많다고 한다. 불과 한 달 전에는 모래 속에서 라마수의 두상이 발견되었다고 한다. 시장에서는 항상 좋은 유물을 구할 수 있다고 그는 우리에게 일러두었다. 하지만 모든 유물을 입수하지 못한 데에는 그 지역의 쿠르드족 세력이 한몫했다. 발굴 허가 여부와는 관련 없이 아무나 자기네 구역에서 유물을 발굴하는 것을 허락치 않았기 때문이다. 우리는 이 경고를 마음에 새겨두고, 여정에 나서기 전에 필요한 물건들을 준비하려고 한다."
 lepsius.200.f_ex_arg: "아, 정겨운 아테네여! 우리 탐사대가 찾는 것만큼 오래된 것은 별로 없지만, 며칠 더 머물기에는 충분한 곳이 아티카다. 그리스에는 대도시가 그리 많지 않아서, 우리 탐사대도 시골 지역으로 출발하기 전에 가장 필요한 것들을 준비하는 곳에 있어 선택지가 많지 않았다. 우리 고고학 안내인은 서두르자고 재촉하였는데, 몇몇 학자들이 고대의 대리석이나 그리스 포도주 같은 것에 너무 많은 시간을 허비했기 때문이다. 따사로운 햇살과 올리브나무 그늘, 아카드의 전원 풍경은 그곳에 남으며 휴식을 취하기에 제격이다 - 어떤 이들은 우리가 여기에 왜 왔는지조차 잊어버린 듯하다."
 lepsius.200.f_ex_cre: "에게해에서 불어오는 산들바람을 맞으며 우리 탐사대는 헤라클리온 항구에 도착했다. 중세 시대에 칸디아가 무역 중심지였던 시절을 연상케 하는 오래된 베네치아 요새들이 눈앞에 펼쳐졌다. 갈매기 울음소리를 배경으로 화물이 내려지고 탐사대원들이 하선하자 따뜻한 환영이 이어졌지만, 머지않아 냉혹한 현실이 닥쳐왔다. 일부 탐사대원은 현지 요리에 불만을 표하고 더 나은 숙박 시설을 요구했지만, 탐사대장은 그런 사소한 요구에는 별다른 관심을 보이지 않았다. 그에게 있어 헤라클리온은 중간 기착지일 뿐 - 미노아 문명의 보물은 섬 내륙에서 기다리고 있기 때문이다."
 lepsius.200.f_ex_yuc: "메리다에서 우리 발굴단은 대규모 출정을 앞두고 최종 준비에 나서고 있다. 도시 곳곳에 스페인의 정복과 식민화의 흔적이 남아 있는데, 규모는 단순해도 한때는 캄페체와 함께 스페인이 유카탄 반도를 지배하던 거점이었음을 보여주고 있다. 160km도 채 안 되는 거리에는 지난 몇백 년 동안 밀림 속에 묻혀버린 마야 유적지가 있다고 전해진다. 우리 탐사대원들은 새로운 사원과 도시를 발견하려면 덤불 속을 더욱 깊숙히 파헤치지 않고선 안 될 것이다..."
 lepsius.200.f_ex_per: "안데스 산맥은 마치 백성들의 머리 위로 군림하는 왕과도 같다. 그 봉우리는 마치 우리가 그 계곡에 들어갈 자격이 있는지를 시험하듯 위풍당당하게 우리를 내려다본다. 쿠스코로 향하는 여정은 고달팠지만, 기술의 발전 덕에 더 이상 예측불가한 모험으로 가득 찬 여정이 아니게 되었다. 잉카 제국의 옛 수도였던 쿠스코의 거리에는 스페인 지배의 흔적과 안데스 건축 양식의 매력이 어우러져 있다. 그 사이에는 거대한 거석이 옛 지배자들의 건축 양식임을 증명하고 있다. 도심에서 가까운 잉카 요새인 삭사이우아만 유적은 우리 탐사대원들이 이번 여행에서 찾으려던 것의 맛보기라고 할 수 있다."
 lepsius.200.g: "아, 이집트여."
 lepsius.200.h: "아, 메소포타미아여."
 lepsius.200.i: "아, 그리스여."
 lepsius.200.j: "아, 모기떼와 죽을병이여."
 lepsius.200.k: "아, 페루여."
 lepsius.210.t: "통역사와 신비로운 안내자"
 lepsius.210.d: "탐험 대원 사이에서 남은 여비를 유능한 통역사에 쓸지, 신비로운 안내자에게 쓸지를 두고 의견이 엇갈리고 있다."
 lepsius.210.f: "질과 양의 문제가 아니다, 라고 말하는 탐험대원도 있었다. 통역사는 현지어를 구사한다는 장점 뿐만 아니라 현지인의 신뢰를 더욱 빨리 얻을 수 있다. 유물에 관한 정보를 입수할 확률도 비교적 높아진다. 반면 신비로운 안내자는 우리가 결코 찾지 못하거나 찾기가 대단히 어려울, 특별한 유물과 미지의 역경이 기다리고 있는 비밀스러운 곳으로 우리를 데려갈 수도 있다."
 lepsius.210.a: "통역들을 대동해야겠다."
 lepsius.210.b: "이 지역의 비밀을 아는 안내자가 필요하다."
 lepsius.220.t: "고고학자의 유물 구입"
 lepsius.220.d: "우리 탐사대장은 현지 시장에서 귀한 유물 몇 점을 발견하고 구입하였다."
 lepsius.220.f: "최초의 고고학자가 발을 내딛기 전에는 무덤 도굴꾼, 보물 사냥꾼, 모험가들이 세계 곳곳의 발굴지를 누볐다. 이것은 씁쓸한 현실이다. 대다수의 경우 유물은 흔적도 없이 모습을 감추거나, 개인 소장품이 되거나, 귀금속으로 만들어졌다면 녹여 없어지기도 했다. 하지만 회수가 가능한 유물도 그 기원을 밝혀내기란 영원히 불가능할 수 있다는 한계가 존재한다. 경험 많은 고고학자는 유물을 발굴하는 임무 뿐만 아니라 거래를 통해서도 유물을 찾아내고 그 출처를 재구성하는 데에도 재능을 발휘하게 된다."
 lepsius.220.g: "뜻밖의 횡재로군."
 lepsius.230.t: "일지 작성"
 lepsius.230.d: "이국적인 풍경과 일상의 감명에서 영감을 받은 우리 탐험대장이 일지를 작성하기 시작했다."
 lepsius.230.f: "여느 나라와 장소라면 저마다의 특색과 정취를 지니기 마련이다. 동양의 신비로움, 그리스의 마법, 마야와 잉카의 전설은 사람들을 사로잡는다. 어떤 이들은 미지의 일상이나 알 수 없는 언어, 모험가가 마주한 낯선 세상의 모습에 영감을 얻었다. 때로는 글로 남기기만 해도 그러한 인상의 여운을 정리하고, 기록할 수 있었다."
 lepsius.230.g: "누구도 뭐라 못할 낭만적인 정신일세."
 lepsius.240.t: "논문 집필"
 lepsius.240.d: "우리 탐사대장이 탐사 과정에 관한 과학 논문을 작성하기로 결심했다."
 lepsius.240.f: "놀라운 사실일지 모르겠지만 모든 사람이 본업과 병행하며 개인적인 기록을 남길 시간을 갖는 것은 아니다. 어떤 주제는 공식 보고서에서 다루지 않는 경우도 있는데, 실제 연구 주제에서 너무 벗어나거나 논문이 아직 충분치 않았기 때문일 수 있다. 그런데 우리 탐험대장은 공식 보고서와는 별도로 연구해서 나중에 발표하고 싶은 주제를 발견한 모양이다."
 lepsius.240.g: "그걸로 무언가 유익한 결과가 나왔으면 좋겠군."
 lepsius.250.t: "술집에서의 다툼"
 lepsius.250.d: "우리 탐사대장의 고약한 기질이 외교적 사건으로 번지고 말았다."
 lepsius.250.g: "부끄럽구나..."
 lepsius.260.t: "감사"
 lepsius.260.d: "우리 탐사대장이 올바른 성품을 지닌 덕에 우리 고고학 사업이 널리 인정받게 되었다."
 lepsius.260.g: "좋은 소식이군."
 lepsius.270.t: "아이스크림과 레모네이드"
 lepsius.270.g: "여행은 거창하게 해야지."
 lepsius.280.t: "알현"
 lepsius.280.f: "우리 탐사대의 소식을 들은 현지의 수령이 이번 고고학 탐사의 대장을 불러들였다. 그는 탐사의 목표에 관심을 보였고 손님에 대해서도 몹시 궁금해하는 모습이었다. 이어지는 대화에서 우리 대장은 수령을 즐겁게 해 주었을 뿐만 아니라 본인의 뛰어난 능력으로 깊은 인상을 남기면서 수령이 우리에게 도움을 주겠다고 제안하게 되었다. 알고 보니 수령에게는 귀중한 유물이 있었는데, 그 유물을 우리 탐사대에 기증하는 호의를 베풀었다."
 lepsius.280.g: "멋진 선물이로군!"
 lepsius.290.t: "육군 무관의 경비대 고용"
 lepsius.290.d: "우리 고고학 탐사의 육군 무관이 여정을 무사히 진행할 수 있도록 용병을 고용하였다."
 lepsius.290.f: "국방부는 우리 군무관을 선발하는 데 운이 좋았던 듯 하다. 무관의 능력은 현지 군 장교의 인정을 받았으며 우리 탐사대를 호위하기 위해 경비대를 파견해 달라고 윗선에 요청하였다. 그 보답으로 무관은 이 나라의 부대를 방문하여 자신의 전문 지식을 공유하였다."
 lepsius.290.g: "군부에서 적임자를 선발했군."
 lepsius.300.t: "고고학 탐사 개시!"
 lepsius.300.d: "챙길 것을 다 챙기고, 마지막 조력자도 모집했고, 탐험 계획도 세웠다... 이제 여정에 나설 수 있다."
 lepsius.300.f: ""
 lepsius.300.g: "시작해 봅시다!"
 lepsius.310.t: "고고학 탐사 종료"
 lepsius.310.d: "고고학 탐사가 끝났다. 이제 우리가 손에 넣은 것들을 헤아릴 시간이다!"
 lepsius.310.f: "수많은 고난과 장애물이 가로막은 험난한 여정이었지만, 이번 탐사로 우리나라는 과거에 대한 지식을 넓혔을 뿐만 아니라 박물관에 들일 소중한 유물들도 입수하게 되었다. 이미 조력자 중에서는 우리 곁을 떠났으며 일부 탐사대원은 고국으로 돌아가기를 기원하고 있다. 한편 대장은 탐사의 성공 여부를 좌우할, 우리가 입수한 작은 유물들을 세어보고 있다. 낭만적인 모험 뒤에는 무미건조한 유물 목록 작성이 뒤따른다."
 lepsius.310.g: "학문에 경배를! 이제 우리 대원들을 돌려보내자."
 lepsius.310.h: "이것은 시작일 뿐, 장기적인 발굴 조사를 실시한다."
 lepsius.311.t: "고고학자의 일기 출간"
 lepsius.311.f: ""
 lepsius.311.g: "우리 모두에게 영감이 될 것이오."
 lepsius.312.t: "고고학자의 과학 논문 발표"
 lepsius.312.f: ""
 lepsius.312.g: "국립 도서관에도 사본 한 부를 들였으면 좋겠소."
 lepsius.313.t: "고국으로 돌아온 탐사대장"
 lepsius.313.d: "[SCOPE.sCharacter('lepsius_relaxing_archaeologist').GetFullName](이)가 고고학 탐사를 마치고 돌아왔다. 여행 과정에서 얻은 경험은 깊은 여운을 남겼다. 그럼에도 고된 유물 평가 과정이 우리를 기다리고 있다. 파편이나 천조각, 나무조각처럼 별볼일 없는 유물도 예외는 아니다."
 lepsius.313.f: "실제 고고학 연구란 낡은 대학 건물 안에서 그 많은 유물을 목록으로 작성하고, 분류하고, 과거에 대한 결론을 도출하는 일이며, 고고학자의 삶이라 하면 떠오를 법한 것만큼 매력적이거나 모험적이지 않다. 이 과정에는 보통 #V 3년의 시간이 소요된다.#! 이러한 과정이 남아 있음에도 지역 발굴 조사처럼 국가에서 고고학자를 필요로 하는 일이 생긴다면, 박사를 즉시 소환하는 것이 나을 수 있다. [SCOPE.sCharacter('lepsius_relaxing_archaeologist').GetLastName] 박사도 불러줘서 고마워할 수도 있다."
 lepsius.313.g: "목록을 작성해 봅시다!"
 lepsius.401.t_bedouin: "베두인족의 습격"
 lepsius.401.t_kurdish: "쿠르드족의 습격"
 lepsius.401.d: "우리 고고학 탐사대가 현지 부족의 습격을 받았다."
 lepsius.401.f_bedouin: "사막의 모든 지역이 정부의 완전 통제 하에 있는 것은 아니다. 베두인족 일부는 국가의 근대화와 사회 변화에 저항에 나서 성공을 거두고 있다. 이들은 여전히 수백년 전 조상들의 생활 방식대로 살아가고 있다. 캐러밴과 부주의한 여행객을 노린 습격은 이제 하나의 일상에 불과하다. 우리 탐사대 역시 베두인족의 공격으로 피해를 입었다. 귀중품과 고고학 장비가 도난당하고 낙타가 납치되었던 것이다. 탐사대장은 정부 측에 이러한 사고는 탐사대를 위협하고 있으며 재발 방지에 나서달라고 요청하였다. 물론 이는 내정 간섭으로 여겨질 수 있다..."
 lepsius.401.f_kurdish: "북쪽과 동쪽으로 메소포타미아와 경계를 면한 자그로스 산맥은 예로부터 쿠르드족의 본고장이었으며 지역 정부의 통제를 제대로 받지 못하고 있다. 이들 가운데 다수는 독자적으로 행동하며, 자기네 부족만을 권한당국으로 여기고 있다. 이들은 끊임없이 습격에 나서 왔다. 이번에는 쿠르드족의 습격이 우리 탐사대에도 영향을 끼쳤다. 귀중품과 고고학 장비가 도난당하고 타자가 납치된 것이다. 탐사대장은 정부 측에 이러한 사고는 탐사대를 위협하고 있으며 재발 방지에 나서달라고 요청하였다. 물론 이는 내정 간섭으로 여겨질 수 있다..."
 lepsius.401.g: "정부에 정식으로 항의하자."
 lepsius.401.h: "우리 손으로 준비해야겠소."
 lepsius.401.i: "본때를 보여주자!"
 lepsius.401.j: "호위대!"
 lepsius.402.t_desert: "사막 폭풍"
 lepsius.402.t_tropical: "열대성 폭풍"
 lepsius.402.d: "우리 고고학 탐사대가 엄청난 폭풍을 만났다!"
 lepsius.402.f_desert: "처음에는 탐사대의 눈에 모래를 날리는 가벼운 바람일 뿐이었다. 그런데 머지않아 바람이 너무 강해져서 사람과 짐 나르는 짐승을 압도할 정도였다. 몇 시간이 지나도 사막 폭풍의 격렬함은 조금도 잦아들지 않았다. 우리 고고학자들이 현지인에게 이 현상에 대해 묻자, 해마다 이런 시기에는 이런 유형의 폭풍이 흔하다는 대답이 돌아왔다. 이런 사막 폭풍은 우리 탐사대 전원을 위험에 빠뜨릴 수 있다!"
 lepsius.402.f_tropical: "어느 오후, 우리 탐사대는 천둥과 번개도 없이 갑작스러운 소나기를 맞이했다. 처음에는 비를 피할 곳을 찾았지만 몇 시간 뒤에는 이것이 열대성 폭풍이며 이 지역의 평소 강우와는 다르다는 사실을 깨달았다. 심지어 짐꾼 중 한 명은 허리케인이 만개했을지도 모른다고까지 말했다!"
 lepsius.402.g: "이런 산들바람도 우릴 막을 순 없다."
 lepsius.402.h: "지금 상황은 너무 위험해. 탐사대는 대기하라."
 lepsius.403.t: "안데스 산맥의 안개"
 lepsius.403.d: "육군 무관이 우리 탐사대를 다시 한번 위험에 빠뜨리자, 다른 대원들은 책임질 것을 요구하였다."
 lepsius.403.f: "안데스 산맥을 탐사하던 대원들이 육군 무관에 대해 불만을 토로하고 있다. 고대 잉카 유적지를 찾으려는 탐사대를 수차례 잘못된 길로 이끌었던 것이다. 최근에는 목적지에 빨리 도달하려는 야심에 산 속의 안개를 생각하지 않은 바람에, 탐사대가 귀중한 시간을 허비하는 일까지 벌어졌다. 일부 대원들은 새로운 지휘관을 임명해야 한다고 목소리를 높였다."
 lepsius.403.g: "이대로라면 해임할 수밖에 없다."
 lepsius.403.h: "최선을 다했을 뿐이다."
 lepsius.404.t_aegean: "무너진 다리"
 lepsius.404.t_peru: "무너진 현수교"
 lepsius.404.d: "다리가 무너져 우리 탐사대가 앞으로 나아가지 못하고 있다."
 lepsius.404.f_aegean: "그리스와 크레타섬은 험준한 지형으로 유명하다. 우리 탐사대가 협곡에 발을 들였을 때 최근 산사태로 다리 교각이 유실된 것을 발견했다. 우리는 다리를 복구하고 원래 목적지로 향할지, 아니면 다른 곳으로 향할지 결정해야 한다. 후자는 소요 시간도 적고 비용도 적게 들지만, 고고학 성과는 떨어질지도 모른다."
 lepsius.404.f_peru: "안데스 산맥의 고갯길과 좁은 산간도로를 힘겹게 오른 우리 고고학 탐사대는 예상치 못한 문제에 직면하게 되었다. 현지인들이 전설 속의 사원으로 이어진다고 알려준 현수교가 완전히 무너져 내린 것이다. 탐사대원 중에는 목적지를 포기하고 좀 더 쉬운 유적지로 향하자고 주장하지만, 현지인들은 그런 고생을 할 만한 가치가 있다고 입을 모으고 있다. 그러나 다리를 재건하려면 시간과 비용이 들 것이다."
 lepsius.404.g: "다리를 다시 짓는다."
 lepsius.404.h: "우회로를 찾아보자."
 lepsius.405.t_mesopotamia: "메소포타미아의 거친 도로"
 lepsius.405.t_yucatan: "유카탄 반도의 거친 도로"
 lepsius.405.d: "도로의 상태가 형편없는 바람에 우리 탐사대가 이전까지 생각지도 못했던 난관에 부닥쳤다."
 lepsius.405.f_mesopotamia: "안타깝게도 모든 도로가 마땅히 기대하는 관리 상태를 지니고 있는 것은 아니었다. 특히 주요 교역로에서 벗어난 샛길과 길목은 상태가 매우 열악했다. 하지만 우리 여정의 잠재적 목적지는 문명의 중심지에서 멀리 떨어져 있다. 여정은 고된 일이었고 일부 탐사대원은 벌써부터 다른 길을 택했어야 했다고 불만의 목소리를 높이고 있다."
 lepsius.405.f_yucatan: "유카탄 반도의 정글은 현대에 이르러서도 아직 미개발 상태로 남아 있다. 이 때문에 수많은 유적들이 수백 년 동안 그 누구도 자세히 조사한 적이 없어, 고고학적으로 가치 있는 목적지에 해당된다. 하지만 여정은 고난으로 가득 차 있다. 잘 다져진 숲길 몇 곳을 제외하면 도로라 할 만한 것이 거의 없다. 탐험대원들은 벌써부터 이 길을 택한 것을 후회하고 있다."
 lepsius.405.g: "다른 길로 가보자."
 lepsius.405.h: "인부와 짐 드는 동물을 추가로 들여 좀 더 쾌적한 여정이 되도록 하자."
 lepsius.405.i: "이 길 그대로 따라간다."
 lepsius.406.t: "탐사선의 난파!"
 lepsius.406.d: "우리 군무관이 대단히 불미스러운 사건에 책임을 져야 하는 상황이 벌어졌다."
 lepsius.406.f: "우리 탐사선 중 하나가 에게해에서 난파되고 말았다. 다행히 누구도 다치지 않았으나 고고학 장비의 상당량이 앞바다에 가라앉고 말았다. 우리 탐사대원의 대다수는 선장이 암초를 간과했다고 비난의 목소리를 높이고 있다. 하지만 선장은 항해를 빨리 끝내고 싶었고 어느 지도에도 그 암초는 수록되지 않았다고 해명했다. 지금의 대장으로는 성공 가능성이 점점 낮아지고 있다는 분위기가 대두되고 있다."
 lepsius.406.g: "이런 일에 책임을 지는 것이 맞다."
 lepsius.406.h: "장비는 새로 구입하고 아무 일 없었던 것처럼 하자."
 lepsius.407.t: "오아시스"
 lepsius.407.d: "탐사 중 고고학자들은 이전에 존재가 알려지지 않은 오아시스를 발견하고 식수를 새로 확보할 수 있었다."
 lepsius.407.f: "사실 탐사대원들은 며칠 간의 고난을 견뎌야 하리라 마음먹고 있었다. 이들이 탐사하려는 고대 이집트 유적지는 사막 어딘가에 위치해 있어 이틀에서 사흘 정도를 걸어가야 했기 때문이다. 그러나 놀랍게도 이들은 그 길목에 오아시스가 있는 것을 발견했다. 탐스러운 대추가 달린 야자수와 달콤한 열매가 열린 무화과나무가 그들을 기다렸던 것이다. 식수도 보충할 수 있었고 몇몇 대원들은 이집트의 태양 아래 일광욕을 즐기기도 했다."
 lepsius.407.g: "기운 차리게 하는 소식이군."
 lepsius.408.t: "나자르 부적"
 lepsius.408.d: "우리가 고용한 짐꾼 몇 명은 우리 고고학 대장이 '악마의 눈'에 시달리고 있다며 부적을 사라고 권유하고 있다."
 lepsius.408.g: "부적을 산다."
 lepsius.408.h: "이런 미신은 어떤 과학적 신념과도 어긋난다!"
 lepsius.409.t: "친절한 어부"
 lepsius.409.d: "해안가를 지나던 친절한 어부들이 우리 탐사대의 장비를 수 킬로미터 정도 운반해 주겠다고 제안해 왔다."
 lepsius.409.g: "큰 도움이 되겠소."
 lepsius.410.t_yucatan: "마스코트 앵무새"
 lepsius.410.t_peru: "험악한 콘도르"
 lepsius.410.d_yucatan: "유카탄 반도의 정글 속으로 들어간 이래, 작고 화려한 앵무새 한 마리가 우리 곁에 함께하고 있다."
 lepsius.410.d_peru: "안데스 산맥을 오르기 시작한 이래, 위풍당당한 콘도르의 그림자가 매일같이 우리 위를 드리우고 있다."
 lepsius.410.f_yucatan: "유카탄 반도의 밀림은 위험으로 가득 차 있다. 재규어와 뱀, 독충이 덤불 속에 도사리고 있는 것이다. 하지만 탐사대원들은 그곳의 동식물에 매료되었다. 특히 작고 화려한 앵무새 한 마리가 모자와 쓰개 위를 날아다니며 그 곁을 떠나지 못하는 모습에 푹 빠진 것이다. 이 앵무새는 몹시 영리해 보이며 이제는 정기적으로 먹이도 받아먹게 되었다. 탐사대장은 이 앵무새를 우리 탐사대의 마스코트로 삼고 탐사가 끝난 뒤에는 고국으로 데려갈 계획이다."
 lepsius.410.f_peru: "콘도르는 안데스 산맥의 제왕이다. 거대한 새는 하늘을 지배하고, 그 그림자는 상상할 수 없을 만큼 불어난다. 탐사가 시작된 이래 콘도르는 알파카와 짐꾼들 위를 어슬렁거리며 위협을 안겼다. 현지인들은 콘도르를 믿지 않는다. 독수리처럼 산 사람보다는 죽은 시체 위를 맴도는 것으로 알려져 있기 때문이다. 이러한 불안감은 일부 대원들 사이에서도 퍼져 있다."
 lepsius.410.g: "좋은 징조다."
 lepsius.410.h: "애완 앵무새로 삼아도 되겠는걸."
 lepsius.410.i: "나쁜 징조다."
 lepsius.410.j: "우리가 데려가면 되겠군."
 lepsius.411.t: "짐 나르다 지쳐 버린 동물들"
 lepsius.411.d: "짐 나르는 동물들을 너무 혹사시킨 모양이다."
 lepsius.411.f: "며칠 동안 우리는 짐 나르는 동물이 필요했다. 너무 오래 걸렸다는 목소리도 있었다. 이제는 동물들이 피로한 징후를 보이고 있다.  어떤 동물은 더 이상 이동을 거부하고 주먹으로 쳐야 발걸음을 옮긴다. 오늘 아침에는 앞서 가던 동물이 쓰러졌다."
 lepsius.411.g: "죽으면 편히 쉴 수 있을 것이다."
 lepsius.411.h: "쉬도록 두어라!"
 lepsius.412.t: "고고학 탐사대 실종!"
 lepsius.412.d: "두 달 동안 우리 고고학 탐사대와의 모든 연락이 두절되었다."
 lepsius.412.f: "간혹 운이 지독히도 없을 때가 있다. 미신을 믿는 일부 현지인들은 우리 탐사대 전체가 불운하다고도 한다. 어찌 되었든 우리 고고학 탐사대와의 연락이 완전히 두절된 상황이다. 마지막 서신도 꽤 오래 전의 일이다. 고고학자들이 머지않아 돌아올 것이라 확신하지만, 현재로서는 모든 대원이 길을 잃은 듯하다."
 lepsius.412.g: "제기랄!"
 lepsius.413.t: "이국의 질병"
 lepsius.413.d: "우리 고고학 탐사대의 일부 대원이 지독한 병에 걸렸다."
 lepsius.413.f: "질병은 장기간 여정을 항상 어렵게 만드는 요인이었다. 열대 지방이든, 사막이든, 늪지대든, 험준한 산맥이든 우리 대원들은 낯선 환경에 익숙하지 않고 미지의 병원균이 곳곳에 도사리고 있다. 특히 말라리아는 희생자를 끊임없이 내고 있다. 이번 여정에서 일부 대원들은 지독한 병에 걸려 더 이상 탐사에 나설 수 없는 상황이다."
 lepsius.413.g: "탐사를 잠시 중단하고 돌봐준다."
 lepsius.413.h: "내버려 두고 간다."
 lepsius.414.t: "뇌물"
 lepsius.414.d: "우리 탐사대가 지역 관리들에게 시달려 앞으로 나아가지 못하고 있다."
 lepsius.414.f: "탐사가 시작된 이래 대원들은 온갖 종류의 괴롭힘에 시달렸다. 중소급 관리들은 허가와 특별 부과세를 요구하며 곤란에 빠뜨렸다. 심지어 어떤 관리는 우리의 비자를 문제삼으며 벌금을 부과하려 했다. 상황이 너무나 어수선하다. 이 나라에서는 좋은 인맥이나 친지 없이는 출세할 수 없는 모양이다."
 lepsius.414.g: "날강도 같으니!"
 lepsius.414.h: "도둑놈들 같으니!"
 lepsius.414.i: "정치인들이란!"
 lepsius.415.t: "홍수"
 lepsius.415.d: "나라 전체가 홍수에 휩쓸린 가운데 우리 탐사대장은 불어난 물에 떠내려가는 한 여인을 목격했다."
 lepsius.415.f: "며칠간 계속된 폭우로 강물이 범람했다. 이레적인 날씨였지만 우리 탐사대원들은 만반의 대비를 갖추고 있었다. 강물이 급류로 변했지만 대원들은 여정을 계속했다. 그 순간, 강변에서 비명 소리가 들려왔다. 탐험대장은 화려한 색의 꾸러미가 휩쓸려 가는 것을 보았다. 이제는 곧바로 행동에 나서야 할 순간이다. 모든 여정이 확실히 늦어지더라도 말이다."
 lepsius.415.g: "구해주자!"
 lepsius.415.h: "탐사를 미룰 순 없어!"
 lepsius.416.t: "좋은 날씨"
 lepsius.416.d: "고고학 탐사대가 예상 밖의 순조로운 진척을 보이고 있다."
 lepsius.416.f: "우리 탐사대가 순조로운 진척을 보이고 있다. 때로는 아무 소식도 없는 것이 최고의 소식이기 마련, 이번에는 썩 괜찮거나 훌륭한 장소를 발견할 것으로 우리 고고학자들이 믿어 의심치 않고 있다. 날씨가 좋다는 것을 제외하면 이렇다 할 보고 사항은 없다!"
 lepsius.416.g: "이보다 더 만족스러울 데가."
 lepsius.417.t: "친절한 현지인들"
 lepsius.417.d: "현지인들이 우리 탐사대를 친절히 맞이해 주었다. 허나 어쩌면 우리는 그보다 더 많은 것을 얻게 될 지도 모른다..."
 lepsius.417.f: "우리 탐사대는 작은 마을에 잠시 들렀다. 마을 주민들은 몹시 친절했고 탐사대에게 편안한 휴식처를 내어줌과 동시에 동물들에게도 먹이를 주었다. 현지인들과 이야기를 나누던 중 이들이 이 지역에 대해, 특히 고대 유적에 대해 더 많은 것을 알고 있을지도 모른다는 생각이 들었다..."
 lepsius.417.g: "알아낼 수 있는 건 모두 알아내야 해."
 lepsius.417.h: "그만하면 충분하다."
 lepsius.418.t: "현지 안내인"
 lepsius.418.d: "어느 현지인이 우리 탐사대의 안내인을 자원하고 나섰다."
 lepsius.418.f: "간혹 운이 좋을 때가 있다. 우리 탐사대는 이 지역을 두루 꿰고 있고 지역 명소에 대해서도 잘 아는 현지 안내인을 얻게 되었다."
 lepsius.418.g: "완벽해!"
 lepsius.419.t: "지름길"
 lepsius.419.d: "탐사대의 육군 무관이 유적지로 향하는 지름길을 발견했지만 그 대가로 포상을 바라고 있다."
 lepsius.419.f: "우리 육군 무관이 지름길이 있다고 알려주었다. 어제 오후 우리가 휴식을 취하는 사이 그 지름길을 따라 이 지역을 탐사하였으며 어느 지도에도 없는 오래된 길을 찾았다고 주장했다. 이 말이 사실이라면 우리 탐사대에 큰 도움이 되겠지만, 그에게 마땅히 포상해 주어야 할 것이다."
 lepsius.419.g: "포상해 주고 따라갑시다!"
 lepsius.419.h: "저 자가 으스대는 꼴을 봐서는 안 될 일이오."
 lepsius.420.t: "의욕 넘치는 대원들"
 lepsius.420.d: "우리 탐사대가 의욕 넘치는 대원들을 데려온 것이 다행이다. 덕분에 이번 탐사가 성과를 거둘 가능성이 크게 높아졌다."
 lepsius.420.f: "휘파람과 구호 소리가 쩌렁쩌렁하게 들려온다. 고고학 탐사대가 예상 밖의 순조로운 진척을 보이고 있다. 대원들은 의욕이 넘치고 성공을 믿어 의심치 않는다. 난관이나 문제가 발생해도 훨씬 여유로운 모습이다. 그 이유는 알 수 없지만 아무래도 인재 선발에 있어 운이 좋았던 모양이다. 어찌 되었든 이것으로 우리가 성과를 거둘 가능성도 대단히 높아졌다."
 lepsius.420.g: "카르페 디엠."
 lepsius.421.t: "풍뎅이"
 lepsius.421.f: "마스타바 인근에서 소규모 발굴 작업에 나선 우리 발굴단은 푸른빛의 청금석을 가공해 만든 조그마한 풍뎅이 조각 하나를 제외하고는 아쉽게도 아무런 성과를 거두지 못했다. 그 풍뎅이는 고대 이집트에서 행운의 부적으로 여겨졌던 것이다. 풍뎅이가 똥덩어리를 앞에서 굴리는 모습은 태양신 레가 태양선을 타고 하늘을 가로지르는 여정과 관련이 있다고 믿은 것이다. 우리 발굴단장은 혹시 이 작은 조각을 예외로 삼아 기념으로 가져가도 되느냐고 물었다."
 lepsius.421.g: "간직해도 된다."
 lepsius.421.h: "유물을 발견했다면 무조건 박물관에 넘겨야 한다. 예외는 없다!"
 lepsius.422.t: "모래 속의 신전"
 lepsius.422.d: "우리 고고학자들이 마케도니아 시대의 신전으로 보이는 유적을 발견했다."
 lepsius.422.f: "처음에 우리 대원들은 모래 언덕이라고 생각했다. 하지만 잘 다듬어진 석회암이 조그맣게 튀어나온 것을 보고 이집트 사막 한가운데 자리한 이 특이한 언덕에 무언가 비밀이 감춰져 있음을 우리 학자들은 알 수 있었다. 며칠 뒤 탐사대는 그 속에서 신전을 발견해냈다. 어떤 이들에게는 실망스러운 결과였다. 고대 이집트의 건축과는 전혀 닮지 않았고 알렉산더 대왕 재위기의 건축으로 밝혀졌기 때문이다. 하지만 전문가들은 이 신전이 오늘날까지도 무덤을 발견하지 못한 그리스의 대왕이 이집트를 누볐음을 보여주는 증거라고 입을 모으고 있다."
 lepsius.422.g: "알렉산더 대왕의 발자취를 따라서..."
 lepsius.422.h: "모두 부질없는 이야기일 뿐이오."
 lepsius.423.t: "날개 달린 사자"
 lepsius.423.d: "우리 고고학자들이 메소포타미아에서 천사처럼 생긴 조각품을 출토해냈다."
 lepsius.423.f: "인간과 동물이 섞인 생명체는 근동에 널리 퍼져 있다. 우리 탐사대는 발굴지를 탐색하던 중 굉장히 다름답고 보존 상태가 좋은 조각품을 운 좋게 발견하였으며, 벌써부터 박물관으로 이송되고 있다. 조각품에 새겨진 쐐기문자는 이 생물이 성전의 수호신임을 밝히고 있다는 점에서 더욱 흥미롭다. 우리 학자들은 이 성전 수호신들이 성경에 언급된 이스라엘의 케루빔과 관련이 있을 것으로 추정하고 있다. 예루살렘 성전의 언약궤는 케루빔 두 마리가 지키고 서 있었다고 전해진다."
 lepsius.423.g: "사라진 언약궤를 말하는 것이오?"
 lepsius.423.h: "성 마가, 당신이오?"
 lepsius.423.i: "모두 부질없는 이야기일 뿐이오."
 lepsius.424.t: "쐐기문자 보관소"
 lepsius.424.d: "우리 고고학자들이 엄청난 수의 메소포타미아 유물을 발견했다."
 lepsius.424.f: "우리 학자들이 작은 마을 외곽의 고대 성벽을 조사할 당시만 하더라도 별다른 성과를 거두지는 못하리라고 예상하고 있었다. 석재를 만져보고 나서야 구조물에 빈 공간이 존재한다는 사실을 알아차렸다. 심층 조사를 진행한 끝에 성벽의 특정 지점을 부수자, 그 안에 쐐기문자 점토판이 붙박이로 보관되어 있는 것이 드러났다! 이 보관소는 놀라울 정도로 보존 상태가 양호하며 고대 메소포타미아에 관한 정보를 제공하고 있었다."
 lepsius.424.g: "놀라운 발견일세!"
 lepsius.425.t: "오리칼쿰?"
 lepsius.425.d: "우리 고고학자들이 정체를 알 수 없는 이상한 재료로 만들어진 유물을 찾아냈다."
 lepsius.425.f: "그리스 탐사에 나선 우리 학자들이 흥미로운 발견을 이뤄냈다. 아침에 박물관 관리실에 작은 구슬 하나가 도착한 것이다. 관장은 처음에는 왜 직원들이 이 구슬을 보냈는지 이해하지 못했다. 평소대로라면 그저 사소한 발견에 그쳤을 것이기 때문이다. 그러나 호박색을 띈 이 구슬은 지금까지 어디에서도 발견하지 못한 미지의 재료로 제작된 것이었다. 전문가들도 지금까지 이 유물이 무엇으로 만들어졌는가를 밝혀내지 못하고 있으며, 가짜라고 보는 학자들도 있다. 일각에서는 이것이야말로 에게 문명에 대한 우리의 지식이 완전히 부족하다는 것을 보여주는 증표라고 말한다."
 lepsius.425.g: "플라톤이 크리티아스와의 대담에서 이렇게 생긴 것을 언급하지 않았던가...?"
 lepsius.425.h: "모두 부질없는 이야기일 뿐이오."
 lepsius.426.t: "도자기 더미"
 lepsius.426.d: "우리 고고학자들이 에게 문명의 유물을 대량으로 발굴하였다."
 lepsius.426.f: "고대인들에게 쓰레기였던 것은 고고학자에게는 보물창고다. 이런 말은 최근 우리 발굴팀이 발굴지를 탐색하며 작은 유적지에 머물렀다가 심층 조사를 통해 도자기 더미가 쌓인 구덩이를 발견하면서 현실이 되었다. 아직 짜맞춰야 하는 파편이 많지만 이번에 발견된 수많은 도자기들은 우리 박물관의 소장품을 한층 풍성하게 만들 것이다."
 lepsius.426.g: "전부 우리 것이다!"
 lepsius.427.t: "마야의 옥"
 lepsius.427.d: "우리 고고학자들이 옥으로 만들어진 마야 문명의 유물을 발견했다."
 lepsius.427.f: "옥은 마야 문명에서 예술과 종교 분야에 널리 사용됐던 소재였다. 권력층은 스스로를 옥으로 치장하였으며 태양신도 옥 장신구에 새겨졌다. 뿐만 아니라 중앙아메리카 사람들은 옥으로 도구를 만들기도 하였는데  신대륙에 알려져 있던 재료 가운데 가장 단단한 것으로 꼽혔기 때문이다. 우리 고고학자들은 지난 발굴 조사를 통해 그러한 옥 유물 몇 점을 찾아내는 행운을 누리게 되었다"
 lepsius.427.g: "우리 소장품에 들이면 볼만하겠군."
 lepsius.428.t: "잉카의 신상"
 lepsius.428.d: "우리 고고학자들은 정체를 알 수 없는 잉카의 신상을 발굴해냈다."
 lepsius.428.f: "잉카 문명의 신 인티(Inti)를 표현한 황금 조각상이 오늘 아침 박물관에 속달로 전달되었다. 우리 고고학자들은 이것을 어떻게 어디서 얻었는지는 함구하고 있다. 섬뜩하면서도 아름답고 기괴한 형상이 마치 보는 이를 응시하는 듯하다. 일부 전문가들은 이 조각상이 정말로 잉카 문명의 것인지 의문을 품고 있다. 조각상의 외형이 미지의 문화의 것임을 시사하고 있기 때문이다. 또한 잉카 문명의 황금상은 거의 대부분 페루에서 도난당한 것이다. 아마도 지금까지 우리 박물관의 선콜럼버스 시대 소장품 가운데 가장 독특한 유물일 것이다. 박물관장은 벌써부터 방문을 닫고 전설이 사실일지도 모른다고 목소리를 낮춰 말했다."
 lepsius.428.g: "엘도라도는 실존하는가?"
 lepsius.428.h: "모두 부질없는 이야기일 뿐이오."
 lepsius.429.t: "크리스탈 해골"
 lepsius.429.d: "우리 고고학자들이... 무언가를 발견했다."
 lepsius.429.f: "우리 발굴대원이 맹세컨대 믿음직한 거래업자가 최근에 굉장히 흥미로우면서도 섬뜩한 유물을 보여주었다고 전했다. 그것은 오로지 메소아메리카 석영으로 만들어진 인간의 두개골이다. 표면은 놀라울 정도로 매끄럽게 연마되어 있으며, 우리가 지금까지 남미 대륙의 문화에 대해 알고 있던 그 어떤 것보다도 우수한 만듦새다. 하지만 의심도 크다. 우리 수석 고고학자조차도 이 유물을 어떻게 받아들여야 할지 100% 확신하지 못하고 있다."
 lepsius.429.g: "우리 소장품으로 추가하자."
 lepsius.429.h: "명백한 가짜일세."
 lepsius.430.t: "가짜 크리스탈 해골"
 lepsius.430.d: "수년 전 화제를 불러모으며 매입했지만 진위 여부가 의심되던 그 유물이 정말로 가짜라는 사실이 밝혀졌다."
 lepsius.430.f: "어떻게 이런 일이 있을 수 있단 말인가? 우리가 너무 부주의했던 탓일까? 아니면 화제에만 휩쓸려, 믿고 싶은 대로만 믿고 너무 이기적이었던 탓일까? 우리 박물관이 몇년 전 명물로 들여왔던 전설적인 크리스탈 해골이 싸구려 모조품이라는 사실이 밝혀졌다. 이것으로 실추된 고고학계에서의 위상을 되찾으려면 오랜 시간이 걸릴 것이다!"
 lepsius.430.g: "우리 고고학계에 대한 국가적 수치다!"
 lepsius.431.t: "유적을 알고 있는 현지인"
 lepsius.431.d: "어느 현지인이 유물 탐색을 돕겠다고 기꺼이 나섰다."
 lepsius.431.f: "우리 탐사대가 진로 상에 있는 작은 마을에 들렀다가 우리의 목적지를 전해들은 어느 늙은 농부를 만났다. 그 농부에게 빵과 소금, 물을 건네니 몹시 친절하게 맞아주었다. \"당신네들이 찾고 있는 게 뭔지 다른 동네 사람들이 벌써 말해줬다우\"라고 그 농부는 설명했다. 그리고 그날 반나절 동안 우리를 미지의 땅으로 안내해 주었다. 고대 유적지로 곧장 따라가게 된 우리 고고학자들은 깜짝 놀라고 말았다. 우리 박물관에 들일 유물 몇 점을 발견할 수 있었기 때문이다."
 lepsius.431.g: "오늘은 참 운이 좋구만!"
 lepsius.432.t: "현지인의 유물 거래"
 lepsius.432.d: "어느 현지인이 우리에게 유물을 팔겠다고 제안해 왔다."
 lepsius.432.f: "우리 탐사대는 대도시에 발을 들였다. 짐꾼들이 짐승들에게 먹일 사료를 사는 동안, 어떤 상인이 우리에게 말을 걸어왔다. 우리 탐사대에 대한 소식이 지역민들 사이에서도 널리 퍼진 모양이다. 그는 무덤 도굴꾼에게서 얻은 귀중한 예술품을 좋은 가격에 팔겠다고 제안했다. 유물의 출처는 불분명하지만 매력적인 제안이었다. 값이 좀 높긴 해도 말이다."
 lepsius.432.g: "박물관에 들여야겠다."
 lepsius.432.h: "그런 꺼림칙한 거래에는 관심 없소."
 lepsius.433.t: "진품이냐 가품이냐"
 lepsius.433.d: "석연찮은 평판을 지닌 골동품상이 우리에게 유물 한 점을 팔겠다고 제안해 왔다."
 lepsius.433.f: "스스로 가치가 높다는 고고학 유물을 파는 사람들 모두가 믿음직한 것은 아니다. 이를테면 귀중한 예술품을 파는 데 너무 열을 올리는 상인이 있다. 이런 무분별한 접근과 '부담없는 가격'을 약속하는 유동적인 가격 책정은 우리 탐사대장 사이에서 과연 이것이 안전한 거래인지를 의심케 만들었다. 따라서 이런 미심쩍은 상인으로부터 유물을 입수해야 하는지 박물관 측에 문의하였다."
 lepsius.433.g: "위험을 감수할 필요가 있다."
 lepsius.433.h: "저 자는 믿지 말도록."
 lepsius.434.t: "무덤 도굴꾼을 붙잡다"
 lepsius.434.d: "우리 탐사대가 무덤 도굴에 나서던 무리를 사로잡고 그들이 꺼내간 약탈품을 손에 넣었다. 그러나 이들을 어떻게 처리해야 할지는 결정하지 못했다."
 lepsius.434.f: "우리 고고학자들은 이미 좋은 발굴지를 찾아냈다고 생각했지만, 그곳이 수백 년 동안 도굴당했다는 사실을 깨달았다. 다시 장비를 챙기는 과정에서 모닥불을 지키던 두 대원이 버려진 유적지에서 유물을 몰래 빼돌리려던 수상한 사람들을 붙잡았다. 사실 우리는 이들을 당국에 넘기고 도난당한 유물도 반환하여야 한다. 그러나 어떤 대원들은 우리가 유물을 갖고 도굴꾼에게 돈을 건내 입막음을 해야 한다고 생각하는 것 같다."
 lepsius.434.g: "유물은 우리 것이 되어야 한다."
 lepsius.434.h: "신고서를 제출하고 유물을 지역 당국에 반환하자."
 lepsius.435.t: "경매"
 lepsius.435.d: "정치적 압력으로 인해 최근에 발견된 유물을 경매에 넘기는 방안이 고려되고 있다."
 lepsius.435.f: "우리 정부 인사 중에는 해외 고고학 발굴 사업이 국가 경제로 얻은 이득을 소수 학계 집단의 상아탑에 몰아넣고 있는 돈낭비에 불과하다고 우려하고 있다. 이들은 과학적 성과 뿐만 아니라 발굴 사업의 타탕성을 재정적 근거로 입증할 것을 요구하고 있다. 이에 따라 일부 정치인들은 최근 발견된 유물을 매각하여 고고학 발굴 사업에 들인 비용을 충당해야 한다고 목소리를 높였다."
 lepsius.435.g: "경매에 넘기도록."
 lepsius.435.h: "하지만 이건 박물관에 들여야 한단 말이오!"
 lepsius.436.t: "숨겨진 방"
 lepsius.436.d: "우리 고고학자들은 도굴꾼이 약탈한 것으로 보이는 무덤 한 곳을 발견하였다. 그러나 심층 조사를 실시한 결과 가짜 벽 뒤에 또다른 방이 있는 것을 알아냈다."
 lepsius.436.f: "마지막으로 들른 곳은 처음에는 실망 그 자체였다. 우리 탐사대장은 그 유적지에 큰 기대를 걸고 있었다. 귀족 고위층의 무덤인데다 신성한 용도로 사용되었을지도 모르기 때문이다. 최소한 몇몇 농부들의 증언은 그와 같았다. 하지만 현장에 도착했을 때의 실망감은 더욱 컸다. 무덤은 텅 비어 있고 벽은 앙상했으며 역사적 중요성을 드러낼 만한 것이 아무것도 남아 있지 않았던 것이다. 처음에는 그저 매끄럽게 다듬어진 굴로만 보였다. 그러나 연구를 돕던 조수가 벽에 기대어 서 있다가 우연히 문틀의 윤곽을 발견하면서 상황은 급변했다. 두 시간 동안 잔해와 덧문, 돌을 파헤친 결과 이전에는 숨겨져 있던 방으로 통하는 입구가 드러난 것이다."
 lepsius.436.g: "내 보물!"
 lepsius.437.t: "버려진 캠프"
 lepsius.437.d: "우리는 외국 발굴단이 버리고 떠난 캠프를 발견하였다. 그곳에서 유물 두 점을 확보하자 해당 국가의 대사가 그 유물들은 자기네 국가의 것이라고 주장하고 나섰다."
 lepsius.437.f: "우리 탐사대가 발굴 캠프에 발을 내딛자, 불과 몇 달 전 인근 신전을 탐색한 탐사대가 남기고 간 것을 조사하게 되었다. 상자 안에서 두고 간 유물 두 점이 발견되었는데, 알고 보니 발굴 인부들이 현장을 너무 서둘러 정리하고 떠났기 때문이었다. 우리 고고학자들은 발견한 유물을 입수하엿지만, 머지않아 해당 국가의 대사가 찾아와 유물을 자국 소유라 주장하였다. 이 사건은 강대국과의 외교적 마찰에 불을 지폈다."
 lepsius.437.g: "우리가 찾았으니 우리 것이다."
 lepsius.437.h: "유물을 나누도록 하시오."
 lepsius.437.i: "대신 우리 지식을 공유하겠소."
 lepsius.437.j: "정당한 소유자는 저들이오."
 lepsius.438.t: "은자"
 lepsius.438.d: "어느 은둔자가 유물을 갖고 있는데 협력할 의향이 거의 없어 곤란한 상황이 되었다."
 lepsius.438.f: "우리는 기이한 은둔자가 유물을 소유하고 있다는 이야기를 들었다. 이 사람은 과거에 대한 놀라운 지식과 방대한 기억력을 갖고 있었다. 여러 면에서 우리 탐험대의 학자들조차 그 지식에 감탄할 정도다. 이 심술궂은 노인은 우리에게 알려줄 것은 많지만, 유물을 넘겨줄 생각은 없는 모양이다. 아무래도 우리는 무력을 동원해야 할지도 모른다."
 lepsius.438.g: "우린 그 유물을 원하오, 지금 당장!"
 lepsius.438.h: "그냥 귀 기울여 줍시다."
 lepsius.439.t: "다이너마이트?"
 lepsius.439.d: "특별한 도전에는 특별한 수단을 동원해야 할 때가 있다."
 lepsius.439.f: "발굴을 진행하던 중 우리 안내인은 벽 뒤에 통로가 숨겨져 있을지 모른다는 결론을 내렸다. 최소한 벽 뒤에 빈 공간을 포착했다는 것이 그의 주장이었다. 초창기 고고학에서는 과학적 목표의 달성을 위해 폭약 사용을 비롯한 과감한 조치가 동원되곤 했다. 물론 그 빈 공간이 속임수였고 그동안 우리가 안전한 상태로 두었던 발굴 현장을 위험에 빠뜨린다면, 우리는 아무런 소득 없이 떠날 수밖에 없다."
 lepsius.439.g: "퍼펑!"
 lepsius.439.h: "야만인이나 할 법한 생각이오."
 lepsius.440.t: "부서진 파편"
 lepsius.440.d: "부서진 유물을 발견했다. 잃어버린 조각은 약소국의 손에 들어갔다."
 lepsius.440.f: "발굴 작업 도중 고고학자들이 귀중한 예술품을 발견했다. 그 일부이긴 해도 말이다. 나머지 조각은 어느 약소국이 몇년 전 골동품상에게서 구입해 입수해간 것으로 밝혀졌다. 우리는 외교적 교섭으로 잃어버린 조각을 되찾아 유물을 완성할 수도 있지만, 대사는 정치적인 부담이 될 것이라고 이미 분명히 밝혀 둔 상황이다."
 lepsius.440.g: "남은 조각을 달라고 정중히 요청해 보자."
 lepsius.440.h: "사실 그렇게까지 중요한 문제는 아니다."
 lepsius.441.t: "잊혀진 오벨리스크"
 lepsius.441.d: "미완성 오벨리스크가 우리 학자들에게 고대의 건축 공법에 관한 정보를 선사하고 있다."
 lepsius.441.f: "고대 이집트의 어느 채석장에서 우리 고고학자들은 미완성 오벨리스크로 추정되는 것을 발견하였다. 거대한 석조물이 완성되지 않은 채 방치되어 있었던 것이다. 상형문자는 새겨져 있지 않고, 크기 때문에 운반할 수도 없지만, 학자들은 고대 이집트인들이 이러한 구조물을 어떻게 제작하고 세울 수 있었는지 새로운 통찰력을 얻게 되었다. "
 lepsius.441.g: "정말 흥미롭군."
 lepsius.442.t: "동물 미라"
 lepsius.442.d: "최근 발견된 동물 미라의 취급을 놓고 고고학자들 사이에서 논란을 불러일으켰다."
 lepsius.442.f: "며칠 전 고고학자들은 안치실에서 특별한 유물을 찾아냈다. 귀족의 시신 외에도 동물이 담긴 조그마한 석관이 함께 발견된 것이다. 외형으로 보아 이들은 각각 고양이, 개, 원숭이로 추정된다. 미라 발견 이후 학자들 사이에서 논쟁에 불이 붙게 되었다. 미라 동물은 고대 이집트의 동물 사육 방식과 생활상을 엿볼 수 있는 중요한 단서를 제공하지만, 동시에 이런 귀한 유물이 파괴될 위험성이 있다는 뜻이기 때문이다."
 lepsius.442.g: "철저한 조사가 필요하다."
 lepsius.442.h: "손대지 말도록, 박물관의 대표 전시품이 될 거니까!"
 lepsius.443.t: "악어를 둘러싼 다툼"
 lepsius.443.d: "죽은 악어를 놓고 우리 학자들과 육군 무관 사이에 이상한 다툼이 벌어졌다."
 lepsius.443.f: "나일강의 동물상은 우리 학자들에게 생물학 연구에 대한 영감을 불어넣었다. 이들은 나일 악어에 특히 주목했는데 학자들은 악어를 공포와 혐오감, 동시에 매혹의 대상으로 여겼다. 학자들의 요청으로 육군 무관이 악어 한 마리를 잡았다. 그런데 이제는 육군 무관이 그 악어를 넘겨주기를 거부하고 있다. 그 대신 악어를 박제해서 자기네 집 굴뚝 위에 걸어놓고 싶다고 한다."
 lepsius.443.g: "악어를 학자들에게 넘기도록 하시오."
 lepsius.443.h: "박제여 영원하라!"
 lepsius.443.i: "참 예쁜 악어인데 말이지..."
 lepsius.444.t: "파라오의 저주"
 lepsius.444.d: "영문을 알 수 없는 사고가 연속으로 발생하면서 현지 조력자들은 물론 일부 학자들까지도 우리의 이집트 탐사가 저주받았다고 믿고 있다!"
 lepsius.444.f: "사건의 발단은 우리 탐사대장이 어느 이집트 무덤을 개방하면서부터였다. 석관 안에는 끔찍하게 생긴 미라가 있었는데, 대원들이 보는 앞에서 몇 분 만에 썩어들어가기 시작했다. 며칠 뒤 거의 모든 대원들 사이에서 정체를 알 수 없는 질병이 돌기 시작했다. 미라 공개 현장에 있었던 연구보조원은 목숨을 잃고 말았다. 그 다음 날에는 모래폭풍이 불어와 일주일 동안 꼼짝할 수 없게 되었다. 오늘 아침에는 식수가 오염되어 마실 수 없다는 사실이 드러났다. 물이 구릿빛으로 빛나고 있던 것이다. 이제 점점 더 많은 사람들이 무덤을 모독한 대가를 치러야 한다고 믿고 있다. 신원을 알 수 없는 파라오의 저주가  우리에게 탁친 것이다!"
 lepsius.444.g: "이게 무슨 일이오? 혜성이라도 봤나?!"
 lepsius.445.t: "길가메시 서사시의 파편"
 lepsius.445.d: "학자들은 그 유명한 길가메시 서사시가 담긴 파편을 발견했다. 길가메시 서사시는 인류 문학 사상 가장 오래된 소설 구절로 평가받고 있다."
 lepsius.445.f: "길가메시 서사시는 주로 바빌로니아 일대에서 발견되는 일련의 문학 작품에 담긴 이야기로, 현존하는 가장 오래된 쐐기 문자로 쓰여져 있다. 길가메시 서사시는 여러 판본이 존재하며 아카드어와 수메르어 문학에서 제일 유명한 이야기로 꼽힌다. 그 줄거리는 우루크의 왕 길가메시의 이야기를 전하는 것으로, 길가메시의 업적과 모험, 엔키두와의 우정과 최후, 불멸을 향한 길가메시의 여정을 담고 있다. #T 서사시의 원본을 복원하기 위해서는 @lepsius_gilgamesh_fragment! 파편 5점을 모아야 한다.#!"
 lepsius.445.g: "파편을 더 찾아봅시다."
 lepsius.445.h: "이게 마지막 파편이로군!"
 lepsius.445.i: "파편이 더 있다면 언제든 환영일세."
 lepsius.446.t: "미노아의 프레스코화"
 lepsius.446.d: "크레타에서 조사를 진행하던 우리 발굴단은 미노아 문명의 유적을 발견했다."
 lepsius.446.f: "아름다운 프레스코화가 우리 고고학자들의 관심을 끌었다. 어부와 무용수, 공놀이 하는 사람들의 모습은 고대 미노아 문명의 일상 생활을 보여주고 있다. 크레타섬에서 탐사대가 발견한 이 벽화는 4천 년이 넘는 세월에도 채색된 흔적이 남아 있었다! 이 놀라운 발견에 이어 더 많은 유물이 발견될 것이 확실하다."
 lepsius.446.g: "잃어버린 문명이 우리 눈앞에 살아 있구나."
 lepsius.447.t: "키클롭스식 석조"
 lepsius.447.d: "아르골리스에서 조사를 진행하던 우리 발굴단이 미케네 문명의 유적을 발견했다."
 lepsius.447.f: "그리스에 머물던 고고학자들이 여러 차례의 난관 끝에 무언가를 발견했다. 현지 주민들은 처음에 올리브 나무를 심은 계단석이라고 했으나, 사실은 키클롭스식 석조의 윗부분이라는 사실이 밝혀진 것이다. 발굴단은 아직 많은 것을 찾아내지는 못했지만 적어도 시작은 이뤄낸 셈이다."
 lepsius.447.g: "그 시절에 어떻게 이렇게 견고한 석조물을 세웠는가?"
 lepsius.448.t: "마야 비석"
 lepsius.448.d: "유카탄 반도의 고고학 탐사대가 마야 상형문자 해독에 진전을 보였다."
 lepsius.448.f: "유카탄 반도 정글 속 깊은 곳에 우리 탐사대원들은 마야 시대의 비문을 발견했다. 학자들은 이 비문의 제작연대가 기원전 6세기로 거슬러 올라가는 것으로 추정하고 있다. 이번 발견은 잃어버린 문화에 대한 지식을 크게 넓혀주었으나, 일부 상형문자는 우리 학자들에게 아직 풀어야 할 숙제로 남아 있다. 그러나 이 비문에 담긴 상형문자로 마야 문자의 해독은 시간 문제라는 희망을 갖게 되었다."
 lepsius.448.g: "반드시 해독하고 말겠다."
 lepsius.449.t: "마야 동굴"
 lepsius.449.d: "탐사대가 마야 문명의 흔적을 발견했지만 실제로 이렇다 할 만한 것은 없었다."
 lepsius.449.f: "마야인들은 한때 동굴에서 의식을 거행했다. 그 의식이 무엇인지는 오늘날까지도 명확히 밝혀지지 않았다. 아마 앞으로 고고학자들이 자세한 정보를 밝혀낼 수 있을 것이다. 이들은 과테말라 북부에서 마야 동굴의 입구를 발견했다. 다만 지금까지 별다른 성과는 없는 상황이다."
 lepsius.449.g: "그래서 당신들은 그 돈 받고 뭘 했소?"
 lepsius.450.t: "안데스의 미라"
 lepsius.450.d: "산꼭대기에 오른 우리 학자들은 잉카 의식의 희생물로 바쳐진 어린아이들의 시신을 발견했다. 추운 환경 덕분에 수 세기동안 보존될 수 있었던 것이다."
 lepsius.450.f: "카파코차는 잉카 제국에서 중요한 희생 의식으로서 어린아이를 제물로 바치는 것이 일반적이었다. 잉카 제국 전역에서 남녀 어린이들이 선발되어 카포차 의식에 희생되었으며, 제국 곳곳에 흩어져 있는 대표 신전에서 의식이 거행되었다. 이러한 방식의 의식을 치른 이유는 잉카인들이 인류 최고의 존재들을 신들에게 보내려 했던 것으로 여겨진다. 카포차 의식의 제물로 선발된 어린아이는 보통 술과 코카잎을 먹여 제사 장소에 안치하였다. 잉카인들은 상당히 높은 고도에 위치한 여러 곳의 와크아(wak'a)라는 제례 장소에 특별히 관심을 기울였다. 이러한 산 중에서 가장 중요한 곳에서는 카파코차 의식에 희생된 아이들의 미라화된 시신이 발견되는 경우가 많다."
 lepsius.450.g: "불쾌하지만 가치 있군."
 lepsius.451.t: "석상"
 lepsius.451.d: "고고학자들이 탐사 과정에서 근사한 석상을 발견했다. 하지만 안타깝게도 크기 때문에 옮길 수가 없었다."
 lepsius.451.f: "다음 발굴지로 향하던 우리 탐사대는 이전에 탐사가 잘 이뤄지지 못했던 험준한 지역에서 거대한 석상을 발견했다. 현지 조력자와 짐꾼들조차 그 존재를 알지 못한 이 석상에 탐사대원들은 처음부터 매혹에 빠졌다. 탐사대장은 석상을 보자마자 이것을 실어다 옮기자고 제안했지만, 크기도 크고 땅 속에 단단히 박혀 쉽지 않은 일이 될 것으로 보였다. 따라서 대원들 대다수는 석상에 새겨진 비문들을 전부 기록하고 정확한 그림으로 남기는 것이 최선이라고 생각했다. 하지만 이 귀중한 유물을 조각내어 수도로 옮겨야 한다는 불순한 목소리도 조금씩 들려오고 있다..."
 lepsius.451.g: "그림으로 정확히 옮겨 그리고 비문을 꼼꼼히 배껴 적는 것이 좋겠다."
 lepsius.451.h: "석상을 조각내어 고국으로 실어보내자."
 lepsius.452.t: "사본"
 lepsius.452.d: "우리 탐사대장은 오랫동안 실전되어 왔던 자료를 담고 있는 고대의 기록을 입수하였다."
 lepsius.452.g: "없는 것보다 낫다."
 lepsius.453.t: "풍경을 화폭에 담는 화가들"
 lepsius.453.d: "이번에 고고학 탐사대에 동행한 화가들은 지금의 풍경을 생생하게 기록하여, 다가올 수십 년 동안 학자들에게 유용한 기록으로 남게 될 것이다."
 lepsius.453.f: "역사를 통틀어 고고학 탐사에는 고대의 학자 뿐만 아니라 지리학자, 생물학자, 수학자, 천문학자까지 다양한 분야의 전문가들이 동행해 왔으며, 펜과 종이로 탐사 현장을 기록하는 화가도 예외가 아니었다. 이들은 탐사에 참여하지 않고 조국에 머무는 학자들에게 고고학 현장을 최대한 정확하게 설명할 수 있도록 중요한 지식들을 가져오는 역할을 했다. 나폴레옹의 이집트 침공 이래 고고학 탐사는 이러한 학제간 접근방식으로 여러 분야에서 동시다발적으로 학술적 이정표를 세울 수 있는 다각적인 기회로 발전해 왔다."
 lepsius.453.g: "데려와서 다행이군."
 lepsius.454.t: "연구에 나서는 과학자들"
 lepsius.454.d: "우리 과학자들은 현장에서 다양한 실험을 수행하며 비교분석을 넘어서 고고학자들에게 유용한 조언도 제공하고 있다."
 lepsius.454.f: "역사를 통틀어 고고학 탐사에는 고대의 학자 뿐만 아니라 지리학자, 생물학자, 수학자, 천문학자까지 다양한 분야의 전문가들이 동행해 왔으며, 펜과 종이로 탐사 현장을 기록하는 화가도 예외가 아니었다. 이들은 탐사에 참여하지 않고 조국에 머무는 학자들에게 고고학 현장을 최대한 정확하게 설명할 수 있도록 중요한 지식들을 가져오는 역할을 했다. 나폴레옹의 이집트 침공 이래 고고학 탐사는 이러한 학제간 접근방식으로 여러 분야에서 동시다발적으로 학술적 이정표를 세울 수 있는 다각적인 기회로 발전해 왔다."
 lepsius.455.t: "경쟁 탐사대"
 lepsius.455.d: "황야로 몇 킬로쯤 들어갔을 무렵, 우리 탐사대장은 뼈만 앙상하게 남은 한 무리의 사람들을 마주쳤다. 이들은 외국 탐사대의 가엾은 낙오자들이었다."
 lepsius.455.f: "미지의 영역으로 모험을 떠난 것은 우리 고고학자뿐만이 아니었다. 괴짜 학자 한 명이 이끄는 소규모 민간 탐사대가 국가 주도의 우리네 탐사대와 마주쳤다. 우리 탐사대와는 달리 경쟁 관계에 있는 탐사대는 열악한 여건을 갖추고 있다. 한눈에 봐도 물자가 부족하고 궁핍한 것이 눈에 띈다. 우리 탐사대의 사제가 이들을 돕자고 제안하였는데 그 자체로 고국에서는 자선 행위로 비춰질 수 있다. 반면 다른 탐사대원들은 외국 학자들과 지식을 나눌 기회로 보고 있다. 한편 군사 무관은 탐사대가 소유한 귀중한 유물을 넘겨받는 조건으로 도와줄 기회라고 생각하는 듯하다."
 lepsius.455.g: "도와주자."
 lepsius.455.h: "저들의 지식을 대가로 도와주도록 하자."
 lepsius.455.i: "저들의 보물을 우리에게 넘겨야 식량과 도움을 제공할 수 있다."
 lepsius.461.t: "스핑크스의 속삭임"
 lepsius.461.d: "우리 탐사대장 [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName]의 미심쩍은 생활 방식이 본인 스스로 잊을 수 없는 환각에 시달리는 데 일조하고 말았다."
 lepsius.462.d: "우리 육군 무관 [SCOPE.sCharacter('lepsius_military_attache').GetFullName]의 미심쩍은 생활 방식이 본인 스스로 잊을 수 없는 환각에 시달리는 데 일조하고 말았다."
 lepsius.461.g: "이 자는 자기가 사는 방식을 제대로 돌아봤으면 좋겠군."
 lepsius.463.t: "고양이 여신 바스테트"
 lepsius.463.d: "여정에 나선 [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName](이)가 연구를 통해 자신이 고양이에 애정이 있다는 것을 깨달았다."
 lepsius.463.f: "고대 이집트에는 동물 형상을 한 신이 여럿 존재했다. 그 중에는 고양이 여신 바스테트도 있었다. 고양이는 쥐뿐만 아니라 뱀과 같은 유해동물이 곡식 창고에 들어오지 못하도록 막아주었기에 고대 이집트인들의 큰 사랑을 받았다. 이집트에 매혹된 탐사대장은 바스테트 여신에게 큰 관심을 갖게 되었고 결국 고양이 한 마리를 기르기에 이르렀다. 고양이를 키우면서 스스로의 엄한 성격도 다소 누그러진 듯하다."
 lepsius.463.g: "사람들은 고양이파와 강아지파로 나뉜단 말이지."
 lepsius.464.t: "Hunting with a Saluki"
 lepsius.464.d: "Our military attaché [SCOPE.sCharacter('lepsius_military_attache').GetFullName] acquired a native hunting dog while travelling in Mesopotamia."
 lepsius.464.f: "Dogs don't usually have a good reputation in the Middle East. An exception are greyhounds like the Saluki. The Bedouins regard him as a noble companion who also does an excellent job of hunting rabbits or gazelles. Our military attaché received such an excellent dog as a gift from a local, and a deep bond between human and animal has been emerging for a few weeks."
 lepsius.464.g: "사람들은 강아지파와 고양이파로 나뉜단 말이지."
 lepsius.465.t: "A problematic superiority behavior"
 lepsius.465.d: "The arrogant character of [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] has lead to resentment in our expedition country."
 lepsius.465.g: "Why should we bother? After all, they are barbarians!"
 lepsius.465.h: "We should fix this diplomatic faux pas at all costs."
 lepsius.466.t: "The Cartographer"
 lepsius.466.d: "During the archaeological expedition, the military attaché developed a great interest in cartography and created his own map material. It seems he has a talent for land surveying."
 lepsius.466.f: "From the very beginning of the expedition, the military attaché kept a strict log of the movements and progress of the troops, making his own maps. During a briefing it turned out that he already has an impressive collection. A scientific assistant has repeatedly accompanied him in the last week and helped a little under his arms to expand his cartographic findings; now he can also go through with the measuring instruments. The scientific assistant suggests training him to become a professional surveyor."
 lepsius.466.g: "He has a great career ahead of him!"
 lepsius.466.h: "His maps are good, but he should concentrate on military matters."
 lepsius.467.t: "A forgotten relic"
 lepsius.467.d: "The leader of our archaeological expedition has made contact with a small Christian minority in the Orient. He has amazing things to say about it."
 lepsius.467.h: "He should study the relic."
 lepsius.468.t: "Attaché caught stealing artifacts"
 lepsius.468.d: "This morning one of our diggers found two artifacts in our military attaché's tent that were thought to have been lost for a few weeks. He obviously wanted to keep them for himself."
 lepsius.468.f: "Everyone knows the history of our attaché, but the other members of the expedition had actually expected that [SCOPE.sCharacter('lepsius_military_attache').GetFullName] would not fall back into old patterns. But they were obviously wrong: once a bandit, always a bandit. Because after an excavation worker found two artifacts from the most recent excavation by chance, which the attaché did not report, the only conclusion that can be drawn is that he either wanted to keep them for himself or sell them. The expedition leader has not yet confronted him directly with the allegations, but considers an agreement on how to proceed to be more sensible before consequences are drawn from this case."
 lepsius.468.g: "Keep silent about the matter."
 lepsius.468.h: "Handle the matter carefully, but insist that he returns the artifacts."
 lepsius.468.i: "Publicly expose him and discipline him!"
 lepsius.471.t_karnak: "카르나크"
 lepsius.471.t_memphis: "멤피스"
 lepsius.471.t_uruk: "우루크"
 lepsius.471.t_niniveh: "니네베"
 lepsius.471.t_tiryns: "티린스"
 lepsius.471.t_phaistos: "파이스토스"
 lepsius.471.t_itza: "치첸이트사"
 lepsius.471.t_olla: "오얀타이톰보"
 lepsius.471.d: "[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] wants to take a trip to a famous site. Although the site has great archaeological importance, this would hamper our expedition enormously."
 lepsius.471.f_karnak: "The Karnak Temple north of Luxor is considered one of the largest temple complexes in the ancient world. After the elevation of Amun-Re of Thebes to the position of local god and later imperial god, the rulers of the early Middle Kingdom began building a temple that was expanded over thousands of years to form the present-day temple complex, where the priesthood of Amun conducted daily temple service. 30 pharaohs are said to have built on it."
 lepsius.471.f_memphis: "Manetho reports that according to legend, Memphis was founded by King Menes in 3000 BC. It was the capital of Egypt during the Old Kingdom and remained an important city in Egyptian history. Memphis was under the protection of the god Ptah, the patron saint of craftsmen, whose temple Hut-Ka-Ptah was located in the center of the city. The rise and fall of Memphis are intrinsically tied to the history of the entire country."
 lepsius.471.f_uruk: "Uruk is the location of the first writing. It was already in the late 4th millennium BC. one of the leading political centers of the early Sumerian period. In ancient times, the Mesopotamian city was right on the river. In myth and literature, Uruk was famous as the capital city of Gilgamesh, hero of the Epic of Gilgamesh. Scholars identify Uruk as the biblical Erech (Genesis 10:10), the second city founded by Nimrod in Shinar."
 lepsius.471.f_niniveh: "Nineveh is located on the eastern bank of the Tigris River and was the capital and largest city of the Neo-Assyrian Empire, as well as the largest city in the world for several decades. During the Neo-Assyrian Empire, particularly from the time of Ashurnasirpal II onward, there was considerable architectural expansion. Some of the principal doorways were flanked by colossal stone lamassu door figures weighing up to 30,000 kilograms (30 t)."
 lepsius.471.f_tiryns: "Tiryns reached its height of importance between 1400 and 1200 BC, when it became one of the most important centers of the Mycenaean world, and in particular in Argolis. Its most notable features were its palace, its Cyclopean tunnels and especially its walls, which gave the city its Homeric epithet of \"mighty walled Tiryns\". Tiryns became associated with the myths surrounding Heracles, as the city was the residence of the hero during his labors, and some sources cite it as his birthplace."
 lepsius.471.f_phaistos: "According to legend, the city of Phaistos was founded by King Minos and named after a son or grandson of Heracles (Heros Phaistos), who was killed by Idomeneus, grandson of Minos and later king of Crete. The first ruler over Phaistos is said to have been Rhadamanthys, the brother of Minos. The city has the second largest palace complex on Crete after Knossos."
 lepsius.471.f_itza: "Chichén Itzá is one of the most important ruins on Mexico's Yucatán Peninsula. It is located about 120 kilometers east of Mérida in the state of Yucatán. Its ruins date from the late Maya period. Covering an area of 1.547 hectares, Chichén Itzá is one of the most extensive sites in Yucatán. The center is occupied by numerous monumental representative buildings with a religious and political background, from which a large, largely preserved step pyramid protrudes."
 lepsius.471.f_olla: "During the Inca Empire, Ollantaytambo was the royal estate of Emperor Pachacuti, who conquered the region, and built the town and a ceremonial center. At the time of the Spanish conquest of Peru, it served as a stronghold for Manco Inca Yupanqui, leader of the Inca resistance. Ollantaytambo is the only remaining example of Inca town planning. The buildings and Inca terraces as well as the narrow streets of the city are still in their original state. The straight and narrow streets form 15 square blocks (canchas), each with an entrance to the central courtyard surrounded by houses."
 lepsius.471.j: "Absolutely not - the expedition has priority!"
 lepsius.472.t: "A Lost World?"
 lepsius.472.d: "After our expedition has not reported for a long time, it reports large losses of men, beasts of burden and tools. The excuse given by the expedition leader for this is most amazing."
 lepsius.501.t: "신원 불명 파라오의 무덤"
 lepsius.501.d: "우리 탐사대의 [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] 대장은 왕가의 계곡에 잊혀진 무덤이 있다는 사실을 전해들었다. 듣자하니 과거에 알려지지 않은 파라오의 무덤인 모양이다. 현지인들은 그곳으로 들어가는 입구를 발견했다고 주장했다."
 lepsius.501.f: "이집트 파라오들이 전설적인 왕가의 계곡에 묻히게 된 것은 삼천 년도 더 된 일이다. 이곳의 무덤 가운데 상당수는 고대부터 존재가 알려져 관광 명소로 여겨졌는데, 고대 로마와 그리스의 낙서가 이를 증명한다. 콥트교도들도 무덤 일부를 예배당으로 개조하기도 했다. 수백 년 동안 인근 지역의 도굴꾼들이 무덤과 신전의 예술품들을 훔쳐 장터에 팔아넘겼다. 이 때문에 많은 무덤들은 빈 공간으로 남아 있다. 그러나 먼곳과 가까운 곳을 가리지 않고 건너온 사람들이 오랫동안 잊혀진 무덤들을 찾고 또 찾아내기 시작하였는데, 그 안에는 부장품과 벽화, 그리고 개봉된 적 없는 안치실이 존재했던 것이다. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] 역시 상태가 양호할 것으로 보이는 무덤에 대한 제보를 최근에 입수하였다."
 lepsius.501.g: "We don't have time for this."
 lepsius.502.t: "모래, 그것도 아주 많이"
 lepsius.502.d: "고고학자들이 현장에 도착하고 나서 그곳이 정말로 왕의 무덤이 흔적으로 남아 있는 것을 알아보았지만, 유적 자체가 모래 속에 완전히 묻혀 있었다."
 lepsius.502.f: "발굴 작업이 쉬울 거라고 생각한 사람은 아무도 없었다. 그러나 현지인이 고고학자들에게 무덤이 있는 곳으로 데려갔을 때, 그들이 마주한 첫번째 광경은 수직 절벽 아래 모래와 진흙이 무더기로 쌓인 모습이었다. 무덤의 흔적은 어디에도 없었다. 현지인에게 물어보니 자신은 무덤 입구를 본 적이 없지만, 할아버지께서는 아직도 알고 있고 아버지도 어렸을 때 어렴풋 본 것 같다고 했다. 왕가의 계곡은 강우량이 많아 진흙이 자주 쌓이고, 이집트의 바람과 모래는 수백 년 된 유적지를 감춰 버리는 것으로 악명높다. 무덤이 정말로 있긴 한 건지 의심하는 조수들도 있었으나, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName](은)는 잃어버린 무덤을 찾겠다는 결심을 굳게 다졌다. 하지만 오랜 세월 동안 쌓인 엄청난 양의 모래를 치우려면 추가 예산이 필요할 것이다."
 lepsius.502.g: "장비를 더 가져와라!"
 lepsius.503.t: "거대한 바위"
 lepsius.503.d: "반경 15km 이내에 있는 모든 삽을 동원해 끈질기게 파낸 끝에 탐사대는 입구를 파냈으나, 그곳에서 발견한 것은 입구를 가로막은 거대한 바위 뿐이었다."
 lepsius.503.f: "며칠 동안 모래와 진흙을 파내느라 고생한 보람이 있기를. 탐사대원들은 적어도 그렇게 바라고 있었다. 무덤 입구의 삼인방이 마침내 모습을 드러내자, 지쳐 있던 대원들의 침울한 기분은 환희로 바뀌었다. 그로부터 단 몇시간 만에 입구의 나머지 부분이 드러났다. 하지만 더 깊숙히 들어가자마자 이 무덤이 도굴되지 않고 남아 있던 이유를 알 수 있었다. 수십 년 전, 아니 수백 년 전에 암벽에서 떨어져 나온 것으로 보이는 거대한 바위가 입구를 막고 있었던 것이다. 키가 작은 소년이라도 그 바위를 지나갈 수는 없어 보였는데, 자갈과 굳은 진흙이 마치 시멘트처럼 통로를 가득 채우고 있었기 때문이다. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName](은)는 중대한 결정에 직면했다. 무덤 입구의 장애물을 어떻게 제거하면 좋은가?"
 lepsius.503.g: "고도의 연구 방법을 동원한다."
 lepsius.503.h: "고도의 기계를 활용한다."
 lepsius.503.i: "고도의 니트로글리세린을 사용한다."
 lepsius.503.j: "순수한 근력으로 밀어붙인다."
 lepsius.504.t: "폭약으로 박살난 무덤"
 lepsius.504.d: "안타깝게도 폭약을 사용하는 것은 이점보다 결점이 더 많았다. 폭약이 바위를 부수는 것을 넘어서 무덤을 통째로 박살내 버린 것이다!"
 lepsius.504.f: "폭약 설치는 쉬운 일이 아니었지만, 지질학자에게 저렴한 값으로 구할 수 있어 며칠 만에 해결을 보았다. 탐사대원 중 누구도 스스로를 폭파 전문가로 자부한 적은 없지만, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName](은)는 고위험 니트로글리세린을 다루는 것이 그렇게 어려운 일이 아니라고 생각했다. 허나 사전에 전문가와 상의했더라면 더 좋았을 지도 모른다. 탐사대원들이 필요한 양을 잘못 계산하는 바람에, 바위 하나를 날리는 게 아니라 바위면 전체가 날아가 버린 것이다! 탐사대원들은 바로 인근의 산에서 낙석이 쏟아져내려 주변을 완전히 박살내기 전에 간신히 목숨을 건지는 기적을 경험했다. 입구 뒤에 무엇이 었었던 간에 이제는 돌이킬 수 없을 정도로 박살나 버렸을 것이다."
 lepsius.504.g: "우리가 너무 과했나?"
 lepsius.505.t_archaeology: "벽화"
 lepsius.505.t_engine: "박살난 벽화"
 lepsius.505.t_muscular: "벽화"
 lepsius.505.d_archaeology: "우리 고고학자들은 정밀 고고학 조사와 최신 기술을 활용한 바위 제거 작업을 거쳐, 보존 상태가 양호한 파라오 무덤의 내부로 들어섰다."
 lepsius.505.d_engine: "탐사대는 장비를 이용하여 바위를 제거하였으나 부정적인 결과도 낳고 말았다."
 lepsius.505.d_muscular: "힘센 이탈리아인을 고용한 덕분에 바위를 치우고 보존 상태가 양호한 무덤 내부로 진입할 수 있게 되었다."
 lepsius.505.f_archaeology: "고도의 작전을 수행하듯 고고학자들은 거대한 바위에 다가갔다. 바위를 분석하고 그 재질을 확인한 뒤, 삽과 곡괭이로 조심스레 파헤쳤다. 면밀한 조사 끝에 입구의 상형문자가 손상되지 않도록 바위 덩어리를 얇은 층으로 제거하는, 복잡하면서도 오랜 시간이 걸리는 방식을 택하기로 결정을 내렸다. 작업은 고되었지만 단연코 그만한 가치가 있었다. 기름등을 손에 든 학자들은 첫번째 통로를 더듬어 내려가 고대 이집트의 아름다움을 마주했다. 들판에서 일하는 농부, 파라오의 궁정, 심판의 신을 담은 그림이 놀라운 보존 상태와 함께 벽에 그려져 있던 것이다. 비록 도굴의 흔적이 뚜렷히 남아 있는 등 유물은 발견하지 못했지만, 이처럼 기대를 불러일으키는 것들이 한데 어우러진 것만으로도 무덤을 철저히 탐사할 가치가 충분하다고 할 수 있었다."
 lepsius.505.f_engine: "최신 기술은 우리가 신원 미상 파라오의 무덤을 발굴하는 과정에 보탬이 될 것이다. 그라우트를 사용하여 입구 통로에서 바위를 끌어올리는 기계를 동원하는 것이다. 처음에는 바위가 꿈쩍도 하지 않았다. 그래서 우리 학자들은 엔진을 최대 출력으로 가동했다. 그건 치명적인 실수였다. 바위가 박혀 있던 곳에서 잠시 빠져나와 경사면 위로 끌려올라갔지만, 머지않아 벨트가 완전히 풀려 무덤 쪽으로 빠르게 굴러떨어지면서 무덤 내부에 극심한 손해를 끼친 것이다! [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName](와)과 조수들은 드러난 통로 쪽으로 급히 달려가 보았지만 그들이 마주한 것은 충격적인 광경 뿐이었다. 바위가 한때 아름다운 채색 벽화로 가득하던 통로를 완전히 박살냈을 뿐만 아니라 무덤 전체를 떠받치던 중요한 벽면도 심하게 부숴져 버린 것이었다."
 lepsius.505.f_muscular: "룩소르로 복귀한 우리 탐사대원들은 인상적인 사람을 찾아냈다. 이 남자는 이탈리아 파도바 출신으로서, 원래는 나일강의 범람을 막는 수력 장치를 이집트의 통치자에게 시연하기 위해 이곳에 찾아왔으나, 사업이 실패로 끝나고 말았다. 2미터에 달하는 거구에 황소 같은 근육질을 가진 남자는 이전에 서커스단에서 '파타고니아의 헤라클레스'라는 이름으로 공연에 나섰다고 밝혔다. 그 남자가 데리고 다니는 영국인 하인의 증언에 따르면 한번에 여섯 명까지 들어올릴 수 있다고 한다. 바로 이 특별한 능력을 기회 삼아 우리는 그 남자를 고용하여 무덤의 문을 열기로 결정했다. 남자는 현장에 도착하자마자 놀라운 기력으로 돌을 굴려 치워버렸다. 기름등을 든 고고학자들은 복도로 달려 들어가 고대 이집트의 아름다움과 마주했다. 들판에서 일하는 농부, 파라오의 궁정, 심판의 신을 담은 그림이 놀라운 보존 상태와 함께 벽에 그려져 있던 것이다. 이처럼 기대를 불러일으키는 것들이 한데 어우러진 것만으로도 무덤을 철저히 탐사할 가치가 충분하다고 할 수 있었다."
 lepsius.505.g: "고대 이집트의 장엄함일세!"
 lepsius.505.h: "이럴수가."
 lepsius.506.t_archaeology: "무사히 보존된 석관"
 lepsius.506.t_engine: "위태로운 석관"
 lepsius.506.t_muscular: "박살난 석관"
 lepsius.506.d_archaeology: "우리 고고학자들은 놀라움과 경외심을 담아둔 채, 파라오가 안치된 묘실에 들어서서 제20왕조 시대의 아름다운 석관과 미라를 확보하였다."
 lepsius.506.d_engine: "기계로 인해 파괴된 부분이 곳곳에 선명하게 남아 있었다. 고고학자들은 상황을 제대로 파악할 여유도 없이 최대한 빨리 석관을 바깥으로 옮기느라 분주해졌다!"
 lepsius.506.d_muscular: "우리 학자들은 마침내 손상 없이 아름답게 장식된 파라오의 묘실로 들어가는 데 성공했으나, 그 순간 예기치 못한... 사고가 발생했다."
 lepsius.506.f_archaeology: "[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName]의 지휘로 우리 고고학자들이 실제 묘실에 들어가게 된 것은 진정으로 역사적인 경험이라 할 수 있었다. 제물로 바친 항아리 몇 개와 미라로 만들어진 개 외에도 이들을 앞에 놀라운 발견이 기다리고 있었다. 다름아닌 3천년 전도 더 전에 묻혔던 그 자리에 신원 미상 파라오의 관이 그대로 남아 있었던 것이다! 학자들은 조심스레 먼지를 털어내고 도굴꾼이 망가뜨리고 간 관뚜껑을 열어보니 잘 보존된 나무관이 있음을 확인하였다. 이것으로 우리 박물관은 이집트 문명에 대한 하나뿐인 증거를 얻게 되었다!"
 lepsius.506.g: "고고학이 곤경을 면하게 해 줬군."
 lepsius.506.h: "어서 옮겨라!"
 lepsius.506.i: "이럴수가."
 lepsius.511.t: "A Question of Honor"
 lepsius.511.d: "According to some farmers, a foreign expedition hoisted their country's flag on the Cheops pyramid a few days ago. The Patriots on our team feel challenged - and want to do the same."
 lepsius.511.f: "The expedition was near Cairo when the news shocked all participants: last week someone had apparently planted their own country's flag on the top of the Giza pyramid! Such airs and graces are actually forbidden in the field of science, and it remains unknown whether the Pasha agreed to such a triumphant gesture. Only one thing is clear: throughout the expedition there was a fervent feeling of doing the same, if only to not let one's own homeland look dishonorable."
 lepsius.511.g: "We don't have time vor this."
 lepsius.511.h: "We'll do it - for [ROOT.GetCountry.GetName]!"
 lepsius.512.t: "Dawn"
 lepsius.512.d: "The expedition leaves early in the morning to climb the Great Pyramid of Giza!"
 lepsius.512.f_wine: "The participants of the pyramid ascent already get up at 5 o'clock in the morning; yesterday they prepared a flag five meters high, rolled the huge banner past the great Sphinx to the Pyramid of Cheops. A cold turkey is ready for breakfast, some are still exhausted from yesterday's work on the flag. Part of the expedition stays with a pitched tent at the feet of the Sphinx, the rest sets out for the pyramid. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] promises that there will be a specially saved bottle of wine to celebrate at the top of the pyramid."
 lepsius.512.f_no_wine: "The participants of the pyramid ascent already get up at 5 o'clock in the morning; yesterday they prepared a flag five meters high, rolled the huge banner past the great Sphinx to the Pyramid of Cheops. A cold turkey is ready for breakfast, some are still exhausted from yesterday's work on the flag. Part of the expedition stays with a pitched tent at the feet of the Sphinx, the rest sets out for the pyramid. Only when the group gets close to the Great Pyramid does the military attaché realize that [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] has forgotten the most important thing this morning: the wine to toast!"
 lepsius.512.g: "I hope he brings the best wine ..."
 lepsius.512.h: "He forgot the wine?"
 lepsius.513.t: "The Ascent"
 lepsius.513.d: "The archaeological leader and the military attaché stand at the base of the great pyramid. There is disagreement as to who should lead the daring enterprise."
 lepsius.513.f: "Our team reaches the base of the Great Pyramid of Pharaoh Cheops. The question arises as to how many steps it takes to reach heaven - and [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] can accurately answer that there are 203. There are so many stone layers to conquer. Meanwhile, the question arises as to who should lead the rise. [SCOPE.sCharacter('lepsius_military_attache').GetFullName] has already claimed that he is just as suitable as a mountain climber ..."
 lepsius.513.g: "[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] should lead us further."
 lepsius.513.h: "[SCOPE.sCharacter('lepsius_military_attache').GetFullName] should lead us further."
 lepsius.514.t: "The original entrance"
 lepsius.514.d: "Our team has climbed a lower level of the pyramid. They are now on the seventeenth step, very close to the original entrance to the burial chamber."
 lepsius.514.f: "The first stage has been taken. Our expedition is still very close to the bottom but has taken a break. Our expedition leader would like to explore the historical entrance to the Cheops pyramid more closely and descend into the interior with some excavation helpers. Some expedition members take the break to have lunch. Everyone knows that the ascent will be more dangerous from now on."
 lepsius.514.i: "This place is good enough for our flag."
 lepsius.515.t: "100 steps"
 lepsius.515.d: "Our team has climbed the hundredth step of the pyramid. The troupe is now almost halfway through the ascent."
 lepsius.515.f: "A hundred steps doesn't seem like much, but with a large group, luggage and limited space the challenge is quite different. Our banner is still rolled up and carried by five men. Some members of the Expeiditon are already announcing that the view at this point is high enough. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName], meanwhile, looks worriedly to the top - because the most risky phase of the ascent is imminent."
 lepsius.516.t: "Tha Fall"
 lepsius.516.d: "During the last pyramid stage, our leader and his people apparently overdid themselves - a devastating incident occurred!"
 lepsius.516.f: "Maybe it was a human error, maybe a plan didn't work out, but maybe fate punished us for our arrogance. However, when climbing the pyramids, a helper slipped on a pyramid step and dragged the other expedition members and loads into the abyss with him. Our expedition leader and our military attaché could prevent the worst, but were badly injured. Some porters got away with replenishments, others complain of broken bones. We had to call off the ambitious undertaking to hoist our flag on the Great Pyramid."
 lepsius.516.g: "A shame for all of us."
 lepsius.517.t: "On the Top of the Great Pyramid"
 lepsius.517.d: "A truly outstanding day for the expedition team and our country - the [ROOT.GetCountry.GetAdjectiveNoFlag] flag flies over the Great Pyramid of Giza!"
 lepsius.517.f: "A great moment for archaeology, a great moment for [ROOT.GetCountry.GetName]. Our expedition climbed to the top of the Cheops Pyramid and marked the achievement with a small celebration. The names of Champollion, Lepsius and Rosellini rang out in unison with a hearty 'hip-hip-hooray!' and finally the patriots hoisted the flag. In the light of the setting sun, our banner now shines across the entire Nile Valley!"
 lepsius.517.g: "Raise the flag of [ROOT.GetCountry.GetName] - and cheers!"
 lepsius.517.h: "Raise the flag of [ROOT.GetCountry.GetName]!"
 lepsius.521.t: "The Ishtar Gate"
 lepsius.521.d: "During their excavations in Babylon, archaeologists have discovered the colossal remains of the legendary Ishtar Gate. The historic city gate is in remarkably good condition."
 lepsius.521.f: "During their excavations on the site of the ancient Babylonian capital, excavation workers first found glazed bricks, which suggested a prestigious, representative building. The further the archaeologists dug at the site, the more finds they made. Finally, they could even make out the walls and towers of the excellently preserved city gate, on which lions, bulls and mythical creatures strutted. Expedition leader [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] presented our government with a daring plan: dismantle the entire gate and rebuild it true to the original in the capital. A costly undertaking with many imponderables - and at the same time so attractive that leading intellectuals and the museum management have joined the idea."
 lepsius.521.g: "Just take some parts. It should stay where it is."
 lepsius.521.h: "It should be transported to [SCOPE.sState('capital_scope').GetCityHubName] and reconstructed."
 lepsius.522.t: "Transport of bricks from Mesopotamia"
 lepsius.522.d: "A full-size batch of bricks for brick reconstruction has reached the museum at [SCOPE.sState('capital_scope').GetCityHubName] today."
 lepsius.522.f: ""
 lepsius.522.g: "I love the smell of Mesopotamian bricks in the morning."
 lepsius.523.t: "Ishtar bricks in foreign hands"
 lepsius.523.d: "We are not the only ones who have been digging in Babylon over the last few decades. It turns out that a foreign nation also owns some shipments of the bricks needed to rebuild the Ishta Gate. We are forced to ask humbly."
 lepsius.523.f: ""
 lepsius.523.g: "We shall probably humble ourselves."
 lepsius.523.h: "For some worthless bricks? Never!"
 lepsius.524.t: "Enemy blocks our brick transport!"
 lepsius.524.d: "The long-awaited shipment of Mesopotamian bricks to rebuild the Ishtar Gate in our museum has not arrived after months. We received news that the transport was blocked during the war."
 lepsius.524.f: ""
 lepsius.524.g: "That's sabotage!"
 lepsius.525.t: "A special fee"
 lepsius.525.d: "Apparently the excavation country where the bricks for the Ishtar Gate come from is trying to profit from our venture. When the bricks were exported, a 'special fee' was charged on the bricks!"
 lepsius.525.f: ""
 lepsius.525.g: "We'll pay every piece of stone ..."
 lepsius.526.t: "Small Transport of bricks from Mesopotamia"
 lepsius.526.d: "Unknown circumstances have resulted in our ship being only half filled with the bricks of the Ishtar Gate this time."
 lepsius.526.f: ""
 lepsius.526.g: "What's so hard about shipping a few bricks?"
 lepsius.527.t: "Shipload of bricks arrives in port"
 lepsius.527.d: "An unusually large number of bricks needed to rebuild the Ishtar Gate have reached the museum today. Apparently the loading in Mesopotamia is progressing better than expected."
 lepsius.527.f: ""
 lepsius.527.g: "Ah, more bricks!"
 lepsius.528.t: "Bad bricks"
 lepsius.528.d: "Unfortunately, when we looked at the bricks that had arrived in [SCOPE.sState('capital_scope').GetCityHubName], our curators found that some of the boxes were completely unusable. For better or for worse, we have to do without them."
 lepsius.528.f: ""
 lepsius.528.g: "My valuable bricks - no!"
 lepsius.529.t: "Diplomatic prostration"
 lepsius.529.d: "A foreign nation humbled itself before the world public just to beg us for some worthless archeological artifacts that an antiquarian sold us a few years ago. Of course, we gladly accepted the gesture and freed ourselves from this junk."
 lepsius.529.f: ""
 lepsius.529.g: "Formidable!"
 lepsius.530.t: "Ishtar Gate reconstructed!"
 lepsius.530.d: "After years of work and painstaking assembly of tens of thousands of Babylonian fragments, the legendary Ischtar Gate shines in new splendor - namely in its original size in our museum!"
 lepsius.530.f: "The Ishtar Gate was the eighth gate to the inner city of Babylon.  It was constructed circa 575 BCE by order of King Nebuchadnezzar II on the north side of the city. It was part of a grand walled processional way leading into the city. The walls were finished in glazed bricks mostly in blue, with animals and deities in low relief at intervals, these also made up of bricks that are molded and colored differently. The front of the gate has a low relief design with a repeated pattern of images of two of the major gods of the Babylonian pantheon. Marduk, the national deity and chief god, with his servant dragon Mušḫuššu. is depicted as a dragon with a snake-like head and tail, a scaled body of a lion, and powerful talons for back feet. Marduk was seen as the divine champion of good against evil, and the incantations of the Babylonians often sought his protection. The second god shown in the pattern of reliefs on the Ishtar Gate is Adad (also known as Ishkur), whose sacred animal was the aurochs, a now-extinct ancestor of cattle. Adad had power over destructive storms and beneficial rain. The design of the Ishtar Gate also includes linear borders and patterns of rosettes, often seen as symbols of fertility. The bricks of the Ishtar gate were made from finely textured clay pressed into wooden forms. Each of the animal reliefs was also made from bricks formed by pressing clay into reusable molds."
 lepsius.530.g: "Magnificent!"
 lepsius.531.t: "The Legend of the Lamassu"
 lepsius.531.d: "Our archaeologists have heard the story of an extraordinarily magnificent lamassu that is said to have been lost a long time ago and is somewhere in the Kurdish region."
 lepsius.531.f: "It was on an evening when our team set up the tents, lit the campfire, and prepared the mutton to end the day. In the smoldering black, blue, and red hues of dawn, an old shepherd arrived at the camp asking for provisions. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] complied and was told an amazing story. About 30 years ago, another archaeological expedition is said to have searched for treasures and extraordinary works of art in this area in order to impress the local museum management and return home with fame and glory. The highlight of the excavation was a huge lamassu, which is still known to the locals today because of its monumental size and good condition. But an accident happened during the transport. While dozens of men moved the giant statue of the Mesopotamian hybrid, the expedition leaders fell out with the local Kurdish tribe. Apparently they wanted to cheat the recruited Kurdish helpers out of their wages. So the tribe ambushed the expedition members and took what was believed to be theirs. The lamassu, however, remained where it was - and is still waiting to be recovered in the Kurdish region. The shepherd has offered to tell us the location of the legendary Lamassu in exchange for our help."
 lepsius.531.g: "It is far too dangerous to put oneself in needless danger because of such fairy tales."
 lepsius.531.h: "We must recover this lamassu at all costs!"
 lepsius.532.t: "Searching the Lamassu"
 lepsius.532.d: "Our expedition has embarked on the dangerous journey to the Kurdish region. Some advocate splitting up because of the greater chance of success."
 lepsius.532.g: "We shouldn't split."
 lepsius.532.h: "We should split up the expedition."
 lepsius.533.t: "Gifts"
 lepsius.533.d: "Our expedition has met with the clan leaders to obtain permission to cross the area peacefully and recover the lamassu."
 lepsius.533.f: "Not splitting up the expedition turned out to be an unexpected advantage: the sluggishness of the baggage train meant that the leaders of the local Kurdish clan found us faster than we would have expected. Soon the expedition leader and the military attaché were brought before the patriarchs, who are considered the real rulers of this area. They encountered an uncomfortable distrust. Apparently, unpleasant memories of the last archaeological expedition live on with them. There is also the expectation that we, as guests, will bring gifts. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] had made provisions for this eventuality, but apparently the materials acquired are simply not enough for many of the leaders to convince them of our intentions."
 lepsius.533.g: "We offer fine fabrics."
 lepsius.533.h: "Remind them of their honor and hospitality."
 lepsius.533.i: "Show them a gesture of submission."
 lepsius.534.t: "Insulted"
 lepsius.534.d: "The attempt to win over the Kurdish patriarchs was a complete failure - instead we turned them against us. An escalation of the situation threatens our entire expedition!"
 lepsius.534.g: "Guards!"
 lepsius.534.h: "Defend!"
 lepsius.534.i: "Flee!"
 lepsius.535.t: "Expedition members kidnapped by Kurds"
 lepsius.535.d: "After an unsuccessful search by the downsized expedition, they are horrified to find on their return that some members of the team that stayed behind were victims of a Kurdish attack."
 lepsius.535.f: "The strategy of splitting up the expedition later turned out to be a devastating mistake. Apparently a Kurdish tribe was just waiting for prey and took the opportunity when the armed part under the military attaché separated from the rest of the convoy. Because most of the materials they took with them were of little value to the looters, they abruptly kidnapped a good dozen helpers as hostages, apparently convinced that they could get a ransom for them. However, the expedition team decided not to accept such an offer - it could set precedents for the future. While [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] insists on negotiating with the Kurdish leaders, [SCOPE.sCharacter('lepsius_military_attache').GetFullName] insists on attacking the Kurdish camp and teaching the looters a lesson."
 lepsius.535.g: "Try to negotiate."
 lepsius.535.h: "Attack them!"
 lepsius.536.t: "Negotiation failed!"
 lepsius.538.t: "The Night of Sorrows"
 lepsius.538.d: "The search for the lamassu failed."
 lepsius.538.f: "The expedition team leaves the Kurdish region empty-handed. Like kicked dogs, they make their way through the hills at night to resume the old route. The loss of people and material depresses all expedition members. The question of the meaningfulness of the entire journey leaves melancholy and dejection in its wake."
 lepsius.538.g: "We will return..."
 lepsius.539.t: "A noble death"
 lepsius.539.d: "[SCOPE.sCharacter('lepsius_military_attache').GetFullName], our military attaché, fell in battle with the Kurds!"
 lepsius.539.f: "It was a bitter battle, but our little-trained troops could hardly do anything against the tried-and-tested and courageous Kurdish fighters. The attaché ordered the retreat and stayed behind with his own men to cover our rear. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] could only take a last look back and see how he fell to the ground in defeat. He bought the team valuable time to get to safety, while for himself any help came too late."
 lepsius.539.g: "He gave his life for ours."
 lepsius.540.t: "The Lamassu"
 lepsius.540.d: "[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] was able to convince the Kurds of our concerns. The way to recover the Lamassu is clear."
 lepsius.540.d_victory: "We've won a military victory over the native Kurdish tribe and cleared our way to the legendary Lamassu!"
 lepsius.540.f: "It was not easy to convince the Kurds of our good intentions, but the useful qualities of our expedition leader made this seemingly impossible undertaking a success. After only a few days of searching, we found the described lamassu near a cliff. A majestic apparition radiating out over the whole valley! Our archaeologists were pleased to find that the colossus is almost undamaged. It is already clear that it will be the main exhibit in our Mesopotamian collection."
 lepsius.540.f_victory: "After a hard and bitter battle, our heroic attaché [SCOPE.sCharacter('lepsius_military_attache').GetFullName], thanks to his superior skills (and a little help from his soldiers), managed to put the enemy to flight. Impressed by this lesson, the Kurds no longer dared stand in the way of the lamassu's recovery. After only a few days of searching, we found the described lamassu near a cliff. A majestic apparition radiating out over the whole valley! Our archaeologists were pleased to find that the colossus is almost undamaged. It is already clear that it will be the main exhibit in our Mesopotamian collection."
 lepsius.540.g: "It is wonderful!"
 lepsius.551.t: "The Archaeological Accident"
 lepsius.551.d: "There was a terrible accident on an excavation site - our expedition leader has disappeared!"
 lepsius.551.g: "What happened to him?"
 lepsius.552.t: "The Maze"
 lepsius.552.g: "I hope we don't encounter any bull-like mythical creatures..."
 lepsius.553.t: "The Maze - once again"
 lepsius.553.g: "It's a heck of a deja vu!"
 lepsius.554.t: "Hall of the Dolphins"
 lepsius.554.g: "Go left."
 lepsius.554.h: "Go right."
 lepsius.554.i: "Go upstairs."
 lepsius.554.j: "Go downstairs."
 lepsius.555.t: "Hall of the Sun"
 lepsius.555.d: "The end of a corridor forks into three lanes. The remains of a fresco can be found on the wall."
 lepsius.555.f: "On the fresco, the blue color shines towards the archaeologist. The sky takes up the whole wall. Eos, the goddess of dawn, stands in the east and dominates the scene. Opposite her to the west is her husband Astraios, who is only recognizable as a silhouette at night. In between the sun shines at noon."
 lepsius.555.g: "Take the left corridor."
 lepsius.555.h: "Take the right corridor."
 lepsius.555.i: "Take the middle corridor."
 lepsius.556.t: "Hall of the Women"
 lepsius.556.d: "The Lost One reaches a room at the end of which are four open doors. The small sculptures of four women stand in front of it."
 lepsius.556.f: "The four sculptures show women of different ages and sexes. The researcher cannot determine whether they are goddesses or mortals. Their forms are primitive and limited to the essentials. Her color has long faded; what makes them different is the objects in their hands. The first holds a ball of yarn in her hand, from which she plucks a thread. The second is holding a mirror and looking at herself. The third is holding a snake. The last leads an arch."
 lepsius.556.g: "Door I."
 lepsius.556.h: "Door II."
 lepsius.556.i: "Door III."
 lepsius.556.j: "Door IV."
 lepsius.557.t: "Hall of the Islands"
 lepsius.557.g: "Rhodes."
 lepsius.557.h: "Delos."
 lepsius.557.i: "Euboea."
 lepsius.557.j: "Naxos."
 lepsius.558.t: "Wrath of the Minotaur"
 lepsius.558.g: "What just happened down there?"
 lepsius.559.t: "The death of [SCOPE.sCharacter('lepsius_minotaur_victim').GetFullName]"
 lepsius.559.d: "The former expedition leader [SCOPE.sCharacter('lepsius_minotaur_victim').GetFullName] was found dead in his apartment under mysterious circumstances."
 lepsius.559.g: "But was it really suicide?"
 lepsius.560.t: "Escaped from the maze!"
 lepsius.560.d: "After finally escaping the maze, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] can tell his colleagues about the incredible discovery."
 lepsius.560.g: "Could this have been ... the legendary labyrinth of Daidalos?"
 lepsius.561.t: "The Mysterious Pyramid"
 lepsius.561.d: "Our archaeological expedition has identified a hitherto unrecorded pyramid, half-swallowed by the Yucatec selva. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] has encountered lore of this place before and resolves to attempt an entry ..."
 lepsius.561.g: "I have a bad feeling about this."
 lepsius.561.h: "Interesting. You go first."
 lepsius.562.t: "The Glyph-Riddle"
 lepsius.562.d: "At the end of a long corbelled passage stands a dressed-stone panel bearing a riddle. Four recessed cartouches, each carved with the visage of a great Maya god, can be depressed; the masonry fairly reeks of a mechanical contrivance. Beneath runs a distich: “I rise in the east in fiery glory; at zenith I blaze like jade; at dusk I descend the road beneath the earth. I keep the count of days and seat the lords.” One cartouche must be pressed."
 lepsius.562.g: "K'inich Ajaw (Sun Lord)."
 lepsius.562.h: "Chaac (Rain/Thunder)."
 lepsius.562.i: "Itzamnaaj (Creator/Sky)."
 lepsius.562.j: "Kukulkan (Feathered Serpent)."
 lepsius.563.t: "The Idol"
 lepsius.563.d_right: "Our archaeologist attains the goal of the venture; the mechanism yields and a sanctum opens."
 lepsius.563.d_wrong: "Our archaeologist gains the inner chamber; yet the facility of access offends reason—surely the device has not had its last word."
 lepsius.563.g: "Gently... carefully... do it..."
 lepsius.563.h: "I know this scene—it never works out. Grab the damn artifact and RUN!"
 lepsius.564.t: "It's a trap!"
 lepsius.564.g: "RUN!"
 lepsius.564.h: "I knew it—blast!"
 lepsius.565.t_right: "Leaving the Pyramid"
 lepsius.565.t_wrong: "An Archaeological Rival"
 lepsius.565.d_right: "Against expectation, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] survives the contrivances within the pyramid and succeeds in securing the idol!"
 lepsius.565.g: "Charlie, start the engine!"
 lepsius.565.h: "I can't stand that guy."
 lepsius.566.t: "An archaeological offer"
 lepsius.566.d: "A private archaeologist offers us an excellent commodity that he previously snatched away from a foreign rival."
 lepsius.566.f: "A private expedition has reported a Mayan pyramid deep in the selva of Yucatán. Its leader—alas, a compatriot—claims to have procured a sacred idol which, by a curious turn, had just been wrested from the grasp of a fedora‑wearing [PREV.GetCountry.GetAdjectiveNoFlag] archaeologist. The latter, so the tale goes, perished shortly thereafter in a violent skirmish with Hovitos tibesmen. However shaded the circumstances, the piece would be a singular attraction for our museum’s Pre‑Columbian collection—provided we meet the asking price."
 lepsius.566.g: "This artifact will look splendid in our collection!"
 lepsius.566.h: "We do not buy artifacts from ruthless grave robbers."
 lepsius.581.t: "잃어버린 세계로 돌아가기"
 lepsius.581.g: "He should restore his honor."
 lepsius.581.i: "Our national interests trump the bruised egos of lousy individuals."
 lepsius.582.t: "Disregarded explorer returns triumphant"
 lepsius.582.d: "To the surprise of the entire scientific world, [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] has returned from Yucatán - and has proof of his bizarre claims!"
 lepsius.582.g: "He ... was right?"
 lepsius.583.t: "Disregarded explorer vanishes in Yucatán"
 lepsius.584.t: "Entering the Lost World"
 lepsius.584.d: "After weeks, the expedition has reached a completely unknown valley. It seems that [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] is actually right with his fantastic claims!"
 lepsius.584.g: "Incredible!"
 lepsius.585.t: "Photographing Dinosaurs"
 lepsius.585.d: "The new technical possibilities allow the unique flora and fauna of the Lost World to be captured on camera."
 lepsius.585.f: "It's like looking through a window into a world millions of years ago: pterosaurs rule the skies, giant brontosaurs shake the earth and dangerous raptors hunt unwary prey. The plants here are also completely different from those in other parts of Yucatán. A scientific companion took advantage of the moment and took a whole series of photos with his camera, which serve as evidence for home. The scientists there may be able to reconstruct the early history of the earth even better."
 lepsius.585.g: "Please, make 'ROAR'!"
 lepsius.586.t: "Maya presence"
 lepsius.586.d: "After a thorough exploration of the valley, the expedition leader came up with a risky plan."
 lepsius.586.g: "A unique opportunity!"
 lepsius.586.h: "Let's take only the most necessary evidence with us."
 lepsius.587.t: "Expedition ends in horrific desaster"
 lepsius.587.d: "The expedition has taken the worst possible turn after a raptor attack."
 lepsius.588.t: "Gem of Kukulkan"
 lepsius.588.d: "Against all odds, our expedition leader managed to get hold of the legendary Gem of Kukulkan!"
 lepsius.589.t: "Heroes return from the Lost World"
 lepsius.589.f: "What a day! After a dangerous and adventurous journey to the end of the world, our expedition was able to share their extraordinary finds to prove to the public that [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] is not a madman, but in fact a reputable scientist - and a real hero! The press and the population have revised their attitude in detail and also recognize the support from the government as the right decision. However, the expedition leader has pledged to keep the true location of the valley a secret in order to conserve the flora and fauna there and reduce the risk of poachers."
 lepsius.701.t: "Foreigners want to steal our inheritance"
 lepsius.701.d: "[SCOPE.sCountry('lepsius_smuggler_country').GetAdjectiveNoFlag] Archaeologists were caught trying to illegally move a major artifact out of the country today. How should we react?"
 lepsius.701.f: "오늘 우리나라로부터 발굴 허가를 받은 [SCOPE.sCountry('lepsius_smuggler_country').GetName] 국민이 굉장히 귀중한 유물을 국외로 반출하려다 적발되었다. 현행법에 따르면 해외 고고학자는 발굴한 유물의 절반을 출토 국가에 전달해야 할 의무가 있다. 이들은 우리가 조사에 나서지 못한 틈을 타 고국으로 빼돌리려 했던 것으로 보인다."
 lepsius.701.g: "항의하시오!"
 lepsius.701.h: "이 횡설수설하는 노인네들을 어떻게 대해야 하는가?"
 lepsius.702.t: "Diplomatic incident"
 lepsius.702.d: "Unfortunately, the authorities in [SCOPE.sCountry('lepsius_protest_country').GetName] have noticed our attempt to bring the valuable artifact into our country. How should we react?"
 lepsius.702.f: "From the end of the 19th century, the most common form of archaeological excavation license was based on the sharing of finds: the excavator gave half of the artifacts found to the country in which he was conducting an excavation. The authorities inspected the objects found and had a special eye on that the most valuable pieces were not taken out of the country. However, it happened again and again that some countries insisted on not handing over a piece that had been excavated; in other cases, the parties agreed in a deal how to proceed."
 lepsius.702.g: "Whoever finds it gets to keep it."
 lepsius.702.h: "We will certainly find an amicable agreement."
 lepsius.702.i: "Donate the artifact as a token of our philanthropy."
 lepsius.703.t: "Foreigners laugh at us!"
 lepsius.703.d: "The barbarians from [SCOPE.sCountry('lepsius_smuggler_country').GetName] made fun of our claims. They wouldn't dream of letting us have any part in the find - and have smuggled the artifact back to their homeland."
 lepsius.703.f: "The Victorian era has countless stories of artifacts being illegally taken out of the country, particularly by European powers. In some cases, museums still have claims for reimbursement to this day."
 lepsius.703.g: "This arrogance is unbelievable!"
 lepsius.704.t: "Concessions granted"
 lepsius.704.d: "[SCOPE.sCountry('lepsius_smuggler_country').GetName] accommodated us and accepted our claims as justified. Diplomatically and financially they want to grant us concessions. They also offer us a number of other finds to encourage us to hand over the precious treasure."
 lepsius.704.f: "In many cases of suspected grave robbery or theft, the European powers accommodated the excavation countries. After the excavations in Troy, for example, Schliemann had to present himself to the Sublime Porte because he had smuggled artifacts abroad. Schliemann not only handed in a few finds, but also paid five times the amount demanded. Certainly such a procedure was not the most charming way of dealing internationally, but it was always better than cheating the excavation country entirely and was often accepted by the plaintiff countries as an amicable settlement."
 lepsius.704.g: "Glad they realized they were wrong."
 lepsius.706.t: "대표 유물 도착!"
 lepsius.706.d: "약간의 지연이 있었지만, 드디어 오늘 박물관에 귀한 유물이 도착했다. 박물관장은 벌써 유물을 놓을 아주 특별한 자리를 마련해 두었다!"
 lepsius.706.f: "대표 유물은 온 박물관과 전시관의 자랑이다. 그런 보물을 조국의 것으로 부를 수 있는 국가야말로 자랑스러울 것이다!"
 lepsius.711.t: "Mask of Tutankhamun"
 lepsius.711.d: "After discovering the lost tomb of Tutankhamun, our archaeologists were able to recover a very special artifact: the pharaoh's mask!"
 lepsius.711.f: "The mask of Tutankhamun is a gold mask of the 18th-dynasty ancient Egyptian pharaoh Tutankhamun. The death mask is one of the best-known works of art in the world and a prominent symbol of ancient Egypt. Bearing the likeness of Osiris, Egyptian god of the afterlife, it is 54 centimetres tall, weighs over 10 kilograms or 321.5 troy ounces, and is decorated with semi-precious stones. An ancient spell from the Book of the Dead is inscribed in hieroglyphs on the mask's shoulders. The face represents the pharaoh's standard image, and the same image was found by excavators elsewhere in the tomb, in particular in the guardian statues. According to the Egyptologist Nicholas Reeves, the mask is 'not only the quintessential image from Tutankhamun's tomb, it is perhaps the best-known object from ancient Egypt itself.'"
 lepsius.711.g: "우리 소장품의 가장 훌륭한 유물이 될 것이다."
 lepsius.711.h: "이 유물을 우리나라로 무사히 반입해야 한다..."
 lepsius.712.t: "Bust of Nefertiti"
 lepsius.712.d: "During our excavations in Egypt, our archaeologists found a truly outstanding artifact: the Bust of Nefertiti!"
 lepsius.712.f: "The Nefertiti Bust is a painted stucco-coated limestone bust of Nefertiti, the Great Royal Wife of Egyptian pharaoh Akhenaten. It is one of the most-copied works of ancient Egypt. Nefertiti has become one of the most famous women of the ancient world and an icon of feminine beauty. Little is known about Nefertiti. Theories suggest she could have been an Egyptian royal by birth, a foreign princess or the daughter of a high government official named Ay, who became pharaoh after Tutankhamun. She may have been the co-regent of Egypt with Akhenaten, who ruled from 1352 BCE to 1336 BCE. The bust does not have any inscriptions, but can be certainly identified as Nefertiti by the characteristic crown, which she wears in other surviving depictions."
 lepsius.713.t: "Palette of Narmer"
 lepsius.713.d: "Our archaeologists have unearthed an extraordinary artifact during their excavations: the Palette of Narmer!"
 lepsius.713.f: "The Narmer Palette, also known as the Great Hierakonpolis Palette or the Palette of Narmer, is a significant Egyptian archeological find, dating from about the 31st century BC, belonging, at least nominally, to the category of cosmetic palettes. It contains some of the earliest hieroglyphic inscriptions ever found. The tablet is thought by some to depict the unification of Upper and Lower Egypt under the king Narmer. Along with the Scorpion Macehead and the Narmer Maceheads, also found together in the main deposit at Nekhen, the Narmer Palette provides one of the earliest known depictions of an Egyptian king. The Palette shows many of the classic conventions of Ancient Egyptian art, which must already have been formalized by the time of the Palette's creation. The Egyptologist Bob Brier has referred to the Narmer Palette as 'the first historical document in the world'."
 lepsius.722.t: "Mask of Sargon"
 lepsius.722.d: "During excavations in Nineveh in the course of discovering the Hanging Gardens, our archaeologists found a remarkable artifact: the Mask of Sargon!"
 lepsius.722.f: "The bronze head of a king, wearing the wig-helmet of the old Sumerian rulers, is probably Sargon himself. Though lacking its inlaid eyes and slightly damaged elsewhere, this head is rightly considered one of the great masterpieces of ancient art.The head is a life-size, bronze bust found in Nineveh. The intricate curling and patterning of the beard and the complex hairstyle suggests royalty, power, and wealth from an ideal male in society. Aside from its aesthetic traits, this piece is spectacular because it is the earliest hollow-cast sculpture item known to use the lost-wax casting process.  There is deliberate damage on the left side of the face and eye, indicating that the bust was intentionally slashed at a later period to demonstrate political iconoclasm."
 lepsius.723.t: "Helmet of Meskalamdug"
 lepsius.723.d: "During our excavations in Babylonia, our archaeologists came across a special find: the Helmet of Meskalamdug!"
 lepsius.723.f: "The Helmet of Meskalamdug is one of the most famous finds from the royal tombs of Ur. Meskalamdug was an early Sumerian ruler of the First Dynasty of Ur in the 26th century BCE. The helmet was embossed in gold sheet and was therefore hardly suitable as protective clothing for war. It may have been used more in the ceremonial/cultic area. Apart from the ears worked out on the sides, the work as a whole is more like a wig, as its fine engravings imitate a wavy hairstyle. On the side, on the other hand, there are curls that are separated from the wavy hairstyle by a braid around the head. The braid is knotted into a button at the end of the head. The helmet has a series of small holes on the edge, to which a lining was probably attached."
 lepsius.731.t: "Mask of Agamemnon"
 lepsius.731.d: "After discovering the treasures in Mycenae, one artifact in particular caught our eye: a golden death mask, the so-called Mask of Agamemnon!"
 lepsius.731.f: "The 'Mask of Agamemnon' is the name given to a gold funeral mask discovered at the ancient Greek site of Mycenae. German archaeologist Heinrich Schliemann, who discovered the artifact in 1876, believed that he had found the body of the Mycenaean king Agamemnon, leader of the Achaeans in Homer's epic of the Trojan War, the Iliad, but modern archaeological research suggests that the mask dates to about 1600 BC, pre-dating the period of the legendary Trojan War by 300-400 years. The mask is made of yellow-reddish, strong gold sheet and has a height of about 26 cm and a width of 26.5 cm. The face of a man with a beard, mustache and eyebrows is embossed into the sheet metal. There is a hole next to each earlobe, which was probably used for attachment. The mask has been described by Cathy Gere as the 'Mona Lisa of prehistory'."
 lepsius.732.t: "Phaistos Disc"
 lepsius.732.d: "Excavations in Crete have unearthed an idiosyncratic and mysterious artifact: the Phaistos Disc!"
 lepsius.732.f: "The Phaistos Disc is a disk of fired clay from the Minoan palace of Phaistos on the island of Crete, possibly dating to the middle or late Minoan Bronze Age (second millennium BC). The disk is about 15 cm in diameter and covered on both sides with a spiral of stamped symbols. Its purpose and its original place of manufacture remain disputed. The disc was discovered in 1908 by the Italian archaeologist Luigi Pernier in the Minoan palace-site of Phaistos, and features 241 tokens, comprising 45 distinct signs, which were apparently made by pressing hieroglyphic 'seals' into a disc of soft clay, in a clockwise sequence spiralling toward the center of the disk. The Phaistos Disc captured the imagination of amateur and professional archaeologists, and many attempts have been made to decipher the code behind the disc's signs."
 lepsius.733.t: "Snake Goddess"
 lepsius.733.d: "A Minoan artifact of particular artistic and historical importance fell into our hands during excavations on Crete: the Snake Goddess!"
 lepsius.733.f: "Two Minoan snake goddess figurines were excavated in 1903 in the Minoan palace at Knossos in the Greek island of Crete. The Knossos figurines, both significantly incomplete, date to near the end of the neo-palatial period of Minoan civilization, around 1600 BCE. It was Evans who called the larger of his pair of figurines a 'Snake Goddess', the smaller a 'Snake Priestess'; since then, it has been debated whether Evans was right, or whether both figurines depict priestesses, or both depict the same deity or distinct deities. The combination of elaborate clothes that leave the breasts completely bare, and 'snake-wrangling', attracted considerable publicity, not to mention various fakes, and the smaller figure in particular remains a popular icon for Minoan art and religion, now also generally referred to as a 'Snake Goddess'."
 lepsius.771.t: "Burial Treasure of Pakal"
 lepsius.771.d: "After discovering King Pakal's tomb, we were able to recover some special artifacts: Pakal's Burial Treasures!"
 lepsius.771.f: "It is remarkable that the Maya, who had no metal tools, created many objects from a very thick and dense material, jade (jadeite), particularly all sorts of (royal) dress elements, such as belt plaques - or celts - ear spools, pendants, and also masks. Celts (i.e., flat, celt-shaped ornaments) were sometimes engraved with a stela-like representation of the king (e.g., the Early-Classic 'Leyden Plate'). The best-known example of a mask is probably the death mask of the Palenque king Pakal, covered with irregularly-shaped marble plaques and having eyes made from mother-of-pearl and obsidian. Pacal the Great was ajaw of the Maya city-state of Palenque in the Late Classic period of pre-Columbian Mesoamerican chronology. He acceded to the throne in July 615 and ruled until his death. He reigned 68 years. "
 lepsius.772.t: "Belt Plaque"
 lepsius.772.d: "A Pre-Columbian artifact of particular artistic and historical importance fell into our hands during excavations in Yucatan: the Belt Plaque!"
 lepsius.772.f: "The Leyden Plaque is a significant Maya artifact carved from pale green jadeite, serving as a belt pendant. Discovered in 1864 near Puerto Barrios, Guatemala, it is renowned as one of the oldest dated objects from the Maya civilization. The plaque features delicate incised drawings on both sides. The obverse depicts a Maya lord—often identified as Siyaj Chan K'awiil I of Tikal—standing in profile and trampling a bound captive. The reverse bears a Long Count date (8.14.3.1.12), corresponding to September 320 CE, marking the ruler's accession. As a primary source for Early Classic Maya history, it provides vital insights into early royal iconography and epigraphy. Named after the city where it is curated, the plaque is currently held by the National Museum of Ethnology in Leiden, Netherlands."
 lepsius.721.t: "The Epic of Gilgamesh"
 lepsius.721.d: "Our Assyriologists have succeeded in reconstructing the basic features of the Epic of Gilgamesh on the basis of the cuneiform tablets found."
 lepsius.721.f: "Gilgamish arose interpreting dreams,\n addressing his mother.\n 'My mother! during my night\n I, having become lusty, wandered about\n in the midst of omens.\n And there came out stars in the heavens,\n Like a ... of heaven he fell upon me.\n I bore him but he was too heavy for me.\n He bore a net but I was not able to bear it.\n I summoned the land to assemble unto him,\n that heroes might kiss his feet.\n He stood up before me\n and they stood over against me\n I lifted him and carried him away unto thee.'"
 lepsius.721.g: "The oldest epic in human history..."
 lepsius.741.t: "The Treasure of Priam"
 lepsius.741.d: "After his groundbreaking discovery of Troy, Heinrich Schliemann is looking for a suitable museum to which he can donate Priam's treasure."
 lepsius.741.f: "Although Schliemann shook experts with his excavations and enjoyed popularity throughout Europe, he encountered resistance from experts, particularly because of his research methods. There were still a number of caveats. For example, historians and archaeologists doubted that the so-called Treasure of Priam could really come from a layer that corresponded to Homeric Troy. Furthermore, when Schliemann decided to donate his finds to a museum, he did not get the response he would have expected; old patrons were dismissive. Famous museums such as the Hermitage or the Louvre also refused. The discoverer temporarily exhibited the treasure in London until he decided in 1881 to bequeath the find 'to the German people for perpetual possession and safekeeping in the capital of the Reich'."
 lepsius.741.g: "... and I know the perfect location for this treasure!"
 lepsius.743.t: "Schliemann donates Priam's treasure"
 lepsius.743.d: "After much deliberation, [SCOPE.sCharacter('lepsius_new_archaeologist_scope').GetFullName] decided to entrust Priam's treasure to our museum!"
 lepsius.743.g: "We will set up a hall for it - and name it after Schliemann!"
 lepsius.743.h: "[SCOPE.sCharacter('lepsius_new_archaeologist_scope').GetLastName] is the real treasure!"
 lepsius.744.t: "Schliemann donates Priam's treasure to a museum"
 lepsius.744.d: "Today we unfortunately received the news that Heinrich Schliemann bequeathed Priam's treasure to a museum. Unfortunately it's not ours."
 lepsius.744.g: "How could he betray us like that?"
 lepsius.801.t: "발굴지"
 lepsius.801.d: "우리 고고학자를 파견할 발굴지는 어디로 하는 것이 좋을까?"
 lepsius.801.f: "커피케이크 씨는 참으로 진짜 같던 보물지도가 사실은 검볼 기계에서 나온 것임을 꺠닫고, 이전에는 볼 수 없었던 곳으로 고고학 여행 계획을 바꿔야만 했답니다."
 lepsius.801.g: "상이집트."
 lepsius.801.h: "하이집트."
 lepsius.801.i: "바빌로니아."
 lepsius.801.j: "아시리아."
 lepsius.801.k: "아르골리스."
 lepsius.801.l: "유카탄."
 lepsius.801.m: "그만두겠다."
 lepsius.802.t: "Archaeologist"
 lepsius.802.d: "Which archaeologist should we send away to establish a new excavation site?"
 lepsius.802.f: "Most countries have only one archaeologist, who often also fills the position of Lead Scientist; however, should a nation - for whatever reason - have more experienced archaeologists, there is the option of selecting a second person here."
 lepsius.802.g: "[SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName]"
 lepsius.802.h: "[SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName]"
 lepsius.803.t: "Departure"
 lepsius.803.g: "Good luck!"
 lepsius.811.t_vok: "Tomb of a Noble"
 lepsius.811.t_pyr: "Shrine of Bastet"
 lepsius.811.t_bab: "Sumerian Tomb"
 lepsius.811.t_ass: "Assyrian Shrine"
 lepsius.811.t_arg: "Mycenaen Sanctuary"
 lepsius.811.t_yuc: "Storage House"
 lepsius.811.d: "Our archaeologist set up a mediocre excavation site."
 lepsius.811.f_pyr: "[SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] has found the ruins of an ancient Egyptian temple complex in a swampy part of the Lower Egyptian Nile Delta - that's what it seemed at first. Unfortunately, it turned out to be a much smaller find: the supposed temple was more of a shrine dedicated to the cat goddess Bastet. Nevertheless, our researchers have started the excavation - after all, you have to start somewhere."
 lepsius.811.f_bab: "The Sumerians are perhaps the oldest civilization in the world. [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] in Babylonia accidentally discovered a tomb of the ancient people who are said to have invented the wheel and writing. Unfortunately, however, it turned out after a short time that most of the artifacts had been stolen or destroyed. Archaeologists have started work."
 lepsius.811.f_arg: ""
 lepsius.811.f_yuc: "Unfortunately, our excavation team in Yucatán has had little success in their search for remains of the Mayanculture. In a side valley, the archaeologists found an old warehouse that previously only offered broken pottery. In a telegram, [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] confirmed that more was to be expected in the future."
 lepsius.811.g: "A mediocre place, but it's ours ..."
 lepsius.812.t_vok: "Tomb of a Prince"
 lepsius.812.t_pyr: "Temple of Ra"
 lepsius.812.t_bab: "Ziggurat of the Moon"
 lepsius.812.t_ass: "Assyrian Fortress"
 lepsius.812.t_arg: "Chamber Tomb"
 lepsius.812.t_yuc: "Mayan Observatory"
 lepsius.812.d: "Our archaeologist set up a good excavation site."
 lepsius.812.f_vok: "Good news from Egypt! After many hardships, [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] discovered a previously unknown tomb. According to initial information, it is the final resting place of an ancient Egyptian prince. While missing some artifacts that may have been stolen and sold by locals in the past, it is otherwise a good starting point for further archaeological excavations."
 lepsius.812.f_pyr: "Under a clear Egyptian sky, the last remnant of electron flashes on the top of an obelisk on the horizon - and marks the entrance to a temple of the sun god Ra! [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] immediately secured the site and started excavation."
 lepsius.812.f_ass: "To this day, the Bible has drawn the image of the Assyrians in a rather negative light among Jews and Christians. Notorious as a warrior people that repeatedly harassed the Israelites and ultimately destroyed the northern kingdom, they went down in history as a major military power. While not all of this negative propaganda is true, the discovery of an Assyrian fortress has shown that the ancient rulers of the Middle East had an impressive military culture."
 lepsius.812.f_arg: "[SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] recently found a Mycenaen chamber tomb. This form of mortuary architecture was in use in the Late Bronze Age in the areas under the cultural influence of the Aegean. The tombs are cut from rock and have a tripartite structure (chamber, stomion and dromos), often with additional niches and side chambers in which primary or secondary burials took place. The director of our museum has put a bottle of champagne cold."
 lepsius.812.f_yuc: "The Maya had a keen interest in astronomy. Apparently, they had a distinctive knowledge of celestial phenomena that was superior to that of the ancient Greeks in many respects. [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] has uncovered a building in the jungle that has a spiral staircase shaped like a snake at its top. Our researchers are excited to see what insights and artifacts this discovery holds."
 lepsius.812.g: "A fine place for an excavation."
 lepsius.813.t_vok: "Tomb of a Queen"
 lepsius.813.t_pyr: "Unchartered Pyramid"
 lepsius.813.t_bab: "Babylonian Gate and Walls"
 lepsius.813.t_ass: "Assyrian Palace"
 lepsius.813.t_arg: "Mycenaen Citadel"
 lepsius.813.t_yuc: "Mayan Pyramid"
 lepsius.813.d: "Our archaeologist set up an excellent excavation site."
 lepsius.813.f_pyr: "When the latest telegram from [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] arrived today, our researchers didn't want to believe it at first: apparently our archaeologists have rediscovered a previously unknown pyramid in the Egyptian desert. Although locals have already spoken about the object, which is completely covered by sand, they have not found an entrance. Our nation can call numerous finds from the Old Kingdom its own!"
 lepsius.813.f_arg: "Did demigods or cyclops really build the ancient cities? A formidable Mycenaean citadel rises above the Greek hills as our expedition team reports success after success a week after discovery. Not only the architecture is overwhelming, but also the finds made of clay and gold promise further discoveries in the future. [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] even said that the Ring of Menelaus had been found."
 lepsius.813.f_yuc: "When the rain subsided after hours and only a gentle film of fog remained from the shower, which enveloped the treetops of the jungle, the expedition saw a magnificent picture. Above the treetops, innumerable steps covered by undergrowth and lianas rose to the sky: a mighty step pyramid took up the panorama, in the middle of the wilderness, populated by birds and tapirs. [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] immediately secured some of the first finds and sent them to the museum with an express delivery."
 lepsius.813.g: "This place is perfect!"
 lepsius.190.t: "고고학 발굴단 호출"
 lepsius.190.d: "어느 발굴지에서 발굴단을 호출해야 할까?"
 lepsius.190.f: "누군가 헨리 J.를 모함한 모양이다. 왜냐하면 그는 아무 잘못도 없는데 어느 날 아침 발굴 현장에서 소환되었기 때문이다."
 lepsius.190.g: "상이집트"
 lepsius.190.h: "하이집트"
 lepsius.190.i: "바빌로니아"
 lepsius.190.j: "아시리아"
 lepsius.190.k: "아르골리스"
 lepsius.190.l: "크레타"
 lepsius.190.m: "유카탄"
 lepsius.190.n: "페루"
 lepsius.190.o: "계속하시오."
 lepsius.901.t: "Tomb of Tutankhamun"
 lepsius.901.d: "It is a sensational day for international science. We have made a great discovery: Tutankhamen's tomb was uncovered today by [ROOT.GetCountry.GetAdjectiveNoFlag] archaeologists!"
 lepsius.901.f: "Slowly, desperately slowly it seemed to us as we watched, the remains of passage debris that encumbered the lower part of the doorway were removed, until at last we had the whole door clear before us. The decisive moment had arrived. With trembling hands I made a tiny breach in the upper left hand corner. Darkness and blank space, as far as an iron testing-rod could reach, showed that whatever lay beyond was empty, and not filled like the passage we had just cleared. Candle tests were applied as a precaution against possible foul gases, and then, widening the hole a little, I inserted the candle and peered in. At first I could see nothing, the hot air escaping from the chamber causing the candle flame to flicker, but presently, as my eyes grew accustomed to the light, details of the room within emerged slowly from the mist, strange animals, statues, and gold - everywhere the glint of gold. For the moment - an eternity it must have seemed to the others standing by - I was struck dumb with amazement, and when my colleague, unable to stand the suspense any longer, inquired anxiously, 'Can you see anything?' it was all I could do to get out the words, 'Yes, wonderful things.'"
 lepsius.901.g: "Wonderful things, indeed."
 lepsius.902.d: "[SCOPE.sCountry('lepsius_tut_discoverer').GetName]에서 위대한 발견을 이룩하였습니다. 투탕카멘의 무덤이 오늘 발견된 것입니다!"
 lepsius.902.f: ""
 lepsius.902.g: "저들에게 파라오의 저주가 닥쳤으면 좋겠군."
 lepsius.911.t: "Ship of Khufu"
 lepsius.911.d: "It is a sensational day for international science. We have made a great discovery: Khufu's Ship was uncovered today by [ROOT.GetCountry.GetAdjectiveNoFlag] archaeologists!"
 lepsius.911.f: "He breathed deeply, closed his eyes to accustom them to the gloom of his digging and then opened them slowly. With a steady hand he began to cut again. He worked quickly as the casing gave way and crumbled. He made the hole deep enough to twist his body in a different position downward and worked only a few inches away from his head. He kept on cutting and cutting. Time meant nothing. He was not conscious of being tired, or of lying in a perpendicular position. He probed. He cut. Suddenly and miraculously his hands were through into nothingness. He lay as if in a trance. He closed his eyes. An almost imperceptible smell crept into his nostrils. He could not define what it was. It was almost sweet. It could not be incense. Or was it? Was it perhaps the very smell of history? Then he knew. It was cedar wood! His eyes were still unopened. He drew a deep breath and determined that it was indeed cedar wood. He felt a sense of fulfillment such as he had never known before. Happiness tingled through him. His eyes were still closed. He whispered a prayer of thanks to God. His questioning mind began to function again. If indeed he smelt cedar wood from a Solar Boat below it did not mean that the white ant had not been busy. Perhaps the precious wood had been eaten through by hordes of white ants. 'It is the boat!', he shouted. 'It is the boat!'"
 lepsius.911.g: "It can actually still sail on the water after more than 4,000 years?"
 lepsius.912.d: "[SCOPE.sCountry('lepsius_ship_discoverer').GetName]에서 위대한 발견을 이룩하였습니다. 쿠푸의 배 무덤이 오늘 발견된 것입니다!"
 lepsius.912.f: ""
 lepsius.912.g: "저들이 운용하는 새 함대의 주력함일 게 틀림없군."
 lepsius.921.t: "Tower of Babylon"
 lepsius.921.d: "It is a sensational day for international science. We have made a great discovery: the Tower of Babel was uncovered today by [ROOT.GetCountry.GetAdjectiveNoFlag] archaeologists!"
 lepsius.921.f: "Beyond this ridge extends a fairly considerable and remarkably uniform plain towards the hill of Amran Ibn Ali, through which runs diagonally the road from our village of Kweiresh to Hilleh. It is called 'Sachn', literally: the pan, but in today's parlance it means the free space surrounded by arcades that runs around the large pilgrimage mosques, such as that of Karbala or Nedschef. But our 'Sachn' is nothing other than the present-day appearance of the ancient sacred precinct, in which the Zikurrat Etemenanki, the 'Foundation Stone of Heaven and Earth', the tower of Babylon, rose, surrounded by a ring wall to which all kinds of buildings related to the cult. We do not know the full height of the tower. But Nabupolassar, like Nebuchadnezzar, puts special emphasis on them in his cylinder inscription from Etemenanki. The former says: 'At that time Marduk commanded me... the tower of Babylon, which had been weakened and brought down in the days before me, to set its foundation firmly on the breast of the underworld, while its top aspire to heaven.'"
 lepsius.921.g: "So the Bible wasn't wrong after all."
 lepsius.922.d: "[SCOPE.sCountry('lepsius_babylon_discoverer').GetName] has made a great discovery: the Tower of Babel was uncovered today!"
 lepsius.922.f: ""
 lepsius.922.g: "One can only wish for them to be as confused afterwards as the tower's builders."
 lepsius.931.t: "Gardens of Sennacherib"
 lepsius.931.d: "It is a sensational day for international science. We have made a great discovery: the Hanging Gardens were uncovered today by [ROOT.GetCountry.GetAdjectiveNoFlag] archaeologists!"
 lepsius.931.f: "Were the Hanging Gardens really in Babylon? According to the latest discovery, this claim has been proven to be false. Indeed, comparing historical sources, our most able archaeologists have found that very few sources place the legendary Gardens in Babylon. Furthermore, it was the Assyrians, not the Babylonians, who were known for their sophisticated gardening techniques. Reliefs bear witness to extensive gardens on several floors. An archaeological team has taken this as an opportunity to carry out test excavations at the great palace of the Assyrian king Sennacherib in a part that was thought to be little explored. The finding is clear: the lost wonder of the world was clearly in Nineveh. Our archaeologists therefore benefit not only from the discovery, but also from the clarification of a mystery that has lasted for two and a half millennia."
 lepsius.931.g: "So does that mean it was actually the Hanging Gardens of Nineveh?"
 lepsius.932.d: "[SCOPE.sCountry('lepsius_semiramis_discoverer').GetName] has made a great discovery: the Hanging Gardens were uncovered today!"
 lepsius.932.f: ""
 lepsius.932.g: "There is almost certainly a mix-up here."
 lepsius.941.t: "Treasures of Mycenae"
 lepsius.941.d: "It is a sensational day for international science. We have made a great discovery: the Treasures of Mycenae were uncovered today by [ROOT.GetCountry.GetAdjectiveNoFlag] archaeologists!"
 lepsius.941.f: "By far the most important and worthwhile excavation was the one directly behind the Lion's Gate. During his test excavations in 1874, Schliemann had already established that the rock at the lowest point of the castle was covered deepest with rubble. According to the words of Pausanias, he considered it likely that the graves of the ruling family were within the castle wall and had to remember the words when, soon after the start of the work, three tombstones with ancient reliefs were found at a depth of 3 to 5 meters. When the stones were removed, says Schliemann, it turned out that they were not standing on the ground, as previously assumed, but on earth that filled the shafts that had been driven vertically into the rock to make the graves. They dug into five such shafts, and after layers of stone had been removed at a certain depth, which had served as altars after the burial of the dead victims, the ax struck the ground about 6 meters deep. On the bottom lay fifteen corpses spread out in the five graves, adorned with rich, one might say fabulous, gold jewellery. Golden masks, imitating the features of the deceased, lay over the faces of the men, golden plates, richly decorated with spirals, covered their breasts, the robes of the women were laden with gold."
 lepsius.941.g: "Agamemnon, is that you?"
 lepsius.942.d: "[SCOPE.sCountry('lepsius_mycenae_discoverer').GetName] has made a great discovery: the Treasures of Mycenae were uncovered today!"
 lepsius.942.f: ""
 lepsius.942.g: "In case of doubt, these scammers have hidden these 'treasures' there themselves."
 lepsius.961.t: "Legacy of Pakal"
 lepsius.961.d: "It is a sensational day for international science. We have made a great discovery: the Tomb and Burial Treasures of Pakal were uncovered today by [ROOT.GetCountry.GetAdjectiveNoFlag] archaeologists!"
 lepsius.961.f: "My first impression was a mosaic of green, red and white. Then it resolved itself into details - green jade ornaments, red painted teeth and bones, and fragments of a mask. I was gazing at the death face of him for whom all this stupendous work - the crypt, the sculpture, the stairway, the great pyramid with its crowning temple - had been built, the mortal remains of one of the greatest men of Palenque! This was a sarcophagus, the first ever found in a Maya pyramid!"
 lepsius.961.g: "The Tutankhamun Tomb of South America!"
 lepsius.962.d: "[SCOPE.sCountry('lepsius_pakal_discoverer').GetName] has made a great discovery: the Tomb and Burial Treasures of Pakal were uncovered today!"
 lepsius.962.f: ""
 lepsius.962.g: "The mask was pretty hideous anyway."
 lepsius_local_excavation_modifier: "현지 발굴"
 lepsius_local_excavation_state_modifier: "현지 발굴"
 lepsius_local_excavation_cost_modifier: "현지 발굴 예산"
 lepsius.1101.t: "Archaeological Congress: The Exodus"
 lepsius.1101.d: "Our nation has made all relevant preparations to hold the next Archaeological Congress. The focus will be on the role of the Bible in archeology and antiquity research. Invitations will be sent to all major archaeologists in the world. Professor [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] will chair the session."
 lepsius.1101.f: "As early as Roman times, the lack of sources about ancient Egypt meant that historical writings were based on secondary sources such as Herodotus. The development continued in the Middle Ages. The Bible offered clues and was viewed as a reputable source for Near Eastern history for a long time - also because there were simply no other traditions. With the deciphering of hieroglyphs and the beginning of modern Egyptology, both proponents and critics of the Bible attempted to present evidence that the biblical accounts were false or correct. With the beginning of exploration of ancient Babylonia, this trend increased even further. An example of the dispute over the historicity of the biblical stories was the Exodus - the departure of the people of Israel from Egypt - for which there was no evidence in Egyptian sources."
 lepsius.1101.g: "The archaeological world should be our guest."
 lepsius.1102.d: "[SCOPE.sCountry('lepsius_congress_host_country').GetName] has invited us to an archaeological congress. The topic will be the historicity of the Bible using the example of the Exodus. Our archaeologist Professor [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] has received a warm invitation."
 lepsius.1102.g: "Always these arguments about who has the finest leather jackets..."
 lepsius.1103.t_laughed: "The Ridicule of the Archaeological Society"
 lepsius.1103.t_respected: "A confident Appearance"
 lepsius.1103.t_lauded: "Admiration and Congratulations"
 lepsius.1103.d_laughed: "Prof. [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName]'s appearance was greeted with amusement. [ROOT.GetCountry.GetNameNoFlag] does not exactly have a reputation for having achieved anything outstanding in the field of Egyptology. There were clearly jokes behind closed doors."
 lepsius.1103.d_respected: "Before the start of the Archaeological Congress, our archaeologist was warmly greeted and the usual customs were exchanged. [ROOT.GetCountry.GetNameNoFlag] has a recognized reputation in the research world."
 lepsius.1103.d_lauded: "The arrival of Professor [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] was greeted with great joy. He is considered one of the most awaited guests. A crowd quickly formed around him, as [ROOT.GetCountry.GetNameNoFlag] is considered a pioneer in the field of Egyptology."
 lepsius.1103.f_laughed: "'Why don't [ROOT.GetCountry.GetAdjectiveNoFlag] archaeologists get any girls?\n\nBecause they have the worst dating techniques!'"
 lepsius.1103.f_respected: "Upon his arrival, Professor [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] had a few pleasant conversations with colleagues about mostly boring ruins that a non-scientist would have dismissed as even more boring rock formations."
 lepsius.1103.f_lauded: "Prof. [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] seemed almost overwhelmed by the onslaught. So many colleagues sought to talk to him and wanted to benefit from his expeditions and his experiences. Some even urged him to give a private lecture."
 lepsius.1103.g: "How embarrassing!"
 lepsius.1103.h: "Finally among like-minded people."
 lepsius.1103.i: "We are a leading archaeological nation!"
 lepsius.1104.t: "The Exodus: Historical merit or invention?"
 lepsius.1104.d: "The topic-specific conference quickly developed into a question of principle. At first people only wanted to discuss the biblical exodus and the Egyptian sources, but it quickly turned into a debate about the value of the Bible in history and archaeology. Two scholarly camps are now irreconcilably opposed to each other."
 lepsius.1104.f: "[SCOPE.sCharacter('lepsius_bible_defender_scope').GetFullName] had actually wanted to give a lecture on the memory culture of the Israeli people and the status of the exodus when [SCOPE.sCharacter('lepsius_bible_attacker_scope').GetFullName] asked the provocative and justified question of whether such a statement was not just a waste of time - because ultimately it would have to be clarified whether the Bible could be considered as a source, since there was no archaeological tradition that speaks for the historicity of the Exodus. There was also no tradition in the texts that have now been translated. Therefore, in principle, they should ask the question whether the five books of Moses are actually made up stories and therefore useless. 'Archaeology is about fact, not about truth', he concluded. [SCOPE.sCharacter('lepsius_bible_defender_scope').GetFullName] responded to these accusations by saying that it should not be the case to understand the Bible texts as eyewitness reports, but rather as a secondary source about events that made up a piece of the puzzle of ancient memory culture. 'To reject the Bible completely is just as much nonsense as to accept every word of it as historical fact. It's more about asking the right questions', he said."
 lepsius.1104.g: "The Bible has some historical value as secondary source."
 lepsius.1104.h: "The Bible has no historical value at all."
 lepsius.1105.t: "Archaeologists among themselves"
 lepsius.1105.d: "Aside from the current Archaeological Congress, our archaeologist made friends with a foreign colleague and exchanged ideas."
 lepsius.1105.f: "The congress had been going on for days, and at first Professor [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] only had time to talk to a previously unknown colleague during breaks. The meeting was followed by a meal together, and the longer the scientists talked to each other, the more they learned about each other - and from each other. As it turns out, [SCOPE.sCharacter('lepsius_foreign_archaeologist_scope').GetFullName] is a person with a wealth of experience."
 lepsius.1105.g: "Another friend of archaeology!"
 lepsius.1106.t: "A Negotiator's Artifact"
 lepsius.1106.d: "The negotiator of an antiques owner attended the Archaeological Congress in [SCOPE.sCountry('lepsius_congress_host_country').GetName]. He tries to sell an artifact to an interested museum on behalf of a secret aristocrat. So far he hasn't found a customer."
 lepsius.1106.f: "Prof. [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] was able to convince himself of the authenticity of the artifact. However, given the high price, he is hesitant to buy and is waiting for a commitment from the capital before taking any action."
 lepsius.1106.g: "Expensive but valuable."
 lepsius.1106.h: "Not valuable enough."
 lepsius.1107.t: "Friendly Talk"
 lepsius.1107.d: "On the sidelines of the Archaeological Congress in [SCOPE.sCountry('lepsius_congress_host_country').GetName], our archaeologist presented [ROOT.GetCountry.GetNameNoFlag] in a very positive light in conversation with several colleagues."
 lepsius.1107.f: "It's unknown what exactly Professor [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] said, but apparently he struck a chord with the other archaeologists. They will surely spread this positive impression in their home country."
 lepsius.1107.g: "Let's improve our relationships."
 lepsius.1107.h: "Let's improve our reputation."
 lepsius.1108.t: "An Assistant"
 lepsius.1108.d: "An aspiring young man who wanted to gain entry to the Archaeological Congress but was prevented from doing so by the door guards attracts the attention of Professor [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName]."
 lepsius.1108.f: "Of course, the student was prevented from entering the hall with the select company of international archaeologists, but the persistence impressed [SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName] so much that he wanted to get to know the young man better. As it turned out, he had accumulated a wealth of knowledge for his age, both in ancient languages and in geography. After just a few hours, the professor decided to make him his assistant after the congress in the hope that he could soon enrich the academic world."
 lepsius.1108.g: "We expect an academic career."
 lepsius.1109.t_merit: "The Exodus: More than a Story"
 lepsius.1109.t_invention: "The Exodus: Fiction, not Fact"
 lepsius.1109.d_merit: "After many meetings, debates and arguments, the Archaeological Congress came to an end and a final declaration was drawn up. Accordingly, the Bible is not a primary historical source, but it still has historical value in some respects, even if this may not be directly applicable to Egypt and Babylon."
 lepsius.1109.d_invention: "After many meetings, debates and arguments, the Archaeological Congress came to an end and a final declaration was drawn up. Accordingly, the Bible has no value for archaeology or history. Rather, it is largely a series of inventions that are more of a hindrance than a help to the study of antiquity."
 lepsius.1109.f_merit: "A smaller group of archaeologists saw the declaration as a compromise, but others recognized it as a more nuanced approach to the past that went beyond absolute positions. Despite a direct reference to the Exodus, some archaeologists highlighted a recently discovered passage from Pharaoh Merenptah that mentioned devastation to the people of Israel. Another group pointed out that, according to the Bubastis portal translated by Champollion, Pharaoh Shishak actually sacked Jerusalem. These are all indications that it is less important to use the book literally, but to view it as a piece of the puzzle in researching older history. Wrong interpretations are unavoidable, but this applies to all areas of science."
 lepsius.1109.f_invention: "In the end, the group of skeptics was able to prevail with their maximum demand. From now on, the biblical stories should have no more value than, for example, the legends about the 7 Kings of Rome or the Greek mythical stories - the prominent position of the Bible had then come to an end in the Western world, at least in this area. The desperate references to coincidences between archaeological finds and biblical passages were recognized for what they were: coincidences. The question of what to do with the Bible was therefore merely the task of literature. Some archaeologists also mentioned the possibility that the Bible stories were at most copied from Egyptian stories or Babylonian myths. This would only be about the necessary investigation of the dependency. Otherwise, the case was closed for archaeology and history: the Bible was largely a collection of invented stories of no value to science."
 lepsius.1109.g: "You have to classify and interpret the texts correctly."
 lepsius.1109.h: "The Bible is a useless storybook."
 lepsius.1109.i: "We already knew this beforehand."
 lepsius.1111.t: "Archaeological Congress: The Rise of Civilization"
 lepsius.1111.d: "Our nation has made all relevant preparations to hold the next Archaeological Congress. The focus will be on the question of where civilization first emerged. According to the latest information, this is probably Babylonia. This further raises the question of the extent to which Babylonian culture influenced other cultures. Invitations will be sent to all major archaeologists in the world. Professor [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] will chair the session."
 lepsius.1111.f: "The knowledge that there had been a Babylonian civilization was never completely lost - even in the time of the Greeks there was information about Babylonians and Assyrians. However, the decoding of Akkadian revealed that there had been significantly older cultures such as the Sumerians, whose history eclipsed even the Egyptians in terms of age. A whole series of inventions typical of civilization shaped the everyday life of these ancient peoples, and many philologists and archaeologists soon suspected that Babylon was the actual cradle of civilization. The fascination with ancient Mesopotamia soon led to the fact that all areas of civilization were traced back to Babylon: not only the Bible, but also cultures of the Levant and Persia, even the Egyptians, were only mere 'cultural recipients' or 'cultural transmitters' of the original Babylonian culture. This scientific narrowness soon acquired a derisive name that its adherents used for themselves: Panbabylonism."
 lepsius.1111.g: "The archaeological world should be our guest."
 lepsius.1112.d: "[SCOPE.sCountry('lepsius_congress_host_country').GetName] has invited us to an archaeological congress. The focus will be on the question of where civilization first emerged. According to the latest information, this is probably Babylonia. This further raises the question of the extent to which Babylonian culture influenced other cultures. Our archaeologist Professor [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] has received a warm invitation."
 lepsius.1112.g: "Always these arguments about who has the finest leather jackets..."
 lepsius.1113.d_laughed: "Prof. [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName]'s appearance was greeted with amusement. [ROOT.GetCountry.GetNameNoFlag] does not exactly have a reputation for having achieved anything outstanding in the field of Assyriology. There were clearly jokes behind closed doors."
 lepsius.1113.d_respected: "Before the start of the Archaeological Congress, our archaeologist was warmly greeted and the usual customs were exchanged. [ROOT.GetCountry.GetNameNoFlag] has a recognized reputation in the research world."
 lepsius.1113.d_lauded: "The arrival of Professor [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] was greeted with great joy. He is considered one of the most awaited guests. A crowd quickly formed around him, as [ROOT.GetCountry.GetNameNoFlag] is considered a pioneer in the field of Assyriology."
 lepsius.1114.t: "Babylon: The Cradle of Civilization?"
 lepsius.1114.d: "During the course of the congress, the question of the origin of civilization increasingly developed into the question of whether and to what extent Babylon influenced all cultures of the Middle East and the Eastern Mediterranean. Some assume that almost every idea that later played a role was conceived in ancient Babylon!"
 lepsius.1114.f: "Professor [SCOPE.sCharacter('lepsius_babylon_defender_scope').GetLastName] opened with a very interesting contribution about the cultural achievements and the high level of Babylonian knowledge more than 4,000 years ago: 'The Sumerian-Babylonian cultural world presupposes a world theory according to which all state and social organizations were regulated. All sciences and arts go back to a primordial wisdom revealed by heaven, according to which property is managed and protected. Panbabylonism aims to provide evidence that this astral worldview left its mark on all cultures and religions in the world.' But this view provoked strong opposition from numerous academics, whose spokesman soon emerged as [SCOPE.sCharacter('lepsius_babylon_attacker_scope').GetFullName]. He rejected the idea that all myths were derived from the Babylonians. 'What [SCOPE.sCharacter('lepsius_babylon_defender_scope').GetLastName] said were more constructions than facts. The idea that there could be no parallel developments is far-fetched - the Egyptian hieroglyphs, for example, were not inspired by cuneiform.' And while the Panbabylonists tried to create a priority that relegated Mesopotamia to the center and all other mythology to the periphery, they completely overlooked the fact that cultures can live on a common spectrum."
 lepsius.1114.g: "Babylon is the Cradle of Civilization."
 lepsius.1114.h: "Civilization arose in several places."
 lepsius.1119.t_panbabylonism: "Rise of Civilization: Panbabylonism triumphs"
 lepsius.1119.t_antipanbabylonism: "Rise of Civilization: Panbabylonism refuted"
 lepsius.1119.d_panbabylonism: "After a passionate debate that resulted in rifts between numerous academics, the congress was able to agree on a final declaration. Accordingly, Mesopotamia is not only the cradle of civilization, but also the starting point of all mythological ideas of the Middle East."
 lepsius.1119.d_antipanbabylonism: "The battles are over, and after some heated verbal arguments, the scholars were able to pull themselves together and sign a final declaration that sealed the final defeat of the Pan-Babylonian camp. True, Mesopotamia was recognized as one of the most important cradles of civilization; but not the only one. The attempt to trace every mythology back to the Babylonians was nipped in the bud."
 lepsius.1119.f_panbabylonism: "The final declaration confirmed all the theories put forward by the Pan-Babylonian followers: the dependence of the mythology and literature of the Orient on Babylonian culture was evident. Both the Bible and the Egyptian myths are obviously dependent on well-known Babylonian ideas, such as those found in the Epic of Gilgamesh. In the final analysis, the entire development of the Middle East was culturally strongly influenced by the astronomy and astrology of this original culture, whose ideas were sometimes more, sometimes less obvious."
 lepsius.1119.f_antipanbabylonism: "The supporters of Panbabylonism recently found themselves in the minority. Academics did recognize that many of the achievements of the Mesopotamian cultures were part of the core of the intellectual substructure of the Middle East. However, the scientists rejected the claim to absoluteness, even the claim to an 'original culture', in the final declaration. Astronomical research, which was considered the starting point of Babylonian thinking, was exposed as a later development that had been wrongly placed at the beginning. The academics were also unable to recognize a priority of the Babylonian tradition: rather, it turned out that the various 'Babylonian' stories were in fact a common heritage of traditions in the region that the Babylonians actually wrote down first. One sentence stands out as particularly bitter, summarily declaring Panbabylonism to be pseudoscience: 'This mystical wisdom has no more scientific significance than the 'original revelation' of all the dimensions of the world in the great pyramid, which unfortunately still finds adepts.'"
 lepsius.1119.g: "Everything started in Mesopotamia."
 lepsius.1119.h: "There is not just one origin alone."
 lepsius.1121.t: "Archaeological Congress: The Status of Troy"
 lepsius.1121.d: "Our nation has made all relevant preparations to hold the next Archaeological Congress. The conference is intended to finally resolve the Troy question. Despite Heinrich Schliemann's spectacular excavations, the question is entirely justified as to what Heinrich Schliemann actually found, whether it was really Troy and whether Troy even existed in this form. Invitations will be sent to all major archaeologists in the world. Professor [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] will chair the session."
 lepsius.1121.f: "After Schliemann announced the discovery of Troy, it took some time for more skeptical minds to overcome their state of shock. Later inspections revealed not only that Schliemann had dug in the wrong layer, but also that the alleged 'Priam's Treasure' he found was much older than Homeric Troy. A rumor soon spread that Schliemann might have excavated the wrong city. Others insisted that nothing could be dug up that didn't exist. Still others defended Schliemann's discovery and saw that the proof had been provided, as Schliemann had based himself on ancient descriptions. Roman finds also proved that the Greeks and Romans also considered this place to be the site of the Trojan War. The discovery of Troy did not end the scholarly dispute, but only marked a new phase."
 lepsius.1121.g: "The archaeological world should be our guest."
 lepsius.1122.d: "[SCOPE.sCountry('lepsius_congress_host_country').GetName] has invited us to an archaeological congress. The conference is intended to finally resolve the Troy question. Despite Heinrich Schliemann's spectacular excavations, the question is entirely justified as to what Heinrich Schliemann actually found, whether it was really Troy and whether Troy even existed in this form. Our archaeologist Professor [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] has received a warm invitation."
 lepsius.1122.g: "Always these arguments about who has the finest leather jackets..."
 lepsius.1123.d_laughed: "Prof. [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName]'s appearance was greeted with amusement. [ROOT.GetCountry.GetNameNoFlag] does not exactly have a reputation for having achieved anything outstanding in the field of Aegean Archaeology. There were clearly jokes behind closed doors."
 lepsius.1123.d_respected: "Before the start of the Archaeological Congress, our archaeologist was warmly greeted and the usual customs were exchanged. [ROOT.GetCountry.GetNameNoFlag] has a recognized reputation in the research world."
 lepsius.1123.d_lauded: "The arrival of Professor [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] was greeted with great joy. He is considered one of the most awaited guests. A crowd quickly formed around him, as [ROOT.GetCountry.GetNameNoFlag] is considered a pioneer in the field of Aegean Archaeology."
 lepsius.1124.t: "Troy: Just a Myth?"
 lepsius.1124.d: "The debate over the status of Troy is even more controversial than expected. Not just two, but three camps have emerged. The first group consists of passionate Schliemann supporters who are completely convinced that all of the theses he put forward are correct. This is opposed by an irreconcilable opposing camp that sees only very meager evidence that Homeric Troy has anything to do with Schliemann's excavation site. A third group believes that Schliemann made serious mistakes, but that this was in fact the city he was looking for."
 lepsius.1124.f: "'If Schliemann didn't find Troy, then what did he find? He finds a place that matches the descriptions of the Iliad and the ancient authors. He finds a structure that fits this time. And we find a structure that appears to have been destroyed by enemies. How much more evidence is needed?' Prof. [SCOPE.sCharacter('lepsius_troy_defender_scope').GetLastName] began his lecture, but was then interrupted by many questions from his colleague [SCOPE.sCharacter('lepsius_troy_attacker_scope').GetLastName]. For example, the ancient Greeks no longer knew where Troy was located in the classical period and had already misidentified this place with Troy. That the name of the city is unknown and there is no clue as to how it was related to the Greek world. And that there have never been any reliable historical sources on a Trojan War in any form that resemble Homer's descriptions. Then, Mr. [SCOPE.sCharacter('lepsius_troy_mediator_scope').GetLastName] intervened: 'Dear colleagues, Schliemann has certainly made mistakes - but do we want to lose sight of the big picture?'"
 lepsius.1124.g: "Schliemann did find Troy."
 lepsius.1124.h: "Schliemann did find 'Troy', but the matter is more complicated."
 lepsius.1124.i: "There is no real evidence that this is really Troy."
 lepsius.1129.t_homeric: "Troy: History, not Myth"
 lepsius.1129.t_historical: "Troy: History and Myth"
 lepsius.1129.t_myth: "Troy: Myth, not History"
 lepsius.1129.t_disputed: "Troy: An unsolved Mystery"
 lepsius.1129.d_homeric: "After strenuous debates and many lectures, the camp of Schliemann's supporters, who recognized the Homeric Ilion in the hill of Hisarlik, was able to prevail. Not only the historicity of Troy, but also the Trojan War and other elements of the Homeric epics are recognized as historical reality."
 lepsius.1129.d_historical: "The archaeologists gathered at the congress in [SCOPE.sCountry('lepsius_congress_host_country').GetName] came to the conclusion that at least parts of the Homeric tradition contain a kernel of truth. Even if Schliemann was mistaken in the excavation, there is some evidence to suggest that Hisarlik corresponds to the place that is generally recognized as Troy in literature and historiography - the rest is a matter of clarifying details."
 lepsius.1129.d_myth: "The Congress came to the conclusion that the Troy debate, after centuries, has come to an end: the supposed discovery of Troy has strengthened the critics, who even more strongly suspect that the Homeric epics are pure fiction. Whatever Schliemann unearthed, it cannot be Troy because it never existed."
 lepsius.1129.d_disputed: "The trench warfare between scholars has recently led to great disillusionment and apathy. There is no solution in sight to the Troy question - they could not even agree on a joint final declaration. Some representatives left early, others sat out their time with further pointless discussions."
 lepsius.1129.f_homeric: "The Schliemann supporters are celebrating a great triumph today: they enthusiastically sent a telegram to the discoverer of Troy that all of his theses would be confirmed and he would even be made an honorary member of the society. He definitely excavated Troy and thus provided evidence that the Trojan War of the Homeric epics was not an invention, not a vague memory, but a historical event. Now it is even more important to search the Aegean region for further artifacts that could provide even more information about the age that was once disguised as 'mythical'. The enthusiasm of the researchers should ensure that more intensive excavations will soon take place to support Schliemann's theses: perhaps the house of Odysseus, the grave of Achilles or the bathtub in which Agamemnon was killed will soon be found? It is surprising that Schliemann has not yet responded to the telegram..."
 lepsius.1129.f_historical: "After long discussions and a lot of persuasion, it was possible to achieve a compromise among most congress members. The vast majority of the international archaeological assembly is of the opinion that Schliemann made serious errors in the excavation of Troy - among other things, it is clear that he searched in the wrong layer of excavations. However, this simply means that Schliemann found the 'wrong' Troy in the 'right' place. Another layer may actually contain the city that dates back to the time of the Trojan War. The archaeologists were ultimately unable to determine whether this was a real historical event; The fact is that the hill on which Troy is located fell victim to fires and wars several times. As far as the identity of the city is concerned, the thesis of a Hittite influence is confirmed. The scientists have announced that they will use these results as an opportunity for more intensive research and will continue to intensively discuss the Troy question."
 lepsius.1129.f_myth: "After serious arguments, the archaeologists and historians - some only with a lot of grumbling in their stomachs - were able to bring themselves to sign a joint declaration. Accordingly, they only see the Homeric epics as literary products that possibly refer to older events, which, however, are difficult to reconstruct for modern archaeology. Rather, it could be that the Trojan War is considered a 'war as such' in which the overall human experience was reflected. Troy might therefore have about as much historical content as Atlantis: a kind of utopia, a literary place where ideas are fought out. In principle, the congress declared Troy research to be an activity 'on the fringes of pseudoscience' that was both pointless and purposeless. Archeology should move on to more worthwhile fields."
 lepsius.1129.f_disputed: "'Well, at least the food was good!'"
 lepsius.1129.g: "So Schliemann actually found Troy!"
 lepsius.1129.h: "Schliemann dug up the wrong Troy, but the location is correct."
 lepsius.1129.i: "Troy is most likely pure literature."
 lepsius.1129.j: "This entire congress was a complete waste of time!"
 lepsius.1201.t: "[SCOPE.sState('lepsius_excavation_site').GetName]의 현지 발굴지"
 lepsius.1201.d: "[SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName](은)는 [SCOPE.sState('lepsius_excavation_site').GetName]에 새로운 발굴지가 존재하는 것을 확인했다. 이에 고고학자 본인과 발굴 인력이 즉시 조사 단계에 들어갔다. 다만 발굴 조사의 예산 투입 기간을 얼마나 할지는 아직 불분명한 상황이다."
 lepsius.1201.f: "발굴 조사는 5년, 7년, 10년 기한으로 승인이 가능합니다. 해외에서 진행되는 발굴 작업과는 달리 언제나 취소할 수는 없습니다. 담당 고고학자는 기한에 따라 6개월, 12개월, 18개월 동안 해당 발굴지에 머무르게 되며, 이 기간 동안에는 사용할 수 없습니다."
 lepsius.1201.g: "10년"
 lepsius.1201.h: "7년"
 lepsius.1201.i: "5년"
 lepsius.1202.t: "발굴 현장에서 돌아온 [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] 교수"
 lepsius.1202.d: "[SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName](은)는 지난 몇 달 간 [SCOPE.sState('lepsius_excavation_site').GetName]의 고고학 발굴지를 조성하는 과정에 임하였으며 몇가지 발견을 처음으로 이루어냈다. 교수는 평가를 위해 대학으로 복귀하고 발굴단은 예산이 소진될 때까지 향후 몇 년 간 독자적으로 발굴을 실시하게 된다."
 lepsius.1202.f: "\"발굴 작업만큼 결과물이 작업자의 성격과 직결되는 일도 드물다. 옛말에 사람은 본인이 찾는 것을 찾는다고 하던데 정말 사실이다. 원하던 바를 찾는 통찰력을 충분히 갖추지 못하면, 원하는 것도 결코 찾지 못한다는 것은 애석하게도 사실이다.\" -플린더스 페트리"
 lepsius.1202.g: "어서 오시오."
 lepsius.1203.t: "현지 발굴 완료"
 lepsius.1203.d: "발굴단이 현지 발굴을 마치고 마지막 발굴품의 수납에 나섰다. 이제 해당 인력은 다른 발굴이나 탐사에 나설 수 있게 되었다."
 lepsius.1203.f: "\"운명의 길은 어둡고\n앞날의 길은 모르니\n잠자리에 들을 때면\n코냑 한 잔 바라노라\" - 로베르트 콜데바이"
 lepsius.1203.g: "조만간 다른 발굴에 나서야겠군."
 lepsius.2000.t: "[SCOPE.sCharacter('lepsius_new_archaeologist_scope').GetLastName] invents the Three-Age System"
 lepsius.2000.d: "The director of the National Museum of Denmark, [SCOPE.sCharacter('lepsius_new_archaeologist_scope').GetFullName], has invented a system to classify archaeological findingss in the three periods #b Stone Age#!, #b Bronze Age#! and #b Iron Age#!. This is revolutionary for Archaeology!"
 lepsius.2000.f: "\"You see, some artifacts are always appearing together and some materials never appear at the same excavation. Silver for example is only found where iron tools and weapons are found as well. Gold on the other hand can be found with both iron and bronze tools.\nIt is fascinating as well that some materials only appear in certain forms of graves. Stone tools can only be found with uncremated corpses and stone-chamber tombs. Iron is found in chamber tombs in barrows.\nAll of this allows us to date our findings way more precisely. First there were stone tools, then there were bronze tools and only afterwards there were iron tools.\""
 lepsius.2000.g: "Such a great mind needs to work for us!"
 lepsius.2000.h: "He can stay in his museum..."
