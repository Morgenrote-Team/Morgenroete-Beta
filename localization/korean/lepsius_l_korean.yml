l_korean:
 lepsius_upper_egypt_modifier: "왕가의 계곡"
 lepsius_upper_egypt_modifier_desc: "왕가의 계곡은 세계에서 가장 매혹적인 고고학 유적지입니다. 수천 년 된 무덤 속에는  보물들이 묻혀 발견되기만을 기다리고 있다고 전해집니다."
 lepsius_lower_egypt_modifier: "피라미드군"
 lepsius_lower_egypt_modifier_desc: "고대의 수도 멤피스가 있는 하이집트는 아직 지도에도 나와있지 않은 피라미드와 미지의 도시가 여럿 잠들어 있는 땅입니다. 오늘날까지도 이집트 사막에 수많은 유물들이 묻혀 있다고 전해집니다."
 lepsius_babylonia_modifier: "문명의 요람"
 lepsius_babylonia_modifier_desc: "메소포타미아는 문자와 농업이 처음 도래하고 최초의 왕국이 세워진 고장으로 여겨집니다. 쐐기문자 점토판과 거대한 석상, 사원 유적들이 한순간 찬란했던 고대 문명의 증거로서 여전히 남아 있습니다."
 lepsius_assyria_modifier: "니네베·님루드 유적"
 lepsius_assyria_modifier_desc: "아시리아는 호전적인 제국들의 발원지임은 물론 중동의 고대사와 성경 설화가 만나는 지점이기도 합니다. 옛 정원과 장대한 성벽의 흔적은 지금까지도 사람들을 매료시키고 있습니다."
 lepsius_argolis_modifier: "미케네의 궁성"
 lepsius_argolis_modifier_desc: "미케네 문화는 그리스 본토에서는 처음으로 등장한 선진 문명으로 여겨집니다. 그리스 신화의 역대 국왕은 오랫동안 그저 옛 이야기로만 치부되어 왔으나, 발굴 조사가 이뤄진다면 이러한 설화 속에 진실의 씨앗이 들어 있음을 증명할 지도 모릅니다."
 lepsius_crete_modifier: "미노아 문명"
 lepsius_crete_modifier_desc: "크레타 섬에는 유럽에서 가장 오래된 도시와 아직 밝혀지지 않은 신비로운 궁전 유적이 남아 있습니다. 미노아 문명은 한때 에게해 전역을 다스렸다고 전해지는 전설 속의 왕 '미노스'의 이름을 따서 명명되었습니다."
 lepsius_yucatan_modifier: "유카탄의 미스터리"
 lepsius_yucatan_modifier_desc: "유카탄 반도의 정글 속으로 깊숙히 들어가면 한때 찬란했던 마야 문명의 도시들이 수몰된 채 아직도 남아 있다고 전해집니다. 현지 주민들의 이야기로 판단컨대, 뚫고 지나갈 수 없는 저 덤불 속을 헤쳐 나갈 수만 있다면 고고학계에 충격을 안길 수 있을 지도 모르겠습니다."
 lepsius_peru_modifier: "안데스의 비밀"
 lepsius_peru_modifier_desc: "잉카 제국은 한때 남아메리카 대륙에서 가장 강력한 국가였으며 스페인의 정복으로 멸망에 이르렀습니다. 하지만 미지의 무덤과 사원이 아직도 존재한다고 전해집니다. 심지어 안데스 산맥에 숨겨진 미지의 도시가 있다는 이야기도 들려옵니다."
