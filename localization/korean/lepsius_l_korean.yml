 notification_lepsius_ishtar_normal_transport_notification_name: "이슈타르의 문 벽돌의 수송"
 notification_lepsius_ishtar_normal_transport_notification_desc: "메소포타미아에서 보내온 실물 크기의 벽돌 한 묶음이 오늘 고고학 박물관에 도착했습니다. 이것으로 우리는 #V 이슈타르의 문 벽돌#! #G 20,000점#!을 확보하였습니다."
 notification_lepsius_ishtar_normal_transport_notification_tooltip: "#header $notification_lepsius_ishtar_normal_transport_notification_name$#!\n$TOOLTIP_DELIMITER$\n$notification_lepsius_ishtar_normal_transport_notification_desc$"
 notification_lepsius_ishtar_double_transport_notification_name: "이슈타르의 문 벽돌 대량 수송"
 notification_lepsius_ishtar_double_transport_notification_desc: "이슈타르의 문 재건에 필요한 벽돌이 오늘 고고학 박물관에 도착하였는데 그 규모가 이례적입니다. 메소포타미아의 선적 절차가 예상보다 순조롭게 진행되는 것으로 보입니다. 이것으로 우리는 #V 이슈타르의 문 벽돌#! #G 40,000점#!을 확보하였습니다."
 notification_lepsius_ishtar_double_transport_notification_tooltip: "#header $notification_lepsius_ishtar_double_transport_notification_name$#!\n$TOOLTIP_DELIMITER$\n$notification_lepsius_ishtar_double_transport_notification_desc$"
 notification_lepsius_ishtar_half_transport_notification_name: "이슈타르의 문 벽돌 소량 수송"
 notification_lepsius_ishtar_half_transport_notification_desc: "이번에 우리 수송선에 실린 이슈타르의 문 벽돌은 알 수 없는 사정으로 절반 규모에 그쳤습니다. 이것으로 우리는 #V 이슈타르의 문 벽돌#! #G 10,000점#!을 확보하였습니다."
 notification_lepsius_ishtar_half_transport_notification_tooltip: "#header $notification_lepsius_ishtar_half_transport_notification_name$#!\n$TOOLTIP_DELIMITER$\n$notification_lepsius_ishtar_half_transport_notification_desc$"
 notification_lepsius_ishtar_bad_transport_notification_name: "열악한 상태의 이슈타르의 문 벽돌"
 notification_lepsius_ishtar_bad_transport_notification_desc: "메소포타미아에서 최근에 찾아낸 벽돌들을 우리 큐레이터들이 전수조사한 결과, 일부 파편들은 유감스럽게도 전혀 사용할 수 없는 상태라는 결론을 내리게 되었습니다. 이것으로 우리는 #V 이슈타르의 문 벽돌#! #G 5,000점#!을 확보하였습니다."
 notification_lepsius_ishtar_bad_transport_notification_tooltip: "#header $notification_lepsius_ishtar_bad_transport_notification_name$#!\n$TOOLTIP_DELIMITER$\n$notification_lepsius_ishtar_bad_transport_notification_desc$"
