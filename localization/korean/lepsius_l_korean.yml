 je_lepsius_palmyra: "야자수의 도시 팔미라"
 je_lepsius_palmyra_reason: "#T 시리아의 팔미라 유적은 고고학자들을 매혹에 빠뜨리는 곳이다.#!\n$mr_divider_for_je$\n매달 여러 요인에 따라 진행도를 획득합니다. 발굴 개시 이후 특정 시점에서 발생하는 이벤트로 [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')], 경험치, 주 특성 변화를 획득하며, 마지막의 경우 [concept_curtiss_tourism] 수입이 늘어나는 효과를 볼 수 있습니다.\n$mr_divider_for_je$\n$lepsius_excavation_progress_loc$"
 je_lepsius_palmyra_1_loc: "팔미라 유적은 대부분이 수백 년 전의 모습 그대로 남아 있습니다."
 je_lepsius_palmyra_2_loc: "최근 바알 신전이 발굴을 거쳐 부분 복원되면서 고대 유적지를 보려는 관광객들을 한층 더 많이 끌어모으고 있습니다."
 je_lepsius_palmyra_3_loc: "우리 고고학자들이 바알 신전을 비롯한 수많은 신전들과 탑 무덤으로 이름난 무덤의 계곡을 발굴하고 복원하였습니다. 이것으로 점점 더 많은 관광객이 다녀가게 될 것입니다."
