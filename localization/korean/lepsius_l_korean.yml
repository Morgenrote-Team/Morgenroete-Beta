 lepsius.1502_mauer_d: "\n호모 하이델베르겐시스의 아래턱뼈는 하이델베르크 인근에서 발견되어 유럽에서 발견된 초기 인류의 가장 오래된 증거로 여겨지는 동시에, 호모 에렉투스와 이후의 인류 사이에 중요한 전환점이 있었음을 보여줍니다."
