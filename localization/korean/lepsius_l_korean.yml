 lepsius.714.t: "클레오파트라의 첨탑"
 lepsius.714.d: "Now that the final negotiations with the local authorities have been settled, nothing stands in the way of the removal, transport, and reconstruction of 'Cleopatra's Needle'. This is a significant archaeological and engineering project!"
 lepsius.714.f: "Before their historic removal, the two 'Needles' languished for centuries as half-forgotten monuments in the Caesareum of Alexandria, with only one of the needles still standing upright, while the other had already sunk into the desert sand. During the era of early colonialism and Egyptomania, numerous ideas arose to transport these monoliths to Western capitals as powerful symbols of state sovereignty and scientific conquest, but such plans initially failed due to the immense logistical hurdles of the time. In the perception of European travelers, the needles, together with the imposing Pompey's Column—one of the largest monolithic pillars of antiquity—formed the iconic trio of the Alexandrian skyline, marking the transition from Pharaonic to Greco-Roman splendor. While Pompey's Column, due to its massive construction and firm anchoring on the Serapeum plateau, always remained in place as an immovable monument, the obelisks were increasingly regarded as diplomatic trade goods until they finally embarked on their journey across the ocean as prestigious gifts from the Viceroy Muhammad Ali Pasha."
 lepsius.714.g: "오벨리스크를 [ROOT.GetCountry.GetCapital.GetCityHubName]에 보내라!"
 lepsius.715.t: "클레오파트라의 첨탑"
 lepsius.715.d: "The obelisk was received in [ROOT.GetCountry.GetCapital.GetCityHubName] today with a large, public ceremony and enthusiastically celebrated by the population."
 lepsius.715.f: "The London 'Needle' reached the city in 1878 in a specially constructed floating iron cylinder, which nearly sank during a severe storm in the Bizaya Bay, costing the lives of six sailors. The New York obelisk was erected in Central Park in 1881, after being transported in an elaborately converted steamship and then rolled centimeter by centimeter into position in New York using a massive wooden scaffold. Both monuments were celebrated with grand public ceremonies upon their arrival and continue to serve as striking symbols of ancient Egypt amidst modern metropolises."
 lepsius.715.g: "이것으로 세계 무대에서 우리의 제국적 야망을 굳히게 될 것이다!"
 lepsius.773.t: "피에다스 네그라스 비석"
 lepsius.773.d: "Now that the final negotiations with the local authorities have been settled, nothing stands in the way of the removal, transport, and reconstruction of a stele from Piedras Negras. This is a significant archaeological and engineering project!"
 lepsius.773.f: "The Piedras Negras Stelae are a series of monumental stone sculptures from the ancient Maya city of Piedras Negras, located in modern-day Guatemala. Carved in the 'Peten style,' the stelae often depict rulers in elaborate costumes, sometimes seated in niches or standing over captives. These monuments are world-renowned for their exceptional artistic quality and historical significance. Today, many of these stelae are preserved in the National Museum of Archaeology and Ethnology in Guatemala City and in the University Museum of Pennsylvania."
 lepsius.773.g: "비석을 [ROOT.GetCountry.GetCapital.GetCityHubName]에 보내라!"
 lepsius.774.t: "피에다스 네그라스 비석"
 lepsius.774.d: "With a public exhibition in [ROOT.GetCountry.GetCapital.GetCityHubName] today, the Archaeological Museum presented the stele of Piedras Negras to the public and interested visitors."
 lepsius.774.f: "After their arrival at the University of Pennsylvania Museum (Penn Museum) in Philadelphia, the stelae became the centerpiece of the newly redesigned Maya galleries, where they were presented to a wide Western audience for the first time. The monumental sculptures were permanently installed using extensive technical equipment to protect their intricate reliefs from further deterioration and to make them accessible for research. To this day, they serve as key objects for deciphering Maya hieroglyphs and testify to the former grandeur of the city of Piedras Negras."
 lepsius.774.g: "Gigantic artifacts. I like it!"
 lepsius.2256.t: "악숨의 오벨리스크"
 lepsius.2256.d: "The obelisk was received in [ROOT.GetCountry.GetCapital.GetCityHubName] today with a large, public ceremony and enthusiastically celebrated by the population."
 lepsius.2256.f: "The Obelisk of Axum arrived in Rome in 1937 as war booty of Fascist Italy, after being dismantled in Ethiopia on Mussolini's orders and transported by ship under enormous logistical conditions. It was re-erected in front of the Colonial Ministry building and served for decades as an imperial symbol of triumph in the Roman cityscape. Only after lengthy diplomatic negotiations and technical preparations was the 150-ton monument returned to Ethiopia in 2005 and re-erected there in 2008 in its original archaeological park."
 lepsius.2256.g: "이것으로 세계 무대에서 우리의 제국적 야망을 굳히게 될 것이다!"
