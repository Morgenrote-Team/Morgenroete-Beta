 lepsius_archaeologist: "고고학자"
 lepsius_archaeologist_desc: "고대의 언어, 잃어버린 문명, 귀중한 유물로 과거를 재건하는 일에 관심이 있는 학자입니다."
 lepsius_archaeologist_experienced: "경험 많은 고고학자"
 lepsius_archaeologist_experienced_desc: "이 인물은 여러 차례의 중요한 고고학계 발견을 해냈으며 높은 명성을 갖추고 있습니다."
 lepsius_archaeologist_famous: "저명한 고고학자"
 lepsius_archaeologist_famous_desc: "이 박식한 고고학자는 수많은 모험을 다닌 것으로 세계에서 이름나 있으며, 국제적인 명성을 누리고 있습니다."
 je_lepsius_letter_to_rosellini: "레프지우스가 로셀리니에게 보낸 편지"
 je_lepsius_letter_to_rosellini_reason: "카를 리하르트 레프지우스는 젋고 야심찬 언어학자로서 획기적인 발견을 눈앞에 두고 있습니다. 레프지우스는 자신만의 접근법을 활용해 샹폴리옹의 기초적인 상형문자 해독 원리를 개선하고, 이를 통해 고고학 연구에 혁명을 일으킬 것입니다."
 je_lepsius_stephens_catherwood_expedition: "스티븐스-캐터우드 탐사"
 je_lepsius_stephens_catherwood_expedition_reason: "주중미 대사인 존 로이드 스티븐스가 유카탄 반도 방문에 관심을 표했습니다. 화가 프레더릭 캐터우드도 그와 함께 정글 속 신비로운 유적지로 향하는 탐험에 동행하고 싶어합니다. 올바른 환경만 갖춰진다면 이 사업은 국가적 위신을 드높이는 계기가 될 수 있습니다."
 je_lepsius_decipherment_akkadian: "아카드어 해독"
 je_lepsius_decipherment_akkadian_reason: "상형문자 해독 뿐만 아니라 고대 페르시아어와 쐐기 문자 역시 수십 년간 전공자들의 관심을 사로잡았습니다. 이제 고대 페르시아어와 쐐기 문자는 학자들에게 더 이상 비밀로 남아 있지 않습니다. 오스틴 헨리 레이어드의 님루드 탐사는 큰 반향을 일으키며 대중의 관심을 끌었습니다. 최근에는 베히스툰에서 거대한 다국어 비문이 발견됨에 따라, 고대 메소포타미아의 가장 오래된 언어들을 해독하는 것이 다음 과제로 떠오르고 있습니다. 그것을 해결한다면 완전히 새로운 고고학적 가능성을 열어줄 것입니다."
 je_lepsius_support_schliemann: "하인리히 슐리만과 트로이의 꿈"
 je_lepsius_support_schliemann_reason: "하인리히 슐리만은 독일의 사업가이자 독학으로 세계를 누비며 엄청난 재산을 축적한 인물입니다. 하지만 슐리만의 진정한 열정은 젊은 시절부터 호메로스의 서사시에 매달려 있었습니다. 고대 트로이가 허구가 아니라고 확신하는 슐리만은 자신의 신념을 지지해 줄 사람들을 아직도 찾아 나서고 있습니다."
 je_lepsius_machu_picchu: "잉카의 유산"
 je_lepsius_machu_picchu_reason: "20세기 초부터 최신 기술과 연구 기법의 발전으로 세계에서 가장 접근하기 어려운 곳조차 더 이상 미지의 영역으로 남지 않게 되었습니다. 특히 비행기의 발명은 과거에 접근할 수 없었던 지역들을 지도로 제작하는 데 엄청난 도움을 주었습니다. 어쩌면 오랫동안 잊혀진 문명의 마지막 미스터리도 마침내 풀을 수 있을지도 모릅니다."
 je_lepsius_epic_of_gilgamesh: "길가메시 서사시"
 je_lepsius_epic_of_gilgamesh_reason: "길가메시 서사시는 주로 바빌로니아 지역에서 유래한 문학 작품군으로, 현존하는 가장 오래된 상형문자로 쓰여져 있습니다. 길가메시 서사시는 다양한 판본으로 존재하며 아카드어와 수메르어 문학을 대표하는 작품입니다. 서사시에는 우루쿠의 왕 길가메시의 이야기, 즉 그의 업적과 모험, 엔키두와의 우정과 본인의 죽음, 불멸을 향한 여정을 담고 있습니다. #T 길가메시 서사시의 원본을 복원하려면 점토 파편 5점이 필요합니다.#!"
 je_lepsius_epic_of_gilgamesh_success: "@lepsius_gilgamesh_fragment! 길가메시 서사시의 점토 파편을 최소 #G 5점#! 확보하여 기초 복원에 나서기"
