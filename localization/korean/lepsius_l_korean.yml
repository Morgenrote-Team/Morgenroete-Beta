 je_lepsius_angkor: "The Heart of the Khmer Empire"
 je_lepsius_angkor_reason: "The ruins of Angkor never truly disappeared. They remained known not only to locals, but also to European missionaries and travelers in the early modern period, who reported on temples in the jungle. To thoroughly investigate the Khmer rule of the past, the ruins would need to be completely cleared of vegetation and the archaeological site restored before any research could begin."
 je_lepsius_cliff: "The Secret of the Pueblo"
 je_lepsius_cliff_reason: "Unlike many other inhabitants of western North America, the Pueblo Indians are settled. They live in stone houses and small settlements and are farmers. Rumor has it that there are numerous abandoned towns in their territory. Could it really be that a lost civilization exists in this part of America?"
 je_lepsius_guatavita: "Mystery of the Muisca"
 je_lepsius_guatavita_reason: "Lake Guatavita remains shrouded in mystery. The site was considered sacred by the Muisca, one of Colombia's legendary gold-producing peoples, who were in close contact with the Inca and whose goldsmithing was among the most advanced of the pre-Columbian era. The echoes of the past still resonate: immense riches may lie hidden in the lake. A small excavation could bring certainty."
 lepsius.78.t: "Cliff Palace"
 lepsius.78.d: "More by chance than by design, archaeologists in Colorado, while searching for ancient Native American artifacts, discovered a Pueblo town carved into the rock. Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] traveled there immediately to examine the site more closely."
 lepsius.78.f: "Cliff Palace is the largest cliff dwelling in North America, located in Mesa Verde National Park, Colorado. Constructed by the Ancestral Puebloans between 1190 and 1260 CE, the complex features over 150 rooms and 23 kivas. Although Indigenous groups maintained an ancestral connection to the site, its documented discovery by Euro-Americans occurred on December 18, 1888. Ranchers Richard Wetherill and Charlie Mason spotted the ruins from a canyon rim while searching for lost cattle during a blizzard. Struck by the scale of the masonry sheltered within the sandstone alcove, they named it 'Cliff Palace.' This discovery catalyzed international interest in Southwestern archaeology, contributing to the site's federal protection in 1906."
 lepsius.79.t: "Angkor Restored"
 lepsius.79.d: "After many months, Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] and his assistants have unearthed the ruins of the ancient Khmer capital, Angkor. The archaeological site can now be used again for in-depth research."
 lepsius.79.f: "'It differs, indeed, from those great classics of the Mediterranean basin that have long captured our admiration: it is no longer these majestic colonnades, these great calm surfaces of Greece or Egypt; these are, in contrast, forms (that are) laborious, complex, tormented: overlays, multiple withdrawals, mazes, galleries shaded from daylight, jagged towers, pyramids with countless stories and arrows, a great profusion of ornaments and sculptures, constant effects of light and shadow that enrich the whole without altering its majesty, and blend beautifully with the intense light and lush tropical vegetations: it is, in short, another form of beauty.' -Louis Delaporte"
 lepsius.751.t: "The Golden Raft of Siecha"
 lepsius.751.d: "Excavations have unearthed a mysterious and beautiful raft made of gold. It is already considered a key artifact of the vanished Muisca culture - and is reviving ancient legends."
 lepsius.751.f: "In 1856, two brothers from Siecha by the names of Joaquín and Bernardino Tovar partially drained a nearby lagoon, and found a votive raft that they associated with the ceremony referred to in the legend of El Dorado. It was in the hands of diplomat Salomón Koppel who sold it to a museum in Germany, the Ethnologisches Museum. Unfortunately, when it arrived in germany, it was destroyed by fire. The Siecha Raft is one of only two golden rafts from the Muisca culture. The other, the Pasca Raft, was only found 100 years later."
 lepsius.751.g: "It will be the finest exhibit in our collection."
 lepsius.751.h: "We don't have a museum for it. We should sell it in exchange for money, scientific assistance, and a political favor."
 lepsius.752.d: "Lacking its own museum, [SCOPE.sCountry('lepsius_raft_country').GetName] approached us with a spectacular artifact. It originates from Siecha on the shores of Lake Guatavita and depicts a golden raft adorned with intricate figures in a procession. While the scholars are urging us to acquire the piece at any cost, the politicians have reservations about the terms of the agreement."
 lepsius.752.g: "We need this artifact at any cost!"
 lepsius.752.h: "We can't buy this."
 lepsius.734.t: "Bull Head Rhyton"
 lepsius.734.d: "During the current excavations at the Palace of Knossos, Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] has made a sensational discovery that lends a whole new significance to the Greek mythology surrounding Crete and its legendary King Minos."
 lepsius.734.f: "The Bull's Head Rhyton was discovered by Sir Arthur Evans in the 'Little Palace' at Knossos, Crete and dates to the Neopalatial period (c. 1550.1500 BCE). This ceremonial vessel is carved from a single block of black steatite. Its eyes are fashioned from rock crystal and red jasper, creating a lifelike gaze, while the muzzle is delicately inlaid with white shell. As a rhyton, it functioned as a ritual libation vessel; liquid was poured into the neck and exited through a hole in the snout. Symbolizing power and fertility, it exemplifies the bull's central role in Minoan religion."
