 lepsius_ishtar_gate_cost_modifier: "이슈타르의 문 복원 예산"
 lepsius_museum_lower_prices_modifier: "박물관 입장료 인하"
 lepsius.1502_peking_d: "\n자바인과 더불어 베이징인은 최초의 호모 에렉투스 화석으로 추정되며 인류의 발원지는 아시아라는 믿음을 뒷받침하고 있습니다. 유골의 연대는 40만 년에서 78만 년 전으로  전해지고 있습니다."
