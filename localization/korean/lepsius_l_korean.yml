 je_lepsius_priams_treasure: "프리아모스의 보물"
 je_lepsius_priams_treasure_reason: "하인리히 슐리만은 전설 속 프리암의 보물이 있을 법한 장소를 찾아다니며, 그곳에서 트로이를 발견할 수 있을 것이라고 주장하고 있습니다. 이를 진지하게 다루는 학자들은 그러한 보물들이 슐리만이 제시한 시대적 배경과 정말로 부합하는지 의문을 제기하고 있으나, 그것은 부차적인 문제일 뿐입니다. 어찌 되었든 금세기 최고의 고고학적 보물로 꼽히는 것을 손에 넣을 수 있는 절호의 기회이기 떄문입니다. 그것을 소장하는 데에는 우리 박물관이 최적의 장소가 될 것입니다."
 je_lepsius_priams_treasure_fail: "경쟁국이 우리보다 먼저 슐리만의 요구를 들어준다면, 우리는 프리암의 보물을 획득할 특별한 기회를 놓치고 말 것입니다."
 je_lepsius_the_labyrinth: "미궁"
 je_lepsius_the_labyrinth_reason: "영문 모를 고대의 미궁에 갇혀버린 우리의 고고학자가 탈출구를 찾아 나서야 합니다. 실수를 너무 많이 하게 되면 영영 그곳에 갇혀 버릴 수도 있습니다!"
 je_lepsius_the_labyrinth_goal: "길을 너무 많이 잃지 말고 미로를 탈출하십시오."
