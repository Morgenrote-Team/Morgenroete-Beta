 andersson_anthropology_tech: "인류학"
 andersson_anthropology_tech_desc: "고인류학(통칭 인류학)은 고생물학과 인류학의 한 분야로 생물학적 증거 (화석화된 골격 유해, 뼛조각, 발자국)와 문화적 증거(석기, 유물, 정착지)를 바탕으로 인류과(Hominidae)의 진화적 계통을 재구성하여, 현대 인류의 초기 진화, 즉 인류화 괒어을 해부학적으로 설명하는 학문입니다."
 lepsius.2105.t: "The Hildesheim Treasure"
 lepsius.2105.d: "Archaeologists have unearthed a significant hoard of silver in Hildesheim. Surprisingly, it consists of numerous valuable Roman artifacts!"
 lepsius.2105.f: "The Hildesheim Treasure, discovered on October 17, 1868, by Prussian soldiers near Galgenberg, remains one of the most significant finds of Roman silversmithing outside the imperial frontiers. Consisting of approximately 70 exquisite silver vessels, including the iconic Minerva Bowl, the collection dates primarily to the 1st century AD. The collection is masterpiece of Augustan-era craftsmanship, but it sparked intense nationalistic and academic debate when found. Early interpretations frequently linked the treasure to the Battle of the Teutoburg Forest (9 AD), speculating it was the lost baggage of the Roman general Varus. Later scholars viewed it as a diplomatic gift or a high-ranking officer's traveling service."
 lepsius.2105.g: "Roman silver in the heart of Germania?"
 lepsius.2115.t: "The Oxus Treasure"
 lepsius.2115.d: "On the banks of the Oxus, archaeologists have made a spectacular gold find that reflects the splendor of the ancient Persian Empire."
 lepsius.2115.f: "The Oxus Treasure is the most significant collection of Achaemenid Persian goldsmithing ever discovered. Found near the Oxus River (modern-day Tajikistan) around 1877, the hoard comprises approximately 180 gold and silver objects and over 200 coins. The collection showcases an extraordinary blend of Persian, Scythian, and Greek artistic influences. Key artifacts include a famous miniature gold chariot, intricate armlets featuring winged griffins, and numerous votive plaques depicting priests and warriors. The treasure was famously rescued from bandits by a British officer before reaching the British Museum. Historically, it serves as a primary source for understanding the wealth and artistic refinement of the Achaemenid Empire, reflecting the vast trade networks and cultural synthesis of the ancient Persian world. Its discovery provided scholars with the first major tangible evidence of the empire's legendary opulence."
 lepsius.2115.g: "These wonderful pieces deserve their own room in the museum!"
 lepsius.2135.t: "The Statue of Xōchipilli"
 lepsius.2135.d: "Locals have found an ancient statue among volcanic rock. Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] is absolutely thrilled: It might be the best-preserved statue from the Aztec Empire!"
 lepsius.2135.f: "The seated male figure carved from volcanic andesite, discovered in the 1880s on the slopes of the Popocatépetl volcano, quickly became the subject of speculation about Aztec civilization. The statue depicts a man in a ritual, cross-legged squatting position on a richly decorated pedestal. The figure's entire body, as well as the throne, is covered with finely carved reliefs of stylized flowers and butterflies, bearing a striking resemblance to the hallucinogenic plants of the Mexican highlands. The slightly backward-tilted head, with its wide-open eyes and slightly parted mouth, conveys the impression of an ecstatic trance or divine dialogue. The mask-like features and floral iconography—including depictions of morning glory and tobacco—led researchers to identify him as the 'Prince of Flowers,' the deity Xōchipilli, who presided over the dance, song, and sacred dreams of the Aztecs."
 lepsius.2135.g: "This statue is eerie, disturbing, fascinating, and wonderful."
 lepsius.2145.t: "크수르 에세프 흉갑"
 lepsius.2145.d: "고대 카르타고 인근에서 진행된 발굴 조사 과정에서 고고학자들이 상당히 놀라운 발견을 일구어냈다."
 lepsius.2145.f: "크수르 에세프 흉갑은 1909년 튀니지 크수르 에세프 인근의 페니키아 무덤에서 발견된 고대의 흉갑이다. 특유의 해부학적 조형과 화려한 조각이 특징인 청동 흉갑으로, 기원전 3세기 이탈리아 남부나 캄파니아 지역의 장인 정신이 돋보이는 걸작으로 평가된다. 흉갑에는 페니키아 여신 타니트와 그리핀, 꽃무늬가 새겨져 있는데 전장에서의 보호와 지위를 상징하고 있다. 실제 역사와는 제2차 포에니 전쟁과 관련이 있으며 한니발 군대의 고위 장교가 이탈리아 원정 중에 획득했다는 설이 학계의 정설로 자리잡고 있다."
 lepsius.2145.g: "카르타고 지역에서 고대 이탈리아의 흉갑이 발견됐다니!"
 lepsius.2155.t: "군데스트룹 솥"
 lepsius.2155.d: "유틀란트 반도의 히메를란드에서 웅장한 켈트족 유물이 우연히 출토되었다."
 lepsius.2155.f: "1891년 덴마크의 이탄 습지에서 출토된 군데스트룹 솥은 철기시대 은세공품 가운데 최대 규모로 꼽히고 있다. 여러 개의 은판을 덧대어 만들었으며 원래는 금박이 입혀져 있었고, 복잡한 신화 이야기를 양각으로 새겨 넣은 것이 특징이다. 켈트족의 중심지에서 훨씬 북쪽에서 발견되었다는 점에서 고고학계에게 충격을 안겼다. 정황상 도나우강 하류 지역(지금의 루마니아나 불가리아)에서 트라키아의 은세공 장인들이 제작해 켈트족 세력권에 수출한 것으로 보인다. 군데스트룹 솥은 19세기 말부터 20세기 초까지 고대 유럽의 종교적 관습과 발칸 반도에서 북해에 이르는 드넓은 상호 무역망을 이해하는 데 중요한 연구 대상이 되었다."
 lepsius.2155.g: "지금도 국 끓여 먹을 수 있는가?"
 lepsius.2185.t: "안티키테라 기계"
 lepsius.2185.d: "해면을 캐던 잠수부들이 안티키테라 연안에서 난파선을 발견했다. 로마 시대에 건조된 선박 내부에는 고고학계에서 중요히 여길 만한 유물 뿐만 아니라, 헬레니즘 시대에 대한 통념을 완전히 뒤흔들 기계도 발견되었다."
 lepsius.2185.f: "안티키테라 기계는 역사학계와 과학계에서 아날로그 컴퓨터의 가장 오래된 사례로 널리 평가되고 있는 유물이다. 제작 연대는 기원전 2세기에서 1세기로 거슬러 올라가지만, 그 복잡한 구조는 이후 서양에서 1,500여년 동안 찾아볼 수 없었던 수준을 자랑하고 있다. 원래 이 기계는 탁상시계 크기의 나무 겉상자 안에 최소 30개의 청동 톱니바퀴로 이루어진 구성을 취하고 있었다. 작동은 손으로 크랭크를 돌려 이루어졌으며, 그리스어 명문이 새겨진 여러 개의 다이얼이 있었다. 안티키테라 기계의 기원은 오늘날까지도 학계의 뜨거운 논쟁 대상이 되고 있다. 정확한 제작자는 미상이지만 여러 설이 제기되고 있으며, 일각에서는 시라쿠사의 아르키메데스와 관련이 있다고 보기도 한다."
 lepsius.2185.g: "나침반인가? 천문 기구인가? 아니면 타임 머신인가?"
 lepsius.2205.t: "마답비연상"
 lepsius.2205.d: "우리 학자들이 옛 한나라의 북부 변방 지대에서 그 시대 가장 뛰어난 것으로 보이는 조각상을 발견했다."
 lepsius.2205.f: "마답비연상(馬踏飛燕像, 날아가는 제비를 밟고 달리는 말)은 중국 동한 시대(서기 25년~220년)의 대표적인 청동 조각상이다. 1969년 감숙성 운태(雷台)에 위치한 어느 장군의 묘에서 출토된 이 조각상은 고대 중국의 청동 공예의 정수라 할 수 있다. 마답비연상은 전설 속의 천마로 불려진 한혈마(汗血馬)가 전속력으로 달리는 모습을 묘사했다. 균형미와 역동성의 극치를 보여주는 이 조각상은 한쪽 발굽으로 날아가는 제비를 딛고 서 있는 모습으로, 제일 빠른 새조차 능가할 정도로 빠르다는 것을 암시하고 있다. 처음 발견될 당시 이 조각상은 실크로드의 상징으로 여겨졌으며, 군사력과 문화 교류를 통한 중국의 확장을 보여주는 유물로 평가되었다."
 lepsius.2205.g: "여느 새보다 빠르게, 또 우아하게!"
 lepsius.2215.t: "신라 금관"
 lepsius.2215.d: "신라의 고도 경주에서 고고학자들이 왕릉을 발견하고 내부를 발굴하였다. 그곳에서 발견한 유물들은 학계에 선풍을 일으켰다!"
 lepsius.2215.f: "신라 금관은 고대 한국사에서 가장 화려한 보물로서 경주 왕릉에서 주로 출토되고 있다. 금제 유물에 관한 소문은 수백 년 동안 끊이지 않았지만, 1921년 공사 도중 금관총이 우연히 발견된 것이 처음으로 과학적 발견을 거치게 된 사례다. 이 금관은 순도 높은 황금으로 제작되고 쉼표처럼 구부러진 곡옥(曲玉)으로 장식되었으며, 나무가지처럼 생긴 구조와 사슴뿔 모양이 특징이다. 20세기 초 고고학계와 사학계에서는 이러한 문양을 무속 왕권의 상징으로 해석하며, 시베리아와 중앙아시아 스텝 민족과의 문화적 연관성이 있다는 설을 제기하였다."
 lepsius.2215.g: "다음 전시에서 특별한 공간에 배치해도 좋을 법한 왕관이로군."
 lepsius.2225.t: "하니와 무장남자입상"
 lepsius.2225.d: "[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] 박사가 오늘 굉장히 훌륭한 유물을 공개하였다. 박사 본인도 이 유물은 자신의 경력을 통틀어 '고고학계 최고 업적'이라고 자부하였다. 이 유물은 벌써부터 야마토 시대 예술의 정수로 평가받는 분위기다."
 lepsius.2225.f: "하니와 무장남자입상은 일본 고분 시대의 상징적인 토우 조각상을 말한다. 하니와는 망자를 보호하고 무덤의 신성한 공간을 구분하는 용도로 거대한 고분 위에 놓였다. 가장 유명한 발굴 사례는 1924년 일본 군마현 오이즈미에서 발견된 것으로 그 보존 상태가 놀라운 수준이다. 괘갑(挂甲, 게이코)를 찬 무사를 묘사한 이 조각상은 6세기 일본의 전투 장비, 특히 판갑옷과 전통 장궁을 입체적으로 보여주는 귀중한 단서다. 오늘날 이 조각상은 일본 국보로 지정되어 있으며, 야마토 왕조의 군사 발전에 대한 통찰력을 학계에 선사하였다. 낭만적인 시선에서 보자면 이 무사는 후대 사무라이 계급의 '증조할아버지' 격이 될 것이다."
 lepsius.2225.g: "일본의 과거는 더 이상 어둠에 묻혀 있지 않다!"
 lepsius.2235.t: "사제왕상"
 lepsius.2235.d: "인더스 문명을 조사하던 고고학 발굴단이 지금껏 가장 중요한 발견을 이루어냈다. 명상하는 자세를 취한 신원 미상의 조그마한 남성상이 발견된 것이다. 벌써부터 이 조각상은 청동기 시대를 대표하는 유물로 높이 평가받고 있다."
 lepsius.2235.f: "1925년~1926년 모헨조다로 발굴 과정에서 활석을 조각해 만든 조그만 남성 좌상이 발견되면서 하라파 일대 문명의 정치와 종교 구조를 파악하려는 학계의 노력도 활발해졌다. 파편화된 상태의 이 조각은 높이가 17.5cm에 불과하지만, 그 정교한 조각 기술은 놀라울 정도다. 남성은 수염을 기르고 깔끔하게 다듬은 콧수염을 하고 있으며 사색에 잠긴 듯 눈을 반쯤 감고 있다. 한쪽 어깨에는 세잎 문양이 새겨진 망토를 걸치고 있는데 이 세잎 문양은 당시 메소포타미아, 이집트에서 발견되는 종교적 상징과 매우 유사하다. 원형 머리띠와 팔찌를 착용한 모습은 사회적, 의례적으로 중요한 지위에 있었음을 보여주므로 당대 고고학계에서 '사제왕상'이라 명명하는 계기가 되었다."
 lepsius.2235.g: "잊혀진 제국의 얼굴이로군."
 lepsius.2245.t: "누운 비슈누상"
 lepsius.2245.d: "[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] 박사가 동남아시아에서 가장 웅장한 청동 불상을 발견했다고 전해 왔다. 그러나 그 불상이 사실은 비슈누상이라는 사실에 그다지 주목하진 않은 모양이다."
 lepsius.2245.f: "메본 서부의 누운 비슈누상은 11세기 크메르 제국의 장엄한 청동 조각상으로, 캄보디아 앙코르와트의 바라이 저수지 서부에서 발견되었다. 아난타사인 자세를 취한 비슈누를 묘사하였으며 우주의 바다에서 뱀 '셰샤' 위에 누워 있는 모습이다. 바푸온 양식의 걸작으로서 그 규모와 상징성에서 중요도가 크다. 고대 동남아시아 최대의 청동 조각상으로 꼽히는 이 조각상은 크메르인들의 우수한 금속 세공 기술을 보여주고 있다. 거대한 인공 호수 한가운데에 배치된 것은 힌두교의 원시 바다를 형상화한 것으로, 국왕의 신성한 권위를 확립하는 데 그 목적이 있었다. 1936년부터 파편이 조금씩 발견되었으며 오늘날 몸통과 머리 부분까지 복원되어 캄보디아 국립 박물관을 대표하는 보물로 남아 있다."
 lepsius.2245.g: "부처니 비슈누니 상관할 게 뭔가, 어차피 박물관에 모실 것을!"
 lepsius.2255.t: "악숨 오벨리스크"
 lepsius.2255.d: "[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] 박사가 최근 악숨의 '오벨리스크'로 불리는 석탑을 집중 연구하고 있다. 그 용도와 관련해서는 옛 무덤을 표시하기 위한 비석이라는 것이 박사의 견해이며, 고대 악숨 왕국 최고의 유물로 높이 평가하고 있다."
 lepsius.2255.f: "제2비석이라고도 부르는 악숨의 오벨리스크는 24m 높이의 화강암 석조물로, 축조연대는 서기 4세기로 거슬러 올라가며 오늘날 에티오피아 지역에 위치했던 악숨 제국의 우수한 건축 기술을 보여주는 대표 유물이다. 이 비석은 마치 다층건물처럼 보이는 화려한 가짜 문과 창문으로 장식되어 있으며, 당시 특권층의 무덤으로 활용되었다. 근대에 이르러 파란만장한 내력을 겪은 것으로도 유명한데 1937년 이탈리아의 베니토 무솔리니의 명령으로 약탈품으로서 로마로 강제 반출되었다. 수십년에 걸친 외교적 노력 끝에 2005년 세 부분으로 해체되어 에티오피아로 반환되었다."
 lepsius.2255.g: "우리 선조들의 자랑스러운 징표일세!"
 lepsius.2255.h: "오벨리스크를 [ROOT.GetCountry.GetCapital.GetCityHubName]에 옮겨 세우시오!"
 lepsius.2265.t: "몰든 청동판"
 lepsius.2265.d: "미시시피 문화의 중심 지역에서 발굴 조사를 진행하던 고고학자들이 뜻밖의 발견을 이루어냈다. 놀라울 정도로 정교한 청동판이 수백 년 넘는 세월을 거쳐 다시 빛을 보게 된 것이다."
 lepsius.2265.f: "몰든 청동판은 울핑 유물군이라고도 부르며, 1906년 미국 미주리주 몰든에서 레이 그루밍이 발견한 8개의 양각 청동판으로 이루어진 유물이다. 서기 1200년부터 1400년경까지 존속했던 미시시피 문화에 속하는 특별한 유물로, 원래는 들판에 묻혀 있었던 것으로 추정되는데 정황상 안전히 보관하거나 제물로 바치기 위해 잘 숨겨둔 것으로 보인다. 몰든 청동판은 선콜럼버스 시대 금속 세공술의 걸작으로, 미국 남동부 의식공동체의 정교한 도상학이 반영된 것이 특징이다. 청동판에서도 가장 크게 다뤄진 것은 매의 춤을 추는 사람, 다시 말해 새의 특징과 날개, 의례복을 입고 의인화된 형상인데, 이는 강력한 초자연적 존재 내지는 샤머니즘에서의 변신을 상징한다."
 lepsius.2265.g: "아메리카에 문명이 도래하기 전에도 문명이 존재했던 것인가?"
 lepsius.2275.t: "킴바야의 보물"
 lepsius.2275.d: "[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] 박사가 콜롬비아에서 지금까지 발견된 것 가운데 가장 큰 금괴를 찾아냈다. 발굴 과정에서 수백 점의 유물이 출토되었는데, 잊혀진 문명의 온 보물을 발견한 모양이다."
 lepsius.2275.f: "킴바야 보물은 오늘날 콜롬비아 지역에 존재했던 킴바야 문명이 제작한 세계적으로 이름난 유물군이다. 주로 4세기~10세기 선콜럼버스 시대에 제작된 금제유물과 툼바가 유물이며, 장신구와 조각상, 그리고 포포로스라 불리는 의례용 도기를 비롯하여 총 122점의 유물로 구성되어 있다. 매끄럽고 둥근 표면과 정교하게 양식화된 인물 형상이 특징이며, 밀랍 주조법이 발달하였음을 보여주고 있다. 1890년 팔란디아 인근에서 처음 발견되었으며 1893년 콜롬비아 정부에서 스페인의 섭정 왕비 마리아 크리스티나에게 선물하였다."
 lepsius.2275.g: "이렇게 많은 황금은 처음 보는군!"
 lepsius.2201.t: "한나라 고분 벽화"
 lepsius.2201.d: "한나라 시대의 고위 관리의 고분 발굴로 당시 사람들의 삶과 일상 생활에 대한 통찰력을 얻는 계기가 마련되었다."
 lepsius.2201.f: "한나라의 유물이라면 그 존재가 알려진 것이 많지만, 20세기 초 한나라 채색 고분의 발견은 서기 2세기부터 봉인되었던 방대한 규모의 벽화들을 세상에 알렸다. 이 고분 벽화는 화려한 연회와 곡예, 마차 행렬 등 한대 사람들의 일상 생활을 생생하게 묘사하고 있다. 이는 한나라가 당나라 시대의 훨씬 이전부터 정교한 원근법과 서사적 회화를 발전시켜왔음을 보여주고 있다. 적색, 황토색, 검은색 등의 선명한 색소는 초창기 중국화의 가장 잘 보존된 사례로 꼽히는 계기가 되었다."
 lepsius.2201.g: "지금껏 우리가 알고 있던 한나라 사회에 대한 지식은 충분치 않았나 보군."
 lepsius.2202.t: "한나라 칠기"
 lepsius.2202.d: "고고학계에서 최근 발굴 작업을 통해 수많은 칠기 유물을 발견하였다."
 lepsius.2202.f: "칠기는 수천 년 전부터 사용되어 왔지만 한나라(기원전 206년~서기 220년) 대에 이르러 국가가 관리하는 대규모 산업으로 발전하기에 이르렀다. 20세기 초 오늘날 북한 지역에 위치한 낙랑군 등의 북방 군현에서 주요 발굴을 통해 칠기의 놀라운 내구성과 예술성이 모습을 드러내었다. 칠기는 열과 습기, 부식에 강하여 한나라 조정에서 청동보다 훨씬 귀하게 여겨졌다. 술잔과 수반함, 화려한 관에 이르기까지 여러 품목에 걸쳐 활용된 한나라의 칠기는 대체로 선명한 적흑 바탕에 구름 같이 유려한 두루마리 무늬와 신화 속 동물들을 그려넣은 것이 특징이다."
 lepsius.2202.g: "추후 전시에 선보일 유물이 생겼군."
 lepsius.2203.t: "한나라 토우"
 lepsius.2203.d: "어느 고분을 발굴하는 과정에서 수많은 부장품이 발견됐다. 특히 도자기 유물이 많아 부장자가 상당히 부유했음을 시사하고 있다. 그 중에서도 인형과 조그마한 집 모형이 발굴단의 눈길을 사로잡았다."
 lepsius.2203.f: "한나라의 토우는 명기(冥器)이라 부르는 토우는 궁중의 무용수와 보병부터 주택과 곡식 창고, 망루를 정교하게 축소해 만든 모형에 이르기까지 그 면모도 다양하다. 당시 고고학자들에게 이러한 건축 모형은 현실에서 오래 전에 소실된 한나라 양식의 목조 건축을 보여주는 유일한 단서라는 점에서 몹시 귀중한 자료가 아닐 수 없었다. 이러한 토우는 한나라 시대의 풍경을 완벽하게 축소해 놓은 것으로 평가되었으며, 사후세계로 간 죽은 자를 위해 가축과 부엌, 오락거리까지 갖춘 완벽한 저택을 선사하기 위함이었다."
 lepsius.2203.g: "이걸로 장안 시를 모형으로 복원할 수 있지 않겠소?"
 lepsius.2204.t: "한나라 청동기"
 lepsius.2204.d: "최근 발굴 작업에서 고고학자들이 한나라 시대의 청동기 유물을 대량으로 발굴하였다. 연구진들은 특히 아름다운 장식을 뽐내는 청동 솥 '정'(鼎)에 관심을 보였다."
 lepsius.2204.f: "19세기 말에서 20세기 초에 발견된 한나라의 청동 유물은 당대에 제례와 일상 생활 모두에게서 요구되는 금속 제련 기술이 완벽한 수준으로 발달하였음을 보여주고 있다. 중국 북부와 간쑤성 일대의 변경지역에서 주로 발견된 이 청동 유물군은 2천 년 동안 묻혀 있던 정교한 향로, 청동 거울, 그릇 등을 아우르고 있다. 이것들을 대표할 만한 유물로는 청동 향로 '박산로'(博山爐)가 꼽히는데 신선이 산다는 안개 속의 산을 형상화한 것이다. 당시 학계에서는 한나라 무덤에서 발견된 거대한 청동 등잔과 술잔(호, 壺)로 보건대, 철기 시대에 이른 후에도 청동기가 여전히 높은 신분의 상징으로 남아있었음을 입증한다고 여겼다."
 lepsius.2204.g: "우리 박물관에 들일 근사한 유물일세."
 lepsius.2211.t: "신라 월지 유물"
 lepsius.2211.d: "통일신라 시대로 거슬러 올라가는 고궁 주변의 연못에서 물을 빼낸 결과, 그 시대의 수많은 유물들이 진흙 속에서 발견되었다."
 lepsius.2211.f: "무덤에서 발견되는 엄숙한 제물과는 달리 월지의 진흙 속에서 출토된 유물들은 대부분 궁궐 사람들의 일상생활과 성대한 연회에 쓰였던 물건들이었다. 이번에 발견된 것 중에서 특히나 흥미로웠던 유물로는 금박을 입힌 청동 불상(금동불상), 화려한 기와 장식(와당), 왕실 연회에서 사용됐던 독특한 목제 주사위(주령구)가 있었다. 이러한 유물들은 극도로 사치스럽고 예술적으로 세련된 생활방식을 보여주고 있다. 또한 실크로드의 대표 종점으로서 신라의 역할이 반영되어 있으며, 당나라는 물론 저 멀리 페르시아의 예술적 영향까지 엿볼 수 있다."
 lepsius.2211.g: "황금시대의 잔존물이로군."
 lepsius.2212.t: "신라 동전 매장지"
 lepsius.2212.d: "고고학자들이 한국의 어느 지방 도시에서 엄청난 양의 동전 더미를 우연에 가깝게 발견하였다. 이 동전은 통일 신라의 이웃 국가였던 중국 당나라 시대의 것이 주를 이루고 있었다."
 lepsius.2212.f: "고대 한반도에서는 주로 직물과 곡식을 비롯한 상품이나 단도 형태의 동전을 교역하였다. 하지만 외국의 동전을 사용했다는 기록이 자주 발견된다. 신라와 이웃한 대표적인 강대국이었던 중국은 화폐 제도, 특히 한대 이후에 발행된 오수전(五銖錢)을 통해 주변국에 상당한 영향력을 행사했으며, 이후 당나라의 개원통보(開元通寶)가 그 뒤를 이었다. 실크로드의 일환으로 막대한 양의 중국 동전이 국제 무역을 통해 한반도로 유입되었던 것이다."
 lepsius.2212.g: "한반도건 중국이건 이 동전들은... 우리 것이다."
 lepsius.2213.t: "신라의 목판 인쇄술"
 lepsius.2213.d: "석가탑 내부의 고고학 조사에 나선 연구원들이 여러 권의 불경을 발견했다. 이 불경의 제작연대는 신라시대로 거슬러 올라가며 목판 인쇄술로 제작된 것으로 추정된다."
 lepsius.2213.f: "이 불경은 신라가 일찍이 8세기부터 목판 인쇄술을 보유하고 있었음을 증명하며, 대량 인쇄의 이론적 가능성을 제시하였다. 따라서 학계의 입장에서 이 불경은 귀중한 불교 문헌일 뿐만 아니라 신라 사회가 예상 밖을 뛰어넘는 수준의 기술 발전을 이룩했다는 증거이기도 하다."
 lepsius.2213.g: "정말 흥미롭군!"
 lepsius.2214.t: "석굴암"
 lepsius.2214.d: "어느 우체부가 고대의 수도 경주 인근에서 놀라운 발견을 했다고 고고학 연구소를 찾아 알렸다. 이번 발견은 신라 시대를 처음부터 다시 조명하는 계기를 마련했다."
 lepsius.2214.f: "불국사 경내에 자리한 암자인 석굴암은 1909년 폭우를 피해 숨어든 우체부가 발견하여 다시 그 존재를 세상에 알렸다. 석굴암은 경주 토함산에 위치한 인공 화강암 석굴로서 통일신라 시대인 8세기에 건립되었으며, 수백 년 동안 흙과 잔해에 묻혀 그 일부가 무너진 상태로 잊혀졌다. 석굴암은 동양 불교 미술의 걸작으로 꼽히며, 평온하면서도 거대한 본존불(本尊佛)을 중심으로 정교하게 조각된 십대제자(十大弟子)와 팔부신장(八部神將)의 부조가 둘러싸고 있다. 20세기 초 석굴암은 일제강점기 고고학의 집중적인 관심 대상으로 떠올랐다. 당시 학자들과 기술자들은 온도와 습도의 유지를 위해 독특한 원형 천장 구조를 활용한 정교한 건축 설계에 매혹되었다고 전한다."
 lepsius.2214.g: "신라 시대의 보배일세."
 lepsius.2221.t: "하니와 인형"
 lepsius.2221.d: "최근 발굴 조사를 통해 고분 입구를 지키던 무수히 많은 도자기 인형이 출토되었다. 점토로 만든 이 인형들은 극히 깨지기 쉬운 재질을 지니고 있다."
 lepsius.2221.f: "하니와 인형은 야마토(고분) 시대에 제작된 독특한 토기 조각상으로, 유약을 바르지 않고 제작하여 거대한 고분 위나 주변에 둔 것이 특징이다. 토기 인형으로서 무덤의 신성한 공간을 지키는 수문장 역할을 하였던 것이다. 서기 3세기에서 6세기 경에 발전한 하니와는 단순 원통형 항아리에서 시작하여 고인의 사회, 물질 세계 전반을 대변하는 복잡한 형상으로 진화하였다. 하니와는 일본 고고학계에서 과학적 분류에 나선 최초의 유물로도 꼽힌다."
 lepsius.2221.g: "한때 고분을 지키던 것들이 이제는 박물관을 장식하게 되었구려."
 lepsius.2222.t: "곡옥"
 lepsius.2222.d: "우리 고고학 조사단이 야마토 시대의 소형 곡옥을 대량 발굴해냈다."
 lepsius.2222.f: "곡옥(曲玉)은 곡선형의 쉼표 형태를 띈 구슬로서 일본 야마토(고분) 시대를 대표하는 장신구로 꼽힌다. 비취, 벽옥, 연옥, 홍옥 등의 보석으로 제작되었으며 당시 부유층의 신분을 나타내는 상징이자 강력한 부적으로 몹시 귀중히 여겨졌다. 거대한 열쇠구멍 형태의 고분에서 곡옥이 발견되면서 일본 문화의 기원에 대한 고고학계의 관심도 늘어났다. 당시 일본 학계에서는 이 곡옥이 한반도의 신라와 가야에서 발견된 것과 놀라울 정도로 유사하다는 점에 주목하였다. 곡옥은 미적 가치 뿐만 아니라 일본의 국민 의식 속에서 신성한 지위를 유지하였다. 일본 황실의 3대 보물, 즉 삼종신기의 하나로서 고대 유적지에서 곡옥이 발견되는 것은 야마토 왕조의 신성한 혈통과 깊이 연관되어 있는 것으로 여겨졌던 것이다."
 lepsius.2222.g: "나도 하나 가져도 되겠소?"
 lepsius.2223.t: "야마토 시대의 갑옷과 무기"
 lepsius.2223.d: "고고학계에서 한때 전쟁터였던 곳으로 추정되는 발굴지에서 야마토 시대의 검과 갑옷을 발견하였다. 특히 무사가 입던 단갑(短甲)이 상당히 잘 보존된 상태로 출토되었다."
 lepsius.2223.f: "야마토 시대는 군사력의 증강과 확대가 활발했던 시기로, 철기 선진 기술이 널리 보급된 것도 또 하나의 특징이다. 실제로 고분 발굴 과정에서 직도(直刀), 화살촉, 정교한 판갑옷 등 방대한 양의 군용 장비가 출토되었다. 야마토 시대의 갑옷은 크게 두 가지 유형으로 나뉘는데, 하나는 여러 장의 철판을 가죽끈으로 연결해 만든 튼튼한 철제 흉갑인 단갑(短甲, 탄코)이었고, 다른 하나는 기마병에 알맞게 설계된 유연한 판갑인 괘갑(掛甲)이다."
 lepsius.2223.g: "일본은 예로부터 우수한 군사 기술을 갖추고 있었군."
 lepsius.2224.t: "야마토 시대의 청동 거울"
 lepsius.2224.d: "고고학계에서 수많은 부장품을 발견했는데, 그 중에서 청동 거울은 야마토 시대의 영광을 보여주는 대표 유물로 꼽히고 있다."
 lepsius.2224.f: "Bronze mirrors, or Shinju-kyo, are among the most spiritually significant artifacts recovered from Yamato-period Kofun tombs. Often found placed near the head or chest of the deceased, these mirrors were revered as sacred ritual objects capable of reflecting and capturing light—a property associated with divine authority and the sun goddess Amaterasu. Many mirrors discovered in Japan were identified as 'Deity and Beast' mirrors imported from the Chinese Wei Dynasty, while others were local Japanese imitations known as Bosei-kyo. For historians of the Meiji and Taisho eras, the distribution of these mirrors served as a political map of ancient Japan; the discovery of identical mirrors in geographically distant tombs suggested that the Yamato court distributed these precious objects to local chieftains as symbols of a unified political alliance."
 lepsius.2224.g: "일본의 옛 모습을 비추는 거울이로구나."
 lepsius.2231.t: "Indus Ceramics"
 lepsius.2231.d: "Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] announced today that a cache of numerous ceramic finds was discovered in the Indus Valley."
 lepsius.2231.f: "The potters of the Indus Valley Civilization were already using highly developed, high-speed pottery wheels over 4,000 years ago. Particularly striking is the so-called 'Black-on-Red Ware': vessels coated with a deep red clay slip and then painted with fine, black pigments. The motifs are either strictly geometric or depict the rich flora and fauna of the subcontinen - from peacocks to the characteristic pipal leaves. The vast quantities of these durable artifacts provided the primary evidence for the urbanization of the Indus basin, proving that a complex, standardized society had flourished long before the recorded history of the subcontinent began."
 lepsius.2231.g: "Now it's time to piece together the fragments."
 lepsius.2232.t: "Indus Beads"
 lepsius.2232.d: "A team of archaeologists led by Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] today secured a valuable find in an ancient Indus settlement, confirming the craftsmanship of the Harappan civilization."
 lepsius.2232.f: "The discovery of intricate jewelry and beadwork provided some of the most compelling evidence for the immense wealth and specialized craftsmanship of the Indus Valley Civilization. These ornaments were fashioned from a diverse array of materials, including gold, silver, lapis lazuli, turquoise, and various forms of terracotta. However, it was the production of long, carnelian beads that stood as the hallmark of Harappan technical mastery. Archaeologists were struck by the precision with which these hard stones were drilled and etched with delicate white alkali patterns, a process that required highly specialized kilns and copper-alloy drills. Beyond their aesthetic appeal, these jewelry finds offered vital clues regarding the extensive maritime and overland trade networks of the Bronze Age. The presence of unmistakable Harappan bead styles in the royal burials of Mesopotamian city-states further confirmed the subcontinent's role as a primary exporter of luxury goods."
 lepsius.2232.g: "This ancient culture had far-reaching trade relations!"
 lepsius.2233.t: "Indus Script"
 lepsius.2233.d: "Archaeologists have found several seals with writing in what appears to have been a warehouse of the Indus Valley Civilization. However, Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] has so far been unable to decipher the writing."
 lepsius.2233.f: "The recovery of small, square steatite seals remains the most enigmatic discovery of the Indus Valley excavations. These artifacts were typically carved in intaglio with exquisite depictions of animals—most notably the 'unicorn' bull, elephants, and rhinoceroses—surmounted by a series of standardized symbols known as the Indus script. Their discovery in large quantities within warehouse districts suggested that they functioned as official markers of ownership or authority, used to impress clay tags on trade goods destined for local and foreign markets. The brevity and recurring nature of the inscriptions led scholars to conclude that the script likely represented names, titles, or bureaucratic notations rather than long narrative texts. Despite rigorous linguistic analysis, the underlying language remained a subject of intense debate."
 lepsius.2233.g: "Writing and language will remain a mystery to future generations."
 lepsius.2234.t: "Indus Contact with Mesopotamia"
 lepsius.2234.d: "Farmers informed the Archaeological Institute about ancient structures in the suspected area of the Harappan civilization. Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] made a surprising discovery there: cylindrical seals from Mesopotamia!"
 lepsius.2234.f: "The unearthing of distinctively Near Eastern artifacts within the ruins of Harappa and Mohenjo-Daro provided the first definitive archaeological proof of direct contact between the Indus Valley and the civilizations of Mesopotamia. Among the most significant finds were cylindrical seals, which contrasted sharply with the square, flat stamp seals native to the Indus basin. These imported objects, typically crafted from stones like hematite or lapis lazuli, featured the narrative and mythological iconography characteristic of the Akkadian and Sumerian city-states. Beyond the seals, archaeologists identified several specific luxury items, including fragments of 'Persian Gulf' style pottery and certain types of cast bronze weaponry that originated in the west."
 lepsius.2234.g: "Mesopotamian artifacts? Here? We don't even need to send an expedition?"
