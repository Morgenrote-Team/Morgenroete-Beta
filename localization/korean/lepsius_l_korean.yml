 lepsius_antiquarianism_tech: "골동품 연구"
 lepsius_antiquarianism_tech_desc: "이탈리아 르네상스 시대부터 보물 수집가들은 옛날 것에 관심을 가져왔습니다. 요한 요아힘 빈켈만이 고대 로마와 그리스에 대한 관심을 불러일으키는가 하면, 나폴레옹의 탐사대는  이집트를 오랜 고요 속에서 깨워냈습니다. 이러한 진전도 있었지만, 고고학 이전의 탐사라는 것은 연구 방식이 보물 찾기와 무덤 강탈의 경계를 오갔던 조반니 바티스타 벨조니의 사례처럼 모험가의 손에 맡겨져 왔습니다."
 lepsius_early_archaeology_tech: "초창기 고고학"
 lepsius_early_archaeology_tech_desc: "샹폴리옹의 사전 연구가 이뤄진 이래, 카를 리하르트 렙시우스가 이집트 상형문자를 완전히 해독하는 데 성공하였습니다. 고고학회와 연구소, 박물관을 중심으로 새로운 과학 문화를 조성하는 계기로서, 고고학계의 풍경 변화를 대표하는 사건이 된 것입니다. 그럼에도 유물보존학의 창시자로 평가받는 오귀스트 마리에트는 세라페이온 신전이 발견되자 주저 없이 폭발물을 사용하여 파헤치기도 하였습니다."
 lepsius_modern_archaeology_tech: "근대 고고학"
 lepsius_modern_archaeology_tech_desc: "19세기 후반에 이르러 고고학의 현장조사 방식은 더욱 발전했습니다. 이 분야의 선구자로 평가받는 오거스터스 피트 리버스는 영국 남부 크랜본 체이스에서 세심한 발굴 조사를 진행하며, 아름답거나 가치 있는 유물뿐만 아니라 일상적인 유물도 기록으로 남겨야 한다고 강조했습니다. 한편 플린더스 페트리는 고고학과 유물보존학에 체계적인 방법론을 도입했습니다."
 excavation_license: "발굴 허가"
 excavation_license_desc: "특정 국가의 한 지방에 접근하여 고고학 탐사와 발굴 조사를 진행할 수 있도록 허가를 받는 외교적 조치입니다."
