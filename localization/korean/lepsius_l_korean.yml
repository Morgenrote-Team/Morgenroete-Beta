 lepsius.1601.t: "[SCOPE.sCharacter('lepsius_donator_scope').GetLastName]의 기증"
 lepsius.1601.d: "[SCOPE.sCharacter('lepsius_donator_scope').GetFullName](은)는 희귀한 이집트 유물을 수집하는 것으로 익히 알려져 있다. 이집트학에 대한 관심이 이제는 놀라운 수준의 소장품 규모에 다다르게 만든 것이다. 그리고 본인의 귀중한 유물들을 고고학 박물관에 기증하겠다고 거리낌 없이 제안해 왔다."
 lepsius.1602.d: "[SCOPE.sCharacter('lepsius_donator_scope').GetFullName](이)가 민간에서 보유한 메소포타미아 유물 소장품 가운데 가장 뛰어난 수준에 등극했다는 사실은 널리 알려져 있다. 정부 측에 자신의 소장품을 국가 소유로 이관하겠다는 의사를 밝혀 왓지만, 일각에서는 비판적인 시선에서 그 대가로 무언가 요구할 수도 있다는 경고를 남겼다."
 lepsius.1603.d: "[SCOPE.sCharacter('lepsius_donator_scope').GetFullName](은)는 최고의 예술애호가는 아닐지는 몰라도, 본인 사유지에서 매우 귀한 유물들을 운 좋게 발견하고 수년 동안 잘 간직해 왔다. 다만 이 유물들을 자신이 어떻게 할 수 있는 형편이 되지 않아 정부에 고고학 박물관 기증을 제안해 왔다."
 lepsius.1604.d: "[SCOPE.sCharacter('lepsius_donator_scope').GetFullName](은)는 최근 몇 년 동안 남아메리카를 여러 차례 여행하며 메소아메리카와 안데스 문명의 중요한 유물들을 기념으로 수집해 왔다. 이제 그 유물들을 박물관에 기증하고 싶다고 전해 왔다."
 lepsius.1605.d: "[SCOPE.sCharacter('lepsius_donator_scope').GetFullName](은)는 고대 에게해 문명에 깊은 감명을 받고, 몇 년 동안 크레타섬에서 유물을 수집해 왔다. 심지어는 미노아 문명의 벽화를 통째로 자신의 별장에 들여 오기도 했다. 그러나 사회적 책임을 인식하여 자신의 소중한 보물들을 [ROOT.GetCountry.GetAdjectiveNoFlag] 국민들에게 환원하겠다는 결정을 내렸다."
 lepsius.1601.f: "고고학 소장품 대다수의 기원은 르네상스 시대 군주들이 상인들을 통해 오래된 예술품을 수집하던 것으로 거슬러 올라간다. 1824년 사르데냐의 샤를 펠릭스 국왕은 프랑스 총영사 베르나르디노 드로베티가 이집트 체류 기간 동안 수집한 일명 '드로베티 컬렉션'을 매입하였다. 당시 이 소장품의 규모는 조각상 100점, 파피루스 170점, 비석과 미라 등을 전부 포함해 총 5,268점에 달했으며, 훗날 토리노 이집트 박물관의 기반을 이루는 소장품이 되었다. 부유한 사업가와 명망 높은 고위층도 본인의 지위를 드러낼 만한 유물 수집에 관심을 가졌으며, 유언에 따라 이를 사회에 기증하는 경우가 많았다. 이러한 기증을 통해 본인의 명성을 높이고 사회적 지위를 향상시키려는 사례가 많았던 것이다."
 lepsius.1601.g: "우리 박물관에 근사한 기증품이 되겠군!"
 lepsius.1601.h: "아첨꾼 같은 자가 제 이득 취하기 바쁘군."
 lepsius.1606.t: "이집토마니아"
 lepsius.1606.d: "이집트를 향한 열정을 가진 사람들이 한데 모였다. 이 모임을 이끄는 사람은 [SCOPE.sCharacter('lepsius_esoteric_leader').GetFullName]이다. 일각에서는 고대 이집트에 대한 광적인 찬미에 공감하지 못하는 모양새지만, 그런 모습 자체로 나름의 이점을 가져다줄지 모른다."
 lepsius.1606.f: "19세기는 여러 면에서 진보적이고 과학적인 정신이 지배하던 시대로 여겨지지만, 오컬트와 유사과학 현상이 여러 형태로 널리 퍼진 것도 바로 이 시대에 해당된다. 그 중에 가장 대표적인 것은 영혼의 존재를 증명하려 했던 영매주의다. 고고학 연구는 그릇된 이론을 여럿 낳았을 뿐만 아니라, 범바빌론주의, 마야니즘, 아틀란티스 실존설과 같은 유사과학적이고 비결적인 운동에도 큰 영향을 끼쳤다. 이런 현상들은 과학에 해를 끼치는 경우가 많았지만, 일부 사례의 경우 유행을 타고 과학 연구를 대중화하여 부작용이 상당히 유익한 모습으로 다가오기도 하였다."
 lepsius.1606.g: "저들만의 작은 교단에 빠져 살도록 놔둡시다."
 lepsius.1606.h: "이런 허튼소리는 금지해야 한다."
 lepsius.1607.t: "마야니즘"
 lepsius.1607.d: "국내 일부 고위층들이 마야 문명까지 거슬러 올라가는 옛 달력에 온 세계가 따르고 있다는 이상한 오해에 빠져 있다. 더군다나 마야 문명이 우주의 비밀에 관한 지식을 간직하고 있었다고 믿는 모양이다. 이런 터무니 없는 생각들을 그저 웃고 넘길 수만 없는 이유는, 그런 영향력 있는 집단을 다름아닌 [SCOPE.sCharacter('lepsius_esoteric_leader').GetFullName](이)가 이끌고 있다는 사실이다."
 lepsius.1608.t: "범바빌론주의"
 lepsius.1608.d: "어느 모임에서 모든 지식은 바빌론에서 비롯되었으며, 심지어 유대교와 기독교조차도 바빌론 신앙의 모방에 불과하다고 주장하여 사회와 학계에 파장을 일으키고 있다. 이러한 사상을 퍼뜨리려는 '범바빌론주의 클럽'에 [SCOPE.sCharacter('lepsius_esoteric_leader').GetFullName]도 참여하고 있다는 점이 문제다."
 lepsius.1608.g: "이건 유사과학이 아닌가!"
 lepsius.1608.h: "아무렴 그렇지."
 lepsius.1609.t: "아틀란티스주의"
 lepsius.1609.d: "[SCOPE.sCharacter('lepsius_esoteric_leader').GetFullName](이)가 신비주의 유사과학 모임을 이끌고 있다는 소식이다. 이 모임은 아틀란티스가 신화가 아니라 빙하기에 첨단 기술을 보유했던 실존 도시였다고 주장하고 있다. 더 나아가 모든 문명이 아틀란티스에서 비롯됐다고 주장하며, 매주 강령회를 통해 아틀란티스인들의 영혼과 이야기를 나누려 한다."
 lepsius.1609.h: "이것이 사실인지 단순한 전설인지 누가 알겠소?"
 lepsius.1609.i: "아틀란티스의 존재를 뒷받침할 확실한 증거가 있다."
 lepsius.1610.t: "고고학계 투자"
 lepsius.1610.d: "고고학 박물관장이 새로운 전공자 양성을 지원하자고 제안해 왔다. 다만 이를 위해서는 추가 예산을 동원해야 한다."
 lepsius.1610.f: "박물관 측에서 최근 정부가 국내 고고학 진흥에 특히 관심을 갖고 있다는 소식을 접했다. 추가 예산을 지원하면 유망한 신진 연구원들을 모집하는 데 보탬이 될 것이다."
 lepsius.1610.g: "박물관에 추가 재정 지원을 제공하시오."
 lepsius.1610.h: "그럴 가치는 없어 보인다."
 lepsius.1611.t: "박물관 입장료"
 lepsius.1611.d: "박물관에서 늘어나는 운영비를 감당하기 위해 입장료를 인상할 수밖에 없는 상황에 놓였다. 추가 수익은 국가에서 환수할 수도 있다. 그러나 이렇게 되면 조국의 위신에 다소 부정적인 영향을 미칠 수도 있다."
 lepsius.1611.f: "'입장권 매진!'"
 lepsius.1611.g: "입장료를 인상한다."
 lepsius.1611.h: "입장료를 인하한다."
 lepsius.1611.i: "입장권이라니? 박물관 입장은 무료로 해야지!"
 lepsius.1612.t: "[SCOPE.sCharacter('lepsius_director_scope').GetLastName] 관장의 유산"
 lepsius.1612.d: "최근 세상을 떠난 [SCOPE.sCharacter('lepsius_director_scope').GetLastName] 박물관장은 학계의 뛰어난 명성을 누리며 존경받는 인물이었다. 그러나 최근 발견으로 그의 업적에 오점을 남길 상황이 되고 말았다."
 lepsius.1612.f: "조사 결과 [SCOPE.sCharacter('lepsius_director_scope').GetFullName] 관장은 재임 기간 동안 익명의 개인들로부터 수차례 기증품을 전달받았음에도 이를 박물관에 이관하지 않고 개인적으로 간직했던 것으로 드러났다. 비록 기증품의 수는 적지만, 그 가치는 결코 적잖은 상황이다. 이것으로 지식인 세력 전체가 심각한 스캔들에 휘말릴 위기에 처했다."
 lepsius.1612.g: "진실은 밝히는 것이 마땅하다!"
 lepsius.1612.h: "[SCOPE.sCharacter('lepsius_director_scope').GetFullName]의 명예를 지키는 것이 좋겠다."
 je_lepsius_pompeii: "폼페이의 근대적인 발굴"
 je_lepsius_pompeii_reason: "고대 로마 도시 폼페이는 서기 79년 베수비우스 화산의 분화로 땅 속에 파묻힌 이래 18세기부터 발굴이 이루어지고 있다. 그러나 이런 발굴은 여러 면에서 도굴에 가깝다고 볼 수 있는데, 예술품을 얻기 위해 과학적 자료를 파괴하거나, 무지에서 비롯된 그릇된 판단으로 귀한 유물을 훼손하는 사례가 많았기 때문이다. 새로운 고고학 발굴 기법을 활용하면 폼페이 연구를 상당 수준 개선할 수 있을 것이다."
 je_lepsius_teotihuacan: "테오티우아칸"
 je_lepsius_teotihuacan_reason: "테오티우아칸은 이미 아즈텍인들에게도 오래전부터 신비로운 터전으로 여겨졌으며, 자신들이 지배하기 전에 존재했던 곳으로 신들의 탄생지라고 믿었다. 실제로 테오티우아칸이 아즈텍 제국보다 수백 년 앞서 중앙아메리카에 영향을 끼쳤던 고대 도시이며, 콜럼버스 이전 시대에 아메리카 대륙에서 가장 큰 유적지 중 하나라는 것을 시사하는 단서들이 많다. 그렇기에 멕시코 정부가 이곳을 더욱 자세히 연구해야 할 이유가 단순히 학술적인 배경에 그치지는 않는다. 테오티우아칸은 멕시코의 유구한 문화를 상징하며, 나아가 우리나라의 선대 격으로 볼 수 있다. 부분 파괴된 테오티우아칸의 태양 피라미드를 독립 100주년을 앞두고 복원하는 것은 이러한 상징성을 강조하고 국가 통합과 역사를 기리기 위한 것이다."
 je_lepsius_harappa: "인더스 계곡 문명"
 je_lepsius_harappa_reason: "하라파의 유적지는 오래 전부터 알려져 있었고, 1844년 찰스 매슨의 〈발루치스탄, 아프가니스탄, 펀자브 여행기〉에서 '폐허가 된 벽돌 요새'라 처음 기록하기도 하였지만 그곳이 얼마나 중요한가는 아직 완전히 밝혀지지 않았다. 어쩌면 인도에도 과거에 전혀 알려지지 않았던 고고학적 보물이 더 묻혀 있을지도 모른다."
 je_lepsius_first_emperor: "진시황릉"
 je_lepsius_first_emperor_reason: "중국은 고고학 분야에서 아직 역사가 짧은 나라다. 우리 연구진들은 지식 증진을 위해 세계로 나가 경험을 쌓아야 한다. 충분한 성과를 거두고 학자들을 잘 양성해야 비로소 우리는 고고학계 최대의 모험에 나설 수 있을 것이다. 그것은 이름하여 아무도 감히 발굴을 시도하지 못한 진시황릉이다."
 lepsius.7.t: "폼페이 발굴"
 lepsius.7.d: "폼페이에서 [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] 교수의 지도 하에 새로운 학술 연구 방식을 시험해볼 전망이다. 이는 폼페이 발굴 역사에 있어 중대 전환점이 될 것이다. 다만 연구의 초점을 무엇으로 할 것인가는 아직 결정되지 않았다."
 lepsius.7.f: "주세페 피오렐리의 발굴 조사는 폼페이 연구와 발굴에 새로운 기틀을 마련했다. 초기 발굴 과정에서 화산재층 곳곳에 사람의 유해가 담긴 빈 공간이 발견되었다. 피오렐리는 이 공간이 분해된 유해가 남긴 흔적임을 깨닫고, 석고를 주입하여 베수비오 화산 폭발 희생자들의 형상을 복원하는 기법을 고안해냈다. 이 기법은 오늘날에도 여전히 사용되고 있으며, 현재는 석고보다 내구성이 뛰어나고 유해를 손상시키지 않아 추가 분석이 가능한 투명 수지가 사용되고 있다. 피오렐리는 과학적 기록 방식도 도입하였는데, 폼페이 시를 지금의 아홉 구역으로 나누고 각 가옥의 입구마다 번호를 매겼다. 피오렐리는 발굴 보고서를 담은 최초의 정기 간행물도 발행하였다. 그리고 피오렐리의 후임자들이 폼페이 시의 서쪽 전 구역을 발굴하기에 이르렀다."
 lepsius.7.g: "우리는 유물에 큰 관심을 두고 있다."
 lepsius.7.h: "과거의 실상을 더욱 알아내야 한다."
 lepsius.7.i: "차세대 학자들을 양성하고 싶다."
 lepsius.8.t: "테오티우아칸의 태양의 피라미드"
 lepsius.8.d: "[SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName](은)는 복원된 피라미드의 최상층부에서 테오티우아칸의 전경을 바라보았다. 그 자체로 영예로운 복원 사업은 중대 고비를 넘겼지만 발굴 작업이 조국에 구체적으로 어떤 이득을 가져다줄지는 아직 미지수다."
 lepsius.8.f: "멕시코 중앙고원에 위치한 테오티우아칸은 아메리카 대륙에서 가장 중요한 선사시대 유적 도시 중 하나로, 태양의 대피라미드처럼 계단식 신전이 들어선 곳으로 유명하다. 테오티우아칸 구역은 기원전 6세기부터 사람이 거주해 왔다. 서기 100년에서 650년 사이에는 메소아메리카의 문화, 경제, 군사 중심지로서 막강한 영향력을 행사하였다. 전성기에는 시민 수가 20만 명에 달했을 것으로 추정된다. 당대 아메리카 대륙 최대의 도시이자 세계적으로도 손꼽히는 도시였다. 서기 650년경부터 원래 지위를 잃기 시작한 테오티우아칸은 750년경부터 거의 버려진 상태가 되었는데 그 원인에 대해서는 아직 완전히 알려지지 않았다. 그러나 테오티우아칸의 문화적 영향은 스페인의 멕시코 정복 이전까지 멕시코 중앙 지역에 계속해서 영향을 끼쳤다."
 lepsius.9.t: "미지의 문명"
 lepsius.9.d: "[SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName](은)는 수천년 전 인더스 계곡에 정착하였으나 지금껏 전혀 알려지지 않았던 문명의 흔적을 발견하고 경악하였다. 이집트나 바빌론처럼 이곳도 문명의 요람이었을 가능성이 생긴 것이다. 앞으로 수십년에 걸쳐 연구할 필요가 있겠지만, 그 우선순위를 무엇에 두는 것이 좋을까? "
 lepsius.9.f: "청동기 시대의 인더스강 문명, 이른바 인더스 문명 내지는 하라파 문명은 가장 오래된 도시 문명으로 꼽힌다. 인더스 문명은 기원전 2800년경부터 기원전 1800년경까지 인도 아대륙 북서부의 인더스강 유역에 존재하였다. 인더스 문명은 현재 파키스탄의 거의 전 지역과 인도, 아프가니스탄 일부 지역에 걸쳐 있었다. 1912년 J. 플리트는 영국령 인도에서 알 수 없는 문자가 새겨진 인장을 발견하여 유럽 학계의 관심을 불러일으켰다. 이후 1921년~1922년 당시 영국 유물관리국장이었던 존 마셜의 주도로 하라파와 모헨조다로에서 발굴 조사가 실시되었다. 두 도시를 발굴한 결과가 유사하다는 점에서 과거에는 알려지지 않았던 고도로 발달한 문명이 존재했음이 곧바로 드러나게 되었다."
 lepsius.70.t: "병마용"
 lepsius.70.d: "[SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName](은)는 진시황릉 주변 지역을 조사하던 중 놀라운 발견을 하기에 이르렀다. 토용으로 만든 군대가 오늘날까지도 시황제를 지키고 있던 것이었다."
 lepsius.70.f: "\"9월, 시황제를 여산(酈山)에 매장했다. 시황제가 처음 즉위했을 때 여산을 공사했고, 천하를 통일하자 전국의 죄수 70만여 명에게 지하수가 3번 돌 정도로 구덩이를 깊게 파게 하고 구리를 부어 외곽을 만들었다. 궁궐과 여러 관리, 진기한 보물들을 가득 매장했다. 장인에게 기계 쇠뇌를 만들게 하여, 접근하는 자가 있으면 그를 쏘게 했다. 수은으로 여러 개울, 강과 바다를 만들고, 기계로 수은을 주입했다. 위로는 하늘의 모습을, 아래로는 땅의 형상을 갖추었다. 인어의 기름으로 초를 만들어, 영구히 꺼지지 않게 했다.\" - 사마천"
 lepsius.70.g: "중국의 오랜 위대함은 실로 경이롭도다."
 lepsius.61.t: "[SCOPE.sState('lepsius_excavation_state').GetName] 발굴 조사"
 lepsius.61.d: "[SCOPE.sState('lepsius_excavation_state').GetName] 지역을 점령하는 과정에서 우리는 고고학 발굴단 인력과 유물들을 접수하게 되었다. 고고학자들은 학술 연구를 방해하지 말고 발굴지를 보존해야 한다고 주장하였다. 그러나 일부 장교들은 유물 약탈에 나서자고 목소리를 높이고 있다."
 lepsius.61.f: "안타깝게도 중요한 발굴지를 약탈하는 일은 서슴잖게 벌어졌다. 현장에 진격한 군대가 예술품을 보존하고 보호한다는 명성에 걸맞지 않은 사례가 종종 있어왔던 것이다. 어떤 경우에는 약탈품을 더 손에 넣을 것이란 기대감에 야심 찬 자들이 탐욕에 눈이 멀기도 한다. 고대 로마의 술라 황제 대에도 그랬던 일이 오늘날이라고 다르겠는가?"
 lepsius.61.g: "발굴지를 약탈하라!"
 lepsius.61.h: "발굴지를 보존하라."
 lepsius.62.t: "발굴지 약탈!"
 lepsius.62.d: "발굴 조사에 나섰던 국가에서 전쟁이 벌어져 유적지가 파괴되고 말았다. 적군은 발굴지를 점령하고 우리 발굴단이 발견한 유물들을 무단 약탈해 갔으며, 현장은 쑥대밭이 되고 말았다."
 lepsius.62.f: "고고학 발굴지는 전쟁과 파괴 행위의 희생양이 될 수 있다. 이는 어느 나라에도 속하지 않은 중립국 출신 발굴단에게도 영향을 끼친다. 약탈을 일삼는 국가들은 아직 본국으로 건너가지 않은 유물들을 마음대로 가져갈 수 있다. 그러나 걱정은 금물. 발굴단은 현장에 남아 있으며 발굴한 유물도 전부 사라진 것은 아니다. 다만 정상적인 발굴 궤도에 오를 정도로 피해 복구가 이루어지려면 3년의 시간이 소요된다. 이 기간 동안 해당 유적지에서 출토한 유물들은 박물관으로 반입되지 못한다."
 lepsius.62.g: "이런 야만인들 같으니!"
 lepsius_excavation_sacked_state_modifier: "도굴당한 발굴지"
 lepsius_excavation_protected_state_modifier: "지켜낸 발굴지"
 lepsius_4_excavation_team_needed_tt: "발굴 조사단 #G 4팀#! 이상 보유"
 lepsius.2101.t: "로마의 전투 유적지"
 lepsius.2101.f: "\"선생님, 못이 또 나타났습니다!\"\n\"훌륭해! 이것으로 이곳이 고대의 전장이었다는 가설이 더욱 확실해졌군! 머지않아 유골도 찾을 수 있겠지!\""
 lepsius.2101.g: "큰 명성을 가져다주진 못해도 중대한 발견이로군!"
 lepsius.2102.t: "빌라 루스티카 발견"
 lepsius.2102.f: "\"빌라 루스티카는 단순히 농산품, 식량과 음료의 주요 생산지에 그쳤던 것이 아닙니다. 방랑객들에게 여정 도중에 쉴 곳을 제공하였으며 군단에 물자를 공급하는 데에도 큰 역할을 한 것입니다. 이러한 유적을 통해 로마 제국 시대의 식량 생산, 로마인의 생활과 농업에 대해 여러 가지 결론을 낼 수 있게 되었습니다.\""
 lepsius.2102.g: "이곳이라면 로마의 농촌 생활에 많은 사실을 우리에게 전해줄 것이다!"
 lepsius.2103.t: "고대 로마의 석판 발견"
 lepsius.2103.f: "클라우디아 세베라가 레피디나에게 보내는 안부.\n언니, 9월 11일이 제 생일인데 꼭 저희 집에 오셔서 축하해 주길 바라요. 오셔서 축하하면 더욱 기쁠 거에요. 케리알리스에게도 안부를 전해 주세요. 제 아들 아엘리우스와 아기도 안부를 전합니다.\n언니, 어서 오기를 바라요. 안녕히 계세요, 언니. 제일 사랑하는 그대. 앞으로도 잘 지내기를 바라요.\n케리알리스의 아내 술피키아 레페디나에게, 클라우디아 세베라 드림."
 lepsius.2103.g: "보물이란 게 꼭 금은보화일 필요는 없지!"
 lepsius.2104.t: "로마 금화 발견"
 lepsius.2104.d: "로마 금화는 매우 보기 드문 유물임에도 [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] 지역에서 한 점이 발견되었다. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] 박사는 로마 제국이 위기에 처할 당시 은닉한 것으로 추정되는 이 금화를 복원하는 데 성공하였다."
 lepsius.2104.f: "\"미래의 고고학자들이 언젠가 우리가 남긴 주화를 발견하고 어떻게 이곳에 남게 되었는가를 궁금해할지 알고 싶군.\""
 lepsius.2104.g: "내 보물!"
 lepsius.2111.t: "고대 페르시아 석관"
 lepsius.2111.f: "\"조심, 조심. 유물이 손상되어서는 안 되네. 쇠지렛대도 쓰지 말게!\""
 lepsius.2111.g: "참으로 놀라운 출토품이로군!"
 lepsius.2112.t: "페르시아 궁전의 수집품"
 lepsius.2112.d: "[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullName](은)는 어느 농부가 찾아낸 단서를 따라, 아케메네스 왕조 대에 세워졌다가 존재가 잊혀진 페르시아 궁전을 찾아냈다. 이후 발굴 조사 과정에서 놀라운 발견이 이루어졌다."
 lepsius.2112.f: "메소포타미아는 고대 페르시아 제국의 핵심 속주로 꼽혔다. 아케메네스 왕조는 정복 과정에서 수많은 예술품과 쐐기 문자 점토판을 본국으로 가져갔다. 그런데 발굴단은 궁전의 한 구역이 메소포타미아 점토판으로 가득 채워진 기록 보관소를 발견하는 뜻밖에 성과를 거두었다."
 lepsius.2112.g: "전부 수집하라!"
 lepsius.2113.t: "페르시아 무덤의 이집트 조각상"
 lepsius.2113.d: "페르시아 귀족의 무덤에서 진행된 소규모 발굴 작업에서 이집트 신 토트의 조그만 조각상이 출토되었다."
 lepsius.2113.f: "페르시아인들은 이집트를 한 세기 넘게 지배하였다. 그러나 그 전후 시기에도 두 제국 간에 전쟁이 빈번하였음에도, 양쪽 문명 간에 문화적 교류는 이루어져 왔다."
 lepsius.2113.g: "이게 어떻게 여기까지 온 것인가?"
 lepsius.2114.t: "기념 암각문"
 lepsius.2114.d: "산사태가 일어난 산에서 과거에 사라진 것으로 여겨졌던 거대한 암각문이 발견되었다. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] 박사는 이 고대의 기록을 조사하기 위하여 직접 현장으로 향했다."
 lepsius.2114.f: "페르시아 암각문과 부조는 몰락한 페르시아 제국의 예술에서도 영구적인 지위를 차지하고 있다. 가장 유명한 것은 베히스툰 비문으로, 이란 케르만샤 지방의 베히스툰산 절벽에 새겨진 아케메네스 왕조의 다국어 왕실 비문이자 대형 암각문이다. 다리우스 대왕이 세운 이 비문은 고대 페르시아어, 엘람어, 바빌로니아어(아카드어의 한 갈래)의 세가지 언어로 쓰인 최대 분량의 쐐기 문자 비문으로서, 쐐기 문자의 해독에 중대한 역할을 하였다."
 lepsius.2114.g: "페르시아 역사의 중대한 1차 사료로군!"
 lepsius_state_trait_tikal: "정글 속 도시 티칼\n고고학 과제를 통한 @lepsius_local_minor! 현지 유물 #G +1#!"
 je_lepsius_tikal: "정글 속 도시 티칼"
 je_lepsius_tikal_reason: "스티븐스와 캐더우드의 탐사는 무엇보다도 잃어버린 마야 도시들의 여러 삽화가 실린 책이 출간된 이래 큰 관심을 불러일으켰다. 하지만 두 탐험가가 모든 유적지를 발견한 것은 아니었다. 아직 발견되지 않은 수많은 유적지가 남아 있었고, 그중 하나가 바로 전설 속의 도시 티칼이었다."
 lepsius.71.t: "정글 속 도시 티칼"
 lepsius.71.d: "[SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] 교수가 이끄는 탐사대가 과테말라 정글 깊숙한 곳에서 고된 탐색 끝에 전설 속의 마야 도시 티칼을 발견하였다. 우리나라에게 있어 참으로 역사적인 사건이지만, 이번 발견에서 어떤 결론을 이끌어내는 것이 좋을까?"
 lepsius.71.f: "티칼은 과테말라 북부 페텐 열대우림에 위치한 고대 마야 도시로, 여러 계단식 신전이 세워진 곳으로도 유명하다. 마야 고전기 (서기 3세기~9세기)에서도 가장 중요한 도시로 꼽히며 현재까지 연구가 가장 많이 이루어진 마야 도시이기도 하다. 이곳에 사람이 정착했음을 보여주는 최초의 흔적은 그 연대가 기원전 1천년기 초로 거슬러 올라간다. 서기 2세기 경부터 신전과 비석, 궁전에서 신전으로 이어지는 단지가 건설되면서 본격적인 도시 개발이 이루어졌다. 티칼은 5세기에 첫번째 전성기를 맞이하였는데 당시 강력한 왕조가 주변 소국들을 차례로 정복하여 속국으로 만들었고, 이로 인해 강력한 이웃 국가였던 칼라크물과 오랜 갈등을 겪게 되었다. 티칼은 8세기에 이르러 칼라크물을 꺾고 두번째 전성기를 맞이한다. 그러나 9세기 초 티칼의 세력권이 사그라들고 건축물 건설도 중단되었으며, 늦어도 10세기 경에는 도시가 완전히 버려지기에 이르렀다."
 LEPSIUS_NO_MORE_EXPEDITIONS_FOR_YEARS_TT: "[concept_lepsius_archaeologist]가 유물 목록 작성을 진행하고 있는 관계로 향후 #n 3년~5년#!간 [Concept('concept_lepsius_expedition','$concept_lepsius_expeditions$')]를 실시할 수 #n 없게#! 됩니다."
 LEPSIUS_SUB_TEAM_WITH_EXPLANATION_TT: "[Concept('concept_lepsius_archaeological_team','$concept_lepsius_excavation_team$')] #R 1팀#! 상실. [concept_lepsius_expedition]가 끝난 뒤 #p 소환#!하거나 #V 초기 고고학 기술#!을 연구하였을 경우 [concept_lepsius_excavation]을 위해 현장에 남겨둘 수 있습니다."
 lepsius_long_expedition_tt: "장기간의 [concept_lepsius_expedition]은 #V 1년#!의 시간이 소요됩니다. 탐사 후 [concept_lepsius_archaeologist]는 발견 사항의 목록화 작업에 나서며 #n 5년#! 동안 다른 탐사를 수행할 수 #p 없습니다.#!"
 lepsius_medium_expedition_tt: "중간 기간의 [concept_lepsius_expedition]은 #V 10개월#!의 시간이 소요됩니다. 탐사 후 [concept_lepsius_archaeologist]는 발견 사항의 목록화 작업에 나서며 #n 4년#! 동안 다른 탐사를 수행할 수 #p 없습니다.#!"
 lepsius_short_expedition_tt: "단기간의 [concept_lepsius_expedition]은 #V 8개월#!의 시간이 소요됩니다. 탐사 후 [concept_lepsius_archaeologist]는 발견 사항의 목록화 작업에 나서며 #n 3년#! 동안 다른 탐사를 수행할 수 #p 없습니다.#!"
 lepsius_leave_team_for_excavation_tt: "[Concept('concept_lepsius_archaeological_team','$concept_lepsius_excavation_team$')]을 현장에 남겨두고 [concept_lepsius_excavation]을 실시하여 대체로 #V 1년#!에 [concept_lepsius_artifact] #V 1점#!씩 획득하게 됩니다."
 lepsius.2101.d: "어느 시민이 [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]에서 철제 단검을 발견했다는 소식에 [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullName](은)는 발굴단을 꾸려 발굴 조사에 나섰다. 이들은 방패 조각부터 못과 동전에 이르기까지 고대 로마의 전투 현장에서 발견할 수 있는 다양한 유물들을 출토하였다. 특히 동전 덕분에 고고학자들은 전투의 연대를 상당히 명확히 추정할 수 있었다."
 lepsius.2102.d: "어느 농부가 본인의 밭에서 고대 유적을 발견하였는데, 다행히도 곧바로 대학에 연락을 취하면서 [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] 박사가 [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]의 고대 빌라 루스티카를 발굴할 기회를 갖게 되었다. 이처럼 다양한 고고학 발견을 통해 로마 시대 시골 사람들의 생활상을 엿볼 수 있었다."
 lepsius.2103.d: "[SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]에서 얇은 판자로 만든 고대 로마의 여러 목판이 발견되어 고고학계에서 큰 화제를 불러모았다. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] 박사는 오늘날의 방식으로는 일부 목판의 의미만 밝혀낼 수 있었으나, 극소수의 목판만으로도 로마인들의 삶을 엿볼 수 있는 소중한 자료가 되었다."
 lepsius.2111.d: "[SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]에서 고대 페르시아 제국의 놀라운 유물이 발견되었다. 어느 농부가 오래된 청동 관을 발견하고 [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] 박사에게 연락을 취한 것이다. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] 박사는 자신의 전공에 힘입어 관을 열고 호화로운 보석으로 뒤덮인 유해를 발견하였다. 보석으로 미뤄보아 아케메네스 왕조의 고위 관리였던 것으로 추정된다."
 je_lepsius_dreamtime: "꿈의 시대"
 je_lepsius_dreamtime_reason: "영국의 인류학자 월터 볼드윈 스펜서와 호주 출신 동료 학자 프랜시스 제임스 길렌이 호주 중부 언어인 아레른테어에서 이르는 '앨처링거'(alcheringa)를 '꿈의 시대'(dreaming)로 번역하였다. 원주민들에게 꿈의 시대란 우주의 영적, 자연적, 도덕적 질서를 뜻한다. 이러한 맥락에서 꿈의 시대는 세상을 올바르게 이해하고 활용하는 집단적 능력, 의례 행사의 틀 속에서 신화적 세계를 성찰하는 능력, 그리고 생명력을 의미한다. 꿈의 시대와 관련된 여러 예배 장소, 여타 원주민 신화, 그리고 고고학과 인류학 유물이 호주 전역에 흩어져 있다. 이제 마지막 대륙의 과거를 철저히 살펴볼 때가 왔다."
 lepsius_2_excavation_team_needed_tt: "발굴 조사단 #G 1팀#! 이상 보유"
 lepsius.72.t: "꿈의 시대"
 lepsius.72.d: "[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] 교수와 [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName] 교수는 호주 전역을 여행하는 과정에서 과거에 탐험이 이루어지지 않았던 대륙의 과거를 밝히는 귀중한 과학 연구를 수행하였다."
 lepsius.72.f: "두 사람이 복귀 후에 가져온 엄청난 발견으로 학술원은 놀라움을 금치 못했다. 이들은 동굴 벽화를 스케치로 그려오고, 수천 년 된 유골을 수습했으며, 고대와 근래의 유물을 발견하고, 원주민의 신화와 설화를 기록하였다. 동료 학자 가운데 그 누구도 이토록 풍성한 발견을 예상한 사람은 아무도 없었다."
 lepsius.72.g: "아, 저기 디저리두도 가져왔네!"
 je_lepsius_gwanggaeto: "광개토대왕릉비"
 je_lepsius_gwanggaeto_reason: "광개토대왕릉비는 서기 391년부터 승하할 때까지 고구려를 다스린 광개토대왕을 기리는 비석이다. 현재는 중국과 북한의 국경 지대 인근에 서 있다. 비석에 새겨진 비문은 고구려 왕국의 역사와 관련해 현존하는 가장 오래되고 상세한 기록으로 남아 있다. 서기 668년 고구려와 그 후계국 발해가 멸망하자 국내성과 환도산성 일대는 수도의 지위를 잃게 되었다. 1644년 만주족이 중원을 정복하고 청나라의 황제들은 압록강 이북의 광토에 출입 금지령(봉금령)을 내렸다. 이 지역에 다시 사람이 들어와 정착하게 된 것은 19세기 후반에 이르러서였다. 1876년경 청나라의 어느 관리가 땅속에 일부 파묻혀 잡초로 완전히 뒤덮여 있던 대왕릉비를 다시 발견하기에 이르렀다."
 lepsius_gwanggaeto_modifier: "고구려의 유산"
 lepsius.73.t: "광개토대왕릉비"
 lepsius.73.d: "흘러간 고구려 왕조 시대의 거대한 비석이 우연히 발견되면서, 지금까지 알려지지 않았던 과거를 엿볼 수 있을 뿐만 아니라 정치적 파장으로 이어질 수수께끼도 드러나고 있다."
 lepsius.74.t: "고구려는 한국의 왕조"
 lepsius.74.d: "광개토대왕릉비가 발견되고 중국은 이를 근거로 고구려가 한국계 국가가 아니라 중국계 국가 내지는 최소 중국의 속국이었다는 대담한 주장을 펼쳤다. 반면 일본은 이것으로 일본이 한반도 남부를 지배했음을 증명한다고 주장하고 있다."
 lepsius.75.t: "왜의 침공"
 lepsius.75.d: "최근 발견된 광개토대왕릉비로 일본의 한반도 남부 진출과 해당 지역 국가의 정복에 대한 증거가 확인되었다."
 lepsius.73.f: "[SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName]에서 발견한 이 비석은 거대한 기념비로 어쩌면 현존하는 세계 최대 규모의 비석일 것으로 추정된다. 한반도 이북 지역과 남만주 일대를 지배했던 고구려의 역사를 복원하는 데 있어 독보적인 자료임에도, 판독이 힘들다는 점과 더불어 고구려 왕조의 정체성을 둘러싼 분쟁으로, 동양 각국에서 민족주의가 고조되는 지금 이 시점에, 무시할 수 없는 파장을 불러일으켰다. 고구려 왕국은 오늘날 한민족 집단과 깊은 역사적, 문화적 유대를 공유하고 있으나, 중국 측은 남만주의 다민족 지역이 고구려의 중심지였다는 점에서 한국 민족주의자들이 영토 회복 주장에 나설 수 있다는 우려를 안고 있는 것에 결코 지나침이 없다. 한편 일부 단락에서 일본(왜)의 침공 가능성이 담겨 있어 당시 일본이 한국을 지배했다는 추측도 제기되었으나, 한국 측은 한반도의 국가들이 일본을 침공한 것이라고 보고 있다."
 lepsius.73.g: "해독해 볼 가치가 있는 교훈적인 과거로군."
 lepsius.73.h: "고구려는 중국의 주요 국가였소."
 lepsius.73.i: "이것으로 남만주가 본래 한국의 땅이었음을 분명히 보여주고 있군."
 lepsius.73.j: "일본이 한반도에 영향력을 행사했다는 증거일세."
 lepsius.2131.t: "아스텍 도시에서 두개골 조각 발견"
 lepsius.2131.d: "[SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]에서 두개골 조각 여러 점이 출토되는 섬뜩한 발견이 이루어졌다. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] 박사는 이곳이 두개골을 걸어놓던 '촘판틀리'가 있었던 자리라고 추정하였다."
 lepsius.2131.f: "아즈텍인들은 꽃의 전쟁에서 포로로 잡힌 사람들을 제무롤 바치곤 했다. 그리고 이러한 인신 제물의 두개골을 '촘판틀리' (해골 선반)에 걸어 모아두는 경우가 많았다. 해골들을 서로 쌓아 올려 일종의 해골 벽을 만들기도 하였다. 어떤 사원에서는 석공들이 해골 장식을 조각한 돌벽을 세우기도 했다."
 lepsius.2131.g: "정말 잔인하군!"
 lepsius.2132.t: "현지 학자가 보존한 아즈텍 비문"
 lepsius.2132.d: "[SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]의 포장도로를 교체하는 과정에서, 그 누구도 포장석을 두고 고고학 발견이 이루어질 것이라 생각한 사람은 없었다. 그러나 현지의 어느 학자가 포장석에서 여러 아즈텍 비문을 발견하면서 이야기가 달라졌다. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] 교수는 현장에 호출되어 비문을 보존할 수 있었다."
 lepsius.2132.f: "이번에 발견된 비문은 멕시카족이 벌인 전투를 기록하고 있었다. 나우아틀어의 모든 어휘를 정확히 파악할 수는 없었지만 많은 지명이 언급되어 있었다. 따라서 어떤 장소가 그 사건에 휘말렸는지는 파악할 수 있었다."
 lepsius.2132.g: "포장도로로 깔리기 전에 발견할 수 있었다니 이건 신께서 도운 것이오."
 lepsius.2133.t: "아즈텍 유적 발견"
 lepsius.2133.d: "오래된 아즈텍 유적이 [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]에서 발견되었다. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] 교수는 곧바로 발굴 조사에 들어갔다. 안타깝게도 건물 흔적 그 자체를 제외하면 나올 만한 것이 많지는 않았다."
 lepsius.2133.f: "\"유적 대다수가 이미 도굴되긴 했으나, 유럽인 도래 이전의 멕시카인들의 생활상을 엿볼 수 있는 기회요. 우리로서는 여전히 중요한 발견일세!\""
 lepsius.2133.g: "흥미롭구만."
 lepsius.2134.t: "흑요석 거울 발견"
 lepsius.2134.d: "아즈텍 장인의 걸작이 [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]에서 발견됐다. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] 박사는 아즈텍인들이 종교 의식에 썼던 완벽한 품질의 흑요석 거울을 수습할 수 있었다."
 lepsius.2134.f: "\"흑요석 거울은 저승과의 소통 수단으로 믿어졌던 것입니다. 심지어 테즈카틀리포카라는 신은 발 대신에 거울을 지니고 있는 것으로 묘사되었지요. 실로 엄청난 유물이 틀림없소!\""
 lepsius.2134.g: "믿을 수가 없군!"
 lepsius.2141.t: "카르타고 난파선 발견"
 lepsius.2141.d: "[SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]의 진주 채취 잠수부들이 고대 카르타고의 난파선을 발견하였다. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] 박사는 난파선을 당분간 해저에 남겨두기로 결정하였지만, 잠수부들을 통해 배에 실린 화물을 분석하고 기록할 수 있었으며 카르타고의 무역로를 새롭게 엿볼 수 있는 기회로 삼았다."
 lepsius.2141.f: "\"배에는 여러 나라의 귀족층이 주문하였을 것으로 보이는 자주색 옷감이 많이 실려 있었습니다.\""
 lepsius.2141.g: "지중해의 위대한 상인들일세!"
 lepsius.2142.t: "바닷속 카르타고 전함"
 lepsius.2142.d: "바다의 지배자였던 카르타고인들의 전함이 좌초되었다니 누가 상상이나 했겠는가. 그런데 그런 일이 [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]에서 벌어진 모양이다. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] 박사는 한때 위용을 자랑하던 카르타고 전함에서 많은 유물을 수습할 수 있었다. 다만 목재는 이미 대다수가 썩어 없어진 상태였다."
 lepsius.2142.f: "\"이것은 이단노선인가, 삼단노선인가, 오단노선인가, 아니면 그보다 더 큰 노선인가?\""
 lepsius.2142.g: "한때는 장대했던 함선이라니!"
 lepsius.2143.t: "카르타고 항구 발견"
 lepsius.2143.d: "카르타고의 고대 항구가 [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]에서 발견되었다. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] 교수는 해당 유적지에 대한 철저한 조사를 지시하였다. 허나 어느 부유한 사업가가 머지않아 그곳에 새로운 공장을 짓는 바람에 유적의 일부만 보존할 수 있었다."
 lepsius.2143.f: "\"그래도 암포라 몇 점은 발견했으니 다행이오. 분명 고대 지중해의 무역에 대해 많은 것을 전할 것이니 말이오.\""
 lepsius.2143.g: "존재도 몰랐던 항구가 통째로 발견되다니! 그야말로 엄청난 발견이군!"
 lepsius.2144.t: "고대 카르타고의 주화 발견"
 lepsius.2144.d: "[SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] 지역의 어느 농부가 먼 옛날의 동전 무더기를 발견했다. 다만 [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] 박사가 철저히 조사하였음에도 카르타고 시대의 유물은 더는 발견되지 않았다. 이 동전 무더기가 어떻게 이 들판에 묻히게 되엇는지는 미지의 영역으로 남았다."
 lepsius.2144.f: "\"이 주화는 한니발의 형제 하스드루발의 모습을 담고 있소. 비교적 최근에 발행된 주화임이 명백하오.\""
 lepsius.2144.g: "나는 이제 부자다!"
 lepsius.2151.t: "켈트족의 솥 발견"
 lepsius.2151.d: "켈트족은 솥을 여러 용도로 활용하였는데, 그런 거대 솥이 최근에 [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]에서 발견되었다. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] 교수는 이번에 발견된 거대 철제 유물을 우리 소장품으로 들일 수 있었다."
 lepsius.2151.f: "\"전설에 따르면 위대한 전사가 마법의 물약이 가득 담긴 솥에 빠졌는데, 그 물약은 마시기만 하면 누구나 엄청난 힘을 얻게 된다고 합니다. 전사는 너무나 강해져서 거대한 바위도 들어올렸고, 로마인들과 싸우는 것을 좋아했다고 하더군요.\""
 lepsius.2151.g: "그렇다고 마법의 솥에 빠지는 사람이 없었으면 좋겠군!"
 lepsius.2152.t: "켈트족의 청동 방패 덮개 발견"
 lepsius.2152.d: "[SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]의 강바닥 진흙더미 속에서 청동판이 발견되었다. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] 박사는 도착하자마자 그 청동판이 한때 켈트족 방패를 이루던 파편이었다는 사실을 알아냈다."
 lepsius.2152.f: "\"어떤 설화에 따르면 켈트 족장이 방패 위에 타고 이동했다는 이야기가 있지만 그것은 분명 동화에 불과합니다. 허나 타키투스는 새로운 족장으로 선출될 때 족장들을 방패 위에 올려놓았다고 기록하였지요. 이번 유물은 그런 설화의 역사적 근거로 삼을 가능성이 있습니다.\""
 lepsius.2152.g: "위대한 족장에 걸맞은 방패로군!"
 lepsius.2153.t: "켈트족의 청동 투구 발견"
 lepsius.2153.d: "[SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]에서 뿔 달린 청동 투구가 발견되었다. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] 교수는 머지않아 이 투구가 전장에서 쓰던 투구가 아니라 켈트족의 숭배 대상이라는 사실을 알아냈다."
 lepsius.2153.f: "\"켈트족을 다룬 그림을 보면 날개나 뿔 달린 투구를 쓴 것을 보셨을 수도 있겠지만 그런 묘사는 잘못된 것입니다. 실제 전투에서 그런 투구는 오히려 방해만 되었을 뿐이지요. 그런 투구가 실존하긴 했지만 대개는 켈트족들이 믿었던 특정 신을 기리는 제례용 도구에 불과하였습니다.\""
 lepsius.2153.g: "정말 장엄한 투구로군!"
 lepsius.2154.t: "고대의 선돌 발견"
 lepsius.2154.d: "시골 야산을 따라 등산하던 [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] 박사가 [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]에서 이상한 돌을 발견하였다. 알고 보니 이 돌은 현지 켈트 부족민이 세웠던 켈트 선돌로 밝혀졌다. 현재 [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] 박사는 이 선돌을 집중적으로 연구하고 있다."
 lepsius.2154.f: "\"어째서 켈트족들이 선돌을 세웠는가는 기록 상의 단서를 남긴 것이 없기에 알 길이 없습니다. 허나 일종의 숭배 장소였을 가능성도 있지요. 일부 지역민들은 이름난 전사와 용맹한 개에 관한 설화를 전하고 있습니다. 오벨릭스라는 전사가 완전한 형태의 선돌을 만들어 누구의 도움도 받지 않고 세웠다는 이야기인데, 물론 허황된 설화에 지나지 않지요.\""
 lepsius.2154.g: "오벨릭스가 남긴 흔적이라?"
 lepsius.2161.t: "에게 문명의 프레스코화 발견"
 lepsius.2161.d: "에게 유적을 발굴하던 현지 조사관들이 [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]에서 장대한 프레스코화를 발굴해냈다. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] 교수는 프레스코화가 유적과 관련이 있다고 판단하여 발견된 유물을 그림으로 남길 것을 지시하였다."
 lepsius.2161.f: "\"이 무늬는 참으로 놀랍군! 지금도 저런 아름다움을 만들어낼 수만 있다면!\""
 lepsius.2161.g: "이것이 예술이다!"
 lepsius.2162.t: "에게 문명의 유적 발견"
 lepsius.2162.d: "[SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]의 공사 현장에서 고대 에게 문명의 유적이 발견되었다. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] 박사는 발견 현장의 철저한 조사에 나섰다. 아쉽게도 남은 것은 별로 없었지만 이 유적만으로도 한때 이곳에 살았던 주민들의 생활상을 이해하는 데 보탬이 될 것이다."
 lepsius.2162.f: "\"저 아치는 수천 년 동안 이곳에 서 있었지. 우리 건물도 그토록 오랫동안 남아 있을지 궁금할 따름이오...\""
 lepsius.2162.g: "이 유적은 고대 에게 문명의 생활에 대해 많은 것을 전해줄 것이다."
 lepsius.2163.t: "에게 문명의 보석 출토"
 lepsius.2163.d: "정말 운 좋게도 어느 농부가 [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]에서 흥미로운 유물을 발견해냈다. 현장에 도착한 [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] 교수는 매혹적인 에게 문명의 보석에 감탄을 금할 수 없었다."
 lepsius.2163.f: "\"참으로 예쁜 보석일세. 지금도 이것과 비슷한 보석을 만들 수 있다면 좋으련만!\""
 lepsius.2163.g: "경이로운 솜씨로군!"
 lepsius.2164.t: "에게 문명의 황금잔"
 lepsius.2164.d: "[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] 박사가 우리 지역의 발굴지에서 황금잔을 출토해냈다. 이런 놀라운 발견이 있을 것이라 예상한 사람은 아무도 없었지만, [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] 지역에서 귀중한 유물이 발견될 확률이 여전히 큰 것으로 보인다."
 lepsius.2164.f: "\"황금잔의 표면에는 한 남자와 여러 황소가 있는 풍경이 새겨져 있소. 황소마다 제법 역동적이고 다양한 자세를 취하고 있는 것이 특징이오.\""
 lepsius.2164.g: "나도 이런 잔 하나 갖고 싶군!"
 lepsius.2171.t: "이집트 벽화"
 lepsius.2171.d: "[SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]로 여행을 떠난 [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] 교수가 고대 이집트 벽화를 발견하였다. 이 벽화에는 고대 이집트의 풍경이 고스란히 담겨 있었다."
 lepsius.2171.f: "\"흥미로운 것은 벽에 여전히 색채가 남아 있다는 점이오. 그리스는 전부 흰색으로 그득한데 말이지. 이집트인들이 색채에 훨씬 더 관심이 많았던지, 아니면 사막의 환경이 색채 보존에 유리했던 것으로 보인다네.\""
 lepsius.2171.g: "경이로운 벽화일세!"
 lepsius.2172.t: "고대 이집트 신전 발굴"
 lepsius.2172.d: "[SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]에 아직도 미지의 신전이 남아 있을것이라 누가 생각이나 했겠는가? [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] 교수가 이번에 모랫속에서 발굴해낸 것은 그것이 사실이었음을 보여주고 있다. 비록 귀중품은 전부 사라진 지 오래였지만, 실로 엄청난 발견이다."
 lepsius.2172.f: "\"이 신전 좀 보게! 종교 의식이 이곳에서 치러졌다는 게 상상이 되는가? 정말 놀랍지 않소?\""
 lepsius.2172.g: "이곳에서 더욱 알아내야 할 게 산더미로군!"
 lepsius.2173.t: "이집트 석상 수습"
 lepsius.2173.d: "부숴지긴 했지만 그래도 정체 모를 이집트 석공이 남긴 훌륭한 작품이 틀림없다. [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]에서 발견된 이 석상은 만들어질 당시 매 한마리를 조각했을 가능성이 높은 것으로 보인다. 적어도 [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] 박사에게는 그러하다."
 lepsius.2173.f: "\"별것 아닌 것처럼 보일지 모르겠으나 이 석상은 이집트인들이 어떻게 조각을 하였는지에 관하여 많은 것을 전할 것이오!\""
 lepsius.2173.g: "석공이 남긴 훌륭한 작품이로군!"
 lepsius.2174.t: "이집트 미라 발견"
 lepsius.2174.d: "미라는 이집트에서 가장 흔히 발견되는 것일지도 모른다. 이번에는 [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]에서 하나가 발견되었다는 소식이다. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] 교수는 조사에 신중을 기하기 시작하였지만 일각에서는 좀 다른... 생각을 하는 모양이다."
 lepsius.2174.f: "\" 이 미라들을 이용해서 고대 이집트 사람들이 무엇을 먹고 마셨는지, 건강 상태는 어떠했는지를 알아낼 수 있다면 얼마나 좋겠는가! 참으로 환상적일 걸세!\""
 lepsius.2174.g: "죽음은 시작일 뿐."
 lepsius.2174.h: "듣자하니 미라를 먹는 게 취미인 사람들도 있다던데! 팔아넘깁시다!"
 lepsius.2181.t: "헬레니즘 시대의 전장 발견"
 lepsius.2181.d: "디아도코이 전쟁은 세계 여러 지역을 폐허로 만들었다. 그 연장선에서 [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]에서도 소규모 전투가 있었던 것으로 보인다. 다만 디아도코이 전쟁의 일환으로 치러진 전투였는지는 아직 밝혀지지 않았다. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] 교수는 다양한 무기와 갑옷 파편을 발견하였다."
 lepsius.2181.f: "\"이곳에 분명 소규모 전투가 있었던 것이 분명해. 다른 곳만큼은 못하더라도 중요한 건 틀림없지. 이곳에서 더 많은 것을 알아내리라 믿어 의심치 않네!\""
 lepsius.2181.g: "전쟁이 있었다니 애석하군..."
 lepsius.2182.t: "헬레니즘 주화 발견"
 lepsius.2182.d: "고대 헬레네인들은 지중해에서 인도에 이르기까지 세계 곳곳에 흔적을 남겼다. 그 중에서도 동전이 발견되는 경우가 흔한데 이번에는 [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]에서 발견된 모양이다. 그 덕분에 [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] 박사는 해당 지역에 그리스인이 거쳐갔음을 확인할 수 있게 되었다."
 lepsius.2182.f: "\"이제 난 부자가 된 것 같군!\""
 lepsius.2182.g: "흥미롭군!"
 lepsius.2183.t: "헬레니즘 유적 발굴"
 lepsius.2183.d: "[SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]에서 헬레니즘 시대의 유적이 최근 새롭게 발견되었다. 헬레니즘 도시는 스페인에서 인도에 이르기까지 널리 분포되어 있다. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] 교수는 이번에 발견된 도시로 그리스 정착지에 관하여 더 많은 것을 전하리라 보고 있다."
 lepsius.2183.f: "\"하나의 문명이 그렇게 먼 거리에 걸쳐 뻗어 있다니 상상이 되는가? 참으로 믿을 수 없군 그래!\""
 lepsius.2183.g: "그리스 도시가 온 곳에 널려 있었다, 이 말이지?"
 lepsius.2184.t: "그리스 신 조각상"
 lepsius.2184.d: "고대 그리스 신과 그 종교는 머나먼 땅까지 전파되었다. [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] 지역에서 최근 그리스 신을 묘사한 조각상이 출토되었다. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] 박사는 이 조각상이 그리스 신화 속 포도주의 신, 디오니소스일 것으로 판정하였다."
 lepsius.2184.f: "\"그리스 신화에 따르면 디오니소스는 태어나자마자 제우스가 제 허벅지에 꿰어 이집트 너머 이디오피아의 니사로 데려갔다고 한다. 그리고 판의 경우에는 태어난 뒤에 어떻게 되었는지 아는 그리스인이 없다. 그러므로 그리스인들이 두 신의 이름을 다른 모든 신의 이름보다 나중에 알았고, 두 신의 기원은 그 이름을 접하게 된 시점으로 거슬러 올라갔을 것이 분명하다.\"\n- 헤로도토스"
 lepsius.2184.g: "이번 발견을 기리는 의미에서 포도주 한 잔 하세!"
 lepsius.2500.t: "[SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]의 고고학 지도 제작"
 lepsius.2500.d: "[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] 교수는 최근 몇 년 사이에 [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]에서 발견된 고고학 유적들을 지도에 표시하는 힘든 작업을 거치고 있다. 이 지도를 통해 향후 추가 발굴 가능성이 있는 지역을 파악할 수 있을 것이다."
 lepsius.2500.f: "\"여기서는 못을 찾았고 저기서는 양의 뼈를 찾아냈군! 놀랍지 않소?!\""
 lepsius.2500.g: "이것으로 새로운 발견의 길을 열 것이다!"
 lepsius.2501.t: "[GetPlayer.GetName]의 고고학 유물 도감"
 lepsius.2501.d: "[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] 교수는 뛰어난 고고학자일 뿐만 아니라 놀라운 실력을 갖춘 화가이기도 하다. 이러한 재능을 바탕으로 [GetPlayer.GetNameNoFormatting]의 고고학 유물 도감을 출판할 수 있었고, 많은 대중으로 하여금 고고학에 대한 훌륭한 입문서로 높이 평가받게 되었다."
 lepsius.2501.f: "\"이 삽화들 좀 보게! 마치 박물관에 와서 유물들을 눈앞에서 구경하는 것 같군! 정말 놀라워!\""
 lepsius.2501.g: "경이로운 도감일세!"
 lepsius.2502.t: "[GetPlayer.GetName]의 고고학 유물 목록 갱신"
 lepsius.2502.d: "[GetPlayer.GetNameNoFormatting]의 고고학 유물 목록을 갱신하게 된 [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] 박사가 누구도 예상치 못할 만큼 부지런한 작업을 해냈다. 박사의 엄청난 노고 덕분에 지금껏 발견된 모든 유물의 정확한 목록을 7권 분량으로 확인할 수 있게 된 것이다."
 lepsius.2502.f: "\"등록번호 7342번 - 돌 파편, 신석기로 추정, 유물명 '돌멩이'.\""
 lepsius.2502.g: "추후 연구에도 도움이 되겠군!"
 lepsius.2503.t: "[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] 교수의 유물 밀수 적발"
 lepsius.2503.d: "[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] 박사가 수개월 간의 노력 끝에 우리나라로 유물을 밀수하던 조직의 검거에 성공했다. 유물들은 압수되어 현재 우리 박물관 소장품으로 안전하게 보관되고 있다."
 lepsius.2503.f: "\"이렇게 귀한 고고학 자료를 파괴하다니, 이런 불한당 자식들!\""
 lepsius.2503.g: "박물관에 들여야겠어!"
 lepsius.2600.t: "잊혀졌던 별"
 lepsius.2600.d: "[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] 박사는 고대인들의 별 그림이 오늘날 우리가 보는 밤하늘과 사뭇 달라 보여 늘상 의아해하고 있었는데, [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] 교수의 도움으로 마침내 그 이유를 밝혀낼 수 있었다. 그리고 두 사람은 밤하늘에서 새로운 별을 찾아냈다."
 lepsius.2600.f: "\"저기다! 고대 이집트인들이 새겨넣은 그 별이야! 드디어 잊혀졌던 별을 찾았소!\""
 lepsius.2600.g: "참으로 굉장한 과학적 발견일세!"
 lepsius.2601.t: "일식에 관한 천문학 지식으로 역사적 사건의 연대 추정"
 lepsius.2601.d: "[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] 교수와 [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] 교수가 공동 협력으로 일식에 관한 현대 천문학 지식을 동원해, 1차 사료에 드러난 역사 속 특정 사건의 연대를 추정할 수 있었다."
 lepsius.2601.f: "\"밀레토스의 탈레스는 서기 585년 5월 28일의 일식을 기록한 것이 틀림없소. 다른 일식을 기록했을 여지는 없소!\""
 lepsius.2601.g: "고고학의 중대한 진전이다."
 lepsius.2602.t: "옛 문명의 천문학 지식에 관한 개관"
 lepsius.2602.d: "[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] 박사와 [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] 교수가 고대 문명의 천문학 지식에 관한 개관을 책으로 출간하였다."
 lepsius.2602.f: "\"그렇소. 그들은 지구가 어느 것의 중심도 아니라는 것을 알았던 것이오. 아니오, 그 당시에도 지구가 평평하다고 여길 만큼 어리석지는 않았소. 아무렴, 나 역시도 그 점에 이견의 여지 없이 확신하고 있소.\""
 lepsius.2602.g: "참 흥미로운 내용이군!"
 lepsius.2603.t: "헤로의 증기기관 복원"
 lepsius.2603.d: "[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] 교수가 [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] 박사에게 헤로의 증기기관에 대해서 알려준 것을 계기로, 박사가 해당 기관의 복원에 즉시 나서게 되었다. 두 사람은 힘을 합쳐 에올리필레의 소형 복원품을 재현해냈다."
 lepsius.2603.f: "\"보다시피 에올리필레는 동력을 전달하는 장치가 없소. 따라서 실제 기계라기보단 장난감에 가깝지. 안타깝게도 이보다 더 발전을 이룩하지 못했던 것이오.\""
 lepsius.2603.g: "그때는 어째서 산업화를 이루지 못했던 건가?"
 lepsius_illustrated_archaeological_catalog_modifier: "고고학 도감 집필"
 lepsius.12.f: "현재 이집트 전시관에서는 @lepsius_egypt_minor! 일반 유물 #p [ROOT.Var('lepsius_egyptian_artifact_minor').GetValue]#!점과 @lepsius_egypt_major! 대표 유물 #p [ROOT.Var('lepsius_egyptian_artifact_major').GetValue]#!점을 소장하고 있습니다.\n\n이집트 전시관은 #T 재배치#!가 가능하며 이를 통해 새로운 전시를 기획할 수 있게 됩니다. 단 여기에는 특정 수의 유물이 필요합니다.\n\n#T 소규모 전시#!에는 @lepsius_egypt_minor! 유물 #p 10점#!, #T 중규모 전시#!에는 @lepsius_egypt_minor! 유물 #p 25점#!, #T 대규모 전시#!에는 @lepsius_egypt_minor! 유물 #p 50점#!, #T 완벽한 전시#!에는 @lepsius_egypt_minor! 유물 #p 100점#!이 필요합니다. 또한 #T 완벽한 전시#!에는 @lepsius_egypt_major! 대표 유물 #p 1점#!이 필요합니다.\n\n소장품의 재배치와 새 전시 준비에는 반년의 시간이 소요됩니다. 전시에 따른 보너스는 새로 재배치가 이뤄질 때까지 영구적으로 적용됩니다."
 lepsius.13.f: "현재 메소포타미아 전시관에서는 @lepsius_mesopotamia_minor! 일반 유물 #p [ROOT.Var('lepsius_mesopotamian_artifact_minor').GetValue]#!점과 @lepsius_mesopotamia_major! 대표 유물 #p [ROOT.Var('lepsius_mesopotamian_artifact_major').GetValue]#!점을 소장하고 있습니다.\n\n메소포타미아 전시관은 #T 재배치#!가 가능하며 이를 통해 새로운 전시를 기획할 수 있게 됩니다. 단 여기에는 특정 수의 유물이 필요합니다.\n\n#T 소규모 전시#!에는 @lepsius_mesopotamia_minor! 유물 #p 10점#!, #T 중규모 전시#!에는 @lepsius_mesopotamia_minor! 유물 #p 25점#!, #T 대규모 전시#!에는 @lepsius_mesopotamia_minor! 유물 #p 50점#!, #T 완벽한 전시#!에는 @lepsius_mesopotamia_minor! 유물 #p 100점#!이 필요합니다. 또한 #T 완벽한 전시#!에는 @lepsius_mesopotamia_major! 대표 유물 #p 1점#!이 필요합니다.\n\n소장품의 재배치와 새 전시 준비에는 반년의 시간이 소요됩니다. 전시에 따른 보너스는 새로 재배치가 이뤄질 때까지 영구적으로 적용됩니다."
 lepsius.14.f: "현재 에게 문명 전시관에서는 @lepsius_aegean_minor! 일반 유물 #p [ROOT.Var('lepsius_aegean_artifact_minor').GetValue]#!점과 @lepsius_aegean_major! 대표 유물 #p [ROOT.Var('lepsius_aegean_artifact_major').GetValue]#!점을 소장하고 있습니다.\n\n에게 문명 전시관은 #T 재배치#!가 가능하며 이를 통해 새로운 전시를 기획할 수 있게 됩니다. 단 여기에는 특정 수의 유물이 필요합니다.\n\n#T 소규모 전시#!에는 @lepsius_aegean_minor! 유물 #p 10점#!, #T 중규모 전시#!에는 @lepsius_aegean_minor! 유물 #p 25점#!, #T 대규모 전시#!에는 @lepsius_aegean_minor! 유물 #p 50점#!, #T 완벽한 전시#!에는 @lepsius_aegean_minor! 유물 #p 100점#!이 필요합니다. 또한 #T 완벽한 전시#!에는 @lepsius_aegean_major! 대표 유물 #p 1점#!이 필요합니다.\n\n소장품의 재배치와 새 전시 준비에는 반년의 시간이 소요됩니다. 전시에 따른 보너스는 새로 재배치가 이뤄질 때까지 영구적으로 적용됩니다."
 lepsius.15.f: "현재 선콜럼버스 전시관에서는 @lepsius_precolumbian_minor! 일반 유물 #p [ROOT.Var('lepsius_precolumbian_artifact_minor').GetValue]#!점과 @lepsius_precolumbian_major! 대표 유물 #p [ROOT.Var('lepsius_precolumbian_artifact_major').GetValue]#!점을 소장하고 있습니다.\n\n선콜럼버스 전시관은 #T 재배치#!가 가능하며 이를 통해 새로운 전시를 기획할 수 있게 됩니다. 단 여기에는 특정 수의 유물이 필요합니다.\n\n#T 소규모 전시#!에는 @lepsius_precolumbian_minor! 유물 #p 10점#!, #T 중규모 전시#!에는 @lepsius_precolumbian_minor! 유물 #p 25점#!, #T 대규모 전시#!에는 @lepsius_precolumbian_minor! 유물 #p 50점#!, #T 완벽한 전시#!에는 @lepsius_precolumbian_minor! 유물 #p 100점#!이 필요합니다. 또한 #T 완벽한 전시#!에는 @lepsius_precolumbian_major! 대표 유물 #p 1점#!이 필요합니다.\n\n소장품의 재배치와 새 전시 준비에는 반년의 시간이 소요됩니다. 전시에 따른 보너스는 새로 재배치가 이뤄질 때까지 영구적으로 적용됩니다."
 lepsius.99.t: "고고학 박물관 이전"
 lepsius.99.d: "어떤 이유에서인지 [GetBuildingType('building_lepsius_archaeological_museum').GetName]이 조국의 멋진 수도에 위치해 있지 않은 상황이다. 아무렴 수도로 이전할 필요가 있는 것이다!"
 lepsius.99.f: "\"그 토기는 조심해서 옮겨주시오, 깨지기 쉽단 말이오! 안 돼! 그냥 상자에 던져 넣지 말고 완충재라도 깔란 말이오! 이건 정말이지 못해 먹겠다니깐!\""
 lepsius.99.g: "이제 매일 놀러갈 수 있겠군!"
 lepsius.140.d: "우리 고고학자가 인맥을 활용해 탐사대에 필요한 유능한 인재들을 모집하였다."
 lepsius.250.f: "처음에는 말다툼으로 시작해서 욕설과 협박, 주먹다짐으로 번졌다. 결국 술집에서 큰 난투극이 벌어지고 만 것이다. 그 중심에는 우리 탐사대장이 있었다. 다혈질 성격 탓에 우리 평판도 크게 훼손되고 말았다. 오늘 아침 고위 관료에게까지 이번 사건이 보고되었다. 중대한 외교 마찰은 피했지만 좋지 못한 인상은 오랫동안 남게 되었다."
 lepsius.260.f: "좋은 소식이다! 알고 보니 우리 탐사대장이 이번 여정에서 흠잡을 수 없는 [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetCustom('academics_gentleman_or_gentlewoman_type')]였던 것으로 드러났다. 대장의 재치 있고 위풍당당한 태도는 [ROOT.GetCountry.GetAdjectiveNoFlag]의 전형적인 기질과 일맥상통한다. 덕분에 현지에서 우리나라의 명성이 크게 향상되기에 이르렀다."
 lepsius.270.d: "우리 탐사대장이 매일같이 카페에 앉아 시원한 탄산음료를 마시고 아이스크림을 먹는 버릇이 있어 누구보다 눈에 띄고 있다."
 lepsius.270.f: "야심 가득한 지도자는 하루 왠종일 일만 한다. 위대한 업적을 이룩하거나 부를 축적하고 싶은 마음 탓이다. 자신의 업적으로 명성을 쌓으려는 이들이 있는가 하면, 온갖 세부적인 면에 집착하는 이들도 있다. 허나 우리 고고학자는 다르다. 매일같이 더위를 식히기 위해 탄산음료를 들이키고 아이스크림을 먹어치우는 버릇이 있다. 어떤 이들은 게으름이라 흉볼지도 모른다. 하지만 다른 이들에게는 인간미, 건전한 취향, 삶의 올바른 우선순위를 보여주는 징표로 여겨질지 모른다."
 lepsius.280.d: "우리 탐사대장이 뛰어난 외교적 수완을 갖춘 덕에 현지 총독의 초청과 함께 치하를 받게 되었다."
 lepsius.311.d: "지난번 국외 고고학 탐사대를 이끈 대장이 탐사 과정에서 쓴 일기를 책으로 내놓기로 결심하였다."
 lepsius.312.d: "[SCOPE.sCharacter('lepsius_scientific_writer').GetFullName](이)가 탐사 과정에서 집필한 과학 논문을 출간하기로 결심했다."
 lepsius.408.f: "나자르는 악의 눈으로부터 보호해주는 부적이다. 이런 미신은 중동 뿐만 아니라 지중해 일부 지역에서도 널리 퍼져 있다. 물론 학문을 익힌 지성이 부적 하나로 악의 세력으로부터 탐사대를 보호할 수 있다고 생각하는 것은 어불성설일 것이다. 허나 현지 조력자나 짐꾼들은 상황이 다르다. 이들은 탐사대장에게 나자르를 구해 달라고 간청하고, 그렇지 않으면 큰 불행이 닥칠 것이라 믿고 있다. 나자르의 효과가 무엇이든 간에, 탐사대에 직접적인 영향을 주지 않더라도, 최소한 조력자들의 사기에는 영향을 끼칠 것이다."
 lepsius.409.f: "탐사대가 해안가를 따라 전진하는 과정에서 양 끝이 거의 맞닿은 넓은 만에 도착했다. 그리스 어부들이 멀리 돌아갈 바에 우리를 만 건너편으로 데려다주겠다고 제안해 왔다. 탐사대장은 흔쾌히 제안을 받아들였다. 어부들과 대화를 나누면서 근처에 고전기 이전 시대의 것으로 추정되는 유적이 있다는 중대한 정보도 얻을 수 있었다."
 lepsius.421.d: "우리 고고학자가 청금석으로 만든 자그마한 이집트 풍뎅이를 발견하였는데, 개인적으로 간직하고 싶어하는 모양이다."
 lepsius.452.f: "[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName](은)는 이 지역에 일찍이 파괴된 고고학 유적지에 대한 기록이 남아 있을 것이라는 이야기를 과거에 몇 차례 들었다. 며칠 전에는 유용한 정보를 입수하였다. 어느 상인이 16세기 필사본을 갖고 있는데, 그 필사본에 오래토록 잊혀져 있던 기록을 옮겨적어 놓았다는 것이다. 원본은 아무래도 영영 사라졌겠지만, 적어도 그 내용을 복원할 가능성이 열린 것이다."
 lepsius.461.f: "이상하게 가슴을 짓누르는 기분이었다. 한밤중에 [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName](은)는 사막 모래 위에 쳐진 천막에 바람이 강타하는 소리라 생각하며 일어났다. 헌데 그것은 단순한 바람 소리가 아니었다. 기괴한 속삭임이었다. 불협화음으로 변해가는 중얼거림이 점차 노랫소리로 바뀌었다. 마치 사이렌의 노래처럼, 유혹에 빠지듯이 감각을 흐리게 만들었다. 적어도 [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetLastName]의 주장은 그랬다. 몇 시간 동안 소리를 찾아 헤멘 [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe]는 기자의 대스핑크스의 발치에서 미친 듯이 땅을 파고 있었다. 스핑크스 아래의 방 안에 수천 년 간 숨겨져 있던 지식이 담겨 있으리라 믿어 의심치 않았기 때문이다. 그 후로 탐사대장의 상태는 거의 나아지지 않았다. 이곳은 정말이지 악영향만 끼치는 곳이다."
 lepsius.462.f: "이상하게 가슴을 짓누르는 기분이었다. 한밤중에 [SCOPE.sCharacter('lepsius_military_attache').GetFullName](은)는 사막 모래 위에 쳐진 천막에 바람이 강타하는 소리라 생각하며 일어났다. 헌데 그것은 단순한 바람 소리가 아니었다. 기괴한 속삭임이었다. 불협화음으로 변해가는 중얼거림이 점차 노랫소리로 바뀌었다. 마치 사이렌의 노래처럼, 유혹에 빠지듯이 감각을 흐리게 만들었다. 적어도 [SCOPE.sCharacter('lepsius_military_attache').GetLastName]의 주장은 그랬다. 몇 시간 동안 소리를 찾아 헤멘 [SCOPE.sCharacter('lepsius_military_attache').GetSheHe]는 기자의 대스핑크스의 발치에서 미친 듯이 땅을 파고 있었다. 스핑크스 아래의 방 안에 수천 년 간 숨겨져 있던 지식이 담겨 있으리라 믿어 의심치 않았기 때문이다. 그 후로 육군 무관의 상태는 거의 나아지지 않았다. 이곳은 정말이지 나쁜 영향만 끼치는 곳이다."
 lepsius.465.f: "우리 탐사대장은 자기가 어디 출신인지, 어떤 언어를 쓰는지, 어떤 음식을 좋아하는지, 어떤 문화를 우월하다 생각하는지 전혀 숨기질 않는다. 현지인들을 향한 모욕은 날로 갈수록 심해지는데 우리가 데려가는 조력자든, 낯선 사람이든 가리지를 않는다. 탐사대장은 여러 마을을 거치면서 촌장들을 부하처럼 대하게 되었다. 아무리 극진한 환대를 베풀어도 [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe]에게는 충분치 않다. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName]의 오만하고 품격 떨어지는 행동에 대해 현지 정부의 각 부처에 이미 수차례 불만이 제기되었고, 우리 탐사대는 점차 조국의 평판을 떨어뜨리는 무리로 전락하고 있다."
 lepsius.467.f: "중동에는 옛 기독교의 흔적이 남은 곳이 그리 많지 않다. 콥트교, 마론파, 칼데아인, 아르메니아인 등의 기독교 공동체로 흩어져 수백 년 동안 존속되어 왔을 뿐이다. 사실 탐사에 나설 적만 해도 종교적 의향은 전혀 없었던 [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] 대장은 어젯밤 현지 사제의 안내로 오래토록 잊혀진 교회로 향하게 되었다. 고고학적으로도 역사학적으로도 흥미로운 이 유적에서 사제는 비로소 오랫동안 소실된 것으로 여겨졌던 교부의 유물이 담긴 성유물함을 보여주었다. 이미 시간이 늦은 데다 본거지도 멀리 떨어져 있었기에 대장은 그곳에서 하룻밤을 보내고 다음날 아침까지 머물렀다. 그때 꾸었던 어떤 꿈이 [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe]를 가만 쉬게 놔두지 못하였는데, 주변에도 털어놓기 어려워했다. 그 꿈으로 대장은 지금껏 살아왔던 삶의 어떤 영역을 바꾸기를 마지않았다. 사제는 대장이 새롭게 마주한 신앙을 간직할 수 있도록 잊혀졌던 유물의 일부를 건네주겠다고 제안하였다."
 lepsius.467.g: "하느님의 얼굴을 직접 보기라도 했단 말인가?"
 lepsius.471.g: "시간을 충분히 들여 그곳에 대해 최대한 많이 알아내는 것이 좋겠다."
 lepsius.471.h: "유물을 가져온다면 오랫동안 머물러도 좋다."
 lepsius.471.i: "그곳을 찾아가도 좋지만 필요 이상으로 머물러서는 아니 된다."
 lepsius.472.f: "[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] 대장이 인력과 보급품의 막대한 손실을 놓고 납득할 수 없는 해명을 하였다. 그야말로 터무니없고 수치스러운 사건이었다. 특히나 이성적으로 사고하는 사람이 보기에는 말이다. 탐사대장의 주장에 따르면 본인이 이끌던 탐사대가 유카탄 반도의 쉽게 들어갈 수 없는 밀림지대에 고지대로 둘러싸인 낯선 계곡에 우연히 발을 들였다가 일주일 동안 실종되었다고 한다. 지금껏 알려지지 않은 마야 유적지를 발견하기를 기대하며 계곡을 탐사할 계획을 세웠으나, 알고 보니 그것은 크나큰 실수가 아닐 수 없었다. 그 계곡에는 무서운 괴수와 거대한 파충류들이 보금자리를 마련해 놓았던 것이었다. 그러니까 탐사대장의 말은 곧 멸종된 공룡들이 수백만 년 동안 그 '잊혀진 세계'에 살고 있었고, 바깥 세상과 고립되어 지금까지 멀쩡히 남아 있었다는 이야기였다. 공룡들은 탐사대를 공포에 빠뜨렸고 여러 짐꾼과 연구원들을 가차없이 잡아먹었다. 그 길로 도망치게 된 대장은 연구 장비 상당수를 포기할 수밖에 없었다. 그리고 이제는 우리 정부에 탐사대 전체를 다시 꾸리게 해 달라고 애원하고 있다. 이 사람이 이런 허황된 이야기로 우리를 설득하려 하는지는 이해할 수 없는 부분이다. 오히려 이런 사람이 그런 중책을 이끌 만한 적임자인지 의문이 드는 상황이다!"
 lepsius.472.g: "공룡들이 우리 탐사대를 잡아먹었다 이 말이오?!"
 lepsius.501.h: "좀 더 조사에 나설 수 있도록 돕자."
 lepsius.506.f_engine: "Unfortunately, our expedition members hardly had time to explore the tomb of the Unknown Pharaoh in more detail. Rocks crumbled from the ceiling and sand trickled through upper cracks as our archaeologists hacked their way through the burial chamber. Apparently the environment consisted of a much more porous rock than assumed; and the detached boulder had finished the construction. With quick wits, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] stayed the course despite the risk and fought [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] way to the sarcophagus to have all available men take it out. A magnificent, unique piece that will probably console us for the loss of the remaining finds - after all, the entire royal tomb threatens to collapse within minutes ..."
 lepsius.506.f_muscular: "It was a truly historic experience when [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName], entered the actual burial chamber. A special surprise awaited [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim]: the sarcophagus together with the mummy of the Unknown Pharaoh still rested where he was buried more than 3,000 years ago! Again, the incomparably strong Paduan was to help us - and lift the wooden sarcophagus and mummy out of the granite enclosure. But as happy as our archaeologists were at first, their later unhappiness was greater. During the lunch break, as the team shared bread in the decorated gallery, a terrible crunching and cracking sounded from the burial chamber. To the horror of the excavation helpers and our expedition leader, the giant muscle man had also allowed himself a break - and accidentally sat on the sarcophagus. Only scraps remain of the king mummy and the wooden coffin..."
 lepsius.532.f: "The military attaché has repeatedly warned against entering Kurdish territory. Past expeditions to this area have not had good experiences with the locals. The Kurds are considered free, honorable - but also proud. Invading their territory might anger them. [SCOPE.sCharacter('lepsius_military_attache').GetFullName] has therefore insisted on arming several men in order to be able to more effectively combat unpleasant incidents. While the attaché is expecting the worst, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] would like to find the Kurdish tribe as quickly as possible in order to negotiate with them and find an amicable settlement in order to quickly get the Lamassu into [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] own hands. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] proposes splitting up the troops: the unarmed men, untrained porters, and most of the provisions and equipment should stay behind while [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] goes ahead with the military attaché to create a more flexible force that can efficiently search for the lamassu. The attaché, on the other hand, expressed his concern that the remaining part of the expedition would then be completely helpless in the event of a Kurdish attack."
 lepsius.534.f: "Far too late, the expedition leader realized that his latest attempt to win favor with the native tribes produced the opposite of what [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] had intended. A shriek went through the tent, and instinctively some of the subordinates were already laying their hands on their weapons. Tension was in the air from then on, and the military attaché saw his concern confirmed that this conflict could not be settled with diplomacy, but only with violence. He only has a short time to line up the men he has brought with him. Some research assistants are already insisting on packing up and gaining as much distance as possible."
 lepsius.551.f: "[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullNameNoFormatting] had worked late that day. The Greek sun brooded on [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] head, the wind from the mountains and from the sea remained absent. The boring and tedious cataloging of dull archaeological objects dragged on for days. The finds often amounted to only measly fragments of broken glass and chicken bones left behind, which the archaeologist attributed less to the Minoan food culture and more to the proletarian eating manners of the excavation helpers. In a mood of weariness and resignation, [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] strolled the sprawling grounds of a little-explored palace complex. The last time [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastNameNoFormatting] was sighted was near a structure classified as late Bronze Age or early Archaic. A crash echoed through the Cretan hills, drowning out cicadas and startling doves as the archaeologist broke through the ground - and despite a two-day search could not be found."
 lepsius.552.d: "[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullNameNoFormatting](이)가 의식을 되찾고 자신이 낮선 지하 건물에 갇혀 있는 것을 깨달았다."
 lepsius.552.f: "그것은 아마도 고고학 대장으로 살아온 한평생 가장 기인한 경험이었을 것이다. 처음에는 사람이 겨우 들어갈 만한 토끼굴에라도 빠진 느낌이었다. 굴 속은 너무 좁고 모래와 진흙으로 가득차 있어, 마치 모래늪처럼 끔찍하게 깊은 곳까지 밀어넣었다. 누구도 따라갈 수 없고 굴 아래로 햇빛이 전혀 들어오지도 않아 아무것도 볼 수 없었다. 손바닥에는 석판이 부딪히는 느낌을 받았다. 조명의 불빛 속에서 매끄럽게 다듬어진 벽을 알아보았다. 벽에는 색칠한 흔적이 남아 있었다. 잊혀진 문명의 프레스코화였다. 처음에는 미노아 문명의 것으로 짐작했지만 머지않아 어느 시대의 것인지 알 수 없게 되었다. 미노아 문명에서 미케네 문명으로의 전환기에 해당되는 듯했다. 주위를 둘러보던 [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastNameNoFormatting](은)는 메가론처럼 널찍한 공간에 들어섰음을 깨달았다. 고고학자는 텅 빈 공간에 울려 버지는 본인의 발소리를 들으며 천천히 앞으로 나아갔다. 장식도 물건도 별 이렇다 할 특징도 없는 복도가 이어지고, 갈림길과 방과 막다른 길이 나타났다. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastNameNoFormatting](은)는 전체 모습을 알 수 없는 고대의 미궁에 들어섰다는 결론을 내렸다. 조금씩 탐험해 나간다고 생각할 수록, 그 규모는 커지고 더 알 수 없게 되어버리는 것이다..."
 lepsius.553.d: "After some time of trial and error, [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullNameNoFormatting] realizes that [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] has arrived at the starting point of the labyrinth..."
 lepsius.553.f: "Legs heavy, head foggy - could it be that [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] had been here before? The spot on the plates where [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] landed when [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] fell from above is unmistakable. And with growing horror the question arises: how long was [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] here? How many hours had passed? Maybe days? And would [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] find out before hunger and thirst tormented him to death...?"
 lepsius.554.d: "In the labyrinth, the missing person comes across a mosaic. The question is whether [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] chooses one of the two corridors or the stairs."
 lepsius.554.f: "After corridors and stairs without distinction, [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullNameNoFormatting] reaches a larger room. A corridor opens to the left and right, and a staircase leads up and down. A mosaic on the floor catches the eye. A sea scene confirms the thesis that the walls may come from Minoan times, while the rare jewelry bears witness to Mycenaean influences. The gods depicted are predecessors of the classical Greek pantheon. Surrounded by dolphins, father of the gods Zeus stretches his arm in the air with a thunderbolt. Demeter and Persephone point to the west, ears of corn in hand; Artemis is accompanied by two lions looking east. Finally Poseidon, the father of the gods of the Mycenaeans: with a trident he makes the earth tremble beneath him."
 lepsius.557.d: "In a hall, [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullNameNoFormatting] again encounters a riddle."
 lepsius.557.f: "Four passes. Four pictures. Above each passage, the prisoner of the labyrinth can see outlines engraved in stone. It takes some time before [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] realizes that these are the shores of islands. Based on [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] experiences on Crete, [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] can roughly assign them. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe|U] assigns the first passage to the island of Rhodes; the second of the island of Delos; the third of the island of Euoboea; the fourth of the island of Naxos. Unfortunately, [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] cannot find any further clues."
 lepsius.558.d: "After several days, our excavation team found the missing archaeologist near a cliff. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullNameNoFormatting] was completely exhausted - and has been mentally confused ever since."
 lepsius.558.f: "It remains a mystery where [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullNameNoFormatting] has been for the past 72 hours. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe|U] was found a few miles from the actual excavation site - in a pitiful condition, as if mauled by a wild animal. Although [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] has since regained consciousness, the expedition doctor believes [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] must have received a severe blow to the head. At least [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] language center seems disturbed. Again and again [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] falls into an almost delusional style when [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] has to tell what happened. The team has left the area because they are concerned [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] might go on a quest again - to prove [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe]'s not crazy."
 lepsius.559.f: "The police examined the body of the former archaeologist yesterday evening. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullNameNoFormatting] became known to the public mainly because of a mental illness after [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] went missing under mysterious circumstances during an excavation on Crete and was found again days later under just as mysterious circumstances. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe|U] just hasn't been the same person since then. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe|U] feared being alone, thought [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] saw monsters in the shadows. In the end [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] only slept when the light was on because nightmares kept [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim] awake all night. In the last days of [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] life, Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastNameNoFormatting] had not only become heavily dependent on medication and had visibly deteriorated both physically and mentally, but [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] had also drawn the ridicule of [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] academic colleagues because of abstruse claims about [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] Crete research. Despised by the scientific world, ridiculed in newspapers and visually reduced to a caricature of [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] former self, investigators agree that [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] took [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] own life."
 lepsius.560.f: "At first Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastNameNoFormatting] was surprised how far away from the old excavation site [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] finally saw the sun again. It was several hours before [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] rejoined the rest of the digging mission, much to the relief of [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] colleagues. There, to the surprise of those present, [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] was able to report on [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] find - a truly magnificent discovery that could perhaps change the way we have interpreted the myths of the ancient Greeks. A mysterious ball of fabric that [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] found there allows only one conclusion."
 lepsius.561.f: "Haze hangs over the Yucatec hills as the column pushes through the selva. Jaguars cry in the distance; the air hums with mosquitoes, and fever fells more than one of our helpers. What remains is a party of three and a few porters. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] signals a halt. Stelae and carved stones stud the ground; half-buried steps, slick with moss, climb a broken terrace. The outline of a Maya pyramid emerges. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe|U] cocks an ear as a porter raises his hand and calls: 'Patrón—an opening!'"
 lepsius.562.f: "Insisting on entering alone, the expedition leader passes the bleached bones of an earlier intruder and confronts a panel crowded with glyphs. Four recessed cartouches—visages of great gods—can be pressed like keys. Beneath them runs the distich: the one who rises in the east, blazes at zenith, descends at dusk, and keeps the count of days. The device is plainly a test; one mistake could be [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetHerHis] undoing."
 lepsius.563.f: "Footfalls echo in a narrow passage. By torch‑light the walls glimmer with engravings; roots of giant trees bite through a fallen lintel. Beyond, a chamber opens—a low altar at its heart, an idol glinting faintly in the gloom. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe|U] weighs a satchel of sand in [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetHerHis] left hand, judges the idol’s mass with the right, and steadies [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetHerHis] breath. One clean exchange—then out."
 lepsius.564.d: "It may be that [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] read the riddle amiss—or merely that the builders trusted no one. A thunder rolls; a stone sphere tears free and barrels down the corridor toward [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetHerHim]."
 lepsius.564.f: "The switch is made; the bag rests upon the altar. For a heartbeat nothing moves. Then a dull tremor builds, dust sifts from the ceiling, and a roar answers from above—it is a gigantic rolling boulder!"
 lepsius.565.d_wrong: "When [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] stumbles into the light, a worse surprise awaits: the camp has been overrun, and armed men demand the idol—or [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetHerHis] life."
 lepsius.565.f_right: "It was an affair of wit, not muscle. Choosing K'inich Ajaw, the Sun Lord who 'keeps the count of days,' spared [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetHerHim] the device’s malice. Slipping through the contrivances unscathed, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] secures the idol and hastens out; word reaches [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetHerHim] that a rival party is on the way, and so the team quits the site at once."
 lepsius.565.f_wrong_right: "As [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] flees the passage, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] catches a root and swings clear while the stone hurtles past and bursts into the jungle. Outside lie scattered spears and fallen men—the wreckage of an ambush undone by the same trap. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe|U] cannot prove it, but the scene bears the touch of a foreign rival who meant to let us spring the hazards for him. No matter—time to move on."
 lepsius.565.f_wrong: "With a final leap [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] gains the threshold—only to be ringed by bowmen. A suave voice with a soft [SCOPE.sCountry('lepsius_archaeological_rival').GetAdjectiveNoFlag] accent drifts from the trees as a man in pale linen steps forward: 'A pleasure at last. But this piece belongs in better hands.' Outnumbered and with the porters slain, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe|U] yields the idol. 'Too bad the Hovitos do not know you as I do,' [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] mutters—and seizes a chance to escape, empty‑handed."
 lepsius.581.d: "[SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] has come forward with a personal concern: [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] wants to prove that the \"Lost World\" actually exists and thus restore his honor. [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe|U]'s raising money for a private expedition."
 lepsius.581.f: "Several years have passed since much of the Yucatán expedition mysteriously disappeared. [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] has since become the laughingstock of the academy. Cartoons in the newspapers portray [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHim] as crazy with [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHis] 'Dino stories'. The trauma has left deep scars: [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] is obsessed with proving to the world that the alleged valley is real. [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe|U] is said to have now spent [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHis] entire inheritance to set up an expedition at [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHis] own expense. Of course, [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] also asked the state for support for [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHis] completely insane journey. Our experts advise against this suicide mission - everyone knows how the last expedition to Yucatán went. There are therefore voices that want to forbid such an expedition altogether. However, this could only aggravate [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHis] mental state. Still others think [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] should be let go, but without further official interference; after all, nobody wants to be associated with the journey of an apparently mentally disturbed man. Only a minority even thinks to open their wallets for this madness. They argue that we have an alleged responsibility for [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHis] condition..."
 lepsius.581.h: "May [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] hunt [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHis] dinosaurs."
 lepsius.582.f: "Months after [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] disappeared into the forests of Yucatán, the exhausted adventurer reappeared in the provincial capital of Mérida. Again [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] had lost many helpers and the rest of [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHis] troupe was in a sorry state. Alongside a number of witnesses, however, [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] had one compelling piece of evidence: thanks to modern photographs, verified as authentic by several scholars, [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] has unbeatable claims for [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHis] wild stories. And indeed: one can clearly see pterosaurs and herbivorous brontosaurs on the illustrations! The people celebrate [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] as an idol, the professional world is shocked, and our government is seen as a stubborn group of ignoramuses who have denied a national hero the fame [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] deserves!"
 lepsius.583.d: "We haven't heard from [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] for months. Apparently [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] is lost in the unknown depths of the Yucatán forest."
 lepsius.583.f: "Perhaps one day tragic plays could be made about the matter. [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName], who was close to mad shortly before [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHis] life, apparently searched for traces of the alleged dinosaur valley to the last. Disease and hostile Mayan tribes killed [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHis] expedition. One of the few survivors reports that [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] last claimed to have rediscovered the slopes of the plateau in which the valley lies. But the last of the men would have mutinied and gone home. Nobody knows what became of [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHim]. However, we have reason to believe that alone and emaciated, [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] had little chance of surviving whatever ultimately killed [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHim]."
 lepsius.583.g: "[SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe|U] really wasn't a bad guy. A bad explorer yes, but noch a bad guy."
 lepsius.584.f: "Actually, everyone had expected that this journey would not be long: either because the circumstances condemned the men to death or a mutiny would break out. The discovery one morning was all the more astonishing. [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] had been leading the troop through the impenetrable forests of Yucatán for days like a manic prospector. It seemed as if [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] recognized every tree and every stone. The other expedition members had taken this as either madness or part of an elaborate plan to deceive them and give them false hope. But now, on the slopes of a vast plateau, in the hollow of which lies the fabled valley [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe]'s been talking about for years, some are revising their views. The scream of a pterodactyl reverberates through the air and pierces through the ears of the participants so deeply that all doubts are dispelled."
 lepsius.586.f: "Actually, [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] should be satisfied: [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] was right with all [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHis] claims. The team has already collected a whole range of evidence that should cause a sensation at home. But on closer exploration of the Lost World, it turns out more and more that [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] was not the first person in this valley. In fact, there seems to have been a significant Mayan presence in this area around 1,500 years ago. Apparently, the inhabitants of a hitherto unknown Mayan city came to this valley at regular intervals. [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] speculates that the tradition of human sacrifice might have its origins here. Be that as it may, there is strong evidence that the valley served a religious function. A collaborator recently unearthed Mayan artifacts, suggesting that their discovery might cause an even greater sensation than a few scattered giant lizards. The problem: the suspected Mayan site is in the middle of an area inhabited by raptors! Most of the expedition members therefore insist on returning home immediately instead of letting one suicide mission follow the next."
 lepsius.587.f: "Only one survivor. Nothing more is left of the expedition. It is a young research assistant at the university. He is traumatized and physically in poor condition. So reports a telegram from Yucatán. You couldn't squeeze a lot out of him. Apparently, our expedition leader made a crucial, tragic mistake when attempting to survey a Mayan site in the Lost World. A mistake for which almost all members of the expedition paid with their lives. The incident caused such a shock that all trips to the Yucatán that were not strictly archaeological were banned indefinitely."
 lepsius.587.g: "[SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe|U] chose ... poorly."
 lepsius.588.f: "Kukulkan was known to the Mayans as the feathered serpent - a deity worshiped by the Aztecs under the name Quetzalcoatl. Was it a coincidence that the Maya knew of this valley? Was there a connection between the Lost World and the Kukulkan cult? [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] cannot decide this yet. What [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] did discover, however, was that between raptor nests lay a long-forgotten sanctuary that represented the feathered serpent that is called Kukulkan in this country. A mysterious gem set in an amulet was striking. It is of such amazing beauty that the expedition leader dubbed it the 'Gem of Kulkulkan' - the deity possessed a jewel with which he could control the wind. It is probably one of the greatest archaeological finds of Central and South America."
 lepsius.588.g: "[SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe|U] chose wisely."
 lepsius.589.d: "Our expedition from the Lost World led by [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] has returned. [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe|U] and his team are celebrated as heroes by the people."
 lepsius.589.g: "[SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHim]에 영광을!"
 lepsius.803.d: "[SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] has completed his travel preparations. [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetSheHe|U] will leave today to advance the knowledge at an already established excavation site."
 lepsius.803.f: "The absence of our archaeologist is expected to be around a year but may vary depending on the situation. At the end of [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetHerHis] activity [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetSheHe] will open up a new excavation site, the quality of which may vary. [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetSheHe] will also find references to previously unknown archaeological sites."
 lepsius.811.f_vok: "[SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] reports that [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetSheHe] has discovered a small tomb in the Valley of the Kings. Grave robbers have apparently already stolen a large number of objects, and graffiti shows that it was also known in Late Antiquity. The expedition leaders decided to carry out an excavation there in the hope of being able to report more finds later."
 lepsius.811.f_ass: "The excavation in Assyria had its difficulties from the start. After a few days, [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] still couldn't find a good excavation site, so [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetSheHe] contented himself with the next best site. So far they have only uncovered the foundations of a shrine that may have once been part of a larger complex."
 lepsius.812.f_bab: "Times have not devoured all the witnesses of Babylonian greatness in Mesopotamia. After [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] had refreshed [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetHerHis] water supplies, locals told [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetHerHim] about a strange ruin that the devout Muslims in the region avoid because of their pagan origins. As it turned out, it is the remainder of a ziggurat. The complex is surprisingly well preserved and according to the latest reports, our archaeologists have even unearthed the first finds."
 lepsius.813.f_vok: "A sensational telegram arrived this morning. [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] reports that [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetSheHe] has discovered the tomb of a Queen. The identity of the dead consort is not entirely clear, but according to initial reports the burial chamber is surprisingly intact. Wall paintings and valuable artifacts give a valuable insight into Ancient Egypt that has not been known for a long time."
 lepsius.813.f_bab: "Legends of the Babylonian gates and city walls have survived for thousands of years. But it is always something else when they are in front of you. At first, [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] couldn't believe it as [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetSheHe] walked wall after wall and discovered the enormous dimensions of a lost city. This discovery will keep us busy for years to come."
 lepsius.813.f_ass: "In addition to being a major military power, the Assyrians were also famous for their gardens. Some even claim that the famous Gardens of Babylon were actually located in the Assyrian capital of Nineveh. During the excavation of a palace complex and adjoining terraces, [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] was able to see for [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetHerselfHimself] the splendor of Assyrian culture. The museum management rejoices."
 lepsius.2191.t: "Inca Bathing Complex Unearthed"
 lepsius.2191.d: "Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] unearthed a spectacular find in [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]. The site has revealed a bath complex of the Inca Empire. Initial assumptions are that the complex was used for ritual ceremonies."
 lepsius.2191.f: "\"Isn't it ironic that we dug up a bath and could use a bath ourselves now?\""
 lepsius.2191.g: "A bath would be great right now!"
 lepsius.2192.t: "Inca Skull with a Hole discovered"
 lepsius.2192.d: "A strange Fund was made in [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]. During the excavation of an Inca site, Professor [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] came across a large number of bones. One skull in particular caught [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] eye. The skull had a hole that appeared to have been made on purpose. Apparently, the deceased survived the trial, as the hole had partially closed again."
 lepsius.2192.f: "\"I'm sure it must have been a human sacrifice! What do you think?\""
 lepsius.2192.g: "Aliens!"
 lepsius_recent_excavation_inspection_modifier: "최근에 고고학 사찰에 나섬"
 lepsius.2193.t: "Incan Mountain Mummies"
 lepsius.2193.d: "During an expedition with [SCOPE.sCharacter('lepsius_mountaineer_character_scope').GetFullName] in [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName], Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] made a shocking discovery. On a mountain they found the remains of a young girl, who was now mummuified. It seems that she was a \"qhapaq hucha\" of the Incans, a child sacrifice. Although it is a sad find it could lead to various new insights into the Inca."
 lepsius.2193.f: "\"It was ice cold, the wind the wind tore at our clothes and we could barely see anything. When we noticed the body, we first thought that it was a mountaineer who died in similar circumstances that we had to endure now. But soon we realized that it was not a mountaineer but a young girl.\""
 lepsius.2193.g: "This is quite sad."
 lepsius.2194.t: "Inca Ruins"
 lepsius.2194.d: "Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] made a discovery in a far of region of [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]. He found various ruins from the time of the Inca Empire. Most of the ruins are scorched and some European equipment was found, which led to the idea that this settlement was destroyed by the Spanish. They probably also plundered the settlement, as no other finds were made. Everything of value seemed to have been removed."
 lepsius.2194.f: "\"A long time ago those ruins must have been well constructed dwellings. They seem to be able to withstand even earthquakes. Just... Spanish invaders seem to be stronger than earthquakes apparently.\""
 lepsius.2194.g: "No gold? Why even bother?"
