 lepsius.714.t: "클레오파트라의 첨탑"
 lepsius.714.d: "이제 현지 당국과의 최종 협상이 마무리되면서 '클레오파트라의 첨탑'의 해체와 운송, 재건을 막을 장애물은 사라지게 되었다. 이번 사업은 고고학과 토목학계에서 대단히 중요한 사업이 되었다!"
 lepsius.714.f: "역사적인 해체가 이루어지기 전까지 두 '첨탑'은 알렉산드리아의 카이사레움에 수백 년 동안 반쯤 잊혀진 기념물로 남아 있었다. 하나는 여전히 똑바로 서 있었고, 다른 하나는 이미 사막의 모래 속으로 파묻혀 들어갔다. 식민주의 시대에 처음 진입하고 이집트마니아 열풍이 불면서 이 거대 오벨리스크를 서방의 수도로 옮겨 국가 주권과 과학 정복의 강력한 상징으로 삼으려는 발상이 여러 차례 제기되었으나, 처음에는 운반 과정의 엄청난 난관 탓에 계획이 실패로 돌아가곤 했다. 유럽인들의 눈에 이 두 첨탑은 고대 세계 최대의 거대 기둥으로 꼽히는 폼페이 기둥과 함께 알렉산드리아의 풍경을 장식하는 삼인조 상징으로서, 파라오의 시대에서 고대 그리스 로마 시대의 화려함으로 전환되었다는 것을 보여주는 증표였다. 폼페이 기둥은 규모도 거대했고 세라페움 고원에 단단히 고정되어 건드릴 수 없는 기념물로 제자리에 남았지만, 오벨리스크의 경우 점차 외교상의 교역품으로 여겨지다가 마침내 무하마드 알리 파샤 총독의 값진 선물로 바다 건너 여정을 떠나게 되었다."
 lepsius.714.g: "오벨리스크를 [ROOT.GetCountry.GetCapital.GetCityHubName]에 보내라!"
 lepsius.715.t: "클레오파트라의 첨탑"
 lepsius.715.d: "오늘 오벨리스크가 [ROOT.GetCountry.GetCapital.GetCityHubName]에 도착하여 성대한 공개 기념 행사와 함께 시민들의 열렬한 환영을 받고 있다."
 lepsius.715.f: "런던에 위치한 '클레오파트라의 첨탑'은 1878년 특별히 제작된 철제 원통형 부표에 실려 런던에 도착했다. 오는 길에 비자야만에서 심한 폭풍우를 만나 하마터면 배가 전복될 뻔하면서 선원 6명이 목숨을 잃은 사고도 있었다. 뉴욕에 자리한 오벨리스크는 1881년 센트럴 파크에 세워졌는데, 섬세하게 개조된 증기선으로 운반한 뒤 거대한 나무 비계를 이용해 한 칸씩 조심스럽게 옮겨져 제자리에 설치되었다. 두 오벨리스크 모두 도착 당시 성대한 기념식을 거행했으며, 오늘날에도 현대적인 대도시 한가운데 고대 이집트의 인상적인 상징으로 자리매김하고 있다."
 lepsius.715.g: "이것으로 세계 무대에서 우리의 제국적 야망을 굳히게 될 것이다!"
 lepsius.773.t: "피에다스 네그라스 비석"
 lepsius.773.d: "이제 현지 당국과의 최종 협상이 마무리되면서 피에드라 네그라스 비석의 해체와 운송, 재건을 막을 장애물은 사라지게 되었다. 이번 사업은 고고학과 토목학계에서 대단히 중요한 사업이 되었다!"
 lepsius.773.f: "피에드라스 네그라스 비석는 오늘날 과테말라에 위치한 고대 마야 도시 피에드라스 네그라스에서 발견된 일련의 거대한 석조 조각이다. 화려한 의상을 입은 통치자가 특유의 '페텐 양식'으로 조각된 것이 많으며, 때로는 앉아 있거나 포로 위에 서 있는 모습을  벽감에 새겨넣은 모습을 취하고 있다. 이 비석들은 뛰어난 예술적 가치와 역사적 중요성으로 세계적으로 이름나 있다. 오늘날 이 비석들 중 상당수는 과테말라시티의 국립 고고학 민족학 박물관과 펜실베이니아 대학교 박물관에 보존되어 있다."
 lepsius.773.g: "비석을 [ROOT.GetCountry.GetCapital.GetCityHubName]에 보내라!"
 lepsius.774.t: "피에다스 네그라스 비석"
 lepsius.774.d: "오늘 [ROOT.GetCountry.GetCapital.GetCityHubName]의 고고학 박물관에서 공개 전시를 개최하며 피에드라 네그라스 비석을 일반 관람객에게 선보였다."
 lepsius.774.f: "피에드라 네그라 비석은 펜실베이니아 대학교 박물관(펜 박물관)에 도착한 뒤 새단장을 마친 마야 전시관의 대표 전시품이 되어 서양 관객들에게 첫선을 보였다. 정교한 부조가 더 이상 훼손되지 않도록 보호하고 연구 목적으로 활용할 수 있도록 첨단 기술 장비를 동원하여 거대한 조각을 영구히 설치한 것이 특징이다. 오늘날까지도 이 비석들은 마야 상형문자를 해독하는 데 중요한 자료로 활용되고 있으며, 피에드라스 네그라스에 있던 고대 도시의 장엄함을 입증하고 있다."
 lepsius.774.g: "거대한 유물이군. 마음에 들어!"
 lepsius.2256.t: "악숨의 오벨리스크"
 lepsius.2256.d: "오늘 오벨리스크가 [ROOT.GetCountry.GetCapital.GetCityHubName]에 도착하여 성대한 공개 기념 행사와 함께 시민들의 열렬한 환영을 받고 있다."
 lepsius.2256.f: "악숨의 오벨리스크는 1937년 파시스트 정권 치하 이탈리아의 전리품으로 로마에 도착하였다. 무솔리니의 명에 따라 에티오피아 현지에서 해체된 악숨 오벨리스크는 수송 상의 엄청난 난관을 거쳐 선박으로 운송되었다. 식민지부 청사 앞에 다시 세워진 악숨 오벨리스크는 수십 년 동안 로마 시의 경관에서 이탈리아 제국의 승리를 상징하는 기념물로 자리매김했다. 총무게 150톤에 달하는 이 오벨리스크는 오랜 외교 협상과 기술 여건 마련 끝에 2005년 에티오피아로 반환되었고, 2008년 원래의 고고학 단지로 다시 세워지게 되었다."
 lepsius.2256.g: "이것으로 세계 무대에서 우리의 제국적 야망을 굳히게 될 것이다!"
