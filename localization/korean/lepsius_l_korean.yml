 lepsius_mascapaicha_knowledge_modifier: "Knowledge of the Elders"
 je_lepsius_mascapaicha: "Decoding the Quipu"
 je_lepsius_mascapaicha_reason: "The Quipu investigation has so far raised more questions than it has answered. One thing is certain: it is a naming of places that can be assigned to a sequence, with numbers representing different tribes, the sequence of which in turn indicates a kind of route. In short: the Quipu is a kind of treasure map. Only an experienced archaeologist can fully decipher this mystery. What the Incas hid so carefully is still unclear; To recover it, we should put together a small special team that does not consist of an ordinary expedition team: in addition to the archaeologist and the attaché, we also need a pilot who will fly us directly into the Andes."
 je_lepsius_mascapaicha_success: "Has decoded the Quipu."
 lepsius_decode_quipu_button: "Decode the Quipu"
 lepsius_decode_quipu_button_desc: "To successfully decode the Quipu it requires an experienced or famous archaeologist and a department trained on Mesoamerican artifacts."
 lepsius_decode_quipu_tt: "키푸가 일정 시간을 거쳐 해독됩니다."
 lepsius_decode_quipu_done_tt: "키푸가 해독됩니다."
 lepsius.474.t: "The Mysterious Quipu"
 lepsius.474.d: "The Peruvian guide led the expedition team to a secret location that even many locals don't know about. They find a strange object in an abandoned temple building that has not been entered for at least four hundred years."
 lepsius.474.f: "[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] immediately senses that something is unique about this place. This temple appears to have been abandoned before the Spanish conquest. It was not the invasion, but rather the oblivion that was the building's downfall. At first glance, there were disappointingly few remains that provide information about the life of the Incas before Francisco Pizarro's arrival. The team is content with the mandatory archaeological exercises when an assistant finds an ominous object on an altar-like block. It is a Quipu, the bundle of knots with which the Inca communicated numbers, statistics and data. However, it is so complex that it is difficult to decipher on site."
 lepsius.474.g: "It should be examined more closely at home."
 lepsius.571.t: "Secret of the Quipu"
 lepsius.571.d: "Even the academics at home are having a hard time deciphering the quipu that the last Peru expedition brought back. Scientists now agree that it is more than just a record of numbers."
 lepsius.571.f: "After a closer examination and comparisons with previously known knot systems, scientists from several universities and employees of the Archaeological Museum came to the conclusion that the knots demonstrate an already known system. At first glance, this made little sense - assuming that it was purely a tax list or a census. In reality it is a collection of places. The names were known from other Quipu records, but refer less to place names than to the settlement points of certain clans. The most widespread theory is that it is similar to an instruction to directions. Where it leads is unclear."
 lepsius.571.g: "This knot bundle... is a map?"
 lepsius.572.t: "Quest for the Mascapaicha"
 lepsius.572.d: "[SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName] not only believes [SCOPE.sCharacter('lepsius_archaeologist_scope').GetSheHe] has discovered the location to which the encrypted map leads - [SCOPE.sCharacter('lepsius_archaeologist_scope').GetSheHe] also has a theory as to what it could lead. Together with [SCOPE.sCharacter('lepsius_pilot_scope').GetFullName] and [SCOPE.sCharacter('lepsius_archaeologist_attache').GetFullName] [SCOPE.sCharacter('lepsius_archaeologist_scope').GetSheHe] goes on a special mission to the highest altitudes of the Andes."
 lepsius.572.f: "It was difficult to get the secret out of the Quipu. It was confirmed that the notes were of a geographical nature, intended to lead to a place; a place so remote that it was almost impossible to reach. [SCOPE.sCharacter('lepsius_pilot_scope').GetLastName] had pointed out that one should not have too high hopes of finding a runway large enough to bring a plane back to the ground in this inhospitable area. However, military records showed a convenient plateau for this purpose that was close to the target location. Of that it was only about a 10 mile walk. On the flight to Peru, Prof. [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] opened up [SCOPE.sCharacter('lepsius_archaeologist_scope').GetHerHis] theory to the two of them about what could be there. The fact that the building in which the Quipu was located suggests that it was probably built around the time of the Emperor Huayna Capac, before the Inca Empire sank in the civil war between Huascar and Atahualpa. At the site, he speculated, there could be something from the time before the collapse of the empire and its subsequent downfall. Something that represented the imperial unity and greatness of the Incas and was so precious that it had been hidden from Atahualpa because he was considered by many to be an illegitimate ruler who had staged a coup against his brother Huascar. An object that represented the power of the Sapa Inca like no other and was considered lost: the crown of Huayna Capac. The Mascapaicha."
 lepsius.572.g: "That would be an archaeological sensation."
 lepsius.573.d: "[SCOPE.sCharacter('lepsius_pilot_scope').GetFullName] finds a suitable landing site near the destination. However, on their way to the suspected location of the Mascapaicha, the trio soon comes across a spectacular discovery."
 lepsius.573.f: "With the quipu in [SCOPE.sCharacter('lepsius_archaeologist_scope').GetHerHis] hand like a dowsing route, [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] led the small group to a mountainside. Steps were set there like wedges at dizzying heights. The trio climbs the first few meters and then finds an overgrown path. A brief inspection by the archaeologist leaves no doubt. The precisely placed cuboids are clearly from the times of the Incas. They follow the Inca Road into a valley dominated by fog, which was not visible from the plane. They wade through mile after mile. Suddenly [SCOPE.sCharacter('lepsius_pilot_scope').GetLastName] discovers something. Despite the fog, a sparkle stands out from the haze. It's gold. Pure gold. Massive gold! A gigantic idol, tall as a three-story building, stands out from the mist. [SCOPE.sCharacter('lepsius_pilot_scope').GetLastName] leaves the path and approaches. [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] wants to call [SCOPE.sCharacter('lepsius_archaeologist_scope').GetHerHim] back that this could be a trap. The distraction could be dangerous. [SCOPE.sCharacter('lepsius_attache_scope').GetLastName], however, remains undecided."
 lepsius.573.g: "A little gold won't hurt."
 lepsius.573.h: "Only the humble man will find the Mascapaicha."
 lepsius.574.d: "The trio continued on their way. But suddenly [SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName] finds something that stops him. [SCOPE.sCharacter('lepsius_pilot_scope').GetFullName] and [SCOPE.sCharacter('lepsius_attache_scope').GetFullName] have already walked several meters when they notice that the professor is missing."
 lepsius.574.f: "It was an inscription. An inscription? Epigraphic sources in the Andes? In a society whose nodal system had no function corresponding to the alphabet? That alone was an incredible discovery! The Maya relied on hieroglyphs, the Aztecs based their codices on pictograms. But that was a font with letter-like accents. Could this have happened? And what amazed [SCOPE.sCharacter('lepsius_archaoelogist_scope').GetLastName] even more:\n[SCOPE.sCharacter('lepsius_archaeologist_scope').GetSheHe] could read them.\nWithout prior knowledge. Without studying. Without ever even remotely understanding how this could have happened. It was as if [SCOPE.sCharacter('lepsius_archaeologist_scope').GetSheHe] dipped a finger into the carved writing and absorbed the contents. [SCOPE.sCharacter('lepsius_archaeologist_scope').GetSheHe] didn't read them. The Scripture spoke to [SCOPE.sCharacter('lepsius_archaeologist_scope').GetHerHim]. And the longer [SCOPE.sCharacter('lepsius_archaeologist_scope').GetSheHe] immersed [SCOPE.sCharacter('lepsius_archaeologist_scope').GetHerselfHimself], the more overwhelming was what [SCOPE.sCharacter('lepsius_archaeologist_scope').GetSheHe] learned. Because knowledge was stored here. Centuries-old, millennia-old knowledge from all cultures of South and Central America. Completely absorbed in this glorious discovery, [SCOPE.sCharacter('lepsius_archaeologist_scope').GetSheHe] doesn't notice how the attaché shakes [SCOPE.sCharacter('lepsius_archaeologist_scope').GetHerHim], tries to drag [SCOPE.sCharacter('lepsius_archaeologist_scope').GetHerHim] away - the pilot stands by, indecisive, looking at the absurd scene before [SCOPE.sCharacter('lepsius_pilot_scope').GetHerHim]."
 lepsius.574.g: "Knowledge is no sin."
 lepsius.575.d: "The group reaches a building that looks not unlike the temple where the mysterious Quipu was once found. They enter the building, led by [SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName], who looks around researchingly. The horrific image of a demon takes up the wall in front of them."
 lepsius.575.f: "The eternal mist that plagued the unknown valley also clouded the temple. It covered walls and statues like a fine dress. [SCOPE.sCharacter('lepsius_pilot_scope').GetLastName] lit a cigarette and added a note of nicotine to the mist. [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] searched the area for clues. But [SCOPE.sCharacter('lepsius_attache_scope').GetLastName] didn't notice anything. [SCOPE.sCharacter('lepsius_attache_scope').GetSheHe] stood face to face with the demon image as if hypnotized. [SCOPE.sCharacter('lepsius_attache_scope').GetHerHis] eyes looked into the grimace of the primal creature. Wind whispered in [SCOPE.sCharacter('lepsius_attache_scope').GetHerHis] ears. Wind that became words. Words that whispered to [SCOPE.sCharacter('lepsius_attache_scope').GetHerHim] to kneel. It was sacred ground [SCOPE.sCharacter('lepsius_attache_scope').GetSheHe] stood on. The ground of a god to whom [SCOPE.sCharacter('lepsius_attache_scope').GetSheHe] had to bow. A God who was a master of the world. Who elevated beggars to kings and entrusted them with the kingdoms of the world. A God who made all the rulers of the world, whether prince or elected, fall down before [SCOPE.sCharacter('lepsius_attache_scope').GetHerHim]. 'I will give you all the power and glory of these kingdoms; for they are mine and I give them to whomever I please. If you prostrate yourself before me and worship me, everything will be yours.'\nCigarette smoke swirled around [SCOPE.sCharacter('lepsius_attache_scope').GetLastName]. The pilot spoke in confused words and tried to beat some sense into [SCOPE.sCharacter('lepsius_attache_scope').GetHerHim]. The archaeologist is there only as a bystander."
 lepsius.575.g: "You have to rule if you want the Mascapaicha."
 lepsius.576.t: "The Mascapaicha"
 lepsius.576.d: "For the first time since they arrived in the valley, the fog cleared. In a hidden chamber that Prof. [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] uncovered, there is nothing but a pedestal. A shadow towers over it. It is the shadow of a fallen empire. The shadow of vanished knowledge. The shadow of lost gold. It is the shadow of the Mascapaicha, the crown of the Sapa Inca."
 lepsius.576.f: "The Mascaipacha was the imperial symbol, worn only by the Sapa Inca as King of Cusco and Emperor of the Tawantinsuyu. It was a chaplet made of layers of many-coloured braid, from which hung the latu, a fringe of the finest red wool, with red tassels fixed to gold tubes. It was decorated with gold threads and a tuft bearing two or three upright feathers from the mountain caracara, a sacred bird called corequenque in Spanish, it was the physical expression of ultimate political power in the Inca Empire. In some ceremonies the Sapa Inca carried the Mascaipacha in his hand, while he wore a war head-dress (a feather-decorated helmet)."
 lepsius.576.g: "This must be the crown of Huayna Capac!"
 lepsius.577.t: "Death in the Andes"
 lepsius.577.d: "The special mission in the Andes was never seen again. No sign of life. No traces. It seems that the expedition's search for the Mascapaicha was fatal."
 lepsius.577.f: "When scientists and secret service agents find out about the progress of the expedition in the Andes, they cannot get any clues. Only the missing crew's plane remains as the only evidence that it must have taken place. The locals say that the landing site would be very close to a cursed valley. Cursed because the people who enter it disappear there. There they would fall under the temptations of demons and die miserably. Scientists have postulated that spores from unknown plants, sulfur fumes or other gases may be responsible for the fog-like haze that could lead to hallucinations."
 lepsius.577.g: "Have they become victims of their own illusions?"
