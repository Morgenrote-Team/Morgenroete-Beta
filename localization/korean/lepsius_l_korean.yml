 lepsius.81.d: "[ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName] 박사가 동굴에서 여러 점의 인간 뼈를 발견하였다. 그러나 여느 인류학자와는 달리 단순히 뼈를 수습하는 데 그치지 않고 발견 당시의 상황을 꼼꼼하게 기록하였다."
 lepsius.81.f: "각각의 뼈마다 정확한 발견 위치를 기록하였다. 그림에 그어진 격자는 발견된 모든 뼈와 유물, 심지어 숯 조각까지 파악하는 데 보탬이 되었다. 이 모든 단서는 선사시대 인류가 무엇을 먹고, 무슨 활동을 하고, 어떻게 살았는가를 보여줄 수 있었다. 어떤 것이든 상세히 기록하는 것이 중요해진 것이다."
 lepsius.81.g: "이제 우리는 더 이상 도굴꾼이 아니다!"
