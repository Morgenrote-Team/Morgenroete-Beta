 lepsius.503g.tt: "근대 고고학을 연구하면 이 선택지가 열립니다."
 lepsius.503h.tt: "대기압 엔진을 연구하면 이 선택지가 열립니다."
 lepsius.503i.tt: "니트로글리세린을 연구하면 이 선택지가 열립니다."
 lepsius.503j.tt: "바위를 치우는 데 도움이 될 만한 힘센 사람들을 찾게 됩니다."
 lepsius.511.tt: "탐사대가 대피라미드 정상 등반을 시도할 것입니다."
 lepsius.514.tt: "탐사대가 이 지점에 국기를 게양합니다."
 lepsius.516.tt: "탐사대가 이번 탐사의 국기 게양 계획을 단념합니다."
 lepsius.521.tt: "이는 우리 조국에 이슈타르 문을 충실히 재현하려는 더 긴 여정의 시작이다."
 lepsius.531.tt: "전설의 라마수를 찾아 떠나는 새롭고도 위험한 여정을 시작합니다."
 lepsius.534.tt: "이 선택지는 군사무관이 경비원을 대동했기 때문에 가능합니다."
 lepsius.551.tt: "무섭고 위험한 곳에서 생존을 위한 싸움을 시작합니다."
 lepsius.561.tt: "[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName](이)가 미지의 피라미드 내부로 진입합니다. 이것으로 알려지지 않은 결과가 발생할 수 있습니다."
