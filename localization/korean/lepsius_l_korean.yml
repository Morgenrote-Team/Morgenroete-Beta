 lepsius.1326.t: "호모 하이델베르겐시스 복원 완료"
 lepsius.1326.d: "[SCOPE.sCharacter('andersson_anthropologist_scope').GetFullName](이)가 유골을 충분히 수집하여 멸종된 인류에 대한 구체적인 결론을 도출할 수 있게 되었다. 호모 하이델베르겐시스는 더 이상 학계에서 미지의 영역에 있지 않으며, 아직은 많은 질문을 남기고 있음에도 인류 계통에서 어느 정도 확실하게 제 위치를 파악할 수 있게 되었다."
 lepsius.1326.f: "호모 하이델베르겐시스는 1907년 독일 하이델베르크 인근의 마우어 마을에 있는 모래 구덩이에서 다니엘 하르트만이라는 인부가 아래턱뼈를 처음 발견하고, 1908년 해부학자 오토 쇠텐자크가 처음으로 기록하였다. 그 연대는 약 60만 년 전의 것으로 추산되며 유럽에서 발견된 가장 오래된 초기 인류 화석으로 여겨지며, 형태학적으로는 호모 에렉투스와 호모 사피엔스의 중간에 위치하여, 이 종이 아프리카와 유럽, 아시아에 걸쳐 널리 분포했음을 나타내고 있다. 또한 뼈의 견고함과 추정되는 뇌 용량으로 미뤄보아, 이들이 고도의 신체적응력, 도구 사용 능력, 사회 조직을 갖추고 있었음을 추정할 수 있다."
 lepsius.1336.t: "하이델베르크인"
 lepsius.1336.d: "독일 하이델베르크 인근에 있는 마우어 마을의 광산에서 한 인부가 엄청난 발견을 이루어냈다. 하이델베르크 대학교의 어느 교수가 머지않아 그 가치를 알아보았다."
 lepsius.1336.f: "호모 하이델베르겐시스는 1907년 독일 하이델베르크 인근의 마우어 마을에 있는 모래 구덩이에서 다니엘 하르트만이라는 인부가 아래턱뼈를 처음 발견하고, 1908년 해부학자 오토 쇠텐자크가 처음으로 기록하였다. 그 연대는 약 60만 년 전의 것으로 추산되며 유럽에서 발견된 가장 오래된 초기 인류 화석으로 여겨지며, 형태학적으로는 호모 에렉투스와 호모 사피엔스의 중간에 위치하여, 이 종이 아프리카와 유럽, 아시아에 걸쳐 널리 분포했음을 나타내고 있다. 또한 뼈의 견고함과 추정되는 뇌 용량으로 미뤄보아, 이들이 고도의 신체적응력, 도구 사용 능력, 사회 조직을 갖추고 있었음을 추정할 수 있다."
