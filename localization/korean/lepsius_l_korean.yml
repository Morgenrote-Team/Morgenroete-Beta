 building_lepsius_archaeological_museum_desc: "자부심 있는 나라는 전부 그 나라의 수도에 특별한 박물관을 두고, 대담한 모험이나 과학적 탐사로 확보한 최고 수준의 문화유산을 한 데 모아 전시해 둡니다. 유물의 수와 소장품의 다양성은 국제적인 위상을 높일 뿐만 아니라 교육적 가치도 지니게 됩니다."
