 je_lepsius_archaoelogical_society: "고고학회 창설"
 je_lepsius_archaoelogical_society_reason: "우리나라에서 꾸준히 늘어난 것은 고고학을 향한 관심 뿐만이 아닙니다. 지난 수년 간의 탐사와 발굴, 유물 출토로 우리나라는 놀라운 수준의 고고학 지식을 축적해 왔습니다. 뛰어난 고고학자가 고고학회를 설립하면 과학과 지적 역량을 모아 새로운 활력을 불어넣을 수 있을 것입니다. 이는 과학적 성과를 도모할 뿐만 아니라 후대 고고학자들의 경험을 향상시킬 것입니다."
