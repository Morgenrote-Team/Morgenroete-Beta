 je_ishtar_gate: "이슈타르의 문 복원"
 je_ishtar_gate_reason: "바빌로니아 탐사대가 전설 속 이슈타르 문의 잔해를 발견한 뒤, 우리는 발굴 허가를 연장하여 바빌로니아의 벽돌을 우리 박물관으로 실어 나르기로 하였습니다."
 je_ishtar_gate_success: "문이 과거의 영광 그대로 복원되려면 총 20만 개의 벽돌이 필요합니다. 한 해에 우리에게 도착하는 벽돌의 수는 약 2만 개로 예상됩니다. 별다른 문제가 없다면 말이죠."
 je_ishtar_gate_goal: ""
 je_lepsius_priams_treasure: "프리아모스의 보물"
 je_lepsius_priams_treasure_reason: "하인리히 슐리만은 전설 속 프리아모스의 보물이 있을 법한 장소를 찾아다니며, 그곳에서 트로이를 발견할 수 있을 것이라고 주장하고 있다. 이를 진지하게 다루는 학자들은 그러한 보물들이 슐리만이 제시한 시대적 배경과 정말로 부합하는지 의문을 제기하고 있으나, 그것은 부차적인 문제일 뿐이다. 어찌 되었든 금세기 최고의 고고학적 보물로 꼽히는 것을 손에 넣을 수 있는 절호의 기회이기 떄문이다. 그것을 소장하는 데에는 우리 박물관이 최적의 장소가 될 것이다."
 je_lepsius_priams_treasure_fail: "경쟁국이 우리보다 먼저 슐리만의 요구를 들어준다면, 우리는 프리아모스의 보물을 획득할 특별한 기회를 놓치고 말 것이다."
 je_lepsius_the_labyrinth: "미궁"
 je_lepsius_the_labyrinth_reason: "영문 모를 고대의 미궁에 갇혀버린 [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastNameNoFormatting] 박사가 탈출구를 찾아 나서야 한다. 실수를 너무 많이 하게 되면 영영 그곳에 갇혀 버릴 수도 있다!"
 je_lepsius_discovery_tut: "왕가의 계곡 조사"
 je_lepsius_discovery_tut_reason: "우리는 왕가의 계곡에 역사적으로 큰 가치를 지닌 유적지가 숨겨져 있을 가능성이 높다고 보고 있습니다. 탐색에는 몇 년이 걸릴 수도 있습니다. 그러나 유적지를 발견하는 사람은 누구든지 역사에 길이 남을 것입니다."
 je_lepsius_disovery_tut_success: "우리가 상이집트에서 총 10가지의 단서를 찾는다면, 자료를 충분히 모으게 되어 역사적으로 중대하면서도 잃어버린 유적을 재발견할 수 있게 됩니다."
 je_lepsius_disovery_tut_fail: "다른 나라가 상이집트에서 우리보다 먼저 10가지 단서를 확보하면 우리의 노력은 물거품이 됩니다."
 je_lepsius_discovery_ship: "피라미드 인근 조사"
 je_lepsius_discovery_ship_reason: "우리는 피라미드군에 역사적으로 큰 가치를 지닌 무언가가 숨겨져 있을 가능성이 높다고 보고 있습니다. 탐색에는 몇 년이 걸릴 수도 있습니다. 그러나 처음으로 발견하는 사람은 누구든지 역사에 길이 남을 것입니다."
 je_lepsius_disovery_ship_success: "우리가 하이집트에서 총 10가지의 단서를 찾는다면, 자료를 충분히 모으게 되어 역사적으로 중대하면서도 잃어버린 유적을 재발견할 수 있게 됩니다."
 je_lepsius_disovery_ship_fail: "다른 나라가 하이집트에서 우리보다 먼저 10가지 단서를 확보하면 우리의 노력은 물거품이 됩니다."
 je_lepsius_discovery_babylon: "바빌론 조사"
 je_lepsius_discovery_babylon_reason: "우리는 바빌론 지역에 발견하지 못한 무언가 위대한 것이 숨겨져 있을 가능성이 높다고 보고 있습니다. 탐색에는 몇 년이 걸릴 수도 있습니다. 그러나 처음으로 발견하는 사람은 누구든지 역사에 길이 남을 것입니다."
 je_lepsius_disovery_babylon_success: "우리가 바빌로니아에서 총 10가지의 단서를 찾는다면, 자료를 충분히 모으게 되어 역사적으로 중대하면서도 잃어버린 유적을 재발견할 수 있게 됩니다."
 je_lepsius_disovery_babylon_fail: "다른 나라가 바빌로니아에서 우리보다 먼저 10가지 단서를 확보하면 우리의 노력은 물거품이 됩니다."
 je_lepsius_discovery_semiramis: "아시리아 조사"
 je_lepsius_discovery_semiramis_reason: "우리는 아시리아에 그 누구도 알지 못한 경이로움이 숨겨져 있을 가능성이 높다고 보고 있습니다. 탐색에는 몇 년이 걸릴 수도 있습니다. 그러나 처음으로 발견하는 사람은 누구든지 역사에 길이 남을 것입니다."
 je_lepsius_disovery_semiramis_success: "우리가 아시리아에서 총 10가지의 단서를 찾는다면, 자료를 충분히 모으게 되어 역사적으로 중대하면서도 잃어버린 유적을 재발견할 수 있게 됩니다."
 je_lepsius_disovery_semiramis_fail: "다른 나라가 아시리아에서 우리보다 먼저 10가지 단서를 확보하면 우리의 노력은 물거품이 됩니다."
 je_lepsius_discovery_mycenae: "미케네 조사"
 je_lepsius_discovery_mycenae_reason: "우리는 고대 도시 미케네가 여전히 비밀을 간직할 가능성이 높다고 보고 있습니다. 탐색에는 몇 년이 걸릴 수도 있습니다. 그러나 처음으로 발견하는 사람은 누구든지 역사에 길이 남을 것입니다."
 je_lepsius_disovery_mycenae_success: "우리가 아르골리스에서 총 10가지의 단서를 찾는다면, 자료를 충분히 모으게 되어 역사적으로 중대하면서도 잃어버린 유적을 재발견할 수 있게 됩니다."
 je_lepsius_disovery_mycenae_fail: "다른 나라가 아르골리스에서 우리보다 먼저 10가지 단서를 확보하면 우리의 노력은 물거품이 됩니다."
 je_lepsius_discovery_pakal: "유카탄 조사"
 je_lepsius_discovery_pakal_reason: "우리는 마야의 미스터리를 모두 풀지 못했을 가능성이 높다고 보고 있습니다. 탐색에는 몇 년이 걸릴 수도 있습니다. 그러나 처음으로 발견하는 사람은 누구든지 역사에 길이 남을 것입니다."
 je_lepsius_disovery_pakal_success: "우리가 유카탄에서 총 10가지의 단서를 찾는다면, 자료를 충분히 모으게 되어 역사적으로 중대하면서도 잃어버린 유적을 재발견할 수 있게 됩니다."
 je_lepsius_disovery_pakal_fail: "다른 나라가 유카탄에서 우리보다 먼저 10가지 단서를 확보하면 우리의 노력은 물거품이 됩니다."
 je_lepsius_archaoelogical_society: "고고학회 창설"
 je_lepsius_archaoelogical_society_reason: "우리나라에서 꾸준히 늘어난 것은 고고학을 향한 관심 뿐만이 아닙니다. 지난 수년 간의 탐사와 발굴, 유물 출토로 우리나라는 놀라운 수준의 고고학 지식을 축적해 왔습니다. 뛰어난 고고학자가 고고학회를 설립하면 과학과 지적 역량을 모아 새로운 활력을 불어넣을 수 있을 것입니다. 이는 과학적 성과를 도모할 뿐만 아니라 후대 고고학자들의 경험을 향상시킬 것입니다."
