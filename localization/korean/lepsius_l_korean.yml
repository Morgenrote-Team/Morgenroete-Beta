 lepsius_specialization_egypt_tech_desc: "고대 이집트에 중점을 두면 우리 고고학자는 처음부터 이집트 고고학 특성을 부여받게 됩니다. 또한 이집트의 모든 발굴지에서 매년 새로 발견되는 유물이 하나 더 추가됩니다."
