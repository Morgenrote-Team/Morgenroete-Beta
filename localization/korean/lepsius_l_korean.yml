 lepsius.321.t: "목록 정리 완료"
 lepsius.321.d: "수 개월의 시간 동안 탐사에서 찾아낸 유물들을 꼼꼼히 정리하고, 식별하고, 번호를 매기고, 평가하는 작업을 거친 끝에 [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] 박사는 다시 자유의 몸이 되었다."
 lepsius.321.f: "\"우린 결국엔 역사의 장부를 담당하는 사람이오. 다만 그 장부가 항상 붉게 칠해졌을 뿐이지. 우리는 무지를 표로 정리하는 일을 합니다. 그나마 위안이 되는 것은, 기록 보관 담당자와는 달리 가끔씩 햇빛 볼 날은 있다는 점이오.\""
 lepsius.321.g: "이렇게 시간이 오래 걸리면 유물처럼 먼지만 쌓이게 될 지도 모르겠소."
 je_lepsius_cataloging: "고고학 목록 정리"
 je_lepsius_cataloging_reason: "고고학 목록 정리(카탈로그 작업)는 고고학 발굴이나 기존 소장품에서 알아낸 사실들을 체계적으로 기록하고, 해설하여 데이터베이스나 소장 목록에 기재하는 과정을 말합니다. 각 유물에는 발견 위치와 층위, 발견 상태, 재질, 크기, 연대 등 배경 정보를 첨부하게 됩니다.\n\n이 과정은 발굴 조사보다 훨씬 오래 걸리므로 발굴단이 새로운 발굴지를 선정하는 데 시간이 더 소요되는 주된 원인이기도 합니다. 그러나 이처럼 흥미로운 임무를 수행하는 데 자부심을 느끼지 않을 고고학자가 어디 있을까요?"
