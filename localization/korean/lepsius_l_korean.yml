 notification_lepsius_ishtar_normal_transport_notification_desc: "메소포타미아에서 보내온 실물 크기의 벽돌 한 묶음이 오늘 고고학 박물관에 도착했습니다. 이것으로 우리는 #V 이슈타르의 문 벽돌#! #G 20,000점#!을 확보하였습니다."
