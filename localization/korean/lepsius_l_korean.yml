 lepsius.5000.t: "팔미라 유적"
 lepsius.5000.d: "우리나라에는 고대 도시 팔미라의 유적이 남아 있다. 우리 고고학계에서 유적지 발굴을 통해 최대한 많은 것을 알아내기를 간절히 바라고 있다."
 lepsius.5000.f: "팔미라는 수백 년에 걸쳐 제자리를 지켜 왔던 시리아의 고대 도시다. 팔미라는 무역으로 유명하였는데 부유한 상인들이 남긴 수많은 기념물들이 오랜 시간 동안 보존되어 왔던 것이다. 그 결과 수많은 고대 건축들이 변형되면서 고고학계의 어려운 숙제로 남게 되었다.\n팔미라는 무역 뿐만 아니라 단명했던 팔미라 제국의 여왕 제노비아도 유명하다. 제노비아는 한동안 로마 제국 동부를 지배하기에 이르렀으나 아우렐리아누스 황제가 동방을 다시 정복하고 팔미라를 파괴하고 말았다."
 lepsius.5000.g: "무엇을 알아내게 될지 궁금하군!"
 lepsius.5001.t: "바알 신전 복원"
 lepsius.5001.d: "우리 고고학계에서 바알 신전의 복원을 위하여 끊임없이 노력해 왔다. 이슬람 제국 시기에 팔미라에 신축되고 개조된 부분들을 철거하고, 건물 곳곳에 묻혀 있던 기존 유적들을 드러내야 했다."
 lepsius.5001.f: "바알 신전이 세워진 텔 언덕은 지층 분석 결과를 통해 일찍이 기원전 3000년경부터 사람이 터를 잡고 살았다는 사실이 드러났다. 우리가 최대한 복원한 신전은 1세기 말~2세기 초 고대 로마 시대에 지어진 신전에 해당된다.\n이후 신전은 기독교 교회로 바뀌었고, 아랍인들이 정복한 이후에는 이슬람 사원이 되었다.\n\n#V 실제 역사#!에서 바알 신전은 2015년 IS의 공격으로 파괴되고 말았다. 허나 남아있는 유적을 통해 신전을 재건하려는 계획이 세워지고 있다."
 lepsius.5001.g: "무엇을 알아내게 될지 궁금하군!"
 lepsius.5002.t: "무덤의 계곡 발굴 완료"
 lepsius.5002.d: "팔미라 서부에는 수많은 무덤이 있다. 그곳에는 인상적인 무덤 탑도 세워져 있어 우리 고고학자들이 발굴에 나서 부분 복원하기에 이르렀다."
 lepsius.5002.f: "이른바 무덤의 계곡이라 불리우는 팔미라 서부의 공동묘지는 수많은 탑 형태의 무덤이 자리해 있다. 제일 오래된 무덤은 기원전 9년에 지어진 것으로 '아테나탄의 탑'으로 불린다. '엘라벨의 탑'은 트라야누스 황제 재위기에 팔미라의 학자 마르쿠스 울피우스 엘라벨루스가 지은 것으로 유명하다. 엘라베우스는 트라야누스가 정권을 잡을 당시에 로마 시민으로 인정받게 된 것으로 보이는데 이는 두 사람의 첫 이름과 가운데 이름이 같다는 점에서도 드러난다.\n흥미롭게도 이곳에서는 중국에서 건너온 것으로 추정되는 비단 조각이 발견되기도 했다.\n\n#V 실제 역사#!에서 오늘날 무덤의 계곡은 IS가 팔미라를 점령할 당시에 파괴되고 말았다. 개중에는 엘라벨의 탑과 이암블리쿠스의 탑도 있었다."
 lepsius.5002.g: "근사하군!"
 lepsius.5003.t: "야자수의 도시, 팔미라"
 lepsius.5003.d: "우리 고고학계에서 수년에 걸쳐 팔미라의 유적들을 발굴하고 최대한 복원하는 과정을 거쳤다. 한때 부유했던 도시는 이제 다시금 발길을 들일 만한 도시로 거듭나게 되었다."
 lepsius.5003.f: "팔미라의 유적이 다시 한번 관광객들을 끌어모으고 있다. 한때 로마와도 맞서 싸웠지만 결국 지고 말았던 이 위대한 도시의 흔적을 보기 위해 많은 사람들이 찾아오고 있는 것이다. 웅장한 무덤 탑, 거대한 열주, 바알 신전, 바알샤민 신전 모두 팔미라가 누렸던 엄청난 부를 보여주고 있다. 야자수의 도시 팔미라가 전성기를 누릴 때의 모습이 얼마나 장관이었을지 생각해 보라!"
 lepsius.5003.g: "둘러보기에 근사한 곳일세!"
