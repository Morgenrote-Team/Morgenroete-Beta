 je_douglas_mountaineering_expedition_reason: "우리 산악인 [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName](이)가 현재 원정대를 이끌고 #V [AddLocalizationIf( Scope.Var('douglas_mountain_expedition_var').IsSet , Scope.Var('douglas_mountain_expedition_var').GetFlagName)]#!(을)를 사상 처음으로 등정하려는 시도에 나서고 있습니다. 원정의 목표는 산봉우리에 처음으로 오르는 것입니다. 등반 속도는 산악인의 경험치와 인물 특성에 크게 의존합니다. 해당 산의 난이도에 따라 더 많은 위험도가 발생하게 됩니다. 원정대가 정해진 시간 내에 목표 지점에 도달하지 못하면 [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName](은)는 등정 시도를 중단하게 됩니다. 원정대가 어떤 이유에서건 상상할 수 있는 극한의 위험으로 치닫게 된다면 최악의 상황을 맞이하게 됩니다."
