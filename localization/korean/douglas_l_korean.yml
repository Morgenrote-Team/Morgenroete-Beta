 douglas.103.t: "Mountain Troops Regiment"
 douglas.103.d: "Because of his impressive experience in mountain conquering and mountain defense, [SCOPE.sCharacter('douglas_mountain_veteran').GetFullName] decided to use his superior skills to create an elite unit of mountain troops."
 douglas.103.f: "The Gebirgsjäger, the Alpini or the Chasseurs Alpins are just a few examples of elite troops from some countries who have specialized in war on the heights. Established in 1872, the Alpini are the oldest active mountain infantry in the world. Their original mission was to protect Italy's border with France and Austria-Hungary."
 douglas.103.g: "They will carry his legacy into the future."
