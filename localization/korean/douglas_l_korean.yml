 douglas.101.t: "등산회 창설"
 douglas.101.d: "[SCOPE.sCharacter('douglas_president_scope').GetFullName]의 부름에 산이 답한다. 등산회의 창설은 더 높은 곳을 향해 나아가는 모든 이들을 위한 새 시대를 알렸다."
 douglas.101.f: "[SCOPE.sCharacter('douglas_president_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('douglas_president_scope').GetLastName] 탐사대는 자신들을 이끌고 폭풍과 눈사태를 헤쳐 나갔다...하지만 이제 [SCOPE.sCharacter('douglas_president_scope').GetSheHe]는 본인의 유산을 계승하려 한다. [ROOT.GetCountry.GetCapital.GetCityHubName]에서 [GetPlayer.GetName] 산악회를 창설한 [SCOPE.sCharacter('douglas_president_scope').GetSheHe]는 혼자를 넘어서 유망한 신입과 함께 있다. 떠오르는 신예 산악인 [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName](은)는 날카로운 눈빛과 강철 같은 의지의 소유자다. [SCOPE.sCharacter('douglas_president_scope').GetFullName](은)는 [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetHerHim]에게서 단순한 야심을 넘어 훗날의 전설을 본다. 두 사람은 산봉우리 뿐만 아니라 영광과 용기, 그리고 어쩌면 역사에 한 획을 그을 경로의 문턱에 서 있다. 산의 부름에 응하는 모든 이들에게 산악회는 열려 있다. 등반은 지금부터다."
 douglas.101.g: "산이 우리를 부른다!"
 douglas.102.t: "산악회"
 douglas.102.d: "[TimeKeeper.GetCurrentDate.Format('y')]년 [ROOT.GetCountry.GetCapital.GetCityHubName]에서 산악회가 정식으로 설립되어 세계 최초의 국제 산악 단체로 공인되었다. 이번 창설로 현대적 등산의 제도적인 출발을 알렸다."
 douglas.102.f: "실제 역사에서는 1857년 영국 신사들이 모여 산악 전문 협회를 설립한 것이 발단이다. 존 볼이나 에드워드 케네디 등의 인물들이 주도했던 산악회는 알프스 산맥의 체계적인 탐험을 장려하고, 육체적 도전에 지리와 자연 연구의 조화를 목표로 삼았다. 산악회는 지식 공유, 원정대 조직, 등반가들 사이의 공동체 의식 함양을 위한 구조적인 토대를 제공하였다. 산악회 회원들은 수많은 초등을 이룩하고 본인들의 경험을 기록하며 훗날 '산악의 황금기'로 알려지는 시기에 중요한 역할을 행사하였다. 이로부터 머지않아 알파인 저널이 창간되어 등산 관련 출판의 발전에 기여하였다. 산악회의 창설은 전세계 조직 등반의 토대를 마련하였으며 산악 탐험에 있어 영구적인 기준을 확립하였다."
 douglas.102.g: "함께 정상으로 나아갑시다!"
