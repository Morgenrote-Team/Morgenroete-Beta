 douglas.103.t: "산악 부대 연대" #deepl:459726214
 douglas.103.d: "산악 정복과 산악 방어에 대한 인상적인 경험을 바탕으로 [SCOPE.sCharacter('douglas_mountain_veteran').GetFullName] 는 자신의 뛰어난 기술을 활용해 정예 산악 부대를 만들기로 결심했습니다." #deepl:3198382874
 douglas.103.f: "게비르스예거, 알피니, 샤세르 알핀은 고지대 전쟁을 전문으로 하는 일부 국가의 정예 부대 중 일부에 불과합니다. 1872년에 창설된 알피니는 세계에서 가장 오래된 현역 산악 보병대입니다. 이들의 원래 임무는 프랑스 및 오스트리아-헝가리와의 이탈리아 국경을 보호하는 것이었습니다." #deepl:3963027024
 douglas.103.g: "그들은 그의 유산을 미래로 이어갈 것입니다." #deepl:1701012348

