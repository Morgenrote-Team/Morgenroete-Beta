 douglas.210.t: "과학적 지원"
 douglas.210.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] 박사가 산의 구조를 알아보는 데 있어 원정대에 도움이 되도록 자신의 조수를 파견해 주었다."
 douglas.210.f: "편지는 정성스레 쓰여져 있었으며 봉인은 지금까지 뜯겨 있지 않았다. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] 교수는 편지를 통해 제일 유망한 조수를 일시적으로 배정하겠다고 제안해 왔다. 그 조수는 조용하고 관찰력이 뛰어난 젊은이로서 광물 분류와 경사면 분석에 일가견이 있었다. 교수는 세부 보고서를 희망한다고도 밝혔다. 조수는 측정봉과 기록지, 그리고 끝없는 호기심을 챙겨 현장에 도착했다. 등반에 대해서는 아는 것이 별로 없었지만, 암석에 대해서는 해박한 모습이었다."
 douglas.210.g: "조수를 반갑게 맞이해 주시오."
 douglas.214.t: "산의 교향곡"
 douglas.214.d: "최근 [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName]의 등정 성공 소식에 영감을 받은 [ROOT.Var('elgar_composer_var').GetCharacter.GetFullName](이)가 산을 소재로 한 음악 대작을 작곡하고 싶다고 밝혔다. 음악계는 해당 작품이 대표작이 될 것이라고 벌써부터 입을 모으고 있다."
 douglas.214.f: "알프스 교향곡 64번은 작곡가 리하르트 슈트라우스의 교향시로 1915년에 초연되었다. 이 작품은 어느 날 알프스 산봉우리에 올라 계곡으로 되돌아오는 여정을 음악적 수단으로 묘사하려 했던 슈트라우스의 구상에 기반을 두고 있다. 작품의 영감 자체는 슈트라우스의 어린 시절 경험으로 거슬러 올라간다. 1879년 여름 슈트라우스는 바이에른 알프스의 하임가르텐산에서 발을 헛디뎌 폭우 속에 갇히고 말았다. 다음 날 슈트라우스는 이 사건을 피아노 연주로 옮겼고, 그 기억으로 작품의 주제를 발전시켰다. 관객이 등산의 각 단계를 마치 소리로 그려내는 것처럼, 생생하고 감각적으로 경험할 수 있게 한다는 것이 작곡가가 표방한 의도였다. 여러 음악 평론가들은 이 작품이 그러한 목표를 당당한 태도로 이루어냈다고 평가하고 있다."
 douglas.214.g: "그 곡에 알펜호른은 없기를 바라오."
 douglas.215.t: "정상에서 과학으로"
 douglas.215.d: "원정대원 중 한 명이 새로운 길을 택했다. 높은 산에서 눈에 담은 것에 감명받은 나머지 지질학 분야에서 새 출발을 하게 된 것이다."
 douglas.215.f: "부츠 아래 눈이 바스락거리고 험준한 봉우리 위로 태양이 떠오르자 [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName]의 마음에 변화가 일었다. 겹겹이 쌓인 암석, 습곡 지층의 고요한 위력, 화산의 흔적들 — 이 모든 것이 어떤 산 정상보다도 [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] 기억 속에 깊이 남겨졌다. 하산 후 다른 대원들이 자축하는 동안 [ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe]는 서적과 지도, 망치를 찾았다. 원정대가 꽂은 것은 깃발만이 아니었다. 한 사람의 정신을 일깨운 것이다."
 douglas.215.g: "그 대원의 연구를 격려해 주자!"
 douglas.221.t: "순조로운 등반"
 douglas.221.d: "등산팀은 #V [AddLocalizationIf( Scope.Var('douglas_mountain_expedition_var').IsSet , Scope.Var('douglas_mountain_expedition_var').GetFlagName)]#! 등정 시도에 막힘 없이 나아가고 있다. 이렇다 할 사건도 벌어지지 않고 있다."
 douglas.221.f: "\"인생의 절정기에 본인이 가장 바라는 활기찬 환경을 어느 정도 경험한 사람은 행운아다. 격변과 폭력이 난무하는 지금 시대에, 오늘의 기본적인 가치들이 내일의 부질없고 산산조각난 꿈이 되어버리는 이 시대에, 기회가 주어지는 대로 충만한 삶을 살고자 하는 철학은 그만한 이유를 지닌다. 온전히 만족스러운 삶의 방식을 경험하는 것보다 가치 있는 보물은 드물다. 결국 그런 경험은 어떤 운명도 우주적 재앙도 우리에게서 빼앗을 수 없는 유일한 소유물이며, 영원 속의 단 한 순간이라도 우리가 진정으로 삶을 산다면 그 사실은 결코 변치 않을 것이다.\" - 에릭 시프턴"
 douglas.221.g: "계속 나아가자!"
 douglas.222.t: "산비탈"
 douglas.222.d: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName](이)가 산에 나 있는 조그마한 비탈길을 발견했으나 등반가들에게 큰 문제는 되지 않을 것이다."
 douglas.222.f: "등산팀이 더 높은 곳에 도전할 수록 난이도는 더 커집니다. 산비탈은 장애물이 될 수 있지만 장비를 든든히 갖춘 원정대에게는 문제되지 않습니다."
 douglas.222.g: "등산팀은 극복할 것이다."
 douglas.222.h: "이건 너무 위험해."
 douglas.223.t: "가파른 절벽"
 douglas.223.d: "정상으로 향하는 등반가들에게 절벽이라는 큰 장애물이 드리워졌다. 허나 [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName](은)는 이 고비를 반드시 넘어서겠다는 확신에 차 있다."
 douglas.223.f: "해발 고도 2000m의 산에 오르는 등산대는 절벽을 마주할 수 있다. 낮은 고도의 산이라면 정상에 오르기 전의 마지막 고비로 작용하지만, 대다수의 경우에는 준비 운동에 가깝다. 여기서부터 일반적인 산행과 진정한 산악 등반이 구분된다고 볼 수 있다."
 douglas.224.t: "눈사태!"
 douglas.224.d: "#V [AddLocalizationIf( Scope.Var('douglas_mountain_expedition_var').IsSet , Scope.Var('douglas_mountain_expedition_var').GetFlagName)]#!의 상층부에서 위험한 눈사태가 발생하여 등반 시도에 위협이 되고 있다. 잔해가 주요 등반로를 가로막고 있어 우회로를 찾는 것이 더 안전할 수 있으나, 자칫 귀중한 시간을 낭비할 수 있다. 일부 등반가들은 잠시 기다릴 것을 제안하고 있는데, 등반로가 한층 더 막힐 가능성을 감수하게 될 것이다."
 douglas.224.f: "눈사태는 눈으로 덮인 고고도에서 발생하며 예로부터 등산객 뿐만 아니라 산에 사는 모든 사람에게 위험 요소로 다가왔다. 그 위험한 본색이 많은 이들을 죽음으로 몰고 간 것이다. 이제부터는 알갱이와 쭉정이를 걸러내야 할 차례다."
 douglas.224.g: "이런 것에 등반가가 흔들릴쏘냐."
 douglas.224.h: "우회로를 찾아본다."
 douglas.225.t: "심연"
 douglas.225.d: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName](이)가 마지막 암석 지층에 도달하였을 때 그들의 앞에 위험한 협곡이 펼쳐졌다. 도저히 넘을 수가 없던 이 장애물은 산악인들에게 하나의 도전 과제로 떠올랐다."
 douglas.225.f: "\"등산은 가장 큰 위험에 가장 큰 주의를 기울여 산을 오르는 기술이다. 여기서 기술이라 함은 행동으로 지식을 실현하는 것을 의미한다. 항상 정상에 머물 수는 없다. 다시 내려와야 한다. 그렇다면 요점은 무엇인가? 바로 이것이다. 위는 아래를 알지만 아래는 위를 잘 알지 못한다. 오르면 보인다. 내려가면 보이던 것이 더 이상 볼 순 없지만, 보았던 것을 기억한다. 등산 중에는 길목에 있는 모든 어려움을 기록해 두자. 내려오는 동안에는 그것들을 더는 볼 수 없겠지만, 주의 깊게 관찰했다면 그것들이 존재했음을 알 수 있을 것이다.\" - 르네 도말"
 douglas.226.t: "죽음의 계단"
 douglas.226.d: "정상을 바로 앞두고 [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName](이)가 최후이자 최악의 도전에 직면하게 되었다. 눈앞에 절벽이 수직에 가깝게 솟아 있어 원정대의 승패를 결정짓게 된 것이다. 등반가들 사이에서는 이미 이 절벽이 죽음의 덫, 혹은 죽음의 계단이라는 소문이 돌고 있다."
 douglas.226.f: "\"한 시간 동안 꾸준히 나아간 끝에 우리는 능선에서 가장 험난해 보이는 문제, 높이가 440미터(12미터)는 넘어 보이는 바위계단 아래에 도착하게 되었다. 이런 고도에서는 이 오르막길이 성공과 승패를 가로지르는 결정적 요소가 될 수 있다는 점을 깨달았다. 매끄럽고 잡을 곳도 별로 없는 이 암반은 레이크 디스트릭트의 전문 암벽 등반가들에게는 일요일 오후의 재미있는 문제였을지 모르지만, 여기서는 우리의 미약한 힘으로 극복할 수 없는 장벽이었다. 나에게 있어 서쪽의 가파른 암벽에서 방향을 바꿀 방도는 보이지 않았으나, 다행히도 달리 따져볼 가능성은 아직 남아 있었다. 동쪽에는 또 하나의 거대한 처마가 솟아 있었고, 40피트 높이의 계단 전체에 걸쳐 처마와 암반 사이에 좁은 틈이 나 있었다. 텐징에게 자일을 최대한 꽉 매달라고 부탁한 나는 그 틈으로 몸을 밀어넣었다. 그리고 아이젠으로 뒷편의 얼어붙은 눈에 스파이크를 깊숙이 박아넣고 몸을 들어올렸다. 처마가 바위에 제대로 붙어 있길 간절히 기도하며, 작은 바위 버팀대 하나에 무릎과 어깨와 팔의 온 힘을 다해서 틈을 거꾸로 기어 올라갔다.\" - 에드먼드 힐러리"
 douglas.226.i: "이래서야 가망이 없겠어!"
 douglas.227.t: "날씨의 변화"
 douglas.227.d: "[SCOPE.sState('douglas_location_scope').GetName] 산의 날씨 변화는 등반가들에게 생명을 위협하는 문제로 다가왔다. 고도가 더욱 높은 곳으로 이동하여 바람을 피할 기회는 아직 남아 있지만 매우 위험한 시도다. 베이스캠프라면 등반가들에게 안전한 대피소가 되겠지만, 그렇게 되면 지난 며칠, 아니 몇 주 동안의 여정이 물거품이 되어버린다."
 douglas.227.f: "산의 날씨 변화는 산행 과정에서 벌어질 수 있는 가장 위협적인 요인으로 꼽힌다. 비와 폭풍, 눈 모두 마찬가지이다. 특히 고산 지대에서는 갑작스러운 폭설로 등정을 포기해야 하는 경우가 발생할 수 있다. 예측 불가능한 요인은 비극적인 결과로 끝날 수 있기 때문이다."
 douglas.227.g: "이런 것에 등반가가 흔들릴쏘냐."
 douglas.227.h: "마지막 캠프로 복귀하자!"
 douglas.228.t: "낙석 주의!"
 douglas.228.d: "갑작스러운 산사태가 캠프를 덮쳤다. 여러 등반가가 부상을 입고, 필수 장비도 잃어버리고 말았다!"
 douglas.228.f: "날카로운 균열 소리와 함께 굉음이 울려퍼졌다. 야영지 위쪽 경사면이 잠들었던 야수처럼 무너져 내렸다. 바위와 먼지, 돌덩이가 무서운 폭포처럼 쏟아져 내렸다. 짐꾼 한 명은 돌에 맞아 쓰러지고, 밧줄은 끊어졌고, 보급품 상자는 산산조각났다. 간신히 몸을 피한 사람들은 이제 그 잔해를 침묵 속에 바라보고 있다. 아무도 입에 담지는 못했지만 모두가 알고 있다. 하마터면 비극으로 끝날 뻔했다는 것을. 등산로는 안전해 보이지만, 산은 조금의 친근함도 없다."
 douglas.228.g: "야영지를 확보하고 부상자들을 치료하도록."
 douglas.229.t: "어지러운 고도"
 douglas.229.d: "산 정상이 가까워질수록 희박해진 공기와 깎아지른 듯한 능선이 등반가들을 압박해 오기 시작한다."
 douglas.229.f: "한낮인데도 하늘은 어둡고 공기는 면도기처럼 얇다. 매 걸음마다 큰 바위를 들어 옮기는 듯한 고된 느낌이다. 숨은 짧고 얇게 볼아쉬게 되고, 바람은 마치 폐에서 영혼을 빨아들이는 듯하다. 어떤 이들은 아래쪽의 심연을 너무 오래 바라보다 무릎이 후들거리기 시작한다. 또 어떤 이들은 환각이 보이기 시작한다. 얼음 속에서 목소리가 들리고, 눈 속에서 그림자가 보이는 것이다. 산은 이곳에서 자비를 베풀지 않는다는 것을 보여준다. 오직 고도와 바람, 그리고 고요만이 있을 뿐. 이 고도에서는 용기조차 얼어붙기 시작한다."
 douglas.229.g: "고개를 숙이고 앞으로 나아가자."
 douglas.229.h: "잠시 휴식을 취하자."
 douglas.230.t: "돌을 읽어내다"
 douglas.230.d: "우리 지질학 조수가 지형을 세밀하게 분석하고 숨겨진 위험 요소를 발견하여 치명적인 사고로 돌변하는 것을 막았다."
 douglas.230.f: "다른 이들이 밧줄을 풀고 신발을 점검하는 동안, 지질학자는 돌을 자세히 들여다본다. 한 층 한 층, 알갱이 하나 하나를 꼼꼼히 살피는 [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] 박사의 조수는 미세한 균열, 미묘한 색 변화, 퇴적층의 각도를 기록으로 남겼다. \"이 경사면은 불안정합니다.\" 안전해 보였던 등산로를 가리키며 나지막히 말했다. 그리고 그의 말은 옳았다. 소규모 정찰대가 과거 산사태가 일어난 흔적을 찾아낸 것이다. 조수의 조용하면서도 정확한 분석 덕분에 제때 등산로를 변경할 수 있었고, 어쩌면 여러 목숭을 구할 수 있게 된 것일지도 모른다. 산은 장대할 지 모르나 그것을 자세히 들여다보는 사람에게는 일정한 무늬를 읽어낼 수 있다."
 douglas.230.g: "과학을 믿자."
 douglas.231.t: "산악 과학"
 douglas.231.d: "#V [AddLocalizationIf( Scope.Var('douglas_mountain_expedition_var').IsSet , Scope.Var('douglas_mountain_expedition_var').GetFlagName)]#!의 익숙찮은 고도는 지질학 조수에게 드넓은 통찰력을 새로 부여하고 있다. 조수는 등산 중에 이를 수집하고 기록하고 있다."
 douglas.231.f: "과학자들은 산악 원정 초기 단계에서 이 지역의 특이한 식생을 연구하곤 했다. 지질학 조사는 통상적인 과학적 이유 뿐만 아니라 추후 등반을 용이하게 하기 위해서도 중요한 관심 대상이다."
 douglas.231.g: "과학을 위하여!"
 douglas.232.t: "양질의 광물"
 douglas.232.d: "등산대는 지질학자가 너무 미적거리는 바람에 도움이 되지는 못할망정 짐이 된다고 불평하였는데, 알고 보니 정상에 오르는 동안 희귀 광물을 찾아냈던 것이었다."
 douglas.232.f: "일행은 비탈길 어딘가에 멈춰 서서 갑자기 도구를 꺼내든 조수를 한 시간 동안 기다리고 있었다. 처음에는 고개를 저었지만, 아무리 불쾌하더라도 유익한 일과를 하기로 하고 시간 낭비를 막기 위해 식사를 앞당기기로 했다. 그러나 [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] 박사의 조수는 식사할 생각도, 돌아올 생각도 없었다. [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName](이)가 두고 가겠다고 협박하자, 조수는 갑자기 반짝이는 돌을 손에 들고 일행의 곁으로 돌아왔다."
 douglas.232.g: "정말 뜻밖의 좋은 일이로군."
 douglas.233.t: "A Lost Animal"
 douglas.233.d: "On the lower level of the Himalayas, our naturalist [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] has made a strange discovery: a single, abandoned animal roams there, stricken by hunger and cold."
 douglas.233.f: "It was a strange sight for [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] to find such a small, tender creature, who was otherwise said to live in the bamboo forests of Nepal, in this deserted wasteland. [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetSheHe|U] knew illustrations from books and knew that locals lived in the nearest forests; but how could a single animal get here? Over this distance? Without food? It remained a mystery. Had the little red panda also caught the mountaineering bug? Or had he fled from predators? Be that as it may, the mountaineer takes care of the exhausted animal and nurses it back to health. It is agreed that a research assistant will bring the red panda to the base camp - and from there prepare it for its journey to the local zoo."
 douglas.233.g: "Is this the legendary 43rd animal?"
