 douglas.211.t: "The Summit"
 douglas.211.d: "After an arduous ascent, the group of mountaineers finally reaches the summit. [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] is the first person to storm this spot on earth for [ROOT.GetCountry.GetNameNoFormatting]. Now there is nothing left but to savor this moment of triumph."
 douglas.211.f: "'The first question which you will ask and which I must try to answer is this, 'What is the use of climbing Mount Everest?' and my answer must at once be: 'It is no use.' There is not the slightest prospect of any gain whatsoever.\n\nOh, we may learn a little about the behavior of the human body at high altitudes, and possibly medical specialists may turn our observation to some account for the purposes of aviation. But otherwise nothing will come of it. We shall not bring back a single bit of gold or silver, not a gem, nor any coal or iron. We shall not find a single foot of earth that can be planted with crops to raise food. It's no use.\n\nSo, if you cannot understand that there is something in man which responds to the challenge of this mountain and goes out to meet it, that the struggle is the struggle of life itself upward and forever upward, then you won't see why we go. What we get from this adventure is just sheer joy.\n\nAnd joy is, after all, the end of life. We do not live to eat and make money. We eat and make money to be able to enjoy life. That is what life means and what life is for.'- George Leigh Mallory"
 douglas.211.g: "Let's enjoy the dawn!"
 douglas.212.t: "Climb aborted"
 douglas.212.d: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName]'s attempt to reach the peak failed for the time being. Our mountaineer is forced to abandon the venture and return."
 douglas.212.f: "There can be multiple reasons why a climber abandons the ascent. Sometimes a change in the weather is enough; sometimes a supposed access to the summit turns out to be too treacherous. An ascent often takes too long and exceeds a time window because certain times of the day and changes make the ascent difficult or impossible. And sometimes you simply chose the wrong path."
 douglas.212.g: "Disappointing."
 douglas.213.t: "Mountaineering Disaster!"
 douglas.213.d: "While climbing the mountains in [SCOPE.sState('douglas_location_scope').GetName], [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] made a terrible mistake, which ended the expedition in a catastrophe - several people died, provisions and equipment fell down with them. The whole nation is in shock!"
 douglas.213.f: "'Every night, do you understand, I see my comrades of the Matterhorn slipping on their backs, their arms outstretched, one after the other, in perfect order at equal distances—Croz the guide, first, then Hadow, then Hudson, and lastly Douglas. Yes, I shall always see them ...'- Edward Whymper"
 douglas.213.g: "A tragedy!"
