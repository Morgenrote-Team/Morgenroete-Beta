 douglas.401.t: "At the Foot of the Sacred Mountain"
 douglas.401.d: "The expedition reaches the Himalaya — and must now choose its path to the top of the world."
 douglas.401.f: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] unrolled the map and spread it out on the rock. Two lines. Two choices.\n\nTo the north: a known path through Tibet. Diplomatic clearance, older surveys, and the ghost of former expeditions.\n\nTo the south: the forbidden valley of Nepal. Unknown terrain, whispers of divine wrath. Yet the slopes might be kinder.\n\nThey could not climb both.\n\nThe mountain allowed only one attempt."
 douglas.401.g: "Follow the North Face route."
 douglas.401.h: "Follow the South Face route."
 douglas.411.t: "The Forbidden Valley"
 douglas.411.d: "After months of negotiation, the expedition crosses into Nepal to attempt a southern ascent of Chomolungma."
 douglas.411.f: "They called it the 'forbidden valley'. For decades, no foreigner had set foot beyond the last post of Darjeeling. But that morning, the mists lifted, and [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] and the team slipped past the final ridge.\n\nThe river that wound through the forest was no longer marked on any map. There were no paths. Only goat trails and hushed voices from nearby villages. Even the Sherpa looked uneasy. At night, the wind carried a sound unlike anything [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetSheHe] had heard in the Alps or the Andes — a low, breathing silence that seemed to roll off the glaciers themselves. The men spoke little. The pack animals grew restless. And the doctor reported the first cases of altitude sickness far earlier than expected. Yet no one turned back. Because beyond the trees, beyond the mist, beyond the final bend of the valley, lay the face of Everest — untouched from the south.\n\nIt was beautiful. And it looked like it wanted them dead."
 douglas.411.g: "There are no roads on this path."
 douglas.412.t: "The Seracs Above"
 douglas.412.d: "The expedition reaches the foot of the Khumbu Icefall — a labyrinth of snow floes and gaping crevasses."
 douglas.412.f: "The glacier moved in silence. It creaked, shifted, sighed beneath their feet like something alive. [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] had seen ice before, but never like this. These were not alpine slopes — they were monoliths, hollow and leaning, blue as frozen lungs and just as fragile.\n\nBy midday, the temperature rose. A dull crack echoed from the left, then another — and a block the size of a house sheared off, falling like glass. The Sherpa scattered. One man lost his footing near a crevasse and was pulled back at the last instant. The map was useless. Ropes froze, snapped. Sunlight melted footholds faster than they could climb.\n\nThey were barely halfway through.\n\nThey could press forward. Hope the glacier held. Or retreat and try again before dawn, when the cold kept the ice still.\n\nBut every hour wasted here was another hour without air above eight thousand meters."
 douglas.412.g: "Push forward. We came here to climb."
 douglas.412.h: "This is an impossible obstacle."
 douglas.413.t: "The White Furnace"
 douglas.413.d: "The team enters the Western Cwm — a broad glacial valley between towering ice walls where the sun reflects from all sides."
 douglas.413.f: "It was supposed to be the easier part. A flat stretch, a brief reprieve before the Lhotse Wall. But no one had warned them of the heat.\n\nBy noon, the Western Cwm had become an oven. The snow turned to slush beneath their boots. Sunglasses fogged or shattered. The ice walls on both sides reflected the sun downward in dazzling brilliance, until it felt as though they were walking on burning glass. [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] tried to speak, but [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetSheHe] couldn't feel [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetHerHis] tongue anymore.\n\nOne porter collapsed. Another vomited. Frostbite gave way to sunburn. The glacier groaned underfoot, as though resenting their weight. There was no wind, no sound, no shade — only glare, heat, and the creeping sense of being boiled alive at the roof of the world.\n\nAnd yet the wall ahead beckoned. The Lhotse Face loomed, blue and vertical.\n\nTo wait meant giving up more time, more food, more strength.\n\nTo move meant gambling against the sun."
 douglas.413.g: "Advance. We cannot stop now."
 douglas.413.h: "Stop this madness."
 douglas.414.t: "The Blue Wall"
 douglas.414.d: "To reach the South Col, the team must ascend the steep and exposed Lhotse Face under worsening conditions."
 douglas.414.f: "It was no longer climbing — it was crawling upward against gravity itself. The ice beneath their feet was hard as marble, blue as steel. [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] kicked in with both boots, drove the axe, and prayed it held. Each step took minutes. Each breath, a war.\n\nFar below, the Western Cwm shimmered in false serenity. Above them, the wall stretched endlessly. The wind had returned — not a storm, but a dry, scraping hiss that sucked the warmth from their bones. Ropes froze. Fingers stiffened. But there was no margin for error. One slip could take down three men.\n\nSomeone coughed behind [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName]. Blood in the snow. A Sherpa was faltering. Too high, too fast. But they were already committed.\n\nThe wall offered no shelter. No rest. Only ascent.\n\nAnd the ridge above seemed no closer than it had two hours ago."
 douglas.414.g: "Climb. We have come too far to turn around."
 douglas.414.h: "Flee, you fools!"
 douglas.415.t: "The Last Camp"
 douglas.415.d: "The team reaches the South Col. Only the summit ridge lies ahead — and the final decision."
 douglas.415.f: "It was like camping on the moon. The air was brittle, the wind without mercy. Tents shivered under each gust like wounded animals. No birds, no voices, not even the crackle of the glacier. Just thin, rasping breaths. The South Col was not a place to rest — it was a place to wait for either glory or death.\n\n[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] sat hunched in the fabric shell of the tent, staring at the map with a shaking hand. The route to the summit was clear: along the southeast ridge to the top of the world.\n\nBut the oxygen was running low. Supplies were dwindling. Fingers were blackened. One man hadn't spoken since sunrise.\n\nThere was just enough fuel for one push. One final attempt. The summit stood less than 1,000 vertical meters away — but in the death zone, it might as well be a thousand miles.\n\nOutside, the wind howled like something alive. It was time to decide.\n\nUp or down.\n\nLive or try."
 douglas.415.g: "Launch the summit attempt."
 douglas.415.h: "Call off the climb. Survive to return another year."
 douglas.416.t: "The [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] Step"
 douglas.416.d: "Just below the summit, an unexpected obstacle blocks the final ridge — a vertical wall of rock and ice."
 douglas.416.f: "The sun had not yet risen. The summit ridge glowed pale in the pre-dawn light, and for a moment, [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] believed the way was open. The air was too thin for speech. The wind bit through gloves and goggles. But then — it stopped them.\n\nA sheer face. Ten, perhaps twelve meters. Too steep to walk, too exposed to skirt. A single vertical monolith cut across the ridge like a blade — and there were no ropes, no pitons, no route. It hadn't been on the maps. No account had mentioned it. No one had warned them.\n\n[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] stared up at the wall. The snow had thinned. This was granite, black and rimed with frost. One Sherpa tried to scout left — sheer drop. Another tried right — nothing but sky.\n\nThe mountain had saved one last trick. One final barrier.\n\nThere was no way around. Only over.\n\nLater, they would name it after the one who saw it first."
 douglas.416.g: "Climb the [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] Step."
 douglas.416.h: "It's too dangerous. We turn back."
 douglas.421.t: "The Forbidden Face"
 douglas.421.d: "With permission from the local authorities, the expedition sets out to climb Everest from the north, through the Rongbuk Valley."
 douglas.421.f: "There was no welcome, only wind. The prayer flags fluttered without color. Monks stared from the hilltops like ghosts, unmoving, unspeaking. The trail ended where the glacier began — and the glacier led into silence.\n\n[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] had read the accounts. Mallory, Norton, Finch. Their maps were incomplete, their notes cryptic. But the mountain was there, just as they had described it: towering, grey, austere.\n\nThe yaks stopped near the Rongbuk Monastery. From here, they would carry everything on their backs. The expedition was no longer theoretical. It was stone, ice, altitude. The sky above them was thin and brittle. The snow did not fall — it hung. The glacier creaked at night like something ancient turning in its sleep.\n\nOne of the porters whispered something about a god who lived on the mountain and had not yet been appeased.\n\n[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] did not ask for a translation."
 douglas.421.g: "The north grants permission - but not welcome."
 douglas.422.t: "The Glacier Cracks"
 douglas.422.d: "The East Rongbuk Glacier reveals its dangers — collapsing seracs and hidden crevasses threaten the caravan's advance."
 douglas.422.f: "The sun barely warmed the valley floor when the first sound came — a hollow, groaning crack from deep beneath the ice. Then another. The men froze. Yaks turned restless. Snow fell from the cliffs above in slow, hissing sheets.\n\nThe East Rongbuk Glacier looked still from afar, but up close, it was a maze of blue ridges, crevasse fields, and leaning towers. Each step was a guess. Each footprint a gamble.\n\nThey tried to skirt a ridge on the left. The ice gave way. A porter vanished without a sound. A second man dangled from a rope, screaming. His crampons scraped against smooth ice, found nothing. They pulled him up — bloodied, wide-eyed. No one spoke for a long time.\n\n[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] looked ahead. There were three more kilometers of glacier before the slope leveled out. They could push through — now, quickly — or fall back, wait for colder hours, and try again when the ice stiffened.\n\nBut the weather was shifting. The clouds rolled like drums. Delay could mean storm."
 douglas.423.t: "The Ice Wall"
 douglas.423.d: "To reach the North Col, the team must scale a steep and exposed ice slope, swept by wind and shadow."
 douglas.423.f: "The route angled sharply upward. A glacier tongue, hard as iron, led directly into the sky. The North Col hovered above them like a promise carved in ice. But there was no trail — only slope, only wind, only fear.\n\nThe higher they climbed, the stronger the wind became. It did not howl — it screamed. It peeled snow from the wall and flung it in their faces like glass. Anchors refused to bite. Ropes stiffened. The sun vanished behind clouds as if ashamed.\n\nA man slipped. His scream was brief. They held him — barely. But the rope was frayed now. And the ridge above seemed no closer.\n\nSome Sherpa refused to continue, kneeling in the snow and whispering prayers to unseen deities.\n\n[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] stood at the base of the final pitch. The ridge line shimmered above like a hallucination. They could force their way up — or descend, rest, and try again with stronger ropes and warmer weather.\n\nBut delay risked storms. Or worse — doubt."
 douglas.424.t: "The Edge of Breath"
 douglas.424.d: "The team establishes a final camp above the North Col, exposed to the wind and the weight of the summit above."
 douglas.424.f: "There was no shelter. Only the wind, and the sound of lungs searching for air that wasn't there. Tents bent inward with every gust, as if the mountain itself were trying to swallow them.\n\n[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] crawled inside a sleeping bag still coated in frost. The thermometer was useless. The cold was no longer a number — it was a condition of existence. No fire. No appetite. Just shivering, and the relentless hiss of oxygen being bled into masks by valves already icing over.\n\nOne of the Sherpa did not speak anymore. He sat still, eyes open, unmoving. His fingers had turned gray. Another kept whispering about home, though no one had asked.\n\nThey were above 8,000 meters now. The death zone. Muscles no longer healed. The body consumed itself to stay alive. Even breathing was a decision.\n\nThe summit ridge lay ahead. They would either reach it tomorrow — or never again speak of it."
 douglas.425.t: "The Second Step"
 douglas.425.d: "Just below the summit, the team reaches a sheer cliff of rock and ice — the greatest obstacle on the north ridge."
 douglas.425.f: "It rose out of the ridge like a wall meant for giants. Ten meters high, black, vertical, rimed with frost. The Second Step.\n\nThere had been no warning. No map had shown this.\n\nThe path ended here. On one side, a thousand meters of air. On the other, a narrow ledge no wider than a boot. Wind clawed at their jackets. Oxygen hissed through the masks like steam.\n\n[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] stared upward. There was no obvious handhold. No crack. Just blank rock, slick with frozen breath. The Sherpa would not go farther. The others waited, eyes hollow, too tired to speak.\n\nOne man suggested trying without packs. Another offered to climb and fix a rope. But there were no ropes left.\n\nThey had reached the place where men turned around. Or vanished."
 douglas.425.g: "Attempt to climb the Second Step."
 douglas.425.h: "Turn back. This is the end."
 douglas.431.t: "The Roof of the World"
 douglas.431.d: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] reaches the summit of Chomolungma — the first human to stand above the world."
 douglas.431.f: "There was no wind. No sound. Only the crunch of snow under [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetHerHis] boots, and the hollow silence of a world left behind.\n\nThe final steps felt like a dream. Lungs burning, eyes blurred, body trembling — and then: nothing above.\n\n[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] stood on the summit alone, the sun striking the snows like flame. Far below, the clouds drifted like oceans. Peaks that once seemed mighty now lay like crumpled parchment.\n\nThe Earth curved. Time stopped. Just a single moment carved in ice and breathless sky."
 douglas.431.g: "The Third Pole is ours."
 douglas.432.t: "The Mountain Waits"
 douglas.432.d: "Faced with loss, exhaustion, and dwindling hope, the expedition is called off before reaching the summit."
 douglas.432.f: "No decision came easily. It wasn't the storm, or the frostbite, or the hunger that ended it. It was the silence around the fire. The eyes that no longer lifted. The men who no longer asked 'how far' but 'why'.\n\nThe maps were torn, the ropes stiff with ice. The porters murmured prayers in the dark. Even [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] no longer looked at the summit — only at the sky.\n\nThey buried what they could not carry. Left a flag on a cairn below the pass.\n\nOn the long descent, no one spoke. But in their silence was no shame."
 douglas.432.g: "Failure on Everest is not defeat. Only delay."
 douglas.433.t: "They Never Came Down"
 douglas.433.d: "After the last push, no word was heard again. The mountain kept its silence."
 douglas.433.f: "The last signal came at dusk. A flicker of light on the ridge. A silhouette moving just below the sky. Then — nothing.\n\nFor days, they searched the flanks. Sherpa combed the glacier. No rope. No glove. Only windblown tracks that led to nowhere.\n\nNo one knew how far they made it. Whether they reached the top. Whether they looked down on the world and saw it whole.\n\nOnly one thing was certain: they had not returned.\n\nSome said they fell. Others that they lay just beneath the snow, one arm outstretched toward heaven.\n\nBut a few whispered something else — that the mountain had accepted them. And that they would still be there, in the ice and the stone, waiting for someone to follow."
 douglas.433.g: "The expedition is lost to legend."
 douglas_third_pole_modifier: "The Third Pole"
 douglas_mount_everest_physicist_button: "Weather Forecasts in the Himalayas"
 douglas_mount_everest_physicist_button_desc: "Variable weather conditions have often been the reason for failed expeditions in the past. A physicist with a meteorologist's trait could calculate a suitable date for an expedition when the summit attempt would have the best view."
 douglas_mount_everest_engineer_button: "Improved Oxygen Supply"
 douglas_mount_everest_engineer_button_desc: "The use of oxygen cylinders for mountaineering at extreme altitudes is still in its infancy. An engineer could develop a better device from this experimental technology."
 douglas_mount_everest_physician_button: "Research into Altitude Sickness"
 douglas_mount_everest_physician_button_desc: "Altitude sickness is considered one of the dangerous side effects of mountaineering in the Himalayas. An experienced physician could investigate the condition further."
 douglas_mount_everest_ethnologist_button: "Local Sherpa"
 douglas_mount_everest_ethnologist_button_desc: "The most successful routes to Himalayan peaks lead through the knowledge of the locals, who know the territory best. An ethnologist could recruit a skilled Sherpa as a partner for the expedition."
 douglas_mount_everest_geologist_button: "Geological Survey"
 douglas_mount_everest_geologist_button_desc: "A geologist can create a profile of the mountain and outline more promising routes on the mountain, as well as suggest better ways of climbing it."
 douglas_mount_everest_risk_decrease_tt: "The initial risk when climbing Mount Everest is lower."
 douglas.402.t: "A Forecast"
 douglas.402.d: "Dr. [ROOT.Var('curie_physicist_var').GetCharacter.GetLastName] delivers the first long-range weather model for the Himalaya — days before [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName]'s expedition departs."
 douglas.402.f: "For months, the physicist had worked in silence. Charts. Barometric data. Wind records from India. And a theory — radical, perhaps, but elegant: that the great winds of Central Asia followed seasonal corridors, not chaos.\n\nNow, with chalk-streaked sleeves and cracked fingertips, Dr. [ROOT.Var('curie_physicist_var').GetCharacter.GetLastName] stood before the mountaineering board and pointed to the paper: a sequence of isobars, drawn by hand, predicting a ten-day atmospheric window along the Himalayan crest.\n\n[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] narrowed [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetHerHis] eyes. 'And you're certain?'\n\nThe physicist adjusted the spectacles.\n\n'As certain as one can be — when speaking to a mountain.'"
 douglas.402.g: "Use the forecast to time the ascent."
 douglas.403.t: "Air for the Death Zone"
 douglas.403.d: "Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] unveils a new oxygen apparatus designed for high-altitude survival."
 douglas.403.f: "Until now, oxygen above 8,000 meters had been an experiment — an awkward, hissing burden strapped to the backs of men who could barely walk. Leaking valves. Frozen tubes. Tanks too heavy for breathless shoulders.\n\n[ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] changed that.\n\nWith pressure regulators fine-tuned to micro-tolerances, insulated tubing, and a modular harness system, the new device weighed half as much and delivered twice the flow stability. The tanks could now be worn inside clothing, preventing freeze. The mask sealed to the face like a diver's second skin.\n\n[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] lifted the device with a gloved hand and nodded.'Will it work above 26,000 feet?'\n\nThe engineer smiled.\n\n'It was built to work where nothing else does.'"
 douglas.403.g: "Equip the team with the improved system."
 douglas.404.t: "The Invisible Danger"
 douglas.404.d: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] briefs the team on how to identify and prevent altitude sickness during the climb."
 douglas.404.f: "The frostbite would be visible. The falls could be prepared for. But this — this was something else.\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetLastName] stood before the expedition and began to describe the symptoms: the headache, the breathlessness, the subtle confusion that led to fatal decisions.\n\n'It begins like drunkenness,' [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] said, 'but ends like drowning.'\n\n[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] listened in silence. It was a prescription for survival."
 douglas.404.g: "Follow the physician's protocol precisely."
 douglas.405.t: "The Man Who Knows the Mountain"
 douglas.405.d: "Through quiet negotiation and cultural insight, Dr. [ROOT.Var('roy_ethnologist_var').GetCharacter.GetLastName] secures the support of a veteran Sherpa with unmatched knowledge of Everest's slopes."
 douglas.405.f: "He did not carry maps. He did not speak much English. And yet, when he pointed, the mountain answered.\n\nIt was [ROOT.Var('roy_ethnologist_var').GetCharacter.GetLastName] who found him — not in a list of names, but in a quiet village two valleys away.\n\n'He has been higher than any of us,' the ethnologist said, 'and returned more than once.'\n\n[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] extended a hand. The Sherpa took it silently. No ceremony. No doubt.\n\n'You may have studied the summit,' Dr. [ROOT.Var('roy_ethnologist_var').GetCharacter.GetLastName] murmured, 'but he has spoken to its shadow.'"
 douglas.405.g: "Hire the veteran Sherpa as lead guide."
 douglas.406.t: "The Bones of the Mountain"
 douglas.406.d: "Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] surveys the terrain and uncovers a safer ascent route through ancient formations."
 douglas.406.f: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe|U] ran his fingers along the black striations in the stone and nodded slowly. Schist, then gneiss, then a pocket of fractured limestone. Fault lines like scars. Pressure folds like frozen waves.\n\n'The mountain is not still,' the geologist said, 'only slow.'\n\nFor hours, Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] walked ahead of the team, hammer in hand, knocking, listening, reading. The scientist marked a ridge that avoided a dangerous icefall. Another that cut diagonally through wind-exposed scree, saving two days of climbing.\n\n[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] watched silently.\n\n'Can you predict what will hold?'\n\nDr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] shrugged.\n\n'No,' [ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe] said. 'But I can tell you what has held for the last ten million years.'\n\nAnd sometimes, that was enough."
 douglas.406.g: "Follow the geologist's recommendations."
 douglas.121.t: "Courage Forged at Home"
 douglas.121.d: "Years of training in [ROOT.GetCountry.GetAdjective] mountains have instilled calm where once there was hesitation. [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] returns with a steadier hand—and a braver heart."
 douglas.121.f: "'I used to think fear was something to overcome,' [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetSheHe] said. 'But in truth, it's something to carry without letting it rule you.'\n\nFor months, [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] climbed the ridges and glaciers of home—alone, in silence, often retracing the same route to notice what had once gone unseen.\n\nThe peaks did not grow taller, but [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetSheHe] did. Rockfall, cold, and whiteout skies became familiar adversaries. And though none of the climbs made headlines, each left a mark—not in fame, but in nerve."
 douglas.121.g: "Let the high places come."
 douglas.122.t: "Steps Never Wasted"
 douglas.122.d: "Where others turned back, [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] simply kept going. Even failure became fuel—and every trail, a lesson."
 douglas.122.f: "The summit was never the point. Not entirely.\n\nOn one ridge, the storm closed in before [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetSheHe] reached the final pitch. On another, an avalanche erased the route overnight. At times, food ran low, or guides abandoned the effort. But [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetSheHe] remained. Returned. Adjusted.\n\nA mountain does not yield to stubbornness. But it recognizes persistence.\n\nFor months, [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] scaled familiar peaks in unfamiliar ways—probing new approaches, testing tools, mapping hidden shelves. What others deemed fruitless repetition became the groundwork of something harder to earn than glory: endurance."
 douglas.122.g: "No path walked twice is ever the same."
 douglas.123.t: "Beyond the Known Maps"
 douglas.123.d: "Curiosity drove [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] beyond the routes others trusted. There, in the blank spaces, [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetSheHe] found a purpose—and a path."
 douglas.123.f: "The old maps showed borders of knowledge, not just of land. Most climbers stayed within them. Not [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName].\n\nWhile others traced established routes, [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetSheHe] wandered beyond—the crumbled ridges no one charted, the valleys unnamed, the cliffs too far from any town to tempt tourists or glory-seekers.\n\nOn one such journey, [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetSheHe] camped near a forgotten glacier, catalogued rock strata that hinted at ancient upheaval, and mapped a ravine the locals whispered about but had never dared enter. It was not a first ascent. But it was a first understanding."
 douglas.123.g: "There's no joy like finding what no one expected."
 douglas.124.t: "Steel and Stone"
 douglas.124.d: "When [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] met General [SCOPE.sCharacter('douglas_general_scope').GetLastName], experience clashed with instinct—and both emerged transformed."
 douglas.124.f: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetSheHe|U] had the posture of a person used to shouting across artillery barrages, and a uniform that still bore Alpine snowdust. General [SCOPE.sCharacter('mountain_general').GetFullName] had fought in the heights, led men through frost and silence, and understood the mountain not as a barrier, but as a battlefield.\n\n[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] came to learn from [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetHerHim]. And yet, within days, it was clear the exchange was mutual.\n\n'We plan campaigns. You plan survival,' the General muttered as [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetSheHe] examined pitons and altitude maps.\n\n'You move armies,' came the reply, 'I move alone. But the mountain judges us both the same.'"
 douglas.124.g: "The mountain teaches all, in different tongues."
