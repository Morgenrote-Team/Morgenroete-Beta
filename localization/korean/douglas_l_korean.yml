 je_douglas_mountaineering_expedition_reason: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName]산악인인 그는 현재 산악팀을 이끌고 [SCOPE.sState('douglas_location_scope').GetName] 에서 원정을 진행 중입니다. 목표는 봉우리를 처음 오르는 것입니다. 등반 속도는 그의 경험과 성격에 따라 크게 달라집니다. 산의 난이도에 따라 더 큰 위험이 발생할 수 있습니다. 원정대가 일정 시간 내에 목표에 도달하지 못하면 [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] 에서 정상 등반을 중단합니다. 원정대가 어떤 이유로든 상상할 수 있는 가장 큰 위험에 빠지면 최악의 상황이 발생합니다." #deepl:488000629

