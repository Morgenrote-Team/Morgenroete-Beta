 douglas.103.t: "산악연대"
 douglas.103.d: "산악 정복과 산악 방어에 대한 뛰어난 경험을 바탕으로, [SCOPE.sCharacter('douglas_mountain_veteran').GetFullName](은)는 본인의 우수한 실력을 활용하여 정예 산악 부대를 창설하기로 결정하였다."
 douglas.103.f: "몇몇 국가에서는 고산지대 전투에 특화된 정예 부대를 두고 있는데 게비르크스예거, 알피니, 샤쇠르 알팽이 그 예시다. 1872년 창설된 알피니는 세게에서 가장 오래된 현역 산악 보병 부대이다. 창설 당시 이들의 임무는 이탈리아와 프랑스, 오스트리아-헝가리 국경을 지키는 것이었다."
 douglas.103.g: "이것으로 그의 유산이 후세에 전해질 것이다."
