 je_douglas_mountaineering_equipment: "새로운 등산 장비" #deepl:787408716
 je_douglas_mountaineering_equipment_reason: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] 는 현재 우리나라 산악팀을 위한 장비를 재구축하고 있습니다. 업그레이드에는 1년이 걸리지만 정상 도전 성공 확률을 높일 수 있을 것입니다." #deepl:121015110
