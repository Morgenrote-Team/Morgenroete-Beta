 douglas.209.t: "최신 장비"
 douglas.209.d: "#V [AddLocalizationIf( Scope.Var('douglas_mountain_expedition_var').IsSet , Scope.Var('douglas_mountain_expedition_var').GetFlagName)]#!의 등반에 나서는 과정에서 [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName](은)는 등산에 요구되는 조건에 비해 장비가 너무 좋아 과분할 정도라는 사실을 깨달았다."
 douglas.209.f: "등산대의 장비 수준이 산의 난이도보다 높다면 등반 초기의 위험 요소가 줄어들고 진행 보너스를 얻게 됩니다."
 douglas.209.g: "정상에서 만나세!"
 douglas.216.t: "의욕 상실"
 douglas.216.d: "우리 등산대는 오늘 다른 국가에서 #V [AddLocalizationIf( Scope.Var('douglas_mountain_expedition_var').IsSet , Scope.Var('douglas_mountain_expedition_var').GetFlagName)]#!을 최초로 정복했다는 소식을 접하게 되었다. 대원들 사이에서 불화가 빚어지고 있으며, 일부는 하산에 나섰고 [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] 역시 등산을 포기하겠다는 의사를 공개적으로 밝힌 상황이다."
 douglas.216.f: "다른 국가가 산 정상을 먼저 등정하면 그 산을 오르려는 시도도 거의 확실히 포기하게 된다."
 douglas.216.g: "이번 원정은 그 의미를 잃었다."
 douglas_mountaineer_speech_tt: "등산 원정은 시간 초과까지 #YELLOW 60일의 시간#!이 주어집니다."
 douglas.208.t: "등정을 앞둔 다짐"
 douglas.208.d: "정상을 향한 마지막 전진을 앞두고 [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName](이)가 대원들에게 말을 건넸다. [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetHerHis] 목소리는 #V [AddLocalizationIf( Scope.Var('douglas_mountain_expedition_var').IsSet , Scope.Var('douglas_mountain_expedition_var').GetFlagName)]#!처럼 장대했다."
 douglas.208.f: "\"우리 위에는 정상이 있다. 그 정상은 차갑고, 고요하고, 움직이지 않는다. 정상은 용기를 따지지 않는다. 우리에게 의문을 던지지도 않는다. 그러나 우리는 한 걸음씩 내딛을 때마다 정상에 답한다. 정상에는 두드림도 영광도 없다. 오직 우리 뒤에 펼쳐진 풍경과 감히 도전했다는 자부심 뿐이다. 우리는 산을 만나러 온 것이 아니다. 산을 정복하러 온 것이다. 대원들 각자에게는 두려워할 권리가 있다. 하지만 어떤 두려움도 우릴 막을 순 없다. 오늘은 아니다.\""
 douglas.208.g: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFirstName](와)과 함께라면 산을 거스를 수 있다!"
 douglas_alpine_club_new_board_tt: "산악회의 신규 이사회가 선출됩니다."
 douglas.302.t: "산악회의 신규 이사국"
 douglas.302.d: "산악회는 오늘 [SCOPE.sState('douglas_alpine_club_state').GetStateRegion.GetCityHubName]에서 열린 회담을 통해 신규 이사국을 임명하였다."
 douglas.302.f: "산악회는 다음의 조직을 따른다는 결정을 내렸다.\n\n#V 회장국: [GetGlobalVariable('douglas_alpine_club_president_global_var').GetCountry.GetName|V]#!\n\n#V 이사국: [GetGlobalVariable('douglas_alpine_club_board_member_1_global_var').GetCountry.GetName|V] [GetGlobalVariable('douglas_alpine_club_board_member_2_global_var').GetCountry.GetName|V] [GetGlobalVariable('douglas_alpine_club_board_member_3_global_var').GetCountry.GetName|V] [GetGlobalVariable('douglas_alpine_club_board_member_4_global_var').GetCountry.GetName|V] [GetGlobalVariable('douglas_alpine_club_board_member_5_global_var').GetCountry.GetName|V]"
 douglas.302.g: "신규 이사국이 된 것을 축하드립니다."
 douglas.302.h: "뇌물 수수는 없었소?"
 douglas_mountaineering_international_expedition_modifier: "최근 국제 등반 원정대"
 douglas_mountaineering_international_expedition_setback_modifier: "산악회의 차질"
 douglas.311.t: "Proposal for an International Mountaineering Expedition"
 douglas.311.d: "[SCOPE.sCountry('douglas_board_scope').GetName], a board member of the Alpine Club, has requested the organization of an international mountaineering expedition. The country would pay the commissions. However, the club's president can veto this offer."
 douglas.311.f: "'Gentlemen, the mountains care not for flags or frontiers. They tower above the petty quarrels of nations, impervious to our rivalries. That is why I stand before you today with a vision: a summit beyond politics, beyond bloodlines—a summit of mankind itself. Let us assemble the finest climbers from across Europe, the Americas, even distant Asia, and face the mountain not as Portuguese, Frenchmen, or Saxons—but as a fellowship of those who dare. It shall be a triumph not only of will and rope, but of diplomacy, trust, and shared glory. Let this be our legacy: not conquest, but cooperation.'"
 douglas.311.g: "A good proposal."
 douglas.311.h: "No."
 douglas.312.t: "Veto"
 douglas.312.d: "[SCOPE.sCountry('douglas_president_scope').GetName], the President of the Alpine Club, has announced a veto against an international mountaineering expedition."
 douglas.312.f: "'Climbing with the French? The Swiss? I'd rather wrestle a bear in slippers. Have you ever tried to agree with an Englishman about tea, let alone tents? No, thank you. Last time we invited a foreign team, they brought four barrels of schnapps and forgot the maps. Besides, gentlemen, the mountain's not going anywhere—and neither am I. If glory is to be won, let it be our boots in the snow, not some United Nations picnic on a glacier. We will climb with dignity—or not at all!'"
 douglas.312.g: "Who elected this president, after all?"
 douglas.321.t: "Choosing the Summit"
 douglas.321.d: "With the international expedition approved, the club now debates the ultimate question: which peak shall be the battleground of glory?"
 douglas.321.f: "The Alpine Club can decide to climb any mountain located within the territory of a country with a mountaineering club. A license is not required. However, the mountain must be at levels 2, 3, or 4."
 douglas.321.g: "The mountain shouldn't be too difficult."
 douglas.321.h: "Let's take one of the usual classic mountains."
 douglas.321.i: "The mountain should be a challenge!"
 douglas.331.t: "Alpine Club Expedition"
 douglas.331.d: "The Alpine Club has announced a bold objective: a named summit to be conquered by an international climbing team, comprised of its own leading members. The Goal is the #V [AddLocalizationIf( Scope.Var('douglas_mountain_expedition_var').IsSet , Scope.Var('douglas_mountain_expedition_var').GetFlagName)]#!"
 douglas.331.f: "All members of the Alpine Club's executive committee can participate in an international mountaineering expedition, as organized by the Alpine Club. This requires an active mountaineer to join the club expedition. International expeditions have a near-certain chance of success, but they rarely take place. The club president, in the event of a successful ascent, is entitled to the first ascent and receives the most prestige, but all other executive committee members who participated are also rewarded."
 douglas.331.g: "Let the summit bear a common banner."
 douglas.341.t: "The Ascent of Nations"
 douglas.341.d: "Flags are raised. Provisions packed. The international expedition prepares to ascend where no one has yet stood."
 douglas.341.f: "A hush settled over the base camp, where accents from across the globe mingled with the crisp morning air. Some tightened their boots in silence, others exchanged last nervous jokes. At the edge of the encampment, [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] stood still, watching the summit wrapped in cloud.\n\n'They say it's never been climbed,'' murmured the Frenchman, lighting a cigarette.\n\n'Then it's time it was,' replied the Englishwoman with a quiet smile."
 douglas.341.g: "Let the world climb together."
 douglas.351.t: "Summit Triumphant"
 douglas.351.d: "After weeks of hardship, the summit is reached.. [GetGlobalVariable('douglas_alpine_club_president_global_var').GetCountry.GetName|V] has taken possession of the summit on behalf of the Alpine Club."
 douglas.351.f: "They stood shoulder to shoulder in the thin air, ice crystals clinging to beards and lashes, exhaustion written into every crease of their faces. Yet none stepped back as the President of the Alpine Club unfolded the expedition's banner and planted it firmly into the snow.\n\nThe others gathered round. A camera—laboriously hauled to this impossible height—was prepared. Behind them, the clouds opened, revealing the valley below like a painted map.\n\n'Hold steady,'' said the photographer. 'This one is for the ages.'\n\nThe shutter clicked.\n\nThat single photograph would grace drawing rooms, lecture halls, and newspapers across the world. In it, the President stands upright with the flag, surrounded by frostbitten, grinning climbers—united not by nation, but by conquest."
 douglas.351.g: "For science, for glory, for mankind."
