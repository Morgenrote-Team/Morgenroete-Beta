 je_douglas_mount_everest_expedition_preparation: "Preparation for Mount Everest Expedition"
 je_douglas_mount_everest_expedition_preparation_reason: "Conquering the world's highest mountain requires not only an outstanding climber, but also comprehensive preparation. The more we prepare for our ascent, the lower the basic risk."
 je_douglas_mount_everest_expedition: "Mount Everest Expedition"
 je_douglas_mount_everest_expedition_reason: "Mount Everest is the king of the mountains. Progress here is measured entirely by the outcome of events. Whether a climber succeeds depends on his or her abilities. Since the basic risk of Mount Everest is very high, it can be assumed that the expedition sought comprehensive scientific advice beforehand to prevent minor oversights from becoming a catastrophe."
