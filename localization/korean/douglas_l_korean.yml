 je_douglas_mountaineering_equipment_reason: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName](은)는 현재 우리나라 등산팀의 장비를 재정비하고 있습니다. 정비에는 1년의 시간이 소요되지만 등정 시도의 성공 확률을 높여주게 됩니다. "
 douglas_mountaineering_equipment_advance_tt: "등산 장비의 현대화가 1단계 진행됨"
 je_mountaineer_dies_tt: "[concept_douglas_mountaineer]이 사망하면 일지 항목은 실패로 돌아갑니다. "
 je_douglas_mountaineering_equipment_success: "1년 뒤 [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName]이 장비 개선을 마무리함"
 douglas.111.t: "첫 걸음"
 douglas.111.d: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName](이)가 원정대에게 기초적인 등반 장비를 배부하였다."
 douglas.111.f: "즉흥적인 등반의 시대는 끝났다. [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName]의 지도 아래 원정대는 최초의 표준 장비를 지급받았다. 밧줄과 얼음도끼, 피톤, 튼튼한 배낭 등이다. 이러한 도구들은 단순히 목숨을 지키는 것을 넘어서 산에 대한 인식 그 자체를 바꾼다. 등반은 더욱 체계적이고 계획적으로 변모한다. 과거에는 용기와 괴력만 있으면 됐지만 이제는 기술과 준비가 구심점으로 작용한다. 이는 얼음과 바위의 무자비한 세계로 나아가려는 모든 이들에게 있어, 소박하지만 시대를 정의하는 중요한 발걸음이다."
 douglas.111.g: "이제 산은 준비된 자들의 것이다."
 douglas.112.t: "밧줄로 묶다"
 douglas.112.d: "우리 산악인 [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName]에게 좋은 생각이 떠올랐다. 안전성 향상을 위하여 각 대원을 고정 밧줄 묶음을 도입하는 것이다."
 douglas.112.f: "산에서는 매 발걸음에 위험이 따르지만, 이제는 아무도 홀로 등반에 나서지 않는다. 밧줄 묶음의 도입은 사고방식의 변화를 뜻한다. 더 이상 혼자서 산에 맞서는 것이 아니라 노끈으로 묶이고 믿음으로 단합된 등반가들의 사슬로 맞서게 된 것이다. 이러한 변화는 질서와 규율, 공동 책임의 깊은 의식을 가져다준다. 누군가 떨어지면 다른 이들이 붙잡아 준다. 위험은 제거된 것이 아니라 분산된다. 산은 여전히 야생의 영역이나, 그것을 향한 우리의 대응은 더 이상 영웅주의가 아닌 협동이다."
 douglas.112.g: "하나의 밧줄. 하나의 의지. 하나된 원정대."
 douglas.113.t: "다치기 쉬운 몸"
 douglas.113.d: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName](이)가 원정대를 위한 응급 체계를 처음 도입하겠다고 단언했다."
 douglas.113.f: "물집, 골절, 동상 — 산에게 자비란 없다. 예전에는 위험의 일부로 여겼던 것이 이제는 체계적으로 대처할 수 있다. 조그만 구급상자도 잘 활용하면 목숨을 구할 수 있다. 빠른 설치가 가능한 대피소는 시간을 번다. 처음으로 기본 의학 지식이 훈련 과정에 포함되고 있다. 산은 여전히 모든 것을 요구하지만, 구급상자와 비상시 행동 요령의 도입으로 원정대는 투지 이상으로 대응에 나설 수 있게 되었다. 이제 인체는 더 이상 무시의 대상이 아니라, 보호의 대상이다."
 douglas.113.g: "아무리 강한 자도 쓰러질 수 있는 법."
 douglas.114.t: "암석이 말한다"
 douglas.114.d: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName](은)는 등산 과정에 과학적 기법을 도입하고 나섰다.  지형 분석을 개선하기 위해 지질학적 지식을 동원하게 된 것이다."
 douglas.114.f: "한떄는 경치로만 보였던 자갈과 퇴적물, 돌덩이가 이제는 읽어낼 수 있는 언어로 거듭났다. 지질학 전문 지식을 갖춘 이가 대원으로 합류한 것이다. 지층은 옛날의 지각 변동을 보여주고, 암석의 유형은 눈사태의 위험을 알리며, 단층선은 안전한 탐험로를 안내한다. 산은 더 이상 신화의 대상이 아니라 모든 것을 담은 기록 보관소가 도니다. 과학자들이 기록지와 망치를 들고 도착하면, 탐사는 단순한 모험이 아닌 현장 연구가 되기에 이른다. 이는 보는 방식의 새로움 — 조용한 혁명이다."
 douglas.114.g: "오르기 전에 배우자."
 douglas.115.t: "고도의 호흡"
 douglas.115.d: "화학전의 경험을 등산 목적에 활용하지 않을 이유가 있을까? 신기술 덕에 극한의 고도에서도 산소 마스크를 사용할 수 있게 되었다."
 douglas.115.f: "특정 고도를 넘어가면 대기는 희박해진다. 호흡은 힘들어지고 우리 몸은 저항에 나선다. 허나 지금 인간은 기계 장치의 도움으로 결코 갈 수 없었던 곳에 도달한다. 한때 과학의 호기심거리였던 산소 마스크는 이제 필수품이 되었다. 산소 마스크는 가능성의 한계를 다시 세운다. 해발 7,000m 이상의 세상에 발을 내딛을 수 있게 되었지만, 대가를 치러야 한다. 등반가는 더 이상 진정한 혼자가 아니라 생명 유지 체계의 일부가 된 것이다. 산을 정복하는 영광은 퇴색되지 않았다. 그저 차가워졌을 뿐이다."
 douglas.115.g: "인공적으로 숨을 쉴지언정, 우리는 이겨낼 것이다."
 je_douglas_mountaineering_training: "등산 훈련"
 je_douglas_mountaineering_training_reason: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName](이)가 경험을 쌓고 새로운 실력을 터득하기 위해 국내 유수의 산을 탐사하고 등정하는 여정에 나섰다."
 douglas_stop_mountaineering_project_button: "등산 과제 중단"
 douglas_stop_mountaineering_project_button_desc: "현재 등산 과제를 중단합니다. 모든 등산 진행도가 사라집니다."
 douglas_stop_mountaineering_project_tt: "#italic 등산 과제 중단#! 버튼을 클릭하여 과제를 중단할 수 있습니다."
 douglas.104.t: "내면의 산"
 douglas.104.d: "5년간의 고된 등반과 훈련 끝에 [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName](이)가 돌아왔다."
 douglas.104.f: "산은 말이 없지만 가르침을 준다. 5년이라는 긴 시간 동안 우리 산악인은 설맹과 무너지는 암벽, 매서운 바람, 그리고 어떤 칼날보다도 더 깊이 패이는 침묵에 맞섰다. 허나 그 모든 고난은 지식을 근육으로, 인내를 호흡으로 바꿨다. 야망으로 시작했던 것이 이제는 실력으로 다듬어진 것이다. 등반가는 돌의 소리에 귀 기울이고, 폭풍의 기운을 가늠하고, 눈을 감고 마음을 가다듬으며 매듭을 묶는 법을 배웠다. [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetSheHe|U]는 바뀐 모습으로 돌아왔다. 이것은 숙련의 시작이다."
 douglas.104.g: "산을 정복하는 것이 아니라... 헤아리게 되었구나."
