 douglas.211.t: "정상"
 douglas.211.d: "힘겨운 등반을 거쳐 마침내 산악인들은 정상에 올랐다. [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName](은)는 [ROOT.GetCountry.GetNameNoFormatting] 대표로서 지구 상에서 처음으로 이 지점을 정복한 사람이 되었다. 이제 남은 것은 지금의 승리를 만끽하는 것이다."
 douglas.211.f: "\"당신이 가장 먼저 던질 질문이자 제가 답해야 하는 질문은 바로 이것입니다. '에베레스트산을 오르면 무슨 쓸모가 있습니까?' 제 대답은 단연코 '아무 쓸모 없습니다'입니다. 얻을 수 있는 이득은 조금도 없습니다.\n\n아, 물론 고산 지대에서 인체가 어떻게  반응하는가를 조금은 터득할 수 있겠죠. 어쩌면 의료 전문가들이 우리를 진찰해서 항공 분야에 활용할지도 모릅니다. 하지만 그것 이외에 돌아오는 것은 없습니다. 금이나 은도, 보석도, 석탄이나 철도 하나 가져올 수 없습니다. 식량을 늘릴 곡식 하나 심을 수 있는 땅을 칮을 수 있는 것도 아닙니다. 아무 쓸모도 없죠.\n\n그렇다 보니 당신이 만약 인간 앞의 무언가로 하여금 이 산에 도전하여 그곳으로 나아가게 하고, 그러한 분투가 살려고자 하는 분투, 다시 말해 위로, 영원히 위로 향하기 위한 분투라는 사실을 이해하지 못한다면, 우리가 향하는 이유를 알 수 없을 겁니다. 우리가 이 모험에서 얻는 것은 순수한 즐거움입니다.\n\n그리고 즐거움이란 것은 결국 삶의 목적이죠. 우리는 먹기 위해서, 돈 벌기 위해서 살지 않습니다. 우리는 즐거움을 위해 먹고 돈을 벌지요. 그것이 사는 의미이고 삶의 목적입니다.\" - 조지 리 말로리"
 douglas.211.g: "여명을 즐깁시다!"
 douglas.212.t: "등반 중단"
 douglas.212.d: "정상에 다다르려던 [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName]의 시도는 당분간 실패에 머무르게 되었다. 우리의 산악인은 모험을 포기하고 복귀할 수밖에 없었다."
 douglas.212.f: "등반가가 등반을 포기하는 데에는 여러 가지 이유가 있을 수 있다. 때로는 날씨의 변화로도 충분할 수 있고, 때로는 정상으로 가는 길이 너무 험준한 것으로 드러나서일 수도 있다. 특정 일의 시간대나 변동으로 인해 예상했던 시간보다 오래 걸려 등반이 어려워지거나 불가능해지는 경우도 있다. 그리고 때로는 그저 길을 잘못 들어서였을 수도 있다."
 douglas.212.g: "실망스럽군."
 douglas.213.t: "등산 참사!"
 douglas.213.d: "[SCOPE.sState('douglas_location_scope').GetName]의 산을 오르던 [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName](이)가 끔찍한 실수를 저질러 원정이 대참사로 끝나고 말았다. 여러 대원이 숨을 거두고 식량과 장비도 함께 아래로 추락하고 말았다. 온 나라가 충격에 빠졌다!"
 douglas.213.f: "\"매일 밤, 이해하련지 모르겠지만, 나는 마터호른의 전우들의 뒤로 쓰러져 팔을 쭉 뻗고, 한 명씩 차례로 완벽한 순서를 지키며 같은 간격으로 누운 모습을 보오. 먼저 안내원 크로즈, 그 다음은 하도, 그 다음 허드슨, 그리고 마지막으로 더글러스. 그렇소, 나는 항상 그 모습이 눈에 서린다네...\" - 에드워드 윔퍼"
 douglas.213.g: "비극일세!"
 douglas_mountaineering_expedition_cost_modifier: "등산 원정 비용"
 douglas.201.t: "등산 원정 - 1단계"
 douglas.201.d: "등산회에서 최소한의 기초 등산 장비로 등반 시도에 나서게 될 산의 후보 목록을 선정하였다."
 douglas.202.t: "등산 원정 - 2단계"
 douglas.202.d: "등산회에서 표준 등산 장비로 등반 시도에 나서게 될 산의 후보 목록을 선정하였다."
 douglas.203.t: "등산 원정 - 3단계"
 douglas.203.d: "등산회에서 좋은 등산 장비로 등반 시도에 나서게 될 산의 후보 목록을 선정하였다."
 douglas.204.t: "등산 원정 - 4단계"
 douglas.204.d: "등산회에서 고급 등산 장비로 등반 시도에 나서게 될 산의 후보 목록을 선정하였다."
