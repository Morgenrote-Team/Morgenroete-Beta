 douglas.201.t: "등산 원정대 - 레벨 1" #deepl:3784620623
 douglas.201.d: "등산 클럽은 최소한의 등산 장비만 있으면 등반을 시도할 수 있는 산을 선정했습니다." #deepl:3440213430
 douglas.202.t: "등산 원정대 - 레벨 2" #deepl:3762274122
 douglas.202.d: "등산 클럽은 등반을 시도하기 위해 표준 등산 장비가 필요한 산을 선정했습니다." #deepl:1440623022
 douglas.203.t: "등산 원정대 - 레벨 3" #deepl:2040905544
 douglas.203.d: "등산 클럽은 등반을 시도하기 위해 좋은 등산 장비가 필요한 산을 선정했습니다." #deepl:2737331426
 douglas.204.t: "등산 원정대 - 레벨 4" #deepl:3815355712
 douglas.204.d: "등산 클럽은 등반을 시도하기 위해 고급 등산 장비가 필요한 산을 엄선했습니다." #deepl:715564635
 douglas.205.t: "등산 원정대 - 레벨 5" #deepl:2062792002
 douglas.205.d: "등산 클럽은 등반을 시도하기 위해 최고의 등산 장비가 필요한 산을 엄선했습니다." #deepl:1610559016
