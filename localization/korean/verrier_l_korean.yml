 verrier.22.t: "특이한 천체 포착"
 verrier.22.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] 박사는 지난번 밤하늘을 촬영하는 과정에서 특이한 천체를 발견하였다. 행성도, 소행성도, 혜성도 아니며, 만인이 그토록 찾던 행성 X도 아닌 것으로 보인다."
 verrier.22.f: "어떤 조수들은 벌써 천문학자에게 인기 대중 소설에 등장하는 외계의 이동 수단일지 모른다고  일러두었지만, [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] 박사는 그런 건 말도 안되는 발상이라며 일축하고 나섰다. 대신 박사는 우주 천사가 드러났을 가능성이 더 높다고 보았다."
 verrier.22.g: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] 박사가 미지의 천체를 조사할 수 있도록 인력과 예산을 더욱 지원토록 하시오."
 verrier.22.h: "천문대라면 새 천체를 찾기 위한 노력에 주력해야지!"
 verrier.22.i: "아무 가치 없는 단순 속임수에 불과하겠지."
 verrier.22g.tt: "천문대는 미지의 천체를 철저히 조사하기 위하여 모든 자원을 투입하게 됩니다. 앞으로 1년 동안 새로운 천체는 발견되지 않습니다."
 verrier.22h.tt: "천문대는 미지의 천체를 묻어두고 평소 하던 천체 탐색을 계속해 나갑니다."
 verrier.23.t: "센타우루스군"
 verrier.23.d: "미지의 천체를 철저히 조사한 결과, 우리 수석 천문학자는 사진에 찍힌 천체가 완전히 새로운 소행성군에 속한다는 것을 확신하게 되었다! 이 새로운 소행성군은 '센타우루스군'으로 명명하게 되었다. 이제 발견한 천체에 적당한 이름을 붙여주는 일만 남았다."
 verrier.23.f: "그리스 신화의 켄타우로스에서 이름을 따온 센타우루스군은 목성과 해왕성 사이의 궤도를 지닌 소행성군에 속합니다. 센타우루스군으로 분류되는 소행성들의 궤도는 이심률(타원의 찌그러진 정도)에서 상당한 차이를 보입니다. 최초로 확인된 센타우루스군 소행성인 키론은 1977년에 발견되었지만, 그것을 처음으로 포착한 사진은 1895년에 촬영된 것으로 알려져 있습니다. 또다른 소행성인 이달고는 1920년에 발견되었으나 당시에는 아직 별개의 분류군으로 지정되지 않은 상황이었습니다."
