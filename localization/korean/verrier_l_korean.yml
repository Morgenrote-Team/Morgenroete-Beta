 je_verrier_venus_transit_1874: "[SCOPE.sCountry('target').GetName]의 1874년 금성 일면통과 "
 je_verrier_venus_transit_1874_reason: "보기 드문 천문 현상이 다가오고 있다. 금성이 지구와 태양 사이를 곧바로 지나가면서 태양 원반에 작은 그림자를 드리우게 될 전망이다. 전세계의 천문대들은 우리 태양계의 실제 규모를 규정하는 데 도움이 될 것으로 보고, 찰나에 진행될 현상을 관측하기 위해 준비에 나서고 있다.\n$mr_divider_for_je$\n탐사 과정에서는 성공도를 일정 획득하게 됩니다. 탐사가 끝나면 변화 요인이 부여됩니다. 성공도가 높을수록 변화 요인으로 인한 효과도 더욱 커지게 됩니다.\n#V 현재 성공도:#! [GetPlayer.MakeScope.Var('verrier_venus_transit_success_var').GetValue|0+]"
 je_verrier_venus_transit_1874_on_complete_tt: "탐사가 끝날 시점에는 #n 기상 악화 확률 25%#!로 성공도를 낮추게 됩니다. 마지막 순간에는 #V 성공도에 기반#!하여 #V 변화 요인#!을 획득하게 됩니다."
 add_je_verrier_venus_transit_1874_tt: "#V 1874년 금성 일면통과#!를 [GetPlayer.GetName]에 추가합니다."
