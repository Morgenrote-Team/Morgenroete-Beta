 verrier.171.t: "철도시"
 verrier.171.d: "The emergence of new technologies has not only changed people's sense of time, but also highlighted its limitations. With the advent of railways and telegraphs, people are becoming increasingly aware that time is not the same everywhere."
 verrier.171.f: "In the early 19th century, there was no single standard time worldwide. Every town and village followed the local solar time, which was determined based on the sun's highest point at that location. This practice was unproblematic for centuries as long as travel and communication were relatively slow. However, the rapid increase in connections between distant locations led to increasingly noticeable time differences: between London and Bristol, for example, the difference was around 11 minutes, and between New York and Chicago, almost an hour. This multitude of local times posed a serious problem for timetables that needed to coordinate precise departure and arrival times.\n\nIn response, railway companies in Great Britain developed a system known as Railway Time starting in the 1840s. Initially, this time was only for internal purposes; station clocks continued to show the local time. But the practical advantage of standardization prevailed. As early as 1847, almost all major railway companies adopted GMT as the binding time for their timetables, and by 1855, almost all British cities had adapted. Railway Time thus became the de facto national standard time, even though there was no legal basis for it."
 verrier.171.g: "Time is made by railway companies and telegraph stations?"
 verrier.172.t: "표준시"
 verrier.172.d: "[GetPlayer.GetName]에서 표준시에 관한 법이 제정됨에 따라, 종전에 철도 회사와 전신국에서만 사용되던 기존의 시간체계는 이제 일상생활의 일부가 되었다. 이러한 합리화 절차로 행정과 경제 면에서 효율성을 높였지만, 일부 산간마을에서는 자체적인 기준 시간이 폐지된 것을 아쉬워하고 있다."
 verrier.172.f: "철도 시간은 후대의 국가 표준시의 실용적인 전신에 불과했습니다. 이는 정부의 주도적인 노력보다는 사업상의 필요에 의해 생겨났습니다. 이후 많은 국가들이 국가 표준시를 법제화하여 철도 시간표뿐 아니라 사회 모든 영역에 적용하기 시작했습니다. 1880년 영국이 표준시를 처음 도입한 이래, 1893년 독일이 중앙유럽시(CET)를 도입하며 그 뒤를 따랐고, 1911년 프랑스가 그리니치 표준시(GMT)에 1시간을 더한 시간을 채택하기에 이르렀습니다.\n\n철도 시간과 표준시의 결정적인 차이점은 적용 범위와 구속력에 있습니다. 철도 시간은 초기에는 철도 운영 효율화를 목표로 함으로서, 산업 현장에 특화된 해결책이었던 반면, 국가 표준시는 정부가 강제적으로 도입한 포괄적인 시간 표준화에 해당되었습니다. 양측 모두 1884년 국제자오선회의의 본초자오선 도입과 간접적인 연관이 있습니다."
 verrier.172.g: "막스 베버라면 분명 이러한 상황에 대해 할 말이 있을 것이다."
 verrier.173.t: "국제자오선회의"
 verrier.173.d: "At the conference in [ROOT.GetCountry.GetCapital.GetCityHubName], in the presence of representatives from several countries, it was decided that the prime meridian should run through [GetGlobalVariable('verrier_prime_meridian_global_var').GetCountry.GetName]. People are already talking about the '[GetPlayer.GetCustom('verrier_prime_meridian_city')] Mean Time'."
 verrier.173.f: "The International Meridian Conference was a conference to determine a prime meridian for international use. The subject to discuss was the choice of 'a meridian to be employed as a common zero of longitude and standard of time reckoning throughout the world'. Historically, it resulted in the recommendation of the Greenwich Meridian as the international standard for zero degrees longitude. However, the introduction of the prime meridian was no longer purely cartographical, but was the beginning of an international agreement on time zones that had to be oriented towards a specific point.\n\nGreenwich's historical prevalence was primarily due to Great Britain's status as a great power and its dominance in trade. Power, physics technologies, market leadership in the merchant navy, the successful laying of a transatlantic cable, the assistance of a company in telegraphy or railway matters, and a good astronomer all play a role in determining the land through which the prime meridian passes."
 verrier.173.g: "Can time be internationalized?"
 verrier.174.t: "시간대"
 verrier.174.d: "After establishing [GetPlayer.GetCustom('verrier_prime_meridian_city')] as the prime meridian and [GetPlayer.GetCustom('verrier_prime_meridian_city')] Mean Time as the reference time, the focus of the International Meridian Conference is on defining time zones."
 verrier.174.f: "The division into time zones didn't suit every country. While the USA easily adopted the concept of a nation divided into four zones, this wasn't the case for all. Some adhered to a comprehensive, capital-oriented time zone for the entire country, even though this led to problematic time distortions at borders. In some cases, half-hour time was used instead of rounding to the nearest hour to better accommodate the specific time needs of a nation. Some states even chose a time zone that differs from their actual time zone."
 verrier.174.g: "We primarily base our work on international standards."
 verrier.174.h: "[GetPlayer.GetName] primarily needs a time zone that is beneficial to it - even if it does not fully fit into the international concept."
 verrier_radioactivity_tech: "방사능"
 verrier_radioactivity_tech_desc: "자연방사능은 1895년 앙투안 앙리 베크렐이 사진 건판의 흑화 현상을 기반 삼아 처음으로 발견하였으나, 물리 현상으로 정식 분류된 것은 1915년경에 이르러서였습니다. 처음에는 피에르 퀴리와 마리 퀴리를 중심으로 중대한 발견이 이루어졌는데, 다양한 방사성 원소의 존재를 밝혀낸 것은 물론 조사 과정에서 실제로 만들어진 것도 있었습니다. 베크렐과 퀴리 부부는 방사능 실험으로 1903년 노벨 물리학상을 수상하였으며, 이는 핵 연구의 역사적인 출발점으로 평가되고 있습니다."
 verrier_spectroscopy_tech: "분광학"
 verrier_spectroscopy_tech_desc: "분광학은 파장과 에너지, 질량 등과 같은 특정 속성에 따라 복사선을 분석하는 물리적 수단들을 총칭하는 용어입니다. 그 결과로 얻은 강도의 분포를 스펙트럼이라고 칭합니다. 로베르트 분젠과 구스타프 키르히호프는 분광기를 발명하고 방출 스펙트럼을 관찰하여 새로운 원소들을 발견하게 되었습니다."
