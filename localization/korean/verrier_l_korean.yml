 ACHIEVEMENT_verrier_moon: "플라이 미 투더 문"
 ACHIEVEMENT_DESC_verrier_moon: "1969년 여름이 되기 전에 미국으로 달 탐사에 나서십시오."
 verrier_national_space_disaster_modifier: "국가적 우주 재난"
 verrier_great_national_space_disaster_modifier: "국가적 대형 우주 재난"
 verrier_national_space_success_modifier: "지구에서 달까지"
 verrier_astronaut_modifier: "우주인"
 je_from_the_earth_to_the_moon: "지구에서 달까지"
 je_from_the_earth_to_the_moon_reason: "볼티모어 대포 클럽에서 달까지 발사체를 쏘아보낼 초대형 대포를 제작하려 한다. 여러 발사체 가운데서도 무게가 10,000kg, 두께 60cm의 알루미늄 포탄을 제작할 계획이다. 또한 주철로 제작된 포신의 규격도 길이 270m, 내경 2.7m, 두께 1.8m로 확정되었다. 이를 위해서는 그에 알맞는 무기 산업 환경과 설계 제작 능력을 갖춘 인재가 필요하다. 발사대를 둘 최적의 장소로는 플로리다가 꼽히고 있다. 자재 운송을 위해 해당 지역에 자체적인 철도망을 부설할 필요가 있다."
 verrier_baltimore_president_alive_tt: "볼티모어 대포 클럽의 [SCOPE.sCharacter('verrier_club_president').GetFullName] 회장이 목숨을 건지게 됩니다"
 verrier.131.t: "지구에서 달까지"
 verrier.131.d: "[SCOPE.sCharacter('verrier_club_president').GetFullName] 회장의 주도로 볼티모어 대포 클럽이 설립되어 총기 애호가들을 위한 오락 행사를 기획하고 있다. 이 모임에서 최근에 제시한 계획이 전국적으로 큰 화제를 불러일으키고 있다."
 verrier.131.f: "볼티모어 대포 클럽은 남북 전쟁 중에 설립되어 대포 전문가들로 구성된 모임이다. [SCOPE.sCharacter('verrier_club_president').GetLastName] 회장과 공학자 출신의 [SCOPE.sCharacter('gaudi_engineer_scope').GetFullName] 사무총장은 종전 이래 본인들의 활동이 제대로 빛을 발하고 있지 못한다고 느꼈다. 두 사람은 새로운 활동 분야를 모색하기 위해 회의를 소집했다. 신무기를 사용하기 위해 새로운 전쟁을 일으키는 방안이 부결된 이후, 지구에서 달까지 대포로 발사체를 쏘아 올리자는 방안에 합의하였다. 여러 실현 방안 중에서도 무게 10,000kg, 두께 60cm의 알루미늄 발사체를 개발하고 있으며, 길이 270m, 내경 2.70m, 두께 1.80m의 주철로 된 포신을 제작하기로 합의했다. 추진제로는 화약을 사용할 예정이다."
 verrier.131.g: "미국은 이번 연대가 끝나기 전까지 인류 최초로 달에 사람을 보낼 것이다!"
 verrier.131.h: "다음 전쟁이 일어날 때까지 기다리는 게 훨씬 안전하지 않은가..."
 verrier.132.t: "달 비행에 나설 승무원 모집"
 verrier.132.d: "모든 준비가 끝났지만 중요한 질문 하나가 여전히 남아 있었다. 그것은 누가 발사체에 탑승할 것인가였다."
 verrier.132.f: "사실 초대형 대포 발사체에 사람을 태워 우주로 보낸다는 자살 임무에 자원할 사람을 찾는다는 것은 여간 어려운 일이 아니다. 허나 볼티모어 대포 클럽 회원들 가운데서는 이를 큰 영광으로 여기고 있다. 클럽 회장과 수석 공학자 모두 탑승 자격이 있다고 나섰고, 저명한 천문학자를 추천하는 회원들도 있었다. 그보다 신중히 접근하는 측에서는 인명 피해를 막기 위해 시험 삼아 개 두마리만 우주로 보내야 한다고 주장하고 나섰다."
 verrier.132.g: "공학자 [SCOPE.sCharacter('gaudi_engineer_scope').GetFullName]"
 verrier.132.h: "천문학자 [SCOPE.sCharacter('verrier_astronomer_scope').GetFullName]"
 verrier.132.i: "클럽 회장 [SCOPE.sCharacter('verrier_club_president').GetFullName]"
 verrier.132.j: "그냥 개 몇 마리나 태워보자고."
 verrier.132.k: "전부 태우시오!"
 verrier.133.t: "[SCOPE.sCharacter('verrier_astronomer_scope').GetLastName]의 간섭"
 verrier.133.d: "초대형 대포의 건설과 설치를 위한 최종 준비에 나서는 동안 [SCOPE.sCharacter('verrier_astronomer_scope').GetFullName](이)가 사업 계획자들에게 경고를 날렸다. 본인의 계산에 따르면 [SCOPE.sCharacter('gaudi_engineer_scope').GetFullName]의 계산이 한참 틀렸다는 것이었다."
 verrier.133.f: "학계에서 저명한 것으로 알려진 이 천문학자는 본인의 계산대로라면 지금 규모로 대포를 제작하고 발사체를 조준할 경우 발사체가 지구 중력을 거의 벗어나지 못할 것이라고 주장하였다. 이와 함께 건설 계획을 개선하여 탐사 성공률을 크게 높일 방안을 제시하였다."
 verrier.133.g: "그 분이라면 대참사를 막을 수 있겠군."
 verrier.134.t: "카운트다운"
 verrier.134.d: "오래토록 기다려온 이 날을 앞둔 밤, 얼마나 많은 사람들이 잠을 이루지 못했던가! 모두의 심장은 초조함으로 박동했다. 콜럼비아호는 달을 향해 날아갈 준비를 마쳤다."
 verrier.134.f: "새벽이 밝고 스톤스힐 주변으로 눈 닿는 곳까지 펼쳐진 대평원은 셀 수 없이 많은 인파들로 가득 찼다. 15분에 한 번씩 열차가 새로운 관람객들을 실어 날랐다. 탬파 타운 옵서버의 보도에 따르면 플로리다 부지를 채운 관중이 무려 5백만 명에 달했다. 달은 맑고 투명한 하늘을 가로지르며 별빛보다 더 밝게 빛났다. 그것은 쌍둥이자리를 지나 지평선과 천정의 중간 지점에 가까워지고 있었다. 무서운 침묵이 온 세상을 뒤덮었다! 땅 위에는 바람 한 점 불지 않았다! 수많은 관중들의 숨소리조차 들리지 않았다! 관중들의 심장은 뛰는 것조차 두려워하는 듯했다! 콜럼비아호의 벌어진 입에 모든 시선이 집중되었다.\n\"삼십-오! 삼십-육! 삼십-칠! 삼십-팔! 삼십-구! 사십!\""
 verrier.134.g: "발사!"
 verrier.135.t: "대참사"
 verrier.135.d_humans_dead: "인류 최초의 우주 탐사가 인류 최초의 우주 참사로 끝나버렸다. 임무 전체가 거대한 실패로 끝나버린 것이다! 그 참혹함은 관중들의 뼛속에 줄곧 스며들었다."
 verrier.135.d_dogs_dead: "임무 전체가 거대한 실패로 끝났다! 가여운 동물들이 겪을 고통은 안타깝지만, 한편으로는 발사체에 사람이 타지 않았다는 사실에 안도하는 사람들도 많았다."
 verrier.135.f: "불기둥이 하늘 높이 솟아오르고, 불꽃의 섬광이 플로리다 전역을 환하게 비추면서 잠시나마 드넓은 지역에 밤하늘을 낮으로 바꾸었다. 이 거대한 불길은 바다에서 160km 떨어진 곳에서도 목격되었으며, 여러 선장들이 항해일지에 거대한 유성을 목격했다고 기록하였다. 콜럼비아호 로켓 발사는 엄청난 진동을 동반했다. 플로리다 전역이 뿌리부터 흔들릴 지경이었다. 열에 의해 팽창한 화약 가스가 엄청난 기새로 대기층을 밀어냈고, 인공 폭풍 기둥이 마치 물기둥처럼 하늘을 휩쓸고 지나갔다.\n하지만 그 후 실험이 통제불능 상태에 빠지고 말았다. 대포가 발사체를 우주로 쏘아올릴 만큼 충분한 추진력을 일으키지 못한 탓이었다. 그 모든 장관을 뒤로 한 채 발사체는 속도를 잃고 지구로 추락하여 큰 폭발음과 함께 지면에 부딪혔다."
 verrier.135.g: "그래도 커벌 스페이스 프로그램 2보단 쉽군."
 verrier.136.t: "달 세계 여행"
 verrier.136.d_humans_in_space: "콜럼비아호의 발사는 대성공을 거두었다. 인류가 처음으로 우주에 발을 들이게 된 것이다! 이제 남은 의문은 지구로 돌아갈 수 있느냐였다..."
 verrier.136.d_dogs_in_space: "콜럼비아호의 발사는 대성공을 거두었다. 인류가 만든 물체가 처음으로 우주에 발을 들이게 된 것이다! 안타깝게도 그 안에 탑승한 개들은 콜럼비아호를 지구로 귀환시킬 수 없는 상황이다..."
 verrier.136.f: "불기둥이 하늘 높이 솟아오르고, 불꽃의 섬광이 플로리다 전역을 환하게 비추면서 잠시나마 드넓은 지역에 밤하늘을 낮으로 바꾸었다. 이 거대한 불길은 바다에서 160km 떨어진 곳에서도 목격되었으며, 여러 선장들이 항해일지에 거대한 유성을 목격했다고 기록하였다. 콜럼비아호 로켓 발사는 엄청난 진동을 동반했다. 플로리다 전역이 뿌리부터 흔들릴 지경이었다. 열에 의해 팽창한 화약 가스가 엄청난 기새로 대기층을 밀어냈고, 인공 폭풍 기둥이 마치 물기둥처럼 하늘을 휩쓸고 지나갔다.\n그렇게 실험은 성공을 거두었다."
 verrier.136.g: "이게 정말로 될... 축하드리오!"
 verrier.136.h: "진짜 조종사를 태워 보내지 못한 것이 한이군."
 verrier.137.t: "달에서 귀환하다!"
 verrier.137.d: "달 탐사선이 태평양에 무사히 착륙하여 미 해군 코르벳함이 회수하였다. 이 소식은 온 나라에 퍼져나갔다. 인류가 달에 갔다가 귀환한 것이다!"
 verrier.137.f_person: "발사체가 바닷속으로 가라앉은 지점은 정확히 포착하였으나 그것을 건져 올려 수면으로 끌어올릴 장비는 아직 없었다. 발명과 제작이 우선이었던 것이다. 허나 미국의 공학자들은 그런 사소한 일에 시간낭비할 여유가 없었다. 일단 갈고리를 설치하자 바닷물의 밀도로 발사체의 무게가 다소 가벼워져 끌어올릴 수 있다는 확신이 생겼다.\n우리는 발사 당시의 우레와 같은 환호를 기억한다. 이 모험이 시작되던 그날 구대륙과 신대륙을 가리지 않고 그토록 큰 감동을 불러일으켰다면, 영웅의 귀환 소식은 얼마나 더 열렬한 환영을 받을런지! 그렇게 그는 여러 마을을 다니며 길가에 식탁을 차리고 앉아 있던 온 동네 사람들에게 똑같은 환호와 박수갈채를 받았다."
 verrier.137.f_team: "발사체가 바닷속으로 가라앉은 지점은 정확히 포착하였으나 그것을 건져 올려 수면으로 끌어올릴 장비는 아직 없었다. 발명과 제작이 우선이었던 것이다. 허나 미국의 공학자들은 그런 사소한 일에 시간낭비할 여유가 없었다. 일단 갈고리를 설치하자 바닷물의 밀도로 발사체의 무게가 다소 가벼워져 끌어올릴 수 있다는 확신이 생겼다.\n우리는 발사 당시의 우레와 같은 환호를 기억한다. 이 모험이 시작되던 그날 구대륙과 신대륙을 가리지 않고 그토록 큰 감동을 불러일으켰다면, 영웅들의 귀환 소식은 얼마나 더 열렬한 환영을 받을런지! 그렇게 그는 여러 마을을 다니며 길가에 식탁을 차리고 앉아 있던 온 동네 사람들에게 똑같은 환호와 박수갈채를 받았다."
 verrier.137.g: "이 순간을 축하하세!"
 verrier.1051.t: "가우스의 복귀"
 verrier.1051.d: "한때 최고의 천문학자로 꼽혔던 [SCOPE.sCharacter('verrier_new_astronomer_scope').GetFullName](은)는 지난 수 년 간 수학과 자기학처럼 다른 분야에 집중해 왔다. 하지만 이제 다시 천문학으로 복귀한다는 소식이다."
 verrier.1051.f: "내가 돌아왔다."
 verrier.1051.g: "종과 관련이 있나 보지?"
 verrier.1051.h: "이제부터 새로운 위성을 찾게 될 것이다!"
 verrier.90.f: "회의에서는 다음과 같은 결론에 도달하였다.\n\n"
 verrier.90.one_universe_loc: "은하수는 우주 전체를 아우른다 (투표 결과: [GetGlobalVariable('verrier_galaxies_no').GetValue|+0] 대 [GetGlobalVariable('verrier_galaxies_yes').GetValue|V0])\n"
 verrier.90.many_universe_loc: "우주에는 여러 가지 은하가 존재한다 (투표 결과: [GetGlobalVariable('verrier_galaxies_yes').GetValue|+0] 대 [GetGlobalVariable('verrier_galaxies_no').GetValue|V0])\n"
 verrier.90.sun_center_loc: "태양은 은하수의 중심부에 놓여 있다 (투표 결과: [GetGlobalVariable('verrier_sun_center_yes').GetValue|+0] 대 [GetGlobalVariable('verrier_sun_center_no').GetValue|V0])"
 verrier.90.sun_outer_loc: "태양은 은하수의 외곽 지역에 놓여 있다 (투표 결과: [GetGlobalVariable('verrier_sun_center_no').GetValue|+0] 대 [GetGlobalVariable('verrier_sun_center_yes').GetValue|V0])"
 verrier.90.g: "과학은 결코 안주하지 않는다."
